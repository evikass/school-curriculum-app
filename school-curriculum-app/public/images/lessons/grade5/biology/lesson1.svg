<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Биология — наука о живой природе</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 1</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Open Book -->
  <g transform="translate(170,55)">
    <path d="M80,10 Q80,5 75,5 L5,15 Q0,16 0,21 L0,95 Q0,100 5,99 L75,89 Q80,88 80,83 Z" fill="#FFF9C4" stroke="#5D4037" stroke-width="1.2"/>
    <path d="M80,10 Q80,5 85,5 L155,15 Q160,16 160,21 L160,95 Q160,100 155,99 L85,89 Q80,88 80,83 Z" fill="#FFFDE7" stroke="#5D4037" stroke-width="1.2"/>
    <line x1="80" y1="10" x2="80" y2="83" stroke="#5D4037" stroke-width="1"/>
    <!-- Left page lines -->
    <line x1="12" y1="30" x2="70" y2="23" stroke="#888" stroke-width="0.5"/>
    <line x1="12" y1="38" x2="70" y2="31" stroke="#888" stroke-width="0.5"/>
    <line x1="12" y1="46" x2="70" y2="39" stroke="#888" stroke-width="0.5"/>
    <line x1="12" y1="54" x2="70" y2="47" stroke="#888" stroke-width="0.5"/>
    <line x1="12" y1="62" x2="70" y2="55" stroke="#888" stroke-width="0.5"/>
    <text x="40" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">БИО-</text>
    <text x="40" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">ЛОГИЯ</text>
    <!-- Right page lines -->
    <line x1="90" y1="23" x2="148" y2="30" stroke="#888" stroke-width="0.5"/>
    <line x1="90" y1="31" x2="148" y2="38" stroke="#888" stroke-width="0.5"/>
    <line x1="90" y1="39" x2="148" y2="46" stroke="#888" stroke-width="0.5"/>
    <line x1="90" y1="47" x2="148" y2="54" stroke="#888" stroke-width="0.5"/>
    <line x1="90" y1="55" x2="148" y2="62" stroke="#888" stroke-width="0.5"/>
    <text x="119" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#333">наука о</text>
    <text x="119" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#333">живом</text>
  </g>

  <!-- Nature symbols around the book -->
  <!-- Tree (left) -->
  <g transform="translate(40,100)">
    <rect x="12" y="35" width="6" height="20" fill="#795548" rx="1"/>
    <ellipse cx="15" cy="25" rx="15" ry="18" fill="#4CAF50"/>
    <ellipse cx="15" cy="22" rx="12" ry="14" fill="#66BB6A"/>
    <text x="15" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Растения</text>
  </g>

  <!-- Bird (right) -->
  <g transform="translate(360,80)">
    <ellipse cx="20" cy="18" rx="12" ry="8" fill="#FF8A65"/>
    <circle cx="28" cy="14" r="5" fill="#FFAB91"/>
    <polygon points="33,14 38,12 33,16" fill="#FF6D00"/>
    <circle cx="30" cy="13" r="1.2" fill="#1B5E20"/>
    <path d="M8,18 Q2,12 0,18 Q2,14 8,18" fill="#42A5F5"/>
    <path d="M8,22 Q2,28 0,22 Q2,26 8,22" fill="#42A5F5"/>
    <line x1="16" y1="26" x2="14" y2="32" stroke="#795548" stroke-width="1"/>
    <line x1="20" y1="26" x2="22" y2="32" stroke="#795548" stroke-width="1"/>
    <text x="18" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Животные</text>
  </g>

  <!-- Mushroom (far left) -->
  <g transform="translate(15,150)">
    <rect x="10" y="20" width="8" height="15" fill="#D7CCC8" rx="2"/>
    <ellipse cx="14" cy="20" rx="14" ry="10" fill="#A1887F"/>
    <circle cx="8" cy="17" r="2" fill="#8D6E63"/>
    <circle cx="18" cy="19" r="1.5" fill="#8D6E63"/>
    <text x="14" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Грибы</text>
  </g>

  <!-- Bacteria (bottom right of book) -->
  <g transform="translate(365,145)">
    <ellipse cx="15" cy="12" rx="10" ry="5" fill="#81D4FA" stroke="#0288D1" stroke-width="0.8"/>
    <ellipse cx="30" cy="10" rx="6" ry="6" fill="#80CBC4" stroke="#00897B" stroke-width="0.8"/>
    <path d="M40,12 Q45,6 50,12 Q55,18 60,12" fill="none" stroke="#AB47BC" stroke-width="1.5"/>
    <text x="37" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Бактерии</text>
  </g>

  <!-- Branches of Biology section -->
  <text x="250" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Отделы биологии</text>
  <line x1="30" y1="180" x2="470" y2="180" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <!-- Branch boxes -->
  <!-- Row 1 -->
  <rect x="20" y="190" width="88" height="42" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="64" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32">Ботаника</text>
  <text x="64" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">наука о</text>
  <text x="64" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">растениях</text>

  <rect x="118" y="190" width="88" height="42" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="162" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">Зоология</text>
  <text x="162" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">наука о</text>
  <text x="162" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">животных</text>

  <rect x="216" y="190" width="88" height="42" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
  <text x="260" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1">Микробиология</text>
  <text x="260" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">наука о</text>
  <text x="260" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">микроорганизмах</text>

  <rect x="314" y="190" width="88" height="42" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="358" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#6A1B9A">Микология</text>
  <text x="358" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">наука о</text>
  <text x="358" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">грибах</text>

  <!-- Row 2 -->
  <rect x="20" y="240" width="88" height="42" rx="5" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
  <text x="64" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#880E4F">Анатомия</text>
  <text x="64" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">строение</text>
  <text x="64" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">организма</text>

  <rect x="118" y="240" width="88" height="42" rx="5" fill="#EFEBE9" stroke="#795548" stroke-width="1"/>
  <text x="162" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#3E2723">Физиология</text>
  <text x="162" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">жизненные</text>
  <text x="162" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">процессы</text>

  <rect x="216" y="240" width="88" height="42" rx="5" fill="#E0F7FA" stroke="#00BCD4" stroke-width="1"/>
  <text x="260" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#006064">Экология</text>
  <text x="260" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">взаимосвязи</text>
  <text x="260" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">организмов</text>

  <rect x="314" y="240" width="88" height="42" rx="5" fill="#FFF8E1" stroke="#FFC107" stroke-width="1"/>
  <text x="358" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">Генетика</text>
  <text x="358" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">наследствен-</text>
  <text x="358" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">ность</text>

  <!-- Bottom: 5 kingdoms -->
  <text x="250" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Царства живой природы</text>
  <line x1="30" y1="302" x2="470" y2="302" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <circle cx="60" cy="325" r="12" fill="#4CAF50" opacity="0.8"/>
  <text x="60" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Раст.</text>

  <circle cx="145" cy="325" r="12" fill="#FF7043" opacity="0.8"/>
  <text x="145" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Жив.</text>

  <circle cx="230" cy="325" r="12" fill="#A1887F" opacity="0.8"/>
  <text x="230" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Грибы</text>

  <circle cx="315" cy="325" r="12" fill="#4FC3F7" opacity="0.8"/>
  <text x="315" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Бакт.</text>

  <circle cx="400" cy="325" r="12" fill="#CE93D8" opacity="0.8"/>
  <text x="400" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Вир.</text>

  <!-- Connecting lines from kingdoms to center -->
  <line x1="250" y1="298" x2="60" y2="313" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
  <line x1="250" y1="298" x2="145" y2="313" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
  <line x1="250" y1="298" x2="230" y2="313" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
  <line x1="250" y1="298" x2="315" y2="313" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
  <line x1="250" y1="298" x2="400" y2="313" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
</svg>