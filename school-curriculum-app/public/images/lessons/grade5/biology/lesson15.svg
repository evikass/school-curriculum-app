<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Роль грибов</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 15</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Section 1: Mycorrhiza -->
  <text x="130" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Микориза — грибокорень</text>

  <g transform="translate(15,62)">
    <rect x="0" y="0" width="230" height="105" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>

    <!-- Tree trunk -->
    <rect x="95" y="5" width="15" height="30" fill="#5D4037"/>
    <!-- Tree canopy -->
    <ellipse cx="102" cy="10" rx="25" ry="15" fill="#4CAF50"/>
    <ellipse cx="102" cy="7" rx="20" ry="12" fill="#66BB6A"/>

    <!-- Roots -->
    <path d="M100,35 Q90,50 70,60 Q55,68 40,75" stroke="#795548" stroke-width="2" fill="none"/>
    <path d="M102,35 Q102,50 102,65 Q102,72 102,80" stroke="#795548" stroke-width="2" fill="none"/>
    <path d="M105,35 Q115,50 135,60 Q150,68 165,75" stroke="#795548" stroke-width="2" fill="none"/>

    <!-- Fungal hyphae around roots (ectomycorrhiza) -->
    <path d="M55,62 Q48,58 42,65 Q36,70 30,68" stroke="#FF9800" stroke-width="1.2" fill="none"/>
    <path d="M65,58 Q58,55 52,60 Q46,65 40,62" stroke="#FF9800" stroke-width="1" fill="none"/>
    <path d="M38,72 Q30,75 25,70 Q20,68 15,72" stroke="#FF9800" stroke-width="1" fill="none"/>

    <path d="M95,72 Q88,68 82,74 Q76,78 70,75" stroke="#FF9800" stroke-width="1.2" fill="none"/>
    <path d="M108,72 Q115,68 122,74 Q128,78 135,75" stroke="#FF9800" stroke-width="1" fill="none"/>

    <path d="M145,62 Q152,58 158,65 Q164,70 170,68" stroke="#FF9800" stroke-width="1.2" fill="none"/>
    <path d="M155,58 Q162,55 168,60 Q174,65 180,62" stroke="#FF9800" stroke-width="1" fill="none"/>

    <!-- Mushroom fruiting bodies -->
    <rect x="28" y="82" width="4" height="10" fill="#D7CCC8" stroke="#A1887F" stroke-width="0.5"/>
    <path d="M22,82 Q32,76 42,82" fill="#A1887F" stroke="#5D4037" stroke-width="0.6"/>

    <rect x="168" y="82" width="4" height="10" fill="#D7CCC8" stroke="#A1887F" stroke-width="0.5"/>
    <path d="M162,82 Q172,76 182,82" fill="#A1887F" stroke="#5D4037" stroke-width="0.6"/>

    <!-- Exchange arrows -->
    <path d="M55,50 L65,45" stroke="#4CAF50" stroke-width="1" fill="none" marker-end="url(#arrM)"/>
    <text x="72" y="42" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">Вода, минералы</text>
    <defs><marker id="arrM" markerWidth="5" markerHeight="3" refX="5" refY="1.5" orient="auto"><path d="M0,0 L5,1.5 L0,3" fill="#4CAF50"/></marker></defs>

    <path d="M120,50 L110,45" stroke="#FF9800" stroke-width="1" fill="none" marker-end="url(#arrO)"/>
    <text x="130" y="42" font-family="Arial,sans-serif" font-size="5" fill="#FF9800">Органика</text>
    <defs><marker id="arrO" markerWidth="5" markerHeight="3" refX="5" refY="1.5" orient="auto"><path d="M0,0 L5,1.5 L0,3" fill="#FF9800"/></marker></defs>
  </g>

  <!-- Types of mycorrhiza -->
  <g transform="translate(15,170)">
    <rect x="0" y="0" width="110" height="30" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="55" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20">Эктотрофная</text>
    <text x="55" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Гифы снаружи корня</text>

    <rect x="120" y="0" width="110" height="30" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.6"/>
    <text x="175" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100">Эндотрофная</text>
    <text x="175" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Гифы внутри корня</text>
  </g>

  <!-- Section 2: Food industry -->
  <text x="390" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Пищевая промышленность</text>

  <g transform="translate(270,62)">
    <rect x="0" y="0" width="215" height="105" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>

    <!-- Bread -->
    <g transform="translate(10,10)">
      <path d="M0,35 Q5,10 25,8 Q45,10 50,35 Z" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Хлеб</text>
      <text x="25" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Дрожжи</text>
      <text x="25" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">(сахара → CO₂)</text>
    </g>

    <!-- Cheese -->
    <g transform="translate(75,10)">
      <path d="M5,35 L5,12 Q25,5 45,12 L45,35 Z" fill="#FFE082" stroke="#FFC107" stroke-width="1"/>
      <circle cx="20" cy="22" r="2" fill="#FF8F00"/>
      <circle cx="32" cy="18" r="1.5" fill="#FF8F00"/>
      <circle cx="25" cy="28" r="1.8" fill="#FF8F00"/>
      <text x="25" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Сыр</text>
      <text x="25" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">(Пеницилл)</text>
    </g>

    <!-- Beer/wine -->
    <g transform="translate(145,10)">
      <!-- Bottle -->
      <rect x="8" y="8" width="15" height="30" rx="2" fill="#A1887F" opacity="0.3" stroke="#795548" stroke-width="0.8"/>
      <rect x="12" y="3" width="7" height="8" rx="1" fill="#A1887F" opacity="0.3" stroke="#795548" stroke-width="0.8"/>
      <!-- Bubbles -->
      <circle cx="16" cy="20" r="1.5" fill="none" stroke="#795548" stroke-width="0.3"/>
      <circle cx="18" cy="14" r="1" fill="none" stroke="#795548" stroke-width="0.3"/>

      <rect x="32" y="15" width="12" height="22" rx="3" fill="#7B1FA2" opacity="0.3" stroke="#6A1B9A" stroke-width="0.8"/>
      <rect x="34" y="10" width="8" height="8" rx="1" fill="#7B1FA2" opacity="0.3" stroke="#6A1B9A" stroke-width="0.8"/>
      <text x="25" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Пиво, вино</text>
      <text x="25" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">(спиртовое брожение)</text>
    </g>

    <!-- Soy sauce -->
    <g transform="translate(75,65)">
      <text x="35" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Соевый соус, лимонная кислота,</text>
      <text x="35" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">витамины, кормовой белок</text>
    </g>
  </g>

  <!-- Section 3: Penicillin / Medicine -->
  <text x="250" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Пенициллин — первый антибиотик</text>
  <line x1="30" y1="204" x2="470" y2="204" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <g transform="translate(20,210)">
    <!-- Petri dish -->
    <ellipse cx="60" cy="40" rx="55" ry="35" fill="#FFF9C4" opacity="0.3" stroke="#FBC02D" stroke-width="1"/>
    <!-- Bacteria colony -->
    <circle cx="40" cy="40" r="12" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
    <text x="40" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828">бактерии</text>
    <text x="40" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828">(рост)</text>

    <!-- Penicillium colony with inhibition zone -->
    <circle cx="85" cy="30" r="10" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="85" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#1B5E20">Пеницилл</text>

    <!-- Clear zone (no bacteria) around Penicillium -->
    <circle cx="85" cy="30" r="18" fill="none" stroke="#4CAF50" stroke-width="0.5" stroke-dasharray="2,1"/>
    <text x="85" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#4CAF50">зона подавления</text>

    <!-- Fleming note -->
    <rect x="5" y="72" width="115" height="18" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
    <text x="60" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">А. Флеминг, 1928 г.</text>
    <text x="60" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">открытие пенициллина</text>
  </g>

  <!-- Antibiotic importance -->
  <g transform="translate(155,210)">
    <rect x="0" y="0" width="155" height="88" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="0.8"/>
    <text x="77" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1">Значение антибиотиков</text>
    <text x="10" y="26" font-family="Arial,sans-serif" font-size="6" fill="#555">• Убивают бактерии</text>
    <text x="10" y="36" font-family="Arial,sans-serif" font-size="6" fill="#555">• Лечат пневмонию</text>
    <text x="10" y="46" font-family="Arial,sans-serif" font-size="6" fill="#555">• Спасли миллионы жизней</text>
    <text x="10" y="56" font-family="Arial,sans-serif" font-size="6" fill="#555">• Не действуют на вирусы!</text>

    <!-- Warning box -->
    <rect x="5" y="62" width="145" height="20" rx="3" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
    <text x="77" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17" font-weight="bold">⚠ Не применять без врача!</text>
    <text x="77" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">Привыкание бактерий</text>
  </g>

  <!-- Other roles -->
  <g transform="translate(325,210)">
    <rect x="0" y="0" width="155" height="88" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
    <text x="77" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#6A1B9A">Другие роли грибов</text>
    <text x="10" y="28" font-family="Arial,sans-serif" font-size="6" fill="#555">🌿 Редуценты (разрушители)</text>
    <text x="10" y="40" font-family="Arial,sans-serif" font-size="6" fill="#555">♻ Круговорот веществ</text>
    <text x="10" y="52" font-family="Arial,sans-serif" font-size="6" fill="#555">🍞 Пищевой продукт</text>
    <text x="10" y="64" font-family="Arial,sans-serif" font-size="6" fill="#555">💊 Циклоспорин (иммуно)</text>
    <text x="10" y="76" font-family="Arial,sans-serif" font-size="6" fill="#555">⚠ Паразиты растений</text>
    <text x="10" y="86" font-family="Arial,sans-serif" font-size="6" fill="#555">🦠 Вызывают болезни</text>
  </g>

  <!-- Mushroom collecting rules -->
  <text x="250" y="313" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Правила сбора грибов</text>

  <g transform="translate(20,320)">
    <rect x="0" y="0" width="90" height="18" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
    <text x="45" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">✓ Срежи ножом</text>

    <rect x="95" y="0" width="90" height="18" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
    <text x="140" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">✓ Не знаешь — не бери</text>

    <rect x="190" y="0" width="90" height="18" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
    <text x="235" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">✓ Не рви грибницу</text>

    <rect x="285" y="0" width="95" height="18" rx="3" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.5"/>
    <text x="332" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">✗ Не пробуй сырые</text>

    <rect x="385" y="0" width="90" height="18" rx="3" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.5"/>
    <text x="430" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">✗ Не собирай у дорог</text>
  </g>
</svg>