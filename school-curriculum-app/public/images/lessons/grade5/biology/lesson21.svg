<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Покрытосеменные растения</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 21</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Flowering plant with labeled parts -->
<text x="130" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Цветковое растение</text>

<g transform="translate(20,72)">
<!-- Root system -->
<path d="M100,180 Q90,195 70,205" fill="none" stroke="#8D6E63" stroke-width="2"/>
<path d="M105,180 Q100,195 92,210" fill="none" stroke="#8D6E63" stroke-width="2"/>
<path d="M110,180 Q115,195 125,208" fill="none" stroke="#8D6E63" stroke-width="2"/>
<path d="M115,180 Q125,195 142,205" fill="none" stroke="#8D6E63" stroke-width="2"/>
<!-- Lateral roots -->
<path d="M80,200 Q72,205 60,210" fill="none" stroke="#A1887F" stroke-width="1"/>
<path d="M130,202 Q138,208 148,212" fill="none" stroke="#A1887F" stroke-width="1"/>
<!-- Root hairs -->
<line x1="75" y1="205" x2="72" y2="210" stroke="#A1887F" stroke-width="0.4"/>
<line x1="85" y1="208" x2="82" y2="213" stroke="#A1887F" stroke-width="0.4"/>
<line x1="120" y1="206" x2="123" y2="211" stroke="#A1887F" stroke-width="0.4"/>
<line x1="135" y1="208" x2="138" y2="213" stroke="#A1887F" stroke-width="0.4"/>

<!-- Stem -->
<rect x="102" y="60" width="10" height="120" fill="#66BB6A" rx="3"/>

<!-- Leaves -->
<path d="M112,100 Q140,85 155,90 Q145,100 112,108" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="112" y1="104" x2="152" y2="92" stroke="#2E7D32" stroke-width="0.5"/>
<path d="M102,130 Q75,115 60,120 Q70,130 102,138" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="102" y1="134" x2="63" y2="122" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Flower -->
<circle cx="107" cy="45" r="15" fill="#FF80AB" opacity="0.5"/>
<ellipse cx="107" cy="28" rx="6" ry="12" fill="#E91E63" opacity="0.7"/>
<ellipse cx="95" cy="38" rx="6" ry="12" fill="#F06292" opacity="0.7" transform="rotate(-60,95,38)"/>
<ellipse cx="119" cy="38" rx="6" ry="12" fill="#F06292" opacity="0.7" transform="rotate(60,119,38)"/>
<ellipse cx="98" cy="52" rx="6" ry="12" fill="#F48FB1" opacity="0.7" transform="rotate(-30,98,52)"/>
<ellipse cx="116" cy="52" rx="6" ry="12" fill="#F48FB1" opacity="0.7" transform="rotate(30,116,52)"/>
<!-- Stamens -->
<line x1="102" y1="42" x2="102" y2="30" stroke="#FFD54F" stroke-width="0.8"/>
<circle cx="102" cy="28" r="2" fill="#FFC107"/>
<line x1="112" y1="42" x2="115" y2="30" stroke="#FFD54F" stroke-width="0.8"/>
<circle cx="115" cy="28" r="2" fill="#FFC107"/>
<!-- Pistil -->
<ellipse cx="107" cy="42" rx="3" ry="5" fill="#4CAF50"/>
<line x1="107" y1="37" x2="107" y2="25" stroke="#66BB6A" stroke-width="0.8"/>

<!-- Labels with leader lines -->
<text x="160" y="22" font-family="Arial,sans-serif" font-size="6" fill="#C62828">венчик (лепестки)</text>
<line x1="118" y1="32" x2="158" y2="22" stroke="#C62828" stroke-width="0.3"/>
<text x="160" y="36" font-family="Arial,sans-serif" font-size="6" fill="#FFC107">тычинки (пыльца)</text>
<line x1="115" y1="28" x2="158" y2="35" stroke="#FFC107" stroke-width="0.3"/>
<text x="160" y="48" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">пестик (семяпочка)</text>
<line x1="110" y1="42" x2="158" y2="47" stroke="#2E7D32" stroke-width="0.3"/>
<text x="155" y="95" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">лист</text>
<line x1="148" y1="92" x2="153" y2="93" stroke="#1B5E20" stroke-width="0.3"/>
<text x="158" y="110" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">стебель</text>
<line x1="112" y1="108" x2="156" y2="108" stroke="#1B5E20" stroke-width="0.3"/>
<text x="55" y="130" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">лист</text>
<text x="150" y="178" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">корень</text>
<line x1="120" y1="180" x2="148" y2="178" stroke="#5D4037" stroke-width="0.3"/>
<text x="150" y="190" font-family="Arial,sans-serif" font-size="6" fill="#A1887F">корневые волоски</text>
<line x1="85" y1="210" x2="148" y2="188" stroke="#A1887F" stroke-width="0.3"/>
</g>

<!-- Section 2: Dicot vs Monocot comparison -->
<text x="370" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Двудольные vs Однодольные</text>

<!-- Dicot plant (left) -->
<g transform="translate(275,80)">
<rect x="0" y="0" width="100" height="118" rx="5" fill="white" fill-opacity="0.4" stroke="#E91E63" stroke-width="0.7"/>
<text x="50" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#880E4F" text-anchor="middle">Двудольные</text>

<!-- Taproot system -->
<path d="M50,85 L50,110" stroke="#8D6E63" stroke-width="2.5"/>
<path d="M50,92 Q40,98 32,105" fill="none" stroke="#A1887F" stroke-width="1.2"/>
<path d="M50,92 Q60,98 68,105" fill="none" stroke="#A1887F" stroke-width="1.2"/>
<path d="M50,98 Q38,103 28,108" fill="none" stroke="#A1887F" stroke-width="0.8"/>

<!-- Stem -->
<rect x="47" y="40" width="6" height="45" fill="#66BB6A" rx="1"/>

<!-- Dicot leaf (net venation) -->
<path d="M53,50 Q75,38 82,45 Q75,52 53,55" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>
<line x1="53" y1="52" x2="78" y2="44" stroke="#1B5E20" stroke-width="0.4"/>
<line x1="62" y1="48" x2="65" y2="42" stroke="#1B5E20" stroke-width="0.3"/>
<line x1="68" y1="46" x2="72" y2="40" stroke="#1B5E20" stroke-width="0.3"/>
<line x1="62" y1="52" x2="65" y2="56" stroke="#1B5E20" stroke-width="0.3"/>

<!-- Dicot flower (4s/5s) -->
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#E91E63" opacity="0.6" transform="rotate(0,50,32)"/>
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#E91E63" opacity="0.6" transform="rotate(72,50,32)"/>
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#E91E63" opacity="0.6" transform="rotate(144,50,32)"/>
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#E91E63" opacity="0.6" transform="rotate(216,50,32)"/>
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#E91E63" opacity="0.6" transform="rotate(288,50,32)"/>
<circle cx="50" cy="32" r="3" fill="#FFEB3B"/>

<!-- Dicot seed (2 cotyledons) -->
<ellipse cx="25" cy="25" rx="8" ry="6" fill="#A1887F" stroke="#5D4037" stroke-width="0.5"/>
<line x1="25" y1="19" x2="25" y2="31" stroke="#5D4037" stroke-width="0.5"/>
<text x="25" y="37" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">2 семядоли</text>

<!-- Labels -->
<text x="50" y="108" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">стержневая</text>
<text x="50" y="114" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">корневая</text>
</g>

<!-- Monocot plant (right) -->
<g transform="translate(385,80)">
<rect x="0" y="0" width="100" height="118" rx="5" fill="white" fill-opacity="0.4" stroke="#FF9800" stroke-width="0.7"/>
<text x="50" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Однодольные</text>

<!-- Fibrous root system -->
<path d="M50,85 L45,108" stroke="#A1887F" stroke-width="1.5"/>
<path d="M50,85 L48,110" stroke="#A1887F" stroke-width="1.5"/>
<path d="M50,85 L52,110" stroke="#A1887F" stroke-width="1.5"/>
<path d="M50,85 L55,108" stroke="#A1887F" stroke-width="1.5"/>
<path d="M50,85 L40,105" stroke="#A1887F" stroke-width="1"/>
<path d="M50,85 L60,105" stroke="#A1887F" stroke-width="1"/>

<!-- Stem -->
<rect x="47" y="40" width="6" height="45" fill="#66BB6A" rx="1"/>

<!-- Monocot leaf (parallel venation) -->
<path d="M53,50 Q70,35 75,42 Q72,52 53,55" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>
<line x1="56" y1="50" x2="72" y2="42" stroke="#1B5E20" stroke-width="0.3"/>
<line x1="58" y1="51" x2="70" y2="45" stroke="#1B5E20" stroke-width="0.3"/>
<line x1="60" y1="52" x2="68" y2="48" stroke="#1B5E20" stroke-width="0.3"/>

<!-- Monocot flower (3s) -->
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#FF9800" opacity="0.6" transform="rotate(0,50,32)"/>
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#FF9800" opacity="0.6" transform="rotate(120,50,32)"/>
<ellipse cx="50" cy="32" rx="4" ry="8" fill="#FF9800" opacity="0.6" transform="rotate(240,50,32)"/>
<circle cx="50" cy="32" r="3" fill="#FFEB3B"/>

<!-- Monocot seed (1 cotyledon) -->
<ellipse cx="25" cy="25" rx="8" ry="6" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<line x1="20" y1="22" x2="20" y2="28" stroke="#E65100" stroke-width="0.8"/>
<text x="25" y="37" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">1 семядоля</text>

<!-- Labels -->
<text x="50" y="108" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">мочковатая</text>
<text x="50" y="114" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">корневая</text>
</g>

<!-- Section 3: Comparison table -->
<text x="250" y="215" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнение классов покрытосеменных</text>

<g transform="translate(20,222)">
<rect x="0" y="0" width="460" height="115" rx="5" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>

<rect x="0" y="0" width="460" height="13" rx="5" fill="#2E7D32" opacity="0.15"/>
<text x="80" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Признак</text>
<text x="240" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#880E4F" text-anchor="middle">Двудольные (Dicotyledones)</text>
<text x="395" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100" text-anchor="middle">Однодольные (Monocotyledones)</text>

<line x1="0" y1="13" x2="460" y2="13" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="160" y1="0" x2="160" y2="115" stroke="#C8E6C9" stroke-width="0.3"/>
<line x1="320" y1="0" x2="320" y2="115" stroke="#C8E6C9" stroke-width="0.3"/>

<text x="80" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Семядоли</text>
<text x="240" y="24" font-family="Arial,sans-serif" font-size="6" fill="#880E4F" text-anchor="middle">2</text>
<text x="395" y="24" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">1</text>
<line x1="0" y1="28" x2="460" y2="28" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="80" y="38" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Жилкование листа</text>
<text x="240" y="38" font-family="Arial,sans-serif" font-size="6" fill="#880E4F" text-anchor="middle">сетчатое</text>
<text x="395" y="38" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">параллельное / дуговое</text>
<line x1="0" y1="42" x2="460" y2="42" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="80" y="52" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Корневая система</text>
<text x="240" y="52" font-family="Arial,sans-serif" font-size="6" fill="#880E4F" text-anchor="middle">стержневая</text>
<text x="395" y="52" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">мочковатая</text>
<line x1="0" y1="56" x2="460" y2="56" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="80" y="66" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Камбий в стебле</text>
<text x="240" y="66" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">есть (рост в толщину)</text>
<text x="395" y="66" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">нет</text>
<line x1="0" y1="70" x2="460" y2="70" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="80" y="80" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Число частей цветка</text>
<text x="240" y="80" font-family="Arial,sans-serif" font-size="6" fill="#880E4F" text-anchor="middle">4 или 5</text>
<text x="395" y="80" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">3</text>
<line x1="0" y1="84" x2="460" y2="84" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="80" y="94" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Примеры</text>
<text x="240" y="94" font-family="Arial,sans-serif" font-size="5.5" fill="#880E4F" text-anchor="middle">Роза, горох, яблоня, дуб</text>
<text x="395" y="94" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Пшеница, лук, лилия, orchid</text>
<line x1="0" y1="98" x2="460" y2="98" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="80" y="108" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Видов (тыс.)</text>
<text x="240" y="108" font-family="Arial,sans-serif" font-size="6" fill="#880E4F" text-anchor="middle">~199</text>
<text x="395" y="108" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">~60</text>
</g>
</svg>