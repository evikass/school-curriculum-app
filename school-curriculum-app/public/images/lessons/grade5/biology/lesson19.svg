<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Споровые растения: сравнение</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 19</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Four plant types illustrated -->

<!-- 1. Mosses (Мхи) -->
<g transform="translate(15,58)">
<rect x="0" y="0" width="110" height="140" rx="5" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.7"/>
<rect x="0" y="0" width="110" height="15" rx="5" fill="#4CAF50" opacity="0.25"/>
<text x="55" y="12" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Мхи</text>

<!-- Moss plant -->
<rect x="40" y="50" width="6" height="45" rx="1" fill="#4CAF50"/>
<rect x="30" y="55" width="5" height="20" rx="1" fill="#66BB6A"/>
<rect x="50" y="52" width="5" height="18" rx="1" fill="#66BB6A"/>
<rect x="25" y="60" width="4" height="15" rx="1" fill="#81C784"/>
<rect x="55" y="58" width="4" height="12" rx="1" fill="#81C784"/>
<!-- Capsule on stalk -->
<line x1="43" y1="50" x2="43" y2="32" stroke="#8D6E63" stroke-width="1"/>
<ellipse cx="43" cy="28" rx="5" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<circle cx="43" cy="22" r="3" fill="#A1887F"/>
<!-- Rhizoids -->
<line x1="40" y1="95" x2="35" y2="105" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="43" y1="95" x2="43" y2="107" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="46" y1="95" x2="51" y2="105" stroke="#8D6E63" stroke-width="0.8"/>
<text x="55" y="115" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">ризоиды</text>

<!-- Labels -->
<text x="75" y="35" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">коробочка</text>
<line x1="48" y1="33" x2="72" y2="34" stroke="#5D4037" stroke-width="0.3"/>
<text x="75" y="72" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">листочки</text>
<line x1="55" y1="60" x2="72" y2="68" stroke="#2E7D32" stroke-width="0.3"/>

<!-- Key features -->
<text x="55" y="128" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">нет корней и проводящей</text>
<text x="55" y="135" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">ткани, размножаются спорами</text>
</g>

<!-- 2. Ferns (Папоротники) -->
<g transform="translate(135,58)">
<rect x="0" y="0" width="110" height="140" rx="5" fill="white" fill-opacity="0.4" stroke="#1B5E20" stroke-width="0.7"/>
<rect x="0" y="0" width="110" height="15" rx="5" fill="#2E7D32" opacity="0.25"/>
<text x="55" y="12" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Папоротники</text>

<!-- Fern fronds -->
<path d="M55,100 Q50,80 40,60 Q35,50 28,40" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
<path d="M28,40 Q25,38 22,35 Q20,33 18,30" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-linecap="round"/>
<path d="M33,48 Q28,42 24,38" fill="none" stroke="#4CAF50" stroke-width="1" stroke-linecap="round"/>
<path d="M38,56 Q42,50 46,44" fill="none" stroke="#4CAF50" stroke-width="1" stroke-linecap="round"/>

<path d="M55,100 Q60,80 70,60 Q75,50 82,40" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
<path d="M82,40 Q85,38 88,35 Q90,33 92,30" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-linecap="round"/>
<path d="M77,48 Q82,42 86,38" fill="none" stroke="#4CAF50" stroke-width="1" stroke-linecap="round"/>
<path d="M72,56 Q68,50 64,44" fill="none" stroke="#4CAF50" stroke-width="1" stroke-linecap="round"/>

<!-- Sori (spore clusters) on back of frond -->
<circle cx="25" cy="36" r="1.5" fill="#8D6E63"/>
<circle cx="30" cy="42" r="1.5" fill="#8D6E63"/>
<circle cx="80" cy="36" r="1.5" fill="#8D6E63"/>
<circle cx="75" cy="42" r="1.5" fill="#8D6E63"/>
<!-- Rhizome -->
<path d="M30,100 Q45,96 55,100 Q65,104 80,100" fill="none" stroke="#5D4037" stroke-width="2.5"/>
<!-- Roots -->
<line x1="40" y1="100" x2="35" y2="110" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="55" y1="100" x2="55" y2="112" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="70" y1="100" x2="75" y2="110" stroke="#8D6E63" stroke-width="0.8"/>

<!-- Labels -->
<text x="90" y="45" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">вая</text>
<text x="90" y="50" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">(лист)</text>
<line x1="88" y1="40" x2="89" y2="42" stroke="#1B5E20" stroke-width="0.3"/>
<text x="90" y="98" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">корневище</text>
<line x1="82" y1="100" x2="89" y2="98" stroke="#5D4037" stroke-width="0.3"/>
<text x="15" y="30" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63">сорусы</text>
<line x1="25" y1="35" x2="22" y2="33" stroke="#8D6E63" stroke-width="0.3"/>

<text x="55" y="128" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">есть корни и проводящая</text>
<text x="55" y="135" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">ткань, споры на листьях</text>
</g>

<!-- 3. Horsetails (Хвощи) -->
<g transform="translate(255,58)">
<rect x="0" y="0" width="110" height="140" rx="5" fill="white" fill-opacity="0.4" stroke="#33691E" stroke-width="0.7"/>
<rect x="0" y="0" width="110" height="15" rx="5" fill="#33691E" opacity="0.2"/>
<text x="55" y="12" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Хвощи</text>

<!-- Spring shoot (with strobilus) -->
<line x1="30" y1="100" x2="30" y2="35" stroke="#4CAF50" stroke-width="2.5"/>
<!-- Nodes with fused leaves -->
<ellipse cx="30" cy="55" rx="8" ry="2" fill="none" stroke="#66BB6A" stroke-width="1"/>
<ellipse cx="30" cy="70" rx="8" ry="2" fill="none" stroke="#66BB6A" stroke-width="1"/>
<ellipse cx="30" cy="85" rx="8" ry="2" fill="none" stroke="#66BB6A" stroke-width="1"/>
<!-- Strobilus -->
<ellipse cx="30" cy="30" rx="6" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<line x1="24" y1="25" x2="36" y2="25" stroke="#5D4037" stroke-width="0.5"/>
<line x1="24" y1="28" x2="36" y2="28" stroke="#5D4037" stroke-width="0.5"/>
<line x1="24" y1="31" x2="36" y2="31" stroke="#5D4037" stroke-width="0.5"/>
<line x1="24" y1="34" x2="36" y2="34" stroke="#5D4037" stroke-width="0.5"/>

<!-- Summer shoot (green, branched) -->
<line x1="75" y1="100" x2="75" y2="25" stroke="#2E7D32" stroke-width="2"/>
<!-- Whorled branches -->
<line x1="75" y1="40" x2="60" y2="32" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="40" x2="90" y2="32" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="55" x2="60" y2="47" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="55" x2="90" y2="47" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="70" x2="60" y2="62" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="70" x2="90" y2="62" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="85" x2="60" y2="77" stroke="#4CAF50" stroke-width="1"/>
<line x1="75" y1="85" x2="90" y2="77" stroke="#4CAF50" stroke-width="1"/>
<!-- Sub-branches -->
<line x1="60" y1="32" x2="55" y2="26" stroke="#66BB6A" stroke-width="0.6"/>
<line x1="60" y1="32" x2="55" y2="35" stroke="#66BB6A" stroke-width="0.6"/>
<line x1="90" y1="32" x2="95" y2="26" stroke="#66BB6A" stroke-width="0.6"/>
<line x1="90" y1="32" x2="95" y2="35" stroke="#66BB6A" stroke-width="0.6"/>

<!-- Roots -->
<line x1="30" y1="100" x2="25" y2="112" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="75" y1="100" x2="75" y2="112" stroke="#8D6E63" stroke-width="0.8"/>

<text x="30" y="118" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">весенний</text>
<text x="75" y="118" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">летний</text>
<text x="30" y="124" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(спороносный)</text>
<text x="75" y="124" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(фотосинтез.)</text>

<text x="55" y="135" font-family="Arial,sans-serif" font-size="5" fill="#33691E" text-anchor="middle">членистый стебель, мутовки</text>
</g>

<!-- 4. Club mosses (Плауны) -->
<g transform="translate(375,58)">
<rect x="0" y="0" width="110" height="140" rx="5" fill="white" fill-opacity="0.4" stroke="#1B5E20" stroke-width="0.7"/>
<rect x="0" y="0" width="110" height="15" rx="5" fill="#1B5E20" opacity="0.2"/>
<text x="55" y="12" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плауны</text>

<!-- Creeping stem -->
<path d="M15,80 Q30,75 55,78 Q80,82 100,76" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<!-- Small leaves along stem -->
<ellipse cx="25" cy="75" rx="3" ry="6" fill="#4CAF50" transform="rotate(-10,25,75)"/>
<ellipse cx="40" cy="76" rx="3" ry="6" fill="#4CAF50" transform="rotate(5,40,76)"/>
<ellipse cx="55" cy="77" rx="3" ry="6" fill="#4CAF50" transform="rotate(-5,55,77)"/>
<ellipse cx="70" cy="80" rx="3" ry="6" fill="#4CAF50" transform="rotate(8,70,80)"/>
<ellipse cx="85" cy="79" rx="3" ry="6" fill="#4CAF50" transform="rotate(-8,85,79)"/>

<!-- Upright shoot with strobilus -->
<line x1="60" y1="77" x2="60" y2="35" stroke="#2E7D32" stroke-width="1.5"/>
<ellipse cx="25" cy="75" rx="2" ry="1" fill="#66BB6A"/>
<ellipse cx="40" cy="76" rx="2" ry="1" fill="#66BB6A"/>
<ellipse cx="55" cy="77" rx="2" ry="1" fill="#66BB6A"/>
<ellipse cx="70" cy="80" rx="2" ry="1" fill="#66BB6A"/>

<!-- Strobilus -->
<ellipse cx="60" cy="30" rx="5" ry="10" fill="#FFC107" stroke="#F57F17" stroke-width="0.8"/>
<line x1="55" y1="24" x2="65" y2="24" stroke="#F57F17" stroke-width="0.5"/>
<line x1="55" y1="27" x2="65" y2="27" stroke="#F57F17" stroke-width="0.5"/>
<line x1="55" y1="30" x2="65" y2="30" stroke="#F57F17" stroke-width="0.5"/>
<line x1="55" y1="33" x2="65" y2="33" stroke="#F57F17" stroke-width="0.5"/>
<line x1="55" y1="36" x2="65" y2="36" stroke="#F57F17" stroke-width="0.5"/>

<!-- Roots from creeping stem -->
<line x1="30" y1="80" x2="28" y2="95" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="55" y1="80" x2="53" y2="95" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="80" y1="82" x2="78" y2="95" stroke="#8D6E63" stroke-width="0.8"/>

<text x="70" y="30" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">стробил</text>
<line x1="65" y1="30" x2="68" y2="30" stroke="#F57F17" stroke-width="0.3"/>
<text x="55" y="108" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">стелющийся стебель</text>
<text x="55" y="115" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">с мелкими листьями</text>
<text x="55" y="135" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">споры в стробилах</text>
</g>

<!-- Comparison table at bottom -->
<text x="250" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнительная таблица споровых растений</text>

<g transform="translate(15,218)">
<rect x="0" y="0" width="470" height="115" rx="5" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Header -->
<rect x="0" y="0" width="470" height="13" rx="5" fill="#2E7D32" opacity="0.15"/>
<text x="60" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Признак</text>
<text x="150" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Мхи</text>
<text x="250" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Папоротники</text>
<text x="350" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#33691E" text-anchor="middle">Хвощи</text>
<text x="430" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плауны</text>

<line x1="0" y1="13" x2="470" y2="13" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="110" y1="0" x2="110" y2="115" stroke="#C8E6C9" stroke-width="0.3"/>
<line x1="200" y1="0" x2="200" y2="115" stroke="#C8E6C9" stroke-width="0.3"/>
<line x1="300" y1="0" x2="300" y2="115" stroke="#C8E6C9" stroke-width="0.3"/>
<line x1="385" y1="0" x2="385" y2="115" stroke="#C8E6C9" stroke-width="0.3"/>

<!-- Rows -->
<text x="60" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Корни</text>
<text x="150" y="24" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">ризоиды</text>
<text x="250" y="24" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">есть</text>
<text x="350" y="24" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">есть</text>
<text x="430" y="24" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">есть</text>

<line x1="0" y1="28" x2="470" y2="28" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="60" y="38" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Листья</text>
<text x="150" y="38" font-family="Arial,sans-serif" font-size="6" fill="#FF9800" text-anchor="middle">листовидные</text>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">ваи (крупные)</text>
<text x="350" y="38" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">мутовки мелких</text>
<text x="430" y="38" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">мелкие</text>

<line x1="0" y1="42" x2="470" y2="42" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="60" y="52" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Стебель</text>
<text x="150" y="52" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">прямой</text>
<text x="250" y="52" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">корневище</text>
<text x="350" y="52" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">членистый</text>
<text x="430" y="52" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">стелющийся</text>

<line x1="0" y1="56" x2="470" y2="56" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="60" y="66" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Проводящая ткань</text>
<text x="150" y="66" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">слабая</text>
<text x="250" y="66" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">развитая</text>
<text x="350" y="66" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">развитая</text>
<text x="430" y="66" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">развитая</text>

<line x1="0" y1="70" x2="470" y2="70" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="60" y="80" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Споры</text>
<text x="150" y="80" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">в коробочке</text>
<text x="250" y="80" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">сорусы на ваи</text>
<text x="350" y="80" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">стробил</text>
<text x="430" y="80" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">стробил</text>

<line x1="0" y1="84" x2="470" y2="84" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="60" y="94" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Высота</text>
<text x="150" y="94" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">до 30 см</text>
<text x="250" y="94" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">до 10 м</text>
<text x="350" y="94" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">до 1 м</text>
<text x="430" y="94" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">до 30 см</text>

<line x1="0" y1="98" x2="470" y2="98" stroke="#E8F5E9" stroke-width="0.3"/>

<text x="60" y="108" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Среда обитания</text>
<text x="150" y="108" font-family="Arial,sans-serif" font-size="6" fill="#2196F3" text-anchor="middle">болота, леса</text>
<text x="250" y="108" font-family="Arial,sans-serif" font-size="6" fill="#2196F3" text-anchor="middle">тропики, леса</text>
<text x="350" y="108" font-family="Arial,sans-serif" font-size="6" fill="#2196F3" text-anchor="middle">поля, луга</text>
<text x="430" y="108" font-family="Arial,sans-serif" font-size="6" fill="#2196F3" text-anchor="middle">тропики, леса</text>
</g>
