<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="crustose" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9E9E9E"/><stop offset="100%" stop-color="#616161"/></linearGradient>
<linearGradient id="foliose" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
<linearGradient id="fruticose" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#388E3C"/></linearGradient>
<linearGradient id="rock" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BDBDBD"/><stop offset="100%" stop-color="#757575"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Лишайники</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 16</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Three types of lichens -->
<text x="250" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Три формы лишайников</text>

<!-- Crustose (Накипной) -->
<g transform="translate(20,75)">
<rect x="0" y="40" width="120" height="35" rx="5" fill="url(#rock)" stroke="#757575" stroke-width="1"/>
<ellipse cx="60" cy="48" rx="50" ry="8" fill="url(#crustose)" opacity="0.9"/>
<ellipse cx="40" cy="44" rx="25" ry="5" fill="#757575" opacity="0.5"/>
<ellipse cx="80" cy="50" rx="20" ry="4" fill="#9E9E9E" opacity="0.6"/>
<text x="60" y="90" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#424242" text-anchor="middle">Накипной</text>
<text x="60" y="100" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">(корковый)</text>
<text x="60" y="110" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">на камне/коре</text>
</g>

<!-- Foliose (Листоватый) -->
<g transform="translate(175,75)">
<rect x="0" y="50" width="120" height="25" rx="5" fill="url(#rock)" stroke="#757575" stroke-width="1"/>
<path d="M10,50 Q20,25 40,20 Q60,15 80,20 Q100,28 110,50" fill="url(#foliose)" stroke="#388E3C" stroke-width="1" opacity="0.9"/>
<path d="M25,50 Q35,30 55,28 Q75,30 85,50" fill="#81C784" stroke="#388E3C" stroke-width="0.7" opacity="0.8"/>
<path d="M40,50 Q48,38 60,35 Q72,38 75,50" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5" opacity="0.7"/>
<line x1="60" y1="20" x2="55" y2="50" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>
<text x="60" y="90" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Листоватый</text>
<text x="60" y="100" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">плоские лопасти</text>
<text x="60" y="110" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">на субстрате</text>
</g>

<!-- Fruticose (Кустистый) -->
<g transform="translate(340,75)">
<rect x="0" y="55" width="120" height="20" rx="5" fill="url(#rock)" stroke="#757575" stroke-width="1"/>
<path d="M50,55 Q48,40 40,20 Q38,10 45,5" fill="none" stroke="url(#fruticose)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M55,55 Q52,35 55,15 Q54,5 60,0" fill="none" stroke="url(#fruticose)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M60,55 Q58,38 65,22 Q68,12 72,5" fill="none" stroke="url(#fruticose)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M65,55 Q62,42 55,28 Q52,18 48,12" fill="none" stroke="url(#fruticose)" stroke-width="2" stroke-linecap="round"/>
<path d="M70,55 Q72,40 78,25 Q82,15 85,8" fill="none" stroke="url(#fruticose)" stroke-width="2" stroke-linecap="round"/>
<circle cx="45" cy="5" r="2" fill="#66BB6A"/>
<circle cx="60" cy="0" r="2" fill="#66BB6A"/>
<circle cx="72" cy="5" r="2" fill="#66BB6A"/>
<text x="60" y="90" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Кустистый</text>
<text x="60" y="100" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">ветвистый</text>
<text x="60" y="110" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">ягель — олений мох</text>
</g>

<!-- Section 2: Internal structure cross-section -->
<text x="250" y="135" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Внутреннее строение лишайника (поперечный срез)</text>

<g transform="translate(30,140)">
<!-- Main body -->
<path d="M0,45 Q10,10 60,5 Q120,2 180,5 Q230,12 250,20 Q260,30 260,45 Q250,55 200,60 Q140,65 80,63 Q30,60 5,55 Q0,50 0,45Z" fill="#E8E8E8" stroke="#757575" stroke-width="1" opacity="0.4"/>

<!-- Upper cortex (верхняя кора) -->
<path d="M0,45 Q10,10 60,5 Q120,2 180,5 Q230,12 250,20 Q255,25 255,30" fill="none" stroke="#5D4037" stroke-width="3.5" opacity="0.7"/>
<text x="270" y="20" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">верхняя кора</text>
<text x="270" y="28" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">(грибные гифы)</text>
<line x1="255" y1="22" x2="268" y2="21" stroke="#5D4037" stroke-width="0.4"/>

<!-- Gonidial/Algal layer (гонидиальный слой) -->
<path d="M5,44 Q15,14 60,10 Q120,7 180,9 Q225,14 245,22 Q250,26 250,32" fill="#C8E6C9" opacity="0.5" stroke="#4CAF50" stroke-width="0.5"/>
<circle cx="40" cy="14" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="65" cy="11" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="90" cy="10" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="115" cy="10" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="140" cy="11" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="165" cy="12" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="190" cy="14" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="215" cy="17" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="235" cy="22" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<text x="270" y="40" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">гонидиальный слой</text>
<text x="270" y="48" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">(клетки водорослей)</text>
<line x1="250" y1="30" x2="268" y2="38" stroke="#2E7D32" stroke-width="0.4"/>

<!-- Medulla (сердцевина) -->
<path d="M8,46 Q15,20 60,16 Q120,14 180,15 Q225,18 242,26 Q248,30 248,38 Q240,48 190,52 Q130,55 70,54 Q25,52 10,48Z" fill="#F5F5F5" opacity="0.4" stroke="#BDBDBD" stroke-width="0.3"/>
<text x="130" y="38" font-family="Arial,sans-serif" font-size="7" fill="#757575" text-anchor="middle">сердцевина</text>
<text x="130" y="46" font-family="Arial,sans-serif" font-size="6" fill="#9E9E9E" text-anchor="middle">(рыхлые гифы гриба)</text>

<!-- Lower cortex (нижняя кора) -->
<path d="M5,55 Q30,60 80,63 Q140,65 200,60 Q240,55 255,45" fill="none" stroke="#5D4037" stroke-width="3.5" opacity="0.7"/>
<text x="270" y="58" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">нижняя кора</text>
<line x1="255" y1="52" x2="268" y2="56" stroke="#5D4037" stroke-width="0.4"/>

<!-- Rhizines (ризины) -->
<line x1="60" y1="63" x2="55" y2="75" stroke="#5D4037" stroke-width="1"/>
<line x1="100" y1="64" x2="95" y2="78" stroke="#5D4037" stroke-width="1"/>
<line x1="140" y1="64" x2="138" y2="77" stroke="#5D4037" stroke-width="1"/>
<line x1="180" y1="63" x2="182" y2="76" stroke="#5D4037" stroke-width="1"/>
<text x="270" y="70" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">ризины</text>
<text x="270" y="78" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">(прикрепление)</text>
<line x1="183" y1="76" x2="268" y2="68" stroke="#5D4037" stroke-width="0.4"/>
</g>

<!-- Section 3: Soredia detail -->
<text x="250" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Соредии — органы вегетативного размножения</text>

<g transform="translate(30,255)">
<!-- Soredia cluster on thallus surface -->
<ellipse cx="50" cy="25" rx="45" ry="20" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1" opacity="0.6"/>
<!-- Individual soredia -->
<circle cx="35" cy="18" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="35" cy="18" r="1.5" fill="#66BB6A"/>
<circle cx="45" cy="14" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="45" cy="14" r="1.5" fill="#66BB6A"/>
<circle cx="55" cy="16" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="55" cy="16" r="1.5" fill="#66BB6A"/>
<circle cx="65" cy="20" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="65" cy="20" r="1.5" fill="#66BB6A"/>
<circle cx="40" cy="25" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="40" cy="25" r="1.5" fill="#66BB6A"/>
<circle cx="50" cy="23" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="50" cy="23" r="1.5" fill="#66BB6A"/>
<circle cx="60" cy="26" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="60" cy="26" r="1.5" fill="#66BB6A"/>
<text x="50" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Соредии на поверхности</text>
<text x="50" y="63" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">слоевища</text>
</g>

<!-- Enlarged soredium -->
<g transform="translate(160,255)">
<circle cx="40" cy="25" r="18" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
<!-- Fungal hyphae -->
<path d="M25,15 Q30,20 28,30" fill="none" stroke="#8D6E63" stroke-width="1"/>
<path d="M35,10 Q38,18 32,35" fill="none" stroke="#8D6E63" stroke-width="1"/>
<path d="M45,10 Q42,18 48,35" fill="none" stroke="#8D6E63" stroke-width="1"/>
<path d="M55,15 Q50,22 52,30" fill="none" stroke="#8D6E63" stroke-width="1"/>
<!-- Algal cells inside -->
<circle cx="33" cy="20" r="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="47" cy="20" r="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="40" cy="30" r="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
<text x="40" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Соредия (увел.)</text>
<text x="40" y="63" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">гифы + клетка водоросли</text>
</g>

<!-- Symbiosis diagram -->
<g transform="translate(310,252)">
<rect x="0" y="0" width="160" height="72" rx="6" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="0.8"/>
<text x="80" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Симбиоз лишайника</text>
<circle cx="35" cy="30" r="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<text x="35" y="33" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Гриб</text>
<circle cx="125" cy="30" r="12" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
<text x="125" y="33" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Водо-</text>
<text x="125" y="40" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">росль</text>
<line x1="47" y1="24" x2="113" y2="24" stroke="#FF5722" stroke-width="0.8" marker-end="url(#arrow)"/>
<text x="80" y="22" font-family="Arial,sans-serif" font-size="5" fill="#FF5722" text-anchor="middle">вода, минералы</text>
<line x1="113" y1="36" x2="47" y2="36" stroke="#2196F3" stroke-width="0.8"/>
<text x="80" y="44" font-family="Arial,sans-serif" font-size="5" fill="#2196F3" text-anchor="middle">органические вещества</text>
<text x="80" y="58" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">= Лишайник</text>
<text x="80" y="67" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">биоиндикатор чистого воздуха</text>
</g>
</svg>