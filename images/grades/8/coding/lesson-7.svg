<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0" />
  <rect x="0" y="70" width="800" height="3" fill="#34D399" />
  <circle cx="45" cy="35" r="25" fill="#1E293B" stroke="#34D399" stroke-width="2" />
  <text x="45" y="42" fill="#34D399" font-size="20" font-weight="bold" text-anchor="middle" font-family="monospace">7</text>
  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Строки</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">Индексация, срезы, методы (upper, lower, find, replace)</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <text x="20" y="95" fill="#34D399" font-size="14" font-weight="bold">Индексация строки:</text>
  <rect x="30" y="105" width="50" height="40" rx="4" fill="#059669" stroke="#10B981" stroke-width="1" />
  <text x="47" y="133" fill="white" font-size="18" font-weight="bold">P</text>
  <text x="45" y="100" fill="#34D399" font-size="11" font-weight="bold">0</text>
  <rect x="85" y="105" width="50" height="40" rx="4" fill="#0D9488" stroke="#10B981" stroke-width="1" />
  <text x="102" y="133" fill="white" font-size="18" font-weight="bold">Y</text>
  <text x="100" y="100" fill="#34D399" font-size="11" font-weight="bold">1</text>
  <rect x="140" y="105" width="50" height="40" rx="4" fill="#059669" stroke="#10B981" stroke-width="1" />
  <text x="157" y="133" fill="white" font-size="18" font-weight="bold">T</text>
  <text x="155" y="100" fill="#34D399" font-size="11" font-weight="bold">2</text>
  <rect x="195" y="105" width="50" height="40" rx="4" fill="#0D9488" stroke="#10B981" stroke-width="1" />
  <text x="212" y="133" fill="white" font-size="18" font-weight="bold">H</text>
  <text x="210" y="100" fill="#34D399" font-size="11" font-weight="bold">3</text>
  <rect x="250" y="105" width="50" height="40" rx="4" fill="#059669" stroke="#10B981" stroke-width="1" />
  <text x="267" y="133" fill="white" font-size="18" font-weight="bold">O</text>
  <text x="265" y="100" fill="#34D399" font-size="11" font-weight="bold">4</text>
  <rect x="305" y="105" width="50" height="40" rx="4" fill="#0D9488" stroke="#10B981" stroke-width="1" />
  <text x="322" y="133" fill="white" font-size="18" font-weight="bold">N</text>
  <text x="320" y="100" fill="#34D399" font-size="11" font-weight="bold">5</text>
  <text x="40" y="157" fill="#EC4899" font-size="11" font-weight="bold">-6</text>
  <text x="95" y="157" fill="#EC4899" font-size="11" font-weight="bold">-5</text>
  <text x="150" y="157" fill="#EC4899" font-size="11" font-weight="bold">-4</text>
  <text x="205" y="157" fill="#EC4899" font-size="11" font-weight="bold">-3</text>
  <text x="260" y="157" fill="#EC4899" font-size="11" font-weight="bold">-2</text>
  <text x="315" y="157" fill="#EC4899" font-size="11" font-weight="bold">-1</text>
  <rect x="20" y="170" width="380" height="180" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="170" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="190" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="184" r="5" fill="#EF4444" />
  <circle cx="56" cy="184" r="5" fill="#FBBF24" />
  <circle cx="76" cy="184" r="5" fill="#10B981" />
  <text x="210" y="189" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Срезы строк [start:stop:step]</text>
  <text x="34" y="214" fill="#E2E8F0" font-size="13" font-family="monospace">s = </text>
  <text x="65.2" y="214" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;PYTHON&amp;quot;</text>
  <text x="34" y="234" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="254" fill="#E2E8F0" font-size="13" font-family="monospace">s[0]    </text>
  <text x="96.4" y="254" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;P&amp;apos;  — первый символ</text>
  <text x="34" y="274" fill="#E2E8F0" font-size="13" font-family="monospace">s[-1]   </text>
  <text x="96.4" y="274" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;N&amp;apos;  — последний</text>
  <text x="34" y="294" fill="#E2E8F0" font-size="13" font-family="monospace">s[1:4]  </text>
  <text x="96.4" y="294" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;YTH&amp;apos; — с 1 по 3</text>
  <text x="34" y="314" fill="#E2E8F0" font-size="13" font-family="monospace">s[:3]   </text>
  <text x="96.4" y="314" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;PYT&amp;apos; — с начала</text>
  <text x="34" y="334" fill="#E2E8F0" font-size="13" font-family="monospace">s[2:]   </text>
  <text x="96.4" y="334" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;THON&amp;apos; — до конца</text>
  <text x="34" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">s[::2]  </text>
  <text x="96.4" y="354" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;PTO&amp;apos; — каждый 2-й</text>
  <text x="34" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">s[::-1] </text>
  <text x="96.4" y="374" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;NOHTYP&amp;apos; — реверс</text>
  <rect x="420" y="170" width="360" height="180" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="170" width="4" height="180" rx="2" fill="#10B981" />
  <text x="436" y="192" fill="#10B981" font-size="14" font-weight="bold">Методы строк</text>
  <text x="436" y="210" fill="#CBD5E1" font-size="12">• .upper()   → &amp;quot;PYTHON&amp;quot; (верхний регистр)</text>
  <text x="436" y="228" fill="#CBD5E1" font-size="12">• .lower()   → &amp;quot;python&amp;quot; (нижний регистр)</text>
  <text x="436" y="246" fill="#CBD5E1" font-size="12">• .find(&amp;quot;TH&amp;quot;) → 2 (позиция)</text>
  <text x="436" y="264" fill="#CBD5E1" font-size="12">• .replace(&amp;quot;PY&amp;quot;,&amp;quot;JS&amp;quot;) → &amp;quot;JSTHON&amp;quot;</text>
  <text x="436" y="282" fill="#CBD5E1" font-size="12">• .split(&amp;quot;,&amp;quot;) → список частей</text>
  <text x="436" y="300" fill="#CBD5E1" font-size="12">• .strip()   → убрать пробелы</text>
  <text x="436" y="318" fill="#CBD5E1" font-size="12">• .len(s)    → длина строки</text>
  <text x="436" y="336" fill="#CBD5E1" font-size="12">• .count(&amp;quot;P&amp;quot;) → количество вхождений</text>
  <rect x="20" y="365" width="380" height="150" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="365" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="385" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="379" r="5" fill="#EF4444" />
  <circle cx="56" cy="379" r="5" fill="#FBBF24" />
  <circle cx="76" cy="379" r="5" fill="#10B981" />
  <text x="210" y="384" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Методы строк в действии</text>
  <text x="34" y="409" fill="#E2E8F0" font-size="13" font-family="monospace">name = </text>
  <text x="88.6" y="409" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;  Алиса  &amp;quot;</text>
  <text x="34" y="429" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="449" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="449" fill="#E2E8F0" font-size="13" font-family="monospace">(name.strip())   </text>
  <text x="205.6" y="449" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;Алиса&amp;apos;</text>
  <text x="34" y="469" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="469" fill="#E2E8F0" font-size="13" font-family="monospace">(name.upper())   </text>
  <text x="205.6" y="469" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;  АЛИСА  &amp;apos;</text>
  <text x="34" y="489" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="489" fill="#E2E8F0" font-size="13" font-family="monospace">(name.lower())   </text>
  <text x="205.6" y="489" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;  алиса  &amp;apos;</text>
  <text x="34" y="509" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="529" fill="#E2E8F0" font-size="13" font-family="monospace">text = </text>
  <text x="88.6" y="529" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Привет, мир!&amp;quot;</text>
  <text x="34" y="549" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">(text.replace</text>
  <text x="174.39999999999998" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="182.2" y="549" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;мир&amp;quot;</text>
  <text x="221.2" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="236.79999999999998" y="549" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Python&amp;quot;</text>
  <text x="299.2" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">))</text>
  <rect x="420" y="365" width="360" height="75" rx="8" fill="#0F172A" stroke="#EF4444" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="365" width="4" height="75" rx="2" fill="#EF4444" />
  <text x="436" y="387" fill="#EF4444" font-size="14" font-weight="bold">Важно: строки неизменяемы!</text>
  <text x="436" y="405" fill="#CBD5E1" font-size="12">• s[0] = &amp;apos;J&amp;apos;  → ОШИБКА!</text>
  <text x="436" y="423" fill="#CBD5E1" font-size="12">• Нужно: s = &amp;apos;J&amp;apos; + s[1:]</text>
  <text x="436" y="441" fill="#CBD5E1" font-size="12">• Методы создают новую строку</text>
  <rect x="420" y="455" width="360" height="110" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="420" y="455" width="360" height="28" rx="8" fill="#334155" />
  <rect x="420" y="475" width="360" height="8" fill="#334155" />
  <circle cx="436" cy="469" r="5" fill="#EF4444" />
  <circle cx="456" cy="469" r="5" fill="#FBBF24" />
  <circle cx="476" cy="469" r="5" fill="#10B981" />
  <text x="600" y="474" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">f-строки (Python 3.6+)</text>
  <text x="434" y="499" fill="#64748B" font-size="13" font-family="monospace"># Форматирование строк</text>
  <text x="434" y="519" fill="#E2E8F0" font-size="13" font-family="monospace">name = </text>
  <text x="488.6" y="519" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Миша&amp;quot;</text>
  <text x="434" y="539" fill="#E2E8F0" font-size="13" font-family="monospace">age = </text>
  <text x="480.8" y="539" fill="#C084FC" font-size="13" font-family="monospace">14</text>
  <text x="434" y="559" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="434" y="579" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="473.0" y="579" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="480.8" y="579" fill="#F59E0B" font-size="13" font-family="monospace">f</text>
  <text x="488.6" y="579" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Привет, {name}!&amp;quot;</text>
  <text x="621.2" y="579" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="434" y="599" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="473.0" y="599" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="480.8" y="599" fill="#F59E0B" font-size="13" font-family="monospace">f</text>
  <text x="488.6" y="599" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Тебе {age} лет&amp;quot;</text>
  <text x="613.4" y="599" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <rect x="0" y="582" width="800" height="18" fill="#334155" rx="0" />
  <text x="400" y="595" fill="#94A3B8" font-size="10" text-anchor="middle">8 класс • Кодирование • Python</text>
</svg>
