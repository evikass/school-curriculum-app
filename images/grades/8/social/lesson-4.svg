  <text x="600" y="218" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Государственный бюджет</text>
  <rect x="425" y="232" width="160" height="50" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" />
  <text x="505" y="253" text-anchor="middle" fill="#22C55E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Доходы</text>
  <text x="505" y="270" text-anchor="middle" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Налоги, пошлины</text>
  <rect x="615" y="232" width="160" height="50" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" />
  <text x="695" y="253" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Расходы</text>
  <text x="695" y="270" text-anchor="middle" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Оборона, соц. сфера</text>
  <text x="600" y="296" text-anchor="middle" fill="#92400E" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Профицит (Д &gt; Р) | Дефицит (Д &lt; Р)</text>
  <rect x="17" y="297" width="385" height="110" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="295" width="385" height="110" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5" />
  <rect x="15" y="295" width="385" height="26" rx="8" fill="#3B82F6" />
  <rect x="15" y="313" width="385" height="8" fill="#3B82F6" />
  <text x="207" y="313" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">ВВП (Валовой внутренний продукт)</text>
  <text x="30" y="333" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ВВП — стоимость всех конечных</text>
  <text x="30" y="351" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">товаров и услуг, произведённых</text>
  <text x="30" y="369" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">в стране за год.</text>
  <text x="30" y="393" text-anchor="start" fill="#3B82F6" font-size="14" font-weight="bold" font-family="Arial, sans-serif">ВВП = C + I + G + NX</text>
  <text x="230" y="333" text-anchor="start" fill="#78716C" font-size="10" font-weight="normal" font-family="Arial, sans-serif">C — потребление</text>
  <text x="230" y="348" text-anchor="start" fill="#78716C" font-size="10" font-weight="normal" font-family="Arial, sans-serif">I — инвестиции</text>
  <text x="230" y="363" text-anchor="start" fill="#78716C" font-size="10" font-weight="normal" font-family="Arial, sans-serif">G — гос. расходы</text>
  <text x="230" y="378" text-anchor="start" fill="#78716C" font-size="10" font-weight="normal" font-family="Arial, sans-serif">NX — чистый экспорт</text>
  <rect x="417" y="312" width="370" height="110" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="310" width="370" height="110" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" />
  <rect x="415" y="310" width="370" height="26" rx="8" fill="#D97706" />
  <rect x="415" y="328" width="370" height="8" fill="#D97706" />
  <text x="600" y="328" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Рыночное регулирование</text>
  <text x="430" y="348" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Рынок: спрос, предложение, цена</text>
  <text x="430" y="370" text-anchor="start" fill="#92400E" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Невидимая рука рынка</text>
  <text x="430" y="388" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Конкуренция и свобода выбора</text>
  <text x="430" y="406" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Государство компенсирует</text>
  <text x="445" y="422" text-anchor="start" fill="#EF4444" font-size="11" font-weight="bold" font-family="Arial, sans-serif">"провалы" рынка</text>
  <rect x="17" y="417" width="770" height="60" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="415" width="770" height="60" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" />
  <rect x="15" y="415" width="770" height="26" rx="8" fill="#92400E" />
  <rect x="15" y="433" width="770" height="8" fill="#92400E" />
  <text x="400" y="433" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Смешанная экономика</text>
  <text x="30" y="445" text-anchor="start" fill="#1C1917" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Рыночный механизм + Государственное регулирование = Смешанная экономика</text>
  <text x="400" y="465" text-anchor="middle" fill="#92400E" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Современная модель экономического развития</text>
  <rect x="0" y="570" width="800" height="30" fill="#92400E" />
  <text x="400" y="590" text-anchor="middle" fill="#FEF3C7" font-size="11" font-family="Arial, sans-serif">Обществознание • 8 класс • Интернет-Школа</text>
