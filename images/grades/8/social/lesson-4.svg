  <text x="30" y="250" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Инструменты:</text>
  <text x="30" y="268" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Налоги и субсидии</text>
  <text x="30" y="284" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Государственные закупки</text>
  <text x="200" y="268" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Кредитно-денежная</text>
  <text x="215" y="284" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">политика</text>
  <text x="30" y="300" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Антимонопольное законодательство</text>
  <rect x="417" y="92" width="370" height="100" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="90" width="370" height="100" rx="8" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5" />
