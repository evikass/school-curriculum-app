  <text x="78" y="38" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Государство и экономика</text>
  <text x="78" y="58" fill="#FEF3C7" font-size="13" font-family="Arial, sans-serif">Рыночное регулирование, налоги, бюджет, ВВП</text>
