  <text x="430" y="150" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Прямые: подоходный, на прибыль,</text>
  <text x="445" y="166" text-anchor="start" fill="#3B82F6" font-size="11" font-weight="normal" font-family="Arial, sans-serif">на имущество</text>
  <text x="430" y="182" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Косвенные: НДС, акцизы, тамож.</text>
  <rect x="417" y="202" width="370" height="100" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="200" width="370" height="100" rx="8" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5" />
