<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22C55E" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="6" fill="#F59E0B" />
  <rect x="0" y="6" width="800" height="70" fill="#D97706" />
  <rect x="20" y="16" width="44" height="44" rx="10" fill="#92400E" />
  <text x="42" y="47" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="78" y="38" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Общественный прогресс</text>
  <text x="78" y="58" fill="#FEF3C7" font-size="13" font-family="Arial, sans-serif">Критерии, противоречия, регресс и прогресс</text>
  <rect x="17" y="92" width="770" height="100" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="90" width="770" height="100" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" />
  <rect x="15" y="90" width="770" height="26" rx="8" fill="#D97706" />
  <rect x="15" y="108" width="770" height="8" fill="#D97706" />
  <text x="400" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Направление развития общества</text>
  <rect x="40" y="125" width="300" height="30" fill="#22C55E" rx="5" />
  <text x="190" y="146" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold" font-family="Arial, sans-serif">ПРОГРЕСС →</text>
  <rect x="460" y="125" width="300" height="30" fill="#EF4444" rx="5" />
  <text x="610" y="146" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold" font-family="Arial, sans-serif">← РЕГРЕСС</text>
  <text x="400" y="146" text-anchor="middle" fill="#1C1917" font-size="18" font-weight="bold" font-family="Arial, sans-serif">|</text>
  <text x="400" y="182" text-anchor="middle" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Общество развивается неравномерно!</text>
  <rect x="17" y="202" width="380" height="170" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="200" width="380" height="170" rx="8" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5" />
  <rect x="15" y="200" width="380" height="26" rx="8" fill="#22C55E" />
  <rect x="15" y="218" width="380" height="8" fill="#22C55E" />
  <text x="205" y="218" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Критерии прогресса</text>
  <text x="30" y="238" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Развитие производительных сил</text>
  <text x="30" y="256" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Уровень свободы личности</text>
  <text x="30" y="274" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Качество и продолжительность жизни</text>
  <text x="30" y="292" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Развитие науки и образования</text>
  <text x="30" y="310" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Расширение прав человека</text>
  <text x="30" y="328" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Укрепление демократии</text>
  <text x="30" y="350" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Современный подход:</text>
  <text x="30" y="365" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">  качество жизни человека</text>
  <rect x="407" y="202" width="380" height="170" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="405" y="200" width="380" height="170" rx="8" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5" />
  <rect x="405" y="200" width="380" height="26" rx="8" fill="#EF4444" />
  <rect x="405" y="218" width="380" height="8" fill="#EF4444" />
  <text x="595" y="218" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Противоречия прогресса</text>
  <text x="420" y="238" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Прогресс одной сферы может</text>
  <text x="435" y="256" text-anchor="start" fill="#EF4444" font-size="12" font-weight="normal" font-family="Arial, sans-serif">вызвать регресс в другой</text>
  <text x="420" y="274" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Научные открытия могут быть</text>
  <text x="435" y="292" text-anchor="start" fill="#EF4444" font-size="12" font-weight="normal" font-family="Arial, sans-serif">использованы во вред</text>
  <text x="420" y="310" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Урбанизация: комфорт + стрессы</text>
  <text x="420" y="328" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Необратимость: нельзя вернуться</text>
  <text x="435" y="346" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">к прежнему состоянию</text>
  <text x="420" y="365" text-anchor="start" fill="#EF4444" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Цена прогресса!</text>
  <rect x="17" y="382" width="380" height="105" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="380" width="380" height="105" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" />
  <rect x="15" y="380" width="380" height="26" rx="8" fill="#D97706" />
  <rect x="15" y="398" width="380" height="8" fill="#D97706" />
  <text x="205" y="398" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Формы изменений</text>
  <text x="30" y="418" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Эволюция — медленное,</text>
  <text x="45" y="436" text-anchor="start" fill="#92400E" font-size="12" font-weight="normal" font-family="Arial, sans-serif">постепенное изменение</text>
  <text x="30" y="454" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Революция — быстрый,</text>
  <text x="45" y="472" text-anchor="start" fill="#EF4444" font-size="12" font-weight="bold" font-family="Arial, sans-serif">качественный скачок</text>
  <rect x="407" y="382" width="380" height="105" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="405" y="380" width="380" height="105" rx="8" fill="#FFFFFF" stroke="#92400E" stroke-width="1.5" />
  <rect x="405" y="380" width="380" height="26" rx="8" fill="#92400E" />
  <rect x="405" y="398" width="380" height="8" fill="#92400E" />
  <text x="595" y="398" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Ключевые понятия</text>
  <text x="420" y="418" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Прогресс — движение вперёд,</text>
  <text x="435" y="436" text-anchor="start" fill="#22C55E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">от низшего к высшему</text>
  <text x="420" y="454" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Регресс — движение назад,</text>
  <text x="435" y="472" text-anchor="start" fill="#EF4444" font-size="12" font-weight="bold" font-family="Arial, sans-serif">от высшего к низшему</text>
  <rect x="17" y="497" width="770" height="55" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="495" width="770" height="55" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" />
  <rect x="15" y="495" width="770" height="26" rx="8" fill="#92400E" />
  <rect x="15" y="513" width="770" height="8" fill="#92400E" />
  <text x="400" y="513" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Главная мысль</text>
  <text x="400" y="525" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Прогресс нелинеен: в одной сфере — прогресс, в другой — регресс</text>
  <rect x="0" y="570" width="800" height="30" fill="#92400E" />
  <text x="400" y="590" text-anchor="middle" fill="#FEF3C7" font-size="11" font-family="Arial, sans-serif">Обществознание • 8 класс • Интернет-Школа</text>
</svg>