  <text x="78" y="38" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Социальный конфликт и его решение</text>
  <text x="78" y="58" fill="#FEF3C7" font-size="13" font-family="Arial, sans-serif">Виды, причины, стадии и методы разрешения</text>
  <rect x="17" y="92" width="385" height="215" rx="8" fill="#E5E7EB" opacity="0.5" />
