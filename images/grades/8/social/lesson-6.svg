  <text x="207" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Стадии конфликта</text>
  <rect x="30" y="108" width="130" height="24" rx="5" fill="#EF4444" stroke="#EF4444" stroke-width="1.5" />
  <text x="95" y="124" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">1. Предпосылки</text>
  <text x="170" y="124" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Накопление противоречий</text>
  <rect x="30" y="143" width="130" height="24" rx="5" fill="#F59E0B" stroke="#F59E0B" stroke-width="1.5" />
  <text x="95" y="159" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">2. Инцидент</text>
  <text x="170" y="159" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Повод для начала конфликта</text>
  <rect x="30" y="178" width="130" height="24" rx="5" fill="#D97706" stroke="#D97706" stroke-width="1.5" />
  <text x="95" y="194" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">3. Эскалация</text>
  <text x="170" y="194" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Нарастание напряжённости</text>
