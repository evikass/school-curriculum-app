  <text x="95" y="229" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">4. Кульминация</text>
  <text x="170" y="229" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Высшая точка конфликта</text>
  <rect x="30" y="248" width="130" height="24" rx="5" fill="#22C55E" stroke="#22C55E" stroke-width="1.5" />
