  <text x="600" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Виды социальных конфликтов</text>
  <circle cx="430" cy="125" r="5" fill="#3B82F6" />
  <text x="442" y="128" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Политические</text>
  <text x="600" y="128" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">борьба за власть</text>
  <circle cx="430" cy="153" r="5" fill="#22C55E" />
  <text x="442" y="156" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Экономические</text>
  <text x="600" y="156" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">распределение ресурсов</text>
  <circle cx="430" cy="181" r="5" fill="#8B5CF6" />
  <text x="442" y="184" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Национальные</text>
  <text x="600" y="184" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">межнациональные споры</text>
  <circle cx="430" cy="209" r="5" fill="#6366F1" />
  <text x="442" y="212" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Религиозные</text>
  <text x="600" y="212" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">вероисповедные разногласия</text>
  <circle cx="430" cy="237" r="5" fill="#EF4444" />
  <text x="442" y="240" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Классовые</text>
  <text x="600" y="240" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">классовые противоречия</text>
  <circle cx="430" cy="265" r="5" fill="#EC4899" />
  <text x="442" y="268" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Межличностные</text>
  <text x="600" y="268" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">столкновение личностей</text>
  <rect x="17" y="317" width="385" height="130" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="315" width="385" height="130" rx="8" fill="#FFFFFF" stroke="#92400E" stroke-width="1.5" />
  <rect x="15" y="315" width="385" height="26" rx="8" fill="#92400E" />
  <rect x="15" y="333" width="385" height="8" fill="#92400E" />
  <text x="207" y="333" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Причины конфликтов</text>
  <text x="30" y="353" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Неравенство в доходах и статусе</text>
  <text x="30" y="373" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Неудовлетворённость потребностей</text>
  <text x="30" y="393" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Ценностные разногласия</text>
  <text x="30" y="413" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Борьба за ограниченные ресурсы</text>
  <text x="30" y="433" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Необъективность законов и правил</text>
  <rect x="417" y="317" width="370" height="130" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="315" width="370" height="130" rx="8" fill="#FFFFFF" stroke="#22C55E" stroke-width="1.5" />
  <rect x="415" y="315" width="370" height="26" rx="8" fill="#22C55E" />
  <rect x="415" y="333" width="370" height="8" fill="#22C55E" />
  <text x="600" y="333" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Методы разрешения</text>
  <text x="430" y="353" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Компромисс</text>
  <text x="560" y="353" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">— взаимные уступки</text>
  <text x="430" y="373" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Переговоры</text>
  <text x="560" y="373" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">— поиск общего решения</text>
  <text x="430" y="393" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Медиация</text>
  <text x="560" y="393" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">— привлечение посредника</text>
  <text x="430" y="413" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Арбитраж</text>
  <text x="560" y="413" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">— решение третьей стороны</text>
  <text x="430" y="433" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">• Сотрудничество</text>
  <text x="560" y="433" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">— совместный поиск выхода</text>
  <rect x="17" y="457" width="770" height="55" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="455" width="770" height="55" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" />
