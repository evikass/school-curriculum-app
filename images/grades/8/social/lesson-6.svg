  <text x="400" y="473" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Конструктивная роль конфликта</text>
  <text x="400" y="480" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">Конфликт не всегда вреден — он выявляет проблемы и стимулирует</text>
  <text x="400" y="498" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">развитие общества при конструктивном разрешении</text>
  <rect x="0" y="570" width="800" height="30" fill="#92400E" />
  <text x="400" y="590" text-anchor="middle" fill="#FEF3C7" font-size="11" font-family="Arial, sans-serif">Обществознание • 8 класс • Интернет-Школа</text>
