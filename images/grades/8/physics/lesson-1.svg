<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="6" fill="#F59E0B" />
  <rect x="0" y="6" width="800" height="70" fill="#F59E0B" />
  <rect x="20" y="16" width="44" height="44" rx="10" fill="#92400E" />
  <text x="42" y="47" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="78" y="38" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Внутренняя энергия и способы её изменения</text>
  <text x="78" y="58" fill="#FEF3C7" font-size="13" font-family="Arial, sans-serif">Тепловое движение, работа и теплопередача</text>
  <rect x="17" y="92" width="370" height="175" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="90" width="370" height="175" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="90" width="370" height="26" rx="8" fill="#F59E0B" />
  <rect x="15" y="108" width="370" height="8" fill="#F59E0B" />
  <text x="200" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Определение</text>
  <text x="25" y="130" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">Внутренняя энергия (U) — сумма</text>
  <text x="25" y="148" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">кинетической энергии хаотичного</text>
  <text x="25" y="166" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">движения частиц и потенциальной</text>
  <text x="25" y="184" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">энергии их взаимодействия.</text>
  <text x="25" y="210" text-anchor="start" fill="#92400E" font-size="16" font-weight="bold" font-family="Arial, sans-serif">U = Eкин + Eпот</text>
  <rect x="17" y="277" width="370" height="135" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="275" width="370" height="135" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="275" width="370" height="26" rx="8" fill="#D97706" />
  <rect x="15" y="293" width="370" height="8" fill="#D97706" />
  <text x="200" y="293" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Тепловое движение молекул</text>
  <rect x="70" y="305" width="120" height="80" fill="none" stroke="#F59E0B" stroke-width="2" rx="4" />
  <circle cx="95" cy="325" r="5" fill="#EF4444" />
  <circle cx="150" cy="340" r="5" fill="#EF4444" />
  <circle cx="115" cy="360" r="5" fill="#EF4444" />
  <circle cx="80" cy="350" r="5" fill="#EF4444" />
  <circle cx="160" cy="315" r="5" fill="#EF4444" />
  <circle cx="130" cy="380" r="5" fill="#EF4444" />
  <text x="220" y="330" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• Молекулы движутся</text>
  <text x="220" y="348" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">  хаотично</text>
  <text x="220" y="370" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• T ↑ → скорость ↑</text>
  <text x="220" y="390" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">• T ↓ → скорость ↓</text>
  <rect x="402" y="92" width="385" height="320" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="400" y="90" width="385" height="320" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="400" y="90" width="385" height="26" rx="8" fill="#F59E0B" />
  <rect x="400" y="108" width="385" height="8" fill="#F59E0B" />
  <text x="592" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Способы изменения U</text>
  <rect x="415" y="128" width="170" height="30" fill="#FEF3C7" stroke="#D97706" stroke-width="1" rx="5" />
  <text x="500" y="149" text-anchor="middle" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Совершение работы</text>
  <text x="415" y="178" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">A• над телом → U ↑</text>
  <text x="415" y="198" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">A• телом → U ↓</text>
  <rect x="425" y="210" width="140" height="40" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1" rx="3" />
  <text x="495" y="227" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">🔨 Трение рук</text>
  <text x="495" y="243" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="normal" font-family="Arial, sans-serif">U ↑ (нагревание)</text>
  <rect x="415" y="268" width="170" height="30" fill="#FEF3C7" stroke="#D97706" stroke-width="1" rx="5" />
  <text x="500" y="289" text-anchor="middle" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Теплопередача</text>
  <text x="415" y="318" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Q &gt; 0: тепло поступает → U ↑</text>
  <text x="415" y="338" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Q &lt; 0: тепло отдаётся → U ↓</text>
  <rect x="425" y="350" width="140" height="40" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1" rx="3" />
  <text x="495" y="365" text-anchor="middle" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Теплопроводность</text>
  <text x="495" y="379" text-anchor="middle" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Конвекция, Излучение</text>
  <rect x="17" y="422" width="770" height="65" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="420" width="770" height="65" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="420" width="770" height="26" rx="8" fill="#92400E" />
  <rect x="15" y="438" width="770" height="8" fill="#92400E" />
  <text x="400" y="438" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Ключевая формула</text>
  <text x="200" y="462" text-anchor="middle" fill="#92400E" font-size="28" font-weight="bold" font-family="Arial, sans-serif">ΔU = A + Q</text>
  <line x1="130" y1="468" x2="270" y2="468" stroke="#F59E0B" stroke-width="2" opacity="0.4" />
  <text x="380" y="450" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">ΔU — изменение внутренней энергии</text>
  <text x="380" y="468" text-anchor="start" fill="#78716C" font-size="13" font-weight="normal" font-family="Arial, sans-serif">A — работа, Q — количество теплоты</text>
  <rect x="17" y="497" width="770" height="70" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="495" width="770" height="70" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="495" width="770" height="26" rx="8" fill="#D97706" />
  <rect x="15" y="513" width="770" height="8" fill="#D97706" />
  <text x="400" y="513" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Первый закон термодинамики</text>
  <text x="400" y="530" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">Количество теплоты, переданное системе, идёт на изменение её внутренней энергии</text>
  <text x="400" y="550" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">и на совершение работы над внешними телами</text>
  <rect x="0" y="570" width="800" height="30" fill="#92400E" />
  <text x="400" y="590" text-anchor="middle" fill="#FEF3C7" font-size="11" font-family="Arial, sans-serif">Физика • 8 класс • Интернет-Школа</text>
</svg>