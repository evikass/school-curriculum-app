  <text x="600" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Факторы испарения</text>
  <text x="430" y="128" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">• Температура: T ↑ → испарение ↑</text>
  <text x="430" y="150" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">• Площадь поверхности: S ↑</text>
  <text x="445" y="168" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">→ испарение ↑</text>
  <text x="430" y="190" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">• Ветер: уносит пар → исп. ↑</text>
  <text x="430" y="212" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">• Род вещества:</text>
  <text x="445" y="230" text-anchor="start" fill="#92400E" font-size="12" font-weight="normal" font-family="Arial, sans-serif">эфир исп. быстрее воды</text>
  <text x="430" y="260" text-anchor="start" fill="#3B82F6" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Конденсация — обратный</text>
  <text x="430" y="278" text-anchor="start" fill="#3B82F6" font-size="13" font-weight="normal" font-family="Arial, sans-serif">процесс (пар → жидкость)</text>
