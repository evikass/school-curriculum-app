  <text x="30" y="490" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">Испарение: при любой t, с поверхности, медленно</text>
  <text x="30" y="510" text-anchor="start" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Кипение: при tкип, по всему объёму, бурно, t = const</text>
  <text x="600" y="490" text-anchor="start" fill="#EF4444" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Оба: Q = L·m</text>
