  <text x="430" y="383" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">парообразования [Дж/кг]</text>
  <text x="430" y="410" text-anchor="start" fill="#EF4444" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Вода: L = 2.3 × 10⁶ Дж/кг</text>
  <text x="430" y="430" text-anchor="start" fill="#EF4444" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Испарение: Q &gt; 0 (поглощ.)</text>
  <text x="430" y="445" text-anchor="start" fill="#3B82F6" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Конденсация: Q &lt; 0 (выдел.)</text>
  <rect x="17" y="462" width="770" height="70" rx="8" fill="#E5E7EB" opacity="0.5" />
