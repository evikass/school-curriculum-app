  <text x="30" y="380" text-anchor="start" fill="#EF4444" font-size="13" font-weight="bold" font-family="Arial, sans-serif">tкип = const при давлении = const</text>
  <text x="30" y="400" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Вода: tкип = 100°C (атм. давл.)</text>
  <rect x="417" y="297" width="370" height="155" rx="8" fill="#E5E7EB" opacity="0.5" />
