  <text x="600" y="313" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Теплота парообразования</text>
  <text x="600" y="340" text-anchor="middle" fill="#92400E" font-size="26" font-weight="bold" font-family="Arial, sans-serif">Q = L · m</text>
  <line x1="542" y1="346" x2="658" y2="346" stroke="#F59E0B" stroke-width="2" opacity="0.4" />
