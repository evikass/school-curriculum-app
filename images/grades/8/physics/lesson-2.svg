<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="6" fill="#F59E0B" />
  <rect x="0" y="6" width="800" height="70" fill="#F59E0B" />
  <rect x="20" y="16" width="44" height="44" rx="10" fill="#92400E" />
  <text x="42" y="47" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="78" y="38" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Количество теплоты и удельная теплоёмкость</text>
  <text x="78" y="58" fill="#FEF3C7" font-size="13" font-family="Arial, sans-serif">Q = cmΔt, калориметрия</text>
  <rect x="17" y="92" width="385" height="120" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="90" width="385" height="120" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="90" width="385" height="26" rx="8" fill="#F59E0B" />
  <rect x="15" y="108" width="385" height="8" fill="#F59E0B" />
  <text x="207" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Главная формула</text>
  <text x="200" y="145" text-anchor="middle" fill="#92400E" font-size="30" font-weight="bold" font-family="Arial, sans-serif">Q = c · m · Δt</text>
  <line x1="95" y1="151" x2="305" y2="151" stroke="#F59E0B" stroke-width="2" opacity="0.4" />
  <text x="30" y="170" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">Q — количество теплоты (Дж)</text>
  <text x="30" y="188" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">c — удельная теплоёмкость (Дж/кг·°C)</text>
  <text x="30" y="206" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">m — масса (кг), Δt — разность темп.</text>
  <rect x="417" y="92" width="370" height="200" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="90" width="370" height="200" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="415" y="90" width="370" height="26" rx="8" fill="#D97706" />
  <rect x="415" y="108" width="370" height="8" fill="#D97706" />
  <text x="600" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Удельная теплоёмкость</text>
  <rect x="425" y="122" width="350" height="22" fill="#F59E0B" rx="3" />
  <text x="440" y="138" text-anchor="start" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Вещество</text>
  <text x="570" y="138" text-anchor="start" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">c (Дж/кг·°C)</text>
  <rect x="425" y="138" width="350" height="20" fill="#FEF3C7" rx="2" />
  <text x="440" y="152" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Вода</text>
  <text x="570" y="152" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">4200</text>
  <text x="440" y="172" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Лёд</text>
  <text x="570" y="172" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">2100</text>
  <rect x="425" y="178" width="350" height="20" fill="#FEF3C7" rx="2" />
  <text x="440" y="192" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Железо</text>
  <text x="570" y="192" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">460</text>
  <text x="440" y="212" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Алюминий</text>
  <text x="570" y="212" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">920</text>
  <rect x="425" y="218" width="350" height="20" fill="#FEF3C7" rx="2" />
  <text x="440" y="232" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Свинец</text>
  <text x="570" y="232" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">140</text>
  <text x="440" y="252" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Медь</text>
  <text x="570" y="252" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">400</text>
  <rect x="17" y="222" width="385" height="155" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="220" width="385" height="155" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="220" width="385" height="26" rx="8" fill="#F59E0B" />
  <rect x="15" y="238" width="385" height="8" fill="#F59E0B" />
  <text x="207" y="238" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Уравнение теплового баланса</text>
  <text x="200" y="265" text-anchor="middle" fill="#92400E" font-size="24" font-weight="bold" font-family="Arial, sans-serif">Q₁ + Q₂ = 0</text>
  <line x1="134" y1="271" x2="266" y2="271" stroke="#F59E0B" stroke-width="2" opacity="0.4" />
  <text x="30" y="290" text-anchor="start" fill="#1C1917" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Qотд + Qпол = 0</text>
  <text x="30" y="312" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Тепло, отданное горячим телом,</text>
  <text x="30" y="328" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">равно теплу, полученному холодным.</text>
  <text x="30" y="350" text-anchor="start" fill="#3B82F6" font-size="13" font-weight="bold" font-family="Arial, sans-serif">c₁m₁(t₁-t) = c₂m₂(t-t₂)</text>
  <rect x="417" y="302" width="370" height="195" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="300" width="370" height="195" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="415" y="300" width="370" height="26" rx="8" fill="#D97706" />
  <rect x="415" y="318" width="370" height="8" fill="#D97706" />
  <text x="600" y="318" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Калориметр</text>
  <rect x="480" y="335" width="120" height="100" fill="none" stroke="#78716C" stroke-width="2" rx="5" />
  <rect x="490" y="345" width="100" height="80" fill="none" stroke="#F59E0B" stroke-width="2" rx="4" />
  <rect x="492" y="370" width="96" height="53" fill="#93C5FD" rx="2" />
  <text x="540" y="400" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Arial, sans-serif">H₂O</text>
  <circle cx="520" cy="380" r="8" fill="#EF4444" />
  <text x="520" y="365" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="normal" font-family="Arial, sans-serif">t₁</text>
  <text x="540" y="450" text-anchor="middle" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Теплообмен</text>
  <text x="620" y="350" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Теплоизоляция</text>
  <line x1="615" y1="355" x2="610" y2="385" stroke="#78716C" stroke-width="1" stroke-dasharray="3,3" />
  <rect x="17" y="387" width="385" height="70" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="385" width="385" height="70" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="385" width="385" height="26" rx="8" fill="#D97706" />
  <rect x="15" y="403" width="385" height="8" fill="#D97706" />
  <text x="207" y="403" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Расчёт Δt</text>
  <text x="30" y="420" text-anchor="start" fill="#92400E" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Δt = tкон – tнач</text>
  <text x="280" y="418" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">при нагревании</text>
  <text x="280" y="436" text-anchor="start" fill="#EF4444" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Δt &gt; 0, Q &gt; 0</text>
  <rect x="17" y="467" width="770" height="65" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="465" width="770" height="65" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
  <rect x="15" y="465" width="770" height="26" rx="8" fill="#22C55E" />
  <rect x="15" y="483" width="770" height="8" fill="#22C55E" />
  <text x="400" y="483" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Пример</text>
  <text x="30" y="492" text-anchor="start" fill="#1C1917" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Сколько тепла для нагревания 2 кг воды на 50°C?</text>
  <text x="30" y="514" text-anchor="start" fill="#92400E" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Q = 4200 × 2 × 50 = 420 000 Дж = 420 кДж</text>
  <rect x="0" y="570" width="800" height="30" fill="#92400E" />
  <text x="400" y="590" text-anchor="middle" fill="#FEF3C7" font-size="11" font-family="Arial, sans-serif">Физика • 8 класс • Интернет-Школа</text>
</svg>