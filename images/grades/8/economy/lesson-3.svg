  <rect x="0" y="0" width="800" height="70" fill="url(#titleGrad)" />
  <rect x="0" y="67" width="800" height="3" fill="url(#goldGrad)" />
  <circle cx="40" cy="35" r="22" fill="#D97706" />
  <text x="40" y="42" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="75" y="32" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Рыночный механизм</text>
  <text x="75" y="54" fill="#BBF7D0" font-size="13" font-family="Arial, sans-serif">Экономика • 8 класс</text>
  <rect x="30" y="85" width="400" height="280" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5" rx="10" filter="url(#shadow)" />
  <text x="230" y="110" text-anchor="middle" fill="#15803D" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Спрос и предложение</text>
  <line x1="100" y1="340" x2="400" y2="340" stroke="#1E293B" stroke-width="2" />
  <line x1="100" y1="340" x2="100" y2="125" stroke="#1E293B" stroke-width="2" />
  <text x="250" y="360" text-anchor="middle" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Количество (Q)</text>
  <text x="70" y="230" text-anchor="middle" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Цена (P)</text>
  <path d="M120,145 Q200,200 370,310" fill="none" stroke="#DC2626" stroke-width="2.5" />
  <text x="375" y="320" text-anchor="middle" fill="#DC2626" font-size="16" font-weight="bold" font-family="Arial, sans-serif">D</text>
  <path d="M120,310 Q200,250 370,145" fill="none" stroke="#16A34A" stroke-width="2.5" />
  <text x="375" y="140" text-anchor="middle" fill="#16A34A" font-size="16" font-weight="bold" font-family="Arial, sans-serif">S</text>
  <circle cx="240" cy="230" r="6" fill="#D97706" />
  <text x="255" y="222" text-anchor="start" fill="#D97706" font-size="11" font-weight="bold" font-family="Arial, sans-serif">E — равновесие</text>
  <line x1="240" y1="230" x2="100" y2="230" stroke="#D97706" stroke-width="1" stroke-dasharray="5,5" />
  <line x1="240" y1="230" x2="240" y2="340" stroke="#D97706" stroke-width="1" stroke-dasharray="5,5" />
  <text x="55" y="234" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold" font-family="Arial, sans-serif">P*</text>
  <text x="240" y="355" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Q*</text>
  <rect x="450" y="85" width="320" height="130" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5" rx="10" filter="url(#shadow)" />
  <text x="610" y="110" text-anchor="middle" fill="#DC2626" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Закон спроса</text>
  <text x="610" y="135" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">При росте цены спрос падает</text>
  <text x="610" y="155" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">При снижении цены спрос растёт</text>
  <text x="610" y="180" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="bold" font-family="Arial, sans-serif">P ↑ → Q ↓   |   P ↓ → Q ↑</text>
  <rect x="450" y="230" width="320" height="130" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5" rx="10" filter="url(#shadow)" />
  <text x="610" y="255" text-anchor="middle" fill="#16A34A" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Закон предложения</text>
  <text x="610" y="280" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">При росте цены предложение растёт</text>
  <text x="610" y="300" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">При снижении цены предложение падает</text>
  <text x="610" y="325" text-anchor="middle" fill="#16A34A" font-size="12" font-weight="bold" font-family="Arial, sans-serif">P ↑ → Q ↑   |   P ↓ → Q ↓</text>
  <rect x="30" y="380" width="740" height="55" fill="url(#accentGrad)" stroke="#D97706" stroke-width="2" rx="8" />
  <text x="400" y="398" text-anchor="middle" fill="#D97706" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Рыночное равновесие</text>
  <text x="400" y="417" text-anchor="middle" fill="#1E293B" font-size="18" font-weight="bold" font-family="Arial, sans-serif">P* = цена равновесия   Q* = объём равновесия</text>
  <rect x="30" y="450" width="355" height="80" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5" rx="10" filter="url(#shadow)" />
  <text x="207" y="475" text-anchor="middle" fill="#DC2626" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Дефицит (P &amp;lt; P*)</text>
  <text x="207" y="498" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Спрос &amp;gt; Предложение</text>
  <text x="207" y="515" text-anchor="middle" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Очереди, нехватка товаров</text>
  <rect x="410" y="450" width="355" height="80" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" rx="10" filter="url(#shadow)" />
  <text x="587" y="475" text-anchor="middle" fill="#16A34A" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Избыток (P &amp;gt; P*)</text>
  <text x="587" y="498" text-anchor="middle" fill="#1E293B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Предложение &amp;gt; Спрос</text>
  <text x="587" y="515" text-anchor="middle" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Непроданные товары, снижение цен</text>
  <text x="400" y="560" text-anchor="middle" fill="#64748B" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Рыночный механизм обеспечивает саморегуляцию через цены</text>
</svg>