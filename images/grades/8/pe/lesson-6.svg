<text x="590" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Техника волейбола</text>
<text x="412" y="124" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Нижняя передача (приём мяча снизу)</text>
<text x="412" y="142" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Верхняя передача (двумя руками сверху)</text>
<text x="412" y="160" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Нападающий удар (прямым ходом)</text>
<text x="412" y="178" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Подача — нижняя, верхняя, планер</text>
<text x="412" y="196" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Блок — одиночный, групповой</text><rect x="400" y="230" width="380" height="110" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="400" y="230" width="380" height="28" fill="#EF4444" rx="8"/>
<rect x="400" y="250" width="380" height="8" fill="#EF4444"/>
<text x="590" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Тактика и расстановка</text>
<text x="412" y="274" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Расстановка 5-1 (1 связующий)</text>
<text x="412" y="292" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Расстановка 4-2 (2 связующих)</text>
<text x="412" y="310" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Переход (ротация) по часовой стрелке</text>
<text x="412" y="328" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Либеро — игрок задней линии</text>
  <rect x="20" y="350" width="760" height="36" fill="#16A34A" rx="8"/>
  <text x="400" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Основные правила</text><rect x="20" y="400" width="245" height="150" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="400" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="420" width="245" height="8" fill="#22C55E"/>
<text x="142" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Размеры и счёт</text>
<text x="32" y="444" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Площадка: 18 х 9 м</text>
<text x="32" y="462" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Партия до 25 очков (преимущ. +2)</text>
<text x="32" y="480" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 5 партий (до 3 побед)</text>
<text x="32" y="498" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 5-я партия до 15 очков</text>
<text x="32" y="516" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 3 касания на атаку (блок не сч.)</text>
<text x="32" y="534" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Состав: 6 на площадке</text>
<text x="32" y="552" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 7 запасных игроков</text><rect x="282" y="400" width="245" height="150" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="282" y="400" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="282" y="420" width="245" height="8" fill="#EF4444"/>
<text x="404" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Нарушения</text>
<text x="294" y="444" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Касание сетки игроком</text>
<text x="294" y="462" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Заступ на чужую половину</text>
<text x="294" y="480" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Двойное касание</text>
<text x="294" y="498" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Задержка мяча (бросок)</text>
<text x="294" y="516" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 4 касания команды</text>
<text x="294" y="534" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ошибка расстановки</text>
<text x="294" y="552" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Нарушение при подаче</text><rect x="543" y="400" width="245" height="150" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="543" y="400" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="543" y="420" width="245" height="8" fill="#22C55E"/>
<text x="665" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Турниры</text>
<text x="555" y="444" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Волейбольная Лига Наций</text>
<text x="555" y="462" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Чемпионат мира FIVB</text>
<text x="555" y="480" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Олимпийские игры</text>
<text x="555" y="498" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Суперлига — Россия</text>
<text x="555" y="516" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Лига чемпионов CEV</text>
<text x="555" y="534" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Кубок ЕКВ</text>
<text x="555" y="552" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Мировой Гран-при</text>
