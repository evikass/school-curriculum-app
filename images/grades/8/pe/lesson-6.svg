  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Схема волейбольной площадки</text><circle cx="110" cy="280" r="11" fill="#16A34A" opacity="0.85"/><text x="110" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">1</text><circle cx="170" cy="280" r="11" fill="#16A34A" opacity="0.85"/><text x="170" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">2</text><circle cx="230" cy="280" r="11" fill="#16A34A" opacity="0.85"/><text x="230" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">3</text><circle cx="290" cy="280" r="11" fill="#16A34A" opacity="0.85"/><text x="290" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">4</text><circle cx="350" cy="280" r="11" fill="#16A34A" opacity="0.85"/><text x="350" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">5</text><circle cx="130" cy="240" r="11" fill="#16A34A" opacity="0.85"/><text x="130" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">6</text><circle cx="110" cy="110" r="11" fill="#DC2626" opacity="0.85"/><text x="110" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">1</text><circle cx="170" cy="110" r="11" fill="#DC2626" opacity="0.85"/><text x="170" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">2</text><circle cx="230" cy="110" r="11" fill="#DC2626" opacity="0.85"/><text x="230" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">3</text><circle cx="290" cy="110" r="11" fill="#DC2626" opacity="0.85"/><text x="290" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">4</text><circle cx="350" cy="110" r="11" fill="#DC2626" opacity="0.85"/><text x="350" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">5</text><circle cx="130" cy="150" r="11" fill="#DC2626" opacity="0.85"/><text x="130" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">6</text><rect x="400" y="80" width="380" height="140" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
