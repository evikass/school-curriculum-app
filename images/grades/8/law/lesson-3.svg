<rect x="20" y="225" width="5" height="48" rx="0" fill="#3b82f6" opacity="1.0"/>
<text x="40" y="242" font-size="12" fill="#3b82f6" text-anchor="start" font-weight="bold" font-family="sans-serif">Приём в гражданство</text>
<text x="40" y="257" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">Натурализация — общая</text>
<text x="40" y="269" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">и упрощённая процедура</text>
<rect x="20" y="280" width="380" height="48" rx="8" fill="#ffffff" opacity="1.0" stroke="#475569" stroke-width="1"/>
<rect x="20" y="280" width="5" height="48" rx="0" fill="#475569" opacity="1.0"/>
<text x="40" y="297" font-size="12" fill="#475569" text-anchor="start" font-weight="bold" font-family="sans-serif">Восстановление</text>
<text x="40" y="312" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">Для бывших граждан РФ,</text>
<text x="40" y="324" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">возвратившихся в РФ</text>
<rect x="20" y="335" width="380" height="48" rx="8" fill="#ffffff" opacity="1.0" stroke="#64748b" stroke-width="1"/>
<rect x="20" y="335" width="5" height="48" rx="0" fill="#64748b" opacity="1.0"/>
<text x="40" y="352" font-size="12" fill="#64748b" text-anchor="start" font-weight="bold" font-family="sans-serif">Иные основания</text>
<text x="40" y="367" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">По международному</text>
<text x="40" y="379" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">договору, оптация</text>
<text x="610" y="152" font-size="14" fill="#475569" text-anchor="middle" font-weight="bold" font-family="sans-serif">Условия приёма в гражданство</text>
<rect x="420" y="168" width="360" height="32" rx="6" fill="#ffffff" opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<circle cx="438" cy="181" r="7" fill="#3b82f6" opacity="1.0"/>
<text x="438" y="185" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">1</text>
<text x="455" y="188" font-size="11" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Непрерывное проживание 5 лет</text>
<rect x="420" y="206" width="360" height="32" rx="6" fill="#ffffff" opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<circle cx="438" cy="219" r="7" fill="#3b82f6" opacity="1.0"/>
<text x="438" y="223" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">2</text>
<text x="455" y="226" font-size="11" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Законный источник средств</text>
<rect x="420" y="244" width="360" height="32" rx="6" fill="#ffffff" opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<circle cx="438" cy="257" r="7" fill="#3b82f6" opacity="1.0"/>
<text x="438" y="261" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">3</text>
<text x="455" y="264" font-size="11" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Владение русским языком</text>
<rect x="420" y="282" width="360" height="32" rx="6" fill="#ffffff" opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<circle cx="438" cy="295" r="7" fill="#3b82f6" opacity="1.0"/>
<text x="438" y="299" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">4</text>
<text x="455" y="302" font-size="11" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Отказ от иного гражданства</text>
<rect x="420" y="320" width="360" height="32" rx="6" fill="#ffffff" opacity="1.0" stroke="#cbd5e1" stroke-width="1"/>
<circle cx="438" cy="333" r="7" fill="#3b82f6" opacity="1.0"/>
<text x="438" y="337" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">5</text>
<text x="455" y="340" font-size="11" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Соблюдение Конституции РФ</text>
<text x="210" y="398" font-size="13" fill="#10b981" text-anchor="middle" font-weight="bold" font-family="sans-serif">Права гражданина РФ</text>
<text x="600" y="398" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold" font-family="sans-serif">Обязанности гражданина РФ</text>
<circle cx="38" cy="417" r="3" fill="#10b981" opacity="1.0"/>
<text x="48" y="421" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Избирать и быть избранным</text>
<circle cx="38" cy="437" r="3" fill="#10b981" opacity="1.0"/>
<text x="48" y="441" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Доступ к гос. службе</text>
<circle cx="38" cy="457" r="3" fill="#10b981" opacity="1.0"/>
<text x="48" y="461" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Свободно передвигаться</text>
<circle cx="38" cy="477" r="3" fill="#10b981" opacity="1.0"/>
<text x="48" y="481" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Создавать общественные объединения</text>
<circle cx="438" cy="417" r="3" fill="#ef4444" opacity="1.0"/>
<text x="448" y="421" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Соблюдать законы РФ</text>
<circle cx="438" cy="437" r="3" fill="#ef4444" opacity="1.0"/>
<text x="448" y="441" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Платить налоги и сборы</text>
<circle cx="438" cy="457" r="3" fill="#ef4444" opacity="1.0"/>
<text x="448" y="461" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Защищать Отечество</text>
<circle cx="438" cy="477" r="3" fill="#ef4444" opacity="1.0"/>
<text x="448" y="481" font-size="10" fill="#1e293b" text-anchor="start" font-weight="normal" font-family="sans-serif">Заботиться о памятниках истории</text>
<line x1="400" y1="390" x2="400" y2="530" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
<rect x="20" y="505" width="760" height="45" rx="8" fill="#f1f5f9" opacity="1.0" stroke="#8b5cf6" stroke-width="1"/>
<text x="400" y="525" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="bold" font-family="sans-serif">Принцип единого гражданства: гражданин РФ не может быть лишён гражданства</text>
<text x="400" y="540" font-size="10" fill="#64748b" text-anchor="middle" font-weight="normal" font-family="sans-serif">или права изменить его (ст. 6 Конституции РФ)</text>
</svg>