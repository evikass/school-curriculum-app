<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs><linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#334155"/>
  <stop offset="100%" stop-color="#475569"/>
</linearGradient></defs>
<rect x="0" y="0" width="800" height="70" rx="0" fill="url(#headerGrad)" opacity="1.0"/>
<text x="400" y="35" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">Гражданство РФ</text>
<text x="400" y="55" font-size="12" fill="#93c5fd" text-anchor="middle" font-weight="normal" font-family="sans-serif">Приобретение, права и обязанности гражданина</text>
<rect x="15" y="15" width="90" height="28" rx="14" fill="#3b82f6" opacity="1.0"/>
<text x="60" y="34" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">8 класс</text>
<rect x="700" y="15" width="85" height="28" rx="14" fill="#8b5cf6" opacity="1.0"/>
<text x="743" y="34" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold" font-family="sans-serif">Право</text>
<rect x="0" y="565" width="800" height="35" rx="0" fill="#334155" opacity="1.0"/>
<text x="400" y="586" font-size="11" fill="#64748b" text-anchor="middle" font-weight="normal" font-family="sans-serif">Право · 8 класс · Образовательный курс</text>
<rect x="0" y="70" width="800" height="495" rx="0" fill="#f8fafc" opacity="1.0"/>
<rect x="20" y="80" width="760" height="50" rx="10" fill="#ffffff" opacity="1.0" stroke="#3b82f6" stroke-width="1.5"/>
<rect x="20" y="80" width="6" height="50" rx="0" fill="#3b82f6" opacity="1.0"/>
<text x="400" y="100" font-size="14" fill="#3b82f6" text-anchor="middle" font-weight="bold" font-family="sans-serif">Гражданство — устойчивая правовая связь лица с государством</text>
<text x="400" y="118" font-size="11" fill="#64748b" text-anchor="middle" font-weight="normal" font-family="sans-serif">Выражается в совокупности взаимных прав, обязанностей и ответственности</text>
<text x="210" y="152" font-size="14" fill="#475569" text-anchor="middle" font-weight="bold" font-family="sans-serif">Основания приобретения гражданства</text>
<rect x="20" y="170" width="380" height="48" rx="8" fill="#ffffff" opacity="1.0" stroke="#8b5cf6" stroke-width="1"/>
<rect x="20" y="170" width="5" height="48" rx="0" fill="#8b5cf6" opacity="1.0"/>
<text x="40" y="187" font-size="12" fill="#8b5cf6" text-anchor="start" font-weight="bold" font-family="sans-serif">По рождению</text>
<text x="40" y="202" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">Филиация —自动</text>
<text x="40" y="214" font-size="9" fill="#64748b" text-anchor="start" font-weight="normal" font-family="sans-serif">приобретение при рождении</text>
