  <text x="400" y="397" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Формула Герона</text>
  <text x="32" y="420" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">S = √(p · (p−a) · (p−b) · (p−c))</text>
  <text x="32" y="438" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">где p = (a + b + c) / 2 — полупериметр</text>
  <text x="32" y="456" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Пример: a=3, b=4, c=5;  p = 6;  S = √(6·3·2·1) = √36 = 6</text>
