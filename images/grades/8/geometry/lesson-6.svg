  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">S = ½ · a · h   (основная)</text>
  <text x="422" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="166" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">S = ½ · a · b · sin(γ)</text>
  <text x="422" y="184" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="202" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">S = √(p(p−a)(p−b)(p−c))  (Герон)</text>
