  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Площадь параллелограмма равна</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">произведению основания на высоту.</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">S = a · h</text>
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">S = a · b · sin(α)</text>
