  <text x="400" y="502" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Прямоугольный треугольник</text>
  <text x="32" y="525" font-family="Arial,sans-serif" font-size="12" fill="#37474F">S = ½ · a · b  (a, b — катеты)     |     S = ½ · c · h_c  (c — гипотенуза, h_c — высота к гипотенузе)     |     Равносторонний: S = a²√3 / 4</text>
