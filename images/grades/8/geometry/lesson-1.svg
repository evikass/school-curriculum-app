  <text x="50" y="49" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="410" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Многоугольники</text>
  <text x="760" y="35" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">8 класс</text>
  <text x="760" y="50" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">Геометрия</text>
  <line x1="20" y1="80" x2="780" y2="80" stroke="#06B6D4" stroke-width="2" opacity="0.25" />
  <rect x="23" y="93" width="370" height="130" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="90" width="370" height="130" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определение</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Многоугольник — фигура, состоящая</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">из n точек (вершин) и n отрезков</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">(сторон), последовательно их</text>
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">соединяющих.</text>
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Выпуклый многоугольник лежит по</text>
  <text x="32" y="232" font-family="Arial,sans-serif" font-size="12" fill="#37474F">одну сторону от каждой прямой,</text>
  <text x="32" y="249" font-family="Arial,sans-serif" font-size="12" fill="#37474F">проходящей через его сторону.</text>
  <rect x="413" y="93" width="370" height="130" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="130" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="410" y="90" width="370" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="410" y="106" width="370" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Формулы</text>
  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Сумма углов: S = (n − 2) · 180°</text>
  <text x="422" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="166" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Число диагоналей из одной вершины:</text>
  <text x="422" y="184" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">  d = n − 3</text>
  <text x="422" y="202" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="220" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Все диагонали: D = n(n − 3) / 2</text>
  <text x="422" y="238" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="256" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Внешний угол: β = 180° − α</text>
  <rect x="23" y="238" width="370" height="130" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="235" width="370" height="130" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="235" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="251" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="252" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Свойства</text>
  <text x="32" y="275" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Сумма внешних углов = 360°</text>
  <text x="32" y="292" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Правильный: все стороны и углы равны</text>
  <text x="32" y="309" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Внутренний угол прав. мн-ка:</text>
  <text x="32" y="326" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  α = (n − 2) · 180° / n</text>
  <text x="32" y="343" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Внешний угол прав. мн-ка:</text>
  <text x="32" y="360" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  β = 360° / n</text>
  <text x="32" y="377" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Число треугольников при разбиении:</text>
  <text x="32" y="394" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  T = n − 2</text>
  <g clip-path="url(#ill1)">
    <rect x="410" y="235" width="370" height="130" fill="#F0FDFA" opacity="0.6" />
    <rect x="410" y="235" width="370" height="130" fill="none" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.4" />
