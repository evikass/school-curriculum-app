    <text x="632" y="350" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
    <text x="556" y="350" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0E7490" text-anchor="middle">D</text>
    <text x="533" y="278" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0E7490" text-anchor="middle">E</text>
    <text x="595" y="360" font-family="Arial,sans-serif" font-size="11" fill="#06B6D4" text-anchor="middle" opacity="0.8">Пятиугольник и его диагонали</text>
  </g>
  <rect x="23" y="383" width="760" height="60" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="380" width="760" height="60" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="380" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="396" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="397" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Таблица: сумма углов многоугольников</text>
  <text x="32" y="420" font-family="Arial,sans-serif" font-size="12" fill="#37474F">n=3: S=180°    n=4: S=360°    n=5: S=540°    n=6: S=720°    n=8: S=1080°    n=10: S=1440°    n=12: S=1800°</text>
  <rect x="23" y="458" width="760" height="80" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="455" width="760" height="80" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="20" y="455" width="760" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="20" y="471" width="760" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="400" y="472" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Пример</text>
  <text x="32" y="495" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Сколько диагоналей у выпуклого шестиугольника?</text>
  <text x="32" y="513" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">D = n(n − 3) / 2 = 6(6 − 3) / 2 = 6 · 3 / 2 = 9 диагоналей</text>
  <text x="32" y="531" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Сумма углов: S = (6 − 2) · 180° = 4 · 180° = 720°</text>
  <rect x="15" y="560" width="770" height="28" fill="url(#panelGrad)" opacity="0.08" rx="6" />
  <text x="400" y="578" font-family="Arial,sans-serif" font-size="11" fill="#06B6D4" text-anchor="middle" opacity="0.6">Геометрия · 8 класс</text>
  <circle cx="35" cy="574" r="8" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.3" />
  <circle cx="765" cy="574" r="8" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.3" />
</svg>