  <text x="32" y="515" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Прямоугольник: S = a · b        Ромб: S = d₁ · d₂ / 2 = a² · sin(α)        Квадрат: S = a² = d² / 2</text>
