  <text x="660" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Квадрат</text>
  <text x="552" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Все стороны = a</text>
  <text x="552" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Все углы = 90°</text>
  <text x="552" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• d = a√2</text>
  <text x="552" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• S = a²</text>
  <text x="552" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Диагонали ⊥ и равны</text>
