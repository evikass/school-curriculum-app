  <text x="402" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Ромб</text>
  <text x="292" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Все стороны равны: a = b</text>
  <text x="292" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Диагонали ⊥ друг другу</text>
  <text x="292" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Диагонали — биссектрисы</text>
  <text x="292" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• S = d₁ · d₂ / 2</text>
  <text x="292" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• S = a² · sin(α)</text>
