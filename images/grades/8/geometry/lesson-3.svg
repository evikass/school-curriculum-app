  <text x="142" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Прямоугольник</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Все углы = 90°</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Противоп. стороны равны</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Диагонали равны: d₁ = d₂</text>
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Диагонали делятся пополам</text>
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• S = a · b</text>
  <rect x="283" y="93" width="245" height="100" fill="#000000" rx="8" opacity="0.05" />
