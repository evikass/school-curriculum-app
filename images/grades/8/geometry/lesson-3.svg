  <text x="400" y="392" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Сравнительная таблица свойств</text>
  <text x="32" y="415" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Свойство              | Прямоугольник | Ромб        | Квадрат</text>
  <text x="32" y="432" font-family="Arial,sans-serif" font-size="12" fill="#37474F">⊥ диагонали           | —             | +           | +</text>
  <text x="32" y="449" font-family="Arial,sans-serif" font-size="12" fill="#37474F">= диагонали           | +             | —           | +</text>
  <text x="32" y="466" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Диаг. — биссектрисы   | —             | +           | +</text>
  <text x="32" y="483" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Все стороны равны     | —             | +           | +</text>
