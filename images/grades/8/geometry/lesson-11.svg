  <text x="640" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Следствия и свойства</text>
  <text x="512" y="255" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Вписанные углы, опирающиеся</text>
  <text x="512" y="272" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  на одну дугу, равны</text>
  <text x="512" y="289" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="512" y="306" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Вписанный угол, опирающийся</text>
  <text x="512" y="323" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  на диаметр = 90°</text>
  <text x="512" y="340" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="512" y="357" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Угол между хордами:</text>
  <text x="512" y="374" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  ∠ = ½(〈AB + 〈CD)</text>
  <text x="512" y="391" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="512" y="408" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Угол между секущими:</text>
  <text x="512" y="425" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  ∠ = ½(〈AB − 〈CD)</text>
  <rect x="23" y="408" width="760" height="85" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="405" width="760" height="85" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="20" y="405" width="760" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="20" y="421" width="760" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="400" y="422" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Ключевые формулы</text>
  <text x="32" y="445" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">∠AOB (центр.) = 〈AB                                    ∠ACB (впис.) = ½ · 〈AB = ½ · ∠AOB</text>
  <text x="32" y="463" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Вписанный угол = ½ центрального (на той же дуге)     |     Угол через диаметр = 90°     |     Впис. углы на одной дуге равны</text>
  <rect x="23" y="508" width="760" height="50" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="505" width="760" height="50" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="505" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="521" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="522" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Пример</text>
  <text x="32" y="545" font-family="Arial,sans-serif" font-size="12" fill="#37474F">ΔAB = 120°. Центральный угол ∠AOB = 120°. Вписанный угол ∠ACB = 60°. Если ΔAB = 180° (диаметр), то ∠ACB = 90°.</text>
