  <rect x="20" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определения</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Центральный угол — угол с вершиной</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">в центре окружности.</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">∠AOB — центральный</text>
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Вписанный угол — угол, вершина</text>
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">которого лежит на окружности,</text>
  <text x="32" y="232" font-family="Arial,sans-serif" font-size="12" fill="#37474F">а стороны пересекают окружность.</text>
  <text x="32" y="249" font-family="Arial,sans-serif" font-size="12" fill="#37474F">∠ACB — вписанный</text>
  <rect x="413" y="93" width="370" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="110" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="410" y="90" width="370" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="410" y="106" width="370" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Основная теорема</text>
  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Вписанный угол равен половине</text>
  <text x="422" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">дуги, на которую он опирается:</text>
  <text x="422" y="166" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="184" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">∠ACB = ½ · 〈AB</text>
  <text x="422" y="202" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="220" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Центральный: ∠AOB = 〈AB</text>
  <text x="422" y="238" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">∠ACB = ½ · ∠AOB</text>
