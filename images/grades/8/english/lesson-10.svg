<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Passive Voice</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Пассивный залог</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула / Formation</text><line x1="20" y1="103" x2="172" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="500" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="270" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">be</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V3 (Past Participle)</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="540" y="112" width="230" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="655" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#3B82F6">by + </tspan><tspan fill="#DC2626">agent</tspan><tspan fill="#6B7280"> (кем?)</tspan></text><text x="20" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Active vs Passive / Активный vs Пассивный</text><line x1="20" y1="168" x2="348" y2="168" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="178" width="370" height="65" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="30" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6" font-weight="bold">ACTIVE: Subject performs action</text><text x="30" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Shakespeare wrote Hamlet.</text><text x="30" y="234" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Шекспир написал Гамлета.</text><rect x="410" y="178" width="370" height="65" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><text x="420" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">PASSIVE: Subject receives action</text><text x="420" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Hamlet was written by Shakespeare.</text><text x="420" y="234" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Гамлет был написан Шекспиром.</text><text x="20" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Таблица времён / Tenses in Passive</text><line x1="20" y1="263" x2="292" y2="263" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="273" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="97" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Время</text><text x="277" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Формула</text><text x="545" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Пример</text><rect x="20" y="301" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Present Simple</text><text x="183" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">am/is/are + V3</text><text x="388" y="320" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">English is spoken worldwide.</text><rect x="20" y="329" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Past Simple</text><text x="183" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">was/were + V3</text><text x="388" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">The letter was sent yesterday.</text><rect x="20" y="357" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Future Simple</text><text x="183" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">will be + V3</text><text x="388" y="376" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">The project will be finished.</text><rect x="20" y="385" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="404" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Present Perfect</text><text x="183" y="404" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">have/has been + V3</text><text x="388" y="404" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">The work has been done.</text><rect x="20" y="413" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="432" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Present Continuous</text><text x="183" y="432" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">am/is/are being + V3</text><text x="388" y="432" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">The house is being built.</text><rect x="20" y="441" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="460" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Modal Verbs</text><text x="183" y="460" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">modal + be + V3</text><text x="388" y="460" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">It must be done today.</text><text x="20" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="458" x2="164" y2="458" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="473" r="9" fill="#3B82F6" /><text x="30" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="477" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">The book was published in 1999.</text><text x="46" y="493" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Книга была опубликована в 1999.</text><circle cx="30" cy="503" r="9" fill="#3B82F6" /><text x="30" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="507" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">These cars are made in Germany.</text><text x="46" y="523" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Эти машины сделаны в Германии.</text><circle cx="410" cy="473" r="9" fill="#3B82F6" /><text x="410" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="477" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">The window was broken by the boy.</text><text x="426" y="493" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Окно было разбито мальчиком.</text><circle cx="410" cy="503" r="9" fill="#3B82F6" /><text x="410" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="507" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">The test will be checked tomorrow.</text><text x="426" y="523" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Тест будет проверен завтра.</text><rect x="20" y="540" width="750" height="35" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="558" r="12" fill="#DC2626" /><text x="38" y="563" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Когда использовать?</text><text x="32" y="584" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Когда важен объект, а не кто совершил действие / Когда исполнитель неизвестен</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 10</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 10/15</text></svg>