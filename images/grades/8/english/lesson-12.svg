<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Conditionals: Second &amp;amp; Third</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Условные предложения: Второй и Третий тип</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><rect x="20" y="85" width="380" height="215" fill="#FEF9C3" stroke="#EA580C" stroke-width="2" rx="8" /><text x="210" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#EA580C" font-weight="bold">SECOND CONDITIONAL</text><text x="210" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Нереальная ситуация в настоящем/будущем</text><rect x="30" y="138" width="360" height="32" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="210" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">If + </tspan><tspan fill="#3B82F6">Past Simple</tspan><tspan fill="#6B7280">, </tspan><tspan fill="#3B82F6">would + V</tspan></text><text x="40" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If I had a million dollars,</text><text x="40" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">I would buy a big house.</text><text x="40" y="234" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Если бы у меня был миллион, я бы купил дом.</text><text x="40" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#EA580C">(Но у меня нет миллиона — нереально!)</text><text x="40" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If I were you, I would apologize.</text><text x="40" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">(were для всех лиц в If!)</text><rect x="410" y="85" width="370" height="215" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="8" /><text x="595" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#DC2626" font-weight="bold">THIRD CONDITIONAL</text><text x="595" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Нереальная ситуация в прошлом (сожаление)</text><rect x="420" y="138" width="350" height="32" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="595" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">If + </tspan><tspan fill="#3B82F6">Past Perfect</tspan><tspan fill="#6B7280">, </tspan><tspan fill="#3B82F6">would have + V3</tspan></text><text x="430" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If I had studied harder,</text><text x="430" y="208" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">I would have passed the exam.</text><text x="430" y="234" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Если бы я учился усерднее, я бы сдал экзамен.</text><text x="430" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">(Но уже поздно — прошлое не изменить!)</text><text x="430" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If she had come, we would have won.</text><text x="430" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">(Она не пришла, и мы не выиграли)</text><text x="20" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Сравнение всех типов / Comparison</text><line x1="20" y1="318" x2="284" y2="318" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="328" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="60" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Тип</text><text x="187" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Условие (If)</text><text x="372" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Результат</text><text x="590" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Реальность</text><rect x="20" y="356" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Zero</text><text x="108" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Present</text><text x="283" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Present</text><text x="478" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">100% реально</text><rect x="20" y="384" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">First</text><text x="108" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Present</text><text x="283" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Future (will)</text><text x="478" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Возможно</text><rect x="20" y="412" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="431" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Second</text><text x="108" y="431" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Past</text><text x="283" y="431" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">would + V</text><text x="478" y="431" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Нереально сейчас</text><rect x="20" y="440" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Third</text><text x="108" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Past Perfect</text><text x="283" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">would have + V3</text><text x="478" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Нереально в прошлом</text><text x="20" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="453" x2="164" y2="453" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="468" r="9" fill="#3B82F6" /><text x="30" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="472" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If I were rich, I would travel the world.</text><text x="46" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если бы я был богат, я бы путешествовал. (2nd)</text><circle cx="30" cy="498" r="9" fill="#3B82F6" /><text x="30" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="502" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If he had driven carefully, he wouldn't have crashed.</text><text x="46" y="518" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если бы он ехал осторожно... (3rd)</text><circle cx="410" cy="468" r="9" fill="#3B82F6" /><text x="410" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="472" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If she knew his number, she would call.</text><text x="426" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если бы она знала номер... (2nd)</text><circle cx="410" cy="498" r="9" fill="#3B82F6" /><text x="410" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="502" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If we had left earlier, we would have caught the train.</text><text x="426" y="518" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если бы мы вышли раньше... (3rd)</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 12</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 12/15</text></svg>