<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Modal Verbs: Should, May, Might</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Модальные глаголы: совет, разрешение, возможность</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула / Formation</text><line x1="20" y1="103" x2="172" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">should/may/might</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="20" y="162" width="245" height="190" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" rx="8" /><text x="142" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16A34A" font-weight="bold">SHOULD</text><text x="142" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">следует, должен (совет)</text><text x="30" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Advice (совет)</text><text x="30" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  You should rest more.</text><text x="30" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Recommendation</text><text x="30" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  She should see a doctor.</text><text x="30" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Opinion</text><text x="30" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  We should leave now.</text><text x="30" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Neg: shouldn't</text><rect x="278" y="162" width="245" height="190" fill="#FEF9C3" stroke="#EA580C" stroke-width="2" rx="8" /><text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#EA580C" font-weight="bold">MAY</text><text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">может, возможно</text><text x="288" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Permission (разрешение)</text><text x="288" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  May I come in?</text><text x="288" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Possibility (50%)</text><text x="288" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  It may rain today.</text><text x="288" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Formal permission</text><text x="288" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  You may leave now.</text><text x="288" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Более формальный than can</text><rect x="536" y="162" width="245" height="190" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2" rx="8" /><text x="658" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7C3AED" font-weight="bold">MIGHT</text><text x="658" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">возможно (меньше %)</text><text x="546" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Weak possibility (30%)</text><text x="546" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  He might come later.</text><text x="546" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Polite suggestion</text><text x="546" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  You might try again.</text><text x="546" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Past: might have + V3</text><text x="546" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  She might have forgotten.</text><text x="546" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Менее уверен, чем may</text><text x="20" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Сравнение возможности / Possibility Comparison</text><line x1="20" y1="373" x2="388" y2="373" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F" font-weight="bold">must (95% уверены) → should (75%) → may (50%) → might (30%) → can't (0%)</text><rect x="50" y="410" width="85" height="20" fill="#DC2626" stroke="#DC2626" stroke-width="0" rx="3" /><text x="50" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#DC2626" font-weight="bold">must (95%)</text><rect x="200" y="410" width="67" height="20" fill="#EA580C" stroke="#EA580C" stroke-width="0" rx="3" /><text x="200" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#EA580C" font-weight="bold">should (75%)</text><rect x="350" y="410" width="45" height="20" fill="#3B82F6" stroke="#3B82F6" stroke-width="0" rx="3" /><text x="350" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">may (50%)</text><rect x="500" y="410" width="27" height="20" fill="#7C3AED" stroke="#7C3AED" stroke-width="0" rx="3" /><text x="500" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#7C3AED" font-weight="bold">might (30%)</text><rect x="650" y="410" width="4" height="20" fill="#6B7280" stroke="#6B7280" stroke-width="0" rx="3" /><text x="650" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="bold">can't (5%)</text><text x="20" y="465" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="468" x2="164" y2="468" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="483" r="9" fill="#3B82F6" /><text x="30" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="487" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">You should eat more vegetables.</text><text x="46" y="503" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Тебе следует есть больше овощей.</text><circle cx="30" cy="513" r="9" fill="#3B82F6" /><text x="30" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="517" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">May I use your phone?</text><text x="46" y="533" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Можно воспользоваться твоим телефоном?</text><circle cx="410" cy="483" r="9" fill="#3B82F6" /><text x="410" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="487" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">It might snow tomorrow.</text><text x="426" y="503" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Завтра, возможно, пойдёт снег.</text><circle cx="410" cy="513" r="9" fill="#3B82F6" /><text x="410" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="517" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">He shouldn't stay up late.</text><text x="426" y="533" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ему не следует ложиться поздно.</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 9</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 9/15</text></svg>