/tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V3</tspan><tspan fill="#6B7280"> + ...?</tspan></text><text x="20" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Markers</text><line x1="20" y1="213" x2="260" y2="213" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="220" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="107" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">ever</text><rect x="210" y="220" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="297" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">never</text><rect x="400" y="220" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="487" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">already</text><rect x="590" y="220" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="677" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">yet</text><rect x="20" y="250" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="107" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">just</text><rect x="210" y="250" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="297" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">recently</text><rect x="400" y="250" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="487" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">since</text><rect x="590" y="250" width="175" height="24" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" rx="12" /><text x="677" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">for</text><text x="20" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Таблица неправильных глаголов / Irregular Verbs</text><line x1="20" y1="298" x2="396" y2="298" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="308" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="135" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">V1 (Infinitive)</text><text x="365" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">V2 (Past Simple)</text><text x="595" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">V3 (Past Participle)</text><rect x="20" y="336" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">go</text><text x="258" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">went</text><text x="488" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">gone</text><rect x="20" y="364" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="383" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">write</text><text x="258" y="383" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">wrote</text><text x="488" y="383" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">written</text><rect x="20" y="392" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">see</text><text x="258" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">saw</text><text x="488" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">seen</text><rect x="20" y="420" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="439" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">eat</text><text x="258" y="439" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">ate</text><text x="488" y="439" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">eaten</text><rect x="20" y="448" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="467" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">do</text><text x="258" y="467" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">did</text><text x="488" y="467" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">done</text><text x="20" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="471" x2="164" y2="471" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="486" r="9" fill="#3B82F6" /><text x="30" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I have already done my homework.</text><text x="46" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я уже сделал домашнее задание.</text><circle cx="30" cy="516" r="9" fill="#3B82F6" /><text x="30" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She has never been to London.</text><text x="46" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она никогда не была в Лондоне.</text><circle cx="410" cy="486" r="9" fill="#3B82F6" /><text x="410" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Have you ever eaten sushi?</text><text x="426" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты когда-нибудь ел суши?</text><circle cx="410" cy="516" r="9" fill="#3B82F6" /><text x="410" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">He hasn't finished yet.</text><text x="426" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Он ещё не закончил.</text><rect x="20" y="553" width="750" height="35" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="571" r="12" fill="#DC2626" /><text x="38" y="576" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="575" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Since vs For</text><text x="32" y="597" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">since + момент (since 2020) | for + период (for 3 years)</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 3</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 3/15</text></svg>