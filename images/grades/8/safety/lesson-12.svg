<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Первая помощь при травмах</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">Растяжения, вывихи, раны, повязки</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Растяжения связок</text>
  <line x1="20" y1="99" x2="156" y2="99" stroke="#EA580C" stroke-width="2" />
  <text x="25" y="112" fill="#374151" font-size="11" font-family="Arial, sans-serif">Признаки: боль, отёк, ограничение движения</text>
  <text x="25" y="130" fill="#374151" font-size="11" font-family="Arial, sans-serif">Действия по правилу RICE:</text>
  <circle cx="40" cy="158" r="12" fill="#DC2626" />
  <text x="40" y="163" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">R</text>
  <text x="60" y="163" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Rest:</text>
  <text x="130" y="163" fill="#374151" font-size="11" font-family="Arial, sans-serif">Покой — обездвижьте сустав</text>
  <circle cx="40" cy="188" r="12" fill="#2563EB" />
  <text x="40" y="193" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">I</text>
  <text x="60" y="193" fill="#2563EB" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Ice:</text>
  <text x="130" y="193" fill="#374151" font-size="11" font-family="Arial, sans-serif">Лёд — холодный компресс на 20 мин</text>
  <circle cx="40" cy="218" r="12" fill="#16A34A" />
  <text x="40" y="223" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">C</text>
  <text x="60" y="223" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Compression:</text>
  <text x="130" y="223" fill="#374151" font-size="11" font-family="Arial, sans-serif">Давление — тугая повязка</text>
  <circle cx="40" cy="248" r="12" fill="#EA580C" />
  <text x="40" y="253" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">E</text>
  <text x="60" y="253" fill="#EA580C" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Elevation:</text>
  <text x="130" y="253" fill="#374151" font-size="11" font-family="Arial, sans-serif">Возвышение — поднимите конечность</text>
  <text x="20" y="280" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Вывихи</text>
  <line x1="20" y1="284" x2="68" y2="284" stroke="#EA580C" stroke-width="2" />
  <text x="25" y="296" fill="#374151" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Признаки: сильная боль, деформация сустава,</text>
  <text x="25" y="314" fill="#374151" font-size="11" font-weight="normal" font-family="Arial, sans-serif">невозможность движения, отёк</text>
  <text x="25" y="332" fill="#374151" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПЕРВАЯ ПОМОЩЬ:</text>
  <text x="25" y="350" fill="#374151" font-size="11" font-weight="normal" font-family="Arial, sans-serif">1. Обездвижьте сустав в том положении, каком он есть</text>
  <text x="25" y="368" fill="#374151" font-size="11" font-weight="normal" font-family="Arial, sans-serif">2. Приложите холод</text>
  <text x="25" y="386" fill="#374151" font-size="11" font-weight="normal" font-family="Arial, sans-serif">3. Обратитесь к врачу</text>
  <text x="25" y="404" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4. НЕ пытайтесь вправить вывих самостоятельно!</text>
  <text x="420" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Раны и их обработка</text>
  <line x1="420" y1="99" x2="572" y2="99" stroke="#EA580C" stroke-width="2" />
  <rect x="425" y="112" width="345" height="48" rx="4" fill="#FFF7ED" stroke="#EA580C" stroke-width="1" />
  <text x="435" y="128" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Ссадина</text>
  <text x="540" y="128" fill="#374151" font-size="10" font-family="Arial, sans-serif">Поверхностное повреждение</text>
  <text x="435" y="148" fill="#16A34A" font-size="10" font-family="Arial, sans-serif">Промыть, обработать антисептиком</text>
  <rect x="425" y="167" width="345" height="48" rx="4" fill="#FFF7ED" stroke="#EA580C" stroke-width="1" />
  <text x="435" y="183" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Резаная рана</text>
  <text x="540" y="183" fill="#374151" font-size="10" font-family="Arial, sans-serif">Ровные края, обильное кровотечение</text>
  <text x="435" y="203" fill="#16A34A" font-size="10" font-family="Arial, sans-serif">Наложить стерильную повязку</text>
  <rect x="425" y="222" width="345" height="48" rx="4" fill="#FFF7ED" stroke="#EA580C" stroke-width="1" />
  <text x="435" y="238" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Колота рана</text>
  <text x="540" y="238" fill="#374151" font-size="10" font-family="Arial, sans-serif">Глубокая, узкая рана</text>
  <text x="435" y="258" fill="#16A34A" font-size="10" font-family="Arial, sans-serif">Не извлекать предмет! Наложить повязку</text>
  <rect x="425" y="277" width="345" height="48" rx="4" fill="#FFF7ED" stroke="#EA580C" stroke-width="1" />
  <text x="435" y="293" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Рваная рана</text>
  <text x="540" y="293" fill="#374151" font-size="10" font-family="Arial, sans-serif">Неровные края</text>
  <text x="435" y="313" fill="#16A34A" font-size="10" font-family="Arial, sans-serif">Остановить кровь, наложить повязку</text>
  <text x="420" y="340" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Виды повязок</text>
  <line x1="420" y1="344" x2="516" y2="344" stroke="#EA580C" stroke-width="2" />
  <line x1="430" y1="357" x2="438" y2="353" stroke="#2563EB" stroke-width="2" />
  <line x1="438" y1="361" x2="446" y2="357" stroke="#2563EB" stroke-width="2" />
  <line x1="446" y1="365" x2="454" y2="361" stroke="#2563EB" stroke-width="2" />
  <text x="465" y="365" fill="#2563EB" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Круговая</text>
  <text x="590" y="365" fill="#374151" font-size="10" font-family="Arial, sans-serif">Для запястья, лодыжки</text>
  <line x1="430" y1="387" x2="438" y2="383" stroke="#16A34A" stroke-width="2" />
  <line x1="438" y1="391" x2="446" y2="387" stroke="#16A34A" stroke-width="2" />
  <line x1="446" y1="395" x2="454" y2="391" stroke="#16A34A" stroke-width="2" />
  <text x="465" y="395" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Спиральная</text>
  <text x="590" y="395" fill="#374151" font-size="10" font-family="Arial, sans-serif">Для предплечья, голени</text>
  <line x1="430" y1="417" x2="438" y2="413" stroke="#EA580C" stroke-width="2" />
  <line x1="438" y1="421" x2="446" y2="417" stroke="#EA580C" stroke-width="2" />
  <line x1="446" y1="425" x2="454" y2="421" stroke="#EA580C" stroke-width="2" />
  <text x="465" y="425" fill="#EA580C" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Крестообразная</text>
  <text x="590" y="425" fill="#374151" font-size="10" font-family="Arial, sans-serif">Для затылка, грудной клетки</text>
  <line x1="430" y1="447" x2="438" y2="443" stroke="#7C3AED" stroke-width="2" />
  <line x1="438" y1="451" x2="446" y2="447" stroke="#7C3AED" stroke-width="2" />
  <line x1="446" y1="455" x2="454" y2="451" stroke="#7C3AED" stroke-width="2" />
  <text x="465" y="455" fill="#7C3AED" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Восьмиобразная</text>
  <text x="590" y="455" fill="#374151" font-size="10" font-family="Arial, sans-serif">Для суставов (колено, локоть)</text>
  <text x="20" y="430" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Аптечка первой помощи</text>
  <line x1="20" y1="434" x2="188" y2="434" stroke="#EA580C" stroke-width="2" />
  <g>
    <circle cx="31" cy="446" r="6" fill="#16A34A" />
    <text x="31" y="451" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="41" y="448" fill="#374151" font-size="10" font-family="Arial, sans-serif">Бинты стерильные и нестерильные</text>
  <g>
    <circle cx="31" cy="468" r="6" fill="#16A34A" />
    <text x="31" y="473" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="41" y="470" fill="#374151" font-size="10" font-family="Arial, sans-serif">Вата, марлевые салфетки</text>
  <g>
    <circle cx="31" cy="490" r="6" fill="#16A34A" />
    <text x="31" y="495" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="41" y="492" fill="#374151" font-size="10" font-family="Arial, sans-serif">Пластырь бактерицидный</text>
  <g>
    <circle cx="31" cy="512" r="6" fill="#16A34A" />
    <text x="31" y="517" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="41" y="514" fill="#374151" font-size="10" font-family="Arial, sans-serif">Перекись водорода 3%</text>
  <g>
    <circle cx="231" cy="446" r="6" fill="#16A34A" />
    <text x="231" y="451" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="241" y="448" fill="#374151" font-size="10" font-family="Arial, sans-serif">Йод или зелёнка</text>
  <g>
    <circle cx="231" cy="468" r="6" fill="#16A34A" />
    <text x="231" y="473" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="241" y="470" fill="#374151" font-size="10" font-family="Arial, sans-serif">Жгут кровеостанавливающий</text>
  <g>
    <circle cx="231" cy="490" r="6" fill="#16A34A" />
    <text x="231" y="495" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="241" y="492" fill="#374151" font-size="10" font-family="Arial, sans-serif">Анальгетики (обезболивающие)</text>
  <g>
    <circle cx="231" cy="512" r="6" fill="#16A34A" />
    <text x="231" y="517" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="241" y="514" fill="#374151" font-size="10" font-family="Arial, sans-serif">Ножницы, пинцет</text>
  <rect x="420" y="490" width="355" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="503" r="8" fill="#16A34A" />
    <text x="433" y="508" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="446" y="508" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="430" y="524" fill="#374151" font-size="11" font-family="Arial, sans-serif">Обездвижьте травмированную конечность</text>
  <text x="430" y="540" fill="#374151" font-size="11" font-family="Arial, sans-serif">Приложите холод к месту травмы</text>
  <text x="430" y="556" fill="#374151" font-size="11" font-family="Arial, sans-serif">Обратитесь к врачу</text>
  <rect x="20" y="545" width="750" height="78" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="558" r="8" fill="#DC2626" />
    <text x="33" y="563" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="46" y="563" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="30" y="579" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не вправляйте вывихи самостоятельно!</text>
  <text x="30" y="595" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не извлекайте инородные предметы из ран!</text>
  <text x="30" y="611" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не прикладывайте лёд напрямую к коже!</text>
</svg>