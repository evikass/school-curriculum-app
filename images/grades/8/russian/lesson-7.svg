<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2F8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FCE7F3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BE185D;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#FBCFE8;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#BE185D" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSmall" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#1F2937" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0"/>
  <rect x="0" y="65" width="800" height="5" fill="#BE185D" opacity="0.3"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Прямая и косвенная речь</text>
  <text x="400" y="58" font-family="Arial, sans-serif" font-size="13" fill="#F9A8D4" text-anchor="middle">Оформление диалога, цитирование, перевод речи</text>

  <circle cx="40" cy="35" r="22" fill="#FFFFFF" opacity="0.25"/>
  <text x="40" y="41" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7</text>

  <rect x="15" y="82" width="380" height="105" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205.0" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Прямая речь</text>

  <text x="30" y="106" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Прямая речь — точно воспроизведённая</text>
  <text x="30" y="122" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">чужая речь, сохраняющая её форму и содержание.</text>
  <line x1="30" y1="130" x2="380" y2="130" stroke="#E5E7EB" stroke-width="1"/>
  <text x="30" y="148" font-family="Arial, sans-serif" font-size="11" fill="#10B981" font-weight="bold">Слова автора</text>
  <text x="130" y="148" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">+ </text>
  <text x="145" y="148" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" font-weight="bold">Прямая речь</text>
  <text x="30" y="168" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">А: «П!» | А: «П.» | «П», — а. | «П!» — а. | «П?» — а.</text>
  <text x="30" y="184" font-family="Arial, sans-serif" font-size="9" fill="#FB7185">А — слова автора, П — прямая речь</text>

  <rect x="410" y="82" width="375" height="105" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597.5" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Схемы прямой речи</text>
  <text x="425" y="100" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">А: «П!»</text>
  <text x="500" y="100" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Он сказал: «Я иду!»</text>
  <text x="425" y="116" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">А: «П.»</text>
  <text x="500" y="116" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Она ответила: «Я согласна.»</text>
  <text x="425" y="132" font-family="Arial, sans-serif" font-size="10" fill="#A855F7" font-weight="bold">«П», — а.</text>
  <text x="500" y="132" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">«Я иду», — сказал он.</text>
  <text x="425" y="148" font-family="Arial, sans-serif" font-size="10" fill="#FB7185" font-weight="bold">«П!» — а.</text>
  <text x="500" y="148" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">«Помогите!» — крикнула она.</text>
  <text x="425" y="164" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" font-weight="bold">«П?» — а.</text>
  <text x="500" y="164" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">«Ты идёшь?» — спросил друг.</text>

  <rect x="15" y="200" width="380" height="175" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205.0" y="218" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Оформление диалога</text>

  <text x="30" y="224" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Каждая реплика — с новой строки,</text>
  <text x="30" y="240" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">начинается с тире:</text>
  <line x1="30" y1="248" x2="380" y2="248" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="30" y="256" width="350" height="100" fill="#FFFFFF" rx="4" stroke="#EC4899" stroke-width="1.5"/>
  <text x="45" y="275" font-family="Arial, sans-serif" font-size="11" fill="#BE185D">— Привет! Как дела?</text>
  <text x="45" y="295" font-family="Arial, sans-serif" font-size="11" fill="#BE185D">— Спасибо, хорошо. А у тебя?</text>
  <text x="45" y="315" font-family="Arial, sans-serif" font-size="11" fill="#BE185D">— Тоже отлично!</text>
  <text x="45" y="340" font-family="Arial, sans-serif" font-size="9" fill="#FB7185" font-weight="bold">Кавычки НЕ ставятся в диалоге!</text>
  <text x="45" y="354" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Реплики начинаются с тире</text>

  <rect x="410" y="200" width="375" height="175" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597.5" y="218" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Косвенная речь</text>

  <text x="425" y="224" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Косвенная речь — передача чужой речи</text>
  <text x="425" y="240" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">в виде придаточного предложения.</text>
  <line x1="425" y1="248" x2="770" y2="248" stroke="#E5E7EB" stroke-width="1"/>
  <text x="425" y="266" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BE185D">Прямая → Косвенная:</text>
  <rect x="425" y="276" width="350" height="44" fill="#FFFFFF" rx="4" stroke="#10B981" stroke-width="1"/>
  <text x="435" y="294" font-family="Arial, sans-serif" font-size="10" fill="#10B981">Он сказал: «Я иду домой».</text>
  <text x="435" y="312" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6">Он сказал, что он идёт домой.</text>
  <rect x="425" y="326" width="350" height="44" fill="#FFFFFF" rx="4" stroke="#10B981" stroke-width="1"/>
  <text x="435" y="344" font-family="Arial, sans-serif" font-size="10" fill="#10B981">Она спросила: «Ты придёшь?»</text>
  <text x="435" y="362" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6">Она спросила, приду ли я.</text>

  <rect x="15" y="390" width="380" height="195" fill="#FFFFFF" rx="6" stroke="#FB7185" stroke-width="2" filter="url(#shadowSmall)"/>
  <rect x="15" y="390" width="380" height="22" fill="#FB7185" rx="6"/>
  <rect x="15" y="406" width="380" height="6" fill="#FB7185"/>
  <text x="205.0" y="405" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Замена прямой речи косвенной</text>
  <text x="23" y="428" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">1. Повествоват. → союз ЧТО:</text>
  <text x="23" y="444" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">   «Я читаю» → что он читает</text>
  <text x="23" y="460" font-family="Arial, sans-serif" font-size="10" fill="#1F2937"></text>
  <text x="23" y="476" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">2. Вопросительная → союз ЛИ:</text>
  <text x="23" y="492" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">   «Ты идёшь?» → идёшь ли ты</text>
  <text x="23" y="508" font-family="Arial, sans-serif" font-size="10" fill="#1F2937"></text>
  <text x="23" y="524" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">3. Побудительная → чтобы:</text>
  <text x="23" y="540" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">   «Иди сюда!» → чтобы он шёл сюда</text>
  <text x="23" y="556" font-family="Arial, sans-serif" font-size="10" fill="#1F2937"></text>
  <text x="23" y="572" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">4. Меняются местоимения:</text>
  <text x="23" y="588" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">   я → он, мы → они, мой → его</text>
  <text x="23" y="604" font-family="Arial, sans-serif" font-size="10" fill="#1F2937"></text>
  <text x="23" y="620" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">5. Меняется время глагола:</text>
  <text x="23" y="636" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">   иду → идёт, читал → читал</text>

  <rect x="410" y="390" width="375" height="195" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597.5" y="408" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Цитирование</text>

  <text x="425" y="414" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Цитата — дословная выдержка из текста.</text>
  <line x1="425" y1="422" x2="770" y2="422" stroke="#E5E7EB" stroke-width="1"/>
  <text x="425" y="440" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BE185D">Правила оформления цитат:</text>
  <text x="425" y="458" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">1. В кавычках с указанием автора:</text>
  <text x="425" y="474" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Пушкин писал: «Унылая пора! Очей очарованье!»</text>
  <text x="425" y="496" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">2. С пропуском — многоточие:</text>
  <text x="425" y="512" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">«Унылая пора... очарованье!»</text>
  <text x="425" y="534" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">3. Цитата как часть предложения:</text>
  <text x="425" y="550" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Пушкин называл осень «унылой порой».</text>
  <text x="425" y="572" font-family="Arial, sans-serif" font-size="10" fill="#FB7185" font-weight="bold">Без кавычек, если оформлена как косвенная речь!</text>
</svg>
