<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">А.П. Платонов. «Юшка»</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="155" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">О рассказе</text><circle cx="34" cy="125" r="2.5" fill="#D97706"/><text x="44" y="128" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Рассказ (1937 г.)</text><circle cx="34" cy="147" r="2.5" fill="#D97706"/><text x="44" y="150" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Жанр: философский рассказ-притча</text><circle cx="34" cy="169" r="2.5" fill="#D97706"/><text x="44" y="172" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Главный герой — Юшка, помощник кузнеца</text><circle cx="34" cy="191" r="2.5" fill="#D97706"/><text x="44" y="194" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Тема: сострадание, доброта, духовность</text><circle cx="34" cy="213" r="2.5" fill="#D97706"/><text x="44" y="216" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Стиль Платонова: «сказовая» простота</text><rect x="414" y="100" width="370" height="155" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Образ Юшки</text><rect x="530" y="122" width="140" height="32" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="600.0" y="142.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Юшка</text><text x="600" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Больной, слабый, но — добрый</text><rect x="430" y="180" width="110" height="24" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/><text x="485.0" y="196.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Люди</text><text x="430" y="214" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Издеваются, не понимают</text><rect x="630" y="180" width="130" height="24" rx="8" fill="#BBF7D0" stroke="#22C55E" stroke-width="1.5"/><text x="695.0" y="196.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Девочка-сирота</text><text x="630" y="214" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Спасена Юшкой, стала врачом</text><line x1="540" y1="154" x2="485" y2="180" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,2"/><text x="498" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#EF4444">терпит</text><line x1="660" y1="154" x2="680" y2="180" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="3,2"/><text x="685" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#22C55E">спасает</text><rect x="16" y="270" width="768" height="95" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="400.0" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Сюжет рассказа</text><rect x="35" y="292" width="90" height="20" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="80.0" y="306.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">Жизнь Юшки</text><text x="35" y="328" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Работает, терпит насмешки</text><line x1="125" y1="302" x2="135" y2="302" stroke="#D97706" stroke-width="1.5"/><rect x="225" y="292" width="90" height="20" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="270.0" y="306.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">Доброта</text><text x="225" y="328" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Отдаёт деньги девочке-сироте</text><line x1="315" y1="302" x2="325" y2="302" stroke="#D97706" stroke-width="1.5"/><rect x="415" y="292" width="90" height="20" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="460.0" y="306.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">Гибель</text><text x="415" y="328" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Убит прохожим, не ответил злом</text><line x1="505" y1="302" x2="515" y2="302" stroke="#D97706" stroke-width="1.5"/><rect x="605" y="292" width="90" height="20" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="650.0" y="306.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" font-weight="bold">Память</text><text x="605" y="328" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Девочка-врач — память о добре</text><rect x="16" y="380" width="370" height="205" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Нравственные темы</text><rect x="30" y="402" width="115" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="87.5" y="415.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Сострадание</text><text x="152" y="411" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Юшка жалеет людей, несмотря на жестокость</text><rect x="30" y="434" width="115" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="87.5" y="447.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Доброта</text><text x="152" y="443" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Истинная доброта — бескорыстная</text><rect x="30" y="466" width="115" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="87.5" y="479.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Духовная сила</text><text x="152" y="475" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Слабый телом — силён духом</text><rect x="30" y="498" width="115" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="87.5" y="511.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Жертвенность</text><text x="152" y="507" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Юшка отдал всё ради других</text><rect x="30" y="530" width="115" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="87.5" y="543.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Память о добре</text><text x="152" y="539" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Добро живёт после смерти человека</text><rect x="414" y="380" width="370" height="205" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Художественные особенности</text><circle cx="432" cy="405" r="2.5" fill="#D97706"/><text x="442" y="408" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Сказовая манера повествования</text><circle cx="432" cy="431" r="2.5" fill="#D97706"/><text x="442" y="434" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Простота и лаконичность языка</text><circle cx="432" cy="457" r="2.5" fill="#D97706"/><text x="442" y="460" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Контраст: внешняя слабость — духовная сила</text><circle cx="432" cy="483" r="2.5" fill="#D97706"/><text x="442" y="486" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Символ: Юшка — «ангел во плоти»</text><circle cx="432" cy="509" r="2.5" fill="#D97706"/><text x="442" y="512" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Философский подтекст: в чём смысл жизни?</text><circle cx="432" cy="535" r="2.5" fill="#D97706"/><text x="442" y="538" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Отсутствие авторской оценки — читатель судит</text><rect x="425" y="545" width="348" height="32" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1" filter="url(#shadowLight)"/><text x="599" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400E" font-style="italic">«Сердце без злобы — как светлая лампада»</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">💛</text>
</svg>