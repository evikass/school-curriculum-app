<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">«Повесть временных лет»</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="175" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">О летописи</text><circle cx="34" cy="127" r="2.5" fill="#D97706"/><text x="44" y="130" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Древнейший русский летописный свод (XII в.)</text><circle cx="34" cy="149" r="2.5" fill="#D97706"/><text x="44" y="152" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Автор — монах Нестор (ок. 1113 г.)</text><circle cx="34" cy="171" r="2.5" fill="#D97706"/><text x="44" y="174" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Написана в Киево-Печерском монастыре</text><circle cx="34" cy="193" r="2.5" fill="#D97706"/><text x="44" y="196" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Охватывает события от библейских времён</text><circle cx="34" cy="215" r="2.5" fill="#D97706"/><text x="44" y="218" font-family="Arial, sans-serif" font-size="9" fill="#92400E">До 1110 года — история Руси</text><circle cx="34" cy="237" r="2.5" fill="#D97706"/><text x="44" y="240" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Цель: «откуда есть пошла Русская земля»</text><rect x="414" y="100" width="370" height="175" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Историческое значение</text><circle cx="432" cy="125" r="2.5" fill="#D97706"/><text x="442" y="128" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Первый общерусский летописный свод</text><circle cx="432" cy="149" r="2.5" fill="#D97706"/><text x="442" y="152" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Источники по истории Древней Руси</text><circle cx="432" cy="173" r="2.5" fill="#D97706"/><text x="442" y="176" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Основа русской историографии</text><circle cx="432" cy="197" r="2.5" fill="#D97706"/><text x="442" y="200" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Образец древнерусской литературы</text><circle cx="432" cy="221" r="2.5" fill="#D97706"/><text x="442" y="224" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Единство церковной и светской мысли</text><rect x="16" y="290" width="370" height="295" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Ключевые эпизоды</text><rect x="30" y="310" width="145" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="102.5" y="325.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Призвание варягов</text><text x="185" y="322" font-family="Arial, sans-serif" font-size="9" fill="#92400E">862 г. — Рюрик, начало государственности</text><rect x="30" y="360" width="145" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="102.5" y="375.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Путь «из варяг в греки»</text><text x="185" y="372" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Торговый путь, связь Руси и Византии</text><rect x="30" y="410" width="145" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="102.5" y="425.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Крещение Руси</text><text x="185" y="422" font-family="Arial, sans-serif" font-size="9" fill="#92400E">988 г. — Владимир, принятие христианства</text><rect x="30" y="460" width="145" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="102.5" y="475.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Месть Ольги</text><text x="185" y="472" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Мудрость и хитрость княгини</text><rect x="30" y="510" width="145" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="102.5" y="525.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Борьба с печенегами</text><text x="185" y="522" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Защита рубежей Руси</text><rect x="414" y="290" width="370" height="295" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Особенности стиля</text><circle cx="432" cy="317" r="2.5" fill="#D97706"/><text x="442" y="320" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Летописный жанр — погодная запись</text><circle cx="432" cy="343" r="2.5" fill="#D97706"/><text x="442" y="346" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Сочетание факта и легенды</text><circle cx="432" cy="369" r="2.5" fill="#D97706"/><text x="442" y="372" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Религиозная интерпретация событий</text><circle cx="432" cy="395" r="2.5" fill="#D97706"/><text x="442" y="398" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Эмоциональность оценок автора</text><circle cx="432" cy="421" r="2.5" fill="#D97706"/><text x="442" y="424" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Цитаты из Библии и византийских хроник</text><circle cx="432" cy="447" r="2.5" fill="#D97706"/><text x="442" y="450" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Фольклорные элементы (предания, поговорки)</text><rect x="425" y="485" width="348" height="85" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1" filter="url(#shadowLight)"/><text x="435" y="505" font-family="Arial, sans-serif" font-size="11" fill="#92400E" font-weight="bold">Летописцы</text><text x="435" y="525" font-family="Arial, sans-serif" font-size="9" fill="#92400E">• Нестор — основной автор (ок. 1113 г.)</text><text x="435" y="542" font-family="Arial, sans-serif" font-size="9" fill="#92400E">• Сильвестр — редактор (1116 г.)</text><text x="435" y="559" font-family="Arial, sans-serif" font-size="9" fill="#92400E">• Игнатий — продолжатель летописи</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">📜</text>
</svg>