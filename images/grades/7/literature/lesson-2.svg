<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Сказки народов мира</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="170" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Виды сказок</text><rect x="30" y="122" width="100" height="20" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/><text x="80.0" y="136.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Волшебные</text><text x="140" y="133" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Магия, превращения, чудесные помощники</text><rect x="30" y="156" width="100" height="20" rx="8" fill="#FED7AA" stroke="#D97706" stroke-width="1.5"/><text x="80.0" y="170.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Бытовые</text><text x="140" y="167" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Жизнь крестьян, социальный конфликт</text><rect x="30" y="190" width="100" height="20" rx="8" fill="#BBF7D0" stroke="#D97706" stroke-width="1.5"/><text x="80.0" y="204.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">О животных</text><text x="140" y="201" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Аллегория, животные — носители черт</text><rect x="30" y="224" width="100" height="20" rx="8" fill="#DBEAFE" stroke="#D97706" stroke-width="1.5"/><text x="80.0" y="238.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Кумулятивные</text><text x="140" y="235" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Накопление действий, повтор цепочки</text><rect x="414" y="100" width="370" height="170" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Структура сказки</text><rect x="425" y="118" width="80" height="16" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="465.0" y="130.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Присказка</text><text x="512" y="126" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Настройка на сказочный лад</text><line x1="465" y1="134" x2="465" y2="140" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/><rect x="425" y="140" width="80" height="16" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="465.0" y="152.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Зачин</text><text x="512" y="148" font-family="Arial, sans-serif" font-size="9" fill="#92400E">«В некотором царстве...»</text><line x1="465" y1="156" x2="465" y2="162" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/><rect x="425" y="162" width="80" height="16" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="465.0" y="174.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Завязка</text><text x="512" y="170" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Начало действия, конфликт</text><line x1="465" y1="178" x2="465" y2="184" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/><rect x="425" y="184" width="80" height="16" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="465.0" y="196.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Развитие</text><text x="512" y="192" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Испытания героя</text><line x1="465" y1="200" x2="465" y2="206" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/><rect x="425" y="206" width="80" height="16" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="465.0" y="218.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Кульминация</text><text x="512" y="214" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Главное испытание</text><line x1="465" y1="222" x2="465" y2="228" stroke="#D97706" stroke-width="1" stroke-dasharray="2,2"/><rect x="425" y="228" width="80" height="16" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="465.0" y="240.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Развязка</text><text x="512" y="236" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Победа, «и стали жить-поживать»</text><rect x="16" y="285" width="370" height="300" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Нравственные уроки сказок</text><circle cx="34" cy="312" r="2.5" fill="#D97706"/><text x="44" y="315" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Добро всегда побеждает зло</text><circle cx="34" cy="338" r="2.5" fill="#D97706"/><text x="44" y="341" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Труд и честность вознаграждаются</text><circle cx="34" cy="364" r="2.5" fill="#D97706"/><text x="44" y="367" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Жадность и зависть наказываются</text><circle cx="34" cy="390" r="2.5" fill="#D97706"/><text x="44" y="393" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Ум и смекалка важнее силы</text><circle cx="34" cy="416" r="2.5" fill="#D97706"/><text x="44" y="419" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Семья и дружба — главные ценности</text><circle cx="34" cy="442" r="2.5" fill="#D97706"/><text x="44" y="445" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Слово — не воробей, вылетит — не поймаешь</text><circle cx="34" cy="468" r="2.5" fill="#D97706"/><text x="44" y="471" font-family="Arial, sans-serif" font-size="9" fill="#92400E">За добро плати добром</text><circle cx="34" cy="494" r="2.5" fill="#D97706"/><text x="44" y="497" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Не имей сто рублей, а имей сто друзей</text><rect x="414" y="285" width="370" height="300" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Сказки разных народов</text><text x="428" y="315" font-family="Arial, sans-serif" font-size="10" fill="#92400E" font-weight="bold">🇷🇺 Русские</text><text x="428" y="330" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Царевна-лягушка, Василиса Прекрасная</text><line x1="428" y1="339" x2="768" y2="339" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4,3"/><text x="428" y="353" font-family="Arial, sans-serif" font-size="10" fill="#92400E" font-weight="bold">🇫🇷 Французские</text><text x="428" y="368" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Золушка, Кот в сапогах (Перро)</text><line x1="428" y1="377" x2="768" y2="377" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4,3"/><text x="428" y="391" font-family="Arial, sans-serif" font-size="10" fill="#92400E" font-weight="bold">🇩🇪 Немецкие</text><text x="428" y="406" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Бременские музыканты (бр. Гримм)</text><line x1="428" y1="415" x2="768" y2="415" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4,3"/><text x="428" y="429" font-family="Arial, sans-serif" font-size="10" fill="#92400E" font-weight="bold">🇦🇪 Арабские</text><text x="428" y="444" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Тысяча и одна ночь, Аладдин</text><line x1="428" y1="453" x2="768" y2="453" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4,3"/><text x="428" y="467" font-family="Arial, sans-serif" font-size="10" fill="#92400E" font-weight="bold">🇮🇳 Индийские</text><text x="428" y="482" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Панчатантра, Рамаяна</text><line x1="428" y1="491" x2="768" y2="491" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4,3"/><text x="428" y="505" font-family="Arial, sans-serif" font-size="10" fill="#92400E" font-weight="bold">🇯🇵 Японские</text><text x="428" y="520" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Урасима Таро, Momotaro</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">📖</text>
</svg>