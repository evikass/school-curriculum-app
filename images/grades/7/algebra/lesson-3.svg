<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 3</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Линейные уравнения</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">ax + b = 0 и алгоритм решения</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Общий вид линейного уравнения</text>
  <rect x="200" y="140" width="400" height="55" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="400.0" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Линейное уравнение:</text>
  <text x="400.0" y="177.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">ax + b = 0</text>
  <rect x="50" y="201" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Алгоритм решения</text>
  <rect x="50" y="232" width="36" height="36" rx="6" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="68" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">1</text>
  <text x="98" y="257" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">Раскрыть скобки</text>
  <text x="400" y="257" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#4F46E5" font-style="italic">2(x + 3) − x = 7</text>
  <line x1="68" y1="270" x2="68" y2="280" stroke="#818CF8" stroke-width="2"/>
  <rect x="50" y="280" width="36" height="36" rx="6" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="68" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">2</text>
  <text x="98" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">Перенести слагаемые</text>
  <text x="400" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#4F46E5" font-style="italic">2x + 6 − x = 7</text>
  <line x1="68" y1="318" x2="68" y2="328" stroke="#818CF8" stroke-width="2"/>
  <rect x="50" y="328" width="36" height="36" rx="6" fill="#6366F1" filter="url(#shadowSm)"/>
  <text x="68" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">3</text>
  <text x="98" y="353" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">Привести подобные</text>
  <text x="400" y="353" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#6366F1" font-style="italic">x + 6 = 7</text>
  <line x1="68" y1="366" x2="68" y2="376" stroke="#818CF8" stroke-width="2"/>
  <rect x="50" y="376" width="36" height="36" rx="6" fill="#10B981" filter="url(#shadowSm)"/>
  <text x="68" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">4</text>
  <text x="98" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">Найти корень</text>
  <text x="400" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#10B981" font-style="italic">x = 7 − 6 = 1</text>
  <rect x="50" y="416" width="8" height="16" rx="2" fill="#10B981"/>
  <text x="64" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Примеры</text>
  <rect x="50" y="445" width="345" height="55" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">3x − 5 = x + 3</text>
  <text x="65" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#4F46E5">3x − x = 3 + 5 → 2x = 8 → x = 4</text>
  <rect x="415" y="445" width="335" height="55" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="430" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">5 − 2x = −3x + 1</text>
  <text x="430" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#4F46E5">−2x + 3x = 1 − 5 → x = −4</text>
  <rect x="50" y="518" width="700" height="55" rx="10" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="400" y="542" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">Корень уравнения — значение переменной, при котором уравнение обращается в верное равенство</text>
  <text x="400" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">Проверка: подставить найденное значение в исходное уравнение</text>
</svg>