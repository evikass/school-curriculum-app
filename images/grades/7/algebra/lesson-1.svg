<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 1</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Числовые выражения</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">Порядок действий и вычисление</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Числовое выражение</text>
  <text x="50" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#475569">Запись, состоящая из чисел, знаков действий и скобок</text>
  <rect x="50" y="165" width="220" height="50" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="160.0" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Пример:</text>
  <text x="160.0" y="200.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">5 + 3 × 2</text>
  <rect x="285" y="165" width="220" height="50" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="395.0" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Пример:</text>
  <text x="395.0" y="200.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">(12 - 4) ÷ 2</text>
  <rect x="520" y="165" width="220" height="50" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="630.0" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Пример:</text>
  <text x="630.0" y="200.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">2³ + 3²</text>
  <rect x="50" y="226" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Порядок действий</text>
  <rect x="50" y="255" width="165" height="65" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="132" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">1. Скобки</text>
  <text x="132" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">( )</text>
  <polygon points="220,287 228,282 228,292" fill="#818CF8"/>
  <rect x="230" y="255" width="165" height="65" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="312" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">2. Степень</text>
  <text x="312" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">aⁿ</text>
  <polygon points="400,287 408,282 408,292" fill="#818CF8"/>
  <rect x="410" y="255" width="165" height="65" rx="8" fill="#6366F1" filter="url(#shadowSm)"/>
  <text x="492" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">3. Умнож./Дел.</text>
  <text x="492" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">×  ÷</text>
  <polygon points="580,287 588,282 588,292" fill="#818CF8"/>
  <rect x="590" y="255" width="165" height="65" rx="8" fill="#6366F1" filter="url(#shadowSm)"/>
  <text x="672" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="bold">4. Слож./Выч.</text>
  <text x="672" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">+  −</text>
  <rect x="50" y="331" width="8" height="16" rx="2" fill="#10B981"/>
  <text x="64" y="345" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Пример вычисления</text>
  <rect x="50" y="360" width="700" height="60" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="385" text-anchor="start" font-family="Arial, sans-serif" font-size="18" fill="#1E293B" font-weight="bold">3 + 4 × (5 − 2)² − 6 ÷ 3</text>
  <text x="580" y="385" text-anchor="start" font-family="Arial, sans-serif" font-size="18" fill="#EF4444" font-weight="bold">= ?</text>
  <rect x="50" y="430" width="700" height="140" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#3B82F6" font-weight="bold">1) Скобки:</text>
  <text x="180" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">5 − 2 = 3</text>
  <text x="70" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#3B82F6" font-weight="bold">2) Степень:</text>
  <text x="180" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">3² = 9</text>
  <text x="70" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#4F46E5" font-weight="bold">3) Умножение:</text>
  <text x="180" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">4 × 9 = 36</text>
  <text x="410" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#4F46E5" font-weight="bold">4) Деление:</text>
  <text x="520" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">6 ÷ 3 = 2</text>
  <text x="410" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#10B981" font-weight="bold">5) Сложение:</text>
  <text x="520" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">3 + 36 = 39</text>
  <text x="410" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#10B981" font-weight="bold">6) Вычитание:</text>
  <text x="520" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">39 − 2 = 37</text>
  <rect x="550" y="530" width="195" height="40" rx="8" fill="#10B981" filter="url(#shadowSm)"/>
  <text x="647" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">Ответ: 37</text>
</svg>