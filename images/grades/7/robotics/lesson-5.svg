  <line x1="0" y1="160" x2="800" y2="160" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="200" x2="800" y2="200" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="240" x2="800" y2="240" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="280" x2="800" y2="280" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="320" x2="800" y2="320" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="360" x2="800" y2="360" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="400" x2="800" y2="400" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="440" x2="800" y2="440" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="480" x2="800" y2="480" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="520" x2="800" y2="520" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="560" x2="800" y2="560" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <line x1="0" y1="600" x2="800" y2="600" stroke="#164E7A" stroke-width="0.3" opacity="0.5" />
  <rect x="0" y="0" width="800" height="70" fill="#0284C7" opacity="0.92" />
  <rect x="16" y="12" width="46" height="46" rx="8" fill="#0C1B2A" />
  <text x="39" y="44" text-anchor="middle" fill="#06B6D4" font-size="22" font-weight="bold" font-family="monospace">5</text>
  <text x="76" y="38" fill="#E0F2FE" font-size="22" font-weight="bold" font-family="sans-serif">Основы программирования Arduino</text>
  <text x="76" y="58" fill="#7DD3FC" font-size="13" font-family="sans-serif">C++, функции setup() и loop(), цифровой ввод/вывод</text>
  <line x1="0" y1="70" x2="800" y2="70" stroke="#06B6D4" stroke-width="2" opacity="0.6" />
  <rect x="16" y="82" width="280" height="240" rx="8" fill="#0D2137" stroke="#1E5A8A" stroke-width="1" />
  <text x="28" y="104" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Структура программы</text>
  <text x="28" y="112" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">Каждая программа (скетч)</text>
  <text x="28" y="128" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">состоит из двух функций:</text>
  <rect x="28" y="144" width="256" height="70" rx="6" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="1.5" />
  <text x="36" y="164" fill="#22C55E" font-size="13" font-family="monospace" text-anchor="start" font-weight="bold">void setup() { ... }</text>
  <text x="36" y="182" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Выполняется 1 раз при запуске</text>
  <text x="36" y="198" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">Инициализация пинов, переменных</text>
  <rect x="28" y="224" width="256" height="70" rx="6" fill="#06B6D4" opacity="0.1" stroke="#06B6D4" stroke-width="1.5" />
  <text x="36" y="244" fill="#06B6D4" font-size="13" font-family="monospace" text-anchor="start" font-weight="bold">void loop()  { ... }</text>
  <text x="36" y="262" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Выполняется бесконечно</text>
  <text x="36" y="278" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">Основная логика программы</text>
  <rect x="310" y="82" width="474" height="240" rx="8" fill="#0D2137" stroke="#06B6D4" stroke-width="1" />
  <text x="322" y="104" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Пример: Blink</text>
  <text x="320" y="118" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">// Мигание светодиодом</text>
  <text x="320" y="134" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">int led = 13;</text>
  <text x="320" y="150" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start" />
  <text x="320" y="166" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void setup() {</text>
  <text x="320" y="182" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  pinMode(led, OUTPUT);</text>
  <text x="320" y="198" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <text x="320" y="214" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start" />
  <text x="320" y="230" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void loop() {</text>
  <text x="320" y="246" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(led, HIGH);</text>
  <text x="320" y="262" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  delay(1000);</text>
  <text x="320" y="278" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(led, LOW);</text>
  <text x="320" y="294" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  delay(1000);</text>
  <text x="320" y="310" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <rect x="16" y="336" width="388" height="150" rx="8" fill="#0D2137" stroke="#1E5A8A" stroke-width="1" />
  <text x="28" y="358" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Цифровой ввод/вывод</text>
  <text x="28" y="370" fill="#38BDF8" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">pinMode(pin, MODE)</text>
  <text x="28" y="384" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">Настройка пина: INPUT / OUTPUT</text>
  <text x="28" y="398" fill="#38BDF8" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">digitalWrite(pin, VAL)</text>
  <text x="28" y="412" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">Запись: HIGH / LOW</text>
  <text x="28" y="426" fill="#38BDF8" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">digitalRead(pin)</text>
  <text x="28" y="440" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">Чтение: HIGH / LOW</text>
  <text x="28" y="454" fill="#38BDF8" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">delay(ms)</text>
  <text x="28" y="468" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">Пауза в миллисекундах</text>
  <rect x="416" y="336" width="368" height="150" rx="8" fill="#0D2137" stroke="#1E5A8A" stroke-width="1" />
  <text x="428" y="358" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Типы данных</text>
  <text x="428" y="368" fill="#06B6D4" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">int</text>
  <text x="496" y="368" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">-32768 ... 32767</text>
  <text x="680" y="368" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">2 байта</text>
  <text x="428" y="388" fill="#06B6D4" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">long</text>
  <text x="496" y="388" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">-2.1 млрд ... 2.1 млрд</text>
  <text x="680" y="388" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">4 байта</text>
  <text x="428" y="408" fill="#06B6D4" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">float</text>
  <text x="496" y="408" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Дробные числа</text>
  <text x="680" y="408" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">4 байта</text>
  <text x="428" y="428" fill="#06B6D4" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">bool</text>
  <text x="496" y="428" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">true / false</text>
  <text x="680" y="428" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">1 байт</text>
  <text x="428" y="448" fill="#06B6D4" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">char</text>
  <text x="496" y="448" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Символ ASCII</text>
  <text x="680" y="448" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">1 байт</text>
  <text x="428" y="468" fill="#06B6D4" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">String</text>
  <text x="496" y="468" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Текстовая строка</text>
  <text x="680" y="468" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">var</text>
  <rect x="16" y="500" width="768" height="60" rx="8" fill="#0D2137" stroke="#06B6D4" stroke-width="1" />
  <text x="28" y="522" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Пример: чтение кнопки</text>
  <text x="26" y="536" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">// Чтение кнопки на пине 2</text>
  <text x="26" y="552" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void setup() { pinMode(2, INPUT);  pinMode(13, OUTPUT); }</text>
  <text x="26" y="568" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void loop()  { if (digitalRead(2)) digitalWrite(13, HIGH);</text>
  <text x="26" y="584" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">               else digitalWrite(13, LOW); }</text>
  <text x="400" y="575" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="middle">7 класс | Робототехника | Урок 5</text>
</svg>