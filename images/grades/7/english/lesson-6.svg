<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs>
<rect width="800" height="600" fill="#F3F4F6" rx="0" />
<rect x="0" y="0" width="800" height="70" fill="#3B82F6" />
<text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Digital World</text>
<text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Цифровой мир</text>
<rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="90" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Present Perfect / Настоящее совершённое время</text>
<line x1="20" y1="93" x2="380" y2="93" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="108" width="355" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="197" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">have/has</tspan><tspan fill="#1E3A5F"> + V3</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="390" y="108" width="380" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="580" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">haven't/hasn't</tspan><tspan fill="#1E3A5F"> + V3</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="20" y="152" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="395" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Have/Has</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V3</tspan><tspan fill="#6B7280"> + ... ?</tspan></text><text x="20" y="202" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Когда используем / When to Use Present Perfect</text>
<line x1="20" y1="205" x2="388" y2="205" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="220" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<circle cx="38" cy="238" r="12" fill="#DC2626" />
<text x="38" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">1</text>
<text x="58" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Опыт в жизни</text>
<text x="34" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I have visited London. (Когда-либо в жизни)</text><rect x="410" y="220" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<circle cx="428" cy="238" r="12" fill="#DC2626" />
<text x="428" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">2</text>
<text x="448" y="242" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Результат виден сейчас</text>
<text x="424" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">She has broken her phone. (Оно сломано)</text><rect x="20" y="283" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<circle cx="38" cy="301" r="12" fill="#DC2626" />
<text x="38" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">3</text>
<text x="58" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Действие началось, ещё длится</text>
<text x="34" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I have known him for 5 years.</text><rect x="410" y="283" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<circle cx="428" cy="301" r="12" fill="#DC2626" />
<text x="428" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">4</text>
<text x="448" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Недавнее событие</text>
<text x="424" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">They have just arrived. (Только что)</text><text x="20" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Ключевые слова / Key Words</text>
<line x1="20" y1="351" x2="228" y2="351" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="366" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="110" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">ever — когда-либо</text><rect x="215" y="366" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="305" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">never — никогда</text><rect x="410" y="366" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="500" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">just — только что</text><rect x="605" y="366" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="695" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">already — уже</text><rect x="20" y="396" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="110" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">yet — ещё не</text><rect x="215" y="396" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="305" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">recently — недавно</text><rect x="410" y="396" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="500" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">since — с (момента)</text><rect x="605" y="396" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="695" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">for — в течение</text><text x="20" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Позиция наречий / Adverb Position</text>
<line x1="20" y1="444" x2="284" y2="444" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="459" width="720" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" />
<text x="120" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Наречие</text>
<text x="350" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Позиция</text>
<text x="610" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Пример</text><rect x="20" y="487" width="720" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">just</text>
<text x="230" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">после have/has</text>
<text x="490" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I have just finished.</text><rect x="20" y="515" width="720" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">already</text>
<text x="230" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">после have/has</text>
<text x="490" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">She has already left.</text><rect x="20" y="543" width="720" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">yet</text>
<text x="230" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">в конце предложения</text>
<text x="490" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Have you done it yet?</text><rect x="20" y="571" width="720" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">ever / never</text>
<text x="230" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">после have/has</text>
<text x="490" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I have never been there.</text><text x="20" y="613" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Словарь / Technology Vocabulary</text>
<line x1="20" y1="616" x2="268" y2="616" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="643" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">download an app</tspan> — скачать приложение</text><text x="410" y="643" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">create an account</tspan> — создать аккаунт</text><text x="20" y="663" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">go online</tspan> — выходить в интернет</text><text x="410" y="663" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">update software</tspan> — обновлять ПО</text><text x="20" y="683" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">send a message</tspan> — отправить сообщение</text><text x="410" y="683" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">search the web</tspan> — искать в интернете</text><circle cx="30" cy="703" r="9" fill="#3B82F6" />
<text x="30" y="707" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text>
<text x="46" y="707" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I have just downloaded a new app.</text>
<text x="46" y="721" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я только что скачал новое приложение.</text><circle cx="410" cy="703" r="9" fill="#3B82F6" />
<text x="410" y="707" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text>
<text x="426" y="707" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Have you ever visited this website?</text>
<text x="426" y="721" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты когда-нибудь посещал этот сайт?</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" />
<text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 7 | English | Lesson 6</text>
