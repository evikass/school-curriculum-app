<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs>
<rect width="800" height="600" fill="#F3F4F6" rx="0" />
<rect x="0" y="0" width="800" height="70" fill="#3B82F6" />
<text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Environmental Problems</text>
<text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Экологические проблемы</text>
<rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="90" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Модальные глаголы / Modal Verbs for Obligation &amp;amp; Advice</text>
<line x1="20" y1="93" x2="492" y2="93" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="108" width="240" height="80" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="140" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" font-weight="bold">SHOULD</text>
<text x="30" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Совет, рекомендация</text>
<text x="30" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + should + V</text>
<text x="30" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + should not (shouldn't) + V</text><rect x="275" y="108" width="250" height="80" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#DC2626" font-weight="bold">MUST</text>
<text x="285" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Обязанность, необходимость</text>
<text x="285" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + must + V</text>
<text x="285" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + must not (mustn't) + V</text><rect x="540" y="108" width="240" height="80" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="660" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" font-weight="bold">HAVE TO</text>
<text x="550" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Вынужденная необходимость</text>
<text x="550" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + have to / has to + V</text>
<text x="550" y="174" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + don't have to + V</text><text x="20" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Сравнение / Comparison of Modals</text>
<line x1="20" y1="203" x2="276" y2="203" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="218" width="760" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" />
<text x="90" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Модальный</text>
<text x="260" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Значение</text>
<text x="460" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Пример</text>
<text x="670" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Перевод</text><rect x="20" y="246" width="760" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">should</text>
<text x="170" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">совет</text>
<text x="370" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">You should recycle.</text>
<text x="570" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Вам следует перерабатывать.</text><rect x="20" y="274" width="760" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">must</text>
<text x="170" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">обязанность</text>
<text x="370" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We must protect nature.</text>
<text x="570" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Мы должны беречь природу.</text><rect x="20" y="302" width="760" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">have to</text>
<text x="170" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">необходимость</text>
<text x="370" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I have to sort rubbish.</text>
<text x="570" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Мне нужно сортировать мусор.</text><rect x="20" y="330" width="760" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="349" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">mustn't</text>
<text x="170" y="349" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">запрещено</text>
<text x="370" y="349" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">You mustn't litter!</text>
<text x="570" y="349" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Нельзя мусорить!</text><rect x="20" y="358" width="760" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">don't have to</text>
<text x="170" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">не обязат.</text>
<text x="370" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">You don't have to come.</text>
<text x="570" y="377" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Необязательно приходить.</text><text x="20" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Словарь / Environment Vocabulary</text>
<line x1="20" y1="403" x2="276" y2="403" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">pollution</tspan> — загрязнение</text><text x="410" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">recycle</tspan> — перерабатывать</text><text x="20" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">global warming</tspan> — глобальное потепление</text><text x="410" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">endangered species</tspan> — исчезающие виды</text><text x="20" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">deforestation</tspan> — вырубка лесов</text><text x="410" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">rubbish / litter</tspan> — мусор</text><text x="20" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">solar energy</tspan> — солнечная энергия</text><text x="410" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">protect nature</tspan> — защищать природу</text><text x="20" y="508" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text>
<line x1="20" y1="511" x2="164" y2="511" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="524" r="9" fill="#3B82F6" />
<text x="30" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text>
<text x="46" y="528" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">You should use public transport.</text>
<text x="46" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Тебе следует пользоваться общ. транспортом.</text><circle cx="410" cy="524" r="9" fill="#3B82F6" />
<text x="410" y="528" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text>
<text x="426" y="528" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">We must stop deforestation!</text>
<text x="426" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Мы должны остановить вырубку лесов!</text><circle cx="30" cy="562" r="9" fill="#3B82F6" />
<text x="30" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text>
<text x="46" y="566" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">People mustn't throw litter in parks.</text>
<text x="46" y="580" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Люди не должны бросать мусор в парках.</text><circle cx="410" cy="562" r="9" fill="#3B82F6" />
<text x="410" y="566" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text>
<text x="426" y="566" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">We don't have to use plastic bags.</text>
<text x="426" y="580" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Необязательно использовать пластиковые пакеты.</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" />
<text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 7 | English | Lesson 5</text>
<text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 5/6</text>
</svg>