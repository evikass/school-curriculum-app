<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA" />
      <stop offset="100%" stop-color="#ECFEFF" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    
  </defs>
  <!-- background & border -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12" />
  <rect x="3" y="3" width="794" height="594" rx="10" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <rect x="8" y="8" width="784" height="584" rx="8" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" />
  <!-- corner decorations -->
  <polygon points="12,12 42,12 12,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,12 758,12 788,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="12,588 42,588 12,558" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,588 758,588 788,558" fill="#06B6D4" opacity="0.08" />
  <!-- decorative shapes -->
  <circle cx="740" cy="100" r="25" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <polygon points="60,540 80,510 100,540" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <rect x="70" y="80" width="18" height="18" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.08" transform="rotate(45,79,89)" />
  <!-- header bar -->
  <rect x="15" y="15" width="770" height="55" fill="url(#headerGrad)" rx="8" opacity="0.92" />
  <rect x="25" y="22" width="50" height="38" fill="#FFFFFF" rx="6" opacity="0.25" />
  <text x="50" y="49" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="410" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Признаки параллельности</text>
  <text x="760" y="35" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">7 класс</text>
  <text x="760" y="50" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">Геометрия</text>
  <line x1="20" y1="80" x2="780" y2="80" stroke="#06B6D4" stroke-width="2" opacity="0.25" />
  <rect x="23" y="93" width="760" height="260" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="90" width="760" height="260" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="90" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="106" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Параллельные прямые и секущая</text>
  <line x1="50" y1="170" x2="450" y2="170" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="50" y1="300" x2="450" y2="300" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="130" y1="130" x2="350" y2="340" stroke="#DC2626" stroke-width="2" />
  <text x="455" y="167" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">a</text>
  <text x="455" y="297" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">b</text>
  <text x="355" y="345" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#DC2626">c (секущая)</text>
  <circle cx="210" cy="170" r="3" fill="#DC2626" />
  <circle cx="285" cy="300" r="3" fill="#DC2626" />
  <text x="215" y="163" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">E</text>
  <text x="290" y="295" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">F</text>
  <path d="M 210,185 A 18,18 0 0,0 220,180" fill="none" stroke="#D97706" stroke-width="2" />
  <path d="M 285,315 A 18,18 0 0,0 295,310" fill="none" stroke="#D97706" stroke-width="2" />
  <text x="228" y="195" font-family="Arial,sans-serif" font-size="11" fill="#D97706">1</text>
  <text x="300" y="325" font-family="Arial,sans-serif" font-size="11" fill="#D97706">5</text>
  <path d="M 195,185 A 18,18 0 0,1 200,195" fill="none" stroke="#059669" stroke-width="2" />
  <path d="M 270,315 A 18,18 0 0,1 275,325" fill="none" stroke="#059669" stroke-width="2" />
  <text x="183" y="200" font-family="Arial,sans-serif" font-size="11" fill="#059669">2</text>
  <text x="258" y="330" font-family="Arial,sans-serif" font-size="11" fill="#059669">6</text>
  <path d="M 220,158 A 18,18 0 0,1 225,165" fill="none" stroke="#7C3AED" stroke-width="2" />
  <path d="M 270,315 A 18,18 0 0,1 275,325" fill="none" stroke="#7C3AED" stroke-width="2" />
  <text x="228" y="158" font-family="Arial,sans-serif" font-size="11" fill="#7C3AED">3</text>
  <text x="258" y="330" font-family="Arial,sans-serif" font-size="11" fill="#7C3AED">7</text>
  <text x="195" y="158" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">4</text>
  <text x="300" y="295" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">8</text>
  <text x="490" y="140" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#263238">Типы углов:</text>
  <rect x="490" y="152" width="14" height="14" fill="#D97706" rx="2" />
  <text x="510" y="164" font-family="Arial,sans-serif" font-size="11" fill="#37474F">Соответственные (∠1 и ∠5)</text>
  <rect x="490" y="174" width="14" height="14" fill="#059669" rx="2" />
  <text x="510" y="186" font-family="Arial,sans-serif" font-size="11" fill="#37474F">Накрест лежащие (∠3 и ∠6)</text>
  <rect x="490" y="196" width="14" height="14" fill="#7C3AED" rx="2" />
  <text x="510" y="208" font-family="Arial,sans-serif" font-size="11" fill="#37474F">Односторонние (∠3 и ∠5)</text>
  <text x="60" y="168" font-family="Arial,sans-serif" font-size="14" fill="#06B6D4">&#x21DA;</text>
  <text x="60" y="298" font-family="Arial,sans-serif" font-size="14" fill="#06B6D4">&#x21DA;</text>
  <rect x="20" y="365" width="245" height="95" fill="#FFF7ED" rx="8" stroke="#D97706" stroke-width="1.5" />
  <rect x="20" y="365" width="5" height="95" fill="#D97706" rx="2" />
  <text x="36" y="385" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Признак 1:</text>
  <text x="36" y="403" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Если соответственные</text>
  <text x="36" y="421" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">углы равны, то прямые</text>
  <text x="36" y="439" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">параллельны: ∠1=∠5 =&gt; a∥b</text>
  <rect x="280" y="365" width="245" height="95" fill="#F0FDF4" rx="8" stroke="#059669" stroke-width="1.5" />
  <rect x="280" y="365" width="5" height="95" fill="#059669" rx="2" />
  <text x="296" y="385" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Признак 2:</text>
  <text x="296" y="403" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Если накрест лежащие</text>
  <text x="296" y="421" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">углы равны, то прямые</text>
  <text x="296" y="439" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">параллельны: ∠3=∠6 =&gt; a∥b</text>
  <rect x="540" y="365" width="240" height="95" fill="#FDF4FF" rx="8" stroke="#7C3AED" stroke-width="1.5" />
  <rect x="540" y="365" width="5" height="95" fill="#7C3AED" rx="2" />
  <text x="556" y="385" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Признак 3:</text>
  <text x="556" y="403" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Если сумма односторонних</text>
  <text x="556" y="421" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">углов = 180°, то прямые</text>
  <text x="556" y="439" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">параллельны: ∠3+∠5=180°</text>
  <rect x="23" y="478" width="760" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="475" width="760" height="110" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="475" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="491" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="492" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Свойства параллельных прямых (обратные)</text>
  <text x="32" y="510" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Если a ∥ b, то:</text>
  <text x="32" y="530" font-family="Arial,sans-serif" font-size="12" fill="#D97706">1) Соответственные углы равны: ∠1 = ∠5</text>
  <text x="32" y="548" font-family="Arial,sans-serif" font-size="12" fill="#059669">2) Накрест лежащие углы равны: ∠3 = ∠6</text>
  <text x="400" y="530" font-family="Arial,sans-serif" font-size="12" fill="#7C3AED">3) Сумма односторонних = 180°: ∠3 + ∠5 = 180°</text>
  <text x="400" y="548" font-family="Arial,sans-serif" font-size="12" fill="#37474F">4) Через точку вне прямой можно провести</text>
  <text x="400" y="566" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   только одну прямую, параллельную данной</text>
  <rect x="20" y="570" width="760" height="22" fill="#FEF2F2" rx="8" stroke="#DC2626" stroke-width="1.5" />
  <rect x="20" y="570" width="5" height="22" fill="#DC2626" rx="2" />
  <text x="36" y="590" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Аксиома параллельности (Евклид): через точку, не лежащую на прямой, проходит только одна прямая, параллельная данной.</text>
</svg>
