<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA" />
      <stop offset="100%" stop-color="#ECFEFF" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    
  </defs>
  <!-- background & border -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12" />
  <rect x="3" y="3" width="794" height="594" rx="10" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <rect x="8" y="8" width="784" height="584" rx="8" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" />
  <!-- corner decorations -->
  <polygon points="12,12 42,12 12,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,12 758,12 788,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="12,588 42,588 12,558" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,588 758,588 788,558" fill="#06B6D4" opacity="0.08" />
  <!-- decorative shapes -->
  <circle cx="740" cy="100" r="25" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <polygon points="60,540 80,510 100,540" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <rect x="70" y="80" width="18" height="18" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.08" transform="rotate(45,79,89)" />
  <!-- header bar -->
  <rect x="15" y="15" width="770" height="55" fill="url(#headerGrad)" rx="8" opacity="0.92" />
  <rect x="25" y="22" width="50" height="38" fill="#FFFFFF" rx="6" opacity="0.25" />
  <text x="50" y="49" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7</text>
  <text x="410" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Сумма углов треугольника</text>
  <text x="760" y="35" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">7 класс</text>
  <text x="760" y="50" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">Геометрия</text>
  <line x1="20" y1="80" x2="780" y2="80" stroke="#06B6D4" stroke-width="2" opacity="0.25" />
  <rect x="20" y="90" width="760" height="55" fill="#FFF7ED" rx="8" stroke="#D97706" stroke-width="1.5" />
  <rect x="20" y="90" width="5" height="55" fill="#D97706" rx="2" />
  <text x="36" y="110" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Теорема: Сумма углов треугольника равна 180°</text>
  <text x="36" y="128" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">∠A + ∠B + ∠C = 180°</text>
  <rect x="23" y="163" width="440" height="220" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="160" width="440" height="220" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="160" width="440" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="176" width="440" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="240" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Доказательство</text>
  <polygon points="120,350 240,200 370,350" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="120" y1="200" x2="380" y2="200" stroke="#059669" stroke-width="1.5" stroke-dasharray="8,4" />
  <text x="383" y="198" font-family="Arial,sans-serif" font-size="11" fill="#059669">a ∥ AC</text>
  <path d="M 140,340 A 22,22 0 0,1 150,320" fill="none" stroke="#D97706" stroke-width="2" />
  <text x="153" y="325" font-family="Arial,sans-serif" font-size="12" fill="#D97706">α</text>
  <path d="M 225,218 A 22,22 0 0,0 210,210" fill="none" stroke="#DC2626" stroke-width="2" />
  <path d="M 255,218 A 22,22 0 0,1 270,210" fill="none" stroke="#7C3AED" stroke-width="2" />
  <text x="205" y="212" font-family="Arial,sans-serif" font-size="12" fill="#DC2626">β</text>
  <text x="272" y="212" font-family="Arial,sans-serif" font-size="12" fill="#7C3AED">γ</text>
  <path d="M 350,340 A 22,22 0 0,0 340,320" fill="none" stroke="#22D3EE" stroke-width="2" />
  <text x="340" y="318" font-family="Arial,sans-serif" font-size="12" fill="#22D3EE">α</text>
  <path d="M 200,200 A 22,22 0 0,0 215,210" fill="none" stroke="#DC2626" stroke-width="1.5" />
  <text x="192" y="203" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">β</text>
  <path d="M 275,200 A 22,22 0 0,1 260,210" fill="none" stroke="#7C3AED" stroke-width="1.5" />
  <text x="277" y="203" font-family="Arial,sans-serif" font-size="11" fill="#7C3AED">γ</text>
  <circle cx="120" cy="350" r="3.5" fill="#0E7490" />
  <text x="120" y="342" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="240" cy="200" r="3.5" fill="#0E7490" />
  <text x="240" y="192" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="370" cy="350" r="3.5" fill="#0E7490" />
  <text x="370" y="342" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="32" y="378" font-family="Arial,sans-serif" font-size="10" fill="#37474F">α + β + γ = 180° (развёрнутый угол)</text>
  <rect x="483" y="163" width="300" height="220" fill="#000000" rx="8" opacity="0.05" />
  <rect x="480" y="160" width="300" height="220" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="480" y="160" width="300" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="480" y="176" width="300" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="630" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Примеры</text>
  <text x="492" y="200" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490">Равносторонний:</text>
  <text x="492" y="218" font-family="Arial,sans-serif" font-size="12" fill="#37474F">60° + 60° + 60° = 180°</text>
  <text x="492" y="248" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490">Прямоугольный равнобедренный:</text>
  <text x="492" y="266" font-family="Arial,sans-serif" font-size="12" fill="#37474F">90° + 45° + 45° = 180°</text>
  <text x="492" y="296" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490">Прямоугольный (30°-60°-90°):</text>
  <text x="492" y="314" font-family="Arial,sans-serif" font-size="12" fill="#37474F">90° + 60° + 30° = 180°</text>
  <text x="492" y="344" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490">Тупоугольный:</text>
  <text x="492" y="362" font-family="Arial,sans-serif" font-size="12" fill="#37474F">110° + 40° + 30° = 180°</text>
  <rect x="23" y="398" width="440" height="195" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="395" width="440" height="195" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="395" width="440" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="411" width="440" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="240" y="412" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Внешний угол треугольника</text>
  <polygon points="120,550 200,430 320,550" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="200" y1="430" x2="400" y2="480" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="6,3" />
  <path d="M 380,475 A 30,30 0 0,0 360,445" fill="none" stroke="#DC2626" stroke-width="2.5" />
  <path d="M 137,540 A 18,18 0 0,1 145,522" fill="none" stroke="#D97706" stroke-width="1.5" />
  <path d="M 303,540 A 18,18 0 0,0 295,522" fill="none" stroke="#059669" stroke-width="1.5" />
  <circle cx="120" cy="550" r="3.5" fill="#0E7490" />
  <text x="120" y="542" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="200" cy="430" r="3.5" fill="#0E7490" />
  <text x="200" y="422" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="320" cy="550" r="3.5" fill="#0E7490" />
  <text x="320" y="542" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="142" y="524" font-family="Arial,sans-serif" font-size="12" fill="#D97706">∠A</text>
  <text x="283" y="520" font-family="Arial,sans-serif" font-size="12" fill="#059669">∠C</text>
  <text x="370" y="460" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#DC2626">∠BCD</text>
  <rect x="480" y="395" width="300" height="90" fill="#FEF2F2" rx="8" stroke="#DC2626" stroke-width="1.5" />
  <rect x="480" y="395" width="5" height="90" fill="#DC2626" rx="2" />
  <text x="496" y="415" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Внешний угол равен сумме</text>
  <text x="496" y="433" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">двух внутренних углов,</text>
  <text x="496" y="451" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">не смежных с ним:</text>
  <text x="496" y="469" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">∠BCD = ∠A + ∠C</text>
  <rect x="480" y="500" width="300" height="90" fill="#F0FDF4" rx="8" stroke="#059669" stroke-width="1.5" />
  <rect x="480" y="500" width="5" height="90" fill="#059669" rx="2" />
  <text x="496" y="520" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Следствия:</text>
  <text x="496" y="538" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">1. Внешний угол &gt; каждого</text>
  <text x="496" y="556" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">   внутреннего, не смежного с ним</text>
  <text x="496" y="574" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">2. В прямоугольном △ сумма</text>
  <text x="496" y="592" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">   острых углов = 90°</text>
</svg>
