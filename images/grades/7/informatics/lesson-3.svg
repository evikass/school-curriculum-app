<text x="355" y="430" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">else:</text>
<text x="333" y="448" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="355" y="448" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Доступ запрещён&quot;)</text>
