<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Фонетика и графика</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">1</text><rect x="20" y="60" width="370" height="250" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="68" width="154" height="28" rx="14" fill="#EC4899"/>
<text x="107" y="87" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Гласные звуки</text><rect x="30" y="102" width="350" height="26" rx="4" fill="#EC4899" opacity="0.15"/><text x="38" y="120" font-size="13" fill="#BE185D" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Звук</text><text x="110" y="120" font-size="13" fill="#BE185D" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Буквы</text><text x="230" y="120" font-size="13" fill="#BE185D" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Пример</text><rect x="30" y="140" width="350" height="26" fill="#FDF2F8"/><text x="38" y="158" font-size="13" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">[а]</text><text x="110" y="158" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">а, я</text><text x="230" y="158" font-size="13" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">м**я**со</text><rect x="30" y="166" width="350" height="26" fill="#FFFFFF"/><text x="38" y="184" font-size="13" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">[о]</text><text x="110" y="184" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">о, ё</text><text x="230" y="184" font-size="13" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">в**ё**дра</text><rect x="30" y="192" width="350" height="26" fill="#FDF2F8"/><text x="38" y="210" font-size="13" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">[у]</text><text x="110" y="210" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">у, ю</text><text x="230" y="210" font-size="13" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">л**ю**к</text><rect x="30" y="218" width="350" height="26" fill="#FFFFFF"/><text x="38" y="236" font-size="13" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">[ы]</text><text x="110" y="236" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">ы, и</text><text x="230" y="236" font-size="13" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">м**ы**ло</text><rect x="30" y="244" width="350" height="26" fill="#FDF2F8"/><text x="38" y="262" font-size="13" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">[и]</text><text x="110" y="262" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">и, е</text><text x="230" y="262" font-size="13" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">л**е**с</text><rect x="30" y="270" width="350" height="26" fill="#FFFFFF"/><text x="38" y="288" font-size="13" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">[э]</text><text x="110" y="288" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">э, е</text><text x="230" y="288" font-size="13" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">м**э**р</text><rect x="410" y="60" width="370" height="250" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="420" y="68" width="174" height="28" rx="14" fill="#8B5CF6"/>
<text x="507" y="87" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Согласные звуки</text><text x="420" y="106" font-size="14" fill="#8B5CF6" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Звонкие:</text><text x="420" y="126" font-size="15" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">б в г д ж з</text><text x="420" y="148" font-size="15" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">б' в' г' д' ж' з'</text><text x="420" y="176" font-size="14" fill="#3B82F6" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Глухие:</text><text x="420" y="196" font-size="15" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">п ф к т ш с</text><text x="420" y="218" font-size="15" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">п' ф' к' т' ш' с'</text><text x="420" y="246" font-size="14" fill="#10B981" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Сонорные:</text><text x="420" y="266" font-size="15" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">л м н р й</text><text x="420" y="286" font-size="15" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">л' м' н' р'</text><rect x="20" y="320" width="760" height="130" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="328" width="284" height="28" rx="14" fill="#BE185D"/>
<text x="172" y="347" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Твёрдые и мягкие согласные</text><rect x="35" y="366" width="355" height="70" rx="8" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1"/><text x="212" y="386" font-size="15" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Твёрдые</text><text x="212" y="408" font-size="13" fill="#1F2937" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">Перед а, о, у, ы, э</text><text x="212" y="426" font-size="13" fill="#6B7280" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">лук, мэр, сок, дым</text><rect x="410" y="366" width="355" height="70" rx="8" fill="#EEF2FF" stroke="#8B5CF6" stroke-width="1"/><text x="587" y="386" font-size="15" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Мягкие</text><text x="587" y="408" font-size="13" fill="#1F2937" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">Перед я, ё, ю, и, е, ь</text><text x="587" y="426" font-size="13" fill="#6B7280" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">люк, мёрз, люк, мир</text><rect x="20" y="460" width="760" height="130" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="468" width="184" height="28" rx="14" fill="#F59E0B"/>
<text x="122" y="487" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Правила фонетики</text><text x="40" y="510" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">1. Гласные звуки — слогообразующие: ск**о**р, **а**лый</text><text x="40" y="528" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">2. [й'] — всегда мягкий согласный</text><text x="40" y="546" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">3. [ж], [ш], [ц] — всегда твёрдые</text><text x="40" y="564" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">4. [ч'], [щ'] — всегда мягкие</text><text x="40" y="582" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">5. Буквы е, ё, ю, я = [й'э], [й'о], [й'у], [й'а] в начале слова</text></svg>