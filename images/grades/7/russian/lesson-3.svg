<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Причастие как часть речи</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">3</text><rect x="20" y="60" width="760" height="55" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><text x="400" y="92" font-size="14" fill="#1F2937" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">Причастие — особая форма глагола, которая обозначает признак предмета по действию</text><rect x="20" y="125" width="370" height="175" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="133" width="184" height="28" rx="14" fill="#EC4899"/>
<text x="122" y="152" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Свойства глагола</text><text x="40" y="170" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Вид: совершенный / несовершенный</text><text x="40" y="192" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Возвратность: -ся / -сь</text><text x="40" y="214" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Время: настоящее / прошедшее</text><text x="40" y="236" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Переходность</text><rect x="410" y="125" width="370" height="175" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="420" y="133" width="264" height="28" rx="14" fill="#8B5CF6"/>
<text x="552" y="152" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Свойства прилагательного</text><text x="430" y="170" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Род: мужской / женский / средний</text><text x="430" y="192" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Число: единственное / множественное</text><text x="430" y="214" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Падеж (полная форма)</text><text x="430" y="236" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Полная и краткая формы</text><rect x="20" y="310" width="760" height="155" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="318" width="164" height="28" rx="14" fill="#BE185D"/>
<text x="112" y="337" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Виды причастий</text><rect x="35" y="356" width="355" height="96" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/><text x="212" y="376" font-size="14" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Действительные причастия</text><text x="50" y="396" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Обозначают признак предмета,</text><text x="50" y="412" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">который сам совершает действие</text><text x="50" y="434" font-size="12" fill="#BE185D" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">читающий мальчик, решившая задачу</text><rect x="410" y="356" width="355" height="96" rx="8" fill="#EEF2FF" stroke="#8B5CF6" stroke-width="1.5"/><text x="587" y="376" font-size="14" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Страдательные причастия</text><text x="425" y="396" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Обозначают признак предмета,</text><text x="425" y="412" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">который испытывает действие</text><text x="425" y="434" font-size="12" fill="#8B5CF6" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">читаемая книга, решённая задача</text><rect x="20" y="475" width="760" height="115" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="483" width="234" height="28" rx="14" fill="#10B981"/>
<text x="147" y="502" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Образование причастий</text><rect x="35" y="516" width="350" height="24" rx="4" fill="#EC4899" opacity="0.1"/><text x="42" y="533" font-size="12" fill="#BE185D" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Настоящее время</text><text x="250" y="533" font-size="12" fill="#BE185D" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Прошедшее время</text><rect x="35" y="542" width="175" height="20" fill="#FDF2F8"/><text x="42" y="556" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">читать → читающ-</text><rect x="215" y="542" width="170" height="20" fill="#FDF2F8"/><text x="222" y="556" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">читать → читавш-</text><rect x="35" y="564" width="175" height="20" fill="#FFFFFF"/><text x="42" y="578" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">решить → решащ-</text><rect x="215" y="564" width="170" height="20" fill="#FFFFFF"/><text x="222" y="578" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">решить → решивш-</text><text x="420" y="516" font-size="12" fill="#BE185D" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Вопросы к причастию:</text><text x="420" y="536" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">какой? какая? какое? какие?</text><text x="420" y="556" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">что делающий? что сделавший?</text><text x="420" y="576" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">что делаемый? что сделанный?</text></svg>