  <text x="138" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Виды выносливости</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Общая — длительная работа</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Специальная — вид спорта</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Скоростная — темп + время</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Силовая — мышцы + время</text>
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Координационная — точность</text>
  <rect x="271" y="72" width="245" height="145" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
