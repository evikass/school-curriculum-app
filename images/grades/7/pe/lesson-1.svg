  <text x="393" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Методы тренировки</text>
  <text x="281" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Равномерный — постоянный темп</text>
  <text x="281" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Переменный — смена скорости</text>
  <text x="281" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Интервальный — работа + отдых</text>
  <text x="281" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Повторный — несколько серий</text>
  <text x="281" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Круговой — станции упражнений</text>
