  <text x="536" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Зона здоровья: 50–60% ЧСС макс</text>
  <text x="536" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Аэробная: 60–75% ЧСС макс</text>
  <text x="536" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Анаэробная: 75–90% ЧСС макс</text>
  <text x="536" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Максимальная: 90–100%</text>
  <text x="536" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Формула: 220 – возраст</text>
