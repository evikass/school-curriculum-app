  <text x="281" y="267" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Постепенность — +10% в неделю</text>
  <text x="281" y="282" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Регулярность — 3–4 раза/нед.</text>
  <text x="281" y="297" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Разнообразие нагрузок</text>
  <text x="281" y="312" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Чередование работы и отдыха</text>
