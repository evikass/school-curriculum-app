  <text x="138" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Упражнения на выносливость</text>
  <text x="26" y="267" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Бег в медленном темпе 10–20 мин</text>
  <text x="26" y="282" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Плавание 400–800 м</text>
  <text x="26" y="297" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Прыжки со скакалкой 3–5 мин</text>
  <text x="26" y="312" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Велосипед 15–30 мин</text>
