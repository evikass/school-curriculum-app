<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#F7FEE7" rx="12" />
  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#84CC16" stroke-width="3" rx="12" />
  <rect x="3" y="3" width="794" height="56" fill="#65A30D" rx="10" />
  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Понятие экосистемы</text>
  <text x="28" y="40" font-size="26">🌿</text>
  <text x="752" y="40" font-size="26">🌿</text>
  <text x="400" y="82" text-anchor="middle" fill="#166534" font-size="15" font-style="italic" font-family="Arial, sans-serif">Экосистема = биоценоз + биотоп (живые + неживые компоненты)</text>
  <circle cx="400" cy="300" r="180" fill="#DCFCE7" stroke="#65A30D" stroke-width="2" opacity="3" />
  <text x="400" y="230" text-anchor="middle" fill="#4D7C0F" font-size="18" font-family="Arial, sans-serif" font-weight="bold">Экосистема</text>
  <ellipse cx="280" cy="310" rx="110" ry="80" fill="#BBF7D0" stroke="#15803D" stroke-width="2" />
  <text x="280" y="305" text-anchor="middle" fill="#15803D" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Биоценоз</text>
  <text x="280" y="322" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">(живые)</text>
  <ellipse cx="520" cy="310" rx="110" ry="80" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" />
  <text x="520" y="305" text-anchor="middle" fill="#3B82F6" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Биотоп</text>
  <text x="520" y="322" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">(неживые)</text>
  <text x="280" y="350" text-anchor="middle" fill="#15803D" font-size="10" font-family="Arial, sans-serif">Продуценты</text>
  <text x="280" y="363" text-anchor="middle" fill="#15803D" font-size="10" font-family="Arial, sans-serif">Консументы</text>
  <text x="280" y="376" text-anchor="middle" fill="#15803D" font-size="10" font-family="Arial, sans-serif">Редуценты</text>
  <text x="520" y="350" text-anchor="middle" fill="#3B82F6" font-size="10" font-family="Arial, sans-serif">Свет, температура</text>
  <text x="520" y="363" text-anchor="middle" fill="#3B82F6" font-size="10" font-family="Arial, sans-serif">Вода, воздух</text>
  <text x="520" y="376" text-anchor="middle" fill="#3B82F6" font-size="10" font-family="Arial, sans-serif">Почва, минералы</text>
  <rect x="40" y="430" width="230" height="140" fill="#DCFCE7" stroke="#65A30D" stroke-width="2" rx="10" />
  <text x="155" y="452" text-anchor="middle" fill="#4D7C0F" font-size="14" font-family="Arial, sans-serif" font-weight="bold">🌿 Продуценты</text>
  <text x="155" y="472" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">(производители)</text>
  <text x="155" y="492" text-anchor="middle" fill="#1A2E05" font-size="12" font-family="Arial, sans-serif">Растения, водоросли</text>
  <text x="155" y="510" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">Создают органику из</text>
  <text x="155" y="525" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">CO₂ + H₂O + свет</text>
  <text x="155" y="542" text-anchor="middle" fill="#4D7C0F" font-size="12" font-family="Arial, sans-serif" font-weight="bold">Фотосинтез!</text>
  <rect x="285" y="430" width="230" height="140" fill="#FEF9C3" stroke="#EA580C" stroke-width="2" rx="10" />
  <text x="400" y="452" text-anchor="middle" fill="#EA580C" font-size="14" font-family="Arial, sans-serif" font-weight="bold">🐾 Консументы</text>
  <text x="400" y="472" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">(потребители)</text>
  <text x="400" y="492" text-anchor="middle" fill="#1A2E05" font-size="12" font-family="Arial, sans-serif">Животные, человек</text>
  <text x="400" y="510" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">I порядка — травоядные</text>
  <text x="400" y="525" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">II порядка — хищники</text>
  <text x="400" y="542" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">III порядка — сверххищники</text>
  <rect x="530" y="430" width="230" height="140" fill="#FEE2E2" stroke="#991B1B" stroke-width="2" rx="10" />
  <text x="645" y="452" text-anchor="middle" fill="#991B1B" font-size="14" font-family="Arial, sans-serif" font-weight="bold">🧪 Редуценты</text>
  <text x="645" y="472" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">(разрушители)</text>
  <text x="645" y="492" text-anchor="middle" fill="#1A2E05" font-size="12" font-family="Arial, sans-serif">Бактерии, грибы</text>
  <text x="645" y="510" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">Разлагают органику до</text>
  <text x="645" y="525" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">неорганических веществ</text>
  <text x="645" y="542" text-anchor="middle" fill="#991B1B" font-size="12" font-family="Arial, sans-serif" font-weight="bold">Замыкают круговорот!</text>
  <line x1="270" y1="500" x2="285" y2="500" stroke="#65A30D" stroke-width="2" />
  <polygon points="285,500 276.33974596215563,505.0 276.33974596215563,495.0" fill="#65A30D" />
  <line x1="515" y1="500" x2="530" y2="500" stroke="#EA580C" stroke-width="2" />
  <polygon points="530,500 521.3397459621556,505.0 521.3397459621556,495.0" fill="#EA580C" />
</svg>