<text x="425" y="281" fill="#6EE7B7" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="normal">1.</text>
<text x="450" y="281" fill="#C084FC" font-size="12" text-anchor="start" font-family="monospace" font-weight="bold">not</text>
