<circle cx="369" cy="449" r="4" fill="#FCD34D"/>
<circle cx="383" cy="449" r="4" fill="#4ADE80"/>
<text x="43" y="477" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="477" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Проверка диапазона</text>
<text x="43" y="492" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="492" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">age = 15</text>
<text x="43" y="507" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="507" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">if age &gt;= 6 and age &lt;= 17:</text>
<text x="43" y="522" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="522" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Школьник&quot;)</text>
<text x="43" y="537" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="537" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="552" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="552" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Любое условие</text>
<text x="43" y="567" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="567" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">day = &quot;суббота&quot;</text>
<text x="43" y="582" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="582" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">if day == &quot;суббота&quot; or day == &quot;воскресенье&quot;:</text>
<text x="43" y="597" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="65" y="597" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Выходной!&quot;)</text>
<rect x="410" y="437" width="355" height="179" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="410" y="437" width="355" height="24" fill="#1E293B" rx="6"/>
<rect x="410" y="455" width="355" height="6" fill="#1E293B" rx="8"/>
