<text x="418" y="477" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="440" y="477" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Отрицание</text>
<text x="418" y="492" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="440" y="492" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">is_rain = False</text>
<text x="418" y="507" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="440" y="507" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">if not is_rain:</text>
<text x="418" y="522" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="440" y="522" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Идём гулять!&quot;)</text>
<text x="418" y="537" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="440" y="537" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="418" y="552" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="440" y="552" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Комбинация</text>
<text x="418" y="567" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="440" y="567" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">x = 10</text>
<text x="418" y="582" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="440" y="582" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">if x &gt; 0 and not x &gt; 100:</text>
<text x="418" y="597" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="440" y="597" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;От 1 до 100&quot;)</text>
