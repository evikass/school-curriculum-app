<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit2)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">🦊 Сказки о животных</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81C784" opacity="0.6"/>
  
  <!-- Trees -->
  <g opacity="0.5">
    <polygon points="30,200 60,120 90,200" fill="#2E7D32"/>
    <polygon points="410,200 450,110 490,200" fill="#2E7D32"/>
  </g>
  
  <!-- Fox (left) -->
  <g transform="translate(120, 180)">
    <ellipse cx="40" cy="60" rx="35" ry="25" fill="#FF7043"/>
    <circle cx="20" cy="40" r="20" fill="#FF7043"/>
    <polygon points="5,25 15,5 25,25" fill="#FF7043"/>
    <polygon points="25,25 35,5 45,25" fill="#FF7043"/>
    <circle cx="12" cy="38" r="4" fill="#FFF"/>
    <circle cx="12" cy="38" r="2" fill="#333"/>
    <ellipse cx="20" cy="48" rx="5" ry="3" fill="#333"/>
    <polygon points="80,55 100,65 80,70" fill="#FFF"/>
    <text x="40" y="100" font-family="Arial, sans-serif" font-size="11" fill="#BF360C" text-anchor="middle">Лиса — хитрая</text>
  </g>
  
  <!-- Wolf (right) -->
  <g transform="translate(300, 185)">
    <ellipse cx="40" cy="55" rx="30" ry="22" fill="#78909C"/>
    <circle cx="25" cy="40" r="18" fill="#78909C"/>
    <polygon points="12,25 18,10 25,25" fill="#78909C"/>
    <polygon points="28,25 35,10 42,25" fill="#78909C"/>
    <circle cx="18" cy="38" r="4" fill="#FFF"/>
    <circle cx="18" cy="38" r="2" fill="#333"/>
    <ellipse cx="25" cy="48" rx="4" ry="3" fill="#333"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="11" fill="#37474F" text-anchor="middle">Волк — глупый</text>
  </g>
  
  <!-- Character traits -->
  <g transform="translate(50, 280)" font-family="Arial, sans-serif" font-size="10">
    <rect x="0" y="0" width="130" height="25" fill="#FFECB3" rx="5"/>
    <text x="65" y="17" fill="#E65100" text-anchor="middle">Медведь — сильный</text>
    
    <rect x="145" y="0" width="130" height="25" fill="#FFECB3" rx="5"/>
    <text x="210" y="17" fill="#E65100" text-anchor="middle">Заяц — трусливый</text>
    
    <rect x="290" y="0" width="130" height="25" fill="#FFECB3" rx="5"/>
    <text x="355" y="17" fill="#E65100" text-anchor="middle">Петух — храбрый</text>
  </g>
  
  <!-- Lesson -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="300" height="45" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="150" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B5E20" text-anchor="middle">В сказках животные ведут себя как люди</text>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">Глупость наказывается, ум помогает!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="50" cy="310" r="5" fill="#E91E63"/>
  <circle cx="450" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="180" cy="160" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="165" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>