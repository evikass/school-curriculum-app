<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg2" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="sh2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg2)"/>
  <rect y="44" width="400" height="8" fill="url(#tg2)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Теория строения орг. соединений</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Left: Butlerov's principles -->
    <rect x="10" y="60" width="190" height="130" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh2)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Положения теории Бутлерова</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">1. Атомы в молекуле соединены</text>
    <text x="22" y="105" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">в опред. порядке (хим. стр-ра)</text>
    <text x="22" y="120" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">2. Свойства зависят от хим.</text>
    <text x="22" y="131" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">строения (порядка связей)</text>
    <text x="22" y="146" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">3. Взаимное влияние атомов</text>
    <text x="22" y="157" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">друг на друга</text>
    <text x="22" y="172" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">4. Строение можно доказать</text>
    <text x="22" y="183" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">химическими методами</text>

  <!-- Right: Isomerism example -->
    <rect x="210" y="60" width="180" height="130" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh2)"/>
    <text x="222" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Изомерия</text>
    <text x="222" y="95" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">C4H10 — 2 изомера:</text>
    <text x="222" y="112" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Бутан:</text>
    <text x="222" y="123" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CH3-CH2-CH2-CH3</text>
    <text x="222" y="140" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">2-Метилпропан:</text>
    <text x="222" y="151" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CH3-CH(CH3)-CH3</text>
    <line x1="222" y1="165" x2="222" y2="178" stroke="#0d9488" stroke-width="1.5"/>
  <polygon points="222,178 217,175 217,181" fill="#0d9488"/>
    <text x="222" y="188" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Состав один, строение</text>
    <text x="222" y="199" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">и свойства разные!</text>

  <!-- Bottom left: Butlerov portrait area -->
    <rect x="10" y="198" width="120" height="92" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh2)"/>
    <text x="22" y="216" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">А.М. Бутлеров</text>
  <circle cx="70" cy="252" r="22" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="70" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#f59e0b">AB</text>
  <text x="70" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">1828-1886</text>
    <text x="22" y="282" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Создатель теории</text>

  <!-- Bottom right: Mutual influence -->
    <rect x="140" y="198" width="250" height="92" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh2)"/>
    <text x="152" y="216" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Взаимное влияние атомов</text>
    <text x="152" y="233" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Пример: CH3-CH2-OH</text>
    <text x="152" y="248" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">OH влияет на C-H связи</text>
    <text x="152" y="261" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">→ водород OH кислотный</text>
    <text x="152" y="276" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">→ C-C связь ослаблена</text>
</svg>