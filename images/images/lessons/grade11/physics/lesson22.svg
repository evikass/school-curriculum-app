<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg22" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg22)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Переменный ток</text>
  <!-- Generator -->
  <text x="100" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Генератор</text>
  <!-- Magnet poles -->
  <rect x="30" y="55" width="25" height="70" rx="3" fill="#ff7675" opacity="0.6"/>
  <text x="42" y="95" text-anchor="middle" fill="#fff" font-size="10">N</text>
  <rect x="145" y="55" width="25" height="70" rx="3" fill="#74b9ff" opacity="0.6"/>
  <text x="157" y="95" text-anchor="middle" fill="#fff" font-size="10">S</text>
  <!-- B field lines -->
  <line x1="60" y1="80" x2="140" y2="80" stroke="#55efc4" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="60" y1="100" x2="140" y2="100" stroke="#55efc4" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Rotating frame -->
  <rect x="80" y="70" width="40" height="40" rx="2" fill="none" stroke="#ffd700" stroke-width="2" transform="rotate(30,100,90)"/>
  <!-- Rotation arrow -->
  <path d="M120,65 Q130,55 125,45" fill="none" stroke="#a29bfe" stroke-width="1.5"/>
  <polygon points="123,47 125,40 129,47" fill="#a29bfe"/>
  <text x="100" y="140" text-anchor="middle" fill="#636e72" font-size="8">рамка вращается</text>
  <!-- EMF graph -->
  <text x="300" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">ЭДС генератора</text>
  <line x1="220" y1="100" x2="395" y2="100" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="220" y1="155" x2="395" y2="155" stroke="#636e72" stroke-width="0.5"/>
  <path d="M220,155 Q240,100 260,155 Q280,210 300,155 Q320,100 340,155 Q360,210 380,155" fill="none" stroke="#55efc4" stroke-width="2"/>
  <text x="398" y="155" fill="#dfe6e9" font-size="7">t</text>
  <text x="208" y="100" fill="#dfe6e9" font-size="7">e</text>
  <!-- Em label -->
  <line x1="215" y1="100" x2="225" y2="100" stroke="#ff7675" stroke-width="0.5"/>
  <text x="200" y="103" fill="#ff7675" font-size="7">E_m</text>
  <!-- Formula -->
  <text x="300" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">ЭДС генератора</text>
  <text x="300" y="195" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">e(t) = E_m sin(wt)</text>
  <!-- Effective values -->
  <rect x="20" y="210" width="185" height="80" rx="8" fill="#2d3436" opacity="0.7"/>
  <text x="112" y="230" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Действующие значения</text>
  <text x="35" y="250" fill="#ff7675" font-size="11" font-weight="bold">I_д = I_m / sqrt(2)</text>
  <text x="35" y="270" fill="#74b9ff" font-size="11" font-weight="bold">U_д = U_m / sqrt(2)</text>
  <text x="35" y="285" fill="#636e72" font-size="8">= 0,707 * I_m (U_m)</text>
  <!-- Standard -->
  <rect x="215" y="210" width="175" height="80" rx="8" fill="#2d3436" opacity="0.7"/>
  <text x="302" y="230" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Стандарт (Россия)</text>
  <text x="230" y="250" fill="#55efc4" font-size="10">U_д = 220 В</text>
  <text x="230" y="267" fill="#74b9ff" font-size="10">f = 50 Гц</text>
  <text x="230" y="284" fill="#ff7675" font-size="10">U_m = 311 В</text>
</svg>