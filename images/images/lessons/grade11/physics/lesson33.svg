<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Дифракция света</text>
<!-- Diffraction grating -->
<text x="120" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Дифракционная решётка</text>
<!-- Grating lines -->
<g stroke="#55efc4" stroke-width="1.5">
<line x1="40" y1="55" x2="40" y2="120"/>
<line x1="48" y1="55" x2="48" y2="120"/>
<line x1="56" y1="55" x2="56" y2="120"/>
<line x1="64" y1="55" x2="64" y2="120"/>
<line x1="72" y1="55" x2="72" y2="120"/>
<line x1="80" y1="55" x2="80" y2="120"/>
<line x1="88" y1="55" x2="88" y2="120"/>
<line x1="96" y1="55" x2="96" y2="120"/>
</g>
<text x="68" y="130" text-anchor="middle" fill="#55efc4" font-size="8">d = период</text>
<!-- Incoming ray -->
<line x1="10" y1="85" x2="40" y2="85" stroke="#ffd700" stroke-width="1.5"/>
<!-- Diffracted rays -->
<line x1="96" y1="85" x2="140" y2="85" stroke="#ffd700" stroke-width="1.5"/>
<line x1="96" y1="85" x2="150" y2="70" stroke="#ff7675" stroke-width="1"/>
<line x1="96" y1="85" x2="150" y2="100" stroke="#ff7675" stroke-width="1"/>
<line x1="96" y1="85" x2="155" y2="55" stroke="#74b9ff" stroke-width="0.8"/>
<line x1="96" y1="85" x2="155" y2="115" stroke="#74b9ff" stroke-width="0.8"/>
<text x="165" y="85" fill="#ffd700" font-size="7">k=0</text>
<text x="160" y="68" fill="#ff7675" font-size="7">k=1</text>
<text x="165" y="53" fill="#74b9ff" font-size="7">k=2</text>
<!-- Formula -->
<text x="290" y="60" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Формула решётки</text>
<text x="290" y="82" text-anchor="middle" fill="#55efc4" font-size="16" font-weight="bold">d*sin(ф) = kl</text>
<text x="290" y="100" text-anchor="middle" fill="#636e72" font-size="8">k = 0, 1, 2, ...</text>
<text x="290" y="115" text-anchor="middle" fill="#ff7675" font-size="9">R = kN (разр. спос.)</text>
<!-- Huygens-Fresnel -->
<rect x="20" y="140" width="360" height="60" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="160" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Принцип Гюйгенса-Френеля</text>
<!-- Wavefront -->
<line x1="40" y1="175" x2="40" y2="190" stroke="#55efc4" stroke-width="2"/>
<!-- Secondary wavelets -->
<circle cx="40" cy="178" r="10" fill="none" stroke="#74b9ff" stroke-width="0.8" stroke-dasharray="2,2"/>
<circle cx="40" cy="185" r="10" fill="none" stroke="#74b9ff" stroke-width="0.8" stroke-dasharray="2,2"/>
<!-- New wavefront -->
<path d="M50,170 Q55,178 50,190" fill="none" stroke="#55efc4" stroke-width="1.5"/>
<text x="200" y="193" text-anchor="middle" fill="#636e72" font-size="7">Каждая точка фронта — источник вторичных волн</text>
<!-- Diffraction conditions -->
<rect x="20" y="210" width="360" height="80" rx="8" fill="#2d3436" opacity="0.5"/>
<text x="200" y="230" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Когда дифракция заметна?</text>
<text x="200" y="250" text-anchor="middle" fill="#55efc4" font-size="10">Размер отверстия ~ длине волны l</text>
<text x="200" y="268" text-anchor="middle" fill="#636e72" font-size="8">a >> l: дифракция незаметна (прямолин. распространение)</text>
<text x="200" y="283" text-anchor="middle" fill="#636e72" font-size="8">a ~ l: свет заходит в область тени</text>
</svg>