<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Линзы</text>
<!-- Convex lens -->
<text x="110" y="48" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Собирающая</text>
<path d="M90,60 Q110,80 90,100" fill="none" stroke="#55efc4" stroke-width="2.5"/>
<path d="M130,60 Q110,80 130,100" fill="none" stroke="#55efc4" stroke-width="2.5"/>
<!-- Parallel rays converging -->
<line x1="40" y1="70" x2="90" y2="70" stroke="#ffd700" stroke-width="1"/>
<line x1="90" y1="70" x2="150" y2="80" stroke="#ffd700" stroke-width="1"/>
<line x1="40" y1="80" x2="110" y2="80" stroke="#ffd700" stroke-width="1"/>
<line x1="110" y1="80" x2="150" y2="80" stroke="#ffd700" stroke-width="1"/>
<line x1="40" y1="90" x2="90" y2="90" stroke="#ffd700" stroke-width="1"/>
<line x1="90" y1="90" x2="150" y2="80" stroke="#ffd700" stroke-width="1"/>
<circle cx="150" cy="80" r="3" fill="#ffd700"/>
<text x="155" y="78" fill="#ffd700" font-size="8">F</text>
<!-- Concave lens -->
<text x="300" y="48" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Рассеивающая</text>
<path d="M280,60 Q300,80 280,100" fill="none" stroke="#ff7675" stroke-width="2.5"/>
<path d="M320,60 Q300,80 320,100" fill="none" stroke="#ff7675" stroke-width="2.5"/>
<!-- Parallel rays diverging -->
<line x1="230" y1="70" x2="290" y2="70" stroke="#ffd700" stroke-width="1"/>
<line x1="290" y1="70" x2="340" y2="55" stroke="#ffd700" stroke-width="1"/>
<line x1="230" y1="80" x2="310" y2="80" stroke="#ffd700" stroke-width="1"/>
<line x1="310" y1="80" x2="340" y2="78" stroke="#ffd700" stroke-width="1"/>
<line x1="230" y1="90" x2="290" y2="90" stroke="#ffd700" stroke-width="1"/>
<line x1="290" y1="90" x2="340" y2="100" stroke="#ffd700" stroke-width="1"/>
<!-- Virtual focus -->
<line x1="290" y1="70" x2="260" y2="80" stroke="#ffd700" stroke-width="0.5" stroke-dasharray="2,2"/>
<circle cx="258" cy="80" r="3" fill="none" stroke="#ffd700" stroke-width="1"/>
<text x="240" y="78" fill="#ffd700" font-size="8">F (мнимый)</text>
<!-- Formula -->
<text x="200" y="130" text-anchor="middle" fill="#ffeaa7" font-size="14" font-weight="bold">1/F = 1/d + 1/f</text>
<text x="200" y="150" text-anchor="middle" fill="#55efc4" font-size="11">D = 1/F [дптр]</text>
<!-- Image cases -->
<rect x="10" y="160" width="380" height="130" rx="8" fill="#2d3436" opacity="0.5"/>
<text x="200" y="180" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Изображения в собирающей линзе</text>
<text x="80" y="198" fill="#55efc4" font-size="8">d>2F: действ., уменьш.</text>
<text x="80" y="212" fill="#74b9ff" font-size="8">d=2F: действ., равное</text>
<text x="80" y="226" fill="#a29bfe" font-size="8">F&lt;d&lt;2F: действ., увелич.</text>
<text x="80" y="240" fill="#ffd700" font-size="8">d=F: нет изображения</text>
<text x="80" y="254" fill="#ff7675" font-size="8">d&lt;F: мнимое, увелич., прямое</text>
<text x="280" y="198" fill="#636e72" font-size="8">перевёрнутое</text>
<text x="280" y="212" fill="#636e72" font-size="8">перевёрнутое</text>
<text x="280" y="226" fill="#636e72" font-size="8">перевёрнутое</text>
<text x="280" y="240" fill="#636e72" font-size="8">(лучи ||)</text>
<text x="280" y="254" fill="#636e72" font-size="8">(лупа!)</text>
<text x="200" y="280" text-anchor="middle" fill="#dfe6e9" font-size="9">Увеличение: Г = f/d = H/h</text>
</svg>