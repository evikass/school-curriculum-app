<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg24" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="activityGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="40%" style="stop-color:#d97706"/>
      <stop offset="60%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <filter id="glow24">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg24)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Химические свойства металлов</text>

  <!-- Divider -->
  <line x1="50" y1="48" x2="750" y2="48" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- === REACTION 1: Metal + O2 === -->
  <rect x="30" y="58" width="175" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <rect x="35" y="62" width="165" height="22" rx="4" fill="rgba(239,68,68,0.15)"/>
  <text x="117" y="78" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">Me + O₂ → оксид</text>

  <!-- Flame symbol -->
  <path d="M90,120 C90,105 100,95 100,85 C100,95 110,105 110,120 C110,128 105,132 100,132 C95,132 90,128 90,120Z" fill="#ef4444" opacity="0.8" filter="url(#flameGlow)"/>
  <path d="M95,120 C95,112 100,107 100,100 C100,107 105,112 105,120 C105,125 103,127 100,127 C97,127 95,125 95,120Z" fill="#f59e0b" opacity="0.9"/>

  <!-- Metal piece -->
  <rect x="115" y="115" width="30" height="20" rx="3" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1"/>
  <text x="130" y="129" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Me</text>

  <!-- O2 label -->
  <text x="80" y="148" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">O₂</text>

  <!-- Equation example -->
  <text x="117" y="170" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">2Mg + O₂ → 2MgO</text>
  <text x="117" y="185" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">(горение на воздухе)</text>

  <!-- === REACTION 2: Metal + H2O === -->
  <rect x="218" y="58" width="175" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <rect x="223" y="62" width="165" height="22" rx="4" fill="rgba(20,184,166,0.15)"/>
  <text x="305" y="78" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Me + H₂O → щёлочь + H₂↑</text>

  <!-- Water beaker -->
  <rect x="270" y="100" width="35" height="30" rx="2" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="272" y="110" width="31" height="18" rx="0" fill="rgba(14,116,144,0.3)"/>
  <text x="287" y="130" font-family="Arial, sans-serif" font-size="8" fill="#67e8f9" text-anchor="middle">H₂O</text>

  <!-- Bubbles -->
  <circle cx="295" cy="107" r="3" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.7"/>
  <circle cx="300" cy="100" r="2.5" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.5"/>
  <circle cx="290" cy="95" r="2" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>

  <!-- H2 gas -->
  <text x="310" y="100" font-family="Arial, sans-serif" font-size="9" fill="#5eead4" font-weight="bold">H₂↑</text>

  <!-- Metal piece -->
  <rect x="310" y="115" width="30" height="20" rx="3" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1"/>
  <text x="325" y="129" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Na</text>

  <!-- Equation example -->
  <text x="305" y="168" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">2Na + 2H₂O →</text>
  <text x="305" y="183" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">2NaOH + H₂↑</text>
  <text x="305" y="197" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(активные Me)</text>

  <!-- === REACTION 3: Metal + Acid === -->
  <rect x="406" y="58" width="175" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <rect x="411" y="62" width="165" height="22" rx="4" fill="rgba(139,92,246,0.15)"/>
  <text x="493" y="78" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Me + кислота → соль + H₂↑</text>

  <!-- Acid bottle -->
  <path d="M465,100 L465,108 L460,108 L460,130 L490,130 L490,108 L485,108 L485,100 Z" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="462" y="115" width="26" height="13" fill="rgba(139,92,246,0.2)"/>
  <text x="475" y="125" font-family="Arial, sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">HCl</text>

  <!-- Bubbles from acid -->
  <circle cx="495" cy="110" r="2.5" fill="none" stroke="#c4b5fd" stroke-width="0.8" opacity="0.6"/>
  <circle cx="500" cy="103" r="2" fill="none" stroke="#c4b5fd" stroke-width="0.8" opacity="0.4"/>

  <!-- Metal in acid -->
  <rect x="500" y="115" width="25" height="18" rx="3" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1"/>
  <text x="512" y="128" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Zn</text>

  <!-- H2 gas -->
  <text x="510" y="98" font-family="Arial, sans-serif" font-size="9" fill="#c4b5fd" font-weight="bold">H₂↑</text>

  <!-- Equation example -->
  <text x="493" y="165" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">Zn + 2HCl →</text>
  <text x="493" y="180" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">ZnCl₂ + H₂↑</text>
  <text x="493" y="197" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(Me до H в ряду)</text>

  <!-- === REACTION 4: Metal + Salt === -->
  <rect x="594" y="58" width="175" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <rect x="599" y="62" width="165" height="22" rx="4" fill="rgba(245,158,11,0.15)"/>
  <text x="681" y="78" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="bold">Me + соль → Me + соль</text>

  <!-- Two metals -->
  <rect x="635" y="105" width="25" height="18" rx="3" fill="rgba(245,158,11,0.5)" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="647" y="118" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Fe</text>

  <!-- Arrow -->
  <line x1="665" y1="114" x2="690" y2="114" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="690,110 696,114 690,118" fill="#94a3b8"/>

  <rect x="700" y="105" width="25" height="18" rx="3" fill="rgba(20,184,166,0.4)" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="712" y="118" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">Cu</text>

  <!-- Salt solution -->
  <rect x="645" y="130" width="60" height="15" rx="2" fill="rgba(14,116,144,0.2)"/>
  <text x="675" y="141" font-family="Arial, sans-serif" font-size="8" fill="#67e8f9" text-anchor="middle">CuSO₄</text>

  <!-- Equation example -->
  <text x="681" y="168" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">Fe + CuSO₄ →</text>
  <text x="681" y="183" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">FeSO₄ + Cu↓</text>
  <text x="681" y="197" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">(замещение)</text>

  <!-- === ACTIVITY SERIES (Электрохимический ряд напряжений) === -->
  <rect x="30" y="215" width="740" height="90" rx="10" fill="rgba(30,41,59,0.9)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="237" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Электрохимический ряд напряжений металлов</text>

  <!-- Activity arrow -->
  <line x1="55" y1="260" x2="745" y2="260" stroke="#475569" stroke-width="2"/>
  <polygon points="745,256 755,260 745,264" fill="#475569"/>
  <text x="765" y="264" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">↑Активность</text>

  <!-- Active metals (amber/gold) -->
  <rect x="52" y="250" width="26" height="22" rx="4" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1"/>
  <text x="65" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">K</text>

  <rect x="82" y="250" width="26" height="22" rx="4" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1"/>
  <text x="95" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na</text>

  <rect x="112" y="250" width="26" height="22" rx="4" fill="rgba(245,158,11,0.35)" stroke="#d97706" stroke-width="1"/>
  <text x="125" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Ca</text>

  <rect x="142" y="250" width="26" height="22" rx="4" fill="rgba(245,158,11,0.3)" stroke="#d97706" stroke-width="1"/>
  <text x="155" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Mg</text>

  <rect x="172" y="250" width="26" height="22" rx="4" fill="rgba(245,158,11,0.25)" stroke="#d97706" stroke-width="1"/>
  <text x="185" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Al</text>

  <rect x="202" y="250" width="26" height="22" rx="4" fill="rgba(251,191,36,0.2)" stroke="#d97706" stroke-width="0.8"/>
  <text x="215" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fcd34d" text-anchor="middle" font-weight="bold">Zn</text>

  <rect x="232" y="250" width="26" height="22" rx="4" fill="rgba(251,191,36,0.2)" stroke="#d97706" stroke-width="0.8"/>
  <text x="245" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fcd34d" text-anchor="middle" font-weight="bold">Fe</text>

  <rect x="262" y="250" width="26" height="22" rx="4" fill="rgba(251,191,36,0.15)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="275" y="265" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Ni</text>

  <rect x="292" y="250" width="26" height="22" rx="4" fill="rgba(251,191,36,0.15)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="305" y="265" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Sn</text>

  <rect x="322" y="250" width="26" height="22" rx="4" fill="rgba(251,191,36,0.15)" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="335" y="265" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Pb</text>

  <!-- HYDROGEN divider -->
  <rect x="356" y="246" width="30" height="30" rx="5" fill="rgba(239,68,68,0.25)" stroke="#ef4444" stroke-width="2"/>
  <text x="371" y="266" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">H</text>
  <text x="371" y="290" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">разделитель</text>

  <!-- Less active metals (gray) -->
  <rect x="392" y="250" width="26" height="22" rx="4" fill="rgba(100,116,139,0.3)" stroke="#64748b" stroke-width="0.8"/>
  <text x="405" y="265" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-weight="bold">Cu</text>

  <rect x="422" y="250" width="26" height="22" rx="4" fill="rgba(100,116,139,0.25)" stroke="#64748b" stroke-width="0.8"/>
  <text x="435" y="265" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-weight="bold">Hg</text>

  <rect x="452" y="250" width="26" height="22" rx="4" fill="rgba(100,116,139,0.2)" stroke="#64748b" stroke-width="0.8"/>
  <text x="465" y="265" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-weight="bold">Ag</text>

  <rect x="482" y="250" width="26" height="22" rx="4" fill="rgba(100,116,139,0.15)" stroke="#64748b" stroke-width="0.8"/>
  <text x="495" y="265" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" font-weight="bold">Au</text>

  <!-- Activity direction labels -->
  <text x="100" y="298" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">← Активные Me</text>
  <text x="240" y="298" font-family="Arial, sans-serif" font-size="9" fill="#d97706" text-anchor="middle">Средней активности</text>
  <text x="460" y="298" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Малоактивные Me →</text>

  <!-- === BOTTOM KEY RULES === -->
  <rect x="30" y="320" width="740" height="170" rx="10" fill="rgba(30,41,59,0.7)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="342" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Ключевые правила реакций металлов</text>

  <!-- Rule 1 -->
  <rect x="50" y="355" width="345" height="38" rx="6" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="0.8"/>
  <text x="60" y="372" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" font-weight="bold">H₂O:</text>
  <text x="100" y="372" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Li—Na → щёлочь + H₂↑ (холодная)</text>
  <text x="100" y="387" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Mg—Pb → оксид + H₂↑ (пар)</text>

  <!-- Rule 2 -->
  <rect x="410" y="355" width="345" height="38" rx="6" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="420" y="372" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" font-weight="bold">Кислоты:</text>
  <text x="490" y="372" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Me до H → соль + H₂↑</text>
  <text x="490" y="387" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Me после H → нет реакции</text>

  <!-- Rule 3 -->
  <rect x="50" y="400" width="345" height="38" rx="6" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="60" y="417" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" font-weight="bold">Соли:</text>
  <text x="100" y="417" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">Более активный Me вытесняет</text>
  <text x="100" y="432" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">менее активный из раствора соли</text>

  <!-- Rule 4 -->
  <rect x="410" y="400" width="345" height="38" rx="6" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.8"/>
  <text x="420" y="417" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" font-weight="bold">Исключения:</text>
  <text x="510" y="417" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">HNO₃, H₂SO₄(конц.) → не H₂</text>
  <text x="510" y="432" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">а другие продукты (NO, SO₂)</text>

  <!-- Summary box -->
  <rect x="150" y="450" width="500" height="30" rx="6" fill="rgba(14,165,233,0.1)" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="bold">Чем левее Me в ряду — тем активнее, легче отдаёт ē</text>
</svg>