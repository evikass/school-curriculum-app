<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg39" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="hdr39" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow39">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong39">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg39)" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="44" fill="url(#hdr39)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#hdr39)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Обобщение и систематизация знаний по химии</text>

  <!-- === CENTRAL NODE: ХИМИЯ === -->
  <circle cx="400" cy="270" r="65" fill="url(#centerGlow)"/>
  <circle cx="400" cy="270" r="46" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="2" filter="url(#glowStrong39)"/>
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="20" fill="#14b8a6" text-anchor="middle" font-weight="bold" filter="url(#glow39)">ХИМИЯ</text>
  <text x="400" y="282" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">11 класс</text>

  <!-- === GLOWING CONNECTION LINES === -->
  <!-- To Строение атома (top-left) -->
  <line x1="365" y1="237" x2="195" y2="145" stroke="#14b8a6" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>
  <!-- To Периодический закон (top) -->
  <line x1="400" y1="224" x2="400" y2="138" stroke="#f59e0b" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>
  <!-- To Химическая связь (top-right) -->
  <line x1="435" y1="237" x2="605" y2="145" stroke="#8b5cf6" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>
  <!-- To Химические реакции (right) -->
  <line x1="446" y1="270" x2="610" y2="270" stroke="#ef4444" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>
  <!-- To Металлы (bottom-right) -->
  <line x1="435" y1="303" x2="595" y2="395" stroke="#f59e0b" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>
  <!-- To Неметаллы (bottom-left) -->
  <line x1="365" y1="303" x2="205" y2="395" stroke="#8b5cf6" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>
  <!-- To Химия и жизнь (bottom) -->
  <line x1="400" y1="316" x2="400" y2="400" stroke="#10b981" stroke-width="2" opacity="0.5" filter="url(#glow39)"/>

  <!-- === BRANCH 1: Строение атома (top-left) === -->
  <rect x="75" y="80" width="200" height="100" rx="8" fill="rgba(30,41,59,0.85)" stroke="#14b8a6" stroke-width="1.2"/>
  <!-- Atom icon -->
  <ellipse cx="115" cy="108" rx="14" ry="8" fill="none" stroke="#14b8a6" stroke-width="0.8" transform="rotate(-30 115 108)"/>
  <ellipse cx="115" cy="108" rx="14" ry="8" fill="none" stroke="#14b8a6" stroke-width="0.8" transform="rotate(30 115 108)"/>
  <ellipse cx="115" cy="108" rx="14" ry="8" fill="none" stroke="#14b8a6" stroke-width="0.8"/>
  <circle cx="115" cy="108" r="3" fill="#14b8a6"/>
  <text x="175" y="106" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" font-weight="bold" text-anchor="middle">Строение атома</text>
  <line x1="90" y1="116" x2="260" y2="116" stroke="#14b8a6" stroke-width="0.5" opacity="0.5"/>
  <text x="85" y="130" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Протоны, нейтроны, электроны</text>
  <text x="85" y="143" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Электронные конфигурации</text>
  <text x="85" y="156" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Изотопы, квантовые числа</text>
  <text x="85" y="169" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Правило Клечковского</text>

  <!-- === BRANCH 2: Периодический закон (top) === -->
  <rect x="300" y="54" width="200" height="84" rx="8" fill="rgba(30,41,59,0.85)" stroke="#f59e0b" stroke-width="1.2"/>
  <!-- Periodic table mini icon -->
  <rect x="314" y="64" width="8" height="8" rx="1" fill="#f59e0b" opacity="0.5"/>
  <rect x="324" y="64" width="8" height="8" rx="1" fill="#f59e0b" opacity="0.4"/>
  <rect x="334" y="64" width="8" height="8" rx="1" fill="#f59e0b" opacity="0.3"/>
  <rect x="344" y="64" width="8" height="8" rx="1" fill="#f59e0b" opacity="0.2"/>
  <rect x="314" y="74" width="8" height="8" rx="1" fill="#14b8a6" opacity="0.4"/>
  <rect x="324" y="74" width="8" height="8" rx="1" fill="#8b5cf6" opacity="0.4"/>
  <rect x="334" y="74" width="8" height="8" rx="1" fill="#8b5cf6" opacity="0.3"/>
  <rect x="344" y="74" width="8" height="8" rx="1" fill="#8b5cf6" opacity="0.2"/>
  <text x="420" y="76" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" font-weight="bold" text-anchor="middle">Периодический закон</text>
  <line x1="310" y1="82" x2="490" y2="82" stroke="#f59e0b" stroke-width="0.5" opacity="0.5"/>
  <text x="310" y="95" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Закон Менделеева</text>
  <text x="310" y="108" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Периоды и группы</text>
  <text x="310" y="121" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Периодические свойства</text>
  <text x="310" y="134" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Электроотрицательность</text>

  <!-- === BRANCH 3: Химическая связь (top-right) === -->
  <rect x="525" y="80" width="200" height="100" rx="8" fill="rgba(30,41,59,0.85)" stroke="#8b5cf6" stroke-width="1.2"/>
  <!-- Bond icon -->
  <circle cx="565" cy="104" r="6" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  <line x1="571" y1="104" x2="590" y2="104" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="596" cy="104" r="6" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  <text x="655" y="104" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" font-weight="bold" text-anchor="middle">Хим. связь</text>
  <line x1="535" y1="114" x2="715" y2="114" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
  <text x="535" y="128" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Ковалентная (полярная, неполярная)</text>
  <text x="535" y="141" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Ионная связь</text>
  <text x="535" y="154" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Металлическая связь</text>
  <text x="535" y="167" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Водородная связь, σ и π связи</text>

  <!-- === BRANCH 4: Химические реакции (right) === -->
  <rect x="610" y="220" width="175" height="100" rx="8" fill="rgba(30,41,59,0.85)" stroke="#ef4444" stroke-width="1.2"/>
  <!-- Reaction arrow icon -->
  <text x="640" y="244" font-family="Arial, sans-serif" font-size="14" fill="#ef4444">→</text>
  <text x="700" y="244" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" font-weight="bold" text-anchor="middle">Хим. реакции</text>
  <line x1="620" y1="252" x2="775" y2="252" stroke="#ef4444" stroke-width="0.5" opacity="0.5"/>
  <text x="620" y="266" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Типы: соед., разл., зам., обм.</text>
  <text x="620" y="279" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• ОВР, электрохим. ряд</text>
  <text x="620" y="292" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Скорость, равновесие</text>
  <text x="620" y="305" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Термодинамика (ΔH, ΔG)</text>

  <!-- === BRANCH 5: Металлы (bottom-right) === -->
  <rect x="535" y="370" width="185" height="100" rx="8" fill="rgba(30,41,59,0.85)" stroke="#f59e0b" stroke-width="1.2"/>
  <!-- Metal icon -->
  <rect x="548" y="382" width="16" height="16" rx="2" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="556" y="394" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Fe</text>
  <text x="640" y="394" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" font-weight="bold" text-anchor="middle">Металлы</text>
  <line x1="545" y1="402" x2="710" y2="402" stroke="#f59e0b" stroke-width="0.5" opacity="0.5"/>
  <text x="545" y="416" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Щелочные, щёлочноземельные</text>
  <text x="545" y="429" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Al, Fe, Cu и сплавы</text>
  <text x="545" y="442" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Коррозия и защита</text>
  <text x="545" y="455" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Электролиз, металлургия</text>

  <!-- === BRANCH 6: Неметаллы (bottom-left) === -->
  <rect x="80" y="370" width="185" height="100" rx="8" fill="rgba(30,41,59,0.85)" stroke="#8b5cf6" stroke-width="1.2"/>
  <!-- Nonmetal icon -->
  <circle cx="112" cy="393" r="10" fill="none" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="112" y="397" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">N</text>
  <text x="190" y="394" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" font-weight="bold" text-anchor="middle">Неметаллы</text>
  <line x1="90" y1="402" x2="255" y2="402" stroke="#8b5cf6" stroke-width="0.5" opacity="0.5"/>
  <text x="90" y="416" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Галогены (F, Cl, Br, I)</text>
  <text x="90" y="429" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Халькогены (O, S, Se)</text>
  <text x="90" y="442" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Благородные газы</text>
  <text x="90" y="455" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Оксиды, кислоты, водород</text>

  <!-- === BRANCH 7: Химия и жизнь (bottom) === -->
  <rect x="300" y="395" width="200" height="84" rx="8" fill="rgba(30,41,59,0.85)" stroke="#10b981" stroke-width="1.2"/>
  <!-- Life icon (DNA helix suggestion) -->
  <path d="M316 405 Q326 412 316 419 Q326 426 316 433" fill="none" stroke="#10b981" stroke-width="1"/>
  <path d="M328 405 Q318 412 328 419 Q318 426 328 433" fill="none" stroke="#10b981" stroke-width="1"/>
  <line x1="316" y1="408" x2="328" y2="408" stroke="#10b981" stroke-width="0.5"/>
  <line x1="316" y1="415" x2="328" y2="415" stroke="#10b981" stroke-width="0.5"/>
  <line x1="316" y1="422" x2="328" y2="422" stroke="#10b981" stroke-width="0.5"/>
  <line x1="316" y1="429" x2="328" y2="429" stroke="#10b981" stroke-width="0.5"/>
  <text x="420" y="414" font-family="Arial, sans-serif" font-size="11" fill="#10b981" font-weight="bold" text-anchor="middle">Химия и жизнь</text>
  <line x1="310" y1="420" x2="490" y2="420" stroke="#10b981" stroke-width="0.5" opacity="0.5"/>
  <text x="310" y="434" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Промышленность и с/х</text>
  <text x="310" y="447" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Экология и защита среды</text>
  <text x="310" y="460" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Биохимия, медицина</text>
  <text x="310" y="473" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Зелёная химия, нанотехнологии</text>

  <!-- === DECORATIVE: small floating particles for visual appeal === -->
  <circle cx="50" cy="290" r="2" fill="#14b8a6" opacity="0.3"/>
  <circle cx="750" cy="150" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="700" cy="430" r="1.5" fill="#f59e0b" opacity="0.25"/>
  <circle cx="100" cy="450" r="1.5" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="470" cy="175" r="1.5" fill="#14b8a6" opacity="0.2"/>
  <circle cx="330" cy="350" r="1.5" fill="#10b981" opacity="0.2"/>
  <circle cx="560" cy="340" r="1.5" fill="#ef4444" opacity="0.2"/>
  <circle cx="240" cy="260" r="1.5" fill="#f59e0b" opacity="0.2"/>
</svg>