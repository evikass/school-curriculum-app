<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" filter="url(#glow)">Урок 20: Химическое равновесие</text>
  <text x="400" y="68" text-anchor="middle" fill="#94a3b8" font-size="12">Тема 4: Химические реакции</text>

  <!-- Reversible reaction -->
  <rect x="20" y="78" width="760" height="48" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Обратимая реакция: N₂ + 3H₂ ⇌ 2NH₃</text>
  <text x="400" y="118" text-anchor="middle" fill="#94a3b8" font-size="11">Равновесие: скорость прямой = скорости обратной реакции</text>

  <!-- Equilibrium constant -->
  <rect x="20" y="134" width="370" height="55" rx="8" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="205" y="156" text-anchor="middle" fill="#14b8a6" font-size="13" font-weight="bold">Константа равновесия</text>
  <text x="205" y="176" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">K = [NH₃]² / ([N₂]·[H₂]³)</text>

  <!-- Equilibrium visual — arrows -->
  <rect x="410" y="134" width="370" height="55" rx="8" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1"/>
  <text x="595" y="155" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">В равновесии:</text>
  <text x="530" y="177" text-anchor="middle" fill="#14b8a6" font-size="14">→ v₁</text>
  <text x="595" y="177" text-anchor="middle" fill="#ffffff" font-size="14">=</text>
  <text x="660" y="177" text-anchor="middle" fill="#8b5cf6" font-size="14">v₂ ←</text>

  <!-- Le Chatelier's principle -->
  <rect x="20" y="198" width="760" height="30" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="218" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Принцип Ле Шателье: при нарушении равновесия система смещается, чтобы противодействовать изменению</text>

  <!-- Le Chatelier shifts — 3 cards -->
  <text x="40" y="248" fill="#10b981" font-size="13" font-weight="bold">Смещение равновесия:</text>

  <!-- Shift 1: Concentration -->
  <rect x="20" y="256" width="240" height="80" rx="8" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
  <text x="140" y="276" text-anchor="middle" fill="#14b8a6" font-size="12" font-weight="bold">↑[Реагента]</text>
  <text x="140" y="296" text-anchor="middle" fill="#f59e0b" font-size="16">→ смещение →</text>
  <text x="140" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">(в сторону продуктов)</text>
  <text x="140" y="328" text-anchor="middle" fill="#94a3b8" font-size="9">↑[N₂] → смещение → к NH₃</text>

  <!-- Shift 2: Temperature -->
  <rect x="270" y="256" width="260" height="80" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
  <text x="400" y="276" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">↑T (эндотермическая)</text>
  <text x="400" y="296" text-anchor="middle" fill="#f59e0b" font-size="16">→ смещение →</text>
  <text x="400" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">(в сторону эндотермической)</text>
  <text x="400" y="328" text-anchor="middle" fill="#94a3b8" font-size="9">Синтез NH₃ экзотерм. → ↑T сдвигает ←</text>

  <!-- Shift 3: Pressure -->
  <rect x="540" y="256" width="240" height="80" rx="8" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="276" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">↑P (для газов)</text>
  <text x="660" y="296" text-anchor="middle" fill="#f59e0b" font-size="16">→ к меньшему V</text>
  <text x="660" y="314" text-anchor="middle" fill="#94a3b8" font-size="10">(к меньшему числу молей)</text>
  <text x="660" y="328" text-anchor="middle" fill="#94a3b8" font-size="9">4 моль → 2 моль: ↑P → к NH₃</text>

  <!-- Balance scale visual -->
  <rect x="20" y="348" width="370" height="110" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#10b981" stroke-width="1"/>
  <text x="205" y="368" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">Визуализация равновесия</text>

  <!-- Scale -->
  <polygon points="205,385 195,395 215,395" fill="#94a3b8"/>
  <line x1="205" y1="395" x2="205" y2="445" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Balance beam -->
  <line x1="130" y1="400" x2="280" y2="400" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Left pan -->
  <line x1="130" y1="400" x2="120" y2="420" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="130" y1="400" x2="140" y2="420" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="105" y="420" width="50" height="6" rx="3" fill="#14b8a6"/>
  <text x="130" y="440" text-anchor="middle" fill="#14b8a6" font-size="10">→ Прямая</text>
  <!-- Right pan -->
  <line x1="280" y1="400" x2="270" y2="420" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="280" y1="400" x2="290" y2="420" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="255" y="420" width="50" height="6" rx="3" fill="#8b5cf6"/>
  <text x="280" y="440" text-anchor="middle" fill="#8b5cf6" font-size="10">← Обратная</text>
  <text x="205" y="454" text-anchor="middle" fill="#94a3b8" font-size="10">v₁ = v₂ — динамическое равновесие</text>

  <!-- Summary of key conditions for N₂+3H₂⇌2NH₃ -->
  <rect x="410" y="348" width="370" height="110" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="595" y="370" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Оптимальные условия (Haber):</text>
  <text x="430" y="392" fill="#14b8a6" font-size="11">• Катализатор: Fe (железо)</text>
  <text x="430" y="410" fill="#14b8a6" font-size="11">• Температура: ~450°C</text>
  <text x="430" y="428" fill="#14b8a6" font-size="11">• Давление: 200 атм (→ к NH₃)</text>
  <text x="430" y="446" fill="#ef4444" font-size="11">• ↑T сдвигает ← но ↑v → компромисс</text>

  <!-- Bottom line -->
  <line x1="20" y1="470" x2="780" y2="470" stroke="#14b8a6" stroke-width="1" opacity="0.3"/>
  <text x="400" y="490" text-anchor="middle" fill="#94a3b8" font-size="11">Химическое равновесие — динамическое состояние: реакции идут, но концентрации не меняются</text>
</svg>