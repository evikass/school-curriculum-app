<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#header)" rx="0"/>
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Урок 13: Водородная связь. Межмолекулярные взаимодействия</text>
  <!-- Section 1: Hydrogen Bond Definition -->
  <rect x="20" y="64" width="370" height="110" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="205" y="86" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Водородная связь</text>
  <text x="40" y="106" fill="#ffffff" font-size="12">H связан с F, O или N взаимодействует</text>
  <text x="40" y="122" fill="#ffffff" font-size="12">с неподелённой парой другого атома</text>
  <!-- Visual: H-bond between two molecules -->
  <!-- Molecule 1 -->
  <circle cx="80" cy="155" r="14" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="80" y="159" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">O</text>
  <text x="80" y="145" text-anchor="middle" fill="#ef4444" font-size="8">δ−</text>
  <line x1="94" y1="155" x2="110" y2="155" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="118" cy="155" r="8" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="118" y="159" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">H</text>
  <text x="118" y="145" text-anchor="middle" fill="#f59e0b" font-size="8">δ+</text>
  <!-- Hydrogen bond (dashed) -->
  <line x1="126" y1="155" x2="170" y2="155" stroke="#14b8a6" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#glowSm)"/>
  <text x="148" y="148" text-anchor="middle" fill="#14b8a6" font-size="8">H-связь</text>
  <!-- Molecule 2 -->
  <circle cx="186" cy="155" r="14" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="186" y="159" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">O</text>
  <text x="186" y="145" text-anchor="middle" fill="#ef4444" font-size="8">δ−</text>
  <line x1="200" y1="155" x2="216" y2="155" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="224" cy="155" r="8" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="224" y="159" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">H</text>
  <line x1="186" y1="169" x2="186" y2="182" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="186" cy="190" r="8" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="186" y="194" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">H</text>
  <!-- Key condition -->
  <text x="280" y="130" fill="#14b8a6" font-size="11" font-weight="bold">Условие:</text>
  <text x="280" y="146" fill="#8b5cf6" font-size="12">H—F···F—H</text>
  <text x="280" y="162" fill="#8b5cf6" font-size="12">H—O···O—H</text>
  <text x="280" y="178" fill="#8b5cf6" font-size="12">H—N···N—H</text>
  <!-- Section 2: Water boiling point comparison -->
  <rect x="410" y="64" width="370" height="110" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#ef4444" stroke-width="1"/>
  <text x="595" y="86" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">Аномальная точка кипения воды</text>
  <!-- Bar chart -->
  <text x="430" y="110" fill="#94a3b8" font-size="10">T кип, °C</text>
  <!-- H2O bar -->
  <rect x="440" y="120" width="280" height="14" rx="3" fill="#14b8a6" opacity="0.7" filter="url(#glowSm)"/>
  <text x="430" y="132" text-anchor="end" fill="#14b8a6" font-size="10">H₂O</text>
  <text x="724" y="132" fill="#ffffff" font-size="10" font-weight="bold">100°C</text>
  <!-- H2S bar -->
  <rect x="440" y="138" width="28" height="14" rx="3" fill="#8b5cf6" opacity="0.7"/>
  <text x="430" y="150" text-anchor="end" fill="#8b5cf6" font-size="10">H₂S</text>
  <text x="472" y="150" fill="#94a3b8" font-size="10">−60°C</text>
  <!-- H2Se bar -->
  <rect x="440" y="156" width="18" height="14" rx="3" fill="#8b5cf6" opacity="0.5"/>
  <text x="430" y="168" text-anchor="end" fill="#8b5cf6" font-size="10">H₂Se</text>
  <text x="462" y="168" fill="#94a3b8" font-size="10">−41°C</text>
  <!-- H2Te bar -->
  <rect x="440" y="174" width="8" height="14" rx="3" fill="#8b5cf6" opacity="0.4"/>
  <text x="430" y="186" text-anchor="end" fill="#8b5cf6" font-size="10">H₂Te</text>
  <text x="452" y="186" fill="#94a3b8" font-size="10">−2°C</text>
  <!-- Explanation -->
  <text x="595" y="120" fill="#94a3b8" font-size="9">H-связь → высокая T кип</text>
  <!-- Section 3: Water molecules hydrogen bonding -->
  <rect x="20" y="184" width="370" height="120" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="205" y="206" text-anchor="middle" fill="#14b8a6" font-size="13" font-weight="bold">Водородные связи в воде</text>
  <!-- Central water molecule -->
  <circle cx="180" cy="250" r="16" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
  <text x="180" y="254" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="bold">O</text>
  <!-- H atoms -->
  <line x1="194" y1="242" x2="218" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="224" cy="227" r="8" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="224" y="231" text-anchor="middle" fill="#ffffff" font-size="8">H</text>
  <line x1="194" y1="258" x2="218" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="224" cy="273" r="8" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="224" y="277" text-anchor="middle" fill="#ffffff" font-size="8">H</text>
  <!-- Left molecule via H-bond -->
  <circle cx="100" cy="240" r="16" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
  <text x="100" y="244" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="bold">O</text>
  <line x1="114" y1="240" x2="140" y2="248" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- H connecting -->
  <circle cx="132" cy="246" r="8" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="1"/>
  <text x="132" y="250" text-anchor="middle" fill="#ffffff" font-size="8">H</text>
  <line x1="124" y1="244" x2="166" y2="250" stroke="#94a3b8" stroke-width="1"/>
  <!-- Right molecule via H-bond -->
  <circle cx="280" cy="260" r="16" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
  <text x="280" y="264" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="bold">O</text>
  <line x1="232" y1="273" x2="266" y2="262" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Bottom molecule via H-bond -->
  <circle cx="180" cy="300" r="16" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="2"/>
  <text x="180" y="304" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="bold">O</text>
  <line x1="180" y1="266" x2="180" y2="284" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="205" y="296" fill="#14b8a6" font-size="9">H-связь</text>
  <!-- Section 4: DNA base pairing -->
  <rect x="410" y="184" width="370" height="120" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1"/>
  <text x="595" y="206" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">Биологическое значение: ДНК</text>
  <!-- A-T pairing -->
  <rect x="430" y="216" width="60" height="30" rx="6" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="236" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">A</text>
  <line x1="490" y1="226" x2="530" y2="226" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="490" y1="236" x2="530" y2="236" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="530" y="216" width="60" height="30" rx="6" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="560" y="236" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">T</text>
  <text x="510" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">2 H-связи</text>
  <!-- G-C pairing -->
  <rect x="610" y="216" width="60" height="30" rx="6" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="640" y="236" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">G</text>
  <line x1="670" y1="224" x2="710" y2="224" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="670" y1="232" x2="710" y2="232" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="670" y1="240" x2="710" y2="240" stroke="#14b8a6" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="710" y="216" width="60" height="30" rx="6" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="740" y="236" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">C</text>
  <text x="690" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">3 H-связи</text>
  <!-- DNA helix hint -->
  <text x="595" y="284" text-anchor="middle" fill="#94a3b8" font-size="11">Водородные связи удерживают</text>
  <text x="595" y="298" text-anchor="middle" fill="#94a3b8" font-size="11">две цепи ДНК вместе</text>
  <!-- Section 5: Intermolecular forces hierarchy -->
  <rect x="20" y="312" width="370" height="176" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="334" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Межмолекулярные взаимодействия</text>
  <!-- Pyramid/Hierarchy -->
  <rect x="100" y="350" width="210" height="30" rx="6" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="205" y="370" text-anchor="middle" fill="#14b8a6" font-size="12" font-weight="bold">Водородная связь (сильнейшая)</text>
  <text x="205" y="385" text-anchor="middle" fill="#94a3b8" font-size="10">10-40 кДж/моль</text>
  <rect x="60" y="395" width="290" height="30" rx="6" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="205" y="415" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">Диполь-дипольное взаимодействие</text>
  <text x="205" y="430" text-anchor="middle" fill="#94a3b8" font-size="10">5-20 кДж/моль</text>
  <rect x="30" y="440" width="350" height="30" rx="6" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="205" y="460" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Дисперсионные силы Лондона (слабейшие)</text>
  <text x="205" y="475" text-anchor="middle" fill="#94a3b8" font-size="10">0.5-5 кДж/моль</text>
  <!-- Arrow showing strength -->
  <text x="360" y="370" fill="#14b8a6" font-size="11">Сильная</text>
  <text x="360" y="460" fill="#f59e0b" font-size="11">Слабая</text>
  <line x1="370" y1="380" x2="370" y2="445" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Section 6: Ice structure -->
  <rect x="410" y="312" width="370" height="176" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="595" y="334" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Лёд менее плотный чем вода</text>
  <!-- Ice crystal diagram (hexagonal) -->
  <polygon points="595,360 625,377 625,413 595,430 565,413 565,377" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Water molecules at vertices -->
  <circle cx="595" cy="360" r="8" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="625" cy="377" r="8" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="625" cy="413" r="8" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="595" cy="430" r="8" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="565" cy="413" r="8" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <circle cx="565" cy="377" r="8" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <!-- H-bonds as dashed lines between vertices -->
  <text x="595" y="450" text-anchor="middle" fill="#94a3b8" font-size="10">Открытая гексагональная</text>
  <text x="595" y="464" text-anchor="middle" fill="#94a3b8" font-size="10">структура → больше объём</text>
  <text x="595" y="478" text-anchor="middle" fill="#94a3b8" font-size="10">→ ρ(льда) &lt; ρ(воды)</text>
  <!-- Fun fact -->
  <text x="510" y="362" fill="#14b8a6" font-size="10" font-weight="bold">Аномалия воды:</text>
  <text x="510" y="378" fill="#94a3b8" font-size="10">Лёд плавает на</text>
  <text x="510" y="393" fill="#94a3b8" font-size="10">поверхности воды!</text>
  <text x="510" y="413" fill="#94a3b8" font-size="10">H₂O: 1.00 г/см³</text>
  <text x="510" y="428" fill="#94a3b8" font-size="10">Лёд: 0.92 г/см³</text>
</svg>