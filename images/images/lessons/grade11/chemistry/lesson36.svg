  <text x="400" y="30" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="#ffffff" text-anchor="middle">Обобщение по теме «Неметаллы»</text>

  <!-- === REACTIVE NONMETALS (LEFT) === -->
  <rect x="15" y="54" width="250" height="210" rx="8" fill="rgba(30,41,59,0.8)" stroke="#8b5cf6" stroke-width="1"/>
