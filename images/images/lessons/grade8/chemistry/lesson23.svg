<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="naGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="clGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="oGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="hGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="cGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="ionGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="eGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">Вещества молекулярного и немолекулярного строения</text>
  <line x1="100" y1="48" x2="700" y2="48" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Four panels -->
  <!-- Panel 1: Молекулярная (Molecular) -->
  <rect x="20" y="60" width="180" height="360" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="110" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Молекулярная</text>
  <text x="110" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">H₂O, CO₂, I₂</text>

  <!-- Water molecules in lattice -->
  <!-- Row 1 -->
  <circle cx="60" cy="140" r="9" fill="url(#oGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#f0fdf4">O</text>
  <line x1="53" y1="145" x2="42" y2="158" stroke="#5eead4" stroke-width="1.5"/>
  <line x1="67" y1="145" x2="78" y2="158" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="42" cy="162" r="5" fill="url(#hGrad)"/>
  <circle cx="78" cy="162" r="5" fill="url(#hGrad)"/>

  <circle cx="145" cy="155" r="9" fill="url(#oGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="145" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#f0fdf4">O</text>
  <line x1="138" y1="160" x2="127" y2="173" stroke="#5eead4" stroke-width="1.5"/>
  <line x1="152" y1="160" x2="163" y2="173" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="127" cy="177" r="5" fill="url(#hGrad)"/>
  <circle cx="163" cy="177" r="5" fill="url(#hGrad)"/>

  <!-- Row 2 -->
  <circle cx="80" cy="215" r="9" fill="url(#oGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="80" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#f0fdf4">O</text>
  <line x1="73" y1="220" x2="62" y2="233" stroke="#5eead4" stroke-width="1.5"/>
  <line x1="87" y1="220" x2="98" y2="233" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="62" cy="237" r="5" fill="url(#hGrad)"/>
  <circle cx="98" cy="237" r="5" fill="url(#hGrad)"/>

  <circle cx="155" cy="230" r="9" fill="url(#oGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="155" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#f0fdf4">O</text>
  <line x1="148" y1="235" x2="137" y2="248" stroke="#5eead4" stroke-width="1.5"/>
  <line x1="162" y1="235" x2="173" y2="248" stroke="#5eead4" stroke-width="1.5"/>
  <circle cx="137" cy="252" r="5" fill="url(#hGrad)"/>
  <circle cx="173" cy="252" r="5" fill="url(#hGrad)"/>

  <!-- Intermolecular dashed lines -->
  <line x1="78" y1="162" x2="127" y2="158" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="98" y1="237" x2="137" y2="235" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Properties -->
  <text x="110" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Низкие t° плавления</text>
  <text x="110" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Летучие</text>
  <text x="110" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Малая прочность</text>
  <rect x="40" y="340" width="140" height="40" rx="6" fill="#059669" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
  <text x="110" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Между молекулами —</text>
  <text x="110" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">слабые связи</text>

  <!-- Panel 2: Ионная (Ionic) -->
  <rect x="210" y="60" width="180" height="360" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="300" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Ионная</text>
  <text x="300" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">NaCl, KBr, CaO</text>

  <!-- Ionic lattice Na+ Cl- alternating -->
  <!-- Row 1 -->
  <circle cx="260" cy="135" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="260" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="300" cy="135" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="300" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="340" cy="135" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="380" cy="135" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="380" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>

  <!-- Row 2 -->
  <circle cx="260" cy="175" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="260" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="300" cy="175" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="300" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="340" cy="175" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="380" cy="175" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="380" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>

  <!-- Row 3 -->
  <circle cx="260" cy="215" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="260" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="300" cy="215" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="300" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="340" cy="215" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="380" cy="215" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="380" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>

  <!-- Row 4 -->
  <circle cx="260" cy="255" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="260" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="300" cy="255" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="300" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="340" cy="255" r="15" fill="url(#clGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="380" cy="255" r="13" fill="url(#naGrad)" stroke="#3b82f6" stroke-width="1"/>
  <text x="380" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>

  <!-- Properties -->
  <text x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Высокие t° плавления</text>
  <text x="300" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Твёрдые, хрупкие</text>
  <text x="300" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Растворимы в воде</text>
  <rect x="230" y="340" width="140" height="40" rx="6" fill="#059669" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
  <text x="300" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Ионы в узлах —</text>
  <text x="300" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">электростатич. связь</text>

  <!-- Panel 3: Атомная (Atomic) -->
  <rect x="400" y="60" width="180" height="360" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="490" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Атомная</text>
  <text x="490" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">Алмаз, Si, SiO₂</text>

  <!-- Diamond network -->
  <!-- Central atom -->
  <circle cx="490" cy="180" r="12" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="490" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">C</text>

  <!-- Four bonds from center (tetrahedral projection) -->
  <line x1="490" y1="180" x2="440" y2="140" stroke="#14b8a6" stroke-width="2.5"/>
  <line x1="490" y1="180" x2="540" y2="140" stroke="#14b8a6" stroke-width="2.5"/>
  <line x1="490" y1="180" x2="445" y2="230" stroke="#14b8a6" stroke-width="2.5"/>
  <line x1="490" y1="180" x2="535" y2="230" stroke="#14b8a6" stroke-width="2.5"/>

  <circle cx="440" cy="140" r="12" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="440" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">C</text>
  <circle cx="540" cy="140" r="12" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="540" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">C</text>
  <circle cx="445" cy="230" r="12" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="445" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">C</text>
  <circle cx="535" cy="230" r="12" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="535" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">C</text>

  <!-- Outer bonds -->
  <line x1="440" y1="140" x2="420" y2="115" stroke="#14b8a6" stroke-width="2"/>
  <line x1="440" y1="140" x2="415" y2="155" stroke="#14b8a6" stroke-width="2"/>
  <line x1="540" y1="140" x2="560" y2="115" stroke="#14b8a6" stroke-width="2"/>
  <line x1="540" y1="140" x2="565" y2="155" stroke="#14b8a6" stroke-width="2"/>
  <line x1="445" y1="230" x2="420" y2="250" stroke="#14b8a6" stroke-width="2"/>
  <line x1="535" y1="230" x2="560" y2="250" stroke="#14b8a6" stroke-width="2"/>

  <circle cx="420" cy="115" r="8" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <circle cx="415" cy="155" r="8" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <circle cx="560" cy="115" r="8" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <circle cx="565" cy="155" r="8" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <circle cx="420" cy="250" r="8" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
  <circle cx="560" cy="250" r="8" fill="url(#cGrad)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>

  <!-- Properties -->
  <text x="490" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Очень высокие t° пл.</text>
  <text x="490" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Сверхтвёрдые</text>
  <text x="490" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Нерастворимы</text>
  <rect x="420" y="340" width="140" height="40" rx="6" fill="#059669" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
  <text x="490" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Атомы в узлах —</text>
  <text x="490" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">ковалентные связи</text>

  <!-- Panel 4: Металлическая (Metallic) -->
  <rect x="590" y="60" width="190" height="360" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="685" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Металлическая</text>
  <text x="685" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">Fe, Cu, Al, Au</text>

  <!-- Electron gas background -->
  <ellipse cx="685" cy="195" rx="75" ry="70" fill="#10b981" opacity="0.06"/>

  <!-- Metal ions lattice -->
  <circle cx="635" cy="140" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="635" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>
  <circle cx="685" cy="140" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="685" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>
  <circle cx="735" cy="140" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="735" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>

  <circle cx="635" cy="195" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="635" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>
  <circle cx="685" cy="195" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="685" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>
  <circle cx="735" cy="195" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="735" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>

  <circle cx="635" cy="250" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="635" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>
  <circle cx="685" cy="250" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="685" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>
  <circle cx="735" cy="250" r="14" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="735" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Me⁺</text>

  <!-- Electrons -->
  <circle cx="660" cy="162" r="5" fill="url(#eGrad)" filter="url(#glow)"/>
  <circle cx="710" cy="170" r="5" fill="url(#eGrad)" filter="url(#glow)"/>
  <circle cx="655" cy="220" r="5" fill="url(#eGrad)" filter="url(#glow)"/>
  <circle cx="715" cy="225" r="5" fill="url(#eGrad)" filter="url(#glow)"/>
  <circle cx="660" cy="272" r="5" fill="url(#eGrad)" filter="url(#glow)"/>
  <circle cx="710" cy="275" r="5" fill="url(#eGrad)" filter="url(#glow)"/>

  <!-- Properties -->
  <text x="685" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Высокие t° плавления</text>
  <text x="685" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Пластичные, ковкие</text>
  <text x="685" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">Электропроводны</text>
  <rect x="615" y="340" width="140" height="40" rx="6" fill="#059669" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
  <text x="685" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Ионы + электронный газ</text>
  <text x="685" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">металлическая связь</text>

  <!-- Bottom summary bar -->
  <rect x="20" y="435" width="760" height="50" rx="8" fill="#059669" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0">Тип решётки определяет физические свойства вещества</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5eead4">Молекулярная → лёткие  |  Ионная → твёрдые, хрупкие  |  Атомная → сверхтвёрдые  |  Металлическая → пластичные</text>

  <!-- Lesson number -->
  <text x="780" y="498" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" opacity="0.6">Урок 23</text>
</svg>