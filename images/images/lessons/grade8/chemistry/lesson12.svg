<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede7f6"/>
      <stop offset="50%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#f3e5f5"/>
    </linearGradient>
    <linearGradient id="oxideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#5e35b1"/>
    </linearGradient>
    <linearGradient id="acidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#aa00ff"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#536dfe"/>
      <stop offset="100%" style="stop-color:#304ffe"/>
    </linearGradient>
    <linearGradient id="saltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bfa5"/>
      <stop offset="100%" style="stop-color:#00796b"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9c78ff"/>
      <stop offset="100%" style="stop-color:#673ab7"/>
    </linearGradient>
    <filter id="sh12">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c4dff"/>
    </marker>
    <marker id="arrPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e040fb"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#536dfe"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00bfa5"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg12)"/>
  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#311b92">Генетическая связь между классами</text>
  <text x="400" y="54" text-anchor="middle" font-family="serif" font-size="14" fill="#4a148c">неорганических веществ</text>
  <line x1="200" y1="60" x2="600" y2="60" stroke="#7c4dff" stroke-width="1.5" opacity="0.4"/>

  <!-- Central flow diagram: Metals → Oxides → Acids/Bases → Salts -->
  <!-- METAL box -->
  <rect x="20" y="120" width="140" height="60" rx="12" fill="url(#metalGrad)" filter="url(#sh12)"/>
  <text x="90" y="147" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Металлы</text>
  <text x="90" y="168" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d1c4e9">Me (Na, Ca, Fe)</text>

  <!-- NON-METAL box -->
  <rect x="20" y="210" width="140" height="60" rx="12" fill="url(#metalGrad)" filter="url(#sh12)" opacity="0.8"/>
  <text x="90" y="237" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Неметаллы</text>
  <text x="90" y="258" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d1c4e9">S, P, C, N</text>

  <!-- Arrows Metal→Oxide, NonMetal→Oxide -->
  <line x1="160" y1="150" x2="225" y2="170" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="178" y="148" font-size="8" fill="#7c4dff">+O₂</text>
  <line x1="160" y1="240" x2="225" y2="210" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="178" y="238" font-size="8" fill="#7c4dff">+O₂</text>

  <!-- BASIC OXIDE box -->
  <rect x="230" y="120" width="150" height="55" rx="12" fill="url(#oxideGrad)" filter="url(#sh12)"/>
  <text x="305" y="145" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">Основные</text>
  <text x="305" y="163" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d1c4e9">оксиды (Na₂O, CaO)</text>

  <!-- ACIDIC OXIDE box -->
  <rect x="230" y="210" width="150" height="55" rx="12" fill="url(#oxideGrad)" filter="url(#sh12)" opacity="0.85"/>
  <text x="305" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">Кислотные</text>
  <text x="305" y="253" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d1c4e9">оксиды (SO₃, CO₂)</text>

  <!-- Arrows Oxide→Base, Oxide→Acid -->
  <line x1="380" y1="148" x2="445" y2="148" stroke="#536dfe" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="400" y="142" font-size="8" fill="#536dfe">+H₂O</text>
  <line x1="380" y1="238" x2="445" y2="238" stroke="#e040fb" stroke-width="2" marker-end="url(#arrPink)"/>
  <text x="400" y="232" font-size="8" fill="#e040fb">+H₂O</text>

  <!-- BASE box -->
  <rect x="450" y="120" width="140" height="55" rx="12" fill="url(#baseGrad)" filter="url(#sh12)"/>
  <text x="520" y="145" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">Основания</text>
  <text x="520" y="163" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c5cae9">NaOH, Ca(OH)₂</text>

  <!-- ACID box -->
  <rect x="450" y="210" width="140" height="55" rx="12" fill="url(#acidGrad)" filter="url(#sh12)"/>
  <text x="520" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">Кислоты</text>
  <text x="520" y="253" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f3e5f5">H₂SO₄, HCl</text>

  <!-- Arrows Base→Salt, Acid→Salt -->
  <line x1="590" y1="155" x2="645" y2="185" stroke="#00bfa5" stroke-width="2" marker-end="url(#arrTeal)"/>
  <line x1="590" y1="230" x2="645" y2="205" stroke="#00bfa5" stroke-width="2" marker-end="url(#arrTeal)"/>

  <!-- SALT box (central, large) -->
  <rect x="645" y="160" width="135" height="70" rx="15" fill="url(#saltGrad)" filter="url(#sh12)"/>
  <text x="712" y="193" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="white">СОЛИ</text>
  <text x="712" y="215" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b2dfdb">NaCl, CaSO₄</text>

  <!-- Reverse arrow: Salt back to elements (genetic cycle) -->
  <path d="M712,230 L712,280 Q712,295 697,295 L100,295 Q80,295 80,280 L80,180" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>
  <text x="400" y="290" text-anchor="middle" font-size="9" fill="#9c27b0" font-style="italic">Генетический ряд — превращения веществ одного элемента</text>

  <!-- Chemical Equations Section -->
  <rect x="30" y="310" width="740" height="175" rx="10" fill="white" fill-opacity="0.55" stroke="#7c4dff" stroke-width="1.5" filter="url(#sh12)"/>
  <text x="400" y="332" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#311b92">Цепочки превращений (генетические ряды)</text>

  <!-- Metal genetic series -->
  <rect x="45" y="345" width="710" height="38" rx="6" fill="#ede7f6" stroke="#b39ddb" stroke-width="1"/>
  <text x="55" y="362" font-size="10" font-weight="bold" fill="#4a148c">Металл:</text>
  <text x="110" y="362" font-size="11" fill="#333">Na → Na₂O → NaOH → NaCl</text>
  <text x="55" y="378" font-size="9" fill="#666">4Na+O₂→2Na₂O | Na₂O+H₂O→2NaOH | NaOH+HCl→NaCl+H₂O</text>

  <!-- Non-metal genetic series -->
  <rect x="45" y="390" width="710" height="38" rx="6" fill="#fce4ec" stroke="#f48fb1" stroke-width="1"/>
  <text x="55" y="407" font-size="10" font-weight="bold" fill="#880e4f">Неметалл:</text>
  <text x="120" y="407" font-size="11" fill="#333">S → SO₃ → H₂SO₄ → Na₂SO₄</text>
  <text x="55" y="423" font-size="9" fill="#666">2S+3O₂→2SO₃ | SO₃+H₂O→H₂SO₄ | H₂SO₄+2NaOH→Na₂SO₄+2H₂O</text>

  <!-- Key concept box -->
  <rect x="45" y="438" width="710" height="38" rx="6" fill="#e8eaf6" stroke="#7986cb" stroke-width="1"/>
  <text x="55" y="455" font-size="10" font-weight="bold" fill="#1a237e">Закон сохранения:</text>
  <text x="190" y="455" font-size="10" fill="#333">Вещества не исчезают и не возникают, а превращаются друг в друга</text>
  <text x="55" y="470" font-size="9" fill="#666">Каждый класс веществ связан с другими через химические реакции — это генетическая связь</text>
</svg>