<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="atomA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="atomB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="atomC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="atomD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">Классификация химических реакций</text>
  <line x1="150" y1="48" x2="650" y2="48" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- ====== Reaction 1: Соединение ====== -->
  <rect x="20" y="62" width="375" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="207" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6">Соединение</text>
  <text x="207" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5eead4">A + B → AB</text>

  <!-- Left side: A + B -->
  <circle cx="80" cy="155" r="24" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="80" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">A</text>

  <text x="130" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#5eead4">+</text>

  <circle cx="175" cy="155" r="24" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="175" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">B</text>

  <!-- Arrow -->
  <line x1="210" y1="155" x2="255" y2="155" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- Right side: AB (combined) -->
  <circle cx="305" cy="145" r="22" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="305" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">A</text>
  <circle cx="325" cy="165" r="22" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="325" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">B</text>

  <!-- Example -->
  <text x="207" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a7f3d0">Пример: 2H₂ + O₂ → 2H₂O</text>
  <text x="207" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5eead4">из нескольких веществ → одно</text>

  <!-- ====== Reaction 2: Разложение ====== -->
  <rect x="405" y="62" width="375" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="592" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6">Разложение</text>
  <text x="592" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5eead4">AB → A + B</text>

  <!-- Left side: AB -->
  <circle cx="475" cy="145" r="22" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="475" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">A</text>
  <circle cx="495" cy="165" r="22" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="495" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">B</text>

  <!-- Arrow -->
  <line x1="525" y1="155" x2="570" y2="155" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- Right side: A + B -->
  <circle cx="615" cy="155" r="24" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="615" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">A</text>

  <text x="660" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#5eead4">+</text>

  <circle cx="710" cy="155" r="24" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="710" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">B</text>

  <!-- Example -->
  <text x="592" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a7f3d0">Пример: 2H₂O → 2H₂ + O₂</text>
  <text x="592" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5eead4">из одного вещества → несколько</text>

  <!-- ====== Reaction 3: Замещение ====== -->
  <rect x="20" y="258" width="375" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="207" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6">Замещение</text>
  <text x="207" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5eead4">A + BC → AC + B</text>

  <!-- Left side: A + BC -->
  <circle cx="65" cy="355" r="20" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="65" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">A</text>

  <text x="100" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#5eead4">+</text>

  <circle cx="135" cy="345" r="18" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="135" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">B</text>
  <circle cx="155" cy="365" r="18" fill="url(#atomC)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="155" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">C</text>

  <!-- Arrow -->
  <line x1="185" y1="355" x2="225" y2="355" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- Right side: AC + B -->
  <circle cx="270" cy="345" r="18" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="270" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">A</text>
  <circle cx="290" cy="365" r="18" fill="url(#atomC)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="290" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">C</text>

  <text x="320" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#5eead4">+</text>

  <circle cx="355" cy="355" r="20" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="355" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">B</text>

  <!-- Example -->
  <text x="207" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a7f3d0">Пример: Zn + 2HCl → ZnCl₂ + H₂</text>
  <text x="207" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5eead4">атом замещает атом в соединении</text>

  <!-- ====== Reaction 4: Обмен ====== -->
  <rect x="405" y="258" width="375" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1"/>
  <text x="592" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6">Обмен</text>
  <text x="592" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5eead4">AB + CD → AD + CB</text>

  <!-- Left side: AB + CD -->
  <circle cx="455" cy="345" r="16" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="455" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">A</text>
  <circle cx="471" cy="365" r="16" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="471" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">B</text>

  <text x="498" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5eead4">+</text>

  <circle cx="525" cy="345" r="16" fill="url(#atomC)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="525" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">C</text>
  <circle cx="541" cy="365" r="16" fill="url(#atomD)" stroke="#059669" stroke-width="1.5"/>
  <text x="541" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">D</text>

  <!-- Arrow -->
  <line x1="565" y1="355" x2="600" y2="355" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- Right side: AD + CB -->
  <circle cx="635" cy="345" r="16" fill="url(#atomA)" stroke="#10b981" stroke-width="1.5"/>
  <text x="635" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">A</text>
  <circle cx="651" cy="365" r="16" fill="url(#atomD)" stroke="#059669" stroke-width="1.5"/>
  <text x="651" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">D</text>

  <text x="678" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5eead4">+</text>

  <circle cx="705" cy="345" r="16" fill="url(#atomC)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="705" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">C</text>
  <circle cx="721" cy="365" r="16" fill="url(#atomB)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="721" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">B</text>

  <!-- Exchange arrows showing swap -->
  <path d="M471,340 Q498,320 651,340" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="4,3" opacity="0.5"/>
  <path d="M541,370 Q570,390 721,370" stroke="#14b8a6" stroke-width="1" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Example -->
  <text x="592" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a7f3d0">Пример: NaOH + HCl → NaCl + H₂O</text>
  <text x="592" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5eead4">обмен составными частями</text>

  <!-- Bottom note -->
  <rect x="120" y="455" width="560" height="30" rx="6" fill="#059669" fill-opacity="0.15" stroke="#10b981" stroke-width="0.5"/>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a7f3d0">Классификация по числу и составу исходных веществ и продуктов реакции</text>

  <!-- Lesson number -->
  <text x="780" y="498" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" opacity="0.6">Урок 24</text>
</svg>