<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="flask1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Предмет химии. Вещества и их свойства</text>

  <!-- Flask/Beaker icon at top center -->
  <g transform="translate(370, 60)">
    <!-- Flask neck -->
    <rect x="20" y="0" width="20" height="25" fill="none" stroke="#14b8a6" stroke-width="2" rx="2"/>
    <!-- Flask body (Erlenmeyer shape) -->
    <path d="M15,25 L5,65 L55,65 L45,25 Z" fill="url(#flask1)" stroke="#14b8a6" stroke-width="2" stroke-linejoin="round"/>
    <!-- Liquid inside flask -->
    <path d="M10,50 L7,65 L53,65 L50,50 Z" fill="url(#liquid1)" opacity="0.8"/>
    <!-- Bubbles -->
    <circle cx="25" cy="55" r="3" fill="#10b981" opacity="0.6"/>
    <circle cx="38" cy="52" r="2" fill="#10b981" opacity="0.5"/>
    <circle cx="32" cy="58" r="2.5" fill="#10b981" opacity="0.4"/>
  </g>

  <!-- Divider line -->
  <line x1="50" y1="140" x2="750" y2="140" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- === SOLID STATE === -->
  <g transform="translate(130, 280)">
    <!-- Crystal lattice structure -->
    <!-- Row 1 -->
    <circle cx="-30" cy="-50" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <circle cx="0" cy="-50" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <circle cx="30" cy="-50" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <!-- Row 2 -->
    <circle cx="-30" cy="-20" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <circle cx="0" cy="-20" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <circle cx="30" cy="-20" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <!-- Row 3 -->
    <circle cx="-30" cy="10" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <circle cx="0" cy="10" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <circle cx="30" cy="10" r="12" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <!-- Bonds (grid lines) -->
    <line x1="-18" y1="-50" x2="-12" y2="-50" stroke="#0d9488" stroke-width="2"/>
    <line x1="12" y1="-50" x2="18" y2="-50" stroke="#0d9488" stroke-width="2"/>
    <line x1="-18" y1="-20" x2="-12" y2="-20" stroke="#0d9488" stroke-width="2"/>
    <line x1="12" y1="-20" x2="18" y2="-20" stroke="#0d9488" stroke-width="2"/>
    <line x1="-18" y1="10" x2="-12" y2="10" stroke="#0d9488" stroke-width="2"/>
    <line x1="12" y1="10" x2="18" y2="10" stroke="#0d9488" stroke-width="2"/>
    <!-- Vertical bonds -->
    <line x1="-30" y1="-38" x2="-30" y2="-32" stroke="#0d9488" stroke-width="2"/>
    <line x1="0" y1="-38" x2="0" y2="-32" stroke="#0d9488" stroke-width="2"/>
    <line x1="30" y1="-38" x2="30" y2="-32" stroke="#0d9488" stroke-width="2"/>
    <line x1="-30" y1="-8" x2="-30" y2="-2" stroke="#0d9488" stroke-width="2"/>
    <line x1="0" y1="-8" x2="0" y2="-2" stroke="#0d9488" stroke-width="2"/>
    <line x1="30" y1="-8" x2="30" y2="-2" stroke="#0d9488" stroke-width="2"/>
    <!-- Label -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Твёрдое</text>
    <!-- Description -->
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Кристаллическая решётка</text>
  </g>

  <!-- === LIQUID STATE === -->
  <g transform="translate(400, 280)">
    <!-- Liquid container -->
    <rect x="-55" y="-60" width="110" height="80" rx="5" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.5"/>
    <!-- Liquid fill -->
    <rect x="-53" y="-30" width="106" height="48" rx="3" fill="#0d9488" opacity="0.25"/>
    <!-- Liquid wave top -->
    <path d="M-53,-30 Q-30,-38 0,-30 Q30,-22 53,-30" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
    <!-- Particles (close but not rigid) -->
    <circle cx="-30" cy="-15" r="10" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="-5" cy="-20" r="10" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="25" cy="-12" r="10" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="-20" cy="5" r="10" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="10" cy="2" r="10" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <circle cx="35" cy="8" r="10" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <!-- Label -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Жидкое</text>
    <!-- Description -->
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Текучесть, нет формы</text>
  </g>

  <!-- === GAS STATE === -->
  <g transform="translate(670, 280)">
    <!-- Dashed container -->
    <rect x="-55" y="-60" width="110" height="80" rx="5" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.4"/>
    <!-- Scattered particles (far apart, moving) -->
    <circle cx="-30" cy="-40" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="20" cy="-45" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="-40" cy="-10" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="0" cy="-20" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="35" cy="-5" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="-15" cy="10" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="40" cy="-35" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <circle cx="15" cy="5" r="8" fill="#0d9488" stroke="#059669" stroke-width="1.5"/>
    <!-- Motion trails -->
    <line x1="-30" y1="-40" x2="-38" y2="-48" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="-45" x2="28" y2="-50" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>
    <line x1="-40" y1="-10" x2="-48" y2="-15" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="-5" x2="43" y2="-10" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="5" x2="23" y2="10" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Газообразное</text>
    <!-- Description -->
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Заполняет объём</text>
  </g>

  <!-- Arrows between states -->
  <!-- Solid to Liquid -->
  <path d="M200,280 Q260,250 310,280" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowHead1)"/>
  <!-- Liquid to Gas -->
  <path d="M470,280 Q530,250 580,280" fill="none" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowHead1)"/>

  <defs>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Bottom label -->
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle" opacity="0.7">Агрегатные состояния вещества</text>

  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>