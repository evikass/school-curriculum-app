<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#E8F5E9"/>
  
  <!-- Table -->
  <rect x="20" y="200" width="360" height="80" fill="#8D6E63"/>
  <rect x="20" y="195" width="360" height="10" fill="#A1887F"/>
  
  <!-- Glue bottle -->
  <g transform="translate(80, 80)">
    <rect x="0" y="20" width="40" height="60" fill="#4CAF50" rx="5"/>
    <rect x="12" y="0" width="16" height="25" fill="#81C784"/>
    <polygon points="12,0 20,-15 28,0" fill="#A5D6A7"/>
    <!-- Glue drops -->
    <ellipse cx="20" cy="85" rx="15" ry="8" fill="#81C784" opacity="0.7">
      <animate attributeName="cy" values="85;95;85" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="20" y="110" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#2E7D32">Клей</text>
  </g>
  
  <!-- Glue stick -->
  <g transform="translate(180, 90)">
    <rect x="0" y="0" width="30" height="70" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="3"/>
    <rect x="5" y="50" width="20" height="30" fill="#FFEB3B" rx="2"/>
    <rect x="0" y="75" width="30" height="15" fill="#8D6E63" rx="2"/>
    <text x="15" y="110" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#F57F17">Клей-карандаш</text>
  </g>
  
  <!-- Paper glue (ПВА) -->
  <g transform="translate(280, 80)">
    <rect x="0" y="20" width="50" height="70" fill="#2196F3" rx="3"/>
    <rect x="18" y="0" width="14" height="25" fill="#64B5F6"/>
    <text x="25" y="55" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">ПВА</text>
    <text x="25" y="110" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#1565C0">Клей ПВА</text>
  </g>
  
  <!-- Gluing process -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="80" height="30" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="3"/>
    <text x="40" y="12" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#1565C0">1. Нанеси клей</text>
    <text x="40" y="24" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#1565C0">кисточкой</text>
  </g>
  
  <g transform="translate(160, 40)">
    <rect x="0" y="0" width="80" height="30" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="3"/>
    <text x="40" y="12" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#2E7D32">2. Прижми детали</text>
    <text x="40" y="24" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#2E7D32">крепко</text>
  </g>
  
  <g transform="translate(260, 40)">
    <rect x="0" y="0" width="80" height="30" fill="#FFF8E1" stroke="#FFC107" stroke-width="2" rx="3"/>
    <text x="40" y="12" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#F57F17">3. Подожди</text>
    <text x="40" y="24" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#F57F17">высохнет!</text>
  </g>
  
  <!-- Brush -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="8" height="40" fill="#8D6E63"/>
    <rect x="-5" y="40" width="18" height="20" fill="#5D4037"/>
    <ellipse cx="4" cy="65" rx="12" ry="15" fill="#FFCC80"/>
    <text x="4" y="95" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Кисть</text>
  </g>
  
  <!-- Papers being glued -->
  <g transform="translate(180, 220)">
    <rect x="0" y="0" width="40" height="30" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <rect x="25" y="5" width="40" height="30" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
    <text x="32" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Склеиваем</text>
  </g>
  
  <!-- Cloth for wiping -->
  <g transform="translate(300, 230)">
    <ellipse cx="20" cy="15" rx="25" ry="20" fill="#E0E0E0"/>
    <ellipse cx="15" cy="10" rx="5" ry="4" fill="#BDBDBD"/>
    <ellipse cx="25" cy="18" rx="4" ry="3" fill="#BDBDBD"/>
    <text x="20" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Тряпочка</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Склеивание бумаги
  </text>
</svg>