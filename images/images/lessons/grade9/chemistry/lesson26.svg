<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg26" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh26">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg26)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="bold">Оксиды азота. Азотная кислота</text>

  <!-- Nitrogen oxides -->
  <rect x="12" y="40" width="120" height="60" rx="6" fill="#0f766e" filter="url(#sh26)"/>
  <text x="72" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">N&#178;O</text>
  <text x="72" y="69" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">N: +1</text>
  <text x="72" y="81" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">веселящий газ</text>
  <text x="72" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">бесцв.</text>

  <rect x="140" y="40" width="120" height="60" rx="6" fill="#0f766e" filter="url(#sh26)"/>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">NO</text>
  <text x="200" y="69" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">N: +2</text>
  <text x="200" y="81" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">оксид азота(II)</text>
  <text x="200" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">бесцв.</text>

  <rect x="268" y="40" width="120" height="60" rx="6" fill="#0f766e" filter="url(#sh26)"/>
  <text x="328" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">NO&#178;</text>
  <text x="328" y="69" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">N: +4</text>
  <text x="328" y="81" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">бурый газ</text>
  <text x="328" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#fca5a5">токсичен!</text>

  <!-- N2O5 -->
  <rect x="12" y="107" width="185" height="35" rx="6" fill="#134e4a" filter="url(#sh26)"/>
  <text x="22" y="123" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">N&#178;O&#8309;</text>
  <text x="80" y="123" font-family="Arial,sans-serif" font-size="8" fill="white">N: +5, твёрдый</text>
  <text x="22" y="136" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">N&#178;O&#8309; + H&#178;O = 2HNO&#179;</text>

  <!-- HNO3 structure -->
  <rect x="203" y="107" width="185" height="35" rx="6" fill="#134e4a" filter="url(#sh26)"/>
  <text x="213" y="123" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">HNO&#179; — азотная к-та</text>
  <text x="213" y="136" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Сильная, одноосновная</text>

  <!-- Reactions of HNO3 -->
  <rect x="12" y="149" width="376" height="72" rx="6" fill="#0f766e" filter="url(#sh26)"/>
  <text x="22" y="165" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Реакции HNO&#179; с металлами:</text>
  <text x="22" y="180" font-family="Arial,sans-serif" font-size="8" fill="white">Cu + 4HNO&#179;(к) = Cu(NO&#179;)&#178; + 2NO&#178; + 2H&#178;O</text>
  <text x="22" y="194" font-family="Arial,sans-serif" font-size="8" fill="white">3Cu + 8HNO&#179;(р) = 3Cu(NO&#179;)&#178; + 2NO + 4H&#178;O</text>
  <text x="22" y="208" font-family="Arial,sans-serif" font-size="8" fill="white">4Zn + 10HNO&#179;(оч.р) = 4Zn(NO&#179;)&#178; + N&#178;O + 5H&#178;O</text>
  <text x="22" y="218" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">HNO&#179; — сильный окислитель! H&#178; не выделяется!</text>

  <!-- Properties and preparation -->
  <rect x="12" y="228" width="185" height="58" rx="6" fill="#134e4a" filter="url(#sh26)"/>
  <text x="22" y="244" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Получение:</text>
  <text x="22" y="258" font-family="Arial,sans-serif" font-size="8" fill="white">NH&#179; -> NO -> NO&#178;</text>
  <text x="22" y="270" font-family="Arial,sans-serif" font-size="8" fill="white">-> HNO&#179;</text>
  <text x="22" y="282" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">(арх. метод Оствальда)</text>

  <rect x="203" y="228" width="185" height="58" rx="6" fill="#134e4a" filter="url(#sh26)"/>
  <text x="213" y="244" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Свойства HNO&#179;:</text>
  <text x="213" y="258" font-family="Arial,sans-serif" font-size="8" fill="white">Жидкость, tкип = 83 C</text>
  <text x="213" y="270" font-family="Arial,sans-serif" font-size="8" fill="white">Дымит на воздухе</text>
  <text x="213" y="282" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Разлаг.: 4HNO&#179; = 4NO&#178;+O&#178;+2H&#178;O</text>
  <text x="345" y="244" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 26</text>

</svg>