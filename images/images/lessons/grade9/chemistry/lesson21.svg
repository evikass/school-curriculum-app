<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg21" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh21">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg21)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Галогены (VIIA группа)</text>

  <!-- Element cards row -->
  <rect x="12" y="40" width="85" height="52" rx="6" fill="#0f766e" filter="url(#sh21)"/>
  <text x="54" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Z=9</text>
  <text x="54" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="bold">F</text>
  <text x="54" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">1s&#178;2s&#178;2p&#8309;</text>

  <rect x="103" y="40" width="85" height="52" rx="6" fill="#0f766e" filter="url(#sh21)"/>
  <text x="145" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Z=17</text>
  <text x="145" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="bold">Cl</text>
  <text x="145" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">...3s&#178;3p&#8309;</text>

  <rect x="194" y="40" width="85" height="52" rx="6" fill="#0f766e" filter="url(#sh21)"/>
  <text x="236" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Z=35</text>
  <text x="236" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#fca5a5" font-weight="bold">Br</text>
  <text x="236" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">...4s&#178;4p&#8309;</text>

  <rect x="285" y="40" width="103" height="52" rx="6" fill="#0f766e" filter="url(#sh21)"/>
  <text x="336" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Z=53</text>
  <text x="336" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#c4b5fd" font-weight="bold">I</text>
  <text x="336" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">...5s&#178;5p&#8309;</text>

  <!-- Activity series -->
  <rect x="12" y="100" width="376" height="42" rx="6" fill="#134e4a" filter="url(#sh21)"/>
  <text x="22" y="116" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Активность:</text>
  <text x="95" y="116" font-family="Arial,sans-serif" font-size="12" fill="#f0fdfa" font-weight="bold">F&#178;</text>
  <text x="122" y="116" font-family="Arial,sans-serif" font-size="10" fill="#5eead4">&gt;</text>
  <text x="138" y="116" font-family="Arial,sans-serif" font-size="12" fill="#f0fdfa" font-weight="bold">Cl&#178;</text>
  <text x="168" y="116" font-family="Arial,sans-serif" font-size="10" fill="#5eead4">&gt;</text>
  <text x="184" y="116" font-family="Arial,sans-serif" font-size="12" fill="#f0fdfa" font-weight="bold">Br&#178;</text>
  <text x="214" y="116" font-family="Arial,sans-serif" font-size="10" fill="#5eead4">&gt;</text>
  <text x="230" y="116" font-family="Arial,sans-serif" font-size="12" fill="#f0fdfa" font-weight="bold">I&#178;</text>
  <text x="22" y="134" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">7 валентных электронов ns&#178;np&#8309; | Окислители</text>
  <line x1="280" y1="120" x2="370" y2="120" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arw21)"/>
  <defs><marker id="arw21" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#14b8a6"/></marker></defs>
  <text x="310" y="113" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">R уменьш.</text>

  <!-- Reactions with metals -->
  <rect x="12" y="150" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh21)"/>
  <text x="22" y="165" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Реакции с металлами:</text>
  <text x="22" y="180" font-family="Arial,sans-serif" font-size="9" fill="white">2Na + Cl&#178; = 2NaCl</text>
  <text x="22" y="194" font-family="Arial,sans-serif" font-size="9" fill="white">Fe + Cl&#178; = FeCl&#178;</text>
  <text x="22" y="208" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">(галогениды металлов)</text>

  <!-- Reactions with hydrogen -->
  <rect x="203" y="150" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh21)"/>
  <text x="213" y="165" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Реакции с H&#178;:</text>
  <text x="213" y="180" font-family="Arial,sans-serif" font-size="9" fill="white">H&#178; + F&#178; = 2HF</text>
  <text x="213" y="194" font-family="Arial,sans-serif" font-size="9" fill="white">H&#178; + Cl&#178; = 2HCl</text>
  <text x="213" y="208" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">(галогеноводороды)</text>

  <!-- Displacement reactions -->
  <rect x="12" y="226" width="376" height="60" rx="6" fill="#134e4a" filter="url(#sh21)"/>
  <text x="22" y="242" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Замещение (вытеснение):</text>
  <text x="22" y="258" font-family="Arial,sans-serif" font-size="9" fill="white">Cl&#178; + 2KBr = 2KCl + Br&#178;</text>
  <text x="22" y="274" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Более активный галоген вытесняет менее активный из его соли</text>
  <text x="340" y="242" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 21</text>

</svg>