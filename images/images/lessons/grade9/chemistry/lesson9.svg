<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh9">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg9)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Физические свойства металлов</text>

  <!-- Properties list -->
  <rect x="12" y="40" width="185" height="105" rx="6" fill="#0f766e" filter="url(#sh9)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Общие свойства:</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="white">&#8226; Металлический блеск</text>
  <text x="22" y="83" font-family="Arial,sans-serif" font-size="8" fill="white">&#8226; Электропроводность</text>
  <text x="22" y="96" font-family="Arial,sans-serif" font-size="8" fill="white">&#8226; Теплопроводность</text>
  <text x="22" y="109" font-family="Arial,sans-serif" font-size="8" fill="white">&#8226; Пластичность (ковкость)</text>
  <text x="22" y="122" font-family="Arial,sans-serif" font-size="8" fill="white">&#8226; Непрозрачность</text>
  <text x="22" y="135" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Металлическая связь: Me&#8319;&#8319;&#8314; + e&#8315; (свободные)</text>

  <!-- Crystal lattice -->
  <rect x="203" y="40" width="185" height="105" rx="6" fill="#134e4a" filter="url(#sh9)"/>
  <text x="213" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Кристаллическая решётка:</text>
  <circle cx="230" cy="78" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="260" cy="78" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="290" cy="78" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="320" cy="78" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="245" cy="100" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="275" cy="100" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="305" cy="100" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="335" cy="100" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="230" cy="122" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="260" cy="122" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="290" cy="122" r="5" fill="#14b8a6" opacity="0.8"/>
  <circle cx="320" cy="122" r="5" fill="#14b8a6" opacity="0.8"/>
  <line x1="230" y1="78" x2="260" y2="78" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <line x1="260" y1="78" x2="290" y2="78" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <line x1="290" y1="78" x2="320" y2="78" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <line x1="245" y1="100" x2="275" y2="100" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <line x1="275" y1="100" x2="305" y2="100" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <line x1="305" y1="100" x2="335" y2="100" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <text x="290" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Me&#8319;&#8319;&#8314; + "электронный газ"</text>

  <!-- Melting points -->
  <rect x="12" y="153" width="376" height="55" rx="6" fill="#0f766e" filter="url(#sh9)"/>
  <text x="22" y="169" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Температура плавления:</text>
  <text x="22" y="184" font-family="Arial,sans-serif" font-size="9" fill="white">W (вольфрам):</text>
  <text x="120" y="184" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5" font-weight="bold">3422 &#176;C</text>
  <text x="175" y="184" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">(самый тугоплавкий)</text>
  <text x="22" y="200" font-family="Arial,sans-serif" font-size="9" fill="white">Hg (ртуть):</text>
  <text x="120" y="200" font-family="Arial,sans-serif" font-size="9" fill="#93c5fd" font-weight="bold">-39 &#176;C</text>
  <text x="165" y="200" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">(жидкий при комн. темп.)</text>

  <!-- Density -->
  <rect x="12" y="216" width="185" height="72" rx="6" fill="#134e4a" filter="url(#sh9)"/>
  <text x="22" y="232" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Плотность (г/см&#179;):</text>
  <text x="22" y="247" font-family="Arial,sans-serif" font-size="8" fill="white">Li: 0.53 (лёгкий)</text>
  <text x="22" y="260" font-family="Arial,sans-serif" font-size="8" fill="white">Fe: 7.87</text>
  <text x="22" y="273" font-family="Arial,sans-serif" font-size="8" fill="white">Os: 22.6 (тяжёлый)</text>
  <text x="22" y="284" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Лёгкие: d &lt; 5, Тяжёлые: d &gt; 5</text>

  <!-- Conductivity -->
  <rect x="203" y="216" width="185" height="72" rx="6" fill="#0f766e" filter="url(#sh9)"/>
  <text x="213" y="232" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Электропроводность:</text>
  <text x="213" y="247" font-family="Arial,sans-serif" font-size="8" fill="white">Ag &gt; Cu &gt; Au &gt; Al &gt; Fe</text>
  <text x="213" y="261" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Лучший проводник - Ag</text>
  <text x="213" y="275" font-family="Arial,sans-serif" font-size="8" fill="white">Теплопроводность:</text>
  <text x="213" y="286" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Ag &gt; Cu &gt; Au &gt; Al</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 9</text>
</svg>