<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh7">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg7)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Обобщение: Общая характеристика элементов</text>

  <!-- Periodic Law -->
  <rect x="12" y="40" width="376" height="48" rx="6" fill="#0f766e" filter="url(#sh7)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Периодический закон (Менделеев, 1869):</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">Свойства элементов и их соединений периодически изменяются</text>
  <text x="22" y="82" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">с ростом порядкового номера (заряда ядра)</text>

  <!-- Electronic structure determines -->
  <rect x="12" y="96" width="185" height="78" rx="6" fill="#134e4a" filter="url(#sh7)"/>
  <text x="22" y="112" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Структура &#8594; свойства:</text>
  <text x="22" y="126" font-family="Arial,sans-serif" font-size="8" fill="white">Число эл. оболочек &#8594; период</text>
  <text x="22" y="139" font-family="Arial,sans-serif" font-size="8" fill="white">Валентные эл-ны &#8594; группа</text>
  <text x="22" y="152" font-family="Arial,sans-serif" font-size="8" fill="white">ЭО, радиус &#8594; Me/NeMe</text>
  <text x="22" y="165" font-family="Arial,sans-serif" font-size="8" fill="white">Высш. с.о. &#8594; оксид, гидроксид</text>

  <!-- Key periodic trends -->
  <rect x="203" y="96" width="185" height="78" rx="6" fill="#0f766e" filter="url(#sh7)"/>
  <text x="213" y="112" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Периодические изменения:</text>
  <text x="213" y="126" font-family="Arial,sans-serif" font-size="8" fill="white">По периоду (&#8594;):</text>
  <text x="213" y="139" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">ЭО возраст., радиус уменьш.</text>
  <text x="213" y="152" font-family="Arial,sans-serif" font-size="8" fill="white">По группе (&#8595;):</text>
  <text x="213" y="165" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Me св-ва усил., ЭО уменьш.</text>

  <!-- Mendeleev predictions -->
  <rect x="12" y="182" width="376" height="48" rx="6" fill="#0f766e" filter="url(#sh7)"/>
  <text x="22" y="198" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Предсказания Менделеева:</text>
  <text x="22" y="212" font-family="Arial,sans-serif" font-size="8" fill="white">Ekaboron (Sc) - открыт 1879 | Ekaaluminium (Ga) - открыт 1875</text>
  <text x="22" y="224" font-family="Arial,sans-serif" font-size="8" fill="white">Ekasilicon (Ge) - открыт 1886 | Свойства предсказаны точно!</text>

  <!-- Summary table -->
  <rect x="12" y="238" width="376" height="50" rx="6" fill="#134e4a" filter="url(#sh7)"/>
  <text x="22" y="254" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Ключевые формулы:</text>
  <text x="22" y="268" font-family="Arial,sans-serif" font-size="8" fill="white">Высш. оксид: E&#8322;O&#8345; (N группы = n)</text>
  <text x="22" y="280" font-family="Arial,sans-serif" font-size="8" fill="white">Летуч. вод. соед.: H&#8345;E (8-n атомов H)</text>
  <text x="220" y="268" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">А = Z + N</text>
  <text x="220" y="280" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">ЭО: F(4)&gt;O(3.5)&gt;N(3)&gt;Cl(3)</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 7</text>
</svg>