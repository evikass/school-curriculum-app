<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#0ea5e9" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Закон сохранения массы</text>

<!-- Lomonosov -->
<rect x="30" y="55" width="230" height="100" rx="14" fill="#fff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
<circle cx="145" cy="90" r="25" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
<text x="145" y="97" text-anchor="middle" font-size="26">👨‍🔬</text>
<text x="145" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#0ea5e9">М.В. Ломоносов</text>
<text x="145" y="150" text-anchor="middle" font-size="12" fill="#64748b">1748 год</text>

<!-- Quote -->
<rect x="280" y="55" width="490" height="100" rx="14" fill="#fff" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="280" y="55" width="490" height="6" rx="3" fill="#0ea5e9"/>
<text x="525" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Закон сохранения массы</text>
<text x="300" y="105" font-size="13" font-style="italic" fill="#334155">«Все перемены, в натуре случающиеся,</text>
<text x="300" y="122" font-size="13" font-style="italic" fill="#334155">такового суть состояния, что сколько</text>
<text x="300" y="139" font-size="13" font-style="italic" fill="#334155">чего у одного тела отнимется, столько</text>
<text x="300" y="145" font-size="13" font-style="italic" fill="#334155">присовокупится к другому.»</text>

<!-- Balance scale -->
<rect x="30" y="168" width="740" height="140" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="195" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">Масса реагентов = Масса продуктов</text>

<!-- Scale -->
<line x1="400" y1="210" x2="400" y2="240" stroke="#475569" stroke-width="3"/>
<polygon points="392,240 408,240 404,252 396,252" fill="#94a3b8"/>
<line x1="280" y1="215" x2="520" y2="215" stroke="#475569" stroke-width="2.5"/>

<!-- Left pan - Reactants -->
<path d="M255,215 L280,215 L280,225 L255,225 Z" fill="#3b82f6" opacity="0.3"/>
<rect x="245" y="225" width="70" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="280" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">Реагенты</text>

<!-- Right pan - Products -->
<path d="M495,215 L520,215 L520,225 L495,225 Z" fill="#10b981" opacity="0.3"/>
<rect x="485" y="225" width="70" height="30" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
<text x="520" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Продукты</text>

<!-- Balanced text -->
<text x="280" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">2Mg + O₂</text>
<text x="400" y="275" text-anchor="middle" font-size="18" fill="#475569">=</text>
<text x="520" y="275" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">2MgO</text>

<!-- Sealed vessel -->
<rect x="30" y="320" width="340" height="110" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="320" width="340" height="6" rx="3" fill="#8b5cf6"/>
<text x="200" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#8b5cf6">Опыт: запаянный сосуд</text>

<!-- Vessel drawing -->
<rect x="80" y="365" width="100" height="50" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
<rect x="80" y="360" width="100" height="8" rx="2" fill="#8b5cf6"/>
<text x="130" y="395" text-anchor="middle" font-size="10" fill="#8b5cf6">Sn + O₂</text>
<text x="250" y="385" font-size="12" fill="#475569">Масса до</text>
<text x="250" y="402" font-size="12" fill="#475569">реакции</text>
<text x="330" y="385" font-size="16" fill="#8b5cf6">=</text>
<text x="330" y="402" font-size="12" fill="#475569">после</text>

<!-- Calculation -->
<rect x="400" y="320" width="370" height="110" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="400" y="320" width="370" height="6" rx="3" fill="#10b981"/>
<text x="585" y="348" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">Проверка расчётом</text>

<text x="420" y="375" font-size="15" fill="#1e3a5f">2Mg + O<tspan font-size="11" baseline-shift="sub">2</tspan> = 2MgO</text>
<text x="420" y="400" font-size="14" fill="#475569">2×24 + 32 = 2×40</text>
<text x="420" y="422" font-size="18" font-weight="700" fill="#10b981">48 + 32 = 80  →  80 = 80 ✓</text>

<!-- Footer -->
<rect x="200" y="450" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="475" text-anchor="middle" font-size="12" fill="#94a3b8">Масса веществ, вступивших в реакцию, равна массе продуктов реакции</text>
</svg>
