      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
      <marker id="arrowhead-10b981" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
</defs>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="0" y="0" width="800" height="6" rx="3" fill="#10b981"/>
  <text x="400" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#047857">Оксиды</text>
  <rect x="20" y="65" width="245" height="195" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="65" width="245" height="34" rx="10" fill="#3b82f6"/>
  <rect x="20" y="89" width="245" height="10" fill="#3b82f6"/>
  <text x="142" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff">Основные</text>
  <text x="142" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#1d4ed8">(Металлы + O)</text>
  <text x="142" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e40af">CaO</text>
  <text x="142" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e40af">Na<tspan baseline-shift="sub" font-size="75%">₂</tspan>O</text>
  <text x="142" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e40af">FeO</text>
  <text x="142" y="222" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#3b82f6">↓ + H₂O → щёлочь</text>
  <text x="142" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#2563eb">CaO + H<tspan baseline-shift="sub" font-size="75%">₂</tspan>O → Ca(OH)<tspan baseline-shift="sub" font-size="75%">₂</tspan></text>
  <rect x="278" y="65" width="245" height="195" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="278" y="65" width="245" height="34" rx="10" fill="#16a34a"/>
  <rect x="278" y="89" width="245" height="10" fill="#16a34a"/>
  <text x="400" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff">Кислотные</text>
  <text x="400" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#166534">(Неметаллы + O)</text>
  <text x="400" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#14532d">CO<tspan baseline-shift="sub" font-size="75%">₂</tspan></text>
  <text x="400" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#14532d">SO<tspan baseline-shift="sub" font-size="75%">₃</tspan></text>
  <text x="400" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#14532d">P<tspan baseline-shift="sub" font-size="75%">₂</tspan>O<tspan baseline-shift="sub" font-size="75%">₅</tspan></text>
  <text x="400" y="222" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#16a34a">↓ + H₂O → кислота</text>
  <text x="400" y="245" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#166534">SO<tspan baseline-shift="sub" font-size="75%">₃</tspan> + H<tspan baseline-shift="sub" font-size="75%">₂</tspan>O → H<tspan baseline-shift="sub" font-size="75%">₂</tspan>SO<tspan baseline-shift="sub" font-size="75%">₄</tspan></text>
  <rect x="535" y="65" width="245" height="195" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="535" y="65" width="245" height="34" rx="10" fill="#8b5cf6"/>
  <rect x="535" y="89" width="245" height="10" fill="#8b5cf6"/>
  <text x="657" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff">Амфотерные</text>
  <text x="657" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#6d28d9">(Свойства обоих типов)</text>
  <text x="657" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4c1d95">ZnO</text>
  <text x="657" y="175" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4c1d95">Al<tspan baseline-shift="sub" font-size="75%">₂</tspan>O<tspan baseline-shift="sub" font-size="75%">₃</tspan></text>
  <text x="657" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#7c3aed">+ кислота → соль + H₂O</text>
  <text x="657" y="222" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#7c3aed">+ щёлочь → соль + H₂O</text>
  <text x="657" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#6d28d9">ZnO + 2HCl → ZnCl<tspan baseline-shift="sub" font-size="75%">₂</tspan> + H<tspan baseline-shift="sub" font-size="75%">₂</tspan>O</text>
  <rect x="30" y="275" width="740" height="205" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="300" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#047857">Взаимодействие оксидов</text>
  <rect x="50" y="315" width="180" height="55" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e40af">CaO</text>
  <text x="140" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#3b82f6">Основный оксид</text>
  <text x="260" y="345" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#64748b">+</text>
  <rect x="290" y="315" width="180" height="55" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#14532d">SiO<tspan baseline-shift="sub" font-size="75%">₂</tspan></text>
  <text x="380" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#16a34a">Кислотный оксид</text>
  <line x1="490" y1="342" x2="530" y2="342" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-10b981)"/>
  <rect x="545" y="315" width="200" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="645" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">CaSiO<tspan baseline-shift="sub" font-size="75%">₃</tspan></text>
  <text x="645" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#b45309">Соль</text>
  <rect x="50" y="390" width="180" height="55" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="413" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e40af">CuO</text>
  <text x="140" y="435" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#3b82f6">Основный оксид</text>
  <text x="260" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#64748b">+</text>
  <rect x="290" y="390" width="180" height="55" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="380" y="413" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">2HCl</text>
  <text x="380" y="435" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#ef4444">Кислота</text>
  <line x1="490" y1="417" x2="530" y2="417" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-10b981)"/>
  <rect x="545" y="390" width="200" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="645" y="413" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#92400e">CuCl<tspan baseline-shift="sub" font-size="75%">₂</tspan> + H<tspan baseline-shift="sub" font-size="75%">₂</tspan>O</text>
  <text x="645" y="435" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#b45309">Соль + Вода</text>
  <text x="400" y="470" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-style="italic" fill="#047857">Общая формула оксидов: ЭₓOᵧ</text>
</svg>
