<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#10b981" rx="3"/>
<text x="400" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Простые вещества — неметаллы</text>
<rect x="25" y="60" width="470" height="170" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<text x="260" y="85" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">Примеры неметаллов</text>
<rect x="70" y="100" width="110" height="115" rx="10" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
<text x="125" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#7c3aed">I₂</text>
<text x="125" y="155" text-anchor="middle" font-size="12" fill="#475569">Йод</text>
<text x="125" y="175" text-anchor="middle" font-size="10" fill="#64748b">Фиолетовые</text>
<text x="125" y="189" text-anchor="middle" font-size="10" fill="#64748b">кристаллы</text>
<rect x="195" y="100" width="110" height="115" rx="10" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1.5"/>
<text x="250" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#eab308">S</text>
<text x="250" y="155" text-anchor="middle" font-size="12" fill="#475569">Сера</text>
<text x="250" y="175" text-anchor="middle" font-size="10" fill="#64748b">Жёлтый</text>
<text x="250" y="189" text-anchor="middle" font-size="10" fill="#64748b">порошок</text>
<rect x="320" y="100" width="110" height="115" rx="10" fill="#6b7280" opacity="0.1" stroke="#6b7280" stroke-width="1.5"/>
<text x="375" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#6b7280">C</text>
<text x="375" y="155" text-anchor="middle" font-size="12" fill="#475569">Углерод</text>
<text x="375" y="175" text-anchor="middle" font-size="10" fill="#64748b">Графит /</text>
<text x="375" y="189" text-anchor="middle" font-size="10" fill="#64748b">Алмаз</text>
<rect x="445" y="100" width="110" height="115" rx="10" fill="#f8fafc" opacity="0.1" stroke="#94a3b8" stroke-width="1.5"/>
<text x="500" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#94a3b8">P</text>
<text x="500" y="155" text-anchor="middle" font-size="12" fill="#475569">Фосфор</text>
<text x="500" y="175" text-anchor="middle" font-size="10" fill="#64748b">Белый /</text>
<text x="500" y="189" text-anchor="middle" font-size="10" fill="#64748b">Красный</text>
<rect x="515" y="60" width="260" height="170" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="515" y="60" width="260" height="6" rx="3" fill="#10b981"/>
<text x="645" y="85" text-anchor="middle" font-size="14" font-weight="600" fill="#10b981">Аллотропия</text>
<text x="645" y="103" text-anchor="middle" font-size="11" fill="#64748b">Разные формы одного элемента</text>
<text x="555" y="130" font-size="14" fill="#1e3a5f">O<tspan font-size="10" baseline-shift="sub">2</tspan></text>
<text x="585" y="130" font-size="14" fill="#475569">— кислород</text>
<text x="555" y="150" font-size="14" fill="#1e3a5f">O<tspan font-size="10" baseline-shift="sub">3</tspan></text>
<text x="585" y="150" font-size="14" fill="#475569">— озон</text>
<line x1="535" y1="165" x2="755" y2="165" stroke="#e2e8f0" stroke-width="1"/>
<text x="645" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">C — углерод:</text>
<text x="555" y="205" font-size="12" fill="#475569">💎 Алмаз — прозрачный, твёрдый</text>
<text x="555" y="222" font-size="12" fill="#475569">✏️ Графит — серый, мягкий</text>
<rect x="25" y="250" width="350" height="230" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<text x="200" y="275" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">Свойства неметаллов</text>
<circle cx="60" cy="300" r="16" fill="#ef4444" opacity="0.12"/>
<text x="60" y="305" text-anchor="middle" font-size="14">💔</text>
<text x="85" y="304" font-size="13" fill="#334155">Хрупкие</text>
<circle cx="60" cy="348" r="16" fill="#64748b" opacity="0.12"/>
<text x="60" y="353" text-anchor="middle" font-size="14">🔇</text>
<text x="85" y="352" font-size="13" fill="#334155">Не звонкие</text>
<circle cx="60" cy="396" r="16" fill="#3b82f6" opacity="0.12"/>
<text x="60" y="401" text-anchor="middle" font-size="14">🧊</text>
<text x="85" y="400" font-size="13" fill="#334155">Разнообразные</text>
<text x="85" y="414" font-size="13" fill="#334155">агрегатные состояния</text>
<circle cx="60" cy="444" r="16" fill="#8b5cf6" opacity="0.12"/>
<text x="60" y="449" text-anchor="middle" font-size="14">❄️</text>
<text x="85" y="448" font-size="13" fill="#334155">Плохие проводники</text>
<text x="85" y="462" font-size="13" fill="#334155">тепла и электричества</text>
<rect x="395" y="250" width="380" height="230" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<text x="585" y="275" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">Агрегатные состояния при н.у.</text>
<rect x="415" y="308" width="14" height="14" rx="3" fill="#93c5fd"/>
<text x="438" y="320" font-size="14" font-weight="600" fill="#475569">Газообразные:</text>
<text x="438" y="340" font-size="13" fill="#64748b">O₂, N₂, H₂, Cl₂, F₂</text>
<rect x="415" y="368" width="14" height="14" rx="3" fill="#6ee7b7"/>
<text x="438" y="380" font-size="14" font-weight="600" fill="#475569">Жидкие:</text>
<text x="438" y="400" font-size="13" fill="#64748b">Br₂</text>
<rect x="415" y="428" width="14" height="14" rx="3" fill="#fbbf24"/>
<text x="438" y="440" font-size="14" font-weight="600" fill="#475569">Твёрдые:</text>
<text x="438" y="460" font-size="13" fill="#64748b">C, S, P, I₂, Si</text>
</svg>
