<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="flask1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Уравнения химических реакций</text>

  <!-- Law of conservation of mass -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="700" height="80" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">Закон сохранения массы (М.В. Ломоносов, 1748)</text>
    <text x="350" y="50" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">Масса реагентов = Масса продуктов</text>
    <text x="350" y="70" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Число атомов каждого элемента слева = числу атомов справа</text>
  </g>

  <!-- Balancing example -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="700" height="250" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Пример: Горение алюминия</text>

    <!-- Unbalanced equation -->
    <text x="350" y="55" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">Неуравненное: Al + O2 → Al2O3</text>

    <!-- Step 1: Count atoms -->
    <g transform="translate(20, 75)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Слева: Al=1, O=2</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Справа: Al=2, O=3</text>
    </g>

    <!-- Step 2: Balance -->
    <g transform="translate(350, 80)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24">Шаг 1: Al — ставим 4Al (чтобы Al было чётное)</text>
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24">Шаг 2: Al2O3 — ставим 2Al2O3 (Al=4, O=6)</text>
      <text x="0" y="40" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24">Шаг 3: O2 — ставим 3O2 (O=6)</text>
    </g>

    <!-- Balanced equation (large) -->
    <text x="350" y="180" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981" text-anchor="middle" filter="url(#glow1)">4Al + 3O2 = 2Al2O3</text>

    <!-- Verification -->
    <g transform="translate(150, 200)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#10b981">Проверка:</text>
      <text x="100" y="0" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Al: 4 = 4</text>
      <text x="250" y="0" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">O: 6 = 6</text>
    </g>

    <!-- Check mark -->
    <circle cx="600" cy="195" r="15" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="200" font-family="Arial, sans-serif" font-size="16" fill="#10b981" text-anchor="middle">&#10003;</text>
  </g>

  <!-- Tips box -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="700" height="40" rx="6" fill="#0f172a" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle">Совет: Начинайте уравнивание с элемента, у которого наименьшее число атомов</text>
  </g>
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>