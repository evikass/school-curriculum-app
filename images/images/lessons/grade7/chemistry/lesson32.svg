<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .card-title { font-size: 13px; font-weight: 600; fill: #1e293b; }
    .card-text { font-size: 11px; fill: #475569; }
    .formula { font-size: 15px; fill: #334155; font-weight: 600; }
    .label { font-size: 12px; fill: #475569; }
    .small { font-size: 10px; fill: #94a3b8; }
    .accent-text { font-size: 12px; font-weight: 600; }
  </style>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <!-- Accent bar -->
  <rect width="800" height="6" rx="3" fill="#f43f5e"/>
  <!-- Title -->
  <text x="40" y="42" class="title">Расчёты с массовой долей</text>
  <rect x="40" y="50" width="60" height="3" rx="1.5" fill="#f43f5e" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="40" y="72" class="subtitle">Три типа задач: нахождение w, массы вещества и разбавление раствора</text>

  <!-- Formula Triangle -->
  <g transform="translate(170, 210)">
    <text x="0" y="-55" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Треугольник формул</text>
    <!-- Triangle -->
    <polygon points="0,-40 100,80 -100,80" fill="#f43f5e" opacity="0.05" stroke="#f43f5e" stroke-width="2"/>
    <!-- Top vertex: m(в-ва) -->
    <rect x="-42" y="-48" width="84" height="24" rx="6" fill="#f43f5e" opacity="0.15"/>
    <text x="0" y="-31" text-anchor="middle" font-size="13" font-weight="700" fill="#f43f5e">m(в-ва)</text>
    <!-- Bottom-left: w -->
    <rect x="-95" y="68" width="60" height="24" rx="6" fill="#f43f5e" opacity="0.15"/>
    <text x="-65" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#f43f5e">w</text>
    <!-- Bottom-right: m(р-ра) -->
    <rect x="35" y="68" width="80" height="24" rx="6" fill="#f43f5e" opacity="0.15"/>
    <text x="75" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#f43f5e">m(р-ра)</text>
    <!-- Connecting labels -->
    <text x="-58" y="30" text-anchor="middle" font-size="10" fill="#64748b">×</text>
    <text x="58" y="30" text-anchor="middle" font-size="10" fill="#64748b">÷</text>
    <text x="0" y="100" text-anchor="middle" font-size="10" fill="#64748b">÷</text>
  </g>

  <!-- Three problem type cards -->
  <!-- Type 1: Find w -->
  <g transform="translate(28, 330)">
    <rect width="230" height="145" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="230" height="4" rx="2" fill="#f43f5e" opacity="0.7"/>
    <rect x="10" y="14" width="28" height="20" rx="5" fill="#f43f5e" opacity="0.15"/>
    <text x="24" y="29" text-anchor="middle" font-size="12" font-weight="700" fill="#f43f5e">1</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#1e293b">Найти w</text>
    <line x1="10" y1="40" x2="220" y2="40" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="58" class="card-text">Дано: m(в-ва), m(р-ра)</text>
    <text x="15" y="76" class="card-text" font-weight="600" fill="#f43f5e">w = m(в-ва) / m(р-ра) × 100%</text>
    <rect x="10" y="90" width="210" height="42" rx="5" fill="#f43f5e" opacity="0.05"/>
    <text x="15" y="108" class="small">Пример: 20 г соли в 200 г р-ра</text>
    <text x="15" y="124" class="small" font-weight="600" fill="#f43f5e">w = 20/200 × 100% = 10%</text>
  </g>

  <!-- Type 2: Find m(solute) -->
  <g transform="translate(275, 330)">
    <rect width="230" height="145" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="230" height="4" rx="2" fill="#8b5cf6" opacity="0.7"/>
    <rect x="10" y="14" width="28" height="20" rx="5" fill="#8b5cf6" opacity="0.15"/>
    <text x="24" y="29" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">2</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#1e293b">Найти m(в-ва)</text>
    <line x1="10" y1="40" x2="220" y2="40" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="58" class="card-text">Дано: w, m(р-ра)</text>
    <text x="15" y="76" class="card-text" font-weight="600" fill="#8b5cf6">m(в-ва) = w × m(р-ра) / 100%</text>
    <rect x="10" y="90" width="210" height="42" rx="5" fill="#8b5cf6" opacity="0.05"/>
    <text x="15" y="108" class="small">Пример: w=15%, m(р-ра)=300 г</text>
    <text x="15" y="124" class="small" font-weight="600" fill="#8b5cf6">m(в-ва) = 15×300/100 = 45 г</text>
  </g>

  <!-- Type 3: Dilution -->
  <g transform="translate(522, 330)">
    <rect width="250" height="145" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="250" height="4" rx="2" fill="#0891b2" opacity="0.7"/>
    <rect x="10" y="14" width="28" height="20" rx="5" fill="#0891b2" opacity="0.15"/>
    <text x="24" y="29" text-anchor="middle" font-size="12" font-weight="700" fill="#0891b2">3</text>
    <text x="48" y="30" font-size="12" font-weight="600" fill="#1e293b">Разбавление раствора</text>
    <line x1="10" y1="40" x2="240" y2="40" stroke="#e2e8f0" stroke-width="1"/>
    <text x="15" y="58" class="card-text">m(в-ва) не меняется!</text>
    <text x="15" y="76" class="card-text" font-weight="600" fill="#0891b2">m(р-ра₁)×w₁ = m(р-ра₂)×w₂</text>
    <rect x="10" y="90" width="230" height="42" rx="5" fill="#0891b2" opacity="0.05"/>
    <text x="15" y="108" class="small">К 100 г 20% р-ра добавили 100 г воды:</text>
    <text x="15" y="124" class="small" font-weight="600" fill="#0891b2">100×20 = 200×w₂ → w₂ = 10%</text>
  </g>

  <!-- Density formula box -->
  <g transform="translate(370, 90)">
    <rect width="200" height="50" rx="8" fill="#f43f5e" opacity="0.07" stroke="#f43f5e" stroke-width="1"/>
    <text x="100" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#f43f5e">
      m = ρ × V
    </text>
    <text x="100" y="40" text-anchor="middle" class="small">масса = плотность × объём</text>
  </g>

  <!-- Useful relationships box -->
  <g transform="translate(590, 90)">
    <rect width="180" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="90" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Полезные формулы:</text>
    <text x="15" y="40" class="small">m(р-ра) = m(в-ва) + m(H<tspan baseline-shift="sub" font-size="75%">2</tspan>O)</text>
  </g>

  <!-- Warning note -->
  <text x="400" y="490" text-anchor="middle" class="small">При разбавлении масса растворённого вещества остаётся постоянной, а масса раствора увеличивается</text>
</svg>
