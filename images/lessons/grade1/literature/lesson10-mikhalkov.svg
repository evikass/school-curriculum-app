<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="cityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909C"/>
      <stop offset="100%" style="stop-color:#B0BEC5"/>
    </linearGradient>
  </defs>
  
  <!-- Background - city -->
  <rect width="400" height="300" fill="url(#cityGrad)"/>
  
  <!-- Buildings -->
  <rect x="0" y="120" width="50" height="180" fill="#546E7A"/>
  <rect x="60" y="100" width="40" height="200" fill="#455A64"/>
  <rect x="110" y="140" width="35" height="160" fill="#546E7A"/>
  <rect x="260" y="90" width="45" height="210" fill="#455A64"/>
  <rect x="315" y="130" width="50" height="170" fill="#546E7A"/>
  <rect x="370" y="110" width="30" height="190" fill="#455A64"/>
  
  <!-- Windows -->
  <g fill="#FFF9C4" opacity="0.8">
    <rect x="10" y="140" width="10" height="15"/>
    <rect x="30" y="140" width="10" height="15"/>
    <rect x="10" y="170" width="10" height="15"/>
    <rect x="30" y="170" width="10" height="15"/>
    
    <rect x="70" y="120" width="8" height="12"/>
    <rect x="85" y="120" width="8" height="12"/>
    <rect x="70" y="145" width="8" height="12"/>
    <rect x="85" y="145" width="8" height="12"/>
  </g>
  
  <!-- Street -->
  <rect x="0" y="260" width="400" height="40" fill="#37474F"/>
  <rect x="0" y="278" width="400" height="3" fill="#FFEB3B" stroke-dasharray="20,10"/>
  
  <!-- Sidewalk -->
  <rect x="0" y="250" width="400" height="10" fill="#9E9E9E"/>
  
  <!-- Dyadya Styopa (Uncle Styopa) - very tall -->
  <g transform="translate(180, 60)">
    <!-- Body (very tall) -->
    <rect x="-20" y="0" width="40" height="120" fill="#1976D2" rx="5"/>
    
    <!-- Head -->
    <circle cx="0" cy="-25" r="25" fill="#FFCC80"/>
    
    <!-- Hat -->
    <ellipse cx="0" cy="-45" rx="22" ry="8" fill="#37474F"/>
    <rect x="-18" y="-60" width="36" height="20" fill="#37474F"/>
    
    <!-- Face -->
    <circle cx="-8" cy="-30" r="4" fill="#212121"/>
    <circle cx="8" cy="-30" r="4" fill="#212121"/>
    <path d="M-8,-18 Q0,-12 8,-18" stroke="#5D4037" stroke-width="2" fill="none"/>
    
    <!-- Arms (long) -->
    <rect x="-45" y="10" width="25" height="8" fill="#1976D2" rx="3"/>
    <rect x="20" y="10" width="25" height="8" fill="#1976D2" rx="3"/>
    
    <!-- Hands -->
    <circle cx="-48" cy="14" r="8" fill="#FFCC80"/>
    <circle cx="48" cy="14" r="8" fill="#FFCC80"/>
    
    <!-- Legs -->
    <rect x="-18" y="120" width="14" height="60" fill="#1565C0"/>
    <rect x="4" y="120" width="14" height="60" fill="#1565C0"/>
    
    <!-- Shoes -->
    <ellipse cx="-11" cy="182" rx="12" ry="6" fill="#212121"/>
    <ellipse cx="11" cy="182" rx="12" ry="6" fill="#212121"/>
    
    <!-- Height indicator -->
    <line x1="60" y1="-50" x2="60" y2="180" stroke="#F44336" stroke-width="2"/>
    <line x1="55" y1="-50" x2="65" y2="-50" stroke="#F44336" stroke-width="2"/>
    <line x1="55" y1="180" x2="65" y2="180" stroke="#F44336" stroke-width="2"/>
    <text x="70" y="70" font-family="'Comic Sans MS', cursive" font-size="12" fill="#F44336">ОЧЕНЬ</text>
    <text x="70" y="85" font-family="'Comic Sans MS', cursive" font-size="12" fill="#F44336">ВЫСОКИЙ!</text>
  </g>
  
  <!-- Children looking up at him -->
  <g transform="translate(120, 200)">
    <!-- Child 1 -->
    <rect x="-5" y="0" width="10" height="20" fill="#E91E63"/>
    <circle cx="0" cy="-10" r="10" fill="#FFCC80"/>
    <circle cx="-3" cy="-12" r="2" fill="#212121"/>
    <circle cx="3" cy="-12" r="2" fill="#212121"/>
    <ellipse cx="0" cy="-5" rx="3" ry="2" fill="#FF8A65"/>
    
    <!-- Looking up indicator -->
    <line x1="0" y1="-20" x2="0" y2="-50" stroke="#2196F3" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <g transform="translate(270, 205)">
    <!-- Child 2 -->
    <rect x="-5" y="0" width="10" height="18" fill="#4CAF50"/>
    <circle cx="0" cy="-10" r="9" fill="#FFCC80"/>
    <circle cx="-3" cy="-12" r="2" fill="#212121"/>
    <circle cx="3" cy="-12" r="2" fill="#212121"/>
    <path d="M-3,-5 Q0,-2 3,-5" stroke="#E65100" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Ball on roof -->
  <g transform="translate(280, 85)">
    <circle cx="0" cy="0" r="12" fill="#F44336"/>
    <path d="M-8,-5 Q0,8 8,-5" stroke="white" stroke-width="2" fill="none"/>
    <text x="25" y="5" font-family="'Comic Sans MS', cursive" font-size="9" fill="#333">Мяч на крыше!</text>
  </g>
  
  <!-- Police cap symbol -->
  <g transform="translate(350, 30)">
    <rect x="-15" y="0" width="30" height="15" fill="#1565C0"/>
    <rect x="-18" y="-5" width="36" height="8" fill="#1976D2"/>
    <circle cx="0" cy="5" r="6" fill="#FFD600"/>
    <text x="0" y="35" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="white">МИЛИЦИЯ</text>
  </g>
  
  <!-- Speech bubble -->
  <g transform="translate(300, 100)">
    <rect x="-5" y="-20" width="80" height="35" fill="white" rx="8"/>
    <polygon points="-5,15 10,5 -5,0" fill="white"/>
    <text x="35" y="-5" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#333">Помогаю всем!</text>
    <text x="35" y="8" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#333">Дядя Стёпа</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="295" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="14" font-weight="bold" fill="#1565C0">
    С.В. Михалков «Дядя Стёпа»
  </text>
</svg>