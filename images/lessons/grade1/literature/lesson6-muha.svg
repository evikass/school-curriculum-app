<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes fly1 {
      0%, 100% { transform: translate(170px, 70px) translateY(0) rotate(0deg); }
      50% { transform: translate(170px, 70px) translateY(-10px) rotate(5deg); }
    }
    @keyframes fly2 {
      0%, 100% { transform: translate(120px, 300px) translateY(0) rotate(0deg); }
      50% { transform: translate(120px, 300px) translateY(-10px) rotate(-5deg); }
    }
    @keyframes buzz {
      0%, 100% { transform: translate(50px, 200px) scale(1); }
      50% { transform: translate(50px, 200px) scale(1.05); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .fly1 { animation: fly1 2s ease-in-out infinite; }
    .fly2 { animation: fly2 2s ease-in-out infinite 1s; }
    .buzz { animation: buzz 0.5s ease-in-out infinite; }
    .sparkle { animation: sparkle 1s ease-in-out infinite; }
  </style>
  <!-- Background -->
  <rect width="400" height="400" fill="#fef3c7" rx="20"/>
  <!-- Decorative patterns -->
  <circle cx="50" cy="50" r="15" fill="#fde68a" opacity="0.5"/>
  <circle cx="350" cy="60" r="20" fill="#fde68a" opacity="0.5"/>
  <circle cx="40" cy="360" r="18" fill="#fde68a" opacity="0.5"/>
  <circle cx="360" cy="350" r="22" fill="#fde68a" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="35" font-size="18" fill="#b45309" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">МУХА-ЦОКОТУХА</text>
  <text x="200" y="52" font-size="11" fill="#92400e" text-anchor="middle" font-family="Arial, sans-serif">К.И. Чуковский</text>
  <!-- Fly (Muha) -->
  <g class="fly1">
    <!-- Body -->
    <ellipse cx="30" cy="45" rx="22" ry="28" fill="#fbbf24"/>
    <!-- Stripes -->
    <path d="M 10 35 Q 30 32 50 35" stroke="#78350f" stroke-width="3" fill="none"/>
    <path d="M 8 45 Q 30 42 52 45" stroke="#78350f" stroke-width="3" fill="none"/>
    <path d="M 10 55 Q 30 52 50 55" stroke="#78350f" stroke-width="3" fill="none"/>
    <!-- Head -->
    <circle cx="30" cy="12" r="15" fill="#fbbf24"/>
    <!-- Eyes -->
    <circle cx="22" cy="10" r="6" fill="#22c55e"/>
    <circle cx="38" cy="10" r="6" fill="#22c55e"/>
    <circle cx="22" cy="10" r="3" fill="#1e293b"/>
    <circle cx="38" cy="10" r="3" fill="#1e293b"/>
    <!-- Wings -->
    <ellipse cx="5" cy="35" rx="18" ry="10" fill="#bfdbfe" opacity="0.7"/>
    <ellipse cx="55" cy="35" rx="18" ry="10" fill="#bfdbfe" opacity="0.7"/>
    <!-- Antennae -->
    <path d="M 22 -2 Q 18 -15 15 -10" stroke="#78350f" stroke-width="2" fill="none"/>
    <path d="M 38 -2 Q 42 -15 45 -10" stroke="#78350f" stroke-width="2" fill="none"/>
    <!-- Crown (birthday) -->
    <polygon points="15,-5 20,10 25,0 30,15 35,0 40,10 45,-5 45,15 15,15" fill="#ec4899" stroke="#db2777" stroke-width="1"/>
    <!-- Sparkle -->
    <polygon class="sparkle" points="55,5 56,8 59,8 57,10 58,13 55,11 52,13 53,10 51,8 54,8" fill="#fef3c7"/>
    <!-- Legs -->
    <line x1="10" y1="55" x2="0" y2="75" stroke="#78350f" stroke-width="2"/>
    <line x1="20" y1="60" x2="15" y2="80" stroke="#78350f" stroke-width="2"/>
    <line x1="40" y1="60" x2="45" y2="80" stroke="#78350f" stroke-width="2"/>
    <line x1="50" y1="55" x2="60" y2="75" stroke="#78350f" stroke-width="2"/>
    <text x="30" y="105" font-size="10" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Муха-Цокотуха</text>
  </g>
  <!-- Samovar -->
  <g class="buzz">
    <ellipse cx="50" cy="100" rx="45" ry="20" fill="#dc2626"/>
    <rect x="15" y="50" width="70" height="50" fill="#dc2626" rx="10"/>
    <ellipse cx="50" cy="50" rx="35" ry="15" fill="#dc2626"/>
    <ellipse cx="50" cy="55" rx="25" ry="10" fill="#991b1b"/>
    <!-- Handle -->
    <ellipse cx="95" cy="70" rx="10" ry="15" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
    <!-- Spout -->
    <polygon points="0,60 -15,55 -10,70" fill="#dc2626"/>
    <!-- Steam -->
    <path d="M 40 40 Q 35 25 45 20" stroke="#e5e7eb" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M 55 38 Q 50 20 60 15" stroke="#e5e7eb" stroke-width="2" fill="none" opacity="0.7"/>
    <text x="50" y="135" font-size="10" fill="#991b1b" text-anchor="middle" font-family="Arial, sans-serif">Самовар</text>
  </g>
  <!-- Coin (money) -->
  <g transform="translate(280, 220)">
    <circle cx="30" cy="30" r="25" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
    <text x="30" y="38" font-size="24" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">1</text>
    <circle cx="30" cy="30" r="18" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <text x="30" y="70" font-size="9" fill="#92400e" text-anchor="middle" font-family="Arial, sans-serif">Денежка</text>
  </g>
  <!-- Spider (villain) -->
  <g transform="translate(300, 80)">
    <ellipse cx="25" cy="25" rx="20" ry="15" fill="#1e293b"/>
    <circle cx="25" cy="15" r="12" fill="#1e293b"/>
    <!-- Eyes -->
    <circle cx="20" cy="12" r="3" fill="#dc2626"/>
    <circle cx="30" cy="12" r="3" fill="#dc2626"/>
    <!-- Legs -->
    <line x1="5" y1="20" x2="-10" y2="10" stroke="#1e293b" stroke-width="2"/>
    <line x1="5" y1="30" x2="-10" y2="35" stroke="#1e293b" stroke-width="2"/>
    <line x1="45" y1="20" x2="60" y2="10" stroke="#1e293b" stroke-width="2"/>
    <line x1="45" y1="30" x2="60" y2="35" stroke="#1e293b" stroke-width="2"/>
    <line x1="8" y1="25" x2="-5" y2="25" stroke="#1e293b" stroke-width="2"/>
    <line x1="42" y1="25" x2="55" y2="25" stroke="#1e293b" stroke-width="2"/>
    <text x="25" y="55" font-size="9" fill="#dc2626" text-anchor="middle" font-family="Arial, sans-serif">Паук 😈</text>
  </g>
  <!-- Mosquito (hero) -->
  <g class="fly2">
    <ellipse cx="25" cy="20" rx="12" ry="8" fill="#bfdbfe"/>
    <circle cx="25" cy="8" r="8" fill="#bfdbfe"/>
    <circle cx="22" cy="6" r="3" fill="#1e293b"/>
    <circle cx="28" cy="6" r="3" fill="#1e293b"/>
    <ellipse cx="10" cy="18" rx="12" ry="5" fill="#93c5fd" opacity="0.6"/>
    <ellipse cx="40" cy="18" rx="12" ry="5" fill="#93c5fd" opacity="0.6"/>
    <!-- Sword -->
    <line x1="25" y1="28" x2="25" y2="50" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="25" cy="52" r="3" fill="#64748b"/>
    <!-- Lantern -->
    <circle cx="50" cy="15" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <rect x="47" y="5" width="6" height="5" fill="#78350f"/>
    <text x="25" y="75" font-size="9" fill="#3b82f6" text-anchor="middle" font-family="Arial, sans-serif">Комарик 🦸</text>
  </g>
  <!-- Quote -->
  <text x="200" y="385" font-size="11" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">«Муха, Муха-Цокотуха, позолоченное брюхо!»</text>
</svg>
