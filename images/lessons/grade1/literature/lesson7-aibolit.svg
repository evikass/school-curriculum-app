<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  
  <!-- Background -->
  <rect width="400" height="400" fill="#ecfdf5" rx="20"/>
  <!-- Title -->
  <text x="200" y="35" font-size="18" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ДОКТОР АЙБОЛИТ</text>
  <text x="200" y="52" font-size="11" fill="#047857" text-anchor="middle" font-family="Arial, sans-serif">К.И. Чуковский</text>
  <!-- Doctor Aybolit -->
  <g transform="translate(40, 70)">
    <!-- Body (white coat) -->
    <rect x="20" y="70" width="70" height="100" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" rx="5"/>
    <!-- Head -->
    <circle cx="55" cy="45" r="30" fill="#fef3c7">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
    <!-- Hat -->
    <ellipse cx="55" cy="22" rx="25" ry="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="35" y="15" width="40" height="10" fill="#f8fafc"/>
    <!-- Glasses -->
    <circle cx="45" cy="42" r="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="65" cy="42" r="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="55" y1="42" x2="55" y2="42" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="35" y1="42" x2="25" y2="40" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="75" y1="42" x2="85" y2="40" stroke="#0ea5e9" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="45" cy="42" r="3" fill="#1e293b">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="65" cy="42" r="3" fill="#1e293b"/>
    <!-- Smile -->
    <path d="M 45 60 Q 55 70 65 60" stroke="#dc2626" stroke-width="2" fill="none"/>
    <!-- Beard -->
    <path d="M 35 60 Q 55 85 75 60" fill="#e5e7eb"/>
    <!-- Cross on coat -->
    <rect x="50" y="85" width="10" height="30" fill="#dc2626"/>
    <rect x="40" y="95" width="30" height="10" fill="#dc2626"/>
    <!-- Medical bag -->
    <rect x="85" y="120" width="25" height="20" fill="#78350f" rx="3"/>
    <circle cx="97" cy="130" r="3" fill="#fbbf24"/>
    <!-- Text -->
    <text x="55" y="190" font-size="10" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Доктор Айболит</text>
  </g>
  <!-- Animals waiting to be healed -->
  <!-- Fox -->
  <g transform="translate(150, 130)">
    <ellipse cx="25" cy="35" rx="20" ry="15" fill="#f97316"/>
    <polygon points="10,20 25,5 40,20" fill="#f97316"/>
    <polygon points="12,12 8,0 18,15" fill="#f97316"/>
    <polygon points="38,12 42,0 32,15" fill="#f97316"/>
    <circle cx="20" cy="22" r="3" fill="#1e293b"/>
    <circle cx="30" cy="22" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="30" rx="4" ry="3" fill="#1e293b"/>
    <text x="25" y="60" font-size="8" fill="#c2410c" text-anchor="middle" font-family="Arial, sans-serif">Лиса 🦊</text>
  </g>
  <!-- Rabbit -->
  <g style="animation-delay: 0.3s" transform="translate(210, 130)">
    <ellipse cx="25" cy="40" rx="18" ry="20" fill="#faf5ff"/>
    <circle cx="25" cy="25" r="15" fill="#faf5ff"/>
    <ellipse cx="18" cy="8" rx="5" ry="15" fill="#faf5ff"/>
    <ellipse cx="32" cy="8" rx="5" ry="15" fill="#faf5ff"/>
    <circle cx="20" cy="22" r="3" fill="#1e293b"/>
    <circle cx="30" cy="22" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="30" rx="4" ry="2" fill="#f9a8d4"/>
    <!-- Bandage -->
    <rect x="15" y="35" width="20" height="5" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="25" y="70" font-size="8" fill="#7c3aed" text-anchor="middle" font-family="Arial, sans-serif">Зайка 🐰</text>
  </g>
  <!-- Dog (Barbos) -->
  <g style="animation-delay: 0.6s" transform="translate(280, 130)">
    <ellipse cx="25" cy="35" rx="22" ry="18" fill="#a8a29e"/>
    <circle cx="25" cy="20" r="15" fill="#a8a29e"/>
    <ellipse cx="10" cy="8" rx="8" ry="12" fill="#a8a29e"/>
    <ellipse cx="40" cy="8" rx="8" ry="12" fill="#a8a29e"/>
    <circle cx="20" cy="18" r="3" fill="#1e293b"/>
    <circle cx="30" cy="18" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="28" rx="6" ry="4" fill="#1e293b"/>
    <!-- Tongue -->
    <ellipse cx="25" cy="35" rx="4" ry="6" fill="#f472b6"/>
    <text x="25" y="65" font-size="8" fill="#78716c" text-anchor="middle" font-family="Arial, sans-serif">Барбос 🐕</text>
  </g>
  <!-- African animals -->
  <g transform="translate(50, 250)">
    <text x="150" y="0" font-size="12" fill="#047857" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Животные из Африки:</text>
    <!-- Hippo -->
    <g transform="translate(0, 15)">
      <ellipse cx="30" cy="35" rx="28" ry="22" fill="#9ca3af"/>
      <ellipse cx="30" cy="20" rx="20" ry="15" fill="#9ca3af"/>
      <ellipse cx="20" cy="18" rx="6" ry="4" fill="#fef3c7"/>
      <ellipse cx="40" cy="18" rx="6" ry="4" fill="#fef3c7"/>
      <circle cx="20" cy="16" r="2" fill="#1e293b"/>
      <circle cx="40" cy="16" r="2" fill="#1e293b"/>
      <ellipse cx="30" cy="28" rx="10" ry="8" fill="#d1d5db"/>
      <text x="30" y="70" font-size="8" fill="#6b7280" text-anchor="middle" font-family="Arial, sans-serif">Бегемот 🦛</text>
    </g>
    <!-- Elephant -->
    <g style="animation-delay: 0.5s" transform="translate(80, 15)">
      <ellipse cx="35" cy="35" rx="30" ry="22" fill="#a8a29e"/>
      <circle cx="20" cy="20" r="18" fill="#a8a29e"/>
      <ellipse cx="5" cy="35" rx="20" ry="6" fill="#a8a29e"/>
      <circle cx="15" cy="15" r="5" fill="#fef3c7"/>
      <circle cx="30" cy="18" r="5" fill="#fef3c7"/>
      <circle cx="15" cy="15" r="2" fill="#1e293b"/>
      <circle cx="30" cy="18" r="2" fill="#1e293b"/>
      <text x="35" y="70" font-size="8" fill="#78716c" text-anchor="middle" font-family="Arial, sans-serif">Слон 🐘</text>
    </g>
    <!-- Lion -->
    <g style="animation-delay: 1s" transform="translate(160, 15)">
      <ellipse cx="25" cy="35" rx="20" ry="16" fill="#fbbf24"/>
      <circle cx="25" cy="20" r="18" fill="#f59e0b"/>
      <circle cx="25" cy="20" r="12" fill="#fbbf24"/>
      <circle cx="20" cy="18" r="3" fill="#1e293b"/>
      <circle cx="30" cy="18" r="3" fill="#1e293b"/>
      <ellipse cx="25" cy="25" rx="3" ry="2" fill="#1e293b"/>
      <text x="25" y="65" font-size="8" fill="#b45309" text-anchor="middle" font-family="Arial, sans-serif">Лев 🦁</text>
    </g>
    <!-- Giraffe -->
    <g style="animation-delay: 1.5s" transform="translate(220, 15)">
      <ellipse cx="20" cy="50" rx="15" ry="12" fill="#fbbf24"/>
      <rect x="15" y="15" width="10" height="35" fill="#fbbf24"/>
      <circle cx="20" cy="10" r="10" fill="#fbbf24"/>
      <circle cx="15" cy="8" r="2" fill="#1e293b"/>
      <circle cx="25" cy="8" r="2" fill="#1e293b"/>
      <!-- Spots -->
      <circle cx="20" cy="35" r="3" fill="#b45309"/>
      <circle cx="18" cy="25" r="2" fill="#b45309"/>
      <circle cx="22" cy="45" r="2" fill="#b45309"/>
      <text x="20" y="75" font-size="8" fill="#b45309" text-anchor="middle" font-family="Arial, sans-serif">Жираф 🦒</text>
    </g>
  </g>
  <!-- Heart with cross -->
  <g transform="translate(350, 80)">
    <path d="M 25 15 C 25 10, 15 5, 10 15 C 5 25, 15 35, 25 45 C 35 35, 45 25, 40 15 C 35 5, 25 10, 25 15" fill="#dc2626"/>
    <rect x="22" y="20" width="6" height="15" fill="#fef3c7"/>
    <rect x="17" y="25" width="16" height="5" fill="#fef3c7"/>
  </g>
  <!-- Quote -->
  <text x="200" y="385" font-size="10" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">«Добрый доктор Айболит! Он под деревом сидит...»</text>
</svg>