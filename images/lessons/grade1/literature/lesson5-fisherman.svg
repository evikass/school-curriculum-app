<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes swim {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-5px) rotate(-3deg); }
      75% { transform: translateY(5px) rotate(3deg); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.5); }
    }
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(3px); }
    }
    .fish { animation: swim 3s ease-in-out infinite; }
    .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    .wave { animation: wave 2s ease-in-out infinite; }
  </style>
  <!-- Background - sea -->
  <rect width="400" height="400" fill="#0ea5e9" rx="20"/>
  <!-- Waves -->
  <g class="wave">
    <path d="M 0 60 Q 50 40 100 60 Q 150 80 200 60 Q 250 40 300 60 Q 350 80 400 60" fill="#38bdf8"/>
    <path d="M 0 80 Q 50 60 100 80 Q 150 100 200 80 Q 250 60 300 80 Q 350 100 400 80" fill="#7dd3fc"/>
  </g>
  <!-- Title -->
  <text x="200" y="40" font-size="18" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">СКАЗКА О РЫБАКЕ И РЫБКЕ</text>
  <text x="200" y="58" font-size="12" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">А.С. Пушкин</text>
  <!-- Old man (fisherman) -->
  <g transform="translate(30, 200)">
    <!-- Body -->
    <rect x="20" y="50" width="50" height="70" fill="#78716c" rx="5"/>
    <!-- Head -->
    <circle cx="45" cy="35" r="25" fill="#fef3c7"/>
    <!-- Beard -->
    <path d="M 25 45 Q 45 90 65 45" fill="#e5e7eb"/>
    <!-- Eyes -->
    <circle cx="38" cy="32" r="3" fill="#1e293b"/>
    <circle cx="52" cy="32" r="3" fill="#1e293b"/>
    <!-- Hat -->
    <ellipse cx="45" cy="15" rx="22" ry="8" fill="#44403c"/>
    <rect x="28" y="8" width="34" height="10" fill="#44403c"/>
    <!-- Fishing rod -->
    <line x1="70" y1="60" x2="150" y2="20" stroke="#78350f" stroke-width="3"/>
    <line x1="150" y1="20" x2="150" y2="60" stroke="#64748b" stroke-width="1"/>
  </g>
  <!-- Golden fish -->
  <g class="fish" transform="translate(280, 180)">
    <!-- Body -->
    <ellipse cx="40" cy="40" rx="35" ry="25" fill="#fbbf24"/>
    <!-- Tail -->
    <polygon points="5,40 -15,25 -15,55" fill="#fbbf24"/>
    <!-- Fin -->
    <polygon points="40,15 50,0 55,20" fill="#f59e0b"/>
    <!-- Eye -->
    <circle cx="55" cy="35" r="8" fill="#fef3c7"/>
    <circle cx="57" cy="35" r="4" fill="#1e293b"/>
    <circle cx="58" cy="33" r="1.5" fill="#fef3c7"/>
    <!-- Crown -->
    <polygon points="30,10 35,25 45,25 50,10 50,28 30,28" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
    <!-- Sparkles -->
    <polygon class="sparkle" points="70,20 72,25 77,25 73,28 75,33 70,30 65,33 67,28 63,25 68,25" fill="#fef3c7"/>
    <polygon class="sparkle" style="animation-delay: 0.5s" points="25,5 26,8 29,8 27,10 28,13 25,11 22,13 23,10 21,8 24,8" fill="#fef3c7"/>
    <text x="40" y="80" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Золотая рыбка</text>
  </g>
  <!-- Old woman -->
  <g transform="translate(180, 280)">
    <!-- Body -->
    <rect x="10" y="40" width="45" height="55" fill="#dc2626" rx="5"/>
    <!-- Head -->
    <circle cx="32" cy="25" r="20" fill="#fef3c7"/>
    <!-- Scarf -->
    <path d="M 12 25 Q 32 50 52 25" fill="#be123c"/>
    <ellipse cx="32" cy="10" rx="22" ry="10" fill="#be123c"/>
    <!-- Angry eyes -->
    <line x1="20" y1="18" x2="28" y2="22" stroke="#6b7280" stroke-width="2"/>
    <line x1="28" y1="18" x2="20" y2="22" stroke="#6b7280" stroke-width="2"/>
    <line x1="36" y1="18" x2="44" y2="22" stroke="#6b7280" stroke-width="2"/>
    <line x1="44" y1="18" x2="36" y2="22" stroke="#6b7280" stroke-width="2"/>
    <!-- Frown -->
    <path d="M 25 35 Q 32 30 40 35" stroke="#dc2626" stroke-width="2" fill="none"/>
    <!-- Crown (wants to be queen) -->
    <polygon points="15,-5 20,10 28,0 32,15 36,0 44,10 50,-5 50,15 15,15" fill="#fcd34d" stroke="#f59e0b" stroke-width="1"/>
    <text x="32" y="115" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Старуха</text>
  </g>
  <!-- Dugout (earth house) -->
  <g transform="translate(80, 320)">
    <path d="M 0 40 L 40 0 L 80 40 Z" fill="#78350f"/>
    <rect x="5" y="40" width="70" height="30" fill="#92400e"/>
    <rect x="30" y="45" width="20" height="25" fill="#713f12"/>
    <text x="40" y="85" font-size="9" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Землянка</text>
  </g>
  <!-- Trough (broken) -->
  <g transform="translate(300, 340)">
    <ellipse cx="30" cy="20" rx="35" ry="15" fill="#a8a29e"/>
    <path d="M 0 20 L 5 35 Q 30 45 55 35 L 60 20" fill="#78716c" stroke="#57534e" stroke-width="2"/>
    <line x1="10" y1="25" x2="15" y2="35" stroke="#dc2626" stroke-width="2"/>
    <text x="30" y="55" font-size="9" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Разбитое корыто</text>
  </g>
  <!-- Moral -->
  <text x="200" y="395" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic">«Не будь жадным!»</text>
</svg>