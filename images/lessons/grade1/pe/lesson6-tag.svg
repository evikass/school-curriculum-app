<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE6)"/>
  
  <!-- Grass -->
  <rect x="0" y="220" width="400" height="80" fill="#aed581"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e65100">Догонялки</text>
  
  <!-- Runner (being chased) -->
  <g transform="translate(280, 150)">
    <animateTransform attributeName="transform" type="translate" values="280,150;290,145;280,150" dur="0.3s" repeatCount="indefinite"/>
    <!-- Body leaning forward -->
    <ellipse cx="0" cy="0" rx="16" ry="26" fill="#42a5f5" transform="rotate(-15)"/>
    <circle cx="8" cy="-38" r="16" fill="#ffcc80"/>
    <ellipse cx="8" cy="-50" rx="13" ry="9" fill="#5d4037"/>
    <circle cx="3" cy="-42" r="2.5" fill="#333"/>
    <circle cx="12" cy="-42" r="2.5" fill="#333"/>
    <!-- Worried expression -->
    <ellipse cx="8" cy="-32" rx="4" ry="3" fill="#333" opacity="0.3"/>
    <!-- Arms -->
    <ellipse cx="-18" cy="-18" rx="8" ry="5" fill="#42a5f5" transform="rotate(35 -18 -18)"/>
    <ellipse cx="18" cy="8" rx="8" ry="5" fill="#42a5f5" transform="rotate(-35 18 8)"/>
    <!-- Running legs -->
    <rect x="-12" y="22" width="6" height="28" rx="2" fill="#1565c0" transform="rotate(-25 -9 36)"/>
    <rect x="6" y="22" width="6" height="28" rx="2" fill="#1565c0" transform="rotate(25 9 36)"/>
  </g>
  
  <!-- Chaser -->
  <g transform="translate(150, 150)">
    <animateTransform attributeName="transform" type="translate" values="150,150;160,148;150,150" dur="0.35s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="0" rx="16" ry="26" fill="#ec407a" transform="rotate(-10)"/>
    <circle cx="5" cy="-38" r="16" fill="#ffcc80"/>
    <path d="M-10 -50 Q5 -62 20 -50 Q12 -42 5 -45 Q-2 -42 -10 -50" fill="#8d6e63"/>
    <circle cx="0" cy="-42" r="2.5" fill="#333"/>
    <circle cx="10" cy="-42" r="2.5" fill="#333"/>
    <!-- Happy smile -->
    <path d="M0 -32 Q5 -27 10 -32" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Arms reaching -->
    <ellipse cx="-20" cy="-10" rx="10" ry="6" fill="#ec407a" transform="rotate(-20 -20 -10)"/>
    <ellipse cx="20" cy="-5" rx="10" ry="6" fill="#ec407a" transform="rotate(20 20 -5)"/>
    <!-- Hand stretched forward -->
    <circle cx="30" cy="-8" r="6" fill="#ffcc80">
      <animate attributeName="r" values="6;8;6" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-10" y="22" width="6" height="28" rx="2" fill="#ad1457" transform="rotate(-20 -7 36)"/>
    <rect x="4" y="22" width="6" height="28" rx="2" fill="#ad1457" transform="rotate(20 7 36)"/>
  </g>
  
  <!-- Speed lines -->
  <g stroke="#ffab91" stroke-width="2" opacity="0.7">
    <line x1="110" y1="130" x2="130" y2="130">
      <animate attributeName="x1" values="110;115;110" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="100" y1="145" x2="125" y2="145">
      <animate attributeName="x1" values="100;108;100" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="115" y1="160" x2="135" y2="160">
      <animate attributeName="x1" values="115;122;115" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="240" y1="125" x2="260" y2="125">
      <animate attributeName="x1" values="240;248;240" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="245" y1="140" x2="270" y2="140">
      <animate attributeName="x1" values="245;255;245" dur="0.3s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- "Tag!" speech bubble -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;5,0;0,0" dur="0.5s" repeatCount="indefinite"/>
    <ellipse cx="100" cy="80" rx="40" ry="22" fill="white" stroke="#e65100" stroke-width="2"/>
    <text x="100" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e65100">Догоню!</text>
  </g>
  
  <!-- Tag hand indicator -->
  <g transform="translate(200, 100)">
    <path d="M-20 0 L-10 -10 L-10 -5 L20 -5 L20 5 L-10 5 L-10 10 Z" fill="#ff5722" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Distance indicator -->
  <g transform="translate(200, 260)">
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bf360c">Дистанция</text>
  </g>
  
  <!-- Sun -->
  <circle cx="50" cy="50" r="25" fill="#ffd54f"/>
  <g stroke="#ffd54f" stroke-width="3">
    <line x1="50" y1="15" x2="50" y2="5"/>
    <line x1="50" y1="85" x2="50" y2="95"/>
    <line x1="15" y1="50" x2="5" y2="50"/>
    <line x1="85" y1="50" x2="95" y2="50"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e65100">Бег за лидером</text>
</svg>