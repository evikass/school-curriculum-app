<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE5)"/>
  
  <!-- Trees for hiding -->
  <g>
    <rect x="20" y="120" width="20" height="100" fill="#795548"/>
    <ellipse cx="30" cy="100" rx="35" ry="40" fill="#4caf50"/>
    <rect x="360" y="130" width="18" height="90" fill="#795548"/>
    <ellipse cx="369" cy="115" rx="30" ry="35" fill="#66bb6a"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#7b1fa2">Прятки</text>
  
  <!-- Seeker (counting) -->
  <g transform="translate(200, 150)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="18" ry="28" fill="#f44336"/>
    <!-- Head with hands over eyes -->
    <circle cx="0" cy="-40" r="18" fill="#ffcc80"/>
    <ellipse cx="0" cy="-50" rx="15" ry="10" fill="#5d4037"/>
    <!-- Hands over eyes -->
    <ellipse cx="-5" cy="-40" rx="12" ry="8" fill="#ffcc80"/>
    <ellipse cx="5" cy="-40" rx="12" ry="8" fill="#ffcc80"/>
    <!-- Counting animation -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;3;0;-3;0" dur="1s" repeatCount="indefinite"/>
      <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c62828">
        1... 2... 3...
        <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
      </text>
    </g>
    <!-- Legs -->
    <rect x="-10" y="25" width="8" height="30" rx="3" fill="#c62828"/>
    <rect x="2" y="25" width="8" height="30" rx="3" fill="#c62828"/>
  </g>
  
  <!-- Hiding child 1 behind tree -->
  <g transform="translate(60, 160)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-5,0;0,0" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="0" rx="14" ry="22" fill="#2196f3"/>
    <circle cx="0" cy="-30" r="14" fill="#ffcc80"/>
    <ellipse cx="0" cy="-40" rx="11" ry="8" fill="#8d6e63"/>
    <circle cx="-3" cy="-33" r="2" fill="#333"/>
    <circle cx="3" cy="-33" r="2" fill="#333"/>
    <!-- Shhh finger -->
    <ellipse cx="15" cy="-25" rx="3" ry="8" fill="#ffcc80"/>
  </g>
  
  <!-- Hiding child 2 behind bush -->
  <g transform="translate(340, 170)">
    <!-- Bush -->
    <ellipse cx="0" cy="20" rx="30" ry="25" fill="#81c784"/>
    <!-- Child peeking -->
    <ellipse cx="0" cy="0" rx="12" ry="18" fill="#ff9800"/>
    <circle cx="0" cy="-22" r="12" fill="#ffcc80"/>
    <path d="M-10 -32 Q0 -40 10 -32 Q5 -27 0 -28 Q-5 -27 -10 -32" fill="#5d4037"/>
    <circle cx="-3" cy="-25" r="1.5" fill="#333"/>
    <circle cx="3" cy="-25" r="1.5" fill="#333"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,5;0,0" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Hiding child 3 crouching -->
  <g transform="translate(140, 200)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-3,0;0,0" dur="2.5s" repeatCount="indefinite"/>
    <!-- Crouching body -->
    <ellipse cx="0" cy="0" rx="15" ry="15" fill="#9c27b0"/>
    <circle cx="0" cy="-22" r="13" fill="#ffcc80"/>
    <ellipse cx="0" cy="-32" rx="10" ry="7" fill="#6d4c41"/>
    <circle cx="-3" cy="-25" r="2" fill="#333"/>
    <circle cx="3" cy="-25" r="2" fill="#333"/>
    <path d="M-3 -16 Q0 -13 3 -16" stroke="#333" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Counting numbers floating -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2" font-weight="bold">
    <text x="150" y="80">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      4
    </text>
    <text x="250" y="70">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      5
    </text>
    <text x="180" y="60">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.6s"/>
      6
    </text>
    <text x="220" y="80">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.9s"/>
      7
    </text>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="230" width="400" height="70" fill="#a5d6a7"/>
  
  <!-- Flowers decoration -->
  <g>
    <circle cx="50" cy="250" r="5" fill="#e91e63"/>
    <circle cx="350" cy="255" r="4" fill="#ff9800"/>
    <circle cx="100" cy="260" r="4" fill="#e91e63"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a148c">Игра в прятки</text>
</svg>