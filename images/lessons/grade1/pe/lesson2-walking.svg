<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE2)"/>
  
  <!-- Floor -->
  <rect x="0" y="200" width="400" height="100" fill="#a5d6a7"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2e7d32">Ходьба</text>
  
  <!-- Walking feet animations -->
  <!-- On toes -->
  <g transform="translate(70, 120)">
    <text x="0" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1b5e20">На носках</text>
    <ellipse cx="0" cy="20" rx="20" ry="10" fill="#ffcc80"/>
    <ellipse cx="0" cy="5" rx="12" ry="8" fill="#ffcc80"/>
    <!-- Animated bouncing -->
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="0.8s" repeatCount="indefinite"/>
  </g>
  
  <!-- On heels -->
  <g transform="translate(150, 120)">
    <text x="0" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1b5e20">На пятках</text>
    <ellipse cx="0" cy="20" rx="20" ry="10" fill="#ffcc80"/>
    <ellipse cx="0" cy="10" rx="15" ry="6" fill="#ffcc80"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="0.8s" repeatCount="indefinite" begin="0.2s"/>
  </g>
  
  <!-- Half-squat walk -->
  <g transform="translate(230, 130)">
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1b5e20">В полуприседе</text>
    <ellipse cx="0" cy="15" rx="18" ry="8" fill="#ffcc80"/>
    <ellipse cx="-12" cy="10" rx="8" ry="5" fill="#ffcc80"/>
    <ellipse cx="12" cy="10" rx="8" ry="5" fill="#ffcc80"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,5;0,0" dur="1s" repeatCount="indefinite"/>
  </g>
  
  <!-- Side step -->
  <g transform="translate(320, 120)">
    <text x="0" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1b5e20">Приставным шагом</text>
    <!-- Two feet side by side -->
    <ellipse cx="-12" cy="20" rx="18" ry="9" fill="#ffcc80"/>
    <ellipse cx="12" cy="20" rx="18" ry="9" fill="#ffcc80"/>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;-15,0;0,0" dur="1.2s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Child walking animation -->
  <g transform="translate(200, 170)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="20" ry="30" fill="#42a5f5"/>
    <!-- Head -->
    <circle cx="0" cy="-45" r="20" fill="#ffcc80"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-58" rx="17" ry="11" fill="#5d4037"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-48" r="3" fill="#333"/>
    <circle cx="6" cy="-48" r="3" fill="#333"/>
    <!-- Smile -->
    <path d="M-5 -38 Q0 -33 5 -38" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Arms -->
    <ellipse cx="-28" cy="-10" rx="10" ry="6" fill="#42a5f5">
      <animateTransform attributeName="transform" type="rotate" values="20;-20;20" dur="0.6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="28" cy="-10" rx="10" ry="6" fill="#42a5f5">
      <animateTransform attributeName="transform" type="rotate" values="-20;20;-20" dur="0.6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Legs walking -->
    <rect x="-12" y="25" width="8" height="30" rx="3" fill="#1565c0">
      <animateTransform attributeName="transform" type="rotate" values="15;-15;15" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="25" width="8" height="30" rx="3" fill="#1565c0">
      <animateTransform attributeName="transform" type="rotate" values="-15;15;-15" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <!-- Walking motion -->
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="0.3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Arrow showing direction -->
  <g transform="translate(200, 250)">
    <path d="M-80 0 L80 0 M60 -15 L80 0 L60 15" stroke="#2e7d32" stroke-width="3" fill="none" stroke-linecap="round"/>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1b5e20">Виды ходьбы</text>
  </g>
  
  <!-- Footprints trail -->
  <g opacity="0.3">
    <ellipse cx="50" cy="260" rx="12" ry="6" fill="#4caf50" transform="rotate(-20 50 260)"/>
    <ellipse cx="85" cy="255" rx="12" ry="6" fill="#4caf50" transform="rotate(15 85 255)"/>
    <ellipse cx="330" cy="260" rx="12" ry="6" fill="#4caf50" transform="rotate(20 330 260)"/>
    <ellipse cx="365" cy="255" rx="12" ry="6" fill="#4caf50" transform="rotate(-15 365 255)"/>
  </g>
</svg>