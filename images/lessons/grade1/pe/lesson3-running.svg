<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE3)"/>
  
  <!-- Running track -->
  <rect x="0" y="180" width="400" height="120" fill="#ef9a9a"/>
  <rect x="0" y="180" width="400" height="5" fill="#e53935"/>
  <rect x="0" y="295" width="400" height="5" fill="#e53935"/>
  <!-- Lane markings -->
  <line x1="0" y1="220" x2="400" y2="220" stroke="#ffcdd2" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#ffcdd2" stroke-width="2" stroke-dasharray="20,10"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#c62828">Бег</text>
  
  <!-- Start position (high start) -->
  <g transform="translate(60, 150)">
    <text x="0" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b71c1c">Высокий старт</text>
    <!-- Child in standing position -->
    <ellipse cx="0" cy="0" rx="15" ry="25" fill="#4caf50"/>
    <circle cx="0" cy="-35" r="15" fill="#ffcc80"/>
    <ellipse cx="0" cy="-45" rx="12" ry="8" fill="#5d4037"/>
    <circle cx="-4" cy="-38" r="2" fill="#333"/>
    <circle cx="4" cy="-38" r="2" fill="#333"/>
    <rect x="-6" y="20" width="5" height="25" rx="2" fill="#2e7d32"/>
    <rect x="1" y="20" width="5" height="25" rx="2" fill="#2e7d32"/>
    <!-- Arms ready -->
    <ellipse cx="-18" cy="-5" rx="8" ry="5" fill="#4caf50"/>
    <ellipse cx="18" cy="-5" rx="8" ry="5" fill="#4caf50"/>
  </g>
  
  <!-- Running child 1 -->
  <g transform="translate(180, 150)">
    <animateTransform attributeName="transform" type="translate" values="0,0;5,-3;0,0" dur="0.3s" repeatCount="indefinite"/>
    <!-- Body leaning forward -->
    <ellipse cx="0" cy="0" rx="15" ry="25" fill="#42a5f5" transform="rotate(-15)"/>
    <!-- Head -->
    <circle cx="5" cy="-35" r="15" fill="#ffcc80"/>
    <ellipse cx="5" cy="-45" rx="12" ry="8" fill="#5d4037"/>
    <circle cx="1" cy="-38" r="2" fill="#333"/>
    <circle cx="9" cy="-38" r="2" fill="#333"/>
    <!-- Arms swinging -->
    <ellipse cx="-20" cy="-15" rx="8" ry="5" fill="#42a5f5" transform="rotate(30 -20 -15)"/>
    <ellipse cx="20" cy="10" rx="8" ry="5" fill="#42a5f5" transform="rotate(-30 20 10)"/>
    <!-- Legs running -->
    <rect x="-15" y="15" width="5" height="28" rx="2" fill="#1565c0" transform="rotate(-25 -12 28)"/>
    <rect x="8" y="15" width="5" height="28" rx="2" fill="#1565c0" transform="rotate(25 10 28)"/>
  </g>
  
  <!-- Running child 2 (faster) -->
  <g transform="translate(280, 150)">
    <animateTransform attributeName="transform" type="translate" values="0,0;8,-5;0,0" dur="0.25s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="0" rx="15" ry="25" fill="#ec407a" transform="rotate(-20)"/>
    <circle cx="8" cy="-35" r="15" fill="#ffcc80"/>
    <path d="M-5 -48 Q8 -60 21 -48 Q16 -40 8 -43 Q0 -40 -5 -48" fill="#8d6e63"/>
    <circle cx="4" cy="-38" r="2" fill="#333"/>
    <circle cx="12" cy="-38" r="2" fill="#333"/>
    <ellipse cx="-22" cy="-20" rx="8" ry="5" fill="#ec407a" transform="rotate(40 -22 -20)"/>
    <ellipse cx="22" cy="15" rx="8" ry="5" fill="#ec407a" transform="rotate(-40 22 15)"/>
    <rect x="-18" y="12" width="5" height="30" rx="2" fill="#ad1457" transform="rotate(-35 -15 27)"/>
    <rect x="10" y="12" width="5" height="30" rx="2" fill="#ad1457" transform="rotate(35 12 27)"/>
  </g>
  
  <!-- Finish line -->
  <g transform="translate(350, 180)">
    <rect x="-5" y="0" width="10" height="115" fill="white"/>
    <rect x="-5" y="0" width="10" height="10" fill="#333"/>
    <rect x="-5" y="20" width="10" height="10" fill="#333"/>
    <rect x="-5" y="40" width="10" height="10" fill="#333"/>
    <rect x="-5" y="60" width="10" height="10" fill="#333"/>
    <rect x="-5" y="80" width="10" height="10" fill="#333"/>
    <rect x="-5" y="100" width="10" height="10" fill="#333"/>
  </g>
  
  <!-- Speed lines -->
  <g stroke="#e57373" stroke-width="2" opacity="0.6">
    <line x1="120" y1="140" x2="140" y2="140">
      <animate attributeName="x1" values="120;130;120" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="140;150;140" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="130" y1="150" x2="155" y2="150">
      <animate attributeName="x1" values="130;140;130" dur="0.3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="155;165;155" dur="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="230" y1="135" x2="260" y2="135">
      <animate attributeName="x1" values="230;245;230" dur="0.25s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="260;275;260" dur="0.25s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Medal -->
  <g transform="translate(370, 60)">
    <circle r="20" fill="#ffd54f" stroke="#ff8f00" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" values="0;5;0;-5;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6f00">1</text>
    <rect x="-5" y="15" width="10" height="20" fill="#ff8f00"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#b71c1c">Беговые упражнения</text>
</svg>