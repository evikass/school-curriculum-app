<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#fdf4ff" rx="20"/>
  <!-- Decorative elements -->
  <circle cx="60" cy="60" r="15" fill="#f9a8d4" opacity="0.5">
    <animate attributeName="r" values="15;17;15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="70" r="18" fill="#d8b4fe" opacity="0.5">
    <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="340" r="12" fill="#fdba74" opacity="0.5"/>
  <circle cx="350" cy="350" r="20" fill="#a5f3fc" opacity="0.5"/>
  <!-- Carrot decorations -->
  <g transform="translate(30, 150)">
    <path d="M 15 0 L 20 40 L 10 40 Z" fill="#f97316"/>
    <path d="M 10 0 Q 15 -10 20 0" fill="#22c55e"/>
  </g>
  <g transform="translate(340, 180)">
    <path d="M 15 0 L 20 35 L 10 35 Z" fill="#f97316"/>
    <path d="M 10 0 Q 15 -10 20 0" fill="#22c55e"/>
  </g>
  <!-- Large number 3 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="2s" repeatCount="indefinite"/>
    <text x="200" y="230" font-size="180" font-weight="bold" fill="url(#grad3)" text-anchor="middle" font-family="Arial, sans-serif">3</text>
  </g>
  <!-- Rabbit 1 -->
  <g transform="translate(80, 280)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#faf5ff"/>
    <circle cx="25" cy="10" r="15" fill="#faf5ff"/>
    <ellipse cx="18" cy="-15" rx="5" ry="18" fill="#faf5ff"/>
    <ellipse cx="32" cy="-15" rx="5" ry="18" fill="#faf5ff"/>
    <circle cx="20" cy="8" r="3" fill="#1e293b"/>
    <circle cx="30" cy="8" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="15" rx="3" ry="2" fill="#f9a8d4"/>
  </g>
  <!-- Rabbit 2 -->
  <g transform="translate(175, 300)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#fff7ed"/>
    <circle cx="25" cy="10" r="15" fill="#fff7ed"/>
    <ellipse cx="18" cy="-15" rx="5" ry="18" fill="#fff7ed"/>
    <ellipse cx="32" cy="-15" rx="5" ry="18" fill="#fff7ed"/>
    <circle cx="20" cy="8" r="3" fill="#1e293b"/>
    <circle cx="30" cy="8" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="15" rx="3" ry="2" fill="#f9a8d4"/>
  </g>
  <!-- Rabbit 3 -->
  <g transform="translate(270, 280)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#fefce8"/>
    <circle cx="25" cy="10" r="15" fill="#fefce8"/>
    <ellipse cx="18" cy="-15" rx="5" ry="18" fill="#fefce8"/>
    <ellipse cx="32" cy="-15" rx="5" ry="18" fill="#fefce8"/>
    <circle cx="20" cy="8" r="3" fill="#1e293b"/>
    <circle cx="30" cy="8" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="15" rx="3" ry="2" fill="#f9a8d4"/>
  </g>
  <!-- Label -->
  <g transform="translate(200, 380)">
    <text x="0" y="0" font-size="18" fill="#c026d3" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ТРИ</text>
  </g>
</svg>