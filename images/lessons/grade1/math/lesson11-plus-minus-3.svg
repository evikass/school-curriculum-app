<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-family="Arial Black, sans-serif" font-size="28" fill="#7b1fa2" text-anchor="middle" font-weight="bold">□ + 3  и  □ - 3</text>
  
  <!-- Plus 3 example -->
  <g transform="translate(0, 70)">
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="22" fill="#2e7d32" text-anchor="middle" font-weight="bold">5 + 3 = 8</text>
    <g transform="translate(30, 50)">
      <polygon points="10,0 20,17.5 0,17.5" fill="#ff5722"/>
      <polygon points="35,0 45,17.5 25,17.5" fill="#ff7043"/>
      <polygon points="60,0 70,17.5 50,17.5" fill="#ff5722"/>
      <polygon points="85,0 95,17.5 75,17.5" fill="#ff7043"/>
      <polygon points="110,0 120,17.5 100,17.5" fill="#ff5722"/>
      <!-- New triangles -->
      <polygon points="135,0 145,17.5 125,17.5" fill="#4caf50">
        <animate attributeName="opacity" values="0;1;1" dur="2s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="160,0 170,17.5 150,17.5" fill="#66bb6a">
        <animate attributeName="opacity" values="0;1;1" dur="2.3s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="185,0 195,17.5 175,17.5" fill="#4caf50">
        <animate attributeName="opacity" values="0;1;1" dur="2.6s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>
  
  <!-- Minus 3 example -->
  <g transform="translate(0, 160)">
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="22" fill="#c62828" text-anchor="middle" font-weight="bold">8 - 3 = 5</text>
    <g transform="translate(30, 50)">
      <polygon points="10,0 20,17.5 0,17.5" fill="#2196f3"/>
      <polygon points="35,0 45,17.5 25,17.5" fill="#42a5f5"/>
      <polygon points="60,0 70,17.5 50,17.5" fill="#2196f3"/>
      <polygon points="85,0 95,17.5 75,17.5" fill="#42a5f5"/>
      <polygon points="110,0 120,17.5 100,17.5" fill="#2196f3"/>
      <polygon points="135,0 145,17.5 125,17.5" fill="#42a5f5"/>
      <polygon points="160,0 170,17.5 150,17.5" fill="#2196f3"/>
      <polygon points="185,0 195,17.5 175,17.5" fill="#42a5f5"/>
      <!-- Crossed out -->
      <g opacity="0.3">
        <polygon points="135,0 145,17.5 125,17.5" fill="#42a5f5"/>
        <line x1="125" y1="0" x2="145" y2="17.5" stroke="#b71c1c" stroke-width="2"/>
        <polygon points="160,0 170,17.5 150,17.5" fill="#2196f3"/>
        <line x1="150" y1="0" x2="170" y2="17.5" stroke="#b71c1c" stroke-width="2"/>
        <polygon points="185,0 195,17.5 175,17.5" fill="#42a5f5"/>
        <line x1="175" y1="0" x2="195" y2="17.5" stroke="#b71c1c" stroke-width="2"/>
      </g>
    </g>
  </g>
  
  <!-- Table on the right -->
  <g transform="translate(250, 70)">
    <text x="70" y="0" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Таблица +3</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#333">0 + 3 = 3</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="12" fill="#333">1 + 3 = 4</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="12" fill="#333">2 + 3 = 5</text>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="12" fill="#333">3 + 3 = 6</text>
    <text x="0" y="105" font-family="Arial, sans-serif" font-size="12" fill="#333">4 + 3 = 7</text>
    <text x="0" y="125" font-family="Arial, sans-serif" font-size="12" fill="#333">5 + 3 = 8</text>
    <text x="0" y="145" font-family="Arial, sans-serif" font-size="12" fill="#333">6 + 3 = 9</text>
    <text x="0" y="165" font-family="Arial, sans-serif" font-size="12" fill="#333">7 + 3 = 10</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#6a1b9a" text-anchor="middle" font-weight="bold">Прибавить и вычесть 3</text>
</svg>