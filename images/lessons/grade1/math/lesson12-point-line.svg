<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaf6"/>
      <stop offset="100%" style="stop-color:#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial Black, sans-serif" font-size="24" fill="#303f9f" text-anchor="middle" font-weight="bold">Точка и линия</text>
  
  <!-- Point -->
  <g transform="translate(70, 100)">
    <circle cx="0" cy="0" r="12" fill="#e91e63">
      <animate attributeName="r" values="12;14;12" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Точка</text>
  </g>
  
  <!-- Straight line -->
  <g transform="translate(150, 100)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#2196f3" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke-width" values="4;5;4" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Прямая</text>
  </g>
  
  <!-- Curved line -->
  <g transform="translate(280, 100)">
    <path d="M0,0 Q40,-30 80,0" stroke="#4caf50" stroke-width="4" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-width" values="4;5;4" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Кривая</text>
  </g>
  
  <!-- Ray -->
  <g transform="translate(70, 200)">
    <circle cx="0" cy="0" r="6" fill="#ff9800"/>
    <line x1="0" y1="0" x2="80" y2="0" stroke="#ff9800" stroke-width="3" stroke-linecap="round"/>
    <polygon points="80,0 70,-5 70,5" fill="#ff9800"/>
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Луч</text>
  </g>
  
  <!-- Segment -->
  <g transform="translate(180, 200)">
    <circle cx="0" cy="0" r="5" fill="#9c27b0"/>
    <circle cx="80" cy="0" r="5" fill="#9c27b0"/>
    <line x1="0" y1="0" x2="80" y2="0" stroke="#9c27b0" stroke-width="3"/>
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Отрезок</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#1a237e" text-anchor="middle" font-weight="bold">Точка и линия</text>
</svg>