<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Number 2 -->
  <text x="200" y="180" font-family="Arial Black, sans-serif" font-size="120" fill="#e65100" text-anchor="middle" font-weight="bold">
    2
    <animate attributeName="font-size" values="120;125;120" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Two birds -->
  <g transform="translate(60, 50)">
    <ellipse cx="20" cy="20" rx="15" ry="12" fill="#ff9800"/>
    <circle cx="30" cy="15" r="8" fill="#ff9800"/>
    <polygon points="38,15 48,13 38,17" fill="#ff5722"/>
    <circle cx="32" cy="13" r="2" fill="#000"/>
  </g>
  <g transform="translate(100, 55)">
    <ellipse cx="20" cy="20" rx="15" ry="12" fill="#ffb74d"/>
    <circle cx="30" cy="15" r="8" fill="#ffb74d"/>
    <polygon points="38,15 48,13 38,17" fill="#ff5722"/>
    <circle cx="32" cy="13" r="2" fill="#000"/>
  </g>
  
  <!-- Two apples -->
  <ellipse cx="280" cy="55" rx="18" ry="20" fill="#f44336">
    <animate attributeName="ry" values="20;22;20" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="320" cy="60" rx="18" ry="20" fill="#c62828">
    <animate attributeName="ry" values="20;22;20" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <rect x="278" y="32" width="3" height="7" fill="#795548"/>
  <rect x="318" y="37" width="3" height="7" fill="#795548"/>
  
  <!-- Two stars -->
  <polygon points="80,240 85,255 100,255 88,265 93,280 80,270 67,280 72,265 60,255 75,255" fill="#ffc107">
    <animate attributeName="opacity" values="1;0.8;1" dur="1s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="120,250 125,265 140,265 128,275 133,290 120,280 107,290 112,275 100,265 115,265" fill="#ffeb3b">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Two flowers -->
  <g transform="translate(280, 230)">
    <circle cx="0" cy="0" r="10" fill="#e91e63"/>
    <circle cx="-10" cy="-8" r="8" fill="#f48fb1"/>
    <circle cx="10" cy="-8" r="8" fill="#f48fb1"/>
    <circle cx="-10" cy="8" r="8" fill="#f48fb1"/>
    <circle cx="10" cy="8" r="8" fill="#f48fb1"/>
  </g>
  <g transform="translate(320, 235)">
    <circle cx="0" cy="0" r="10" fill="#9c27b0"/>
    <circle cx="-10" cy="-8" r="8" fill="#ce93d8"/>
    <circle cx="10" cy="-8" r="8" fill="#ce93d8"/>
    <circle cx="-10" cy="8" r="8" fill="#ce93d8"/>
    <circle cx="10" cy="8" r="8" fill="#ce93d8"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#e65100" text-anchor="middle" font-weight="bold">Число и цифра 2</text>
</svg>