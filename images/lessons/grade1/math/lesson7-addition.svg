<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes plus-grow {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.2) rotate(90deg); }
    }
    @keyframes move-right {
      0% { transform: translateX(0); }
      100% { transform: translateX(20px); }
    }
    @keyframes pop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .apple { animation: bounce 2s ease-in-out infinite; }
    .plus { animation: plus-grow 3s ease-in-out infinite; transform-origin: center; }
    .result { animation: pop 1.5s ease-in-out infinite; }
  </style>
  <!-- Background -->
  <rect width="400" height="400" fill="#fff7ed" rx="20"/>
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="20" fill="#fed7aa" opacity="0.6"/>
  <circle cx="350" cy="350" r="25" fill="#fef3c7" opacity="0.6"/>
  <circle cx="370" cy="60" r="15" fill="#bbf7d0" opacity="0.6"/>
  <!-- Title -->
  <text x="200" y="50" font-size="24" fill="#ea580c" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">СЛОЖЕНИЕ</text>
  <!-- Main equation: 2 + 2 = 4 -->
  <g transform="translate(50, 100)">
    <!-- First group: 2 apples -->
    <g class="apple">
      <circle cx="30" cy="80" r="25" fill="#ef4444"/>
      <ellipse cx="30" cy="55" rx="5" ry="8" fill="#22c55e"/>
      <path d="M 30 55 Q 35 45 30 40" stroke="#78350f" stroke-width="2" fill="none"/>
      <text x="30" y="90" font-size="30" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">2</text>
    </g>
    <!-- Plus sign -->
    <g class="plus" transform="translate(80, 80)">
      <rect x="-20" y="-5" width="40" height="10" fill="#22c55e" rx="3"/>
      <rect x="-5" y="-20" width="10" height="40" fill="#22c55e" rx="3"/>
    </g>
    <!-- Second group: 2 apples -->
    <g class="apple" style="animation-delay: 0.3s">
      <circle cx="170" cy="80" r="25" fill="#ef4444"/>
      <ellipse cx="170" cy="55" rx="5" ry="8" fill="#22c55e"/>
      <path d="M 170 55 Q 175 45 170 40" stroke="#78350f" stroke-width="2" fill="none"/>
      <text x="170" y="90" font-size="30" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">2</text>
    </g>
    <!-- Equals sign -->
    <g transform="translate(210, 80)">
      <rect x="-20" y="-10" width="40" height="8" fill="#6366f1" rx="2"/>
      <rect x="-20" y="5" width="40" height="8" fill="#6366f1" rx="2"/>
    </g>
    <!-- Result: 4 -->
    <g class="result">
      <text x="280" y="95" font-size="60" fill="#3b82f6" font-family="Arial, sans-serif" font-weight="bold">4</text>
    </g>
  </g>
  <!-- Visual example with circles -->
  <g transform="translate(50, 220)">
    <text x="150" y="0" font-size="14" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">ОБЪЕДИНЯЕМ ПРЕДМЕТЫ</text>
    <!-- First group circles -->
    <circle cx="40" cy="50" r="18" fill="#fca5a5" class="apple"/>
    <circle cx="75" cy="50" r="18" fill="#fca5a5" class="apple" style="animation-delay: 0.2s"/>
    <!-- Plus -->
    <text x="105" y="58" font-size="30" fill="#22c55e" font-family="Arial, sans-serif" font-weight="bold">+</text>
    <!-- Second group circles -->
    <circle cx="140" cy="50" r="18" fill="#fca5a5" class="apple" style="animation-delay: 0.4s"/>
    <circle cx="175" cy="50" r="18" fill="#fca5a5" class="apple" style="animation-delay: 0.6s"/>
    <!-- Arrow -->
    <path d="M 200 50 L 230 50" stroke="#6366f1" stroke-width="3" fill="none"/>
    <polygon points="230,50 220,45 220,55" fill="#6366f1"/>
    <!-- Result circles -->
    <circle cx="260" cy="50" r="18" fill="#86efac" class="result"/>
    <circle cx="295" cy="50" r="18" fill="#86efac" class="result" style="animation-delay: 0.2s"/>
    <circle cx="260" cy="85" r="18" fill="#86efac" class="result" style="animation-delay: 0.4s"/>
    <circle cx="295" cy="85" r="18" fill="#86efac" class="result" style="animation-delay: 0.6s"/>
  </g>
  <!-- Formula -->
  <g transform="translate(200, 370)">
    <text x="0" y="0" font-size="18" fill="#6366f1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">2 + 2 = 4</text>
  </g>
</svg>