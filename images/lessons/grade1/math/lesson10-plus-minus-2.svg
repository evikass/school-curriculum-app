<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-family="Arial Black, sans-serif" font-size="28" fill="#f57f17" text-anchor="middle" font-weight="bold">□ + 2  и  □ - 2</text>
  
  <!-- Plus 2 example -->
  <g transform="translate(0, 70)">
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="22" fill="#2e7d32" text-anchor="middle" font-weight="bold">4 + 2 = 6</text>
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="20" height="20" fill="#ff9800" rx="3"/>
      <rect x="25" y="0" width="20" height="20" fill="#ffb74d" rx="3"/>
      <rect x="50" y="0" width="20" height="20" fill="#ff9800" rx="3"/>
      <rect x="75" y="0" width="20" height="20" fill="#ffb74d" rx="3"/>
      <!-- New blocks -->
      <rect x="100" y="0" width="20" height="20" fill="#4caf50" rx="3">
        <animate attributeName="opacity" values="0;1;1" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="125" y="0" width="20" height="20" fill="#66bb6a" rx="3">
        <animate attributeName="opacity" values="0;1;1" dur="2.3s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Minus 2 example -->
  <g transform="translate(0, 160)">
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="22" fill="#c62828" text-anchor="middle" font-weight="bold">7 - 2 = 5</text>
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="18" height="18" fill="#f44336" rx="3"/>
      <rect x="23" y="0" width="18" height="18" fill="#ef5350" rx="3"/>
      <rect x="46" y="0" width="18" height="18" fill="#f44336" rx="3"/>
      <rect x="69" y="0" width="18" height="18" fill="#ef5350" rx="3"/>
      <rect x="92" y="0" width="18" height="18" fill="#f44336" rx="3"/>
      <rect x="115" y="0" width="18" height="18" fill="#ef5350" rx="3"/>
      <rect x="138" y="0" width="18" height="18" fill="#f44336" rx="3"/>
      <!-- Crossed out -->
      <g opacity="0.3">
        <rect x="115" y="0" width="18" height="18" fill="#ef5350" rx="3"/>
        <line x1="115" y1="0" x2="133" y2="18" stroke="#b71c1c" stroke-width="2"/>
        <line x1="115" y1="18" x2="133" y2="0" stroke="#b71c1c" stroke-width="2"/>
        <rect x="138" y="0" width="18" height="18" fill="#f44336" rx="3"/>
        <line x1="138" y1="0" x2="156" y2="18" stroke="#b71c1c" stroke-width="2"/>
        <line x1="138" y1="18" x2="156" y2="0" stroke="#b71c1c" stroke-width="2"/>
      </g>
    </g>
  </g>
  
  <!-- Table on the right -->
  <g transform="translate(250, 70)">
    <text x="70" y="0" font-family="Arial, sans-serif" font-size="14" fill="#f57f17" text-anchor="middle" font-weight="bold">Таблица +2</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#333">1 + 2 = 3</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="12" fill="#333">2 + 2 = 4</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="12" fill="#333">3 + 2 = 5</text>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="12" fill="#333">4 + 2 = 6</text>
    <text x="0" y="105" font-family="Arial, sans-serif" font-size="12" fill="#333">5 + 2 = 7</text>
    <text x="0" y="125" font-family="Arial, sans-serif" font-size="12" fill="#333">6 + 2 = 8</text>
    <text x="0" y="145" font-family="Arial, sans-serif" font-size="12" fill="#333">7 + 2 = 9</text>
    <text x="0" y="165" font-family="Arial, sans-serif" font-size="12" fill="#333">8 + 2 = 10</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#e65100" text-anchor="middle" font-weight="bold">Прибавить и вычесть 2</text>
</svg>