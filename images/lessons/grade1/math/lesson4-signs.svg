<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  
  <!-- Background -->
  <rect width="500" height="350" fill="#dbeafe"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1d4ed8">Знаки +, -, = ➕➖</text>
  
  <!-- Plus sign section -->
  <rect x="20" y="50" width="150" height="140" fill="#dcfce7" rx="12"/>
  <text x="95" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#15803d">Плюс (+)</text>
  <text x="95" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">Сложение</text>
  
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <rect x="85" y="110" width="20" height="60" fill="#22c55e" rx="3"/>
    <rect x="65" y="130" width="60" height="20" fill="#22c55e" rx="3"/>
  </g>
  <text x="95" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Предметов становится больше</text>
  
  <!-- Example: 2 + 1 = 3 -->
  <g>
    <rect x="180" y="50" width="150" height="140" fill="#fef3c7" rx="12"/>
    <text x="255" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b45309">Пример</text>
    
    <text x="210" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#92400e">2</text>
    <text x="235" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#22c55e">+</text>
    <text x="260" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#92400e">1</text>
    <text x="285" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#3b82f6">=</text>
    <text x="310" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#dc2626">3</text>
    
    <text x="255" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎🍎 + 🍎 = 🍎🍎🍎</text>
  </g>
  
  <!-- Minus sign section -->
  <rect x="340" y="50" width="140" height="140" fill="#fee2e2" rx="12"/>
  <text x="410" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">Минус (-)</text>
  <text x="410" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b91c1c">Вычитание</text>
  
  <g style="animation-delay: 0.3s">
    <rect x="380" y="135" width="60" height="15" fill="#ef4444" rx="3"/>
  </g>
  <text x="410" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Предметов становится меньше</text>
  
  <!-- Equals sign -->
  <rect x="20" y="200" width="120" height="60" fill="#f3e8ff" rx="10"/>
  <text x="80" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7c3aed">Равно (=)</text>
  <rect x="50" y="235" width="60" height="8" fill="#a855f7" rx="2"/>
  <rect x="50" y="247" width="60" height="8" fill="#a855f7" rx="2"/>
  
  <!-- Reading examples -->
  <rect x="150" y="200" width="330" height="60" fill="#f8fafc" rx="10"/>
  <text x="315" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Как читать:</text>
  <text x="315" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">2 + 1 = 3 → «Два плюс один равно три»</text>
  
  <!-- Properties -->
  <rect x="20" y="270" width="220" height="70" fill="#ecfdf5" rx="10"/>
  <text x="130" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669">Свойство сложения</text>
  <text x="130" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#10b981">2 + 3 = 3 + 2</text>
  <text x="130" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#047857">От перестановки сумма не меняется</text>
  
  <rect x="260" y="270" width="220" height="70" fill="#fef2f2" rx="10"/>
  <text x="370" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Свойство вычитания</text>
  <text x="370" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ef4444">5 - 5 = 0</text>
  <text x="370" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#b91c1c">Если вычесть само число — получим 0</text>
</svg>