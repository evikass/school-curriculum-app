<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Plus sign -->
  <g transform="translate(100, 120)">
    <rect x="-8" y="-35" width="16" height="70" fill="#4caf50" rx="4">
      <animate attributeName="height" values="70;75;70" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="-35" y="-8" width="70" height="16" fill="#4caf50" rx="4">
      <animate attributeName="width" values="70;75;70" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Minus sign -->
  <g transform="translate(200, 120)">
    <rect x="-35" y="-8" width="70" height="16" fill="#f44336" rx="4">
      <animate attributeName="width" values="70;75;70" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Equals sign -->
  <g transform="translate(300, 120)">
    <rect x="-35" y="-12" width="70" height="12" fill="#2196f3" rx="3">
      <animate attributeName="width" values="70;72;70" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-35" y="4" width="70" height="12" fill="#2196f3" rx="3">
      <animate attributeName="width" values="70;72;70" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Labels -->
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="18" fill="#2e7d32" text-anchor="middle" font-weight="bold">ПЛЮС</text>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="18" fill="#c62828" text-anchor="middle" font-weight="bold">МИНУС</text>
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="18" fill="#1565c0" text-anchor="middle" font-weight="bold">РАВНО</text>
  
  <!-- Example -->
  <text x="100" y="230" font-family="Arial, sans-serif" font-size="14" fill="#4caf50" text-anchor="middle">2 + 1 = 3</text>
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="14" fill="#f44336" text-anchor="middle">3 - 1 = 2</text>
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="14" fill="#2196f3" text-anchor="middle">2 = 2</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="15" fill="#4caf50" opacity="0.3">
    <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="50" r="15" fill="#f44336" opacity="0.3">
    <animate attributeName="r" values="15;18;15" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="250" r="15" fill="#2196f3" opacity="0.3">
    <animate attributeName="r" values="15;18;15" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="250" r="15" fill="#ff9800" opacity="0.3">
    <animate attributeName="r" values="15;18;15" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Знаки +, -, =</text>
</svg>