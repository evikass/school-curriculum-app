<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Example: 5 - 2 = 3 -->
  <text x="200" y="80" font-family="Arial Black, sans-serif" font-size="36" fill="#c62828" text-anchor="middle" font-weight="bold">5 - 2 = 3</text>
  
  <!-- Five apples initially -->
  <g transform="translate(70, 120)">
    <ellipse cx="0" cy="0" rx="13" ry="15" fill="#f44336"/>
    <ellipse cx="30" cy="0" rx="13" ry="15" fill="#c62828"/>
    <ellipse cx="60" cy="0" rx="13" ry="15" fill="#d32f2f"/>
    <ellipse cx="90" cy="0" rx="13" ry="15" fill="#f44336"/>
    <ellipse cx="120" cy="0" rx="13" ry="15" fill="#c62828"/>
  </g>
  
  <!-- Minus sign and two crossed out apples -->
  <text x="230" y="135" font-family="Arial Black, sans-serif" font-size="30" fill="#f44336">- 2</text>
  
  <!-- Crossed out apples -->
  <g transform="translate(280, 120)">
    <ellipse cx="0" cy="0" rx="13" ry="15" fill="#f44336" opacity="0.3"/>
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#c62828" stroke-width="3"/>
    <line x1="-15" y1="15" x2="15" y2="-15" stroke="#c62828" stroke-width="3"/>
    
    <ellipse cx="35" cy="0" rx="13" ry="15" fill="#c62828" opacity="0.3"/>
    <line x1="20" y1="-15" x2="50" y2="15" stroke="#c62828" stroke-width="3"/>
    <line x1="20" y1="15" x2="50" y2="-15" stroke="#c62828" stroke-width="3"/>
  </g>
  
  <!-- Equals sign -->
  <text x="200" y="200" font-family="Arial Black, sans-serif" font-size="30" fill="#2196f3">=</text>
  
  <!-- Result: 3 apples -->
  <g transform="translate(100, 230)">
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="#4caf50">
      <animate attributeName="ry" values="16;18;16" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="40" cy="0" rx="14" ry="16" fill="#66bb6a">
      <animate attributeName="ry" values="16;18;16" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="80" cy="0" rx="14" ry="16" fill="#4caf50">
      <animate attributeName="ry" values="16;18;16" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#b71c1c" text-anchor="middle" font-weight="bold">Вычитание</text>
</svg>