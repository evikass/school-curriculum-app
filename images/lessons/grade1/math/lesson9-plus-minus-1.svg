<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="50" font-family="Arial Black, sans-serif" font-size="28" fill="#00695c" text-anchor="middle" font-weight="bold">□ + 1  и  □ - 1</text>
  
  <!-- Plus 1 examples -->
  <g transform="translate(0, 70)">
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="24" fill="#2e7d32" text-anchor="middle" font-weight="bold">3 + 1 = 4</text>
    <g transform="translate(60, 50)">
      <circle cx="10" cy="10" r="8" fill="#4caf50"/>
      <circle cx="30" cy="10" r="8" fill="#66bb6a"/>
      <circle cx="50" cy="10" r="8" fill="#4caf50"/>
      <circle cx="70" cy="10" r="8" fill="#81c784">
        <animate attributeName="opacity" values="0;1;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <text x="300" y="40" font-family="Arial, sans-serif" font-size="24" fill="#2e7d32" text-anchor="middle" font-weight="bold">7 + 1 = 8</text>
    <g transform="translate(250, 50)">
      <circle cx="10" cy="10" r="7" fill="#4caf50"/>
      <circle cx="27" cy="10" r="7" fill="#66bb6a"/>
      <circle cx="44" cy="10" r="7" fill="#4caf50"/>
      <circle cx="61" cy="10" r="7" fill="#66bb6a"/>
      <circle cx="78" cy="10" r="7" fill="#4caf50"/>
      <circle cx="95" cy="10" r="7" fill="#66bb6a"/>
      <circle cx="112" cy="10" r="7" fill="#81c784">
        <animate attributeName="opacity" values="0;1;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Minus 1 examples -->
  <g transform="translate(0, 170)">
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="24" fill="#c62828" text-anchor="middle" font-weight="bold">5 - 1 = 4</text>
    <g transform="translate(60, 50)">
      <circle cx="10" cy="10" r="8" fill="#f44336"/>
      <circle cx="30" cy="10" r="8" fill="#ef5350"/>
      <circle cx="50" cy="10" r="8" fill="#f44336"/>
      <circle cx="70" cy="10" r="8" fill="#ef5350" opacity="0.3"/>
      <line x1="62" y1="2" x2="78" y2="18" stroke="#b71c1c" stroke-width="2"/>
      <line x1="62" y1="18" x2="78" y2="2" stroke="#b71c1c" stroke-width="2"/>
    </g>
    
    <text x="300" y="40" font-family="Arial, sans-serif" font-size="24" fill="#c62828" text-anchor="middle" font-weight="bold">9 - 1 = 8</text>
    <g transform="translate(250, 50)">
      <circle cx="10" cy="10" r="7" fill="#f44336"/>
      <circle cx="27" cy="10" r="7" fill="#ef5350"/>
      <circle cx="44" cy="10" r="7" fill="#f44336"/>
      <circle cx="61" cy="10" r="7" fill="#ef5350"/>
      <circle cx="78" cy="10" r="7" fill="#f44336"/>
      <circle cx="95" cy="10" r="7" fill="#ef5350"/>
      <circle cx="112" cy="10" r="7" fill="#f44336"/>
      <circle cx="129" cy="10" r="7" fill="#ef5350" opacity="0.3"/>
      <line x1="121" y1="2" x2="137" y2="18" stroke="#b71c1c" stroke-width="2"/>
      <line x1="121" y1="18" x2="137" y2="2" stroke="#b71c1c" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#00695c" text-anchor="middle" font-weight="bold">Прибавить и вычесть 1</text>
</svg>