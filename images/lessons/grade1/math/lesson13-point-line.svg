<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  
  <!-- Background -->
  <rect width="400" height="400" fill="#f0f9ff" rx="20"/>
  <!-- Title -->
  <text x="200" y="40" font-size="22" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ТОЧКА И ЛИНИЯ</text>
  <!-- Point section -->
  <g transform="translate(30, 60)">
    <text x="80" y="0" font-size="16" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ТОЧКА •</text>
    <!-- Large animated point -->
    <circle cx="80" cy="50" r="12" fill="#0ea5e9">
    <animate attributeName="r" values="12;14;12" dur="3s" repeatCount="indefinite"/>
  </circle>
    <!-- Point examples with labels -->
    <g transform="translate(0, 80)">
      <circle cx="40" cy="20" r="6" fill="#f59e0b" style="animation-delay: 0.2s">
    <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
  </circle>
      <text x="55" y="25" font-size="14" fill="#78350f" font-family="Arial, sans-serif">А</text>
      
      <circle cx="100" cy="20" r="6" fill="#22c55e" style="animation-delay: 0.4s"/>
      <text x="115" y="25" font-size="14" fill="#166534" font-family="Arial, sans-serif">Б</text>
      
      <circle cx="160" cy="20" r="6" fill="#ef4444" style="animation-delay: 0.6s"/>
      <text x="175" y="25" font-size="14" fill="#dc2626" font-family="Arial, sans-serif">В</text>
    </g>
  </g>
  <!-- Line section -->
  <g transform="translate(200, 60)">
    <text x="85" y="0" font-size="16" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ЛИНИЯ</text>
    <!-- Straight line -->
    <line x1="20" y1="50" x2="150" y2="50" stroke="#8b5cf6" stroke-width="4"/>
    <text x="85" y="80" font-size="11" fill="#6b21a8" text-anchor="middle" font-family="Arial, sans-serif">прямая</text>
    <!-- Curved line -->
    <path d="M 20 110 Q 85 80 150 110" stroke="#ec4899" stroke-width="4" fill="none" style="animation-delay: 1s"/>
    <text x="85" y="135" font-size="11" fill="#be185d" text-anchor="middle" font-family="Arial, sans-serif">кривая</text>
    <!-- Broken line -->
    <polyline points="20,160 50,150 85,170 120,145 150,165" stroke="#f97316" stroke-width="4" fill="none" style="animation-delay: 2s"/>
    <text x="85" y="190" font-size="11" fill="#c2410c" text-anchor="middle" font-family="Arial, sans-serif">ломаная</text>
  </g>
  <!-- Ray and Segment -->
  <g transform="translate(30, 260)">
    <text x="170" y="0" font-size="16" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ЛУЧ И ОТРЕЗОК</text>
    <!-- Ray -->
    <g transform="translate(0, 20)">
      <circle cx="30" cy="20" r="5" fill="#0ea5e9"/>
      <line x1="30" y1="20" x2="150" y2="20" stroke="#0ea5e9" stroke-width="3"/>
      <polygon points="150,20 140,15 140,25" fill="#0ea5e9"/>
      <text x="85" y="45" font-size="11" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">ЛУЧ — есть начало, нет конца</text>
    </g>
    <!-- Segment -->
    <g transform="translate(170, 20)">
      <circle cx="0" cy="20" r="5" fill="#22c55e"/>
      <circle cx="120" cy="20" r="5" fill="#22c55e" style="animation-delay: 0.5s"/>
      <line x1="0" y1="20" x2="120" y2="20" stroke="#22c55e" stroke-width="3"/>
      <text x="60" y="45" font-size="11" fill="#166534" text-anchor="middle" font-family="Arial, sans-serif">ОТРЕЗОК — есть начало и конец</text>
    </g>
  </g>
  <!-- Fun fact -->
  <g transform="translate(30, 350)">
    <rect x="0" y="0" width="340" height="40" fill="#e0f2fe" rx="8"/>
    <text x="170" y="18" font-size="12" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Через 2 точки можно провести только 1 прямую!</text>
    <text x="170" y="33" font-size="11" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">• А ───────────── • Б</text>
  </g>
</svg>