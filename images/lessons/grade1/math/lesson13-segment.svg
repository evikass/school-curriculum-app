<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e0f7fa"/>
      <stop offset="100%" style="stop-color="#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial Black, sans-serif" font-size="24" fill="#00838f" text-anchor="middle" font-weight="bold">Отрезок</text>
  
  <!-- Main segment with endpoints -->
  <g transform="translate(100, 120)">
    <circle cx="0" cy="0" r="8" fill="#e91e63">
      <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="0" r="8" fill="#e91e63">
      <animate attributeName="r" values="8;10;8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="0" x2="200" y2="0" stroke="#00bcd4" stroke-width="5" stroke-linecap="round">
      <animate attributeName="stroke-width" values="5;6;5" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="14" fill="#e91e63" text-anchor="middle">А</text>
    <text x="200" y="-20" font-family="Arial, sans-serif" font-size="14" fill="#e91e63" text-anchor="middle">Б</text>
  </g>
  
  <!-- Measurement ruler -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="200" height="20" fill="#fff9c4" stroke="#fbc02d" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="20" y1="10" x2="20" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="60" y1="10" x2="60" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="100" y1="10" x2="100" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="140" y1="10" x2="140" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="180" y1="10" x2="180" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="20" stroke="#fbc02d" stroke-width="1"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">0</text>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">2</text>
    <text x="80" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">4</text>
    <text x="120" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">6</text>
    <text x="160" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">8</text>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">10</text>
  </g>
  
  <!-- Example segments -->
  <g transform="translate(50, 230)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#00838f">Короткий:</text>
    <line x1="80" y1="-5" x2="130" y2="-5" stroke="#f44336" stroke-width="3"/>
    <circle cx="80" cy="-5" r="4" fill="#f44336"/>
    <circle cx="130" cy="-5" r="4" fill="#f44336"/>
  </g>
  <g transform="translate(200, 230)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#00838f">Длинный:</text>
    <line x1="80" y1="-5" x2="180" y2="-5" stroke="#2196f3" stroke-width="3"/>
    <circle cx="80" cy="-5" r="4" fill="#2196f3"/>
    <circle cx="180" cy="-5" r="4" fill="#2196f3"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#006064" text-anchor="middle" font-weight="bold">Отрезок</text>
</svg>