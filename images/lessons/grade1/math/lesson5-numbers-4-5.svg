<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#ecfdf5" rx="20"/>
  <!-- Sun -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="2s" repeatCount="indefinite"/>
    <circle cx="340" cy="60" r="25" fill="#fbbf24">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
    <g stroke="#fbbf24" stroke-width="3">
      <line x1="340" y1="25" x2="340" y2="10"/>
      <line x1="365" y1="35" x2="375" y2="25"/>
      <line x1="375" y1="60" x2="390" y2="60"/>
      <line x1="365" y1="85" x2="375" y2="95"/>
      <line x1="315" y1="35" x2="305" y2="25"/>
      <line x1="305" y1="60" x2="290" y2="60"/>
      <line x1="315" y1="85" x2="305" y2="95"/>
    </g>
  </g>
  <!-- Stars -->
  <polygon points="50,40 55,55 70,55 58,65 63,80 50,70 37,80 42,65 30,55 45,55" fill="#fcd34d"/>
  <polygon points="80,350 83,358 92,358 85,363 88,372 80,367 72,372 75,363 68,358 77,358" fill="#a5f3fc" style="animation-delay: 0.5s"/>
  <!-- Number 4 (chair shape) -->
  <g transform="translate(70, 100)">
    <text x="0" y="140" font-size="150" font-weight="bold" fill="url(#grad4)" font-family="Arial, sans-serif">4</text>
  </g>
  <!-- Chair decoration -->
  <g transform="translate(90, 280)">
    <rect x="0" y="0" width="50" height="10" fill="#a78bfa" rx="3"/>
    <rect x="5" y="10" width="10" height="40" fill="#a78bfa"/>
    <rect x="35" y="10" width="10" height="40" fill="#a78bfa"/>
    <rect x="0" y="-30" width="10" height="30" fill="#a78bfa"/>
  </g>
  <!-- Number 5 (star/hook shape) -->
  <g transform="translate(200, 100)">
    <text x="0" y="140" font-size="150" font-weight="bold" fill="url(#grad5)" font-family="Arial, sans-serif">5</text>
  </g>
  <!-- Star decoration for 5 -->
  <g transform="translate(280, 280)">
    <polygon points="25,0 30,18 50,18 34,30 40,50 25,38 10,50 16,30 0,18 20,18" fill="#fcd34d"/>
  </g>
  <!-- Hand with 5 fingers -->
  <g transform="translate(170, 300)">
    <ellipse cx="40" cy="50" rx="35" ry="25" fill="#fef3c7"/>
    <rect x="15" y="10" width="12" height="40" rx="6" fill="#fef3c7"/>
    <rect x="30" y="5" width="12" height="45" rx="6" fill="#fef3c7"/>
    <rect x="45" y="5" width="12" height="45" rx="6" fill="#fef3c7"/>
    <rect x="60" y="10" width="12" height="40" rx="6" fill="#fef3c7"/>
    <rect x="72" y="25" width="10" height="30" rx="5" fill="#fef3c7"/>
  </g>
  <!-- Label -->
  <g transform="translate(200, 385)">
    <text x="0" y="0" font-size="16" fill="#059669" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ЧЕТЫРЕ и ПЯТЬ</text>
  </g>
</svg>