<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fce4ec"/>
      <stop offset="100%" style="stop-color="#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial Black, sans-serif" font-size="24" fill="#c2185b" text-anchor="middle" font-weight="bold">Ломаная линия</text>
  
  <!-- Open broken line -->
  <g transform="translate(50, 80)">
    <polyline points="0,60 40,0 80,60 120,20 160,80" stroke="#e91e63" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-width" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="0" cy="60" r="6" fill="#e91e63"/>
    <circle cx="40" cy="0" r="6" fill="#e91e63"/>
    <circle cx="80" cy="60" r="6" fill="#e91e63"/>
    <circle cx="120" cy="20" r="6" fill="#e91e63"/>
    <circle cx="160" cy="80" r="6" fill="#e91e63"/>
    <text x="80" y="110" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Незамкнутая ломаная</text>
    <text x="80" y="125" font-family="Arial, sans-serif" font-size="11" fill="#c2185b" text-anchor="middle">5 звеньев, 6 вершин</text>
  </g>
  
  <!-- Closed broken line (polygon) -->
  <g transform="translate(230, 80)">
    <polygon points="80,0 150,40 130,100 30,100 10,40" stroke="#9c27b0" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-width" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="80" cy="0" r="6" fill="#9c27b0"/>
    <circle cx="150" cy="40" r="6" fill="#9c27b0"/>
    <circle cx="130" cy="100" r="6" fill="#9c27b0"/>
    <circle cx="30" cy="100" r="6" fill="#9c27b0"/>
    <circle cx="10" cy="40" r="6" fill="#9c27b0"/>
    <text x="80" y="130" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Замкнутая ломаная</text>
    <text x="80" y="145" font-family="Arial, sans-serif" font-size="11" fill="#7b1fa2" text-anchor="middle">5 звеньев, 5 вершин</text>
  </g>
  
  <!-- Explanation -->
  <g transform="translate(50, 240)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#ff9800" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="#ff9800"/>
    <circle cx="40" cy="0" r="4" fill="#ff9800"/>
    <text x="60" y="5" font-family="Arial, sans-serif" font-size="12" fill="#333">— звено</text>
    <circle cx="150" cy="0" r="5" fill="#2196f3"/>
    <text x="170" y="5" font-family="Arial, sans-serif" font-size="12" fill="#333">— вершина</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#880e4f" text-anchor="middle" font-weight="bold">Ломаная линия</text>
</svg>