<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      @keyframes swing1 {
        0%, 100% { transform: rotate(-8deg); }
        50% { transform: rotate(8deg); }
      }
      @keyframes swing2 {
        0%, 100% { transform: rotate(6deg); }
        50% { transform: rotate(-6deg); }
      }
      @keyframes swing3 {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
      }
      @keyframes swing4 {
        0%, 100% { transform: rotate(7deg); }
        50% { transform: rotate(-7deg); }
      }
      .flag1 { animation: swing1 2s ease-in-out infinite; transform-origin: top center; }
      .flag2 { animation: swing2 2.3s ease-in-out infinite; transform-origin: top center; }
      .flag3 { animation: swing3 1.8s ease-in-out infinite; transform-origin: top center; }
      .flag4 { animation: swing4 2.1s ease-in-out infinite; transform-origin: top center; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#E3F2FD"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Гирлянда
  </text>
  
  <!-- Wall/ceiling -->
  <rect x="0" y="50" width="400" height="10" fill="#90CAF9"/>
  
  <!-- String -->
  <path d="M20,60 Q100,90 200,70 Q300,50 380,60" stroke="#5D4037" stroke-width="3" fill="none"/>
  
  <!-- Hanging flags -->
  <!-- Flag 1 - Red -->
  <g transform="translate(60, 70)" class="flag1">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5D4037" stroke-width="2"/>
    <polygon points="0,10 35,25 0,40" fill="#F44336"/>
    <circle cx="15" cy="28" r="4" fill="#FFC107"/>
  </g>
  
  <!-- Flag 2 - Yellow -->
  <g transform="translate(115, 78)" class="flag2">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5D4037" stroke-width="2"/>
    <polygon points="0,10 35,25 0,40" fill="#FFEB3B"/>
    <circle cx="15" cy="28" r="4" fill="#E91E63"/>
  </g>
  
  <!-- Flag 3 - Green -->
  <g transform="translate(175, 75)" class="flag3">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5D4037" stroke-width="2"/>
    <polygon points="0,10 35,25 0,40" fill="#4CAF50"/>
    <circle cx="15" cy="28" r="4" fill="#2196F3"/>
  </g>
  
  <!-- Flag 4 - Blue -->
  <g transform="translate(235, 68)" class="flag4">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5D4037" stroke-width="2"/>
    <polygon points="0,10 35,25 0,40" fill="#2196F3"/>
    <circle cx="15" cy="28" r="4" fill="#4CAF50"/>
  </g>
  
  <!-- Flag 5 - Orange -->
  <g transform="translate(290, 65)" class="flag1">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5D4037" stroke-width="2"/>
    <polygon points="0,10 35,25 0,40" fill="#FF9800"/>
    <circle cx="15" cy="28" r="4" fill="#9C27B0"/>
  </g>
  
  <!-- Flag 6 - Purple -->
  <g transform="translate(345, 68)" class="flag2">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#5D4037" stroke-width="2"/>
    <polygon points="0,10 35,25 0,40" fill="#9C27B0"/>
    <circle cx="15" cy="28" r="4" fill="#FF9800"/>
  </g>
  
  <!-- Materials section -->
  <g transform="translate(30, 150)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive" font-size="12" font-weight="bold" fill="#1565C0">Материалы:</text>
    
    <!-- Paper triangles -->
    <polygon points="20,50 40,80 0,80" fill="#F44336"/>
    <polygon points="60,50 80,80 40,80" fill="#FFEB3B"/>
    <polygon points="100,50 120,80 80,80" fill="#4CAF50"/>
    <polygon points="140,50 160,80 120,80" fill="#2196F3"/>
    <text x="80" y="95" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Треугольники</text>
  </g>
  
  <!-- String piece -->
  <g transform="translate(220, 150)">
    <path d="M0,30 Q30,20 60,30 Q90,40 120,30" stroke="#5D4037" stroke-width="3" fill="none"/>
    <text x="60" y="60" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Верёвочка</text>
  </g>
  
  <!-- Steps -->
  <g transform="translate(30, 200)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive" font-size="10" fill="#1565C0">1. Вырежи треугольники</text>
    <text x="0" y="15" font-family="'Comic Sans MS', cursive" font-size="10" fill="#1565C0">2. Укрась флажки</text>
    <text x="0" y="30" font-family="'Comic Sans MS', cursive" font-size="10" fill="#1565C0">3. Приклей к верёвочке</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(250, 200)">
    <!-- Scissors -->
    <ellipse cx="10" cy="5" r="8" fill="none" stroke="#FF5722" stroke-width="3"/>
    <ellipse cx="10" cy="22" r="8" fill="none" stroke="#FF5722" stroke-width="3"/>
    <polygon points="18,13 40,10 18,18" fill="#78909C"/>
    <text x="25" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Ножницы</text>
  </g>
  
  <g transform="translate(310, 200)">
    <rect x="0" y="0" width="25" height="35" fill="#4CAF50" rx="3"/>
    <rect x="8" y="-6" width="9" height="8" fill="#81C784"/>
    <text x="12" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Клей</text>
  </g>
  
  <!-- Colorful paper sheets -->
  <g transform="translate(120, 250)">
    <rect x="0" y="0" width="35" height="25" fill="#F44336" rx="2"/>
    <rect x="40" y="0" width="35" height="25" fill="#FFEB3B" rx="2"/>
    <rect x="80" y="0" width="35" height="25" fill="#4CAF50" rx="2"/>
    <rect x="120" y="0" width="35" height="25" fill="#2196F3" rx="2"/>
    <text x="80" y="38" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Цветная бумага</text>
  </g>
</svg>
