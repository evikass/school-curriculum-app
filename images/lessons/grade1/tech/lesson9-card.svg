<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  
  
  <!-- Background -->
  <rect width="400" height="300" fill="#FCE4EC"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#C2185B">
    Открытка
  </text>
  
  <!-- Table -->
  <rect x="20" y="220" width="360" height="60" fill="#A1887F"/>
  <rect x="20" y="215" width="360" height="8" fill="#BCAAA4"/>
  
  <!-- Closed card (left) -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="70" height="90" fill="#FFF3E0" stroke="#FFB74D" stroke-width="2" rx="5"/>
    <rect x="5" y="5" width="60" height="80" fill="#FFE0B2" rx="3"/>
    <!-- Small heart on cover -->
    <path d="M35,40 C35,35 30,30 25,30 C18,30 15,37 15,40 C15,50 35,60 35,60 C35,60 55,50 55,40 C55,37 52,30 45,30 C40,30 35,35 35,40" fill="#E91E63"/>
    <text x="35" y="100" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">Закрытая</text>
  </g>
  
  <!-- Open card (center) -->
  <g transform="translate(150, 60)">
    <!-- Left page -->
    <rect x="0" y="0" width="60" height="90" fill="#FFF8E1" stroke="#FFCC80" stroke-width="1" rx="3"/>
    <!-- Right page -->
    <rect x="60" y="0" width="60" height="90" fill="#FFF8E1" stroke="#FFCC80" stroke-width="1" rx="3"/>
    
    <!-- Decorations inside -->
    <!-- Big heart -->
    <g transform="translate(60, 30)">
      <path d="M0,-5 C0,-15 -20,-20 -20,0 C-20,15 0,30 0,30 C0,30 20,15 20,0 C20,-20 0,-15 0,-5" fill="#E91E63"/>
    </g>
    
    <!-- Small hearts -->
    <path d="M25,25 C25,22 22,20 20,20 C16,20 14,24 14,25 C14,30 25,35 25,35 C25,35 36,30 36,25 C36,24 34,20 30,20 C28,20 25,22 25,25" fill="#F48FB1"/>
    <path d="M95,25 C95,22 92,20 90,20 C86,20 84,24 84,25 C84,30 95,35 95,35 C95,35 106,30 106,25 C106,24 104,20 100,20 C98,20 95,22 95,25" fill="#F48FB1"/>
    
    <!-- Sparkles -->
    <circle cx="15" cy="50" r="3" fill="#FFD54F">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="105" cy="55" r="2" fill="#FFD54F">
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="20" cy="75" r="2" fill="#FF8A65"/>
    <circle cx="100" cy="70" r="3" fill="#FF8A65"/>
    
    <!-- Text "С Днём Рождения!" -->
    <text x="60" y="75" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="7" fill="#C2185B">С Днём</text>
    <text x="60" y="85" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="7" fill="#C2185B">Рождения!</text>
    
    <text x="60" y="105" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">Открытая</text>
  </g>
  
  <!-- Materials -->
  <g transform="translate(300, 70)">
    <!-- Cardboard base -->
    <rect x="0" y="0" width="50" height="70" fill="#FFECB3" stroke="#FFB74D" stroke-width="2" rx="3"/>
    <text x="25" y="85" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#E65100">Основа</text>
  </g>
  
  <g transform="translate(300, 160)">
    <!-- Decorative elements -->
    <path d="M15,0 C15,-8 5,-10 5,0 C5,8 15,15 15,15 C15,15 25,8 25,0 C25,-10 15,-8 15,0" fill="#E91E63"/>
    <path d="M40,5 C40,0 35,-2 35,5 C35,10 40,13 40,13 C40,13 45,10 45,5 C45,-2 40,0 40,5" fill="#F48FB1"/>
    <text x="25" y="30" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#C2185B">Декор</text>
  </g>
  
  <!-- Steps -->
  <g transform="translate(30, 160)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive" font-size="10" fill="#C2185B">1. Согни картон</text>
    <text x="0" y="15" font-family="'Comic Sans MS', cursive" font-size="10" fill="#C2185B">2. Укрась封面</text>
    <text x="0" y="30" font-family="'Comic Sans MS', cursive" font-size="10" fill="#C2185B">3. Напиши поздравление</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(80, 240)">
    <!-- Markers -->
    <rect x="0" y="0" width="8" height="35" fill="#E91E63" rx="2"/>
    <rect x="12" y="5" width="8" height="30" fill="#2196F3" rx="2"/>
    <rect x="24" y="3" width="8" height="32" fill="#4CAF50" rx="2"/>
    <rect x="36" y="2" width="8" height="33" fill="#FF9800" rx="2"/>
    <text x="22" y="48" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Фломастеры</text>
  </g>
  
  <g transform="translate(180, 235)">
    <rect x="0" y="0" width="50" height="30" fill="#FFCC80" stroke="#FF9800" stroke-width="1" rx="2"/>
    <text x="25" y="43" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Картон</text>
  </g>
  
  <g transform="translate(280, 240)">
    <path d="M10,0 C10,-5 5,-7 5,0 C5,5 10,10 10,10 C10,10 15,5 15,0 C15,-7 10,-5 10,0" fill="#E91E63" transform="scale(1.5)"/>
    <text x="15" y="28" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Наклейки</text>
  </g>
</svg>
