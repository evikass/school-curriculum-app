<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  
  
  <!-- Background -->
  <rect width="400" height="300" fill="#FFF8E1"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#E65100">
    Аппликация «Дерево»
  </text>
  
  <!-- Ground -->
  <ellipse cx="200" cy="270" rx="180" ry="20" fill="#8BC34A"/>
  <ellipse cx="200" cy="265" rx="160" ry="15" fill="#9CCC65"/>
  
  <!-- Finished tree -->
  <g transform="translate(250, 80)">
    <!-- Trunk -->
    <rect x="40" y="100" width="25" height="80" fill="#795548" rx="3"/>
    <rect x="45" y="100" width="5" height="80" fill="#8D6E63"/>
    
    <!-- Crown base -->
    <ellipse cx="52" cy="70" rx="55" ry="50" fill="#4CAF50"/>
    <ellipse cx="35" cy="60" rx="35" ry="35" fill="#66BB6A"/>
    <ellipse cx="70" cy="55" rx="30" ry="30" fill="#66BB6A"/>
    <ellipse cx="52" cy="40" rx="40" ry="35" fill="#81C784"/>
    
    <!-- Colorful leaves on tree -->
    <ellipse cx="25" cy="50" rx="8" ry="5" fill="#FFEB3B" transform="rotate(-20 25 50)"/>
    <ellipse cx="40" cy="35" rx="7" ry="4" fill="#FF9800" transform="rotate(15 40 35)"/>
    <ellipse cx="65" cy="45" rx="8" ry="5" fill="#F44336" transform="rotate(-10 65 45)"/>
    <ellipse cx="75" cy="65" rx="6" ry="4" fill="#FFEB3B" transform="rotate(25 75 65)"/>
    <ellipse cx="30" cy="75" rx="7" ry="4" fill="#FF9800" transform="rotate(-30 30 75)"/>
    
    <!-- Falling leaves -->
    <ellipse cx="90" cy="30" rx="8" ry="5" fill="#FF5722"/>
    <ellipse cx="10" cy="40" rx="7" ry="4" fill="#FFC107"/>
    <ellipse cx="60" cy="20" rx="6" ry="4" fill="#F44336"/>
  </g>
  
  <!-- Materials -->
  <g transform="translate(30, 50)">
    <!-- Trunk piece -->
    <rect x="0" y="0" width="20" height="50" fill="#795548" rx="2"/>
    <text x="10" y="65" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#5D4037">Ствол</text>
  </g>
  
  <g transform="translate(70, 40)">
    <!-- Crown piece -->
    <ellipse cx="30" cy="30" rx="30" ry="25" fill="#4CAF50"/>
    <text x="30" y="70" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#2E7D32">Крона</text>
  </g>
  
  <!-- Colorful leaves pieces -->
  <g transform="translate(130, 50)">
    <ellipse cx="10" cy="10" rx="8" ry="5" fill="#FFEB3B"/>
    <ellipse cx="30" cy="15" rx="7" ry="4" fill="#FF9800"/>
    <ellipse cx="20" cy="30" rx="8" ry="5" fill="#F44336"/>
    <ellipse cx="45" cy="10" rx="6" ry="4" fill="#FF5722"/>
    <text x="25" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#BF360C">Листья</text>
  </g>
  
  <!-- Steps -->
  <g transform="translate(30, 140)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">1. Вырежи ствол</text>
    <text x="0" y="15" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">2. Вырежи крону</text>
    <text x="0" y="30" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">3. Добавь листья</text>
    <text x="0" y="45" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">4. Собери дерево</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(60, 230)">
    <rect x="0" y="0" width="25" height="30" fill="#4CAF50" rx="3"/>
    <rect x="8" y="-6" width="9" height="8" fill="#81C784"/>
    <text x="12" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Клей</text>
  </g>
  
  <g transform="translate(120, 225)">
    <rect x="0" y="0" width="50" height="25" fill="#FFE082" rx="2"/>
    <rect x="55" y="0" width="50" height="25" fill="#FFCC80" rx="2"/>
    <rect x="110" y="0" width="50" height="25" fill="#FFAB91" rx="2"/>
    <text x="80" y="40" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Бумага</text>
  </g>
</svg>
