<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FFF3E0"/>
  
  <!-- 标题 -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E65100">🎵 Урок 2: Детские песни 🧒</text>
  
  <!-- 快乐的孩子们 -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <circle cx="100" cy="180" r="25" fill="#FFCC80">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="92" cy="175" r="4" fill="#5D4037">
    <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="108" cy="175" r="4" fill="#5D4037"/>
    <path d="M90 188 Q100 198 110 188" stroke="#5D4037" stroke-width="2" fill="none"/>
    <rect x="85" y="205" width="30" height="50" rx="5" fill="#42A5F5"/>
  </g>
  
  <g style="animation-delay: 0.3s">
    <circle cx="180" cy="180" r="25" fill="#FFCC80"/>
    <circle cx="172" cy="175" r="4" fill="#5D4037"/>
    <circle cx="188" cy="175" r="4" fill="#5D4037"/>
    <path d="M170 188 Q180 198 190 188" stroke="#5D4037" stroke-width="2" fill="none"/>
    <rect x="165" y="205" width="30" height="50" rx="5" fill="#EC407A"/>
  </g>
  
  <!-- 歌本 -->
  <g>
    <rect x="240" y="150" width="80" height="100" rx="5" fill="#81D4FA"/>
    <rect x="245" y="155" width="70" height="90" fill="#E1F5FE"/>
    <text x="280" y="180" text-anchor="middle" font-size="10" fill="#0277BD">ЛЯ-ЛЯ</text>
    <text x="280" y="200" text-anchor="middle" font-size="10" fill="#0277BD">ДО-РЕ-МИ</text>
    <ellipse cx="265" cy="220" rx="8" ry="6" fill="#FF4081"/>
    <ellipse cx="295" cy="225" rx="8" ry="6" fill="#7C4DFF"/>
  </g>
  
  <!-- 小星星 -->
  <g>
    <polygon points="380,80 385,95 400,95 388,105 393,120 380,110 367,120 372,105 360,95 375,95" fill="#FFD54F"/>
  </g>
  <g style="animation-delay: 0.5s">
    <polygon points="420,110 424,120 435,120 426,127 430,138 420,131 410,138 414,127 405,120 416,120" fill="#FFD54F"/>
  </g>
  
  <!-- 兔子 -->
  <g>
    <ellipse cx="400" cy="230" rx="20" ry="25" fill="#FAFAFA"/>
    <ellipse cx="392" cy="195" rx="6" ry="18" fill="#FAFAFA"/>
    <ellipse cx="408" cy="195" rx="6" ry="18" fill="#FAFAFA"/>
    <ellipse cx="392" cy="195" rx="3" ry="12" fill="#F8BBD9"/>
    <ellipse cx="408" cy="195" rx="3" ry="12" fill="#F8BBD9"/>
    <circle cx="395" cy="220" r="3" fill="#E91E63"/>
    <circle cx="405" cy="220" r="3" fill="#E91E63"/>
    <ellipse cx="400" cy="232" rx="4" ry="3" fill="#FFCDD2"/>
  </g>
  
  <!-- 音符装饰 -->
  <ellipse cx="80" cy="100" rx="10" ry="7" fill="#FF9800"/>
  <ellipse cx="150" cy="90" rx="10" ry="7" fill="#9C27B0" style="animation-delay: 0.2s"/>
  <ellipse cx="450" cy="180" rx="10" ry="7" fill="#4CAF50" style="animation-delay: 0.4s"/>
  
  <!-- 儿歌标题 -->
  <rect x="50" y="280" width="400" height="40" rx="10" fill="#FFE0B2"/>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#E65100">"В лесу родилась ёлочка" 🎄 "Два весёлых гуся" 🦆</text>
  
  <!-- 教学提示 -->
  <rect x="50" y="325" width="400" height="20" rx="5" fill="#FFCC80"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E65100">🎶 Детские песни учат радости и дружбе!</text>
</svg>