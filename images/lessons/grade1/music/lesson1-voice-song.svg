<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- 标题 -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E7D32">🎵 Урок 1: Голос и песня 🎶</text>
  
  <!-- 歌唱人物 -->
  <ellipse cx="120" cy="200" rx="35" ry="45" fill="#FFCC80"/>
  <circle cx="120" cy="145" r="30" fill="#FFCC80">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="108" cy="140" rx="5" ry="6" fill="#5D4037"/>
  <ellipse cx="132" cy="140" rx="5" ry="6" fill="#5D4037"/>
  <path d="M110 160 Q120 170 130 160" stroke="#5D4037" stroke-width="2" fill="none"/>
  <ellipse cx="135" cy="175" rx="8" ry="5" fill="#F48FB1"/>
  
  <!-- 音符群 -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="200" cy="120" rx="12" ry="9" fill="#E91E63"/>
    <rect x="210" y="70" width="3" height="50" fill="#E91E63"/>
    <path d="M213 70 Q230 80 213 95" fill="#E91E63"/>
  </g>
  
  <g>
    <ellipse cx="280" cy="140" rx="12" ry="9" fill="#9C27B0"/>
    <rect x="290" y="90" width="3" height="50" fill="#9C27B0"/>
    <path d="M293 90 Q310 100 293 115" fill="#9C27B0"/>
  </g>
  
  <g>
    <ellipse cx="350" cy="110" rx="12" ry="9" fill="#FF5722"/>
    <rect x="360" y="60" width="3" height="50" fill="#FF5722"/>
    <path d="M363 60 Q380 70 363 85" fill="#FF5722"/>
  </g>
  
  <!-- 声波 -->
  <g>
    <path d="M160 180 Q175 160 190 180 Q205 200 220 180" stroke="#4CAF50" stroke-width="3" fill="none"/>
    <path d="M170 200 Q185 180 200 200 Q215 220 230 200" stroke="#4CAF50" stroke-width="3" fill="none"/>
  </g>
  
  <!-- 麦克风 -->
  <rect x="380" y="180" width="40" height="70" rx="20" fill="#607D8B"/>
  <rect x="385" y="190" width="30" height="40" rx="15" fill="#90A4AE"/>
  <rect x="395" y="250" width="10" height="40" fill="#455A64"/>
  <ellipse cx="400" cy="300" rx="25" ry="8" fill="#455A64"/>
  
  <!-- 五线谱 -->
  <g stroke="#BDBDBD" stroke-width="1">
    <line x1="50" y1="280" x2="450" y2="280"/>
    <line x1="50" y1="290" x2="450" y2="290"/>
    <line x1="50" y1="300" x2="450" y2="300"/>
    <line x1="50" y1="310" x2="450" y2="310"/>
    <line x1="50" y1="320" x2="450" y2="320"/>
  </g>
  
  <!-- 教学提示 -->
  <rect x="50" y="325" width="400" height="20" rx="5" fill="#C8E6C9"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32">🎤 Голос — это музыкальный инструмент человека!</text>
</svg>