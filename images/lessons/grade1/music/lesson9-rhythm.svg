<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#F3E5F5"/>
  
  <!-- 标题 -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#7B1FA2">🎵 Урок 9: Ритм 🥁</text>
  
  <!-- 节拍圆圈 4/4拍 -->
  <circle cx="100" cy="150" r="40" fill="#E1BEE7">
    <animate attributeName="r" values="40;42;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="160" text-anchor="middle" font-size="24" fill="#7B1FA2">1</text>
  
  <circle cx="200" cy="150" r="40" fill="#E1BEE7">
    <animate attributeName="r" values="40;42;40" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="160" text-anchor="middle" font-size="24" fill="#7B1FA2">2</text>
  
  <circle cx="300" cy="150" r="40" fill="#E1BEE7"/>
  <text x="300" y="160" text-anchor="middle" font-size="24" fill="#7B1FA2">3</text>
  
  <circle cx="400" cy="150" r="40" fill="#E1BEE7"/>
  <text x="400" y="160" text-anchor="middle" font-size="24" fill="#7B1FA2">4</text>
  
  <!-- 节奏型示例 -->
  <rect x="50" y="210" width="400" height="60" rx="10" fill="#EDE7F6"/>
  <text x="250" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7B1FA2">🎵 ТА-та-ТА-та | ТА-ТА-та-та | та-ТА-та-ТА</text>
  
  <!-- 音符显示 -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="80" cy="255" rx="10" ry="7" fill="#7B1FA2"/>
    <rect x="88" y="220" width="3" height="35" fill="#7B1FA2"/>
  </g>
  <g style="animation-delay: 0.125s">
    <ellipse cx="110" cy="255" rx="8" ry="5" fill="#9C27B0"/>
    <rect x="116" y="225" width="2" height="30" fill="#9C27B0"/>
  </g>
  <g style="animation-delay: 0.25s">
    <ellipse cx="140" cy="255" rx="10" ry="7" fill="#7B1FA2"/>
    <rect x="148" y="220" width="3" height="35" fill="#7B1FA2"/>
  </g>
  <g style="animation-delay: 0.375s">
    <ellipse cx="170" cy="255" rx="8" ry="5" fill="#9C27B0"/>
    <rect x="176" y="225" width="2" height="30" fill="#9C27B0"/>
  </g>
  
  <!-- 拍手的小人 -->
  <g>
    <circle cx="280" cy="250" r="15" fill="#FFCC80"/>
    <circle cx="275" cy="247" r="2" fill="#5D4037"/>
    <circle cx="285" cy="247" r="2" fill="#5D4037"/>
    <path d="M275 257 Q280 263 285 257" stroke="#5D4037" stroke-width="1.5" fill="none"/>
    <rect x="270" y="265" width="20" height="30" rx="3" fill="#42A5F5"/>
    <!-- 手 -->
    <ellipse cx="260" cy="275" rx="8" ry="5" fill="#FFCC80"/>
    <ellipse cx="300" cy="275" rx="8" ry="5" fill="#FFCC80"/>
  </g>
  
  <!-- 节拍器 -->
  <g>
    <rect x="350" y="230" width="60" height="80" rx="5" fill="#795548"/>
    <rect x="360" y="240" width="40" height="50" fill="#D7CCC8"/>
    <line x1="380" y1="250" x2="380" y2="285" stroke="#5D4037" stroke-width="2"/>
    <polygon points="380,250 385,260 375,260" fill="#E91E63"/>
  </g>
  
  <!-- 时间标记 -->
  <text x="250" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7B1FA2">⏱️ Раз-два-три-четыре!</text>
  
  <!-- 教学提示 -->
  <rect x="50" y="325" width="400" height="20" rx="5" fill="#F3E5F5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7B1FA2">👏 Ритм — это сердце музыки!</text>
</svg>