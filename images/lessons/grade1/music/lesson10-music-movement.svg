<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes dance { 0%, 100% { transform: rotate(-5deg) translateY(0); } 25% { transform: rotate(5deg) translateY(-10px); } 50% { transform: rotate(-5deg) translateY(0); } 75% { transform: rotate(5deg) translateY(-10px); } }
      @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes sway { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
      .dance { animation: dance 1s ease-in-out infinite; transform-origin: bottom center; }
      .jump { animation: jump 0.8s ease-in-out infinite; }
      .spin { animation: spin 3s linear infinite; }
      .sway { animation: sway 2s ease-in-out infinite; transform-origin: bottom center; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E0F7FA"/>
  
  <!-- 标题 -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00838F">💃 Урок 10: Музыка и движение 🕺</text>
  
  <!-- 跳舞的女孩 -->
  <g class="dance">
    <circle cx="100" cy="130" r="25" fill="#FFCC80"/>
    <circle cx="92" cy="125" r="4" fill="#5D4037"/>
    <circle cx="108" cy="125" r="4" fill="#5D4037"/>
    <path d="M92 140 Q100 150 108 140" stroke="#5D4037" stroke-width="2" fill="none"/>
    <!-- 裙子 -->
    <path d="M70 160 L100 155 L130 160 L140 230 L60 230 Z" fill="#E91E63"/>
    <!-- 手臂 -->
    <line x1="70" y1="170" x2="40" y2="140" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
    <line x1="130" y1="170" x2="160" y2="140" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="85" y1="230" x2="70" y2="280" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
    <line x1="115" y1="230" x2="130" y2="280" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- 跳跃的男孩 -->
  <g class="jump">
    <circle cx="250" cy="150" r="25" fill="#FFCC80"/>
    <circle cx="242" cy="145" r="4" fill="#5D4037"/>
    <circle cx="258" cy="145" r="4" fill="#5D4037"/>
    <path d="M242 160 Q250 170 258 160" stroke="#5D4037" stroke-width="2" fill="none"/>
    <!-- 身体 -->
    <rect x="230" y="175" width="40" height="50" rx="5" fill="#2196F3"/>
    <!-- 手臂举起 -->
    <line x1="230" y1="185" x2="200" y2="150" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
    <line x1="270" y1="185" x2="300" y2="150" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
    <!-- 腿 -->
    <line x1="240" y1="225" x2="230" y2="270" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
    <line x1="260" y1="225" x2="270" y2="270" stroke="#FFCC80" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- 旋转的音符 -->
  <g class="spin" style="transform-origin: 400px 100px">
    <ellipse cx="400" cy="100" rx="15" ry="10" fill="#00BCD4"/>
    <rect x="413" y="50" width="4" height="50" fill="#00BCD4"/>
    <path d="M417 50 Q440 65 417 85" fill="#00BCD4"/>
  </g>
  
  <!-- 摇摆的音符 -->
  <g class="sway">
    <ellipse cx="450" cy="180" rx="12" ry="8" fill="#26C6DA"/>
    <rect x="460" y="140" width="3" height="40" fill="#26C6DA"/>
  </g>
  
  <!-- 音乐波浪 -->
  <path d="M50 280 Q100 260 150 280 Q200 300 250 280 Q300 260 350 280 Q400 300 450 280" stroke="#00BCD4" stroke-width="4" fill="none"/>
  <path d="M50 295 Q100 275 150 295 Q200 315 250 295 Q300 275 350 295 Q400 315 450 295" stroke="#4DD0E1" stroke-width="2" fill="none"/>
  
  <!-- 动作提示 -->
  <rect x="50" y="305" width="400" height="15" rx="5" fill="#B2EBF2"/>
  <text x="250" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#00838F">🏃 Хлопай! 👏 Топай! 🦶 Кружись! 🌀</text>
  
  <!-- 教学提示 -->
  <rect x="50" y="325" width="400" height="20" rx="5" fill="#E0F7FA"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#00838F">🎵 Музыка заставляет нас двигаться!</text>
</svg>