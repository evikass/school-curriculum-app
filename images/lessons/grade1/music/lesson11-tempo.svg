<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FFFDE7"/>
  
  <!-- 标题 -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F9A825">⏱️ Урок 11: Темп (скорость) 🚀</text>
  
  <!-- 分隔线 -->
  <line x1="250" y1="60" x2="250" y2="280" stroke="#FFE082" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- 左侧：慢速 -->
  <rect x="30" y="60" width="200" height="220" rx="10" fill="#FFF9C4"/>
  <text x="130" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FBC02D">🐢 Медленно</text>
  
  <!-- 乌龟 -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="100" cy="160" rx="40" ry="30" fill="#8D6E63"/>
    <ellipse cx="100" cy="155" rx="35" ry="25" fill="#A1887F"/>
    <circle cx="55" cy="150" r="12" fill="#8D6E63">
    <animate attributeName="r" values="12;14;12" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="48" cy="147" r="3" fill="#5D4037">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>
    <ellipse cx="70" cy="185" rx="8" ry="5" fill="#8D6E63"/>
    <ellipse cx="130" cy="185" rx="8" ry="5" fill="#8D6E63"/>
    <path d="M70 155 Q85 145 100 155 Q115 145 130 155" stroke="#6D4C41" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 慢速音符 -->
  <g>
    <ellipse cx="180" cy="130" rx="12" ry="8" fill="#FBC02D"/>
    <rect x="190" y="90" width="3" height="40" fill="#FBC02D"/>
  </g>
  <g style="animation-delay: 1s">
    <ellipse cx="180" cy="200" rx="12" ry="8" fill="#F9A825"/>
    <rect x="190" y="160" width="3" height="40" fill="#F9A825"/>
  </g>
  
  <!-- 右侧：快速 -->
  <rect x="270" y="60" width="200" height="220" rx="10" fill="#FFECB3"/>
  <text x="370" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF8F00">🐰 Быстро</text>
  
  <!-- 兔子 -->
  <g>
    <ellipse cx="350" cy="170" rx="30" ry="35" fill="#FAFAFA"/>
    <ellipse cx="340" cy="135" rx="8" ry="25" fill="#FAFAFA"/>
    <ellipse cx="360" cy="135" rx="8" ry="25" fill="#FAFAFA"/>
    <ellipse cx="340" cy="135" rx="4" ry="18" fill="#FFCDD2"/>
    <ellipse cx="360" cy="135" rx="4" ry="18" fill="#FFCDD2"/>
    <circle cx="343" cy="160" r="4" fill="#E91E63"/>
    <circle cx="357" cy="160" r="4" fill="#E91E63"/>
    <ellipse cx="350" cy="175" rx="5" ry="3" fill="#FFCDD2"/>
    <ellipse cx="330" cy="200" rx="10" ry="5" fill="#FAFAFA"/>
    <ellipse cx="370" cy="200" rx="10" ry="5" fill="#FAFAFA"/>
  </g>
  
  <!-- 快速音符 -->
  <g>
    <ellipse cx="420" cy="120" rx="10" ry="7" fill="#FF8F00"/>
    <rect x="428" y="85" width="2" height="35" fill="#FF8F00"/>
  </g>
  <g style="animation-delay: 0.25s">
    <ellipse cx="440" cy="140" rx="10" ry="7" fill="#FFA000"/>
    <rect x="448" y="105" width="2" height="35" fill="#FFA000"/>
  </g>
  <g style="animation-delay: 0.5s">
    <ellipse cx="420" cy="200" rx="10" ry="7" fill="#FFB300"/>
    <rect x="428" y="165" width="2" height="35" fill="#FFB300"/>
  </g>
  <g style="animation-delay: 0.75s">
    <ellipse cx="440" cy="220" rx="10" ry="7" fill="#FFC107"/>
    <rect x="448" y="185" width="2" height="35" fill="#FFC107"/>
  </g>
  
  <!-- 对比说明 -->
  <rect x="50" y="290" width="180" height="30" rx="5" fill="#FFF59D"/>
  <text x="140" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F9A825">🎵 Колыбельная — медленно</text>
  
  <rect x="270" y="290" width="180" height="30" rx="5" fill="#FFE082"/>
  <text x="360" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FF8F00">🎺 Марш — быстро</text>
  
  <!-- 教学提示 -->
  <rect x="50" y="325" width="400" height="20" rx="5" fill="#FFFDE7"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F9A825">⏱️ Темп может быть разным: медленным или быстрым!</text>
</svg>