<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FBE9E7"/>
  
  <!-- 标题 -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#D84315">🎻 Урок 7: Струнные инструменты 🎸</text>
  
  <!-- 小提琴 -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <!-- 琴身 -->
    <ellipse cx="100" cy="200" rx="40" ry="55" fill="#8D6E63"/>
    <ellipse cx="100" cy="160" rx="30" ry="40" fill="#A1887F"/>
    <ellipse cx="100" cy="240" rx="30" ry="35" fill="#A1887F"/>
    <!-- 腰部 -->
    <path d="M70 180 Q100 200 130 180" fill="#FBE9E7"/>
    <path d="M70 220 Q100 200 130 220" fill="#FBE9E7"/>
    <!-- 音孔 -->
    <path d="M85 175 Q80 200 85 225" stroke="#5D4037" stroke-width="3" fill="none"/>
    <path d="M115 175 Q120 200 115 225" stroke="#5D4037" stroke-width="3" fill="none"/>
    <!-- 琴弦 -->
    <line x1="92" y1="130" x2="92" y2="260" stroke="#FFD54F" stroke-width="1"/>
    <line x1="100" y1="130" x2="100" y2="260" stroke="#FFD54F" stroke-width="1"/>
    <line x1="108" y1="130" x2="108" y2="260" stroke="#FFD54F" stroke-width="1"/>
    <!-- 琴颈 -->
    <rect x="95" y="80" width="10" height="50" fill="#5D4037"/>
    <!-- 琴头 -->
    <ellipse cx="100" cy="75" rx="10" ry="8" fill="#5D4037"/>
    <rect x="90" y="60" width="20" height="15" fill="#5D4037"/>
    <circle cx="95" cy="65" r="3" fill="#FFD54F">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="105" cy="65" r="3" fill="#FFD54F">
    <animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/>
  </circle>
  </g>
  
  <!-- 琴弓 -->
  <g>
    <rect x="150" y="140" width="5" height="120" fill="#8D6E63"/>
    <rect x="148" y="140" width="9" height="8" fill="#5D4037"/>
    <rect x="148" y="252" width="9" height="8" fill="#5D4037"/>
    <line x1="152" y1="148" x2="152" y2="252" stroke="#FAFAFA" stroke-width="1"/>
  </g>
  
  <!-- 吉他 -->
  <g>
    <!-- 琴身 -->
    <ellipse cx="300" cy="210" rx="55" ry="70" fill="#D84315"/>
    <ellipse cx="300" cy="180" rx="45" ry="50" fill="#FF7043"/>
    <!-- 音孔 -->
    <circle cx="300" cy="210" r="20" fill="#5D4037"/>
    <circle cx="300" cy="210" r="15" stroke="#FFCC80" stroke-width="2" fill="none"/>
    <!-- 琴弦 -->
    <line x1="290" y1="100" x2="290" y2="270" stroke="#FFD54F" stroke-width="1"/>
    <line x1="300" y1="100" x2="300" y2="270" stroke="#FFD54F" stroke-width="1" style="animation-delay: 0.1s"/>
    <line x1="310" y1="100" x2="310" y2="270" stroke="#FFD54F" stroke-width="1" style="animation-delay: 0.2s"/>
    <!-- 琴颈 -->
    <rect x="285" y="100" width="30" height="80" fill="#8D6E63"/>
    <!-- 琴头 -->
    <rect x="290" y="60" width="20" height="40" fill="#5D4037"/>
    <circle cx="293" cy="70" r="3" fill="#FFD54F"/>
    <circle cx="293" cy="85" r="3" fill="#FFD54F"/>
    <circle cx="307" cy="70" r="3" fill="#FFD54F"/>
    <circle cx="307" cy="85" r="3" fill="#FFD54F"/>
  </g>
  
  <!-- 竖琴简化 -->
  <g>
    <path d="M400 250 Q450 150 420 80" stroke="#D84315" stroke-width="8" fill="none"/>
    <line x1="405" y1="90" x2="405" y2="250" stroke="#FFD54F" stroke-width="1"/>
    <line x1="415" y1="95" x2="415" y2="250" stroke="#FFD54F" stroke-width="1" style="animation-delay: 0.1s"/>
    <line x1="425" y1="100" x2="425" y2="250" stroke="#FFD54F" stroke-width="1" style="animation-delay: 0.2s"/>
    <line x1="435" y1="110" x2="435" y2="250" stroke="#FFD54F" stroke-width="1" style="animation-delay: 0.3s"/>
    <rect x="400" y="250" width="50" height="15" fill="#8D6E63"/>
  </g>
  
  <!-- 音符 -->
  <g>
    <ellipse cx="170" cy="80" rx="10" ry="7" fill="#D84315"/>
    <rect x="178" y="45" width="3" height="35" fill="#D84315"/>
  </g>
  <g style="animation-delay: 0.3s">
    <ellipse cx="230" cy="70" rx="10" ry="7" fill="#FF7043"/>
    <rect x="238" y="35" width="3" height="35" fill="#FF7043"/>
  </g>
  <g style="animation-delay: 0.6s">
    <ellipse cx="380" cy="60" rx="10" ry="7" fill="#FFAB91"/>
    <rect x="388" y="25" width="3" height="35" fill="#FFAB91"/>
  </g>
  
  <!-- 乐器名称 -->
  <rect x="50" y="280" width="400" height="40" rx="5" fill="#FFCCBC"/>
  <text x="100" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D84315">🎻 Скрипка</text>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D84315">🎸 Гитара</text>
  <text x="400" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#D84315">🪕 Арфа</text>
  
  <!-- 教学提示 -->
  <rect x="50" y="325" width="400" height="20" rx="5" fill="#FBE9E7"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D84315">🎵 Струны вибрируют и создают звук!</text>
</svg>