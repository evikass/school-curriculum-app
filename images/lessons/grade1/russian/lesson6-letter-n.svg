<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e8eaf6"/>
      <stop offset="100%" style="stop-color="#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters Н, н -->
  <text x="150" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#303f9f" text-anchor="middle" font-weight="bold">
    Н
    <animate attributeName="fill" values="#303f9f;#3f51b5;#303f9f" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="80" fill="#5c6bc0" text-anchor="middle">н</text>
  
  <!-- Sounds -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[н] — твёрдый</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#9c27b0">[н'] — мягкий</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 190)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">
      <tspan fill="#303f9f">Н</tspan>ора — [н] твёрдый
    </text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">
      <tspan fill="#5c6bc0">н</tspan>ебо — [н'] мягкий
    </text>
  </g>
  <g transform="translate(220, 190)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">
      <tspan fill="#303f9f">Н</tspan>ос — [н] твёрдый
    </text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">
      <tspan fill="#5c6bc0">н</tspan>ить — [н'] мягкий
    </text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#1a237e" text-anchor="middle" font-weight="bold">Буквы Н, н — звуки [н], [н']</text>
</svg>