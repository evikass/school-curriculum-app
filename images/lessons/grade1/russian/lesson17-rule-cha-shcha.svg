<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e8f5e9"/>
      <stop offset="100%" style="stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- CHA-SHCHA rule -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="140" height="80" fill="#e3f2fd" stroke="#2196f3" stroke-width="3" rx="10"/>
    <text x="70" y="35" font-family="Arial Black, sans-serif" font-size="28" fill="#1565c0" text-anchor="middle">ЧА</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">пиши с А</text>
  </g>
  
  <g transform="translate(210, 60)">
    <rect x="0" y="0" width="140" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="10"/>
    <text x="70" y="35" font-family="Arial Black, sans-serif" font-size="28" fill="#e65100" text-anchor="middle">ЩА</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">пиши с А</text>
  </g>
  
  <!-- Examples CHA -->
  <g transform="translate(50, 170)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="14" fill="#1565c0">Примеры ЧА:</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">часы, чай, чайка</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="14" fill="#333">чаща, часть, чашка</text>
  </g>
  
  <!-- Examples SHCHA -->
  <g transform="translate(220, 170)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="14" fill="#e65100">Примеры ЩА:</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">щавель, щука, щётка</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="14" fill="#333">роща, пища, venta</text>
  </g>
  
  <!-- Wrong examples -->
  <g transform="translate(120, 255)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#c62828">❌ НЕ: чяща, щявель, чясы</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#2e7d32" text-anchor="middle" font-weight="bold">Правило ЧА-ЩА — пиши с А</text>
</svg>