<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fce4ec"/>
      <stop offset="100%" style="stop-color="#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters К, к -->
  <text x="150" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#c2185b" text-anchor="middle" font-weight="bold">
    К
    <animate attributeName="fill" values="#c2185b;#e91e63;#c2185b" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="80" fill="#f06292" text-anchor="middle">к</text>
  
  <!-- Sounds -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[к] — твёрдый (взрывной)</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#9c27b0">[к'] — мягкий</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#c2185b">К</tspan>от — [к]</text>
    <text x="100" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#f06292">к</tspan>омар — [к]</text>
    <text x="210" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#f06292">к</tspan>ит — [к']</text>
    <text x="290" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">ки<tspan fill="#f06292">к</tspan> — [к']</text>
  </g>
  
  <!-- Cat icon -->
  <g transform="translate(320, 80)">
    <ellipse cx="0" cy="10" rx="20" ry="15" fill="#ff9800"/>
    <polygon points="-18,0 -12,-15 -5,0" fill="#ff9800"/>
    <polygon points="18,0 12,-15 5,0" fill="#ff9800"/>
    <circle cx="-6" cy="8" r="3" fill="#000"/>
    <circle cx="6" cy="8" r="3" fill="#000"/>
    <ellipse cx="0" cy="14" rx="3" ry="2" fill="#f44336"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#880e4f" text-anchor="middle" font-weight="bold">Буквы К, к — звуки [к], [к']</text>
</svg>