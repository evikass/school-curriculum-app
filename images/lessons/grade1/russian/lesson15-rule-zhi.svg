<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- ZHI rule highlight -->
  <g transform="translate(120, 60)">
    <rect x="0" y="0" width="160" height="70" fill="#fff8e1" stroke="#f9a825" stroke-width="3" rx="10"/>
    <text x="80" y="30" font-family="Arial Black, sans-serif" font-size="28" fill="#e65100" text-anchor="middle">ЖИ = И</text>
    <text x="80" y="55" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">[жы] → пиши ЖИ</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 160)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="16" fill="#00695c">Примеры:</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="14" fill="#333">• жираф — [жыраф]</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" fill="#333">• жить — [жыт']</text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="14" fill="#333">• ножи — [нажы]</text>
  </g>
  
  <g transform="translate(220, 160)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="16" fill="#c62828">НЕ правильно:</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="14" fill="#c62828" text-decoration="line-through">жыраф</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" fill="#c62828" text-decoration="line-through">жыть</text>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="14" fill="#c62828" text-decoration="line-through">ножы</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#006064" text-anchor="middle" font-weight="bold">Правило ЖИ — пиши с И</text>
</svg>