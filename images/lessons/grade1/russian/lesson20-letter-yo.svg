<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letter Ё -->
  <text x="200" y="160" font-family="Arial Black, sans-serif" font-size="140" fill="#f57f17" text-anchor="middle" font-weight="bold">
    Ё
    <animate attributeName="fill" values="#f57f17;#ff9800;#f57f17" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Dots animation -->
  <circle cx="175" cy="90" r="6" fill="#000">
    <animate attributeName="r" values="6;8;6" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="225" cy="90" r="6" fill="#000">
    <animate attributeName="r" values="6;8;6" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Sound info -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#c62828">Ё = [й'о] — две звука!</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="14" fill="#2e7d32">Примеры:</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">ёж — [й'ош]</text>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">ёлка — [й'олка]</text>
    <text x="210" y="25" font-family="Arial, sans-serif" font-size="14" fill="#333">шёпот — [шопот]</text>
  </g>
  
  <!-- Hedgehog icon -->
  <g transform="translate(320, 70)">
    <ellipse cx="0" cy="10" rx="20" ry="12" fill="#795548"/>
    <ellipse cx="-18" cy="10" rx="5" ry="4" fill="#a1887f"/>
    <circle cx="-22" cy="7" r="2" fill="#000"/>
    <polygon points="-5,-10 0,5 -10,5" fill="#5d4037"/>
    <polygon points="5,-8 10,5 0,5" fill="#5d4037"/>
    <polygon points="15,-5 20,5 10,5" fill="#5d4037"/>
    <polygon points="-15,-5 -10,5 -20,5" fill="#5d4037"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#e65100" text-anchor="middle" font-weight="bold">Буква Ё — звук [й'о]</text>
</svg>