<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  
  <!-- Background -->
  <rect width="500" height="350" fill="#faf5ff"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#7c3aed">Слово и его значение 📝</text>
  
  <!-- Word types -->
  <!-- Nouns -->
  <rect x="20" y="55" width="150" height="130" fill="#fef3c7" rx="12"/>
  <text x="95" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b45309">Слова-предметы</text>
  <text x="95" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">КТО? ЧТО?</text>
  
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <circle cx="55" cy="130" r="18" fill="#f59e0b">
    <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
  </circle>
    <text x="55" y="135" text-anchor="middle" font-size="16">👧</text>
  </g>
  <text x="55" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">мама</text>
  
  <g style="animation-delay: 0.3s">
    <circle cx="135" cy="130" r="18" fill="#d97706">
    <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
  </circle>
    <text x="135" y="135" text-anchor="middle" font-size="16">📚</text>
  </g>
  <text x="135" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">книга</text>
  
  <!-- Verbs -->
  <rect x="180" y="55" width="140" height="130" fill="#dcfce7" rx="12"/>
  <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Слова-действия</text>
  <text x="250" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">ЧТО ДЕЛАТЬ?</text>
  
  <g>
    <circle cx="215" cy="130" r="18" fill="#22c55e"/>
    <text x="215" y="135" text-anchor="middle" font-size="16">🏃</text>
  </g>
  <text x="215" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">бежать</text>
  
  <g style="animation-delay: 0.4s">
    <circle cx="285" cy="130" r="18" fill="#16a34a"/>
    <text x="285" y="135" text-anchor="middle" font-size="16">📖</text>
  </g>
  <text x="285" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">читать</text>
  
  <!-- Adjectives -->
  <rect x="330" y="55" width="150" height="130" fill="#dbeafe" rx="12"/>
  <text x="405" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">Слова-признаки</text>
  <text x="405" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d4ed8">КАКОЙ?</text>
  
  <g>
    <circle cx="370" cy="130" r="18" fill="#3b82f6"/>
    <text x="370" y="135" text-anchor="middle" font-size="16">🔴</text>
  </g>
  <text x="370" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8">красный</text>
  
  <g style="animation-delay: 0.5s">
    <circle cx="440" cy="130" r="18" fill="#2563eb"/>
    <text x="440" y="135" text-anchor="middle" font-size="16">📏</text>
  </g>
  <text x="440" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8">большой</text>
  
  <!-- Multi-meaning words -->
  <rect x="20" y="200" width="460" height="140" fill="#f8fafc" rx="12"/>
  <text x="250" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155">Многозначные слова</text>
  
  <!-- KOSA example -->
  <rect x="40" y="245" width="130" height="80" fill="#fce7f3" rx="8"/>
  <text x="105" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#db2777">КОСА</text>
  <text x="105" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">💇‍♀️ 🌾 🏖️</text>
  <text x="105" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9d174d">причёса | инструмент | берег</text>
  
  <!-- KLYUCH example -->
  <rect x="185" y="245" width="130" height="80" fill="#ecfdf5" rx="8"/>
  <text x="250" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#059669">КЛЮЧ</text>
  <text x="250" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🔑 💧 🎵</text>
  <text x="250" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#047857">от замка | родник | нотный</text>
  
  <!-- Words count -->
  <rect x="330" y="245" width="130" height="80" fill="#eff6ff" rx="8"/>
  <text x="395" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">В русском</text>
  <text x="395" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2563eb">150 000+</text>
  <text x="395" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">слов</text>
</svg>