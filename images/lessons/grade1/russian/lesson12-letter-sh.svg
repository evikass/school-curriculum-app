<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters Ш, ш -->
  <text x="150" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#f57f17" text-anchor="middle" font-weight="bold">
    Ш
    <animate attributeName="fill" values="#f57f17;#ff9800;#f57f17" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="80" fill="#ffb300" text-anchor="middle">ш</text>
  
  <!-- Sound info -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[ш] — всегда твёрдый!</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#2e7d32">ШИ пиши с И!</text>
  </g>
  
  <!-- Examples with rule -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#f57f17">Ш</tspan>ар</text>
    <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#f57f17">Ш</tspan>ина</text>
    <text x="140" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#ffb300">ш</tspan>и</text>
    <text x="180" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#ffb300">ш</tspan>ина</text>
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">камы<tspan fill="#ffb300">ш</tspan></text>
  </g>
  
  <!-- SHI rule box -->
  <g transform="translate(280, 70)">
    <rect x="0" y="0" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
    <text x="50" y="20" font-family="Arial Black, sans-serif" font-size="18" fill="#2e7d32" text-anchor="middle">ШИ</text>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">= [шы]</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#e65100" text-anchor="middle" font-weight="bold">Буквы Ш, ш — звук [ш] всегда твёрдый</text>
</svg>