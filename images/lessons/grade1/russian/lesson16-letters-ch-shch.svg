<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#f3e5f5"/>
      <stop offset="100%" style="stop-color="#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters Ч, Щ -->
  <text x="120" y="150" font-family="Arial Black, sans-serif" font-size="80" fill="#7b1fa2" text-anchor="middle" font-weight="bold">
    Ч
    <animate attributeName="fill" values="#7b1fa2;#9c27b0;#7b1fa2" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="280" y="150" font-family="Arial Black, sans-serif" font-size="80" fill="#ab47bc" text-anchor="middle" font-weight="bold">Щ</text>
  
  <!-- Sound info -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#9c27b0">[ч'] — всегда мягкий!</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#7b1fa2">[щ'] — всегда мягкий!</text>
  </g>
  
  <!-- CHA-SHCHA rule -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="200" height="50" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="8"/>
    <text x="100" y="20" font-family="Arial Black, sans-serif" font-size="20" fill="#2e7d32" text-anchor="middle">ЧА-ЩА = А</text>
    <text x="100" y="42" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">пиши с буквой А</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">чаща, часы, чайка, щавель, роща</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#6a1b9a" text-anchor="middle" font-weight="bold">Буквы Ч, Щ — всегда мягкие! ЧА-ЩА с А</text>
</svg>