<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fff3e0"/>
      <stop offset="100%" style="stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters Л, л -->
  <text x="150" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#e65100" text-anchor="middle" font-weight="bold">
    Л
    <animate attributeName="fill" values="#e65100;#ff9800;#e65100" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="80" fill="#ffa726" text-anchor="middle">л</text>
  
  <!-- Sounds -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[л] — твёрдый</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#9c27b0">[л'] — мягкий</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#e65100">Л</tspan>ук — [л]</text>
    <text x="90" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">сто<tspan fill="#ffa726">л</tspan> — [л]</text>
    <text x="180" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#ffa726">л</tspan>ето — [л']</text>
    <text x="270" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">со<tspan fill="#ffa726">л</tspan>ь — [л']</text>
  </g>
  
  <!-- Forest (les) icon -->
  <g transform="translate(320, 80)">
    <polygon points="0,-25 -15,10 15,10" fill="#4caf50"/>
    <rect x="-3" y="10" width="6" height="10" fill="#795548"/>
    <polygon points="-20,-15 -30,5 -10,5" fill="#66bb6a"/>
    <rect x="-23" y="5" width="4" height="8" fill="#795548"/>
    <polygon points="20,-15 10,5 30,5" fill="#66bb6a"/>
    <rect x="17" y="5" width="4" height="8" fill="#795548"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#bf360c" text-anchor="middle" font-weight="bold">Буквы Л, л — звуки [л], [л']</text>
</svg>