<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef2f2"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#dc2626">Большая буква в словах 🅰️</text>
  
  <!-- When to use capital letters -->
  <rect x="20" y="50" width="460" height="45" fill="#fee2e2" rx="10"/>
  <text x="250" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Когда пишется большая буква?</text>
  
  <!-- 1. Beginning of sentence -->
  <rect x="20" y="105" width="220" height="55" fill="#dbeafe" rx="10"/>
  <text x="130" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8">1. В начале предложения</text>
  <text x="130" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">
    <tspan style="fill: #dc2626">М</tspan>ама готовит обед.
  </text>
  
  <!-- 2. Names -->
  <rect x="260" y="105" width="220" height="55" fill="#dcfce7" rx="10"/>
  <text x="370" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#15803d">2. Имена, фамилии, отчества</text>
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <text x="370" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">
      <tspan style="fill: #dc2626">Иван Петрович Сидоров</tspan>
    </text>
  </g>
  
  <!-- 3. Pet names -->
  <rect x="20" y="170" width="220" height="55" fill="#fef3c7" rx="10"/>
  <text x="130" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#b45309">3. Клички животных</text>
  <g style="animation-delay: 0.3s">
    <text x="130" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">🐕 собака <tspan style="fill: #dc2626">Шарик</tspan></text>
  </g>
  
  <!-- 4. Cities, rivers, countries -->
  <rect x="260" y="170" width="220" height="55" fill="#f3e8ff" rx="10"/>
  <text x="370" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7c3aed">4. Города, реки, страны</text>
  <g style="animation-delay: 0.5s">
    <text x="370" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9333ea">🏙️ <tspan style="fill: #dc2626">Москва</tspan> 🌊 <tspan style="fill: #dc2626">Волга</tspan> 🇷🇺 <tspan style="fill: #dc2626">Россия</tspan></text>
  </g>
  
  <!-- Proper vs Common nouns -->
  <rect x="20" y="235" width="220" height="100" fill="#f8fafc" rx="10"/>
  <text x="130" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Имена нарицательные</text>
  <text x="130" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Общие названия</text>
  <text x="130" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">город, река, собака</text>
  <text x="130" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Пишутся с маленькой буквы</text>
  
  <rect x="260" y="235" width="220" height="100" fill="#fef2f2" rx="10"/>
  <text x="370" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Имена собственные</text>
  <text x="370" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ef4444">Имена, названия</text>
  <text x="370" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">Москва, Волга, Шарик</text>
  <text x="370" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">Пишутся с большой буквы!</text>
</svg>