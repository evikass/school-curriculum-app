<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fff3e0"/>
      <stop offset="100%" style="stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big soft sign -->
  <text x="200" y="160" font-family="Arial Black, sans-serif" font-size="140" fill="#e65100" text-anchor="middle" font-weight="bold">
    ь
    <animate attributeName="fill" values="#e65100;#ff9800;#e65100" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Explanation -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="18" fill="#c62828">Мягкий знак — показатель мягкости</text>
  </g>
  
  <!-- Examples with comparison -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="14" fill="#2e7d32">Сравни:</text>
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="16" fill="#333">КОЛ</text>
    <text x="130" y="0" font-family="Arial, sans-serif" font-size="14" fill="#666">—</text>
    <text x="150" y="0" font-family="Arial, sans-serif" font-size="16" fill="#e65100">КОЛЬ</text>
    <text x="210" y="0" font-family="Arial, sans-serif" font-size="12" fill="#666">(л' мягкий)</text>
  </g>
  
  <g transform="translate(50, 225)">
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="16" fill="#333">МЕЛ</text>
    <text x="130" y="0" font-family="Arial, sans-serif" font-size="14" fill="#666">—</text>
    <text x="150" y="0" font-family="Arial, sans-serif" font-size="16" fill="#e65100">МЕЛЬ</text>
    <text x="210" y="0" font-family="Arial, sans-serif" font-size="12" fill="#666">(л' мягкий)</text>
  </g>
  
  <g transform="translate(50, 250)">
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="16" fill="#333">УГОЛ</text>
    <text x="135" y="0" font-family="Arial, sans-serif" font-size="14" fill="#666">—</text>
    <text x="155" y="0" font-family="Arial, sans-serif" font-size="16" fill="#e65100">УГОЛЬ</text>
    <text x="225" y="0" font-family="Arial, sans-serif" font-size="12" fill="#666">(л' мягкий)</text>
  </g>
  
  <!-- Soft arrow -->
  <g transform="translate(320, 130)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#9c27b0">Мягкий</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="14" fill="#9c27b0">звук!</text>
    <path d="M-10,25 L20,25" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#bf360c" text-anchor="middle" font-weight="bold">Мягкий знак — показатель мягкости</text>
</svg>