<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e8eaf6"/>
      <stop offset="100%" style="stop-color="#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters Ж, ж -->
  <text x="150" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#303f9f" text-anchor="middle" font-weight="bold">
    Ж
    <animate attributeName="fill" values="#303f9f;#5c6bc0;#303f9f" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="80" fill="#7986cb" text-anchor="middle">ж</text>
  
  <!-- Sound info -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[ж] — всегда твёрдый!</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#2e7d32">ЖИ пиши с И!</text>
  </g>
  
  <!-- Beetle icon -->
  <g transform="translate(320, 80)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#000"/>
    <circle cx="10" cy="-5" r="5" fill="#000"/>
    <line x1="-18" y1="-8" x2="-30" y2="-18" stroke="#000" stroke-width="2"/>
    <line x1="-18" y1="0" x2="-32" y2="0" stroke="#000" stroke-width="2"/>
    <line x1="-18" y1="8" x2="-30" y2="18" stroke="#000" stroke-width="2"/>
    <line x1="18" y1="-8" x2="30" y2="-18" stroke="#000" stroke-width="2"/>
    <line x1="18" y1="0" x2="32" y2="0" stroke="#000" stroke-width="2"/>
    <line x1="18" y1="8" x2="30" y2="18" stroke="#000" stroke-width="2"/>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#303f9f">Ж</tspan>ук</text>
    <text x="70" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#7986cb">ж</tspan>ир</text>
    <text x="120" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#7986cb">ж</tspan>ираф</text>
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">но<tspan fill="#7986cb">ж</tspan>и</text>
    <text x="270" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">лы<tspan fill="#7986cb">ж</tspan>и</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#1a237e" text-anchor="middle" font-weight="bold">Буквы Ж, ж — звук [ж] всегда твёрдый</text>
</svg>