<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fce4ec"/>
      <stop offset="100%" style="stop-color="#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- SHI rule -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="130" height="80" fill="#e8f5e9" stroke="#4caf50" stroke-width="3" rx="10"/>
    <text x="65" y="35" font-family="Arial Black, sans-serif" font-size="32" fill="#2e7d32" text-anchor="middle">ШИ</text>
    <text x="65" y="60" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">пиши с буквой И</text>
  </g>
  
  <!-- Examples SHI -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">шина, шило, ширина</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#333">шишка, камыш, мышь</text>
  </g>
  
  <!-- ZHI rule -->
  <g transform="translate(220, 80)">
    <rect x="0" y="0" width="130" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="10"/>
    <text x="65" y="35" font-family="Arial Black, sans-serif" font-size="32" fill="#e65100" text-anchor="middle">ЖИ</text>
    <text x="65" y="60" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">пиши с буквой И</text>
  </g>
  
  <!-- Examples ZHI -->
  <g transform="translate(220, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">жираф, жить, жизнь</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#333">жиры, ножи, лыжи</text>
  </g>
  
  <!-- Note -->
  <g transform="translate(100, 240)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#c62828">⚠️ Запомни: ЖИ-ШИ пиши с И!</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#880e4f" text-anchor="middle" font-weight="bold">Правила ЖИ-ШИ</text>
</svg>