<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letters Р, р -->
  <text x="150" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#1565c0" text-anchor="middle" font-weight="bold">
    Р
    <animate attributeName="fill" values="#1565c0;#2196f3;#1565c0" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="80" fill="#42a5f5" text-anchor="middle">р</text>
  
  <!-- Sounds -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[р] — твёрдый (дрожит)</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="16" fill="#9c27b0">[р'] — мягкий</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#1565c0">Р</tspan>ак — [р]</text>
    <text x="90" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">ми<tspan fill="#42a5f5">р</tspan> — [р]</text>
    <text x="175" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333"><tspan fill="#42a5f5">р</tspan>ека — [р']</text>
    <text x="270" y="0" font-family="Arial, sans-serif" font-size="14" fill="#333">во<tspan fill="#42a5f5">р</tspan>она — [р]</text>
  </g>
  
  <!-- Fish icon -->
  <g transform="translate(320, 90)">
    <ellipse cx="0" cy="0" rx="25" ry="12" fill="#ff9800"/>
    <polygon points="25,0 40,-10 40,10" fill="#ff9800"/>
    <circle cx="-15" cy="-3" r="3" fill="#000"/>
    <path d="M-5,5 Q0,8 5,5" stroke="#e65100" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#0d47a1" text-anchor="middle" font-weight="bold">Буквы Р, р — звуки [р], [р']</text>
</svg>