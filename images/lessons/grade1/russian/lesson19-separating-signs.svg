<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e0f7fa"/>
      <stop offset="100%" style="stop-color="#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Soft and hard signs -->
  <text x="130" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#00838f" text-anchor="middle" font-weight="bold">
    ь
    <animate attributeName="fill" values="#00838f;#00bcd4;#00838f" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="270" y="150" font-family="Arial Black, sans-serif" font-size="100" fill="#00695c" text-anchor="middle" font-weight="bold">ъ</text>
  
  <!-- Explanation -->
  <g transform="translate(50, 50)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="16" fill="#c62828">Разделительные знаки</text>
  </g>
  
  <!-- Examples for ь -->
  <g transform="translate(30, 190)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#00838f">Разделительный ь:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#333">ПОЛЬЮ — [пал'й'у]</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333">СЕМЬЯ — [с'эм'й'а]</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="14" fill="#333">ЛИСТЬЯ — [л'ист'й'а]</text>
  </g>
  
  <!-- Examples for ъ -->
  <g transform="translate(220, 190)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#00695c">Разделительный ъ:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="14" fill="#333">ПОДЪЕЗД — [падй'эст]</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="14" fill="#333">СЪЕЛ — [сй'эл]</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="14" fill="#333">ОБЪЯВЛЕНИЕ</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#006064" text-anchor="middle" font-weight="bold">Разделительные ь и ъ</text>
</svg>