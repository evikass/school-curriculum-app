<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#f3e5f5"/>
      <stop offset="100%" style="stop-color="#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letter Ы -->
  <text x="200" y="160" font-family="Arial Black, sans-serif" font-size="140" fill="#7b1fa2" text-anchor="middle" font-weight="bold">
    Ы
    <animate attributeName="fill" values="#7b1fa2;#9c27b0;#7b1fa2" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Sound wave -->
  <g transform="translate(50, 50)">
    <ellipse cx="30" cy="20" rx="20" ry="12" stroke="#f44336" stroke-width="3" fill="none">
      <animate attributeName="ry" values="12;14;12" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[Ы]</text>
  </g>
  
  <!-- Mouth for Ы sound -->
  <g transform="translate(320, 180)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ffccbc" stroke="#7b1fa2" stroke-width="2"/>
    <ellipse cx="0" cy="2" rx="10" ry="6" fill="#b71c1c"/>
  </g>
  
  <!-- Words with Ы -->
  <text x="70" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">М</text>
  <text x="85" y="240" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2">ы</text>
  <text x="110" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">Т</text>
  <text x="125" y="240" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2">ы</text>
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">С</text>
  <text x="165" y="240" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2">ы</text>
  <text x="180" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">р</text>
  <text x="220" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">Р</text>
  <text x="235" y="240" font-family="Arial, sans-serif" font-size="14" fill="#7b1fa2">ы</text>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">ба</text>
  <text x="300" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">Ды</text>
  <text x="330" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">ня</text>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#6a1b9a" text-anchor="middle" font-weight="bold">Буква Ы, звук [ы]</text>
</svg>