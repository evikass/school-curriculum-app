<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e8f5e9"/>
      <stop offset="100%" style="stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letter И -->
  <text x="200" y="160" font-family="Arial Black, sans-serif" font-size="140" fill="#2e7d32" text-anchor="middle" font-weight="bold">
    И
    <animate attributeName="fill" values="#2e7d32;#4caf50;#2e7d32" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Small letter и -->
  <text x="320" y="100" font-family="Arial, sans-serif" font-size="60" fill="#4caf50" text-anchor="middle">и</text>
  
  <!-- Sound wave -->
  <g transform="translate(50, 50)">
    <path d="M0,20 L10,5 L20,25 L30,5 L40,20" stroke="#f44336" stroke-width="3" fill="none">
      <animate attributeName="stroke-width" values="3;4;3" dur="1s" repeatCount="indefinite"/>
    </path>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[И]</text>
  </g>
  
  <!-- Smile for И sound -->
  <g transform="translate(320, 180)">
    <path d="M-25,0 Q0,-20 25,0" stroke="#e65100" stroke-width="3" fill="none"/>
    <line x1="-20" y1="15" x2="20" y2="15" stroke="#e65100" stroke-width="3"/>
  </g>
  
  <!-- Words starting with И -->
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">И</text>
  <text x="75" y="240" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32">гра</text>
  <text x="120" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">И</text>
  <text x="135" y="240" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32">ван</text>
  <text x="185" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">И</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32">рис</text>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">И</text>
  <text x="265" y="240" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32">ней</text>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#1b5e20" text-anchor="middle" font-weight="bold">Буква И, звук [и]</text>
</svg>