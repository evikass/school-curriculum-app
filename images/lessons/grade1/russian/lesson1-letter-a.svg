<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Big letter A -->
  <text x="200" y="160" font-family="Arial Black, sans-serif" font-size="140" fill="#e65100" text-anchor="middle" font-weight="bold">
    А
    <animate attributeName="fill" values="#e65100;#ff9800;#e65100" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Small letter a -->
  <text x="320" y="100" font-family="Arial, sans-serif" font-size="60" fill="#ff9800" text-anchor="middle">а</text>
  
  <!-- Sound wave -->
  <g transform="translate(50, 50)">
    <path d="M0,20 Q10,0 20,20 Q30,40 40,20 Q50,0 60,20" stroke="#f44336" stroke-width="3" fill="none">
      <animate attributeName="d" values="M0,20 Q10,0 20,20 Q30,40 40,20 Q50,0 60,20;M0,20 Q10,40 20,20 Q30,0 40,20 Q50,40 60,20;M0,20 Q10,0 20,20 Q30,40 40,20 Q50,0 60,20" dur="1s" repeatCount="indefinite"/>
    </path>
    <text x="80" y="25" font-family="Arial, sans-serif" font-size="16" fill="#f44336">[А]</text>
  </g>
  
  <!-- Words starting with A -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">А</text>
  <text x="95" y="240" font-family="Arial, sans-serif" font-size="14" fill="#e65100">рбуз</text>
  <text x="180" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">А</text>
  <text x="195" y="240" font-family="Arial, sans-serif" font-size="14" fill="#e65100">нгел</text>
  <text x="270" y="240" font-family="Arial, sans-serif" font-size="14" fill="#333">А</text>
  <text x="285" y="240" font-family="Arial, sans-serif" font-size="14" fill="#e65100">ист</text>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="16" fill="#bf360c" text-anchor="middle" font-weight="bold">Буква А, звук [а]</text>
</svg>