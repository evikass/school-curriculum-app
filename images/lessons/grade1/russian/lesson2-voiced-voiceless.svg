<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fefce8"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ca8a04">Звонкие и глухие согласные 🔔</text>
  
  <!-- Bell animation -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="250" cy="70" rx="25" ry="20" fill="#eab308"/>
    <rect x="243" y="50" width="14" height="10" fill="#ca8a04"/>
    <circle cx="250" cy="85" r="6" fill="#a16207">
    <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
  </circle>
  </g>
  
  <!-- Sound waves -->
  <circle cx="250" cy="70" r="40" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="250" cy="70" r="55" fill="none" stroke="#fcd34d" stroke-width="1.5" style="animation-delay: 0.3s"/>
  <circle cx="250" cy="70" r="70" fill="none" stroke="#fef08a" stroke-width="1" style="animation-delay: 0.6s"/>
  
  <!-- Voiced consonants -->
  <rect x="20" y="110" width="220" height="110" fill="#dcfce7" rx="12"/>
  <text x="130" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#15803d">Звонкие 🔊</text>
  <text x="130" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">Произносятся с голосом</text>
  
  <g>
    <circle cx="55" cy="185" r="18" fill="#22c55e">
    <animate attributeName="r" values="18;20;18" dur="3s" repeatCount="indefinite"/>
  </circle>
    <text x="55" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Б</text>
  </g>
  <g style="animation-delay: 0.15s">
    <circle cx="95" cy="185" r="18" fill="#16a34a"/>
    <text x="95" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">В</text>
  </g>
  <g style="animation-delay: 0.3s">
    <circle cx="135" cy="185" r="18" fill="#15803d"/>
    <text x="135" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Г</text>
  </g>
  <g style="animation-delay: 0.45s">
    <circle cx="175" cy="185" r="18" fill="#166534"/>
    <text x="175" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Д</text>
  </g>
  
  <!-- Voiceless consonants -->
  <rect x="260" y="110" width="220" height="110" fill="#e0e7ff" rx="12"/>
  <text x="370" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3730a3">Глухие 🔇</text>
  <text x="370" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4338ca">Только шум</text>
  
  <g style="animation-delay: 0.6s">
    <rect x="300" y="168" width="35" height="35" fill="#6366f1" rx="5"/>
    <text x="317" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">П</text>
  </g>
  <g style="animation-delay: 0.75s">
    <rect x="345" y="168" width="35" height="35" fill="#4f46e5" rx="5"/>
    <text x="362" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Ф</text>
  </g>
  <g style="animation-delay: 0.9s">
    <rect x="390" y="168" width="35" height="35" fill="#4338ca" rx="5"/>
    <text x="407" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">К</text>
  </g>
  
  <!-- Pairs table -->
  <rect x="20" y="235" width="460" height="105" fill="#f8fafc" rx="12"/>
  <text x="250" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#334155">Парные согласные</text>
  
  <!-- Pairs -->
  <g>
    <circle cx="60" cy="295" r="16" fill="#22c55e"/>
    <text x="60" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Б</text>
    <text x="80" y="300" font-family="Arial, sans-serif" font-size="16" fill="#64748b">—</text>
    <circle cx="100" cy="295" r="16" fill="#6366f1"/>
    <text x="100" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">П</text>
  </g>
  <g>
    <circle cx="160" cy="295" r="16" fill="#22c55e"/>
    <text x="160" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">В</text>
    <text x="180" y="300" font-family="Arial, sans-serif" font-size="16" fill="#64748b">—</text>
    <circle cx="200" cy="295" r="16" fill="#6366f1"/>
    <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Ф</text>
  </g>
  <g>
    <circle cx="260" cy="295" r="16" fill="#22c55e"/>
    <text x="260" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Г</text>
    <text x="280" y="300" font-family="Arial, sans-serif" font-size="16" fill="#64748b">—</text>
    <circle cx="300" cy="295" r="16" fill="#6366f1"/>
    <text x="300" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">К</text>
  </g>
  <g>
    <circle cx="360" cy="295" r="16" fill="#22c55e"/>
    <text x="360" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Д</text>
    <text x="380" y="300" font-family="Arial, sans-serif" font-size="16" fill="#64748b">—</text>
    <circle cx="400" cy="295" r="16" fill="#6366f1"/>
    <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Т</text>
  </g>
  
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">6 пар: Б-П, В-Ф, Г-К, Д-Т, Ж-Ш, З-С</text>
</svg>