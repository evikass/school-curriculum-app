<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fce4ec"/>
      <stop offset="100%" style="stop-color="#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#c2185b" text-anchor="middle" font-weight="bold">Что такое искусство?</text>
  
  <!-- Palette -->
  <g transform="translate(100, 130)">
    <ellipse cx="0" cy="0" rx="40" ry="30" fill="#d7ccc8"/>
    <ellipse cx="0" cy="0" rx="35" ry="25" fill="#efebe9"/>
    <circle cx="-15" cy="-10" r="8" fill="#f44336"/>
    <circle cx="5" cy="-12" r="8" fill="#2196f3"/>
    <circle cx="-20" cy="8" r="8" fill="#ffeb3b"/>
    <circle cx="10" cy="5" r="8" fill="#4caf50"/>
    <circle cx="25" cy="-5" r="6" fill="#9c27b0"/>
    <ellipse cx="20" cy="10" rx="8" ry="5" fill="#d7ccc8"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Живопись</text>
  </g>
  
  <!-- Sculpture -->
  <g transform="translate(200, 130)">
    <ellipse cx="0" cy="20" rx="20" ry="8" fill="#bdbdbd"/>
    <path d="M-15,20 Q-20,0 -10,-20 Q0,-35 10,-20 Q20,0 15,20" fill="#9e9e9e"/>
    <ellipse cx="0" cy="-25" rx="12" ry="10" fill="#9e9e9e"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Скульптура</text>
  </g>
  
  <!-- Music -->
  <g transform="translate(300, 130)">
    <ellipse cx="0" cy="0" rx="25" ry="20" fill="#795548"/>
    <line x1="20" y1="-20" x2="20" y2="20" stroke="#000" stroke-width="2"/>
    <path d="M20,-20 Q35,-15 35,0 Q35,10 20,10" fill="#000"/>
    <circle cx="10" cy="20" r="5" fill="#000"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Музыка</text>
  </g>
  
  <!-- Architecture -->
  <g transform="translate(100, 220)">
    <rect x="-20" y="-10" width="40" height="30" fill="#ffccbc"/>
    <polygon points="-25,-10 0,-30 25,-10" fill="#f44336"/>
    <rect x="-5" y="0" width="10" height="20" fill="#795548"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Архитектура</text>
  </g>
  
  <!-- Theater -->
  <g transform="translate(200, 220)">
    <rect x="-20" y="-15" width="40" height="35" fill="#fff" stroke="#9c27b0" stroke-width="2"/>
    <polygon points="-25,-15 0,-30 25,-15" fill="#9c27b0"/>
    <circle cx="0" cy="0" r="8" fill="#ff9800"/>
    <rect x="-15" y="-10" width="30" height="3" fill="#9c27b0"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Театр</text>
  </g>
  
  <!-- Dance -->
  <g transform="translate(300, 220)">
    <circle cx="0" cy="-15" r="8" fill="#ffccbc"/>
    <line x1="0" y1="-7" x2="0" y2="10" stroke="#ffccbc" stroke-width="3"/>
    <line x1="0" y1="-2" x2="-12" y2="5" stroke="#ffccbc" stroke-width="3"/>
    <line x1="0" y1="-2" x2="12" y2="-8" stroke="#ffccbc" stroke-width="3"/>
    <line x1="0" y1="10" x2="-8" y2="25" stroke="#ffccbc" stroke-width="3"/>
    <line x1="0" y1="10" x2="8" y2="25" stroke="#ffccbc" stroke-width="3"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Танец</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#880e4f" text-anchor="middle" font-weight="bold">Виды искусства</text>
</svg>