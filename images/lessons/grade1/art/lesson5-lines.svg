<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes draw { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
      @keyframes wiggle { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(3px); } 75% { transform: translateX(-3px); } }
      .draw { stroke-dasharray: 200; animation: draw 3s ease-in-out infinite; }
      .wiggle { animation: wiggle 1s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF0F5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#C71585">✏️ Типы линий</text>
  
  <!-- Прямая линия -->
  <text x="50" y="85" font-size="14" fill="#333" font-weight="bold">Прямая</text>
  <line x1="130" y1="80" x2="450" y2="80" stroke="#333" stroke-width="3" class="draw"/>
  
  <!-- Волнистая линия -->
  <text x="50" y="135" font-size="14" fill="#333" font-weight="bold">Волнистая</text>
  <path d="M130 130 Q180 110 230 130 Q280 150 330 130 Q380 110 430 130" stroke="#FF69B4" stroke-width="3" fill="none" class="wiggle"/>
  
  <!-- Ломаная линия -->
  <text x="50" y="185" font-size="14" fill="#333" font-weight="bold">Ломаная</text>
  <polyline points="130,180 180,160 230,190 280,150 330,185 380,155 430,180" stroke="#9370DB" stroke-width="3" fill="none" class="draw"/>
  
  <!-- Спираль -->
  <text x="50" y="260" font-size="14" fill="#333" font-weight="bold">Спираль</text>
  <path d="M150 250 Q160 240 170 250 Q180 260 190 250 Q200 240 210 250 Q220 260 230 250 Q240 240 250 250" stroke="#FF6347" stroke-width="3" fill="none" class="wiggle"/>
  
  <!-- Штриховая линия -->
  <text x="50" y="310" font-size="14" fill="#333" font-weight="bold">Штриховая</text>
  <line x1="130" y1="305" x2="450" y2="305" stroke="#4169E1" stroke-width="3" stroke-dasharray="15,10" class="draw"/>
  
  <!-- Карандаш -->
  <g transform="translate(420, 200)">
    <rect x="0" y="0" width="12" height="60" fill="#FFD700"/>
    <polygon points="0,60 6,80 12,60" fill="#FFB6C1"/>
    <rect x="0" y="0" width="12" height="10" fill="#FF69B4"/>
  </g>
  
  <!-- Подсказка -->
  <text x="250" y="340" text-anchor="middle" font-size="12" fill="#DB7093">💡 Линии бывают разные: прямые, волнистые, ломаные!</text>
</svg>