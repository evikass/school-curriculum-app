<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FFF5EE"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#C71585">🖼️ Контур и заливка</text>
  
  <!-- Только контур -->
  <text x="100" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Только контур</text>
  <circle cx="100" cy="150" r="50" fill="none" stroke="#C71585" stroke-width="4"/>
  
  <!-- Только заливка -->
  <text x="250" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Только заливка</text>
  <circle cx="250" cy="150" r="50" fill="#FF69B4">
    <animate attributeName="r" values="50;52;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Контур + заливка -->
  <text x="400" y="80" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Контур + заливка</text>
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <circle cx="400" cy="150" r="50" fill="#FFB6C1">
    <animate attributeName="r" values="50;52;50" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="400" cy="150" r="50" fill="none" stroke="#C71585" stroke-width="4"/>
  </g>
  
  <!-- Примеры с разными фигурами -->
  <g transform="translate(50, 220)">
    <!-- Квадрат контур -->
    <rect x="0" y="0" width="60" height="60" fill="none" stroke="#9370DB" stroke-width="3"/>
    <text x="30" y="80" text-anchor="middle" font-size="10" fill="#333">Контур</text>
  </g>
  
  <g transform="translate(120, 220)">
    <!-- Квадрат заливка -->
    <rect x="0" y="0" width="60" height="60" fill="#9370DB"/>
    <text x="30" y="80" text-anchor="middle" font-size="10" fill="#333">Заливка</text>
  </g>
  
  <g transform="translate(190, 220)">
    <!-- Треугольник контур -->
    <polygon points="30,0 0,60 60,60" fill="none" stroke="#FF6347" stroke-width="3"/>
    <text x="30" y="80" text-anchor="middle" font-size="10" fill="#333">Контур</text>
  </g>
  
  <g transform="translate(260, 220)">
    <!-- Треугольник заливка -->
    <polygon points="30,0 0,60 60,60" fill="#FF6347"/>
    <text x="30" y="80" text-anchor="middle" font-size="10" fill="#333">Заливка</text>
  </g>
  
  <g transform="translate(330, 220)">
    <!-- Звезда контур+заливка -->
    <polygon points="30,5 35,25 55,25 40,40 45,60 30,50 15,60 20,40 5,25 25,25" fill="#FFD700"/>
    <polygon points="30,5 35,25 55,25 40,40 45,60 30,50 15,60 20,40 5,25 25,25" fill="none" stroke="#FF8C00" stroke-width="2"/>
    <text x="30" y="80" text-anchor="middle" font-size="10" fill="#333">Вместе</text>
  </g>
  
  <!-- Кисть и карандаш -->
  <g transform="translate(420, 240)">
    <rect x="0" y="0" width="10" height="50" fill="#FFD700"/>
    <polygon points="0,50 5,65 10,50" fill="#333"/>
  </g>
  
  <!-- Подсказка -->
  <text x="250" y="340" text-anchor="middle" font-size="12" fill="#DB7093">💡 Контур — это линия, заливка — цвет внутри!</text>
</svg>