<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e3f2fd"/>
      <stop offset="100%" style="stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#1565c0" text-anchor="middle" font-weight="bold">Акварель</text>
  
  <!-- Watercolor palette -->
  <g transform="translate(80, 130)">
    <ellipse cx="0" cy="0" rx="50" ry="35" fill="#fff" stroke="#90caf9" stroke-width="2"/>
    <circle cx="-25" cy="-10" r="10" fill="#f44336" opacity="0.7"/>
    <circle cx="-5" cy="-15" r="10" fill="#ff9800" opacity="0.7"/>
    <circle cx="20" cy="-10" r="10" fill="#ffeb3b" opacity="0.7"/>
    <circle cx="-20" cy="10" r="10" fill="#4caf50" opacity="0.7"/>
    <circle cx="5" cy="12" r="10" fill="#2196f3" opacity="0.7"/>
    <circle cx="30" cy="5" r="10" fill="#9c27b0" opacity="0.7"/>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Палитра</text>
  </g>
  
  <!-- Water pot -->
  <g transform="translate(200, 140)">
    <path d="M-15,-30 L-15,20 Q-15,30 0,30 Q15,30 15,20 L15,-30" fill="#81d4fa" stroke="#0288d1" stroke-width="2"/>
    <ellipse cx="0" cy="-30" rx="15" ry="5" fill="#81d4fa" stroke="#0288d1" stroke-width="2"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Вода</text>
  </g>
  
  <!-- Brush -->
  <g transform="translate(300, 120)">
    <rect x="-5" y="0" width="10" height="50" fill="#795548"/>
    <polygon points="-5,50 0,70 5,50" fill="#d7ccc8"/>
    <text x="0" y="90" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Кисть</text>
  </g>
  
  <!-- Watercolor landscape -->
  <g transform="translate(320, 200)">
    <rect x="-35" y="-25" width="70" height="50" fill="#fff" stroke="#795548" stroke-width="2"/>
    <!-- Sky gradient -->
    <rect x="-33" y="-23" width="66" height="20" fill="#bbdefb"/>
    <!-- Sun -->
    <circle cx="15" cy="-15" r="6" fill="#ffeb3b"/>
    <!-- Mountains -->
    <polygon points="-33,0 -10,-15 10,0" fill="#81c784"/>
    <polygon points="-5,0 20,-10 33,0" fill="#a5d6a7"/>
    <!-- Water -->
    <rect x="-33" y="0" width="66" height="23" fill="#4fc3f7"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Пейзаж</text>
  </g>
  
  <!-- Tips -->
  <g transform="translate(50, 220)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#0d47a1">Советы:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="10" fill="#333">• Смочи кисть водой</text>
    <text x="0" y="32" font-family="Arial, sans-serif" font-size="10" fill="#333">• Набери краску</text>
    <text x="0" y="46" font-family="Arial, sans-serif" font-size="10" fill="#333">• Рисуй мягкими движениями</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" text-anchor="middle" font-weight="bold">Работа с акварелью</text>
</svg>