<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#f3e5f5"/>
      <stop offset="100%" style="stop-color="#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="22" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Иллюстрирование сказок</text>
  
  <!-- Book -->
  <g transform="translate(100, 150)">
    <rect x="-50" y="-40" width="100" height="80" fill="#fff" stroke="#7b1fa2" stroke-width="2"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#7b1fa2" stroke-width="2"/>
    <!-- Left page - text lines -->
    <line x1="-40" y1="-30" x2="-10" y2="-30" stroke="#9e9e9e" stroke-width="1"/>
    <line x1="-40" y1="-20" x2="-10" y2="-20" stroke="#9e9e9e" stroke-width="1"/>
    <line x1="-40" y1="-10" x2="-10" y2="-10" stroke="#9e9e9e" stroke-width="1"/>
    <line x1="-40" y1="0" x2="-10" y2="0" stroke="#9e9e9e" stroke-width="1"/>
    <line x1="-40" y1="10" x2="-10" y2="10" stroke="#9e9e9e" stroke-width="1"/>
    <line x1="-40" y1="20" x2="-10" y2="20" stroke="#9e9e9e" stroke-width="1"/>
    <!-- Right page - illustration -->
    <text x="25" y="-20" font-family="Arial, sans-serif" font-size="8" fill="#7b1fa2" text-anchor="middle">СКАЗКА</text>
    <!-- Castle -->
    <rect x="10" y="5" width="30" height="25" fill="#ffccbc"/>
    <polygon points="10,5 25,-10 40,5" fill="#f44336"/>
    <rect x="15" y="15" width="8" height="15" fill="#795548"/>
    <rect x="28" y="10" width="6" height="8" fill="#81d4fa"/>
    
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Книга сказок</text>
  </g>
  
  <!-- Fairy tale characters -->
  <!-- Kolobok -->
  <g transform="translate(250, 90)">
    <circle cx="0" cy="0" r="18" fill="#ffeb3b"/>
    <circle cx="-6" cy="-3" r="3" fill="#000"/>
    <circle cx="6" cy="-3" r="3" fill="#000"/>
    <path d="M-6,6 Q0,12 6,6" stroke="#e65100" stroke-width="2" fill="none"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Колобок</text>
  </g>
  
  <!-- Teremok -->
  <g transform="translate(330, 100)">
    <rect x="-15" y="-10" width="30" height="25" fill="#ffccbc"/>
    <polygon points="-18,-10 0,-25 18,-10" fill="#f44336"/>
    <rect x="-5" y="0" width="10" height="15" fill="#795548"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Теремок</text>
  </g>
  
  <!-- Baba Yaga hut -->
  <g transform="translate(250, 190)">
    <rect x="-12" y="-8" width="24" height="18" fill="#795548"/>
    <polygon points="-15,-8 0,-20 15,-8" fill="#5d4037"/>
    <rect x="-4" y="0" width="8" height="10" fill="#4e342e"/>
    <!-- Chicken legs -->
    <line x1="-8" y1="10" x2="-12" y2="25" stroke="#ff9800" stroke-width="3"/>
    <line x1="8" y1="10" x2="12" y2="25" stroke="#ff9800" stroke-width="3"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Избушка</text>
  </g>
  
  <!-- Tips -->
  <g transform="translate(330, 190)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="10" fill="#7b1fa2">Как рисовать:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#333">1. Выбери сцену</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="9" fill="#333">2. Нарисуй героев</text>
    <text x="0" y="41" font-family="Arial, sans-serif" font-size="9" fill="#333">3. Добавь фон</text>
    <text x="0" y="54" font-family="Arial, sans-serif" font-size="9" fill="#333">4. Раскрась</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#6a1b9a" text-anchor="middle" font-weight="bold">Рисуем к сказке</text>
</svg>