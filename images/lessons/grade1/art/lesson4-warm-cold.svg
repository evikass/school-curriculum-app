<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="50%" style="stop-color:#FF6347"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0000CD"/>
      <stop offset="50%" style="stop-color:#4169E1"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#FFF5EE"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#C71585">🌡️ Тёплые и холодные цвета</text>
  
  <!-- Тёплые цвета (слева) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="15s" repeatCount="indefinite"/>
    <rect x="30" y="70" width="200" height="200" rx="15" fill="url(#warmGrad)"/>
    <circle cx="80" cy="120" r="25" fill="#FF0000">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="130" cy="120" r="25" fill="#FF7F00">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="180" cy="120" r="25" fill="#FFFF00"/>
    <circle cx="105" cy="180" r="25" fill="#FF4500"/>
    <circle cx="155" cy="180" r="25" fill="#FFD700"/>
    <text x="130" y="240" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Тёплые ☀️</text>
  </g>
  
  <!-- Холодные цвета (справа) -->
  <g>
    <rect x="270" y="70" width="200" height="200" rx="15" fill="url(#coldGrad)"/>
    <circle cx="320" cy="120" r="25" fill="#0000FF"/>
    <circle cx="370" cy="120" r="25" fill="#4169E1"/>
    <circle cx="420" cy="120" r="25" fill="#00FFFF"/>
    <circle cx="345" cy="180" r="25" fill="#008080"/>
    <circle cx="395" cy="180" r="25" fill="#87CEEB"/>
    <text x="370" y="240" text-anchor="middle" font-size="14" fill="white" font-weight="bold">Холодные ❄️</text>
  </g>
  
  <!-- Солнце и снежинка -->
  <g>
    <circle cx="70" cy="310" r="20" fill="#FFD700"/>
    <text x="70" y="315" text-anchor="middle" font-size="20">☀️</text>
  </g>
  <g>
    <text x="430" y="315" text-anchor="middle" font-size="25">❄️</text>
  </g>
  
  <!-- Подсказка -->
  <text x="250" y="340" text-anchor="middle" font-size="12" fill="#DB7093">💡 Тёплые — как огонь и солнце, холодные — как лёд и вода!</text>
</svg>