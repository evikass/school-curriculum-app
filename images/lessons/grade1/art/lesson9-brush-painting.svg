<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FFF0F5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#C71585">🖌️ Рисование красками</text>
  
  <!-- Кисти -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="15" height="80" rx="2" fill="#8B4513"/>
    <ellipse cx="7" cy="0" rx="10" ry="18" fill="#FF6B6B"/>
    <ellipse cx="7" cy="0" rx="6" ry="12" fill="#FF8E8E"/>
  </g>
  
  <g transform="translate(85, 70)">
    <rect x="0" y="0" width="15" height="80" rx="2" fill="#8B4513"/>
    <ellipse cx="7" cy="0" rx="10" ry="18" fill="#4ECDC4"/>
    <ellipse cx="7" cy="0" rx="6" ry="12" fill="#7FDFD9"/>
  </g>
  
  <g transform="translate(120, 70)">
    <rect x="0" y="0" width="15" height="80" rx="2" fill="#8B4513"/>
    <ellipse cx="7" cy="0" rx="10" ry="18" fill="#FFE66D"/>
    <ellipse cx="7" cy="0" rx="6" ry="12" fill="#FFF0A0"/>
  </g>
  
  <!-- Палитра -->
  <ellipse cx="350" cy="130" rx="100" ry="60" fill="#DEB887" stroke="#8B4513" stroke-width="3"/>
  <circle cx="300" cy="110" r="15" fill="#FF0000">
    <animate attributeName="r" values="15;17;15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="330" cy="100" r="15" fill="#FF7F00">
    <animate attributeName="r" values="15;17;15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="95" r="15" fill="#FFFF00"/>
  <circle cx="390" cy="100" r="15" fill="#00FF00"/>
  <circle cx="420" cy="110" r="15" fill="#0000FF"/>
  <circle cx="350" cy="150" r="12" fill="#9400D3"/>
  <circle cx="380" cy="155" r="12" fill="#FFC0CB"/>
  <circle cx="320" cy="155" r="12" fill="#8B4513"/>
  
  <!-- Капли краски -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="310" cy="130" rx="3" ry="5" fill="#FF0000"/>
  </g>
  <g style="animation-delay: 0.3s;">
    <ellipse cx="370" cy="135" rx="3" ry="5" fill="#FFFF00"/>
  </g>
  
  <!-- Холст с мазками -->
  <rect x="50" y="180" width="400" height="130" fill="#FFFAF0" stroke="#D2B48C" stroke-width="4"/>
  
  <!-- Мазки краски -->
  <path d="M70 200 Q120 180 170 210" stroke="#FF6B6B" stroke-width="15" fill="none" stroke-linecap="round"/>
  <path d="M100 260 Q180 230 250 270" stroke="#4ECDC4" stroke-width="12" fill="none" stroke-linecap="round" style="animation-delay: 0.5s;"/>
  <path d="M280 220 Q350 200 400 240" stroke="#FFE66D" stroke-width="10" fill="none" stroke-linecap="round" style="animation-delay: 1s;"/>
  <path d="M200 290 Q280 270 350 300" stroke="#9370DB" stroke-width="8" fill="none" stroke-linecap="round" style="animation-delay: 1.5s;"/>
  
  <!-- Баночка с водой -->
  <rect x="440" y="250" width="40" height="60" rx="5" fill="#87CEEB" stroke="#4169E1" stroke-width="2" opacity="0.7"/>
  <text x="460" y="285" text-anchor="middle" font-size="10" fill="#4169E1">вода</text>
  
  <!-- Подсказка -->
  <text x="250" y="340" text-anchor="middle" font-size="12" fill="#DB7093">💡 Аккуратно наноси краску на бумагу!</text>
</svg>