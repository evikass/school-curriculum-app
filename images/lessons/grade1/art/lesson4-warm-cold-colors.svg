<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fff3e0"/>
      <stop offset="100%" style="stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="22" fill="#e65100" text-anchor="middle" font-weight="bold">Тёплые и холодные цвета</text>
  
  <!-- Warm colors -->
  <g transform="translate(100, 130)">
    <rect x="-60" y="-50" width="120" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="10"/>
    <text x="0" y="-30" font-family="Arial Black, sans-serif" font-size="14" fill="#e65100" text-anchor="middle">Тёплые</text>
    
    <!-- Sun -->
    <circle cx="0" cy="10" r="20" fill="#ffeb3b">
      <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#ff9800" stroke-width="2">
      <line x1="0" y1="-15" x2="0" y2="-25"/>
      <line x1="15" y1="10" x2="25" y2="10"/>
      <line x1="-15" y1="10" x2="-25" y2="10"/>
      <line x1="10" y1="-5" x2="18" y2="-13"/>
      <line x1="-10" y1="-5" x2="-18" y2="-13"/>
    </g>
    
    <!-- Color circles -->
    <circle cx="-40" cy="35" r="10" fill="#f44336"/>
    <circle cx="-15" cy="35" r="10" fill="#ff9800"/>
    <circle cx="10" cy="35" r="10" fill="#ffeb3b"/>
    <circle cx="35" cy="35" r="10" fill="#ff5722"/>
  </g>
  
  <!-- Cold colors -->
  <g transform="translate(300, 130)">
    <rect x="-60" y="-50" width="120" height="100" fill="#e3f2fd" stroke="#2196f3" stroke-width="3" rx="10"/>
    <text x="0" y="-30" font-family="Arial Black, sans-serif" font-size="14" fill="#1565c0" text-anchor="middle">Холодные</text>
    
    <!-- Snowflake -->
    <g stroke="#2196f3" stroke-width="2" fill="none">
      <line x1="0" y1="-15" x2="0" y2="25"/>
      <line x1="-20" y1="5" x2="20" y2="5"/>
      <line x1="-14" y1="-9" x2="14" y2="19"/>
      <line x1="14" y1="-9" x2="-14" y2="19"/>
      <circle cx="0" cy="5" r="5" fill="#bbdefb"/>
    </g>
    
    <!-- Color circles -->
    <circle cx="-40" cy="35" r="10" fill="#2196f3"/>
    <circle cx="-15" cy="35" r="10" fill="#00bcd4"/>
    <circle cx="10" cy="35" r="10" fill="#4caf50"/>
    <circle cx="35" cy="35" r="10" fill="#9c27b0"/>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 230)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#c62828">Тёплое:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">солнце, огонь, лето, пустыня</text>
  </g>
  <g transform="translate(230, 230)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#1565c0">Холодное:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">лёд, снег, зима, море</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#e65100" text-anchor="middle" font-weight="bold">Цветовая гамма</text>
</svg>