<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FFF0F5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#C71585">✨ Свободное рисование</text>
  
  <!-- Холст для творчества -->
  <rect x="30" y="60" width="300" height="250" fill="#FFFAF0" stroke="#DEB887" stroke-width="3" rx="5"/>
  
  <!-- Свободные линии и формы -->
  <path d="M50 100 Q100 80 150 120 T250 100" stroke="#FF69B4" stroke-width="3" fill="none"/>
  <path d="M80 180 C120 150 160 210 200 180 S280 150 300 200" stroke="#9370DB" stroke-width="2" fill="none" style="animation-delay: 0.5s;"/>
  
  <!-- Свободные формы -->
  <circle cx="100" cy="250" r="25" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <ellipse cx="200" cy="280" rx="40" ry="20" fill="#E6E6FA" stroke="#9370DB" stroke-width="2" style="animation-delay: 0.3s;"/>
  <polygon points="280,220 260,270 300,270" fill="#FFFACD" stroke="#DAA520" stroke-width="2" style="animation-delay: 0.6s;"/>
  
  <!-- Звёздочки-искры -->
  <text x="120" y="130" font-size="16">⭐</text>
  <text x="220" y="90" font-size="14" style="animation-delay: 0.3s;">✨</text>
  <text x="280" y="150" font-size="12" style="animation-delay: 0.6s;">⭐</text>
  
  <!-- Инструменты справа -->
  <g transform="translate(360, 70)">
    <text x="50" y="0" text-anchor="middle" font-size="14" fill="#C71585" font-weight="bold">Инструменты</text>
    
    <!-- Карандаши -->
    <rect x="10" y="20" width="80" height="15" fill="#FFD700"/>
    <polygon points="90,20 100,27.5 90,35" fill="#FFB6C1"/>
    <rect x="10" y="20" width="80" height="5" fill="#FF69B4"/>
    
    <rect x="10" y="50" width="80" height="15" fill="#98FB98"/>
    <polygon points="90,50 100,57.5 90,65" fill="#FFB6C1"/>
    <rect x="10" y="50" width="80" height="5" fill="#228B22"/>
    
    <rect x="10" y="80" width="80" height="15" fill="#87CEEB"/>
    <polygon points="90,80 100,87.5 90,95" fill="#FFB6C1"/>
    <rect x="10" y="80" width="80" height="5" fill="#4169E1"/>
    
    <!-- Кисти -->
    <rect x="20" y="110" width="12" height="50" rx="2" fill="#8B4513"/>
    <ellipse cx="26" cy="110" rx="8" ry="14" fill="#FF6B6B"/>
    
    <rect x="50" y="115" width="10" height="45" rx="2" fill="#8B4513"/>
    <ellipse cx="55" cy="115" rx="6" ry="12" fill="#4ECDC4"/>
    
    <!-- Ластик -->
    <rect x="20" y="180" width="60" height="25" rx="4" fill="#FFB6C1" stroke="#FF69B4" stroke-width="2"/>
    <text x="50" y="198" text-anchor="middle" font-size="10" fill="#C71585">ластик</text>
  </g>
  
  <!-- Идеи -->
  <g transform="translate(360, 230)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#FFE4E1" stroke="#FF69B4" stroke-width="2"/>
    <text x="60" y="20" text-anchor="middle" font-size="12" fill="#C71585" font-weight="bold">Идеи:</text>
    <text x="60" y="38" text-anchor="middle" font-size="10" fill="#333">🌸 Цветы</text>
    <text x="60" y="52" text-anchor="middle" font-size="10" fill="#333">🏠 Дом</text>
    <text x="60" y="66" text-anchor="middle" font-size="10" fill="#333">🐾 Животные</text>
  </g>
  
  <!-- Подсказка -->
  <text x="250" y="340" text-anchor="middle" font-size="12" fill="#DB7093">💡 Рисуй то, что нравится! Фантазируй! 🎨✨</text>
</svg>