<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e8f5e9"/>
      <stop offset="100%" style="stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="22" fill="#2e7d32" text-anchor="middle" font-weight="bold">Рисование по представлению</text>
  
  <!-- Easel with canvas -->
  <g transform="translate(200, 150)">
    <!-- Easel legs -->
    <line x1="-30" y1="60" x2="-50" y2="100" stroke="#795548" stroke-width="4"/>
    <line x1="30" y1="60" x2="50" y2="100" stroke="#795548" stroke-width="4"/>
    <line x1="0" y1="60" x2="0" y2="110" stroke="#795548" stroke-width="4"/>
    <!-- Canvas -->
    <rect x="-50" y="-50" width="100" height="110" fill="#fff" stroke="#795548" stroke-width="3"/>
    <!-- Painting on canvas - apple -->
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#f44336"/>
    <rect x="-3" y="-35" width="6" height="10" fill="#795548"/>
    <ellipse cx="10" cy="-25" rx="8" ry="5" fill="#4caf50"/>
    <!-- Shine -->
    <ellipse cx="-8" cy="-10" rx="5" ry="8" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Brushes and paints -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="40" height="60" fill="#ffccbc" stroke="#795548" stroke-width="2"/>
    <circle cx="10" cy="15" r="6" fill="#f44336"/>
    <circle cx="30" cy="15" r="6" fill="#2196f3"/>
    <circle cx="10" cy="35" r="6" fill="#ffeb3b"/>
    <circle cx="30" cy="35" r="6" fill="#4caf50"/>
    <circle cx="20" cy="50" r="6" fill="#9c27b0"/>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Краски</text>
  </g>
  
  <!-- Brush -->
  <g transform="translate(350, 120) rotate(30)">
    <rect x="0" y="0" width="8" height="40" fill="#795548"/>
    <polygon points="0,40 4,55 8,40" fill="#d7ccc8"/>
    <polygon points="2,55 4,65 6,55" fill="#f44336"/>
  </g>
  
  <!-- Instructions -->
  <g transform="translate(50, 230)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#1b5e20">Как нарисовать:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">1. Посмотри на предмет</text>
    <text x="0" y="33" font-family="Arial, sans-serif" font-size="11" fill="#333">2. Определи форму</text>
    <text x="0" y="48" font-family="Arial, sans-serif" font-size="11" fill="#333">3. Нарисуй контур</text>
  </g>
  <g transform="translate(220, 230)">
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">4. Добавь детали</text>
    <text x="0" y="33" font-family="Arial, sans-serif" font-size="11" fill="#333">5. Раскрась</text>
    <text x="0" y="48" font-family="Arial, sans-serif" font-size="11" fill="#333">6. Подпиши работу</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32" text-anchor="middle" font-weight="bold">Рисуем предметы</text>
</svg>