<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565c0" text-anchor="middle">Читаем стихи выразительно</text>
  
  <!-- Child reading -->
  <circle cx="80" cy="100" r="30" fill="#ffcc80"/>
  <rect x="50" y="130" width="60" height="80" fill="#42a5f5" rx="5"/>
  <rect x="55" y="135" width="50" height="70" fill="#e3f2fd"/>
  <text x="80" y="175" font-family="Georgia, serif" font-size="8" fill="#0d47a1" text-anchor="middle" font-style="italic">Весна</text>
  <text x="80" y="190" font-family="Georgia, serif" font-size="7" fill="#1565c0" text-anchor="middle">пришла!</text>
  
  <!-- Sound waves from reading -->
  <path d="M120 80 Q135 60 150 80" stroke="#64b5f6" stroke-width="2" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M130 90 Q145 70 160 90" stroke="#64b5f6" stroke-width="2" fill="none">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M140 100 Q155 80 170 100" stroke="#64b5f6" stroke-width="2" fill="none">
    <animate attributeName="opacity" values="1;0.5;1" dur="0.8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Rules -->
  <rect x="180" y="50" width="200" height="130" fill="white" stroke="#1e88e5" stroke-width="2" rx="10"/>
  <text x="280" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#0d47a1" text-anchor="middle">Правила чтения:</text>
  
  <text x="195" y="100" font-family="Arial" font-size="10" fill="#1565c0">🫁 Дыши правильно</text>
  <text x="195" y="120" font-family="Arial" font-size="10" fill="#1565c0">💪 Выдели главное слово</text>
  <text x="195" y="140" font-family="Arial" font-size="10" fill="#1565c0">⏸️ Делай паузы</text>
  <text x="195" y="160" font-family="Arial" font-size="10" fill="#1565c0">🎵 Изменяй интонацию</text>
  
  <!-- Intonation examples -->
  <rect x="30" y="200" width="340" height="85" fill="white" stroke="#42a5f5" stroke-width="2" rx="10"/>
  
  <text x="200" y="225" font-family="Arial" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Интонация:</text>
  
  <text x="70" y="250" font-family="Arial" font-size="11" fill="#4caf50">😊 Радостно</text>
  <text x="160" y="250" font-family="Arial" font-size="11" fill="#f44336">😢 Грустно</text>
  <text x="250" y="250" font-family="Arial" font-size="11" fill="#ff9800">😲 Удивлённо</text>
  <text x="340" y="250" font-family="Arial" font-size="11" fill="#9c27b0">😨 Испуганно</text>
  
  <text x="200" y="275" font-family="Arial" font-size="10" fill="#546e7a" text-anchor="middle">Одну фразу можно прочитать по-разному!</text>
  
  <!-- Musical notes -->
  <text x="350" y="70" font-family="Arial" font-size="16">🎵</text>
  <text x="365" y="90" font-family="Arial" font-size="14">🎶</text>
</svg>