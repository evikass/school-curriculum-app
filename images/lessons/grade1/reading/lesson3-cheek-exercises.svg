<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#E6F7FF"/>
  
  <!-- Background decoration -->
  <circle cx="60" cy="60" r="30" fill="#87CEEB" opacity="0.4">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="290" r="35" fill="#ADD8E6" opacity="0.5">
    <animate attributeName="r" values="35;37;35" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="50" r="25" fill="#87CEEB" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E90FF" text-anchor="middle">😤 Упражнения для щёк</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#4682B4" opacity="0.6"/>
  
  <!-- Face with puffed cheeks -->
  <g transform="translate(70, 90)">
    <!-- Face -->
    <circle cx="80" cy="70" r="65" fill="#FFE4C4" stroke="#4682B4" stroke-width="3"/>
    <!-- Puffed left cheek -->
    <ellipse cx="25" cy="80" rx="20" ry="15" fill="#FFDAB9" stroke="#4682B4" stroke-width="1"/>
    <!-- Puffed right cheek -->
    <ellipse cx="135" cy="80" rx="20" ry="15" fill="#FFDAB9" stroke="#4682B4" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="55" cy="50" r="7" fill="#4A4A4A"/>
    <circle cx="105" cy="50" r="7" fill="#4A4A4A"/>
    <circle cx="57" cy="48" r="2.5" fill="white"/>
    <circle cx="107" cy="48" r="2.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="80" cy="65" rx="5" ry="4" fill="#DEB887"/>
    <!-- Closed lips -->
    <path d="M65 90 Q80 95 95 90" fill="#FF69B4" stroke="#C71585" stroke-width="2"/>
    
    <text x="80" y="160" font-family="Arial" font-size="12" fill="#1E90FF" text-anchor="middle">Надуй щёки!</text>
  </g>
  
  <!-- Exercise bubbles -->
  <g transform="translate(250, 100)">
    <circle cx="70" cy="40" r="50" fill="#E0FFFF" stroke="#4682B4" stroke-width="2"/>
    <text x="70" y="30" font-family="Arial" font-size="14" fill="#1E90FF" text-anchor="middle">Надуть</text>
    <text x="70" y="50" font-family="Arial" font-size="14" fill="#1E90FF" text-anchor="middle">щёки</text>
    <text x="70" y="70" font-family="Arial" font-size="20" fill="#4682B4" text-anchor="middle">😤</text>
    
    <circle cx="70" cy="150" r="50" fill="#E0FFFF" stroke="#4682B4" stroke-width="2"/>
    <text x="70" y="140" font-family="Arial" font-size="14" fill="#1E90FF" text-anchor="middle">Втянуть</text>
    <text x="70" y="160" font-family="Arial" font-size="14" fill="#1E90FF" text-anchor="middle">щёки</text>
    <text x="70" y="180" font-family="Arial" font-size="20" fill="#4682B4" text-anchor="middle">😮</text>
  </g>
  
  <!-- Animated arrows -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    <path d="M155 160 L170 170 L165 170 L165 190 L155 190 L155 170 L150 170 Z" fill="#4682B4"/>
  </g>
  
  <!-- Exercise steps -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="140" height="60" rx="8" fill="#E0FFFF" stroke="#4682B4" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial" font-size="11" fill="#1E90FF" text-anchor="middle">1. Набери воздух</text>
    <text x="70" y="45" font-family="Arial" font-size="11" fill="#1E90FF" text-anchor="middle">и надуй щёки</text>
  </g>
  
  <g transform="translate(180, 270)">
    <rect x="0" y="0" width="140" height="60" rx="8" fill="#E0FFFF" stroke="#4682B4" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial" font-size="11" fill="#1E90FF" text-anchor="middle">2. Медленно</text>
    <text x="70" y="45" font-family="Arial" font-size="11" fill="#1E90FF" text-anchor="middle">выпусти воздух</text>
  </g>
  
  <g transform="translate(330, 270)">
    <rect x="0" y="0" width="140" height="60" rx="8" fill="#E0FFFF" stroke="#4682B4" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial" font-size="11" fill="#1E90FF" text-anchor="middle">3. Повтори</text>
    <text x="70" y="45" font-family="Arial" font-size="11" fill="#1E90FF" text-anchor="middle">5-6 раз</text>
  </g>
</svg>