<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#c2185b" text-anchor="middle">Рассказ из личного опыта</text>
  
  <!-- Memory book -->
  <rect x="50" y="50" width="130" height="160" fill="#fff" stroke="#e91e63" stroke-width="3" rx="5"/>
  <rect x="55" y="55" width="120" height="150" fill="#fff5f7"/>
  <text x="115" y="80" font-family="Arial" font-size="12" font-weight="bold" fill="#c2185b" text-anchor="middle">МОЯ ИСТОРИЯ</text>
  
  <!-- Photos -->
  <rect x="65" y="95" width="50" height="50" fill="#e1bee7" rx="3"/>
  <text x="90" y="125" font-family="Arial" font-size="20" text-anchor="middle">🎂</text>
  <rect x="120" y="95" width="50" height="50" fill="#b2ebf2" rx="3"/>
  <text x="145" y="125" font-family="Arial" font-size="20" text-anchor="middle">🏖️</text>
  <rect x="65" y="150" width="50" height="50" fill="#c8e6c9" rx="3"/>
  <text x="90" y="180" font-family="Arial" font-size="20" text-anchor="middle">🐕</text>
  <rect x="120" y="150" width="50" height="50" fill="#ffe0b2" rx="3"/>
  <text x="145" y="180" font-family="Arial" font-size="20" text-anchor="middle">⚽</text>
  
  <!-- Topics list -->
  <rect x="200" y="50" width="180" height="160" fill="white" stroke="#9c27b0" stroke-width="2" rx="8"/>
  <text x="290" y="75" font-family="Arial" font-size="13" font-weight="bold" fill="#7b1fa2" text-anchor="middle">О чём рассказать?</text>
  
  <text x="215" y="100" font-family="Arial" font-size="11" fill="#6a1b9a">✨ День рождения</text>
  <text x="215" y="118" font-family="Arial" font-size="11" fill="#6a1b9a">✨ Выходные с семьёй</text>
  <text x="215" y="136" font-family="Arial" font-size="11" fill="#6a1b9a">✨ Поездка к бабушке</text>
  <text x="215" y="154" font-family="Arial" font-size="11" fill="#6a1b9a">✨ Мой питомец</text>
  <text x="215" y="172" font-family="Arial" font-size="11" fill="#6a1b9a">✨ Как я научился...</text>
  <text x="215" y="190" font-family="Arial" font-size="11" fill="#6a1b9a">✨ Первый день в школе</text>
  
  <!-- Child telling story -->
  <circle cx="200" cy="260" r="25" fill="#ffcc80">
    <animate attributeName="r" values="25;27;25" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="265" font-family="Arial" font-size="20" text-anchor="middle">👧</text>
  
  <!-- Speech bubbles -->
  <ellipse cx="280" cy="240" rx="50" ry="25" fill="white" stroke="#e91e63" stroke-width="1"/>
  <text x="280" y="244" font-family="Arial" font-size="10" fill="#c2185b" text-anchor="middle">Однажды...</text>
  <polygon points="240,250 250,265 260,250" fill="white" stroke="#e91e63" stroke-width="1"/>
  
  <text x="200" y="285" font-family="Arial" font-size="11" fill="#880e4f" text-anchor="middle">Твои истории — самые интересные!</text>
</svg>