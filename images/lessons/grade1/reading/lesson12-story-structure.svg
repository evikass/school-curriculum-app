<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e65100" text-anchor="middle">Что такое рассказ?</text>
  
  <!-- Story structure - Beginning -->
  <rect x="30" y="60" width="100" height="180" fill="#81d4fa" rx="10"/>
  <text x="80" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#01579b" text-anchor="middle">НАЧАЛО</text>
  <circle cx="80" cy="120" r="25" fill="#4fc3f7">
    <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="80" y="125" font-family="Arial" font-size="16" text-anchor="middle">👤</text>
  <text x="80" y="165" font-family="Arial" font-size="11" fill="#0277bd" text-anchor="middle">Кто?</text>
  <text x="80" y="180" font-family="Arial" font-size="11" fill="#0277bd" text-anchor="middle">Где?</text>
  <text x="80" y="195" font-family="Arial" font-size="11" fill="#0277bd" text-anchor="middle">Когда?</text>
  <text x="80" y="220" font-family="Arial" font-size="9" fill="#01579b" text-anchor="middle">Знакомство</text>
  <text x="80" y="232" font-family="Arial" font-size="9" fill="#01579b" text-anchor="middle">с героем</text>
  
  <!-- Middle -->
  <rect x="150" y="60" width="100" height="180" fill="#ffcc80" rx="10"/>
  <text x="200" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">СЕРЕДИНА</text>
  <rect x="170" y="100" width="60" height="50" fill="#ffb74d" rx="5">
    <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="200" y="130" font-family="Arial" font-size="20" text-anchor="middle">⚡</text>
  <text x="200" y="165" font-family="Arial" font-size="11" fill="#bf360c" text-anchor="middle">Что</text>
  <text x="200" y="180" font-family="Arial" font-size="11" fill="#bf360c" text-anchor="middle">случилось?</text>
  <text x="200" y="220" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Главное</text>
  <text x="200" y="232" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">событие</text>
  
  <!-- End -->
  <rect x="270" y="60" width="100" height="180" fill="#a5d6a7" rx="10"/>
  <text x="320" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">КОНЕЦ</text>
  <circle cx="320" cy="130" r="30" fill="#81c784">
    <animate attributeName="fill" values="#81c784;#a5d6a7;#81c784" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="320" y="135" font-family="Arial" font-size="16" text-anchor="middle">😊</text>
  <text x="320" y="175" font-family="Arial" font-size="11" fill="#1b5e20" text-anchor="middle">Чем всё</text>
  <text x="320" y="190" font-family="Arial" font-size="11" fill="#1b5e20" text-anchor="middle">закончилось?</text>
  <text x="320" y="220" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">Итог</text>
  <text x="320" y="232" font-family="Arial" font-size="9" fill="#2e7d32" text-anchor="middle">истории</text>
  
  <!-- Arrows -->
  <polygon points="145,150 155,145 155,155" fill="#5d4037"/>
  <polygon points="265,150 275,145 275,155" fill="#5d4037"/>
  
  <text x="200" y="280" font-family="Arial" font-size="12" fill="#5d4037" text-anchor="middle">У каждого рассказа есть начало, середина и конец!</text>
</svg>