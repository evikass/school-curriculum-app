<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ad1457" text-anchor="middle">✨ Придумываем сказку</text>
  
  <!-- Magic castle -->
  <g transform="translate(150, 70)">
    <polygon points="50,0 100,50 0,50" fill="#ce93d8">
      <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <rect x="20" y="50" width="60" height="60" fill="#ab47bc"/>
    <rect x="35" y="80" width="30" height="30" fill="#7b1fa2"/>
    <circle cx="50" cy="95" r="3" fill="#ffeb3b"/>
  </g>
  
  <!-- Hero -->
  <g transform="translate(40, 120)">
    <circle cx="30" cy="30" r="25" fill="#ffcc80">
      <animate attributeName="cy" values="30;25;30" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="38" font-family="Arial" font-size="20" text-anchor="middle">🧒</text>
    <text x="30" y="70" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">Герой</text>
  </g>
  
  <!-- Magic wand -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="8" height="60" fill="#795548" rx="2" transform="rotate(30)"/>
    <polygon points="4,0 15,10 4,15" fill="#ffeb3b">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    <text x="10" y="80" font-family="Arial" font-size="10" fill="#6a1b9a" text-anchor="middle">Волшебство</text>
  </g>
  
  <!-- Dragon/Adventure -->
  <g transform="translate(310, 160)">
    <text x="30" y="30" font-family="Arial" font-size="35" text-anchor="middle">🐉</text>
    <text x="30" y="55" font-family="Arial" font-size="10" fill="#c62828" text-anchor="middle">Приключение</text>
  </g>
  
  <!-- Story elements -->
  <g font-family="Arial" font-size="11" fill="#7b1fa2">
    <text x="30" y="230">📖 Жили-были...</text>
    <text x="30" y="248">🏰 В некотором царстве...</text>
    <text x="30" y="266">⏰ Давным-давно...</text>
  </g>
  
  <!-- Happy ending -->
  <g transform="translate(280, 210)">
    <circle cx="30" cy="30" r="25" fill="#81c784">
      <animate attributeName="r" values="25;28;25" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="38" font-family="Arial" font-size="20" text-anchor="middle">❤️</text>
    <text x="30" y="70" font-family="Arial" font-size="10" fill="#2e7d32" text-anchor="middle">Добро побеждает!</text>
  </g>
</svg>