<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe"/>
      <stop offset="100%" style="stop-color:#b3e5fc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0277bd" text-anchor="middle">Придумываем сказку</text>
  
  <!-- Fairy tale castle -->
  <polygon points="200,50 170,100 230,100" fill="#ce93d8"/>
  <rect x="180" y="100" width="40" height="40" fill="#ba68c8"/>
  <rect x="175" y="140" width="50" height="30" fill="#ab47bc"/>
  <circle cx="200" cy="130" r="5" fill="#ffd54f"/>
  
  <!-- Stars/sparkles -->
  <circle cx="150" cy="70" r="4" fill="#ffd54f">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="65" r="3" fill="#ffd54f">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="100" r="3" fill="#ff80ab">
    <animate attributeName="opacity" values="1;0.5;1" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="90" r="4" fill="#ff80ab">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Fairy tale elements -->
  <!-- Hero -->
  <rect x="30" y="170" width="80" height="110" fill="#fff" stroke="#7b1fa2" stroke-width="2" rx="8"/>
  <text x="70" y="190" font-family="Arial" font-size="11" font-weight="bold" fill="#6a1b9a" text-anchor="middle">ГЕРОЙ</text>
  <text x="70" y="220" font-family="Arial" font-size="14" text-anchor="middle">👸</text>
  <text x="70" y="240" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">Кто главный</text>
  <text x="70" y="255" font-family="Arial" font-size="9" fill="#7b1fa2" text-anchor="middle">персонаж?</text>
  
  <!-- Magic -->
  <rect x="120" y="170" width="80" height="110" fill="#fff" stroke="#00897b" stroke-width="2" rx="8"/>
  <text x="160" y="190" font-family="Arial" font-size="11" font-weight="bold" fill="#00695c" text-anchor="middle">ВОЛШЕБСТВО</text>
  <text x="160" y="220" font-family="Arial" font-size="14" text-anchor="middle">✨</text>
  <text x="160" y="240" font-family="Arial" font-size="9" fill="#00897b" text-anchor="middle">Какое</text>
  <text x="160" y="255" font-family="Arial" font-size="9" fill="#00897b" text-anchor="middle">чудо?</text>
  
  <!-- Adventure -->
  <rect x="210" y="170" width="80" height="110" fill="#fff" stroke="#e65100" stroke-width="2" rx="8"/>
  <text x="250" y="190" font-family="Arial" font-size="11" font-weight="bold" fill="#bf360c" text-anchor="middle">ПРИКЛЮЧЕНИЕ</text>
  <text x="250" y="220" font-family="Arial" font-size="14" text-anchor="middle">🗺️</text>
  <text x="250" y="240" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">Что</text>
  <text x="250" y="255" font-family="Arial" font-size="9" fill="#e65100" text-anchor="middle">случилось?</text>
  
  <!-- Happy end -->
  <rect x="300" y="170" width="80" height="110" fill="#fff" stroke="#388e3c" stroke-width="2" rx="8"/>
  <text x="340" y="190" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">СЧАСТЛИВЫЙ</text>
  <text x="340" y="205" font-family="Arial" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">КОНЕЦ</text>
  <text x="340" y="235" font-family="Arial" font-size="14" text-anchor="middle">❤️</text>
  <text x="340" y="260" font-family="Arial" font-size="9" fill="#388e3c" text-anchor="middle">Добро победит!</text>
  
  <!-- Wand -->
  <line x1="280" y1="50" x2="320" y2="80" stroke="#ffd54f" stroke-width="3"/>
  <polygon points="320,75 330,85 315,85" fill="#ffd54f">
    <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
  </polygon>
  
  <text x="200" y="295" font-family="Arial" font-size="11" fill="#4a148c" text-anchor="middle">В сказке возможно всё, что ты придумаешь!</text>
</svg>