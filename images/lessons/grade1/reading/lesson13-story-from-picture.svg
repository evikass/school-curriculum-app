<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2e7d32" text-anchor="middle">🖼️ Рассказ по картинке</text>
  
  <!-- Picture frame -->
  <rect x="100" y="60" width="200" height="150" fill="#fff" stroke="#5d4037" stroke-width="4" rx="5"/>
  <rect x="105" y="65" width="190" height="140" fill="#e3f2fd"/>
  
  <!-- Picture content - Winter scene -->
  <circle cx="180" cy="100" r="20" fill="#fff" stroke="#90a4ae" stroke-width="2"/>
  <circle cx="170" cy="95" r="3" fill="#333"/>
  <circle cx="185" cy="95" r="3" fill="#333"/>
  <path d="M175 105 Q180 110 175 115" stroke="#f48fb1" stroke-width="2" fill="none"/>
  
  <!-- Snowman -->
  <circle cx="250" cy="160" r="25" fill="#fff" stroke="#90a4ae" stroke-width="2"/>
  <circle cx="250" cy="130" r="18" fill="#fff" stroke="#90a4ae" stroke-width="2"/>
  <circle cx="250" cy="110" r="12" fill="#fff" stroke="#90a4ae" stroke-width="2"/>
  <circle cx="246" cy="107" r="2" fill="#333"/>
  <circle cx="254" cy="107" r="2" fill="#333"/>
  <polygon points="250,112 265,115 250,118" fill="#ff7043"/>
  
  <!-- Snowflakes -->
  <text x="120" y="90" font-family="Arial" font-size="14" fill="#90caf9">❄</text>
  <text x="150" y="130" font-family="Arial" font-size="10" fill="#90caf9">❄</text>
  <text x="280" y="100" font-family="Arial" font-size="12" fill="#90caf9">❄</text>
  
  <!-- Magnifying glass with animation -->
  <g transform="translate(280, 200)">
    <circle cx="30" cy="30" r="25" fill="none" stroke="#795548" stroke-width="4">
      <animate attributeName="r" values="25;28;25" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="50" y1="50" x2="70" y2="70" stroke="#795548" stroke-width="4"/>
    <text x="30" y="35" font-family="Arial" font-size="12" fill="#795548" text-anchor="middle">?</text>
  </g>
  
  <!-- Questions -->
  <g font-family="Arial" font-size="11" fill="#1b5e20">
    <text x="30" y="240">❓ Кто нарисован?</text>
    <text x="30" y="255">❓ Что делают?</text>
    <text x="30" y="270">❓ Какое время года?</text>
    <text x="220" y="240">💡 Придумай начало</text>
    <text x="220" y="255">💡 Придумай середину</text>
    <text x="220" y="270">💡 Придумай конец</text>
  </g>
</svg>