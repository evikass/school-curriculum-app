<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FCE4EC"/>
  
  <!-- Background decoration -->
  <circle cx="40" cy="310" r="25" fill="#F48FB1" opacity="0.4">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="40" r="30" fill="#EC407A" opacity="0.3">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="280" r="20" fill="#F48FB1" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#C2185B" text-anchor="middle">🏃 Слова-действия</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#E91E63" opacity="0.6"/>
  
  <!-- Explanation -->
  <rect x="30" y="75" width="440" height="40" rx="8" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="250" y="100" font-family="Arial" font-size="13" fill="#C2185B" text-anchor="middle">Слова-действия отвечают на вопросы: ЧТО ДЕЛАТЬ? ЧТО ДЕЛАЕТ?</text>
  
  <!-- Action cards -->
  <g transform="translate(30, 130)">
    <!-- Running -->
    <rect x="0" y="0" width="105" height="100" rx="10" fill="#F8BBD9" stroke="#E91E63" stroke-width="2"/>
    <text x="52" y="25" font-family="Arial" font-size="28" text-anchor="middle">🏃</text>
    <text x="52" y="50" font-family="Arial" font-size="14" font-weight="bold" fill="#C2185B" text-anchor="middle">бежать</text>
    <g>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
      <rect x="20" y="60" width="65" height="25" rx="5" fill="#E91E63"/>
      <text x="52" y="77" font-family="Arial" font-size="11" fill="white" text-anchor="middle">ЧТО ДЕЛАТЬ?</text>
    </g>
  </g>
  
  <g transform="translate(145, 130)">
    <!-- Jumping -->
    <rect x="0" y="0" width="105" height="100" rx="10" fill="#F8BBD9" stroke="#E91E63" stroke-width="2"/>
    <g>
      <text x="52" y="30" font-family="Arial" font-size="28" text-anchor="middle">🦘</text>
    </g>
    <text x="52" y="55" font-family="Arial" font-size="14" font-weight="bold" fill="#C2185B" text-anchor="middle">прыгать</text>
    <g>
      <rect x="20" y="65" width="65" height="25" rx="5" fill="#E91E63"/>
      <text x="52" y="82" font-family="Arial" font-size="11" fill="white" text-anchor="middle">ЧТО ДЕЛАТЬ?</text>
    </g>
  </g>
  
  <g transform="translate(260, 130)">
    <!-- Reading -->
    <rect x="0" y="0" width="105" height="100" rx="10" fill="#F8BBD9" stroke="#E91E63" stroke-width="2"/>
    <text x="52" y="25" font-family="Arial" font-size="28" text-anchor="middle">📖</text>
    <text x="52" y="50" font-family="Arial" font-size="14" font-weight="bold" fill="#C2185B" text-anchor="middle">читать</text>
    <g>
      <rect x="20" y="60" width="65" height="25" rx="5" fill="#E91E63"/>
      <text x="52" y="77" font-family="Arial" font-size="11" fill="white" text-anchor="middle">ЧТО ДЕЛАТЬ?</text>
    </g>
  </g>
  
  <g transform="translate(375, 130)">
    <!-- Writing -->
    <rect x="0" y="0" width="105" height="100" rx="10" fill="#F8BBD9" stroke="#E91E63" stroke-width="2"/>
    <text x="52" y="25" font-family="Arial" font-size="28" text-anchor="middle">✏️</text>
    <text x="52" y="50" font-family="Arial" font-size="14" font-weight="bold" fill="#C2185B" text-anchor="middle">писать</text>
    <g>
      <rect x="20" y="60" width="65" height="25" rx="5" fill="#E91E63"/>
      <text x="52" y="77" font-family="Arial" font-size="11" fill="white" text-anchor="middle">ЧТО ДЕЛАТЬ?</text>
    </g>
  </g>
  
  <!-- More action examples -->
  <rect x="30" y="240" width="440" height="45" rx="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="250" y="260" font-family="Arial" font-size="12" fill="#C2185B" text-anchor="middle">Ещё слова-действия: говорить, играть, рисовать, петь, танцевать, спать</text>
  <text x="250" y="278" font-family="Arial" font-size="11" fill="#E91E63" text-anchor="middle">играть 🎮  рисовать 🎨  петь 🎤  танцевать 💃  спать 😴</text>
  
  <!-- Tip box -->
  <rect x="20" y="295" width="460" height="45" rx="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="250" y="315" font-family="Arial" font-size="12" fill="#C2185B" text-anchor="middle">💡 Слова-действия — это глаголы!</text>
  <text x="250" y="332" font-family="Arial" font-size="11" fill="#E91E63" text-anchor="middle">Они обозначают то, что делают люди, животные и предметы</text>
</svg>