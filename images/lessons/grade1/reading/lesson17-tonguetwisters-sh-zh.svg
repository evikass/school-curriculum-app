<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f57f17" text-anchor="middle">Скороговорки для Ш и Ж</text>
  
  <!-- Snake (Звук Ш) - шипящая змея -->
  <ellipse cx="100" cy="100" rx="60" ry="30" fill="#ce93d8"/>
  <path d="M140 90 Q160 70 150 100 Q170 80 160 110" stroke="#9c27b0" stroke-width="3" fill="none"/>
  <text x="100" y="105" font-family="Arial" font-size="20" text-anchor="middle">🐍</text>
  <text x="100" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#7b1fa2" text-anchor="middle">[Ш] — Шипение</text>
  <text x="100" y="163" font-family="Arial" font-size="11" fill="#8e24aa" text-anchor="middle">ШШШ-ШШШ-ШШШ</text>
  
  <!-- Beetle (Звук Ж) - жук -->
  <ellipse cx="300" cy="100" rx="50" ry="30" fill="#4caf50"/>
  <ellipse cx="300" cy="100" rx="35" ry="20" fill="#81c784"/>
  <circle cx="280" cy="90" r="5" fill="#1b5e20"/>
  <circle cx="320" cy="90" r="5" fill="#1b5e20"/>
  <line x1="270" y1="80" x2="250" y2="60" stroke="#2e7d32" stroke-width="2"/>
  <line x1="330" y1="80" x2="350" y2="60" stroke="#2e7d32" stroke-width="2"/>
  <text x="300" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#33691e" text-anchor="middle">[Ж] — Жук жужжит</text>
  <text x="300" y="163" font-family="Arial" font-size="11" fill="#558b2f" text-anchor="middle">ЖЖЖ-ЖЖЖ-ЖЖЖ</text>
  
  <!-- Tongue twisters -->
  <rect x="30" y="185" width="340" height="95" fill="white" stroke="#ffc107" stroke-width="2" rx="10"/>
  
  <text x="50" y="210" font-family="Arial" font-size="12" fill="#f57f17">🏠 "Шесть мышат в шалаше шуршат"</text>
  <text x="50" y="230" font-family="Arial" font-size="12" fill="#f57f17">🦎 "Жужжит жужелица"</text>
  <text x="50" y="250" font-family="Arial" font-size="12" fill="#f57f17">🦔 "Ёж уже жаждет еды"</text>
  <text x="50" y="275" font-family="Arial" font-size="10" fill="#ff8f00">Произноси чётко: язык поднят вверх!</text>
  
  <!-- Sound waves -->
  <path d="M80 60 Q90 40 100 60" stroke="#9c27b0" stroke-width="2" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M320 60 Q330 40 340 60" stroke="#4caf50" stroke-width="2" fill="none">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </path>
</svg>