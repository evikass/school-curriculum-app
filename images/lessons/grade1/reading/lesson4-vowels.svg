<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes color { 0% { fill: #FF6B6B; } 25% { fill: #FFA500; } 50% { fill: #FFD700; } 75% { fill: #98FB98; } 100% { fill: #FF6B6B; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .animate { animation: bounce 2s ease-in-out infinite; }
      .pulse { animation: pulse 1.5s ease-in-out infinite; }
      .color { animation: color 4s ease-in-out infinite; }
      .float { animation: float 2.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFFACD"/>
  
  <!-- Background decoration -->
  <circle cx="50" cy="50" r="25" fill="#FFD700" opacity="0.3"/>
  <circle cx="450" cy="300" r="30" fill="#FFA500" opacity="0.4"/>
  <circle cx="470" cy="60" r="20" fill="#FFD700" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF8C00" text-anchor="middle">📢 Гласные звуки</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#FFA500" opacity="0.6"/>
  
  <!-- Vowel letters with animation -->
  <g transform="translate(50, 90)">
    <!-- А -->
    <circle class="float" cx="50" cy="50" r="40" fill="#FF6B6B" stroke="#DC143C" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">А</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#8B0000" text-anchor="middle">а-а-а!</text>
  </g>
  
  <g transform="translate(130, 90)">
    <!-- О -->
    <circle class="float" style="animation-delay: 0.2s" cx="50" cy="50" r="40" fill="#FFA500" stroke="#FF8C00" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">О</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#B8860B" text-anchor="middle">о-о-о!</text>
  </g>
  
  <g transform="translate(210, 90)">
    <!-- У -->
    <circle class="float" style="animation-delay: 0.4s" cx="50" cy="50" r="40" fill="#FFD700" stroke="#DAA520" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">У</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#B8860B" text-anchor="middle">у-у-у!</text>
  </g>
  
  <g transform="translate(290, 90)">
    <!-- Ы -->
    <circle class="float" style="animation-delay: 0.6s" cx="50" cy="50" r="40" fill="#9ACD32" stroke="#6B8E23" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Ы</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#556B2F" text-anchor="middle">ы-ы-ы!</text>
  </g>
  
  <g transform="translate(370, 90)">
    <!-- И -->
    <circle class="float" style="animation-delay: 0.8s" cx="50" cy="50" r="40" fill="#87CEEB" stroke="#4682B4" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">И</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#4169E1" text-anchor="middle">и-и-и!</text>
  </g>
  
  <!-- Sound waves -->
  <g transform="translate(100, 220)">
    <path class="pulse" d="M10 50 Q30 30 50 50 Q70 70 90 50 Q110 30 130 50" stroke="#FFA500" stroke-width="3" fill="none"/>
    <path class="pulse" style="animation-delay: 0.3s" d="M10 70 Q30 50 50 70 Q70 90 90 70 Q110 50 130 70" stroke="#FF8C00" stroke-width="3" fill="none"/>
    <path class="pulse" style="animation-delay: 0.6s" d="M10 90 Q30 70 50 90 Q70 110 90 90 Q110 70 130 90" stroke="#FFD700" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Mouth illustration -->
  <g transform="translate(280, 210)">
    <ellipse cx="60" cy="40" rx="50" ry="35" fill="#FFE4C4" stroke="#D2691E" stroke-width="2"/>
    <ellipse cx="60" cy="50" rx="30" ry="20" fill="#8B0000"/>
    <ellipse class="color" cx="60" cy="45" rx="20" ry="12" fill="#FF6B6B"/>
  </g>
  
  <text x="250" y="330" font-family="Arial" font-size="14" fill="#FF8C00" text-anchor="middle">Гласные можно пропеть: А, О, У, И, Ы, Э</text>
</svg>