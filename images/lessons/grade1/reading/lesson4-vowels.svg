<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#FFFACD"/>
  
  <!-- Background decoration -->
  <circle cx="50" cy="50" r="25" fill="#FFD700" opacity="0.3">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="300" r="30" fill="#FFA500" opacity="0.4">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="60" r="20" fill="#FFD700" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FF8C00" text-anchor="middle">📢 Гласные звуки</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#FFA500" opacity="0.6"/>
  
  <!-- Vowel letters with animation -->
  <g transform="translate(50, 90)">
    <!-- А -->
    <circle cx="50" cy="50" r="40" fill="#FF6B6B" stroke="#DC143C" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">А</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#8B0000" text-anchor="middle">а-а-а!</text>
  </g>
  
  <g transform="translate(130, 90)">
    <!-- О -->
    <circle style="animation-delay: 0.2s" cx="50" cy="50" r="40" fill="#FFA500" stroke="#FF8C00" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">О</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#B8860B" text-anchor="middle">о-о-о!</text>
  </g>
  
  <g transform="translate(210, 90)">
    <!-- У -->
    <circle style="animation-delay: 0.4s" cx="50" cy="50" r="40" fill="#FFD700" stroke="#DAA520" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">У</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#B8860B" text-anchor="middle">у-у-у!</text>
  </g>
  
  <g transform="translate(290, 90)">
    <!-- Ы -->
    <circle style="animation-delay: 0.6s" cx="50" cy="50" r="40" fill="#9ACD32" stroke="#6B8E23" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Ы</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#556B2F" text-anchor="middle">ы-ы-ы!</text>
  </g>
  
  <g transform="translate(370, 90)">
    <!-- Э -->
    <circle style="animation-delay: 0.8s" cx="50" cy="50" r="40" fill="#87CEEB" stroke="#4682B4" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial" font-size="36" font-weight="bold" fill="white" text-anchor="middle">Э</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#4682B4" text-anchor="middle">э-э-э!</text>
  </g>
  
  <!-- Second row - Iotated vowels -->
  <g transform="translate(90, 210)">
    <!-- Я -->
    <circle cx="50" cy="40" r="38" fill="#FF69B4" stroke="#C71585" stroke-width="3"/>
    <text x="50" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Я</text>
    <text x="50" y="95" font-family="Arial" font-size="10" fill="#C71585" text-anchor="middle">я-я-я!</text>
  </g>
  
  <g transform="translate(170, 210)">
    <!-- Ё -->
    <circle style="animation-delay: 0.3s" cx="50" cy="40" r="38" fill="#DDA0DD" stroke="#9370DB" stroke-width="3"/>
    <text x="50" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Ё</text>
    <text x="50" y="95" font-family="Arial" font-size="10" fill="#9370DB" text-anchor="middle">ё-ё-ё!</text>
  </g>
  
  <g transform="translate(250, 210)">
    <!-- Ю -->
    <circle style="animation-delay: 0.6s" cx="50" cy="40" r="38" fill="#98FB98" stroke="#32CD32" stroke-width="3"/>
    <text x="50" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Ю</text>
    <text x="50" y="95" font-family="Arial" font-size="10" fill="#228B22" text-anchor="middle">ю-ю-ю!</text>
  </g>
  
  <g transform="translate(330, 210)">
    <!-- Е -->
    <circle style="animation-delay: 0.9s" cx="50" cy="40" r="38" fill="#F0E68C" stroke="#BDB76B" stroke-width="3"/>
    <text x="50" y="50" font-family="Arial" font-size="32" font-weight="bold" fill="white" text-anchor="middle">Е</text>
    <text x="50" y="95" font-family="Arial" font-size="10" fill="#8B8B00" text-anchor="middle">е-е-е!</text>
  </g>
  
  <!-- Tip box -->
  <rect x="20" y="310" width="460" height="35" rx="10" fill="#FFF8DC" stroke="#FFA500" stroke-width="2"/>
  <text x="250" y="333" font-family="Arial" font-size="13" fill="#FF8C00" text-anchor="middle">💡 Гласные можно петь: А, О, У, Ы, Э, Я, Ё, Ю, Е — их 10!</text>
</svg>