<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <rect width="500" height="350" fill="#F5F0FF"/>
  
  <!-- Background decoration -->
  <circle cx="40" cy="40" r="25" fill="#D6BCFA" opacity="0.4">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="460" cy="310" r="30" fill="#C4B5FD" opacity="0.5">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="60" r="20" fill="#D6BCFA" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6B46C1" text-anchor="middle">🔢 Сколько звуков в слове?</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#9F7AEA" opacity="0.6"/>
  
  <!-- Word examples with sound count -->
  <g transform="translate(30, 85)">
    <!-- Word: МАК -->
    <rect x="0" y="0" width="140" height="100" rx="12" fill="#FAF5FF" stroke="#9F7AEA" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#6B46C1" text-anchor="middle">🌸 МАК</text>
    <g transform="translate(20, 40)">
      <circle cx="15" cy="15" r="12" fill="#9F7AEA"/>
      <text x="15" y="19" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">М</text>
      <circle style="animation-delay: 0.2s" cx="45" cy="15" r="12" fill="#A78BFA"/>
      <text x="45" y="19" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">А</text>
      <circle style="animation-delay: 0.4s" cx="75" cy="15" r="12" fill="#C4B5FD"/>
      <text x="75" y="19" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">К</text>
    </g>
    <rect x="40" y="72" width="60" height="22" rx="5" fill="#9F7AEA"/>
    <text x="70" y="87" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3 звука</text>
  </g>
  
  <g transform="translate(180, 85)">
    <!-- Word: ЛУНА -->
    <rect x="0" y="0" width="140" height="100" rx="12" fill="#FAF5FF" stroke="#9F7AEA" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#6B46C1" text-anchor="middle">🌙 ЛУНА</text>
    <g transform="translate(10, 40)">
      <circle cx="15" cy="15" r="11" fill="#9F7AEA"/>
      <text x="15" y="19" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Л</text>
      <circle style="animation-delay: 0.15s" cx="40" cy="15" r="11" fill="#A78BFA"/>
      <text x="40" y="19" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">У</text>
      <circle style="animation-delay: 0.3s" cx="65" cy="15" r="11" fill="#C4B5FD"/>
      <text x="65" y="19" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Н</text>
      <circle style="animation-delay: 0.45s" cx="90" cy="15" r="11" fill="#DDD6FE"/>
      <text x="90" y="19" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">А</text>
    </g>
    <rect x="40" y="72" width="60" height="22" rx="5" fill="#9F7AEA"/>
    <text x="70" y="87" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">4 звука</text>
  </g>
  
  <g transform="translate(330, 85)">
    <!-- Word: ЯБЛОКО -->
    <rect x="0" y="0" width="140" height="100" rx="12" fill="#FAF5FF" stroke="#9F7AEA" stroke-width="2"/>
    <text x="70" y="25" font-family="Arial" font-size="13" font-weight="bold" fill="#6B46C1" text-anchor="middle">🍎 ЯБЛОКО</text>
    <g transform="translate(5, 38)">
      <circle cx="10" cy="10" r="8" fill="#9F7AEA"/>
      <text x="10" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Й</text>
      <circle style="animation-delay: 0.1s" cx="28" cy="10" r="8" fill="#A78BFA"/>
      <text x="28" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">А</text>
      <circle style="animation-delay: 0.2s" cx="46" cy="10" r="8" fill="#C4B5FD"/>
      <text x="46" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Б</text>
      <circle style="animation-delay: 0.3s" cx="64" cy="10" r="8" fill="#DDD6FE"/>
      <text x="64" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">Л</text>
      <circle style="animation-delay: 0.4s" cx="82" cy="10" r="8" fill="#9F7AEA"/>
      <text x="82" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">О</text>
      <circle style="animation-delay: 0.5s" cx="100" cy="10" r="8" fill="#A78BFA"/>
      <text x="100" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">К</text>
      <circle style="animation-delay: 0.6s" cx="118" cy="10" r="8" fill="#C4B5FD"/>
      <text x="118" y="14" font-family="Arial" font-size="8" fill="white" text-anchor="middle">А</text>
    </g>
    <rect x="35" y="72" width="70" height="22" rx="5" fill="#9F7AEA"/>
    <text x="70" y="87" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">7 звуков</text>
  </g>
  
  <!-- Counting activity -->
  <rect x="50" y="200" width="400" height="80" rx="12" fill="#FAF5FF" stroke="#9F7AEA" stroke-width="2"/>
  <text x="250" y="225" font-family="Arial" font-size="14" font-weight="bold" fill="#6B46C1" text-anchor="middle">🎯 Посчитай звуки!</text>
  
  <g transform="translate(70, 240)">
    <rect x="0" y="0" width="90" height="35" rx="6" fill="#E9D8FD"/>
    <text x="45" y="15" font-family="Arial" font-size="12" fill="#6B46C1" text-anchor="middle">🏠 ДОМ</text>
    <text x="45" y="30" font-family="Arial" font-size="10" fill="#9F7AEA" text-anchor="middle">? звуков</text>
  </g>
  
  <g transform="translate(180, 240)">
    <rect x="0" y="0" width="90" height="35" rx="6" fill="#E9D8FD"/>
    <text x="45" y="15" font-family="Arial" font-size="12" fill="#6B46C1" text-anchor="middle">☀️ СОЛНЦЕ</text>
    <text x="45" y="30" font-family="Arial" font-size="10" fill="#9F7AEA" text-anchor="middle">? звуков</text>
  </g>
  
  <g transform="translate(290, 240)">
    <rect x="0" y="0" width="90" height="35" rx="6" fill="#E9D8FD"/>
    <text x="45" y="15" font-family="Arial" font-size="12" fill="#6B46C1" text-anchor="middle">🚗 МАШИНА</text>
    <text x="45" y="30" font-family="Arial" font-size="10" fill="#9F7AEA" text-anchor="middle">? звуков</text>
  </g>
  
  <!-- Tip box -->
  <rect x="20" y="295" width="460" height="45" rx="10" fill="#FAF5FF" stroke="#9F7AEA" stroke-width="2"/>
  <text x="250" y="315" font-family="Arial" font-size="12" fill="#6B46C1" text-anchor="middle">💡 Хлопни в ладоши на каждый звук!</text>
  <text x="250" y="332" font-family="Arial" font-size="11" fill="#9F7AEA" text-anchor="middle">Помни: буквы Я, Ё, Ю, Е могут давать 2 звука!</text>
</svg>