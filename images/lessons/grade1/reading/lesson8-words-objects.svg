<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .bounce { animation: bounce 1s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="400" height="300" fill="#FFF3E0"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E65100" text-anchor="middle">📦 Слова-предметы</text>
  
  <!-- Categories -->
  <g transform="translate(20, 60)">
    <!-- People -->
    <rect width="110" height="90" fill="#FFCCBC" rx="10" stroke="#FF5722" stroke-width="2"/>
    <text x="55" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#BF360C" text-anchor="middle">👥 ЛЮДИ</text>
    <text x="55" y="45" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle" class="bounce">мама</text>
    <text x="55" y="60" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle" class="bounce" style="animation-delay:0.2s">папа</text>
    <text x="55" y="75" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle" class="bounce" style="animation-delay:0.4s">учитель</text>
    <text x="55" y="88" font-family="Arial" font-size="8" fill="#FF5722" text-anchor="middle">КТО?</text>
  </g>
  
  <g transform="translate(145, 60)">
    <!-- Animals -->
    <rect width="110" height="90" fill="#C8E6C9" rx="10" stroke="#4CAF50" stroke-width="2"/>
    <text x="55" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">🐾 Животные</text>
    <text x="55" y="45" font-family="Arial" font-size="10" fill="#388E3C" text-anchor="middle" class="bounce">кошка</text>
    <text x="55" y="60" font-family="Arial" font-size="10" fill="#388E3C" text-anchor="middle" class="bounce" style="animation-delay:0.2s">собака</text>
    <text x="55" y="75" font-family="Arial" font-size="10" fill="#388E3C" text-anchor="middle" class="bounce" style="animation-delay:0.4s">птица</text>
    <text x="55" y="88" font-family="Arial" font-size="8" fill="#4CAF50" text-anchor="middle">КТО?</text>
  </g>
  
  <g transform="translate(270, 60)">
    <!-- Things -->
    <rect width="110" height="90" fill="#BBDEFB" rx="10" stroke="#2196F3" stroke-width="2"/>
    <text x="55" y="25" font-family="Arial" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">📚 Вещи</text>
    <text x="55" y="45" font-family="Arial" font-size="10" fill="#1976D2" text-anchor="middle" class="bounce">стол</text>
    <text x="55" y="60" font-family="Arial" font-size="10" fill="#1976D2" text-anchor="middle" class="bounce" style="animation-delay:0.2s">стул</text>
    <text x="55" y="75" font-family="Arial" font-size="10" fill="#1976D2" text-anchor="middle" class="bounce" style="animation-delay:0.4s">книга</text>
    <text x="55" y="88" font-family="Arial" font-size="8" fill="#2196F3" text-anchor="middle">ЧТО?</text>
  </g>
  
  <!-- Example sentences -->
  <g transform="translate(20, 165)">
    <rect width="360" height="60" fill="#FFF" rx="10" stroke="#FF9800" stroke-width="2"/>
    <text x="180" y="25" font-family="Arial" font-size="11" fill="#E65100" text-anchor="middle">(Кто?) Мама готовит обед.</text>
    <text x="180" y="42" font-family="Arial" font-size="11" fill="#E65100" text-anchor="middle">(Кто?) Кошка спит на окне.</text>
    <text x="180" y="59" font-family="Arial" font-size="11" fill="#E65100" text-anchor="middle">(Что?) Стол стоит в комнате.</text>
  </g>
  
  <!-- Game hint -->
  <g transform="translate(100, 240)">
    <rect width="200" height="45" fill="#FFF9C4" rx="10" stroke="#FBC02D" stroke-width="2"/>
    <text x="100" y="20" font-family="Arial" font-size="11" font-weight="bold" fill="#F57F17" text-anchor="middle">🎮 Игра "Назови предмет"</text>
    <text x="100" y="38" font-family="Arial" font-size="9" fill="#FF8F00" text-anchor="middle">Опиши предмет — назови слово!</text>
  </g>
</svg>