<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.1); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      @keyframes pucker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
      @keyframes smile { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(1.2); } }
      .animate { animation: bounce 2s ease-in-out infinite; }
      .pulse { animation: pulse 1.5s ease-in-out infinite; }
      .pucker { animation: pucker 1s ease-in-out infinite; }
      .smile { animation: smile 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFE6F0"/>
  
  <!-- Background decoration -->
  <circle cx="80" cy="280" r="35" fill="#FFB6C1" opacity="0.4"/>
  <circle cx="420" cy="60" r="30" fill="#FFC0CB" opacity="0.5"/>
  <circle cx="450" cy="250" r="40" fill="#FFB6C1" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C71585" text-anchor="middle">👄 Упражнения для губ</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#DB7093" opacity="0.6"/>
  
  <!-- Face with different lip positions -->
  <g transform="translate(40, 100)">
    <!-- Face 1 - Smiling -->
    <circle cx="70" cy="60" r="55" fill="#FFE4C4" stroke="#DB7093" stroke-width="2"/>
    <circle cx="50" cy="45" r="6" fill="#4A4A4A"/>
    <circle cx="90" cy="45" r="6" fill="#4A4A4A"/>
    <path class="smile" d="M45 70 Q70 90 95 70" fill="none" stroke="#C71585" stroke-width="3" stroke-linecap="round"/>
    <text x="70" y="130" font-family="Arial" font-size="11" fill="#C71585" text-anchor="middle">Улыбка</text>
    <text x="70" y="143" font-family="Arial" font-size="10" fill="#DB7093" text-anchor="middle">😊</text>
  </g>
  
  <g transform="translate(180, 100)">
    <!-- Face 2 - Puckered -->
    <circle cx="70" cy="60" r="55" fill="#FFE4C4" stroke="#DB7093" stroke-width="2"/>
    <circle cx="50" cy="45" r="6" fill="#4A4A4A"/>
    <circle cx="90" cy="45" r="6" fill="#4A4A4A"/>
    <ellipse class="pucker" cx="70" cy="75" rx="10" ry="8" fill="#FF69B4" stroke="#C71585" stroke-width="2"/>
    <text x="70" y="130" font-family="Arial" font-size="11" fill="#C71585" text-anchor="middle">Трубочка</text>
    <text x="70" y="143" font-family="Arial" font-size="10" fill="#DB7093" text-anchor="middle">😗</text>
  </g>
  
  <g transform="translate(320, 100)">
    <!-- Face 3 - Open mouth -->
    <circle cx="70" cy="60" r="55" fill="#FFE4C4" stroke="#DB7093" stroke-width="2"/>
    <circle cx="50" cy="45" r="6" fill="#4A4A4A"/>
    <circle cx="90" cy="45" r="6" fill="#4A4A4A"/>
    <ellipse cx="70" cy="75" rx="18" ry="12" fill="#8B0000" stroke="#C71585" stroke-width="2"/>
    <text x="70" y="130" font-family="Arial" font-size="11" fill="#C71585" text-anchor="middle">Открыть</text>
    <text x="70" y="143" font-family="Arial" font-size="10" fill="#DB7093" text-anchor="middle">😮</text>
  </g>
  
  <!-- Exercise sequence -->
  <g class="animate">
    <circle cx="150" cy="270" r="25" fill="#FFC0CB" stroke="#DB7093" stroke-width="2"/>
    <text x="150" y="275" font-family="Arial" font-size="16" fill="#C71585" text-anchor="middle">1</text>
    
    <path d="M180 270 L200 270" stroke="#C71585" stroke-width="2" stroke-dasharray="5,3"/>
    
    <circle cx="230" cy="270" r="25" fill="#FFB6C1" stroke="#DB7093" stroke-width="2"/>
    <text x="230" y="275" font-family="Arial" font-size="16" fill="#C71585" text-anchor="middle">2</text>
    
    <path d="M260 270 L280 270" stroke="#C71585" stroke-width="2" stroke-dasharray="5,3"/>
    
    <circle cx="310" cy="270" r="25" fill="#FFC0CB" stroke="#DB7093" stroke-width="2"/>
    <text x="310" y="275" font-family="Arial" font-size="16" fill="#C71585" text-anchor="middle">3</text>
  </g>
  
  <!-- Tip box -->
  <rect x="20" y="300" width="460" height="45" rx="10" fill="#FFF0F5" stroke="#DB7093" stroke-width="2"/>
  <text x="250" y="320" font-family="Arial" font-size="12" fill="#C71585" text-anchor="middle">💡 Совет: Чередуй упражнения — улыбка, трубочка, открыть!</text>
  <text x="250" y="338" font-family="Arial" font-size="11" fill="#DB7093" text-anchor="middle">Повторяй по 10 раз каждое</text>
</svg>