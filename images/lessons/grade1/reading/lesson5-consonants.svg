<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.05); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .animate { animation: bounce 2s ease-in-out infinite; }
      .pulse { animation: pulse 1.5s ease-in-out infinite; }
      .shake { animation: shake 0.5s ease-in-out infinite; }
      .float { animation: float 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- Background decoration -->
  <circle cx="40" cy="310" r="30" fill="#90EE90" opacity="0.4"/>
  <circle cx="460" cy="40" r="25" fill="#98FB98" opacity="0.5"/>
  <circle cx="480" cy="280" r="35" fill="#90EE90" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E8B57" text-anchor="middle">🔤 Согласные звуки</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#3CB371" opacity="0.6"/>
  
  <!-- Voiced consonants section -->
  <rect x="20" y="75" width="220" height="140" rx="10" fill="#E0F7FA" stroke="#00BCD4" stroke-width="2"/>
  <text x="130" y="98" font-family="Arial" font-size="14" font-weight="bold" fill="#00838F" text-anchor="middle">🔊 Звонкие</text>
  
  <g transform="translate(30, 105)">
    <circle class="float" cx="20" cy="20" r="18" fill="#4DD0E1"/>
    <text x="20" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Б</text>
    
    <circle class="float" style="animation-delay: 0.1s" cx="60" cy="20" r="18" fill="#26C6DA"/>
    <text x="60" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">В</text>
    
    <circle class="float" style="animation-delay: 0.2s" cx="100" cy="20" r="18" fill="#00BCD4"/>
    <text x="100" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Г</text>
    
    <circle class="float" style="animation-delay: 0.3s" cx="140" cy="20" r="18" fill="#00ACC1"/>
    <text x="140" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Д</text>
    
    <circle class="float" style="animation-delay: 0.4s" cx="180" cy="20" r="18" fill="#0097A7"/>
    <text x="180" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Ж</text>
    
    <circle class="float" style="animation-delay: 0.5s" cx="20" cy="60" r="18" fill="#00838F"/>
    <text x="20" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">З</text>
    
    <circle class="float" style="animation-delay: 0.6s" cx="60" cy="60" r="18" fill="#00796B"/>
    <text x="60" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Л</text>
    
    <circle class="float" style="animation-delay: 0.7s" cx="100" cy="60" r="18" fill="#00695C"/>
    <text x="100" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">М</text>
    
    <circle class="float" style="animation-delay: 0.8s" cx="140" cy="60" r="18" fill="#004D40"/>
    <text x="140" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Н</text>
    
    <circle class="float" style="animation-delay: 0.9s" cx="180" cy="60" r="18" fill="#26A69A"/>
    <text x="180" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Р</text>
  </g>
  
  <!-- Voiceless consonants section -->
  <rect x="260" y="75" width="220" height="140" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="370" y="98" font-family="Arial" font-size="14" font-weight="bold" fill="#7B1FA2" text-anchor="middle">🤫 Глухие</text>
  
  <g transform="translate(270, 105)">
    <circle class="pulse" cx="20" cy="20" r="18" fill="#CE93D8"/>
    <text x="20" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">П</text>
    
    <circle class="pulse" style="animation-delay: 0.1s" cx="60" cy="20" r="18" fill="#BA68C8"/>
    <text x="60" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Ф</text>
    
    <circle class="pulse" style="animation-delay: 0.2s" cx="100" cy="20" r="18" fill="#AB47BC"/>
    <text x="100" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">К</text>
    
    <circle class="pulse" style="animation-delay: 0.3s" cx="140" cy="20" r="18" fill="#9C27B0"/>
    <text x="140" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Т</text>
    
    <circle class="pulse" style="animation-delay: 0.4s" cx="180" cy="20" r="18" fill="#8E24AA"/>
    <text x="180" y="26" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Ш</text>
    
    <circle class="pulse" style="animation-delay: 0.5s" cx="20" cy="60" r="18" fill="#7B1FA2"/>
    <text x="20" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">С</text>
    
    <circle class="pulse" style="animation-delay: 0.6s" cx="60" cy="60" r="18" fill="#6A1B9A"/>
    <text x="60" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Х</text>
    
    <circle class="pulse" style="animation-delay: 0.7s" cx="100" cy="60" r="18" fill="#4A148C"/>
    <text x="100" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Ц</text>
    
    <circle class="pulse" style="animation-delay: 0.8s" cx="140" cy="60" r="18" fill="#AA00FF"/>
    <text x="140" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Ч</text>
    
    <circle class="pulse" style="animation-delay: 0.9s" cx="180" cy="60" r="18" fill="#7C4DFF"/>
    <text x="180" y="66" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Щ</text>
  </g>
  
  <!-- Special consonants -->
  <rect x="130" y="225" width="240" height="70" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="250" y="248" font-family="Arial" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">⭐ Особые: Й, Ь, Ъ</text>
  <g transform="translate(155, 258)">
    <circle class="shake" cx="20" cy="15" r="16" fill="#FFB74D"/>
    <text x="20" y="21" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Й</text>
    
    <circle class="shake" style="animation-delay: 0.2s" cx="70" cy="15" r="16" fill="#FFA726"/>
    <text x="70" y="21" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Ь</text>
    
    <circle class="shake" style="animation-delay: 0.4s" cx="120" cy="15" r="16" fill="#FF9800"/>
    <text x="120" y="21" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Ъ</text>
  </g>
  
  <!-- Tip box -->
  <rect x="20" y="305" width="460" height="40" rx="10" fill="#E8F5E9" stroke="#3CB371" stroke-width="2"/>
  <text x="250" y="325" font-family="Arial" font-size="12" fill="#2E8B57" text-anchor="middle">💡 Согласные нельзя петь — они создают преграду для воздуха!</text>
  <text x="250" y="340" font-family="Arial" font-size="11" fill="#3CB371" text-anchor="middle">Положи руку на горло: звонкие дрожат, глухие — нет</text>
</svg>