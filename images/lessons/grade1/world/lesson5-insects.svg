<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e8f5e9"/>
      <stop offset="100%" style="stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#2e7d32" text-anchor="middle" font-weight="bold">Насекомые</text>
  
  <!-- Butterfly -->
  <g transform="translate(100, 100)">
    <ellipse cx="-15" cy="0" rx="15" ry="10" fill="#e91e63" transform="rotate(-30)"/>
    <ellipse cx="15" cy="0" rx="15" ry="10" fill="#f48fb1" transform="rotate(30)"/>
    <ellipse cx="-15" cy="15" rx="10" ry="7" fill="#e91e63" transform="rotate(-30)"/>
    <ellipse cx="15" cy="15" rx="10" ry="7" fill="#f48fb1" transform="rotate(30)"/>
    <ellipse cx="0" cy="8" rx="2" ry="12" fill="#4a148c"/>
    <line x1="-3" y1="-5" x2="-8" y2="-15" stroke="#4a148c" stroke-width="1"/>
    <line x1="3" y1="-5" x2="8" y2="-15" stroke="#4a148c" stroke-width="1"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Бабочка</text>
  </g>
  
  <!-- Bee -->
  <g transform="translate(200, 100)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ffeb3b"/>
    <rect x="-15" y="-3" width="30" height="3" fill="#000"/>
    <rect x="-15" y="4" width="30" height="3" fill="#000"/>
    <circle cx="-20" cy="-3" r="8" fill="#ffeb3b"/>
    <circle cx="-24" cy="-5" r="2" fill="#000"/>
    <ellipse cx="-5" cy="-12" rx="8" ry="5" fill="#fff" opacity="0.7"/>
    <ellipse cx="5" cy="-12" rx="8" ry="5" fill="#fff" opacity="0.7"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Пчела</text>
  </g>
  
  <!-- Ant -->
  <g transform="translate(300, 100)">
    <ellipse cx="-10" cy="0" rx="6" ry="5" fill="#795548"/>
    <ellipse cx="0" cy="0" rx="8" ry="6" fill="#795548"/>
    <ellipse cx="12" cy="0" rx="5" ry="4" fill="#795548"/>
    <circle cx="16" cy="-3" r="3" fill="#795548"/>
    <line x1="-5" y1="-6" x2="-10" y2="-15" stroke="#795548" stroke-width="1.5"/>
    <line x1="5" y1="-6" x2="10" y2="-15" stroke="#795548" stroke-width="1.5"/>
    <line x1="-5" y1="6" x2="-10" y2="15" stroke="#795548" stroke-width="1.5"/>
    <line x1="5" y1="6" x2="10" y2="15" stroke="#795548" stroke-width="1.5"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Муравей</text>
  </g>
  
  <!-- Dragonfly -->
  <g transform="translate(100, 200)">
    <ellipse cx="0" cy="0" rx="20" ry="5" fill="#00bcd4"/>
    <ellipse cx="-25" cy="0" rx="15" ry="4" fill="#00bcd4" opacity="0.7"/>
    <ellipse cx="25" cy="0" rx="15" ry="4" fill="#00bcd4" opacity="0.7"/>
    <circle cx="-35" cy="0" r="5" fill="#0097a7"/>
    <circle cx="-38" cy="-2" r="2" fill="#000"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Стрекоза</text>
  </g>
  
  <!-- Ladybug -->
  <g transform="translate(200, 200)">
    <ellipse cx="0" cy="0" rx="15" ry="12" fill="#f44336"/>
    <circle cx="-5" cy="-4" r="3" fill="#000"/>
    <circle cx="5" cy="-4" r="3" fill="#000"/>
    <circle cx="-8" cy="5" r="2" fill="#000"/>
    <circle cx="8" cy="5" r="2" fill="#000"/>
    <circle cx="0" cy="0" r="2" fill="#000"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#000" stroke-width="1"/>
    <circle cx="-20" cy="-5" r="4" fill="#000"/>
    <circle cx="-22" cy="-7" r="1.5" fill="#fff"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Божья коровка</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(280, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">6 ног</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">3 части тела</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#2e7d32">усики</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#1b5e20" text-anchor="middle" font-weight="bold">Мир насекомых</text>
</svg>