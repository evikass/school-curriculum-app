<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="40" font-family="Arial Black, sans-serif" font-size="24" fill="#2e7d32" text-anchor="middle" font-weight="bold">Окружающий мир</text>
  
  <!-- Nature elements -->
  <!-- Sun -->
  <circle cx="80" cy="80" r="25" fill="#ffeb3b">
    <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#ffeb3b" stroke-width="3">
    <line x1="80" y1="45" x2="80" y2="35"/>
    <line x1="80" y1="115" x2="80" y2="125"/>
    <line x1="45" y1="80" x2="35" y2="80"/>
    <line x1="115" y1="80" x2="125" y2="80"/>
    <line x1="55" y1="55" x2="48" y2="48"/>
    <line x1="105" y1="55" x2="112" y2="48"/>
    <line x1="55" y1="105" x2="48" y2="112"/>
    <line x1="105" y1="105" x2="112" y2="112"/>
  </g>
  
  <!-- Tree -->
  <g transform="translate(200, 100)">
    <rect x="-8" y="30" width="16" height="40" fill="#795548"/>
    <polygon points="0,-40 -30,10 30,10" fill="#4caf50"/>
    <polygon points="0,-25 -25,15 25,15" fill="#66bb6a"/>
    <polygon points="0,-10 -20,20 20,20" fill="#81c784"/>
  </g>
  
  <!-- House -->
  <g transform="translate(320, 100)">
    <rect x="-25" y="-10" width="50" height="40" fill="#ffccbc"/>
    <polygon points="-30,-10 0,-35 30,-10" fill="#f44336"/>
    <rect x="-10" y="5" width="20" height="25" fill="#795548"/>
    <rect x="-20" y="-5" width="12" height="12" fill="#81d4fa"/>
    <rect x="8" y="-5" width="12" height="12" fill="#81d4fa"/>
  </g>
  
  <!-- Cloud -->
  <g transform="translate(150, 60)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#fff"/>
    <ellipse cx="-20" cy="5" rx="18" ry="12" fill="#fff"/>
    <ellipse cx="20" cy="5" rx="18" ry="12" fill="#fff"/>
  </g>
  
  <!-- Categories -->
  <g transform="translate(50, 220)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#c62828">Природа:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">деревья, цветы, животные</text>
  </g>
  <g transform="translate(200, 220)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#1565c0">Создано людьми:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">дома, машины, книги</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#1b5e20" text-anchor="middle" font-weight="bold">Что нас окружает?</text>
</svg>