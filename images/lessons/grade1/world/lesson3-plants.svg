<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#f1f8e9"/>
      <stop offset="100%" style="stop-color:#dcedc8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#558b2f" text-anchor="middle" font-weight="bold">Растения</text>
  
  <!-- Tree -->
  <g transform="translate(80, 130)">
    <rect x="-6" y="20" width="12" height="35" fill="#795548"/>
    <ellipse cx="0" cy="0" rx="30" ry="25" fill="#4caf50"/>
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Дерево</text>
  </g>
  
  <!-- Shrub -->
  <g transform="translate(200, 140)">
    <rect x="-4" y="15" width="8" height="25" fill="#795548"/>
    <ellipse cx="-15" cy="0" rx="15" ry="12" fill="#66bb6a"/>
    <ellipse cx="15" cy="0" rx="15" ry="12" fill="#66bb6a"/>
    <ellipse cx="0" cy="-10" rx="12" ry="10" fill="#81c784"/>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Кустарник</text>
  </g>
  
  <!-- Flower/Herb -->
  <g transform="translate(320, 150)">
    <line x1="0" y1="5" x2="0" y2="35" stroke="#4caf50" stroke-width="3"/>
    <ellipse cx="-10" cy="25" rx="8" ry="4" fill="#81c784"/>
    <circle cx="0" cy="0" r="8" fill="#e91e63"/>
    <circle cx="-7" cy="-4" r="6" fill="#f48fb1"/>
    <circle cx="7" cy="-4" r="6" fill="#f48fb1"/>
    <circle cx="0" cy="-8" r="6" fill="#f48fb1"/>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Трава</text>
  </g>
  
  <!-- Parts of plant -->
  <g transform="translate(50, 230)">
    <text x="0" y="0" font-family="Arial Black, sans-serif" font-size="12" fill="#33691e">Части растения:</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#333">корень • стебель • листья • цветок • плод</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#33691e" text-anchor="middle" font-weight="bold">Разнообразие растений</text>
</svg>