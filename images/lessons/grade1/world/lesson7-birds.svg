<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyBird" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#B3E5FC"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#skyBird)"/>
  
  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="50" cy="40" rx="30" ry="20">
      <animate attributeName="cx" values="50;60;50" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="80" cy="45" rx="25" ry="18">
      <animate attributeName="cx" values="80;90;80" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="320" cy="60" rx="35" ry="22">
      <animate attributeName="cx" values="320;310;320" dur="10s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Tree -->
  <g transform="translate(60, 150)">
    <rect x="-15" y="50" width="30" height="100" fill="#795548"/>
    <ellipse cx="0" cy="30" rx="60" ry="50" fill="url(#treeGrad)"/>
    <ellipse cx="-30" cy="50" rx="35" ry="30" fill="#388E3C"/>
    <ellipse cx="30" cy="55" rx="30" ry="25" fill="#388E3C"/>
  </g>
  
  <!-- Bird 1 - Flying Sparrow -->
  <g id="sparrow" transform="translate(180, 80)">
    <animateTransform attributeName="transform" type="translate" values="180,80;190,75;180,80" dur="1s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="20" ry="12" fill="#8D6E63"/>
    
    <!-- Head -->
    <circle cx="18" cy="-3" r="10" fill="#A1887F"/>
    
    <!-- Eye -->
    <circle cx="22" cy="-5" r="3" fill="#212121"/>
    <circle cx="23" cy="-6" r="1" fill="white"/>
    
    <!-- Beak -->
    <polygon points="28,-3 35,-1 28,1" fill="#FF8F00"/>
    
    <!-- Wings -->
    <path d="M-5,-5 Q-25,-25 -15,-15 Q-10,-10 -5,-5" fill="#6D4C41">
      <animateTransform attributeName="transform" type="rotate" values="-10 -5 -5;10 -5 -5;-10 -5 -5" dur="0.3s" repeatCount="indefinite"/>
    </path>
    
    <!-- Tail -->
    <polygon points="-20,0 -35,5 -35,-5" fill="#5D4037"/>
    
    <!-- Legs -->
    <line x1="0" y1="10" x2="0" y2="18" stroke="#FF8F00" stroke-width="2"/>
    <line x1="8" y1="10" x2="8" y2="18" stroke="#FF8F00" stroke-width="2"/>
  </g>
  
  <!-- Bird 2 - Sitting Bird -->
  <g id="sitting-bird" transform="translate(100, 150)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#F44336"/>
    
    <!-- Head -->
    <circle cx="12" cy="-5" r="8" fill="#E53935"/>
    
    <!-- Eye -->
    <circle cx="15" cy="-6" r="2.5" fill="#212121"/>
    <circle cx="16" cy="-7" r="0.8" fill="white"/>
    
    <!-- Beak -->
    <polygon points="20,-5 26,-4 20,-3" fill="#FFB300"/>
    
    <!-- Wing -->
    <ellipse cx="-2" cy="0" rx="10" ry="6" fill="#C62828"/>
    
    <!-- Tail -->
    <polygon points="-15,0 -28,3 -28,-3" fill="#B71C1C"/>
    
    <!-- Legs -->
    <line x1="-3" y1="8" x2="-3" y2="15" stroke="#FFB300" stroke-width="1.5"/>
    <line x1="5" y1="8" x2="5" y2="15" stroke="#FFB300" stroke-width="1.5"/>
  </g>
  
  <!-- Bird 3 - Duck -->
  <g id="duck" transform="translate(300, 180)">
    <animateTransform attributeName="transform" type="translate" values="300,180;305,178;300,180" dur="2s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#FFF9C4"/>
    
    <!-- Neck -->
    <ellipse cx="20" cy="-15" rx="8" ry="18" fill="#FFF9C4"/>
    
    <!-- Head -->
    <circle cx="22" cy="-30" r="12" fill="#FFF9C4"/>
    
    <!-- Eye -->
    <circle cx="26" cy="-32" r="3" fill="#212121"/>
    <circle cx="27" cy="-33" r="1" fill="white"/>
    
    <!-- Beak -->
    <ellipse cx="35" cy="-28" rx="10" ry="4" fill="#FF9800"/>
    
    <!-- Wing -->
    <ellipse cx="-5" cy="-2" rx="18" ry="10" fill="#F0E68C"/>
    
    <!-- Tail feathers -->
    <polygon points="-30,-5 -42,0 -30,5" fill="#E0E0A0"/>
    
    <!-- Legs -->
    <line x1="-10" y1="15" x2="-10" y2="25" stroke="#FF9800" stroke-width="2"/>
    <line x1="10" y1="15" x2="10" y2="25" stroke="#FF9800" stroke-width="2"/>
    
    <!-- Water reflection -->
    <ellipse cx="0" cy="28" rx="25" ry="5" fill="#64B5F6" opacity="0.4">
      <animate attributeName="rx" values="25;28;25" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Bird parts labels -->
  <style>
    .bird-label { font-family: 'Comic Sans MS', cursive; font-size: 11px; font-weight: bold; }
  </style>
  
  <!-- Labels with arrows -->
  <g>
    <text x="240" y="60" class="bird-label" fill="#795548">КРЫЛЬЯ</text>
    <line x1="235" y1="62" x2="210" y2="75" stroke="#795548" stroke-width="1" stroke-dasharray="3,2"/>
    
    <text x="320" y="120" class="bird-label" fill="#FF8F00">КЛЮВ</text>
    <line x1="310" y1="122" x2="295" y2="130" stroke="#FF8F00" stroke-width="1" stroke-dasharray="3,2"/>
    
    <text x="50" y="230" class="bird-label" fill="#E53935">ПЕРЬЯ</text>
    <line x1="75" y1="228" x2="95" y2="200" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
    
    <text x="250" y="250" class="bird-label" fill="#FF9800">ЛАПЫ</text>
    <line x1="260" y1="248" x2="290" y2="220" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- Nest on tree -->
  <g transform="translate(100, 165)">
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#795548"/>
    <ellipse cx="0" cy="-2" rx="12" ry="5" fill="#5D4037"/>
    <!-- Eggs in nest -->
    <ellipse cx="-4" cy="-4" rx="5" ry="7" fill="#FFF8E1"/>
    <ellipse cx="4" cy="-4" rx="5" ry="7" fill="#FFF8E1"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="290" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Птицы
  </text>
</svg>