<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#f57f17" text-anchor="middle" font-weight="bold">Птицы</text>
  
  <!-- Bird parts -->
  <g transform="translate(200, 130)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="40" ry="25" fill="#ffeb3b"/>
    <!-- Head -->
    <circle cx="-45" cy="-10" r="18" fill="#ffeb3b"/>
    <!-- Beak -->
    <polygon points="-63,-10 -75,-5 -63,0" fill="#ff9800"/>
    <!-- Eye -->
    <circle cx="-50" cy="-12" r="5" fill="#fff"/>
    <circle cx="-50" cy="-12" r="2" fill="#000"/>
    <!-- Wing -->
    <ellipse cx="5" cy="0" rx="25" ry="15" fill="#fdd835"/>
    <!-- Tail -->
    <polygon points="40,0 70,-10 70,10" fill="#fdd835"/>
    <!-- Legs -->
    <line x1="-10" y1="25" x2="-10" y2="50" stroke="#ff9800" stroke-width="3"/>
    <line x1="10" y1="25" x2="10" y2="50" stroke="#ff9800" stroke-width="3"/>
    <line x1="-15" y1="50" x2="-5" y2="50" stroke="#ff9800" stroke-width="2"/>
    <line x1="5" y1="50" x2="15" y2="50" stroke="#ff9800" stroke-width="2"/>
    
    <!-- Labels -->
    <text x="-65" y="-35" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Голова</text>
    <text x="0" y="-40" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Тело</text>
    <text x="55" y="-15" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Хвост</text>
    <text x="-85" y="-5" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Клюв</text>
    <text x="30" y="-20" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Крыло</text>
  </g>
  
  <!-- Different birds -->
  <g transform="translate(60, 230)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#795548"/>
    <circle cx="-10" cy="-5" r="6" fill="#795548"/>
    <polygon points="-16,-5 -22,-3 -16,-2" fill="#ff9800"/>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Воробей</text>
  </g>
  
  <g transform="translate(150, 230)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#000"/>
    <circle cx="-12" cy="-5" r="7" fill="#000"/>
    <polygon points="-19,-5 -28,-3 -19,-2" fill="#ff9800"/>
    <circle cx="-14" cy="-7" r="2" fill="#fff"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Ворон</text>
  </g>
  
  <g transform="translate(250, 230)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#2196f3"/>
    <circle cx="-10" cy="-5" r="5" fill="#2196f3"/>
    <polygon points="-15,-5 -20,-3 -15,-2" fill="#ff9800"/>
    <ellipse cx="0" cy="-10" rx="6" ry="3" fill="#f44336"/>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Синица</text>
  </g>
  
  <g transform="translate(340, 230)">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#e91e63"/>
    <circle cx="-8" cy="-3" r="4" fill="#e91e63"/>
    <polygon points="-12,-3 -16,-2 -12,0" fill="#ff9800"/>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Снегирь</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#e65100" text-anchor="middle" font-weight="bold">Разнообразие птиц</text>
</svg>