<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes flow {
      0% { transform: translateX(0); }
      100% { transform: translateX(10px); }
    }
    @keyframes glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .living { animation: breathe 2s ease-in-out infinite; }
    .water { animation: flow 2s linear infinite; }
    .sun { animation: glow 2s ease-in-out infinite; }
  </style>
  <!-- Background -->
  <rect width="400" height="400" fill="#f0fdf4" rx="20"/>
  <!-- Title -->
  <text x="200" y="35" font-size="16" fill="#166534" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ЖИВАЯ И НЕЖИВАЯ ПРИРОДА</text>
  <!-- Living nature section -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="170" height="160" fill="#dcfce7" rx="10"/>
    <text x="85" y="25" font-size="12" fill="#166534" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">🌿 ЖИВАЯ ПРИРОДА</text>
    <!-- Tree -->
    <g class="living" transform="translate(20, 40)">
      <rect x="12" y="50" width="8" height="30" fill="#78350f"/>
      <ellipse cx="16" cy="35" rx="20" ry="25" fill="#22c55e"/>
    </g>
    <!-- Bird -->
    <g class="living" style="animation-delay: 0.5s" transform="translate(70, 45)">
      <ellipse cx="20" cy="20" rx="15" ry="10" fill="#f97316"/>
      <circle cx="28" cy="15" r="8" fill="#f97316"/>
      <polygon points="36,15 44,13 36,17" fill="#f59e0b"/>
      <circle cx="30" cy="13" r="2" fill="#1e293b"/>
    </g>
    <!-- Flower -->
    <g class="living" style="animation-delay: 1s" transform="translate(120, 60)">
      <rect x="10" y="40" width="3" height="30" fill="#22c55e"/>
      <circle cx="12" cy="32" r="12" fill="#ec4899"/>
      <circle cx="12" cy="32" r="5" fill="#fef3c7"/>
    </g>
    <!-- Cat -->
    <g class="living" style="animation-delay: 1.5s" transform="translate(50, 90)">
      <ellipse cx="25" cy="35" rx="18" ry="12" fill="#fb923c"/>
      <circle cx="25" cy="20" r="12" fill="#fb923c"/>
      <polygon points="15,10 12,0 20,12" fill="#fb923c"/>
      <polygon points="35,10 38,0 30,12" fill="#fb923c"/>
      <circle cx="20" cy="18" r="2" fill="#1e293b"/>
      <circle cx="30" cy="18" r="2" fill="#1e293b"/>
      <ellipse cx="25" cy="24" rx="2" ry="1.5" fill="#f472b6"/>
    </g>
    <!-- Signs -->
    <text x="85" y="145" font-size="8" fill="#166534" text-anchor="middle" font-family="Arial, sans-serif">Дышит • Растёт • Размножается</text>
  </g>
  <!-- Non-living nature section -->
  <g transform="translate(210, 60)">
    <rect x="0" y="0" width="170" height="160" fill="#e0f2fe" rx="10"/>
    <text x="85" y="25" font-size="12" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">🪨 НЕЖИВАЯ ПРИРОДА</text>
    <!-- Sun -->
    <g class="sun" transform="translate(130, 40)">
      <circle cx="20" cy="20" r="18" fill="#fbbf24"/>
      <g stroke="#fbbf24" stroke-width="2">
        <line x1="20" y1="0" x2="20" y2="-5"/>
        <line x1="35" y1="5" x2="40" y2="0"/>
        <line x1="40" y1="20" x2="45" y2="20"/>
        <line x1="35" y1="35" x2="40" y2="40"/>
        <line x1="5" y1="5" x2="0" y2="0"/>
        <line x1="0" y1="20" x2="-5" y2="20"/>
        <line x1="5" y1="35" x2="0" y2="40"/>
      </g>
    </g>
    <!-- Rock -->
    <g transform="translate(20, 70)">
      <polygon points="20,50 0,70 50,70 40,50 30,40" fill="#6b7280"/>
      <polygon points="20,50 10,60 35,60 30,45" fill="#9ca3af"/>
    </g>
    <!-- Water -->
    <g transform="translate(70, 80)">
      <ellipse cx="30" cy="40" rx="30" ry="15" fill="#0ea5e9"/>
      <path class="water" d="M 10 35 Q 20 30 30 35 Q 40 40 50 35" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    </g>
    <!-- Cloud -->
    <g transform="translate(100, 100)">
      <ellipse cx="20" cy="20" rx="15" ry="10" fill="#e2e8f0"/>
      <ellipse cx="30" cy="15" rx="12" ry="8" fill="#e2e8f0"/>
      <ellipse cx="35" cy="22" rx="10" ry="8" fill="#e2e8f0"/>
    </g>
    <!-- Signs -->
    <text x="85" y="145" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Не дышит • Не растёт • Не размножается</text>
  </g>
  <!-- Comparison table -->
  <g transform="translate(20, 240)">
    <rect x="0" y="0" width="360" height="140" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="10"/>
    <text x="180" y="25" font-size="12" fill="#475569" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ПРИЗНАКИ ЖИВОЙ ПРИРОДЫ:</text>
    <!-- Icons and text -->
    <g transform="translate(30, 45)">
      <!-- Breathe -->
      <circle cx="25" cy="20" r="20" fill="#dcfce7"/>
      <text x="25" y="25" font-size="20" text-anchor="middle">💨</text>
      <text x="55" y="25" font-size="11" fill="#166534" font-family="Arial, sans-serif">ДЫШИТ</text>
    </g>
    <g transform="translate(130, 45)">
      <!-- Grow -->
      <circle cx="25" cy="20" r="20" fill="#dcfce7"/>
      <text x="25" y="25" font-size="20" text-anchor="middle">🌱</text>
      <text x="55" y="25" font-size="11" fill="#166534" font-family="Arial, sans-serif">РАСТЁТ</text>
    </g>
    <g transform="translate(230, 45)">
      <!-- Reproduce -->
      <circle cx="25" cy="20" r="20" fill="#dcfce7"/>
      <text x="25" y="25" font-size="20" text-anchor="middle">👶</text>
      <text x="55" y="25" font-size="11" fill="#166534" font-family="Arial, sans-serif">РАЗМНОЖАЕТСЯ</text>
    </g>
    <g transform="translate(30, 90)">
      <!-- Eat -->
      <circle cx="25" cy="20" r="20" fill="#fef3c7"/>
      <text x="25" y="25" font-size="20" text-anchor="middle">🍽️</text>
      <text x="55" y="25" font-size="11" fill="#92400e" font-family="Arial, sans-serif">ПИТАЕТСЯ</text>
    </g>
    <g transform="translate(130, 90)">
      <!-- Die -->
      <circle cx="25" cy="20" r="20" fill="#fef3c7"/>
      <text x="25" y="25" font-size="20" text-anchor="middle">♻️</text>
      <text x="55" y="25" font-size="11" fill="#92400e" font-family="Arial, sans-serif">УМИРАЕТ</text>
    </g>
    <g transform="translate(230, 90)">
      <!-- React -->
      <circle cx="25" cy="20" r="20" fill="#fef3c7"/>
      <text x="25" y="25" font-size="20" text-anchor="middle">⚡</text>
      <text x="55" y="25" font-size="11" fill="#92400e" font-family="Arial, sans-serif">РЕАГИРУЕТ</text>
    </g>
  </g>
  <!-- Important note -->
  <text x="200" y="395" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Человек — часть живой природы! 👤</text>
</svg>