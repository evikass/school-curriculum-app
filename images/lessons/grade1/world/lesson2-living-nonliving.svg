<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#e3f2fd"/>
      <stop offset="100%" style="stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="22" fill="#1565c0" text-anchor="middle" font-weight="bold">Живая и неживая природа</text>
  
  <!-- Living nature -->
  <g transform="translate(100, 100)">
    <rect x="-70" y="-30" width="140" height="130" fill="#e8f5e9" stroke="#4caf50" stroke-width="3" rx="10"/>
    <text x="0" y="-10" font-family="Arial Black, sans-serif" font-size="14" fill="#2e7d32" text-anchor="middle">Живая</text>
    
    <!-- Cat -->
    <ellipse cx="-30" cy="30" rx="20" ry="12" fill="#ff9800"/>
    <circle cx="-40" cy="22" r="10" fill="#ff9800"/>
    <polygon points="-48,15 -42,8 -40,17" fill="#ff9800"/>
    <polygon points="-32,15 -38,8 -40,17" fill="#ff9800"/>
    <circle cx="-43" cy="20" r="2" fill="#000"/>
    <circle cx="-37" cy="20" r="2" fill="#000"/>
    
    <!-- Flower -->
    <g transform="translate(30, 30)">
      <line x1="0" y1="0" x2="0" y2="30" stroke="#4caf50" stroke-width="3"/>
      <circle cx="0" cy="0" r="8" fill="#e91e63"/>
      <circle cx="-8" cy="0" r="6" fill="#f48fb1"/>
      <circle cx="8" cy="0" r="6" fill="#f48fb1"/>
      <circle cx="0" cy="-8" r="6" fill="#f48fb1"/>
      <circle cx="0" cy="8" r="6" fill="#f48fb1"/>
    </g>
    
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">дышит, растёт,</text>
    <text x="0" y="97" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">питается, размножается</text>
  </g>
  
  <!-- Non-living nature -->
  <g transform="translate(300, 100)">
    <rect x="-70" y="-30" width="140" height="130" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="10"/>
    <text x="0" y="-10" font-family="Arial Black, sans-serif" font-size="14" fill="#e65100" text-anchor="middle">Неживая</text>
    
    <!-- Stone -->
    <ellipse cx="-30" cy="35" rx="18" ry="12" fill="#9e9e9e"/>
    <ellipse cx="-35" cy="32" rx="5" ry="3" fill="#bdbdbd"/>
    
    <!-- Sun -->
    <circle cx="30" cy="30" r="15" fill="#ffeb3b"/>
    <g stroke="#ffeb3b" stroke-width="2">
      <line x1="30" y1="10" x2="30" y2="5"/>
      <line x1="30" y1="50" x2="30" y2="55"/>
      <line x1="10" y1="30" x2="5" y2="30"/>
      <line x1="50" y1="30" x2="55" y2="30"/>
    </g>
    
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">не дышит,</text>
    <text x="0" y="97" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">не растёт</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" text-anchor="middle" font-weight="bold">Живая и неживая природа</text>
</svg>