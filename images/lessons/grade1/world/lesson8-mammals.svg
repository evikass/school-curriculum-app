<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#f3e5f5"/>
      <stop offset="100%" style="stop-color="#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#7b1fa2" text-anchor="middle" font-weight="bold">Звери (млекопитающие)</text>
  
  <!-- Main bear -->
  <g transform="translate(200, 130)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="45" ry="30" fill="#795548"/>
    <!-- Head -->
    <circle cx="-50" cy="-10" r="25" fill="#795548"/>
    <!-- Ears -->
    <circle cx="-65" cy="-30" r="8" fill="#795548"/>
    <circle cx="-35" cy="-30" r="8" fill="#795548"/>
    <!-- Snout -->
    <ellipse cx="-60" cy="-5" rx="10" ry="8" fill="#a1887f"/>
    <!-- Nose -->
    <ellipse cx="-65" cy="-5" rx="5" ry="4" fill="#4e342e"/>
    <!-- Eyes -->
    <circle cx="-55" cy="-18" r="4" fill="#000"/>
    <circle cx="-40" cy="-18" r="4" fill="#000"/>
    <!-- Legs -->
    <ellipse cx="-25" cy="30" rx="12" ry="8" fill="#795548"/>
    <ellipse cx="25" cy="30" rx="12" ry="8" fill="#795548"/>
    
    <!-- Labels -->
    <text x="-50" y="-60" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Голова</text>
    <text x="0" y="-45" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Тело</text>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Лапы</text>
  </g>
  
  <!-- Different mammals -->
  <g transform="translate(60, 230)">
    <ellipse cx="0" cy="0" rx="18" ry="10" fill="#ff9800"/>
    <circle cx="-15" cy="-8" r="8" fill="#ff9800"/>
    <polygon points="-22,-12 -18,-20 -14,-12" fill="#ff9800"/>
    <polygon points="-10,-12 -14,-20 -6,-12" fill="#ff9800"/>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Лиса</text>
  </g>
  
  <g transform="translate(150, 230)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#808080"/>
    <circle cx="-12" cy="-8" r="7" fill="#808080"/>
    <ellipse cx="-15" cy="-3" rx="5" ry="3" fill="#a0a0a0"/>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Волк</text>
  </g>
  
  <g transform="translate(250, 230)">
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#795548"/>
    <circle cx="-18" cy="-12" r="10" fill="#795548"/>
    <ellipse cx="-22" cy="-8" rx="4" ry="3" fill="#a1887f"/>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Медведь</text>
  </g>
  
  <g transform="translate(340, 230)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#f5f5dc"/>
    <circle cx="-10" cy="-5" r="6" fill="#f5f5dc"/>
    <ellipse cx="-12" cy="-2" rx="3" ry="2" fill="#ffccbc"/>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Заяц</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(320, 70)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#7b1fa2">Признаки зверей:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#333">• Шерсть</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="9" fill="#333">• 4 ноги</text>
    <text x="0" y="41" font-family="Arial, sans-serif" font-size="9" fill="#333">• Кормят молоком</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#6a1b9a" text-anchor="middle" font-weight="bold">Дикие и домашние животные</text>
</svg>