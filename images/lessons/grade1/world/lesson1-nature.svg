<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  
  <!-- Background - sky gradient -->
  <rect width="400" height="400" fill="#7dd3fc" rx="20"/>
  <rect width="400" height="200" fill="#38bdf8" rx="20"/>
  <!-- Ground -->
  <ellipse cx="200" cy="380" rx="190" ry="30" fill="#22c55e"/>
  <rect width="400" height="50" fill="#22c55e" y="350"/>
  <!-- Title -->
  <text x="200" y="35" font-size="18" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ОКРУЖАЮЩИЙ МИР</text>
  <!-- Sun -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0;360" dur="15s" repeatCount="indefinite"/>
    <circle cx="340" cy="60" r="30" fill="#fbbf24">
    <animate attributeName="r" values="30;32;30" dur="3s" repeatCount="indefinite"/>
  </circle>
    <g stroke="#fbbf24" stroke-width="3">
      <line x1="340" y1="20" x2="340" y2="5"/>
      <line x1="370" y1="30" x2="385" y2="20"/>
      <line x1="380" y1="60" x2="395" y2="60"/>
      <line x1="370" y1="90" x2="385" y2="100"/>
      <line x1="310" y1="30" x2="295" y2="20"/>
      <line x1="300" y1="60" x2="285" y2="60"/>
      <line x1="310" y1="90" x2="295" y2="100"/>
    </g>
  </g>
  <!-- Clouds -->
  <g>
    <ellipse cx="80" cy="80" rx="30" ry="20" fill="#f8fafc"/>
    <ellipse cx="100" cy="70" rx="25" ry="18" fill="#f8fafc"/>
    <ellipse cx="60" cy="75" rx="20" ry="15" fill="#f8fafc"/>
  </g>
  <g style="animation-delay: 2s" transform="translate(50, 0)">
    <ellipse cx="200" cy="100" rx="35" ry="22" fill="#f8fafc"/>
    <ellipse cx="225" cy="90" rx="28" ry="18" fill="#f8fafc"/>
    <ellipse cx="175" cy="95" rx="22" ry="16" fill="#f8fafc"/>
  </g>
  <!-- Tree -->
  <g transform="translate(50, 180)">
    <!-- Trunk -->
    <rect x="30" y="100" width="20" height="80" fill="#78350f"/>
    <!-- Crown -->
    <ellipse cx="40" cy="70" rx="50" ry="50" fill="#22c55e"/>
    <ellipse cx="20" cy="50" rx="30" ry="30" fill="#16a34a"/>
    <ellipse cx="60" cy="55" rx="35" ry="35" fill="#15803d"/>
  </g>
  <!-- Flower -->
  <g transform="translate(180, 280)">
    <rect x="20" y="40" width="4" height="40" fill="#22c55e"/>
    <circle cx="22" cy="30" r="15" fill="#ec4899">
    <animate attributeName="r" values="15;17;15" dur="3s" repeatCount="indefinite"/>
  </circle>
    <circle cx="22" cy="30" r="8" fill="#fef3c7"/>
    <ellipse cx="35" y="55" rx="10" ry="5" fill="#22c55e"/>
  </g>
  <!-- Bird -->
  <g style="animation-delay: 1s" transform="translate(280, 150)">
    <ellipse cx="20" cy="20" rx="18" ry="12" fill="#78716c"/>
    <circle cx="30" cy="15" r="10" fill="#78716c"/>
    <polygon points="40,15 50,12 40,18" fill="#f59e0b"/>
    <circle cx="33" cy="13" r="2" fill="#1e293b"/>
    <path d="M 5 25 Q -5 35 10 30" fill="#78716c"/>
    <path d="M 8 28 Q -2 38 13 33" fill="#78716c"/>
  </g>
  <!-- Butterfly -->
  <g style="animation-delay: 0.5s" transform="translate(140, 200)">
    <ellipse cx="15" cy="20" rx="12" ry="8" fill="#f472b6"/>
    <ellipse cx="35" cy="20" rx="12" ry="8" fill="#f472b6"/>
    <ellipse cx="15" cy="30" rx="8" ry="6" fill="#fb7185"/>
    <ellipse cx="35" cy="30" rx="8" ry="6" fill="#fb7185"/>
    <ellipse cx="25" cy="25" rx="3" ry="10" fill="#1e293b"/>
  </g>
  <!-- River -->
  <g transform="translate(240, 300)">
    <path d="M 0 40 Q 40 30 80 40 Q 120 50 160 40" fill="#0ea5e9" stroke="#38bdf8" stroke-width="2"/>
    <path d="M 20 35 Q 60 25 100 35" fill="none" stroke="#7dd3fc" stroke-width="2"/>
  </g>
  <!-- Mountain -->
  <g transform="translate(280, 180)">
    <polygon points="50,0 0,120 100,120" fill="#6b7280"/>
    <polygon points="50,0 30,30 50,20 70,30" fill="#f8fafc"/>
  </g>
  <!-- Labels -->
  <g font-size="9" fill="#fef3c7" font-family="Arial, sans-serif">
    <text x="90" y="60" text-anchor="middle">Облако</text>
    <text x="40" y="360" text-anchor="middle">Дерево</text>
    <text x="200" y="340" text-anchor="middle">Цветок</text>
    <text x="320" y="290" text-anchor="middle">Гора</text>
  </g>
  <!-- Living and non-living legend -->
  <g transform="translate(20, 380)">
    <rect x="0" y="0" width="360" height="18" fill="#1e293b" opacity="0.5" rx="5"/>
    <circle cx="20" cy="9" r="5" fill="#22c55e"/>
    <text x="30" y="13" font-size="9" fill="#fef3c7" font-family="Arial, sans-serif">Живая природа</text>
    <circle cx="150" cy="9" r="5" fill="#6b7280"/>
    <text x="160" y="13" font-size="9" fill="#fef3c7" font-family="Arial, sans-serif">Неживая природа</text>
    <circle cx="290" cy="9" r="5" fill="#fbbf24"/>
    <text x="300" y="13" font-size="9" fill="#fef3c7" font-family="Arial, sans-serif">Солнце</text>
  </g>
</svg>