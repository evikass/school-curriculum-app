<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#fce4ec"/>
      <stop offset="100%" style="stop-color="#f8bbd9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#c2185b" text-anchor="middle" font-weight="bold">Животные</text>
  
  <!-- Categories -->
  <!-- Insects -->
  <g transform="translate(80, 100)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#ff9800" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#ffb74d" transform="rotate(20)"/>
    <ellipse cx="0" cy="12" rx="8" ry="5" fill="#ff9800" transform="rotate(-20)"/>
    <ellipse cx="0" cy="12" rx="8" ry="5" fill="#ffb74d" transform="rotate(20)"/>
    <ellipse cx="0" cy="6" rx="2" ry="8" fill="#e65100"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Насекомые</text>
  </g>
  
  <!-- Fish -->
  <g transform="translate(200, 100)">
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="#2196f3"/>
    <polygon points="20,0 30,-8 30,8" fill="#2196f3"/>
    <circle cx="-12" cy="-2" r="3" fill="#000"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Рыбы</text>
  </g>
  
  <!-- Birds -->
  <g transform="translate(320, 100)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#ffeb3b"/>
    <circle cx="-12" cy="-3" r="7" fill="#ffeb3b"/>
    <polygon points="-22,-3 -28,-1 -22,0" fill="#ff9800"/>
    <circle cx="-14" cy="-4" r="2" fill="#000"/>
    <polygon points="10,0 20,-5 15,5" fill="#fff59d"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Птицы</text>
  </g>
  
  <!-- Mammals -->
  <g transform="translate(80, 200)">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#795548"/>
    <circle cx="-15" cy="-8" r="8" fill="#795548"/>
    <circle cx="-18" cy="-10" r="3" fill="#a1887f"/>
    <circle cx="-20" cy="-6" r="2" fill="#000"/>
    <ellipse cx="15" cy="0" rx="5" ry="3" fill="#795548"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Звери</text>
  </g>
  
  <!-- Reptiles -->
  <g transform="translate(200, 200)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="#4caf50"/>
    <ellipse cx="-18" cy="0" rx="8" ry="5" fill="#4caf50"/>
    <ellipse cx="18" cy="0" rx="8" ry="5" fill="#4caf50"/>
    <circle cx="-25" cy="-2" r="5" fill="#4caf50"/>
    <circle cx="-28" cy="-4" r="1" fill="#000"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Пресмыкающиеся</text>
  </g>
  
  <!-- Amphibians -->
  <g transform="translate(320, 200)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#8bc34a"/>
    <circle cx="-12" cy="-8" r="6" fill="#8bc34a"/>
    <circle cx="12" cy="-8" r="6" fill="#8bc34a"/>
    <circle cx="-14" cy="-10" r="2" fill="#000"/>
    <circle cx="10" cy="-10" r="2" fill="#000"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Земноводные</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#880e4f" text-anchor="middle" font-weight="bold">Группы животных</text>
</svg>