<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="200" y="35" font-family="Arial Black, sans-serif" font-size="24" fill="#1565c0" text-anchor="middle" font-weight="bold">Рыбы</text>
  
  <!-- Fish parts labels -->
  <!-- Main fish -->
  <g transform="translate(200, 140)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="#ff9800"/>
    <!-- Tail -->
    <polygon points="60,0 90,-20 90,20" fill="#ff9800"/>
    <!-- Dorsal fin -->
    <polygon points="-10,-30 10,-30 0,-45" fill="#ffb74d"/>
    <!-- Pectoral fin -->
    <polygon points="-20,20 0,30 -10,35" fill="#ffb74d"/>
    <!-- Eye -->
    <circle cx="-35" cy="-5" r="8" fill="#fff"/>
    <circle cx="-35" cy="-5" r="4" fill="#000"/>
    <!-- Mouth -->
    <ellipse cx="-55" cy="5" rx="5" ry="3" fill="#e65100"/>
    <!-- Scales pattern -->
    <path d="M-30,0 Q-25,5 -20,0 Q-15,5 -10,0 Q-5,5 0,0 Q5,5 10,0 Q15,5 20,0 Q25,5 30,0" stroke="#e65100" stroke-width="1" fill="none"/>
    
    <!-- Labels -->
    <text x="-55" y="-50" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Голова</text>
    <line x1="-45" y1="-45" x2="-45" y2="-30" stroke="#c62828" stroke-width="1"/>
    
    <text x="0" y="-60" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Тело</text>
    <line x1="0" y1="-55" x2="0" y2="-35" stroke="#c62828" stroke-width="1"/>
    
    <text x="75" y="-30" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Хвост</text>
    <line x1="70" y1="-25" x2="80" y2="-10" stroke="#c62828" stroke-width="1"/>
    
    <text x="0" y="-45" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Спинной плавник</text>
    
    <text x="-35" y="-25" font-family="Arial, sans-serif" font-size="10" fill="#c62828">Глаз</text>
  </g>
  
  <!-- Small fish examples -->
  <g transform="translate(80, 230)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="#f44336"/>
    <polygon points="15,0 22,-6 22,6" fill="#f44336"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Карась</text>
  </g>
  
  <g transform="translate(180, 230)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="#9c27b0"/>
    <polygon points="15,0 22,-6 22,6" fill="#9c27b0"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Окунь</text>
  </g>
  
  <g transform="translate(280, 230)">
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="#4caf50"/>
    <polygon points="18,0 25,-5 25,5" fill="#4caf50"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">Щука</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" text-anchor="middle" font-weight="bold">Строение рыбы</text>
</svg>