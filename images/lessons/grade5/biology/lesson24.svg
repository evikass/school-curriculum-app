<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Побег и почки</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 24</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Shoot structure -->
<text x="130" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение побега</text>

<g transform="translate(20,72)">
<!-- Main stem -->
<rect x="100" y="10" width="10" height="180" fill="#66BB6A" rx="3"/>

<!-- Terminal bud (верхушечная почка) -->
<ellipse cx="105" cy="8" rx="8" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<path d="M97,4 Q105,-2 113,4" fill="#6D4C41" stroke="#5D4037" stroke-width="0.5"/>
<path d="M98,8 Q105,2 112,8" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>

<!-- Nodes (узлы) -->
<line x1="95" y1="45" x2="115" y2="45" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,2"/>
<line x1="95" y1="95" x2="115" y2="95" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,2"/>
<line x1="95" y1="145" x2="115" y2="145" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,2"/>

<!-- Internodes (междоузлия) -->
<text x="120" y="72" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">междоузлие</text>
<line x1="110" y1="70" x2="118" y2="70" stroke="#2E7D32" stroke-width="0.3"/>

<!-- Leaves at nodes -->
<path d="M110,45 Q140,35 150,40 Q140,50 110,52" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="110" y1="48" x2="148" y2="40" stroke="#2E7D32" stroke-width="0.5"/>

<path d="M100,95 Q70,85 60,90 Q70,100 100,102" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="100" y1="98" x2="62" y2="90" stroke="#2E7D32" stroke-width="0.5"/>

<path d="M110,145 Q140,135 150,140 Q140,150 110,152" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="110" y1="148" x2="148" y2="140" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Axillary/lateral buds (пазушные почки) -->
<ellipse cx="112" cy="42" rx="4" ry="5" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>
<ellipse cx="93" cy="92" rx="4" ry="5" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>
<ellipse cx="112" cy="142" rx="4" ry="5" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>

<!-- Labels with leader lines -->
<text x="30" y="10" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">верхушечная</text>
<text x="30" y="17" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">почка</text>
<line x1="97" y1="8" x2="58" y2="10" stroke="#5D4037" stroke-width="0.3"/>

<text x="155" y="42" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">пазушная</text>
<text x="155" y="49" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">почка</text>
<line x1="116" y1="42" x2="153" y2="43" stroke="#5D4037" stroke-width="0.3"/>

<text x="45" y="92" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">узел</text>
<line x1="95" y1="95" x2="60" y2="93" stroke="#2E7D32" stroke-width="0.3"/>

<text x="155" y="145" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">пазушная почка</text>
<line x1="116" y1="142" x2="153" y2="144" stroke="#5D4037" stroke-width="0.3"/>

<text x="120" y="47" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">лист</text>
<text x="55" y="87" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">лист</text>
<text x="120" y="148" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">лист</text>
<text x="120" y="97" font-family="Arial,sans-serif" font-size="5" fill="#666">листовый рубец</text>

<text x="120" y="22" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">стебель</text>
</g>

<!-- Section 2: Bud types -->
<text x="370" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы почек</text>

<!-- Vegetative bud (вегетативная) -->
<g transform="translate(270,75)">
<rect x="0" y="0" width="105" height="90" rx="5" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.7"/>
<text x="52" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Вегетативная</text>

<!-- Bud cross-section -->
<ellipse cx="52" cy="50" rx="18" ry="25" fill="#8D6E63" stroke="#5D4037" stroke-width="1.2"/>
<!-- Scales (чешуйки) -->
<path d="M34,35 Q52,28 70,35" fill="#6D4C41" stroke="#5D4037" stroke-width="0.5"/>
<path d="M36,42 Q52,36 68,42" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<path d="M38,50 Q52,44 66,50" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<!-- Leaf primordia inside -->
<path d="M48,45 Q44,38 42,35" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
<path d="M56,45 Q60,38 62,35" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
<path d="M46,52 Q42,48 38,45" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<path d="M58,52 Q62,48 66,45" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Apical meristem -->
<circle cx="52" cy="42" r="3" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.5"/>

<text x="52" y="82" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">листовые зачатки,</text>
<text x="52" y="88" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">конус нарастания</text>
</g>

<!-- Generative/flower bud (генеративная) -->
<g transform="translate(385,75)">
<rect x="0" y="0" width="105" height="90" rx="5" fill="white" fill-opacity="0.4" stroke="#E91E63" stroke-width="0.7"/>
<text x="52" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#880E4F" text-anchor="middle">Генеративная</text>

<!-- Bud cross-section (rounder) -->
<ellipse cx="52" cy="48" rx="20" ry="25" fill="#A1887F" stroke="#5D4037" stroke-width="1.2"/>
<path d="M32,33 Q52,26 72,33" fill="#6D4C41" stroke="#5D4037" stroke-width="0.5"/>
<path d="M34,40 Q52,34 70,40" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<!-- Flower primordia inside -->
<ellipse cx="45" cy="45" rx="5" ry="7" fill="#F48FB1" stroke="#E91E63" stroke-width="0.5"/>
<ellipse cx="59" cy="45" rx="5" ry="7" fill="#F48FB1" stroke="#E91E63" stroke-width="0.5"/>
<circle cx="52" cy="50" r="3" fill="#FFEB3B" stroke="#FFC107" stroke-width="0.5"/>
<!-- Tiny stamen/pistil primordia -->
<line x1="50" y1="42" x2="48" y2="38" stroke="#FFD54F" stroke-width="0.5"/>
<line x1="54" y1="42" x2="56" y2="38" stroke="#FFD54F" stroke-width="0.5"/>

<text x="52" y="82" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">зачатки цветка,</text>
<text x="52" y="88" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">тычинки, пестик</text>
</g>

<!-- Section 3: Bud placement diagram -->
<text x="250" y="180" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Расположение почек на побеге</text>

<g transform="translate(30,188)">
<!-- Stem -->
<rect x="115" y="0" width="8" height="130" fill="#66BB6A" rx="2"/>

<!-- Terminal bud -->
<ellipse cx="119" cy="0" rx="6" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<text x="140" y="2" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">верхушечная</text>
<text x="140" y="9" font-family="Arial,sans-serif" font-size="5" fill="#888">(на верхушке стебля)</text>
<line x1="125" y1="0" x2="138" y2="0" stroke="#5D4037" stroke-width="0.3"/>

<!-- Axillary buds at nodes -->
<ellipse cx="128" cy="30" rx="5" ry="6" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>
<line x1="123" y1="30" x2="140" y2="28" stroke="#5D4037" stroke-width="0.3"/>
<text x="143" y="28" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">пазушные</text>
<text x="143" y="35" font-family="Arial,sans-serif" font-size="5" fill="#888">(в пазухе листа)</text>

<ellipse cx="110" cy="60" rx="5" ry="6" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>
<ellipse cx="128" cy="90" rx="5" ry="6" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>
<ellipse cx="110" cy="120" rx="5" ry="6" fill="#A1887F" stroke="#5D4037" stroke-width="0.7"/>

<!-- Leaves at nodes -->
<path d="M123,30 Q148,22 155,28 Q145,35 123,35" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5" opacity="0.6"/>
<path d="M115,60 Q90,52 82,58 Q92,65 115,65" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5" opacity="0.6"/>
<path d="M123,90 Q148,82 155,88 Q145,95 123,95" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5" opacity="0.6"/>
<path d="M115,120 Q90,112 82,118 Q92,125 115,125" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5" opacity="0.6"/>

<!-- Adventitious buds -->
<ellipse cx="119" cy="130" rx="5" ry="6" fill="#FFCC80" stroke="#E65100" stroke-width="0.7"/>
<text x="140" y="128" font-family="Arial,sans-serif" font-size="6" fill="#E65100">придаточные</text>
<text x="140" y="135" font-family="Arial,sans-serif" font-size="5" fill="#888">(на междоузлиях, корнях)</text>
<line x1="124" y1="130" x2="138" y2="128" stroke="#E65100" stroke-width="0.3"/>

<!-- Node labels -->
<text x="90" y="33" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">узел</text>
<line x1="115" y1="30" x2="95" y2="32" stroke="#2E7D32" stroke-width="0.3"/>
</g>

<!-- Section 4: Branching types -->
<text x="370" y="180" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы ветвления</text>

<!-- Monopodial -->
<g transform="translate(290,188)">
<rect x="0" y="0" width="90" height="70" rx="4" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="45" y="12" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Моноподиальное</text>
<!-- Main trunk -->
<line x1="45" y1="65" x2="45" y2="18" stroke="#5D4037" stroke-width="2"/>
<!-- Branches -->
<line x1="45" y1="25" x2="25" y2="18" stroke="#4CAF50" stroke-width="1.2"/>
<line x1="45" y1="25" x2="65" y2="18" stroke="#4CAF50" stroke-width="1.2"/>
<line x1="45" y1="40" x2="22" y2="35" stroke="#4CAF50" stroke-width="1.2"/>
<line x1="45" y1="40" x2="68" y2="35" stroke="#4CAF50" stroke-width="1.2"/>
<line x1="45" y1="55" x2="20" y2="50" stroke="#4CAF50" stroke-width="1.2"/>
<line x1="45" y1="55" x2="70" y2="50" stroke="#4CAF50" stroke-width="1.2"/>
<text x="45" y="68" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">главная ось растёт</text>
</g>

<!-- Sympodial -->
<g transform="translate(390,188)">
<rect x="0" y="0" width="90" height="70" rx="4" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="45" y="12" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Симподиальное</text>
<!-- Main stem then branches take over -->
<line x1="20" y1="65" x2="20" y2="35" stroke="#5D4037" stroke-width="2"/>
<line x1="20" y1="35" x2="50" y2="22" stroke="#4CAF50" stroke-width="1.8"/>
<line x1="50" y1="22" x2="75" y2="18" stroke="#66BB6A" stroke-width="1.5"/>
<!-- Opposite side branches -->
<line x1="20" y1="45" x2="45" y2="40" stroke="#81C784" stroke-width="1.2"/>
<line x1="50" y1="30" x2="70" y2="28" stroke="#81C784" stroke-width="1"/>
<line x1="20" y1="55" x2="38" y2="52" stroke="#81C784" stroke-width="1"/>
<text x="45" y="68" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">боковая ветвь</text>
<text x="45" y="75" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">заменяет главную</text>
</g>

<!-- Key facts -->
<g transform="translate(20,330)">
<text x="230" y="5" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Почка — зачаточный побег. Верхушечная почка обеспечивает рост побега в длину, пазушные — ветвление</text>
</g>
</svg>