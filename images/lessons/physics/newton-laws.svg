<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">Законы Ньютона</text>
  
  <!-- First Law -->
  <rect x="10" y="40" width="125" height="115" fill="#fee2e2" rx="8"/>
  <text x="72" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">I закон</text>
  <text x="72" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f1d1d">(Инерция)</text>
  
  <!-- Ball for first law -->
  <circle cx="45" cy="110" r="12" fill="#ef4444"/>
  <!-- Motion arrow -->
  <line x1="57" y1="110" x2="105" y2="110" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="105,110 98,106 98,114" fill="#3b82f6"/>
  <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3b82f6">v = const</text>
  
  <!-- No forces text -->
  <text x="72" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">Нет сил = нет</text>
  <text x="72" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">изменения скорости</text>
  
  <!-- Second Law -->
  <rect x="140" y="40" width="125" height="115" fill="#dbeafe" rx="8"/>
  <text x="202" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">II закон</text>
  
  <!-- Formula -->
  <text x="202" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1d4ed8">F = m · a</text>
  
  <!-- Box -->
  <rect x="175" y="95" width="35" height="35" fill="#3b82f6" rx="3"/>
  <text x="192" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">m</text>
  
  <!-- Force arrow -->
  <line x1="210" y1="112" x2="250" y2="112" stroke="#dc2626" stroke-width="3"/>
  <polygon points="250,112 240,107 240,117" fill="#dc2626"/>
  <text x="230" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">F</text>
  
  <!-- Acceleration arrow -->
  <line x1="210" y1="135" x2="245" y2="135" stroke="#22c55e" stroke-width="2"/>
  <polygon points="245,135 238,131 238,139" fill="#22c55e"/>
  <text x="227" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">a</text>
  
  <!-- Third Law -->
  <rect x="270" y="40" width="120" height="115" fill="#dcfce7" rx="8"/>
  <text x="330" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">III закон</text>
  
  <!-- Two objects -->
  <rect x="285" y="95" width="30" height="30" fill="#22c55e" rx="3"/>
  <text x="300" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">1</text>
  
  <rect x="345" y="95" width="30" height="30" fill="#22c55e" rx="3"/>
  <text x="360" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">2</text>
  
  <!-- Action-reaction arrows -->
  <line x1="315" y1="105" x2="345" y2="105" stroke="#dc2626" stroke-width="2"/>
  <polygon points="345,105 338,101 338,109" fill="#dc2626"/>
  <text x="330" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#dc2626">F₁</text>
  
  <line x1="345" y1="120" x2="315" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="315,120 322,116 322,124" fill="#3b82f6"/>
  <text x="330" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3b82f6">F₂</text>
  
  <!-- Formula -->
  <text x="330" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">F₁ = -F₂</text>
  
  <!-- Bottom summary -->
  <rect x="10" y="165" width="380" height="125" fill="#f1f5f9" rx="8"/>
  
  <text x="200" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Формулировки:</text>
  
  <text x="20" y="210" font-family="Arial, sans-serif" font-size="10" fill="#475569">I: Тело сохраняет скорость, если на него не действуют</text>
  <text x="20" y="223" font-family="Arial, sans-serif" font-size="10" fill="#475569">    другие тела или действие сил скомпенсировано.</text>
  
  <text x="20" y="245" font-family="Arial, sans-serif" font-size="10" fill="#475569">II: Ускорение прямо пропорционально силе и обратно</text>
  <text x="20" y="258" font-family="Arial, sans-serif" font-size="10" fill="#475569">    пропорционально массе: a = F/m</text>
  
  <text x="20" y="280" font-family="Arial, sans-serif" font-size="10" fill="#475569">III: Действие равно противодействию (силы равны</text>
  <text x="20" y="293" font-family="Arial, sans-serif" font-size="10" fill="#475569">    по модулю, противоположны по направлению)</text>
</svg>