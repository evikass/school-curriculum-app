<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#EF5350" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#EF5350" stroke-width="1" opacity="0.3"/>
  <!-- Corner decorations -->
  <polygon points="10,10 30,10 10,30" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#C62828" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#C62828" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#EF5350" text-anchor="middle">ССП: соединительные союзы</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Русский язык &#8212; Урок 2</text>
  <line x1="30" y1="70" x2="470" y2="70" stroke="#EF5350" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="67" width="60" height="5" fill="#EF5350" opacity="0.18" rx="1"/>
  <rect x="410" y="67" width="60" height="5" fill="#C62828" opacity="0.12" rx="1"/>

  <!-- Illustration area -->
  <rect x="15" y="76" width="470" height="222" rx="6" fill="#FFEBEE" opacity="0.4"/>

  <!-- Main definition -->
  <rect x="22" y="82" width="456" height="40" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="1"/>
  <text x="250" y="100" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#EF5350" text-anchor="middle">Сложносочинённое предложение с соединительными союзами</text>
  <text x="250" y="115" font-family="Arial,sans-serif" font-size="9.5" fill="#333" text-anchor="middle">Выражают одновременность, последовательность или причинно-следственную связь</text>

  <!-- Conjunctions display -->
  <rect x="22" y="128" width="456" height="65" rx="5" fill="white" opacity="0.92" stroke="#7B1FA2" stroke-width="1"/>
  <text x="250" y="146" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Соединительные союзы</text>
  <line x1="32" y1="152" x2="468" y2="152" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>

  <!-- Individual conjunction boxes -->
  <rect x="32" y="158" width="70" height="28" rx="4" fill="#7B1FA2" opacity="0.12"/>
  <text x="67" y="176" font-family="Arial,sans-serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-weight="bold">И</text>

  <rect x="112" y="158" width="70" height="28" rx="4" fill="#7B1FA2" opacity="0.12"/>
  <text x="147" y="176" font-family="Arial,sans-serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-weight="bold">ДА</text>

  <rect x="192" y="158" width="90" height="28" rx="4" fill="#7B1FA2" opacity="0.12"/>
  <text x="237" y="176" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">НИ...НИ</text>

  <rect x="292" y="158" width="85" height="28" rx="4" fill="#7B1FA2" opacity="0.12"/>
  <text x="334" y="176" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">ТОЖЕ</text>

  <rect x="387" y="158" width="85" height="28" rx="4" fill="#7B1FA2" opacity="0.12"/>
  <text x="430" y="176" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">ТАКЖЕ</text>

  <!-- Examples with meanings -->
  <rect x="22" y="200" width="220" height="95" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="0.8"/>
  <text x="132" y="218" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#EF5350" text-anchor="middle">Одновременность:</text>
  <text x="32" y="236" font-family="Arial,sans-serif" font-size="9.5" fill="#333">Солнце садилось, И ветер</text>
  <text x="32" y="250" font-family="Arial,sans-serif" font-size="9.5" fill="#333">стихал.</text>
  <line x1="32" y1="258" x2="232" y2="258" stroke="#eee" stroke-width="0.5"/>
  <text x="132" y="272" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Последовательность:</text>
  <text x="32" y="288" font-family="Arial,sans-serif" font-size="9.5" fill="#333">Гром грянул, И пошёл дождь.</text>

  <rect x="258" y="200" width="220" height="95" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="0.8"/>
  <text x="368" y="218" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">Причинно-следственная:</text>
  <text x="268" y="236" font-family="Arial,sans-serif" font-size="9.5" fill="#333">Дверь скрипнула, И он</text>
  <text x="268" y="250" font-family="Arial,sans-serif" font-size="9.5" fill="#333">обернулся.</text>
  <line x1="268" y1="258" x2="468" y2="258" stroke="#eee" stroke-width="0.5"/>
  <text x="368" y="272" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Повтор &#171;ни...ни&#187;:</text>
  <text x="268" y="288" font-family="Arial,sans-serif" font-size="9.5" fill="#333">НИ снег, НИ дождь не страшны.</text>

  <!-- Key rule -->
  <rect x="22" y="286" width="456" height="14" rx="3" fill="#EF5350" opacity="0.08"/>
  <text x="250" y="297" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Запятая ставится перед союзом И между частями ССП! Не путать с однородными членами.</text>

  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык &#8212; 9 класс</text>
</svg>