<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <rect width="500" height="44" fill="url(#hdr)" rx="8"/>
  <rect y="36" width="500" height="8" fill="url(#hdr)"/>
  <text x="250" y="18" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold" font-family="Arial">Урок 5. А.С. Грибоедов «Горе от ума»</text>
  <text x="250" y="34" text-anchor="middle" font-size="9" fill="#E1BEE7" font-family="Arial">Комедия в стихах, 1824 г. — конфликт «века нынешнего» и «минувшего»</text>
  <!-- Author -->
  <rect x="10" y="52" width="160" height="40" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="90" y="66" text-anchor="middle" font-size="8.5" fill="#7B1FA2" font-weight="bold" font-family="Arial">Александр Сергеевич Грибоедов</text>
  <text x="90" y="78" font-size="7.5" fill="#757575" font-family="Arial">1795-1829 • Дипломат, композитор</text>
  <text x="90" y="88" font-size="7.5" fill="#757575" font-family="Arial">Убит в Тегеране толпой фанатиков</text>
  <!-- Conflict diagram -->
  <rect x="180" y="52" width="310" height="40" rx="5" fill="#E1BEE7" opacity="0.5"/>
  <text x="335" y="66" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="bold" font-family="Arial">Главный конфликт</text>
  <text x="188" y="79" font-size="8" fill="#212121" font-family="Arial">Век нынешний (Чацкий) ↔ Век минувший (Фамусовское общество)</text>
  <text x="188" y="89" font-size="7.5" fill="#757575" font-family="Arial">Свобода мысли ↔ Служба, чинопочитание, богатство</text>
  <!-- Chatsky column -->
  <rect x="10" y="98" width="235" height="92" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1.2"/>
  <rect x="10" y="98" width="235" height="16" rx="5" fill="#7B1FA2"/>
  <rect x="10" y="106" width="235" height="8" fill="#7B1FA2"/>
  <text x="127" y="111" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="bold" font-family="Arial">Чацкий — «век нынешний»</text>
  <text x="18" y="126" font-size="7.5" fill="#212121" font-family="Arial">• Осуждает крепостное право</text>
  <text x="18" y="137" font-size="7.5" fill="#212121" font-family="Arial">• Против чинопочитания и невежества</text>
  <text x="18" y="148" font-size="7.5" fill="#212121" font-family="Arial">• Служит делу, а не лицам</text>
  <text x="18" y="159" font-size="7.5" fill="#212121" font-family="Arial">• Верит в силу разума и просвещения</text>
  <text x="18" y="170" font-size="7.5" fill="#212121" font-family="Arial">• Любит Софью искренне</text>
  <text x="18" y="183" font-size="7.5" fill="#7B1FA2" font-family="Arial">«Служить бы рад, прислуживаться тошно»</text>
  <!-- Famusov column -->
  <rect x="255" y="98" width="235" height="92" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1.2"/>
  <rect x="255" y="98" width="235" height="16" rx="5" fill="#7B1FA2"/>
  <rect x="255" y="106" width="235" height="8" fill="#7B1FA2"/>
  <text x="372" y="111" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="bold" font-family="Arial">Фамусов — «век минувший»</text>
  <text x="263" y="126" font-size="7.5" fill="#212121" font-family="Arial">• Крепостник, защищает старые порядки</text>
  <text x="263" y="137" font-size="7.5" fill="#212121" font-family="Arial">• Чинопочитание: «Ну как не порадеть...»</text>
  <text x="263" y="148" font-size="7.5" fill="#212121" font-family="Arial">• Боится просвещения и свободомыслия</text>
  <text x="263" y="159" font-size="7.5" fill="#212121" font-family="Arial">• Выгодно выдать Софью замуж</text>
  <text x="263" y="170" font-size="7.5" fill="#212121" font-family="Arial">• Сплетни и интриги — его оружие</text>
  <text x="263" y="183" font-size="7.5" fill="#7B1FA2" font-family="Arial">«Ученье — вот чума, учёность — вот причина»</text>
  <!-- Famusov society -->
  <rect x="10" y="196" width="235" height="68" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="127" y="210" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="bold" font-family="Arial">Фамусовское общество</text>
  <line x1="20" y1="213" x2="235" y2="213" stroke="#E1BEE7" stroke-width="1"/>
  <text x="18" y="224" font-size="7.5" fill="#212121" font-family="Arial">Молчалин — карьерист, лицемер</text>
  <text x="18" y="236" font-size="7.5" fill="#757575" font-family="Arial">  «В мои лета не должно сметь своё суждение»</text>
  <text x="18" y="248" font-size="7.5" fill="#212121" font-family="Arial">Скалозуб — полковник-карьерист</text>
  <text x="18" y="260" font-size="7.5" fill="#212121" font-family="Arial">Репетилов — пустой болтун</text>
  <!-- Features -->
  <rect x="255" y="196" width="235" height="68" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="372" y="210" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="bold" font-family="Arial">Особенности комедии</text>
  <line x1="265" y1="213" x2="480" y2="213" stroke="#E1BEE7" stroke-width="1"/>
  <text x="263" y="224" font-size="7.5" fill="#212121" font-family="Arial">• Вольный ямб (разностопный ямб)</text>
  <text x="263" y="236" font-size="7.5" fill="#212121" font-family="Arial">• Слом классицизма: 2 сюжета</text>
  <text x="263" y="248" font-size="7.5" fill="#212121" font-family="Arial">• Афористичность: «Счастливые часов</text>
  <text x="263" y="260" font-size="7.5" fill="#212121" font-family="Arial">  не наблюдают» • Открытый финал</text>
  <!-- Who is right? -->
  <rect x="10" y="270" width="480" height="62" rx="5" fill="#7B1FA2" opacity="0.08"/>
  <text x="250" y="284" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="bold" font-family="Arial">Проблема: кто прав — Чацкий или Фамусов?</text>
  <line x1="20" y1="288" x2="480" y2="288" stroke="#E1BEE7" stroke-width="1"/>
  <text x="18" y="300" font-size="8" fill="#212121" font-family="Arial">Гончаров: «Чацкий сломлен количеством старой силы... но он победит»</text>
  <text x="18" y="312" font-size="8" fill="#212121" font-family="Arial">Чацкий — «лишний человек», его идеи опережают время</text>
  <text x="18" y="324" font-size="8" fill="#757575" font-family="Arial">Конфликт нового и старого — вечная проблема русской литературы</text>
  <rect y="338" width="500" height="12" fill="#7B1FA2" rx="0"/>
  <rect y="338" width="500" height="12" fill="url(#hdr)" rx="0"/>
  <text x="250" y="348" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="Arial">Литература 9 класс</text>
  <line x1="10" y1="296" x2="10" y2="296" stroke="#E1BEE7" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="300" x2="106" y2="300" stroke="#E1BEE7" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="304" x2="202" y2="304" stroke="#E1BEE7" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="308" x2="298" y2="308" stroke="#E1BEE7" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="312" x2="394" y2="312" stroke="#E1BEE7" stroke-width="0.5" opacity="0.3"/>
</svg>