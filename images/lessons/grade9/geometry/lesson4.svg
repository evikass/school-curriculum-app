<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <marker id="ah4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="ah4o" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57F17"/>
    </marker>
    <marker id="ah4r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Умножение вектора на число</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 4</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>

  <!-- Scaling panel -->
  <rect x="15" y="58" width="300" height="128" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1"/>
  <text x="165" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Масштабирование вектора</text>
  <!-- Original vector a -->
  <line x1="35" y1="115" x2="95" y2="95" stroke="#E65100" stroke-width="2.5" marker-end="url(#ah4)"/>
  <text x="55" y="88" font-size="10" fill="#E65100" font-family="Arial" font-style="italic">a</text>
  <!-- 2a -->
  <line x1="35" y1="140" x2="155" y2="100" stroke="#F57F17" stroke-width="2.5" marker-end="url(#ah4o)"/>
  <text x="90" y="108" font-size="10" fill="#F57F17" font-family="Arial">2a</text>
  <!-- -a -->
  <line x1="95" y1="165" x2="35" y2="145" stroke="#C62828" stroke-width="2.5" marker-end="url(#ah4r)"/>
  <text x="55" y="165" font-size="10" fill="#C62828" font-family="Arial">-a</text>
  <!-- 0.5a -->
  <line x1="35" y1="170" x2="65" y2="160" stroke="#00897B" stroke-width="2.5" marker-end="url(#ah4)"/>
  <text x="40" y="180" font-size="10" fill="#00897B" font-family="Arial">0.5a</text>
  <!-- Labels panel -->
  <rect x="180" y="85" width="125" height="90" rx="4" fill="#FFF3E0" stroke="#F57F17" stroke-width="0.8"/>
  <text x="242" y="100" font-size="8.5" fill="#E65100" text-anchor="middle" font-family="Arial">k &gt; 1: растяжение</text>
  <text x="242" y="115" font-size="8.5" fill="#F57F17" text-anchor="middle" font-family="Arial">0 &lt; k &lt; 1: сжатие</text>
  <text x="242" y="130" font-size="8.5" fill="#C62828" text-anchor="middle" font-family="Arial">k &lt; 0:反向 + масштаб</text>
  <text x="242" y="145" font-size="8.5" fill="#00897B" text-anchor="middle" font-family="Arial">k = 0: нулевой вектор</text>
  <text x="242" y="162" font-size="8.5" fill="#555" text-anchor="middle" font-family="Arial">k = 1: исходный вектор</text>

  <!-- Number line panel -->
  <rect x="325" y="58" width="160" height="128" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1"/>
  <text x="405" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Числовая прямая</text>
  <!-- Number line -->
  <line x1="340" y1="115" x2="475" y2="115" stroke="#E65100" stroke-width="1.5" marker-end="url(#ah4)"/>
  <line x1="340" y1="110" x2="340" y2="120" stroke="#E65100" stroke-width="1"/>
  <text x="340" y="128" font-size="7" fill="#E65100" text-anchor="middle" font-family="Arial">0</text>
  <line x1="380" y1="110" x2="380" y2="120" stroke="#F57F17" stroke-width="1"/>
  <text x="380" y="128" font-size="7" fill="#F57F17" text-anchor="middle" font-family="Arial">1</text>
  <line x1="420" y1="110" x2="420" y2="120" stroke="#F57F17" stroke-width="1"/>
  <text x="420" y="128" font-size="7" fill="#F57F17" text-anchor="middle" font-family="Arial">2</text>
  <line x1="460" y1="110" x2="460" y2="120" stroke="#F57F17" stroke-width="1"/>
  <text x="460" y="128" font-size="7" fill="#F57F17" text-anchor="middle" font-family="Arial">3</text>
  <!-- Vectors on number line -->
  <line x1="340" y1="100" x2="380" y2="100" stroke="#E65100" stroke-width="2" marker-end="url(#ah4)"/>
  <text x="360" y="96" font-size="8" fill="#E65100" font-family="Arial">a</text>
  <line x1="340" y1="90" x2="420" y2="90" stroke="#F57F17" stroke-width="2" marker-end="url(#ah4o)"/>
  <text x="380" y="86" font-size="8" fill="#F57F17" font-family="Arial">2a</text>
  <line x1="340" y1="140" x2="300" y2="140" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="300,140 308,136 308,144" fill="#C62828"/>
  <text x="310" y="152" font-size="8" fill="#C62828" font-family="Arial">-a</text>
  <line x1="340" y1="85" x2="360" y2="85" stroke="#00897B" stroke-width="2" marker-end="url(#ah4)"/>
  <text x="345" y="80" font-size="8" fill="#00897B" font-family="Arial">0.5a</text>

  <!-- Properties panel -->
  <rect x="15" y="194" width="470" height="118" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1"/>
  <text x="250" y="210" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Свойства умножения вектора на число</text>
  <!-- Property 1 -->
  <rect x="25" y="218" width="215" height="26" rx="4" fill="#FFF3E0" stroke="#F57F17" stroke-width="0.8"/>
  <text x="132" y="235" font-size="9" fill="#E65100" text-anchor="middle" font-family="Arial">k(a + b) = ka + kb</text>
  <text x="132" y="245" font-size="7" fill="#888" text-anchor="middle" font-family="Arial">1-й распределительный закон</text>
  <!-- Property 2 -->
  <rect x="255" y="218" width="220" height="26" rx="4" fill="#FFE0B2" stroke="#F57F17" stroke-width="0.8"/>
  <text x="365" y="235" font-size="9" fill="#BF360C" text-anchor="middle" font-family="Arial">(k + l)a = ka + la</text>
  <text x="365" y="245" font-size="7" fill="#888" text-anchor="middle" font-family="Arial">2-й распределительный закон</text>
  <!-- Property 3 -->
  <rect x="25" y="256" width="215" height="26" rx="4" fill="#FFE0B2" stroke="#F57F17" stroke-width="0.8"/>
  <text x="132" y="273" font-size="9" fill="#BF360C" text-anchor="middle" font-family="Arial">k(la) = (kl)a</text>
  <text x="132" y="283" font-size="7" fill="#888" text-anchor="middle" font-family="Arial">Сочетательный закон</text>
  <!-- Property 4 - collinear -->
  <rect x="255" y="256" width="220" height="26" rx="4" fill="#FFF3E0" stroke="#F57F17" stroke-width="0.8"/>
  <text x="365" y="273" font-size="9" fill="#E65100" text-anchor="middle" font-family="Arial">b = ka — коллинеарные</text>
  <text x="365" y="283" font-size="7" fill="#888" text-anchor="middle" font-family="Arial">Сонаправленные k&gt;0, противоположные k&lt;0</text>
  <!-- Coordinate form -->
  <text x="250" y="302" font-size="8.5" fill="#555" text-anchor="middle" font-family="Arial">ka = {kx; ky} — координатная форма</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#F57F17" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">ka = {kx; ky} | k(a+b)=ka+kb | (k+l)a=ka+la | k(la)=(kl)a</text>
</svg>