<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <marker id="ah2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="ah2g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43A047"/>
    </marker>
    <marker id="ah2r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="Arial">Сложение векторов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 2</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#43A047" stroke-width="1" opacity="0.3"/>

  <!-- Triangle rule panel -->
  <rect x="15" y="58" width="230" height="128" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial">Правило треугольника</text>
  <!-- Vector a -->
  <line x1="40" y1="140" x2="130" y2="100" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="75" y="110" font-size="10" fill="#2E7D32" font-family="Arial" font-style="italic">a</text>
  <!-- Vector b -->
  <line x1="135" y1="100" x2="200" y2="145" stroke="#43A047" stroke-width="2.5" marker-end="url(#ah2g)"/>
  <text x="175" y="112" font-size="10" fill="#43A047" font-family="Arial" font-style="italic">b</text>
  <!-- Result vector a+b -->
  <line x1="40" y1="140" x2="200" y2="145" stroke="#C62828" stroke-width="2.5" marker-end="url(#ah2r)"/>
  <text x="115" y="155" font-size="10" fill="#C62828" font-family="Arial">a + b</text>
  <!-- Points -->
  <circle cx="40" cy="140" r="2.5" fill="#2E7D32"/>
  <circle cx="135" cy="100" r="2.5" fill="#43A047"/>
  <circle cx="205" cy="145" r="2.5" fill="#C62828"/>
  <text x="30" y="152" font-size="8" fill="#333" font-family="Arial">A</text>
  <text x="135" y="93" font-size="8" fill="#333" font-family="Arial">B</text>
  <text x="210" y="148" font-size="8" fill="#333" font-family="Arial">C</text>
  <!-- Step labels -->
  <text x="55" y="170" font-size="7.5" fill="#555" font-family="Arial">1) Отложим a от точки A</text>
  <text x="55" y="180" font-size="7.5" fill="#555" font-family="Arial">2) Отложим b от конца a</text>

  <!-- Parallelogram rule panel -->
  <rect x="255" y="58" width="230" height="128" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="370" y="74" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial">Правило параллелограмма</text>
  <!-- Parallelogram -->
  <line x1="290" y1="140" x2="380" y2="100" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ah2)"/>
  <text x="325" y="110" font-size="10" fill="#2E7D32" font-family="Arial" font-style="italic">a</text>
  <line x1="290" y1="140" x2="350" y2="160" stroke="#43A047" stroke-width="2.5" marker-end="url(#ah2g)"/>
  <text x="305" y="165" font-size="10" fill="#43A047" font-family="Arial" font-style="italic">b</text>
  <!-- Dashed sides -->
  <line x1="380" y1="100" x2="440" y2="120" stroke="#43A047" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah2g)"/>
  <line x1="350" y1="160" x2="440" y2="120" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah2)"/>
  <!-- Diagonal -->
  <line x1="290" y1="140" x2="440" y2="120" stroke="#C62828" stroke-width="2.5" marker-end="url(#ah2r)"/>
  <text x="370" y="142" font-size="10" fill="#C62828" font-family="Arial">a + b</text>
  <circle cx="290" cy="140" r="2.5" fill="#2E7D32"/>
  <text x="280" y="152" font-size="8" fill="#333" font-family="Arial">O</text>
  <text x="55" y="192" font-size="7.5" fill="#555" font-family="Arial">От общей точки откладываем a и b</text>

  <!-- Laws panel -->
  <rect x="15" y="194" width="235" height="118" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="132" y="210" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial">Законы сложения</text>
  <!-- Commutative -->
  <rect x="25" y="218" width="215" height="28" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="0.8"/>
  <text x="132" y="236" font-size="9" fill="#2E7D32" text-anchor="middle" font-family="Arial">Переместительный: a + b = b + a</text>
  <!-- Associative -->
  <rect x="25" y="252" width="215" height="28" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="0.8"/>
  <text x="132" y="270" font-size="9" fill="#2E7D32" text-anchor="middle" font-family="Arial">Сочетательный: (a+b)+c = a+(b+c)</text>
  <!-- Zero vector -->
  <text x="132" y="300" font-size="8.5" fill="#555" text-anchor="middle" font-family="Arial">a + 0 = a (нулевой вектор)</text>

  <!-- Step by step panel -->
  <rect x="260" y="194" width="225" height="118" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="372" y="210" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial">Координатная форма</text>
  <!-- Step 1 -->
  <rect x="270" y="218" width="205" height="24" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="0.8"/>
  <text x="372" y="234" font-size="8.5" fill="#2E7D32" text-anchor="middle" font-family="Arial">a = {x1; y1}, b = {x2; y2}</text>
  <!-- Step 2 -->
  <rect x="270" y="248" width="205" height="24" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="0.8"/>
  <text x="372" y="264" font-size="9" fill="#1B5E20" text-anchor="middle" font-family="Arial" font-weight="bold">a + b = {x1+x2; y1+y2}</text>
  <!-- Example -->
  <text x="372" y="286" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Пример: {2;3} + {1;4} = {3;7}</text>
  <text x="372" y="300" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">|a+b| = √(3²+7²) = √58</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#43A047" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">a + b = {x1+x2; y1+y2} — Правила: треугольника и параллелограмма</text>
</svg>