<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f172a"/>
<defs><marker id="a1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22d3ee"/></marker>
<marker id="a2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f472b6"/></marker>
<marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/></marker></defs>
<text x="100" y="30" fill="#e2e8f0" font-size="20" font-weight="bold" font-family="sans-serif">Вычитание векторов</text>
<text x="20" y="65" fill="#94a3b8" font-size="14" font-family="sans-serif">a&#x20D7; - b&#x20D7; = a&#x20D7; + (-b&#x20D7;)</text>
<circle cx="80" cy="150" r="4" fill="#fbbf24"/>
<text x="65" y="175" fill="#fbbf24" font-size="14" font-family="sans-serif">O</text>
<line x1="80" y1="150" x2="280" y2="100" stroke="#22d3ee" stroke-width="3" marker-end="url(#a1)"/>
<line x1="80" y1="150" x2="200" y2="220" stroke="#f472b6" stroke-width="3" marker-end="url(#a2)"/>
<text x="180" y="90" fill="#22d3ee" font-size="16" font-family="sans-serif">a&#x20D7;</text>
<text x="130" y="230" fill="#f472b6" font-size="16" font-family="sans-serif">b&#x20D7;</text>
<text x="60" y="250" fill="#94a3b8" font-size="13" font-family="sans-serif">Разность: от конца b&#x20D7; к концу a&#x20D7;</text>
<line x1="200" y1="220" x2="280" y2="100" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#a3)"/>
<text x="240" y="175" fill="#a78bfa" font-size="14" font-family="sans-serif">a&#x20D7;-b&#x20D7;</text>
</svg>