<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <marker id="ah5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B1FA2"/>
    </marker>
    <marker id="ah5p" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle" font-family="Arial">Координаты вектора</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 5</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>

  <!-- Coordinate plane panel -->
  <rect x="15" y="58" width="265" height="175" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="147" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Вектор на координатной плоскости</text>
  <!-- Grid -->
  <line x1="55" y1="82" x2="55" y2="225" stroke="#ddd" stroke-width="0.5"/>
  <line x1="95" y1="82" x2="95" y2="225" stroke="#ddd" stroke-width="0.5"/>
  <line x1="135" y1="82" x2="135" y2="225" stroke="#ddd" stroke-width="0.5"/>
  <line x1="175" y1="82" x2="175" y2="225" stroke="#ddd" stroke-width="0.5"/>
  <line x1="215" y1="82" x2="215" y2="225" stroke="#ddd" stroke-width="0.5"/>
  <line x1="35" y1="100" x2="260" y2="100" stroke="#ddd" stroke-width="0.5"/>
  <line x1="35" y1="140" x2="260" y2="140" stroke="#ddd" stroke-width="0.5"/>
  <line x1="35" y1="180" x2="260" y2="180" stroke="#ddd" stroke-width="0.5"/>
  <line x1="35" y1="220" x2="260" y2="220" stroke="#ddd" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="55" y1="180" x2="265" y2="180" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#ah5)"/>
  <line x1="55" y1="225" x2="55" y2="82" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#ah5)"/>
  <text x="268" y="183" font-size="8" fill="#7B1FA2" font-family="Arial">x</text>
  <text x="52" y="79" font-size="8" fill="#7B1FA2" font-family="Arial">y</text>
  <text x="50" y="192" font-size="7" fill="#7B1FA2" font-family="Arial">0</text>
  <!-- Vector 1 -->
  <line x1="55" y1="180" x2="175" y2="100" stroke="#9C27B0" stroke-width="2.5" marker-end="url(#ah5p)"/>
  <text x="100" y="125" font-size="9" fill="#9C27B0" font-family="Arial" font-weight="bold">a</text>
  <!-- Dashed components -->
  <line x1="55" y1="180" x2="175" y2="180" stroke="#9C27B0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="175" y1="180" x2="175" y2="100" stroke="#9C27B0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="175" font-size="8" fill="#C62828" font-family="Arial">3</text>
  <text x="180" y="145" font-size="8" fill="#C62828" font-family="Arial">2</text>
  <!-- Vector 2 -->
  <line x1="55" y1="180" x2="135" y2="220" stroke="#E65100" stroke-width="2" marker-end="url(#ah5p)"/>
  <text x="80" y="215" font-size="9" fill="#E65100" font-family="Arial" font-weight="bold">b</text>
  <line x1="55" y1="180" x2="135" y2="180" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="135" y1="180" x2="135" y2="220" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Coordinate labels -->
  <rect x="145" y="210" width="125" height="30" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="207" y="222" font-size="8" fill="#7B1FA2" text-anchor="middle" font-family="Arial">a = {3; 2}</text>
  <text x="207" y="234" font-size="8" fill="#E65100" text-anchor="middle" font-family="Arial">b = {2; -1}</text>

  <!-- Formulas panel -->
  <rect x="290" y="58" width="195" height="175" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="387" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Формулы координат</text>
  <!-- Unit vectors -->
  <rect x="300" y="82" width="175" height="30" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="387" y="95" font-size="8.5" fill="#7B1FA2" text-anchor="middle" font-family="Arial">i = {1;0}, j = {0;1}</text>
  <text x="387" y="107" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">a = x*i + y*j</text>
  <!-- Coordinate formula -->
  <rect x="300" y="118" width="175" height="30" rx="4" fill="#E1BEE7" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="387" y="131" font-size="8.5" fill="#4A148C" text-anchor="middle" font-family="Arial" font-weight="bold">AB = {x2-x1; y2-y1}</text>
  <text x="387" y="143" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">A(x1,y1), B(x2,y2)</text>
  <!-- Length formula -->
  <rect x="300" y="154" width="175" height="28" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="387" y="167" font-size="8.5" fill="#7B1FA2" text-anchor="middle" font-family="Arial">|a| = √(x² + y²)</text>
  <text x="387" y="178" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">Длина через координаты</text>
  <!-- Equal vectors -->
  <rect x="300" y="190" width="175" height="28" rx="4" fill="#E1BEE7" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="387" y="203" font-size="8.5" fill="#4A148C" text-anchor="middle" font-family="Arial">a = b, если x1=x2, y1=y2</text>
  <text x="387" y="214" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">Равные координаты = равные векторы</text>

  <!-- Equal vectors visual panel -->
  <rect x="15" y="240" width="235" height="72" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="132" y="256" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Равные векторы</text>
  <!-- Three equal vectors at different positions -->
  <line x1="30" y1="285" x2="80" y2="268" stroke="#9C27B0" stroke-width="2" marker-end="url(#ah5p)"/>
  <line x1="100" y1="295" x2="150" y2="278" stroke="#9C27B0" stroke-width="2" marker-end="url(#ah5p)"/>
  <line x1="175" y1="275" x2="225" y2="258" stroke="#9C27B0" stroke-width="2" marker-end="url(#ah5p)"/>
  <text x="132" y="305" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Одинаковые направление и длина = {3;2}</text>

  <!-- Example panel -->
  <rect x="260" y="240" width="225" height="72" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="372" y="256" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Пример</text>
  <text x="372" y="272" font-size="8.5" fill="#333" text-anchor="middle" font-family="Arial">A(1;2), B(4;6)</text>
  <text x="372" y="286" font-size="8.5" fill="#7B1FA2" text-anchor="middle" font-family="Arial" font-weight="bold">AB = {4-1; 6-2} = {3; 4}</text>
  <text x="372" y="300" font-size="8.5" fill="#4A148C" text-anchor="middle" font-family="Arial">|AB| = √(9+16) = √25 = 5</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#9C27B0" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">AB = {x2-x1; y2-y1} | |a| = √(x²+y²) | Равные векторы имеют равные координаты</text>
</svg>