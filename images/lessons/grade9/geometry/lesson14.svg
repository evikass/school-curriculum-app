<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <marker id="ah14" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4E342E"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4E342E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#3E2723" text-anchor="middle" font-family="Arial">Длина окружности и дуги</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 14</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#795548" stroke-width="1" opacity="0.3"/>

  <!-- Circle with circumference panel -->
  <rect x="15" y="58" width="235" height="175" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1"/>
  <text x="132" y="74" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="Arial">Длина окружности</text>
  <!-- Circle -->
  <circle cx="132" cy="155" r="60" fill="none" stroke="#795548" stroke-width="2.5"/>
  <!-- Center -->
  <circle cx="132" cy="155" r="2.5" fill="#4E342E"/>
  <text x="122" y="150" font-size="8" fill="#4E342E" font-family="Arial">O</text>
  <!-- Radius -->
  <line x1="132" y1="155" x2="192" y2="155" stroke="#E65100" stroke-width="1.5"/>
  <text x="162" y="150" font-size="9" fill="#E65100" font-family="Arial" font-weight="bold">R</text>
  <!-- Diameter -->
  <line x1="72" y1="155" x2="192" y2="155" stroke="#1E88E5" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="132" y="168" font-size="8" fill="#1E88E5" font-family="Arial">d = 2R</text>
  <!-- Circumference label -->
  <text x="132" y="230" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">C — длина окружности</text>
  <!-- Formula -->
  <rect x="30" y="198" width="205" height="28" rx="4" fill="#EFEBE9" stroke="#795548" stroke-width="0.8"/>
  <text x="132" y="216" font-size="11" fill="#3E2723" text-anchor="middle" font-family="Arial" font-weight="bold">C = 2πR = πd</text>

  <!-- Arc panel -->
  <rect x="260" y="58" width="225" height="175" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="Arial">Длина дуги</text>
  <!-- Circle with arc -->
  <circle cx="372" cy="155" r="55" fill="none" stroke="#D7CCC8" stroke-width="1"/>
  <!-- Highlighted arc (about 90 degrees) -->
  <path d="M 427 155 A 55 55 0 0 0 372 100" fill="none" stroke="#795548" stroke-width="3"/>
  <!-- Radius lines -->
  <line x1="372" y1="155" x2="427" y2="155" stroke="#E65100" stroke-width="1.5"/>
  <line x1="372" y1="155" x2="372" y2="100" stroke="#E65100" stroke-width="1.5"/>
  <!-- Angle arc -->
  <path d="M 390 155 A 18 18 0 0 0 372 137" fill="none" stroke="#E91E63" stroke-width="1.5"/>
  <text x="392" y="143" font-size="9" fill="#E91E63" font-family="Arial" font-weight="bold">a°</text>
  <!-- Arc label -->
  <text x="415" y="115" font-size="8" fill="#795548" font-family="Arial" font-weight="bold">l</text>
  <!-- Formula -->
  <rect x="270" y="212" width="205" height="22" rx="4" fill="#EFEBE9" stroke="#795548" stroke-width="0.8"/>
  <text x="372" y="227" font-size="10" fill="#3E2723" text-anchor="middle" font-family="Arial" font-weight="bold">l = πR·a° / 180°</text>

  <!-- Radian measure panel -->
  <rect x="15" y="240" width="160" height="72" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1"/>
  <text x="95" y="256" font-size="9" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="Arial">Радианная мера</text>
  <rect x="25" y="262" width="140" height="18" rx="3" fill="#EFEBE9" stroke="#795548" stroke-width="0.5"/>
  <text x="95" y="275" font-size="8.5" fill="#3E2723" text-anchor="middle" font-family="Arial">1 рад = 180°/π ≈ 57.3°</text>
  <text x="95" y="292" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">a(рад) = l/R</text>
  <text x="95" y="304" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">l = R·a(рад)</text>

  <!-- Comparison panel -->
  <rect x="185" y="240" width="145" height="72" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1"/>
  <text x="257" y="256" font-size="9" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="Arial">Сравнение</text>
  <text x="257" y="272" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Полная окружность:</text>
  <text x="257" y="284" font-size="8" fill="#4E342E" text-anchor="middle" font-family="Arial" font-weight="bold">C = 2πR при a = 360°</text>
  <text x="257" y="298" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Полуокружность: πR</text>
  <text x="257" y="308" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">при a = 180°</text>

  <!-- Example panel -->
  <rect x="340" y="240" width="145" height="72" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1"/>
  <text x="412" y="256" font-size="9" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="Arial">Пример</text>
  <text x="412" y="272" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">R=5, a=60°</text>
  <text x="412" y="286" font-size="8" fill="#4E342E" text-anchor="middle" font-family="Arial">l = π·5·60/180</text>
  <text x="412" y="300" font-size="9" fill="#3E2723" text-anchor="middle" font-family="Arial" font-weight="bold">l = 5π/3</text>
  <text x="412" y="310" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">C = 2π·5 = 10π</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#795548" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">C = 2πR | l = πR·a°/180° | l = R·a(рад)</text>
</svg>