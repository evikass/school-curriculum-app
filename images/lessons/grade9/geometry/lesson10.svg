<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f172a"/>
<text x="100" y="30" fill="#e2e8f0" font-size="20" font-weight="bold" font-family="sans-serif">Теорема синусов</text>
<polygon points="80,250 320,250 250,70" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
<circle cx="80" cy="250" r="3" fill="#f472b6"/>
<text x="60" y="270" fill="#f472b6" font-size="14" font-family="sans-serif">A</text>
<circle cx="320" cy="250" r="3" fill="#f472b6"/>
<text x="325" y="270" fill="#f472b6" font-size="14" font-family="sans-serif">B</text>
<circle cx="250" cy="70" r="3" fill="#f472b6"/>
<text x="255" y="65" fill="#f472b6" font-size="14" font-family="sans-serif">C</text>
<text x="185" y="270" fill="#22d3ee" font-size="14" font-family="sans-serif">a</text>
<text x="285" y="155" fill="#22d3ee" font-size="14" font-family="sans-serif">b</text>
<text x="145" y="155" fill="#22d3ee" font-size="14" font-family="sans-serif">c</text>
<text x="80" y="290" fill="#a78bfa" font-size="15" font-family="sans-serif">a/sinA = b/sinB = c/sinC = 2R</text>
</svg>