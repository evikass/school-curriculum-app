<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<rect width="400" height="300" fill="#0f172a"/>
<text x="80" y="30" fill="#e2e8f0" font-size="20" font-weight="bold" font-family="sans-serif">Уравнение окружности</text>
<circle cx="200" cy="160" r="100" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
<circle cx="200" cy="160" r="4" fill="#f472b6"/>
<text x="205" y="175" fill="#f472b6" font-size="13" font-family="sans-serif">A(a;b)</text>
<line x1="200" y1="160" x2="300" y2="160" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4"/>
<text x="240" y="155" fill="#f472b6" font-size="14" font-family="sans-serif">R</text>
<circle cx="300" cy="160" r="3" fill="#22d3ee"/>
<text x="100" y="290" fill="#a78bfa" font-size="15" font-family="sans-serif">(x-a)&#x00B2;+(y-b)&#x00B2;=R&#x00B2;</text>
</svg>