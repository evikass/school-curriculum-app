<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <marker id="ah7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#283593"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Уравнение окружности</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 7</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3F51B5" stroke-width="1" opacity="0.3"/>

  <!-- Circle on coordinate plane panel -->
  <rect x="15" y="58" width="270" height="195" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="150" y="74" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Окружность на координатной плоскости</text>
  <!-- Grid -->
  <line x1="60" y1="82" x2="60" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="100" y1="82" x2="100" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="140" y1="82" x2="140" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="180" y1="82" x2="180" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="220" y1="82" x2="220" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="260" y1="82" x2="260" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="30" y1="105" x2="275" y2="105" stroke="#eee" stroke-width="0.5"/>
  <line x1="30" y1="145" x2="275" y2="145" stroke="#eee" stroke-width="0.5"/>
  <line x1="30" y1="185" x2="275" y2="185" stroke="#eee" stroke-width="0.5"/>
  <line x1="30" y1="225" x2="275" y2="225" stroke="#eee" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="60" y1="165" x2="275" y2="165" stroke="#283593" stroke-width="1.2" marker-end="url(#ah7)"/>
  <line x1="60" y1="245" x2="60" y2="82" stroke="#283593" stroke-width="1.2" marker-end="url(#ah7)"/>
  <text x="278" y="168" font-size="8" fill="#283593" font-family="Arial">x</text>
  <text x="57" y="79" font-size="8" fill="#283593" font-family="Arial">y</text>
  <!-- Circle -->
  <circle cx="160" cy="155" r="60" fill="none" stroke="#3F51B5" stroke-width="2.5"/>
  <!-- Center -->
  <circle cx="160" cy="155" r="3" fill="#283593"/>
  <text x="145" y="150" font-size="8" fill="#283593" font-family="Arial">O(x0,y0)</text>
  <!-- Radius line -->
  <line x1="160" y1="155" x2="220" y2="155" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="190" y="150" font-size="8" fill="#E53935" font-family="Arial">r</text>
  <!-- Point on circle -->
  <circle cx="190" cy="103" r="3" fill="#4CAF50"/>
  <text x="193" y="100" font-size="7" fill="#4CAF50" font-family="Arial">M(x,y)</text>
  <line x1="160" y1="155" x2="190" y2="103" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Point off circle -->
  <circle cx="80" cy="200" r="3" fill="#FF5722"/>
  <text x="60" y="212" font-size="7" fill="#FF5722" font-family="Arial">N(не на окр.)</text>
  <!-- Dashed projections for M -->
  <line x1="190" y1="103" x2="190" y2="165" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="160" y1="155" x2="190" y2="155" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Formulas panel -->
  <rect x="295" y="58" width="190" height="195" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="390" y="74" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Уравнение окружности</text>
  <!-- General equation -->
  <rect x="305" y="82" width="170" height="35" rx="4" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <text x="390" y="95" font-size="8" fill="#888" text-anchor="middle" font-family="Arial">Общий вид:</text>
  <text x="390" y="110" font-size="9.5" fill="#283593" text-anchor="middle" font-family="Arial" font-weight="bold">(x-x0)²+(y-y0)² = r²</text>
  <!-- At origin -->
  <rect x="305" y="123" width="170" height="30" rx="4" fill="#C5CAE9" stroke="#3F51B5" stroke-width="0.8"/>
  <text x="390" y="136" font-size="8" fill="#888" text-anchor="middle" font-family="Arial">Центр в начале координат:</text>
  <text x="390" y="148" font-size="9.5" fill="#1A237E" text-anchor="middle" font-family="Arial" font-weight="bold">x² + y² = r²</text>
  <!-- Conditions -->
  <rect x="305" y="160" width="170" height="50" rx="4" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <text x="390" y="173" font-size="8" fill="#888" text-anchor="middle" font-family="Arial">Для точки M(x,y):</text>
  <text x="390" y="186" font-size="8.5" fill="#4CAF50" text-anchor="middle" font-family="Arial">(x-x0)²+(y-y0)² = r² — на окр.</text>
  <text x="390" y="198" font-size="8.5" fill="#FF5722" text-anchor="middle" font-family="Arial">(x-x0)²+(y-y0)² > r² — вне окр.</text>
  <text x="390" y="210" font-size="8.5" fill="#3F51B5" text-anchor="middle" font-family="Arial">(x-x0)²+(y-y0)² &lt; r² — внутри</text>
  <!-- Example -->
  <text x="390" y="232" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Пример: (x-2)²+(y+3)²=25</text>
  <text x="390" y="244" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Центр (2;-3), r=5</text>

  <!-- Special cases panel -->
  <rect x="15" y="260" width="235" height="52" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="132" y="276" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Частные случаи</text>
  <text x="132" y="290" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">r=0: вырожденная (точка)</text>
  <text x="132" y="302" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">x²+y²=0: только точка (0;0)</text>

  <!-- How to write equation panel -->
  <rect x="260" y="260" width="225" height="52" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="372" y="276" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Как составить уравнение</text>
  <text x="372" y="290" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">1) Найти центр O(x0,y0)</text>
  <text x="372" y="302" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">2) Найти радиус r  3) Подставить в формулу</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#3F51B5" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">(x-x0)² + (y-y0)² = r² — Уравнение окружности с центром O(x0,y0)</text>
</svg>