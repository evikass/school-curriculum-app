<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg31" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh31">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg31)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Решение расчётных задач</text>

  <!-- Key formulas -->
  <rect x="12" y="40" width="376" height="70" rx="6" fill="#0f766e" filter="url(#sh31)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Основные формулы:</text>
  <text x="22" y="72" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">n = m/M</text>
  <text x="140" y="72" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">V = Vm x n</text>
  <text x="265" y="72" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">w = m(в-ва)/m(р-ра)</text>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">n — кол-во вещ-ва (моль)</text>
  <text x="22" y="100" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Vm = 22.4 л/моль (н.у.)</text>
  <text x="200" y="88" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">M — молярная масса (г/моль)</text>
  <text x="200" y="100" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">w — массовая доля (% или доли)</text>

  <!-- Example 1 -->
  <rect x="12" y="118" width="376" height="56" rx="6" fill="#134e4a" filter="url(#sh31)"/>
  <text x="22" y="134" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Пример 1: Сколько молей в 64 г O&#178;?</text>
  <text x="22" y="150" font-family="Arial,sans-serif" font-size="8" fill="white">M(O&#178;) = 32 г/моль</text>
  <text x="180" y="150" font-family="Arial,sans-serif" font-size="8" fill="white">n = m/M = 64/32 =</text>
  <text x="340" y="150" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">2 моль</text>
  <text x="22" y="164" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">V(O&#178;) = 22.4 x 2 = 44.8 л</text>

  <!-- Example 2 -->
  <rect x="12" y="181" width="376" height="56" rx="6" fill="#134e4a" filter="url(#sh31)"/>
  <text x="22" y="197" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Пример 2: w(N) в NH&#8308;NO&#179;?</text>
  <text x="22" y="213" font-family="Arial,sans-serif" font-size="8" fill="white">M(NH&#8308;NO&#179;) = 80 г/моль</text>
  <text x="180" y="213" font-family="Arial,sans-serif" font-size="8" fill="white">m(N) = 14x2 = 28 г</text>
  <text x="22" y="227" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">w(N) = 28/80 = 0.35 =</text>
  <text x="180" y="227" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">35%</text>

  <!-- Steps -->
  <rect x="12" y="244" width="376" height="42" rx="6" fill="#0f766e" filter="url(#sh31)"/>
  <text x="22" y="260" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Алгоритм решения:</text>
  <text x="22" y="274" font-family="Arial,sans-serif" font-size="7" fill="white">1) Записать Дано  2) Найти M  3) Исп. формулу n=m/M  4) Найти V=w  5) Записать ответ</text>
  <text x="345" y="260" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 31</text>

</svg>