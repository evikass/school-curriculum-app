<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Сера и её соединения</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 16</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- S properties -->
  <rect x="14" y="54" width="155" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="91" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">S — Сера</text>
  <text x="91" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Z = 16, Ar = 32</text>
  <text x="91" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Жёлтый хрупкий кристалл</text>
  <text x="91" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Ст. ок.: -2, +2, +4, +6</text>
  <text x="91" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Аллотропия: S8 (ромбич.)</text>
  <!-- Chain S -> SO2 -> SO3 -> H2SO4 -->
  <rect x="178" y="54" width="310" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="333" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Генетический ряд серы</text>
  <text x="194" y="90" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F9A825">S</text>
  <text x="230" y="90" font-family="Arial,sans-serif" font-size="5" fill="#004D40">+O2</text>
  <text x="258" y="90" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#FF7043">SO2</text>
  <text x="298" y="90" font-family="Arial,sans-serif" font-size="5" fill="#004D40">+O2</text>
  <text x="325" y="90" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#EF5350">SO3</text>
  <text x="365" y="90" font-family="Arial,sans-serif" font-size="5" fill="#004D40">+H2O</text>
  <text x="400" y="90" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828">H2SO4</text>
  <text x="194" y="110" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">сера</text>
  <text x="258" y="110" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">оксид IV</text>
  <text x="325" y="110" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">оксид VI</text>
  <text x="400" y="110" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">серная к-та</text>
  <!-- Arrows -->
  <line x1="210" y1="88" x2="240" y2="88" stroke="#00695C" stroke-width="1" marker-end="url(#a1)"/>
  <line x1="278" y1="88" x2="308" y2="88" stroke="#00695C" stroke-width="1" marker-end="url(#a1)"/>
  <line x1="348" y1="88" x2="378" y2="88" stroke="#00695C" stroke-width="1" marker-end="url(#a1)"/>
  <defs><marker id="a1" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#00695C"/></marker></defs>
  <text x="333" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#00897B">H2SO4 + BaCl2 = BaSO4 (белый осадок)</text>
  <!-- H2S -->
  <rect x="14" y="142" width="155" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="91" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">H2S — сероводород</text>
  <text x="91" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Бесцветный, запах тухлых яиц</text>
  <text x="91" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H2S = H+ + HS- (слабая к-та)</text>
  <text x="91" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">2H2S + O2 = 2S + 2H2O</text>
  <text x="91" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Сильный восстановитель</text>
  <text x="91" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Ядовит!</text>
  <!-- SO2 -->
  <rect x="178" y="142" width="155" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="255" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">SO2 — сернистый газ</text>
  <text x="255" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Бесцветный, резкий запах</text>
  <text x="255" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">S + O2 = SO2</text>
  <text x="255" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">SO2 + H2O = H2SO3</text>
  <text x="255" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">2SO2 + O2 = 2SO3 (V2O5 кат.)</text>
  <text x="255" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Кислотный оксид, отбеливатель</text>
  <!-- H2SO4 -->
  <rect x="342" y="142" width="144" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="414" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">H2SO4</text>
  <text x="414" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Концентрированная:</text>
  <text x="356" y="188" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Окислитель (S+6)</text>
  <text x="356" y="200" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Пассивирует Fe, Al, Cr</text>
  <text x="356" y="212" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Обугливание орг. в-в</text>
  <text x="414" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Разбавленная:</text>
  <text x="414" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Обычная кислота (H+)</text>
  <!-- H2SO4 properties -->
  <rect x="14" y="245" width="472" height="90" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Свойства и применение H2SO4</text>
  <text x="129" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Маслянистая жидкость</text>
  <text x="129" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">t кип. = 296 C (нелетучая)</text>
  <text x="129" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Сильный водоотниматель</text>
  <text x="129" y="324" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Аккумуляторы, удобрения, краски</text>
  <text x="371" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Кач. реакция на SO4(2-):</text>
  <text x="371" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Ba2+ + SO4(2-) = BaSO4 (белый)</text>
  <text x="371" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Осторожно: разбавлять кислоту в воду!</text>
  <text x="371" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Не воду в кислоту!</text>
</svg>