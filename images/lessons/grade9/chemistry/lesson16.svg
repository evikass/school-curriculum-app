<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh16">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg16)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Коррозия металлов</text>

  <!-- Definition -->
  <rect x="12" y="40" width="376" height="36" rx="6" fill="#0f766e" filter="url(#sh16)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Коррозия</text>
  <text x="68" y="56" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">- разрушение металлов под воздействием окружающей среды</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="#fca5a5">Fe &#8594; Fe&#8322;O&#8323; (ржавчина) - окислительно-восстановительный процесс</text>

  <!-- Types -->
  <rect x="12" y="84" width="185" height="58" rx="6" fill="#134e4a" filter="url(#sh16)"/>
  <text x="22" y="100" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Химическая коррозия:</text>
  <text x="22" y="114" font-family="Arial,sans-serif" font-size="8" fill="white">Me + газ (O&#8322;, Cl&#8322;, H&#8322;S)</text>
  <text x="22" y="127" font-family="Arial,sans-serif" font-size="8" fill="white">Без участия воды</text>
  <text x="22" y="138" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Пример: окалина на Fe</text>

  <rect x="203" y="84" width="185" height="58" rx="6" fill="#0f766e" filter="url(#sh16)"/>
  <text x="213" y="100" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Электрохимическая коррозия:</text>
  <text x="213" y="114" font-family="Arial,sans-serif" font-size="8" fill="white">Me + раствор электролита</text>
  <text x="213" y="127" font-family="Arial,sans-serif" font-size="8" fill="white">Образуется гальванич. пара</text>
  <text x="213" y="138" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Наиболее распространена!</text>

  <!-- Factors -->
  <rect x="12" y="150" width="185" height="48" rx="6" fill="#0f766e" filter="url(#sh16)"/>
  <text x="22" y="166" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Факторы коррозии:</text>
  <text x="22" y="180" font-family="Arial,sans-serif" font-size="8" fill="white">O&#8322;, H&#8322;O, CO&#8322;, соли, кислоты</text>
  <text x="22" y="192" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Морская вода ускоряет коррозию</text>

  <!-- Rusting mechanism -->
  <rect x="203" y="150" width="185" height="48" rx="6" fill="#134e4a" filter="url(#sh16)"/>
  <text x="213" y="166" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Механизм ржавления:</text>
  <text x="213" y="180" font-family="Arial,sans-serif" font-size="7" fill="#fca5a5">Анод: Fe - 2e&#8315; &#8594; Fe&#178;&#8314;</text>
  <text x="213" y="192" font-family="Arial,sans-serif" font-size="7" fill="#93c5fd">Катод: O&#8322; + 2H&#8322;O + 4e&#8315; &#8594; 4OH&#8315;</text>

  <!-- Protection methods -->
  <rect x="12" y="206" width="376" height="82" rx="6" fill="#0f766e" filter="url(#sh16)"/>
  <text x="22" y="222" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Методы защиты от коррозии:</text>

  <text x="22" y="238" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24">1. Покрытия:</text>
  <text x="90" y="238" font-family="Arial,sans-serif" font-size="8" fill="white">лак, краска, эмаль</text>
  <text x="22" y="251" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24">2. Металл. покрытия:</text>
  <text x="130" y="251" font-family="Arial,sans-serif" font-size="8" fill="white">цинкование (Zn), лужение (Sn), хромирование</text>
  <text x="22" y="264" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24">3. Легирование:</text>
  <text x="100" y="264" font-family="Arial,sans-serif" font-size="8" fill="white">нержавеющая сталь (Fe+Cr+Ni)</text>
  <text x="22" y="277" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24">4. Протекторная защита:</text>
  <text x="140" y="277" font-family="Arial,sans-serif" font-size="8" fill="white">Mg или Zn (более активный Me)</text>
  <text x="22" y="287" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Протектор разрушается вместо основного металла</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 16</text>
</svg>