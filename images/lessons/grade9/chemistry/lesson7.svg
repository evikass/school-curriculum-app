<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow7" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <marker id="arrowY" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#F57F17"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">Урок 7: Электролитическая диссоциация</text>

  <!-- Definition -->
  <rect x="15" y="58" width="470" height="28" rx="6" fill="#66BB6A" opacity="0.2"/>
  <text x="250" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Диссоциация — распад электролита на ионы при растворении или плавлении</text>

  <!-- Theory box -->
  <rect x="15" y="92" width="155" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow7)"/>
  <text x="92" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Теория Аррениуса</text>
  <line x1="25" y1="115" x2="160" y2="115" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="130" font-family="Arial,sans-serif" font-size="8" fill="#333">1. Электролиты распадаются</text>
  <text x="25" y="142" font-family="Arial,sans-serif" font-size="8" fill="#333">2. Ионы движутся хаотически</text>
  <text x="25" y="154" font-family="Arial,sans-serif" font-size="8" fill="#333">3. Под током — направленно</text>
  <text x="25" y="166" font-family="Arial,sans-serif" font-size="8" fill="#333">4. Процесс обратимый</text>
  <text x="25" y="178" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">1887 г.</text>

  <!-- Mechanism visual: NaCl dissociation -->
  <rect x="180" y="92" width="305" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow7)"/>
  <text x="332" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Механизм диссоциации NaCl</text>
  <line x1="190" y1="115" x2="475" y2="115" stroke="#A5D6A7" stroke-width="1"/>
  <!-- NaCl crystal -->
  <rect x="195" y="125" width="55" height="40" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="222" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">NaCl</text>
  <text x="222" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">кристалл</text>
  <!-- Arrow -->
  <line x1="258" y1="145" x2="288" y2="145" stroke="#388E3C" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="273" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#388E3C">+ H₂O</text>
  <!-- Na+ ion -->
  <circle cx="310" cy="135" r="14" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <text x="310" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">Na</text>
  <text x="310" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">+</text>
  <!-- Cl- ion -->
  <circle cx="365" cy="135" r="16" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5"/>
  <text x="365" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Cl</text>
  <text x="365" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0">−</text>
  <!-- H3O+ note -->
  <text x="295" y="175" font-family="Arial,sans-serif" font-size="8" fill="#555">HCl + H₂O → H₃O⁺ + Cl⁻</text>
  <text x="295" y="165" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" font-style="italic">Для ков. полярной: H⁺ + H₂O → H₃O⁺</text>

  <!-- Dissociation of acids -->
  <rect x="15" y="190" width="155" height="70" rx="8" fill="white" opacity="0.9" filter="url(#shadow7)"/>
  <rect x="15" y="190" width="155" height="18" rx="8" fill="#C62828" opacity="0.8"/>
  <rect x="15" y="202" width="155" height="6" fill="#C62828" opacity="0.8"/>
  <text x="92" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Кислоты</text>
  <text x="25" y="225" font-family="Arial,sans-serif" font-size="8" fill="#333">HCl → H⁺ + Cl⁻</text>
  <text x="25" y="238" font-family="Arial,sans-serif" font-size="8" fill="#333">H₂SO₄ → 2H⁺ + SO₄²⁻</text>
  <text x="25" y="251" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" font-style="italic">H₃PO₄ ⇌ 3H⁺ + PO₄³⁻</text>

  <!-- Dissociation of bases -->
  <rect x="180" y="190" width="155" height="70" rx="8" fill="white" opacity="0.9" filter="url(#shadow7)"/>
  <rect x="180" y="190" width="155" height="18" rx="8" fill="#1565C0" opacity="0.8"/>
  <rect x="180" y="202" width="155" height="6" fill="#1565C0" opacity="0.8"/>
  <text x="257" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Основания (щёлочи)</text>
  <text x="190" y="225" font-family="Arial,sans-serif" font-size="8" fill="#333">NaOH → Na⁺ + OH⁻</text>
  <text x="190" y="238" font-family="Arial,sans-serif" font-size="8" fill="#333">Ca(OH)₂ → Ca²⁺ + 2OH⁻</text>
  <text x="190" y="251" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" font-style="italic">Катион металла + OH⁻</text>

  <!-- Dissociation of salts -->
  <rect x="345" y="190" width="140" height="70" rx="8" fill="white" opacity="0.9" filter="url(#shadow7)"/>
  <rect x="345" y="190" width="140" height="18" rx="8" fill="#6A1B9A" opacity="0.8"/>
  <rect x="345" y="202" width="140" height="6" fill="#6A1B9A" opacity="0.8"/>
  <text x="415" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Соли</text>
  <text x="355" y="225" font-family="Arial,sans-serif" font-size="8" fill="#333">NaCl → Na⁺ + Cl⁻</text>
  <text x="355" y="238" font-family="Arial,sans-serif" font-size="8" fill="#333">K₂SO₄ → 2K⁺ + SO₄²⁻</text>
  <text x="355" y="251" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" font-style="italic">Металл + кисл.остаток</text>

  <!-- Degree of dissociation -->
  <rect x="15" y="268" width="470" height="74" rx="8" fill="white" opacity="0.9" filter="url(#shadow7)"/>
  <text x="250" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Степень диссоциации: α = N(дисс.) / N(общ.)</text>
  <line x1="25" y1="294" x2="475" y2="294" stroke="#A5D6A7" stroke-width="1"/>
  <!-- Strength scale -->
  <rect x="25" y="302" width="130" height="30" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <text x="90" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Сильные (α≈100%)</text>
  <text x="90" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">HCl, H₂SO₄, NaOH, NaCl</text>
  <rect x="170" y="302" width="130" height="30" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="235" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">Средние (30-70%)</text>
  <text x="235" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">H₃PO₄, H₂SO₃</text>
  <rect x="315" y="302" width="130" height="30" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
  <text x="380" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">Слабые (&lt;30%)</text>
  <text x="380" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">H₂CO₃, H₂S, NH₃·H₂O</text>
  <!-- Arrow showing scale -->
  <line x1="45" y1="340" x2="445" y2="340" stroke="#388E3C" stroke-width="1.5"/>
  <polygon points="445,337 455,340 445,343" fill="#388E3C"/>
  <text x="45" y="338" font-family="Arial,sans-serif" font-size="7" fill="#555">Слабая дисс.</text>
  <text x="430" y="338" font-family="Arial,sans-serif" font-size="7" fill="#555">Сильная дисс.</text>
</svg>