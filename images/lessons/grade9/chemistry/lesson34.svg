<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg34" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh34">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg34)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Решение расчётных задач (2)</text>

  <!-- Yield formula -->
  <rect x="12" y="40" width="120" height="52" rx="6" fill="#0f766e" filter="url(#sh34)"/>
  <text x="72" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#5eead4" font-weight="bold">Выход продукта</text>
  <text x="72" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">h = m(пр)/m(теор)</text>
  <text x="72" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">h — доля выхода</text>

  <!-- Impurities -->
  <rect x="140" y="40" width="120" height="52" rx="6" fill="#0f766e" filter="url(#sh34)"/>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#5eead4" font-weight="bold">Примеси</text>
  <text x="200" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">w(ч) = 1 - w(пр)</text>
  <text x="200" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">m(ч) = m(обр) x w(ч)</text>

  <!-- Solution concentration -->
  <rect x="268" y="40" width="120" height="52" rx="6" fill="#0f766e" filter="url(#sh34)"/>
  <text x="328" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#5eead4" font-weight="bold">Концентрация</text>
  <text x="328" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">w = m(в)/m(р)</text>
  <text x="328" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">m(р) = m(в) + m(р-ля)</text>

  <!-- Example: yield -->
  <rect x="12" y="100" width="376" height="55" rx="6" fill="#134e4a" filter="url(#sh34)"/>
  <text x="22" y="116" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Пример: Из 56 г Fe получено 90 г Fe&#178;O&#179; (h=85%)</text>
  <text x="22" y="131" font-family="Arial,sans-serif" font-size="8" fill="white">4Fe + 3O&#178; = 2Fe&#178;O&#179;</text>
  <text x="22" y="143" font-family="Arial,sans-serif" font-size="8" fill="white">n(Fe)=56/56=1 моль => n(Fe&#178;O&#179;)=0.5 моль</text>
  <text x="22" y="151" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">m(теор)=0.5x160=80 г; m(пр)=80x0.85=68 г</text>

  <!-- Example: impurities -->
  <rect x="12" y="162" width="376" height="48" rx="6" fill="#134e4a" filter="url(#sh34)"/>
  <text x="22" y="178" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Пример: 200 г руды с 20% примесей. Сколько Fe?</text>
  <text x="22" y="192" font-family="Arial,sans-serif" font-size="8" fill="white">w(Fe&#178;O&#179;) = 100%-20% = 80%</text>
  <text x="22" y="204" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">m(Fe&#178;O&#179;) = 200x0.80 = 160 г</text>

  <!-- Example: solution -->
  <rect x="12" y="217" width="376" height="48" rx="6" fill="#134e4a" filter="url(#sh34)"/>
  <text x="22" y="233" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Пример: 40 г NaOH в 160 г H&#178;O. Найти w.</text>
  <text x="22" y="247" font-family="Arial,sans-serif" font-size="8" fill="white">m(р-ра) = 40 + 160 = 200 г</text>
  <text x="22" y="259" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">w(NaOH) = 40/200 = 0.20 = 20%</text>

  <!-- Summary formula box -->
  <rect x="12" y="272" width="376" height="18" rx="4" fill="#0f766e"/>
  <text x="200" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">n=m/M | V=Vm-n | w=m(в)/m(р) | h=m(пр)/m(теор) | m(ч)=m-w(ч)</text>
  <text x="370" y="284" font-family="Arial,sans-serif" font-size="7" fill="#5eead4">34</text>

</svg>