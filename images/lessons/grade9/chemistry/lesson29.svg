<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg29" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh29">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg29)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Кремний и его соединения</text>

  <!-- SiO2 structure -->
  <rect x="12" y="40" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh29)"/>
  <text x="101" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">SiO&#178; — кварц</text>
  <circle cx="55" cy="80" r="8" fill="#64748b" opacity="0.7"/><text x="55" y="83" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Si</text>
  <circle cx="80" cy="70" r="6" fill="#ef4444" opacity="0.6"/><text x="80" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">O</text>
  <circle cx="80" cy="90" r="6" fill="#ef4444" opacity="0.6"/><text x="80" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">O</text>
  <circle cx="115" cy="80" r="8" fill="#64748b" opacity="0.7"/><text x="115" y="83" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Si</text>
  <circle cx="140" cy="70" r="6" fill="#ef4444" opacity="0.6"/><text x="140" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">O</text>
  <line x1="63" y1="76" x2="74" y2="72" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="63" y1="84" x2="74" y2="88" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="89" y1="72" x2="107" y2="76" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="89" y1="88" x2="107" y2="84" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="101" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">Атомная крист. решётка</text>

  <!-- Silicon properties -->
  <rect x="203" y="40" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh29)"/>
  <text x="295" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Кремний Si</text>
  <text x="213" y="70" font-family="Arial,sans-serif" font-size="8" fill="white">Z=14, IVA группа</text>
  <text x="213" y="82" font-family="Arial,sans-serif" font-size="8" fill="white">Серый, твёрдый</text>
  <text x="213" y="94" font-family="Arial,sans-serif" font-size="8" fill="white">Полупроводник</text>
  <text x="213" y="106" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">SiO&#178; + 2C =t= Si + 2CO</text>

  <!-- Glass making -->
  <rect x="12" y="115" width="376" height="48" rx="6" fill="#134e4a" filter="url(#sh29)"/>
  <text x="22" y="131" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Производство стекла:</text>
  <text x="22" y="146" font-family="Arial,sans-serif" font-size="8" fill="white">Na&#178;CO&#179; + CaCO&#179; + 6SiO&#178; =t= Na&#178;O-CaO-6SiO&#178; + 2CO&#178;</text>
  <text x="22" y="158" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Обычное стекло — силикат натрия-кальция</text>

  <!-- Silicates -->
  <rect x="12" y="170" width="185" height="55" rx="6" fill="#0f766e" filter="url(#sh29)"/>
  <text x="22" y="186" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Силикаты:</text>
  <text x="22" y="200" font-family="Arial,sans-serif" font-size="8" fill="white">Na&#178;SiO&#179; — жидкое стекло</text>
  <text x="22" y="212" font-family="Arial,sans-serif" font-size="8" fill="white">Kaolin Al&#178;O&#179;-2SiO&#178;-2H&#178;O</text>
  <text x="22" y="222" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Цемент, керамика</text>

  <!-- Silicon in semiconductors -->
  <rect x="203" y="170" width="185" height="55" rx="6" fill="#0f766e" filter="url(#sh29)"/>
  <text x="213" y="186" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Si — полупроводник:</text>
  <text x="213" y="200" font-family="Arial,sans-serif" font-size="8" fill="white">Микрочипы, транзисторы</text>
  <text x="213" y="212" font-family="Arial,sans-serif" font-size="8" fill="white">Солнечные батареи</text>
  <text x="213" y="222" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Si + O&#178; = SiO&#178; (окс. плёнка)</text>

  <!-- Reactions -->
  <rect x="12" y="232" width="376" height="54" rx="6" fill="#134e4a" filter="url(#sh29)"/>
  <text x="22" y="248" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Реакции SiO&#178;:</text>
  <text x="22" y="262" font-family="Arial,sans-serif" font-size="8" fill="white">SiO&#178; + 2NaOH =t= Na&#178;SiO&#179; + H&#178;O</text>
  <text x="22" y="274" font-family="Arial,sans-serif" font-size="8" fill="white">SiO&#178; + Na&#178;CO&#179; =t= Na&#178;SiO&#179; + CO&#178;</text>
  <text x="345" y="248" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 29</text>

</svg>