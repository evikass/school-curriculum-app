<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="16" fill="#1a1a2e"/>
  <text x="200" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e0e0ff">Периодический закон</text>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a0a0cc">Д.И. Менделеев, 1869</text>
  <!-- Periodic table grid -->
  <g transform="translate(30,70)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="28" height="22" rx="3" fill="#4a90d9"/><text x="14" y="15" text-anchor="middle" font-family="Arial" font-size="9" fill="white">H</text>
    <rect x="280" y="0" width="28" height="22" rx="3" fill="#ff6b6b"/><text x="294" y="15" text-anchor="middle" font-family="Arial" font-size="9" fill="white">He</text>
    <!-- Row 2 -->
    <rect x="0" y="28" width="28" height="22" rx="3" fill="#51cf66"/><text x="14" y="43" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Li</text>
    <rect x="28" y="28" width="28" height="22" rx="3" fill="#51cf66"/><text x="42" y="43" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Be</text>
    <rect x="196" y="28" width="28" height="22" rx="3" fill="#ffd43b"/><text x="210" y="43" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">B</text>
    <rect x="224" y="28" width="28" height="22" rx="3" fill="#ffd43b"/><text x="238" y="43" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">C</text>
    <rect x="252" y="28" width="28" height="22" rx="3" fill="#ffd43b"/><text x="266" y="43" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">N</text>
    <rect x="280" y="28" width="28" height="22" rx="3" fill="#ffd43b"/><text x="294" y="43" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">O</text>
    <!-- Row 3 -->
    <rect x="0" y="56" width="28" height="22" rx="3" fill="#51cf66"/><text x="14" y="71" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Na</text>
    <rect x="28" y="56" width="28" height="22" rx="3" fill="#51cf66"/><text x="42" y="71" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Mg</text>
    <rect x="196" y="56" width="28" height="22" rx="3" fill="#ffd43b"/><text x="210" y="71" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Al</text>
  </g>
  <!-- Arrow showing property change -->
  <line x1="50" y1="165" x2="350" y2="165" stroke="#8888cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="180" text-anchor="middle" font-family="Arial" font-size="10" fill="#a0a0cc">Усиление неметаллических свойств →</text>
  <!-- Legend -->
  <rect x="60" y="200" width="16" height="16" rx="3" fill="#51cf66"/><text x="82" y="213" font-family="Arial" font-size="10" fill="#c0c0e0">Металлы</text>
  <rect x="150" y="200" width="16" height="16" rx="3" fill="#ffd43b"/><text x="172" y="213" font-family="Arial" font-size="10" fill="#c0c0e0">Неметаллы</text>
  <rect x="250" y="200" width="16" height="16" rx="3" fill="#ff6b6b"/><text x="272" y="213" font-family="Arial" font-size="10" fill="#c0c0e0">Благородные газы</text>
  <!-- Mendeleev portrait area -->
  <circle cx="200" cy="260" r="25" fill="#2a2a4e" stroke="#6666aa" stroke-width="2"/>
  <text x="200" y="257" text-anchor="middle" font-family="Arial" font-size="16" fill="#ffd43b">М</text>
  <text x="200" y="272" text-anchor="middle" font-family="Arial" font-size="8" fill="#a0a0cc">Менделеев</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8888cc"/></marker></defs>
</svg>
