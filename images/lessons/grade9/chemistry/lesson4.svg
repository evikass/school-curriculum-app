<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh4">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Степень окисления</text>

  <!-- Rules -->
  <rect x="12" y="40" width="185" height="115" rx="6" fill="#0f766e" filter="url(#sh4)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Правила:</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">1. Простое вещество: с.о. = 0</text>
  <text x="22" y="83" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">2. Ион = заряду иона</text>
  <text x="22" y="96" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">3. O (обычно) = -2</text>
  <text x="22" y="109" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">4. H (обычно) = +1</text>
  <text x="22" y="122" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">5. Сумма с.о. в молекуле = 0</text>
  <text x="22" y="135" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">6. Сумма с.о. в ионе = заряд</text>
  <text x="22" y="150" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Исключения: O в H2O2 = -1</text>

  <!-- Examples -->
  <rect x="203" y="40" width="185" height="115" rx="6" fill="#134e4a" filter="url(#sh4)"/>
  <text x="213" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Примеры:</text>
  <text x="213" y="72" font-family="Arial,sans-serif" font-size="9" fill="white">H&#8322;SO&#8324;:</text>
  <text x="280" y="72" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">S = +6</text>
  <text x="213" y="88" font-family="Arial,sans-serif" font-size="9" fill="white">KMnO&#8324;:</text>
  <text x="280" y="88" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Mn = +7</text>
  <text x="213" y="104" font-family="Arial,sans-serif" font-size="9" fill="white">Fe&#8322;O&#8323;:</text>
  <text x="280" y="104" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Fe = +3</text>
  <text x="213" y="120" font-family="Arial,sans-serif" font-size="9" fill="white">HNO&#8323;:</text>
  <text x="280" y="120" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">N = +5</text>
  <text x="213" y="136" font-family="Arial,sans-serif" font-size="9" fill="white">Cr&#8322;O&#8327;&#178;&#8315;:</text>
  <text x="280" y="136" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">Cr = +6</text>
  <text x="213" y="150" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">H(+1)*2 + S + O(-2)*4 = 0</text>

  <!-- Redox -->
  <rect x="12" y="163" width="376" height="55" rx="6" fill="#0f766e" filter="url(#sh4)"/>
  <text x="22" y="179" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Окислительно-восстановительные реакции:</text>
  <text x="22" y="194" font-family="Arial,sans-serif" font-size="8" fill="#fca5a5">Окисление: с.о. возрастает (отдача e&#8315;)</text>
  <text x="22" y="207" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd">Восстановление: с.о. убывает (приём e&#8315;)</text>
  <text x="260" y="179" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Fe&#178;&#8314; &#8594; Fe&#179;&#8314; + e&#8315;</text>
  <text x="260" y="194" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Cl&#8322; + 2e&#8315; &#8594; 2Cl&#8315;</text>

  <!-- Element CO table -->
  <rect x="12" y="226" width="376" height="62" rx="6" fill="#134e4a" filter="url(#sh4)"/>
  <text x="22" y="242" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Постоянные степени окисления:</text>
  <text x="22" y="258" font-family="Arial,sans-serif" font-size="9" fill="white">IA: +1</text>
  <text x="70" y="258" font-family="Arial,sans-serif" font-size="9" fill="white">IIA: +2</text>
  <text x="120" y="258" font-family="Arial,sans-serif" font-size="9" fill="white">Al: +3</text>
  <text x="165" y="258" font-family="Arial,sans-serif" font-size="9" fill="white">F: -1</text>
  <text x="22" y="274" font-family="Arial,sans-serif" font-size="9" fill="white">Zn: +2</text>
  <text x="70" y="274" font-family="Arial,sans-serif" font-size="9" fill="white">Ag: +1</text>
  <text x="120" y="274" font-family="Arial,sans-serif" font-size="9" fill="white">H: +1,-1</text>
  <text x="175" y="274" font-family="Arial,sans-serif" font-size="9" fill="white">O: -2,-1</text>
  <text x="240" y="258" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Переменные с.о.:</text>
  <text x="240" y="274" font-family="Arial,sans-serif" font-size="8" fill="#ccfbf1">Fe, Cu, Mn, Cr, N, S, Cl</text>
  <text x="370" y="284" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 4</text>
</svg>