<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh6">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg6)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="bold">Кислотно-основные свойства</text>

  <!-- Three types of oxides -->
  <rect x="12" y="40" width="120" height="78" rx="6" fill="#1e3a5f" filter="url(#sh6)"/>
  <text x="72" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#93c5fd" font-weight="bold">Основные</text>
  <text x="72" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">MeO + кисл.</text>
  <text x="72" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#bfdbfe">Na&#8322;O, CaO</text>
  <text x="72" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#bfdbfe">MgO, K&#8322;O</text>
  <text x="72" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#93c5fd">IA, IIA Me</text>

  <rect x="140" y="40" width="120" height="78" rx="6" fill="#4a3000" filter="url(#sh6)"/>
  <text x="200" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">Амфотерные</text>
  <text x="200" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">+ кисл. + щёл.</text>
  <text x="200" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fde68a">Al&#8322;O&#8323;, ZnO</text>
  <text x="200" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fde68a">BeO, Cr&#8322;O&#8323;</text>
  <text x="200" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#fbbf24">между Me и NeMe</text>

  <rect x="268" y="40" width="120" height="78" rx="6" fill="#4a1010" filter="url(#sh6)"/>
  <text x="328" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#f87171" font-weight="bold">Кислотные</text>
  <text x="328" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">NeMeO + щёл.</text>
  <text x="328" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fecaca">SO&#8323;, P&#8322;O&#8309;</text>
  <text x="328" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fecaca">CO&#8322;, N&#8322;O&#8325;</text>
  <text x="328" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#f87171">IVA-VIIA NeMe</text>

  <!-- Period trend arrow -->
  <rect x="12" y="126" width="376" height="38" rx="6" fill="#0f766e" filter="url(#sh6)"/>
  <text x="22" y="142" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">По периоду:</text>
  <text x="100" y="142" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd">Основные</text>
  <line x1="155" y1="139" x2="210" y2="139" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="210,136 216,139 210,142" fill="#14b8a6"/>
  <text x="172" y="148" font-family="Arial,sans-serif" font-size="7" fill="#fbbf24">амф.</text>
  <text x="220" y="142" font-family="Arial,sans-serif" font-size="8" fill="#f87171">Кислотные</text>
  <text x="300" y="142" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">усил. кисл. св-в</text>
  <text x="22" y="156" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">По группе (вниз): усил. основных св-в (для Me)</text>

  <!-- Hydroxides -->
  <rect x="12" y="172" width="185" height="55" rx="6" fill="#134e4a" filter="url(#sh6)"/>
  <text x="22" y="188" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Гидроксиды:</text>
  <text x="22" y="202" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd">Основные: NaOH, Ca(OH)&#8322;</text>
  <text x="22" y="215" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24">Амфотерн.: Al(OH)&#8323;, Zn(OH)&#8322;</text>

  <rect x="203" y="172" width="185" height="55" rx="6" fill="#0f766e" filter="url(#sh6)"/>
  <text x="213" y="188" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Кислоты:</text>
  <text x="213" y="202" font-family="Arial,sans-serif" font-size="8" fill="#f87171">H&#8322;SO&#8324;, HNO&#8323;, HCl</text>
  <text x="213" y="215" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Кисл. оксид + H&#8322;O = кислота</text>

  <!-- Diagonal rule -->
  <rect x="12" y="235" width="376" height="53" rx="6" fill="#134e4a" filter="url(#sh6)"/>
  <text x="22" y="251" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Диагональная закономерность:</text>
  <text x="22" y="266" font-family="Arial,sans-serif" font-size="8" fill="white">Li &#8594; Mg &#8594; Al &#8594; Si (амфотерность усиливается)</text>
  <text x="22" y="280" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Be и Al - диагональное сходство (оба амфотерны)</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 6</text>
</svg>