<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <marker id="arrowR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">Урок 3: Типы химической связи</text>

  <!-- 1. Covalent nonpolar -->
  <rect x="15" y="60" width="230" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow3)"/>
  <rect x="15" y="60" width="230" height="20" rx="8" fill="#43A047" opacity="0.8"/>
  <rect x="15" y="72" width="230" height="8" fill="#43A047" opacity="0.8"/>
  <text x="130" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Ковалентная неполярная</text>
  <!-- H2 molecule diagram -->
  <circle cx="70" cy="115" r="14" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="70" y="119" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">H</text>
  <circle cx="110" cy="115" r="14" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="110" y="119" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">H</text>
  <!-- Shared electron pair -->
  <circle cx="85" cy="110" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="95" cy="110" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <text x="130" y="108" font-family="Arial,sans-serif" font-size="9" fill="#333">Между атомами одного</text>
  <text x="130" y="120" font-family="Arial,sans-serif" font-size="9" fill="#333">элемента: H₂, O₂, N₂, Cl₂</text>
  <text x="130" y="135" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">Общие электронные пары</text>
  <text x="130" y="145" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">не смещены</text>

  <!-- 2. Covalent polar -->
  <rect x="255" y="60" width="230" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow3)"/>
  <rect x="255" y="60" width="230" height="20" rx="8" fill="#388E3C" opacity="0.8"/>
  <rect x="255" y="72" width="230" height="8" fill="#388E3C" opacity="0.8"/>
  <text x="370" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Ковалентная полярная</text>
  <!-- HCl molecule -->
  <circle cx="305" cy="115" r="14" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="305" y="119" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">H</text>
  <circle cx="355" cy="115" r="16" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5"/>
  <text x="355" y="119" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Cl</text>
  <!-- Shifted electron pair -->
  <circle cx="328" cy="110" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="336" cy="110" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <!-- Arrow showing shift -->
  <line x1="320" y1="100" x2="340" y2="100" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <text x="375" y="108" font-family="Arial,sans-serif" font-size="9" fill="#333">Между неметаллами</text>
  <text x="375" y="120" font-family="Arial,sans-serif" font-size="9" fill="#333">разной э/отрицательности</text>
  <text x="375" y="135" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">H₂O, HCl, NH₃</text>
  <text x="375" y="145" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">Электроны смещены к Cl</text>

  <!-- 3. Ionic bond -->
  <rect x="15" y="158" width="230" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow3)"/>
  <rect x="15" y="158" width="230" height="20" rx="8" fill="#E65100" opacity="0.8"/>
  <rect x="15" y="170" width="230" height="8" fill="#E65100" opacity="0.8"/>
  <text x="130" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Ионная связь</text>
  <!-- NaCl -->
  <circle cx="60" cy="215" r="16" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <text x="60" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">Na</text>
  <text x="60" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">+</text>
  <circle cx="110" cy="215" r="18" fill="#EF9A9A" stroke="#C62828" stroke-width="1.5"/>
  <text x="110" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Cl</text>
  <text x="110" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">−</text>
  <!-- Electron transfer arrow -->
  <line x1="72" y1="205" x2="96" y2="205" stroke="#F57F17" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="84" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">e⁻</text>
  <text x="135" y="210" font-family="Arial,sans-serif" font-size="9" fill="#333">Металл + Неметалл</text>
  <text x="135" y="222" font-family="Arial,sans-serif" font-size="9" fill="#333">Переход электронов</text>
  <text x="135" y="237" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">NaCl, CaO, K₂SO₄</text>

  <!-- 4. Metallic bond -->
  <rect x="255" y="158" width="230" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow3)"/>
  <rect x="255" y="158" width="230" height="20" rx="8" fill="#546E7A" opacity="0.8"/>
  <rect x="255" y="170" width="230" height="8" fill="#546E7A" opacity="0.8"/>
  <text x="370" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Металлическая связь</text>
  <!-- Metal lattice with free electrons -->
  <circle cx="290" cy="205" r="10" fill="#B0BEC5" stroke="#546E7A" stroke-width="1.5"/>
  <text x="290" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Fe+</text>
  <circle cx="330" cy="205" r="10" fill="#B0BEC5" stroke="#546E7A" stroke-width="1.5"/>
  <text x="330" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Fe+</text>
  <circle cx="310" cy="225" r="10" fill="#B0BEC5" stroke="#546E7A" stroke-width="1.5"/>
  <text x="310" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Fe+</text>
  <!-- Free electrons -->
  <circle cx="310" cy="195" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="300" cy="220" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="325" cy="218" r="3" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8"/>
  <text x="350" y="210" font-family="Arial,sans-serif" font-size="9" fill="#333">В металлах: электроны</text>
  <text x="350" y="222" font-family="Arial,sans-serif" font-size="9" fill="#333">свободно перемещаются</text>
  <text x="350" y="237" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">Fe, Cu, Al — проводники</text>

  <!-- Hydrogen bond -->
  <rect x="15" y="256" width="470" height="42" rx="8" fill="white" opacity="0.9" filter="url(#shadow3)"/>
  <rect x="15" y="256" width="130" height="20" rx="8" fill="#1565C0" opacity="0.8"/>
  <rect x="15" y="268" width="130" height="8" fill="#1565C0" opacity="0.8"/>
  <text x="80" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Водородная связь</text>
  <text x="160" y="274" font-family="Arial,sans-serif" font-size="9" fill="#333">Между H и электроотрицательными элементами (O, N, F)</text>
  <text x="160" y="289" font-family="Arial,sans-serif" font-size="9" fill="#388E3C" font-style="italic">Примеры: H₂O, NH₃, белки, ДНК — обеспечивает двойную спираль</text>

  <!-- Comparison table -->
  <rect x="15" y="305" width="470" height="38" rx="6" fill="#66BB6A" opacity="0.15"/>
  <text x="250" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#388E3C">Ковал.неполярн. (неметалл+неметалл, Cl₂) | Ковал.полярн. (неметалл+неметалл, HCl)</text>
  <text x="250" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#388E3C">Ионная (металл+неметалл, NaCl) | Металлическая (металл+металл, Fe)</text>
</svg>