<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg30" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh30">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg30)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Получение и свойства газов</text>

  <!-- Lab equipment - gas collection -->
  <rect x="12" y="40" width="185" height="80" rx="6" fill="#0f766e" filter="url(#sh30)"/>
  <text x="101" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Сбор газов</text>
  <!-- Flask -->
  <rect x="30" y="65" width="30" height="40" rx="3" fill="none" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="35" y="60" width="20" height="8" rx="2" fill="none" stroke="#93c5fd" stroke-width="1"/>
  <text x="45" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#93c5fd">р-р</text>
  <!-- Tube -->
  <line x1="55" y1="64" x2="80" y2="64" stroke="#93c5fd" stroke-width="1"/>
  <line x1="80" y1="64" x2="80" y2="80" stroke="#93c5fd" stroke-width="1"/>
  <!-- Water bath -->
  <rect x="90" y="60" width="55" height="50" rx="3" fill="#1e3a5f" opacity="0.4" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="117" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#93c5fd">H&#178;O</text>
  <!-- Test tube in water -->
  <rect x="100" y="65" width="15" height="35" rx="2" fill="none" stroke="#93c5fd" stroke-width="1"/>
  <text x="107" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">газ</text>
  <text x="101" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#99f6e4">Вытеснение воды</text>

  <!-- O2 preparation -->
  <rect x="203" y="40" width="185" height="38" rx="6" fill="#134e4a" filter="url(#sh30)"/>
  <text x="213" y="55" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">O&#178;:</text>
  <text x="240" y="55" font-family="Arial,sans-serif" font-size="7" fill="white">2KMnO&#8308; = K&#178;MnO&#8308;+MnO&#178;+O&#178;</text>
  <text x="213" y="68" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Тлеющая лучинка вспыхивает</text>

  <!-- H2 preparation -->
  <rect x="203" y="84" width="185" height="38" rx="6" fill="#134e4a" filter="url(#sh30)"/>
  <text x="213" y="99" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">H&#178;:</text>
  <text x="240" y="99" font-family="Arial,sans-serif" font-size="7" fill="white">Zn + H&#178;SO&#8308;(р) = ZnSO&#8308; + H&#178;</text>
  <text x="213" y="112" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">«Лающий» звук у горл. трубки</text>

  <!-- CO2 preparation -->
  <rect x="203" y="128" width="185" height="38" rx="6" fill="#134e4a" filter="url(#sh30)"/>
  <text x="213" y="143" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">CO&#178;:</text>
  <text x="240" y="143" font-family="Arial,sans-serif" font-size="7" fill="white">CaCO&#179; + 2HCl = CaCl&#178;+H&#178;O+CO&#178;</text>
  <text x="213" y="156" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Мутит известк. воду</text>

  <!-- NH3 preparation -->
  <rect x="203" y="172" width="185" height="38" rx="6" fill="#134e4a" filter="url(#sh30)"/>
  <text x="213" y="187" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">NH&#179;:</text>
  <text x="240" y="187" font-family="Arial,sans-serif" font-size="7" fill="white">NH&#8308;Cl + NaOH = NaCl+H&#178;O+NH&#179;</text>
  <text x="213" y="200" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Влажная красная лакм. синеет</text>

  <!-- Test diagram -->
  <rect x="12" y="126" width="185" height="84" rx="6" fill="#0f766e" filter="url(#sh30)"/>
  <text x="101" y="141" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Распознавание газов</text>
  <rect x="22" y="148" width="70" height="22" rx="4" fill="#7c3aed" opacity="0.4"/>
  <text x="57" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">O&#178; - лучинка</text>
  <rect x="100" y="148" width="85" height="22" rx="4" fill="#0284c7" opacity="0.4"/>
  <text x="142" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">H&#178; - «лаек»</text>
  <rect x="22" y="175" width="70" height="22" rx="4" fill="#059669" opacity="0.4"/>
  <text x="57" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">CO&#178; - Ca(OH)&#178;</text>
  <rect x="100" y="175" width="85" height="22" rx="4" fill="#d97706" opacity="0.4"/>
  <text x="142" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">NH&#179; - лакмус</text>
  <text x="101" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#99f6e4">Качественные реакции</text>

  <!-- Safety note -->
  <rect x="12" y="216" width="376" height="70" rx="6" fill="#134e4a" filter="url(#sh30)"/>
  <text x="22" y="232" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5" font-weight="bold">Техника безопасности:</text>
  <text x="22" y="247" font-family="Arial,sans-serif" font-size="7" fill="white">1. Газы собирать вытеснением воздуха (лёгкие) или воды</text>
  <text x="22" y="259" font-family="Arial,sans-serif" font-size="7" fill="white">2. H&#178; проверять на чистоту перед поджиганием!</text>
  <text x="22" y="271" font-family="Arial,sans-serif" font-size="7" fill="white">3. NH&#179; и CO&#178; — в вытяжном шкафу</text>
  <text x="22" y="283" font-family="Arial,sans-serif" font-size="7" fill="white">4. Кислоты и щёлочи — аккуратно!</text>
  <text x="345" y="232" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 30</text>

</svg>