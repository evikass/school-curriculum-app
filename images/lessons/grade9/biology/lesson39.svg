<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2E7D32"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1565C0"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1B5E20">Экосистемы</text>
  <line x1="100" y1="40" x2="400" y2="40" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>

  <!-- Ecosystem diagram -->
  <g transform="translate(15,48)">
    <rect x="0" y="0" width="280" height="165" rx="6" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
    <text x="140" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Структура экосистемы</text>

    <!-- Abiotic factors -->
    <rect x="5" y="22" width="130" height="40" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
    <text x="70" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1">Абиотические</text>
    <text x="70" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Свет, вода, t°, почва</text>

    <!-- Biotic factors -->
    <rect x="145" y="22" width="130" height="40" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
    <text x="210" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Биотические</text>
    <text x="210" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Живые организмы</text>

    <!-- Producers -->
    <rect x="10" y="72" width="75" height="35" rx="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <text x="47" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#1B5E20">Продуценты</text>
    <text x="47" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32">Растения</text>

    <!-- Consumers -->
    <rect x="95" y="72" width="85" height="35" rx="4" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
    <text x="137" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#E65100">Консументы</text>
    <text x="137" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#F57C00">Животные</text>

    <!-- Decomposers -->
    <rect x="190" y="72" width="80" height="35" rx="4" fill="#D7CCC8" stroke="#5D4037" stroke-width="1"/>
    <text x="230" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#4E342E">Редуценты</text>
    <text x="230" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Бактерии, грибы</text>

    <!-- Arrows -->
    <line x1="47" y1="107" x2="47" y2="120" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
    <line x1="137" y1="107" x2="137" y2="120" stroke="#F57C00" stroke-width="1"/>
    <line x1="230" y1="107" x2="230" y2="120" stroke="#5D4037" stroke-width="1"/>

    <!-- Circular flow -->
    <path d="M47,130 Q47,140 90,145" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
    <path d="M90,145 Q137,148 180,145" fill="none" stroke="#F57C00" stroke-width="1.2"/>
    <path d="M180,145 Q230,142 230,130" fill="none" stroke="#5D4037" stroke-width="1.2"/>
    <path d="M230,130 Q230,140 200,148" fill="none" stroke="#5D4037" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M200,148 Q140,155 60,148" fill="none" stroke="#5D4037" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M60,148 Q47,146 47,130" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>

    <text x="140" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-style="italic">Круговорот веществ</text>
  </g>

  <!-- Nutrient cycle -->
  <g transform="translate(305,48)">
    <rect x="0" y="0" width="185" height="165" rx="6" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
    <text x="92" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Круговорот углерода</text>

    <!-- Atmosphere CO2 -->
    <ellipse cx="92" cy="42" rx="45" ry="16" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
    <text x="92" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1">Атмосфера</text>
    <text x="92" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">CO₂</text>

    <!-- Plants -->
    <rect x="15" y="72" width="55" height="30" rx="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <text x="42" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Растения</text>
    <text x="42" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Фотосинтез</text>

    <!-- Animals -->
    <rect x="115" y="72" width="55" height="30" rx="4" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
    <text x="142" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">Животные</text>
    <text x="142" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#F57C00">Дыхание</text>

    <!-- Decomposers -->
    <rect x="60" y="118" width="65" height="25" rx="4" fill="#D7CCC8" stroke="#5D4037" stroke-width="1"/>
    <text x="92" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4E342E">Редуценты</text>

    <!-- Arrows -->
    <line x1="70" y1="58" x2="50" y2="72" stroke="#2E7D32" stroke-width="1.2" marker-end="url(#arrowG)"/>
    <text x="48" y="65" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">CO₂</text>
    <line x1="50" y1="72" x2="70" y2="58" stroke="#2E7D32" stroke-width="0" />

    <line x1="115" y1="58" x2="135" y2="72" stroke="#F57C00" stroke-width="1.2"/>
    <polygon points="134,69 138,76 131,73" fill="#F57C00"/>
    <text x="133" y="65" font-family="Arial,sans-serif" font-size="6" fill="#E65100">CO₂</text>

    <line x1="42" y1="102" x2="72" y2="118" stroke="#5D4037" stroke-width="1"/>
    <line x1="142" y1="102" x2="112" y2="118" stroke="#5D4037" stroke-width="1"/>

    <path d="M92,143 Q92,152 92,155 Q92,158 65,155 Q30,150 30,130 Q30,110 42,58" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Vernadsky section -->
  <g transform="translate(15,222)">
    <rect x="0" y="0" width="470" height="115" rx="6" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
    <text x="235" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1B5E20">В.И. Вернадский — Учение о биосфере</text>

    <!-- Biosphere concept -->
    <g transform="translate(10,28)">
      <!-- Earth circle -->
      <circle cx="55" cy="40" r="35" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
      <path d="M20,30 Q35,25 55,28 Q75,31 90,25" fill="none" stroke="#42A5F5" stroke-width="1.5" opacity="0.6"/>
      <path d="M25,45 Q45,50 65,47 Q80,44 88,48" fill="none" stroke="#42A5F5" stroke-width="1.2" opacity="0.5"/>
      <ellipse cx="55" cy="40" rx="35" ry="8" fill="none" stroke="#66BB6A" stroke-width="0.8" stroke-dasharray="2,2"/>
      <text x="55" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Биосфера</text>
    </g>

    <!-- Key concepts -->
    <g transform="translate(120,28)">
      <rect x="0" y="0" width="340" height="75" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.8"/>

      <circle cx="12" cy="12" r="4" fill="#2E7D32"/>
      <text x="22" y="15" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">Биосфера — оболочка Земли, заселённая живыми организмами</text>

      <circle cx="12" cy="30" r="4" fill="#2E7D32"/>
      <text x="22" y="33" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">Живое вещество — совокупность всех организмов планеты</text>

      <circle cx="12" cy="48" r="4" fill="#2E7D32"/>
      <text x="22" y="51" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">Биогенное вещество — создано организмами (уголь, нефть, мел)</text>

      <circle cx="12" cy="66" r="4" fill="#2E7D32"/>
      <text x="22" y="69" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">Косное вещество — неживое (вода, горные породы)</text>
    </g>
  </g>

  <text x="480" y="340" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" opacity="0.6">Урок 39</text>
</svg>