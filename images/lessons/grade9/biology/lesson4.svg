<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <filter id="shadow4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg4)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#2E7D32" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#2E7D32"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 4: Доказательства эволюции</text>

  <!-- Panel 1: Палеонтологические (top-left) -->
  <g filter="url(#shadow4)">
    <rect x="10" y="50" width="235" height="140" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="10" y="50" width="235" height="24" rx="8" fill="#388E3C"/>
    <rect x="10" y="62" width="235" height="12" fill="#388E3C"/>
    <text x="127" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Палеонтологические</text>

    <!-- Fossil layers / strata -->
    <rect x="25" y="82" width="80" height="95" rx="4" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
    <rect x="27" y="85" width="76" height="18" rx="2" fill="#EFEBE9"/>
    <!-- Trilobite fossil -->
    <ellipse cx="65" cy="94" rx="14" ry="6" fill="#A1887F" stroke="#6D4C41" stroke-width="0.8"/>
    <line x1="55" y1="94" x2="75" y2="94" stroke="#6D4C41" stroke-width="0.5"/>
    <line x1="58" y1="90" x2="58" y2="98" stroke="#6D4C41" stroke-width="0.5"/>
    <line x1="65" y1="88" x2="65" y2="100" stroke="#6D4C41" stroke-width="0.5"/>
    <line x1="72" y1="90" x2="72" y2="98" stroke="#6D4C41" stroke-width="0.5"/>

    <rect x="27" y="107" width="76" height="18" rx="2" fill="#D7CCC8"/>
    <!-- Ammonite fossil -->
    <path d="M55,116 Q50,110 55,108 Q62,108 62,114 Q62,118 55,118 Q48,118 48,112" fill="none" stroke="#5D4037" stroke-width="1.2"/>

    <rect x="27" y="129" width="76" height="18" rx="2" fill="#BCAAA4"/>
    <!-- Bone fragment -->
    <path d="M45,138 L75,138 L72,142 L48,142Z" fill="#8D6E63" stroke="#4E342E" stroke-width="0.8"/>
    <rect x="55" y="133" width="10" height="5" rx="1" fill="#795548" stroke="#4E342E" stroke-width="0.5"/>

    <text x="65" y="159" text-anchor="middle" fill="#5D4037" font-size="7">Ископаемые остатки</text>

    <!-- Arrow showing time -->
    <line x1="120" y1="85" x2="120" y2="170" stroke="#388E3C" stroke-width="1.5"/>
    <polygon points="120,170 116,162 124,162" fill="#388E3C"/>
    <text x="132" y="130" fill="#2E7D32" font-size="8" transform="rotate(90,132,130)">Время</text>

    <!-- Text description -->
    <text x="140" y="90" fill="#1B5E20" font-size="8">Окаменелости показывают</text>
    <text x="140" y="101" fill="#1B5E20" font-size="8">изменение организмов</text>
    <text x="140" y="112" fill="#1B5E20" font-size="8">во времени</text>
    <text x="140" y="130" fill="#388E3C" font-size="7" font-style="italic">Переходные формы:</text>
    <text x="140" y="141" fill="#388E3C" font-size="7">• Археоптерикс</text>
    <text x="140" y="151" fill="#388E3C" font-size="7">• Ихтиостега</text>
    <text x="140" y="161" fill="#388E3C" font-size="7">• Стегоцефалы</text>
  </g>

  <!-- Panel 2: Эмбриологические (top-right) -->
  <g filter="url(#shadow4)">
    <rect x="255" y="50" width="235" height="140" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="255" y="50" width="235" height="24" rx="8" fill="#388E3C"/>
    <rect x="255" y="62" width="235" height="12" fill="#388E3C"/>
    <text x="372" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Эмбриологические</text>

    <!-- Embryo stages - Row of 3 similar embryos -->
    <text x="280" y="88" fill="#1B5E20" font-size="7" font-weight="bold">Рыба</text>
    <text x="340" y="88" fill="#1B5E20" font-size="7" font-weight="bold">Саламандра</text>
    <text x="425" y="88" fill="#1B5E20" font-size="7" font-weight="bold">Человек</text>

    <!-- Early embryo - very similar -->
    <ellipse cx="290" cy="108" rx="10" ry="14" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <circle cx="290" cy="100" r="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
    <text x="290" y="130" text-anchor="middle" fill="#388E3C" font-size="6">Ранняя</text>
    <text x="290" y="138" text-anchor="middle" fill="#388E3C" font-size="6">стадия</text>

    <ellipse cx="360" cy="108" rx="10" ry="14" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <circle cx="360" cy="100" r="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
    <text x="360" y="130" text-anchor="middle" fill="#388E3C" font-size="6">Ранняя</text>
    <text x="360" y="138" text-anchor="middle" fill="#388E3C" font-size="6">стадия</text>

    <ellipse cx="430" cy="108" rx="10" ry="14" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <circle cx="430" cy="100" r="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
    <text x="430" y="130" text-anchor="middle" fill="#388E3C" font-size="6">Ранняя</text>
    <text x="430" y="138" text-anchor="middle" fill="#388E3C" font-size="6">стадия</text>

    <!-- Similarity bracket -->
    <path d="M280,140 L280,145 L440,145 L440,140" fill="none" stroke="#C62828" stroke-width="1"/>
    <text x="360" y="155" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Сходство!</text>

    <text x="270" y="170" fill="#388E3C" font-size="7">Закон зародышевого сходства</text>
    <text x="270" y="180" fill="#388E3C" font-size="7">(К. Бэр): ранние стадии схожи</text>
  </g>

  <!-- Panel 3: Сравнительно-анатомические (bottom-left) -->
  <g filter="url(#shadow4)">
    <rect x="10" y="200" width="235" height="140" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="10" y="200" width="235" height="24" rx="8" fill="#388E3C"/>
    <rect x="10" y="212" width="235" height="12" fill="#388E3C"/>
    <text x="127" y="216" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Сравнительно-анатомические</text>

    <!-- Homologous limbs -->
    <text x="45" y="240" text-anchor="middle" fill="#1B5E20" font-size="7">Кит</text>
    <text x="110" y="240" text-anchor="middle" fill="#1B5E20" font-size="7">Летучая мышь</text>
    <text x="195" y="240" text-anchor="middle" fill="#1B5E20" font-size="7">Человек</text>

    <!-- Whale flipper -->
    <g transform="translate(45,265)">
      <line x1="0" y1="0" x2="-5" y2="-18" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="3" y2="-16" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="10" y2="-12" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="14" y2="-5" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="5" cy="-10" rx="16" ry="12" fill="#BDBDBD" fill-opacity="0.4" stroke="#757575" stroke-width="0.5"/>
    </g>

    <!-- Bat wing -->
    <g transform="translate(110,265)">
      <line x1="0" y1="0" x2="-5" y2="-22" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="8" y2="-25" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="18" y2="-18" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="20" y2="-5" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
      <!-- Wing membrane -->
      <path d="M-5,-22 Q10,-20 8,-25 Q20,-15 18,-18 Q25,-5 20,-5 L0,0 L-5,-22" fill="#D7CCC8" fill-opacity="0.5" stroke="#8D6E63" stroke-width="0.5"/>
    </g>

    <!-- Human hand -->
    <g transform="translate(195,265)">
      <line x1="0" y1="0" x2="-8" y2="-22" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="-2" y2="-25" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="5" y2="-24" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="12" y2="-20" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="16" y2="-10" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Same bone structure highlight -->
    <text x="127" y="305" text-anchor="middle" fill="#C62828" font-size="8" font-weight="bold">Гомологичные органы</text>
    <text x="127" y="317" text-anchor="middle" fill="#388E3C" font-size="7">Единый план строения →</text>
    <text x="127" y="328" text-anchor="middle" fill="#388E3C" font-size="7">общее происхождение</text>
  </g>

  <!-- Panel 4: Молекулярные (bottom-right) -->
  <g filter="url(#shadow4)">
    <rect x="255" y="200" width="235" height="140" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="255" y="200" width="235" height="24" rx="8" fill="#388E3C"/>
    <rect x="255" y="212" width="235" height="12" fill="#388E3C"/>
    <text x="372" y="216" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Молекулярные</text>

    <!-- DNA double helix -->
    <g transform="translate(290,240)">
      <path d="M0,0 Q15,8 0,16 Q-15,24 0,32 Q15,40 0,48 Q-15,56 0,64" fill="none" stroke="#1E88E5" stroke-width="2.5"/>
      <path d="M0,0 Q-15,8 0,16 Q15,24 0,32 Q-15,40 0,48 Q15,56 0,64" fill="none" stroke="#C62828" stroke-width="2.5"/>
      <!-- Rungs -->
      <line x1="-8" y1="8" x2="8" y2="8" stroke="#FFB74D" stroke-width="1.5"/>
      <line x1="8" y1="24" x2="-8" y2="24" stroke="#81C784" stroke-width="1.5"/>
      <line x1="-8" y1="40" x2="8" y2="40" stroke="#FFB74D" stroke-width="1.5"/>
      <line x1="8" y1="56" x2="-8" y2="56" stroke="#81C784" stroke-width="1.5"/>
    </g>

    <text x="340" y="245" fill="#1B5E20" font-size="8">Сравнение ДНК и белков</text>
    <text x="340" y="258" fill="#1B5E20" font-size="8">разных видов:</text>

    <!-- Similarity percentages -->
    <text x="345" y="278" fill="#388E3C" font-size="8">Человек — Шимпанзе:</text>
    <rect x="440" y="270" width="40" height="10" rx="3" fill="#C8E6C9"/>
    <rect x="440" y="270" width="38" height="10" rx="3" fill="#4CAF50"/>
    <text x="460" y="278" text-anchor="middle" fill="white" font-size="7" font-weight="bold">98%</text>

    <text x="345" y="296" fill="#388E3C" font-size="8">Человек — Собака:</text>
    <rect x="440" y="288" width="40" height="10" rx="3" fill="#C8E6C9"/>
    <rect x="440" y="288" width="33" height="10" rx="3" fill="#8BC34A"/>
    <text x="456" y="296" text-anchor="middle" fill="white" font-size="7" font-weight="bold">84%</text>

    <text x="345" y="314" fill="#388E3C" font-size="8">Человек — Дрозофила:</text>
    <rect x="440" y="306" width="40" height="10" rx="3" fill="#C8E6C9"/>
    <rect x="440" y="306" width="20" height="10" rx="3" fill="#FF9800"/>
    <text x="450" y="314" text-anchor="middle" fill="white" font-size="7" font-weight="bold">44%</text>

    <text x="372" y="334" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Чем ближе родство → тем больше сходство ДНК</text>
  </g>
</svg>