<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg24" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <marker id="arrow24" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg24)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#4CAF50" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1B5E20">Размножение</text>
  <line x1="40" y1="38" x2="460" y2="38" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- Top section: Asexual -->
  <rect x="15" y="45" width="470" height="130" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="250" y="63" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">Бесполое размножение</text>

  <!-- Binary fission -->
  <rect x="25" y="72" width="105" height="95" rx="6" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
  <text x="78" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Деление</text>
  <text x="78" y="100" text-anchor="middle" font-size="8" fill="#2E7D32">надвое</text>
  <!-- binary fission icon -->
  <ellipse cx="78" cy="120" rx="12" ry="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <line x1="78" y1="110" x2="78" y2="130" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="3,2"/>
  <ellipse cx="68" cy="150" rx="8" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="88" cy="150" rx="8" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="72" y1="130" x2="68" y2="143" stroke="#2E7D32" stroke-width="0.8" marker-end="url(#arrow24)"/>
  <line x1="84" y1="130" x2="88" y2="143" stroke="#2E7D32" stroke-width="0.8" marker-end="url(#arrow24)"/>

  <!-- Budding -->
  <rect x="140" y="72" width="105" height="95" rx="6" fill="#DCEDC8" stroke="#66BB6A" stroke-width="1"/>
  <text x="193" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Почкование</text>
  <!-- budding icon -->
  <ellipse cx="188" cy="118" rx="15" ry="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <ellipse cx="205" cy="108" rx="8" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="200" y1="112" x2="197" y2="114" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="193" y="145" text-anchor="middle" font-size="8" fill="#2E7D32">гидра, дрожжи</text>

  <!-- Spores -->
  <rect x="255" y="72" width="105" height="95" rx="6" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="308" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Спорами</text>
  <!-- spore icon -->
  <circle cx="298" cy="112" r="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <circle cx="308" cy="108" r="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <circle cx="318" cy="114" r="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <circle cx="305" cy="120" r="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M285 128 L300 135 L315 133 L330 138" fill="none" stroke="#795548" stroke-width="1"/>
  <text x="308" y="150" text-anchor="middle" font-size="8" fill="#2E7D32">грибы, папоротники</text>

  <!-- Vegetative -->
  <rect x="370" y="72" width="105" height="95" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="423" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Вегетативное</text>
  <!-- vegetative propagation icon -->
  <line x1="413" y1="105" x2="413" y2="135" stroke="#4CAF50" stroke-width="2"/>
  <ellipse cx="408" cy="115" rx="6" ry="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
  <line x1="413" y1="130" x2="405" y2="140" stroke="#795548" stroke-width="1"/>
  <line x1="413" y1="130" x2="421" y2="140" stroke="#795548" stroke-width="1"/>
  <text x="423" y="155" text-anchor="middle" font-size="8" fill="#2E7D32">усы, клубни, луковицы</text>

  <!-- Bottom section: Sexual reproduction -->
  <rect x="15" y="185" width="470" height="155" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#EF9A9A" stroke-width="1.5"/>
  <text x="250" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">Половое размножение</text>

  <!-- Sperm -->
  <circle cx="100" cy="240" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>
  <path d="M107 240 L120 240" stroke="#1565C0" stroke-width="1"/>
  <path d="M117 237 L120 240 L117 243" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <text x="100" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Сперматозоид</text>
  <text x="100" y="273" text-anchor="middle" font-size="8" fill="#1976D2">(n — гаплоид)</text>

  <!-- Plus sign -->
  <text x="165" y="244" text-anchor="middle" font-size="24" font-weight="bold" fill="#4CAF50">+</text>

  <!-- Egg -->
  <circle cx="230" cy="240" r="14" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.2"/>
  <circle cx="230" cy="240" r="7" fill="#F48FB1" stroke="#AD1457" stroke-width="0.8"/>
  <text x="230" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="#C2185B">Яйцеклетка</text>
  <text x="230" y="278" text-anchor="middle" font-size="8" fill="#C2185B">(n — гаплоид)</text>

  <!-- Arrow to zygote -->
  <line x1="260" y1="240" x2="305" y2="240" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow24)"/>
  <text x="282" y="235" text-anchor="middle" font-size="8" fill="#2E7D32">слияние</text>

  <!-- Zygote -->
  <circle cx="340" cy="240" r="16" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="340" y="237" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20">2n</text>
  <text x="340" y="245" text-anchor="middle" font-size="7" fill="#1B5E20">n+n</text>
  <text x="340" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Зигота</text>
  <text x="340" y="281" text-anchor="middle" font-size="8" fill="#2E7D32">(2n — диплоид)</text>

  <!-- Development arrow -->
  <line x1="360" y1="240" x2="400" y2="240" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrow24)"/>
  <text x="380" y="235" text-anchor="middle" font-size="7" fill="#2E7D32">рост</text>

  <!-- New organism -->
  <ellipse cx="435" cy="240" rx="20" ry="16" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="435" y="238" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20">2n</text>
  <text x="435" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B5E20">Организм</text>

  <!-- Key point -->
  <rect x="80" y="295" width="340" height="35" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#4CAF50" stroke-width="1"/>
  <text x="250" y="310" text-anchor="middle" font-size="10" fill="#1B5E20">Преимущество: комбинативная изменчивость —</text>
  <text x="250" y="324" text-anchor="middle" font-size="10" fill="#1B5E20">генетическое разнообразие потомства</text>
</svg>