<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="ocean3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90CAF9"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
    <filter id="shadow3" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg3)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#1565C0" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#1565C0"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 3: Теория Дарвина</text>

  <!-- Left section: HMS Beagle on map -->
  <rect x="10" y="50" width="180" height="155" rx="6" fill="white" fill-opacity="0.6" stroke="#1565C0" stroke-width="1"/>
  <text x="100" y="65" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Путешествие «Бигль»</text>
  <text x="100" y="76" text-anchor="middle" fill="#1565C0" font-size="8">1831-1836</text>

  <!-- Simplified South America map -->
  <path d="M60,95 Q55,100 50,120 Q45,135 55,145 Q60,155 70,160 Q75,165 80,155 Q90,150 95,140 Q100,130 95,115 Q90,100 80,95 Q70,90 60,95Z" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
  <!-- Galapagos islands -->
  <ellipse cx="120" cy="115" rx="12" ry="8" fill="#C8E6C9" stroke="#388E3C" stroke-width="0.8"/>
  <ellipse cx="135" cy="108" rx="6" ry="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="0.8"/>
  <text x="128" y="118" text-anchor="middle" fill="#1B5E20" font-size="5">Галапагосы</text>

  <!-- Ocean background -->
  <rect x="15" y="85" width="170" height="100" fill="url(#ocean3)" fill-opacity="0.3" rx="3"/>

  <!-- Ship silhouette -->
  <g transform="translate(65,100)">
    <!-- Hull -->
    <path d="M0,12 L3,8 L25,8 L28,12 L25,15 L3,15Z" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
    <!-- Mast -->
    <line x1="14" y1="8" x2="14" y2="-10" stroke="#3E2723" stroke-width="1.2"/>
    <!-- Sail -->
    <path d="M14,-8 L24,2 L14,2Z" fill="white" stroke="#90A4AE" stroke-width="0.5"/>
    <path d="M14,-6 L6,2 L14,2Z" fill="#ECEFF1" stroke="#90A4AE" stroke-width="0.5"/>
    <!-- Flag -->
    <rect x="14" y="-12" width="5" height="3" fill="#C62828"/>
  </g>

  <!-- Route dotted line -->
  <path d="M40,130 Q55,120 65,105 Q80,95 100,105 Q120,112 120,115" fill="none" stroke="#C62828" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Right section: Galapagos Finches -->
  <rect x="200" y="50" width="290" height="155" rx="6" fill="white" fill-opacity="0.6" stroke="#1565C0" stroke-width="1"/>
  <text x="345" y="65" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Вьюрки Галапагосских островов</text>

  <!-- Finch 1 - Large ground finch (large beak) -->
  <g transform="translate(230,90)">
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#8D6E63"/>
    <circle cx="-8" cy="-5" r="6" fill="#A1887F"/>
    <path d="M-14,-5 L-24,-8 L-14,-3Z" fill="#4E342E"/>
    <circle cx="-10" cy="-6" r="1" fill="#212121"/>
    <line x1="8" y1="5" x2="12" y2="14" stroke="#5D4037" stroke-width="1"/>
    <line x1="4" y1="5" x2="8" y2="14" stroke="#5D4037" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" fill="#0D47A1" font-size="7">Крупный клюв</text>
    <text x="0" y="33" text-anchor="middle" fill="#1565C0" font-size="6">(семена)</text>
  </g>

  <!-- Finch 2 - Medium ground finch -->
  <g transform="translate(310,90)">
    <ellipse cx="0" cy="0" rx="11" ry="8" fill="#8D6E63"/>
    <circle cx="-7" cy="-4" r="5.5" fill="#A1887F"/>
    <path d="M-12.5,-4 L-20,-6 L-12.5,-2Z" fill="#4E342E"/>
    <circle cx="-9" cy="-5" r="1" fill="#212121"/>
    <line x1="7" y1="5" x2="10" y2="13" stroke="#5D4037" stroke-width="1"/>
    <line x1="3" y1="5" x2="6" y2="13" stroke="#5D4037" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" fill="#0D47A1" font-size="7">Средний клюв</text>
    <text x="0" y="33" text-anchor="middle" fill="#1565C0" font-size="6">(насекомые)</text>
  </g>

  <!-- Finch 3 - Warbler finch (small beak) -->
  <g transform="translate(390,90)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#8D6E63"/>
    <circle cx="-6" cy="-3" r="5" fill="#A1887F"/>
    <path d="M-11,-3 L-22,-5 L-11,-1Z" fill="#4E342E" stroke="#3E2723" stroke-width="0.3"/>
    <circle cx="-8" cy="-4" r="1" fill="#212121"/>
    <line x1="6" y1="4" x2="9" y2="12" stroke="#5D4037" stroke-width="1"/>
    <line x1="2" y1="4" x2="5" y2="12" stroke="#5D4037" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" fill="#0D47A1" font-size="7">Тонкий клюв</text>
    <text x="0" y="33" text-anchor="middle" fill="#1565C0" font-size="6">(нектар/насекомые)</text>
  </g>

  <!-- Arrow pointing: адаптация клюва -->
  <text x="345" y="145" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Адаптация формы клюва к пище</text>
  <line x1="250" y1="135" x2="390" y2="135" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Bottom section: Three pillars of Darwin's theory -->
  <rect x="10" y="215" width="480" height="125" rx="6" fill="white" fill-opacity="0.7" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="233" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Три столпа теории Дарвина</text>

  <!-- Pillar 1: Изменчивость -->
  <g transform="translate(90,245)">
    <!-- Pillar column -->
    <rect x="-35" y="0" width="70" height="80" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
    <!-- Pillar top -->
    <rect x="-40" y="-5" width="80" height="10" rx="3" fill="#1565C0"/>
    <text x="0" y="2" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Изменчивость</text>
    <!-- Variation icon: different shapes -->
    <circle cx="-12" cy="25" r="7" fill="#42A5F5"/>
    <rect x="2" y="18" width="12" height="12" rx="2" fill="#64B5F6"/>
    <polygon points="20,18 26,30 14,30" fill="#90CAF9"/>
    <text x="0" y="52" text-anchor="middle" fill="#0D47A1" font-size="7">Особи одного</text>
    <text x="0" y="62" text-anchor="middle" fill="#0D47A1" font-size="7">вида отличаются</text>
    <text x="0" y="72" text-anchor="middle" fill="#0D47A1" font-size="7">друг от друга</text>
  </g>

  <!-- Pillar 2: Отбор -->
  <g transform="translate(250,245)">
    <rect x="-35" y="0" width="70" height="80" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
    <rect x="-40" y="-5" width="80" height="10" rx="3" fill="#1565C0"/>
    <text x="0" y="2" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Естественный отбор</text>
    <!-- Selection icon: sieve/filter -->
    <path d="M-15,18 L15,18 L8,32 L-8,32Z" fill="#42A5F5" stroke="#1565C0" stroke-width="0.8"/>
    <line x1="-10" y1="23" x2="10" y2="23" stroke="#0D47A1" stroke-width="0.5"/>
    <line x1="-8" y1="28" x2="8" y2="28" stroke="#0D47A1" stroke-width="0.5"/>
    <circle cx="-5" cy="20" r="2" fill="#1E88E5"/>
    <circle cx="5" cy="21" r="1.5" fill="#1E88E5"/>
    <circle cx="0" cy="22" r="1" fill="#1E88E5"/>
    <text x="0" y="52" text-anchor="middle" fill="#0D47A1" font-size="7">Выживают</text>
    <text x="0" y="62" text-anchor="middle" fill="#0D47A1" font-size="7">наиболее</text>
    <text x="0" y="72" text-anchor="middle" fill="#0D47A1" font-size="7">приспособленные</text>
  </g>

  <!-- Pillar 3: Наследственность -->
  <g transform="translate(410,245)">
    <rect x="-35" y="0" width="70" height="80" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
    <rect x="-40" y="-5" width="80" height="10" rx="3" fill="#1565C0"/>
    <text x="0" y="2" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Наследственность</text>
    <!-- DNA helix simplified -->
    <path d="M-12,18 Q0,22 12,18 Q0,26 -12,22 Q0,30 12,26" fill="none" stroke="#42A5F5" stroke-width="2"/>
    <path d="M-12,22 Q0,18 12,22 Q0,14 -12,18 Q0,10 12,14" fill="none" stroke="#1565C0" stroke-width="2"/>
    <line x1="-8" y1="18" x2="-8" y2="22" stroke="#0D47A1" stroke-width="0.8"/>
    <line x1="0" y1="20" x2="0" y2="16" stroke="#0D47A1" stroke-width="0.8"/>
    <line x1="8" y1="18" x2="8" y2="22" stroke="#0D47A1" stroke-width="0.8"/>
    <text x="0" y="52" text-anchor="middle" fill="#0D47A1" font-size="7">Признаки</text>
    <text x="0" y="62" text-anchor="middle" fill="#0D47A1" font-size="7">передаются</text>
    <text x="0" y="72" text-anchor="middle" fill="#0D47A1" font-size="7">потомкам</text>
  </g>

  <!-- Arrows between pillars -->
  <path d="M130,285 L210,285" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arrowB3)"/>
  <path d="M290,285 L370,285" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#arrowB3)"/>

  <defs>
    <marker id="arrowB3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10Z" fill="#1565C0"/>
    </marker>
  </defs>
</svg>