<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#0D47A1">Генетика и здоровье</text>
  <line x1="100" y1="40" x2="400" y2="40" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- Pedigree chart -->
  <g transform="translate(15,50)">
    <rect x="0" y="0" width="175" height="145" rx="6" fill="white" fill-opacity="0.6" stroke="#1565C0" stroke-width="1"/>
    <text x="87" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1">Родословная</text>

    <!-- Generation I -->
    <rect x="55" y="25" width="16" height="16" fill="#90CAF9" stroke="#1565C0" stroke-width="1.2"/>
    <text x="63" y="37" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">♂</text>
    <circle cx="95" cy="33" r="8" fill="#FF8A80" stroke="#C62828" stroke-width="1.2"/>
    <text x="95" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">♀</text>
    <line x1="71" y1="33" x2="87" y2="33" stroke="#1565C0" stroke-width="1"/>

    <!-- Line down -->
    <line x1="79" y1="41" x2="79" y2="55" stroke="#1565C0" stroke-width="1"/>
    <line x1="50" y1="55" x2="108" y2="55" stroke="#1565C0" stroke-width="1"/>

    <!-- Generation II -->
    <line x1="50" y1="55" x2="50" y2="65" stroke="#1565C0" stroke-width="1"/>
    <line x1="79" y1="55" x2="79" y2="65" stroke="#1565C0" stroke-width="1"/>
    <line x1="108" y1="55" x2="108" y2="65" stroke="#1565C0" stroke-width="1"/>

    <rect x="42" y="65" width="16" height="16" fill="#90CAF9" stroke="#1565C0" stroke-width="1.2"/>
    <circle cx="79" cy="73" r="8" fill="#FF8A80" stroke="#C62828" stroke-width="1.2"/>
    <rect x="100" y="65" width="16" height="16" fill="#90CAF9" stroke="#1565C0" stroke-width="1.2"/>

    <!-- Generation III -->
    <line x1="50" y1="81" x2="50" y2="95" stroke="#1565C0" stroke-width="1"/>
    <line x1="79" y1="81" x2="79" y2="95" stroke="#1565C0" stroke-width="1"/>

    <circle cx="40" cy="102" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>
    <rect x="54" y="95" width="14" height="14" fill="#FF8A80" stroke="#C62828" stroke-width="1"/>
    <circle cx="79" cy="102" r="7" fill="#FF8A80" stroke="#C62828" stroke-width="1"/>
    <rect x="89" y="95" width="14" height="14" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>

    <!-- Legend -->
    <rect x="8" y="120" width="10" height="10" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
    <text x="22" y="129" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">♂ Здоровый</text>
    <circle cx="95" cy="125" r="5" fill="#FF8A80" stroke="#C62828" stroke-width="0.8"/>
    <text x="104" y="128" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">♀ Больной</text>
  </g>

  <!-- Karyotype -->
  <g transform="translate(200,50)">
    <rect x="0" y="0" width="140" height="145" rx="6" fill="white" fill-opacity="0.6" stroke="#1565C0" stroke-width="1"/>
    <text x="70" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1">Кариотип</text>

    <!-- Chromosome pairs arranged -->
    <g transform="translate(10,24)">
      <!-- Row 1 - pairs 1-4 -->
      <g transform="translate(0,0)">
        <ellipse cx="5" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(24,0)">
        <ellipse cx="5" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(48,0)">
        <ellipse cx="5" cy="6" rx="4" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="14" cy="6" rx="4" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(72,0)">
        <ellipse cx="5" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>

      <!-- Row 2 - pairs 5-8 -->
      <g transform="translate(0,16)">
        <ellipse cx="5" cy="6" rx="3.5" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="14" cy="6" rx="3.5" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(24,16)">
        <ellipse cx="5" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(48,16)">
        <ellipse cx="5" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(72,16)">
        <ellipse cx="5" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>

      <!-- Row 3 - pairs 9-12 -->
      <g transform="translate(0,32)">
        <ellipse cx="5" cy="6" rx="3" ry="5.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="5.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(24,32)">
        <ellipse cx="5" cy="6" rx="3" ry="5.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="13" cy="6" rx="3" ry="5.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(48,32)">
        <ellipse cx="5" cy="6" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="6" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(72,32)">
        <ellipse cx="5" cy="6" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="6" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>

      <!-- Row 4 - pairs 13-16 -->
      <g transform="translate(0,47)">
        <ellipse cx="5" cy="5" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(24,47)">
        <ellipse cx="5" cy="5" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2.5" ry="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(48,47)">
        <ellipse cx="5" cy="5" rx="2" ry="4.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2" ry="4.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(72,47)">
        <ellipse cx="5" cy="5" rx="2" ry="4.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2" ry="4.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>

      <!-- Row 5 - pairs 17-20 -->
      <g transform="translate(0,61)">
        <ellipse cx="5" cy="5" rx="2" ry="4.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2" ry="4.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(24,61)">
        <ellipse cx="5" cy="5" rx="2" ry="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2" ry="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(48,61)">
        <ellipse cx="5" cy="5" rx="2" ry="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2" ry="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>
      <g transform="translate(72,61)">
        <ellipse cx="5" cy="5" rx="2" ry="3.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
        <ellipse cx="12" cy="5" rx="2" ry="3.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
      </g>

      <!-- Row 6 - sex chromosomes -->
      <g transform="translate(24,76)">
        <ellipse cx="5" cy="4" rx="2.5" ry="4.5" fill="#64B5F6" stroke="#0D47A1" stroke-width="0.8"/>
        <ellipse cx="14" cy="4" rx="2" ry="4" fill="#64B5F6" stroke="#0D47A1" stroke-width="0.8"/>
        <text x="40" y="7" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">XY ♂</text>
      </g>
    </g>
    <text x="70" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1">46 хромосом (23 пары)</text>
  </g>

  <!-- Prenatal diagnosis -->
  <g transform="translate(350,50)">
    <rect x="0" y="0" width="138" height="145" rx="6" fill="white" fill-opacity="0.6" stroke="#1565C0" stroke-width="1"/>
    <text x="69" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1">Пренатальная</text>
    <text x="69" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1">диагностика</text>

    <!-- Ultrasound icon -->
    <g transform="translate(15,38)">
      <rect x="0" y="0" width="50" height="40" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <ellipse cx="25" cy="20" rx="15" ry="12" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
      <ellipse cx="25" cy="20" rx="8" ry="6" fill="#90CAF9" opacity="0.6"/>
      <ellipse cx="25" cy="18" rx="3" ry="4" fill="#42A5F5" opacity="0.7"/>
      <text x="25" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">УЗИ</text>
    </g>

    <!-- Amniocentesis icon -->
    <g transform="translate(75,38)">
      <ellipse cx="20" cy="20" rx="18" ry="14" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <ellipse cx="20" cy="18" rx="8" ry="6" fill="#90CAF9" opacity="0.5"/>
      <line x1="20" y1="8" x2="20" y2="0" stroke="#1565C0" stroke-width="1.5"/>
      <polygon points="17,0 23,0 20,-4" fill="#1565C0"/>
      <text x="20" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">Амниоцентез</text>
    </g>

    <!-- Blood test -->
    <g transform="translate(15,80)">
      <rect x="0" y="0" width="50" height="35" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
      <path d="M15,8 L15,22 Q15,27 20,27 Q25,27 25,22 L25,8" fill="none" stroke="#C62828" stroke-width="1.5"/>
      <rect x="17" y="5" width="6" height="4" rx="1" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
      <text x="25" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">Анализ крови</text>
    </g>

    <!-- Genetic test -->
    <g transform="translate(75,80)">
      <rect x="0" y="0" width="50" height="35" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
      <path d="M10,12 Q15,8 20,12 Q25,16 30,12 Q35,8 40,12" fill="none" stroke="#0D47A1" stroke-width="1.5"/>
      <path d="M10,20 Q15,16 20,20 Q25,24 30,20 Q35,16 40,20" fill="none" stroke="#42A5F5" stroke-width="1.2"/>
      <text x="25" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">ДНК-тест</text>
    </g>
  </g>

  <!-- Genetic diseases section -->
  <g transform="translate(15,205)">
    <rect x="0" y="0" width="470" height="130" rx="6" fill="white" fill-opacity="0.5" stroke="#1565C0" stroke-width="1"/>
    <text x="235" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1">Наследственные заболевания человека</text>

    <!-- Disease cards -->
    <g transform="translate(10,28)">
      <rect x="0" y="0" width="108" height="50" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
      <text x="54" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1">Синдром Дауна</text>
      <text x="54" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">Трисомия 21</text>
      <text x="54" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">47 хромосом</text>
    </g>
    <g transform="translate(126,28)">
      <rect x="0" y="0" width="108" height="50" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
      <text x="54" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1">Гемофилия</text>
      <text x="54" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">X-сцепленный</text>
      <text x="54" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">рецессивный</text>
    </g>
    <g transform="translate(242,28)">
      <rect x="0" y="0" width="108" height="50" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
      <text x="54" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1">Дальтонизм</text>
      <text x="54" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">X-сцепленный</text>
      <text x="54" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">рецессивный</text>
    </g>
    <g transform="translate(358,28)">
      <rect x="0" y="0" width="108" height="50" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
      <text x="54" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1">Серпов. клетка</text>
      <text x="54" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">Аутосомный</text>
      <text x="54" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">неполное дом.</text>
    </g>

    <!-- Key insight -->
    <g transform="translate(10,88)">
      <rect x="0" y="0" width="456" height="30" rx="4" fill="#BBDEFB" stroke="#42A5F5" stroke-width="0.8"/>
      <text x="228" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1">Медико-генетическое консультирование</text>
      <text x="228" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">Оценка риска наследственных заболеваний → планирование семьи</text>
    </g>
  </g>

  <text x="480" y="340" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" opacity="0.6">Урок 32</text>
</svg>