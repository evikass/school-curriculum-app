<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#2E7D32" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#2E7D32"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 1: Многообразие живого мира</text>

  <!-- Central "ЖИЗНЬ" circle -->
  <circle cx="250" cy="180" r="42" fill="#1B5E20" filter="url(#shadow1)"/>
  <circle cx="250" cy="180" r="38" fill="#2E7D32" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="175" text-anchor="middle" fill="white" font-size="16" font-weight="bold">ЖИЗНЬ</text>
  <text x="250" y="192" text-anchor="middle" fill="#C8E6C9" font-size="8">LIFE</text>

  <!-- Connecting lines from center to kingdoms -->
  <line x1="218" y1="155" x2="120" y2="95" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="282" y1="155" x2="380" y2="95" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="215" y1="200" x2="95" y2="240" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="285" y1="200" x2="405" y2="240" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="250" y1="222" x2="250" y2="278" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Бактерии (top-left) -->
  <g filter="url(#shadow1)">
    <rect x="55" y="60" width="120" height="65" rx="10" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <!-- Bacteria icon - rod shape -->
    <ellipse cx="88" cy="85" rx="12" ry="6" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
    <ellipse cx="115" cy="90" rx="8" ry="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
    <circle cx="100" cy="78" r="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <text x="115" y="114" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Бактерии</text>
  </g>

  <!-- Грибы (top-right) -->
  <g filter="url(#shadow1)">
    <rect x="320" y="60" width="120" height="65" rx="10" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <!-- Mushroom icon -->
    <rect x="373" y="82" width="6" height="14" rx="2" fill="#8D6E63"/>
    <ellipse cx="376" cy="80" rx="14" ry="9" fill="#A1887F" stroke="#6D4C41" stroke-width="1"/>
    <circle cx="370" cy="78" r="2" fill="#D7CCC8"/>
    <circle cx="382" cy="76" r="1.5" fill="#D7CCC8"/>
    <text x="380" y="114" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Грибы</text>
  </g>

  <!-- Растения (bottom-left) -->
  <g filter="url(#shadow1)">
    <rect x="25" y="215" width="130" height="65" rx="10" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <!-- Plant icon -->
    <line x1="65" y1="255" x2="65" y2="232" stroke="#4CAF50" stroke-width="2"/>
    <ellipse cx="57" cy="233" rx="8" ry="5" fill="#66BB6A" transform="rotate(-30,57,233)"/>
    <ellipse cx="73" cy="238" rx="8" ry="5" fill="#66BB6A" transform="rotate(20,73,238)"/>
    <ellipse cx="65" cy="226" rx="7" ry="5" fill="#81C784"/>
    <text x="90" y="248" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Растения</text>
  </g>

  <!-- Животные (bottom-right) -->
  <g filter="url(#shadow1)">
    <rect x="340" y="215" width="130" height="65" rx="10" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <!-- Animal icon - simple cat silhouette -->
    <path d="M370,255 L370,240 L365,230 L370,235 L375,230 L370,235 L370,240 L385,245 L385,255 L382,255 L382,250 L378,255 L375,255 L375,249 L370,255 Z" fill="#FF8A65" stroke="#E64A19" stroke-width="0.8"/>
    <text x="405" y="248" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Животные</text>
  </g>

  <!-- Вирусы (bottom-center) -->
  <g filter="url(#shadow1)">
    <rect x="190" y="270" width="120" height="65" rx="10" fill="white" stroke="#E53935" stroke-width="1.5"/>
    <!-- Virus icon - geometric shape with spikes -->
    <circle cx="230" cy="290" r="8" fill="#EF9A9A" stroke="#C62828" stroke-width="1"/>
    <line x1="230" y1="282" x2="230" y2="276" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="230" cy="274" r="2" fill="#E53935"/>
    <line x1="238" y1="284" x2="243" y2="280" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="245" cy="278" r="2" fill="#E53935"/>
    <line x1="222" y1="284" x2="217" y2="280" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="215" cy="278" r="2" fill="#E53935"/>
    <line x1="237" y1="293" x2="243" y2="296" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="245" cy="297" r="2" fill="#E53935"/>
    <line x1="223" y1="293" x2="217" y2="296" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="215" cy="297" r="2" fill="#E53935"/>
    <text x="250" y="322" text-anchor="middle" fill="#C62828" font-size="11" font-weight="bold">Вирусы</text>
    <text x="250" y="332" text-anchor="middle" fill="#E57373" font-size="7">неклеточная форма</text>
  </g>

  <!-- Properties bar at bottom -->
  <rect x="10" y="338" width="480" height="3" fill="#2E7D32" rx="1"/>

  <!-- Properties labels below center -->
  <g transform="translate(250,125)">
    <rect x="-160" y="-10" width="90" height="18" rx="9" fill="#388E3C"/>
    <text x="-115" y="3" text-anchor="middle" fill="white" font-size="9">Обмен веществ</text>
  </g>
  <g transform="translate(250,135)">
    <rect x="-55" y="-10" width="60" height="18" rx="9" fill="#388E3C"/>
    <text x="-25" y="3" text-anchor="middle" fill="white" font-size="9">Рост</text>
  </g>
  <g transform="translate(250,125)">
    <rect x="60" y="-10" width="100" height="18" rx="9" fill="#388E3C"/>
    <text x="110" y="3" text-anchor="middle" fill="white" font-size="9">Размножение</text>
  </g>
</svg>