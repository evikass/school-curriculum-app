<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg14)" rx="8"/>
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A148C">Антропогенез</text>
  <text x="250" y="44" text-anchor="middle" font-size="10" fill="#6A1B9A">Эволюция человека</text>
  <line x1="140" y1="50" x2="360" y2="50" stroke="#6A1B9A" stroke-width="1"/>

  <!-- Timeline arrow -->
  <line x1="25" y1="70" x2="480" y2="70" stroke="#4A148C" stroke-width="2"/>
  <polygon points="480,70 470,65 470,75" fill="#4A148C"/>
  <text x="485" y="74" font-size="7" fill="#4A148C">→</text>

  <!-- Time labels -->
  <text x="70" y="66" text-anchor="middle" font-size="7" fill="#6A1B9A">4 млн</text>
  <text x="170" y="66" text-anchor="middle" font-size="7" fill="#6A1B9A">2 млн</text>
  <text x="270" y="66" text-anchor="middle" font-size="7" fill="#6A1B9A">500 тыс.</text>
  <text x="370" y="66" text-anchor="middle" font-size="7" fill="#6A1B9A">200 тыс.</text>
  <text x="455" y="66" text-anchor="middle" font-size="7" fill="#6A1B9A">Сейчас</text>

  <!-- Австралопитек -->
  <rect x="30" y="78" width="90" height="260" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="75" y="94" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Австрало-</text>
  <text x="75" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">питек</text>
  <!-- Small hunched figure -->
  <circle cx="75" cy="125" r="10" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <path d="M75,135 Q72,170 68,210" stroke="#5D4037" stroke-width="2" fill="none"/>
  <line x1="68" y1="150" x2="55" y2="170" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="68" y1="170" x2="55" y2="200" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="68" y1="190" x2="55" y2="210" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Brain size -->
  <circle cx="75" cy="240" r="14" fill="#CE93D8" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="75" y="243" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C">500</text>
  <text x="75" y="262" text-anchor="middle" font-size="6" fill="#6A1B9A">см³</text>
  <text x="75" y="278" text-anchor="middle" font-size="6" fill="#6A1B9A">Прямоходящий</text>
  <text x="75" y="289" text-anchor="middle" font-size="6" fill="#6A1B9A">Мозг мал</text>
  <text x="75" y="300" text-anchor="middle" font-size="6" fill="#6A1B9A">Орудий нет</text>
  <line x1="75" y1="70" x2="75" y2="78" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Homo habilis -->
  <rect x="128" y="78" width="90" height="260" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="173" y="94" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Homo</text>
  <text x="173" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">habilis</text>
  <!-- Slightly taller figure -->
  <circle cx="173" cy="120" r="11" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <path d="M173,131 Q170,165 167,205" stroke="#5D4037" stroke-width="2" fill="none"/>
  <line x1="167" y1="145" x2="155" y2="162" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="167" y1="165" x2="155" y2="190" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="167" y1="185" x2="155" y2="200" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Tool -->
  <line x1="155" y1="162" x2="148" y2="155" stroke="#795548" stroke-width="2"/>
  <polygon points="148,155 145,150 152,152" fill="#795548"/>
  <circle cx="173" cy="235" r="17" fill="#CE93D8" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="173" y="238" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C">650</text>
  <text x="173" y="258" text-anchor="middle" font-size="6" fill="#6A1B9A">см³</text>
  <text x="173" y="278" text-anchor="middle" font-size="6" fill="#6A1B9A">Первые орудия</text>
  <text x="173" y="289" text-anchor="middle" font-size="6" fill="#6A1B9A">Чопперы</text>
  <text x="173" y="300" text-anchor="middle" font-size="6" fill="#6A1B9A">Ручной рубила</text>
  <line x1="173" y1="70" x2="173" y2="78" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Homo erectus -->
  <rect x="226" y="78" width="90" height="260" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="271" y="94" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Homo</text>
  <text x="271" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">erectus</text>
  <!-- Taller upright figure -->
  <circle cx="271" cy="115" r="12" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <path d="M271,127 L269,200" stroke="#5D4037" stroke-width="2.5" fill="none"/>
  <line x1="269" y1="145" x2="255" y2="155" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="269" y1="145" x2="283" y2="155" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="269" y1="200" x2="255" y2="215" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="269" y1="200" x2="283" y2="215" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Fire -->
  <ellipse cx="283" cy="158" rx="5" ry="7" fill="#FF9800" fill-opacity="0.7"/>
  <ellipse cx="283" cy="160" rx="3" ry="4" fill="#FFC107"/>
  <circle cx="271" cy="232" r="20" fill="#CE93D8" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="271" y="235" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A148C">1000</text>
  <text x="271" y="258" text-anchor="middle" font-size="6" fill="#6A1B9A">см³</text>
  <text x="271" y="278" text-anchor="middle" font-size="6" fill="#6A1B9A">Овладел огнём</text>
  <text x="271" y="289" text-anchor="middle" font-size="6" fill="#6A1B9A">Расселение из</text>
  <text x="271" y="300" text-anchor="middle" font-size="6" fill="#6A1B9A">Африки</text>
  <line x1="271" y1="70" x2="271" y2="78" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Неандерталец -->
  <rect x="324" y="78" width="90" height="260" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="369" y="94" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Неандер-</text>
  <text x="369" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">талец</text>
  <!-- Robust figure -->
  <circle cx="369" cy="112" r="13" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <rect x="360" y="107" width="18" height="4" rx="2" fill="#8D6E63"/>
  <path d="M369,125 L367,200" stroke="#5D4037" stroke-width="3" fill="none"/>
  <line x1="367" y1="140" x2="350" y2="150" stroke="#5D4037" stroke-width="2"/>
  <line x1="367" y1="140" x2="384" y2="150" stroke="#5D4037" stroke-width="2"/>
  <line x1="367" y1="200" x2="353" y2="218" stroke="#5D4037" stroke-width="2"/>
  <line x1="367" y1="200" x2="381" y2="218" stroke="#5D4037" stroke-width="2"/>
  <!-- Spear -->
  <line x1="350" y1="150" x2="340" y2="135" stroke="#795548" stroke-width="1.5"/>
  <polygon points="340,135 338,128 344,132" fill="#795548"/>
  <circle cx="369" cy="232" r="22" fill="#CE93D8" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="369" y="235" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A148C">1400</text>
  <text x="369" y="260" text-anchor="middle" font-size="6" fill="#6A1B9A">см³</text>
  <text x="369" y="278" text-anchor="middle" font-size="6" fill="#6A1B9A">Культура, обряды</text>
  <text x="369" y="289" text-anchor="middle" font-size="6" fill="#6A1B9A">Одежда из шкур</text>
  <text x="369" y="300" text-anchor="middle" font-size="6" fill="#6A1B9A">Мозг &gt; наш</text>
  <line x1="369" y1="70" x2="369" y2="78" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Homo sapiens -->
  <rect x="420" y="78" width="70" height="260" rx="6" fill="#B39DDB" fill-opacity="0.4" stroke="#4A148C" stroke-width="2"/>
  <text x="455" y="94" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Homo</text>
  <text x="455" y="105" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">sapiens</text>
  <!-- Tall slim figure -->
  <circle cx="455" cy="112" r="11" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <path d="M455,123 L455,195" stroke="#5D4037" stroke-width="2" fill="none"/>
  <line x1="455" y1="140" x2="440" y2="150" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="455" y1="140" x2="470" y2="150" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="455" y1="195" x2="442" y2="215" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="455" y1="195" x2="468" y2="215" stroke="#5D4037" stroke-width="1.5"/>
  <circle cx="455" cy="232" r="20" fill="#CE93D8" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="455" y="235" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A148C">1350</text>
  <text x="455" y="258" text-anchor="middle" font-size="6" fill="#6A1B9A">см³</text>
  <text x="455" y="278" text-anchor="middle" font-size="6" fill="#6A1B9A">Речь, искусство</text>
  <text x="455" y="289" text-anchor="middle" font-size="6" fill="#6A1B9A">Цивилизация</text>
  <text x="455" y="300" text-anchor="middle" font-size="6" fill="#6A1B9A">40 тыс. лет</text>
  <line x1="455" y1="70" x2="455" y2="78" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Brain size growing arrow -->
  <path d="M75,305 C173,310 369,310 455,305" stroke="#7B1FA2" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <text x="250" y="345" text-anchor="middle" font-size="8" fill="#6A1B9A">Объём мозга: 500 → 650 → 1000 → 1400 → 1350 см³ | Рост → Прямохождение → Орудия → Речь → Культура</text>
</svg>