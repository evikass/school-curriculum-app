<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#9C27B0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#9C27B0" text-anchor="middle">Музыка барокко и классицизма</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Музыка — Урок 4</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#9C27B0" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#9C27B0" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Барокко (1600-1750):</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Пышность, контрасты, украшения</text>
  <text x="32" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Бах — великий полифонист</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Вивальди — «Времена года»</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Гендель — оратории</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Классицизм (1750-1820):</text>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Гармония, равновесие, ясность</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#9C27B0" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Гайдн — «отец симфонии»</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Моцарт — гений, 626 произведений</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Бетховен — от классики к романтике</text>
  <text x="262" y="148" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Отличия:</text>
  <text x="325" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Барокко — полифония, орнамент</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Классицизм — гомофония, форма</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#9C27B0" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Бах — вершина барокко</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#9C27B0" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Моцарт — вечная музыка</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Музыка · Музыка барокко и кла</text>
</svg>