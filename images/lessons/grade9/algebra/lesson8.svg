<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Дробные рациональные уравнения</text>

  <!-- Central: Fraction visual representation -->
  <rect x="130" y="52" width="240" height="105" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Структура дробного уравнения</text>
  <line x1="140" y1="76" x2="360" y2="76" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Fraction visual P(x)/Q(x) -->
  <g transform="translate(200,110)">
    <text x="0" y="-14" text-anchor="middle" fill="#0D47A1" font-size="14" font-weight="bold">P(x)</text>
    <line x1="-35" y1="-8" x2="35" y2="-8" stroke="#0D47A1" stroke-width="2.5"/>
    <text x="0" y="10" text-anchor="middle" fill="#F44336" font-size="14" font-weight="bold">Q(x)</text>
    <text x="0" y="24" text-anchor="middle" fill="#F44336" font-size="8" font-weight="bold">≠ 0</text>
  </g>

  <!-- Equals sign -->
  <text x="255" y="108" fill="#0D47A1" font-size="16" font-weight="bold">=</text>

  <!-- Right side of equation -->
  <g transform="translate(310,110)">
    <text x="0" y="-14" text-anchor="middle" fill="#0D47A1" font-size="14" font-weight="bold">R(x)</text>
    <line x1="-35" y1="-8" x2="35" y2="-8" stroke="#0D47A1" stroke-width="2.5"/>
    <text x="0" y="10" text-anchor="middle" fill="#F44336" font-size="14" font-weight="bold">S(x)</text>
    <text x="0" y="24" text-anchor="middle" fill="#F44336" font-size="8" font-weight="bold">≠ 0</text>
  </g>

  <!-- Connecting lines from fraction to ODD card -->
  <path d="M200,135 L200,142" fill="none" stroke="#F44336" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Left card: Algorithm steps -->
  <rect x="10" y="52" width="115" height="175" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="67" y="70" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Алгоритм</text>
  <line x1="18" y1="76" x2="117" y2="76" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Step 1 -->
  <circle cx="24" cy="90" r="8" fill="#0D47A1"/>
  <text x="24" y="94" text-anchor="middle" fill="white" font-size="8" font-weight="bold">1</text>
  <text x="60" y="93" fill="#0D47A1" font-size="7">Найти ОДЗ</text>
  <rect x="18" y="100" width="99" height="12" rx="6" fill="#FFEBEE" stroke="#F44336" stroke-width="0.8"/>
  <text x="67" y="109" text-anchor="middle" fill="#F44336" font-size="6" font-weight="bold">Q(x) ≠ 0</text>

  <!-- Step 2 -->
  <circle cx="24" cy="122" r="8" fill="#1565C0"/>
  <text x="24" y="126" text-anchor="middle" fill="white" font-size="8" font-weight="bold">2</text>
  <text x="68" y="125" fill="#0D47A1" font-size="7">Общий знаменатель</text>

  <!-- Step 3 -->
  <circle cx="24" cy="146" r="8" fill="#1976D2"/>
  <text x="24" y="150" text-anchor="middle" fill="white" font-size="8" font-weight="bold">3</text>
  <text x="68" y="149" fill="#0D47A1" font-size="7">Умножить на НОЗ</text>

  <!-- Step 4 -->
  <circle cx="24" cy="170" r="8" fill="#42A5F5"/>
  <text x="24" y="174" text-anchor="middle" fill="white" font-size="8" font-weight="bold">4</text>
  <text x="68" y="173" fill="#0D47A1" font-size="7">Решить целое ур-е</text>

  <!-- Step 5 -->
  <circle cx="24" cy="194" r="8" fill="#F44336"/>
  <text x="24" y="198" text-anchor="middle" fill="white" font-size="8" font-weight="bold">5</text>
  <text x="68" y="197" fill="#F44336" font-size="7" font-weight="bold">Проверка по ОДЗ!</text>
  <rect x="18" y="204" width="99" height="12" rx="6" fill="#FFEBEE" stroke="#F44336" stroke-width="0.8"/>
  <text x="67" y="213" text-anchor="middle" fill="#F44336" font-size="6" font-weight="bold">Исключить посторонние</text>

  <!-- Connecting dashed lines from algorithm to center -->
  <path d="M125,90 L130,90" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M125,150 L130,130" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M125,194 L130,160" fill="none" stroke="#F44336" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Right card: ODD (ОДЗ) visualization -->
  <rect x="377" y="52" width="113" height="105" rx="10" fill="white" stroke="#F44336" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="433" y="70" text-anchor="middle" fill="#F44336" font-size="10" font-weight="bold">ОДЗ</text>
  <line x1="385" y1="76" x2="482" y2="76" stroke="#F44336" stroke-width="0.8"/>

  <!-- Number line showing excluded points -->
  <g transform="translate(433,105)">
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#0D47A1" stroke-width="2"/>
    <polygon points="45,-3 50,0 45,3" fill="#0D47A1"/>
    <!-- Excluded points (hollow circles) -->
    <circle cx="-25" cy="0" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <circle cx="15" cy="0" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="-25" y="14" text-anchor="middle" fill="#F44336" font-size="7" font-weight="bold">a</text>
    <text x="15" y="14" text-anchor="middle" fill="#F44336" font-size="7" font-weight="bold">b</text>
    <!-- Valid regions -->
    <line x1="-45" y1="-6" x2="-30" y2="-6" stroke="#4CAF50" stroke-width="3"/>
    <line x1="-20" y1="-6" x2="10" y2="-6" stroke="#4CAF50" stroke-width="3"/>
    <line x1="20" y1="-6" x2="45" y2="-6" stroke="#4CAF50" stroke-width="3"/>
  </g>
  <text x="433" y="138" text-anchor="middle" fill="#1565C0" font-size="7">Знаменатель ≠ 0</text>
  <text x="433" y="150" text-anchor="middle" fill="#F44336" font-size="7" font-weight="bold">Точки разрыва!</text>

  <!-- Connecting dashed lines from center to ODD card -->
  <path d="M370,100 L377,100" fill="none" stroke="#F44336" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Bottom section: Example with graph -->
  <rect x="10" y="162" width="240" height="158" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="130" y="180" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Пример: 2/(x−1) = 3/(x+2)</text>
  <line x1="20" y1="186" x2="240" y2="186" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Step flow in example -->
  <rect x="20" y="192" width="220" height="20" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="130" y="206" text-anchor="middle" fill="#0D47A1" font-size="8">ОДЗ: x ≠ 1, x ≠ −2</text>

  <line x1="130" y1="214" x2="130" y2="222" stroke="#42A5F5" stroke-width="1.5"/>
  <polygon points="126,222 134,222 130,228" fill="#42A5F5"/>

  <rect x="20" y="228" width="220" height="20" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="130" y="242" text-anchor="middle" fill="#0D47A1" font-size="8">2(x+2) = 3(x−1)</text>

  <line x1="130" y1="250" x2="130" y2="258" stroke="#42A5F5" stroke-width="1.5"/>
  <polygon points="126,258 134,258 130,264" fill="#42A5F5"/>

  <rect x="20" y="264" width="220" height="20" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="130" y="278" text-anchor="middle" fill="#0D47A1" font-size="8">2x + 4 = 3x − 3 → x = 7</text>

  <line x1="130" y1="286" x2="130" y2="294" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="126,294 134,294 130,300" fill="#4CAF50"/>

  <rect x="20" y="298" width="220" height="18" rx="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="130" y="311" text-anchor="middle" fill="white" font-size="8" font-weight="bold">7 ≠ 1 и 7 ≠ −2 → x = 7 ✓</text>

  <!-- Right bottom: Extraneous roots card -->
  <rect x="260" y="162" width="230" height="158" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="375" y="180" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Посторонние корни</text>
  <line x1="270" y1="186" x2="480" y2="186" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Visual: Checkmark and X -->
  <g transform="translate(310,210)">
    <!-- Check circle -->
    <circle cx="0" cy="0" r="14" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
    <polyline points="-6,0 -2,5 7,-5" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
    <text x="20" y="4" fill="#4CAF50" font-size="8" font-weight="bold">Корень ∈ ОДЗ</text>
  </g>

  <g transform="translate(310,248)">
    <!-- X circle -->
    <circle cx="0" cy="0" r="14" fill="#FFEBEE" stroke="#F44336" stroke-width="1.5"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#F44336" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#F44336" stroke-width="2.5" stroke-linecap="round"/>
    <text x="20" y="4" fill="#F44336" font-size="8" font-weight="bold">Посторонний!</text>
  </g>

  <!-- Flow diagram -->
  <g transform="translate(375,290)">
    <rect x="-70" y="-15" width="140" height="26" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#0D47A1" font-size="7">Подставить корень в</text>
    <text x="0" y="9" text-anchor="middle" fill="#F44336" font-size="8" font-weight="bold">знаменатель ≠ 0 ?</text>
  </g>

  <!-- Connecting line from center fraction to bottom -->
  <path d="M250,157 L250,162" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1" rx="0"/>
  <rect x="0" y="330" width="500" height="10" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Проверка: подставить корни в знаменатель — исключить посторонние!</text>
</svg>