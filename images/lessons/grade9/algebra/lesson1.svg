<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Урок 1: Функция y = ax² и её график</text>

  <!-- Central parabola diagram card -->
  <g filter="url(#shadow1)">
    <rect x="20" y="55" width="220" height="200" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="130" y="73" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Графики парабол y = ax²</text>
    <line x1="30" y1="78" x2="230" y2="78" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Coordinate axes -->
    <line x1="60" y1="240" x2="220" y2="240" stroke="#666" stroke-width="1.2"/>
    <line x1="130" y1="85" x2="130" y2="248" stroke="#666" stroke-width="1.2"/>
    <!-- Arrow tips -->
    <polygon points="220,237 220,243 226,240" fill="#666"/>
    <polygon points="127,85 133,85 130,79" fill="#666"/>
    <text x="225" y="244" font-size="8" fill="#666">x</text>
    <text x="135" y="88" font-size="8" fill="#666">y</text>
    <!-- Tick marks -->
    <line x1="90" y1="238" x2="90" y2="242" stroke="#666" stroke-width="0.8"/>
    <line x1="170" y1="238" x2="170" y2="242" stroke="#666" stroke-width="0.8"/>
    <line x1="128" y1="200" x2="132" y2="200" stroke="#666" stroke-width="0.8"/>
    <line x1="128" y1="160" x2="132" y2="160" stroke="#666" stroke-width="0.8"/>
    <text x="90" y="252" font-size="7" fill="#666" text-anchor="middle">-2</text>
    <text x="170" y="252" font-size="7" fill="#666" text-anchor="middle">2</text>
    <text x="123" y="203" font-size="7" fill="#666" text-anchor="end">2</text>
    <text x="123" y="163" font-size="7" fill="#666" text-anchor="end">4</text>

    <!-- y = x² (a=1) -->
    <path d="M60,240 Q80,200 100,170 Q115,150 130,140 Q145,150 160,170 Q180,200 200,240" fill="none" stroke="#1565C0" stroke-width="2.5"/>
    <text x="198" y="196" font-size="7" fill="#1565C0" font-weight="bold">a=1</text>

    <!-- y = 2x² narrower -->
    <path d="M82,240 Q100,180 115,155 Q125,135 130,125 Q135,135 145,155 Q160,180 178,240" fill="none" stroke="#E91E63" stroke-width="2"/>
    <text x="170" y="158" font-size="7" fill="#E91E63" font-weight="bold">a=2</text>

    <!-- y = 0.5x² wider -->
    <path d="M50,240 Q75,220 100,195 Q115,178 130,165 Q145,178 160,195 Q185,220 210,240" fill="none" stroke="#4CAF50" stroke-width="2"/>
    <text x="203" y="218" font-size="7" fill="#4CAF50" font-weight="bold">a=0.5</text>

    <!-- Vertex point -->
    <circle cx="130" cy="140" r="3" fill="#F44336"/>
    <text x="138" y="137" font-size="6" fill="#F44336" font-weight="bold">(0;0)</text>

    <!-- Axis of symmetry -->
    <line x1="130" y1="85" x2="130" y2="248" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  </g>

  <!-- Connecting line: central diagram to right cards -->
  <line x1="240" y1="130" x2="260" y2="110" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="240" y1="180" x2="260" y2="195" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Properties card -->
  <g filter="url(#shadow1)">
    <rect x="260" y="55" width="220" height="95" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="370" y="73" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Свойства y = ax²</text>
    <line x1="270" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="0.5"/>
    <!-- Property items with bullet icons -->
    <circle cx="280" cy="92" r="3" fill="#1976D2"/>
    <text x="288" y="95" font-size="8" fill="#333">Область определения: D(y) = R</text>
    <circle cx="280" cy="108" r="3" fill="#1976D2"/>
    <text x="288" y="111" font-size="8" fill="#333">Вершина: (0; 0)</text>
    <circle cx="280" cy="124" r="3" fill="#1976D2"/>
    <text x="288" y="127" font-size="8" fill="#333">Ось симметрии: x = 0 (ось Oy)</text>
    <circle cx="280" cy="140" r="3" fill="#1976D2"/>
    <text x="288" y="143" font-size="8" fill="#333">Чётная функция: f(-x) = f(x)</text>
  </g>

  <!-- Direction & shape card -->
  <g filter="url(#shadow1)">
    <rect x="260" y="160" width="220" height="95" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="370" y="178" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Влияние коэффициента a</text>
    <line x1="270" y1="183" x2="470" y2="183" stroke="#42A5F5" stroke-width="0.5"/>
    <!-- Up arrow icon -->
    <polygon points="280,196 286,196 283,190" fill="#4CAF50"/>
    <text x="292" y="199" font-size="8" fill="#333">a > 0 → ветви вверх ↑</text>
    <!-- Down arrow icon -->
    <polygon points="280,214 286,214 283,220" fill="#F44336"/>
    <text x="292" y="217" font-size="8" fill="#333">a &lt; 0 → ветви вниз ↓</text>
    <!-- Width icon: double arrow -->
    <line x1="278" y1="233" x2="288" y2="233" stroke="#1976D2" stroke-width="1.5"/>
    <polygon points="278,233 281,230 281,236" fill="#1976D2"/>
    <polygon points="288,233 285,230 285,236" fill="#1976D2"/>
    <text x="292" y="236" font-size="8" fill="#333">|a| ↑ → парабола уже</text>
    <line x1="276" y1="248" x2="290" y2="248" stroke="#1976D2" stroke-width="1.5"/>
    <polygon points="276,248 279,245 279,251" fill="#1976D2"/>
    <polygon points="290,248 287,245 287,251" fill="#1976D2"/>
    <text x="296" y="251" font-size="8" fill="#333">|a| ↓ → парабола шире</text>
  </g>

  <!-- Concept pills at bottom -->
  <g transform="translate(35,280)">
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#1565C0"/>
    <text x="40" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Парабола</text>
  </g>
  <g transform="translate(125,280)">
    <rect x="0" y="0" width="90" height="20" rx="10" fill="#1976D2"/>
    <text x="45" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Вершина</text>
  </g>
  <g transform="translate(225,280)">
    <rect x="0" y="0" width="100" height="20" rx="10" fill="#0D47A1"/>
    <text x="50" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Симметрия</text>
  </g>
  <g transform="translate(335,280)">
    <rect x="0" y="0" width="110" height="20" rx="10" fill="#42A5F5"/>
    <text x="55" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Чётная функция</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="312" width="500" height="38" fill="#0D47A1" rx="0"/>
  <rect x="0" y="312" width="500" height="38" fill="#0D47A1" rx="8"/>
  <rect x="0" y="312" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="336" text-anchor="middle" fill="#90CAF9" font-size="9">Ключевая формула: y = ax² — график парабола с вершиной в начале координат</text>
</svg>