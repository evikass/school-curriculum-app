<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Уравнения, приводимые к квадратным</text>

  <!-- Central flow: substitution method visualization -->
  <rect x="120" y="52" width="260" height="178" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Метод замены переменной</text>
  <line x1="130" y1="76" x2="370" y2="76" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Step 1: Biquadratic equation -->
  <rect x="155" y="84" width="190" height="26" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="101" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ax⁴ + bx² + c = 0</text>

  <!-- Down arrow 1 -->
  <line x1="250" y1="112" x2="250" y2="128" stroke="#F44336" stroke-width="2"/>
  <polygon points="245,128 255,128 250,135" fill="#F44336"/>
  <!-- Label on arrow -->
  <rect x="260" y="112" width="60" height="16" rx="8" fill="#F44336"/>
  <text x="290" y="123" text-anchor="middle" fill="white" font-size="8" font-weight="bold">t = x²</text>

  <!-- Step 2: Quadratic in t -->
  <rect x="155" y="136" width="190" height="26" rx="8" fill="#1976D2" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="153" text-anchor="middle" fill="white" font-size="11" font-weight="bold">at² + bt + c = 0</text>

  <!-- Down arrow 2 -->
  <line x1="250" y1="164" x2="250" y2="180" stroke="#4CAF50" stroke-width="2"/>
  <polygon points="245,180 255,180 250,187" fill="#4CAF50"/>
  <!-- Label on arrow -->
  <rect x="260" y="164" width="80" height="16" rx="8" fill="#4CAF50"/>
  <text x="300" y="175" text-anchor="middle" fill="white" font-size="7" font-weight="bold">D = b²−4ac</text>

  <!-- Step 3: Find t roots -->
  <rect x="145" y="188" width="100" height="30" rx="8" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.2"/>
  <text x="195" y="200" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">t₁ ≥ 0</text>
  <text x="195" y="212" text-anchor="middle" fill="#4CAF50" font-size="7">→ x = ±√t₁</text>

  <rect x="255" y="188" width="100" height="30" rx="8" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.2"/>
  <text x="305" y="200" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">t₂ &lt; 0</text>
  <text x="305" y="212" text-anchor="middle" fill="#F44336" font-size="7">→ корней нет</text>

  <!-- Back-substitution curved arrow -->
  <path d="M140,95 C100,95 90,155 140,155" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="140,155 135,147 143,149" fill="#9C27B0"/>
  <text x="75" y="130" text-anchor="middle" fill="#9C27B0" font-size="7" font-weight="bold">обратная</text>
  <text x="75" y="140" text-anchor="middle" fill="#9C27B0" font-size="7" font-weight="bold">замена</text>

  <!-- Left card: Types of equations -->
  <rect x="10" y="52" width="105" height="178" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="62" y="70" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Типы</text>
  <line x1="18" y1="76" x2="107" y2="76" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Biquadratic pill -->
  <rect x="16" y="82" width="93" height="36" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="62" y="95" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Биквадратное</text>
  <text x="62" y="112" text-anchor="middle" fill="#1565C0" font-size="6">ax⁴+bx²+c=0</text>

  <!-- Reciprocal pill -->
  <rect x="16" y="124" width="93" height="36" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="62" y="137" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Возвратное</text>
  <text x="62" y="154" text-anchor="middle" fill="#1565C0" font-size="5">ax⁴+bx³+cx²+bx+a</text>

  <!-- Other substitution pill -->
  <rect x="16" y="166" width="93" height="36" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="62" y="179" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Замена</text>
  <text x="62" y="196" text-anchor="middle" fill="#1565C0" font-size="6">t = x + 1/x</text>

  <!-- Connecting dashed lines from left card to center -->
  <path d="M115,100 L120,100" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M115,142 L120,142" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M115,184 L120,184" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Right card: Biquadratic graph -->
  <rect x="387" y="52" width="103" height="110" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="438" y="70" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">График</text>
  <line x1="395" y1="76" x2="482" y2="76" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Mini biquadratic graph y=x^4-x^2 -->
  <g transform="translate(438,120)">
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#90CAF9" stroke-width="0.5"/>
    <line x1="0" y1="-35" x2="0" y2="25" stroke="#90CAF9" stroke-width="0.5"/>
    <path d="M-38,20 Q-25,-10 -15,-28 Q-8,-35 0,-15 Q8,-35 15,-28 Q25,-10 38,20" fill="none" stroke="#1976D2" stroke-width="2"/>
    <circle cx="-22" cy="0" r="3" fill="#F44336"/>
    <circle cx="22" cy="0" r="3" fill="#F44336"/>
    <circle cx="-35" cy="0" r="3" fill="#F44336"/>
    <circle cx="35" cy="0" r="3" fill="#F44336"/>
  </g>
  <text x="438" y="153" text-anchor="middle" fill="#1565C0" font-size="7">≤ 4 корней</text>

  <!-- Right card: Warning -->
  <rect x="387" y="170" width="103" height="60" rx="10" fill="white" stroke="#F44336" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Warning icon -->
  <g transform="translate(438,188)">
    <polygon points="0,-10 9,6 -9,6" fill="#FFC107" stroke="#F44336" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" fill="#F44336" font-size="9" font-weight="bold">!</text>
  </g>
  <text x="438" y="207" text-anchor="middle" fill="#F44336" font-size="7" font-weight="bold">t ≥ 0!</text>
  <text x="438" y="218" text-anchor="middle" fill="#1565C0" font-size="6">Если t&lt;0 — корней</text>
  <text x="438" y="226" text-anchor="middle" fill="#1565C0" font-size="6">из t не существует</text>

  <!-- Connecting dashed line from center to right card -->
  <path d="M380,100 L387,100" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M380,180 L387,195" fill="none" stroke="#F44336" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Bottom section: Step-by-step example -->
  <rect x="10" y="238" width="480" height="82" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="256" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Пример: x⁴ − 5x² + 4 = 0</text>

  <!-- Step flow -->
  <rect x="22" y="264" width="110" height="22" rx="8" fill="#0D47A1"/>
  <text x="77" y="279" text-anchor="middle" fill="white" font-size="8" font-weight="bold">x⁴−5x²+4=0</text>

  <!-- Arrow -->
  <line x1="135" y1="275" x2="150" y2="275" stroke="#F44336" stroke-width="2"/>
  <polygon points="150,271 150,279 157,275" fill="#F44336"/>

  <rect x="158" y="264" width="100" height="22" rx="8" fill="#1976D2"/>
  <text x="208" y="279" text-anchor="middle" fill="white" font-size="8" font-weight="bold">t²−5t+4=0</text>

  <!-- Arrow -->
  <line x1="261" y1="275" x2="276" y2="275" stroke="#4CAF50" stroke-width="2"/>
  <polygon points="276,271 276,279 283,275" fill="#4CAF50"/>

  <rect x="284" y="264" width="75" height="22" rx="8" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="321" y="279" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">t₁=1, t₂=4</text>

  <!-- Arrow -->
  <line x1="362" y1="275" x2="377" y2="275" stroke="#9C27B0" stroke-width="2"/>
  <polygon points="377,271 377,279 384,275" fill="#9C27B0"/>

  <rect x="384" y="264" width="96" height="22" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="432" y="279" text-anchor="middle" fill="white" font-size="8" font-weight="bold">x=±1, ±2</text>

  <!-- Answer check marks -->
  <text x="77" y="300" text-anchor="middle" fill="#0D47A1" font-size="6">биквадратное</text>
  <text x="208" y="300" text-anchor="middle" fill="#0D47A1" font-size="6">замена t=x²</text>
  <text x="321" y="300" text-anchor="middle" fill="#0D47A1" font-size="6">D=9, оба ≥0 ✓</text>
  <text x="432" y="300" text-anchor="middle" fill="#4CAF50" font-size="6" font-weight="bold">4 корня ✓</text>

  <!-- Connecting dashed lines from bottom to center -->
  <path d="M250,238 L250,230" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1" rx="0"/>
  <rect x="0" y="330" width="500" height="10" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Замена t = x² сводит биквадратное уравнение к квадратному</text>
</svg>