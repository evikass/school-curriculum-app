<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7986CB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.3"/>
  <!-- Corner decorations -->
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#3F51B5" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#3F51B5" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Геометрическая прогрессия</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Алгебра — Урок 6</text>
  <line x1="30" y1="70" x2="470" y2="70" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="67" width="60" height="5" fill="#5C6BC0" opacity="0.18" rx="1"/>
  <rect x="410" y="67" width="60" height="5" fill="#3F51B5" opacity="0.12" rx="1"/>

  <!-- Illustration area -->
  <rect x="15" y="76" width="470" height="222" rx="6" fill="#E8EAF6" opacity="0.4"/>

  <!-- Growing geometric progression: 2, 6, 18, 54 -->
  <!-- Scale: max bar height ~ 180px for 54, so factor = 180/54 = 3.33 px/unit -->
  <rect x="35" y="262" width="42" height="7" rx="2" fill="#5C6BC0" opacity="0.9"/>
  <text x="56" y="278" font-family="Arial,sans-serif" font-size="10" fill="#5C6BC0" text-anchor="middle">2</text>
  <text x="56" y="257" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">b₁</text>

  <rect x="87" y="242" width="42" height="27" rx="2" fill="#5C6BC0" opacity="0.8"/>
  <text x="108" y="260" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">6</text>
  <text x="108" y="250" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">b₂</text>

  <rect x="139" y="162" width="42" height="107" rx="2" fill="#5C6BC0" opacity="0.7"/>
  <text x="160" y="220" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">18</text>
  <text x="160" y="177" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">b₃</text>

  <rect x="191" y="82" width="42" height="187" rx="2" fill="#5C6BC0" opacity="0.55"/>
  <text x="212" y="180" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">54</text>
  <text x="212" y="97" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">b₄</text>

  <!-- q arrows -->
  <line x1="77" y1="265" x2="87" y2="255" stroke="#E91E63" stroke-width="1.5"/>
  <text x="86" y="249" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">×q</text>
  <line x1="129" y1="255" x2="139" y2="215" stroke="#E91E63" stroke-width="1.5"/>
  <text x="138" y="208" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">×q</text>
  <line x1="181" y1="210" x2="191" y2="160" stroke="#E91E63" stroke-width="1.5"/>
  <text x="190" y="153" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">×q</text>

  <!-- Exponential curve overlay -->
  <path d="M56,262 Q80,260 108,242 Q140,200 160,162 Q185,100 212,82" fill="none" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- q label -->
  <text x="125" y="88" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" font-weight="bold" text-anchor="middle">q = 3</text>
  <text x="125" y="100" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">(знаменатель)</text>

  <!-- Formulas box -->
  <rect x="250" y="82" width="228" height="105" rx="5" fill="white" opacity="0.92" stroke="#5C6BC0" stroke-width="1"/>
  <text x="364" y="99" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Формулы:</text>
  <line x1="260" y1="104" x2="468" y2="104" stroke="#5C6BC0" stroke-width="0.5" opacity="0.4"/>
  <text x="260" y="120" font-family="Arial,sans-serif" font-size="11" fill="#333">bₙ = b₁ · qⁿ⁻¹</text>
  <text x="260" y="137" font-family="Arial,sans-serif" font-size="11" fill="#333">q = bₙ₊₁ / bₙ</text>
  <text x="260" y="154" font-family="Arial,sans-serif" font-size="10" fill="#333">Sₙ = b₁(qⁿ-1)/(q-1)</text>
  <text x="260" y="171" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">S = b₁/(1-q), |q|&lt;1</text>
  <text x="260" y="184" font-family="Arial,sans-serif" font-size="8" fill="#888">(сумма бесконечной прогр.)</text>

  <!-- Infinite sum example: 8, 4, 2, 1, 0.5... -->
  <rect x="250" y="195" width="228" height="80" rx="5" fill="white" opacity="0.92" stroke="#4CAF50" stroke-width="1"/>
  <text x="364" y="212" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4CAF50" text-anchor="middle">Бесконечная сумма:</text>
  <line x1="260" y1="217" x2="468" y2="217" stroke="#4CAF50" stroke-width="0.5" opacity="0.4"/>
  <text x="260" y="233" font-family="Arial,sans-serif" font-size="10" fill="#333">8, 4, 2, 1, 0.5, ... (q=0.5)</text>
  <text x="260" y="249" font-family="Arial,sans-serif" font-size="10" fill="#333">S = 8/(1-0.5) = 16</text>
  <text x="260" y="265" font-family="Arial,sans-serif" font-size="9" fill="#888">Сумма стремится к 16</text>

  <!-- Property -->
  <rect x="25" y="258" width="210" height="32" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="0.6"/>
  <text x="130" y="272" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">bₙ² = bₙ₋₁ · bₙ₊₁</text>
  <text x="130" y="285" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">(квадрат среднего = произведение соседних)</text>

  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#5C6BC0" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#5C6BC0" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра — 9 класс</text>
</svg>