<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Уравнение с двумя переменными и его график</text>

  <!-- Card 1: Coordinate plane with linear equation y = 2x + 1 -->
  <rect x="15" y="52" width="225" height="130" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="127" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Линейное уравнение</text>
  <!-- Mini coordinate plane -->
  <line x1="45" y1="160" x2="210" y2="160" stroke="#90CAF9" stroke-width="1"/>
  <line x1="127" y1="82" x2="127" y2="172" stroke="#90CAF9" stroke-width="1"/>
  <polygon points="210,160 205,157 205,163" fill="#90CAF9"/>
  <polygon points="127,82 124,87 130,87" fill="#90CAF9"/>
  <text x="213" y="164" fill="#64B5F6" font-size="9">x</text>
  <text x="131" y="86" fill="#64B5F6" font-size="9">y</text>
  <!-- Grid lines -->
  <line x1="72" y1="82" x2="72" y2="172" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="99" y1="82" x2="99" y2="172" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="154" y1="82" x2="154" y2="172" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="181" y1="82" x2="181" y2="172" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="35" y1="140" x2="210" y2="140" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="35" y1="120" x2="210" y2="120" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="35" y1="100" x2="210" y2="100" stroke="#E3F2FD" stroke-width="0.5"/>
  <!-- Line y = 2x + 1 (mapped: origin at 127,160, scale ~20px per unit) -->
  <line x1="52" y1="138" x2="192" y2="90" stroke="#0D47A1" stroke-width="2"/>
  <!-- Points on the line -->
  <circle cx="127" cy="120" r="3" fill="#1976D2"/>
  <circle cx="87" cy="140" r="3" fill="#1976D2"/>
  <circle cx="167" cy="100" r="3" fill="#1976D2"/>
  <text x="68" y="152" fill="#1565C0" font-size="8">(-2;-3)</text>
  <text x="130" y="116" fill="#1565C0" font-size="8">(0;1)</text>
  <text x="170" y="96" fill="#1565C0" font-size="8">(2;5)</text>
  <text x="127" y="177" text-anchor="middle" fill="#1565C0" font-size="10" font-style="italic">y = 2x + 1</text>

  <!-- Card 2: Circle equation -->
  <rect x="260" y="52" width="225" height="130" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Окружность</text>
  <!-- Mini coordinate plane -->
  <line x1="288" y1="155" x2="448" y2="155" stroke="#90CAF9" stroke-width="1"/>
  <line x1="368" y1="82" x2="368" y2="172" stroke="#90CAF9" stroke-width="1"/>
  <polygon points="448,155 443,152 443,158" fill="#90CAF9"/>
  <polygon points="368,82 365,87 371,87" fill="#90CAF9"/>
  <!-- Grid -->
  <line x1="320" y1="82" x2="320" y2="172" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="416" y1="82" x2="416" y2="172" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="280" y1="115" x2="450" y2="115" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="280" y1="135" x2="450" y2="135" stroke="#E3F2FD" stroke-width="0.5"/>
  <!-- Circle -->
  <circle cx="368" cy="128" r="30" fill="none" stroke="#0D47A1" stroke-width="2"/>
  <!-- Center point -->
  <circle cx="368" cy="128" r="2.5" fill="#1976D2"/>
  <!-- Radius line -->
  <line x1="368" y1="128" x2="398" y2="128" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="381" y="124" fill="#42A5F5" font-size="8">r</text>
  <text x="372" y="177" text-anchor="middle" fill="#1565C0" font-size="10" font-style="italic">x² + y² = r²</text>

  <!-- Card 3: Hyperbola -->
  <rect x="15" y="195" width="225" height="125" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="127" y="213" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Гипербола</text>
  <!-- Mini coordinate plane -->
  <line x1="35" y1="268" x2="220" y2="268" stroke="#90CAF9" stroke-width="1"/>
  <line x1="127" y1="222" x2="127" y2="310" stroke="#90CAF9" stroke-width="1"/>
  <polygon points="220,268 215,265 215,271" fill="#90CAF9"/>
  <polygon points="127,222 124,227 130,227" fill="#90CAF9"/>
  <!-- Hyperbola branches (y = k/x, k>0) -->
  <path d="M 137,226 Q 155,235 175,260 Q 185,275 195,298" fill="none" stroke="#0D47A1" stroke-width="2"/>
  <path d="M 117,310 Q 107,290 97,275 Q 80,250 62,236 Q 50,228 40,226" fill="none" stroke="#0D47A1" stroke-width="2"/>
  <!-- Asymptotes dashed -->
  <line x1="35" y1="310" x2="220" y2="222" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="127" y="317" text-anchor="middle" fill="#1565C0" font-size="10" font-style="italic">y = k/x</text>

  <!-- Card 4: Concept pills -->
  <rect x="260" y="195" width="225" height="125" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="213" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Виды графиков</text>
  <!-- Pill 1 -->
  <rect x="275" y="224" width="90" height="22" rx="10" fill="#1565C0"/>
  <text x="320" y="239" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Прямая</text>
  <!-- Pill 2 -->
  <rect x="375" y="224" width="95" height="22" rx="10" fill="#1976D2"/>
  <text x="422" y="239" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Парабола</text>
  <!-- Pill 3 -->
  <rect x="275" y="256" width="90" height="22" rx="10" fill="#42A5F5"/>
  <text x="320" y="271" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Гипербола</text>
  <!-- Pill 4 -->
  <rect x="375" y="256" width="95" height="22" rx="10" fill="#0D47A1"/>
  <text x="422" y="271" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Окружность</text>
  <!-- Dashed connecting lines from pills to central idea -->
  <line x1="320" y1="246" x2="340" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="422" y1="246" x2="400" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="320" y1="278" x2="340" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="422" y1="278" x2="400" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Central concept -->
  <rect x="325" y="290" width="95" height="22" rx="10" fill="#0D47A1"/>
  <text x="372" y="305" text-anchor="middle" fill="white" font-size="9" font-weight="bold">ax + by = c</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">График уравнения — множество точек координатной плоскости</text>
</svg>