<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#8D6E63" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#8D6E63" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#8D6E63" text-anchor="middle">Свобода и ответственность</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Обществознание — Урок 3</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#8D6E63" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#8D6E63" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" font-weight="bold">Свобода —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">возможность выбирать и действовать</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" font-weight="bold">Виды:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Политическая — права и свободы</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Экономическая — выбор деятельности</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Личная — образ жизни</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" font-weight="bold">Границы:</text>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Свобода одного заканчивается</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#8D6E63" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">там, где начинается свобода другого</text>
  <text x="262" y="108" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" font-weight="bold">Ответственность:</text>
  <text x="325" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Обязанность отвечать за свои поступки</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Юридическая — закон</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Моральная — совесть</text>
  <text x="262" y="168" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" font-weight="bold">Баланс:</text>
  <text x="325" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Больше свободы = больше ответственности</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#8D6E63" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Свобода ≠ вседозволенность</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#8D6E63" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Свобода и ответственность — две стороны одной медали</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Обществознание · Свобода и ответствен</text>
</svg>