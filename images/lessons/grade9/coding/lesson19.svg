<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#00897B" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00897B" text-anchor="middle">Обработка событий</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Программирование — Урок 19</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#00897B" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#004D40" font-weight="bold">Событие —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">действие пользователя</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#004D40" font-weight="bold">Типы:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Клик мыши, нажатие клавиши</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Движение мыши, фокус</text>
  <text x="22" y="148" font-family="Arial,sans-serif" font-size="10" fill="#004D40" font-weight="bold">Привязка:</text>
  <text x="85" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">button.bind('&lt;Button-1&gt;', handler)</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">root.bind('&lt;Return&gt;', on_enter)</text>
  <text x="32" y="188" font-family="Arial,sans-serif" font-size="10" fill="#333">widget.bind('&lt;Key&gt;', on_key)</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#00897B" opacity="0.05"/>
  <text x="262" y="88" font-family="Arial,sans-serif" font-size="10" fill="#004D40" font-weight="bold">Обработчик:</text>
  <text x="325" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">def handler(event):</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">  print(event.x, event.y)</text>
  <text x="262" y="128" font-family="Arial,sans-serif" font-size="10" fill="#004D40" font-weight="bold">Объект event:</text>
  <text x="325" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">event.x, event.y — координаты</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">event.keysym — клавиша</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">event.widget — виджет</text>
  <text x="262" y="188" font-family="Arial,sans-serif" font-size="10" fill="#004D40" font-weight="bold">Цикл:</text>
  <text x="325" y="188" font-family="Arial,sans-serif" font-size="10" fill="#333">mainloop() ожидает события</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#00897B" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#004D40" text-anchor="middle" font-weight="bold">Событие → Обработчик → Реакция</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#00897B" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#004D40" text-anchor="middle" font-weight="bold">bind() — связывает событие и функцию</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Программирование · Обработка событий</text>
</svg>