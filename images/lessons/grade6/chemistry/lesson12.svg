<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f0e8"/>
      <stop offset="100%" stop-color="#b0d0c0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="340" fill="url(#bg12)" rx="12"/>
  <rect x="8" y="8" width="464" height="324" fill="none" stroke="#508060" stroke-width="1.5" rx="8" stroke-dasharray="4,3"/>
  <text x="240" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a4a30" font-family="serif">Химические формулы</text>
  <!-- Formula breakdown: H2SO4 -->
  <rect x="20" y="45" width="440" height="105" rx="6" fill="#e8f0e8" stroke="#508060" stroke-width="1"/>
  <text x="240" y="65" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a4a30">Разбор формулы H2SO4</text>
  <!-- H2 -->
  <rect x="40" y="75" width="60" height="60" rx="4" fill="#d0e8f0" stroke="#5080a0" stroke-width="1.5"/>
  <text x="70" y="100" text-anchor="middle" font-size="28" font-weight="bold" fill="#306880">H</text>
  <text x="93" y="85" font-size="14" fill="#306880">2</text>
  <text x="70" y="130" text-anchor="middle" font-size="7" fill="#507090">Водород: 2 атома</text>
  <text x="70" y="140" text-anchor="middle" font-size="6" fill="#507090">Ar(H)=1</text>
  <!-- S -->
  <rect x="115" y="75" width="55" height="60" rx="4" fill="#f0e8a0" stroke="#a09030" stroke-width="1.5"/>
  <text x="142" y="100" text-anchor="middle" font-size="28" font-weight="bold" fill="#6a5a20">S</text>
  <text x="142" y="130" text-anchor="middle" font-size="7" fill="#6a5a20">Сера: 1 атом</text>
  <text x="142" y="140" text-anchor="middle" font-size="6" fill="#6a5a20">Ar(S)=32</text>
  <!-- O4 -->
  <rect x="185" y="75" width="65" height="60" rx="4" fill="#f0d0d0" stroke="#a06060" stroke-width="1.5"/>
  <text x="210" y="100" text-anchor="middle" font-size="28" font-weight="bold" fill="#703030">O</text>
  <text x="240" y="85" font-size="14" fill="#703030">4</text>
  <text x="217" y="130" text-anchor="middle" font-size="7" fill="#703030">Кислород: 4 атома</text>
  <text x="217" y="140" text-anchor="middle" font-size="6" fill="#703030">Ar(O)=16</text>
  <!-- Calculation -->
  <rect x="270" y="75" width="175" height="60" rx="4" fill="#f0f0e0" stroke="#a0a060" stroke-width="1"/>
  <text x="357" y="92" text-anchor="middle" font-size="8" font-weight="bold" fill="#5a5020">Mr(H2SO4) = ?</text>
  <text x="290" y="106" font-size="7" fill="#5a5020">= 2 × Ar(H) + Ar(S) + 4 × Ar(O)</text>
  <text x="290" y="118" font-size="7" fill="#5a5020">= 2 × 1 + 32 + 4 × 16</text>
  <text x="290" y="130" font-size="8" font-weight="bold" fill="#2a4a20">= 2 + 32 + 64 = 98</text>
  <!-- More formula examples -->
  <rect x="20" y="160" width="440" height="80" rx="5" fill="#e8f0e8" stroke="#508060" stroke-width="1"/>
  <text x="240" y="178" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a4a30">Примеры формул</text>
  <!-- H2O -->
  <rect x="30" y="185" width="75" height="45" rx="3" fill="#d0e8f0" stroke="#5080a0" stroke-width="1"/>
  <text x="67" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#306880">H2O</text>
  <text x="67" y="218" text-anchor="middle" font-size="7" fill="#507090">Mr = 18</text>
  <!-- CO2 -->
  <rect x="115" y="185" width="75" height="45" rx="3" fill="#f0d0d0" stroke="#a06060" stroke-width="1"/>
  <text x="152" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#703030">CO2</text>
  <text x="152" y="218" text-anchor="middle" font-size="7" fill="#703030">Mr = 44</text>
  <!-- NaCl -->
  <rect x="200" y="185" width="75" height="45" rx="3" fill="#e8e0f0" stroke="#8060a0" stroke-width="1"/>
  <text x="237" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a2a6a">NaCl</text>
  <text x="237" y="218" text-anchor="middle" font-size="7" fill="#6a4a8a">Mr = 58.5</text>
  <!-- Fe2O3 -->
  <rect x="285" y="185" width="75" height="45" rx="3" fill="#e8dcc8" stroke="#906080" stroke-width="1"/>
  <text x="322" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#604060">Fe2O3</text>
  <text x="322" y="218" text-anchor="middle" font-size="7" fill="#604060">Mr = 160</text>
  <!-- CaCO3 -->
  <rect x="370" y="185" width="80" height="45" rx="3" fill="#e0e8d0" stroke="#608050" stroke-width="1"/>
  <text x="410" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a5a20">CaCO3</text>
  <text x="410" y="218" text-anchor="middle" font-size="7" fill="#4a7a3a">Mr = 100</text>
  <!-- Index vs coefficient -->
  <rect x="20" y="250" width="210" height="75" rx="5" fill="#f0f0e0" stroke="#a0a060" stroke-width="1"/>
  <text x="125" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#5a5020">Индекс vs Коэффициент</text>
  <text x="35" y="285" font-size="10" fill="#2a4a20">2H2O</text>
  <text x="35" y="298" font-size="7" fill="#5a5020">2 — коэффициент (2 молекулы)</text>
  <text x="35" y="310" font-size="7" fill="#5a5020">H2 — индекс (2 атома H в молекуле)</text>
  <text x="35" y="322" font-size="7" fill="#5a5020">Итог: 4 атома H, 2 атома O</text>
  <!-- Mass fraction -->
  <rect x="245" y="250" width="215" height="75" rx="5" fill="#e8f0e8" stroke="#508060" stroke-width="1"/>
  <text x="352" y="268" text-anchor="middle" font-size="9" font-weight="bold" fill="#2a4a30">Массовая доля элемента</text>
  <text x="260" y="285" font-size="8" fill="#2a4a30">w(H) в H2O:</text>
  <text x="260" y="298" font-size="7" fill="#4a7a3a">= 2×Ar(H) / Mr(H2O)</text>
  <text x="260" y="310" font-size="7" fill="#4a7a3a">= 2×1 / 18 = 0.111 = 11.1%</text>
  <text x="260" y="322" font-size="7" fill="#4a7a3a">w(O) = 16/18 = 88.9%</text>
</svg>
