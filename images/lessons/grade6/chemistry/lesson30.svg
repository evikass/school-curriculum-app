<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle">Индикаторы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 30</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#7B1FA2" stroke-width="1" opacity="0.3"/>

<!-- Column headers -->
<text x="100" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Среда</text>
<text x="230" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Лакмус</text>
<text x="340" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Фенолфталеин</text>
<text x="445" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Метилоранж</text>

<!-- Row 1: Acidic -->
<!-- Test tube - acid - red litmus -->
<rect x="55" y="82" width="90" height="40" rx="5" fill="#FFCDD2" stroke="#7B1FA2" stroke-width="1"/>
<text x="100" y="105" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C" text-anchor="middle" font-weight="bold">Кислая</text>
<text x="100" y="118" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(H⁺)</text>

<!-- Litmus in acid - RED -->
<rect x="195" y="82" width="70" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="200" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<rect x="216" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<rect x="232" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<rect x="248" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<text x="230" y="100" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold" text-anchor="middle">КРАСНЫЙ</text>

<!-- Phenolphthalein in acid - COLORLESS -->
<rect x="300" y="82" width="80" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="310" y="87" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<rect x="326" y="87" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<rect x="342" y="87" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<rect x="358" y="87" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<text x="340" y="108" font-family="Arial,sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">БЕСЦВ.</text>

<!-- Methyl orange in acid - RED -->
<rect x="405" y="82" width="80" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="415" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<rect x="431" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<rect x="447" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<rect x="463" y="87" width="12" height="35" rx="2" fill="#F44336"/>
<text x="445" y="100" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold" text-anchor="middle">КРАСН.</text>

<!-- Row 2: Neutral -->
<rect x="55" y="137" width="90" height="40" rx="5" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
<text x="100" y="160" font-family="Arial,sans-serif" font-size="9" fill="#4A148C" text-anchor="middle" font-weight="bold">Нейтральная</text>
<text x="100" y="173" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(H₂O)</text>

<!-- Litmus neutral - PURPLE -->
<rect x="195" y="137" width="70" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="200" y="142" width="12" height="35" rx="2" fill="#9C27B0"/>
<rect x="216" y="142" width="12" height="35" rx="2" fill="#9C27B0"/>
<rect x="232" y="142" width="12" height="35" rx="2" fill="#9C27B0"/>
<rect x="248" y="142" width="12" height="35" rx="2" fill="#9C27B0"/>
<text x="230" y="163" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold" text-anchor="middle">ФИОЛЕТ.</text>

<!-- Phenolphthalein neutral - COLORLESS -->
<rect x="300" y="137" width="80" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="310" y="142" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<rect x="326" y="142" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<rect x="342" y="142" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<rect x="358" y="142" width="12" height="35" rx="2" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
<text x="340" y="163" font-family="Arial,sans-serif" font-size="7" fill="#9E9E9E" text-anchor="middle">БЕСЦВ.</text>

<!-- Methyl orange neutral - ORANGE -->
<rect x="405" y="137" width="80" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="415" y="142" width="12" height="35" rx="2" fill="#FF9800"/>
<rect x="431" y="142" width="12" height="35" rx="2" fill="#FF9800"/>
<rect x="447" y="142" width="12" height="35" rx="2" fill="#FF9800"/>
<rect x="463" y="142" width="12" height="35" rx="2" fill="#FF9800"/>
<text x="445" y="163" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold" text-anchor="middle">ОРАНЖ.</text>

<!-- Row 3: Basic -->
<rect x="55" y="192" width="90" height="40" rx="5" fill="#BBDEFB" stroke="#7B1FA2" stroke-width="1"/>
<text x="100" y="215" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold">Щелочная</text>
<text x="100" y="228" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(OH⁻)</text>

<!-- Litmus in base - BLUE -->
<rect x="195" y="192" width="70" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="200" y="197" width="12" height="35" rx="2" fill="#1565C0"/>
<rect x="216" y="197" width="12" height="35" rx="2" fill="#1565C0"/>
<rect x="232" y="197" width="12" height="35" rx="2" fill="#1565C0"/>
<rect x="248" y="197" width="12" height="35" rx="2" fill="#1565C0"/>
<text x="230" y="218" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold" text-anchor="middle">СИНИЙ</text>

<!-- Phenolphthalein in base - PINK/MAGENTA -->
<rect x="300" y="192" width="80" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="310" y="197" width="12" height="35" rx="2" fill="#E91E63"/>
<rect x="326" y="197" width="12" height="35" rx="2" fill="#E91E63"/>
<rect x="342" y="197" width="12" height="35" rx="2" fill="#E91E63"/>
<rect x="358" y="197" width="12" height="35" rx="2" fill="#E91E63"/>
<text x="340" y="218" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold" text-anchor="middle">МАЛИН.</text>

<!-- Methyl orange in base - YELLOW -->
<rect x="405" y="192" width="80" height="45" rx="6" fill="white" stroke="#7B1FA2" stroke-width="1"/>
<rect x="415" y="197" width="12" height="35" rx="2" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.5"/>
<rect x="431" y="197" width="12" height="35" rx="2" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.5"/>
<rect x="447" y="197" width="12" height="35" rx="2" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.5"/>
<rect x="463" y="197" width="12" height="35" rx="2" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.5"/>
<text x="445" y="218" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold" text-anchor="middle">ЖЁЛТЫЙ</text>

<!-- pH Scale -->
<rect x="30" y="255" width="440" height="80" rx="8" fill="white" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
<text x="250" y="273" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Шкала pH</text>

<!-- pH bar -->
<rect x="50" y="283" width="400" height="20" rx="4" fill="none" stroke="#7B1FA2" stroke-width="1"/>
<!-- Acidic portion -->
<rect x="51" y="284" width="133" height="18" rx="3" fill="#F44336"/>
<!-- Neutral -->
<rect x="184" y="284" width="67" height="18" fill="#9C27B0"/>
<!-- Basic -->
<rect x="251" y="284" width="198" height="18" rx="3" fill="#1565C0"/>

<!-- pH numbers -->
<text x="60" y="297" font-family="Arial,sans-serif" font-size="7" fill="white">0</text>
<text x="110" y="297" font-family="Arial,sans-serif" font-size="7" fill="white">2</text>
<text x="160" y="297" font-family="Arial,sans-serif" font-size="7" fill="white">4</text>
<text x="217" y="297" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">7</text>
<text x="280" y="297" font-family="Arial,sans-serif" font-size="7" fill="white">9</text>
<text x="350" y="297" font-family="Arial,sans-serif" font-size="7" fill="white">12</text>
<text x="430" y="297" font-family="Arial,sans-serif" font-size="7" fill="white">14</text>

<text x="110" y="320" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Кислая среда</text>
<text x="217" y="320" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle">Нейтр.</text>
<text x="350" y="320" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle">Щелочная среда</text>
</svg>