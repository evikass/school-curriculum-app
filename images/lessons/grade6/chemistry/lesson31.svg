<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E1F5FE"/><stop offset="100%" stop-color="#B3E5FC"/></linearGradient>
<linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4FC3F7"/><stop offset="100%" stop-color="#0288D1"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0277BD" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">Вода — уникальное вещество</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 31</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0277BD" stroke-width="1" opacity="0.3"/>

<!-- Large water molecule H2O -->
<circle cx="135" cy="155" r="35" fill="#4FC3F7" fill-opacity="0.3" stroke="#0277BD" stroke-width="2.5"/>
<text x="135" y="153" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#01579B" text-anchor="middle">O</text>
<text x="135" y="168" font-family="Arial,sans-serif" font-size="8" fill="#0277BD" text-anchor="middle">δ⁻</text>

<!-- H atoms -->
<circle cx="85" cy="120" r="20" fill="#E1F5FE" stroke="#0277BD" stroke-width="2"/>
<text x="85" y="124" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">H</text>
<text x="85" y="137" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">δ⁺</text>

<circle cx="185" cy="120" r="20" fill="#E1F5FE" stroke="#0277BD" stroke-width="2"/>
<text x="185" y="124" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">H</text>
<text x="185" y="137" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">δ⁺</text>

<!-- Bonds -->
<line x1="103" y1="127" x2="108" y2="140" stroke="#0277BD" stroke-width="2.5"/>
<line x1="167" y1="127" x2="162" y2="140" stroke="#0277BD" stroke-width="2.5"/>

<!-- Angle label -->
<path d="M 110 145 L 135 155" fill="none" stroke="#0277BD" stroke-width="0.8" stroke-dasharray="3,2"/>
<path d="M 160 145 L 135 155" fill="none" stroke="#0277BD" stroke-width="0.8" stroke-dasharray="3,2"/>
<text x="135" y="110" font-family="Arial,sans-serif" font-size="8" fill="#0277BD" text-anchor="middle">104.5°</text>

<!-- Hydrogen bonds (dotted lines) -->
<line x1="85" y1="100" x2="50" y2="80" stroke="#0277BD" stroke-width="1" stroke-dasharray="4,3"/>
<text x="40" y="75" font-family="Arial,sans-serif" font-size="7" fill="#0277BD">H-связь</text>
<line x1="185" y1="100" x2="220" y2="80" stroke="#0277BD" stroke-width="1" stroke-dasharray="4,3"/>
<text x="230" y="75" font-family="Arial,sans-serif" font-size="7" fill="#0277BD">H-связь</text>

<!-- Formula -->
<text x="135" y="210" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#01579B" text-anchor="middle">H₂O</text>

<!-- Water drop shape -->
<path d="M 135 225 Q 115 260 135 285 Q 155 260 135 225 Z" fill="url(#waterGrad)" fill-opacity="0.5" stroke="#0277BD" stroke-width="1.5"/>

<!-- Unique properties on right side -->
<rect x="260" y="58" width="220" height="280" rx="8" fill="white" fill-opacity="0.45" stroke="#0277BD" stroke-width="1"/>
<text x="370" y="78" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#01579B" text-anchor="middle">Уникальные свойства</text>

<!-- Property 1 -->
<circle cx="280" cy="100" r="8" fill="#4FC3F7" fill-opacity="0.5" stroke="#0277BD" stroke-width="1"/>
<text x="280" y="104" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle">1</text>
<text x="295" y="104" font-family="Arial,sans-serif" font-size="9" fill="#01579B">Высокая теплоёмкость</text>

<!-- Property 2 -->
<circle cx="280" cy="130" r="8" fill="#4FC3F7" fill-opacity="0.5" stroke="#0277BD" stroke-width="1"/>
<text x="280" y="134" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle">2</text>
<text x="295" y="134" font-family="Arial,sans-serif" font-size="9" fill="#01579B">Универсальный растворитель</text>

<!-- Property 3 -->
<circle cx="280" cy="160" r="8" fill="#4FC3F7" fill-opacity="0.5" stroke="#0277BD" stroke-width="1"/>
<text x="280" y="164" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle">3</text>
<text x="295" y="164" font-family="Arial,sans-serif" font-size="9" fill="#01579B">Плотность льда &lt; плотности воды</text>

<!-- Property 4 -->
<circle cx="280" cy="190" r="8" fill="#4FC3F7" fill-opacity="0.5" stroke="#0277BD" stroke-width="1"/>
<text x="280" y="194" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle">4</text>
<text x="295" y="194" font-family="Arial,sans-serif" font-size="9" fill="#01579B">Высокое поверхностное натяжение</text>

<!-- Property 5 -->
<circle cx="280" cy="220" r="8" fill="#4FC3F7" fill-opacity="0.5" stroke="#0277BD" stroke-width="1"/>
<text x="280" y="224" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle">5</text>
<text x="295" y="224" font-family="Arial,sans-serif" font-size="9" fill="#01579B">Водородные связи</text>

<!-- Property 6 -->
<circle cx="280" cy="250" r="8" fill="#4FC3F7" fill-opacity="0.5" stroke="#0277BD" stroke-width="1"/>
<text x="280" y="254" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle">6</text>
<text x="295" y="254" font-family="Arial,sans-serif" font-size="9" fill="#01579B">3 состояния: лёд, вода, пар</text>

<!-- State diagram mini -->
<text x="290" y="280" font-family="Arial,sans-serif" font-size="8" fill="#0277BD" font-weight="bold">Агрегатные состояния:</text>
<rect x="275" y="290" width="50" height="20" rx="3" fill="#B3E5FC" stroke="#0277BD" stroke-width="0.5"/>
<text x="300" y="304" font-family="Arial,sans-serif" font-size="7" fill="#01579B" text-anchor="middle">Лёд</text>
<text x="332" y="304" font-family="Arial,sans-serif" font-size="10" fill="#0277BD">→</text>
<rect x="340" y="290" width="50" height="20" rx="3" fill="#4FC3F7" stroke="#0277BD" stroke-width="0.5"/>
<text x="365" y="304" font-family="Arial,sans-serif" font-size="7" fill="#01579B" text-anchor="middle">Вода</text>
<text x="397" y="304" font-family="Arial,sans-serif" font-size="10" fill="#0277BD">→</text>
<rect x="405" y="290" width="50" height="20" rx="3" fill="#E1F5FE" stroke="#0277BD" stroke-width="0.5"/>
<text x="430" y="304" font-family="Arial,sans-serif" font-size="7" fill="#01579B" text-anchor="middle">Пар</text>

<text x="290" y="325" font-family="Arial,sans-serif" font-size="7" fill="#0277BD">&lt; 0°C</text>
<text x="355" y="325" font-family="Arial,sans-serif" font-size="7" fill="#0277BD">0-100°C</text>
<text x="420" y="325" font-family="Arial,sans-serif" font-size="7" fill="#0277BD">&gt; 100°C</text>
</svg>