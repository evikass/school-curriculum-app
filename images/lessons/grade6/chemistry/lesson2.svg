<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e8d8"/>
      <stop offset="100%" stop-color="#d8ccb0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c840"/>
      <stop offset="100%" stop-color="#b89820"/>
    </linearGradient>
    <linearGradient id="iron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0b8"/>
      <stop offset="100%" stop-color="#787880"/>
    </linearGradient>
  </defs>
  <rect width="480" height="340" fill="url(#bg2)" rx="12"/>
  <rect x="8" y="8" width="464" height="324" fill="none" stroke="#a09070" stroke-width="1.5" rx="8" stroke-dasharray="4,3"/>
  <text x="240" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#5a4a2a" font-family="serif">Тела и вещества</text>
  <!-- Diamond (carbon allotrope) -->
  <polygon points="100,60 130,40 160,60 130,95" fill="#d8e8f8" stroke="#6888a8" stroke-width="1.5" opacity="0.8"/>
  <polygon points="100,60 130,95 130,130 100,90" fill="#c0d8e8" stroke="#6888a8" stroke-width="1"/>
  <polygon points="160,60 130,95 130,130 160,90" fill="#b8d0e0" stroke="#6888a8" stroke-width="1"/>
  <!-- Graphite (another carbon allotrope) -->
  <rect x="60" y="145" width="45" height="55" rx="3" fill="#585858" stroke="#383838" stroke-width="1.5"/>
  <line x1="65" y1="155" x2="100" y2="155" stroke="#484848" stroke-width="1"/>
  <line x1="65" y1="165" x2="100" y2="165" stroke="#484848" stroke-width="1"/>
  <line x1="65" y1="175" x2="100" y2="175" stroke="#484848" stroke-width="1"/>
  <line x1="65" y1="185" x2="100" y2="185" stroke="#484848" stroke-width="1"/>
  <text x="82" y="210" text-anchor="middle" font-size="8" fill="#484848">Графит</text>
  <text x="130" y="145" text-anchor="middle" font-size="8" fill="#5888a8">Алмаз</text>
  <!-- Arrow between them -->
  <path d="M110,130 L95,145" stroke="#8a7a5a" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="115" y="142" font-size="7" fill="#8a7a5a">C</text>
  <!-- Iron nail (physical body) -->
  <rect x="185" y="70" width="8" height="60" rx="1" fill="url(#iron)" stroke="#505058" stroke-width="1"/>
  <circle cx="189" cy="68" r="8" fill="#a0a0a8" stroke="#505058" stroke-width="1.5"/>
  <text x="189" y="145" text-anchor="middle" font-size="8" fill="#505058">Гвоздь (тело)</text>
  <text x="189" y="156" text-anchor="middle" font-size="7" fill="#707078">из железа (вещество)</text>
  <!-- Gold ring -->
  <ellipse cx="260" cy="85" rx="18" ry="14" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <ellipse cx="260" cy="85" rx="12" ry="8" fill="url(#bg2)"/>
  <text x="260" y="108" text-anchor="middle" font-size="7" fill="#8a7a20">Кольцо (тело)</text>
  <text x="260" y="119" text-anchor="middle" font-size="7" fill="#8a7a20">из золота (вещество)</text>
  <!-- Glass cup -->
  <path d="M300,65 L305,130 Q305,140 315,140 L345,140 Q355,140 355,130 L350,65" fill="#d8e8f0" stroke="#6888a8" stroke-width="1.5" opacity="0.7"/>
  <rect x="305" y="95" width="45" height="43" rx="2" fill="#a0c8e0" opacity="0.3"/>
  <text x="325" y="158" text-anchor="middle" font-size="7" fill="#5888a8">Стакан (тело)</text>
  <text x="325" y="169" text-anchor="middle" font-size="7" fill="#5888a8">из стекла (вещество)</text>
  <!-- Water molecule -->
  <circle cx="415" cy="75" r="12" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="415" y="79" text-anchor="middle" font-size="10" font-weight="bold" fill="#703030">O</text>
  <circle cx="395" cy="95" r="8" fill="#a0c8e0" stroke="#5088a0" stroke-width="1.5"/>
  <text x="395" y="99" text-anchor="middle" font-size="8" fill="#306880">H</text>
  <circle cx="435" cy="95" r="8" fill="#a0c8e0" stroke="#5088a0" stroke-width="1.5"/>
  <text x="435" y="99" text-anchor="middle" font-size="8" fill="#306880">H</text>
  <line x1="410" y1="85" x2="400" y2="90" stroke="#606060" stroke-width="2"/>
  <line x1="420" y1="85" x2="430" y2="90" stroke="#606060" stroke-width="2"/>
  <text x="415" y="115" text-anchor="middle" font-size="8" fill="#505060">H2O</text>
  <text x="415" y="126" text-anchor="middle" font-size="7" fill="#707080">Сложное вещество</text>
  <!-- O2 molecule -->
  <circle cx="415" cy="155" r="10" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="415" y="159" text-anchor="middle" font-size="8" fill="#703030">O</text>
  <circle cx="437" cy="155" r="10" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="437" y="159" text-anchor="middle" font-size="8" fill="#703030">O</text>
  <line x1="425" y1="155" x2="427" y2="155" stroke="#606060" stroke-width="2"/>
  <text x="426" y="178" text-anchor="middle" font-size="8" fill="#505060">O2</text>
  <text x="426" y="189" text-anchor="middle" font-size="7" fill="#707080">Простое вещество</text>
  <!-- Metal block -->
  <rect x="30" y="240" width="50" height="35" rx="3" fill="#b0b0b8" stroke="#686870" stroke-width="1.5"/>
  <rect x="35" y="235" width="50" height="35" rx="3" fill="#c0c0c8" stroke="#686870" stroke-width="1.5"/>
  <text x="60" y="258" text-anchor="middle" font-size="7" fill="#484850">Fe — металл</text>
  <!-- Nonmetal sulfur -->
  <path d="M140,235 L155,240 L170,235 L175,250 L165,265 L145,265 L135,250 Z" fill="#d8d040" stroke="#a09820" stroke-width="1.5"/>
  <text x="155" y="255" text-anchor="middle" font-size="7" fill="#706810">S — неметалл</text>
  <!-- Comparison arrow -->
  <line x1="100" y1="255" x2="130" y2="255" stroke="#8a7a5a" stroke-width="2"/>
  <polygon points="128,250 138,255 128,260" fill="#8a7a5a"/>
  <!-- Mixture: air -->
  <rect x="220" y="230" width="80" height="60" rx="5" fill="#e0e8f0" stroke="#6888a8" stroke-width="1.5"/>
  <text x="260" y="248" text-anchor="middle" font-size="8" fill="#3a5a7a">Воздух</text>
  <text x="260" y="260" text-anchor="middle" font-size="7" fill="#5a7a9a">N2 78%</text>
  <text x="260" y="271" text-anchor="middle" font-size="7" fill="#5a7a9a">O2 21%</text>
  <text x="260" y="282" text-anchor="middle" font-size="7" fill="#5a7a9a">Ar 1%</text>
  <text x="260" y="293" text-anchor="middle" font-size="6" fill="#8a7a5a" font-style="italic">Смесь газов</text>
  <!-- Pure substance -->
  <rect x="330" y="230" width="80" height="60" rx="5" fill="#d0e8f0" stroke="#5088a0" stroke-width="1.5"/>
  <text x="370" y="248" text-anchor="middle" font-size="8" fill="#306880">Вода H2O</text>
  <text x="370" y="265" text-anchor="middle" font-size="20" fill="#5088a0">💧</text>
  <text x="370" y="293" text-anchor="middle" font-size="6" fill="#8a7a5a" font-style="italic">Чистое вещество</text>
  <!-- Labels -->
  <text x="240" y="330" text-anchor="middle" font-size="10" fill="#5a4a2a" font-family="serif" font-style="italic">Простые и сложные вещества</text>
  <!-- Small decorative elements -->
  <circle cx="20" cy="45" r="2" fill="#c8b888" opacity="0.5"/>
  <circle cx="460" cy="45" r="2" fill="#c8b888" opacity="0.5"/>
  <circle cx="25" cy="330" r="1.5" fill="#a09868" opacity="0.4"/>
  <circle cx="455" cy="330" r="1.5" fill="#a09868" opacity="0.4"/>
  <!-- NaCl crystal structure hint -->
  <circle cx="440" cy="225" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <circle cx="455" cy="225" r="5" fill="#d0a0a0" stroke="#a06060" stroke-width="1"/>
  <circle cx="447" cy="237" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <text x="447" y="253" text-anchor="middle" font-size="6" fill="#606080">NaCl</text>
</svg>
