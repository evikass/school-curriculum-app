<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e8f8"/>
      <stop offset="100%" stop-color="#b8c8e0"/>
    </linearGradient>
    <radialGradient id="nucleus1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e0a0a0"/>
      <stop offset="100%" stop-color="#c06060"/>
    </radialGradient>
    <radialGradient id="proton1" cx="0.3" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#f08080"/>
      <stop offset="100%" stop-color="#c04040"/>
    </radialGradient>
    <radialGradient id="neutron1" cx="0.3" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#a0a0d0"/>
      <stop offset="100%" stop-color="#6868a0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="340" fill="url(#bg4)" rx="12"/>
  <rect x="8" y="8" width="464" height="324" fill="none" stroke="#6878a8" stroke-width="1.5" rx="8" stroke-dasharray="4,3"/>
  <text x="240" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#2a3860" font-family="serif">Атомы и молекулы</text>
  <!-- Large atom model center-left -->
  <circle cx="140" cy="160" r="60" fill="none" stroke="#7888b0" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <circle cx="140" cy="160" r="45" fill="none" stroke="#7888b0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="140" cy="160" r="25" fill="url(#nucleus1)" stroke="#904040" stroke-width="1.5"/>
  <!-- Protons in nucleus -->
  <circle cx="135" cy="155" r="5" fill="url(#proton1)"/>
  <circle cx="145" cy="155" r="5" fill="url(#proton1)"/>
  <circle cx="140" cy="165" r="5" fill="url(#proton1)"/>
  <text x="132" y="158" font-size="5" fill="#fff" font-weight="bold">p+</text>
  <text x="142" y="158" font-size="5" fill="#fff" font-weight="bold">p+</text>
  <text x="137" y="168" font-size="5" fill="#fff" font-weight="bold">p+</text>
  <!-- Neutrons in nucleus -->
  <circle cx="133" cy="165" r="5" fill="url(#neutron1)"/>
  <circle cx="147" cy="163" r="5" fill="url(#neutron1)"/>
  <text x="130" y="168" font-size="5" fill="#e0e0ff" font-weight="bold">n</text>
  <text x="144" y="166" font-size="5" fill="#e0e0ff" font-weight="bold">n</text>
  <!-- Electron orbits -->
  <ellipse cx="140" cy="160" rx="60" ry="22" fill="none" stroke="#5070a0" stroke-width="1.2" transform="rotate(-20,140,160)"/>
  <ellipse cx="140" cy="160" rx="60" ry="22" fill="none" stroke="#5070a0" stroke-width="1.2" transform="rotate(40,140,160)"/>
  <ellipse cx="140" cy="160" rx="60" ry="22" fill="none" stroke="#5070a0" stroke-width="1.2" transform="rotate(100,140,160)"/>
  <!-- Electrons -->
  <circle cx="100" cy="145" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <circle cx="180" cy="148" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <circle cx="135" cy="100" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <!-- Labels for atom -->
  <text x="140" y="235" text-anchor="middle" font-size="9" fill="#2a3860" font-weight="bold">Модель атома</text>
  <text x="140" y="247" text-anchor="middle" font-size="7" fill="#5070a0">p+ — протон, n — нейтрон</text>
  <text x="140" y="258" text-anchor="middle" font-size="7" fill="#5070a0">e- — электрон</text>
  <!-- Water molecule H2O -->
  <circle cx="310" cy="120" r="16" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="310" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#703030">O</text>
  <circle cx="285" cy="145" r="11" fill="#a0c8e0" stroke="#5088a0" stroke-width="1.5"/>
  <text x="285" y="149" text-anchor="middle" font-size="9" fill="#306880">H</text>
  <circle cx="335" cy="145" r="11" fill="#a0c8e0" stroke="#5088a0" stroke-width="1.5"/>
  <text x="335" y="149" text-anchor="middle" font-size="9" fill="#306880">H</text>
  <line x1="304" y1="132" x2="291" y2="139" stroke="#606060" stroke-width="2.5"/>
  <line x1="316" y1="132" x2="329" y2="139" stroke="#606060" stroke-width="2.5"/>
  <text x="310" y="170" text-anchor="middle" font-size="9" fill="#2a3860" font-weight="bold">H2O — молекула воды</text>
  <!-- CO2 molecule -->
  <circle cx="390" cy="210" r="12" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="390" y="214" text-anchor="middle" font-size="9" fill="#703030">O</text>
  <circle cx="360" cy="210" r="14" fill="#808080" stroke="#505050" stroke-width="1.5"/>
  <text x="360" y="214" text-anchor="middle" font-size="10" fill="#d0d0d0" font-weight="bold">C</text>
  <circle cx="330" cy="210" r="12" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="330" y="214" text-anchor="middle" font-size="9" fill="#703030">O</text>
  <line x1="375" y1="210" x2="382" y2="210" stroke="#606060" stroke-width="2"/>
  <line x1="345" y1="210" x2="338" y2="210" stroke="#606060" stroke-width="2"/>
  <text x="360" y="232" text-anchor="middle" font-size="9" fill="#2a3860" font-weight="bold">CO2 — углекислый газ</text>
  <!-- O2 molecule -->
  <circle cx="420" cy="280" r="10" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <circle cx="440" cy="280" r="10" fill="#e0a0a0" stroke="#a05050" stroke-width="1.5"/>
  <text x="420" y="284" text-anchor="middle" font-size="8" fill="#703030">O</text>
  <text x="440" y="284" text-anchor="middle" font-size="8" fill="#703030">O</text>
  <line x1="430" y1="280" x2="430" y2="280" stroke="#606060" stroke-width="3"/>
  <text x="430" y="300" text-anchor="middle" font-size="8" fill="#2a3860">O2 — кислород</text>
  <!-- Crystal lattice (NaCl) -->
  <rect x="20" y="270" width="90" height="55" rx="4" fill="#e8e0f0" stroke="#8878a0" stroke-width="1"/>
  <circle cx="35" cy="285" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <circle cx="55" cy="285" r="5" fill="#d0a0a0" stroke="#a06060" stroke-width="1"/>
  <circle cx="75" cy="285" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <circle cx="95" cy="285" r="5" fill="#d0a0a0" stroke="#a06060" stroke-width="1"/>
  <circle cx="45" cy="298" r="5" fill="#d0a0a0" stroke="#a06060" stroke-width="1"/>
  <circle cx="65" cy="298" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <circle cx="85" cy="298" r="5" fill="#d0a0a0" stroke="#a06060" stroke-width="1"/>
  <circle cx="35" cy="311" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <circle cx="55" cy="311" r="5" fill="#d0a0a0" stroke="#a06060" stroke-width="1"/>
  <circle cx="75" cy="311" r="5" fill="#a0a0d0" stroke="#6060a0" stroke-width="1"/>
  <text x="65" y="270" text-anchor="middle" font-size="7" fill="#505060">Кристаллическая решётка NaCl</text>
  <!-- Diffusion visualization -->
  <rect x="240" y="255" width="80" height="60" rx="4" fill="#e0e8f0" stroke="#6878a8" stroke-width="1"/>
  <circle cx="260" cy="275" r="3" fill="#d08080" opacity="0.7"/>
  <circle cx="270" cy="280" r="2.5" fill="#d08080" opacity="0.5"/>
  <circle cx="280" cy="270" r="2" fill="#d08080" opacity="0.4"/>
  <circle cx="290" cy="278" r="2" fill="#d08080" opacity="0.3"/>
  <circle cx="300" cy="272" r="1.5" fill="#d08080" opacity="0.2"/>
  <circle cx="270" cy="290" r="2" fill="#d08080" opacity="0.5"/>
  <circle cx="290" cy="295" r="1.5" fill="#d08080" opacity="0.3"/>
  <circle cx="300" cy="285" r="2" fill="#80b0d0" opacity="0.3"/>
  <circle cx="280" cy="295" r="2" fill="#80b0d0" opacity="0.5"/>
  <circle cx="260" cy="298" r="2.5" fill="#80b0d0" opacity="0.7"/>
  <circle cx="295" cy="305" r="1.5" fill="#80b0d0" opacity="0.2"/>
  <text x="280" y="320" text-anchor="middle" font-size="7" fill="#5070a0">Диффузия</text>
  <!-- Democritus quote area -->
  <rect x="170" y="258" width="60" height="55" rx="4" fill="#e8e0f0" stroke="#8878a0" stroke-width="1" opacity="0.7"/>
  <text x="200" y="275" text-anchor="middle" font-size="7" fill="#5a3860" font-style="italic">Демокрит</text>
  <text x="200" y="288" text-anchor="middle" font-size="6" fill="#7a5890">V в. до н.э.</text>
  <text x="200" y="300" text-anchor="middle" font-size="6" fill="#7a5890">«Атом» =</text>
  <text x="200" y="310" text-anchor="middle" font-size="6" fill="#7a5890">«неделимый»</text>
  <!-- Decorative -->
  <circle cx="20" cy="45" r="2" fill="#8878a8" opacity="0.5"/>
  <circle cx="460" cy="45" r="2" fill="#8878a8" opacity="0.5"/>
  <!-- Size comparison: drop of water -->
  <text x="370" y="60" text-anchor="middle" font-size="8" fill="#2a3860">В капле воды:</text>
  <text x="370" y="73" text-anchor="middle" font-size="7" fill="#5070a0">1.5 × 10²¹</text>
  <text x="370" y="85" text-anchor="middle" font-size="7" fill="#5070a0">молекул!</text>
  <ellipse cx="370" cy="100" rx="8" ry="10" fill="#90b8d8" opacity="0.6" stroke="#5088a0" stroke-width="1"/>
</svg>
