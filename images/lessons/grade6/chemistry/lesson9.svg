<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0f8"/>
      <stop offset="100%" stop-color="#c0b0d8"/>
    </linearGradient>
    <radialGradient id="nucleus" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#f0a0a0"/>
      <stop offset="100%" stop-color="#c06060"/>
    </radialGradient>
  </defs>
  <rect width="480" height="340" fill="url(#bg9)" rx="12"/>
  <rect x="8" y="8" width="464" height="324" fill="none" stroke="#8868a8" stroke-width="1.5" rx="8" stroke-dasharray="4,3"/>
  <text x="240" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#3a2860" font-family="serif">Строение атома</text>
  <!-- Large atom model -->
  <ellipse cx="150" cy="160" rx="95" ry="35" fill="none" stroke="#7060a0" stroke-width="1.2" transform="rotate(-25,150,160)" opacity="0.5"/>
  <ellipse cx="150" cy="160" rx="95" ry="35" fill="none" stroke="#7060a0" stroke-width="1.2" transform="rotate(35,150,160)" opacity="0.5"/>
  <ellipse cx="150" cy="160" rx="95" ry="35" fill="none" stroke="#7060a0" stroke-width="1.2" transform="rotate(95,150,160)" opacity="0.5"/>
  <!-- Nucleus -->
  <circle cx="150" cy="160" r="22" fill="url(#nucleus)" stroke="#904040" stroke-width="2"/>
  <!-- Protons -->
  <circle cx="143" cy="153" r="6" fill="#e06060" stroke="#a03030" stroke-width="1"/>
  <text x="143" y="156" text-anchor="middle" font-size="6" fill="#fff" font-weight="bold">p+</text>
  <circle cx="157" cy="153" r="6" fill="#e06060" stroke="#a03030" stroke-width="1"/>
  <text x="157" y="156" text-anchor="middle" font-size="6" fill="#fff" font-weight="bold">p+</text>
  <circle cx="150" cy="166" r="6" fill="#e06060" stroke="#a03030" stroke-width="1"/>
  <text x="150" y="169" text-anchor="middle" font-size="6" fill="#fff" font-weight="bold">p+</text>
  <!-- Neutrons -->
  <circle cx="140" cy="166" r="6" fill="#8080b0" stroke="#5050a0" stroke-width="1"/>
  <text x="140" y="169" text-anchor="middle" font-size="6" fill="#e0e0ff" font-weight="bold">n</text>
  <circle cx="160" cy="166" r="6" fill="#8080b0" stroke="#5050a0" stroke-width="1"/>
  <text x="160" y="169" text-anchor="middle" font-size="6" fill="#e0e0ff" font-weight="bold">n</text>
  <circle cx="150" cy="153" r="6" fill="#8080b0" stroke="#5050a0" stroke-width="1"/>
  <text x="150" y="156" text-anchor="middle" font-size="6" fill="#e0e0ff" font-weight="bold">n</text>
  <!-- Electrons -->
  <circle cx="78" cy="138" r="5" fill="#60a0e0" stroke="#3060a0" stroke-width="1.5"/>
  <text x="78" y="141" text-anchor="middle" font-size="5" fill="#fff" font-weight="bold">e-</text>
  <circle cx="222" cy="140" r="5" fill="#60a0e0" stroke="#3060a0" stroke-width="1.5"/>
  <text x="222" y="143" text-anchor="middle" font-size="5" fill="#fff" font-weight="bold">e-</text>
  <circle cx="150" cy="68" r="5" fill="#60a0e0" stroke="#3060a0" stroke-width="1.5"/>
  <text x="150" y="71" text-anchor="middle" font-size="5" fill="#fff" font-weight="bold">e-</text>
  <!-- Rutherford experiment -->
  <rect x="310" y="50" width="155" height="130" rx="6" fill="#f0e8f0" stroke="#8868a8" stroke-width="1"/>
  <text x="387" y="68" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a2860">Опыт Резерфорда</text>
  <!-- Alpha source -->
  <rect x="320" y="90" width="20" height="20" rx="3" fill="#e0a040" stroke="#a07020" stroke-width="1"/>
  <text x="330" y="104" text-anchor="middle" font-size="6" fill="#5a3a10" font-weight="bold">α</text>
  <!-- Gold foil -->
  <rect x="370" y="80" width="5" height="50" rx="1" fill="#e0c840" stroke="#a09020" stroke-width="1" opacity="0.7"/>
  <text x="372" y="140" text-anchor="middle" font-size="6" fill="#7a6a20">Au</text>
  <!-- Alpha particles paths -->
  <line x1="340" y1="100" x2="368" y2="100" stroke="#e0a040" stroke-width="1.5"/>
  <line x1="373" y1="100" x2="450" y2="100" stroke="#e0a040" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="95" x2="368" y2="95" stroke="#e0a040" stroke-width="1.5"/>
  <line x1="373" y1="95" x2="445" y2="85" stroke="#e0a040" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="105" x2="368" y2="105" stroke="#e0a040" stroke-width="1.5"/>
  <line x1="373" y1="105" x2="440" y2="115" stroke="#e0a040" stroke-width="1.5" opacity="0.4"/>
  <!-- Deflected particle -->
  <path d="M373,100 Q385,95 390,85" stroke="#d04040" stroke-width="2" fill="none"/>
  <text x="395" y="82" font-size="6" fill="#d04040">← отклон</text>
  <!-- Bounced back -->
  <path d="M373,100 Q365,98 358,105" stroke="#d04040" stroke-width="2" fill="none"/>
  <text x="350" y="115" font-size="5" fill="#d04040">← назад</text>
  <text x="387" y="160" text-anchor="middle" font-size="7" fill="#5a3860">Ядро — маленькое,</text>
  <text x="387" y="170" text-anchor="middle" font-size="7" fill="#5a3860">но массивное!</text>
  <!-- Table of particles -->
  <rect x="310" y="190" width="155" height="90" rx="4" fill="#f0e8f0" stroke="#8868a8" stroke-width="1"/>
  <text x="387" y="208" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a2860">Частицы атома</text>
  <line x1="315" y1="215" x2="460" y2="215" stroke="#8868a8" stroke-width="0.5"/>
  <text x="340" y="228" font-size="7" fill="#3a2860" font-weight="bold">Протон</text>
  <text x="400" y="228" font-size="7" fill="#5a3860">заряд +1, мас. 1</text>
  <text x="340" y="243" font-size="7" fill="#3a2860" font-weight="bold">Нейтрон</text>
  <text x="400" y="243" font-size="7" fill="#5a3860">заряд 0, мас. 1</text>
  <text x="340" y="258" font-size="7" fill="#3a2860" font-weight="bold">Электрон</text>
  <text x="400" y="258" font-size="7" fill="#5a3860">заряд -1, мас. 1/1836</text>
  <text x="387" y="275" text-anchor="middle" font-size="6" fill="#7a5890" font-style="italic">p+ = e- → атом нейтрален</text>
  <!-- Energy levels diagram (Carbon) -->
  <rect x="20" y="230" width="130" height="95" rx="4" fill="#e8e0f0" stroke="#8868a8" stroke-width="1"/>
  <text x="85" y="248" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a2860">Углерод (C): 2, 4</text>
  <!-- Level 1 -->
  <ellipse cx="85" cy="265" rx="40" ry="10" fill="none" stroke="#7060a0" stroke-width="1.2"/>
  <circle cx="75" cy="265" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <circle cx="95" cy="265" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <text x="85" y="280" text-anchor="middle" font-size="6" fill="#7060a0">1-й уровень (2e)</text>
  <!-- Level 2 -->
  <ellipse cx="85" cy="298" rx="55" ry="12" fill="none" stroke="#7060a0" stroke-width="1.2"/>
  <circle cx="50" cy="298" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <circle cx="70" cy="298" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <circle cx="90" cy="298" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <circle cx="110" cy="298" r="4" fill="#60a0e0" stroke="#3060a0" stroke-width="1"/>
  <text x="85" y="318" text-anchor="middle" font-size="6" fill="#7060a0">2-й уровень (4e)</text>
  <!-- Nucleus dot -->
  <circle cx="85" cy="265" r="3" fill="url(#nucleus)"/>
  <!-- Thomson model (historical) -->
  <rect x="170" y="230" width="120" height="95" rx="4" fill="#e8e0f0" stroke="#8868a8" stroke-width="1"/>
  <text x="230" y="248" text-anchor="middle" font-size="7" font-weight="bold" fill="#3a2860">Модель Томсона</text>
  <circle cx="230" cy="285" r="28" fill="#e0d0f0" stroke="#8868a8" stroke-width="1" opacity="0.5"/>
  <circle cx="220" cy="275" r="3" fill="#60a0e0" stroke="#3060a0" stroke-width="0.5"/>
  <circle cx="240" cy="270" r="3" fill="#60a0e0" stroke="#3060a0" stroke-width="0.5"/>
  <circle cx="225" cy="295" r="3" fill="#60a0e0" stroke="#3060a0" stroke-width="0.5"/>
  <circle cx="245" cy="290" r="3" fill="#60a0e0" stroke="#3060a0" stroke-width="0.5"/>
  <circle cx="215" cy="288" r="3" fill="#60a0e0" stroke="#3060a0" stroke-width="0.5"/>
  <text x="230" y="320" text-anchor="middle" font-size="6" fill="#7a5890">«Пудинг с изюмом» ❌</text>
  <!-- Decorative -->
  <circle cx="20" cy="45" r="2" fill="#b0a0c0" opacity="0.5"/>
  <circle cx="460" cy="45" r="2" fill="#b0a0c0" opacity="0.5"/>
</svg>
