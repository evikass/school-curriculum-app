<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle">Относительная молекулярная масса</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 18</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#7B1FA2" stroke-width="1" opacity="0.3"/>
<!-- Explanation -->
<text x="250" y="70" font-family="Arial,sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">Mr — относительная молекулярная масса = сумма Ar элементов</text>

<!-- Example 1: H₂O -->
<rect x="30" y="82" width="210" height="130" rx="8" fill="white" opacity="0.92" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="135" y="102" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A148C" text-anchor="middle">Вода — H₂O</text>
<line x1="50" y1="108" x2="220" y2="108" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>

<text x="50" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555">Ar(H) = 1</text>
<text x="150" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555">Ar(O) = 16</text>
<text x="50" y="145" font-family="Arial,sans-serif" font-size="9" fill="#4A148C">Mr(H₂O) = 2·Ar(H) + Ar(O)</text>
<text x="50" y="162" font-family="Arial,sans-serif" font-size="9" fill="#4A148C">= 2·1 + 16</text>
<text x="50" y="180" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#7B1FA2">= 18</text>

<rect x="155" y="165" width="70" height="25" rx="5" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
<text x="190" y="182" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A148C" text-anchor="middle">Mr = 18</text>

<!-- Example 2: CO₂ -->
<rect x="260" y="82" width="210" height="130" rx="8" fill="white" opacity="0.92" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="365" y="102" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A148C" text-anchor="middle">Углекислый газ — CO₂</text>
<line x1="280" y1="108" x2="450" y2="108" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>

<text x="280" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555">Ar(C) = 12</text>
<text x="380" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555">Ar(O) = 16</text>
<text x="280" y="145" font-family="Arial,sans-serif" font-size="9" fill="#4A148C">Mr(CO₂) = Ar(C) + 2·Ar(O)</text>
<text x="280" y="162" font-family="Arial,sans-serif" font-size="9" fill="#4A148C">= 12 + 2·16</text>
<text x="280" y="180" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#7B1FA2">= 44</text>

<rect x="385" y="165" width="70" height="25" rx="5" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
<text x="420" y="182" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A148C" text-anchor="middle">Mr = 44</text>
<!-- General formula -->
<rect x="40" y="225" width="420" height="55" rx="8" fill="white" opacity="0.92" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="250" y="245" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Общая формула</text>
<text x="250" y="268" font-family="Arial,sans-serif" font-size="13" fill="#7B1FA2" text-anchor="middle">Mr(AₓBᵧ) = x·Ar(A) + y·Ar(B)</text>
<!-- Quick examples -->
<text x="250" y="298" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4A148C" text-anchor="middle">Быстрый расчёт:</text>

<rect x="35" y="305" width="100" height="30" rx="5" fill="white" opacity="0.9" stroke="#7B1FA2" stroke-width="1"/>
<text x="85" y="318" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle">NaCl</text>
<text x="85" y="328" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">23+35.5 = 58.5</text>

<rect x="150" y="305" width="100" height="30" rx="5" fill="white" opacity="0.9" stroke="#7B1FA2" stroke-width="1"/>
<text x="200" y="318" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle">H₂SO₄</text>
<text x="200" y="328" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">2+32+64 = 98</text>

<rect x="265" y="305" width="100" height="30" rx="5" fill="white" opacity="0.9" stroke="#7B1FA2" stroke-width="1"/>
<text x="315" y="318" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle">Ca(OH)₂</text>
<text x="315" y="328" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">40+32+2 = 74</text>

<rect x="380" y="305" width="100" height="30" rx="5" fill="white" opacity="0.9" stroke="#7B1FA2" stroke-width="1"/>
<text x="430" y="318" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle">Fe₂O₃</text>
<text x="430" y="328" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">112+48 = 160</text>
</svg>