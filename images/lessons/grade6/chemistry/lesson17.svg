<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Относительная атомная масса</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 17</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>
<!-- Explanation -->
<text x="250" y="70" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">Ar — относительная атомная масса (безразмерная величина)</text>

<!-- Atom card: H -->
<rect x="30" y="82" width="130" height="85" rx="8" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1.5"/>
<circle cx="70" cy="108" r="18" fill="#42A5F5" opacity="0.2" stroke="#42A5F5" stroke-width="2"/>
<text x="70" y="113" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
<text x="70" y="142" font-family="Arial,sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ar(H) = 1</text>
<text x="70" y="158" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">самый лёгкий</text>

<!-- Atom card: C -->
<rect x="175" y="82" width="130" height="85" rx="8" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1.5"/>
<circle cx="215" cy="108" r="18" fill="#4CAF50" opacity="0.2" stroke="#4CAF50" stroke-width="2"/>
<text x="215" y="113" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#2E7D32" text-anchor="middle">C</text>
<text x="215" y="142" font-family="Arial,sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ar(C) = 12</text>
<text x="215" y="158" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">в 12 раз тяжелее H</text>

<!-- Atom card: O -->
<rect x="320" y="82" width="150" height="85" rx="8" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1.5"/>
<circle cx="370" cy="108" r="18" fill="#E53935" opacity="0.2" stroke="#E53935" stroke-width="2"/>
<text x="370" y="113" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#C62828" text-anchor="middle">O</text>
<text x="370" y="142" font-family="Arial,sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ar(O) = 16</text>
<text x="370" y="158" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">в 16 раз тяжелее H</text>
<!-- Scale comparison -->
<rect x="40" y="180" width="420" height="70" rx="8" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
<text x="250" y="198" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнение масс атомов (относительно атома H)</text>

<!-- Bar chart -->
<rect x="70" y="215" width="8" height="25" fill="#42A5F5" rx="1"/>
<text x="74" y="210" font-family="Arial,sans-serif" font-size="7" fill="#42A5F5" text-anchor="middle">1</text>
<text x="74" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">H</text>

<rect x="120" y="207" width="8" height="33" fill="#FF9800" rx="1"/>
<text x="124" y="203" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">12</text>
<text x="124" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">C</text>

<rect x="170" y="203" width="8" height="37" fill="#E53935" rx="1"/>
<text x="174" y="199" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">16</text>
<text x="174" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">O</text>

<rect x="220" y="197" width="8" height="43" fill="#9C27B0" rx="1"/>
<text x="224" y="193" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0" text-anchor="middle">23</text>
<text x="224" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Na</text>

<rect x="270" y="189" width="8" height="51" fill="#795548" rx="1"/>
<text x="274" y="185" font-family="Arial,sans-serif" font-size="7" fill="#795548" text-anchor="middle">32</text>
<text x="274" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">S</text>

<rect x="320" y="181" width="8" height="59" fill="#607D8B" rx="1"/>
<text x="324" y="177" font-family="Arial,sans-serif" font-size="7" fill="#607D8B" text-anchor="middle">40</text>
<text x="324" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ca</text>

<rect x="370" y="170" width="8" height="70" fill="#F44336" rx="1"/>
<text x="374" y="166" font-family="Arial,sans-serif" font-size="7" fill="#F44336" text-anchor="middle">56</text>
<text x="374" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Fe</text>
<!-- Key concept -->
<rect x="40" y="262" width="420" height="55" rx="8" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
<text x="250" y="280" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Формула:</text>
<text x="250" y="300" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Ar = m(атома) / (1/12 · m(атома C))</text>
<text x="250" y="312" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">За единицу принята 1/12 массы атома углерода</text>
</svg>