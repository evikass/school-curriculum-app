<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FBE9E7"/><stop offset="100%" stop-color="#FFCCBC"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D84315" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">Закон постоянства состава</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 20</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#D84315" stroke-width="1" opacity="0.3"/>
<!-- Law statement -->
<rect x="40" y="60" width="420" height="50" rx="8" fill="white" opacity="0.95" stroke="#D84315" stroke-width="2"/>
<text x="250" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Закон постоянства состава (Ж. Пруст, 1799)</text>
<text x="250" y="98" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Каждое химическое соединение имеет постоянный состав</text>
<!-- Water examples -->
<text x="250" y="130" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Вода всегда H₂O — независимо от источника</text>

<!-- Water drop 1: River -->
<g transform="translate(85, 180)">
  <path d="M0,-30 Q20,0 0,20 Q-20,0 0,-30 Z" fill="#42A5F5" opacity="0.5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Речная</text>
  <text x="0" y="46" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">H₂O</text>
</g>

<!-- Water drop 2: Ocean -->
<g transform="translate(210, 180)">
  <path d="M0,-30 Q20,0 0,20 Q-20,0 0,-30 Z" fill="#1565C0" opacity="0.5" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Морская</text>
  <text x="0" y="46" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">H₂O</text>
</g>

<!-- Water drop 3: Rain -->
<g transform="translate(335, 180)">
  <path d="M0,-30 Q20,0 0,20 Q-20,0 0,-30 Z" fill="#90CAF9" opacity="0.5" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Дождевая</text>
  <text x="0" y="46" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">H₂O</text>
</g>

<!-- Equal sign -->
<text x="148" y="183" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#D84315" text-anchor="middle">=</text>
<text x="273" y="183" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#D84315" text-anchor="middle">=</text>
<!-- Composition breakdown -->
<rect x="40" y="240" width="420" height="75" rx="8" fill="white" opacity="0.92" stroke="#D84315" stroke-width="1.5"/>
<text x="250" y="258" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Любая вода содержит:</text>

<!-- H atoms -->
<circle cx="90" cy="285" r="14" fill="#42A5F5" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
<text x="90" y="289" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
<text x="130" y="282" font-family="Arial,sans-serif" font-size="14" fill="#D84315" text-anchor="middle">×</text>
<circle cx="160" cy="285" r="14" fill="#42A5F5" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
<text x="160" y="289" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
<text x="195" y="282" font-family="Arial,sans-serif" font-size="14" fill="#D84315" text-anchor="middle">+</text>

<!-- O atom -->
<circle cx="230" cy="285" r="18" fill="#E53935" opacity="0.3" stroke="#C62828" stroke-width="2"/>
<text x="230" y="290" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#C62828" text-anchor="middle">O</text>

<!-- Result -->
<text x="275" y="282" font-family="Arial,sans-serif" font-size="14" fill="#D84315" text-anchor="middle">=</text>
<rect x="300" y="268" width="90" height="30" rx="5" fill="#FFCCBC" stroke="#D84315" stroke-width="1.5"/>
<text x="345" y="288" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">H₂O</text>

<text x="250" y="308" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">Соотношение H:O всегда 2:1 по числу атомов</text>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="7" fill="#D84315" text-anchor="middle" font-style="italic">Не путать с растворами — соль + вода ≠ новое соединение</text>
</svg>