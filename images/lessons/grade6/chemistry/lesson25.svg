<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FCE4EC"/><stop offset="100%" stop-color="#F8BBD0"/></linearGradient>
<linearGradient id="speedGrad" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#C2185B"/><stop offset="60%" stop-color="#F06292"/><stop offset="100%" stop-color="#FCE4EC"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C2185B" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">Скорость химических реакций</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 25</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#C2185B" stroke-width="1" opacity="0.3"/>

<!-- Speedometer / gauge -->
<circle cx="160" cy="195" r="80" fill="none" stroke="#C2185B" stroke-width="3" opacity="0.3"/>
<circle cx="160" cy="195" r="75" fill="white" fill-opacity="0.5" stroke="#C2185B" stroke-width="2"/>
<!-- Gauge arc -->
<path d="M 95 230 A 75 75 0 0 1 225 230" fill="none" stroke="#E0E0E0" stroke-width="8" stroke-linecap="round"/>
<path d="M 95 230 A 75 75 0 0 1 190 130" fill="none" stroke="url(#speedGrad)" stroke-width="8" stroke-linecap="round"/>
<!-- Needle -->
<line x1="160" y1="195" x2="185" y2="140" stroke="#880E4F" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="160" cy="195" r="6" fill="#C2185B"/>
<circle cx="160" cy="195" r="3" fill="#880E4F"/>
<!-- Speed labels on gauge -->
<text x="88" y="245" font-family="Arial,sans-serif" font-size="8" fill="#880E4F">Медленно</text>
<text x="195" y="140" font-family="Arial,sans-serif" font-size="8" fill="#880E4F">Быстро</text>
<text x="148" y="215" font-family="Arial,sans-serif" font-size="8" fill="#C2185B" font-weight="bold">v</text>

<!-- Factors list on right side -->
<rect x="280" y="65" width="200" height="270" rx="8" fill="white" fill-opacity="0.4" stroke="#C2185B" stroke-width="1" opacity="0.5"/>
<text x="380" y="85" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#880E4F" text-anchor="middle">Факторы скорости</text>

<!-- Factor 1: Temperature -->
<circle cx="300" cy="110" r="10" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.5"/>
<text x="300" y="114" font-family="Arial,sans-serif" font-size="9" fill="#880E4F" text-anchor="middle">1</text>
<text x="320" y="114" font-family="Arial,sans-serif" font-size="10" fill="#880E4F">Температура ↑ → v ↑</text>
<!-- Thermometer icon -->
<rect x="290" y="120" width="4" height="18" rx="2" fill="#F06292" stroke="#C2185B" stroke-width="0.5"/>
<circle cx="292" cy="141" r="4" fill="#C2185B"/>

<!-- Factor 2: Concentration -->
<circle cx="300" cy="160" r="10" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.5"/>
<text x="300" y="164" font-family="Arial,sans-serif" font-size="9" fill="#880E4F" text-anchor="middle">2</text>
<text x="320" y="164" font-family="Arial,sans-serif" font-size="10" fill="#880E4F">Концентрация ↑ → v ↑</text>
<!-- Concentration dots -->
<circle cx="293" cy="175" r="2" fill="#C2185B"/>
<circle cx="299" cy="172" r="2" fill="#C2185B"/>
<circle cx="305" cy="176" r="2" fill="#C2185B"/>
<circle cx="296" cy="180" r="2" fill="#C2185B"/>

<!-- Factor 3: Surface area -->
<circle cx="300" cy="205" r="10" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.5"/>
<text x="300" y="209" font-family="Arial,sans-serif" font-size="9" fill="#880E4F" text-anchor="middle">3</text>
<text x="320" y="209" font-family="Arial,sans-serif" font-size="10" fill="#880E4F">Площадь пов-ти ↑ → v ↑</text>
<!-- Powder vs chunk -->
<rect x="288" y="218" width="8" height="8" fill="#F06292" stroke="#C2185B" stroke-width="0.5"/>
<circle cx="304" cy="220" r="1.5" fill="#C2185B"/>
<circle cx="308" cy="222" r="1.5" fill="#C2185B"/>
<circle cx="304" cy="226" r="1.5" fill="#C2185B"/>
<circle cx="308" cy="226" r="1.5" fill="#C2185B"/>
<text x="292" y="236" font-family="Arial,sans-serif" font-size="6" fill="#666">кусок</text>
<text x="303" y="236" font-family="Arial,sans-serif" font-size="6" fill="#666">порошок</text>

<!-- Factor 4: Catalyst -->
<circle cx="300" cy="255" r="10" fill="#F8BBD0" stroke="#C2185B" stroke-width="1.5"/>
<text x="300" y="259" font-family="Arial,sans-serif" font-size="9" fill="#880E4F" text-anchor="middle">4</text>
<text x="320" y="259" font-family="Arial,sans-serif" font-size="10" fill="#880E4F">Катализатор → v ↑</text>
<!-- Catalyst arrow -->
<path d="M 290 270 L 306 264 L 306 268 L 318 262" fill="none" stroke="#C2185B" stroke-width="1.5" stroke-linecap="round"/>
<text x="290" y="282" font-family="Arial,sans-serif" font-size="7" fill="#666">ускоритель</text>

<!-- Reaction equation at bottom left -->
<text x="160" y="305" font-family="Arial,sans-serif" font-size="10" fill="#880E4F" text-anchor="middle" font-style="italic">v = Δc / Δt</text>
<text x="160" y="320" font-family="Arial,sans-serif" font-size="8" fill="#C2185B" text-anchor="middle">скорость = изменение концентрации / время</text>

<!-- Clock icon -->
<circle cx="60" cy="310" r="18" fill="white" fill-opacity="0.6" stroke="#C2185B" stroke-width="1.5"/>
<line x1="60" y1="310" x2="60" y2="298" stroke="#880E4F" stroke-width="1.5"/>
<line x1="60" y1="310" x2="68" y2="313" stroke="#880E4F" stroke-width="1.5"/>
<text x="60" y="340" font-family="Arial,sans-serif" font-size="7" fill="#880E4F" text-anchor="middle">Время</text>
</svg>