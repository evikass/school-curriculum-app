<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F7FA"/><stop offset="100%" stop-color="#B2EBF2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00838F" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#006064" text-anchor="middle">Уравнения химических реакций</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 22</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#00838F" stroke-width="1" opacity="0.3"/>
<!-- Definition -->
<text x="250" y="70" font-family="Arial,sans-serif" font-size="10" fill="#006064" text-anchor="middle">Уравнение реакции — условная запись химической реакции</text>

<!-- Main equation example -->
<rect x="40" y="80" width="420" height="70" rx="8" fill="white" opacity="0.95" stroke="#00838F" stroke-width="2"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Пример: Горение водорода</text>

<text x="110" y="130" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00838F" text-anchor="middle">2H₂</text>
<text x="170" y="130" font-family="Arial,sans-serif" font-size="14" fill="#006064" text-anchor="middle">+</text>
<text x="215" y="130" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00838F" text-anchor="middle">O₂</text>
<text x="270" y="130" font-family="Arial,sans-serif" font-size="16" fill="#006064" text-anchor="middle">→</text>
<text x="335" y="130" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00838F" text-anchor="middle">2H₂O</text>
<!-- Anatomy labels -->
<rect x="40" y="160" width="420" height="105" rx="8" fill="white" opacity="0.92" stroke="#00838F" stroke-width="1.5"/>
<text x="250" y="178" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Строение уравнения</text>
<line x1="60" y1="184" x2="440" y2="184" stroke="#00838F" stroke-width="0.5" opacity="0.3"/>

<!-- Reactants side -->
<rect x="60" y="192" width="150" height="60" rx="5" fill="#B2EBF2" opacity="0.4" stroke="#00838F" stroke-width="1"/>
<text x="135" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Исходные вещества</text>
<text x="135" y="225" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">(реагенты)</text>
<text x="135" y="242" font-family="Arial,sans-serif" font-size="11" fill="#00838F" text-anchor="middle">2H₂ + O₂</text>

<!-- Arrow -->
<text x="230" y="222" font-family="Arial,sans-serif" font-size="20" fill="#006064" text-anchor="middle">→</text>

<!-- Products side -->
<rect x="260" y="192" width="150" height="60" rx="5" fill="#FFCCBC" opacity="0.4" stroke="#D84315" stroke-width="1"/>
<text x="335" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Продукты реакции</text>
<text x="335" y="225" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">(результат)</text>
<text x="335" y="242" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">2H₂O</text>
<!-- Coefficient vs Index -->
<rect x="40" y="275" width="420" height="55" rx="8" fill="white" opacity="0.92" stroke="#00838F" stroke-width="1.5"/>
<text x="250" y="293" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Важно: коэффициент ≠ индекс</text>

<text x="80" y="315" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">2</text>
<text x="95" y="315" font-family="Arial,sans-serif" font-size="14" fill="#006064" text-anchor="middle">H</text>
<text x="105" y="320" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">₂</text>

<text x="130" y="315" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">← коэффициент</text>
<text x="260" y="315" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">индекс →</text>
<text x="330" y="315" font-family="Arial,sans-serif" font-size="14" fill="#006064" text-anchor="middle">H</text>
<text x="340" y="320" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">₂</text>
<text x="352" y="315" font-family="Arial,sans-serif" font-size="14" fill="#006064" text-anchor="middle">O</text>
<text x="250" y="343" font-family="Arial,sans-serif" font-size="7" fill="#00838F" text-anchor="middle" font-style="italic">Коэффициент ставится ПЕРЕД формулой, индекс — ВНУТРИ формулы (после символа)</text>
</svg>