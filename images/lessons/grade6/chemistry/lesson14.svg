<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFECB3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#F57F17" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Металлы и неметаллы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 14</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>
<!-- Metals side -->
<rect x="25" y="60" width="220" height="270" rx="8" fill="white" opacity="0.85" stroke="#F57F17" stroke-width="1.5"/>
<text x="135" y="80" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">Металлы</text>
<line x1="50" y1="86" x2="220" y2="86" stroke="#F57F17" stroke-width="0.5" opacity="0.5"/>

<!-- Metal block illustration -->
<rect x="60" y="95" width="50" height="35" rx="3" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
<rect x="62" y="97" width="20" height="15" rx="1" fill="#B0BEC5" opacity="0.6"/>
<text x="85" y="140" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Твёрдые</text>

<!-- Metallic shine -->
<rect x="130" y="95" width="50" height="35" rx="3" fill="#FFB300" stroke="#FF8F00" stroke-width="1.5"/>
<line x1="133" y1="98" x2="175" y2="98" stroke="white" stroke-width="1" opacity="0.5"/>
<line x1="133" y1="102" x2="170" y2="102" stroke="white" stroke-width="0.5" opacity="0.3"/>
<text x="155" y="140" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Блестящие</text>

<!-- Electrical conductivity -->
<line x1="70" y1="160" x2="120" y2="160" stroke="#FFB300" stroke-width="3"/>
<circle cx="125" cy="160" r="5" fill="#FFB300"/>
<text x="97" y="178" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Проводят ток</text>

<!-- Ductile -->
<path d="M60,195 Q90,185 120,195 Q150,205 180,195" fill="none" stroke="#78909C" stroke-width="3"/>
<text x="120" y="215" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ковкие и пластичные</text>

<!-- Properties list -->
<text x="45" y="238" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">Примеры:</text>
<text x="50" y="252" font-family="Arial,sans-serif" font-size="8" fill="#555">• Fe — железо</text>
<text x="50" y="265" font-family="Arial,sans-serif" font-size="8" fill="#555">• Cu — медь</text>
<text x="50" y="278" font-family="Arial,sans-serif" font-size="8" fill="#555">• Au — золото</text>
<text x="50" y="291" font-family="Arial,sans-serif" font-size="8" fill="#555">• Al — алюминий</text>
<text x="50" y="304" font-family="Arial,sans-serif" font-size="8" fill="#555">• Na — натрий</text>
<!-- Non-metals side -->
<rect x="255" y="60" width="220" height="270" rx="8" fill="white" opacity="0.85" stroke="#2196F3" stroke-width="1.5"/>
<text x="365" y="80" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle">Неметаллы</text>
<line x1="280" y1="86" x2="450" y2="86" stroke="#2196F3" stroke-width="0.5" opacity="0.5"/>

<!-- Gas bubbles -->
<circle cx="290" cy="108" r="8" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
<circle cx="305" cy="100" r="6" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
<circle cx="300" cy="118" r="5" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
<text x="300" y="140" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Газообразные</text>

<!-- Brittle solid -->
<rect x="365" y="95" width="30" height="30" rx="0" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1.5"/>
<line x1="370" y1="100" x2="390" y2="120" stroke="#66BB6A" stroke-width="0.8"/>
<line x1="380" y1="97" x2="392" y2="108" stroke="#66BB6A" stroke-width="0.8"/>
<text x="380" y="140" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Хрупкие</text>

<!-- No conductivity -->
<line x1="290" y1="160" x2="340" y2="160" stroke="#EF9A9A" stroke-width="3"/>
<line x1="305" y1="155" x2="315" y2="165" stroke="#C62828" stroke-width="2"/>
<line x1="315" y1="155" x2="305" y2="165" stroke="#C62828" stroke-width="2"/>
<text x="315" y="178" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Не проводят ток</text>

<!-- Dull appearance -->
<rect x="365" y="150" width="30" height="20" rx="2" fill="#BCAAA4" stroke="#8D6E63" stroke-width="1.5"/>
<text x="380" y="178" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Без блеска</text>

<!-- Properties list -->
<text x="275" y="238" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">Примеры:</text>
<text x="280" y="252" font-family="Arial,sans-serif" font-size="8" fill="#555">• O — кислород</text>
<text x="280" y="265" font-family="Arial,sans-serif" font-size="8" fill="#555">• C — углерод</text>
<text x="280" y="278" font-family="Arial,sans-serif" font-size="8" fill="#555">• N — азот</text>
<text x="280" y="291" font-family="Arial,sans-serif" font-size="8" fill="#555">• S — сера</text>
<text x="280" y="304" font-family="Arial,sans-serif" font-size="8" fill="#555">• Cl — хлор</text>
<!-- VS divider -->
<circle cx="250" cy="195" r="16" fill="white" stroke="#F57F17" stroke-width="2"/>
<text x="250" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">VS</text>
</svg>