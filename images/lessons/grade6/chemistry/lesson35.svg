<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EDE7F6"/><stop offset="100%" stop-color="#D1C4E9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#311B92" text-anchor="middle">Обобщение и систематизация знаний</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 35</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#4527A0" stroke-width="1" opacity="0.3"/>

<!-- Central hub: ВЕЩЕСТВА -->
<ellipse cx="250" cy="140" rx="55" ry="22" fill="#7E57C2" stroke="#4527A0" stroke-width="2"/>
<text x="250" y="144" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">ВЕЩЕСТВА</text>

<!-- Connecting lines from center -->
<!-- Top-left: Кислоты -->
<line x1="200" y1="128" x2="110" y2="85" stroke="#4527A0" stroke-width="1.5" opacity="0.5"/>
<rect x="50" y="68" width="90" height="28" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
<text x="95" y="86" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Кислоты</text>
<text x="95" y="108" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">H⁺ + кисл.остаток</text>

<!-- Top-right: Основания -->
<line x1="300" y1="128" x2="390" y2="85" stroke="#4527A0" stroke-width="1.5" opacity="0.5"/>
<rect x="345" y="68" width="100" height="28" rx="6" fill="#CFD8DC" stroke="#37474F" stroke-width="1.5"/>
<text x="395" y="86" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#263238" text-anchor="middle">Основания</text>
<text x="395" y="108" font-family="Arial,sans-serif" font-size="7" fill="#37474F" text-anchor="middle">Me⁺ + OH⁻</text>

<!-- Left: Оксиды -->
<line x1="197" y1="140" x2="95" y2="155" stroke="#4527A0" stroke-width="1.5" opacity="0.5"/>
<rect x="30" y="140" width="90" height="28" rx="6" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5"/>
<text x="75" y="158" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17" text-anchor="middle">Оксиды</text>
<text x="75" y="178" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">ЭₓOᵧ</text>

<!-- Right: Соли -->
<line x1="303" y1="140" x2="395" y2="155" stroke="#4527A0" stroke-width="1.5" opacity="0.5"/>
<rect x="365" y="140" width="100" height="28" rx="6" fill="#DCEDC8" stroke="#33691E" stroke-width="1.5"/>
<text x="415" y="158" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Соли</text>
<text x="415" y="178" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Me⁺ + кисл.остаток</text>

<!-- Bottom-left: Вода -->
<line x1="220" y1="160" x2="130" y2="215" stroke="#4527A0" stroke-width="1.5" opacity="0.5"/>
<rect x="60" y="205" width="100" height="28" rx="6" fill="#B3E5FC" stroke="#0277BD" stroke-width="1.5"/>
<text x="110" y="223" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#01579B" text-anchor="middle">Вода H₂O</text>
<text x="110" y="243" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">Уникальный растворитель</text>

<!-- Bottom-right: Растворы -->
<line x1="280" y1="160" x2="360" y2="215" stroke="#4527A0" stroke-width="1.5" opacity="0.5"/>
<rect x="310" y="205" width="120" height="28" rx="6" fill="#B2EBF2" stroke="#00838F" stroke-width="1.5"/>
<text x="370" y="223" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Растворы</text>
<text x="370" y="243" font-family="Arial,sans-serif" font-size="7" fill="#00838F" text-anchor="middle">ω = m(в-ва)/m(р-ра)</text>

<!-- Central reaction arrow: Кислота + Основание → Соль + Вода -->
<rect x="140" y="260" width="220" height="40" rx="8" fill="#D1C4E9" stroke="#4527A0" stroke-width="1.5"/>
<text x="250" y="278" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#311B92" text-anchor="middle">Кислота + Основание</text>
<text x="250" y="293" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#311B92" text-anchor="middle">→ Соль + H₂O (нейтрализация)</text>

<!-- Indicators reference -->
<rect x="30" y="260" width="100" height="40" rx="6" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
<text x="80" y="277" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Индикаторы</text>
<text x="80" y="292" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">лакмус, фенолфт.</text>

<!-- Speed reference -->
<rect x="370" y="260" width="100" height="40" rx="6" fill="#F8BBD0" stroke="#C2185B" stroke-width="1"/>
<text x="420" y="277" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#880E4F" text-anchor="middle">Скорость р-ций</text>
<text x="420" y="292" font-family="Arial,sans-serif" font-size="7" fill="#C2185B" text-anchor="middle">T°, конц., кат-р</text>

<!-- Bottom summary -->
<rect x="30" y="310" width="440" height="28" rx="6" fill="white" fill-opacity="0.5" stroke="#4527A0" stroke-width="1"/>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="9" fill="#311B92" text-anchor="middle" font-weight="bold">Все вещества связаны химическими превращениями!</text>
</svg>