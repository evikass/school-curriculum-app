<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Атомы и молекулы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Atom model with electron orbits -->
  <rect x="25" y="88" width="200" height="205" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="125" y="103" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Модель атома</text>
  <!-- Nucleus -->
  <circle cx="125" cy="195" r="14" fill="#C62828" opacity="0.8"/>
  <circle cx="120" cy="190" r="5" fill="#EF5350"/>
  <circle cx="130" cy="192" r="5" fill="#9E9E9E"/>
  <circle cx="122" cy="200" r="5" fill="#9E9E9E"/>
  <circle cx="131" cy="198" r="5" fill="#EF5350"/>
  <text x="125" y="220" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Ядро</text>
  <!-- Electron orbits -->
  <ellipse cx="125" cy="195" rx="55" ry="22" fill="none" stroke="#7B1FA2" stroke-width="1" opacity="0.5" transform="rotate(-30,125,195)"/>
  <ellipse cx="125" cy="195" rx="55" ry="22" fill="none" stroke="#7B1FA2" stroke-width="1" opacity="0.5" transform="rotate(30,125,195)"/>
  <ellipse cx="125" cy="195" rx="55" ry="22" fill="none" stroke="#7B1FA2" stroke-width="1" opacity="0.5" transform="rotate(90,125,195)"/>
  <!-- Electrons on orbits -->
  <circle cx="80" cy="175" r="5" fill="#1565C0"/>
  <text x="80" y="178" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">e-</text>
  <circle cx="170" cy="200" r="5" fill="#1565C0"/>
  <text x="170" y="203" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">e-</text>
  <circle cx="125" cy="150" r="5" fill="#1565C0"/>
  <text x="125" y="153" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">e-</text>
  <circle cx="55" cy="210" r="5" fill="#1565C0"/>
  <text x="55" y="213" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">e-</text>
  <circle cx="195" cy="180" r="5" fill="#1565C0"/>
  <text x="195" y="183" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">e-</text>
  <circle cx="125" cy="240" r="5" fill="#1565C0"/>
  <text x="125" y="243" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">e-</text>

  <!-- Legend -->
  <circle cx="50" cy="270" r="5" fill="#EF5350"/>
  <text x="62" y="274" font-family="Arial,sans-serif" font-size="8" fill="#555">Протон</text>
  <circle cx="110" cy="270" r="5" fill="#9E9E9E"/>
  <text x="122" y="274" font-family="Arial,sans-serif" font-size="8" fill="#555">Нейтрон</text>
  <circle cx="50" cy="286" r="5" fill="#1565C0"/>
  <text x="62" y="290" font-family="Arial,sans-serif" font-size="8" fill="#555">Электрон</text>

  <!-- H2O Molecule -->
  <rect x="240" y="88" width="235" height="125" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="357" y="103" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Молекула воды (H2O)</text>
  <!-- Oxygen big circle -->
  <circle cx="357" cy="155" r="22" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="2"/>
  <text x="357" y="160" font-family="Arial,sans-serif" font-size="16" fill="#C62828" text-anchor="middle" font-weight="bold">O</text>
  <!-- Hydrogen circles -->
  <circle cx="310" cy="175" r="16" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="2"/>
  <text x="310" y="180" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">H</text>
  <circle cx="404" cy="175" r="16" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="2"/>
  <text x="404" y="180" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">H</text>
  <!-- Bonds -->
  <line x1="337" y1="168" x2="324" y2="170" stroke="#546E7A" stroke-width="3"/>
  <line x1="377" y1="168" x2="390" y2="170" stroke="#546E7A" stroke-width="3"/>
  <!-- Angle label -->
  <path d="M330,162 Q357,145 385,162" fill="none" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="357" y="140" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle">104.5</text>
  <!-- Formula -->
  <text x="357" y="205" font-family="Arial,sans-serif" font-size="14" fill="#7B1FA2" text-anchor="middle" font-weight="bold">H</text>
  <text x="368" y="209" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">2</text>
  <text x="378" y="205" font-family="Arial,sans-serif" font-size="14" fill="#7B1FA2" text-anchor="middle" font-weight="bold">O</text>

  <!-- CO2 Molecule -->
  <rect x="240" y="222" width="235" height="71" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="357" y="237" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Молекула углекислого газа (CO2)</text>
  <!-- O=C=O linear -->
  <circle cx="300" cy="270" r="16" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="2"/>
  <text x="300" y="275" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">O</text>
  <circle cx="357" cy="270" r="18" fill="#546E7A" opacity="0.2" stroke="#546E7A" stroke-width="2"/>
  <text x="357" y="275" font-family="Arial,sans-serif" font-size="14" fill="#546E7A" text-anchor="middle" font-weight="bold">C</text>
  <circle cx="414" cy="270" r="16" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="2"/>
  <text x="414" y="275" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">O</text>
  <!-- Double bonds -->
  <line x1="316" y1="267" x2="339" y2="267" stroke="#546E7A" stroke-width="2"/>
  <line x1="316" y1="273" x2="339" y2="273" stroke="#546E7A" stroke-width="2"/>
  <line x1="375" y1="267" x2="398" y2="267" stroke="#546E7A" stroke-width="2"/>
  <line x1="375" y1="273" x2="398" y2="273" stroke="#546E7A" stroke-width="2"/>

  <!-- Atoms combine illustration -->
  <rect x="25" y="88" width="200" height="205" rx="6" fill="white" stroke="#ddd" stroke-width="1" opacity="0"/>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Атомы и молекулы</text>
</svg>