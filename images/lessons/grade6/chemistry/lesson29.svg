<!-- Legend -->
<circle cx="60" cy="222" r="7" fill="#A5D6A7" stroke="#33691E" stroke-width="1"/>
<text x="60" y="226" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">+</text>
<text x="80" y="226" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">— катион металла</text>

<circle cx="160" cy="222" r="7" fill="#C8E6C9" stroke="#33691E" stroke-width="1"/>
<text x="160" y="226" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">−</text>
<text x="180" y="226" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">— анион кислоты</text>

<!-- Examples on right side -->
<rect x="250" y="60" width="220" height="185" rx="8" fill="white" fill-opacity="0.4" stroke="#33691E" stroke-width="1"/>
<text x="360" y="80" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Примеры солей</text>

<rect x="265" y="90" width="90" height="32" rx="5" fill="#DCEDC8" stroke="#33691E" stroke-width="1"/>
<text x="310" y="103" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">NaCl</text>
<text x="310" y="116" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Поваренная соль</text>

<rect x="370" y="90" width="90" height="32" rx="5" fill="#DCEDC8" stroke="#33691E" stroke-width="1"/>
<text x="415" y="103" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">CaCO₃</text>
<text x="415" y="116" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Мел, мрамор</text>

<rect x="265" y="130" width="90" height="32" rx="5" fill="#DCEDC8" stroke="#33691E" stroke-width="1"/>
<text x="310" y="143" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">KNO₃</text>
<text x="310" y="156" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Селитра</text>

<rect x="370" y="130" width="90" height="32" rx="5" fill="#DCEDC8" stroke="#33691E" stroke-width="1"/>
<text x="415" y="143" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">CuSO₄</text>
<text x="415" y="156" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Медный купорос</text>

<rect x="265" y="170" width="90" height="32" rx="5" fill="#DCEDC8" stroke="#33691E" stroke-width="1"/>
<text x="310" y="183" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">FeSO₄</text>
<text x="310" y="196" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Железный купорос</text>

<rect x="370" y="170" width="90" height="32" rx="5" fill="#DCEDC8" stroke="#33691E" stroke-width="1"/>
<text x="415" y="183" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Na₂SO₄</text>
<text x="415" y="196" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Глауберова соль</text>

<!-- Formation equation -->
<text x="360" y="225" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кислота + Основание → Соль + H₂O</text>

<!-- Bottom properties -->
<rect x="30" y="255" width="440" height="80" rx="8" fill="white" fill-opacity="0.5" stroke="#33691E" stroke-width="1"/>
<text x="250" y="273" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Способы получения солей</text>

<text x="55" y="293" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">1) Me + Кислота → Соль + H₂↑</text>
<text x="55" y="308" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">2) Оксид + Кислота → Соль + H₂O</text>
<text x="55" y="323" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">3) Кислота + Основание → Соль + H₂O</text>

<text x="280" y="293" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">4) Me + Me-соль → Нов. Me + Нов. соль</text>
<text x="280" y="308" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">5) Оксид Me + Оксид Неме → Соль</text>
<text x="280" y="323" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20">6) Соль + Соль → Нов. соль1 + Нов. соль2</text>
</svg>