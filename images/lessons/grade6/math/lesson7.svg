<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Умножение и деление дробей</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Area model for multiplication -->
  <rect x="20" y="88" width="225" height="120" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="132" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Площадь: 2/3 x 3/4 = 6/12 = 1/2</text>
  <line x1="28" y1="108" x2="237" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Grid: 3 rows (2/3) x 4 columns (3/4) -->
  <rect x="40" y="115" width="140" height="85" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <!-- Vertical lines (4 columns for 3/4) -->
  <line x1="75" y1="115" x2="75" y2="200" stroke="#999" stroke-width="0.5"/>
  <line x1="110" y1="115" x2="110" y2="200" stroke="#999" stroke-width="0.5"/>
  <line x1="145" y1="115" x2="145" y2="200" stroke="#999" stroke-width="0.5"/>
  <!-- Highlight 3 of 4 columns -->
  <rect x="40" y="115" width="105" height="85" fill="#C62828" opacity="0.15"/>
  <!-- Horizontal lines (3 rows for 2/3) -->
  <line x1="40" y1="143" x2="180" y2="143" stroke="#999" stroke-width="0.5"/>
  <line x1="40" y1="172" x2="180" y2="172" stroke="#999" stroke-width="0.5"/>
  <!-- Highlight 2 of 3 rows -->
  <rect x="40" y="115" width="140" height="56" fill="#1565C0" opacity="0.15"/>
  <!-- Intersection (answer) -->
  <rect x="40" y="115" width="105" height="56" fill="#2E7D32" opacity="0.35"/>
  <!-- Labels -->
  <text x="92" y="126" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">6 из 12</text>
  <!-- Side labels -->
  <text x="188" y="125" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">2/3</text>
  <text x="188" y="155" font-family="Arial,sans-serif" font-size="7" fill="#888">1/3</text>
  <text x="188" y="185" font-family="Arial,sans-serif" font-size="7" fill="#888">1/3</text>
  <text x="57" y="210" font-family="Arial,sans-serif" font-size="7" fill="#C62828">3/4</text>
  <text x="130" y="210" font-family="Arial,sans-serif" font-size="7" fill="#888">1/4</text>
  <!-- Formula -->
  <text x="132" y="204" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Зеленая зона = 6/12 = 1/2</text>

  <!-- Card 2: Division as inverse multiplication -->
  <rect x="253" y="88" width="228" height="120" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="367" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Деление = умножение на обратную</text>
  <line x1="261" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Example: 2/3 : 4/5 -->
  <rect x="270" y="115" width="195" height="26" rx="4" fill="#C62828" opacity="0.06"/>
  <text x="367" y="132" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">2/3 : 4/5</text>
  <!-- Arrow down -->
  <text x="367" y="148" font-family="Arial,sans-serif" font-size="12" fill="#F9A825" text-anchor="middle">|</text>
  <rect x="270" y="152" width="195" height="26" rx="4" fill="#2E7D32" opacity="0.06"/>
  <text x="367" y="169" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">= 2/3 x 5/4</text>
  <!-- Result -->
  <text x="367" y="190" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">= (2x5) / (3x4) = 10/12 = 5/6</text>
  <!-- Rule box -->
  <rect x="280" y="196" width="175" height="16" rx="3" fill="#F9A825" opacity="0.1"/>
  <text x="367" y="208" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle" font-weight="bold">a/b : c/d = a/b x d/c</text>

  <!-- Card 3: Rules summary -->
  <rect x="20" y="215" width="460" height="84" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="250" y="233" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Правила умножения и деления дробей</text>
  <line x1="28" y1="237" x2="472" y2="237" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Multiplication rule -->
  <rect x="30" y="244" width="220" height="48" rx="4" fill="#1565C0" opacity="0.04"/>
  <text x="140" y="258" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Умножение</text>
  <text x="140" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">a/b x c/d = (a x c) / (b x d)</text>
  <text x="140" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Числитель x Числитель</text>
  <!-- Division rule -->
  <rect x="260" y="244" width="210" height="48" rx="4" fill="#C62828" opacity="0.04"/>
  <text x="365" y="258" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Деление</text>
  <text x="365" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">a/b : c/d = a/b x d/c</text>
  <text x="365" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Переворачиваем вторую дробь</text>
  <!-- Divider -->
  <line x1="250" y1="244" x2="250" y2="292" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Умножение и деление дробей</text>
</svg>