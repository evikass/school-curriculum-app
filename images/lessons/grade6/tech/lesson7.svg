  <rect x="355" y="88" width="120" height="105" rx="6" fill="white" stroke="#1565C0" stroke-width="1.2"/>
  <text x="415" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Горячие напитки</text>

  <!-- Tea pot -->
  <ellipse cx="390" cy="145" rx="22" ry="18" fill="#E8EAF6" stroke="#7986CB" stroke-width="1"/>
  <!-- Lid -->
  <ellipse cx="390" cy="128" rx="12" ry="4" fill="#C5CAE9" stroke="#7986CB" stroke-width="0.8"/>
  <rect x="387" y="124" width="6" height="5" rx="2" fill="#9FA8DA"/>
  <!-- Spout -->
  <path d="M412,138 Q425,130 428,135" fill="none" stroke="#7986CB" stroke-width="1.5"/>
  <!-- Handle -->
  <path d="M368,135 Q355,130 355,145 Q355,160 368,155" fill="none" stroke="#7986CB" stroke-width="2"/>
  <!-- Steam -->
  <path d="M425,132 Q427,126 425,120" fill="none" stroke="#BDBDBD" stroke-width="0.7"/>
  <path d="M430,134 Q432,128 430,122" fill="none" stroke="#BDBDBD" stroke-width="0.7"/>
  <text x="390" y="175" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Чайник</text>

  <!-- Coffee cup -->
  <rect x="415" y="140" width="22" height="25" rx="3" fill="white" stroke="#795548" stroke-width="1.2"/>
  <!-- Cup handle -->
  <path d="M437,146 Q447,146 447,153 Q447,160 437,160" fill="none" stroke="#795548" stroke-width="1.5"/>
