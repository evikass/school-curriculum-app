<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Бутерброды и горячие напитки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Технология - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Sandwich 1: Simple -->
  <rect x="25" y="88" width="100" height="105" rx="6" fill="white" stroke="#8D6E63" stroke-width="1.2"/>
  <text x="75" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#5D4037" text-anchor="middle">Простой</text>
  <!-- Plate -->
  <ellipse cx="75" cy="178" rx="42" ry="6" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Bottom bread -->
  <rect x="40" y="165" width="70" height="14" rx="3" fill="#D4A056" stroke="#B8860B" stroke-width="0.8"/>
  <rect x="40" y="165" width="70" height="5" rx="2" fill="#E8C06A" opacity="0.5"/>
  <!-- Butter layer -->
  <rect x="43" y="161" width="64" height="5" rx="1" fill="#FFF9C4" stroke="#FDD835" stroke-width="0.3"/>
  <!-- Sausage/meat -->
  <rect x="43" y="148" width="64" height="14" rx="2" fill="#E57373" stroke="#C62828" stroke-width="0.5"/>
  <line x1="55" y1="148" x2="55" y2="162" stroke="#C62828" stroke-width="0.3" opacity="0.3"/>
  <line x1="75" y1="148" x2="75" y2="162" stroke="#C62828" stroke-width="0.3" opacity="0.3"/>
  <line x1="95" y1="148" x2="95" y2="162" stroke="#C62828" stroke-width="0.3" opacity="0.3"/>
  <!-- Top bread -->
  <rect x="40" y="135" width="70" height="14" rx="3" fill="#D4A056" stroke="#B8860B" stroke-width="0.8"/>
  <rect x="40" y="144" width="70" height="5" rx="2" fill="#C49440" opacity="0.4"/>
  <!-- Bread texture dots -->
  <circle cx="55" cy="140" r="1.2" fill="#C49440" opacity="0.4"/>
  <circle cx="75" cy="138" r="1" fill="#C49440" opacity="0.4"/>
  <circle cx="90" cy="141" r="1.2" fill="#C49440" opacity="0.4"/>

  <!-- Sandwich 2: Layered/Club -->
  <rect x="135" y="88" width="100" height="105" rx="6" fill="white" stroke="#8D6E63" stroke-width="1.2"/>
  <text x="185" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#5D4037" text-anchor="middle">Многослойный</text>
  <!-- Plate -->
  <ellipse cx="185" cy="178" rx="42" ry="6" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Bottom bread -->
  <rect x="150" y="166" width="70" height="12" rx="3" fill="#D4A056" stroke="#B8860B" stroke-width="0.8"/>
  <!-- Cheese layer -->
  <rect x="148" y="158" width="74" height="9" rx="1" fill="#FFC107" stroke="#FFA000" stroke-width="0.5"/>
