  <rect x="417" y="143" width="18" height="8" rx="2" fill="#5D4037"/>
  <!-- Saucer -->
  <ellipse cx="426" cy="166" rx="18" ry="4" fill="white" stroke="#BDBDBD" stroke-width="0.8"/>
  <!-- Steam -->
  <path d="M422,138 Q420,132 422,126" fill="none" stroke="#BDBDBD" stroke-width="0.7"/>
  <path d="M430,137 Q428,131 430,125" fill="none" stroke="#BDBDBD" stroke-width="0.7"/>
  <text x="428" y="183" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Кофе</text>

  <!-- Table setting panel -->
  <rect x="25" y="203" width="450" height="95" rx="6" fill="white" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="221" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">Сервировка стола</text>
  <line x1="40" y1="227" x2="460" y2="227" stroke="#1565C0" stroke-width="0.5" opacity="0.3"/>

  <!-- Tablecloth pattern -->
  <rect x="40" y="235" width="420" height="55" rx="4" fill="#FFF8E1" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Checkerboard pattern -->
  <rect x="40" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="70" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="100" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="130" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="160" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="190" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="220" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="250" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="280" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="310" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="340" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="370" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="400" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>
  <rect x="430" y="235" width="15" height="15" fill="#E8EAF6" opacity="0.3"/>

  <!-- Place setting items -->
  <!-- Plate -->
  <ellipse cx="110" cy="260" rx="28" ry="8" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.8"/>
  <ellipse cx="110" cy="258" rx="22" ry="6" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Fork -->
  <line x1="72" y1="248" x2="72" y2="278" stroke="#90A4AE" stroke-width="1.5"/>
  <line x1="68" y1="248" x2="68" y2="256" stroke="#90A4AE" stroke-width="1"/>
  <line x1="72" y1="248" x2="72" y2="256" stroke="#90A4AE" stroke-width="1"/>
  <line x1="76" y1="248" x2="76" y2="256" stroke="#90A4AE" stroke-width="1"/>
  <!-- Knife -->
  <line x1="150" y1="248" x2="150" y2="278" stroke="#90A4AE" stroke-width="1.5"/>
  <polygon points="152,248 158,256 152,264" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
  <!-- Cup -->
  <rect x="130" y="238" width="14" height="12" rx="2" fill="white" stroke="#BDBDBD" stroke-width="0.8"/>

  <!-- Napkin -->
  <rect x="200" y="248" width="22" height="22" rx="1" fill="#E8EAF6" stroke="#7986CB" stroke-width="0.8" transform="rotate(-15,211,259)"/>

  <!-- Salt and pepper -->
  <rect x="250" y="252" width="10" height="14" rx="3" fill="white" stroke="#BDBDBD" stroke-width="0.8"/>
  <circle cx="255" cy="250" r="3" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <circle cx="254" cy="250" r="0.8" fill="#424242"/>
  <circle cx="256" cy="250" r="0.8" fill="#424242"/>
  <circle cx="255" cy="249" r="0.8" fill="#424242"/>

  <rect x="268" y="252" width="10" height="14" rx="3" fill="white" stroke="#BDBDBD" stroke-width="0.8"/>
  <circle cx="273" cy="250" r="3" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <circle cx="272" cy="250" r="0.8" fill="#424242"/>
  <circle cx="274" cy="250" r="0.8" fill="#424242"/>

  <!-- Flowers/vase -->
  <rect x="330" y="255" width="12" height="18" rx="3" fill="#E8F5E9" stroke="#81C784" stroke-width="0.8"/>
  <circle cx="333" cy="250" r="5" fill="#EF9A9A" opacity="0.7"/>
  <circle cx="340" cy="248" r="4" fill="#FFCDD2" opacity="0.7"/>
  <line x1="336" y1="255" x2="333" y2="248" stroke="#4CAF50" stroke-width="0.8"/>
  <line x1="336" y1="255" x2="340" y2="246" stroke="#4CAF50" stroke-width="0.8"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Бутерброды и горячие напитки</text>
