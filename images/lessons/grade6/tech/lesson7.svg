  <circle cx="185" cy="155" r="2.5" fill="#EF9A9A" opacity="0.5"/>
  <circle cx="205" cy="153" r="3" fill="#EF9A9A" opacity="0.5"/>
  <!-- Lettuce -->
  <path d="M148,146 Q155,140 165,146 Q175,140 185,146 Q195,140 205,146 Q215,140 222,146" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
  <!-- Top bread -->
  <rect x="150" y="130" width="70" height="14" rx="3" fill="#D4A056" stroke="#B8860B" stroke-width="0.8"/>
  <!-- Pick on top -->
  <circle cx="185" cy="128" r="4" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="185" y1="124" x2="185" y2="119" stroke="#795548" stroke-width="1.2"/>

  <!-- Sandwich 3: Hot/Closed -->
  <rect x="245" y="88" width="100" height="105" rx="6" fill="white" stroke="#8D6E63" stroke-width="1.2"/>
  <text x="295" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#5D4037" text-anchor="middle">Горячий</text>
  <!-- Plate -->
  <ellipse cx="295" cy="178" rx="42" ry="6" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Hot sandwich - triangular shape -->
  <polygon points="295,130 340,172 250,172" fill="#D4A056" stroke="#B8860B" stroke-width="1"/>
  <!-- Filling visible at edge -->
  <line x1="270" y1="155" x2="320" y2="155" stroke="#FFC107" stroke-width="2"/>
  <line x1="260" y1="165" x2="330" y2="165" stroke="#E57373" stroke-width="2"/>
  <!-- Steam lines -->
  <path d="M285,128 Q283,120 285,114" fill="none" stroke="#BDBDBD" stroke-width="0.8"/>
  <path d="M295,126 Q293,118 295,112" fill="none" stroke="#BDBDBD" stroke-width="0.8"/>
  <path d="M305,128 Q303,120 305,114" fill="none" stroke="#BDBDBD" stroke-width="0.8"/>

