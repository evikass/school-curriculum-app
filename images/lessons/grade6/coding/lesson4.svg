<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">События и управление</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Основы программирования - Урок 4</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>
<!-- Event hat blocks -->
<!-- Hat block 1 - Green flag -->
<g transform="translate(80,95)">
  <polygon points="0,0 140,0 140,5 145,12 140,19 140,28 0,28 -5,19 0,12 -5,5" fill="#FFC107" stroke="#FF8F00" stroke-width="1.2"/>
  <polygon points="10,2 14,2 10,6" fill="#FFC107"/>
  <rect x="0" y="25" width="140" height="4" rx="0 0 3 3" fill="#FFC107"/>
  <!-- Flag icon -->
  <g transform="translate(20,14)">
    <rect x="0" y="-8" width="2" height="16" fill="#555"/>
    <polygon points="2,-8 16,-4 2,0" fill="#66BB6A"/>
  </g>
  <text x="82" y="18" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="bold">Когда нажмут флаг</text>
</g>
<!-- Stack under hat 1 -->
<rect x="75" y="127" width="150" height="24" rx="4" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<polygon points="75,127 83,127 75,135" fill="#4FC3F7"/>
<text x="150" y="143" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">сдвинься на 10 шагов</text>

<!-- Hat block 2 - Key press -->
<g transform="translate(80,170)">
  <polygon points="0,0 140,0 140,5 145,12 140,19 140,28 0,28 -5,19 0,12 -5,5" fill="#FFC107" stroke="#FF8F00" stroke-width="1.2"/>
  <polygon points="10,2 14,2 10,6" fill="#FFC107"/>
  <rect x="0" y="25" width="140" height="4" rx="0 0 3 3" fill="#FFC107"/>
  <!-- Key icon -->
  <g transform="translate(20,14)">
    <rect x="-6" y="-7" width="12" height="14" rx="2" fill="white" stroke="#555" stroke-width="1"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">A</text>
  </g>
  <text x="82" y="18" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="bold">Когда нажмут клавишу</text>
</g>
<!-- Stack under hat 2 -->
<rect x="75" y="202" width="150" height="24" rx="4" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<polygon points="75,202 83,202 75,210" fill="#4FC3F7"/>
<text x="150" y="218" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">поверни вправо на 15</text>
<rect x="75" y="230" width="150" height="24" rx="4" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<polygon points="75,230 83,230 75,238" fill="#4FC3F7"/>
<text x="150" y="246" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">сдвинься на 5 шагов</text>

<!-- Control blocks panel on right -->
<rect x="280" y="92" width="195" height="195" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
<text x="377" y="112" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Блоки управления</text>
<line x1="295" y1="120" x2="460" y2="120" stroke="#66BB6A" stroke-width="0.8"/>
<!-- Control block: wait -->
<rect x="295" y="130" width="160" height="22" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="0.8"/>
<polygon points="295,130 303,130 295,138" fill="#FFC107"/>
<text x="377" y="145" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">жди 1 секунду</text>
<!-- Control block: forever -->
<rect x="295" y="162" width="160" height="22" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="0.8"/>
<polygon points="295,162 303,162 295,170" fill="#FFC107"/>
<text x="377" y="177" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">всегда</text>
<!-- Control block: if -->
<rect x="295" y="194" width="160" height="22" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="0.8"/>
<polygon points="295,194 303,194 295,202" fill="#FFC107"/>
<text x="377" y="209" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">если ... то</text>
<!-- Control block: repeat -->
<rect x="295" y="226" width="160" height="22" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="0.8"/>
<polygon points="295,226 303,226 295,234" fill="#FFC107"/>
<text x="377" y="241" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">повтори 10 раз</text>
<!-- Control block: broadcast -->
<rect x="295" y="258" width="160" height="22" rx="4" fill="#FF7043" stroke="#D84315" stroke-width="0.8"/>
<polygon points="295,258 303,258 295,266" fill="#FF7043"/>
<text x="377" y="273" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">послать сообщение</text>
<rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">События и управление</text></svg>