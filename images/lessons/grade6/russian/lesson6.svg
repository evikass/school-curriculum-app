<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Способы словообразования</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Приставочный (Prefixal) -->
  <rect x="25" y="88" width="220" height="95" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="102" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ПРИСТАВОЧНЫЙ СПОСОБ</text>
  <!-- Word building diagram -->
  <!-- Base word -->
  <rect x="45" y="115" width="60" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="75" y="130" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">ходить</text>
  <!-- Arrow -->
  <line x1="105" y1="126" x2="125" y2="126" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="125,123 131,126 125,129" fill="#C62828"/>
  <!-- New word with prefix -->
  <rect x="132" y="115" width="35" height="22" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1.2"/>
  <text x="150" y="130" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">пере</text>
  <rect x="170" y="115" width="60" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="200" y="130" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">ходить</text>
  <!-- Labels -->
  <text x="150" y="150" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">приставка</text>
  <text x="200" y="150" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">корень</text>
  <!-- Second example -->
  <rect x="55" y="160" width="50" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="80" y="173" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">писать</text>
  <line x1="108" y1="169" x2="125" y2="169" stroke="#C62828" stroke-width="1"/>
  <polygon points="125,167 130,169 125,171" fill="#C62828"/>
  <rect x="132" y="160" width="28" height="18" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="146" y="173" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">за</text>
  <rect x="163" y="160" width="50" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="188" y="173" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">писать</text>

  <!-- Card 2: Суффиксальный (Suffixal) -->
  <rect x="257" y="88" width="217" height="95" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="102" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">СУФФИКСАЛЬНЫЙ СПОСОБ</text>
  <!-- Word building diagram -->
  <rect x="277" y="115" width="55" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="304" y="130" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">лес</text>
  <line x1="332" y1="126" x2="352" y2="126" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="352,123 358,126 352,129" fill="#2E7D32"/>
  <rect x="360" y="115" width="55" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="387" y="130" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">лес</text>
  <rect x="418" y="115" width="42" height="22" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="439" y="130" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">ник</text>
  <!-- Labels -->
  <text x="387" y="150" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">корень</text>
  <text x="439" y="150" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">суффикс</text>
  <!-- Second example -->
  <rect x="287" y="160" width="40" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="307" y="173" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">сон</text>
  <line x1="330" y1="169" x2="347" y2="169" stroke="#2E7D32" stroke-width="1"/>
  <polygon points="347,167 352,169 347,171" fill="#2E7D32"/>
  <rect x="355" y="160" width="40" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="375" y="173" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">сон</text>
  <rect x="398" y="160" width="30" height="18" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="413" y="173" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">ный</text>

  <!-- Card 3: Приставочно-суффиксальный -->
  <rect x="25" y="191" width="220" height="109" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="205" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ПРИСТАВОЧНО-СУФФИКСАЛЬНЫЙ</text>
  <!-- Word: без-ум-н-ый -->
  <rect x="42" y="215" width="28" height="22" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <text x="56" y="230" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">без</text>
  <rect x="73" y="215" width="40" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="93" y="230" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">ум</text>
  <rect x="116" y="215" width="28" height="22" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="130" y="230" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">н</text>
  <rect x="147" y="215" width="30" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="162" y="230" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">ый</text>
  <!-- Labels -->
  <text x="56" y="250" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">приставка</text>
  <text x="93" y="250" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">корень</text>
  <text x="130" y="250" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">суффикс</text>
  <text x="162" y="250" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">окончание</text>
  <!-- Example 2: под-вод-ник -->
  <text x="80" y="273" font-family="Arial,sans-serif" font-size="9" fill="#C62828" font-weight="bold">под</text>
  <text x="108" y="273" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="bold">вод</text>
  <text x="140" y="273" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">ник</text>
  <text x="170" y="273" font-family="Arial,sans-serif" font-size="6" fill="#999">- подводник</text>
  <!-- Color dots legend -->
  <circle cx="42" cy="290" r="3" fill="#FFCDD2" stroke="#C62828" stroke-width="0.5"/>
  <text x="48" y="293" font-family="Arial,sans-serif" font-size="5" fill="#555">приставка</text>
  <circle cx="100" cy="290" r="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <text x="106" y="293" font-family="Arial,sans-serif" font-size="5" fill="#555">корень</text>
  <circle cx="145" cy="290" r="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="151" y="293" font-family="Arial,sans-serif" font-size="5" fill="#555">суффикс</text>
  <circle cx="190" cy="290" r="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5"/>
  <text x="196" y="293" font-family="Arial,sans-serif" font-size="5" fill="#555">окончание</text>

  <!-- Card 4: Сложение (Composition) -->
  <rect x="257" y="191" width="217" height="109" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="205" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">СЛОЖЕНИЕ ОСНОВ</text>
  <!-- Two bases merging -->
  <rect x="272" y="215" width="55" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="300" y="230" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">пар</text>
  <text x="332" y="230" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">+</text>
  <rect x="342" y="215" width="55" height="22" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="370" y="230" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">ход</text>
  <text x="402" y="230" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">=</text>
  <rect x="412" y="215" width="48" height="22" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.2"/>
  <text x="436" y="230" font-family="Arial,sans-serif" font-size="10" fill="#F57F17" text-anchor="middle" font-weight="bold">пароход</text>
  <!-- Connecting vowels -->
  <text x="365" y="248" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">соединительная гласная: о, е</text>
  <!-- Example 2 -->
  <rect x="272" y="256" width="35" height="18" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="290" y="269" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">зем</text>
  <text x="315" y="269" font-family="Arial,sans-serif" font-size="10" fill="#C62828">+</text>
  <rect x="325" y="256" width="35" height="18" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="343" y="269" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">леп</text>
  <text x="368" y="269" font-family="Arial,sans-serif" font-size="10" fill="#C62828">=</text>
  <rect x="378" y="256" width="55" height="18" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="406" y="269" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle">землепашец</text>
  <!-- Example 3 -->
  <text x="290" y="290" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">вод</text>
  <text x="315" y="290" font-family="Arial,sans-serif" font-size="10" fill="#C62828">+</text>
  <text x="340" y="290" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold">провод</text>
  <text x="382" y="290" font-family="Arial,sans-serif" font-size="10" fill="#C62828">=</text>
  <text x="400" y="290" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold">водопровод</text>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Способы словообразования</text>
</svg>