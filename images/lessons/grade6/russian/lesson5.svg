<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#C62828" text-anchor="middle">Использование фразеологизмов</text>
  <text x="250" y="55" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#C62828" text-anchor="middle">в речи</text>
  <text x="250" y="70" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 5</text>
  <line x1="30" y1="76" x2="470" y2="76" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="73" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="73" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Speech bubble with phrase -->
  <rect x="25" y="84" width="220" height="110" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="98" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ФРАЗЕОЛОГИЗМ В РЕЧИ</text>
  <!-- Speech bubble -->
  <rect x="40" y="106" width="145" height="42" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <polygon points="75,148 85,160 95,148" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <rect x="76" y="145" width="18" height="4" fill="#E3F2FD"/>
  <text x="112" y="122" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Он работал</text>
  <text x="112" y="135" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">спустя рукава</text>
  <text x="112" y="143" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">- = небрежно</text>
  <!-- Speaker figure -->
  <circle cx="58" cy="168" r="6" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <line x1="58" y1="174" x2="58" y2="188" stroke="#E65100" stroke-width="1.2"/>
  <line x1="58" y1="180" x2="50" y2="185" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>
  <line x1="58" y1="188" x2="52" y2="193" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>
  <line x1="58" y1="188" x2="64" y2="193" stroke="#E65100" stroke-width="1" stroke-linecap="round"/>
  <!-- = arrow -->
  <line x1="195" y1="120" x2="210" y2="120" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="210,117 216,120 210,123" fill="#C62828"/>
  <!-- Plain text version -->
  <rect x="200" y="108" width="38" height="30" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="219" y="121" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">он работал</text>
  <text x="219" y="131" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">небрежно</text>

  <!-- Card 2: Enriching speech -->
  <rect x="257" y="84" width="217" height="110" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="98" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">БОГАТСТВО РЕЧИ</text>
  <!-- Plain speech -->
  <rect x="267" y="106" width="95" height="28" rx="6" fill="#F5F5F5" stroke="#999" stroke-width="0.8"/>
  <text x="314" y="118" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Обычная речь:</text>
  <text x="314" y="128" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Он быстро побежал</text>
  <!-- Arrow down -->
  <line x1="365" y1="134" x2="365" y2="145" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="362,145 365,150 368,145" fill="#2E7D32"/>
  <!-- Enriched speech with phraseologism -->
  <rect x="267" y="150" width="200" height="28" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="367" y="162" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">С фразеологизмом:</text>
  <text x="367" y="172" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Он понёсся во весь опор</text>
  <!-- Star decoration for good speech -->
  <polygon points="460,105 462,110 467,110 463,113 464,118 460,115 456,118 457,113 453,110 458,110" fill="#F9A825" opacity="0.3"/>

  <!-- Card 3: Inappropriate use -->
  <rect x="25" y="202" width="220" height="98" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="216" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ПРАВИЛЬНО И НЕПРАВИЛЬНО</text>
  <!-- Wrong usage -->
  <rect x="35" y="224" width="100" height="30" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
  <text x="42" y="236" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle">X</text>
  <text x="90" y="236" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Он бил баклуши</text>
  <text x="90" y="247" font-family="Arial,sans-serif" font-size="6" fill="#C62828">дровосеком</text>
  <!-- Right usage -->
  <rect x="140" y="224" width="100" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="147" y="236" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">+</text>
  <text x="195" y="236" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Мальчик</text>
  <text x="195" y="247" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">бил баклуши</text>
  <!-- Tip box -->
  <rect x="35" y="262" width="205" height="30" rx="4" fill="#FFF3E0" stroke="#F9A825" stroke-width="0.8"/>
  <text x="137" y="274" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">Совет: не заменяйте слова</text>
  <text x="137" y="285" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">фразеологизма его синонимами!</text>

  <!-- Card 4: Book/author quotes -->
  <rect x="257" y="202" width="217" height="98" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="216" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ФРАЗЕОЛОГИЗМЫ В ЛИТЕРАТУРЕ</text>
  <!-- Book with quote -->
  <rect x="272" y="224" width="45" height="58" rx="3" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
  <rect x="272" y="224" width="45" height="8" rx="3" fill="#F9A825"/>
  <text x="294" y="231" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">А.С. Пушкин</text>
  <!-- Quote from Pushkin -->
  <rect x="325" y="224" width="140" height="26" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.6"/>
  <text x="330" y="234" font-family="Arial,sans-serif" font-size="5" fill="#555" font-style="italic">Мелькают мимо будки, бабы,</text>
  <text x="330" y="244" font-family="Arial,sans-serif" font-size="5" fill="#555" font-style="italic">мальчишки, лавки, фонари...</text>
  <!-- Quote 2 -->
  <rect x="272" y="258" width="193" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6"/>
  <text x="280" y="270" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" font-style="italic">...уйти в свою скорлупу</text>
  <text x="420" y="270" font-family="Arial,sans-serif" font-size="5" fill="#999">- уединиться</text>
  <!-- Open book icon -->
  <path d="M290,260 L290,278" stroke="#F9A825" stroke-width="0.8"/>
  <path d="M280,262 Q290,258 300,262" stroke="#F9A825" stroke-width="0.8" fill="none"/>
  <path d="M280,276 Q290,272 300,276" stroke="#F9A825" stroke-width="0.8" fill="none"/>
  <!-- Quote marks -->
  <text x="428" y="238" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" opacity="0.4">,</text>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Использование фразеологизмов в речи</text>
</svg>