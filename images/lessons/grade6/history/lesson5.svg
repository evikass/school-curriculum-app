<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Владимиро-Суздальское княжество</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- White-stone church (Успенский собор) -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="200" height="200" rx="6" fill="#E8EAF6" stroke="#283593" stroke-width="1.5"/>
    <!-- Sky -->
    <rect x="3" y="3" width="194" height="70" rx="4" fill="#E3F2FD" opacity="0.4"/>
    <!-- Cathedral base -->
    <rect x="40" y="90" width="120" height="80" rx="3" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5"/>
    <!-- Central dome -->
    <ellipse cx="100" cy="90" rx="20" ry="10" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
    <path d="M80,90 Q80,55 100,38 Q120,55 120,90" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Dome cap -->
    <rect x="96" y="33" width="8" height="8" fill="#F9A825" rx="1"/>
    <line x1="100" y1="33" x2="100" y2="22" stroke="#BDBDBD" stroke-width="1.5"/>
    <rect x="96" y="19" width="8" height="6" fill="#F9A825" rx="1"/>
    <!-- Left dome -->
    <ellipse cx="55" cy="95" rx="14" ry="7" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <path d="M41,95 Q41,70 55,56 Q69,70 69,95" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <line x1="55" y1="56" x2="55" y2="48" stroke="#BDBDBD" stroke-width="1"/>
    <rect x="52" y="45" width="6" height="5" fill="#F9A825" rx="1"/>
    <!-- Right dome -->
    <ellipse cx="145" cy="95" rx="14" ry="7" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <path d="M131,95 Q131,70 145,56 Q159,70 159,95" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <line x1="145" y1="56" x2="145" y2="48" stroke="#BDBDBD" stroke-width="1"/>
    <rect x="142" y="45" width="6" height="5" fill="#F9A825" rx="1"/>
    <!-- Arched windows -->
    <path d="M78,115 Q78,108 85,108 Q92,108 92,115 L92,135 L78,135 Z" fill="#E3F2FD" stroke="#BDBDBD" stroke-width="0.5"/>
    <path d="M108,115 Q108,108 115,108 Q122,108 122,115 L122,135 L108,135 Z" fill="#E3F2FD" stroke="#BDBDBD" stroke-width="0.5"/>
    <!-- Door -->
    <path d="M92,170 L92,148 Q100,140 108,148 L108,170 Z" fill="#5D4037"/>
    <!-- White stone texture pattern -->
    <line x1="45" y1="100" x2="155" y2="100" stroke="#E0E0E0" stroke-width="0.3"/>
    <line x1="45" y1="110" x2="155" y2="110" stroke="#E0E0E0" stroke-width="0.3"/>
    <line x1="45" y1="140" x2="155" y2="140" stroke="#E0E0E0" stroke-width="0.3"/>
    <line x1="45" y1="150" x2="155" y2="150" stroke="#E0E0E0" stroke-width="0.3"/>
    <line x1="45" y1="160" x2="155" y2="160" stroke="#E0E0E0" stroke-width="0.3"/>
    <!-- Ground -->
    <rect x="0" y="170" width="200" height="30" fill="#8D6E63" opacity="0.1"/>
    <text x="100" y="190" font-family="Arial,sans-serif" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">Успенский собор (белокаменный)</text>
  </g>

  <!-- Suzdal Kremlin and Golden Ring towns -->
  <g transform="translate(250,88)">
    <rect x="0" y="0" width="220" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <!-- Kremlin wall -->
    <rect x="15" y="50" width="190" height="35" rx="2" fill="#E8EAF6" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Battlements -->
    <rect x="15" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="31" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="47" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="63" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="79" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="95" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="111" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="127" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="143" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="159" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="175" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <rect x="191" y="43" width="12" height="12" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
    <!-- Towers -->
    <rect x="10" y="30" width="16" height="55" rx="2" fill="#E8EAF6" stroke="#BDBDBD" stroke-width="1"/>
    <path d="M10,30 L18,18 L26,30" fill="#E8EAF6" stroke="#BDBDBD" stroke-width="1"/>
    <rect x="194" y="30" width="16" height="55" rx="2" fill="#E8EAF6" stroke="#BDBDBD" stroke-width="1"/>
    <path d="M194,30 L202,18 L210,30" fill="#E8EAF6" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Churches inside -->
    <path d="M85,50 Q85,30 100,22 Q115,30 115,50" fill="#F9A825" opacity="0.6"/>
    <line x1="100" y1="22" x2="100" y2="14" stroke="#F9A825" stroke-width="1"/>
    <rect x="97" y="12" width="6" height="4" fill="#F9A825" rx="1"/>
    <!-- Trees -->
    <circle cx="50" cy="25" r="8" fill="#4CAF50" opacity="0.4"/>
    <circle cx="160" cy="25" r="8" fill="#4CAF50" opacity="0.4"/>
    <text x="110" y="92" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">Суздальский Кремль</text>
  </g>

  <!-- Golden Ring towns map -->
  <g transform="translate(250,195)">
    <rect x="0" y="0" width="220" height="93" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="110" y="15" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Золотое кольцо России</text>
    <!-- Ring path -->
    <path d="M40,40 Q30,70 60,80 Q100,90 140,75 Q170,60 160,40 Q150,20 120,25 Q80,20 50,30 Q35,35 40,40" fill="none" stroke="#F9A825" stroke-width="2" stroke-dasharray="5,3"/>
    <!-- Town dots -->
    <circle cx="55" cy="40" r="4" fill="#C62828"/>
    <text x="55" y="52" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Владимир</text>
    <circle cx="40" cy="55" r="3" fill="#2E7D32"/>
    <text x="28" y="63" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Суздаль</text>
    <circle cx="75" cy="75" r="3" fill="#1565C0"/>
    <text x="75" y="87" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Ростов</text>
    <circle cx="120" cy="82" r="3" fill="#F9A825"/>
    <text x="120" y="87" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Ярославль</text>
    <circle cx="150" cy="60" r="3" fill="#7B1FA2"/>
    <text x="162" y="57" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Переславль</text>
    <circle cx="110" cy="30" r="3" fill="#E65100"/>
    <text x="98" y="27" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Юрьев</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Владимиро-Суздальское княжество</text>
</svg>