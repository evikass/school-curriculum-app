<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Куликовская битва</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Battle scene overview -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="220" height="200" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <!-- Field background -->
    <rect x="3" y="3" width="214" height="194" rx="4" fill="#FFF8E1" opacity="0.5"/>
    <!-- Kulikovo field (green plains) -->
    <rect x="5" y="5" width="210" height="190" rx="3" fill="#C8E6C9" opacity="0.3"/>

    <!-- River Don -->
    <path d="M0,50 Q55,42 110,48 Q165,54 220,46" stroke="#1565C0" stroke-width="3" fill="none" opacity="0.5"/>
    <text x="110" y="42" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">р. Дон</text>
    <!-- River Nepryadva -->
    <path d="M0,80 Q55,75 110,80 Q165,85 220,78" stroke="#1565C0" stroke-width="2" fill="none" opacity="0.3"/>
    <text x="170" y="73" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" opacity="0.7">р. Непрядва</text>

    <!-- Red Hill -->
    <ellipse cx="110" cy="130" rx="40" ry="15" fill="#A1887F" opacity="0.2"/>
    <text x="110" y="135" font-family="Arial,sans-serif" font-size="6" fill="#8D6E63" text-anchor="middle" opacity="0.7">Красный Холм</text>

    <!-- Russian army (left - red) -->
    <g transform="translate(20,90)">
      <rect x="0" y="0" width="40" height="30" rx="3" fill="#C62828" opacity="0.25" stroke="#C62828" stroke-width="0.8"/>
      <!-- Warrior figures -->
      <circle cx="10" cy="12" r="3" fill="#F9A825" opacity="0.6"/>
      <circle cx="20" cy="10" r="3" fill="#F9A825" opacity="0.6"/>
      <circle cx="30" cy="12" r="3" fill="#F9A825" opacity="0.6"/>
      <!-- Swords -->
      <line x1="10" y1="8" x2="8" y2="2" stroke="#888" stroke-width="0.8"/>
      <line x1="20" y1="6" x2="18" y2="0" stroke="#888" stroke-width="0.8"/>
      <line x1="30" y1="8" x2="28" y2="2" stroke="#888" stroke-width="0.8"/>
      <text x="20" y="27" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Передовой</text>
    </g>

    <!-- Main regiment -->
    <g transform="translate(15,125)">
      <rect x="0" y="0" width="50" height="35" rx="3" fill="#C62828" opacity="0.35" stroke="#C62828" stroke-width="1"/>
      <text x="25" y="10" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Большой</text>
      <text x="25" y="20" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">полк</text>
      <circle cx="12" cy="28" r="2.5" fill="#F9A825" opacity="0.5"/>
      <circle cx="25" cy="28" r="2.5" fill="#F9A825" opacity="0.5"/>
      <circle cx="38" cy="28" r="2.5" fill="#F9A825" opacity="0.5"/>
    </g>

    <!-- Ambush regiment -->
    <g transform="translate(5,170)">
      <rect x="0" y="0" width="35" height="20" rx="3" fill="#2E7D32" opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>
      <text x="17" y="12" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Засадный</text>
      <circle cx="10" cy="17" r="2" fill="#F9A825" opacity="0.4"/>
      <circle cx="25" cy="17" r="2" fill="#F9A825" opacity="0.4"/>
    </g>

    <!-- Mongol army (right) -->
    <g transform="translate(155,95)">
      <rect x="0" y="0" width="55" height="60" rx="3" fill="#8D6E63" opacity="0.2" stroke="#8D6E63" stroke-width="0.8"/>
      <text x="27" y="12" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle" font-weight="bold">Монголы</text>
      <!-- Figures -->
      <circle cx="12" cy="25" r="3" fill="#F9A825" opacity="0.5"/>
      <circle cx="27" cy="23" r="3" fill="#F9A825" opacity="0.5"/>
      <circle cx="42" cy="25" r="3" fill="#F9A825" opacity="0.5"/>
      <circle cx="12" cy="38" r="2.5" fill="#F9A825" opacity="0.4"/>
      <circle cx="27" cy="36" r="2.5" fill="#F9A825" opacity="0.4"/>
      <circle cx="42" cy="38" r="2.5" fill="#F9A825" opacity="0.4"/>
      <circle cx="20" cy="50" r="2" fill="#F9A825" opacity="0.3"/>
      <circle cx="35" cy="48" r="2" fill="#F9A825" opacity="0.3"/>
      <!-- Arrows -->
      <line x1="50" y1="30" x2="60" y2="35" stroke="#5D4037" stroke-width="0.8"/>
      <polygon points="60,35 55,33 56,38" fill="#5D4037"/>
      <line x1="50" y1="20" x2="58" y2="25" stroke="#5D4037" stroke-width="0.8"/>
      <polygon points="58,25 53,23 54,28" fill="#5D4037"/>
    </g>

    <!-- Movement arrows -->
    <path d="M55,140 L90,130" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
    <path d="M40,180 L70,155" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="3,2"/>
    <path d="M155,120 L120,130" stroke="#8D6E63" stroke-width="1.5" stroke-dasharray="3,2"/>

    <!-- Battle date -->
    <rect x="70" y="55" width="80" height="20" rx="3" fill="#C62828" opacity="0.1"/>
    <text x="110" y="66" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">8 сентября 1380</text>

    <!-- Dmitry Donskoy figure -->
    <g transform="translate(85,148)">
      <circle cx="10" cy="5" r="6" fill="#F9A825"/>
      <path d="M4,2 Q6,-4 10,-3 Q14,-4 16,2" fill="#90A4AE"/>
      <rect x="4" y="11" width="12" height="14" rx="2" fill="#C62828" opacity="0.7"/>
      <line x1="16" y1="14" x2="24" y2="6" stroke="#B0BEC5" stroke-width="1.5"/>
    </g>
    <text x="95" y="175" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Дмитрий Донской</text>

    <!-- Red banner -->
    <g transform="translate(90,100)">
      <line x1="0" y1="0" x2="0" y2="25" stroke="#8D6E63" stroke-width="1.5"/>
      <rect x="1" y="0" width="20" height="15" rx="1" fill="#C62828"/>
      <text x="11" y="11" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle">IC</text>
    </g>

    <text x="110" y="195" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Куликово поле</text>
  </g>

  <!-- Battle details panel -->
  <g transform="translate(265,88)">
    <rect x="0" y="0" width="205" height="200" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <text x="102" y="16" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Значение битвы</text>
    <line x1="10" y1="22" x2="195" y2="22" stroke="#F9A825" stroke-width="0.5" opacity="0.4"/>

    <!-- Battle details -->
    <rect x="8" y="28" width="190" height="32" rx="3" fill="#C62828" opacity="0.08"/>
    <text x="14" y="40" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Первая крупная победа над Ордой</text>
    <text x="14" y="52" font-family="Arial,sans-serif" font-size="6" fill="#666">Мамай разбит, путь к освобождению открыт</text>

    <rect x="8" y="65" width="190" height="32" rx="3" fill="#1565C0" opacity="0.08"/>
    <text x="14" y="77" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Москва - центр объединения</text>
    <text x="14" y="89" font-family="Arial,sans-serif" font-size="6" fill="#666">Окружные княжества признали лидерство Москвы</text>

    <rect x="8" y="102" width="190" height="32" rx="3" fill="#2E7D32" opacity="0.08"/>
    <text x="14" y="114" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Массовый героизм</text>
    <text x="14" y="126" font-family="Arial,sans-serif" font-size="6" fill="#666">Пересвет и Ослябля - монахи-богатыри</text>

    <rect x="8" y="139" width="190" height="32" rx="3" fill="#F9A825" opacity="0.08"/>
    <text x="14" y="151" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">Тактическое мастерство</text>
    <text x="14" y="163" font-family="Arial,sans-serif" font-size="6" fill="#666">Засадный полк решил исход сражения</text>

    <!-- Casualties note -->
    <rect x="25" y="178" width="155" height="16" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
    <text x="102" y="189" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Потери: до 100 тысяч человек с обеих сторон</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Куликовская битва</text>
</svg>