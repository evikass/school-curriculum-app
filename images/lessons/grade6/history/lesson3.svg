<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Владимир Мономах и расцвет Руси</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Vladimir Monomakh portrait silhouette -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
    <!-- Background circle (halo effect) -->
    <circle cx="70" cy="65" r="40" fill="#F9A825" opacity="0.1"/>
    <!-- Head silhouette -->
    <ellipse cx="70" cy="55" rx="22" ry="28" fill="#8D6E63"/>
    <!-- Beard -->
    <path d="M48,65 Q50,95 70,100 Q90,95 92,65" fill="#8D6E63"/>
    <!-- Crown/Monomakh cap -->
    <path d="M48,38 L50,22 L58,32 L66,18 L74,32 L82,22 L92,38" fill="#F9A825" stroke="#C62828" stroke-width="1"/>
    <rect x="46" y="35" width="48" height="8" rx="2" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
    <!-- Fur trim on cap -->
    <path d="M46,43 Q49,48 52,43 Q55,48 58,43 Q61,48 64,43 Q67,48 70,43 Q73,48 76,43 Q79,48 82,43 Q85,48 88,43 Q91,48 94,43" fill="#FFF8E1" stroke="#A1887F" stroke-width="0.5"/>
    <!-- Eyes -->
    <ellipse cx="62" cy="55" rx="3" ry="2" fill="#FFF8E1"/>
    <ellipse cx="78" cy="55" rx="3" ry="2" fill="#FFF8E1"/>
    <circle cx="62" cy="55" r="1.2" fill="#3E2723"/>
    <circle cx="78" cy="55" r="1.2" fill="#3E2723"/>
    <!-- Nose -->
    <line x1="70" y1="55" x2="68" y2="65" stroke="#6D4C41" stroke-width="1"/>
    <!-- Body/robe -->
    <rect x="42" y="100" width="56" height="60" rx="4" fill="#7B1FA2" opacity="0.8"/>
    <!-- Collar decoration -->
    <path d="M55,100 L70,115 L85,100" fill="none" stroke="#F9A825" stroke-width="1.5"/>
    <!-- Orb (держава) -->
    <circle cx="40" cy="150" r="8" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
    <line x1="40" y1="142" x2="40" y2="125" stroke="#C62828" stroke-width="1.5"/>
    <!-- Scepter -->
    <line x1="100" y1="120" x2="100" y2="160" stroke="#F9A825" stroke-width="2"/>
    <circle cx="100" cy="118" r="5" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
    <!-- Label -->
    <text x="70" y="175" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">Владимир Мономах</text>
    <text x="70" y="190" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Великий князь Киевский</text>
  </g>

  <!-- Book "Поучение" -->
  <g transform="translate(185,88)">
    <rect x="0" y="0" width="130" height="100" rx="6" fill="#FFF8E1" stroke="#8D6E63" stroke-width="1.5"/>
    <!-- Open book -->
    <rect x="15" y="15" width="45" height="65" rx="2" fill="#FFFDE7" stroke="#8D6E63" stroke-width="0.8" transform="skewY(-2)"/>
    <rect x="65" y="15" width="45" height="65" rx="2" fill="#FFFDE7" stroke="#8D6E63" stroke-width="0.8" transform="skewY(2)"/>
    <!-- Book spine -->
    <rect x="58" y="12" width="8" height="72" fill="#8D6E63" rx="2"/>
    <!-- Text lines left page -->
    <line x1="20" y1="28" x2="54" y2="27" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="35" x2="54" y2="34" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="42" x2="54" y2="41" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="49" x2="54" y2="48" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="56" x2="54" y2="55" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="63" x2="54" y2="62" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <!-- Initial letter -->
    <text x="22" y="30" font-family="serif" font-size="8" fill="#C62828">П</text>
    <!-- Text lines right page -->
    <line x1="72" y1="27" x2="106" y2="28" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="72" y1="34" x2="106" y2="35" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="72" y1="41" x2="106" y2="42" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="72" y1="48" x2="106" y2="49" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="72" y1="55" x2="106" y2="56" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <line x1="72" y1="62" x2="106" y2="63" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
    <text x="65" y="92" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle" font-weight="bold">Поучение Владимира Мономаха</text>
  </g>

  <!-- Golden Gate -->
  <g transform="translate(330,88)">
    <rect x="0" y="0" width="140" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <!-- Gate structure -->
    <rect x="20" y="25" width="100" height="65" rx="2" fill="#F9A825" opacity="0.3" stroke="#F9A825" stroke-width="1"/>
    <!-- Central arch -->
    <path d="M45,90 L45,50 Q70,30 95,50 L95,90" fill="#5D4037" stroke="#F9A825" stroke-width="1.5"/>
    <!-- Gate door -->
    <path d="M50,90 L50,55 Q70,38 90,55 L90,90" fill="#8D6E63"/>
    <!-- Gold decoration on arch -->
    <path d="M45,50 Q70,30 95,50" fill="none" stroke="#F9A825" stroke-width="2"/>
    <!-- Towers -->
    <rect x="10" y="15" width="20" height="75" rx="2" fill="#C62828" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <rect x="110" y="15" width="20" height="75" rx="2" fill="#C62828" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <!-- Tower tops -->
    <path d="M10,15 L20,5 L30,15" fill="#C62828"/>
    <path d="M110,15 L120,5 L130,15" fill="#C62828"/>
    <!-- Battlements -->
    <rect x="10" y="10" width="4" height="8" fill="#C62828" opacity="0.6"/>
    <rect x="18" y="10" width="4" height="8" fill="#C62828" opacity="0.6"/>
    <rect x="26" y="10" width="4" height="8" fill="#C62828" opacity="0.6"/>
    <rect x="110" y="10" width="4" height="8" fill="#C62828" opacity="0.6"/>
    <rect x="118" y="10" width="4" height="8" fill="#C62828" opacity="0.6"/>
    <rect x="126" y="10" width="4" height="8" fill="#C62828" opacity="0.6"/>
    <text x="70" y="92" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle" font-weight="bold">Золотые ворота</text>
  </g>

  <!-- Timeline of Monomakh's achievements -->
  <g transform="translate(185,195)">
    <rect x="0" y="0" width="285" height="95" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Timeline line -->
    <line x1="20" y1="30" x2="265" y2="30" stroke="#2E7D32" stroke-width="2"/>
    <!-- Timeline dots and events -->
    <circle cx="40" cy="30" r="5" fill="#C62828"/>
    <text x="40" y="48" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">1113</text>
    <text x="40" y="58" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Начало</text>
    <text x="40" y="67" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">правления</text>

    <circle cx="95" cy="30" r="5" fill="#F9A825"/>
    <text x="95" y="48" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">1116</text>
    <text x="95" y="58" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Золотые</text>
    <text x="95" y="67" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">ворота</text>

    <circle cx="150" cy="30" r="5" fill="#1565C0"/>
    <text x="150" y="48" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">1125</text>
    <text x="150" y="58" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Поучение</text>
    <text x="150" y="67" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">детям</text>

    <circle cx="210" cy="30" r="5" fill="#2E7D32"/>
    <text x="210" y="48" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Легенда</text>
    <text x="210" y="58" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">о шапке</text>
    <text x="210" y="67" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Мономаха</text>

    <!-- Arrow at end -->
    <polygon points="265,30 258,25 258,35" fill="#2E7D32"/>

    <!-- Top label -->
    <text x="142" y="15" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Расцвет Древней Руси при Мономахе</text>

    <!-- Additional info -->
    <text x="142" y="88" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Устав Владимира Мономаха - первая юридическая реформа</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Владимир Мономах и расцвет Руси</text>
</svg>