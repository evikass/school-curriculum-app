<!-- SECTION 1: Root zones diagram (left side) -->
<text x="130" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Зоны корня (от кончика)</text>

<!-- Root shape - main body -->
<path d="M130,80 L130,310 Q130,325 120,330 L140,330 Q130,325 130,310" fill="url(#rootGrad)" stroke="#388E3C" stroke-width="1.5"/>

