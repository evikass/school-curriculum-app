<!-- Key facts box -->
<rect x="240" y="232" width="220" height="24" rx="3" fill="#FFF9C4" opacity="0.4" stroke="#F9A825" stroke-width="0.5"/>
<text x="250" y="244" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">!! Корневые волоски живут 10–20 дней, постоянно обновляются</text>
<text x="250" y="253" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Площадь всасывания: волоски увеличивают в 10–20 раз</text>
