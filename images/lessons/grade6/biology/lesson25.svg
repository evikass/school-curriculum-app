<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Покрытосеменные растения, их признаки</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 25</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- FLOWERING PLANT DIAGRAM (left) -->
<text x="120" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Цветковое растение</text>

<!-- Root system -->
<g transform="translate(120,268)">
  <path d="M0,0 Q-25,15 -35,35" fill="none" stroke="#8D6E63" stroke-width="2.5"/>
  <path d="M0,0 Q25,15 35,35" fill="none" stroke="#8D6E63" stroke-width="2.5"/>
  <path d="M0,0 Q-10,20 -15,40" fill="none" stroke="#8D6E63" stroke-width="2"/>
  <path d="M0,0 Q10,20 15,40" fill="none" stroke="#8D6E63" stroke-width="2"/>
  <path d="M0,0 Q0,22 0,40" fill="none" stroke="#8D6E63" stroke-width="2"/>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">Корень</text>
</g>

<!-- Stem -->
<rect x="117" y="95" width="6" height="175" fill="#66BB6A" rx="2" stroke="#388E3C" stroke-width="0.5"/>
<text x="100" y="185" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="end">Стебель</text>
<line x1="102" y1="183" x2="117" y2="183" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="2,1"/>

<!-- Leaves -->
<g transform="translate(145,140)">
  <path d="M0,0 Q20,-15 35,-5 Q20,5 0,0" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Leaf veins -->
  <path d="M0,0 Q15,-6 30,-3" fill="none" stroke="#388E3C" stroke-width="0.4"/>
  <path d="M10,-3 Q15,-8 22,-6" fill="none" stroke="#388E3C" stroke-width="0.3"/>
  <path d="M10,-2 Q15,2 20,0" fill="none" stroke="#388E3C" stroke-width="0.3"/>
  <text x="40" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Лист</text>
</g>
<g transform="translate(95,175)">
  <path d="M0,0 Q-20,-12 -35,-3 Q-20,5 0,0" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M0,0 Q-15,-6 -30,-2" fill="none" stroke="#388E3C" stroke-width="0.4"/>
</g>

<!-- Flower (detailed) -->
<g transform="translate(120,85)">
  <!-- Pedicel -->
  <line x1="0" y1="10" x2="0" y2="20" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Receptacle -->
  <ellipse cx="0" cy="10" rx="4" ry="3" fill="#A5D6A7"/>
  <!-- Sepals -->
  <path d="M0,10 Q-12,5 -15,12 Q-10,14 0,10" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <path d="M0,10 Q12,5 15,12 Q10,14 0,10" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <path d="M0,10 Q-5,2 -8,8 Q-4,12 0,10" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Petals -->
  <path d="M0,0 Q-14,-10 -18,-2 Q-12,4 0,0" fill="#E91E63" opacity="0.7" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M0,0 Q14,-10 18,-2 Q12,4 0,0" fill="#E91E63" opacity="0.7" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M0,0 Q-10,-14 -4,-16 Q2,-10 0,0" fill="#F06292" opacity="0.6" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M0,0 Q10,-14 4,-16 Q-2,-10 0,0" fill="#F06292" opacity="0.6" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M0,0 Q0,-16 -6,-16 Q-2,-8 0,0" fill="#EC407A" opacity="0.5" stroke="#C2185B" stroke-width="0.5"/>
  <!-- Stamens -->
  <line x1="-3" y1="-2" x2="-8" y2="-10" stroke="#FFC107" stroke-width="0.8"/>
  <circle cx="-8" cy="-11" r="1.5" fill="#FFC107"/>
  <line x1="3" y1="-2" x2="8" y2="-10" stroke="#FFC107" stroke-width="0.8"/>
  <circle cx="8" cy="-11" r="1.5" fill="#FFC107"/>
  <!-- Pistil -->
  <line x1="0" y1="0" x2="0" y2="-12" stroke="#4CAF50" stroke-width="1"/>
  <circle cx="0" cy="-13" r="2" fill="#8BC34A"/>
  <!-- Ovary -->
  <ellipse cx="0" cy="5" rx="4" ry="4" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <text x="0" y="-20" font-family="Arial,sans-serif" font-size="7" fill="#C2185B" text-anchor="middle">Цветок</text>
</g>

<!-- Fruit -->
<g transform="translate(155,110)">
  <ellipse cx="0" cy="0" rx="8" ry="6" fill="#F44336" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
  <path d="M0,-6 Q2,-8 0,-10" fill="none" stroke="#388E3C" stroke-width="0.8"/>
  <text x="12" y="3" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Плод</text>
</g>

<!-- KEY FEATURES (center right) -->
<text x="330" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ключевые признаки</text>

<!-- Feature 1: Flower -->
<g transform="translate(270,90)">
  <circle cx="10" cy="0" r="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
  <path d="M10,-6 Q14,-8 16,-4 Q14,0 10,-2 Q6,0 4,-4 Q6,-8 10,-6" fill="#E91E63" opacity="0.6"/>
  <circle cx="10" cy="-2" r="2" fill="#FFC107"/>
  <text x="28" y="-3" font-family="Arial,sans-serif" font-size="7" fill="#C2185B" font-weight="bold">Цветок</text>
  <text x="28" y="5" font-family="Arial,sans-serif" font-size="6" fill="#666">орган размножения</text>
</g>

<!-- Feature 2: Fruit -->
<g transform="translate(270,120)">
  <circle cx="10" cy="0" r="10" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <ellipse cx="10" cy="0" rx="6" ry="5" fill="#F44336" opacity="0.6"/>
  <text x="28" y="-3" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Плод</text>
  <text x="28" y="5" font-family="Arial,sans-serif" font-size="6" fill="#666">защита семян</text>
</g>

<!-- Feature 3: Double fertilization -->
<g transform="translate(270,150)">
  <circle cx="10" cy="0" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <!-- Two sperm cells -->
  <circle cx="8" cy="-2" r="2" fill="#1565C0"/>
  <circle cx="12" cy="2" r="2" fill="#1565C0"/>
  <!-- Egg -->
  <circle cx="6" cy="3" r="2.5" fill="#E91E63" opacity="0.5"/>
  <text x="28" y="-3" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Двойное оплодотворение</text>
  <text x="28" y="5" font-family="Arial,sans-serif" font-size="6" fill="#666">2 спермия → зародыш + эндосперм</text>
</g>

<!-- Double fertilization detail -->
<g transform="translate(340,180)">
  <!-- Embryo sac -->
  <ellipse cx="0" cy="0" rx="35" ry="18" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8" opacity="0.5"/>
  <text x="0" y="-12" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">Зародышевый мешок</text>
  <!-- Egg cell -->
  <circle cx="-15" cy="3" r="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.8"/>
  <text x="-15" y="6" font-family="Arial,sans-serif" font-size="4" fill="#C2185B" text-anchor="middle">яйц.</text>
  <!-- Central cell -->
  <circle cx="10" cy="2" r="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="10" y="4" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20" text-anchor="middle">центр.</text>
  <!-- Sperm 1 → egg -->
  <path d="M-25,3 Q-22,0 -19,3" fill="none" stroke="#1565C0" stroke-width="1" marker-end="none"/>
  <circle cx="-24" cy="2" r="1.5" fill="#1565C0"/>
  <text x="-28" y="0" font-family="Arial,sans-serif" font-size="4" fill="#1565C0">спермий 1</text>
  <!-- Sperm 2 → central -->
  <path d="M25,2 Q22,0 18,2" fill="none" stroke="#1565C0" stroke-width="1"/>
  <circle cx="24" cy="1" r="1.5" fill="#1565C0"/>
  <text x="20" y="-4" font-family="Arial,sans-serif" font-size="4" fill="#1565C0">спермий 2</text>
  <!-- Results -->
  <text x="-18" y="15" font-family="Arial,sans-serif" font-size="5" fill="#C2185B">→ Зародыш (2n)</text>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">→ Эндосперм (3n)</text>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">Навашин, 1898</text>
</g>

<!-- COMPARISON: Gymnosperms vs Angiosperms (bottom) -->
<text x="250" y="250" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сравнение: Голосеменные vs Покрытосеменные</text>
<line x1="30" y1="254" x2="470" y2="254" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

<!-- Table -->
<rect x="30" y="258" width="120" height="14" fill="#1B5E20" opacity="0.15" rx="1"/>
<rect x="150" y="258" width="160" height="14" fill="#FF8F00" opacity="0.1" rx="1"/>
<rect x="310" y="258" width="160" height="14" fill="#E91E63" opacity="0.1" rx="1"/>
<text x="90" y="269" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Признак</text>
<text x="230" y="269" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Голосеменные</text>
<text x="390" y="269" font-family="Arial,sans-serif" font-size="6" fill="#C2185B" text-anchor="middle" font-weight="bold">Покрытосеменные</text>

<!-- Row 1: Семена -->
<text x="90" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Семена</text>
<text x="230" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Открытые (на чешуе)</text>
<text x="390" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">В плодах (закрытые)</text>

<!-- Row 2: Цветок -->
<text x="90" y="296" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Цветок</text>
<text x="230" y="296" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Нет</text>
<text x="390" y="296" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Есть!</text>

<!-- Row 3: Плод -->
<text x="90" y="308" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Плод</text>
<text x="230" y="308" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Нет</text>
<text x="390" y="308" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Есть!</text>

<!-- Row 4: Оплодотворение -->
<text x="90" y="320" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Оплодотворение</text>
<text x="230" y="320" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Простое (1 спермий)</text>
<text x="390" y="320" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Двойное (2 спермия)</text>

<!-- Row 5: Виды -->
<text x="90" y="332" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Число видов</text>
<text x="230" y="332" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">~800</text>
<text x="390" y="332" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">~300 000!</text>

<!-- Divider lines -->
<line x1="150" y1="258" x2="150" y2="338" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="310" y1="258" x2="310" y2="338" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="30" y1="272" x2="470" y2="272" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
</svg>