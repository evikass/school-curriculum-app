<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Многообразие голосеменных</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 23</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- 6 CONIFER SPECIES ROW 1 -->
<!-- СОСНА (Pine) -->
<g transform="translate(55,75)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сосна</text>
  <!-- Trunk -->
  <rect x="-3" y="15" width="6" height="55" fill="#795548" rx="1"/>
  <!-- Crown - umbrella shape -->
  <ellipse cx="0" cy="18" rx="22" ry="14" fill="#2E7D32" opacity="0.8"/>
  <ellipse cx="-8" cy="26" rx="12" ry="8" fill="#388E3C" opacity="0.6"/>
  <ellipse cx="10" cy="24" rx="10" ry="7" fill="#388E3C" opacity="0.6"/>
  <!-- Needles in pairs -->
  <line x1="20" y1="15" x2="25" y2="8" stroke="#1B5E20" stroke-width="1"/>
  <line x1="22" y1="15" x2="27" y2="8" stroke="#1B5E20" stroke-width="1"/>
  <!-- Cone -->
  <ellipse cx="12" cy="30" rx="4" ry="6" fill="#8D6E63"/>
  <!-- Ground -->
  <ellipse cx="0" cy="70" rx="25" ry="4" fill="#A5D6A7" opacity="0.5"/>
  <text x="0" y="84" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Хвоинки по 2</text>
  <text x="0" y="92" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Шишка округлая</text>
</g>

<!-- ЕЛЬ (Spruce) -->
<g transform="translate(145,75)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ель</text>
  <!-- Trunk -->
  <rect x="-2" y="10" width="4" height="60" fill="#5D4037" rx="1"/>
  <!-- Crown - triangular/pyramidal -->
  <polygon points="0,-5 -25,35 25,35" fill="#1B5E20" opacity="0.8"/>
  <polygon points="0,-2 -20,25 20,25" fill="#2E7D32" opacity="0.6"/>
  <!-- Branch tiers -->
  <line x1="-22" y1="25" x2="0" y2="10" stroke="#1B5E20" stroke-width="0.5"/>
  <line x1="22" y1="25" x2="0" y2="10" stroke="#1B5E20" stroke-width="0.5"/>
  <line x1="-18" y1="15" x2="0" y2="2" stroke="#1B5E20" stroke-width="0.5"/>
  <line x1="18" y1="15" x2="0" y2="2" stroke="#1B5E20" stroke-width="0.5"/>
  <!-- Hanging cone -->
  <ellipse cx="-10" cy="38" rx="3" ry="7" fill="#A1887F"/>
  <text x="0" y="84" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Хвоинки одиночные</text>
  <text x="0" y="92" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Шишка свисает</text>
</g>

<!-- ЛИСТВЕННИЦА (Larch) -->
<g transform="translate(235,75)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Лиственница</text>
  <!-- Trunk -->
  <rect x="-3" y="10" width="6" height="60" fill="#5D4037" rx="1"/>
  <!-- Crown - open, with soft tufts -->
  <ellipse cx="-12" cy="15" rx="10" ry="8" fill="#81C784" opacity="0.7"/>
  <ellipse cx="12" cy="12" rx="10" ry="8" fill="#81C784" opacity="0.7"/>
  <ellipse cx="0" cy="8" rx="12" ry="8" fill="#A5D6A7" opacity="0.7"/>
  <ellipse cx="-8" cy="25" rx="8" ry="6" fill="#81C784" opacity="0.5"/>
  <ellipse cx="10" cy="22" rx="8" ry="6" fill="#81C784" opacity="0.5"/>
  <!-- Soft needle tufts -->
  <circle cx="-15" cy="14" r="3" fill="#C8E6C9" opacity="0.6"/>
  <circle cx="15" cy="11" r="3" fill="#C8E6C9" opacity="0.6"/>
  <circle cx="0" cy="6" r="3" fill="#C8E6C9" opacity="0.6"/>
  <!-- Cone small -->
  <ellipse cx="8" cy="26" rx="3" ry="5" fill="#BCAAA4"/>
  <text x="0" y="84" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Хвоинки пучками</text>
  <text x="0" y="92" font-family="Arial,sans-serif" font-size="5" fill="#FF8F00" text-anchor="middle">Листопадная!!</text>
</g>

<!-- ПИХТА (Fir) -->
<g transform="translate(325,75)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Пихта</text>
  <!-- Trunk -->
  <rect x="-3" y="10" width="6" height="60" fill="#4E342E" rx="1"/>
  <!-- Crown - very narrow spire -->
  <polygon points="0,-8 -20,35 20,35" fill="#1B5E20" opacity="0.85"/>
  <polygon points="0,-5 -15,25 15,25" fill="#2E7D32" opacity="0.6"/>
  <!-- Upright cone on top -->
  <ellipse cx="2" cy="-2" rx="4" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="-2" y1="-6" x2="6" y2="-6" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="-3" y1="-2" x2="7" y2="-2" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="-2" y1="2" x2="6" y2="2" stroke="#5D4037" stroke-width="0.5"/>
  <text x="0" y="84" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Плоские хвоинки</text>
  <text x="0" y="92" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Шишка вверх!</text>
</g>

<!-- КЕДР (Cedar/Pine) -->
<g transform="translate(415,75)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кедр</text>
  <!-- Trunk -->
  <rect x="-4" y="15" width="8" height="55" fill="#5D4037" rx="1"/>
  <!-- Crown - dense rounded -->
  <ellipse cx="0" cy="15" rx="25" ry="18" fill="#1B5E20" opacity="0.85"/>
  <ellipse cx="-10" cy="20" rx="12" ry="10" fill="#2E7D32" opacity="0.5"/>
  <ellipse cx="10" cy="18" rx="12" ry="10" fill="#2E7D32" opacity="0.5"/>
  <!-- Needles in bundles of 5 -->
  <line x1="22" y1="12" x2="28" y2="5" stroke="#1B5E20" stroke-width="0.7"/>
  <line x1="23" y1="12" x2="29" y2="5" stroke="#1B5E20" stroke-width="0.7"/>
  <line x1="24" y1="12" x2="30" y2="5" stroke="#1B5E20" stroke-width="0.7"/>
  <!-- Large cone -->
  <ellipse cx="-15" cy="28" rx="6" ry="9" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Cedar nuts -->
  <ellipse cx="-16" cy="26" rx="2" ry="3" fill="#FFD54F"/>
  <text x="0" y="84" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Хвоинки по 5</text>
  <text x="0" y="92" font-family="Arial,sans-serif" font-size="5" fill="#FF8F00" text-anchor="middle">Кедровые орехи!</text>
</g>

<!-- MOЖЖЕВЕЛЬНИК (Juniper) - row 2 left -->
<g transform="translate(70,175)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Можжевельник</text>
  <!-- Shrub shape -->
  <rect x="-2" y="15" width="4" height="30" fill="#5D4037" rx="1"/>
  <ellipse cx="0" cy="18" rx="25" ry="15" fill="#1B5E20" opacity="0.8"/>
  <ellipse cx="-10" cy="22" rx="12" ry="8" fill="#2E7D32" opacity="0.5"/>
  <ellipse cx="12" cy="20" rx="10" ry="8" fill="#2E7D32" opacity="0.5"/>
  <!-- Prickly needles -->
  <line x1="20" y1="12" x2="28" y2="6" stroke="#1B5E20" stroke-width="1"/>
  <line x1="22" y1="14" x2="30" y2="8" stroke="#1B5E20" stroke-width="1"/>
  <!-- Berry-like cone -->
  <circle cx="-5" cy="25" r="4" fill="#283593" opacity="0.8" stroke="#1A237E" stroke-width="0.5"/>
  <circle cx="8" cy="22" r="3.5" fill="#283593" opacity="0.7" stroke="#1A237E" stroke-width="0.5"/>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Колючие хвоинки</text>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="5" fill="#283593" text-anchor="middle">Шишкоягода синяя</text>
</g>

<!-- GINKGO (row 2 center) -->
<g transform="translate(230,175)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Гинкго</text>
  <!-- Trunk -->
  <rect x="-3" y="15" width="6" height="35" fill="#795548" rx="1"/>
  <!-- Branches -->
  <path d="M-3,20 Q-15,15 -20,10" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M3,20 Q15,15 20,10" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M-3,28 Q-18,22 -22,18" fill="none" stroke="#795548" stroke-width="1"/>
  <path d="M3,28 Q18,22 22,18" fill="none" stroke="#795548" stroke-width="1"/>
  <!-- Fan-shaped leaves -->
  <path d="M-20,10 Q-25,5 -22,0 Q-18,-2 -15,0 Q-18,5 -20,10" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <path d="M20,10 Q25,5 22,0 Q18,-2 15,0 Q18,5 20,10" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <path d="M-22,18 Q-28,12 -25,6 Q-22,4 -18,6 Q-20,12 -22,18" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <path d="M22,18 Q28,12 25,6 Q22,4 18,6 Q20,12 22,18" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Вееровидные листья</text>
  <text x="0" y="68" font-family="Arial,sans-serif" font-size="5" fill="#FF8F00" text-anchor="middle">Живое ископаемое!</text>
</g>

<!-- CYCAD (row 2 right) -->
<g transform="translate(380,175)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Саговник</text>
  <!-- Thick trunk -->
  <rect x="-6" y="20" width="12" height="30" fill="#8D6E63" rx="3"/>
  <!-- Trunk scar pattern -->
  <line x1="-6" y1="25" x2="6" y2="25" stroke="#795548" stroke-width="0.5"/>
  <line x1="-6" y1="30" x2="6" y2="30" stroke="#795548" stroke-width="0.5"/>
  <line x1="-6" y1="35" x2="6" y2="35" stroke="#795548" stroke-width="0.5"/>
  <!-- Crown of large fronds -->
  <path d="M0,20 Q-25,5 -30,-10" fill="none" stroke="#1B5E20" stroke-width="1.5"/>
  <path d="M0,20 Q25,5 30,-10" fill="none" stroke="#1B5E20" stroke-width="1.5"/>
  <path d="M0,20 Q-15,8 -18,-5" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M0,20 Q15,8 18,-5" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M0,20 Q0,5 0,-8" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Leaflets on fronds -->
  <line x1="-20" y1="8" x2="-15" y2="3" stroke="#4CAF50" stroke-width="0.8"/>
  <line x1="-22" y1="3" x2="-17" y2="-2" stroke="#4CAF50" stroke-width="0.8"/>
  <line x1="20" y1="8" x2="15" y2="3" stroke="#4CAF50" stroke-width="0.8"/>
  <line x1="22" y1="3" x2="17" y2="-2" stroke="#4CAF50" stroke-width="0.8"/>
  <!-- Cone in center -->
  <ellipse cx="0" cy="14" rx="5" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Перистые листья</text>
  <text x="0" y="68" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Похож на пальму</text>
</g>

<!-- COMPARISON TABLE (bottom) -->
<text x="250" y="258" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сравнительная таблица хвойных</text>
<line x1="30" y1="262" x2="470" y2="262" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Table header -->
<rect x="30" y="265" width="75" height="14" fill="#2E7D32" opacity="0.2" rx="1"/>
<text x="67" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Признак</text>
<rect x="105" y="265" width="65" height="14" fill="#2E7D32" opacity="0.15" rx="1"/>
<text x="137" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сосна</text>
<rect x="170" y="265" width="65" height="14" fill="#2E7D32" opacity="0.15" rx="1"/>
<text x="202" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ель</text>
<rect x="235" y="265" width="65" height="14" fill="#2E7D32" opacity="0.15" rx="1"/>
<text x="267" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Пихта</text>
<rect x="300" y="265" width="70" height="14" fill="#2E7D32" opacity="0.15" rx="1"/>
<text x="335" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Лиственница</text>
<rect x="370" y="265" width="55" height="14" fill="#2E7D32" opacity="0.15" rx="1"/>
<text x="397" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кедр</text>
<rect x="425" y="265" width="45" height="14" fill="#2E7D32" opacity="0.15" rx="1"/>
<text x="447" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Можжев.</text>

<!-- Row: Хвоинки -->
<text x="67" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Хвоинки</text>
<text x="137" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">по 2</text>
<text x="202" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">1, 4-гранная</text>
<text x="267" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">плоская, мягк.</text>
<text x="335" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">пучками, опад.</text>
<text x="397" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">по 5</text>
<text x="447" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">колючая</text>

<!-- Row: Шишки -->
<text x="67" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Шишки</text>
<text x="137" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">округл. ↓</text>
<text x="202" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">продолг. ↓</text>
<text x="267" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">вверх ↑</text>
<text x="335" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">мелкие</text>
<text x="397" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">крупн. ↑</text>
<text x="447" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">шишкоягода</text>

<!-- Row: Листопадность -->
<text x="67" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Листопадн.</text>
<text x="137" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">Нет</text>
<text x="202" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">Нет</text>
<text x="267" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">Нет</text>
<text x="335" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Да!!</text>
<text x="397" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">Нет</text>
<text x="447" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">Нет</text>

<!-- Divider lines in table -->
<line x1="105" y1="265" x2="105" y2="320" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="170" y1="265" x2="170" y2="320" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="235" y1="265" x2="235" y2="320" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="300" y1="265" x2="300" y2="320" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="370" y1="265" x2="370" y2="320" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="425" y1="265" x2="425" y2="320" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="30" y1="279" x2="470" y2="279" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="30" y1="294" x2="470" y2="294" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
<line x1="30" y1="307" x2="470" y2="307" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>

<!-- Note -->
<text x="250" y="338" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle">Отдел Голосеменные: ~800 видов, 4 класса — Хвойные, Гинкговые, Саговниковые, Гнетовые</text>
</svg>