<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="bactBody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFECB3"/><stop offset="100%" stop-color="#FFB300"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Бактерии, их строение и жизнедеятельность</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 8</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Large bacterial cell diagram (left) -->
<g transform="translate(150,190)">
  <!-- Capsule (outermost) -->
  <ellipse cx="0" cy="0" rx="75" ry="42" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="55" y="-38" font-family="Arial,sans-serif" font-size="6" fill="#E65100">Капсула</text>
  
  <!-- Cell wall -->
  <ellipse cx="0" cy="0" rx="65" ry="35" fill="url(#bactBody)" opacity="0.5" stroke="#F57F17" stroke-width="2"/>
  <text x="-72" y="-30" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">Клеточная</text>
  <text x="-72" y="-22" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">стенка</text>
  <line x1="-55" y1="-25" x2="-62" y2="-28" stroke="#F57F17" stroke-width="0.5"/>
  
  <!-- Cell membrane -->
  <ellipse cx="0" cy="0" rx="58" ry="30" fill="none" stroke="#FF8F00" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="62" y="20" font-family="Arial,sans-serif" font-size="6" fill="#FF8F00">Мембрана</text>
  <line x1="52" y1="15" x2="60" y2="18" stroke="#FF8F00" stroke-width="0.5"/>
  
  <!-- Nucleoid (irregular DNA region) -->
  <path d="M-20,-10 C-15,-18 0,-15 5,-10 C10,-5 15,-12 20,-8 C25,-4 20,5 15,3 C10,1 5,8 0,5 C-5,2 -10,8 -15,3 C-20,-2 -25,-5 -20,-10 Z" fill="#1565C0" opacity="0.25" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Нуклеоид</text>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">(ДНК)</text>
  
  <!-- Ribosomes -->
  <circle cx="-35" cy="-15" r="3" fill="#9C27B0" opacity="0.5"/>
  <circle cx="-40" cy="5" r="3" fill="#9C27B0" opacity="0.5"/>
  <circle cx="30" cy="-20" r="3" fill="#9C27B0" opacity="0.5"/>
  <circle cx="35" cy="10" r="3" fill="#9C27B0" opacity="0.5"/>
  <circle cx="-25" cy="18" r="3" fill="#9C27B0" opacity="0.5"/>
  <circle cx="15" cy="20" r="3" fill="#9C27B0" opacity="0.5"/>
  <text x="45" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#9C27B0">Рибосомы</text>
  
  <!-- Flagellum -->
  <path d="M65,0 C75,-8 80,5 90,-3 C95,-7 100,0 105,-5" fill="none" stroke="#795548" stroke-width="1.5"/>
  <text x="95" y="10" font-family="Arial,sans-serif" font-size="6" fill="#795548">Жгутик</text>
  
  <!-- Pili (short hairs) -->
  <line x1="-55" y1="-15" x2="-68" y2="-22" stroke="#795548" stroke-width="0.8"/>
  <line x1="-60" y1="-5" x2="-73" y2="-8" stroke="#795548" stroke-width="0.8"/>
  <line x1="-58" y1="10" x2="-71" y2="14" stroke="#795548" stroke-width="0.8"/>
  <line x1="55" y1="15" x2="66" y2="20" stroke="#795548" stroke-width="0.8"/>
  <text x="-80" y="10" font-family="Arial,sans-serif" font-size="5" fill="#795548">Пили</text>
  
  <!-- Plasmid (small circular DNA) -->
  <circle cx="25" cy="-12" r="6" fill="none" stroke="#1565C0" stroke-width="0.8" opacity="0.5"/>
  <text x="38" y="-8" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">Плазмида</text>
  
  <!-- Cytoplasm label -->
  <text x="-30" y="25" font-family="Arial,sans-serif" font-size="5" fill="#666">Цитоплазма</text>
  
  <!-- Title -->
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Строение бактериальной клетки</text>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Прокариот (без ядра)</text>
</g>

<!-- Bacterial shapes (right side) -->
<text x="390" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Формы бактерий</text>

<!-- Кокки (spherical) -->
<g transform="translate(380,100)">
  <circle cx="-15" cy="0" r="10" fill="#FFECB3" stroke="#F57F17" stroke-width="1.2"/>
  <circle cx="5" cy="0" r="10" fill="#FFECB3" stroke="#F57F17" stroke-width="1.2"/>
  <circle cx="-5" cy="-12" r="10" fill="#FFECB3" stroke="#F57F17" stroke-width="1.2"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кокки</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">шаровидные</text>
</g>

<!-- Бациллы (rod-shaped) -->
<g transform="translate(380,165)">
  <ellipse cx="-15" cy="0" rx="18" ry="7" fill="#FFE0B2" stroke="#E65100" stroke-width="1.2"/>
  <ellipse cx="18" cy="0" rx="18" ry="7" fill="#FFE0B2" stroke="#E65100" stroke-width="1.2"/>
  <!-- Chain connection -->
  <rect x="0" y="-4" width="3" height="8" fill="#FFE0B2" stroke="none"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Бациллы</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">палочковидные</text>
</g>

<!-- Вибрионы (comma-shaped) -->
<g transform="translate(390,225)">
  <path d="M-20,5 C-15,-10 -5,-15 5,-10 C10,-7 15,-3 15,5" fill="none" stroke="#F57F17" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M-20,5 C-15,-10 -5,-15 5,-10 C10,-7 15,-3 15,5" fill="none" stroke="#FFECB3" stroke-width="3" stroke-linecap="round"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Вибрионы</text>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">изогнутые</text>
</g>

<!-- Спириллы (spiral) -->
<g transform="translate(390,280)">
  <path d="M-25,0 C-20,-12 -10,-12 -5,0 C0,12 10,12 15,0 C20,-12 25,-8 30,0" fill="none" stroke="#F57F17" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M-25,0 C-20,-12 -10,-12 -5,0 C0,12 10,12 15,0 C20,-12 25,-8 30,0" fill="none" stroke="#FFECB3" stroke-width="2.5" stroke-linecap="round"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Спириллы</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">спиральные</text>
</g>

<!-- Nutrition types at bottom left -->
<rect x="15" y="285" width="115" height="50" rx="5" fill="#1B5E20" opacity="0.06" stroke="#2E7D32" stroke-width="0.8"/>
<text x="72" y="298" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Питание бактерий</text>
<text x="72" y="310" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">🔬 Автотрофы</text>
<text x="72" y="320" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фото-, хемосинтетики</text>
<text x="72" y="330" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">🍽 Гетеротрофы</text>

<!-- Prokaryote note -->
<rect x="140" y="295" width="110" height="35" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6"/>
<text x="195" y="308" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Прокариоты</text>
<text x="195" y="318" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">Нет оформленного ядра</text>
<text x="195" y="327" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">Нет мембранных органелл</text>
</svg>