<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="cytoGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#A5D6A7"/></linearGradient>
<linearGradient id="nucleusGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2E7D32" stop-opacity="0.3"/><stop offset="100%" stop-color="#1B5E20" stop-opacity="0.4"/></linearGradient>
<linearGradient id="vacuoleGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E1F5FE" stop-opacity="0.6"/><stop offset="100%" stop-color="#B3E5FC" stop-opacity="0.4"/></linearGradient>
<linearGradient id="animalCyto" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCCBC" stop-opacity="0.4"/><stop offset="100%" stop-color="#FFAB91" stop-opacity="0.3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение клетки</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 5</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- PLANT CELL (left side) -->
<g transform="translate(140,195)">
  <!-- Cell wall (outermost) -->
  <rect x="-85" y="-70" width="170" height="140" rx="8" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-dasharray="none"/>
  
  <!-- Cell membrane (inside wall) -->
  <rect x="-80" y="-65" width="160" height="130" rx="5" fill="url(#cytoGrad)" stroke="#2E7D32" stroke-width="1.5"/>
  
  <!-- Cytoplasm label area -->
  
  <!-- Vacuole (large, central) -->
  <ellipse cx="5" cy="5" rx="50" ry="40" fill="url(#vacuoleGrad)" stroke="#4FC3F7" stroke-width="1.2"/>
  <text x="5" y="8" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">Вакуоль</text>
  
  <!-- Nucleus -->
  <ellipse cx="-40" cy="-25" rx="25" ry="20" fill="url(#nucleusGrad)" stroke="#1B5E20" stroke-width="1.5"/>
  <!-- Nucleolus -->
  <ellipse cx="-38" cy="-23" rx="8" ry="6" fill="#1B5E20" opacity="0.35"/>
  <text x="-40" y="-22" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Ядро</text>
  
  <!-- Chromatin in nucleus -->
  <path d="M-50,-28 C-46,-25 -42,-30 -38,-27" fill="none" stroke="#1B5E20" stroke-width="0.6" opacity="0.5"/>
  
  <!-- Chloroplasts -->
  <ellipse cx="45" cy="-35" rx="14" ry="8" fill="#4CAF50" opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
  <line x1="38" y1="-35" x2="52" y2="-35" stroke="#2E7D32" stroke-width="0.5" opacity="0.6"/>
  <!-- Grana inside chloroplast -->
  <rect x="42" y="-39" width="3" height="8" rx="1" fill="#2E7D32" opacity="0.3"/>
  
  <ellipse cx="50" cy="-15" rx="12" ry="7" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
  <rect x="47" y="-19" width="2.5" height="7" rx="0.5" fill="#2E7D32" opacity="0.3"/>
  
  <ellipse cx="-55" cy="20" rx="11" ry="7" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
  
  <!-- Mitochondria -->
  <ellipse cx="30" cy="30" rx="12" ry="6" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
  <path d="M22,30 Q26,26 30,30 Q34,34 38,30" fill="none" stroke="#E65100" stroke-width="0.6"/>
  
  <ellipse cx="-30" cy="40" rx="10" ry="5" fill="#FF9800" opacity="0.35" stroke="#E65100" stroke-width="0.8"/>
  <path d="M-36,40 Q-33,37 -30,40 Q-27,43 -24,40" fill="none" stroke="#E65100" stroke-width="0.6"/>
  
  <!-- Ribosomes (small dots) -->
  <circle cx="20" cy="-45" r="2" fill="#9C27B0" opacity="0.6"/>
  <circle cx="30" cy="-50" r="2" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-10" cy="-50" r="2" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-60" cy="-10" r="2" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-55" cy="0" r="2" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Endoplasmic reticulum -->
  <path d="M-15,-10 C-8,-15 -2,-8 5,-13 C12,-18 18,-10 25,-15" fill="none" stroke="#795548" stroke-width="1"/>
  <path d="M-12,-8 C-5,-13 1,-6 8,-11 C15,-16 21,-8 28,-13" fill="none" stroke="#795548" stroke-width="1"/>
  
  <!-- Golgi apparatus -->
  <path d="M-65,-35 C-60,-40 -50,-40 -45,-35" fill="none" stroke="#FF5722" stroke-width="1.2"/>
  <path d="M-65,-32 C-60,-37 -50,-37 -45,-32" fill="none" stroke="#FF5722" stroke-width="1.2"/>
  <path d="M-65,-29 C-60,-34 -50,-34 -45,-29" fill="none" stroke="#FF5722" stroke-width="1"/>
  
  <!-- LABELS with leader lines -->
  <line x1="-82" y1="-65" x2="-82" y2="-80" stroke="#333" stroke-width="0.5"/>
  <line x1="-82" y1="-80" x2="-55" y2="-80" stroke="#333" stroke-width="0.5"/>
  <text x="-53" y="-77" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Клеточная стенка</text>
  
  <line x1="-76" y1="-50" x2="-76" y2="-88" stroke="#333" stroke-width="0.5"/>
  <line x1="-76" y1="-88" x2="-30" y2="-88" stroke="#333" stroke-width="0.5"/>
  <text x="-28" y="-85" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Мембрана</text>
  
  <line x1="45" y1="-35" x2="75" y2="-55" stroke="#333" stroke-width="0.5"/>
  <text x="77" y="-52" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Хлоропласт</text>
  
  <line x1="30" y1="30" x2="75" y2="35" stroke="#333" stroke-width="0.5"/>
  <text x="77" y="38" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Митохондрия</text>
  
  <line x1="20" y1="-45" x2="75" y2="-65" stroke="#333" stroke-width="0.5"/>
  <text x="77" y="-62" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Рибосомы</text>
  
  <line x1="-65" y1="-32" x2="-85" y2="-45" stroke="#333" stroke-width="0.5"/>
  <text x="-87" y="-42" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="end">Комплекс</text>
  <text x="-87" y="-35" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="end">Гольджи</text>
  
  <text x="0" y="78" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Растительная клетка</text>
</g>

<!-- ANIMAL CELL (right side, smaller) -->
<g transform="translate(395,195)">
  <!-- Cell membrane only (no wall) -->
  <ellipse cx="0" cy="0" rx="55" ry="48" fill="url(#animalCyto)" stroke="#BF360C" stroke-width="1.8"/>
  
  <!-- Nucleus -->
  <ellipse cx="-5" cy="-5" rx="20" ry="16" fill="#BF360C" opacity="0.2" stroke="#BF360C" stroke-width="1.2"/>
  <ellipse cx="-5" cy="-5" rx="7" ry="5" fill="#BF360C" opacity="0.25"/>
  
  <!-- Mitochondria -->
  <ellipse cx="25" cy="15" rx="10" ry="5" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
  <path d="M19,15 Q22,12 25,15 Q28,18 31,15" fill="none" stroke="#E65100" stroke-width="0.5"/>
  
  <ellipse cx="-25" cy="20" rx="9" ry="4.5" fill="#FF9800" opacity="0.35" stroke="#E65100" stroke-width="0.7"/>
  
  <!-- Ribosomes -->
  <circle cx="15" cy="-20" r="2" fill="#9C27B0" opacity="0.5"/>
  <circle cx="25" cy="-25" r="2" fill="#9C27B0" opacity="0.5"/>
  <circle cx="-20" cy="-18" r="2" fill="#9C27B0" opacity="0.5"/>
  <circle cx="30" cy="-5" r="2" fill="#9C27B0" opacity="0.5"/>
  
  <!-- ER -->
  <path d="M10,-8 C15,-12 20,-6 25,-10" fill="none" stroke="#795548" stroke-width="0.8"/>
  <path d="M12,-6 C17,-10 22,-4 27,-8" fill="none" stroke="#795548" stroke-width="0.8"/>
  
  <!-- Centrioles -->
  <rect x="30" cy="-30" y="-32" width="3" height="8" rx="1" fill="#5D4037" opacity="0.5"/>
  <rect x="34" y="-32" width="3" height="8" rx="1" fill="#5D4037" opacity="0.5"/>
  
  <!-- Lysosomes -->
  <circle cx="20" cy="30" r="5" fill="#F44336" opacity="0.3" stroke="#C62828" stroke-width="0.7"/>
  <circle cx="-30" cy="-10" r="4" fill="#F44336" opacity="0.25" stroke="#C62828" stroke-width="0.6"/>
  
  <!-- Labels -->
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" text-anchor="middle" font-weight="bold">Животная клетка</text>
  
  <!-- Key differences note -->
  <text x="0" y="72" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Нет стенки, хлоропластов</text>
  <text x="0" y="80" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">и крупной вакуоли</text>
</g>

<!-- Title labels -->
<text x="140" y="68" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Растительная клетка</text>
<text x="395" y="68" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" text-anchor="middle" font-weight="bold">Животная клетка</text>

<!-- Comparison note at bottom -->
<rect x="30" y="300" width="440" height="35" rx="5" fill="#1B5E20" opacity="0.06" stroke="#2E7D32" stroke-width="0.6"/>
<text x="250" y="315" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Главная схема: мембрана → цитоплазма → ядро → органеллы</text>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Растительная: стенка + хлоропласты + вакуоль | Животная: центриоли + лизосомы</text>
</svg>