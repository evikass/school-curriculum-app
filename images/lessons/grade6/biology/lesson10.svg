<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="usefulGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="harmGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFEBEE"/><stop offset="100%" stop-color="#FFCDD2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Роль бактерий в природе и жизни человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 10</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section: Useful bacteria (left) -->
<rect x="15" y="56" width="225" height="170" rx="8" fill="url(#usefulGrad)" stroke="#4CAF50" stroke-width="1.2"/>
<text x="127" y="72" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">✅ Полезные бактерии</text>

<!-- Молочнокислые бактерии -->
<g transform="translate(65,100)">
  <circle cx="-5" cy="-5" r="6" fill="#FFECB3" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="5" cy="-5" r="6" fill="#FFECB3" stroke="#F57F17" stroke-width="0.8"/>
  <circle cx="0" cy="3" r="6" fill="#FFECB3" stroke="#F57F17" stroke-width="0.8"/>
  <!-- Yogurt cup -->
  <rect x="15" y="-10" width="14" height="16" rx="2" fill="#E1F5FE" stroke="#90CAF9" stroke-width="0.8"/>
  <text x="22" y="2" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">й</text>
  <text x="5" y="20" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Молочнокислые</text>
  <text x="5" y="29" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">йогурт, кефир, сыр</text>
</g>

<!-- Клубеньковые бактерии -->
<g transform="translate(65,165)">
  <!-- Root with nodules -->
  <path d="M-15,0 C-10,-5 0,-5 5,0 C10,5 15,0 20,-5" fill="none" stroke="#795548" stroke-width="2"/>
  <!-- Nodules on roots -->
  <ellipse cx="-5" cy="5" rx="5" ry="4" fill="#FFAB91" stroke="#BF360C" stroke-width="0.8"/>
  <ellipse cx="12" cy="3" rx="4" ry="3" fill="#FFAB91" stroke="#BF360C" stroke-width="0.8"/>
  <!-- Bacteria dots inside -->
  <circle cx="-5" cy="5" r="1.5" fill="#F57F17"/>
  <circle cx="12" cy="3" r="1.5" fill="#F57F17"/>
  <text x="5" y="20" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Клубеньковые</text>
  <text x="5" y="29" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фиксация азота N₂</text>
</g>

<!-- Уксуснокислые бактерии -->
<g transform="translate(185,100)">
  <ellipse cx="0" cy="-5" rx="8" ry="4" fill="#FFECB3" stroke="#F57F17" stroke-width="0.8"/>
  <!-- Vinegar bottle -->
  <rect x="-6" y="5" width="12" height="15" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <rect x="-3" y="0" width="6" height="5" rx="1" fill="#F9A825"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Уксуснокислые</text>
  <text x="0" y="39" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">уксус, консервация</text>
</g>

<!-- Почвенные бактерии -->
<g transform="translate(185,165)">
  <!-- Soil particles -->
  <ellipse cx="-5" cy="-3" rx="6" ry="4" fill="#8D6E63" opacity="0.4"/>
  <ellipse cx="5" cy="0" rx="5" ry="3" fill="#A1887F" opacity="0.4"/>
  <!-- Leaf being decomposed -->
  <path d="M-10,-8 C-5,-12 5,-10 10,-8 C8,-4 5,0 0,2 C-5,0 -8,-4 -10,-8" fill="#81C784" opacity="0.4" stroke="#4CAF50" stroke-width="0.5"/>
  <!-- Small bacteria -->
  <circle cx="-3" cy="-2" r="2" fill="#FFECB3" stroke="#F57F17" stroke-width="0.5"/>
  <circle cx="3" cy="0" r="2" fill="#FFECB3" stroke="#F57F17" stroke-width="0.5"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Почвенные</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">разрушение остатков</text>
</g>

<!-- Section: Harmful bacteria (right) -->
<rect x="260" y="56" width="225" height="170" rx="8" fill="url(#harmGrad)" stroke="#F44336" stroke-width="1.2"/>
<text x="372" y="72" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">⚠ Вредные бактерии</text>

<!-- Pathogen icon 1 -->
<g transform="translate(310,105)">
  <ellipse cx="0" cy="0" rx="10" ry="5" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <path d="M10,0 C13,-3 16,2 19,-1" fill="none" stroke="#C62828" stroke-width="0.8"/>
  <text x="0" y="15" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Холера</text>
</g>

<!-- Pathogen icon 2 -->
<g transform="translate(395,105)">
  <circle cx="0" cy="0" r="7" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="0" cy="0" r="4" fill="#EF9A9A" opacity="0.5"/>
  <text x="0" y="15" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Туберкулёз</text>
</g>

<!-- Pathogen icon 3 -->
<g transform="translate(310,150)">
  <path d="M-10,3 C-8,-5 -2,-8 5,-5 C10,-3 12,2 10,5 C8,8 2,8 -3,5" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <path d="M10,5 C14,3 16,6 18,4" fill="none" stroke="#C62828" stroke-width="0.8"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Сальмонеллёз</text>
</g>

<!-- Pathogen icon 4 -->
<g transform="translate(395,150)">
  <path d="M-8,0 C-5,-8 5,-8 8,0 C5,8 -5,8 -8,0" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Столбняк</text>
</g>

<!-- Disease prevention note -->
<rect x="270" y="185" width="205" height="32" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.6"/>
<text x="372" y="197" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Профилактика:</text>
<text x="372" y="207" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Гигиена • Вакцинация • Антибиотики</text>
<text x="372" y="215" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Пастеризация • Стерилизация</text>

<!-- Cycle of substances diagram (bottom) -->
<text x="250" y="240" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Круговорот веществ — роль бактерий-редуцентов</text>

<!-- Cycle diagram -->
<g transform="translate(250,295)">
  <!-- Producers -->
  <rect x="-60" y="-40" width="55" height="22" rx="5" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1"/>
  <text x="-32" y="-25" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Растения</text>
  <text x="-32" y="-17" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">продуценты</text>
  
  <!-- Consumers -->
  <rect x="25" y="-40" width="55" height="22" rx="5" fill="#FFCCBC" stroke="#FF5722" stroke-width="1"/>
  <text x="52" y="-25" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Животные</text>
  <text x="52" y="-17" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">консументы</text>
  
  <!-- Decomposers (bacteria) -->
  <rect x="-20" y="15" width="75" height="25" rx="5" fill="#FFECB3" stroke="#F57F17" stroke-width="1.2"/>
  <text x="17" y="28" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">🔋 Бактерии</text>
  <text x="17" y="36" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">редуценты</text>
  
  <!-- Arrows in cycle -->
  <!-- Plants → Animals -->
  <path d="M-5,-30 L22,-30" fill="none" stroke="#333" stroke-width="0.8"/>
  <polygon points="24,-30 20,-33 20,-27" fill="#333"/>
  
  <!-- Animals → Bacteria -->
  <path d="M52,-18 C52,0 35,10 30,15" fill="none" stroke="#333" stroke-width="0.8"/>
  <polygon points="30,15 26,10 32,11" fill="#333"/>
  
  <!-- Bacteria → Plants (minerals) -->
  <path d="M-20,27 C-40,20 -45,0 -45,-18" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
  <polygon points="-45,-20 -48,-14 -42,-14" fill="#4CAF50"/>
  <text x="-52" y="5" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50" text-anchor="middle">Минеральные</text>
  <text x="-52" y="12" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50" text-anchor="middle">вещества</text>
  
  <!-- Plants → Bacteria -->
  <path d="M-32,-18 C-30,0 -15,5 -5,15" fill="none" stroke="#333" stroke-width="0.8"/>
  <polygon points="-5,15 -9,11 -3,10" fill="#333"/>
</g>

<!-- Antibiotics note -->
<rect x="15" y="335" width="155" height="12" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
<text x="92" y="344" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">💊 Антибиотики (пенициллин) — от бактерий</text>

<rect x="180" y="335" width="165" height="12" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="262" y="344" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">🧬 Кишечная микрофлора — пищеварение</text>
</svg>