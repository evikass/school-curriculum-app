<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Клетка</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Plant Cell Card -->
  <rect x="20" y="90" width="225" height="200" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="132" y="106" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold" text-anchor="middle">РАСТИТЕЛЬНАЯ КЛЕТКА</text>
  <!-- Cell wall (outer rectangle with rounded corners) -->
  <rect x="50" y="115" width="170" height="140" rx="12" fill="none" stroke="#795548" stroke-width="3"/>
  <!-- Cell membrane (inner) -->
  <rect x="55" y="120" width="160" height="130" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Nucleus -->
  <circle cx="132" cy="185" r="22" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>
  <circle cx="132" cy="185" r="15" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <!-- Nucleolus -->
  <circle cx="135" cy="182" r="5" fill="#2E7D32" opacity="0.5"/>
  <!-- Chromatin dots -->
  <circle cx="125" cy="190" r="2" fill="#1B5E20" opacity="0.4"/>
  <circle cx="138" cy="188" r="2" fill="#1B5E20" opacity="0.4"/>
  <!-- Chloroplasts (green ovals) -->
  <ellipse cx="80" cy="145" rx="14" ry="7" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="75" y1="145" x2="85" y2="145" stroke="#1B5E20" stroke-width="0.7"/>
  <ellipse cx="185" cy="150" rx="12" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="180" y1="150" x2="190" y2="150" stroke="#1B5E20" stroke-width="0.7"/>
  <ellipse cx="85" cy="230" rx="13" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="80" y1="230" x2="90" y2="230" stroke="#1B5E20" stroke-width="0.7"/>
  <!-- Mitochondria -->
  <ellipse cx="175" cy="210" rx="10" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="1" transform="rotate(-15,175,210)"/>
  <line x1="169" y1="210" x2="181" y2="210" stroke="#E65100" stroke-width="0.6"/>
  <ellipse cx="72" cy="190" rx="8" ry="4" fill="#FFCC80" stroke="#E65100" stroke-width="1" transform="rotate(20,72,190)"/>
  <!-- ER - wavy lines -->
  <path d="M100,155 Q108,148 116,155 Q124,162 132,155" stroke="#43A047" stroke-width="1.2" fill="none"/>
  <path d="M140,210 Q148,203 156,210 Q164,217 172,210" stroke="#43A047" stroke-width="1.2" fill="none"/>
  <!-- Vacuole (large) -->
  <ellipse cx="100" cy="175" rx="18" ry="12" fill="#B3E5FC" stroke="#0288D1" stroke-width="1" opacity="0.6"/>
  <!-- Labels with lines -->
  <line x1="50" y1="115" x2="35" y2="108" stroke="#795548" stroke-width="0.8"/>
  <text x="35" y="106" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="end">оболочка</text>
  <line x1="80" y1="140" x2="62" y2="128" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="62" y="126" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="end">хлоропласт</text>
  <line x1="132" y1="163" x2="132" y2="130" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="132" y="128" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">ядро</text>

  <!-- Animal Cell Card -->
  <rect x="255" y="90" width="225" height="200" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="bold" text-anchor="middle">ЖИВОТНАЯ КЛЕТКА</text>
  <!-- Cell membrane (rounded shape, no wall) -->
  <ellipse cx="367" cy="190" rx="90" ry="70" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <!-- Nucleus -->
  <circle cx="370" cy="185" r="22" fill="#90CAF9" stroke="#1565C0" stroke-width="2"/>
  <circle cx="370" cy="185" r="15" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <circle cx="373" cy="182" r="5" fill="#0D47A1" opacity="0.4"/>
  <!-- Mitochondria (more prominent in animal cell) -->
  <ellipse cx="310" cy="160" rx="12" ry="6" fill="#FFCC80" stroke="#E65100" stroke-width="1.2" transform="rotate(-30,310,160)"/>
  <line x1="303" y1="160" x2="317" y2="160" stroke="#E65100" stroke-width="0.7"/>
  <line x1="306" y1="157" x2="314" y2="157" stroke="#E65100" stroke-width="0.5"/>
  <ellipse cx="430" cy="200" rx="11" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="1.2" transform="rotate(25,430,200)"/>
  <line x1="424" y1="200" x2="436" y2="200" stroke="#E65100" stroke-width="0.7"/>
  <ellipse cx="340" cy="230" rx="10" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="1.2" transform="rotate(-10,340,230)"/>
  <line x1="334" y1="230" x2="346" y2="230" stroke="#E65100" stroke-width="0.7"/>
  <!-- Small vacuoles -->
  <circle cx="420" cy="165" r="6" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.8" opacity="0.7"/>
  <circle cx="310" cy="215" r="5" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.8" opacity="0.7"/>
  <!-- ER -->
  <path d="M395,160 Q403,153 411,160 Q419,167 427,160" stroke="#1E88E5" stroke-width="1.2" fill="none"/>
  <path d="M330,190 Q338,183 346,190 Q354,197 362,190" stroke="#1E88E5" stroke-width="1" fill="none"/>
  <!-- Ribosomes (small dots) -->
  <circle cx="315" cy="175" r="1.5" fill="#1565C0"/>
  <circle cx="322" cy="180" r="1.5" fill="#1565C0"/>
  <circle cx="410" cy="220" r="1.5" fill="#1565C0"/>
  <circle cx="405" cy="226" r="1.5" fill="#1565C0"/>
  <!-- Lysosomes -->
  <circle cx="420" cy="235" r="5" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Labels -->
  <line x1="310" y1="155" x2="280" y2="130" stroke="#E65100" stroke-width="0.8"/>
  <text x="280" y="128" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="end">митохондрия</text>
  <line x1="367" y1="163" x2="367" y2="130" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="367" y="128" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">ядро</text>
  <line x1="290" y1="195" x2="260" y2="195" stroke="#1565C0" stroke-width="0.8"/>
  <text x="258" y="198" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="end">мембрана</text>

  <!-- Comparison labels at bottom -->
  <rect x="20" y="294" width="110" height="14" rx="3" fill="#2E7D32" opacity="0.12"/>
  <text x="75" y="304" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">+ клеточная стенка, хлоропласты</text>
  <rect x="370" y="294" width="110" height="14" rx="3" fill="#1565C0" opacity="0.12"/>
  <text x="425" y="304" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">многие лизосомы, центриоли</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Клетка</text>
</svg>