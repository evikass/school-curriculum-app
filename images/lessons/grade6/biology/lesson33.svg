<path d="M243,138 Q245,140 248,138" fill="none" stroke="#388E3C" stroke-width="0.8"/>
<text x="243" y="155" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">веламен</text>
<text x="257" y="165" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">орхидея</text>

<!-- 4: Дыхательные корни (пневматофоры) -->
<rect x="310" y="72" width="85" height="95" rx="3" fill="#E3F2FD" opacity="0.3" stroke="#1565C0" stroke-width="0.5"/>
<text x="352" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0" text-anchor="middle">Дыхательные</text>
<text x="352" y="91" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0" text-anchor="middle">корни</text>
