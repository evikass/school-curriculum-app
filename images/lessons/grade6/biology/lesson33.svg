<circle cx="147" cy="135" r="1" fill="#6D4C41" opacity="0.4"/>
<circle cx="162" cy="125" r="1.2" fill="#6D4C41" opacity="0.4"/>
<circle cx="173" cy="128" r="1.5" fill="#6D4C41" opacity="0.4"/>
<text x="160" y="155" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">запасающие</text>
<text x="160" y="162" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">вещества</text>
<text x="160" y="165" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">георгин</text>

<!-- 3: Воздушные корни -->
<rect x="215" y="72" width="85" height="95" rx="3" fill="#E8F5E9" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
<text x="257" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Воздушные</text>
<text x="257" y="91" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">корни</text>
