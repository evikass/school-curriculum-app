<text x="25" y="218" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A">N₂ (воздух)</text>
<path d="M55,220 L70,228" fill="none" stroke="#6A1B9A" stroke-width="0.8"/>
<polygon points="70,228 66,225 68,230" fill="#6A1B9A"/>
