<polygon points="345,110 343,107 347,107" fill="#1565C0"/>
<text x="352" y="165" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">болотный кипарис</text>

<!-- 5: Корни-присоски (повилика) -->
<rect x="405" y="72" width="80" height="95" rx="3" fill="#FCE4EC" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>
<text x="445" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">Корни-</text>
<text x="445" y="91" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">присоски</text>
<!-- Host stem -->
<rect x="440" y="95" width="8" height="60" rx="2" fill="#66BB6A" stroke="#388E3C" stroke-width="1"/>
