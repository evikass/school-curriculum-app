<path d="M129,230 L129,222" fill="none" stroke="#388E3C" stroke-width="0.8"/>
<polygon points="129,222 127,226 131,226" fill="#388E3C"/>
<text x="135" y="228" font-family="Arial,sans-serif" font-size="5" fill="#388E3C">органика</text>
<text x="82" y="305" font-family="Arial,sans-serif" font-size="5.5" fill="#6A1B9A">Клубеньковые бактерии фиксируют</text>
<text x="82" y="313" font-family="Arial,sans-serif" font-size="5.5" fill="#6A1B9A">атмосферный азот → соединения N</text>
<text x="82" y="321" font-family="Arial,sans-serif" font-size="5.5" fill="#388E3C">Растение даёт органические вещества</text>
<text x="170" y="328" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(горох, клевер, фасоль)</text>

