<linearGradient id="noduleG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#CE93D8"/><stop offset="100%" stop-color="#8E24AA"/></linearGradient>
<linearGradient id="mycoG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFCC80"/><stop offset="100%" stop-color="#FF9800"/></linearGradient>
