<!-- 1: Корнеплод (морковь) -->
<rect x="15" y="72" width="90" height="95" rx="3" fill="#FFF3E0" opacity="0.3" stroke="#E65100" stroke-width="0.5"/>
<text x="60" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Корнеплод</text>
<!-- Carrot shape -->
<path d="M52,90 Q48,92 46,100 L48,140 Q50,155 60,158 Q70,155 72,140 L74,100 Q72,92 68,90 Z" fill="url(#carrotG)" stroke="#BF360C" stroke-width="1"/>
<!-- Carrot top leaves -->
<path d="M60,90 Q55,78 50,72" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<path d="M60,90 Q60,76 62,70" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<path d="M60,90 Q65,78 70,72" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<!-- Internal rings -->
<ellipse cx="60" cy="110" rx="8" ry="6" fill="none" stroke="#FF5722" stroke-width="0.5" opacity="0.5"/>
<ellipse cx="60" cy="110" rx="4" ry="3" fill="#FFAB91" opacity="0.5"/>
<text x="60" y="128" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">кора</text>
<text x="60" y="145" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">сердцевина</text>
<text x="60" y="165" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">морковь</text>

<!-- 2: Корневые шишки (георгин) -->
<rect x="115" y="72" width="90" height="95" rx="3" fill="#EFEBE9" opacity="0.3" stroke="#795548" stroke-width="0.5"/>
<text x="160" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Корневые шишки</text>
<!-- Stem -->
<rect x="157" y="88" width="6" height="15" rx="1" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.5"/>
<!-- Root tubers -->
<ellipse cx="145" cy="130" rx="10" ry="16" fill="url(#dahliaG)" stroke="#5D4037" stroke-width="1" transform="rotate(-10,145,130)"/>
<ellipse cx="160" cy="128" rx="9" ry="14" fill="url(#dahliaG)" stroke="#5D4037" stroke-width="1" transform="rotate(5,160,128)"/>
<ellipse cx="175" cy="132" rx="10" ry="15" fill="url(#dahliaG)" stroke="#5D4037" stroke-width="1" transform="rotate(12,175,132)"/>
<!-- Thin roots connecting -->
<line x1="150" y1="118" x2="155" y2="103" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="160" y1="114" x2="160" y2="103" stroke="#8D6E63" stroke-width="0.8"/>
<line x1="170" y1="117" x2="165" y2="103" stroke="#8D6E63" stroke-width="0.8"/>
