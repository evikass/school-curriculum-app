<ellipse cx="331" cy="122" rx="2" ry="0.8" fill="#A1887F"/>
<ellipse cx="345" cy="118" rx="2" ry="0.8" fill="#A1887F"/>
<ellipse cx="361" cy="125" rx="2" ry="0.8" fill="#A1887F"/>
