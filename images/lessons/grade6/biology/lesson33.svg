<ellipse cx="45" cy="268" rx="4" ry="2" fill="#CE93D8" stroke="#8E24AA" stroke-width="0.5" transform="rotate(-10,45,268)"/>
<ellipse cx="60" cy="272" rx="3.5" ry="2" fill="#CE93D8" stroke="#8E24AA" stroke-width="0.5" transform="rotate(25,60,272)"/>
<ellipse cx="72" cy="268" rx="4" ry="2" fill="#CE93D8" stroke="#8E24AA" stroke-width="0.5" transform="rotate(-35,72,268)"/>
<text x="57" y="283" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">бактероиды</text>

