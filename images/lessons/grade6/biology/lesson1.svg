<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Признаки живого</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Cell with organelles -->
  <rect x="25" y="90" width="135" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="92" y="104" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">КЛЕТКА</text>
  <!-- Cell membrane -->
  <ellipse cx="92" cy="148" rx="40" ry="30" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <!-- Nucleus -->
  <circle cx="92" cy="145" r="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="90" cy="143" r="3" fill="#1B5E20" opacity="0.6"/>
  <!-- Mitochondria -->
  <ellipse cx="118" cy="135" rx="8" ry="4" fill="#81C784" stroke="#2E7D32" stroke-width="1" transform="rotate(-20,118,135)"/>
  <line x1="113" y1="135" x2="123" y2="135" stroke="#2E7D32" stroke-width="0.7"/>
  <!-- ER wavy lines -->
  <path d="M65,140 Q70,132 75,140 Q80,148 85,140" stroke="#43A047" stroke-width="1" fill="none"/>
  <!-- Small dots for ribosomes -->
  <circle cx="70" cy="155" r="1.5" fill="#2E7D32"/>
  <circle cx="76" cy="158" r="1.5" fill="#2E7D32"/>
  <circle cx="110" cy="155" r="1.5" fill="#2E7D32"/>
  <circle cx="106" cy="160" r="1.5" fill="#2E7D32"/>

  <!-- Card 2: DNA Helix -->
  <rect x="172" y="90" width="135" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="240" y="104" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ДНК</text>
  <!-- DNA double helix - geometric style -->
  <path d="M210,115 Q220,125 230,115 Q240,105 250,115 Q260,125 270,115" stroke="#C62828" stroke-width="2" fill="none"/>
  <path d="M210,125 Q220,115 230,125 Q240,135 250,125 Q260,115 270,125" stroke="#1565C0" stroke-width="2" fill="none"/>
  <!-- Rungs -->
  <line x1="215" y1="120" x2="215" y2="120" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="220" y1="120" x2="220" y2="120" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="230" y1="120" x2="230" y2="120" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="240" y1="120" x2="240" y2="120" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="250" y1="120" x2="250" y2="120" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="260" y1="120" x2="260" y2="120" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Helix rungs as small lines -->
  <line x1="218" y1="118" x2="218" y2="122" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="228" y1="118" x2="228" y2="122" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="238" y1="118" x2="238" y2="122" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="248" y1="118" x2="248" y2="122" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="258" y1="118" x2="258" y2="122" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Second helix section -->
  <path d="M210,145 Q220,155 230,145 Q240,135 250,145 Q260,155 270,145" stroke="#C62828" stroke-width="2" fill="none"/>
  <path d="M210,155 Q220,145 230,155 Q240,165 250,155 Q260,145 270,155" stroke="#1565C0" stroke-width="2" fill="none"/>
  <line x1="218" y1="148" x2="218" y2="152" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="228" y1="148" x2="228" y2="152" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="238" y1="148" x2="238" y2="152" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="248" y1="148" x2="248" y2="152" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="258" y1="148" x2="258" y2="152" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Label -->
  <text x="240" y="178" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">двойная спираль</text>

  <!-- Card 3: Breathing / Respiration -->
  <rect x="319" y="90" width="155" height="100" rx="6" fill="white" stroke="#E53935" stroke-width="1.5" opacity="0.9"/>
  <text x="397" y="104" font-family="Arial,sans-serif" font-size="8" fill="#E53935" font-weight="bold" text-anchor="middle">ДЫХАНИЕ</text>
  <!-- Lungs - simplified geometric -->
  <!-- Trachea -->
  <rect x="393" y="110" width="8" height="15" rx="2" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <!-- Bronchi -->
  <line x1="393" y1="125" x2="375" y2="138" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <line x1="401" y1="125" x2="419" y2="138" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <!-- Left lung -->
  <ellipse cx="365" cy="152" rx="20" ry="22" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
  <ellipse cx="365" cy="152" rx="12" ry="14" fill="#EF9A9A" opacity="0.5"/>
  <!-- Right lung -->
  <ellipse cx="429" cy="152" rx="20" ry="22" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
  <ellipse cx="429" cy="152" rx="12" ry="14" fill="#EF9A9A" opacity="0.5"/>
  <!-- Air arrows -->
  <path d="M397,108 L397,100" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round" marker-end="none"/>
  <polygon points="394,100 397,95 400,100" fill="#1565C0"/>
  <text x="397" y="183" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">газообмен</text>

  <!-- Card 4: Growth - small to large plant -->
  <rect x="25" y="198" width="135" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="92" y="212" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">РОСТ</text>
  <!-- Small seedling -->
  <line x1="55" y1="288" x2="55" y2="265" stroke="#795548" stroke-width="2"/>
  <ellipse cx="50" cy="262" rx="6" ry="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="60" cy="258" rx="6" ry="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Arrow -->
  <line x1="70" y1="275" x2="85" y2="275" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="85,272 90,275 85,278" fill="#C62828"/>
  <!-- Medium plant -->
  <line x1="98" y1="288" x2="98" y2="250" stroke="#795548" stroke-width="2.5"/>
  <ellipse cx="92" cy="248" rx="8" ry="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="104" cy="244" rx="8" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="98" cy="240" rx="6" ry="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Arrow -->
  <line x1="112" y1="270" x2="122" y2="270" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="122,267 127,270 122,273" fill="#C62828"/>
  <!-- Large plant with flower -->
  <line x1="138" y1="288" x2="138" y2="238" stroke="#795548" stroke-width="3"/>
  <ellipse cx="132" cy="248" rx="9" ry="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="144" cy="244" rx="9" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="138" cy="238" rx="7" ry="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Flower -->
  <circle cx="138" cy="228" r="5" fill="#F9A825"/>
  <circle cx="133" cy="225" r="3" fill="#FFEE58"/>
  <circle cx="143" cy="225" r="3" fill="#FFEE58"/>
  <circle cx="133" cy="232" r="3" fill="#FFEE58"/>
  <circle cx="143" cy="232" r="3" fill="#FFEE58"/>
  <circle cx="138" cy="228" r="3" fill="#F57F17"/>

  <!-- Card 5: Movement -->
  <rect x="172" y="198" width="135" height="100" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="240" y="212" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ДВИЖЕНИЕ</text>
  <!-- Simple running figure - geometric -->
  <!-- Head -->
  <circle cx="225" cy="235" r="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <!-- Body -->
  <line x1="225" y1="242" x2="225" y2="262" stroke="#E65100" stroke-width="2.5"/>
  <!-- Arms -->
  <line x1="225" y1="248" x2="215" y2="255" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <line x1="225" y1="248" x2="238" y2="242" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="225" y1="262" x2="215" y2="278" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <line x1="225" y1="262" x2="240" y2="275" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <!-- Movement arrows -->
  <line x1="248" y1="248" x2="265" y2="248" stroke="#F9A825" stroke-width="2"/>
  <polygon points="265,245 272,248 265,251" fill="#F9A825"/>
  <line x1="252" y1="258" x2="268" y2="258" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="268,256 273,258 268,260" fill="#F9A825"/>
  <!-- Amoeba movement (single cell) -->
  <path d="M280,260 Q290,248 300,252 Q310,246 315,258 Q320,270 310,278 Q298,285 288,278 Q278,272 280,260Z" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="295" cy="262" r="3" fill="#2E7D32" opacity="0.5"/>
  <!-- Pseudopod arrow -->
  <path d="M315,255 L322,250" stroke="#2E7D32" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="322,247 325,250 321,252" fill="#2E7D32"/>
  <text x="240" y="292" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">поступательное движение</text>

  <!-- Card 6: Reproduction -->
  <rect x="319" y="198" width="155" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="397" y="212" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">РАЗМНОЖЕНИЕ</text>
  <!-- Cell dividing - mitosis simplified -->
  <!-- Parent cell -->
  <ellipse cx="365" cy="252" rx="22" ry="16" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="365" cy="250" r="5" fill="#1E88E5" opacity="0.5"/>
  <!-- Arrow down -->
  <line x1="365" y1="268" x2="365" y2="275" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="362,275 365,280 368,275" fill="#1565C0"/>
  <!-- Two daughter cells -->
  <ellipse cx="355" cy="285" rx="14" ry="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.2"/>
  <circle cx="355" cy="283" r="3" fill="#1E88E5" opacity="0.5"/>
  <ellipse cx="380" cy="285" rx="14" ry="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.2"/>
  <circle cx="380" cy="283" r="3" fill="#1E88E5" opacity="0.5"/>
  <!-- Bacteria binary fission -->
  <ellipse cx="440" cy="240" rx="14" ry="8" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="440" y1="232" x2="440" y2="248" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Arrows from bacteria -->
  <path d="M428,248 Q422,260 418,268" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <path d="M452,248 Q458,260 462,268" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <ellipse cx="415" cy="275" rx="8" ry="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <ellipse cx="463" cy="275" rx="8" ry="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="397" y="295" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">деление клеток</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Признаки живого</text>
</svg>