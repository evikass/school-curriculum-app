<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="bookGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
<linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биология — наука о живой природе</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 1</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Open book - central -->
<g transform="translate(250,210)">
  <!-- Book shadow -->
  <ellipse cx="0" cy="48" rx="95" ry="8" fill="#1B5E20" opacity="0.08"/>
  <!-- Left page -->
  <path d="M-5,-55 L-95,-45 L-95,40 L-5,30 Z" fill="url(#bookGrad)" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Right page -->
  <path d="M5,-55 L95,-45 L95,40 L5,30 Z" fill="url(#bookGrad)" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Spine -->
  <line x1="0" y1="-57" x2="0" y2="32" stroke="#5D4037" stroke-width="2.5"/>
  <!-- Left page text lines -->
  <line x1="-80" y1="-32" x2="-15" y2="-26" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="-80" y1="-22" x2="-15" y2="-16" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="-80" y1="-12" x2="-15" y2="-6" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="-80" y1="-2" x2="-15" y2="4" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="-80" y1="8" x2="-15" y2="14" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="-80" y1="18" x2="-50" y2="22" stroke="#BCAAA4" stroke-width="0.8"/>
  <!-- Right page text lines -->
  <line x1="15" y1="-26" x2="80" y2="-32" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="15" y1="-16" x2="80" y2="-22" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="15" y1="-6" x2="80" y2="-12" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="15" y1="4" x2="80" y2="-2" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="15" y1="14" x2="80" y2="8" stroke="#BCAAA4" stroke-width="0.8"/>
  <line x1="15" y1="24" x2="50" y2="20" stroke="#BCAAA4" stroke-width="0.8"/>
  <!-- БИО label on book -->
  <text x="0" y="-60" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">БИОЛОГИЯ</text>
  <!-- Small DNA symbol on left page -->
  <path d="M-60,-28 C-55,-25 -50,-30 -45,-27" fill="none" stroke="#1565C0" stroke-width="0.8" opacity="0.4"/>
  <path d="M-60,-26 C-55,-29 -50,-24 -45,-27" fill="none" stroke="#C62828" stroke-width="0.8" opacity="0.4"/>
  <!-- Small leaf symbol on right page -->
  <path d="M55,-25 C50,-30 45,-25 50,-20" fill="#81C784" opacity="0.3" stroke="#4CAF50" stroke-width="0.5"/>
</g>

<!-- Plant symbol - tree (top left) -->
<g transform="translate(60,115)">
  <rect x="-3" y="12" width="6" height="22" fill="#795548" rx="1"/>
  <!-- Roots -->
  <path d="M-3,34 C-8,38 -12,40 -15,42" fill="none" stroke="#795548" stroke-width="1"/>
  <path d="M3,34 C8,38 12,40 15,42" fill="none" stroke="#795548" stroke-width="1"/>
  <!-- Crown -->
  <ellipse cx="0" cy="-2" rx="24" ry="18" fill="url(#leafGrad)" stroke="#2E7D32" stroke-width="1"/>
  <ellipse cx="-12" cy="3" rx="14" ry="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <ellipse cx="12" cy="3" rx="14" ry="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Small fruit/flower -->
  <circle cx="-8" cy="-8" r="3" fill="#F44336" opacity="0.5"/>
  <circle cx="10" cy="-5" r="3" fill="#F44336" opacity="0.5"/>
  <text x="0" y="52" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Растения</text>
</g>

<!-- Animal symbol - butterfly (top right) -->
<g transform="translate(440,105)">
  <ellipse cx="0" cy="0" rx="3" ry="10" fill="#5D4037"/>
  <!-- Wings -->
  <path d="M-3,-5 C-22,-22 -28,0 -3,5" fill="#FF9800" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <path d="M3,-5 C22,-22 28,0 3,5" fill="#FF9800" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <path d="M-3,0 C-20,8 -16,22 -3,10" fill="#FFB74D" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <path d="M3,0 C20,8 16,22 3,10" fill="#FFB74D" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <!-- Wing patterns -->
  <circle cx="-12" cy="-8" r="3" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="12" cy="-8" r="3" fill="#FFF9C4" opacity="0.5"/>
  <!-- Antennae -->
  <path d="M-1,-10 C-6,-20 -10,-22 -12,-25" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M1,-10 C6,-20 10,-22 12,-25" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <circle cx="-12" cy="-25" r="1.2" fill="#5D4037"/>
  <circle cx="12" cy="-25" r="1.2" fill="#5D4037"/>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Животные</text>
</g>

<!-- Microorganism symbol (bottom left) -->
<g transform="translate(70,290)">
  <ellipse cx="0" cy="0" rx="18" ry="11" fill="#90CAF9" opacity="0.5" stroke="#1565C0" stroke-width="1"/>
  <!-- Internal structures -->
  <circle cx="-6" cy="-2" r="3" fill="#1565C0" opacity="0.4"/>
  <circle cx="5" cy="2" r="2" fill="#1565C0" opacity="0.4"/>
  <circle cx="-2" cy="4" r="1.5" fill="#1565C0" opacity="0.3"/>
  <!-- Flagella -->
  <path d="M18,0 C24,-4 28,3 34,-1" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <!-- Cilia -->
  <line x1="-15" y1="-8" x2="-18" y2="-12" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="-10" y1="-10" x2="-12" y2="-14" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="-5" y1="-11" x2="-6" y2="-15" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="0" y1="-11" x2="0" y2="-15" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="5" y1="-10" x2="6" y2="-14" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="10" y1="-8" x2="12" y2="-12" stroke="#1565C0" stroke-width="0.5"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Микроорганизмы</text>
</g>

<!-- Mushroom symbol (bottom right) -->
<g transform="translate(430,285)">
  <!-- Main mushroom -->
  <rect x="-3" y="5" width="6" height="18" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.8" rx="2"/>
  <ellipse cx="0" cy="5" rx="18" ry="12" fill="#A1887F" stroke="#6D4C41" stroke-width="1"/>
  <ellipse cx="0" cy="3" rx="15" ry="8" fill="#BCAAA4" stroke="none"/>
  <!-- Spots -->
  <circle cx="-7" cy="3" r="2.5" fill="#8D6E63" opacity="0.4"/>
  <circle cx="5" cy="0" r="2" fill="#8D6E63" opacity="0.4"/>
  <circle cx="-2" cy="8" r="1.5" fill="#8D6E63" opacity="0.3"/>
  <!-- Small mushroom -->
  <rect x="20" y="10" width="3" height="10" fill="#D7CCC8" rx="1"/>
  <ellipse cx="21" cy="10" rx="8" ry="6" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.6"/>
  <!-- Mycelium -->
  <path d="M-3,23 C-10,26 -18,24 -22,28" fill="none" stroke="#8D6E63" stroke-width="0.6"/>
  <path d="M3,23 C10,26 15,24 20,27" fill="none" stroke="#8D6E63" stroke-width="0.6"/>
  <path d="M0,23 C2,28 -2,30 0,33" fill="none" stroke="#8D6E63" stroke-width="0.5"/>
  <text x="5" y="42" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Грибы</text>
</g>

<!-- Branches of biology - top area -->
<g transform="translate(250,80)">
  <!-- Central circle -->
  <ellipse cx="0" cy="0" rx="44" ry="15" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Биология</text>
</g>

<!-- Branch lines to sub-sciences -->
<line x1="210" y1="84" x2="110" y2="92" stroke="#4CAF50" stroke-width="1.2" opacity="0.5"/>
<line x1="210" y1="84" x2="110" y2="110" stroke="#4CAF50" stroke-width="1.2" opacity="0.5"/>
<line x1="290" y1="84" x2="390" y2="92" stroke="#4CAF50" stroke-width="1.2" opacity="0.5"/>
<line x1="290" y1="84" x2="390" y2="110" stroke="#4CAF50" stroke-width="1.2" opacity="0.5"/>
<line x1="250" y1="95" x2="250" y2="120" stroke="#4CAF50" stroke-width="1.2" opacity="0.5"/>

<!-- Sub-branches with descriptions -->
<g transform="translate(80,90)">
  <rect x="-42" y="-9" width="84" height="18" rx="9" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Ботаника</text>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">наука о растениях</text>
</g>
<g transform="translate(80,108)">
  <rect x="-42" y="-9" width="84" height="18" rx="9" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Зоология</text>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">наука о животных</text>
</g>
<g transform="translate(420,90)">
  <rect x="-48" y="-9" width="96" height="18" rx="9" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Микробиология</text>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">микроорганизмы</text>
</g>
<g transform="translate(420,108)">
  <rect x="-48" y="-9" width="96" height="18" rx="9" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Микология</text>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">наука о грибах</text>
</g>
<g transform="translate(250,128)">
  <rect x="-42" y="-9" width="84" height="18" rx="9" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Экология</text>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">взаимосвязи в природе</text>
</g>

<!-- Definition box at bottom -->
<rect x="120" y="315" width="260" height="28" rx="6" fill="#1B5E20" opacity="0.08" stroke="#2E7D32" stroke-width="0.8"/>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Биология — наука о жизни и живых организмах</text>
<text x="250" y="338" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Био (греч.) — жизнь, логос (греч.) — наука</text>
</svg>