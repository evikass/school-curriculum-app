<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="berryG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E57373"/><stop offset="100%" stop-color="#C62828"/></linearGradient>
<linearGradient id="drupeG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8A65"/><stop offset="100%" stop-color="#E64A19"/></linearGradient>
<linearGradient id="appleG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EF5350"/><stop offset="100%" stop-color="#B71C1C"/></linearGradient>
<linearGradient id="pumpG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFB74D"/><stop offset="100%" stop-color="#E65100"/></linearGradient>
<linearGradient id="hespG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFA726"/><stop offset="100%" stop-color="#EF6C00"/></linearGradient>
<linearGradient id="legG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
<linearGradient id="podG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#81C784"/></linearGradient>
<linearGradient id="capsG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
<linearGradient id="achenG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BCAAA4"/><stop offset="100%" stop-color="#8D6E63"/></linearGradient>
<linearGradient id="nutG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A1887F"/><stop offset="100%" stop-color="#6D4C41"/></linearGradient>
<linearGradient id="grainG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF176"/><stop offset="100%" stop-color="#FFD54F"/></linearGradient>
<linearGradient id="samaG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BCAAA4"/><stop offset="100%" stop-color="#795548"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плоды и их разнообразие</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 40</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Succulent fruits (Сочные) -->
<text x="250" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Сочные плоды</text>

<!-- Ягода (Berry) -->
<rect x="8" y="72" width="88" height="82" rx="3" fill="#FFEBEE" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>
<text x="52" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">Ягода</text>
<!-- Berry -->
<ellipse cx="52" cy="115" rx="18" ry="16" fill="url(#berryG)" stroke="#B71C1C" stroke-width="0.8"/>
<!-- Highlight -->
<ellipse cx="46" cy="109" rx="5" ry="3" fill="#EF9A9A" opacity="0.5"/>
<!-- Seeds inside (shown as dots) -->
<circle cx="48" cy="115" r="1.5" fill="#FFF9C4" opacity="0.7"/>
<circle cx="56" cy="112" r="1.5" fill="#FFF9C4" opacity="0.7"/>
<circle cx="52" cy="120" r="1.5" fill="#FFF9C4" opacity="0.7"/>
<circle cx="45" cy="110" r="1" fill="#FFF9C4" opacity="0.6"/>
<text x="52" y="140" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">много семян</text>
<text x="52" y="148" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">смородина, томат</text>

<!-- Костянка (Drupe) -->
<rect x="104" y="72" width="88" height="82" rx="3" fill="#FFF3E0" opacity="0.3" stroke="#E64A19" stroke-width="0.5"/>
<text x="148" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E64A19" text-anchor="middle">Костянка</text>
<!-- Drupe (cross-section) -->
<circle cx="148" cy="115" r="16" fill="url(#drupeG)" stroke="#BF360C" stroke-width="0.8"/>
<!-- Flesh -->
<circle cx="148" cy="115" r="11" fill="#FF8A65" stroke="#E64A19" stroke-width="0.5"/>
<!-- Stone (pit) -->
<ellipse cx="148" cy="115" rx="6" ry="7" fill="#795548" stroke="#4E342E" stroke-width="0.8"/>
<!-- Seed inside stone -->
<ellipse cx="148" cy="115" rx="3" ry="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<!-- Labels -->
<text x="170" y="108" font-family="Arial,sans-serif" font-size="4.5" fill="#BF360C">мякоть</text>
<text x="160" y="122" font-family="Arial,sans-serif" font-size="4.5" fill="#5D4037">косточка</text>
<text x="148" y="140" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">1 семя в косточке</text>
<text x="148" y="148" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">вишня, слива</text>

<!-- Яблоко (Apple/Pome) -->
<rect x="200" y="72" width="88" height="82" rx="3" fill="#FFEBEE" opacity="0.3" stroke="#B71C1C" stroke-width="0.5"/>
<text x="244" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#B71C1C" text-anchor="middle">Яблоко</text>
<!-- Apple (cross-section) -->
<circle cx="244" cy="115" r="16" fill="url(#appleG)" stroke="#880E4F" stroke-width="0.8"/>
<!-- Flesh -->
<circle cx="244" cy="115" r="12" fill="#EF5350" stroke="#C62828" stroke-width="0.3"/>
<!-- Core (гнёзда) -->
<ellipse cx="244" cy="115" rx="7" ry="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
<!-- Seeds in core -->
<circle cx="240" cy="112" r="1.5" fill="#5D4037"/>
<circle cx="248" cy="112" r="1.5" fill="#5D4037"/>
<circle cx="240" cy="118" r="1.5" fill="#5D4037"/>
<circle cx="248" cy="118" r="1.5" fill="#5D4037"/>
<!-- Remnant calyx -->
<path d="M242,100 L244,97 L246,100" fill="none" stroke="#4CAF50" stroke-width="0.5"/>
<text x="244" y="140" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">мякоть из цветоложа</text>
<text x="244" y="148" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">яблоня, груша</text>

<!-- Тыквина (Pepo) -->
<rect x="296" y="72" width="88" height="82" rx="3" fill="#FFF3E0" opacity="0.3" stroke="#E65100" stroke-width="0.5"/>
<text x="340" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Тыквина</text>
<!-- Pumpkin -->
<ellipse cx="340" cy="118" rx="22" ry="14" fill="url(#pumpG)" stroke="#BF360C" stroke-width="0.8"/>
<!-- Ridges -->
<path d="M325,110 Q340,108 355,110" fill="none" stroke="#BF360C" stroke-width="0.4"/>
<path d="M322,118 Q340,115 358,118" fill="none" stroke="#BF360C" stroke-width="0.4"/>
<!-- Seeds inside -->
<ellipse cx="335" cy="116" rx="3" ry="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<ellipse cx="345" cy="116" rx="3" ry="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<ellipse cx="340" cy="120" rx="3" ry="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<!-- Hard rind indication -->
<text x="340" y="140" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">твёрдая кора</text>
<text x="340" y="148" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">тыква, арбуз, огурец</text>

<!-- Померанец (Hesperidium) -->
<rect x="392" y="72" width="100" height="82" rx="3" fill="#FFF3E0" opacity="0.3" stroke="#EF6C00" stroke-width="0.5"/>
<text x="442" y="83" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#EF6C00" text-anchor="middle">Померанец</text>
<!-- Orange (cross-section) -->
<circle cx="442" cy="115" r="16" fill="url(#hespG)" stroke="#E65100" stroke-width="0.8"/>
<!-- Segments -->
<path d="M442,100 L442,130" fill="none" stroke="#EF6C00" stroke-width="0.4"/>
<path d="M428,108 L456,122" fill="none" stroke="#EF6C00" stroke-width="0.4"/>
<path d="M428,122 L456,108" fill="none" stroke="#EF6C00" stroke-width="0.4"/>
<!-- Juice vesicles -->
<circle cx="436" cy="112" r="1.5" fill="#FFE0B2" stroke="#EF6C00" stroke-width="0.2"/>
<circle cx="448" cy="112" r="1.5" fill="#FFE0B2" stroke="#EF6C00" stroke-width="0.2"/>
<circle cx="442" cy="120" r="1.5" fill="#FFE0B2" stroke="#EF6C00" stroke-width="0.2"/>
<circle cx="436" cy="118" r="1" fill="#FFE0B2" stroke="#EF6C00" stroke-width="0.2"/>
<circle cx="448" cy="118" r="1" fill="#FFE0B2" stroke="#EF6C00" stroke-width="0.2"/>
<!-- Rind -->
<circle cx="442" cy="115" r="16" fill="none" stroke="#BF360C" stroke-width="1.5"/>
<text x="442" y="140" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">дольки с соком</text>
<text x="442" y="148" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">апельсин, лимон</text>

<!-- SECTION 2: Dry dehiscent fruits (Сухие раскрывающиеся) -->
<text x="250" y="173" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#5D4037" text-anchor="middle">Сухие раскрывающиеся плоды</text>

<!-- Боб (Legume) -->
<rect x="20" y="180" width="140" height="70" rx="3" fill="#E8F5E9" opacity="0.3" stroke="#388E3C" stroke-width="0.5"/>
<text x="90" y="192" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Боб</text>
<!-- Closed pod -->
<path d="M40,205 Q40,200 50,200 L85,200 Q95,200 95,205 L90,225 Q90,230 80,230 L50,230 Q40,230 40,225 Z" fill="url(#legG)" stroke="#2E7D32" stroke-width="0.8"/>
<!-- Seeds inside -->
<circle cx="55" cy="215" r="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="67" cy="215" r="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="79" cy="215" r="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<!-- Open pod (right) -->
<path d="M110,195 L110,210 L148,210" fill="none" stroke="#2E7D32" stroke-width="1"/>
<path d="M110,225 L110,240 L148,240" fill="none" stroke="#2E7D32" stroke-width="1"/>
<!-- Seeds falling -->
<circle cx="130" cy="230" r="2.5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="140" cy="228" r="2.5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="120" cy="232" r="2.5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<text x="90" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">2 створки, горох, фасоль</text>

<!-- Стручок (Silique) -->
<rect x="170" y="180" width="130" height="70" rx="3" fill="#E8F5E9" opacity="0.3" stroke="#388E3C" stroke-width="0.5"/>
<text x="235" y="192" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Стручок</text>
<!-- Silique shape (long and narrow) -->
<path d="M195,208 L195,222 L275,222 L275,208 Q275,203 265,203 L205,203 Q195,203 195,208 Z" fill="url(#podG)" stroke="#2E7D32" stroke-width="0.8"/>
<!-- Seeds in a row -->
<circle cx="208" cy="213" r="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="218" cy="213" r="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="228" cy="213" r="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="238" cy="213" r="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="248" cy="213" r="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="258" cy="213" r="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>
<!-- Septum (перегородка) -->
<line x1="235" y1="205" x2="235" y2="220" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="1,1"/>
<text x="235" y="240" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">перегородка внутри</text>
<text x="235" y="248" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">капуста, редис</text>

<!-- Коробочка (Capsule) -->
<rect x="310" y="180" width="170" height="70" rx="3" fill="#EFEBE9" opacity="0.3" stroke="#5D4037" stroke-width="0.5"/>
<text x="395" y="192" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Коробочка</text>
<!-- Capsule closed -->
<ellipse cx="340" cy="218" rx="10" ry="14" fill="url(#capsG)" stroke="#4E342E" stroke-width="0.8"/>
<!-- Lid/teeth on top -->
<path d="M334,206 L340,203 L346,206" fill="none" stroke="#4E342E" stroke-width="0.8"/>
<!-- Opening lines -->
<path d="M340,207 L340,228" fill="none" stroke="#3E2723" stroke-width="0.3"/>
<!-- Capsule open (right) -->
<ellipse cx="380" cy="218" rx="10" ry="14" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<path d="M374,206 L380,203 L386,206" fill="url(#capsG)" stroke="#4E342E" stroke-width="0.6"/>
<!-- Open flaps -->
<path d="M375,210 Q377,218 375,226" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<path d="M385,210 Q383,218 385,226" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<!-- Seeds spilling -->
<circle cx="392" cy="225" r="1.2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.2"/>
<circle cx="396" cy="228" r="1" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.2"/>
<circle cx="399" cy="222" r="1.2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.2"/>
<!-- Poppy capsule (rightmost) -->
<ellipse cx="440" cy="220" rx="12" ry="16" fill="#8D6E63" stroke="#4E342E" stroke-width="0.8"/>
<!-- Holes under lid -->
<circle cx="436" cy="215" r="1.5" fill="#4E342E"/>
<circle cx="444" cy="215" r="1.5" fill="#4E342E"/>
<circle cx="440" cy="210" r="1.5" fill="#4E342E"/>
<!-- Lid -->
<ellipse cx="440" cy="204" rx="8" ry="2" fill="#A1887F" stroke="#4E342E" stroke-width="0.5"/>
<text x="395" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">мак, хлопчатник, белена</text>

<!-- SECTION 3: Dry indehiscent fruits (Сухие нераскрывающиеся) -->
<text x="250" y="268" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#795548" text-anchor="middle">Сухие нераскрывающиеся плоды</text>

<!-- Семянка (Achene) -->
<rect x="8" y="275" width="88" height="65" rx="3" fill="#EFEBE9" opacity="0.3" stroke="#795548" stroke-width="0.5"/>
<text x="52" y="287" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Семянка</text>
<!-- Achene shape -->
<ellipse cx="52" cy="308" rx="8" ry="12" fill="url(#achenG)" stroke="#6D4C41" stroke-width="0.8"/>
<!-- Pappus (хохолок) -->
<path d="M50,296 L48,290" stroke="#BCAAA4" stroke-width="0.5"/>
<path d="M52,296 L52,289" stroke="#BCAAA4" stroke-width="0.5"/>
<path d="M54,296 L56,290" stroke="#BCAAA4" stroke-width="0.5"/>
<!-- Seed coat fused with fruit wall -->
<text x="52" y="328" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">одуванчик, подсолн.</text>
<text x="52" y="336" font-family="Arial,sans-serif" font-size="4.5" fill="#999" text-anchor="middle">околоплодник + семя</text>

<!-- Орех (Nut) -->
<rect x="104" y="275" width="88" height="65" rx="3" fill="#EFEBE9" opacity="0.3" stroke="#795548" stroke-width="0.5"/>
<text x="148" y="287" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Орех</text>
<!-- Nut -->
<ellipse cx="148" cy="310" rx="10" ry="12" fill="url(#nutG)" stroke="#4E342E" stroke-width="1"/>
<!-- Cap/cupule -->
<path d="M140,300 Q138,298 142,295 Q148,292 154,295 Q158,298 156,300" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<!-- Shell texture -->
<path d="M145,305 Q148,302 151,305" fill="none" stroke="#6D4C41" stroke-width="0.3"/>
<path d="M143,312 Q148,309 153,312" fill="none" stroke="#6D4C41" stroke-width="0.3"/>
<!-- Seed inside -->
<text x="148" y="328" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">твёрдая скорлупа</text>
<text x="148" y="336" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">лесной орех, жёлудь</text>

<!-- Зерновка (Caryopsis) -->
<rect x="200" y="275" width="88" height="65" rx="3" fill="#FFF9C4" opacity="0.3" stroke="#F9A825" stroke-width="0.5"/>
<text x="244" y="287" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17" text-anchor="middle">Зерновка</text>
<!-- Grain shape -->
<ellipse cx="244" cy="310" rx="7" ry="13" fill="url(#grainG)" stroke="#F9A825" stroke-width="0.8"/>
<!-- Brush (щётка) at top -->
<path d="M242,297 L241,293" stroke="#FFD54F" stroke-width="0.5"/>
<path d="M244,297 L244,292" stroke="#FFD54F" stroke-width="0.5"/>
<path d="M246,297 L247,293" stroke="#FFD54F" stroke-width="0.5"/>
<!-- Groove -->
<path d="M244,300 L244,322" fill="none" stroke="#F9A825" stroke-width="0.3"/>
<text x="244" y="328" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">околоплодник срастается</text>
<text x="244" y="336" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">с семенной кожурой (пшено)</text>

<!-- Крылатка (Samara) -->
<rect x="296" y="275" width="88" height="65" rx="3" fill="#E8F5E9" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
<text x="340" y="287" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Крылатка</text>
<!-- Samara -->
<ellipse cx="330" cy="310" rx="5" ry="8" fill="url(#samaG)" stroke="#5D4037" stroke-width="0.6"/>
<!-- Wing -->
<path d="M335,308 Q350,300 365,295 Q368,298 365,302 Q355,308 340,312 Z" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.5" opacity="0.8"/>
<!-- Veins in wing -->
<path d="M338,310 Q348,305 358,300" fill="none" stroke="#A1887F" stroke-width="0.3"/>
<path d="M337,308 Q345,303 352,299" fill="none" stroke="#A1887F" stroke-width="0.3"/>
<text x="340" y="328" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">крыловидный вырост</text>
<text x="340" y="336" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">клён, ясень, вяз</text>

<!-- Pericarp structure diagram (far right) -->
<rect x="392" y="275" width="100" height="65" rx="3" fill="white" opacity="0.5" stroke="#666" stroke-width="0.5"/>
<text x="442" y="287" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Околоплодник</text>
<!-- Layered diagram -->
<rect x="412" y="292" width="60" height="40" rx="3" fill="none" stroke="#666" stroke-width="0.5"/>
<!-- Epicarp -->
<rect x="412" y="292" width="60" height="8" rx="1" fill="#FFCC80" stroke="#E65100" stroke-width="0.3"/>
<text x="442" y="299" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" text-anchor="middle">внеплодник</text>
<!-- Mesocarp -->
<rect x="412" y="300" width="60" height="14" rx="1" fill="#FF8A65" stroke="#BF360C" stroke-width="0.3"/>
<text x="442" y="310" font-family="Arial,sans-serif" font-size="4.5" fill="#BF360C" text-anchor="middle">межплодник</text>
<!-- Endocarp -->
<rect x="412" y="314" width="60" height="8" rx="1" fill="#8D6E63" stroke="#4E342E" stroke-width="0.3"/>
