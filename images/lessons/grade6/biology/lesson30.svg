<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B3E5FC"/><stop offset="100%" stop-color="#E1F5FE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Значение семян в природе и жизни человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 30</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SEED DISPERSAL METHODS (top section) -->
<text x="250" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Способы распространения семян</text>

<!-- 1. ANEMOCHORY (Wind) -->
<g transform="translate(70,135)">
  <rect x="-55" y="-55" width="110" height="110" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <!-- Wind lines -->
  <path d="M-40,-45 Q-30,-48 -20,-42" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <path d="M-35,-38 Q-25,-41 -15,-35" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <path d="M-40,-30 Q-30,-33 -20,-27" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <!-- Dandelion seed -->
  <ellipse cx="5" cy="10" rx="3" ry="5" fill="#8D6E63"/>
  <!-- Parachute -->
  <line x1="5" y1="5" x2="-5" y2="-10" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="5" y1="5" x2="0" y2="-12" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="5" y1="5" x2="10" y2="-10" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="5" y1="5" x2="15" y2="-8" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="5" y1="5" x2="-8" y2="-6" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Hairs -->
  <circle cx="-5" cy="-10" r="1" fill="#FFF9C4"/>
  <circle cx="0" cy="-12" r="1" fill="#FFF9C4"/>
  <circle cx="10" cy="-10" r="1" fill="#FFF9C4"/>
  <circle cx="15" cy="-8" r="1" fill="#FFF9C4"/>
  <circle cx="-8" cy="-6" r="1" fill="#FFF9C4"/>
  <!-- Maple wing seed -->
  <path d="M-20,15 Q-25,5 -18,-5 Q-12,-2 -15,10 Z" fill="#A1887F" stroke="#795548" stroke-width="0.5"/>
  <ellipse cx="-18" cy="15" rx="3" ry="4" fill="#8D6E63"/>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Ветер</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Анемохория</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Одуванчик, клён</text>
</g>

<!-- 2. HYDROCHORY (Water) -->
<g transform="translate(195,135)">
  <rect x="-55" y="-55" width="110" height="110" rx="8" fill="#E0F7FA" stroke="#00838F" stroke-width="1"/>
  <!-- Water waves -->
  <path d="M-45,15 Q-35,10 -25,15 Q-15,20 -5,15 Q5,10 15,15 Q25,20 35,15 Q45,10 50,15" fill="none" stroke="#4DD0E1" stroke-width="1.5"/>
  <path d="M-45,22 Q-35,17 -25,22 Q-15,27 -5,22 Q5,17 15,22 Q25,27 35,22" fill="none" stroke="#4DD0E1" stroke-width="1" opacity="0.5"/>
  <!-- Coconut floating -->
  <ellipse cx="-10" cy="0" rx="10" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <circle cx="-10" cy="-5" r="3" fill="#A5D6A7" opacity="0.5"/>
  <!-- Water lily seed -->
  <ellipse cx="20" cy="8" rx="5" ry="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="8" fill="#00838F" text-anchor="middle" font-weight="bold">Вода</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#00838F" text-anchor="middle">Гидрохория</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Кокос, кувшинка</text>
</g>

<!-- 3. ZOOCHORY (Animals) -->
<g transform="translate(320,135)">
  <rect x="-55" y="-55" width="110" height="110" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <!-- Bird -->
  <ellipse cx="-15" cy="-25" rx="8" ry="5" fill="#795548" opacity="0.5"/>
  <circle cx="-20" cy="-27" r="3" fill="#5D4037" opacity="0.5"/>
  <path d="M-8,-25 Q-2,-30 0,-25" fill="#795548" opacity="0.4"/>
  <!-- Berry with seeds -->
  <circle cx="10" cy="-10" r="8" fill="#F44336" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
  <circle cx="8" cy="-12" r="1.5" fill="#8D6E63"/>
  <circle cx="13" cy="-8" r="1.5" fill="#8D6E63"/>
  <!-- Burdock (репей) seed -->
  <circle cx="-20" cy="5" r="6" fill="#795548" opacity="0.5"/>
  <line x1="-24" y1="0" x2="-26" y2="-4" stroke="#5D4037" stroke-width="0.8"/>
  <line x1="-16" y1="0" x2="-14" y2="-4" stroke="#5D4037" stroke-width="0.8"/>
  <line x1="-20" y1="-1" x2="-20" y2="-5" stroke="#5D4037" stroke-width="0.8"/>
  <line x1="-22" y1="10" x2="-24" y2="14" stroke="#5D4037" stroke-width="0.8"/>
  <line x1="-18" y1="10" x2="-16" y2="14" stroke="#5D4037" stroke-width="0.8"/>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Животные</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Зоохория</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Рябина, лопух, череда</text>
</g>

<!-- 4. AUTOCHORY (Self-dispersal) -->
<g transform="translate(445,135)">
  <rect x="-55" y="-55" width="110" height="110" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Exploding pod -->
  <path d="M-8,-5 Q-15,-10 -20,-2" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M8,-5 Q15,-10 20,-2" fill="none" stroke="#795548" stroke-width="1.5"/>
  <!-- Seeds flying out -->
  <circle cx="-22" cy="-8" r="2" fill="#8D6E63"/>
  <circle cx="22" cy="-10" r="2" fill="#8D6E63"/>
  <circle cx="-18" cy="-15" r="1.5" fill="#8D6E63"/>
  <circle cx="18" cy="-18" r="1.5" fill="#8D6E63"/>
  <!-- Motion lines -->
  <path d="M-22,-8 Q-28,-12 -30,-18" fill="none" stroke="#9C27B0" stroke-width="0.5" opacity="0.5"/>
  <path d="M22,-10 Q28,-14 30,-20" fill="none" stroke="#9C27B0" stroke-width="0.5" opacity="0.5"/>
  <!-- Touch-me-not stem -->
  <line x1="0" y1="0" x2="0" y2="20" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Саморазбр.</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Автохория</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Бешеный огурец, недотрога</text>
</g>

<!-- SEEDS AS FOOD (bottom left) -->
<text x="165" y="210" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Семена — пища человека</text>

<!-- Cereals -->
<g transform="translate(55,242)">
  <rect x="-40" y="-22" width="80" height="44" rx="5" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
  <!-- Wheat ear -->
  <line x1="-15" y1="15" x2="-15" y2="-10" stroke="#F9A825" stroke-width="1"/>
  <ellipse cx="-15" cy="-14" rx="4" ry="7" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <ellipse cx="-15" cy="-6" rx="4" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <!-- Rice -->
  <ellipse cx="5" cy="-5" rx="3" ry="8" fill="#FFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <ellipse cx="12" cy="-3" rx="3" ry="7" fill="#FFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">Злаки</text>
  <text x="0" y="38" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Пшеница, рис, кукуруза</text>
</g>

<!-- Legumes -->
<g transform="translate(165,242)">
  <rect x="-40" y="-22" width="80" height="44" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <!-- Bean pod -->
  <rect x="-20" y="-10" width="30" height="10" rx="5" fill="#8BC34A" stroke="#558B2F" stroke-width="0.5"/>
  <circle cx="-12" cy="-5" r="3" fill="#795548"/>
  <circle cx="-3" cy="-5" r="3" fill="#795548"/>
  <!-- Pea -->
  <circle cx="15" cy="-5" r="5" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Бобовые</text>
  <text x="0" y="38" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Горох, фасоль, соя</text>
</g>

<!-- Oilseeds -->
<g transform="translate(275,242)">
  <rect x="-40" y="-22" width="80" height="44" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
  <!-- Sunflower seeds -->
  <circle cx="-5" cy="-5" r="8" fill="#8D6E63" opacity="0.6"/>
  <ellipse cx="-8" cy="-8" rx="3" ry="5" fill="#3E2723" stroke="#1B5E20" stroke-width="0.3"/>
  <ellipse cx="-2" cy="-6" rx="3" ry="5" fill="#3E2723" stroke="#1B5E20" stroke-width="0.3"/>
  <ellipse cx="4" cy="-8" rx="3" ry="5" fill="#3E2723" stroke="#1B5E20" stroke-width="0.3"/>
  <!-- Oil drop -->
  <path d="M15,-10 Q20,-15 18,-5 Q16,0 15,-10" fill="#FFC107" opacity="0.7"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Масличные</text>
  <text x="0" y="38" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Подсолнечник, лён, рапс</text>
</g>

<!-- SEED BANK (bottom right) -->
<text x="410" y="210" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Хранилище семян</text>

<!-- Svalbard vault -->
<g transform="translate(410,255)">
  <!-- Mountain/entrance -->
  <polygon points="-30,10 -20,-20 0,-30 20,-20 30,10" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
  <!-- Door -->
  <rect x="-6" y="-8" width="12" height="18" rx="2" fill="#37474F" stroke="#263238" stroke-width="0.8"/>
  <line x1="0" y1="-8" x2="0" y2="10" stroke="#455A64" stroke-width="0.5"/>
  <!-- Snow on top -->
  <path d="M-25,-15 Q-15,-22 0,-28 Q15,-22 25,-15" fill="none" stroke="#FFF" stroke-width="2" opacity="0.6"/>
  <!-- Cold indicator -->
  <text x="0" y="-33" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">-18°C</text>
  <!-- Label -->
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#37474F" text-anchor="middle" font-weight="bold">Свальбард</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Норвегия</text>
  <text x="0" y="41" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">~1 млн образцов</text>
</g>

<!-- Vavilov Institute -->
<g transform="translate(470,250)">
  <rect x="-22" y="-18" width="44" height="36" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Building icon -->
  <rect x="-12" y="-8" width="24" height="20" rx="1" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <rect x="-8" y="-4" width="5" height="5" fill="#FFF" opacity="0.5"/>
  <rect x="3" y="-4" width="5" height="5" fill="#FFF" opacity="0.5"/>
  <rect x="-2" y="4" width="4" height="8" fill="#795548" opacity="0.5"/>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-weight="bold">ВИР</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">С-Петербург</text>
</g>

<!-- Bottom note -->
<rect x="50" y="300" width="400" height="35" rx="5" fill="#1B5E20" opacity="0.06" stroke="#2E7D32" stroke-width="0.5"/>
<text x="250" y="314" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Значение семян в природе: размножение и расселение растений</text>
<text x="250" y="325" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">В хозяйстве: пища, корм скоту, сырьё для промышленности, сохранение сортов</text>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">!! Всхожесть семян проверяют перед посевом — от этого зависит урожай</text>
</svg>