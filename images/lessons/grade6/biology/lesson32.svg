<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="mainRoot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
<linearGradient id="sideRoot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
<linearGradient id="adventRoot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCC80"/><stop offset="100%" stop-color="#FFA726"/></linearGradient>
<linearGradient id="stemG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#81C784"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Виды корней и корневые системы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 32</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Three types of roots (top row) -->
<text x="250" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Три типа корней</text>

<!-- Type 1: Главный корень -->
<rect x="25" y="72" width="140" height="85" rx="4" fill="#FFF9C4" opacity="0.25" stroke="#F9A825" stroke-width="0.5"/>
<text x="95" y="84" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Главный корень</text>
<!-- Stem -->
<rect x="90" y="88" width="10" height="15" rx="2" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Main root growing down from stem -->
<path d="M95,103 L95,145" stroke="url(#mainRoot)" stroke-width="5" stroke-linecap="round"/>
<!-- Small lateral roots -->
<path d="M95,115 L80,125" stroke="url(#sideRoot)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M95,130 L110,138" stroke="url(#sideRoot)" stroke-width="1.2" stroke-linecap="round"/>
<path d="M95,140 L82,148" stroke="url(#sideRoot)" stroke-width="1" stroke-linecap="round"/>
<!-- Arrow pointing to main root -->
<line x1="110" y1="120" x2="102" y2="120" stroke="#1B5E20" stroke-width="0.7"/>
<text x="112" y="120" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">главный</text>
<text x="112" y="128" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(из зародыша)</text>

<!-- Type 2: Боковые корни -->
<rect x="180" y="72" width="140" height="85" rx="4" fill="#FFF9C4" opacity="0.25" stroke="#F9A825" stroke-width="0.5"/>
<text x="250" y="84" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Боковые корни</text>
<!-- Stem -->
<rect x="245" y="88" width="10" height="15" rx="2" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Main root -->
<path d="M250,103 L250,148" stroke="url(#mainRoot)" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
<!-- Prominent lateral roots -->
<path d="M250,110 L225,125" stroke="url(#sideRoot)" stroke-width="3" stroke-linecap="round"/>
<path d="M250,110 L275,125" stroke="url(#sideRoot)" stroke-width="3" stroke-linecap="round"/>
<path d="M250,125 L228,140" stroke="url(#sideRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M250,125 L272,140" stroke="url(#sideRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M225,125 L215,140" stroke="url(#sideRoot)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M275,125 L285,140" stroke="url(#sideRoot)" stroke-width="1.5" stroke-linecap="round"/>
<!-- Arrow pointing to lateral -->
<line x1="290" y1="118" x2="278" y2="118" stroke="#1B5E20" stroke-width="0.7"/>
<text x="292" y="116" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">боковые</text>
<text x="292" y="124" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(от главного)</text>

<!-- Type 3: Придаточные корни -->
<rect x="335" y="72" width="140" height="85" rx="4" fill="#FFF9C4" opacity="0.25" stroke="#F9A825" stroke-width="0.5"/>
<text x="405" y="84" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Придаточные корни</text>
<!-- Stem with nodes -->
<rect x="400" y="88" width="10" height="15" rx="2" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Adventitious roots from stem -->
<path d="M400,100 L385,125" stroke="url(#adventRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M402,103 L402,130" stroke="url(#adventRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M410,100 L425,125" stroke="url(#adventRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M398,105 L375,130" stroke="url(#adventRoot)" stroke-width="2" stroke-linecap="round"/>
<path d="M412,105 L435,130" stroke="url(#adventRoot)" stroke-width="2" stroke-linecap="round"/>
<!-- Arrow -->
<line x1="440" y1="105" x2="430" y2="112" stroke="#E65100" stroke-width="0.7"/>
<text x="442" y="103" font-family="Arial,sans-serif" font-size="6" fill="#E65100">придаточные</text>
<text x="442" y="111" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(от стебля/листа)</text>

<!-- SECTION 2: Root systems comparison (bottom half) -->
<text x="250" y="175" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Корневые системы</text>

<!-- Left: Стержневая (taproot) -->
<rect x="20" y="182" width="220" height="150" rx="5" fill="#E8F5E9" opacity="0.4" stroke="#2E7D32" stroke-width="1"/>
<text x="130" y="196" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Стержневая</text>
<text x="130" y="206" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">(двудольные растения)</text>

<!-- Ground line -->
<path d="M40,230 Q80,227 130,230 Q180,233 220,228" fill="none" stroke="#795548" stroke-width="1.5"/>
<rect x="40" y="228" width="180" height="100" fill="#8D6E63" opacity="0.1" rx="2"/>

<!-- Plant stem above ground -->
<rect x="126" y="212" width="8" height="20" rx="2" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Small leaves -->
<ellipse cx="120" cy="212" rx="10" ry="4" fill="#66BB6A" stroke="#388E3C" stroke-width="0.5"/>
<ellipse cx="140" cy="215" rx="9" ry="3.5" fill="#66BB6A" stroke="#388E3C" stroke-width="0.5"/>

<!-- Main root (thick, dominant) -->
<path d="M130,228 L130,310" stroke="url(#mainRoot)" stroke-width="5" stroke-linecap="round"/>
<!-- Lateral roots -->
<path d="M130,245 L105,262" stroke="url(#sideRoot)" stroke-width="2" stroke-linecap="round"/>
<path d="M130,245 L155,262" stroke="url(#sideRoot)" stroke-width="2" stroke-linecap="round"/>
<path d="M130,265 L108,280" stroke="url(#sideRoot)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M130,265 L152,280" stroke="url(#sideRoot)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M130,285 L112,298" stroke="url(#sideRoot)" stroke-width="1.2" stroke-linecap="round"/>
<path d="M130,285 L148,298" stroke="url(#sideRoot)" stroke-width="1.2" stroke-linecap="round"/>
<!-- Small 3rd order -->
<path d="M105,262 L95,275" stroke="url(#sideRoot)" stroke-width="0.8" stroke-linecap="round"/>
<path d="M155,262 L165,275" stroke="url(#sideRoot)" stroke-width="0.8" stroke-linecap="round"/>

<!-- Labels -->
<line x1="135" y1="250" x2="155" y2="250" stroke="#1B5E20" stroke-width="0.5" stroke-dasharray="2,1"/>
<text x="157" y="248" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20">главный</text>
<text x="157" y="256" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20">корень ↑</text>
<line x1="155" y1="262" x2="165" y2="262" stroke="#388E3C" stroke-width="0.5"/>
<text x="167" y="265" font-family="Arial,sans-serif" font-size="6" fill="#388E3C">боковые</text>

<!-- Example plants -->
<text x="60" y="320" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Одуванчик, морковь,</text>
<text x="60" y="329" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">фасоль, дуб, горох</text>

<!-- Right: Мочковатая (fibrous) -->
<rect x="260" y="182" width="220" height="150" rx="5" fill="#FFF3E0" opacity="0.4" stroke="#F57C00" stroke-width="1"/>
<text x="370" y="196" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Мочковатая</text>
<text x="370" y="206" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">(однодольные растения)</text>

<!-- Ground line -->
<path d="M280,230 Q330,227 370,230 Q420,233 460,228" fill="none" stroke="#795548" stroke-width="1.5"/>
<rect x="280" y="228" width="180" height="100" fill="#8D6E63" opacity="0.1" rx="2"/>

<!-- Plant stem -->
<rect x="366" y="212" width="8" height="20" rx="2" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Grass-like leaves -->
<path d="M370,212 Q355,200 348,190" fill="none" stroke="#66BB6A" stroke-width="2"/>
<path d="M370,212 Q385,200 392,190" fill="none" stroke="#66BB6A" stroke-width="2"/>
<path d="M370,215 Q350,210 340,200" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<path d="M370,215 Q390,210 400,200" fill="none" stroke="#4CAF50" stroke-width="1.5"/>

<!-- Fibrous roots - many adventitious roots, no dominant main root -->
<path d="M370,228 L370,300" stroke="url(#adventRoot)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
<path d="M368,230 L345,280" stroke="url(#adventRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M372,230 L395,280" stroke="url(#adventRoot)" stroke-width="2.5" stroke-linecap="round"/>
<path d="M367,232 L330,275" stroke="url(#adventRoot)" stroke-width="2" stroke-linecap="round"/>
<path d="M373,232 L410,275" stroke="url(#adventRoot)" stroke-width="2" stroke-linecap="round"/>
<path d="M366,235 L320,268" stroke="url(#adventRoot)" stroke-width="1.8" stroke-linecap="round"/>
<path d="M374,235 L420,268" stroke="url(#adventRoot)" stroke-width="1.8" stroke-linecap="round"/>
<path d="M365,238 L310,262" stroke="url(#adventRoot)" stroke-width="1.5" stroke-linecap="round"/>
<path d="M375,238 L430,262" stroke="url(#adventRoot)" stroke-width="1.5" stroke-linecap="round"/>
<!-- Small laterals on fibrous roots -->
<path d="M345,265 L338,275" stroke="url(#adventRoot)" stroke-width="0.8" stroke-linecap="round"/>
<path d="M345,270 L352,278" stroke="url(#adventRoot)" stroke-width="0.8" stroke-linecap="round"/>
<path d="M395,265 L402,275" stroke="url(#adventRoot)" stroke-width="0.8" stroke-linecap="round"/>
<path d="M395,270 L388,278" stroke="url(#adventRoot)" stroke-width="0.8" stroke-linecap="round"/>
<path d="M330,260 L322,270" stroke="url(#adventRoot)" stroke-width="0.7" stroke-linecap="round"/>
<path d="M410,260 L418,270" stroke="url(#adventRoot)" stroke-width="0.7" stroke-linecap="round"/>

<!-- Labels -->
<line x1="395" y1="260" x2="420" y2="252" stroke="#E65100" stroke-width="0.5"/>
<text x="422" y="250" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100">придаточные</text>
<text x="422" y="258" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100">корни</text>
<text x="370" y="308" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">главный корень</text>
<text x="370" y="316" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">не развивается</text>

<!-- Example plants -->
<text x="300" y="320" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Пшеница, лук,</text>
<text x="300" y="329" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">тюльпан, кукуруза</text>

<!-- VS divider -->
<text x="250" y="265" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">VS</text>

<!-- Color legend -->
<rect x="30" y="160" width="8" height="6" rx="1" fill="url(#mainRoot)" stroke="#388E3C" stroke-width="0.5"/>
<text x="42" y="166" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">главный</text>
<rect x="80" y="160" width="8" height="6" rx="1" fill="url(#sideRoot)" stroke="#388E3C" stroke-width="0.5"/>
<text x="92" y="166" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">боковые</text>
<rect x="132" y="160" width="8" height="6" rx="1" fill="url(#adventRoot)" stroke="#E65100" stroke-width="0.5"/>
<text x="144" y="166" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">придаточные</text>
</svg>
