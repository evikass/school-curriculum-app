<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="stemG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="50%" stop-color="#81C784"/><stop offset="100%" stop-color="#A5D6A7"/></linearGradient>
<linearGradient id="budVeg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#388E3C"/></linearGradient>
<linearGradient id="budGen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F48FB1"/><stop offset="100%" stop-color="#E91E63"/></linearGradient>
<linearGradient id="leafG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Побег и почки</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 34</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Shoot structure (left) -->
<text x="130" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение побега</text>

<!-- Main stem -->
<rect x="125" y="70" width="10" height="250" rx="3" fill="url(#stemG)" stroke="#388E3C" stroke-width="1"/>

<!-- Node 1 (top) with leaf and bud -->
<rect x="115" y="85" width="30" height="4" rx="1" fill="#66BB6A" stroke="#388E3C" stroke-width="0.5"/>
<!-- Leaf at node 1 -->
<path d="M115,87 L80,75 Q70,70 65,75 Q70,80 80,78 L115,87" fill="url(#leafG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Leaf veins -->
<path d="M80,75 L112,85" fill="none" stroke="#2E7D32" stroke-width="0.4"/>
<path d="M90,76 L108,83" fill="none" stroke="#2E7D32" stroke-width="0.3"/>
<!-- Terminal bud at top -->
<ellipse cx="130" cy="73" rx="6" ry="10" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="1"/>
<!-- Bud scales -->
<path d="M124,73 Q127,65 130,63 Q133,65 136,73" fill="none" stroke="#1B5E20" stroke-width="0.6"/>
<text x="145" y="73" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20">верхушечная</text>
<text x="145" y="81" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20">почка</text>

<!-- Node 2 -->
<rect x="115" y="145" width="30" height="4" rx="1" fill="#66BB6A" stroke="#388E3C" stroke-width="0.5"/>
<!-- Leaf at node 2 -->
<path d="M145,147 L180,135 Q190,130 195,135 Q190,140 180,138 L145,147" fill="url(#leafG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Axillary bud at node 2 -->
<ellipse cx="145" cy="145" rx="4" ry="7" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="0.8"/>
<text x="153" y="142" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">пазушная</text>
<text x="153" y="150" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">почка</text>

<!-- Node 3 -->
<rect x="115" y="210" width="30" height="4" rx="1" fill="#66BB6A" stroke="#388E3C" stroke-width="0.5"/>
<!-- Leaf at node 3 -->
<path d="M115,212 L80,200 Q70,195 65,200 Q70,205 80,203 L115,212" fill="url(#leafG)" stroke="#388E3C" stroke-width="0.8"/>
<!-- Axillary bud at node 3 -->
<ellipse cx="115" cy="210" rx="4" ry="7" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="0.8"/>

<!-- Labels with bracket lines -->
<!-- Node label -->
<line x1="125" y1="147" x2="60" y2="147" stroke="#666" stroke-width="0.5" stroke-dasharray="2,1"/>
<text x="58" y="144" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="end">узел</text>

<!-- Internode label -->
<line x1="120" y1="115" x2="60" y2="115" stroke="#666" stroke-width="0.5" stroke-dasharray="2,1"/>
<path d="M58,97 L58,133" fill="none" stroke="#1B5E20" stroke-width="0.8"/>
<path d="M55,97 L61,97" fill="none" stroke="#1B5E20" stroke-width="0.8"/>
<path d="M55,133 L61,133" fill="none" stroke="#1B5E20" stroke-width="0.8"/>
<text x="53" y="118" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="end">меж-</text>
<text x="53" y="126" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="end">узлие</text>

<!-- Stem label -->
<text x="58" y="180" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="end">стебель</text>
<line x1="60" y1="178" x2="123" y2="178" stroke="#666" stroke-width="0.5" stroke-dasharray="2,1"/>

<!-- Leaf axil label -->
<path d="M115,214 L100,224" fill="none" stroke="#666" stroke-width="0.5"/>
<text x="78" y="228" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">пазуха листа</text>

<!-- SECTION 2: Bud types (top right) -->
<text x="370" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы почек (внутреннее строение)</text>

<!-- Vegetative bud (left) -->
<rect x="280" y="72" width="80" height="85" rx="4" fill="#E8F5E9" opacity="0.4" stroke="#388E3C" stroke-width="0.8"/>
<text x="320" y="84" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Вегетативная</text>
<!-- Bud scales (outer) -->
<path d="M310,88 Q315,86 320,85 Q325,86 330,88" fill="none" stroke="#5D4037" stroke-width="1"/>
<path d="M308,92 Q314,89 320,88 Q326,89 332,92" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<!-- Leaf primordia inside (green) -->
<ellipse cx="315" cy="100" rx="4" ry="8" fill="#81C784" stroke="#388E3C" stroke-width="0.6" transform="rotate(-15,315,100)"/>
<ellipse cx="325" cy="100" rx="4" ry="8" fill="#81C784" stroke="#388E3C" stroke-width="0.6" transform="rotate(15,325,100)"/>
<ellipse cx="312" cy="112" rx="3.5" ry="7" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5" transform="rotate(-20,312,112)"/>
<ellipse cx="328" cy="112" rx="3.5" ry="7" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5" transform="rotate(20,328,112)"/>
<ellipse cx="320" cy="120" rx="3" ry="6" fill="#C8E6C9" stroke="#388E3C" stroke-width="0.5"/>
<!-- Apical meristem -->
<circle cx="320" cy="95" r="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.6"/>
<text x="320" y="97" font-family="Arial,sans-serif" font-size="4" fill="#F57F17" text-anchor="middle">КМ</text>
<text x="320" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">зачатки листьев</text>
<text x="320" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">+ конус нарастания</text>

<!-- Generative bud (right) -->
<rect x="375" y="72" width="80" height="85" rx="4" fill="#FCE4EC" opacity="0.4" stroke="#E91E63" stroke-width="0.8"/>
<text x="415" y="84" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">Генеративная</text>
<!-- Bud scales -->
<path d="M405,88 Q410,86 415,85 Q420,86 425,88" fill="none" stroke="#5D4037" stroke-width="1"/>
<path d="M403,92 Q409,89 415,88 Q421,89 427,92" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<!-- Flower parts inside (pink/red) -->
<!-- Petal primordia -->
<ellipse cx="410" cy="102" rx="3" ry="7" fill="#F48FB1" stroke="#E91E63" stroke-width="0.5" transform="rotate(-20,410,102)"/>
<ellipse cx="420" cy="102" rx="3" ry="7" fill="#F48FB1" stroke="#E91E63" stroke-width="0.5" transform="rotate(20,420,102)"/>
<ellipse cx="407" cy="114" rx="2.5" ry="6" fill="#F8BBD0" stroke="#E91E63" stroke-width="0.5" transform="rotate(-25,407,114)"/>
<ellipse cx="423" cy="114" rx="2.5" ry="6" fill="#F8BBD0" stroke="#E91E63" stroke-width="0.5" transform="rotate(25,423,114)"/>
<!-- Stamen primordia (yellow dots) -->
<circle cx="413" cy="98" r="2" fill="#FFF176" stroke="#F9A825" stroke-width="0.5"/>
<circle cx="417" cy="98" r="2" fill="#FFF176" stroke="#F9A825" stroke-width="0.5"/>
<!-- Pistil primordium -->
<ellipse cx="415" cy="108" rx="2" ry="5" fill="#CE93D8" stroke="#8E24AA" stroke-width="0.5"/>
<text x="415" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">зачатки цветка</text>
<text x="415" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(лепестки, тычинки)</text>

<!-- Legend for bud colors -->
<rect x="280" y="158" width="8" height="5" rx="1" fill="url(#budVeg)"/>
<text x="292" y="163" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">вегетативная (листовая)</text>
<rect x="280" y="167" width="8" height="5" rx="1" fill="url(#budGen)"/>
<text x="292" y="172" font-family="Arial,sans-serif" font-size="6" fill="#C62828">генеративная (цветочная)</text>

<!-- SECTION 3: Bud placement (bottom right) -->
<text x="370" y="188" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Расположение почек</text>

<!-- Terminal bud -->
<rect x="265" y="195" width="70" height="60" rx="3" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="300" y="205" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Верхушечная</text>
<!-- Stem tip -->
<rect x="297" y="225" width="6" height="20" rx="1" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.5"/>
<!-- Terminal bud -->
<ellipse cx="300" cy="222" rx="5" ry="9" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="0.8"/>
<path d="M295,222 Q298,214 300,212 Q302,214 305,222" fill="none" stroke="#1B5E20" stroke-width="0.5"/>
<text x="300" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">на верхушке</text>

<!-- Axillary bud -->
<rect x="345" y="195" width="70" height="60" rx="3" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="380" y="205" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пазушная</text>
<!-- Stem -->
<rect x="377" y="210" width="6" height="40" rx="1" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.5"/>
<!-- Node -->
<rect x="372" y="225" width="16" height="3" rx="1" fill="#66BB6A" stroke="#388E3C" stroke-width="0.3"/>
<!-- Leaf stalk -->
<path d="M372,227 L360,218" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<!-- Leaf -->
<ellipse cx="355" cy="215" rx="8" ry="4" fill="url(#leafG)" stroke="#388E3C" stroke-width="0.5"/>
<!-- Axillary bud -->
<ellipse cx="370" cy="226" rx="4" ry="6" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="0.8"/>
<text x="380" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">в пазухе листа</text>

<!-- Adventitious bud -->
<rect x="425" y="195" width="70" height="60" rx="3" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="460" y="205" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Придаточная</text>
<!-- Stem -->
<rect x="457" y="210" width="6" height="40" rx="1" fill="url(#stemG)" stroke="#388E3C" stroke-width="0.5"/>
<!-- Adventitious buds on internode -->
<ellipse cx="457" cy="228" rx="4" ry="6" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="0.8"/>
<ellipse cx="463" cy="238" rx="3" ry="5" fill="url(#budVeg)" stroke="#2E7D32" stroke-width="0.7"/>
<text x="460" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">на междоузлии</text>

<!-- SECTION 4: Branching types (bottom) -->
<text x="250" y="275" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы ветвления</text>

<!-- Monopodial -->
<rect x="20" y="282" width="150" height="58" rx="3" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="95" y="293" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Моноподиальное</text>
<!-- Main axis -->
<line x1="95" y1="298" x2="95" y2="335" stroke="#388E3C" stroke-width="2"/>
<!-- Side branches -->
<line x1="95" y1="305" x2="70" y2="320" stroke="#388E3C" stroke-width="1.2"/>
<line x1="95" y1="305" x2="120" y2="320" stroke="#388E3C" stroke-width="1.2"/>
<line x1="95" y1="315" x2="75" y2="330" stroke="#388E3C" stroke-width="1"/>
<line x1="95" y1="315" x2="115" y2="330" stroke="#388E3C" stroke-width="1"/>
<!-- Top continues -->
<circle cx="95" cy="298" r="2" fill="#1B5E20"/>
<text x="95" y="340" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">главная ось сохраняется</text>

<!-- Sympodial -->
<rect x="180" y="282" width="150" height="58" rx="3" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="255" y="293" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Симподиальное</text>
<!-- Main axis bends -->
<path d="M255,298 L255,310 Q255,318 248,318 L240,318" fill="none" stroke="#388E3C" stroke-width="2"/>
<!-- Replacement branch continues up -->
<path d="M255,310 L265,305 L268,298" fill="none" stroke="#388E3C" stroke-width="1.5"/>
<!-- Another side -->
<path d="M255,310 L245,325" fill="none" stroke="#81C784" stroke-width="1"/>
<circle cx="268" cy="298" r="2" fill="#1B5E20"/>
<circle cx="240" cy="318" r="1.5" fill="#FF9800"/>
<text x="255" y="340" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">боковая ветвь заменяет</text>

<!-- Dichotomous -->
<rect x="340" y="282" width="150" height="58" rx="3" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="415" y="293" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Дихотомическое</text>
<!-- Fork pattern -->
<line x1="415" y1="298" x2="415" y2="310" stroke="#388E3C" stroke-width="2"/>
<!-- Fork -->
<line x1="415" y1="310" x2="395" y2="325" stroke="#388E3C" stroke-width="1.5"/>
<line x1="415" y1="310" x2="435" y2="325" stroke="#388E3C" stroke-width="1.5"/>
<!-- Second fork left -->
<line x1="395" y1="325" x2="385" y2="335" stroke="#388E3C" stroke-width="1"/>
<line x1="395" y1="325" x2="403" y2="335" stroke="#388E3C" stroke-width="1"/>
<!-- Second fork right -->
<line x1="435" y1="325" x2="427" y2="335" stroke="#388E3C" stroke-width="1"/>
<line x1="435" y1="325" x2="445" y2="335" stroke="#388E3C" stroke-width="1"/>
<text x="415" y="340" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">ось делится надвое</text>
</svg>
