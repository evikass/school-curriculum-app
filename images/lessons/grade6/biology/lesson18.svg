<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="peatGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#4E342E"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Мхи</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 18</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Кукушкин лён (Polytrichum) -->
<text x="85" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Кукушкин лён</text>

<g transform="translate(25,75)">
<!-- Ground -->
<path d="M0,140 Q30,135 60,140 Q90,145 120,138" fill="none" stroke="#795548" stroke-width="1.5"/>
<rect x="0" y="140" width="120" height="30" fill="#8D6E63" opacity="0.1"/>

<!-- Male plant (without capsule) -->
<line x1="30" y1="140" x2="30" y2="55" stroke="#4CAF50" stroke-width="2"/>
<!-- Leaves -->
<path d="M30,80 Q22,78 20,82 Q22,85 30,83" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,80 Q38,78 40,82 Q38,85 30,83" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,90 Q22,88 20,92 Q22,95 30,93" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,90 Q38,88 40,92 Q38,95 30,93" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,100 Q22,98 20,102 Q22,105 30,103" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,100 Q38,98 40,102 Q38,105 30,103" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,110 Q22,108 20,112 Q22,115 30,113" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M30,110 Q38,108 40,112 Q38,115 30,113" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<!-- Top rosette (antheridia) -->
<ellipse cx="30" cy="58" rx="8" ry="5" fill="#8D6E63" opacity="0.3" stroke="#5D4037" stroke-width="0.5"/>
<text x="30" y="47" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">♂ мужское</text>

<!-- Female plant (with capsule/sporophyte) -->
<line x1="80" y1="140" x2="80" y2="40" stroke="#4CAF50" stroke-width="2"/>
<!-- Leaves -->
<path d="M80,75 Q72,73 70,77 Q72,80 80,78" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M80,75 Q88,73 90,77 Q88,80 80,78" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M80,85 Q72,83 70,87 Q72,90 80,88" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M80,85 Q88,83 90,87 Q88,90 80,88" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M80,95 Q72,93 70,97 Q72,100 80,98" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M80,95 Q88,93 90,97 Q88,100 80,98" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.4"/>

<!-- Seta (stalk of sporophyte) -->
<line x1="80" y1="50" x2="80" y2="15" stroke="#8D6E63" stroke-width="1.2"/>
<!-- Capsule (коробочка) -->
<ellipse cx="80" cy="12" rx="7" ry="10" fill="#8D6E63" opacity="0.6" stroke="#5D4037" stroke-width="0.8"/>
<!-- Calyptra (hood) -->
<path d="M73,5 Q80,0 87,5 Q85,8 80,7 Q75,8 73,5Z" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="0.4"/>
<!-- Lid (operculum) -->
<line x1="73" y1="6" x2="87" y2="6" stroke="#5D4037" stroke-width="0.5"/>

<text x="80" y="47" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">♀ женское</text>

<!-- Labels with lines -->
<text x="100" y="12" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">коробочка</text>
<line x1="87" y1="12" x2="99" y2="12" stroke="#5D4037" stroke-width="0.3"/>
<text x="100" y="22" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">ножка</text>
<line x1="87" y1="25" x2="99" y2="22" stroke="#5D4037" stroke-width="0.3"/>
<text x="100" y="7" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">покрывальце</text>

<!-- Rhizoids -->
<path d="M30,140 Q28,148 25,155" fill="none" stroke="#795548" stroke-width="0.8"/>
<path d="M30,140 Q32,148 35,155" fill="none" stroke="#795548" stroke-width="0.8"/>
<path d="M80,140 Q78,148 75,155" fill="none" stroke="#795548" stroke-width="0.8"/>
<path d="M80,140 Q82,148 85,155" fill="none" stroke="#795548" stroke-width="0.8"/>
<text x="55" y="162" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle">ризоиды</text>

<!-- Stem label -->
<text x="10" y="100" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">стебель</text>
<line x1="25" y1="100" x2="28" y2="100" stroke="#4CAF50" stroke-width="0.3"/>

<!-- Leaf label -->
<text x="50" y="82" font-family="Arial,sans-serif" font-size="6" fill="#66BB6A">листочки</text>
<line x1="55" y1="82" x2="42" y2="82" stroke="#66BB6A" stroke-width="0.3"/>
</g>

<!-- Section 2: Сфагнум (Sphagnum) -->
<text x="265" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сфагнум</text>

<g transform="translate(200,75)">
<!-- Sphagnum plant -->
<line x1="60" y1="140" x2="60" y2="30" stroke="#81C784" stroke-width="2"/>
<!-- Branch clusters -->
<path d="M60,45 Q50,40 42,45" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,45 Q70,40 78,45" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,60 Q48,55 40,60" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,60 Q72,55 80,60" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,75 Q48,70 40,75" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,75 Q72,70 80,75" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,90 Q50,85 42,90" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,90 Q70,85 78,90" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,105 Q50,100 42,105" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<path d="M60,105 Q70,100 78,105" fill="none" stroke="#A5D6A7" stroke-width="1"/>
<!-- Top cluster -->
<path d="M60,30 Q50,25 42,30" fill="none" stroke="#A5D6A7" stroke-width="1.2"/>
<path d="M60,30 Q70,25 78,30" fill="none" stroke="#A5D6A7" stroke-width="1.2"/>

<!-- Sphagnum leaf cell close-up (insert) -->
<g transform="translate(95,70)">
<rect x="0" y="0" width="65" height="55" rx="3" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="32" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Клетки листа</text>
<!-- Hyaline cells (large empty) -->
<rect x="5" y="14" width="18" height="14" rx="1" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
<rect x="25" y="14" width="18" height="14" rx="1" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
<rect x="5" y="30" width="18" height="14" rx="1" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
<rect x="25" y="30" width="18" height="14" rx="1" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
<!-- Chlorophyll cells (small green) -->
<rect x="46" y="14" width="10" height="14" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
<rect x="46" y="30" width="10" height="14" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
<text x="14" y="23" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">вода</text>
<text x="34" y="23" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">вода</text>
<text x="14" y="39" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">вода</text>
<text x="34" y="39" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">вода</text>
<text x="51" y="23" font-family="Arial,sans-serif" font-size="3.5" fill="#1B5E20" text-anchor="middle">хл.</text>
<text x="51" y="39" font-family="Arial,sans-serif" font-size="3.5" fill="#1B5E20" text-anchor="middle">хл.</text>
<text x="32" y="50" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">впитывает 20-25×</text>
</g>

<!-- Labels -->
<text x="20" y="150" font-family="Arial,sans-serif" font-size="6" fill="#795548">ризоиды нет</text>
<text x="60" y="160" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">сфагнол — антисептик</text>
</g>

<!-- Section 3: Life cycle -->
<text x="410" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Жизненный цикл</text>

<g transform="translate(345,75)">
<rect x="0" y="0" width="140" height="80" rx="4" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Gametophyte (dominant) -->
<ellipse cx="40" cy="25" rx="25" ry="15" fill="#81C784" opacity="0.3" stroke="#4CAF50" stroke-width="1"/>
<text x="40" y="23" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Гаметофит</text>
<text x="40" y="31" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50" text-anchor="middle">(n) — преобладает</text>

<!-- Sporophyte (small) -->
<ellipse cx="100" cy="25" rx="22" ry="12" fill="#FFCC80" opacity="0.3" stroke="#E65100" stroke-width="1"/>
<text x="100" y="23" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Спорофит</text>
<text x="100" y="31" font-family="Arial,sans-serif" font-size="5" fill="#FF9800" text-anchor="middle">(2n)</text>

<!-- Arrows -->
<path d="M65,25 L78,25" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
<polygon points="78,23 82,25 78,27" fill="#2E7D32"/>
<text x="73" y="20" font-family="Arial,sans-serif" font-size="4.5" fill="#1B5E20">споры</text>

<path d="M100,38 Q80,55 40,38" fill="none" stroke="#E65100" stroke-width="0.8"/>
<polygon points="42,36 38,40 44,40" fill="#E65100"/>
<text x="80" y="52" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100">оплодотворение</text>

<!-- Key fact -->
<text x="70" y="65" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">Чередование поколений:</text>
<text x="70" y="73" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50" text-anchor="middle">гаметофит > спорофит</text>
</g>

<!-- Section 4: Peat bog cross-section -->
<text x="250" y="170" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Образование торфа</text>

<g transform="translate(20,180)">
<!-- Cross-section layers -->
<!-- Living sphagnum layer -->
<rect x="0" y="0" width="300" height="15" rx="2" fill="#A5D6A7" opacity="0.5" stroke="#4CAF50" stroke-width="0.5"/>
<!-- Small moss plants on top -->
<path d="M15,0 Q15,-5 20,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M40,0 Q40,-6 45,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M65,0 Q65,-5 70,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M90,0 Q90,-6 95,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M115,0 Q115,-5 120,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M140,0 Q140,-6 145,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M165,0 Q165,-5 170,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M190,0 Q190,-6 195,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M215,0 Q215,-5 220,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M240,0 Q240,-6 245,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M265,0 Q265,-5 270,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M285,0 Q285,-6 290,0" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<text x="310" y="10" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">живой сфагнум</text>

<!-- White peat -->
<rect x="0" y="15" width="300" height="15" rx="2" fill="#EFEBE9" opacity="0.6" stroke="#BCAAA4" stroke-width="0.5"/>
<text x="310" y="25" font-family="Arial,sans-serif" font-size="6" fill="#8D6E63">торф белый</text>

<!-- Brown peat -->
<rect x="0" y="30" width="300" height="15" rx="2" fill="#8D6E63" opacity="0.5" stroke="#6D4C41" stroke-width="0.5"/>
<text x="310" y="40" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">торф бурый</text>

<!-- Black peat -->
<rect x="0" y="45" width="300" height="15" rx="2" fill="#5D4037" opacity="0.5" stroke="#3E2723" stroke-width="0.5"/>
<text x="310" y="55" font-family="Arial,sans-serif" font-size="6" fill="#3E2723">торф чёрный</text>

<!-- Clay/mineral bottom -->
<rect x="0" y="60" width="300" height="10" rx="2" fill="#9E9E9E" opacity="0.4" stroke="#757575" stroke-width="0.5"/>
<text x="310" y="67" font-family="Arial,sans-serif" font-size="6" fill="#757575">минеральное дно</text>

<!-- Arrows showing transformation -->
<path d="M150,8 L150,15" fill="none" stroke="#2E7D32" stroke-width="0.6"/>
<path d="M150,23 L150,30" fill="none" stroke="#8D6E63" stroke-width="0.6"/>
<path d="M150,38 L150,45" fill="none" stroke="#5D4037" stroke-width="0.6"/>

<!-- Time arrow -->
<line x1="0" y1="75" x2="300" y2="75" stroke="#2E7D32" stroke-width="0.8"/>
<polygon points="300,73 305,75 300,77" fill="#2E7D32"/>
<text x="150" y="83" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">тысячи лет →</text>
</g>

<!-- Uses of peat -->
<g transform="translate(340,190)">
<rect x="0" y="0" width="140" height="65" rx="4" fill="white" opacity="0.5" stroke="#8D6E63" stroke-width="0.5"/>
<text x="70" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Использование торфа</text>
<text x="8" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">• Топливо (торфяные брикеты)</text>
<text x="8" y="34" font-family="Arial,sans-serif" font-size="6" fill="#333">• Удобрение для растений</text>
<text x="8" y="44" font-family="Arial,sans-serif" font-size="6" fill="#333">• Теплоизоляция (строительство)</text>
<text x="8" y="54" font-family="Arial,sans-serif" font-size="6" fill="#333">• Сырьё для химии</text>
<text x="8" y="64" font-family="Arial,sans-serif" font-size="6" fill="#333">• Водопоглотитель (садоводство)</text>
</g>

<!-- Bottom comparison -->
<g transform="translate(15,290)">
<rect x="0" y="0" width="470" height="40" rx="4" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="235" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Общие признаки мхов</text>
<text x="8" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">• Нет корней — только ризоиды • Нет проводящей системы • Вода нужна для оплодотворения • Гаметофит преобладает над спорофитом</text>
<text x="8" y="35" font-family="Arial,sans-serif" font-size="6" fill="#333">• Впитывают воду всей поверхностью • Растут во влажных местах • Кукушкин лён — зелёный мох, Сфагнум — торфяной мох (без ризоидов)</text>
</g>
</svg>