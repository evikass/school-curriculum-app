<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <radialGradient id="globe2" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Градусная сеть</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Globe with parallels -->
  <rect x="30" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="100" cy="170" r="50" fill="url(#globe2)" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- Parallels -->
  <ellipse cx="100" cy="140" rx="50" ry="6" fill="none" stroke="#FDD835" stroke-width="0.8"/>
  <ellipse cx="100" cy="155" rx="50" ry="10" fill="none" stroke="#FDD835" stroke-width="0.8"/>
  <ellipse cx="100" cy="170" rx="50" ry="12" fill="none" stroke="#FDD835" stroke-width="1.5"/>
  <ellipse cx="100" cy="185" rx="50" ry="10" fill="none" stroke="#FDD835" stroke-width="0.8"/>
  <ellipse cx="100" cy="200" rx="50" ry="6" fill="none" stroke="#FDD835" stroke-width="0.8"/>
  <!-- Labels -->
  <text x="155" y="143" font-family="Arial,sans-serif" font-size="7" fill="#E65100">60 N</text>
  <text x="155" y="173" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">0 экватор</text>
  <text x="155" y="203" font-family="Arial,sans-serif" font-size="7" fill="#E65100">60 S</text>
  <text x="100" y="245" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Параллели</text>
  <text x="100" y="258" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Горизонтальные</text>
  <text x="100" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">линии на глобусе</text>

  <!-- Card 2: Globe with meridians -->
  <rect x="180" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="250" cy="170" r="50" fill="url(#globe2)" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- Meridians -->
  <ellipse cx="250" cy="170" rx="50" ry="50" fill="none" stroke="#EF5350" stroke-width="0.8"/>
  <ellipse cx="250" cy="170" rx="35" ry="50" fill="none" stroke="#EF5350" stroke-width="0.8"/>
  <ellipse cx="250" cy="170" rx="17" ry="50" fill="none" stroke="#EF5350" stroke-width="0.8"/>
  <line x1="250" y1="120" x2="250" y2="220" stroke="#EF5350" stroke-width="1"/>
  <!-- Equator -->
  <ellipse cx="250" cy="170" rx="50" ry="10" fill="none" stroke="#FDD835" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Prime meridian highlight -->
  <line x1="250" y1="120" x2="250" y2="220" stroke="#C62828" stroke-width="2"/>
  <text x="255" y="135" font-family="Arial,sans-serif" font-size="7" fill="#C62828">0 Гринвич</text>
  <text x="250" y="245" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Меридианы</text>
  <text x="250" y="258" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Вертикальные</text>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">линии на глобусе</text>

  <!-- Card 3: Coordinate grid diagram -->
  <rect x="330" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Grid -->
  <rect x="345" y="110" width="110" height="70" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <!-- Horizontal lines (parallels) -->
  <line x1="345" y1="125" x2="455" y2="125" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="345" y1="145" x2="455" y2="145" stroke="#FDD835" stroke-width="1.2"/>
  <line x1="345" y1="165" x2="455" y2="165" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Vertical lines (meridians) -->
  <line x1="370" y1="110" x2="370" y2="180" stroke="#EF5350" stroke-width="0.8"/>
  <line x1="400" y1="110" x2="400" y2="180" stroke="#C62828" stroke-width="1.2"/>
  <line x1="430" y1="110" x2="430" y2="180" stroke="#EF5350" stroke-width="0.8"/>
  <!-- Point -->
  <circle cx="400" cy="145" r="4" fill="#C62828"/>
  <circle cx="400" cy="145" r="7" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Dashed lines to point -->
  <line x1="400" y1="145" x2="455" y2="145" stroke="#C62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="400" y1="145" x2="400" y2="180" stroke="#C62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="440" y="142" font-family="Arial,sans-serif" font-size="7" fill="#E65100">ш. 30 N</text>
  <text x="440" y="175" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">д. 60 E</text>
  <text x="400" y="245" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Координаты</text>
  <text x="400" y="258" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Широта и долгота</text>
  <text x="400" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">точки на карте</text>

  <!-- Stats bar -->
  <rect x="30" y="298" width="440" height="3" rx="1" fill="#E0E0E0" opacity="0.5"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Градусная сеть</text>
</svg>