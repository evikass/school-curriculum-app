<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0" opacity="0.3"/>
      <stop offset="100%" stop-color="#0D47A1" opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cleanwater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Загрязнение воды</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main illustration: River scene -->
  <rect x="30" y="90" width="290" height="205" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="175" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">ЗАГРЯЗНЁННАЯ РЕКА</text>

  <!-- Sky -->
  <rect x="35" y="110" width="280" height="55" fill="#B3E5FC" rx="0"/>
  <!-- Sun -->
  <circle cx="290" cy="125" r="14" fill="#F9A825" opacity="0.6"/>

  <!-- Factory on bank -->
  <rect x="40" y="140" width="55" height="50" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <rect x="48" y="120" width="10" height="25" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
  <rect x="65" y="115" width="10" height="30" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
  <!-- Smoke -->
  <ellipse cx="53" cy="115" rx="8" ry="5" fill="#9E9E9E" opacity="0.5"/>
  <ellipse cx="70" cy="110" rx="10" ry="6" fill="#9E9E9E" opacity="0.4"/>

  <!-- Pipe dumping waste -->
  <rect x="95" y="175" width="30" height="6" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  <!-- Waste stream -->
  <path d="M125,178 Q135,180 140,185 Q145,190 150,188" stroke="#8D6E63" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M125,178 Q138,182 145,190" stroke="#F9A825" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Water surface -->
  <path d="M35,190 Q55,185 75,190 Q95,195 115,190 Q135,185 155,190 Q175,195 195,190 Q215,185 235,190 Q255,195 275,190 Q295,185 310,190 L310,295 L35,295 Z" fill="url(#water)" stroke="#1565C0" stroke-width="1"/>
  
  <!-- Oil spill on water surface -->
  <ellipse cx="170" cy="200" rx="35" ry="8" fill="#37474F" opacity="0.7"/>
  <ellipse cx="155" cy="205" rx="20" ry="5" fill="#455A64" opacity="0.6"/>
  <ellipse cx="190" cy="203" rx="15" ry="4" fill="#37474F" opacity="0.5"/>
  
  <!-- Oil spill rainbow sheen -->
  <ellipse cx="175" cy="198" rx="10" ry="3" fill="#7B1FA2" opacity="0.3"/>
  <ellipse cx="185" cy="201" rx="8" ry="2" fill="#00BCD4" opacity="0.3"/>

  <!-- Trash floating -->
  <rect x="130" y="192" width="7" height="5" fill="#F9A825"/>
  <circle cx="210" cy="196" r="4" fill="#E53935"/>
  <rect x="240" y="193" width="10" height="6" rx="1" fill="#757575"/>

  <!-- Fish skeleton -->
  <g transform="translate(220,230)">
    <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#757575" stroke-width="1"/>
    <circle cx="-15" cy="0" r="2" fill="none" stroke="#757575" stroke-width="1"/>
    <line x1="-10" y1="0" x2="12" y2="0" stroke="#757575" stroke-width="0.5"/>
    <line x1="-5" y1="-3" x2="-5" y2="3" stroke="#757575" stroke-width="0.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#757575" stroke-width="0.5"/>
    <line x1="5" y1="-3" x2="5" y2="3" stroke="#757575" stroke-width="0.5"/>
    <!-- Tail -->
    <polygon points="15,0 22,-6 22,6" fill="none" stroke="#757575" stroke-width="1"/>
    <!-- X eyes -->
    <line x1="-17" y1="-2" x2="-13" y2="2" stroke="#C62828" stroke-width="1"/>
    <line x1="-13" y1="-2" x2="-17" y2="2" stroke="#C62828" stroke-width="1"/>
  </g>
  
  <!-- Dead fish 2 -->
  <g transform="translate(150,250)">
    <ellipse cx="0" cy="0" rx="10" ry="4" fill="white" stroke="#757575" stroke-width="0.5" opacity="0.7"/>
    <circle cx="10" cy="-1" r="1.5" fill="#757575"/>
    <polygon points="-10,0 -16,-4 -16,4" fill="white" stroke="#757575" stroke-width="0.5" opacity="0.7"/>
  </g>

  <!-- Right panel: Water treatment / Clean vs Dirty -->
  <rect x="330" y="90" width="140" height="105" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ОЧИСТКА ВОДЫ</text>

  <!-- Water treatment plant -->
  <rect x="340" y="135" width="40" height="50" fill="#B3E5FC" stroke="#1565C0" stroke-width="1"/>
  <rect x="345" y="125" width="30" height="15" rx="3" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Input pipe (dirty) -->
  <rect x="325" y="150" width="18" height="5" fill="#8D6E63"/>
  <path d="M325,152 L330,152" stroke="#8D6E63" stroke-width="5"/>
  <!-- Output pipe (clean) -->
  <rect x="380" y="160" width="18" height="5" fill="#42A5F5"/>
  
  <!-- Dirty water drop -->
  <g transform="translate(350,120)">
    <path d="M0,-12 Q-8,0 0,8 Q8,0 0,-12 Z" fill="#8D6E63" opacity="0.7"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">!</text>
  </g>
  
  <!-- Clean water drop -->
  <g transform="translate(420,145)">
    <path d="M0,-12 Q-8,0 0,8 Q8,0 0,-12 Z" fill="#42A5F5"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">OK</text>
  </g>

  <!-- Arrow -->
  <line x1="390" y1="155" x2="410" y2="148" stroke="#2E7D32" stroke-width="1.5" marker-end="none"/>
  <polygon points="410,148 405,145 406,152" fill="#2E7D32"/>

  <!-- Bottom right panel: Water split comparison -->
  <rect x="330" y="205" width="140" height="90" rx="5" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="220" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">ГРЯЗНАЯ vs ЧИСТАЯ</text>

  <!-- Dirty water drop (large) -->
  <g transform="translate(365,255)">
    <path d="M0,-20 Q-14,0 0,14 Q14,0 0,-20 Z" fill="#795548" stroke="#5D4037" stroke-width="1"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">X</text>
    <!-- Bubbles in dirty water -->
    <circle cx="-3" cy="-5" r="2" fill="#8D6E63"/>
    <circle cx="4" cy="-8" r="1.5" fill="#6D4C41"/>
  </g>

  <!-- VS -->
  <text x="400" y="260" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">vs</text>

  <!-- Clean water drop (large) -->
  <g transform="translate(435,255)">
    <path d="M0,-20 Q-14,0 0,14 Q14,0 0,-20 Z" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
    <!-- Shine -->
    <path d="M-3,-12 Q-6,-4 -3,0" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Bubbles -->
    <circle cx="-2" cy="-3" r="2" fill="white" opacity="0.4"/>
    <circle cx="4" cy="-7" r="1.5" fill="white" opacity="0.3"/>
  </g>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Загрязнение воды</text>
</svg>