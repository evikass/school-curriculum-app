<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#BDBDBD" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Виды загрязнения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Panel 1: Air Pollution (top-left) -->
  <rect x="30" y="90" width="105" height="95" rx="5" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="82" y="105" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">ВОЗДУХ</text>
  <!-- Factory chimney -->
  <rect x="42" y="130" width="30" height="45" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <rect x="50" y="115" width="14" height="20" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Smoke clouds with X -->
  <ellipse cx="57" cy="108" rx="12" ry="7" fill="#BDBDBD" opacity="0.6"/>
  <text x="57" y="112" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">X</text>
  <ellipse cx="68" cy="100" rx="9" ry="5" fill="#BDBDBD" opacity="0.4"/>
  <text x="68" y="103" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">X</text>
  <!-- Car exhaust -->
  <rect x="75" y="160" width="22" height="12" rx="3" fill="#757575"/>
  <circle cx="80" cy="173" r="3" fill="#5D4037"/>
  <circle cx="92" cy="173" r="3" fill="#5D4037"/>
  <path d="M97,164 Q103,164 105,168" stroke="#BDBDBD" stroke-width="2" fill="none"/>
  <text x="104" y="166" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">X</text>

  <!-- Panel 2: Water Pollution (top-center) -->
  <rect x="145" y="90" width="105" height="95" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="197" y="105" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">ВОДА</text>
  <!-- Water waves -->
  <path d="M150,160 Q160,150 170,160 Q180,170 190,160 Q200,150 210,160 Q220,170 230,160 Q240,150 245,160" stroke="#1565C0" stroke-width="1.5" fill="none"/>
  <path d="M150,170 Q160,160 170,170 Q180,180 190,170 Q200,160 210,170 Q220,180 230,170 Q240,160 245,170" stroke="#1565C0" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Trash in water -->
  <rect x="165" y="148" width="8" height="10" fill="#F9A825" stroke="#F57F17" stroke-width="0.5"/>
  <circle cx="190" cy="155" r="5" fill="#757575"/>
  <polygon points="215,150 220,145 225,150" fill="#E53935"/>
  <!-- Skull warning -->
  <circle cx="197" cy="135" r="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="193" cy="133" r="2" fill="#1565C0"/>
  <circle cx="201" cy="133" r="2" fill="#1565C0"/>
  <path d="M192,139 Q197,143 202,139" stroke="#1565C0" stroke-width="1" fill="none"/>

  <!-- Panel 3: Soil Pollution (top-right) -->
  <rect x="260" y="90" width="105" height="95" rx="5" fill="white" stroke="#8D6E63" stroke-width="1.5" opacity="0.9"/>
  <text x="312" y="105" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#8D6E63" text-anchor="middle">ПОЧВА</text>
  <!-- Ground layers -->
  <rect x="265" y="155" width="95" height="8" fill="#A1887F" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="265" y="163" width="95" height="8" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5"/>
  <rect x="265" y="171" width="95" height="10" fill="#6D4C41" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Chemical drum -->
  <rect x="280" y="130" width="18" height="24" rx="2" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <text x="289" y="145" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">!</text>
  <!-- Dead plant -->
  <line x1="325" y1="155" x2="325" y2="125" stroke="#8D6E63" stroke-width="1.5"/>
  <line x1="325" y1="130" x2="320" y2="120" stroke="#8D6E63" stroke-width="1"/>
  <line x1="325" y1="135" x2="330" y2="125" stroke="#8D6E63" stroke-width="1"/>
  <!-- Warning triangle -->
  <polygon points="350,115 360,135 340,135" fill="none" stroke="#C62828" stroke-width="2"/>
  <text x="350" y="132" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">!</text>

  <!-- Panel 4: Noise Pollution (bottom-left area) -->
  <rect x="30" y="195" width="105" height="95" rx="5" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="82" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F9A825" text-anchor="middle">ШУМ</text>
  <!-- Speaker -->
  <rect x="55" y="240" width="18" height="25" rx="2" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  <polygon points="73,242 88,230 88,275 73,263" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  <!-- Sound waves -->
  <path d="M92,245 Q100,252 92,260" stroke="#F9A825" stroke-width="2" fill="none"/>
  <path d="M97,238 Q110,252 97,267" stroke="#F9A825" stroke-width="2" fill="none"/>
  <path d="M102,232 Q120,252 102,273" stroke="#F9A825" stroke-width="2" fill="none"/>
  <path d="M107,226 Q130,252 107,279" stroke="#F9A825" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Ear with X -->
  <ellipse cx="50" y="252" rx="8" ry="12" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="50" y="256" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">X</text>

  <!-- Central pollution summary -->
  <rect x="145" y="195" width="220" height="95" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="255" y="212" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ИСТОЧНИКИ ЗАГРЯЗНЕНИЯ</text>
  <!-- Large factory -->
  <rect x="160" y="240" width="50" height="40" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  <rect x="165" y="220" width="10" height="25" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <rect x="180" y="225" width="10" height="20" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <rect x="195" y="210" width="10" height="35" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Smoke from factory -->
  <ellipse cx="170" cy="215" rx="8" ry="5" fill="#BDBDBD" opacity="0.5"/>
  <ellipse cx="185" cy="220" rx="6" ry="4" fill="#BDBDBD" opacity="0.4"/>
  <ellipse cx="200" cy="205" rx="10" ry="6" fill="#BDBDBD" opacity="0.6"/>
  <ellipse cx="200" cy="195" rx="7" ry="4" fill="#BDBDBD" opacity="0.3"/>
  <!-- Car -->
  <rect x="220" y="260" width="30" height="15" rx="3" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <rect x="224" y="252" width="20" height="10" rx="2" fill="#90CAF9" stroke="#0D47A1" stroke-width="0.5"/>
  <circle cx="226" cy="276" r="4" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
  <circle cx="244" cy="276" r="4" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
  <!-- Exhaust pipe smoke -->
  <path d="M250,270 Q258,265 260,270 Q262,275 268,270" stroke="#BDBDBD" stroke-width="1.5" fill="none"/>

  <!-- Chemical drum in summary -->
  <rect x="280" y="250" width="16" height="22" rx="2" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <line x1="280" y1="258" x2="296" y2="258" stroke="#F57F17" stroke-width="0.5"/>
  <line x1="280" y1="264" x2="296" y2="264" stroke="#F57F17" stroke-width="0.5"/>
  <text x="288" y="256" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">CO</text>

  <!-- Arrows from panels to central -->
  <line x1="110" y1="155" x2="140" y2="230" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="197" y1="188" x2="220" y2="230" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="312" y1="188" x2="280" y2="230" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="110" y1="260" x2="140" y2="260" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Right side: green clean world -->
  <rect x="375" y="195" width="95" height="95" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="422" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ЗАЩИТИМ!</text>
  <!-- Tree -->
  <rect x="416" y="255" width="6" height="25" fill="#8D6E63"/>
  <circle cx="419" cy="240" r="18" fill="#43A047" opacity="0.8"/>
  <circle cx="410" cy="248" r="12" fill="#66BB6A" opacity="0.7"/>
  <circle cx="428" cy="245" r="14" fill="#2E7D32" opacity="0.6"/>
  <!-- Flower -->
  <line x1="393" y1="280" x2="393" y2="260" stroke="#43A047" stroke-width="1.5"/>
  <circle cx="393" cy="256" r="5" fill="#E53935"/>
  <circle cx="393" cy="256" r="2" fill="#F9A825"/>
  <!-- Clean checkmark -->
  <circle cx="448" cy="230" r="10" fill="#2E7D32"/>
  <path d="M443,230 L447,235 L454,224" stroke="white" stroke-width="2" fill="none"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Виды загрязнения</text>
</svg>