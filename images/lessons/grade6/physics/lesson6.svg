<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Сила</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Spring scale (Dynamometer) -->
  <rect x="35" y="95" width="130" height="130" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="100" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Динамометр</text>
  <!-- Hook at top -->
  <path d="M95,118 L95,115 Q95,112 98,112 L102,112 Q105,112 105,115 L105,118" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Body -->
  <rect x="90" y="118" width="20" height="70" rx="3" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Spring -->
  <path d="M95,125 Q100,128 95,131 Q90,134 95,137 Q100,140 95,143 Q90,146 95,149 Q100,152 95,155" fill="none" stroke="#78909C" stroke-width="1.2"/>
  <!-- Scale markings -->
  <line x1="112" y1="125" x2="118" y2="125" stroke="#333" stroke-width="0.8"/>
  <line x1="112" y1="135" x2="116" y2="135" stroke="#333" stroke-width="0.5"/>
  <line x1="112" y1="145" x2="118" y2="145" stroke="#333" stroke-width="0.8"/>
  <line x1="112" y1="155" x2="116" y2="155" stroke="#333" stroke-width="0.5"/>
  <line x1="112" y1="165" x2="118" y2="165" stroke="#333" stroke-width="0.8"/>
  <line x1="112" y1="175" x2="116" y2="175" stroke="#333" stroke-width="0.5"/>
  <text x="122" y="129" font-family="Arial,sans-serif" font-size="6" fill="#555">4Н</text>
  <text x="122" y="149" font-family="Arial,sans-serif" font-size="6" fill="#555">2Н</text>
  <text x="122" y="169" font-family="Arial,sans-serif" font-size="6" fill="#555">0</text>
  <!-- Pointer/indicator -->
  <polygon points="110,140 118,138 118,142" fill="#C62828"/>
  <!-- Hook at bottom -->
  <line x1="100" y1="188" x2="100" y2="195" stroke="#333" stroke-width="1.5"/>
  <path d="M96,195 Q96,200 100,200 Q104,200 104,195" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Weight hanging -->
  <rect x="92" y="200" width="16" height="16" rx="2" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <text x="100" y="212" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">1Н</text>
  <!-- Force arrow -->
  <line x1="80" y1="215" x2="80" y2="240" stroke="#C62828" stroke-width="2"/>
  <polygon points="80,240 76,233 84,233" fill="#C62828"/>
  <text x="72" y="232" font-family="Arial,sans-serif" font-size="8" fill="#C62828">F</text>

  <!-- Force as vector arrow diagram -->
  <rect x="180" y="95" width="140" height="130" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Сила - вектор</text>
  <!-- Object (box) -->
  <rect x="230" y="145" width="40" height="30" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="164" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">тело</text>
  <!-- Force arrow -->
  <line x1="270" y1="160" x2="310" y2="160" stroke="#C62828" stroke-width="3"/>
  <polygon points="310,160 300,153 300,167" fill="#C62828"/>
  <text x="290" y="153" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold">F</text>
  <!-- Direction note -->
  <text x="250" y="195" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Направление</text>
  <!-- Multiple forces -->
  <rect x="200" y="125" width="25" height="25" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <line x1="225" y1="137" x2="245" y2="137" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="245,137 240,133 240,141" fill="#2E7D32"/>
  <text x="235" y="132" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">F1</text>
  <rect x="280" y="125" width="25" height="25" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <line x1="280" y1="137" x2="260" y2="137" stroke="#E65100" stroke-width="2"/>
  <polygon points="260,137 265,133 265,141" fill="#E65100"/>
  <text x="268" y="132" font-family="Arial,sans-serif" font-size="7" fill="#E65100">F2</text>
  <text x="250" y="208" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Равнодействующая</text>

  <!-- Person pushing box -->
  <rect x="335" y="95" width="130" height="130" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="400" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Приложение силы</text>
  <!-- Floor -->
  <line x1="345" y1="210" x2="455" y2="210" stroke="#78909C" stroke-width="1.5"/>
  <!-- Box -->
  <rect x="385" y="170" width="50" height="40" rx="3" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/>
  <text x="410" y="195" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle">ящик</text>
  <!-- Person pushing -->
  <g transform="translate(358, 150)">
    <circle cx="5" cy="0" r="5" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="5" y1="5" x2="5" y2="30" stroke="#1565C0" stroke-width="2"/>
    <line x1="5" y1="10" x2="20" y2="18" stroke="#1565C0" stroke-width="2"/>
    <line x1="5" y1="10" x2="-5" y2="22" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="5" y1="30" x2="0" y2="55" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="5" y1="30" x2="10" y2="55" stroke="#1565C0" stroke-width="1.5"/>
  </g>
  <!-- Force arrow -->
  <line x1="378" y1="190" x2="385" y2="190" stroke="#C62828" stroke-width="2"/>
  <polygon points="385,190 380,187 380,193" fill="#C62828"/>
  <text x="370" y="185" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F</text>

  <!-- Tug of war -->
  <rect x="35" y="200" width="430" height="85" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Перетягивание каната</text>
  <!-- Rope -->
  <line x1="100" y1="250" x2="400" y2="250" stroke="#8D6E63" stroke-width="3"/>
  <!-- Left team -->
  <g transform="translate(80, 230)">
    <circle cx="0" cy="0" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.6"/>
    <line x1="0" y1="4" x2="0" y2="20" stroke="#C62828" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="12" y2="12" stroke="#C62828" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="-3" y2="32" stroke="#C62828" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="3" y2="32" stroke="#C62828" stroke-width="1.2"/>
  </g>
  <g transform="translate(60, 228)">
    <circle cx="0" cy="0" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.6"/>
    <line x1="0" y1="4" x2="0" y2="20" stroke="#C62828" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="15" y2="10" stroke="#C62828" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="-3" y2="32" stroke="#C62828" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="3" y2="32" stroke="#C62828" stroke-width="1.2"/>
  </g>
  <!-- Right team -->
  <g transform="translate(420, 230)">
    <circle cx="0" cy="0" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.6"/>
    <line x1="0" y1="4" x2="0" y2="20" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="-12" y2="12" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="-3" y2="32" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="3" y2="32" stroke="#1565C0" stroke-width="1.2"/>
  </g>
  <g transform="translate(440, 228)">
    <circle cx="0" cy="0" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.6"/>
    <line x1="0" y1="4" x2="0" y2="20" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="-15" y2="10" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="-3" y2="32" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="0" y1="20" x2="3" y2="32" stroke="#1565C0" stroke-width="1.2"/>
  </g>
  <!-- Force arrows -->
  <line x1="100" y1="242" x2="120" y2="242" stroke="#C62828" stroke-width="2"/>
  <polygon points="120,242 115,238 115,246" fill="#C62828"/>
  <text x="115" y="237" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F1</text>
  <line x1="400" y1="242" x2="380" y2="242" stroke="#1565C0" stroke-width="2"/>
  <polygon points="380,242 385,238 385,246" fill="#1565C0"/>
  <text x="385" y="237" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">F2</text>
  <!-- Flag in middle -->
  <line x1="250" y1="240" x2="250" y2="235" stroke="#F9A825" stroke-width="1.5"/>
  <rect x="250" y="232" width="15" height="8" rx="1" fill="#F9A825"/>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">F1 = F2 - равновесие</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Сила</text>
</svg>