<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Взаимодействие тел</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Scene 1: Two people pushing each other -->
  <rect x="35" y="95" width="145" height="95" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="107" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Действие = Противодействие</text>
  <!-- Person 1 (left) -->
  <g transform="translate(60, 120)">
    <circle cx="0" cy="0" r="5" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="0" y1="5" x2="0" y2="25" stroke="#C62828" stroke-width="2"/>
    <line x1="0" y1="10" x2="15" y2="12" stroke="#C62828" stroke-width="2"/>
    <line x1="0" y1="10" x2="-10" y2="20" stroke="#C62828" stroke-width="1.5"/>
    <line x1="0" y1="25" x2="-5" y2="40" stroke="#C62828" stroke-width="1.5"/>
    <line x1="0" y1="25" x2="5" y2="40" stroke="#C62828" stroke-width="1.5"/>
    <!-- Force arrow (pushing right) -->
    <line x1="16" y1="12" x2="35" y2="12" stroke="#C62828" stroke-width="2"/>
    <polygon points="35,12 29,8 29,16" fill="#C62828"/>
    <text x="25" y="7" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F1</text>
  </g>
  <!-- Person 2 (right) -->
  <g transform="translate(140, 120)">
    <circle cx="0" cy="0" r="5" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="0" y1="5" x2="0" y2="25" stroke="#1565C0" stroke-width="2"/>
    <line x1="0" y1="10" x2="-15" y2="12" stroke="#1565C0" stroke-width="2"/>
    <line x1="0" y1="10" x2="10" y2="20" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="25" x2="-5" y2="40" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="25" x2="5" y2="40" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Force arrow (pushing left) -->
    <line x1="-16" y1="12" x2="-35" y2="12" stroke="#1565C0" stroke-width="2"/>
    <polygon points="-35,12 -29,8 -29,16" fill="#1565C0"/>
    <text x="-25" y="7" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">F2</text>
  </g>
  <text x="107" y="182" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">F1 = -F2</text>

  <!-- Scene 2: Magnet and iron -->
  <rect x="190" y="95" width="120" height="95" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Магнит и железо</text>
  <!-- Magnet (horseshoe) -->
  <path d="M220,125 L220,165 Q220,175 230,175 L240,175 Q245,175 245,170 L245,125" fill="none" stroke="#C62828" stroke-width="4" stroke-linecap="round"/>
  <text x="222" y="138" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">N</text>
  <text x="230" y="138" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">S</text>
  <!-- Iron pieces attracted -->
  <rect x="260" y="140" width="8" height="4" rx="1" fill="#78909C" transform="rotate(-15,264,142)"/>
  <rect x="275" y="148" width="8" height="4" rx="1" fill="#78909C" transform="rotate(10,279,150)"/>
  <circle cx="270" cy="160" r="3" fill="#90A4AE"/>
  <rect x="268" y="170" width="10" height="5" rx="1" fill="#78909C"/>
  <!-- Attraction arrows -->
  <line x1="260" y1="142" x2="250" y2="142" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="275" y1="150" x2="248" y2="150" stroke="#C62828" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="250" y="185" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Притяжение</text>

  <!-- Scene 3: Bat hitting ball -->
  <rect x="320" y="95" width="145" height="95" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="392" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Бита и мяч</text>
  <!-- Bat -->
  <rect x="360" y="130" width="50" height="8" rx="4" fill="#8D6E63" transform="rotate(-30,385,134)"/>
  <rect x="340" y="128" width="18" height="12" rx="2" fill="#A1887F" transform="rotate(-30,349,134)"/>
  <!-- Ball -->
  <circle cx="400" cy="145" r="8" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- Stitching -->
  <path d="M396,140 Q400,143 404,140" fill="none" stroke="#C62828" stroke-width="0.5"/>
  <!-- Force arrow -->
  <line x1="410" y1="145" x2="445" y2="145" stroke="#C62828" stroke-width="2"/>
  <polygon points="445,145 439,141 439,149" fill="#C62828"/>
  <text x="425" y="140" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F</text>
  <text x="392" y="182" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Действие биты на мяч</text>

  <!-- Scene 4: Newton's cradle -->
  <rect x="35" y="200" width="210" height="85" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="140" y="215" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Шариковый маятник Ньютона</text>
  <!-- Frame -->
  <rect x="55" y="225" width="170" height="3" rx="1" fill="#7B1FA2"/>
  <rect x="60" y="225" width="3" height="40" fill="#7B1FA2"/>
  <rect x="217" y="225" width="3" height="40" fill="#7B1FA2"/>
  <!-- Strings and balls -->
  <!-- Ball 1 (swinging in) -->
  <line x1="90" y1="228" x2="82" y2="255" stroke="#888" stroke-width="0.8"/>
  <line x1="90" y1="228" x2="88" y2="255" stroke="#888" stroke-width="0.8"/>
  <circle cx="85" cy="262" r="7" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Ball 2 -->
  <line x1="120" y1="228" x2="117" y2="257" stroke="#888" stroke-width="0.8"/>
  <line x1="120" y1="228" x2="123" y2="257" stroke="#888" stroke-width="0.8"/>
  <circle cx="120" cy="265" r="7" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Ball 3 -->
  <line x1="140" y1="228" x2="140" y2="257" stroke="#888" stroke-width="0.8"/>
  <line x1="140" y1="228" x2="140" y2="257" stroke="#888" stroke-width="0.8"/>
  <circle cx="140" cy="265" r="7" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Ball 4 -->
  <line x1="160" y1="228" x2="157" y2="257" stroke="#888" stroke-width="0.8"/>
  <line x1="160" y1="228" x2="163" y2="257" stroke="#888" stroke-width="0.8"/>
  <circle cx="160" cy="265" r="7" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Ball 5 (swinging out) -->
  <line x1="190" y1="228" x2="198" y2="255" stroke="#888" stroke-width="0.8"/>
  <line x1="190" y1="228" x2="192" y2="255" stroke="#888" stroke-width="0.8"/>
  <circle cx="195" cy="262" r="7" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Motion arrows -->
  <line x1="75" y1="255" x2="72" y2="245" stroke="#C62828" stroke-width="1"/>
  <polygon points="72,245 69,251 75,251" fill="#C62828"/>
  <line x1="205" y1="255" x2="208" y2="245" stroke="#C62828" stroke-width="1"/>
  <polygon points="208,245 205,251 211,251" fill="#C62828"/>

  <!-- Key concept -->
  <rect x="255" y="200" width="210" height="85" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="360" y="218" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">3-й закон Ньютона</text>
  <text x="360" y="236" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">F1 = -F2</text>
  <text x="360" y="254" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Силы возникают парами:</text>
  <text x="360" y="268" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">равны по величине,</text>
  <text x="360" y="280" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">противоположны по направлению</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Взаимодействие тел</text>
</svg>