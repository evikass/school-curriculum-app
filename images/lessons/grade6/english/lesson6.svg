<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Can / Can't for Abilities</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Иностранный язык - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- CAN column header -->
  <rect x="30" y="85" width="215" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="137" y="102" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">CAN</text>

  <!-- CAN'T column header -->
  <rect x="255" y="85" width="215" height="24" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
  <text x="362" y="102" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">CAN'T</text>

  <!-- CAN: swim -->
  <g transform="translate(30, 118)">
    <rect x="0" y="0" width="215" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.8"/>
    <!-- Swimmer icon -->
    <circle cx="30" cy="22" r="7" fill="#FFCC80"/>
    <line x1="37" y1="22" x2="52" y2="18" stroke="#2E7D32" stroke-width="2"/>
    <path d="M23,28 L37,22" stroke="#2E7D32" stroke-width="2"/>
    <line x1="37" y1="22" x2="42" y2="32" stroke="#37474F" stroke-width="1.5"/>
    <line x1="30" y1="32" x2="25" y2="40" stroke="#37474F" stroke-width="1.5"/>
    <!-- Water -->
    <path d="M15,42 Q25,38 35,42 Q45,46 55,42" fill="none" stroke="#4DD0E1" stroke-width="1"/>
    <!-- Text -->
    <text x="80" y="28" font-family="Arial,sans-serif" font-size="14" fill="#333" text-anchor="start" font-weight="bold">swim</text>
    <!-- Green checkmark -->
    <circle cx="190" cy="28" r="14" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <path d="M183,28 L188,33 L198,22" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CAN: cook -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="215" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.8"/>
    <!-- Cooking icon - pan -->
    <ellipse cx="30" cy="30" rx="14" ry="6" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <rect x="44" y="28" width="12" height="3" rx="1" fill="#546E7A"/>
    <!-- Steam -->
    <path d="M24,22 Q22,16 26,12" fill="none" stroke="#BDBDBD" stroke-width="1" opacity="0.6"/>
    <path d="M30,20 Q28,14 32,10" fill="none" stroke="#BDBDBD" stroke-width="1" opacity="0.6"/>
    <path d="M36,22 Q34,16 38,12" fill="none" stroke="#BDBDBD" stroke-width="1" opacity="0.6"/>
    <!-- Text -->
    <text x="80" y="33" font-family="Arial,sans-serif" font-size="14" fill="#333" text-anchor="start" font-weight="bold">cook</text>
    <!-- Green checkmark -->
    <circle cx="190" cy="28" r="14" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <path d="M183,28 L188,33 L198,22" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CAN: ride a bike -->
  <g transform="translate(30, 242)">
    <rect x="0" y="0" width="215" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.8"/>
    <!-- Bike icon -->
    <circle cx="22" cy="35" r="8" fill="none" stroke="#555" stroke-width="1.2"/>
    <circle cx="42" cy="35" r="8" fill="none" stroke="#555" stroke-width="1.2"/>
    <line x1="22" y1="35" x2="32" y2="22" stroke="#E65100" stroke-width="1.5"/>
    <line x1="32" y1="22" x2="42" y2="35" stroke="#E65100" stroke-width="1.5"/>
    <line x1="22" y1="35" x2="42" y2="35" stroke="#E65100" stroke-width="1"/>
    <circle cx="32" cy="16" r="4" fill="#FFCC80"/>
    <!-- Text -->
    <text x="80" y="33" font-family="Arial,sans-serif" font-size="14" fill="#333" text-anchor="start" font-weight="bold">ride a bike</text>
    <!-- Green checkmark -->
    <circle cx="190" cy="28" r="14" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <path d="M183,28 L188,33 L198,22" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CAN'T: fly -->
  <g transform="translate(255, 118)">
    <rect x="0" y="0" width="215" height="55" rx="5" fill="white" stroke="#C62828" stroke-width="1" opacity="0.8"/>
    <!-- Flying person icon -->
    <circle cx="30" cy="18" r="6" fill="#FFCC80"/>
    <!-- Outstretched arms trying to fly -->
    <line x1="22" y1="24" x2="10" y2="16" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
    <line x1="38" y1="24" x2="50" y2="16" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
    <rect x="26" y="24" width="8" height="12" rx="2" fill="#C62828" opacity="0.5"/>
    <!-- X marks (can't fly) -->
    <line x1="8" y1="12" x2="14" y2="20" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <line x1="14" y1="12" x2="8" y2="20" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <line x1="46" y1="12" x2="52" y2="20" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <line x1="52" y1="12" x2="46" y2="20" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <!-- Text -->
    <text x="80" y="33" font-family="Arial,sans-serif" font-size="14" fill="#333" text-anchor="start" font-weight="bold">fly</text>
    <!-- Red X mark -->
    <circle cx="190" cy="28" r="14" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <line x1="182" y1="20" x2="198" y2="36" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="198" y1="20" x2="182" y2="36" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- CAN'T: drive -->
  <g transform="translate(255, 180)">
    <rect x="0" y="0" width="215" height="55" rx="5" fill="white" stroke="#C62828" stroke-width="1" opacity="0.8"/>
    <!-- Car icon -->
    <rect x="14" y="24" width="32" height="14" rx="4" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
    <rect x="20" y="16" width="22" height="10" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
    <circle cx="22" cy="40" r="4" fill="#333"/>
    <circle cx="38" cy="40" r="4" fill="#333"/>
    <!-- Prohibited sign over car -->
    <circle cx="30" cy="28" r="16" fill="none" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <line x1="18" y1="16" x2="42" y2="40" stroke="#C62828" stroke-width="1.5" opacity="0.4"/>
    <!-- Text -->
    <text x="80" y="33" font-family="Arial,sans-serif" font-size="14" fill="#333" text-anchor="start" font-weight="bold">drive</text>
    <!-- Red X mark -->
    <circle cx="190" cy="28" r="14" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <line x1="182" y1="20" x2="198" y2="36" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="198" y1="20" x2="182" y2="36" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- CAN'T: speak Chinese -->
  <g transform="translate(255, 242)">
    <rect x="0" y="0" width="215" height="55" rx="5" fill="white" stroke="#C62828" stroke-width="1" opacity="0.8"/>
    <!-- Speech bubble with Chinese characters -->
    <circle cx="28" cy="22" r="6" fill="#FFCC80"/>
    <rect x="14" y="8" width="30" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1"/>
    <text x="29" y="21" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">&#20013;&#25991;</text>
    <!-- X over speech bubble -->
    <line x1="14" y1="8" x2="44" y2="26" stroke="#C62828" stroke-width="1" opacity="0.3"/>
    <line x1="44" y1="8" x2="14" y2="26" stroke="#C62828" stroke-width="1" opacity="0.3"/>
    <!-- Text -->
    <text x="80" y="25" font-family="Arial,sans-serif" font-size="12" fill="#333" text-anchor="start" font-weight="bold">speak Chinese</text>
    <!-- Red X mark -->
    <circle cx="190" cy="28" r="14" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <line x1="182" y1="20" x2="198" y2="36" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="198" y1="20" x2="182" y2="36" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Can / Can't for Abilities</text>
</svg>