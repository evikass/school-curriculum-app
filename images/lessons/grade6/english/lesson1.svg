<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Family Members</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Иностранный язык - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Family Tree Structure -->
  <!-- Grandparents Row -->
  <!-- Grandfather silhouette -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="70" height="70" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="35" cy="20" r="10" fill="#8D6E63"/>
    <rect x="27" y="30" width="16" height="25" rx="4" fill="#5D4037"/>
    <rect x="22" y="32" width="26" height="12" rx="3" fill="#6D4C41"/>
    <line x1="22" y1="44" x2="48" y2="44" stroke="#4E342E" stroke-width="1"/>
    <rect x="27" y="45" width="6" height="15" rx="2" fill="#4E342E"/>
    <rect x="37" y="45" width="6" height="15" rx="2" fill="#4E342E"/>
    <!-- Walking stick -->
    <line x1="50" y1="30" x2="52" y2="60" stroke="#795548" stroke-width="1.5"/>
    <text x="35" y="68" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">grandfather</text>
  </g>
  <!-- Grandmother silhouette -->
  <g transform="translate(370, 100)">
    <rect x="0" y="0" width="70" height="70" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
    <circle cx="35" cy="20" r="10" fill="#BCAAA4"/>
    <rect x="27" y="30" width="16" height="25" rx="4" fill="#AD1457"/>
    <ellipse cx="35" cy="18" rx="13" ry="6" fill="#D7CCC8"/>
    <rect x="28" y="45" width="5" height="15" rx="2" fill="#AD1457"/>
    <rect x="37" y="45" width="5" height="15" rx="2" fill="#AD1457"/>
    <text x="35" y="68" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">grandmother</text>
  </g>

  <!-- Tree lines from grandparents -->
  <line x1="130" y1="130" x2="200" y2="150" stroke="#8D6E63" stroke-width="1.5" opacity="0.5"/>
  <line x1="370" y1="130" x2="300" y2="150" stroke="#8D6E63" stroke-width="1.5" opacity="0.5"/>

  <!-- Parents Row -->
  <!-- Father silhouette -->
  <g transform="translate(165, 150)">
    <rect x="0" y="0" width="70" height="70" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <circle cx="35" cy="20" r="10" fill="#FFCC80"/>
    <rect x="27" y="30" width="16" height="25" rx="4" fill="#1565C0"/>
    <rect x="22" y="32" width="26" height="12" rx="3" fill="#1976D2"/>
    <line x1="30" y1="20" x2="40" y2="20" stroke="#5D4037" stroke-width="2"/>
    <rect x="27" y="45" width="6" height="15" rx="2" fill="#0D47A1"/>
    <rect x="37" y="45" width="6" height="15" rx="2" fill="#0D47A1"/>
    <text x="35" y="68" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">father</text>
  </g>
  <!-- Mother silhouette -->
  <g transform="translate(265, 150)">
    <rect x="0" y="0" width="70" height="70" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
    <circle cx="35" cy="20" r="10" fill="#FFCC80"/>
    <path d="M25,30 Q25,25 35,25 Q45,25 45,30 L47,50 Q47,55 35,55 Q23,55 23,50 Z" fill="#7B1FA2"/>
    <ellipse cx="35" cy="17" rx="13" ry="5" fill="#5D4037"/>
    <rect x="28" y="45" width="5" height="15" rx="2" fill="#6A1B9A"/>
    <rect x="37" y="45" width="5" height="15" rx="2" fill="#6A1B9A"/>
    <text x="35" y="68" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">mother</text>
  </g>

  <!-- Tree lines from parents to children -->
  <line x1="215" y1="185" x2="250" y2="225" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
  <line x1="285" y1="185" x2="250" y2="225" stroke="#7B1FA2" stroke-width="1.5" opacity="0.5"/>

  <!-- Children Row -->
  <!-- Brother silhouette -->
  <g transform="translate(160, 225)">
    <rect x="0" y="0" width="70" height="65" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <circle cx="35" cy="18" r="9" fill="#FFCC80"/>
    <rect x="28" y="27" width="14" height="22" rx="3" fill="#2E7D32"/>
    <rect x="24" y="29" width="22" height="10" rx="2" fill="#388E3C"/>
    <rect x="28" y="40" width="5" height="14" rx="2" fill="#1B5E20"/>
    <rect x="37" y="40" width="5" height="14" rx="2" fill="#1B5E20"/>
    <text x="35" y="63" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">brother</text>
  </g>
  <!-- Sister silhouette -->
  <g transform="translate(270, 225)">
    <rect x="0" y="0" width="70" height="65" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
    <circle cx="35" cy="18" r="9" fill="#FFCC80"/>
    <path d="M26,27 Q26,23 35,23 Q44,23 44,27 L45,42 Q45,47 35,47 Q25,47 25,42 Z" fill="#F9A825"/>
    <ellipse cx="35" cy="15" rx="11" ry="4" fill="#5D4037"/>
    <rect x="29" y="39" width="4" height="14" rx="2" fill="#F57F17"/>
    <rect x="37" y="39" width="4" height="14" rx="2" fill="#F57F17"/>
    <text x="35" y="63" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle" font-weight="bold">sister</text>
  </g>

  <!-- Speech bubbles with vocabulary -->
  <g transform="translate(145, 88)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1" opacity="0.9"/>
    <text x="25" y="13" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">uncle</text>
  </g>
  <g transform="translate(305, 88)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="white" stroke="#C62828" stroke-width="1" opacity="0.9"/>
    <text x="25" y="13" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">aunt</text>
  </g>
  <g transform="translate(355, 188)">
    <rect x="0" y="0" width="58" height="18" rx="9" fill="white" stroke="#1565C0" stroke-width="1" opacity="0.9"/>
    <text x="29" y="13" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">cousin</text>
  </g>
  <g transform="translate(90, 188)">
    <rect x="0" y="0" width="58" height="18" rx="9" fill="white" stroke="#1565C0" stroke-width="1" opacity="0.9"/>
    <text x="29" y="13" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">nephew</text>
  </g>

  <!-- Heart decoration -->
  <path d="M250,210 l-6,-6 a6,6 0 0,1 0,-8 a6,6 0 0,1 12,0 a6,6 0 0,1 0,8 Z" fill="#C62828" opacity="0.15"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Family Members</text>
</svg>