<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение и работа мышц</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 13</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Muscle Hierarchy (top section) -->
<g transform="translate(250,95)">
  <rect x="-220" y="-30" width="440" height="55" rx="5" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Иерархия строения мышцы</text>

  <!-- Мышца -->
  <g transform="translate(-170,5)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#EF5350" opacity="0.2" stroke="#C62828" stroke-width="1"/>
    <path d="M-20,-6 Q-15,-10 -10,-6 Q-5,-10 0,-6 Q5,-10 10,-6 Q15,-10 20,-6 L20,6 Q15,10 10,6 Q5,10 0,6 Q-5,10 -10,6 Q-15,10 -20,6 Z" fill="#EF5350" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>
    <text x="0" y="2" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Мышца</text>
  </g>

  <!-- Arrow -->
  <text x="-115" y="8" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">→</text>

  <!-- Мышечный пучок -->
  <g transform="translate(-65,5)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#FF7043" opacity="0.2" stroke="#D84315" stroke-width="1"/>
    <ellipse cx="-10" cy="0" rx="5" ry="8" fill="#FF7043" opacity="0.3" stroke="#D84315" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="#FF7043" opacity="0.3" stroke="#D84315" stroke-width="0.5"/>
    <ellipse cx="10" cy="0" rx="5" ry="8" fill="#FF7043" opacity="0.3" stroke="#D84315" stroke-width="0.5"/>
    <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#D84315" text-anchor="middle" font-weight="bold">Пучок</text>
  </g>

  <!-- Arrow -->
  <text x="-10" y="8" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">→</text>

  <!-- Мышечное волокно -->
  <g transform="translate(40,5)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#FF8A65" opacity="0.2" stroke="#BF360C" stroke-width="1"/>
    <rect x="-22" y="-7" width="44" height="14" rx="3" fill="#FF8A65" opacity="0.3" stroke="#BF360C" stroke-width="0.5"/>
    <line x1="-15" y1="-7" x2="-15" y2="7" stroke="#BF360C" stroke-width="0.3"/>
    <line x1="-8" y1="-7" x2="-8" y2="7" stroke="#BF360C" stroke-width="0.3"/>
    <line x1="-1" y1="-7" x2="-1" y2="7" stroke="#BF360C" stroke-width="0.3"/>
    <line x1="6" y1="-7" x2="6" y2="7" stroke="#BF360C" stroke-width="0.3"/>
    <line x1="13" y1="-7" x2="13" y2="7" stroke="#BF360C" stroke-width="0.3"/>
    <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle" font-weight="bold">Волокно</text>
  </g>

  <!-- Arrow -->
  <text x="95" y="8" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">→</text>

  <!-- Миофибрилла -->
  <g transform="translate(145,5)">
    <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#FFAB91" opacity="0.2" stroke="#8D6E63" stroke-width="1"/>
    <rect x="-24" y="-6" width="48" height="12" rx="2" fill="none" stroke="#8D6E63" stroke-width="0.5"/>
    <rect x="-22" y="-4" width="8" height="8" rx="1" fill="#EF9A9A" opacity="0.6"/>
    <rect x="-12" y="-4" width="8" height="8" rx="1" fill="#EF9A9A" opacity="0.6"/>
    <rect x="-2" y="-4" width="8" height="8" rx="1" fill="#EF9A9A" opacity="0.6"/>
    <rect x="8" y="-4" width="8" height="8" rx="1" fill="#EF9A9A" opacity="0.6"/>
    <rect x="18" y="-4" width="4" height="8" rx="1" fill="#EF9A9A" opacity="0.6"/>
    <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63" text-anchor="middle" font-weight="bold">Миофибрилла</text>
  </g>
</g>

<!-- Sarcomere Detail (center left) -->
<g transform="translate(155,195)">
  <rect x="-115" y="-60" width="230" height="120" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="-48" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Саркомер (единица сокращения)</text>
  <line x1="-105" y1="-42" x2="105" y2="-42" stroke="#A5D6A7" stroke-width="0.5"/>

  <!-- Z-lines -->
  <line x1="-90" y1="-30" x2="-90" y2="35" stroke="#37474F" stroke-width="2"/>
  <text x="-90" y="45" font-family="Arial,sans-serif" font-size="6" fill="#37474F" text-anchor="middle" font-weight="bold">Z-линия</text>
  <line x1="90" y1="-30" x2="90" y2="35" stroke="#37474F" stroke-width="2"/>
  <text x="90" y="45" font-family="Arial,sans-serif" font-size="6" fill="#37474F" text-anchor="middle" font-weight="bold">Z-линия</text>

  <!-- A-band (actin + myosin overlap) -->
  <rect x="-60" y="-25" width="120" height="50" rx="2" fill="#BBDEFB" opacity="0.3" stroke="#1565C0" stroke-width="0.8"/>
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">А-диск</text>

  <!-- I-band (actin only) -->
  <rect x="-90" y="-25" width="30" height="50" rx="2" fill="#FFCDD2" opacity="0.3" stroke="#C62828" stroke-width="0.8"/>
  <text x="-75" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">I-диск</text>
  <rect x="60" y="-25" width="30" height="50" rx="2" fill="#FFCDD2" opacity="0.3" stroke="#C62828" stroke-width="0.8"/>

  <!-- Myosin (thick filaments) - blue -->
  <g>
    <rect x="-50" y="-12" width="100" height="5" rx="2" fill="#5C6BC0" opacity="0.7" stroke="#283593" stroke-width="0.5"/>
    <rect x="-50" y="5" width="100" height="5" rx="2" fill="#5C6BC0" opacity="0.7" stroke="#283593" stroke-width="0.5"/>
    <rect x="-50" y="-3" width="100" height="5" rx="2" fill="#5C6BC0" opacity="0.5" stroke="#283593" stroke-width="0.5"/>
  </g>

  <!-- Actin (thin filaments) - red -->
  <g>
    <rect x="-85" y="-10" width="70" height="3" rx="1" fill="#EF5350" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <rect x="15" y="-10" width="70" height="3" rx="1" fill="#EF5350" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <rect x="-85" y="7" width="70" height="3" rx="1" fill="#EF5350" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <rect x="15" y="7" width="70" height="3" rx="1" fill="#EF5350" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <rect x="-85" y="-1" width="70" height="3" rx="1" fill="#EF5350" opacity="0.5" stroke="#C62828" stroke-width="0.5"/>
    <rect x="15" y="-1" width="70" height="3" rx="1" fill="#EF5350" opacity="0.5" stroke="#C62828" stroke-width="0.5"/>
  </g>

  <!-- H-zone (myosin only) -->
  <rect x="-15" y="-25" width="30" height="50" rx="1" fill="none" stroke="#FFB300" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">H-зона</text>

  <!-- Legend -->
  <rect x="60" y="-42" width="50" height="8" rx="1" fill="#EF5350" opacity="0.5"/>
  <text x="85" y="-36" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Актин</text>
  <rect x="60" y="-52" width="50" height="8" rx="1" fill="#5C6BC0" opacity="0.5"/>
  <text x="85" y="-46" font-family="Arial,sans-serif" font-size="5" fill="#283593" text-anchor="middle">Миозин</text>
</g>

<!-- Sliding filament mechanism (right side) -->
<g transform="translate(380,195)">
  <rect x="-65" y="-60" width="130" height="120" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="-48" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Скольжение нитей</text>
  <line x1="-55" y1="-42" x2="55" y2="-42" stroke="#A5D6A7" stroke-width="0.5"/>

  <!-- Relaxed state -->
  <text x="0" y="-30" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Расслабление</text>
  <!-- Z-lines relaxed -->
  <line x1="-45" y1="-22" x2="-45" y2="0" stroke="#37474F" stroke-width="1.5"/>
  <line x1="45" y1="-22" x2="45" y2="0" stroke="#37474F" stroke-width="1.5"/>
  <!-- Myosin relaxed -->
  <rect x="-20" y="-18" width="40" height="4" rx="1" fill="#5C6BC0" opacity="0.6"/>
  <!-- Actin relaxed -->
  <rect x="-42" y="-15" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="7" y="-15" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="-42" y="-8" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="7" y="-8" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="-20" y="-12" width="40" height="4" rx="1" fill="#5C6BC0" opacity="0.6"/>

  <!-- Arrow down -->
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">↓</text>

  <!-- Contracted state -->
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Сокращение</text>
  <!-- Z-lines contracted (closer) -->
  <line x1="-30" y1="26" x2="-30" y2="50" stroke="#37474F" stroke-width="1.5"/>
  <line x1="30" y1="26" x2="30" y2="50" stroke="#37474F" stroke-width="1.5"/>
  <!-- Myosin contracted -->
  <rect x="-20" y="34" width="40" height="4" rx="1" fill="#5C6BC0" opacity="0.6"/>
  <rect x="-20" y="40" width="40" height="4" rx="1" fill="#5C6BC0" opacity="0.6"/>
  <!-- Actin contracted (more overlap) -->
  <rect x="-28" y="31" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="-7" y="31" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="-28" y="44" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
  <rect x="-7" y="44" width="35" height="2.5" rx="1" fill="#EF5350" opacity="0.6"/>
</g>

<!-- Side panel: Types of muscle contraction -->
<g transform="translate(380,80)">
  <rect x="-65" y="-20" width="130" height="40" rx="4" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Типы сокращений</text>
  <line x1="-55" y1="-3" x2="55" y2="-3" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="0" y="6" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Изотоническое — длина ↓</text>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Изометрическое — натяжение ↑</text>
</g>

<!-- Bottom info panel -->
<g transform="translate(30,295)">
  <rect x="0" y="0" width="440" height="40" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="220" y="13" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Механизм сокращения: АТФ + Миозин → Актин-Миозиновый мостик → Нити скользят → Саркомер укорачивается</text>
  <line x1="10" y1="18" x2="430" y2="18" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="220" y="28" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Поперечнополосатые (скелетные, сердечная) — произвольное | Гладкие — непроизвольное</text>
  <text x="220" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">Сигнал: нервный импульс → мембрана → Ca²⁺ из саркоплазматического ретикулума → сокращение</text>
</g>

<rect x="10" y="340" width="480" height="8" rx="4" fill="#2E7D32" opacity="0.85"/>
</svg>