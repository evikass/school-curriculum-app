<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
  <linearGradient id="mapGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#A5D6A7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>

<!-- Title -->
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Расы человека. Человек как биологический вид</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 5</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Three race silhouettes across the top area -->

<!-- Race 1: Евразийская (Caucasoid) -->
<g transform="translate(85,110)">
  <!-- Head silhouette - narrow nose, thin lips, wavy hair -->
  <ellipse cx="0" cy="-20" rx="10" ry="12" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <!-- Wavy hair -->
  <path d="M-10,-25 Q-12,-35 -5,-38 Q0,-40 5,-38 Q12,-35 10,-25" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.6"/>
  <path d="M-8,-26 Q-4,-32 0,-30 Q4,-32 8,-26" fill="none" stroke="#8D6E63" stroke-width="0.4"/>
  <!-- Narrow nose -->
  <path d="M0,-18 L-1,-12 L1,-12Z" fill="none" stroke="#E65100" stroke-width="0.5"/>
  <!-- Thin lips -->
  <line x1="-3" y1="-8" x2="3" y2="-8" stroke="#E65100" stroke-width="0.5"/>
  <!-- Eyes -->
  <line x1="-5" y1="-18" x2="-3" y2="-18" stroke="#5D4037" stroke-width="0.6"/>
  <line x1="3" y1="-18" x2="5" y2="-18" stroke="#5D4037" stroke-width="0.6"/>
  <!-- Body -->
  <line x1="0" y1="-8" x2="0" y2="15" stroke="#E65100" stroke-width="2"/>
  <!-- Arms -->
  <line x1="0" y1="0" x2="-10" y2="10" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="10" y2="10" stroke="#E65100" stroke-width="1.5"/>
  <!-- Legs -->
  <line x1="0" y1="15" x2="-5" y2="30" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="15" x2="5" y2="30" stroke="#E65100" stroke-width="1.5"/>

  <!-- Label -->
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Евразийская</text>
  <text x="0" y="51" font-family="Arial,sans-serif" font-size="5.5" fill="#795548" text-anchor="middle">(Кавказоидная)</text>

  <!-- Features box -->
  <rect x="-42" y="56" width="84" height="36" rx="3" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="66" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Светлая кожа</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Узкий нос, тонкие губы</text>
  <text x="0" y="82" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Волнистые/прямые волосы</text>
  <text x="0" y="90" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Обильный волосяной покров</text>
</g>

<!-- Race 2: Экваториальная (Negroid) -->
<g transform="translate(250,110)">
  <!-- Head silhouette - broad nose, full lips, curly hair -->
  <ellipse cx="0" cy="-20" rx="10" ry="12" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Curly/coily hair -->
  <circle cx="-6" cy="-30" r="3" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <circle cx="-2" cy="-32" r="3" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <circle cx="2" cy="-32" r="3" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <circle cx="6" cy="-30" r="3" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <circle cx="-8" cy="-27" r="2.5" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <circle cx="8" cy="-27" r="2.5" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <circle cx="0" cy="-33" r="2.5" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  <!-- Broad nose -->
  <path d="M-4,-14 L-3,-10 L3,-10 L4,-14" fill="none" stroke="#5D4037" stroke-width="0.6"/>
  <!-- Full lips -->
  <ellipse cx="0" cy="-7" rx="4" ry="1.5" fill="#6D4C41" opacity="0.4" stroke="#5D4037" stroke-width="0.4"/>
  <!-- Eyes -->
  <line x1="-5" y1="-18" x2="-3" y2="-18" stroke="#3E2723" stroke-width="0.6"/>
  <line x1="3" y1="-18" x2="5" y2="-18" stroke="#3E2723" stroke-width="0.6"/>
  <!-- Body -->
  <line x1="0" y1="-8" x2="0" y2="15" stroke="#5D4037" stroke-width="2"/>
  <line x1="0" y1="0" x2="-10" y2="10" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="10" y2="10" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="0" y1="15" x2="-5" y2="30" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="0" y1="15" x2="5" y2="30" stroke="#5D4037" stroke-width="1.5"/>

  <text x="0" y="42" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Экваториальная</text>
  <text x="0" y="51" font-family="Arial,sans-serif" font-size="5.5" fill="#795548" text-anchor="middle">(Негроидная)</text>

  <rect x="-42" y="56" width="84" height="36" rx="3" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="66" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Тёмная кожа (меланин)</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Широкий нос, толстые губы</text>
  <text x="0" y="82" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Курчавые волосы</text>
  <text x="0" y="90" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Удлинённый череп</text>
</g>

<!-- Race 3: Азиатско-американская (Mongoloid) -->
<g transform="translate(415,110)">
  <!-- Head silhouette - epicanthic fold, flat face, straight hair -->
  <ellipse cx="0" cy="-20" rx="10" ry="12" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <!-- Straight black hair -->
  <path d="M-10,-25 Q-12,-35 -5,-38 Q0,-40 5,-38 Q12,-35 10,-25" fill="#3E2723" stroke="#1B5E20" stroke-width="0.4"/>
  <rect x="-11" y="-30" width="22" height="15" rx="2" fill="#3E2723" opacity="0.7"/>
  <!-- Epicanthic fold (eye shape) -->
  <path d="M-6,-18 Q-4,-20 -2,-18" fill="none" stroke="#5D4037" stroke-width="0.6"/>
  <path d="M2,-18 Q4,-20 6,-18" fill="none" stroke="#5D4037" stroke-width="0.6"/>
  <!-- Flat nose bridge -->
  <path d="M0,-16 L0,-12" stroke="#E65100" stroke-width="0.5"/>
  <path d="M-2,-12 L2,-12" stroke="#E65100" stroke-width="0.5"/>
  <!-- Medium lips -->
  <line x1="-3" y1="-8" x2="3" y2="-8" stroke="#E65100" stroke-width="0.6"/>
  <!-- Prominent cheekbones -->
  <ellipse cx="-8" cy="-14" rx="3" ry="2" fill="#FFE0B2" stroke="#E65100" stroke-width="0.3"/>
  <ellipse cx="8" cy="-14" rx="3" ry="2" fill="#FFE0B2" stroke="#E65100" stroke-width="0.3"/>
  <!-- Body -->
  <line x1="0" y1="-8" x2="0" y2="15" stroke="#E65100" stroke-width="2"/>
  <line x1="0" y1="0" x2="-10" y2="10" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="10" y2="10" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="15" x2="-5" y2="30" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="15" x2="5" y2="30" stroke="#E65100" stroke-width="1.5"/>

  <text x="0" y="42" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Азиатско-</text>
  <text x="0" y="51" font-family="Arial,sans-serif" font-size="5.5" fill="#795548" text-anchor="middle">американская (Монголоидная)</text>

  <rect x="-42" y="56" width="84" height="36" rx="3" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="66" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Жёлтоватая кожа</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Эпикант, плоское лицо</text>
  <text x="0" y="82" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Прямые чёрные волосы</text>
  <text x="0" y="90" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">• Выступающие скулы</text>
</g>

<!-- Simplified world map outline showing race distribution -->
<g transform="translate(25,190)">
  <rect x="0" y="0" width="250" height="70" rx="5" fill="url(#mapGrad)" opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
  <text x="125" y="12" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Географическое распределение рас</text>

  <!-- Simplified continents -->
  <!-- Europe -->
  <ellipse cx="90" cy="30" rx="12" ry="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.6"/>
  <!-- Asia -->
  <ellipse cx="140" cy="28" rx="25" ry="14" fill="#FFF8E1" stroke="#FF9800" stroke-width="0.6"/>
  <!-- Africa -->
  <ellipse cx="100" cy="50" rx="14" ry="14" fill="#EFEBE9" stroke="#795548" stroke-width="0.6"/>
  <!-- Americas -->
  <ellipse cx="35" cy="32" rx="8" ry="20" fill="#FFF8E1" stroke="#FF9800" stroke-width="0.6"/>
  <!-- Australia -->
  <ellipse cx="200" cy="52" rx="10" ry="7" fill="#EFEBE9" stroke="#795548" stroke-width="0.6"/>

  <!-- Color legend for regions -->
  <rect x="215" y="18" width="6" height="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.4"/>
  <text x="225" y="24" font-family="Arial,sans-serif" font-size="5" fill="#333">Евразийская</text>
  <rect x="215" y="30" width="6" height="6" fill="#EFEBE9" stroke="#795548" stroke-width="0.4"/>
  <text x="225" y="36" font-family="Arial,sans-serif" font-size="5" fill="#333">Экваториальная</text>
  <rect x="215" y="42" width="6" height="6" fill="#FFF8E1" stroke="#FF9800" stroke-width="0.4"/>
  <text x="225" y="48" font-family="Arial,sans-serif" font-size="5" fill="#333">Азиатско-амер.</text>

  <!-- Connecting lines from races to map regions -->
  <text x="90" y="28" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">Европа</text>
  <text x="140" y="25" font-family="Arial,sans-serif" font-size="4" fill="#FF9800" text-anchor="middle">Азия</text>
  <text x="100" y="54" font-family="Arial,sans-serif" font-size="4" fill="#795548" text-anchor="middle">Африка</text>
  <text x="35" y="28" font-family="Arial,sans-serif" font-size="4" fill="#FF9800" text-anchor="middle">Америка</text>
</g>

<!-- Right panel: Unity of the human species -->
<g transform="translate(285,190)">
  <rect x="0" y="0" width="195" height="130" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <rect x="0" y="0" width="195" height="18" rx="5" fill="#2E7D32" opacity="0.15"/>
  <text x="97" y="13" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Один вид — Homo sapiens</text>

  <!-- Unity features -->
  <text x="10" y="30" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Общие признаки всех рас:</text>

  <circle cx="14" cy="42" r="2.5" fill="#4CAF50"/>
  <text x="22" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Одинаковый набор хромосом (2n=46)</text>

  <circle cx="14" cy="54" r="2.5" fill="#4CAF50"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Свободное скрещивание → плодовитое потомство</text>

  <circle cx="14" cy="66" r="2.5" fill="#4CAF50"/>
  <text x="22" y="68" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Одинаковый тип обмена веществ</text>

  <circle cx="14" cy="78" r="2.5" fill="#4CAF50"/>
  <text x="22" y="80" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Сходство эмбрионального развития</text>

  <circle cx="14" cy="90" r="2.5" fill="#4CAF50"/>
  <text x="22" y="92" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Способность к речи и абстрактному мышлению</text>

  <circle cx="14" cy="102" r="2.5" fill="#4CAF50"/>
  <text x="22" y="104" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Одинаковые группы крови (ABO, Rh)</text>

  <!-- Important conclusion -->
  <rect x="5" y="112" width="185" height="14" rx="2" fill="#2E7D32" opacity="0.1"/>
  <text x="97" y="122" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Расовые различия — адаптации к среде, не виды!</text>
</g>

<!-- Arrow showing adaptation concept -->
<g transform="translate(250,210)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle" font-style="italic">Адаптация к климату:</text>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="4.5" fill="#795548" text-anchor="middle">УФ-излучение → меланин → цвет кожи</text>
</g>

<!-- Footer bar -->
<rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Три основные расы — один биологический вид Homo sapiens</text>
</svg>