<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCCBC" stop-opacity="0.4"/><stop offset="100%" stop-color="#FFAB91" stop-opacity="0.3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Железы внешней, внутренней и смешанной секреции</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 48</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Human body silhouette -->
<g transform="translate(145,60)">
  <!-- Head -->
  <ellipse cx="0" cy="12" rx="12" ry="14" fill="url(#bodyGrad)" stroke="#8D6E63" stroke-width="1"/>
  <!-- Neck -->
  <rect x="-4" y="26" width="8" height="8" fill="url(#bodyGrad)" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Torso -->
  <path d="M-22,34 L-25,80 L-20,110 L20,110 L25,80 L22,34 Z" fill="url(#bodyGrad)" stroke="#8D6E63" stroke-width="1"/>
  <!-- Arms -->
  <path d="M-22,36 L-38,70 L-36,90" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M22,36 L38,70 L36,90" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M-15,110 L-18,160 L-16,175" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M15,110 L18,160 L16,175" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- ENDOCRINE GLANDS (on body) -->
  <!-- Pituitary (гипофиз) -->
  <circle cx="0" cy="8" r="3" fill="#7B1FA2" stroke="#4A148C" stroke-width="0.8"/>
  <line x1="3" y1="6" x2="20" y2="-5" stroke="#7B1FA2" stroke-width="0.6"/>
  <text x="22" y="-3" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" font-weight="bold">Гипофиз</text>
  
  <!-- Pineal (эпифиз) -->
  <circle cx="-2" cy="2" r="2.5" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
  <line x1="-4" y1="0" x2="-25" y2="-10" stroke="#9C27B0" stroke-width="0.6"/>
  <text x="-55" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0" font-weight="bold">Эпифиз</text>
  
  <!-- Thyroid (щитовидная) -->
  <ellipse cx="0" cy="34" rx="8" ry="4" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <line x1="8" y1="32" x2="30" y2="28" stroke="#FF9800" stroke-width="0.6"/>
  <text x="32" y="27" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" font-weight="bold">Щитовидная</text>
  
  <!-- Parathyroid (паращитовидные) -->
  <circle cx="-7" cy="36" r="1.5" fill="#FFB74D" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="7" cy="36" r="1.5" fill="#FFB74D" stroke="#E65100" stroke-width="0.5"/>
  <line x1="-8" y1="38" x2="-30" y2="42" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="-60" y="44" font-family="Arial,sans-serif" font-size="5" fill="#E65100" font-weight="bold">Паращитовидные</text>
  
  <!-- Adrenals (надпочечники) -->
  <ellipse cx="-12" cy="55" rx="4" ry="3" fill="#F44336" stroke="#B71C1C" stroke-width="0.8"/>
  <ellipse cx="12" cy="55" rx="4" ry="3" fill="#F44336" stroke="#B71C1C" stroke-width="0.8"/>
  <line x1="16" y1="53" x2="30" y2="50" stroke="#F44336" stroke-width="0.6"/>
  <text x="32" y="49" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C" font-weight="bold">Надпочечники</text>
  
  <!-- Pancreas (поджелудочная - MIXED) -->
  <ellipse cx="-5" cy="65" rx="10" ry="3" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8" transform="rotate(-10,-5,65)"/>
  <line x1="-14" y1="63" x2="-32" y2="58" stroke="#4CAF50" stroke-width="0.6"/>
  <text x="-60" y="57" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold">Поджелудочная</text>
  
  <!-- Gonads (половые - MIXED) -->
  <circle cx="0" cy="95" r="4" fill="#E91E63" stroke="#880E4F" stroke-width="0.8"/>
  <line x1="4" y1="93" x2="22" y2="90" stroke="#E91E63" stroke-width="0.6"/>
  <text x="24" y="89" font-family="Arial,sans-serif" font-size="5.5" fill="#880E4F" font-weight="bold">Половые железы</text>

  <!-- EXOCRINE GLANDS -->
  <!-- Salivary (слюнные) -->
  <circle cx="-10" cy="22" r="2" fill="#42A5F5" stroke="#1565C0" stroke-width="0.6"/>
  <circle cx="10" cy="22" r="2" fill="#42A5F5" stroke="#1565C0" stroke-width="0.6"/>
  <line x1="-12" y1="20" x2="-30" y2="14" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="-50" y="14" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Слюнные</text>
  
  <!-- Sweat glands (потовые) -->
  <circle cx="-28" cy="65" r="1.5" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5"/>
  <circle cx="-30" cy="80" r="1.5" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="-30" y1="82" x2="-40" y2="88" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="-62" y="90" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Потовые</text>
  
  <!-- Lacrimal (слёзные) -->
  <circle cx="-8" cy="10" r="1.5" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="-9" y1="8" x2="-15" y2="2" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="-28" y="2" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Слёзные</text>

  <!-- Gastric/intestinal (желудочные/кишечные) -->
  <ellipse cx="0" cy="75" rx="6" ry="8" fill="#42A5F5" fill-opacity="0.3" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="6" y1="75" x2="18" y2="75" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="20" y="74" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Желудочные</text>
  <text x="20" y="81" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Кишечные</text>
</g>

<!-- Legend: Gland types -->
<rect x="318" y="56" width="170" height="80" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="403" y="70" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Типы желёз</text>
<line x1="328" y1="75" x2="478" y2="75" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Exocrine -->
<rect x="328" y="80" width="10" height="10" fill="#42A5F5" rx="2"/>
<text x="342" y="88" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0" font-weight="bold">Внешней секреции</text>
<text x="342" y="96" font-family="Arial,sans-serif" font-size="5.5" fill="#555">→ проток → на поверхность</text>

<!-- Endocrine -->
<rect x="328" y="102" width="10" height="10" fill="#7B1FA2" rx="2"/>
<text x="342" y="110" font-family="Arial,sans-serif" font-size="6.5" fill="#7B1FA2" font-weight="bold">Внутренней секреции</text>
<text x="342" y="118" font-family="Arial,sans-serif" font-size="5.5" fill="#555">→ гормон → в кровь</text>

<!-- Mixed -->
<rect x="328" y="124" width="10" height="10" fill="#4CAF50" rx="2"/>
<text x="342" y="132" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Смешанной секреции</text>

<!-- Exocrine vs Endocrine comparison diagram -->
<rect x="30" y="248" width="215" height="72" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="137" y="262" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сравнение типов желёз</text>
<line x1="40" y1="267" x2="235" y2="267" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Exocrine gland -->
<text x="80" y="278" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Экзокринная</text>
<!-- Gland cells -->
<rect x="55" y="282" width="22" height="16" fill="#42A5F5" fill-opacity="0.4" stroke="#1565C0" stroke-width="0.8" rx="3"/>
<text x="66" y="293" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Клетки</text>
<!-- Duct -->
<rect x="77" y="288" width="25" height="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6" rx="1"/>
<text x="89" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0" text-anchor="middle">проток</text>
<!-- Surface -->
<rect x="102" y="282" width="15" height="16" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6" rx="2"/>
<text x="109" y="293" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">↓</text>
<text x="109" y="304" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Поверхность</text>

<!-- Endocrine gland -->
<text x="195" y="278" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Эндокринная</text>
<!-- Gland cells -->
<rect x="170" y="282" width="22" height="16" fill="#CE93D8" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="0.8" rx="3"/>
<text x="181" y="293" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">Клетки</text>
<!-- Blood vessel -->
<path d="M192,290 L210,290" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,1"/>
<circle cx="205" cy="286" r="2" fill="#E53935" fill-opacity="0.5"/>
<circle cx="210" cy="290" r="2" fill="#E53935" fill-opacity="0.5"/>
<circle cx="205" cy="294" r="2" fill="#E53935" fill-opacity="0.5"/>
<text x="200" y="304" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">→ Кровь</text>

<!-- Side panel: Hormone properties -->
<rect x="255" y="248" width="233" height="72" fill="white" fill-opacity="0.7" rx="6" stroke="#66BB6A" stroke-width="1"/>
<text x="371" y="262" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Свойства гормонов</text>
<line x1="265" y1="267" x2="478" y2="267" stroke="#A5D6A7" stroke-width="0.5"/>

<text x="270" y="280" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">1. Специфичность</text>
<text x="290" y="288" font-family="Arial,sans-serif" font-size="5.5" fill="#555">— действие на определённые клетки-мишени</text>

<text x="270" y="300" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">2. Дистантность</text>
<text x="290" y="308" font-family="Arial,sans-serif" font-size="5.5" fill="#555">— транспорт кровью к далёким органам</text>

<text x="270" y="316" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">3. Высокая активность</text>
<text x="290" y="316" font-family="Arial,sans-serif" font-size="5.5" fill="#555">— действуют в малых концентрациях</text>

<!-- Exocrine list on right -->
<rect x="318" y="140" width="170" height="105" fill="white" fill-opacity="0.7" rx="6" stroke="#42A5F5" stroke-width="1" stroke-opacity="0.5"/>
<text x="403" y="154" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Железы внешней секреции</text>
<line x1="328" y1="158" x2="478" y2="158" stroke="#90CAF9" stroke-width="0.5"/>
<text x="330" y="170" font-family="Arial,sans-serif" font-size="6" fill="#555">• Слюнные железы</text>
<text x="330" y="180" font-family="Arial,sans-serif" font-size="6" fill="#555">• Слёзные железы</text>
<text x="330" y="190" font-family="Arial,sans-serif" font-size="6" fill="#555">• Потовые железы</text>
<text x="330" y="200" font-family="Arial,sans-serif" font-size="6" fill="#555">• Сальные железы</text>
<text x="330" y="210" font-family="Arial,sans-serif" font-size="6" fill="#555">• Желудочные железы</text>
<text x="330" y="220" font-family="Arial,sans-serif" font-size="6" fill="#555">• Кишечные железы</text>
<text x="330" y="230" font-family="Arial,sans-serif" font-size="6" fill="#555">• Молочные железы</text>

<!-- Footer bar -->
<rect x="3" y="323" width="494" height="24" rx="0" fill="#2E7D32"/>
<rect x="3" y="340" width="494" height="7" rx="0 0 8 8" fill="#2E7D32"/>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Эндокринная система — система регуляции через гормоны, выделяемые в кровь</text>
</svg>