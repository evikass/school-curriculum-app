<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="lungGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCDD2"/>
      <stop offset="100%" style="stop-color:#EF9A9A"/>
    </linearGradient>
    <linearGradient id="tracheaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFAB91"/>
      <stop offset="100%" style="stop-color:#FF8A65"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Строение органов дыхания</text>
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 8 класс — Урок 21</text>
  <line x1="20" y1="40" x2="480" y2="40" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

  <!-- === MAIN RESPIRATORY SYSTEM DIAGRAM (left side) === -->

  <!-- Nose / Nasal cavity -->
  <path d="M130,55 L115,55 Q100,55 100,70 L100,90 Q100,100 110,100 L120,100 Q130,100 130,90 L130,70 L145,70 Q155,70 155,60 L155,55 Z" fill="#FFE0B2" stroke="#795548" stroke-width="1.2"/>
  <path d="M105,70 Q108,80 115,82 Q122,80 125,70" fill="none" stroke="#795548" stroke-width="0.8"/>
  <!-- Turbinate lines -->
  <path d="M108,75 Q115,78 122,75" fill="none" stroke="#A1887F" stroke-width="0.6"/>
  <text x="128" y="54" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Носовая полость</text>

  <!-- Nasopharynx -->
  <path d="M112,100 L112,118 Q112,125 120,125 L125,125 Q130,125 130,118 L130,100" fill="#FFCCBC" stroke="#795548" stroke-width="1"/>
  <text x="136" y="116" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Носоглотка</text>

  <!-- Larynx -->
  <path d="M108,125 L108,160 Q108,165 120,168 Q132,165 132,160 L132,125" fill="url(#tracheaGrad)" stroke="#795548" stroke-width="1.2"/>
  <!-- Vocal cords -->
  <line x1="113" y1="143" x2="127" y2="143" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="113" y1="147" x2="127" y2="147" stroke="#D32F2F" stroke-width="1.5"/>
  <!-- Thyroid cartilage outline -->
  <path d="M106,130 Q120,126 134,130" fill="none" stroke="#8D6E63" stroke-width="1"/>
  <text x="138" y="148" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Гортань</text>
  <text x="138" y="157" font-family="Arial,sans-serif" font-size="6" fill="#666">(голосовые связки)</text>

  <!-- Trachea -->
  <rect x="114" y="168" width="12" height="55" rx="2" fill="url(#tracheaGrad)" stroke="#795548" stroke-width="1"/>
  <!-- C-shaped cartilage rings -->
  <ellipse cx="120" cy="175" rx="7" ry="2.5" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <ellipse cx="120" cy="185" rx="7" ry="2.5" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <ellipse cx="120" cy="195" rx="7" ry="2.5" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <ellipse cx="120" cy="205" rx="7" ry="2.5" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <ellipse cx="120" cy="215" rx="7" ry="2.5" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <text x="138" y="195" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Трахея</text>
  <text x="138" y="204" font-family="Arial,sans-serif" font-size="6" fill="#666">(хрящевые кольца)</text>

  <!-- Bronchi branching -->
  <path d="M114,223 L85,245 Q78,250 75,258" fill="none" stroke="#795548" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M126,223 L155,245 Q162,250 165,258" fill="none" stroke="#795548" stroke-width="2.5" stroke-linecap="round"/>
  <text x="55" y="242" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Левый</text>
  <text x="55" y="250" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">бронх</text>
  <text x="158" y="242" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Правый</text>
  <text x="158" y="250" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">бронх</text>

  <!-- Left Lung -->
  <path d="M75,258 Q50,260 42,280 Q35,305 45,318 Q55,328 75,325 Q85,320 88,305 Q90,280 85,260 Z" fill="url(#lungGrad)" stroke="#C62828" stroke-width="1.2"/>
  <!-- Bronchioles in left lung -->
  <path d="M75,270 Q68,285 60,300" fill="none" stroke="#E57373" stroke-width="0.8"/>
  <path d="M75,275 Q72,290 70,310" fill="none" stroke="#E57373" stroke-width="0.6"/>
  <path d="M68,285 Q60,290 55,298" fill="none" stroke="#E57373" stroke-width="0.5"/>

  <!-- Right Lung -->
  <path d="M165,258 Q190,260 198,280 Q205,305 195,318 Q185,328 165,325 Q150,320 148,305 Q145,280 155,260 Z" fill="url(#lungGrad)" stroke="#C62828" stroke-width="1.2"/>
  <!-- Bronchioles in right lung -->
  <path d="M165,270 Q172,285 180,300" fill="none" stroke="#E57373" stroke-width="0.8"/>
  <path d="M165,275 Q168,290 170,310" fill="none" stroke="#E57373" stroke-width="0.6"/>
  <path d="M172,285 Q180,290 185,298" fill="none" stroke="#E57373" stroke-width="0.5"/>

  <!-- Lung label -->
  <text x="60" y="297" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Лёгкое</text>
  <text x="170" y="297" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Лёгкое</text>

  <!-- Airway direction arrows -->
  <path d="M120,60 L120,70" stroke="#1565C0" stroke-width="1" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#1565C0"/>
    </marker>
  </defs>
  <!-- Downward arrow along pathway -->
  <line x1="120" y1="62" x2="120" y2="95" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="82" y="78" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">воздух ↓</text>

  <!-- === ALVEOLUS INSET (right side) === -->
  <rect x="260" y="48" width="225" height="175" rx="8" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <text x="372" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Альвеола — детализация</text>

  <!-- Alveolus (main sac) -->
  <ellipse cx="355" cy="120" rx="55" ry="45" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5" opacity="0.8"/>
  <!-- Inner surface -->
  <ellipse cx="355" cy="120" rx="45" ry="35" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.8"/>

  <!-- Capillary network around alveolus -->
  <path d="M310,100 Q300,95 295,100 Q290,108 300,115" fill="none" stroke="#D32F2F" stroke-width="1" opacity="0.8"/>
  <path d="M300,115 Q305,120 310,118" fill="none" stroke="#D32F2F" stroke-width="1" opacity="0.8"/>
  <path d="M310,135 Q300,140 295,135 Q290,128 300,122" fill="none" stroke="#1E88E5" stroke-width="1" opacity="0.8"/>
  <path d="M300,122 Q305,118 310,120" fill="none" stroke="#1E88E5" stroke-width="1" opacity="0.8"/>
  <path d="M400,100 Q410,95 415,100 Q420,108 410,115" fill="none" stroke="#D32F2F" stroke-width="1" opacity="0.8"/>
  <path d="M410,115 Q405,120 400,118" fill="none" stroke="#D32F2F" stroke-width="1" opacity="0.8"/>
  <path d="M400,135 Q410,140 415,135 Q420,128 410,122" fill="none" stroke="#1E88E5" stroke-width="1" opacity="0.8"/>
  <path d="M410,122 Q405,118 400,120" fill="none" stroke="#1E88E5" stroke-width="1" opacity="0.8"/>

  <!-- O2 arrows (entering alveolus from air) -->
  <text x="345" y="95" font-family="Arial,sans-serif" font-size="6" fill="#D32F2F" font-weight="bold">O₂</text>
  <line x1="350" y1="97" x2="350" y2="107" stroke="#D32F2F" stroke-width="0.8" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="5" markerHeight="4" refX="4" refY="2" orient="auto">
      <polygon points="0,0 5,2 0,4" fill="#D32F2F"/>
    </marker>
  </defs>

  <!-- CO2 arrows (leaving to air) -->
  <text x="360" y="143" font-family="Arial,sans-serif" font-size="6" fill="#1E88E5" font-weight="bold">CO₂</text>
  <line x1="365" y1="135" x2="365" y2="140" stroke="#1E88E5" stroke-width="0.8"/>

  <!-- Labels for alveolus inset -->
  <text x="280" y="88" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F">Артерия</text>
  <text x="280" y="95" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F">(венозная кровь)</text>
  <text x="404" y="88" font-family="Arial,sans-serif" font-size="6.5" fill="#1E88E5">Вена</text>
  <text x="404" y="95" font-family="Arial,sans-serif" font-size="6.5" fill="#1E88E5">(артериальная кровь)</text>

  <!-- Bronchiole entering alveolus -->
  <path d="M355,165 L355,175 Q355,185 345,190 L335,195" fill="none" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <text x="340" y="205" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#333">Бронхиола</text>

  <!-- Alveolus label -->
  <text x="355" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#B71C1C">Альвеола</text>

  <!-- Epithelium label -->
  <text x="420" y="115" font-family="Arial,sans-serif" font-size="6" fill="#666">Эпителий</text>
  <line x1="419" y1="113" x2="403" y2="117" stroke="#666" stroke-width="0.5"/>
  <text x="420" y="123" font-family="Arial,sans-serif" font-size="6" fill="#666">(1 слой)</text>

  <!-- Surfactant label -->
  <text x="275" y="115" font-family="Arial,sans-serif" font-size="6" fill="#666">Сурфактант</text>
  <line x1="308" y1="114" x2="312" y2="116" stroke="#666" stroke-width="0.5"/>

  <!-- Capillary label -->
  <text x="290" y="155" font-family="Arial,sans-serif" font-size="6" fill="#D32F2F">Капилляры</text>
  <line x1="310" y1="150" x2="310" y2="140" stroke="#D32F2F" stroke-width="0.5"/>

  <!-- Alveoli cluster (grape-like) -->
  <circle cx="290" cy="200" r="10" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>
  <circle cx="308" cy="195" r="10" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>
  <circle cx="298" cy="212" r="10" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>
  <circle cx="316" cy="210" r="10" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>
  <text x="290" y="228" font-family="Arial,sans-serif" font-size="6" fill="#666">Альвеолярный мешочек</text>

  <!-- === SIDE PANEL: Functions === -->
  <rect x="260" y="230" width="225" height="80" rx="6" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="372" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Функции отделов</text>
  <line x1="270" y1="248" x2="475" y2="248" stroke="#2E7D32" stroke-width="0.3"/>

  <circle cx="278" cy="258" r="3" fill="#4CAF50"/>
  <text x="285" y="260" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Носовая полость — обогрев, увлажнение, очистка воздуха</text>

  <circle cx="278" cy="270" r="3" fill="#4CAF50"/>
  <text x="285" y="272" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Гортань — голосообразование, защита дыхательных путей</text>

  <circle cx="278" cy="282" r="3" fill="#4CAF50"/>
  <text x="285" y="284" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Трахея — проведение воздуха, мерцательный эпителий</text>

  <circle cx="278" cy="294" r="3" fill="#4CAF50"/>
  <text x="285" y="296" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Бронхи — распределение воздуха по долям лёгких</text>

  <circle cx="278" cy="306" r="3" fill="#4CAF50"/>
  <text x="285" y="308" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Альвеолы — газообмен (≈300 млн, S≈100 м²)</text>

  <!-- Footer -->
  <rect x="2" y="335" width="496" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Дыхательная система человека — путь воздуха: нос → носоглотка → гортань → трахея → бронхи → альвеолы</text>
</svg>