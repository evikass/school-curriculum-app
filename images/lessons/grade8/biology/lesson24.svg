<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="lungGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCDD2"/>
      <stop offset="100%" style="stop-color:#EF9A9A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Заболевания дыхательных путей и их профилактика</text>
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 8 класс — Урок 24</text>
  <line x1="20" y1="40" x2="480" y2="40" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

  <!-- === MAIN DIAGRAM: Respiratory tract with disease markers === -->

  <!-- Nasal cavity -->
  <path d="M105,55 L90,55 Q78,55 78,68 L78,85 Q78,92 88,92 L98,92 Q105,92 105,85 L105,68 L118,68 Q125,68 125,60 L125,55 Z" fill="#FFE0B2" stroke="#795548" stroke-width="1"/>
  <!-- Inflammation highlight -->
  <ellipse cx="100" cy="78" rx="12" ry="6" fill="#FF8A80" opacity="0.5"/>
  <!-- Disease marker -->
  <circle cx="75" cy="72" r="8" fill="#D32F2F" opacity="0.8"/>
  <text x="75" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">1</text>
  <text x="56" y="66" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F" font-weight="bold">Насморк</text>
  <text x="43" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(ринит)</text>

  <!-- Nasopharynx -->
  <path d="M88,92 L88,106 Q88,112 96,112 L98,112 Q104,112 104,106 L104,92" fill="#FFCCBC" stroke="#795548" stroke-width="0.8"/>
  <!-- Inflammation -->
  <ellipse cx="96" cy="102" rx="8" ry="5" fill="#FF8A80" opacity="0.4"/>
  <circle cx="112" cy="100" r="8" fill="#FF6F00" opacity="0.8"/>
  <text x="112" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">2</text>
  <text x="124" y="98" font-family="Arial,sans-serif" font-size="6.5" fill="#FF6F00" font-weight="bold">Фарингит</text>

  <!-- Larynx -->
  <path d="M82,112 L82,140 Q82,145 96,148 Q110,145 110,140 L110,112" fill="#FFAB91" stroke="#795548" stroke-width="1"/>
  <!-- Vocal cords inflamed -->
  <line x1="87" y1="130" x2="105" y2="130" stroke="#D32F2F" stroke-width="2"/>
  <line x1="87" y1="134" x2="105" y2="134" stroke="#D32F2F" stroke-width="2"/>
  <ellipse cx="96" cy="132" rx="10" ry="6" fill="#FF8A80" opacity="0.4"/>
  <circle cx="117" cy="128" r="8" fill="#F57F17" opacity="0.8"/>
  <text x="117" y="131" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">3</text>
  <text x="129" y="126" font-family="Arial,sans-serif" font-size="6.5" fill="#F57F17" font-weight="bold">Ларингит</text>

  <!-- Trachea -->
  <rect x="90" y="148" width="12" height="45" rx="2" fill="#FFAB91" stroke="#795548" stroke-width="0.8"/>
  <!-- Cartilage rings -->
  <ellipse cx="96" cy="155" rx="7" ry="2" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <ellipse cx="96" cy="163" rx="7" ry="2" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <ellipse cx="96" cy="171" rx="7" ry="2" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <ellipse cx="96" cy="179" rx="7" ry="2" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Inflammation in trachea -->
  <ellipse cx="96" cy="168" rx="5" ry="10" fill="#FF8A80" opacity="0.4"/>
  <circle cx="117" cy="168" r="8" fill="#E65100" opacity="0.8"/>
  <text x="117" y="171" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">4</text>
  <text x="129" y="166" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" font-weight="bold">Трахеит</text>

  <!-- Bronchi branching -->
  <path d="M90,193 L65,210 Q58,215 55,222" fill="none" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <path d="M102,193 L127,210 Q134,215 137,222" fill="none" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <!-- Inflammation in bronchi -->
  <ellipse cx="60" cy="215" rx="5" ry="5" fill="#FF8A80" opacity="0.5"/>
  <ellipse cx="132" cy="215" rx="5" ry="5" fill="#FF8A80" opacity="0.5"/>
  <circle cx="140" cy="205" r="8" fill="#BF360C" opacity="0.8"/>
  <text x="140" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">5</text>
  <text x="152" y="203" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" font-weight="bold">Бронхит</text>

  <!-- Left Lung -->
  <path d="M55,222 Q32,225 25,245 Q18,268 28,282 Q38,292 55,290 Q65,285 68,270 Q70,248 65,225 Z" fill="url(#lungGrad)" stroke="#C62828" stroke-width="1"/>
  <circle cx="45" cy="255" r="8" fill="#D32F2F" opacity="0.6"/>
  <text x="45" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">6</text>

  <!-- Right Lung -->
  <path d="M137,222 Q160,225 167,245 Q174,268 164,282 Q154,292 137,290 Q125,285 122,270 Q120,248 127,225 Z" fill="url(#lungGrad)" stroke="#C62828" stroke-width="1"/>
  <!-- Pneumonia - fluid in alveoli -->
  <ellipse cx="147" cy="252" rx="10" ry="12" fill="#FFAB91" opacity="0.6"/>
  <circle cx="147" cy="252" r="8" fill="#D32F2F" opacity="0.8"/>
  <text x="147" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">6</text>

  <!-- Disease legend -->
  <text x="70" y="296" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F" font-weight="bold">Пневмония</text>
  <text x="55" y="303" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(воспаление лёгких)</text>

  <!-- === SIDE PANEL: Smoking effects === -->
  <rect x="215" y="48" width="148" height="195" rx="6" fill="white" fill-opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="289" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Курение и лёгкие</text>
  <line x1="225" y1="66" x2="353" y2="66" stroke="#2E7D32" stroke-width="0.3"/>

  <!-- Healthy lung icon -->
  <ellipse cx="250" cy="88" rx="18" ry="15" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8"/>
  <text x="250" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#333" font-weight="bold">Здоровое</text>
  <text x="250" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">• Альвеолы чистые</text>
  <text x="250" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">• Реснички работают</text>
  <text x="250" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">• Газообмен норм.</text>

  <!-- Arrow -->
  <path d="M275,88 L295,88" stroke="#D32F2F" stroke-width="1" fill="none"/>
  <polygon points="297,86 301,88 297,90" fill="#D32F2F"/>

  <!-- Smoker's lung icon -->
  <ellipse cx="325" cy="88" rx="18" ry="15" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <text x="325" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Курильщика</text>
  <text x="325" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">• Смола (никотин)</text>
  <text x="325" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">• Реснички уничтожены</text>
  <text x="325" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">• Эмфизема</text>

  <!-- Smoking effects detail -->
  <rect x="225" y="132" width="128" height="100" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5"/>
  <text x="289" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" font-weight="bold">Влияние курения:</text>

  <circle cx="237" cy="156" r="3" fill="#4CAF50"/>
  <text x="243" y="158" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Никотин → спазм бронхов</text>

  <circle cx="237" cy="168" r="3" fill="#4CAF50"/>
  <text x="243" y="170" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Смола → рак лёгких (×30)</text>

  <circle cx="237" cy="180" r="3" fill="#4CAF50"/>
  <text x="243" y="182" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Угарный газ → гипоксия</text>

  <circle cx="237" cy="192" r="3" fill="#4CAF50"/>
  <text x="243" y="194" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Реснички парализованы</text>

  <circle cx="237" cy="204" r="3" fill="#4CAF50"/>
  <text x="243" y="206" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Эмфизема → потеря</text>
  <text x="243" y="213" font-family="Arial,sans-serif" font-size="5.5" fill="#333">эластичности альвеол</text>

  <circle cx="237" cy="224" r="3" fill="#4CAF50"/>
  <text x="243" y="226" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Хронический бронхит</text>

  <!-- Cigarette icon -->
  <rect x="230" y="234" width="25" height="5" rx="1" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
  <rect x="255" y="234" width="8" height="5" rx="1" fill="#FF6F00"/>
  <text x="270" y="238" font-family="Arial,sans-serif" font-size="5" fill="#D32F2F" font-weight="bold">= 4000+ веществ</text>

  <!-- === PREVENTION PANEL (bottom) === -->
  <rect x="370" y="48" width="118" height="195" rx="6" fill="white" fill-opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="429" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Профилактика</text>
  <line x1="380" y1="66" x2="478" y2="66" stroke="#2E7D32" stroke-width="0.3"/>

  <!-- Ventilation icon -->
  <rect x="382" y="72" width="20" height="16" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <text x="392" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">🏠</text>
  <text x="408" y="82" font-family="Arial,sans-serif" font-size="6" fill="#333">Проветривание</text>
  <text x="408" y="89" font-family="Arial,sans-serif" font-size="5" fill="#666">помещений</text>

  <!-- Exercise icon -->
  <rect x="382" y="96" width="20" height="16" rx="2" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="392" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">🏃</text>
  <text x="408" y="106" font-family="Arial,sans-serif" font-size="6" fill="#333">Физическая</text>
  <text x="408" y="113" font-family="Arial,sans-serif" font-size="5" fill="#666">активность</text>

  <!-- No smoking icon -->
  <rect x="382" y="120" width="20" height="16" rx="2" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
  <text x="392" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">🚭</text>
  <text x="408" y="130" font-family="Arial,sans-serif" font-size="6" fill="#333">Отказ от</text>
  <text x="408" y="137" font-family="Arial,sans-serif" font-size="5" fill="#666">курения</text>

  <!-- Hygiene icon -->
  <rect x="382" y="144" width="20" height="16" rx="2" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5"/>
  <text x="392" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">🧼</text>
  <text x="408" y="154" font-family="Arial,sans-serif" font-size="6" fill="#333">Личная</text>
  <text x="408" y="161" font-family="Arial,sans-serif" font-size="5" fill="#666">гигиена</text>

  <!-- Fresh air icon -->
  <rect x="382" y="168" width="20" height="16" rx="2" fill="#E1F5FE" stroke="#0277BD" stroke-width="0.5"/>
  <text x="392" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">🌲</text>
  <text x="408" y="178" font-family="Arial,sans-serif" font-size="6" fill="#333">Прогулки на</text>
  <text x="408" y="185" font-family="Arial,sans-serif" font-size="5" fill="#666">свежем воздухе</text>

  <!-- Hardening icon -->
  <rect x="382" y="192" width="20" height="16" rx="2" fill="#E0F7FA" stroke="#00838F" stroke-width="0.5"/>
  <text x="392" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">❄️</text>
  <text x="408" y="202" font-family="Arial,sans-serif" font-size="6" fill="#333">Закаливание</text>
  <text x="408" y="209" font-family="Arial,sans-serif" font-size="5" fill="#666">организма</text>

  <!-- Flu prevention -->
  <rect x="382" y="216" width="20" height="16" rx="2" fill="#FCE4EC" stroke="#AD1457" stroke-width="0.5"/>
  <text x="392" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="8">💉</text>
  <text x="408" y="226" font-family="Arial,sans-serif" font-size="6" fill="#333">Вакцинация</text>
  <text x="408" y="233" font-family="Arial,sans-serif" font-size="5" fill="#666">от гриппа</text>

  <!-- === BOTTOM: Disease details === -->
  <rect x="12" y="250" width="476" height="78" rx="6" fill="white" fill-opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="264" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#1B5E20">Основные заболевания дыхательной системы</text>
  <line x1="22" y1="268" x2="476" y2="268" stroke="#2E7D32" stroke-width="0.3"/>

  <!-- Disease cards -->
  <rect x="18" y="272" width="72" height="50" rx="3" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.5"/>
  <text x="54" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">Ринит</text>
  <text x="54" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Воспаление</text>
  <text x="54" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">слизистой носа</text>
  <text x="54" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Вирусы, аллергия</text>
  <text x="54" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">→ заложенность</text>

  <rect x="96" y="272" width="72" height="50" rx="3" fill="#FFF3E0" stroke="#FFCC80" stroke-width="0.5"/>
  <text x="132" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Фарингит</text>
  <text x="132" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Воспаление</text>
  <text x="132" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">глотки</text>
  <text x="132" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Боль в горле</text>
  <text x="132" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">→ сухой кашель</text>

  <rect x="174" y="272" width="72" height="50" rx="3" fill="#FFF8E1" stroke="#FFE082" stroke-width="0.5"/>
  <text x="210" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" font-weight="bold">Ларингит</text>
  <text x="210" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Воспаление</text>
  <text x="210" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">гортани</text>
  <text x="210" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Осиплость голоса</text>
  <text x="210" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">→ лающий кашель</text>

  <rect x="252" y="272" width="72" height="50" rx="3" fill="#E0F2F1" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="288" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00695C" font-weight="bold">Трахеит</text>
  <text x="288" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Воспаление</text>
  <text x="288" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">трахеи</text>
  <text x="288" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Боль за грудиной</text>
  <text x="288" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">→ сухой кашель</text>

  <rect x="330" y="272" width="72" height="50" rx="3" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="0.5"/>
  <text x="366" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#283593" font-weight="bold">Бронхит</text>
  <text x="366" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Воспаление</text>
  <text x="366" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">бронхов</text>
  <text x="366" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Влажный кашель</text>
  <text x="366" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">→ мокрота</text>

  <rect x="408" y="272" width="74" height="50" rx="3" fill="#FCE4EC" stroke="#F48FB1" stroke-width="0.5"/>
  <text x="445" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#AD1457" font-weight="bold">Пневмония</text>
  <text x="445" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Воспаление</text>
  <text x="445" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">лёгких</text>
  <text x="445" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Высокая t°, кашель</text>
  <text x="445" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">→ жидкость в альвеолах</text>

  <!-- Footer -->
  <rect x="2" y="335" width="496" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Профилактика: проветривание, спорт, отказ от курения, гигиена, закаливание, вакцинация</text>
</svg>