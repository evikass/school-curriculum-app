<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
  <linearGradient id="hierGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#388E3C"/></linearGradient>
  <linearGradient id="activeGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFB74D"/><stop offset="100%" stop-color="#E65100"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>

<!-- Title -->
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Человек как часть живой природы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 1</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Taxonomic hierarchy - central ladder diagram -->
<!-- Connecting vertical line -->
<line x1="115" y1="68" x2="115" y2="290" stroke="#388E3C" stroke-width="2" stroke-dasharray="3,2"/>

<!-- Level 1: Надцарство Эукариоты -->
<g transform="translate(30,68)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Надцарство</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Эукариоты</text>
  <!-- Eukaryote cell icon -->
  <circle cx="155" cy="11" r="8" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="155" cy="10" rx="4" ry="3" fill="#2E7D32" opacity="0.4"/>
</g>

<!-- Level 2: Царство Животные -->
<g transform="translate(30,95)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.65" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Царство</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Животные</text>
  <!-- Animal icon - simple silhouette -->
  <ellipse cx="153" cy="11" rx="9" ry="6" fill="#8D6E63" opacity="0.5" stroke="#5D4037" stroke-width="0.8"/>
  <circle cx="145" cy="8" r="4" fill="#8D6E63" opacity="0.5" stroke="#5D4037" stroke-width="0.8"/>
</g>

<!-- Level 3: Подцарство Многоклеточные -->
<g transform="translate(30,122)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Подцарство</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Многоклеточные</text>
  <!-- Multi-cell icon -->
  <circle cx="150" cy="11" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <circle cx="158" cy="9" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <circle cx="154" cy="16" r="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>

<!-- Level 4: Тип Хордовые -->
<g transform="translate(30,149)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.75" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Тип</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Хордовые</text>
  <!-- Notochord icon -->
  <line x1="140" y1="11" x2="170" y2="11" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="11" x2="170" y2="11" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
</g>

<!-- Level 5: Класс Млекопитающие -->
<g transform="translate(30,176)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.8" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Класс</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Млекопитающие</text>
  <!-- Hair/fur icon -->
  <path d="M145,8 L148,15 L151,6 L154,14 L157,7 L160,13" fill="none" stroke="#8D6E63" stroke-width="1"/>
</g>

<!-- Level 6: Отряд Приматы -->
<g transform="translate(30,203)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.85" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Отряд</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Приматы</text>
  <!-- Primate hand icon -->
  <rect x="143" y="6" width="12" height="10" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.6"/>
  <line x1="145" y1="6" x2="145" y2="2" stroke="#FFCC80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="148" y1="6" x2="148" y2="1" stroke="#FFCC80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="151" y1="6" x2="151" y2="2" stroke="#FFCC80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="154" y1="7" x2="156" y2="4" stroke="#FFCC80" stroke-width="1.5" stroke-linecap="round"/>
</g>

<!-- Level 7: Семейство Гоминиды -->
<g transform="translate(30,230)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Семейство</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Гоминиды</text>
  <!-- Skull icon -->
  <ellipse cx="153" cy="9" rx="7" ry="8" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <ellipse cx="153" cy="14" rx="5" ry="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="150" cy="8" r="1.5" fill="#5D4037"/>
  <circle cx="156" cy="8" r="1.5" fill="#5D4037"/>
</g>

<!-- Level 8: Род Человек -->
<g transform="translate(30,257)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#hierGrad)" opacity="0.95" stroke="#2E7D32" stroke-width="1"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Род</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Человек (Homo)</text>
</g>

<!-- Level 9: Вид Человек разумный — highlighted -->
<g transform="translate(30,284)">
  <rect x="0" y="0" width="170" height="22" rx="4" fill="url(#activeGrad)" opacity="0.85" stroke="#BF360C" stroke-width="1.5"/>
  <text x="10" y="15" font-family="Arial,sans-serif" font-size="7" fill="#fff" font-weight="bold">Вид</text>
  <text x="85" y="15" font-family="Arial,sans-serif" font-size="7" fill="#fff" font-weight="bold">Человек разумный</text>
</g>

<!-- Down arrows between levels -->
<polygon points="115,90 118,86 112,86" fill="#388E3C" opacity="0.7"/>
<polygon points="115,117 118,113 112,113" fill="#388E3C" opacity="0.7"/>
<polygon points="115,144 118,140 112,140" fill="#388E3C" opacity="0.7"/>
<polygon points="115,171 118,167 112,167" fill="#388E3C" opacity="0.7"/>
<polygon points="115,198 118,194 112,194" fill="#388E3C" opacity="0.7"/>
<polygon points="115,225 118,221 112,221" fill="#388E3C" opacity="0.7"/>
<polygon points="115,252 118,248 112,248" fill="#388E3C" opacity="0.7"/>
<polygon points="115,279 118,275 112,275" fill="#388E3C" opacity="0.7"/>

<!-- Right side panel: Key characteristics -->
<g transform="translate(215,58)">
  <rect x="0" y="0" width="270" height="250" rx="6" fill="white" opacity="0.88" stroke="#2E7D32" stroke-width="1"/>
  <text x="135" y="18" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Характеристики таксонов</text>
  <line x1="10" y1="24" x2="260" y2="24" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>

  <!-- Entries -->
  <rect x="8" y="30" width="8" height="8" rx="2" fill="#81C784"/>
  <text x="22" y="37" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Эукариоты:</text>
  <text x="80" y="37" font-family="Arial,sans-serif" font-size="6" fill="#555">ядро с мембраной, мембранные органоиды</text>

  <rect x="8" y="46" width="8" height="8" rx="2" fill="#8D6E63"/>
  <text x="22" y="53" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Животные:</text>
  <text x="80" y="53" font-family="Arial,sans-serif" font-size="6" fill="#555">гетеротрофы, подвижны, нет клеточной стенки</text>

  <rect x="8" y="62" width="8" height="8" rx="2" fill="#A5D6A7"/>
  <text x="22" y="69" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Многоклеточные:</text>
  <text x="100" y="69" font-family="Arial,sans-serif" font-size="6" fill="#555">дифференциация клеток, ткани</text>

  <rect x="8" y="78" width="8" height="8" rx="2" fill="#5D4037"/>
  <text x="22" y="85" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Хордовые:</text>
  <text x="80" y="85" font-family="Arial,sans-serif" font-size="6" fill="#555">хорда, нервная трубка, жаберные щели</text>

  <rect x="8" y="94" width="8" height="8" rx="2" fill="#FF9800"/>
  <text x="22" y="101" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Млекопитающие:</text>
  <text x="100" y="101" font-family="Arial,sans-serif" font-size="6" fill="#555">волосяной покров, молочные железы, теплокровность</text>

  <rect x="8" y="110" width="8" height="8" rx="2" fill="#E65100"/>
  <text x="22" y="117" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Приматы:</text>
  <text x="80" y="117" font-family="Arial,sans-serif" font-size="6" fill="#555">хватательные конечности, бинокулярное зрение</text>

  <rect x="8" y="126" width="8" height="8" rx="2" fill="#FFCC80"/>
  <text x="22" y="133" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Гоминиды:</text>
  <text x="80" y="133" font-family="Arial,sans-serif" font-size="6" fill="#555">прямохождение, крупный мозг, S-образный позвоночник</text>

  <rect x="8" y="142" width="8" height="8" rx="2" fill="#BF360C"/>
  <text x="22" y="149" font-family="Arial,sans-serif" font-size="6.5" fill="#333" font-weight="bold">Homo:</text>
  <text x="80" y="149" font-family="Arial,sans-serif" font-size="6" fill="#555">изготовление орудий, членораздельная речь</text>

  <rect x="8" y="158" width="8" height="8" rx="2" fill="#E65100" opacity="0.9"/>
  <text x="22" y="165" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" font-weight="bold">H. sapiens:</text>
  <text x="80" y="165" font-family="Arial,sans-serif" font-size="6" fill="#555">абстрактное мышление, культура, сознание</text>

  <!-- Mini diagram: narrowing funnel -->
  <g transform="translate(30,185)">
    <polygon points="0,0 210,0 180,55 30,55" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>
    <text x="105" y="18" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Чем ниже таксон, тем меньше видов</text>
    <text x="105" y="30" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">и больше общих признаков</text>
    <!-- Arrows narrowing -->
    <line x1="20" y1="40" x2="60" y2="40" stroke="#388E3C" stroke-width="1" marker-end="none"/>
    <line x1="150" y1="40" x2="190" y2="40" stroke="#388E3C" stroke-width="1"/>
    <text x="25" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666">≈8.7 млн видов</text>
    <text x="155" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666">1 вид</text>
  </g>
</g>

<!-- Human silhouette small icon near title -->
<g transform="translate(400,295)">
  <!-- Simplified human figure -->
  <circle cx="0" cy="-20" r="6" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <line x1="0" y1="-14" x2="0" y2="2" stroke="#E65100" stroke-width="2"/>
  <line x1="0" y1="-8" x2="-8" y2="-2" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="-8" x2="8" y2="-2" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="2" x2="-5" y2="14" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="2" x2="5" y2="14" stroke="#E65100" stroke-width="1.5"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">H. sapiens</text>
</g>

<!-- Footer bar -->
<rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Положение человека в системе органического мира</text>
</svg>