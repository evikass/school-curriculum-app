<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg29" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow29" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arrow29b" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg29)" rx="12"/>
  <rect width="500" height="350" fill="none" rx="12" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" font-family="Arial, sans-serif" font-size="14" fill="#1B5E20" text-anchor="middle" font-weight="bold">Обмен белков, жиров и углеводов. Витамины</text>
  <text x="250" y="34" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 29</text>
  <line x1="15" y1="40" x2="485" y2="40" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- MAIN: Metabolic Pathways -->
  <rect x="12" y="46" width="340" height="160" rx="6" fill="white" opacity="0.45" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="182" y="58" font-family="Arial, sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Обмен веществ (метаболизм)</text>

  <!-- PROTEINS pathway -->
  <rect x="20" y="66" width="90" height="42" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="0.8"/>
  <text x="65" y="82" font-family="Arial, sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Белки</text>
  <text x="65" y="96" font-family="Arial, sans-serif" font-size="6.5" fill="#D32F2F" text-anchor="middle">→ Аминокислоты</text>

  <!-- Arrow from proteins -->
  <path d="M110 87 L128 87" stroke="#E53935" stroke-width="1" marker-end="url(#arrow29)"/>

  <!-- Protein split: synthesis vs energy -->
  <rect x="135" y="66" width="100" height="20" rx="3" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.5"/>
  <text x="185" y="79" font-family="Arial, sans-serif" font-size="6.5" fill="#C62828" text-anchor="middle">→ Синтез белков тела</text>

  <rect x="135" y="90" width="100" height="20" rx="3" fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="185" y="103" font-family="Arial, sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle">→ Энергия 17.2 кДж/г</text>

  <!-- Split arrows -->
  <path d="M128 82 L135 76" stroke="#E53935" stroke-width="0.7"/>
  <path d="M128 92 L135 98" stroke="#E53935" stroke-width="0.7"/>

  <!-- FATS pathway -->
  <rect x="20" y="116" width="90" height="42" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="65" y="132" font-family="Arial, sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Жиры</text>
  <text x="65" y="146" font-family="Arial, sans-serif" font-size="6" fill="#FF8F00" text-anchor="middle">→ Глицерин + ЖК</text>

  <!-- Arrow from fats -->
  <path d="M110 137 L128 137" stroke="#F9A825" stroke-width="1" marker-end="url(#arrow29)"/>

  <!-- Fat split -->
  <rect x="135" y="116" width="100" height="20" rx="3" fill="#FFFDE7" stroke="#FFF176" stroke-width="0.5"/>
  <text x="185" y="129" font-family="Arial, sans-serif" font-size="6.5" fill="#F57F17" text-anchor="middle">→ Синтез жиров тела</text>

  <rect x="135" y="140" width="100" height="20" rx="3" fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="185" y="153" font-family="Arial, sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle">→ Энергия 38.9 кДж/г</text>

  <!-- Split arrows -->
  <path d="M128 132 L135 126" stroke="#F9A825" stroke-width="0.7"/>
  <path d="M128 142 L135 148" stroke="#F9A825" stroke-width="0.7"/>

  <!-- CARBS pathway -->
  <rect x="20" y="166" width="90" height="32" rx="4" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="65" y="180" font-family="Arial, sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Углеводы</text>
  <text x="65" y="193" font-family="Arial, sans-serif" font-size="6.5" fill="#388E3C" text-anchor="middle">→ Глюкоза</text>

  <!-- Arrow from carbs -->
  <path d="M110 182 L128 182" stroke="#4CAF50" stroke-width="1" marker-end="url(#arrow29)"/>

  <!-- Carb split -->
  <rect x="135" y="166" width="100" height="16" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="185" y="177" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">→ Гликоген (запас)</text>

  <rect x="135" y="185" width="100" height="16" rx="3" fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="185" y="196" font-family="Arial, sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle">→ Энергия 17.2 кДж/г</text>

  <!-- Split arrows -->
  <path d="M128 179 L135 174" stroke="#4CAF50" stroke-width="0.7"/>
  <path d="M128 186 L135 191" stroke="#4CAF50" stroke-width="0.7"/>

  <!-- Energy comparison note -->
  <rect x="245" y="66" width="100" height="135" rx="4" fill="#FFF8E1" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="295" y="80" font-family="Arial, sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Энергетическая</text>
  <text x="295" y="90" font-family="Arial, sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">ценность:</text>

  <!-- Bar chart -->
  <rect x="260" y="100" width="18" height="30" rx="2" fill="#EF9A9A" stroke="#E53935" stroke-width="0.5"/>
  <text x="269" y="118" font-family="Arial, sans-serif" font-size="5" fill="white" text-anchor="middle" font-weight="bold">17.2</text>
  <text x="269" y="138" font-family="Arial, sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Белки</text>

  <rect x="283" y="100" width="18" height="60" rx="2" fill="#FFE082" stroke="#FFA000" stroke-width="0.5"/>
  <text x="292" y="128" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">38.9</text>
  <text x="292" y="138" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Жиры</text>

  <rect x="306" y="100" width="18" height="30" rx="2" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="315" y="118" font-family="Arial, sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-weight="bold">17.2</text>
  <text x="315" y="138" font-family="Arial, sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Углеводы</text>

  <!-- Unit label -->
  <text x="295" y="150" font-family="Arial, sans-serif" font-size="5.5" fill="#888" text-anchor="middle">кДж на 1 грамм</text>

  <!-- Key balance note -->
  <rect x="255" y="160" width="90" height="36" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="300" y="172" font-family="Arial, sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Баланс обмена:</text>
  <text x="300" y="181" font-family="Arial, sans-serif" font-size="5" fill="#333" text-anchor="middle">Поступление = Расход</text>
  <text x="300" y="190" font-family="Arial, sans-serif" font-size="5" fill="#333" text-anchor="middle">→ Масса тела стабильна</text>

  <!-- RIGHT PANEL: Vitamin Table -->
  <rect x="360" y="46" width="128" height="160" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="424" y="58" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Витамины</text>

  <!-- Vitamin A -->
  <rect x="366" y="64" width="116" height="22" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.4"/>
  <text x="372" y="75" font-family="Arial, sans-serif" font-size="7.5" fill="#E65100" font-weight="bold">A</text>
  <text x="385" y="75" font-family="Arial, sans-serif" font-size="6" fill="#333">— Зрение, кожа</text>
  <text x="385" y="83" font-family="Arial, sans-serif" font-size="5" fill="#888">морковь, печень, масло</text>

  <!-- Vitamin B1 -->
  <rect x="366" y="90" width="116" height="22" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.4"/>
  <text x="370" y="101" font-family="Arial, sans-serif" font-size="7.5" fill="#2E7D32" font-weight="bold">B1</text>
  <text x="387" y="101" font-family="Arial, sans-serif" font-size="6" fill="#333">— Нервная система</text>
  <text x="387" y="109" font-family="Arial, sans-serif" font-size="5" fill="#888">крупы, мясо, бобовые</text>

  <!-- Vitamin C -->
  <rect x="366" y="116" width="116" height="22" rx="3" fill="#FFF9C4" stroke="#FDD835" stroke-width="0.4"/>
  <text x="370" y="127" font-family="Arial, sans-serif" font-size="7.5" fill="#F57F17" font-weight="bold">C</text>
  <text x="383" y="127" font-family="Arial, sans-serif" font-size="6" fill="#333">— Иммунитет</text>
  <text x="383" y="135" font-family="Arial, sans-serif" font-size="5" fill="#888">цитрусовые, шиповник</text>

  <!-- Vitamin D -->
  <rect x="366" y="142" width="116" height="22" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.4"/>
  <text x="370" y="153" font-family="Arial, sans-serif" font-size="7.5" fill="#1565C0" font-weight="bold">D</text>
  <text x="385" y="153" font-family="Arial, sans-serif" font-size="6" fill="#333">— Кости, кальций</text>
  <text x="385" y="161" font-family="Arial, sans-serif" font-size="5" fill="#888">рыба, яйцо, солнце</text>

  <!-- Vitamin K -->
  <rect x="366" y="168" width="116" height="22" rx="3" fill="#F3E5F5" stroke="#AB47BC" stroke-width="0.4"/>
  <text x="370" y="179" font-family="Arial, sans-serif" font-size="7.5" fill="#6A1B9A" font-weight="bold">K</text>
  <text x="385" y="179" font-family="Arial, sans-serif" font-size="6" fill="#333">— Свёртывание крови</text>
  <text x="385" y="187" font-family="Arial, sans-serif" font-size="5" fill="#888">шпинат, капуста</text>

  <!-- BOTTOM: Avitaminosis panel -->
  <rect x="12" y="212" width="476" height="80" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="250" y="224" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Состояния, связанные с витаминами</text>

  <!-- Three columns -->
  <!-- Avitaminosis -->
  <rect x="20" y="230" width="148" height="55" rx="4" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.5"/>
  <text x="94" y="242" font-family="Arial, sans-serif" font-size="7.5" fill="#C62828" text-anchor="middle" font-weight="bold">Авитаминоз</text>
  <text x="94" y="253" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F" text-anchor="middle">Полное отсутствие</text>
  <text x="94" y="262" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F" text-anchor="middle">витамина в организме</text>
  <text x="94" y="275" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">Пример: цинга (дефицит C)</text>

  <!-- Hypovitaminosis -->
  <rect x="175" y="230" width="148" height="55" rx="4" fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="249" y="242" font-family="Arial, sans-serif" font-size="7.5" fill="#E65100" text-anchor="middle" font-weight="bold">Гиповитаминоз</text>
  <text x="249" y="253" font-family="Arial, sans-serif" font-size="6" fill="#FF8F00" text-anchor="middle">Недостаток витамина</text>
  <text x="249" y="262" font-family="Arial, sans-serif" font-size="6" fill="#FF8F00" text-anchor="middle">в организме</text>
  <text x="249" y="275" font-family="Arial, sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Пример: рахит (дефицит D)</text>

  <!-- Hypervitaminosis -->
  <rect x="330" y="230" width="148" height="55" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="0.5"/>
  <text x="404" y="242" font-family="Arial, sans-serif" font-size="7.5" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Гипервитаминоз</text>
  <text x="404" y="253" font-family="Arial, sans-serif" font-size="6" fill="#8E24AA" text-anchor="middle">Избыток витамина</text>
  <text x="404" y="262" font-family="Arial, sans-serif" font-size="6" fill="#8E24AA" text-anchor="middle">(особенно A, D — жирораст.)</text>
  <text x="404" y="275" font-family="Arial, sans-serif" font-size="5.5" fill="#6A1B9A" text-anchor="middle">Токсичен! Не превышать дозу</text>

  <!-- Arrows between columns -->
  <path d="M168 257 L175 257" stroke="#888" stroke-width="0.8" marker-end="url(#arrow29)"/>
  <path d="M323 257 L330 257" stroke="#888" stroke-width="0.8" marker-end="url(#arrow29)"/>

  <!-- Key note -->
  <rect x="12" y="298" width="476" height="18" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Водорастворимые (B, C) — не накапливаются | Жирорастворимые (A, D, E, K) — могут накапливаться</text>

  <!-- Footer -->
  <rect x="0" y="335" width="500" height="15" rx="0" fill="#2E7D32"/>
  <text x="250" y="346" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Обмен веществ: пластический и энергетический обмен | Витамины — регуляторы обмена</text>
</svg>