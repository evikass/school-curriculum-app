<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="kidneyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF9A9A"/>
      <stop offset="100%" style="stop-color:#E57373"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Предупреждение заболеваний почек</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 34</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- KIDNEY WITH DISEASE SITES (left) -->
  <text x="115" y="58" text-anchor="middle" font-size="8" font-weight="bold" fill="#C62828" font-family="Arial">ЗАБОЛЕВАНИЯ ПОЧЕК</text>

  <!-- Kidney shape -->
  <path d="M75,80 Q40,120 45,180 Q50,240 100,260 Q130,270 150,250 Q175,230 170,175 Q165,120 140,85 Q120,65 75,80 Z" fill="url(#kidneyGrad)" stroke="#C62828" stroke-width="1.5" opacity="0.8"/>

  <!-- Cortex outline -->
  <path d="M80,88 Q52,120 56,178 Q60,230 105,250 Q125,256 143,242 Q163,225 160,178 Q156,128 135,95 Q118,76 80,88 Z" fill="#FFCDD2" stroke="#E57373" stroke-width="0.5" opacity="0.5"/>

  <!-- Disease site 1: Pyelonephritis (pelvis) -->
  <ellipse cx="120" cy="225" rx="25" ry="18" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="120" y="229" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#D32F2F" font-family="Arial">Пиелонефрит</text>
  <!-- Infection symbol -->
  <circle cx="105" cy="218" r="3" fill="#F44336" opacity="0.7"/>
  <circle cx="130" cy="222" r="2.5" fill="#F44336" opacity="0.7"/>
  <circle cx="118" cy="235" r="2" fill="#F44336" opacity="0.7"/>

  <!-- Disease site 2: Glomerulonephritis (glomerulus in cortex) -->
  <circle cx="110" cy="130" r="15" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Inflamed glomerulus -->
  <path d="M100,125 Q108,118 115,125 Q120,132 112,135 Q104,132 107,126" fill="#EF5350" stroke="#D32F2F" stroke-width="0.6"/>
  <path d="M105,128 Q112,122 118,128" fill="none" stroke="#D32F2F" stroke-width="0.5"/>
  <text x="110" y="150" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#D32F2F" font-family="Arial">Гломеруло-</text>
  <text x="110" y="158" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#D32F2F" font-family="Arial">нефрит</text>

  <!-- Disease site 3: Kidney stones (in pelvis) -->
  <polygon points="95,200 100,193 106,198 103,206 96,205" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <polygon points="125,210 129,204 134,208 131,215 124,214" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <polygon points="112,218 116,212 120,217 117,222 111,221" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="88" y="210" font-size="5" font-weight="bold" fill="#F57F17" font-family="Arial">Камни</text>

  <!-- Disease legend -->
  <rect x="15" y="272" width="185" height="48" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.6"/>
  <text x="107" y="285" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#E65100" font-family="Arial">ХАРАКТЕРИСТИКА ЗАБОЛЕВАНИЙ</text>
  <line x1="25" y1="289" x2="190" y2="289" stroke="#F9A825" stroke-width="0.3"/>
  <text x="25" y="298" font-size="5.5" fill="#333" font-family="Arial">• Пиелонефрит — воспаление лоханки (инфекция)</text>
  <text x="25" y="308" font-size="5.5" fill="#333" font-family="Arial">• Гломерулонефрит — воспаление клубочков</text>
  <text x="25" y="318" font-size="5.5" fill="#333" font-family="Arial">• Мочекаменная — камни из солей в лоханке</text>

  <!-- URINALYSIS (center) -->
  <rect x="210" y="52" width="150" height="160" rx="5" fill="#FFFFFF" stroke="#1565C0" stroke-width="0.8" opacity="0.9"/>
  <text x="285" y="67" text-anchor="middle" font-size="8" font-weight="bold" fill="#0D47A1" font-family="Arial">АНАЛИЗ МОЧИ</text>
  <line x1="220" y1="73" x2="350" y2="73" stroke="#1565C0" stroke-width="0.4"/>

  <!-- Test tube -->
  <rect x="225" y="80" width="18" height="60" rx="3" fill="#FFF9C4" stroke="#795548" stroke-width="0.8"/>
  <rect x="226" y="95" width="16" height="44" rx="2" fill="#FFF176" opacity="0.5"/>
  <text x="234" y="148" text-anchor="middle" font-size="5" fill="#795548" font-family="Arial">Моча</text>

  <!-- Normal indicators -->
  <text x="250" y="88" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial">НОРМА:</text>
  <text x="250" y="98" font-size="5.5" fill="#333" font-family="Arial">• Цвет: соломенно-жёлтый</text>
  <text x="250" y="108" font-size="5.5" fill="#333" font-family="Arial">• Прозрачность: прозрачная</text>
  <text x="250" y="118" font-size="5.5" fill="#333" font-family="Arial">• Белок: отсутствует</text>
  <text x="250" y="128" font-size="5.5" fill="#333" font-family="Arial">• Эритроциты: 0-1 в п/з</text>
  <text x="250" y="138" font-size="5.5" fill="#333" font-family="Arial">• Лейкоциты: 0-3 в п/з</text>

  <!-- Pathology indicators -->
  <text x="250" y="155" font-size="6" font-weight="bold" fill="#D32F2F" font-family="Arial">ПАТОЛОГИЯ:</text>
  <text x="250" y="165" font-size="5.5" fill="#D32F2F" font-family="Arial">⚠ Белок → гломерулонефрит</text>
  <text x="250" y="175" font-size="5.5" fill="#D32F2F" font-family="Arial">⚠ Эритроциты → камни/воспаление</text>
  <text x="250" y="185" font-size="5.5" fill="#D32F2F" font-family="Arial">⚠ Лейкоциты → пиелонефрит</text>
  <text x="250" y="195" font-size="5.5" fill="#D32F2F" font-family="Arial">⚠ Соли → мочекаменная болезнь</text>

  <!-- Warning signs panel (right top) -->
  <rect x="370" y="52" width="120" height="160" rx="5" fill="url(#warnGrad)" stroke="#E65100" stroke-width="0.8"/>
  <text x="430" y="67" text-anchor="middle" font-size="7" font-weight="bold" fill="#BF360C" font-family="Arial">⚠ ПРИЗНАКИ</text>
  <text x="430" y="77" text-anchor="middle" font-size="7" font-weight="bold" fill="#BF360C" font-family="Arial">ЗАБОЛЕВАНИЙ</text>
  <line x1="380" y1="82" x2="480" y2="82" stroke="#E65100" stroke-width="0.4"/>

  <text x="380" y="94" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Боль в пояснице</text>
  <text x="380" y="106" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Нарушение моче-</text>
  <text x="385" y="115" font-size="5.5" fill="#BF360C" font-family="Arial">испускания</text>
  <text x="380" y="127" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Отёки (лицо, ноги)</text>
  <text x="380" y="139" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Повышение t° тела</text>
  <text x="380" y="151" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Изменение цвета</text>
  <text x="385" y="160" font-size="5.5" fill="#BF360C" font-family="Arial">мочи (кровь, мутная)</text>
  <text x="380" y="172" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Запах аммиака</text>
  <text x="380" y="184" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Повышенное АД</text>
  <text x="380" y="196" font-size="5.5" fill="#BF360C" font-family="Arial">🔴 Общая слабость</text>

  <!-- PREVENTION panel (bottom right) -->
  <rect x="210" y="220" width="280" height="100" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
  <text x="350" y="236" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial">ПРОФИЛАКТИКА ЗАБОЛЕВАНИЙ ПОЧЕК</text>
  <line x1="220" y1="241" x2="480" y2="241" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Prevention items in two columns -->
  <text x="225" y="255" font-size="6" fill="#2E7D32" font-family="Arial">💧 Достаточное потребление воды (1.5-2 л/день)</text>
  <text x="225" y="267" font-size="6" fill="#2E7D32" font-family="Arial">🧥 Избегать переохлаждения поясницы</text>
  <text x="225" y="279" font-size="6" fill="#2E7D32" font-family="Arial">💊 Своевременное лечение инфекций</text>
  <text x="225" y="291" font-size="6" fill="#2E7D32" font-family="Arial">🥗 Сбалансированное питание</text>
  <text x="225" y="303" font-size="6" fill="#2E7D32" font-family="Arial">🧂 Ограничение соли (до 5 г/день)</text>
  <text x="225" y="315" font-size="6" fill="#2E7D32" font-family="Arial">🏃 Активный образ жизни, избегать гиподинамии</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
  <text x="250" y="343" text-anchor="middle" font-size="8" fill="white" font-family="Arial">Профилактика — лучший способ защиты почек | При симптомах — немедленно к врачу!</text>
</svg>