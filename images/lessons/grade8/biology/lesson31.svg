<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="epidermisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC"/>
      <stop offset="100%" style="stop-color:#FFAB91"/>
    </linearGradient>
    <linearGradient id="dermisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAB91"/>
      <stop offset="100%" style="stop-color:#FF8A65"/>
    </linearGradient>
    <linearGradient id="hypoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE0B2"/>
      <stop offset="100%" style="stop-color:#FFCC80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Кожа: строение и функции</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 31</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- Skin cross-section - main diagram area -->
  <!-- Epidermis layer -->
  <rect x="30" y="55" width="280" height="35" rx="3" fill="url(#epidermisGrad)" stroke="#E64A19" stroke-width="1"/>
  <!-- Epidermis cell layers -->
  <line x1="30" y1="62" x2="310" y2="62" stroke="#E64A19" stroke-width="0.4" stroke-dasharray="2,2"/>
  <line x1="30" y1="68" x2="310" y2="68" stroke="#E64A19" stroke-width="0.4" stroke-dasharray="2,2"/>
  <line x1="30" y1="74" x2="310" y2="74" stroke="#E64A19" stroke-width="0.4" stroke-dasharray="2,2"/>
  <line x1="30" y1="80" x2="310" y2="80" stroke="#E64A19" stroke-width="0.4" stroke-dasharray="2,2"/>
  <!-- Stratum corneum indication -->
  <rect x="30" y="55" width="280" height="7" rx="2" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.5" opacity="0.7"/>
  <text x="55" y="61" font-size="5" fill="#BF360C" font-family="Arial">Роговой слой</text>

  <!-- Melanocyte in epidermis -->
  <circle cx="120" cy="70" r="5" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <line x1="120" y1="65" x2="110" y2="58" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="120" y1="65" x2="130" y2="58" stroke="#5D4037" stroke-width="0.5"/>
  <text x="135" y="71" font-size="6" fill="#5D4037" font-family="Arial" font-weight="bold">Меланоцит</text>

  <!-- Epidermis label -->
  <text x="70" y="93" font-size="7" font-weight="bold" fill="#BF360C" font-family="Arial">ЭПИДЕРМИС</text>
  <line x1="30" y1="90" x2="310" y2="90" stroke="#E64A19" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- Dermis layer -->
  <rect x="30" y="95" width="280" height="115" rx="3" fill="url(#dermisGrad)" stroke="#D84315" stroke-width="1" opacity="0.6"/>
  <!-- Collagen/elastin fibers -->
  <path d="M40,110 Q80,105 120,112 Q160,118 200,108 Q240,100 280,110" fill="none" stroke="#FF5722" stroke-width="0.5" opacity="0.6"/>
  <path d="M40,120 Q90,115 140,122 Q190,128 240,118 Q270,112 300,120" fill="none" stroke="#FF5722" stroke-width="0.5" opacity="0.6"/>
  <path d="M40,140 Q100,135 160,142 Q220,148 280,138" fill="none" stroke="#FF5722" stroke-width="0.5" opacity="0.6"/>
  <text x="40" y="157" font-size="5" fill="#BF360C" font-family="Arial">Коллагеновые и эластиновые волокна</text>

  <!-- Blood vessels in dermis -->
  <ellipse cx="180" cy="130" rx="35" ry="8" fill="none" stroke="#C62828" stroke-width="1.2"/>
  <ellipse cx="180" cy="130" rx="30" ry="5" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <text x="180" y="145" text-anchor="middle" font-size="6" fill="#C62828" font-family="Arial" font-weight="bold">Кровеносные сосуды</text>

  <!-- Nerve endings -->
  <circle cx="80" cy="130" r="4" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="80" y1="134" x2="80" y2="145" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="76" y1="145" x2="80" y2="145" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="84" y1="145" x2="80" y2="145" stroke="#F9A825" stroke-width="0.8"/>
  <text x="90" y="133" font-size="5.5" fill="#F57F17" font-family="Arial" font-weight="bold">Нервные окончания</text>

  <!-- Hair follicle -->
  <rect x="100" y="55" width="16" height="100" rx="5" fill="#BCAAA4" stroke="#795548" stroke-width="0.8"/>
  <rect x="104" y="42" width="8" height="18" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <text x="122" y="105" font-size="6" fill="#4E342E" font-family="Arial" font-weight="bold">Волос</text>
  <text x="122" y="113" font-size="5.5" fill="#4E342E" font-family="Arial">фолликул</text>

  <!-- Sebaceous gland -->
  <ellipse cx="125" cy="118" rx="10" ry="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="140" y="120" font-size="5.5" fill="#F57F17" font-family="Arial" font-weight="bold">Сальная железа</text>

  <!-- Sweat gland -->
  <ellipse cx="250" cy="180" rx="15" ry="10" fill="#E1F5FE" stroke="#0288D1" stroke-width="0.8"/>
  <path d="M250,170 L250,155 L250,90" fill="none" stroke="#0288D1" stroke-width="0.8" stroke-dasharray="2,1"/>
  <circle cx="250" cy="88" r="3" fill="#E1F5FE" stroke="#0288D1" stroke-width="0.6"/>
  <text x="270" y="178" font-size="5.5" fill="#01579B" font-family="Arial" font-weight="bold">Потовая железа</text>
  <text x="270" y="186" font-size="5" fill="#01579B" font-family="Arial">(проток)</text>

  <!-- Dermis label -->
  <text x="60" y="200" font-size="7" font-weight="bold" fill="#BF360C" font-family="Arial">ДЕРМА</text>
  <line x1="30" y1="210" x2="310" y2="210" stroke="#D84315" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- Hypodermis layer -->
  <rect x="30" y="212" width="280" height="60" rx="3" fill="url(#hypoGrad)" stroke="#E65100" stroke-width="1" opacity="0.5"/>
  <!-- Adipose cells -->
  <circle cx="55" cy="230" r="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="55" cy="230" r="3" fill="#FFE0B2" stroke="#FF8F00" stroke-width="0.3"/>
  <circle cx="80" cy="240" r="9" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="80" cy="240" r="3.5" fill="#FFE0B2" stroke="#FF8F00" stroke-width="0.3"/>
  <circle cx="110" cy="232" r="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="110" cy="232" r="3" fill="#FFE0B2" stroke="#FF8F00" stroke-width="0.3"/>
  <circle cx="140" cy="245" r="9" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="140" cy="245" r="3.5" fill="#FFE0B2" stroke="#FF8F00" stroke-width="0.3"/>
  <circle cx="170" cy="235" r="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="200" cy="248" r="9" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="230" cy="237" r="7" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="260" cy="250" r="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <circle cx="285" cy="238" r="7" fill="#FFF3E0" stroke="#FF8F00" stroke-width="0.6"/>
  <text x="150" y="265" text-anchor="middle" font-size="7" font-weight="bold" fill="#E65100" font-family="Arial">ГИПОДЕРМА (подкожная жировая клетчатка)</text>

  <!-- Nail cross-section small diagram -->
  <rect x="30" y="280" width="90" height="30" rx="3" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
  <rect x="35" y="283" width="80" height="12" rx="2" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
  <text x="75" y="292" text-anchor="middle" font-size="5.5" fill="#880E4F" font-family="Arial">Ногтевая пластинка</text>
  <text x="75" y="305" text-anchor="middle" font-size="6" font-weight="bold" fill="#4E342E" font-family="Arial">НОГОТЬ</text>

  <!-- Side panel - Functions -->
  <rect x="325" y="50" width="165" height="240" rx="6" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
  <text x="407" y="67" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial">Функции кожи</text>
  <line x1="335" y1="73" x2="480" y2="73" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Function 1 -->
  <rect x="335" y="80" width="145" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="340" y="92" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial">🛡 Защитная</text>
  <text x="340" y="102" font-size="5.5" fill="#555" font-family="Arial">Барьер от микробов, UV, химии</text>

  <!-- Function 2 -->
  <rect x="335" y="114" width="145" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="340" y="126" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial">🌡 Терморегуляторная</text>
  <text x="340" y="136" font-size="5.5" fill="#555" font-family="Arial">Поддержание t° тела ~36.6°C</text>

  <!-- Function 3 -->
  <rect x="335" y="148" width="145" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="340" y="160" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial">💧 Выделительная</text>
  <text x="340" y="170" font-size="5.5" fill="#555" font-family="Arial">Выведение пота, солей, мочевины</text>

  <!-- Function 4 -->
  <rect x="335" y="182" width="145" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="340" y="194" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial">🖐 Рецепторная</text>
  <text x="340" y="204" font-size="5.5" fill="#555" font-family="Arial">Осязание, боль, температура</text>

  <!-- Function 5 -->
  <rect x="335" y="216" width="145" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="340" y="228" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial">🔄 Обменная</text>
  <text x="340" y="238" font-size="5.5" fill="#555" font-family="Arial">Синтез витамина D, газообмен</text>

  <!-- Skin area info -->
  <text x="407" y="260" text-anchor="middle" font-size="6" fill="#666" font-family="Arial">Площадь кожи: ~1.5-2 м²</text>
  <text x="407" y="270" text-anchor="middle" font-size="6" fill="#666" font-family="Arial">Масса: ~15% от массы тела</text>
  <text x="407" y="280" text-anchor="middle" font-size="6" fill="#666" font-family="Arial">Толщина: 0.5-4 мм</text>

  <!-- Layer thickness indicators -->
  <line x1="315" y1="55" x2="315" y2="90" stroke="#BF360C" stroke-width="0.8"/>
  <text x="318" y="75" font-size="5" fill="#BF360C" font-family="Arial">0.05-2 мм</text>
  <line x1="315" y1="95" x2="315" y2="210" stroke="#BF360C" stroke-width="0.8"/>
  <text x="318" y="155" font-size="5" fill="#BF360C" font-family="Arial">1-4 мм</text>
  <line x1="315" y1="212" x2="315" y2="272" stroke="#BF360C" stroke-width="0.8"/>
  <text x="318" y="245" font-size="5" fill="#BF360C" font-family="Arial">до 10 см</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
  <text x="250" y="343" text-anchor="middle" font-size="8" fill="white" font-family="Arial">Кожа — самый крупный орган человека | Производные: волосы, ногти, железы</text>
</svg>