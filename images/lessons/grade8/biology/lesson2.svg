<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
  <linearGradient id="humanGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCC80"/><stop offset="100%" stop-color="#FF9800"/></linearGradient>
  <linearGradient id="chimpGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A1887F"/><stop offset="100%" stop-color="#6D4C41"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>

<!-- Title -->
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сходство человека с животными и отличие от них</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 2</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Central dividing line -->
<line x1="250" y1="58" x2="250" y2="240" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Human silhouette (left side) - upright posture -->
<g transform="translate(130,130)">
  <!-- Head -->
  <circle cx="0" cy="-60" r="14" fill="url(#humanGrad)" stroke="#E65100" stroke-width="1.2"/>
  <!-- Brain area highlight -->
  <ellipse cx="0" cy="-64" rx="11" ry="9" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="0.5"/>
  <text x="0" y="-62" font-family="Arial,sans-serif" font-size="4" fill="#BF360C" text-anchor="middle">Мозг</text>
  <!-- S-shaped spine -->
  <path d="M0,-46 C-4,-36 4,-26 0,-16 C-4,-6 4,4 0,14" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="-20" y="-26" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="end" font-weight="bold">S-образный</text>
  <text x="-20" y="-19" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="end">позвоночник</text>
  <!-- Ribcage -->
  <ellipse cx="0" cy="-24" rx="16" ry="14" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="2,1" opacity="0.6"/>
  <!-- Arms -->
  <line x1="0" y1="-36" x2="-20" y2="-18" stroke="#E65100" stroke-width="2"/>
  <line x1="-20" y1="-18" x2="-22" y2="0" stroke="#E65100" stroke-width="1.5"/>
  <line x1="0" y1="-36" x2="20" y2="-18" stroke="#E65100" stroke-width="2"/>
  <line x1="20" y1="-18" x2="22" y2="0" stroke="#E65100" stroke-width="1.5"/>
  <!-- Pelvis -->
  <ellipse cx="0" cy="12" rx="14" ry="6" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="0.8"/>
  <!-- Legs - straight (bipedal) -->
  <line x1="-6" y1="16" x2="-8" y2="55" stroke="#E65100" stroke-width="2"/>
  <line x1="-8" y1="55" x2="-8" y2="68" stroke="#E65100" stroke-width="1.5"/>
  <line x1="6" y1="16" x2="8" y2="55" stroke="#E65100" stroke-width="2"/>
  <line x1="8" y1="55" x2="8" y2="68" stroke="#E65100" stroke-width="1.5"/>
  <!-- Foot - arched -->
  <path d="M-14,68 L-8,68 L-4,70" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <path d="M4,70 L8,68 L14,68" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <text x="-8" y="78" font-family="Arial,sans-serif" font-size="4.5" fill="#BF360C" text-anchor="middle">Сводчатая</text>
  <text x="-8" y="83" font-family="Arial,sans-serif" font-size="4.5" fill="#BF360C" text-anchor="middle">стопа</text>
  <!-- Label -->
  <text x="0" y="94" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Человек</text>
</g>

<!-- Chimpanzee silhouette (right side) - leaning posture -->
<g transform="translate(370,130)">
  <!-- Head - smaller brain -->
  <circle cx="-5" cy="-52" r="12" fill="url(#chimpGrad)" stroke="#4E342E" stroke-width="1.2"/>
  <ellipse cx="-5" cy="-55" rx="8" ry="7" fill="#8D6E63" opacity="0.3" stroke="#4E342E" stroke-width="0.5"/>
  <text x="-5" y="-53" font-family="Arial,sans-serif" font-size="4" fill="#4E342E" text-anchor="middle">Мозг</text>
  <!-- Prominent jaw -->
  <path d="M-12,-45 L-5,-42 L2,-45" fill="#8D6E63" stroke="#4E342E" stroke-width="0.8"/>
  <!-- C-shaped spine -->
  <path d="M-5,-40 C-10,-30 -8,-20 -3,-10 C0,0 -2,10 -5,18" fill="none" stroke="#4E342E" stroke-width="2.5"/>
  <text x="25" y="-26" font-family="Arial,sans-serif" font-size="5" fill="#4E342E" font-weight="bold">C-образный</text>
  <text x="25" y="-19" font-family="Arial,sans-serif" font-size="5" fill="#4E342E">позвоночник</text>
  <!-- Ribcage -->
  <ellipse cx="-3" cy="-20" rx="14" ry="13" fill="none" stroke="#4E342E" stroke-width="1" stroke-dasharray="2,1" opacity="0.6"/>
  <!-- Arms - longer, reaching down -->
  <line x1="-5" y1="-32" x2="-28" y2="-8" stroke="#4E342E" stroke-width="2"/>
  <line x1="-28" y1="-8" x2="-30" y2="18" stroke="#4E342E" stroke-width="1.5"/>
  <line x1="-5" y1="-32" x2="16" y2="-14" stroke="#4E342E" stroke-width="2"/>
  <line x1="16" y1="-14" x2="18" y2="8" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Pelvis -->
  <ellipse cx="-3" cy="16" rx="12" ry="5" fill="#8D6E63" opacity="0.3" stroke="#4E342E" stroke-width="0.8"/>
  <!-- Legs - bent, knuckle-walking -->
  <line x1="-8" y1="20" x2="-15" y2="45" stroke="#4E342E" stroke-width="2"/>
  <line x1="-15" y1="45" x2="-20" y2="60" stroke="#4E342E" stroke-width="1.5"/>
  <line x1="2" y1="20" x2="5" y2="45" stroke="#4E342E" stroke-width="2"/>
  <line x1="5" y1="45" x2="2" y2="60" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Flat foot -->
  <path d="M-25,60 L-20,60 L-14,62" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <path d="M-2,62 L2,60 L8,60" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <text x="-8" y="70" font-family="Arial,sans-serif" font-size="4.5" fill="#4E342E" text-anchor="middle">Плоская</text>
  <text x="-8" y="75" font-family="Arial,sans-serif" font-size="4.5" fill="#4E342E" text-anchor="middle">стопа</text>
  <!-- Label -->
  <text x="-3" y="90" font-family="Arial,sans-serif" font-size="8" fill="#4E342E" text-anchor="middle" font-weight="bold">Шимпанзе</text>
</g>

<!-- Similarity callouts (middle area) -->
<g transform="translate(250,75)">
  <rect x="-35" y="-10" width="70" height="16" rx="3" fill="#4CAF50" opacity="0.2" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="2" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">СХОДСТВА</text>
</g>

<!-- Similarity indicators -->
<g>
  <!-- Similar organs -->
  <line x1="160" y1="106" x2="250" y2="95" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="340" y1="106" x2="250" y2="95" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="99" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Одинаковые органы</text>

  <!-- Spine structure -->
  <line x1="130" y1="130" x2="250" y2="118" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="370" y1="130" x2="250" y2="118" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="122" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Позвоночник</text>

  <!-- Four-chambered heart -->
  <line x1="130" y1="150" x2="250" y2="140" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="370" y1="150" x2="250" y2="140" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="144" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">4-камерное сердце</text>

  <!-- Warm-blooded -->
  <line x1="130" y1="170" x2="250" y2="160" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="370" y1="170" x2="250" y2="160" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="164" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Теплокровность</text>
</g>

<!-- Difference indicators -->
<g transform="translate(250,190)">
  <rect x="-35" y="-10" width="70" height="16" rx="3" fill="#F44336" opacity="0.15" stroke="#C62828" stroke-width="0.5"/>
  <text x="0" y="2" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">РАЗЛИЧИЯ</text>
</g>

<g>
  <line x1="120" y1="210" x2="250" y2="200" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="380" y1="210" x2="250" y2="200" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="204" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Форма позвоночника (S vs C)</text>

  <line x1="130" y1="226" x2="250" y2="216" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="370" y1="226" x2="250" y2="216" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="220" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Объём мозга (1400 vs 400 см³)</text>

  <line x1="122" y1="242" x2="250" y2="232" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="378" y1="242" x2="250" y2="232" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="250" y="236" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Строение стопы (свод vs плоская)</text>
</g>

<!-- Bottom panel: Key differences -->
<g transform="translate(20,258)">
  <rect x="0" y="0" width="460" height="62" rx="5" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
  <text x="230" y="14" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ключевые отличия человека от животных</text>
  <line x1="10" y1="19" x2="450" y2="19" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>

  <!-- Four columns for key differences -->
  <!-- Прямохождение -->
  <g transform="translate(58,25)">
    <circle cx="0" cy="0" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <!-- Walking figure icon -->
    <circle cx="0" cy="-5" r="2.5" fill="#2E7D32"/>
    <line x1="0" y1="-2.5" x2="0" y2="4" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="0" y1="4" x2="-3" y2="8" stroke="#2E7D32" stroke-width="1"/>
    <line x1="0" y1="4" x2="3" y2="8" stroke="#2E7D32" stroke-width="1"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Прямохождение</text>
  </g>

  <!-- Мозг -->
  <g transform="translate(173,25)">
    <circle cx="0" cy="0" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <!-- Brain icon -->
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
    <path d="M-3,-2 Q0,-4 3,-2" fill="none" stroke="#2E7D32" stroke-width="0.6"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Развитый мозг</text>
  </g>

  <!-- Речь -->
  <g transform="translate(288,25)">
    <circle cx="0" cy="0" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <!-- Speech bubble icon -->
    <rect x="-5" y="-5" width="10" height="7" rx="2" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
    <polygon points="-2,2 0,5 2,2" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Членоразд. речь</text>
  </g>

  <!-- Труд -->
  <g transform="translate(403,25)">
    <circle cx="0" cy="0" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <!-- Tool/hammer icon -->
    <line x1="-4" y1="4" x2="3" y2="-4" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="1" y="-7" width="5" height="4" rx="1" fill="#2E7D32" opacity="0.6"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Трудовая деят.</text>
  </g>
</g>

<!-- Footer bar -->
<rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Сравнительно-анатомические сходства и различия человека и приматов</text>
</svg>