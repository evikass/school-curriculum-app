<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="sympatheticGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCDD2"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <linearGradient id="parasympatheticGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="organGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Вегетативная нервная система</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 39</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== SYMPATHETIC COLUMN (left) ===== -->
  <rect x="15" y="48" width="155" height="215" rx="6" fill="white" fill-opacity="0.6" stroke="#E53935" stroke-width="1"/>
  <rect x="15" y="48" width="155" height="20" rx="6" fill="#E53935"/>
  <rect x="15" y="58" width="155" height="10" fill="#E53935"/>
  <text x="92" y="62" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial">СИМПАТИЧЕСКИЙ ОТДЕЛ</text>

  <!-- Fight or flight badge -->
  <rect x="35" y="73" width="115" height="14" rx="7" fill="#FFCDD2" stroke="#E53935" stroke-width="0.6"/>
  <text x="92" y="83" text-anchor="middle" font-size="7" font-weight="bold" fill="#C62828" font-family="Arial">«Бей или беги!»</text>

  <!-- Ganglia near spine diagram -->
  <rect x="22" y="93" width="38" height="80" rx="3" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="0.5"/>
  <text x="41" y="103" text-anchor="middle" font-size="4.5" fill="#666" font-family="Arial">Спинной</text>
  <text x="41" y="109" text-anchor="middle" font-size="4.5" fill="#666" font-family="Arial">мозг</text>

  <!-- Preganglionic fiber (short) -->
  <line x1="60" y1="115" x2="78" y2="115" stroke="#E53935" stroke-width="2"/>
  <!-- Ganglion -->
  <circle cx="82" y="115" r="6" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <text x="82" y="117" text-anchor="middle" font-size="4" fill="#C62828" font-family="Arial">Г</text>
  <!-- Postganglionic fiber (long) -->
  <line x1="88" y1="115" x2="135" y2="115" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="68" y="128" font-size="4.5" fill="#C62828" font-family="Arial">короткий</text>
  <text x="100" y="128" font-size="4.5" fill="#C62828" font-family="Arial">длинный</text>

  <!-- Ganglia chain -->
  <circle cx="82" cy="140" r="5" fill="#FFCDD2" stroke="#E53935" stroke-width="0.8"/>
  <circle cx="82" cy="155" r="5" fill="#FFCDD2" stroke="#E53935" stroke-width="0.8"/>
  <circle cx="82" cy="170" r="5" fill="#FFCDD2" stroke="#E53935" stroke-width="0.8"/>
  <line x1="82" y1="145" x2="82" y2="150" stroke="#E53935" stroke-width="1"/>
  <line x1="82" y1="160" x2="82" y2="165" stroke="#E53935" stroke-width="1"/>
  <text x="100" y="143" font-size="4.5" fill="#C62828" font-family="Arial">← Ганглии</text>
  <text x="100" y="150" font-size="4.5" fill="#C62828" font-family="Arial">  вдоль позвоночника</text>

  <!-- Effects list -->
  <text x="25" y="190" font-size="6" font-weight="bold" fill="#C62828" font-family="Arial">Эффекты:</text>
  <text x="25" y="200" font-size="5.5" fill="#333" font-family="Arial">↑ Частота сердцебиений</text>
  <text x="25" y="209" font-size="5.5" fill="#333" font-family="Arial">↑ Артериальное давление</text>
  <text x="25" y="218" font-size="5.5" fill="#333" font-family="Arial">↓ Пищеварение</text>
  <text x="25" y="227" font-size="5.5" fill="#333" font-family="Arial">↑ Зрачки расширяются</text>
  <text x="25" y="236" font-size="5.5" fill="#333" font-family="Arial">↑ Глюкоза в крови</text>
  <text x="25" y="245" font-size="5.5" fill="#333" font-family="Arial">↑ Бронхи расширяются</text>
  <text x="25" y="254" font-size="5.5" fill="#333" font-family="Arial">↑ Потливость</text>

  <!-- Neurotransmitter -->
  <rect x="25" y="258" width="135" height="3" rx="1" fill="#E53935" opacity="0.3"/>
  <text x="92" y="270" text-anchor="middle" font-size="5" font-weight="bold" fill="#C62828" font-family="Arial">Медиатор: норадреналин</text>

  <!-- ===== CENTRAL BODY WITH ORGANS ===== -->
  <rect x="175" y="48" width="150" height="215" rx="6" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="62" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">Органы-мишени</text>

  <!-- Body outline -->
  <ellipse cx="250" cy="155" rx="35" ry="70" fill="#FFF8E1" stroke="#FF8F00" stroke-width="0.8" opacity="0.5"/>

  <!-- Heart -->
  <path d="M250,100 Q240,92 235,98 Q230,105 238,112 L250,122 L262,112 Q270,105 265,98 Q260,92 250,100 Z" fill="#EF5350" stroke="#C62828" stroke-width="0.8"/>
  <text x="250" y="110" text-anchor="middle" font-size="5" font-weight="bold" fill="white" font-family="Arial">Сердце</text>

  <!-- Lungs -->
  <ellipse cx="232" cy="128" rx="14" ry="16" fill="#E1F5FE" stroke="#0288D1" stroke-width="0.6"/>
  <ellipse cx="268" cy="128" rx="14" ry="16" fill="#E1F5FE" stroke="#0288D1" stroke-width="0.6"/>
  <text x="232" y="131" text-anchor="middle" font-size="4" fill="#01579B" font-family="Arial">Лёгкое</text>
  <text x="268" y="131" text-anchor="middle" font-size="4" fill="#01579B" font-family="Arial">Лёгкое</text>

  <!-- Stomach -->
  <ellipse cx="250" cy="155" rx="18" ry="12" fill="#FFF3E0" stroke="#E65100" stroke-width="0.6"/>
  <text x="250" y="158" text-anchor="middle" font-size="5" fill="#BF360C" font-family="Arial">Желудок</text>

  <!-- Intestines -->
  <path d="M235,170 Q250,180 265,170 Q260,185 250,190 Q240,185 235,170 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.6"/>
  <text x="250" y="180" text-anchor="middle" font-size="4" fill="#F57F17" font-family="Arial">Кишечник</text>

  <!-- Eyes -->
  <circle cx="250" cy="88" r="4" fill="white" stroke="#333" stroke-width="0.5"/>
  <circle cx="250" cy="88" r="2" fill="#333"/>
  <text x="264" y="89" font-size="4" fill="#333" font-family="Arial">Глаза</text>

  <!-- Bladder -->
  <ellipse cx="250" cy="200" rx="10" ry="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <text x="250" y="203" text-anchor="middle" font-size="3.5" fill="#0D47A1" font-family="Arial">Мочевой</text>
  <text x="250" y="207" text-anchor="middle" font-size="3.5" fill="#0D47A1" font-family="Arial">пузырь</text>

  <!-- Dual innervation arrows -->
  <line x1="170" y1="105" x2="185" y2="100" stroke="#E53935" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="330" y1="105" x2="315" y2="100" stroke="#1E88E5" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="170" y1="155" x2="190" y2="155" stroke="#E53935" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="330" y1="155" x2="310" y2="155" stroke="#1E88E5" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Dual innervation note -->
  <text x="250" y="225" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Двойная иннервация</text>
  <text x="250" y="233" text-anchor="middle" font-size="5" fill="#333" font-family="Arial">Оба отдела воздействуют</text>
  <text x="250" y="240" text-anchor="middle" font-size="5" fill="#333" font-family="Arial">на одни и те же органы</text>
  <text x="250" y="250" text-anchor="middle" font-size="5" fill="#333" font-family="Arial">антагонистически</text>

  <!-- ===== PARASYMPATHETIC COLUMN (right) ===== -->
  <rect x="330" y="48" width="155" height="215" rx="6" fill="white" fill-opacity="0.6" stroke="#1E88E5" stroke-width="1"/>
  <rect x="330" y="48" width="155" height="20" rx="6" fill="#1E88E5"/>
  <rect x="330" y="58" width="155" height="10" fill="#1E88E5"/>
  <text x="407" y="62" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial">ПАРАСИМПАТИЧЕСКИЙ ОТДЕЛ</text>

  <!-- Rest and digest badge -->
  <rect x="345" y="73" width="125" height="14" rx="7" fill="#BBDEFB" stroke="#1E88E5" stroke-width="0.6"/>
  <text x="407" y="83" text-anchor="middle" font-size="7" font-weight="bold" fill="#0D47A1" font-family="Arial">«Отдыхай и восстанавливай»</text>

  <!-- Ganglia near organs diagram -->
  <rect x="440" y="93" width="38" height="80" rx="3" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="0.5"/>
  <text x="459" y="103" text-anchor="middle" font-size="4.5" fill="#666" font-family="Arial">Спинной</text>
  <text x="459" y="109" text-anchor="middle" font-size="4.5" fill="#666" font-family="Arial">мозг</text>

  <!-- Preganglionic fiber (long) -->
  <line x1="440" y1="115" x2="408" y2="115" stroke="#1E88E5" stroke-width="2"/>
  <!-- Ganglion -->
  <circle cx="404" cy="115" r="6" fill="#BBDEFB" stroke="#1E88E5" stroke-width="1"/>
  <text x="404" y="117" text-anchor="middle" font-size="4" fill="#0D47A1" font-family="Arial">Г</text>
  <!-- Postganglionic fiber (short) -->
  <line x1="398" y1="115" x2="365" y2="115" stroke="#1E88E5" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="430" y="128" font-size="4.5" fill="#0D47A1" font-family="Arial">длинный</text>
  <text x="393" y="128" font-size="4.5" fill="#0D47A1" font-family="Arial">короткий</text>

  <!-- Ganglia near organs -->
  <text x="365" y="143" font-size="4.5" fill="#0D47A1" font-family="Arial">Ганглии вблизи</text>
  <text x="365" y="150" font-size="4.5" fill="#0D47A1" font-family="Arial">органов или в стенке →</text>

  <!-- Craniosacral origin -->
  <text x="345" y="165" font-size="5" font-weight="bold" fill="#0D47A1" font-family="Arial">Источник:</text>
  <text x="345" y="173" font-size="5" fill="#333" font-family="Arial">• Черепные нервы (III, VII, IX, X)</text>
  <text x="345" y="181" font-size="5" fill="#333" font-family="Arial">• Крестцовые нервы (S2-S4)</text>

  <!-- Effects list -->
  <text x="340" y="195" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Эффекты:</text>
  <text x="340" y="205" font-size="5.5" fill="#333" font-family="Arial">↓ Частота сердцебиений</text>
  <text x="340" y="214" font-size="5.5" fill="#333" font-family="Arial">↓ Артериальное давление</text>
  <text x="340" y="223" font-size="5.5" fill="#333" font-family="Arial">↑ Пищеварение</text>
  <text x="340" y="232" font-size="5.5" fill="#333" font-family="Arial">↓ Зрачки сужаются</text>
  <text x="340" y="241" font-size="5.5" fill="#333" font-family="Arial">↑ Слюноотделение</text>
  <text x="340" y="250" font-size="5.5" fill="#333" font-family="Arial">↑ Перистальтика</text>

  <!-- Neurotransmitter -->
  <rect x="340" y="258" width="135" height="3" rx="1" fill="#1E88E5" opacity="0.3"/>
  <text x="407" y="270" text-anchor="middle" font-size="5" font-weight="bold" fill="#0D47A1" font-family="Arial">Медиатор: ацетилхолин</text>

  <!-- ===== BOTTOM PANEL: Antagonistic Effects ===== -->
  <rect x="15" y="275" width="470" height="48" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="288" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">Антагонистическое действие на органы</text>

  <!-- Comparison table -->
  <text x="60" y="298" font-size="5.5" font-weight="bold" fill="#333" font-family="Arial">Орган</text>
  <text x="170" y="298" font-size="5.5" font-weight="bold" fill="#C62828" font-family="Arial">Симпатический</text>
  <text x="340" y="298" font-size="5.5" font-weight="bold" fill="#0D47A1" font-family="Arial">Парасимпатический</text>

  <line x1="20" y1="300" x2="480" y2="300" stroke="#ccc" stroke-width="0.5"/>

  <text x="60" y="309" font-size="5" fill="#333" font-family="Arial">Сердце</text>
  <text x="170" y="309" font-size="5" fill="#C62828" font-family="Arial">↑ частота и сила</text>
  <text x="340" y="309" font-size="5" fill="#0D47A1" font-family="Arial">↓ частота и сила</text>

  <text x="60" y="317" font-size="5" fill="#333" font-family="Arial">Зрачок</text>
  <text x="170" y="317" font-size="5" fill="#C62828" font-family="Arial">расширение (мидриаз)</text>
  <text x="340" y="317" font-size="5" fill="#0D47A1" font-family="Arial">сужение (миоз)</text>

  <!-- Footer bar -->
  <rect x="2" y="325" width="496" height="23" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="340" text-anchor="middle" font-size="8" fill="white" font-family="Arial">ВНС работает автоматически, обеспечивая гомеостаз внутренних органов</text>
</svg>