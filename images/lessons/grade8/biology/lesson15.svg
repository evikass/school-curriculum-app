<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Внутренняя среда организма. Состав крови</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 15</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Blood composition bar chart -->
<g transform="translate(155,115)">
  <rect x="-120" y="-55" width="240" height="110" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="-42" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Состав крови</text>
  <line x1="-110" y1="-36" x2="110" y2="-36" stroke="#A5D6A7" stroke-width="0.5"/>

  <!-- Stacked bar -->
  <!-- Плазма 55% -->
  <rect x="-100" y="-28" width="110" height="50" rx="0" fill="#FFE0B2" stroke="#E65100" stroke-width="0.8"/>
  <text x="-45" y="-8" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Плазма</text>
  <text x="-45" y="4" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle">55%</text>
  <text x="-45" y="14" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Вода 90%, белки</text>

  <!-- Форменные элементы 45% -->
  <rect x="10" y="-28" width="90" height="50" rx="0" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="55" y="-8" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Форменные</text>
  <text x="55" y="2" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">элементы</text>
  <text x="55" y="14" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C" text-anchor="middle">45%</text>
</g>

<!-- Erythrocyte (red blood cell) detail -->
<g transform="translate(80,210)">
  <rect x="-55" y="-40" width="110" height="80" rx="5" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1"/>
  <rect x="-55" y="-40" width="110" height="14" rx="5" fill="#C62828" opacity="0.85"/>
  <rect x="-55" y="-30" width="110" height="4" fill="#C62828" opacity="0.85"/>
  <text x="0" y="-29" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Эритроциты</text>

  <!-- Biconcave disc shape (top view) -->
  <ellipse cx="0" cy="2" rx="22" ry="14" fill="#EF5350" opacity="0.6" stroke="#C62828" stroke-width="1"/>
  <ellipse cx="0" cy="2" rx="8" ry="6" fill="#FFCDD2" opacity="0.6" stroke="#EF9A9A" stroke-width="0.5"/>

  <!-- Side view -->
  <g transform="translate(0,28)">
    <ellipse cx="-30" cy="0" rx="4" ry="10" fill="#EF5350" opacity="0.5" stroke="#C62828" stroke-width="0.8"/>
    <text x="-30" y="14" font-family="Arial,sans-serif" font-size="4" fill="#C62828" text-anchor="middle">вид сбоку</text>
  </g>

  <text x="0" y="22" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Двояковогнутый диск</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Без ядра</text>
  <text x="0" y="36" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">4,5-5,5 млн/мкл</text>
</g>

<!-- Leukocyte (white blood cell) detail -->
<g transform="translate(250,210)">
  <rect x="-55" y="-40" width="110" height="80" rx="5" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1"/>
  <rect x="-55" y="-40" width="110" height="14" rx="5" fill="#1565C0" opacity="0.85"/>
  <rect x="-55" y="-30" width="110" height="4" fill="#1565C0" opacity="0.85"/>
  <text x="0" y="-29" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Лейкоциты</text>

  <!-- Irregular shape with nucleus -->
  <path d="M-15,-2 Q-22,-8 -18,-15 Q-12,-20 -5,-15 Q0,-22 8,-18 Q15,-15 12,-8 Q18,-2 14,5 Q15,12 8,15 Q2,18 -5,14 Q-12,18 -16,12 Q-20,5 -15,-2 Z" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <!-- Multi-lobed nucleus -->
  <ellipse cx="-3" cy="-5" rx="6" ry="4" fill="#42A5F5" opacity="0.5" stroke="#1565C0" stroke-width="0.8"/>
  <ellipse cx="4" cy="2" rx="5" ry="3" fill="#42A5F5" opacity="0.5" stroke="#1565C0" stroke-width="0.8"/>
  <ellipse cx="-2" cy="5" rx="4" ry="3" fill="#42A5F5" opacity="0.5" stroke="#1565C0" stroke-width="0.8"/>

  <text x="0" y="24" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Неправильная форма</text>
  <text x="0" y="31" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">С ядром, амёбовидные</text>
  <text x="0" y="37" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" font-weight="bold">6-8 тыс/мкл</text>
</g>

<!-- Platelet (thrombocyte) detail -->
<g transform="translate(420,210)">
  <rect x="-45" y="-40" width="90" height="80" rx="5" fill="white" opacity="0.92" stroke="#7B1FA2" stroke-width="1"/>
  <rect x="-45" y="-40" width="90" height="14" rx="5" fill="#7B1FA2" opacity="0.85"/>
  <rect x="-45" y="-30" width="90" height="4" fill="#7B1FA2" opacity="0.85"/>
  <text x="0" y="-29" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Тромбоциты</text>

  <!-- Small fragments -->
  <ellipse cx="-10" cy="0" rx="8" ry="5" fill="#E1BEE7" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <ellipse cx="8" cy="-5" rx="6" ry="4" fill="#E1BEE7" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <ellipse cx="5" cy="8" rx="7" ry="4" fill="#E1BEE7" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Granules inside -->
  <circle cx="-10" cy="0" r="1.5" fill="#CE93D8" opacity="0.6"/>
  <circle cx="-7" cy="-1" r="1" fill="#CE93D8" opacity="0.6"/>
  <circle cx="8" cy="-5" r="1" fill="#CE93D8" opacity="0.6"/>
  <circle cx="6" cy="-3" r="1.2" fill="#CE93D8" opacity="0.6"/>
  <circle cx="5" cy="8" r="1.2" fill="#CE93D8" opacity="0.6"/>

  <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">Мелкие фрагменты</text>
  <text x="0" y="27" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Без ядра</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle" font-weight="bold">200-400 тыс/мкл</text>
</g>

<!-- Side panel: Functions of blood -->
<g transform="translate(420,100)">
  <rect x="-50" y="-35" width="100" height="70" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <rect x="-50" y="-35" width="100" height="14" rx="5" fill="#2E7D32" opacity="0.85"/>
  <rect x="-50" y="-25" width="100" height="4" fill="#2E7D32" opacity="0.85"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Функции крови</text>

  <!-- Транспортная -->
  <g transform="translate(0,-8)">
    <rect x="-42" y="-5" width="84" height="14" rx="2" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <circle cx="-32" cy="2" r="4" fill="#1565C0" opacity="0.4"/>
    <text x="-32" y="4" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">🚚</text>
    <text x="5" y="4" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Транспортная</text>
  </g>

  <!-- Защитная -->
  <g transform="translate(0,10)">
    <rect x="-42" y="-5" width="84" height="14" rx="2" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Защитная</text>
  </g>

  <!-- Регуляторная -->
  <g transform="translate(0,28)">
    <rect x="-42" y="-5" width="84" height="14" rx="2" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Регуляторная</text>
  </g>
</g>

<!-- Bottom panel: Plasma composition & internal environment -->
<g transform="translate(30,300)">
  <rect x="0" y="0" width="440" height="32" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="220" y="12" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Внутренняя среда: кровь, лимфа, тканевая жидкость — поддержание гомеостаза</text>
  <line x1="10" y1="16" x2="430" y2="16" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="220" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Плазма: H₂O 90% | Белки (альбумины, глобулины, фибриноген) | Глюкоза, мочевина, соли | Гормоны, витамины</text>
</g>

<rect x="10" y="336" width="480" height="8" rx="4" fill="#2E7D32" opacity="0.85"/>
</svg>