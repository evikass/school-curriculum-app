<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="30" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Кровообращение</text>
<text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 8 класс — Урок 15</text>
<line x1="30" y1="52" x2="470" y2="52" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<g transform="translate(250,175)">
<ellipse cx="0" cy="0" rx="45" ry="50" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
<line x1="-5" y1="-45" x2="-5" y2="45" stroke="#C62828" stroke-width="1.5"/>
<line x1="-45" y1="0" x2="45" y2="0" stroke="#C62828" stroke-width="1.5"/>
<!-- 4 chambers -->
<text x="-22" y="-25" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">П.пред.</text>
<text x="22" y="-25" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Л.пред.</text>
<text x="-22" y="20" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">П.жел.</text>
<text x="22" y="20" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Л.жел.</text>
<!-- Valves -->
<path d="M-22,-5 Q-18,-2 -14,-5" stroke="#E65100" stroke-width="1.5" fill="none"/>
<path d="M14,-5 Q18,-2 22,-5" stroke="#E65100" stroke-width="1.5" fill="none"/>
<!-- Arteries/veins -->
<line x1="22" y1="-45" x2="22" y2="-58" stroke="#C62828" stroke-width="2.5"/>
<line x1="-22" y1="-45" x2="-22" y2="-58" stroke="#1565C0" stroke-width="2.5"/>
<line x1="22" y1="45" x2="22" y2="58" stroke="#C62828" stroke-width="2.5"/>
<line x1="-22" y1="45" x2="-22" y2="58" stroke="#1565C0" stroke-width="2.5"/>
</g>
<g transform="translate(80,200)">
<text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Вены (синяя)</text>
</g>
<g transform="translate(420,200)">
<text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Артерии (красная)</text>
</g>
<rect x="30" y="280" width="440" height="30" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="294" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4 камеры: 2 предсердия + 2 желудочка | Клапаны: створчатые, полулунные</text>
<text x="250" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2 круга: большой (аорта-тело-полые вены) и малый (лёгочная артерия-лёгкие-вены)</text>
<text x="250" y="316" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Автоматия сердца: синусно-предсердный узел | Пульс: 60-80 уд/мин</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 8 класс</text>
</svg>