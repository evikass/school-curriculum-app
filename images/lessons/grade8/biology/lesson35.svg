<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD0"/>
      <stop offset="100%" style="stop-color:#F48FB1"/>
    </linearGradient>
    <linearGradient id="spinalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1BEE7"/>
      <stop offset="100%" style="stop-color:#CE93D8"/>
    </linearGradient>
    <linearGradient id="neuronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE0B2"/>
      <stop offset="100%" style="stop-color:#FFCC80"/>
    </linearGradient>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E65100"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20" font-family="Arial">Значение нервной системы. Строение нервной системы</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 35</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- NERVOUS SYSTEM OVERVIEW (left) -->
  <text x="100" y="57" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A148C" font-family="Arial">НЕРВНАЯ СИСТЕМА</text>

  <!-- Brain -->
  <ellipse cx="100" cy="82" rx="35" ry="25" fill="url(#brainGrad)" stroke="#880E4F" stroke-width="1.2"/>
  <!-- Brain folds -->
  <path d="M72,75 Q85,70 95,78 Q105,70 120,77" fill="none" stroke="#880E4F" stroke-width="0.5"/>
  <path d="M75,85 Q90,80 100,87 Q110,80 128,85" fill="none" stroke="#880E4F" stroke-width="0.5"/>
  <path d="M78,95 Q95,90 108,95" fill="none" stroke="#880E4F" stroke-width="0.5"/>
  <text x="100" y="88" text-anchor="middle" font-size="6" font-weight="bold" fill="#880E4F" font-family="Arial">Головной</text>
  <text x="100" y="96" text-anchor="middle" font-size="6" font-weight="bold" fill="#880E4F" font-family="Arial">мозг</text>

  <!-- Spinal cord -->
  <rect x="92" y="107" width="16" height="120" rx="5" fill="url(#spinalGrad)" stroke="#6A1B9A" stroke-width="1"/>
  <!-- Spinal segments -->
  <line x1="94" y1="120" x2="106" y2="120" stroke="#6A1B9A" stroke-width="0.3"/>
  <line x1="94" y1="135" x2="106" y2="135" stroke="#6A1B9A" stroke-width="0.3"/>
  <line x1="94" y1="150" x2="106" y2="150" stroke="#6A1B9A" stroke-width="0.3"/>
  <line x1="94" y1="165" x2="106" y2="165" stroke="#6A1B9A" stroke-width="0.3"/>
  <line x1="94" y1="180" x2="106" y2="180" stroke="#6A1B9A" stroke-width="0.3"/>
  <line x1="94" y1="195" x2="106" y2="195" stroke="#6A1B9A" stroke-width="0.3"/>
  <line x1="94" y1="210" x2="106" y2="210" stroke="#6A1B9A" stroke-width="0.3"/>
  <text x="100" y="240" text-anchor="middle" font-size="6" font-weight="bold" fill="#6A1B9A" font-family="Arial">Спинной мозг</text>

  <!-- Spinal nerves branching out -->
  <line x1="92" y1="120" x2="68" y2="125" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="108" y1="120" x2="132" y2="125" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="92" y1="140" x2="62" y2="148" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="108" y1="140" x2="138" y2="148" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="92" y1="160" x2="58" y2="170" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="108" y1="160" x2="142" y2="170" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="92" y1="180" x2="55" y2="192" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="108" y1="180" x2="145" y2="192" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="92" y1="200" x2="58" y2="214" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="108" y1="200" x2="142" y2="214" stroke="#7B1FA2" stroke-width="0.7"/>

  <!-- Cranial nerves from brain -->
  <line x1="70" y1="75" x2="45" y2="68" stroke="#880E4F" stroke-width="0.7"/>
  <line x1="68" y1="82" x2="42" y2="82" stroke="#880E4F" stroke-width="0.7"/>
  <line x1="70" y1="90" x2="45" y2="96" stroke="#880E4F" stroke-width="0.7"/>
  <line x1="130" y1="75" x2="155" y2="68" stroke="#880E4F" stroke-width="0.7"/>
  <line x1="132" y1="82" x2="158" y2="82" stroke="#880E4F" stroke-width="0.7"/>
  <line x1="130" y1="90" x2="155" y2="96" stroke="#880E4F" stroke-width="0.7"/>

  <!-- CNS/PNS labels -->
  <rect x="20" y="62" width="38" height="28" rx="3" fill="#FCE4EC" stroke="#880E4F" stroke-width="0.5"/>
  <text x="39" y="74" text-anchor="middle" font-size="5" font-weight="bold" fill="#880E4F" font-family="Arial">12 пар</text>
  <text x="39" y="82" text-anchor="middle" font-size="5" font-weight="bold" fill="#880E4F" font-family="Arial">черепн.</text>
  <text x="39" y="88" text-anchor="middle" font-size="4.5" fill="#880E4F" font-family="Arial">нервов</text>

  <rect x="140" y="62" width="38" height="22" rx="3" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.5"/>
  <text x="159" y="74" text-anchor="middle" font-size="5" font-weight="bold" fill="#7B1FA2" font-family="Arial">31 пара</text>
  <text x="159" y="82" text-anchor="middle" font-size="4.5" fill="#7B1FA2" font-family="Arial">спинномозг.</text>

  <!-- CNS bracket -->
  <path d="M55,55 L55,52 L155,52 L155,55" fill="none" stroke="#4A148C" stroke-width="0.8"/>
  <text x="105" y="49" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#4A148C" font-family="Arial">ЦНС (центральная)</text>

  <!-- PNS bracket -->
  <path d="M30,65 L27,65 L27,218 L30,218" fill="none" stroke="#7B1FA2" stroke-width="0.6"/>
  <text x="23" y="145" font-size="5" font-weight="bold" fill="#7B1FA2" font-family="Arial" transform="rotate(-90,23,145)">ПНС (периферическая)</text>

  <!-- NEURON STRUCTURE (right top) -->
  <rect x="175" y="50" width="315" height="120" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.8" opacity="0.7"/>
  <text x="332" y="64" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial">СТРОЕНИЕ НЕЙРОНА</text>

  <!-- Soma (cell body) -->
  <ellipse cx="270" cy="115" rx="22" ry="18" fill="url(#neuronGrad)" stroke="#E65100" stroke-width="1.2"/>
  <!-- Nucleus -->
  <circle cx="270" cy="115" r="8" fill="#FFE0B2" stroke="#F57C00" stroke-width="0.6"/>
  <text x="270" y="117" text-anchor="middle" font-size="4" fill="#E65100" font-family="Arial">ядро</text>

  <!-- Dendrites (left side of soma) -->
  <path d="M250,108 Q230,95 215,88" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <path d="M248,115 Q225,112 210,108" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <path d="M250,122 Q228,130 212,135" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <!-- Dendrite branches -->
  <path d="M215,88 Q205,82 195,80" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M215,88 Q208,92 198,92" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M210,108 Q200,104 190,105" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M210,108 Q200,112 192,115" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M212,135 Q202,132 194,130" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M212,135 Q204,140 196,142" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <!-- Dendrite label -->
  <text x="200" y="75" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial">Дендриты</text>

  <!-- Axon (right side of soma) -->
  <path d="M292,115 Q310,115 330,118 Q350,121 370,117 Q390,113 410,116 Q430,119 450,115" fill="none" stroke="#E65100" stroke-width="2"/>

  <!-- Myelin sheath segments -->
  <rect x="305" y="108" width="18" height="16" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6" opacity="0.7"/>
  <rect x="333" y="109" width="18" height="16" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6" opacity="0.7"/>
  <rect x="361" y="107" width="18" height="16" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6" opacity="0.7"/>
  <rect x="389" y="107" width="18" height="16" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6" opacity="0.7"/>
  <rect x="417" y="108" width="18" height="16" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6" opacity="0.7"/>

  <!-- Nodes of Ranvier -->
  <line x1="323" y1="110" x2="323" y2="124" stroke="#E65100" stroke-width="1.5"/>
  <line x1="351" y1="110" x2="351" y2="124" stroke="#E65100" stroke-width="1.5"/>
  <line x1="379" y1="108" x2="379" y2="122" stroke="#E65100" stroke-width="1.5"/>
  <line x1="407" y1="108" x2="407" y2="122" stroke="#E65100" stroke-width="1.5"/>
  <line x1="435" y1="109" x2="435" y2="123" stroke="#E65100" stroke-width="1.5"/>

  <!-- Axon label -->
  <text x="380" y="95" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial">Аксон</text>
  <!-- Myelin label -->
  <text x="340" y="140" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#1565C0" font-family="Arial">Миелиновая оболочка</text>
  <!-- Node of Ranvier label -->
  <text x="370" y="150" text-anchor="middle" font-size="5" fill="#1565C0" font-family="Arial">Перехваты Ранвье ↑</text>

  <!-- Axon terminals -->
  <path d="M450,115 Q458,108 465,105" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M450,115 Q458,115 465,115" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M450,115 Q458,122 465,125" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="467" cy="105" r="2.5" fill="#FF8A65"/>
  <circle cx="467" cy="115" r="2.5" fill="#FF8A65"/>
  <circle cx="467" cy="125" r="2.5" fill="#FF8A65"/>
  <text x="468" y="98" font-size="5" fill="#E65100" font-family="Arial">Синапсы</text>

  <!-- Soma label -->
  <text x="270" y="145" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial">Тело клетки</text>
  <text x="270" y="153" text-anchor="middle" font-size="5" fill="#E65100" font-family="Arial">(сома)</text>

  <!-- REFLEX ARC (bottom) -->
  <rect x="10" y="255" width="480" height="68" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.8" opacity="0.9"/>
  <text x="250" y="268" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial">РЕФЛЕКТОРНАЯ ДУГА (путь нервного импульса)</text>
  <line x1="20" y1="273" x2="480" y2="273" stroke="#2E7D32" stroke-width="0.4"/>

  <!-- Reflex arc components -->
  <!-- 1. Stimulus/Receptor -->
  <rect x="18" y="278" width="60" height="35" rx="4" fill="#FFECB3" stroke="#FF8F00" stroke-width="0.8"/>
  <text x="48" y="293" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#E65100" font-family="Arial">Стимул →</text>
  <text x="48" y="302" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#E65100" font-family="Arial">Рецептор</text>
  <text x="48" y="310" text-anchor="middle" font-size="4.5" fill="#E65100" font-family="Arial">(кожа)</text>
  <path d="M78,295 L88,295" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- 2. Sensory neuron -->
  <rect x="90" y="278" width="70" height="35" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="125" y="293" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Чувствительн.</text>
  <text x="125" y="302" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#1B5E20" font-family="Arial">нейрон</text>
  <text x="125" y="310" text-anchor="middle" font-size="4.5" fill="#1B5E20" font-family="Arial">(афферентн.)</text>
  <path d="M160,295 L170,295" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- 3. CNS -->
  <rect x="172" y="278" width="65" height="35" rx="4" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="204" y="293" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#4A148C" font-family="Arial">ЦНС</text>
  <text x="204" y="302" text-anchor="middle" font-size="5" fill="#4A148C" font-family="Arial">(спинной мозг)</text>
  <text x="204" y="310" text-anchor="middle" font-size="4.5" fill="#4A148C" font-family="Arial">↕ вставочный н.</text>
  <path d="M237,295 L247,295" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- 4. Motor neuron -->
  <rect x="249" y="278" width="70" height="35" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
  <text x="284" y="293" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#0D47A1" font-family="Arial">Двигательный</text>
  <text x="284" y="302" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#0D47A1" font-family="Arial">нейрон</text>
  <text x="284" y="310" text-anchor="middle" font-size="4.5" fill="#0D47A1" font-family="Arial">(эфферентн.)</text>
  <path d="M319,295 L329,295" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- 5. Working organ -->
  <rect x="331" y="278" width="60" height="35" rx="4" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.8"/>
  <text x="361" y="293" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#BF360C" font-family="Arial">Рабочий</text>
  <text x="361" y="302" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#BF360C" font-family="Arial">орган</text>
  <text x="361" y="310" text-anchor="middle" font-size="4.5" fill="#BF360C" font-family="Arial">(мышца/железа)</text>

  <!-- Feedback arrow -->
  <path d="M361,314 Q361,318 204,318 Q48,318 48,314" fill="none" stroke="#FF8F00" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arrowO)"/>
  <text x="204" y="324" text-anchor="middle" font-size="4.5" fill="#E65100" font-family="Arial">Обратная связь</text>

  <!-- Side panel: Functions -->
  <rect x="175" y="175" width="145" height="75" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.8" opacity="0.9"/>
  <text x="247" y="190" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">ФУНКЦИИ НС</text>
  <line x1="185" y1="195" x2="310" y2="195" stroke="#2E7D32" stroke-width="0.4"/>
  <rect x="185" y="200" width="125" height="14" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.4"/>
  <text x="247" y="210" text-anchor="middle" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial">1. Регуляторная</text>
  <rect x="185" y="217" width="125" height="14" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.4"/>
  <text x="247" y="227" text-anchor="middle" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial">2. Координирующая</text>
  <rect x="185" y="234" width="125" height="14" rx="2" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.4"/>
  <text x="247" y="244" text-anchor="middle" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial">3. Интегративная</text>

  <!-- Key facts -->
  <rect x="325" y="175" width="165" height="75" rx="5" fill="#FAFAFA" stroke="#7B1FA2" stroke-width="0.6"/>
  <text x="407" y="190" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#4A148C" font-family="Arial">КЛЮЧЕВЫЕ ФАКТЫ</text>
  <line x1="335" y1="195" x2="480" y2="195" stroke="#7B1FA2" stroke-width="0.3"/>
  <text x="335" y="206" font-size="5.5" fill="#333" font-family="Arial">• Нейронов в мозге: ~86 млрд</text>
  <text x="335" y="216" font-size="5.5" fill="#333" font-family="Arial">• Скорость импульса: до 120 м/с</text>
  <text x="335" y="226" font-size="5.5" fill="#333" font-family="Arial">• Синапс — место контакта нейронов</text>
  <text x="335" y="236" font-size="5.5" fill="#333" font-family="Arial">• Нейромедиаторы — хим. вещества</text>
  <text x="335" y="246" font-size="5.5" fill="#333" font-family="Arial">• Рефлекс — ответная реакция</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
  <text x="250" y="343" text-anchor="middle" font-size="8" fill="white" font-family="Arial">Нервная система — основа регуляции и координации организма | Рефлекс — единица деятельности НС</text>
</svg>