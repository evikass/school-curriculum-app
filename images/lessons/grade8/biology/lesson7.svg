<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<radialGradient id="cytoGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></radialGradient>
<radialGradient id="nucleusGrad" cx="40%" cy="40%" r="50%"><stop offset="0%" stop-color="#7986CB"/><stop offset="100%" stop-color="#3F51B5"/></radialGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Клетка: строение и функции</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 7</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Main cell body - large ellipse -->
<ellipse cx="200" cy="200" rx="120" ry="90" fill="url(#cytoGrad)" stroke="#1565C0" stroke-width="2.5"/>
<!-- Cell membrane (double line effect) -->
<ellipse cx="200" cy="200" rx="124" ry="94" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

<!-- Nucleus -->
<ellipse cx="200" cy="195" rx="38" ry="30" fill="url(#nucleusGrad)" stroke="#1A237E" stroke-width="1.5" opacity="0.9"/>
<!-- Nucleolus -->
<circle cx="208" cy="190" r="8" fill="#E8EAF6" stroke="#283593" stroke-width="1" opacity="0.8"/>
<!-- Chromatin strands in nucleus -->
<path d="M185,188 Q192,182 200,186 Q208,190 215,185" fill="none" stroke="#C5CAE9" stroke-width="0.8" opacity="0.6"/>
<path d="M188,198 Q195,192 203,196 Q210,200 218,194" fill="none" stroke="#C5CAE9" stroke-width="0.8" opacity="0.6"/>

<!-- Nuclear envelope pores (small dots) -->
<circle cx="178" cy="195" r="1.2" fill="#283593"/>
<circle cx="183" cy="210" r="1.2" fill="#283593"/>
<circle cx="222" cy="195" r="1.2" fill="#283593"/>
<circle cx="210" cy="220" r="1.2" fill="#283593"/>
<circle cx="195" cy="170" r="1.2" fill="#283593"/>

<!-- Rough ER (near nucleus) - wavy lines with ribosomes -->
<path d="M150,175 Q160,168 170,175 Q180,182 160,188 Q150,192 145,185" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
<circle cx="155" cy="172" r="1.5" fill="#E65100"/>
<circle cx="163" cy="178" r="1.5" fill="#E65100"/>
<circle cx="152" cy="185" r="1.5" fill="#E65100"/>
<circle cx="158" cy="190" r="1.5" fill="#E65100"/>
<path d="M145,160 Q155,153 165,160 Q175,167 155,173 Q145,177 140,170" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
<circle cx="150" cy="157" r="1.5" fill="#E65100"/>
<circle cx="158" cy="163" r="1.5" fill="#E65100"/>
<circle cx="147" cy="170" r="1.5" fill="#E65100"/>

<!-- Smooth ER -->
<path d="M240,170 Q250,163 260,170 Q270,177 260,183 Q250,189 245,182" fill="none" stroke="#66BB6A" stroke-width="1.2"/>
<path d="M245,155 Q255,148 265,155 Q275,162 265,168 Q255,174 250,167" fill="none" stroke="#66BB6A" stroke-width="1.2"/>

<!-- Golgi apparatus (stack of curved cisternae) -->
<g transform="translate(265,210)">
  <path d="M-20,-8 Q0,-14 20,-8" fill="none" stroke="#FF9800" stroke-width="2"/>
  <path d="M-22,-3 Q0,-9 22,-3" fill="none" stroke="#FFA726" stroke-width="2"/>
  <path d="M-24,2 Q0,-4 24,2" fill="none" stroke="#FFB74D" stroke-width="2"/>
  <path d="M-22,7 Q0,1 22,7" fill="none" stroke="#FFCC80" stroke-width="2"/>
  <path d="M-20,12 Q0,6 20,12" fill="none" stroke="#FFE0B2" stroke-width="2"/>
  <!-- Vesicles budding off -->
  <circle cx="25" cy="-5" r="3" fill="#FFE0B2" stroke="#FF9800" stroke-width="0.8"/>
  <circle cx="26" cy="5" r="3" fill="#FFE0B2" stroke="#FF9800" stroke-width="0.8"/>
  <circle cx="-24" cy="0" r="2.5" fill="#FFE0B2" stroke="#FF9800" stroke-width="0.8"/>
</g>

<!-- Mitochondria (two of them) -->
<g transform="translate(150,230) rotate(-20)">
  <ellipse cx="0" cy="0" rx="22" ry="9" fill="#FFCDD2" stroke="#C62828" stroke-width="1.3"/>
  <!-- Inner cristae -->
  <path d="M-12,-4 Q-8,4 -4,-4" fill="none" stroke="#E57373" stroke-width="0.8"/>
  <path d="M-4,-4 Q0,4 4,-4" fill="none" stroke="#E57373" stroke-width="0.8"/>
  <path d="M4,-4 Q8,4 12,-4" fill="none" stroke="#E57373" stroke-width="0.8"/>
</g>
<g transform="translate(170,255) rotate(15)">
  <ellipse cx="0" cy="0" rx="18" ry="7" fill="#FFCDD2" stroke="#C62828" stroke-width="1.3"/>
  <path d="M-10,-3 Q-5,3 0,-3" fill="none" stroke="#E57373" stroke-width="0.8"/>
  <path d="M0,-3 Q5,3 10,-3" fill="none" stroke="#E57373" stroke-width="0.8"/>
</g>

<!-- Lysosomes -->
<circle cx="240" cy="250" r="7" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1"/>
<circle cx="248" cy="255" r="5" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="0.8"/>

<!-- Ribosomes (scattered free ones) -->
<circle cx="140" cy="220" r="1.8" fill="#E65100"/>
<circle cx="135" cy="225" r="1.8" fill="#E65100"/>
<circle cx="145" cy="215" r="1.8" fill="#E65100"/>
<circle cx="250" cy="155" r="1.8" fill="#E65100"/>
<circle cx="255" cy="160" r="1.8" fill="#E65100"/>

<!-- Centrosome / Centrioles -->
<g transform="translate(225,145)">
  <rect x="-5" y="-8" width="4" height="16" rx="1" fill="#90A4AE" stroke="#546E7A" stroke-width="0.8"/>
  <rect x="1" y="-8" width="4" height="16" rx="1" fill="#B0BEC5" stroke="#546E7A" stroke-width="0.8" transform="rotate(90,3,0)"/>
</g>

<!-- LABELS with leader lines -->
<!-- Cell membrane label -->
<line x1="95" y1="130" x2="95" y2="155" stroke="#555" stroke-width="0.6"/>
<line x1="95" y1="155" x2="82" y2="155" stroke="#555" stroke-width="0.6"/>
<text x="93" y="128" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold" text-anchor="end">Клеточная</text>
<text x="93" y="136" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold" text-anchor="end">мембрана</text>

<!-- Cytoplasm label -->
<text x="115" y="270" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" font-weight="bold">Цитоплазма</text>
<line x1="135" y1="265" x2="150" y2="260" stroke="#555" stroke-width="0.5"/>

<!-- Nucleus label -->
<line x1="200" y1="168" x2="200" y2="158" stroke="#555" stroke-width="0.6"/>
<text x="200" y="155" font-family="Arial,sans-serif" font-size="7" fill="#1A237E" font-weight="bold" text-anchor="middle">Ядро</text>

<!-- Nucleolus label -->
<line x1="218" y1="190" x2="235" y2="180" stroke="#555" stroke-width="0.5"/>
<text x="237" y="178" font-family="Arial,sans-serif" font-size="6" fill="#283593" font-weight="bold">Ядрышко</text>

<!-- Rough ER label -->
<line x1="140" y1="155" x2="125" y2="145" stroke="#555" stroke-width="0.5"/>
<text x="123" y="143" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold" text-anchor="end">ГЭР</text>
<text x="123" y="150" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="end">(шероховатый)</text>

<!-- Smooth ER label -->
<line x1="260" y1="155" x2="275" y2="145" stroke="#555" stroke-width="0.5"/>
<text x="277" y="143" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">ГлЭР</text>
<text x="277" y="150" font-family="Arial,sans-serif" font-size="5" fill="#555">(гладкий)</text>

<!-- Golgi label -->
<line x1="290" y1="210" x2="310" y2="195" stroke="#555" stroke-width="0.5"/>
<text x="312" y="193" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Комплекс</text>
<text x="312" y="200" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Гольджи</text>

<!-- Mitochondria label -->
<line x1="130" y1="240" x2="105" y2="248" stroke="#555" stroke-width="0.5"/>
<text x="103" y="247" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold" text-anchor="end">Митохондрии</text>

<!-- Lysosome label -->
<line x1="248" y1="255" x2="275" y2="268" stroke="#555" stroke-width="0.5"/>
<text x="277" y="267" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A" font-weight="bold">Лизосомы</text>

<!-- Ribosome label -->
<text x="140" y="238" font-family="Arial,sans-serif" font-size="5" fill="#E65100" font-weight="bold">Рибосомы</text>

<!-- Centriole label -->
<line x1="232" y1="142" x2="250" y2="130" stroke="#555" stroke-width="0.5"/>
<text x="252" y="128" font-family="Arial,sans-serif" font-size="6" fill="#546E7A" font-weight="bold">Центриоли</text>

<!-- Right panel: Functions of organelles -->
<rect x="340" y="56" width="150" height="260" rx="6" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="1"/>
<text x="415" y="72" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">ФУНКЦИИ ОРГАНЕЛЛ</text>
<line x1="348" y1="77" x2="482" y2="77" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

<text x="350" y="90" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Мембрана:</text>
<text x="352" y="98" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Защита, транспорт веществ,</text>
<text x="352" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#555">избирательная проницаемость</text>

<text x="350" y="116" font-family="Arial,sans-serif" font-size="6" fill="#1A237E" font-weight="bold">Ядро:</text>
<text x="352" y="124" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Хранение ДНК, управление</text>
<text x="352" y="131" font-family="Arial,sans-serif" font-size="5.5" fill="#555">жизнедеятельностью клетки</text>

<text x="350" y="142" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">ГЭР:</text>
<text x="352" y="150" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Синтез белков (рибосомы)</text>

<text x="350" y="161" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">ГлЭР:</text>
<text x="352" y="169" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Синтез липидов, детоксикация</text>

<text x="350" y="180" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Комплекс Гольджи:</text>
<text x="352" y="188" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Модификация, сортировка</text>
<text x="352" y="195" font-family="Arial,sans-serif" font-size="5.5" fill="#555">и транспорт белков</text>

<text x="350" y="206" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">Митохондрии:</text>
<text x="352" y="214" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Клеточное дыхание,</text>
<text x="352" y="221" font-family="Arial,sans-serif" font-size="5.5" fill="#555">синтез АТФ (энергия)</text>

<text x="350" y="232" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A" font-weight="bold">Лизосомы:</text>
<text x="352" y="240" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Переваривание веществ,</text>
<text x="352" y="247" font-family="Arial,sans-serif" font-size="5.5" fill="#555">уничтожение органелл</text>

<text x="350" y="258" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Рибосомы:</text>
<text x="352" y="266" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Биосинтез белка</text>

<text x="350" y="277" font-family="Arial,sans-serif" font-size="6" fill="#546E7A" font-weight="bold">Центриоли:</text>
<text x="352" y="285" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Участие в делении клетки,</text>
<text x="352" y="292" font-family="Arial,sans-serif" font-size="5.5" fill="#555">формирование веретена</text>

<!-- Footer bar -->
<rect x="3" y="323" width="494" height="24" rx="0" fill="#2E7D32"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Клетка — элементарная единица строения и жизнедеятельности организма</text>
</svg>