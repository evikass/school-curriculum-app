<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Неполные квадратные уравнения</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 7</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="78" font-size="11" fill="#1A237E" text-anchor="middle" font-weight="bold" font-family="monospace">ax² + bx + c = 0, a ≠ 0</text>
  <text x="250" y="98" font-size="9" fill="#555" text-anchor="middle">Неполное: b = 0 или c = 0</text>
  <rect x="12" y="116" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="87" y="131" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">ax² = 0</text>
  <text x="87" y="150" font-size="10" fill="#1A237E" font-weight="bold" font-family="monospace">x = 0</text>
  <text x="87" y="170" font-size="8" fill="#555" text-anchor="middle">Один корень</text>
  <text x="87" y="185" font-size="8" fill="#3949AB" font-family="monospace">5x²=0 → x=0</text>
  <rect x="175" y="116" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="252" y="131" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">ax²+bx = 0</text>
  <text x="252" y="150" font-size="9" fill="#1A237E" font-family="monospace">x₁=0, x₂=-b/a</text>
  <text x="252" y="170" font-size="8" fill="#555" text-anchor="middle">Вынести x за скобки</text>
  <text x="252" y="185" font-size="8" fill="#3949AB" font-family="monospace">3x²+6x=0: x=0,-2</text>
  <rect x="338" y="116" width="150" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="413" y="131" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">ax²+c = 0</text>
  <text x="413" y="150" font-size="9" fill="#1A237E" font-family="monospace">x = ±√(-c/a)</text>
  <text x="413" y="170" font-size="8" fill="#2E7D32">-c/a&gt;0: 2 корня</text>
  <text x="413" y="185" font-size="8" fill="#C62828">-c/a&lt;0: нет корней</text>
  <rect x="12" y="224" width="476" height="80" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="239" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">Примеры</text>
  <text x="30" y="258" font-size="9" fill="#3949AB" font-family="monospace">2x²-8=0: x²=4, x=±2</text>
  <text x="270" y="258" font-size="9" fill="#3949AB" font-family="monospace">x²+9=0: корней нет</text>
  <text x="30" y="278" font-size="9" fill="#3949AB" font-family="monospace">x²-5x=0: x(x-5)=0</text>
  <text x="270" y="278" font-size="9" fill="#1A237E" font-weight="bold" font-family="monospace">x=0 или x=5</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Неполные квадратные уравнения — Макарычев Ю.Н., 8 класс</text>
</svg>