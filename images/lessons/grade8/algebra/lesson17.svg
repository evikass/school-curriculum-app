<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="50%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#EC407A" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#880E4F" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle" font-family="Arial">Статистические характеристики</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 17</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#D81B60" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="155" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="87" y="73" font-size="9" font-weight="bold" fill="#880E4F" text-anchor="middle">Среднее</text>
  <text x="87" y="95" font-size="8" fill="#555" text-anchor="middle">(x₁+...+xₙ)/n</text>
  <text x="87" y="115" font-size="9" fill="#D81B60" font-family="monospace">2,4,6: χ=4</text>
  <rect x="175" y="58" width="155" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="252" y="73" font-size="9" font-weight="bold" fill="#880E4F" text-anchor="middle">Размах</text>
  <text x="252" y="95" font-size="8" fill="#555" text-anchor="middle">max - min</text>
  <text x="252" y="115" font-size="9" fill="#D81B60" font-family="monospace">1,8,5: R=7</text>
  <rect x="338" y="58" width="150" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="413" y="73" font-size="9" font-weight="bold" fill="#880E4F" text-anchor="middle">Мода</text>
  <text x="413" y="95" font-size="8" fill="#555" text-anchor="middle">Самое частое</text>
  <text x="413" y="115" font-size="9" fill="#D81B60" font-family="monospace">2,3,3,5: М=3</text>
  <rect x="12" y="161" width="476" height="60" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="250" y="176" font-size="9" font-weight="bold" fill="#880E4F" text-anchor="middle">Медиана</text>
  <text x="250" y="194" font-size="8" fill="#555" text-anchor="middle">Нечётное: среднее число | Чётное: среднее двух средних</text>
  <text x="250" y="212" font-size="9" fill="#D81B60" font-family="monospace">1,3,5: Me=3 | 1,3,5,7: Me=4</text>
  <rect x="12" y="229" width="476" height="75" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="250" y="244" font-size="9" font-weight="bold" fill="#880E4F" text-anchor="middle">Пример: 1, 3, 3, 5, 8</text>
  <text x="150" y="262" font-size="8" fill="#D81B60" text-anchor="middle">Среднее: (1+3+3+5+8)/5 = 4</text>
  <text x="380" y="262" font-size="8" fill="#D81B60" text-anchor="middle">Размах: 8-1 = 7</text>
  <text x="150" y="280" font-size="8" fill="#D81B60" text-anchor="middle">Мода: 3</text>
  <text x="380" y="280" font-size="8" fill="#D81B60" text-anchor="middle">Медиана: 3</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#D81B60" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Статистические характеристики — Макарычев Ю.Н., 8 класс</text>
</svg>