<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1565C0" text-anchor="middle">Рациональные выражения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#1565C0" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#E3F2FD"/>
      <text x="250" y="130" font-family="Arial,sans-serif" font-size="20" fill="#1565C0" text-anchor="middle" font-weight="bold">Рациональные выражения</text>
      <rect x="25" y="155" width="210" height="45" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
      <text x="130" y="175" font-family="Arial" font-size="12" fill="#1565C0" text-anchor="middle">Целые выражения:</text>
      <text x="130" y="192" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">3x + 5y, 2a² - 4b</text>
      <rect x="265" y="155" width="210" height="45" rx="5" fill="white" stroke="#0D47A1" stroke-width="1.5"/>
      <text x="370" y="175" font-family="Arial" font-size="12" fill="#0D47A1" text-anchor="middle">Дробные выражения:</text>
      <text x="370" y="192" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">a/b, (x+1)/(y-2)</text>
      <rect x="80" y="215" width="340" height="35" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
      <text x="250" y="237" font-family="Arial" font-size="13" fill="#0D47A1" text-anchor="middle">Рациональное = целое + дробное</text>
      <circle cx="60" cy="275" r="14" fill="#1565C0" opacity="0.15"/>
      <circle cx="440" cy="275" r="14" fill="#0D47A1" opacity="0.1"/>
  </g>
  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>