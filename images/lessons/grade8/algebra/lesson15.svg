<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#311B92" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#311B92" text-anchor="middle" font-family="Arial">Степень с целым показателем</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 15</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#5E35B1" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="250" y="73" font-size="11" fill="#311B92" text-anchor="middle" font-weight="bold" font-family="monospace">aⁿ = a·a·...·a    a⁰ = 1    a⁻ⁿ = 1/aⁿ</text>
  <text x="250" y="100" font-size="9" fill="#555" text-anchor="middle">Расширение степени на нулевой и отрицательный показатели</text>
  <rect x="12" y="121" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="87" y="136" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">a⁰ = 1</text>
  <text x="87" y="155" font-size="9" fill="#5E35B1" font-family="monospace">5⁰ = 1</text>
  <text x="87" y="170" font-size="9" fill="#5E35B1" font-family="monospace">(−3)⁰ = 1</text>
  <text x="87" y="190" font-size="8" fill="#C62828" text-anchor="middle">a ≠ 0!</text>
  <rect x="175" y="121" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="252" y="136" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">a⁻ⁿ = 1/aⁿ</text>
  <text x="252" y="155" font-size="9" fill="#5E35B1" font-family="monospace">2⁻³ = 1/8</text>
  <text x="252" y="170" font-size="9" fill="#5E35B1" font-family="monospace">10⁻² = 0.01</text>
  <text x="252" y="190" font-size="8" fill="#555" text-anchor="middle">Обратная дробь</text>
  <rect x="338" y="121" width="150" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="413" y="136" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Стандартный вид</text>
  <text x="413" y="155" font-size="8" fill="#5E35B1" font-family="monospace">3450=3.45·10³</text>
  <text x="413" y="170" font-size="8" fill="#5E35B1" font-family="monospace">0.0027=2.7·10⁻³</text>
  <text x="413" y="190" font-size="8" fill="#555" text-anchor="middle">1 ≤ a &lt; 10</text>
  <rect x="12" y="229" width="476" height="75" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="250" y="244" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Свойства те же: умножение, деление, степень</text>
  <text x="250" y="262" font-size="8" fill="#555" text-anchor="middle">aⁿ·aᵐ=aⁿ⁺ᵐ  aⁿ:aᵐ=aⁿ⁻ᵐ  (aⁿ)ᵐ=aⁿᵐ</text>
  <text x="250" y="280" font-size="8" fill="#311B92" font-weight="bold">Отрицательный показатель = обратная дробь</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#5E35B1" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Степень с целым показателем — Макарычев Ю.Н., 8 класс</text>
</svg>