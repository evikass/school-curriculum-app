<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="50%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Квадратные неравенства</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 14</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF8F00" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">ax²+bx+c &gt; 0 (или &lt;, ≥, ≤)</text>
  <text x="250" y="100" font-size="9" fill="#555" text-anchor="middle">Корни → интервалы → знаки → выбор</text>
  <rect x="12" y="121" width="476" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="136" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Правило знаков (a &gt; 0, ветви вверх)</text>
  <line x1="30" y1="165" x2="470" y2="165" stroke="#FF8F00" stroke-width="1.5"/>
  <circle cx="120" cy="165" r="4" fill="#FF8F00"/>
  <text x="120" y="158" font-size="9" fill="#E65100" text-anchor="middle">x₁</text>
  <circle cx="380" cy="165" r="4" fill="#FF8F00"/>
  <text x="380" y="158" font-size="9" fill="#E65100" text-anchor="middle">x₂</text>
  <text x="70" y="155" font-size="9" fill="#2E7D32" text-anchor="middle">+</text>
  <text x="250" y="155" font-size="9" fill="#C62828" text-anchor="middle">−</text>
  <text x="430" y="155" font-size="9" fill="#2E7D32" text-anchor="middle">+</text>
  <text x="250" y="200" font-size="8" fill="#555" text-anchor="middle">Парабола: + слева и справа, − между корнями</text>
  <rect x="12" y="229" width="476" height="75" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="244" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Пример: x²-5x+6 &gt; 0</text>
  <text x="250" y="260" font-size="8" fill="#FF8F00" font-family="monospace">x=2, x=3 → + − +</text>
  <text x="250" y="278" font-size="8" fill="#E65100" font-weight="bold" font-family="monospace">Ответ: (-∞;2) ∪ (3;+∞)</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#FF8F00" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Квадратные неравенства — Макарычев Ю.Н., 8 класс</text>
</svg>