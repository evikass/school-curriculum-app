<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Формула корней квадратного уравнения</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="73" font-size="10" fill="#1A237E" text-anchor="middle" font-weight="bold">Дискриминант: D = b² - 4ac</text>
  <text x="250" y="100" font-size="10" fill="#3949AB" text-anchor="middle" font-family="monospace">x = (-b ± √D) / (2a)</text>
  <rect x="12" y="121" width="155" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="87" y="136" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">D &gt; 0</text>
  <text x="87" y="155" font-size="8" fill="#555" text-anchor="middle">Два различных</text>
  <text x="87" y="168" font-size="8" fill="#555" text-anchor="middle">корня</text>
  <rect x="175" y="121" width="155" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="252" y="136" font-size="9" font-weight="bold" fill="#3949AB" text-anchor="middle">D = 0</text>
  <text x="252" y="155" font-size="8" fill="#555" text-anchor="middle">Один корень</text>
  <text x="252" y="168" font-size="8" fill="#555" text-anchor="middle">(два совпадающих)</text>
  <rect x="338" y="121" width="150" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="413" y="136" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">D &lt; 0</text>
  <text x="413" y="155" font-size="8" fill="#555" text-anchor="middle">Корней нет</text>
  <text x="413" y="168" font-size="8" fill="#C62828" text-anchor="middle">(в R)</text>
  <rect x="12" y="199" width="476" height="105" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="214" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">Теорема Виета</text>
  <text x="250" y="232" font-size="9" fill="#3949AB" font-family="monospace">x₁ + x₂ = -b/a</text>
  <text x="250" y="248" font-size="9" fill="#3949AB" font-family="monospace">x₁ · x₂ = c/a</text>
  <text x="250" y="268" font-size="8" fill="#555" text-anchor="middle">Для x²+px+q=0: x₁+x₂=-p, x₁x₂=q</text>
  <text x="250" y="286" font-size="8" fill="#1A237E" font-weight="bold" text-anchor="middle">Пример: x²-5x+6=0: x₁+x₂=5, x₁x₂=6 → x=2, x=3</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Формула корней квадратного уравнения — Макарычев Ю.Н., 8 класс</text>
</svg>