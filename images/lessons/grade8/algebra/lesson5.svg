<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="50%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00897B" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#004D40" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="Arial">Свойства квадратного корня</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 5</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00695C" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Корень из произведения</text>
  <text x="127" y="98" font-size="10" fill="#00695C" text-anchor="middle" font-family="monospace">√(a·b) = √a · √b</text>
  <rect x="252" y="58" width="236" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Корень из частного</text>
  <text x="370" y="98" font-size="10" fill="#00695C" text-anchor="middle" font-family="monospace">√(a/b) = √a / √b</text>
  <rect x="12" y="121" width="230" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="127" y="136" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Вынесение из-под корня</text>
  <text x="127" y="158" font-size="10" fill="#00695C" text-anchor="middle" font-family="monospace">√(a²b) = a√b</text>
  <rect x="252" y="121" width="236" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="370" y="136" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Внесение под корень</text>
  <text x="370" y="158" font-size="10" fill="#00695C" text-anchor="middle" font-family="monospace">a√b = √(a²b)</text>
  <rect x="12" y="184" width="476" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Примеры</text>
  <text x="30" y="218" font-size="9" fill="#00695C" font-family="monospace">√50 = √(25·2) = 5√2</text>
  <text x="270" y="218" font-size="9" fill="#00695C" font-family="monospace">√72 = √(36·2) = 6√2</text>
  <text x="30" y="238" font-size="9" fill="#00695C" font-family="monospace">3√2 = √(9·2) = √18</text>
  <text x="270" y="238" font-size="9" fill="#00695C" font-family="monospace">√(144/16) = 12/4 = 3</text>
  <text x="30" y="258" font-size="9" fill="#00695C" font-family="monospace">√(36·49) = 6·7 = 42</text>
  <text x="270" y="258" font-size="9" fill="#00695C" font-family="monospace">√(18x²) = 3|x|√2</text>
  <text x="250" y="286" font-size="8" fill="#004D40" font-weight="bold" text-anchor="middle">Сначала разложить на множители, потом вынести!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#00695C" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Свойства квадратного корня — Макарычев Ю.Н., 8 класс</text>
</svg>