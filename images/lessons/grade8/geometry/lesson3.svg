<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Прямоугольник, ромб, квадрат</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 3</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#E65100" stroke-width="1" opacity="0.3"/>
<!-- Rectangle -->
<g transform="translate(85,150)">
  <rect x="-45" y="-30" width="90" height="60" fill="rgba(230,81,0,0.1)" stroke="#E65100" stroke-width="2"/>
  <line x1="-45" y1="-30" x2="45" y2="30" stroke="#E65100" stroke-width="1" stroke-dasharray="4"/>
  <line x1="45" y1="-30" x2="-45" y2="30" stroke="#E65100" stroke-width="1" stroke-dasharray="4"/>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Прямоугольник</text>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">∠=90°, d₁=d₂</text>
</g>
<!-- Rhombus -->
<g transform="translate(250,150)">
  <polygon points="0,-45 50,0 0,45 -50,0" fill="rgba(230,81,0,0.1)" stroke="#E65100" stroke-width="2"/>
  <line x1="0" y1="-45" x2="0" y2="45" stroke="#E65100" stroke-width="1" stroke-dasharray="4"/>
  <line x1="-50" y1="0" x2="50" y2="0" stroke="#E65100" stroke-width="1" stroke-dasharray="4"/>
  <text x="55" y="5" font-family="Arial,sans-serif" font-size="7" fill="#E65100">d₂</text>
  <text x="5" y="50" font-family="Arial,sans-serif" font-size="7" fill="#E65100">d₁</text>
  <text x="0" y="63" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Ромб</text>
  <text x="0" y="73" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">стороны=, d₁⊥d₂</text>
</g>
<!-- Square -->
<g transform="translate(400,150)">
  <rect x="-30" y="-30" width="60" height="60" fill="rgba(230,81,0,0.15)" stroke="#E65100" stroke-width="2"/>
  <line x1="-30" y1="-30" x2="30" y2="30" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="30" y1="-30" x2="-30" y2="30" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Квадрат</text>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">d = a√2</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#E65100" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 3</text>
</svg>