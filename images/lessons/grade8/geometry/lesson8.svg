<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD0"/>
      <stop offset="100%" style="stop-color:#F48FB1"/>
    </linearGradient>
    <linearGradient id="tz8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63"/>
      <stop offset="100%" style="stop-color:#AD1457"/>
    </linearGradient>
    <linearGradient id="rh8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F06292"/>
      <stop offset="100%" style="stop-color:#AD1457"/>
    </linearGradient>
    <filter id="sh8" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg8)"/>
  <rect x="3" y="3" width="494" height="344" rx="10" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#AD1457">Площадь трапеции и ромба</text>
  <text x="250" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#777">Геометрия 8 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#AD1457" stroke-width="1" opacity="0.3"/>

  <!-- Trapezoid panel -->
  <rect x="15" y="58" width="232" height="175" rx="8" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2" filter="url(#sh8)"/>
  <text x="131" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">⬢ Трапеция</text>
  <!-- Trapezoid shape -->
  <polygon points="60,175 90,110 170,110 200,175" fill="url(#tz8)" opacity="0.2" stroke="#AD1457" stroke-width="2"/>
  <!-- Decomposition: rectangle in the middle -->
  <rect x="90" y="110" width="80" height="65" fill="#F8BBD0" opacity="0.3" stroke="#E91E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="130" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#AD1457">прямоуг.</text>
  <!-- Left triangle -->
  <polygon points="60,175 90,110 90,175" fill="#F48FB1" opacity="0.3" stroke="#E91E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="74" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#AD1457">△</text>
  <!-- Right triangle -->
  <polygon points="170,110 200,175 170,175" fill="#F48FB1" opacity="0.3" stroke="#E91E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="183" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#AD1457">△</text>
  <!-- Base a (top) -->
  <line x1="90" y1="110" x2="170" y2="110" stroke="#AD1457" stroke-width="2"/>
  <text x="130" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">a</text>
  <!-- Base b (bottom) -->
  <line x1="60" y1="175" x2="200" y2="175" stroke="#AD1457" stroke-width="2"/>
  <text x="130" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">b</text>
  <!-- Height -->
  <line x1="90" y1="110" x2="90" y2="175" stroke="#AD1457" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="90" y="171" width="5" height="5" fill="none" stroke="#AD1457" stroke-width="0.8"/>
  <text x="82" y="147" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">h</text>
  <!-- Formula box -->
  <rect x="40" y="198" width="180" height="28" rx="5" fill="white" stroke="#E91E63" stroke-width="1.3"/>
  <rect x="35" y="200" width="5" height="24" rx="2" fill="#E91E63" opacity="0.7"/>
  <text x="130" y="217" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#AD1457">S = ½(a + b)·h</text>

  <!-- Rhombus panel -->
  <rect x="257" y="58" width="228" height="175" rx="8" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2" filter="url(#sh8)"/>
  <text x="371" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">◇ Ромб</text>
  <!-- Rhombus shape -->
  <polygon points="371,95 430,150 371,205 312,150" fill="url(#rh8)" opacity="0.2" stroke="#AD1457" stroke-width="2"/>
  <!-- Diagonals -->
  <line x1="371" y1="95" x2="371" y2="205" stroke="#E91E63" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="312" y1="150" x2="430" y2="150" stroke="#E91E63" stroke-width="1.8" stroke-dasharray="5,3"/>
  <!-- Diagonal labels -->
  <text x="380" y="108" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">d₁</text>
  <text x="415" y="146" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">d₂</text>
  <!-- Right angle at center -->
  <rect x="371" y="150" width="6" height="6" fill="none" stroke="#AD1457" stroke-width="0.8"/>
  <!-- Four triangles colored -->
  <polygon points="371,95 430,150 371,150" fill="#F48FB1" opacity="0.25" stroke="#E91E63" stroke-width="0.8"/>
  <polygon points="371,150 430,150 371,205" fill="#F8BBD0" opacity="0.25" stroke="#E91E63" stroke-width="0.8"/>
  <polygon points="312,150 371,95 371,150" fill="#F48FB1" opacity="0.2" stroke="#E91E63" stroke-width="0.8"/>
  <polygon points="312,150 371,150 371,205" fill="#F8BBD0" opacity="0.2" stroke="#E91E63" stroke-width="0.8"/>
  <!-- Triangle labels -->
  <text x="395" y="135" font-family="Arial,sans-serif" font-size="7" fill="#AD1457">1</text>
  <text x="395" y="170" font-family="Arial,sans-serif" font-size="7" fill="#AD1457">2</text>
  <text x="347" y="135" font-family="Arial,sans-serif" font-size="7" fill="#AD1457">3</text>
  <text x="347" y="170" font-family="Arial,sans-serif" font-size="7" fill="#AD1457">4</text>
  <!-- Formula box -->
  <rect x="290" y="198" width="160" height="28" rx="5" fill="white" stroke="#E91E63" stroke-width="1.3"/>
  <rect x="285" y="200" width="5" height="24" rx="2" fill="#E91E63" opacity="0.7"/>
  <text x="370" y="217" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#AD1457">S = ½d₁·d₂</text>

  <!-- Comparison panel -->
  <rect x="15" y="243" width="470" height="52" rx="8" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2" filter="url(#sh8)"/>
  <text x="250" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#AD1457">📊 Сравнение формул площадей</text>
  <!-- Mini icons + formulas -->
  <!-- Trapezoid mini -->
  <polygon points="40,280 50,272 70,272 80,280" fill="none" stroke="#E91E63" stroke-width="1.5"/>
  <text x="60" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#AD1457">S = ½(a+b)h</text>
  <!-- Rhombus mini -->
  <polygon points="150,272 162,280 150,288 138,280" fill="none" stroke="#E91E63" stroke-width="1.5"/>
  <text x="150" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#AD1457">S = ½d₁d₂</text>
  <!-- Parallelogram mini -->
  <polygon points="230,280 245,272 265,272 250,280" fill="none" stroke="#AD1457" stroke-width="1.5"/>
  <text x="247" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#AD1457">S = a·h</text>
  <!-- Triangle mini -->
  <polygon points="320,280 340,272 340,280" fill="none" stroke="#AD1457" stroke-width="1.5"/>
  <text x="337" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#AD1457">S = ½ah</text>
  <!-- Rectangle mini -->
  <rect x="400" y="272" width="20" height="10" rx="1" fill="none" stroke="#AD1457" stroke-width="1.5"/>
  <text x="410" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#AD1457">S = ab</text>

  <!-- Bottom bar -->
  <rect x="10" y="306" width="480" height="34" rx="8" fill="#AD1457" opacity="0.85"/>
  <text x="250" y="327" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Трапеция: S=½(a+b)h  |  Ромб: S=½d₁d₂  |  Диагонали ромба ⊥</text>
</svg>