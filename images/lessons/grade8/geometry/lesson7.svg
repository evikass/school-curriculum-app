<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFECB3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#F57F17" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#F57F17" text-anchor="middle">Теорема Пифагора</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 7</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>
<g transform="translate(200,185)">
  <!-- Right triangle -->
  <polygon points="-80,50 -80,-50 60,50" fill="rgba(245,127,23,0.12)" stroke="#F57F17" stroke-width="2.5"/>
  <!-- Right angle mark -->
  <rect x="-80" y="38" width="12" height="12" fill="none" stroke="#F57F17" stroke-width="1"/>
  <!-- Side labels -->
  <text x="-90" y="5" font-family="Arial,sans-serif" font-size="12" fill="#F57F17" font-weight="bold">a</text>
  <text x="-10" y="68" font-family="Arial,sans-serif" font-size="12" fill="#F57F17" font-weight="bold">b</text>
  <text x="5" y="-10" font-family="Arial,sans-serif" font-size="12" fill="#F57F17" font-weight="bold">c</text>
</g>
<!-- Formula box -->
<g transform="translate(330,140)">
  <rect x="0" y="0" width="140" height="80" rx="5" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.5"/>
  <text x="70" y="20" font-family="Arial,sans-serif" font-size="14" fill="#F57F17" text-anchor="middle" font-weight="bold">c² = a² + b²</text>
  <line x1="10" y1="28" x2="130" y2="28" stroke="#F57F17" stroke-width="0.5" opacity="0.3"/>
  <text x="70" y="43" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">(3,4,5) (5,12,13)</text>
  <text x="70" y="56" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">(8,15,17) (7,24,25)</text>
  <text x="70" y="72" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">d квадрата = a√2</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#F57F17" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 7</text>
</svg>