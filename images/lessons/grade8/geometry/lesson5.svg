<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">Площадь прямоугольника</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 5</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
<g transform="translate(160,180)">
  <rect x="-80" y="-50" width="160" height="100" fill="rgba(21,101,192,0.12)" stroke="#1565C0" stroke-width="2.5"/>
  <text x="0" y="-55" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">b</text>
  <line x1="-85" y1="-50" x2="-85" y2="50" stroke="#1565C0" stroke-width="1" stroke-dasharray="3"/>
  <text x="-92" y="5" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">a</text>
  <!-- Grid inside -->
  <line x1="-40" y1="-50" x2="-40" y2="50" stroke="#1565C0" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="-50" x2="0" y2="50" stroke="#1565C0" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="-50" x2="40" y2="50" stroke="#1565C0" stroke-width="0.5" opacity="0.3"/>
  <line x1="-80" y1="0" x2="80" y2="0" stroke="#1565C0" stroke-width="0.5" opacity="0.3"/>
</g>
<!-- Square -->
<g transform="translate(380,180)">
  <rect x="-35" y="-35" width="70" height="70" fill="rgba(21,101,192,0.15)" stroke="#1565C0" stroke-width="2"/>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">a</text>
</g>
<g transform="translate(30,280)">
  <rect x="0" y="0" width="440" height="35" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="0.8"/>
  <text x="110" y="20" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">S = a·b</text>
  <text x="330" y="20" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">S = a²</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#1565C0" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 5</text>
</svg>