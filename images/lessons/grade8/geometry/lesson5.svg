<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="rectAreaFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BA68C8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="gridFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1BEE7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="8" fill="url(#bg5)"/>
  <!-- Border -->
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#7B1FA2" stroke-width="2.5" opacity="0.7"/>
  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#7B1FA2">📏 Площадь прямоугольника и квадрата</text>
  <!-- Subtitle -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Геометрия 8 класс — Урок 5</text>
  <!-- Separator -->
  <line x1="20" y1="47" x2="480" y2="47" stroke="#7B1FA2" stroke-width="0.8" opacity="0.3"/>

  <!-- Left Panel: Rectangle with grid -->
  <rect x="14" y="54" width="185" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="106" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#7B1FA2">▭ Прямоугольник</text>

  <!-- Rectangle with grid overlay -->
  <rect x="36" y="82" width="140" height="90" rx="2" fill="url(#gridFill)" stroke="#7B1FA2" stroke-width="2"/>

  <!-- Grid lines (6 columns x 4 rows) -->
  <line x1="36" y1="104.5" x2="176" y2="104.5" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="36" y1="127" x2="176" y2="127" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="36" y1="149.5" x2="176" y2="149.5" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="59.3" y1="82" x2="59.3" y2="172" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="82.7" y1="82" x2="82.7" y2="172" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="106" y1="82" x2="106" y2="172" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="129.3" y1="82" x2="129.3" y2="172" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="152.7" y1="82" x2="152.7" y2="172" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>

  <!-- Unit square highlight -->
  <rect x="36" y="82" width="23.3" height="22.5" rx="1" fill="#9C27B0" fill-opacity="0.15" stroke="#7B1FA2" stroke-width="0.8"/>

  <!-- Side labels -->
  <text x="106" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2" font-style="italic">a = 6</text>
  <text x="184" y="132" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2" font-style="italic" transform="rotate(90,184,132)">b = 4</text>

  <!-- Dimension arrows -->
  <line x1="36" y1="180" x2="176" y2="180" stroke="#7B1FA2" stroke-width="1" marker-end="url(#arrP)"/>
  <line x1="176" y1="180" x2="36" y2="180" stroke="#7B1FA2" stroke-width="1"/>
  <text x="106" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">← a →</text>

  <!-- Unit square label -->
  <text x="48" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#7B1FA2">1×1</text>

  <!-- Formula box -->
  <rect x="24" y="195" width="165" height="22" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="106" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#7B1FA2">S = a × b = 24 кв.ед.</text>

  <!-- Center Panel: Square -->
  <rect x="205" y="54" width="140" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="275" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#7B1FA2">□ Квадрат</text>

  <!-- Square with grid -->
  <rect x="235" y="82" width="80" height="80" rx="2" fill="url(#rectAreaFill)" stroke="#7B1FA2" stroke-width="2"/>

  <!-- Grid lines (4x4) -->
  <line x1="255" y1="82" x2="255" y2="162" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="275" y1="82" x2="275" y2="162" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="295" y1="82" x2="295" y2="162" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="235" y1="102" x2="315" y2="102" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="235" y1="122" x2="315" y2="122" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>
  <line x1="235" y1="142" x2="315" y2="142" stroke="#9C27B0" stroke-width="0.4" opacity="0.35"/>

  <!-- Diagonal -->
  <line x1="235" y1="82" x2="315" y2="162" stroke="#E91E63" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Side labels -->
  <text x="275" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2" font-style="italic">a = 4</text>
  <text x="322" y="126" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2" font-style="italic">a</text>

  <!-- Formula box for square -->
  <rect x="215" y="170" width="120" height="22" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="275" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#7B1FA2">S = a² = 16</text>

  <!-- Equal sides marks -->
  <line x1="252" y1="80" x2="252" y2="86" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="254" y1="80" x2="254" y2="86" stroke="#7B1FA2" stroke-width="1.3"/>

  <!-- Right angle -->
  <rect x="235" y="82" width="7" height="7" fill="none" stroke="#E91E63" stroke-width="0.8"/>

  <!-- Unit square concept -->
  <text x="275" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#607D8B">Единичный квадрат: 1×1</text>
  <text x="275" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#607D8B">S = 1 кв. единица</text>

  <!-- Right Panel: Area properties -->
  <rect x="351" y="54" width="137" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="419" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#7B1FA2">📋 Свойства площади</text>

  <rect x="359" y="78" width="121" height="35" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="365" y="90" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#7B1FA2">1. Равные фигуры →</text>
  <text x="365" y="101" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">равные площади</text>

  <rect x="359" y="118" width="121" height="35" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
  <text x="365" y="130" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#E65100">2. Площадь суммы:</text>
  <text x="365" y="141" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">S = S₁ + S₂</text>

  <rect x="359" y="158" width="121" height="35" rx="5" fill="#E8F5E9" stroke="#43A047" stroke-width="0.8"/>
  <text x="365" y="170" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#2E7D32">3. Единица площади:</text>
  <text x="365" y="181" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">1 кв. ед. = 1×1</text>

  <!-- Perimeter note -->
  <text x="419" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">P▭ = 2(a+b)</text>
  <text x="419" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">P□ = 4a</text>

  <!-- Bottom left: Area comparison -->
  <rect x="14" y="225" width="235" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="131" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2">📊 Сравнение площадей</text>

  <!-- Rectangle 1: 3×2 -->
  <rect x="28" y="250" width="45" height="30" rx="2" fill="#CE93D8" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="50" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">3×2</text>
  <text x="50" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#7B1FA2">S=6</text>

  <!-- Rectangle 2: 4×3 -->
  <rect x="90" y="246" width="60" height="36" rx="2" fill="#BA68C8" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="120" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">4×3</text>
  <text x="120" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#7B1FA2">S=12</text>

  <!-- Rectangle 3: 5×2 -->
  <rect x="165" y="250" width="70" height="28" rx="2" fill="#AB47BC" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <text x="200" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">5×2</text>
  <text x="200" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#7B1FA2">S=10</text>

  <!-- P vs S note -->
  <text x="131" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="0" fill="#7B1FA2"></text>

  <!-- Bottom right: Perimeter vs Area -->
  <rect x="255" y="225" width="233" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="371" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2">⚠️ Периметр ≠ Площадь</text>

  <!-- Example: Same perimeter, different area -->
  <text x="265" y="256" font-family="Arial,sans-serif" font-size="7" fill="#37474F">P = 12: прямоуг. 1×5 → S = 5</text>
  <text x="265" y="268" font-family="Arial,sans-serif" font-size="7" fill="#37474F">P = 12: прямоуг. 2×4 → S = 8</text>
  <text x="265" y="280" font-family="Arial,sans-serif" font-size="7" fill="#37474F">P = 12: квадрат 3×3 → S = 9 ★</text>

  <text x="420" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#7B1FA2">При равном P:</text>
  <text x="420" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">квадрат имеет</text>
  <text x="420" y="292" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E91E63" font-weight="bold">max S</text>

  <!-- Bottom bar -->
  <rect x="14" y="300" width="474" height="38" rx="6" fill="url(#accent5)" opacity="0.85"/>
  <text x="250" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">▭ S = a × b | □ S = a²</text>
  <text x="250" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#F3E5F5">Площадь — положительная величина, равная сумме площадей частей | Равные фигуры имеют равные площади</text>
</svg>