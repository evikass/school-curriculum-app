<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
<linearGradient id="arcGrad1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E91E63"/><stop offset="100%" stop-color="#FF5722"/></linearGradient>
<linearGradient id="arcGrad2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#2196F3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Центральные и вписанные углы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 14</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#1565C0" stroke-width="1" opacity="0.3"/>

<!-- Main illustration: Circle with central and inscribed angle on same arc -->
<g transform="translate(10,55)">
  <!-- Circle -->
  <circle cx="120" cy="115" r="75" fill="#1565C0" fill-opacity="0.05" stroke="#1565C0" stroke-width="1.8"/>
  <!-- Center O -->
  <circle cx="120" cy="115" r="3" fill="#1565C0"/>
  <text x="108" y="112" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold">O</text>

  <!-- Arc AB (highlighted) -->
  <path d="M50,165 A75,75 0 0,1 185,75" fill="none" stroke="#E91E63" stroke-width="3.5" opacity="0.7"/>
  <text x="130" y="82" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">◡AB</text>

  <!-- Points A and B -->
  <circle cx="50" cy="165" r="4" fill="#E91E63" stroke="white" stroke-width="1.5"/>
  <text x="35" y="175" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold">A</text>
  <circle cx="185" cy="75" r="4" fill="#E91E63" stroke="white" stroke-width="1.5"/>
  <text x="190" y="72" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold">B</text>

  <!-- Central angle AOB (red/pink fill) -->
  <path d="M120,115 L50,165 L185,75 Z" fill="#E91E63" fill-opacity="0.12" stroke="none"/>
  <line x1="120" y1="115" x2="50" y2="165" stroke="#E91E63" stroke-width="1.8"/>
  <line x1="120" y1="115" x2="185" y2="75" stroke="#E91E63" stroke-width="1.8"/>
  <!-- Central angle arc -->
  <path d="M108,128 A15,15 0 0,1 130,106" fill="none" stroke="#E91E63" stroke-width="1.5"/>
  <text x="110" y="128" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">α</text>

  <!-- Inscribed angle ACB (blue/green fill) -->
  <path d="M50,165 L170,170 L185,75 Z" fill="#2196F3" fill-opacity="0.1" stroke="none"/>
  <line x1="50" y1="165" x2="170" y2="170" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="170" y1="170" x2="185" y2="75" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="170" cy="170" r="3" fill="#1565C0" stroke="white" stroke-width="1"/>
  <text x="174" y="180" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold">C</text>
  <!-- Inscribed angle arc -->
  <path d="M62,162 A12,12 0 0,0 163,165" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="105" y="172" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">β</text>
</g>

<!-- Formula/relationship panel -->
<g transform="translate(265,58)">
  <rect x="0" y="0" width="220" height="55" rx="6" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1"/>
  <text x="110" y="14" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">📐 Главное свойство</text>
  <line x1="10" y1="18" x2="210" y2="18" stroke="#1565C0" stroke-width="0.5" opacity="0.4"/>
  <text x="110" y="35" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">β = ½ · α</text>
  <text x="110" y="48" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Вписанный угол = ½ центрального</text>
</g>

<!-- Three cases of inscribed angle position -->
<g transform="translate(265,120)">
  <text x="110" y="0" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">🔬 Три случая расположения вершины</text>

  <!-- Case 1: Center on one side -->
  <g transform="translate(35,20)">
    <rect x="-28" y="-8" width="56" height="78" rx="4" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="0.8"/>
    <circle cx="0" cy="30" r="22" fill="#1565C0" fill-opacity="0.05" stroke="#1565C0" stroke-width="1.2"/>
    <circle cx="0" cy="30" r="2" fill="#1565C0"/>
    <!-- Points -->
    <circle cx="-22" cy="30" r="2.5" fill="#E91E63"/>
    <circle cx="17" cy="11" r="2.5" fill="#E91E63"/>
    <circle cx="22" cy="18" r="2.5" fill="#1565C0"/>
    <!-- Lines -->
    <line x1="-22" y1="30" x2="22" y2="18" stroke="#1565C0" stroke-width="1"/>
    <line x1="17" y1="11" x2="22" y2="18" stroke="#1565C0" stroke-width="1"/>
    <line x1="0" y1="30" x2="17" y2="11" stroke="#E91E63" stroke-width="1" stroke-dasharray="2,1"/>
    <!-- Arc -->
    <path d="M-18,32 A8,8 0 0,1 19,15" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
    <text x="0" y="62" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Случай 1</text>
    <text x="0" y="70" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Центр на стороне</text>
  </g>

  <!-- Case 2: Center inside -->
  <g transform="translate(110,20)">
    <rect x="-28" y="-8" width="56" height="78" rx="4" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="0.8"/>
    <circle cx="0" cy="30" r="22" fill="#1565C0" fill-opacity="0.05" stroke="#1565C0" stroke-width="1.2"/>
    <circle cx="0" cy="30" r="2" fill="#1565C0"/>
    <!-- Points -->
    <circle cx="-20" cy="22" r="2.5" fill="#E91E63"/>
    <circle cx="15" cy="10" r="2.5" fill="#E91E63"/>
    <circle cx="-10" cy="50" r="2.5" fill="#1565C0"/>
    <!-- Lines -->
    <line x1="-20" y1="22" x2="-10" y2="50" stroke="#1565C0" stroke-width="1"/>
    <line x1="15" y1="10" x2="-10" y2="50" stroke="#1565C0" stroke-width="1"/>
    <!-- Central angle -->
    <line x1="0" y1="30" x2="-20" y2="22" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="2,1"/>
    <line x1="0" y1="30" x2="15" y2="10" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="2,1"/>
    <text x="0" y="62" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Случай 2</text>
    <text x="0" y="70" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Центр внутри</text>
  </g>

  <!-- Case 3: Center outside -->
  <g transform="translate(185,20)">
    <rect x="-28" y="-8" width="56" height="78" rx="4" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="0.8"/>
    <circle cx="0" cy="30" r="22" fill="#1565C0" fill-opacity="0.05" stroke="#1565C0" stroke-width="1.2"/>
    <circle cx="0" cy="30" r="2" fill="#1565C0"/>
    <!-- Points -->
    <circle cx="-18" cy="12" r="2.5" fill="#E91E63"/>
    <circle cx="18" cy="12" r="2.5" fill="#E91E63"/>
    <circle cx="0" cy="52" r="2.5" fill="#1565C0"/>
    <!-- Lines -->
    <line x1="-18" y1="12" x2="0" y2="52" stroke="#1565C0" stroke-width="1"/>
    <line x1="18" y1="12" x2="0" y2="52" stroke="#1565C0" stroke-width="1"/>
    <!-- Central angle -->
    <line x1="0" y1="30" x2="-18" y2="12" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="2,1"/>
    <line x1="0" y1="30" x2="18" y2="12" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="2,1"/>
    <text x="0" y="62" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Случай 3</text>
    <text x="0" y="70" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Центр вне угла</text>
  </g>
</g>

<!-- Semicircle theorem -->
<g transform="translate(265,215)">
  <rect x="0" y="0" width="220" height="55" rx="6" fill="white" opacity="0.9" stroke="#FF9800" stroke-width="1.2"/>
  <text x="110" y="14" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">💡 Теорема о полуокружности</text>
  <line x1="10" y1="18" x2="210" y2="18" stroke="#FF9800" stroke-width="0.5" opacity="0.4"/>
  <!-- Mini semicircle illustration -->
  <g transform="translate(50,38)">
    <path d="M-20,0 A20,20 0 0,1 20,0" fill="none" stroke="#FF9800" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#FF9800" stroke-width="1.5"/>
    <line x1="-20" y1="0" x2="0" y2="-8" stroke="#1565C0" stroke-width="1"/>
    <line x1="20" y1="0" x2="0" y2="-8" stroke="#1565C0" stroke-width="1"/>
    <circle cx="0" cy="-8" r="2" fill="#1565C0"/>
    <rect x="-2" y="-4" width="4" height="4" fill="none" stroke="#C62828" stroke-width="0.8"/>
  </g>
  <text x="150" y="33" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">Вписанный угол в</text>
  <text x="150" y="43" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">полуокружность = 90°</text>
</g>

<!-- Properties panel -->
<g transform="translate(15,250)">
  <rect x="0" y="0" width="240" height="70" rx="6" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="120" y="14" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">📋 Свойства углов</text>
  <line x1="10" y1="18" x2="230" y2="18" stroke="#1565C0" stroke-width="0.5" opacity="0.4"/>

  <circle cx="15" cy="30" r="2.5" fill="#E91E63"/>
  <text x="22" y="33" font-family="Arial,sans-serif" font-size="7" fill="#333">Центральный ∠ = дуге, на которую опирается</text>

  <circle cx="15" cy="42" r="2.5" fill="#1565C0"/>
  <text x="22" y="45" font-family="Arial,sans-serif" font-size="7" fill="#333">Вписанный ∠ = ½ дуги, на которую опирается</text>

  <circle cx="15" cy="54" r="2.5" fill="#FF9800"/>
  <text x="22" y="57" font-family="Arial,sans-serif" font-size="7" fill="#333">Вписанные ∠ на одной дуге равны</text>

  <circle cx="15" cy="66" r="2.5" fill="#4CAF50"/>
  <text x="22" y="69" font-family="Arial,sans-serif" font-size="7" fill="#333">Вписанный ∠ в полуокружность = 90°</text>
</g>

<!-- Bottom bar -->
<rect x="10" y="330" width="480" height="16" rx="4" fill="#1565C0" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Вписанный угол = ½ центрального угла | Угол в полуокружности = 90°</text>
</svg>