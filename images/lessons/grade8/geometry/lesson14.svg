</g>
<g transform="translate(30,290)">
  <text x="100" y="0" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" font-weight="bold">Центральный = дуге</text>
  <text x="300" y="0" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold">Вписанный = дуга/2</text>
