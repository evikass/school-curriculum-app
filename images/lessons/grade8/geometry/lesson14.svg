<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Центральные и вписанные углы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 14</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0D47A1" stroke-width="1" opacity="0.3"/><g transform="translate(250,180)">
  <circle cx="0" cy="0" r="80" fill="rgba(13,71,161,0.06)" stroke="#0D47A1" stroke-width="2"/>
  <!-- Central angle -->
  <line x1="0" y1="0" x2="70" y2="40" stroke="#0D47A1" stroke-width="2"/>
  <line x1="0" y1="0" x2="50" y2="-62" stroke="#0D47A1" stroke-width="2"/>
  <path d="M 35 20 A 40 40 0 0 0 25 -31" fill="none" stroke="#0D47A1" stroke-width="2"/>
  <text x="30" y="-10" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold">α</text>
  <!-- Inscribed angle -->
  <circle cx="70" cy="40" r="3" fill="#C62828"/>
  <circle cx="50" cy="-62" r="3" fill="#C62828"/>
  <circle cx="-65" cy="47" r="3" fill="#C62828"/>
