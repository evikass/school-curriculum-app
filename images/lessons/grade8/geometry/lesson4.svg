<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Трапеция</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 4</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#7B1FA2" stroke-width="1" opacity="0.3"/>
<g transform="translate(250,175)">
  <polygon points="-90,50 -50,-40 70,-40 100,50" fill="rgba(123,31,162,0.1)" stroke="#7B1FA2" stroke-width="2.5"/>
  <!-- Parallel marks on bases -->
  <line x1="-90" y1="50" x2="100" y2="50" stroke="#7B1FA2" stroke-width="3"/>
  <line x1="-50" y1="-40" x2="70" y2="-40" stroke="#7B1FA2" stroke-width="3"/>
  <!-- Height -->
  <line x1="-30" y1="-40" x2="-30" y2="50" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="-35" y="10" font-family="Arial,sans-serif" font-size="9" fill="#F57F17">h</text>
  <!-- Vertices -->
  <circle cx="-90" cy="50" r="3" fill="#7B1FA2"/>
  <circle cx="-50" cy="-40" r="3" fill="#7B1FA2"/>
  <circle cx="70" cy="-40" r="3" fill="#7B1FA2"/>
  <circle cx="100" cy="50" r="3" fill="#7B1FA2"/>
  <text x="-105" y="55" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" font-weight="bold">A</text>
  <text x="-55" y="-45" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" font-weight="bold">B</text>
  <text x="75" y="-45" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" font-weight="bold">C</text>
  <text x="105" y="55" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" font-weight="bold">D</text>
  <text x="5" y="63" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2">a (основание)</text>
  <text x="5" y="-47" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2">b (основание)</text>
</g>
<!-- Formula box -->
<g transform="translate(30,270)">
  <rect x="0" y="0" width="440" height="45" rx="5" fill="white" opacity="0.85" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="220" y="14" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Формулы</text>
  <text x="10" y="28" font-family="Arial,sans-serif" font-size="7" fill="#333">m=(a+b)/2 — средняя линия</text>
  <text x="200" y="28" font-family="Arial,sans-serif" font-size="7" fill="#333">S=(a+b)·h/2=m·h — площадь</text>
  <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">Равнобедренная: AC=BD, ∠A=∠B</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#7B1FA2" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 4</text>
</svg>