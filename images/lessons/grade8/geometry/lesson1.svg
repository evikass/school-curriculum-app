<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F7FA"/><stop offset="100%" stop-color="#B2EBF2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C" text-anchor="middle">Многоугольники</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 1</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#00695C" stroke-width="1" opacity="0.3"/>
<!-- Pentagon illustration -->
<g transform="translate(150,180)">
  <polygon points="0,-60 57,-19 35,49 -35,49 -57,-19" fill="rgba(0,105,92,0.15)" stroke="#00695C" stroke-width="2"/>
  <!-- Diagonals -->
  <line x1="0" y1="-60" x2="35" y2="49" stroke="#00695C" stroke-width="1" stroke-dasharray="4" opacity="0.5"/>
  <line x1="0" y1="-60" x2="-35" y2="49" stroke="#00695C" stroke-width="1" stroke-dasharray="4" opacity="0.5"/>
  <!-- Vertices -->
  <circle cx="0" cy="-60" r="4" fill="#00695C"/>
  <circle cx="57" cy="-19" r="4" fill="#00695C"/>
  <circle cx="35" cy="49" r="4" fill="#00695C"/>
  <circle cx="-35" cy="49" r="4" fill="#00695C"/>
  <circle cx="-57" cy="-19" r="4" fill="#00695C"/>
  <text x="0" y="-68" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle" font-weight="bold">A</text>
  <text x="67" y="-15" font-family="Arial,sans-serif" font-size="9" fill="#00695C" font-weight="bold">B</text>
  <text x="42" y="60" font-family="Arial,sans-serif" font-size="9" fill="#00695C" font-weight="bold">C</text>
  <text x="-48" y="60" font-family="Arial,sans-serif" font-size="9" fill="#00695C" font-weight="bold">D</text>
  <text x="-72" y="-15" font-family="Arial,sans-serif" font-size="9" fill="#00695C" font-weight="bold">E</text>
</g>
<!-- Formulas section -->
<g transform="translate(310,120)">
  <rect x="0" y="0" width="150" height="80" rx="5" fill="white" opacity="0.85" stroke="#00695C" stroke-width="0.8"/>
  <text x="75" y="18" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle" font-weight="bold">Формулы</text>
  <text x="10" y="35" font-family="Arial,sans-serif" font-size="8" fill="#333">S = (n-2)·180°</text>
  <text x="10" y="50" font-family="Arial,sans-serif" font-size="8" fill="#333">d = n(n-3)/2</text>
  <text x="10" y="65" font-family="Arial,sans-serif" font-size="8" fill="#333">Сумма внешн. = 360°</text>
</g>
<!-- n=3,4,5,6 table -->
<g transform="translate(310,220)">
  <rect x="0" y="0" width="150" height="80" rx="5" fill="white" opacity="0.85" stroke="#00695C" stroke-width="0.8"/>
  <text x="75" y="16" font-family="Arial,sans-serif" font-size="8" fill="#00695C" text-anchor="middle" font-weight="bold">Суммы углов</text>
  <text x="10" y="30" font-family="Arial,sans-serif" font-size="7" fill="#333">n=3: 180°  d=0</text>
  <text x="10" y="42" font-family="Arial,sans-serif" font-size="7" fill="#333">n=4: 360°  d=2</text>
  <text x="10" y="54" font-family="Arial,sans-serif" font-size="7" fill="#333">n=5: 540°  d=5</text>
  <text x="10" y="66" font-family="Arial,sans-serif" font-size="7" fill="#333">n=6: 720°  d=9</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#00695C" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 1</text>
</svg>