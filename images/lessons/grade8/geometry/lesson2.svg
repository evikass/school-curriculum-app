<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="paraFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#81C784" stop-opacity="0.25"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="8" fill="url(#bg2)"/>
  <!-- Border -->
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#2E7D32" stroke-width="2.5" opacity="0.7"/>
  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">▱ Параллелограмм</text>
  <!-- Subtitle -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Геометрия 8 класс — Урок 2</text>
  <!-- Separator -->
  <line x1="20" y1="47" x2="480" y2="47" stroke="#2E7D32" stroke-width="0.8" opacity="0.3"/>

  <!-- Main Parallelogram -->
  <rect x="14" y="54" width="310" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="169" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">Параллелограмм ABCD</text>

  <!-- Parallelogram shape -->
  <polygon points="100,100 240,100 280,175 140,175" fill="url(#paraFill)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Parallel arrows on sides AB and CD -->
  <line x1="130" y1="96" x2="150" y2="96" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="170" y1="179" x2="190" y2="179" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <!-- Parallel arrows on sides BC and AD -->
  <line x1="244" y1="110" x2="244" y2="125" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="144" y1="110" x2="144" y2="125" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Diagonals -->
  <line x1="100" y1="100" x2="280" y2="175" stroke="#E91E63" stroke-width="1.2" stroke-dasharray="5,2.5" opacity="0.7"/>
  <line x1="240" y1="100" x2="140" y2="175" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="5,2.5" opacity="0.7"/>

  <!-- Intersection point O -->
  <circle cx="190" cy="137.5" r="4" fill="#FF9800" stroke="white" stroke-width="1"/>
  <text x="198" y="134" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">O</text>

  <!-- Vertex labels -->
  <text x="92" y="96" text-anchor="end" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">A</text>
  <text x="244" y="96" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">B</text>
  <text x="286" y="178" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">C</text>
  <text x="130" y="178" text-anchor="end" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">D</text>

  <!-- Angle marks -->
  <path d="M108,100 A10,10 0 0,1 105,108" fill="none" stroke="#FF5722" stroke-width="1.2"/>
  <path d="M232,100 A10,10 0 0,0 235,108" fill="none" stroke="#2196F3" stroke-width="1.2"/>
  <path d="M272,175 A10,10 0 0,1 275,167" fill="none" stroke="#FF5722" stroke-width="1.2"/>
  <path d="M148,175 A10,10 0 0,0 145,167" fill="none" stroke="#2196F3" stroke-width="1.2"/>

  <!-- Equal side marks -->
  <line x1="165" y1="98" x2="165" y2="104" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="167" y1="98" x2="167" y2="104" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="205" y1="98" x2="205" y2="104" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="207" y1="98" x2="207" y2="104" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Labels on sides -->
  <text x="170" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-style="italic">a</text>
  <text x="260" y="140" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-style="italic">b</text>
  <text x="210" y="189" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-style="italic">a</text>
  <text x="122" y="140" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-style="italic">b</text>

  <!-- Right Panel: Properties -->
  <rect x="330" y="54" width="158" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="409" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">📋 Свойства</text>

  <rect x="338" y="78" width="142" height="60" rx="5" fill="#E8F5E9" stroke="#43A047" stroke-width="0.8"/>
  <text x="345" y="90" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">Стороны и углы:</text>
  <text x="345" y="102" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">⬥ AB = CD, AD = BC</text>
  <text x="345" y="113" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">⬥ ∠A = ∠C, ∠B = ∠D</text>
  <text x="345" y="124" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">⬥ ∠A + ∠B = 180°</text>
  <text x="345" y="135" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">⬥ AB ∥ CD, AD ∥ BC</text>

  <rect x="338" y="144" width="142" height="40" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
  <text x="345" y="156" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">Диагонали:</text>
  <text x="345" y="168" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">⬥ AO = OC, BO = OD</text>
  <text x="345" y="179" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">⬥ Точка O — середина</text>

  <!-- Signs box -->
  <rect x="338" y="190" width="142" height="24" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="345" y="200" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#7B1FA2">Признаки параллелограмма:</text>
  <text x="345" y="210" font-family="Arial,sans-serif" font-size="6.5" fill="#37474F">AB=CD и AB∥CD → ABCD парал-м</text>

  <!-- Bottom left: Triangle translation visual -->
  <rect x="14" y="225" width="235" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#43A047" stroke-width="1.2"/>
  <text x="131" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">🔀 Образование из треугольника</text>

  <!-- Triangle -->
  <polygon points="35,260 80,260 35,290" fill="#A5D6A7" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="50" y="275" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">△</text>

  <!-- Arrow -->
  <text x="95" y="275" font-family="Arial,sans-serif" font-size="14" fill="#43A047">→</text>

  <!-- Parallelogram from two triangles -->
  <polygon points="115,260 160,260 160,290 115,290" fill="#A5D6A7" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1.2"/>
  <polygon points="115,260 160,260 115,290" fill="#81C784" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="115" y1="260" x2="160" y2="290" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="137" y="275" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">▱</text>

  <!-- Translation note -->
  <text x="182" y="262" font-family="Arial,sans-serif" font-size="7" fill="#37474F">ΔABC + ΔCDA</text>
  <text x="182" y="273" font-family="Arial,sans-serif" font-size="7" fill="#37474F">= параллелограмм</text>
  <text x="182" y="284" font-family="Arial,sans-serif" font-size="6.5" fill="#607D8B">Диагональ делит ▱</text>
  <text x="182" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#607D8B">на 2 равных △</text>

  <!-- Bottom right: Signs of parallelogram -->
  <rect x="255" y="225" width="233" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#43A047" stroke-width="1.2"/>
  <text x="371" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">✅ Признаки параллелограмма</text>

  <circle cx="268" cy="254" r="3" fill="#43A047"/>
  <text x="276" y="257" font-family="Arial,sans-serif" font-size="7" fill="#37474F">AB ∥ CD и AD ∥ BC → ABCD — параллелограмм</text>
  <circle cx="268" cy="266" r="3" fill="#43A047"/>
  <text x="276" y="269" font-family="Arial,sans-serif" font-size="7" fill="#37474F">AB = CD и AD = BC → ABCD — параллелограмм</text>
  <circle cx="268" cy="278" r="3" fill="#43A047"/>
  <text x="276" y="281" font-family="Arial,sans-serif" font-size="7" fill="#37474F">AO = OC и BO = OD → ABCD — параллелограмм</text>

  <!-- Bottom bar -->
  <rect x="14" y="300" width="474" height="38" rx="6" fill="url(#accent2)" opacity="0.85"/>
  <text x="250" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">▱ Противоположные стороны и углы параллелограмма равны</text>
  <text x="250" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E8F5E9">Диагонали пересекаются и делятся точкой пересечения пополам | AB=CD, AD=BC, ∠A=∠C, ∠B=∠D</text>
</svg>