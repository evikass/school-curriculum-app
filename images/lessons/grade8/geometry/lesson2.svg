<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Параллелограмм</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 2</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>
<g transform="translate(250,185)">
  <polygon points="-80,-50 80,-50 100,50 -60,50" fill="rgba(46,125,50,0.15)" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Diagonals -->
  <line x1="-80" y1="-50" x2="100" y2="50" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5"/>
  <line x1="80" y1="-50" x2="-60" y2="50" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5"/>
  <circle cx="10" cy="0" r="4" fill="#F57F17"/>
  <text x="16" y="5" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" font-weight="bold">O</text>
  <!-- Vertices -->
  <circle cx="-80" cy="-50" r="4" fill="#2E7D32"/>
  <circle cx="80" cy="-50" r="4" fill="#2E7D32"/>
  <circle cx="100" cy="50" r="4" fill="#2E7D32"/>
  <circle cx="-60" cy="50" r="4" fill="#2E7D32"/>
  <text x="-95" y="-50" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">A</text>
  <text x="85" y="-55" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">B</text>
  <text x="105" y="55" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">C</text>
  <text x="-80" y="60" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">D</text>
  <!-- Parallel marks -->
  <text x="-10" y="-57" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">∥</text>
  <text x="10" y="57" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">∥</text>
</g>
<!-- Properties box -->
<g transform="translate(30,270)">
  <rect x="0" y="0" width="440" height="45" rx="5" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="220" y="14" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Свойства</text>
  <text x="10" y="28" font-family="Arial,sans-serif" font-size="7" fill="#333">AB=CD, AD=BC  ∠A=∠C, ∠B=∠D  AO=OC, BO=OD</text>
  <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">∠A+∠B=180°  Биссектриса → равнобедренный △</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 2</text>
