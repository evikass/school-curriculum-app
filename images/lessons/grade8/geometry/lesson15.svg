<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FCE4EC"/><stop offset="100%" stop-color="#F8BBD0"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#880E4F" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">Свойства хорд и секущих</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 15</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#880E4F" stroke-width="1" opacity="0.3"/><g transform="translate(250,180)">
  <circle cx="0" cy="0" r="80" fill="rgba(136,14,79,0.06)" stroke="#880E4F" stroke-width="2"/>
  <!-- Chord AB -->
  <line x1="-50" y1="62" x2="70" y2="40" stroke="#880E4F" stroke-width="2"/>
  <!-- Chord CD -->
  <line x1="-30" y1="-74" x2="40" y2="70" stroke="#880E4F" stroke-width="2"/>
  <!-- Intersection point -->
  <circle cx="15" cy="50" r="4" fill="#F57F17"/>
  <text x="20" y="45" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold">M</text>
</g>
<g transform="translate(30,285)">
  <rect x="0" y="0" width="440" height="30" rx="5" fill="white" opacity="0.85" stroke="#880E4F" stroke-width="0.8"/>
  <text x="110" y="18" font-family="Arial,sans-serif" font-size="9" fill="#880E4F" font-weight="bold">AM·MB = CM·MD</text>
  <text x="320" y="18" font-family="Arial,sans-serif" font-size="9" fill="#880E4F" font-weight="bold">MA² = MB·MC</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#880E4F" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 15</text>
</svg>