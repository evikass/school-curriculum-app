<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B2DFDB"/>
      <stop offset="100%" style="stop-color:#80CBC4"/>
    </linearGradient>
    <linearGradient id="tr9a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B"/>
      <stop offset="100%" style="stop-color:#00695C"/>
    </linearGradient>
    <linearGradient id="tr9b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4DB6AC"/>
      <stop offset="100%" style="stop-color:#00897B"/>
    </linearGradient>
    <filter id="sh9" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg9)"/>
  <rect x="3" y="3" width="494" height="344" rx="10" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Определение подобных треугольников</text>
  <text x="250" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#777">Геометрия 8 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00695C" stroke-width="1" opacity="0.3"/>

  <!-- Large triangle (ABC) -->
  <rect x="15" y="58" width="228" height="160" rx="8" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2" filter="url(#sh9)"/>
  <text x="129" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">△ABC — исходный</text>
  <!-- Triangle ABC -->
  <polygon points="80,195 40,105 160,105" fill="url(#tr9a)" opacity="0.2" stroke="#00695C" stroke-width="2"/>
  <!-- Vertex labels -->
  <text x="75" y="207" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#00695C">A</text>
  <text x="28" y="103" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#D32F2F">B</text>
  <text x="164" y="103" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1565C0">C</text>
  <!-- Angle marks -->
  <path d="M 55,195 Q 55,185 65,185" fill="none" stroke="#FF6F00" stroke-width="1.2"/>
  <text x="57" y="183" font-family="Arial,sans-serif" font-size="8" fill="#FF6F00">α</text>
  <path d="M 50,115 Q 55,120 55,115" fill="none" stroke="#D32F2F" stroke-width="1.2"/>
  <text x="55" y="128" font-family="Arial,sans-serif" font-size="8" fill="#D32F2F">β</text>
  <path d="M 145,115 Q 140,120 145,115" fill="none" stroke="#1565C0" stroke-width="1.2"/>
  <text x="136" y="128" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">γ</text>
  <!-- Side labels -->
  <text x="50" y="158" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">a</text>
  <text x="105" y="100" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">c</text>
  <text x="130" y="158" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">b</text>

  <!-- Small triangle (A₁B₁C₁) -->
  <rect x="257" y="58" width="228" height="160" rx="8" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2" filter="url(#sh9)"/>
  <text x="371" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">△A₁B₁C₁ — подобный</text>
  <!-- Triangle A1B1C1 (smaller) -->
  <polygon points="355,190 325,125 405,125" fill="url(#tr9b)" opacity="0.25" stroke="#00897B" stroke-width="2"/>
  <!-- Vertex labels -->
  <text x="350" y="203" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#00695C">A₁</text>
  <text x="313" y="123" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">B₁</text>
  <text x="409" y="123" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1565C0">C₁</text>
  <!-- Angle marks (same as ABC) -->
  <path d="M 340,190 Q 340,182 348,182" fill="none" stroke="#FF6F00" stroke-width="1.2"/>
  <text x="342" y="180" font-family="Arial,sans-serif" font-size="8" fill="#FF6F00">α</text>
  <path d="M 334,132 Q 338,136 338,132" fill="none" stroke="#D32F2F" stroke-width="1.2"/>
  <text x="337" y="144" font-family="Arial,sans-serif" font-size="8" fill="#D32F2F">β</text>
  <path d="M 395,132 Q 391,136 395,132" fill="none" stroke="#1565C0" stroke-width="1.2"/>
  <text x="389" y="144" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">γ</text>
  <!-- Side labels -->
  <text x="333" y="163" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00897B">a₁</text>
  <text x="370" y="120" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00897B">c₁</text>
  <text x="392" y="163" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00897B">b₁</text>
  <!-- Similarity notation -->
  <rect x="290" y="168" width="160" height="24" rx="5" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="370" y="184" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#00695C">△ABC ~ △A₁B₁C₁</text>

  <!-- Scaling panel -->
  <rect x="15" y="226" width="200" height="70" rx="8" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2" filter="url(#sh9)"/>
  <text x="115" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">🔄 Масштабирование</text>
  <!-- Scaling arrows -->
  <polygon points="40,275 80,260 80,275" fill="url(#tr9b)" opacity="0.3" stroke="#00897B" stroke-width="1.5"/>
  <text x="70" y="290" font-family="Arial,sans-serif" font-size="8" fill="#00897B">k=2</text>
  <!-- Arrow -->
  <text x="100" y="273" font-family="Arial,sans-serif" font-size="16" fill="#00695C">→</text>
  <polygon points="115,275 175,258 175,275" fill="url(#tr9a)" opacity="0.25" stroke="#00695C" stroke-width="1.5"/>
  <text x="150" y="290" font-family="Arial,sans-serif" font-size="8" fill="#00695C">2× размер</text>

  <!-- Definition panel -->
  <rect x="225" y="226" width="260" height="70" rx="8" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2" filter="url(#sh9)"/>
  <text x="355" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">📖 Определение</text>
  <text x="240" y="260" font-family="Arial,sans-serif" font-size="9" fill="#00695C">Углы равны: ∠A=∠A₁, ∠B=∠B₁, ∠C=∠C₁</text>
  <text x="240" y="275" font-family="Arial,sans-serif" font-size="9" fill="#00695C">Стороны пропорциональны:</text>
  <!-- Ratio formula -->
  <rect x="240" y="279" width="230" height="14" rx="3" fill="#E0F2F1"/>
  <text x="355" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">a/a₁ = b/b₁ = c/c₁ = k</text>

  <!-- Bottom bar -->
  <rect x="10" y="306" width="480" height="34" rx="8" fill="#00695C" opacity="0.85"/>
  <text x="250" y="327" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Подобные △: углы равны, стороны пропорциональны  |  k — коэффициент подобия</text>
</svg>