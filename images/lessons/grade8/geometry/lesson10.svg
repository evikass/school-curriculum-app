<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F1F8E9"/><stop offset="100%" stop-color="#DCEDC8"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#558B2F" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#558B2F" text-anchor="middle">Признаки подобия</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 10</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#558B2F" stroke-width="1" opacity="0.3"/>
<g transform="translate(30,75)">
  <rect x="0" y="0" width="140" height="65" rx="5" fill="white" opacity="0.85" stroke="#558B2F" stroke-width="0.8"/>
  <text x="70" y="14" font-family="Arial,sans-serif" font-size="8" fill="#558B2F" text-anchor="middle" font-weight="bold">1 признак</text>
  <text x="10" y="28" font-family="Arial,sans-serif" font-size="7" fill="#333">По двум углам</text>
  <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">∠A=∠A₁, ∠B=∠B₁</text>
  <text x="10" y="55" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" font-weight="bold">→ △ ~ △</text>
</g>
<g transform="translate(180,75)">
  <rect x="0" y="0" width="140" height="65" rx="5" fill="white" opacity="0.85" stroke="#558B2F" stroke-width="0.8"/>
  <text x="70" y="14" font-family="Arial,sans-serif" font-size="8" fill="#558B2F" text-anchor="middle" font-weight="bold">2 признак</text>
  <text x="10" y="28" font-family="Arial,sans-serif" font-size="7" fill="#333">По 2 сторонам и углу</text>
  <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">a/a₁=b/b₁, ∠C=∠C₁</text>
  <text x="10" y="55" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" font-weight="bold">→ △ ~ △</text>
</g>
<g transform="translate(330,75)">
  <rect x="0" y="0" width="140" height="65" rx="5" fill="white" opacity="0.85" stroke="#558B2F" stroke-width="0.8"/>
  <text x="70" y="14" font-family="Arial,sans-serif" font-size="8" fill="#558B2F" text-anchor="middle" font-weight="bold">3 признак</text>
  <text x="10" y="28" font-family="Arial,sans-serif" font-size="7" fill="#333">По трём сторонам</text>
  <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">a/a₁=b/b₁=c/c₁</text>
  <text x="10" y="55" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" font-weight="bold">→ △ ~ △</text>
</g>
<!-- Example: measuring tree height -->
<g transform="translate(100,230)">
  <line x1="0" y1="60" x2="0" y2="-40" stroke="#558B2F" stroke-width="3"/>
  <polygon points="-8,-40 8,-40 0,-55" fill="#558B2F"/>
  <text x="10" y="-40" font-family="Arial,sans-serif" font-size="7" fill="#558B2F">8м</text>
  <line x1="30" y1="60" x2="30" y2="30" stroke="#558B2F" stroke-width="2"/>
  <circle cx="30" cy="28" r="3" fill="#558B2F"/>
  <text x="38" y="28" font-family="Arial,sans-serif" font-size="7" fill="#558B2F">1,7м</text>
  <text x="40" y="55" font-family="Arial,sans-serif" font-size="7" fill="#558B2F">2м</text>
  <line x1="0" y1="60" x2="50" y2="60" stroke="#666" stroke-width="0.5" stroke-dasharray="3"/>
  <text x="15" y="85" font-family="Arial,sans-serif" font-size="8" fill="#558B2F" font-weight="bold">h=6,8м</text>
</g><rect x="10" y="330" width="480" height="16" rx="4" fill="#558B2F" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Геометрия 8 класс — Урок 10</text>
</svg>