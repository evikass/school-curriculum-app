<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <g opacity="0.04">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#10b981" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#10b981" stroke-width="0.5"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="55" fill="url(#headerGrad)" opacity="0.9"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="white">Биологическая роль галогенов</text>

  <!-- ===== HUMAN BODY SILHOUETTE (center) ===== -->
  <g transform="translate(310, 60)">
    <!-- Body glow -->
    <ellipse cx="90" cy="200" rx="100" ry="180" fill="url(#bodyGrad)"/>

    <!-- Head -->
    <ellipse cx="90" cy="45" rx="28" ry="32" fill="none" stroke="#14b8a6" stroke-width="1.2" opacity="0.5"/>
    <!-- Neck -->
    <rect x="80" y="77" width="20" height="12" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>
    <!-- Body/torso -->
    <path d="M 50 89 Q 50 85 55 82 L 125 82 Q 130 85 130 89 L 132 200 Q 132 210 125 215 L 55 215 Q 48 210 48 200 Z" fill="none" stroke="#14b8a6" stroke-width="1.2" opacity="0.5"/>
    <!-- Arms -->
    <path d="M 50 95 L 15 160 L 10 185" fill="none" stroke="#14b8a6" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <path d="M 130 95 L 165 160 L 170 185" fill="none" stroke="#14b8a6" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M 65 215 L 55 340 L 45 380" fill="none" stroke="#14b8a6" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
    <path d="M 115 215 L 125 340 L 135 380" fill="none" stroke="#14b8a6" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>

    <!-- ===== ORGAN HIGHLIGHTS ===== -->

    <!-- TEETH (Fluorine) - highlighted in head area -->
    <g filter="url(#softGlow)">
      <rect x="72" y="50" width="16" height="8" rx="2" fill="#10b981" opacity="0.6"/>
      <rect x="92" y="50" width="16" height="8" rx="2" fill="#10b981" opacity="0.6"/>
    </g>
    <!-- Label line to teeth -->
    <line x1="72" y1="50" x2="20" y2="40" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="72" cy="50" r="3" fill="#10b981"/>

    <!-- STOMACH (HCl/Cl) - in middle of torso -->
    <ellipse cx="90" cy="155" rx="20" ry="15" fill="#0d9488" opacity="0.4" filter="url(#softGlow)"/>
    <!-- Label line to stomach -->
    <line x1="70" y1="155" x2="20" y2="170" stroke="#0d9488" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="70" cy="155" r="3" fill="#0d9488"/>

    <!-- THYROID (Iodine) - on the neck -->
    <ellipse cx="80" cy="82" rx="8" ry="5" fill="#a78bfa" opacity="0.5" filter="url(#softGlow)"/>
    <ellipse cx="100" cy="82" rx="8" ry="5" fill="#a78bfa" opacity="0.5" filter="url(#softGlow)"/>
    <!-- Label line to thyroid -->
    <line x1="108" y1="80" x2="165" y2="72" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="108" cy="80" r="3" fill="#a78bfa"/>

    <!-- NERVOUS SYSTEM (Bromine) - along spine -->
    <line x1="90" y1="90" x2="90" y2="210" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="4,3"/>
    <!-- Spinal dots -->
    <circle cx="90" cy="100" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="90" cy="120" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="90" cy="140" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="90" cy="160" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="90" cy="180" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="90" cy="200" r="2" fill="#f59e0b" opacity="0.5"/>
    <!-- Label line -->
    <line x1="90" y1="120" x2="165" y2="140" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="90" cy="120" r="3" fill="#f59e0b"/>
  </g>

  <!-- ===== FLUORINE INFO (Top Left) ===== -->
  <g transform="translate(15, 68)">
    <rect width="185" height="95" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <circle cx="18" cy="18" r="12" fill="#10b981" opacity="0.3"/>
    <text x="18" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">F</text>
    <text x="38" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Фтор → Зубы</text>

    <text x="12" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Эмаль зубов: Ca₅(PO₄)₃F</text>
    <text x="12" y="57" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Укрепление костной ткани</text>
    <text x="12" y="72" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">⚠ Недостаток: кариес</text>
    <text x="12" y="87" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Норма: 1,5–4 мг/день</text>
  </g>

  <!-- ===== CHLORINE INFO (Left middle) ===== -->
  <g transform="translate(15, 175)">
    <rect width="185" height="105" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
    <circle cx="18" cy="18" r="12" fill="#0d9488" opacity="0.3"/>
    <text x="18" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">Cl</text>
    <text x="38" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">Хлор → Желудок</text>

    <text x="12" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• HCl в желудочном соке</text>
    <text x="12" y="57" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• pH ≈ 1–2 (кислая среда)</text>
    <text x="12" y="72" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Расщепление пищи</text>
    <text x="12" y="87" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">⚠ Недостаток: гастрит</text>
    <text x="12" y="100" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Норма: 2–5 г NaCl/день</text>
  </g>

  <!-- ===== IODINE INFO (Top Right) ===== -->
  <g transform="translate(595, 68)">
    <rect width="195" height="110" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
    <circle cx="18" cy="18" r="12" fill="#a78bfa" opacity="0.3"/>
    <text x="18" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa">I</text>
    <text x="38" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa">Йод → Щитовидная железа</text>

    <text x="12" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Тироксин (T₄) — гормон</text>
    <text x="12" y="57" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Регуляция обмена веществ</text>
    <text x="12" y="72" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Рост и развитие</text>
    <text x="12" y="87" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">⚠ Недостаток: зоб (эндемич.)</text>
    <text x="12" y="100" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Норма: 0,15–0,2 мг/день</text>
  </g>

  <!-- ===== BROMINE INFO (Right middle) ===== -->
  <g transform="translate(595, 190)">
    <rect width="195" height="95" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <circle cx="18" cy="18" r="12" fill="#f59e0b" opacity="0.3"/>
    <text x="18" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">Br</text>
    <text x="38" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">Бром → Нервная система</text>

    <text x="12" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Торможение нервной системы</text>
    <text x="12" y="57" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Седативный эффект</text>
    <text x="12" y="72" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">• Регуляция сна</text>
    <text x="12" y="87" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Присутствует в организме в</text>
    <text x="12" y="100" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">следовых количествах</text>
  </g>

  <!-- ===== BOTTOM: DISEASE PANEL ===== -->
  <g transform="translate(15, 300)">
    <rect width="775" height="90" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.2" opacity="0.85"/>
    <text x="387" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444">Заболевания при недостатке галогенов</text>

    <!-- Goiter -->
    <g transform="translate(15, 30)">
      <rect width="240" height="50" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="0.8"/>
      <text x="120" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">Эндемический зоб</text>
      <text x="120" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Недостаток йода (I)</text>
      <text x="120" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Профилактика: йодированная соль</text>
    </g>

    <!-- Caries -->
    <g transform="translate(270, 30)">
      <rect width="240" height="50" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="0.8"/>
      <text x="120" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Кариес</text>
      <text x="120" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Недостаток фтора (F)</text>
      <text x="120" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Профилактика: фторированная вода</text>
    </g>

    <!-- Gastritis -->
    <g transform="translate(525, 30)">
      <rect width="235" height="50" rx="6" fill="#0f172a" stroke="#0d9488" stroke-width="0.8"/>
      <text x="117" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">Гастрит (пониж. кисл.)</text>
      <text x="117" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Недостаток хлора (Cl⁻)</text>
      <text x="117" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Нарушение пищеварения</text>
    </g>
  </g>

  <!-- ===== BOTTOM SUMMARY ===== -->
  <g transform="translate(15, 405)">
    <rect width="775" height="75" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1" opacity="0.85"/>
    <text x="387" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Суточная потребность и источники галогенов</text>

    <!-- F -->
    <text x="20" y="42" font-family="Arial, sans-serif" font-size="11" fill="#10b981" font-weight="bold">F:</text>
    <text x="38" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">1,5–4 мг → чай, рыба, фтор. вода</text>

    <!-- Cl -->
    <text x="240" y="42" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" font-weight="bold">Cl:</text>
    <text x="258" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">2–5 г (NaCl) → повар. соль</text>

    <!-- Br -->
    <text x="440" y="42" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" font-weight="bold">Br:</text>
    <text x="460" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">0,5–1 мг → злаки, орехи</text>

    <!-- I -->
    <text x="630" y="42" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" font-weight="bold">I:</text>
    <text x="643" y="42" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">0,15–0,2 мг → морепродукты</text>

    <text x="387" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">Галогены — жизненно важные микроэлементы, необходимые для нормального функционирования организма</text>
  </g>

  <!-- Lesson badge -->
  <rect x="720" y="475" width="70" height="22" rx="11" fill="#059669" opacity="0.6"/>
  <text x="755" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Урок 34</text>
</svg>