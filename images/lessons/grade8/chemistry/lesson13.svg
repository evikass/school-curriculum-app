<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="nonmetalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="nobleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <radialGradient id="nucleusGlow13" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow13">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow13">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cellShadow13">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg13)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Периодический закон Д.И. Менделеева</text>

  <!-- Subtitle divider -->
  <line x1="150" y1="48" x2="650" y2="48" stroke="#0d9488" stroke-width="1" opacity="0.4"/>

  <!-- Mendeleev portrait placeholder -->
  <g transform="translate(30, 65)">
    <rect x="0" y="0" width="105" height="140" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
    <circle cx="52" cy="40" r="22" fill="#334155" stroke="#14b8a6" stroke-width="1.5"/>
    <!-- Hair -->
    <path d="M30,32 Q35,15 52,15 Q69,15 74,32" fill="#475569" stroke="none"/>
    <!-- Face outline -->
    <ellipse cx="52" cy="38" rx="16" ry="20" fill="#94a3b8" opacity="0.3"/>
    <!-- Beard -->
    <path d="M38,50 Q42,70 52,75 Q62,70 66,50" fill="#475569" stroke="none" opacity="0.7"/>
    <!-- Shoulders -->
    <path d="M25,80 Q35,70 52,68 Q69,70 79,80 L85,120 L19,120 Z" fill="#334155" stroke="#14b8a6" stroke-width="1"/>
    <!-- Label -->
    <text x="52" y="135" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Д.И. Менделеев</text>
  </g>

  <!-- Periodic Table Grid -->
  <g transform="translate(145, 60)">
    <!-- Period labels -->
    <text x="-12" y="22" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="end">I</text>
    <text x="-12" y="48" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="end">II</text>
    <text x="-12" y="80" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="end">III</text>
    <text x="-12" y="106" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="end">IV</text>

    <!-- Group labels -->
    <text x="17" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">I</text>
    <text x="49" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">II</text>
    <text x="81" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">III</text>
    <text x="113" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">IV</text>
    <text x="145" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">V</text>
    <text x="177" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">VI</text>
    <text x="209" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">VII</text>
    <text x="241" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">VIII</text>
    <text x="306" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">I</text>
    <text x="338" y="5" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">II</text>

    <!-- Period 1: H, He -->
    <rect x="1" y="10" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="16" y="20" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">1</text>
    <text x="16" y="30" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">H</text>

    <rect x="225" y="10" width="30" height="28" rx="4" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="240" y="20" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">2</text>
    <text x="240" y="30" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">He</text>

    <!-- Period 2: Li, Be, B, C, N, O, F, Ne -->
    <rect x="1" y="40" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="16" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">3</text>
    <text x="16" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Li</text>

    <rect x="33" y="40" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="48" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">4</text>
    <text x="48" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Be</text>

    <rect x="65" y="40" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="80" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">5</text>
    <text x="80" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">B</text>

    <rect x="97" y="40" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="112" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">6</text>
    <text x="112" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">C</text>

    <rect x="129" y="40" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="144" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">7</text>
    <text x="144" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">N</text>

    <rect x="161" y="40" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="176" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">8</text>
    <text x="176" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">O</text>

    <rect x="193" y="40" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="208" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">9</text>
    <text x="208" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">F</text>

    <rect x="225" y="40" width="30" height="28" rx="4" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="240" y="50" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">10</text>
    <text x="240" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">Ne</text>

    <!-- Period 3: Na, Mg, Al, Si, P, S, Cl, Ar -->
    <rect x="1" y="70" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="16" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">11</text>
    <text x="16" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Na</text>

    <rect x="33" y="70" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="48" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">12</text>
    <text x="48" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Mg</text>

    <rect x="65" y="70" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#14b8a6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="80" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">13</text>
    <text x="80" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6" text-anchor="middle">Al</text>

    <rect x="97" y="70" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="112" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">14</text>
    <text x="112" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">Si</text>

    <rect x="129" y="70" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="144" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">15</text>
    <text x="144" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">P</text>

    <rect x="161" y="70" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="176" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">16</text>
    <text x="176" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">S</text>

    <rect x="193" y="70" width="30" height="28" rx="4" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="208" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">17</text>
    <text x="208" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">Cl</text>

    <rect x="225" y="70" width="30" height="28" rx="4" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="240" y="80" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">18</text>
    <text x="240" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">Ar</text>

    <!-- Period 4: K, Ca -->
    <rect x="1" y="100" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="16" y="110" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">19</text>
    <text x="16" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">K</text>

    <rect x="33" y="100" width="30" height="28" rx="4" fill="#1e3a2f" stroke="#10b981" stroke-width="1" filter="url(#cellShadow13)"/>
    <text x="48" y="110" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">20</text>
    <text x="48" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Ca</text>

    <!-- Dots for continuation -->
    <text x="130" y="114" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">. . .</text>
  </g>

  <!-- Trend arrow: Metallic properties weakening -->
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="510" height="50" rx="8" fill="#0f172a" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
    <!-- Arrow -->
    <line x1="30" y1="25" x2="440" y2="25" stroke="url(#arrowGrad)" stroke-width="3" filter="url(#glow13)"/>
    <polygon points="445,25 430,18 430,32" fill="#8b5cf6" filter="url(#glow13)"/>
    <!-- Arrow labels -->
    <text x="40" y="18" font-family="Arial, sans-serif" font-size="10" fill="#10b981">Металлические</text>
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="10" fill="#10b981">свойства ↓</text>
    <text x="380" y="18" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">Неметаллические</text>
    <text x="380" y="40" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">свойства ↑</text>
  </g>

  <!-- Vertical trend arrow: Metallic properties increasing downward -->
  <g transform="translate(670, 65)">
    <rect x="0" y="0" width="105" height="190" rx="8" fill="#0f172a" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
    <line x1="25" y1="25" x2="25" y2="155" stroke="#10b981" stroke-width="3" filter="url(#glow13)"/>
    <polygon points="25,160 18,148 32,148" fill="#10b981" filter="url(#glow13)"/>
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">↓ Металлические</text>
    <text x="25" y="178" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">свойства ↑</text>
    <!-- Reverse arrow for nonmetal -->
    <line x1="80" y1="155" x2="80" y2="25" stroke="#a78bfa" stroke-width="3" filter="url(#glow13)"/>
    <polygon points="80,20 73,32 87,32" fill="#a78bfa" filter="url(#glow13)"/>
    <text x="80" y="178" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Неметалл. ↓</text>
  </g>

  <!-- Law text box -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="740" height="80" rx="10" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" filter="url(#cellShadow13)"/>
    <!-- Inner glow -->
    <rect x="3" y="3" width="734" height="74" rx="8" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.3"/>
    <!-- Quote icon -->
    <text x="20" y="35" font-family="serif" font-size="30" fill="#14b8a6" opacity="0.4">❝</text>
    <!-- Law text -->
    <text x="370" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Периодический закон</text>
    <text x="370" y="52" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Свойства химических элементов и их соединений находятся в</text>
    <text x="370" y="70" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">периодической зависимости от заряда ядра атома</text>
  </g>

  <!-- Key info boxes at bottom -->
  <g transform="translate(30, 370)">
    <!-- Period info -->
    <rect x="0" y="0" width="235" height="110" rx="8" fill="#0f172a" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="235" height="28" rx="8" fill="#0d9488" fill-opacity="0.15"/>
    <text x="117" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Период</text>
    <text x="15" y="48" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Горизонтальный ряд элементов</text>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Начинается щелочным металлом</text>
    <text x="15" y="82" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Заканчивается инертным газом</text>
    <text x="15" y="99" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Z увеличивается слева направо</text>
  </g>

  <g transform="translate(282, 370)">
    <!-- Group info -->
    <rect x="0" y="0" width="235" height="110" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="235" height="28" rx="8" fill="#8b5cf6" fill-opacity="0.15"/>
    <text x="117" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa" text-anchor="middle">Группа</text>
    <text x="15" y="48" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Вертикальный столбец</text>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Одинаковое число e⁻ на</text>
    <text x="15" y="82" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">  внешнем уровне</text>
    <text x="15" y="99" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Сходные химические свойства</text>
  </g>

  <g transform="translate(534, 370)">
    <!-- Atomic number info -->
    <rect x="0" y="0" width="236" height="110" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="236" height="28" rx="8" fill="#6366f1" fill-opacity="0.15"/>
    <text x="118" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#818cf8" text-anchor="middle">Порядковый номер</text>
    <text x="15" y="48" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Z = заряду ядра атома</text>
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Z = числу протонов</text>
    <text x="15" y="82" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">• Z = числу электронов</text>
    <text x="15" y="99" font-family="Arial, sans-serif" font-size="11" fill="#cbd5e1">  в нейтральном атоме</text>
  </g>

  <!-- Legend -->
  <g transform="translate(145, 162)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#1e3a2f" stroke="#10b981" stroke-width="1"/>
    <text x="18" y="10" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Металлы</text>
    <rect x="65" y="0" width="12" height="12" rx="2" fill="#2a1f4e" stroke="#8b5cf6" stroke-width="1"/>
    <text x="83" y="10" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Неметаллы</text>
    <rect x="145" y="0" width="12" height="12" rx="2" fill="#2d1f5e" stroke="#6366f1" stroke-width="1"/>
    <text x="163" y="10" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Инертные газы</text>
  </g>

  <!-- Decorative corner elements -->
  <circle cx="20" cy="20" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="780" cy="20" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="20" cy="480" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="780" cy="480" r="3" fill="#0d9488" opacity="0.3"/>
</svg>