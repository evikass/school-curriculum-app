<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="naGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="clGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="waterGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">Электролитическая диссоциация</text>
  <line x1="100" y1="46" x2="700" y2="46" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- ====== LEFT SIDE: NaCl Crystal Lattice ====== -->
  <rect x="20" y="58" width="350" height="230" rx="10" fill="#0f766e" fill-opacity="0.1" stroke="#0d9488" stroke-width="1"/>
  <text x="195" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Кристаллическая решётка NaCl</text>

  <!-- Crystal lattice grid -->
  <!-- Row 1 -->
  <circle cx="80" cy="110" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="80" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <circle cx="140" cy="110" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="140" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="200" cy="110" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="200" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <circle cx="260" cy="110" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="260" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="320" cy="110" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="320" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>

  <!-- Row 2 -->
  <circle cx="110" cy="155" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="110" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="170" cy="155" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <circle cx="230" cy="155" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="230" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="290" cy="155" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="290" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>

  <!-- Row 3 -->
  <circle cx="80" cy="200" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="80" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <circle cx="140" cy="200" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="140" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="200" cy="200" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <circle cx="260" cy="200" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="260" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="320" cy="200" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="320" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>

  <!-- Row 4 -->
  <circle cx="110" cy="245" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="110" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="170" cy="245" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="170" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <circle cx="230" cy="245" r="18" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="230" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <circle cx="290" cy="245" r="14" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="290" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Na⁺</text>

  <!-- Lattice bonds -->
  <line x1="94" y1="110" x2="122" y2="110" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="158" y1="110" x2="186" y2="110" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="214" y1="110" x2="242" y2="110" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="278" y1="110" x2="306" y2="110" stroke="#14b8a6" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ====== CENTER: Arrow "Диссоциация" ====== -->
  <line x1="370" y1="165" x2="420" y2="165" stroke="#10b981" stroke-width="3" marker-end="url(#arrowG)"/>
  <text x="395" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">H₂O</text>
  <text x="395" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">Диссоциация</text>

  <!-- ====== RIGHT SIDE: Dissolved ions with water ====== -->
  <rect x="430" y="58" width="350" height="230" rx="10" fill="#0d9488" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
  <text x="605" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Раствор (ионы)</text>

  <!-- Dissolved Na+ with water shell -->
  <circle cx="510" cy="140" r="24" fill="url(#naGrad)" filter="url(#glow)"/>
  <text x="510" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <!-- Water molecules around Na+ -->
  <circle cx="478" cy="110" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="478" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ-</text>
  <circle cx="545" cy="115" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="545" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ-</text>
  <circle cx="490" cy="172" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="490" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ-</text>
  <circle cx="535" cy="168" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="535" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ-</text>
  <!-- H2O labels -->
  <text x="478" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>
  <text x="545" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>
  <text x="490" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>
  <text x="535" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>

  <!-- Dissolved Cl- with water shell -->
  <circle cx="680" cy="140" r="26" fill="url(#clGrad)" filter="url(#glow)"/>
  <text x="680" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">Cl⁻</text>
  <!-- Water molecules around Cl- (oriented with δ+ toward Cl-) -->
  <circle cx="648" cy="112" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="648" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ+</text>
  <circle cx="715" cy="115" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="715" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ+</text>
  <circle cx="655" cy="172" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="655" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ+</text>
  <circle cx="710" cy="170" r="10" fill="url(#waterGrad)" stroke="#0d9488" stroke-width="0.5"/>
  <text x="710" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ccfbf1">δ+</text>
  <!-- H2O labels -->
  <text x="648" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>
  <text x="715" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>
  <text x="655" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>
  <text x="710" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">H₂O</text>

  <!-- Equation for dissociation -->
  <text x="605" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#f0fdf4">NaCl → Na⁺ + Cl⁻</text>
  <text x="605" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">(гидратация ионов водой)</text>

  <!-- Water molecule detail -->
  <rect x="20" y="296" width="180" height="80" rx="8" fill="#0f766e" fill-opacity="0.15" stroke="#0d9488" stroke-width="1"/>
  <text x="110" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Молекула H₂O</text>
  <!-- Simple water molecule drawing -->
  <circle cx="110" cy="348" r="12" fill="#0d9488" fill-opacity="0.6" stroke="#14b8a6" stroke-width="1"/>
  <text x="110" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f0fdf4">O</text>
  <circle cx="90" cy="330" r="8" fill="#0f766e" fill-opacity="0.5" stroke="#14b8a6" stroke-width="1"/>
  <text x="90" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">H</text>
  <circle cx="130" cy="330" r="8" fill="#0f766e" fill-opacity="0.5" stroke="#14b8a6" stroke-width="1"/>
  <text x="130" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">H</text>
  <line x1="97" y1="335" x2="103" y2="341" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="123" y1="335" x2="117" y2="341" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="85" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">δ+</text>
  <text x="135" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">δ+</text>
  <text x="110" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ccfbf1">δ−</text>

  <!-- ====== BOTTOM: Strong vs Weak Electrolytes ====== -->
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981">Сильные и слабые электролиты</text>
  <line x1="150" y1="318" x2="650" y2="318" stroke="#0d9488" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Strong electrolytes -->
  <rect x="30" y="330" width="355" height="155" rx="8" fill="#059669" fill-opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <text x="207" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">Сильные электролиты</text>
  <text x="207" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">(α ≈ 1, полная диссоциация)</text>

  <!-- Strong: many ions separated -->
  <circle cx="80" cy="405" r="8" fill="#10b981" fill-opacity="0.8"/>
  <text x="80" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">+</text>
  <circle cx="120" cy="415" r="10" fill="#14b8a6" fill-opacity="0.8"/>
  <text x="120" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">−</text>
  <circle cx="155" cy="395" r="8" fill="#10b981" fill-opacity="0.8"/>
  <text x="155" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">+</text>
  <circle cx="190" cy="420" r="10" fill="#14b8a6" fill-opacity="0.8"/>
  <text x="190" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">−</text>
  <circle cx="225" cy="400" r="8" fill="#10b981" fill-opacity="0.8"/>
  <text x="225" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">+</text>
  <circle cx="260" cy="410" r="10" fill="#14b8a6" fill-opacity="0.8"/>
  <text x="260" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">−</text>
  <circle cx="295" cy="395" r="8" fill="#10b981" fill-opacity="0.8"/>
  <text x="295" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">+</text>
  <circle cx="330" cy="415" r="10" fill="#14b8a6" fill-opacity="0.8"/>
  <text x="330" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">−</text>
  <circle cx="355" cy="400" r="8" fill="#10b981" fill-opacity="0.8"/>
  <text x="355" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">+</text>

  <text x="207" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">HCl, H₂SO₄, HNO₃, NaOH,</text>
  <text x="207" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">KOH, NaCl, KNO₃</text>

  <!-- Weak electrolytes -->
  <rect x="415" y="330" width="355" height="155" rx="8" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1.5"/>
  <text x="592" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Слабые электролиты</text>
  <text x="592" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">(α &lt;&lt; 1, частичная диссоциация)</text>

  <!-- Weak: some molecules still together, few ions -->
  <!-- Intact molecules -->
  <circle cx="470" cy="405" r="14" fill="#0f766e" fill-opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <text x="470" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">CH₃COOH</text>
  <circle cx="545" cy="410" r="14" fill="#0f766e" fill-opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <text x="545" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">CH₃COOH</text>
  <circle cx="640" cy="405" r="14" fill="#0f766e" fill-opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <text x="640" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">NH₃·H₂O</text>
  <!-- Few separated ions -->
  <circle cx="510" cy="430" r="7" fill="#10b981" fill-opacity="0.6"/>
  <text x="510" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#f0fdf4">+</text>
  <circle cx="595" cy="425" r="9" fill="#14b8a6" fill-opacity="0.6"/>
  <text x="595" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#f0fdf4">−</text>
  <circle cx="710" cy="408" r="14" fill="#0f766e" fill-opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <text x="710" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">NH₃·H₂O</text>

  <text x="592" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">CH₃COOH, NH₃·H₂O, H₂CO₃,</text>
  <text x="592" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">H₂S, H₂SO₃, H₃PO₄</text>

  <!-- Degree of dissociation label -->
  <text x="400" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">α = n(диссоциированных) / n(всех молекул)</text>
</svg>