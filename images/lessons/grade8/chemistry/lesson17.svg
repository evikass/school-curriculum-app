<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad17" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow17" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowEnd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad17)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" rx="16" fill="#0d9488"/>
  <rect x="0" y="30" width="800" height="30" fill="#0d9488"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f0fdfa" text-anchor="middle">Окислительно-восстановительные реакции</text>

  <!-- Na atom circle (left) -->
  <circle cx="180" cy="200" r="70" fill="white" stroke="#0d9488" stroke-width="3" filter="url(#shadow17)"/>
  <circle cx="180" cy="200" r="50" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="180" y="190" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0d9488" text-anchor="middle">Na</text>
  <text x="180" y="218" font-family="Arial, sans-serif" font-size="18" fill="#14b8a6" text-anchor="middle">⁰</text>

  <!-- Cl atom circle (right) -->
  <circle cx="620" cy="200" r="70" fill="white" stroke="#0d9488" stroke-width="3" filter="url(#shadow17)"/>
  <circle cx="620" cy="200" r="50" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="620" y="190" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0d9488" text-anchor="middle">Cl</text>
  <text x="620" y="218" font-family="Arial, sans-serif" font-size="18" fill="#14b8a6" text-anchor="middle">⁰</text>

  <!-- Electron transfer arrow -->
  <line x1="250" y1="175" x2="548" y2="175" stroke="#dc2626" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>

  <!-- Electron label on arrow -->
  <rect x="355" y="152" width="90" height="26" rx="13" fill="#dc2626"/>
  <text x="400" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">e⁻ →</text>

  <!-- Label: Восстановитель near Na -->
  <rect x="55" y="290" width="250" height="50" rx="10" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="180" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488" text-anchor="middle">Восстановитель</text>
  <text x="180" y="330" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">(отдаёт e⁻)</text>

  <!-- Label: Окислитель near Cl -->
  <rect x="495" y="290" width="250" height="50" rx="10" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="620" y="312" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488" text-anchor="middle">Окислитель</text>
  <text x="620" y="330" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">(принимает e⁻)</text>

  <!-- CO changes section -->
  <rect x="40" y="370" width="720" height="110" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow17)"/>
  <rect x="40" y="370" width="720" height="36" rx="12" fill="#0d9488"/>
  <rect x="40" y="390" width="720" height="16" fill="#0d9488"/>
  <text x="400" y="394" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Изменение степеней окисления (С.О.)</text>

  <!-- Na change -->
  <text x="220" y="435" font-family="Arial, sans-serif" font-size="20" fill="#0d9488" text-anchor="middle">Na⁰ → Na⁺¹</text>
  <text x="220" y="460" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6" text-anchor="middle">Окисление (С.О. повышается)</text>

  <!-- Cl change -->
  <text x="580" y="435" font-family="Arial, sans-serif" font-size="20" fill="#0d9488" text-anchor="middle">Cl⁰ → Cl⁻¹</text>
  <text x="580" y="460" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6" text-anchor="middle">Восстановление (С.О. понижается)</text>

  <!-- Divider line -->
  <line x1="400" y1="415" x2="400" y2="470" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Result equation -->
  <rect x="230" y="85" width="340" height="35" rx="8" fill="#14b8a6" opacity="0.15"/>
  <text x="400" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">2Na⁰ + Cl₂⁰ → 2Na⁺¹Cl⁻¹</text>
</svg>