<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#10b981"/>
    </marker>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">Реакции ионного обмена</text>
  <line x1="100" y1="46" x2="700" y2="46" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- ====== TOP: Molecular equation ====== -->
  <rect x="30" y="58" width="740" height="70" rx="10" fill="#0f766e" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">Молекулярное уравнение</text>

  <!-- Reactants -->
  <rect x="60" y="86" width="120" height="32" rx="6" fill="#059669" fill-opacity="0.25" stroke="#10b981" stroke-width="1"/>
  <text x="120" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">AgNO₃</text>

  <text x="210" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#10b981">+</text>

  <rect x="240" y="86" width="100" height="32" rx="6" fill="#059669" fill-opacity="0.25" stroke="#10b981" stroke-width="1"/>
  <text x="290" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">NaCl</text>

  <!-- Arrow -->
  <text x="380" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981">→</text>

  <!-- Products -->
  <rect x="420" y="86" width="90" height="32" rx="6" fill="#0d9488" fill-opacity="0.25" stroke="#14b8a6" stroke-width="1"/>
  <text x="465" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">AgCl↓</text>

  <text x="535" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#10b981">+</text>

  <rect x="560" y="86" width="120" height="32" rx="6" fill="#0d9488" fill-opacity="0.25" stroke="#14b8a6" stroke-width="1"/>
  <text x="620" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">NaNO₃</text>

  <!-- Precipitate indicator -->
  <text x="465" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f97316">⬇ осадок</text>

  <!-- ====== MIDDLE: Full ionic equation ====== -->
  <rect x="30" y="140" width="740" height="100" rx="10" fill="#0d9488" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">Полное ионное уравнение</text>

  <!-- Left side ions -->
  <text x="65" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">Ag⁺</text>
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="16" fill="#10b981">+</text>
  <text x="120" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">NO₃⁻</text>
  <text x="170" y="190" font-family="Arial, sans-serif" font-size="16" fill="#10b981">+</text>
  <text x="195" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">Na⁺</text>
  <text x="230" y="190" font-family="Arial, sans-serif" font-size="16" fill="#10b981">+</text>
  <text x="255" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">Cl⁻</text>

  <!-- Arrow -->
  <text x="310" y="190" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981">→</text>

  <!-- Right side: AgCl (not ionized - precipitate) + spectator ions -->
  <text x="360" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">AgCl↓</text>
  <text x="420" y="190" font-family="Arial, sans-serif" font-size="16" fill="#10b981">+</text>

  <!-- Spectator ions with strikethrough -->
  <text x="450" y="190" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-decoration="line-through">Na⁺</text>
  <text x="490" y="190" font-family="Arial, sans-serif" font-size="16" fill="#10b981">+</text>
  <text x="515" y="190" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-decoration="line-through">NO₃⁻</text>

  <!-- Spectator ion labels -->
  <text x="472" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f97316">ион-наблюдатель</text>
  <text x="535" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f97316">ион-наблюдатель</text>

  <!-- Cancellation lines for spectator ions (thick red/orange) -->
  <line x1="445" y1="188" x2="490" y2="188" stroke="#f97316" stroke-width="2.5"/>
  <line x1="510" y1="188" x2="565" y2="188" stroke="#f97316" stroke-width="2.5"/>

  <!-- Highlight box for spectator ions -->
  <rect x="438" y="172" width="140" height="28" rx="4" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2" stroke-opacity="0.6"/>
  <text x="508" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f97316">одинаковые ионы сокращаются</text>

  <!-- ====== BOTTOM: Net ionic equation ====== -->
  <rect x="30" y="250" width="740" height="70" rx="10" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Сокращённое ионное уравнение</text>

  <text x="280" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f0fdf4">Ag⁺ + Cl⁻ → AgCl↓</text>

  <!-- Checkmark -->
  <text x="540" y="300" font-family="Arial, sans-serif" font-size="16" fill="#10b981">✓ суть реакции</text>

  <!-- ====== Visual representation of the reaction ====== -->
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Визуализация реакции</text>
  <line x1="150" y1="352" x2="650" y2="352" stroke="#0d9488" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Before reaction beaker -->
  <rect x="40" y="365" width="300" height="120" rx="8" fill="#0f766e" fill-opacity="0.1" stroke="#0d9488" stroke-width="1"/>
  <text x="190" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">До реакции (растворы смешаны)</text>

  <!-- Beaker outline -->
  <path d="M60,395 L60,470 L180,470 L180,395" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="50" y1="395" x2="190" y2="395" stroke="#14b8a6" stroke-width="2"/>

  <!-- Ions in beaker -->
  <circle cx="90" cy="420" r="10" fill="#10b981" fill-opacity="0.7"/>
  <text x="90" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Ag⁺</text>
  <circle cx="130" cy="440" r="10" fill="#0d9488" fill-opacity="0.7"/>
  <text x="130" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">NO₃⁻</text>
  <circle cx="110" cy="455" r="9" fill="#14b8a6" fill-opacity="0.7"/>
  <text x="110" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="155" cy="420" r="10" fill="#059669" fill-opacity="0.7"/>
  <text x="155" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Cl⁻</text>
  <circle cx="80" cy="450" r="10" fill="#10b981" fill-opacity="0.7"/>
  <text x="80" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Ag⁺</text>
  <circle cx="150" cy="455" r="9" fill="#14b8a6" fill-opacity="0.7"/>
  <text x="150" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>

  <!-- Arrow between beakers -->
  <line x1="355" y1="425" x2="420" y2="425" stroke="#10b981" stroke-width="3" marker-end="url(#arrowG)"/>

  <!-- After reaction beaker -->
  <rect x="430" y="365" width="340" height="120" rx="8" fill="#0f766e" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="600" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#10b981">После реакции (осадок AgCl)</text>

  <!-- Beaker outline -->
  <path d="M450,395 L450,470 L580,470 L580,395" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <line x1="440" y1="395" x2="590" y2="395" stroke="#10b981" stroke-width="2"/>

  <!-- Precipitate at bottom -->
  <ellipse cx="515" cy="465" rx="55" ry="8" fill="#94a3b8" fill-opacity="0.4"/>
  <text x="515" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">AgCl↓</text>

  <!-- Remaining spectator ions in solution -->
  <circle cx="480" cy="420" r="9" fill="#14b8a6" fill-opacity="0.5"/>
  <text x="480" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="520" cy="430" r="10" fill="#0d9488" fill-opacity="0.5"/>
  <text x="520" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">NO₃⁻</text>
  <circle cx="550" cy="418" r="9" fill="#14b8a6" fill-opacity="0.5"/>
  <text x="550" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">Na⁺</text>
  <circle cx="500" cy="440" r="10" fill="#0d9488" fill-opacity="0.5"/>
  <text x="500" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">NO₃⁻</text>

  <!-- Precipitate falling -->
  <circle cx="515" cy="445" r="8" fill="#94a3b8" fill-opacity="0.6"/>
  <text x="515" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#0f172a">AgCl</text>

  <!-- Legend on right side -->
  <rect x="600" y="395" width="160" height="80" rx="6" fill="#0f172a" fill-opacity="0.6" stroke="#0d9488" stroke-width="0.5"/>
  <text x="680" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#14b8a6">Условия реакций обмена:</text>
  <text x="610" y="428" font-family="Arial, sans-serif" font-size="9" fill="#f0fdf4">↓ — образуется осадок</text>
  <text x="610" y="442" font-family="Arial, sans-serif" font-size="9" fill="#f0fdf4">↑ — выделяется газ</text>
  <text x="610" y="456" font-family="Arial, sans-serif" font-size="9" fill="#f0fdf4">— образуется H₂O</text>
  <text x="610" y="470" font-family="Arial, sans-serif" font-size="8" fill="#64748b">(слабый электролит)</text>
</svg>