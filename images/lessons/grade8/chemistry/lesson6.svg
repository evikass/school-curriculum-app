<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <radialGradient id="protonGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </radialGradient>
    <radialGradient id="neutronGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="electronGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f0fdfa"/>
  <rect x="4" y="4" width="792" height="492" rx="14" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488">Строение атома. Состав атомного ядра</text>

  <!-- Atom model centered at 320, 270 -->

  <!-- Electron orbit 3 (outermost) -->
  <ellipse cx="320" cy="270" rx="210" ry="170" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <!-- Electron orbit 2 -->
  <ellipse cx="320" cy="270" rx="145" ry="115" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- Electron orbit 1 (innermost) -->
  <ellipse cx="320" cy="270" rx="80" ry="60" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.7"/>

  <!-- Nucleus glow -->
  <circle cx="320" cy="270" r="52" fill="#2dd4bf" opacity="0.15" filter="glow"/>

  <!-- Protons in nucleus (red) -->
  <circle cx="305" cy="255" r="16" fill="url(#protonGrad)" stroke="#b91c1c" stroke-width="1"/>
  <text x="305" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">p⁺</text>

  <circle cx="335" cy="255" r="16" fill="url(#protonGrad)" stroke="#b91c1c" stroke-width="1"/>
  <text x="335" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">p⁺</text>

  <circle cx="320" cy="280" r="16" fill="url(#protonGrad)" stroke="#b91c1c" stroke-width="1"/>
  <text x="320" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">p⁺</text>

  <!-- Neutrons in nucleus (blue) -->
  <circle cx="320" cy="255" r="16" fill="url(#neutronGrad)" stroke="#4338ca" stroke-width="1"/>
  <text x="320" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">n⁰</text>

  <circle cx="310" cy="278" r="16" fill="url(#neutronGrad)" stroke="#4338ca" stroke-width="1"/>
  <text x="310" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">n⁰</text>

  <circle cx="340" cy="278" r="16" fill="url(#neutronGrad)" stroke="#4338ca" stroke-width="1"/>
  <text x="340" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">n⁰</text>

  <!-- Electrons on orbits -->
  <!-- Orbit 1 -->
  <circle cx="400" cy="270" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="400" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <circle cx="240" cy="270" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="240" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <!-- Orbit 2 -->
  <circle cx="465" cy="270" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="465" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <circle cx="175" cy="270" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="175" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <circle cx="320" cy="155" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="320" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <!-- Orbit 3 -->
  <circle cx="530" cy="270" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="530" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <circle cx="110" cy="270" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="110" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <circle cx="320" cy="440" r="10" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1" filter="glow"/>
  <text x="320" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>

  <!-- Label: Ядро -->
  <line x1="370" y1="245" x2="420" y2="200" stroke="#0d9488" stroke-width="1.5" marker-end="none"/>
  <rect x="420" y="185" width="65" height="26" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="452" y="203" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Ядро</text>

  <!-- Right panel: Legend and formula -->
  <rect x="590" y="70" width="190" height="280" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5" opacity="0.95"/>

  <text x="685" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488">Обозначения</text>
  <line x1="610" y1="108" x2="760" y2="108" stroke="#2dd4bf" stroke-width="1"/>

  <!-- Proton legend -->
  <circle cx="625" cy="138" r="12" fill="url(#protonGrad)" stroke="#b91c1c" stroke-width="1"/>
  <text x="625" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">p⁺</text>
  <text x="645" y="143" font-family="Arial, sans-serif" font-size="14" fill="#1e293b">Протоны (p⁺)</text>

  <!-- Neutron legend -->
  <circle cx="625" cy="175" r="12" fill="url(#neutronGrad)" stroke="#4338ca" stroke-width="1"/>
  <text x="625" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">n⁰</text>
  <text x="645" y="180" font-family="Arial, sans-serif" font-size="14" fill="#1e293b">Нейтроны (n⁰)</text>

  <!-- Electron legend -->
  <circle cx="625" cy="212" r="12" fill="url(#electronGrad)" stroke="#d97706" stroke-width="1"/>
  <text x="625" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#78350f">e⁻</text>
  <text x="645" y="217" font-family="Arial, sans-serif" font-size="14" fill="#1e293b">Электроны (e⁻)</text>

  <!-- Separator -->
  <line x1="610" y1="237" x2="760" y2="237" stroke="#2dd4bf" stroke-width="1"/>

  <!-- Formula -->
  <text x="685" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0d9488">Формула ядра:</text>

  <rect x="620" y="278" width="130" height="50" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="685" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488">A = Z + N</text>
  <text x="685" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">массовое число</text>

  <!-- Formula explanation -->
  <rect x="30" y="420" width="530" height="65" rx="10" fill="white" stroke="#14b8a6" stroke-width="1.2" opacity="0.95"/>
  <text x="50" y="445" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" font-weight="bold">A</text>
  <text x="62" y="445" font-family="Arial, sans-serif" font-size="13" fill="#1e293b"> — массовое число (протоны + нейтроны)</text>
  <text x="50" y="465" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" font-weight="bold">Z</text>
  <text x="63" y="465" font-family="Arial, sans-serif" font-size="13" fill="#1e293b"> — число протонов (заряд ядра)</text>
  <text x="50" y="480" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" font-weight="bold">N</text>
  <text x="65" y="480" font-family="Arial, sans-serif" font-size="13" fill="#1e293b"> — число нейтронов</text>
</svg>