<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#6D4C41" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#6D4C41" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#6D4C41" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#6D4C41" text-anchor="middle">Золотой век русской литературы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#6D4C41" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#6D4C41" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#FFF3E0"/>
      <text x="250" y="125" font-family="Arial,sans-serif" font-size="17" fill="#6D4C41" text-anchor="middle" font-weight="bold">Золотой век русской литературы</text>
      <rect x="25" y="145" width="140" height="50" rx="5" fill="#EFEBE9" stroke="#6D4C41" stroke-width="1.5"/>
      <text x="95" y="165" font-family="Arial" font-size="11" fill="#6D4C41" text-anchor="middle">XIX век</text>
      <text x="95" y="183" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Расцвет русской культуры</text>
      <rect x="170" y="145" width="140" height="50" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
      <text x="240" y="165" font-family="Arial" font-size="11" fill="#1565C0" text-anchor="middle">А.С. Пушкин</text>
      <text x="240" y="183" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Основоположник</text>
      <rect x="315" y="145" width="140" height="50" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
      <text x="385" y="165" font-family="Arial" font-size="11" fill="#2E7D32" text-anchor="middle">М.Ю. Лермонтов</text>
      <text x="385" y="183" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Н.В. Гоголь</text>
      <rect x="60" y="210" width="170" height="35" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
      <text x="145" y="232" font-family="Arial" font-size="11" fill="#E65100" text-anchor="middle">Реализм и романтизм</text>
      <rect x="260" y="210" width="170" height="35" rx="5" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
      <text x="345" y="232" font-family="Arial" font-size="11" fill="#6A1B9A" text-anchor="middle">Великое наследие</text>
  </g>
  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>