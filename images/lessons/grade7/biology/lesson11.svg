<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="animalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FF8A65"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <rect x="1" y="1" width="498" height="348" fill="none" stroke="#2E7D32" stroke-width="2" rx="8"/>
  <!-- Header -->
  <rect x="4" y="4" width="492" height="28" fill="url(#hdr)" rx="6"/>
  <text x="250" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#fff" font-weight="bold">Общая характеристика царства Растения</text>

  <!-- === Plant Cell === -->
  <text x="60" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" font-weight="bold">Растительная клетка</text>
  <rect x="12" y="52" width="96" height="72" fill="url(#cellGrad)" stroke="#2E7D32" stroke-width="2" rx="3"/>
  <!-- Chloroplasts -->
  <ellipse cx="35" cy="72" rx="10" ry="5" fill="#388E3C" stroke="#1B5E20" stroke-width="0.7"/>
  <line x1="28" y1="72" x2="42" y2="72" stroke="#1B5E20" stroke-width="0.5"/>
  <ellipse cx="70" cy="68" rx="10" ry="5" fill="#388E3C" stroke="#1B5E20" stroke-width="0.7"/>
  <line x1="63" y1="68" x2="77" y2="68" stroke="#1B5E20" stroke-width="0.5"/>
  <ellipse cx="55" cy="105" rx="10" ry="5" fill="#388E3C" stroke="#1B5E20" stroke-width="0.7"/>
  <!-- Vacuole -->
  <rect x="28" y="82" width="56" height="28" fill="#C8E6C9" stroke="#81C784" stroke-width="1" rx="8" opacity="0.7"/>
  <text x="56" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">вакуоль</text>
  <!-- Nucleus -->
  <ellipse cx="82" cy="98" rx="12" ry="10" fill="#795548" stroke="#4E342E" stroke-width="1"/>
  <ellipse cx="82" cy="98" rx="4" ry="3" fill="#4E342E"/>
  <!-- Cell wall label -->
  <line x1="108" y1="56" x2="118" y2="50" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="119" y="50" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">клеточная</text>
  <text x="119" y="57" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">стенка</text>
  <!-- Chloroplast label -->
  <line x1="42" y1="72" x2="118" y2="68" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="119" y="68" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">хлоропласты</text>
  <!-- Vacuole label -->
  <line x1="84" y1="96" x2="118" y2="82" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="119" y="82" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">вакуоль</text>
  <!-- Nucleus label -->
  <line x1="94" y1="98" x2="118" y2="95" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="119" y="95" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">ядро</text>

  <!-- === Animal Cell === -->
  <text x="205" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" font-weight="bold">Животная клетка</text>
  <ellipse cx="205" cy="88" rx="48" ry="36" fill="url(#animalGrad)" stroke="#E64A19" stroke-width="1.5"/>
  <!-- Nucleus -->
  <ellipse cx="210" cy="85" rx="14" ry="11" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <ellipse cx="210" cy="85" rx="4" ry="3" fill="#4E342E"/>
  <!-- Small organelles -->
  <circle cx="185" cy="75" r="4" fill="#FFAB91" stroke="#E64A19" stroke-width="0.5"/>
  <circle cx="225" cy="100" r="3" fill="#FFAB91" stroke="#E64A19" stroke-width="0.5"/>
  <circle cx="230" cy="72" r="3.5" fill="#FFAB91" stroke="#E64A19" stroke-width="0.5"/>
  <!-- Labels -->
  <text x="170" y="130" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">Нет хлоропластов</text>
  <text x="170" y="138" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">Нет клеточной стенки</text>
  <text x="170" y="146" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">Малая вакуоль</text>

  <!-- === VS arrow === -->
  <text x="137" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">VS</text>

  <!-- === 5 Tissue Types === -->
  <text x="250" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" font-weight="bold">Ткани растений</text>
  <line x1="310" y1="38" x2="310" y2="155" stroke="#81C784" stroke-width="0.5"/>

  <!-- Tissue 1: Образовательная -->
  <rect x="318" y="42" width="44" height="22" fill="#E8F5E9" stroke="#43A047" stroke-width="1" rx="4"/>
  <circle cx="330" cy="50" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="340" cy="48" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="350" cy="51" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="335" cy="58" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="345" cy="57" r="3" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="370" y="55" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Образовательная</text>
  <text x="370" y="63" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(деление клеток)</text>

  <!-- Tissue 2: Покровная -->
  <rect x="318" y="68" width="44" height="18" fill="#E8F5E9" stroke="#43A047" stroke-width="1" rx="4"/>
  <rect x="322" y="71" width="8" height="12" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="332" y="71" width="8" height="12" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="342" y="71" width="8" height="12" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="352" y="71" width="8" height="12" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="370" y="78" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Покровная</text>
  <text x="370" y="86" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(защита)</text>

  <!-- Tissue 3: Основная -->
  <rect x="318" y="90" width="44" height="18" fill="#E8F5E9" stroke="#43A047" stroke-width="1" rx="4"/>
  <circle cx="332" cy="99" r="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <circle cx="346" cy="99" r="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <circle cx="339" cy="99" r="2" fill="#388E3C"/>
  <text x="370" y="100" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Основная</text>
  <text x="370" y="108" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(фотосинтез)</text>

  <!-- Tissue 4: Проводящая -->
  <rect x="318" y="112" width="44" height="18" fill="#E8F5E9" stroke="#43A047" stroke-width="1" rx="4"/>
  <line x1="325" y1="118" x2="355" y2="118" stroke="#1565C0" stroke-width="2"/>
  <line x1="325" y1="124" x2="355" y2="124" stroke="#8D6E63" stroke-width="2"/>
  <text x="370" y="121" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Проводящая</text>
  <text x="370" y="129" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(транспорт веществ)</text>

  <!-- Tissue 5: Механическая -->
  <rect x="318" y="134" width="44" height="18" fill="#E8F5E9" stroke="#43A047" stroke-width="1" rx="4"/>
  <line x1="325" y1="137" x2="325" y2="149" stroke="#5D4037" stroke-width="2.5"/>
  <line x1="333" y1="137" x2="333" y2="149" stroke="#5D4037" stroke-width="2.5"/>
  <line x1="341" y1="137" x2="341" y2="149" stroke="#5D4037" stroke-width="2.5"/>
  <line x1="349" y1="137" x2="349" y2="149" stroke="#5D4037" stroke-width="2.5"/>
  <text x="370" y="143" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Механическая</text>
  <text x="370" y="151" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(прочность)</text>

  <!-- === Classification Tree === -->
  <text x="250" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Классификация царства Растения</text>
  <line x1="4" y1="160" x2="496" y2="160" stroke="#81C784" stroke-width="0.5"/>

  <!-- Root -->
  <rect x="200" y="178" width="100" height="20" fill="#2E7D32" stroke="#1B5E20" stroke-width="1" rx="4"/>
  <text x="250" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff" font-weight="bold">Растения</text>

  <!-- Branch lines -->
  <line x1="250" y1="198" x2="250" y2="210" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="130" y1="210" x2="370" y2="210" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="130" y1="210" x2="130" y2="220" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="370" y1="210" x2="370" y2="220" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Низшие -->
  <rect x="75" y="220" width="110" height="20" fill="#66BB6A" stroke="#2E7D32" stroke-width="1" rx="4"/>
  <text x="130" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff" font-weight="bold">Низшие</text>

  <!-- Высшие -->
  <rect x="315" y="220" width="110" height="20" fill="#43A047" stroke="#2E7D32" stroke-width="1" rx="4"/>
  <text x="370" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fff" font-weight="bold">Высшие</text>

  <!-- Низшие sub -->
  <line x1="130" y1="240" x2="130" y2="252" stroke="#2E7D32" stroke-width="1"/>
  <rect x="80" y="252" width="100" height="18" fill="#A5D6A7" stroke="#43A047" stroke-width="1" rx="4"/>
  <text x="130" y="264" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Водоросли</text>
  <!-- Small algae icon -->
  <path d="M110,274 Q115,268 120,274 Q125,268 130,274 Q135,268 140,274 Q145,268 150,274" fill="none" stroke="#2E7D32" stroke-width="1"/>
  <text x="130" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#558B2F">(нет тканей)</text>

  <!-- Высшие branches -->
  <line x1="370" y1="240" x2="370" y2="248" stroke="#2E7D32" stroke-width="1"/>
  <line x1="250" y1="248" x2="475" y2="248" stroke="#2E7D32" stroke-width="1"/>

  <!-- Мхи -->
  <line x1="250" y1="248" x2="250" y2="256" stroke="#2E7D32" stroke-width="1"/>
  <rect x="215" y="256" width="70" height="18" fill="#81C784" stroke="#388E3C" stroke-width="1" rx="4"/>
  <text x="250" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Мхи</text>
  <text x="250" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(нет корней)</text>

  <!-- Папоротники -->
  <line x1="325" y1="248" x2="325" y2="256" stroke="#2E7D32" stroke-width="1"/>
  <rect x="288" y="256" width="74" height="18" fill="#81C784" stroke="#388E3C" stroke-width="1" rx="4"/>
  <text x="325" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Папоротники</text>
  <text x="325" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(споры)</text>

  <!-- Голосеменные -->
  <line x1="400" y1="248" x2="400" y2="256" stroke="#2E7D32" stroke-width="1"/>
  <rect x="362" y="256" width="76" height="18" fill="#81C784" stroke="#388E3C" stroke-width="1" rx="4"/>
  <text x="400" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Голосеменные</text>
  <text x="400" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">(семена, нет плода)</text>

  <!-- Покрытосеменные -->
  <line x1="475" y1="248" x2="475" y2="256" stroke="#2E7D32" stroke-width="1"/>
  <rect x="438" y="256" width="58" height="18" fill="#81C784" stroke="#388E3C" stroke-width="1" rx="4"/>
  <text x="467" y="266" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Покрыто-</text>
  <text x="467" y="273" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">семенные</text>
  <text x="467" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#558B2F">(цветок, плод)</text>

  <!-- Bottom note -->
  <rect x="4" y="298" width="492" height="48" fill="#E8F5E9" fill-opacity="0.6" rx="4"/>
  <text x="250" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" font-weight="bold">Главные отличия растительной клетки:</text>
  <text x="250" y="324" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">• Хлоропласты — фотосинтез    • Крупная вакуоль — запас воды</text>
  <text x="250" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">• Клеточная стенка (целлюлоза) — прочность и форма</text>
</svg>