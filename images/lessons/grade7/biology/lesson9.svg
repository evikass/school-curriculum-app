<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плесневые грибы и дрожжи</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 7 класс — Урок 9</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Мукор (Mucor) -->
<g transform="translate(90,135)">
  <rect x="-72" y="-68" width="144" height="140" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">МУКОР</text>
  <line x1="-55" y1="-47" x2="55" y2="-47" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Horizontal hyphae (stolon) -->
  <path d="M-45,-15 Q-20,-20 0,-15 Q20,-10 45,-15" stroke="#7B1FA2" stroke-width="2" fill="none"/>
  <!-- Rhizoids going down -->
  <path d="M-30,-15 Q-32,-5 -35,10 Q-33,20 -30,25" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
  <path d="M-25,-15 Q-22,0 -28,15 Q-26,22 -25,28" stroke="#7B1FA2" stroke-width="1.2" fill="none"/>
  <!-- Sporangiophores going up -->
  <line x1="0" y1="-15" x2="0" y2="-35" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="0" cy="-40" r="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="0" y="-37" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">сп.</text>

  <line x1="20" y1="-12" x2="25" y2="-38" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="25" cy="-43" r="7" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="25" y="-40" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">сп.</text>

  <line x1="-15" y1="-16" x2="-20" y2="-35" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="-20" cy="-40" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.2"/>

  <!-- Labels -->
  <line x1="8" y1="-40" x2="45" y2="-50" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="46" y="-47" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">спорангий</text>
  <line x1="2" y1="-25" x2="45" y2="-22" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="46" y="-19" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">спорангиеносец</text>
  <line x1="-33" y1="5" x2="-55" y2="5" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="-55" y="8" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="end">ризоиды</text>

  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Несептированный мицелий</text>
  <text x="0" y="52" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(одноклеточная многоядерная)</text>
  <text x="0" y="64" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">грибница</text>
</g>

<!-- Пеницилл (Penicillium) -->
<g transform="translate(260,135)">
  <rect x="-72" y="-68" width="144" height="140" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">ПЕНИЦИЛЛ</text>
  <line x1="-55" y1="-47" x2="55" y2="-47" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Main stalk (conidiophore) -->
  <line x1="0" y1="25" x2="0" y2="-15" stroke="#1565C0" stroke-width="2"/>
  <!-- Brush-like branching at top -->
  <line x1="0" y1="-15" x2="-12" y2="-25" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="0" y1="-15" x2="12" y2="-25" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="0" y1="-12" x2="-8" y2="-22" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="0" y1="-12" x2="8" y2="-22" stroke="#1565C0" stroke-width="1.2"/>
  <!-- Conidiospores at tips (chains of small circles) -->
  <circle cx="-14" cy="-28" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="-12" cy="-32" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="-10" cy="-36" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="-8" cy="-25" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="-6" cy="-29" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="8" cy="-25" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="6" cy="-29" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="12" cy="-28" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="14" cy="-32" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="10" cy="-36" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>

  <!-- Hyphae at base -->
  <path d="M-25,30 Q-15,25 -5,28 Q5,25 15,28 Q25,25 30,30" stroke="#1565C0" stroke-width="1.2" fill="none"/>

  <!-- Labels -->
  <text x="30" y="-30" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">конидии</text>
  <text x="30" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">конидиеносец</text>

  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Септированный мицелий</text>
  <text x="0" y="52" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">«кисточка» — конидиеносец</text>
  <text x="0" y="64" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Источник пенициллина</text>
</g>

<!-- Дрожжи (Yeasts) and Fermentation -->
<g transform="translate(420,135)">
  <rect x="-58" y="-68" width="116" height="140" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">ДРОЖЖИ</text>
  <line x1="-42" y1="-47" x2="42" y2="-47" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Budding yeast cells -->
  <!-- Parent cell -->
  <ellipse cx="-8" cy="-25" rx="10" ry="8" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/>
  <circle cx="-10" cy="-25" r="2.5" fill="#F57F17" opacity="0.5"/>
  <!-- Bud 1 -->
  <ellipse cx="5" cy="-30" rx="6" ry="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
  <circle cx="4" cy="-30" r="1.5" fill="#F57F17" opacity="0.4"/>
  <!-- Daughter cell with own bud -->
  <ellipse cx="20" cy="-20" rx="9" ry="7" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/>
  <circle cx="18" cy="-20" r="2" fill="#F57F17" opacity="0.5"/>
  <ellipse cx="30" cy="-24" rx="5" ry="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <!-- Arrows showing budding -->
  <path d="M3,-26 L8,-27" stroke="#F9A825" stroke-width="0.5"/>
  <path d="M14,-23 L16,-22" stroke="#F9A825" stroke-width="0.5"/>

  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle" font-weight="bold">Почкование</text>

  <!-- Fermentation equation -->
  <rect x="-42" y="0" width="84" height="38" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Брожение</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">C₆H₁₂O₆ →</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">2C₂H₅OH + 2CO₂</text>

  <!-- Products labels -->
  <text x="-18" y="48" font-family="Arial,sans-serif" font-size="5" fill="#FF6F00" text-anchor="middle">этанол</text>
  <text x="22" y="48" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">CO₂</text>
  <!-- Bubbles for CO2 -->
  <circle cx="30" cy="55" r="3" fill="none" stroke="#795548" stroke-width="0.8"/>
  <circle cx="35" cy="60" r="2" fill="none" stroke="#795548" stroke-width="0.8"/>

  <text x="0" y="68" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Без кислорода!</text>
</g>

<!-- Applications panel -->
<rect x="30" y="250" width="440" height="60" rx="5" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
<text x="250" y="264" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Применение плесневых грибов и дрожжей</text>
<line x1="40" y1="270" x2="460" y2="270" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Bread -->
<g transform="translate(85,288)">
  <rect x="-28" y="-8" width="56" height="22" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Хлеб</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">дрожжи</text>
</g>
<!-- Beer -->
<g transform="translate(175,288)">
  <rect x="-28" y="-8" width="56" height="22" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Пиво</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">брожение</text>
</g>
<!-- Antibiotics -->
<g transform="translate(280,288)">
  <rect x="-35" y="-8" width="70" height="22" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Антибиотики</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">пеницилл</text>
</g>
<!-- Cheeses -->
<g transform="translate(385,288)">
  <rect x="-35" y="-8" width="70" height="22" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Сыры</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">благородная плесень</text>
</g>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 7 класс</text>
</svg>