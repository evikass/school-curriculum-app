<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Значение высших споровых растений</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 19</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section 1: Coal Formation Process -->
<text x="250" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Образование угля</text>
<rect x="10" y="72" width="480" height="85" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Stage 1: Ancient plants -->
<g transform="translate(50,112)">
  <ellipse cx="0" cy="0" rx="18" ry="14" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
  <!-- Fern fronds -->
  <path d="M-5,-10 Q-12,-6 -16,-2" stroke="#4CAF50" stroke-width="0.8" fill="none"/>
  <path d="M5,-10 Q12,-6 16,-2" stroke="#4CAF50" stroke-width="0.8" fill="none"/>
  <path d="M0,-12 Q0,-16 0,-18" stroke="#4CAF50" stroke-width="0.8" fill="none"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Растения</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(Карбон)</text>
</g>
<path d="M72,112 L95,112" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
<text x="84" y="106" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">отмирание</text>

<!-- Stage 2: Peat -->
<g transform="translate(130,112)">
  <ellipse cx="0" cy="0" rx="18" ry="14" fill="#A1887F" stroke="#795548" stroke-width="1"/>
  <path d="M-10,-5 Q0,-8 10,-5" stroke="#8D6E63" stroke-width="0.8" fill="none"/>
  <path d="M-8,3 Q0,0 8,3" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Торф</text>
</g>
<path d="M152,112 L175,112" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
<text x="164" y="106" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">давление</text>

<!-- Stage 3: Lignite -->
<g transform="translate(210,112)">
  <ellipse cx="0" cy="0" rx="18" ry="14" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <line x1="-10" y1="-3" x2="10" y2="-3" stroke="#6D4C41" stroke-width="0.6"/>
  <line x1="-8" y1="4" x2="8" y2="4" stroke="#6D4C41" stroke-width="0.6"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Бурый уголь</text>
</g>
<path d="M232,112 L255,112" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
<text x="244" y="106" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">давление</text>

<!-- Stage 4: Coal -->
<g transform="translate(295,112)">
  <ellipse cx="0" cy="0" rx="18" ry="14" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
  <line x1="-10" y1="-2" x2="10" y2="-2" stroke="#4E342E" stroke-width="0.8"/>
  <line x1="-8" y1="5" x2="8" y2="5" stroke="#4E342E" stroke-width="0.8"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Каменный уголь</text>
</g>
<path d="M317,112 L340,112" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arr)"/>
<text x="329" y="106" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">давление</text>

<!-- Stage 5: Anthracite -->
<g transform="translate(385,112)">
  <ellipse cx="0" cy="0" rx="18" ry="14" fill="#37474F" stroke="#263238" stroke-width="1"/>
  <line x1="-8" y1="0" x2="8" y2="0" stroke="#455A64" stroke-width="0.6"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Антрацит</text>
</g>

<!-- Time/conditions arrow -->
<path d="M50,140 L385,140" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr)"/>
<text x="215" y="150" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">увеличение давления и температуры →</text>

<!-- Section 2: Coal Uses -->
<text x="130" y="172" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Использование угля</text>
<rect x="10" y="176" width="245" height="82" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Energy -->
<g transform="translate(55,210)">
  <!-- Flame/electricity icon -->
  <path d="M0,8 Q-6,0 -4,-6 Q-2,-10 0,-4 Q2,-10 4,-6 Q6,0 0,8 Z" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Энергия</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">ТЭЦ, отопление</text>
</g>

<!-- Metallurgy -->
<g transform="translate(125,210)">
  <!-- Factory/blast furnace -->
  <rect x="-8" y="-4" width="16" height="14" rx="1" fill="#78909C" stroke="#455A64" stroke-width="0.8"/>
  <rect x="-4" y="-8" width="4" height="4" fill="#90A4AE" stroke="#546E7A" stroke-width="0.5"/>
  <path d="M-2,-8 Q0,-14 2,-8" fill="#FF9800" opacity="0.7"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Металлургия</text>
  <text x="0" y="27" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">кокс, чугун</text>
</g>

<!-- Chemistry -->
<g transform="translate(200,210)">
  <!-- Flask -->
  <path d="M-3,-8 L-3,-3 L-10,8 L10,8 L3,-3 L3,-8 Z" fill="#E1F5FE" stroke="#0288D1" stroke-width="0.8"/>
  <rect x="-4" y="-10" width="8" height="3" rx="1" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.5"/>
  <circle cx="-2" cy="4" r="1.5" fill="#4FC3F7"/>
  <circle cx="3" cy="3" r="1" fill="#29B6F6"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Химия</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">смолы, газ</text>
</g>

<!-- Coal products -->
<text x="132" y="248" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Коксовый газ • Каменноугольная смола • Бензол • Аммиак</text>

<!-- Section 3: Ornamental & Medicinal -->
<text x="385" y="172" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Декоративные и лекарственные</text>
<rect x="265" y="176" width="225" height="82" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Nephrolepis (ornamental fern) -->
<g transform="translate(310,210)">
  <!-- Pot -->
  <path d="M-10,4 L-8,12 L8,12 L10,4 Z" fill="#A1887F" stroke="#6D4C41" stroke-width="0.8"/>
  <rect x="-11" y="2" width="22" height="3" rx="1" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5"/>
  <!-- Fern fronds -->
  <path d="M0,2 Q-2,-8 0,-18" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <path d="M0,2 Q8,-5 14,-12" stroke="#2E7D32" stroke-width="0.8" fill="none"/>
  <path d="M0,2 Q-8,-5 -14,-12" stroke="#2E7D32" stroke-width="0.8" fill="none"/>
  <path d="M0,2 Q5,-8 8,-16" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  <path d="M0,2 Q-5,-8 -8,-16" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Нефролепис</text>
  <text x="0" y="27" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(комнатное раст.)</text>
</g>

<!-- Horsetail medicinal -->
<g transform="translate(395,210)">
  <!-- Horsetail plant -->
  <line x1="0" y1="8" x2="0" y2="-14" stroke="#66BB6A" stroke-width="1.5"/>
  <rect x="-2" y="-4" width="4" height="2" fill="#4CAF50"/>
  <rect x="-2" y="-10" width="4" height="2" fill="#4CAF50"/>
  <line x1="-2" y1="-4" x2="-8" y2="-7" stroke="#81C784" stroke-width="0.6"/>
  <line x1="2" y1="-4" x2="8" y2="-7" stroke="#81C784" stroke-width="0.6"/>
  <line x1="-2" y1="-10" x2="-7" y2="-13" stroke="#81C784" stroke-width="0.6"/>
  <line x1="2" y1="-10" x2="7" y2="-13" stroke="#81C784" stroke-width="0.6"/>
  <!-- Medicine cross -->
  <rect x="8" y="-16" width="8" height="8" rx="1" fill="white" stroke="#F44336" stroke-width="0.8"/>
  <line x1="12" y1="-14" x2="12" y2="-10" stroke="#F44336" stroke-width="1"/>
  <line x1="10" y1="-12" x2="14" y2="-12" stroke="#F44336" stroke-width="1"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Хвощ полевой</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(мочегонное)</text>
</g>

<!-- Clubmoss medicinal -->
<g transform="translate(460,210)">
  <!-- Clubmoss -->
  <path d="M-10,8 Q0,5 10,8" stroke="#2E7D32" stroke-width="1.2" fill="none"/>
  <path d="M0,7 Q0,-2 -2,-10" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <ellipse cx="-2" cy="-14" rx="3" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="0.6"/>
  <!-- Medicine cross -->
  <rect x="5" y="-18" width="8" height="8" rx="1" fill="white" stroke="#F44336" stroke-width="0.8"/>
  <line x1="9" y1="-16" x2="9" y2="-12" stroke="#F44336" stroke-width="1"/>
  <line x1="7" y1="-14" x2="11" y2="-14" stroke="#F44336" stroke-width="1"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Плаун</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(ранозаживл.)</text>
</g>

<!-- Section 4: Red Book Protection -->
<text x="250" y="272" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Охрана редких видов (Красная книга)</text>
<rect x="10" y="276" width="480" height="64" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Red Book icon -->
<g transform="translate(40,305)">
  <rect x="-12" y="-14" width="24" height="28" rx="2" fill="#F44336" stroke="#B71C1C" stroke-width="1.2"/>
  <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">КК</text>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle">РФ</text>
</g>

<!-- Protected species -->
<g transform="translate(110,295)">
  <!-- Small fern -->
  <path d="M0,10 Q-2,5 0,-5" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <path d="M0,2 Q-8,-2 -12,-5" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  <path d="M0,0 Q8,-4 12,-6" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  <circle cx="0" cy="-8" r="6" fill="none" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="-4" y1="-12" x2="4" y2="-4" stroke="#F44336" stroke-width="0.8"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Гроздовник</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">полулунный</text>
</g>

<g transform="translate(200,295)">
  <!-- Small clubmoss -->
  <path d="M-12,10 Q0,7 12,10" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <path d="M0,8 Q0,0 -2,-8" stroke="#2E7D32" stroke-width="0.8" fill="none"/>
  <ellipse cx="-2" cy="-12" rx="3" ry="4" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <circle cx="0" cy="-2" r="8" fill="none" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="-6" y1="-8" x2="6" y2="4" stroke="#F44336" stroke-width="0.8"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Плаун</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">сплюснутый</text>
</g>

<g transform="translate(290,295)">
  <!-- Small horsetail -->
  <line x1="0" y1="10" x2="0" y2="-6" stroke="#66BB6A" stroke-width="1.2"/>
  <rect x="-1.5" y="0" width="3" height="1.5" fill="#4CAF50"/>
  <rect x="-1.5" y="-4" width="3" height="1.5" fill="#4CAF50"/>
  <line x1="-1.5" y1="0" x2="-5" y2="-2" stroke="#81C784" stroke-width="0.5"/>
  <line x1="1.5" y1="0" x2="5" y2="-2" stroke="#81C784" stroke-width="0.5"/>
  <circle cx="0" cy="0" r="8" fill="none" stroke="#F44336" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="-6" y1="-6" x2="6" y2="6" stroke="#F44336" stroke-width="0.8"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Хвощ</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">камышковый</text>
</g>

<!-- Reasons for protection -->
<g transform="translate(400,290)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">Причины охраны:</text>
  <text x="0" y="10" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Медленный рост</text>
  <text x="0" y="19" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Разрушение мест</text>
  <text x="5" y="27" font-family="Arial,sans-serif" font-size="5.5" fill="#333">обитания</text>
  <text x="0" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Сбор растений</text>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Осушение болот</text>
</g>
</svg>