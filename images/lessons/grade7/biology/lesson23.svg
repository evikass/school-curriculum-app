<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Общая характеристика покрытосеменных</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 23</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section 1: Flower Diagram -->
<text x="115" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение цветка</text>
<rect x="10" y="70" width="210" height="145" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Flower center at (115, 140) -->
<!-- Pedicel -->
<line x1="115" y1="190" x2="115" y2="165" stroke="#4CAF50" stroke-width="2"/>
<text x="130" y="192" font-family="Arial,sans-serif" font-size="5" fill="#555">Цветоножка</text>

<!-- Receptacle -->
<ellipse cx="115" cy="165" rx="10" ry="4" fill="#81C784" stroke="#4CAF50" stroke-width="0.6"/>
<text x="140" y="168" font-family="Arial,sans-serif" font-size="5" fill="#555">Цветоложе</text>

<!-- Sepals (green, outer) -->
<path d="M95,155 Q85,135 90,120 Q95,130 100,140Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
<path d="M135,155 Q145,135 140,120 Q135,130 130,140Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
<path d="M105,160 Q90,145 95,125 Q100,140 108,155Z" fill="#81C784" stroke="#4CAF50" stroke-width="0.5"/>
<path d="M125,160 Q140,145 135,125 Q130,140 122,155Z" fill="#81C784" stroke="#4CAF50" stroke-width="0.5"/>
<text x="60" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">Чашелистики</text>
<text x="60" y="142" font-family="Arial,sans-serif" font-size="5" fill="#555">(чашечка)</text>

<!-- Petals (colored, middle) -->
<path d="M95,150 Q75,120 85,100 Q95,115 105,140Z" fill="#F48FB1" stroke="#E91E63" stroke-width="0.6"/>
<path d="M135,150 Q155,120 145,100 Q135,115 125,140Z" fill="#F48FB1" stroke="#E91E63" stroke-width="0.6"/>
<path d="M100,145 Q80,110 95,90 Q105,110 110,138Z" fill="#F06292" stroke="#C2185B" stroke-width="0.5"/>
<path d="M130,145 Q150,110 135,90 Q125,110 120,138Z" fill="#F06292" stroke="#C2185B" stroke-width="0.5"/>
<path d="M108,140 Q100,100 115,85 Q130,100 122,140Z" fill="#EC407A" stroke="#AD1457" stroke-width="0.5"/>
<text x="150" y="100" font-family="Arial,sans-serif" font-size="5.5" fill="#C2185B">Лепестки</text>
<text x="150" y="107" font-family="Arial,sans-serif" font-size="5" fill="#555">(венчик)</text>

<!-- Stamens (filament + anther) -->
<!-- Left stamen -->
<line x1="100" y1="130" x2="88" y2="108" stroke="#FFB300" stroke-width="0.8"/>
<ellipse cx="86" cy="106" rx="3" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
<!-- Right stamen -->
<line x1="130" y1="130" x2="142" y2="108" stroke="#FFB300" stroke-width="0.8"/>
<ellipse cx="144" cy="106" rx="3" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
<!-- Front stamen -->
<line x1="108" y1="125" x2="102" y2="105" stroke="#FFB300" stroke-width="0.7"/>
<ellipse cx="101" cy="103" rx="2.5" ry="4" fill="#FFD54F" stroke="#F9A825" stroke-width="0.4"/>
<!-- Another stamen -->
<line x1="122" y1="125" x2="128" y2="105" stroke="#FFB300" stroke-width="0.7"/>
<ellipse cx="129" cy="103" rx="2.5" ry="4" fill="#FFD54F" stroke="#F9A825" stroke-width="0.4"/>
<text x="155" y="115" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">Тычинки</text>
<text x="158" y="122" font-family="Arial,sans-serif" font-size="4.5" fill="#888">(пыльники)</text>

<!-- Pistil (carpel) in center -->
<ellipse cx="115" cy="140" rx="6" ry="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.6"/>
<line x1="115" y1="132" x2="115" y2="115" stroke="#7B1FA2" stroke-width="1.2"/>
<circle cx="115" cy="113" r="3" fill="#AB47BC" stroke="#7B1FA2" stroke-width="0.6"/>
<!-- Ovary label -->
<text x="115" y="156" font-family="Arial,sans-serif" font-size="5.5" fill="#6A1B9A" text-anchor="middle">Завязь</text>
<line x1="115" y1="148" x2="115" y2="153" stroke="#6A1B9A" stroke-width="0.3"/>
<text x="108" y="108" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A">Рыльце</text>
<text x="120" y="125" font-family="Arial,sans-serif" font-size="4.5" fill="#888">Столбик</text>

<!-- Section 2: Double Fertilization -->
<text x="380" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Двойное оплодотворение</text>
<rect x="230" y="70" width="260" height="145" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Pollen tube -->
<path d="M260,90 L260,140" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="248" y="100" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="end">Пыльцевая</text>
<text x="248" y="106" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="end">трубка</text>

<!-- Pollen grain at top -->
<circle cx="260" cy="85" r="4" fill="#FFD54F" stroke="#F9A825" stroke-width="0.6"/>
<text x="260" y="87" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">2n</text>

<!-- Two sperm cells in tube -->
<circle cx="260" cy="110" r="3" fill="#FF7043" stroke="#D84315" stroke-width="0.5"/>
<text x="260" y="112" font-family="Arial,sans-serif" font-size="3.5" fill="white" text-anchor="middle">♂1</text>
<circle cx="260" cy="120" r="3" fill="#FF8A65" stroke="#D84315" stroke-width="0.5"/>
<text x="260" y="122" font-family="Arial,sans-serif" font-size="3.5" fill="white" text-anchor="middle">♂2</text>

<!-- Ovule (embryo sac) -->
<ellipse cx="330" cy="130" rx="25" ry="18" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
<text x="330" y="122" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">Семязачаток</text>

<!-- Egg cell -->
<circle cx="320" cy="135" r="5" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5"/>
<text x="320" y="137" font-family="Arial,sans-serif" font-size="3.5" fill="white" text-anchor="middle">♀</text>

<!-- Central cell -->
<ellipse cx="345" cy="132" rx="8" ry="5" fill="#E1BEE7" stroke="#8E24AA" stroke-width="0.5"/>
<text x="345" y="134" font-family="Arial,sans-serif" font-size="3.5" fill="#6A1B9A" text-anchor="middle">2n</text>

<!-- Arrow: sperm1 + egg = embryo -->
<path d="M264,110 Q290,115 316,133" stroke="#D84315" stroke-width="0.8" fill="none" marker-end="none"/>
<text x="285" y="118" font-family="Arial,sans-serif" font-size="4.5" fill="#D84315">♂1 + ♀</text>

<!-- Arrow: sperm2 + central cell = endosperm -->
<path d="M264,122 Q300,120 338,130" stroke="#E65100" stroke-width="0.8" fill="none" marker-end="none"/>
<text x="295" y="126" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100">♂2 + 2n</text>

<!-- Results -->
<!-- Embryo -->
<rect x="280" y="150" width="55" height="28" fill="#FFF3E0" stroke="#E65100" stroke-width="0.6" rx="3"/>
<text x="307" y="160" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Зародыш</text>
<text x="307" y="167" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">(2n) — диплоид</text>
<text x="307" y="174" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">новый организм</text>
<line x1="318" y1="140" x2="307" y2="150" stroke="#E65100" stroke-width="0.5"/>

<!-- Endosperm -->
<rect x="370" y="150" width="60" height="28" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.6" rx="3"/>
<text x="400" y="160" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">Эндосперм</text>
<text x="400" y="167" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">(3n) — триплоид</text>
<text x="400" y="174" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">запас питательных</text>
<line x1="350" y1="137" x2="390" y2="150" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Key discovery note -->
<text x="380" y="195" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">Открыто С.Г. Навашиным (1898)</text>

<!-- Section 3: Fruit with seed -->
<rect x="10" y="220" width="150" height="70" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>
<text x="85" y="234" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Плод защищает семена</text>

<!-- Fruit cross-section -->
<ellipse cx="50" cy="265" rx="18" ry="14" fill="#FF8A65" stroke="#E64A19" stroke-width="0.8"/>
<!-- Pericarp layers -->
<text x="50" y="258" font-family="Arial,sans-serif" font-size="3.5" fill="#BF360C" text-anchor="middle">Околоплодник</text>
<!-- Seed inside -->
<ellipse cx="50" cy="267" rx="8" ry="6" fill="#A1887F" stroke="#6D4C41" stroke-width="0.6"/>
<text x="50" y="269" font-family="Arial,sans-serif" font-size="3.5" fill="white" text-anchor="middle">Семя</text>
<!-- Labels -->
<text x="78" y="252" font-family="Arial,sans-serif" font-size="4.5" fill="#E64A19">Стенка завязи →</text>
<text x="78" y="259" font-family="Arial,sans-serif" font-size="4.5" fill="#E64A19">около плодник</text>
<text x="78" y="270" font-family="Arial,sans-serif" font-size="4.5" fill="#6D4C41">Семязачаток →</text>
<text x="78" y="277" font-family="Arial,sans-serif" font-size="4.5" fill="#6D4C41">семя</text>
<!-- Key advantage -->
<text x="85" y="288" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">Ключевое преимущество!</text>

<!-- Section 4: Двудольные vs Однодольные Comparison -->
<text x="330" y="220" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнение классов</text>
<rect x="170" y="225" width="320" height="100" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Table header -->
<rect x="175" y="228" width="105" height="14" fill="#2E7D32" rx="2"/>
<text x="227" y="238" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Признак</text>
<rect x="282" y="228" width="100" height="14" fill="#4CAF50" rx="2"/>
<text x="332" y="238" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Двудольные</text>
<rect x="384" y="228" width="100" height="14" fill="#66BB6A" rx="2"/>
<text x="434" y="238" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Однодольные</text>

<!-- Row 1: Семядоли -->
<rect x="175" y="243" width="105" height="12" fill="#F1F8E9" rx="1"/>
<text x="227" y="252" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Семядоли</text>
<rect x="282" y="243" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="332" y="252" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">2 семядоли</text>
<rect x="384" y="243" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="434" y="252" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">1 семядоля</text>

<!-- Row 2: Жилкование -->
<rect x="175" y="256" width="105" height="12" fill="#F1F8E9" rx="1"/>
<text x="227" y="265" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Жилкование</text>
<rect x="282" y="256" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="332" y="265" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Сетчатое</text>
<rect x="384" y="256" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="434" y="265" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Параллельное / дуговое</text>

<!-- Row 3: Корневая -->
<rect x="175" y="269" width="105" height="12" fill="#F1F8E9" rx="1"/>
<text x="227" y="278" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Корневая</text>
<rect x="282" y="269" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="332" y="278" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Стержневая</text>
<rect x="384" y="269" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="434" y="278" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Мочковатая</text>

<!-- Row 4: Камбий -->
<rect x="175" y="282" width="105" height="12" fill="#F1F8E9" rx="1"/>
<text x="227" y="291" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Камбий</text>
<rect x="282" y="282" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="332" y="291" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Есть (+ рост)</text>
<rect x="384" y="282" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="434" y="291" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Нет</text>

<!-- Row 5: Цветки -->
<rect x="175" y="295" width="105" height="12" fill="#F1F8E9" rx="1"/>
<text x="227" y="304" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Число частей</text>
<rect x="282" y="295" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="332" y="304" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">4-5 (кратность)</text>
<rect x="384" y="295" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="434" y="304" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">3 (кратность)</text>

<!-- Row 6: Виды -->
<rect x="175" y="308" width="105" height="12" fill="#F1F8E9" rx="1"/>
<text x="227" y="317" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Видов</text>
<rect x="282" y="308" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="332" y="317" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">~200 000</text>
<rect x="384" y="308" width="100" height="12" fill="white" fill-opacity="0.5" rx="1"/>
<text x="434" y="317" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">~60 000</text>

<!-- Small leaf diagrams in table -->
<!-- Dicot leaf (net venation) -->
<g transform="translate(310,278)">
  <ellipse rx="6" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="-5" y1="0" x2="5" y2="0" stroke="#2E7D32" stroke-width="0.2"/>
  <line x1="0" y1="0" x2="3" y2="-2" stroke="#2E7D32" stroke-width="0.2"/>
  <line x1="0" y1="0" x2="3" y2="2" stroke="#2E7D32" stroke-width="0.2"/>
  <line x1="-2" y1="0" x2="-1" y2="-2" stroke="#2E7D32" stroke-width="0.2"/>
  <line x1="-2" y1="0" x2="-1" y2="2" stroke="#2E7D32" stroke-width="0.2"/>
</g>
<!-- Monocot leaf (parallel venation) -->
<g transform="translate(412,278)">
  <ellipse rx="2.5" ry="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="-1" y1="-4" x2="-1" y2="4" stroke="#2E7D32" stroke-width="0.2"/>
  <line x1="0" y1="-4" x2="0" y2="4" stroke="#2E7D32" stroke-width="0.2"/>
  <line x1="1" y1="-4" x2="1" y2="4" stroke="#2E7D32" stroke-width="0.2"/>
</g>

<!-- Bottom note -->
<text x="250" y="340" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Покрытосеменные (Angiospermae) — ~350 000 видов | Господствуют на Земле с мелового периода (~130 млн лет)</text>
</svg>