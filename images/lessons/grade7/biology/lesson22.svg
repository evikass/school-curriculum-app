<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Значение голосеменных</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 22</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section 1: Taiga Forest Cross-Section -->
<text x="135" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Тайга — экосистема хвойного леса</text>
<rect x="10" y="70" width="250" height="140" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Sky -->
<rect x="10" y="70" width="250" height="45" fill="#E3F2FD" fill-opacity="0.5" rx="5"/>

<!-- Sun -->
<circle cx="230" cy="82" r="10" fill="#FFF9C4" stroke="#FFD54F" stroke-width="0.8"/>
<!-- Clouds -->
<ellipse cx="70" cy="80" rx="15" ry="5" fill="white" fill-opacity="0.6"/>
<ellipse cx="160" cy="78" rx="12" ry="4" fill="white" fill-opacity="0.5"/>

<!-- Background trees (far) -->
<polygon points="40,100 30,155 50,155" fill="#388E3C" opacity="0.5"/>
<polygon points="80,100 65,155 95,155" fill="#2E7D32" opacity="0.5"/>
<polygon points="140,100 125,155 155,155" fill="#388E3C" opacity="0.5"/>
<polygon points="200,100 185,155 215,155" fill="#2E7D32" opacity="0.5"/>

<!-- Canopy layer label -->
<text x="252" y="95" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">Ярус 1</text>
<text x="252" y="101" font-family="Arial,sans-serif" font-size="4.5" fill="#555">Древесный</text>

<!-- Foreground trees -->
<rect x="48" y="130" width="5" height="50" fill="#6D4C41"/>
<polygon points="50,90 36,140 64,140" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
<polygon points="50,105 32,150 68,150" fill="#388E3C" stroke="#2E7D32" stroke-width="0.5"/>

<rect x="128" y="120" width="5" height="55" fill="#6D4C41"/>
<polygon points="130,85 118,135 142,135" fill="#43A047" stroke="#2E7D32" stroke-width="0.5"/>
<polygon points="130,100 115,145 145,145" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>

<rect x="198" y="125" width="5" height="50" fill="#6D4C41"/>
<polygon points="200,95 190,140 210,140" fill="#388E3C" stroke="#2E7D32" stroke-width="0.5"/>
<polygon points="200,108 188,148 212,148" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>

<!-- Understory / shrub layer -->
<ellipse cx="90" cy="170" rx="12" ry="8" fill="#81C784" opacity="0.7"/>
<ellipse cx="170" cy="172" rx="10" ry="6" fill="#A5D6A7" opacity="0.7"/>
<text x="252" y="165" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">Ярус 2</text>
<text x="252" y="171" font-family="Arial,sans-serif" font-size="4.5" fill="#555">Кустарниковый</text>

<!-- Ground / moss layer -->
<rect x="10" y="175" width="250" height="35" fill="#A5D6A7" fill-opacity="0.4" rx="0"/>
<path d="M10,180 Q30,176 50,180 Q70,184 90,180 Q110,176 130,180 Q150,184 170,180 Q190,176 210,180 Q230,184 250,180" fill="#66BB6A" opacity="0.5"/>
<!-- Moss patches -->
<ellipse cx="30" cy="188" rx="10" ry="3" fill="#4CAF50" opacity="0.4"/>
<ellipse cx="110" cy="190" rx="12" ry="3" fill="#4CAF50" opacity="0.4"/>
<ellipse cx="190" cy="187" rx="8" ry="3" fill="#4CAF50" opacity="0.4"/>
<!-- Small mushroom -->
<rect x="70" y="186" width="1.5" height="5" fill="#BCAAA4"/>
<ellipse cx="70.75" cy="186" rx="3" ry="2" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.3"/>

<text x="252" y="195" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">Ярус 3</text>
<text x="252" y="201" font-family="Arial,sans-serif" font-size="4.5" fill="#555">Мохово-лишайниковый</text>

<!-- Roots -->
<path d="M48,180 Q40,190 35,195" stroke="#795548" stroke-width="1" fill="none" opacity="0.5"/>
<path d="M53,180 Q60,190 65,193" stroke="#795548" stroke-width="1" fill="none" opacity="0.5"/>
<path d="M128,175 Q120,185 115,190" stroke="#795548" stroke-width="1" fill="none" opacity="0.5"/>

<!-- Soil -->
<rect x="10" y="195" width="250" height="15" fill="#8D6E63" fill-opacity="0.25" rx="0 0 5 5"/>

<!-- Animals: moose, bird, squirrel -->
<!-- Squirrel -->
<circle cx="60" cy="148" r="3" fill="#8D6E63"/>
<path d="M57,148 Q52,140 55,135" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
<!-- Bird -->
<path d="M170,100 Q175,95 180,100 Q185,95 190,100" stroke="#1565C0" stroke-width="1" fill="none"/>
<!-- Moose silhouette (small) -->
<ellipse cx="220" cy="172" rx="8" ry="5" fill="#795548" opacity="0.5"/>
<line x1="215" y1="167" x2="214" y2="158" stroke="#795548" stroke-width="1" opacity="0.5"/>
<line x1="225" y1="167" x2="226" y2="158" stroke="#795548" stroke-width="1" opacity="0.5"/>

<!-- Section 2: Wood Products -->
<text x="385" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Продукция из древесины</text>
<rect x="270" y="70" width="220" height="80" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- House / construction -->
<g transform="translate(305,100)">
  <rect x="-10" y="-10" width="20" height="15" fill="#A1887F" stroke="#795548" stroke-width="0.6"/>
  <polygon points="-12,-10 0,-20 12,-10" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.6"/>
  <rect x="-3" y="-2" width="6" height="7" fill="#5D4037"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Строительство</text>
</g>

<!-- Furniture -->
<g transform="translate(360,100)">
  <rect x="-8" y="-5" width="16" height="3" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5"/>
  <rect x="-7" y="-2" width="2" height="8" fill="#795548"/>
  <rect x="5" y="-2" width="2" height="8" fill="#795548"/>
  <rect x="-7" y="-8" width="2" height="5" fill="#795548"/>
  <rect x="5" y="-8" width="2" height="5" fill="#795548"/>
  <rect x="-8" y="-12" width="16" height="5" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.5"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Мебель</text>
</g>

<!-- Paper -->
<g transform="translate(415,100)">
  <rect x="-8" y="-12" width="16" height="20" fill="white" stroke="#BDBDBD" stroke-width="0.6" rx="1"/>
  <line x1="-5" y1="-7" x2="5" y2="-7" stroke="#9E9E9E" stroke-width="0.4"/>
  <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#9E9E9E" stroke-width="0.4"/>
  <line x1="-5" y1="1" x2="5" y2="1" stroke="#9E9E9E" stroke-width="0.4"/>
  <line x1="-5" y1="5" x2="2" y2="5" stroke="#9E9E9E" stroke-width="0.4"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Бумага</text>
</g>

<!-- Resin products -->
<g transform="translate(460,100)">
  <path d="M-5,0 Q0,-10 5,0 Q0,10 -5,0Z" fill="#FFB300" stroke="#F57F17" stroke-width="0.5"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Живица</text>
</g>

<!-- Section 3: Resin Products Detail -->
<text x="385" y="164" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Продукты из живицы</text>
<rect x="270" y="168" width="220" height="52" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Живица (resin) -->
<g transform="translate(298,192)">
  <path d="M-6,0 Q0,-12 6,0 Q0,12 -6,0Z" fill="#FFA000" stroke="#E65100" stroke-width="0.6"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Живица</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">(смола)</text>
</g>
<!-- Arrow -->
<line x1="312" y1="192" x2="340" y2="183" stroke="#E65100" stroke-width="0.6"/>
<line x1="312" y1="192" x2="340" y2="201" stroke="#E65100" stroke-width="0.6"/>
<polygon points="340,183 336,185 340,187" fill="#E65100"/>
<polygon points="340,201 336,199 340,197" fill="#E65100"/>

<!-- Канифоль -->
<g transform="translate(368,183)">
  <rect x="-10" y="-6" width="20" height="12" fill="#FFD54F" stroke="#F9A825" stroke-width="0.6" rx="2"/>
  <text x="0" y="2" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" text-anchor="middle">Канифоль</text>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">для пайки,</text>
  <text x="0" y="19" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">лаков, смычков</text>
</g>

<!-- Скипидар -->
<g transform="translate(438,201)">
  <path d="M-8,-8 L8,-8 L6,8 L-6,8 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.6" rx="1"/>
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" text-anchor="middle">Скипидар</text>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">растворитель,</text>
  <text x="0" y="19" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">медицина</text>
</g>

<!-- Section 4: Кедровые орехи -->
<rect x="10" y="218" width="155" height="55" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>
<text x="88" y="230" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Кедровые орехи</text>
<!-- Pine cone with seeds -->
<ellipse cx="40" cy="255" rx="8" ry="12" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<!-- Scale pattern -->
<path d="M32,248 Q36,245 40,248 Q44,245 48,248" stroke="#6D4C41" stroke-width="0.5" fill="none"/>
<path d="M33,253 Q36,250 40,253 Q44,250 47,253" stroke="#6D4C41" stroke-width="0.5" fill="none"/>
<path d="M34,258 Q37,255 40,258 Q43,255 46,258" stroke="#6D4C41" stroke-width="0.5" fill="none"/>
<!-- Seeds coming out -->
<ellipse cx="52" cy="248" rx="3" ry="2" fill="#A1887F" stroke="#795548" stroke-width="0.4"/>
<ellipse cx="54" cy="256" rx="3" ry="2" fill="#A1887F" stroke="#795548" stroke-width="0.4"/>
<ellipse cx="50" cy="262" rx="3" ry="2" fill="#A1887F" stroke="#795548" stroke-width="0.4"/>
<!-- Nutritional info -->
<text x="95" y="248" font-family="Arial,sans-serif" font-size="5" fill="#555">Белки: 14 г</text>
<text x="95" y="255" font-family="Arial,sans-serif" font-size="5" fill="#555">Жиры: 68 г</text>
<text x="95" y="262" font-family="Arial,sans-serif" font-size="5" fill="#555">Витамин E, B</text>
<text x="95" y="269" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Высокая калорийность!</text>

<!-- Section 5: Phytoncides Panel -->
<rect x="175" y="218" width="155" height="55" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>
<text x="252" y="230" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Фитонциды</text>
<!-- Pine branch with emanating particles -->
<path d="M200,250 Q210,240 220,245" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
<path d="M215,248 Q225,238 235,243" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
<!-- Small needles -->
<line x1="205" y1="245" x2="203" y2="240" stroke="#1B5E20" stroke-width="0.6"/>
<line x1="210" y1="243" x2="208" y2="238" stroke="#1B5E20" stroke-width="0.6"/>
<line x1="222" y1="240" x2="220" y2="235" stroke="#1B5E20" stroke-width="0.6"/>
<line x1="228" y1="238" x2="226" y2="233" stroke="#1B5E20" stroke-width="0.6"/>
<!-- Phytoncide particles (wavy lines) -->
<path d="M215,238 Q218,232 222,238 Q226,232 230,238" stroke="#81C784" stroke-width="0.6" fill="none" opacity="0.7"/>
<path d="M210,234 Q213,228 217,234 Q221,228 225,234" stroke="#A5D6A7" stroke-width="0.5" fill="none" opacity="0.5"/>
<!-- Info text -->
<text x="270" y="248" font-family="Arial,sans-serif" font-size="5" fill="#555">Летучие вещества</text>
<text x="270" y="255" font-family="Arial,sans-serif" font-size="5" fill="#555">убивают бактерии</text>
<text x="270" y="262" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Сосновый лес =</text>
<text x="270" y="269" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">лечебный воздух</text>

<!-- Section 6: Environmental role -->
<rect x="340" y="228" width="150" height="45" fill="white" fill-opacity="0.4" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>
<text x="415" y="240" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Экологическая роль</text>
<text x="415" y="250" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">• Защита почвы от эрозии</text>
<text x="415" y="258" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">• Водорегулирование</text>
<text x="415" y="266" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">• Среда обитания животных</text>

<!-- Bottom bar -->
<rect x="10" y="280" width="480" height="55" fill="white" fill-opacity="0.35" rx="5" stroke="#A5D6A7" stroke-width="0.6"/>
<text x="250" y="294" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Древесина хвойных — основной строительный материал</text>

<!-- Key facts row -->
<g transform="translate(70,320)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Россия ≈ 25%</text>
  <text x="0" y="7" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">мировых запасов</text>
  <text x="0" y="13" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">хвойной древесины</text>
</g>
<g transform="translate(185,320)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Бумага</text>
  <text x="0" y="7" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">≈ 90% из хвойных</text>
  <text x="0" y="13" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(длинные волокна)</text>
</g>
<g transform="translate(310,320)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Канифоль + скипидар</text>
  <text x="0" y="7" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">≈ 350 тыс. т/год</text>
  <text x="0" y="13" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">(Россия)</text>
</g>
<g transform="translate(430,320)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Фитонциды</text>
  <text x="0" y="7" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">1 га сосны →</text>
  <text x="0" y="13" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">~5 кг/сутки</text>
</g>
</svg>