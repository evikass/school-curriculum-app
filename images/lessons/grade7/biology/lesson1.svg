<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="kingdomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5D6A7"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Многообразие живых организмов. Классификация</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial, sans-serif">Биология 7 класс — Урок 1</text>
  <line x1="15" y1="41" x2="485" y2="41" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ============ 5 KINGDOMS SECTION ============ -->
  <text x="175" y="56" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Пять царств живых организмов</text>

  <!-- Бактерии -->
  <rect x="20" y="62" width="80" height="58" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <circle cx="42" cy="78" r="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="56" cy="78" r="6" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="70" cy="78" r="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="60" y="98" text-anchor="middle" font-size="7" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">Бактерии</text>
  <text x="60" y="108" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Прокариоты,</text>
  <text x="60" y="115" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">без ядра</text>

  <!-- Грибы -->
  <rect x="108" y="62" width="80" height="58" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <ellipse cx="135" cy="78" rx="8" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <rect x="133" y="82" width="3" height="8" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <ellipse cx="155" cy="80" rx="6" ry="4" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <rect x="153.5" y="83" width="2.5" height="6" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <text x="148" y="98" text-anchor="middle" font-size="7" font-weight="bold" fill="#E65100" font-family="Arial, sans-serif">Грибы</text>
  <text x="148" y="108" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Гетеротрофы,</text>
  <text x="148" y="115" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">хитин в клетке</text>

  <!-- Растения -->
  <rect x="196" y="62" width="80" height="58" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="234" y="72" width="3" height="14" fill="#66BB6A"/>
  <ellipse cx="229" cy="73" rx="7" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="241" cy="70" rx="7" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="236" cy="66" rx="6" ry="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="236" y="98" text-anchor="middle" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial, sans-serif">Растения</text>
  <text x="236" y="108" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Автотрофы,</text>
  <text x="236" y="115" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">фотосинтез</text>

  <!-- Животные -->
  <rect x="284" y="62" width="80" height="58" rx="6" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <ellipse cx="324" cy="76" rx="10" ry="7" fill="#EF9A9A" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="319" cy="73" r="1.2" fill="#C62828"/>
  <path d="M330,72 L337,68 M330,72 L337,76" stroke="#C62828" stroke-width="0.6" fill="none"/>
  <path d="M316,82 Q313,88 310,84" stroke="#C62828" stroke-width="0.8" fill="none"/>
  <text x="324" y="98" text-anchor="middle" font-size="7" font-weight="bold" fill="#C62828" font-family="Arial, sans-serif">Животные</text>
  <text x="324" y="108" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Гетеротрофы,</text>
  <text x="324" y="115" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">подвижные</text>

  <!-- Вирусы (extra box) -->
  <rect x="372" y="62" width="80" height="58" rx="6" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1"/>
  <circle cx="412" cy="77" r="8" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.8"/>
  <path d="M412,69 L412,65 M412,85 L412,89 M404,77 L400,77 M420,77 L424,77 M406,71 L403,68 M418,71 L421,68 M406,83 L403,86 M418,83 L421,86" stroke="#6A1B9A" stroke-width="0.7"/>
  <text x="412" y="98" text-anchor="middle" font-size="7" font-weight="bold" fill="#6A1B9A" font-family="Arial, sans-serif">Вирусы</text>
  <text x="412" y="108" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Неклеточные,</text>
  <text x="412" y="115" text-anchor="middle" font-size="5.5" fill="#333" font-family="Arial, sans-serif">паразиты</text>

  <!-- ============ CLASSIFICATION HIERARCHY ============ -->
  <text x="175" y="136" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Иерархия классификации</text>

  <!-- Hierarchy pyramid - from bottom (Царство) to top (Вид) -->
  <!-- Bottom: Царство -->
  <rect x="95" y="175" width="160" height="16" rx="3" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="186" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial, sans-serif">Царство</text>

  <!-- Тип -->
  <rect x="108" y="160" width="134" height="16" rx="3" fill="#388E3C" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="171" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial, sans-serif">Тип / Отдел</text>

  <!-- Класс -->
  <rect x="121" y="145" width="108" height="16" rx="3" fill="#43A047" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="156" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial, sans-serif">Класс</text>

  <!-- Порядок -->
  <rect x="131" y="130" width="88" height="16" rx="3" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="141" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial, sans-serif">Порядок</text>

  <!-- Семейство -->
  <rect x="141" y="195" width="68" height="16" rx="3" fill="#66BB6A" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="206" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Семейство</text>

  <!-- Род -->
  <rect x="149" y="211" width="52" height="16" rx="3" fill="#81C784" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="222" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Род</text>

  <!-- Вид (top) -->
  <rect x="155" y="227" width="40" height="16" rx="3" fill="#A5D6A7" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="175" y="238" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Вид</text>

  <!-- Arrows from bottom up -->
  <line x1="175" y1="193" x2="175" y2="195" stroke="#1B5E20" stroke-width="1" marker-end="none"/>

  <!-- ============ BINOMIAL NOMENCLATURE SIDE PANEL ============ -->
  <rect x="300" y="128" width="185" height="120" rx="6" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
  <text x="392" y="143" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Бинарная номенклатура</text>
  <text x="392" y="153" text-anchor="middle" font-size="6" fill="#666" font-family="Arial, sans-serif">Карл Линней, 1758</text>
  <line x1="310" y1="157" x2="475" y2="157" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>

  <!-- Example: Homo sapiens -->
  <text x="310" y="170" font-size="6.5" fill="#333" font-family="Arial, sans-serif">Пример:</text>
  <text x="392" y="183" text-anchor="middle" font-size="9" font-style="italic" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Homo sapiens</text>
  <text x="320" y="196" font-size="6" fill="#1565C0" font-family="Arial, sans-serif">Homo — род</text>
  <text x="320" y="206" font-size="6" fill="#C62828" font-family="Arial, sans-serif">sapiens — вид</text>

  <!-- Another example -->
  <line x1="310" y1="212" x2="475" y2="212" stroke="#2E7D32" stroke-width="0.3" opacity="0.4"/>
  <text x="392" y="224" text-anchor="middle" font-size="8" font-style="italic" fill="#1B5E20" font-family="Arial, sans-serif">Canis lupus</text>
  <text x="320" y="236" font-size="6" fill="#1565C0" font-family="Arial, sans-serif">Canis — род (собаки)</text>
  <text x="320" y="245" font-size="6" fill="#C62828" font-family="Arial, sans-serif">lupus — вид (волк)</text>

  <!-- ============ BOTTOM INFO PANEL ============ -->
  <rect x="15" y="253" width="470" height="52" rx="6" fill="white" stroke="#66BB6A" stroke-width="0.8" opacity="0.85"/>
  <text x="250" y="266" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Основные принципы систематики</text>

  <text x="30" y="279" font-size="6" fill="#333" font-family="Arial, sans-serif">&#x2022; Естественная классификация — на основе родства</text>
  <text x="30" y="289" font-size="6" fill="#333" font-family="Arial, sans-serif">&#x2022; Искусственная классификация — на основе сходства признаков</text>
  <text x="260" y="279" font-size="6" fill="#333" font-family="Arial, sans-serif">&#x2022; Вид — основная единица классификации</text>
  <text x="260" y="289" font-size="6" fill="#333" font-family="Arial, sans-serif">&#x2022; Латинское название — едино для всего мира</text>
  <text x="30" y="299" font-size="6" fill="#333" font-family="Arial, sans-serif">&#x2022; Филогенетика — эволюционная история группы</text>
  <text x="260" y="299" font-size="6" fill="#333" font-family="Arial, sans-serif">&#x2022; Таксон — группа организмов в классификации</text>

  <!-- Footer -->
  <rect x="0" y="325" width="500" height="25" rx="0" fill="#2E7D32"/>
  <rect x="0" y="325" width="500" height="12" rx="0" fill="#2E7D32"/>
  <rect x="0" y="337" width="500" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="342" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial, sans-serif">Урок 1: Многообразие живых организмов. Классификация</text>
</svg>