<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Корень. Виды корней и корневые системы</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 28</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- ROOT TYPES -->
<text x="130" y="60" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Виды корней</text>

<!-- Главный корень (main/tap root) -->
<g transform="translate(30,65)">
<line x1="25" y1="0" x2="25" y2="50" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
<text x="25" y="60" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle" font-weight="bold">Главный</text>
<text x="25" y="68" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(из зародыша)</text>
</g>

<!-- Боковые корни (lateral roots) -->
<g transform="translate(90,65)">
<line x1="25" y1="0" x2="25" y2="30" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
<line x1="25" y1="15" x2="10" y2="40" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="25" y1="20" x2="42" y2="45" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="25" y1="25" x2="8" y2="50" stroke="#A1887F" stroke-width="1" stroke-linecap="round"/>
<text x="25" y="60" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle" font-weight="bold">Боковые</text>
<text x="25" y="68" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(от главного)</text>
</g>

<!-- Придаточные корни (adventitious) -->
<g transform="translate(155,65)">
<line x1="25" y1="0" x2="25" y2="15" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
<line x1="20" y1="12" x2="10" y2="40" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="30" y1="12" x2="40" y2="40" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="25" y1="15" x2="25" y2="45" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="22" y1="14" x2="5" y2="50" stroke="#A1887F" stroke-width="1" stroke-linecap="round"/>
<text x="25" y="60" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle" font-weight="bold">Придаточные</text>
<text x="25" y="68" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(от стебля/листа)</text>
</g>

<!-- ROOT SYSTEMS -->
<text x="340" y="60" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Корневые системы</text>

<!-- Стержневая (taproot - dicots) -->
<g transform="translate(270,65)">
<rect x="0" y="0" width="65" height="70" rx="3" fill="none" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="2"/>
<!-- Stem base -->
<rect x="25" y="0" width="15" height="8" rx="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.5"/>
<!-- Main root -->
<line x1="32" y1="8" x2="32" y2="62" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
<!-- Lateral roots -->
<line x1="32" y1="18" x2="18" y2="35" stroke="#A1887F" stroke-width="1.2" stroke-linecap="round"/>
<line x1="32" y1="18" x2="48" y2="35" stroke="#A1887F" stroke-width="1.2" stroke-linecap="round"/>
<line x1="32" y1="28" x2="15" y2="48" stroke="#A1887F" stroke-width="1" stroke-linecap="round"/>
<line x1="32" y1="28" x2="50" y2="48" stroke="#A1887F" stroke-width="1" stroke-linecap="round"/>
<line x1="32" y1="38" x2="22" y2="55" stroke="#A1887F" stroke-width="0.8" stroke-linecap="round"/>
<line x1="32" y1="38" x2="45" y2="55" stroke="#A1887F" stroke-width="0.8" stroke-linecap="round"/>
<text x="32" y="80" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Стержневая</text>
<text x="32" y="88" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(двудольные)</text>
</g>

<!-- Мочковатая (fibrous - monocots) -->
<g transform="translate(350,65)">
<rect x="0" y="0" width="65" height="70" rx="3" fill="none" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="2"/>
<!-- Stem base -->
<rect x="22" y="0" width="20" height="8" rx="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.5"/>
<!-- Adventitious roots (no dominant main root) -->
<line x1="28" y1="8" x2="15" y2="55" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="32" y1="8" x2="25" y2="58" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="36" y1="8" x2="38" y2="58" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="40" y1="8" x2="50" y2="55" stroke="#A1887F" stroke-width="1.5" stroke-linecap="round"/>
<line x1="30" y1="8" x2="10" y2="50" stroke="#A1887F" stroke-width="1" stroke-linecap="round"/>
<line x1="38" y1="8" x2="55" y2="50" stroke="#A1887F" stroke-width="1" stroke-linecap="round"/>
<!-- Small lateral roots -->
<line x1="20" y1="30" x2="12" y2="40" stroke="#BCAAA4" stroke-width="0.6" stroke-linecap="round"/>
<line x1="44" y1="30" x2="52" y2="40" stroke="#BCAAA4" stroke-width="0.6" stroke-linecap="round"/>
<text x="32" y="80" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Мочковатая</text>
<text x="32" y="88" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(однодольные)</text>
</g>

<!-- ROOT ZONES -->
<text x="250" y="172" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Зоны корня</text>

<g transform="translate(40,178)">
<!-- Root diagram - vertical -->
<!-- Zone labels on right, root structure on left -->

<!-- Conducting zone (проведение) -->
<rect x="40" y="0" width="18" height="30" rx="0" fill="#EF9A9A" stroke="#C62828" stroke-width="0.8"/>
<text x="68" y="12" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Проведение</text>
<text x="68" y="21" font-family="Arial,sans-serif" font-size="5.5" fill="#666">транспорт веществ</text>
<!-- Vessels inside -->
<line x1="46" y1="2" x2="46" y2="28" stroke="#C62828" stroke-width="0.8"/>
<line x1="52" y1="2" x2="52" y2="28" stroke="#C62828" stroke-width="0.8"/>

<!-- Absorption zone (всасывание) -->
<rect x="40" y="30" width="18" height="30" rx="0" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
<!-- Root hairs -->
<line x1="40" y1="35" x2="30" y2="33" stroke="#1565C0" stroke-width="0.6"/>
<line x1="40" y1="40" x2="28" y2="38" stroke="#1565C0" stroke-width="0.6"/>
<line x1="40" y1="45" x2="30" y2="43" stroke="#1565C0" stroke-width="0.6"/>
<line x1="40" y1="50" x2="28" y2="48" stroke="#1565C0" stroke-width="0.6"/>
<line x1="58" y1="35" x2="68" y2="33" stroke="#1565C0" stroke-width="0.6"/>
<line x1="58" y1="40" x2="70" y2="38" stroke="#1565C0" stroke-width="0.6"/>
<line x1="58" y1="45" x2="68" y2="43" stroke="#1565C0" stroke-width="0.6"/>
<line x1="58" y1="50" x2="70" y2="48" stroke="#1565C0" stroke-width="0.6"/>
<text x="82" y="42" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Всасывание</text>
<text x="82" y="51" font-family="Arial,sans-serif" font-size="5.5" fill="#666">корневые волоски</text>

<!-- Growth zone (рост) -->
<rect x="40" y="60" width="18" height="20" rx="0" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
<text x="68" y="68" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Рост</text>
<text x="68" y="77" font-family="Arial,sans-serif" font-size="5.5" fill="#666">растяжение клеток</text>

<!-- Division zone (деление) -->
<rect x="40" y="80" width="18" height="20" rx="0" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
<!-- Small dividing cells -->
<circle cx="47" cy="87" r="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="53" cy="87" r="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<circle cx="50" cy="93" r="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<text x="68" y="88" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">Деление</text>
<text x="68" y="97" font-family="Arial,sans-serif" font-size="5.5" fill="#666">меристема</text>

<!-- Root cap (чехлик) -->
<path d="M40,100 L49,118 L58,100 Z" fill="#BCAAA4" stroke="#795548" stroke-width="0.8"/>
<text x="49" y="130" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle" font-weight="bold">Чехлик</text>
<text x="49" y="138" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">защита кончика</text>

<!-- Arrow showing direction -->
<path d="M20,5 L20,110" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#ar28)"/>
<text x="15" y="60" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="end" transform="rotate(-90,15,60)">направление роста</text>
<defs><marker id="ar28" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5Z" fill="#2E7D32"/></marker></defs>
</g>

<!-- ROOT HAIR DETAIL -->
<text x="340" y="172" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Корневой волосок</text>

<g transform="translate(270,178)">
<rect x="0" y="0" width="140" height="65" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
<!-- Epidermal cell body -->
<rect x="50" y="10" width="40" height="30" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
<text x="70" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">Клетка</text>
<text x="70" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">эпидермиса</text>
<!-- Nucleus -->
<circle cx="62" cy="22" r="3" fill="#7B1FA2" opacity="0.6"/>
<!-- Root hair extension -->
<path d="M50,22 Q30,22 15,18 Q5,15 2,12" stroke="#1565C0" stroke-width="1" fill="none"/>
<path d="M50,25 Q30,25 15,22 Q5,19 2,16" stroke="#1565C0" stroke-width="1" fill="none"/>
<path d="M2,12 L2,16 Q5,19 15,22 Q30,25 50,25 L50,22 Q30,22 15,18 Q5,15 2,12 Z" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
<!-- Vacuole -->
<ellipse cx="25" cy="18" rx="8" ry="3" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
<!-- Label -->
<text x="10" y="42" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">вырост</text>
<text x="10" y="48" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">клетки</text>
<!-- Soil particles -->
<circle cx="5" cy="55" r="2" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.3"/>
<circle cx="12" cy="58" r="1.5" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.3"/>
<circle cx="8" cy="60" r="2.5" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.3"/>
<text x="70" y="52" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">увеличивает</text>
<text x="70" y="58" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">поверхность</text>
<text x="70" y="64" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">всасывания</text>
</g>

<!-- ROOT MODIFICATIONS -->
<text x="250" y="260" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Метаморфозы корней</text>

<!-- Корнеплод (Carrot) -->
<g transform="translate(30,268)">
<rect x="0" y="0" width="130" height="68" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
<!-- Carrot shape -->
<path d="M65,10 Q80,15 80,30 Q78,50 65,65 Q52,50 50,30 Q50,15 65,10 Z" fill="#FF8A65" stroke="#E65100" stroke-width="1"/>
<!-- Green top -->
<path d="M60,12 Q55,5 50,2" stroke="#4CAF50" stroke-width="1" fill="#81C784"/>
<path d="M65,10 Q65,2 65,0" stroke="#4CAF50" stroke-width="1" fill="#81C784"/>
<path d="M70,12 Q75,5 80,2" stroke="#4CAF50" stroke-width="1" fill="#81C784"/>
<!-- Rings inside -->
<line x1="55" y1="25" x2="75" y2="25" stroke="#E65100" stroke-width="0.3"/>
<line x1="53" y1="35" x2="77" y2="35" stroke="#E65100" stroke-width="0.3"/>
<line x1="55" y1="45" x2="75" y2="45" stroke="#E65100" stroke-width="0.3"/>
<text x="65" y="58" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold" transform="translate(0,12)">Корнеплод</text>
<text x="65" y="66" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle" transform="translate(0,12)">(морковь, свёкла)</text>
</g>

<!-- Корнеклубень (Dahlia) -->
<g transform="translate(180,268)">
<rect x="0" y="0" width="130" height="68" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
<!-- Tuberous roots -->
<ellipse cx="50" cy="35" rx="12" ry="18" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
<ellipse cx="80" cy="35" rx="12" ry="18" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
<!-- Stem -->
<line x1="65" y1="5" x2="65" y2="18" stroke="#4CAF50" stroke-width="2"/>
<!-- Connection to stem -->
<line x1="65" y1="18" x2="50" y2="18" stroke="#8D6E63" stroke-width="1"/>
<line x1="65" y1="18" x2="80" y2="18" stroke="#8D6E63" stroke-width="1"/>
<!-- Internal storage dots -->
<circle cx="47" cy="32" r="1.5" fill="#FFCC80" opacity="0.6"/>
<circle cx="53" cy="38" r="1.5" fill="#FFCC80" opacity="0.6"/>
<circle cx="77" cy="32" r="1.5" fill="#FFCC80" opacity="0.6"/>
<circle cx="83" cy="38" r="1.5" fill="#FFCC80" opacity="0.6"/>
<text x="65" y="58" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Корнеклубень</text>
<text x="65" y="66" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(георгин, батат)</text>
</g>

<!-- Воздушные корни (Orchid) -->
<g transform="translate(330,268)">
<rect x="0" y="0" width="130" height="68" rx="4" fill="#E0F7FA" stroke="#00838F" stroke-width="0.8"/>
<!-- Orchid stem -->
<line x1="65" y1="5" x2="65" y2="35" stroke="#4CAF50" stroke-width="2"/>
<!-- Leaves -->
<ellipse cx="50" cy="15" rx="12" ry="5" fill="#81C784" stroke="#4CAF50" stroke-width="0.5" transform="rotate(-20,50,15)"/>
<ellipse cx="80" cy="15" rx="12" ry="5" fill="#81C784" stroke="#4CAF50" stroke-width="0.5" transform="rotate(20,80,15)"/>
<!-- Aerial roots -->
<path d="M60,35 Q40,45 30,55" stroke="#A1887F" stroke-width="1.5" fill="none"/>
<path d="M65,38 Q65,50 60,60" stroke="#A1887F" stroke-width="1.5" fill="none"/>
<path d="M70,35 Q85,48 90,58" stroke="#A1887F" stroke-width="1.5" fill="none"/>
<!-- Velamen coating -->
<path d="M55,38 Q45,44 38,50" stroke="#E0E0E0" stroke-width="2.5" fill="none" opacity="0.6"/>
<path d="M68,40 Q68,48 65,56" stroke="#E0E0E0" stroke-width="2.5" fill="none" opacity="0.6"/>
<path d="M75,38 Q82,46 85,52" stroke="#E0E0E0" stroke-width="2.5" fill="none" opacity="0.6"/>
<text x="65" y="58" font-family="Arial,sans-serif" font-size="7" fill="#00838F" text-anchor="middle" font-weight="bold">Воздушные корни</text>
<text x="65" y="66" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(орхидея, монстера)</text>
</g>
</svg>