<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Общая характеристика грибов. Строение грибов</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 7 класс — Урок 6</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Mycelium (грибница) network -->
<g transform="translate(90,145)">
  <rect x="-72" y="-75" width="144" height="155" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-60" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">МИЦЕЛИЙ (грибница)</text>
  <line x1="-55" y1="-54" x2="55" y2="-54" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Hyphae network -->
  <path d="M-30,-40 Q-20,-25 -35,-10 Q-15,5 -25,25" stroke="#8D6E63" stroke-width="2" fill="none"/>
  <path d="M-30,-40 Q-5,-30 10,-35 Q25,-20 20,-5 Q10,10 15,25" stroke="#8D6E63" stroke-width="2" fill="none"/>
  <path d="M-30,-40 Q-40,-20 -45,0 Q-30,15 -20,30" stroke="#8D6E63" stroke-width="1.8" fill="none"/>
  <path d="M10,-35 Q30,-28 40,-15 Q35,0 30,15 Q25,30 35,40" stroke="#8D6E63" stroke-width="1.8" fill="none"/>
  <path d="M-35,-10 Q-15,-5 0,-10 Q20,-8 35,0" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
  <path d="M-25,25 Q-10,20 5,22 Q20,25 30,15" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
  <!-- Septa (cross-walls) -->
  <line x1="-22" y1="-28" x2="-18" y2="-32" stroke="#5D4037" stroke-width="1" opacity="0.6"/>
  <line x1="5" y1="-12" x2="9" y2="-8" stroke="#5D4037" stroke-width="1" opacity="0.6"/>
  <line x1="-32" y1="8" x2="-28" y2="12" stroke="#5D4037" stroke-width="1" opacity="0.6"/>
  <!-- Labels -->
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Гифы — нитевидные</text>
  <text x="0" y="64" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">образования гриба</text>
  <!-- Arrows pointing to septa -->
  <line x1="18" y1="-20" x2="10" y2="-14" stroke="#2E7D32" stroke-width="0.7" marker-end="none"/>
  <text x="35" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">перегородки</text>
</g>

<!-- Fungal cell diagram -->
<g transform="translate(260,145)">
  <rect x="-72" y="-75" width="144" height="155" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-60" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">КЛЕТКА ГРИБА</text>
  <line x1="-55" y1="-54" x2="55" y2="-54" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Cell outline (cell wall) -->
  <ellipse cx="0" cy="5" rx="42" ry="42" fill="#E8F5E9" stroke="#5D4037" stroke-width="3"/>
  <text x="30" y="-25" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">хитин</text>
  <line x1="28" y1="-22" x2="20" y2="-15" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Cell membrane -->
  <ellipse cx="0" cy="5" rx="38" ry="38" fill="none" stroke="#66BB6A" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Nucleus -->
  <ellipse cx="-5" cy="0" rx="12" ry="10" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="-5" cy="0" r="3" fill="#1B5E20"/>
  <text x="-5" y="18" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">ядро</text>
  <!-- Mitochondria -->
  <ellipse cx="22" cy="-12" rx="8" ry="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1" transform="rotate(-20,22,-12)"/>
  <path d="M17,-13 Q20,-10 23,-13 Q26,-10 29,-13" stroke="#F9A825" stroke-width="0.5" fill="none" transform="rotate(-20,22,-12)"/>
  <text x="35" y="-8" font-family="Arial,sans-serif" font-size="5" fill="#F9A825">митох.</text>
  <!-- ER -->
  <path d="M-30,5 Q-25,-2 -20,5 Q-15,12 -10,5" stroke="#7B1FA2" stroke-width="1" fill="none"/>
  <path d="M-28,8 Q-23,1 -18,8 Q-13,15 -8,8" stroke="#7B1FA2" stroke-width="1" fill="none"/>
  <text x="-20" y="22" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">ЭПС</text>
  <!-- Vacuole -->
  <ellipse cx="18" cy="18" rx="10" ry="8" fill="#B3E5FC" stroke="#0288D1" stroke-width="1" opacity="0.6"/>
  <text x="18" y="30" font-family="Arial,sans-serif" font-size="5" fill="#0288D1" text-anchor="middle">вакуоль</text>
  <!-- Glycogen granules -->
  <circle cx="-25" cy="-20" r="2" fill="#FF8F00"/>
  <circle cx="-20" cy="-25" r="2" fill="#FF8F00"/>
  <circle cx="-28" cy="-15" r="2" fill="#FF8F00"/>
  <circle cx="28" cy="8" r="2" fill="#FF8F00"/>
  <circle cx="32" cy="3" r="2" fill="#FF8F00"/>
  <text x="42" y="5" font-family="Arial,sans-serif" font-size="5" fill="#FF8F00">гликоген</text>
</g>

<!-- Unicellular vs Multicellular comparison -->
<g transform="translate(425,145)">
  <rect x="-52" y="-75" width="104" height="155" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-60" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">СРАВНЕНИЕ</text>
  <line x1="-40" y1="-54" x2="40" y2="-54" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Unicellular -->
  <text x="0" y="-38" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Одноклеточные</text>
  <ellipse cx="0" cy="-22" rx="12" ry="10" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <circle cx="-2" cy="-22" r="3" fill="#BF360C" opacity="0.5"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">дрожжи</text>
  <text x="0" y="5" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">1 клетка</text>
  <!-- Divider -->
  <line x1="-40" y1="12" x2="40" y2="12" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="3,2"/>
  <!-- Multicellular -->
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Многоклеточные</text>
  <!-- Small hyphae cluster -->
  <path d="M-10,38 Q-5,45 -15,55" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
  <path d="M0,36 Q5,45 -2,55" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
  <path d="M10,38 Q15,48 8,58" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
  <path d="M-5,42 Q5,50 12,45" stroke="#8D6E63" stroke-width="1" fill="none"/>
  <text x="0" y="68" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">мицелий из</text>
  <text x="0" y="76" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">множества гиф</text>
</g>

<!-- Key traits panel -->
<rect x="30" y="248" width="440" height="65" rx="5" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
<text x="250" y="262" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Главные признаки грибов</text>
<line x1="40" y1="268" x2="460" y2="268" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Trait 1 -->
<g transform="translate(90,286)">
  <circle cx="0" cy="0" r="10" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Г</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Гетеротрофы</text>
</g>
<!-- Trait 2 -->
<g transform="translate(190,286)">
  <circle cx="0" cy="0" r="10" fill="#5D4037" opacity="0.15" stroke="#5D4037" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle" font-weight="bold">Х</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Хитиновая</text>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">клет. стенка</text>
</g>
<!-- Trait 3 -->
<g transform="translate(290,286)">
  <circle cx="0" cy="0" r="10" fill="#FF8F00" opacity="0.15" stroke="#FF8F00" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="6" fill="#FF8F00" text-anchor="middle" font-weight="bold">Гл</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Запасное в-во</text>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">гликоген</text>
</g>
<!-- Trait 4 -->
<g transform="translate(400,286)">
  <circle cx="0" cy="0" r="10" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Н</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Неподвижны</text>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">оседлые</text>
</g>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 7 класс</text>
</svg>