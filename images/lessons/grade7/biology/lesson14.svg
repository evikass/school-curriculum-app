<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <linearGradient id="bloomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <rect x="1" y="1" width="498" height="348" fill="none" stroke="#2E7D32" stroke-width="2" rx="8"/>
  <!-- Header -->
  <rect x="4" y="4" width="492" height="28" fill="url(#hdr)" rx="6"/>
  <text x="250" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#fff" font-weight="bold">Значение водорослей</text>

  <!-- ===== O₂ PRODUCTION ===== -->
  <rect x="10" y="38" width="145" height="105" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="5"/>
  <text x="82" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold">Производство O₂</text>

  <!-- Ocean -->
  <rect x="18" y="58" width="128" height="50" fill="url(#waterGrad)" rx="4" opacity="0.4"/>
  <!-- Algae in ocean -->
  <path d="M30,108 Q32,85 35,75" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
  <path d="M50,108 Q48,80 52,70" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M70,108 Q72,82 68,72" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
  <path d="M90,108 Q88,78 92,68" fill="none" stroke="#43A047" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M110,108 Q112,85 108,75" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
  <path d="M130,108 Q128,82 132,72" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- O₂ bubbles -->
  <circle cx="38" cy="68" r="4" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8"/>
  <text x="38" y="71" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#fff">O₂</text>
  <circle cx="72" cy="64" r="5" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8"/>
  <text x="72" y="67" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#fff">O₂</text>
  <circle cx="112" cy="66" r="4" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8"/>
  <text x="112" y="69" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#fff">O₂</text>
  <circle cx="55" cy="60" r="3" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
  <circle cx="95" cy="62" r="3.5" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>

  <!-- Percentage bar -->
  <text x="82" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">50–80% O₂ на Земле</text>
  <rect x="30" y="126" width="105" height="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5" rx="2"/>
  <rect x="30" y="126" width="70" height="8" fill="#1565C0" rx="2"/>
  <text x="68" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#fff">океан</text>
  <text x="105" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">суша</text>

  <!-- ===== FOOD ===== -->
  <rect x="165" y="38" width="155" height="105" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="242" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" font-weight="bold">Пищевые водоросли</text>

  <!-- Laminaria (kelp) -->
  <text x="195" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">Ламинария</text>
  <path d="M185,70 Q183,82 186,95" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <rect x="182" y="68" width="6" height="28" fill="#8D6E63" rx="2"/>
  <text x="195" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">морская капуста</text>
  <!-- Sushi icon -->
  <rect x="184" y="108" width="22" height="10" fill="#FFF" stroke="#4E342E" stroke-width="0.5" rx="2"/>
  <rect x="186" y="108" width="18" height="3" fill="#1B5E20" rx="1"/>
  <ellipse cx="195" cy="115" rx="4" ry="2" fill="#FF7043"/>

  <!-- Nori (Porphyra) -->
  <text x="242" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C" font-weight="bold">Порфира</text>
  <rect x="233" y="70" width="18" height="25" fill="#C62828" stroke="#880E4F" stroke-width="0.8" rx="2"/>
  <text x="242" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C">нори (суси)</text>
  <!-- Nori sheet -->
  <rect x="233" y="108" width="18" height="12" fill="#2E2E2E" stroke="#1B1B1B" stroke-width="0.5" rx="1"/>
  <text x="242" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#888">нори</text>

  <!-- Spirulina -->
  <text x="300" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Спирулина</text>
  <path d="M290,80 Q295,75 300,80 Q305,85 310,80" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M290,90 Q295,85 300,90 Q305,95 310,90" fill="none" stroke="#388E3C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="300" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">цианобактерия</text>
  <!-- Pill icon -->
  <ellipse cx="300" cy="115" rx="10" ry="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="300" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20">БАД</text>

  <!-- Rich in -->
  <text x="242" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">Богаты: йод, витамины, минералы, белки</text>

  <!-- ===== PRODUCTS ===== -->
  <rect x="330" y="38" width="160" height="105" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" rx="5"/>
  <text x="410" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4A148C" font-weight="bold">Продукты из водорослей</text>

  <!-- Agar-agar -->
  <rect x="340" y="58" width="44" height="36" fill="#FCE4EC" stroke="#C2185B" stroke-width="0.8" rx="3"/>
  <text x="362" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#880E4F" font-weight="bold">Агар-агар</text>
  <!-- Gel icon -->
  <path d="M350,75 Q355,72 362,75 Q369,72 374,75 L374,85 Q369,88 362,85 Q355,88 350,85 Z" fill="#F8BBD0" stroke="#C2185B" stroke-width="0.5" opacity="0.7"/>
  <text x="362" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#880E4F">желатин</text>
  <text x="362" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">из красных</text>
  <text x="362" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">водорослей</text>

  <!-- Alginates -->
  <rect x="390" y="58" width="44" height="36" fill="#E8EAF6" stroke="#283593" stroke-width="0.8" rx="3"/>
  <text x="412" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#1A237E" font-weight="bold">Альгинаты</text>
  <!-- E-number -->
  <circle cx="412" cy="82" r="8" fill="#C5CAE9" stroke="#283593" stroke-width="0.5"/>
  <text x="412" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1A237E">E400</text>
  <text x="412" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">из бурых</text>
  <text x="412" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">водорослей</text>

  <!-- Carrageenan -->
  <rect x="440" y="58" width="44" height="36" fill="#FFF8E1" stroke="#F57F17" stroke-width="0.8" rx="3"/>
  <text x="462" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" font-weight="bold">Каррагинан</text>
  <!-- Ice cream icon -->
  <path d="M458,76 L454,88 L466,88 L462,76Z" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.5"/>
  <circle cx="460" cy="74" r="4" fill="#FFCC80" stroke="#F57F17" stroke-width="0.5"/>
  <text x="462" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">из красных</text>
  <text x="462" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">водорослей</text>

  <!-- Applications row -->
  <text x="410" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" font-weight="bold">Применение:</text>
  <text x="410" y="129" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#6A1B9A">Пищевая пром. | Косметика | Микробиология</text>
  <text x="410" y="137" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#6A1B9A">Медицина | Сельское хозяйство</text>

  <!-- ===== WATER BLOOM ===== -->
  <line x1="4" y1="150" x2="496" y2="150" stroke="#81C784" stroke-width="0.5"/>
  <text x="250" y="167" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Цветение воды — экологическая проблема</text>

  <rect x="10" y="175" width="225" height="90" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <!-- Normal water -->
  <rect x="18" y="182" width="100" height="40" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.5" rx="3"/>
  <text x="68" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#01579B" font-weight="bold">Чистая вода</text>
  <!-- Few algae -->
  <circle cx="35" cy="210" r="2" fill="#4CAF50" opacity="0.5"/>
  <circle cx="55" cy="215" r="1.5" fill="#4CAF50" opacity="0.5"/>
  <circle cx="80" cy="212" r="2" fill="#4CAF50" opacity="0.5"/>
  <circle cx="100" cy="208" r="1.5" fill="#4CAF50" opacity="0.5"/>
  <!-- Fish -->
  <path d="M45,205 Q55,200 65,205 Q55,210 45,205Z" fill="#FF8A65" stroke="#BF360C" stroke-width="0.5"/>
  <circle cx="62" cy="204" r="1" fill="#BF360C"/>
  <path d="M80,215 Q90,210 100,215 Q90,220 80,215Z" fill="#FF8A65" stroke="#BF360C" stroke-width="0.5"/>
  <circle cx="97" cy="214" r="1" fill="#BF360C"/>

  <!-- Arrow -->
  <path d="M125,205 L140,205" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="132" y="200" font-family="Arial,sans-serif" font-size="5" fill="#E65100">избыток</text>
  <text x="132" y="207" font-family="Arial,sans-serif" font-size="5" fill="#E65100">N, P</text>

  <!-- Bloom water -->
  <rect x="145" y="182" width="82" height="40" fill="url(#bloomGrad)" stroke="#2E7D32" stroke-width="0.5" rx="3" opacity="0.8"/>
  <text x="186" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#fff" font-weight="bold">Цветение воды</text>
  <!-- Dense algae -->
  <circle cx="155" cy="210" r="2.5" fill="#1B5E20" opacity="0.8"/>
  <circle cx="165" cy="212" r="2" fill="#2E7D32" opacity="0.8"/>
  <circle cx="175" cy="208" r="2.5" fill="#1B5E20" opacity="0.8"/>
  <circle cx="185" cy="214" r="2" fill="#2E7D32" opacity="0.8"/>
  <circle cx="195" cy="210" r="2.5" fill="#1B5E20" opacity="0.8"/>
  <circle cx="205" cy="212" r="2" fill="#2E7D32" opacity="0.8"/>
  <circle cx="215" cy="208" r="2.5" fill="#1B5E20" opacity="0.8"/>
  <circle cx="160" cy="216" r="1.5" fill="#388E3C" opacity="0.8"/>
  <circle cx="180" cy="216" r="1.5" fill="#388E3C" opacity="0.8"/>
  <circle cx="200" cy="216" r="1.5" fill="#388E3C" opacity="0.8"/>
  <!-- Dead fish -->
  <path d="M170,200 Q180,195 190,200 Q180,205 170,200Z" fill="#BDBDBD" stroke="#757575" stroke-width="0.5"/>
  <line x1="185" y1="199" x2="188" y2="197" stroke="#757575" stroke-width="0.5"/>
  <text x="186" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Рыбы гибнут</text>

  <!-- Consequences -->
  <text x="122" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" font-weight="bold">Последствия:</text>
  <text x="122" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">• Снижение O₂ в воде</text>
  <text x="122" y="253" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">• Выделение токсинов</text>
  <text x="122" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">• Гибель гидробионтов</text>

  <!-- ===== BIOTECH ===== -->
  <rect x="250" y="175" width="240" height="90" fill="#E0F2F1" stroke="#00695C" stroke-width="1" rx="5"/>
  <text x="370" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#004D40" font-weight="bold">Биотехнологии и водоросли</text>

  <!-- Biofuel -->
  <rect x="260" y="198" width="70" height="28" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8" rx="4"/>
  <text x="295" y="209" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" font-weight="bold">Биотопливо</text>
  <path d="M285,214 Q290,211 295,214 Q300,217 305,214" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="295" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#795548">3-е поколение</text>

  <!-- CO2 capture -->
  <rect x="338" y="198" width="70" height="28" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8" rx="4"/>
  <text x="373" y="209" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Связывание CO₂</text>
  <text x="373" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">CO₂ → O₂</text>

  <!-- Wastewater treatment -->
  <rect x="416" y="198" width="66" height="28" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8" rx="4"/>
  <text x="449" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" font-weight="bold">Очистка</text>
  <text x="449" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" font-weight="bold">сточных</text>
  <text x="449" y="223" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" font-weight="bold">вод</text>

  <!-- Aquaculture -->
  <rect x="260" y="232" width="70" height="28" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8" rx="4"/>
  <text x="295" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" font-weight="bold">Аквакультура</text>
  <text x="295" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">корм для рыб</text>

  <!-- Cosmetics -->
  <rect x="338" y="232" width="70" height="28" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8" rx="4"/>
  <text x="373" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" font-weight="bold">Косметика</text>
  <text x="373" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2">маски, кремы</text>

  <!-- Fertilizers -->
  <rect x="416" y="232" width="66" height="28" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8" rx="4"/>
  <text x="449" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" font-weight="bold">Удобрения</text>
  <text x="449" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#E65100">N, P, K</text>

  <!-- Bottom summary -->
  <rect x="4" y="275" width="492" height="70" fill="#1B5E20" fill-opacity="0.06" rx="4"/>
  <text x="250" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Краткий обзор значения водорослей</text>

  <!-- Summary icons row -->
  <!-- O2 -->
  <circle cx="55" cy="310" r="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="55" y="307" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" font-weight="bold">O₂</text>
  <text x="55" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">50-80%</text>
  <text x="55" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1">Атмосфера</text>

  <!-- Food -->
  <circle cx="135" cy="310" r="14" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="135" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#BF360C">🐟</text>
  <text x="135" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#BF360C">Пища</text>

  <!-- Products -->
  <circle cx="215" cy="310" r="14" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="215" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" font-weight="bold">А-А</text>
  <text x="215" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">Агар/Альгин</text>

  <!-- Bloom warning -->
  <circle cx="295" cy="310" r="14" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="295" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#C62828">⚠</text>
  <text x="295" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Цветение воды</text>

  <!-- Biotech -->
  <circle cx="375" cy="310" r="14" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>
  <text x="375" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40" font-weight="bold">DNA</text>
  <text x="375" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Биотех</text>

  <!-- Base of food chain -->
  <circle cx="455" cy="310" r="14" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="455" y="307" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" font-weight="bold">Основа</text>
  <text x="455" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">цепей</text>
  <text x="455" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Пищевые цепи</text>
</svg>