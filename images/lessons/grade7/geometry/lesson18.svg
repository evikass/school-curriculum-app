<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="50%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg18)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Соотношения между сторонами и углами</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 18</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F5722" stroke-opacity="0.3"/>

  <!-- Panel 1: Theorem - larger angle opposite larger side -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#F5722" stroke-width="1"/>
  <text x="129" y="73" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Теорема: угол и сторона</text>
  <!-- Triangle with unequal sides -->
  <polygon points="60,85 20,165 220,155" fill="#FFF3E0" fill-opacity="0.4" stroke="#E65100" stroke-width="1.8"/>
  <circle cx="60" cy="85" r="3" fill="#E65100"/>
  <circle cx="20" cy="165" r="3" fill="#E65100"/>
  <circle cx="220" cy="155" r="3" fill="#E65100"/>
  <text x="60" y="81" font-size="8" fill="#E65100" font-style="italic">A</text>
  <text x="8" y="168" font-size="8" fill="#E65100" font-style="italic">B</text>
  <text x="225" y="158" font-size="8" fill="#E65100" font-style="italic">C</text>
  <!-- Large angle at B -->
  <path d="M32,157 A14,14 0 0,1 44,140" fill="none" stroke="#E53935" stroke-width="2"/>
  <text x="48" y="148" font-size="7" fill="#C62828" font-weight="bold">∠B</text>
  <!-- Small angle at C -->
  <path d="M210,150 A12,12 0 0,0 205,158" fill="none" stroke="#43A047" stroke-width="1.5"/>
  <text x="200" y="163" font-size="7" fill="#43A047" font-weight="bold">∠C</text>
  <!-- Side labels -->
  <text x="145" y="148" font-size="7" fill="#1565C0">AC — большая</text>
  <text x="35" y="130" font-size="7" fill="#FF9800">AC — напротив ∠B</text>
  <!-- Theorem box -->
  <rect x="25" y="162" width="210" height="12" rx="3" fill="#E65100" fill-opacity="0.12"/>
  <text x="129" y="172" font-size="7.5" fill="#BF360C" text-anchor="middle" font-weight="bold">∠B &gt; ∠C => AC &gt; AB</text>

  <!-- Panel 2: Converse theorem -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#F5722" stroke-width="1"/>
  <text x="371" y="73" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Обратная теорема</text>
  <rect x="265" y="80" width="213" height="30" rx="4" fill="#FFF3E0" stroke="#F5722" stroke-width="0.8"/>
  <text x="371" y="93" font-size="8" fill="#BF360C" text-anchor="middle" font-weight="bold">Если AC &gt; AB, то ∠B &gt; ∠C</text>
  <text x="371" y="106" font-size="7" fill="#555" text-anchor="middle">Против большей стороны — больший угол</text>
  <!-- Visual -->
  <polygon points="340,125 280,170 470,165" fill="#FFF3E0" fill-opacity="0.4" stroke="#E65100" stroke-width="1.5"/>
  <circle cx="340" cy="125" r="2.5" fill="#E65100"/>
  <circle cx="280" cy="170" r="2.5" fill="#E65100"/>
  <circle cx="470" cy="165" r="2.5" fill="#E65100"/>
  <text x="340" y="121" font-size="7" fill="#E65100" font-style="italic">A</text>
  <text x="268" y="173" font-size="7" fill="#E65100" font-style="italic">B</text>
  <text x="475" y="168" font-size="7" fill="#E65100" font-style="italic">C</text>
  <!-- Side AC large -->
  <line x1="343" y1="140" x2="355" y2="140" stroke="#E53935" stroke-width="2"/>
  <line x1="343" y1="143" x2="355" y2="143" stroke="#E53935" stroke-width="2"/>
  <line x1="343" y1="146" x2="355" y2="146" stroke="#E53935" stroke-width="2"/>
  <text x="340" y="158" font-size="6" fill="#E53935">AC (большая)</text>
  <!-- Side AB short -->
  <line x1="305" y1="145" x2="315" y2="145" stroke="#43A047" stroke-width="1.5"/>
  <text x="305" y="155" font-size="6" fill="#43A047">AB</text>
  <text x="371" y="180" font-size="7" fill="#BF360C" text-anchor="middle">AC &gt; AB => ∠B &gt; ∠C</text>

  <!-- Panel 3: Isosceles triangle properties -->
  <rect x="12" y="184" width="165" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#F5722" stroke-width="1"/>
  <text x="94" y="199" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Равнобедренный △</text>
  <!-- Isosceles triangle -->
  <polygon points="94,210 50,290 138,290" fill="#FFF3E0" fill-opacity="0.4" stroke="#E65100" stroke-width="1.8"/>
  <circle cx="94" cy="210" r="2.5" fill="#E65100"/>
  <circle cx="50" cy="290" r="2.5" fill="#E65100"/>
  <circle cx="138" cy="290" r="2.5" fill="#E65100"/>
  <text x="94" y="206" font-size="7" fill="#E65100" font-style="italic">A</text>
  <text x="38" y="293" font-size="7" fill="#E65100" font-style="italic">B</text>
  <text x="142" y="293" font-size="7" fill="#E65100" font-style="italic">C</text>
  <!-- Equal side marks AB = AC -->
  <line x1="75" y1="248" x2="71" y2="252" stroke="#E53935" stroke-width="1.5"/>
  <line x1="77" y1="246" x2="73" y2="250" stroke="#E53935" stroke-width="1.5"/>
  <line x1="113" y1="248" x2="117" y2="252" stroke="#E53935" stroke-width="1.5"/>
  <line x1="111" y1="246" x2="115" y2="250" stroke="#E53935" stroke-width="1.5"/>
  <text x="60" y="243" font-size="6" fill="#E53935">AB</text>
  <text x="120" y="243" font-size="6" fill="#E53935">AC</text>
  <!-- Equal angle marks -->
  <path d="M57,282 A8,8 0 0,1 62,274" fill="none" stroke="#43A047" stroke-width="1.2"/>
  <path d="M131,282 A8,8 0 0,0 126,274" fill="none" stroke="#43A047" stroke-width="1.2"/>
  <text x="55" y="272" font-size="6" fill="#43A047">∠B</text>
  <text x="128" y="272" font-size="6" fill="#43A047">∠C</text>
  <text x="94" y="285" font-size="6.5" fill="#BF360C" text-anchor="middle" font-weight="bold">AB = AC => ∠B = ∠C</text>
  <text x="94" y="298" font-size="6.5" fill="#BF360C" text-anchor="middle">∠B = ∠C => AB = AC</text>

  <!-- Panel 4: Equilateral = equiangular -->
  <rect x="185" y="184" width="145" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#F5722" stroke-width="1"/>
  <text x="257" y="199" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Равносторонний △</text>
  <!-- Equilateral triangle -->
  <polygon points="257,210 215,290 300,290" fill="#FFF3E0" fill-opacity="0.4" stroke="#E65100" stroke-width="1.8"/>
  <circle cx="257" cy="210" r="2.5" fill="#E65100"/>
  <circle cx="215" cy="290" r="2.5" fill="#E65100"/>
  <circle cx="300" cy="290" r="2.5" fill="#E65100"/>
  <!-- All equal side marks -->
  <line x1="240" y1="248" x2="236" y2="252" stroke="#E53935" stroke-width="1.2"/>
  <line x1="242" y1="246" x2="238" y2="250" stroke="#E53935" stroke-width="1.2"/>
  <line x1="274" y1="248" x2="278" y2="252" stroke="#E53935" stroke-width="1.2"/>
  <line x1="272" y1="246" x2="276" y2="250" stroke="#E53935" stroke-width="1.2"/>
  <line x1="245" y1="290" x2="257" y2="290" stroke="#E53935" stroke-width="1.2"/>
  <line x1="245" y1="287" x2="257" y2="287" stroke="#E53935" stroke-width="1.2"/>
  <!-- All equal angle marks -->
  <path d="M222,282 A8,8 0 0,1 228,274" fill="none" stroke="#43A047" stroke-width="1"/>
  <path d="M293,282 A8,8 0 0,0 287,274" fill="none" stroke="#43A047" stroke-width="1"/>
  <path d="M249,220 A8,8 0 0,1 265,220" fill="none" stroke="#43A047" stroke-width="1"/>
  <text x="257" y="272" font-size="7" fill="#43A047" text-anchor="middle">60°</text>
  <text x="257" y="286" font-size="6.5" fill="#BF360C" text-anchor="middle">Все стороны =</text>
  <text x="257" y="296" font-size="6.5" fill="#BF360C" text-anchor="middle">Все углы = 60°</text>

  <!-- Panel 5: Key facts -->
  <rect x="338" y="184" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#F5722" stroke-width="1"/>
  <text x="413" y="199" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Итог</text>
  <rect x="348" y="207" width="130" height="18" rx="3" fill="#FFF3E0" stroke="#F5722" stroke-width="0.4"/>
  <text x="413" y="220" font-size="7" fill="#BF360C" text-anchor="middle">Больший ∠ ↔ большая стор.</text>
  <rect x="348" y="229" width="130" height="18" rx="3" fill="#FFF3E0" stroke="#F5722" stroke-width="0.4"/>
  <text x="413" y="242" font-size="7" fill="#BF360C" text-anchor="middle">Равные стор. ↔ равные ∠</text>
  <rect x="348" y="251" width="130" height="18" rx="3" fill="#FFF3E0" stroke="#F5722" stroke-width="0.4"/>
  <text x="413" y="264" font-size="7" fill="#BF360C" text-anchor="middle">Равностор. = равноугол.</text>
  <rect x="348" y="273" width="130" height="22" rx="3" fill="#E65100" fill-opacity="0.12"/>
  <text x="413" y="285" font-size="7" fill="#BF360C" text-anchor="middle">Гипотенуза &gt; катета</text>
  <text x="413" y="295" font-size="6.5" fill="#BF360C" text-anchor="middle">(в прямоуг. △)</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#F5722" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Против большей стороны — больший угол | AB=AC => ∠B=∠C</text>
</svg>