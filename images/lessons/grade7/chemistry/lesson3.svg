<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#f59e0b" rx="3"/>
<text x="400" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Физические и химические явления</text>
<rect x="25" y="65" width="365" height="310" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="25" y="65" width="365" height="40" rx="14" fill="#3b82f6"/>
<rect x="25" y="91" width="365" height="14" fill="#3b82f6"/>
<text x="207" y="92" text-anchor="middle" font-size="17" font-weight="600" fill="#fff">Физические явления</text>
<rect x="52" y="130" width="55" height="55" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
<text x="79" y="165" text-anchor="middle" font-size="12" fill="#1e40af">Лёд</text>
<text x="79" y="200" text-anchor="middle" font-size="11" fill="#64748b">0°C</text>
<polygon points="117,155 135,155 135,148 148,157 135,166 135,159 117,159" fill="#3b82f6"/>
<text x="132" y="140" font-size="9" fill="#64748b" text-anchor="middle">+Q</text>
<ellipse cx="200" cy="160" rx="30" ry="18" fill="#93c5fd" stroke="#3b82f6" stroke-width="1.5"/>
<text x="200" y="165" text-anchor="middle" font-size="12" fill="#1e40af">Вода</text>
<text x="200" y="200" text-anchor="middle" font-size="11" fill="#64748b">100°C</text>
<polygon points="238,155 256,155 256,148 269,157 256,166 256,159 238,159" fill="#3b82f6"/>
<path d="M290,155 Q295,140 290,130 Q285,120 290,110" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
<path d="M305,155 Q310,140 305,130 Q300,120 305,110" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
<path d="M320,155 Q325,140 320,130 Q315,120 320,110" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
<text x="305" y="175" text-anchor="middle" font-size="12" fill="#1e40af">Пар</text>
<text x="207" y="230" text-anchor="middle" font-size="13" fill="#10b981" font-weight="600">Состав вещества НЕ меняется</text>
<text x="207" y="255" text-anchor="middle" font-size="13" fill="#475569">H<tspan font-size="9" baseline-shift="sub">2</tspan>O → H<tspan font-size="9" baseline-shift="sub">2</tspan>O → H<tspan font-size="9" baseline-shift="sub">2</tspan>O</text>
<text x="207" y="290" text-anchor="middle" font-size="12" fill="#64748b">Меняется только агрегатное состояние</text>
<rect x="410" y="65" width="365" height="310" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="410" y="65" width="365" height="40" rx="14" fill="#f59e0b"/>
<rect x="410" y="91" width="365" height="14" fill="#f59e0b"/>
<text x="592" y="92" text-anchor="middle" font-size="17" font-weight="600" fill="#fff">Химические явления</text>
<rect x="440" y="130" width="55" height="55" rx="6" fill="#a16207" stroke="#92400e" stroke-width="1.5"/>
<text x="467" y="165" text-anchor="middle" font-size="12" fill="#fff">Дерево</text>
<polygon points="505,155 525,155 525,148 540,157 525,166 525,159 505,159" fill="#f59e0b"/>
<rect x="550" y="125" width="40" height="35" rx="4" fill="#d6d3d1" stroke="#78716c" stroke-width="1"/>
<text x="570" y="147" text-anchor="middle" font-size="10" fill="#44403c">Зола</text>
<circle cx="565" cy="185" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="565" y="189" text-anchor="middle" font-size="10" fill="#92400e">CO<tspan font-size="7" baseline-shift="sub">2</tspan></text>
<circle cx="620" cy="175" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="620" y="179" text-anchor="middle" font-size="10" fill="#1e40af">H<tspan font-size="7" baseline-shift="sub">2</tspan>O</text>
<text x="592" y="230" text-anchor="middle" font-size="13" fill="#ef4444" font-weight="600">Состав вещества МЕНЯЕТСЯ</text>
<text x="592" y="255" text-anchor="middle" font-size="12" fill="#475569">Дерево + O<tspan font-size="9" baseline-shift="sub">2</tspan> → Зола + CO<tspan font-size="9" baseline-shift="sub">2</tspan> + H<tspan font-size="9" baseline-shift="sub">2</tspan>O</text>
<text x="592" y="290" text-anchor="middle" font-size="12" fill="#64748b">Образуются новые вещества</text>
<rect x="100" y="395" width="600" height="85" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<text x="400" y="420" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Признаки химических реакций:</text>
<circle cx="140" cy="455" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="140" y="450" text-anchor="middle" font-size="14">🔥 </text>
<text x="140" y="462" text-anchor="middle" font-size="9" fill="#475569">Выделение</text>
<text x="140" y="472" text-anchor="middle" font-size="8" fill="#64748b">тепла</text>
<circle cx="270" cy="455" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="270" y="450" text-anchor="middle" font-size="14">💡 </text>
<text x="270" y="462" text-anchor="middle" font-size="9" fill="#475569">Изменение</text>
<text x="270" y="472" text-anchor="middle" font-size="8" fill="#64748b">цвета</text>
<circle cx="400" cy="455" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="400" y="450" text-anchor="middle" font-size="14">💨 </text>
<text x="400" y="462" text-anchor="middle" font-size="9" fill="#475569">Выделение</text>
<text x="400" y="472" text-anchor="middle" font-size="8" fill="#64748b">газа</text>
<circle cx="530" cy="455" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="530" y="450" text-anchor="middle" font-size="14">💧 </text>
<text x="530" y="462" text-anchor="middle" font-size="9" fill="#475569">Выпадение</text>
<text x="530" y="472" text-anchor="middle" font-size="8" fill="#64748b">осадка</text>
<circle cx="660" cy="455" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="660" y="450" text-anchor="middle" font-size="14">👃 </text>
<text x="660" y="462" text-anchor="middle" font-size="9" fill="#475569">Выделение</text>
<text x="660" y="472" text-anchor="middle" font-size="8" fill="#64748b">запаха</text>
</svg>
