<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#8b5cf6" rx="3"/>
<text x="400" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Молярный объём газов</text>

<!-- Main formula -->
<rect x="230" y="58" width="340" height="60" rx="14" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="98" text-anchor="middle" font-size="30" font-weight="700" fill="#8b5cf6">V<tspan font-size="18" baseline-shift="sub">M</tspan> = 22,4 л/моль</text>

<!-- Avogadro's law -->
<rect x="30" y="130" width="740" height="55" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="155" text-anchor="middle" font-size="15" font-weight="600" fill="#3b82f6">Закон Авогадро</text>
<text x="400" y="175" text-anchor="middle" font-size="13" fill="#475569">В равных объёмах газов при одинаковых условиях содержится одинаковое число молекул</text>

<!-- Three gas boxes -->
<rect x="30" y="200" width="230" height="160" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="200" width="230" height="6" rx="3" fill="#3b82f6"/>
<rect x="60" y="225" width="170" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
<!-- H2 molecules - pairs of small circles -->
<circle cx="100" cy="255" r="6" fill="#3b82f6" opacity="0.7"/><circle cx="112" cy="255" r="6" fill="#3b82f6" opacity="0.7"/>
<circle cx="150" cy="270" r="6" fill="#3b82f6" opacity="0.7"/><circle cx="162" cy="270" r="6" fill="#3b82f6" opacity="0.7"/>
<circle cx="120" cy="290" r="6" fill="#3b82f6" opacity="0.7"/><circle cx="132" cy="290" r="6" fill="#3b82f6" opacity="0.7"/>
<circle cx="180" cy="248" r="6" fill="#3b82f6" opacity="0.7"/><circle cx="192" cy="248" r="6" fill="#3b82f6" opacity="0.7"/>
<text x="145" y="340" text-anchor="middle" font-size="18" font-weight="700" fill="#3b82f6">H<tspan font-size="12" baseline-shift="sub">2</tspan></text>
<text x="145" y="356" text-anchor="middle" font-size="11" fill="#64748b">4 молекулы</text>

<rect x="285" y="200" width="230" height="160" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="285" y="200" width="230" height="6" rx="3" fill="#10b981"/>
<rect x="315" y="225" width="170" height="90" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
<!-- O2 molecules - pairs of larger circles -->
<circle cx="350" cy="255" r="7" fill="#10b981" opacity="0.7"/><circle cx="365" cy="255" r="7" fill="#10b981" opacity="0.7"/>
<circle cx="405" cy="270" r="7" fill="#10b981" opacity="0.7"/><circle cx="420" cy="270" r="7" fill="#10b981" opacity="0.7"/>
<circle cx="370" cy="290" r="7" fill="#10b981" opacity="0.7"/><circle cx="385" cy="290" r="7" fill="#10b981" opacity="0.7"/>
<circle cx="445" cy="248" r="7" fill="#10b981" opacity="0.7"/><circle cx="460" cy="248" r="7" fill="#10b981" opacity="0.7"/>
<text x="400" y="340" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">O<tspan font-size="12" baseline-shift="sub">2</tspan></text>
<text x="400" y="356" text-anchor="middle" font-size="11" fill="#64748b">4 молекулы</text>

<rect x="540" y="200" width="230" height="160" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="540" y="200" width="230" height="6" rx="3" fill="#8b5cf6"/>
<rect x="570" y="225" width="170" height="90" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3"/>
<!-- CO2 molecules - one large + two small -->
<circle cx="600" cy="255" r="9" fill="#8b5cf6" opacity="0.6"/><circle cx="590" cy="255" r="5" fill="#a78bfa" opacity="0.7"/><circle cx="610" cy="255" r="5" fill="#a78bfa" opacity="0.7"/>
<circle cx="660" cy="270" r="9" fill="#8b5cf6" opacity="0.6"/><circle cx="650" cy="270" r="5" fill="#a78bfa" opacity="0.7"/><circle cx="670" cy="270" r="5" fill="#a78bfa" opacity="0.7"/>
<circle cx="620" cy="290" r="9" fill="#8b5cf6" opacity="0.6"/><circle cx="610" cy="290" r="5" fill="#a78bfa" opacity="0.7"/><circle cx="630" cy="290" r="5" fill="#a78bfa" opacity="0.7"/>
<circle cx="710" cy="248" r="9" fill="#8b5cf6" opacity="0.6"/><circle cx="700" cy="248" r="5" fill="#a78bfa" opacity="0.7"/><circle cx="720" cy="248" r="5" fill="#a78bfa" opacity="0.7"/>
<text x="655" y="340" text-anchor="middle" font-size="18" font-weight="700" fill="#8b5cf6">CO<tspan font-size="12" baseline-shift="sub">2</tspan></text>
<text x="655" y="356" text-anchor="middle" font-size="11" fill="#64748b">4 молекулы</text>

<!-- Equal sign between boxes -->
<text x="262" y="285" text-anchor="middle" font-size="24" font-weight="700" fill="#475569">=</text>
<text x="522" y="285" text-anchor="middle" font-size="24" font-weight="700" fill="#475569">=</text>

<!-- Formulas -->
<rect x="30" y="375" width="240" height="65" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="150" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#3b82f6">Объём → количество</text>
<text x="150" y="425" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a5f">n = V / V<tspan font-size="13" baseline-shift="sub">M</tspan></text>

<rect x="280" y="375" width="240" height="65" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#10b981">Количество → объём</text>
<text x="400" y="425" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a5f">V = n × V<tspan font-size="13" baseline-shift="sub">M</tspan></text>

<rect x="530" y="375" width="240" height="65" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="650" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#8b5cf6">При н.у. (0°C, 101 кПа)</text>
<text x="650" y="425" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">1 моль газа = 22,4 л</text>

<!-- Footer -->
<rect x="200" y="462" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="485" text-anchor="middle" font-size="12" fill="#94a3b8">Молярный объём — объём одного моля газа при нормальных условиях</text>
</svg>
