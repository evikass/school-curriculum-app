<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#14b8a6" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Химические уравнения</text>

<!-- Equation anatomy -->
<rect x="30" y="55" width="740" height="65" rx="14" fill="#fff" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#14b8a6">Строение уравнения</text>
<text x="190" y="108" text-anchor="middle" font-size="18" font-weight="600" fill="#3b82f6">Реагенты</text>
<text x="340" y="108" text-anchor="middle" font-size="22" fill="#14b8a6">→</text>
<text x="490" y="108" text-anchor="middle" font-size="18" font-weight="600" fill="#10b981">Продукты</text>
<!-- Braces -->
<path d="M95,112 Q95,118 190,120 Q95,122 95,128" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
<path d="M395,112 Q395,118 490,120 Q395,122 395,128" fill="none" stroke="#10b981" stroke-width="1.5"/>

<!-- Balancing example -->
<rect x="30" y="135" width="740" height="140" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="135" width="740" height="6" rx="3" fill="#3b82f6"/>
<text x="400" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#3b82f6">Балансировка: CH₄ + O₂ → CO₂ + H₂O</text>

<!-- Before balancing -->
<text x="55" y="195" font-size="14" font-weight="600" fill="#ef4444">До:</text>
<text x="90" y="195" font-size="15" fill="#475569">CH<tspan font-size="11" baseline-shift="sub">4</tspan> + O<tspan font-size="11" baseline-shift="sub">2</tspan> → CO<tspan font-size="11" baseline-shift="sub">2</tspan> + H<tspan font-size="11" baseline-shift="sub">2</tspan>O</text>

<!-- Atom count table -->
<text x="55" y="220" font-size="12" fill="#64748b">Слева: C=1, H=4, O=2</text>
<text x="55" y="240" font-size="12" fill="#64748b">Справа: C=1, H=2, O=3</text>
<text x="300" y="230" font-size="14" font-weight="700" fill="#ef4444">H и O ≠ ! Нужно уравнять!</text>

<!-- After balancing -->
<text x="55" y="265" font-size="14" font-weight="600" fill="#10b981">После:</text>
<text x="115" y="265" font-size="18" font-weight="700" fill="#1e3a5f">CH<tspan font-size="13" baseline-shift="sub">4</tspan> + <tspan fill="#ef4444" font-size="16">2</tspan>O<tspan font-size="13" baseline-shift="sub">2</tspan> → CO<tspan font-size="13" baseline-shift="sub">2</tspan> + <tspan fill="#ef4444" font-size="16">2</tspan>H<tspan font-size="13" baseline-shift="sub">2</tspan>O</text>

<!-- Warning -->
<rect x="470" y="190" width="280" height="70" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
<text x="610" y="215" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">⚠ Нельзя менять индексы!</text>
<text x="610" y="235" text-anchor="middle" font-size="12" fill="#ef4444">Можно менять только</text>
<text x="610" y="250" text-anchor="middle" font-size="12" fill="#ef4444">коэффициенты перед формулами</text>

<!-- Verification -->
<rect x="30" y="290" width="740" height="100" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="290" width="740" height="6" rx="3" fill="#10b981"/>
<text x="400" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="#10b981">Проверка: CH₄ + 2O₂ → CO₂ + 2H₂O</text>

<!-- Atom count verification -->
<rect x="55" y="330" width="160" height="45" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
<text x="135" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#3b82f6">C: 1 = 1 ✓</text>
<text x="135" y="368" text-anchor="middle" font-size="11" fill="#64748b">Слева: 1 | Справа: 1</text>

<rect x="230" y="330" width="160" height="45" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
<text x="310" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#10b981">H: 4 = 4 ✓</text>
<text x="310" y="368" text-anchor="middle" font-size="11" fill="#64748b">Слева: 4 | Справа: 2×2=4</text>

<rect x="405" y="330" width="160" height="45" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1"/>
<text x="485" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#8b5cf6">O: 4 = 4 ✓</text>
<text x="485" y="368" text-anchor="middle" font-size="11" fill="#64748b">Слева: 2×2=4 | Справа: 2+2=4</text>

<rect x="580" y="335" width="170" height="35" rx="18" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
<text x="665" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Уравнено! ✓</text>

<!-- Steps summary -->
<rect x="30" y="402" width="740" height="50" rx="12" fill="#f0fdf4" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="425" text-anchor="middle" font-size="13" font-weight="600" fill="#14b8a6">Алгоритм: 1) Записать схему → 2) Подсчитать атомы → 3) Подобрать коэффициенты → 4) Проверить</text>
<text x="400" y="443" text-anchor="middle" font-size="11" fill="#64748b">Коэффициент — число перед формулой, относится ко всем атомам в формуле</text>

<!-- Footer -->
<rect x="200" y="462" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="485" text-anchor="middle" font-size="12" fill="#94a3b8">Химическое уравнение — условная запись реакции с помощью формул и коэффициентов</text>
</svg>
