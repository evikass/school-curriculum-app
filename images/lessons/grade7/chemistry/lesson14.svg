<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#3b82f6" rx="3"/>
<text x="400" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Молярная масса</text>

<!-- Main formula -->
<rect x="220" y="60" width="360" height="60" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="100" text-anchor="middle" font-size="30" font-weight="700" fill="#3b82f6">M = m / n</text>

<!-- Units badge -->
<rect x="580" y="72" width="140" height="36" rx="18" fill="#3b82f6" filter="url(#shadow)"/>
<text x="650" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">[г/моль]</text>

<!-- Table with examples -->
<rect x="30" y="135" width="460" height="230" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="135" width="460" height="6" rx="3" fill="#3b82f6"/>
<text x="260" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#3b82f6">Примеры молярных масс</text>

<!-- Table header -->
<rect x="50" y="178" width="200" height="28" rx="6" fill="#eff6ff"/>
<text x="150" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Вещество</text>
<rect x="260" y="178" width="210" height="28" rx="6" fill="#eff6ff"/>
<text x="365" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Молярная масса</text>

<!-- Row 1 -->
<text x="150" y="232" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">H<tspan font-size="11" baseline-shift="sub">2</tspan>O</text>
<text x="365" y="232" text-anchor="middle" font-size="16" fill="#334155">M = 18 г/моль</text>
<line x1="50" y1="242" x2="470" y2="242" stroke="#e2e8f0" stroke-width="1"/>

<!-- Row 2 -->
<text x="150" y="264" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">NaCl</text>
<text x="365" y="264" text-anchor="middle" font-size="16" fill="#334155">M = 58,5 г/моль</text>
<line x1="50" y1="274" x2="470" y2="274" stroke="#e2e8f0" stroke-width="1"/>

<!-- Row 3 -->
<text x="150" y="296" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">CO<tspan font-size="11" baseline-shift="sub">2</tspan></text>
<text x="365" y="296" text-anchor="middle" font-size="16" fill="#334155">M = 44 г/моль</text>
<line x1="50" y1="306" x2="470" y2="306" stroke="#e2e8f0" stroke-width="1"/>

<!-- Row 4 -->
<text x="150" y="328" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">H<tspan font-size="11" baseline-shift="sub">2</tspan>SO<tspan font-size="11" baseline-shift="sub">4</tspan></text>
<text x="365" y="328" text-anchor="middle" font-size="16" fill="#334155">M = 98 г/моль</text>

<!-- Calculation steps -->
<rect x="510" y="135" width="260" height="230" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="510" y="135" width="260" height="6" rx="3" fill="#10b981"/>
<text x="640" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#10b981">Расчёт M(H₂SO₄)</text>

<text x="530" y="195" font-size="14" fill="#475569">1. H: 2 × 1 = 2</text>
<text x="530" y="220" font-size="14" fill="#475569">2. S: 1 × 32 = 32</text>
<text x="530" y="245" font-size="14" fill="#475569">3. O: 4 × 16 = 64</text>
<line x1="530" y1="255" x2="750" y2="255" stroke="#10b981" stroke-width="1.5"/>
<text x="530" y="280" font-size="16" font-weight="700" fill="#10b981">M = 2 + 32 + 64 = 98</text>

<!-- Balance scale icon -->
<line x1="640" y1="300" x2="640" y2="330" stroke="#475569" stroke-width="2.5"/>
<polygon points="632,330 648,330 645,340 635,340" fill="#94a3b8"/>
<line x1="590" y1="300" x2="690" y2="300" stroke="#475569" stroke-width="2.5"/>
<line x1="590" y1="300" x2="590" y2="310" stroke="#475569" stroke-width="2"/>
<line x1="690" y1="300" x2="690" y2="310" stroke="#475569" stroke-width="2"/>
<path d="M575,310 Q590,320 605,310" fill="none" stroke="#475569" stroke-width="1.5"/>
<path d="M675,310 Q690,320 705,310" fill="none" stroke="#475569" stroke-width="1.5"/>
<text x="640" y="365" text-anchor="middle" font-size="11" fill="#64748b">M численно = Ar (для атомов)</text>

<!-- Key relationship -->
<rect x="50" y="385" width="700" height="55" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="410" text-anchor="middle" font-size="15" font-weight="600" fill="#10b981">Ключевая связь:</text>
<text x="400" y="432" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">m = n × M  →  n = m / M  →  M = m / n</text>

<!-- Footer -->
<rect x="200" y="462" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="485" text-anchor="middle" font-size="12" fill="#94a3b8">Молярная масса — масса одного моля вещества</text>
</svg>
