<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#ec4899" rx="3"/>
<text x="400" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Количество вещества. Моль</text>
<rect x="50" y="60" width="700" height="80" rx="14" fill="#fff" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
<rect x="70" y="75" width="200" height="50" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1"/>
<text x="170" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#be185d">1 дюжина = 12</text>
<text x="170" y="118" text-anchor="middle" font-size="11" fill="#64748b">штук предметов</text>
<text x="320" y="105" text-anchor="middle" font-size="28" fill="#ec4899">→</text>
<rect x="380" y="75" width="350" height="50" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1"/>
<text x="555" y="100" text-anchor="middle" font-size="16" font-weight="600" fill="#be185d">1 моль = 6,02×10²³</text>
<text x="555" y="118" text-anchor="middle" font-size="11" fill="#64748b">частиц (атомов, молекул, ионов)</text>
<rect x="150" y="155" width="500" height="70" rx="14" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="183" text-anchor="middle" font-size="15" font-weight="600" fill="#be185d">Постоянная Авогадро</text>
<text x="400" y="212" text-anchor="middle" font-size="24" font-weight="700" fill="#ec4899">N<tspan font-size="16" baseline-shift="sub">A</tspan> = 6,02 × 10<tspan font-size="14" baseline-shift="super">23</tspan> моль⁻¹</text>
<rect x="50" y="240" width="340" height="100" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="50" y="240" width="340" height="6" rx="3" fill="#8b5cf6"/>
<text x="220" y="270" text-anchor="middle" font-size="15" font-weight="600" fill="#8b5cf6">Формула количества вещества</text>
<text x="220" y="305" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a5f">n = N / N<tspan font-size="14" baseline-shift="sub">A</tspan></text>
<text x="220" y="330" text-anchor="middle" font-size="11" fill="#64748b">n — количество вещества (моль)</text>
<rect x="410" y="240" width="340" height="100" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="410" y="240" width="340" height="6" rx="3" fill="#10b981"/>
<text x="580" y="270" text-anchor="middle" font-size="15" font-weight="600" fill="#10b981">Что считаем:</text>
<text x="460" y="305" font-size="14" fill="#334155">🔵 Атомы</text>
<text x="540" y="305" font-size="14" fill="#334155">🟢 Молекулы</text>
<text x="640" y="305" font-size="14" fill="#334155">🟡 Ионы</text>
<text x="580" y="330" text-anchor="middle" font-size="11" fill="#64748b">1 моль любого вещества содержит одинаковое число частиц</text>
<rect x="50" y="355" width="700" height="125" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<text x="400" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#475569">Примеры:</text>
<rect x="70" y="395" width="210" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
<text x="175" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#3b82f6">1 моль H<tspan font-size="10" baseline-shift="sub">2</tspan>O</text>
<text x="175" y="438" text-anchor="middle" font-size="11" fill="#475569">= 6,02×10²³ молекул</text>
<text x="175" y="456" text-anchor="middle" font-size="11" fill="#64748b">Масса = 18 г</text>
<rect x="295" y="395" width="210" height="70" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1"/>
<text x="400" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#10b981">1 моль NaCl</text>
<text x="400" y="438" text-anchor="middle" font-size="11" fill="#475569">= 6,02×10²³ формульных единиц</text>
<text x="400" y="456" text-anchor="middle" font-size="11" fill="#64748b">Масса = 58,5 г</text>
<rect x="520" y="395" width="210" height="70" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1"/>
<text x="625" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#8b5cf6">1 моль Fe</text>
<text x="625" y="438" text-anchor="middle" font-size="11" fill="#475569">= 6,02×10²³ атомов</text>
<text x="625" y="456" text-anchor="middle" font-size="11" fill="#64748b">Масса = 56 г</text>
</svg>
