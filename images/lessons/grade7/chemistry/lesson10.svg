<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#06b6d4" rx="3"/>
<text x="400" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Изотопы</text>
<rect x="100" y="58" width="600" height="35" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
<text x="400" y="81" text-anchor="middle" font-size="13" fill="#0e7490">Изотопы — атомы одного элемента с разным числом нейтронов</text>
<rect x="20" y="105" width="220" height="260" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<rect x="20" y="105" width="220" height="6" rx="3" fill="#3b82f6"/>
<text x="130" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#3b82f6">Протий</text>
<text x="130" y="162" text-anchor="middle" font-size="22" font-weight="600" fill="#1e3a5f">¹H</text>
<circle cx="130" cy="240" r="22" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
<circle cx="125" cy="234" r="8" fill="#ef4444"/>
<text x="125" y="237" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">p+</text>
<circle cx="130" cy="240" r="47" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
<circle cx="130" cy="193" r="5" fill="#8b5cf6"/>
<rect x="85" y="330" width="90" height="25" rx="12" fill="#3b82f6" opacity="0.15"/>
<text x="130" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">A = 1</text>
<rect x="260" y="105" width="220" height="260" rx="14" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
<rect x="260" y="105" width="220" height="6" rx="3" fill="#10b981"/>
<text x="370" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#10b981">Дейтерий</text>
<text x="370" y="162" text-anchor="middle" font-size="22" font-weight="600" fill="#1e3a5f">²H</text>
<circle cx="370" cy="240" r="27" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
<circle cx="365" cy="231" r="8" fill="#ef4444"/>
<text x="365" y="234" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">p+</text>
<circle cx="365" cy="248" r="8" fill="#3b82f6"/>
<text x="365" y="251" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">n</text>
<circle cx="370" cy="240" r="52" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
<circle cx="370" cy="188" r="5" fill="#8b5cf6"/>
<rect x="325" y="330" width="90" height="25" rx="12" fill="#10b981" opacity="0.15"/>
<text x="370" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">A = 2</text>
<rect x="500" y="105" width="220" height="260" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
<rect x="500" y="105" width="220" height="6" rx="3" fill="#8b5cf6"/>
<text x="610" y="135" text-anchor="middle" font-size="16" font-weight="700" fill="#8b5cf6">Тритий</text>
<text x="610" y="162" text-anchor="middle" font-size="22" font-weight="600" fill="#1e3a5f">³H</text>
<circle cx="610" cy="240" r="32" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1.5"/>
<circle cx="605" cy="228" r="8" fill="#ef4444"/>
<text x="605" y="231" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">p+</text>
<circle cx="605" cy="248" r="8" fill="#3b82f6"/>
<text x="605" y="251" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">n</text>
<circle cx="615" cy="248" r="8" fill="#3b82f6"/>
<text x="615" y="251" text-anchor="middle" font-size="7" fill="#fff" font-weight="700">n</text>
<circle cx="610" cy="240" r="57" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
<circle cx="610" cy="183" r="5" fill="#8b5cf6"/>
<rect x="565" y="330" width="90" height="25" rx="12" fill="#8b5cf6" opacity="0.15"/>
<text x="610" y="348" text-anchor="middle" font-size="12" font-weight="600" fill="#8b5cf6">A = 3</text>
<rect x="60" y="390" width="680" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
<text x="400" y="415" text-anchor="middle" font-size="14" font-weight="600" fill="#475569">Ключевые понятия:</text>
<text x="100" y="442" font-size="13" fill="#475569">🔴 Протоны (p<tspan font-size="9" baseline-shift="sub">+</tspan>) — одинаковы у всех изотопов одного элемента</text>
<text x="100" y="462" font-size="13" fill="#475569">🔵 Нейтроны (n) — различаются у изотопов</text>
<text x="580" y="442" font-size="13" fill="#475569">Массовое число:</text>
<text x="580" y="462" font-size="15" font-weight="600" fill="#06b6d4">A = p + n</text>
</svg>
