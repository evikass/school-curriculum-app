<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Давление и его единицы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Pressure -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">Давление</text>
  <!-- Block on surface -->
  <rect x="80" y="140" width="60" height="30" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <text x="110" y="160" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">m</text>
  <line x1="50" y1="175" x2="200" y2="175" stroke="#888" stroke-width="2"/>
  <!-- Force arrows down -->
  <line x1="100" y1="125" x2="100" y2="140" stroke="#C62828" stroke-width="2"/>
  <polygon points="97,138 100,143 103,138" fill="#C62828"/>
  <line x1="120" y1="125" x2="120" y2="140" stroke="#C62828" stroke-width="2"/>
  <polygon points="117,138 120,143 123,138" fill="#C62828"/>
  <text x="135" y="125" font-family="Arial,sans-serif" font-size="8" fill="#C62828">F</text>
  <text x="135" y="210" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">p = F / S</text>
  <text x="135" y="230" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Па (паскаль)</text>
  <!-- Area comparison -->
  <rect x="55" y="245" width="40" height="8" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <rect x="105" y="248" width="60" height="3" rx="1" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="75" y="270" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">меньше S</text>
  <text x="135" y="270" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">больше S</text>
  <text x="135" y="282" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">больше p  vs  меньше p</text>

  <!-- Pascal law -->
  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">Давление жидкостей</text>
  <!-- Container -->
  <rect x="310" y="130" width="110" height="100" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Liquid -->
  <rect x="312" y="150" width="106" height="78" fill="#90CAF9" opacity="0.5" rx="2"/>
  <!-- Pressure arrows -->
  <line x1="350" y1="148" x2="350" y2="155" stroke="#C62828" stroke-width="1.5"/>
  <line x1="380" y1="148" x2="380" y2="155" stroke="#C62828" stroke-width="1.5"/>
  <line x1="330" y1="200" x2="325" y2="200" stroke="#C62828" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="405" y2="200" stroke="#C62828" stroke-width="1.5"/>
  <line x1="365" y1="228" x2="365" y2="235" stroke="#C62828" stroke-width="2"/>
  <polygon points="362,233 365,238 368,233" fill="#C62828"/>
  <text x="367" y="255" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">p = g x h</text>
  <!-- Communicating vessels -->
  <path d="M290,265 L290,245 Q290,240 295,240 L305,240 L305,250 L325,250 L325,240 L335,240 Q340,240 340,245 L340,265" stroke="#1565C0" stroke-width="1.5" fill="none"/>
  <rect x="292" y="255" width="12" height="10" fill="#90CAF9" opacity="0.5"/>
  <rect x="326" y="255" width="12" height="10" fill="#90CAF9" opacity="0.5"/>
  <text x="365" y="280" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">сообщающиеся сосуды</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>