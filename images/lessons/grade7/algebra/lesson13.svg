<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="Arial">Сложение и вычитание многочленов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 13</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#673AB7" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Сложение</text>
  <text x="127" y="93" font-size="8" fill="#555" text-anchor="middle">(3x^2+2x-1)</text>
  <text x="127" y="105" font-size="8" fill="#4527A0" text-anchor="middle">+</text>
  <text x="127" y="117" font-size="8" fill="#555" text-anchor="middle">(x^2-5x+4)</text>
  <line x1="87" y1="122" x2="167" y2="122" stroke="#673AB7" stroke-width="1"/>
  <text x="127" y="137" font-size="8" fill="#4527A0" text-anchor="middle">= 4x^2 - 3x + 3</text>
  <text x="127" y="160" font-size="8" fill="#555" text-anchor="middle">Скобки опускаются,</text>
  <text x="127" y="172" font-size="8" fill="#555" text-anchor="middle">знаки не меняются</text>
  <rect x="252" y="58" width="236" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Вычитание</text>
  <text x="370" y="93" font-size="8" fill="#555" text-anchor="middle">(5a^2-3a+2)</text>
  <text x="370" y="105" font-size="8" fill="#C62828" text-anchor="middle">-</text>
  <text x="370" y="117" font-size="8" fill="#555" text-anchor="middle">(2a^2+a-3)</text>
  <line x1="330" y1="122" x2="410" y2="122" stroke="#673AB7" stroke-width="1"/>
  <text x="370" y="137" font-size="8" fill="#4527A0" text-anchor="middle">= 3a^2 - 4a + 5</text>
  <text x="370" y="160" font-size="8" fill="#C62828" text-anchor="middle">Знаки вычитаемого</text>
  <text x="370" y="172" font-size="8" fill="#C62828" text-anchor="middle">меняются на противоположные!</text>
  <rect x="12" y="184" width="476" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Правило раскрытия скобок</text>
  <rect x="22" y="206" width="220" height="28" rx="3" fill="#EDE7F6" stroke="#673AB7" stroke-width="0.5"/>
  <text x="132" y="218" font-size="9" fill="#2E7D32" text-anchor="middle">+(...) скобки опускаются</text>
  <text x="132" y="230" font-size="8" fill="#555" text-anchor="middle">знаки не меняются</text>
  <rect x="252" y="206" width="226" height="28" rx="3" fill="#EDE7F6" stroke="#673AB7" stroke-width="0.5"/>
  <text x="365" y="218" font-size="9" fill="#C62828" text-anchor="middle">-(...) скобки опускаются</text>
  <text x="365" y="230" font-size="8" fill="#C62828" text-anchor="middle">все знаки меняются!</text>
  <text x="250" y="258" font-size="8" fill="#555" text-anchor="middle">Пример: -(x^2 - 3x + 1) = -x^2 + 3x - 1</text>
  <text x="250" y="275" font-size="8" fill="#555" text-anchor="middle">Пример: +(2a - 5b) = 2a - 5b</text>
  <text x="250" y="292" font-size="8" fill="#4527A0" text-anchor="middle" font-weight="bold">После раскрытия скобок — привести подобные!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#673AB7" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Сложение и вычитание многочленов — Макарычев Ю.Н., 7 класс</text>
</svg>