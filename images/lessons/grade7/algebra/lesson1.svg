<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <marker id="arr1" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#1565C0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg1)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Числовые выражения</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 1</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1976D2" stroke-opacity="0.3"/>

  <rect x="12" y="58" width="230" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Порядок действий</text>
  <rect x="22" y="80" width="210" height="18" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
  <text x="127" y="93" font-size="8" fill="#0D47A1" text-anchor="middle">1. Скобки ( )</text>
  <rect x="22" y="102" width="210" height="18" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
  <text x="127" y="115" font-size="8" fill="#0D47A1" text-anchor="middle">2. Степень</text>
  <rect x="22" y="124" width="210" height="18" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
  <text x="127" y="137" font-size="8" fill="#0D47A1" text-anchor="middle">3. Умножение и деление</text>
  <rect x="22" y="146" width="210" height="18" rx="3" fill="#1976D2" fill-opacity="0.12"/>
  <text x="127" y="159" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">4. Сложение и вычитание</text>

  <rect x="252" y="58" width="236" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Примеры вычислений</text>
  <text x="262" y="93" font-size="9" fill="#1565C0" font-family="monospace">3 + 4 × 2 = 3 + 8 = 11</text>
  <text x="262" y="108" font-size="7" fill="#666">(сначала умножение)</text>
  <text x="262" y="128" font-size="9" fill="#1565C0" font-family="monospace">(10 - 2) × 3 = 24</text>
  <text x="262" y="143" font-size="7" fill="#666">(сначала скобки)</text>
  <text x="262" y="163" font-size="9" fill="#C62828" font-family="monospace">5 : (3 - 3) — нет смысла!</text>

  <rect x="12" y="186" width="476" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="250" y="201" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Числовое выражение и его значение</text>
  <text x="30" y="220" font-size="10" fill="#1565C0">Выражение:</text>
  <rect x="110" y="208" width="120" height="18" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
  <text x="170" y="221" font-size="10" fill="#0D47A1" text-anchor="middle" font-family="monospace">2 + 3 × 4 - 1</text>
  <text x="30" y="248" font-size="10" fill="#1565C0">Значение:</text>
  <rect x="110" y="236" width="60" height="18" rx="3" fill="#1976D2" fill-opacity="0.15"/>
  <text x="140" y="249" font-size="11" fill="#0D47A1" text-anchor="middle" font-weight="bold">13</text>
  <text x="200" y="248" font-size="9" fill="#666">(2+12-1=13)</text>
  <line x1="30" y1="262" x2="470" y2="262" stroke="#1976D2" stroke-opacity="0.2"/>
  <text x="30" y="280" font-size="9" fill="#0D47A1" font-weight="bold">Ключевой факт:</text>
  <text x="30" y="296" font-size="8" fill="#555">Если выражение содержит деление на ноль, оно не имеет смысла</text>

  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1976D2" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Значение выражения — результат выполнения всех действий по порядку</text>
</svg>