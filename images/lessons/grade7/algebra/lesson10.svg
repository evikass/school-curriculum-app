<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Свойства степени</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 10</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Умножение</text>
  <text x="127" y="95" font-size="10" fill="#3949AB" text-anchor="middle" font-family="monospace">a^n × a^m = a^(n+m)</text>
  <rect x="252" y="58" width="236" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Деление</text>
  <text x="370" y="95" font-size="10" fill="#3949AB" text-anchor="middle" font-family="monospace">a^n : a^m = a^(n-m)</text>
  <rect x="12" y="116" width="230" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="127" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Степень в степени</text>
  <text x="127" y="153" font-size="10" fill="#3949AB" text-anchor="middle" font-family="monospace">(a^n)^m = a^(nm)</text>
  <rect x="252" y="116" width="236" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="370" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Произведение в степени</text>
  <text x="370" y="153" font-size="10" fill="#3949AB" text-anchor="middle" font-family="monospace">(ab)^n = a^n × b^n</text>
  <rect x="12" y="174" width="476" height="130" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="189" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Примеры применения</text>
  <text x="30" y="210" font-size="9" fill="#3949AB" font-family="monospace">x^3 × x^5 = x^8</text>
  <text x="250" y="210" font-size="9" fill="#3949AB" font-family="monospace">b^9 : b^2 = b^7</text>
  <text x="30" y="230" font-size="9" fill="#3949AB" font-family="monospace">(x^2)^3 = x^6</text>
  <text x="250" y="230" font-size="9" fill="#3949AB" font-family="monospace">(2a)^3 = 8a^3</text>
  <text x="30" y="250" font-size="9" fill="#3949AB" font-family="monospace">a^2 × a^5 : a^3 = a^4</text>
  <text x="250" y="250" font-size="9" fill="#3949AB" font-family="monospace">(3x^2)^2 = 9x^4</text>
  <text x="250" y="275" font-size="8" fill="#555" text-anchor="middle">При умножении показатели складываем, при делении — вычитаем</text>
  <text x="250" y="290" font-size="8" fill="#555" text-anchor="middle">При возведении степени в степень — умножаем</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Свойства степени — Макарычев Ю.Н., 7 класс</text>
</svg>