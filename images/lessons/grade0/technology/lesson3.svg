<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes build { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
      .build { animation: build 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF8E1"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">🏗️ Конструирование</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#FF9800"/>
  
  <!-- Building projects -->
  <g transform="translate(30, 80)">
    <!-- Tower from blocks -->
    <g class="build" style="animation-delay: 0s;">
      <rect x="20" y="100" width="60" height="20" fill="#F44336" stroke="#B71C1C" stroke-width="2" rx="3"/>
      <rect x="25" y="80" width="50" height="20" fill="#2196F3" stroke="#1565C0" stroke-width="2" rx="3"/>
      <rect x="30" y="60" width="40" height="20" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" rx="3"/>
      <rect x="35" y="40" width="30" height="20" fill="#FF9800" stroke="#E65100" stroke-width="2" rx="3"/>
      <rect x="40" y="20" width="20" height="20" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2" rx="3"/>
      <polygon points="50,5 60,20 40,20" fill="#E91E63"/>
      <text x="50" y="140" font-family="Arial" font-size="11" fill="#C62828" text-anchor="middle">Башня</text>
    </g>
    
    <!-- Bridge -->
    <g class="build" style="animation-delay: 0.3s;" transform="translate(100, 0)">
      <rect x="0" y="90" width="15" height="30" fill="#795548" stroke="#4E342E" stroke-width="2"/>
      <rect x="75" y="90" width="15" height="30" fill="#795548" stroke="#4E342E" stroke-width="2"/>
      <rect x="0" y="80" width="90" height="15" fill="#8D6E63" stroke="#5D4037" stroke-width="2" rx="2"/>
      <rect x="5" y="65" width="80" height="15" fill="#A1887F" stroke="#6D4C41" stroke-width="2" rx="2"/>
      <line x1="10" y1="90" x2="45" y2="60" stroke="#5D4037" stroke-width="3"/>
      <line x1="80" y1="90" x2="45" y2="60" stroke="#5D4037" stroke-width="3"/>
      <text x="45" y="140" font-family="Arial" font-size="11" fill="#4E342E" text-anchor="middle">Мостик</text>
    </g>
    
    <!-- Car -->
    <g class="build" style="animation-delay: 0.6s;" transform="translate(220, 30)">
      <rect x="10" y="50" width="80" height="30" fill="#2196F3" stroke="#1565C0" stroke-width="2" rx="5"/>
      <rect x="25" y="30" width="50" height="25" fill="#42A5F5" stroke="#1976D2" stroke-width="2" rx="5"/>
      <rect x="30" y="35" width="18" height="15" fill="#BBDEFB" stroke="#90CAF9" stroke-width="1"/>
      <rect x="52" y="35" width="18" height="15" fill="#BBDEFB" stroke="#90CAF9" stroke-width="1"/>
      <circle cx="30" cy="80" r="12" fill="#333" stroke="#1A1A1A" stroke-width="2"/>
      <circle cx="30" cy="80" r="6" fill="#757575"/>
      <circle cx="70" cy="80" r="12" fill="#333" stroke="#1A1A1A" stroke-width="2"/>
      <circle cx="70" cy="80" r="6" fill="#757575"/>
      <text x="50" y="115" font-family="Arial" font-size="11" fill="#1565C0" text-anchor="middle">Машина</text>
    </g>
    
    <!-- House -->
    <g class="build" style="animation-delay: 0.9s;" transform="translate(330, 10)">
      <rect x="10" y="60" width="70" height="50" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <polygon points="10,60 45,20 80,60" fill="#D84315" stroke="#BF360C" stroke-width="2"/>
      <rect x="35" y="75" width="20" height="20" fill="#81D4FA" stroke="#29B6F6" stroke-width="1"/>
      <line x1="45" y1="75" x2="45" y2="95" stroke="#29B6F6" stroke-width="1"/>
      <line x1="35" y1="85" x2="55" y2="85" stroke="#29B6F6" stroke-width="1"/>
      <rect x="55" y="90" width="18" height="20" fill="#795548" stroke="#4E342E" stroke-width="1"/>
      <circle cx="70" cy="100" r="3" fill="#FFD54F"/>
      <text x="45" y="130" font-family="Arial" font-size="11" fill="#D84315" text-anchor="middle">Домик</text>
    </g>
  </g>
  
  <!-- Construction tips -->
  <g transform="translate(30, 250)">
    <text x="220" y="0" font-family="Arial" font-size="14" fill="#E65100" text-anchor="middle">Правила конструирования:</text>
    
    <rect x="20" y="15" width="400" height="60" fill="#FFECB3" stroke="#FFC107" stroke-width="2" rx="10"/>
    <text x="220" y="38" font-family="Arial" font-size="12" fill="#F57F17" text-anchor="middle">1. Придумай, что хочешь сделать</text>
    <text x="220" y="58" font-family="Arial" font-size="12" fill="#F57F17" text-anchor="middle">2. Собери детали по порядку • 3. Проверь, всё ли крепко держится</text>
  </g>
</svg>