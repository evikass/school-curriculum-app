<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes fold { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } }
      .fold { animation: fold 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF3E0"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">📄 Работа с бумагой</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#FF9800"/>
  
  <!-- Paper types -->
  <g transform="translate(30, 80)">
    <g class="fold" style="animation-delay: 0s;">
      <rect x="10" y="10" width="80" height="100" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/>
      <line x1="50" y1="10" x2="50" y2="110" stroke="#F57F17" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="50" y="130" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">Цветная</text>
      <text x="50" y="143" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">бумага</text>
    </g>
    
    <g class="fold" style="animation-delay: 0.2s;">
      <rect x="110" y="10" width="80" height="100" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="2"/>
      <line x1="120" y1="30" x2="180" y2="30" stroke="#E0E0E0" stroke-width="1"/>
      <line x1="120" y1="45" x2="180" y2="45" stroke="#E0E0E0" stroke-width="1"/>
      <line x1="120" y1="60" x2="180" y2="60" stroke="#E0E0E0" stroke-width="1"/>
      <line x1="120" y1="75" x2="180" y2="75" stroke="#E0E0E0" stroke-width="1"/>
      <line x1="120" y1="90" x2="180" y2="90" stroke="#E0E0E0" stroke-width="1"/>
      <text x="150" y="130" font-family="Arial" font-size="10" fill="#757575" text-anchor="middle">Белая</text>
      <text x="150" y="143" font-family="Arial" font-size="10" fill="#757575" text-anchor="middle">бумага</text>
    </g>
    
    <g class="fold" style="animation-delay: 0.4s;">
      <rect x="210" y="10" width="80" height="100" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <text x="250" y="60" font-family="Arial" font-size="10" fill="#D7CCC8" text-anchor="middle">Картон</text>
      <text x="250" y="130" font-family="Arial" font-size="10" fill="#4E342E" text-anchor="middle">Картон</text>
    </g>
    
    <g class="fold" style="animation-delay: 0.6s;">
      <rect x="310" y="10" width="80" height="100" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
      <text x="350" y="60" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">Гофро</text>
      <text x="350" y="130" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">Гофробумага</text>
    </g>
  </g>
  
  <!-- Actions with paper -->
  <g transform="translate(30, 230)">
    <text x="220" y="0" font-family="Arial" font-size="14" fill="#E65100" text-anchor="middle">Что делаем с бумагой:</text>
    
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="80" height="60" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="8"/>
      <text x="40" y="25" font-family="Arial" font-size="20" text-anchor="middle">✂️</text>
      <text x="40" y="50" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle">Режем</text>
    </g>
    
    <g transform="translate(100, 20)">
      <rect x="0" y="0" width="80" height="60" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="8"/>
      <text x="40" y="25" font-family="Arial" font-size="20" text-anchor="middle">📐</text>
      <text x="40" y="50" font-family="Arial" font-size="10" fill="#6A1B9A" text-anchor="middle">Складываем</text>
    </g>
    
    <g transform="translate(190, 20)">
      <rect x="0" y="0" width="80" height="60" fill="#B2EBF2" stroke="#00BCD4" stroke-width="2" rx="8"/>
      <text x="40" y="25" font-family="Arial" font-size="20" text-anchor="middle">🎨</text>
      <text x="40" y="50" font-family="Arial" font-size="10" fill="#00838F" text-anchor="middle">Красим</text>
    </g>
    
    <g transform="translate(280, 20)">
      <rect x="0" y="0" width="80" height="60" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="8"/>
      <text x="40" y="25" font-family="Arial" font-size="20" text-anchor="middle">🧲</text>
      <text x="40" y="50" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">Клеим</text>
    </g>
    
    <g transform="translate(370, 20)">
      <rect x="0" y="0" width="80" height="60" fill="#FFECB3" stroke="#FFC107" stroke-width="2" rx="8"/>
      <text x="40" y="25" font-family="Arial" font-size="20" text-anchor="middle">✏️</text>
      <text x="40" y="50" font-family="Arial" font-size="10" fill="#F57F17" text-anchor="middle">Рисуем</text>
    </g>
  </g>
</svg>