<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E3F2FD"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0" text-anchor="middle">🌸 Времена года</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#42A5F5"/>
  
  <!-- Four seasons -->
  <g transform="translate(30, 80)">
    <!-- Winter -->
    <g class="bounce" style="animation-delay: 0s;">
      <rect x="10" y="10" width="90" height="90" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="10"/>
      <text x="55" y="30" font-family="Arial" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">ЗИМА</text>
      <!-- Snowflakes -->
      <text x="30" y="60" font-family="Arial" font-size="20" text-anchor="middle">❄️</text>
      <text x="55" y="75" font-family="Arial" font-size="20" text-anchor="middle">❄️</text>
      <text x="80" y="55" font-family="Arial" font-size="20" text-anchor="middle">❄️</text>
      <text x="55" y="110" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">дек-фев</text>
    </g>
    
    <!-- Spring -->
    <g class="bounce" style="animation-delay: 0.2s;">
      <rect x="115" y="10" width="90" height="90" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="10"/>
      <text x="160" y="30" font-family="Arial" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">ВЕСНА</text>
      <!-- Flowers -->
      <text x="135" y="60" font-family="Arial" font-size="18" text-anchor="middle">🌷</text>
      <text x="160" y="75" font-family="Arial" font-size="18" text-anchor="middle">🌸</text>
      <text x="185" y="55" font-family="Arial" font-size="18" text-anchor="middle">🌱</text>
      <text x="160" y="110" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">мар-май</text>
    </g>
    
    <!-- Summer -->
    <g class="bounce" style="animation-delay: 0.4s;">
      <rect x="220" y="10" width="90" height="90" fill="#FFF8E1" stroke="#FF9800" stroke-width="2" rx="10"/>
      <text x="265" y="30" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">ЛЕТО</text>
      <!-- Sun -->
      <text x="250" y="65" font-family="Arial" font-size="20" text-anchor="middle">☀️</text>
      <text x="275" y="80" font-family="Arial" font-size="18" text-anchor="middle">🌻</text>
      <text x="265" y="110" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">июн-авг</text>
    </g>
    
    <!-- Autumn -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <rect x="325" y="10" width="90" height="90" fill="#FFF3E0" stroke="#FF5722" stroke-width="2" rx="10"/>
      <text x="370" y="30" font-family="Arial" font-size="12" font-weight="bold" fill="#D84315" text-anchor="middle">ОСЕНЬ</text>
      <!-- Leaves -->
      <text x="345" y="60" font-family="Arial" font-size="18" text-anchor="middle">🍂</text>
      <text x="370" y="75" font-family="Arial" font-size="18" text-anchor="middle">🍁</text>
      <text x="395" y="55" font-family="Arial" font-size="18" text-anchor="middle">🍎</text>
      <text x="370" y="110" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">сен-ноя</text>
    </g>
  </g>
  
  <!-- Season wheel -->
  <g transform="translate(100, 220)">
    <text x="150" y="0" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">Круговорот сезонов:</text>
    
    <!-- Arrows connecting seasons -->
    <path d="M100,30 Q150,10 200,30" fill="none" stroke="#42A5F5" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M200,30 Q250,50 200,80" fill="none" stroke="#42A5F5" stroke-width="2"/>
    <path d="M200,80 Q150,100 100,80" fill="none" stroke="#42A5F5" stroke-width="2"/>
    <path d="M100,80 Q50,50 100,30" fill="none" stroke="#42A5F5" stroke-width="2"/>
    
    <text x="100" y="45" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">Зима</text>
    <text x="200" y="45" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">Весна</text>
    <text x="200" y="85" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">Лето</text>
    <text x="100" y="85" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle">Осень</text>
  </g>
</svg>