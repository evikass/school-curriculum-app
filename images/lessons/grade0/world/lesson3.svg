<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">🌲 Дикие животные</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#66BB6A"/>
  
  <!-- Forest background -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="440" height="180" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="10"/>
    
    <!-- Trees -->
    <polygon points="30,180 50,100 70,180" fill="#2E7D32"/>
    <polygon points="400,180 420,110 440,180" fill="#2E7D32"/>
    
    <!-- Bear -->
    <g class="bounce" style="animation-delay: 0s;">
      <ellipse cx="70" cy="100" rx="35" ry="30" fill="#795548" stroke="#4E342E" stroke-width="2"/>
      <circle cx="50" cy="70" r="22" fill="#795548" stroke="#4E342E" stroke-width="2"/>
      <circle cx="38" cy="50" r="10" fill="#795548" stroke="#4E342E" stroke-width="1"/>
      <circle cx="62" cy="50" r="10" fill="#795548" stroke="#4E342E" stroke-width="1"/>
      <circle cx="43" cy="68" r="4" fill="#333"/>
      <circle cx="57" cy="68" r="4" fill="#333"/>
      <ellipse cx="50" cy="78" rx="6" ry="4" fill="#333"/>
      <text x="70" y="145" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Медведь</text>
    </g>
    
    <!-- Fox -->
    <g class="bounce" style="animation-delay: 0.2s;">
      <ellipse cx="160" cy="95" rx="30" ry="22" fill="#FF7043" stroke="#D84315" stroke-width="2"/>
      <polygon points="135,70 145,95 125,85" fill="#FF7043" stroke="#D84315" stroke-width="1"/>
      <polygon points="185,70 175,95 195,85" fill="#FF7043" stroke="#D84315" stroke-width="1"/>
      <circle cx="145" cy="75" r="18" fill="#FF7043" stroke="#D84315" stroke-width="2"/>
      <circle cx="138" cy="72" r="3" fill="#333"/>
      <circle cx="152" cy="72" r="3" fill="#333"/>
      <polygon points="145,78 140,85 150,85" fill="#333"/>
      <text x="160" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Лиса</text>
    </g>
    
    <!-- Wolf -->
    <g class="bounce" style="animation-delay: 0.4s;">
      <ellipse cx="260" cy="90" rx="35" ry="25" fill="#78909C" stroke="#455A64" stroke-width="2"/>
      <ellipse cx="225" cy="70" rx="20" ry="18" fill="#78909C" stroke="#455A64" stroke-width="2"/>
      <polygon points="210,50 220,70 205,65" fill="#78909C" stroke="#455A64" stroke-width="1"/>
      <polygon points="240,50 230,70 245,65" fill="#78909C" stroke="#455A64" stroke-width="1"/>
      <circle cx="218" cy="68" r="3" fill="#333"/>
      <circle cx="232" cy="68" r="3" fill="#333"/>
      <ellipse cx="225" cy="80" rx="8" ry="5" fill="#333"/>
      <text x="260" y="130" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Волк</text>
    </g>
    
    <!-- Hare -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <ellipse cx="350" cy="95" rx="22" ry="18" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2"/>
      <circle cx="335" cy="75" r="15" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2"/>
      <ellipse cx="325" cy="55" rx="6" ry="15" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
      <ellipse cx="345" cy="55" rx="6" ry="15" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
      <circle cx="330" cy="73" r="3" fill="#333"/>
      <circle cx="340" cy="73" r="3" fill="#333"/>
      <ellipse cx="335" cy="82" rx="3" ry="2" fill="#F48FB1"/>
      <text x="350" y="130" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Заяц</text>
    </g>
    
    <!-- Hedgehog -->
    <g class="bounce" style="animation-delay: 0.8s;">
      <ellipse cx="420" cy="100" rx="25" ry="20" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <!-- Spikes -->
      <line x1="400" y1="85" x2="395" y2="70" stroke="#5D4037" stroke-width="2"/>
      <line x1="410" y1="80" x2="408" y2="65" stroke="#5D4037" stroke-width="2"/>
      <line x1="420" y1="78" x2="420" y2="62" stroke="#5D4037" stroke-width="2"/>
      <line x1="430" y1="80" x2="432" y2="65" stroke="#5D4037" stroke-width="2"/>
      <line x1="440" y1="85" x2="445" y2="70" stroke="#5D4037" stroke-width="2"/>
      <circle cx="408" cy="95" r="10" fill="#FFCCBC" stroke="#5D4037" stroke-width="1"/>
      <circle cx="404" cy="93" r="2" fill="#333"/>
      <circle cx="410" cy="90" r="1" fill="#333"/>
      <text x="420" y="135" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Ёжик</text>
    </g>
  </g>
  
  <!-- Forest habitat -->
  <g transform="translate(50, 280)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#2E7D32" text-anchor="middle">Где живут дикие животные? В лесу!</text>
  </g>
</svg>