<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes wave { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      .sound { animation: wave 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef3c7"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#b45309">Звуки речи 🔊</text>
  
  <!-- Sound waves -->
  <g class="sound">
    <circle cx="80" cy="100" r="40" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.3"/>
    <circle cx="80" cy="100" r="30" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.5"/>
    <circle cx="80" cy="100" r="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="80" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#b45309">🔊</text>
  </g>
  
  <!-- Vowels -->
  <rect x="130" y="60" width="170" height="100" fill="#dbeafe" rx="15"/>
  <text x="215" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">Гласные звуки</text>
  <text x="215" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#3b82f6">А О У Ы Э И</text>
  <text x="215" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Можно пропеть: а-а-а!</text>
  
  <!-- Consonants -->
  <rect x="310" y="60" width="170" height="100" fill="#dcfce7" rx="15"/>
  <text x="395" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Согласные звуки</text>
  <text x="395" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#22c55e">М Н Л Р Б В Г</text>
  <text x="395" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Нельзя пропеть</text>
  
  <!-- First sound example -->
  <rect x="20" y="180" width="220" height="80" fill="#fce7f3" rx="15"/>
  <text x="130" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be185d">Первый звук в слове</text>
  <text x="130" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎 ЯБЛОКО</text>
  <text x="130" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ec4899">Первый звук: [Й]</text>
  
  <!-- Last sound example -->
  <rect x="260" y="180" width="220" height="80" fill="#f3e8ff" rx="15"/>
  <text x="370" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">Последний звук</text>
  <text x="370" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🏠 ДОМ</text>
  <text x="370" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a855f7">Последний звук: [М]</text>
  
  <!-- Practice tip -->
  <rect x="20" y="275" width="460" height="55" fill="#fef2f2" rx="10"/>
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dc2626">Упражнение: Назови первый звук в словах</text>
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">МАМА, ПАПА, КОТ, СОБАКА 🐕</text>
</svg>
