<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes sing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .vowel { animation: sing 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#eff6ff"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1d4ed8">Гласные и согласные 🔤</text>
  
  <!-- Vowels section -->
  <rect x="20" y="50" width="220" height="150" fill="#dbeafe" rx="15"/>
  <text x="130" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8">Гласные 🔊</text>
  
  <g class="vowel">
    <circle cx="60" cy="120" r="25" fill="#3b82f6"/>
    <text x="60" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white">А</text>
  </g>
  <g class="vowel" style="animation-delay: 0.2s">
    <circle cx="130" cy="120" r="25" fill="#3b82f6"/>
    <text x="130" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white">О</text>
  </g>
  <g class="vowel" style="animation-delay: 0.4s">
    <circle cx="200" cy="120" r="25" fill="#3b82f6"/>
    <text x="200" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white">У</text>
  </g>
  
  <text x="60" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2563eb">Ы</text>
  <text x="130" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2563eb">Э</text>
  <text x="200" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2563eb">И</text>
  
  <text x="130" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Можно пропеть! 🎵</text>
  
  <!-- Consonants section -->
  <rect x="260" y="50" width="220" height="150" fill="#dcfce7" rx="15"/>
  <text x="370" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#15803d">Согласные 🔇</text>
  
  <rect x="280" y="95" width="35" height="35" fill="#22c55e" rx="5"/>
  <text x="297" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">М</text>
  
  <rect x="325" y="95" width="35" height="35" fill="#22c55e" rx="5"/>
  <text x="342" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">Н</text>
  
  <rect x="370" y="95" width="35" height="35" fill="#22c55e" rx="5"/>
  <text x="387" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">Л</text>
  
  <rect x="415" y="95" width="35" height="35" fill="#22c55e" rx="5"/>
  <text x="432" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="white">Р</text>
  
  <text x="370" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#16a34a">Б В Г Д Ж З К Л М Н</text>
  <text x="370" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#16a34a">П Р С Т Ф Х Ц Ч Ш Щ</text>
  
  <text x="370" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Нельзя пропеть</text>
  
  <!-- Difference -->
  <rect x="20" y="215" width="460" height="120" fill="#fef3c7" rx="15"/>
  <text x="250" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b45309">Как отличить? 🤔</text>
  
  <text x="130" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">Гласные:</text>
  <text x="130" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">воздух свободно</text>
  <text x="130" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">выходит изо рта</text>
  
  <text x="370" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">Согласные:</text>
  <text x="370" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">воздух встречает</text>
  <text x="370" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">преграду (губы, зубы)</text>
</svg>
