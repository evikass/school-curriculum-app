<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .rotate { animation: rotate 8s linear infinite; transform-origin: center; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E3F2FD"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565C0" text-anchor="middle">⭕ Круг и квадрат</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#42A5F5"/>
  
  <!-- Circle -->
  <g transform="translate(80, 100)">
    <circle class="bounce" cx="80" cy="80" r="70" fill="#FFEB3B" stroke="#F57F17" stroke-width="4"/>
    <text x="80" y="90" font-family="Arial" font-size="20" font-weight="bold" fill="#F57F17" text-anchor="middle">КРУГ</text>
    <text x="80" y="180" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">Круглый, без углов</text>
    
    <!-- Examples of circles -->
    <circle cx="20" cy="150" r="15" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
    <circle cx="80" cy="150" r="15" fill="#E91E63" stroke="#AD1457" stroke-width="2"/>
    <circle cx="140" cy="150" r="15" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <text x="80" y="200" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">мяч, солнце, колесо</text>
  </g>
  
  <!-- Square -->
  <g transform="translate(280, 100)">
    <rect class="bounce" style="animation-delay: 0.5s;" x="10" y="10" width="140" height="140" fill="#4CAF50" stroke="#2E7D32" stroke-width="4"/>
    <text x="80" y="90" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">КВАДРАТ</text>
    <text x="80" y="180" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">4 равные стороны</text>
    
    <!-- Examples of squares -->
    <rect x="30" y="140" width="25" height="25" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>
    <rect x="68" y="140" width="25" height="25" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
    <rect x="106" y="140" width="25" height="25" fill="#F44336" stroke="#C62828" stroke-width="2"/>
    <text x="80" y="200" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">кубик, окно, книга</text>
  </g>
  
  <!-- Decorations -->
  <circle cx="30" cy="30" r="15" fill="#BBDEFB" opacity="0.5"/>
  <rect x="460" y="20" width="25" height="25" fill="#90CAF9" opacity="0.5"/>
  
  <!-- Find shapes hint -->
  <g transform="translate(100, 300)">
    <text x="150" y="20" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">🔍 Найди круги и квадраты вокруг себя!</text>
  </g>
</svg>