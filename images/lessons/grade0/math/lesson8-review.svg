<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes celebrate { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(5deg); } }
      .star { animation: celebrate 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef3c7"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#b45309">Повторение 🎉</text>
  
  <!-- Stars decoration -->
  <g class="star">
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="24">⭐</text>
  </g>
  <g class="star" style="animation-delay: 0.2s">
    <text x="460" y="40" font-family="Arial, sans-serif" font-size="24">⭐</text>
  </g>
  <g class="star" style="animation-delay: 0.4s">
    <text x="40" y="340" font-family="Arial, sans-serif" font-size="24">⭐</text>
  </g>
  <g class="star" style="animation-delay: 0.6s">
    <text x="460" y="340" font-family="Arial, sans-serif" font-size="24">⭐</text>
  </g>
  
  <!-- Review boxes -->
  <rect x="20" y="50" width="145" height="90" fill="#dbeafe" rx="10"/>
  <text x="92" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">Счёт до 10</text>
  <text x="92" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">1️⃣2️⃣3️⃣4️⃣5️⃣</text>
  <text x="92" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">6️⃣7️⃣8️⃣9️⃣🔟</text>
  
  <rect x="175" y="50" width="145" height="90" fill="#dcfce7" rx="10"/>
  <text x="247" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Цифры</text>
  <text x="247" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#15803d">0 1 2 3 4 5</text>
  <text x="247" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#15803d">6 7 8 9</text>
  
  <rect x="330" y="50" width="150" height="90" fill="#f3e8ff" rx="10"/>
  <text x="405" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">Знаки</text>
  <text x="405" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#ef4444">&gt;</text>
  <text x="405" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" dx="25">больше</text>
  <text x="405" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#3b82f6">&lt;</text>
  <text x="405" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" dx="25">меньше</text>
  
  <!-- Shapes review -->
  <rect x="20" y="155" width="460" height="70" fill="#fef2f2" rx="10"/>
  <text x="250" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Фигуры</text>
  <circle cx="80" cy="210" r="20" fill="#ef4444"/>
  <rect x="130" y="190" width="40" height="40" fill="#3b82f6"/>
  <polygon points="220,190 200,230 240,230" fill="#eab308"/>
  <ellipse cx="290" cy="210" rx="30" ry="20" fill="#a855f7"/>
  <rect x="330" y="195" width="50" height="30" fill="#22c55e"/>
  <text x="430" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">и другие!</text>
  
  <!-- Check yourself -->
  <rect x="20" y="240" width="460" height="90" fill="#f0fdf4" rx="15" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#15803d">Проверь себя! ✅</text>
  
  <text x="80" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">1. Посчитай 1-10</text>
  <text x="210" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">2. Напиши цифры</text>
  <text x="340" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">3. Сравни 3 и 5</text>
  <text x="440" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">4. Назови фигуры</text>
  
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22c55e">Ты молодец! 🌟</text>
</svg>
