<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">📐 Сравнение фигур</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#66BB6A"/>
  
  <!-- Three shapes comparison -->
  <g transform="translate(30, 80)">
    <!-- Circle -->
    <g class="bounce" style="animation-delay: 0s;">
      <circle cx="70" cy="70" r="55" fill="#FFEB3B" stroke="#F57F17" stroke-width="3"/>
      <text x="70" y="75" font-family="Arial" font-size="16" font-weight="bold" fill="#F57F17" text-anchor="middle">Круг</text>
      <text x="70" y="150" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">0 углов</text>
      <text x="70" y="165" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">круглый</text>
    </g>
    
    <!-- Square -->
    <g class="bounce" style="animation-delay: 0.3s;">
      <rect x="150" y="15" width="110" height="110" fill="#4CAF50" stroke="#2E7D32" stroke-width="3"/>
      <text x="205" y="75" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Квадрат</text>
      <text x="205" y="150" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">4 угла</text>
      <text x="205" y="165" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">все равны</text>
    </g>
    
    <!-- Triangle -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <polygon points="390,125 330,15 450,15" fill="#2196F3" stroke="#1565C0" stroke-width="3"/>
      <text x="390" y="80" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Треуг.</text>
      <text x="390" y="150" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">3 угла</text>
      <text x="390" y="165" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">острые</text>
    </g>
  </g>
  
  <!-- Comparison arrows -->
  <g transform="translate(50, 260)">
    <text x="200" y="0" font-family="Arial" font-size="16" fill="#2E7D32" text-anchor="middle">Чем похожи? Чем отличаются?</text>
    
    <!-- Differences -->
    <g class="pulse">
      <rect x="20" y="20" width="120" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="5"/>
      <text x="80" y="40" font-family="Arial" font-size="11" fill="#1565C0" text-anchor="middle">Форма:</text>
      <text x="80" y="55" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">разная</text>
    </g>
    
    <g class="pulse" style="animation-delay: 0.5s;">
      <rect x="160" y="20" width="120" height="50" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="5"/>
      <text x="220" y="40" font-family="Arial" font-size="11" fill="#E65100" text-anchor="middle">Углы:</text>
      <text x="220" y="55" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">0, 3 или 4</text>
    </g>
    
    <g class="pulse" style="animation-delay: 1s;">
      <rect x="300" y="20" width="120" height="50" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="5"/>
      <text x="360" y="40" font-family="Arial" font-size="11" fill="#6A1B9A" text-anchor="middle">Стороны:</text>
      <text x="360" y="55" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">по-разному</text>
    </g>
  </g>
  
  <!-- Decorations -->
  <circle cx="30" cy="30" r="15" fill="#C8E6C9"/>
  <rect x="455" y="15" width="25" height="25" fill="#A5D6A7"/>
  <polygon points="480,340 490,320 470,320" fill="#81C784"/>
</svg>