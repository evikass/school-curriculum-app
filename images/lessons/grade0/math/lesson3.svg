<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes write { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .write { stroke-dasharray: 100; animation: write 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF3E0"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">✏️ Цифры 1-5</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#FF9800"/>
  
  <!-- Large numbers with tracing lines -->
  <g transform="translate(30, 80)">
    <!-- Number 1 -->
    <g>
      <rect x="10" y="10" width="80" height="100" fill="#FFE0B2" stroke="#FF9800" stroke-width="2" rx="5"/>
      <text x="50" y="85" font-family="Arial" font-size="60" font-weight="bold" fill="#E65100" text-anchor="middle">1</text>
      <text x="50" y="130" font-family="Arial" font-size="12" fill="#E65100" text-anchor="middle">один</text>
    </g>
    <!-- Number 2 -->
    <g>
      <rect x="100" y="10" width="80" height="100" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="5"/>
      <text x="140" y="85" font-family="Arial" font-size="60" font-weight="bold" fill="#2E7D32" text-anchor="middle">2</text>
      <text x="140" y="130" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="middle">два</text>
    </g>
    <!-- Number 3 -->
    <g>
      <rect x="190" y="10" width="80" height="100" fill="#BBDEFB" stroke="#2196F3" stroke-width="2" rx="5"/>
      <text x="230" y="85" font-family="Arial" font-size="60" font-weight="bold" fill="#1565C0" text-anchor="middle">3</text>
      <text x="230" y="130" font-family="Arial" font-size="12" fill="#1565C0" text-anchor="middle">три</text>
    </g>
    <!-- Number 4 -->
    <g>
      <rect x="280" y="10" width="80" height="100" fill="#F8BBD9" stroke="#E91E63" stroke-width="2" rx="5"/>
      <text x="320" y="85" font-family="Arial" font-size="60" font-weight="bold" fill="#AD1457" text-anchor="middle">4</text>
      <text x="320" y="130" font-family="Arial" font-size="12" fill="#AD1457" text-anchor="middle">четыре</text>
    </g>
    <!-- Number 5 -->
    <g>
      <rect x="370" y="10" width="80" height="100" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="5"/>
      <text x="410" y="85" font-family="Arial" font-size="60" font-weight="bold" fill="#6A1B9A" text-anchor="middle">5</text>
      <text x="410" y="130" font-family="Arial" font-size="12" fill="#6A1B9A" text-anchor="middle">пять</text>
    </g>
  </g>
  
  <!-- Tracing lines -->
  <g transform="translate(50, 230)">
    <text x="200" y="0" font-family="Arial" font-size="16" fill="#E65100" text-anchor="middle">Обведи цифры:</text>
    <!-- Dotted numbers for tracing -->
    <text x="50" y="60" font-family="Arial" font-size="48" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,5" text-anchor="middle">1</text>
    <text x="120" y="60" font-family="Arial" font-size="48" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5,5" text-anchor="middle">2</text>
    <text x="190" y="60" font-family="Arial" font-size="48" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="5,5" text-anchor="middle">3</text>
    <text x="260" y="60" font-family="Arial" font-size="48" fill="none" stroke="#E91E63" stroke-width="2" stroke-dasharray="5,5" text-anchor="middle">4</text>
    <text x="330" y="60" font-family="Arial" font-size="48" fill="none" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,5" text-anchor="middle">5</text>
  </g>
  
  <!-- Pencil -->
  <g class="bounce" transform="translate(400, 250)">
    <rect x="0" y="0" width="15" height="60" fill="#FFCC80" transform="rotate(30)"/>
    <polygon points="7.5,60 0,75 15,75" fill="#FFD54F" transform="rotate(30)"/>
    <rect x="0" y="-5" width="15" height="8" fill="#F48FB1" transform="rotate(30)"/>
  </g>
</svg>