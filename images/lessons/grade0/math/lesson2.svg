<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      .bounce { animation: bounce 1.5s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="30" fill="#C8E6C9" opacity="0.5"/>
  <circle cx="450" cy="300" r="40" fill="#A5D6A7" opacity="0.4"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">🔢 Счёт до 10</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#66BB6A"/>
  
  <!-- Numbers 1-10 in two rows -->
  <g transform="translate(25, 80)">
    <!-- Row 1: 1-5 -->
    <g class="bounce" style="animation-delay: 0s;"><circle cx="45" cy="35" r="28" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/><text x="45" y="43" font-family="Arial" font-size="24" font-weight="bold" fill="#F57F17" text-anchor="middle">1</text></g>
    <g class="bounce" style="animation-delay: 0.1s;"><circle cx="115" cy="35" r="28" fill="#FF9800" stroke="#E65100" stroke-width="2"/><text x="115" y="43" font-family="Arial" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">2</text></g>
    <g class="bounce" style="animation-delay: 0.2s;"><circle cx="185" cy="35" r="28" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/><text x="185" y="43" font-family="Arial" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">3</text></g>
    <g class="bounce" style="animation-delay: 0.3s;"><circle cx="255" cy="35" r="28" fill="#2196F3" stroke="#1565C0" stroke-width="2"/><text x="255" y="43" font-family="Arial" font-size="24" font-weight="bold" fill="#1565C0" text-anchor="middle">4</text></g>
    <g class="bounce" style="animation-delay: 0.4s;"><circle cx="325" cy="35" r="28" fill="#E91E63" stroke="#AD1457" stroke-width="2"/><text x="325" y="43" font-family="Arial" font-size="24" font-weight="bold" fill="#AD1457" text-anchor="middle">5</text></g>
    <g class="bounce" style="animation-delay: 0.5s;"><circle cx="395" cy="35" r="28" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/><text x="395" y="43" font-family="Arial" font-size="24" font-weight="bold" fill="#6A1B9A" text-anchor="middle">6</text></g>
    
    <!-- Row 2: 7-10 -->
    <g class="bounce" style="animation-delay: 0.6s;"><circle cx="80" cy="110" r="28" fill="#00BCD4" stroke="#00838F" stroke-width="2"/><text x="80" y="118" font-family="Arial" font-size="24" font-weight="bold" fill="#00838F" text-anchor="middle">7</text></g>
    <g class="bounce" style="animation-delay: 0.7s;"><circle cx="160" cy="110" r="28" fill="#607D8B" stroke="#37474F" stroke-width="2"/><text x="160" y="118" font-family="Arial" font-size="24" font-weight="bold" fill="#37474F" text-anchor="middle">8</text></g>
    <g class="bounce" style="animation-delay: 0.8s;"><circle cx="240" cy="110" r="28" fill="#795548" stroke="#4E342E" stroke-width="2"/><text x="240" y="118" font-family="Arial" font-size="24" font-weight="bold" fill="#4E342E" text-anchor="middle">9</text></g>
    <g class="bounce" style="animation-delay: 0.9s;"><circle cx="320" cy="110" r="32" fill="#F44336" stroke="#C62828" stroke-width="3"/><text x="320" y="118" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">10</text></g>
  </g>
  
  <!-- Counting objects -->
  <g transform="translate(50, 230)">
    <text x="200" y="0" font-family="Arial" font-size="16" fill="#2E7D32" text-anchor="middle">Посчитай предметы!</text>
    <!-- Apples -->
    <circle cx="50" cy="50" r="18" fill="#F44336"/>
    <circle cx="90" cy="50" r="18" fill="#F44336"/>
    <circle cx="130" cy="50" r="18" fill="#F44336"/>
    <circle cx="170" cy="50" r="18" fill="#F44336"/>
    <circle cx="210" cy="50" r="18" fill="#F44336"/>
    <circle cx="250" cy="50" r="18" fill="#F44336"/>
    <circle cx="290" cy="50" r="18" fill="#F44336"/>
    <circle cx="330" cy="50" r="18" fill="#F44336"/>
    <circle cx="370" cy="50" r="18" fill="#F44336"/>
    <circle cx="410" cy="50" r="18" fill="#F44336"/>
    <!-- Apple stems -->
    <line x1="50" y1="32" x2="50" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="90" y1="32" x2="90" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="130" y1="32" x2="130" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="170" y1="32" x2="170" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="210" y1="32" x2="210" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="250" y1="32" x2="250" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="290" y1="32" x2="290" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="330" y1="32" x2="330" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="370" y1="32" x2="370" y2="25" stroke="#795548" stroke-width="2"/>
    <line x1="410" y1="32" x2="410" y2="25" stroke="#795548" stroke-width="2"/>
    <!-- Leaves -->
    <ellipse cx="55" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="95" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="135" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="175" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="215" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="255" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="295" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="335" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="375" cy="25" rx="5" ry="3" fill="#4CAF50"/>
    <ellipse cx="415" cy="25" rx="5" ry="3" fill="#4CAF50"/>
  </g>
  
  <g class="pulse">
    <polygon points="30,150 35,165 50,165 38,175 43,190 30,180 17,190 22,175 10,165 25,165" fill="#FFD700"/>
  </g>
</svg>