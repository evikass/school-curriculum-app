<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#F3E5F5"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🔢 Цифры 6-9 и 0</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#AB47BC"/>
  
  <!-- Numbers 6-9 and 0 -->
  <g transform="translate(30, 80)">
    <!-- Number 6 -->
    <g class="bounce" style="animation-delay: 0s;">
      <rect x="10" y="10" width="80" height="100" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="10"/>
      <text x="50" y="80" font-family="Arial" font-size="56" font-weight="bold" fill="#6A1B9A" text-anchor="middle">6</text>
      <text x="50" y="125" font-family="Arial" font-size="11" fill="#6A1B9A" text-anchor="middle">шесть</text>
    </g>
    <!-- Number 7 -->
    <g class="bounce" style="animation-delay: 0.2s;">
      <rect x="100" y="10" width="80" height="100" fill="#B2EBF2" stroke="#00BCD4" stroke-width="2" rx="10"/>
      <text x="140" y="80" font-family="Arial" font-size="56" font-weight="bold" fill="#00838F" text-anchor="middle">7</text>
      <text x="140" y="125" font-family="Arial" font-size="11" fill="#00838F" text-anchor="middle">семь</text>
    </g>
    <!-- Number 8 -->
    <g class="bounce" style="animation-delay: 0.4s;">
      <rect x="190" y="10" width="80" height="100" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="10"/>
      <text x="230" y="80" font-family="Arial" font-size="56" font-weight="bold" fill="#D84315" text-anchor="middle">8</text>
      <text x="230" y="125" font-family="Arial" font-size="11" fill="#D84315" text-anchor="middle">восемь</text>
    </g>
    <!-- Number 9 -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <rect x="280" y="10" width="80" height="100" fill="#CFD8DC" stroke="#607D8B" stroke-width="2" rx="10"/>
      <text x="320" y="80" font-family="Arial" font-size="56" font-weight="bold" fill="#37474F" text-anchor="middle">9</text>
      <text x="320" y="125" font-family="Arial" font-size="11" fill="#37474F" text-anchor="middle">девять</text>
    </g>
    <!-- Number 0 -->
    <g class="bounce" style="animation-delay: 0.8s;">
      <rect x="370" y="10" width="80" height="100" fill="#D7CCC8" stroke="#795548" stroke-width="2" rx="10"/>
      <text x="410" y="80" font-family="Arial" font-size="56" font-weight="bold" fill="#4E342E" text-anchor="middle">0</text>
      <text x="410" y="125" font-family="Arial" font-size="11" fill="#4E342E" text-anchor="middle">ноль</text>
    </g>
  </g>
  
  <!-- Counting objects -->
  <g transform="translate(50, 230)">
    <text x="200" y="0" font-family="Arial" font-size="16" fill="#6A1B9A" text-anchor="middle">Найди 6, 7, 8, 9 предметов!</text>
    
    <!-- Stars for counting -->
    <polygon class="bounce" style="animation-delay: 0.1s;" points="30,50 35,65 50,65 38,75 43,90 30,80 17,90 22,75 10,65 25,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.15s;" points="70,50 75,65 90,65 78,75 83,90 70,80 57,90 62,75 50,65 65,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.2s;" points="110,50 115,65 130,65 118,75 123,90 110,80 97,90 102,75 90,65 105,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.25s;" points="150,50 155,65 170,65 158,75 163,90 150,80 137,90 142,75 130,65 145,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.3s;" points="190,50 195,65 210,65 198,75 203,90 190,80 177,90 182,75 170,65 185,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.35s;" points="230,50 235,65 250,65 238,75 243,90 230,80 217,90 222,75 210,65 225,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.4s;" points="270,50 275,65 290,65 278,75 283,90 270,80 257,90 262,75 250,65 265,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.45s;" points="310,50 315,65 330,65 318,75 323,90 310,80 297,90 302,75 290,65 305,65" fill="#FFD700"/>
    <polygon class="bounce" style="animation-delay: 0.5s;" points="350,50 355,65 370,65 358,75 363,90 350,80 337,90 342,75 330,65 345,65" fill="#FFD700"/>
  </g>
</svg>