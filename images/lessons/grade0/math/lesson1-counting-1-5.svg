<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes wave { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
      .apple { animation: bounce 2s ease-in-out infinite; }
      .number { animation: pulse 1.5s ease-in-out infinite; }
      .hand { animation: wave 1s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#dbeafe"/>
  
  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e40af">Счёт до 5 🔢</text>
  
  <!-- Numbers 1-5 with items -->
  <g class="number" style="animation-delay: 0s">
    <circle cx="60" cy="100" r="35" fill="#ef4444"/>
    <text x="60" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">1</text>
  </g>
  <text x="60" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎</text>
  
  <g class="number" style="animation-delay: 0.2s">
    <circle cx="140" cy="100" r="35" fill="#f97316"/>
    <text x="140" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">2</text>
  </g>
  <text x="140" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎🍎</text>
  
  <g class="number" style="animation-delay: 0.4s">
    <circle cx="220" cy="100" r="35" fill="#eab308"/>
    <text x="220" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">3</text>
  </g>
  <text x="220" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎🍎🍎</text>
  
  <g class="number" style="animation-delay: 0.6s">
    <circle cx="300" cy="100" r="35" fill="#22c55e"/>
    <text x="300" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">4</text>
  </g>
  <text x="300" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎🍎🍎🍎</text>
  
  <g class="number" style="animation-delay: 0.8s">
    <circle cx="380" cy="100" r="35" fill="#3b82f6"/>
    <text x="380" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">5</text>
  </g>
  <text x="380" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">🍎🍎🍎🍎🍎</text>
  
  <!-- Hand counting -->
  <g class="hand" style="transform-origin: 250px 280px">
    <ellipse cx="250" cy="280" rx="80" ry="50" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <!-- Fingers -->
    <rect x="175" y="240" width="15" height="40" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="200" y="230" width="15" height="50" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="225" y="225" width="15" height="55" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="250" y="230" width="15" height="50" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="275" y="240" width="15" height="40" rx="7" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e40af">5 пальцев на руке ✋</text>
  
  <!-- Counting tip -->
  <rect x="20" y="180" width="460" height="40" fill="#fef3c7" rx="10"/>
  <text x="250" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#92400e">Считаем: один, два, три, четыре, пять! ✨</text>
</svg>
