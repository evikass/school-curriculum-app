<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
      .wobble { animation: wobble 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF8E1"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#F57F17" text-anchor="middle">🔶 Лепка простых форм</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#FFC107"/>
  
  <!-- Three basic shapes -->
  <g transform="translate(30, 80)">
    <!-- Ball/Sphere -->
    <g class="wobble" style="animation-delay: 0s;">
      <circle cx="70" cy="80" r="60" fill="#F44336"/>
      <ellipse cx="50" cy="55" rx="20" ry="15" fill="#EF5350" opacity="0.6"/>
      <ellipse cx="85" cy="100" rx="25" ry="15" fill="#C62828" opacity="0.4"/>
      <text x="70" y="160" font-family="Arial" font-size="14" fill="#C62828" text-anchor="middle">ШАР</text>
      <text x="70" y="180" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">катай между</text>
      <text x="70" y="195" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">ладонями</text>
    </g>
    
    <!-- Cube -->
    <g class="wobble" style="animation-delay: 0.3s;">
      <polygon points="230,30 290,50 290,130 230,110" fill="#2196F3"/>
      <polygon points="170,50 230,30 230,110 170,130" fill="#1565C0"/>
      <polygon points="170,50 230,70 290,50 230,30" fill="#64B5F6"/>
      <text x="230" y="160" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">КУБ</text>
      <text x="230" y="180" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">приплюсни</text>
      <text x="230" y="195" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">с разных сторон</text>
    </g>
    
    <!-- Cylinder -->
    <g class="wobble" style="animation-delay: 0.6s;">
      <rect x="340" y="50" width="80" height="80" fill="#4CAF50"/>
      <ellipse cx="380" cy="50" rx="40" ry="15" fill="#66BB6A"/>
      <ellipse cx="380" cy="130" rx="40" ry="15" fill="#2E7D32"/>
      <text x="380" y="170" font-family="Arial" font-size="14" fill="#2E7D32" text-anchor="middle">ЦИЛИНДР</text>
      <text x="380" y="190" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">раскатай в длину</text>
      <text x="380" y="205" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">и приплюсни</text>
    </g>
  </g>
  
  <!-- Composition hint -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="40" fill="#FFECB3" stroke="#FFC107" stroke-width="2" rx="8"/>
    <text x="200" y="25" font-family="Arial" font-size="13" fill="#F57F17" text-anchor="middle">💡 Из этих форм можно сделать снеговика, башню, машинку!</text>
  </g>
</svg>