<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .bounce { animation: bounce 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">🐾 Лепка животных</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#66BB6A"/>
  
  <!-- Clay animals -->
  <g transform="translate(30, 80)">
    <!-- Cat -->
    <g class="bounce" style="animation-delay: 0s;">
      <ellipse cx="60" cy="70" rx="35" ry="25" fill="#FF9800"/>
      <circle cx="40" cy="45" r="25" fill="#FF9800"/>
      <polygon points="25,25 35,40 18,38" fill="#FF9800"/>
      <polygon points="55,25 45,40 62,38" fill="#FF9800"/>
      <polygon points="25,27 35,42 20,40" fill="#F57C00"/>
      <polygon points="55,27 45,42 60,40" fill="#F57C00"/>
      <circle cx="32" cy="42" r="4" fill="#2E7D32"/>
      <circle cx="48" cy="42" r="4" fill="#2E7D32"/>
      <ellipse cx="40" cy="52" rx="4" ry="3" fill="#FF5722"/>
      <line x1="85" y1="60" x2="105" y2="55" stroke="#F57C00" stroke-width="3"/>
      <line x1="85" y1="70" x2="108" y2="72" stroke="#F57C00" stroke-width="3"/>
      <text x="60" y="115" font-family="Arial" font-size="11" fill="#E65100" text-anchor="middle">Кошка</text>
    </g>
    
    <!-- Bunny -->
    <g class="bounce" style="animation-delay: 0.2s;">
      <ellipse cx="175" cy="70" rx="30" ry="22" fill="#E0E0E0"/>
      <circle cx="160" cy="50" r="22" fill="#E0E0E0"/>
      <ellipse cx="148" cy="25" rx="8" ry="22" fill="#E0E0E0"/>
      <ellipse cx="172" cy="25" rx="8" ry="22" fill="#E0E0E0"/>
      <ellipse cx="148" cy="25" rx="5" ry="18" fill="#F8BBD9"/>
      <ellipse cx="172" cy="25" rx="5" ry="18" fill="#F8BBD9"/>
      <circle cx="152" cy="48" r="4" fill="#333"/>
      <circle cx="168" cy="48" r="4" fill="#333"/>
      <ellipse cx="160" cy="58" rx="3" ry="2" fill="#F48FB1"/>
      <circle cx="195" cy="65" r="8" fill="#E0E0E0"/>
      <text x="175" y="115" font-family="Arial" font-size="11" fill="#757575" text-anchor="middle">Зайка</text>
    </g>
    
    <!-- Turtle -->
    <g class="bounce" style="animation-delay: 0.4s;">
      <ellipse cx="290" cy="65" rx="45" ry="30" fill="#4CAF50"/>
      <ellipse cx="290" cy="60" rx="35" ry="22" fill="#66BB6A"/>
      <circle cx="245" cy="55" r="15" fill="#81C784"/>
      <circle cx="240" cy="52" r="3" fill="#333"/>
      <circle cx="250" cy="52" r="3" fill="#333"/>
      <ellipse cx="248" cy="65" rx="4" ry="2" fill="#2E7D32"/>
      <ellipse cx="265" cy="85" rx="8" ry="5" fill="#81C784"/>
      <ellipse cx="310" cy="85" rx="8" ry="5" fill="#81C784"/>
      <text x="290" y="115" font-family="Arial" font-size="11" fill="#2E7D32" text-anchor="middle">Черепаха</text>
    </g>
    
    <!-- Ladybug -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <ellipse cx="395" cy="60" rx="35" ry="28" fill="#F44336"/>
      <circle cx="365" cy="50" r="18" fill="#333"/>
      <circle cx="358" cy="45" r="3" fill="white"/>
      <circle cx="368" cy="48" r="3" fill="white"/>
      <line x1="365" y1="35" x2="395" y2="85" stroke="#333" stroke-width="3"/>
      <circle cx="385" cy="55" r="6" fill="#333"/>
      <circle cx="410" cy="60" r="5" fill="#333"/>
      <circle cx="395" cy="75" r="4" fill="#333"/>
      <line x1="365" y1="32" x2="355" y2="22" stroke="#333" stroke-width="2"/>
      <line x1="370" y1="30" x2="365" y2="18" stroke="#333" stroke-width="2"/>
      <text x="395" y="110" font-family="Arial" font-size="11" fill="#C62828" text-anchor="middle">Божья коровка</text>
    </g>
  </g>
  
  <!-- Tips -->
  <g transform="translate(50, 220)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#2E7D32" text-anchor="middle">Секреты лепки:</text>
    
    <rect x="30" y="15" width="340" height="80" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="10"/>
    <text x="200" y="40" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="middle">• Большое тело + маленькая голова = милое животное</text>
    <text x="200" y="60" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="middle">• Добавь ушки, хвостик, глазки</text>
    <text x="200" y="80" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="middle">• Используй разные цвета для деталей</text>
  </g>
</svg>