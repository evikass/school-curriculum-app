<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes sparkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#F3E5F5"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🎭 Композиции</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#AB47BC"/>
  
  <!-- Display platform -->
  <g transform="translate(50, 80)">
    <rect x="0" y="110" width="400" height="20" fill="#8D6E63" rx="5"/>
    <text x="200" y="150" font-family="Arial" font-size="11" fill="#5D4037" text-anchor="middle">Подставка для композиции</text>
    
    <!-- Forest scene -->
    <g transform="translate(30, -10)">
      <!-- Tree 1 -->
      <rect x="25" y="60" width="15" height="50" fill="#795548"/>
      <circle cx="32" cy="40" r="35" fill="#4CAF50"/>
      <circle cx="20" cy="55" r="20" fill="#66BB6A"/>
      <circle cx="45" cy="50" r="18" fill="#81C784"/>
      
      <!-- Tree 2 -->
      <rect x="90" y="70" width="12" height="40" fill="#795548"/>
      <circle cx="96" cy="55" r="28" fill="#2E7D32"/>
      <circle cx="85" cy="65" r="15" fill="#43A047"/>
      
      <!-- Mushrooms -->
      <ellipse cx="140" cy="105" rx="12" ry="5" fill="#F44336"/>
      <rect x="136" y="105" width="8" height="15" fill="#FFECB3"/>
      <ellipse cx="160" cy="108" rx="10" ry="4" fill="#FF9800"/>
      <rect x="157" y="108" width="6" height="12" fill="#FFECB3"/>
      
      <!-- Flower -->
      <g transform="translate(180, 70)">
        <rect x="8" y="20" width="4" height="25" fill="#4CAF50"/>
        <circle cx="10" cy="15" r="8" fill="#E91E63"/>
        <circle cx="3" cy="10" r="6" fill="#F48FB1"/>
        <circle cx="17" cy="10" r="6" fill="#F48FB1"/>
        <circle cx="5" cy="20" r="6" fill="#F48FB1"/>
        <circle cx="15" cy="20" r="6" fill="#F48FB1"/>
        <circle cx="10" cy="15" r="4" fill="#FFEB3B"/>
      </g>
      
      <!-- Sun -->
      <circle cx="220" cy="20" r="20" fill="#FFEB3B"/>
      <line x1="220" y1="-5" x2="220" y2="-15" stroke="#F57F17" stroke-width="3"/>
      <line x1="240" y1="0" x2="250" y2="-8" stroke="#F57F17" stroke-width="3"/>
      <line x1="245" y1="20" x2="255" y2="20" stroke="#F57F17" stroke-width="3"/>
      <line x1="240" y1="40" x2="250" y2="48" stroke="#F57F17" stroke-width="3"/>
      
      <!-- Animals -->
      <g transform="translate(250, 50)">
        <!-- Hedgehog -->
        <ellipse cx="30" cy="50" rx="25" ry="18" fill="#8D6E63"/>
        <circle cx="15" cy="45" r="12" fill="#FFCC80"/>
        <circle cx="10" cy="43" r="2" fill="#333"/>
        <line x1="35" y1="35" x2="30" y2="25" stroke="#5D4037" stroke-width="2"/>
        <line x1="45" y1="38" x2="45" y2="28" stroke="#5D4037" stroke-width="2"/>
        <line x1="55" y1="42" x2="62" y2="35" stroke="#5D4037" stroke-width="2"/>
      </g>
      
      <!-- House -->
      <g transform="translate(320, 20)">
        <rect x="0" y="50" width="50" height="40" fill="#FFCC80"/>
        <polygon points="0,50 25,20 50,50" fill="#D84315"/>
        <rect x="18" y="60" width="15" height="15" fill="#81D4FA"/>
        <rect x="35" y="70" width="12" height="20" fill="#795548"/>
      </g>
    </g>
  </g>
  
  <!-- Themes -->
  <g transform="translate(30, 250)">
    <text x="220" y="0" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">Идеи для композиций:</text>
    
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="80" height="50" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="8"/>
      <text x="40" y="30" font-family="Arial" font-size="18" text-anchor="middle">🌲</text>
      <text x="40" y="45" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Лес</text>
    </g>
    
    <g transform="translate(100, 20)">
      <rect x="0" y="0" width="80" height="50" fill="#BBDEFB" stroke="#2196F3" stroke-width="2" rx="8"/>
      <text x="40" y="30" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
      <text x="40" y="45" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">Домик</text>
    </g>
    
    <g transform="translate(190, 20)">
      <rect x="0" y="0" width="80" height="50" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="8"/>
      <text x="40" y="30" font-family="Arial" font-size="18" text-anchor="middle">🌺</text>
      <text x="40" y="45" font-family="Arial" font-size="9" fill="#D84315" text-anchor="middle">Сад</text>
    </g>
    
    <g transform="translate(280, 20)">
      <rect x="0" y="0" width="80" height="50" fill="#F8BBD9" stroke="#E91E63" stroke-width="2" rx="8"/>
      <text x="40" y="30" font-family="Arial" font-size="18" text-anchor="middle">🐰</text>
      <text x="40" y="45" font-family="Arial" font-size="9" fill="#AD1457" text-anchor="middle">Зоопарк</text>
    </g>
    
    <g transform="translate(370, 20)">
      <rect x="0" y="0" width="80" height="50" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="8"/>
      <text x="40" y="30" font-family="Arial" font-size="18" text-anchor="middle">🎂</text>
      <text x="40" y="45" font-family="Arial" font-size="9" fill="#F57F17" text-anchor="middle">Праздник</text>
    </g>
  </g>
  
  <!-- Sparkles -->
  <g class="sparkle">
    <polygon points="30,30 33,40 43,40 35,47 38,57 30,50 22,57 25,47 17,40 27,40" fill="#FFD700"/>
  </g>
  <g class="sparkle" style="animation-delay: 0.5s;">
    <polygon points="470,100 473,110 483,110 475,117 478,127 470,120 462,127 465,117 457,110 467,110" fill="#FFD700"/>
  </g>
</svg>