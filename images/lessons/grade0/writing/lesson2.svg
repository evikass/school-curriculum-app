<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes dash { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .dash { stroke-dasharray: 100; animation: dash 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#F3E5F5"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#6A1B9A" text-anchor="middle">✏️ Обведение контуров</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#AB47BC"/>
  
  <!-- Shapes to trace -->
  <g transform="translate(30, 80)">
    <!-- Circle to trace -->
    <g>
      <circle cx="60" cy="60" r="45" fill="none" stroke="#E1BEE7" stroke-width="8"/>
      <circle class="dash" cx="60" cy="60" r="45" fill="none" stroke="#9C27B0" stroke-width="3"/>
      <text x="60" y="130" font-family="Arial" font-size="12" fill="#6A1B9A" text-anchor="middle">Круг</text>
    </g>
    
    <!-- Square to trace -->
    <g>
      <rect x="130" y="15" width="90" height="90" fill="none" stroke="#C8E6C9" stroke-width="8"/>
      <rect class="dash" style="animation-delay: 0.3s;" x="130" y="15" width="90" height="90" fill="none" stroke="#4CAF50" stroke-width="3"/>
      <text x="175" y="130" font-family="Arial" font-size="12" fill="#4CAF50" text-anchor="middle">Квадрат</text>
    </g>
    
    <!-- Triangle to trace -->
    <g>
      <polygon points="340,105 280,15 400,15" fill="none" stroke="#BBDEFB" stroke-width="8"/>
      <polygon class="dash" style="animation-delay: 0.6s;" points="340,105 280,15 400,15" fill="none" stroke="#2196F3" stroke-width="3"/>
      <text x="340" y="130" font-family="Arial" font-size="12" fill="#2196F3" text-anchor="middle">Треугольник</text>
    </g>
  </g>
  
  <!-- Tracing lines -->
  <g transform="translate(50, 230)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">Обведи по точкам:</text>
    
    <!-- Dotted line patterns -->
    <line x1="30" y1="40" x2="180" y2="40" stroke="#9C27B0" stroke-width="2" stroke-dasharray="8,4"/>
    <line x1="220" y1="40" x2="370" y2="40" stroke="#4CAF50" stroke-width="2" stroke-dasharray="8,4"/>
    <path d="M30,70 Q100,50 170,70 Q240,90 310,70" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="8,4"/>
  </g>
  
  <!-- Star decorations -->
  <g class="bounce">
    <polygon points="30,30 35,45 50,45 38,55 43,70 30,60 17,70 22,55 10,45 25,45" fill="#FFD700"/>
  </g>
</svg>