<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes draw { 0% { stroke-dashoffset: 500; } 100% { stroke-dashoffset: 0; } }
      .draw { stroke-dasharray: 500; animation: draw 4s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8EAF6"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#303F9F" text-anchor="middle">📏 Рисование линий</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#5C6BC0"/>
  
  <!-- Types of lines -->
  <g transform="translate(30, 80)">
    <!-- Straight lines -->
    <g>
      <rect x="0" y="0" width="130" height="80" fill="#C5CAE9" stroke="#3F51B5" stroke-width="2" rx="5"/>
      <text x="65" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#303F9F" text-anchor="middle">Прямые</text>
      <line class="draw" x1="15" y1="45" x2="115" y2="45" stroke="#3F51B5" stroke-width="3"/>
      <line class="draw" style="animation-delay: 0.5s;" x1="15" y1="65" x2="115" y2="65" stroke="#7986CB" stroke-width="2"/>
    </g>
    
    <!-- Wavy lines -->
    <g>
      <rect x="150" y="0" width="130" height="80" fill="#B2DFDB" stroke="#009688" stroke-width="2" rx="5"/>
      <text x="215" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#00796B" text-anchor="middle">Волнистые</text>
      <path class="draw" style="animation-delay: 1s;" d="M165,45 Q185,35 205,45 Q225,55 245,45 Q265,35 270,45" fill="none" stroke="#009688" stroke-width="3"/>
      <path class="draw" style="animation-delay: 1.5s;" d="M165,65 Q185,55 205,65 Q225,75 245,65 Q265,55 270,65" fill="none" stroke="#4DB6AC" stroke-width="2"/>
    </g>
    
    <!-- Zigzag lines -->
    <g>
      <rect x="300" y="0" width="130" height="80" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="5"/>
      <text x="365" y="20" font-family="Arial" font-size="12" font-weight="bold" fill="#D84315" text-anchor="middle">Ломаные</text>
      <path class="draw" style="animation-delay: 2s;" d="M315,45 L335,35 L355,55 L375,35 L395,55 L415,35" fill="none" stroke="#FF5722" stroke-width="3"/>
      <path class="draw" style="animation-delay: 2.5s;" d="M315,65 L335,55 L355,75 L375,55 L395,75 L415,55" fill="none" stroke="#FF8A65" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Practice area -->
  <g transform="translate(50, 200)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#303F9F" text-anchor="middle">Нарисуй свой узор:</text>
    <rect x="0" y="15" width="400" height="80" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="5"/>
    <!-- Grid dots for guidance -->
    <circle cx="40" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="80" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="120" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="160" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="200" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="240" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="280" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="320" cy="55" r="3" fill="#BDBDBD"/>
    <circle cx="360" cy="55" r="3" fill="#BDBDBD"/>
  </g>
</svg>