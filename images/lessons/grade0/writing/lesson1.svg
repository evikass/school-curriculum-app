<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes write { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .write { stroke-dasharray: 200; animation: write 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FCE4EC"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#AD1457" text-anchor="middle">📝 Знакомство с прописью</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#E91E63"/>
  
  <!-- Notebook page -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="300" height="180" fill="#FFF9C4" stroke="#FBC02D" stroke-width="3" rx="5"/>
    <!-- Lines -->
    <line x1="10" y1="30" x2="290" y2="30" stroke="#90CAF9" stroke-width="1" stroke-dasharray="5,3"/>
    <line x1="10" y1="60" x2="290" y2="60" stroke="#90CAF9" stroke-width="1" stroke-dasharray="5,3"/>
    <line x1="10" y1="90" x2="290" y2="90" stroke="#90CAF9" stroke-width="1" stroke-dasharray="5,3"/>
    <line x1="10" y1="120" x2="290" y2="120" stroke="#90CAF9" stroke-width="1" stroke-dasharray="5,3"/>
    <line x1="10" y1="150" x2="290" y2="150" stroke="#90CAF9" stroke-width="1" stroke-dasharray="5,3"/>
    
    <!-- Tracing patterns -->
    <path class="write" d="M30,30 Q50,10 70,30 Q90,50 110,30 Q130,10 150,30" fill="none" stroke="#E91E63" stroke-width="3"/>
    <path class="write" style="animation-delay: 0.5s;" d="M170,60 L200,30 L230,60 L260,30 L290,60" fill="none" stroke="#4CAF50" stroke-width="3"/>
  </g>
  
  <!-- Pencil -->
  <g class="bounce" transform="translate(380, 200)">
    <rect x="0" y="0" width="20" height="80" fill="#FFCC80" rx="3"/>
    <polygon points="10,80 0,100 20,100" fill="#FFD54F"/>
    <rect x="0" y="-10" width="20" height="12" fill="#F48FB1" rx="2"/>
    <polygon points="10,100 5,110 15,110" fill="#333"/>
  </g>
  
  <!-- Instructions -->
  <g transform="translate(50, 280)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#AD1457" text-anchor="middle">Держи карандаш правильно!</text>
    
    <!-- Hand position hint -->
    <ellipse cx="100" cy="40" rx="30" ry="20" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
    <rect x="130" y="20" width="8" height="40" rx="4" fill="#FFCC80" stroke="#F57C00" stroke-width="2" transform="rotate(-30, 130, 40)"/>
  </g>
</svg>