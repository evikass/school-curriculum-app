<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes dance { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
      @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
      .dance { animation: dance 1s ease-in-out infinite; transform-origin: bottom center; }
      .jump { animation: jump 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FCE4EC"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#AD1457" text-anchor="middle">💃 Ритмика</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#E91E63"/>
  
  <!-- Dancing children -->
  <g transform="translate(80, 90)">
    <g class="dance" style="animation-delay: 0s;">
      <circle cx="50" cy="30" r="25" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="42" cy="26" r="4" fill="#5D4037"/>
      <circle cx="58" cy="26" r="4" fill="#5D4037"/>
      <path d="M42,38 Q50,45 58,38" fill="none" stroke="#5D4037" stroke-width="2"/>
      <rect x="40" y="55" width="20" height="40" fill="#2196F3" rx="5"/>
      <rect x="30" y="95" width="10" height="25" fill="#1565C0" rx="3"/>
      <rect x="60" y="95" width="10" height="25" fill="#1565C0" rx="3"/>
    </g>
    
    <g class="dance" style="animation-delay: 0.3s;">
      <circle cx="130" cy="30" r="25" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="122" cy="26" r="4" fill="#5D4037"/>
      <circle cx="138" cy="26" r="4" fill="#5D4037"/>
      <path d="M122,38 Q130,45 138,38" fill="none" stroke="#5D4037" stroke-width="2"/>
      <rect x="120" y="55" width="20" height="40" fill="#E91E63" rx="5"/>
      <rect x="110" y="95" width="10" height="25" fill="#AD1457" rx="3"/>
      <rect x="140" y="95" width="10" height="25" fill="#AD1457" rx="3"/>
    </g>
    
    <g class="dance" style="animation-delay: 0.6s;">
      <circle cx="210" cy="30" r="25" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="202" cy="26" r="4" fill="#5D4037"/>
      <circle cx="218" cy="26" r="4" fill="#5D4037"/>
      <path d="M202,38 Q210,45 218,38" fill="none" stroke="#5D4037" stroke-width="2"/>
      <rect x="200" y="55" width="20" height="40" fill="#4CAF50" rx="5"/>
      <rect x="190" y="95" width="10" height="25" fill="#2E7D32" rx="3"/>
      <rect x="220" y="95" width="10" height="25" fill="#2E7D32" rx="3"/>
    </g>
    
    <g class="dance" style="animation-delay: 0.9s;">
      <circle cx="290" cy="30" r="25" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="282" cy="26" r="4" fill="#5D4037"/>
      <circle cx="298" cy="26" r="4" fill="#5D4037"/>
      <path d="M282,38 Q290,45 298,38" fill="none" stroke="#5D4037" stroke-width="2"/>
      <rect x="280" y="55" width="20" height="40" fill="#FF9800" rx="5"/>
      <rect x="270" y="95" width="10" height="25" fill="#E65100" rx="3"/>
      <rect x="300" y="95" width="10" height="25" fill="#E65100" rx="3"/>
    </g>
  </g>
  
  <!-- Music notes -->
  <g class="jump">
    <text x="50" y="80" font-size="25">🎵</text>
    <text x="450" y="100" font-size="25">🎶</text>
  </g>
  
  <!-- Activities -->
  <g transform="translate(50, 240)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#AD1457" text-anchor="middle">Движения под музыку:</text>
    
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="100" height="50" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/>
      <text x="50" y="30" font-family="Arial" font-size="11" fill="#1565C0" text-anchor="middle">Ходьба</text>
    </g>
    
    <g transform="translate(140, 20)">
      <rect x="0" y="0" width="100" height="50" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="8"/>
      <text x="50" y="30" font-family="Arial" font-size="11" fill="#2E7D32" text-anchor="middle">Танцы</text>
    </g>
    
    <g transform="translate(260, 20)">
      <rect x="0" y="0" width="100" height="50" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="8"/>
      <text x="50" y="30" font-family="Arial" font-size="11" fill="#D84315" text-anchor="middle">Прыжки</text>
    </g>
  </g>
</svg>