<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.8); } }
      .wave { animation: wave 1s ease-in-out infinite; transform-origin: bottom; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8EAF6"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#303F9F" text-anchor="middle">🎼 Слушание музыки</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#5C6BC0"/>
  
  <!-- Sound waves -->
  <g transform="translate(80, 100)">
    <rect class="wave" style="animation-delay: 0s;" x="0" y="20" width="10" height="40" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.1s;" x="15" y="10" width="10" height="60" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.2s;" x="30" y="0" width="10" height="80" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.3s;" x="45" y="15" width="10" height="50" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.4s;" x="60" y="25" width="10" height="30" fill="#5C6BC0" rx="2"/>
  </g>
  
  <!-- Headphones -->
  <g transform="translate(200, 90)">
    <circle cx="60" cy="50" r="45" fill="#7986CB"/>
    <circle cx="60" cy="50" r="35" fill="#E8EAF6"/>
    <text x="60" y="60" font-size="40" text-anchor="middle">🎧</text>
  </g>
  
  <!-- Sound waves right -->
  <g transform="translate(350, 100)">
    <rect class="wave" style="animation-delay: 0.4s;" x="0" y="25" width="10" height="30" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.3s;" x="15" y="15" width="10" height="50" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.2s;" x="30" y="0" width="10" height="80" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0.1s;" x="45" y="10" width="10" height="60" fill="#5C6BC0" rx="2"/>
    <rect class="wave" style="animation-delay: 0s;" x="60" y="20" width="10" height="40" fill="#5C6BC0" rx="2"/>
  </g>
  
  <!-- Music types -->
  <g transform="translate(50, 220)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#303F9F" text-anchor="middle">Какую музыку слушаем?</text>
    
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="100" height="60" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="8"/>
      <text x="50" y="25" font-family="Arial" font-size="20" text-anchor="middle">🎻</text>
      <text x="50" y="48" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle">Классика</text>
    </g>
    
    <g transform="translate(140, 20)">
      <rect x="0" y="0" width="100" height="60" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="8"/>
      <text x="50" y="25" font-family="Arial" font-size="20" text-anchor="middle">🎤</text>
      <text x="50" y="48" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">Песни</text>
    </g>
    
    <g transform="translate(260, 20)">
      <rect x="0" y="0" width="100" height="60" fill="#BBDEFB" stroke="#2196F3" stroke-width="2" rx="8"/>
      <text x="50" y="25" font-family="Arial" font-size="20" text-anchor="middle">🐦</text>
      <text x="50" y="48" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">Звуки природы</text>
    </g>
  </g>
</svg>