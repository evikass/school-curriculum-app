<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes play { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      .play { animation: play 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF3E0"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">⚽ Подвижные игры</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#FF9800"/>
  
  <!-- Game field -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="400" height="150" fill="#C8E6C9" stroke="#4CAF50" stroke-width="3" rx="10"/>
    
    <!-- Ball -->
    <g class="play">
      <circle cx="200" cy="75" r="30" fill="#F44336" stroke="#B71C1C" stroke-width="3"/>
      <path d="M175,55 Q200,45 225,55" fill="none" stroke="white" stroke-width="2"/>
      <path d="M175,95 Q200,105 225,95" fill="none" stroke="white" stroke-width="2"/>
    </g>
    
    <!-- Children playing -->
    <g class="play" style="animation-delay: 0.2s;">
      <circle cx="80" cy="50" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <rect x="70" y="68" width="20" height="30" fill="#2196F3" rx="5"/>
    </g>
    
    <g class="play" style="animation-delay: 0.4s;">
      <circle cx="320" cy="50" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <rect x="310" y="68" width="20" height="30" fill="#E91E63" rx="5"/>
    </g>
    
    <g class="play" style="animation-delay: 0.6s;">
      <circle cx="120" cy="110" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <rect x="110" y="128" width="20" height="30" fill="#4CAF50" rx="5"/>
    </g>
    
    <g class="play" style="animation-delay: 0.8s;">
      <circle cx="280" cy="110" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <rect x="270" y="128" width="20" height="30" fill="#FF9800" rx="5"/>
    </g>
  </g>
  
  <!-- Popular games -->
  <g transform="translate(30, 250)">
    <text x="220" y="0" font-family="Arial" font-size="14" fill="#E65100" text-anchor="middle">Любимые игры:</text>
    
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="90" height="55" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="8"/>
      <text x="45" y="22" font-family="Arial" font-size="18" text-anchor="middle">🏃‍♂️</text>
      <text x="45" y="45" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">Догонялки</text>
    </g>
    
    <g transform="translate(100, 15)">
      <rect x="0" y="0" width="90" height="55" fill="#F8BBD9" stroke="#E91E63" stroke-width="2" rx="8"/>
      <text x="45" y="22" font-family="Arial" font-size="18" text-anchor="middle">🙈</text>
      <text x="45" y="45" font-family="Arial" font-size="9" fill="#AD1457" text-anchor="middle">Прятки</text>
    </g>
    
    <g transform="translate(200, 15)">
      <rect x="0" y="0" width="90" height="55" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="8"/>
      <text x="45" y="22" font-family="Arial" font-size="18" text-anchor="middle">🧟</text>
      <text x="45" y="45" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Море волнуется</text>
    </g>
    
    <g transform="translate(300, 15)">
      <rect x="0" y="0" width="90" height="55" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="8"/>
      <text x="45" y="22" font-family="Arial" font-size="18" text-anchor="middle">🎯</text>
      <text x="45" y="45" font-family="Arial" font-size="9" fill="#D84315" text-anchor="middle">Попади в цель</text>
    </g>
  </g>
</svg>