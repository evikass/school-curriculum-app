<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes stretch { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.1); } }
      .stretch { animation: stretch 2s ease-in-out infinite; transform-origin: bottom; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E3F2FD"/>
  <text x="250" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#1565C0" text-anchor="middle">🤸 Гимнастика</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#42A5F5"/>
  
  <!-- Exercise mat -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="400" height="150" fill="#BBDEFB" stroke="#2196F3" stroke-width="3" rx="10"/>
    
    <!-- Exercise 1: Arms up -->
    <g class="stretch" style="animation-delay: 0s;" transform="translate(40, 20)">
      <circle cx="30" cy="30" r="20" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="24" cy="27" r="3" fill="#5D4037"/>
      <circle cx="36" cy="27" r="3" fill="#5D4037"/>
      <path d="M24,38 Q30,44 36,38" fill="none" stroke="#5D4037" stroke-width="2"/>
      <rect x="20" y="50" width="20" height="35" fill="#4CAF50" rx="5"/>
      <!-- Arms up -->
      <rect x="5" y="20" width="8" height="35" fill="#FFCC80" rx="3" transform="rotate(-45, 9, 37)"/>
      <rect x="47" y="20" width="8" height="35" fill="#FFCC80" rx="3" transform="rotate(45, 51, 37)"/>
      <rect x="18" y="85" width="10" height="25" fill="#2E7D32" rx="3"/>
      <rect x="32" y="85" width="10" height="25" fill="#2E7D32" rx="3"/>
    </g>
    
    <!-- Exercise 2: Toe touch -->
    <g class="stretch" style="animation-delay: 0.3s;" transform="translate(140, 40)">
      <circle cx="30" cy="20" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="25" cy="17" r="3" fill="#5D4037"/>
      <circle cx="35" cy="17" r="3" fill="#5D4037"/>
      <ellipse cx="30" cy="60" rx="20" ry="30" fill="#E91E63"/>
      <rect x="10" y="90" width="10" height="20" fill="#AD1457" rx="3" transform="rotate(45, 15, 100)"/>
      <rect x="40" y="90" width="10" height="20" fill="#AD1457" rx="3" transform="rotate(-45, 45, 100)"/>
    </g>
    
    <!-- Exercise 3: Side stretch -->
    <g class="stretch" style="animation-delay: 0.6s;" transform="translate(240, 30)">
      <circle cx="30" cy="25" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="25" cy="22" r="3" fill="#5D4037"/>
      <circle cx="35" cy="22" r="3" fill="#5D4037"/>
      <rect x="20" y="43" width="20" height="40" fill="#FF9800" rx="5" transform="rotate(15, 30, 63)"/>
      <rect x="18" y="83" width="10" height="25" fill="#E65100" rx="3" transform="rotate(15, 23, 95)"/>
      <rect x="32" y="83" width="10" height="25" fill="#E65100" rx="3" transform="rotate(15, 37, 95)"/>
    </g>
    
    <!-- Exercise 4: Jumping jacks -->
    <g class="stretch" style="animation-delay: 0.9s;" transform="translate(330, 20)">
      <circle cx="30" cy="30" r="18" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="24" cy="27" r="3" fill="#5D4037"/>
      <circle cx="36" cy="27" r="3" fill="#5D4037"/>
      <path d="M24,38 Q30,44 36,38" fill="none" stroke="#5D4037" stroke-width="2"/>
      <rect x="20" y="48" width="20" height="30" fill="#9C27B0" rx="5"/>
      <!-- Arms out -->
      <rect x="-5" y="48" width="8" height="30" fill="#FFCC80" rx="3" transform="rotate(-60, -1, 63)"/>
      <rect x="57" y="48" width="8" height="30" fill="#FFCC80" rx="3" transform="rotate(60, 61, 63)"/>
      <!-- Legs out -->
      <rect x="8" y="78" width="10" height="25" fill="#6A1B9A" rx="3" transform="rotate(-30, 13, 90)"/>
      <rect x="42" y="78" width="10" height="25" fill="#6A1B9A" rx="3" transform="rotate(30, 47, 90)"/>
    </g>
  </g>
  
  <!-- Exercises list -->
  <g transform="translate(50, 250)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">Упражнения зарядки:</text>
    
    <g transform="translate(10, 15)">
      <rect x="0" y="0" width="75" height="45" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2" rx="5"/>
      <text x="37" y="28" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">Руки вверх</text>
    </g>
    
    <g transform="translate(95, 15)">
      <rect x="0" y="0" width="75" height="45" fill="#FFCCBC" stroke="#FF5722" stroke-width="2" rx="5"/>
      <text x="37" y="28" font-family="Arial" font-size="10" fill="#D84315" text-anchor="middle">Наклоны</text>
    </g>
    
    <g transform="translate(180, 15)">
      <rect x="0" y="0" width="75" height="45" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="5"/>
      <text x="37" y="28" font-family="Arial" font-size="10" fill="#6A1B9A" text-anchor="middle">Повороты</text>
    </g>
    
    <g transform="translate(265, 15)">
      <rect x="0" y="0" width="75" height="45" fill="#B2EBF2" stroke="#00BCD4" stroke-width="2" rx="5"/>
      <text x="37" y="28" font-family="Arial" font-size="10" fill="#00838F" text-anchor="middle">Приседания</text>
    </g>
    
    <g transform="translate(350, 15)">
      <rect x="0" y="0" width="75" height="45" fill="#FFECB3" stroke="#FFC107" stroke-width="2" rx="5"/>
      <text x="37" y="28" font-family="Arial" font-size="10" fill="#F57F17" text-anchor="middle">Прыжки</text>
    </g>
  </g>
</svg>