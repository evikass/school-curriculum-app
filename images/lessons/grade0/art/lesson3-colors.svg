<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#fef3c7"/>
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#b45309">Цвета и рисование 🎨</text>
  <circle cx="80" cy="100" r="35" fill="#ef4444"/>
  <circle cx="160" cy="100" r="35" fill="#f97316"/>
  <circle cx="240" cy="100" r="35" fill="#eab308"/>
  <circle cx="320" cy="100" r="35" fill="#22c55e"/>
  <circle cx="400" cy="100" r="35" fill="#3b82f6"/>
  <text x="80" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">К</text>
  <text x="160" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">О</text>
  <text x="240" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">Ж</text>
  <text x="320" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">З</text>
  <text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="12" fill="white">Г</text>
  <circle cx="80" cy="180" r="35" fill="#8b5cf6"/>
  <text x="80" y="180" text-anchor="middle" font-family="Arial" font-size="12" fill="white">Ф</text>
  <text x="160" y="180" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Каждый</text>
  <text x="240" y="180" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Охотник</text>
  <text x="320" y="180" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Желает</text>
  <text x="400" y="180" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Знать</text>
  <text x="80" y="240" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Где</text>
  <text x="160" y="240" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Сидит</text>
  <text x="240" y="240" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Фазан</text>
  <rect x="20" y="270" width="460" height="60" fill="#dcfce7" rx="10"/>
  <text x="250" y="300" text-anchor="middle" font-family="Arial" font-size="14" fill="#15803d">🌈 Радуга: Красный, Оранжевый, Жёлтый, Зелёный, Голубой, Синий, Фиолетовый</text>
  <text x="250" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#6b7280">7 цветов радуги 🎨</text>
</svg>
