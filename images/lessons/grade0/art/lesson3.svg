<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FFF8E1"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">🌈 Работа с цветом</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#FF9800"/>
  
  <!-- Warm colors -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="200" height="120" fill="#FFEBEE" stroke="#F44336" stroke-width="2" rx="10"/>
    <text x="100" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#C62828" text-anchor="middle">Тёплые цвета</text>
    
    <g class="bounce" style="animation-delay: 0s;">
      <circle cx="40" cy="70" r="25" fill="#F44336"/>
      <text x="40" y="110" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">красный</text>
    </g>
    <g class="bounce" style="animation-delay: 0.1s;">
      <circle cx="100" cy="70" r="25" fill="#FF9800"/>
      <text x="100" y="110" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">оранжевый</text>
    </g>
    <g class="bounce" style="animation-delay: 0.2s;">
      <circle cx="160" cy="70" r="25" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/>
      <text x="160" y="110" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">жёлтый</text>
    </g>
    
    <!-- Sun icon -->
    <text x="100" y="145" font-family="Arial" font-size="30" text-anchor="middle">☀️</text>
    <text x="100" y="165" font-family="Arial" font-size="10" fill="#C62828" text-anchor="middle">как солнышко!</text>
  </g>
  
  <!-- Cold colors -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="200" height="120" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="10"/>
    <text x="100" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">Холодные цвета</text>
    
    <g class="bounce" style="animation-delay: 0.3s;">
      <circle cx="40" cy="70" r="25" fill="#2196F3"/>
      <text x="40" y="110" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">синий</text>
    </g>
    <g class="bounce" style="animation-delay: 0.4s;">
      <circle cx="100" cy="70" r="25" fill="#4CAF50"/>
      <text x="100" y="110" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">зелёный</text>
    </g>
    <g class="bounce" style="animation-delay: 0.5s;">
      <circle cx="160" cy="70" r="25" fill="#9C27B0"/>
      <text x="160" y="110" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">фиолетовый</text>
    </g>
    
    <!-- Snowflake icon -->
    <text x="100" y="145" font-family="Arial" font-size="30" text-anchor="middle">❄️</text>
    <text x="100" y="165" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">как снежок!</text>
  </g>
  
  <!-- Rainbow -->
  <g transform="translate(100, 260)">
    <text x="150" y="0" font-family="Arial" font-size="14" fill="#E65100" text-anchor="middle">Радуга имеет все цвета!</text>
    
    <path d="M50,40 Q150,-20 250,40" fill="none" stroke="#F44336" stroke-width="6"/>
    <path d="M55,40 Q150,-15 245,40" fill="none" stroke="#FF9800" stroke-width="6"/>
    <path d="M60,40 Q150,-10 240,40" fill="none" stroke="#FFEB3B" stroke-width="6"/>
    <path d="M65,40 Q150,-5 235,40" fill="none" stroke="#4CAF50" stroke-width="6"/>
    <path d="M70,40 Q150,0 230,40" fill="none" stroke="#2196F3" stroke-width="6"/>
    <path d="M75,40 Q150,5 225,40" fill="none" stroke="#3F51B5" stroke-width="6"/>
    <path d="M80,40 Q150,10 220,40" fill="none" stroke="#9C27B0" stroke-width="6"/>
  </g>
</svg>