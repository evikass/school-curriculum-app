<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8EAF6"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#303F9F" text-anchor="middle">📐 Геометрические фигуры</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#5C6BC0"/>
  
  <!-- Three main shapes -->
  <g transform="translate(30, 80)">
    <!-- Circle -->
    <g class="bounce" style="animation-delay: 0s;">
      <circle cx="70" cy="70" r="60" fill="#FFEB3B" stroke="#F57F17" stroke-width="4"/>
      <text x="70" y="80" font-family="Arial" font-size="18" font-weight="bold" fill="#F57F17" text-anchor="middle">КРУГ</text>
      <text x="70" y="160" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Круглый как солнышко!</text>
    </g>
    
    <!-- Square -->
    <g class="bounce" style="animation-delay: 0.3s;">
      <rect x="160" y="10" width="120" height="120" fill="#4CAF50" stroke="#2E7D32" stroke-width="4"/>
      <text x="220" y="80" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">КВАДРАТ</text>
      <text x="220" y="160" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Ровный со всех сторон!</text>
    </g>
    
    <!-- Triangle -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <polygon points="380,130 310,10 450,10" fill="#2196F3" stroke="#1565C0" stroke-width="4"/>
      <text x="380" y="80" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">ТРЕУ-</text>
      <text x="380" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">ГОЛЬНИК</text>
      <text x="380" y="160" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Три уголка!</text>
    </g>
  </g>
  
  <!-- Create picture from shapes -->
  <g transform="translate(50, 260)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#303F9F" text-anchor="middle">Составь картинку из фигур:</text>
    
    <!-- House from shapes -->
    <rect x="120" y="30" width="50" height="40" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
    <polygon points="120,30 145,10 170,30" fill="#D84315" stroke="#BF360C" stroke-width="2"/>
    <circle cx="180" cy="20" r="15" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/>
    <text x="200" y="85" font-family="Arial" font-size="11" fill="#666" text-anchor="middle">Домик из квадрата и треугольника</text>
  </g>
</svg>