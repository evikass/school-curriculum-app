<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes dip { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .dip { animation: dip 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#FCE4EC"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#AD1457" text-anchor="middle">🎨 Знакомство с красками</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#E91E63"/>
  
  <!-- Paint palette -->
  <g transform="translate(50, 80)">
    <ellipse cx="100" cy="70" rx="90" ry="60" fill="#8D6E63" stroke="#5D4037" stroke-width="3"/>
    <!-- Thumb hole -->
    <ellipse cx="150" cy="90" rx="15" ry="10" fill="#FCE4EC"/>
    
    <!-- Paint colors -->
    <circle class="bounce" style="animation-delay: 0s;" cx="50" cy="50" r="18" fill="#F44336"/>
    <circle class="bounce" style="animation-delay: 0.1s;" cx="85" cy="35" r="18" fill="#FF9800"/>
    <circle class="bounce" style="animation-delay: 0.2s;" cx="125" cy="30" r="18" fill="#FFEB3B"/>
    <circle class="bounce" style="animation-delay: 0.3s;" cx="55" cy="90" r="18" fill="#4CAF50"/>
    <circle class="bounce" style="animation-delay: 0.4s;" cx="90" cy="100" r="18" fill="#2196F3"/>
    <circle class="bounce" style="animation-delay: 0.5s;" cx="130" cy="90" r="18" fill="#9C27B0"/>
  </g>
  
  <!-- Paintbrush -->
  <g class="dip" transform="translate(250, 80)">
    <rect x="0" y="0" width="12" height="100" fill="#8D6E63" rx="2"/>
    <rect x="-2" y="0" width="16" height="20" fill="#BDBDBD"/>
    <ellipse cx="6" cy="115" rx="8" ry="12" fill="#F44336"/>
  </g>
  
  <!-- Color mixing -->
  <g transform="translate(300, 80)">
    <text x="80" y="0" font-family="Arial" font-size="12" fill="#AD1457" text-anchor="middle">Смешивание:</text>
    
    <circle cx="40" cy="40" r="20" fill="#FFEB3B"/>
    <text x="40" y="70" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">жёлтый</text>
    
    <text x="80" y="45" font-family="Arial" font-size="16" fill="#333" text-anchor="middle">+</text>
    
    <circle cx="120" cy="40" r="20" fill="#2196F3"/>
    <text x="120" y="70" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">синий</text>
    
    <text x="80" y="95" font-family="Arial" font-size="16" fill="#333" text-anchor="middle">=</text>
    
    <circle cx="80" cy="120" r="20" fill="#4CAF50"/>
    <text x="80" y="150" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">зелёный!</text>
  </g>
  
  <!-- How to hold brush -->
  <g transform="translate(50, 250)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#AD1457" text-anchor="middle">Держи кисть как карандаш, не сильно сжимая!</text>
    
    <!-- Hand position -->
    <ellipse cx="180" cy="50" rx="40" ry="25" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
    <rect x="220" y="20" width="10" height="60" rx="3" fill="#8D6E63" transform="rotate(-30, 220, 50)"/>
  </g>
</svg>