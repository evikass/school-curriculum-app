<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#F3E5F5"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#6A1B9A" text-anchor="middle">✨ Свободное рисование</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#AB47BC"/>
  
  <!-- Canvas -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="300" height="180" fill="#FFFFFF" stroke="#9E9E9E" stroke-width="3" rx="5"/>
    
    <!-- Sample drawing elements -->
    <circle cx="250" cy="40" r="30" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/>
    <!-- Sun rays -->
    <line x1="250" y1="5" x2="250" y2="-5" stroke="#F57F17" stroke-width="3"/>
    <line x1="280" y1="15" x2="290" y2="8" stroke="#F57F17" stroke-width="3"/>
    <line x1="285" y1="40" x2="295" y2="40" stroke="#F57F17" stroke-width="3"/>
    <line x1="280" y1="65" x2="290" y2="72" stroke="#F57F17" stroke-width="3"/>
    
    <!-- House -->
    <rect x="30" y="90" width="80" height="70" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
    <polygon points="30,90 70,50 110,90" fill="#D84315" stroke="#BF360C" stroke-width="2"/>
    <rect x="50" y="110" width="20" height="20" fill="#81D4FA"/>
    <rect x="80" y="120" width="20" height="40" fill="#5D4037"/>
    
    <!-- Tree -->
    <rect x="160" y="110" width="15" height="50" fill="#795548"/>
    <circle cx="167" cy="90" r="30" fill="#4CAF50"/>
    
    <!-- Flowers -->
    <g class="bounce">
      <circle cx="130" cy="160" r="8" fill="#E91E63"/>
      <circle cx="145" cy="155" r="8" fill="#FF9800"/>
      <circle cx="220" cy="165" r="8" fill="#9C27B0"/>
    </g>
    
    <!-- Clouds -->
    <g>
      <ellipse cx="100" cy="30" rx="25" ry="15" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
      <ellipse cx="85" cy="35" rx="18" ry="12" fill="#E3F2FD"/>
      <ellipse cx="115" cy="35" rx="18" ry="12" fill="#E3F2FD"/>
    </g>
  </g>
  
  <!-- Ideas -->
  <g transform="translate(50, 280)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">Нарисуй свой мир! Дом, семью, природу...</text>
    
    <!-- Idea bubbles -->
    <g class="bounce" style="animation-delay: 0s;">
      <text x="80" y="35" font-family="Arial" font-size="25" text-anchor="middle">🏠</text>
    </g>
    <g class="bounce" style="animation-delay: 0.2s;">
      <text x="150" y="35" font-family="Arial" font-size="25" text-anchor="middle">👨‍👩‍👧</text>
    </g>
    <g class="bounce" style="animation-delay: 0.4s;">
      <text x="220" y="35" font-family="Arial" font-size="25" text-anchor="middle">🌳</text>
    </g>
    <g class="bounce" style="animation-delay: 0.6s;">
      <text x="290" y="35" font-family="Arial" font-size="25" text-anchor="middle">🐱</text>
    </g>
    <g class="bounce" style="animation-delay: 0.8s;">
      <text x="350" y="35" font-family="Arial" font-size="25" text-anchor="middle">🚗</text>
    </g>
  </g>
</svg>