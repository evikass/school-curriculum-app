<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes sparkle { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .sparkle { animation: sparkle 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2E7D32" text-anchor="middle">📖 Слушание сказок</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#66BB6A"/>
  
  <!-- Book -->
  <g transform="translate(150, 80)">
    <rect x="0" y="0" width="200" height="140" fill="#8D6E63" stroke="#5D4037" stroke-width="3" rx="5"/>
    <rect x="10" y="10" width="85" height="120" fill="#FFF8E1"/>
    <rect x="105" y="10" width="85" height="120" fill="#FFF8E1"/>
    <!-- Text lines on pages -->
    <line x1="20" y1="30" x2="80" y2="30" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="20" y1="50" x2="75" y2="50" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="20" y1="70" x2="80" y2="70" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="20" y1="90" x2="70" y2="90" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="115" y1="30" x2="175" y2="30" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="115" y1="50" x2="180" y2="50" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="115" y1="70" x2="170" y2="70" stroke="#BDBDBD" stroke-width="2"/>
    <!-- Book spine -->
    <rect x="95" y="5" width="10" height="130" fill="#6D4C41"/>
  </g>
  
  <!-- Fairy tale characters -->
  <g transform="translate(30, 240)">
    <text x="220" y="0" font-family="Arial" font-size="14" fill="#2E7D32" text-anchor="middle">Герои сказок:</text>
    
    <!-- Kolobok -->
    <g class="bounce" style="animation-delay: 0s;">
      <circle cx="40" cy="50" r="25" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
      <circle cx="32" cy="45" r="4" fill="#5D4037"/>
      <circle cx="48" cy="45" r="4" fill="#5D4037"/>
      <path d="M32,55 Q40,62 48,55" fill="none" stroke="#5D4037" stroke-width="2"/>
      <text x="40" y="90" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Колобок</text>
    </g>
    
    <!-- Turnip -->
    <g class="bounce" style="animation-delay: 0.2s;">
      <ellipse cx="120" cy="55" rx="20" ry="30" fill="#FFEB3B" stroke="#F57F17" stroke-width="2"/>
      <ellipse cx="120" cy="30" rx="10" ry="8" fill="#4CAF50"/>
      <text x="120" y="100" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Репка</text>
    </g>
    
    <!-- Teremok -->
    <g class="bounce" style="animation-delay: 0.4s;">
      <rect x="170" y="35" width="40" height="40" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <polygon points="170,35 190,15 210,35" fill="#D84315"/>
      <rect x="182" y="50" width="15" height="25" fill="#5D4037"/>
      <text x="190" y="100" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Теремок</text>
    </g>
    
    <!-- Bear -->
    <g class="bounce" style="animation-delay: 0.6s;">
      <circle cx="280" cy="50" r="25" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <circle cx="268" cy="35" r="8" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <circle cx="292" cy="35" r="8" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
      <ellipse cx="280" cy="55" rx="8" ry="5" fill="#5D4037"/>
      <text x="280" y="100" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Мишка</text>
    </g>
    
    <!-- Bunny -->
    <g class="bounce" style="animation-delay: 0.8s;">
      <ellipse cx="360" cy="50" rx="20" ry="25" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2"/>
      <ellipse cx="350" cy="20" rx="6" ry="15" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2"/>
      <ellipse cx="370" cy="20" rx="6" ry="15" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2"/>
      <circle cx="353" cy="45" r="3" fill="#E91E63"/>
      <circle cx="367" cy="45" r="3" fill="#E91E63"/>
      <text x="360" y="100" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">Зайка</text>
    </g>
  </g>
  
  <!-- Sparkles -->
  <g class="sparkle">
    <polygon points="50,50 53,58 61,58 55,63 57,71 50,66 43,71 45,63 39,58 47,58" fill="#FFD700"/>
  </g>
  <g class="sparkle" style="animation-delay: 0.5s;">
    <polygon points="450,80 453,88 461,88 455,93 457,101 450,96 443,101 445,93 439,88 447,88" fill="#FFD700"/>
  </g>
</svg>