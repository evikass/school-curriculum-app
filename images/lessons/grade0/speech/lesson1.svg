<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.5); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .wave { animation: wave 0.5s ease-in-out infinite; transform-origin: bottom; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E0F2F1"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00695C" text-anchor="middle">🎵 Звуки речи</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#26A69A"/>
  
  <!-- Sound waves -->
  <g transform="translate(50, 100)">
    <circle r="20" fill="none" stroke="#80CBC4" stroke-width="3" opacity="0.3">
      <animate attributeName="r" from="20" to="80" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="none" stroke="#80CBC4" stroke-width="3" opacity="0.3">
      <animate attributeName="r" from="20" to="80" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="0.6" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="25" fill="#26A69A"/>
    <text x="0" y="8" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">A</text>
  </g>
  
  <!-- Vowels -->
  <g transform="translate(50, 200)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#00695C" text-anchor="middle">Гласные звуки:</text>
    <g transform="translate(30, 20)">
      <circle class="bounce" style="animation-delay: 0s;" cx="30" cy="25" r="25" fill="#E91E63"/>
      <text x="30" y="33" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">А</text>
      
      <circle class="bounce" style="animation-delay: 0.1s;" cx="90" cy="25" r="25" fill="#FF5722"/>
      <text x="90" y="33" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">О</text>
      
      <circle class="bounce" style="animation-delay: 0.2s;" cx="150" cy="25" r="25" fill="#FFEB3B"/>
      <text x="150" y="33" font-family="Arial" font-size="24" font-weight="bold" fill="#F57F17" text-anchor="middle">У</text>
      
      <circle class="bounce" style="animation-delay: 0.3s;" cx="210" cy="25" r="25" fill="#4CAF50"/>
      <text x="210" y="33" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">И</text>
      
      <circle class="bounce" style="animation-delay: 0.4s;" cx="270" cy="25" r="25" fill="#2196F3"/>
      <text x="270" y="33" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Ы</text>
      
      <circle class="bounce" style="animation-delay: 0.5s;" cx="330" cy="25" r="25" fill="#9C27B0"/>
      <text x="330" y="33" font-family="Arial" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Э</text>
    </g>
  </g>
  
  <!-- Consonants hint -->
  <g transform="translate(50, 290)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#00695C" text-anchor="middle">Согласные звуки: Б, В, Г, Д, Ж, З, К, Л, М, Н...</text>
  </g>
  
  <!-- Face with open mouth -->
  <g transform="translate(380, 100)">
    <circle cx="50" cy="50" r="45" fill="#FFCC80" stroke="#F57C00" stroke-width="3"/>
    <circle cx="35" cy="40" r="5" fill="#5D4037"/>
    <circle cx="65" cy="40" r="5" fill="#5D4037"/>
    <ellipse cx="50" cy="65" rx="15" ry="10" fill="#C62828"/>
  </g>
</svg>