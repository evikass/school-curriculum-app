<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#F3E5F5"/>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#6A1B9A" text-anchor="middle">📝 Предложение</text>
  <rect x="100" y="50" width="300" height="3" rx="2" fill="#AB47BC"/>
  
  <!-- Sentence structure -->
  <g transform="translate(50, 80)">
    <text x="200" y="0" font-family="Arial" font-size="16" fill="#6A1B9A" text-anchor="middle">Предложение начинается с большой буквы</text>
    <text x="200" y="25" font-family="Arial" font-size="16" fill="#6A1B9A" text-anchor="middle">и заканчивается точкой!</text>
    
    <!-- Example sentence -->
    <g transform="translate(0, 50)">
      <rect x="30" y="0" width="340" height="60" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="10"/>
      
      <!-- Words with emphasis -->
      <g class="bounce">
        <text x="60" y="40" font-family="Arial" font-size="22" font-weight="bold" fill="#E91E63" text-anchor="middle">М</text>
        <text x="78" y="40" font-family="Arial" font-size="22" fill="#333" text-anchor="middle">ама</text>
        <text x="130" y="40" font-family="Arial" font-size="22" fill="#333" text-anchor="middle">любит</text>
        <text x="200" y="40" font-family="Arial" font-size="22" fill="#333" text-anchor="middle">катю</text>
        <text x="265" y="40" font-family="Arial" font-size="22" fill="#333" text-anchor="middle">.</text>
      </g>
      
      <!-- Arrow pointing to capital -->
      <polygon points="55,65 60,55 65,65" fill="#E91E63"/>
      <text x="60" y="80" font-family="Arial" font-size="10" fill="#E91E63" text-anchor="middle">Большая</text>
      <text x="60" y="92" font-family="Arial" font-size="10" fill="#E91E63" text-anchor="middle">буква</text>
      
      <!-- Arrow pointing to period -->
      <polygon points="260,65 265,55 270,65" fill="#4CAF50"/>
      <text x="265" y="80" font-family="Arial" font-size="10" fill="#4CAF50" text-anchor="middle">Точка</text>
    </g>
  </g>
  
  <!-- Word count -->
  <g transform="translate(50, 250)">
    <text x="200" y="0" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">Посчитай слова в предложении:</text>
    
    <g transform="translate(30, 20)">
      <!-- Word boxes -->
      <rect x="0" y="0" width="80" height="40" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="5"/>
      <text x="40" y="28" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">Мама</text>
      <circle cx="40" cy="50" r="12" fill="#9C27B0"/>
      <text x="40" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">1</text>
      
      <rect x="100" y="0" width="80" height="40" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="5"/>
      <text x="140" y="28" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">любит</text>
      <circle cx="140" cy="50" r="12" fill="#9C27B0"/>
      <text x="140" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">2</text>
      
      <rect x="200" y="0" width="80" height="40" fill="#E1BEE7" stroke="#9C27B0" stroke-width="2" rx="5"/>
      <text x="240" y="28" font-family="Arial" font-size="14" fill="#6A1B9A" text-anchor="middle">Катю</text>
      <circle cx="240" cy="50" r="12" fill="#9C27B0"/>
      <text x="240" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="white" text-anchor="middle">3</text>
    </g>
    
    <text x="200" y="90" font-family="Arial" font-size="16" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Всего 3 слова!</text>
  </g>
</svg>