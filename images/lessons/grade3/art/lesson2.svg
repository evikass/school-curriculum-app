<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="artBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#artBg2)"/>
  
  <!-- Sun -->
  <circle cx="70" cy="55" r="26" fill="#FFD700" opacity="0.9">
    <animate attributeName="r" values="26;30;26" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="200" cy="45" rx="30" ry="18" fill="white"/>
    <ellipse cx="230" cy="40" rx="24" ry="14" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="470" cy="280" rx="25" ry="38" fill="#228B22"/>
    <rect x="465" y="280" width="10" height="22" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#4CAF50"/>
    <circle cx="47" cy="320" r="4" fill="#81C784"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">👤 Портрет</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#2E7D32" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#4CAF50" stroke-width="2"/>
  
  <!-- Portrait info -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Искусство портрета / Portrait art</text>
  
  <!-- Face parts -->
  <g transform="translate(100, 100)">
    <!-- Face outline -->
    <ellipse cx="80" cy="80" rx="65" ry="85" fill="#FFCCBC" stroke="#5D4037" stroke-width="2"/>
    
    <!-- Eyes -->
    <ellipse cx="55" cy="60" rx="12" ry="8" fill="white" stroke="#333"/>
    <circle cx="55" cy="60" r="5" fill="#5D4037"/>
    <circle cx="55" cy="60" r="2" fill="black"/>
    
    <ellipse cx="105" cy="60" rx="12" ry="8" fill="white" stroke="#333"/>
    <circle cx="105" cy="60" r="5" fill="#5D4037"/>
    <circle cx="105" cy="60" r="2" fill="black"/>
    
    <!-- Eyebrows -->
    <path d="M40 48 Q55 43 70 48" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M90 48 Q105 43 120 48" stroke="#333" stroke-width="2" fill="none"/>
    
    <!-- Nose -->
    <path d="M80 70 L80 95 Q75 100 80 100 Q85 100 80 95" stroke="#5D4037" stroke-width="1.5" fill="none"/>
    
    <!-- Mouth -->
    <path d="M60 115 Q80 130 100 115" stroke="#E91E63" stroke-width="2" fill="none"/>
    
    <!-- Labels -->
    <text x="30" y="55" font-size="8" fill="#2E7D32">глаза</text>
    <text x="120" y="55" font-size="8" fill="#2E7D32">eyes</text>
    <text x="90" y="95" font-size="8" fill="#2E7D32">нос</text>
    <text x="90" y="125" font-size="8" fill="#2E7D32">рот</text>
  </g>
  
  <!-- Portrait tips -->
  <rect x="260" y="100" width="180" height="130" rx="10" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="350" y="120" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Правила портрета:</text>
  <text x="270" y="140" font-size="8" fill="#333">📌 Глаза на середине лица</text>
  <text x="270" y="155" font-size="8" fill="#333">📌 Уши на уровне глаз</text>
  <text x="270" y="170" font-size="8" fill="#333">📌 Рот ниже носа</text>
  <text x="270" y="185" font-size="8" fill="#333">📌 Симметрия частей</text>
  <text x="270" y="200" font-size="8" fill="#333">📌 Пропорции важны!</text>
  
  <!-- Famous portraits -->
  <rect x="50" y="240" width="400" height="60" rx="8" fill="#F1F8E9" stroke="#4CAF50"/>
  <text x="250" y="260" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">🖼️ Знаменитые портреты</text>
  <text x="250" y="280" font-size="9" fill="#333" text-anchor="middle">Мона Лиза (Леонардо да Винчи) • Девочка с персиками (В. Серов)</text>
  <text x="250" y="292" font-size="8" fill="#666" text-anchor="middle">Портрет художника показывает характер человека</text>
  
  <!-- Decorative brush -->
  <g transform="translate(55, 275)" opacity="0.5">
    <rect x="0" y="5" width="25" height="8" fill="#8D6E63"/>
    <ellipse cx="28" cy="9" rx="5" ry="4" fill="#333"/>
  </g>
</svg>