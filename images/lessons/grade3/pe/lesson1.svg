<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pe1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC80;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#pe1)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">🏃 Физическая культура</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCC80" opacity="0.6"/>
  
  <!-- Sports activities -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif">
    <!-- Gymnastics -->
    <rect x="0" y="0" width="130" height="110" fill="#FFECB3" rx="8" stroke="#FF9800"/>
    <text x="65" y="18" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Гимнастика</text>
    <!-- Stick figure doing exercise -->
    <circle cx="65" cy="45" r="10" fill="#FFCCBC"/>
    <line x1="65" y1="55" x2="65" y2="80" stroke="#795548" stroke-width="3"/>
    <line x1="65" y1="65" x2="45" y2="55" stroke="#795548" stroke-width="3"/>
    <line x1="65" y1="65" x2="85" y2="55" stroke="#795548" stroke-width="3"/>
    <line x1="65" y1="80" x2="50" y2="100" stroke="#795548" stroke-width="3"/>
    <line x1="65" y1="80" x2="80" y2="100" stroke="#795548" stroke-width="3"/>
    <text x="65" y="100" font-size="8" fill="#F57C00" text-anchor="middle">упражнения</text>
    
    <!-- Games -->
    <rect x="150" y="0" width="130" height="110" fill="#C8E6C9" rx="8" stroke="#4CAF50"/>
    <text x="215" y="18" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Игры</text>
    <!-- Ball -->
    <circle cx="215" cy="60" r="25" fill="#FF5722"/>
    <path d="M190,60 Q215,40 240,60" fill="none" stroke="#BF360C" stroke-width="2"/>
    <path d="M190,60 Q215,80 240,60" fill="none" stroke="#BF360C" stroke-width="2"/>
    <text x="215" y="100" font-size="8" fill="#388E3C" text-anchor="middle">футбол, волейбол</text>
    
    <!-- Skiing -->
    <rect x="300" y="0" width="130" height="110" fill="#B3E5FC" rx="8" stroke="#03A9F4"/>
    <text x="365" y="18" font-size="11" font-weight="bold" fill="#01579B" text-anchor="middle">Лыжи</text>
    <!-- Skier -->
    <circle cx="365" cy="45" r="10" fill="#FFCCBC"/>
    <line x1="365" y1="55" x2="365" y2="80" stroke="#795548" stroke-width="3"/>
    <line x1="365" y1="60" x2="350" y2="50" stroke="#795548" stroke-width="3"/>
    <line x1="365" y1="60" x2="380" y2="70" stroke="#795548" stroke-width="3"/>
    <line x1="350" y1="85" x2="380" y2="85" stroke="#607D8B" stroke-width="4"/>
    <line x1="355" y1="80" x2="355" y2="85" stroke="#5D4037" stroke-width="2"/>
    <line x1="375" y1="80" x2="375" y2="85" stroke="#5D4037" stroke-width="2"/>
    <text x="365" y="100" font-size="8" fill="#0277BD" text-anchor="middle">зимний спорт</text>
  </g>
  
  <!-- Benefits -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="400" height="100" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Почему важна физкультура?</text>
    <text x="200" y="40" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">💪 Укрепляет здоровье и мышцы</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">🏃 Развивает выносливость и ловкость</text>
    <text x="200" y="70" font-family="Arial, sans-serif" font-size="9" fill="#FFB74D" text-anchor="middle">🤝 Учит работать в команде</text>
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="9" fill="#FFA726" text-anchor="middle">😊 Поднимает настроение!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>