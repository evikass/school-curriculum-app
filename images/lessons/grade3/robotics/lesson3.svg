<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg3)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6A1B9A" text-anchor="middle">⚙️ Механизмы</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#8E24AA" opacity="0.5"/>
  
  <!-- Left Mechanism - Rotating Arm -->
  <g transform="translate(100, 160)">
    <rect x="-15" y="-15" width="30" height="30" fill="#5D4037" rx="5"/>
    <circle cx="0" cy="0" r="8" fill="#8D6E63"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <rect x="-5" y="-60" width="10" height="60" fill="url(#armGrad)" rx="3"/>
      <circle cx="0" cy="-55" r="12" fill="#FFAB91"/>
    </g>
    <text x="0" y="70" font-size="11" fill="#4A148C" text-anchor="middle" font-family="Arial">Вращение</text>
  </g>
  
  <!-- Center - Gear Train -->
  <g transform="translate(250, 150)">
    <!-- Large Gear -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="40" fill="url(#gearGrad)"/>
      <circle cx="0" cy="0" r="12" fill="#EDE7F6"/>
      <g>
        <rect x="-5" y="-45" width="10" height="12" fill="#9575CD" rx="2"/>
        <rect x="-5" y="33" width="10" height="12" fill="#9575CD" rx="2"/>
        <rect x="-45" y="-5" width="12" height="10" fill="#9575CD" rx="2"/>
        <rect x="33" y="-5" width="12" height="10" fill="#9575CD" rx="2"/>
        <rect x="25" y="-35" width="10" height="12" fill="#9575CD" rx="2" transform="rotate(45)"/>
        <rect x="-35" y="-5" width="10" height="12" fill="#9575CD" rx="2" transform="rotate(45)"/>
        <rect x="-35" y="-5" width="10" height="12" fill="#9575CD" rx="2" transform="rotate(135)"/>
        <rect x="-5" y="23" width="10" height="12" fill="#9575CD" rx="2" transform="rotate(45 0 0)"/>
      </g>
    </g>
    
    <!-- Small Gear -->
    <g transform="translate(60, 0)">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="3s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="22" fill="#AB47BC"/>
      <circle cx="0" cy="0" r="7" fill="#F3E5F5"/>
      <rect x="-3" y="-26" width="6" height="8" fill="#CE93D8" rx="1"/>
      <rect x="-3" y="18" width="6" height="8" fill="#CE93D8" rx="1"/>
      <rect x="-26" y="-3" width="8" height="6" fill="#CE93D8" rx="1"/>
      <rect x="18" y="-3" width="8" height="6" fill="#CE93D8" rx="1"/>
    </g>
    <text x="30" y="90" font-size="11" fill="#4A148C" text-anchor="middle" font-family="Arial">Передача</text>
  </g>
  
  <!-- Right - Linear Motion -->
  <g transform="translate(380, 130)">
    <rect x="-40" y="-10" width="80" height="20" fill="#E0E0E0" rx="5"/>
    <rect x="-30" y="-5" width="60" height="10" fill="#BDBDBD" rx="2"/>
    <g>
      <animate attributeName="transform" values="translate(-25,0);translate(25,0);translate(-25,0)" dur="3s" repeatCount="indefinite"/>
      <rect x="-15" y="-20" width="30" height="40" fill="#26A69A" rx="5"/>
      <circle cx="0" cy="-10" r="5" fill="#80CBC4"/>
      <circle cx="0" cy="10" r="5" fill="#80CBC4"/>
    </g>
    <text x="0" y="70" font-size="11" fill="#4A148C" text-anchor="middle" font-family="Arial">Поступательное</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="75" fill="#F3E5F5" rx="8" stroke="#8E24AA"/>
    <text x="220" y="20" font-size="12" font-weight="bold" fill="#4A148C" text-anchor="middle">Механизм преобразует движение!</text>
    <text x="220" y="38" font-size="10" fill="#6A1B9A" text-anchor="middle">🔄 Вращательное движение — детали крутятся вокруг оси</text>
    <text x="220" y="52" font-size="10" fill="#6A1B9A" text-anchor="middle">↔️ Поступательное движение — детали двигаются прямо</text>
    <text x="220" y="66" font-size="10" fill="#6A1B9A" text-anchor="middle">⚙️ Передача — движение переходит от одной детали к другой</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="50" r="8" fill="#CE93D8" opacity="0.5">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="50" r="10" fill="#CE93D8" opacity="0.5">
    <animate attributeName="r" values="10;14;10" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>