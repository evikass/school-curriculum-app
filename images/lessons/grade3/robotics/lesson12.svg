<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="armRobotGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3949AB"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="objectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg12)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F57C00" text-anchor="middle">🦾 Проект: Робот-манипулятор</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Robot Arm -->
  <g transform="translate(100, 80)">
    <!-- Base -->
    <rect x="60" y="150" width="80" height="25" fill="#455A64" rx="5"/>
    <ellipse cx="100" cy="150" rx="50" ry="15" fill="#546E7A"/>
    
    <!-- Turntable -->
    <ellipse cx="100" cy="145" rx="30" ry="10" fill="#78909C">
      <animateTransform attributeName="transform" type="rotate" values="0 100 145;10 100 145;0 100 145;-10 100 145;0 100 145" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Main Arm -->
    <g transform="translate(100, 145)">
      <animateTransform attributeName="transform" type="rotate" values="0 100 145;-5 100 145;0 100 145;5 100 145;0 100 145" dur="4s" repeatCount="indefinite" additive="sum"/>
      
      <!-- Lower arm -->
      <rect x="-12" y="-80" width="24" height="80" fill="url(#armRobotGrad)" rx="5"/>
      
      <!-- Joint 1 -->
      <circle cx="0" cy="-80" r="15" fill="#7986CB">
        <animate attributeName="fill" values="#7986CB;#9FA8DA;#7986CB" dur="2s" repeatCount="indefinite"/>
      </circle>
      
      <!-- Upper arm -->
      <g transform="translate(0, -80)">
        <animateTransform attributeName="transform" type="rotate" values="-30;0;-30;-60;-30" dur="5s" repeatCount="indefinite"/>
        <rect x="-10" y="-60" width="20" height="60" fill="#5C6BC0" rx="4"/>
        
        <!-- Joint 2 -->
        <circle cx="0" cy="-60" r="12" fill="#7986CB">
          <animate attributeName="fill" values="#7986CB;#9FA8DA;#7986CB" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Wrist -->
        <g transform="translate(0, -60)">
          <animateTransform attributeName="transform" type="rotate" values="0;20;0;-20;0" dur="3s" repeatCount="indefinite"/>
          
          <!-- Claw base -->
          <rect x="-8" y="-25" width="16" height="25" fill="url(#clawGrad)" rx="3"/>
          
          <!-- Claw fingers -->
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0 -8 -25;-15 -8 -25;0 -8 -25" dur="2s" repeatCount="indefinite"/>
            <rect x="-18" y="-35" width="12" height="20" fill="#FF8A65" rx="2"/>
          </g>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0 8 -25;15 8 -25;0 8 -25" dur="2s" repeatCount="indefinite"/>
            <rect x="6" y="-35" width="12" height="20" fill="#FF8A65" rx="2"/>
          </g>
        </g>
      </g>
    </g>
    
    <!-- Object to grab -->
    <g transform="translate(80, 100)">
      <rect x="0" y="0" width="25" height="25" fill="url(#objectGrad)" rx="3">
        <animate attributeName="y" values="0;-50;-50;-50;0" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="x" values="0;0;40;40;0" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;1;0.5;0.5;1" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Project Goals -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="150" height="110" fill="white" rx="10" stroke="#FF9800" stroke-width="2"/>
    <text x="75" y="20" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Задачи проекта:</text>
    
    <g transform="translate(15, 35)">
      <circle cx="8" cy="8" r="6" fill="#4CAF50"/>
      <text x="8" y="11" font-size="8" fill="white" text-anchor="middle" font-family="Arial">1</text>
      <text x="22" y="12" font-size="9" fill="#424242" font-family="Arial">Собрать руку</text>
    </g>
    
    <g transform="translate(15, 55)">
      <circle cx="8" cy="8" r="6" fill="#2196F3"/>
      <text x="8" y="11" font-size="8" fill="white" text-anchor="middle" font-family="Arial">2</text>
      <text x="22" y="12" font-size="9" fill="#424242" font-family="Arial">Программировать</text>
    </g>
    
    <g transform="translate(15, 75)">
      <circle cx="8" cy="8" r="6" fill="#FF9800"/>
      <text x="8" y="11" font-size="8" fill="white" text-anchor="middle" font-family="Arial">3</text>
      <text x="22" y="12" font-size="9" fill="#424242" font-family="Arial">Хватать предметы</text>
    </g>
    
    <g transform="translate(15, 95)">
      <circle cx="8" cy="8" r="6" fill="#9C27B0"/>
      <text x="8" y="11" font-size="8" fill="white" text-anchor="middle" font-family="Arial">4</text>
      <text x="22" y="12" font-size="9" fill="#424242" font-family="Arial">Перемещать</text>
    </g>
  </g>
  
  <!-- Controls Panel -->
  <g transform="translate(320, 200)">
    <rect x="0" y="0" width="150" height="70" fill="#263238" rx="10"/>
    <text x="75" y="18" font-size="10" font-weight="bold" fill="#FFC107" text-anchor="middle" font-family="Arial">Управление</text>
    
    <!-- Control buttons -->
    <g transform="translate(30, 30)">
      <rect x="0" y="0" width="25" height="20" fill="#4CAF50" rx="3">
        <animate attributeName="fill" values="#4CAF50;#81C784;#4CAF50" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="12" y="14" font-size="8" fill="white" text-anchor="middle" font-family="Arial">▲</text>
    </g>
    
    <g transform="translate(62, 30)">
      <rect x="0" y="0" width="25" height="20" fill="#2196F3" rx="3">
        <animate attributeName="fill" values="#2196F3;#64B5F6;#2196F3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </rect>
      <text x="12" y="14" font-size="8" fill="white" text-anchor="middle" font-family="Arial">▼</text>
    </g>
    
    <g transform="translate(94, 30)">
      <rect x="0" y="0" width="25" height="20" fill="#FF9800" rx="3">
        <animate attributeName="fill" values="#FF9800;#FFB74D;#FF9800" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      </rect>
      <text x="12" y="14" font-size="8" fill="white" text-anchor="middle" font-family="Arial">✊</text>
    </g>
    
    <text x="42" y="62" font-size="7" fill="#90A4AE" text-anchor="middle" font-family="Arial">Вверх</text>
    <text x="75" y="62" font-size="7" fill="#90A4AE" text-anchor="middle" font-family="Arial">Вниз</text>
    <text x="107" y="62" font-size="7" fill="#90A4AE" text-anchor="middle" font-family="Arial">Хват</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 290)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="280" height="50" fill="#FFF8E1" rx="8" stroke="#FF9800"/>
    <text x="140" y="18" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Манипулятор — это рука робота!</text>
    <text x="140" y="33" font-size="9" fill="#F57C00" text-anchor="middle">Она может хватать, поднимать и перемещать</text>
    <text x="140" y="45" font-size="9" fill="#F57C00" text-anchor="middle">предметы как человеческая рука</text>
  </g>
  
  <!-- Stars decoration -->
  <g fill="#FFC107">
    <polygon points="50,60 52,66 58,66 53,70 55,76 50,72 45,76 47,70 42,66 48,66">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="480,90 482,96 488,96 483,100 485,106 480,102 475,106 477,100 472,96 478,96">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>