<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="robotArmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="roverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#455A64"/>
    </linearGradient>
    <linearGradient id="vacuumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="medGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg9)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#303F9F" text-anchor="middle">🌍 Роботы в нашей жизни</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#3F51B5" opacity="0.5"/>
  
  <!-- Industrial Robot Arm -->
  <g transform="translate(50, 80)">
    <rect x="0" y="70" width="80" height="15" fill="#BF360C" rx="3"/>
    <!-- Base -->
    <rect x="25" y="50" width="30" height="25" fill="url(#robotArmGrad)"/>
    <!-- Arm segments -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;15;0;-15;0" dur="4s" repeatCount="indefinite"/>
      <rect x="30" y="20" width="20" height="35" fill="#FF7043" rx="3"/>
      <g transform="translate(40, 20)">
        <animateTransform attributeName="transform" type="rotate" values="0;-20;0;20;0" dur="3s" repeatCount="indefinite"/>
        <rect x="-5" y="-30" width="10" height="30" fill="#FF8A65" rx="2"/>
        <!-- Gripper -->
        <rect x="-12" y="-35" width="8" height="10" fill="#FFAB91" rx="2"/>
        <rect x="4" y="-35" width="8" height="10" fill="#FFAB91" rx="2"/>
      </g>
    </g>
    <text x="40" y="100" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Заводской</text>
    <text x="40" y="112" font-size="7" fill="#E64A19" text-anchor="middle" font-family="Arial">Собирает машины</text>
  </g>
  
  <!-- Mars Rover -->
  <g transform="translate(160, 80)">
    <!-- Body -->
    <rect x="0" y="30" width="70" height="35" fill="url(#roverGrad)" rx="5"/>
    <!-- Solar panels -->
    <rect x="-25" y="35" width="25" height="25" fill="#1976D2">
      <animate attributeName="fill" values="#1976D2;#42A5F5;#1976D2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="70" y="35" width="25" height="25" fill="#1976D2">
      <animate attributeName="fill" values="#1976D2;#42A5F5;#1976D2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Camera mast -->
    <rect x="30" y="10" width="10" height="25" fill="#546E7A"/>
    <circle cx="35" cy="10" r="8" fill="#78909C"/>
    <circle cx="35" cy="10" r="4" fill="#263238"/>
    <!-- Wheels -->
    <circle cx="15" cy="70" r="12" fill="#37474F">
      <animateTransform attributeName="transform" type="rotate" from="0 15 70" to="360 15 70" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="70" r="12" fill="#37474F">
      <animateTransform attributeName="transform" type="rotate" from="0 55 70" to="360 55 70" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="100" font-size="9" font-weight="bold" fill="#37474F" text-anchor="middle" font-family="Arial">Ровер</text>
    <text x="35" y="112" font-size="7" fill="#546E7A" text-anchor="middle" font-family="Arial">Исследует космос</text>
  </g>
  
  <!-- Robot Vacuum -->
  <g transform="translate(270, 95)">
    <ellipse cx="35" cy="30" rx="35" ry="12" fill="url(#vacuumGrad)"/>
    <ellipse cx="35" cy="25" rx="30" ry="10" fill="#64B5F6"/>
    <circle cx="35" cy="25" r="8" fill="#BBDEFB"/>
    <circle cx="35" cy="25" r="4" fill="#1565C0">
      <animate attributeName="fill" values="#1565C0;#42A5F5;#1565C0" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Movement indicator -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;10,0;0,0;-10,0;0,0" dur="3s" repeatCount="indefinite"/>
      <ellipse cx="35" cy="50" rx="25" ry="5" fill="#90CAF9" opacity="0.3"/>
    </g>
    <text x="35" y="75" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Пылесос</text>
    <text x="35" y="87" font-size="7" fill="#42A5F5" text-anchor="middle" font-family="Arial">Убирает дом</text>
  </g>
  
  <!-- Medical Robot -->
  <g transform="translate(370, 80)">
    <!-- Body -->
    <rect x="10" y="20" width="60" height="50" fill="url(#medGrad)" rx="5"/>
    <!-- Head/Screen -->
    <rect x="15" y="0" width="50" height="25" fill="#FFCDD2" rx="5"/>
    <rect x="20" y="5" width="40" height="15" fill="#EF9A9A" rx="3"/>
    <!-- Heart monitor -->
    <polyline points="25,12 30,12 33,5 36,20 39,12 55,12" fill="none" stroke="#E53935" stroke-width="1.5">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <!-- Arms -->
    <rect x="0" y="30" width="10" height="30" fill="#EF5350" rx="3"/>
    <rect x="70" y="30" width="10" height="30" fill="#EF5350" rx="3"/>
    <text x="40" y="90" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="Arial">Медицинский</text>
    <text x="40" y="102" font-size="7" fill="#EF5350" text-anchor="middle" font-family="Arial">Помогает врачам</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 200)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="100" fill="#E8EAF6" rx="8" stroke="#3F51B5"/>
    <text x="220" y="20" font-size="12" font-weight="bold" fill="#303F9F" text-anchor="middle">Роботы помогают людям везде!</text>
    
    <g transform="translate(20, 35)">
      <circle cx="10" cy="10" r="8" fill="#FF7043"/>
      <text x="25" y="14" font-size="9" fill="#455A64">Заводы — собирают автомобили и технику</text>
    </g>
    <g transform="translate(20, 55)">
      <circle cx="10" cy="10" r="8" fill="#78909C"/>
      <text x="25" y="14" font-size="9" fill="#455A64">Космос — исследуют другие планеты</text>
    </g>
    <g transform="translate(20, 75)">
      <circle cx="10" cy="10" r="8" fill="#42A5F5"/>
      <text x="25" y="14" font-size="9" fill="#455A64">Дома — пылесосят и готовят еду</text>
    </g>
    <g transform="translate(220, 55)">
      <circle cx="10" cy="10" r="8" fill="#EF5350"/>
      <text x="25" y="14" font-size="9" fill="#455A64">Медицина — делают операции</text>
    </g>
    <g transform="translate(220, 75)">
      <circle cx="10" cy="10" r="8" fill="#66BB6A"/>
      <text x="25" y="14" font-size="9" fill="#455A64">Образование — учат детей</text>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <g transform="translate(480, 50)">
    <circle cx="0" cy="0" r="15" fill="#C5CAE9" opacity="0.5">
      <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>