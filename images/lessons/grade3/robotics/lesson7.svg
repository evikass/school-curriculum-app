<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="sensorBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="ultrasonicGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="touchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="colorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg7)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#01579B" text-anchor="middle">📡 Датчики</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#0288D1" opacity="0.5"/>
  
  <!-- Ultrasonic Sensor -->
  <g transform="translate(70, 100)">
    <rect x="0" y="0" width="80" height="50" fill="url(#sensorBody)" rx="8"/>
    <circle cx="20" cy="25" r="15" fill="url(#ultrasonicGrad)">
      <animate attributeName="r" values="15;17;15" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="25" r="15" fill="url(#ultrasonicGrad)">
      <animate attributeName="r" values="17;15;17" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Sound waves -->
    <g transform="translate(80, 25)">
      <path d="M0,0 Q15,-15 30,0 Q15,15 0,0" fill="none" stroke="#00ACC1" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="transform" values="translate(0,0);translate(20,0)" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M5,0 Q20,-20 40,0 Q20,20 5,0" fill="none" stroke="#00ACC1" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="transform" values="translate(0,0);translate(20,0)" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="40" y="70" font-size="10" font-weight="bold" fill="#00838F" text-anchor="middle" font-family="Arial">Ультразвуковой</text>
    <text x="40" y="82" font-size="8" fill="#00ACC1" text-anchor="middle" font-family="Arial">Измеряет расстояние</text>
  </g>
  
  <!-- Touch Sensor -->
  <g transform="translate(190, 100)">
    <rect x="0" y="0" width="60" height="50" fill="url(#sensorBody)" rx="8"/>
    <rect x="15" y="5" width="30" height="20" fill="url(#touchGrad)" rx="3"/>
    <rect x="20" y="25" width="20" height="15" fill="#FFCDD2" rx="2">
      <animate attributeName="y" values="25;28;25" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Press indicator -->
    <circle cx="30" cy="15" r="3" fill="#FFCDD2">
      <animate attributeName="fill" values="#FFCDD2;#FFEBEE;#FFCDD2" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="70" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="Arial">Касания</text>
    <text x="30" y="82" font-size="8" fill="#EF5350" text-anchor="middle" font-family="Arial">Нажатие</text>
  </g>
  
  <!-- Color Sensor -->
  <g transform="translate(290, 100)">
    <rect x="0" y="0" width="60" height="50" fill="url(#sensorBody)" rx="8"/>
    <rect x="10" y="10" width="40" height="30" fill="#263238" rx="3"/>
    <!-- RGB LEDs -->
    <circle cx="20" cy="20" r="5" fill="#F44336">
      <animate attributeName="fill" values="#F44336;#FFEBEE;#F44336" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="20" r="5" fill="#4CAF50">
      <animate attributeName="fill" values="#4CAF50;#E8F5E9;#4CAF50" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="20" r="5" fill="#2196F3">
      <animate attributeName="fill" values="#2196F3;#E3F2FD;#2196F3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <rect x="15" y="28" width="30" height="8" fill="url(#colorGrad)" rx="2">
      <animate attributeName="fill" values="#FFEE58;#FF9800;#9C27B0;#FFEE58" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="70" font-size="10" font-weight="bold" fill="#F9A825" text-anchor="middle" font-family="Arial">Цвета</text>
    <text x="30" y="82" font-size="8" fill="#FFCA28" text-anchor="middle" font-family="Arial">Распознаёт цвета</text>
  </g>
  
  <!-- Light Sensor -->
  <g transform="translate(390, 100)">
    <rect x="0" y="0" width="60" height="50" fill="url(#sensorBody)" rx="8"/>
    <circle cx="30" cy="25" r="18" fill="#FFF59D"/>
    <circle cx="30" cy="25" r="12" fill="#FFEE58">
      <animate attributeName="fill" values="#FFEE58;#FFF9C4;#FFEE58" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="25" r="6" fill="#FBC02D"/>
    <!-- Light rays -->
    <g stroke="#FFD54F" stroke-width="2">
      <line x1="30" y1="5" x2="30" y2="0">
        <animate attributeName="y1" values="5;3;5" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="45" y1="10" x2="48" y2="6">
        <animate attributeName="x1" values="45;47;45" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="15" y1="10" x2="12" y2="6">
        <animate attributeName="x1" values="15;13;15" dur="1s" repeatCount="indefinite"/>
      </line>
    </g>
    <text x="30" y="70" font-size="10" font-weight="bold" fill="#F9A825" text-anchor="middle" font-family="Arial">Света</text>
    <text x="30" y="82" font-size="8" fill="#FFCA28" text-anchor="middle" font-family="Arial">Яркость</text>
  </g>
  
  <!-- Robot with sensors -->
  <g transform="translate(150, 210)">
    <rect x="0" y="0" width="200" height="80" fill="#78909C" rx="10"/>
    <text x="100" y="20" font-size="9" fill="#ECEFF1" text-anchor="middle" font-family="Arial">Робот с датчиками</text>
    
    <!-- Sensors on robot -->
    <circle cx="30" cy="50" r="12" fill="#00ACC1">
      <animate attributeName="fill" values="#00ACC1;#26C6DA;#00ACC1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="50" r="10" fill="#EF5350"/>
    <circle cx="110" cy="50" r="10" fill="#FFCA28"/>
    <circle cx="150" cy="50" r="10" fill="#FFEE58"/>
    
    <!-- Labels -->
    <text x="30" y="75" font-size="7" fill="#ECEFF1" text-anchor="middle" font-family="Arial">US</text>
    <text x="70" y="75" font-size="7" fill="#ECEFF1" text-anchor="middle" font-family="Arial">Touch</text>
    <text x="110" y="75" font-size="7" fill="#ECEFF1" text-anchor="middle" font-family="Arial">Color</text>
    <text x="150" y="75" font-size="7" fill="#ECEFF1" text-anchor="middle" font-family="Arial">Light</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 300)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="40" fill="#E1F5FE" rx="8" stroke="#0288D1"/>
    <text x="220" y="17" font-size="11" font-weight="bold" fill="#01579B" text-anchor="middle">Датчики — это "глаза и уши" робота!</text>
    <text x="220" y="32" font-size="10" fill="#0277BD" text-anchor="middle">Они помогают роботу чувствовать окружающий мир</text>
  </g>
</svg>