<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="projectRobotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="partsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg11)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">🚗 Проект: Робот-машинка</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Project Steps -->
  <g transform="translate(30, 70)">
    <!-- Step 1: Design -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="140" height="90" fill="white" rx="10" stroke="#4CAF50" stroke-width="2">
        <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite"/>
      </rect>
      <circle cx="70" cy="25" r="18" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
      <text x="70" y="30" font-size="16" fill="#2E7D32" text-anchor="middle" font-family="Arial">📐</text>
      <text x="70" y="55" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial">1. Планирование</text>
      <text x="70" y="70" font-size="8" fill="#4CAF50" text-anchor="middle" font-family="Arial">Нарисуй схему</text>
      <text x="70" y="82" font-size="8" fill="#4CAF50" text-anchor="middle" font-family="Arial">робота</text>
    </g>
    
    <!-- Step 2: Build -->
    <g transform="translate(150, 0)">
      <rect x="0" y="0" width="140" height="90" fill="white" rx="10" stroke="#FF9800" stroke-width="2">
        <animate attributeName="stroke-width" values="2;3;2" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="70" cy="25" r="18" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
      <text x="70" y="30" font-size="16" fill="#E65100" text-anchor="middle" font-family="Arial">🔧</text>
      <text x="70" y="55" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">2. Сборка</text>
      <text x="70" y="70" font-size="8" fill="#FF9800" text-anchor="middle" font-family="Arial">Собери детали</text>
      <text x="70" y="82" font-size="8" fill="#FF9800" text-anchor="middle" font-family="Arial">вместе</text>
    </g>
    
    <!-- Step 3: Program -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="140" height="90" fill="white" rx="10" stroke="#2196F3" stroke-width="2">
        <animate attributeName="stroke-width" values="2;3;2" dur="2s" begin="1s" repeatCount="indefinite"/>
      </rect>
      <circle cx="70" cy="25" r="18" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
      <text x="70" y="30" font-size="16" fill="#1565C0" text-anchor="middle" font-family="Arial">💻</text>
      <text x="70" y="55" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">3. Программирование</text>
      <text x="70" y="70" font-size="8" fill="#2196F3" text-anchor="middle" font-family="Arial">Напиши код</text>
      <text x="70" y="82" font-size="8" fill="#2196F3" text-anchor="middle" font-family="Arial">для робота</text>
    </g>
  </g>
  
  <!-- Step 4: Test -->
  <g transform="translate(170, 170)">
    <rect x="0" y="0" width="160" height="60" fill="white" rx="10" stroke="#9C27B0" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3;2" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <circle cx="40" cy="30" r="18" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
    <text x="40" y="35" font-size="16" fill="#6A1B9A" text-anchor="middle" font-family="Arial">▶️</text>
    <text x="110" y="25" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle" font-family="Arial">4. Тестирование</text>
    <text x="110" y="40" font-size="8" fill="#9C27B0" text-anchor="middle" font-family="Arial">Проверь работу</text>
    <text x="110" y="52" font-size="8" fill="#9C27B0" text-anchor="middle" font-family="Arial">робота</text>
  </g>
  
  <!-- Robot Car Project -->
  <g transform="translate(100, 240)">
    <!-- Car body -->
    <rect x="50" y="20" width="200" height="50" fill="url(#projectRobotGrad)" rx="10"/>
    <!-- Windshield -->
    <path d="M130,20 L150,0 L200,0 L210,20 Z" fill="#81C784"/>
    <!-- Wheels -->
    <g transform="translate(80, 70)">
      <circle cx="0" cy="0" r="20" fill="#37474F">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="12" fill="#546E7A"/>
      <circle cx="0" cy="0" r="5" fill="#263238"/>
    </g>
    <g transform="translate(220, 70)">
      <circle cx="0" cy="0" r="20" fill="#37474F">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="12" fill="#546E7A"/>
      <circle cx="0" cy="0" r="5" fill="#263238"/>
    </g>
    <!-- Sensor -->
    <rect x="235" y="35" width="20" height="15" fill="#00BCD4" rx="3">
      <animate attributeName="fill" values="#00BCD4;#26C6DA;#00BCD4" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Headlights -->
    <circle cx="250" cy="45" r="5" fill="#FFEB3B">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Motors indicator -->
    <text x="150" y="50" font-size="8" fill="white" text-anchor="middle" font-family="Arial">Мотор A + Мотор B</text>
  </g>
  
  <!-- Parts List -->
  <g transform="translate(330, 240)">
    <rect x="0" y="0" width="140" height="90" fill="white" rx="10" stroke="#FF9800"/>
    <text x="70" y="18" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Необходимые детали:</text>
    <text x="10" y="35" font-size="8" fill="#424242" font-family="Arial">• Балки и бруски</text>
    <text x="10" y="48" font-size="8" fill="#424242" font-family="Arial">• 2 мотора</text>
    <text x="10" y="61" font-size="8" fill="#424242" font-family="Arial">• Колёса и оси</text>
    <text x="10" y="74" font-size="8" fill="#424242" font-family="Arial">• Шестерёнки</text>
    <text x="10" y="87" font-size="8" fill="#424242" font-family="Arial">• Контроллер</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 335)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="10" fill="#E8F5E9" rx="3" stroke="#4CAF50"/>
  </g>
</svg>