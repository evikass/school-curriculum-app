<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad21" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad21)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">📚 Present Simple</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#4CAF50" opacity="0.6"/>
  
  <!-- I/You/We/They -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="65" width="220" height="130" fill="white" rx="10" opacity="0.9"/>
    <rect x="20" y="65" width="220" height="25" fill="#2196F3" rx="10"/>
    <rect x="20" y="80" width="220" height="10" fill="#2196F3"/>
    <text x="130" y="83" font-size="11" fill="white" text-anchor="middle" font-weight="bold">I / You / We / They</text>
    
    <text x="130" y="110" font-size="11" fill="#1565C0" text-anchor="middle">I play football.</text>
    <text x="130" y="125" font-size="9" fill="#42A5F5" text-anchor="middle">Я играю в футбол.</text>
    <text x="130" y="145" font-size="11" fill="#1565C0" text-anchor="middle">We don't play tennis.</text>
    <text x="130" y="160" font-size="9" fill="#42A5F5" text-anchor="middle">Мы не играем в теннис.</text>
    <text x="130" y="180" font-size="10" fill="#0D47A1" text-anchor="middle">Do you play? — Yes, I do.</text>
  </g>
  
  <!-- He/She/It -->
  <g font-family="Arial, sans-serif">
    <rect x="260" y="65" width="220" height="130" fill="white" rx="10" opacity="0.9"/>
    <rect x="260" y="65" width="220" height="25" fill="#9C27B0" rx="10"/>
    <rect x="260" y="80" width="220" height="10" fill="#9C27B0"/>
    <text x="370" y="83" font-size="11" fill="white" text-anchor="middle" font-weight="bold">He / She / It (+ -s)</text>
    
    <text x="370" y="110" font-size="11" fill="#7B1FA2" text-anchor="middle">He plays football.</text>
    <text x="370" y="125" font-size="9" fill="#AB47BC" text-anchor="middle">Он играет в футбол.</text>
    <text x="370" y="145" font-size="11" fill="#7B1FA2" text-anchor="middle">She doesn't play tennis.</text>
    <text x="370" y="160" font-size="9" fill="#AB47BC" text-anchor="middle">Она не играет в теннис.</text>
    <text x="370" y="180" font-size="10" fill="#6A1B9A" text-anchor="middle">Does he play? — Yes, he does.</text>
  </g>
  
  <!-- Daily routine icons -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="205" width="460" height="70" fill="#FFF8E1" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="250" y="225" font-size="12" fill="#F57F17" text-anchor="middle" font-weight="bold">Daily Routine (Регулярные действия)</text>
    
    <!-- Icons with verbs -->
    <g transform="translate(60, 250)">
      <circle cx="0" cy="0" r="12" fill="#FF9800"/>
      <text x="0" y="4" font-size="12" text-anchor="middle">😴</text>
      <text x="0" y="20" font-size="8" fill="#E65100" text-anchor="middle">sleep</text>
    </g>
    <g transform="translate(130, 250)">
      <circle cx="0" cy="0" r="12" fill="#4CAF50"/>
      <text x="0" y="4" font-size="12" text-anchor="middle">🍽️</text>
      <text x="0" y="20" font-size="8" fill="#2E7D32" text-anchor="middle">eat</text>
    </g>
    <g transform="translate(200, 250)">
      <circle cx="0" cy="0" r="12" fill="#2196F3"/>
      <text x="0" y="4" font-size="12" text-anchor="middle">📖</text>
      <text x="0" y="20" font-size="8" fill="#1565C0" text-anchor="middle">read</text>
    </g>
    <g transform="translate(270, 250)">
      <circle cx="0" cy="0" r="12" fill="#E91E63"/>
      <text x="0" y="4" font-size="12" text-anchor="middle">✏️</text>
      <text x="0" y="20" font-size="8" fill="#C2185B" text-anchor="middle">write</text>
    </g>
    <g transform="translate(340, 250)">
      <circle cx="0" cy="0" r="12" fill="#9C27B0"/>
      <text x="0" y="4" font-size="12" text-anchor="middle">🎬</text>
      <text x="0" y="20" font-size="8" fill="#7B1FA2" text-anchor="middle">watch</text>
    </g>
    <g transform="translate(410, 250)">
      <circle cx="0" cy="0" r="12" fill="#00BCD4"/>
      <text x="0" y="4" font-size="12" text-anchor="middle">🎮</text>
      <text x="0" y="20" font-size="8" fill="#00838F" text-anchor="middle">play</text>
    </g>
  </g>
  
  <!-- Key words -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="285" width="140" height="50" fill="#C8E6C9" rx="8"/>
    <text x="90" y="305" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Key words:</text>
    <text x="90" y="320" font-size="9" fill="#388E3C" text-anchor="middle">every day, usually,</text>
    <text x="90" y="332" font-size="9" fill="#388E3C" text-anchor="middle">often, always</text>
    
    <rect x="170" y="285" width="150" height="50" fill="#FFECB3" rx="8"/>
    <text x="245" y="305" font-size="10" fill="#F57F17" text-anchor="middle" font-weight="bold">don't / doesn't</text>
    <text x="245" y="320" font-size="9" fill="#FF9800" text-anchor="middle">I don't play</text>
    <text x="245" y="332" font-size="9" fill="#FF9800" text-anchor="middle">He doesn't play</text>
    
    <rect x="330" y="285" width="150" height="50" fill="#B3E5FC" rx="8"/>
    <text x="405" y="305" font-size="10" fill="#0277BD" text-anchor="middle" font-weight="bold">Do / Does ...?</text>
    <text x="405" y="320" font-size="9" fill="#03A9F4" text-anchor="middle">Do you play?</text>
    <text x="405" y="332" font-size="9" fill="#03A9F4" text-anchor="middle">Does he play?</text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#4CAF50" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">21</text>
</svg>