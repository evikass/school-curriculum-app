<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad4)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#81C784" opacity="0.3">
    <animate attributeName="r" values="28;35;28" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="300" r="25" fill="#A5D6A7" opacity="0.3">
    <animate attributeName="r" values="23;30;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">📝 Common Words</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Words grid -->
  <g font-family="Arial, sans-serif">
    <!-- Row 1 -->
    <rect x="30" y="70" width="140" height="70" fill="#FFECB3" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="100" font-size="14" fill="#F57F17" text-anchor="middle" font-weight="bold">Hello!</text>
    <text x="100" y="125" font-size="12" fill="#5D4037" text-anchor="middle">Привет!</text>
    
    <rect x="180" y="70" width="140" height="70" fill="#B3E5FC" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="250" y="100" font-size="14" fill="#0277BD" text-anchor="middle" font-weight="bold">Goodbye</text>
    <text x="250" y="125" font-size="12" fill="#5D4037" text-anchor="middle">До свидания</text>
    
    <rect x="330" y="70" width="140" height="70" fill="#F8BBD9" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="100" font-size="14" fill="#C2185B" text-anchor="middle" font-weight="bold">Please</text>
    <text x="400" y="125" font-size="12" fill="#5D4037" text-anchor="middle">Пожалуйста</text>
    
    <!-- Row 2 -->
    <rect x="30" y="150" width="140" height="70" fill="#C8E6C9" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="180" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">Thank you</text>
    <text x="100" y="205" font-size="12" fill="#5D4037" text-anchor="middle">Спасибо</text>
    
    <rect x="180" y="150" width="140" height="70" fill="#E1BEE7" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.7s" repeatCount="indefinite"/>
    </rect>
    <text x="250" y="180" font-size="14" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Yes / No</text>
    <text x="250" y="205" font-size="12" fill="#5D4037" text-anchor="middle">Да / Нет</text>
    
    <rect x="330" y="150" width="140" height="70" fill="#FFCCBC" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="180" font-size="14" fill="#D84315" text-anchor="middle" font-weight="bold">Sorry</text>
    <text x="400" y="205" font-size="12" fill="#5D4037" text-anchor="middle">Извини</text>
    
    <!-- Row 3 -->
    <rect x="105" y="230" width="140" height="70" fill="#DCEDC8" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.3s" repeatCount="indefinite"/>
    </rect>
    <text x="175" y="260" font-size="14" fill="#558B2F" text-anchor="middle" font-weight="bold">Good morning</text>
    <text x="175" y="285" font-size="11" fill="#5D4037" text-anchor="middle">Доброе утро</text>
    
    <rect x="255" y="230" width="140" height="70" fill="#B2EBF2" rx="10" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <text x="325" y="260" font-size="14" fill="#00838F" text-anchor="middle" font-weight="bold">Good night</text>
    <text x="325" y="285" font-size="11" fill="#5D4037" text-anchor="middle">Спокойной ночи</text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="470" cy="30" r="20" fill="#4CAF50" opacity="0.8"/>
  <text x="470" y="36" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">4</text>
</svg>