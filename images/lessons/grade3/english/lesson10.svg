<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1F5FE"/>
      <stop offset="100%" style="stop-color:#B3E5FC"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad10)"/>
  
  <!-- Animated clouds -->
  <g opacity="0.7">
    <ellipse cx="80" cy="50" rx="40" ry="20" fill="white">
      <animate attributeName="cx" values="80;100;80" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="60" cy="45" rx="25" ry="15" fill="white">
      <animate attributeName="cx" values="60;80;60" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="48" rx="30" ry="18" fill="white">
      <animate attributeName="cx" values="100;120;100" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0277BD" text-anchor="middle">🌤️ Weather</text>
  <rect x="100" y="50" width="300" height="2" rx="1" fill="#03A9F4" opacity="0.6"/>
  
  <!-- Weather items -->
  <g font-family="Arial, sans-serif">
    <!-- Sunny -->
    <rect x="20" y="70" width="110" height="85" fill="#FFF8E1" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <circle cx="75" cy="105" r="22" fill="#FFD54F">
      <animate attributeName="r" values="22;25;22" dur="2s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#FFD54F" stroke-width="3">
      <line x1="75" y1="75" x2="75" y2="65"/>
      <line x1="75" y1="135" x2="75" y2="145"/>
      <line x1="45" y1="105" x2="35" y2="105"/>
      <line x1="105" y1="105" x2="115" y2="105"/>
      <line x1="53" y1="83" x2="46" y2="76"/>
      <line x1="97" y1="127" x2="104" y2="134"/>
      <line x1="53" y1="127" x2="46" y2="134"/>
      <line x1="97" y1="83" x2="104" y2="76"/>
    </g>
    <text x="75" y="145" font-size="13" fill="#F57F17" text-anchor="middle" font-weight="bold">sunny</text>
    
    <!-- Rainy -->
    <rect x="140" y="70" width="110" height="85" fill="#E3F2FD" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="195" cy="95" rx="25" ry="18" fill="#90CAF9"/>
    <ellipse cx="175" cy="92" rx="18" ry="14" fill="#BBDEFB"/>
    <ellipse cx="215" cy="92" rx="18" ry="14" fill="#BBDEFB"/>
    <g stroke="#2196F3" stroke-width="2">
      <line x1="175" y1="115" x2="170" y2="135">
        <animate attributeName="y2" values="135;140;135" dur="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="195" y1="115" x2="190" y2="140">
        <animate attributeName="y2" values="140;145;140" dur="0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="215" y1="115" x2="210" y2="135">
        <animate attributeName="y2" values="135;140;135" dur="0.55s" repeatCount="indefinite"/>
      </line>
    </g>
    <text x="195" y="145" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">rainy</text>
    
    <!-- Cloudy -->
    <rect x="260" y="70" width="110" height="85" fill="#ECEFF1" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="315" cy="105" rx="28" ry="20" fill="#B0BEC5"/>
    <ellipse cx="290" cy="100" rx="20" ry="15" fill="#CFD8DC"/>
    <ellipse cx="340" cy="100" rx="22" ry="16" fill="#CFD8DC"/>
    <ellipse cx="315" cy="95" rx="18" ry="12" fill="#ECEFF1"/>
    <text x="315" y="145" font-size="13" fill="#546E7A" text-anchor="middle" font-weight="bold">cloudy</text>
    
    <!-- Snowy -->
    <rect x="380" y="70" width="100" height="85" fill="#FAFAFA" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="430" cy="95" rx="25" ry="18" fill="#B0BEC5"/>
    <ellipse cx="410" cy="92" rx="15" ry="12" fill="#CFD8DC"/>
    <ellipse cx="450" cy="92" rx="15" ry="12" fill="#CFD8DC"/>
    <!-- Snowflakes -->
    <circle cx="415" cy="125" r="3" fill="white" stroke="#90CAF9" stroke-width="1">
      <animate attributeName="cy" values="125;140;125" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="435" cy="130" r="4" fill="white" stroke="#90CAF9" stroke-width="1">
      <animate attributeName="cy" values="130;145;130" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="125" r="3" fill="white" stroke="#90CAF9" stroke-width="1">
      <animate attributeName="cy" values="125;140;125" dur="1.3s" repeatCount="indefinite"/>
    </circle>
    <text x="430" y="145" font-size="13" fill="#37474F" text-anchor="middle" font-weight="bold">snowy</text>
    
    <!-- Windy -->
    <rect x="70" y="165" width="110" height="85" fill="#E0F7FA" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <path d="M90 200 Q120 195 150 200 Q180 205 190 195" stroke="#00BCD4" fill="none" stroke-width="3">
      <animate attributeName="d" values="M90 200 Q120 195 150 200 Q180 205 190 195;M90 200 Q120 205 150 200 Q180 195 190 205;M90 200 Q120 195 150 200 Q180 205 190 195" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M90 220 Q130 215 160 220" stroke="#00ACC1" fill="none" stroke-width="2">
      <animate attributeName="d" values="M90 220 Q130 215 160 220;M90 220 Q130 225 160 220;M90 220 Q130 215 160 220" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <text x="125" y="240" font-size="13" fill="#00838F" text-anchor="middle" font-weight="bold">windy</text>
    
    <!-- Stormy -->
    <rect x="190" y="165" width="110" height="85" fill="#E8EAF6" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.7s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="245" cy="195" rx="28" ry="18" fill="#5C6BC0"/>
    <ellipse cx="225" cy="192" rx="18" ry="14" fill="#7986CB"/>
    <ellipse cx="265" cy="192" rx="18" ry="14" fill="#7986CB"/>
    <!-- Lightning -->
    <polygon points="245,210 255,225 248,225 255,240 235,220 245,220 240,210" fill="#FFEB3B">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.3s" repeatCount="indefinite"/>
    </polygon>
    <text x="245" y="240" font-size="13" fill="#303F9F" text-anchor="middle" font-weight="bold">stormy</text>
    
    <!-- Hot -->
    <rect x="310" y="165" width="110" height="85" fill="#FFEBEE" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="365" cy="205" r="25" fill="#F44336" opacity="0.8"/>
    <text x="365" y="212" font-size="16" fill="white" text-anchor="middle" font-weight="bold">🔥</text>
    <text x="365" y="240" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">hot</text>
    
    <!-- Cold -->
    <rect x="430" y="165" width="50" height="85" fill="#E3F2FD" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.7s" repeatCount="indefinite"/>
    </rect>
    <circle cx="455" cy="205" r="22" fill="#2196F3" opacity="0.8"/>
    <text x="455" y="212" font-size="16" fill="white" text-anchor="middle" font-weight="bold">❄️</text>
    <text x="455" y="240" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">cold</text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#03A9F4" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">10</text>
</svg>