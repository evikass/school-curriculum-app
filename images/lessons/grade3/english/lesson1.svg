<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="engBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#engBg)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="24" fill="#FFD700" opacity="0.85">
    <animate attributeName="r" values="24;28;24" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="100" cy="45" rx="28" ry="16" fill="white"/>
    <ellipse cx="125" cy="40" rx="22" ry="13" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#5D4037"/>
  </g>
  <g opacity="0.22">
    <ellipse cx="470" cy="275" rx="25" ry="38" fill="#228B22"/>
    <rect x="465" y="275" width="10" height="22" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#2196F3"/>
    <circle cx="47" cy="320" r="4" fill="#64B5F6"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#D32F2F"/>
    <circle cx="458" cy="320" r="4" fill="#EF5350"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">🦁 Animals</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#1565C0" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#1976D2" stroke-width="2"/>
  
  <!-- Animals grid -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">Животные / Animals</text>
  
  <g transform="translate(50, 95)">
    <!-- Cat -->
    <rect x="0" y="0" width="90" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3"/>
    <text x="45" y="35" font-size="28" text-anchor="middle">🐱</text>
    <text x="45" y="55" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">cat</text>
    <text x="45" y="66" font-size="8" fill="#333" text-anchor="middle">кот</text>
    
    <!-- Dog -->
    <rect x="100" y="0" width="90" height="70" rx="8" fill="#BBDEFB" stroke="#1E88E5"/>
    <text x="145" y="35" font-size="28" text-anchor="middle">🐕</text>
    <text x="145" y="55" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">dog</text>
    <text x="145" y="66" font-size="8" fill="#333" text-anchor="middle">собака</text>
    
    <!-- Bird -->
    <rect x="200" y="0" width="90" height="70" rx="8" fill="#90CAF9" stroke="#42A5F5"/>
    <text x="245" y="35" font-size="28" text-anchor="middle">🐦</text>
    <text x="245" y="55" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">bird</text>
    <text x="245" y="66" font-size="8" fill="#333" text-anchor="middle">птица</text>
    
    <!-- Fish -->
    <rect x="300" y="0" width="90" height="70" rx="8" fill="#64B5F6" stroke="#2196F3"/>
    <text x="345" y="35" font-size="28" text-anchor="middle">🐟</text>
    <text x="345" y="55" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">fish</text>
    <text x="345" y="66" font-size="8" fill="#333" text-anchor="middle">рыба</text>
  </g>
  
  <!-- More animals -->
  <g transform="translate(50, 175)">
    <!-- Elephant -->
    <rect x="0" y="0" width="90" height="70" rx="8" fill="#E8EAF6" stroke="#3F51B5"/>
    <text x="45" y="35" font-size="28" text-anchor="middle">🐘</text>
    <text x="45" y="55" font-size="11" font-weight="bold" fill="#303F9F" text-anchor="middle">elephant</text>
    <text x="45" y="66" font-size="8" fill="#333" text-anchor="middle">слон</text>
    
    <!-- Bear -->
    <rect x="100" y="0" width="90" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="145" y="35" font-size="28" text-anchor="middle">🐻</text>
    <text x="145" y="55" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">bear</text>
    <text x="145" y="66" font-size="8" fill="#333" text-anchor="middle">медведь</text>
    
    <!-- Rabbit -->
    <rect x="200" y="0" width="90" height="70" rx="8" fill="#FCE4EC" stroke="#E91E63"/>
    <text x="245" y="35" font-size="28" text-anchor="middle">🐰</text>
    <text x="245" y="55" font-size="11" font-weight="bold" fill="#C2185B" text-anchor="middle">rabbit</text>
    <text x="245" y="66" font-size="8" fill="#333" text-anchor="middle">кролик</text>
    
    <!-- Fox -->
    <rect x="300" y="0" width="90" height="70" rx="8" fill="#FFEBEE" stroke="#F44336"/>
    <text x="345" y="35" font-size="28" text-anchor="middle">🦊</text>
    <text x="345" y="55" font-size="11" font-weight="bold" fill="#D32F2F" text-anchor="middle">fox</text>
    <text x="345" y="66" font-size="8" fill="#333" text-anchor="middle">лиса</text>
  </g>
  
  <!-- Sentence -->
  <rect x="80" y="260" width="340" height="45" rx="8" fill="#E3F2FD" stroke="#1976D2"/>
  <text x="250" y="280" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Example: I like cats and dogs.</text>
  <text x="250" y="295" font-size="9" fill="#333" text-anchor="middle">Пример: Мне нравятся коты и собаки.</text>
  
  <!-- Decorative flag -->
  <g transform="translate(55, 285)" opacity="0.6">
    <rect x="0" y="0" width="25" height="16" fill="#1565C0"/>
    <rect x="0" y="5" width="25" height="6" fill="white"/>
    <rect x="0" y="7" width="25" height="2" fill="#D32F2F"/>
  </g>
</svg>