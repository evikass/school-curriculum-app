<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad23)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">📖 Review Lesson 1</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#2196F3" opacity="0.6"/>
  
  <!-- Topics reviewed -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="65" width="145" height="100" fill="#FFECB3" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="92" y="85" font-size="12" fill="#F57F17" text-anchor="middle" font-weight="bold">🐾 Animals</text>
    <text x="92" y="105" font-size="10" fill="#E65100" text-anchor="middle">cat, dog, bird</text>
    <text x="92" y="120" font-size="10" fill="#E65100" text-anchor="middle">fish, rabbit</text>
    <text x="92" y="140" font-size="9" fill="#FF9800" text-anchor="middle">I like cats!</text>
    
    <rect x="175" y="65" width="145" height="100" fill="#C8E6C9" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="247" y="85" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">🍎 Food</text>
    <text x="247" y="105" font-size="10" fill="#1B5E20" text-anchor="middle">apple, banana</text>
    <text x="247" y="120" font-size="10" fill="#1B5E20" text-anchor="middle">bread, milk</text>
    <text x="247" y="140" font-size="9" fill="#4CAF50" text-anchor="middle">I like apples!</text>
    
    <rect x="330" y="65" width="150" height="100" fill="#F8BBD9" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="405" y="85" font-size="12" fill="#C2185B" text-anchor="middle" font-weight="bold">👨‍👩‍👧‍👦 Family</text>
    <text x="405" y="105" font-size="10" fill="#AD1457" text-anchor="middle">mother, father</text>
    <text x="405" y="120" font-size="10" fill="#AD1457" text-anchor="middle">sister, brother</text>
    <text x="405" y="140" font-size="9" fill="#E91E63" text-anchor="middle">I love my family!</text>
  </g>
  
  <!-- Second row -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="175" width="145" height="100" fill="#BBDEFB" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="92" y="195" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">👕 Clothes</text>
    <text x="92" y="215" font-size="10" fill="#0D47A1" text-anchor="middle">T-shirt, dress</text>
    <text x="92" y="230" font-size="10" fill="#0D47A1" text-anchor="middle">shoes, hat</text>
    <text x="92" y="250" font-size="9" fill="#2196F3" text-anchor="middle">Put on your hat!</text>
    
    <rect x="175" y="175" width="145" height="100" fill="#E1BEE7" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.7s" repeatCount="indefinite"/>
    </rect>
    <text x="247" y="195" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">🧍 Body</text>
    <text x="247" y="215" font-size="10" fill="#6A1B9A" text-anchor="middle">head, hand, leg</text>
    <text x="247" y="230" font-size="10" fill="#6A1B9A" text-anchor="middle">eye, nose, mouth</text>
    <text x="247" y="250" font-size="9" fill="#9C27B0" text-anchor="middle">Touch your nose!</text>
    
    <rect x="330" y="175" width="150" height="100" fill="#FFF8E1" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5.2s" repeatCount="indefinite"/>
    </rect>
    <text x="405" y="195" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">🌤️ Weather</text>
    <text x="405" y="215" font-size="10" fill="#BF360C" text-anchor="middle">sunny, rainy</text>
    <text x="405" y="230" font-size="10" fill="#BF360C" text-anchor="middle">cloudy, snowy</text>
    <text x="405" y="250" font-size="9" fill="#FF9800" text-anchor="middle">It's sunny today!</text>
  </g>
  
  <!-- Progress bar -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="290" width="460" height="45" fill="white" rx="10" opacity="0.8"/>
    <text x="250" y="310" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Lessons 4-10 Review: Common words, Animals, Food, Family, Body, Clothes, Weather</text>
    <rect x="40" y="320" width="420" height="8" fill="#E0E0E0" rx="4"/>
    <rect x="40" y="320" width="420" height="8" fill="#4CAF50" rx="4">
      <animate attributeName="width" values="0;420" dur="2s" fill="freeze"/>
    </rect>
  </g>
  
  <!-- Stars -->
  <g fill="#FFD54F">
    <polygon points="40,100 43,108 52,108 45,113 48,122 40,117 32,122 35,113 28,108 37,108">
      <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
    </polygon>
  </g>
  
  <!-- Lesson number -->
  <circle cx="470" cy="320" r="20" fill="#2196F3" opacity="0.9"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">23</text>
</svg>