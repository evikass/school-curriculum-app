<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC"/>
      <stop offset="100%" style="stop-color:#F8BBD9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad8)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#AD1457" text-anchor="middle">🧍 Body Parts</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#E91E63" opacity="0.6"/>
  
  <!-- Body figure -->
  <g transform="translate(250, 200)">
    <!-- Head -->
    <circle cx="0" cy="-100" r="35" fill="#FFCCBC" stroke="#E91E63" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-10" cy="-105" r="4" fill="#333"/>
    <circle cx="10" cy="-105" r="4" fill="#333"/>
    <path d="M-8 -90 Q0 -85 8 -90" stroke="#333" fill="none" stroke-width="2"/>
    
    <!-- Hair -->
    <ellipse cx="0" cy="-130" rx="30" ry="15" fill="#5D4037"/>
    
    <!-- Neck -->
    <rect x="-8" y="-68" width="16" height="15" fill="#FFCCBC"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="-10" rx="40" ry="50" fill="#42A5F5" stroke="#1976D2" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Arms -->
    <ellipse cx="-55" cy="-20" rx="12" ry="35" fill="#FFCCBC" stroke="#E91E63" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="55" cy="-20" rx="12" ry="35" fill="#FFCCBC" stroke="#E91E63" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Hands -->
    <circle cx="-55" cy="20" r="12" fill="#FFCCBC"/>
    <circle cx="55" cy="20" r="12" fill="#FFCCBC"/>
    
    <!-- Legs -->
    <ellipse cx="-18" cy="70" rx="12" ry="35" fill="#5C6BC0" stroke="#3949AB" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="18" cy="70" rx="12" ry="35" fill="#5C6BC0" stroke="#3949AB" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Feet -->
    <ellipse cx="-18" cy="110" rx="15" ry="8" fill="#FFCCBC"/>
    <ellipse cx="18" cy="110" rx="15" ry="8" fill="#FFCCBC"/>
  </g>
  
  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#880E4F" font-weight="bold">
    <text x="130" y="75">head</text>
    <line x1="155" y1="73" x2="210" y2="95" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="365" y="100">hair</text>
    <line x1="365" y1="103" x2="290" y2="75" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="365" y="130">eye</text>
    <line x1="365" y1="133" x2="260" y2="95" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="130" y="130">nose</text>
    <line x1="155" y1="128" x2="240" y2="108" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="365" y="160">mouth</text>
    <line x1="365" y1="158" x2="258" y2="115" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="130" y="170">arm</text>
    <line x1="150" y1="168" x2="195" y2="175" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="365" y="190">hand</text>
    <line x1="365" y1="188" x2="305" y2="215" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="130" y="220">leg</text>
    <line x1="150" y1="218" x2="230" y2="260" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
    
    <text x="365" y="250">foot</text>
    <line x1="365" y1="248" x2="270" y2="305" stroke="#E91E63" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#E91E63" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">8</text>
</svg>