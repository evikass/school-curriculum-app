<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F7FA"/>
      <stop offset="100%" style="stop-color:#B2EBF2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad14)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00838F" text-anchor="middle">⏰ Time</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#00BCD4" opacity="0.6"/>
  
  <!-- Large Clock -->
  <g transform="translate(150, 170)">
    <circle cx="0" cy="0" r="80" fill="white" stroke="#00838F" stroke-width="4"/>
    <circle cx="0" cy="0" r="70" fill="#E0F7FA"/>
    
    <!-- Hour marks -->
    <g font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#006064">
      <text x="0" y="-55" text-anchor="middle">12</text>
      <text x="30" y="-45" text-anchor="middle">1</text>
      <text x="50" y="-25" text-anchor="middle">2</text>
      <text x="58" y="5" text-anchor="middle">3</text>
      <text x="50" y="35" text-anchor="middle">4</text>
      <text x="30" y="55" text-anchor="middle">5</text>
      <text x="0" y="62" text-anchor="middle">6</text>
      <text x="-30" y="55" text-anchor="middle">7</text>
      <text x="-50" y="35" text-anchor="middle">8</text>
      <text x="-58" y="5" text-anchor="middle">9</text>
      <text x="-50" y="-25" text-anchor="middle">10</text>
      <text x="-30" y="-45" text-anchor="middle">11</text>
    </g>
    
    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#00838F" stroke-width="5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="720s" repeatCount="indefinite"/>
    </line>
    
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="0" y2="-55" stroke="#00ACC1" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="60s" repeatCount="indefinite"/>
    </line>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#00838F"/>
  </g>
  
  <!-- Time expressions -->
  <g font-family="Arial, sans-serif">
    <!-- o'clock -->
    <rect x="280" y="70" width="90" height="50" fill="#FFF8E1" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="325" y="95" font-size="12" fill="#F57F17" text-anchor="middle" font-weight="bold">o'clock</text>
    <text x="325" y="110" font-size="9" fill="#FFB74D" text-anchor="middle">ровно</text>
    
    <!-- half past -->
    <rect x="380" y="70" width="100" height="50" fill="#C8E6C9" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="430" y="95" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">half past</text>
    <text x="430" y="110" font-size="9" fill="#66BB6A" text-anchor="middle">половина</text>
    
    <!-- quarter past -->
    <rect x="280" y="130" width="90" height="50" fill="#B3E5FC" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="325" y="152" font-size="10" fill="#0277BD" text-anchor="middle" font-weight="bold">quarter</text>
    <text x="325" y="165" font-size="10" fill="#0277BD" text-anchor="middle" font-weight="bold">past</text>
    <text x="325" y="178" font-size="8" fill="#4FC3F7" text-anchor="middle">четверть</text>
    
    <!-- quarter to -->
    <rect x="380" y="130" width="100" height="50" fill="#FFCDD2" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <text x="430" y="152" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">quarter</text>
    <text x="430" y="165" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">to</text>
    <text x="430" y="178" font-size="8" fill="#EF5350" text-anchor="middle">без четверти</text>
    
    <!-- Example times -->
    <rect x="280" y="195" width="200" height="70" fill="white" rx="10" opacity="0.6"/>
    <text x="380" y="218" font-size="11" fill="#00838F" text-anchor="middle" font-weight="bold">What time is it?</text>
    <text x="380" y="238" font-size="10" fill="#006064" text-anchor="middle">It's 3 o'clock.</text>
    <text x="380" y="258" font-size="10" fill="#006064" text-anchor="middle">It's half past 5.</text>
  </g>
  
  <!-- Digital clock display -->
  <g transform="translate(380, 290)">
    <rect x="-50" y="-15" width="100" height="35" fill="#263238" rx="5"/>
    <text x="0" y="10" font-family="monospace" font-size="20" fill="#00E676" text-anchor="middle">
      <tspan>12:30</tspan>
      <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#00BCD4" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">14</text>
</svg>