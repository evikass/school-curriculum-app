<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad19" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad19)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">🎁 Have got</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#2196F3" opacity="0.6"/>
  
  <!-- Positive form -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="65" width="220" height="130" fill="white" rx="10" opacity="0.9"/>
    <rect x="20" y="65" width="220" height="28" fill="#4CAF50" rx="10"/>
    <rect x="20" y="83" width="220" height="10" fill="#4CAF50"/>
    <text x="130" y="85" font-size="13" fill="white" text-anchor="middle" font-weight="bold">+ Positive</text>
    
    <text x="130" y="110" font-size="11" fill="#2E7D32" text-anchor="middle">I have got a cat.</text>
    <text x="130" y="125" font-size="9" fill="#66BB6A" text-anchor="middle">У меня есть кот.</text>
    <text x="130" y="145" font-size="11" fill="#2E7D32" text-anchor="middle">He has got a dog.</text>
    <text x="130" y="160" font-size="9" fill="#66BB6A" text-anchor="middle">У него есть собака.</text>
    <text x="130" y="180" font-size="10" fill="#1B5E20" text-anchor="middle">I've got / He's got</text>
  </g>
  
  <!-- Negative form -->
  <g font-family="Arial, sans-serif">
    <rect x="260" y="65" width="220" height="130" fill="white" rx="10" opacity="0.9"/>
    <rect x="260" y="65" width="220" height="28" fill="#F44336" rx="10"/>
    <rect x="260" y="83" width="220" height="10" fill="#F44336"/>
    <text x="370" y="85" font-size="13" fill="white" text-anchor="middle" font-weight="bold">− Negative</text>
    
    <text x="370" y="110" font-size="11" fill="#C62828" text-anchor="middle">I haven't got a cat.</text>
    <text x="370" y="125" font-size="9" fill="#EF5350" text-anchor="middle">У меня нет кота.</text>
    <text x="370" y="145" font-size="11" fill="#C62828" text-anchor="middle">He hasn't got a dog.</text>
    <text x="370" y="160" font-size="9" fill="#EF5350" text-anchor="middle">У него нет собаки.</text>
    <text x="370" y="180" font-size="10" fill="#B71C1C" text-anchor="middle">haven't got / hasn't got</text>
  </g>
  
  <!-- Question form -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="205" width="460" height="80" fill="white" rx="10" opacity="0.9"/>
    <rect x="20" y="205" width="460" height="28" fill="#FF9800" rx="10"/>
    <rect x="20" y="223" width="460" height="10" fill="#FF9800"/>
    <text x="250" y="225" font-size="13" fill="white" text-anchor="middle" font-weight="bold">? Question</text>
    
    <text x="130" y="255" font-size="11" fill="#E65100" text-anchor="middle">Have you got a pet?</text>
    <text x="130" y="270" font-size="9" fill="#FFB74D" text-anchor="middle">У тебя есть питомец?</text>
    
    <text x="370" y="255" font-size="11" fill="#E65100" text-anchor="middle">Has he got a bike?</text>
    <text x="370" y="270" font-size="9" fill="#FFB74D" text-anchor="middle">У него есть велосипед?</text>
  </g>
  
  <!-- Short answers -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="295" width="220" height="40" fill="#C8E6C9" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="315" font-size="10" fill="#2E7D32" text-anchor="middle">Yes, I have. / Yes, he has.</text>
    <text x="130" y="330" font-size="8" fill="#66BB6A" text-anchor="middle">Да. / Да.</text>
    
    <rect x="260" y="295" width="220" height="40" fill="#FFCDD2" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="315" font-size="10" fill="#C62828" text-anchor="middle">No, I haven't. / No, he hasn't.</text>
    <text x="370" y="330" font-size="8" fill="#EF5350" text-anchor="middle">Нет. / Нет.</text>
  </g>
  
  <!-- Decorative icons -->
  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="15" fill="#FFD54F">
      <animate attributeName="r" values="15;18;15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" font-size="14" text-anchor="middle">🎁</text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#2196F3" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">19</text>
</svg>