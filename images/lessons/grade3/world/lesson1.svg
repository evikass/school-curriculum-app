<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="art1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F48FB1;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#art1)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#AD1457" text-anchor="middle">🎨 Жанры живописи</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E91E63" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#F48FB1" opacity="0.4"/>
  
  <!-- Art genres -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif">
    <!-- Portrait -->
    <rect x="0" y="0" width="130" height="110" fill="#FCE4EC" rx="8" stroke="#E91E63"/>
    <text x="65" y="18" font-size="10" font-weight="bold" fill="#880E4F" text-anchor="middle">Портрет</text>
    <circle cx="65" cy="55" r="25" fill="#FFCCBC"/>
    <circle cx="55" cy="50" r="3" fill="#333"/>
    <circle cx="75" cy="50" r="3" fill="#333"/>
    <ellipse cx="65" cy="62" rx="8" ry="3" fill="#E91E63"/>
    <text x="65" y="100" font-size="8" fill="#C2185B" text-anchor="middle">изображение человека</text>
    
    <!-- Landscape -->
    <rect x="150" y="0" width="130" height="110" fill="#C8E6C9" rx="8" stroke="#4CAF50"/>
    <text x="215" y="18" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пейзаж</text>
    <rect x="165" y="30" width="100" height="50" fill="#87CEEB"/>
    <polygon points="175,80 200,50 225,80" fill="#4CAF50"/>
    <polygon points="215,80 240,45 265,80" fill="#388E3C"/>
    <ellipse cx="215" cy="85" rx="50" ry="15" fill="#8BC34A"/>
    <text x="215" y="100" font-size="8" fill="#2E7D32" text-anchor="middle">изображение природы</text>
    
    <!-- Still life -->
    <rect x="300" y="0" width="130" height="110" fill="#FFECB3" rx="8" stroke="#FF9800"/>
    <text x="365" y="18" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Натюрморт</text>
    <ellipse cx="345" cy="70" rx="15" ry="12" fill="#E91E63"/>
    <ellipse cx="380" cy="68" rx="12" ry="15" fill="#FF9800"/>
    <rect x="320" y="75" width="90" height="20" fill="#8D6E63" rx="2"/>
    <text x="365" y="100" font-size="8" fill="#F57C00" text-anchor="middle">предметы, фрукты</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="400" height="100" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Жанр — это вид произведения искусства</text>
    <text x="200" y="40" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">Каждый художник выбирает свой жанр</text>
    <text x="200" y="60" font-family="Arial, sans-serif" font-size="9" fill="#8E24AA" text-anchor="middle">Портретисты: В.А. Серов, И.Е. Репин</text>
    <text x="200" y="75" font-family="Arial, sans-serif" font-size="9" fill="#8E24AA" text-anchor="middle">Пейзажисты: И.И. Левитан, И.И. Шишкин</text>
    <text x="200" y="90" font-family="Arial, sans-serif" font-size="9" fill="#9C27B0" text-anchor="middle">Попробуй нарисовать в каждом жанре!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>