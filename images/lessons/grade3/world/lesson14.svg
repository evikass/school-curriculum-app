<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="sky14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64B5F6"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="leaf14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AED581"/>
      <stop offset="100%" style="stop-color:#7CB342"/>
    </linearGradient>
    <linearGradient id="recycle14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky14)"/>

  <!-- Sun -->
  <circle cx="450" cy="50" r="30" fill="#FFD54F">
    <animate attributeName="r" values="28;32;28" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFD54F" stroke-width="2" opacity="0.7">
    <line x1="450" y1="10" x2="450" y2="0"/>
    <line x1="480" y1="20" x2="490" y2="10"/>
    <line x1="490" y1="50" x2="500" y2="50"/>
    <line x1="420" y1="20" x2="410" y2="10"/>
    <line x1="410" y1="50" x2="400" y2="50"/>
  </g>

  <!-- Title -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B5E20" text-anchor="middle">🌿 Охрана природы</text>
  <rect x="80" y="38" width="340" height="2" rx="1" fill="#388E3C" opacity="0.5"/>

  <!-- Earth with hands -->
  <g transform="translate(250, 120)">
    <!-- Earth -->
    <circle cx="0" cy="0" r="45" fill="#4FC3F7">
      <animate attributeName="r" values="45;47;45" dur="4s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="-15" cy="-10" rx="18" ry="15" fill="#81C784"/>
    <ellipse cx="15" cy="15" rx="20" ry="12" fill="#66BB6A"/>
    <ellipse cx="-20" cy="20" rx="12" ry="8" fill="#A5D6A7"/>
    <ellipse cx="20" cy="-20" rx="10" ry="8" fill="#81C784"/>
    
    <!-- Protecting hands -->
    <path d="M-60,20 Q-55,0 -45,-10 Q-35,-15 -30,-5 Q-25,5 -35,15 Q-45,25 -55,25 Q-60,25 -60,20" fill="#FFCCBC" stroke="#E64A19" stroke-width="1"/>
    <path d="M60,20 Q55,0 45,-10 Q35,-15 30,-5 Q25,5 35,15 Q45,25 55,25 Q60,25 60,20" fill="#FFCCBC" stroke="#E64A19" stroke-width="1"/>
    
    <!-- Heart -->
    <path d="M0,15 C-5,8 -15,8 -15,18 C-15,28 0,38 0,38 C0,38 15,28 15,18 C15,8 5,8 0,15" fill="#E91E63">
      <animate attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Recycling -->
  <g transform="translate(20, 180)">
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#4CAF50"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">♻️ Переработка</text>
    
    <!-- Recycle symbol -->
    <g transform="translate(55, 55)">
      <path d="M0,-20 L10,-5 L5,-5 L5,8 L-5,8 L-5,-5 L-10,-5 Z" fill="url(#recycle14)">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-20 L10,-5 L5,-5 L5,8 L-5,8 L-5,-5 L-10,-5 Z" fill="url(#recycle14)">
        <animateTransform attributeName="transform" type="rotate" values="120;480" dur="8s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-20 L10,-5 L5,-5 L5,8 L-5,8 L-5,-5 L-10,-5 Z" fill="url(#recycle14)">
        <animateTransform attributeName="transform" type="rotate" values="240;600" dur="8s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <text x="55" y="90" font-family="Arial, sans-serif" font-size="8" fill="#388E3C" text-anchor="middle">сортируй мусор</text>
  </g>

  <!-- Tree planting -->
  <g transform="translate(140, 180)">
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#4CAF50"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">🌳 Посадка деревьев</text>
    
    <!-- Small tree -->
    <rect x="30" y="55" width="8" height="30" fill="#6D4C41"/>
    <ellipse cx="34" cy="50" rx="15" ry="18" fill="#66BB6A">
      <animate attributeName="ry" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Person planting -->
    <circle cx="70" cy="55" r="8" fill="#FFCCBC"/>
    <rect x="62" y="63" width="16" height="20" fill="#2196F3" rx="3"/>
    <rect x="78" y="65" width="3" height="15" fill="#8D6E63"/>
    <ellipse cx="70" cy="83" rx="10" ry="3" fill="#5D4037"/>
    
    <text x="55" y="95" font-family="Arial, sans-serif" font-size="8" fill="#388E3C" text-anchor="middle">сажай растения</text>
  </g>

  <!-- Water saving -->
  <g transform="translate(260, 180)">
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#2196F3"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">💧 Экономия воды</text>
    
    <!-- Water drop -->
    <path d="M35,35 Q20,55 35,75 Q50,55 35,35" fill="#4FC3F7">
      <animate attributeName="d" values="M35,35 Q20,55 35,75 Q50,55 35,35;M35,30 Q18,55 35,80 Q52,55 35,30;M35,35 Q20,55 35,75 Q50,55 35,35" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Faucet -->
    <rect x="55" y="30" width="15" height="8" fill="#78909C"/>
    <rect x="60" y="38" width="5" height="20" fill="#546E7A"/>
    <ellipse cx="62" cy="62" rx="3" ry="2" fill="#4FC3F7">
      <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Closed tap sign -->
    <circle cx="85" cy="50" r="15" fill="none" stroke="#4CAF50" stroke-width="2"/>
    <text x="85" y="55" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">✓</text>
    
    <text x="55" y="95" font-family="Arial, sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">закрывай кран</text>
  </g>

  <!-- Protected areas -->
  <g transform="translate(380, 180)">
    <rect x="0" y="0" width="110" height="100" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#FF9800"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">🦁 Заповедники</text>
    
    <!-- Deer -->
    <ellipse cx="45" cy="60" rx="15" ry="10" fill="#8D6E63"/>
    <ellipse cx="35" cy="50" rx="8" ry="7" fill="#A1887F"/>
    <path d="M32,43 L28,30 M38,43 L42,30" stroke="#5D4037" stroke-width="2" fill="none"/>
    <line x1="55" y1="60" x2="65" y2="75" stroke="#6D4C41" stroke-width="3"/>
    <line x1="45" y1="60" x2="55" y2="75" stroke="#6D4C41" stroke-width="3"/>
    
    <!-- Bird -->
    <ellipse cx="80" cy="45" rx="8" ry="5" fill="#FF5722"/>
    <polygon points="88,45 95,43 88,47" fill="#FF9800"/>
    <circle cx="85" cy="43" r="2" fill="#000000"/>
    
    <!-- Tree -->
    <rect x="90" y="50" width="5" height="25" fill="#6D4C41"/>
    <ellipse cx="92" cy="45" rx="10" ry="12" fill="#66BB6A"/>
    
    <text x="55" y="95" font-family="Arial, sans-serif" font-size="8" fill="#E65100" text-anchor="middle">охраняй животных</text>
  </g>

  <!-- Action tips -->
  <g transform="translate(30, 295)">
    <rect x="0" y="0" width="440" height="40" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#4CAF50"/>
    <text x="220" y="15" font-family="Arial, sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">💡 Что может сделать каждый:</text>
    <text x="220" y="32" font-family="Arial, sans-serif" font-size="9" fill="#388E3C" text-anchor="middle">Не мусори • Экономь воду и электричество • Сажай деревья • Береги животных • Сортируй отходы</text>
  </g>

  <!-- Floating leaves -->
  <g opacity="0.6">
    <ellipse cx="50" cy="100" rx="8" ry="4" fill="url(#leaf14)" transform="rotate(30,50,100)">
      <animate attributeName="cy" values="100;120;100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="50;60;50" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="130" rx="7" ry="3" fill="url(#leaf14)" transform="rotate(-20,450,130)">
      <animate attributeName="cy" values="130;150;130" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="450;440;450" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Bottom text -->
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">
    Природа — наш дом. Давайте беречь её вместе! 🌍💚
  </text>
</svg>