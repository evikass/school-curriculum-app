<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="worldBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#worldBg2)"/>
  
  <!-- Sun -->
  <circle cx="70" cy="55" r="28" fill="#FFD700" opacity="0.9">
    <animate attributeName="r" values="28;32;28" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFD700" stroke-width="2" opacity="0.5">
    <line x1="70" y1="15" x2="70" y2="5"/>
    <line x1="35" y1="25" x2="25" y2="15"/>
    <line x1="105" y1="25" x2="115" y2="15"/>
    <animateTransform attributeName="transform" type="rotate" from="0 70 55" to="360 70 55" dur="15s" repeatCount="indefinite"/>
  </g>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="200" cy="45" rx="32" ry="18" fill="white"/>
    <ellipse cx="230" cy="40" rx="26" ry="15" fill="white"/>
  </g>
  
  <!-- Ground layers -->
  <ellipse cx="250" cy="380" rx="300" ry="60" fill="#8D6E63" opacity="0.3"/>
  
  <!-- Trees -->
  <g opacity="0.3">
    <ellipse cx="465" cy="270" rx="26" ry="42" fill="#228B22"/>
    <rect x="460" y="270" width="10" height="26" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#FF9800"/>
    <circle cx="47" cy="320" r="4" fill="#FFCC80"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#5D4037" text-anchor="middle">🌍 Почва</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#5D4037" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#795548" stroke-width="2"/>
  
  <!-- Soil layers -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#5D4037" text-anchor="middle">Строение почвы</text>
  
  <g transform="translate(60, 95)">
    <!-- Layer 1 - Humus -->
    <rect x="0" y="0" width="150" height="35" fill="#3E2723"/>
    <text x="75" y="15" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Перегной</text>
    <text x="75" y="28" font-size="7" fill="#CCC" text-anchor="middle">Плодородный слой</text>
    
    <!-- Layer 2 -->
    <rect x="0" y="40" width="150" height="30" fill="#5D4037"/>
    <text x="75" y="58" font-size="9" fill="white" text-anchor="middle">Подпочва</text>
    
    <!-- Layer 3 -->
    <rect x="0" y="75" width="150" height="30" fill="#8D6E63"/>
    <text x="75" y="93" font-size="9" fill="#333" text-anchor="middle">Горная порода</text>
  </g>
  
  <!-- Soil composition -->
  <g transform="translate(240, 95)">
    <rect x="0" y="0" width="200" height="105" rx="8" fill="#FFF3E0" stroke="#795548"/>
    <text x="100" y="18" font-size="10" font-weight="bold" fill="#5D4037" text-anchor="middle">Состав почвы:</text>
    
    <g transform="translate(15, 28)">
      <circle cx="15" cy="15" r="12" fill="#4CAF50"/>
      <text x="35" y="20" font-size="9" fill="#333">Воздух</text>
      
      <circle cx="100" cy="15" r="12" fill="#2196F3"/>
      <text x="120" y="20" font-size="9" fill="#333">Вода</text>
    </g>
    
    <g transform="translate(15, 60)">
      <circle cx="15" cy="15" r="12" fill="#795548"/>
      <text x="35" y="20" font-size="9" fill="#333">Минералы</text>
      
      <circle cx="100" cy="15" r="12" fill="#3E2723"/>
      <text x="120" y="20" font-size="9" fill="#333">Перегной</text>
    </g>
  </g>
  
  <!-- Key points -->
  <rect x="50" y="215" width="400" height="55" rx="10" fill="#FBE9E7" stroke="#795548"/>
  <text x="250" y="235" font-size="11" font-weight="bold" fill="#5D4037" text-anchor="middle">🌟 Почему почва важна</text>
  <text x="70" y="255" font-size="9" fill="#333">📌 Растения растут в почве</text>
  <text x="260" y="255" font-size="9" fill="#333">📌 Дом для животных и бактерий</text>
  
  <!-- Plants in soil -->
  <g transform="translate(250, 285)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="#4CAF50" stroke-width="3"/>
    <ellipse cx="0" cy="-5" rx="12" ry="8" fill="#66BB6A"/>
    <rect x="-20" y="25" width="40" height="15" fill="#5D4037" opacity="0.7"/>
  </g>
  
  <!-- Decorative worm -->
  <g transform="translate(80, 290)" opacity="0.6">
    <path d="M0 10 Q5 5 10 10 Q15 15 20 10" stroke="#795548" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Flower in soil -->
  <g transform="translate(400, 285)" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="20" stroke="#4CAF50" stroke-width="2"/>
    <circle cx="0" cy="-5" r="6" fill="#E91E63"/>
    <rect x="-15" y="20" width="30" height="12" fill="#5D4037"/>
  </g>
</svg>