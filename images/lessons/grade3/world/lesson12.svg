<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ECEFF1"/>
      <stop offset="100%" style="stop-color:#CFD8DC"/>
    </linearGradient>
    <linearGradient id="sand12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE0B2"/>
      <stop offset="100%" style="stop-color:#FFCC80"/>
    </linearGradient>
    <linearGradient id="stone12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0BEC5"/>
      <stop offset="100%" style="stop-color:#78909C"/>
    </linearGradient>
    <linearGradient id="salt12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
    <linearGradient id="clay12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A1887F"/>
      <stop offset="100%" style="stop-color:#8D6E63"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg12)"/>

  <!-- Title -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F" text-anchor="middle">🪨 Нерудные ископаемые</text>
  <rect x="80" y="38" width="340" height="2" rx="1" fill="#607D8B" opacity="0.5"/>

  <!-- Sand section -->
  <g transform="translate(20, 55)">
    <rect x="0" y="0" width="145" height="130" rx="10" fill="#FFF8E1" stroke="#FFB74D" stroke-width="2"/>
    <text x="72" y="22" font-family="Arial, sans-serif" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">🏖️ Песок</text>
    
    <!-- Sand pile -->
    <ellipse cx="72" cy="90" rx="50" ry="20" fill="url(#sand12)"/>
    <path d="M22,90 Q72,50 122,90" fill="url(#sand12)"/>
    
    <!-- Sand grains animation -->
    <g fill="#FFCC80">
      <circle cx="40" cy="75" r="2">
        <animate attributeName="cy" values="75;78;75" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="70" r="1.5">
        <animate attributeName="cy" values="70;73;70" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="72" cy="68" r="2">
        <animate attributeName="cy" values="68;71;68" dur="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="90" cy="72" r="1.5">
        <animate attributeName="cy" values="72;75;72" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="105" cy="78" r="2">
        <animate attributeName="cy" values="78;81;78" dur="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Hourglass -->
    <g transform="translate(105, 85)">
      <polygon points="0,0 30,0 15,20" fill="none" stroke="#8D6E63" stroke-width="2"/>
      <polygon points="0,40 30,40 15,20" fill="none" stroke="#8D6E63" stroke-width="2"/>
      <polygon points="5,2 25,2 15,18" fill="url(#sand12)"/>
    </g>
    
    <text x="72" y="120" font-family="Arial, sans-serif" font-size="8" fill="#EF6C00" text-anchor="middle">для строительства</text>
  </g>

  <!-- Stone/Granite section -->
  <g transform="translate(175, 55)">
    <rect x="0" y="0" width="145" height="130" rx="10" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
    <text x="72" y="22" font-family="Arial, sans-serif" font-size="12" fill="#37474F" text-anchor="middle" font-weight="bold">⛰️ Камень</text>
    
    <!-- Rocks -->
    <polygon points="30,100 50,60 80,70 90,100 60,110" fill="url(#stone12)" stroke="#546E7A" stroke-width="1">
      <animate attributeName="opacity" values="1;0.9;1" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="85,95 110,55 130,65 125,100 100,105" fill="url(#stone12)" stroke="#546E7A" stroke-width="1"/>
    
    <!-- Rock details -->
    <ellipse cx="55" cy="80" rx="8" ry="4" fill="#90A4AE" opacity="0.5"/>
    <ellipse cx="105" cy="75" rx="6" ry="3" fill="#B0BEC5" opacity="0.5"/>
    
    <!-- Building from stone -->
    <rect x="30" y="105" width="25" height="20" fill="url(#stone12)" stroke="#546E7A"/>
    <rect x="60" y="105" width="25" height="20" fill="url(#stone12)" stroke="#546E7A"/>
    <rect x="95" y="105" width="25" height="20" fill="url(#stone12)" stroke="#546E7A"/>
    
    <text x="72" y="120" font-family="Arial, sans-serif" font-size="8" fill="#455A64" text-anchor="middle">памятники, здания</text>
  </g>

  <!-- Salt section -->
  <g transform="translate(330, 55)">
    <rect x="0" y="0" width="150" height="130" rx="10" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
    <text x="75" y="22" font-family="Arial, sans-serif" font-size="12" fill="#37474F" text-anchor="middle" font-weight="bold">🧂 Соль</text>
    
    <!-- Salt mound -->
    <ellipse cx="50" cy="90" rx="30" ry="15" fill="url(#salt12)"/>
    <path d="M20,90 Q50,55 80,90" fill="url(#salt12)"/>
    
    <!-- Salt crystals -->
    <g fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5">
      <rect x="40" y="70" width="8" height="8" transform="rotate(15,44,74)">
        <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="55" y="68" width="6" height="6" transform="rotate(-10,58,71)">
        <animate attributeName="opacity" values="1;0.8;1" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="78" width="5" height="5" transform="rotate(30,50,80)"/>
    </g>
    
    <!-- Salt shaker -->
    <g transform="translate(95, 55)">
      <rect x="0" y="20" width="30" height="40" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1" rx="3"/>
      <rect x="5" y="10" width="20" height="12" fill="#BDBDBD" rx="2"/>
      <circle cx="10" cy="8" r="1" fill="#37474F"/>
      <circle cx="15" cy="6" r="1" fill="#37474F"/>
      <circle cx="20" cy="8" r="1" fill="#37474F"/>
      <text x="15" y="45" font-family="Arial, sans-serif" font-size="8" fill="#9E9E9E" text-anchor="middle">соль</text>
    </g>
    
    <text x="75" y="120" font-family="Arial, sans-serif" font-size="8" fill="#616161" text-anchor="middle">в пищу, консервация</text>
  </g>

  <!-- Clay section -->
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="145" height="90" rx="10" fill="#EFEBE9" stroke="#8D6E63" stroke-width="2"/>
    <text x="72" y="20" font-family="Arial, sans-serif" font-size="12" fill="#4E342E" text-anchor="middle" font-weight="bold">🏺 Глина</text>
    
    <!-- Clay lump -->
    <ellipse cx="45" cy="55" rx="25" ry="18" fill="url(#clay12)" stroke="#6D4C41"/>
    
    <!-- Pot from clay -->
    <path d="M90,40 Q85,50 85,60 Q85,75 100,75 Q115,75 115,60 Q115,50 110,40 Z" fill="url(#clay12)" stroke="#6D4C41" stroke-width="1.5"/>
    <ellipse cx="100" cy="40" rx="12" ry="4" fill="#A1887F"/>
    
    <text x="72" y="85" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">посуда, кирпичи</text>
  </g>

  <!-- Gravel section -->
  <g transform="translate(175, 200)">
    <rect x="0" y="0" width="145" height="90" rx="10" fill="#ECEFF1" stroke="#78909C" stroke-width="2"/>
    <text x="72" y="20" font-family="Arial, sans-serif" font-size="12" fill="#37474F" text-anchor="middle" font-weight="bold">🔵 Щебень</text>
    
    <!-- Gravel pieces -->
    <g fill="url(#stone12)" stroke="#546E7A" stroke-width="0.5">
      <ellipse cx="30" cy="45" rx="10" ry="8">
        <animate attributeName="cx" values="30;32;30" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="55" cy="50" rx="12" ry="9"/>
      <ellipse cx="82" cy="45" rx="9" ry="7"/>
      <ellipse cx="110" cy="50" rx="11" ry="8"/>
      <ellipse cx="40" cy="65" rx="8" ry="6"/>
      <ellipse cx="65" cy="68" rx="10" ry="7"/>
      <ellipse cx="95" cy="65" rx="9" ry="7"/>
    </g>
    
    <text x="72" y="85" font-family="Arial, sans-serif" font-size="8" fill="#455A64" text-anchor="middle">дороги, бетон</text>
  </g>

  <!-- Chalk/Limestone section -->
  <g transform="translate(330, 200)">
    <rect x="0" y="0" width="150" height="90" rx="10" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="12" fill="#37474F" text-anchor="middle" font-weight="bold">✏️ Мел</text>
    
    <!-- Chalk pieces -->
    <rect x="25" y="40" width="8" height="35" fill="#FFFFFF" stroke="#E0E0E0" rx="2"/>
    <rect x="45" y="45" width="8" height="30" fill="#FFFDE7" stroke="#FFF59D" rx="2"/>
    <rect x="65" y="42" width="8" height="33" fill="#FFECB3" stroke="#FFD54F" rx="2"/>
    
    <!-- Chalkboard -->
    <rect x="85" y="35" width="50" height="45" fill="#2E7D32" stroke="#1B5E20" stroke-width="2" rx="2"/>
    <text x="110" y="62" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">АБВ</text>
    
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="8" fill="#616161" text-anchor="middle">школьные мелки</text>
  </g>

  <!-- Bottom text -->
  <text x="250" y="340" font-family="Arial, sans-serif" font-size="10" fill="#37474F" text-anchor="middle">
    Нерудные ископаемые — строительные материалы и сырьё
  </text>
</svg>