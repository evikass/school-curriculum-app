<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="worldBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8BBD9;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#worldBg3)"/>
  
  <!-- Decorative circles -->
  <circle cx="55" cy="55" r="30" fill="#E91E63" opacity="0.12"/>
  <circle cx="455" cy="295" r="40" fill="#E91E63" opacity="0.1"/>
  
  <!-- Sun -->
  <circle cx="440" cy="50" r="22" fill="#FFD700" opacity="0.85">
    <animate attributeName="r" values="22;26;22" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="120" cy="45" rx="28" ry="16" fill="white"/>
    <ellipse cx="145" cy="40" rx="22" ry="13" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#E91E63"/>
    <circle cx="47" cy="320" r="4" fill="#F48FB1"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#EC407A"/>
    <circle cx="458" cy="320" r="4" fill="#F06292"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C2185B" text-anchor="middle">🫀 Организм человека</text>
  <rect x="80" y="45" width="340" height="3" rx="2" fill="#C2185B" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#E91E63" stroke-width="2"/>
  
  <!-- Body systems -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#C2185B" text-anchor="middle">Системы органов человека</text>
  
  <!-- Systems grid -->
  <g transform="translate(45, 95)">
    <!-- Skeleton -->
    <rect x="0" y="0" width="130" height="65" rx="8" fill="#FCE4EC" stroke="#E91E63"/>
    <text x="65" y="16" font-size="9" font-weight="bold" fill="#C2185B" text-anchor="middle">🦴 Скелет</text>
    <text x="65" y="35" font-size="20" text-anchor="middle">🦴</text>
    <text x="65" y="55" font-size="7" fill="#333" text-anchor="middle">Опора тела, защита органов</text>
    
    <!-- Muscles -->
    <rect x="140" y="0" width="130" height="65" rx="8" fill="#F3E5F5" stroke="#9C27B0"/>
    <text x="205" y="16" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle">💪 Мышцы</text>
    <text x="205" y="35" font-size="20" text-anchor="middle">💪</text>
    <text x="205" y="55" font-size="7" fill="#333" text-anchor="middle">Движение тела</text>
    
    <!-- Heart -->
    <rect x="280" y="0" width="130" height="65" rx="8" fill="#FFEBEE" stroke="#F44336"/>
    <text x="345" y="16" font-size="9" font-weight="bold" fill="#D32F2F" text-anchor="middle">❤️ Сердце</text>
    <text x="345" y="35" font-size="20" text-anchor="middle">❤️</text>
    <text x="345" y="55" font-size="7" fill="#333" text-anchor="middle">Кровообращение</text>
    
    <!-- Lungs -->
    <rect x="0" y="75" width="130" height="65" rx="8" fill="#E3F2FD" stroke="#2196F3"/>
    <text x="65" y="91" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">🫁 Лёгкие</text>
    <text x="65" y="110" font-size="20" text-anchor="middle">🫁</text>
    <text x="65" y="130" font-size="7" fill="#333" text-anchor="middle">Дыхание</text>
    
    <!-- Brain -->
    <rect x="140" y="75" width="130" height="65" rx="8" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="205" y="91" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">🧠 Мозг</text>
    <text x="205" y="110" font-size="20" text-anchor="middle">🧠</text>
    <text x="205" y="130" font-size="7" fill="#333" text-anchor="middle">Управление организмом</text>
    
    <!-- Stomach -->
    <rect x="280" y="75" width="130" height="65" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
    <text x="345" y="91" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">🍽️ Пищеварение</text>
    <text x="345" y="110" font-size="20" text-anchor="middle">🍽️</text>
    <text x="345" y="130" font-size="7" fill="#333" text-anchor="middle">Переработка пищи</text>
  </g>
  
  <!-- Health tips -->
  <rect x="50" y="245" width="400" height="55" rx="10" fill="#FCE4EC" stroke="#E91E63"/>
  <text x="250" y="265" font-size="11" font-weight="bold" fill="#C2185B" text-anchor="middle">🌟 Правила здорового образа жизни</text>
  <text x="70" y="285" font-size="9" fill="#333">📌 Правильное питание</text>
  <text x="200" y="285" font-size="9" fill="#333">📌 Движение и спорт</text>
  <text x="320" y="285" font-size="9" fill="#333">📌 Сон и отдых</text>
  
  <!-- Animated heart -->
  <g transform="translate(250, 300)">
    <text font-size="16" text-anchor="middle">
      ❤️
      <animate attributeName="opacity" values="1;0.6;1" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>