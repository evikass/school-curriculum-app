<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="mathBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#mathBg3)"/>
  
  <!-- Decorative circles -->
  <circle cx="55" cy="55" r="32" fill="#FF9800" opacity="0.12"/>
  <circle cx="455" cy="295" r="42" fill="#FF9800" opacity="0.1"/>
  
  <!-- Sun -->
  <circle cx="70" cy="50" r="25" fill="#FFD700" opacity="0.9">
    <animate attributeName="r" values="25;28;25" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="200" cy="45" rx="30" ry="18" fill="white"/>
    <ellipse cx="225" cy="40" rx="24" ry="14" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="470" cy="280" rx="25" ry="38" fill="#228B22"/>
    <rect x="465" y="280" width="10" height="22" fill="#8B4513"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#FF9800"/>
    <circle cx="47" cy="320" r="4" fill="#FFB74D"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#F57C00"/>
    <circle cx="458" cy="320" r="4" fill="#FF9800"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">➕ Сложение и вычитание</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#E65100" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.9" stroke="#E65100" stroke-width="2"/>
  
  <!-- Addition section -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="190" height="100" rx="10" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="95" y="20" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">➕ Сложение</text>
    
    <text x="95" y="50" font-size="18" fill="#333" text-anchor="middle">245 + 132 = ?</text>
    
    <g transform="translate(20, 60)">
      <text x="0" y="12" font-size="10" fill="#666">200 + 100 = 300</text>
      <text x="0" y="26" font-size="10" fill="#666">40 + 30 = 70</text>
      <text x="0" y="40" font-size="10" fill="#666">5 + 2 = 7</text>
      <text x="100" y="30" font-size="12" font-weight="bold" fill="#E65100">= 377</text>
    </g>
  </g>
  
  <!-- Subtraction section -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="190" height="100" rx="10" fill="#E3F2FD" stroke="#2196F3"/>
    <text x="95" y="20" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">➖ Вычитание</text>
    
    <text x="95" y="50" font-size="18" fill="#333" text-anchor="middle">456 - 234 = ?</text>
    
    <g transform="translate(20, 60)">
      <text x="0" y="12" font-size="10" fill="#666">400 - 200 = 200</text>
      <text x="0" y="26" font-size="10" fill="#666">50 - 30 = 20</text>
      <text x="0" y="40" font-size="10" fill="#666">6 - 4 = 2</text>
      <text x="100" y="30" font-size="12" font-weight="bold" fill="#1565C0">= 222</text>
    </g>
  </g>
  
  <!-- Key points -->
  <rect x="50" y="195" width="400" height="80" rx="10" fill="#FFFDE7" stroke="#E65100"/>
  <text x="250" y="215" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">🌟 Поразрядное сложение и вычитание</text>
  <text x="70" y="235" font-size="9" fill="#333">📌 Складываем/вычитаем по разрядам</text>
  <text x="70" y="250" font-size="9" fill="#333">📌 Начинаем с единиц, потом десятки, сотни</text>
  <text x="70" y="265" font-size="9" fill="#333">📌 Записываем результат</text>
  
  <!-- Animated plus/minus -->
  <g transform="translate(250, 290)">
    <text font-size="20" fill="#E65100" text-anchor="middle">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
      ➕➖
    </text>
  </g>
  
  <!-- Calculator decoration -->
  <g transform="translate(60, 285)" opacity="0.5">
    <rect x="0" y="0" width="28" height="32" rx="3" fill="#FF9800"/>
    <rect x="3" y="3" width="22" height="8" fill="white"/>
    <text x="14" y="10" font-size="6" fill="#333" text-anchor="middle">=</text>
  </g>
</svg>