<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math13)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">📐 Периметр прямоугольника</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81C784" opacity="0.5"/>
  
  <!-- Rectangle -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="250" height="130" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- Dimensions -->
    <text x="125" y="-10" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">a = 5 см</text>
    <text x="270" y="65" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">b = 3 см</text>
    
    <!-- Corner marks -->
    <rect x="0" y="0" width="15" height="15" fill="none" stroke="#388E3C" stroke-width="2"/>
    <rect x="235" y="0" width="15" height="15" fill="none" stroke="#388E3C" stroke-width="2"/>
    <rect x="0" y="115" width="15" height="15" fill="none" stroke="#388E3C" stroke-width="2"/>
    <rect x="235" y="115" width="15" height="15" fill="none" stroke="#388E3C" stroke-width="2"/>
    
    <!-- Formula -->
    <text x="125" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">P = (a + b) × 2</text>
  </g>
  
  <!-- Formula explanation -->
  <g transform="translate(50, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="45" fill="#DCEDC8" rx="8" stroke="#7CB342"/>
    <text x="200" y="18" font-size="12" fill="#33691E" text-anchor="middle">P = (5 + 3) × 2 = 8 × 2 = 16 см</text>
    <text x="200" y="35" font-size="10" fill="#558B2F" text-anchor="middle">Периметр — сумма длин всех сторон</text>
  </g>
  
  <!-- Note -->
  <g transform="translate(100, 285)">
    <rect x="0" y="0" width="300" height="30" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">💡 Для квадрата: P = a × 4</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>