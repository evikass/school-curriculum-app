<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1BEE7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math10)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6A1B9A" text-anchor="middle">📝 Задачи на умножение</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#9C27B0" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#CE93D8" opacity="0.4"/>
  
  <!-- When to multiply -->
  <g transform="translate(50, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="60" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="200" y="22" font-size="13" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Когда использовать умножение?</text>
    <text x="200" y="40" font-size="11" fill="#7B1FA2" text-anchor="middle">• Нужно найти общее количество предметов</text>
    <text x="200" y="55" font-size="11" fill="#7B1FA2" text-anchor="middle">• Есть несколько одинаковых групп</text>
  </g>
  
  <!-- Example problem -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="400" height="100" fill="#EDE7F6" rx="8" stroke="#7B1FA2"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4A148C" text-anchor="middle">Задача</text>
    <text x="200" y="45" font-family="Arial, sans-serif" font-size="11" fill="#6A1B9A" text-anchor="middle">В 6 коробках по 8 карандашей. Сколько всего?</text>
    
    <!-- Visual -->
    <g transform="translate(50, 55)">
      <rect x="0" y="0" width="50" height="35" fill="#FFB74D" rx="3"/>
      <text x="25" y="22" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">8</text>
      
      <rect x="60" y="0" width="50" height="35" fill="#FFB74D" rx="3"/>
      <text x="85" y="22" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">8</text>
      
      <rect x="120" y="0" width="50" height="35" fill="#FFB74D" rx="3"/>
      <text x="145" y="22" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">8</text>
      
      <text x="185" y="22" font-family="Arial, sans-serif" font-size="14" fill="#6A1B9A">...</text>
      
      <rect x="210" y="0" width="50" height="35" fill="#FFB74D" rx="3"/>
      <text x="235" y="22" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">8</text>
      
      <text x="280" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4A148C">= 6 × 8 = 48</text>
    </g>
  </g>
  
  <!-- Answer -->
  <g transform="translate(150, 280)">
    <rect x="0" y="0" width="200" height="30" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">Ответ: 48 карандашей</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>