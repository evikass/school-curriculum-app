<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="mathBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#mathBg2)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#4CAF50" opacity="0.12"/>
  <circle cx="460" cy="295" r="40" fill="#4CAF50" opacity="0.1"/>
  
  <!-- Sun -->
  <circle cx="430" cy="55" r="22" fill="#FFD700" opacity="0.85">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="110" cy="45" rx="28" ry="16" fill="white"/>
    <ellipse cx="135" cy="40" rx="22" ry="13" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#8B4513"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#4CAF50"/>
    <circle cx="47" cy="320" r="4" fill="#81C784"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#388E3C"/>
    <circle cx="458" cy="320" r="4" fill="#66BB6A"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">📊 Разряды чисел</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#2E7D32" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="2"/>
  
  <!-- Definition -->
  <text x="250" y="85" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">Разряд — место цифры в числе</text>
  
  <!-- Place value table -->
  <g transform="translate(80, 100)">
    <!-- Headers -->
    <rect x="0" y="0" width="340" height="30" rx="5" fill="#C8E6C9"/>
    <text x="56" y="20" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сотни</text>
    <text x="170" y="20" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Десятки</text>
    <text x="283" y="20" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Единицы</text>
    
    <!-- Example number -->
    <rect x="0" y="35" width="340" height="50" fill="#F1F8E9" stroke="#4CAF50"/>
    <text x="56" y="68" font-size="28" font-weight="bold" fill="#1565C0" text-anchor="middle">3</text>
    <text x="170" y="68" font-size="28" font-weight="bold" fill="#E65100" text-anchor="middle">5</text>
    <text x="283" y="68" font-size="28" font-weight="bold" fill="#C62828" text-anchor="middle">4</text>
    
    <!-- Labels -->
    <text x="56" y="95" font-size="9" fill="#1565C0" text-anchor="middle">300</text>
    <text x="170" y="95" font-size="9" fill="#E65100" text-anchor="middle">50</text>
    <text x="283" y="95" font-size="9" fill="#C62828" text-anchor="middle">4</text>
    
    <!-- Dividing lines -->
    <line x1="113" y1="35" x2="113" y2="85" stroke="#4CAF50" stroke-width="2"/>
    <line x1="227" y1="35" x2="227" y2="85" stroke="#4CAF50" stroke-width="2"/>
  </g>
  
  <!-- Expanded form -->
  <rect x="80" y="205" width="340" height="45" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="250" y="225" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сумма разрядных слагаемых:</text>
  <text x="250" y="242" font-size="12" fill="#333" text-anchor="middle">354 = 300 + 50 + 4</text>
  
  <!-- Key points -->
  <rect x="50" y="260" width="400" height="45" rx="8" fill="#F1F8E9" stroke="#2E7D32"/>
  <text x="70" y="280" font-size="9" fill="#333">📌 Каждая цифра имеет своё место</text>
  <text x="260" y="280" font-size="9" fill="#333">📌 От разряда зависит значение</text>
  <text x="70" y="295" font-size="9" fill="#333">📌 0 — означает отсутствие разряда</text>
  
  <!-- Animated number -->
  <g transform="translate(410, 275)">
    <text font-size="16" fill="#2E7D32" text-anchor="middle">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
      🔢
    </text>
  </g>
  
  <!-- Pencil -->
  <g transform="translate(55, 280)" opacity="0.5">
    <rect x="0" y="3" width="25" height="8" fill="#FFD700"/>
    <polygon points="25,3 25,11 32,7" fill="#333"/>
  </g>
</svg>