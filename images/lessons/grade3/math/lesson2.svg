<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#A5D6A7;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math2)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">✖️ Умножение числа 3</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81C784" opacity="0.5"/>
  
  <!-- Multiplication table -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif" font-size="13">
    <text x="220" y="0" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Таблица умножения на 3</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="140" height="25" fill="#C8E6C9" rx="3"/>
      <text x="70" y="18" fill="#1B5E20" text-anchor="middle">3 × 1 = 3</text>
      
      <rect x="150" y="0" width="140" height="25" fill="#E8F5E9" rx="3"/>
      <text x="220" y="18" fill="#1B5E20" text-anchor="middle">3 × 2 = 6</text>
      
      <rect x="300" y="0" width="140" height="25" fill="#C8E6C9" rx="3"/>
      <text x="370" y="18" fill="#1B5E20" text-anchor="middle">3 × 3 = 9</text>
      
      <rect x="0" y="30" width="140" height="25" fill="#E8F5E9" rx="3"/>
      <text x="70" y="48" fill="#1B5E20" text-anchor="middle">3 × 4 = 12</text>
      
      <rect x="150" y="30" width="140" height="25" fill="#C8E6C9" rx="3"/>
      <text x="220" y="48" fill="#1B5E20" text-anchor="middle">3 × 5 = 15</text>
      
      <rect x="300" y="30" width="140" height="25" fill="#E8F5E9" rx="3"/>
      <text x="370" y="48" fill="#1B5E20" text-anchor="middle">3 × 6 = 18</text>
      
      <rect x="0" y="60" width="140" height="25" fill="#C8E6C9" rx="3"/>
      <text x="70" y="78" fill="#1B5E20" text-anchor="middle">3 × 7 = 21</text>
      
      <rect x="150" y="60" width="140" height="25" fill="#E8F5E9" rx="3"/>
      <text x="220" y="78" fill="#1B5E20" text-anchor="middle">3 × 8 = 24</text>
      
      <rect x="300" y="60" width="140" height="25" fill="#C8E6C9" rx="3"/>
      <text x="370" y="78" fill="#1B5E20" text-anchor="middle">3 × 9 = 27</text>
      
      <rect x="150" y="90" width="140" height="25" fill="#E8F5E9" rx="3"/>
      <text x="220" y="108" fill="#1B5E20" text-anchor="middle">3 × 10 = 30</text>
    </g>
  </g>
  
  <!-- Triangle visual -->
  <g transform="translate(50, 250)">
    <polygon points="75,0 150,130 0,130" fill="#81C784" stroke="#4CAF50" stroke-width="2"/>
    <text x="75" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1B5E20" text-anchor="middle">3 стороны</text>
    <text x="75" y="85" font-family="Arial, sans-serif" font-size="12" fill="#1B5E20" text-anchor="middle">3 угла</text>
  </g>
  
  <!-- Tip -->
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="250" height="55" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="125" y="20" font-family="Arial, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">💡 Закономерность!</text>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Сумма цифр в ответах</text>
    <text x="125" y="48" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">равна 3, 6 или 9</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>