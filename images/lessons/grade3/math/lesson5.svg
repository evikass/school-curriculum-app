<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D1C4E9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math5)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#512DA8" text-anchor="middle">✖️ Умножение на 6, 7, 8, 9</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#673AB7" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#B39DDB" opacity="0.4"/>
  
  <!-- Tables -->
  <g transform="translate(20, 70)" font-family="Arial, sans-serif" font-size="11">
    <!-- 6 -->
    <g>
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">×6</text>
      <rect x="0" y="8" width="110" height="18" fill="#E1BEE7" rx="2"/>
      <text x="55" y="22" fill="#512DA8" text-anchor="middle">6×6=36  6×7=42</text>
      <rect x="0" y="28" width="110" height="18" fill="#F3E5F5" rx="2"/>
      <text x="55" y="42" fill="#512DA8" text-anchor="middle">6×8=48  6×9=54</text>
    </g>
    
    <!-- 7 -->
    <g transform="translate(120, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">×7</text>
      <rect x="0" y="8" width="110" height="18" fill="#E1BEE7" rx="2"/>
      <text x="55" y="22" fill="#512DA8" text-anchor="middle">7×7=49  7×8=56</text>
      <rect x="0" y="28" width="110" height="18" fill="#F3E5F5" rx="2"/>
      <text x="55" y="42" fill="#512DA8" text-anchor="middle">7×9=63</text>
    </g>
    
    <!-- 8 -->
    <g transform="translate(240, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">×8</text>
      <rect x="0" y="8" width="110" height="18" fill="#E1BEE7" rx="2"/>
      <text x="55" y="22" fill="#512DA8" text-anchor="middle">8×8=64  8×9=72</text>
    </g>
    
    <!-- 9 -->
    <g transform="translate(360, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">×9</text>
      <rect x="0" y="8" width="110" height="18" fill="#E1BEE7" rx="2"/>
      <text x="55" y="22" fill="#512DA8" text-anchor="middle">9×9=81</text>
    </g>
  </g>
  
  <!-- Hand trick for 9 -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="400" height="70" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">💡 Трюк для умножения на 9!</text>
    <text x="200" y="38" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Положи руки ладонями вниз. Загни N-й палец.</text>
    <text x="200" y="52" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Слева — десятки, справа — единицы!</text>
    <text x="200" y="66" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">9×7: загни 7-й палец → 6 пальцев слева, 3 справа = 63</text>
  </g>
  
  <!-- Memory tips -->
  <g transform="translate(50, 270)" font-family="Arial, sans-serif" font-size="11">
    <rect x="0" y="0" width="190" height="35" fill="#C8E6C9" rx="5"/>
    <text x="95" y="15" fill="#2E7D32" text-anchor="middle">6×7=42 — запомни!</text>
    <text x="95" y="28" fill="#388E3C" text-anchor="middle">шестью семь — сорок два</text>
    
    <rect x="210" y="0" width="190" height="35" fill="#BBDEFB" rx="5"/>
    <text x="305" y="15" fill="#0D47A1" text-anchor="middle">7×8=56 — порядок!</text>
    <text x="305" y="28" fill="#1565C0" text-anchor="middle">5, 6, 7, 8</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>