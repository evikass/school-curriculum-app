<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="litBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3E5F5;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#litBg)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#7B1FA2" opacity="0.12"/>
  <circle cx="460" cy="300" r="40" fill="#7B1FA2" opacity="0.1"/>
  
  <!-- Sun -->
  <circle cx="440" cy="50" r="20" fill="#FFD700" opacity="0.8">
    <animate attributeName="r" values="20;24;20" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Forest scene -->
  <ellipse cx="250" cy="370" rx="300" ry="60" fill="#81C784" opacity="0.4"/>
  
  <!-- Trees -->
  <g opacity="0.3">
    <ellipse cx="40" cy="280" rx="25" ry="40" fill="#228B22"/>
    <rect x="35" y="280" width="10" height="25" fill="#8B4513"/>
  </g>
  <g opacity="0.25">
    <ellipse cx="470" cy="275" rx="28" ry="45" fill="#228B22"/>
    <rect x="465" y="275" width="10" height="28" fill="#8B4513"/>
  </g>
  
  <!-- Birds -->
  <path d="M100 60 Q105 55 110 60 Q115 55 120 60" stroke="#333" stroke-width="1.5" fill="none" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0;30,5;60,0" dur="8s" repeatCount="indefinite"/>
  </path>
  <path d="M350 80 Q355 75 360 80 Q365 75 370 80" stroke="#333" stroke-width="1.5" fill="none" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;-25,3;-50,0" dur="7s" repeatCount="indefinite"/>
  </path>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="35" cy="325" r="5" fill="#E91E63"/>
    <circle cx="42" cy="320" r="4" fill="#F48FB1"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#9C27B0"/>
    <circle cx="458" cy="320" r="4" fill="#CE93D8"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6A1B9A" text-anchor="middle">📖 Устное народное творчество</text>
  <rect x="80" y="45" width="340" height="3" rx="2" fill="#6A1B9A" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.9" stroke="#6A1B9A" stroke-width="2"/>
  
  <!-- Types grid -->
  <g transform="translate(50, 80)">
    <!-- Fairy tales -->
    <rect x="0" y="0" width="125" height="90" rx="10" fill="#F3E5F5" stroke="#7B1FA2"/>
    <text x="62" y="20" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle">✨ Сказки</text>
    <text x="62" y="45" font-size="28" text-anchor="middle">🧙‍♀️</text>
    <text x="62" y="70" font-size="8" fill="#333" text-anchor="middle">Волшебные</text>
    <text x="62" y="82" font-size="8" fill="#333" text-anchor="middle">О животных</text>
    
    <!-- Proverbs -->
    <rect x="135" y="0" width="125" height="90" rx="10" fill="#E8F5E9" stroke="#4CAF50"/>
    <text x="197" y="20" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">💬 Пословицы</text>
    <text x="197" y="45" font-size="28" text-anchor="middle">📜</text>
    <text x="197" y="70" font-size="8" fill="#333" text-anchor="middle">Мудрость народа</text>
    <text x="197" y="82" font-size="8" fill="#333" text-anchor="middle">Жизненный опыт</text>
    
    <!-- Riddles -->
    <rect x="270" y="0" width="125" height="90" rx="10" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="332" y="20" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">❓ Загадки</text>
    <text x="332" y="45" font-size="28" text-anchor="middle">🔮</text>
    <text x="332" y="70" font-size="8" fill="#333" text-anchor="middle">Описание предмета</text>
    <text x="332" y="82" font-size="8" fill="#333" text-anchor="middle">Нужно отгадать</text>
  </g>
  
  <!-- Features section -->
  <rect x="50" y="185" width="400" height="75" rx="10" fill="#FCE4EC" stroke="#6A1B9A"/>
  <text x="250" y="205" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🌟 Особенности устного народного творчества</text>
  <text x="70" y="225" font-size="9" fill="#333">📌 Создано народом, автор неизвестен</text>
  <text x="70" y="240" font-size="9" fill="#333">📌 Передаётся из поколения в поколение</text>
  <text x="260" y="225" font-size="9" fill="#333">📌 Учит мудрости и добру</text>
  <text x="260" y="240" font-size="9" fill="#333">📌 Отражает народную жизнь</text>
  
  <!-- Animated book -->
  <g transform="translate(250, 285)">
    <rect x="-20" y="-10" width="40" height="25" rx="3" fill="#6A1B9A" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-18" y="-8" width="36" height="21" fill="white"/>
    <line x1="0" y1="-8" x2="0" y2="13" stroke="#6A1B9A" stroke-width="1"/>
    <text x="0" y="4" font-size="6" fill="#6A1B9A" text-anchor="middle">НК</text>
  </g>
  
  <!-- Decorative elements -->
  <text x="60" y="300" font-size="20" opacity="0.3">📚</text>
  <text x="430" y="300" font-size="20" opacity="0.3">✨</text>
</svg>