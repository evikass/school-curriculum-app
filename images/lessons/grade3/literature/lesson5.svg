<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1BEE7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit5)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6A1B9A" text-anchor="middle">✒️ А.С. Пушкин</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#9C27B0" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#CE93D8" opacity="0.4"/>
  
  <!-- Portrait area -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="150" height="150" fill="#F3E5F5" rx="10" stroke="#9C27B0"/>
    <circle cx="75" cy="50" r="30" fill="#FFCCBC"/>
    <ellipse cx="75" cy="90" rx="25" ry="20" fill="#37474F"/>
    <rect x="50" y="110" width="50" height="35" fill="#5D4037" rx="3"/>
    <text x="75" y="165" font-family="Arial, sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle">1799-1837</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(220, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="220" height="150" fill="#EDE7F6" rx="10" stroke="#7B1FA2"/>
    <text x="110" y="25" font-size="12" font-weight="bold" fill="#4A148C" text-anchor="middle">Великий русский поэт</text>
    <text x="110" y="50" font-size="10" fill="#6A1B9A" text-anchor="middle">«Солнце русской поэзии»</text>
    <text x="110" y="75" font-size="9" fill="#7B1FA2" text-anchor="middle">Сказки:</text>
    <text x="110" y="95" font-size="9" fill="#8E24AA" text-anchor="middle">• Сказка о рыбаке и рыбке</text>
    <text x="110" y="110" font-size="9" fill="#8E24AA" text-anchor="middle">• Сказка о золотом петушке</text>
    <text x="110" y="125" font-size="9" fill="#8E24AA" text-anchor="middle">• Сказка о царе Салтане</text>
    <text x="110" y="140" font-size="9" fill="#8E24AA" text-anchor="middle">• Руслан и Людмила</text>
  </g>
  
  <!-- Fish tale moral -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="400" height="55" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">«Сказка о рыбаке и рыбке»</text>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Учит: жадность наказывается</text>
    <text x="200" y="48" font-family="Arial, sans-serif" font-size="9" fill="#FF9800" text-anchor="middle">Старуха осталась у разбитого корыта</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>