<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D1C4E9;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit3)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#512DA8" text-anchor="middle">⚔️ Былины</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#673AB7" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#9575CD" opacity="0.4"/>
  
  <!-- Three bogatyrs -->
  <!-- Ilya Muromets (center) -->
  <g transform="translate(200, 100)">
    <rect x="0" y="30" width="40" height="80" fill="#1565C0" rx="5"/>
    <circle cx="20" cy="15" r="20" fill="#FFCCBC"/>
    <rect x="10" y="0" width="20" height="15" fill="#795548" rx="3"/>
    <rect x="5" y="60" width="12" height="50" fill="#5D4037"/>
    <rect x="25" y="60" width="12" height="50" fill="#5D4037"/>
    <line x1="-20" y1="80" x2="60" y2="80" stroke="#795548" stroke-width="4"/>
    <text x="20" y="130" font-family="Arial, sans-serif" font-size="9" fill="#311B92" text-anchor="middle">Илья Муромец</text>
  </g>
  
  <!-- Dobrynya (left) -->
  <g transform="translate(80, 110)">
    <rect x="0" y="25" width="35" height="70" fill="#2E7D32" rx="5"/>
    <circle cx="17" cy="12" r="17" fill="#FFCCBC"/>
    <rect x="8" y="0" width="18" height="12" fill="#795548" rx="3"/>
    <rect x="5" y="55" width="10" height="40" fill="#5D4037"/>
    <rect x="22" y="55" width="10" height="40" fill="#5D4037"/>
    <text x="17" y="115" font-family="Arial, sans-serif" font-size="8" fill="#311B92" text-anchor="middle">Добрыня</text>
  </g>
  
  <!-- Alyosha (right) -->
  <g transform="translate(320, 115)">
    <rect x="0" y="20" width="35" height="65" fill="#C62828" rx="5"/>
    <circle cx="17" cy="10" r="15" fill="#FFCCBC"/>
    <rect x="10" y="0" width="14" height="10" fill="#795548" rx="3"/>
    <rect x="5" y="50" width="10" height="35" fill="#5D4037"/>
    <rect x="20" y="50" width="10" height="35" fill="#5D4037"/>
    <text x="17" y="110" font-family="Arial, sans-serif" font-size="8" fill="#311B92" text-anchor="middle">Алёша</text>
  </g>
  
  <!-- Info box -->
  <g transform="translate(50, 250)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="55" fill="#EDE7F6" rx="8" stroke="#673AB7"/>
    <text x="200" y="18" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">Былина — героическое сказание о богатырях</text>
    <text x="200" y="35" font-size="10" fill="#673AB7" text-anchor="middle">Защитники Руси: победили Соловья-разбойника,</text>
    <text x="200" y="48" font-size="10" fill="#673AB7" text-anchor="middle">Змея Горыныча, Тугарина Змея</text>
  </g>
  
  <!-- Shield -->
  <g transform="translate(430, 150)">
    <ellipse cx="25" cy="35" rx="25" ry="35" fill="#B71C1C" stroke="#FFD54F" stroke-width="3"/>
    <polygon points="25,15 35,35 25,55 15,35" fill="#FFD54F"/>
  </g>
  
  <!-- Flowers -->
  <circle cx="30" cy="310" r="5" fill="#E91E63"/>
  <circle cx="470" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="200" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="200" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>