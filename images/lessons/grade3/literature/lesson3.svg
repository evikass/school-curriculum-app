<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="litBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFECB3;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#litBg3)"/>
  
  <!-- Decorative circles -->
  <circle cx="55" cy="55" r="32" fill="#FF9800" opacity="0.12"/>
  <circle cx="455" cy="290" r="42" fill="#FF9800" opacity="0.1"/>
  
  <!-- Sun with rays -->
  <circle cx="70" cy="50" r="25" fill="#FFD700" opacity="0.9">
    <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="70" y1="15" x2="70" y2="5"/>
    <line x1="105" y1="50" x2="115" y2="50"/>
    <line x1="95" y1="25" x2="102" y2="18"/>
    <animateTransform attributeName="transform" type="rotate" from="0 70 50" to="360 70 50" dur="15s" repeatCount="indefinite"/>
  </g>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="200" cy="45" rx="30" ry="18" fill="white"/>
    <ellipse cx="225" cy="40" rx="24" ry="14" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.28">
    <ellipse cx="470" cy="275" rx="25" ry="40" fill="#228B22"/>
    <rect x="465" y="275" width="10" height="25" fill="#8B4513"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#FF9800"/>
    <circle cx="47" cy="320" r="4" fill="#FFCC80"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#FFC107"/>
    <circle cx="458" cy="320" r="4" fill="#FFEB3B"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">📚 Великие русские писатели</text>
  <rect x="80" y="45" width="340" height="3" rx="2" fill="#E65100" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="25" y="60" width="450" height="255" rx="15" fill="white" opacity="0.9" stroke="#E65100" stroke-width="2"/>
  
  <!-- Writers section -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Классики русской литературы</text>
  
  <!-- Writer cards -->
  <g transform="translate(40, 95)">
    <!-- Pushkin -->
    <rect x="0" y="0" width="130" height="80" rx="10" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="65" y="18" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">А.С. Пушкин</text>
    <text x="65" y="32" font-size="8" fill="#666" text-anchor="middle">1799-1837</text>
    <text x="65" y="50" font-size="22" text-anchor="middle">🧔</text>
    <text x="65" y="72" font-size="7" fill="#333" text-anchor="middle">"Сказка о рыбаке</text>
    <text x="65" y="82" font-size="7" fill="#333" text-anchor="middle">и рыбке"</text>
    
    <!-- Krylov -->
    <rect x="140" y="0" width="130" height="80" rx="10" fill="#FFF8E1" stroke="#FFA726"/>
    <text x="205" y="18" font-size="10" font-weight="bold" fill="#EF6C00" text-anchor="middle">И.А. Крылов</text>
    <text x="205" y="32" font-size="8" fill="#666" text-anchor="middle">1769-1844</text>
    <text x="205" y="50" font-size="22" text-anchor="middle">🎭</text>
    <text x="205" y="72" font-size="7" fill="#333" text-anchor="middle">Басни:</text>
    <text x="205" y="82" font-size="7" fill="#333" text-anchor="middle">"Ворона и Лисица"</text>
    
    <!-- Tolstoy -->
    <rect x="280" y="0" width="130" height="80" rx="10" fill="#FFECB3" stroke="#FFB74D"/>
    <text x="345" y="18" font-size="10" font-weight="bold" fill="#F57C00" text-anchor="middle">Л.Н. Толстой</text>
    <text x="345" y="32" font-size="8" fill="#666" text-anchor="middle">1828-1910</text>
    <text x="345" y="50" font-size="22" text-anchor="middle">👴</text>
    <text x="345" y="72" font-size="7" fill="#333" text-anchor="middle">"Детство"</text>
    <text x="345" y="82" font-size="7" fill="#333" text-anchor="middle">Рассказы для детей</text>
  </g>
  
  <!-- Works features -->
  <rect x="40" y="190" width="420" height="75" rx="10" fill="#FFFDE7" stroke="#E65100"/>
  <text x="250" y="210" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">🌟 Что изучаем в 3 классе</text>
  <text x="60" y="230" font-size="9" fill="#333">📌 Сказки А.С. Пушкина</text>
  <text x="60" y="245" font-size="9" fill="#333">📌 Басни И.А. Крылова</text>
  <text x="250" y="230" font-size="9" fill="#333">📌 Рассказы Л.Н. Толстого</text>
  <text x="250" y="245" font-size="9" fill="#333">📌 Произведения о природе</text>
  
  <!-- Quote -->
  <rect x="100" y="275" width="300" height="35" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-dasharray="3"/>
  <text x="250" y="292" font-size="9" fill="#E65100" text-anchor="middle" font-style="italic">"Что за прелесть эти сказки!"</text>
  <text x="250" y="305" font-size="8" fill="#666" text-anchor="middle">— А.С. Пушкин</text>
  
  <!-- Book decoration -->
  <g transform="translate(55, 285)" opacity="0.5">
    <rect x="0" y="0" width="28" height="20" rx="2" fill="#FF9800"/>
    <rect x="2" y="2" width="24" height="16" fill="white"/>
    <text x="14" y="13" font-size="6" fill="#FF9800" text-anchor="middle">📖</text>
  </g>
</svg>