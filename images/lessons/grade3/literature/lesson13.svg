<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4E6F1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#85C1E9;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C40F"/>
      <stop offset="100%" style="stop-color:#D4AC0D"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit13)"/>
  <rect width="500" height="350" fill="#EBF5FB" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="25" fill="#F4D03F" opacity="0.8">
    <animate attributeName="r" values="23;27;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B4F72" text-anchor="middle">⚔️ Былины и богатыри</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#2E86AB" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="270" ry="50" fill="#7DCEA0" opacity="0.5"/>
  
  <!-- Bogatyr -->
  <g transform="translate(180, 80)">
    <!-- Body -->
    <rect x="40" y="60" width="60" height="80" fill="#2E4053" rx="5"/>
    
    <!-- Helmet -->
    <ellipse cx="70" cy="45" rx="25" ry="20" fill="#7B7D7D"/>
    <path d="M45,45 Q70,10 95,45" fill="#95A5A6"/>
    <ellipse cx="70" cy="35" rx="8" ry="12" fill="#F1C40F"/>
    
    <!-- Face -->
    <ellipse cx="70" cy="55" rx="18" ry="15" fill="#F5CBA7"/>
    <circle cx="64" cy="52" r="2" fill="#2C3E50"/>
    <circle cx="76" cy="52" r="2" fill="#2C3E50"/>
    <path d="M65,62 Q70,66 75,62" fill="none" stroke="#A569BD" stroke-width="2"/>
    
    <!-- Shield -->
    <ellipse cx="115" cy="100" rx="25" ry="35" fill="url(#shield)" stroke="#B7950B" stroke-width="3">
      <animate attributeName="ry" values="35;37;35" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="115" cy="100" rx="12" ry="18" fill="#E74C3C"/>
    
    <!-- Sword -->
    <rect x="10" y="80" width="8" height="70" fill="#BDC3C7"/>
    <rect x="8" y="75" width="12" height="10" fill="#F1C40F"/>
    <polygon points="10,80 14,60 18,80" fill="#ECF0F1"/>
    
    <!-- Legs -->
    <rect x="45" y="140" width="20" height="40" fill="#5D6D7E"/>
    <rect x="75" y="140" width="20" height="40" fill="#5D6D7E"/>
    
    <!-- Boots -->
    <ellipse cx="55" cy="180" rx="15" ry="8" fill="#2C3E50"/>
    <ellipse cx="85" cy="180" rx="15" ry="8" fill="#2C3E50"/>
  </g>
  
  <!-- Horse -->
  <g transform="translate(280, 130)">
    <ellipse cx="50" cy="50" rx="40" ry="25" fill="#873600"/>
    <ellipse cx="90" cy="40" rx="20" ry="15" fill="#873600"/>
    <polygon points="105,35 120,25 120,45" fill="#873600"/>
    <circle cx="95" cy="38" r="3" fill="#2C3E50"/>
    <rect x="25" y="70" width="8" height="30" fill="#6E2C00"/>
    <rect x="45" y="70" width="8" height="30" fill="#6E2C00"/>
    <rect x="60" y="70" width="8" height="30" fill="#6E2C00"/>
    <rect x="75" y="70" width="8" height="30" fill="#6E2C00"/>
    <ellipse cx="85" cy="25" rx="15" ry="8" fill="#D4AC0D"/>
  </g>
  
  <!-- Info -->
  <g transform="translate(30, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="80" fill="#D6EAF8" rx="8" stroke="#2E86AB"/>
    <text x="220" y="22" font-size="12" font-weight="bold" fill="#1B4F72" text-anchor="middle">Русские былины</text>
    <text x="220" y="42" font-size="10" fill="#2874A6" text-anchor="middle">Илья Муромец • Добрыня Никитич • Алёша Попович</text>
    <text x="220" y="58" font-size="10" fill="#3498DB" text-anchor="middle">Герои защищали Русь от врагов</text>
    <text x="220" y="73" font-size="9" fill="#5DADE2" text-anchor="middle">Былины передавались из уст в уста!</text>
  </g>
  
  <!-- Decorative swords -->
  <g transform="translate(20, 100)" opacity="0.6">
    <rect x="0" y="0" width="3" height="40" fill="#BDC3C7"/>
    <rect x="-2" y="-5" width="7" height="8" fill="#F1C40F"/>
  </g>
</svg>