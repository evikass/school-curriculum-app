<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="litBg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#litBg4)"/>
  
  <!-- Decorative elements -->
  <circle cx="55" cy="55" r="30" fill="#2196F3" opacity="0.12"/>
  <circle cx="455" cy="295" r="40" fill="#2196F3" opacity="0.1"/>
  
  <!-- Sun -->
  <circle cx="445" cy="50" r="22" fill="#FFD700" opacity="0.85">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="110" cy="45" rx="28" ry="16" fill="white"/>
    <ellipse cx="135" cy="40" rx="22" ry="13" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#8B4513"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#2196F3"/>
    <circle cx="47" cy="320" r="4" fill="#90CAF9"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#3F51B5"/>
    <circle cx="458" cy="320" r="4" fill="#7986CB"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">🎭 Былины и герои</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#1565C0" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="2"/>
  
  <!-- Heroes section -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">Русские богатыри</text>
  
  <!-- Hero cards -->
  <g transform="translate(50, 95)">
    <!-- Ilya Muromets -->
    <rect x="0" y="0" width="125" height="75" rx="8" fill="#E3F2FD" stroke="#1976D2"/>
    <text x="62" y="16" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Илья Муромец</text>
    <text x="62" y="35" font-size="24" text-anchor="middle">⚔️</text>
    <text x="62" y="55" font-size="7" fill="#333" text-anchor="middle">Главный богатырь</text>
    <text x="62" y="67" font-size="7" fill="#333" text-anchor="middle">Защитник Руси</text>
    
    <!-- Dobrynya -->
    <rect x="135" y="0" width="125" height="75" rx="8" fill="#BBDEFB" stroke="#1E88E5"/>
    <text x="197" y="16" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Добрыня Никитич</text>
    <text x="197" y="35" font-size="24" text-anchor="middle">🛡️</text>
    <text x="197" y="55" font-size="7" fill="#333" text-anchor="middle">Мудрый богатырь</text>
    <text x="197" y="67" font-size="7" fill="#333" text-anchor="middle">Змеев победитель</text>
    
    <!-- Alyosha -->
    <rect x="270" y="0" width="125" height="75" rx="8" fill="#90CAF9" stroke="#42A5F5"/>
    <text x="332" y="16" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Алёша Попович</text>
    <text x="332" y="35" font-size="24" text-anchor="middle">📯</text>
    <text x="332" y="55" font-size="7" fill="#333" text-anchor="middle">Молодой богатырь</text>
    <text x="332" y="67" font-size="7" fill="#333" text-anchor="middle">Гусляр и храбрец</text>
  </g>
  
  <!-- Bylina features -->
  <rect x="50" y="185" width="400" height="70" rx="10" fill="#E8EAF6" stroke="#1565C0"/>
  <text x="250" y="205" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">🌟 Особенности былин</text>
  <text x="70" y="225" font-size="9" fill="#333">📌 Песенный рассказ о подвигах</text>
  <text x="70" y="240" font-size="9" fill="#333">📌 Герои защищают Русь</text>
  <text x="260" y="225" font-size="9" fill="#333">📌 Силы добра против зла</text>
  <text x="260" y="240" font-size="9" fill="#333">📌 Передаются устно</text>
  
  <!-- Animated shield -->
  <g transform="translate(250, 280)">
    <text font-size="20" text-anchor="middle">
      🏰
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Decorative elements -->
  <text x="55" y="300" font-size="16" opacity="0.4">⚔️</text>
  <text x="435" y="300" font-size="16" opacity="0.4">🛡️</text>
</svg>