<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FBE9E7;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky5)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#BF360C" text-anchor="middle">🔍 Разбор слова по составу</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF7043" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCCBC" opacity="0.5"/>
  
  <!-- Word breakdown diagram -->
  <g transform="translate(100, 80)">
    <!-- Word: подснежник -->
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">ПОДСНЕЖНИК</text>
    
    <!-- Boxes for each part -->
    <rect x="30" y="45" width="50" height="35" fill="#FF7043" rx="5"/>
    <text x="55" y="68" font-family="Arial, sans-serif" font-size="14" fill="#FFF" text-anchor="middle">под-</text>
    <text x="55" y="95" font-family="Arial, sans-serif" font-size="9" fill="#BF360C" text-anchor="middle">приставка</text>
    
    <rect x="90" y="45" width="60" height="35" fill="#66BB6A" rx="5"/>
    <text x="120" y="68" font-family="Arial, sans-serif" font-size="14" fill="#FFF" text-anchor="middle">-снеж-</text>
    <text x="120" y="95" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">корень</text>
    
    <rect x="160" y="45" width="50" height="35" fill="#42A5F5" rx="5"/>
    <text x="185" y="68" font-family="Arial, sans-serif" font-size="14" fill="#FFF" text-anchor="middle">-ник-</text>
    <text x="185" y="95" font-family="Arial, sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">суффикс</text>
    
    <rect x="220" y="45" width="50" height="35" fill="#AB47BC" rx="5"/>
    <text x="245" y="68" font-family="Arial, sans-serif" font-size="14" fill="#FFF" text-anchor="middle">нулев.</text>
    <text x="245" y="95" font-family="Arial, sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle">окончание</text>
  </g>
  
  <!-- Steps -->
  <g transform="translate(50, 200)" font-family="Arial, sans-serif" font-size="11">
    <circle cx="20" cy="15" r="15" fill="#FF7043"/>
    <text x="20" y="20" fill="#FFF" text-anchor="middle" font-weight="bold">1</text>
    <text x="50" y="20" fill="#333">Найди окончание (измени слово)</text>
    
    <circle cx="20" cy="50" r="15" fill="#66BB6A"/>
    <text x="20" y="55" fill="#FFF" text-anchor="middle" font-weight="bold">2</text>
    <text x="50" y="55" fill="#333">Найди корень (подбери родственные)</text>
    
    <circle cx="230" cy="15" r="15" fill="#42A5F5"/>
    <text x="230" y="20" fill="#FFF" text-anchor="middle" font-weight="bold">3</text>
    <text x="260" y="20" fill="#333">Найди приставку (перед корнем)</text>
    
    <circle cx="230" cy="50" r="15" fill="#AB47BC"/>
    <text x="230" y="55" fill="#FFF" text-anchor="middle" font-weight="bold">4</text>
    <text x="260" y="55" fill="#333">Найди суффикс (после корня)</text>
  </g>
  
  <!-- Schema -->
  <g transform="translate(100, 270)">
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">Схема: приставка-корень-суффикс-окончание</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="200" cy="140" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>