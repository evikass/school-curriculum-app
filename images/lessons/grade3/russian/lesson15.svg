<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky15" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CFD8DC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ECEFF1;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky15)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F" text-anchor="middle">📐 Склонение прилагательных</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#607D8B" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#B0BEC5" opacity="0.4"/>
  
  <!-- Declension table -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif" font-size="11">
    <!-- Header -->
    <rect x="0" y="0" width="440" height="22" fill="#455A64" rx="3"/>
    <text x="50" y="15" fill="#FFF" text-anchor="middle" font-weight="bold">Падеж</text>
    <text x="170" y="15" fill="#FFF" text-anchor="middle" font-weight="bold">Окончание</text>
    <text x="330" y="15" fill="#FFF" text-anchor="middle" font-weight="bold">Пример</text>
    
    <!-- Rows -->
    <rect x="0" y="24" width="440" height="20" fill="#ECEFF1"/>
    <text x="50" y="38" fill="#37474F" text-anchor="middle">Именительный</text>
    <text x="170" y="38" fill="#455A64" text-anchor="middle">-ый, -ий, -ой</text>
    <text x="330" y="38" fill="#263238" text-anchor="middle">красивый</text>
    
    <rect x="0" y="46" width="440" height="20" fill="#CFD8DC"/>
    <text x="50" y="60" fill="#37474F" text-anchor="middle">Родительный</text>
    <text x="170" y="60" fill="#455A64" text-anchor="middle">-ого, -его</text>
    <text x="330" y="60" fill="#263238" text-anchor="middle">красивого</text>
    
    <rect x="0" y="68" width="440" height="20" fill="#ECEFF1"/>
    <text x="50" y="82" fill="#37474F" text-anchor="middle">Дательный</text>
    <text x="170" y="82" fill="#455A64" text-anchor="middle">-ому, -ему</text>
    <text x="330" y="82" fill="#263238" text-anchor="middle">красивому</text>
    
    <rect x="0" y="90" width="440" height="20" fill="#CFD8DC"/>
    <text x="50" y="104" fill="#37474F" text-anchor="middle">Винительный</text>
    <text x="170" y="104" fill="#455A64" text-anchor="middle">-ый, -ий, -ой</text>
    <text x="330" y="104" fill="#263238" text-anchor="middle">красивый</text>
    
    <rect x="0" y="112" width="440" height="20" fill="#ECEFF1"/>
    <text x="50" y="126" fill="#37474F" text-anchor="middle">Творительный</text>
    <text x="170" y="126" fill="#455A64" text-anchor="middle">-ым, -им</text>
    <text x="330" y="126" fill="#263238" text-anchor="middle">красивым</text>
    
    <rect x="0" y="134" width="440" height="20" fill="#CFD8DC"/>
    <text x="50" y="148" fill="#37474F" text-anchor="middle">Предложный</text>
    <text x="170" y="148" fill="#455A64" text-anchor="middle">-ом, -ем</text>
    <text x="330" y="148" fill="#263238" text-anchor="middle">красивом</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 240)" font-family="Arial, sans-serif" font-size="11">
    <rect x="0" y="0" width="120" height="30" fill="#E3F2FD" rx="5"/>
    <text x="60" y="20" fill="#0D47A1" text-anchor="middle">И.п. — красивый дом</text>
    
    <rect x="140" y="0" width="120" height="30" fill="#E3F2FD" rx="5"/>
    <text x="200" y="20" fill="#0D47A1" text-anchor="middle">Р.п. — красивого дома</text>
    
    <rect x="280" y="0" width="130" height="30" fill="#E3F2FD" rx="5"/>
    <text x="345" y="20" fill="#0D47A1" text-anchor="middle">Т.п. — красивым домом</text>
  </g>
  
  <!-- Rule -->
  <g transform="translate(100, 290)">
    <rect x="0" y="0" width="300" height="25" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
    <text x="150" y="18" font-family="Arial, sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">💡 Падеж прилагательного = падеж существительного</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="200" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="200" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>