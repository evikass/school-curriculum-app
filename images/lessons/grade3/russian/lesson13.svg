<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky13)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">👤 Род имён прилагательных</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#2196F3" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#90CAF9" opacity="0.5"/>
  
  <!-- Three columns for genders -->
  <g transform="translate(30, 80)" font-family="Arial, sans-serif">
    <!-- Male -->
    <rect x="0" y="0" width="140" height="140" fill="#BBDEFB" rx="10" stroke="#1976D2"/>
    <text x="70" y="30" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Мужской род</text>
    <text x="70" y="55" font-size="12" fill="#1565C0" text-anchor="middle">Окончания:</text>
    <text x="70" y="75" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">-ый, -ий, -ой</text>
    <text x="70" y="100" font-size="11" fill="#1976D2" text-anchor="middle">красивый</text>
    <text x="70" y="115" font-size="11" fill="#1976D2" text-anchor="middle">синий</text>
    <text x="70" y="130" font-size="11" fill="#1976D2" text-anchor="middle">большой</text>
    
    <!-- Female -->
    <rect x="160" y="0" width="140" height="140" fill="#F8BBD9" rx="10" stroke="#D81B60"/>
    <text x="230" y="30" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">Женский род</text>
    <text x="230" y="55" font-size="12" fill="#AD1457" text-anchor="middle">Окончания:</text>
    <text x="230" y="75" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">-ая, -яя</text>
    <text x="230" y="100" font-size="11" fill="#C2185B" text-anchor="middle">красивая</text>
    <text x="230" y="115" font-size="11" fill="#C2185B" text-anchor="middle">синяя</text>
    <text x="230" y="130" font-size="11" fill="#C2185B" text-anchor="middle">большая</text>
    
    <!-- Neutral -->
    <rect x="320" y="0" width="140" height="140" fill="#C8E6C9" rx="10" stroke="#388E3C"/>
    <text x="390" y="30" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Средний род</text>
    <text x="390" y="55" font-size="12" fill="#2E7D32" text-anchor="middle">Окончания:</text>
    <text x="390" y="75" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">-ое, -ее</text>
    <text x="390" y="100" font-size="11" fill="#388E3C" text-anchor="middle">красивое</text>
    <text x="390" y="115" font-size="11" fill="#388E3C" text-anchor="middle">синее</text>
    <text x="390" y="130" font-size="11" fill="#388E3C" text-anchor="middle">большое</text>
  </g>
  
  <!-- Examples with nouns -->
  <g transform="translate(50, 240)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="120" height="35" fill="#E3F2FD" rx="5"/>
    <text x="60" y="22" font-size="12" fill="#0D47A1" text-anchor="middle">красивый дом</text>
    
    <rect x="140" y="0" width="120" height="35" fill="#FCE4EC" rx="5"/>
    <text x="200" y="22" font-size="12" fill="#880E4F" text-anchor="middle">красивая машина</text>
    
    <rect x="280" y="0" width="130" height="35" fill="#E8F5E9" rx="5"/>
    <text x="345" y="22" font-size="12" fill="#1B5E20" text-anchor="middle">красивое дерево</text>
  </g>
  
  <!-- Rule -->
  <g transform="translate(100, 290)">
    <rect x="0" y="0" width="300" height="25" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="150" y="18" font-family="Arial, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">💡 Прилагательное согласуется с существительным</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="100" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>