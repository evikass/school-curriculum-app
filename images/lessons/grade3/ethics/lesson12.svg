<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg12)"/>
  
  <!-- Sky elements -->
  <circle cx="450" cy="50" r="22" fill="#FFD54F">
    <animate attributeName="r" values="20;25;20" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#303F9F" text-anchor="middle">🚌 В транспорте</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#3F51B5" opacity="0.6"/>
  
  <!-- Ground/Road -->
  <rect x="0" y="280" width="500" height="70" fill="#78909C"/>
  <line x1="0" y1="315" x2="500" y2="315" stroke="#FFF" stroke-width="3" stroke-dasharray="30,20"/>
  
  <!-- Bus -->
  <g transform="translate(50, 120)">
    <!-- Bus body -->
    <rect x="0" y="30" width="180" height="100" fill="url(#busGrad)" rx="10" stroke="#E65100" stroke-width="2"/>
    <!-- Windows -->
    <rect x="15" y="45" width="35" height="40" fill="#81D4FA" rx="5"/>
    <rect x="60" y="45" width="35" height="40" fill="#81D4FA" rx="5"/>
    <rect x="105" y="45" width="35" height="40" fill="#81D4FA" rx="5"/>
    <rect x="150" y="45" width="20" height="40" fill="#81D4FA" rx="5"/>
    <!-- Door -->
    <rect x="55" y="70" width="25" height="60" fill="#FFB74D" stroke="#E65100" stroke-width="2"/>
    <!-- Wheels -->
    <circle cx="45" cy="130" r="18" fill="#424242"/>
    <circle cx="45" cy="130" r="10" fill="#757575"/>
    <circle cx="135" cy="130" r="18" fill="#424242"/>
    <circle cx="135" cy="130" r="10" fill="#757575"/>
    <!-- Bus sign -->
    <rect x="60" y="32" width="60" height="15" fill="#FFF" rx="3"/>
    <text x="90" y="44" font-family="Arial, sans-serif" font-size="8" fill="#E65100" text-anchor="middle">АВТОБУС</text>
    <!-- Passengers in windows -->
    <circle cx="32" cy="60" r="8" fill="#FFCC80"/>
    <circle cx="122" cy="60" r="8" fill="#FFCC80"/>
    <animateTransform attributeName="transform" type="translate" values="50,120;55,120;50,120" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Bus stop -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="8" height="150" fill="#3F51B5"/>
    <rect x="-20" y="0" width="70" height="20" fill="#3F51B5" rx="3"/>
    <text x="15" y="15" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">ОСТАНОВКА</text>
    <!-- Person waiting -->
    <g transform="translate(50, 40)">
      <circle cx="15" cy="10" r="12" fill="#FFCC80"/>
      <ellipse cx="15" cy="4" rx="10" ry="6" fill="#5D4037"/>
      <rect x="3" y="22" width="24" height="30" rx="6" fill="#E91E63"/>
      <rect x="5" y="52" width="9" height="20" rx="3" fill="#1976D2"/>
      <rect x="16" y="52" width="9" height="20" rx="3" fill="#1976D2"/>
      <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Transport rules -->
  <g transform="translate(380, 60)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="110" height="140" fill="#FFF" rx="10" stroke="#3F51B5"/>
    <text x="55" y="18" font-size="10" font-weight="bold" fill="#303F9F" text-anchor="middle">📋 Правила</text>
    <text x="10" y="38" font-size="8" fill="#3949AB">✓ Уступай место</text>
    <text x="10" y="55" font-size="8" fill="#3949AB">✓ Не толкайся</text>
    <text x="10" y="72" font-size="8" fill="#3949AB">✓ Оплачивай проезд</text>
    <text x="10" y="89" font-size="8" fill="#3949AB">✓ Держись за поручень</text>
    <text x="10" y="106" font-size="8" fill="#3949AB">✓ Не ешь в транспорте</text>
    <text x="10" y="123" font-size="8" fill="#3949AB">✓ Выходи спокойно</text>
    <text x="10" y="140" font-size="8" fill="#3949AB">✓ Благодари водителя</text>
  </g>
  
  <!-- Priority seats sign -->
  <g transform="translate(300, 250)">
    <rect x="0" y="0" width="120" height="40" fill="#E8EAF6" rx="5" stroke="#3F51B5"/>
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#303F9F" text-anchor="middle">👴👵 Уступи место:</text>
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="8" fill="#3949AB" text-anchor="middle">пожилым, детям, беременным</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="260" height="50" fill="#E8EAF6" rx="8" stroke="#3F51B5"/>
    <text x="130" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#303F9F" text-anchor="middle">💡 Общественный транспорт — для всех!</text>
    <text x="130" y="35" font-family="Arial, sans-serif" font-size="10" fill="#3949AB" text-anchor="middle">Будь вежлив и уважай других пассажиров</text>
  </g>
  
  <!-- Decorative elements -->
  <text x="20" y="80" font-size="12">🚕</text>
  <text x="480" y="280" font-size="10">🚶</text>
</svg>