<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="schoolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg8)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="25" fill="#FFD54F">
    <animate attributeName="r" values="23;27;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">🏫 Школа</text>
  <rect x="165" y="42" width="170" height="2" rx="1" fill="#2196F3" opacity="0.6"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="330" rx="270" ry="35" fill="#90CAF9" opacity="0.4"/>
  
  <!-- School building -->
  <g transform="translate(30, 60)">
    <!-- Main building -->
    <rect x="0" y="50" width="180" height="120" fill="url(#schoolGrad)" stroke="#E65100" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="90,0 0,50 180,50" fill="#E65100"/>
    <!-- Flag -->
    <line x1="90" y1="0" x2="90" y2="-30" stroke="#5D4037" stroke-width="3"/>
    <rect x="90" y="-30" width="30" height="20" fill="#F44336">
      <animate attributeName="fill" values="#F44336;#E53935;#F44336" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Windows row 1 -->
    <rect x="15" y="65" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <rect x="55" y="65" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <rect x="100" y="65" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <rect x="140" y="65" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <!-- Windows row 2 -->
    <rect x="15" y="105" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <rect x="55" y="105" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <rect x="100" y="105" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <rect x="140" y="105" width="25" height="25" fill="#81D4FA" stroke="#5D4037" stroke-width="2"/>
    <!-- Door -->
    <rect x="70" y="130" width="40" height="40" fill="#8D6E63" rx="3"/>
    <circle cx="100" cy="150" r="4" fill="#FFD54F"/>
    <!-- Clock -->
    <circle cx="90" cy="30" r="15" fill="#FFF" stroke="#5D4037" stroke-width="2"/>
    <line x1="90" y1="30" x2="90" y2="20" stroke="#5D4037" stroke-width="2"/>
    <line x1="90" y1="30" x2="100" y2="30" stroke="#5D4037" stroke-width="1"/>
    <!-- School sign -->
    <text x="90" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">ШКОЛА</text>
  </g>
  
  <!-- Students -->
  <g transform="translate(230, 100)">
    <!-- Student 1 with backpack -->
    <g transform="translate(0, 0)">
      <rect x="8" y="30" width="25" height="10" fill="#F44336" rx="3"/>
      <circle cx="20" cy="15" r="15" fill="#FFCC80"/>
      <ellipse cx="20" cy="8" rx="12" ry="7" fill="#5D4037"/>
      <rect x="5" y="40" width="30" height="35" rx="8" fill="#2196F3"/>
      <rect x="8" y="75" width="10" height="20" rx="4" fill="#333"/>
      <rect x="22" y="75" width="10" height="20" rx="4" fill="#333"/>
      <circle cx="15" cy="13" r="2" fill="#5D4037"/>
      <circle cx="25" cy="13" r="2" fill="#5D4037"/>
      <path d="M14,22 Q20,28 26,22" stroke="#E65100" stroke-width="2" fill="none"/>
      <!-- Books in hand -->
      <rect x="35" y="50" width="20" height="25" fill="#4CAF50" rx="2"/>
      <rect x="37" y="52" width="16" height="3" fill="#FFF"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;3,0;0,0" dur="2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Student 2 -->
    <g transform="translate(60, 10)">
      <circle cx="20" cy="15" r="15" fill="#FFCC80"/>
      <ellipse cx="20" cy="8" rx="12" ry="8" fill="#FFCC80"/>
      <rect x="5" y="30" width="30" height="35" rx="8" fill="#E91E63"/>
      <rect x="8" y="65" width="10" height="18" rx="4" fill="#333"/>
      <rect x="22" y="65" width="10" height="18" rx="4" fill="#333"/>
      <circle cx="15" cy="13" r="2" fill="#5D4037"/>
      <circle cx="25" cy="13" r="2" fill="#5D4037"/>
      <path d="M14,22 Q20,28 26,22" stroke="#E65100" stroke-width="2" fill="none"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-3,0;0,0" dur="2.2s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- School rules -->
  <g transform="translate(350, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="140" height="130" fill="#FFF" rx="10" stroke="#2196F3"/>
    <text x="70" y="22" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">📚 Правила школы</text>
    <text x="12" y="45" font-size="9" fill="#1976D2">• Приходи вовремя</text>
    <text x="12" y="62" font-size="9" fill="#1976D2">• Уважай учителей</text>
    <text x="12" y="79" font-size="9" fill="#1976D2">• Береги школьное</text>
    <text x="20" y="92" font-size="9" fill="#1976D2">имущество</text>
    <text x="12" y="109" font-size="9" fill="#1976D2">• Помоги одноклассникам</text>
    <text x="12" y="126" font-size="9" fill="#1976D2">• Будь внимателен</text>
  </g>
  
  <!-- Bell -->
  <g transform="translate(250, 240)">
    <ellipse cx="25" cy="25" rx="20" ry="18" fill="#FFD54F" stroke="#E65100" stroke-width="2"/>
    <ellipse cx="25" cy="30" rx="8" ry="5" fill="#E65100"/>
    <line x1="25" y1="7" x2="25" y2="0" stroke="#8D6E63" stroke-width="3"/>
    <circle cx="25" cy="-3" r="5" fill="#8D6E63"/>
    <animateTransform attributeName="transform" type="rotate" values="-5 25 25;5 25 25;-5 25 25" dur="0.5s" repeatCount="indefinite"/>
    <text x="25" y="60" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Звонок!</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(40, 285)">
    <rect x="0" y="0" width="420" height="50" fill="#E3F2FD" rx="8" stroke="#2196F3"/>
    <text x="210" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">💡 Школа — второй дом, береги его!</text>
    <text x="210" y="38" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">Уважай учителей и одноклассников, соблюдай правила</text>
  </g>
</svg>