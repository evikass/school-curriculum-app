<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="projectGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg16)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="300" r="30" fill="#CE93D8" opacity="0.3">
    <animate attributeName="r" values="28;35;28" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="280" r="25" fill="#BA68C8" opacity="0.3">
    <animate attributeName="r" values="23;30;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7B1FA2" text-anchor="middle">📋 Проект</text>
  <rect x="175" y="42" width="150" height="2" rx="1" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="25" fill="#FFD54F">
    <animate attributeName="r" values="23;27;23" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Ground -->
  <ellipse cx="250" cy="330" rx="270" ry="35" fill="#CE93D8" opacity="0.3"/>
  
  <!-- Project board -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="200" height="150" fill="#FFF" stroke="#7B1FA2" stroke-width="3" rx="5"/>
    <rect x="0" y="0" width="200" height="30" fill="url(#projectGrad)" rx="5"/>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">Мой проект</text>
    
    <!-- Sticky notes -->
    <rect x="15" y="40" width="50" height="40" fill="#FFEB3B" rx="3">
      <animate attributeName="y" values="40;38;40" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="55" font-family="Arial, sans-serif" font-size="8" fill="#F57F17" text-anchor="middle">Идея</text>
    <text x="40" y="68" font-family="Arial, sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">💡</text>
    
    <rect x="75" y="40" width="50" height="40" fill="#81C784" rx="3">
      <animate attributeName="y" values="40;42;40" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="55" font-family="Arial, sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">План</text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">📝</text>
    
    <rect x="135" y="40" width="50" height="40" fill="#64B5F6" rx="3">
      <animate attributeName="y" values="40;38;40" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="55" font-family="Arial, sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Действие</text>
    <text x="160" y="68" font-family="Arial, sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">🚀</text>
    
    <!-- Progress bar -->
    <rect x="15" y="95" width="170" height="15" fill="#E0E0E0" rx="3"/>
    <rect x="15" y="95" width="120" height="15" fill="#4CAF50" rx="3">
      <animate attributeName="width" values="100;130;120;110;120" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">Прогресс: 70%</text>
  </g>
  
  <!-- Project ideas -->
  <g transform="translate(260, 60)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="210" height="150" fill="#FFF" rx="10" stroke="#9C27B0"/>
    <text x="105" y="22" font-size="12" font-weight="bold" fill="#7B1FA2" text-anchor="middle">💡 Идеи проектов</text>
    <text x="15" y="45" font-size="9" fill="#8E24AA">🎨 Книга добрых дел класса</text>
    <text x="15" y="62" font-size="9" fill="#8E24AA">🌳 Посадить дерево дружбы</text>
    <text x="15" y="79" font-size="9" fill="#8E24AA">📦 Сбор игрушек для детей</text>
    <text x="15" y="96" font-size="9" fill="#8E24AA">🎭 Театр вежливости</text>
    <text x="15" y="113" font-size="9" fill="#8E24AA">🌍 Экологическая акция</text>
    <text x="15" y="130" font-size="9" fill="#8E24AA">📸 Фотоальбом «Наш класс»</text>
    <text x="15" y="147" font-size="9" fill="#8E24AA">🤝 Помощь пожилым соседям</text>
  </g>
  
  <!-- Working students -->
  <g transform="translate(100, 220)">
    <!-- Student 1 with laptop -->
    <g transform="translate(0, 0)">
      <circle cx="25" cy="15" r="15" fill="#FFCC80"/>
      <ellipse cx="25" cy="8" rx="12" ry="7" fill="#5D4037"/>
      <rect x="10" y="30" width="30" height="25" rx="8" fill="#E91E63"/>
      <!-- Laptop -->
      <rect x="35" y="35" width="30" height="20" fill="#333" rx="2"/>
      <rect x="37" y="37" width="26" height="14" fill="#81D4FA"/>
      <rect x="30" y="55" width="40" height="3" fill="#333" rx="1"/>
      <animate attributeName="opacity" values="1;0.9;1" dur="3s" repeatCount="indefinite"/>
    </g>
    
    <!-- Student 2 with book -->
    <g transform="translate(80, 5)">
      <circle cx="25" cy="15" r="15" fill="#FFCC80"/>
      <ellipse cx="25" cy="8" rx="12" ry="8" fill="#FFCC80"/>
      <rect x="10" y="30" width="30" height="25" rx="8" fill="#2196F3"/>
      <!-- Book -->
      <rect x="35" y="30" width="25" height="20" fill="#4CAF50" rx="2"/>
      <line x1="47" y1="30" x2="47" y2="50" stroke="#2E7D32" stroke-width="2"/>
      <animate attributeName="opacity" values="1;0.95;1" dur="3.5s" repeatCount="indefinite"/>
    </g>
    
    <!-- Student 3 with poster -->
    <g transform="translate(160, 0)">
      <circle cx="25" cy="15" r="15" fill="#FFCC80"/>
      <ellipse cx="25" cy="8" rx="12" ry="7" fill="#5D4037"/>
      <rect x="10" y="30" width="30" height="25" rx="8" fill="#FF9800"/>
      <!-- Poster -->
      <rect x="35" y="10" width="30" height="35" fill="#FFF" stroke="#9C27B0" stroke-width="2" rx="2"/>
      <text x="50" y="30" font-family="Arial, sans-serif" font-size="8" fill="#9C27B0" text-anchor="middle">ДОБРО</text>
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Presentation screen -->
  <g transform="translate(330, 220)">
    <rect x="0" y="0" width="140" height="90" fill="#FFF" stroke="#7B1FA2" stroke-width="2" rx="5"/>
    <rect x="5" y="5" width="130" height="70" fill="#E1BEE7"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Презентация</text>
    <text x="70" y="45" font-family="Arial, sans-serif" font-size="8" fill="#8E24AA" text-anchor="middle">Мой проект:</text>
    <text x="70" y="60" font-family="Arial, sans-serif" font-size="8" fill="#8E24AA" text-anchor="middle">«Добрые дела»</text>
    <rect x="55" y="80" width="30" height="10" fill="#7B1FA2"/>
    <!-- Stand -->
    <rect x="20" y="90" width="5" height="15" fill="#7B1FA2"/>
    <rect x="115" y="90" width="5" height="15" fill="#7B1FA2"/>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(30, 285)">
    <rect x="0" y="0" width="440" height="50" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="220" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle">💡 Проект — это твой вклад в добрые дела!</text>
    <text x="220" y="38" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">Придумай, спланируй и выполни свой проект — сделай мир лучше!</text>
  </g>
  
  <!-- Decorative elements -->
  <text x="20" y="80" font-size="14">✨</text>
  <text x="480" y="150" font-size="12">🌟</text>
  <text x="250" y="320" font-size="16">🎯</text>
</svg>