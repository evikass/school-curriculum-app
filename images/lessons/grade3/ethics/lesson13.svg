<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
    <linearGradient id="curtainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4E342E"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg13)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#880E4F" text-anchor="middle">🎭 В театре</text>
  <rect x="165" y="42" width="170" height="2" rx="1" fill="#E91E63" opacity="0.6"/>
  
  <!-- Theater stage -->
  <g transform="translate(50, 60)">
    <!-- Stage frame -->
    <rect x="0" y="0" width="400" height="200" fill="#1A1A1A" rx="5"/>
    
    <!-- Curtains left -->
    <path d="M0,0 Q20,100 0,200 L30,200 Q50,100 30,0 Z" fill="url(#curtainGrad)">
      <animate attributeName="d" values="M0,0 Q20,100 0,200 L30,200 Q50,100 30,0 Z;M0,0 Q30,100 0,200 L35,200 Q55,100 35,0 Z;M0,0 Q20,100 0,200 L30,200 Q50,100 30,0 Z" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Curtains right -->
    <path d="M400,0 Q380,100 400,200 L370,200 Q350,100 370,0 Z" fill="url(#curtainGrad)">
      <animate attributeName="d" values="M400,0 Q380,100 400,200 L370,200 Q350,100 370,0 Z;M400,0 Q370,100 400,200 L365,200 Q345,100 365,0 Z;M400,0 Q380,100 400,200 L370,200 Q350,100 370,0 Z" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Stage -->
    <rect x="35" y="150" width="330" height="50" fill="url(#stageGrad)"/>
    
    <!-- Spotlight -->
    <ellipse cx="200" cy="130" rx="60" ry="40" fill="#FFF9C4" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Performers silhouettes -->
    <g transform="translate(150, 80)">
      <!-- Dancer 1 -->
      <ellipse cx="30" cy="10" rx="10" ry="8" fill="#5D4037"/>
      <rect x="22" y="18" width="16" height="30" fill="#5D4037"/>
      <polygon points="22,48 15,75 30,75 38,48" fill="#5D4037"/>
      <line x1="15" y1="25" x2="5" y2="45" stroke="#5D4037" stroke-width="4"/>
      <line x1="45" y1="25" x2="55" y2="15" stroke="#5D4037" stroke-width="4"/>
      
      <!-- Dancer 2 -->
      <ellipse cx="80" cy="10" rx="10" ry="8" fill="#5D4037"/>
      <rect x="72" y="18" width="16" height="30" fill="#5D4037"/>
      <polygon points="72,48 65,75 90,75 88,48" fill="#5D4037"/>
      <line x1="65" y1="25" x2="55" y2="15" stroke="#5D4037" stroke-width="4"/>
      <line x1="95" y1="25" x2="105" y2="45" stroke="#5D4037" stroke-width="4"/>
    </g>
    
    <!-- Top curtain valance -->
    <rect x="0" y="0" width="400" height="25" fill="url(#curtainGrad)"/>
    
    <!-- Theater masks -->
    <g transform="translate(175, -5)">
      <circle cx="25" cy="15" r="12" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
      <path d="M18,12 Q25,18 32,12" stroke="#E65100" stroke-width="1.5" fill="none"/>
      <circle cx="21" cy="10" r="2" fill="#E65100"/>
      <circle cx="29" cy="10" r="2" fill="#E65100"/>
    </g>
  </g>
  
  <!-- Audience seats -->
  <g transform="translate(100, 275)">
    <rect x="0" y="0" width="300" height="25" fill="#7B1FA2" rx="3"/>
    <circle cx="30" cy="12" r="8" fill="#FFCC80"/>
    <circle cx="80" cy="12" r="8" fill="#FFCC80"/>
    <circle cx="130" cy="12" r="8" fill="#FFCC80"/>
    <circle cx="180" cy="12" r="8" fill="#FFCC80"/>
    <circle cx="230" cy="12" r="8" fill="#FFCC80"/>
    <circle cx="280" cy="12" r="8" fill="#FFCC80"/>
  </g>
  
  <!-- Theater rules -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="130" height="120" fill="#FFF" rx="10" stroke="#E91E63"/>
    <text x="65" y="18" font-size="10" font-weight="bold" fill="#880E4F" text-anchor="middle">🎭 Правила театра</text>
    <text x="10" y="38" font-size="8" fill="#AD1457">✓ Приходи вовремя</text>
    <text x="10" y="53" font-size="8" fill="#AD1457">✓ Выключи телефон</text>
    <text x="10" y="68" font-size="8" fill="#AD1457">✓ Не разговаривай</text>
    <text x="10" y="83" font-size="8" fill="#AD1457">✓ Не ешь во время</text>
    <text x="10" y="98" font-size="8" fill="#AD1457">✓ Аплодируй в конце</text>
    <text x="10" y="113" font-size="8" fill="#AD1457">✓ Оденься нарядно</text>
  </g>
  
  <!-- Applause hands -->
  <g transform="translate(370, 200)">
    <ellipse cx="20" cy="15" rx="15" ry="12" fill="#FFCC80" stroke="#E65100" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="-10 20 15;10 20 15;-10 20 15" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="45" cy="15" rx="15" ry="12" fill="#FFCC80" stroke="#E65100" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="10 45 15;-10 45 15;10 45 15" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <text x="32" y="45" font-family="Arial, sans-serif" font-size="10" fill="#880E4F" text-anchor="middle">👏 Браво!</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(30, 310)">
    <rect x="0" y="0" width="440" height="35" fill="#FCE4EC" rx="8" stroke="#E91E63"/>
    <text x="220" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#880E4F" text-anchor="middle">💡 В театре — тишина и внимание к артистам!</text>
    <text x="220" y="28" font-family="Arial, sans-serif" font-size="10" fill="#AD1457" text-anchor="middle">Аплодисменты — лучшая благодарность за выступление</text>
  </g>
</svg>