<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="road2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#424242;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#212121;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky2)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="30" fill="#FFD54F">
    <animate attributeName="r" values="28;32;28" dur="2s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFD54F" stroke-width="3">
    <line x1="450" y1="10" x2="450" y2="0">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="480" y1="20" x2="490" y2="10">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="490" y1="50" x2="500" y2="50">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Title -->
  <rect x="100" y="10" width="300" height="40" rx="8" fill="#FFF8E1" stroke="#FF9800" stroke-width="2"/>
  <text x="250" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">🚶 Дорога домой</text>
  
  <!-- Houses -->
  <g transform="translate(20, 80)">
    <!-- House 1 -->
    <rect x="0" y="50" width="60" height="70" fill="#FFCCBC"/>
    <polygon points="30,20 -5,50 65,50" fill="#D84315"/>
    <rect x="20" y="80" width="20" height="40" fill="#8D6E63"/>
    <rect x="5" y="60" width="12" height="12" fill="#81D4FA"/>
    <rect x="43" y="60" width="12" height="12" fill="#81D4FA"/>
  </g>
  
  <g transform="translate(400, 80)">
    <!-- House 2 -->
    <rect x="0" y="50" width="80" height="80" fill="#C5E1A5"/>
    <polygon points="40,15 -10,50 90,50" fill="#558B2F"/>
    <rect x="30" y="90" width="20" height="40" fill="#5D4037"/>
    <rect x="5" y="65" width="15" height="15" fill="#81D4FA"/>
    <rect x="60" y="65" width="15" height="15" fill="#81D4FA"/>
  </g>
  
  <!-- Trees -->
  <g transform="translate(90, 100)">
    <rect x="10" y="50" width="10" height="30" fill="#795548"/>
    <ellipse cx="15" cy="40" rx="20" ry="25" fill="#66BB6A">
      <animate attributeName="ry" values="25;27;25" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <g transform="translate(350, 110)">
    <rect x="10" y="50" width="10" height="25" fill="#795548"/>
    <ellipse cx="15" cy="40" rx="18" ry="22" fill="#81C784">
      <animate attributeName="ry" values="22;24;22" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Road -->
  <rect x="0" y="220" width="500" height="80" fill="url(#road2)"/>
  
  <!-- Road markings -->
  <g fill="#FFF">
    <rect x="20" y="255" width="40" height="8" rx="2">
      <animate attributeName="x" values="20;-60;500;20" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="255" width="40" height="8" rx="2">
      <animate attributeName="x" values="120;40;500;120" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="220" y="255" width="40" height="8" rx="2">
      <animate attributeName="x" values="220;140;500;220" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="320" y="255" width="40" height="8" rx="2">
      <animate attributeName="x" values="320;240;500;320" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="255" width="40" height="8" rx="2">
      <animate attributeName="x" values="420;340;500;420" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Sidewalk -->
  <rect x="0" y="300" width="500" height="50" fill="#BDBDBD"/>
  
  <!-- Child walking -->
  <g transform="translate(200, 270)">
    <ellipse cx="30" cy="60" rx="20" ry="8" fill="#000" opacity="0.2"/>
    <!-- Body -->
    <rect x="20" y="25" width="20" height="30" rx="5" fill="#42A5F5"/>
    <!-- Head -->
    <circle cx="30" cy="15" r="12" fill="#FFCC80"/>
    <!-- Face -->
    <circle cx="26" cy="13" r="2" fill="#333"/>
    <circle cx="34" cy="13" r="2" fill="#333"/>
    <path d="M26,20 Q30,24 34,20" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- Hair -->
    <ellipse cx="30" cy="6" rx="10" ry="5" fill="#5D4037"/>
    <!-- Legs -->
    <rect x="22" y="55" width="6" height="15" rx="2" fill="#1565C0">
      <animate attributeName="y" values="55;53;55" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="32" y="55" width="6" height="15" rx="2" fill="#1565C0">
      <animate attributeName="y" values="55;57;55" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Backpack -->
    <rect x="38" y="28" width="10" height="15" rx="3" fill="#FF7043"/>
  </g>
  
  <!-- School sign -->
  <g transform="translate(150, 170)">
    <rect x="0" y="0" width="50" height="50" fill="#FFF" rx="5" stroke="#1565C0" stroke-width="2"/>
    <text x="25" y="20" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">ШКОЛА</text>
    <text x="25" y="38" font-family="Arial, sans-serif" font-size="18" fill="#1565C0" text-anchor="middle">🏫</text>
  </g>
  
  <!-- Arrow path -->
  <path d="M180,195 Q250,200 250,280 Q250,320 350,320" stroke="#4CAF50" stroke-width="3" fill="none" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" values="0;30" dur="1s" repeatCount="indefinite"/>
  </path>
  <polygon points="350,310 370,320 350,330" fill="#4CAF50">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.5s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Home label -->
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">🏠 Дом</text>
  
  <!-- Safety tip -->
  <rect x="130" y="305" width="240" height="35" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
  <text x="250" y="328" font-family="Arial, sans-serif" font-size="12" fill="#E65100" text-anchor="middle">💡 Выбирай безопасный маршрут!</text>
</svg>