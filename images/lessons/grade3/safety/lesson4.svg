<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="road4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#616161;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#424242;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="zebra4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#E3F2FD"/>
  
  <!-- Sky -->
  <rect width="500" height="150" fill="#BBDEFB"/>
  
  <!-- Sun -->
  <circle cx="430" cy="50" r="35" fill="#FFD54F">
    <animate attributeName="r" values="33;37;33" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <rect x="100" y="15" width="300" height="45" rx="10" fill="#FFF" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0D47A1" text-anchor="middle">🚶 Пешеходный переход</text>
  
  <!-- Buildings in background -->
  <g opacity="0.6">
    <rect x="10" y="60" width="50" height="90" fill="#90A4AE"/>
    <rect x="70" y="40" width="60" height="110" fill="#78909C"/>
    <rect x="370" y="50" width="55" height="100" fill="#90A4AE"/>
    <rect x="435" y="30" width="55" height="120" fill="#78909C"/>
  </g>
  
  <!-- Sidewalks -->
  <rect x="0" y="150" width="500" height="40" fill="#BDBDBD"/>
  <rect x="0" y="260" width="500" height="40" fill="#BDBDBD"/>
  
  <!-- Road -->
  <rect x="0" y="190" width="500" height="70" fill="url(#road4)"/>
  
  <!-- Zebra crossing -->
  <g fill="url(#zebra4)">
    <rect x="150" y="190" width="30" height="70">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="190" y="190" width="30" height="70">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="230" y="190" width="30" height="70">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="270" y="190" width="30" height="70">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="310" y="190" width="30" height="70">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Pedestrian crossing sign -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="50" height="60" fill="#FFF" stroke="#1565C0" stroke-width="2" rx="5"/>
    <circle cx="25" cy="30" r="22" fill="#1565C0"/>
    <!-- Walking person -->
    <circle cx="25" cy="22" r="5" fill="#FFF"/>
    <line x1="25" y1="27" x2="25" y2="38" stroke="#FFF" stroke-width="2"/>
    <line x1="25" y1="31" x2="18" y2="36" stroke="#FFF" stroke-width="2"/>
    <line x1="25" y1="31" x2="32" y2="36" stroke="#FFF" stroke-width="2"/>
    <line x1="25" y1="38" x2="19" y2="48" stroke="#FFF" stroke-width="2"/>
    <line x1="25" y1="38" x2="31" y2="48" stroke="#FFF" stroke-width="2"/>
    <!-- Pole -->
    <rect x="22" y="60" width="6" height="50" fill="#757575"/>
  </g>
  
  <!-- Child crossing -->
  <g transform="translate(200, 145)">
    <!-- Shadow -->
    <ellipse cx="20" cy="110" rx="15" ry="5" fill="#000" opacity="0.2"/>
    <!-- Body -->
    <rect x="10" y="45" width="25" height="40" rx="5" fill="#FF7043"/>
    <!-- Head -->
    <circle cx="22" cy="30" r="18" fill="#FFCC80"/>
    <!-- Face -->
    <circle cx="16" cy="27" r="3" fill="#333"/>
    <circle cx="28" cy="27" r="3" fill="#333"/>
    <path d="M16,36 Q22,42 28,36" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Hair -->
    <ellipse cx="22" cy="16" rx="15" ry="8" fill="#5D4037"/>
    <!-- Legs (walking animation) -->
    <rect x="12" y="85" width="8" height="25" rx="3" fill="#1565C0">
      <animate attributeName="y" values="85;82;85" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="25" y="85" width="8" height="25" rx="3" fill="#1565C0">
      <animate attributeName="y" values="85;88;85" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <!-- Looking left and right -->
    <g>
      <animate attributeName="transform" values="translate(0,0);translate(-2,0);translate(0,0);translate(2,0);translate(0,0)" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- "Look left, look right" arrows -->
  <g font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="140" y="175" fill="#D32F2F">← Сначала</text>
    <text x="140" y="190" fill="#D32F2F">налево</text>
    
    <text x="340" y="175" fill="#388E3C">Затем</text>
    <text x="340" y="190" fill="#388E3C">направо →</text>
  </g>
  
  <!-- Eyes looking animation -->
  <g transform="translate(250, 130)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#FFF" stroke="#333" stroke-width="2"/>
    <circle cx="-10" cy="0" r="6" fill="#1565C0">
      <animate attributeName="cx" values="-10;-10;10;10;-10" dur="3s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="30" cy="0" rx="25" ry="15" fill="#FFF" stroke="#333" stroke-width="2"/>
    <circle cx="20" cy="0" r="6" fill="#1565C0">
      <animate attributeName="cx" values="20;20;40;40;20" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Safety rules -->
  <rect x="50" y="270" width="400" height="65" rx="10" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
  <text x="250" y="292" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">📋 Правила перехода:</text>
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="11" fill="#F57C00" text-anchor="middle">1. Остановись у края дороги</text>
  <text x="250" y="325" font-family="Arial, sans-serif" font-size="11" fill="#FF9800" text-anchor="middle">2. Посмотри налево, потом направо 3. Убедись в безопасности — иди!</text>
  
  <!-- Decorative cars stopped -->
  <g transform="translate(30, 205)">
    <rect x="0" y="0" width="60" height="30" rx="5" fill="#E91E63"/>
    <rect x="5" y="5" width="20" height="12" rx="2" fill="#81D4FA"/>
    <rect x="30" y="5" width="20" height="12" rx="2" fill="#81D4FA"/>
    <circle cx="15" cy="32" r="8" fill="#333"/>
    <circle cx="45" cy="32" r="8" fill="#333"/>
  </g>
  
  <g transform="translate(380, 205)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#3F51B5"/>
    <rect x="5" y="5" width="25" height="12" rx="2" fill="#81D4FA"/>
    <rect x="35" y="5" width="25" height="12" rx="2" fill="#81D4FA"/>
    <circle cx="18" cy="32" r="8" fill="#333"/>
    <circle cx="52" cy="32" r="8" fill="#333"/>
  </g>
</svg>