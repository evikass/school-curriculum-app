<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
    <linearGradient id="circle4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="circle4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg4)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#01579B" text-anchor="middle">🔢 Множества</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#0288D1"/>
  
  <!-- Venn Diagram -->
  <g transform="translate(80, 80)">
    <!-- Circle A -->
    <circle cx="100" cy="100" r="90" fill="#42A5F5" fill-opacity="0.4" stroke="#1565C0" stroke-width="3">
      <animate attributeName="r" values="88;92;88" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Circle B -->
    <circle cx="180" cy="100" r="90" fill="#66BB6A" fill-opacity="0.4" stroke="#2E7D32" stroke-width="3">
      <animate attributeName="r" values="92;88;92" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Labels -->
    <text x="60" y="100" font-family="Arial" font-size="14" fill="#0D47A1" font-weight="bold">A</text>
    <text x="230" y="100" font-family="Arial" font-size="14" fill="#1B5E20" font-weight="bold">B</text>
    
    <!-- Elements in A -->
    <circle cx="50" cy="80" r="12" fill="#FFC107">
      <animate attributeName="cy" values="80;75;80" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="120" r="12" fill="#FFC107">
      <animate attributeName="cy" values="120;125;120" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="70" r="12" fill="#FFC107"/>
    
    <!-- Elements in intersection -->
    <circle cx="130" cy="90" r="12" fill="#E91E63">
      <animate attributeName="r" values="12;14;12" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="110" r="12" fill="#E91E63">
      <animate attributeName="r" values="14;12;14" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Elements in B -->
    <circle cx="200" cy="80" r="12" fill="#9C27B0"/>
    <circle cx="220" cy="120" r="12" fill="#9C27B0">
      <animate attributeName="cy" values="120;115;120" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="130" r="12" fill="#9C27B0"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 280)" font-family="Arial" font-size="10">
    <rect x="0" y="0" width="130" height="50" fill="#FFF" rx="5" stroke="#BDBDBD"/>
    <circle cx="20" cy="15" r="8" fill="#42A5F5"/>
    <text x="35" y="19" fill="#1565C0">Множество A</text>
    <circle cx="20" cy="35" r="8" fill="#66BB6A"/>
    <text x="35" y="39" fill="#2E7D32">Множество B</text>
  </g>
  
  <!-- Operations -->
  <g transform="translate(170, 280)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="70" height="50" fill="#E3F2FD" rx="5">
      <animate attributeName="fill" values="#E3F2FD;#BBDEFB;#E3F2FD" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="35" y="18" text-anchor="middle" fill="#0D47A1" font-weight="bold">A ∩ B</text>
    <text x="35" y="32" text-anchor="middle" fill="#1565C0">Пересечение</text>
    <text x="35" y="44" text-anchor="middle" fill="#1976D2">общие</text>
    
    <rect x="80" y="0" width="70" height="50" fill="#E8F5E9" rx="5">
      <animate attributeName="fill" values="#E8F5E9;#C8E6C9;#E8F5E9" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="115" y="18" text-anchor="middle" fill="#1B5E20" font-weight="bold">A ∪ B</text>
    <text x="115" y="32" text-anchor="middle" fill="#2E7D32">Объединение</text>
    <text x="115" y="44" text-anchor="middle" fill="#388E3C">все</text>
  </g>
  
  <!-- Example box -->
  <g transform="translate(340, 270)">
    <rect x="0" y="0" width="140" height="60" fill="#FFF8E1" rx="8" stroke="#FFB300"/>
    <text x="70" y="18" font-family="Arial" font-size="9" fill="#FF8F00" text-anchor="middle" font-weight="bold">Пример:</text>
    <text x="70" y="33" font-family="Arial" font-size="8" fill="#F57C00" text-anchor="middle">A = {1, 2, 3}</text>
    <text x="70" y="47" font-family="Arial" font-size="8" fill="#F57C00" text-anchor="middle">B = {3, 4, 5}</text>
    <text x="70" y="58" font-family="Arial" font-size="7" fill="#FFA000" text-anchor="middle">A ∩ B = {3}</text>
  </g>
</svg>