<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="yes8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
    <linearGradient id="no8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg8)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">🔀 Ветвления</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#3F51B5"/>
  
  <!-- Decision diamond -->
  <g transform="translate(170, 70)">
    <!-- Diamond -->
    <polygon points="80,0 160,60 80,120 0,60" fill="#7986CB" stroke="#3F51B5" stroke-width="2">
      <animate attributeName="fill" values="#7986CB;#9FA8DA;#7986CB" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <text x="80" y="55" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">Условие?</text>
    <text x="80" y="70" font-family="Arial" font-size="8" fill="#E8EAF6" text-anchor="middle">Да или Нет</text>
    
    <!-- YES branch -->
    <line x1="160" y1="60" x2="220" y2="60" stroke="#43A047" stroke-width="3"/>
    <polygon points="220,55 230,60 220,65" fill="#43A047"/>
    <text x="185" y="52" font-family="Arial" font-size="10" fill="#2E7D32" font-weight="bold">ДА</text>
    
    <rect x="235" y="40" width="90" height="40" fill="url(#yes8)" rx="5"/>
    <text x="280" y="65" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle">Действие 1</text>
    
    <!-- NO branch -->
    <line x1="80" y1="120" x2="80" y2="160" stroke="#E53935" stroke-width="3"/>
    <polygon points="75,160 80,170 85,160" fill="#E53935"/>
    <text x="95" y="145" font-family="Arial" font-size="10" fill="#C62828" font-weight="bold">НЕТ</text>
    
    <rect x="35" y="175" width="90" height="40" fill="url(#no8)" rx="5"/>
    <text x="80" y="200" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle">Действие 2</text>
  </g>
  
  <!-- Code example -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="130" height="100" fill="#263238" rx="8"/>
    <rect x="0" y="0" width="130" height="20" fill="#37474F" rx="8"/>
    <rect x="0" y="16" width="130" height="4" fill="#263238"/>
    
    <text x="10" y="38" font-family="monospace" font-size="8" fill="#80CBC4">если</text>
    <text x="30" y="38" font-family="monospace" font-size="8" fill="#FFD54F">идёт дождь</text>
    <text x="10" y="52" font-family="monospace" font-size="8" fill="#80CBC4">то</text>
    <text x="20" y="66" font-family="monospace" font-size="8" fill="#A5D6A7">возьми зонт</text>
    <text x="10" y="80" font-family="monospace" font-size="8" fill="#80CBC4">иначе</text>
    <text x="20" y="94" font-family="monospace" font-size="8" fill="#EF9A9A">зонтик не нужен</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(20, 210)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="140" height="120" fill="#FFF" rx="8" stroke="#7986CB"/>
    <text x="70" y="18" fill="#3F51B5" text-anchor="middle" font-weight="bold">Примеры:</text>
    
    <rect x="10" y="28" width="120" height="25" fill="#E8EAF6" rx="5"/>
    <text x="70" y="45" fill="#283593" text-anchor="middle">Светофор зелёный?</text>
    
    <rect x="10" y="58" width="120" height="25" fill="#E8EAF6" rx="5"/>
    <text x="70" y="75" fill="#283593" text-anchor="middle">Домашка сделана?</text>
    
    <rect x="10" y="88" width="120" height="25" fill="#E8EAF6" rx="5"/>
    <text x="70" y="105" fill="#283593" text-anchor="middle">Холодно на улице?</text>
  </g>
  
  <!-- Traffic light -->
  <g transform="translate(380, 80)">
    <rect x="0" y="0" width="60" height="140" fill="#37474F" rx="10"/>
    <circle cx="30" cy="30" r="15" fill="#F44336">
      <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="70" r="15" fill="#FFEB3B" opacity="0.3"/>
    <circle cx="30" cy="110" r="15" fill="#4CAF50" opacity="0.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <text x="30" y="160" font-family="Arial" font-size="8" fill="#283593" text-anchor="middle">Стой или иди!</text>
  </g>
  
  <!-- Info box -->
  <g transform="translate(180, 270)">
    <rect x="0" y="0" width="170" height="60" fill="#FFF8E1" rx="8" stroke="#FFA000"/>
    <text x="85" y="20" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Ветвление — выбор</text>
    <text x="85" y="38" font-family="Arial" font-size="9" fill="#F57C00" text-anchor="middle">действия в зависимости</text>
    <text x="85" y="52" font-family="Arial" font-size="9" fill="#FF8F00" text-anchor="middle">от условия</text>
  </g>
  
  <!-- Decorative arrows -->
  <polygon points="380,270 390,280 385,280 385,320 375,320 375,280 370,280" fill="#7986CB" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </polygon>
</svg>