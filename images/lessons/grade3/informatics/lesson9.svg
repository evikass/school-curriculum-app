<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
    <linearGradient id="palette9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg9)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#880E4F" text-anchor="middle">🎨 Графика</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#E91E63"/>
  
  <!-- Drawing canvas -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="200" height="150" fill="#FFF" rx="8" stroke="#E91E63" stroke-width="2"/>
    
    <!-- Simple shapes -->
    <circle cx="50" cy="50" r="30" fill="#FF5722" opacity="0.8">
      <animate attributeName="r" values="28;32;28" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <rect x="100" y="30" width="50" height="40" fill="#2196F3" opacity="0.8">
      <animate attributeName="width" values="50;55;50" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <polygon points="165,70 190,30 215,70" fill="#4CAF50" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </polygon>
    
    <ellipse cx="70" cy="120" rx="40" ry="20" fill="#FFEB3B" opacity="0.8"/>
    
    <line x1="130" y1="90" x2="180" y2="130" stroke="#9C27B0" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Canvas label -->
    <text x="100" y="160" font-family="Arial" font-size="10" fill="#AD1457" text-anchor="middle">Холст для рисования</text>
  </g>
  
  <!-- Color palette -->
  <g transform="translate(260, 70)">
    <ellipse cx="80" cy="50" rx="100" ry="50" fill="#FFF" stroke="#E91E63" stroke-width="2"/>
    
    <!-- Color spots -->
    <circle cx="40" cy="40" r="15" fill="#F44336">
      <animate attributeName="r" values="15;17;15" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="30" r="15" fill="#FF9800"/>
    <circle cx="120" cy="40" r="15" fill="#FFEB3B"/>
    <circle cx="30" cy="70" r="12" fill="#4CAF50"/>
    <circle cx="60" cy="65" r="12" fill="#2196F3">
      <animate attributeName="r" values="12;14;12" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="65" r="12" fill="#9C27B0"/>
    <circle cx="130" cy="70" r="12" fill="#E91E63"/>
    
    <!-- Thumb hole -->
    <ellipse cx="80" cy="55" rx="15" ry="10" fill="#F8BBD9"/>
  </g>
  
  <!-- Tools -->
  <g transform="translate(260, 170)">
    <rect x="0" y="0" width="210" height="70" fill="#FFF" rx="8" stroke="#9C27B0"/>
    <text x="105" y="18" font-family="Arial" font-size="10" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Инструменты:</text>
    
    <!-- Brush -->
    <rect x="20" y="30" width="8" height="30" fill="#8D6E63"/>
    <ellipse cx="24" cy="65" rx="8" ry="4" fill="#5D4037"/>
    
    <!-- Pencil -->
    <rect x="55" y="30" width="6" height="30" fill="#FFC107"/>
    <polygon points="55,60 58,70 61,60" fill="#424242"/>
    
    <!-- Eraser -->
    <rect x="85" y="40" width="25" height="15" fill="#F5F5F5" stroke="#BDBDBD"/>
    <rect x="85" y="40" width="25" height="8" fill="#E91E63"/>
    
    <!-- Fill bucket -->
    <path d="M130,35 L130,60 L155,60 L155,45 L145,35 Z" fill="#42A5F5"/>
    <rect x="130" y="30" width="25" height="8" fill="#1E88E5"/>
    
    <!-- Text -->
    <text x="185" y="55" font-family="Arial" font-size="20" fill="#333" font-weight="bold">T</text>
  </g>
  
  <!-- Shapes panel -->
  <g transform="translate(30, 240)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="200" height="90" fill="#FFF" rx="8" stroke="#E91E63"/>
    <text x="100" y="18" fill="#AD1457" text-anchor="middle" font-weight="bold">Фигуры:</text>
    
    <circle cx="35" cy="50" r="18" fill="none" stroke="#E91E63" stroke-width="2"/>
    <rect x="60" y="32" width="35" height="35" fill="none" stroke="#9C27B0" stroke-width="2"/>
    <polygon points="125,32 140,67 110,67" fill="none" stroke="#673AB7" stroke-width="2"/>
    <ellipse cx="170" cy="50" rx="20" ry="12" fill="none" stroke="#3F51B5" stroke-width="2"/>
    
    <text x="35" y="80" fill="#E91E63" text-anchor="middle">круг</text>
    <text x="78" y="80" fill="#9C27B0" text-anchor="middle">квадрат</text>
    <text x="125" y="80" fill="#673AB7" text-anchor="middle">треуг.</text>
    <text x="170" y="80" fill="#3F51B5" text-anchor="middle">овал</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(260, 260)">
    <rect x="0" y="0" width="210" height="60" fill="#F3E5F5" rx="8" stroke="#7B1FA2"/>
    <text x="105" y="20" font-family="Arial" font-size="10" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Графический редактор</text>
    <text x="105" y="38" font-family="Arial" font-size="9" fill="#7B1FA2" text-anchor="middle">— программа для создания</text>
    <text x="105" y="52" font-family="Arial" font-size="9" fill="#8E24AA" text-anchor="middle">и редактирования рисунков</text>
  </g>
</svg>