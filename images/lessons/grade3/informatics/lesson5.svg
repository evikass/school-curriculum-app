<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#5E35B1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg5)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4A148C" text-anchor="middle">📋 Алгоритмы</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#7B1FA2"/>
  
  <!-- Algorithm flowchart -->
  <g transform="translate(50, 70)">
    <!-- Start -->
    <ellipse cx="200" cy="25" rx="60" ry="25" fill="#4CAF50" stroke="#2E7D32" stroke-width="2">
      <animate attributeName="fill" values="#4CAF50;#66BB6A;#4CAF50" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="200" y="30" font-family="Arial" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">Начало</text>
    
    <!-- Arrow -->
    <line x1="200" y1="50" x2="200" y2="70" stroke="#7B1FA2" stroke-width="2"/>
    <polygon points="195,70 200,80 205,70" fill="#7B1FA2"/>
    
    <!-- Step 1 -->
    <rect x="120" y="80" width="160" height="40" fill="url(#step5)" rx="5"/>
    <text x="200" y="105" font-family="Arial" font-size="11" fill="#FFF" text-anchor="middle">Включи компьютер</text>
    
    <!-- Arrow -->
    <line x1="200" y1="120" x2="200" y2="140" stroke="#7B1FA2" stroke-width="2"/>
    <polygon points="195,140 200,150 205,140" fill="#7B1FA2"/>
    
    <!-- Step 2 -->
    <rect x="120" y="150" width="160" height="40" fill="url(#step5)" rx="5"/>
    <text x="200" y="175" font-family="Arial" font-size="11" fill="#FFF" text-anchor="middle">Открой программу</text>
    
    <!-- Arrow -->
    <line x1="200" y1="190" x2="200" y2="210" stroke="#7B1FA2" stroke-width="2"/>
    <polygon points="195,210 200,220 205,210" fill="#7B1FA2"/>
    
    <!-- End -->
    <ellipse cx="200" cy="240" rx="60" ry="25" fill="#F44336" stroke="#C62828" stroke-width="2">
      <animate attributeName="fill" values="#F44336;#EF5350;#F44336" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="200" y="245" font-family="Arial" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">Конец</text>
  </g>
  
  <!-- Properties -->
  <g transform="translate(320, 80)" font-family="Arial" font-size="10">
    <rect x="0" y="0" width="160" height="130" fill="#FFF" rx="8" stroke="#9C27B0"/>
    <text x="80" y="20" fill="#6A1B9A" text-anchor="middle" font-weight="bold" font-size="11">Свойства:</text>
    
    <circle cx="20" cy="45" r="8" fill="#7E57C2">
      <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="49" fill="#5E35B1">Пошаговый</text>
    
    <circle cx="20" cy="70" r="8" fill="#26A69A">
      <animate attributeName="r" values="10;8;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="74" fill="#00897B">Понятный</text>
    
    <circle cx="20" cy="95" r="8" fill="#EF5350">
      <animate attributeName="r" values="8;10;8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="99" fill="#C62828">Определённый</text>
    
    <circle cx="20" cy="120" r="8" fill="#42A5F5">
      <animate attributeName="r" values="10;8;10" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="124" fill="#1565C0">Результативный</text>
  </g>
  
  <!-- Robot icon -->
  <g transform="translate(340, 230)">
    <rect x="0" y="0" width="120" height="80" fill="#E8F5E9" rx="10" stroke="#4CAF50"/>
    <rect x="35" y="10" width="50" height="40" fill="#81C784" rx="5"/>
    <circle cx="47" cy="25" r="6" fill="#FFF">
      <animate attributeName="fill" values="#FFF;#4CAF50;#FFF" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="73" cy="25" r="6" fill="#FFF">
      <animate attributeName="fill" values="#FFF;#4CAF50;#FFF" dur="1s" repeatCount="indefinite"/>
    </circle>
    <rect x="45" y="38" width="20" height="3" fill="#2E7D32"/>
    <rect x="25" y="55" width="70" height="15" fill="#A5D6A7" rx="3"/>
    <text x="60" y="66" font-family="Arial" font-size="8" fill="#1B5E20" text-anchor="middle">ИСПОЛНИТЕЛЬ</text>
  </g>
  
  <!-- Decorative -->
  <circle cx="30" cy="320" r="6" fill="#CE93D8" opacity="0.7">
    <animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="320" r="6" fill="#CE93D8" opacity="0.7">
    <animate attributeName="r" values="9;6;9" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>