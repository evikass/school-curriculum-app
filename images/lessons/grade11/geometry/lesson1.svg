<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="axis" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <marker id="arrowT" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <!-- Title -->
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="serif">Координаты точки и координаты вектора</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 1</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-width="1" opacity="0.3"/>
  <!-- 3D Coordinate System Panel -->
  <rect x="15" y="58" width="220" height="185" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="125" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Система координат Oxyz</text>
  <!-- Axes -->
  <line x1="120" y1="200" x2="210" y2="155" stroke="#00695C" stroke-width="2" marker-end="url(#arrowT)"/>
  <line x1="120" y1="200" x2="30" y2="235" stroke="#00695C" stroke-width="2" marker-end="url(#arrowT)"/>
  <line x1="120" y1="200" x2="120" y2="90" stroke="#00695C" stroke-width="2" marker-end="url(#arrowT)"/>
  <text x="215" y="155" font-size="11" font-weight="bold" fill="#00695C" font-style="italic">x</text>
  <text x="20" y="240" font-size="11" font-weight="bold" fill="#00695C" font-style="italic">y</text>
  <text x="125" y="88" font-size="11" font-weight="bold" fill="#00695C" font-style="italic">z</text>
  <text x="112" y="212" font-size="9" fill="#00695C" font-weight="bold">O</text>
  <!-- Point M -->
  <circle cx="170" cy="140" r="4" fill="#E53935"/>
  <text x="178" y="136" font-size="10" font-weight="bold" fill="#C62828">M(x,y,z)</text>
  <!-- Projections dashed -->
  <line x1="170" y1="140" x2="170" y2="200" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="170" y1="140" x2="210" y2="155" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <circle cx="170" cy="200" r="2.5" fill="#E53935" opacity="0.5"/>
  <text x="174" y="210" font-size="8" fill="#C62828">M'(x,y,0)</text>
  <!-- Projection lines on axes -->
  <line x1="120" y1="200" x2="195" y2="168" stroke="#00897B" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="120" y1="200" x2="55" y2="225" stroke="#00897B" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="198" y="168" font-size="8" fill="#00897B">x</text>
  <text x="40" y="220" font-size="8" fill="#00897B">y</text>
  <text x="123" y="148" font-size="8" fill="#00897B">z</text>

  <!-- Vector Panel -->
  <rect x="245" y="58" width="240" height="105" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="365" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Координаты вектора</text>
  <!-- Vector arrow -->
  <line x1="270" y1="125" x2="345" y2="95" stroke="#C62828" stroke-width="2.2" marker-end="url(#arrowT)"/>
  <circle cx="270" cy="125" r="3" fill="#00695C"/>
  <text x="256" y="132" font-size="9" fill="#00695C" font-weight="bold">O</text>
  <text x="348" y="92" font-size="9" fill="#C62828" font-weight="bold">A</text>
  <text x="300" y="105" font-size="9" fill="#C62828" font-style="italic">a</text>
  <!-- Formula -->
  <text x="370" y="97" font-size="9" fill="#333">OA = (x, y, z)</text>
  <text x="370" y="112" font-size="9" fill="#333">a = x&#x00B7;i + y&#x00B7;j + z&#x00B7;k</text>
  <text x="370" y="127" font-size="9" fill="#333">|a| = &#x221A;(x&#x00B2;+y&#x00B2;+z&#x00B2;)</text>
  <text x="370" y="142" font-size="8" fill="#00897B">i=(1,0,0) j=(0,1,0) k=(0,0,1)</text>

  <!-- Point-Vector Relation Panel -->
  <rect x="245" y="170" width="240" height="73" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="365" y="186" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Связь точки и вектора</text>
  <text x="260" y="203" font-size="9.5" fill="#333">M(x&#x2081;,y&#x2081;,z&#x2081;), N(x&#x2082;,y&#x2082;,z&#x2082;)</text>
  <text x="260" y="219" font-size="10" fill="#C62828" font-weight="bold">MN = (x&#x2082;-x&#x2081;, y&#x2082;-y&#x2081;, z&#x2082;-z&#x2081;)</text>
  <text x="260" y="234" font-size="9.5" fill="#333">|MN| = &#x221A;(&#x394;x&#x00B2;+&#x394;y&#x00B2;+&#x394;z&#x00B2;)</text>

  <!-- Coordinate planes labels -->
  <rect x="15" y="250" width="220" height="60" rx="6" fill="white" opacity="0.88" stroke="#00897B" stroke-width="1"/>
  <text x="125" y="266" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Координатные плоскости</text>
  <text x="25" y="281" font-size="9" fill="#333">Oxy: z=0</text>
  <text x="25" y="295" font-size="9" fill="#333">Oyz: x=0</text>
  <text x="120" y="281" font-size="9" fill="#333">Oxz: y=0</text>
  <text x="120" y="295" font-size="9" fill="#333">Октанты: 8 областей</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#00695C" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">d = &#x221A;((x&#x2082;-x&#x2081;)&#x00B2; + (y&#x2082;-y&#x2081;)&#x00B2; + (z&#x2082;-z&#x2081;)&#x00B2;) — расстояние между точками в пространстве</text>
</svg>