<line x1="100" y1="120" x2="300" y2="120" stroke="#f97316" stroke-width="1.5"/>
<line x1="200" y1="150" x2="200" y2="120" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3"/>
<text x="205" y="140" fill="#a78bfa" font-size="11" font-family="sans-serif">H</text>
<text x="100" y="30" fill="#e2e8f0" font-size="16" font-family="sans-serif" font-weight="bold">Шаровой сегмент</text>
<text x="60" y="270" fill="#64748b" font-size="12" font-family="sans-serif">Vсегм = πH²(3R−H)/3</text>
