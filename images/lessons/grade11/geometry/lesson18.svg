<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="pyrG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F57F17" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="serif">Пирамида. Усечённая пирамида</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 18</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F5722" stroke-width="1" opacity="0.3"/>

  <!-- 3D Pyramid Panel -->
  <rect x="15" y="58" width="225" height="205" rx="6" fill="white" opacity="0.9" stroke="#F5722" stroke-width="1.2"/>
  <text x="127" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Пирамида</text>
  <!-- Base (square, isometric) -->
  <polygon points="60,225 150,225 180,195 90,195" fill="url(#pyrG)" stroke="#E65100" stroke-width="1.5"/>
  <!-- Apex -->
  <circle cx="120" cy="100" r="2.5" fill="#E65100"/>
  <text x="127" y="97" font-size="9" fill="#E65100" font-weight="bold">S</text>
  <!-- Edges -->
  <line x1="60" y1="225" x2="120" y2="100" stroke="#E65100" stroke-width="1.5"/>
  <line x1="150" y1="225" x2="120" y2="100" stroke="#E65100" stroke-width="1.5"/>
  <line x1="180" y1="195" x2="120" y2="100" stroke="#E65100" stroke-width="1.5"/>
  <line x1="90" y1="195" x2="120" y2="100" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Hidden base edges -->
  <line x1="60" y1="225" x2="90" y2="195" stroke="#E65100" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="90" y1="195" x2="180" y2="195" stroke="#E65100" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Height -->
  <line x1="120" y1="100" x2="120" y2="210" stroke="#C62828" stroke-width="1.3" stroke-dasharray="3,2"/>
  <text x="105" y="158" font-size="9" fill="#C62828" font-weight="bold" font-style="italic">h</text>
  <!-- Base center -->
  <circle cx="120" cy="210" r="2" fill="#E65100"/>
  <!-- Base label -->
  <text x="120" y="240" font-size="9" fill="#E65100" font-weight="bold">S<sub>осн</sub></text>
  <!-- Lateral edge -->
  <text x="50" y="168" font-size="8" fill="#F5722" font-style="italic">l (апофема)</text>
  <line x1="105" y1="163" x2="120" y2="100" stroke="#F5722" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.6"/>

  <!-- Frustum Panel -->
  <rect x="250" y="58" width="237" height="155" rx="6" fill="white" opacity="0.9" stroke="#F5722" stroke-width="1.2"/>
  <text x="368" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Усечённая пирамида</text>
  <!-- Bottom base -->
  <polygon points="275,195 365,195 390,170 300,170" fill="url(#pyrG)" stroke="#E65100" stroke-width="1.3"/>
  <!-- Top base -->
  <polygon points="295,145 350,145 365,128 310,128" fill="#F5722" opacity="0.08" stroke="#E65100" stroke-width="1.3"/>
  <!-- Side edges -->
  <line x1="275" y1="195" x2="295" y2="145" stroke="#E65100" stroke-width="1.3"/>
  <line x1="365" y1="195" x2="350" y2="145" stroke="#E65100" stroke-width="1.3"/>
  <line x1="390" y1="170" x2="365" y2="128" stroke="#E65100" stroke-width="1.3"/>
  <line x1="300" y1="170" x2="310" y2="128" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Hidden edges -->
  <line x1="275" y1="195" x2="300" y2="170" stroke="#E65100" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Height -->
  <line x1="255" y1="195" x2="255" y2="135" stroke="#C62828" stroke-width="1.5"/>
  <text x="242" y="168" font-size="9" fill="#C62828" font-weight="bold" font-style="italic">h</text>
  <!-- Areas -->
  <text x="330" y="185" font-size="8" fill="#E65100" font-weight="bold">S<sub>1</sub></text>
  <text x="330" y="143" font-size="8" fill="#E65100" font-weight="bold">S<sub>2</sub></text>

  <!-- Formulas Panel -->
  <rect x="250" y="220" width="237" height="90" rx="6" fill="white" opacity="0.9" stroke="#F5722" stroke-width="1.2"/>
  <text x="368" y="236" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Формулы</text>
  <text x="260" y="253" font-size="9.5" fill="#333">Пирамида:</text>
  <text x="330" y="253" font-size="9" fill="#C62828" font-weight="bold">V = &#x2153;S<sub>осн</sub>&#x00B7;h</text>
  <text x="260" y="270" font-size="9.5" fill="#333">Усечённая:</text>
  <text x="335" y="270" font-size="8.5" fill="#C62828" font-weight="bold">V=&#x2153;h(S&#x2081;+S&#x2082;+&#x221A;(S&#x2081;S&#x2082;))</text>
  <text x="260" y="288" font-size="8.5" fill="#333">S<sub>полн</sub> = S<sub>бок</sub> + S&#x2081; + S&#x2082;</text>
  <text x="260" y="303" font-size="8.5" fill="#F5722">Правильная: S<sub>бок</sub>=&#x2153;(P&#x2081;+P&#x2082;)&#x00B7;l</text>

  <!-- Pyramid type info -->
  <rect x="15" y="270" width="225" height="40" rx="4" fill="white" opacity="0.85" stroke="#F5722" stroke-width="0.8"/>
  <text x="127" y="286" font-size="8.5" fill="#333" text-anchor="middle">Правильная пирамида: основание — прав. многоугольник,</text>
  <text x="127" y="299" font-size="8.5" fill="#333" text-anchor="middle">вершина проецируется в центр основания</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#E65100" opacity="0.85"/>
  <text x="250" y="336" font-size="9" fill="white" text-anchor="middle" font-weight="bold">V<sub>пир</sub>=&#x2153;S<sub>осн</sub>h;  V<sub>усеч</sub>=&#x2153;h(S&#x2081;+S&#x2082;+&#x221A;S&#x2081;S&#x2082;);  S<sub>бок</sub>=&#x2153;(P&#x2081;+P&#x2082;)l</text>
</svg>