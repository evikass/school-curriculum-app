<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="cylinderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90caf9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64b5f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="topGradient">
      <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#1976d2" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#64b5f6" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565c0">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#0d47a1">Урок 11: Цилиндр</text>
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#1976d2">№11</text>
  
  <!-- Основной цилиндр -->
  <ellipse cx="150" cy="120" rx="50" ry="15" fill="url(#topGradient)" stroke="#1565c0" stroke-width="2"/>
  <path d="M 100 120 L 100 200 Q 150 215 200 200 L 200 120" fill="url(#sideGradient)" stroke="#1565c0" stroke-width="2"/>
  <ellipse cx="150" cy="200" rx="50" ry="15" fill="url(#cylinderGradient)" stroke="#1565c0" stroke-width="2"/>
  
  <!-- Элементы цилиндра (подписи) -->
  <line x1="150" y1="120" x2="150" y2="80" stroke="#ff5722" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="160" y="75" font-family="Arial, sans-serif" font-size="11" fill="#d84315">Высота (h)</text>
  
  <line x1="150" y1="160" x2="200" y2="160" stroke="#ff5722" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="205" y="165" font-family="Arial, sans-serif" font-size="11" fill="#d84315">Радиус (r)</text>
  
  <text x="150" y="160" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#0d47a1">Ось цилиндра</text>
  
  <!-- Сечения цилиндра -->
  <g transform="translate(280, 80)">
    <text x="60" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1565c0">Сечения</text>
    
    <!-- Сечение параллельно основаниям -->
    <ellipse cx="30" cy="30" rx="25" ry="7" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="5" y1="30" x2="55" y2="30" stroke="#1565c0" stroke-width="1"/>
    <text x="30" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#0d47a1">Круг</text>
    
    <!-- Сечение осевое -->
    <rect x="90" y="15" width="40" height="30" fill="#90caf9" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="110" y1="15" x2="110" y2="45" stroke="#1565c0" stroke-width="1"/>
    <text x="110" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#0d47a1">Прямоугольник</text>
    
    <!-- Сечение под углом -->
    <ellipse cx="170" cy="30" rx="25" ry="7" fill="#e1f5fe" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="145" y1="30" x2="195" y2="30" stroke="#1565c0" stroke-width="1"/>
    <line x1="170" y1="15" x2="170" y2="45" stroke="#1565c0" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="170" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#0d47a1">Эллипс</text>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(50, 240)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">Формулы:</text>
    
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#0d47a1">Площадь боковой поверхности:</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="13" fill="#d84315">S_бок = 2πrh</text>
    
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="12" fill="#0d47a1">Площадь полной поверхности:</text>
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="13" fill="#d84315">S_полн = 2πr(r + h)</text>
    
    <text x="300" y="25" font-family="Arial, sans-serif" font-size="12" fill="#0d47a1">Объем:</text>
    <text x="300" y="45" font-family="Arial, sans-serif" font-size="13" fill="#d84315">V = πr²h</text>
  </g>
  
  <!-- Примеры применения в географии -->
  <g transform="translate(320, 200)">
    <rect x="0" y="0" width="160" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="80" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1565c0">Применение в географии</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#0d47a1">• Вулканические конусы</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="10" fill="#0d47a1">• Гидротехнические сооружения</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#0d47a1">• Модели земных недр</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <circle cx="30" cy="30" r="3" fill="#ff5722"/>
  <circle cx="470" cy="320" r="3" fill="#ff5722"/>
  
  <!-- Разделительная линия -->
  <line x1="30" y1="220" x2="470" y2="220" stroke="#90caf9" stroke-width="1" stroke-dasharray="5,3"/>
</svg>