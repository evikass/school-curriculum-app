<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg23" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg23)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="22" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Адаптации организмов</text>

  <!-- Row 1: Морфологические -->
  <rect x="10" y="32" width="480" height="95" rx="6" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
  <rect x="10" y="32" width="120" height="18" rx="4" fill="#2E7D32"/>
  <text x="70" y="45" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Морфологические</text>
  <text x="140" y="45" font-size="7" fill="#33691E" font-style="italic">— изменения строения тела</text>

  <!-- Fish body shape (streamlined) -->
  <g transform="translate(40,60)">
    <rect x="-5" y="-5" width="140" height="65" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.5"/>
    <text x="65" y="7" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Обтекаемая форма тела</text>
    <!-- Fish -->
    <g transform="translate(35,30)">
      <ellipse cx="0" cy="0" rx="28" ry="10" fill="#4FC3F7"/>
      <polygon points="28,0 40,-10 40,10" fill="#29B6F6"/>
      <path d="M-5,-10 Q0,-18 5,-10" fill="#29B6F6"/>
      <circle cx="-16" cy="-3" r="3" fill="white"/>
      <circle cx="-16" cy="-3" r="1.5" fill="#0D47A1"/>
      <line x1="-8" y1="0" x2="15" y2="0" stroke="#0288D1" stroke-width="0.5"/>
      <g stroke="#0288D1" stroke-width="0.4">
        <line x1="-5" y1="-2" x2="-5" y2="2"/><line x1="0" y1="-2" x2="0" y2="2"/>
        <line x1="5" y1="-2" x2="5" y2="2"/><line x1="10" y1="-2" x2="10" y2="2"/>
      </g>
    </g>
    <!-- Water flow lines -->
    <g stroke="#90CAF9" stroke-width="0.6" fill="none">
      <path d="M-3,25 Q15,24 35,25 Q55,26 75,25"/>
      <path d="M-3,32 Q15,31 35,32 Q55,33 75,32"/>
      <path d="M-3,39 Q15,38 35,39 Q55,40 75,39"/>
    </g>
  </g>

  <!-- Mole paws -->
  <g transform="translate(200,60)">
    <rect x="-5" y="-5" width="140" height="65" rx="4" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.5"/>
    <text x="65" y="7" font-size="7" fill="#3E2723" text-anchor="middle" font-weight="bold">Копательные конечности</text>
    <!-- Mole -->
    <g transform="translate(30,30)">
      <ellipse cx="0" cy="0" rx="16" ry="12" fill="#5D4037"/>
      <ellipse cx="0" cy="-5" rx="12" ry="9" fill="#6D4C41"/>
      <!-- Eyes (tiny) -->
      <circle cx="-4" cy="-6" r="1" fill="#1A1A1A"/>
      <circle cx="4" cy="-6" r="1" fill="#1A1A1A"/>
      <!-- Nose -->
      <ellipse cx="0" cy="-3" rx="3" ry="2" fill="#E8967A"/>
      <!-- Big paws -->
      <g transform="translate(-18,5)">
        <ellipse cx="0" cy="0" rx="8" ry="5" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
        <line x1="-5" y1="-2" x2="-5" y2="3" stroke="#3E2723" stroke-width="0.8"/>
        <line x1="-2" y1="-3" x2="-2" y2="3" stroke="#3E2723" stroke-width="0.8"/>
        <line x1="1" y1="-3" x2="1" y2="3" stroke="#3E2723" stroke-width="0.8"/>
        <line x1="4" y1="-2" x2="4" y2="3" stroke="#3E2723" stroke-width="0.8"/>
      </g>
      <g transform="translate(18,5)">
        <ellipse cx="0" cy="0" rx="8" ry="5" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
        <line x1="-5" y1="-2" x2="-5" y2="3" stroke="#3E2723" stroke-width="0.8"/>
        <line x1="-2" y1="-3" x2="-2" y2="3" stroke="#3E2723" stroke-width="0.8"/>
        <line x1="1" y1="-3" x2="1" y2="3" stroke="#3E2723" stroke-width="0.8"/>
        <line x1="4" y1="-2" x2="4" y2="3" stroke="#3E2723" stroke-width="0.8"/>
      </g>
    </g>
    <text x="65" y="53" font-size="6" fill="#5D4037" text-anchor="middle">Крот — подземный житель</text>
  </g>

  <!-- Thick fur / camouflage -->
  <g transform="translate(360,60)">
    <rect x="-5" y="-5" width="130" height="65" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.5"/>
    <text x="60" y="7" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">Защитная окраска</text>
    <!-- Polar bear silhouette -->
    <g transform="translate(30,25)">
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
      <ellipse cx="-14" cy="-10" rx="8" ry="7" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
      <circle cx="-18" cy="-12" r="1.5" fill="#1A1A1A"/>
      <ellipse cx="-16" cy="-9" rx="2" ry="1.2" fill="#1A1A1A"/>
      <circle cx="-5" cy="12" r="5" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
      <circle cx="10" cy="12" r="5" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
      <!-- Snow -->
      <circle cx="25" cy="10" r="2" fill="#E3F2FD"/><circle cx="30" cy="8" r="1.5" fill="#E3F2FD"/>
    </g>
    <text x="60" y="53" font-size="6" fill="#7B1FA2" text-anchor="middle">Белый медведь — маскировка</text>
  </g>

  <!-- Row 2: Физиологические -->
  <rect x="10" y="132" width="480" height="95" rx="6" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="1"/>
  <rect x="10" y="132" width="120" height="18" rx="4" fill="#E65100"/>
  <text x="70" y="145" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Физиологические</text>
  <text x="140" y="145" font-size="7" fill="#BF360C" font-style="italic">— процессы обмена веществ</text>

  <!-- Thermoregulation -->
  <g transform="translate(40,158)">
    <rect x="-5" y="-5" width="140" height="65" rx="4" fill="#FFF3E0" stroke="#FF8A65" stroke-width="0.5"/>
    <text x="65" y="7" font-size="7" fill="#BF360C" text-anchor="middle" font-weight="bold">Терморегуляция</text>
    <!-- Human body outline -->
    <g transform="translate(35,28)">
      <ellipse cx="0" cy="-8" rx="6" ry="7" fill="#FFCC80"/>
      <rect x="-8" y="-1" width="16" height="20" rx="4" fill="#42A5F5"/>
      <!-- Heat arrows going out -->
      <g stroke="#F44336" stroke-width="0.8">
        <line x1="10" y1="5" x2="18" y2="3"/><line x1="10" y1="10" x2="18" y2="10"/>
        <line x1="10" y1="15" x2="18" y2="17"/>
      </g>
      <text x="22" y="4" font-size="4" fill="#F44336">→ 37°C</text>
      <!-- Sweat drops -->
      <ellipse cx="14" cy="7" rx="1.5" ry="2.5" fill="#42A5F5" opacity="0.6"/>
      <ellipse cx="16" cy="14" rx="1.5" ry="2.5" fill="#42A5F5" opacity="0.6"/>
    </g>
    <!-- Cold side -->
    <g transform="translate(85,28)">
      <ellipse cx="0" cy="-8" rx="6" ry="7" fill="#FFCC80"/>
      <rect x="-8" y="-1" width="16" height="20" rx="4" fill="#1565C0"/>
      <!-- Shiver lines -->
      <path d="M-10,5 Q-8,3 -10,1" fill="none" stroke="#90CAF9" stroke-width="0.6"/>
      <path d="M-10,10 Q-8,8 -10,6" fill="none" stroke="#90CAF9" stroke-width="0.6"/>
      <text x="-12" y="20" font-size="4" fill="#42A5F5">← холод</text>
    </g>
    <text x="65" y="55" font-size="5.5" fill="#BF360C" text-anchor="middle">Поддержание t° тела</text>
  </g>

  <!-- Kidney / Osmoregulation -->
  <g transform="translate(200,158)">
    <rect x="-5" y="-5" width="140" height="65" rx="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
    <text x="65" y="7" font-size="7" fill="#880E4F" text-anchor="middle" font-weight="bold">Осморегуляция (почки)</text>
    <!-- Kidney shape -->
    <g transform="translate(40,30)">
      <path d="M0,-12 Q10,-12 12,-4 Q14,4 8,10 Q4,14 0,14 Q-4,14 -8,10 Q-14,4 -12,-4 Q-10,-12 0,-12Z" fill="#EF9A9A" stroke="#C62828" stroke-width="0.8"/>
      <path d="M0,-8 Q6,-8 7,-3 Q8,2 4,6 Q2,8 0,8 Q-2,8 -4,6 Q-8,2 -7,-3 Q-6,-8 0,-8Z" fill="#FFCDD2"/>
      <!-- Nephron tube -->
      <path d="M2,-5 Q8,-2 6,3 Q4,7 0,5" fill="none" stroke="#C62828" stroke-width="0.6"/>
    </g>
    <!-- Arrow: blood in -->
    <path d="M18,28 L28,25" fill="none" stroke="#F44336" stroke-width="1" marker-end="none"/>
    <text x="10" y="22" font-size="4.5" fill="#C62828">кровь→</text>
    <!-- Arrow: urine out -->
    <path d="M55,30 L65,33" fill="none" stroke="#FFB300" stroke-width="1"/>
    <text x="67" y="35" font-size="4.5" fill="#FF8F00">→моча</text>
    <text x="65" y="55" font-size="5.5" fill="#880E4F" text-anchor="middle">Выведение продуктов обмена</text>
  </g>

  <!-- Hibernation / metabolic adaptation -->
  <g transform="translate(360,158)">
    <rect x="-5" y="-5" width="130" height="65" rx="4" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.5"/>
    <text x="60" y="7" font-size="7" fill="#1A237E" text-anchor="middle" font-weight="bold">Спячка / Анабиоз</text>
    <!-- Sleeping bear -->
    <g transform="translate(25,28)">
      <ellipse cx="0" cy="2" rx="14" ry="10" fill="#8D6E63"/>
      <ellipse cx="-10" cy="-4" rx="7" ry="6" fill="#8D6E63"/>
      <!-- Closed eyes -->
      <path d="M-13,-4 Q-11,-6 -9,-4" fill="none" stroke="#3E2723" stroke-width="0.8"/>
      <!-- Zzz -->
      <text x="8" y="-10" font-size="7" fill="#7986CB" font-weight="bold">Z</text>
      <text x="13" y="-14" font-size="6" fill="#9FA8DA">z</text>
      <text x="17" y="-17" font-size="5" fill="#B0BEC5">z</text>
    </g>
    <!-- Metabolism graph -->
    <g transform="translate(70,18)">
      <rect x="0" y="0" width="45" height="30" fill="white" stroke="#3F51B5" stroke-width="0.5" rx="2"/>
      <line x1="5" y1="25" x2="40" y2="25" stroke="#3F51B5" stroke-width="0.5"/>
      <line x1="5" y1="5" x2="5" y2="25" stroke="#3F51B5" stroke-width="0.5"/>
      <text x="4" y="4" font-size="4" fill="#3F51B5">↑Обмен</text>
      <!-- High metabolism line then drop -->
      <polyline points="8,10 15,8 22,8 28,22 35,23 40,24" fill="none" stroke="#F44336" stroke-width="1"/>
      <text x="15" y="30" font-size="3.5" fill="#3F51B5">лето   зима</text>
    </g>
    <text x="60" y="55" font-size="5.5" fill="#1A237E" text-anchor="middle">Снижение обмена веществ</text>
  </g>

  <!-- Row 3: Поведенческие -->
  <rect x="10" y="232" width="480" height="110" rx="6" fill="white" fill-opacity="0.5" stroke="#6A1B9A" stroke-width="1"/>
  <rect x="10" y="232" width="120" height="18" rx="4" fill="#6A1B9A"/>
  <text x="70" y="245" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Поведенческие</text>
  <text x="140" y="245" font-size="7" fill="#4A148C" font-style="italic">— действия организма в ответ на условия</text>

  <!-- Bird migration -->
  <g transform="translate(40,258)">
    <rect x="-5" y="-5" width="140" height="78" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.5"/>
    <text x="65" y="8" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Миграция птиц</text>
    <!-- Map-like background -->
    <rect x="8" y="14" width="120" height="50" rx="3" fill="#E8F5E9"/>
    <!-- V-shaped bird flock -->
    <g transform="translate(40,28)">
      <path d="M0,0 L5,-5 L10,0" fill="none" stroke="#1A237E" stroke-width="1.2"/>
      <path d="M-8,4 L-3,-1 L2,4" fill="none" stroke="#1A237E" stroke-width="1"/>
      <path d="M8,4 L13,-1 L18,4" fill="none" stroke="#1A237E" stroke-width="1"/>
      <path d="M-16,8 L-11,3 L-6,8" fill="none" stroke="#1A237E" stroke-width="0.8"/>
      <path d="M16,8 L21,3 L26,8" fill="none" stroke="#1A237E" stroke-width="0.8"/>
    </g>
    <!-- Direction arrow -->
    <path d="M70,45 L110,30" fill="none" stroke="#F44336" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <defs><marker id="arrowRed" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#F44336"/></marker></defs>
    <!-- Season labels -->
    <text x="25" y="58" font-size="5" fill="#0D47A1">Осень →</text>
    <text x="95" y="26" font-size="5" fill="#0D47A1">Юг</text>
    <!-- Return arrow -->
    <path d="M110,38 L70,52" fill="none" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="85" y="58" font-size="5" fill="#2E7D32">← Весна</text>
  </g>

  <!-- Beaver dam -->
  <g transform="translate(200,258)">
    <rect x="-5" y="-5" width="140" height="78" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5"/>
    <text x="65" y="8" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Строительство (бобр)</text>
    <!-- Water -->
    <rect x="8" y="40" width="120" height="25" rx="2" fill="#4FC3F7"/>
    <!-- Dam structure -->
    <g transform="translate(15,30)">
      <rect x="0" y="0" width="40" height="15" rx="1" fill="#8D6E63"/>
      <!-- Logs -->
      <line x1="0" y1="3" x2="40" y2="3" stroke="#5D4037" stroke-width="2"/>
      <line x1="0" y1="8" x2="40" y2="8" stroke="#5D4037" stroke-width="2"/>
      <line x1="0" y1="13" x2="40" y2="13" stroke="#5D4037" stroke-width="2"/>
      <!-- Vertical supports -->
      <line x1="10" y1="0" x2="10" y2="15" stroke="#4E342E" stroke-width="1.5"/>
      <line x1="25" y1="0" x2="25" y2="15" stroke="#4E342E" stroke-width="1.5"/>
      <line x1="35" y1="0" x2="35" y2="15" stroke="#4E342E" stroke-width="1.5"/>
    </g>
    <!-- Beaver -->
    <g transform="translate(90,32)">
      <ellipse cx="0" cy="0" rx="8" ry="6" fill="#8D6E63"/>
      <ellipse cx="-6" cy="-4" rx="4" ry="3" fill="#8D6E63"/>
      <circle cx="-7" cy="-5" r="1" fill="#1A1A1A"/>
      <!-- Tail -->
      <ellipse cx="10" cy="2" rx="5" ry="2" fill="#5D4037"/>
    </g>
    <!-- Water level difference -->
    <line x1="8" y1="38" x2="55" y2="38" stroke="#0288D1" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="30" y="36" font-size="4.5" fill="#01579B">уровень воды</text>
  </g>

  <!-- Pack hunting / schooling -->
  <g transform="translate(360,258)">
    <rect x="-5" y="-5" width="130" height="78" rx="4" fill="#FFF3E0" stroke="#FF8A65" stroke-width="0.5"/>
    <text x="60" y="8" font-size="7" fill="#BF360C" text-anchor="middle" font-weight="bold">Стайное поведение</text>
    <!-- School of fish -->
    <g transform="translate(15,20)">
      <ellipse cx="10" cy="10" rx="6" ry="3" fill="#FF8A65"/>
      <polygon points="16,10 20,7 20,13" fill="#FF8A65"/>
      <ellipse cx="25" cy="5" rx="5" ry="2.5" fill="#FFAB91"/>
      <polygon points="30,5 33,3 33,7" fill="#FFAB91"/>
      <ellipse cx="5" cy="18" rx="5" ry="2.5" fill="#FF8A65"/>
      <polygon points="10,18 13,16 13,20" fill="#FF8A65"/>
      <ellipse cx="22" cy="20" rx="5" ry="2.5" fill="#FFAB91"/>
      <polygon points="27,20 30,18 30,22" fill="#FFAB91"/>
      <ellipse cx="38" cy="12" rx="5" ry="2.5" fill="#FF8A65"/>
      <polygon points="43,12 46,10 46,14" fill="#FF8A65"/>
      <ellipse cx="35" cy="22" rx="5" ry="2.5" fill="#FFAB91"/>
      <polygon points="40,22 43,20 43,24" fill="#FFAB91"/>
      <ellipse cx="45" cy="5" rx="5" ry="2.5" fill="#FF8A65"/>
      <polygon points="50,5 53,3 53,7" fill="#FF8A65"/>
      <ellipse cx="50" cy="17" rx="5" ry="2.5" fill="#FFAB91"/>
      <polygon points="55,17 58,15 58,19" fill="#FFAB91"/>
    </g>
    <text x="60" y="68" font-size="5.5" fill="#BF360C" text-anchor="middle">Защита от хищников</text>
    <text x="60" y="75" font-size="5.5" fill="#BF360C" text-anchor="middle">Совместная охота</text>
  </g>
</svg>