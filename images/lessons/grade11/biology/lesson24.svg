<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg24" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg24)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="22" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Популяция как экологическая единица</text>

  <!-- Growth curves section -->
  <rect x="15" y="32" width="470" height="170" rx="6" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="1"/>
  <text x="250" y="48" font-size="11" font-weight="bold" fill="#BF360C" text-anchor="middle">Кривые роста популяции</text>

  <!-- J-shaped curve (exponential) -->
  <g transform="translate(30,58)">
    <rect x="0" y="0" width="210" height="135" rx="4" fill="#FFF8E1" stroke="#FF8F00" stroke-width="0.8"/>
    <text x="105" y="15" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">J-образная кривая</text>
    <text x="105" y="25" font-size="7" fill="#BF360C" text-anchor="middle">(Экспоненциальный рост)</text>
    
    <!-- Axes -->
    <line x1="25" y1="30" x2="25" y2="118" stroke="#5D4037" stroke-width="1"/>
    <line x1="25" y1="118" x2="195" y2="118" stroke="#5D4037" stroke-width="1"/>
    <polygon points="25,28 23,34 27,34" fill="#5D4037"/>
    <polygon points="197,118 191,116 191,120" fill="#5D4037"/>
    
    <!-- Axis labels -->
    <text x="110" y="130" font-size="6" fill="#5D4037" text-anchor="middle">Время (t)</text>
    <text x="12" y="75" font-size="6" fill="#5D4037" text-anchor="middle" transform="rotate(-90,12,75)">N (число)</text>
    
    <!-- J-curve -->
    <path d="M25,115 Q50,114 80,112 Q110,108 130,100 Q150,88 165,68 Q175,50 185,35" fill="none" stroke="#F44336" stroke-width="2.5"/>
    
    <!-- Formula -->
    <text x="105" y="95" font-size="7" fill="#C62828" font-weight="bold" text-anchor="middle">dN/dt = rN</text>
    <text x="105" y="106" font-size="6" fill="#C62828" text-anchor="middle">r — удельная скорость роста</text>
    
    <!-- Annotation -->
    <path d="M170,40 L180,35" fill="none" stroke="#F44336" stroke-width="0.8"/>
    <text x="145" y="45" font-size="5.5" fill="#F44336">Неограниченный</text>
    <text x="147" y="52" font-size="5.5" fill="#F44336">рост ↑</text>
    
    <!-- Example -->
    <text x="105" y="122" font-size="5" fill="#BF360C" text-anchor="middle">Пример: бактерии в питательной среде</text>
  </g>

  <!-- S-shaped curve (logistic) -->
  <g transform="translate(260,58)">
    <rect x="0" y="0" width="210" height="135" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="105" y="15" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">S-образная кривая</text>
    <text x="105" y="25" font-size="7" fill="#2E7D32" text-anchor="middle">(Логистический рост)</text>
    
    <!-- Axes -->
    <line x1="25" y1="30" x2="25" y2="118" stroke="#5D4037" stroke-width="1"/>
    <line x1="25" y1="118" x2="195" y2="118" stroke="#5D4037" stroke-width="1"/>
    <polygon points="25,28 23,34 27,34" fill="#5D4037"/>
    <polygon points="197,118 191,116 191,120" fill="#5D4037"/>
    
    <!-- Axis labels -->
    <text x="110" y="130" font-size="6" fill="#5D4037" text-anchor="middle">Время (t)</text>
    <text x="12" y="75" font-size="6" fill="#5D4037" text-anchor="middle" transform="rotate(-90,12,75)">N (число)</text>
    
    <!-- Carrying capacity line K -->
    <line x1="25" y1="52" x2="195" y2="52" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="5,3"/>
    <text x="195" y="49" font-size="7" fill="#1565C0" text-anchor="end" font-weight="bold">K — Ёмкость среды</text>
    
    <!-- S-curve -->
    <path d="M25,115 Q45,114 65,110 Q85,102 105,85 Q125,65 140,57 Q155,53 170,52 Q180,52 190,52" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
    
    <!-- Formula -->
    <text x="105" y="80" font-size="7" fill="#1B5E20" font-weight="bold" text-anchor="middle">dN/dt = rN(K-N)/K</text>
    
    <!-- Lag phase label -->
    <text x="45" y="108" font-size="5" fill="#2E7D32">Лаг-фаза</text>
    <!-- Log phase label -->
    <text x="80" y="72" font-size="5" fill="#2E7D32" transform="rotate(-50,80,72)">Лог-фаза</text>
    <!-- Stationary phase -->
    <text x="170" y="48" font-size="5" fill="#2E7D32">Стационарная</text>
    
    <!-- Example -->
    <text x="105" y="122" font-size="5" fill="#2E7D32" text-anchor="middle">Пример: олени на острове</text>
  </g>

  <!-- Comparison table -->
  <rect x="15" y="210" width="470" height="130" rx="6" fill="white" fill-opacity="0.6" stroke="#795548" stroke-width="1"/>
  <text x="250" y="228" font-size="11" font-weight="bold" fill="#4E342E" text-anchor="middle">Сравнение стратегий жизнедеятельности</text>

  <!-- Table headers -->
  <rect x="25" y="236" width="220" height="18" rx="3" fill="#F44336"/>
  <text x="135" y="249" font-size="9" font-weight="bold" fill="white" text-anchor="middle">r-стратегия</text>
  
  <rect x="255" y="236" width="220" height="18" rx="3" fill="#1565C0"/>
  <text x="365" y="249" font-size="9" font-weight="bold" fill="white" text-anchor="middle">K-стратегия</text>

  <!-- r-strategy content -->
  <g transform="translate(30,260)">
    <text x="0" y="0" font-size="7" fill="#C62828">• Много мелких потомков</text>
    <text x="0" y="12" font-size="7" fill="#C62828">• Низкая забота о потомстве</text>
    <text x="0" y="24" font-size="7" fill="#C62828">• Быстрое развитие, ранняя смертность</text>
    <text x="0" y="36" font-size="7" fill="#C62828">• Краткая продолжительность жизни</text>
    <text x="0" y="48" font-size="7" fill="#C62828">• Хорошо переносят нарушения среды</text>
    <text x="0" y="62" font-size="7" fill="#C62828" font-weight="bold">Примеры: бактерии, насекомые,</text>
    <text x="0" y="73" font-size="7" fill="#C62828" font-weight="bold">однолетние растения, мыши</text>
    
    <!-- Small organisms icon -->
    <g transform="translate(175,5)">
      <circle cx="5" cy="5" r="2" fill="#FFCDD2"/><circle cx="12" cy="3" r="1.5" fill="#FFCDD2"/>
      <circle cx="8" cy="12" r="1.8" fill="#FFCDD2"/><circle cx="18" cy="10" r="2" fill="#FFCDD2"/>
      <circle cx="3" cy="15" r="1.5" fill="#FFCDD2"/><circle cx="22" cy="5" r="1.2" fill="#FFCDD2"/>
      <text x="12" y="25" font-size="5" fill="#C62828" text-anchor="middle">много ↓</text>
    </g>
  </g>

  <!-- K-strategy content -->
  <g transform="translate(260,260)">
    <text x="0" y="0" font-size="7" fill="#0D47A1">• Мало крупных потомков</text>
    <text x="0" y="12" font-size="7" fill="#0D47A1">• Высокая забота о потомстве</text>
    <text x="0" y="24" font-size="7" fill="#0D47A1">• Медленное развитие, низкая смертность</text>
    <text x="0" y="36" font-size="7" fill="#0D47A1">• Долгая продолжительность жизни</text>
    <text x="0" y="48" font-size="7" fill="#0D47A1">• Чувствительны к нарушениям среды</text>
    <text x="0" y="62" font-size="7" fill="#0D47A1" font-weight="bold">Примеры: слоны, киты, приматы,</text>
    <text x="0" y="73" font-size="7" fill="#0D47A1" font-weight="bold">долгоживущие деревья</text>
    
    <!-- Large organism icon -->
    <g transform="translate(185,10)">
      <ellipse cx="12" cy="12" rx="10" ry="8" fill="#BBDEFB"/>
      <circle cx="8" cy="6" r="4" fill="#BBDEFB"/>
      <circle cx="7" cy="5" r="1" fill="#0D47A1"/>
      <line x1="5" y1="18" x2="3" y2="25" stroke="#0D47A1" stroke-width="1.2"/>
      <line x1="19" y1="18" x2="21" y2="25" stroke="#0D47A1" stroke-width="1.2"/>
      <text x="12" y="33" font-size="5" fill="#0D47A1" text-anchor="middle">мало ↓</text>
    </g>
  </g>
</svg>