<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg26)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="22" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биологические сообщества (Биоценозы)</text>

  <!-- Forest cross-section showing ярусность -->
  <rect x="10" y="34" width="330" height="248" rx="6" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1"/>
  
  <!-- Sky -->
  <rect x="10" y="34" width="330" height="60" rx="6" fill="#B3E5FC"/>
  <rect x="10" y="85" width="330" height="9" fill="#B3E5FC"/>
  
  <!-- Sun -->
  <circle cx="305" cy="55" r="12" fill="#FDD835"/>
  <g stroke="#FDD835" stroke-width="1.2">
    <line x1="305" y1="39" x2="305" y2="35"/><line x1="305" y1="71" x2="305" y2="75"/>
    <line x1="289" y1="55" x2="285" y2="55"/><line x1="321" y1="55" x2="325" y2="55"/>
    <line x1="293" y1="43" x2="290" y2="40"/><line x1="317" y1="67" x2="320" y2="70"/>
    <line x1="317" y1="43" x2="320" y2="40"/><line x1="293" y1="67" x2="290" y2="70"/>
  </g>
  
  <!-- Clouds -->
  <ellipse cx="80" cy="48" rx="18" ry="8" fill="white" opacity="0.8"/>
  <ellipse cx="95" cy="45" rx="12" ry="7" fill="white" opacity="0.8"/>
  <ellipse cx="200" cy="52" rx="15" ry="6" fill="white" opacity="0.7"/>

  <!-- Layer 1: Деревья (top canopy) -->
  <!-- Tree 1 - tall -->
  <rect x="60" y="70" width="8" height="80" fill="#5D4037"/>
  <ellipse cx="64" cy="62" rx="25" ry="22" fill="#2E7D32"/>
  <ellipse cx="50" cy="68" rx="15" ry="14" fill="#388E3C"/>
  <ellipse cx="78" cy="66" rx="15" ry="13" fill="#388E3C"/>
  
  <!-- Tree 2 - tall -->
  <rect x="150" y="60" width="8" height="90" fill="#5D4037"/>
  <ellipse cx="154" cy="52" rx="28" ry="24" fill="#2E7D32"/>
  <ellipse cx="138" cy="58" rx="16" ry="14" fill="#388E3C"/>
  <ellipse cx="170" cy="56" rx="16" ry="13" fill="#388E3C"/>
  
  <!-- Tree 3 - tall -->
  <rect x="250" y="65" width="8" height="85" fill="#5D4037"/>
  <ellipse cx="254" cy="57" rx="22" ry="20" fill="#2E7D32"/>
  <ellipse cx="240" cy="63" rx="14" ry="12" fill="#388E3C"/>
  <ellipse cx="268" cy="61" rx="14" ry="12" fill="#388E3C"/>

  <!-- Layer label: Деревья -->
  <line x1="340" y1="55" x2="340" y2="150" stroke="#1B5E20" stroke-width="2"/>
  <line x1="335" y1="55" x2="340" y2="55" stroke="#1B5E20" stroke-width="1.5"/>
  <line x1="335" y1="150" x2="340" y2="150" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="345" y="100" font-size="8" fill="#1B5E20" font-weight="bold" transform="rotate(90,345,100)">Деревья (I ярус)</text>

  <!-- Layer 2: Кустарники -->
  <!-- Bush 1 -->
  <ellipse cx="40" cy="165" rx="18" ry="14" fill="#4CAF50"/>
  <rect x="38" y="165" width="4" height="30" fill="#5D4037"/>
  <ellipse cx="55" cy="170" rx="12" ry="10" fill="#66BB6A"/>
  
  <!-- Bush 2 -->
  <ellipse cx="120" cy="162" rx="20" ry="15" fill="#4CAF50"/>
  <rect x="118" y="162" width="4" height="28" fill="#5D4037"/>
  
  <!-- Bush 3 -->
  <ellipse cx="210" cy="168" rx="16" ry="12" fill="#4CAF50"/>
  <rect x="208" y="168" width="4" height="25" fill="#5D4037"/>
  <ellipse cx="225" cy="172" rx="10" ry="8" fill="#66BB6A"/>
  
  <!-- Bush 4 -->
  <ellipse cx="290" cy="163" rx="18" ry="13" fill="#4CAF50"/>
  <rect x="288" y="163" width="4" height="27" fill="#5D4037"/>

  <!-- Layer label: Кустарники -->
  <line x1="340" y1="155" x2="340" y2="195" stroke="#2E7D32" stroke-width="2"/>
  <line x1="335" y1="155" x2="340" y2="155" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="335" y1="195" x2="340" y2="195" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="345" y="178" font-size="7" fill="#2E7D32" font-weight="bold" transform="rotate(90,345,178)">Кустарники (II ярус)</text>

  <!-- Layer 3: Травы -->
  <g stroke="#43A047" stroke-width="1.5" fill="none">
    <path d="M20,200 Q18,185 22,178"/><path d="M25,200 Q27,187 23,180"/>
    <path d="M80,200 Q78,188 82,182"/><path d="M85,200 Q87,190 83,184"/>
    <path d="M140,200 Q138,186 142,180"/><path d="M145,200 Q147,188 143,182"/>
    <path d="M190,200 Q188,187 192,181"/><path d="M195,200 Q197,189 193,183"/>
    <path d="M260,200 Q258,186 262,180"/><path d="M265,200 Q267,188 263,182"/>
    <path d="M310,200 Q308,188 312,182"/>
  </g>
  <!-- Flowers -->
  <circle cx="82" cy="178" r="3" fill="#FF8A65"/><circle cx="142" cy="179" r="2.5" fill="#FFD54F"/>
  <circle cx="192" cy="180" r="3" fill="#CE93D8"/><circle cx="262" cy="179" r="2.5" fill="#FF8A65"/>

  <!-- Layer label: Травы -->
  <line x1="340" y1="198" x2="340" y2="218" stroke="#43A047" stroke-width="2"/>
  <line x1="335" y1="198" x2="340" y2="198" stroke="#43A047" stroke-width="1.5"/>
  <line x1="335" y1="218" x2="340" y2="218" stroke="#43A047" stroke-width="1.5"/>
  <text x="345" y="211" font-size="7" fill="#388E3C" font-weight="bold" transform="rotate(90,345,211)">Травы (III ярус)</text>

  <!-- Layer 4: Подстилка -->
  <rect x="10" y="218" width="330" height="30" fill="#8D6E63" rx="0"/>
  <rect x="10" y="218" width="330" height="10" fill="#A1887F"/>
  <!-- Leaf litter -->
  <ellipse cx="30" cy="222" rx="5" ry="2" fill="#795548" transform="rotate(20,30,222)"/>
  <ellipse cx="60" cy="225" rx="4" ry="1.5" fill="#6D4C41" transform="rotate(-15,60,225)"/>
  <ellipse cx="100" cy="223" rx="5" ry="2" fill="#795548" transform="rotate(30,100,223)"/>
  <ellipse cx="150" cy="226" rx="4" ry="1.5" fill="#6D4C41" transform="rotate(-10,150,226)"/>
  <ellipse cx="200" cy="224" rx="5" ry="2" fill="#795548" transform="rotate(25,200,224)"/>
  <ellipse cx="250" cy="227" rx="4" ry="1.5" fill="#6D4C41" transform="rotate(-20,250,227)"/>
  <ellipse cx="300" cy="224" rx="5" ry="2" fill="#795548" transform="rotate(15,300,224)"/>
  <!-- Mushrooms -->
  <g transform="translate(170,218)">
    <rect x="0" y="2" width="3" height="6" fill="#EFEBE9"/>
    <ellipse cx="1.5" cy="2" rx="6" ry="3" fill="#FF8A65"/>
    <circle cx="-1" cy="1" r="1" fill="white"/><circle cx="3" cy="0" r="0.8" fill="white"/>
  </g>
  <g transform="translate(280,220)">
    <rect x="0" y="2" width="2.5" height="5" fill="#EFEBE9"/>
    <ellipse cx="1.25" cy="2" rx="5" ry="2.5" fill="#A1887F"/>
  </g>
  <!-- Insects in litter -->
  <g transform="translate(90,228)">
    <ellipse cx="0" cy="0" rx="3" ry="1.5" fill="#3E2723"/>
    <line x1="-3" y1="0" x2="-5" y2="-2" stroke="#3E2723" stroke-width="0.5"/>
    <line x1="3" y1="0" x2="5" y2="-2" stroke="#3E2723" stroke-width="0.5"/>
  </g>
  <!-- Worms -->
  <path d="M40,230 Q45,228 50,230 Q55,232 60,230" fill="none" stroke="#E8967A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Layer label: Подстилка -->
  <line x1="340" y1="218" x2="340" y2="248" stroke="#5D4037" stroke-width="2"/>
  <line x1="335" y1="218" x2="340" y2="218" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="335" y1="248" x2="340" y2="248" stroke="#5D4037" stroke-width="1.5"/>
  <text x="345" y="236" font-size="7" fill="#5D4037" font-weight="bold" transform="rotate(90,345,236)">Подстилка (IV ярус)</text>

  <!-- Soil layer -->
  <rect x="10" y="248" width="330" height="34" rx="0" fill="#6D4C41"/>
  <rect x="10" y="254" width="330" height="28" rx="0" fill="#4E342E"/>
  <!-- Roots in soil -->
  <g stroke="#795548" stroke-width="1" fill="none">
    <path d="M64,150 Q60,200 55,250 Q52,265 50,275"/>
    <path d="M64,150 Q70,200 72,250 Q73,265 75,272"/>
    <path d="M154,150 Q150,200 148,255 Q146,268 144,278"/>
    <path d="M154,150 Q158,200 160,250 Q162,265 163,275"/>
    <path d="M254,150 Q250,200 248,252 Q246,268 244,276"/>
    <path d="M254,150 Q258,200 260,252 Q262,268 264,274"/>
  </g>

  <!-- Side info panel -->
  <rect x="348" y="34" width="144" height="248" rx="6" fill="white" fill-opacity="0.7" stroke="#1B5E20" stroke-width="0.8"/>
  
  <!-- Species diversity index -->
  <text x="420" y="50" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Индекс видового</text>
  <text x="420" y="60" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">разнообразия</text>
  
  <rect x="358" y="66" width="124" height="32" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5"/>
  <text x="420" y="80" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">H = -Σ pi · ln(pi)</text>
  <text x="420" y="92" font-size="6" fill="#2E7D32" text-anchor="middle">pi — доля i-го вида</text>

  <!-- Gause principle -->
  <rect x="358" y="104" width="124" height="60" rx="4" fill="#FFF3E0" stroke="#FF8A65" stroke-width="0.5"/>
  <text x="420" y="116" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Принцип Гаузе</text>
  <text x="420" y="128" font-size="6" fill="#BF360C" text-anchor="middle">(Правило конкурентного</text>
  <text x="420" y="137" font-size="6" fill="#BF360C" text-anchor="middle">исключения)</text>
  <text x="420" y="150" font-size="5.5" fill="#E65100" text-anchor="middle">Два вида не могут занимать</text>
  <text x="420" y="158" font-size="5.5" fill="#E65100" text-anchor="middle">одну экологическую нишу</text>

  <!-- Community properties -->
  <rect x="358" y="170" width="124" height="105" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="420" y="183" font-size="7" font-weight="bold" fill="#0D47A1" text-anchor="middle">Свойства биоценоза</text>
  <text x="368" y="196" font-size="6" fill="#1565C0">• Видовое богатство</text>
  <text x="368" y="207" font-size="6" fill="#1565C0">• Видовое разнообразие</text>
  <text x="368" y="218" font-size="6" fill="#1565C0">• Биомасса</text>
  <text x="368" y="229" font-size="6" fill="#1565C0">• Продуктивность</text>
  <text x="368" y="240" font-size="6" fill="#1565C0">• Ярусность (структура)</text>
  <text x="368" y="251" font-size="6" fill="#1565C0">• Сукцессионная смена</text>
  <text x="368" y="262" font-size="6" fill="#1565C0">• Устойчивость</text>
  <text x="368" y="273" font-size="6" fill="#1565C0">• Ценотическая роль видов</text>

  <!-- Bottom section -->
  <rect x="10" y="286" width="482" height="56" rx="6" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="302" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Ярусность — вертикальная структура сообщества</text>
  
  <!-- Mini diagram of layers -->
  <g transform="translate(20,308)">
    <rect x="0" y="0" width="45" height="10" fill="#2E7D32" rx="2"/><text x="55" y="8" font-size="6" fill="#1B5E20">I ярус — деревья (30+ м)</text>
  </g>
  <g transform="translate(20,320)">
    <rect x="5" y="0" width="40" height="10" fill="#4CAF50" rx="2"/><text x="55" y="8" font-size="6" fill="#2E7D32">II ярус — кустарники (2-8 м)</text>
  </g>
  <g transform="translate(20,332)">
    <rect x="10" y="0" width="35" height="10" fill="#81C784" rx="2"/><text x="55" y="8" font-size="6" fill="#388E3C">III ярус — травы (0-2 м)</text>
  </g>
  <g transform="translate(280,308)">
    <rect x="15" y="0" width="30" height="10" fill="#A1887F" rx="2"/><text x="55" y="8" font-size="6" fill="#5D4037">IV ярус — подстилка</text>
  </g>
  <g transform="translate(280,320)">
    <rect x="15" y="0" width="30" height="10" fill="#6D4C41" rx="2"/><text x="55" y="8" font-size="6" fill="#5D4037">V ярус — почва</text>
  </g>
  <g transform="translate(280,332)">
    <text x="0" y="8" font-size="6" fill="#795548" font-style="italic">Ярусность позволяет эффективно использовать свет</text>
  </g>
</svg>