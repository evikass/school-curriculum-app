<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7F6"/>
      <stop offset="100%" style="stop-color:#D1C4E9"/>
    </linearGradient>
    <linearGradient id="helixGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B1FA2"/>
      <stop offset="100%" style="stop-color:#4A148C"/>
    </linearGradient>
    <linearGradient id="helixGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8"/>
      <stop offset="100%" style="stop-color:#AB47BC"/>
    </linearGradient>
    <filter id="shadow5" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#4A148C" flood-opacity="0.15"/>
    </filter>
    <filter id="glow5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#7B1FA2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="url(#bg5)"/>

  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4A148C">Молекулярные доказательства эволюции</text>
  <line x1="80" y1="34" x2="420" y2="34" stroke="#7B1FA2" stroke-width="1" opacity="0.3"/>

  <!-- =================== LEFT: DNA Double Helix =================== -->
  <rect x="12" y="44" width="130" height="215" rx="8" ry="8" fill="#ffffff" fill-opacity="0.8" stroke="#B39DDB" stroke-width="1" filter="url(#shadow5)"/>
  <text x="77" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4A148C">ДНК</text>
  <text x="77" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#6A1B9A">Дезоксирибонуклеиновая</text>
  <text x="77" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#6A1B9A">кислота</text>

  <!-- Double Helix -->
  <g transform="translate(25, 88)" filter="url(#glow5)">
    <!-- Strand 1 (left backbone) -->
    <path d="M30,5 Q45,15 30,25 Q15,35 30,45 Q45,55 30,65 Q15,75 30,85 Q45,95 30,105 Q15,115 30,125" 
          stroke="url(#helixGrad1)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Strand 2 (right backbone) -->
    <path d="M30,5 Q15,15 30,25 Q45,35 30,45 Q15,55 30,65 Q45,75 30,85 Q15,95 30,105 Q45,115 30,125" 
          stroke="url(#helixGrad2)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Base pairs (rungs of the ladder) -->
    <!-- A-T pair -->
    <line x1="22" y1="15" x2="38" y2="15" stroke="#E91E63" stroke-width="2" opacity="0.7"/>
    <rect x="19" y="12" width="6" height="6" rx="1" fill="#E91E63" opacity="0.5"/>
    <rect x="35" y="12" width="6" height="6" rx="1" fill="#F48FB1" opacity="0.5"/>
    <text x="16" y="17" font-family="Arial, sans-serif" font-size="5" fill="#C2185B" font-weight="bold">А</text>
    <text x="43" y="17" font-family="Arial, sans-serif" font-size="5" fill="#C2185B" font-weight="bold">Т</text>

    <!-- G-C pair -->
    <line x1="24" y1="35" x2="36" y2="35" stroke="#2196F3" stroke-width="2" opacity="0.7"/>
    <rect x="21" y="32" width="6" height="6" rx="1" fill="#2196F3" opacity="0.5"/>
    <rect x="33" y="32" width="6" height="6" rx="1" fill="#90CAF9" opacity="0.5"/>
    <text x="18" y="37" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Г</text>
    <text x="40" y="37" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Ц</text>

    <!-- C-G pair -->
    <line x1="36" y1="55" x2="24" y2="55" stroke="#2196F3" stroke-width="2" opacity="0.7"/>
    <rect x="33" y="52" width="6" height="6" rx="1" fill="#90CAF9" opacity="0.5"/>
    <rect x="21" y="52" width="6" height="6" rx="1" fill="#2196F3" opacity="0.5"/>
    <text x="40" y="57" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Ц</text>
    <text x="18" y="57" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" font-weight="bold">Г</text>

    <!-- T-A pair -->
    <line x1="22" y1="75" x2="38" y2="75" stroke="#E91E63" stroke-width="2" opacity="0.7"/>
    <rect x="19" y="72" width="6" height="6" rx="1" fill="#F48FB1" opacity="0.5"/>
    <rect x="35" y="72" width="6" height="6" rx="1" fill="#E91E63" opacity="0.5"/>
    <text x="16" y="77" font-family="Arial, sans-serif" font-size="5" fill="#C2185B" font-weight="bold">Т</text>
    <text x="43" y="77" font-family="Arial, sans-serif" font-size="5" fill="#C2185B" font-weight="bold">А</text>

    <!-- A-T pair -->
    <line x1="36" y1="95" x2="24" y2="95" stroke="#E91E63" stroke-width="2" opacity="0.7"/>
    <rect x="33" y="92" width="6" height="6" rx="1" fill="#E91E63" opacity="0.5"/>
    <rect x="21" y="92" width="6" height="6" rx="1" fill="#F48FB1" opacity="0.5"/>

    <!-- G-C pair -->
    <line x1="22" y1="115" x2="38" y2="115" stroke="#2196F3" stroke-width="2" opacity="0.7"/>
    <rect x="19" y="112" width="6" height="6" rx="1" fill="#2196F3" opacity="0.5"/>
    <rect x="35" y="112" width="6" height="6" rx="1" fill="#90CAF9" opacity="0.5"/>
  </g>

  <!-- Base pair legend -->
  <g transform="translate(20, 225)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="6.5" fill="#4A148C" font-weight="bold">Пары оснований:</text>
    <rect x="0" y="5" width="8" height="5" rx="1" fill="#E91E63" opacity="0.6"/>
    <text x="10" y="10" font-family="Arial, sans-serif" font-size="5.5" fill="#6A1B9A">А = Т (2 связи)</text>
    <rect x="0" y="14" width="8" height="5" rx="1" fill="#2196F3" opacity="0.6"/>
    <text x="10" y="19" font-family="Arial, sans-serif" font-size="5.5" fill="#6A1B9A">Г ≡ Ц (3 связи)</text>
  </g>

  <!-- Mutation note -->
  <text x="77" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2" font-style="italic">Мутации в ДНК →</text>
  <text x="77" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2" font-style="italic">молекулярные часы</text>

  <!-- =================== CENTER: Molecular Clock =================== -->
  <rect x="150" y="44" width="155" height="215" rx="8" ry="8" fill="#ffffff" fill-opacity="0.8" stroke="#B39DDB" stroke-width="1" filter="url(#shadow5)"/>
  <text x="227" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4A148C">Молекулярные часы</text>
  <text x="227" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#6A1B9A">Скорость мутаций постоянна</text>

  <!-- Phylogenetic tree -->
  <g transform="translate(160, 82)">
    <!-- Time axis -->
    <line x1="0" y1="140" x2="0" y2="0" stroke="#9C27B0" stroke-width="1.5"/>
    <polygon points="0,-2 -3,5 3,5" fill="#9C27B0"/>
    <text x="-2" y="150" font-family="Arial, sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Наст.</text>
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2" text-anchor="middle">Прошлое</text>

    <!-- Time markers -->
    <line x1="-3" y1="28" x2="135" y2="28" stroke="#CE93D8" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="136" y="30" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0">100 млн</text>

    <line x1="-3" y1="56" x2="135" y2="56" stroke="#CE93D8" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="136" y="58" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0">200 млн</text>

    <line x1="-3" y1="84" x2="135" y2="84" stroke="#CE93D8" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="136" y="86" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0">400 млн</text>

    <line x1="-3" y1="112" x2="135" y2="112" stroke="#CE93D8" stroke-width="0.3" stroke-dasharray="2,2"/>
    <text x="136" y="114" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0">800 млн</text>

    <!-- Tree branches -->
    <!-- Main trunk -->
    <line x1="60" y1="130" x2="60" y2="95" stroke="#4A148C" stroke-width="2"/>
    <!-- First split -->
    <path d="M60,95 Q50,90 40,82" stroke="#4A148C" stroke-width="1.8" fill="none"/>
    <path d="M60,95 Q70,90 80,82" stroke="#4A148C" stroke-width="1.8" fill="none"/>

    <!-- Left branch splits -->
    <path d="M40,82 Q32,78 25,70" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
    <path d="M40,82 Q45,75 50,65" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>

    <!-- Right branch splits -->
    <path d="M80,82 Q72,76 65,65" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
    <path d="M80,82 Q88,76 95,65" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>

    <!-- Further left-left split -->
    <path d="M25,70 Q20,65 15,55" stroke="#9C27B0" stroke-width="1.2" fill="none"/>
    <path d="M25,70 Q28,63 32,55" stroke="#9C27B0" stroke-width="1.2" fill="none"/>

    <!-- Terminal nodes (species) -->
    <!-- Human -->
    <circle cx="15" cy="52" r="4" fill="#7B1FA2" stroke="#4A148C" stroke-width="0.8"/>
    <text x="5" y="44" font-family="Arial, sans-serif" font-size="5.5" fill="#4A148C">Человек</text>

    <!-- Chimp -->
    <circle cx="32" cy="52" r="4" fill="#9C27B0" stroke="#4A148C" stroke-width="0.8"/>
    <text x="26" y="44" font-family="Arial, sans-serif" font-size="5.5" fill="#4A148C">Шимпанзе</text>

    <!-- Dog -->
    <circle cx="50" cy="62" r="4" fill="#AB47BC" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="48" y="55" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2">Собака</text>

    <!-- Chicken -->
    <circle cx="65" cy="62" r="4" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="59" y="54" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2">Курица</text>

    <!-- Yeast -->
    <circle cx="95" cy="62" r="4" fill="#E1BEE7" stroke="#9C27B0" stroke-width="0.8"/>
    <text x="89" y="54" font-family="Arial, sans-serif" font-size="5.5" fill="#9C27B0">Дрожжи</text>

    <!-- Mutation tick marks on branches -->
    <circle cx="22" cy="60" r="1" fill="#FF5722"/>
    <circle cx="28" cy="56" r="1" fill="#FF5722"/>
    <circle cx="42" cy="74" r="1" fill="#FF5722"/>
    <circle cx="48" cy="68" r="1" fill="#FF5722"/>
    <circle cx="75" cy="75" r="1" fill="#FF5722"/>
    <circle cx="82" cy="72" r="1" fill="#FF5722"/>
    <circle cx="88" cy="68" r="1" fill="#FF5722"/>
  </g>

  <!-- Mutation rate note -->
  <text x="227" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2">● Мутации накапливаются</text>
  <text x="227" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2">с постоянной скоростью</text>

  <!-- =================== RIGHT: Cytochrome c comparison =================== -->
  <rect x="312" y="44" width="176" height="215" rx="8" ry="8" fill="#ffffff" fill-opacity="0.8" stroke="#B39DDB" stroke-width="1" filter="url(#shadow5)"/>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#4A148C">Цитохром с</text>
  <text x="400" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#6A1B9A">Сходство с человеком (%)</text>

  <!-- Bar chart -->
  <g transform="translate(330, 78)">
    <!-- Axis -->
    <line x1="0" y1="0" x2="0" y2="130" stroke="#9C27B0" stroke-width="1"/>
    <line x1="0" y1="130" x2="145" y2="130" stroke="#9C27B0" stroke-width="1"/>

    <!-- Percentage grid lines -->
    <line x1="0" y1="0" x2="145" y2="0" stroke="#E1BEE7" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="-3" y="3" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0" text-anchor="end">100%</text>

    <line x1="0" y1="32.5" x2="145" y2="32.5" stroke="#E1BEE7" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="-3" y="35" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0" text-anchor="end">75%</text>

    <line x1="0" y1="65" x2="145" y2="65" stroke="#E1BEE7" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="-3" y="68" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0" text-anchor="end">50%</text>

    <line x1="0" y1="97.5" x2="145" y2="97.5" stroke="#E1BEE7" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="-3" y="100" font-family="Arial, sans-serif" font-size="5" fill="#9C27B0" text-anchor="end">25%</text>

    <!-- Bar 1: Chimpanzee - 99% -->
    <rect x="10" y="1.3" width="24" height="128.7" rx="2" ry="0" fill="#4A148C" opacity="0.85"/>
    <text x="22" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#4A148C" font-weight="bold">Шим-</text>
    <text x="22" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#4A148C" font-weight="bold">панзе</text>
    <text x="22" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4A148C" font-weight="bold">99%</text>

    <!-- Bar 2: Dog - 85% -->
    <rect x="42" y="19.5" width="24" height="110.5" rx="2" ry="0" fill="#7B1FA2" opacity="0.8"/>
    <text x="54" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#7B1FA2" font-weight="bold">Собака</text>
    <text x="54" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#7B1FA2" font-weight="bold">85%</text>

    <!-- Bar 3: Chicken - 75% -->
    <rect x="74" y="32.5" width="24" height="97.5" rx="2" ry="0" fill="#AB47BC" opacity="0.75"/>
    <text x="86" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#AB47BC" font-weight="bold">Курица</text>
    <text x="86" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#AB47BC" font-weight="bold">75%</text>

    <!-- Bar 4: Yeast - 45% -->
    <rect x="106" y="71.5" width="24" height="58.5" rx="2" ry="0" fill="#CE93D8" opacity="0.7"/>
    <text x="118" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#CE93D8" font-weight="bold">Дрожжи</text>
    <text x="118" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9C27B0" font-weight="bold">45%</text>
  </g>

  <!-- Trend arrow -->
  <g transform="translate(350, 228)">
    <line x1="5" y1="0" x2="100" y2="0" stroke="#4A148C" stroke-width="1" marker-end="url(#arrowMol)"/>
    <text x="52" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#7B1FA2">Родство ↓ Сходство ↓</text>
  </g>

  <!-- =================== BOTTOM: Summary =================== -->
  <rect x="12" y="268" width="476" height="72" rx="8" ry="8" fill="#ffffff" fill-opacity="0.9" stroke="#B39DDB" stroke-width="1" filter="url(#shadow5)"/>
  <text x="250" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4A148C">Молекулярно-биологические доказательства</text>
  <line x1="40" y1="292" x2="460" y2="292" stroke="#CE93D8" stroke-width="0.5"/>

  <text x="250" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6A1B9A">• Сравнение последовательностей ДНК и белков показывает степень родства организмов</text>
  <text x="250" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6A1B9A">• Чем больше сходство молекул — тем ближе родство; мутации накапливаются как «часы»</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6A1B9A">• Универсальность генетического кода — доказательство единства всего живого на Земле</text>

  <!-- Decorative DNA elements in corners -->
  <circle cx="18" cy="350" r="3" fill="#CE93D8" opacity="0.3"/>
  <circle cx="30" cy="345" r="2" fill="#AB47BC" opacity="0.3"/>
  <circle cx="470" cy="350" r="3" fill="#CE93D8" opacity="0.3"/>
  <circle cx="482" cy="345" r="2" fill="#AB47BC" opacity="0.3"/>
</svg>