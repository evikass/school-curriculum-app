<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
<linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFB74D" stop-opacity="0.5"/><stop offset="100%" stop-color="#E65100" stop-opacity="0.4"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#BF360C" text-anchor="middle">Микробиологический синтез: биореактор и продукты</text>

<!-- Bioreactor/Fermenter diagram -->
<rect x="15" y="40" width="180" height="200" rx="5" fill="white" opacity="0.6" stroke="#E65100" stroke-width="1.2"/>
<text x="105" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Схема биореактора (ферментёра)</text>

<!-- Tank body -->
<rect x="40" y="68" width="100" height="120" rx="10" fill="#FFF8E1" stroke="#E65100" stroke-width="2"/>
<!-- Liquid inside -->
<rect x="42" y="90" width="96" height="96" rx="8" fill="url(#liquid)"/>

<!-- Stirrer shaft -->
<line x1="90" y1="68" x2="90" y2="155" stroke="#795548" stroke-width="2"/>
<!-- Stirrer blades -->
<line x1="75" y1="120" x2="105" y2="120" stroke="#795548" stroke-width="2.5"/>
<line x1="75" y1="145" x2="105" y2="145" stroke="#795548" stroke-width="2.5"/>
<!-- Motor -->
<rect x="78" y="62" width="24" height="10" rx="3" fill="#795548"/>
<text x="90" y="60" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037" text-anchor="middle">мотор</text>

<!-- Bubbles (air) -->
<circle cx="60" cy="110" r="2" fill="#FF9800" opacity="0.4"/>
<circle cx="115" cy="105" r="2.5" fill="#FF9800" opacity="0.35"/>
<circle cx="70" cy="130" r="1.8" fill="#FF9800" opacity="0.4"/>
<circle cx="105" cy="135" r="2" fill="#FF9800" opacity="0.35"/>
<circle cx="80" cy="150" r="1.5" fill="#FF9800" opacity="0.3"/>

<!-- Air inlet -->
<line x1="30" y1="180" x2="40" y2="175" stroke="#1565C0" stroke-width="2"/>
<text x="22" y="184" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">воздух</text>
<!-- Air outlet -->
<line x1="140" y1="75" x2="155" y2="70" stroke="#78909C" stroke-width="1.5"/>
<text x="163" y="74" font-family="Arial,sans-serif" font-size="5" fill="#78909C" text-anchor="middle">отход. газы</text>

<!-- Nutrient inlet -->
<line x1="30" y1="95" x2="40" y2="95" stroke="#2E7D32" stroke-width="2"/>
<text x="22" y="98" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">среда</text>

<!-- Product outlet -->
<line x1="140" y1="170" x2="155" y2="170" stroke="#BF360C" stroke-width="2"/>
<text x="170" y="173" font-family="Arial,sans-serif" font-size="5.5" fill="#BF360C" text-anchor="middle">продукт</text>

<!-- Temperature control jacket -->
<rect x="35" y="65" width="110" height="128" rx="12" fill="none" stroke="#F44336" stroke-width="1" stroke-dasharray="3,2"/>
<text x="155" y="95" font-family="Arial,sans-serif" font-size="5" fill="#F44336">рубашка</text>
<text x="155" y="102" font-family="Arial,sans-serif" font-size="5" fill="#F44336">обогрева</text>

<!-- pH sensor -->
<circle cx="148" cy="120" r="3" fill="#4CAF50"/>
<text x="158" y="122" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">pH</text>

<!-- Labels -->
<text x="105" y="205" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" text-anchor="middle">Объём: от 1 л до 500 м³</text>
<text x="105" y="215" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle">t° = 28–37°C, pH = 6,5–7,5</text>
<text x="105" y="225" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle">Стерильные условия</text>
<text x="105" y="235" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle">Перемешивание + аэрация</text>

<!-- Microorganisms -->
<rect x="210" y="40" width="280" height="90" rx="5" fill="white" opacity="0.6" stroke="#E65100" stroke-width="1"/>
<text x="350" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Промышленные микроорганизмы</text>

<!-- Bacteria -->
<ellipse cx="240" cy="78" rx="12" ry="6" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
<ellipse cx="262" cy="75" rx="8" ry="4" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
<text x="250" y="95" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" text-anchor="middle">Бактерии</text>
<text x="250" y="103" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">E. coli, Bacillus</text>
<text x="250" y="111" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Corynebacterium</text>

<!-- Fungi -->
<line x1="330" y1="70" x2="330" y2="85" stroke="#8D6E63" stroke-width="2"/>
<circle cx="330" cy="67" r="5" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
<line x1="340" y1="72" x2="340" y2="87" stroke="#8D6E63" stroke-width="2"/>
<circle cx="340" cy="69" r="4.5" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
<line x1="350" y1="70" x2="350" y2="83" stroke="#8D6E63" stroke-width="2"/>
<circle cx="350" cy="67" r="4" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
<text x="340" y="95" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" text-anchor="middle">Грибы</text>
<text x="340" y="103" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Penicillium, Aspergillus</text>
<text x="340" y="111" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Saccharomyces (дрожжи)</text>

<!-- Actinomycetes -->
<line x1="420" y1="65" x2="420" y2="80" stroke="#A1887F" stroke-width="1.5"/>
<line x1="424" y1="65" x2="424" y2="82" stroke="#A1887F" stroke-width="1.5"/>
<line x1="428" y1="65" x2="428" y2="78" stroke="#A1887F" stroke-width="1.5"/>
<line x1="432" y1="65" x2="432" y2="80" stroke="#A1887F" stroke-width="1.5"/>
<text x="425" y="95" font-family="Arial,sans-serif" font-size="6.5" fill="#BF360C" text-anchor="middle">Актиномицеты</text>
<text x="425" y="103" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Streptomyces</text>
<text x="425" y="111" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">(источник антибиотиков)</text>

<!-- Products -->
<rect x="210" y="140" width="280" height="105" rx="5" fill="white" opacity="0.6" stroke="#E65100" stroke-width="1"/>
<text x="350" y="155" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Продукты микробиологического синтеза</text>

<!-- Antibiotics -->
<rect x="218" y="162" width="65" height="28" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
<text x="250" y="174" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Антибиотики</text>
<text x="250" y="184" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">пенициллин, стрептомицин</text>

<!-- Vitamins -->
<rect x="290" y="162" width="60" height="28" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
<text x="320" y="174" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17" text-anchor="middle">Витамины</text>
<text x="320" y="184" font-family="Arial,sans-serif" font-size="5.5" fill="#F9A825" text-anchor="middle">B₁₂, C, рибофлавин</text>

<!-- Enzymes -->
<rect x="357" y="162" width="60" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
<text x="387" y="174" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1" text-anchor="middle">Ферменты</text>
<text x="387" y="184" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">амилаза, протеаза</text>

<!-- Biogas -->
<rect x="424" y="162" width="60" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
<text x="454" y="174" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#BF360C" text-anchor="middle">Биогаз</text>
<text x="454" y="184" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">CH₄ + CO₂</text>

<!-- More products row -->
<rect x="218" y="195" width="65" height="28" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
<text x="250" y="207" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4A148C" text-anchor="middle">Гормоны</text>
<text x="250" y="217" font-family="Arial,sans-serif" font-size="5.5" fill="#7B1FA2" text-anchor="middle">инсулин, ГЧ</text>

<rect x="290" y="195" width="60" height="28" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
<text x="320" y="207" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#B71C1C" text-anchor="middle">Аминокис-</text>
<text x="320" y="217" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">лоты (лизин)</text>

<rect x="357" y="195" width="60" height="28" rx="4" fill="#E0F7FA" stroke="#00695C" stroke-width="0.8"/>
<text x="387" y="207" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#004D40" text-anchor="middle">Органич.</text>
<text x="387" y="217" font-family="Arial,sans-serif" font-size="5.5" fill="#00695C" text-anchor="middle">кислоты (лимон.)</text>

<rect x="424" y="195" width="60" height="28" rx="4" fill="#E8EAF6" stroke="#283593" stroke-width="0.8"/>
<text x="454" y="207" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1A237E" text-anchor="middle">Вакцины</text>
<text x="454" y="217" font-family="Arial,sans-serif" font-size="5.5" fill="#283593" text-anchor="middle">гепатит B</text>

<!-- Stages of fermentation -->
<rect x="15" y="255" width="470" height="60" rx="5" fill="#E65100" opacity="0.08" stroke="#BF360C" stroke-width="1"/>
<text x="250" y="272" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">Стадии ферментации</text>
<text x="25" y="286" font-family="Arial,sans-serif" font-size="7" fill="#E65100">1. Подготовка посевного материала → 2. Лаг-фаза (адаптация) → 3. Экспоненциальная фаза (рост)</text>
<text x="25" y="298" font-family="Arial,sans-serif" font-size="7" fill="#E65100">→ 4. Стационарная фаза (максимум продукта) → 5. Фаза отмирания → 6. Выделение и очистка продукта</text>
<text x="25" y="310" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" font-weight="bold">Питательная среда: источник C (глюкоза), N (NH₄⁺), минеральные соли, факторы роста</text>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#FF8A65" text-anchor="middle">Урок 40 · Микробиологический синтез</text>
</svg>