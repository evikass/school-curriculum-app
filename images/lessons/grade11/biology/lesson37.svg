<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EDE7F6"/><stop offset="100%" stop-color="#D1C4E9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5E35B1" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#311B92" text-anchor="middle">Биотехнология: основные направления</text>

<!-- Central DNA helix -->
<g transform="translate(250,155)">
  <!-- Left strand -->
  <path d="M-30,-70 Q0,-60 30,-50 Q0,-40 -30,-30 Q0,-20 30,-10 Q0,0 -30,10 Q0,20 30,30 Q0,40 -30,50 Q0,60 30,70" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <!-- Right strand -->
  <path d="M30,-70 Q0,-60 -30,-50 Q0,-40 30,-30 Q0,-20 -30,-10 Q0,0 30,10 Q0,20 -30,30 Q0,40 30,50 Q0,60 -30,70" fill="none" stroke="#4527A0" stroke-width="3"/>
  <!-- Base pairs -->
  <line x1="-15" y1="-65" x2="15" y2="-65" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="-55" x2="-15" y2="-55" stroke="#B39DDB" stroke-width="2"/>
  <line x1="-15" y1="-45" x2="15" y2="-45" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="-35" x2="-15" y2="-35" stroke="#B39DDB" stroke-width="2"/>
  <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="-15" x2="-15" y2="-15" stroke="#B39DDB" stroke-width="2"/>
  <line x1="-15" y1="-5" x2="15" y2="-5" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="5" x2="-15" y2="5" stroke="#B39DDB" stroke-width="2"/>
  <line x1="-15" y1="15" x2="15" y2="15" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="25" x2="-15" y2="25" stroke="#B39DDB" stroke-width="2"/>
  <line x1="-15" y1="35" x2="15" y2="35" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="45" x2="-15" y2="45" stroke="#B39DDB" stroke-width="2"/>
  <line x1="-15" y1="55" x2="15" y2="55" stroke="#B39DDB" stroke-width="2"/>
  <line x1="15" y1="65" x2="-15" y2="65" stroke="#B39DDB" stroke-width="2"/>
</g>
<text x="250" y="155" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">ДНК</text>

<!-- Branch 1: Микробиологический синтез (left) -->
<line x1="220" y1="120" x2="80" y2="80" stroke="#5E35B1" stroke-width="1.5" stroke-dasharray="4,2"/>
<rect x="10" y="55" width="140" height="95" rx="8" fill="white" opacity="0.75" stroke="#7E57C2" stroke-width="1.5"/>
<text x="80" y="72" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Микробиологический</text>
<text x="80" y="83" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">синтез</text>
<!-- Bacteria icon -->
<ellipse cx="50" cy="100" rx="10" ry="5" fill="#B39DDB" stroke="#7E57C2" stroke-width="1"/>
<ellipse cx="80" cy="97" rx="8" ry="4" fill="#CE93D8" stroke="#7E57C2" stroke-width="1"/>
<ellipse cx="105" cy="102" rx="9" ry="5" fill="#B39DDB" stroke="#7E57C2" stroke-width="1"/>
<text x="80" y="120" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Использование микро-</text>
<text x="80" y="130" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">организмов для получения</text>
<text x="80" y="140" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">антибиотиков, витаминов</text>

<!-- Branch 2: Клеточная инженерия (top-right) -->
<line x1="280" y1="105" x2="400" y2="60" stroke="#5E35B1" stroke-width="1.5" stroke-dasharray="4,2"/>
<rect x="340" y="38" width="150" height="70" rx="8" fill="white" opacity="0.75" stroke="#7E57C2" stroke-width="1.5"/>
<text x="415" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Клеточная</text>
<text x="415" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">инженерия</text>
<!-- Cell icon -->
<circle cx="380" cy="82" r="10" fill="#E1BEE7" stroke="#7E57C2" stroke-width="1"/>
<circle cx="380" cy="82" r="4" fill="#7E57C2"/>
<text x="415" y="82" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Гибридизация клеток,</text>
<text x="415" y="92" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">клонирование, культура</text>
<text x="415" y="102" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">клеток и тканей</text>

<!-- Branch 3: Генетическая инженерия (bottom-right) -->
<line x1="280" y1="175" x2="400" y2="210" stroke="#5E35B1" stroke-width="1.5" stroke-dasharray="4,2"/>
<rect x="340" y="190" width="150" height="80" rx="8" fill="white" opacity="0.75" stroke="#7E57C2" stroke-width="1.5"/>
<text x="415" y="207" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Генетическая</text>
<text x="415" y="218" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">инженерия</text>
<!-- Gene scissors -->
<line x1="375" y1="230" x2="390" y2="240" stroke="#4527A0" stroke-width="2"/>
<line x1="390" y1="230" x2="375" y2="240" stroke="#4527A0" stroke-width="2"/>
<text x="415" y="238" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Перенос генов,</text>
<text x="415" y="248" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">создание ГМО,</text>
<text x="415" y="258" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">генная терапия, ПЦР</text>

<!-- Branch 4: Биоинженерия (bottom-left) -->
<line x1="220" y1="185" x2="80" y2="240" stroke="#5E35B1" stroke-width="1.5" stroke-dasharray="4,2"/>
<rect x="10" y="210" width="140" height="65" rx="8" fill="white" opacity="0.75" stroke="#7E57C2" stroke-width="1.5"/>
<text x="80" y="228" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Биоинженерия</text>
<text x="80" y="245" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Создание биореакторов,</text>
<text x="80" y="255" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">ферментных технологий,</text>
<text x="80" y="265" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">биосенсоров</text>

<!-- Definition -->
<rect x="10" y="290" width="480" height="45" rx="5" fill="#5E35B1" opacity="0.1" stroke="#7E57C2" stroke-width="1"/>
<text x="250" y="305" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#311B92" text-anchor="middle">Биотехнология — использование живых организмов и биологических</text>
<text x="250" y="317" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#311B92" text-anchor="middle">процессов в производстве и решении практических задач</text>
<text x="250" y="330" font-family="Arial,sans-serif" font-size="7" fill="#7E57C2" text-anchor="middle">Основа: микробиология, молекулярная биология, генетика, биохимия</text>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#9575CD" text-anchor="middle">Урок 37 · Биотехнология: основные направления</text>
</svg>