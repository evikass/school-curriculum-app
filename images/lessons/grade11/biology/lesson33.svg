<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
<marker id="arrB" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#1565C0"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle">Биогеохимические циклы</text>

<!-- Cycle 1: Углерод (Carbon) -->
<rect x="10" y="38" width="235" height="130" rx="8" fill="white" opacity="0.65" stroke="#1565C0" stroke-width="1.2"/>
<text x="127" y="55" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">Цикл углерода (C)</text>
<!-- Circular arrows -->
<path d="M70 90 A35 35 0 0 1 140 80" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M140 80 A35 35 0 0 1 120 130" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M120 130 A35 35 0 0 1 60 120" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M60 120 A35 35 0 0 1 70 90" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<!-- Labels around cycle -->
<text x="105" y="78" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">CO₂ атмосфера</text>
<text x="150" y="110" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Фотосинтез →</text>
<text x="80" y="130" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">Органика</text>
<text x="50" y="105" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">← Дыхание</text>
<!-- Key processes -->
<text x="20" y="152" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Атмосфера ↔ Фотосинтез ↔ Органика ↔ Дыхание/Гниение</text>
<text x="20" y="162" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Ископаемое топливо: уголь, нефть, газ (геологический цикл)</text>

<!-- Cycle 2: Азот (Nitrogen) -->
<rect x="255" y="38" width="235" height="130" rx="8" fill="white" opacity="0.65" stroke="#1565C0" stroke-width="1.2"/>
<text x="372" y="55" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">Цикл азота (N)</text>
<path d="M320 90 A30 30 0 0 1 380 82" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M380 82 A30 30 0 0 1 375 125" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M375 125 A30 30 0 0 1 325 120" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M325 120 A30 30 0 0 1 320 90" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<text x="350" y="78" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">N₂ атмосфера</text>
<text x="395" y="108" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Аммонификация</text>
<text x="340" y="132" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">NO₃⁻, NH₄⁺</text>
<text x="300" y="108" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Денитрификация</text>
<text x="265" y="152" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Азотфиксация: клубеньковые бактерии, цианобактерии</text>
<text x="265" y="162" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Нитрификация: NH₄⁺ → NO₂⁻ → NO₃⁻ (нитрифицирующие)</text>

<!-- Cycle 3: Фосфор (Phosphorus) -->
<rect x="10" y="180" width="235" height="130" rx="8" fill="white" opacity="0.65" stroke="#1565C0" stroke-width="1.2"/>
<text x="127" y="197" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">Цикл фосфора (P)</text>
<path d="M70 228 A30 30 0 0 1 130 222" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M130 222 A30 30 0 0 1 125 260" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M125 260 A30 30 0 0 1 75 258" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M75 258 A30 30 0 0 1 70 228" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<text x="100" y="220" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">Горные породы</text>
<text x="145" y="245" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Выветривание</text>
<text x="90" y="265" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">PO₄³⁻ в почве</text>
<text x="50" y="245" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Осаждение</text>
<text x="20" y="295" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Осадочный цикл — без газовой фазы!</text>
<text x="20" y="305" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Породы → выветривание → почва → организмы → осадки</text>

<!-- Cycle 4: Вода (Water) -->
<rect x="255" y="180" width="235" height="130" rx="8" fill="white" opacity="0.65" stroke="#1565C0" stroke-width="1.2"/>
<text x="372" y="197" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">Круговорот воды (H₂O)</text>
<path d="M320 228 A30 30 0 0 1 385 222" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M385 222 A30 30 0 0 1 380 262" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M380 262 A30 30 0 0 1 325 258" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<path d="M325 258 A30 30 0 0 1 320 228" fill="none" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arrB)"/>
<text x="352" y="220" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">Испарение ↑</text>
<text x="400" y="248" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Конденсация</text>
<text x="345" y="268" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">Осадки ↓</text>
<text x="300" y="245" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Сток ←</text>
<text x="265" y="295" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Океан → испарение → облака → осадки → сток → океан</text>
<text x="265" y="305" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">Транспирация растений — до 10% испарения</text>

<!-- Bottom note -->
<rect x="10" y="318" width="480" height="22" rx="4" fill="#1565C0" opacity="0.12"/>
<text x="250" y="333" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle">Все циклы связаны между собой и driven энергией Солнца и гравитацией · Урок 33</text>
</svg>