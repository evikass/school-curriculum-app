<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFEBEE"/><stop offset="100%" stop-color="#FFCDD2"/></linearGradient>
<linearGradient id="smoke" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#757575"/><stop offset="100%" stop-color="#BDBDBD" stop-opacity="0.3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#B71C1C" text-anchor="middle">Антропогенное воздействие на биосферу</text>

<!-- Factory with smoke -->
<rect x="20" y="120" width="50" height="50" fill="#616161"/>
<polygon points="20,120 45,90 70,120" fill="#757575"/>
<rect x="30" y="85" width="8" height="35" fill="#757575"/>
<rect x="50" y="80" width="10" height="40" fill="#616161"/>
<!-- Smoke clouds -->
<circle cx="34" cy="72" r="8" fill="#9E9E9E" opacity="0.6"/>
<circle cx="45" cy="65" r="10" fill="#9E9E9E" opacity="0.5"/>
<circle cx="55" cy="68" r="9" fill="#9E9E9E" opacity="0.55"/>
<circle cx="40" cy="58" r="7" fill="#BDBDBD" opacity="0.4"/>
<circle cx="60" cy="60" r="6" fill="#BDBDBD" opacity="0.35"/>
<text x="45" y="185" font-family="Arial,sans-serif" font-size="7" fill="#424242" text-anchor="middle">Промышленность</text>

<!-- Polluted river -->
<path d="M100 150 Q130 145 160 150 Q190 155 220 150 Q250 145 280 150" fill="none" stroke="#4E342E" stroke-width="5" opacity="0.6"/>
<path d="M100 155 Q130 150 160 155 Q190 160 220 155 Q250 150 280 155" fill="none" stroke="#5D4037" stroke-width="4" opacity="0.4"/>
<!-- Oil drops -->
<circle cx="130" cy="148" r="2" fill="#3E2723"/>
<circle cx="170" cy="152" r="1.5" fill="#3E2723"/>
<circle cx="210" cy="149" r="2" fill="#3E2723"/>
<circle cx="250" cy="151" r="1.5" fill="#3E2723"/>
<text x="190" y="175" font-family="Arial,sans-serif" font-size="7" fill="#4E342E" text-anchor="middle">Загрязнение водоёмов</text>

<!-- Deforested area -->
<rect x="300" y="110" width="80" height="60" fill="#8D6E63" opacity="0.4" rx="3"/>
<!-- Stumps -->
<rect x="310" y="140" width="6" height="10" fill="#5D4037"/>
<rect x="330" y="142" width="5" height="8" fill="#5D4037"/>
<rect x="350" y="139" width="6" height="11" fill="#5D4037"/>
<rect x="365" y="141" width="5" height="9" fill="#5D4037"/>
<!-- One remaining tree -->
<line x1="390" y1="165" x2="390" y2="135" stroke="#4E342E" stroke-width="3"/>
<circle cx="390" cy="128" r="12" fill="#388E3C" opacity="0.7"/>
<text x="345" y="185" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">Вырубка лесов</text>

<!-- City -->
<rect x="415" y="130" width="20" height="40" fill="#78909C"/>
<rect x="440" y="115" width="15" height="55" fill="#607D8B"/>
<rect x="460" y="140" width="18" height="30" fill="#78909C"/>
<!-- Windows -->
<rect x="419" y="135" width="4" height="4" fill="#FFF9C4"/>
<rect x="427" y="135" width="4" height="4" fill="#FFF9C4"/>
<rect x="419" y="145" width="4" height="4" fill="#FFF9C4"/>
<rect x="427" y="145" width="4" height="4" fill="#FFF9C4"/>
<rect x="444" y="120" width="3" height="3" fill="#FFF9C4"/>
<rect x="449" y="120" width="3" height="3" fill="#FFF9C4"/>
<rect x="444" y="130" width="3" height="3" fill="#FFF9C4"/>
<rect x="449" y="130" width="3" height="3" fill="#FFF9C4"/>
<rect x="464" y="145" width="4" height="4" fill="#FFF9C4"/>
<text x="445" y="185" font-family="Arial,sans-serif" font-size="7" fill="#37474F" text-anchor="middle">Урбанизация</text>

<!-- Main problems -->
<rect x="15" y="200" width="150" height="55" rx="6" fill="#C62828" opacity="0.8"/>
<text x="90" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Парниковый эффект</text>
<text x="90" y="232" font-family="Arial,sans-serif" font-size="7" fill="#FFCDD2" text-anchor="middle">CO₂, CH₄ → нагрев атмосферы</text>
<text x="90" y="243" font-family="Arial,sans-serif" font-size="7" fill="#FFCDD2" text-anchor="middle">+1,1°C с доинд. эпохи</text>
<!-- Thermometer icon -->
<rect x="25" y="225" width="4" height="20" rx="2" fill="white" opacity="0.5"/>
<circle cx="27" cy="247" r="4" fill="#EF5350" opacity="0.7"/>

<rect x="175" y="200" width="150" height="55" rx="6" fill="#D84315" opacity="0.8"/>
<text x="250" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Кислотные дожди</text>
<text x="250" y="232" font-family="Arial,sans-serif" font-size="7" fill="#FFCCBC" text-anchor="middle">SO₂, NOₓ → H₂SO₄, HNO₃</text>
<text x="250" y="243" font-family="Arial,sans-serif" font-size="7" fill="#FFCCBC" text-anchor="middle">pH дождя &lt; 5,6</text>
<!-- Rain drop -->
<path d="M187 228 Q190 220 193 228 Q190 233 187 228" fill="#FFAB91" opacity="0.6"/>

<rect x="335" y="200" width="150" height="55" rx="6" fill="#6A1B9A" opacity="0.8"/>
<text x="410" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Озоновые дыры</text>
<text x="410" y="232" font-family="Arial,sans-serif" font-size="7" fill="#E1BEE7" text-anchor="middle">Фреоны → разрушение O₃</text>
<text x="410" y="243" font-family="Arial,sans-serif" font-size="7" fill="#E1BEE7" text-anchor="middle">Антарктическая дыра</text>
<!-- Ozone layer gap -->
<ellipse cx="357" cy="232" rx="6" ry="8" fill="none" stroke="#E1BEE7" stroke-width="1.5" stroke-dasharray="2,2"/>

<!-- Other impacts list -->
<rect x="15" y="265" width="470" height="60" rx="5" fill="white" opacity="0.55" stroke="#EF5350" stroke-width="1"/>
<text x="250" y="280" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">Другие последствия антропогенного воздействия</text>
<text x="25" y="295" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">• Опустынивание — потеря 12 млн га/год</text>
<text x="25" y="307" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">• Сокращение биоразнообразия — до 1000 видов/год</text>
<text x="255" y="295" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">• Загрязнение океана — пластик, нефть</text>
<text x="255" y="307" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828">• Истощение ресурсов, эвтрофикация</text>
<text x="250" y="320" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#B71C1C" text-anchor="middle">Вывод: деятельность человека — мощная геологическая сила (Вернадский)</text>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#E57373" text-anchor="middle">Урок 34 · Антропогенное воздействие на биосферу</text>
</svg>