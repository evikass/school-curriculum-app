<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg28" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <marker id="arrowRed28" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#D32F2F"/>
    </marker>
    <marker id="arrowBlue28" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1565C0"/>
    </marker>
    <marker id="arrowGreen28" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg28)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="22" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Экосистема: структура и функции</text>

  <!-- Abiotic factors on sides -->
  <!-- Left: КЛИМАТ -->
  <rect x="5" y="60" width="55" height="120" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="32" y="80" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">КЛИМАТ</text>
  <g transform="translate(10,90)">
    <circle cx="20" cy="8" r="7" fill="#FDD835"/><text x="20" y="30" font-size="5" fill="#0D47A1" text-anchor="middle">Свет</text>
    <path d="M15,40 Q20,35 25,40 Q20,45 15,40" fill="#29B6F6"/><text x="20" y="55" font-size="5" fill="#0D47A1" text-anchor="middle">Осадки</text>
    <path d="M12,65 L16,60 L20,65 L24,60 L28,65" fill="none" stroke="#78909C" stroke-width="1"/><text x="20" y="75" font-size="5" fill="#0D47A1" text-anchor="middle">Ветер</text>
  </g>

  <!-- Right: ПОЧВА и ВОДА -->
  <rect x="440" y="60" width="55" height="120" rx="6" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1"/>
  <text x="467" y="80" font-size="7" fill="#5D4037" text-anchor="middle" font-weight="bold">ПОЧВА</text>
  <text x="467" y="120" font-size="7" fill="#0277BD" text-anchor="middle" font-weight="bold">ВОДА</text>
  <g transform="translate(445,130)">
    <rect x="5" y="0" width="40" height="15" rx="3" fill="#8D6E63"/>
    <rect x="5" y="15" width="40" height="12" rx="3" fill="#6D4C41"/>
    <text x="25" y="35" font-size="4.5" fill="#5D4037" text-anchor="middle">Минералы</text>
  </g>

  <!-- Sun -->
  <circle cx="250" cy="48" r="16" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
  <g stroke="#FDD835" stroke-width="1.5">
    <line x1="250" y1="28" x2="250" y2="23"/><line x1="250" y1="68" x2="250" y2="73"/>
    <line x1="230" y1="48" x2="225" y2="48"/><line x1="270" y1="48" x2="275" y2="48"/>
    <line x1="236" y1="34" x2="233" y2="31"/><line x1="264" y1="62" x2="267" y2="65"/>
    <line x1="264" y1="34" x2="267" y2="31"/><line x1="236" y1="62" x2="233" y2="65"/>
  </g>
  <text x="250" y="52" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">☀</text>

  <!-- Energy flow arrow from Sun -->
  <path d="M250,65 L250,88" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed28)"/>
  <text x="265" y="80" font-size="5.5" fill="#D32F2F">Энергия</text>

  <!-- Main ecosystem cycle -->
  <!-- Продуценты box -->
  <rect x="90" y="90" width="120" height="55" rx="8" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="150" y="108" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ПРОДУЦЕНТЫ</text>
  <text x="150" y="120" font-size="7" fill="#E8F5E9" text-anchor="middle">(Автотрофы)</text>
  <!-- Plant icons -->
  <g transform="translate(110,125)">
    <line x1="0" y1="12" x2="0" y2="4" stroke="#1B5E20" stroke-width="1.5"/>
    <ellipse cx="0" cy="2" rx="6" ry="5" fill="#43A047"/>
    <line x1="18" y1="12" x2="18" y2="5" stroke="#1B5E20" stroke-width="1.5"/>
    <ellipse cx="18" cy="3" rx="5" ry="4" fill="#43A047"/>
    <line x1="36" y1="12" x2="36" y2="6" stroke="#1B5E20" stroke-width="1.5"/>
    <ellipse cx="36" cy="4" rx="5" ry="4" fill="#43A047"/>
    <line x1="54" y1="12" x2="54" y2="4" stroke="#1B5E20" stroke-width="1.5"/>
    <ellipse cx="54" cy="2" rx="6" ry="5" fill="#43A047"/>
  </g>
  <text x="150" y="150" font-size="5.5" fill="#1B5E20" text-anchor="middle">Фотосинтез: CO₂+H₂O → C₆H₁₂O₆</text>

  <!-- Консументы box -->
  <rect x="290" y="90" width="120" height="55" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <text x="350" y="108" font-size="9" fill="white" text-anchor="middle" font-weight="bold">КОНСУМЕНТЫ</text>
  <text x="350" y="120" font-size="7" fill="#FFF3E0" text-anchor="middle">(Гетеротрофы)</text>
  <!-- Animal icons -->
  <g transform="translate(308,126)">
    <!-- Rabbit -->
    <ellipse cx="8" cy="6" rx="6" ry="4" fill="#D7CCC8"/>
    <ellipse cx="5" cy="1" rx="2" ry="4" fill="#D7CCC8"/>
    <ellipse cx="10" cy="1" rx="2" ry="4" fill="#D7CCC8"/>
    <!-- Bird -->
    <ellipse cx="30" cy="6" rx="5" ry="3" fill="#90CAF9"/>
    <path d="M24,5 Q30,0 36,5" fill="none" stroke="#42A5F5" stroke-width="1"/>
    <!-- Fox -->
    <ellipse cx="55" cy="5" rx="7" ry="4" fill="#FF8A65"/>
    <polygon points="49,2 48,-2 52,1" fill="#FF8A65"/>
    <polygon points="59,2 62,-2 60,1" fill="#FF8A65"/>
  </g>
  <text x="350" y="150" font-size="5.5" fill="#BF360C" text-anchor="middle">Дыхание: C₆H₁₂O₆ → CO₂+H₂O</text>

  <!-- Редуценты box -->
  <rect x="190" y="220" width="120" height="55" rx="8" fill="#8D6E63" stroke="#4E342E" stroke-width="1.5"/>
  <text x="250" y="238" font-size="9" fill="white" text-anchor="middle" font-weight="bold">РЕДУЦЕНТЫ</text>
  <text x="250" y="250" font-size="7" fill="#EFEBE9" text-anchor="middle">(Деструкторы)</text>
  <!-- Mushroom and bacteria icons -->
  <g transform="translate(210,255)">
    <rect x="0" y="5" width="3" height="8" fill="#EFEBE9"/>
    <ellipse cx="1.5" cy="5" rx="7" ry="3.5" fill="#BCAAA4"/>
    <circle cx="-2" cy="4" r="1" fill="#8D6E63"/>
    <circle cx="4" cy="3" r="0.8" fill="#8D6E63"/>
    <!-- Bacteria -->
    <ellipse cx="25" cy="8" rx="5" ry="2.5" fill="#CE93D8"/>
    <ellipse cx="38" cy="6" rx="4" ry="2" fill="#BA68C8"/>
    <ellipse cx="32" cy="12" rx="3.5" ry="2" fill="#AB47BC"/>
  </g>
  <text x="250" y="280" font-size="5.5" fill="#4E342E" text-anchor="middle">Разложение: органика → минералы</text>

  <!-- Soil/minerals at bottom -->
  <rect x="130" y="290" width="240" height="30" rx="6" fill="#6D4C41" stroke="#3E2723" stroke-width="1"/>
  <text x="250" y="308" font-size="8" fill="white" text-anchor="middle" font-weight="bold">ПОЧВА (минеральные вещества)</text>
  <g fill="#8D6E63" opacity="0.5">
    <circle cx="155" cy="300" r="2"/><circle cx="200" cy="305" r="1.5"/><circle cx="280" cy="298" r="2"/>
    <circle cx="330" cy="303" r="1.5"/><circle cx="240" cy="296" r="1.8"/>
  </g>

  <!-- Energy flow arrows (RED - one way) -->
  <!-- Sun → Producers -->
  <path d="M240,65 L170,88" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed28)"/>
  <!-- Producers → Consumers -->
  <path d="M210,110 L288,110" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed28)"/>
  <text x="250" y="105" font-size="5.5" fill="#D32F2F" text-anchor="middle" font-weight="bold">Энергия →</text>
  <!-- Consumers → Reducers -->
  <path d="M350,145 L300,218" fill="none" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed28)"/>
  <!-- Producers → Reducers -->
  <path d="M150,145 L200,218" fill="none" stroke="#D32F2F" stroke-width="1.5" marker-end="url(#arrowRed28)"/>
  
  <!-- Energy loss arrows (heat) -->
  <path d="M350,90 L395,75" fill="none" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="73" font-size="5" fill="#D32F2F">Тепло↑</text>
  <path d="M150,90 L70,75" fill="none" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="55" y="73" font-size="5" fill="#D32F2F">Тепло↑</text>
  <path d="M250,278 L250,288" fill="none" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Nutrient cycling arrows (BLUE - circular) -->
  <!-- Soil → Producers -->
  <path d="M180,290 L140,150" fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue28)"/>
  <text x="148" y="220" font-size="5.5" fill="#1565C0" transform="rotate(-70,148,220)">Минералы</text>
  <!-- Reducers → Soil -->
  <path d="M250,278 L250,288" fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue28)"/>

  <!-- Legend -->
  <rect x="60" y="326" width="380" height="20" rx="4" fill="white" fill-opacity="0.7"/>
  <line x1="80" y1="336" x2="110" y2="336" stroke="#D32F2F" stroke-width="2"/>
  <polygon points="112,336 106,333 106,339" fill="#D32F2F"/>
  <text x="118" y="339" font-size="6.5" fill="#C62828">Поток энергии (односторонний)</text>
  <line x1="280" y1="336" x2="310" y2="336" stroke="#1565C0" stroke-width="2"/>
  <polygon points="312,336 306,333 306,339" fill="#1565C0"/>
  <text x="318" y="339" font-size="6.5" fill="#0D47A1">Круговорот веществ (замкнутый)</text>

  <!-- CO2 arrows between producers and atmosphere -->
  <path d="M120,90 Q100,50 180,40" fill="none" stroke="#546E7A" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="110" y="50" font-size="5" fill="#546E7A">CO₂↑</text>
  <path d="M200,90 Q220,50 280,40" fill="none" stroke="#546E7A" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="260" y="50" font-size="5" fill="#546E7A">O₂↑</text>

  <!-- O2 from producers -->
  <path d="M170,90 L140,65" fill="none" stroke="#43A047" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="132" y="62" font-size="5" fill="#2E7D32">O₂↑</text>
</svg>