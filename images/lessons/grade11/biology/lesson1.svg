<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f8e9"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#2E7D32" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1B5E20">История эволюционных идей</text>
  <line x1="100" y1="40" x2="400" y2="40" stroke="#4CAF50" stroke-width="1.5" opacity="0.5"/>

  <!-- Timeline arrow -->
  <line x1="40" y1="175" x2="460" y2="175" stroke="#66BB6A" stroke-width="3" marker-end="url(#arrowHead)"/>
  <text x="465" y="178" font-family="Arial, sans-serif" font-size="9" fill="#66BB6A">Время</text>

  <!-- Timeline dots -->
  <circle cx="110" cy="175" r="6" fill="#2E7D32" stroke="#fff" stroke-width="2"/>
  <circle cx="250" cy="175" r="6" fill="#2E7D32" stroke="#fff" stroke-width="2"/>
  <circle cx="390" cy="175" r="6" fill="#2E7D32" stroke="#fff" stroke-width="2"/>

  <!-- === ARISTOTLE (Left) === -->
  <rect x="30" y="52" width="160" height="115" rx="10" ry="10" fill="url(#cardGrad1)" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Aristotle portrait silhouette -->
  <circle cx="110" cy="82" r="18" fill="#5D4037" opacity="0.8"/>
  <ellipse cx="110" cy="100" rx="14" ry="8" fill="#5D4037" opacity="0.8"/>
  <!-- Scroll icon -->
  <rect x="85" y="105" width="50" height="12" rx="3" fill="#8D6E63" opacity="0.5"/>
  <line x1="92" y1="108" x2="128" y2="108" stroke="#fff" stroke-width="0.5"/>
  <line x1="92" y1="112" x2="120" y2="112" stroke="#fff" stroke-width="0.5"/>

  <text x="110" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#33691E">Аристотель</text>
  <text x="110" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#558B2F">(384–322 до н.э.)</text>
  <text x="110" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#689F38" font-style="italic">«Лестница существ»</text>

  <!-- Ladder of beings illustration -->
  <g transform="translate(55, 188)">
    <line x1="0" y1="45" x2="110" y2="5" stroke="#8D6E63" stroke-width="2"/>
    <line x1="0" y1="50" x2="110" y2="10" stroke="#8D6E63" stroke-width="2"/>
    <!-- Ladder rungs with labels -->
    <line x1="5" y1="47" x2="5" y2="42" stroke="#8D6E63" stroke-width="1.5"/>
    <text x="8" y="56" font-family="Arial, sans-serif" font-size="6.5" fill="#5D4037">Растения</text>

    <line x1="30" y1="40" x2="30" y2="35" stroke="#8D6E63" stroke-width="1.5"/>
    <text x="33" y="48" font-family="Arial, sans-serif" font-size="6.5" fill="#5D4037">Животные</text>

    <line x1="60" y1="30" x2="60" y2="25" stroke="#8D6E63" stroke-width="1.5"/>
    <text x="63" y="38" font-family="Arial, sans-serif" font-size="6.5" fill="#5D4037">Человек</text>

    <line x1="90" y1="18" x2="90" y2="13" stroke="#8D6E63" stroke-width="1.5"/>
    <text x="80" y="10" font-family="Arial, sans-serif" font-size="6.5" fill="#5D4037">Бог</text>

    <!-- Small figure silhouettes on rungs -->
    <circle cx="5" cy="40" r="2" fill="#4CAF50"/>
    <circle cx="30" cy="33" r="2.5" fill="#FF8F00"/>
    <circle cx="60" cy="23" r="3" fill="#795548"/>
  </g>

  <!-- === LINNAEUS (Center) === -->
  <rect x="170" y="52" width="160" height="115" rx="10" ry="10" fill="url(#cardGrad1)" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Linnaeus portrait silhouette -->
  <circle cx="250" cy="80" r="18" fill="#33691E" opacity="0.8"/>
  <ellipse cx="250" cy="98" rx="16" ry="10" fill="#33691E" opacity="0.7"/>
  <!-- Flower icon (botanist) -->
  <circle cx="250" cy="112" r="4" fill="#FF9800" opacity="0.7"/>
  <circle cx="246" cy="108" r="2.5" fill="#F44336" opacity="0.6"/>
  <circle cx="254" cy="108" r="2.5" fill="#F44336" opacity="0.6"/>
  <circle cx="246" cy="116" r="2.5" fill="#F44336" opacity="0.6"/>
  <circle cx="254" cy="116" r="2.5" fill="#F44336" opacity="0.6"/>
  <line x1="250" y1="116" x2="250" y2="126" stroke="#4CAF50" stroke-width="1.5"/>

  <text x="250" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#33691E">Карл Линней</text>
  <text x="250" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#558B2F">(1707–1778)</text>
  <text x="250" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#689F38" font-style="italic">«Система природы»</text>

  <!-- Classification tree -->
  <g transform="translate(195, 188)">
    <!-- Tree trunk -->
    <line x1="55" y1="65" x2="55" y2="45" stroke="#5D4037" stroke-width="2.5"/>
    <!-- Main branches -->
    <line x1="55" y1="45" x2="20" y2="25" stroke="#5D4037" stroke-width="1.8"/>
    <line x1="55" y1="45" x2="90" y2="25" stroke="#5D4037" stroke-width="1.8"/>
    <!-- Sub-branches left -->
    <line x1="20" y1="25" x2="5" y2="10" stroke="#5D4037" stroke-width="1.2"/>
    <line x1="20" y1="25" x2="30" y2="10" stroke="#5D4037" stroke-width="1.2"/>
    <!-- Sub-branches right -->
    <line x1="90" y1="25" x2="75" y2="10" stroke="#5D4037" stroke-width="1.2"/>
    <line x1="90" y1="25" x2="105" y2="10" stroke="#5D4037" stroke-width="1.2"/>

    <!-- Labels -->
    <text x="55" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5D4037" font-weight="bold">Живые</text>
    <text x="12" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32">Растения</text>
    <text x="93" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32">Животные</text>
    <text x="2" y="7" font-family="Arial, sans-serif" font-size="5.5" fill="#558B2F">Цв.</text>
    <text x="25" y="7" font-family="Arial, sans-serif" font-size="5.5" fill="#558B2F">Нецв.</text>
    <text x="68" y="7" font-family="Arial, sans-serif" font-size="5.5" fill="#558B2F">Насек.</text>
    <text x="100" y="7" font-family="Arial, sans-serif" font-size="5.5" fill="#558B2F">Млек.</text>

    <!-- Leaf clusters -->
    <circle cx="5" cy="8" r="3" fill="#81C784" opacity="0.4"/>
    <circle cx="30" cy="8" r="3" fill="#81C784" opacity="0.4"/>
    <circle cx="75" cy="8" r="3" fill="#81C784" opacity="0.4"/>
    <circle cx="105" cy="8" r="3" fill="#81C784" opacity="0.4"/>
  </g>

  <!-- === LAMARCK (Right) === -->
  <rect x="310" y="52" width="160" height="115" rx="10" ry="10" fill="url(#cardGrad1)" stroke="#A5D6A7" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Lamarck portrait silhouette -->
  <circle cx="390" cy="80" r="18" fill="#4E342E" opacity="0.8"/>
  <ellipse cx="390" cy="98" rx="14" ry="8" fill="#4E342E" opacity="0.7"/>
  <!-- Giraffe silhouette (Lamarck's famous example) -->
  <g transform="translate(370, 105) scale(0.5)">
    <ellipse cx="25" cy="18" rx="12" ry="8" fill="#8D6E63" opacity="0.6"/>
    <line x1="32" y1="12" x2="38" y2="0" stroke="#8D6E63" stroke-width="2.5" opacity="0.6"/>
    <circle cx="39" cy="-2" r="3" fill="#8D6E63" opacity="0.6"/>
    <line x1="18" y1="25" x2="16" y2="38" stroke="#8D6E63" stroke-width="2" opacity="0.6"/>
    <line x1="22" y1="25" x2="24" y2="38" stroke="#8D6E63" stroke-width="2" opacity="0.6"/>
    <line x1="28" y1="25" x2="30" y2="38" stroke="#8D6E63" stroke-width="2" opacity="0.6"/>
    <line x1="32" y1="25" x2="34" y2="38" stroke="#8D6E63" stroke-width="2" opacity="0.6"/>
  </g>

  <text x="390" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#33691E">Ж.Б. Ламарк</text>
  <text x="390" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#558B2F">(1744–1829)</text>
  <text x="390" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#689F38" font-style="italic">«Теория трансформизма»</text>

  <!-- Progression arrow illustration -->
  <g transform="translate(335, 190)">
    <!-- Upward progression arrow -->
    <polygon points="55,0 65,20 59,20 59,60 51,60 51,20 45,20" fill="#4CAF50" opacity="0.7"/>
    <text x="55" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Прогресс</text>

    <!-- Simple organism progression -->
    <circle cx="10" cy="55" r="4" fill="#81C784" stroke="#4CAF50" stroke-width="1"/>
    <text x="10" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#5D4037">Простые</text>

    <path d="M18,52 Q25,40 32,35" stroke="#66BB6A" stroke-width="1" fill="none" stroke-dasharray="2,2"/>

    <ellipse cx="38" cy="30" rx="6" ry="4" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1"/>
    <text x="38" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#5D4037">Сложные</text>

    <path d="M44,27 Q50,18 55,12" stroke="#66BB6A" stroke-width="1" fill="none" stroke-dasharray="2,2"/>

    <!-- Principles -->
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="6" fill="#5D4037">• Наследование</text>
    <text x="90" y="35" font-family="Arial, sans-serif" font-size="6" fill="#5D4037">  приобретённых</text>
    <text x="90" y="45" font-family="Arial, sans-serif" font-size="6" fill="#5D4037">  признаков</text>
    <text x="90" y="58" font-family="Arial, sans-serif" font-size="6" fill="#5D4037">• Упражнение</text>
    <text x="90" y="68" font-family="Arial, sans-serif" font-size="6" fill="#5D4037">  органов</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="30" y1="330" x2="470" y2="330" stroke="#A5D6A7" stroke-width="1" opacity="0.5"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#689F38">От неподвижности видов к идее изменяемости</text>
</svg>