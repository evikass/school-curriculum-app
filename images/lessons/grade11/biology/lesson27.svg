<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg27" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E65100"/>
    </marker>
    <marker id="arrowGreen" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg27)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="20" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Пищевые цепи и сети</text>

  <!-- Pasture chain (Цепь выедания) -->
  <rect x="10" y="28" width="480" height="70" rx="5" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="0.8"/>
  <text x="250" y="42" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">Цепь выедания (пастбищная)</text>
  
  <!-- Трава -->
  <g transform="translate(30,48)">
    <ellipse cx="20" cy="15" rx="18" ry="12" fill="#81C784"/>
    <g stroke="#2E7D32" stroke-width="1.5" fill="none">
      <path d="M10,15 Q8,5 12,0"/><path d="M15,15 Q17,6 14,2"/>
      <path d="M25,15 Q23,5 27,0"/><path d="M30,15 Q32,6 29,2"/>
    </g>
    <text x="20" y="35" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Трава</text>
    <text x="20" y="43" font-size="5" fill="#2E7D32" text-anchor="middle">Продуценты</text>
  </g>
  
  <!-- Arrow -->
  <line x1="72" y1="60" x2="100" y2="60" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  
  <!-- Кузнечик -->
  <g transform="translate(108,48)">
    <ellipse cx="15" cy="12" rx="12" ry="6" fill="#8BC34A"/>
    <ellipse cx="5" cy="10" rx="5" ry="4" fill="#9CCC65"/>
    <circle cx="2" cy="8" r="1.5" fill="#1B5E20"/>
    <line x1="8" y1="6" x2="12" y2="0" stroke="#33691E" stroke-width="0.8"/>
    <line x1="10" y1="6" x2="14" y2="0" stroke="#33691E" stroke-width="0.8"/>
    <line x1="27" y1="10" x2="33" y2="6" stroke="#33691E" stroke-width="0.6"/>
    <line x1="27" y1="14" x2="33" y2="16" stroke="#33691E" stroke-width="0.6"/>
    <text x="15" y="35" font-size="6.5" fill="#33691E" text-anchor="middle" font-weight="bold">Кузнечик</text>
    <text x="15" y="43" font-size="5" fill="#558B2F" text-anchor="middle">Консументы I</text>
  </g>
  
  <!-- Arrow -->
  <line x1="148" y1="60" x2="176" y2="60" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  
  <!-- Лягушка -->
  <g transform="translate(184,48)">
    <ellipse cx="15" cy="12" rx="13" ry="8" fill="#66BB6A"/>
    <ellipse cx="5" cy="7" rx="6" ry="5" fill="#81C784"/>
    <circle cx="3" cy="5" r="2.5" fill="white"/><circle cx="3" cy="5" r="1.2" fill="#1A237E"/>
    <ellipse cx="25" cy="7" rx="6" ry="5" fill="#81C784"/>
    <circle cx="27" cy="5" r="2.5" fill="white"/><circle cx="27" cy="5" r="1.2" fill="#1A237E"/>
    <line x1="0" y1="18" x2="-4" y2="26" stroke="#388E3C" stroke-width="1.5"/>
    <line x1="28" y1="18" x2="32" y2="26" stroke="#388E3C" stroke-width="1.5"/>
    <text x="15" y="35" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Лягушка</text>
    <text x="15" y="43" font-size="5" fill="#2E7D32" text-anchor="middle">Консументы II</text>
  </g>
  
  <!-- Arrow -->
  <line x1="228" y1="60" x2="256" y2="60" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  
  <!-- Змея -->
  <g transform="translate(264,48)">
    <path d="M0,12 Q8,4 16,12 Q24,20 32,12 Q40,4 48,12" fill="none" stroke="#795548" stroke-width="5" stroke-linecap="round"/>
    <circle cx="48" cy="12" r="3" fill="#6D4C41"/>
    <circle cx="49" cy="11" r="0.8" fill="#1A1A1A"/>
    <path d="M52,12 L56,11 L52,13" fill="#795548"/>
    <text x="25" y="35" font-size="6.5" fill="#4E342E" text-anchor="middle" font-weight="bold">Змея</text>
    <text x="25" y="43" font-size="5" fill="#5D4037" text-anchor="middle">Консументы III</text>
  </g>
  
  <!-- Arrow -->
  <line x1="318" y1="60" x2="346" y2="60" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  
  <!-- Орёл -->
  <g transform="translate(354,46)">
    <ellipse cx="18" cy="14" rx="14" ry="8" fill="#8D6E63"/>
    <ellipse cx="5" cy="10" rx="6" ry="5" fill="#A1887F"/>
    <circle cx="3" cy="8" r="1.2" fill="#FFD54F"/>
    <path d="M3,12 L0,13 L2,11" fill="#FFB300"/>
    <!-- Wings -->
    <path d="M10,8 Q2,-2 -8,4" fill="none" stroke="#6D4C41" stroke-width="2"/>
    <path d="M26,8 Q34,-2 44,4" fill="none" stroke="#6D4C41" stroke-width="2"/>
    <!-- Tail -->
    <path d="M32,14 L40,16 L38,12" fill="#8D6E63"/>
    <text x="18" y="35" font-size="6.5" fill="#4E342E" text-anchor="middle" font-weight="bold">Орёл</text>
    <text x="18" y="43" font-size="5" fill="#5D4037" text-anchor="middle">Консументы IV</text>
  </g>

  <!-- Detritus chain -->
  <rect x="10" y="102" width="480" height="55" rx="5" fill="white" fill-opacity="0.5" stroke="#5D4037" stroke-width="0.8"/>
  <text x="250" y="116" font-size="8" font-weight="bold" fill="#3E2723" text-anchor="middle">Детритная цепь (цепь разложения)</text>
  
  <!-- Листья -->
  <g transform="translate(30,122)">
    <ellipse cx="15" cy="8" rx="12" ry="8" fill="#FF8A65" opacity="0.8"/>
    <line x1="8" y1="8" x2="22" y2="8" stroke="#BF360C" stroke-width="0.5"/>
    <text x="15" y="25" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Опад листьев</text>
  </g>
  
  <line x1="62" y1="130" x2="90" y2="130" stroke="#5D4037" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  
  <!-- Грибы -->
  <g transform="translate(98,122)">
    <rect x="8" y="12" width="4" height="8" fill="#EFEBE9"/>
    <ellipse cx="10" cy="12" rx="10" ry="5" fill="#A1887F"/>
    <rect x="24" y="14" width="3" height="6" fill="#EFEBE9"/>
    <ellipse cx="25" cy="14" rx="7" ry="4" fill="#BCAAA4"/>
    <text x="15" y="30" font-size="6" fill="#5D4037" text-anchor="middle" font-weight="bold">Грибы</text>
  </g>
  
  <line x1="138" y1="130" x2="166" y2="130" stroke="#5D4037" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  
  <!-- Бактерии -->
  <g transform="translate(174,124)">
    <ellipse cx="8" cy="4" rx="6" ry="3" fill="#CE93D8"/>
    <ellipse cx="20" cy="6" rx="5" ry="2.5" fill="#BA68C8"/>
    <ellipse cx="14" cy="10" rx="4.5" ry="2.5" fill="#AB47BC"/>
    <text x="14" y="24" font-size="6" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Бактерии</text>
  </g>
  
  <line x1="208" y1="130" x2="236" y2="130" stroke="#5D4037" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  
  <!-- Дождевые черви -->
  <g transform="translate(244,126)">
    <path d="M0,4 Q8,0 16,4 Q24,8 32,4 Q40,0 48,4" fill="none" stroke="#E8967A" stroke-width="3" stroke-linecap="round"/>
    <text x="24" y="22" font-size="6" fill="#795548" text-anchor="middle" font-weight="bold">Дождевые черви</text>
  </g>
  
  <line x1="296" y1="130" x2="324" y2="130" stroke="#5D4037" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  
  <!-- Минеральные вещества -->
  <g transform="translate(332,120)">
    <rect x="0" y="0" width="100" height="22" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
    <text x="50" y="10" font-size="6" fill="#F57F17" text-anchor="middle" font-weight="bold">Минеральные</text>
    <text x="50" y="19" font-size="6" fill="#F57F17" text-anchor="middle" font-weight="bold">вещества (почва)</text>
  </g>
  
  <!-- Return arrow to producers -->
  <path d="M432,140 Q470,145 470,80 Q470,48 60,46" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="475" y="95" font-size="5" fill="#2E7D32" transform="rotate(90,475,95)">Возврат веществ</text>

  <!-- Energy pyramid -->
  <rect x="10" y="162" width="480" height="182" rx="6" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="1"/>
  <text x="250" y="178" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Экологическая пирамида (Правило 10%)</text>

  <!-- Pyramid levels -->
  <!-- Producers - widest -->
  <polygon points="60,310 440,310 400,270 100,270" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="288" font-size="9" fill="white" font-weight="bold" text-anchor="middle">Продуценты (растения)</text>
  <text x="250" y="300" font-size="8" fill="#1B5E20" text-anchor="middle">10 000 кДж</text>
  
  <!-- Consumers I -->
  <polygon points="100,270 400,270 360,235 140,235" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <text x="250" y="252" font-size="8.5" fill="white" font-weight="bold" text-anchor="middle">Консументы I порядка</text>
  <text x="250" y="264" font-size="7.5" fill="#BF360C" text-anchor="middle">1 000 кДж</text>
  
  <!-- Consumers II -->
  <polygon points="140,235 360,235 320,205 180,205" fill="#FF8A65" stroke="#D84315" stroke-width="1.5"/>
  <text x="250" y="220" font-size="8" fill="white" font-weight="bold" text-anchor="middle">Консументы II порядка</text>
  <text x="250" y="231" font-size="7" fill="#BF360C" text-anchor="middle">100 кДж</text>
  
  <!-- Consumers III -->
  <polygon points="180,205 320,205 280,180 220,180" fill="#EF5350" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="250" y="195" font-size="7" fill="white" font-weight="bold" text-anchor="middle">Консументы III</text>
  <text x="250" y="203" font-size="6" fill="#FFCDD2" text-anchor="middle">10 кДж</text>

  <!-- Energy flow labels -->
  <g transform="translate(15,190)">
    <text x="0" y="0" font-size="7" fill="#E65100" font-weight="bold">Поток энергии:</text>
    <text x="0" y="10" font-size="6" fill="#BF360C">~10% переходит</text>
    <text x="0" y="19" font-size="6" fill="#BF360C">на следующий</text>
    <text x="0" y="28" font-size="6" fill="#BF360C">трофический уровень</text>
    <text x="0" y="40" font-size="6" fill="#BF360C">~90% теряется</text>
    <text x="0" y="49" font-size="6" fill="#BF360C">в виде тепла</text>
  </g>

  <!-- Side arrow showing energy loss -->
  <g transform="translate(445,185)">
    <path d="M0,0 L0,100" fill="none" stroke="#F44336" stroke-width="1.5"/>
    <polygon points="0,102 -3,95 3,95" fill="#F44336"/>
    <text x="8" y="50" font-size="6" fill="#C62828" transform="rotate(90,8,50)">Потери энергии (тепло) →</text>
  </g>

  <!-- Rule explanation -->
  <rect x="445" y="260" width="40" height="50" rx="3" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.5"/>
  <text x="465" y="275" font-size="5" fill="#C62828" text-anchor="middle">Правило</text>
  <text x="465" y="283" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">10%</text>
  <text x="465" y="292" font-size="5" fill="#C62828" text-anchor="middle">Линдемана</text>
  <text x="465" y="302" font-size="4.5" fill="#EF5350" text-anchor="middle">(1942)</text>

  <!-- Trophic level arrows on pyramid -->
  <g fill="none" stroke="#BF360C" stroke-width="0.8">
    <path d="M250,268 L268,250" stroke-dasharray="2,2"/>
    <path d="M250,233 L268,218" stroke-dasharray="2,2"/>
    <path d="M250,203 L268,193" stroke-dasharray="2,2"/>
  </g>
  <text x="275" y="260" font-size="5" fill="#E65100">×0.1</text>
  <text x="275" y="228" font-size="5" fill="#E65100">×0.1</text>
  <text x="275" y="200" font-size="5" fill="#E65100">×0.1</text>
</svg>