<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFEBEE"/><stop offset="100%" stop-color="#FFCDD2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#B71C1C" text-anchor="middle">Глобальные экологические проблемы</text>

<!-- Earth in center -->
<circle cx="140" cy="130" r="55" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1.5"/>
<!-- Continents simplified -->
<ellipse cx="125" cy="110" rx="18" ry="12" fill="#4CAF50" opacity="0.5"/>
<ellipse cx="155" cy="125" rx="12" ry="18" fill="#4CAF50" opacity="0.5"/>
<ellipse cx="130" cy="145" rx="10" ry="8" fill="#4CAF50" opacity="0.4"/>
<ellipse cx="158" cy="105" rx="14" ry="8" fill="#4CAF50" opacity="0.4"/>
<!-- Cracks/problems -->
<path d="M115 120 L125 130 L118 140" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
<path d="M150 110 L155 120" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
<text x="140" y="135" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1" text-anchor="middle">Земля</text>

<!-- Problem 1: Climate change (top) -->
<rect x="220" y="38" width="140" height="52" rx="5" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<!-- Thermometer -->
<rect x="228" y="48" width="5" height="25" rx="2" fill="white" stroke="#C62828" stroke-width="0.8"/>
<circle cx="230" cy="75" r="4" fill="#E53935"/>
<text x="235" y="55" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#B71C1C">Изменение климата</text>
<text x="235" y="65" font-family="Arial,sans-serif" font-size="6" fill="#C62828">+1,1°C с 1850 г.</text>
<text x="235" y="75" font-family="Arial,sans-serif" font-size="6" fill="#C62828">CO₂: 421 ppm (2023)</text>
<text x="235" y="85" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Таяние ледников, ↑ уровня моря</text>

<!-- Problem 2: Biodiversity loss (right) -->
<rect x="370" y="95" width="120" height="52" rx="5" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<!-- Skull icon for extinct -->
<circle cx="383" cy="112" r="6" fill="none" stroke="#C62828" stroke-width="1"/>
<circle cx="381" cy="110" r="1.5" fill="#C62828"/>
<circle cx="386" cy="110" r="1.5" fill="#C62828"/>
<text x="390" y="112" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#B71C1C">Потеря биоразнообразия</text>
<text x="390" y="122" font-family="Arial,sans-serif" font-size="6" fill="#C62828">6-е массовое вымирание</text>
<text x="390" y="132" font-family="Arial,sans-serif" font-size="6" fill="#C62828">~1 млн видов под угрозой</text>
<text x="390" y="142" font-family="Arial,sans-serif" font-size="6" fill="#C62828">↓ на 68% с 1970 г. (WWF)</text>

<!-- Problem 3: Desertification (bottom-right) -->
<rect x="280" y="160" width="125" height="52" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<!-- Desert dunes -->
<path d="M288 192 Q295 180 302 192 Q309 180 316 192" fill="none" stroke="#E65100" stroke-width="1.5"/>
<text x="300" y="178" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#BF360C">Опустынивание</text>
<text x="300" y="188" font-family="Arial,sans-serif" font-size="6" fill="#E65100">12 млн га/год теряется</text>
<text x="300" y="198" font-family="Arial,sans-serif" font-size="6" fill="#E65100">3,6 млрд га — зоны риска</text>
<text x="300" y="208" font-family="Arial,sans-serif" font-size="6" fill="#E65100">Сахель, Центр. Азия</text>

<!-- Problem 4: Deforestation (bottom-left) -->
<rect x="135" y="195" width="130" height="52" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
<!-- Stumps -->
<rect x="143" y="218" width="5" height="10" fill="#5D4037"/>
<rect x="153" y="220" width="4" height="8" fill="#5D4037"/>
<rect x="162" y="217" width="5" height="11" fill="#5D4037"/>
<text x="155" y="210" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Обезлесение</text>
<text x="200" y="221" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">10 млн га/год</text>
<text x="200" y="231" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Амазония, ЮВА, ЦА</text>
<text x="200" y="241" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">↓ поглощение CO₂</text>

<!-- Problem 5: Overpopulation (left) -->
<rect x="10" y="195" width="115" height="52" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
<text x="67" y="210" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1" text-anchor="middle">Перенаселение</text>
<!-- People icons -->
<circle cx="35" cy="222" r="3" fill="#1565C0"/><line x1="35" y1="225" x2="35" y2="233" stroke="#1565C0" stroke-width="1"/>
<circle cx="48" cy="222" r="3" fill="#1565C0"/><line x1="48" y1="225" x2="48" y2="233" stroke="#1565C0" stroke-width="1"/>
<circle cx="61" cy="222" r="3" fill="#1565C0"/><line x1="61" y1="225" x2="61" y2="233" stroke="#1565C0" stroke-width="1"/>
<text x="67" y="224" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">8 млрд (2022)</text>
<text x="67" y="234" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Рост → ↑ потребление</text>
<text x="67" y="244" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">→ ↑ отходы, ↓ ресурсы</text>

<!-- Ecological Footprint Graph -->
<rect x="10" y="260" width="480" height="65" rx="5" fill="white" opacity="0.6" stroke="#C62828" stroke-width="1"/>
<text x="250" y="277" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">Экологический след (Ecological Footprint)</text>

<!-- Bar chart -->
<line x1="30" y1="310" x2="470" y2="310" stroke="#B71C1C" stroke-width="1"/>
<line x1="30" y1="290" x2="30" y2="310" stroke="#B71C1C" stroke-width="1"/>
<!-- Earth capacity line -->
<line x1="30" y1="297" x2="470" y2="297" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,2"/>
<text x="25" y="300" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50" text-anchor="end">1 Земля</text>

<!-- Bars -->
<rect x="50" y="297" width="25" height="13" rx="1" fill="#4CAF50"/>
<text x="62" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Индия</text>
<text x="62" y="295" font-family="Arial,sans-serif" font-size="4.5" fill="#4CAF50" text-anchor="middle">0.7</text>

<rect x="90" y="294" width="25" height="16" rx="1" fill="#66BB6A"/>
<text x="102" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Бразилия</text>
<text x="102" y="292" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">1.2</text>

<rect x="130" y="293" width="25" height="17" rx="1" fill="#81C784"/>
<text x="142" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Китай</text>
<text x="142" y="291" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">1.4</text>

<rect x="170" y="292" width="25" height="18" rx="1" fill="#FFC107"/>
<text x="182" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Россия</text>
<text x="182" y="290" font-family="Arial,sans-serif" font-size="4.5" fill="#F57F17" text-anchor="middle">1.7</text>

<rect x="220" y="290" width="25" height="20" rx="1" fill="#FF9800"/>
<text x="232" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Франция</text>
<text x="232" y="288" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" text-anchor="middle">2.6</text>

<rect x="270" y="288" width="25" height="22" rx="1" fill="#FF5722"/>
<text x="282" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Германия</text>
<text x="282" y="286" font-family="Arial,sans-serif" font-size="4.5" fill="#BF360C" text-anchor="middle">3.0</text>

<rect x="320" y="286" width="25" height="24" rx="1" fill="#F44336"/>
<text x="332" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Япония</text>
<text x="332" y="284" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828" text-anchor="middle">3.5</text>

<rect x="370" y="284" width="25" height="26" rx="1" fill="#E53935"/>
<text x="382" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">США</text>
<text x="382" y="282" font-family="Arial,sans-serif" font-size="4.5" fill="#B71C1C" text-anchor="middle">4.5</text>

<rect x="420" y="282" width="25" height="28" rx="1" fill="#C62828"/>
<text x="432" y="318" font-family="Arial,sans-serif" font-size="5" fill="#424242" text-anchor="middle">Катар</text>
<text x="432" y="280" font-family="Arial,sans-serif" font-size="4.5" fill="#B71C1C" text-anchor="middle">8.0</text>

<!-- Human demand line -->
<line x1="30" y1="293" x2="470" y2="293" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
<text x="475" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828">Спрос: 1,7 Земли</text>

<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#E57373" text-anchor="middle">Урок 43 · Глобальные экологические проблемы</text>
</svg>