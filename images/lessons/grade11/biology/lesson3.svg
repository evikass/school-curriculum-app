<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <linearGradient id="rockBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="100%" style="stop-color:#5D4037"/>
    </linearGradient>
    <linearGradient id="rockMid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A1887F"/>
      <stop offset="100%" style="stop-color:#8D6E63"/>
    </linearGradient>
    <linearGradient id="rockMid2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BCAAA4"/>
      <stop offset="100%" style="stop-color:#A1887F"/>
    </linearGradient>
    <linearGradient id="rockTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D7CCC8"/>
      <stop offset="100%" style="stop-color:#BCAAA4"/>
    </linearGradient>
    <filter id="fossilGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FF6F00" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow3" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#5D4037" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#BF360C">Палеонтологические доказательства</text>
  <line x1="80" y1="36" x2="420" y2="36" stroke="#E65100" stroke-width="1" opacity="0.3"/>

  <!-- Stratigraphy - Rock layers -->
  <!-- Layer 4 (top) - Мел (Cretaceous) -->
  <rect x="25" y="55" width="220" height="50" rx="3" ry="3" fill="url(#rockTop)" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="135" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4E342E">Мел</text>
  <text x="135" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6D4C41">145–66 млн лет</text>

  <!-- Layer 3 - Юра (Jurassic) -->
  <rect x="25" y="105" width="220" height="50" rx="3" ry="3" fill="url(#rockMid2)" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="135" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4E342E">Юра</text>
  <text x="135" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5D4037">201–145 млн лет</text>

  <!-- Layer 2 - Девон (Devonian) -->
  <rect x="25" y="155" width="220" height="50" rx="3" ry="3" fill="url(#rockMid1)" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="135" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Девон</text>
  <text x="135" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4E342E">419–359 млн лет</text>

  <!-- Layer 1 (bottom) - Кембрий (Cambrian) -->
  <rect x="25" y="205" width="220" height="50" rx="3" ry="3" fill="url(#rockBottom)" stroke="#4E342E" stroke-width="0.8"/>
  <text x="135" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFF3E0">Кембрий</text>
  <text x="135" y="234" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFECB3">541–485 млн лет</text>

  <!-- Time arrow on left -->
  <line x1="15" y1="260" x2="15" y2="55" stroke="#BF360C" stroke-width="2"/>
  <polygon points="15,52 11,60 19,60" fill="#BF360C"/>
  <text x="13" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#BF360C">Время</text>

  <!-- Fossil in Мел (Cretaceous) - Dinosaur skull outline -->
  <g transform="translate(60, 58)">
    <!-- T-Rex skull silhouette simplified -->
    <path d="M10,25 Q5,20 8,15 Q12,8 20,5 Q28,3 35,5 Q42,8 45,12 Q48,16 46,20 L48,22 Q52,22 55,20 L55,25 Q50,28 45,28 Q40,26 38,25 L10,25 Z" 
          fill="#5D4037" opacity="0.5" filter="url(#fossilGlow)"/>
    <!-- Eye socket -->
    <circle cx="28" cy="14" r="4" fill="#FFE0B2" opacity="0.6"/>
    <!-- Teeth -->
    <line x1="45" y1="22" x2="47" y2="25" stroke="#4E342E" stroke-width="0.8"/>
    <line x1="49" y1="21" x2="51" y2="25" stroke="#4E342E" stroke-width="0.8"/>
    <line x1="42" y1="23" x2="43" y2="26" stroke="#4E342E" stroke-width="0.8"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="6" fill="#4E342E">Динозавры</text>
  </g>

  <!-- Fossil in Юра (Jurassic) - Ammonite -->
  <g transform="translate(130, 108)">
    <path d="M15,20 Q5,18 3,12 Q1,5 8,2 Q15,0 20,5 Q25,10 22,18 Q20,22 15,20 Z" 
          fill="#6D4C41" opacity="0.5" filter="url(#fossilGlow)"/>
    <!-- Spiral lines -->
    <path d="M12,16 Q8,14 9,10 Q10,6 14,7 Q17,8 16,13" stroke="#4E342E" stroke-width="0.7" fill="none"/>
    <path d="M13,14 Q10,12 11,9 Q12,7 15,8" stroke="#4E342E" stroke-width="0.5" fill="none"/>
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="6" fill="#4E342E">Аммониты</text>
  </g>

  <!-- Fossil in Девон (Devonian) - Fish -->
  <g transform="translate(55, 157)">
    <ellipse cx="20" cy="15" rx="16" ry="9" fill="#795548" opacity="0.45" filter="url(#fossilGlow)"/>
    <!-- Fish tail -->
    <path d="M35,15 L45,8 L43,15 L45,22 Z" fill="#795548" opacity="0.45"/>
    <!-- Eye -->
    <circle cx="12" cy="13" r="2.5" fill="#FFE0B2" opacity="0.5"/>
    <!-- Fins -->
    <path d="M18,6 L22,0 L24,6" fill="#795548" opacity="0.3"/>
    <path d="M22,24 L26,30 L28,24" fill="#795548" opacity="0.3"/>
    <!-- Scales pattern -->
    <path d="M20,12 Q22,14 20,16" stroke="#5D4037" stroke-width="0.5" fill="none"/>
    <path d="M24,12 Q26,14 24,16" stroke="#5D4037" stroke-width="0.5" fill="none"/>
    <path d="M28,12 Q30,14 28,16" stroke="#5D4037" stroke-width="0.5" fill="none"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="6" fill="#4E342E">Рыбы</text>
  </g>

  <!-- Fossil in Кембрий (Cambrian) - Trilobite -->
  <g transform="translate(65, 208)">
    <ellipse cx="22" cy="18" rx="18" ry="10" fill="#4E342E" opacity="0.5" filter="url(#fossilGlow)"/>
    <!-- Trilobite segments -->
    <line x1="8" y1="14" x2="36" y2="14" stroke="#3E2723" stroke-width="0.6"/>
    <line x1="7" y1="18" x2="37" y2="18" stroke="#3E2723" stroke-width="0.6"/>
    <line x1="8" y1="22" x2="36" y2="22" stroke="#3E2723" stroke-width="0.6"/>
    <!-- Center ridge -->
    <line x1="5" y1="18" x2="40" y2="18" stroke="#3E2723" stroke-width="1"/>
    <!-- Antennae -->
    <line x1="5" y1="16" x2="0" y2="10" stroke="#3E2723" stroke-width="0.6"/>
    <line x1="5" y1="20" x2="0" y2="26" stroke="#3E2723" stroke-width="0.6"/>
    <text x="48" y="22" font-family="Arial, sans-serif" font-size="6" fill="#FFECB3">Трилобиты</text>
  </g>

  <!-- === Archaeopteryx fossil (center-right) === -->
  <rect x="260" y="50" width="225" height="210" rx="8" ry="8" fill="#FFF8E1" fill-opacity="0.9" stroke="#8D6E63" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="372" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Археоптерикс</text>
  <text x="372" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E65100" font-style="italic">Archaeopteryx lithographica</text>

  <!-- Archaeopteryx fossil silhouette -->
  <g transform="translate(280, 85)" filter="url(#fossilGlow)">
    <!-- Body -->
    <ellipse cx="55" cy="55" rx="22" ry="14" fill="#5D4037" opacity="0.35"/>
    <!-- Head -->
    <ellipse cx="90" cy="42" rx="12" ry="9" fill="#5D4037" opacity="0.35"/>
    <!-- Beak -->
    <path d="M100,40 L115,36 L100,42 Z" fill="#5D4037" opacity="0.4"/>
    <!-- Eye -->
    <circle cx="93" cy="40" r="2.5" fill="#FFE0B2" opacity="0.7"/>
    <!-- Neck -->
    <path d="M72,48 Q80,44 82,42" stroke="#5D4037" stroke-width="3" fill="none" opacity="0.3"/>
    <!-- Wing (feathered) -->
    <path d="M40,48 Q20,30 5,15 Q10,20 8,25 Q15,18 20,28 Q18,22 25,32 Q22,28 30,38" 
          stroke="#5D4037" stroke-width="0.8" fill="#5D4037" fill-opacity="0.15"/>
    <!-- Wing feather lines -->
    <line x1="35" y1="45" x2="8" y2="18" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <line x1="38" y1="43" x2="12" y2="16" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <line x1="42" y1="42" x2="18" y2="18" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <line x1="32" y1="47" x2="5" y2="22" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <!-- Tail feathers -->
    <path d="M35,62 Q20,70 10,85 Q15,75 18,82 Q18,72 22,78 Q20,70 25,75" 
          stroke="#5D4037" stroke-width="0.8" fill="#5D4037" fill-opacity="0.15"/>
    <line x1="38" y1="65" x2="12" y2="88" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <line x1="36" y1="63" x2="10" y2="82" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <line x1="40" y1="66" x2="15" y2="90" stroke="#5D4037" stroke-width="0.4" opacity="0.5"/>
    <!-- Legs -->
    <line x1="50" y1="68" x2="45" y2="85" stroke="#5D4037" stroke-width="1.5" opacity="0.4"/>
    <line x1="58" y1="68" x2="55" y2="85" stroke="#5D4037" stroke-width="1.5" opacity="0.4"/>
    <!-- Claws -->
    <path d="M45,85 L42,90 M45,85 L47,90 M45,85 L44,91" stroke="#5D4037" stroke-width="0.8" opacity="0.4"/>
    <path d="M55,85 L52,90 M55,85 L57,90 M55,85 L54,91" stroke="#5D4037" stroke-width="0.8" opacity="0.4"/>
    <!-- Claw marks on wing -->
    <path d="M42,42 L40,46 M44,41 L42,45" stroke="#5D4037" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Labels for Archaeopteryx features -->
  <g font-family="Arial, sans-serif" font-size="6" fill="#BF360C">
    <!-- Feather label -->
    <line x1="370" y1="108" x2="395" y2="98" stroke="#BF360C" stroke-width="0.5"/>
    <text x="396" y="100">Перья</text>
    <!-- Teeth label -->
    <line x1="385" y1="124" x2="420" y2="118" stroke="#BF360C" stroke-width="0.5"/>
    <text x="421" y="120">Зубы</text>
    <!-- Claws label -->
    <line x1="325" y1="170" x2="350" y2="165" stroke="#BF360C" stroke-width="0.5"/>
    <text x="351" y="167">Когти на крыльях</text>
    <!-- Long tail label -->
    <line x1="310" y1="185" x2="340" y2="180" stroke="#BF360C" stroke-width="0.5"/>
    <text x="341" y="182">Длинный хвост</text>
  </g>

  <!-- Transition label -->
  <rect x="290" y="210" width="165" height="40" rx="5" ry="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="372" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#BF360C">Переходная форма</text>
  <text x="372" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E65100">Рептилии → Птицы</text>
  <text x="372" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#FF8F00">≈ 150 млн лет назад</text>

  <!-- Bottom info box -->
  <rect x="25" y="268" width="460" height="68" rx="8" ry="8" fill="#ffffff" fill-opacity="0.85" stroke="#8D6E63" stroke-width="1" filter="url(#shadow3)"/>
  <text x="250" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#BF360C">Палеонтологические доказательства эволюции</text>
  <line x1="60" y1="292" x2="440" y2="292" stroke="#BCAAA4" stroke-width="0.5"/>
  <text x="250" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5D4037">• Ископаемые остатки показывают последовательность изменений организмов во времени</text>
  <text x="250" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5D4037">• Переходные формы (археоптерикс) связывают крупные группы организмов</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5D4037">• Чем глубже слой — тем примитивнее организмы; чем моложе — тем сложнее</text>
</svg>