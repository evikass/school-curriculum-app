<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg30" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="earthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="30%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#2E7D32"/>
      <stop offset="70%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <marker id="arrow30b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1565C0"/>
    </marker>
    <marker id="arrow30g" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg30)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="22" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Биосфера — глобальная экосистема</text>

  <!-- Earth globe with layers -->
  <g transform="translate(120,115)">
    <!-- Atmosphere halo -->
    <circle cx="0" cy="0" r="82" fill="none" stroke="#90CAF9" stroke-width="12" opacity="0.3"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="#64B5F6" stroke-width="4" opacity="0.4"/>
    
    <!-- Earth -->
    <circle cx="0" cy="0" r="68" fill="url(#earthGrad)" stroke="#0D47A1" stroke-width="1.5"/>
    
    <!-- Continent shapes simplified -->
    <ellipse cx="-20" cy="-15" rx="18" ry="22" fill="#4CAF50" opacity="0.6" transform="rotate(-10,-20,-15)"/>
    <ellipse cx="25" cy="-10" rx="12" ry="20" fill="#4CAF50" opacity="0.5" transform="rotate(15,25,-10)"/>
    <ellipse cx="-30" cy="25" rx="10" ry="14" fill="#4CAF50" opacity="0.5" transform="rotate(-20,-30,25)"/>
    <ellipse cx="30" cy="30" rx="14" ry="8" fill="#4CAF50" opacity="0.5"/>
    <ellipse cx="10" cy="20" rx="8" ry="5" fill="#388E3C" opacity="0.4"/>
    
    <!-- Ice caps -->
    <ellipse cx="0" cy="-60" rx="25" ry="8" fill="white" opacity="0.6"/>
    <ellipse cx="0" cy="62" rx="20" ry="6" fill="white" opacity="0.5"/>
    
    <!-- Layer labels with lines -->
    <!-- Атмосфера -->
    <line x1="58" y1="-58" x2="90" y2="-75" stroke="#1565C0" stroke-width="0.8"/>
    <rect x="90" y="-83" width="70" height="18" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="125" y="-72" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Атмосфера</text>
    <text x="125" y="-65" font-size="5" fill="#1565C0" text-anchor="middle">до 20 км (озон)</text>
    
    <!-- Биосфера -->
    <line x1="65" y1="0" x2="90" y2="0" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="90" y="-10" width="70" height="20" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
    <text x="125" y="2" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Биосфера</text>
    <text x="125" y="8" font-size="5" fill="#2E7D32" text-anchor="middle">оболочка жизни</text>
    
    <!-- Литосфера -->
    <line x1="55" y1="55" x2="90" y2="60" stroke="#5D4037" stroke-width="0.8"/>
    <rect x="90" y="52" width="70" height="18" rx="3" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.8"/>
    <text x="125" y="63" font-size="7" fill="#4E342E" text-anchor="middle" font-weight="bold">Литосфера</text>
    <text x="125" y="68" font-size="5" fill="#5D4037" text-anchor="middle">до 5 км вглубь</text>
    
    <!-- Гидросфера -->
    <line x1="-55" y1="45" x2="-90" y2="55" stroke="#0277BD" stroke-width="0.8"/>
    <rect x="-160" y="47" width="70" height="18" rx="3" fill="#E1F5FE" stroke="#29B6F6" stroke-width="0.8"/>
    <text x="-125" y="58" font-size="7" fill="#01579B" text-anchor="middle" font-weight="bold">Гидросфера</text>
    <text x="-125" y="63" font-size="5" fill="#0277BD" text-anchor="middle">до 11 км (Марианская)</text>
    
    <!-- Biosphere zone highlight on globe -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="#4CAF50" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
  </g>

  <!-- Vernadsky portrait silhouette -->
  <g transform="translate(35,70)">
    <rect x="0" y="0" width="60" height="80" rx="6" fill="white" fill-opacity="0.8" stroke="#5D4037" stroke-width="1"/>
    <text x="30" y="12" font-size="5.5" fill="#3E2723" text-anchor="middle" font-weight="bold">В.И. Вернадский</text>
    <!-- Silhouette -->
    <ellipse cx="30" cy="32" rx="10" ry="12" fill="#5D4037"/>
    <path d="M18,44 Q15,50 18,55 Q22,58 30,58 Q38,58 42,55 Q45,50 42,44" fill="#5D4037"/>
    <!-- Shoulders -->
    <path d="M18,55 Q10,58 8,65 L52,65 Q50,58 42,55" fill="#5D4037"/>
    <!-- Glasses -->
    <circle cx="26" cy="30" r="4" fill="none" stroke="white" stroke-width="0.6"/>
    <circle cx="34" cy="30" r="4" fill="none" stroke="white" stroke-width="0.6"/>
    <line x1="30" y1="30" x2="30" y2="30" stroke="white" stroke-width="0.6"/>
    <text x="30" y="75" font-size="4.5" fill="#5D4037" text-anchor="middle">1863—1945</text>
    <text x="30" y="80" font-size="4" fill="#795548" text-anchor="middle">Учение о биосфере</text>
  </g>

  <!-- Five functions of living matter -->
  <rect x="290" y="34" width="200" height="135" rx="6" fill="white" fill-opacity="0.7" stroke="#0D47A1" stroke-width="1"/>
  <text x="390" y="50" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">Функции живого вещества</text>
  
  <g transform="translate(300,58)">
    <!-- 1. Энергетическая -->
    <rect x="0" y="0" width="180" height="14" rx="3" fill="#FFF9C4"/>
    <circle cx="10" cy="7" r="5" fill="#FDD835"/>
    <text x="10" y="10" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">1</text>
    <text x="22" y="10" font-size="6.5" fill="#E65100" font-weight="bold">Энергетическая</text>
    <text x="130" y="10" font-size="5" fill="#BF360C">накопление энергии</text>
    
    <!-- 2. Газовая -->
    <rect x="0" y="17" width="180" height="14" rx="3" fill="#E3F2FD"/>
    <circle cx="10" cy="24" r="5" fill="#42A5F5"/>
    <text x="10" y="27" font-size="7" fill="white" text-anchor="middle" font-weight="bold">2</text>
    <text x="22" y="27" font-size="6.5" fill="#0D47A1" font-weight="bold">Газовая</text>
    <text x="100" y="27" font-size="5" fill="#1565C0">O₂ ↔ CO₂ обмен</text>
    
    <!-- 3. Концентрационная -->
    <rect x="0" y="34" width="180" height="14" rx="3" fill="#E8F5E9"/>
    <circle cx="10" cy="41" r="5" fill="#66BB6A"/>
    <text x="10" y="44" font-size="7" fill="white" text-anchor="middle" font-weight="bold">3</text>
    <text x="22" y="44" font-size="6.5" fill="#1B5E20" font-weight="bold">Концентрационная</text>
    <text x="132" y="44" font-size="5" fill="#2E7D32">накопление элементов</text>
    
    <!-- 4. Окислительно-восстановительная -->
    <rect x="0" y="51" width="180" height="14" rx="3" fill="#FCE4EC"/>
    <circle cx="10" cy="58" r="5" fill="#EC407A"/>
    <text x="10" y="61" font-size="7" fill="white" text-anchor="middle" font-weight="bold">4</text>
    <text x="22" y="61" font-size="6.5" fill="#880E4F" font-weight="bold">Окислит.-восст.</text>
    <text x="118" y="61" font-size="5" fill="#C2185B">хим. превращения</text>
    
    <!-- 5. Деструктивная -->
    <rect x="0" y="68" width="180" height="14" rx="3" fill="#EFEBE9"/>
    <circle cx="10" cy="75" r="5" fill="#8D6E63"/>
    <text x="10" y="78" font-size="7" fill="white" text-anchor="middle" font-weight="bold">5</text>
    <text x="22" y="78" font-size="6.5" fill="#4E342E" font-weight="bold">Деструктивная</text>
    <text x="108" y="78" font-size="5" fill="#5D4037">разложение органики</text>
  </g>

  <!-- Carbon cycle simplified diagram -->
  <rect x="10" y="195" width="480" height="148" rx="6" fill="white" fill-opacity="0.5" stroke="#0D47A1" stroke-width="1"/>
  <text x="250" y="212" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Круговорот углерода (упрощённо)</text>

  <!-- Atmosphere CO2 at top -->
  <rect x="180" y="220" width="140" height="28" rx="6" fill="#B3E5FC" stroke="#42A5F5" stroke-width="1"/>
  <text x="250" y="235" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">АТМОСФЕРА</text>
  <text x="250" y="244" font-size="7" fill="#1565C0" text-anchor="middle">CO₂ (0.04%)</text>

  <!-- Plants (Producers) -->
  <rect x="50" y="268" width="120" height="35" rx="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1"/>
  <text x="110" y="282" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Растения</text>
  <text x="110" y="292" font-size="6" fill="#2E7D32" text-anchor="middle">(Фотосинтез)</text>
  <!-- Plant icon -->
  <g transform="translate(145,270)">
    <line x1="0" y1="10" x2="0" y2="2" stroke="#2E7D32" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="5" ry="4" fill="#43A047"/>
  </g>

  <!-- Animals (Consumers) -->
  <rect x="190" y="268" width="120" height="35" rx="6" fill="#FFE0B2" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="282" font-size="7.5" fill="#E65100" text-anchor="middle" font-weight="bold">Животные</text>
  <text x="250" y="292" font-size="6" fill="#BF360C" text-anchor="middle">(Дыхание)</text>

  <!-- Fossil fuels -->
  <rect x="330" y="268" width="120" height="35" rx="6" fill="#D7CCC8" stroke="#5D4037" stroke-width="1"/>
  <text x="390" y="282" font-size="7.5" fill="#3E2723" text-anchor="middle" font-weight="bold">Ископаемое</text>
  <text x="390" y="292" font-size="6" fill="#5D4037" text-anchor="middle">топливо (уголь, нефть)</text>

  <!-- Decomposers -->
  <rect x="140" y="310" width="130" height="28" rx="6" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1"/>
  <text x="205" y="325" font-size="7" fill="#4E342E" text-anchor="middle" font-weight="bold">Редуценты (грибы, бактерии)</text>
  <text x="205" y="334" font-size="5.5" fill="#5D4037" text-anchor="middle">Разложение → CO₂</text>

  <!-- Arrows for carbon cycle -->
  <!-- CO2 → Plants (photosynthesis) -->
  <path d="M200,248 L130,268" fill="none" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrow30g)"/>
  <text x="150" y="256" font-size="5" fill="#2E7D32">Фотосинтез</text>

  <!-- Plants → CO2 (respiration) -->
  <path d="M110,268 L200,248" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="138" y="265" font-size="4.5" fill="#E65100">Дыхание</text>

  <!-- Plants → Animals -->
  <path d="M170,285 L190,285" fill="none" stroke="#FF8F00" stroke-width="1.2"/>
  <text x="180" y="280" font-size="4.5" fill="#E65100">Пища</text>

  <!-- Animals → CO2 -->
  <path d="M260,268 L290,248" fill="none" stroke="#E65100" stroke-width="1.2"/>
  <text x="285" y="262" font-size="4.5" fill="#E65100">Дыхание</text>

  <!-- Animals → Decomposers -->
  <path d="M230,303 L220,310" fill="none" stroke="#5D4037" stroke-width="1"/>

  <!-- Decomposers → CO2 -->
  <path d="M240,310 L300,248" fill="none" stroke="#5D4037" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="278" font-size="4.5" fill="#5D4037">CO₂↑</text>

  <!-- Fossil fuels → CO2 (combustion) -->
  <path d="M370,268 L310,248" fill="none" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="355" y="255" font-size="5" fill="#C62828" font-weight="bold">Сжигание</text>
  <text x="355" y="262" font-size="4.5" fill="#C62828">↑CO₂</text>

  <!-- Plants → Fossil fuels (over millions of years) -->
  <path d="M150,303 L340,303" fill="none" stroke="#8D6E63" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="245" y="300" font-size="5" fill="#5D4037">Миллионы лет →</text>

  <!-- Human impact label -->
  <g transform="translate(420,270)">
    <rect x="0" y="0" width="55" height="30" rx="4" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.8"/>
    <text x="27" y="12" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">Влияние</text>
    <text x="27" y="20" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">человека</text>
    <text x="27" y="27" font-size="4" fill="#EF5350" text-anchor="middle">+CO₂ в атмосфере</text>
  </g>
</svg>