<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#33691E" stroke-width="2.5"/>
  <text x="250" y="40" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">Популяции и сообщества</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">Биология — Урок 6</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#33691E" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="72" width="470" height="230" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="72" width="470" height="230" fill="#F1F8E9" opacity="0.5"/>

    <!-- Population characteristics -->
    <rect x="25" y="80" width="220" height="105" rx="6" fill="white" stroke="#33691E" stroke-width="1.2"/>
    <rect x="25" y="80" width="220" height="16" rx="6" fill="#33691E" opacity="0.15"/>
    <text x="135" y="92" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Популяция и её свойства</text>
    
    <!-- Population dots cluster -->
    <circle cx="55" cy="125" r="4" fill="#8BC34A" stroke="#33691E" stroke-width="0.8"/>
    <circle cx="68" cy="118" r="4" fill="#8BC34A" stroke="#33691E" stroke-width="0.8"/>
    <circle cx="60" cy="138" r="4" fill="#A5D6A7" stroke="#33691E" stroke-width="0.8"/>
    <circle cx="75" cy="132" r="4" fill="#8BC34A" stroke="#33691E" stroke-width="0.8"/>
    <circle cx="50" cy="148" r="4" fill="#A5D6A7" stroke="#33691E" stroke-width="0.8"/>
    <circle cx="82" cy="145" r="4" fill="#8BC34A" stroke="#33691E" stroke-width="0.8"/>
    <circle cx="65" cy="155" r="4" fill="#A5D6A7" stroke="#33691E" stroke-width="0.8"/>
    <!-- Dashed boundary -->
    <ellipse cx="65" cy="138" rx="30" ry="30" fill="none" stroke="#33691E" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="65" y="172" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Популяция</text>

    <!-- Properties list -->
    <text x="115" y="112" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Численность</text>
    <text x="115" y="123" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Плотность</text>
    <text x="115" y="134" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Рождаемость / Смертность</text>
    <text x="115" y="145" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Возрастной состав</text>
    <text x="115" y="156" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Половой состав</text>
    <text x="115" y="167" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Генофонд</text>
    <text x="115" y="178" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Динамика (рост/спад)</text>

    <!-- Community structure -->
    <rect x="260" y="80" width="210" height="105" rx="6" fill="white" stroke="#33691E" stroke-width="1.2"/>
    <rect x="260" y="80" width="210" height="16" rx="6" fill="#33691E" opacity="0.15"/>
    <text x="365" y="92" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Сообщество (биоценоз)</text>
    
    <!-- Trophic layers -->
    <rect x="275" y="103" width="180" height="14" rx="3" fill="#33691E" opacity="0.25"/>
    <text x="365" y="113" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Продуценты (растения)</text>
    <rect x="285" y="120" width="160" height="14" rx="3" fill="#8BC34A" opacity="0.3"/>
    <text x="365" y="130" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Консументы I порядка (травоядные)</text>
    <rect x="295" y="137" width="140" height="14" rx="3" fill="#A5D6A7" opacity="0.4"/>
    <text x="365" y="147" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Консументы II порядка (хищники)</text>
    <rect x="310" y="154" width="110" height="14" rx="3" fill="#F1F8E9" stroke="#33691E" stroke-width="0.5"/>
    <text x="365" y="164" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Редуценты (бактерии, грибы)</text>

    <!-- Population growth curves -->
    <rect x="25" y="195" width="220" height="95" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="135" y="210" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Динамика популяции</text>
    <!-- J-curve -->
    <path d="M40,275 Q60,272 80,268 Q110,258 130,235 Q145,210 160,230" fill="none" stroke="#E53935" stroke-width="1.5"/>
    <text x="165" y="228" font-family="Arial,sans-serif" font-size="6" fill="#C62828">J-кривая</text>
    <!-- S-curve -->
    <path d="M40,275 Q60,270 80,260 Q110,240 130,230 Q150,225 170,223" fill="none" stroke="#33691E" stroke-width="1.5"/>
    <line x1="40" y1="278" x2="180" y2="278" stroke="#777" stroke-width="0.5"/>
    <line x1="40" y1="218" x2="180" y2="218" stroke="#33691E" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="185" y="220" font-family="Arial,sans-serif" font-size="5.5" fill="#33691E">K</text>
    <text x="165" y="240" font-family="Arial,sans-serif" font-size="6" fill="#33691E">S-кривая</text>
    <text x="110" y="290" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">время →</text>
    <text x="35" y="255" font-family="Arial,sans-serif" font-size="5.5" fill="#777" transform="rotate(-90,35,255)">N</text>

    <!-- Community interactions -->
    <rect x="260" y="195" width="210" height="95" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="365" y="210" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Типы взаимодействий</text>
    <text x="270" y="226" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Мутуализм (+/+) — лишайник</text>
    <text x="270" y="238" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Комменсализм (+/0) — рак-отшельник</text>
    <text x="270" y="250" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Хищничество (+/−) — волк и заяц</text>
    <text x="270" y="262" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Паразитизм (+/−) — клещ</text>
    <text x="270" y="274" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Конкуренция (−/−) — ресурсы</text>
    <text x="270" y="286" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Аменсализм (−/0) — антибиоз</text>
  </g>
  <line x1="30" y1="308" x2="470" y2="308" stroke="#33691E" stroke-width="1.5" opacity="0.25"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="11" fill="#33691E" text-anchor="middle">Биология · 11 класс</text>
</svg>