<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg22" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg22)" rx="8"/>
  
  <!-- Title -->
  <text x="250" y="24" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Закон оптимума (Закон толерантности Шелфорда)</text>

  <!-- Main bell curve chart area -->
  <rect x="50" y="40" width="400" height="200" rx="4" fill="white" fill-opacity="0.6" stroke="#90CAF9" stroke-width="0.5"/>
  
  <!-- Y-axis -->
  <line x1="80" y1="55" x2="80" y2="225" stroke="#0D47A1" stroke-width="1.5"/>
  <polygon points="80,52 77,60 83,60" fill="#0D47A1"/>
  <text x="30" y="145" font-size="9" fill="#0D47A1" text-anchor="middle" transform="rotate(-90,30,145)">Жизнеспособность</text>
  
  <!-- X-axis -->
  <line x1="80" y1="225" x2="440" y2="225" stroke="#0D47A1" stroke-width="1.5"/>
  <polygon points="443,225 435,222 435,228" fill="#0D47A1"/>
  <text x="260" y="245" font-size="9" fill="#0D47A1" text-anchor="middle">Интенсивность фактора</text>
  
  <!-- Bell curve zones - Red zones (Предел выносливости) left -->
  <path d="M100,220 Q120,215 140,200 Q155,185 170,160" fill="none" stroke="none"/>
  <!-- Red left zone -->
  <path d="M100,225 L100,220 Q110,218 120,213 Q130,205 140,195 Q150,180 160,165 Q170,150 185,130 L185,225 Z" fill="#FFCDD2" opacity="0.6"/>
  <!-- Yellow left pessimum -->
  <path d="M185,225 L185,130 Q195,110 210,90 Q225,72 245,62 L245,225 Z" fill="#FFF9C4" opacity="0.6"/>
  <!-- Green optimum zone -->
  <path d="M245,225 L245,62 Q255,58 265,57 Q275,58 285,62 L285,225 Z" fill="#C8E6C9" opacity="0.7"/>
  <!-- Yellow right pessimum -->
  <path d="M285,225 L285,62 Q305,78 320,98 Q335,120 345,140 L345,225 Z" fill="#FFF9C4" opacity="0.6"/>
  <!-- Red right zone -->
  <path d="M345,225 L345,140 Q355,158 365,172 Q375,185 385,195 Q395,205 405,212 Q415,217 425,220 L425,225 Z" fill="#FFCDD2" opacity="0.6"/>

  <!-- Bell curve line -->
  <path d="M100,220 Q120,215 140,200 Q155,180 170,155 Q185,125 200,100 Q215,78 235,65 Q250,58 265,57 Q280,60 295,70 Q315,88 330,108 Q345,132 355,155 Q370,178 385,195 Q400,208 420,218" fill="none" stroke="#0D47A1" stroke-width="2.5"/>

  <!-- Zone labels with arrows -->
  <!-- Left red: Предел выносливости -->
  <line x1="130" y1="235" x2="130" y2="260" stroke="#C62828" stroke-width="0.8"/>
  <text x="130" y="270" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Предел</text>
  <text x="130" y="279" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">выносливости</text>
  
  <!-- Left yellow: Пессимум -->
  <line x1="215" y1="235" x2="215" y2="255" stroke="#F9A825" stroke-width="0.8"/>
  <text x="215" y="265" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Пессимум</text>
  
  <!-- Center green: Оптимум -->
  <line x1="265" y1="235" x2="265" y2="252" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="265" y="264" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Оптимум</text>
  
  <!-- Right yellow: Пессимум -->
  <line x1="315" y1="235" x2="315" y2="255" stroke="#F9A825" stroke-width="0.8"/>
  <text x="315" y="265" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Пессимум</text>
  
  <!-- Right red: Предел выносливости -->
  <line x1="395" y1="235" x2="395" y2="260" stroke="#C62828" stroke-width="0.8"/>
  <text x="395" y="270" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Предел</text>
  <text x="395" y="279" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">выносливости</text>

  <!-- Min and Max labels -->
  <text x="108" y="237" font-size="7" fill="#0D47A1" text-anchor="middle">Min</text>
  <text x="418" y="237" font-size="7" fill="#0D47A1" text-anchor="middle">Max</text>

  <!-- Dashed vertical lines for zone boundaries -->
  <line x1="185" y1="130" x2="185" y2="225" stroke="#F57F17" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="245" y1="62" x2="245" y2="225" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="285" y1="62" x2="285" y2="225" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="345" y1="140" x2="345" y2="225" stroke="#F57F17" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Liebig's Law box -->
  <rect x="15" y="292" width="225" height="50" rx="6" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
  <text x="127" y="308" font-size="8.5" font-weight="bold" fill="#1A237E" text-anchor="middle">Закон Либиха (Закон минимума)</text>
  <text x="127" y="320" font-size="7" fill="#283593" text-anchor="middle">«Величина урожая определяется фактором,</text>
  <text x="127" y="330" font-size="7" fill="#283593" text-anchor="middle">находящимся в минимуме»</text>
  <!-- Barrel diagram -->
  <g transform="translate(40,295)">
    <rect x="0" y="6" width="30" height="30" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
    <rect x="5" y="6" width="20" height="5" fill="#4FC3F7"/>
    <rect x="5" y="11" width="15" height="3" fill="#81C784"/>
    <rect x="5" y="14" width="8" height="3" fill="#FFD54F"/>
    <text x="15" y="13" font-size="4" fill="#01579B" text-anchor="middle">N</text>
    <text x="12" y="16" font-size="3.5" fill="#33691E" text-anchor="middle">P</text>
    <text x="9" y="19" font-size="3" fill="#E65100" text-anchor="middle">K</text>
    <text x="15" y="36" font-size="4" fill="#5D4037" text-anchor="middle">K — минимум</text>
  </g>

  <!-- Shelford's Law box -->
  <rect x="260" y="292" width="225" height="50" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="372" y="308" font-size="8.5" font-weight="bold" fill="#BF360C" text-anchor="middle">Закон Шелфорда (Закон толерантности)</text>
  <text x="372" y="320" font-size="7" fill="#E65100" text-anchor="middle">«Организм ограничен как минимумом,</text>
  <text x="372" y="330" font-size="7" fill="#E65100" text-anchor="middle">так и максимумом экологического фактора»</text>

  <!-- Example section at bottom-left of chart -->
  <g transform="translate(85,55)">
    <text x="0" y="0" font-size="7" fill="#0D47A1" font-style="italic">Пример: температура и активность организма</text>
    <g transform="translate(0,8)">
      <rect x="0" y="0" width="12" height="3" fill="#FFCDD2" rx="1"/><text x="15" y="3" font-size="5" fill="#C62828">гибель</text>
      <rect x="45" y="0" width="12" height="3" fill="#FFF9C4" rx="1"/><text x="60" y="3" font-size="5" fill="#F57F17">угнетение</text>
      <rect x="100" y="0" width="12" height="3" fill="#C8E6C9" rx="1"/><text x="115" y="3" font-size="5" fill="#2E7D32">норма</text>
      <rect x="145" y="0" width="12" height="3" fill="#FFF9C4" rx="1"/><text x="160" y="3" font-size="5" fill="#F57F17">угнетение</text>
      <rect x="205" y="0" width="12" height="3" fill="#FFCDD2" rx="1"/><text x="220" y="3" font-size="5" fill="#C62828">гибель</text>
    </g>
  </g>

  <!-- Small thermometer icons on x-axis -->
  <!-- Left thermometer (cold) -->
  <g transform="translate(96,225)">
    <rect x="0" y="-20" width="3" height="14" rx="1" fill="#42A5F5"/>
    <circle cx="1.5" cy="-5" r="3" fill="#42A5F5"/>
  </g>
  <!-- Center thermometer (warm) -->
  <g transform="translate(263,225)">
    <rect x="0" y="-25" width="3" height="19" rx="1" fill="#EF5350"/>
    <circle cx="1.5" cy="-5" r="3" fill="#EF5350"/>
  </g>
  <!-- Right thermometer (hot) -->
  <g transform="translate(420,225)">
    <rect x="0" y="-16" width="3" height="10" rx="1" fill="#F44336"/>
    <circle cx="1.5" cy="-5" r="3" fill="#F44336"/>
  </g>
</svg>