<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad3">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Номер урока -->
  <text x="460" y="30" font-family="Arial" font-size="14" fill="#2c3e50" text-anchor="end">Урок 24</text>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="url(#grad1)" text-anchor="middle">Бином Ньютона</text>
  <text x="250" y="55" font-family="Arial" font-size="14" fill="#7f8c8d" text-anchor="middle">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Портрет Ньютона -->
  <circle cx="80" cy="120" r="30" fill="url(#grad3)"/>
  <rect x="60" y="140" width="40" height="30" fill="#34495e"/>
  <text x="80" y="170" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle">Ньютон</text>
  
  <!-- Основная формула -->
  <rect x="130" y="90" width="340" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="300" y="125" font-family="Arial" font-size="16" fill="#2c3e50" text-anchor="middle">(a + b)ⁿ = Σ Cᵏₙ · aⁿ⁻ᵏ · bᵏ</text>
  
  <!-- Треугольник Паскаля -->
  <text x="50" y="200" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Треугольник Паскаля:</text>
  
  <!-- Строка 0 -->
  <text x="150" y="220" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  
  <!-- Строка 1 -->
  <text x="130" y="240" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  <text x="170" y="240" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  
  <!-- Строка 2 -->
  <text x="110" y="260" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  <text x="150" y="260" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">2</text>
  <text x="190" y="260" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  
  <!-- Строка 3 -->
  <text x="90" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  <text x="130" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">3</text>
  <text x="170" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">3</text>
  <text x="210" y="280" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  
  <!-- Строка 4 -->
  <text x="70" y="300" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  <text x="110" y="300" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">4</text>
  <text x="150" y="300" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">6</text>
  <text x="190" y="300" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">4</text>
  <text x="230" y="300" font-family="Arial" font-size="14" fill="#34495e" text-anchor="middle">1</text>
  
  <!-- Связующие линии треугольника Паскаля -->
  <path d="M 150,220 L 130,240 L 170,240" fill="none" stroke="#95a5a6" stroke-width="1"/>
  <path d="M 130,240 L 110,260 L 150,260 L 190,260" fill="none" stroke="#95a5a6" stroke-width="1"/>
  <path d="M 110,260 L 90,280 L 130,280 L 170,280 L 210,280" fill="none" stroke="#95a5a6" stroke-width="1"/>
  <path d="M 90,280 L 70,300 L 110,300 L 150,300 L 190,300 L 230,300" fill="none" stroke="#95a5a6" stroke-width="1"/>
  
  <!-- Примеры формул -->
  <rect x="250" y="190" width="220" height="110" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="360" y="210" font-family="Arial" font-size="12" fill="#2c3e50" text-anchor="middle" font-weight="bold">Примеры:</text>
  <text x="260" y="230" font-family="Arial" font-size="11" fill="#495057">(a + b)² = a² + 2ab + b²</text>
  <text x="260" y="250" font-family="Arial" font-size="11" fill="#495057">(a + b)³ = a³ + 3a²b + 3ab² + b³</text>
  <text x="260" y="270" font-family="Arial" font-size="11" fill="#495057">(a + b)⁴ = a⁴ + 4a³b + 6a²b² + 4ab³ + b⁴</text>
  
  <!-- Формула биномиальных коэффициентов -->
  <text x="50" y="330" font-family="Arial" font-size="12" fill="#2c3e50">Cᵏₙ = n! / (k!(n-k)!)</text>
  
  <!-- Декоративные элементы -->
  <circle cx="450" cy="50" r="3" fill="#e74c3c"/>
  <circle cx="460" cy="60" r="3" fill="#f39c12"/>
  <circle cx="440" cy="65" r="3" fill="#3498db"/>
  
  <!-- Стрелки для связи формул -->
  <path d="M 100,130 L 140,130" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 200,260 L 250,250" fill="none" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead2)"/>
  
  <!-- Стрелки маркеры -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- График функции бинома -->
  <rect x="320" y="60" width="150" height="80" fill="#e8f4f8" stroke="#3498db" stroke-width="1" rx="3"/>
  <polyline points="330,130 340,120 350,110 360,105 370,105 380,110 390,120 400,130 410,140" 
            fill="none" stroke="#3498db" stroke-width="2"/>
  <text x="395" y="75" font-family="Arial" font-size="10" fill="#2c3e50" text-anchor="middle">y = (x+1)⁴</text>
</svg>