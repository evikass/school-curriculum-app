<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Урок 14: Построение графиков функций с помощью производной</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#34495e">АЛГЕБРА · 11 КЛАСС</text>
  <text x="450" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Урок 14</text>
  
  <!-- Система координат -->
  <line x1="100" y1="280" x2="450" y2="280" stroke="#34495e" stroke-width="2"/>
  <line x1="100" y1="280" x2="100" y2="80" stroke="#34495e" stroke-width="2"/>
  <polygon points="450,280 445,277 445,283" fill="#34495e"/>
  <polygon points="100,80 97,85 103,85" fill="#34495e"/>
  <text x="460" y="285" font-family="Arial, sans-serif" font-size="12" fill="#34495e">x</text>
  <text x="105" y="75" font-family="Arial, sans-serif" font-size="12" fill="#34495e">y</text>
  
  <!-- Деления на оси X -->
  <line x1="150" y1="275" x2="150" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="200" y1="275" x2="200" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="250" y1="275" x2="250" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="300" y1="275" x2="300" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="350" y1="275" x2="350" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="400" y1="275" x2="400" y2="285" stroke="#34495e" stroke-width="1"/>
  
  <!-- Деления на оси Y -->
  <line x1="95" y1="250" x2="105" y2="250" stroke="#34495e" stroke-width="1"/>
  <line x1="95" y1="220" x2="105" y2="220" stroke="#34495e" stroke-width="1"/>
  <line x1="95" y1="190" x2="105" y2="190" stroke="#34495e" stroke-width="1"/>
  <line x1="95" y1="160" x2="105" y2="160" stroke="#34495e" stroke-width="1"/>
  <line x1="95" y1="130" x2="105" y2="130" stroke="#34495e" stroke-width="1"/>
  <line x1="95" y1="100" x2="105" y2="100" stroke="#34495e" stroke-width="1"/>
  
  <!-- Подписи делений -->
  <text x="145" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">-2</text>
  <text x="195" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">-1</text>
  <text x="245" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">0</text>
  <text x="295" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1</text>
  <text x="345" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2</text>
  <text x="395" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">3</text>
  
  <text x="80" y="255" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1</text>
  <text x="80" y="225" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2</text>
  <text x="80" y="195" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#34495e">3</text>
  <text x="80" y="165" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#34495e">4</text>
  <text x="80" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#34495e">5</text>
  <text x="80" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#34495e">6</text>
  
  <!-- График функции f(x) = x³ - 3x² - 9x + 5 -->
  <path d="M 120,260 Q 150,250 180,240 T 220,220 Q 240,210 250,200 T 280,190 Q 300,195 320,210 T 360,240 Q 380,250 400,255" 
        fill="none" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- Точки экстремума -->
  <circle cx="220" cy="220" r="5" fill="#e74c3c"/>
  <circle cx="320" cy="210" r="5" fill="#e74c3c"/>
  
  <!-- Точки перегиба -->
  <circle cx="270" cy="195" r="4" fill="#f39c12"/>
  
  <!-- Производная -->
  <path d="M 120,265 Q 150,260 180,255 T 220,240 Q 240,230 250,220 T 280,210 Q 300,215 320,225 T 360,235 Q 380,240 400,245" 
        fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Подписи точек -->
  <text x="220" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">x₁ = -1</text>
  <text x="320" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">x₂ = 3</text>
  <text x="270" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">x₃ = 2</text>
  
  <!-- Легенда -->
  <rect x="320" y="90" width="160" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="330" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Легенда:</text>
  <line x1="330" y1="120" x2="360" y2="120" stroke="#e74c3c" stroke-width="3"/>
  <text x="365" y="125" font-family="Arial, sans-serif" font-size="11" fill="#34495e">f(x)</text>
  <line x1="330" y1="140" x2="360" y2="140" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="365" y="145" font-family="Arial, sans-serif" font-size="11" fill="#34495e">f'(x)</text>
  <circle cx="345" cy="155" r="3" fill="#f39c12"/>
  <text x="365" y="160" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Точка перегиба</text>
  
  <!-- Формула функции -->
  <rect x="30" y="90" width="160" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="40" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Исследуемая функция:</text>
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="14" fill="#34495e">f(x) = x³ - 3x² - 9x + 5</text>
  <text x="40" y="145" font-family="Arial, sans-serif" font-size="12" fill="#34495e">f'(x) = 3x² - 6x - 9</text>
  
  <!-- Шаги исследования -->
  <rect x="30" y="170" width="280" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="40" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Шаги исследования функции:</text>
  <text x="40" y="210" font-family="Arial, sans-serif" font-size="11" fill="#34495e">1. Находим критические точки: f'(x) = 0</text>
  <text x="40" y="225" font-family="Arial, sans-serif" font-size="11" fill="#34495e">2. Исследуем знак производной</text>
  <text x="40" y="240" font-family="Arial, sans-serif" font-size="11" fill="#34495e">3. Находим точки экстремума</text>
  <text x="40" y="255" font-family="Arial, sans-serif" font-size="11" fill="#34495e">4. Находим точки перегиба: f''(x) = 0</text>
  
  <!-- График второй производной -->
  <path d="M 120,240 Q 150,235 180,230 T 220,220 Q 240,215 250,210 T 280,205 Q 300,210 320,220 T 360,235 Q 380,240 400,245" 
        fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="2,2"/>
  
  <!-- Подпись второй производной -->
  <line x1="405" y1="245" x2="410" y2="240" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="415" y="245" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">f''(x)</text>
  
  <!-- Декоративные элементы -->
  <circle cx="470" cy="30" r="5" fill="#e74c3c"/>
  <circle cx="460" cy="30" r="5" fill="#3498db"/>
  <circle cx="450" cy="30" r="5" fill="#f39c12"/>
  <circle cx="440" cy="30" r="5" fill="#9b59b6"/>
  
  <!-- Указатели на максимумы и минимумы -->
  <text x="220" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Максимум</text>
  <text x="320" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">Минимум</text>
  
  <!-- Указатель на перегиб -->
  <text x="270" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">Перегиб</text>
</svg>