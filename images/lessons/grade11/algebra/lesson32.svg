<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495E" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">Урок 32: Геометрическая интерпретация комплексных чисел</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495E">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <text x="470" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D">№32</text>
  
  <!-- Комплексная плоскость -->
  <g transform="translate(250, 180)">
    <!-- Ось действительных чисел -->
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#3498DB" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="155" y="5" font-family="Arial, sans-serif" font-size="12" fill="#3498DB">Re</text>
    
    <!-- Ось мнимых чисел -->
    <line x1="0" y1="120" x2="0" y2="-120" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowhead2)"/>
    <text x="5" y="-115" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C">Im</text>
    
    <!-- Шкалы -->
    <g stroke="#95A5A6" stroke-width="1">
      <line x1="-100" y1="-5" x2="-100" y2="5"/>
      <line x1="-50" y1="-5" x2="-50" y2="5"/>
      <line x1="50" y1="-5" x2="50" y2="5"/>
      <line x1="100" y1="-5" x2="100" y2="5"/>
      
      <line x1="-5" y1="100" x2="5" y2="100"/>
      <line x1="-5" y1="50" x2="5" y2="50"/>
      <line x1="-5" y1="-50" x2="5" y2="-50"/>
      <line x1="-5" y1="-100" x2="5" y2="-100"/>
    </g>
    
    <!-- Подписи шкал -->
    <text x="-100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">-1</text>
    <text x="-50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">-0.5</text>
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">0.5</text>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">1</text>
    
    <text x="-15" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">-i</text>
    <text x="-15" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">-0.5i</text>
    <text x="-15" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">0.5i</text>
    <text x="-15" y="-95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">i</text>
    
    <!-- Комплексное число z = 0.8 + 0.6i -->
    <circle cx="80" cy="-60" r="3" fill="#9B59B6"/>
    <line x1="0" y1="0" x2="80" y2="-60" stroke="#9B59B6" stroke-width="2"/>
    
    <!-- Модуль -->
    <path d="M 0 0 L 80 0 L 80 -60" fill="none" stroke="#1ABC9C" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="40" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1ABC9C">Re(z) = 0.8</text>
    <text x="90" y="-65" font-family="Arial, sans-serif" font-size="11" fill="#1ABC9C">Im(z) = 0.6</text>
    
    <!-- Дуга аргумента -->
    <path d="M 0 0 L 60 0 A 60 60 0 0 1 36 -48" fill="none" stroke="#F39C12" stroke-width="1.5"/>
    <text x="35" y="-20" font-family="Arial, sans-serif" font-size="11" fill="#F39C12">φ = arctg(0.75)</text>
    
    <!-- Вектор -->
    <g>
      <line x1="0" y1="0" x2="80" y2="-60" stroke="#E74C3C" stroke-width="3"/>
      <polygon points="80,-60 72,-58 75,-67" fill="#E74C3C"/>
      <text x="85" y="-55" font-family="Arial, sans-serif" font-size="11" fill="#E74C3C">z = 0.8 + 0.6i</text>
    </g>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="400" height="70" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="5"/>
    
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Модуль комплексного числа:</text>
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">|z| = √(a² + b²)</text>
    
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Аргумент комплексного числа:</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">φ = arctg(b/a)</text>
  </g>
  
  <!-- Определения -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="140" height="80" fill="#E8F4FD" stroke="#3498DB" stroke-width="1" rx="3"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3498DB">Комплексная плоскость</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Плоскость с осями:</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">• Re - действительные числа</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">• Im - мнимые числа</text>
  </g>
  
  <g transform="translate(310, 70)">
    <rect x="0" y="0" width="140" height="80" fill="#FDE8E8" stroke="#E74C3C" stroke-width="1" rx="3"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E74C3C">Векторное представление</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Комплексное число z = a + bi</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">представляется вектором:</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">(a, b) на комплексной плоскости</text>
  </g>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498DB"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="3.5" refY="0" orient="auto">
      <polygon points="0 7, 3.5 0, 7 7" fill="#E74C3C"/>
    </marker>
    
    <!-- Градиент для фона -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E9ECEF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый градиент -->
  <rect width="500" height="350" fill="url(#bgGradient)" opacity="0.3"/>
</svg>