<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="axisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#424242;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#616161;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновая рамка -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#borderGradient)" stroke-width="3" />
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a237e">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#283593">Урок 31: Действия с комплексными числами</text>
  
  <!-- Номер урока -->
  <rect x="15" y="15" width="40" height="25" rx="5" fill="#3949ab" />
  <text x="35" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">31</text>
  
  <!-- Комплексная плоскость -->
  <g transform="translate(80, 200)">
    <!-- Ось Ox -->
    <line x1="-50" y1="0" x2="140" y2="0" stroke="url(#axisGradient)" stroke-width="2" />
    <polygon points="140,0 135,-3 135,3" fill="url(#axisGradient)" />
    <text x="145" y="5" font-family="Arial, sans-serif" font-size="14" fill="#424242">Re</text>
    
    <!-- Ось Oy -->
    <line x1="0" y1="-100" x2="0" y2="80" stroke="url(#axisGradient)" stroke-width="2" />
    <polygon points="0,-100 -3,-95 3,-95" fill="url(#axisGradient)" />
    <text x="5" y="-105" font-family="Arial, sans-serif" font-size="14" fill="#424242">Im</text>
    
    <!-- Комплексное число z1 -->
    <line x1="0" y1="0" x2="60" y2="-40" stroke="#e53935" stroke-width="2" />
    <circle cx="60" cy="-40" r="4" fill="#e53935" />
    <text x="65" y="-35" font-family="Arial, sans-serif" font-size="14" fill="#e53935">z₁</text>
    
    <!-- Комплексное число z2 -->
    <line x1="0" y1="0" x2="30" y2="-70" stroke="#43a047" stroke-width="2" stroke-dasharray="5,3" />
    <circle cx="30" cy="-70" r="4" fill="#43a047" />
    <text x="35" y="-65" font-family="Arial, sans-serif" font-size="14" fill="#43a047">z₂</text>
    
    <!-- Сложение -->
    <line x1="60" y1="-40" x2="90" y2="-110" stroke="#43a047" stroke-width="2" />
    <line x1="30" y1="-70" x2="90" y2="-110" stroke="#e53935" stroke-width="2" />
    <line x1="0" y1="0" x2="90" y2="-110" stroke="#5e35b1" stroke-width="2" />
    <circle cx="90" cy="-110" r="4" fill="#5e35b1" />
    <text x="95" y="-105" font-family="Arial, sans-serif" font-size="14" fill="#5e35b1">z₁+z₂</text>
    
    <!-- Сетка -->
    <g opacity="0.3">
      <line x1="-40" y1="-20" x2="120" y2="-20" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-40" y1="-40" x2="120" y2="-40" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-40" y1="-60" x2="120" y2="-60" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-40" y1="-80" x2="120" y2="-80" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-40" y1="20" x2="120" y2="20" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-40" y1="40" x2="120" y2="40" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-40" y1="60" x2="120" y2="60" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="-20" y1="-100" x2="-20" y2="80" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="20" y1="-100" x2="20" y2="80" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="40" y1="-100" x2="40" y2="80" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="60" y1="-100" x2="60" y2="80" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="80" y1="-100" x2="80" y2="80" stroke="#9e9e9e" stroke-width="0.5" />
      <line x1="100" y1="-100" x2="100" y2="80" stroke="#9e9e9e" stroke-width="0.5" />
    </g>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(280, 100)">
    <!-- Сложение -->
    <rect x="0" y="0" width="180" height="40" rx="5" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" />
    <text x="90" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1565c0">Сложение: z₁ + z₂</text>
    
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="14" fill="#424242">(a + bi) + (c + di) = (a + c) + (b + d)i</text>
    
    <!-- Вычитание -->
    <rect x="0" y="75" width="180" height="40" rx="5" fill="#e8f5e9" stroke="#388e3c" stroke-width="1" />
    <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2e7d32">Вычитание: z₁ - z₂</text>
    
    <text x="10" y="130" font-family="Arial, sans-serif" font-size="14" fill="#424242">(a + bi) - (c + di) = (a - c) + (b - d)i</text>
    
    <!-- Умножение -->
    <rect x="0" y="150" width="180" height="40" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="1" />
    <text x="90" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ef6c00">Умножение: z₁ · z₂</text>
    
    <text x="10" y="205" font-family="Arial, sans-serif" font-size="14" fill="#424242">(a + bi)(c + di) = (ac - bd) + (ad + bc)i</text>
    
    <!-- Деление -->
    <rect x="0" y="225" width="180" height="40" rx="5" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1" />
    <text x="90" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6a1b9a">Деление: z₁ ÷ z₂</text>
    
    <text x="10" y="280" font-family="Arial, sans-serif" font-size="14" fill="#424242">(a + bi)/(c + di) = [(ac + bd) + (bc - ad)i]/(c² + d²)</text>
  </g>
  
  <!-- Примеры -->
  <g transform="translate(30, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#616161">Пример:</text>
    <text x="50" y="0" font-family="Arial, sans-serif" font-size="12" fill="#424242">(2 + 3i) + (1 - 4i) = 3 - i</text>
    <text x="180" y="0" font-family="Arial, sans-serif" font-size="12" fill="#424242">(2 + 3i)(1 - 4i) = 14 - 5i</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="480" cy="30" r="15" fill="#e53935" opacity="0.3" />
  <circle cx="470" cy="40" r="10" fill="#43a047" opacity="0.3" />
  <circle cx="490" cy="45" r="8" fill="#5e35b1" opacity="0.3" />
  
  <!-- Указатели -->
  <g transform="translate(80, 200)">
    <path d="M 60,-40 L 65,-45 L 65,-35 Z" fill="#e53935" />
    <path d="M 30,-70 L 35,-75 L 35,-65 Z" fill="#43a047" />
  </g>
</svg>