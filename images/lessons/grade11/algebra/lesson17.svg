<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Вычисление площадей плоских фигур</text>

  <!-- Left card: Area between two curves -->
  <rect x="15" y="52" width="225" height="155" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="127" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Площадь между двумя кривыми</text>

  <!-- Axes -->
  <line x1="35" y1="175" x2="225" y2="175" stroke="#455A64" stroke-width="1"/>
  <line x1="35" y1="78" x2="35" y2="180" stroke="#455A64" stroke-width="1"/>

  <!-- Upper curve (y = g(x) = 4) - horizontal line -->
  <line x1="50" y1="95" x2="210" y2="95" stroke="#2E7D32" stroke-width="2"/>
  <text x="215" y="93" fill="#2E7D32" font-size="7" font-weight="bold">y = g(x)</text>

  <!-- Lower curve (y = f(x) = x^2) - parabola -->
  <path d="M 50,175 C 70,170 90,155 110,135 C 130,115 150,100 170,95 C 190,90 205,88 210,87" fill="none" stroke="#E53935" stroke-width="2"/>
  <text x="215" y="87" fill="#E53935" font-size="7" font-weight="bold">y = f(x)</text>

  <!-- Shaded area between curves -->
  <path d="M 50,175 C 70,170 90,155 110,135 C 130,115 150,100 170,95 C 190,90 205,88 210,87 L 210,95 L 50,95 Z" fill="#1565C0" opacity="0.2"/>

  <!-- Vertical boundary lines -->
  <line x1="50" y1="95" x2="50" y2="175" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="87" x2="210" y2="175" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="50" y="184" fill="#455A64" font-size="7">a</text>
  <text x="208" y="184" fill="#455A64" font-size="7">b</text>

  <!-- Formula pill -->
  <rect x="25" y="190" width="205" height="14" rx="6" fill="#E3F2FD"/>
  <text x="127" y="201" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">S = int[a,b] (g(x) - f(x)) dx</text>

  <!-- Right card: Subtraction method -->
  <rect x="250" y="52" width="235" height="155" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="367" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Метод вычитания площадей</text>

  <!-- Diagram: two areas -->
  <rect x="270" y="82" width="85" height="55" rx="6" fill="#E3F2FD"/>
  <text x="312" y="105" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">S1</text>
  <text x="312" y="118" text-anchor="middle" fill="#0D47A1" font-size="7">int g(x) dx</text>

  <!-- Minus sign -->
  <text x="365" y="112" text-anchor="middle" fill="#E53935" font-size="18" font-weight="bold">-</text>

  <rect x="380" y="82" width="85" height="55" rx="6" fill="#FFF3E0"/>
  <text x="422" y="105" text-anchor="middle" fill="#E65100" font-size="9" font-weight="bold">S2</text>
  <text x="422" y="118" text-anchor="middle" fill="#E65100" font-size="7">int f(x) dx</text>

  <!-- Equals -->
  <text x="367" y="152" text-anchor="middle" fill="#0D47A1" font-size="14" font-weight="bold">=</text>

  <rect x="300" y="142" width="140" height="22" rx="6" fill="#E8F5E9"/>
  <text x="370" y="157" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">S = int (g-f) dx</text>

  <!-- Arrow connecting -->
  <line x1="312" y1="137" x2="350" y2="145" stroke="#0D47A1" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="422" y1="137" x2="390" y2="145" stroke="#E65100" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Warning pill -->
  <rect x="260" y="172" width="215" height="14" rx="6" fill="#FFF3E0"/>
  <text x="367" y="183" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">Площадь всегда положительна: S = int |g-f| dx</text>

  <!-- Bottom card: Algorithm -->
  <rect x="15" y="215" width="470" height="105" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="233" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Алгоритм вычисления площади</text>

  <!-- Step pills -->
  <rect x="25" y="240" width="90" height="20" rx="8" fill="#0D47A1"/>
  <text x="70" y="254" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1. Графики</text>

  <rect x="120" y="240" width="90" height="20" rx="8" fill="#1565C0"/>
  <text x="165" y="254" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2. Точки перес.</text>

  <rect x="215" y="240" width="90" height="20" rx="8" fill="#1976D2"/>
  <text x="260" y="254" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3. Верх/Ниж</text>

  <rect x="310" y="240" width="80" height="20" rx="8" fill="#42A5F5"/>
  <text x="350" y="254" text-anchor="middle" fill="white" font-size="7" font-weight="bold">4. Интеграл</text>

  <rect x="395" y="240" width="80" height="20" rx="8" fill="#64B5F6"/>
  <text x="435" y="254" text-anchor="middle" fill="white" font-size="7" font-weight="bold">5. Ответ</text>

  <!-- Connecting arrows -->
  <line x1="115" y1="250" x2="120" y2="250" stroke="#0D47A1" stroke-width="1.5"/>
  <line x1="210" y1="250" x2="215" y2="250" stroke="#0D47A1" stroke-width="1.5"/>
  <line x1="305" y1="250" x2="310" y2="250" stroke="#0D47A1" stroke-width="1.5"/>
  <line x1="390" y1="250" x2="395" y2="250" stroke="#0D47A1" stroke-width="1.5"/>

  <!-- Key formulas -->
  <rect x="25" y="268" width="220" height="16" rx="5" fill="#E8F5E9"/>
  <text x="135" y="280" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">f(x) &gt;= 0: S = int[a,b] f(x) dx</text>

  <rect x="255" y="268" width="220" height="16" rx="5" fill="#E3F2FD"/>
  <text x="365" y="280" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">f(x) &lt;= 0: S = -int[a,b] f(x) dx</text>

  <rect x="25" y="290" width="450" height="16" rx="5" fill="#F3E5F5"/>
  <text x="250" y="302" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">Общая формула: S = int[a,b] |f(x) - g(x)| dx</text>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Площадь фигуры = интеграл от модуля разности функций</text>
</svg>