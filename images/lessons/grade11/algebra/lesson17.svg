<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефиниции градиентов -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:00d2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fad0c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a1c4fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2e9fb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#3a7bd5" stroke-width="2" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#00d2ff" stroke-width="1" rx="8"/>
  
  <!-- Надписи в углах -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#3a7bd5" font-weight="bold">Урок 17</text>
  <text x="380" y="30" font-family="Arial, sans-serif" font-size="14" fill="#3a7bd5" font-weight="bold">Алгебра · 11 класс</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="22" fill="#333" font-weight="bold" text-anchor="middle">Определённый интеграл</text>
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">Формула Ньютона-Лейбница</text>
  
  <!-- Система координат -->
  <line x1="80" y1="250" x2="220" y2="250" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="250" x2="80" y2="120" stroke="#333" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="220,250 215,247 215,253" fill="#333"/>
  <polygon points="80,120 77,125 83,125" fill="#333"/>
  
  <!-- Подписи осей -->
  <text x="225" y="255" font-family="Arial, sans-serif" font-size="14" fill="#333">x</text>
  <text x="70" y="115" font-family="Arial, sans-serif" font-size="14" fill="#333">y</text>
  <text x="65" y="265" font-family="Arial, sans-serif" font-size="12" fill="#666">0</text>
  
  <!-- График функции f(x) -->
  <path d="M 80,220 Q 120,180 150,200 T 200,160 Q 220,140 220,120" 
        fill="none" stroke="#3a7bd5" stroke-width="3"/>
  
  <!-- Заливка под кривой -->
  <path d="M 80,250 L 80,220 Q 120,180 150,200 T 200,160 Q 220,140 220,120 L 220,250 Z" 
        fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Точки a и b -->
  <circle cx="100" cy="250" r="4" fill="#ff4757"/>
  <circle cx="200" cy="250" r="4" fill="#ff4757"/>
  
  <!-- Подписи точек a и b -->
  <text x="100" y="270" font-family="Arial, sans-serif" font-size="12" fill="#ff4757" text-anchor="middle">a</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="12" fill="#ff4757" text-anchor="middle">b</text>
  
  <!-- Вертикальные линии в точках a и b -->
  <line x1="100" y1="250" x2="100" y2="195" stroke="#ff4757" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="250" x2="200" y2="160" stroke="#ff4757" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Формула интеграла -->
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="18" fill="#333">
    <tspan font-style="italic">∫</tspan><tspan font-size="16" dy="5" dx="-5">b</tspan>
    <tspan font-style="italic" dy="-5" dx="5">a</tspan>
    <tspan font-style="italic" dx="5">f(x)dx = F(b) - F(a)</tspan>
  </text>
  
  <!-- Обозначения для площади -->
  <text x="150" y="200" font-family="Arial, sans-serif" font-size="14" fill="#3a7bd5" text-anchor="middle">S</text>
  
  <!-- Свойства интеграла -->
  <rect x="250" y="160" width="220" height="150" fill="url(#grad2)" rx="5" opacity="0.2"/>
  <text x="360" y="180" font-family="Arial, sans-serif" font-size="14" fill="#333" font-weight="bold">Свойства:</text>
  
  <text x="260" y="200" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan>1. ∫[a,b] c·dx = c·(b-a)</tspan>
  </text>
  
  <text x="260" y="220" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan>2. ∫[a,b] (f+g)dx = ∫f dx + ∫g dx</tspan>
  </text>
  
  <text x="260" y="240" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan>3. ∫[a,b] kf dx = k∫[a,b] f dx</tspan>
  </text>
  
  <text x="260" y="260" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan>4. ∫[a,b] f dx = -∫[b,a] f dx</tspan>
  </text>
  
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="12" fill="#333">
    <tspan>5. ∫[a,c] f dx = ∫[a,b] f dx + ∫[b,c] f dx</tspan>
  </text>
  
  <!-- Пример вычисления -->
  <rect x="30" y="290" width="200" height="40" fill="url(#grad3)" rx="5" opacity="0.3"/>
  <text x="130" y="315" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">
    <tspan font-style="italic">∫</tspan><tspan font-size="10" dy="3" dx="-3">2</tspan>
    <tspan font-style="italic" dy="-3" dx="3">1</tspan>
    <tspan font-style="italic" dx="3">x² dx = </tspan>
    <tspan font-style="italic">x³/3|</tspan><tspan font-size="10" dy="3" dx="-3">2</tspan>
    <tspan font-style="italic" dy="-3" dx="3">1</tspan>
    <tspan dx="3">= 8/3 - 1/3 = 7/3</tspan>
  </text>
  
  <!-- Дополнительные обозначения -->
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="12" fill="#666">F(x) — первообразная</text>
  <text x="30" y="125" font-family="Arial, sans-serif" font-size="12" fill="#666">f(x) — подынтегральная функция</text>
  
  <!-- Декоративные элементы -->
  <circle cx="40" cy="30" r="3" fill="#3a7bd5" opacity="0.5"/>
  <circle cx="460" cy="30" r="3" fill="#00d2ff" opacity="0.5"/>
  <circle cx="40" cy="320" r="3" fill="#ff4757" opacity="0.5"/>
  <circle cx="460" cy="320" r="3" fill="#ff9a9e" opacity="0.5"/>
  
  <!-- Подпись к площади -->
  <text x="250" y="200" font-family="Arial, sans-serif" font-size="14" fill="#3a7bd5" text-anchor="middle">
    <tspan font-style="italic">S = ∫</tspan><tspan font-size="16" dy="5" dx="-5">b</tspan>
    <tspan font-style="italic" dy="-5" dx="5">a</tspan>
    <tspan font-style="italic" dx="5">f(x)dx</tspan>
  </text>
</svg>