<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Производная сложной функции. Тригонометрия</text>
  <!-- Chain rule flow diagram -->
  <rect x="15" y="52" width="470" height="80" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="70" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">Правило цепочки</text>
  <!-- Flow: y = f(g(x)) -->
  <rect x="30" y="80" width="80" height="36" rx="8" fill="#1976D2"/>
  <text x="70" y="103" text-anchor="middle" fill="white" font-size="11" font-weight="bold">y = f(u)</text>
  <!-- Arrow -->
  <line x1="115" y1="98" x2="145" y2="98" stroke="#0D47A1" stroke-width="2"/>
  <polygon points="145,93 155,98 145,103" fill="#0D47A1"/>
  <!-- Multiply sign -->
  <text x="170" y="103" text-anchor="middle" fill="#E65100" font-size="16" font-weight="bold">×</text>
  <!-- Arrow -->
  <line x1="185" y1="98" x2="215" y2="98" stroke="#0D47A1" stroke-width="2"/>
  <polygon points="215,93 225,98 215,103" fill="#0D47A1"/>
  <rect x="230" y="80" width="80" height="36" rx="8" fill="#42A5F5"/>
  <text x="270" y="103" text-anchor="middle" fill="white" font-size="11" font-weight="bold">u = g(x)</text>
  <!-- Equals -->
  <text x="335" y="103" text-anchor="middle" fill="#0D47A1" font-size="14" font-weight="bold">=</text>
  <!-- Result -->
  <rect x="350" y="80" width="120" height="36" rx="8" fill="#0D47A1"/>
  <text x="410" y="98" text-anchor="middle" fill="white" font-size="10" font-weight="bold">f'(g(x))·g'(x)</text>
  <text x="410" y="112" text-anchor="middle" fill="#90CAF9" font-size="8">производная сложной</text>
  <!-- Trig derivatives cards -->
  <!-- sin -->
  <rect x="15" y="142" width="110" height="55" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="70" y="162" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">(sin x)'</text>
  <text x="70" y="180" text-anchor="middle" fill="#1565C0" font-size="13" font-weight="bold">= cos x</text>
  <!-- Mini sin graph -->
  <path d="M 40 190 Q 55 178, 70 190 Q 85 202, 100 190" fill="none" stroke="#42A5F5" stroke-width="1"/>
  <!-- cos -->
  <rect x="135" y="142" width="110" height="55" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="190" y="162" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">(cos x)'</text>
  <text x="190" y="180" text-anchor="middle" fill="#E65100" font-size="13" font-weight="bold">= −sin x</text>
  <!-- Mini cos graph -->
  <path d="M 160 185 Q 175 173, 190 185 Q 205 197, 220 185" fill="none" stroke="#42A5F5" stroke-width="1"/>
  <!-- tg -->
  <rect x="255" y="142" width="110" height="55" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="310" y="162" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">(tg x)'</text>
  <text x="310" y="178" text-anchor="middle" fill="#1565C0" font-size="11" font-weight="bold">= 1/cos²x</text>
  <text x="310" y="192" text-anchor="middle" fill="#42A5F5" font-size="9">= 1 + tg²x</text>
  <!-- ctg -->
  <rect x="375" y="142" width="110" height="55" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="430" y="162" text-anchor="middle" fill="#0D47A1" font-size="12" font-weight="bold">(ctg x)'</text>
  <text x="430" y="178" text-anchor="middle" fill="#E65100" font-size="11" font-weight="bold">= −1/sin²x</text>
  <text x="430" y="192" text-anchor="middle" fill="#42A5F5" font-size="9">= −(1+ctg²x)</text>
  <!-- Complex argument examples -->
  <rect x="15" y="208" width="470" height="55" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="226" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Сложный аргумент (правило цепочки)</text>
  <text x="130" y="246" text-anchor="middle" fill="#1565C0" font-size="10">(sin u)' = cos u · u'</text>
  <text x="310" y="246" text-anchor="middle" fill="#1565C0" font-size="10">(cos u)' = −sin u · u'</text>
  <text x="130" y="258" text-anchor="middle" fill="#1565C0" font-size="10">(tg u)' = u'/cos²u</text>
  <text x="310" y="258" text-anchor="middle" fill="#1565C0" font-size="10">(ctg u)' = −u'/sin²u</text>
  <!-- Example pills -->
  <rect x="20" y="274" width="220" height="24" rx="12" fill="#1976D2"/>
  <text x="130" y="290" text-anchor="middle" fill="white" font-size="10" font-weight="bold">(sin 2x)' = 2cos 2x</text>
  <rect x="260" y="274" width="220" height="24" rx="12" fill="#42A5F5"/>
  <text x="370" y="290" text-anchor="middle" fill="white" font-size="10" font-weight="bold">(cos²x)' = −sin 2x</text>
  <!-- Warning pill -->
  <rect x="100" y="306" width="300" height="20" rx="10" fill="#E65100"/>
  <text x="250" y="320" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Не забывайте умножать на производную внутренней!</text>
  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">[f(g(x))]' = f'(g(x)) · g'(x)</text>
</svg>