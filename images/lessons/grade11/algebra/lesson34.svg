<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#e74c3c">Урок 34: Иррациональные уравнения и неравенства</text>
  
  <!-- Номер урока в углу -->
  <text x="25" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">№34</text>
  
  <!-- Система координат -->
  <line x1="50" y1="300" x2="450" y2="300" stroke="#34495e" stroke-width="2"/>
  <line x1="50" y1="300" x2="50" y2="80" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="450,300 440,295 440,305" fill="#34495e"/>
  <polygon points="50,80 45,90 55,90" fill="#34495e"/>
  
  <!-- Подписи осей -->
  <text x="460" y="305" font-family="Arial, sans-serif" font-size="12" fill="#34495e">x</text>
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="12" fill="#34495e">y</text>
  
  <!-- Шкалы осей -->
  <line x1="150" y1="295" x2="150" y2="305" stroke="#34495e" stroke-width="1"/>
  <line x1="250" y1="295" x2="250" y2="305" stroke="#34495e" stroke-width="1"/>
  <line x1="350" y1="295" x2="350" y2="305" stroke="#34495e" stroke-width="1"/>
  
  <line x1="45" y1="200" x2="55" y2="200" stroke="#34495e" stroke-width="1"/>
  <line x1="45" y1="150" x2="55" y2="150" stroke="#34495e" stroke-width="1"/>
  <line x1="45" y1="100" x2="55" y2="100" stroke="#34495e" stroke-width="1"/>
  
  <!-- Подписи шкал -->
  <text x="145" y="320" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">2</text>
  <text x="245" y="320" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">4</text>
  <text x="345" y="320" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">6</text>
  
  <text x="35" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">1</text>
  <text x="35" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">2</text>
  <text x="35" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">3</text>
  
  <!-- График функции y = √x -->
  <path d="M 50,300 Q 100,250 150,200 T 250,150 T 350,100 T 450,50" fill="none" stroke="#e74c3c" stroke-width="2"/>
  
  <!-- График функции y = x - 2 -->
  <line x1="50" y1="280" x2="450" y2="120" stroke="#3498db" stroke-width="2"/>
  
  <!-- Точка пересечения -->
  <circle cx="290" cy="130" r="4" fill="#27ae60"/>
  <text x="290" y="120" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">M(4.5, 2.5)</text>
  
  <!-- Подпись графика y = √x -->
  <text x="420" y="60" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">y = √x</text>
  
  <!-- Подпись графика y = x - 2 -->
  <text x="380" y="110" font-family="Arial, sans-serif" font-size="12" fill="#3498db">y = x - 2</text>
  
  <!-- ОДЗ -->
  <rect x="60" y="80" width="140" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="130" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#34495e">ОДЗ</text>
  <text x="130" y="120" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">x ≥ 0</text>
  
  <!-- Решение уравнения -->
  <rect x="220" y="80" width="160" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="300" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#34495e">Решение:</text>
  <text x="230" y="120" font-family="Arial, sans-serif" font-size="10" fill="#34495e">√x = x - 2</text>
  <text x="230" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e">x = (x - 2)²</text>
  <text x="230" y="150" font-family="Arial, sans-serif" font-size="10" fill="#34495e">x = x² - 4x + 4</text>
  
  <!-- Проверка -->
  <rect x="60" y="150" width="140" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="130" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#34495e">Проверка:</text>
  <text x="130" y="190" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">x₁ = 1 (не подходит)</text>
  <text x="130" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">x₂ = 4 (подходит)</text>
  
  <!-- Методы решения -->
  <rect x="220" y="180" width="160" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#34495e">Методы решения:</text>
  <text x="230" y="220" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1. Возведение в квадрат</text>
  <text x="230" y="235" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2. Замена переменной</text>
  <text x="230" y="250" font-family="Arial, sans-serif" font-size="10" fill="#34495e">3. Графический метод</text>
  
  <!-- Пример неравенства -->
  <rect x="60" y="220" width="320" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="220" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#34495e">Пример иррационального неравенства:</text>
  <text x="220" y="260" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">√(x - 3) < x - 1</text>
  <text x="220" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">ОДЗ: x - 3 ≥ 0 ⇒ x ≥ 3</text>
  
  <!-- Важные замечания -->
  <text x="60" y="310" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">Важно:</text>
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Всегда проверяйте ОДЗ и найденные корни!</text>
  
  <!-- Декоративные элементы -->
  <circle cx="470" cy="30" r="3" fill="#e74c3c"/>
  <circle cx="480" cy="25" r="3" fill="#3498db"/>
  <circle cx="475" cy="40" r="3" fill="#27ae60"/>
  
  <!-- Формула для возведения в квадрат -->
  <rect x="400" y="200" width="80" height="40" fill="#f39c12" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="440" y="225" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">a² = b</text>
</svg>