<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Номер урока в углу -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Урок 36</text>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">Системы уравнений с двумя переменными</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498db">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Система уравнений в центре -->
  <rect x="170" y="70" width="160" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="250" y="95" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">{ 2x + y = 5 </text>
  <text x="250" y="115" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">{ x - y = 1 </text>
  <text x="250" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f8c8d">Решаем тремя способами</text>
  
  <!-- Метод подстановки -->
  <g>
    <rect x="20" y="170" width="140" height="120" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5" rx="5"/>
    <text x="90" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2e7d32">Метод подстановки</text>
    <text x="30" y="210" font-family="Arial, sans-serif" font-size="12" fill="#1b5e20">1. Выражаем y из 2-го урав:</text>
    <text x="40" y="230" font-family="Arial, sans-serif" font-size="12" fill="#1b5e20">y = x - 1</text>
    <text x="30" y="250" font-family="Arial, sans-serif" font-size="12" fill="#1b5e20">2. Подставляем в 1-е урав:</text>
    <text x="40" y="270" font-family="Arial, sans-serif" font-size="12" fill="#1b5e20">2x + (x - 1) = 5</text>
  </g>
  
  <!-- Метод сложения -->
  <g>
    <rect x="180" y="170" width="140" height="120" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5" rx="5"/>
    <text x="250" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">Метод сложения</text>
    <text x="190" y="210" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">1. Складываем уравнения:</text>
    <text x="200" y="230" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">(2x + y) + (x - y) = 5 + 1</text>
    <text x="200" y="250" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">2. Решаем полученное урав:</text>
    <text x="210" y="270" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">3x = 6 ⇒ x = 2</text>
  </g>
  
  <!-- Метод графический -->
  <g>
    <rect x="340" y="170" width="140" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" rx="5"/>
    <text x="410" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e65100">Графический метод</text>
    <text x="350" y="210" font-family="Arial, sans-serif" font-size="12" fill="#e65100">1. Приводим к виду y = kx + b:</text>
    <text x="360" y="230" font-family="Arial, sans-serif" font-size="12" fill="#e65100">y = -2x + 5</text>
    <text x="360" y="250" font-family="Arial, sans-serif" font-size="12" fill="#e65100">y = x - 1</text>
    <text x="350" y="270" font-family="Arial, sans-serif" font-size="12" fill="#e65100">2. Строим графики</text>
  </g>
  
  <!-- График функции -->
  <g>
    <rect x="100" y="305" width="300" height="35" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" rx="3"/>
    <text x="250" y="325" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#424242">Решение: x = 2, y = 1</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="40" cy="40" r="3" fill="#3498db"/>
  <circle cx="460" cy="40" r="3" fill="#3498db"/>
  <circle cx="40" cy="310" r="3" fill="#3498db"/>
  <circle cx="460" cy="310" r="3" fill="#3498db"/>
  
  <!-- Стрелки от методов к решению -->
  <path d="M 90 290 L 90 300 L 200 300" fill="none" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <path d="M 250 290 L 250 300 L 250 300" fill="none" stroke="#2196f3" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M 410 290 L 410 300 L 300 300" fill="none" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  
  <!-- Определители -->
  <g>
    <rect x="20" y="60" width="80" height="25" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
    <text x="60" y="77" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2e7d32">D ≠ 0</text>
  </g>
  <g>
    <rect x="400" y="60" width="80" height="25" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
    <text x="440" y="77" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2e7d32">Одно решение</text>
  </g>
  
  <!-- Графическое представление системы -->
  <g transform="translate(250, 250)">
    <!-- Ось X -->
    <line x1="-50" y1="0" x2="50" y2="0" stroke="#757575" stroke-width="1"/>
    <polygon points="50,0 45,-3 45,3" fill="#757575"/>
    <text x="55" y="5" font-family="Arial, sans-serif" font-size="10" fill="#757575">x</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#757575" stroke-width="1"/>
    <polygon points="0,-30 -3,-25 3,-25" fill="#757575"/>
    <text x="5" y="-25" font-family="Arial, sans-serif" font-size="10" fill="#757575">y</text>
    
    <!-- Точка пересечения -->
    <circle cx="20" cy="-10" r="3" fill="#f44336"/>
    <text x="25" y="-5" font-family="Arial, sans-serif" font-size="10" fill="#f44336">(2,1)</text>
  </g>
  
  <!-- Градиенты для выделения -->
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:0.1"/>
    </linearGradient>
    
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2196f3"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
  </defs>
  
  <!-- Фоновые декоративные элементы -->
  <path d="M 30 100 Q 40 90, 50 100 T 70 100" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <path d="M 430 100 Q 440 90, 450 100 T 470 100" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  
  <!-- Дополнительные метки -->
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4caf50">y = x - 1</text>
  <text x="250" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2196f3">Сложение</text>
  <text x="410" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ff9800">График</text>
  
  <!-- Подчеркивания -->
  <line x1="30" y1="285" x2="150" y2="285" stroke="#4caf50" stroke-width="1" opacity="0.5"/>
  <line x1="190" y1="285" x2="310" y2="285" stroke="#2196f3" stroke-width="1" opacity="0.5"/>
  <line x1="350" y1="285" x2="470" y2="285" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  
  <!-- Плюсы для метода сложения -->
  <circle cx="220" cy="225" r="8" fill="#e3f2fd"/>
  <text x="220" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1565c0">+</text>
  <circle cx="280" cy="225" r="8" fill="#e3f2fd"/>
  <text x="280" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1565c0">+</text>
  
  <!-- Знаки равенства -->
  <text x="70" y="225" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1b5e20">=</text>
  <text x="120" y="225" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1b5e20">=</text>
  
  <!-- Сетка для графика -->
  <g opacity="0.2">
    <line x1="200" y1="220" x2="300" y2="220" stroke="#757575" stroke-width="0.5"/>
    <line x1="200" y1="240" x2="300" y2="240" stroke="#757575" stroke-width="0.5"/>
    <line x1="200" y1="260" x2="300" y2="260" stroke="#757575" stroke-width="0.5"/>
    <line x1="220" y1="220" x2="220" y2="280" stroke="#757575" stroke-width="0.5"/>
    <line x1="240" y1="220" x2="240" y2="280" stroke="#757575" stroke-width="0.5"/>
    <line x1="260" y1="220" x2="260" y2="280" stroke="#757575" stroke-width="0.5"/>
    <line x1="280" y1="220" x2="280" y2="280" stroke="#757575" stroke-width="0.5"/>
  </g>
</svg>