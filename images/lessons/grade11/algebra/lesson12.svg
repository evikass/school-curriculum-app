<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Наибольшее и наименьшее значения на отрезке</text>

  <!-- Left card: Graph with [a,b] and values -->
  <rect x="15" y="52" width="240" height="170" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="135" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">f(x) на отрезке [a; b]</text>

  <!-- Axes -->
  <line x1="40" y1="190" x2="240" y2="190" stroke="#455A64" stroke-width="1.2"/>
  <line x1="40" y1="75" x2="40" y2="205" stroke="#455A64" stroke-width="1.2"/>

  <!-- [a,b] segment highlight -->
  <rect x="65" y="78" width="155" height="115" rx="0" fill="#E3F2FD" opacity="0.4"/>

  <!-- Curve -->
  <path d="M 45,160 C 55,140 65,90 85,80 C 105,70 110,110 130,130 C 150,150 155,170 175,175 C 195,180 205,95 225,85 L 240,100" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Endpoints a and b -->
  <circle cx="65" cy="95" r="4" fill="#0D47A1"/>
  <circle cx="220" cy="85" r="4" fill="#0D47A1"/>
  <text x="60" y="207" fill="#0D47A1" font-size="9" font-weight="bold">a</text>
  <text x="215" y="207" fill="#0D47A1" font-size="9" font-weight="bold">b</text>

  <!-- f(a) value -->
  <line x1="40" y1="95" x2="65" y2="95" stroke="#0D47A1" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="43" y="92" fill="#0D47A1" font-size="7">f(a)</text>

  <!-- Critical point x1 - min -->
  <circle cx="130" cy="130" r="4" fill="#2E7D32"/>
  <line x1="130" y1="130" x2="130" y2="190" stroke="#2E7D32" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="122" y="207" fill="#2E7D32" font-size="8">x1</text>
  <text x="130" y="145" fill="#2E7D32" font-size="8">min</text>

  <!-- Critical point x2 - local max -->
  <circle cx="85" cy="80" r="4" fill="#E53935"/>

  <!-- f(b) value -->
  <line x1="40" y1="85" x2="220" y2="85" stroke="#E53935" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="43" y="82" fill="#E53935" font-size="7">f(b)</text>

  <!-- Max/min labels -->
  <rect x="170" y="88" width="65" height="18" rx="8" fill="#FFEBEE"/>
  <text x="202" y="101" text-anchor="middle" fill="#C62828" font-size="8" font-weight="bold">наиб. = f(b)</text>
  <rect x="95" y="148" width="65" height="18" rx="8" fill="#E8F5E9"/>
  <text x="127" y="161" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">наим. = f(x1)</text>

  <!-- Right card: Algorithm -->
  <rect x="265" y="52" width="220" height="170" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="375" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Алгоритм</text>

  <!-- Steps -->
  <rect x="280" y="78" width="190" height="20" rx="6" fill="#E3F2FD"/>
  <text x="285" y="92" fill="#0D47A1" font-size="9">1. Найти f'(x)</text>

  <rect x="280" y="102" width="190" height="20" rx="6" fill="#E3F2FD"/>
  <text x="285" y="116" fill="#0D47A1" font-size="9">2. f'(x)=0 - критич. точки</text>

  <rect x="280" y="126" width="190" height="20" rx="6" fill="#E3F2FD"/>
  <text x="285" y="140" fill="#0D47A1" font-size="9">3. Отобрать точки внутри [a;b]</text>

  <rect x="280" y="150" width="190" height="20" rx="6" fill="#FFF3E0"/>
  <text x="285" y="164" fill="#E65100" font-size="9">4. f(a), f(b), f(критич.точки)</text>

  <rect x="280" y="174" width="190" height="20" rx="6" fill="#E8F5E9"/>
  <text x="285" y="188" fill="#2E7D32" font-size="9" font-weight="bold">5. Выбрать наиб. и наим.</text>

  <!-- Bottom card: Weierstrass + comparison -->
  <rect x="15" y="230" width="470" height="90" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="250" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Теорема Вейерштрасса</text>

  <rect x="30" y="258" width="440" height="24" rx="6" fill="#E3F2FD"/>
  <text x="250" y="275" text-anchor="middle" fill="#0D47A1" font-size="10">Непрерывная на [a;b] функция принимает наиб. и наим. значения</text>

  <!-- Comparison table pills -->
  <rect x="35" y="288" width="130" height="22" rx="10" fill="#BBDEFB"/>
  <text x="100" y="303" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">Значения на концах</text>
  <rect x="175" y="288" width="150" height="22" rx="10" fill="#C8E6C9"/>
  <text x="250" y="303" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">Значения в критич. точках</text>
  <rect x="335" y="288" width="130" height="22" rx="10" fill="#FFF9C4"/>
  <text x="400" y="303" text-anchor="middle" fill="#F57F17" font-size="8" font-weight="bold">Сравнить и выбрать</text>

  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Наиб. и наим. значения: на концах или в критических точках</text>
</svg>