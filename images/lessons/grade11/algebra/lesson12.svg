<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#1e40af" stroke-width="3" rx="10" ry="10"/>
  <rect x="10" y="10" width="480" height="330" fill="url(#grad1)" rx="8" ry="8"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">Урок 12: Возрастание и убывание функции. Экстремумы</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3730a3">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <circle cx="460" cy="30" r="18" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="460" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">12</text>
  
  <!-- Система координат -->
  <line x1="80" y1="250" x2="420" y2="250" stroke="#1e40af" stroke-width="2"/>
  <line x1="250" y1="80" x2="250" y2="280" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="420,250 410,245 410,255" fill="#1e40af"/>
  <polygon points="250,80 245,90 255,90" fill="#1e40af"/>
  
  <!-- Подписи осей -->
  <text x="430" y="255" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">x</text>
  <text x="255" y="75" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">y</text>
  
  <!-- Подписи координат -->
  <text x="245" y="265" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#64748b">0</text>
  <text x="340" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">2</text>
  <text x="390" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">4</text>
  <text x="160" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">-2</text>
  
  <!-- График функции -->
  <path d="M 120,200 Q 160,180 200,160 T 250,120 Q 280,140 310,180 T 370,220" fill="none" stroke="url(#grad2)" stroke-width="3"/>
  
  <!-- Критические точки -->
  <circle cx="200" cy="160" r="6" fill="#dc2626" stroke="white" stroke-width="2"/>
  <circle cx="310" cy="180" r="6" fill="#dc2626" stroke="white" stroke-width="2"/>
  <circle cx="250" cy="120" r="6" fill="#16a34a" stroke="white" stroke-width="2"/>
  
  <!-- Подписи точек -->
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">x₁</text>
  <text x="310" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">x₂</text>
  <text x="250" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">x₃</text>
  
  <!-- Области возрастания/убывания -->
  <path d="M 120,240 Q 160,220 200,200 T 250,160" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2"/>
  <path d="M 250,160 Q 280,180 310,200 T 370,240" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Формулы -->
  <rect x="30" y="280" width="140" height="25" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="3" ry="3"/>
  <text x="100" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155">f'(x) &gt; 0 - возрастает</text>
  
  <rect x="330" y="280" width="140" height="25" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="3" ry="3"/>
  <text x="400" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155">f'(x) &lt; 0 - убывает</text>
  
  <!-- Таблица критических точек -->
  <rect x="60" y="90" width="180" height="80" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="5" ry="5"/>
  <text x="150" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Критические точки</text>
  
  <text x="70" y="130" font-family="Arial, sans-serif" font-size="10" fill="#334155">• x₁ = точка минимума</text>
  <text x="70" y="145" font-family="Arial, sans-serif" font-size="10" fill="#334155">• x₂ = точка максимума</text>
  <text x="70" y="160" font-family="Arial, sans-serif" font-size="10" fill="#334155">• x₃ = точка перегиба</text>
  
  <!-- Производная графика -->
  <path d="M 120,230 Q 160,210 200,190 T 250,170 Q 280,190 310,210 T 370,230" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Подпись производной -->
  <text x="380" y="235" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed">f'(x)</text>
  
  <!-- Стрелки указания производной -->
  <path d="M 180,200 L 190,195" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowgreen)"/>
  <path d="M 270,180 L 280,185" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowred)"/>
  
  <!-- Стрелки для маркеров -->
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  
  <!-- Указания на графиках -->
  <text x="150" y="215" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">f'(x) &gt; 0</text>
  <text x="290" y="195" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">f'(x) &lt; 0</text>
  
  <!-- Экстремумы -->
  <rect x="300" y="90" width="180" height="80" fill="#f0fdf4" stroke="#86efac" stroke-width="1" rx="5" ry="5"/>
  <text x="390" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Экстремумы функции</text>
  
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="10" fill="#166534">• Минимум: f(x₁)</text>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="10" fill="#166534">• Максимум: f(x₂)</text>
  <text x="310" y="160" font-family="Arial, sans-serif" font-size="10" fill="#166534">• f'(x₃) = 0</text>
  
  <!-- Вертикальные линии в критических точках -->
  <line x1="200" y1="160" x2="200" y2="250" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="310" y1="180" x2="310" y2="250" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="250" y1="120" x2="250" y2="250" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
</svg>