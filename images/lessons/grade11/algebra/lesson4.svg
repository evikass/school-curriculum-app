<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефиниции градиентов -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.9" />
    </linearGradient>
    <radialGradient id="centerGradient">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5" ry="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Заголовок и номер урока -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#2c3e50" font-weight="bold">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">Урок 4: Свойства функции y = sin x и её график</text>
  <text x="450" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7f8c8d">№4</text>
  
  <!-- Система координат -->
  <line x1="50" y1="200" x2="450" y2="200" stroke="#2c3e50" stroke-width="2"/>
  <line x1="250" y1="50" x2="250" y2="320" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="450,200 445,195 445,205" fill="#2c3e50"/>
  <polygon points="250,50 245,55 255,55" fill="#2c3e50"/>
  
  <!-- Подписи осей -->
  <text x="460" y="205" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">x</text>
  <text x="255" y="45" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">y</text>
  
  <!-- Шкалы и подписи -->
  <line x1="150" y1="195" x2="150" y2="205" stroke="#2c3e50" stroke-width="1"/>
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">-π/2</text>
  
  <line x1="200" y1="195" x2="200" y2="205" stroke="#2c3e50" stroke-width="1"/>
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">-π/6</text>
  
  <line x1="250" y1="195" x2="250" y2="205" stroke="#2c3e50" stroke-width="1"/>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">0</text>
  
  <line x1="300" y1="195" x2="300" y2="205" stroke="#2c3e50" stroke-width="1"/>
  <text x="300" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">π/6</text>
  
  <line x1="350" y1="195" x2="350" y2="205" stroke="#2c3e50" stroke-width="1"/>
  <text x="350" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">π/2</text>
  
  <line x1="400" y1="195" x2="400" y2="205" stroke="#2c3e50" stroke-width="1"/>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">π</text>
  
  <!-- Градуации по оси y -->
  <line x1="245" y1="100" x2="255" y2="100" stroke="#2c3e50" stroke-width="1"/>
  <text x="235" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">1</text>
  
  <line x1="245" y1="150" x2="255" y2="150" stroke="#2c3e50" stroke-width="1"/>
  <text x="235" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">0.5</text>
  
  <line x1="245" y1="200" x2="255" y2="200" stroke="#2c3e50" stroke-width="1"/>
  <text x="235" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">0</text>
  
  <line x1="245" y1="250" x2="255" y2="250" stroke="#2c3e50" stroke-width="1"/>
  <text x="235" y="255" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">-0.5</text>
  
  <line x1="245" y1="300" x2="255" y2="300" stroke="#2c3e50" stroke-width="1"/>
  <text x="235" y="305" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">-1</text>
  
  <!-- График функции y = sin x -->
  <path d="M 50,200 Q 100,100 150,100 T 250,200 T 350,300 T 450,200" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  
  <!-- Периодичность - отрезки -->
  <rect x="50" y="195" width="400" height="5" fill="#3498db" opacity="0.2"/>
  <text x="250" y="190" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#3498db">Период T = 2π</text>
  
  <!-- Нули функции -->
  <circle cx="50" cy="200" r="4" fill="#e74c3c"/>
  <circle cx="150" cy="200" r="4" fill="#e74c3c"/>
  <circle cx="250" cy="200" r="4" fill="#e74c3c"/>
  <circle cx="350" cy="200" r="4" fill="#e74c3c"/>
  <circle cx="450" cy="200" r="4" fill="#e74c3c"/>
  <text x="50" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">0</text>
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">π</text>
  <text x="250" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">2π</text>
  <text x="350" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">3π</text>
  <text x="450" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">4π</text>
  
  <!-- Экстремумы -->
  <circle cx="100" cy="100" r="5" fill="#f39c12"/>
  <circle cx="300" cy="300" r="5" fill="#f39c12"/>
  <circle cx="400" cy="100" r="5" fill="#f39c12"/>
  
  <!-- Подписи экстремумов -->
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#f39c12">max: π/2</text>
  <text x="300" y="320" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#f39c12">min: 3π/2</text>
  <text x="400" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#f39c12">max: 5π/2</text>
  
  <!-- Участки монотонности -->
  <path d="M 50,200 L 150,100" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 150,100 L 250,200" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 250,200 L 350,300" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 350,300 L 450,200" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Подписи монотонности -->
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">возрастает</text>
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">убывает</text>
  <text x="300" y="260" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">убывает</text>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">возрастает</text>
  
  <!-- Формула функции -->
  <rect x="30" y="60" width="100" height="30" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="80" y="80" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">y = sin x</text>
  
  <!-- Свойства функции -->
  <rect x="300" y="60" width="180" height="100" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="390" y="80" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50" font-weight="bold">Свойства:</text>
  <text x="310" y="100" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">• Область определения: R</text>
  <text x="310" y="115" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">• Область значений: [-1; 1]</text>
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">• Периодичность: 2π</text>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">• Нули функции: kπ, k∈Z</text>
  
  <!-- Точки на графике для наглядности -->
  <circle cx="250" cy="200" r="3" fill="#2c3e50"/>
  <line x1="250" y1="200" x2="250" y2="100" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="100" x2="100" y2="100" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="100" cy="100" r="3" fill="#2c3e50"/>
  <text x="130" y="95" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">(π/2; 1)</text>
  
  <!-- Легенда -->
  <rect x="30" y="280" width="150" height="50" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="105" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">Легенда:</text>
  <circle cx="45" cy="310" r="3" fill="#e74c3c"/>
  <text x="55" y="314" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Нули функции</text>
  <circle cx="45" cy="323" r="3" fill="#f39c12"/>
  <text x="55" y="327" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Экстремумы</text>
  
  <!-- Дополнительная информация -->
  <rect x="320" y="280" width="160" height="50" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">Область убывания:</text>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">[π/2 + 2πk; 3π/2 + 2πk]</text>
  <text x="400" y="323" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Область возрастания:</text>
</svg>