<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunGradient">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="3" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#dbeafe" stroke-width="1" stroke-dasharray="5,5" />
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e3a8a">Хрущёвская оттепель</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="460" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#64748b">урок 15</text>
  
  <!-- Хронологическая линия -->
  <line x1="50" y1="100" x2="450" y2="100" stroke="#3b82f6" stroke-width="2" />
  <circle cx="100" cy="100" r="5" fill="#3b82f6" />
  <circle cx="200" cy="100" r="5" fill="#3b82f6" />
  <circle cx="300" cy="100" r="5" fill="#3b82f6" />
  <circle cx="400" cy="100" r="5" fill="#3b82f6" />
  
  <!-- Даты на хронологической линии -->
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a">1956</text>
  <text x="200" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a">1957</text>
  <text x="300" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a">1961</text>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a">1964</text>
  
  <!-- XX съезд КПСС -->
  <rect x="60" y="140" width="80" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="5" />
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a">XX съезд</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">КПСС</text>
  <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">1956 г.</text>
  
  <!-- Портрет Хрущёва -->
  <circle cx="100" cy="230" r="25" fill="#e5e7eb" />
  <circle cx="100" cy="225" r="12" fill="#a5b4fc" />
  <path d="M 85 235 Q 100 240 115 235" stroke="#6366f1" stroke-width="2" fill="none" />
  <text x="100" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Хрущёв</text>
  
  <!-- Доклад Хрущёва -->
  <rect x="65" y="275" width="70" height="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3" />
  <text x="100" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Доклад о культе личности</text>
  
  <!-- Спутник -->
  <rect x="160" y="140" width="80" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="5" />
  <circle cx="200" cy="170" r="10" fill="#64748b" />
  <rect x="195" y="165" width="10" height="10" fill="#9ca3af" transform="rotate(45 200 170)" />
  <line x1="190" y1="170" x2="180" y2="170" stroke="#9ca3af" stroke-width="2" />
  <line x1="210" y1="170" x2="220" y2="170" stroke="#9ca3af" stroke-width="2" />
  <text x="200" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Спутник</text>
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">1957 г.</text>
  
  <!-- Орбита спутника -->
  <ellipse cx="200" cy="240" rx="40" ry="15" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" />
  <circle cx="240" cy="240" r="3" fill="#3b82f6" />
  <text x="200" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Первый спутник Земли</text>
  
  <!-- Запуск Гагарина -->
  <rect x="260" y="140" width="80" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="5" />
  <circle cx="290" cy="165" r="5" fill="#f59e0b" />
  <path d="M 290 170 L 285 185 L 295 185 Z" fill="#ef4444" />
  <line x1="290" y1="175" x2="290" y2="190" stroke="#f59e0b" stroke-width="2" />
  <line x1="285" y1="180" x2="280" y2="190" stroke="#f59e0b" stroke-width="2" />
  <line x1="295" y1="180" x2="300" y2="190" stroke="#f59e0b" stroke-width="2" />
  <text x="300" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">12 апреля</text>
  <text x="300" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">1961 г.</text>
  
  <!-- Портрет Гагарина -->
  <circle cx="300" cy="230" r="25" fill="#e5e7eb" />
  <circle cx="300" cy="225" r="12" fill="#a5b4fc" />
  <path d="M 285 235 Q 300 240 315 235" stroke="#6366f1" stroke-width="2" fill="none" />
  <text x="300" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Гагарин</text>
  
  <!-- Хрущёвки -->
  <rect x="360" y="140" width="80" height="60" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="5" />
  <rect x="375" y="160" width="10" height="20" fill="#9ca3af" />
  <rect x="390" y="160" width="10" height="20" fill="#9ca3af" />
  <rect x="405" y="160" width="10" height="20" fill="#9ca3af" />
  <rect x="380" y="165" width="5" height="5" fill="#f59e0b" />
  <rect x="395" y="165" width="5" height="5" fill="#f59e0b" />
  <rect x="410" y="165" width="5" height="5" fill="#f59e0b" />
  <text x="400" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a">Хрущёвки</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">1957-1964</text>
  
  <!-- Карта СССР -->
  <rect x="340" y="210" width="100" height="80" fill="#e0f2fe" stroke="#0284c7" stroke-width="1" rx="5" />
  <path d="M 350 230 Q 380 220 410 230 T 430 250 L 420 270 L 360 270 L 350 250 Z" fill="#7dd3fc" />
  <text x="390" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0c4a6e">СССР</text>
  <circle cx="380" cy="240" r="3" fill="#f59e0b" />
  <text x="380" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0c4a6e">Байконур</text>
  
  <!-- График жилищного строительства -->
  <rect x="50" y="220" width="120" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5" />
  <text x="110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Жилищное строительство</text>
  <line x1="60" y1="280" x2="160" y2="280" stroke="#6b7280" stroke-width="1" />
  <line x1="60" y1="280" x2="60" y2="240" stroke="#6b7280" stroke-width="1" />
  <rect x="70" y="270" width="10" height="10" fill="#3b82f6" />
  <rect x="85" y="260" width="10" height="20" fill="#3b82f6" />
  <rect x="100" y="250" width="10" height="30" fill="#3b82f6" />
  <rect x="115" y="255" width="10" height="25" fill="#3b82f6" />
  <rect x="130" y="265" width="10" height="15" fill="#3b82f6" />
  <text x="60" y="295" font-family="Arial, sans-serif" font-size="8" fill="#64748b">1956</text>
  <text x="110" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">1960</text>
  <text x="160" y="295" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#64748b">1964</text>
  
  <!-- Солнце с лучами -->
  <circle cx="450" cy="50" r="15" fill="url(#sunGradient)" />
  <line x1="450" y1="35" x2="450" y2="25" stroke="#f59e0b" stroke-width="2" />
  <line x1="465" y1="50" x2="475" y2="50" stroke="#f59e0b" stroke-width="2" />
  <line x1="450" y1="65" x2="450" y2="75" stroke="#f59e0b" stroke-width="2" />
  <line x1="435" y1="50" x2="425" y2="50" stroke="#f59e0b" stroke-width="2" />
  <line x1="460" y1="40" x2="468" y2="32" stroke="#f59e0b" stroke-width="2" />
  <line x1="460" y1="60" x2="468" y2="68" stroke="#f59e0b" stroke-width="2" />
  <line x1="440" y1="40" x2="432" y2="32" stroke="#f59e0b" stroke-width="2" />
  <line x1="440" y1="60" x2="432" y2="68" stroke="#f59e0b" stroke-width="2" />
  
  <!-- Надпись "Оттепель" -->
  <text x="450" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e3a8a">Оттепель</text>
  <path d="M 430 105 Q 450 115 470 105" stroke="#3b82f6" stroke-width="2" fill="none" />
  
  <!-- Дополнительные элементы оформления -->
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Период с 1956 по 1964 год</text>
</svg>