<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#A0522D" stroke-width="1"/>
  
  <!-- Заголовок и номер урока -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#8B0000">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#8B4513">Коллективизация в СССР</text>
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#8B4513">Урок №15</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="fieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tractorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Небо -->
  <rect x="20" y="60" width="460" height="100" fill="url(#skyGradient)"/>
  
  <!-- Облака -->
  <ellipse cx="80" cy="80" rx="25" ry="10" fill="white" opacity="0.7"/>
  <ellipse cx="100" cy="85" rx="30" ry="12" fill="white" opacity="0.7"/>
  <ellipse cx="420" cy="90" rx="20" ry="8" fill="white" opacity="0.7"/>
  
  <!-- Поле -->
  <rect x="20" y="160" width="460" height="170" fill="url(#fieldGradient)"/>
  
  <!-- Трактор -->
  <g transform="translate(100, 140)">
    <!-- Корпус трактора -->
    <rect x="0" y="20" width="60" height="25" rx="5" fill="url(#tractorGradient)"/>
    <!-- Кабина -->
    <rect x="45" y="5" width="20" height="20" rx="3" fill="#FFD700"/>
    <!-- Колеса -->
    <circle cx="15" cy="45" r="12" fill="#333"/>
    <circle cx="50" cy="45" r="12" fill="#333"/>
    <!-- Руль -->
    <rect x="55" y="10" width="3" height="15" fill="#333"/>
    <line x1="56.5" y1="15" x2="65" y2="15" stroke="#333" stroke-width="2"/>
    <!-- Дым -->
    <ellipse cx="5" cy="10" rx="8" ry="5" fill="gray" opacity="0.6"/>
    <ellipse cx="-5" cy="8" rx="6" ry="4" fill="gray" opacity="0.4"/>
  </g>
  
  <!-- Колхозники -->
  <g transform="translate(180, 170)">
    <rect x="0" y="0" width="8" height="20" fill="#4169E1"/>
    <circle cx="4" cy="-5" r="5" fill="#FDBCB4"/>
    <rect x="15" y="0" width="8" height="20" fill="#8B4513"/>
    <circle cx="19" cy="-5" r="5" fill="#FDBCB4"/>
    <!-- Серп и молот -->
    <path d="M25,5 Q30,0 35,5" stroke="#FFD700" stroke-width="2" fill="none"/>
    <rect x="28" y="5" width="4" height="10" fill="#8B4513"/>
  </g>
  
  <!-- Карта СССР -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="140" height="80" fill="#E0E0E0" stroke="#8B4513" stroke-width="1"/>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">СССР</text>
    <text x="70" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">1922-1991</text>
  </g>
  
  <!-- Хронологическая лента -->
  <g transform="translate(30, 260)">
    <rect x="0" y="0" width="440" height="30" fill="#F5DEB3" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="30" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">1928</text>
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">1930</text>
    <text x="190" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">1932</text>
    <text x="270" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">1933</text>
    <text x="350" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">1937</text>
    
    <!-- Метки событий -->
    <circle cx="30" cy="15" r="3" fill="#FF0000"/>
    <text x="30" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#FF0000">Начало</text>
    
    <circle cx="110" cy="15" r="3" fill="#FF4500"/>
    <text x="110" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#FF4500">Пик</text>
    
    <circle cx="190" cy="15" r="3" fill="#8B0000"/>
    <text x="190" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B0000">Голод</text>
    
    <circle cx="270" cy="15" r="3" fill="#8B0000"/>
    <text x="270" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B0000">Пик голода</text>
    
    <circle cx="350" cy="15" r="3" fill="#8B4513"/>
    <text x="350" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Завершение</text>
  </g>
  
  <!-- Статистика -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="120" height="50" fill="#FFF8DC" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#8B0000">Жертвы голода</text>
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#8B4513">1932-1933</text>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#8B0000">3-7 млн чел.</text>
  </g>
  
  <!-- Портрет Сталина -->
  <g transform="translate(380, 160)">
    <rect x="0" y="0" width="60" height="80" fill="#F5F5DC" stroke="#8B4513" stroke-width="1"/>
    <circle cx="30" cy="25" r="12" fill="#FDBCB4"/>
    <rect x="20" y="35" width="20" height="30" fill="#4169E1"/>
    <text x="30" y="70" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Сталин</text>
    <text x="30" y="78" font-family="Arial, sans-serif" font-size="6" text-anchor="middle" fill="#8B4513">1879-1953</text>
  </g>
  
  <!-- График коллективизации -->
  <g transform="translate(170, 100)">
    <rect x="0" y="0" width="120" height="50" fill="#F0E68C" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#8B4513">Коллективизация</text>
    <polyline points="10,40 30,35 50,25 70,15 90,10 110,8" stroke="#8B0000" stroke-width="2" fill="none"/>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="6" fill="#8B4513">%</text>
    <text x="110" y="5" font-family="Arial, sans-serif" font-size="6" text-anchor="end" fill="#8B4513">98%</text>
  </g>
  
  <!-- Формула раскулачивания -->
  <g transform="translate(220, 60)">
    <rect x="0" y="0" width="140" height="30" fill="#E6E6FA" stroke="#8B4513" stroke-width="1" rx="3"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#8B4513">Раскулачено: 5-6 млн</text>
  </g>
  
  <!-- Дерево (кулацкое хозяйство) -->
  <g transform="translate(280, 170)">
    <rect x="0" y="20" width="8" height="30" fill="#8B4513"/>
    <circle cx="4" cy="15" r="15" fill="#228B22"/>
    <text x="4" y="60" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Кулак</text>
  </g>
  
  <!-- Переселенцы -->
  <g transform="translate(320, 175)">
    <rect x="0" y="0" width="6" height="15" fill="#8B4513"/>
    <circle cx="3" cy="-5" r="3" fill="#FDBCB4"/>
    <rect x="10" y="0" width="6" height="15" fill="#8B4513"/>
    <circle cx="13" cy="-5" r="3" fill="#FDBCB4"/>
    <text x="8" y="25" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#8B4513">Ссылка</text>
  </g>
  
  <!-- Дерево колхозное -->
  <g transform="translate(350, 170)">
    <rect x="0" y="20" width="8" height="30" fill="#8B4513"/>
    <circle cx="4" cy="15" r="15" fill="#32CD32"/>
    <text x="4" y="60" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Колхоз</text>
  </g>
  
  <!-- Схема влияния -->
  <g transform="translate(20, 310)">
    <rect x="0" y="0" width="460" height="25" fill="#F0F8FF" stroke="#8B4513" stroke-width="1" rx="3"/>
    <text x="10" y="17" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Последствия: 
      <tspan fill="#8B0000">• Снижение производства</tspan> 
      <tspan dx="10" fill="#8B0000">• Голод</tspan> 
      <tspan dx="10" fill="#8B0000">• Демографические потери</tspan> 
      <tspan dx="10" fill="#8B0000">• Изменение структуры села</tspan>
    </text>
  </g>
</svg>