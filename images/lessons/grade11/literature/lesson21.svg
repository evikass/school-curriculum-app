<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495E" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">
    Урок 21: Литература о Великой Отечественной войне. Поэзия
  </text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495E">
    ЛИТЕРАТУРА · 11 КЛАСС
  </text>
  
  <!-- Номер урока в углу -->
  <rect x="15" y="15" width="60" height="30" fill="#3498DB" rx="5"/>
  <text x="45" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">
    № 21
  </text>
  
  <!-- Портрет Константина Симонова -->
  <circle cx="80" cy="110" r="25" fill="#E8F4F8"/>
  <rect x="60" y="110" width="40" height="45" fill="#D5E8F7"/>
  <circle cx="80" cy="100" r="15" fill="#D5E8F7"/>
  <path d="M65 125 Q80 120 95 125 L90 140 L70 140 Z" fill="#D5E8F7"/>
  <text x="80" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">К. Симонов</text>
  
  <!-- Портрет Мусы Джалиля -->
  <circle cx="180" cy="110" r="25" fill="#F8E8E8"/>
  <rect x="160" y="110" width="40" height="45" fill="#F7D5D5"/>
  <circle cx="180" cy="100" r="15" fill="#F7D5D5"/>
  <path d="M165 125 Q180 120 195 125 L190 140 L170 140 Z" fill="#F7D5D5"/>
  <text x="180" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">М. Джалиль</text>
  
  <!-- Портрет Михаила Исаковского -->
  <circle cx="280" cy="110" r="25" fill="#E8F8E8"/>
  <rect x="260" y="110" width="40" height="45" fill="#D5F7D5"/>
  <circle cx="280" cy="100" r="15" fill="#D5F7D5"/>
  <path d="M265 125 Q280 120 295 125 L290 140 L270 140 Z" fill="#D5F7D5"/>
  <text x="280" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">М. Исаковский</text>
  
  <!-- Портрет Станислава Гудзенко -->
  <circle cx="380" cy="110" r="25" fill="#F8F0E8"/>
  <rect x="360" y="110" width="40" height="45" fill="#F7E7D5"/>
  <circle cx="380" cy="100" r="15" fill="#F7E7D5"/>
  <path d="M365 125 Q380 120 395 125 L390 140 L370 140 Z" fill="#F7E7D5"/>
  <text x="380" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">С. Гудзенко</text>
  
  <!-- Временная шкала -->
  <line x1="50" y1="210" x2="450" y2="210" stroke="#34495E" stroke-width="2"/>
  
  <!-- Метки на временной шкале -->
  <line x1="80" y1="205" x2="80" y2="215" stroke="#34495E" stroke-width="2"/>
  <line x1="180" y1="205" x2="180" y2="215" stroke="#34495E" stroke-width="2"/>
  <line x1="280" y1="205" x2="280" y2="215" stroke="#34495E" stroke-width="2"/>
  <line x1="380" y1="205" x2="380" y2="215" stroke="#34495E" stroke-width="2"/>
  
  <!-- Даты -->
  <text x="80" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1915-1979</text>
  <text x="180" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1906-1944</text>
  <text x="280" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1900-1973</text>
  <text x="380" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1922-1953</text>
  
  <!-- Заголовок "Тематика творчества" -->
  <text x="250" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">
    Тематика творчества
  </text>
  
  <!-- Темы творчества Симонова -->
  <rect x="40" y="270" width="80" height="15" fill="#3498DB" rx="5" opacity="0.7"/>
  <text x="80" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Фронтовая лирика</text>
  
  <!-- Темы творчества Джалиля -->
  <rect x="140" y="270" width="80" height="15" fill="#E74C3C" rx="5" opacity="0.7"/>
  <text x="180" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Патриотизм</text>
  
  <!-- Темы творчества Исаковского -->
  <rect x="240" y="270" width="80" height="15" fill="#2ECC71" rx="5" opacity="0.7"/>
  <text x="280" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Солдатская лирика</text>
  
  <!-- Темы творчества Гудзенко -->
  <rect x="340" y="270" width="80" height="15" fill="#F39C12" rx="5" opacity="0.7"/>
  <text x="380" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Героизм</text>
  
  <!-- Ключевые произведения -->
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">
    Ключевые произведения
  </text>
  
  <!-- Произведения Симонова -->
  <text x="50" y="320" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Жди меня"</text>
  <text x="50" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Сын артиллериста"</text>
  
  <!-- Произведения Джалиля -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Моабитская тетрадь"</text>
  
  <!-- Произведения Исаковского -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Катюша"</text>
  <text x="250" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Враги сожгли родную хату"</text>
  
  <!-- Произведения Гудзенко -->
  <text x="350" y="320" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Майор привёз на погост"</text>
  <text x="350" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495E">"Берлин"</text>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="30" r="3" fill="#3498DB"/>
  <circle cx="470" cy="30" r="3" fill="#E74C3C"/>
  <circle cx="30" cy="320" r="3" fill="#2ECC71"/>
  <circle cx="470" cy="320" r="3" fill="#F39C12"/>
  
  <!-- График популярности -->
  <polyline points="70,90 170,100 270,85 370,95" fill="none" stroke="#34495E" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">
    Популярность в годы ВОВ
  </text>
</svg>