<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ecf0f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="4" rx="5" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3" opacity="0.5" />
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Урок 30: Советская литература 1960-1980-х</text>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Проза и публицистика</text>
  
  <!-- Номер урока в углу -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">№30</text>
  
  <!-- Портреты писателей -->
  <g id="portraits">
    <!-- Чингиз Айтматов -->
    <circle cx="100" cy="120" r="25" fill="url(#portraitGradient)" />
    <circle cx="100" cy="115" r="8" fill="#fff" />
    <path d="M 90 125 Q 100 130 110 125" fill="none" stroke="#fff" stroke-width="2" />
    <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Ч. Айтматов</text>
    
    <!-- Виктор Астафьев -->
    <circle cx="250" cy="120" r="25" fill="url(#portraitGradient)" />
    <circle cx="250" cy="115" r="8" fill="#fff" />
    <path d="M 240 125 Q 250 130 260 125" fill="none" stroke="#fff" stroke-width="2" />
    <text x="250" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">В. Астафьев</text>
    
    <!-- Юрий Трифонов -->
    <circle cx="400" cy="120" r="25" fill="url(#portraitGradient)" />
    <circle cx="400" cy="115" r="8" fill="#fff" />
    <path d="M 390 125 Q 400 130 410 125" fill="none" stroke="#fff" stroke-width="2" />
    <text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Ю. Тrifонов</text>
  </g>
  
  <!-- Хронология -->
  <g id="timeline">
    <line x1="50" y1="190" x2="450" y2="190" stroke="#34495e" stroke-width="2" />
    <circle cx="100" cy="190" r="4" fill="#e74c3c" />
    <circle cx="250" cy="190" r="4" fill="#e74c3c" />
    <circle cx="400" cy="190" r="4" fill="#e74c3c" />
    <text x="100" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1960-е</text>
    <text x="250" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1970-е</text>
    <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1980-е</text>
  </g>
  
  <!-- Диаграмма "Извечное" и "Современное" в произведениях -->
  <g id="diagram">
    <rect x="50" y="230" width="180" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5" />
    <text x="140" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Темы произведений</text>
    
    <!-- Круговая диаграмма -->
    <circle cx="80" cy="280" r="15" fill="#3498db" opacity="0.7" />
    <text x="80" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">60%</text>
    <text x="80" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Извечное</text>
    
    <circle cx="140" cy="280" r="15" fill="#e74c3c" opacity="0.7" />
    <text x="140" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">40%</text>
    <text x="140" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Современное</text>
  </g>
  
  <!-- Ключевые произведения -->
  <g id="books">
    <rect x="250" y="230" width="200" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5" />
    <text x="350" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Ключевые произведения</text>
    
    <!-- Книги -->
    <rect x="270" y="260" width="30" height="40" fill="#3498db" rx="2" />
    <text x="285" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff">И</text>
    <text x="285" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">И дольше века</text>
    
    <rect x="320" y="260" width="30" height="40" fill="#e74c3c" rx="2" />
    <text x="335" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff">П</text>
    <text x="335" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Печальный детектив</text>
    
    <rect x="370" y="260" width="30" height="40" fill="#2ecc71" rx="2" />
    <text x="385" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#fff">К</text>
    <text x="385" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Кража</text>
  </g>
  
  <!-- Иконка "Извечное против Современного" -->
  <g id="icons">
    <circle cx="60" cy="120" r="15" fill="#3498db" opacity="0.3" />
    <path d="M 60 110 L 55 120 L 65 120 Z" fill="#3498db" />
    <text x="60" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Извечное</text>
    
    <circle cx="210" cy="120" r="15" fill="#e74c3c" opacity="0.3" />
    <rect x="205" y="110" width="10" height="10" fill="#e74c3c" />
    <text x="210" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Современное</text>
  </g>
  
  <!-- Формула художественного метода -->
  <g id="formula">
    <rect x="50" y="330" width="400" height="10" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5" />
    <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Реализм + Психологизм = "Исповедальная" проза</text>
  </g>
  
  <!-- Даты важнейших событий -->
  <g id="dates">
    <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">1963</text>
    <text x="100" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">"И дольше века"</text>
    
    <text x="250" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">1975</text>
    <text x="250" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">"Печальный детектив"</text>
    
    <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">1978</text>
    <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">"Кража"</text>
  </g>
  
  <!-- Декоративные элементы -->
  <g id="decor">
    <path d="M 20 20 L 30 20 L 25 30 Z" fill="#e74c3c" opacity="0.5" />
    <path d="M 480 20 L 470 20 L 475 30 Z" fill="#3498db" opacity="0.5" />
    <path d="M 20 340 L 30 340 L 25 330 Z" fill="#2ecc71" opacity="0.5" />
    <path d="M 480 340 L 470 340 L 475 330 Z" fill="#f39c12" opacity="0.5" />
  </g>
</svg>