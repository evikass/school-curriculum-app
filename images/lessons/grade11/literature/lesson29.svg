<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="6"/>
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#D2691E" stroke-width="2"/>
  
  <!-- Номер урока в углу -->
  <text x="460" y="40" font-family="Arial, sans-serif" font-size="14" fill="#8B4513" text-anchor="middle">Урок 29</text>
  
  <!-- "ЛИТЕРАТУРА · 11 КЛАСС" -->
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="12" fill="#696969" text-anchor="middle">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2F4F4F" text-anchor="middle">Драматургия второй половины XX века</text>
  
  <!-- Заголовок раздела: Театр А. Вампилова -->
  <text x="50" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4682B4" text-anchor="start">Александр Вампилов</text>
  
  <!-- Портрет А. Вампилова (упрощенный) -->
  <circle cx="80" cy="140" r="25" fill="#FDBCB4" stroke="#333" stroke-width="1"/>
  <circle cx="75" cy="135" r="2" fill="#333"/>
  <circle cx="85" cy="135" r="2" fill="#333"/>
  <path d="M70,150 Q80,155 90,150" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="65" y="165" width="30" height="40" fill="#4682B4" stroke="#333" stroke-width="1"/>
  
  <!-- Ключевые произведения Вампилова -->
  <rect x="110" y="120" width="150" height="80" fill="#E6F3FF" stroke="#4682B4" stroke-width="1" rx="5"/>
  <text x="135" y="140" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Прошлым летом в Чулимске"</text>
  <text x="135" y="155" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Утиная охота"</text>
  <text x="135" y="170" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Старший сын"</text>
  <text x="135" y="185" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Прощание в июне"</text>
  
  <!-- Хронология Вампилова -->
  <line x1="280" y1="120" x2="280" y2="200" stroke="#4682B4" stroke-width="2"/>
  <circle cx="280" cy="130" r="5" fill="#4682B4"/>
  <text x="290" y="135" font-family="Arial, sans-serif" font-size="10" fill="#333">1933-1972</text>
  <circle cx="280" cy="155" r="5" fill="#4682B4"/>
  <text x="290" y="160" font-family="Arial, sans-serif" font-size="10" fill="#333">1958-дебют</text>
  <circle cx="280" cy="180" r="5" fill="#4682B4"/>
  <text x="290" y="185" font-family="Arial, sans-serif" font-size="10" fill="#333">1972-гибель</text>
  
  <!-- Заголовок раздела: А. Володин -->
  <text x="50" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513" text-anchor="start">Александр Володин</text>
  
  <!-- Портрет А. Володина (упрощенный) -->
  <circle cx="80" cy="260" r="25" fill="#FDBCB4" stroke="#333" stroke-width="1"/>
  <circle cx="75" cy="255" r="2" fill="#333"/>
  <circle cx="85" cy="255" r="2" fill="#333"/>
  <path d="M70,270 Q80,275 90,270" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="65" y="285" width="30" height="40" fill="#8B4513" stroke="#333" stroke-width="1"/>
  
  <!-- Ключевые произведения Володина -->
  <rect x="110" y="240" width="150" height="80" fill="#FFF8E7" stroke="#8B4513" stroke-width="1" rx="5"/>
  <text x="135" y="260" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Пять вечеров"</text>
  <text x="135" y="275" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Назовите меня by name"</text>
  <text x="135" y="290" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Дальше - тишина"</text>
  <text x="135" y="305" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Мать и сын"</text>
  
  <!-- Хронология Володина -->
  <line x1="280" y1="240" x2="280" y2="320" stroke="#8B4513" stroke-width="2"/>
  <circle cx="280" cy="250" r="5" fill="#8B4513"/>
  <text x="290" y="255" font-family="Arial, sans-serif" font-size="10" fill="#333">1919-2001</text>
  <circle cx="280" cy="275" r="5" fill="#8B4513"/>
  <text x="290" y="280" font-family="Arial, sans-serif" font-size="10" fill="#333">1956-дебют</text>
  <circle cx="280" cy="300" r="5" fill="#8B4513"/>
  <text x="290" y="305" font-family="Arial, sans-serif" font-size="10" fill="#333">1990-знак</text>
  
  <!-- Заголовок раздела: В. Розов -->
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#228B22" text-anchor="start">Виктор Розов</text>
  
  <!-- Портрет В. Розова (упрощенный) -->
  <circle cx="80" cy="340" r="25" fill="#FDBCB4" stroke="#333" stroke-width="1"/>
  <circle cx="75" cy="335" r="2" fill="#333"/>
  <circle cx="85" cy="335" r="2" fill="#333"/>
  <path d="M70,350 Q80,355 90,350" fill="none" stroke="#333" stroke-width="1.5"/>
  
  <!-- Ключевые произведения Розова -->
  <rect x="110" y="315" width="150" height="40" fill="#F0FFF0" stroke="#228B22" stroke-width="1" rx="5"/>
  <text x="135" y="335" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Вечно живые"</text>
  <text x="135" y="348" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Гнездо глухаря"</text>
  
  <!-- Хронология Розова -->
  <line x1="280" y1="315" x2="280" y2="355" stroke="#228B22" stroke-width="2"/>
  <circle cx="280" cy="325" r="5" fill="#228B22"/>
  <text x="290" y="330" font-family="Arial, sans-serif" font-size="10" fill="#333">1913-2004</text>
  <circle cx="280" cy="345" r="5" fill="#228B22"/>
  <text x="290" y="350" font-family="Arial, sans-serif" font-size="10" fill="#333">1949-дебют</text>
  
  <!-- Заголовок раздела: М. Розовский -->
  <text x="370" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8A2BE2" text-anchor="start">Марк Розовский</text>
  
  <!-- Портрет М. Розовского (упрощенный) -->
  <circle cx="400" cy="140" r="25" fill="#FDBCB4" stroke="#333" stroke-width="1"/>
  <circle cx="395" cy="135" r="2" fill="#333"/>
  <circle cx="405" cy="135" r="2" fill="#333"/>
  <path d="M390,150 Q400,155 410,150" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="385" y="165" width="30" height="40" fill="#8A2BE2" stroke="#333" stroke-width="1"/>
  
  <!-- Ключевые произведения Розовского -->
  <rect x="300" y="185" width="150" height="80" fill="#F3E5FF" stroke="#8A2BE2" stroke-width="1" rx="5"/>
  <text x="325" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Шум за сценой"</text>
  <text x="325" y="220" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Пять вечеров"</text>
  <text x="325" y="235" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Человек из Ламанчи"</text>
  <text x="325" y="250" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">"Дульсинея"</text>
  
  <!-- Тематическая диаграмма -->
  <rect x="370" y="280" width="120" height="60" fill="#FFE4E1" stroke="#DC143C" stroke-width="1" rx="5"/>
  <text x="430" y="300" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Темы драматургии</text>
  <text x="380" y="318" font-family="Arial, sans-serif" font-size="10" fill="#333">• Человек в обществе</text>
  <text x="380" y="332" font-family="Arial, sans-serif" font-size="10" fill="#333">• Моральный выбор</text>
  
  <!-- Стилистические особенности -->
  <rect x="280" y="270" width="80" height="50" fill="#F0FFFF" stroke="#4682B4" stroke-width="1" rx="5"/>
  <text x="320" y="290" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Психологизм</text>
  <text x="320" y="305" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Символизм</text>
  <text x="320" y="318" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Поэтичность</text>
  
  <!-- Даты и ключевые события -->
  <rect x="370" y="60" width="120" height="35" fill="#F5F5DC" stroke="#DAA520" stroke-width="1" rx="5"/>
  <text x="430" y="80" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">1950-1980-е гг.</text>
  <text x="430" y="92" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">"оттепель" и "застой"</text>
  
  <!-- Связующие линии -->
  <path d="M160,160 Q200,200 110,260" stroke="#708090" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
  <path d="M260,280 Q300,260 300,225" stroke="#708090" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
  <path d="M260,160 Q300,140 300,105" stroke="#708090" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
  
  <!-- Ключевые термины -->
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="10" fill="#666" font-style="italic">"Драматургия совести"</text>
  <text x="50" y="355" font-family="Arial, sans-serif" font-size="10" fill="#666" font-style="italic">"Трагикомедия"</text>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="30" r="3" fill="#8B4513"/>
  <circle cx="470" cy="30" r="3" fill="#8B4513"/>
  <circle cx="30" cy="320" r="3" fill="#8B4513"/>
  <circle cx="470" cy="320" r="3" fill="#8B4513"/>
</svg>