<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Темный фон -->
  <rect width="500" height="350" fill="#0a0a1a"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3a3a5a" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a4a6a" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#e0e0ff">Строение ядра</text>
  
  <!-- Ядро атома -->
  <g transform="translate(150, 150)">
    <!-- Нейтроны -->
    <circle cx="-20" cy="-15" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="0" cy="-20" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="20" cy="-15" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="-30" cy="5" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="-10" cy="10" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="10" cy="5" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="30" cy="10" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="-20" cy="25" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="0" cy="30" r="12" fill="#4a90e2" opacity="0.8"/>
    <circle cx="20" cy="25" r="12" fill="#4a90e2" opacity="0.8"/>
    
    <!-- Протоны -->
    <circle cx="-20" cy="-15" r="12" fill="#e74c3c" opacity="0.8"/>
    <circle cx="0" cy="-20" r="12" fill="#e74c3c" opacity="0.8"/>
    <circle cx="20" cy="-15" r="12" fill="#e74c3c" opacity="0.8"/>
    <circle cx="-10" cy="10" r="12" fill="#e74c3c" opacity="0.8"/>
    <circle cx="10" cy="5" r="12" fill="#e74c3c" opacity="0.8"/>
    
    <!-- Оболочка ядра -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  </g>
  
  <!-- Подписи частиц -->
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">p⁺</text>
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="14" fill="#4a90e2">n⁰</text>
  
  <!-- Формула E_св = Δmc² -->
  <g transform="translate(320, 120)">
    <rect x="-40" y="-20" width="160" height="40" fill="#1a1a3a" stroke="#4a4a6a" stroke-width="1" rx="5"/>
    <text x="40" y="5" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#e0e0ff">E_св = Δmc²</text>
  </g>
  
  <!-- График энергии связи -->
  <g transform="translate(320, 220)">
    <!-- Ось X -->
    <line x1="0" y1="0" x2="120" y2="0" stroke="#888" stroke-width="1"/>
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#888" stroke-width="1"/>
    
    <!-- Кривая энергии связи -->
    <path d="M 0,0 Q 30,-45 60,-50 T 120,-40" fill="none" stroke="#4a90e2" stroke-width="2"/>
    
    <!-- Подписи осей -->
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#aaa">A</text>
    <text x="-15" y="-30" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#aaa">ε_св</text>
    
    <!-- Точки на кривой -->
    <circle cx="30" cy="-45" r="3" fill="#e74c3c"/>
    <circle cx="60" cy="-50" r="3" fill="#e74c3c"/>
    <circle cx="90" cy="-45" r="3" fill="#e74c3c"/>
  </g>
  
  <!-- Подписи к графику -->
  <text x="380" y="290" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#aaa">Кривая энергии связи</text>
  
  <!-- Дополнительные элементы -->
  <g transform="translate(250, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">где E_св - энергия связи</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">Δm - дефект масс</text>
  </g>
  
  <!-- Декоративные частицы -->
  <circle cx="50" cy="100" r="2" fill="#666" opacity="0.5"/>
  <circle cx="450" cy="80" r="2" fill="#666" opacity="0.5"/>
  <circle cx="420" cy="320" r="2" fill="#666" opacity="0.5"/>
  <circle cx="80" cy="320" r="2" fill="#666" opacity="0.5"/>
</svg>