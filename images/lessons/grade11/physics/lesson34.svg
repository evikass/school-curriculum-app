<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="nucleusGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c92a2a;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="protonGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4dabf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1971c2;stop-opacity:1" />
    </radialGradient>
    
    <radialGradient id="neutronGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f9e44;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#495057" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#adb5bd" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <text x="470" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#495057">Урок 34</text>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Строение атомного ядра</text>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#495057">Энергия связи</text>
  
  <!-- Атомное ядро -->
  <g transform="translate(120, 150)">
    <circle cx="0" cy="0" r="40" fill="url(#nucleusGradient)" filter="url(#shadow)"/>
    
    <!-- Протоны -->
    <circle cx="-15" cy="-10" r="12" fill="url(#protonGradient)"/>
    <text x="-15" y="-6" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">p+</text>
    
    <circle cx="15" cy="-10" r="12" fill="url(#protonGradient)"/>
    <text x="15" y="-6" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">p+</text>
    
    <circle cx="0" cy="15" r="12" fill="url(#protonGradient)"/>
    <text x="0" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">p+</text>
    
    <!-- Нейтроны -->
    <circle cx="-15" cy="10" r="12" fill="url(#neutronGradient)"/>
    <text x="-15" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">n</text>
    
    <circle cx="15" cy="10" r="12" fill="url(#neutronGradient)"/>
    <text x="15" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">n</text>
    
    <circle cx="0" cy="-15" r="12" fill="url(#neutronGradient)"/>
    <text x="0" y="-11" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">n</text>
    
    <circle cx="-25" cy="0" r="12" fill="url(#neutronGradient)"/>
    <text x="-25" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">n</text>
    
    <circle cx="25" cy="0" r="12" fill="url(#neutronGradient)"/>
    <text x="25" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">n</text>
    
    <text x="0" y="-55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#212529">Ядро гелия-4</text>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">A=4, Z=2</text>
  </g>
  
  <!-- Изотопы -->
  <g transform="translate(300, 100)">
    <circle cx="0" cy="0" r="15" fill="url(#protonGradient)"/>
    <circle cx="0" cy="20" r="15" fill="url(#protonGradient)"/>
    <circle cx="-20" cy="0" r="15" fill="url(#neutronGradient)"/>
    <circle cx="20" cy="0" r="15" fill="url(#neutronGradient)"/>
    <circle cx="-20" cy="20" r="15" fill="url(#neutronGradient)"/>
    <circle cx="20" cy="20" r="15" fill="url(#neutronGradient)"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#212529">Углерод-12</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">A=12, Z=6</text>
  </g>
  
  <g transform="translate(380, 100)">
    <circle cx="0" cy="0" r="15" fill="url(#protonGradient)"/>
    <circle cx="0" cy="20" r="15" fill="url(#protonGradient)"/>
    <circle cx="-20" cy="0" r="15" fill="url(#neutronGradient)"/>
    <circle cx="20" cy="0" r="15" fill="url(#neutronGradient)"/>
    <circle cx="-20" cy="20" r="15" fill="url(#neutronGradient)"/>
    <circle cx="20" cy="20" r="15" fill="url(#neutronGradient)"/>
    <circle cx="0" cy="-20" r="15" fill="url(#neutronGradient)"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#212529">Углерод-13</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">A=13, Z=6</text>
  </g>
  
  <!-- Дефект масс -->
  <g transform="translate(300, 200)">
    <rect x="-40" y="-20" width="80" height="60" fill="white" stroke="#495057" stroke-width="1" rx="5"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#212529">Дефект масс</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Δm = Z·m<sub>p</sub> + (A-Z)·m<sub>n</sub> - M<sub>яд</sub></text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">где:</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Z - зарядовое число</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">A - массовое число</text>
  </g>
  
  <!-- Энергия связи -->
  <g transform="translate(400, 200)">
    <rect x="-40" y="-20" width="80" height="60" fill="white" stroke="#495057" stroke-width="1" rx="5"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#212529">Энергия связи</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">E<sub>св</sub> = Δm·c<sup>2</sup></text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">Единица измерения:</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c757d">МэВ (мегаэлектронвольт)</text>
  </g>
  
  <!-- График энергии связи на нуклон -->
  <g transform="translate(250, 300)">
    <rect x="-150" y="-40" width="300" height="80" fill="white" stroke="#495057" stroke-width="1" rx="5"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#212529">Энергия связи на нуклон</text>
    
    <!-- Оси -->
    <line x1="-120" y1="20" x2="120" y2="20" stroke="#495057" stroke-width="1"/>
    <line x1="-120" y1="20" x2="-120" y2="-20" stroke="#495057" stroke-width="1"/>
    
    <!-- График -->
    <path d="M-100,10 Q-80,-5 -60,-10 Q-40,-12 -20,-10 Q0,-8 20,-5 Q40,0 60,5 Q80,10 100,15" 
          fill="none" stroke="#ff6b6b" stroke-width="2"/>
    
    <!-- Точки на графике -->
    <circle cx="-60" cy="-10" r="2" fill="#ff6b6b"/>
    <circle cx="-20" cy="-10" r="2" fill="#ff6b6b"/>
    <circle cx="20" cy="-5" r="2" fill="#ff6b6b"/>
    <circle cx="60" cy="5" r="2" fill="#ff6b6b"/>
    <circle cx="100" cy="15" r="2" fill="#ff6b6b"/>
    
    <!-- Подписи осей -->
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">Массовое число A</text>
    <text x="-135" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">E<sub>св</sub>/A</text>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(30, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#212529">Состав ядра:</text>
    <circle cx="10" cy="15" r="8" fill="url(#protonGradient)"/>
    <text x="25" y="19" font-family="Arial, sans-serif" font-size="10" fill="#495057">протон (p+)</text>
    <circle cx="10" cy="35" r="8" fill="url(#neutronGradient)"/>
    <text x="25" y="39" font-family="Arial, sans-serif" font-size="10" fill="#495057">нейтрон (n)</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(30, 280)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#212529">Нуклон:</text>
    <text x="50" y="0" font-family="Arial, sans-serif" font-size="10" fill="#495057">протон или нейтрон</text>
    
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#212529">Изотопы:</text>
    <text x="50" y="15" font-family="Arial, sans-serif" font-size="10" fill="#495057">ядра с одинаковым Z, разным A</text>
    
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#212529">Массовое число:</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="10" fill="#495057">A = Z + N</text>
  </g>
</svg>