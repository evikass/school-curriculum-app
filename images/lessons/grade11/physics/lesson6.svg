<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#55efc4"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ff7675"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="url(#bg6)"/>
  <!-- Circuit diagram -->
  <text x="200" y="25" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Закон Ома для полной цепи</text>
  <!-- EMF source -->
  <rect x="30" y="80" width="70" height="120" rx="8" fill="#2d3436" stroke="#636e72" stroke-width="2"/>
  <line x1="55" y1="90" x2="55" y2="110" stroke="#ff7675" stroke-width="3"/>
  <line x1="45" y1="100" x2="65" y2="100" stroke="#ff7675" stroke-width="3"/>
  <line x1="45" y1="140" x2="65" y2="140" stroke="#ff7675" stroke-width="3"/>
  <text x="65" y="95" fill="#ff7675" font-size="10">+</text>
  <text x="65" y="155" fill="#74b9ff" font-size="12">-</text>
  <text x="65" y="175" text-anchor="middle" fill="#ffeaa7" font-size="10">E, r</text>
  <!-- Internal resistance -->
  <rect x="40" y="112" width="50" height="16" rx="3" fill="#e17055" opacity="0.5" stroke="#fab1a0" stroke-width="1"/>
  <text x="65" y="124" text-anchor="middle" fill="#fab1a0" font-size="8">r</text>
  <!-- Wires top -->
  <line x1="65" y1="80" x2="65" y2="50" stroke="#ffd700" stroke-width="2"/>
  <line x1="65" y1="50" x2="170" y2="50" stroke="#ffd700" stroke-width="2"/>
  <!-- External resistance -->
  <rect x="170" y="40" width="80" height="20" rx="3" fill="#0984e3" opacity="0.5" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="210" y="54" text-anchor="middle" fill="#74b9ff" font-size="10">R (внешн.)</text>
  <!-- Wires right -->
  <line x1="250" y1="50" x2="340" y2="50" stroke="#ffd700" stroke-width="2"/>
  <line x1="340" y1="50" x2="340" y2="150" stroke="#ffd700" stroke-width="2"/>
  <!-- Voltmeter -->
  <circle cx="340" cy="100" r="18" fill="none" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="340" y="104" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">V</text>
  <line x1="340" y1="82" x2="340" y2="50" stroke="#a29bfe" stroke-width="1"/>
  <text x="365" y="100" fill="#a29bfe" font-size="8">U</text>
  <!-- Wires bottom -->
  <line x1="340" y1="150" x2="340" y2="230" stroke="#ffd700" stroke-width="2"/>
  <line x1="340" y1="230" x2="65" y2="230" stroke="#ffd700" stroke-width="2"/>
  <line x1="65" y1="230" x2="65" y2="200" stroke="#ffd700" stroke-width="2"/>
  <!-- Current arrows -->
  <line x1="120" y1="47" x2="160" y2="47" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="140" y="40" fill="#ffd700" font-size="10">I</text>
  <!-- Formulas -->
  <text x="220" y="100" text-anchor="middle" fill="#55efc4" font-size="18" font-weight="bold">I = E/(R+r)</text>
  <text x="220" y="125" text-anchor="middle" fill="#dfe6e9" font-size="11">U = E - Ir = IR</text>
  <!-- Short circuit -->
  <rect x="50" y="255" width="300" height="35" rx="5" fill="#d63031" opacity="0.2" stroke="#ff7675" stroke-width="1"/>
  <text x="200" y="273" text-anchor="middle" fill="#ff7675" font-size="11" font-weight="bold">Короткое замыкание: R=0</text>
  <text x="200" y="287" text-anchor="middle" fill="#ff7675" font-size="10">I_кз = E/r</text>
</svg>