<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Темный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a4a6a" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#6a6a8a" stroke-width="1" rx="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">Резонанс</text>
  
  <!-- Система координат -->
  <g id="coordinates">
    <!-- Ось X -->
    <line x1="80" y1="280" x2="420" y2="280" stroke="#ffffff" stroke-width="2"/>
    <!-- Ось Y -->
    <line x1="80" y1="280" x2="80" y2="80" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Стрелки осей -->
    <polygon points="420,280 410,275 410,285" fill="#ffffff"/>
    <polygon points="80,80 75,90 85,90" fill="#ffffff"/>
    
    <!-- Подписи осей -->
    <text x="430" y="285" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">ω</text>
    <text x="70" y="75" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">A</text>
    
    <!-- Деления на оси X -->
    <g stroke="#ffffff" stroke-width="1">
      <line x1="140" y1="275" x2="140" y2="285"/>
      <line x1="200" y1="275" x2="200" y2="285"/>
      <line x1="250" y1="275" x2="250" y2="285"/>
      <line x1="310" y1="275" x2="310" y2="285"/>
      <line x1="370" y1="275" x2="370" y2="285"/>
    </g>
    
    <!-- Подписи делений на оси X -->
    <text x="140" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">ω₀-Δω</text>
    <text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">ω₀-γ/2</text>
    <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff6b6b">ω₀</text>
    <text x="310" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">ω₀+γ/2</text>
    <text x="370" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">ω₀+Δω</text>
    
    <!-- Деления на оси Y -->
    <g stroke="#ffffff" stroke-width="1">
      <line x1="75" y1="240" x2="85" y2="240"/>
      <line x1="75" y1="200" x2="85" y2="200"/>
      <line x1="75" y1="160" x2="85" y2="160"/>
      <line x1="75" y1="120" x2="85" y2="120"/>
    </g>
    
    <!-- Подписи делений на оси Y -->
    <text x="65" y="245" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">A/2</text>
    <text x="65" y="165" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">A₀</text>
  </g>
  
  <!-- Резонансная кривая -->
  <path d="M 80,240 Q 120,220 140,200 T 180,160 Q 220,120 250,100 T 320,160 Q 360,200 380,220 T 420,240" 
        fill="none" stroke="#4ecdc4" stroke-width="3" opacity="0.9"/>
  
  <!-- Усиление на частоте резонанса -->
  <line x1="250" y1="100" x2="250" y2="280" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="5,5" opacity="0.7"/>
  
  <!-- Ширина резонанса -->
  <g stroke="#ffd166" stroke-width="1" opacity="0.7">
    <line x1="200" y1="280" x2="200" y2="275"/>
    <line x1="310" y1="280" x2="310" y2="275"/>
    <line x1="200" y1="270" x2="310" y2="270"/>
  </g>
  <text x="255" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffd166">γ</text>
  
  <!-- Формула амплитуды -->
  <rect x="320" y="100" width="160" height="80" fill="#2a2a3e" stroke="#4a4a6a" stroke-width="1" rx="5" opacity="0.9"/>
  <text x="400" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">A(ω) = </text>
  <text x="400" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">F₀/m</text>
  <line x1="330" y1="150" x2="470" y2="150" stroke="#ffffff" stroke-width="1"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">√((ω₀²-ω²)² + γ²ω²)</text>
  
  <!-- Подписи на кривой -->
  <text x="250" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff6b6b">A₀</text>
  <text x="180" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4ecdc4">Резонансная кривая</text>
  
  <!-- Дополнительные элементы -->
  <g opacity="0.6">
    <circle cx="250" cy="100" r="4" fill="#ff6b6b"/>
    <circle cx="200" cy="200" r="3" fill="#ffd166"/>
    <circle cx="310" cy="200" r="3" fill="#ffd166"/>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(30, 320)">
    <rect x="0" y="0" width="440" height="20" fill="#2a2a3e" stroke="#4a4a6a" stroke-width="1" rx="3" opacity="0.9"/>
    <text x="10" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">ω₀ - резонансная частота, γ - ширина резонанса, A₀ - максимальная амплитуда</text>
  </g>
</svg>