<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="greenGradient">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="3" rx="5" ry="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495E" stroke-width="1" rx="3" ry="3"/>

  <!-- Заголовок и номер урока -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">Урок 11: Вынужденные колебания. Резонанс</text>
  <text x="25" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">№11</text>

  <!-- График резонансной кривой -->
  <g transform="translate(50, 80)">
    <!-- Ось X -->
    <line x1="0" y1="150" x2="380" y2="150" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="380,150 375,145 375,155" fill="#2C3E50"/>
    <text x="390" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">ω</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="150" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="0,0 -5,5 5,5" fill="#2C3E50"/>
    <text x="-25" y="5" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">A</text>
    
    <!-- Дробь на оси Y -->
    <text x="-35" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">F₀</text>
    <line x1="-40" y1="20" x2="-40" y2="30" stroke="#2C3E50" stroke-width="1"/>
    <text x="-35" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">m</text>
    <line x1="-40" y1="35" x2="-40" y2="45" stroke="#2C3E50" stroke-width="1"/>
    <text x="-35" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">√((ω₀²−ω²)²+γ²ω²)</text>
    
    <!-- Резонансная кривая -->
    <path d="M 0,140 Q 80,130 120,50 Q 160,10 200,10 Q 240,10 280,50 Q 320,130 380,140" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
    
    <!-- Точка резонанса -->
    <circle cx="200" cy="10" r="5" fill="#E74C3C"/>
    <text x="210" y="15" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C">ω₀</text>
    
    <!-- Подписи осей -->
    <text x="190" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">Частота вынуждающей силы</text>
    
    <!-- Заголовок графика -->
    <text x="190" y="-10" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">Резонансная кривая</text>
  </g>

  <!-- Схема колебательной системы -->
  <g transform="translate(50, 260)">
    <text x="100" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">Схема колебательной системы</text>
    
    <!-- Масса -->
    <rect x="50" y="10" width="40" height="30" fill="url(#redGradient)" stroke="#C0392B" stroke-width="2"/>
    <text x="70" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">m</text>
    
    <!-- Пружина -->
    <path d="M 90,25 L 100,15 L 110,35 L 120,15 L 130,35 L 140,15 L 150,25" fill="none" stroke="#3498DB" stroke-width="2"/>
    
    <!-- Амортизатор -->
    <line x1="150" y1="25" x2="170" y2="25" stroke="#34495E" stroke-width="3"/>
    <rect x="165" y="20" width="10" height="10" fill="none" stroke="#34495E" stroke-width="2"/>
    
    <!-- Земля -->
    <line x1="40" y1="45" x2="180" y2="45" stroke="#2C3E50" stroke-width="2"/>
    <line x1="40" y1="50" x2="180" y2="50" stroke="#2C3E50" stroke-width="1"/>
    <line x1="40" y1="55" x2="180" y2="55" stroke="#2C3E50" stroke-width="1"/>
    
    <!-- Стрелка силы -->
    <line x1="180" y1="25" x2="220" y2="25" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="225" y="30" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C">F₀cosωt</text>
  </g>

  <!-- Уравнение движения -->
  <g transform="translate(280, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Уравнение движения:</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">mẍ + γẋ + kx = F₀cosωt</text>
    
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Резонансная частота:</text>
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">ω₀ = √(k/m)</text>
  </g>

  <!-- Применения резонанса -->
  <g transform="translate(50, 100)">
    <rect x="320" y="0" width="130" height="80" fill="#F8F9FA" stroke="#34495E" stroke-width="1" rx="5" ry="5"/>
    <text x="385" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">Применения резонанса:</text>
    
    <circle cx="335" cy="35" r="3" fill="#3498DB"/>
    <text x="345" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Радиоприемник</text>
    
    <circle cx="335" cy="50" r="3" fill="#3498DB"/>
    <text x="345" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Музыкальные инструменты</text>
    
    <circle cx="335" cy="65" r="3" fill="#3498DB"/>
    <text x="345" y="70" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">МРТ-томограф</text>
  </g>

  <!-- Формула добротности -->
  <g transform="translate(280, 180)">
    <rect x="0" y="0" width="150" height="50" fill="#F8F9FA" stroke="#34495E" stroke-width="1" rx="5" ry="5"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">Добротность:</text>
    <text x="75" y="40" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2C3E50">Q = ω₀/γ</text>
  </g>

  <!-- Указатель резонанса -->
  <g transform="translate(250, 80)">
    <line x1="0" y1="30" x2="0" y2="80" stroke="#E74C3C" stroke-width="1" stroke-dasharray="3,3"/>
    <polygon points="0,80 -3,75 3,75" fill="#E74C3C"/>
    <text x="5" y="85" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">Резонанс</text>
  </g>

  <!-- Определение резонанса -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="200" height="40" fill="#F8F9FA" stroke="#34495E" stroke-width="1" rx="5" ry="5"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2C3E50">Резонанс — явление резкого</text>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">увеличения амплитуды при ω = ω₀</text>
  </g>

  <!-- Определение вынужденных колебаний -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="200" height="40" fill="#F8F9FA" stroke="#34495E" stroke-width="1" rx="5" ry="5"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2C3E50">Вынужденные колебания —</text>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">колебания под действием внешней силы</text>
  </g>

  <!-- Маркер для стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C" />
    </marker>
  </defs>
</svg>