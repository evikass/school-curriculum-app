<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg9)"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Электронная проводимость металлов</text>
  <!-- Tolman-Stewart experiment -->
  <text x="130" y="45" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">Опыт Толмена-Стюарта</text>
  <!-- Coil -->
  <ellipse cx="130" cy="100" rx="60" ry="30" fill="none" stroke="#ffd700" stroke-width="2"/>
  <ellipse cx="130" cy="100" rx="40" ry="20" fill="none" stroke="#ffd700" stroke-width="1.5"/>
  <ellipse cx="130" cy="100" rx="20" ry="10" fill="none" stroke="#ffd700" stroke-width="1"/>
  <!-- Rotation arrow -->
  <path d="M90,70 Q70,60 65,80" fill="none" stroke="#55efc4" stroke-width="1.5"/>
  <polygon points="65,83 60,75 70,77" fill="#55efc4"/>
  <text x="55" y="65" fill="#55efc4" font-size="8">вращение</text>
  <!-- Stop! -->
  <text x="130" y="105" text-anchor="middle" fill="#ff7675" font-size="10">STOP!</text>
  <!-- Galvanometer -->
  <circle cx="130" cy="155" r="15" fill="none" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="130" y="159" text-anchor="middle" fill="#a29bfe" font-size="9">G</text>
  <line x1="130" y1="130" x2="130" y2="140" stroke="#a29bfe" stroke-width="1"/>
  <line x1="130" y1="170" x2="130" y2="180" stroke="#a29bfe" stroke-width="1"/>
  <text x="130" y="195" text-anchor="middle" fill="#a29bfe" font-size="8">ток!</text>
  <!-- Drude-Lorentz model -->
  <text x="310" y="45" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Модель Друде-Лоренца</text>
  <!-- Metal lattice -->
  <circle cx="260" cy="80" r="8" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <circle cx="310" cy="80" r="8" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <circle cx="360" cy="80" r="8" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <circle cx="260" cy="120" r="8" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <circle cx="310" cy="120" r="8" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <circle cx="360" cy="120" r="8" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <!-- Random electron paths -->
  <path d="M270,95 L280,90 L275,100 L290,95 L285,105" fill="none" stroke="#74b9ff" stroke-width="1"/>
  <circle cx="285" cy="105" r="3" fill="#74b9ff"/>
  <path d="M320,95 L315,105 L325,100 L330,110 L335,105" fill="none" stroke="#74b9ff" stroke-width="1"/>
  <circle cx="335" cy="105" r="3" fill="#74b9ff"/>
  <!-- E field -->
  <line x1="255" y1="140" x2="365" y2="140" stroke="#ffd700" stroke-width="2"/>
  <polygon points="365,137 372,140 365,143" fill="#ffd700"/>
  <text x="310" y="155" text-anchor="middle" fill="#ffd700" font-size="9">E</text>
  <!-- Drift -->
  <text x="310" y="170" text-anchor="middle" fill="#74b9ff" font-size="9">v_дрейфа ~ 0,1 мм/с</text>
  <text x="310" y="185" text-anchor="middle" fill="#636e72" font-size="8">v_хаотич. ~ 10^5 м/с</text>
  <!-- Temperature dependence -->
  <text x="200" y="215" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">R(T) = R0(1 + aT)</text>
  <!-- Graph R vs T -->
  <line x1="50" y1="280" x2="200" y2="280" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="50" y1="280" x2="50" y2="220" stroke="#dfe6e9" stroke-width="1"/>
  <text x="205" y="285" fill="#dfe6e9" font-size="8">T</text>
  <text x="35" y="225" fill="#dfe6e9" font-size="8">R</text>
  <!-- Metal R(T) -->
  <path d="M55,260 Q100,255 150,245 Q180,238 200,230" fill="none" stroke="#55efc4" stroke-width="2"/>
  <text x="140" y="240" fill="#55efc4" font-size="8">металл</text>
  <!-- Superconductor -->
  <path d="M55,270 L120,270 L122,240 L200,240" fill="none" stroke="#a29bfe" stroke-width="2"/>
  <text x="100" y="265" fill="#a29bfe" font-size="7">T_кр</text>
  <text x="175" y="235" fill="#a29bfe" font-size="8">сверхпр.</text>
  <!-- Semiconductor -->
  <path d="M55,250 Q100,260 150,268 Q180,273 200,278" fill="none" stroke="#ff7675" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="140" y="275" fill="#ff7675" font-size="8">полупров.</text>
</svg>