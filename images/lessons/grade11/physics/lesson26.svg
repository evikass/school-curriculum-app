<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="#0a0a0a"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2a4a6b" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#3a5a8b" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#e0e0e0" font-weight="bold">Тепловое излучение</text>
  
  <!-- График Планка -->
  <g transform="translate(50, 80)">
    <!-- Оси -->
    <line x1="0" y1="200" x2="380" y2="200" stroke="#6a8a9b" stroke-width="2"/>
    <line x1="0" y1="200" x2="0" y2="20" stroke="#6a8a9b" stroke-width="2"/>
    
    <!-- Стрелки на осях -->
    <polygon points="380,200 370,195 370,205" fill="#6a8a9b"/>
    <polygon points="0,20 -5,30 5,30" fill="#6a8a9b"/>
    
    <!-- Подписи осей -->
    <text x="380" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">ν</text>
    <text x="-15" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">R</text>
    
    <!-- Кривая Планка -->
    <path d="M 20,180 Q 50,160 80,120 T 120,80 Q 150,50 180,45 T 220,50 Q 250,60 280,90 T 320,150 Q 350,180 380,190" 
          fill="none" stroke="#ff8c00" stroke-width="3"/>
    
    <!-- Точки на кривой для разных температур -->
    <circle cx="80" cy="120" r="4" fill="#ff6600"/>
    <circle cx="140" cy="60" r="4" fill="#ff9900"/>
    <circle cx="200" cy="45" r="4" fill="#ffcc00"/>
    
    <!-- Подписи температур -->
    <text x="80" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff9900">T₁</text>
    <text x="140" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff9900">T₂</text>
    <text x="200" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff9900">T₃</text>
  </g>
  
  <!-- Формула Стефана-Больцмана -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="180" height="40" fill="#1a2a3a" stroke="#4a5a6b" stroke-width="1" rx="5"/>
    <text x="90" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0">R = σT⁴</text>
    <text x="90" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0">закон Стефана-Больцмана</text>
  </g>
  
  <!-- Формула Планка -->
  <g transform="translate(250, 280)">
    <rect x="0" y="0" width="180" height="40" fill="#1a2a3a" stroke="#4a5a6b" stroke-width="1" rx="5"/>
    <text x="90" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0">E = hν</text>
    <text x="90" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0">квант энергии</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <g transform="translate(350, 90)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#ff9900" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ff9900">h</text>
  </g>
  
  <!-- Волны излучения -->
  <g transform="translate(50, 120)">
    <path d="M 0,0 Q 10,-10 20,0 T 40,0 T 60,0" fill="none" stroke="#4a8a9b" stroke-width="1.5" opacity="0.6"/>
    <path d="M 0,10 Q 10,0 20,10 T 40,10 T 60,10" fill="none" stroke="#4a8a9b" stroke-width="1.5" opacity="0.6"/>
    <path d="M 0,20 Q 10,10 20,20 T 40,20 T 60,20" fill="none" stroke="#4a8a9b" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Подпись графика -->
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0">Спектр абсолютно черного тела</text>
</svg>