<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg14)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Магнитные свойства вещества</text>
  <!-- Three types -->
  <!-- Diamagnetic -->
  <rect x="15" y="40" width="115" height="80" rx="8" fill="#0984e3" opacity="0.15" stroke="#74b9ff" stroke-width="1"/>
  <text x="72" y="58" text-anchor="middle" fill="#74b9ff" font-size="10" font-weight="bold">Диамагнетик</text>
  <text x="72" y="73" text-anchor="middle" fill="#dfe6e9" font-size="8">m &lt; 1 (слабо)</text>
  <!-- Random arrows (anti-aligned) -->
  <line x1="40" y1="85" x2="35" y2="80" stroke="#ff7675" stroke-width="1.5"/>
  <line x1="60" y1="90" x2="55" y2="95" stroke="#ff7675" stroke-width="1.5"/>
  <line x1="80" y1="85" x2="75" y2="80" stroke="#ff7675" stroke-width="1.5"/>
  <line x1="100" y1="90" x2="95" y2="95" stroke="#ff7675" stroke-width="1.5"/>
  <text x="72" y="112" text-anchor="middle" fill="#636e72" font-size="7">Cu, Bi, H2O</text>
  <!-- Paramagnetic -->
  <rect x="142" y="40" width="115" height="80" rx="8" fill="#00b894" opacity="0.15" stroke="#55efc4" stroke-width="1"/>
  <text x="200" y="58" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Парамагнетик</text>
  <text x="200" y="73" text-anchor="middle" fill="#dfe6e9" font-size="8">m &gt; 1 (слабо)</text>
  <!-- Random arrows (slightly aligned) -->
  <line x1="165" y1="85" x2="175" y2="80" stroke="#55efc4" stroke-width="1.5"/>
  <line x1="185" y1="90" x2="195" y2="85" stroke="#55efc4" stroke-width="1.5"/>
  <line x1="210" y1="85" x2="215" y2="90" stroke="#55efc4" stroke-width="1.5"/>
  <line x1="230" y1="90" x2="240" y2="85" stroke="#55efc4" stroke-width="1.5"/>
  <text x="200" y="112" text-anchor="middle" fill="#636e72" font-size="7">Al, Pt, O2</text>
  <!-- Ferromagnetic -->
  <rect x="270" y="40" width="115" height="80" rx="8" fill="#e17055" opacity="0.15" stroke="#fab1a0" stroke-width="1"/>
  <text x="327" y="58" text-anchor="middle" fill="#fab1a0" font-size="10" font-weight="bold">Ферромагнетик</text>
  <text x="327" y="73" text-anchor="middle" fill="#dfe6e9" font-size="8">m >> 1 (сильно)</text>
  <!-- Domain arrows (aligned) -->
  <line x1="290" y1="85" x2="300" y2="80" stroke="#fab1a0" stroke-width="2"/>
  <line x1="310" y1="85" x2="320" y2="80" stroke="#fab1a0" stroke-width="2"/>
  <line x1="330" y1="85" x2="340" y2="80" stroke="#fab1a0" stroke-width="2"/>
  <line x1="350" y1="85" x2="360" y2="80" stroke="#fab1a0" stroke-width="2"/>
  <line x1="300" y1="95" x2="310" y2="90" stroke="#fab1a0" stroke-width="2"/>
  <line x1="320" y1="95" x2="330" y2="90" stroke="#fab1a0" stroke-width="2"/>
  <text x="327" y="112" text-anchor="middle" fill="#636e72" font-size="7">Fe, Ni, Co</text>
  <!-- Domains visualization -->
  <text x="200" y="145" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Домены в ферромагнетике</text>
  <!-- Unmagnetized -->
  <text x="95" y="162" text-anchor="middle" fill="#dfe6e9" font-size="8">Не намагничен</text>
  <rect x="30" y="168" width="130" height="60" rx="3" fill="#2d3436" stroke="#636e72" stroke-width="1"/>
  <!-- Random domain arrows -->
  <line x1="50" y1="185" x2="60" y2="180" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="80" y1="185" x2="70" y2="190" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="100" y1="185" x2="110" y2="180" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="130" y1="185" x2="120" y2="190" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="50" y1="210" x2="60" y2="215" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="80" y1="210" x2="90" y2="205" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="110" y1="210" x2="100" y2="215" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="140" y1="210" x2="130" y2="205" stroke="#fab1a0" stroke-width="1.5"/>
  <!-- Arrow between -->
  <line x1="168" y1="195" x2="195" y2="195" stroke="#ffd700" stroke-width="1.5"/>
  <polygon points="195,192 202,195 195,198" fill="#ffd700"/>
  <!-- Magnetized -->
  <text x="295" y="162" text-anchor="middle" fill="#dfe6e9" font-size="8">Намагничен</text>
  <rect x="230" y="168" width="130" height="60" rx="3" fill="#2d3436" stroke="#fab1a0" stroke-width="1"/>
  <!-- All domain arrows aligned -->
  <line x1="245" y1="185" x2="255" y2="180" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="270" y1="185" x2="280" y2="180" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="295" y1="185" x2="305" y2="180" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="320" y1="185" x2="330" y2="180" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="245" y1="210" x2="255" y2="205" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="270" y1="210" x2="280" y2="205" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="295" y1="210" x2="305" y2="205" stroke="#fab1a0" stroke-width="1.5"/>
  <line x1="320" y1="210" x2="330" y2="205" stroke="#fab1a0" stroke-width="1.5"/>
  <!-- B field -->
  <text x="295" y="237" text-anchor="middle" fill="#55efc4" font-size="8">B поле -></text>
  <!-- Curie temperature -->
  <rect x="30" y="250" width="340" height="40" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="200" y="268" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Температура Кюри: ферромагнетик -> парамагнетик</text>
  <text x="200" y="283" text-anchor="middle" fill="#dfe6e9" font-size="8">Fe: 770 C | Ni: 358 C | Co: 1121 C</text>
</svg>