<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#444" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#666" stroke-width="1"/>
  
  <!-- Тёмный фон -->
  <rect x="0" y="0" width="500" height="350" fill="#1a1a1a"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" fill="#fff" font-size="24" font-family="Arial, sans-serif">Поляризация света</text>
  
  <!-- Источник света -->
  <circle cx="60" cy="175" r="15" fill="#fff" opacity="0.8"/>
  <circle cx="60" cy="175" r="20" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <circle cx="60" cy="175" r="25" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  
  <!-- Неполяризованный свет (волны) -->
  <g id="unpolarized-light">
    <path d="M 80 175 Q 90 165, 100 175 T 120 175 T 140 175 T 160 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8"/>
    <path d="M 80 175 Q 90 185, 100 175 T 120 175 T 140 175 T 160 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8"/>
    <path d="M 80 175 Q 90 165, 100 175 T 120 175 T 140 175 T 160 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8" transform="translate(0,-10)"/>
    <path d="M 80 175 Q 90 185, 100 175 T 120 175 T 140 175 T 160 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8" transform="translate(0,10)"/>
  </g>
  
  <!-- Подпись: Неполяризованный свет -->
  <text x="120" y="210" text-anchor="middle" fill="#fff" font-size="12" font-family="Arial, sans-serif">Неполяризованный свет</text>
  
  <!-- Поляризатор (вертикальная решётка) -->
  <g id="polarizer">
    <rect x="170" y="150" width="5" height="50" fill="#666"/>
    <line x1="172" y1="155" x2="172" y2="195" stroke="#fff" stroke-width="1"/>
    <line x1="172" y1="160" x2="172" y2="190" stroke="#fff" stroke-width="1"/>
    <line x1="172" y1="165" x2="172" y2="185" stroke="#fff" stroke-width="1"/>
    <line x1="172" y1="170" x2="172" y2="180" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Поляризованный свет (вертикальные волны) -->
  <g id="polarized-light">
    <path d="M 180 175 Q 185 165, 190 175 T 200 175 T 210 175 T 220 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8"/>
    <path d="M 180 175 Q 185 185, 190 175 T 200 175 T 210 175 T 220 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8"/>
    <path d="M 180 175 Q 185 165, 190 175 T 200 175 T 210 175 T 220 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8" transform="translate(0,-10)"/>
    <path d="M 180 175 Q 185 185, 190 175 T 200 175 T 210 175 T 220 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.8" transform="translate(0,10)"/>
  </g>
  
  <!-- Подпись: Поляроид -->
  <text x="180" y="220" text-anchor="middle" fill="#fff" font-size="12" font-family="Arial, sans-serif">Поляроид</text>
  
  <!-- Второй поляризатор (поворачиваемый) -->
  <g id="second-polarizer" transform="rotate(45, 280, 175)">
    <rect x="270" y="150" width="5" height="50" fill="#666"/>
    <line x1="272" y1="155" x2="272" y2="195" stroke="#fff" stroke-width="1"/>
    <line x1="272" y1="160" x2="272" y2="190" stroke="#fff" stroke-width="1"/>
    <line x1="272" y1="165" x2="272" y2="185" stroke="#fff" stroke-width="1"/>
    <line x1="272" y1="170" x2="272" y2="180" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Угол поворота -->
  <path d="M 280 175 A 20 20 0 0 0 295 190" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <text x="295" y="195" fill="#fff" font-size="10" font-family="Arial, sans-serif">φ</text>
  
  <!-- Подпись: Второй поляризатор -->
  <text x="280" y="220" text-anchor="middle" fill="#fff" font-size="12" font-family="Arial, sans-serif">Второй поляризатор</text>
  
  <!-- Ослабленный свет после второго поляризатора -->
  <g id="weakened-light">
    <path d="M 290 175 Q 295 165, 300 175 T 310 175 T 320 175 T 330 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.4"/>
    <path d="M 290 175 Q 295 185, 300 175 T 310 175 T 320 175 T 330 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.4"/>
    <path d="M 290 175 Q 295 165, 300 175 T 310 175 T 320 175 T 330 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.4" transform="translate(0,-10)"/>
    <path d="M 290 175 Q 295 185, 300 175 T 310 175 T 320 175 T 330 175" fill="none" stroke="#ffcc00" stroke-width="2" opacity="0.4" transform="translate(0,10)"/>
  </g>
  
  <!-- Формула Малюса -->
  <rect x="340" y="150" width="140" height="80" fill="#2a2a2a" stroke="#444" stroke-width="1" rx="5"/>
  <text x="410" y="175" text-anchor="middle" fill="#fff" font-size="16" font-family="Arial, sans-serif">Закон Малюса</text>
  <text x="410" y="200" text-anchor="middle" fill="#ffcc00" font-size="18" font-family="Arial, sans-serif">I = I₀ cos²φ</text>
  <text x="410" y="215" text-anchor="middle" fill="#aaa" font-size="10" font-family="Arial, sans-serif">I - интенсивность</text>
  
  <!-- Стрелки направления -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fff"/>
    </marker>
  </defs>
  
  <line x1="50" y1="175" x2="70" y2="175" stroke="#fff" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="175" y1="175" x2="175" y2="175" stroke="#fff" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="265" y1="175" x2="265" y2="175" stroke="#fff" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Векторная диаграмма поляризации -->
  <g id="polarization-vectors" transform="translate(50, 280)">
    <text x="0" y="0" fill="#fff" font-size="12" font-family="Arial, sans-serif">Векторная диаграмма:</text>
    <line x1="0" y1="20" x2="0" y2="-20" stroke="#ffcc00" stroke-width="2"/>
    <line x1="0" y1="20" x2="20" y2="0" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="20" x2="-20" y2="0" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="20" x2="14" y2="-14" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="20" x2="-14" y2="-14" stroke="#ffcc00" stroke-width="2" opacity="0.5"/>
    <text x="30" y="25" fill="#aaa" font-size="10" font-family="Arial, sans-serif">Все возможные направления</text>
  </g>
  
  <!-- Интенсивность света индикатор -->
  <g id="intensity-bars" transform="translate(350, 280)">
    <rect x="0" y="0" width="15" height="40" fill="#ffcc00" opacity="0.8"/>
    <rect x="20" y="10" width="15" height="30" fill="#ffcc00" opacity="0.8"/>
    <rect x="40" y="20" width="15" height="20" fill="#ffcc00" opacity="0.8"/>
    <text x="0" y="55" fill="#aaa" font-size="10" font-family="Arial, sans-serif">I₀</text>
    <text x="20" y="55" fill="#aaa" font-size="10" font-family="Arial, sans-serif">I₁</text>
    <text x="40" y="55" fill="#aaa" font-size="10" font-family="Arial, sans-serif">I₂</text>
  </g>
</svg>