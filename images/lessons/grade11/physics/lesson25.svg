<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="500" height="350" fill="#f8f9fa"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Поляризация и дисперсия света</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">ФИЗИКА · 11 КЛАСС</text>
  <text x="460" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="end" fill="#e74c3c">Урок 25</text>
  
  <!-- Секция: Естественный и поляризованный свет -->
  <text x="30" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Естественный и поляризованный свет</text>
  
  <!-- Естественный свет -->
  <g transform="translate(50, 100)">
    <circle cx="0" cy="0" r="5" fill="#e74c3c"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="21" y2="-21" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="21" y2="21" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="-21" y2="21" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="-21" y2="-21" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Естественный свет</text>
  </g>
  
  <!-- Поляризатор -->
  <g transform="translate(150, 100)">
    <rect x="-3" y="-40" width="6" height="80" fill="#34495e"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#2c3e50" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Поляризатор</text>
  </g>
  
  <!-- Поляризованный свет -->
  <g transform="translate(250, 100)">
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="15" y2="-15" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="15" y2="15" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="-15" y2="15" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="-15" y2="-15" stroke="#e74c3c" stroke-width="2"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Поляризованный свет</text>
  </g>
  
  <!-- Анализатор -->
  <g transform="translate(350, 100)">
    <rect x="-3" y="-40" width="6" height="80" fill="#34495e" transform="rotate(45)"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#2c3e50" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Анализатор</text>
  </g>
  
  <!-- Закон Малюса -->
  <text x="30" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Закон Малюса</text>
  
  <!-- Формула Малюса -->
  <text x="30" y="205" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">I = I₀ · cos²(α)</text>
  
  <!-- График Малюса -->
  <g transform="translate(250, 180)">
    <line x1="0" y1="80" x2="100" y2="80" stroke="#2c3e50" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="#2c3e50" stroke-width="1"/>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">α</text>
    <text x="-10" y="5" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#2c3e50">I</text>
    <path d="M 0,80 Q 25,20 50,80" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="0" cy="80" r="2" fill="#2c3e50"/>
    <circle cx="50" cy="80" r="2" fill="#2c3e50"/>
    <text x="50" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Зависимость интенсивности от угла</text>
  </g>
  
  <!-- Дисперсия света -->
  <text x="30" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Дисперсия света</text>
  
  <!-- Призма -->
  <g transform="translate(100, 300)">
    <polygon points="0,0 40,-40 40,40" fill="none" stroke="#3498db" stroke-width="2"/>
    <polygon points="0,0 40,-40 40,40" fill="rgba(52, 152, 219, 0.1)"/>
  </g>
  
  <!-- Диспергированный свет -->
  <g transform="translate(150, 300)">
    <line x1="0" y1="0" x2="30" y2="-15" stroke="#e74c3c" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="-5" stroke="#f39c12" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#f1c40f" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="5" stroke="#2ecc71" stroke-width="2"/>
    <line x1="0" y1="0" x2="30" y2="15" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Спектр -->
  <g transform="translate(200, 300)">
    <rect x="0" y="-15" width="20" height="5" fill="#e74c3c"/>
    <rect x="0" y="-8" width="20" height="5" fill="#f39c12"/>
    <rect x="0" y="-1" width="20" height="5" fill="#f1c40f"/>
    <rect x="0" y="6" width="20" height="5" fill="#2ecc71"/>
    <rect x="0" y="13" width="20" height="5" fill="#3498db"/>
    <text x="30" y="-10" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Красный</text>
    <text x="30" y="-3" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">Оранжевый</text>
    <text x="30" y="4" font-family="Arial, sans-serif" font-size="10" fill="#f1c40f">Желтый</text>
    <text x="30" y="11" font-family="Arial, sans-serif" font-size="10" fill="#2ecc71">Зеленый</text>
    <text x="30" y="18" font-family="Arial, sans-serif" font-size="10" fill="#3498db">Синий</text>
  </g>
  
  <!-- Формула дисперсии -->
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">n = n₀ + k/λ²</text>
  
  <!-- Цветовая полоса -->
  <g transform="translate(320, 300)">
    <defs>
      <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#e74c3c"/>
        <stop offset="16.66%" style="stop-color:#f39c12"/>
        <stop offset="33.33%" style="stop-color:#f1c40f"/>
        <stop offset="50%" style="stop-color:#2ecc71"/>
        <stop offset="66.66%" style="stop-color:#3498db"/>
        <stop offset="83.33%" style="stop-color:#9b59b6"/>
        <stop offset="100%" style="stop-color:#8e44ad"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="80" height="20" fill="url(#spectrum)"/>
  </g>
  
  <!-- Волна света -->
  <g transform="translate(30, 250)">
    <path d="M 0,0 Q 10,-10 20,0 T 40,0" fill="none" stroke="#3498db" stroke-width="2"/>
    <path d="M 0,0 Q 10,-10 20,0 T 40,0" fill="none" stroke="#e74c3c" stroke-width="2" transform="translate(0, 20)"/>
    <path d="M 0,0 Q 10,-10 20,0 T 40,0" fill="none" stroke="#2ecc71" stroke-width="2" transform="translate(0, 40)"/>
    <text x="50" y="5" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">λ₁</text>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">λ₂</text>
    <text x="50" y="45" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">λ₃</text>
  </g>
</svg>