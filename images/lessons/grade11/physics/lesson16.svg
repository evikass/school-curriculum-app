<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Номер урока -->
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Урок 16</text>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" text-anchor="middle" font-weight="bold">Электромагнитные волны. Опыты Герца</text>
  
  <!-- Раздел 1: Теория Максвелла -->
  <text x="20" y="85" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" font-weight="bold">1. Теория Максвелла</text>
  
  <!-- Уравнения Максвелла -->
  <g transform="translate(20, 95)">
    <!-- Формула 1 -->
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="14" fill="#3498db">∮</text>
    <text x="12" y="15" font-family="Arial, sans-serif" font-size="14" fill="#3498db">E·dl = -dΦ/dt</text>
    <text x="130" y="15" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Закон электромагнитной индукции</text>
    
    <!-- Формула 2 -->
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="14" fill="#3498db">∮</text>
    <text x="12" y="35" font-family="Arial, sans-serif" font-size="14" fill="#3498db">B·dl = μ₀ε₀dΦ/dt</text>
    <text x="130" y="35" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Закон смещения Ампера</text>
    
    <!-- Формула 3 -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" fill="#3498db">∇×E = -∂B/∂t</text>
    <text x="130" y="55" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Первое уравнение Максвелла</text>
    
    <!-- Формула 4 -->
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="14" fill="#3498db">∇×B = μ₀ε₀∂E/∂t</text>
    <text x="130" y="75" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Второе уравнение Максвелла</text>
  </g>
  
  <!-- Раздел 2: Опыты Герца -->
  <text x="20" y="190" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" font-weight="bold">2. Опыты Герца</text>
  
  <!-- Схема опыта Герца -->
  <g transform="translate(20, 200)">
    <!-- Генератор -->
    <rect x="0" y="30" width="40" height="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <line x1="40" y1="40" x2="60" y2="40" stroke="#2c3e50" stroke-width="2"/>
    <line x1="40" y1="50" x2="60" y2="50" stroke="#2c3e50" stroke-width="2"/>
    <line x1="40" y1="60" x2="60" y2="60" stroke="#2c3e50" stroke-width="2"/>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Генератор</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Герца</text>
    
    <!-- Передающая антенна -->
    <line x1="60" y1="40" x2="80" y2="40" stroke="#2c3e50" stroke-width="2"/>
    <line x1="80" y1="40" x2="80" y2="20" stroke="#2c3e50" stroke-width="3"/>
    <line x1="80" y1="40" x2="80" y2="60" stroke="#2c3e50" stroke-width="3"/>
    
    <!-- Эм волна -->
    <path d="M90,40 Q100,20 110,40 T130,40 T150,40 T170,40 T190,40" stroke="#3498db" stroke-width="2" fill="none"/>
    <path d="M90,40 Q100,60 110,40 T130,40 T150,40 T170,40 T190,40" stroke="#3498db" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
    
    <!-- Приемная антенна -->
    <line x1="190" y1="40" x2="210" y2="40" stroke="#2c3e50" stroke-width="2"/>
    <line x1="210" y1="40" x2="210" y2="20" stroke="#2c3e50" stroke-width="3"/>
    <line x1="210" y1="40" x2="210" y2="60" stroke="#2c3e50" stroke-width="3"/>
    
    <!-- Детектор -->
    <rect x="210" y="35" width="40" height="10" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
    <circle cx="220" cy="40" r="3" fill="#e74c3c"/>
    <circle cx="225" cy="40" r="3" fill="#e74c3c"/>
    <circle cx="230" cy="40" r="3" fill="#e74c3c"/>
    <text x="230" y="30" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Детектор</text>
    
    <!-- Подписи к схеме -->
    <text x="100" y="15" font-family="Arial, sans-serif" font-size="10" fill="#3498db">E</text>
    <text x="100" y="70" font-family="Arial, sans-serif" font-size="10" fill="#3498db">B</text>
    <text x="150" y="85" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Электромагнитная волна</text>
  </g>
  
  <!-- Портрет Герца -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="80" height="100" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <circle cx="40" cy="30" r="15" fill="#f4d1ae" stroke="#d4a574" stroke-width="1"/>
    <path d="M25,45 Q40,35 55,45 L55,75 Q40,85 25,75 Z" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">Г. Герц</text>
    <text x="40" y="108" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" text-anchor="middle">1857-1894</text>
  </g>
  
  <!-- Раздел 3: Шкала электромагнитных волн -->
  <text x="20" y="290" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" font-weight="bold">3. Шкала электромагнитных волн</text>
  
  <!-- График шкалы -->
  <g transform="translate(20, 305)">
    <!-- Ось X -->
    <line x1="0" y1="30" x2="460" y2="30" stroke="#2c3e50" stroke-width="2"/>
    <line x1="0" y1="25" x2="0" y2="35" stroke="#2c3e50" stroke-width="2"/>
    <line x1="115" y1="25" x2="115" y2="35" stroke="#2c3e50" stroke-width="2"/>
    <line x1="230" y1="25" x2="230" y2="35" stroke="#2c3e50" stroke-width="2"/>
    <line x1="345" y1="25" x2="345" y2="35" stroke="#2c3e50" stroke-width="2"/>
    <line x1="460" y1="25" x2="460" y2="35" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Подписи оси X -->
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">10⁶</text>
    <text x="115" y="50" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">10⁸</text>
    <text x="230" y="50" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">10¹⁰</text>
    <text x="345" y="50" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">10¹²</text>
    <text x="460" y="50" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">10¹⁴</text>
    
    <text x="230" y="65" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Частота, Гц</text>
    
    <!-- Сегменты спектра -->
    <rect x="0" y="10" width="115" height="20" fill="#9b59b6" opacity="0.7"/>
    <rect x="115" y="10" width="115" height="20" fill="#3498db" opacity="0.7"/>
    <rect x="230" y="10" width="115" height="20" fill="#1abc9c" opacity="0.7"/>
    <rect x="345" y="10" width="115" height="20" fill="#f39c12" opacity="0.7"/>
    
    <!-- Подписи сегментов -->
    <text x="57.5" y="5" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Радиоволны</text>
    <text x="172.5" y="5" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Микроволны</text>
    <text x="287.5" y="5" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Инфракрасное</text>
    <text x="402.5" y="5" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Видимый свет</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <g transform="translate(370, 200)">
    <!-- Формула скорости света -->
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c" font-weight="bold">c = λν</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">c = 3×10⁸ м/с</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">— скорость света</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">λ — длина волны</text>
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">ν — частота</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="480" cy="20" r="5" fill="#3498db" opacity="0.5"/>
  <circle cx="470" cy="30" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="465" cy="15" r="4" fill="#f39c12" opacity="0.5"/>
  
  <!-- Градиент для волн -->
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1abc9c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>