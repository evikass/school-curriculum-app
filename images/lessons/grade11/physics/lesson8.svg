<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефиниции градиентов -->
  <defs>
    <linearGradient id="ropeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="ballGradient">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CD5C5C;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6F3FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4682B4" stroke-width="3" rx="5" ry="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#87CEEB" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">Урок 8: Свободные механические колебания. Математический маятник</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495E">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <text x="45" y="325" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">Урок №8</text>
  
  <!-- Фон для схемы -->
  <rect x="50" y="70" width="200" height="250" fill="url(#bgGradient)" opacity="0.5"/>
  
  <!-- Опорная точка -->
  <circle cx="150" cy="90" r="5" fill="#34495E"/>
  <rect x="145" y="85" width="10" height="10" fill="#2C3E50"/>
  
  <!-- Нить маятника -->
  <line x1="150" y1="90" x2="150" y2="250" stroke="url(#ropeGradient)" stroke-width="2"/>
  
  <!-- Маятник в отклоненном положении -->
  <line x1="150" y1="90" x2="200" y2="220" stroke="url(#ropeGradient)" stroke-width="2"/>
  
  <!-- Маятник в крайнем положении -->
  <line x1="150" y1="90" x2="220" y2="260" stroke="url(#ropeGradient)" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  
  <!-- Шарик маятника -->
  <circle cx="200" cy="220" r="12" fill="url(#ballGradient)"/>
  <circle cx="200" cy="220" r="12" fill="none" stroke="#8B0000" stroke-width="1"/>
  
  <!-- Вектор силы тяжести -->
  <line x1="200" y1="220" x2="200" y2="270" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="250" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">mg</text>
  
  <!-- Вектор силы натяжения -->
  <line x1="200" y1="220" x2="170" y2="195" stroke="#3498DB" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="155" y="190" font-family="Arial, sans-serif" font-size="10" fill="#3498DB">T</text>
  
  <!-- Угол отклонения -->
  <path d="M 150 90 A 50 50 0 0 1 185 125" fill="none" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="165" y="105" font-family="Arial, sans-serif" font-size="10" fill="#9B59B6">α</text>
  
  <!-- Равновесное положение -->
  <line x1="150" y1="90" x2="150" y2="310" stroke="#95A5A6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="155" y="305" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Положение равновесия</text>
  
  <!-- Разделитель -->
  <line x1="280" y1="70" x2="280" y2="320" stroke="#BDC3C7" stroke-width="1"/>
  
  <!-- Формула периода -->
  <rect x="290" y="80" width="190" height="80" fill="#FFFFFF" stroke="#34495E" stroke-width="1" rx="5" ry="5"/>
  <text x="385" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">Период колебаний</text>
  <text x="385" y="130" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#E74C3C">T = 2π√(l/g)</text>
  <text x="385" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7F8C8D">l - длина маятника</text>
  
  <!-- График зависимости периода от длины -->
  <rect x="290" y="180" width="190" height="120" fill="#FFFFFF" stroke="#34495E" stroke-width="1" rx="5" ry="5"/>
  <text x="385" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">Зависимость T(l)</text>
  
  <!-- Ось X -->
  <line x1="310" y1="280" x2="460" y2="280" stroke="#34495E" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="470" y="285" font-family="Arial, sans-serif" font-size="10" fill="#34495E">l</text>
  
  <!-- Ось Y -->
  <line x1="310" y1="280" x2="310" y2="210" stroke="#34495E" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="305" y="205" font-family="Arial, sans-serif" font-size="10" fill="#34495E">T</text>
  
  <!-- Кривая зависимости -->
  <path d="M 320 275 Q 350 260, 380 240 T 440 220" fill="none" stroke="#E74C3C" stroke-width="2"/>
  
  <!-- Точки на графике -->
  <circle cx="320" cy="275" r="3" fill="#E74C3C"/>
  <circle cx="360" cy="258" r="3" fill="#E74C3C"/>
  <circle cx="400" cy="240" r="3" fill="#E74C3C"/>
  <circle cx="440" cy="220" r="3" fill="#E74C3C"/>
  
  <!-- Дополнительная информация -->
  <rect x="50" y="330" width="200" height="15" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="3" ry="3"/>
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="9" fill="#34495E">Условия малых углов: sinα ≈ α</text>
  
  <!-- Физические величины -->
  <rect x="290" y="310" width="190" height="10" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="3" ry="3"/>
  <text x="300" y="317" font-family="Arial, sans-serif" font-size="9" fill="#34495E">g = 9.81 м/с² - ускорение свободного падения</text>
  
  <!-- Движущие силы -->
  <rect x="50" y="150" width="120" height="80" fill="#E8F4F8" stroke="#5DADE2" stroke-width="1" rx="5" ry="5"/>
  <text x="110" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2874A6">Уравнение движения</text>
  <text x="110" y="190" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2874A6">d²α/dt² = -(g/l)α</text>
  <text x="110" y="210" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#5D6D7E">α - угол отклонения</text>
  
  <!-- Условия колебаний -->
  <rect x="50" y="250" width="120" height="60" fill="#FFF9E6" stroke="#F7DC6F" stroke-width="1" rx="5" ry="5"/>
  <text x="110" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#B7950B">Условия колебаний</text>
  <text x="110" y="285" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7D6608">1. Отсутствие трения</text>
  <text x="110" y="300" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7D6608">2. Малые углы отклонения</text>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495E"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы декора -->
  <circle cx="30" cy="30" r="3" fill="#E74C3C" opacity="0.5"/>
  <circle cx="470" cy="30" r="3" fill="#3498DB" opacity="0.5"/>
  <circle cx="30" cy="320" r="3" fill="#2ECC71" opacity="0.5"/>
  <circle cx="470" cy="320" r="3" fill="#F39C12" opacity="0.5"/>
</svg>