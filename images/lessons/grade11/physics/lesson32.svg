<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок и номер урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Спектры излучения и поглощения. Лазеры</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial" font-size="14" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  <text x="30" y="330" font-family="Arial" font-size="12" fill="#7f8c8d">Урок 32</text>
  
  <!-- Спектральная полоса (градиент) -->
  <defs>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B00FF"/>
      <stop offset="16.66%" stop-color="#4B0082"/>
      <stop offset="33.33%" stop-color="#0000FF"/>
      <stop offset="50%" stop-color="#00FF00"/>
      <stop offset="66.66%" stop-color="#FFFF00"/>
      <stop offset="83.33%" stop-color="#FF7F00"/>
      <stop offset="100%" stop-color="#FF0000"/>
    </linearGradient>
    
    <linearGradient id="laserGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF0000" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FF0000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Спектр излучения -->
  <text x="80" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Спектр излучения</text>
  <rect x="80" y="95" width="200" height="30" fill="url(#spectrum)" rx="5"/>
  <text x="290" y="115" font-family="Arial" font-size="12" fill="#7f8c8d">непрерывный</text>
  
  <!-- Спектр поглощения -->
  <text x="80" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Спектр поглощения</text>
  <rect x="80" y="155" width="200" height="30" fill="#e0e0e0" rx="5"/>
  <line x1="100" y1="155" x2="100" y2="185" stroke="#2c3e50" stroke-width="2"/>
  <line x1="140" y1="155" x2="140" y2="185" stroke="#2c3e50" stroke-width="2"/>
  <line x1="180" y1="155" x2="180" y2="185" stroke="#2c3e50" stroke-width="2"/>
  <line x1="220" y1="155" x2="220" y2="185" stroke="#2c3e50" stroke-width="2"/>
  <line x1="260" y1="155" x2="260" y2="185" stroke="#2c3e50" stroke-width="2"/>
  <text x="290" y="175" font-family="Arial" font-size="12" fill="#7f8c8d">линейчатый</text>
  
  <!-- Линейчатый спектр -->
  <text x="80" y="205" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Линейчатый спектр</text>
  <line x1="80" y1="215" x2="280" y2="215" stroke="#2c3e50" stroke-width="1"/>
  <line x1="100" y1="215" x2="100" y2="225" stroke="#FF0000" stroke-width="2"/>
  <line x1="130" y1="215" x2="130" y2="230" stroke="#FF7F00" stroke-width="2"/>
  <line x1="160" y1="215" x2="160" y2="235" stroke="#FFFF00" stroke-width="2"/>
  <line x1="190" y1="215" x2="190" y2="230" stroke="#00FF00" stroke-width="2"/>
  <line x1="220" y1="215" x2="220" y2="225" stroke="#0000FF" stroke-width="2"/>
  <line x1="250" y1="215" x2="250" y2="225" stroke="#8B00FF" stroke-width="2"/>
  <text x="290" y="230" font-family="Arial" font-size="12" fill="#7f8c8d">атомный</text>
  
  <!-- Принцип работы лазера -->
  <text x="320" y="85" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Принцип лазера</text>
  
  <!-- Атомы -->
  <circle cx="340" cy="110" r="15" fill="#3498db" stroke="#2c3e50" stroke-width="1"/>
  <circle cx="340" cy="110" r="5" fill="#e74c3c"/>
  <text x="340" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Атом</text>
  
  <circle cx="380" cy="110" r="15" fill="#e74c3c" stroke="#2c3e50" stroke-width="1"/>
  <circle cx="380" cy="110" r="5" fill="#f1c40f"/>
  <text x="380" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Возбуждённый</text>
  
  <!-- Фотон -->
  <line x1="340" y1="110" x2="380" y2="110" stroke="#f1c40f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="360" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#f39c12">фотон</text>
  
  <!-- Стимулированное излучение -->
  <line x1="380" y1="110" x2="420" y2="110" stroke="#f1c40f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="105" x2="420" y2="105" stroke="#f1c40f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#f39c12">2 фотона</text>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f1c40f"/>
    </marker>
  </defs>
  
  <!-- Схема лазера -->
  <text x="320" y="175" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Схема лазера</text>
  
  <!-- Оптическая схема -->
  <rect x="330" y="185" width="40" height="60" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <line x1="330" y1="215" x2="290" y2="215" stroke="#2c3e50" stroke-width="1"/>
  <text x="285" y="220" text-anchor="end" font-family="Arial" font-size="10" fill="#2c3e50">вход</text>
  
  <line x1="370" y1="215" x2="410" y2="215" stroke="#2c3e50" stroke-width="1"/>
  <text x="415" y="220" font-family="Arial" font-size="10" fill="#2c3e50">выход</text>
  
  <!-- Зеркала -->
  <rect x="325" y="190" width="5" height="50" fill="#3498db"/>
  <rect x="370" y="190" width="5" height="50" fill="#3498db"/>
  <text x="330" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">зеркало</text>
  <text x="375" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">зеркало</text>
  
  <!-- Лазерный луч -->
  <rect x="330" y="212" width="40" height="6" fill="url(#laserGlow)"/>
  
  <!-- Формула энергии фотона -->
  <text x="80" y="280" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Энергия фотона:</text>
  <text x="80" y="305" font-family="Arial" font-size="16" fill="#2c3e50">E = hν = hc/λ</text>
  
  <!-- Обозначения -->
  <text x="80" y="330" font-family="Arial" font-size="10" fill="#7f8c8d">h - постоянная Планcka</text>
  <text x="200" y="330" font-family="Arial" font-size="10" fill="#7f8c8d">ν - частота</text>
  <text x="260" y="330" font-family="Arial" font-size="10" fill="#7f8c8d">c - скорость света</text>
  <text x="350" y="330" font-family="Arial" font-size="10" fill="#7f8c8d">λ - длина волны</text>
  
  <!-- Дополнительные элементы декора -->
  <circle cx="480" cy="30" r="3" fill="#e74c3c"/>
  <circle cx="480" cy="40" r="3" fill="#f39c12"/>
  <circle cx="480" cy="50" r="3" fill="#2ecc71"/>
  <circle cx="480" cy="60" r="3" fill="#3498db"/>
  <circle cx="480" cy="70" r="3" fill="#9b59b6"/>
</svg>