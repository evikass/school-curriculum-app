<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a4a8a" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#2a2a5a" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#e0e0ff">Спектры и лазеры</text>
  
  <!-- Спектральные линии -->
  <g transform="translate(50, 80)">
    <text x="0" y="-10" font-family="Arial" font-size="14" fill="#a0a0ff">Спектр излучения:</text>
    
    <!-- Красный -->
    <rect x="0" y="0" width="20" height="80" fill="#ff4444" opacity="0.8"/>
    <text x="10" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#ffaaaa">λ₁</text>
    
    <!-- Оранжевый -->
    <rect x="25" y="20" width="20" height="60" fill="#ff8844" opacity="0.8"/>
    <text x="35" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#ffaa88">λ₂</text>
    
    <!-- Желтый -->
    <rect x="50" y="10" width="20" height="70" fill="#ffdd44" opacity="0.8"/>
    <text x="60" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#ffff88">λ₃</text>
    
    <!-- Зеленый -->
    <rect x="75" y="15" width="20" height="65" fill="#44ff44" opacity="0.8"/>
    <text x="85" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#aaffaa">λ₄</text>
    
    <!-- Синий -->
    <rect x="100" y="5" width="20" height="75" fill="#4488ff" opacity="0.8"/>
    <text x="110" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#88aaff">λ₅</text>
    
    <!-- Фиолетовый -->
    <rect x="125" y="25" width="20" height="55" fill="#8844ff" opacity="0.8"/>
    <text x="135" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#aaaaff">λ₆</text>
    
    <!-- Формула энергии -->
    <text x="0" y="125" font-family="Arial" font-size="12" fill="#c0c0ff">E = hν = hc/λ</text>
  </g>
  
  <!-- Схема лазера -->
  <g transform="translate(280, 100)">
    <text x="70" y="-10" font-family="Arial" font-size="14" fill="#a0a0ff">Схема лазера:</text>
    
    <!-- Левое зеркало (полностью отражающее) -->
    <rect x="20" y="30" width="5" height="80" fill="#e0e0ff" filter="url(#glow)"/>
    <text x="22" y="130" font-family="Arial" font-size="10" text-anchor="middle" fill="#c0c0ff">100%</text>
    
    <!-- Активная среда -->
    <rect x="30" y="40" width="80" height="60" fill="#ff6644" opacity="0.3" stroke="#ff8866" stroke-width="1"/>
    <text x="70" y="75" font-family="Arial" font-size="12" text-anchor="middle" fill="#ffaa88">Активная среда</text>
    
    <!-- Атомы в активной среде -->
    <circle cx="45" cy="60" r="3" fill="#ffddaa" opacity="0.8"/>
    <circle cx="65" cy="70" r="3" fill="#ffddaa" opacity="0.8"/>
    <circle cx="85" cy="65" r="3" fill="#ffddaa" opacity="0.8"/>
    <circle cx="55" cy="80" r="3" fill="#ffddaa" opacity="0.8"/>
    <circle cx="75" cy="55" r="3" fill="#ffddaa" opacity="0.8"/>
    
    <!-- Правое зеркало (частично отражающее) -->
    <rect x="115" y="30" width="5" height="80" fill="#e0e0ff" filter="url(#glow)"/>
    <text x="117" y="130" font-family="Arial" font-size="10" text-anchor="middle" fill="#c0c0ff">95%</text>
    
    <!-- Излучение -->
    <line x1="120" y1="70" x2="160" y2="70" stroke="#ffff44" stroke-width="2" filter="url(#glow)"/>
    <polygon points="160,65 170,70 160,75" fill="#ffff44" filter="url(#glow)"/>
    
    <!-- Условия генерации -->
    <text x="70" y="160" font-family="Arial" font-size="11" text-anchor="middle" fill="#c0c0ff">Условия генерации:</text>
    <text x="70" y="175" font-family="Arial" font-size="10" text-anchor="middle" fill="#c0c0ff">N₂ > N₁ (обратная населенность)</text>
    <text x="70" y="190" font-family="Arial" font-size="10" text-anchor="middle" fill="#c0c0ff">R > Rₚор (пороговый режим)</text>
  </g>
  
  <!-- Уровни энергии -->
  <g transform="translate(30, 250)">
    <text x="0" y="0" font-family="Arial" font-size="14" fill="#a0a0ff">Уровни энергии:</text>
    
    <!-- Основной уровень -->
    <line x1="0" y1="30" x2="150" y2="30" stroke="#a0a0ff" stroke-width="1"/>
    <text x="160" y="35" font-family="Arial" font-size="12" fill="#c0c0ff">E₁ (основной)</text>
    
    <!-- Возбужденные уровни -->
    <line x1="0" y1="10" x2="150" y2="10" stroke="#ffaa44" stroke-width="1"/>
    <text x="160" y="15" font-family="Arial" font-size="12" fill="#ffcc88">E₂ (возбужденный)</text>
    
    <!-- Стрелки переходов -->
    <line x1="30" y1="25" x2="30" y2="15" stroke="#ff6644" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="35" y="22" font-family="Arial" font-size="10" fill="#ffaa88">абсорбция</text>
    
    <line x1="70" y1="15" x2="70" y2="25" stroke="#44ff44" stroke-width="2" marker-end="url(#arrowhead2)"/>
    <text x="75" y="22" font-family="Arial" font-size="10" fill="#aaffaa">спонтанное изл.</text>
    
    <line x1="110" y1="15" x2="110" y2="25" stroke="#44ff44" stroke-width="2" marker-end="url(#arrowhead3)"/>
    <text x="115" y="22" font-family="Arial" font-size="10" fill="#aaffaa">индуцированное изл.</text>
  </g>
  
  <!-- Стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6644"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44ff44"/>
    </marker>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44ff44"/>
    </marker>
  </defs>
</svg>