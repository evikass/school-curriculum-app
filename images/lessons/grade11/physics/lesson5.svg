<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- ФИЗИКА · 11 КЛАСС -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e74c3c">Урок 5: Закон электромагнитной индукции. Правило Ленца</text>
  
  <!-- Номер урока в углу -->
  <text x="460" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">№5</text>
  
  <!-- Левая часть: Магнитное поле и проводник -->
  <g transform="translate(50, 80)">
    <!-- Магнитные силовые линии -->
    <path d="M 0,30 Q 30,20 60,30" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="2,2"/>
    <path d="M 0,50 Q 30,40 60,50" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="2,2"/>
    <path d="M 0,70 Q 30,60 60,70" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="2,2"/>
    <path d="M 0,90 Q 30,80 60,90" fill="none" stroke="#3498db" stroke-width="1.5" stroke-dasharray="2,2"/>
    
    <!-- Северный полюс магнита -->
    <rect x="65" y="40" width="20" height="40" fill="#e74c3c" rx="3"/>
    <text x="75" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">N</text>
    
    <!-- Южный полюс магнита -->
    <rect x="-20" y="40" width="20" height="40" fill="#3498db" rx="3"/>
    <text x="-10" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">S</text>
    
    <!-- Проводник -->
    <rect x="30" y="30" width="30" height="40" fill="none" stroke="#2c3e50" stroke-width="3"/>
    
    <!-- Стрелка движения -->
    <path d="M 45,20 L 45,5 L 40,10 M 45,5 L 50,10" fill="none" stroke="#27ae60" stroke-width="2"/>
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">v</text>
    
    <!-- Индуцированная ЭДС -->
    <path d="M 20,50 L 30,50 L 30,55 L 40,45 L 50,55 L 50,50 L 70,50" fill="none" stroke="#e67e22" stroke-width="2"/>
    <text x="45" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">ε</text>
    
    <!-- Подпись к схеме -->
    <text x="25" y="95" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Движущийся проводник в магнитном поле</text>
  </g>
  
  <!-- Формула закона Фарадея -->
  <g transform="translate(200, 140)">
    <rect x="0" y="0" width="280" height="50" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Закон Фарадея:</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">ε = -dΦ/dt = -d(B·S·cosα)/dt</text>
  </g>
  
  <!-- Правило Ленца -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="400" height="80" fill="#eafaf1" stroke="#27ae60" stroke-width="1" rx="5"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">Правило Ленца:</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Индуцированный ток направлен так, что его действие</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">противопоставлено причине, вызывающей это явление</text>
  </g>
  
  <!-- Примеры применения -->
  <g transform="translate(50, 300)">
    <!-- Генератор -->
    <circle cx="50" cy="15" r="15" fill="none" stroke="#34495e" stroke-width="2"/>
    <path d="M 50,15 L 50,5" fill="none" stroke="#34495e" stroke-width="2"/>
    <path d="M 50,15 L 60,15" fill="none" stroke="#34495e" stroke-width="2"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Генератор</text>
    
    <!-- Трансформатор -->
    <rect x="120" y="5" width="10" height="20" fill="none" stroke="#34495e" stroke-width="2"/>
    <rect x="140" y="5" width="10" height="20" fill="none" stroke="#34495e" stroke-width="2"/>
    <path d="M 130,15 Q 135,10 140,15" fill="none" stroke="#34495e" stroke-width="1"/>
    <text x="160" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Трансформатор</text>
    
    <!-- Индукционная печь -->
    <rect x="240" y="5" width="40" height="20" fill="none" stroke="#34495e" stroke-width="2" rx="2"/>
    <circle cx="260" cy="15" r="8" fill="none" stroke="#34495e" stroke-width="2"/>
    <text x="290" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Индукционная печь</text>
  </g>
  
  <!-- Портрет Ленца -->
  <g transform="translate(370, 100)">
    <circle cx="25" cy="25" r="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    <circle cx="25" cy="20" r="8" fill="#7f8c8d"/>
    <path d="M 15,30 Q 25,35 35,30" fill="none" stroke="#7f8c8d" stroke-width="2"/>
    <text x="25" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Э.Х. Ленц</text>
    <text x="25" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">1804-1865</text>
  </g>
  
  <!-- График зависимости ЭДС от времени -->
  <g transform="translate(200, 200)">
    <rect x="0" y="0" width="280" height="120" fill="#f8f9fa" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Зависимость ЭДС от времени</text>
    
    <!-- Оси -->
    <line x1="30" y1="100" x2="250" y2="100" stroke="#2c3e50" stroke-width="1"/>
    <line x1="30" y1="100" x2="30" y2="30" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- График -->
    <path d="M 30,70 Q 60,60 90,70 T 150,70 Q 180,60 210,70 T 250,70" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Подписи осей -->
    <text x="140" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t</text>
    <text x="15" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ε</text>
  </g>
  
  <!-- Уравнение для ЭДС в движущемся проводнике -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="140" height="30" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="3"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">ε = B·l·v·sinα</text>
  </g>
  
  <!-- Обозначения -->
  <g transform="translate(50, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">B - индукция магнитного поля</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">l - длина проводника</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">v - скорость движения</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">α - угол между v и B</text>
  </g>
</svg>