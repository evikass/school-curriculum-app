<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg25" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="protectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow25">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rustGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg25)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Коррозия металлов и защита от неё</text>

  <!-- Divider -->
  <line x1="50" y1="48" x2="750" y2="48" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- === RUSTING PROCESS (TOP LEFT) === -->
  <rect x="30" y="58" width="370" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="215" y="78" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">Ржавление железа</text>

  <!-- Clean iron -->
  <rect x="50" y="95" width="55" height="30" rx="4" fill="rgba(148,163,184,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="77" y="115" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Fe</text>
  <text x="77" y="140" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">чистое</text>

  <!-- Arrow -->
  <line x1="115" y1="110" x2="155" y2="110" stroke="#ef4444" stroke-width="2"/>
  <polygon points="155,105 165,110 155,115" fill="#ef4444"/>
  <text x="137" y="100" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">+ O₂ + H₂O</text>

  <!-- Rusting iron -->
  <rect x="175" y="95" width="55" height="30" rx="4" fill="url(#rustGrad)" stroke="#ef4444" stroke-width="1.5" filter="url(#rustGlow)"/>
  <text x="202" y="112" font-family="Arial, sans-serif" font-size="8" fill="#fef2f2" text-anchor="middle" font-weight="bold">Fe₂O₃</text>
  <text x="202" y="122" font-family="Arial, sans-serif" font-size="7" fill="#fef2f2" text-anchor="middle">·nH₂O</text>
  <text x="202" y="140" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">ржавчина</text>

  <!-- Rust spots on iron -->
  <circle cx="250" cy="105" r="5" fill="rgba(185,28,28,0.6)" filter="url(#rustGlow)"/>
  <circle cx="260" cy="118" r="4" fill="rgba(185,28,28,0.5)"/>
  <circle cx="248" cy="120" r="3" fill="rgba(185,28,28,0.4)"/>
  <circle cx="265" cy="108" r="3.5" fill="rgba(185,28,28,0.5)"/>

  <!-- Overall equation -->
  <rect x="50" y="148" width="330" height="22" rx="4" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.5"/>
  <text x="215" y="164" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5" text-anchor="middle">4Fe + 3O₂ + 6H₂O → 4Fe(OH)₃ → Fe₂O₃·nH₂O</text>

  <!-- === ELECTROCHEMICAL CORROSION (TOP RIGHT) === -->
  <rect x="415" y="58" width="360" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="595" y="78" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">Электрохимическая коррозия</text>

  <!-- Micro-galvanic cell diagram -->
  <!-- Iron surface -->
  <rect x="435" y="95" width="320" height="35" rx="4" fill="rgba(148,163,184,0.2)" stroke="#94a3b8" stroke-width="1"/>

  <!-- Anode zone -->
  <rect x="440" y="100" width="70" height="25" rx="3" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
  <text x="475" y="117" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">Анод (Fe)</text>

  <!-- Cathode zone -->
  <rect x="530" y="100" width="80" height="25" rx="3" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="1"/>
  <text x="570" y="117" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Катод (C/примесь)</text>

  <!-- Electron flow arrow -->
  <path d="M515,112 L525,112" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="525,108 533,112 525,116" fill="#f59e0b"/>
  <text x="527" y="105" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b">ē</text>

  <!-- Anode reaction -->
  <rect x="435" y="135" width="140" height="18" rx="3" fill="rgba(239,68,68,0.1)"/>
  <text x="505" y="149" font-family="Arial, sans-serif" font-size="9" fill="#fca5a5">Fe → Fe²⁺ + 2ē⁻</text>

  <!-- Cathode reaction -->
  <rect x="590" y="135" width="175" height="18" rx="3" fill="rgba(20,184,166,0.1)"/>
  <text x="677" y="149" font-family="Arial, sans-serif" font-size="9" fill="#5eead4">O₂ + 2H₂O + 4ē⁻ → 4OH⁻</text>

  <!-- Water droplet -->
  <path d="M640,90 C640,82 650,75 650,75 C650,75 660,82 660,90 C660,96 656,100 650,100 C644,100 640,96 640,90Z" fill="rgba(14,165,233,0.3)" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="650" y="95" font-family="Arial, sans-serif" font-size="7" fill="#7dd3fc" text-anchor="middle">H₂O</text>

  <!-- O2 label -->
  <text x="680" y="95" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">O₂</text>

  <!-- === PROTECTION METHODS (BOTTOM) === -->
  <rect x="30" y="190" width="740" height="300" rx="10" fill="rgba(30,41,59,0.7)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="214" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981" text-anchor="middle">Методы защиты от коррозии</text>

  <!-- Method 1: Coating (Покрытие) -->
  <rect x="50" y="228" width="220" height="140" rx="8" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="1"/>
  <rect x="60" y="233" width="200" height="22" rx="4" fill="rgba(16,185,129,0.15)"/>
  <text x="160" y="249" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">1. Покрытие</text>

  <!-- Paint coating visual -->
  <rect x="80" y="268" width="80" height="22" rx="3" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="283" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>
  <!-- Paint layer -->
  <rect x="78" y="264" width="84" height="6" rx="2" fill="rgba(59,130,246,0.5)" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="120" y="268" font-family="Arial, sans-serif" font-size="6" fill="#93c5fd" text-anchor="middle">краска</text>

  <!-- Zinc coating visual -->
  <rect x="80" y="308" width="80" height="22" rx="3" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="323" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>
  <!-- Zinc layer -->
  <rect x="78" y="304" width="84" height="6" rx="2" fill="rgba(245,158,11,0.5)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="120" y="308" font-family="Arial, sans-serif" font-size="6" fill="#fcd34d" text-anchor="middle">Zn (оцинковка)</text>

  <!-- Polymer coating -->
  <rect x="80" y="345" width="80" height="22" rx="3" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="360" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>
  <!-- Polymer layer -->
  <rect x="78" y="341" width="84" height="6" rx="2" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="120" y="345" font-family="Arial, sans-serif" font-size="6" fill="#c4b5fd" text-anchor="middle">полимер</text>

  <!-- Labels -->
  <text x="200" y="283" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Лакокрасочное</text>
  <text x="200" y="323" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Металлическое</text>
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Неметаллическое</text>

  <!-- Method 2: Sacrificial Anode (Протектор) -->
  <rect x="285" y="228" width="220" height="140" rx="8" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1"/>
  <rect x="295" y="233" width="200" height="22" rx="4" fill="rgba(245,158,11,0.15)"/>
  <text x="395" y="249" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="bold">2. Протекторная защита</text>

  <!-- Iron structure -->
  <rect x="330" y="270" width="60" height="50" rx="4" fill="rgba(148,163,184,0.3)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="360" y="300" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Fe</text>

  <!-- Sacrificial anode (Mg/Zn) -->
  <rect x="420" y="275" width="40" height="40" rx="4" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow25)"/>
  <text x="440" y="300" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">Mg</text>

  <!-- Wire/connection -->
  <line x1="390" y1="295" x2="420" y2="295" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Electron flow -->
  <path d="M420,285 L400,285" fill="none" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrowEnd)"/>
  <text x="412" y="280" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">ē</text>

  <!-- Explanation -->
  <text x="395" y="335" font-family="Arial, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle">Mg (или Zn) окисляется</text>
  <text x="395" y="348" font-family="Arial, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle">вместо Fe — «жертвенный»</text>
  <text x="395" y="361" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">анод (протектор)</text>

  <!-- Method 3: Alloying (Легирование) -->
  <rect x="520" y="228" width="235" height="140" rx="8" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="530" y="233" width="215" height="22" rx="4" fill="rgba(139,92,246,0.15)"/>
  <text x="637" y="249" font-family="Arial, sans-serif" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="bold">3. Легирование</text>

  <!-- Alloy visual - mixed atoms -->
  <!-- Iron atoms -->
  <circle cx="575" cy="290" r="12" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="575" y="294" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>

  <circle cx="610" cy="290" r="12" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="610" y="294" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>

  <circle cx="645" cy="290" r="12" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="645" y="294" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>

  <circle cx="680" cy="290" r="12" fill="rgba(148,163,184,0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="680" y="294" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>

  <!-- Chromium/Nickel atoms (alloying elements) -->
  <circle cx="592" cy="315" r="12" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow25)"/>
  <text x="592" y="319" font-family="Arial, sans-serif" font-size="9" fill="#c4b5fd" text-anchor="middle">Cr</text>

  <circle cx="662" cy="315" r="12" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow25)"/>
  <text x="662" y="319" font-family="Arial, sans-serif" font-size="9" fill="#c4b5fd" text-anchor="middle">Ni</text>

  <!-- Explanation -->
  <text x="637" y="348" font-family="Arial, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle">Добавка Cr, Ni в сплав</text>
  <text x="637" y="361" font-family="Arial, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle">→ нержавеющая сталь</text>

  <!-- === COMPARISON: Protected vs Unprotected === -->
  <rect x="50" y="380" width="345" height="55" rx="8" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
  <text x="222" y="398" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">Без защиты</text>
  <!-- Rusting metal -->
  <rect x="80" y="405" width="60" height="22" rx="3" fill="url(#rustGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="420" font-family="Arial, sans-serif" font-size="9" fill="#fef2f2" text-anchor="middle">Fe₂O₃·nH₂O</text>
  <!-- Time arrow -->
  <text x="180" y="420" font-family="Arial, sans-serif" font-size="16" fill="#ef4444">→</text>
  <!-- Destroyed metal -->
  <rect x="210" y="405" width="60" height="22" rx="3" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="240" y="420" font-family="Arial, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle">разрушение</text>
  <text x="320" y="415" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">✗</text>

  <rect x="410" y="380" width="345" height="55" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1"/>
  <text x="582" y="398" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">С защитой</text>
  <!-- Protected metal -->
  <rect x="435" y="405" width="60" height="22" rx="3" fill="rgba(148,163,184,0.3)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="465" y="420" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe</text>
  <!-- Protection layer -->
  <rect x="433" y="401" width="64" height="6" rx="2" fill="rgba(16,185,129,0.4)" stroke="#10b981" stroke-width="0.5"/>
  <!-- Time arrow -->
  <text x="530" y="420" font-family="Arial, sans-serif" font-size="16" fill="#10b981">→</text>
  <!-- Still intact -->
  <rect x="560" y="405" width="60" height="22" rx="3" fill="rgba(148,163,184,0.3)" stroke="#10b981" stroke-width="1.5"/>
  <text x="590" y="420" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Fe ✓</text>
  <!-- Protection layer still there -->
  <rect x="558" y="401" width="64" height="6" rx="2" fill="rgba(16,185,129,0.4)" stroke="#10b981" stroke-width="0.5"/>

  <!-- === BOTTOM SUMMARY === -->
  <rect x="100" y="445" width="600" height="40" rx="8" fill="rgba(14,165,233,0.1)" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="400" y="463" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="bold">Коррозия — самопроизвольное разрушение металла под действием окружающей среды</text>
  <text x="400" y="479" font-family="Arial, sans-serif" font-size="10" fill="#7dd3fc" text-anchor="middle">Химическая (сухая) → O₂, газы | Электрохимическая (влажная) → O₂ + H₂O + электролит</text>
</svg>