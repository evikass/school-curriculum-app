<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg38" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="hdr38" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow38">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed38">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg38)" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="44" fill="url(#hdr38)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#hdr38)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Химия и экология</text>

  <!-- === AIR POLLUTION (TOP LEFT) === -->
  <rect x="15" y="54" width="250" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="72" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">Загрязнение воздуха</text>
  <!-- Smokestack icon -->
  <rect x="30" y="82" width="14" height="40" rx="2" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="0.8"/>
  <path d="M30 82 Q26 72 32 62 Q28 55 35 48" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <path d="M40 82 Q46 70 38 60 Q44 50 36 42" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <path d="M36 82 Q30 70 38 58" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <!-- Pollutants -->
  <text x="60" y="94" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">SO₂</text>
  <text x="100" y="94" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">NOₓ</text>
  <text x="140" y="94" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">CO₂</text>
  <text x="180" y="94" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">CO</text>
  <text x="210" y="94" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">тв. частицы</text>
  <!-- Sources -->
  <text x="25" y="112" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Источники:</text>
  <text x="25" y="125" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• ТЭС (уголь, мазут) → SO₂, CO₂</text>
  <text x="25" y="138" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Автотранспорт → NOₓ, CO</text>
  <text x="25" y="151" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Металлургия → SO₂, пыль</text>
  <text x="25" y="164" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Хим. заводы → VOC, аэрозоли</text>
  <text x="25" y="182" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">ПДК: SO₂ — 0.5 мг/м³, NO₂ — 0.085 мг/м³</text>

  <!-- === WATER POLLUTION (TOP MIDDLE) === -->
  <rect x="275" y="54" width="245" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#ef4444" stroke-width="1"/>
  <text x="397" y="72" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">Загрязнение воды</text>
  <!-- Water wave -->
  <path d="M285 95 Q310 88 335 95 Q360 102 385 95 Q410 88 435 95 Q460 102 505 95" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <path d="M285 103 Q310 96 335 103 Q360 110 385 103 Q410 96 435 103 Q460 110 505 103" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.3"/>
  <!-- Pollutants list -->
  <text x="285" y="120" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Тяжёлые металлы (Pb, Hg, Cd)</text>
  <text x="285" y="133" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Пестициды и гербициды</text>
  <text x="285" y="146" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Нефтеразливы (ПАУ)</text>
  <text x="285" y="159" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Фосфаты → эвтрофикация</text>
  <text x="285" y="172" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Нитраты (NO₃⁻) в питьевой воде</text>
  <text x="285" y="185" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">ПДК NO₃⁻: 45 мг/л, Hg: 0.0005 мг/л</text>

  <!-- === GREENHOUSE EFFECT (TOP RIGHT) === -->
  <rect x="530" y="54" width="255" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#f59e0b" stroke-width="1"/>
  <text x="657" y="72" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Парниковый эффект</text>
  <!-- Earth circle -->
  <circle cx="610" cy="115" r="28" fill="none" stroke="#14b8a6" stroke-width="1.5" filter="url(#glow38)"/>
  <circle cx="610" cy="115" r="22" fill="rgba(20,184,166,0.15)"/>
  <path d="M592 108 Q600 100 610 105 Q620 98 628 108" fill="none" stroke="#10b981" stroke-width="0.8"/>
  <path d="M595 118 Q605 112 612 118 Q620 113 625 120" fill="none" stroke="#10b981" stroke-width="0.8"/>
  <!-- Sun rays -->
  <line x1="580" y1="80" x2="600" y2="95" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <line x1="570" y1="90" x2="595" y2="100" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <line x1="575" y1="105" x2="590" y2="108" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <!-- Reflected heat trapped -->
  <path d="M630 105 Q660 100 670 115 Q680 130 660 135 Q640 140 630 125" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2" filter="url(#glowRed38)"/>
  <text x="680" y="108" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">ИК</text>
  <!-- Greenhouse gases -->
  <text x="640" y="155" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">CO₂ — 76%</text>
  <text x="640" y="167" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">CH₄ — 16%</text>
  <text x="640" y="179" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">N₂O — 6%</text>
  <text x="640" y="191" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">Фреоны — 2%</text>
  <text x="540" y="162" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">↑CO₂: 280→420 ppm</text>
  <text x="540" y="174" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">ΔT ≈ +1.1°C с 1900 г.</text>
  <text x="540" y="186" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">Киотский протокол, Парижское соглашение</text>

  <!-- === ACID RAIN CYCLE (BOTTOM LEFT) === -->
  <rect x="15" y="202" width="385" height="142" rx="8" fill="rgba(30,41,59,0.8)" stroke="#ef4444" stroke-width="1"/>
  <text x="207" y="220" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">Цикл кислотных дождей</text>
  <!-- Step 1: Emission -->
  <rect x="25" y="228" width="80" height="34" rx="4" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="0.8"/>
  <text x="65" y="242" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">Выбросы</text>
  <text x="65" y="255" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">SO₂, NOₓ</text>
  <!-- Arrow -->
  <line x1="108" y1="245" x2="130" y2="245" stroke="#ef4444" stroke-width="1.2"/>
  <polygon points="130,245 125,241 125,249" fill="#ef4444"/>
  <!-- Step 2: Chemical reaction -->
  <rect x="132" y="228" width="110" height="34" rx="4" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="187" y="242" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">Реакции в атмосфере</text>
  <text x="187" y="255" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0" text-anchor="middle">SO₂→H₂SO₄ NOₓ→HNO₃</text>
  <!-- Arrow -->
  <line x1="245" y1="245" x2="267" y2="245" stroke="#ef4444" stroke-width="1.2"/>
  <polygon points="267,245 262,241 262,249" fill="#ef4444"/>
  <!-- Step 3: Acid rain -->
  <rect x="269" y="228" width="60" height="34" rx="4" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="299" y="242" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">Кислот.</text>
  <text x="299" y="255" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">дождь</text>
  <!-- Arrow down -->
  <line x1="299" y1="265" x2="299" y2="282" stroke="#8b5cf6" stroke-width="1.2"/>
  <polygon points="299,282 295,277 303,277" fill="#8b5cf6"/>
  <!-- Step 4: Damage -->
  <rect x="240" y="284" width="150" height="48" rx="4" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.8"/>
  <text x="315" y="298" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">Последствия:</text>
  <text x="250" y="311" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">• Гибель лесов и озёр (pH&lt;5)</text>
  <text x="250" y="323" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0">• Коррозия металлов, разрушение камня</text>
  <!-- Chemical equations -->
  <text x="25" y="278" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">2SO₂ + O₂ → 2SO₃</text>
  <text x="25" y="292" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">SO₃ + H₂O → H₂SO₄</text>
  <text x="25" y="306" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">3NO₂ + H₂O → 2HNO₃ + NO</text>
  <text x="25" y="325" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">pH норм. дождя ≈ 5.6, кислот. &lt; 5.0</text>

  <!-- === OZONE DEPLETION (BOTTOM MIDDLE) === -->
  <rect x="410" y="202" width="180" height="142" rx="8" fill="rgba(30,41,59,0.8)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="220" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Озоновая дыра</text>
  <!-- Ozone layer arc -->
  <path d="M425 250 Q500 220 575 250" fill="none" stroke="#14b8a6" stroke-width="2" filter="url(#glow38)"/>
  <text x="500" y="248" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">O₃ слой</text>
  <!-- Hole in ozone -->
  <path d="M475 238 Q490 232 505 238" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="2,2"/>
  <!-- CFC molecule -->
  <text x="490" y="232" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">CFCs↓</text>
  <!-- UV rays through hole -->
  <line x1="485" y1="252" x2="480" y2="275" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <line x1="495" y1="252" x2="497" y2="275" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <line x1="505" y1="252" x2="510" y2="275" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="495" y="286" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">УФ-излучение</text>
  <!-- Reactions -->
  <text x="420" y="300" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">CFCl₃ → CFCl₂ + Cl·</text>
  <text x="420" y="312" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Cl· + O₃ → ClO· + O₂</text>
  <text x="420" y="324" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">1 атом Cl → 10⁵ O₃!</text>
  <text x="420" y="338" font-family="Arial, sans-serif" font-size="7" fill="#10b981">Монреальский протокол (1987)</text>

  <!-- === SOLUTIONS (BOTTOM RIGHT) === -->
  <rect x="600" y="202" width="185" height="142" rx="8" fill="rgba(30,41,59,0.8)" stroke="#10b981" stroke-width="1"/>
  <text x="692" y="220" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">Решения</text>
  <!-- Green checkmarks with solutions -->
  <text x="610" y="240" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="240" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Каталитические нейтрализаторы</text>
  <text x="610" y="256" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="256" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Очистка сточных вод</text>
  <text x="610" y="272" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="272" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Зелёная химия</text>
  <text x="610" y="288" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="288" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Альт. энергетика (H₂, солнце)</text>
  <text x="610" y="304" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="304" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Рециклинг и безотходное пр-во</text>
  <text x="610" y="320" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="320" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Замена CFC на HCFC, HFC</text>
  <text x="610" y="336" font-family="Arial, sans-serif" font-size="9" fill="#10b981">✓</text>
  <text x="625" y="336" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Десульфуризация топлива</text>

  <!-- === SOIL CONTAMINATION (BOTTOM BAR) === -->
  <rect x="15" y="352" width="770" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Загрязнение почвы и экологические принципы</text>
  <!-- Soil section -->
  <rect x="25" y="380" width="230" height="100" rx="5" fill="rgba(245,158,11,0.06)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="140" y="396" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Загрязнение почвы</text>
  <text x="35" y="412" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Тяжёлые металлы (Pb, Cd, Hg)</text>
  <text x="35" y="426" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Пестициды (ДДТ, гексахлоран)</text>
  <text x="35" y="440" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Нефтепродукты</text>
  <text x="35" y="454" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• ТБО и промышленные отходы</text>
  <text x="35" y="472" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">ДДТ: канцероген, кумулятивный яд</text>

  <!-- Green chemistry principles -->
  <rect x="265" y="380" width="260" height="100" rx="5" fill="rgba(16,185,129,0.06)" stroke="#10b981" stroke-width="0.5"/>
  <text x="395" y="396" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle" font-weight="bold">12 принципов зелёной химии</text>
  <text x="275" y="412" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">1. Предотвращение отходов</text>
  <text x="275" y="426" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">2. Атомная экономичность</text>
  <text x="275" y="440" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">3. Менее опасные синтезы</text>
  <text x="275" y="454" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">4. Безопасные химические продукты</text>
  <text x="275" y="468" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">5. Безопасные растворители</text>
  <text x="275" y="480" font-family="Arial, sans-serif" font-size="7" fill="#10b981">Катализ, возобновляемое сырьё, энергетическая эффективность...</text>

  <!-- Key concepts -->
  <rect x="535" y="380" width="240" height="100" rx="5" fill="rgba(20,184,166,0.06)" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="655" y="396" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Ключевые понятия</text>
  <text x="545" y="412" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• ПДК — предельная допустимая концентрация</text>
  <text x="545" y="426" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• ПДВ — предельный допуск. выброс</text>
  <text x="545" y="440" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Экологический мониторинг</text>
  <text x="545" y="454" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">• Устойчивое развитие</text>
  <text x="545" y="468" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">Химия — решение экологических</text>
  <text x="545" y="480" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">проблем, а не только их причина!</text>
</svg>