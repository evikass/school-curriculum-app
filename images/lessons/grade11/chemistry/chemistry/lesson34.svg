<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg34" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad34" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="graphiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="co2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="coGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow34">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowDiamond34">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg34)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad34)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad34)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Углерод и его соединения</text>

  <!-- === CARBON ALLOTROPES (TOP) === -->
  <rect x="15" y="54" width="770" height="155" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Аллотропы углерода</text>

  <!-- Diamond -->
  <rect x="25" y="82" width="180" height="118" rx="5" fill="url(#diamondGrad)" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="115" y="98" font-family="Arial, sans-serif" font-size="10" fill="#bae6fd" text-anchor="middle" font-weight="bold">Алмаз</text>

  <!-- Diamond 3D tetrahedron -->
  <g filter="url(#glowDiamond34)" transform="translate(115,130)">
    <polygon points="0,-20 -18,10 18,10" fill="none" stroke="#e0f2fe" stroke-width="1.5"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#bae6fd" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="0" cy="-20" r="6" fill="rgba(186,230,253,0.4)" stroke="#bae6fd" stroke-width="1.5"/>
    <text x="0" y="-17" font-family="Arial, sans-serif" font-size="6" fill="#bae6fd" text-anchor="middle" font-weight="bold">C</text>
    <circle cx="-18" cy="10" r="6" fill="rgba(186,230,253,0.4)" stroke="#bae6fd" stroke-width="1.5"/>
    <text x="-18" y="13" font-family="Arial, sans-serif" font-size="6" fill="#bae6fd" text-anchor="middle" font-weight="bold">C</text>
    <circle cx="18" cy="10" r="6" fill="rgba(186,230,253,0.4)" stroke="#bae6fd" stroke-width="1.5"/>
    <text x="18" y="13" font-family="Arial, sans-serif" font-size="6" fill="#bae6fd" text-anchor="middle" font-weight="bold">C</text>
    <circle cx="0" cy="20" r="6" fill="rgba(186,230,253,0.4)" stroke="#bae6fd" stroke-width="1.5"/>
    <text x="0" y="23" font-family="Arial, sans-serif" font-size="6" fill="#bae6fd" text-anchor="middle" font-weight="bold">C</text>
  </g>

  <text x="115" y="172" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">sp³, тетраэдр</text>
  <text x="115" y="183" font-family="Arial, sans-serif" font-size="7" fill="#bae6fd" text-anchor="middle">Твёрдость 10 (Моос)</text>
  <text x="115" y="194" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Не проводит ток</text>

  <!-- Graphite -->
  <rect x="215" y="82" width="180" height="118" rx="5" fill="url(#graphiteGrad)" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="305" y="98" font-family="Arial, sans-serif" font-size="10" fill="#d1d5db" text-anchor="middle" font-weight="bold">Графит</text>

  <!-- Graphite layers -->
  <g transform="translate(305,125)">
    <!-- Layer 1 -->
    <line x1="-35" y1="-8" x2="35" y2="-8" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-28" cy="-8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="-14" cy="-8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="0" cy="-8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="14" cy="-8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="28" cy="-8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <!-- Layer 2 -->
    <line x1="-35" y1="8" x2="35" y2="8" stroke="#9ca3af" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-28" cy="8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="-14" cy="8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="0" cy="8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="14" cy="8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <circle cx="28" cy="8" r="5" fill="rgba(156,163,175,0.4)" stroke="#9ca3af" stroke-width="1"/>
    <!-- Weak bonds between layers -->
    <line x1="0" y1="-2" x2="0" y2="2" stroke="#6b7280" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>

  <text x="305" y="172" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">sp², слои (гексагоны)</text>
  <text x="305" y="183" font-family="Arial, sans-serif" font-size="7" fill="#d1d5db" text-anchor="middle">Мягкий, скользкий</text>
  <text x="305" y="194" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Проводит электричество</text>

  <!-- Fullerene C60 -->
  <rect x="405" y="82" width="180" height="118" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="495" y="98" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Фуллерен C₆₀</text>

  <!-- Soccer ball / fullerene -->
  <g filter="url(#glow34)" transform="translate(495,135)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Pentagon -->
    <polygon points="0,-14 13,-5 8,11 -8,11 -13,-5" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
    <!-- Hexagon edges -->
    <line x1="0" y1="-14" x2="-13" y2="-5" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="-14" x2="13" y2="-5" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="13" y1="-5" x2="8" y2="11" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="-13" y1="-5" x2="-8" y2="11" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
    <line x1="8" y1="11" x2="-8" y2="11" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  </g>

  <text x="495" y="172" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Молекула — «футбольный мяч»</text>
  <text x="495" y="183" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle">12 пятиуг. + 20 шестиуг.</text>
  <text x="495" y="194" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Нобелевская премия 1996</text>

  <!-- Graphene -->
  <rect x="595" y="82" width="180" height="118" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="685" y="98" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">Графен</text>

  <!-- Graphene honeycomb -->
  <g filter="url(#glow34)" transform="translate(685,135)">
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#14b8a6" stroke-width="1"/>
    <polygon points="20,-12 30,-6 30,6 20,12 10,6 10,-6" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.7"/>
    <polygon points="-20,-12 -10,-6 -10,6 -20,12 -30,6 -30,-6" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.7"/>
    <polygon points="0,18 10,24 10,36 0,42 -10,36 -10,24" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.5" transform="translate(0,-12)"/>
  </g>

  <text x="685" y="172" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">1 слой атомов C</text>
  <text x="685" y="183" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">Нобелевская премия 2010</text>
  <text x="685" y="194" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Сверхпроводник будущего</text>

  <!-- === CO2 vs CO (MIDDLE) === -->
  <rect x="15" y="219" width="380" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="205" y="237" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Оксиды углерода</text>

  <!-- CO2 -->
  <rect x="25" y="247" width="175" height="82" rx="5" fill="url(#co2Grad)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="112" y="265" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">CO₂</text>

  <!-- CO2 molecule O=C=O -->
  <g transform="translate(112,285)">
    <circle cx="-28" cy="0" r="10" fill="rgba(20,184,166,0.3)" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="-28" y="4" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">O</text>
    <circle cx="0" cy="0" r="8" fill="rgba(100,100,100,0.3)" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="8" fill="#d1d5db" text-anchor="middle" font-weight="bold">C</text>
    <circle cx="28" cy="0" r="10" fill="rgba(20,184,166,0.3)" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="28" y="4" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">O</text>
    <line x1="-18" y1="-2" x2="-8" y2="-2" stroke="#14b8a6" stroke-width="2"/>
    <line x1="-18" y1="2" x2="-8" y2="2" stroke="#14b8a6" stroke-width="2"/>
    <line x1="8" y1="-2" x2="18" y2="-2" stroke="#14b8a6" stroke-width="2"/>
    <line x1="8" y1="2" x2="18" y2="2" stroke="#14b8a6" stroke-width="2"/>
  </g>

  <text x="112" y="310" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Парниковый эффект</text>
  <text x="112" y="322" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">O=C=O, линейная</text>

  <!-- CO - danger! -->
  <rect x="210" y="247" width="175" height="82" rx="5" fill="url(#coGrad)" stroke="#ef4444" stroke-width="2"/>
  <text x="297" y="265" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">CO ⚠ ЯД!</text>

  <!-- CO molecule -->
  <g transform="translate(297,285)">
    <circle cx="-15" cy="0" r="8" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="-15" y="4" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="bold">C</text>
    <circle cx="15" cy="0" r="10" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="15" y="4" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="bold">O</text>
    <line x1="-7" y1="-3" x2="5" y2="-3" stroke="#ef4444" stroke-width="2"/>
    <line x1="-7" y1="0" x2="5" y2="0" stroke="#ef4444" stroke-width="2"/>
    <line x1="-7" y1="3" x2="5" y2="3" stroke="#ef4444" stroke-width="2"/>
  </g>

  <text x="297" y="310" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">Связывается с Hb крови</text>
  <text x="297" y="322" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Бесцветный, без запаха</text>

  <!-- === CARBON CYCLE + CO3 (MIDDLE RIGHT) === -->
  <rect x="405" y="219" width="380" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="595" y="237" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Карбонаты и углекислый цикл</text>

  <!-- CaCO3 decomposition -->
  <rect x="415" y="247" width="170" height="45" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="263" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">Разложение известняка</text>
  <text x="500" y="278" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">CaCO₃ → CaO + CO₂↑</text>
  <text x="500" y="290" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">(при t° &gt; 900°C)</text>

  <!-- Qualitative reaction for CO3 -->
  <rect x="595" y="247" width="180" height="45" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="685" y="263" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">Кач. реакция на CO₃²⁻</text>
  <text x="685" y="278" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">+ HCl → CO₂↑ (вскипание)</text>
  <text x="685" y="290" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">Na₂CO₃ + 2HCl → 2NaCl + CO₂↑ + H₂O</text>

  <!-- Carbon cycle mini -->
  <rect x="415" y="300" width="360" height="30" rx="5" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="595" y="319" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">Круговорот C: CO₂ ↔ фотосинтез ↔ дыхание ↔ горение ↔ карбонаты</text>

  <!-- === OXIDATION STATES + KEY REACTIONS (BOTTOM) === -->
  <rect x="15" y="349" width="250" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="140" y="367" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Степени окисления C</text>

  <text x="30" y="390" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" font-weight="bold">−4</text>
  <text x="60" y="390" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">CH₄ (метан)</text>

  <text x="30" y="410" font-family="Arial, sans-serif" font-size="10" fill="#d1d5db" font-weight="bold"> 0</text>
  <text x="60" y="410" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">C (алмаз, графит)</text>

  <text x="30" y="430" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" font-weight="bold">+2</text>
  <text x="60" y="430" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">CO (угарный газ)</text>

  <text x="30" y="450" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" font-weight="bold">+4</text>
  <text x="60" y="450" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">CO₂, H₂CO₃, карбонаты</text>

  <!-- CO warning -->
  <rect x="25" y="460" width="230" height="22" rx="4" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="475" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">⚠ CO + Hb → HbCO (карбоксигемоглобин)</text>

  <!-- === KEY REACTIONS (BOTTOM MIDDLE) === -->
  <rect x="275" y="349" width="260" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="405" y="367" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Важные реакции</text>

  <text x="285" y="388" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">C + O₂ → CO₂ (полн. горение)</text>
  <text x="285" y="403" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">2C + O₂ → 2CO (неполн. горение)</text>
  <text x="285" y="418" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">CO₂ + C → 2CO (при t°)</text>
  <text x="285" y="433" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">CO₂ + H₂O ⇌ H₂CO₃</text>
  <text x="285" y="448" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">CaCO₃ + 2HCl → CaCl₂ + CO₂↑ + H₂O</text>
  <text x="285" y="463" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">CO₂ + Ca(OH)₂ → CaCO₃↓ + H₂O</text>
  <text x="285" y="478" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂ (фото.)</text>

  <!-- === H2CO3 & CARBONATES (BOTTOM RIGHT) === -->
  <rect x="545" y="349" width="240" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="665" y="367" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Угольная кислота H₂CO₃</text>

  <rect x="555" y="378" width="220" height="30" rx="5" fill="url(#co2Grad)" stroke="#14b8a6" stroke-width="1"/>
  <text x="665" y="397" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">Слабая, двухосновная кислота</text>

  <text x="565" y="425" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Неустойчива: H₂CO₃ → CO₂↑ + H₂O</text>
  <text x="565" y="440" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Соли: карбонаты (CO₃²⁻)</text>
  <text x="565" y="455" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Соли: гидрокарбонаты (HCO₃⁻)</text>

  <rect x="555" y="465" width="220" height="18" rx="4" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="478" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">Ca(HCO₃)₂ → CaCO₃↓ (жёсткость воды)</text>
</svg>