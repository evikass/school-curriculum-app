<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg32" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad32" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="n2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="nh3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="hno3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow32">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg32)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad32)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad32)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Азот и его соединения</text>

  <!-- === N2 MOLECULE WITH TRIPLE BOND (TOP LEFT) === -->
  <rect x="15" y="54" width="240" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="135" y="72" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Молекула N₂</text>

  <!-- N atom left -->
  <circle cx="95" cy="120" r="22" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="2" filter="url(#glow32)"/>
  <text x="95" y="125" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" font-weight="bold">N</text>

  <!-- Triple bond -->
  <line x1="117" y1="113" x2="153" y2="113" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="117" y1="120" x2="153" y2="120" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="117" y1="127" x2="153" y2="127" stroke="#8b5cf6" stroke-width="2"/>

  <!-- N atom right -->
  <circle cx="175" cy="120" r="22" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="2" filter="url(#glow32)"/>
  <text x="175" y="125" font-family="Arial, sans-serif" font-size="14" fill="#8b5cf6" text-anchor="middle" font-weight="bold">N</text>

  <text x="135" y="160" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">N≡N — тройная связь</text>
  <text x="135" y="175" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">78% атмосферы, инертный газ</text>
  <text x="135" y="188" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">E связи = 946 кДж/моль</text>

  <!-- === HABER PROCESS (TOP MIDDLE+RIGHT) === -->
  <rect x="265" y="54" width="520" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="525" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Процесс Габера — синтез аммиака</text>

  <!-- Reaction equation -->
  <rect x="280" y="80" width="490" height="32" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1"/>
  <text x="525" y="101" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle" font-weight="bold">N₂ + 3H₂ ⇌ 2NH₃ + Q</text>

  <!-- Conditions -->
  <rect x="280" y="120" width="155" height="60" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="357" y="137" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Условия</text>
  <text x="357" y="152" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">T = 450–550°C</text>
  <text x="357" y="164" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">P = 200–300 атм</text>
  <text x="357" y="176" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Кат.: Fe₃O₄, Al₂O₃</text>

  <!-- NH3 molecule -->
  <rect x="445" y="120" width="155" height="60" rx="5" fill="url(#nh3Grad)" stroke="#14b8a6" stroke-width="1"/>
  <text x="522" y="137" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Аммиак NH₃</text>
  <circle cx="522" cy="155" r="10" fill="rgba(20,184,166,0.4)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="522" y="159" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">N</text>
  <circle cx="505" cy="170" r="7" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="1"/>
  <text x="505" y="173" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">H</text>
  <circle cx="539" cy="170" r="7" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="1"/>
  <text x="539" y="173" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">H</text>
  <circle cx="522" cy="142" r="7" fill="rgba(255,255,255,0.2)" stroke="#ffffff" stroke-width="1"/>
  <text x="522" y="145" font-family="Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">H</text>

  <!-- Yield info -->
  <rect x="610" y="120" width="165" height="60" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="692" y="137" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Характер реакции</text>
  <text x="692" y="152" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Экзотермическая (+Q)</text>
  <text x="692" y="164" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Обратимая (⇌)</text>
  <text x="692" y="176" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Выход: ~15–20%</text>

  <!-- === NITROGEN CYCLE (MIDDLE) === -->
  <rect x="15" y="204" width="420" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="225" y="222" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Круговорот азота (упрощённо)</text>

  <!-- Atmosphere -->
  <rect x="35" y="235" width="100" height="28" rx="14" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="85" y="253" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">Атмосфера N₂</text>

  <!-- Plants -->
  <rect x="170" y="235" width="100" height="28" rx="14" fill="rgba(20,184,166,0.25)" stroke="#14b8a6" stroke-width="1"/>
  <text x="220" y="253" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">Растения</text>

  <!-- Animals -->
  <rect x="305" y="235" width="100" height="28" rx="14" fill="rgba(245,158,11,0.25)" stroke="#f59e0b" stroke-width="1"/>
  <text x="355" y="253" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle">Животные</text>

  <!-- Arrows -->
  <line x1="135" y1="249" x2="168" y2="249" stroke="#8b5cf6" stroke-width="1.5"/>
  <polygon points="168,246 175,249 168,252" fill="#8b5cf6"/>
  <text x="150" y="243" font-family="Arial, sans-serif" font-size="6" fill="#94a3b8">фиксация</text>

  <line x1="270" y1="249" x2="303" y2="249" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="303,246 310,249 303,252" fill="#14b8a6"/>
  <text x="287" y="243" font-family="Arial, sans-serif" font-size="6" fill="#94a3b8">белки</text>

  <!-- Return arrow -->
  <path d="M355,265 L355,290 Q355,300 345,300 L95,300 Q85,300 85,290 L85,265" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="82,268 85,261 88,268" fill="#ef4444"/>
  <text x="220" y="312" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">денитрификация → N₂ обратно в атмосферу</text>

  <!-- === OXIDATION STATES (MIDDLE RIGHT) === -->
  <rect x="445" y="204" width="340" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="615" y="222" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Степени окисления азота</text>

  <!-- OS cards in a row -->
  <rect x="455" y="232" width="50" height="40" rx="4" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="480" y="249" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">−3</text>
  <text x="480" y="264" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">NH₃</text>

  <rect x="510" y="232" width="50" height="40" rx="4" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="535" y="249" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">+1</text>
  <text x="535" y="264" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">N₂O</text>

  <rect x="565" y="232" width="50" height="40" rx="4" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="249" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">+2</text>
  <text x="590" y="264" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">NO</text>

  <rect x="620" y="232" width="50" height="40" rx="4" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="645" y="249" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">+3</text>
  <text x="645" y="264" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">HNO₂</text>

  <rect x="675" y="232" width="50" height="40" rx="4" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
  <text x="700" y="249" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">+4</text>
  <text x="700" y="264" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">NO₂</text>

  <rect x="730" y="232" width="50" height="40" rx="4" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
  <text x="755" y="249" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="bold">+5</text>
  <text x="755" y="264" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">HNO₃</text>

  <!-- Nitrogen oxides info -->
  <text x="460" y="290" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">NO — бесцветный газ</text>
  <text x="460" y="304" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">NO₂ — бурый газ («лисий хвост»)</text>
  <text x="460" y="318" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">N₂O — «веселящий газ», оксид азота(I)</text>

  <!-- === NITRIC ACID (BOTTOM LEFT+MIDDLE) === -->
  <rect x="15" y="334" width="390" height="75" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="210" y="352" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Азотная кислота HNO₃ — сильный окислитель</text>

  <rect x="25" y="360" width="180" height="40" rx="5" fill="url(#hno3Grad)" stroke="#f59e0b" stroke-width="1"/>
  <text x="115" y="377" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Концентр. HNO₃ + Au, Pt → не реагирует!</text>
  <text x="115" y="392" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">HNO₃(конц) + Cu → Cu(NO₃)₂ + NO₂↑ + H₂O</text>

  <rect x="215" y="360" width="180" height="40" rx="5" fill="url(#hno3Grad)" stroke="#ef4444" stroke-width="1"/>
  <text x="305" y="377" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">HNO₃(разб) + Cu → Cu(NO₃)₂ + NO↑ + H₂O</text>
  <text x="305" y="392" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Кач. реакция на NO₃⁻: +H₂SO₄+Cu → бурый</text>

  <!-- === AMMONIA PROPERTIES (BOTTOM RIGHT) === -->
  <rect x="415" y="334" width="370" height="75" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="600" y="352" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Свойства аммиака NH₃</text>

  <text x="430" y="370" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Бесцветный газ с резким запахом</text>
  <text x="430" y="383" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Очень растворим в воде (NH₃·H₂O)</text>
  <text x="430" y="396" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">• Основание: NH₃ + HCl → NH₄Cl (белый дым)</text>

  <rect x="630" y="360" width="145" height="42" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1"/>
  <text x="702" y="377" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">Кач. реакция на NH₄⁺</text>
  <text x="702" y="392" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">+ NaOH → NH₃↑ (запах)</text>

  <!-- === BOTTOM BAR === -->
  <rect x="15" y="420" width="770" height="70" rx="8" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="438" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Важные реакции</text>
  <text x="30" y="454" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">4NH₃ + 5O₂ → 4NO + 6H₂O (кат. окисление)</text>
  <text x="30" y="468" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">2NO + O₂ → 2NO₂</text>
  <text x="30" y="482" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">3NO₂ + H₂O → 2HNO₃ + NO</text>
  <text x="430" y="454" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">NH₃ + HNO₃ → NH₄NO₃ (аммиачная селитра)</text>
  <text x="430" y="468" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">N₂ + O₂ → 2NO (при t° &gt; 2000°C)</text>
  <text x="430" y="482" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">Применение: удобрения, взрывчатка, медицина</text>
</svg>