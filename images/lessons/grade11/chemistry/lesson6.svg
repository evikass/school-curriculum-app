<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Природные полимеры</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 6</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="450" height="68" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="104" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Полисахариды — (C₆H₁₀O₅)n</text>
    <text x="132" y="124" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Крахмал: запасающее вещество растений</text>
    <text x="132" y="138" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Целлюлоза: структурный компонент клеточной стенки</text>
    <text x="132" y="152" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Гликоген: запасающее вещество животных (животный крахмал)</text>
    <rect x="25" y="163" width="215" height="110" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="179" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Целлюлоза</text>
    <text x="132" y="197" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">β-гликозидные связи</text>
    <text x="132" y="211" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Не усваивается человеком</text>
    <text x="132" y="225" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">(нет фермента целлюлазы)</text>
    <text x="132" y="243" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Степень полимеризации:</text>
    <text x="132" y="257" font-family="Arial,sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">n = 2000–15000</text>
    <text x="132" y="269" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">Волокна: хлопок, лён</text>
    <rect x="260" y="163" width="215" height="110" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="367" y="179" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Крахмал</text>
    <text x="367" y="197" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">α-гликозидные связи</text>
    <text x="367" y="211" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Усваивается человеком</text>
    <text x="367" y="225" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">(амилаза в слюне)</text>
    <text x="367" y="243" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Амилоза + Амилопектин:</text>
    <text x="367" y="257" font-family="Arial,sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="bold">линейная + разветвлённая</text>
    <text x="367" y="269" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="normal">Йод → синее окрашивание</text>
    <rect x="25" y="280" width="450" height="22" fill="#2E7D32" rx="4" opacity="0.12" />
    <text x="250" y="296" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="normal">Гидролиз: (C₆H₁₀O₅)n + nH₂O → nC₆H₁₂O₆ (глюкоза)</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>