<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg21" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="oxidGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="reducGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <filter id="glow21">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowEnd" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg21)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Окислительно-восстановительные реакции (ОВР)</text>

  <!-- Divider -->
  <line x1="50" y1="52" x2="750" y2="52" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- === MAIN REACTION === -->
  <rect x="50" y="65" width="700" height="110" rx="10" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>

  <!-- Reaction equation -->
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Zn + CuSO₄ → ZnSO₄ + Cu
  </text>

  <!-- Oxidation states -->
  <!-- Zn 0 -->
  <text x="175" y="130" font-family="Arial, sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-weight="bold">Zn⁰</text>
  <!-- Arrow down for Zn -->
  <text x="175" y="150" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle">↓ -2ē</text>

  <!-- Cu2+ -->
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Cu²⁺</text>
  <!-- Arrow down for Cu -->
  <text x="310" y="150" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6" text-anchor="middle">↓ +2ē</text>

  <!-- Zn2+ -->
  <text x="490" y="130" font-family="Arial, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle" font-weight="bold">Zn²⁺</text>

  <!-- Cu 0 -->
  <text x="620" y="130" font-family="Arial, sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle" font-weight="bold">Cu⁰</text>

  <!-- === ELECTRON TRANSFER ARROW === -->
  <path d="M195,145 C280,180 420,180 610,145" fill="none" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowEnd)" filter="url(#glow21)"/>
  <text x="400" y="185" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">передача 2ē</text>

  <!-- === OXIDATION HALF (LEFT) === -->
  <rect x="50" y="200" width="340" height="130" rx="10" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Oxidation header -->
  <rect x="60" y="205" width="320" height="28" rx="6" fill="rgba(239,68,68,0.2)"/>
  <text x="220" y="224" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">ОКИСЛЕНИЕ</text>

  <!-- Zn atom -->
  <circle cx="120" cy="280" r="25" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b" text-anchor="middle">Zn⁰</text>

  <!-- Arrow -->
  <line x1="155" y1="280" x2="225" y2="280" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="225,274 237,280 225,286" fill="#ef4444"/>

  <!-- Zn ion -->
  <circle cx="280" cy="280" r="25" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="2"/>
  <text x="280" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">Zn²⁺</text>

  <!-- Electron loss -->
  <text x="190" y="268" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">−2ē</text>

  <!-- Label: Восстановитель -->
  <text x="220" y="318" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="bold">Восстановитель (отдаёт ē)</text>

  <!-- === REDUCTION HALF (RIGHT) === -->
  <rect x="410" y="200" width="340" height="130" rx="10" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1.5"/>

  <!-- Reduction header -->
  <rect x="420" y="205" width="320" height="28" rx="6" fill="rgba(20,184,166,0.2)"/>
  <text x="580" y="224" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6" text-anchor="middle">ВОССТАНОВЛЕНИЕ</text>

  <!-- Cu ion -->
  <circle cx="470" cy="280" r="25" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="470" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Cu²⁺</text>

  <!-- Arrow -->
  <line x1="505" y1="280" x2="575" y2="280" stroke="#14b8a6" stroke-width="2.5"/>
  <polygon points="575,274 587,280 575,286" fill="#14b8a6"/>

  <!-- Cu atom -->
  <circle cx="630" cy="280" r="25" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="2"/>
  <text x="630" y="285" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14b8a6" text-anchor="middle">Cu⁰</text>

  <!-- Electron gain -->
  <text x="540" y="268" font-family="Arial, sans-serif" font-size="12" fill="#5eead4" text-anchor="middle">+2ē</text>

  <!-- Label: Окислитель -->
  <text x="580" y="318" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle" font-weight="bold">Окислитель (принимает ē)</text>

  <!-- === LEGEND BOX === -->
  <rect x="50" y="345" width="700" height="140" rx="10" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Правила ОВР</text>

  <!-- Legend items -->
  <!-- Item 1 -->
  <circle cx="85" cy="398" r="8" fill="#ef4444" opacity="0.8"/>
  <text x="100" y="403" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Окисление — отдача электронов (степень окисления ↑)</text>

  <!-- Item 2 -->
  <circle cx="85" cy="425" r="8" fill="#14b8a6" opacity="0.8"/>
  <text x="100" y="430" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Восстановление — приём электронов (степень окисления ↓)</text>

  <!-- Item 3 -->
  <circle cx="85" cy="452" r="8" fill="#f59e0b" opacity="0.8"/>
  <text x="100" y="457" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Восстановитель — атом, который отдаёт электроны</text>

  <!-- Item 4 -->
  <circle cx="85" cy="472" r="8" fill="#8b5cf6" opacity="0.8"/>
  <text x="100" y="477" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Окислитель — атом (ион), который принимает электроны</text>

  <!-- Key rule -->
  <rect x="480" y="385" width="255" height="50" rx="8" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="607" y="405" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Число отданных ē =</text>
  <text x="607" y="425" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Числу принятых ē</text>

  <!-- Mnemonic -->
  <rect x="480" y="445" width="255" height="32" rx="8" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="607" y="466" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">ВОВУ: Восстановитель — Окисляется</text>
</svg>