  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad26)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Сплавы</text>

