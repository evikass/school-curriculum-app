  <text x="160" y="74" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle" font-weight="bold">Структура сплава vs чистый металл</text>

  <!-- Pure metal - ordered lattice -->
  <rect x="35" y="85" width="115" height="95" rx="5" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="1"/>
  <text x="92" y="100" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Чистый металл</text>
  <circle cx="55" cy="120" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="75" cy="120" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="95" cy="120" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="115" cy="120" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="135" cy="120" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="55" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="75" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="95" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="115" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="135" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="55" cy="164" r="7" fill="#f59e0b" opacity="0.8"/>
