  <text x="112" y="286" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Fe + C (0,1–2%)</text>
  <text x="112" y="304" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Твёрдый раствор</text>
  <line x1="40" y1="314" x2="185" y2="314" stroke="#334155" stroke-width="0.5"/>
