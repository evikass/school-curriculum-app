  <text x="662" y="116" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">соединение с точным составом</text>

  <!-- === FOUR ALLOY CARDS === -->
  <!-- Steel -->
  <rect x="20" y="244" width="185" height="130" rx="8" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1"/>
  <rect x="20" y="244" width="185" height="24" rx="8" fill="url(#amberGrad)"/>
