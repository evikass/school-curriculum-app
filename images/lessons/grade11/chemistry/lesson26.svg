  <circle cx="228" cy="142" r="7" fill="#14b8a6" opacity="0.9"/>
  <circle cx="248" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="268" cy="142" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="188" cy="164" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="208" cy="164" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="228" cy="164" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="248" cy="164" r="7" fill="#14b8a6" opacity="0.9"/>
  <circle cx="268" cy="164" r="7" fill="#f59e0b" opacity="0.8"/>

