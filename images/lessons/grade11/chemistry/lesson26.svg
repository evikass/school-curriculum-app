  <rect x="315" y="54" width="465" height="80" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1" filter="url(#glow26)"/>
  <text x="548" y="74" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle" font-weight="bold">Типы сплавов по структуре</text>

  <!-- Solid solution -->
  <rect x="325" y="84" width="215" height="40" rx="5" fill="rgba(13,148,136,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="432" y="100" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Твердый раствор</text>
  <text x="432" y="116" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">атомы примеси в решётке металла</text>

