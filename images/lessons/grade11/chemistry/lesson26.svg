  <text x="307" y="261" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Бронза</text>
  <text x="307" y="286" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Cu + Sn</text>
  <text x="307" y="304" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Твёрдый раствор</text>
  <line x1="235" y1="314" x2="380" y2="314" stroke="#334155" stroke-width="0.5"/>
  <text x="307" y="330" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Коррозионная стойкость</text>
  <text x="307" y="346" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">⚓ Судостроение</text>
  <text x="307" y="362" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">💍 Ювелирное дело</text>

  <!-- Brass -->
  <rect x="410" y="244" width="185" height="130" rx="8" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1"/>
  <rect x="410" y="244" width="185" height="24" rx="8" fill="url(#amberGrad)"/>
  <rect x="410" y="260" width="185" height="8" fill="url(#amberGrad)"/>
  <text x="502" y="261" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Латунь</text>
  <text x="502" y="286" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Cu + Zn</text>
  <text x="502" y="304" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Твёрдый раствор</text>
  <line x1="430" y1="314" x2="575" y2="314" stroke="#334155" stroke-width="0.5"/>
  <text x="502" y="330" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Пластичность, ковкость</text>
  <text x="502" y="346" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">🎺 Музыкальные инструменты</text>
  <text x="502" y="362" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">🔩 Детали приборов</text>

  <!-- Duralumin -->
  <rect x="605" y="244" width="175" height="130" rx="8" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1"/>
  <rect x="605" y="244" width="175" height="24" rx="8" fill="url(#tealGrad)"/>
  <rect x="605" y="260" width="175" height="8" fill="url(#tealGrad)"/>
  <text x="692" y="261" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Дуралюмин</text>
  <text x="692" y="286" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Al+Cu+Mg+Mn</text>
  <text x="692" y="304" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Твёрдый раствор + выделения</text>
  <line x1="620" y1="314" x2="765" y2="314" stroke="#334155" stroke-width="0.5"/>
  <text x="692" y="330" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Лёгкость + прочность</text>
  <text x="692" y="346" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">✈️ Авиация</text>
  <text x="692" y="362" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">🚀 Космонавтика</text>

  <!-- === PROPERTIES COMPARISON (BOTTOM) === -->
  <rect x="20" y="386" width="760" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="406" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Почему сплавы прочнее чистых металлов?</text>

  <!-- Explanation -->
  <text x="400" y="428" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Атомы примеси нарушают правильное расположение атомов → затрудняют скольжение слоёв</text>
  <text x="400" y="446" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Дислокации «закрепляются» на атомах примеси → деформация требует большей силы</text>

  <!-- Key point -->
  <rect x="240" y="458" width="320" height="22" rx="11" fill="rgba(13,148,136,0.2)" stroke="#14b8a6" stroke-width="1" filter="url(#glow26)"/>
  <text x="400" y="473" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">Сплав всегда твёрже и прочнее чистого металла!</text>
