<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="enScale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#header)" rx="0"/>
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Урок 11: Полярная и неполярная связь. Электроотрицательность</text>
  <!-- Section 1: Nonpolar covalent -->
  <rect x="20" y="64" width="370" height="120" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#10b981" stroke-width="1"/>
  <text x="205" y="86" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">Неполярная ковалентная связь</text>
  <text x="40" y="108" fill="#ffffff" font-size="12">Одинаковые элементы — равное распределение e⁻</text>
  <!-- H2 -->
  <circle cx="80" cy="140" r="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="146" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">H</text>
  <circle cx="120" cy="140" r="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="120" y="146" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">H</text>
  <circle cx="100" cy="133" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="100" cy="147" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <text x="100" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">H₂</text>
  <!-- O2 -->
  <circle cx="200" cy="140" r="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="146" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">O</text>
  <circle cx="250" cy="140" r="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="250" y="146" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">O</text>
  <circle cx="225" cy="133" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="225" cy="147" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <text x="225" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">O₂</text>
  <!-- N2 -->
  <circle cx="320" cy="140" r="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="320" y="146" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">N</text>
  <circle cx="360" cy="140" r="18" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="360" y="146" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">N</text>
  <circle cx="340" cy="133" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="340" cy="140" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="340" cy="147" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <text x="340" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">N₂</text>
  <!-- Section 2: Polar covalent -->
  <rect x="410" y="64" width="370" height="120" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1"/>
  <text x="595" y="86" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">Полярная ковалентная связь</text>
  <text x="430" y="108" fill="#ffffff" font-size="12">Разные элементы — неравное распределение e⁻</text>
  <!-- HCl with dipole -->
  <circle cx="470" cy="145" r="18" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="151" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">H</text>
  <text x="470" y="127" text-anchor="middle" fill="#ef4444" font-size="11">δ+</text>
  <circle cx="540" cy="145" r="22" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <text x="540" y="151" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">Cl</text>
  <text x="540" y="124" text-anchor="middle" fill="#14b8a6" font-size="11">δ−</text>
  <!-- Shared pair shifted toward Cl -->
  <circle cx="518" cy="139" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="518" cy="151" r="4" fill="#14b8a6" filter="url(#glowSm)"/>
  <!-- Arrow showing shift -->
  <line x1="488" y1="145" x2="518" y2="145" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="505" y="178" text-anchor="middle" fill="#94a3b8" font-size="11">HCl</text>
  <!-- H2O -->
  <text x="620" y="140" fill="#8b5cf6" font-size="13" font-weight="bold">H₂O</text>
  <text x="620" y="158" fill="#94a3b8" font-size="11">δ+ на H, δ− на O</text>
  <!-- NH3 -->
  <text x="720" y="140" fill="#8b5cf6" font-size="13" font-weight="bold">NH₃</text>
  <text x="720" y="158" fill="#94a3b8" font-size="11">δ+ на H, δ− на N</text>
  <!-- Section 3: Electronegativity Scale (Pauling) -->
  <rect x="20" y="196" width="760" height="120" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="218" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">Шкала электроотрицательности Полинга</text>
  <!-- Scale bar -->
  <rect x="60" y="235" width="680" height="20" rx="5" fill="url(#enScale)" opacity="0.3"/>
  <rect x="60" y="235" width="680" height="20" rx="5" fill="none" stroke="#94a3b8" stroke-width="0.5"/>
  <!-- Element markers -->
  <!-- Na 0.9 -->
  <rect x="60" y="230" width="4" height="30" fill="#f59e0b" filter="url(#glowSm)"/>
  <text x="62" y="274" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold">Na</text>
  <text x="62" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">0.9</text>
  <!-- H 2.1 -->
  <rect x="230" y="230" width="4" height="30" fill="#f59e0b" filter="url(#glowSm)"/>
  <text x="232" y="274" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold">H</text>
  <text x="232" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">2.1</text>
  <!-- C 2.5 -->
  <rect x="330" y="230" width="4" height="30" fill="#8b5cf6" filter="url(#glowSm)"/>
  <text x="332" y="274" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">C</text>
  <text x="332" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">2.5</text>
  <!-- N 3.0 -->
  <rect x="440" y="230" width="4" height="30" fill="#8b5cf6" filter="url(#glowSm)"/>
  <text x="442" y="274" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">N</text>
  <text x="442" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">3.0</text>
  <!-- Cl 3.0 -->
  <rect x="470" y="230" width="4" height="30" fill="#8b5cf6" filter="url(#glowSm)"/>
  <text x="472" y="274" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="bold">Cl</text>
  <text x="472" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">3.0</text>
  <!-- O 3.5 -->
  <rect x="580" y="230" width="4" height="30" fill="#ef4444" filter="url(#glowSm)"/>
  <text x="582" y="274" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">O</text>
  <text x="582" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">3.5</text>
  <!-- F 4.0 -->
  <rect x="680" y="230" width="4" height="30" fill="#ef4444" filter="url(#glowSm)"/>
  <text x="682" y="274" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">F</text>
  <text x="682" y="286" text-anchor="middle" fill="#94a3b8" font-size="9">4.0</text>
  <!-- Arrow -->
  <text x="62" y="308" fill="#f59e0b" font-size="10">← металлы</text>
  <text x="660" y="308" fill="#ef4444" font-size="10">неметаллы →</text>
  <!-- Section 4: EN difference determines bond type -->
  <rect x="20" y="326" width="760" height="160" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="348" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Разность ЭО определяет тип связи</text>
  <!-- Three zones -->
  <!-- Nonpolar zone -->
  <rect x="60" y="365" width="200" height="70" rx="8" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="387" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">Неполярная</text>
  <text x="160" y="405" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">ΔЭО &lt; 0.4</text>
  <text x="160" y="424" text-anchor="middle" fill="#94a3b8" font-size="11">H₂, Cl₂, O₂</text>
  <!-- Polar zone -->
  <rect x="290" y="365" width="220" height="70" rx="8" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="387" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">Полярная ковалентная</text>
  <text x="400" y="405" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">0.4 ≤ ΔЭО ≤ 1.8</text>
  <text x="400" y="424" text-anchor="middle" fill="#94a3b8" font-size="11">HCl, H₂O, NH₃</text>
  <!-- Ionic zone -->
  <rect x="540" y="365" width="200" height="70" rx="8" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="387" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">Ионная</text>
  <text x="640" y="405" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">ΔЭО &gt; 1.8</text>
  <text x="640" y="424" text-anchor="middle" fill="#94a3b8" font-size="11">NaCl, KBr, CaO</text>
  <!-- Connecting arrows -->
  <line x1="260" y1="400" x2="290" y2="400" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="510" y1="400" x2="540" y2="400" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Scale bar below -->
  <rect x="60" y="450" width="680" height="12" rx="4" fill="#0f172a"/>
  <rect x="60" y="450" width="136" height="12" rx="4" fill="#10b981" opacity="0.5"/>
  <rect x="196" y="450" width="422" height="12" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <rect x="618" y="450" width="122" height="12" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="128" y="476" text-anchor="middle" fill="#10b981" font-size="10">0</text>
  <text x="400" y="476" text-anchor="middle" fill="#8b5cf6" font-size="10">1.0</text>
  <text x="618" y="476" text-anchor="middle" fill="#ef4444" font-size="10">1.8</text>
  <text x="740" y="476" text-anchor="middle" fill="#94a3b8" font-size="10">3.0+</text>
  <text x="400" y="494" text-anchor="middle" fill="#94a3b8" font-size="10">Разность электроотрицательностей (ΔЭО)</text>
</svg>