<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg31" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad31" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="sulfurGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="acidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="h2sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="so2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow31">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg31)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad31)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad31)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Сера и её соединения</text>

  <!-- === SULFUR ALLOTROPES (TOP LEFT) === -->
  <rect x="15" y="54" width="370" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="200" y="72" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Аллотропы серы</text>

  <!-- Rhombic S -->
  <rect x="25" y="80" width="110" height="100" rx="5" fill="url(#sulfurGrad)" stroke="#f59e0b" stroke-width="1"/>
  <text x="80" y="96" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Ромбическая α-S</text>
  <polygon points="80,105 95,118 88,135 72,135 65,118" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="80" y="128" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">S₈</text>
  <text x="80" y="155" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">t &gt; 95.5°C → β-S</text>
  <text x="80" y="175" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">жёлтые кристаллы</text>

  <!-- Monoclinic S -->
  <rect x="145" y="80" width="110" height="100" rx="5" fill="url(#sulfurGrad)" stroke="#f59e0b" stroke-width="1"/>
  <text x="200" y="96" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Моноклинная β-S</text>
  <polygon points="200,105 212,115 208,132 192,132 188,115" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.2" transform="skewX(-8)"/>
  <text x="200" y="128" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">S₈</text>
  <text x="200" y="155" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">95.5–119°C</text>
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">игольчатые кристаллы</text>

  <!-- Plastic S -->
  <rect x="265" y="80" width="110" height="100" rx="5" fill="url(#sulfurGrad)" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="96" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Пластическая S</text>
  <path d="M305,110 Q310,105 320,112 Q330,119 335,112 Q340,105 340,115 Q340,128 330,132 Q315,138 305,130 Q298,124 305,110Z" fill="rgba(245,158,11,0.35)" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="320" y="155" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">быстрое охлаждение</text>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">каучукоподобная</text>

  <!-- === S8 RING STRUCTURE (TOP RIGHT) === -->
  <rect x="400" y="54" width="385" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="592" y="72" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Циклическая молекула S₈ (коронка)</text>

  <!-- S8 crown ring -->
  <g filter="url(#glow31)">
    <circle cx="545" cy="105" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="545" y="109" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="568" cy="118" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="568" y="122" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="568" cy="148" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="568" y="152" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="545" cy="161" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="545" y="165" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="635" cy="105" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="635" y="109" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="612" cy="118" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="612" y="122" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="612" cy="148" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="612" y="152" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <circle cx="635" cy="161" r="10" fill="rgba(245,158,11,0.4)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="635" y="165" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
    <!-- bonds -->
    <line x1="555" y1="105" x2="558" y2="118" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <line x1="568" y1="128" x2="568" y2="138" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <line x1="558" y1="148" x2="545" y2="151" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <line x1="625" y1="105" x2="622" y2="118" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <line x1="612" y1="128" x2="612" y2="138" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <line x1="622" y1="148" x2="635" y2="151" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="592" y="185" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">8 атомов S в форме короны</text>

  <!-- === REACTION CHAIN S → SO₂ → SO₃ → H₂SO₄ (MIDDLE) === -->
  <rect x="15" y="204" width="770" height="68" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Цепочка превращений серы</text>

  <!-- S -->
  <circle cx="80" cy="248" r="18" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow31)"/>
  <text x="80" y="252" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="bold">S</text>
  <line x1="100" y1="248" x2="150" y2="248" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arrow31)"/>
  <text x="125" y="242" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">+O₂</text>

  <!-- SO2 -->
  <rect x="155" y="232" width="65" height="32" rx="6" fill="url(#so2Grad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="187" y="252" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">SO₂</text>
  <line x1="224" y1="248" x2="274" y2="248" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="249" y="242" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">+O₂, кат.</text>

  <!-- SO3 -->
  <rect x="279" y="232" width="60" height="32" rx="6" fill="url(#so2Grad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="309" y="252" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">SO₃</text>
  <line x1="343" y1="248" x2="393" y2="248" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="368" y="242" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">+H₂O</text>

  <!-- H2SO4 - Queen -->
  <rect x="398" y="228" width="90" height="40" rx="6" fill="url(#acidGrad)" stroke="#14b8a6" stroke-width="2" filter="url(#glow31)"/>
  <text x="443" y="252" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">H₂SO₄</text>

  <!-- Crown for queen -->
  <text x="443" y="236" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">♛ Королева</text>

  <!-- Key properties text -->
  <text x="555" y="240" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Маслянистая жидкость</text>
  <text x="555" y="252" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• t°кип = 297°C (безводная)</text>
  <text x="555" y="264" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Сильная кислота, окислитель</text>

  <!-- === OXIDATION STATES (BOTTOM LEFT) === -->
  <rect x="15" y="282" width="285" height="130" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="157" y="300" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Степени окисления серы</text>

  <text x="30" y="320" font-family="Arial, sans-serif" font-size="10" fill="#10b981" font-weight="bold">−2</text>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">H₂S, сульфиды</text>

  <text x="30" y="340" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" font-weight="bold"> 0</text>
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">S (простое вещество)</text>

  <text x="30" y="360" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" font-weight="bold">+4</text>
  <text x="60" y="360" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">SO₂, H₂SO₃ (сульфиты)</text>

  <text x="30" y="380" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" font-weight="bold">+6</text>
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">SO₃, H₂SO₄ (сульфаты)</text>

  <!-- Arrow showing oxidation increase -->
  <line x1="270" y1="318" x2="270" y2="382" stroke="#14b8a6" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="266,382 270,392 274,382" fill="#14b8a6"/>
  <text x="275" y="355" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" transform="rotate(90,275,355)">окисление →</text>

  <!-- === KEY COMPOUNDS (BOTTOM MIDDLE) === -->
  <rect x="310" y="282" width="230" height="130" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="425" y="300" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Ключевые соединения</text>

  <!-- H2S -->
  <rect x="320" y="308" width="100" height="42" rx="5" fill="url(#h2sGrad)" stroke="#10b981" stroke-width="1"/>
  <text x="370" y="325" font-family="Arial, sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="bold">H₂S</text>
  <text x="370" y="340" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">ядовитый газ, запах</text>
  <text x="370" y="349" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">тухлых яиц</text>

  <!-- SO2 -->
  <rect x="430" y="308" width="100" height="42" rx="5" fill="url(#so2Grad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="480" y="325" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">SO₂</text>
  <text x="480" y="340" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">острый запах</text>
  <text x="480" y="349" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">кислотный дождь</text>

  <!-- H2SO4 detail -->
  <rect x="320" y="358" width="210" height="46" rx="5" fill="url(#acidGrad)" stroke="#14b8a6" stroke-width="1.5" filter="url(#glow31)"/>
  <text x="425" y="375" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">H₂SO₄ — серная кислота</text>
  <text x="425" y="390" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Обезвоживание, водоотнимающее св-во</text>
  <text x="425" y="400" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Кач. реакция на SO₄²⁻: +BaCl₂ → BaSO₄↓</text>

  <!-- === DILUTION RULE (BOTTOM RIGHT) === -->
  <rect x="550" y="282" width="235" height="130" rx="8" fill="rgba(30,41,59,0.8)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="667" y="300" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">⚠ Правило разбавления</text>

  <!-- Wrong way -->
  <rect x="560" y="310" width="105" height="55" rx="5" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
  <text x="612" y="326" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">✗ НЕЛЬЗЯ!</text>
  <text x="612" y="340" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Вода → Кислота</text>
  <text x="612" y="355" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">Вскипание, брызги!</text>

  <!-- Correct way -->
  <rect x="675" y="310" width="105" height="55" rx="5" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="727" y="326" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">✓ ПРАВИЛЬНО</text>
  <text x="727" y="340" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Кислота → Вода</text>
  <text x="727" y="355" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">Постепенное смеш.</text>

  <!-- Important note -->
  <rect x="560" y="372" width="220" height="32" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="670" y="387" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">Кислоту добавляют в воду,</text>
  <text x="670" y="399" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">а не наоборот!</text>

  <!-- === BOTTOM BAR === -->
  <rect x="15" y="424" width="770" height="66" rx="8" fill="rgba(30,41,59,0.6)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="442" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Важные реакции</text>
  <text x="30" y="458" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">S + O₂ → SO₂</text>
  <text x="30" y="472" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">2SO₂ + O₂ ⇌ 2SO₃ (V₂O₅, кат.)</text>
  <text x="260" y="458" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">SO₃ + H₂O → H₂SO₄</text>
  <text x="260" y="472" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">FeS + 2HCl → FeCl₂ + H₂S↑</text>
  <text x="480" y="458" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Cu + 2H₂SO₄(конц) → CuSO₄ + SO₂↑ + 2H₂O</text>
  <text x="480" y="472" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Na₂SO₃ + H₂SO₄ → Na₂SO₄ + SO₂↑ + H₂O</text>
</svg>