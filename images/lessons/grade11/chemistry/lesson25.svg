<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00897B"/><stop offset="100%" stop-color="#00695C"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<rect x="10" y="10" width="480" height="32" rx="5" fill="url(#panel)" opacity="0.9"/>
<text x="250" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">S, N, P, C — обобщение курса</text>
<text x="250" y="55" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">5 глав x 5 уроков = 25. 125 вопросов</text>
<line x1="30" y1="62" x2="470" y2="62" stroke="#00695C" stroke-width="1.5" opacity="0.25"/>
<text x="250" y="82" font-family="Arial,sans-serif" font-size="13" fill="#00695C" text-anchor="middle" font-weight=bold>Курс химии 11 класса завершён!</text>
<rect x="30" y="100" width="130" height="55" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<rect x="30" y="100" width="130" height="16" rx="5" fill="#1565C0" opacity="0.15"/>
<text x="95.0" y="112" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">H2SO4</text>
<text x="95.0" y="132" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">S->SO2->SO3->H2SO4 (V2O5)</text>
<rect x="170" y="100" width="130" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
<rect x="170" y="100" width="130" height="16" rx="5" fill="#2E7D32" opacity="0.15"/>
<text x="235.0" y="112" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">NH3</text>
<text x="235.0" y="132" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">N2+3H2->2NH3 (Fe,450C)</text>
<rect x="310" y="100" width="150" height="55" rx="5" fill="white" stroke="#FF8F00" stroke-width="1.5"/>
<rect x="310" y="100" width="150" height="16" rx="5" fill="#FF8F00" opacity="0.15"/>
<text x="385.0" y="112" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#FF8F00" text-anchor="middle">Алмаз/графит</text>
<text x="385.0" y="132" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">C: sp3 (твёрдый) sp2 (проводит)</text>
<rect x="30" y="170" width="210" height="50" rx="5" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
<rect x="30" y="170" width="210" height="16" rx="5" fill="#9C27B0" opacity="0.15"/>
<text x="135.0" y="182" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#9C27B0" text-anchor="middle">Круговорот азота</text>
<text x="135.0" y="202" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">N2->NH3->NO3->белки->N2</text>
<rect x="260" y="170" width="200" height="50" rx="5" fill="white" stroke="#C62828" stroke-width="1.5"/>
<rect x="260" y="170" width="200" height="16" rx="5" fill="#C62828" opacity="0.15"/>
<text x="360.0" y="182" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">CO2 и климат</text>
<text x="360.0" y="202" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">280 ppm (1850) -> 420 ppm (2024)</text>
<rect x="30" y="235" width="440" height="60" rx="5" fill="#E0F2F1" stroke="#00695C" stroke-width="2"/>
<text x="250" y="255" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle" font-weight=bold>5 глав: теория -> кинетика -> растворы -> ОВР -> металлы</text>
<text x="250" y="275" font-family="Arial,sans-serif" font-size="10" fill="#00897B" text-anchor="middle" font-weight=bold>25 уроков x 25 тестов x 125 вопросов x 5 звёзд</text>
<text x="250" y="295" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle" >Габриелян О.С., Еремин В.В.</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">ИНЕТШКОЛА · Химия · 11 класс · Урок 25</text>
</svg>