<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" filter="url(#glow)">Урок 17: Тепловой эффект химических реакций. Термохимия</text>
  <text x="400" y="68" text-anchor="middle" fill="#94a3b8" font-size="12">Тема 4: Химические реакции</text>

  <!-- Left side: Exothermic -->
  <rect x="20" y="82" width="370" height="110" rx="8" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="205" y="104" text-anchor="middle" fill="#14b8a6" font-size="15" font-weight="bold">Экзотермическая реакция</text>
  <text x="205" y="124" text-anchor="middle" fill="#f59e0b" font-size="12">ΔH &lt; 0 (тепло выделяется)</text>
  <text x="205" y="148" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">C + O₂ → CO₂ + 393 кДж</text>
  <text x="205" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">Продукты ниже по энергии, чем реагенты</text>
  <!-- Heat icon -->
  <text x="340" y="104" fill="#f59e0b" font-size="18">🔥</text>

  <!-- Right side: Endothermic -->
  <rect x="410" y="82" width="370" height="110" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="595" y="104" text-anchor="middle" fill="#8b5cf6" font-size="15" font-weight="bold">Эндотермическая реакция</text>
  <text x="595" y="124" text-anchor="middle" fill="#94a3b8" font-size="12">ΔH &gt; 0 (тепло поглощается)</text>
  <text x="595" y="148" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">N₂ + O₂ → 2NO − 180 кДж</text>
  <text x="595" y="170" text-anchor="middle" fill="#94a3b8" font-size="11">Продукты выше по энергии, чем реагенты</text>
  <text x="730" y="104" fill="#8b5cf6" font-size="18">❄️</text>

  <!-- Energy Level Diagram -->
  <rect x="20" y="202" width="370" height="165" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="222" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">Энергетическая диаграмма</text>
  <!-- Exothermic diagram -->
  <line x1="50" y1="252" x2="160" y2="252" stroke="#14b8a6" stroke-width="3"/>
  <text x="105" y="246" text-anchor="middle" fill="#14b8a6" font-size="10">Реагенты</text>
  <line x1="50" y1="332" x2="160" y2="332" stroke="#059669" stroke-width="3"/>
  <text x="105" y="348" text-anchor="middle" fill="#059669" font-size="10">Продукты</text>
  <!-- Arrow down -->
  <line x1="105" y1="255" x2="105" y2="325" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="125" y="295" fill="#ef4444" font-size="11" font-weight="bold">ΔH&lt;0</text>
  <!-- Endothermic diagram -->
  <line x1="230" y1="332" x2="340" y2="332" stroke="#8b5cf6" stroke-width="3"/>
  <text x="285" y="348" text-anchor="middle" fill="#8b5cf6" font-size="10">Реагенты</text>
  <line x1="230" y1="252" x2="340" y2="252" stroke="#a78bfa" stroke-width="3"/>
  <text x="285" y="246" text-anchor="middle" fill="#a78bfa" font-size="10">Продукты</text>
  <line x1="285" y1="328" x2="285" y2="258" stroke="#f59e0b" stroke-width="2"/>
  <text x="305" y="295" fill="#f59e0b" font-size="11" font-weight="bold">ΔH&gt;0</text>
  <!-- Energy axis -->
  <line x1="38" y1="245" x2="38" y2="350" stroke="#94a3b8" stroke-width="1"/>
  <text x="38" y="240" text-anchor="middle" fill="#94a3b8" font-size="9">E</text>

  <!-- Hess's Law -->
  <rect x="410" y="202" width="370" height="80" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
  <text x="595" y="224" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">Закон Гесса</text>
  <text x="595" y="244" text-anchor="middle" fill="#ffffff" font-size="12">ΔH зависит только от начального</text>
  <text x="595" y="260" text-anchor="middle" fill="#ffffff" font-size="12">и конечного состояния системы,</text>
  <text x="595" y="276" text-anchor="middle" fill="#f59e0b" font-size="12">не от пути реакции</text>

  <!-- Standard enthalpy of formation -->
  <rect x="410" y="292" width="370" height="75" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="595" y="314" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">Стандартная энтальпия образования</text>
  <text x="595" y="336" text-anchor="middle" fill="#ffffff" font-size="14">ΔH°f — при 298 K и 1 атм</text>
  <text x="595" y="356" text-anchor="middle" fill="#94a3b8" font-size="11">ΔH°f простых веществ = 0 кДж/моль</text>

  <!-- Thermochemical equations box -->
  <rect x="20" y="378" width="760" height="75" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" fill="#14b8a6" font-size="13" font-weight="bold">Термохимические уравнения</text>
  <text x="200" y="424" text-anchor="middle" fill="#ffffff" font-size="13">C + O₂ → CO₂; ΔH = −393 кДж</text>
  <text x="600" y="424" text-anchor="middle" fill="#ffffff" font-size="13">N₂ + O₂ → 2NO; ΔH = +180 кДж</text>
  <text x="400" y="446" text-anchor="middle" fill="#94a3b8" font-size="11">Коэффициенты = моли, ΔH указывается при стехиометрических коэффициентах</text>

  <!-- Bottom line -->
  <line x1="20" y1="468" x2="780" y2="468" stroke="#14b8a6" stroke-width="1" opacity="0.3"/>
  <text x="400" y="488" text-anchor="middle" fill="#94a3b8" font-size="11">Термохимия — раздел химии, изучающий тепловые эффекты реакций</text>
</svg>