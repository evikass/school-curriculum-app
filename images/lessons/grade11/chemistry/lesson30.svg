<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg30" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad30" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="o2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="o3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="fireGrad30" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow30">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg30)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad30)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad30)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Кислород. Аллотропия: O₂ и O₃</text>

  <!-- === O2 vs O3 COMPARISON (TOP LEFT) === -->
  <rect x="15" y="54" width="370" height="135" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="200" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Аллотропия кислорода</text>

  <!-- O2 molecule -->
  <rect x="25" y="80" width="170" height="98" rx="5" fill="url(#o2Grad)" stroke="#14b8a6" stroke-width="1"/>
  <text x="110" y="96" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">Кислород O₂</text>
  <circle cx="80" cy="120" r="14" fill="rgba(20,184,166,0.35)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="80" y="124" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">O</text>
  <line x1="94" y1="120" x2="100" y2="120" stroke="#14b8a6" stroke-width="2.5"/>
  <line x1="94" y1="116" x2="100" y2="116" stroke="#14b8a6" stroke-width="2.5"/>
  <circle cx="114" cy="120" r="14" fill="rgba(20,184,166,0.35)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="114" y="124" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">O</text>
  <text x="110" y="148" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Двойная связь</text>
  <text x="110" y="160" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Газ, бесцветный</text>
  <text x="110" y="172" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">21% атмосферы</text>

  <!-- O3 molecule -->
  <rect x="205" y="80" width="170" height="98" rx="5" fill="url(#o3Grad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="290" y="96" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Озон O₃</text>
  <circle cx="260" cy="122" r="12" fill="rgba(139,92,246,0.35)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="126" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">O</text>
  <line x1="271" y1="117" x2="283" y2="112" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="295" cy="112" r="12" fill="rgba(139,92,246,0.35)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="295" y="116" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">O</text>
  <line x1="295" y1="124" x2="295" y2="134" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="295" cy="146" r="12" fill="rgba(139,92,246,0.35)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="295" y="150" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">O</text>
  <text x="290" y="170" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Угловая, 117°</text>
  <text x="290" y="182" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Газ, синий, запах</text>

  <!-- === OXYGEN CYCLE (TOP RIGHT) === -->
  <rect x="400" y="54" width="385" height="135" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="592" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Круговорот O₂ в природе</text>

  <!-- Photosynthesis box -->
  <rect x="415" y="82" width="145" height="48" rx="5" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="487" y="98" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Фотосинтез</text>
  <text x="487" y="112" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">6CO₂ + 6H₂O →</text>
  <text x="487" y="124" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">C₆H₁₂O₆ + 6O₂</text>

  <!-- Arrow right -->
  <text x="572" y="108" font-family="Arial, sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">→</text>
  <text x="572" y="96" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">O₂</text>

  <!-- O2 in atmosphere -->
  <ellipse cx="617" cy="108" rx="25" ry="18" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1"/>
  <text x="617" y="112" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">O₂</text>

  <!-- Arrow down -->
  <text x="617" y="140" font-family="Arial, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle">↓</text>
  <text x="643" y="140" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">дыхание</text>

  <!-- Respiration box -->
  <rect x="570" y="148" width="145" height="33" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
  <text x="642" y="163" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">Дыхание / Гниение</text>
  <text x="642" y="176" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O</text>

  <!-- Arrow left (back to photosynthesis) -->
  <line x1="570" y1="165" x2="560" y2="165" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <path d="M 560,165 Q 500,190 460,135" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.4"/>
  <text x="490" y="178" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">CO₂</text>

  <!-- Ozone layer -->
  <rect x="415" y="145" width="145" height="36" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="487" y="159" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="bold">🛡️ Озоновый слой</text>
  <text x="487" y="173" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">3O₂ → 2O₃ (UV защита)</text>

  <!-- === OXYGEN PREPARATION (MIDDLE LEFT) === -->
  <rect x="15" y="198" width="370" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1" filter="url(#glow30)"/>
  <text x="200" y="218" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Получение O₂ в лаборатории</text>

  <rect x="25" y="228" width="170" height="60" rx="5" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="0.5"/>
  <text x="110" y="244" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Из перманганата:</text>
  <text x="110" y="260" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">2KMnO₄ →t°</text>
  <text x="110" y="274" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">K₂MnO₄ + MnO₂ + O₂↑</text>

  <rect x="205" y="228" width="170" height="60" rx="5" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="0.5"/>
  <text x="290" y="244" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Из пероксида:</text>
  <text x="290" y="260" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">2H₂O₂ →MnO₂</text>
  <text x="290" y="274" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">2H₂O + O₂↑</text>

  <!-- === REACTIONS OF O2 (MIDDLE RIGHT) === -->
  <rect x="400" y="198" width="385" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="592" y="218" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">Реакции O₂ — окисление</text>

  <rect x="410" y="228" width="120" height="60" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.5"/>
  <text x="470" y="244" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">Быстрое</text>
  <text x="470" y="258" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Горение:</text>
  <text x="470" y="272" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0" text-anchor="middle">CH₄ + 2O₂ → CO₂ + 2H₂O</text>
  <text x="470" y="284" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">🔥 Пламя, тепло</text>

  <rect x="540" y="228" width="120" height="60" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="600" y="244" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Медленное</text>
  <text x="600" y="258" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Коррозия:</text>
  <text x="600" y="272" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0" text-anchor="middle">4Fe + 3O₂ → 2Fe₂O₃</text>
  <text x="600" y="284" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Без пламени</text>

  <rect x="670" y="228" width="105" height="60" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="722" y="244" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Дыхание</text>
  <text x="722" y="258" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Биологич.:</text>
  <text x="722" y="272" font-family="Arial, sans-serif" font-size="7" fill="#e2e8f0" text-anchor="middle">O₂ → CO₂ + H₂O</text>
  <text x="722" y="284" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">В клетках</text>

  <!-- === OXIDES CLASSIFICATION (BOTTOM) === -->
  <rect x="15" y="308" width="770" height="180" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="328" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Классификация оксидов</text>

  <!-- Basic oxides -->
  <rect x="25" y="340" width="240" height="140" rx="6" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1"/>
  <text x="145" y="358" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Основные оксиды</text>
  <text x="145" y="374" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">(Металлы + O₂)</text>
  <line x1="40" y1="382" x2="250" y2="382" stroke="#f59e0b" stroke-width="0.3"/>
  <text x="145" y="398" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Na₂O, CaO, FeO, CuO</text>
  <text x="145" y="416" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">CaO + H₂O → Ca(OH)₂</text>
  <text x="145" y="434" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">+ кислота → соль + H₂O</text>
  <text x="145" y="450" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">CaO + 2HCl → CaCl₂ + H₂O</text>
  <rect x="55" y="458" width="180" height="16" rx="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="145" y="470" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Щёлочи + щёлочноземельные</text>

  <!-- Acidic oxides -->
  <rect x="280" y="340" width="240" height="140" rx="6" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="400" y="358" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Кислотные оксиды</text>
  <text x="400" y="374" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">(Неметаллы + O₂)</text>
  <line x1="295" y1="382" x2="505" y2="382" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="400" y="398" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">SO₃, CO₂, P₂O₅, N₂O₅</text>
  <text x="400" y="416" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">SO₃ + H₂O → H₂SO₄</text>
  <text x="400" y="434" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">+ щёлочь → соль + H₂O</text>
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">CO₂ + 2NaOH → Na₂CO₃ + H₂O</text>
  <rect x="310" y="458" width="180" height="16" rx="8" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">Неметаллы в высшей степени окисл.</text>

  <!-- Amphoteric oxides -->
  <rect x="535" y="340" width="240" height="140" rx="6" fill="rgba(20,184,166,0.08)" stroke="#14b8a6" stroke-width="1"/>
  <text x="655" y="358" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Амфотерные оксиды</text>
  <text x="655" y="374" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">(Промежуточные)</text>
  <line x1="550" y1="382" x2="760" y2="382" stroke="#14b8a6" stroke-width="0.3"/>
  <text x="655" y="398" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Al₂O₃, ZnO, BeO, Cr₂O₃</text>
  <text x="655" y="416" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">Реагируют и с к-той, и со щёлочью</text>
  <text x="655" y="434" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Al₂O₃ + 6HCl → 2AlCl₃ + 3H₂O</text>
  <text x="655" y="450" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">Al₂O₃ + 2NaOH → 2NaAlO₂ + H₂O</text>
  <rect x="565" y="458" width="180" height="16" rx="8" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="655" y="470" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">Двойственные свойства</text>
</svg>