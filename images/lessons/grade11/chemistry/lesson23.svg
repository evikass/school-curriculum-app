  <text x="56" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">K</text>
  <rect x="71" y="160" width="22" height="20" rx="3" fill="rgba(245,158,11,0.4)" stroke="#d97706" stroke-width="0.8"/>
  <text x="82" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Ca</text>

  <!-- Transition metals d-block -->
  <rect x="97" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="108" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Sc</text>
  <rect x="123" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="134" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Ti</text>
  <rect x="149" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="160" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">V</text>
  <rect x="175" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="186" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Cr</text>
  <rect x="201" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="212" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Mn</text>
  <rect x="227" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.35)" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="238" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Fe</text>
  <rect x="253" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="264" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Co</text>
  <rect x="279" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="290" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Ni</text>
  <rect x="305" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.35)" stroke="#fbbf24" stroke-width="0.6"/>
  <text x="316" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Cu</text>
  <rect x="331" y="160" width="22" height="20" rx="3" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="342" y="174" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Zn</text>

  <!-- s-block label bracket -->
  <line x1="45" y1="188" x2="93" y2="188" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="69" y="200" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">s-блок</text>

  <!-- d-block label bracket -->
  <line x1="97" y1="188" x2="353" y2="188" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="225" y="200" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">d-блок (переходные металлы)</text>

  <!-- Metal shading region overlay (simplified) -->
  <rect x="43" y="86" width="55" height="96" rx="0" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Legend for periodic table -->
  <rect x="45" y="212" width="14" height="14" rx="2" fill="rgba(245,158,11,0.5)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="65" y="223" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Щелочные металлы (IA)</text>

  <rect x="45" y="232" width="14" height="14" rx="2" fill="rgba(245,158,11,0.4)" stroke="#d97706" stroke-width="0.8"/>
  <text x="65" y="243" font-family="Arial, sans-serif" font-size="9" fill="#d97706">Щёлочноземельные (IIA)</text>

  <rect x="200" y="212" width="14" height="14" rx="2" fill="rgba(251,191,36,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="220" y="223" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24">Переходные металлы</text>

  <rect x="200" y="232" width="14" height="14" rx="2" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="220" y="243" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6">Неметаллы</text>

  <!-- Key info text -->
  <rect x="45" y="260" width="340" height="68" rx="6" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="55" y="278" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">• Металлы — ~80% элементов ПС</text>
  <text x="55" y="294" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">• Расположены левее и ниже диагонали B—At</text>
  <text x="55" y="310" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">• s-блок: IA, IIA группы; d-блок: III—XII группы</text>

  <!-- === METALLIC BONDING DIAGRAM (RIGHT SIDE) === -->
