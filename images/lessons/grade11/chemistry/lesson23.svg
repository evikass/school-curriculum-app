  <text x="600" y="78" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="bold">Металлическая связь</text>

  <!-- Electron sea background -->
  <rect x="440" y="90" width="320" height="210" rx="8" fill="url(#electronSeaGrad)" stroke="#0d9488" stroke-width="0.5" stroke-dasharray="4,2"/>

  <!-- Electron sea label -->
  <text x="600" y="108" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-style="italic" opacity="0.8">«Электронный газ»</text>

