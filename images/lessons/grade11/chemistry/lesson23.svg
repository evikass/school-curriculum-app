  <rect x="30" y="350" width="740" height="140" rx="8" fill="rgba(30,41,59,0.7)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="374" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Свойства металлов (объясняются металлической связью)</text>

  <!-- Property cards -->
  <!-- 1 -->
