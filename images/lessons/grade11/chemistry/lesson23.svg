  <circle cx="460" cy="240" r="2.5" fill="#14b8a6" opacity="0.6"/>
  <circle cx="630" cy="260" r="2.5" fill="#14b8a6" opacity="0.7"/>
  <circle cx="470" cy="160" r="2.5" fill="#14b8a6" opacity="0.5"/>
  <circle cx="720" cy="250" r="3" fill="#14b8a6" opacity="0.6"/>
  <circle cx="580" cy="165" r="2.5" fill="#14b8a6" opacity="0.7"/>

  <!-- Electron label -->
