  <!-- Row 1 -->
  <circle cx="490" cy="135" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="490" y="139" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="570" cy="135" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="570" y="139" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="650" cy="135" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="650" y="139" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="730" cy="135" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="730" y="139" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <!-- Row 2 -->
  <circle cx="490" cy="205" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="490" y="209" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="570" cy="205" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="570" y="209" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="650" cy="205" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="650" y="209" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="730" cy="205" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="730" y="209" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <!-- Row 3 -->
  <circle cx="490" cy="275" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="490" y="279" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="570" cy="275" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="570" y="279" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="650" cy="275" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="650" y="279" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <circle cx="730" cy="275" r="16" fill="rgba(245,158,11,0.3)" stroke="#f59e0b" stroke-width="1.5" filter="url(#ionGlow)"/>
  <text x="730" y="279" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Na⁺</text>

  <!-- Free electrons (small dots scattered in the sea) -->
  <circle cx="530" cy="155" r="3" fill="#14b8a6" opacity="0.8" filter="url(#glow23)"/>
  <circle cx="610" cy="170" r="2.5" fill="#14b8a6" opacity="0.7"/>
  <circle cx="540" cy="190" r="3" fill="#14b8a6" opacity="0.6" filter="url(#glow23)"/>
