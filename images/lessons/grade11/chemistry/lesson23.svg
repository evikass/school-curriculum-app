<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg23" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="electronSeaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.25"/>
    </linearGradient>
    <filter id="glow23">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ionGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg23)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Положение металлов в периодической системе и их строение</text>

  <!-- Divider -->
  <line x1="50" y1="48" x2="750" y2="48" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- === SIMPLIFIED PERIODIC TABLE (LEFT SIDE) === -->
  <rect x="30" y="58" width="370" height="280" rx="8" fill="rgba(30,41,59,0.7)" stroke="#334155" stroke-width="1"/>
  <text x="215" y="78" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="bold">Металлы в периодической системе</text>

  <!-- Period 1: H, He -->
  <rect x="45" y="88" width="22" height="20" rx="3" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="56" y="102" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">H</text>
  <rect x="358" y="88" width="22" height="20" rx="3" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="369" y="102" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">He</text>

  <!-- Period 2: Li, Be, B, C, N, O, F, Ne -->
  <!-- Li - alkali metal -->
  <rect x="45" y="112" width="22" height="20" rx="3" fill="rgba(245,158,11,0.5)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="56" y="126" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Li</text>
  <!-- Be - alkaline earth -->
  <rect x="71" y="112" width="22" height="20" rx="3" fill="rgba(245,158,11,0.4)" stroke="#d97706" stroke-width="0.8"/>
  <text x="82" y="126" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Be</text>
  <!-- B - metalloid -->
  <rect x="97" y="112" width="22" height="20" rx="3" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="108" y="126" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">B</text>
  <!-- C, N, O, F, Ne - nonmetals -->
  <rect x="123" y="112" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="134" y="126" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">C</text>
  <rect x="149" y="112" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="160" y="126" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">N</text>
  <rect x="175" y="112" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="186" y="126" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">O</text>
  <rect x="201" y="112" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="212" y="126" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">F</text>
  <rect x="358" y="112" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="369" y="126" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Ne</text>

  <!-- Period 3: Na, Mg, Al, Si, P, S, Cl, Ar -->
  <rect x="45" y="136" width="22" height="20" rx="3" fill="rgba(245,158,11,0.5)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="56" y="150" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Na</text>
  <rect x="71" y="136" width="22" height="20" rx="3" fill="rgba(245,158,11,0.4)" stroke="#d97706" stroke-width="0.8"/>
  <text x="82" y="150" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Mg</text>
  <rect x="97" y="136" width="22" height="20" rx="3" fill="rgba(245,158,11,0.35)" stroke="#d97706" stroke-width="0.5"/>
  <text x="108" y="150" font-family="Arial, sans-serif" font-size="8" fill="#fef3c7" text-anchor="middle">Al</text>
  <rect x="123" y="136" width="22" height="20" rx="3" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="134" y="150" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Si</text>
  <rect x="149" y="136" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="160" y="150" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">P</text>
  <rect x="175" y="136" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="186" y="150" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">S</text>
  <rect x="201" y="136" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="212" y="150" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Cl</text>
  <rect x="358" y="136" width="22" height="20" rx="3" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.3"/>
  <text x="369" y="150" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Ar</text>

  <!-- Period 4: K, Ca, Sc, Ti, V, Cr, Mn, Fe, Co, Ni, Cu, Zn, Ga...Kr -->
