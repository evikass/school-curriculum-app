<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg35" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad35" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="siGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="sio2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow35">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSi35">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg35)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad35)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad35)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Кремний и его соединения</text>

  <!-- === SILICON CRYSTAL STRUCTURE (TOP LEFT) === -->
  <rect x="15" y="54" width="280" height="155" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="155" y="72" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Кристаллическая решётка Si</text>

  <!-- Diamond-like structure -->
  <g filter="url(#glow35)" transform="translate(155,130)">
    <!-- Central atom -->
    <circle cx="0" cy="0" r="10" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>
    <!-- 4 neighbors (tetrahedral) -->
    <line x1="0" y1="-10" x2="-25" y2="-30" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
    <circle cx="-28" cy="-33" r="8" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="-28" y="-30" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>

    <line x1="10" y1="-5" x2="32" y2="-20" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
    <circle cx="35" cy="-23" r="8" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="35" y="-20" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>

    <line x1="-8" y1="8" x2="-30" y2="25" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
    <circle cx="-33" cy="28" r="8" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="-33" y="31" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>

    <line x1="8" y1="8" x2="28" y2="28" stroke="#8b5cf6" stroke-width="1.2" opacity="0.7"/>
    <circle cx="31" cy="31" r="8" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="31" y="34" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>
  </g>

  <text x="155" y="178" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">sp³ — как алмаз (тетраэдр)</text>
  <text x="155" y="192" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Ковалентная кристаллическая решётка</text>
  <text x="155" y="204" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">Полупроводник!</text>

  <!-- === SEMICONDUCTOR PROPERTIES (TOP MIDDLE) === -->
  <rect x="305" y="54" width="240" height="155" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="425" y="72" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Полупроводник Si</text>

  <!-- Band diagram -->
  <rect x="320" y="85" width="210" height="65" rx="5" fill="rgba(139,92,246,0.05)" stroke="#8b5cf6" stroke-width="1"/>
  <!-- Conduction band -->
  <rect x="330" y="90" width="190" height="16" rx="3" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="425" y="102" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">Зона проводимости</text>
  <!-- Band gap -->
  <text x="425" y="117" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">ΔE = 1.12 эВ</text>
  <!-- Arrow -->
  <line x1="425" y1="108" x2="425" y2="122" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,2"/>
  <polygon points="422,122 425,128 428,122" fill="#f59e0b"/>
  <!-- Valence band -->
  <rect x="330" y="128" width="190" height="16" rx="3" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="425" y="140" font-family="Arial, sans-serif" font-anchor="middle" font-size="8" fill="#14b8a6">Валентная зона</text>

  <!-- Applications -->
  <rect x="320" y="158" width="100" height="42" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="370" y="174" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">Солнечные</text>
  <text x="370" y="186" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">батареи</text>

  <rect x="430" y="158" width="100" height="42" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="480" y="174" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Микрочипы,</text>
  <text x="480" y="186" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="bold">транзисторы</text>

  <!-- === SiO2 FORMS (TOP RIGHT) === -->
  <rect x="555" y="54" width="230" height="155" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="670" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">SiO₂ — диоксид кремния</text>

  <!-- Quartz -->
  <rect x="565" y="82" width="100" height="50" rx="5" fill="url(#sio2Grad)" stroke="#14b8a6" stroke-width="1"/>
  <text x="615" y="98" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Кварц</text>
  <text x="615" y="112" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">кристаллы</text>
  <text x="615" y="124" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">твёрдый, t°пл = 1713°C</text>

  <!-- Sand -->
  <rect x="675" y="82" width="100" height="50" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="725" y="98" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Песок</text>
  <text x="725" y="112" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">SiO₂ (мелкие</text>
  <text x="725" y="124" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">зёрна кварца)</text>

  <!-- SiO2 structure -->
  <g transform="translate(670,162)">
    <circle cx="0" cy="0" r="8" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>
    <circle cx="-22" cy="-10" r="7" fill="rgba(20,184,166,0.3)" stroke="#14b8a6" stroke-width="1.2"/>
    <text x="-22" y="-7" font-family="Arial, sans-serif" font-size="6" fill="#14b8a6" text-anchor="middle">O</text>
    <circle cx="22" cy="-10" r="7" fill="rgba(20,184,166,0.3)" stroke="#14b8a6" stroke-width="1.2"/>
    <text x="22" y="-7" font-family="Arial, sans-serif" font-size="6" fill="#14b8a6" text-anchor="middle">O</text>
    <line x1="-8" y1="-5" x2="-16" y2="-9" stroke="#94a3b8" stroke-width="1"/>
    <line x1="8" y1="-5" x2="16" y2="-9" stroke="#94a3b8" stroke-width="1"/>
  </g>

  <text x="670" y="190" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Атомная крист. решётка</text>
  <text x="670" y="202" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">Не растворим в воде!</text>

  <!-- === GLASS MAKING (MIDDLE) === -->
  <rect x="15" y="219" width="490" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="260" y="237" font-family="Arial, sans-serif" font-size="11" fill="#bae6fd" text-anchor="middle" font-weight="bold">Производство стекла</text>

  <!-- Reaction -->
  <rect x="25" y="247" width="470" height="28" rx="5" fill="url(#glassGrad)" stroke="#bae6fd" stroke-width="1"/>
  <text x="260" y="265" font-family="Arial, sans-serif" font-size="10" fill="#bae6fd" text-anchor="middle" font-weight="bold">Na₂CO₃ + CaCO₃ + 6SiO₂ → Na₂O·CaO·6SiO₂ + 2CO₂↑</text>

  <!-- Glass types -->
  <rect x="25" y="283" width="150" height="48" rx="5" fill="rgba(186,230,253,0.1)" stroke="#bae6fd" stroke-width="1"/>
  <text x="100" y="300" font-family="Arial, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle" font-weight="bold">Оконное стекло</text>
  <text x="100" y="314" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Na₂O·CaO·6SiO₂</text>
  <text x="100" y="326" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Самое распространённое</text>

  <rect x="185" y="283" width="150" height="48" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="260" y="300" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Кварцевое стекло</text>
  <text x="260" y="314" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">SiO₂ (чистое)</text>
  <text x="260" y="326" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Термостойкое, УФ-прозрачн.</text>

  <rect x="345" y="283" width="150" height="48" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="1"/>
  <text x="420" y="300" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Силикагель</text>
  <text x="420" y="314" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">SiO₂·nH₂O (пористый)</text>
  <text x="420" y="326" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Осушитель, адсорбент</text>

  <!-- === Si vs C COMPARISON (MIDDLE RIGHT) === -->
  <rect x="515" y="219" width="270" height="120" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="650" y="237" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Сравнение Si vs C</text>

  <!-- Comparison table -->
  <rect x="525" y="248" width="130" height="22" rx="3" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="263" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si (кремний)</text>

  <rect x="665" y="248" width="110" height="22" rx="3" fill="rgba(186,230,253,0.15)" stroke="#bae6fd" stroke-width="1"/>
  <text x="720" y="263" font-family="Arial, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle" font-weight="bold">C (углерод)</text>

  <text x="530" y="285" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">sp³ связи — да</text>
  <text x="670" y="285" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">sp³, sp², sp — да</text>

  <text x="530" y="298" font-family="Arial, sans-serif" font-size="7" fill="#ef4444">π-связи — почти нет</text>
  <text x="670" y="298" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6">π-связи — широко</text>

  <text x="530" y="311" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Si=O — через –O– мост</text>
  <text x="670" y="311" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">C=O — двойная связь</text>

  <text x="530" y="324" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Макс. валентность — 4</text>
  <text x="670" y="324" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">Макс. валентность — 4</text>

  <rect x="525" y="330" width="250" height="5" rx="2" fill="rgba(245,158,11,0.2)"/>
  <text x="650" y="342" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle">Si не образует Si=Si, Si≡Si (как C=C, C≡C)</text>

  <!-- === KEY REACTIONS (BOTTOM LEFT) === -->
  <rect x="15" y="349" width="280" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="155" y="367" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Ключевые реакции</text>

  <text x="25" y="388" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">Si + O₂ → SiO₂</text>
  <text x="25" y="403" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Si + 2NaOH + H₂O → Na₂SiO₃ + 2H₂↑</text>
  <text x="25" y="418" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">SiO₂ + 2NaOH → Na₂SiO₃ + H₂O</text>
  <text x="25" y="433" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">SiO₂ + Na₂CO₃ → Na₂SiO₃ + CO₂↑</text>
  <text x="25" y="448" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Na₂SiO₃ + 2HCl → H₂SiO₃↓ + 2NaCl</text>
  <text x="25" y="463" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">H₂SiO₃ → SiO₂ + H₂O (при t°)</text>
  <text x="25" y="478" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">SiO₂ + 4HF → SiF₄↑ + 2H₂O (травление)</text>

  <!-- === SILICATES & SILICONES (BOTTOM MIDDLE) === -->
  <rect x="305" y="349" width="245" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="427" y="367" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Силикаты и силиконы</text>

  <!-- Silicates -->
  <rect x="315" y="378" width="225" height="42" rx="5" fill="url(#sio2Grad)" stroke="#14b8a6" stroke-width="1"/>
  <text x="427" y="395" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Силикаты</text>
  <text x="427" y="408" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Na₂SiO₃ — жидкое стекло</text>
  <text x="427" y="418" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">CaSiO₃, MgSiO₃ — минералы</text>

  <!-- Silicones -->
  <rect x="315" y="428" width="225" height="52" rx="5" fill="rgba(186,230,253,0.1)" stroke="#bae6fd" stroke-width="1"/>
  <text x="427" y="445" font-family="Arial, sans-serif" font-size="9" fill="#bae6fd" text-anchor="middle" font-weight="bold">Силиконы</text>
  <text x="427" y="458" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Полимеры с –Si–O–Si– остовом</text>
  <text x="427" y="470" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Герметики, смазки, имплантаты</text>
  <text x="427" y="482" font-family="Arial, sans-serif" font-size="7" fill="#bae6fd" text-anchor="middle">Термостойкие, эластичные</text>

  <!-- === Si IN NATURE (BOTTOM RIGHT) === -->
  <rect x="560" y="349" width="225" height="140" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="672" y="367" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Кремний в природе</text>

  <text x="570" y="388" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" font-weight="bold">2-й по распространённости</text>
  <text x="570" y="400" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">элемент в земной коре (27%)</text>

  <text x="570" y="418" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Кварц, песок, полевой шпат</text>
  <text x="570" y="433" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">• Глина, слюда, асбест</text>
  <text x="570" y="448" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">• Не найден свободным</text>

  <rect x="570" y="458" width="205" height="24" rx="4" fill="rgba(20,184,166,0.08)" stroke="#14b8a6" stroke-width="1"/>
  <text x="672" y="474" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">Основа электронике — «Кремниевая эра»</text>
</svg>