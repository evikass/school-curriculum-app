<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg29" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad29" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow29">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg29)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad29)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad29)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Галогены — Группа VIIA (17)</text>

  <!-- === FOUR HALOGEN CARDS === -->
  <!-- Fluorine -->
  <rect x="15" y="54" width="185" height="165" rx="8" fill="rgba(30,41,59,0.8)" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="15" y="54" width="185" height="24" rx="8" fill="rgba(253,230,138,0.25)"/>
  <rect x="15" y="70" width="185" height="8" fill="rgba(253,230,138,0.25)"/>
  <text x="107" y="72" font-family="Arial, sans-serif" font-size="13" fill="#fde68a" text-anchor="middle" font-weight="bold">Фтор F₂</text>

  <!-- Fluorine molecule representation -->
  <circle cx="80" cy="98" r="12" fill="rgba(253,230,138,0.4)" stroke="#fde68a" stroke-width="1.5"/>
  <text x="80" y="102" font-family="Arial, sans-serif" font-size="10" fill="#fde68a" text-anchor="middle" font-weight="bold">F</text>
  <line x1="92" y1="98" x2="98" y2="98" stroke="#fde68a" stroke-width="2"/>
  <circle cx="110" cy="98" r="12" fill="rgba(253,230,138,0.4)" stroke="#fde68a" stroke-width="1.5"/>
  <text x="110" y="102" font-family="Arial, sans-serif" font-size="10" fill="#fde68a" text-anchor="middle" font-weight="bold">F</text>

  <text x="107" y="126" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">Бледно-жёлтый газ</text>
  <text x="107" y="140" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°пл = −220°C</text>
  <text x="107" y="154" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°кип = −188°C</text>
  <text x="107" y="168" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">Самый сильный окислитель!</text>
  <text x="107" y="182" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">ЭО = 4,0 (максимум)</text>
  <text x="107" y="196" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">→ UF₆, PTFE, зубная паста</text>

  <!-- Chlorine -->
  <rect x="210" y="54" width="185" height="165" rx="8" fill="rgba(30,41,59,0.8)" stroke="#86efac" stroke-width="1.5"/>
  <rect x="210" y="54" width="185" height="24" rx="8" fill="rgba(134,239,172,0.2)"/>
  <rect x="210" y="70" width="185" height="8" fill="rgba(134,239,172,0.2)"/>
  <text x="302" y="72" font-family="Arial, sans-serif" font-size="13" fill="#86efac" text-anchor="middle" font-weight="bold">Хлор Cl₂</text>

  <circle cx="275" cy="98" r="12" fill="rgba(134,239,172,0.3)" stroke="#86efac" stroke-width="1.5"/>
  <text x="275" y="102" font-family="Arial, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" font-weight="bold">Cl</text>
  <line x1="287" y1="98" x2="293" y2="98" stroke="#86efac" stroke-width="2"/>
  <circle cx="305" cy="98" r="12" fill="rgba(134,239,172,0.3)" stroke="#86efac" stroke-width="1.5"/>
  <text x="305" y="102" font-family="Arial, sans-serif" font-size="10" fill="#86efac" text-anchor="middle" font-weight="bold">Cl</text>

  <text x="302" y="126" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Желтовато-зелёный газ</text>
  <text x="302" y="140" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°пл = −101°C</text>
  <text x="302" y="154" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°кип = −34°C</text>
  <text x="302" y="168" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">Токсичный, удушливый</text>
  <text x="302" y="182" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">ЭО = 3,0</text>
  <text x="302" y="196" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">→ Отбеливание, дезинфекция, HCl</text>

  <!-- Bromine -->
  <rect x="405" y="54" width="185" height="165" rx="8" fill="rgba(30,41,59,0.8)" stroke="#f87171" stroke-width="1.5"/>
  <rect x="405" y="54" width="185" height="24" rx="8" fill="rgba(248,113,113,0.2)"/>
  <rect x="405" y="70" width="185" height="8" fill="rgba(248,113,113,0.2)"/>
  <text x="497" y="72" font-family="Arial, sans-serif" font-size="13" fill="#f87171" text-anchor="middle" font-weight="bold">Бром Br₂</text>

  <circle cx="470" cy="98" r="12" fill="rgba(248,113,113,0.3)" stroke="#f87171" stroke-width="1.5"/>
  <text x="470" y="102" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle" font-weight="bold">Br</text>
  <line x1="482" y1="98" x2="488" y2="98" stroke="#f87171" stroke-width="2"/>
  <circle cx="500" cy="98" r="12" fill="rgba(248,113,113,0.3)" stroke="#f87171" stroke-width="1.5"/>
  <text x="500" y="102" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle" font-weight="bold">Br</text>

  <text x="497" y="126" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">Красно-бурая жидкость</text>
  <text x="497" y="140" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°пл = −7°C</text>
  <text x="497" y="154" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°кип = +59°C</text>
  <text x="497" y="168" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">Едкие пары, токсичен</text>
  <text x="497" y="182" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">ЭО = 2,8</text>
  <text x="497" y="196" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">→ Фотография, медицина, HBr</text>

  <!-- Iodine -->
  <rect x="600" y="54" width="185" height="165" rx="8" fill="rgba(30,41,59,0.8)" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="600" y="54" width="185" height="24" rx="8" fill="rgba(167,139,250,0.2)"/>
  <rect x="600" y="70" width="185" height="8" fill="rgba(167,139,250,0.2)"/>
  <text x="692" y="72" font-family="Arial, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="bold">Иод I₂</text>

  <circle cx="665" cy="98" r="12" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="665" y="102" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="bold">I</text>
  <line x1="677" y1="98" x2="683" y2="98" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="695" cy="98" r="12" fill="rgba(167,139,250,0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="695" y="102" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="bold">I</text>

  <text x="692" y="126" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Тёмно-фиолетовый твёрдый</text>
  <text x="692" y="140" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°пл = +114°C</text>
  <text x="692" y="154" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">t°кип = +184°C</text>
  <text x="692" y="168" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">Сублимация (возгонка)</text>
  <text x="692" y="182" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">ЭО = 2,5</text>
  <text x="692" y="196" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">→ Антисептика, крахмал-проба</text>

  <!-- === REACTIVITY TREND (MIDDLE) === -->
  <rect x="15" y="228" width="490" height="80" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="260" y="248" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Реакционная способность окислителей</text>

  <!-- Reactivity arrow -->
  <rect x="40" y="260" width="440" height="36" rx="5" fill="rgba(15,23,42,0.6)" stroke="#475569" stroke-width="0.5"/>
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold">F₂  &gt;  Cl₂  &gt;  Br₂  &gt;  I₂</text>
  <text x="260" y="294" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Сильный окислитель ←←←←←←← Слабый окислитель</text>

  <!-- Arrows showing trend -->
  <line x1="55" y1="256" x2="465" y2="256" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  <polygon points="465,252 475,256 465,260" fill="#ef4444" opacity="0.5"/>
  <text x="265" y="254" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">R атома ↑, ЭО ↓, окисл. способность ↓</text>

  <!-- === DISPLACEMENT REACTIONS (RIGHT MIDDLE) === -->
  <rect x="515" y="228" width="270" height="80" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1" filter="url(#glow29)"/>
  <text x="650" y="248" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Реакции вытеснения</text>

  <text x="650" y="268" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Cl₂ + 2KBr → 2KCl + Br₂</text>
  <text x="650" y="284" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">Cl₂ + 2KI → 2KCl + I₂</text>
  <text x="650" y="300" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Более активный → вытесняет менее активный</text>

  <!-- === PROPERTIES COMPARISON TABLE (BOTTOM) === -->
  <rect x="15" y="318" width="770" height="170" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="338" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Закономерности в группе галогенов (сверху вниз)</text>

  <!-- Table headers -->
  <rect x="25" y="348" width="130" height="20" rx="3" fill="rgba(20,184,166,0.2)"/>
  <text x="90" y="362" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">Свойство</text>

  <rect x="165" y="348" width="150" height="20" rx="3" fill="rgba(253,230,138,0.1)"/>
  <text x="240" y="362" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle" font-weight="bold">F</text>

  <rect x="325" y="348" width="150" height="20" rx="3" fill="rgba(134,239,172,0.1)"/>
  <text x="400" y="362" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle" font-weight="bold">Cl</text>

  <rect x="485" y="348" width="150" height="20" rx="3" fill="rgba(248,113,113,0.1)"/>
  <text x="560" y="362" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle" font-weight="bold">Br</text>

  <rect x="645" y="348" width="130" height="20" rx="3" fill="rgba(167,139,250,0.1)"/>
  <text x="710" y="362" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="bold">I</text>

  <!-- Row: State -->
  <text x="90" y="385" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Агрег. состояние</text>
  <text x="240" y="385" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">Газ</text>
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Газ</text>
  <text x="560" y="385" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">Жидкость</text>
  <text x="710" y="385" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Твёрдое</text>

  <!-- Row: Color -->
  <text x="90" y="403" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Цвет</text>
  <text x="240" y="403" font-family="Arial, sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">Бледно-жёлтый</text>
  <text x="400" y="403" font-family="Arial, sans-serif" font-size="8" fill="#86efac" text-anchor="middle">Жёлто-зелёный</text>
  <text x="560" y="403" font-family="Arial, sans-serif" font-size="8" fill="#f87171" text-anchor="middle">Красно-бурый</text>
  <text x="710" y="403" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">Тёмно-фиолет.</text>

  <!-- Row: EO -->
  <text x="90" y="421" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Электроотрицат.</text>
  <text x="240" y="421" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">4,0</text>
  <text x="400" y="421" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">3,0</text>
  <text x="560" y="421" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">2,8</text>
  <text x="710" y="421" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">2,5</text>

  <!-- Row: Bond energy -->
  <text x="90" y="439" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Энергия связи X-X</text>
  <text x="240" y="439" font-family="Arial, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">159</text>
  <text x="400" y="439" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">243</text>
  <text x="560" y="439" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">193</text>
  <text x="710" y="439" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">151</text>

  <!-- Trend arrows -->
  <line x1="25" y1="455" x2="765" y2="455" stroke="#334155" stroke-width="0.5"/>
  <text x="90" y="472" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">Тренд ↓ по группе:</text>
  <text x="300" y="472" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">ЭО ↓  Реакционная способность ↓  R атома ↑</text>
  <text x="600" y="472" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">t°пл ↑  t°кип ↑  Молярная масса ↑</text>
</svg>