<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="nucleusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Урок 1: Атом — сложная частица. Состав атома</text>
  <!-- Atomic Structure Diagram -->
  <rect x="20" y="58" width="360" height="200" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="200" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Строение атома</text>
  <!-- Nucleus -->
  <circle cx="200" cy="155" r="30" fill="url(#nucleusGrad)" fill-opacity="0.3" stroke="#10b981" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Protons in nucleus -->
  <circle cx="192" cy="148" r="7" fill="#14b8a6" stroke="#0d9488" stroke-width="0.5"/>
  <text x="192" y="152" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="7" font-weight="bold">p⁺</text>
  <circle cx="207" cy="148" r="7" fill="#94a3b8" stroke="#64748b" stroke-width="0.5"/>
  <text x="207" y="152" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="7" font-weight="bold">n⁰</text>
  <circle cx="198" cy="162" r="7" fill="#14b8a6" stroke="#0d9488" stroke-width="0.5"/>
  <text x="198" y="166" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="7" font-weight="bold">p⁺</text>
  <circle cx="210" cy="162" r="7" fill="#94a3b8" stroke="#64748b" stroke-width="0.5"/>
  <text x="210" y="166" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="7" font-weight="bold">n⁰</text>
  <!-- Electron shells -->
  <ellipse cx="200" cy="155" rx="65" ry="45" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <ellipse cx="200" cy="155" rx="110" ry="75" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <ellipse cx="200" cy="155" rx="150" ry="95" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <!-- Electrons -->
  <circle cx="265" cy="155" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="200" cy="80" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="140" cy="130" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="260" cy="110" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <circle cx="310" cy="155" r="5" fill="#f59e0b" filter="url(#glow)"/>
  <!-- Labels -->
  <text x="270" y="168" fill="#f59e0b" font-family="Arial, sans-serif" font-size="9">e⁻</text>
  <text x="200" y="210" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Ядро: p⁺ (протоны) + n⁰ (нейтроны)</text>
  <text x="200" y="224" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Электронные оболочки: e⁻ (электроны)</text>
  <!-- Size comparison -->
  <text x="200" y="246" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="10">Ядро ~10⁻¹⁵ м | Атом ~10⁻¹⁰ м</text>
  <!-- Rutherford Experiment -->
  <rect x="420" y="58" width="360" height="200" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="600" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Опыт Резерфорда</text>
  <!-- Alpha source -->
  <rect x="435" y="140" width="30" height="20" rx="3" fill="#ef4444" fill-opacity="0.7" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="154" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="8">α</text>
  <!-- Gold foil -->
  <rect x="570" y="95" width="8" height="120" rx="2" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="574" y="88" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">Au</text>
  <!-- Most pass through -->
  <line x1="465" y1="135" x2="750" y2="135" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <line x1="465" y1="150" x2="750" y2="150" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="465" y1="165" x2="750" y2="165" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="680" y="130" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Большинство проходят</text>
  <!-- Some deflect -->
  <line x1="465" y1="145" x2="578" y2="145" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="578" y1="145" x2="680" y2="110" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="640" y="108" fill="#f59e0b" font-family="Arial, sans-serif" font-size="9">Отклоняются</text>
  <!-- Few bounce back -->
  <line x1="465" y1="155" x2="578" y2="155" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="578" y1="155" x2="490" y2="200" stroke="#ef4444" stroke-width="1.5"/>
  <text x="490" y="215" fill="#ef4444" font-family="Arial, sans-serif" font-size="9">Отражаются назад</text>
  <!-- Timeline -->
  <rect x="20" y="268" width="760" height="80" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="288" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">История моделей атома</text>
  <!-- Timeline line -->
  <line x1="50" y1="315" x2="750" y2="315" stroke="#14b8a6" stroke-width="2"/>
  <!-- Democritus -->
  <circle cx="130" cy="315" r="8" fill="#14b8a6" filter="url(#glow)"/>
  <text x="130" y="308" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Демокрит</text>
  <text x="130" y="336" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">атом = неделимый</text>
  <!-- Dalton -->
  <circle cx="310" cy="315" r="8" fill="#10b981" filter="url(#glow)"/>
  <text x="310" y="308" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Дальтон</text>
  <text x="310" y="336" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">атом = шарик</text>
  <!-- Thomson -->
  <circle cx="490" cy="315" r="8" fill="#8b5cf6" filter="url(#glow)"/>
  <text x="490" y="308" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Томсон</text>
  <text x="490" y="336" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">«пудинг с изюмом»</text>
  <!-- Rutherford -->
  <circle cx="670" cy="315" r="8" fill="#f59e0b" filter="url(#glow)"/>
  <text x="670" y="308" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Резерфорд</text>
  <text x="670" y="336" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">планетарная модель</text>
  <!-- Key equations -->
  <rect x="20" y="358" width="360" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="200" y="378" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Ключевые формулы</text>
  <text x="40" y="400" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">Z = число протонов = порядковый номер</text>
  <text x="40" y="420" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">A = Z + N  (массовое число)</text>
  <text x="40" y="440" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">N = A − Z  (число нейтронов)</text>
  <text x="40" y="465" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Атом электронейтрален: Z = число e⁻</text>
  <!-- Nuclide notation -->
  <rect x="420" y="358" width="360" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="600" y="378" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Обозначение нуклида</text>
  <!-- Na notation -->
  <text x="500" y="410" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">²³</text>
  <text x="520" y="425" fill="#ffffff" font-family="Arial, sans-serif" font-size="14">₁₁</text>
  <text x="540" y="418" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Na</text>
  <text x="460" y="455" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11">11 протонов (p⁺)</text>
  <text x="460" y="472" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">12 нейтронов (n⁰)</text>
  <text x="600" y="455" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11">11 электронов (e⁻)</text>
  <text x="600" y="472" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="11">A=23, Z=11, N=12</text>
</svg>