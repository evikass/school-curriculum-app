<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Монополистическая конкуренция</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 16</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">16</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Признаки</text>
  <text x="28" y="100" class="box-text">1. Много фирм    2. Дифференцированный продукт    3. Свободный вход/выход</text>
  <text x="28" y="113" class="box-text">4. Неценовая конкуренция (реклама, бренд)    5. P &gt; MC (как у монополии)</text>
  <rect x="20" y="138" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="234" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Краткосрочный период</text>
  <text x="28" y="166" class="box-text">D ↘ (не эластична)</text>
  <text x="28" y="179" class="box-text">MR = MC → Q*, P*</text>
  <text x="28" y="192" class="box-text">P &gt; ATC → π &gt; 0</text>
  <text x="28" y="205" class="box-text">Как у монополии,</text>
  <text x="28" y="218" class="box-text">но кривая D более эластична</text>
  <rect x="260" y="138" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="152" class="box-title">Долгосрочный период</text>
  <text x="268" y="166" class="box-text">Вход новых фирм → D ↘</text>
  <text x="268" y="179" class="box-text">D сдвигается влево</text>
  <text x="268" y="192" class="box-text">До π = 0: P = ATC</text>
  <text x="268" y="205" class="box-text">Но P &gt; min ATC!</text>
  <text x="268" y="218" class="box-text">Избыточная мощность</text>
  <rect x="20" y="225" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="225" x2="234" y2="225" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="239" class="box-title">Дифференциация продукта</text>
  <text x="28" y="253" class="box-text">Качество и дизайн</text>
  <text x="28" y="266" class="box-text">Торговая марка (бренд)</text>
  <text x="28" y="279" class="box-text">Реклама и маркетинг</text>
  <text x="28" y="292" class="box-text">Услуги и сервис</text>
  <text x="28" y="305" class="box-text">Географическое положение</text>
  <rect x="260" y="225" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="225" x2="474" y2="225" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="239" class="box-title">Неценовая конкуренция</text>
  <text x="268" y="253" class="box-text">Реклама → сдвиг D вправо</text>
  <text x="268" y="266" class="box-text">Бренд → снижение эластичн.</text>
  <text x="268" y="279" class="box-text">Инновации → преимущество</text>
  <text x="268" y="292" class="box-text">Сервис → лояльность</text>
  <text x="268" y="305" class="box-text">Затраты на рекламу ↑ ATC</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>