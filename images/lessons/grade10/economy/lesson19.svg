<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Рынок земли и рента</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 19</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">19</text>
  <rect x="20" y="72" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Особенности земли</text>
  <text x="28" y="100" class="box-text">Неперемещаемый фактор</text>
  <text x="28" y="113" class="box-text">Предложение абсолютно</text>
  <text x="28" y="126" class="box-text">неэластично (S вертикальна)</text>
  <text x="28" y="139" class="box-text">Цена земли → рента</text>
  <text x="28" y="152" class="box-text">Рента = доход собственника</text>
  <rect x="260" y="72" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Экономическая рента</text>
  <text x="268" y="100" class="box-text">Платёж сверх альтернативной</text>
  <text x="268" y="113" class="box-text">стоимости фактора</text>
  <text x="268" y="126" class="box-text">Для земли: вся рента —</text>
  <text x="268" y="139" class="box-text">чистая экономическая рента</text>
  <text x="268" y="152" class="box-text">(нет альтернативы)</text>
  <rect x="20" y="160" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="160" x2="474" y2="160" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="174" class="box-title">Дифференциальная рента</text>
  <text x="28" y="188" class="box-text">Рента I: по плодородию/местоположению (лучшие участки → рента)</text>
  <text x="28" y="201" class="box-text">Рента II: за дополнительные инвестиции (мелиорация, удобрения)</text>
  <rect x="20" y="230" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="230" x2="234" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="244" class="box-title">Цена земли</text>
  <text x="28" y="258" class="box-text">Pземли = R / r</text>
  <text x="28" y="271" class="box-text">R — годовая рента</text>
  <text x="28" y="284" class="box-text">r — ставка процента</text>
  <text x="28" y="297" class="box-text">При R=100 тыс., r=5%:</text>
  <text x="28" y="310" class="box-text">P = 100/0.05 = 2 млн</text>
  <rect x="260" y="230" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="230" x2="474" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="244" class="box-title">Арендная плата</text>
  <text x="268" y="258" class="box-text">= рента + процент на капитал</text>
  <text x="268" y="271" class="box-text">  + амортизация построек</text>
  <text x="268" y="284" class="box-text">На практике: рыночная ставка</text>
  <text x="268" y="297" class="box-text">аренды за 1 м²/га</text>
  <text x="268" y="310" class="box-text">Зависит от расположения</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>