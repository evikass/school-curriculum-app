<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Движение по окружности</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Circle for motion -->
    <circle cx="150" cy="220" r="80" fill="none" stroke="#5C6BC0" stroke-width="2"/>
    <!-- Center -->
    <circle cx="150" cy="220" r="2.5" fill="#1A237E"/>
    <text x="140" y="237" font-family="Arial,sans-serif" font-size="9" fill="#1A237E">O</text>
    <!-- Radius -->
    <line x1="150" y1="220" x2="230" y2="220" stroke="#E91E63" stroke-width="2"/>
    <text x="188" y="215" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">R</text>
    <!-- Point on circle -->
    <circle cx="100" cy="155" r="4" fill="#5C6BC0"/>
    <text x="83" y="148" font-family="Arial,sans-serif" font-size="10" fill="#5C6BC0" font-weight="bold">M</text>
    <!-- Velocity vector (tangent) -->
    <line x1="100" y1="155" x2="55" y2="122" stroke="#4CAF50" stroke-width="2.5"/>
    <polygon points="52,125 47,115 59,120" fill="#4CAF50"/>
    <text x="50" y="118" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">v</text>
    <!-- Centripetal acceleration vector (towards center) -->
    <line x1="100" y1="155" x2="120" y2="183" stroke="#E91E63" stroke-width="2.5"/>
    <polygon points="118,180 125,190 115,188" fill="#E91E63"/>
    <text x="105" y="185" font-family="Arial,sans-serif" font-size="9" fill="#E91E63" font-weight="bold">a</text>
    <!-- Angle arc -->
    <path d="M170,220 A20,20 0 0,0 168,208" fill="none" stroke="#FF9800" stroke-width="2"/>
    <text x="175" y="213" font-family="Arial,sans-serif" font-size="10" fill="#FF9800" font-weight="bold">phi</text>
    <!-- Dashed radius to point -->
    <line x1="150" y1="220" x2="100" y2="155" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Formulas panel -->
    <rect x="275" y="90" width="205" height="205" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="285" y="108" font-family="Arial,sans-serif" font-size="12" fill="#1A237E" font-weight="bold">Формулы:</text>
    <line x1="285" y1="113" x2="470" y2="113" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="285" y="130" font-family="Arial,sans-serif" font-size="11" fill="#444">Угловая скорость:</text>
    <text x="285" y="146" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">omega = phi / t</text>
    <line x1="285" y1="153" x2="470" y2="153" stroke="#eee" stroke-width="0.5"/>
    <text x="285" y="168" font-family="Arial,sans-serif" font-size="11" fill="#444">Линейная скорость:</text>
    <text x="285" y="184" font-family="Arial,sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">v = omega * R</text>
    <line x1="285" y1="191" x2="470" y2="191" stroke="#eee" stroke-width="0.5"/>
    <text x="285" y="206" font-family="Arial,sans-serif" font-size="11" fill="#444">Центрострем. ускор.:</text>
    <text x="285" y="222" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" font-weight="bold">a = v^2/R = omega^2*R</text>
    <line x1="285" y1="229" x2="470" y2="229" stroke="#eee" stroke-width="0.5"/>
    <text x="285" y="244" font-family="Arial,sans-serif" font-size="11" fill="#444">Период и частота:</text>
    <text x="285" y="260" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">T = 2*pi/omega</text>
    <text x="285" y="278" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">nu = 1/T = omega/(2*pi)</text>
    <!-- Key info -->
    <rect x="25" y="90" width="240" height="28" rx="4" fill="#5C6BC0" opacity="0.08"/>
    <text x="145" y="108" font-family="Arial,sans-serif" font-size="10" fill="#1A237E" text-anchor="middle">v перпендикулярна R, a направлено к центру</text>
    <!-- Direction labels -->
    <text x="45" y="130" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">по касательной</text>
    <text x="100" y="200" font-family="Arial,sans-serif" font-size="8" fill="#E91E63">к центру</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>