<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3b82f6" stroke-width="2" rx="5" />
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#1e3a8a" stroke-width="1" rx="3" />
  
  <!-- Номер урока -->
  <text x="455" y="30" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a" text-anchor="end">Урок 12</text>
  
  <!-- Физика · 10 КЛАСС -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="14" fill="url(#titleGradient)" text-anchor="middle" font-weight="bold">ФИЗИКА · 10 КЛАСС</text>
  
  <!-- Заголовок -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a" text-anchor="middle" font-weight="bold">Законы Ньютона</text>
  
  <!-- Разделитель -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#3b82f6" stroke-width="1" />
  
  <!-- Первый закон Ньютона -->
  <text x="50" y="105" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a" font-weight="bold">Первый закон Ньютона:</text>
  <text x="50" y="125" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Если на тело не действуют другие тела или</text>
  <text x="50" y="140" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">их действие скомпенсировано, то тело</text>
  <text x="50" y="155" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">находится в покое или движется</text>
  <text x="50" y="170" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">равномерно и прямолинейно.</text>
  
  <!-- Инерциальная система отсчета -->
  <text x="50" y="195" font-family="Arial, sans-serif" font-size="13" fill="#1e3a8a" font-weight="bold">Инерциальные системы отсчёта —</text>
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">системы, в которых выполняется первый закон Ньютона.</text>
  
  <!-- Рисунок тела в покое -->
  <rect x="320" y="180" width="40" height="30" fill="url(#bodyGradient)" rx="3" />
  <text x="340" y="205" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">m</text>
  
  <!-- Стрелки для покоя -->
  <line x1="320" y1="170" x2="320" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)" />
  <line x1="360" y1="170" x2="360" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDown)" />
  <text x="340" y="150" font-family="Arial, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Тело в покое</text>
  
  <!-- Стрелки для движения -->
  <line x1="320" y1="225" x2="360" y2="225" stroke="url(#arrowGradient)" stroke-width="3" marker-end="url(#arrowRight)" />
  <line x1="310" y1="240" x2="370" y2="240" stroke="#64748b" stroke-width="1" stroke-dasharray="5,5" />
  <text x="340" y="255" font-family="Arial, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Равномерное движение</text>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="url(#arrowGradient)" />
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="3" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,9 z" fill="#64748b" />
    </marker>
  </defs>
  
  <!-- Второй закон Ньютона -->
  <text x="50" y="290" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a" font-weight="bold">Второй закон Ньютона:</text>
  <text x="50" y="310" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Ускорение тела прямо </text>
  
  <!-- Формула F = ma -->
  <rect x="200" y="300" width="120" height="25" fill="#e0f2fe" stroke="#3b82f6" stroke-width="1" rx="3" />
  <text x="260" y="317" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a" text-anchor="middle" font-weight="bold">F = ma</text>
  
  <!-- Обозначения в формуле -->
  <text x="200" y="335" font-family="Arial, sans-serif" font-size="10" fill="#4b5563">F — сила, m — масса, a — ускорение</text>
  
  <!-- График зависимости ускорения от силы -->
  <g transform="translate(350, 250)">
    <line x1="0" y1="80" x2="80" y2="80" stroke="#1e3a8a" stroke-width="1.5" />
    <line x1="0" y1="0" x2="0" y2="80" stroke="#1e3a8a" stroke-width="1.5" />
    <line x1="5" y1="75" x2="75" y2="5" stroke="#3b82f6" stroke-width="2" />
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">F</text>
    <text x="-15" y="40" font-family="Arial, sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">a</text>
    <text x="40" y="-5" font-family="Arial, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle">a ∝ F</text>
  </g>
  
  <!-- Третий закон Ньютона (упоминание) -->
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a" font-weight="bold">Третий закон Ньютона:</text>
  <text x="50" y="265" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Действие всегда равна противодействию.</text>
  
  <!-- Декоративные элементы -->
  <circle cx="470" cy="30" r="3" fill="#3b82f6" opacity="0.5" />
  <circle cx="460" cy="35" r="2" fill="#3b82f6" opacity="0.5" />
  <circle cx="475" cy="40" r="2" fill="#3b82f6" opacity="0.5" />
  
  <!-- Иконка инерции -->
  <g transform="translate(420, 100)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#3b82f6" stroke-width="2" />
    <line x1="10" y1="0" x2="0" y2="0" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowCircle)" />
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Инерция</text>
  </g>
  
  <defs>
    <marker id="arrowCircle" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#3b82f6" />
    </marker>
  </defs>
  
  <!-- Силовые векторы -->
  <g transform="translate(150, 200)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowForce)" />
    <text x="35" y="5" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">F₁</text>
    <line x1="0" y1="0" x2="-25" y2="0" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowForce2)" />
    <text x="-35" y="5" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">F₂</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">Силы скомпенсированы</text>
  </g>
  
  <defs>
    <marker id="arrowForce" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#dc2626" />
    </marker>
    <marker id="arrowForce2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#f59e0b" />
    </marker>
  </defs>
  
  <!-- Уравнение равновесия -->
  <rect x="50" y="335" width="140" height="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="2" />
  <text x="120" y="348" font-family="Arial, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">F₁ + F₂ = 0</text>
  
  <!-- Примечание -->
  <text x="250" y="335" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" font-style="italic">Закон инерции</text>
  
  <!-- Дополнительные элементы -->
  <rect x="300" y="90" width="2" height="80" fill="#cbd5e1" opacity="0.5" />
  <rect x="420" y="180" width="60" height="2" fill="#cbd5e1" opacity="0.5" />
</svg>