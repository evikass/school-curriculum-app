<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#004085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002752;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="defenseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc3545;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#721c24;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="legalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28a745;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e7e34;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Фоновая рамка -->
  <rect width="500" height="350" fill="url(#bgGrad)" stroke="#495057" stroke-width="2"/>
  
  <!-- Декоративная внутренняя рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#6c757d" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок класса -->
  <rect x="150" y="20" width="200" height="25" fill="url(#headerGrad)" rx="3"/>
  <text x="250" y="37" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">ОБЖ · 10 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529" text-anchor="middle">Самозащита и правовые аспекты</text>
  
  <!-- Номер урока -->
  <rect x="420" y="20" width="60" height="25" fill="#17a2b8" rx="3"/>
  <text x="450" y="37" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Урок 15</text>
  
  <!-- Блок правил самозащиты -->
  <rect x="30" y="90" width="210" height="220" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5" rx="5"/>
  <text x="135" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">ПРАВИЛА САМОЗАЩИТЫ</text>
  
  <!-- Правило 1 -->
  <circle cx="50" cy="135" r="15" fill="#ffc107" stroke="#856404" stroke-width="1.5"/>
  <text x="50" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">1</text>
  <text x="80" y="140" font-family="Arial, sans-serif" font-size="12" fill="#212529">Избегать конфликтов</text>
  <path d="M45 150 L65 150" stroke="#6c757d" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Правило 2 -->
  <circle cx="50" cy="170" r="15" fill="#17a2b8" stroke="#0c5460" stroke-width="1.5"/>
  <text x="50" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="80" y="175" font-family="Arial, sans-serif" font-size="12" fill="#212529">Не провоцировать агрессора</text>
  <path d="M45 185 L65 185" stroke="#6c757d" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Правило 3 -->
  <circle cx="50" cy="205" r="15" fill="#28a745" stroke="#155724" stroke-width="1.5"/>
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="12" fill="#212529">Привлекать внимание окружающих</text>
  <path d="M45 220 L65 220" stroke="#6c757d" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Правило 4 -->
  <circle cx="50" cy="240" r="15" fill="#dc3545" stroke="#721c24" stroke-width="1.5"/>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="12" fill="#212529">Знать приёмы самообороны</text>
  <path d="M45 255 L65 255" stroke="#6c757d" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Схема действий при угрозе -->
  <rect x="260" y="90" width="210" height="220" fill="#f8f9fa" stroke="#6c757d" stroke-width="1.5" rx="5"/>
  <text x="365" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529" text-anchor="middle">АЛГОРИТМ ДЕЙСТВИЙ</text>
  
  <!-- Центральная фигура человека -->
  <ellipse cx="365" cy="200" rx="20" ry="25" fill="#6c757d"/>
  <rect x="355" y="220" width="20" height="40" fill="#6c757d" rx="2"/>
  
  <!-- Стрелки алгоритма -->
  <path d="M300 150 L340 150" stroke="#ffc107" stroke-width="2" marker-end="url(#arrow1)"/>
  <text x="320" y="145" font-family="Arial, sans-serif" font-size="10" fill="#212529" text-anchor="middle">Угроза</text>
  
  <path d="M390 150 L430 150" stroke="#17a2b8" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="410" y="145" font-family="Arial, sans-serif" font-size="10" fill="#212529" text-anchor="middle">Оценка</text>
  
  <path d="M300 250 L340 250" stroke="#28a745" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="320" y="245" font-family="Arial, sans-serif" font-size="10" fill="#212529" text-anchor="middle">Бегство</text>
  
  <path d="M390 250 L430 250" stroke="#dc3545" stroke-width="2" marker-end="url(#arrow4)"/>
  <text x="410" y="245" font-family="Arial, sans-serif" font-size="10" fill="#212529" text-anchor="middle">Самозащита</text>
  
  <!-- Стрелки маркеры -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffc107"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#17a2b8"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#28a745"/>
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc3545"/>
    </marker>
  </defs>
  
  <!-- Блок "Необходимая оборона (ст. 37 УК РФ)" -->
  <rect x="30" y="320" width="440" height="25" fill="url(#legalGrad)" rx="3"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Необходимая оборона (ст. 37 УК РФ)</text>
  
  <!-- Детализация необходимой обороны -->
  <rect x="260" y="130" width="180" height="80" fill="white" stroke="#6c757d" stroke-width="1" rx="3"/>
  <text x="350" y="150" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#212529" text-anchor="middle">Право на защиту</text>
  <text x="350" y="170" font-family="Arial, sans-serif" font-size="10" fill="#495057" text-anchor="middle">от общественно опасного</text>
  <text x="350" y="185" font-family="Arial, sans-serif" font-size="10" fill="#495057" text-anchor="middle">посягательства</text>
  <text x="350" y="200" font-family="Arial, sans-serif" font-size="10" fill="#495057" text-anchor="middle">путём причинения вреда</text>
  
  <!-- Декоративные элементы -->
  <circle cx="40" cy="40" r="3" fill="#17a2b8"/>
  <circle cx="460" cy="40" r="3" fill="#17a2b8"/>
  <circle cx="40" cy="310" r="3" fill="#17a2b8"/>
  <circle cx="460" cy="310" r="3" fill="#17a2b8"/>
  
  <!-- Иконка самозащиты -->
  <g transform="translate(350, 260)">
    <circle cx="0" cy="0" r="15" fill="url(#defenseGrad)" opacity="0.7"/>
    <path d="M-5,-5 L5,5 M-5,5 L5,-5" stroke="white" stroke-width="2"/>
  </g>
</svg>