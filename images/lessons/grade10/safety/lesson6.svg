<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc44;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cloudGrad">
      <stop offset="0%" style="stop-color:#cccccc;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:0.9" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#333" stroke-width="2" rx="5" ry="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#666" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Номер урока -->
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="end">Урок №15</text>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">ОБЖ · 10 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#cc0000" text-anchor="middle">Чрезвычайные ситуации</text>
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="18" fill="#cc0000" text-anchor="middle">техногенного характера</text>
  
  <!-- Разделитель -->
  <line x1="30" y1="85" x2="470" y2="85" stroke="#666" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Заголовок раздела -->
  <text x="250" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0044cc" text-anchor="middle">Виды техногенных ЧС</text>
  
  <!-- Блок 1: Аварии на химически опасных объектах -->
  <rect x="30" y="120" width="220" height="200" fill="#f0f8ff" stroke="#0044cc" stroke-width="2" rx="5" ry="5"/>
  <text x="140" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0044cc" text-anchor="middle">Аварии на ХОО</text>
  
  <!-- Химический завод -->
  <g transform="translate(50, 155)">
    <rect x="0" y="0" width="40" height="60" fill="#999" stroke="#666" stroke-width="1"/>
    <rect x="10" y="0" width="20" height="10" fill="#666"/>
    <rect x="40" y="20" width="20" height="40" fill="#aaa" stroke="#666" stroke-width="1"/>
    <rect x="60" y="30" width="20" height="30" fill="#aaa" stroke="#666" stroke-width="1"/>
    <circle cx="70" cy="45" r="8" fill="#ff0000" opacity="0.7"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="12" fill="#333">Химический завод</text>
  </g>
  
  <!-- Облако газа -->
  <g transform="translate(30, 235)">
    <ellipse cx="50" cy="20" rx="40" ry="15" fill="url(#cloudGrad)"/>
    <ellipse cx="70" cy="25" rx="35" ry="12" fill="url(#cloudGrad)"/>
    <ellipse cx="90" cy="20" rx="30" ry="10" fill="url(#cloudGrad)"/>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Облако АХОВ</text>
  </g>
  
  <!-- Виды АХОВ -->
  <text x="140" y="155" font-family="Arial, sans-serif" font-size="12" fill="#333">Вещества:</text>
  <text x="140" y="175" font-family="Arial, sans-serif" font-size="11" fill="#333">• Аммиак (NH₃)</text>
  <text x="140" y="190" font-family="Arial, sans-serif" font-size="11" fill="#333">• Хлор (Cl₂)</text>
  <text x="140" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333">• Сероводород (H₂S)</text>
  
  <!-- Признаки -->
  <text x="140" y="225" font-family="Arial, sans-serif" font-size="12" fill="#333">Признаки:</text>
  <text x="140" y="240" font-family="Arial, sans-serif" font-size="11" fill="#333">• Резкий запах</text>
  <text x="140" y="255" font-family="Arial, sans-serif" font-size="11" fill="#333">• Видимое облако</text>
  <text x="140" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">• Раздражение дыхания</text>
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="11" fill="#333">• Слезотечение</text>
  
  <!-- Блок 2: Действия -->
  <rect x="260" y="120" width="210" height="200" fill="#f0fff0" stroke="#008800" stroke-width="2" rx="5" ry="5"/>
  <text x="365" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#008800" text-anchor="middle">Действия при угрозе</text>
  
  <!-- Действие 1 -->
  <g transform="translate(275, 155)">
    <rect x="0" y="0" width="180" height="35" fill="white" stroke="#008800" stroke-width="1" rx="3" ry="3"/>
    <circle cx="15" cy="17.5" r="5" fill="url(#greenGrad)"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">1</text>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="11" fill="#333">Закрыть окна</text>
    <text x="30" y="28" font-family="Arial, sans-serif" font-size="11" fill="#333">Выключить вентиляцию</text>
  </g>
  
  <!-- Действие 2 -->
  <g transform="translate(275, 195)">
    <rect x="0" y="0" width="180" height="35" fill="white" stroke="#008800" stroke-width="1" rx="3" ry="3"/>
    <circle cx="15" cy="17.5" r="5" fill="url(#greenGrad)"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">2</text>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="11" fill="#333">Загерметизировать</text>
    <text x="30" y="28" font-family="Arial, sans-serif" font-size="11" fill="#333">квартиру</text>
  </g>
  
  <!-- Действие 3 -->
  <g transform="translate(275, 235)">
    <rect x="0" y="0" width="180" height="35" fill="white" stroke="#008800" stroke-width="1" rx="3" ry="3"/>
    <circle cx="15" cy="17.5" r="5" fill="url(#greenGrad)"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">3</text>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="11" fill="#333">Использовать</text>
    <text x="30" y="28" font-family="Arial, sans-serif" font-size="11" fill="#333">противогаз или ВМП</text>
  </g>
  
  <!-- Действие 4 -->
  <g transform="translate(275, 275)">
    <rect x="0" y="0" width="180" height="35" fill="white" stroke="#008800" stroke-width="1" rx="3" ry="3"/>
    <circle cx="15" cy="17.5" r="5" fill="url(#greenGrad)"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">4</text>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="11" fill="#333">Эвакуация</text>
    <text x="30" y="28" font-family="Arial, sans-serif" font-size="11" fill="#333">перпендикулярно ветру</text>
  </g>
  
  <!-- Схема эвакуации -->
  <g transform="translate(280, 320)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#0044cc" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#0044cc" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" fill="#0044cc" text-anchor="middle">Ветер</text>
    <text x="-15" y="-15" font-family="Arial, sans-serif" font-size="10" fill="#0044cc" text-anchor="middle">Эвакуация</text>
  </g>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0044cc"/>
    </marker>
  </defs>
  
  <!-- Формула безопасности -->
  <rect x="30" y="325" width="220" height="15" fill="#fffacd" stroke="#333" stroke-width="1" rx="2" ry="2"/>
  <text x="140" y="335" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">t = t₀ + (Q·k)/(4·π·λ·r)</text>
  <text x="140" y="345" font-family="Arial, sans-serif" font-size="8" fill="#666" text-anchor="middle">формула времени безопасного пребывания</text>
  
  <!-- Пиктограмма опасности -->
  <g transform="translate(470, 320)">
    <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5" fill="url(#redGrad)" stroke="#333" stroke-width="1"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">!</text>
  </g>
</svg>