<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">Passive Voice</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 2</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#283593" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Passive — действие совершается над подлежащим</text>
  <rect x="20" y="120" width="225" height="55" rx="5" fill="#283593" opacity="0.08"/>
  <text x="132" y="138" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Active</text>
  <text x="132" y="158" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">She wrote the letter</text>
  <rect x="255" y="120" width="225" height="55" rx="5" fill="#283593" opacity="0.08"/>
  <text x="367" y="138" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">Passive</text>
  <text x="367" y="158" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">The letter was written</text>
  <rect x="20" y="185" width="460" height="55" rx="5" fill="#283593" opacity="0.08"/>
  <text x="30" y="203" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="start" font-weight="bold">Формула:</text>
  <text x="30" y="222" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">to be (в нужном времени) + V3 (Past Participle)</text>
  <rect x="20" y="248" width="460" height="55" rx="5" fill="#283593" opacity="0.05"/>
  <text x="30" y="266" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">По временам:</text>
  <text x="30" y="284" font-family="Arial,sans-serif" font-size="8" fill="#333333" text-anchor="start" font-weight="normal">Present: is/am/are written | Past: was/were written | Future: will be written</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 10</text>
</svg>