<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bc8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Decorative border -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a90e2" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a90e2" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="500" height="50" fill="url(#headerGrad)"/>
  <text x="250" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">АНГЛИЙСКИЙ · 10 КЛАСС</text>
  <text x="250" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">Урок 4: Reported Speech</text>
  
  <!-- Lesson number -->
  <circle cx="460" cy="25" r="15" fill="#ff6b6b" filter="url(#shadow)"/>
  <text x="460" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">4</text>
  
  <!-- Main title -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Косвенная речь (Reported Speech)</text>
  
  <!-- Direct Speech Example -->
  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="200" height="120" fill="#f8f9fa" stroke="#4a90e2" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Прямая речь</text>
    
    <path d="M 20 40 L 20 60 L 40 50 Z" fill="#ff6b6b"/>
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="12" fill="#333">"I am happy today,"</text>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="12" fill="#333">said Tom.</text>
    
    <text x="10" y="95" font-family="Arial, sans-serif" font-size="11" fill="#666">• Кавычки</text>
    <text x="10" y="110" font-family="Arial, sans-serif" font-size="11" fill="#666">• Глагол said</text>
  </g>
  
  <!-- Arrow -->
  <path d="M 240 150 L 260 150" stroke="#4a90e2" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90e2"/>
    </marker>
  </defs>
  
  <!-- Reported Speech Example -->
  <g transform="translate(270, 90)">
    <rect x="0" y="0" width="200" height="120" fill="#f8f9fa" stroke="#4a90e2" stroke-width="2" rx="5" filter="url(#shadow)"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Косвенная речь</text>
    
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="12" fill="#333">Tom said that he</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="12" fill="#333">was happy that day.</text>
    
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#666">• Соединитель that</text>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#666">• Изменения времен</text>
  </g>
  
  <!-- Time Change Table -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="400" height="100" fill="white" stroke="#4a90e2" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="200" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Изменение времен в косвенной речи</text>
    
    <line x1="0" y1="30" x2="400" y2="30" stroke="#ddd" stroke-width="1"/>
    
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#333">Прямая речь</text>
    <text x="210" y="45" font-family="Arial, sans-serif" font-size="11" fill="#333">Косвенная речь</text>
    
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#666">Present Simple</text>
    <text x="210" y="60" font-family="Arial, sans-serif" font-size="10" fill="#666">Past Simple</text>
    
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#666">Past Simple</text>
    <text x="210" y="75" font-family="Arial, sans-serif" font-size="10" fill="#666">Past Perfect</text>
    
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#666">Future Simple</text>
    <text x="210" y="90" font-family="Arial, sans-serif" font-size="10" fill="#666">Future in the Past</text>
  </g>
  
  <!-- Pronoun Changes -->
  <g transform="translate(30, 150)">
    <circle cx="25" cy="25" r="20" fill="#ffd93d" filter="url(#shadow)"/>
    <text x="25" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">I</text>
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="16" fill="#666">→</text>
    <circle cx="75" cy="25" r="20" fill="#6bcf7f" filter="url(#shadow)"/>
    <text x="75" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">he</text>
    
    <circle cx="25" cy="65" r="20" fill="#ffd93d" filter="url(#shadow)"/>
    <text x="25" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">you</text>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="16" fill="#666">→</text>
    <circle cx="75" cy="65" r="20" fill="#6bcf7f" filter="url(#shadow)"/>
    <text x="75" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">I/we</text>
    
    <circle cx="125" cy="25" r="20" fill="#ffd93d" filter="url(#shadow)"/>
    <text x="125" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">this</text>
    <text x="150" y="30" font-family="Arial, sans-serif" font-size="16" fill="#666">→</text>
    <circle cx="175" cy="25" r="20" fill="#6bcf7f" filter="url(#shadow)"/>
    <text x="175" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">that</text>
    
    <circle cx="125" cy="65" r="20" fill="#ffd93d" filter="url(#shadow)"/>
    <text x="125" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">here</text>
    <text x="150" y="70" font-family="Arial, sans-serif" font-size="16" fill="#666">→</text>
    <circle cx="175" cy="65" r="20" fill="#6bcf7f" filter="url(#shadow)"/>
    <text x="175" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">there</text>
  </g>
  
  <!-- Formula Box -->
  <g transform="translate(280, 150)">
    <rect x="0" y="0" width="190" height="70" fill="#e8f4fd" stroke="#4a90e2" stroke-width="1.5" rx="5" filter="url(#shadow)"/>
    <text x="95" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Формула косвенной речи</text>
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">Subject + said (that) +</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333">clause with changed tenses</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="3" fill="#4a90e2" opacity="0.5"/>
  <circle cx="470" cy="30" r="3" fill="#4a90e2" opacity="0.5"/>
  <circle cx="30" cy="320" r="3" fill="#4a90e2" opacity="0.5"/>
  <circle cx="470" cy="320" r="3" fill="#4a90e2" opacity="0.5"/>
</svg>