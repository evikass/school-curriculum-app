<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">Text Analysis</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 9</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#283593" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Анализ текста — понимание структуры и содержания</text>
  <rect x="20" y="120" width="460" height="26" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="137" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">1. Read</text>
  <text x="120" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Прочитать текст целиком</text>
  <rect x="20" y="150" width="460" height="26" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="167" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">2. Identify</text>
  <text x="120" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Определить тему и главную мысль</text>
  <rect x="20" y="180" width="460" height="26" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="197" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">3. Structure</text>
  <text x="120" y="197" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Найти введение, основную часть, вывод</text>
  <rect x="20" y="210" width="460" height="26" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="227" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">4. Vocabulary</text>
  <text x="120" y="227" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Определить ключевые слова</text>
  <rect x="20" y="240" width="460" height="26" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="257" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">5. Tone</text>
  <text x="120" y="257" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Определить тон и стиль автора</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 10</text>
</svg>