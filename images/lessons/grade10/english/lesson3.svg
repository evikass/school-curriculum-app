  <text x="30" y="210" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="start" font-weight="normal">If + Past, would + V</text>
  <text x="30" y="222" font-family="Arial,sans-serif" font-size="8" fill="#333333" text-anchor="start" font-weight="normal">If I had money, I would buy</text>
  <text x="400" y="208" font-family="Arial,sans-serif" font-size="7" fill="#555555" text-anchor="end" font-weight="normal">Нереальная ситуация</text>
