<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9370DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3CB371;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4A90E2" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#7B68EE" stroke-width="1"/>
  
  <!-- Номер урока -->
  <circle cx="30" cy="30" r="12" fill="url(#grad1)"/>
  <text x="30" y="35" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">6</text>
  
  <!-- Английский · 10 класс -->
  <text x="250" y="35" text-anchor="middle" fill="#4A90E2" font-family="Arial" font-size="16" font-weight="bold">АНГЛИЙСКИЙ · 10 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" text-anchor="middle" fill="#333" font-family="Arial" font-size="24" font-weight="bold">Урок 6: Идиомы</text>
  
  <!-- Основная схема: что такое идиома -->
  <rect x="50" y="80" width="400" height="70" rx="10" fill="url(#grad2)" opacity="0.2"/>
  <text x="250" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="14" font-weight="bold">Что такое идиома?</text>
  <text x="250" y="125" text-anchor="middle" fill="#555" font-family="Arial" font-size="12">Идиома - устойчивое выражение, значение которого</text>
  <text x="250" y="140" text-anchor="middle" fill="#555" font-family="Arial" font-size="12">не определяется значением составляющих его слов</text>
  
  <!-- Пример идиомы с рисунком -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="#FFE4B5"/>
    <text x="60" y="25" text-anchor="middle" fill="#333" font-family="Arial" font-size="12" font-weight="bold">It's raining</text>
    <text x="60" y="40" text-anchor="middle" fill="#333" font-family="Arial" font-size="12" font-weight="bold">cats and dogs</text>
    
    <!-- Рисунок дождя -->
    <g transform="translate(10, 65)">
      <line x1="10" y1="5" x2="10" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="20" y1="5" x2="20" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="30" y1="5" x2="30" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="40" y1="5" x2="40" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="50" y1="5" x2="50" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="60" y1="5" x2="60" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="70" y1="5" x2="70" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="80" y1="5" x2="80" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="90" y1="5" x2="90" y2="25" stroke="#4169E1" stroke-width="2"/>
      <line x1="100" y1="5" x2="100" y2="25" stroke="#4169E1" stroke-width="2"/>
      
      <!-- Кошка и собака -->
      <ellipse cx="25" cy="15" rx="15" ry="10" fill="#8B4513"/>
      <circle cx="20" cy="10" r="5" fill="#8B4513"/>
      <path d="M 15 10 Q 10 5, 15 0" stroke="#8B4513" stroke-width="2" fill="none"/>
      <path d="M 30 10 Q 35 5, 30 0" stroke="#8B4513" stroke-width="2" fill="none"/>
      <path d="M 25 20 L 25 30" stroke="#8B4513" stroke-width="2"/>
      <path d="M 15 25 L 20 30" stroke="#8B4513" stroke-width="2"/>
      <path d="M 35 25 L 30 30" stroke="#8B4513" stroke-width="2"/>
      
      <ellipse cx="75" cy="15" rx="15" ry="10" fill="#A52A2A"/>
      <circle cx="70" cy="10" r="5" fill="#A52A2A"/>
      <circle cx="80" cy="10" r="5" fill="#A52A2A"/>
      <path d="M 65 10 Q 60 5, 65 0" stroke="#A52A2A" stroke-width="2" fill="none"/>
      <path d="M 85 10 Q 90 5, 85 0" stroke="#A52A2A" stroke-width="2" fill="none"/>
      <path d="M 70 20 L 70 30" stroke="#A52A2A" stroke-width="2"/>
      <path d="M 80 20 L 80 30" stroke="#A52A2A" stroke-width="2"/>
      <path d="M 65 25 L 70 30" stroke="#A52A2A" stroke-width="2"/>
      <path d="M 85 25 L 80 30" stroke="#A52A2A" stroke-width="2"/>
    </g>
    
    <text x="60" y="105" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">Идет сильный дождь</text>
  </g>
  
  <!-- Стрелка к значению -->
  <path d="M 180 200 L 220 200" stroke="#4A90E2" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90E2"/>
    </marker>
  </defs>
  
  <!-- Значение идиомы -->
  <rect x="230" y="170" width="120" height="60" rx="5" fill="url(#grad3)" opacity="0.3"/>
  <text x="290" y="195" text-anchor="middle" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Значение:</text>
  <text x="290" y="215" text-anchor="middle" fill="#333" font-family="Arial" font-size="12">Очень сильный дождь</text>
  
  <!-- Примеры других идиом -->
  <g transform="translate(360, 170)">
    <rect x="0" y="0" width="90" height="25" rx="5" fill="#E6E6FA"/>
    <text x="45" y="17" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Break a leg</text>
    
    <rect x="0" y="30" width="90" height="25" rx="5" fill="#E6E6FA"/>
    <text x="45" y="47" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Hit the books</text>
    
    <rect x="0" y="60" width="90" height="25" rx="5" fill="#E6E6FA"/>
    <text x="45" y="77" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Piece of cake</text>
  </g>
  
  <!-- Классификация идиом -->
  <text x="60" y="290" fill="#333" font-family="Arial" font-size="14" font-weight="bold">Классификация идиом:</text>
  
  <!-- Круговая диаграмма -->
  <g transform="translate(150, 300)">
    <circle cx="0" cy="0" r="30" fill="#FFB6C1" opacity="0.7"/>
    <path d="M 0 -30 A 30 30 0 0 1 26 15 L 0 0 Z" fill="#87CEEB" opacity="0.7"/>
    <path d="M 26 15 A 30 30 0 0 1 -26 15 L 0 0 Z" fill="#98FB98" opacity="0.7"/>
    
    <text x="0" y="-10" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold">Образные</text>
    <text x="20" y="5" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Фразовые</text>
    <text x="-20" y="5" text-anchor="middle" fill="#333" font-family="Arial" font-size="10">Словообраз.</text>
  </g>
  
  <!-- Происхождение идиом -->
  <rect x="220" y="275" width="260" height="60" rx="5" fill="#F0E68C" opacity="0.5"/>
  <text x="350" y="295" text-anchor="middle" fill="#333" font-family="Arial" font-size="12" font-weight="bold">Происхождение идиом:</text>
  <text x="350" y="310" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">• Литературные источники</text>
  <text x="350" y="325" text-anchor="middle" fill="#333" font-family="Arial" font-size="11">• Исторические события</text>
  
  <!-- Таблица с примерами использования -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="150" height="80" fill="none" stroke="#4A90E2" stroke-width="1"/>
    <line x1="0" y1="20" x2="150" y2="20" stroke="#4A90E2" stroke-width="1"/>
    <line x1="0" y1="40" x2="150" y2="40" stroke="#4A90E2" stroke-width="1"/>
    <line x1="0" y1="60" x2="150" y2="60" stroke="#4A90E2" stroke-width="1"/>
    
    <text x="75" y="15" text-anchor="middle" fill="#333" font-family="Arial" font-size="10" font-weight="bold">Пример использования</text>
    <text x="10" y="35" fill="#333" font-family="Arial" font-size="9">"Don't cry over spilled milk"</text>
    <text x="10" y="55" fill="#333" font-family="Arial" font-size="9">"It's not my cup of tea"</text>
    <text x="10" y="75" fill="#333" font-family="Arial" font-size="9">"Bite the bullet"</text>
  </g>
  
  <!-- График сложности идиом -->
  <g transform="translate(350, 280)">
    <line x1="0" y1="40" x2="100" y2="40" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#333" stroke-width="1"/>
    
    <rect x="10" y="30" width="15" height="10" fill="#FF6347"/>
    <rect x="30" y="20" width="15" height="20" fill="#FFD700"/>
    <rect x="50" y="10" width="15" height="30" fill="#32CD32"/>
    <rect x="70" y="5" width="15" height="35" fill="#4169E1"/>
    
    <text x="50" y="55" text-anchor="middle" fill="#333" font-family="Arial" font-size="9">Сложность идиом</text>
  </g>
</svg>