<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Уровни организации живой материи</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 2</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Pyramid of life - each level with visual icon -->
<!-- Biosphere level (widest, top) -->
<g transform="translate(250,72)">
  <rect x="-200" y="0" width="400" height="28" rx="4" fill="#1B5E20" opacity="0.9"/>
  <!-- Globe icon -->
  <circle cx="-170" cy="14" r="9" fill="none" stroke="white" stroke-width="1.2"/>
  <ellipse cx="-170" cy="14" rx="4" ry="9" fill="none" stroke="white" stroke-width="0.7"/>
  <line x1="-179" y1="14" x2="-161" y2="14" stroke="white" stroke-width="0.7"/>
  <text x="-145" y="18" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">8. Биосферный</text>
  <text x="80" y="12" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9">Оболочка Земли, заселённая</text>
  <text x="80" y="21" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9">живыми организмами</text>
</g>

<!-- Biogeocenotic -->
<g transform="translate(250,104)">
  <rect x="-175" y="0" width="350" height="28" rx="4" fill="#2E7D32" opacity="0.85"/>
  <!-- Tree + animal icon -->
  <path d="M-148,22 L-148,8 L-144,8 L-148,2 L-138,2 L-142,8 L-138,8 L-138,22 Z" fill="#81C784" stroke="white" stroke-width="0.5"/>
  <text x="-120" y="18" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">7. Биогеоценотический</text>
  <text x="60" y="12" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9">Лес, луг, озеро —</text>
  <text x="60" y="21" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9">совокупность популяций</text>
</g>

<!-- Population-species -->
<g transform="translate(250,136)">
  <rect x="-150" y="0" width="300" height="28" rx="4" fill="#388E3C" opacity="0.8"/>
  <!-- Multiple animal dots -->
  <circle cx="-125" cy="14" r="4" fill="#C8E6C9" opacity="0.7"/>
  <circle cx="-114" cy="10" r="3.5" fill="#C8E6C9" opacity="0.7"/>
  <circle cx="-117" cy="19" r="3" fill="#C8E6C9" opacity="0.7"/>
  <text x="-95" y="18" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">6. Популяционно-видовой</text>
  <text x="40" y="12" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9">Популяция — группа</text>
  <text x="40" y="21" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9">особей одного вида</text>
</g>

<!-- Organismal -->
<g transform="translate(250,168)">
  <rect x="-125" y="0" width="250" height="28" rx="4" fill="#43A047" opacity="0.75"/>
  <!-- Simple animal -->
  <ellipse cx="-100" cy="14" rx="10" ry="7" fill="#A5D6A7" opacity="0.6" stroke="white" stroke-width="0.8"/>
  <circle cx="-108" cy="11" r="4" fill="#A5D6A7" opacity="0.6" stroke="white" stroke-width="0.8"/>
  <text x="-80" y="18" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">5. Организменный</text>
  <text x="20" y="18" font-family="Arial,sans-serif" font-size="6" fill="#E8F5E9">Целостная система</text>
</g>

<!-- Organ-tissue -->
<g transform="translate(250,200)">
  <rect x="-100" y="0" width="200" height="28" rx="4" fill="#4CAF50" opacity="0.7"/>
  <!-- Heart icon -->
  <path d="M-78,14 C-78,8 -72,4 -68,8 C-64,4 -58,8 -58,14 C-58,20 -68,26 -68,26 C-68,26 -78,20 -78,14 Z" fill="#EF5350" opacity="0.7" stroke="white" stroke-width="0.5"/>
  <text x="-42" y="18" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">4. Органно-тканевый</text>
  <text x="35" y="18" font-family="Arial,sans-serif" font-size="6" fill="#E8F5E9">Органы и ткани</text>
</g>

<!-- Cellular -->
<g transform="translate(250,232)">
  <rect x="-75" y="0" width="150" height="28" rx="4" fill="#66BB6A" opacity="0.7"/>
  <!-- Cell icon -->
  <ellipse cx="-50" cy="14" rx="11" ry="8" fill="#81C784" opacity="0.5" stroke="white" stroke-width="1"/>
  <ellipse cx="-50" cy="12" rx="4" ry="3" fill="white" opacity="0.4"/>
  <text x="-30" y="18" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">3. Клеточный</text>
  <text x="30" y="18" font-family="Arial,sans-serif" font-size="6" fill="#E8F5E9">Клетка</text>
</g>

<!-- Subcellular -->
<g transform="translate(250,264)">
  <rect x="-50" y="0" width="100" height="22" rx="4" fill="#81C784" opacity="0.65"/>
  <text x="0" y="15" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold" text-anchor="middle">2. Субклеточный</text>
</g>

<!-- Molecular -->
<g transform="translate(250,290)">
  <rect x="-35" y="0" width="70" height="18" rx="4" fill="#A5D6A7" opacity="0.6"/>
  <!-- Tiny molecule -->
  <circle cx="-18" cy="9" r="3" fill="#C8E6C9" stroke="white" stroke-width="0.5"/>
  <circle cx="-10" cy="6" r="2" fill="#C8E6C9" stroke="white" stroke-width="0.5"/>
  <line x1="-15" y1="9" x2="-12" y2="7" stroke="white" stroke-width="0.5"/>
  <text x="5" y="13" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">1. Молекулярный</text>
</g>

<!-- Arrow on left side showing "Emergent properties" -->
<g transform="translate(22,185)">
  <line x1="0" y1="-100" x2="0" y2="100" stroke="#1B5E20" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <defs><marker id="arrowDown" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1B5E20"/></marker></defs>
  <text x="-2" y="0" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" transform="rotate(-90)">Усложнение организации</text>
</g>

<!-- Right side annotation -->
<g transform="translate(478,185)">
  <line x1="0" y1="100" x2="0" y2="-100" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrowUp)"/>
  <defs><marker id="arrowUp" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,6 L6,3 L0,0 Z" fill="#C62828"/></marker></defs>
  <text x="2" y="0" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" transform="rotate(90)">Эмерджентные свойства</text>
</g>

<rect x="10" y="316" width="480" height="28" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="330" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" fill="white" font-weight="bold">Каждый уровень имеет эмерджентные свойства — новые качества, отсутствующие на предыдущем</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="#C8E6C9">Учение о биосфере создал В.И. Вернадский (1926)</text>
</svg>