<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#A5D6A7"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1B5E20"/><stop offset="100%" stop-color="#388E3C"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1B5E20" stroke-width="2.5"/>
<rect x="10" y="8" width="480" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
<text x="250" y="27" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Микроэволюция и видообразование · Биология 10 — Урок 50</text>

<!-- Population as unit -->
<rect x="10" y="42" width="155" height="55" rx="5" fill="white" fill-opacity="0.85" stroke="#1B5E20" stroke-width="1"/>
<text x="87" y="56" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Популяция — единица эволюции</text>
<!-- Population dots -->
<g transform="translate(25,64)">
<circle cx="5" cy="5" r="4" fill="#4CAF50"/><circle cx="18" cy="3" r="4" fill="#66BB6A"/><circle cx="31" cy="6" r="4" fill="#4CAF50"/>
<circle cx="44" cy="4" r="4" fill="#81C784"/><circle cx="57" cy="7" r="4" fill="#4CAF50"/><circle cx="70" cy="3" r="4" fill="#66BB6A"/>
<circle cx="83" cy="6" r="4" fill="#4CAF50"/><circle cx="96" cy="4" r="4" fill="#81C784"/><circle cx="109" cy="7" r="4" fill="#4CAF50"/>
<circle cx="12" cy="17" r="4" fill="#66BB6A"/><circle cx="25" cy="19" r="4" fill="#4CAF50"/><circle cx="38" cy="16" r="4" fill="#81C784"/>
<circle cx="51" cy="18" r="4" fill="#4CAF50"/><circle cx="64" cy="16" r="4" fill="#66BB6A"/><circle cx="77" cy="19" r="4" fill="#4CAF50"/>
<circle cx="90" cy="17" r="4" fill="#81C784"/><circle cx="103" cy="19" r="4" fill="#4CAF50"/>
</g>
<text x="87" y="92" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle">Генофонд популяции = все аллели</text>

<!-- Microevolution definition -->
<rect x="172" y="42" width="320" height="30" rx="5" fill="white" fill-opacity="0.85" stroke="#1B5E20" stroke-width="1"/>
<text x="332" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Микроэволюция = изменение частот аллелей в популяции</text>
<text x="332" y="67" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Приводит к образованию новых видов (макроэволюция)</text>

<!-- Mechanisms of microevolution -->
<rect x="172" y="77" width="320" height="22" rx="5" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1"/>
<text x="332" y="92" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Механизмы: мутации · дрейф генов · естественный отбор · изоляция</text>

<!-- 4 mechanisms with icons -->
<!-- Mutations -->
<rect x="172" y="102" width="75" height="42" rx="4" fill="white" fill-opacity="0.8" stroke="#E65100" stroke-width="1"/>
<text x="209" y="114" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Мутации</text>
<!-- DNA helix simplified -->
<line x1="192" y1="120" x2="226" y2="120" stroke="#E65100" stroke-width="1.5"/>
<line x1="192" y1="125" x2="226" y2="125" stroke="#FF9800" stroke-width="1.5"/>
<line x1="200" y1="120" x2="200" y2="125" stroke="#E65100" stroke-width="0.5"/>
<line x1="210" y1="120" x2="210" y2="125" stroke="#E65100" stroke-width="0.5"/>
<line x1="220" y1="120" x2="220" y2="125" stroke="#E65100" stroke-width="0.5"/>
<!-- Mutation marker -->
<circle cx="215" cy="122" r="3" fill="#F44336"/>
<text x="209" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Новый аллель</text>

<!-- Genetic drift -->
<rect x="252" y="102" width="75" height="42" rx="4" fill="white" fill-opacity="0.8" stroke="#9C27B0" stroke-width="1"/>
<text x="289" y="114" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#9C27B0" text-anchor="middle">Дрейф генов</text>
<!-- Bottle neck diagram -->
<rect x="262" y="118" width="16" height="18" rx="1" fill="#CE93D8" opacity="0.5"/>
<rect x="280" y="124" width="4" height="6" rx="1" fill="#9C27B0"/>
<rect x="290" y="118" width="16" height="18" rx="1" fill="#CE93D8" opacity="0.5"/>
<text x="289" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Случайное изменение</text>

<!-- Natural selection -->
<rect x="332" y="102" width="75" height="42" rx="4" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="1"/>
<text x="369" y="114" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Ест. отбор</text>
<!-- Selection filter -->
<line x1="342" y1="120" x2="396" y2="120" stroke="#2E7D32" stroke-width="1.5"/>
<line x1="350" y1="126" x2="360" y2="136" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="365" y1="126" x2="375" y2="136" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="380" y1="126" x2="390" y2="136" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="352" cy="122" r="2" fill="#4CAF50"/>
<circle cx="368" cy="122" r="2" fill="#4CAF50"/>
<circle cx="388" cy="122" r="2" fill="#F44336"/>
<text x="369" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Направленный</text>

<!-- Isolation -->
<rect x="412" y="102" width="80" height="42" rx="4" fill="white" fill-opacity="0.8" stroke="#1565C0" stroke-width="1"/>
<text x="452" y="114" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0" text-anchor="middle">Изоляция</text>
<!-- Barrier -->
<rect x="448" y="118" width="4" height="20" rx="1" fill="#1565C0"/>
<circle cx="435" cy="126" r="4" fill="#42A5F5"/>
<circle cx="465" cy="126" r="4" fill="#64B5F6"/>
<text x="452" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Нет обмена генами</text>

<!-- Speciation diagram -->
<line x1="10" y1="150" x2="490" y2="150" stroke="#1B5E20" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="10" y="155" width="480" height="115" rx="5" fill="white" fill-opacity="0.6" stroke="#1B5E20" stroke-width="1"/>
<text x="250" y="170" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Видообразование</text>

<!-- Allopatric speciation -->
<text x="135" y="185" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">АЛЛОПАТРИЧЕСКОЕ</text>
<text x="135" y="195" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(географическая изоляция)</text>

<!-- Time 1: Single population -->
<text x="30" y="210" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Время 1</text>
<ellipse cx="55" cy="215" rx="22" ry="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<circle cx="48" cy="214" r="3" fill="#4CAF50"/><circle cx="55" cy="212" r="3" fill="#66BB6A"/>
<circle cx="62" cy="214" r="3" fill="#4CAF50"/><circle cx="52" cy="219" r="3" fill="#81C784"/>
<circle cx="60" cy="218" r="3" fill="#4CAF50"/>

<!-- Time 2: Barrier appears -->
<text x="135" y="210" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Время 2</text>
<ellipse cx="120" cy="215" rx="18" ry="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<circle cx="115" cy="213" r="3" fill="#4CAF50"/><circle cx="122" cy="215" r="3" fill="#66BB6A"/>
<circle cx="118" cy="220" r="3" fill="#4CAF50"/>
<!-- Barrier: mountain/river -->
<rect x="139" y="200" width="6" height="28" rx="1" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<text x="142" y="240" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">гора</text>
<ellipse cx="160" cy="215" rx="18" ry="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<circle cx="155" cy="213" r="3" fill="#4CAF50"/><circle cx="162" cy="215" r="3" fill="#66BB6A"/>
<circle cx="158" cy="220" r="3" fill="#4CAF50"/>

<!-- Time 3: Two species -->
<text x="240" y="210" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Время 3</text>
<ellipse cx="225" cy="215" rx="18" ry="12" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
<circle cx="220" cy="213" r="3" fill="#2E7D32"/><circle cx="227" cy="215" r="3" fill="#388E3C"/>
<circle cx="223" cy="220" r="3" fill="#2E7D32"/>
<text x="225" y="234" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Вид А</text>
<rect x="244" y="200" width="6" height="28" rx="1" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<ellipse cx="265" cy="215" rx="18" ry="12" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1"/>
<circle cx="260" cy="213" r="3" fill="#1B5E20"/><circle cx="267" cy="215" r="3" fill="#2E7D32"/>
<circle cx="263" cy="220" r="3" fill="#1B5E20"/>
<text x="265" y="234" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Вид Б</text>

<!-- Sympatric speciation -->
<text x="395" y="185" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">СИМПАТРИЧЕСКОЕ</text>
<text x="395" y="195" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(без географич. разделения)</text>

<!-- Ecological isolation -->
<text x="340" y="210" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Экологическое</text>
<ellipse cx="345" cy="220" rx="22" ry="14" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
<ellipse cx="345" cy="220" rx="10" ry="7" fill="#FFCDD2" stroke="#E57373" stroke-width="0.5"/>
<circle cx="332" cy="218" r="2" fill="#E57373"/><circle cx="358" cy="218" r="2" fill="#C62828"/>
<circle cx="340" cy="226" r="2" fill="#E57373"/><circle cx="352" cy="226" r="2" fill="#C62828"/>
<text x="345" y="240" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Разные ниши</text>

<!-- Polyploidy -->
<text x="440" y="210" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Полиплоидия</text>
<g transform="translate(425,216)">
<ellipse cx="8" cy="6" rx="5" ry="8" fill="#5C6BC0" stroke="#3949AB" stroke-width="0.5"/>
<ellipse cx="16" cy="6" rx="5" ry="8" fill="#5C6BC0" stroke="#3949AB" stroke-width="0.5"/>
</g>
<text x="440" y="234" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2n</text>
<g transform="translate(425,240)">
<ellipse cx="4" cy="6" rx="4" ry="7" fill="#7986CB" stroke="#3949AB" stroke-width="0.5"/>
<ellipse cx="12" cy="6" rx="4" ry="7" fill="#7986CB" stroke="#3949AB" stroke-width="0.5"/>
<ellipse cx="20" cy="6" rx="4" ry="7" fill="#7986CB" stroke="#3949AB" stroke-width="0.5"/>
<ellipse cx="28" cy="6" rx="4" ry="7" fill="#7986CB" stroke="#3949AB" stroke-width="0.5"/>
</g>
<text x="440" y="258" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#3949AB" text-anchor="middle">4n — новый вид!</text>
<text x="440" y="266" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">(у растений)</text>

<!-- Speciation over time diagram -->
<line x1="10" y1="275" x2="490" y2="275" stroke="#1B5E20" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="10" y="280" width="480" height="63" rx="5" fill="white" fill-opacity="0.7" stroke="#1B5E20" stroke-width="1"/>
<text x="250" y="294" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Дивергенция: разделение вида во времени</text>

<!-- Time axis -->
<line x1="30" y1="330" x2="470" y2="330" stroke="#1B5E20" stroke-width="1.5"/>
<polygon points="470,326 478,330 470,334" fill="#1B5E20"/>
<text x="475" y="325" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Время</text>

<!-- Trunk splitting into branches -->
<line x1="30" y1="330" x2="100" y2="310" stroke="#1B5E20" stroke-width="3"/>
<!-- Split point -->
<line x1="100" y1="310" x2="170" y2="300" stroke="#1B5E20" stroke-width="2.5"/>
<line x1="100" y1="310" x2="170" y2="318" stroke="#1B5E20" stroke-width="2.5"/>

<!-- Species A branches -->
<line x1="170" y1="300" x2="260" y2="296" stroke="#2E7D32" stroke-width="2"/>
<line x1="170" y1="300" x2="260" y2="308" stroke="#4CAF50" stroke-width="2"/>
<!-- Sub branches -->
<line x1="260" y1="296" x2="350" y2="294" stroke="#2E7D32" stroke-width="1.5"/>
<line x1="260" y1="296" x2="350" y2="300" stroke="#388E3C" stroke-width="1.5"/>
<line x1="260" y1="308" x2="350" y2="306" stroke="#4CAF50" stroke-width="1.5"/>
<line x1="260" y1="308" x2="350" y2="312" stroke="#66BB6A" stroke-width="1.5"/>

<!-- Species B branches -->
<line x1="170" y1="318" x2="260" y2="322" stroke="#1B5E20" stroke-width="2"/>
<line x1="260" y1="322" x2="350" y2="320" stroke="#1B5E20" stroke-width="1.5"/>
<line x1="260" y1="322" x2="350" y2="326" stroke="#2E7D32" stroke-width="1.5"/>

<!-- End species labels -->
<text x="380" y="294" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="start">Вид 1</text>
<text x="380" y="302" font-family="Arial,sans-serif" font-size="6" fill="#388E3C" text-anchor="start">Вид 2</text>
<text x="380" y="310" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="start">Вид 3</text>
<text x="380" y="318" font-family="Arial,sans-serif" font-size="6" fill="#66BB6A" text-anchor="start">Вид 4</text>
<text x="380" y="326" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="start">Вид 5</text>

<!-- Common ancestor label -->
<text x="35" y="337" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Общий</text>
<text x="35" y="343" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">предок</text>

<!-- Split markers -->
<circle cx="100" cy="310" r="3" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
<circle cx="170" cy="300" r="2.5" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
<circle cx="170" cy="318" r="2.5" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
<text x="100" y="304" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Изоляция</text>
</svg>