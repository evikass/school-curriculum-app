<text x="390" y="82" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">Ген A —</text>
<text x="390" y="92" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">эпистатичный</text>
<text x="390" y="102" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(подавитель)</text>
<text x="390" y="115" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">Ген B —</text>
<text x="390" y="125" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">гипостатичный</text>
<text x="390" y="138" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(подавляемый)</text>

<text x="440" y="82" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">12 : 3 : 1</text>
<text x="445" y="96" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">или</text>
<text x="445" y="108" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">13 : 3</text>

