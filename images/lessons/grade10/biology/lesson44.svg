<text x="250" y="27" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Взаимодействие генов · Биология 10 класс — Урок 44</text>

<!-- 1. Complementarity -->
<rect x="10" y="42" width="235" height="108" rx="5" fill="white" fill-opacity="0.8" stroke="#E65100" stroke-width="1"/>
<text x="127" y="56" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">1. КОМПЛЕМЕНТАРНОСТЬ</text>
<text x="127" y="68" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Два доминантных гена вместе → признак</text>

<!-- Flower diagram -->
<circle cx="45" cy="92" r="16" fill="#E91E63" stroke="#C2185B" stroke-width="1.5"/>
<circle cx="45" cy="92" r="6" fill="#FFEB3B"/>
<text x="45" y="115" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">A_B_ — окраска</text>

<circle cx="110" cy="92" r="16" fill="white" stroke="#9E9E9E" stroke-width="1.5"/>
<circle cx="110" cy="92" r="6" fill="#FFEB3B"/>
<text x="110" y="115" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">A_bb — белая</text>

<circle cx="175" cy="92" r="16" fill="white" stroke="#9E9E9E" stroke-width="1.5"/>
<circle cx="175" cy="92" r="6" fill="#FFEB3B"/>
<text x="175" y="115" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">aaB_ — белая</text>

<circle cx="228" cy="92" r="12" fill="white" stroke="#9E9E9E" stroke-width="1"/>
<text x="228" y="115" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">aabb — белая</text>

<text x="127" y="130" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">Расщепление 9 : 7</text>
<text x="127" y="142" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(9 окраш. : 7 белых из 16)</text>

<!-- 2. Epistasis -->
<rect x="255" y="42" width="235" height="108" rx="5" fill="white" fill-opacity="0.8" stroke="#E65100" stroke-width="1"/>
<text x="372" y="56" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">2. ЭПИСТАЗ</text>
<text x="372" y="68" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Один ген подавляет действие другого</text>

