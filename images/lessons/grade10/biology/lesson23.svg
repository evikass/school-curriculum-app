<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
  <linearGradient id="lysGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8A65"/><stop offset="100%" stop-color="#E64A19"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#E65100"/>
<rect x="3" y="30" width="494" height="11" fill="#E65100"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Энергетический обмен: подготовительный этап</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" text-anchor="middle">Биология 10 класс — Урок 23</text>

<!-- Location labels -->
<rect x="15" y="58" width="220" height="20" rx="4" fill="#FF7043" opacity="0.3"/>
<text x="125" y="72" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" text-anchor="middle">Пищеварительный тракт / Лизосомы</text>

<rect x="265" y="58" width="220" height="20" rx="4" fill="#FF7043" opacity="0.3"/>
<text x="375" y="72" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" text-anchor="middle">Ферментативный гидролиз</text>

<!-- LYSOSOME illustration (top center) -->
<ellipse cx="250" cy="82" rx="30" ry="18" fill="url(#lysGrad)" stroke="#BF360C" stroke-width="1.5" opacity="0.6"/>
<text x="250" y="86" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle">Лизосома</text>

<!-- THREE COLUMNS: Proteins, Lipids, Polysaccharides -->

<!-- Column 1: Proteins -->
<rect x="20" y="90" width="150" height="55" rx="10" fill="#7986CB" stroke="#303F9F" stroke-width="2"/>
<!-- Protein chain shape -->
<path d="M40,100 Q55,95 60,108 Q65,118 80,112 Q95,105 100,115 Q110,125 120,118 Q130,110 140,120" stroke="#E8EAF6" stroke-width="3" fill="none" stroke-linecap="round"/>
<circle cx="45" cy="100" r="5" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1"/>
<circle cx="70" cy="110" r="5" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1"/>
<circle cx="95" cy="110" r="5" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1"/>
<circle cx="120" cy="118" r="5" fill="#C5CAE9" stroke="#3F51B5" stroke-width="1"/>
<text x="95" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">БЕЛКИ</text>

<!-- Arrow down -->
<path d="M95,148 L95,165" stroke="#303F9F" stroke-width="2" marker-end="url(#arrP)"/>
<defs><marker id="arrP" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#303F9F"/></marker></defs>
<text x="130" y="160" font-family="Arial,sans-serif" font-size="7" fill="#303F9F">протеазы</text>

<!-- Result: amino acids -->
<rect x="25" y="168" width="140" height="42" rx="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
<text x="95" y="183" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" text-anchor="middle">Аминокислоты</text>
<!-- Small amino acid molecules -->
<circle cx="45" cy="198" r="6" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1"/>
<text x="45" y="201" font-family="Arial,sans-serif" font-size="5" fill="#1A237E" text-anchor="middle">AA</text>
<circle cx="65" cy="198" r="6" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1"/>
<text x="65" y="201" font-family="Arial,sans-serif" font-size="5" fill="#1A237E" text-anchor="middle">AA</text>
<circle cx="85" cy="198" r="6" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1"/>
<text x="85" y="201" font-family="Arial,sans-serif" font-size="5" fill="#1A237E" text-anchor="middle">AA</text>
<circle cx="105" cy="198" r="6" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1"/>
<text x="105" y="201" font-family="Arial,sans-serif" font-size="5" fill="#1A237E" text-anchor="middle">AA</text>
<circle cx="125" cy="198" r="6" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1"/>
<text x="125" y="201" font-family="Arial,sans-serif" font-size="5" fill="#1A237E" text-anchor="middle">AA</text>

<!-- Column 2: Lipids -->
<rect x="175" y="90" width="150" height="55" rx="10" fill="#FFB74D" stroke="#E65100" stroke-width="2"/>
<!-- Lipid shape (3 tails) -->
<ellipse cx="220" cy="108" rx="10" ry="8" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
<line x1="220" y1="116" x2="215" y2="138" stroke="#FFE0B2" stroke-width="2"/>
<line x1="220" y1="116" x2="220" y2="138" stroke="#FFE0B2" stroke-width="2"/>
<line x1="220" y1="116" x2="225" y2="138" stroke="#FFE0B2" stroke-width="2"/>
<ellipse cx="280" cy="108" rx="10" ry="8" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
<line x1="280" y1="116" x2="275" y2="138" stroke="#FFE0B2" stroke-width="2"/>
<line x1="280" y1="116" x2="280" y2="138" stroke="#FFE0B2" stroke-width="2"/>
<line x1="280" y1="116" x2="285" y2="138" stroke="#FFE0B2" stroke-width="2"/>
<text x="250" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">ЛИПИДЫ</text>

<!-- Arrow down -->
<path d="M250,148 L250,165" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>
<defs><marker id="arrO" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#E65100"/></marker></defs>
<text x="285" y="160" font-family="Arial,sans-serif" font-size="7" fill="#E65100">липазы</text>

<!-- Result: glycerol + fatty acids -->
<rect x="180" y="168" width="140" height="42" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
<text x="250" y="181" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" text-anchor="middle">Глицерин +</text>
<text x="250" y="193" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" text-anchor="middle">Жирные кислоты</text>
<!-- Small molecules -->
<rect x="200" y="196" width="16" height="10" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
<text x="208" y="204" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">G</text>
<rect x="222" y="196" width="16" height="10" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
<text x="230" y="204" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">ЖК</text>
<rect x="244" y="196" width="16" height="10" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
<text x="252" y="204" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">ЖК</text>
<rect x="266" y="196" width="16" height="10" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
<text x="274" y="204" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">ЖК</text>

<!-- Column 3: Polysaccharides -->
<rect x="330" y="90" width="150" height="55" rx="10" fill="#81C784" stroke="#2E7D32" stroke-width="2"/>
<!-- Polysaccharide chain -->
<circle cx="365" cy="112" r="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<circle cx="385" cy="112" r="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<circle cx="405" cy="112" r="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<circle cx="425" cy="112" r="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<circle cx="445" cy="112" r="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<line x1="372" y1="112" x2="378" y2="112" stroke="#2E7D32" stroke-width="2"/>
<line x1="392" y1="112" x2="398" y2="112" stroke="#2E7D32" stroke-width="2"/>
<line x1="412" y1="112" x2="418" y2="112" stroke="#2E7D32" stroke-width="2"/>
<line x1="432" y1="112" x2="438" y2="112" stroke="#2E7D32" stroke-width="2"/>
<text x="405" y="140" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">ПОЛИСАХАРИДЫ</text>

<!-- Arrow down -->
<path d="M405,148 L405,165" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrGn)"/>
<defs><marker id="arrGn" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#2E7D32"/></marker></defs>
<text x="440" y="160" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">амилазы</text>

<!-- Result: monosaccharides -->
<rect x="335" y="168" width="140" height="42" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="405" y="183" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle">Моносахариды</text>
<text x="405" y="195" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">(глюкоза, фруктоза)</text>
<!-- Hexagon sugar molecules -->
<polygon points="360,201 366,197 372,201 372,207 366,211 360,207" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<polygon points="384,201 390,197 396,201 396,207 390,211 384,207" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<polygon points="408,201 414,197 420,201 420,207 414,211 408,207" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<polygon points="432,201 438,197 444,201 444,207 438,211 432,207" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>

<!-- Converging arrows to glycolysis -->
<path d="M95,213 L200,255" stroke="#795548" stroke-width="1.5" fill="none" marker-end="url(#arrBr)"/>
<path d="M250,213 L250,255" stroke="#795548" stroke-width="1.5" fill="none" marker-end="url(#arrBr)"/>
<path d="M405,213 L300,255" stroke="#795548" stroke-width="1.5" fill="none" marker-end="url(#arrBr)"/>
<defs><marker id="arrBr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#795548"/></marker></defs>

<!-- Summary box -->
<rect x="100" y="240" width="300" height="40" rx="10" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
<text x="250" y="258" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#BF360C" text-anchor="middle">Гидролиз → Мономеры</text>
<text x="250" y="273" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">Минимальное выделение энергии (тепло)</text>

<!-- Arrow to next stage -->
<path d="M250,282 L250,300" stroke="#E65100" stroke-width="2" marker-end="url(#arrO2)"/>
<defs><marker id="arrO2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#E65100"/></marker></defs>

<!-- Next stage label -->
<rect x="150" y="304" width="200" height="32" rx="8" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
<text x="250" y="320" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">→ ГЛИКОЛИЗ</text>
<text x="250" y="332" font-family="Arial,sans-serif" font-size="8" fill="#C8E6C9" text-anchor="middle">(следующий этап)</text>

<!-- Key point -->
<text x="470" y="320" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="end">Внимание:</text>
<text x="470" y="330" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="end">АТФ не синтезируется</text>
<text x="470" y="340" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="end">на этом этапе!</text>
</svg>