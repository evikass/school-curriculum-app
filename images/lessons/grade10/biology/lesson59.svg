<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg59" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33691e"/>
      <stop offset="100%" stop-color="#0d1a08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg59)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#7cb342" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#558b2f" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#f1f8e9" font-size="11" font-weight="bold" font-family="Arial">Сукцессия и динамика экосистем — Биология 10 класс — Урок 59</text>

  <!-- PRIMARY SUCCESSION - top half -->
  <rect x="8" y="48" width="484" height="138" fill="#0d1a08" stroke="#7cb342" stroke-width="1" rx="4"/>
  <rect x="8" y="48" width="484" height="16" fill="#33691e" rx="4"/>
  <text x="250" y="60" text-anchor="middle" fill="#dcedc8" font-size="7.5" font-weight="bold" font-family="Arial">ПЕРВИЧНАЯ СУКЦЕССИЯ — на безжизненном субстрате (голая скала)</text>

  <!-- Stage 1: Bare rock -->
  <rect x="12" y="68" width="88" height="112" fill="#424242" stroke="#616161" stroke-width="0.5" rx="3"/>
  <text x="56" y="80" text-anchor="middle" fill="#bdbdbd" font-size="6" font-weight="bold" font-family="Arial">1. Голая скала</text>
  <!-- Rock texture -->
  <path d="M18,95 Q30,90 45,95 Q55,88 70,93 Q80,90 90,95" stroke="#757575" stroke-width="0.5" fill="none"/>
  <path d="M20,110 Q35,105 50,112 Q65,106 85,110" stroke="#616161" stroke-width="0.5" fill="none"/>
  <text x="56" y="130" text-anchor="middle" fill="#9e9e9e" font-size="5" font-family="Arial">Нет почвы</text>
  <text x="56" y="138" text-anchor="middle" fill="#9e9e9e" font-size="5" font-family="Arial">Нет организмов</text>
  <text x="56" y="148" text-anchor="middle" fill="#bdbdbd" font-size="5" font-family="Arial">~1000 лет</text>
  <text x="56" y="156" text-anchor="middle" fill="#bdbdbd" font-size="5" font-family="Arial">и более</text>

  <!-- Arrow -->
  <path d="M102,124 L112,124" stroke="#7cb342" stroke-width="1.5" marker-end="url(#arr59)"/>
  <defs><marker id="arr59" markerWidth="5" markerHeight="5" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#7cb342"/></marker></defs>

  <!-- Stage 2: Lichens -->
  <rect x="115" y="68" width="88" height="112" fill="#3e3e2e" stroke="#9e9e24" stroke-width="0.5" rx="3"/>
  <text x="159" y="80" text-anchor="middle" fill="#e6ee9c" font-size="6" font-weight="bold" font-family="Arial">2. Лишайники</text>
  <!-- Lichens on rock -->
  <path d="M130,105 Q135,98 142,102 Q148,96 155,103 Q160,98 168,104" fill="#c0ca33" opacity="0.6" stroke="#9e9d24" stroke-width="0.5"/>
  <circle cx="140" cy="110" r="5" fill="#cddc39" opacity="0.4"/>
  <circle cx="158" cy="112" r="4" fill="#c0ca33" opacity="0.4"/>
  <circle cx="175" cy="108" r="3" fill="#cddc39" opacity="0.3"/>
  <text x="159" y="130" text-anchor="middle" fill="#dce775" font-size="5" font-family="Arial">Разрушают скалу</text>
  <text x="159" y="138" text-anchor="middle" fill="#c0ca33" font-size="5" font-family="Arial">Начало почвы</text>
  <text x="159" y="148" text-anchor="middle" fill="#e6ee9c" font-size="5" font-family="Arial">Пионеры</text>
  <text x="159" y="156" text-anchor="middle" fill="#e6ee9c" font-size="5" font-family="Arial">сукцессии</text>

  <path d="M205,124 L215,124" stroke="#7cb342" stroke-width="1.5" marker-end="url(#arr59)"/>

  <!-- Stage 3: Mosses -->
  <rect x="218" y="68" width="88" height="112" fill="#1a2e1a" stroke="#4caf50" stroke-width="0.5" rx="3"/>
  <text x="262" y="80" text-anchor="middle" fill="#a5d6a7" font-size="6" font-weight="bold" font-family="Arial">3. Мхи</text>
  <!-- Moss patches -->
  <ellipse cx="240" cy="105" rx="10" ry="5" fill="#2e7d32" opacity="0.5"/>
  <ellipse cx="262" cy="108" rx="12" ry="6" fill="#388e3c" opacity="0.5"/>
  <ellipse cx="282" cy="103" rx="8" ry="4" fill="#43a047" opacity="0.5"/>
  <path d="M236,100 L237,94 M240,100 L241,93 M244,100 L244,95" stroke="#66bb6a" stroke-width="0.5"/>
  <path d="M258,103 L259,96 M262,103 L263,95 M266,103 L266,97" stroke="#66bb6a" stroke-width="0.5"/>
  <text x="262" y="130" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Накапливают</text>
  <text x="262" y="138" text-anchor="middle" fill="#66bb6a" font-size="5" font-family="Arial">вещество и влагу</text>
  <text x="262" y="148" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Почва</text>
  <text x="262" y="156" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">углубляется</text>

  <path d="M308,124 L318,124" stroke="#7cb342" stroke-width="1.5" marker-end="url(#arr59)"/>

  <!-- Stage 4: Grasses & shrubs -->
  <rect x="321" y="68" width="78" height="112" fill="#1a2e1a" stroke="#66bb6a" stroke-width="0.5" rx="3"/>
  <text x="360" y="80" text-anchor="middle" fill="#c8e6c9" font-size="5.5" font-weight="bold" font-family="Arial">4. Травы, кустарники</text>
  <!-- Grass -->
  <path d="M335,120 L337,100 M340,120 L343,98 M346,120 L348,102" stroke="#4caf50" stroke-width="1" fill="none"/>
  <!-- Shrub -->
  <path d="M360,120 L360,108" stroke="#5d4037" stroke-width="1"/>
  <ellipse cx="358" cy="104" rx="8" ry="6" fill="#388e3c" opacity="0.6"/>
  <ellipse cx="365" cy="102" rx="6" ry="5" fill="#43a047" opacity="0.5"/>
  <!-- Another shrub -->
  <path d="M380,120 L380,110" stroke="#5d4037" stroke-width="0.8"/>
  <ellipse cx="378" cy="107" rx="6" ry="4" fill="#2e7d32" opacity="0.6"/>
  <text x="360" y="135" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Семена</text>
  <text x="360" y="143" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">заносятся</text>
  <text x="360" y="155" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Видовое</text>
  <text x="360" y="163" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">разнообразие ↑</text>

  <path d="M401,124 L411,124" stroke="#7cb342" stroke-width="1.5" marker-end="url(#arr59)"/>

  <!-- Stage 5: Trees / Climax forest -->
  <rect x="414" y="68" width="74" height="112" fill="#0d2b0d" stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="451" y="80" text-anchor="middle" fill="#e8f5e9" font-size="5.5" font-weight="bold" font-family="Arial">5. Лес (климакс)</text>
  <!-- Trees -->
  <rect x="430" y="120" width="4" height="18" fill="#5d4037"/>
  <ellipse cx="432" cy="112" rx="10" ry="10" fill="#2e7d32" opacity="0.7"/>
  <ellipse cx="428" cy="108" rx="7" ry="7" fill="#388e3c" opacity="0.6"/>
  <rect x="455" y="125" width="3" height="13" fill="#5d4037"/>
  <ellipse cx="456" cy="119" rx="8" ry="8" fill="#1b5e20" opacity="0.7"/>
  <ellipse cx="460" cy="116" rx="6" ry="6" fill="#2e7d32" opacity="0.5"/>
  <text x="451" y="150" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Климаксное</text>
  <text x="451" y="158" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">сообщество</text>
  <text x="451" y="168" text-anchor="middle" fill="#66bb6a" font-size="5" font-family="Arial">Стабильность</text>
  <text x="451" y="176" text-anchor="middle" fill="#c8e6c9" font-size="5" font-weight="bold" font-family="Arial">Равновесие</text>

  <!-- SECONDARY SUCCESSION - bottom section -->
  <rect x="8" y="192" width="484" height="100" fill="#1a0d08" stroke="#ff6d00" stroke-width="1" rx="4"/>
  <rect x="8" y="192" width="484" height="16" fill="#bf360c" rx="4"/>
  <text x="250" y="204" text-anchor="middle" fill="#fbe9e7" font-size="7.5" font-weight="bold" font-family="Arial">ВТОРИЧНАЯ СУКЦЕССИЯ — после нарушения (пожар, вырубка)</text>

  <!-- Fire/disturbance -->
  <rect x="12" y="212" width="80" height="74" fill="#3e2723" stroke="#e64a19" stroke-width="0.5" rx="3"/>
  <text x="52" y="224" text-anchor="middle" fill="#ff8a65" font-size="6" font-weight="bold" font-family="Arial">Нарушение</text>
  <!-- Fire icon -->
  <path d="M40,260 Q45,248 50,256 Q55,244 60,255 Q65,250 58,264 Q52,270 44,268 Q38,266 40,260 Z" fill="#ff6d00" stroke="#e64a19" stroke-width="0.3"/>
  <path d="M47,258 Q50,252 53,258" fill="#ffab40"/>
  <text x="52" y="278" text-anchor="middle" fill="#ff8a65" font-size="5" font-family="Arial">Пожар / вырубка</text>

  <path d="M94,249 L108,249" stroke="#ff6d00" stroke-width="1.5" marker-end="url(#arr59b)"/>
  <defs><marker id="arr59b" markerWidth="5" markerHeight="5" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#ff6d00"/></marker></defs>

  <!-- Grasses stage -->
  <rect x="111" y="212" width="80" height="74" fill="#1a2e1a" stroke="#66bb6a" stroke-width="0.5" rx="3"/>
  <text x="151" y="224" text-anchor="middle" fill="#a5d6a7" font-size="6" font-weight="bold" font-family="Arial">Травы</text>
  <path d="M130,268 L132,250 M138,268 L141,248 M146,268 L148,252 M154,268 L156,249 M162,268 L164,251" stroke="#4caf50" stroke-width="1" fill="none"/>
  <text x="151" y="278" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Быстрый рост ~1-3 года</text>

  <path d="M193,249 L207,249" stroke="#ff6d00" stroke-width="1.5" marker-end="url(#arr59b)"/>

  <!-- Shrubs stage -->
  <rect x="210" y="212" width="80" height="74" fill="#1a2e1a" stroke="#43a047" stroke-width="0.5" rx="3"/>
  <text x="250" y="224" text-anchor="middle" fill="#a5d6a7" font-size="6" font-weight="bold" font-family="Arial">Кустарники</text>
  <path d="M230,268 L230,255" stroke="#5d4037" stroke-width="1"/>
  <ellipse cx="228" cy="250" rx="8" ry="6" fill="#388e3c" opacity="0.6"/>
  <ellipse cx="235" cy="248" rx="6" ry="5" fill="#43a047" opacity="0.5"/>
  <path d="M255,268 L255,252" stroke="#5d4037" stroke-width="1"/>
  <ellipse cx="253" cy="248" rx="7" ry="5" fill="#2e7d32" opacity="0.6"/>
  <path d="M275,268 L275,256" stroke="#5d4037" stroke-width="0.8"/>
  <ellipse cx="273" cy="252" rx="6" ry="4" fill="#388e3c" opacity="0.5"/>
  <text x="250" y="278" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">~5-20 лет</text>

  <path d="M292,249 L306,249" stroke="#ff6d00" stroke-width="1.5" marker-end="url(#arr59b)"/>

  <!-- Young trees -->
  <rect x="309" y="212" width="80" height="74" fill="#0d2b0d" stroke="#2e7d32" stroke-width="0.5" rx="3"/>
  <text x="349" y="224" text-anchor="middle" fill="#c8e6c9" font-size="6" font-weight="bold" font-family="Arial">Молодой лес</text>
  <rect x="330" y="268" width="3" height="14" fill="#5d4037"/>
  <ellipse cx="331" cy="260" rx="7" ry="7" fill="#2e7d32" opacity="0.6"/>
  <rect x="350" y="268" width="3" height="12" fill="#5d4037"/>
  <ellipse cx="351" cy="260" rx="6" ry="6" fill="#388e3c" opacity="0.6"/>
  <rect x="367" y="268" width="3" height="10" fill="#5d4037"/>
  <ellipse cx="368" cy="261" rx="5" ry="5" fill="#43a047" opacity="0.5"/>
  <text x="349" y="278" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">~50-100 лет</text>

  <path d="M391,249 L405,249" stroke="#7cb342" stroke-width="1.5" marker-end="url(#arr59)"/>

  <!-- Climax forest -->
  <rect x="408" y="212" width="80" height="74" fill="#0d2b0d" stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="448" y="224" text-anchor="middle" fill="#e8f5e9" font-size="5.5" font-weight="bold" font-family="Arial">Климаксный лес</text>
  <rect x="425" y="268" width="4" height="12" fill="#5d4037"/>
  <ellipse cx="427" cy="258" rx="10" ry="10" fill="#1b5e20" opacity="0.7"/>
  <ellipse cx="422" cy="254" rx="7" ry="7" fill="#2e7d32" opacity="0.6"/>
  <rect x="455" y="268" width="4" height="12" fill="#5d4037"/>
  <ellipse cx="457" cy="256" rx="9" ry="9" fill="#2e7d32" opacity="0.6"/>
  <text x="448" y="278" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Стабильный</text>

  <!-- Comparison note -->
  <rect x="8" y="298" width="484" height="44" fill="#0d1a08" stroke="#7cb342" stroke-width="1" rx="4"/>
  <text x="250" y="312" text-anchor="middle" fill="#dcedc8" font-size="7" font-weight="bold" font-family="Arial">Сравнение первичной и вторичной сукцессии</text>
  
  <text x="130" y="326" text-anchor="middle" fill="#c0ca33" font-size="6" font-family="Arial">Первичная: от голого субстрата → очень медленно (~1000 лет)</text>
  <text x="130" y="336" text-anchor="middle" fill="#e6ee9c" font-size="5.5" font-family="Arial">Вторичная: почва сохранена → быстрее (~100-200 лет)</text>
  
  <text x="385" y="326" text-anchor="middle" fill="#a5d6a7" font-size="6" font-family="Arial">Климакс = устойчивое равновесное</text>
  <text x="385" y="336" text-anchor="middle" fill="#81c784" font-size="5.5" font-family="Arial">сообщество, самоподдерживающееся</text>
</svg>