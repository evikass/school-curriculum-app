<text x="395" y="105" font-family="Arial,sans-serif" font-size="6" fill="#3F51B5" text-anchor="middle">Тритон</text>

<!-- Chick embryo -->
<ellipse cx="428" cy="88" rx="12" ry="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
<circle cx="422" cy="86" r="2" fill="#3F51B5"/>
<text x="428" y="105" font-family="Arial,sans-serif" font-size="6" fill="#3F51B5" text-anchor="middle">Цыплёнок</text>

<!-- Human embryo -->
<ellipse cx="462" cy="88" rx="12" ry="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
<circle cx="456" cy="86" r="2" fill="#3F51B5"/>
<text x="462" y="105" font-family="Arial,sans-serif" font-size="6" fill="#3F51B5" text-anchor="middle">Человек</text>

<!-- Gill slits annotation -->
<rect x="352" y="108" width="110" height="14" rx="2" fill="#C5CAE9" stroke="#3F51B5" stroke-width="0.5"/>
<text x="407" y="118" font-family="Arial,sans-serif" font-size="6" fill="#1A237E" text-anchor="middle">Жаберные щели на ранних стадиях!</text>
<text x="413" y="136" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Биогенетический закон Геккеля-Мюллера</text>

<!-- 4. Molecular -->
<rect x="10" y="148" width="235" height="62" rx="5" fill="white" fill-opacity="0.85" stroke="#1A237E" stroke-width="1"/>
