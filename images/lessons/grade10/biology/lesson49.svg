<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8EAF6"/><stop offset="100%" stop-color="#C5CAE9"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1A237E"/><stop offset="100%" stop-color="#283593"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
<rect x="10" y="8" width="480" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
<text x="250" y="27" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Доказательства эволюции · Биология 10 — Урок 49</text>

<!-- 1. Paleontological -->
<rect x="10" y="42" width="155" height="100" rx="5" fill="white" fill-opacity="0.85" stroke="#1A237E" stroke-width="1"/>
<text x="87" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1A237E" text-anchor="middle">1. ПАЛЕОНТОЛОГИЧЕСКИЕ</text>

<!-- Fossil layers -->
<rect x="20" y="62" width="135" height="42" rx="2" fill="#FFF8E1" stroke="#8D6E63" stroke-width="0.5"/>
<rect x="20" y="62" width="135" height="10" rx="1" fill="#D7CCC8"/>
<rect x="20" y="72" width="135" height="10" fill="#BCAAA4"/>
<rect x="20" y="82" width="135" height="10" fill="#A1887F"/>
<rect x="20" y="92" width="135" height="12" rx="1" fill="#8D6E63"/>
<!-- Fossil icons -->
<ellipse cx="40" cy="67" rx="5" ry="3" fill="#795548" opacity="0.6"/>
<ellipse cx="70" cy="77" rx="7" ry="4" fill="#6D4C41" opacity="0.7"/>
<ellipse cx="100" cy="87" rx="8" ry="5" fill="#5D4037" opacity="0.8"/>
<text x="120" y="100" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">древнее</text>

<!-- Archaeopteryx -->
<text x="87" y="116" font-family="Arial,sans-serif" font-size="7" fill="#1A237E" text-anchor="middle">Археоптерикс —</text>
<text x="87" y="125" font-family="Arial,sans-serif" font-size="7" fill="#1A237E" text-anchor="middle">переходная форма</text>
<text x="87" y="136" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">(рептилия + птица)</text>

<!-- 2. Comparative Anatomy -->
<rect x="172" y="42" width="155" height="100" rx="5" fill="white" fill-opacity="0.85" stroke="#1A237E" stroke-width="1"/>
<text x="249" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1A237E" text-anchor="middle">2. СРАВНИТЕЛЬНАЯ АНАТОМИЯ</text>

<!-- Homologous organs - pentadactyl limb -->
<text x="249" y="68" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Гомологичные органы (пятипалая конечность)</text>

<!-- Human arm -->
<rect x="182" y="74" width="8" height="20" rx="2" fill="#E91E63" transform="rotate(-15 186 84)"/>
<rect x="192" y="76" width="7" height="16" rx="2" fill="#E91E63" transform="rotate(-10 195 84)"/>
<rect x="200" y="78" width="6" height="12" rx="1" fill="#E91E63"/>
<text x="195" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#E91E63" text-anchor="middle">Рука</text>
<text x="195" y="112" font-family="Arial,sans-serif" font-size="5.5" fill="#E91E63" text-anchor="middle">человека</text>

<!-- Bat wing -->
<rect x="218" y="74" width="6" height="20" rx="2" fill="#9C27B0" transform="rotate(-5 221 84)"/>
<rect x="227" y="75" width="5" height="18" rx="2" fill="#9C27B0" transform="rotate(0 229 84)"/>
