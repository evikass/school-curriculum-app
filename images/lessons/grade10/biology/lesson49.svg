<text x="230" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#9C27B0" text-anchor="middle">Крыло</text>
<text x="230" y="112" font-family="Arial,sans-serif" font-size="5.5" fill="#9C27B0" text-anchor="middle">летучей мыши</text>

<!-- Horse leg -->
<rect x="252" y="74" width="6" height="22" rx="2" fill="#FF9800" transform="rotate(0 255 85)"/>
<rect x="262" y="78" width="5" height="14" rx="2" fill="#FF9800"/>
<ellipse cx="264" cy="94" rx="3" ry="4" fill="#FF9800"/>
<text x="258" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Нога</text>
<text x="258" y="112" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">лошади</text>

<!-- Whale flipper -->
<rect x="282" y="74" width="20" height="10" rx="3" fill="#2196F3"/>
<rect x="286" y="70" width="3" height="18" rx="1" fill="#2196F3"/>
<rect x="291" y="68" width="3" height="20" rx="1" fill="#2196F3"/>
<rect x="296" y="70" width="3" height="18" rx="1" fill="#2196F3"/>
<text x="290" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">Ласт</text>
<text x="290" y="112" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">кита</text>

<text x="249" y="125" font-family="Arial,sans-serif" font-size="6.5" fill="#1A237E" text-anchor="middle">Единый план строения → общее происхождение</text>
<text x="249" y="136" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Аналогичные — сходные функции, разное происх.</text>

<!-- 3. Embryological -->
<rect x="334" y="42" width="158" height="100" rx="5" fill="white" fill-opacity="0.85" stroke="#1A237E" stroke-width="1"/>
<text x="413" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1A237E" text-anchor="middle">3. ЭМБРИОЛОГИЧЕСКИЕ</text>

<!-- Embryo comparison -->
<text x="413" y="68" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Сходство зародышей (закон Геккеля)</text>

<!-- Fish embryo -->
<ellipse cx="362" cy="88" rx="12" ry="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
