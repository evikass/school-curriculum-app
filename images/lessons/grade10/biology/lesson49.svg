<!-- Salamander embryo -->
<ellipse cx="395" cy="88" rx="12" ry="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
<circle cx="389" cy="86" r="2" fill="#3F51B5"/>
