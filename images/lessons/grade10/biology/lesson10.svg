<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Нуклеиновые кислоты: ДНК</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 10</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0D47A1" stroke-width="1" opacity="0.3"/>

<!-- DNA Double Helix -->
<g transform="translate(135,190)">
  <!-- Left backbone (sugar-phosphate) -->
  <path d="M-15,-100 C5,-90 -5,-80 15,-70 C35,-60 5,-50 25,-40 C45,-30 15,-20 35,-10 C55,0 25,10 45,20 C65,30 35,40 55,50 C75,60 45,70 65,80" fill="none" stroke="#1565C0" stroke-width="3"/>
  <!-- Right backbone -->
  <path d="M15,-100 C-5,-90 5,-80 -15,-70 C-35,-60 -5,-50 -25,-40 C-45,-30 -15,-20 -35,-10 C-55,0 -25,10 -45,20 C-65,30 -35,40 -55,50 C-75,60 -45,70 -65,80" fill="none" stroke="#C62828" stroke-width="3"/>

  <!-- Base pair rungs -->
  <line x1="-8" y1="-95" x2="8" y2="-95" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="-10" y1="-85" x2="10" y2="-85" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="-12" y1="-75" x2="12" y2="-75" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="-10" y1="-65" x2="10" y2="-65" stroke="#9C27B0" stroke-width="2.5"/>
  <line x1="-8" y1="-55" x2="8" y2="-55" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="-12" y1="-45" x2="12" y2="-45" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="-10" y1="-35" x2="10" y2="-35" stroke="#9C27B0" stroke-width="2.5"/>
  <line x1="-8" y1="-25" x2="8" y2="-25" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="-12" y1="-15" x2="12" y2="-15" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#9C27B0" stroke-width="2.5"/>
  <line x1="-8" y1="5" x2="8" y2="5" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="-12" y1="15" x2="12" y2="15" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="-10" y1="25" x2="10" y2="25" stroke="#9C27B0" stroke-width="2.5"/>
  <line x1="-8" y1="35" x2="8" y2="35" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="-12" y1="45" x2="12" y2="45" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="-10" y1="55" x2="10" y2="55" stroke="#9C27B0" stroke-width="2.5"/>
  <line x1="-8" y1="65" x2="8" y2="65" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="-12" y1="75" x2="12" y2="75" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Labels for strands -->
  <text x="-30" y="-105" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">3'</text>
  <text x="18" y="-105" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">5'</text>
  <text x="-70" y="80" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">5'</text>
  <text x="60" y="80" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">3'</text>

  <!-- Antiparallel arrow -->
  <text x="0" y="98" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Антипараллельные цепи</text>
</g>

<!-- Nucleotide structure -->
<g transform="translate(370,105)">
  <rect x="-75" y="-30" width="150" height="105" rx="6" fill="white" opacity="0.92" stroke="#0D47A1" stroke-width="1.2"/>
  <text x="0" y="-15" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold">НУКЛЕОТИД ДНК</text>
  <line x1="-60" y1="-9" x2="60" y2="-9" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- Phosphate -->
  <circle cx="0" cy="8" r="10" fill="#F44336" opacity="0.25" stroke="#C62828" stroke-width="1.2"/>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">PO4</text>
  <text x="30" y="12" font-family="Arial,sans-serif" font-size="5" fill="#666">Фосфат</text>

  <!-- Deoxyribose -->
  <polygon points="0,22 -8,30 -5,40 5,40 8,30" fill="#FF9800" opacity="0.25" stroke="#E65100" stroke-width="1"/>
  <text x="0" y="34" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">C5H10O4</text>
  <text x="30" y="34" font-family="Arial,sans-serif" font-size="5" fill="#666">Дезоксирибоза</text>

  <!-- Nitrogen base -->
  <rect x="-12" y="44" width="24" height="22" rx="3" fill="#4CAF50" opacity="0.25" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">A/T/</text>
  <text x="0" y="64" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">G/C</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="5" fill="#666">Азотистое</text>
  <text x="30" y="64" font-family="Arial,sans-serif" font-size="5" fill="#666">основание</text>
</g>

<!-- Base pairing rules (Chargaff) -->
<g transform="translate(370,230)">
  <rect x="-75" y="-20" width="150" height="95" rx="6" fill="white" opacity="0.92" stroke="#0D47A1" stroke-width="1.2"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold">ПРАВИЛА ЧАРГАФФА</text>
  <line x1="-60" y1="1" x2="60" y2="1" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- A = T pair -->
  <g transform="translate(0,18)">
    <rect x="-40" y="-8" width="22" height="16" rx="3" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
    <text x="-29" y="3" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">A</text>
    <text x="-10" y="3" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">=</text>
    <rect x="18" y="-8" width="22" height="16" rx="3" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1"/>
    <text x="29" y="3" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">T</text>
    <text x="0" y="14" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">2 водородные связи</text>
  </g>

  <!-- G ≡ C pair -->
  <g transform="translate(0,42)">
    <rect x="-40" y="-8" width="22" height="16" rx="3" fill="#2196F3" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
    <text x="-29" y="3" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">G</text>
    <text x="-10" y="3" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">=</text>
    <rect x="18" y="-8" width="22" height="16" rx="3" fill="#9C27B0" opacity="0.3" stroke="#7B1FA2" stroke-width="1"/>
    <text x="29" y="3" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">C</text>
    <text x="0" y="14" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">3 водородные связи</text>
  </g>

  <text x="0" y="68" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">A+T = G+C (у каждого вида)</text>
</g>

<!-- Key properties at bottom -->
<g transform="translate(30,300)">
  <rect x="0" y="0" width="440" height="35" rx="5" fill="white" opacity="0.9" stroke="#0D47A1" stroke-width="0.8"/>
  <text x="220" y="12" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Свойства ДНК</text>
  <text x="55" y="26" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">Репликация (удвоение)</text>
  <text x="190" y="26" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Комплементарность</text>
  <text x="340" y="26" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Стабильность (двойная спираль)</text>
</g>

<rect x="10" y="340" width="480" height="6" rx="3" fill="#0D47A1" opacity="0.85"/>
</svg>