<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg53" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#1a0e0a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg53)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#a1887f" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#4e342e" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#efebe9" font-size="12" font-weight="bold" font-family="Arial">Происхождение человека — Биология 10 класс — Урок 53</text>

  <!-- Timeline axis -->
  <line x1="30" y1="290" x2="480" y2="290" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr53)"/>
  <defs><marker id="arr53" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8d6e63"/></marker></defs>
  <text x="470" y="302" fill="#bcaaa4" font-size="6" font-family="Arial">млн лет</text>

  <!-- Time markers -->
  <line x1="60" y1="288" x2="60" y2="295" stroke="#8d6e63" stroke-width="1"/>
  <text x="60" y="303" text-anchor="middle" fill="#a1887f" font-size="6" font-family="Arial">20</text>
  <line x1="150" y1="288" x2="150" y2="295" stroke="#8d6e63" stroke-width="1"/>
  <text x="150" y="303" text-anchor="middle" fill="#a1887f" font-size="6" font-family="Arial">4</text>
  <line x1="220" y1="288" x2="220" y2="295" stroke="#8d6e63" stroke-width="1"/>
  <text x="220" y="303" text-anchor="middle" fill="#a1887f" font-size="6" font-family="Arial">2</text>
  <line x1="290" y1="288" x2="290" y2="295" stroke="#8d6e63" stroke-width="1"/>
  <text x="290" y="303" text-anchor="middle" fill="#a1887f" font-size="6" font-family="Arial">1.5</text>
  <line x1="380" y1="288" x2="380" y2="295" stroke="#8d6e63" stroke-width="1"/>
  <text x="380" y="303" text-anchor="middle" fill="#a1887f" font-size="6" font-family="Arial">0.2</text>
  <line x1="440" y1="288" x2="440" y2="295" stroke="#8d6e63" stroke-width="1"/>
  <text x="440" y="303" text-anchor="middle" fill="#a1887f" font-size="6" font-family="Arial">0.04</text>

  <!-- Stage 1: Dryopithecus -->
  <rect x="40" y="54" width="60" height="228" fill="#3e2723" stroke="#6d4c41" stroke-width="1" rx="3"/>
  <text x="70" y="67" text-anchor="middle" fill="#d7ccc8" font-size="6" font-weight="bold" font-family="Arial">Дриопитек</text>
  <!-- Simple ape silhouette -->
  <ellipse cx="70" cy="100" rx="12" ry="14" fill="#8d6e63" stroke="#5d4037" stroke-width="0.5"/>
  <circle cx="66" cy="96" r="2" fill="#3e2723"/>
  <circle cx="74" cy="96" r="2" fill="#3e2723"/>
  <path d="M65,104 Q70,107 75,104" stroke="#5d4037" stroke-width="0.5" fill="none"/>
  <text x="70" y="125" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">~20 млн л.н.</text>
  <text x="70" y="135" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Древесная</text>
  <text x="70" y="143" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">жизнь</text>
  <line x1="70" y1="265" x2="70" y2="290" stroke="#6d4c41" stroke-width="1.5"/>

  <!-- Stage 2: Australopithecus -->
  <rect x="110" y="54" width="68" height="228" fill="#33291e" stroke="#8d6e63" stroke-width="1" rx="3"/>
  <text x="144" y="67" text-anchor="middle" fill="#d7ccc8" font-size="6" font-weight="bold" font-family="Arial">Австралопитек</text>
  <!-- Bipedal ape figure -->
  <circle cx="144" cy="88" r="10" fill="#a1887f" stroke="#795548" stroke-width="0.5"/>
  <circle cx="140" cy="85" r="1.5" fill="#3e2723"/>
  <circle cx="148" cy="85" r="1.5" fill="#3e2723"/>
  <line x1="144" y1="98" x2="144" y2="130" stroke="#a1887f" stroke-width="2"/>
  <line x1="144" y1="110" x2="132" y2="120" stroke="#a1887f" stroke-width="1.5"/>
  <line x1="144" y1="110" x2="156" y2="100" stroke="#a1887f" stroke-width="1.5"/>
  <line x1="144" y1="130" x2="138" y2="148" stroke="#a1887f" stroke-width="1.5"/>
  <line x1="144" y1="130" x2="150" y2="148" stroke="#a1887f" stroke-width="1.5"/>
  <text x="144" y="160" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">4-1 млн л.н.</text>
  <text x="144" y="170" text-anchor="middle" fill="#ffcc80" font-size="5" font-weight="bold" font-family="Arial">Прямохождение</text>
  <text x="144" y="180" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Мозг: 450 см³</text>
  <line x1="144" y1="265" x2="144" y2="290" stroke="#8d6e63" stroke-width="1.5"/>

  <!-- Stage 3: Homo habilis -->
  <rect x="188" y="54" width="65" height="228" fill="#2d2117" stroke="#a1887f" stroke-width="1" rx="3"/>
  <text x="220" y="67" text-anchor="middle" fill="#d7ccc8" font-size="6" font-weight="bold" font-family="Arial">Человек умелый</text>
  <!-- Figure with tool -->
  <circle cx="218" cy="88" r="10" fill="#bcaaa4" stroke="#8d6e63" stroke-width="0.5"/>
  <circle cx="214" cy="85" r="1.5" fill="#3e2723"/>
  <circle cx="222" cy="85" r="1.5" fill="#3e2723"/>
  <line x1="218" y1="98" x2="218" y2="128" stroke="#bcaaa4" stroke-width="2"/>
  <line x1="218" y1="108" x2="206" y2="118" stroke="#bcaaa4" stroke-width="1.5"/>
  <line x1="218" y1="108" x2="230" y2="100" stroke="#bcaaa4" stroke-width="1.5"/>
  <!-- Stone tool -->
  <path d="M228,97 L234,93 L236,96 L232,101 Z" fill="#78909c" stroke="#546e7a" stroke-width="0.5"/>
  <line x1="218" y1="128" x2="212" y2="148" stroke="#bcaaa4" stroke-width="1.5"/>
  <line x1="218" y1="128" x2="224" y2="148" stroke="#bcaaa4" stroke-width="1.5"/>
  <text x="220" y="160" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">~2 млн л.н.</text>
  <text x="220" y="170" text-anchor="middle" fill="#80cbc4" font-size="5" font-weight="bold" font-family="Arial">Орудия труда</text>
  <text x="220" y="180" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Мозг: 650 см³</text>
  <line x1="220" y1="265" x2="220" y2="290" stroke="#a1887f" stroke-width="1.5"/>

  <!-- Stage 4: Homo erectus -->
  <rect x="261" y="54" width="65" height="228" fill="#261a10" stroke="#bcaaa4" stroke-width="1" rx="3"/>
  <text x="293" y="67" text-anchor="middle" fill="#d7ccc8" font-size="6" font-weight="bold" font-family="Arial">Человек прямоходящий</text>
  <!-- Figure with fire -->
  <circle cx="291" cy="86" r="10" fill="#d7ccc8" stroke="#a1887f" stroke-width="0.5"/>
  <circle cx="287" cy="83" r="1.5" fill="#3e2723"/>
  <circle cx="295" cy="83" r="1.5" fill="#3e2723"/>
  <line x1="291" y1="96" x2="291" y2="126" stroke="#d7ccc8" stroke-width="2"/>
  <line x1="291" y1="106" x2="279" y2="116" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="291" y1="106" x2="303" y2="98" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="291" y1="126" x2="285" y2="148" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="291" y1="126" x2="297" y2="148" stroke="#d7ccc8" stroke-width="1.5"/>
  <!-- Fire symbol -->
  <path d="M305,94 Q308,86 311,92 Q313,84 316,93 Q314,98 310,98 Q306,98 305,94 Z" fill="#ff7043" stroke="#e64a19" stroke-width="0.3"/>
  <path d="M308,93 Q310,88 312,93" fill="#ffab91" stroke="none"/>
  <text x="293" y="160" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">1.5 млн л.н.</text>
  <text x="293" y="170" text-anchor="middle" fill="#ff8a65" font-size="5" font-weight="bold" font-family="Arial">Огонь, речь</text>
  <text x="293" y="180" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Мозг: 1000 см³</text>
  <line x1="293" y1="265" x2="293" y2="290" stroke="#bcaaa4" stroke-width="1.5"/>

  <!-- Stage 5: Neanderthal -->
  <rect x="334" y="54" width="65" height="228" fill="#1f150d" stroke="#d7ccc8" stroke-width="1" rx="3"/>
  <text x="366" y="67" text-anchor="middle" fill="#d7ccc8" font-size="6" font-weight="bold" font-family="Arial">Неандерталец</text>
  <!-- Neanderthal figure -->
  <circle cx="364" cy="85" r="11" fill="#efebe9" stroke="#bcaaa4" stroke-width="0.5"/>
  <path d="M358,82 Q364,78 370,82" stroke="#8d6e63" stroke-width="1.5" fill="none"/>
  <circle cx="360" cy="83" r="1.5" fill="#3e2723"/>
  <circle cx="368" cy="83" r="1.5" fill="#3e2723"/>
  <path d="M360,89 Q364,91 368,89" stroke="#8d6e63" stroke-width="0.5" fill="none"/>
  <line x1="364" y1="96" x2="364" y2="126" stroke="#efebe9" stroke-width="2"/>
  <line x1="364" y1="106" x2="352" y2="116" stroke="#efebe9" stroke-width="1.5"/>
  <line x1="364" y1="106" x2="376" y2="98" stroke="#efebe9" stroke-width="1.5"/>
  <!-- Spear -->
  <line x1="374" y1="98" x2="386" y2="80" stroke="#795548" stroke-width="1"/>
  <path d="M384,82 L388,77 L383,78 Z" fill="#78909c"/>
  <line x1="364" y1="126" x2="358" y2="148" stroke="#efebe9" stroke-width="1.5"/>
  <line x1="364" y1="126" x2="370" y2="148" stroke="#efebe9" stroke-width="1.5"/>
  <text x="366" y="160" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">200-30 тыс.л.н.</text>
  <text x="366" y="170" text-anchor="middle" fill="#80cbc4" font-size="5" font-weight="bold" font-family="Arial">Оружие, одежда</text>
  <text x="366" y="180" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Мозг: 1400 см³</text>
  <line x1="366" y1="265" x2="366" y2="290" stroke="#d7ccc8" stroke-width="1.5"/>

  <!-- Stage 6: Homo sapiens -->
  <rect x="407" y="54" width="65" height="228" fill="#1a100a" stroke="#ffab91" stroke-width="1.5" rx="3"/>
  <text x="439" y="67" text-anchor="middle" fill="#ffccbc" font-size="6" font-weight="bold" font-family="Arial">Человек разумный</text>
  <!-- Modern human figure -->
  <circle cx="437" cy="84" r="11" fill="#ffe0b2" stroke="#ffb74d" stroke-width="0.5"/>
  <circle cx="433" cy="81" r="1.5" fill="#3e2723"/>
  <circle cx="441" cy="81" r="1.5" fill="#3e2723"/>
  <path d="M434,87 Q437,89 440,87" stroke="#8d6e63" stroke-width="0.5" fill="none"/>
  <line x1="437" y1="95" x2="437" y2="125" stroke="#ffe0b2" stroke-width="2"/>
  <line x1="437" y1="105" x2="425" y2="115" stroke="#ffe0b2" stroke-width="1.5"/>
  <line x1="437" y1="105" x2="449" y2="97" stroke="#ffe0b2" stroke-width="1.5"/>
  <line x1="437" y1="125" x2="431" y2="148" stroke="#ffe0b2" stroke-width="1.5"/>
  <line x1="437" y1="125" x2="443" y2="148" stroke="#ffe0b2" stroke-width="1.5"/>
  <text x="439" y="160" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">40 тыс.л.н. -</text>
  <text x="439" y="168" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">настоящее время</text>
  <text x="439" y="180" text-anchor="middle" fill="#fff176" font-size="5" font-weight="bold" font-family="Arial">Язык, искусство</text>
  <text x="439" y="190" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Мозг: 1500 см³</text>
  <line x1="439" y1="265" x2="439" y2="290" stroke="#ffab91" stroke-width="1.5"/>

  <!-- Skull evolution strip at bottom -->
  <rect x="8" y="310" width="484" height="32" fill="#1a0e0a" stroke="#8d6e63" stroke-width="1" rx="3"/>
  <text x="250" y="322" text-anchor="middle" fill="#d7ccc8" font-size="7" font-weight="bold" font-family="Arial">Эволюция черепа: увеличение мозговой части, уменьшение челюстей</text>
  <!-- Simplified skull progression -->
  <ellipse cx="80" cy="335" rx="10" ry="9" fill="#8d6e63" opacity="0.5"/>
  <path d="M75,332 Q80,328 85,332 L84,337 L76,337 Z" fill="#6d4c41" opacity="0.5"/>
  <text x="80" y="345" text-anchor="middle" fill="#a1887f" font-size="4" font-family="Arial">Дриопитек</text>
  
  <ellipse cx="170" cy="335" rx="11" ry="10" fill="#a1887f" opacity="0.5"/>
  <path d="M164,332 Q170,326 176,332 L175,338 L165,338 Z" fill="#795548" opacity="0.5"/>
  <text x="170" y="345" text-anchor="middle" fill="#a1887f" font-size="4" font-family="Arial">Австралопитек</text>
  
  <ellipse cx="260" cy="335" rx="12" ry="11" fill="#bcaaa4" opacity="0.5"/>
  <path d="M254,333 Q260,327 266,333 L265,338 L255,338 Z" fill="#8d6e63" opacity="0.5"/>
  <text x="260" y="345" text-anchor="middle" fill="#a1887f" font-size="4" font-family="Arial">H. erectus</text>
  
  <ellipse cx="360" cy="334" rx="14" ry="12" fill="#d7ccc8" opacity="0.6"/>
  <path d="M355,332 Q360,328 365,332 L364,337 L356,337 Z" fill="#a1887f" opacity="0.5"/>
  <text x="360" y="345" text-anchor="middle" fill="#a1887f" font-size="4" font-family="Arial">Неандерталец</text>
  
  <ellipse cx="445" cy="333" rx="15" ry="13" fill="#ffe0b2" opacity="0.6"/>
  <path d="M441,332 Q445,330 449,332 L448,336 L442,336 Z" fill="#bcaaa4" opacity="0.5"/>
  <text x="445" y="345" text-anchor="middle" fill="#a1887f" font-size="4" font-family="Arial">H. sapiens</text>

  <!-- Arrow showing progression -->
  <line x1="95" y1="335" x2="155" y2="335" stroke="#8d6e63" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="185" y1="335" x2="245" y2="335" stroke="#8d6e63" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="275" y1="335" x2="345" y2="335" stroke="#8d6e63" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="377" y1="335" x2="428" y2="335" stroke="#8d6e63" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Key transitions labels on timeline -->
  <rect x="80" y="195" width="55" height="24" fill="#ff6f00" opacity="0.2" stroke="#ff8f00" stroke-width="0.5" rx="2"/>
  <text x="107" y="207" text-anchor="middle" fill="#ffb74d" font-size="5" font-family="Arial">Прямо-</text>
  <text x="107" y="214" text-anchor="middle" fill="#ffb74d" font-size="5" font-family="Arial">хождение</text>

  <rect x="155" y="195" width="55" height="24" fill="#00897b" opacity="0.2" stroke="#26a69a" stroke-width="0.5" rx="2"/>
  <text x="182" y="207" text-anchor="middle" fill="#80cbc4" font-size="5" font-family="Arial">Орудия</text>
  <text x="182" y="214" text-anchor="middle" fill="#80cbc4" font-size="5" font-family="Arial">труда</text>

  <rect x="230" y="195" width="55" height="24" fill="#e65100" opacity="0.2" stroke="#ff6d00" stroke-width="0.5" rx="2"/>
  <text x="257" y="207" text-anchor="middle" fill="#ff8a65" font-size="5" font-family="Arial">Огонь,</text>
  <text x="257" y="214" text-anchor="middle" fill="#ff8a65" font-size="5" font-family="Arial">речь</text>

  <rect x="380" y="195" width="55" height="24" fill="#f9a825" opacity="0.2" stroke="#f9a825" stroke-width="0.5" rx="2"/>
  <text x="407" y="207" text-anchor="middle" fill="#fff176" font-size="5" font-family="Arial">Язык,</text>
  <text x="407" y="214" text-anchor="middle" fill="#fff176" font-size="5" font-family="Arial">искусство</text>
</svg>