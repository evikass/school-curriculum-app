<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFECB3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#F57F17" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">Углеводы: моно-, ди- и полисахариды</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 6</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>

<!-- Monosaccharide - Glucose ring -->
<g transform="translate(85,130)">
  <rect x="-60" y="-55" width="120" height="130" rx="6" fill="white" opacity="0.9" stroke="#FF9800" stroke-width="1.2"/>
  <text x="0" y="-38" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">МОНОСАХАРИДЫ</text>
  <line x1="-45" y1="-32" x2="45" y2="-32" stroke="#FF9800" stroke-width="0.5"/>
  <!-- Pyranose ring (hexagonal) -->
  <polygon points="0,-20 18,-10 18,10 0,20 -18,10 -18,-10" fill="none" stroke="#F57F17" stroke-width="2"/>
  <!-- O in ring -->
  <circle cx="0" cy="-20" r="5" fill="#F44336" opacity="0.3"/>
  <text x="0" y="-17" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">O</text>
  <!-- OH groups -->
  <text x="22" y="-7" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">OH</text>
  <text x="22" y="13" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">OH</text>
  <text x="-30" y="13" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">OH</text>
  <text x="-30" y="-7" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">OH</text>
  <text x="-2" y="32" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">OH</text>

  <text x="0" y="48" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">C6H12O6</text>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Глюкоза, фруктоза,</text>
  <text x="0" y="66" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">рибоза, дезоксирибоза</text>
</g>

<!-- Disaccharide - Maltose -->
<g transform="translate(240,130)">
  <rect x="-60" y="-55" width="120" height="130" rx="6" fill="white" opacity="0.9" stroke="#FF9800" stroke-width="1.2"/>
  <text x="0" y="-38" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">ДИСАХАРИДЫ</text>
  <line x1="-45" y1="-32" x2="45" y2="-32" stroke="#FF9800" stroke-width="0.5"/>
  <!-- Two rings connected -->
  <polygon points="-15,-10 3,0 3,20 -15,30 -33,20 -33,0" fill="#FFE0B2" stroke="#F57F17" stroke-width="1.5"/>
  <polygon points="15,-10 33,0 33,20 15,30 -3,20 -3,0" fill="#FFCC80" stroke="#F57F17" stroke-width="1.5"/>
  <!-- Glycosidic bond -->
  <line x1="-3" y1="10" x2="3" y2="10" stroke="#C62828" stroke-width="2.5"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="4" fill="#C62828" text-anchor="middle">1→4</text>

  <!-- Condensation reaction -->
  <text x="0" y="-20" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">— H2O →</text>
  <text x="0" y="44" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">C12H22O11</text>
  <text x="0" y="56" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Сахароза, лактоза,</text>
  <text x="0" y="66" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">мальтоза</text>
</g>

<!-- Polysaccharide - Starch/Cellulose -->
<g transform="translate(395,130)">
  <rect x="-60" y="-55" width="120" height="130" rx="6" fill="white" opacity="0.9" stroke="#FF9800" stroke-width="1.2"/>
  <text x="0" y="-38" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">ПОЛИСАХАРИДЫ</text>
  <line x1="-45" y1="-32" x2="45" y2="-32" stroke="#FF9800" stroke-width="0.5"/>
  <!-- Chain of connected rings -->
  <polygon points="-40,-8 -28,0 -28,14 -40,22 -52,14 -52,0" fill="#FFE0B2" stroke="#F57F17" stroke-width="1"/>
  <polygon points="-18,-8 -6,0 -6,14 -18,22 -30,14 -30,0" fill="#FFCC80" stroke="#F57F17" stroke-width="1"/>
  <polygon points="4,-8 16,0 16,14 4,22 -8,14 -8,0" fill="#FFE0B2" stroke="#F57F17" stroke-width="1"/>
  <polygon points="26,-8 38,0 38,14 26,22 14,14 14,0" fill="#FFCC80" stroke="#F57F17" stroke-width="1"/>
  <!-- Continuation dots -->
  <text x="44" y="10" font-family="Arial,sans-serif" font-size="10" fill="#F57F17" font-weight="bold">...</text>

  <text x="0" y="38" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">(C6H10O5)n</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Крахмал, гликоген —</text>
  <text x="0" y="59" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">запас энергии</text>
  <text x="0" y="70" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Целлюлоза — каркас</text>
</g>

<!-- Arrows showing polymerization -->
<g transform="translate(162,130)">
  <line x1="-8" y1="0" x2="8" y2="0" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="8,0 3,-3 3,3" fill="#2E7D32"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">+H2O</text>
</g>
<g transform="translate(317,130)">
  <line x1="-8" y1="0" x2="8" y2="0" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="8,0 3,-3 3,3" fill="#2E7D32"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">+nH2O</text>
</g>

<!-- Functions table at bottom -->
<g transform="translate(30,240)">
  <rect x="0" y="0" width="440" height="80" rx="5" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1"/>
  <text x="220" y="14" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Функции углеводов в клетке</text>
  <line x1="10" y1="20" x2="430" y2="20" stroke="#FF9800" stroke-width="0.5"/>

  <!-- Energy -->
  <g transform="translate(55,40)">
    <circle cx="0" cy="0" r="14" fill="#F44336" opacity="0.15" stroke="#F44336" stroke-width="1"/>
    <text x="0" y="-2" font-family="Arial,sans-serif" font-size="10" fill="#F44336" text-anchor="middle">⚡</text>
    <text x="0" y="8" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">E</text>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Энергетическая</text>
    <text x="0" y="31" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Глюкоза — главный</text>
    <text x="0" y="39" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">источник энергии</text>
  </g>

  <!-- Storage -->
  <g transform="translate(165,40)">
    <circle cx="0" cy="0" r="14" fill="#FF9800" opacity="0.15" stroke="#FF9800" stroke-width="1"/>
    <rect x="-6" y="-8" width="12" height="16" rx="2" fill="#FF9800" opacity="0.4"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Запасающая</text>
    <text x="0" y="31" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Крахмал, гликоген</text>
    <text x="0" y="39" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">— резерв энергии</text>
  </g>

  <!-- Structural -->
  <g transform="translate(275,40)">
    <circle cx="0" cy="0" r="14" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="1"/>
    <rect x="-8" y="-6" width="4" height="12" fill="#4CAF50" opacity="0.5"/>
    <rect x="-1" y="-6" width="4" height="12" fill="#4CAF50" opacity="0.5"/>
    <rect x="5" y="-6" width="4" height="12" fill="#4CAF50" opacity="0.5"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Структурная</text>
    <text x="0" y="31" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Целлюлоза — клеточная</text>
    <text x="0" y="39" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">стенка растений</text>
  </g>

  <!-- Component -->
  <g transform="translate(385,40)">
    <circle cx="0" cy="0" r="14" fill="#9C27B0" opacity="0.15" stroke="#9C27B0" stroke-width="1"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="8" fill="#9C27B0" text-anchor="middle" font-weight="bold">ДНК</text>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Компонент</text>
    <text x="0" y="31" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Рибоза (РНК)</text>
    <text x="0" y="39" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Дезоксирибоза (ДНК)</text>
  </g>
</g>

<rect x="10" y="330" width="480" height="14" rx="4" fill="#F57F17" opacity="0.85"/>
<text x="250" y="341" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">Углеводы — до 90% сухой массы растений, 1–2% у животных | C : H : O = 1 : 2 : 1</text>
</svg>