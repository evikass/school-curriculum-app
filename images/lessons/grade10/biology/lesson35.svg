<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg35" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <radialGradient id="eggG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="70%" stop-color="#ffecb3"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </radialGradient>
    <radialGradient id="zygoteG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#a5d6a7"/>
    </radialGradient>
    <marker id="arr35" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#880e4f"/></marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg35)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#880e4f" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#880e4f" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#880e4f"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">Оплодотворение и его формы</text>
  <text x="490" y="14" text-anchor="end" fill="#f8bbd0" font-size="8" font-family="Arial">Биология 10 класс — Урок 35</text>
  <!-- Main fertilization process -->
  <rect x="15" y="46" width="470" height="65" fill="white" fill-opacity="0.5" rx="5" stroke="#880e4f" stroke-width="0.8"/>
  <text x="250" y="58" text-anchor="middle" fill="#880e4f" font-size="10" font-weight="bold" font-family="Arial">Процесс оплодотворения</text>
  <!-- Sperm -->
  <ellipse cx="75" cy="85" rx="10" ry="6" fill="#1565c0" opacity="0.8"/>
  <line x1="85" y1="85" x2="105" y2="85" stroke="#1565c0" stroke-width="1.2"/>
  <path d="M103,83 L108,85 L103,87" fill="none" stroke="#1565c0" stroke-width="0.8"/>
  <text x="75" y="100" text-anchor="middle" fill="#1565c0" font-size="7" font-family="Arial">Сперматозоид n</text>
  <!-- Plus sign -->
  <text x="130" y="90" text-anchor="middle" fill="#880e4f" font-size="16" font-weight="bold" font-family="Arial">+</text>
  <!-- Egg -->
  <circle cx="170" cy="85" r="16" fill="url(#eggG)" stroke="#ff8f00" stroke-width="1.5"/>
  <circle cx="170" cy="85" r="4" fill="#ff6f00" opacity="0.5"/>
  <text x="170" y="110" text-anchor="middle" fill="#ff8f00" font-size="7" font-family="Arial">Яйцеклетка n</text>
  <!-- Arrow -->
  <line x1="200" y1="85" x2="240" y2="85" stroke="#880e4f" stroke-width="1.5" marker-end="url(#arr35)"/>
  <text x="220" y="80" text-anchor="middle" fill="#880e4f" font-size="6" font-family="Arial">слияние</text>
  <!-- Zygote -->
  <ellipse cx="275" cy="85" rx="20" ry="16" fill="url(#zygoteG)" stroke="#2e7d32" stroke-width="1.5"/>
  <circle cx="275" cy="82" r="5" fill="#1b5e20" opacity="0.4"/>
  <text x="275" y="112" text-anchor="middle" fill="#2e7d32" font-size="7" font-weight="bold" font-family="Arial">Зигота 2n</text>
  <!-- n + n = 2n formula -->
  <text x="380" y="82" text-anchor="middle" fill="#880e4f" font-size="10" font-weight="bold" font-family="Arial">n + n → 2n</text>
  <text x="380" y="96" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">Восстановление диплоидности</text>
  <!-- External fertilization -->
  <rect x="15" y="118" width="155" height="110" fill="white" fill-opacity="0.6" rx="5" stroke="#0277bd" stroke-width="1"/>
  <rect x="15" y="118" width="155" height="16" fill="#0277bd" rx="5"/>
  <rect x="15" y="128" width="155" height="6" fill="#0277bd"/>
  <text x="92" y="130" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial">Наружное оплодотворение</text>
  <!-- Water background -->
  <rect x="20" y="140" width="145" height="55" fill="#e1f5fe" rx="3"/>
  <!-- Waves -->
  <path d="M20,150 Q40,145 60,150 Q80,155 100,150 Q120,145 140,150 Q160,155 165,150" fill="none" stroke="#0288d1" stroke-width="0.8" opacity="0.5"/>
  <path d="M20,155 Q40,150 60,155 Q80,160 100,155 Q120,150 140,155 Q160,160 165,155" fill="none" stroke="#0288d1" stroke-width="0.6" opacity="0.3"/>
  <!-- Fish/eggs in water -->
  <ellipse cx="50" cy="172" rx="5" ry="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="0.5"/>
  <ellipse cx="60" cy="175" rx="5" ry="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="0.5"/>
  <ellipse cx="70" cy="173" rx="5" ry="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="0.5"/>
  <ellipse cx="55" cy="180" rx="5" ry="4" fill="#ffcc80" stroke="#ff8f00" stroke-width="0.5"/>
  <!-- Sperm in water -->
  <line x1="110" y1="168" x2="120" y2="168" stroke="#1565c0" stroke-width="0.6"/>
  <circle cx="108" cy="168" r="1.5" fill="#1565c0"/>
  <line x1="115" y1="175" x2="125" y2="175" stroke="#1565c0" stroke-width="0.6"/>
  <circle cx="113" cy="175" r="1.5" fill="#1565c0"/>
  <text x="92" y="204" text-anchor="middle" fill="#0277bd" font-size="7" font-family="Arial">Рыбы, земноводные</text>
  <text x="92" y="214" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">В водной среде</text>
  <text x="92" y="223" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Много гамет, мало зародышей</text>
  <!-- Internal fertilization -->
  <rect x="175" y="118" width="155" height="110" fill="white" fill-opacity="0.6" rx="5" stroke="#c62828" stroke-width="1"/>
  <rect x="175" y="118" width="155" height="16" fill="#c62828" rx="5"/>
  <rect x="175" y="128" width="155" height="6" fill="#c62828"/>
  <text x="252" y="130" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial">Внутреннее оплодотворение</text>
  <!-- Mammal/organism body -->
  <rect x="185" y="140" width="135" height="55" fill="#fce4ec" rx="3"/>
  <!-- Simple organism outline -->
  <ellipse cx="252" cy="162" rx="30" ry="18" fill="#ffcdd2" stroke="#c62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <ellipse cx="242" cy="158" rx="6" ry="5" fill="#1565c0" opacity="0.6"/>
  <line x1="248" y1="158" x2="255" y2="160" stroke="#1565c0" stroke-width="0.5"/>
  <circle cx="265" cy="160" r="8" fill="url(#eggG)" stroke="#ff8f00" stroke-width="0.8"/>
  <text x="252" y="204" text-anchor="middle" fill="#c62828" font-size="7" font-family="Arial">Млекопитающие, птицы,</text>
  <text x="252" y="214" text-anchor="middle" fill="#c62828" font-size="7" font-family="Arial">пресмыкающиеся</text>
  <text x="252" y="223" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Внутри организма</text>
  <!-- Double fertilization in plants -->
  <rect x="335" y="118" width="150" height="110" fill="white" fill-opacity="0.6" rx="5" stroke="#2e7d32" stroke-width="1"/>
  <rect x="335" y="118" width="150" height="16" fill="#2e7d32" rx="5"/>
  <rect x="335" y="128" width="150" height="6" fill="#2e7d32"/>
  <text x="410" y="130" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial">Двойное оплодотворение</text>
  <!-- Flower / plant diagram -->
  <rect x="345" y="140" width="130" height="55" fill="#e8f5e9" rx="3"/>
  <!-- Ovule -->
  <ellipse cx="410" cy="162" rx="18" ry="14" fill="#fff9c4" stroke="#558b2f" stroke-width="1"/>
  <!-- Egg cell -->
  <circle cx="405" cy="158" r="4" fill="#c62828" opacity="0.6"/>
  <!-- Central cell -->
  <ellipse cx="418" cy="165" rx="6" ry="5" fill="#7b1fa2" opacity="0.4"/>
  <!-- Two sperm entering -->
  <line x1="380" y1="148" x2="403" y2="155" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="2,1"/>
  <circle cx="378" cy="147" r="2" fill="#1565c0"/>
  <line x1="380" y1="148" x2="416" y2="162" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="2,1"/>
  <circle cx="377" cy="146" r="2" fill="#1565c0"/>
  <!-- Labels -->
  <text x="392" y="150" fill="#c62828" font-size="5" font-family="Arial">яйцекл.</text>
  <text x="425" y="162" fill="#7b1fa2" font-size="5" font-family="Arial">центр.</text>
  <text x="410" y="204" text-anchor="middle" fill="#2e7d32" font-size="7" font-family="Arial">Цветковые растения</text>
  <text x="410" y="214" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">2 спермия: 1→зародыш</text>
  <text x="410" y="223" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">1→эндосперм (3n)</text>
  <!-- Double fertilization detail -->
  <rect x="15" y="235" width="470" height="105" fill="white" fill-opacity="0.7" rx="6" stroke="#2e7d32" stroke-width="1"/>
  <text x="250" y="252" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="bold" font-family="Arial">Двойное оплодотворение у покрытосеменных (С.Г. Навашин)</text>
  <!-- Diagram flow -->
  <!-- Pollen tube -->
  <path d="M30,295 L80,295" fill="none" stroke="#ff8f00" stroke-width="2" stroke-linecap="round"/>
  <path d="M80,295 L130,295" fill="none" stroke="#ff8f00" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="55" y="290" text-anchor="middle" fill="#ff8f00" font-size="6" font-family="Arial">Пыльцевая трубка</text>
  <!-- Two sperm emerge -->
  <circle cx="140" cy="280" r="4" fill="#1565c0" opacity="0.7"/>
  <text x="140" y="272" text-anchor="middle" fill="#1565c0" font-size="5" font-family="Arial">спермий 1</text>
  <circle cx="140" cy="310" r="4" fill="#1565c0" opacity="0.7"/>
  <text x="140" y="322" text-anchor="middle" fill="#1565c0" font-size="5" font-family="Arial">спермий 2</text>
  <!-- Arrows to targets -->
  <line x1="146" y1="280" x2="210" y2="272" stroke="#880e4f" stroke-width="1" marker-end="url(#arr35)"/>
  <line x1="146" y1="310" x2="210" y2="312" stroke="#880e4f" stroke-width="1" marker-end="url(#arr35)"/>
  <!-- Egg cell -->
  <ellipse cx="240" cy="272" rx="25" ry="14" fill="#fff9c4" stroke="#c62828" stroke-width="1"/>
  <circle cx="234" cy="270" r="4" fill="#c62828" opacity="0.4"/>
  <text x="240" y="266" text-anchor="middle" fill="#c62828" font-size="6" font-family="Arial">Яйцеклетка n</text>
  <!-- Central cell -->
  <ellipse cx="240" cy="312" rx="28" ry="14" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="240" y="308" text-anchor="middle" fill="#7b1fa2" font-size="6" font-family="Arial">Центральная</text>
  <text x="240" y="317" text-anchor="middle" fill="#7b1fa2" font-size="6" font-family="Arial">клетка 2n</text>
  <!-- Results -->
  <line x1="268" y1="272" x2="310" y2="272" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr35)"/>
  <line x1="270" y1="312" x2="310" y2="312" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr35)"/>
  <!-- Embryo -->
  <ellipse cx="345" cy="272" rx="28" ry="14" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="345" y="268" text-anchor="middle" fill="#2e7d32" font-size="6" font-weight="bold" font-family="Arial">Зародыш</text>
  <text x="345" y="278" text-anchor="middle" fill="#2e7d32" font-size="7" font-weight="bold" font-family="Arial">2n</text>
  <!-- Endosperm -->
  <ellipse cx="345" cy="312" rx="28" ry="14" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1"/>
  <text x="345" y="308" text-anchor="middle" fill="#7b1fa2" font-size="6" font-weight="bold" font-family="Arial">Эндосперм</text>
  <text x="345" y="318" text-anchor="middle" fill="#7b1fa2" font-size="7" font-weight="bold" font-family="Arial">3n</text>
  <!-- Seed summary -->
  <rect x="390" y="258" width="88" height="76" fill="#fff3e0" stroke="#ff8f00" stroke-width="0.8" rx="4"/>
  <text x="434" y="272" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">Семя</text>
  <text x="400" y="286" fill="#4e342e" font-size="6" font-family="Arial">Зародыш 2n</text>
  <text x="400" y="297" fill="#4e342e" font-size="6" font-family="Arial">Эндосперм 3n</text>
  <text x="400" y="308" fill="#4e342e" font-size="6" font-family="Arial">Семенная кожура</text>
  <text x="400" y="319" fill="#4e342e" font-size="6" font-family="Arial">(из интегументов)</text>
  <text x="400" y="330" fill="#4e342e" font-size="6" font-family="Arial">околоплодник</text>
</svg>