<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle">Цитоплазма. ЭПС и аппарат Гольджи</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 16</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Cell overview with organelles highlighted -->
<g transform="translate(130,190)">
  <!-- Cell outline -->
  <ellipse cx="0" cy="0" rx="95" ry="75" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" opacity="0.5"/>

  <!-- Nucleus -->
  <ellipse cx="10" cy="-10" rx="28" ry="22" fill="#BBDEFB" opacity="0.5" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="10" cy="-10" rx="10" ry="8" fill="#1565C0" opacity="0.3"/>
  <text x="10" y="-7" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" font-weight="bold">Ядро</text>

  <!-- Rough ER (with ribosomes) -->
  <path d="M-60,15 Q-40,10 -20,15 Q0,20 20,15" fill="none" stroke="#795548" stroke-width="2"/>
  <path d="M-55,25 Q-35,20 -15,25 Q5,30 25,25" fill="none" stroke="#795548" stroke-width="2"/>
  <circle cx="-45" cy="12" r="2" fill="#9C27B0"/>
  <circle cx="-25" cy="14" r="2" fill="#9C27B0"/>
  <circle cx="-5" cy="16" r="2" fill="#9C27B0"/>
  <circle cx="15" cy="14" r="2" fill="#9C27B0"/>
  <circle cx="-40" cy="22" r="2" fill="#9C27B0"/>
  <circle cx="-20" cy="24" r="2" fill="#9C27B0"/>
  <circle cx="0" cy="26" r="2" fill="#9C27B0"/>
  <circle cx="20" cy="24" r="2" fill="#9C27B0"/>

  <!-- Smooth ER -->
  <path d="M-65,40 Q-45,35 -25,40 Q-5,45 15,40 Q35,35 50,40" fill="none" stroke="#FF9800" stroke-width="2"/>
  <path d="M-60,50 Q-40,45 -20,50 Q0,55 20,50 Q40,45 55,50" fill="none" stroke="#FF9800" stroke-width="2"/>

  <!-- Golgi apparatus -->
  <g transform="translate(55,-30)">
    <path d="M-15,-12 Q0,-18 15,-12" fill="none" stroke="#E91E63" stroke-width="2.5"/>
    <path d="M-18,-6 Q0,-12 18,-6" fill="none" stroke="#E91E63" stroke-width="2.5"/>
    <path d="M-15,0 Q0,-6 15,0" fill="none" stroke="#E91E63" stroke-width="2.5"/>
    <path d="M-12,6 Q0,0 12,6" fill="none" stroke="#E91E63" stroke-width="2.5"/>
    <!-- Vesicles budding -->
    <circle cx="20" cy="-9" r="4" fill="#E91E63" opacity="0.4" stroke="#C2185B" stroke-width="0.8"/>
    <circle cx="-20" cy="3" r="4" fill="#E91E63" opacity="0.4" stroke="#C2185B" stroke-width="0.8"/>
  </g>

  <!-- Labels with arrows -->
  <line x1="-70" y1="20" x2="-85" y2="5" stroke="#795548" stroke-width="0.8"/>
  <text x="-88" y="0" font-family="Arial,sans-serif" font-size="6" fill="#795548" font-weight="bold">ГрЭПС</text>

  <line x1="-55" y1="45" x2="-75" y2="55" stroke="#FF9800" stroke-width="0.8"/>
  <text x="-85" y="58" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">ГлЭПС</text>

  <line x1="65" y1="-30" x2="80" y2="-45" stroke="#E91E63" stroke-width="0.8"/>
  <text x="80" y="-48" font-family="Arial,sans-serif" font-size="6" fill="#C2185B" font-weight="bold">Комплекс</text>
  <text x="80" y="-40" font-family="Arial,sans-serif" font-size="6" fill="#C2185B" font-weight="bold">Гольджи</text>
</g>

<!-- Rough ER detail -->
<g transform="translate(370,95)">
  <rect x="-65" y="-20" width="130" height="85" rx="5" fill="white" opacity="0.92" stroke="#795548" stroke-width="1"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle" font-weight="bold">Гранулярная ЭПС</text>
  <line x1="-50" y1="0" x2="50" y2="0" stroke="#795548" stroke-width="0.5"/>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Рибосомы на мембранах</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Синтез белков</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Транспорт белков</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Модификация белков</text>
  <text x="0" y="56" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle" font-weight="bold">→ К комплексу Гольджи</text>
</g>

<!-- Smooth ER detail -->
<g transform="translate(370,210)">
  <rect x="-65" y="-20" width="130" height="85" rx="5" fill="white" opacity="0.92" stroke="#FF9800" stroke-width="1"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Гладкая ЭПС</text>
  <line x1="-50" y1="0" x2="50" y2="0" stroke="#FF9800" stroke-width="0.5"/>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Без рибосом</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Синтез липидов</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Детоксикация ядов</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Синтез углеводов</text>
  <text x="0" y="56" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">→ Депо Ca2+</text>
</g>

<!-- Vesicular transport pathway at bottom -->
<g transform="translate(30,305)">
  <rect x="0" y="0" width="440" height="30" rx="5" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="220" y="12" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Путь секреции: Ядро → ЭПС → Комплекс Гольджи → Везикулы → Мембрана (экзоцитоз)</text>
  <text x="220" y="24" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Цитоплазма = гиалоплазма (матрикс) + органоиды + включения | Движение цитоплазмы — циклоз</text>
</g>

<rect x="10" y="338" width="480" height="6" rx="3" fill="#2E7D32" opacity="0.85"/>
</svg>