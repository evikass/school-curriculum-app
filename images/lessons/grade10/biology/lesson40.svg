<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg40" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="50%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <radialGradient id="redFl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>
    <radialGradient id="pinkFl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </radialGradient>
    <radialGradient id="whiteFl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg40)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#880e4f" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#880e4f" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#880e4f"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">Анализирующее скрещивание и неполное доминирование</text>
  <text x="490" y="14" text-anchor="end" fill="#f8bbd0" font-size="8" font-family="Arial">Биология 10 класс — Урок 40</text>
  <!-- LEFT: Test cross -->
  <rect x="15" y="46" width="235" height="175" fill="white" fill-opacity="0.7" rx="5" stroke="#283593" stroke-width="1"/>
  <rect x="15" y="46" width="235" height="16" fill="#283593" rx="5"/>
  <rect x="15" y="56" width="235" height="6" fill="#283593"/>
  <text x="132" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">Анализирующее скрещивание</text>
  <text x="132" y="74" text-anchor="middle" fill="#1a237e" font-size="7" font-family="Arial">Определение генотипа особи с доминантным признаком</text>
  <!-- Case 1: Aa × aa -->
  <text x="25" y="90" fill="#283593" font-size="8" font-weight="bold" font-family="Arial">Случай 1: Гетерозигота</text>
  <text x="25" y="102" fill="#1a237e" font-size="8" font-weight="bold" font-family="Arial">Р:  A_</text>
  <circle cx="82" cy="100" r="8" fill="#fdd835" stroke="#f9a825" stroke-width="0.8"/>
  <text x="82" y="103" text-anchor="middle" fill="#e65100" font-size="6" font-weight="bold" font-family="Arial">Aa</text>
  <text x="100" y="103" fill="#1a237e" font-size="8" font-weight="bold" font-family="Arial">×</text>
  <circle cx="122" cy="100" r="8" fill="#8bc34a" stroke="#558b2f" stroke-width="0.8"/>
  <text x="122" y="103" text-anchor="middle" fill="#1b5e20" font-size="6" font-weight="bold" font-family="Arial">aa</text>
  <!-- Gametes -->
  <text x="25" y="116" fill="#4a148c" font-size="6" font-weight="bold" font-family="Arial">G:</text>
  <circle cx="58" cy="114" r="4" fill="#fff9c4" stroke="#f9a825" stroke-width="0.5"/>
  <text x="58" y="117" text-anchor="middle" fill="#e65100" font-size="5" font-family="Arial">A</text>
  <circle cx="75" cy="114" r="4" fill="#c8e6c9" stroke="#558b2f" stroke-width="0.5"/>
  <text x="75" y="117" text-anchor="middle" fill="#1b5e20" font-size="5" font-family="Arial">a</text>
  <circle cx="112" cy="114" r="4" fill="#c8e6c9" stroke="#558b2f" stroke-width="0.5"/>
  <text x="112" y="117" text-anchor="middle" fill="#1b5e20" font-size="5" font-family="Arial">a</text>
  <!-- Punnett square -->
  <rect x="35" y="122" width="35" height="14" fill="#e8eaf6" stroke="#283593" stroke-width="0.3"/>
  <rect x="70" y="122" width="35" height="14" fill="#c8e6c9" stroke="#283593" stroke-width="0.3"/>
  <text x="52" y="132" text-anchor="middle" fill="#1a237e" font-size="5" font-family="Arial"></text>
  <text x="87" y="132" text-anchor="middle" fill="#1b5e20" font-size="6" font-weight="bold" font-family="Arial">a</text>
  <rect x="35" y="136" width="35" height="14" fill="#fff9c4" stroke="#283593" stroke-width="0.3"/>
  <text x="52" y="146" text-anchor="middle" fill="#e65100" font-size="6" font-weight="bold" font-family="Arial">A</text>
  <rect x="70" y="136" width="35" height="14" fill="#fdd835" fill-opacity="0.4" stroke="#283593" stroke-width="0.3"/>
  <text x="87" y="146" text-anchor="middle" fill="#e65100" font-size="6" font-weight="bold" font-family="Arial">Aa</text>
  <rect x="35" y="150" width="35" height="14" fill="#c8e6c9" stroke="#283593" stroke-width="0.3"/>
  <text x="52" y="160" text-anchor="middle" fill="#1b5e20" font-size="6" font-weight="bold" font-family="Arial">a</text>
  <rect x="70" y="150" width="35" height="14" fill="#8bc34a" fill-opacity="0.5" stroke="#283593" stroke-width="0.3"/>
  <text x="87" y="160" text-anchor="middle" fill="#1b5e20" font-size="6" font-weight="bold" font-family="Arial">aa</text>
  <!-- Result -->
  <text x="120" y="138" fill="#c62828" font-size="7" font-weight="bold" font-family="Arial">F: 1 Aa : 1 aa</text>
  <text x="120" y="150" fill="#c62828" font-size="8" font-weight="bold" font-family="Arial">1 : 1</text>
  <text x="120" y="162" fill="#4e342e" font-size="6" font-family="Arial">50% доминант.</text>
  <text x="120" y="170" fill="#4e342e" font-size="6" font-family="Arial">50% рецессивн.</text>
  <!-- Case 2: AA × aa -->
  <line x1="25" y1="178" x2="240" y2="178" stroke="#283593" stroke-width="0.3"/>
  <text x="25" y="190" fill="#283593" font-size="8" font-weight="bold" font-family="Arial">Случай 2: Гомозигота</text>
  <text x="25" y="202" fill="#1a237e" font-size="8" font-weight="bold" font-family="Arial">Р:  AA</text>
  <circle cx="72" cy="200" r="8" fill="#fdd835" stroke="#f9a825" stroke-width="0.8"/>
  <text x="72" y="203" text-anchor="middle" fill="#e65100" font-size="6" font-weight="bold" font-family="Arial">AA</text>
  <text x="90" y="203" fill="#1a237e" font-size="8" font-weight="bold" font-family="Arial">×</text>
  <circle cx="112" cy="200" r="8" fill="#8bc34a" stroke="#558b2f" stroke-width="0.8"/>
  <text x="112" y="203" text-anchor="middle" fill="#1b5e20" font-size="6" font-weight="bold" font-family="Arial">aa</text>
  <text x="130" y="203" fill="#c62828" font-size="8" font-weight="bold" font-family="Arial">→ F: 100% Aa</text>
  <text x="130" y="215" fill="#2e7d32" font-size="7" font-weight="bold" font-family="Arial">Все единообразны!</text>
  <!-- RIGHT: Incomplete dominance -->
  <rect x="260" y="46" width="225" height="175" fill="white" fill-opacity="0.7" rx="5" stroke="#880e4f" stroke-width="1"/>
  <rect x="260" y="46" width="225" height="16" fill="#880e4f" rx="5"/>
  <rect x="260" y="56" width="225" height="6" fill="#880e4f"/>
  <text x="372" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">Неполное доминирование</text>
  <text x="372" y="74" text-anchor="middle" fill="#880e4f" font-size="7" font-family="Arial">Промежуточный фенотип у гетерозигот</text>
  <!-- Snapdragon flowers -->
  <!-- Red flower RR -->
  <circle cx="295" cy="95" r="14" fill="url(#redFl)" stroke="#c62828" stroke-width="1"/>
  <circle cx="295" cy="95" r="4" fill="#ffeb3b" opacity="0.5"/>
  <text x="295" y="117" text-anchor="middle" fill="#c62828" font-size="7" font-weight="bold" font-family="Arial">RR</text>
  <text x="295" y="126" text-anchor="middle" fill="#c62828" font-size="6" font-family="Arial">красная</text>
  <!-- × -->
  <text x="325" y="98" text-anchor="middle" fill="#880e4f" font-size="14" font-weight="bold" font-family="Arial">×</text>
  <!-- White flower rr -->
  <circle cx="355" cy="95" r="14" fill="url(#whiteFl)" stroke="#9e9e9e" stroke-width="1"/>
  <circle cx="355" cy="95" r="4" fill="#ffeb3b" opacity="0.3"/>
  <text x="355" y="117" text-anchor="middle" fill="#757575" font-size="7" font-weight="bold" font-family="Arial">rr</text>
  <text x="355" y="126" text-anchor="middle" fill="#757575" font-size="6" font-family="Arial">белая</text>
  <!-- Arrow -->
  <text x="380" y="98" fill="#880e4f" font-size="10" font-family="Arial">→</text>
  <!-- Pink flower Rr (F1) -->
  <circle cx="425" cy="95" r="14" fill="url(#pinkFl)" stroke="#e91e63" stroke-width="1"/>
  <circle cx="425" cy="95" r="4" fill="#ffeb3b" opacity="0.4"/>
  <text x="425" y="117" text-anchor="middle" fill="#880e4f" font-size="7" font-weight="bold" font-family="Arial">Rr</text>
  <text x="425" y="126" text-anchor="middle" fill="#880e4f" font-size="6" font-family="Arial">розовая</text>
  <!-- F2 from Rr × Rr -->
  <text x="275" y="140" fill="#880e4f" font-size="7" font-weight="bold" font-family="Arial">F1: Rr × Rr → F2:</text>
  <!-- Punnett square -->
  <rect x="275" y="145" width="30" height="14" fill="#ffcdd2" stroke="#880e4f" stroke-width="0.3"/>
  <rect x="305" y="145" width="30" height="14" fill="#fce4ec" stroke="#880e4f" stroke-width="0.3"/>
  <text x="290" y="155" text-anchor="middle" fill="#880e4f" font-size="5"></text>
  <text x="320" y="155" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">R</text>
  <rect x="275" y="159" width="30" height="14" fill="#fce4ec" stroke="#880e4f" stroke-width="0.3"/>
  <text x="290" y="169" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">R</text>
  <rect x="305" y="159" width="30" height="14" fill="#ffcdd2" stroke="#880e4f" stroke-width="0.3"/>
  <text x="320" y="169" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">RR</text>
  <rect x="275" y="173" width="30" height="14" fill="#f8bbd0" stroke="#880e4f" stroke-width="0.3"/>
  <text x="290" y="183" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">r</text>
  <rect x="305" y="173" width="30" height="14" fill="#f48fb1" fill-opacity="0.4" stroke="#880e4f" stroke-width="0.3"/>
  <text x="320" y="183" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">Rr</text>
  <!-- Second column -->
  <rect x="335" y="145" width="30" height="14" fill="#f8bbd0" stroke="#880e4f" stroke-width="0.3"/>
  <text x="350" y="155" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">r</text>
  <rect x="335" y="159" width="30" height="14" fill="#f48fb1" fill-opacity="0.4" stroke="#880e4f" stroke-width="0.3"/>
  <text x="350" y="169" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">Rr</text>
  <rect x="335" y="173" width="30" height="14" fill="#e0e0e0" fill-opacity="0.5" stroke="#880e4f" stroke-width="0.3"/>
  <text x="350" y="183" text-anchor="middle" fill="#880e4f" font-size="6" font-weight="bold" font-family="Arial">rr</text>
  <!-- F2 results -->
  <text x="380" y="155" fill="#c62828" font-size="6" font-weight="bold" font-family="Arial">1 RR</text>
  <text x="380" y="167" fill="#e91e63" font-size="6" font-weight="bold" font-family="Arial">2 Rr</text>
  <text x="380" y="179" fill="#757575" font-size="6" font-weight="bold" font-family="Arial">1 rr</text>
  <!-- F2 flowers -->
  <circle cx="430" cy="152" r="6" fill="#c62828" stroke="#b71c1c" stroke-width="0.5"/>
  <text x="440" y="155" fill="#c62828" font-size="5" font-family="Arial">красная</text>
  <circle cx="430" cy="166" r="6" fill="#f48fb1" stroke="#e91e63" stroke-width="0.5"/>
  <text x="440" y="169" fill="#e91e63" font-size="5" font-family="Arial">розовая</text>
  <circle cx="430" cy="180" r="6" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="0.5"/>
  <text x="440" y="183" fill="#757575" font-size="5" font-family="Arial">белая</text>
  <!-- Ratio highlight -->
  <rect x="375" y="190" width="100" height="20" fill="#880e4f" fill-opacity="0.1" rx="3" stroke="#880e4f" stroke-width="0.5"/>
  <text x="425" y="204" text-anchor="middle" fill="#880e4f" font-size="9" font-weight="bold" font-family="Arial">1 : 2 : 1</text>
  <!-- Bottom summary -->
  <rect x="15" y="228" width="470" height="112" fill="white" fill-opacity="0.7" rx="5" stroke="#880e4f" stroke-width="1"/>
  <text x="250" y="244" text-anchor="middle" fill="#880e4f" font-size="10" font-weight="bold" font-family="Arial">Сравнение: полное и неполное доминирование</text>
  <!-- Table headers -->
  <line x1="15" y1="250" x2="485" y2="250" stroke="#880e4f" stroke-width="0.5"/>
  <line x1="170" y1="250" x2="170" y2="335" stroke="#880e4f" stroke-width="0.3"/>
  <line x1="327" y1="250" x2="327" y2="335" stroke="#880e4f" stroke-width="0.3"/>
  <text x="92" y="262" text-anchor="middle" fill="#880e4f" font-size="7" font-weight="bold" font-family="Arial">Признак</text>
  <text x="248" y="262" text-anchor="middle" fill="#283593" font-size="7" font-weight="bold" font-family="Arial">Полное доминирование</text>
  <text x="406" y="262" text-anchor="middle" fill="#880e4f" font-size="7" font-weight="bold" font-family="Arial">Неполное доминирование</text>
  <line x1="15" y1="266" x2="485" y2="266" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 1 -->
  <text x="25" y="278" fill="#4e342e" font-size="7" font-family="Arial">Фенотип Aa</text>
  <text x="180" y="278" fill="#4e342e" font-size="7" font-family="Arial">Как у AA (доминантный)</text>
  <text x="337" y="278" fill="#4e342e" font-size="7" font-family="Arial">Промежуточный (средний)</text>
  <line x1="15" y1="284" x2="485" y2="284" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 2 -->
  <text x="25" y="296" fill="#4e342e" font-size="7" font-family="Arial">F2 по генотипу</text>
  <text x="180" y="296" fill="#4e342e" font-size="7" font-family="Arial">1AA : 2Aa : 1aa</text>
  <text x="337" y="296" fill="#4e342e" font-size="7" font-family="Arial">1RR : 2Rr : 1rr</text>
  <line x1="15" y1="302" x2="485" y2="302" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 3 -->
  <text x="25" y="314" fill="#4e342e" font-size="7" font-family="Arial">F2 по фенотипу</text>
  <text x="180" y="314" fill="#c62828" font-size="7" font-weight="bold" font-family="Arial">3 : 1 (2 класса)</text>
  <text x="337" y="314" fill="#880e4f" font-size="7" font-weight="bold" font-family="Arial">1 : 2 : 1 (3 класса)</text>
  <line x1="15" y1="320" x2="485" y2="320" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 4 -->
  <text x="25" y="332" fill="#4e342e" font-size="7" font-family="Arial">Пример</text>
  <text x="180" y="332" fill="#4e342e" font-size="7" font-family="Arial">Горох: жёлтые/зелёные</text>
  <text x="337" y="332" fill="#4e342e" font-size="7" font-family="Arial">Львиный зев: красн./бел./роз.</text>
</svg>