<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#CE93D8"/></linearGradient>
  <linearGradient id="riboGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#AB47BC"/><stop offset="100%" stop-color="#7B1FA2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#7B1FA2"/>
<rect x="3" y="30" width="494" height="11" fill="#7B1FA2"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Биосинтез белка: трансляция</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle">Биология 10 класс — Урок 30</text>

<!-- Location -->
<rect x="175" y="55" width="150" height="16" rx="4" fill="#AB47BC" opacity="0.3"/>
<text x="250" y="66" font-family="Arial,sans-serif" font-size="8" fill="#6A1B9A" text-anchor="middle">Цитоплазма — на рибосомах</text>

<!-- mRNA strand (horizontal through ribosome) -->
<rect x="20" y="178" width="460" height="8" rx="4" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
<text x="25" y="175" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">5' мРНК</text>
<text x="470" y="175" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">3'</text>

<!-- Codon labels on mRNA -->
<rect x="95" y="179" width="30" height="6" rx="1" fill="#A5D6A7"/>
<rect x="128" y="179" width="30" height="6" rx="1" fill="#C8E6C9"/>
<rect x="161" y="179" width="30" height="6" rx="1" fill="#A5D6A7"/>
<rect x="194" y="179" width="30" height="6" rx="1" fill="#C8E6C9"/>
<rect x="227" y="179" width="30" height="6" rx="1" fill="#A5D6A7"/>
<rect x="260" y="179" width="30" height="6" rx="1" fill="#C8E6C9"/>
<rect x="293" y="179" width="30" height="6" rx="1" fill="#A5D6A7"/>
<rect x="326" y="179" width="30" height="6" rx="1" fill="#C8E6C9"/>
<rect x="359" y="179" width="30" height="6" rx="1" fill="#FFCDD2"/>

<!-- RIBOSOME (large oval) -->
<!-- Small subunit (bottom) -->
<ellipse cx="250" cy="188" rx="75" ry="18" fill="#CE93D8" stroke="#7B1FA2" stroke-width="2"/>
<text x="250" y="191" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle">Малая субъединица (30S)</text>

<!-- Large subunit (top) -->
<ellipse cx="250" cy="148" rx="70" ry="30" fill="url(#riboGrad)" stroke="#4A148C" stroke-width="2"/>
<text x="250" y="145" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">Большая субъединица</text>
<text x="250" y="156" font-family="Arial,sans-serif" font-size="7" fill="#E1BEE7" text-anchor="middle">(50S)</text>

<!-- THREE SITES: A, P, E -->
<!-- E site (exit) - left -->
<rect x="190" y="133" width="28" height="24" rx="4" fill="#FF8A65" stroke="#BF360C" stroke-width="1.5"/>
<text x="204" y="148" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">E</text>
<text x="204" y="128" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle">Выход</text>

<!-- P site (peptidyl) - center -->
<rect x="222" y="133" width="28" height="24" rx="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
<text x="236" y="148" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">P</text>
<text x="236" y="128" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Пептидил</text>

<!-- A site (aminoacyl) - right -->
<rect x="254" y="133" width="28" height="24" rx="4" fill="#42A5F5" stroke="#0D47A1" stroke-width="1.5"/>
<text x="268" y="148" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">A</text>
<text x="268" y="128" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle">Аминоацил</text>

<!-- tRNA in A site (incoming) -->
<path d="M268,110 L268,80 L262,70 L268,75 L274,70 L268,80" stroke="#FF6F00" stroke-width="2" fill="#FFB74D"/>
<!-- Anticodon at bottom -->
<rect x="258" y="108" width="20" height="10" rx="2" fill="#FFF176" stroke="#F9A825" stroke-width="1"/>
<text x="268" y="116" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">АКК</text>
<!-- Amino acid at top -->
<circle cx="268" cy="67" r="8" fill="#EF5350" stroke="#B71C1C" stroke-width="1.5"/>
<text x="268" y="70" font-family="Arial,sans-serif" font-size="6" fill="#fff" text-anchor="middle">АК</text>
<text x="290" y="67" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Аминокислота</text>
<text x="290" y="77" font-family="Arial,sans-serif" font-size="6" fill="#FF6F00">тРНК с антикодоном</text>

<!-- tRNA in P site (with growing chain) -->
<path d="M236,110 L236,85 L230,75 L236,80 L242,75 L236,85" stroke="#2E7D32" stroke-width="2" fill="#81C784"/>
<rect x="226" y="108" width="20" height="10" rx="2" fill="#FFF176" stroke="#F9A825" stroke-width="1"/>
<text x="236" y="116" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">АКК</text>

<!-- Growing polypeptide chain (from P site) -->
<path d="M236,60 L236,67" stroke="#2E7D32" stroke-width="2"/>
<circle cx="236" cy="55" r="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
<circle cx="222" cy="48" r="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
<circle cx="208" cy="48" r="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
<circle cx="194" cy="48" r="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
<!-- Peptide bonds -->
<line x1="232" y1="53" x2="226" y2="50" stroke="#1B5E20" stroke-width="1.5"/>
<line x1="218" y1="48" x2="212" y2="48" stroke="#1B5E20" stroke-width="1.5"/>
<line x1="204" y1="48" x2="198" y2="48" stroke="#1B5E20" stroke-width="1.5"/>
<text x="194" y="40" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Растущий полипептид</text>

<!-- Peptide bond forming (dashed line between A and P amino acids) -->
<line x1="262" y1="67" x2="242" y2="58" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="256" y="58" font-family="Arial,sans-serif" font-size="6" fill="#FF5722">Пептидная связь</text>

<!-- tRNA leaving E site -->
<path d="M204,110 L190,105 L185,95" stroke="#BF360C" stroke-width="1.5" fill="none" marker-end="url(#arrR5)"/>
<defs><marker id="arrR5" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#BF360C"/></marker></defs>
<path d="M185,90 L185,80 L179,70 L185,75 L191,70 L185,80" stroke="#BF360C" stroke-width="1.5" fill="none" opacity="0.5"/>
<text x="165" y="88" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">тРНК без АК</text>

<!-- Movement direction arrow -->
<path d="M300,190 Q320,192 320,200 Q320,208 300,206" stroke="#7B1FA2" stroke-width="1.5" fill="none"/>
<text x="330" y="200" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">Движение</text>
<text x="330" y="210" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">рибосомы</text>
<text x="330" y="220" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">5'→3'</text>

<!-- THREE PHASES (bottom section) -->
<text x="250" y="225" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A148C" text-anchor="middle">Фазы трансляции</text>

<!-- Initiation -->
<rect x="20" y="232" width="145" height="55" rx="8" fill="#42A5F5" stroke="#0D47A1" stroke-width="1.5"/>
<text x="92" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">Инициация</text>
<text x="92" y="260" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">АУГ — старт-кодон</text>
<text x="92" y="270" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Метионин (Met) — первая АК</text>
<text x="92" y="280" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Сборка рибосомы на мРНК</text>

<!-- Elongation -->
<rect x="175" y="232" width="150" height="55" rx="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
<text x="250" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">Элонгация</text>
<text x="250" y="260" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">тРНК приносит АК в A-сайт</text>
<text x="250" y="270" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Пептидная связь между АК</text>
<text x="250" y="280" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Транслокация: A→P→E</text>

<!-- Termination -->
<rect x="335" y="232" width="145" height="55" rx="8" fill="#EF5350" stroke="#B71C1C" stroke-width="1.5"/>
<text x="407" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">Терминация</text>
<text x="407" y="260" font-family="Arial,sans-serif" font-size="7" fill="#FFCDD2" text-anchor="middle">Стоп-кодоны: УАА, УАГ, УГА</text>
<text x="407" y="270" font-family="Arial,sans-serif" font-size="7" fill="#FFCDD2" text-anchor="middle">Факторы освобождения</text>
<text x="407" y="280" font-family="Arial,sans-serif" font-size="7" fill="#FFCDD2" text-anchor="middle">Белок освобождён!</text>

<!-- Summary box -->
<rect x="15" y="296" width="470" height="42" rx="6" fill="#4A148C"/>
<text x="250" y="311" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#FFEB3B" text-anchor="middle">Трансляция: мРНК → белок (полипептид)</text>
<text x="250" y="324" font-family="Arial,sans-serif" font-size="7" fill="#E1BEE7" text-anchor="middle">1 кодон (3 нуклеотида) = 1 аминокислота | Антикодон тРНК комплементарен кодону мРНК</text>
<text x="250" y="334" font-family="Arial,sans-serif" font-size="7" fill="#CE93D8" text-anchor="middle">Генетический код: 64 кодона → 20 аминокислот | Код вырожден (несколько кодонов → 1 АК), универсален</text>
</svg>