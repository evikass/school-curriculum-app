<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пластиды и рибосомы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 18</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Three types of plastids -->
<!-- Chloroplast -->
<g transform="translate(90,150)">
  <rect x="-70" y="-70" width="140" height="155" rx="6" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">ХЛОРОПЛАСТ</text>
  <line x1="-55" y1="-47" x2="55" y2="-47" stroke="#4CAF50" stroke-width="0.5"/>

  <!-- Chloroplast shape -->
  <ellipse cx="0" cy="0" rx="45" ry="25" fill="#4CAF50" opacity="0.15" stroke="#2E7D32" stroke-width="2"/>

  <!-- Outer membrane -->
  <ellipse cx="0" cy="0" rx="45" ry="25" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Inner membrane -->
  <ellipse cx="0" cy="0" rx="40" ry="21" fill="none" stroke="#388E3C" stroke-width="0.8" stroke-dasharray="2,1"/>

  <!-- Granum (stack of thylakoids) -->
  <g transform="translate(-15,0)">
    <rect x="-12" y="-12" width="24" height="5" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
    <rect x="-12" y="-5" width="24" height="5" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
    <rect x="-12" y="2" width="24" height="5" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
    <rect x="-12" y="9" width="24" height="5" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="0" y="22" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Грана</text>
  </g>

  <!-- Lamella connecting grana -->
  <path d="M10,0 Q20,-5 30,0" fill="none" stroke="#4CAF50" stroke-width="1"/>

  <!-- Second granum -->
  <g transform="translate(30,0)">
    <rect x="-8" y="-8" width="16" height="4" rx="1.5" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
    <rect x="-8" y="-3" width="16" height="4" rx="1.5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
    <rect x="-8" y="2" width="16" height="4" rx="1.5" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
  </g>

  <!-- Stroma label -->
  <text x="-35" y="-15" font-family="Arial,sans-serif" font-size="5" fill="#388E3C">Строма</text>

  <!-- DNA, ribosomes -->
  <ellipse cx="35" cy="15" rx="5" ry="3" fill="#1565C0" opacity="0.3"/>
  <text x="35" y="25" font-family="Arial,sans-serif" font-size="4" fill="#0D47A1" text-anchor="middle">ДНК</text>

  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Фотосинтез</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">2 мембраны, хлорофилл</text>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Зелёные части растений</text>
  <text x="0" y="72" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">CO2 + H2O → C6H12O6 + O2</text>
</g>

<!-- Chromoplast -->
<g transform="translate(250,150)">
  <rect x="-55" y="-70" width="110" height="155" rx="6" fill="white" opacity="0.92" stroke="#FF9800" stroke-width="1.2"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">ХРОМОПЛАСТ</text>
  <line x1="-40" y1="-47" x2="40" y2="-47" stroke="#FF9800" stroke-width="0.5"/>

  <!-- Chromoplast shape -->
  <ellipse cx="0" cy="0" rx="35" ry="25" fill="#FF9800" opacity="0.15" stroke="#E65100" stroke-width="2"/>

  <!-- Carotenoid crystals inside -->
  <polygon points="-10,-10 0,-18 10,-10 5,0 -5,0" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
  <polygon points="5,0 15,-8 20,2 12,10" fill="#FFB74D" opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="-15" cy="5" r="4" fill="#FF9800" opacity="0.3"/>
  <circle cx="8" cy="15" r="3" fill="#FFB74D" opacity="0.3"/>

  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Каротиноиды</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Жёлтые, оранжевые</text>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Цветы, плоды, осенние</text>
  <text x="0" y="70" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">листья</text>
</g>

<!-- Leukoplast -->
<g transform="translate(385,150)">
  <rect x="-55" y="-70" width="110" height="155" rx="6" fill="white" opacity="0.92" stroke="#9E9E9E" stroke-width="1.2"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="9" fill="#424242" text-anchor="middle" font-weight="bold">ЛЕЙКОПЛАСТ</text>
  <line x1="-40" y1="-47" x2="40" y2="-47" stroke="#9E9E9E" stroke-width="0.5"/>

  <!-- Leukoplast shape -->
  <ellipse cx="0" cy="0" rx="30" ry="22" fill="#E0E0E0" opacity="0.3" stroke="#9E9E9E" stroke-width="2"/>

  <!-- Starch grains inside -->
  <ellipse cx="-8" cy="-5" rx="8" ry="5" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.8"/>
  <ellipse cx="5" cy="5" rx="6" ry="4" fill="#EEEEEE" stroke="#BDBDBD" stroke-width="0.8"/>
  <ellipse cx="-5" cy="8" rx="5" ry="3" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.6"/>

  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#424242" text-anchor="middle" font-weight="bold">Запас крахмала</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Бесцветные</text>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Клубни, корнеплоды,</text>
  <text x="0" y="70" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">семена</text>
</g>

<!-- Ribosomes -->
<g transform="translate(30,300)">
  <rect x="0" y="0" width="440" height="35" rx="5" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="220" y="13" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">РИБОСОМЫ — место синтеза белка</text>
  <text x="110" y="27" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2">Прокариоты: 70S (30S + 50S)</text>
  <text x="330" y="27" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2">Эукариоты: 80S (40S + 60S)</text>
</g>

<rect x="10" y="338" width="480" height="6" rx="3" fill="#2E7D32" opacity="0.85"/>
</svg>