<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg58" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#0d2b0d"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg58)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#43a047" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#2e7d32" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#e8f5e9" font-size="11" font-weight="bold" font-family="Arial">Экосистема. Биогеоценоз — Биология 10 класс — Урок 58</text>

  <!-- Ecosystem structure - left -->
  <rect x="8" y="48" width="175" height="165" fill="#0d2b0d" stroke="#43a047" stroke-width="1" rx="4"/>
  <text x="95" y="62" text-anchor="middle" fill="#a5d6a7" font-size="7.5" font-weight="bold" font-family="Arial">Структура экосистемы</text>

  <!-- Producers -->
  <rect x="16" y="70" width="159" height="30" fill="#1b5e20" stroke="#66bb6a" stroke-width="0.8" rx="3"/>
  <circle cx="30" cy="85" r="8" fill="#4caf50" opacity="0.5"/>
  <text x="30" y="88" text-anchor="middle" fill="#fff" font-size="6" font-weight="bold" font-family="Arial">🌿</text>
  <text x="100" y="82" text-anchor="middle" fill="#c8e6c9" font-size="7" font-weight="bold" font-family="Arial">ПРОДУЦЕНТЫ</text>
  <text x="100" y="92" text-anchor="middle" fill="#81c784" font-size="5.5" font-family="Arial">Растения, автотрофы (фотосинтез)</text>
  <line x1="95" y1="100" x2="95" y2="105" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arr58)"/>

  <!-- Consumers 1 -->
  <rect x="16" y="105" width="159" height="30" fill="#1a237e" stroke="#5c6bc0" stroke-width="0.8" rx="3"/>
  <text x="100" y="117" text-anchor="middle" fill="#c5cae9" font-size="7" font-weight="bold" font-family="Arial">КОНСУМЕНТЫ I порядка</text>
  <text x="100" y="127" text-anchor="middle" fill="#9fa8da" font-size="5.5" font-family="Arial">Травоядные (заяц, олень)</text>
  <line x1="95" y1="135" x2="95" y2="140" stroke="#5c6bc0" stroke-width="1.5"/>

  <!-- Consumers 2 -->
  <rect x="16" y="140" width="159" height="30" fill="#4a148c" stroke="#ab47bc" stroke-width="0.8" rx="3"/>
  <text x="100" y="152" text-anchor="middle" fill="#e1bee7" font-size="7" font-weight="bold" font-family="Arial">КОНСУМЕНТЫ II порядка</text>
  <text x="100" y="162" text-anchor="middle" fill="#ce93d8" font-size="5.5" font-family="Arial">Хищники (лиса, волк)</text>
  <line x1="95" y1="170" x2="95" y2="175" stroke="#ab47bc" stroke-width="1.5"/>

  <!-- Decomposers -->
  <rect x="16" y="175" width="159" height="30" fill="#3e2723" stroke="#a1887f" stroke-width="0.8" rx="3"/>
  <text x="100" y="187" text-anchor="middle" fill="#efebe9" font-size="7" font-weight="bold" font-family="Arial">РЕДУЦЕНТЫ</text>
  <text x="100" y="197" text-anchor="middle" fill="#bcaaa4" font-size="5.5" font-family="Arial">Грибы, бактерии (разложение)</text>
  <defs><marker id="arr58" markerWidth="5" markerHeight="5" refX="3" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#66bb6a"/></marker></defs>

  <!-- Recycling arrow back to producers -->
  <path d="M16,190 Q8,190 8,150 Q8,80 16,75" stroke="#8d6e63" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arr58b)"/>
  <defs><marker id="arr58b" markerWidth="5" markerHeight="5" refX="3" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#8d6e63"/></marker></defs>
  <text x="5" y="132" fill="#bcaaa4" font-size="4" font-family="Arial" transform="rotate(-90,5,132)">Минеральные вещества</text>

  <!-- Food chain - right top -->
  <rect x="190" y="48" width="302" height="72" fill="#0d1a0d" stroke="#43a047" stroke-width="1" rx="4"/>
  <text x="341" y="62" text-anchor="middle" fill="#a5d6a7" font-size="7.5" font-weight="bold" font-family="Arial">Цепь питания</text>
  
  <!-- Grass -->
  <path d="M210,100 L210,80 M206,88 L210,82 L214,88" stroke="#4caf50" stroke-width="1" fill="none"/>
  <path d="M218,100 L218,83" stroke="#66bb6a" stroke-width="0.8"/>
  <text x="213" y="110" text-anchor="middle" fill="#81c784" font-size="5.5" font-family="Arial">Трава</text>
  
  <!-- Arrow -->
  <line x1="232" y1="90" x2="255" y2="90" stroke="#66bb6a" stroke-width="1" marker-end="url(#arr58)"/>
  
  <!-- Rabbit -->
  <ellipse cx="275" cy="87" rx="10" ry="7" fill="#d7ccc8" stroke="#bcaaa4" stroke-width="0.5"/>
  <ellipse cx="268" cy="80" rx="4" ry="6" fill="#d7ccc8" stroke="#bcaaa4" stroke-width="0.5"/>
  <circle cx="272" cy="86" r="1.5" fill="#3e2723"/>
  <text x="275" y="110" text-anchor="middle" fill="#c5cae9" font-size="5.5" font-family="Arial">Заяц</text>
  
  <!-- Arrow -->
  <line x1="290" y1="90" x2="315" y2="90" stroke="#7986cb" stroke-width="1"/>
  
  <!-- Fox -->
  <ellipse cx="335" cy="87" rx="12" ry="8" fill="#ff8a65" stroke="#e64a19" stroke-width="0.5"/>
  <path d="M326,84 L322,80 L324,86" fill="#ff8a65"/>
  <circle cx="330" cy="85" r="1.5" fill="#3e2723"/>
  <path d="M347,87 L353,83 L351,91 Z" fill="#fff"/>
  <text x="335" y="110" text-anchor="middle" fill="#ce93d8" font-size="5.5" font-family="Arial">Лиса</text>
  
  <!-- Arrow -->
  <line x1="350" y1="90" x2="380" y2="90" stroke="#ab47bc" stroke-width="1"/>
  
  <!-- Eagle -->
  <path d="M395,82 Q405,75 415,80 Q425,75 435,82 Q425,84 415,82 Q405,84 395,82 Z" fill="#795548" stroke="#5d4037" stroke-width="0.5"/>
  <circle cx="403" cy="80" r="1.5" fill="#ffeb3b"/>
  <circle cx="427" cy="80" r="1.5" fill="#ffeb3b"/>
  <text x="415" y="110" text-anchor="middle" fill="#e1bee7" font-size="5.5" font-family="Arial">Орёл</text>

  <!-- Energy flow diagram -->
  <rect x="190" y="126" width="302" height="87" fill="#0d1a0d" stroke="#ff9800" stroke-width="1" rx="4"/>
  <text x="341" y="140" text-anchor="middle" fill="#ffcc80" font-size="7.5" font-weight="bold" font-family="Arial">Поток энергии в экосистеме</text>
  
  <!-- Sun -->
  <circle cx="210" cy="165" r="10" fill="#ffeb3b" opacity="0.4"/>
  <circle cx="210" cy="165" r="6" fill="#fff176"/>
  <text x="210" y="182" text-anchor="middle" fill="#fff176" font-size="5" font-family="Arial">Солнце</text>
  
  <!-- Arrow to producers -->
  <line x1="225" y1="165" x2="250" y2="165" stroke="#ffeb3b" stroke-width="1.2" marker-end="url(#arrE)"/>
  <defs><marker id="arrE" markerWidth="5" markerHeight="5" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#ffeb3b"/></marker></defs>
  
  <!-- Producers box -->
  <rect x="255" y="155" width="45" height="20" fill="#2e7d32" stroke="#66bb6a" stroke-width="0.8" rx="2"/>
  <text x="277" y="168" text-anchor="middle" fill="#e8f5e9" font-size="5.5" font-family="Arial">Продуценты</text>
  
  <!-- Arrow -->
  <line x1="305" y1="165" x2="325" y2="165" stroke="#66bb6a" stroke-width="1" marker-end="url(#arrE2)"/>
  <defs><marker id="arrE2" markerWidth="5" markerHeight="5" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#66bb6a"/></marker></defs>
  <text x="315" y="160" text-anchor="middle" fill="#81c784" font-size="4" font-family="Arial">~10%</text>
  
  <!-- Consumers box -->
  <rect x="330" y="155" width="45" height="20" fill="#4a148c" stroke="#ab47bc" stroke-width="0.8" rx="2"/>
  <text x="352" y="168" text-anchor="middle" fill="#f3e5f5" font-size="5.5" font-family="Arial">Консументы</text>
  
  <!-- Arrow -->
  <line x1="380" y1="165" x2="400" y2="165" stroke="#ab47bc" stroke-width="1"/>
  <text x="390" y="160" text-anchor="middle" fill="#ce93d8" font-size="4" font-family="Arial">~10%</text>
  
  <!-- Decomposers box -->
  <rect x="405" y="155" width="50" height="20" fill="#3e2723" stroke="#a1887f" stroke-width="0.8" rx="2"/>
  <text x="430" y="168" text-anchor="middle" fill="#efebe9" font-size="5.5" font-family="Arial">Редуценты</text>
  
  <!-- Heat output -->
  <text x="460" y="165" fill="#ff7043" font-size="5" font-family="Arial">→ Тепло</text>
  
  <!-- Energy loss arrows going down -->
  <text x="277" y="183" text-anchor="middle" fill="#ff8a65" font-size="4" font-family="Arial">↓ ~90% выделяется</text>
  <text x="352" y="183" text-anchor="middle" fill="#ff8a65" font-size="4" font-family="Arial">↓ в виде тепла</text>
  <text x="430" y="183" text-anchor="middle" fill="#ff8a65" font-size="4" font-family="Arial">↓ минерализация</text>
  
  <text x="341" y="205" text-anchor="middle" fill="#ffcc80" font-size="5.5" font-family="Arial">Правило 10%: каждый трофический уровень передаёт ~10% энергии</text>

  <!-- Pyramid of biomass -->
  <rect x="8" y="220" width="175" height="62" fill="#0d1a0d" stroke="#43a047" stroke-width="1" rx="4"/>
  <text x="95" y="234" text-anchor="middle" fill="#a5d6a7" font-size="7" font-weight="bold" font-family="Arial">Пирамида биомассы</text>
  
  <!-- Pyramid levels -->
  <path d="M40,275 L150,275 L150,270 L40,270 Z" fill="#2e7d32" stroke="#43a047" stroke-width="0.5"/>
  <text x="95" y="274" text-anchor="middle" fill="#e8f5e9" font-size="5" font-family="Arial">Продуценты</text>
  
  <path d="M55,267 L135,267 L135,262 L55,262 Z" fill="#4a148c" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="95" y="266" text-anchor="middle" fill="#f3e5f5" font-size="5" font-family="Arial">Консументы I</text>
  
  <path d="M68,259 L122,259 L122,254 L68,254 Z" fill="#6a1b9a" stroke="#9c27b0" stroke-width="0.5"/>
  <text x="95" y="258" text-anchor="middle" fill="#e1bee7" font-size="5" font-family="Arial">Консументы II</text>
  
  <path d="M82,251 L108,251 L108,246 L82,246 Z" fill="#880e4f" stroke="#c2185b" stroke-width="0.5"/>
  <text x="95" y="250" text-anchor="middle" fill="#fce4ec" font-size="5" font-family="Arial">Конс. III</text>

  <!-- Carbon cycle simplified -->
  <rect x="190" y="220" width="302" height="62" fill="#0d1a0d" stroke="#26a69a" stroke-width="1" rx="4"/>
  <text x="341" y="234" text-anchor="middle" fill="#80cbc4" font-size="7" font-weight="bold" font-family="Arial">Круговорот углерода (упрощённо)</text>
  
  <!-- CO2 in atmosphere -->
  <ellipse cx="341" cy="252" rx="45" ry="10" fill="#26a69a" opacity="0.2" stroke="#26a69a" stroke-width="0.8"/>
  <text x="341" y="255" text-anchor="middle" fill="#80cbc4" font-size="5.5" font-family="Arial">CO₂ в атмосфере</text>
  
  <!-- Photosynthesis arrow down-left -->
  <path d="M305,260 L270,268" stroke="#66bb6a" stroke-width="1" marker-end="url(#arrC)"/>
  <defs><marker id="arrC" markerWidth="4" markerHeight="4" refX="4" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4 Z" fill="#66bb6a"/></marker></defs>
  <text x="280" y="262" fill="#81c784" font-size="4.5" font-family="Arial">Фотосинтез</text>
  
  <!-- Plants -->
  <text x="260" y="275" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Растения (органика)</text>
  
  <!-- Respiration arrow up-right from plants -->
  <path d="M280,270 L310,260" stroke="#ff8a65" stroke-width="0.8" marker-end="url(#arrR)"/>
  <defs><marker id="arrR" markerWidth="4" markerHeight="4" refX="4" refY="2" orient="auto"><path d="M0,0 L4,2 L0,4 Z" fill="#ff8a65"/></marker></defs>
  <text x="282" y="278" fill="#ff8a65" font-size="4" font-family="Arial">Дыхание</text>
  
  <!-- Combustion arrow -->
  <path d="M260,275 L230,260" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="228" y="275" fill="#ef9a9a" font-size="4" font-family="Arial">Горение</text>
  
  <!-- Animals -->
  <text x="400" y="275" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">Животные (дыхание)</text>
  <path d="M400,270 L380,260" stroke="#ff8a65" stroke-width="0.8"/>

  <!-- Bottom: Biogeocenosis definition -->
  <rect x="8" y="290" width="484" height="52" fill="#0d1a0d" stroke="#43a047" stroke-width="1" rx="4"/>
  <text x="250" y="306" text-anchor="middle" fill="#a5d6a7" font-size="7" font-weight="bold" font-family="Arial">Биогеоценоз = экосистема одного природного участка</text>
  
  <text x="130" y="320" text-anchor="middle" fill="#81c784" font-size="6" font-family="Arial">Биоценоз (сообщество организмов)</text>
  <text x="130" y="332" text-anchor="middle" fill="#66bb6a" font-size="5.5" font-family="Arial">+ Биотоп (среда обитания)</text>
  
  <text x="370" y="320" text-anchor="middle" fill="#4db6ac" font-size="6" font-family="Arial">Компоненты: продуценты, консументы,</text>
  <text x="370" y="332" text-anchor="middle" fill="#26a69a" font-size="5.5" font-family="Arial">редуценты + абиотическая среда (климат, почва)</text>
</svg>