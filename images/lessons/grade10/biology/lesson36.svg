<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg36" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <radialGradient id="embG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </radialGradient>
    <marker id="arr36" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2e7d32"/></marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg36)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#2e7d32" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#2e7d32" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#2e7d32"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">Индивидуальное развитие — онтогенез</text>
  <text x="490" y="14" text-anchor="end" fill="#c8e6c9" font-size="8" font-family="Arial">Биология 10 класс — Урок 36</text>
  <!-- EMBRYONIC DEVELOPMENT section -->
  <rect x="15" y="44" width="470" height="14" fill="#1b5e20" rx="3"/>
  <text x="250" y="55" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">ЭМБРИОНАЛЬНОЕ РАЗВИТИЕ</text>
  <!-- Stage 1: Zygote -->
  <circle cx="45" cy="85" r="14" fill="url(#embG)" stroke="#ff8f00" stroke-width="1.2"/>
  <circle cx="45" cy="85" r="5" fill="#2e7d32" opacity="0.3"/>
  <text x="45" y="108" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Зигота</text>
  <line x1="61" y1="85" x2="73" y2="85" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Stage 2: Cleavage -->
  <circle cx="90" cy="85" r="14" fill="url(#embG)" stroke="#ff8f00" stroke-width="1"/>
  <line x1="82" y1="77" x2="98" y2="93" stroke="#880e4f" stroke-width="0.6"/>
  <line x1="98" y1="77" x2="82" y2="93" stroke="#880e4f" stroke-width="0.6"/>
  <text x="90" y="108" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Дробление</text>
  <line x1="106" y1="85" x2="118" y2="85" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Stage 3: Blastula -->
  <circle cx="135" cy="85" r="16" fill="url(#embG)" stroke="#ff8f00" stroke-width="1"/>
  <circle cx="135" cy="85" r="7" fill="#e3f2fd" stroke="#0277bd" stroke-width="0.5"/>
  <!-- Small cells around -->
  <circle cx="127" cy="76" r="2.5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.3"/>
  <circle cx="143" cy="76" r="2.5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.3"/>
  <circle cx="125" cy="85" r="2.5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.3"/>
  <circle cx="145" cy="85" r="2.5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.3"/>
  <circle cx="127" cy="94" r="2.5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.3"/>
  <circle cx="143" cy="94" r="2.5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.3"/>
  <text x="135" y="108" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Бластула</text>
  <line x1="153" y1="85" x2="165" y2="85" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Stage 4: Gastrulation -->
  <circle cx="182" cy="85" r="16" fill="url(#embG)" stroke="#ff8f00" stroke-width="1"/>
  <path d="M174,80 Q182,75 190,80" fill="none" stroke="#c62828" stroke-width="1"/>
  <path d="M174,90 Q182,95 190,90" fill="none" stroke="#0277bd" stroke-width="1"/>
  <ellipse cx="182" cy="85" rx="5" ry="4" fill="#ffcdd2" stroke="#c62828" stroke-width="0.4"/>
  <text x="182" y="108" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Гаструла</text>
  <line x1="200" y1="85" x2="212" y2="85" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Stage 5: Neurula -->
  <ellipse cx="232" cy="85" rx="18" ry="14" fill="url(#embG)" stroke="#ff8f00" stroke-width="1"/>
  <path d="M222,82 Q226,78 232,80 Q238,78 242,82" fill="none" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="232" y="108" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Нейрула</text>
  <line x1="252" y1="85" x2="264" y2="85" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Stage 6: Organogenesis -->
  <ellipse cx="290" cy="85" rx="20" ry="16" fill="url(#embG)" stroke="#ff8f00" stroke-width="1"/>
  <!-- Organ primordia -->
  <circle cx="284" cy="80" r="3" fill="#c62828" opacity="0.5"/>
  <circle cx="296" cy="80" r="3" fill="#1565c0" opacity="0.5"/>
  <ellipse cx="290" cy="90" rx="5" ry="3" fill="#2e7d32" opacity="0.4"/>
  <text x="290" y="108" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Органогенез</text>
  <!-- Germ layers legend -->
  <rect x="330" y="66" width="155" height="48" fill="white" fill-opacity="0.7" rx="4" stroke="#2e7d32" stroke-width="0.5"/>
  <text x="335" y="78" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">Зародышевые листки:</text>
  <rect x="335" y="82" width="8" height="4" fill="#c62828" rx="1"/>
  <text x="347" y="86" fill="#4e342e" font-size="6" font-family="Arial">Эктодерма (кожа, НС)</text>
  <rect x="335" y="90" width="8" height="4" fill="#ffcdd2" rx="1"/>
  <text x="347" y="94" fill="#4e342e" font-size="6" font-family="Arial">Мезодерма (мышцы, скелет)</text>
  <rect x="335" y="98" width="8" height="4" fill="#0277bd" rx="1"/>
  <text x="347" y="102" fill="#4e342e" font-size="6" font-family="Arial">Энтодерма (пищевар.)</text>
  <!-- POSTEMBRYONIC DEVELOPMENT -->
  <rect x="15" y="118" width="470" height="14" fill="#0277bd" rx="3"/>
  <text x="250" y="129" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">ПОСТЭМБРИОНАЛЬНОЕ РАЗВИТИЕ</text>
  <!-- Direct development -->
  <rect x="15" y="138" width="225" height="95" fill="white" fill-opacity="0.6" rx="5" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="127" y="152" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold" font-family="Arial">Прямое развитие</text>
  <!-- Child → Adult -->
  <circle cx="55" cy="185" r="12" fill="#c8e6c9" stroke="#2e7d32" stroke-width="0.8"/>
  <circle cx="55" cy="180" r="3" fill="#1b5e20" opacity="0.3"/>
  <line x1="55" y1="183" x2="55" y2="190" stroke="#1b5e20" stroke-width="0.8"/>
  <text x="55" y="205" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Детёныш</text>
  <line x1="70" y1="185" x2="105" y2="185" stroke="#2e7d32" stroke-width="1" marker-end="url(#arr36)"/>
  <text x="87" y="180" text-anchor="middle" fill="#2e7d32" font-size="5" font-family="Arial">рост</text>
  <circle cx="125" cy="182" r="16" fill="#c8e6c9" stroke="#2e7d32" stroke-width="0.8"/>
  <circle cx="125" cy="176" r="4" fill="#1b5e20" opacity="0.3"/>
  <line x1="125" y1="180" x2="125" y2="192" stroke="#1b5e20" stroke-width="1"/>
  <line x1="115" y1="188" x2="135" y2="188" stroke="#1b5e20" stroke-width="0.8"/>
  <text x="125" y="205" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Взрослая</text>
  <text x="125" y="213" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">особь</text>
  <text x="200" y="175" fill="#4e342e" font-size="7" font-family="Arial">Млекопитающие,</text>
  <text x="200" y="185" fill="#4e342e" font-size="7" font-family="Arial">птицы, рептилии</text>
  <text x="200" y="198" fill="#2e7d32" font-size="6" font-family="Arial">Без метаморфоза</text>
  <text x="200" y="208" fill="#2e7d32" font-size="6" font-family="Arial">Похожи на родителей</text>
  <!-- Indirect development -->
  <rect x="255" y="138" width="230" height="95" fill="white" fill-opacity="0.6" rx="5" stroke="#0277bd" stroke-width="0.8"/>
  <text x="370" y="152" text-anchor="middle" fill="#0277bd" font-size="9" font-weight="bold" font-family="Arial">Непрямое развитие</text>
  <!-- Egg → Larva → Adult (metamorphosis) -->
  <ellipse cx="285" cy="185" rx="8" ry="6" fill="#fff9c4" stroke="#ff8f00" stroke-width="0.8"/>
  <line x1="295" y1="185" x2="315" y2="185" stroke="#0277bd" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Larva (caterpillar) -->
  <ellipse cx="335" cy="185" rx="12" ry="5" fill="#a5d6a7" stroke="#2e7d32" stroke-width="0.8"/>
  <circle cx="325" cy="183" r="2" fill="#1b5e20"/>
  <line x1="330" y1="190" x2="330" y2="195" stroke="#2e7d32" stroke-width="0.5"/>
  <line x1="335" y1="190" x2="335" y2="195" stroke="#2e7d32" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="340" y2="195" stroke="#2e7d32" stroke-width="0.5"/>
  <line x1="345" y1="190" x2="345" y2="195" stroke="#2e7d32" stroke-width="0.5"/>
  <text x="335" y="205" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Личинка</text>
  <line x1="350" y1="185" x2="370" y2="185" stroke="#0277bd" stroke-width="1" marker-end="url(#arr36)"/>
  <text x="360" y="180" text-anchor="middle" fill="#0277bd" font-size="5" font-family="Arial">метаморфоз</text>
  <!-- Pupa -->
  <ellipse cx="390" cy="185" rx="7" ry="10" fill="#8d6e63" stroke="#5d4037" stroke-width="0.8"/>
  <line x1="385" y1="180" x2="395" y2="180" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="385" y1="185" x2="395" y2="185" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="385" y1="190" x2="395" y2="190" stroke="#5d4037" stroke-width="0.5"/>
  <text x="390" y="205" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Куколка</text>
  <line x1="400" y1="185" x2="420" y2="185" stroke="#0277bd" stroke-width="1" marker-end="url(#arr36)"/>
  <!-- Adult butterfly -->
  <ellipse cx="445" cy="183" rx="5" ry="8" fill="#7b1fa2" stroke="#4a148c" stroke-width="0.8"/>
  <path d="M440,178 Q432,170 435,180" fill="#ce93d8" stroke="#7b1fa2" stroke-width="0.5"/>
  <path d="M450,178 Q458,170 455,180" fill="#ce93d8" stroke="#7b1fa2" stroke-width="0.5"/>
  <path d="M441,188 Q435,192 437,186" fill="#ce93d8" stroke="#7b1fa2" stroke-width="0.5"/>
  <path d="M449,188 Q455,192 453,186" fill="#ce93d8" stroke="#7b1fa2" stroke-width="0.5"/>
  <text x="445" y="205" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Взрослая</text>
  <text x="370" y="228" text-anchor="middle" fill="#0277bd" font-size="6" font-family="Arial">Насекомые, земноводные</text>
  <!-- Biogenetic law -->
  <rect x="15" y="240" width="470" height="100" fill="white" fill-opacity="0.7" rx="6" stroke="#ff6f00" stroke-width="1"/>
  <rect x="15" y="240" width="470" height="16" fill="#ff6f00" rx="6"/>
  <rect x="15" y="250" width="470" height="6" fill="#ff6f00"/>
  <text x="250" y="253" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">Биогенетический закон (Э. Геккель, 1866)</text>
  <text x="250" y="274" text-anchor="middle" fill="#e65100" font-size="9" font-weight="bold" font-family="Arial">«Онтогенез есть краткое повторение филогенеза»</text>
  <text x="250" y="290" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">Индивидуальное развитие организма повторяет историческое развитие вида</text>
  <!-- Example: embryo comparison -->
  <text x="70" y="306" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Рыба</text>
  <text x="170" y="306" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Земноводное</text>
  <text x="270" y="306" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Рептилия</text>
  <text x="370" y="306" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">Млекопитающее</text>
  <!-- Similar embryos -->
  <ellipse cx="70" cy="320" rx="10" ry="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.6"/>
  <circle cx="70" cy="315" r="2" fill="#1b5e20" opacity="0.3"/>
  <ellipse cx="170" cy="320" rx="10" ry="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.6"/>
  <circle cx="170" cy="315" r="2" fill="#1b5e20" opacity="0.3"/>
  <ellipse cx="270" cy="320" rx="10" ry="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.6"/>
  <circle cx="270" cy="315" r="2" fill="#1b5e20" opacity="0.3"/>
  <ellipse cx="370" cy="320" rx="10" ry="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.6"/>
  <circle cx="370" cy="315" r="2" fill="#1b5e20" opacity="0.3"/>
  <!-- Bracket showing similarity -->
  <path d="M55,335 L55,340 L385,340 L385,335" fill="none" stroke="#ff6f00" stroke-width="0.8"/>
  <text x="220" y="348" text-anchor="middle" fill="#e65100" font-size="6" font-family="Arial">Сходство ранних стадий эмбрионального развития</text>
</svg>