<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Нуклеиновые кислоты</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>
    
    <!-- DNA Double Helix (left side) -->
    <text x="120" y="100" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle">ДНК (DNA)</text>
    
    <!-- Left strand -->
    <path d="M60,115 C75,125 85,135 75,150 C65,165 55,175 65,190 C75,205 85,215 75,230 C65,245 55,255 65,270 C75,285 80,290 80,295" fill="none" stroke="#1565C0" stroke-width="3"/>
    <!-- Right strand -->
    <path d="M110,115 C95,125 85,135 95,150 C105,165 115,175 105,190 C95,205 85,215 95,230 C105,245 115,255 105,270 C95,285 90,290 90,295" fill="none" stroke="#EF5350" stroke-width="3"/>
    
    <!-- Base pair rungs -->
    <line x1="72" y1="132" x2="98" y2="132" stroke="#AB47BC" stroke-width="2"/>
    <line x1="78" y1="150" x2="92" y2="150" stroke="#FFA726" stroke-width="2"/>
    <line x1="68" y1="168" x2="102" y2="168" stroke="#AB47BC" stroke-width="2"/>
    <line x1="78" y1="185" x2="92" y2="185" stroke="#FFA726" stroke-width="2"/>
    <line x1="68" y1="203" x2="102" y2="203" stroke="#AB47BC" stroke-width="2"/>
    <line x1="78" y1="220" x2="92" y2="220" stroke="#FFA726" stroke-width="2"/>
    <line x1="68" y1="238" x2="102" y2="238" stroke="#AB47BC" stroke-width="2"/>
    <line x1="78" y1="255" x2="92" y2="255" stroke="#FFA726" stroke-width="2"/>
    <line x1="68" y1="273" x2="102" y2="273" stroke="#AB47BC" stroke-width="2"/>
    <line x1="75" y1="290" x2="95" y2="290" stroke="#FFA726" stroke-width="2"/>
    
    <!-- Base pair labels -->
    <text x="85" y="128" font-family="Arial,sans-serif" font-size="7" fill="#AB47BC" text-anchor="middle">A-T</text>
    <text x="85" y="164" font-family="Arial,sans-serif" font-size="7" fill="#FFA726" text-anchor="middle">G-C</text>
    
    <!-- Nucleotide structure (right side) -->
    <text x="340" y="100" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Нуклеотид</text>
    
    <!-- Phosphate group -->
    <circle cx="290" cy="130" r="15" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="290" y="134" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">P</text>
    
    <!-- Sugar (deoxyribose) -->
    <rect x="315" y="122" width="28" height="20" rx="3" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
    <text x="329" y="136" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">C5</text>
    
    <!-- Bond P to sugar -->
    <line x1="305" y1="130" x2="315" y2="130" stroke="#555" stroke-width="2"/>
    
    <!-- Nitrogen base -->
    <rect x="350" y="110" width="55" height="45" rx="4" fill="#AB47BC" stroke="#6A1B9A" stroke-width="1"/>
    <text x="377" y="130" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Азот.</text>
    <text x="377" y="142" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">осн.</text>
    
    <!-- Bond sugar to base -->
    <line x1="343" y1="130" x2="350" y2="130" stroke="#555" stroke-width="2"/>
    
    <!-- Labels for nucleotide parts -->
    <text x="290" y="155" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Фосфат</text>
    <text x="329" y="155" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Сахар</text>
    <text x="377" y="165" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" text-anchor="middle">Основание</text>
    
    <!-- Base types -->
    <rect x="280" y="175" width="190" height="55" rx="3" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="375" y="190" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">Пурины:</text>
    <text x="375" y="202" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">A (Аденин)  G (Гуанин)</text>
    <text x="375" y="216" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">Пиримидины:</text>
    <text x="375" y="228" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">T (Тимин)  C (Цитозин)</text>
    
    <!-- DNA vs RNA comparison -->
    <rect x="280" y="238" width="90" height="58" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <text x="325" y="254" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">ДНК</text>
    <text x="325" y="266" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Дезоксирибоза</text>
    <text x="325" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">A,T,G,C</text>
    <text x="325" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Двойная спираль</text>
    
    <rect x="380" y="238" width="90" height="58" rx="3" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
    <text x="425" y="254" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">РНК</text>
    <text x="425" y="266" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Рибоза</text>
    <text x="425" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">A,U,G,C</text>
    <text x="425" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Одинарная</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>