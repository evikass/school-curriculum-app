<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Арифметика в позиционных СС</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 5</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="225" height="110" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="90" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Сложение в двоичной:</text>
  <text x="30" y="110" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">0 + 0 = 0</text>
  <text x="30" y="124" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">0 + 1 = 1</text>
  <text x="30" y="138" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">1 + 0 = 1</text>
  <text x="30" y="152" font-family="monospace" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">1 + 1 = 10</text>
  <text x="30" y="170" font-family="monospace" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Пример: 101 + 110 = 1011</text>
  <rect x="255" y="72" width="225" height="110" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="265" y="90" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Умножение в двоичной:</text>
  <text x="265" y="110" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">0 × 0 = 0</text>
  <text x="265" y="124" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">0 × 1 = 0</text>
  <text x="265" y="138" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">1 × 0 = 0</text>
  <text x="265" y="152" font-family="monospace" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">1 × 1 = 1</text>
  <text x="265" y="170" font-family="monospace" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Пример: 101 × 11 = 1111</text>
  <rect x="20" y="190" width="460" height="65" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="208" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Арифметика в 16-ричной:</text>
  <text x="30" y="226" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">A + B = 15    F + 1 = 10    C + D = 19</text>
  <text x="30" y="244" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Правило: если сумма >= основания, перенос в старший разряд</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#1565C0" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-style="italic">Информатика · 10 класс</text>
</svg>