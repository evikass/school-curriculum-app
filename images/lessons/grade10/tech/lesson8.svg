<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Проект «Функциональная модель»</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 8</text>

  <!-- Top: Design Process -->
  <rect x="30" y="60" width="440" height="55" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Процесс создания функциональной модели</text>

  <rect x="42" y="88" width="80" height="20" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="82" y="102" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="500">Идея</text>

  <text x="130" y="102" fill="#546E7A" font-size="10">→</text>

  <rect x="140" y="88" width="80" height="20" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="180" y="102" text-anchor="middle" fill="#E65100" font-size="8" font-weight="500">Чертёж</text>

  <text x="228" y="102" fill="#546E7A" font-size="10">→</text>

  <rect x="238" y="88" width="80" height="20" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="278" y="102" text-anchor="middle" fill="#00897B" font-size="8" font-weight="500">3D-модель</text>

  <text x="326" y="102" fill="#546E7A" font-size="10">→</text>

  <rect x="336" y="88" width="80" height="20" rx="4" fill="#37474F" opacity="0.12" stroke="#37474F" stroke-width="1"/>
  <text x="376" y="102" text-anchor="middle" fill="#37474F" font-size="8" font-weight="500">Печать</text>

  <text x="424" y="102" fill="#546E7A" font-size="10">→</text>

  <rect x="434" y="88" width="26" height="20" rx="4" fill="#00897B"/>
  <text x="447" y="102" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">✓</text>

  <!-- Left: Mechanical parts -->
  <rect x="30" y="127" width="210" height="105" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="135" y="145" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Механические детали</text>

  <rect x="42" y="154" width="92" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="88" y="168" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="500">Шестерни</text>
  <text x="88" y="179" text-anchor="middle" fill="#546E7A" font-size="7">Передача</text>

  <rect x="142" y="154" width="86" height="30" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="185" y="168" text-anchor="middle" fill="#E65100" font-size="8" font-weight="500">Оси / Валы</text>
  <text x="185" y="179" text-anchor="middle" fill="#546E7A" font-size="7">Вращение</text>

  <rect x="42" y="192" width="92" height="30" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="88" y="206" text-anchor="middle" fill="#00897B" font-size="8" font-weight="500">Корпус</text>
  <text x="88" y="217" text-anchor="middle" fill="#546E7A" font-size="7">Каркас</text>

  <rect x="142" y="192" width="86" height="30" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="185" y="206" text-anchor="middle" fill="#546E7A" font-size="8" font-weight="500">Крепёж</text>
  <text x="185" y="217" text-anchor="middle" fill="#546E7A" font-size="7">Болты, гайки</text>

  <!-- Right: Tolerances -->
  <rect x="260" y="127" width="210" height="105" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="365" y="145" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Допуски и посадки</text>

  <text x="275" y="164" fill="#1565C0" font-size="8" font-weight="600">Зазор для оси:</text>
  <text x="455" y="164" text-anchor="end" fill="#546E7A" font-size="8">+0.2 мм</text>

  <line x1="275" y1="170" x2="455" y2="170" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="184" fill="#E65100" font-size="8" font-weight="600">Усадка пластика:</text>
  <text x="455" y="184" text-anchor="end" fill="#546E7A" font-size="8">0.3 — 0.5%</text>

  <line x1="275" y1="190" x2="455" y2="190" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="204" fill="#00897B" font-size="8" font-weight="600">Посадка с натягом:</text>
  <text x="455" y="204" text-anchor="end" fill="#546E7A" font-size="8">−0.1 мм</text>

  <line x1="275" y1="210" x2="455" y2="210" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="224" fill="#37474F" font-size="8" font-weight="600">Слой ступенька:</text>
  <text x="455" y="224" text-anchor="end" fill="#546E7A" font-size="8">Высота слоя</text>

  <!-- Bottom: Assembly -->
  <rect x="30" y="244" width="440" height="68" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="262" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Сборка и тестирование</text>

  <rect x="45" y="272" width="100" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="95" y="286" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="500">Подгонка деталей</text>
  <text x="95" y="296" text-anchor="middle" fill="#546E7A" font-size="7">Шлифовка</text>

  <text x="155" y="290" text-anchor="middle" fill="#00897B" font-size="10">→</text>

  <rect x="168" y="272" width="100" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="218" y="286" text-anchor="middle" fill="#E65100" font-size="8" font-weight="500">Сборка узлов</text>
  <text x="218" y="296" text-anchor="middle" fill="#546E7A" font-size="7">Монтаж</text>

  <text x="278" y="290" text-anchor="middle" fill="#00897B" font-size="10">→</text>

  <rect x="291" y="272" width="80" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="331" y="286" text-anchor="middle" fill="#00897B" font-size="8" font-weight="500">Тест</text>
  <text x="331" y="296" text-anchor="middle" fill="#546E7A" font-size="7">Проверка</text>

  <text x="381" y="290" text-anchor="middle" fill="#00897B" font-size="10">→</text>

  <rect x="394" y="272" width="64" height="28" rx="4" fill="#00897B"/>
  <text x="426" y="290" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">Готово!</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>