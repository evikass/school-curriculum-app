<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dfd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c5b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8937d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6f47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d5a3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="4" />
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="url(#frameGrad)" stroke-width="1" opacity="0.5" />
  
  <!-- Заголовок класса -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a4a3a" font-weight="bold">ЛИТЕРАТУРА · 10 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#3d3024" font-weight="bold">И.С. Тургенев</text>
  <text x="250" y="85" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a4a3a">1818-1883</text>
  
  <!-- Портрет Тургенева -->
  <circle cx="100" cy="150" r="40" fill="url(#portraitGrad)" stroke="#6d5a3d" stroke-width="2" />
  <path d="M100,110 C100,110 110,120 110,130 C110,140 100,145 100,145 C100,145 90,140 90,130 C90,120 100,110 100,110 Z" fill="#3d3024" />
  <path d="M85,140 C85,140 90,145 100,145 C110,145 115,140 115,140" fill="none" stroke="#3d3024" stroke-width="2" />
  <circle cx="90" cy="135" r="2" fill="#3d3024" />
  <circle cx="110" cy="135" r="2" fill="#3d3024" />
  
  <!-- Перо и чернильница -->
  <line x1="130" y1="140" x2="150" y2="160" stroke="#5a4a3a" stroke-width="2" />
  <circle cx="155" cy="165" r="8" fill="#3d3024" />
  <path d="M147,157 L157,167 L155,165 L145,155 Z" fill="#f5f0e6" stroke="#3d3024" stroke-width="1" />
  
  <!-- Основные произведения -->
  <rect x="200" y="110" width="280" height="220" fill="none" stroke="#8b6f47" stroke-width="1" opacity="0.5" rx="5" ry="5" />
  <text x="340" y="135" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#3d3024" font-weight="bold">Основные произведения</text>
  
  <!-- Романы и рассказы -->
  <rect x="220" y="150" width="100" height="30" fill="#d4c5b9" stroke="#8b6f47" stroke-width="1" rx="3" ry="3" />
  <text x="270" y="170" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3d3024">"Отцы и дети"</text>
  <text x="270" y="190" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5a4a3a">1862</text>
  
  <rect x="330" y="150" width="120" height="30" fill="#d4c5b9" stroke="#8b6f47" stroke-width="1" rx="3" ry="3" />
  <text x="390" y="170" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3d3024">"Записки охотника"</text>
  <text x="390" y="190" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5a4a3a">1852</text>
  
  <rect x="220" y="210" width="80" height="30" fill="#d4c5b9" stroke="#8b6f47" stroke-width="1" rx="3" ry="3" />
  <text x="260" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3d3024">"Муму"</text>
  <text x="260" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5a4a3a">1854</text>
  
  <rect x="320" y="210" width="80" height="30" fill="#d4c5b9" stroke="#8b6f47" stroke-width="1" rx="3" ry="3" />
  <text x="360" y="230" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3d3024">"Ася"</text>
  <text x="360" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5a4a3a">1858</text>
  
  <!-- График "Конфликт поколений" -->
  <text x="340" y="275" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3d3024" font-weight="bold">Конфликт поколений</text>
  
  <!-- Ось X -->
  <line x1="220" y1="290" x2="450" y2="290" stroke="#5a4a3a" stroke-width="2" />
  <!-- Ось Y -->
  <line x1="220" y1="290" x2="220" y2="260" stroke="#5a4a3a" stroke-width="2" />
  
  <!-- Цифра 1 -->
  <line x1="270" y1="290" x2="270" y2="295" stroke="#5a4a3a" stroke-width="1" />
  <text x="270" y="308" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#5a4a3a">1</text>
  
  <!-- Цифра 2 -->
  <line x1="370" y1="290" x2="370" y2="295" stroke="#5a4a3a" stroke-width="1" />
  <text x="370" y="308" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#5a4a3a">2</text>
  
  <!-- Поколение 1 -->
  <rect x="235" y="270" width="70" height="20" fill="#a8937d" opacity="0.7" rx="3" ry="3" />
  <text x="270" y="283" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3024">Поколение 1</text>
  
  <!-- Поколение 2 -->
  <rect x="335" y="270" width="70" height="20" fill="#d4c5b9" opacity="0.7" rx="3" ry="3" />
  <text x="370" y="283" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3024">Поколение 2</text>
  
  <!-- Стрелка конфликта -->
  <path d="M305,280 L325,280" stroke="#3d3024" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Определение стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3d3024" />
    </marker>
  </defs>
  
  <!-- Диаграмма "Нигилизм" -->
  <text x="340" y="130" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3d3024" font-weight="bold">Нигилизм Базарова</text>
  
  <!-- Центр круга - Базаров -->
  <circle cx="340" cy="100" r="15" fill="#8b6f47" stroke="#3d3024" stroke-width="1" />
  <text x="340" y="105" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#f5f0e6">Б</text>
  
  <!-- Окружающие элементы -->
  <circle cx="310" cy="100" r="10" fill="#d4c5b9" stroke="#3d3024" stroke-width="1" />
  <text x="310" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3024">Наука</text>
  
  <circle cx="370" cy="100" r="10" fill="#d4c5b9" stroke="#3d3024" stroke-width="1" />
  <text x="370" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3024">Критика</text>
  
  <circle cx="340" cy="75" r="10" fill="#d4c5b9" stroke="#3d3024" stroke-width="1" />
  <text x="340" y="80" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3024">Практика</text>
  
  <circle cx="340" cy="125" r="10" fill="#d4c5b9" stroke="#3d3024" stroke-width="1" />
  <text x="340" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3d3024">Реализм</text>
  
  <!-- Номер урока в углу -->
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#5a4a3a">Урок №12</text>
  
  <!-- Дополнительные элементы украшения -->
  <path d="M30,30 Q40,20 50,30" fill="none" stroke="#8b6f47" stroke-width="1" opacity="0.5" />
  <path d="M450,30 Q460,20 470,30" fill="none" stroke="#8b6f47" stroke-width="1" opacity="0.5" />
  
  <!-- Даты жизни -->
  <text x="70" y="210" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a4a3a">1818</text>
  <text x="130" y="210" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#5a4a3a">1883</text>
  
  <!-- Перо как разделитель -->
  <line x1="160" y1="100" x2="160" y2="200" stroke="#8b6f47" stroke-width="1" opacity="0.3" />
</svg>