<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="8" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#8B4513" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#5D4037">ЛИТЕРАТУРА · 10 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#3E2723">Михаил Юрьевич Лермонтов</text>
  <text x="470" y="35" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5D4037">Урок 15</text>
  
  <!-- Портрет Лермонтова -->
  <g transform="translate(50, 80)">
    <circle cx="50" cy="50" r="45" fill="#D7CCC8" stroke="#8D6E63" stroke-width="2"/>
    <ellipse cx="50" cy="45" rx="35" ry="40" fill="#8D6E63"/>
    <path d="M30 45 Q50 55 70 45" fill="none" stroke="#3E2723" stroke-width="1.5"/>
    <circle cx="40" cy="40" r="2" fill="#FFF"/>
    <circle cx="60" cy="40" r="2" fill="#FFF"/>
    <path d="M40 50 Q50 55 60 50" fill="none" stroke="#3E2723" stroke-width="1.5"/>
    <path d="M35 65 Q50 70 65 65" fill="none" stroke="#3E2723" stroke-width="1.5"/>
    <text x="50" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5D4037">1814-1841</text>
    <text x="50" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#795548">27 лет жизни</text>
  </g>
  
  <!-- Основные произведения -->
  <g transform="translate(150, 70)">
    <rect x="0" y="0" width="320" height="140" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="160" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5D4037">Основные произведения</text>
    
    <!-- Роман -->
    <rect x="10" y="30" width="140" height="45" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1" rx="3"/>
    <text x="80" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3E2723">"Герой нашего времени"</text>
    <text x="80" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">роман</text>
    
    <!-- Стихотворение -->
    <rect x="170" y="30" width="140" height="45" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1" rx="3"/>
    <text x="240" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3E2723">"Смерть поэта"</text>
    <text x="240" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">стихотворение</text>
    
    <!-- Поэма Мцыри -->
    <rect x="10" y="85" width="140" height="45" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1" rx="3"/>
    <text x="80" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3E2723">"Мцыри"</text>
    <text x="80" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">поэма</text>
    
    <!-- Поэма Демон -->
    <rect x="170" y="85" width="140" height="45" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1" rx="3"/>
    <text x="240" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3E2723">"Демон"</text>
    <text x="240" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">поэма</text>
  </g>
  
  <!-- Драма Маскарад -->
  <g transform="translate(150, 230)">
    <rect x="0" y="0" width="150" height="80" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="75" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5D4037">"Маскарад"</text>
    <text x="75" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">драма</text>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#795548">1841 год</text>
    <text x="75" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#795548">последнее произведение</text>
  </g>
  
  <!-- Тип "лишнего человека" -->
  <g transform="translate(320, 230)">
    <rect x="0" y="0" width="150" height="80" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="75" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#5D4037">Печорин</text>
    <text x="75" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">"Лишний человек"</text>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#795548">Типаж:</text>
    <text x="75" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#795548">бунтарь, скептик, аналитик</text>
  </g>
  
  <!-- График противоречивости натуры -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="110" height="90" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1" rx="5" filter="url(#shadow)"/>
    <text x="55" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#5D4037">Противоречивость</text>
    
    <!-- Ось Y -->
    <line x1="15" y1="25" x2="15" y2="75" stroke="#5D4037" stroke-width="1"/>
    <!-- Ось X -->
    <line x1="15" y1="75" x2="95" y2="75" stroke="#5D4037" stroke-width="1"/>
    
    <!-- График -->
    <path d="M15 50 Q30 35 45 45 T75 40 T95 50" fill="none" stroke="#8D6E63" stroke-width="2"/>
    <circle cx="15" cy="50" r="2" fill="#8D6E63"/>
    <circle cx="45" cy="45" r="2" fill="#8D6E63"/>
    <circle cx="75" cy="40" r="2" fill="#8D6E63"/>
    <circle cx="95" cy="50" r="2" fill="#8D6E63"/>
    
    <!-- Метки -->
    <text x="10" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#795548">Высоко</text>
    <text x="10" y="80" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#795548">Низко</text>
    <text x="55" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#795548">Характер</text>
  </g>
  
  <!-- Формула творчества -->
  <g transform="translate(150, 330)">
    <rect x="0" y="0" width="350" height="15" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1" rx="3"/>
    <text x="175" y="11" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#5D4037">Творчество = Бунтарство + Романтизм + Реализм</text>
  </g>
  
  <!-- Даты жизни -->
  <text x="25" y="345" font-family="Arial, sans-serif" font-size="10" fill="#795548">Родился: 15.10.1814, Москва</text>
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" fill="#795548">Умер: 15.07.1841, Пятигорск</text>
</svg>