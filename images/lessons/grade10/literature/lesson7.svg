<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4e6f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3" />
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="url(#frameGrad)" stroke-width="1" />
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">ЛИТЕРАТУРА · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="35" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Урок №15</text>
  
  <!-- Основной заголовок -->
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" font-weight="bold">Михаил Александрович Шолохов</text>
  <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">(1905-1984)</text>
  
  <!-- Портрет Шолохова (упрощенный) -->
  <g transform="translate(80, 100)">
    <circle cx="35" cy="35" r="30" fill="#f4d1ae" />
    <path d="M5,35 Q5,15 35,15 Q65,15 65,35 L65,60 L5,60 Z" fill="#2c3e50" />
    <circle cx="25" cy="30" r="3" fill="#2c3e50" />
    <circle cx="45" cy="30" r="3" fill="#2c3e50" />
    <path d="M30,42 Q35,45 40,42" stroke="#2c3e50" stroke-width="2" fill="none" />
    <text x="35" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">М.А. Шолохов</text>
  </g>
  
  <!-- Нобелевская премия -->
  <g transform="translate(200, 100)">
    <rect x="0" y="20" width="80" height="60" fill="#f1c40f" rx="5" />
    <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Нобелевская</text>
    <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">премия</text>
    <text x="40" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">1956</text>
    <text x="40" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Лауреат</text>
  </g>
  
  <!-- Основные произведения -->
  <g transform="translate(320, 100)">
    <!-- "Тихий Дон" -->
    <rect x="0" y="0" width="160" height="40" fill="url(#bookGrad)" rx="5" />
    <text x="80" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">"Тихий Дон"</text>
    <text x="80" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Роман-эпопея</text>
    
    <!-- "Поднятая целина" -->
    <rect x="0" y="45" width="160" height="40" fill="url(#bookGrad)" rx="5" />
    <text x="80" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">"Поднятая целина"</text>
    <text x="80" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Роман</text>
    
    <!-- "Судьба человека" -->
    <rect x="0" y="90" width="160" height="40" fill="url(#bookGrad)" rx="5" />
    <text x="80" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">"Судьба человека"</text>
    <text x="80" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Рассказ</text>
  </g>
  
  <!-- Диаграмма "Тихий Дон" -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="440" height="140" fill="white" fill-opacity="0.7" rx="5" stroke="#34495e" stroke-width="1" />
    <text x="220" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">"Тихий Дон" — роман-эпопея</text>
    
    <!-- Тема романа -->
    <text x="20" y="40" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="bold">Темы:</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Эпопея о казачестве</text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Трагедия Григория Мелехова</text>
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Гражданская война</text>
    <text x="20" y="100" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Человек в исторических переломах</text>
    
    <!-- Структура романа -->
    <text x="220" y="40" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="bold">Структура:</text>
    <text x="220" y="55" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 4 книги</text>
    <text x="220" y="70" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 1912-1922 гг.</text>
    <text x="220" y="85" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Более 2 млн знаков</text>
    <text x="220" y="100" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Литературный шедевр</text>
    
    <!-- Иллюстрация книги -->
    <g transform="translate(380, 35)">
      <rect x="0" y="0" width="40" height="30" fill="url(#bookGrad)" rx="2" />
      <rect x="5" y="5" width="30" height="20" fill="none" stroke="white" stroke-width="1" />
      <line x1="5" y1="10" x2="35" y2="10" stroke="white" stroke-width="1" />
      <line x1="5" y1="15" x2="35" y2="15" stroke="white" stroke-width="1" />
      <line x1="5" y1="20" x2="25" y2="20" stroke="white" stroke-width="1" />
    </g>
  </g>
  
  <!-- Даты жизни -->
  <g transform="translate(30, 325)">
    <rect x="0" y="0" width="440" height="20" fill="#ecf0f1" rx="3" />
    <text x="20" y="15" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">1905</text>
    <text x="410" y="15" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">1984</text>
    <line x1="70" y1="10" x2="400" y2="10" stroke="#34495e" stroke-width="2" />
    <circle cx="70" cy="10" r="4" fill="#e74c3c" />
    <circle cx="400" cy="10" r="4" fill="#e74c3c" />
    <text x="220" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Жизнь и творчество</text>
  </g>
  
  <!-- Декоративные элементы -->
  <g transform="translate(250, 90)">
    <path d="M-10,0 L0,-10 L10,0 L0,10 Z" fill="none" stroke="#34495e" stroke-width="1" />
    <circle cx="0" cy="0" r="2" fill="#e74c3c" />
  </g>
  
  <!-- Перо -->
  <g transform="translate(50, 200)">
    <path d="M0,0 L5,15 L10,20 L15,15 L20,0 Z" fill="url(#penGrad)" />
    <line x1="10" y1="20" x2="10" y2="35" stroke="#2c3e50" stroke-width="2" />
    <circle cx="10" cy="37" r="2" fill="#2c3e50" />
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Перо писателя</text>
  </g>
</svg>