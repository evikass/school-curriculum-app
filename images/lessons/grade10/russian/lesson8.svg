<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#D32F2F" text-anchor="middle">Служебные части речи</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Русский язык — Урок 8</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#D32F2F" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="145" height="140" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="92" y="92" font-family="Arial,sans-serif" font-size="13" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Предлоги</text>
  <text x="92" y="110" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Связывают слова</text>
  <rect x="30" y="120" width="125" height="20" rx="5" fill="#D32F2F" opacity="0.1"/>
  <text x="92" y="135" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">в, на, к, с, от, по</text>
  <rect x="30" y="145" width="125" height="20" rx="5" fill="#D32F2F" opacity="0.1"/>
  <text x="92" y="160" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">из-за, из-под, над</text>
  <text x="92" y="185" font-family="Arial,sans-serif" font-size="9" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Производные:</text>
  <text x="92" y="200" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">в течение, в продолжение</text>
  <rect x="178" y="72" width="145" height="140" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="250" y="92" font-family="Arial,sans-serif" font-size="13" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Союзы</text>
  <text x="250" y="110" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Связывают однородные</text>
  <text x="250" y="122" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">члены и предложения</text>
  <rect x="188" y="130" width="125" height="20" rx="5" fill="#D32F2F" opacity="0.1"/>
  <text x="250" y="145" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">и, а, но, или, либо</text>
  <rect x="188" y="155" width="125" height="20" rx="5" fill="#D32F2F" opacity="0.1"/>
  <text x="250" y="170" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">что, чтобы, если, хотя</text>
  <text x="250" y="195" font-family="Arial,sans-serif" font-size="9" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Сочинительные /</text>
  <text x="250" y="208" font-family="Arial,sans-serif" font-size="9" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Подчинительные</text>
  <rect x="335" y="72" width="145" height="140" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="407" y="92" font-family="Arial,sans-serif" font-size="13" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Частицы</text>
  <text x="407" y="110" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Придают оттенки</text>
  <text x="407" y="122" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">значения словам</text>
  <rect x="345" y="130" width="125" height="20" rx="5" fill="#D32F2F" opacity="0.1"/>
  <text x="407" y="145" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">не, ни, же, ли, бы</text>
  <rect x="345" y="155" width="125" height="20" rx="5" fill="#D32F2F" opacity="0.1"/>
  <text x="407" y="170" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">даже, лишь, почти</text>
  <text x="407" y="195" font-family="Arial,sans-serif" font-size="9" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Формообразующие:</text>
  <text x="407" y="208" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">бы, пусть, давай</text>
  <rect x="20" y="220" width="460" height="55" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="250" y="238" font-family="Arial,sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Междометия и звукоподражания</text>
  <text x="250" y="258" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">Ой! Ах! Ура! Ку-ку! Мяу! — Не относятся ни к самостоятельным, ни к служебным</text>
  <rect x="20" y="282" width="460" height="30" rx="5" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="301" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Служебные части речи не называют предметы, признаки или действия</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-style="italic">Русский язык · 10 класс</text>
</svg>