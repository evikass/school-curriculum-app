<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00695C" text-anchor="middle">Экономика и её роль в жизни общества</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Обществознание — Урок 7</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#00695C" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-weight="bold">Экономика — система производства, распределения и потребления</text>
  <rect x="20" y="120" width="150" height="70" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="95" y="140" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-weight="bold">Что производить?</text>
  <text x="95" y="158" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="middle" font-weight="normal">Определение товаров</text>
  <text x="95" y="172" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="middle" font-weight="normal">и услуг</text>
  <rect x="175" y="120" width="150" height="70" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="250" y="140" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-weight="bold">Как производить?</text>
  <text x="250" y="158" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="middle" font-weight="normal">Технология и</text>
  <text x="250" y="172" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="middle" font-weight="normal">ресурсы</text>
  <rect x="330" y="120" width="150" height="70" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="405" y="140" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-weight="bold">Для кого?</text>
  <text x="405" y="158" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="middle" font-weight="normal">Распределение</text>
  <text x="405" y="172" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="middle" font-weight="normal">результата</text>
  <rect x="20" y="198" width="460" height="60" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="30" y="218" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="start" font-weight="bold">Факторы производства:</text>
  <text x="30" y="236" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Земля (природные ресурсы) · Труд (рабочая сила) · Капитал (средства производства)</text>
  <text x="30" y="250" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Предпринимательство · Информация</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#00695C" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-style="italic">Обществознание · 10 класс</text>
</svg>