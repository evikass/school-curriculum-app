<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Предел функции</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 15</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="10" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">Определение</text>
  <text x="250" y="93" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">lim(x→a) f(x) = L — f(x) приближается к L при x → a</text>
  <text x="250" y="107" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">a может не входить в D(f) — важны значения вблизи a</text>
  <rect x="12" y="121" width="476" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="138" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Непрерывность в точке a</text>
  <text x="250" y="155" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">1. f(a) определена</text>
  <text x="250" y="168" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">2. lim(x→a) f(x) существует</text>
  <text x="250" y="181" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">3. lim(x→a) f(x) = f(a)</text>
  <rect x="12" y="194" width="230" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="127" y="210" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Свойства пределов</text>
  <text x="127" y="226" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">lim(f+g) = lim f + lim g</text>
  <text x="127" y="239" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">lim(f·g) = lim f · lim g</text>
  <text x="127" y="252" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">lim(f/g) = lim f / lim g</text>
  <rect x="252" y="194" width="236" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="370" y="210" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">1-й замечательный</text>
  <text x="370" y="230" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold" font-family="Arial">lim(x→0) sin x/x = 1</text>
  <text x="370" y="250" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">sin 3x/x → 3, sin 5x/(5x) → 1</text>
  <rect x="12" y="267" width="476" height="45" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="284" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример</text>
  <text x="250" y="300" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">lim(x→2) (x²−4)/(x−2) = lim(x→2) (x+2) = 4</text>
  <text x="250" y="310" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">0/0 → разложи и сократи!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Предел функции — Мордкович А.Г., 10 класс</text>
</svg>