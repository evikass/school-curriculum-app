<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
<linearGradient id="funcGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#42A5F5"/><stop offset="100%" stop-color="#1E88E5"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Числовая функция</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Алгебра 10 класс — Урок 1</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0D47A1" stroke-width="1" opacity="0.3"/>

<!-- Function machine diagram -->
<g transform="translate(160,145)">
  <!-- Input x -->
  <rect x="-110" y="-20" width="50" height="40" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="-85" y="5" font-family="Arial,sans-serif" font-size="16" fill="#0D47A1" text-anchor="middle" font-weight="bold">x</text>

  <!-- Arrow in -->
  <line x1="-55" y1="0" x2="-25" y2="0" stroke="#1565C0" stroke-width="2"/>
  <polygon points="-25,-5 -15,0 -25,5" fill="#1565C0"/>

  <!-- Function box -->
  <rect x="-15" y="-30" width="90" height="60" rx="8" fill="url(#funcGrad)" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="30" y="-8" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">ПРАВИЛО</text>
  <text x="30" y="8" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">f</text>
  <text x="30" y="22" font-family="Arial,sans-serif" font-size="7" fill="#BBDEFB" text-anchor="middle">y = f(x)</text>

  <!-- Arrow out -->
  <line x1="80" y1="0" x2="110" y2="0" stroke="#1565C0" stroke-width="2"/>
  <polygon points="110,-5 120,0 110,5" fill="#1565C0"/>

  <!-- Output y -->
  <rect x="120" y="-20" width="50" height="40" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="145" y="5" font-family="Arial,sans-serif" font-size="16" fill="#0D47A1" text-anchor="middle" font-weight="bold">y</text>

  <!-- Labels -->
  <text x="-85" y="35" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">D(f)</text>
  <text x="145" y="35" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">E(f)</text>
</g>

<!-- Domain restrictions panel -->
<g transform="translate(90,220)">
  <rect x="0" y="0" width="150" height="90" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="75" y="14" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Ограничения для D(f)</text>
  <line x1="10" y1="20" x2="140" y2="20" stroke="#1565C0" stroke-width="0.5"/>

  <!-- Denominator icon -->
  <g transform="translate(20,35)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#FF9800" opacity="0.2" stroke="#E65100" stroke-width="0.8"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">1/x</text>
  </g>
  <text x="40" y="38" font-family="Arial,sans-serif" font-size="7" fill="#333">Знаменатель: x ≠ 0</text>

  <!-- Root icon -->
  <g transform="translate(20,52)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#4CAF50" opacity="0.2" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">√x</text>
  </g>
  <text x="40" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333">Корень: x ≥ 0</text>

  <!-- Log icon -->
  <g transform="translate(20,69)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#9C27B0" opacity="0.2" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle" font-weight="bold">ln x</text>
  </g>
  <text x="40" y="72" font-family="Arial,sans-serif" font-size="7" fill="#333">Логарифм: x > 0</text>

  <text x="75" y="86" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Несколько → пересечение!</text>
</g>

<!-- Methods panel -->
<g transform="translate(260,220)">
  <rect x="0" y="0" width="150" height="90" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="75" y="14" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Способы задания</text>
  <line x1="10" y1="20" x2="140" y2="20" stroke="#1565C0" stroke-width="0.5"/>

  <!-- Formula icon -->
  <g transform="translate(20,35)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#2196F3" opacity="0.2" stroke="#1565C0" stroke-width="0.8"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">f(x)</text>
  </g>
  <text x="40" y="38" font-family="Arial,sans-serif" font-size="7" fill="#333">Аналитический: y = 2x+3</text>

  <!-- Table icon -->
  <g transform="translate(20,52)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#FF5722" opacity="0.2" stroke="#D84315" stroke-width="0.8"/>
    <rect x="-5" y="-5" width="4" height="4" fill="#D84315" opacity="0.5"/>
    <rect x="1" y="-5" width="4" height="4" fill="#D84315" opacity="0.5"/>
    <rect x="-5" y="1" width="4" height="4" fill="#D84315" opacity="0.5"/>
    <rect x="1" y="1" width="4" height="4" fill="#D84315" opacity="0.5"/>
  </g>
  <text x="40" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333">Табличный: таблица</text>

  <!-- Graph icon -->
  <g transform="translate(20,69)">
    <rect x="-8" y="-8" width="16" height="16" rx="3" fill="#4CAF50" opacity="0.2" stroke="#2E7D32" stroke-width="0.8"/>
    <path d="M-5,5 Q0,-5 5,0 Q7,2 8,-3" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  </g>
  <text x="40" y="72" font-family="Arial,sans-serif" font-size="7" fill="#333">Графический: график</text>

  <text x="75" y="86" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">4. Словесный: описанием</text>
</g>

<!-- Parabola mini-graph -->
<g transform="translate(430,135)">
  <rect x="-35" y="-55" width="70" height="110" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="-40" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Пример</text>
  <!-- Axes -->
  <line x1="-20" y1="35" x2="25" y2="35" stroke="#666" stroke-width="0.8"/>
  <line x1="-15" y1="-30" x2="-15" y2="40" stroke="#666" stroke-width="0.8"/>
  <!-- Parabola y=x² -->
  <path d="M-20,35 Q-15,25 -10,10 Q-5,0 0,-10 Q5,0 10,10 Q15,25 20,35" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle">y = x²</text>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">E(f) = [0;+∞)</text>
</g>

<rect x="10" y="320" width="480" height="22" rx="4" fill="#0D47A1" opacity="0.85"/>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">y = f(x): каждому x из D(f) → единственное y из E(f)</text>
</svg>