<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle">Синус, косинус, тангенс, котангенс</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Алгебра 10 класс — Урок 5</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0D47A1" stroke-width="1" opacity="0.3"/>

<!-- Unit circle with sin/cos -->
<g transform="translate(140,175)">
  <!-- Axes -->
  <line x1="-90" y1="0" x2="90" y2="0" stroke="#666" stroke-width="0.8"/>
  <line x1="0" y1="-90" x2="0" y2="90" stroke="#666" stroke-width="0.8"/>

  <!-- Circle -->
  <circle cx="0" cy="0" r="70" fill="#1E88E5" opacity="0.08" stroke="#0D47A1" stroke-width="1.5"/>

  <!-- Angle point M -->
  <circle cx="49" cy="-49" r="3" fill="#F44336"/>
  <text x="55" y="-52" font-family="Arial,sans-serif" font-size="8" fill="#F44336" font-weight="bold">M(t)</text>

  <!-- Radius line -->
  <line x1="0" y1="0" x2="49" y2="-49" stroke="#0D47A1" stroke-width="1.5"/>

  <!-- cos t = x projection -->
  <line x1="49" y1="-49" x2="49" y2="0" stroke="#4CAF50" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="0" y1="0" x2="49" y2="0" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="25" y="12" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" font-weight="bold">cos t</text>

  <!-- sin t = y projection -->
  <line x1="0" y1="0" x2="0" y2="-49" stroke="#F44336" stroke-width="2.5"/>
  <line x1="0" y1="-49" x2="49" y2="-49" stroke="#F44336" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="-20" y="-25" font-family="Arial,sans-serif" font-size="8" fill="#F44336" font-weight="bold">sin t</text>

  <!-- Angle arc -->
  <path d="M20,0 A20,20 0 0,0 14,-14" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <text x="22" y="-8" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" font-weight="bold">t</text>

  <text x="0" y="85" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">sin t = y, cos t = x</text>
</g>

<!-- Table of values -->
<g transform="translate(330,110)">
  <rect x="-95" y="-40" width="190" height="80" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Табличные значения</text>

  <text x="-80" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#666">t</text>
  <text x="-40" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#F44336">sin t</text>
  <text x="10" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">cos t</text>
  <text x="55" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#FF9800">tg t</text>

  <line x1="-90" y1="-4" x2="90" y2="-4" stroke="#1565C0" stroke-width="0.3"/>

  <text x="-80" y="4" font-family="Arial,sans-serif" font-size="6" fill="#333">π/6</text>
  <text x="-40" y="4" font-family="Arial,sans-serif" font-size="6" fill="#333">1/2</text>
  <text x="10" y="4" font-family="Arial,sans-serif" font-size="6" fill="#333">√3/2</text>
  <text x="55" y="4" font-family="Arial,sans-serif" font-size="6" fill="#333">√3/3</text>

  <text x="-80" y="14" font-family="Arial,sans-serif" font-size="6" fill="#333">π/4</text>
  <text x="-40" y="14" font-family="Arial,sans-serif" font-size="6" fill="#333">√2/2</text>
  <text x="10" y="14" font-family="Arial,sans-serif" font-size="6" fill="#333">√2/2</text>
  <text x="55" y="14" font-family="Arial,sans-serif" font-size="6" fill="#333">1</text>

  <text x="-80" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">π/3</text>
  <text x="-40" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">√3/2</text>
  <text x="10" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">1/2</text>
  <text x="55" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">√3</text>

  <text x="0" y="35" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle" font-weight="bold">sin: √0/2, √1/2, √2/2, √3/2, √4/2</text>
</g>

<!-- Signs by quarters -->
<g transform="translate(330,215)">
  <rect x="-60" y="-30" width="120" height="60" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="-16" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Знаки по четвертям</text>
  <text x="-35" y="-2" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">I: все +</text>
  <text x="30" y="-2" font-family="Arial,sans-serif" font-size="6" fill="#F44336">II: sin +</text>
  <text x="-35" y="10" font-family="Arial,sans-serif" font-size="6" fill="#FF9800">III: tg+</text>
  <text x="30" y="10" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0">IV: cos+</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Все, Син, Тан, Кос</text>
</g>

<!-- Main identity -->
<g transform="translate(200,290)">
  <rect x="-140" y="-20" width="280" height="40" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1.5"/>
  <text x="0" y="-4" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold">Основное тождество</text>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">sin²t + cos²t = 1</text>
</g>

<rect x="10" y="320" width="480" height="22" rx="4" fill="#0D47A1" opacity="0.85"/>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">sin — нечётная, cos — чётная, tg и ctg — нечётные</text>
</svg>