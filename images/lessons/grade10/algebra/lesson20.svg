<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Применение производной</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 20</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Монотонность</text>
  <text x="250" y="93" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">f'(x) > 0 → возрастает | f'(x) &lt; 0 → убывает</text>
  <text x="250" y="108" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Критические точки: f'(x) = 0 или f'(x) не существует</text>
  <rect x="12" y="121" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="138" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Экстремумы</text>
  <text x="250" y="155" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f' меняет знак + → − : максимум</text>
  <text x="250" y="168" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f' меняет знак − → + : минимум</text>
  <rect x="12" y="184" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="201" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Наибольшее и наименьшее на [a; b]</text>
  <text x="250" y="218" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">1. Найти критические точки внутри (a; b)</text>
  <text x="250" y="231" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">2. Вычислить f во всех критических и на концах</text>
  <text x="250" y="234" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial"></text>
  <rect x="12" y="247" width="476" height="63" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="264" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример: f(x) = x³ − 3x² + 4</text>
  <text x="250" y="280" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f'(x) = 3x(x−2), крит.точки: x=0, x=2</text>
  <text x="250" y="295" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">x=0: max (f=4) | x=2: min (f=0)</text>
  <text x="250" y="308" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">↑ на (−∞;0)∪(2;+∞), ↓ на (0;2)</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Применение производной — Мордкович А.Г., 10 класс</text>
</svg>