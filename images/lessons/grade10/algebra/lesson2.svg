<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#2c3e50" font-weight="bold">АЛГЕБРА · 10 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#34495e" font-weight="bold">Степень с рациональным показателем</text>
  
  <!-- Номер урока -->
  <rect x="20" y="15" width="35" height="25" fill="#3498db" rx="3"/>
  <text x="37.5" y="32" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Урок 12</text>
  
  <!-- Определение - заголовок -->
  <rect x="40" y="80" width="420" height="30" fill="#e74c3c" rx="5" opacity="0.8"/>
  <text x="250" y="100" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="bold">Определение</text>
  
  <!-- Определение - формула 1 -->
  <rect x="60" y="120" width="380" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="250" y="145" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">a^(1/n) = ⁿ√a</text>
  
  <!-- Определение - формула 2 -->
  <rect x="60" y="170" width="380" height="50" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="250" y="195" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">a^(m/n) = ⁿ√(aᵐ) = (ⁿ√a)ᵐ</text>
  
  <!-- Примеры - заголовок -->
  <rect x="40" y="240" width="420" height="30" fill="#16a085" rx="5" opacity="0.8"/>
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="bold">Примеры</text>
  
  <!-- Пример 1 -->
  <rect x="60" y="280" width="100" height="50" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="110" y="300" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">8^(1/3)</text>
  <text x="110" y="315" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">= ³√8 = 2</text>
  
  <!-- Пример 2 -->
  <rect x="180" y="280" width="140" height="50" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">16^(3/4)</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">= ⁴√(16³) = ⁴√4096 = 8</text>
  
  <!-- Пример 3 -->
  <rect x="340" y="280" width="100" height="50" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="390" y="300" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">9^(-1/2)</text>
  <text x="390" y="315" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">= 1/√9 = 1/3</text>
  
  <!-- Свойства - заголовок -->
  <rect x="40" y="340" width="420" height="30" fill="#8e44ad" rx="5" opacity="0.8"/>
  <text x="250" y="360" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="white" font-weight="bold">Свойства степени с рациональным показателем</text>
  
  <!-- График функции y = x^(1/2) -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="140" height="120" fill="none" stroke="#95a5a6" stroke-width="1"/>
    <line x1="0" y1="120" x2="140" y2="120" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="#7f8c8d" stroke-width="1"/>
    
    <path d="M 0,120 Q 35,85 70,60 T 140,0" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Точки на графике -->
    <circle cx="35" cy="85" r="3" fill="#e74c3c"/>
    <circle cx="70" cy="60" r="3" fill="#e74c3c"/>
    <circle cx="105" cy="35" r="3" fill="#e74c3c"/>
    
    <!-- Подписи осей -->
    <text x="70" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">x</text>
    <text x="5" y="5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">y</text>
    <text x="70" y="105" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">1</text>
    <text x="140" y="105" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">4</text>
    <text x="105" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">2</text>
    
    <!-- Название графика -->
    <text x="70" y="-5" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50" font-weight="bold">y = x^(1/2)</text>
  </g>
  
  <!-- График функции y = x^3 -->
  <g transform="translate(320, 130)">
    <rect x="0" y="0" width="140" height="120" fill="none" stroke="#95a5a6" stroke-width="1"/>
    <line x1="0" y1="60" x2="140" y2="60" stroke="#7f8c8d" stroke-width="1"/>
    <line x1="70" y1="0" x2="70" y2="120" stroke="#7f8c8d" stroke-width="1"/>
    
    <path d="M 0,115 Q 35,100 70,60 T 140,5" fill="none" stroke="#16a085" stroke-width="2"/>
    <path d="M 70,60 Q 35,80 0,95" fill="none" stroke="#16a085" stroke-width="2"/>
    
    <!-- Точки на графике -->
    <circle cx="35" cy="80" r="3" fill="#16a085"/>
    <circle cx="105" cy="20" r="3" fill="#16a085"/>
    
    <!-- Подписи осей -->
    <text x="70" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">x</text>
    <text x="5" y="5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">y</text>
    <text x="35" y="65" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">-1</text>
    <text x="105" y="65" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">1</text>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">1</text>
    <text x="75" y="95" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">-1</text>
    
    <!-- Название графика -->
    <text x="70" y="-5" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50" font-weight="bold">y = x^3</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="25" cy="25" r="8" fill="#3498db" opacity="0.3"/>
  <circle cx="475" cy="25" r="8" fill="#e74c3c" opacity="0.3"/>
  <circle cx="25" cy="325" r="8" fill="#16a085" opacity="0.3"/>
  <circle cx="475" cy="325" r="8" fill="#8e44ad" opacity="0.3"/>
  
  <!-- Свойство 1 -->
  <rect x="40" y="180" width="200" height="25" fill="#f39c12" rx="3" opacity="0.8"/>
  <text x="140" y="197" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">a^r × a^s = a^(r+s)</text>
  
  <!-- Пример свойства 1 -->
  <rect x="250" y="180" width="200" height="25" fill="#f39c12" rx="3" opacity="0.8"/>
  <text x="350" y="197" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">2^(1/2) × 2^(1/2) = 2^1 = 2</text>
  
  <!-- Уравнение корней -->
  <rect x="60" y="215" width="380" height="20" fill="#34495e" rx="3" opacity="0.1"/>
  <text x="250" y="228" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">√a = a^(1/2), ³√a = a^(1/3), ⁿ√a = a^(1/n)</text>
  
  <!-- Дополнительный пример с дробным показателем -->
  <rect x="250" y="250" width="170" height="45" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="335" y="268" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">27^(2/3) = (³√27)² = 3² = 9</text>
  <text x="335" y="283" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Пример решения</text>
</svg>