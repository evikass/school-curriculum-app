<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="pl18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCC80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFA726" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arr18" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#E65100"/>
    </marker>
    <marker id="arr18b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr18g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#4CAF50"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg18)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="serif">Сложение и вычитание векторов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 18</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF5722" stroke-width="1" opacity="0.3"/>
  <!-- Triangle Rule Panel -->
  <rect x="12" y="58" width="235" height="140" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Правило треугольника</text>
  <!-- 3D coordinate hints -->
  <line x1="35" y1="180" x2="220" y2="180" stroke="#FFCC80" stroke-width="0.8"/>
  <line x1="35" y1="180" x2="35" y2="90" stroke="#FFCC80" stroke-width="0.8"/>
  <!-- Vector a -->
  <line x1="40" y1="175" x2="130" y2="125" stroke="#E65100" stroke-width="2.2" marker-end="url(#arr18)"/>
  <text x="75" y="143" font-size="9" fill="#E65100" font-style="italic" font-weight="bold">a</text>
  <!-- Vector b -->
  <line x1="130" y1="125" x2="195" y2="165" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arr18b)"/>
  <text x="170" y="138" font-size="9" fill="#1565C0" font-style="italic" font-weight="bold">b</text>
  <!-- Result vector a+b -->
  <line x1="40" y1="175" x2="195" y2="165" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr18g)" stroke-dasharray="6,3"/>
  <text x="120" y="178" font-size="9" fill="#4CAF50" font-style="italic" font-weight="bold">a + b</text>
  <!-- Point labels -->
  <circle cx="40" cy="175" r="2" fill="#E65100"/>
  <circle cx="130" cy="125" r="2" fill="#555"/>
  <circle cx="195" cy="165" r="2" fill="#1565C0"/>
  <text x="35" y="188" font-size="7" fill="#555">A</text>
  <text x="127" y="120" font-size="7" fill="#555">B</text>
  <text x="198" y="165" font-size="7" fill="#555">C</text>
  <text x="100" y="192" font-size="8" fill="#E65100" font-weight="bold" font-family="serif">AB + BC = AC</text>
  <!-- Parallelogram Rule Panel -->
  <rect x="255" y="58" width="233" height="140" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Правило параллелограмма</text>
  <!-- Vectors from common origin -->
  <line x1="310" y1="175" x2="400" y2="125" stroke="#E65100" stroke-width="2.2" marker-end="url(#arr18)"/>
  <line x1="310" y1="175" x2="375" y2="175" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arr18b)"/>
  <!-- Parallel copies -->
  <line x1="400" y1="125" x2="465" y2="175" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="375" y1="175" x2="465" y2="175" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Result diagonal -->
  <line x1="310" y1="175" x2="465" y2="175" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr18g)"/>
  <!-- Parallelogram fill -->
  <path d="M310,175 L400,125 L465,175 L375,175 Z" fill="#FFE0B2" fill-opacity="0.3" stroke="none"/>
  <text x="345" y="145" font-size="9" fill="#E65100" font-style="italic" font-weight="bold">a</text>
  <text x="340" y="183" font-size="9" fill="#1565C0" font-style="italic" font-weight="bold">b</text>
  <text x="395" y="172" font-size="9" fill="#4CAF50" font-style="italic" font-weight="bold">a + b</text>
  <circle cx="310" cy="175" r="2" fill="#E65100"/>
  <text x="302" y="183" font-size="7" fill="#555">O</text>
  <!-- Subtraction Panel -->
  <rect x="12" y="206" width="170" height="102" rx="6" fill="white" opacity="0.88" stroke="#FF5722" stroke-width="1"/>
  <text x="97" y="222" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Вычитание</text>
  <line x1="30" y1="265" x2="110" y2="240" stroke="#E65100" stroke-width="2" marker-end="url(#arr18)"/>
  <line x1="30" y1="265" x2="80" y2="290" stroke="#1565C0" stroke-width="2" marker-end="url(#arr18b)"/>
  <line x1="80" y1="290" x2="110" y2="240" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arr18)"/>
  <text x="75" y="245" font-size="8" fill="#E65100" font-style="italic">a</text>
  <text x="45" y="282" font-size="8" fill="#1565C0" font-style="italic">b</text>
  <text x="95" y="270" font-size="8" fill="#7B1FA2" font-style="italic">a-b</text>
  <text x="30" y="300" font-size="7" fill="#E65100" font-family="serif">a - b = a + (-b)</text>
  <!-- Polygon Rule Panel -->
  <rect x="190" y="206" width="170" height="102" rx="6" fill="white" opacity="0.88" stroke="#FF5722" stroke-width="1"/>
  <text x="275" y="222" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Правило многоугольника</text>
  <line x1="210" y1="280" x2="245" y2="250" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr18)"/>
  <line x1="245" y1="250" x2="295" y2="255" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr18b)"/>
  <line x1="295" y1="255" x2="330" y2="240" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr18g)"/>
  <line x1="210" y1="280" x2="330" y2="240" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arr18)" stroke-dasharray="5,3"/>
  <text x="220" y="260" font-size="7" fill="#E65100" font-style="italic">a</text>
  <text x="268" y="247" font-size="7" fill="#1565C0" font-style="italic">b</text>
  <text x="315" y="247" font-size="7" fill="#4CAF50" font-style="italic">c</text>
  <text x="275" y="268" font-size="7" fill="#7B1FA2" font-style="italic">a+b+c</text>
  <text x="210" y="300" font-size="7" fill="#555" font-family="sans-serif">Сумма = замыкающий вектор</text>
  <!-- Properties Panel -->
  <rect x="368" y="206" width="120" height="102" rx="6" fill="white" opacity="0.88" stroke="#FF5722" stroke-width="1"/>
  <text x="428" y="222" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Свойства</text>
  <text x="378" y="237" font-size="7" fill="#555" font-family="sans-serif">1. a + b = b + a</text>
  <text x="378" y="249" font-size="7" fill="#555" font-family="sans-serif">2. (a+b)+c = a+(b+c)</text>
  <text x="378" y="261" font-size="7" fill="#555" font-family="sans-serif">3. a + 0 = a</text>
  <text x="378" y="273" font-size="7" fill="#555" font-family="sans-serif">4. a + (-a) = 0</text>
  <text x="378" y="285" font-size="7" fill="#555" font-family="sans-serif">5. Правила те же,</text>
  <text x="378" y="297" font-size="7" fill="#E65100" font-weight="bold" font-family="sans-serif">   но в 3D!</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#FF5722" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Треугольник: AB+BC=AC | Параллелограмм: a+b = диагональ | a-b = a+(-b)</text>
</svg>