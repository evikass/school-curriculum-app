<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
<marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#06B6D4"/>
</marker>
<marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#164E63"/>
</marker>
<marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#22D3EE"/>
</marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Сложение и вычитание векторов</text>

<!-- Triangle rule (left side) -->
<text x="150" y="65" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Правило треугольника</text>

<!-- Vector a -->
<line x1="60" y1="200" x2="160" y2="130" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrowCyan)"/>
<text x="100" y="155" font-size="14" fill="#06B6D4" font-weight="bold">a⃗</text>

<!-- Vector b -->
<line x1="160" y1="130" x2="260" y2="190" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrowTeal)"/>
<text x="215" y="148" font-size="14" fill="#22D3EE" font-weight="bold">b⃗</text>

<!-- Result vector a+b -->
<line x1="60" y1="200" x2="260" y2="190" stroke="#164E63" stroke-width="2.5" marker-end="url(#arrowDark)" stroke-dasharray="8,4"/>
<text x="150" y="210" font-size="14" fill="#164E63" font-weight="bold">a⃗+b⃗</text>

<!-- Points -->
<circle cx="60" cy="200" r="3" fill="#164E63"/>
<text x="48" y="205" font-size="11" fill="#164E63">A</text>
<circle cx="160" cy="130" r="3" fill="#164E63"/>
<text x="165" y="125" font-size="11" fill="#164E63">B</text>
<circle cx="260" cy="190" r="3" fill="#164E63"/>
<text x="265" y="187" font-size="11" fill="#164E63">C</text>

<!-- Parallelogram rule (right side) -->
<text x="390" y="65" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Правило параллелограмма</text>

<!-- Vector a from common origin -->
<line x1="320" y1="200" x2="420" y2="130" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrowCyan)"/>
<text x="365" y="155" font-size="14" fill="#06B6D4" font-weight="bold">a⃗</text>

<!-- Vector b from common origin -->
<line x1="320" y1="200" x2="400" y2="240" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrowTeal)"/>
<text x="348" y="230" font-size="14" fill="#22D3EE" font-weight="bold">b⃗</text>

<!-- Parallel copy of b -->
<line x1="420" y1="130" x2="500" y2="170" stroke="#22D3EE" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowTeal)"/>

<!-- Parallel copy of a -->
<line x1="400" y1="240" x2="500" y2="170" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>

<!-- Diagonal (result) -->
<line x1="320" y1="200" x2="500" y2="170" stroke="#164E63" stroke-width="2.5" marker-end="url(#arrowDark)"/>
<text x="400" y="195" font-size="13" fill="#164E63" font-weight="bold">a⃗+b⃗</text>

<!-- Common origin point -->
<circle cx="320" cy="200" r="3" fill="#164E63"/>
<text x="308" y="205" font-size="11" fill="#164E63">O</text>

<!-- Subtraction section -->
<text x="250" y="280" text-anchor="middle" font-size="12" fill="#06B6D4" font-weight="bold">Вычитание: a⃗ − b⃗ = a⃗ + (−b⃗)</text>

<!-- Subtraction illustration -->
<line x1="60" y1="310" x2="160" y2="295" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
<text x="100" y="293" font-size="12" fill="#06B6D4" font-weight="bold">a⃗</text>

<line x1="160" y1="295" x2="80" y2="320" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
<text x="110" y="318" font-size="12" fill="#22D3EE" font-weight="bold">−b⃗</text>

<line x1="60" y1="310" x2="80" y2="320" stroke="#164E63" stroke-width="2" marker-end="url(#arrowDark)" stroke-dasharray="6,3"/>
<text x="55" y="330" font-size="12" fill="#164E63" font-weight="bold">a⃗−b⃗</text>
</svg>