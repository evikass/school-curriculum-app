<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Площадь поверхности призмы</text>

<!-- Hexagonal prism (simplified as rectangular with visible front) -->
<!-- Back edges dashed -->
<line x1="150" y1="110" x2="150" y2="250" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="250" y1="95" x2="250" y2="235" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Top back edge -->
<line x1="150" y1="110" x2="250" y2="95" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Bottom back edge -->
<line x1="150" y1="250" x2="250" y2="235" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Front face -->
<polygon points="170,135 310,120 310,260 170,275" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-width="2"/>

<!-- Top face -->
<polygon points="150,110 290,95 310,120 170,135" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="2"/>

<!-- Visible connecting edges -->
<line x1="170" y1="135" x2="150" y2="110" stroke="#22D3EE" stroke-width="2"/>
<line x1="310" y1="120" x2="290" y2="95" stroke="#22D3EE" stroke-width="2"/>
<line x1="310" y1="260" x2="290" y2="235" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="290" y1="95" x2="290" y2="235" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="170" y1="275" x2="150" y2="250" stroke="#22D3EE" stroke-width="2"/>

<!-- Dimension labels -->
<!-- Height H -->
<line x1="370" y1="120" x2="370" y2="260" stroke="#06B6D4" stroke-width="1.5"/>
<polygon points="370,120 366,130 374,130" fill="#06B6D4"/>
<polygon points="370,260 366,250 374,250" fill="#06B6D4"/>
<text x="382" y="195" font-size="14" fill="#06B6D4" font-weight="bold">H</text>

<!-- Base side a -->
<line x1="170" y1="275" x2="310" y2="260" stroke="#164E63" stroke-width="0" />
<text x="230" y="290" font-size="12" fill="#164E63">a</text>

<!-- Base side b -->
<text x="140" y="210" font-size="12" fill="#164E63">b</text>

<!-- Formula box -->
<rect x="30" y="65" width="200" height="70" fill="white" fill-opacity="0.9" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
<text x="130" y="85" text-anchor="middle" font-size="12" fill="#164E63" font-weight="bold">Формулы площади:</text>
<text x="130" y="103" text-anchor="middle" font-size="12" fill="#06B6D4" font-weight="bold">Sбок = P · H</text>
<text x="130" y="120" text-anchor="middle" font-size="12" fill="#22D3EE" font-weight="bold">Sполн = Sбок + 2Sосн</text>

<!-- Base area label -->
<text x="230" y="142" font-size="11" fill="#164E63">Sосн</text>

<!-- Theorem text -->
<text x="250" y="318" text-anchor="middle" font-size="11" fill="#164E63">Sбок — сумма площадей боковых граней</text>
<text x="250" y="336" text-anchor="middle" font-size="11" fill="#164E63">P — периметр основания, H — высота призмы</text>
</svg>