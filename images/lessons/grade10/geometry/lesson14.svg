<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="face14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FA8DA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg14)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="serif">Площадь поверхности призмы</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 14</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3F51B5" stroke-width="1" opacity="0.3"/>
  <!-- 3D Prism Panel -->
  <rect x="12" y="58" width="170" height="175" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2"/>
  <text x="97" y="74" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="serif">Прямая призма</text>
  <!-- 3D right prism -->
  <path d="M45,220 L105,220 L105,155 L45,155 Z" fill="url(#face14)" stroke="#1A237E" stroke-width="1.2"/>
  <line x1="45" y1="155" x2="65" y2="138" stroke="#1A237E" stroke-width="1.2"/>
  <line x1="105" y1="155" x2="125" y2="138" stroke="#1A237E" stroke-width="1.2"/>
  <line x1="105" y1="220" x2="125" y2="203" stroke="#1A237E" stroke-width="1.2"/>
  <path d="M45,155 L65,138 L125,138 L105,155 Z" fill="#C5CAE9" fill-opacity="0.4" stroke="#1A237E" stroke-width="1"/>
  <path d="M105,155 L125,138 L125,203 L105,220 Z" fill="#9FA8DA" fill-opacity="0.3" stroke="#1A237E" stroke-width="1"/>
  <line x1="45" y1="220" x2="65" y2="203" stroke="#1A237E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="65" y1="203" x2="125" y2="203" stroke="#1A237E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="65" y1="203" x2="65" y2="138" stroke="#1A237E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Height arrow -->
  <line x1="32" y1="220" x2="32" y2="155" stroke="#E53935" stroke-width="1.5"/>
  <line x1="28" y1="220" x2="36" y2="220" stroke="#E53935" stroke-width="0.8"/>
  <line x1="28" y1="155" x2="36" y2="155" stroke="#E53935" stroke-width="0.8"/>
  <text x="24" y="190" font-size="8" fill="#E53935" font-style="italic">h</text>
  <!-- Base labels -->
  <text x="75" y="228" font-size="7" fill="#1A237E" font-style="italic">a</text>
  <text x="110" y="190" font-size="7" fill="#1A237E" font-style="italic">b</text>
  <!-- Net/Unfolded Panel -->
  <rect x="190" y="58" width="298" height="175" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2"/>
  <text x="339" y="74" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="serif">Развёртка призмы</text>
  <!-- Unfolded net of triangular prism -->
  <!-- Bottom base -->
  <path d="M230,195 L270,195 L260,165 Z" fill="#C5CAE9" fill-opacity="0.5" stroke="#1A237E" stroke-width="1"/>
  <text x="250" y="205" font-size="7" fill="#1A237E" font-family="serif">S_base</text>
  <!-- Side faces unfolded -->
  <rect x="290" y="130" width="35" height="65" rx="1" fill="url(#face14)" stroke="#1A237E" stroke-width="1"/>
  <rect x="325" y="130" width="35" height="65" rx="1" fill="#E8EAF6" stroke="#1A237E" stroke-width="1"/>
  <rect x="360" y="130" width="35" height="65" rx="1" fill="url(#face14)" stroke="#1A237E" stroke-width="1"/>
  <text x="307" y="165" font-size="6" fill="#1A237E" text-anchor="middle">S1</text>
  <text x="342" y="165" font-size="6" fill="#1A237E" text-anchor="middle">S2</text>
  <text x="377" y="165" font-size="6" fill="#1A237E" text-anchor="middle">S3</text>
  <!-- Top base -->
  <path d="M420,165 L460,165 L450,135 Z" fill="#C5CAE9" fill-opacity="0.5" stroke="#1A237E" stroke-width="1"/>
  <text x="445" y="175" font-size="7" fill="#1A237E" font-family="serif">S_base</text>
  <!-- Labels on side faces -->
  <text x="307" y="125" font-size="6" fill="#555" text-anchor="middle">a</text>
  <text x="342" y="125" font-size="6" fill="#555" text-anchor="middle">b</text>
  <text x="377" y="125" font-size="6" fill="#555" text-anchor="middle">c</text>
  <text x="325" y="120" font-size="7" fill="#555" text-anchor="middle">P = a+b+c</text>
  <!-- h arrow on side faces -->
  <line x1="398" y1="195" x2="398" y2="130" stroke="#E53935" stroke-width="1"/>
  <text x="403" y="165" font-size="6" fill="#E53935" font-style="italic">h</text>
  <!-- Formulas Panel -->
  <rect x="12" y="242" width="240" height="68" rx="6" fill="white" opacity="0.88" stroke="#3F51B5" stroke-width="1"/>
  <text x="132" y="258" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="serif">Формулы</text>
  <text x="22" y="273" font-size="9" fill="#1A237E" font-weight="bold" font-family="serif">S = S бок + 2 * S осн</text>
  <text x="22" y="288" font-size="9" fill="#1A237E" font-weight="bold" font-family="serif">S бок = P осн * h</text>
  <text x="22" y="303" font-size="7.5" fill="#555" font-family="sans-serif">(для прямой призмы)</text>
  <!-- Example Panel -->
  <rect x="260" y="242" width="228" height="68" rx="6" fill="white" opacity="0.88" stroke="#3F51B5" stroke-width="1"/>
  <text x="374" y="258" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="serif">Пример</text>
  <text x="270" y="273" font-size="7.5" fill="#555" font-family="sans-serif">Прав. треуг. призма: a=4, h=6</text>
  <text x="270" y="286" font-size="7.5" fill="#555" font-family="sans-serif">P = 3*4 = 12</text>
  <text x="270" y="299" font-size="7.5" fill="#555" font-family="sans-serif">S бок = 12 * 6 = 72</text>
  <text x="370" y="286" font-size="7.5" fill="#555" font-family="sans-serif">S осн = (sqrt3/4)*16</text>
  <text x="370" y="299" font-size="7.5" fill="#555" font-family="sans-serif">= 4*sqrt3</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#3F51B5" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">S полн = S бок + 2 * S осн; S бок = P * h (прямая призма)</text>
</svg>