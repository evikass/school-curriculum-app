<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
<marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#06B6D4"/>
</marker>
<marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#164E63"/>
</marker>
<marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#22D3EE"/>
</marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="15" font-weight="bold" fill="#164E63">Разложение вектора по трём некомпланарным векторам</text>

<!-- 3D coordinate system -->
<line x1="100" y1="280" x2="280" y2="280" stroke="#164E63" stroke-width="1.5" marker-end="url(#arrowDark)"/>
<line x1="100" y1="280" x2="100" y2="100" stroke="#164E63" stroke-width="1.5" marker-end="url(#arrowDark)"/>
<line x1="100" y1="280" x2="30" y2="330" stroke="#164E63" stroke-width="1.5" marker-end="url(#arrowDark)"/>

<!-- Axis labels -->
<text x="290" y="285" font-size="12" fill="#06B6D4" font-weight="bold">i⃗</text>
<text x="105" y="95" font-size="12" fill="#06B6D4" font-weight="bold">j⃗</text>
<text x="18" y="335" font-size="12" fill="#06B6D4" font-weight="bold">k⃗</text>

<!-- Origin -->
<text x="107" y="296" font-size="11" fill="#164E63">O</text>
<circle cx="100" cy="280" r="3" fill="#164E63"/>

<!-- Vector i (along x) -->
<line x1="100" y1="280" x2="250" y2="280" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrowCyan)" opacity="0.7"/>

<!-- Vector j (along y) -->
<line x1="100" y1="280" x2="100" y2="140" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrowTeal)" opacity="0.7"/>

<!-- Vector k (along z - into page) -->
<line x1="100" y1="280" x2="50" y2="310" stroke="#164E63" stroke-width="3" marker-end="url(#arrowDark)" opacity="0.7"/>

<!-- Vector p (general vector) -->
<line x1="100" y1="280" x2="320" y2="150" stroke="#164E63" stroke-width="3" marker-end="url(#arrowDark)"/>
<text x="328" y="148" font-size="14" fill="#164E63" font-weight="bold">p⃗</text>

<!-- Projection lines -->
<!-- x component -->
<line x1="100" y1="280" x2="260" y2="280" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowCyan)"/>
<text x="175" y="275" font-size="11" fill="#06B6D4">x·i⃗</text>

<!-- Dashed from end of x to end of p -->
<line x1="260" y1="280" x2="320" y2="150" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- y component from end of x -->
<line x1="260" y1="280" x2="260" y2="175" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrowTeal)"/>
<text x="270" y="225" font-size="11" fill="#22D3EE">y·j⃗</text>

<!-- Dashed from end of x+y to end of p -->
<line x1="260" y1="175" x2="320" y2="150" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- z component from end of x+y -->
<line x1="260" y1="175" x2="320" y2="150" stroke="#164E63" stroke-width="2"/>
<text x="290" y="152" font-size="11" fill="#164E63">z·k⃗</text>

<!-- Formula box -->
<rect x="340" y="60" width="145" height="80" fill="white" fill-opacity="0.9" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
<text x="412" y="80" text-anchor="middle" font-size="12" fill="#164E63" font-weight="bold">Теорема:</text>
<text x="412" y="100" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">p⃗ = x·i⃗ + y·j⃗</text>
<text x="412" y="118" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">  + z·k⃗</text>
<text x="412" y="135" text-anchor="middle" font-size="10" fill="#164E63">(разложение единственно)</text>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">Любой вектор можно разложить по трём</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">некомпланарным векторам, причём единственным образом.</text>
<text x="250" y="348" text-anchor="middle" font-size="10" fill="#06B6D4">p⃗ = x·a⃗ + y·b⃗ + z·c⃗, где a⃗, b⃗, c⃗ — некомпланарны</text>
</svg>