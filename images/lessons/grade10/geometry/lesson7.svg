<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Тетраэдр и параллелепипед</text>

<!-- Tetrahedron (left side) -->
<text x="130" y="65" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Тетраэдр</text>

<!-- Back edge (dashed) -->
<line x1="80" y1="220" x2="180" y2="100" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="80" y1="220" x2="180" y2="240" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Visible edges -->
<line x1="80" y1="220" x2="130" y2="140" stroke="#22D3EE" stroke-width="2"/>
<line x1="180" y1="100" x2="130" y2="140" stroke="#22D3EE" stroke-width="2"/>
<line x1="180" y1="240" x2="130" y2="140" stroke="#22D3EE" stroke-width="2"/>
<line x1="180" y1="100" x2="180" y2="240" stroke="#22D3EE" stroke-width="2"/>

<!-- Base -->
<line x1="80" y1="220" x2="180" y2="240" stroke="#22D3EE" stroke-width="1.5"/>

<!-- Face shading -->
<polygon points="130,140 80,220 180,240" fill="#22D3EE" fill-opacity="0.1"/>

<!-- Vertex labels -->
<text x="125" y="133" font-size="11" fill="#164E63" font-weight="bold">D</text>
<text x="68" y="228" font-size="11" fill="#164E63" font-weight="bold">A</text>
<text x="184" y="97" font-size="11" fill="#164E63" font-weight="bold">B</text>
<text x="184" y="248" font-size="11" fill="#164E63" font-weight="bold">C</text>

<!-- Parallelepiped (right side) -->
<text x="370" y="65" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Параллелепипед</text>

<!-- Back face (dashed) -->
<line x1="310" y1="130" x2="420" y2="120" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="310" y1="130" x2="310" y2="240" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="310" y1="240" x2="420" y2="230" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Visible edges -->
<line x1="420" y1="120" x2="460" y2="160" stroke="#22D3EE" stroke-width="2"/>
<line x1="310" y1="130" x2="350" y2="170" stroke="#22D3EE" stroke-width="2"/>
<line x1="420" y1="230" x2="460" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="310" y1="240" x2="350" y2="280" stroke="#22D3EE" stroke-width="2"/>
<line x1="420" y1="120" x2="420" y2="230" stroke="#22D3EE" stroke-width="2"/>
<line x1="460" y1="160" x2="460" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="350" y1="170" x2="350" y2="280" stroke="#22D3EE" stroke-width="2"/>
<line x1="350" y1="280" x2="460" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="350" y1="170" x2="460" y2="160" stroke="#22D3EE" stroke-width="2"/>
<line x1="420" y1="230" x2="460" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="350" y1="280" x2="460" y2="270" stroke="#22D3EE" stroke-width="1.5"/>

<!-- Front face shading -->
<polygon points="350,170 460,160 460,270 350,280" fill="#22D3EE" fill-opacity="0.08"/>

<!-- Vertex labels -->
<text x="304" y="127" font-size="10" fill="#164E63" font-weight="bold">A₁</text>
<text x="424" y="117" font-size="10" fill="#164E63" font-weight="bold">B₁</text>
<text x="464" y="158" font-size="10" fill="#164E63" font-weight="bold">C₁</text>
<text x="340" y="167" font-size="10" fill="#164E63" font-weight="bold">D₁</text>
<text x="304" y="250" font-size="10" fill="#164E63" font-weight="bold">A</text>
<text x="424" y="242" font-size="10" fill="#164E63" font-weight="bold">B</text>
<text x="464" y="282" font-size="10" fill="#164E63" font-weight="bold">C</text>
<text x="340" y="293" font-size="10" fill="#164E63" font-weight="bold">D</text>

<!-- Properties -->
<text x="250" y="325" text-anchor="middle" font-size="11" fill="#164E63">Тетраэдр: 4 грани, 6 рёбер, 4 вершины | Параллелепипед: 6 граней, 12 рёбер, 8 вершин</text>
</svg>