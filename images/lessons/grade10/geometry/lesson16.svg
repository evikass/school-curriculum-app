<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Правильные многогранники</text>

<!-- Tetrahedron (top-left) -->
<text x="90" y="68" text-anchor="middle" font-size="11" fill="#06B6D4" font-weight="bold">Тетраэдр</text>
<polygon points="90,90 50,170 130,170" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="90" y1="90" x2="70" y2="130" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="70" y1="130" x2="130" y2="170" stroke="#164E63" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
<line x1="70" y1="130" x2="50" y2="170" stroke="#22D3EE" stroke-width="1.5"/>
<text x="90" y="185" text-anchor="middle" font-size="9" fill="#164E63">4∆</text>

<!-- Cube (top-right of left section) -->
<text x="220" y="68" text-anchor="middle" font-size="11" fill="#06B6D4" font-weight="bold">Гексаэдр</text>
<polygon points="190,100 240,90 240,150 190,160" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-width="1.5"/>
<polygon points="190,100 210,85 260,75 240,90" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="1.5"/>
<line x1="210" y1="85" x2="210" y2="145" stroke="#164E63" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
<line x1="260" y1="75" x2="260" y2="135" stroke="#06B6D4" stroke-width="1.5"/>
<line x1="210" y1="145" x2="260" y2="135" stroke="#164E63" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
<line x1="240" y1="150" x2="260" y2="135" stroke="#22D3EE" stroke-width="1.5"/>
<text x="225" y="185" text-anchor="middle" font-size="9" fill="#164E63">6□</text>

<!-- Octahedron (bottom-left) -->
<text x="90" y="210" text-anchor="middle" font-size="11" fill="#06B6D4" font-weight="bold">Октаэдр</text>
<line x1="90" y1="220" x2="55" y2="280" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="90" y1="220" x2="125" y2="280" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="55" y1="280" x2="90" y2="320" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="125" y1="280" x2="90" y2="320" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="55" y1="280" x2="125" y2="280" stroke="#22D3EE" stroke-width="1.5"/>
<line x1="90" y1="220" x2="90" y2="320" stroke="#164E63" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
<polygon points="90,220 55,280 125,280" fill="#22D3EE" fill-opacity="0.1"/>
<text x="90" y="335" text-anchor="middle" font-size="9" fill="#164E63">8∆</text>

<!-- Dodecahedron (right side, simplified pentagon) -->
<text x="320" y="68" text-anchor="middle" font-size="11" fill="#06B6D4" font-weight="bold">Додекаэдр</text>
<polygon points="320,85 345,100 338,128 302,128 295,100" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<!-- Inner pentagon for 3D effect -->
<polygon points="320,95 333,103 329,118 311,118 307,103" fill="none" stroke="#06B6D4" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
<line x1="320" y1="85" x2="320" y2="95" stroke="#22D3EE" stroke-width="1"/>
<line x1="345" y1="100" x2="333" y2="103" stroke="#22D3EE" stroke-width="1"/>
<line x1="338" y1="128" x2="329" y2="118" stroke="#22D3EE" stroke-width="1"/>
<line x1="302" y1="128" x2="311" y2="118" stroke="#22D3EE" stroke-width="1"/>
<line x1="295" y1="100" x2="307" y2="103" stroke="#22D3EE" stroke-width="1"/>
<text x="320" y="142" text-anchor="middle" font-size="9" fill="#164E63">12⬠</text>

<!-- Icosahedron (bottom-right) -->
<text x="430" y="68" text-anchor="middle" font-size="11" fill="#06B6D4" font-weight="bold">Икосаэдр</text>
<!-- Simplified as two overlapping triangles -->
<polygon points="430,85 400,140 460,140" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="1.5"/>
<polygon points="430,155 400,100 460,100" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="1.5"/>
<text x="430" y="170" text-anchor="middle" font-size="9" fill="#164E63">20∆</text>

<!-- Euler formula -->
<rect x="280" y="210" width="190" height="55" fill="white" fill-opacity="0.9" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
<text x="375" y="232" text-anchor="middle" font-size="12" fill="#164E63" font-weight="bold">Формула Эйлера:</text>
<text x="375" y="253" text-anchor="middle" font-size="14" fill="#06B6D4" font-weight="bold">B - Р + Г = 2</text>

<!-- Theorem text -->
<text x="250" y="305" text-anchor="middle" font-size="11" fill="#164E63">Правильный многогранник — все грани равные</text>
<text x="250" y="323" text-anchor="middle" font-size="11" fill="#164E63">правильные многоугольники, в каждой вершине</text>
<text x="250" y="341" text-anchor="middle" font-size="11" fill="#164E63">сходится одинаковое число рёбер. Существует 5 типов.</text>
</svg>