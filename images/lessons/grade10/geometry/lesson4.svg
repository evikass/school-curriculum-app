<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Параллельность прямой и плоскости</text>

<!-- Plane α -->
<polygon points="60,200 320,170 440,230 180,260" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="400" y="225" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Line a parallel to plane (above it) -->
<line x1="130" y1="110" x2="390" y2="95" stroke="#164E63" stroke-width="2.5"/>
<text x="395" y="92" font-size="13" fill="#164E63" font-style="italic">a</text>

<!-- Dashed projections from line a to plane -->
<line x1="180" y1="107" x2="170" y2="210" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
<line x1="300" y1="100" x2="290" y2="198" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

<!-- Line b on plane, parallel to a -->
<line x1="140" y1="230" x2="370" y2="210" stroke="#06B6D4" stroke-width="2"/>
<text x="375" y="208" font-size="13" fill="#06B6D4" font-style="italic">b</text>

<!-- Line c on plane, also parallel to a -->
<line x1="120" y1="245" x2="350" y2="225" stroke="#06B6D4" stroke-width="2" stroke-dasharray="6,3"/>
<text x="355" y="224" font-size="13" fill="#06B6D4" font-style="italic">c</text>

<!-- Parallel markers -->
<line x1="250" y1="103" x2="256" y2="95" stroke="#164E63" stroke-width="1.5"/>
<line x1="253" y1="104" x2="259" y2="96" stroke="#164E63" stroke-width="1.5"/>

<line x1="240" y1="222" x2="246" y2="214" stroke="#06B6D4" stroke-width="1.5"/>
<line x1="243" y1="223" x2="249" y2="215" stroke="#06B6D4" stroke-width="1.5"/>

<!-- Point on line a -->
<circle cx="260" cy="103" r="3" fill="#164E63"/>
<text x="265" y="97" font-size="11" fill="#164E63">M</text>

<!-- Theorem text -->
<text x="250" y="290" text-anchor="middle" font-size="11" fill="#164E63">Признак: Если прямая, не лежащая в плоскости,</text>
<text x="250" y="308" text-anchor="middle" font-size="11" fill="#164E63">параллельна какой-нибудь прямой, лежащей</text>
<text x="250" y="326" text-anchor="middle" font-size="11" fill="#164E63">в этой плоскости, то она параллельна плоскости.</text>
</svg>