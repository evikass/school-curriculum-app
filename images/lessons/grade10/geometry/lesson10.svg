<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Теорема о трёх перпендикулярах</text>

<!-- Plane α -->
<polygon points="50,240 320,210 450,270 180,300" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="420" y="265" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Point A above plane -->
<circle cx="180" cy="80" r="4" fill="#164E63"/>
<text x="187" y="77" font-size="13" fill="#164E63" font-weight="bold">A</text>

<!-- Perpendicular AH to plane -->
<line x1="180" y1="80" x2="180" y2="260" stroke="#164E63" stroke-width="2.5"/>
<circle cx="180" cy="260" r="3" fill="#164E63"/>
<text x="167" y="272" font-size="12" fill="#164E63" font-weight="bold">H</text>

<!-- Right angle at H -->
<rect x="180" y="250" width="10" height="10" fill="none" stroke="#164E63" stroke-width="1.2"/>

<!-- Line m on plane through H -->
<line x1="100" y1="270" x2="400" y2="240" stroke="#06B6D4" stroke-width="2"/>
<text x="405" y="238" font-size="13" fill="#06B6D4" font-style="italic">m</text>

<!-- Right angle at H for m and AH -->
<!-- shown above -->

<!-- Oblique AM where M is on m and HM ⊥ m -->
<line x1="180" y1="80" x2="340" y2="248" stroke="#22D3EE" stroke-width="2.5"/>
<circle cx="340" cy="248" r="3" fill="#22D3EE"/>
<text x="347" y="245" font-size="12" fill="#22D3EE" font-weight="bold">M</text>

<!-- Projection HM perpendicular to m -->
<line x1="180" y1="260" x2="340" y2="248" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Right angle between HM and m at M -->
<rect x="330" y="240" width="8" height="8" fill="none" stroke="#22D3EE" stroke-width="1" transform="rotate(-8,334,244)"/>

<!-- Right angle at H between AH and HM shown -->

<!-- Another point on m showing AM ⊥ m -->
<!-- Arc showing right angle at M between AM and m -->
<line x1="326" y1="248" x2="326" y2="232" stroke="#164E63" stroke-width="1"/>
<rect x="326" y="232" width="8" height="8" fill="none" stroke="#164E63" stroke-width="1" transform="rotate(-8,330,236)"/>

<!-- Labels -->
<text x="155" y="175" font-size="11" fill="#164E63" font-style="italic">AH ⊥ α</text>
<text x="240" y="155" font-size="11" fill="#22D3EE" font-style="italic">AM</text>
<text x="245" y="268" font-size="11" fill="#22D3EE" font-style="italic">HM ⊥ m</text>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">Прямая, проведённая в плоскости через основание</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">наклонной ⊥ её проекции, ⊥ и самой наклонной.</text>
<text x="250" y="348" text-anchor="middle" font-size="10" fill="#06B6D4">HM ⊥ m ⟺ AM ⊥ m (обратная теорема также верна)</text>
</svg>