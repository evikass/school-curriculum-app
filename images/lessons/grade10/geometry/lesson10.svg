<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="pl10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.18"/>
    </linearGradient>
    <marker id="arrAm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FF8F00"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg10)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF8F00" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Теорема о трёх перпендикулярах</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 10</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FFB300" stroke-width="1" opacity="0.3"/>
  <!-- Direct Theorem Panel -->
  <rect x="12" y="58" width="235" height="165" rx="6" fill="white" opacity="0.9" stroke="#FFB300" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#FF8F00" text-anchor="middle" font-family="serif">Прямая теорема</text>
  <!-- 3D diagram -->
  <!-- Plane alpha -->
  <path d="M30,215 L60,178 L225,178 L195,215 Z" fill="url(#pl10)" stroke="#FFB300" stroke-width="1.2"/>
  <text x="170" y="210" font-size="8" fill="#FF8F00" font-style="italic">alpha</text>
  <!-- Perpendicular AB -->
  <circle cx="130" cy="90" r="3" fill="#E53935"/>
  <text x="138" y="87" font-size="9" fill="#E53935" font-weight="bold" font-style="italic">A</text>
  <line x1="130" y1="90" x2="130" y2="190" stroke="#E53935" stroke-width="2.2"/>
  <circle cx="130" cy="190" r="2.5" fill="#E53935"/>
  <text x="118" y="198" font-size="8" fill="#E53935" font-style="italic">B</text>
  <!-- Right angle at B -->
  <rect x="130" y="185" width="6" height="6" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <!-- Oblique AC -->
  <line x1="130" y1="90" x2="175" y2="188" stroke="#1565C0" stroke-width="2"/>
  <circle cx="175" cy="190" r="2.5" fill="#1565C0"/>
  <text x="180" y="198" font-size="8" fill="#1565C0" font-style="italic">C</text>
  <!-- Projection BC -->
  <line x1="130" y1="190" x2="175" y2="190" stroke="#4CAF50" stroke-width="1.5"/>
  <!-- Right angle at C: BC perp a -->
  <line x1="175" y1="190" x2="210" y2="188" stroke="#7B1FA2" stroke-width="1.8"/>
  <text x="200" y="186" font-size="8" fill="#7B1FA2" font-style="italic">a</text>
  <!-- Right angle symbol at C -->
  <rect x="175" y="185" width="5" height="5" fill="none" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Right angle at C for BC perp a -->
  <path d="M175,185 L180,185 L180,190" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="50" y="100" font-size="7" fill="#555" font-family="sans-serif">AB перп. alpha</text>
  <text x="50" y="112" font-size="7" fill="#555" font-family="sans-serif">BC перп. a</text>
  <text x="50" y="124" font-size="7" fill="#FF8F00" font-weight="bold" font-family="sans-serif">=&gt; AC перп. a</text>
  <!-- Angle arc -->
  <path d="M165,180 A15,15 0 0,1 172,175" fill="none" stroke="#1565C0" stroke-width="1"/>
  <!-- Converse Theorem Panel -->
  <rect x="255" y="58" width="233" height="165" rx="6" fill="white" opacity="0.9" stroke="#FFB300" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#FF8F00" text-anchor="middle" font-family="serif">Обратная теорема</text>
  <!-- 3D diagram for converse -->
  <path d="M280,215 L305,178 L470,178 L445,215 Z" fill="url(#pl10)" stroke="#FFB300" stroke-width="1.2"/>
  <text x="420" y="210" font-size="8" fill="#FF8F00" font-style="italic">alpha</text>
  <!-- Point A -->
  <circle cx="370" cy="95" r="3" fill="#E53935"/>
  <text x="378" y="92" font-size="9" fill="#E53935" font-weight="bold" font-style="italic">A</text>
  <line x1="370" y1="95" x2="370" y2="190" stroke="#E53935" stroke-width="2.2"/>
  <circle cx="370" cy="190" r="2.5" fill="#E53935"/>
  <text x="358" y="198" font-size="8" fill="#E53935" font-style="italic">B</text>
  <!-- Oblique AC -->
  <line x1="370" y1="95" x2="410" y2="188" stroke="#1565C0" stroke-width="2"/>
  <circle cx="410" cy="190" r="2.5" fill="#1565C0"/>
  <text x="416" y="198" font-size="8" fill="#1565C0" font-style="italic">C</text>
  <!-- a through C -->
  <line x1="395" y1="190" x2="440" y2="188" stroke="#7B1FA2" stroke-width="1.8"/>
  <text x="435" y="186" font-size="8" fill="#7B1FA2" font-style="italic">a</text>
  <!-- Right angle AC perp a -->
  <rect x="410" y="185" width="5" height="5" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <!-- Projection BC -->
  <line x1="370" y1="190" x2="410" y2="190" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Right angle at B -->
  <rect x="370" y="185" width="6" height="6" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <text x="295" y="100" font-size="7" fill="#555" font-family="sans-serif">AB перп. alpha</text>
  <text x="295" y="112" font-size="7" fill="#555" font-family="sans-serif">AC перп. a</text>
  <text x="295" y="124" font-size="7" fill="#FF8F00" font-weight="bold" font-family="sans-serif">=&gt; BC перп. a</text>
  <!-- Application Panel -->
  <rect x="12" y="232" width="235" height="78" rx="6" fill="white" opacity="0.88" stroke="#FFB300" stroke-width="1"/>
  <text x="130" y="248" font-size="9" font-weight="bold" fill="#FF8F00" text-anchor="middle" font-family="serif">Применение</text>
  <text x="22" y="262" font-size="7.5" fill="#555" font-family="sans-serif">1. Доказательство перпендикулярности</text>
  <text x="22" y="274" font-size="7.5" fill="#555" font-family="sans-serif">2. Нахождение расстояний</text>
  <text x="22" y="286" font-size="7.5" fill="#555" font-family="sans-serif">3. Построение сечений</text>
  <text x="22" y="298" font-size="7.5" fill="#FF8F00" font-weight="bold" font-family="sans-serif">4. Задачи на пирамиды и призмы</text>
  <!-- Formula Panel -->
  <rect x="255" y="232" width="233" height="78" rx="6" fill="white" opacity="0.88" stroke="#FFB300" stroke-width="1"/>
  <text x="372" y="248" font-size="9" font-weight="bold" fill="#FF8F00" text-anchor="middle" font-family="serif">Ключевые формулировки</text>
  <text x="265" y="263" font-size="7.5" fill="#555" font-family="serif">Прямая: AB перп. alpha, BC перп. a</text>
  <text x="265" y="275" font-size="7.5" fill="#FF8F00" font-weight="bold" font-family="serif">         =&gt; AC перп. a</text>
  <text x="265" y="290" font-size="7.5" fill="#555" font-family="serif">Обратная: AB перп. alpha, AC перп. a</text>
  <text x="265" y="302" font-size="7.5" fill="#FF8F00" font-weight="bold" font-family="serif">         =&gt; BC перп. a</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#FFB300" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">ТТП: проекция наклонной перп. прямой в плоскости &lt;=&gt; наклонная перп. прямой</text>
</svg>