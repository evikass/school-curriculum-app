<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Понятие многогранника. Призма</text>

<!-- Triangular prism -->
<!-- Back face (dashed) -->
<line x1="120" y1="90" x2="280" y2="80" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="120" y1="90" x2="120" y2="230" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="280" y1="80" x2="280" y2="220" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="120" y1="230" x2="280" y2="220" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Front face -->
<line x1="150" y1="130" x2="310" y2="120" stroke="#22D3EE" stroke-width="2"/>
<line x1="150" y1="130" x2="150" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="150" y1="270" x2="310" y2="260" stroke="#22D3EE" stroke-width="2"/>
<line x1="310" y1="120" x2="310" y2="260" stroke="#22D3EE" stroke-width="2"/>

<!-- Front face shading -->
<polygon points="150,130 310,120 310,260 150,270" fill="#22D3EE" fill-opacity="0.08"/>

<!-- Connecting edges -->
<line x1="150" y1="130" x2="120" y2="90" stroke="#164E63" stroke-width="1.5"/>
<line x1="310" y1="120" x2="280" y2="80" stroke="#164E63" stroke-width="1.5"/>
<line x1="150" y1="270" x2="120" y2="230" stroke="#164E63" stroke-width="1.5"/>
<line x1="310" y1="260" x2="280" y2="220" stroke="#164E63" stroke-width="1.5"/>

<!-- Vertex labels -->
<text x="142" y="126" font-size="10" fill="#164E63" font-weight="bold">A</text>
<text x="313" y="116" font-size="10" fill="#164E63" font-weight="bold">B</text>
<text x="313" y="270" font-size="10" fill="#164E63" font-weight="bold">C</text>
<text x="135" y="280" font-size="10" fill="#164E63" font-weight="bold">D</text>
<text x="112" y="86" font-size="10" fill="#164E63" font-weight="bold">A₁</text>
<text x="283" y="76" font-size="10" fill="#164E63" font-weight="bold">B₁</text>
<text x="283" y="216" font-size="10" fill="#164E63" font-weight="bold">C₁</text>
<text x="105" y="237" font-size="10" fill="#164E63" font-weight="bold">D₁</text>

<!-- Height indicator -->
<line x1="370" y1="120" x2="370" y2="260" stroke="#06B6D4" stroke-width="1.5"/>
<polygon points="370,120 366,130 374,130" fill="#06B6D4"/>
<polygon points="370,260 366,250 374,250" fill="#06B6D4"/>
<text x="380" y="195" font-size="12" fill="#06B6D4" font-weight="bold">H</text>

<!-- Info box -->
<rect x="340" y="70" width="145" height="40" fill="white" fill-opacity="0.8" stroke="#22D3EE" stroke-width="1" rx="4"/>
<text x="412" y="87" text-anchor="middle" font-size="11" fill="#164E63">Призма — многогранник,</text>
<text x="412" y="102" text-anchor="middle" font-size="11" fill="#164E63">грани — параллелограммы</text>

<!-- Theorem text -->
<text x="250" y="310" text-anchor="middle" font-size="11" fill="#164E63">Многогранник — тело, поверхность которого состоит</text>
<text x="250" y="328" text-anchor="middle" font-size="11" fill="#164E63">из конечного числа плоских многоугольников.</text>
<text x="250" y="346" text-anchor="middle" font-size="10" fill="#06B6D4">Призма: основания равны, боковые рёбра параллельны</text>
</svg>