<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Перпендикулярность плоскостей</text>

<!-- Vertical plane α -->
<polygon points="80,80 200,60 220,230 100,250" fill="#22D3EE" fill-opacity="0.15" stroke="#22D3EE" stroke-width="2"/>
<text x="95" y="75" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Horizontal plane β -->
<polygon points="100,250 350,220 440,270 190,300" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="2"/>
<text x="410" y="265" font-size="14" fill="#06B6D4" font-style="italic">β</text>

<!-- Line of intersection -->
<line x1="100" y1="250" x2="220" y2="230" stroke="#164E63" stroke-width="2.5"/>
<text x="165" y="225" font-size="12" fill="#164E63" font-style="italic">c</text>

<!-- Right angle mark at intersection -->
<line x1="155" y1="238" x2="155" y2="215" stroke="#164E63" stroke-width="1.5"/>
<line x1="155" y1="238" x2="172" y2="243" stroke="#164E63" stroke-width="1.5"/>
<path d="M 155,218 L 162,220 L 160,227" fill="none" stroke="#164E63" stroke-width="1.2"/>

<!-- Line a in plane α perpendicular to c -->
<line x1="155" y1="238" x2="130" y2="120" stroke="#22D3EE" stroke-width="2"/>
<text x="120" y="118" font-size="12" fill="#22D3EE" font-style="italic">a</text>

<!-- Line b in plane β perpendicular to c -->
<line x1="155" y1="238" x2="310" y2="252" stroke="#06B6D4" stroke-width="2"/>
<text x="315" y="250" font-size="12" fill="#06B6D4" font-style="italic">b</text>

<!-- Right angle mark between a and b -->
<rect x="155" y="220" width="10" height="10" fill="none" stroke="#164E63" stroke-width="1" transform="rotate(-5,160,225)"/>

<!-- Point at intersection -->
<circle cx="155" cy="238" r="3" fill="#164E63"/>
<text x="142" y="252" font-size="11" fill="#164E63" font-weight="bold">O</text>

<!-- Dihedral angle arc -->
<path d="M 135,135 A 60,60 0 0,1 290,245" fill="none" stroke="#164E63" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">Две плоскости перпендикулярны, если одна из них</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">проходит через прямую, перпендикулярную другой.</text>
<text x="250" y="348" text-anchor="middle" font-size="10" fill="#06B6D4">α ⊥ β ⟺ a ⊂ α, a ⊥ β (линейный угол двугранного угла = 90°)</text>
</svg>