<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <linearGradient id="pl12a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B39DDB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="pl12b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#AB47BC" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg12)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#311B92" text-anchor="middle" font-family="serif">Перпендикулярность плоскостей</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 12</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#7C4DFF" stroke-width="1" opacity="0.3"/>
  <!-- Definition Panel -->
  <rect x="12" y="58" width="235" height="125" rx="6" fill="white" opacity="0.9" stroke="#7C4DFF" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="serif">Определение</text>
  <text x="22" y="89" font-size="8" fill="#555" font-family="sans-serif">Две плоскости называются</text>
  <text x="22" y="101" font-size="8" fill="#555" font-family="sans-serif">перпендикулярными, если</text>
  <text x="22" y="113" font-size="8" fill="#555" font-family="sans-serif">одна из них проходит через</text>
  <text x="22" y="125" font-size="8" fill="#555" font-family="sans-serif">прямую, перпендикулярную</text>
  <text x="22" y="137" font-size="8" fill="#555" font-family="sans-serif">другой плоскости.</text>
  <!-- Two perpendicular planes 3D -->
  <path d="M35,175 L55,150 L210,150 L190,175 Z" fill="url(#pl12a)" stroke="#4527A0" stroke-width="1.2"/>
  <path d="M80,175 L100,150 L100,105 L80,130 Z" fill="url(#pl12b)" stroke="#7C4DFF" stroke-width="1.2"/>
  <line x1="80" y1="175" x2="80" y2="130" stroke="#E53935" stroke-width="2"/>
  <text x="85" y="122" font-size="7" fill="#E53935" font-style="italic">a</text>
  <text x="160" y="170" font-size="8" fill="#4527A0" font-style="italic">alpha</text>
  <text x="100" y="135" font-size="8" fill="#7C4DFF" font-style="italic">beta</text>
  <rect x="78" y="150" width="5" height="5" fill="none" stroke="#E53935" stroke-width="0.7"/>
  <text x="130" y="165" font-size="7" fill="#4527A0" font-weight="bold" font-family="serif">a перп. alpha, a in beta</text>
  <text x="130" y="175" font-size="7" fill="#4527A0" font-weight="bold" font-family="serif">=&gt; alpha перп. beta</text>
  <!-- Dihedral angle Panel -->
  <rect x="255" y="58" width="233" height="125" rx="6" fill="white" opacity="0.9" stroke="#7C4DFF" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="serif">Двугранный угол</text>
  <text x="265" y="89" font-size="8" fill="#555" font-family="sans-serif">Двугранный угол — фигура,</text>
  <text x="265" y="101" font-size="8" fill="#555" font-family="sans-serif">образованная прямой a и</text>
  <text x="265" y="113" font-size="8" fill="#555" font-family="sans-serif">двумя полуплоскостями с</text>
  <text x="265" y="125" font-size="8" fill="#555" font-family="sans-serif">общей границей a.</text>
  <!-- Dihedral angle visual -->
  <path d="M290,170 L310,148 L460,148 L440,170 Z" fill="url(#pl12a)" stroke="#4527A0" stroke-width="1"/>
  <path d="M310,170 L330,148 L460,160 L440,180 Z" fill="url(#pl12b)" stroke="#7C4DFF" stroke-width="1"/>
  <line x1="295" y1="165" x2="440" y2="155" stroke="#E53935" stroke-width="1.8"/>
  <text x="380" y="153" font-size="8" fill="#E53935" font-style="italic">a (ребро)</text>
  <text x="360" y="168" font-size="7" fill="#4527A0" font-style="italic">alpha</text>
  <text x="370" y="178" font-size="7" fill="#7C4DFF" font-style="italic">beta</text>
  <!-- Linear angle -->
  <text x="265" y="143" font-size="7.5" fill="#4527A0" font-family="serif">Линейный угол двугранного угла —</text>
  <text x="265" y="155" font-size="7.5" fill="#4527A0" font-family="serif">угол между перпендикулярами</text>
  <text x="265" y="167" font-size="7.5" fill="#4527A0" font-family="serif">к ребру в каждой грани.</text>
  <!-- Sign Panel -->
  <rect x="12" y="192" width="235" height="115" rx="6" fill="white" opacity="0.88" stroke="#7C4DFF" stroke-width="1"/>
  <text x="130" y="208" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="serif">Признак перпендикулярности</text>
  <text x="22" y="223" font-size="7.5" fill="#555" font-family="sans-serif">Если одна из двух плоскостей</text>
  <text x="22" y="235" font-size="7.5" fill="#555" font-family="sans-serif">проходит через прямую,</text>
  <text x="22" y="247" font-size="7.5" fill="#555" font-family="sans-serif">перпендикулярную другой</text>
  <text x="22" y="259" font-size="7.5" fill="#555" font-family="sans-serif">плоскости, то такие плоскости</text>
  <text x="22" y="271" font-size="7.5" fill="#4527A0" font-weight="bold" font-family="sans-serif">перпендикулярны.</text>
  <text x="22" y="286" font-size="7.5" fill="#4527A0" font-family="serif">a перп. alpha, a in beta =&gt; alpha перп. beta</text>
  <!-- Properties Panel -->
  <rect x="255" y="192" width="233" height="115" rx="6" fill="white" opacity="0.88" stroke="#7C4DFF" stroke-width="1"/>
  <text x="372" y="208" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="serif">Свойства</text>
  <text x="265" y="223" font-size="7.5" fill="#555" font-family="sans-serif">1. Если alpha перп. beta, то прямая</text>
  <text x="265" y="235" font-size="7.5" fill="#555" font-family="sans-serif">   в alpha, перп. к линии пересечения,</text>
  <text x="265" y="247" font-size="7.5" fill="#555" font-family="sans-serif">   перп. и к beta</text>
  <text x="265" y="262" font-size="7.5" fill="#555" font-family="sans-serif">2. Если alpha перп. beta и beta перп. gamma,</text>
  <text x="265" y="274" font-size="7.5" fill="#555" font-family="sans-serif">   то alpha || gamma (не факт!)</text>
  <text x="265" y="289" font-size="7.5" fill="#4527A0" font-weight="bold" font-family="sans-serif">3. Плоскость, перп. линии пересеч.</text>
  <text x="265" y="301" font-size="7.5" fill="#4527A0" font-weight="bold" font-family="sans-serif">   двух перп. плоскостей, перп. им обеим</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#7C4DFF" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Признак: a перп. alpha, a in beta =&gt; alpha перп. beta (двугранный угол = 90)</text>
</svg>