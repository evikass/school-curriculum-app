<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
<marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#06B6D4"/>
</marker>
<marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#164E63"/>
</marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Понятие вектора в пространстве</text>

<!-- 3D coordinate system -->
<line x1="250" y1="280" x2="420" y2="280" stroke="#164E63" stroke-width="1.5" marker-end="url(#arrowDark)"/>
<line x1="250" y1="280" x2="250" y2="100" stroke="#164E63" stroke-width="1.5" marker-end="url(#arrowDark)"/>
<line x1="250" y1="280" x2="130" y2="340" stroke="#164E63" stroke-width="1.5" marker-end="url(#arrowDark)"/>

<!-- Axis labels -->
<text x="430" y="285" font-size="14" fill="#06B6D4" font-weight="bold">x</text>
<text x="255" y="95" font-size="14" fill="#06B6D4" font-weight="bold">y</text>
<text x="115" y="345" font-size="14" fill="#06B6D4" font-weight="bold">z</text>

<!-- Origin -->
<text x="256" y="296" font-size="11" fill="#164E63">O</text>

<!-- Vector a -->
<line x1="250" y1="280" x2="370" y2="170" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrowCyan)"/>
<circle cx="250" cy="280" r="3" fill="#164E63"/>
<text x="380" y="165" font-size="14" fill="#22D3EE" font-weight="bold">a⃗</text>

<!-- Vector b -->
<line x1="250" y1="280" x2="180" y2="140" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrowCyan)"/>
<text x="165" y="135" font-size="14" fill="#06B6D4" font-weight="bold">b⃗</text>

<!-- Vector c -->
<line x1="250" y1="280" x2="190" y2="310" stroke="#164E63" stroke-width="2.5" marker-end="url(#arrowDark)"/>
<text x="175" y="325" font-size="14" fill="#164E63" font-weight="bold">c⃗</text>

<!-- Coordinates labels -->
<text x="310" y="215" font-size="10" fill="#22D3EE">{x₁, y₁, z₁}</text>
<text x="165" y="195" font-size="10" fill="#06B6D4">{x₂, y₂, z₂}</text>

<!-- Info box -->
<rect x="330" y="65" width="155" height="65" fill="white" fill-opacity="0.9" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
<text x="407" y="83" text-anchor="middle" font-size="11" fill="#164E63" font-weight="bold">Вектор —</text>
<text x="407" y="98" text-anchor="middle" font-size="11" fill="#164E63">направленный</text>
<text x="407" y="113" text-anchor="middle" font-size="11" fill="#164E63">отрезок AB⃗</text>
<text x="407" y="125" text-anchor="middle" font-size="10" fill="#06B6D4">|AB⃗| — длина вектора</text>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">Вектор в пространстве задаётся тремя координатами</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">a⃗ = {x, y, z}. Равные векторы имеют равные координаты.</text>
</svg>