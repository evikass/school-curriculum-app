<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Следствия из аксиом стереометрии</text>

<!-- Corollary 1: Plane through a line and a point outside it -->
<text x="130" y="70" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Следствие 1</text>

<!-- Plane α -->
<polygon points="40,120 220,120 240,200 60,200" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="220" y="135" font-size="12" fill="#06B6D4" font-style="italic">α</text>

<!-- Line a on plane -->
<line x1="70" y1="170" x2="210" y2="155" stroke="#164E63" stroke-width="2"/>
<text x="215" y="155" font-size="12" fill="#164E63" font-style="italic">a</text>

<!-- Point outside line -->
<circle cx="140" cy="100" r="4" fill="#164E63"/>
<text x="148" y="97" font-size="12" fill="#164E63" font-weight="bold">M</text>

<!-- Dashed line from point to line -->
<line x1="140" y1="100" x2="140" y2="165" stroke="#164E63" stroke-width="1" stroke-dasharray="4,3"/>

<!-- Corollary 2: Plane through two intersecting lines -->
<text x="380" y="70" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Следствие 2</text>

<!-- Plane β -->
<polygon points="280,120 460,120 480,200 300,200" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="460" y="135" font-size="12" fill="#06B6D4" font-style="italic">β</text>

<!-- Line b -->
<line x1="300" y1="180" x2="440" y2="140" stroke="#164E63" stroke-width="2"/>
<text x="445" y="140" font-size="12" fill="#164E63" font-style="italic">b</text>

<!-- Line c -->
<line x1="320" y1="140" x2="430" y2="185" stroke="#06B6D4" stroke-width="2"/>
<text x="435" y="190" font-size="12" fill="#06B6D4" font-style="italic">c</text>

<!-- Intersection point -->
<circle cx="375" cy="162" r="4" fill="#164E63"/>
<text x="380" y="155" font-size="11" fill="#164E63" font-weight="bold">O</text>

<!-- Description text -->
<text x="250" y="250" text-anchor="middle" font-size="11" fill="#164E63">Через прямую и не лежащую на ней точку</text>
<text x="250" y="265" text-anchor="middle" font-size="11" fill="#164E63">проходит плоскость, и притом только одна.</text>

<text x="250" y="295" text-anchor="middle" font-size="11" fill="#164E63">Через две пересекающиеся прямые</text>
<text x="250" y="310" text-anchor="middle" font-size="11" fill="#164E63">проходит плоскость, и притом только одна.</text>
</svg>