<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Призма и её свойства</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- 3D Prism - front face -->
    <polygon points="80,200 160,200 160,280 80,280" fill="#00897B" opacity="0.15" stroke="#00897B" stroke-width="2"/>
    <!-- Back face offset -->
    <polygon points="130,160 210,160 210,240 130,240" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <!-- Top face -->
    <polygon points="80,200 130,160 210,160 160,200" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="1.5"/>
    <!-- Connecting edges (visible) -->
    <line x1="80" y1="200" x2="130" y2="160" stroke="#00897B" stroke-width="2"/>
    <line x1="160" y1="200" x2="210" y2="160" stroke="#00897B" stroke-width="2"/>
    <line x1="160" y1="280" x2="210" y2="240" stroke="#00897B" stroke-width="2"/>
    <line x1="80" y1="280" x2="130" y2="240" stroke="#00897B" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <!-- Right face -->
    <polygon points="160,200 210,160 210,240 160,280" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <!-- Labels -->
    <text x="100" y="245" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">a</text>
    <text x="163" y="245" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">b</text>
    <!-- Height arrow -->
    <line x1="68" y1="200" x2="68" y2="280" stroke="#E91E63" stroke-width="2"/>
    <polygon points="65,200 68,192 71,200" fill="#E91E63"/>
    <polygon points="65,280 68,288 71,280" fill="#E91E63"/>
    <text x="52" y="245" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">H</text>
    <!-- Vertex labels -->
    <text x="75" y="196" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">A</text>
    <text x="155" y="196" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">B</text>
    <text x="155" y="296" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">C</text>
    <text x="75" y="296" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">D</text>
    <text x="125" y="155" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">A1</text>
    <text x="205" y="155" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">B1</text>
    <!-- Properties box -->
    <rect x="250" y="90" width="230" height="205" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="260" y="108" font-family="Arial,sans-serif" font-size="12" fill="#00695C" font-weight="bold">Свойства призмы:</text>
    <line x1="260" y1="113" x2="470" y2="113" stroke="#00897B" stroke-width="0.5"/>
    <text x="260" y="130" font-family="Arial,sans-serif" font-size="11" fill="#444">1) Основания - равные</text>
    <text x="268" y="144" font-family="Arial,sans-serif" font-size="11" fill="#444">многоугольники</text>
    <text x="260" y="162" font-family="Arial,sans-serif" font-size="11" fill="#444">2) Боковые ребра</text>
    <text x="268" y="176" font-family="Arial,sans-serif" font-size="11" fill="#444">параллельны и равны</text>
    <text x="260" y="194" font-family="Arial,sans-serif" font-size="11" fill="#444">3) Боковые грани -</text>
    <text x="268" y="208" font-family="Arial,sans-serif" font-size="11" fill="#444">параллелограммы</text>
    <text x="260" y="226" font-family="Arial,sans-serif" font-size="11" fill="#444">4) H = длина бок. ребра</text>
    <text x="260" y="244" font-family="Arial,sans-serif" font-size="11" fill="#444">   (для прямой призмы)</text>
    <line x1="260" y1="252" x2="470" y2="252" stroke="#00897B" stroke-width="0.5"/>
    <text x="260" y="268" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Sбок = P * H</text>
    <text x="260" y="286" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">V = Sосн * H</text>
    <!-- Base label -->
    <rect x="82" y="260" width="76" height="18" rx="3" fill="#00897B" opacity="0.1"/>
    <text x="120" y="274" font-family="Arial,sans-serif" font-size="10" fill="#00897B" text-anchor="middle">основание</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>