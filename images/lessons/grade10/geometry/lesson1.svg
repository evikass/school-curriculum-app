<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Предмет стереометрии. Аксиомы стереометрии</text>

<!-- 3D Coordinate System -->
<!-- Axes -->
<line x1="250" y1="280" x2="420" y2="280" stroke="#164E63" stroke-width="2"/>
<line x1="250" y1="280" x2="250" y2="100" stroke="#164E63" stroke-width="2"/>
<line x1="250" y1="280" x2="130" y2="340" stroke="#164E63" stroke-width="2"/>
<!-- Axis arrows -->
<polygon points="420,280 410,275 410,285" fill="#164E63"/>
<polygon points="250,100 245,110 255,110" fill="#164E63"/>
<polygon points="130,340 140,330 135,340" fill="#164E63"/>
<!-- Axis labels -->
<text x="430" y="285" font-size="14" fill="#06B6D4" font-weight="bold">x</text>
<text x="255" y="95" font-size="14" fill="#06B6D4" font-weight="bold">y</text>
<text x="115" y="345" font-size="14" fill="#06B6D4" font-weight="bold">z</text>

<!-- Plane α (horizontal) -->
<polygon points="170,220 330,220 380,260 220,260" fill="#22D3EE" fill-opacity="0.15" stroke="#22D3EE" stroke-width="1.5"/>
<text x="350" y="245" font-size="13" fill="#06B6D4" font-style="italic">α</text>

<!-- Plane β (vertical-leaning) -->
<polygon points="200,120 300,120 340,240 240,240" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="310" y="135" font-size="13" fill="#06B6D4" font-style="italic">β</text>

<!-- Points -->
<circle cx="270" cy="240" r="4" fill="#164E63"/>
<text x="278" y="237" font-size="12" fill="#164E63" font-weight="bold">A</text>

<circle cx="220" cy="200" r="4" fill="#164E63"/>
<text x="228" y="197" font-size="12" fill="#164E63" font-weight="bold">B</text>

<circle cx="290" cy="160" r="4" fill="#164E63"/>
<text x="298" y="157" font-size="12" fill="#164E63" font-weight="bold">C</text>

<!-- Axiom text -->
<text x="30" y="80" font-size="11" fill="#164E63">A₁: Через любые 3 точки,</text>
<text x="30" y="95" font-size="11" fill="#164E63">не лежащие на одной прямой,</text>
<text x="30" y="110" font-size="11" fill="#164E63">проходит плоскость, и притом</text>
<text x="30" y="125" font-size="11" fill="#164E63">только одна.</text>

<!-- Origin label -->
<text x="255" y="295" font-size="11" fill="#164E63">O</text>
</svg>