<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Пирамида</text>

<!-- Pyramid with square base -->
<!-- Base (parallelogram in perspective) -->
<polygon points="100,250 280,230 380,270 200,290" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="2"/>

<!-- Hidden back edges (dashed) -->
<line x1="230" y1="70" x2="100" y2="250" stroke="#164E63" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
<line x1="230" y1="70" x2="380" y2="270" stroke="#164E63" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Visible front edges -->
<line x1="230" y1="70" x2="280" y2="230" stroke="#22D3EE" stroke-width="2.5"/>
<line x1="230" y1="70" x2="200" y2="290" stroke="#22D3EE" stroke-width="2.5"/>

<!-- Base edges -->
<line x1="100" y1="250" x2="280" y2="230" stroke="#22D3EE" stroke-width="2"/>
<line x1="200" y1="290" x2="380" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="280" y1="230" x2="380" y2="270" stroke="#22D3EE" stroke-width="2"/>
<line x1="100" y1="250" x2="200" y2="290" stroke="#164E63" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

<!-- Front face shading -->
<polygon points="230,70 280,230 200,290" fill="#06B6D4" fill-opacity="0.08"/>

<!-- Apex label -->
<circle cx="230" cy="70" r="3" fill="#164E63"/>
<text x="237" y="65" font-size="12" fill="#164E63" font-weight="bold">S</text>

<!-- Base vertex labels -->
<text x="86" y="256" font-size="11" fill="#164E63" font-weight="bold">A</text>
<text x="284" y="226" font-size="11" fill="#164E63" font-weight="bold">B</text>
<text x="385" y="275" font-size="11" fill="#164E63" font-weight="bold">C</text>
<text x="195" y="305" font-size="11" fill="#164E63" font-weight="bold">D</text>

<!-- Height indicator -->
<line x1="230" y1="70" x2="230" y2="265" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="5,3"/>
<circle cx="230" cy="265" r="2" fill="#06B6D4"/>
<text x="240" y="265" font-size="11" fill="#06B6D4" font-weight="bold">O</text>
<text x="240" y="170" font-size="12" fill="#06B6D4" font-weight="bold">H</text>

<!-- Right angle at O -->
<rect x="230" y="255" width="8" height="8" fill="none" stroke="#06B6D4" stroke-width="1"/>

<!-- Formula box -->
<rect x="30" y="55" width="155" height="55" fill="white" fill-opacity="0.9" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
<text x="107" y="73" text-anchor="middle" font-size="12" fill="#164E63" font-weight="bold">Формула:</text>
<text x="107" y="93" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">V = ⅓ · Sосн · H</text>

<!-- Theorem text -->
<text x="250" y="325" text-anchor="middle" font-size="11" fill="#164E63">Пирамида — многогранник, одна грань которого</text>
<text x="250" y="343" text-anchor="middle" font-size="11" fill="#164E63">(основание) — многоугольник, остальные — треугольники</text>
</svg>