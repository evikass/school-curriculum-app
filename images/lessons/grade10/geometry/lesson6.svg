<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="pl6a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF9A9A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E57373" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="pl6b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCDD2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF5350" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg6)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle" font-family="serif">Параллельность плоскостей</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 6</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E53935" stroke-width="1" opacity="0.3"/>
  <!-- Definition Panel -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" opacity="0.9" stroke="#E53935" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="serif">Определение</text>
  <text x="22" y="89" font-size="8" fill="#555" font-family="sans-serif">Две плоскости называются</text>
  <text x="22" y="101" font-size="8" fill="#555" font-family="sans-serif">параллельными, если они</text>
  <text x="22" y="113" font-size="8" fill="#555" font-family="sans-serif">не имеют общих точек.</text>
  <!-- Two parallel planes 3D -->
  <path d="M30,150 L55,125 L210,125 L185,150 Z" fill="url(#pl6a)" stroke="#C62828" stroke-width="1.2"/>
  <path d="M40,178 L65,153 L220,153 L195,178 Z" fill="url(#pl6b)" stroke="#E53935" stroke-width="1.2"/>
  <text x="150" y="145" font-size="9" fill="#C62828" font-style="italic">alpha</text>
  <text x="160" y="173" font-size="9" fill="#E53935" font-style="italic">beta</text>
  <text x="130" y="165" font-size="8" fill="#C62828" font-weight="bold" font-family="serif">alpha || beta</text>
  <!-- Sign Panel -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" opacity="0.9" stroke="#E53935" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="serif">Признак параллельности</text>
  <text x="265" y="89" font-size="8" fill="#555" font-family="sans-serif">Если две пересекающиеся</text>
  <text x="265" y="101" font-size="8" fill="#555" font-family="sans-serif">прямые одной плоскости</text>
  <text x="265" y="113" font-size="8" fill="#555" font-family="sans-serif">соответственно параллельны</text>
  <text x="265" y="125" font-size="8" fill="#555" font-family="sans-serif">двум прямым другой</text>
  <text x="265" y="137" font-size="8" fill="#555" font-family="sans-serif">плоскости, то эти плоскости</text>
  <text x="265" y="149" font-size="8" fill="#C62828" font-weight="bold" font-family="sans-serif">параллельны.</text>
  <!-- Visual: two planes with parallel lines -->
  <path d="M280,148 L300,128 L465,128 L445,148 Z" fill="url(#pl6a)" stroke="#C62828" stroke-width="1"/>
  <line x1="290" y1="143" x2="440" y2="133" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="295" y1="136" x2="445" y2="126" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="375" y="131" font-size="7" fill="#1565C0" font-style="italic">a</text>
  <text x="378" y="123" font-size="7" fill="#4CAF50" font-style="italic">b</text>
  <text x="400" y="145" font-size="7" fill="#C62828" font-style="italic">alpha</text>
  <circle cx="330" cy="135" r="2" fill="#FF6F00"/>
  <!-- Properties Panel -->
  <rect x="12" y="186" width="235" height="120" rx="6" fill="white" opacity="0.88" stroke="#E53935" stroke-width="1"/>
  <text x="130" y="202" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="serif">Свойства</text>
  <text x="22" y="217" font-size="7.5" fill="#555" font-family="sans-serif">1. Если alpha||beta и gamma</text>
  <text x="22" y="229" font-size="7.5" fill="#555" font-family="sans-serif">   пересекает alpha, то gamma</text>
  <text x="22" y="241" font-size="7.5" fill="#555" font-family="sans-serif">   пересекает и beta.</text>
  <text x="22" y="256" font-size="7.5" fill="#555" font-family="sans-serif">2. Если alpha||beta и gamma</text>
  <text x="22" y="268" font-size="7.5" fill="#555" font-family="sans-serif">   пересекает их: a = alpha cap gamma,</text>
  <text x="22" y="280" font-size="7.5" fill="#555" font-family="sans-serif">   b = beta cap gamma, то a || b.</text>
  <text x="22" y="295" font-size="7.5" fill="#555" font-family="sans-serif">3. Отрезки пар. прямых между</text>
  <text x="22" y="302" font-size="7.5" fill="#C62828" font-weight="bold" font-family="sans-serif">   || плоскостями равны.</text>
  <!-- Proportional segments -->
  <rect x="255" y="186" width="233" height="120" rx="6" fill="white" opacity="0.88" stroke="#E53935" stroke-width="1"/>
  <text x="372" y="202" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="serif">Пропорциональные отрезки</text>
  <!-- Visual: two parallel planes with connecting segments -->
  <path d="M280,230 L300,215 L460,215 L440,230 Z" fill="url(#pl6a)" stroke="#C62828" stroke-width="1"/>
  <path d="M285,268 L305,253 L465,253 L445,268 Z" fill="url(#pl6b)" stroke="#E53935" stroke-width="1"/>
  <text x="400" y="227" font-size="7" fill="#C62828" font-style="italic">alpha</text>
  <text x="405" y="265" font-size="7" fill="#E53935" font-style="italic">beta</text>
  <!-- parallel segments -->
  <line x1="310" y1="222" x2="315" y2="258" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="350" y1="219" x2="355" y2="255" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="400" y1="218" x2="405" y2="254" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="308" y="242" font-size="6" fill="#4CAF50">A</text>
  <text x="313" y="270" font-size="6" fill="#4CAF50">A1</text>
  <text x="348" y="239" font-size="6" fill="#1565C0">B</text>
  <text x="353" y="267" font-size="6" fill="#1565C0">B1</text>
  <text x="398" y="238" font-size="6" fill="#FF6F00">C</text>
  <text x="403" y="266" font-size="6" fill="#FF6F00">C1</text>
  <!-- Proportion -->
  <text x="372" y="284" font-size="7" fill="#C62828" font-family="serif">AA1 = BB1 = CC1</text>
  <text x="372" y="296" font-size="7" fill="#555" font-family="sans-serif">(alpha || beta, отрезки равны)</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#E53935" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Признак: a||a1, b||b1, a cap b (в alpha) =&gt; alpha || beta</text>
</svg>