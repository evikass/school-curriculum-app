<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Параллельность плоскостей</text>

<!-- Upper plane α -->
<polygon points="80,120 300,90 420,140 200,170" fill="#22D3EE" fill-opacity="0.15" stroke="#22D3EE" stroke-width="2"/>
<text x="400" y="135" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Lower plane β (parallel, shifted down) -->
<polygon points="60,240 280,210 400,260 180,290" fill="#06B6D4" fill-opacity="0.1" stroke="#06B6D4" stroke-width="2"/>
<text x="380" y="255" font-size="14" fill="#06B6D4" font-style="italic">β</text>

<!-- Lines on upper plane -->
<line x1="120" y1="140" x2="350" y2="115" stroke="#164E63" stroke-width="1.5"/>
<text x="355" y="113" font-size="12" fill="#164E63" font-style="italic">a</text>

<line x1="100" y1="155" x2="330" y2="135" stroke="#164E63" stroke-width="1.5"/>
<text x="335" y="133" font-size="12" fill="#164E63" font-style="italic">b</text>

<!-- Corresponding parallel lines on lower plane -->
<line x1="100" y1="260" x2="330" y2="235" stroke="#164E63" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="335" y="233" font-size="12" fill="#164E63" font-style="italic">a₁</text>

<line x1="80" y1="275" x2="310" y2="255" stroke="#164E63" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="315" y="253" font-size="12" fill="#164E63" font-style="italic">b₁</text>

<!-- Parallel indicators between planes -->
<line x1="200" y1="155" x2="180" y2="270" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

<!-- Double arrow showing distance -->
<line x1="350" y1="130" x2="330" y2="245" stroke="#164E63" stroke-width="1.2"/>
<polygon points="350,130 345,140 355,138" fill="#164E63"/>
<polygon points="330,245 325,235 335,237" fill="#164E63"/>
<text x="360" y="190" font-size="11" fill="#164E63" font-style="italic">d</text>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">Признак: Если две пересекающиеся прямые одной плоскости</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">соответственно параллельны двум прямым другой, то α ∥ β</text>
</svg>