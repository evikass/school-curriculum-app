<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Угол между прямой и плоскостью</text>

<!-- Plane α -->
<polygon points="60,230 330,200 440,260 170,290" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="410" y="255" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Point A above plane -->
<circle cx="220" cy="70" r="4" fill="#164E63"/>
<text x="228" y="68" font-size="13" fill="#164E63" font-weight="bold">A</text>

<!-- Oblique line from A to B on plane -->
<line x1="220" y1="70" x2="350" y2="248" stroke="#164E63" stroke-width="2.5"/>
<circle cx="350" cy="248" r="3" fill="#164E63"/>
<text x="357" y="246" font-size="12" fill="#164E63" font-weight="bold">B</text>

<!-- Perpendicular AH -->
<line x1="220" y1="70" x2="220" y2="255" stroke="#06B6D4" stroke-width="2"/>
<circle cx="220" cy="255" r="3" fill="#06B6D4"/>
<text x="207" y="267" font-size="12" fill="#06B6D4" font-weight="bold">H</text>

<!-- Right angle at H -->
<rect x="220" y="245" width="10" height="10" fill="none" stroke="#06B6D4" stroke-width="1.2"/>

<!-- Projection HB -->
<line x1="220" y1="255" x2="350" y2="248" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Angle φ at A between AB and AH -->
<path d="M 220,95 A 25,25 0 0,1 232,92" fill="none" stroke="#22D3EE" stroke-width="2"/>
<text x="238" y="100" font-size="13" fill="#22D3EE" font-weight="bold">φ</text>

<!-- Angle arc -->
<path d="M 232,92 Q 230,93 228,97" fill="none" stroke="#22D3EE" stroke-width="2"/>

<!-- Angle between line and plane marked -->
<line x1="220" y1="70" x2="220" y2="255" stroke="#06B6D4" stroke-width="0" opacity="0"/>

<!-- Angle marker at A -->
<path d="M 220,100 L 228,98" fill="none" stroke="#22D3EE" stroke-width="1.5"/>

<!-- Formula box -->
<rect x="30" y="60" width="160" height="55" fill="white" fill-opacity="0.8" stroke="#22D3EE" stroke-width="1" rx="4"/>
<text x="110" y="80" text-anchor="middle" font-size="11" fill="#164E63" font-weight="bold">Угол между прямой</text>
<text x="110" y="95" text-anchor="middle" font-size="11" fill="#164E63">и плоскостью — угол</text>
<text x="110" y="110" text-anchor="middle" font-size="11" fill="#164E63">между прямой и её</text>
<text x="110" y="123" text-anchor="middle" font-size="11" fill="#06B6D4" font-weight="bold">проекцией на плоскость</text>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">φ = ∠(AB, AH) — угол между наклонной AB</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">и её проекцией HB на плоскость α.</text>
<text x="250" y="348" text-anchor="middle" font-size="10" fill="#06B6D4">0° ≤ φ ≤ 90°, где 0° — прямая ∥ α, 90° — прямая ⊥ α</text>
</svg>