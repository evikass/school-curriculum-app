<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Перпендикулярность прямой и плоскости</text>

<!-- Plane α -->
<polygon points="60,220 340,190 440,250 160,280" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="410" y="245" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Perpendicular line from point A to plane -->
<line x1="250" y1="90" x2="250" y2="240" stroke="#164E63" stroke-width="2.5"/>
<text x="257" y="88" font-size="13" fill="#164E63" font-weight="bold">A</text>

<!-- Right angle mark at intersection -->
<polyline points="250,220 270,218 268,238" fill="none" stroke="#164E63" stroke-width="1.5"/>
<rect x="258" y="220" width="12" height="12" fill="none" stroke="#164E63" stroke-width="1" transform="rotate(-5,264,226)"/>

<!-- Base point H -->
<circle cx="250" cy="238" r="3" fill="#164E63"/>
<text x="237" y="250" font-size="12" fill="#164E63" font-weight="bold">H</text>

<!-- Lines on plane through H -->
<line x1="170" y1="250" x2="330" y2="232" stroke="#06B6D4" stroke-width="1.5"/>
<text x="335" y="230" font-size="12" fill="#06B6D4" font-style="italic">m</text>

<line x1="190" y1="265" x2="350" y2="248" stroke="#06B6D4" stroke-width="1.5"/>
<text x="355" y="246" font-size="12" fill="#06B6D4" font-style="italic">n</text>

<!-- Right angle marks at H for lines m and n -->
<rect x="248" y="230" width="8" height="8" fill="none" stroke="#06B6D4" stroke-width="1" transform="rotate(-8,252,234)"/>

<!-- Point on perpendicular -->
<circle cx="250" cy="140" r="3" fill="#164E63"/>
<text x="257" y="138" font-size="11" fill="#164E63">P</text>

<!-- Theorem text -->
<text x="250" y="305" text-anchor="middle" font-size="11" fill="#164E63">Прямая ⊥ плоскости, если она перпендикулярна</text>
<text x="250" y="323" text-anchor="middle" font-size="11" fill="#164E63">любой прямой, лежащей в этой плоскости.</text>
<text x="250" y="340" text-anchor="middle" font-size="11" fill="#164E63">AH ⊥ α ⟺ AH ⊥ m и AH ⊥ n, где m ∩ n = H</text>
</svg>