<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <linearGradient id="pl8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#EC407A" stop-opacity="0.18"/>
    </linearGradient>
    <marker id="arrPk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#AD1457"/>
    </marker>
    <marker id="arrPk2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#880E4F"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg8)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle" font-family="serif">Перпендикулярность прямой и плоскости</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E91E63" stroke-width="1" opacity="0.3"/>
  <!-- Definition Panel -->
  <rect x="12" y="58" width="235" height="135" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="serif">Определение</text>
  <text x="22" y="89" font-size="8" fill="#555" font-family="sans-serif">Прямая перпендикулярна</text>
  <text x="22" y="101" font-size="8" fill="#555" font-family="sans-serif">плоскости, если она</text>
  <text x="22" y="113" font-size="8" fill="#555" font-family="sans-serif">перпендикулярна любой</text>
  <text x="22" y="125" font-size="8" fill="#555" font-family="sans-serif">прямой, лежащей в этой</text>
  <text x="22" y="137" font-size="8" fill="#AD1457" font-weight="bold" font-family="sans-serif">плоскости.</text>
  <!-- 3D visual: line a perpendicular to plane -->
  <path d="M30,190 L55,160 L210,160 L185,190 Z" fill="url(#pl8)" stroke="#E91E63" stroke-width="1.2"/>
  <text x="155" y="185" font-size="9" fill="#AD1457" font-style="italic">alpha</text>
  <!-- perpendicular line -->
  <line x1="100" y1="155" x2="100" y2="88" stroke="#AD1457" stroke-width="2.5" marker-end="url(#arrPk)"/>
  <text x="108" y="100" font-size="9" fill="#AD1457" font-style="italic">a</text>
  <!-- Point on plane -->
  <circle cx="100" cy="163" r="3" fill="#880E4F"/>
  <text x="108" y="167" font-size="7" fill="#880E4F" font-style="italic">O</text>
  <!-- Multiple lines in plane perpendicular to a -->
  <line x1="60" y1="172" x2="160" y2="172" stroke="#4CAF50" stroke-width="1.2"/>
  <line x1="70" y1="180" x2="140" y2="168" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="80" y1="165" x2="130" y2="178" stroke="#FF6F00" stroke-width="1.2"/>
  <!-- right angle symbols -->
  <rect x="100" y="163" width="5" height="5" fill="none" stroke="#AD1457" stroke-width="0.8"/>
  <text x="115" y="175" font-size="7" fill="#4CAF50" font-style="italic">m</text>
  <text x="140" y="167" font-size="7" fill="#1565C0" font-style="italic">n</text>
  <text x="62" y="178" font-size="7" fill="#FF6F00" font-style="italic">p</text>
  <text x="130" y="195" font-size="7" fill="#AD1457" font-family="serif">a перп. m, n, p, ...</text>
  <!-- Sign Panel -->
  <rect x="255" y="58" width="233" height="135" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="serif">Признак перпендикулярности</text>
  <text x="265" y="89" font-size="8" fill="#555" font-family="sans-serif">Если прямая перпендикулярна</text>
  <text x="265" y="101" font-size="8" fill="#555" font-family="sans-serif">двум пересекающимся прямым,</text>
  <text x="265" y="113" font-size="8" fill="#555" font-family="sans-serif">лежащим в плоскости, то она</text>
  <text x="265" y="125" font-size="8" fill="#555" font-family="sans-serif">перпендикулярна этой</text>
  <text x="265" y="137" font-size="8" fill="#AD1457" font-weight="bold" font-family="sans-serif">плоскости.</text>
  <!-- Visual proof: line a perp to m and n -->
  <path d="M280,190 L300,165 L465,165 L445,190 Z" fill="url(#pl8)" stroke="#E91E63" stroke-width="1"/>
  <line x1="370" y1="160" x2="370" y2="95" stroke="#AD1457" stroke-width="2.5" marker-end="url(#arrPk)"/>
  <text x="378" y="102" font-size="9" fill="#AD1457" font-style="italic">a</text>
  <circle cx="370" cy="168" r="2.5" fill="#880E4F"/>
  <text x="378" y="174" font-size="7" fill="#880E4F" font-style="italic">O</text>
  <line x1="320" y1="178" x2="430" y2="172" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="330" y1="172" x2="420" y2="180" stroke="#1565C0" stroke-width="1.5"/>
  <!-- right angle markers -->
  <rect x="370" y="168" width="5" height="5" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
  <rect x="367" y="168" width="5" height="5" fill="none" stroke="#1565C0" stroke-width="0.8" transform="rotate(-10,370,168)"/>
  <text x="390" y="176" font-size="7" fill="#4CAF50" font-style="italic">m</text>
  <text x="395" y="185" font-size="7" fill="#1565C0" font-style="italic">n</text>
  <text x="372" y="195" font-size="7" fill="#AD1457" font-family="serif">a перп. m, a перп. n, m cap n</text>
  <!-- Theorem panel -->
  <rect x="12" y="200" width="240" height="108" rx="6" fill="white" opacity="0.88" stroke="#E91E63" stroke-width="1"/>
  <text x="132" y="216" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="serif">Свойства</text>
  <text x="22" y="231" font-size="7.5" fill="#555" font-family="sans-serif">1. Если a перп. alpha, b перп. alpha,</text>
  <text x="22" y="243" font-size="7.5" fill="#555" font-family="sans-serif">   то a || b</text>
  <text x="22" y="258" font-size="7.5" fill="#555" font-family="sans-serif">2. Если a || b, a перп. alpha,</text>
  <text x="22" y="270" font-size="7.5" fill="#555" font-family="sans-serif">   то b перп. alpha</text>
  <text x="22" y="285" font-size="7.5" fill="#555" font-family="sans-serif">3. Через любую точку проходит</text>
  <text x="22" y="297" font-size="7.5" fill="#555" font-family="sans-serif">   прямая, перп. плоскости</text>
  <!-- Construction panel -->
  <rect x="260" y="200" width="228" height="108" rx="6" fill="white" opacity="0.88" stroke="#E91E63" stroke-width="1"/>
  <text x="374" y="216" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="serif">Доказательство признака</text>
  <text x="270" y="231" font-size="7.5" fill="#555" font-family="sans-serif">1. Пусть a перп. m и a перп. n</text>
  <text x="270" y="243" font-size="7.5" fill="#555" font-family="sans-serif">   (m, n in alpha, m cap n = O)</text>
  <text x="270" y="255" font-size="7.5" fill="#555" font-family="sans-serif">2. Возьмём произвольную</text>
  <text x="270" y="267" font-size="7.5" fill="#555" font-family="sans-serif">   прямую p in alpha</text>
  <text x="270" y="279" font-size="7.5" fill="#555" font-family="sans-serif">3. Докажем: a перп. p</text>
  <text x="270" y="291" font-size="7.5" fill="#555" font-family="sans-serif">4. Разложим p через m и n</text>
  <text x="270" y="303" font-size="7.5" fill="#AD1457" font-weight="bold" font-family="sans-serif">   a перп. любой p в alpha</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#E91E63" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Признак: a перп. m и a перп. n (m cap n в alpha) =&gt; a перп. alpha</text>
</svg>