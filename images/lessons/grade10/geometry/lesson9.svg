<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Перпендикуляр и наклонная</text>

<!-- Plane α -->
<polygon points="60,230 340,200 440,260 160,290" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="410" y="255" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Point A above plane -->
<circle cx="200" cy="80" r="4" fill="#164E63"/>
<text x="208" y="78" font-size="13" fill="#164E63" font-weight="bold">A</text>

<!-- Perpendicular AH -->
<line x1="200" y1="80" x2="200" y2="250" stroke="#164E63" stroke-width="2.5"/>
<circle cx="200" cy="250" r="3" fill="#164E63"/>
<text x="187" y="260" font-size="12" fill="#164E63" font-weight="bold">H</text>

<!-- Right angle at H -->
<rect x="200" y="240" width="10" height="10" fill="none" stroke="#164E63" stroke-width="1.2"/>

<!-- Oblique line AM -->
<line x1="200" y1="80" x2="330" y2="235" stroke="#06B6D4" stroke-width="2.5"/>
<circle cx="330" cy="235" r="3" fill="#06B6D4"/>
<text x="337" y="232" font-size="12" fill="#06B6D4" font-weight="bold">M</text>

<!-- Projection HM -->
<line x1="200" y1="250" x2="330" y2="235" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="265" y="255" font-size="11" fill="#06B6D4" font-style="italic">HM</text>

<!-- Second oblique AN -->
<line x1="200" y1="80" x2="370" y2="248" stroke="#22D3EE" stroke-width="2"/>
<circle cx="370" cy="248" r="3" fill="#22D3EE"/>
<text x="377" y="246" font-size="12" fill="#22D3EE" font-weight="bold">N</text>

<!-- Projection HN -->
<line x1="200" y1="250" x2="370" y2="248" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="5,3"/>

<!-- Labels -->
<text x="170" y="170" font-size="11" fill="#164E63" font-style="italic">AH</text>
<text x="255" y="145" font-size="11" fill="#06B6D4" font-style="italic">AM</text>
<text x="285" y="120" font-size="11" fill="#22D3EE" font-style="italic">AN</text>

<!-- Legend -->
<rect x="30" y="65" width="130" height="60" fill="white" fill-opacity="0.7" stroke="#22D3EE" stroke-width="1" rx="4"/>
<text x="40" y="82" font-size="10" fill="#164E63" font-weight="bold">AH — перпендикуляр</text>
<text x="40" y="97" font-size="10" fill="#06B6D4" font-weight="bold">AM — наклонная</text>
<text x="40" y="112" font-size="10" fill="#22D3EE" font-weight="bold">HM — проекция</text>

<!-- Theorem text -->
<text x="250" y="315" text-anchor="middle" font-size="11" fill="#164E63">Перпендикуляр короче любой наклонной:</text>
<text x="250" y="333" text-anchor="middle" font-size="11" fill="#164E63">AH &lt; AM, AH &lt; AN. Если HM &lt; HN, то AM &lt; AN</text>
</svg>