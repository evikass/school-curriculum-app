<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
<marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#06B6D4"/>
</marker>
<marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#164E63"/>
</marker>
<marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
<polygon points="0,0 10,3.5 0,7" fill="#22D3EE"/>
</marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Умножение вектора на число. Компланарные векторы</text>

<!-- Scalar multiplication section (top) -->
<text x="130" y="65" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Умножение на число</text>

<!-- Original vector a -->
<line x1="40" y1="150" x2="120" y2="110" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrowCyan)"/>
<text x="75" y="118" font-size="13" fill="#06B6D4" font-weight="bold">a⃗</text>

<!-- 2a vector -->
<line x1="40" y1="150" x2="200" y2="70" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrowTeal)"/>
<text x="125" y="85" font-size="13" fill="#22D3EE" font-weight="bold">2a⃗</text>

<!-- 0.5a vector -->
<line x1="40" y1="150" x2="80" y2="130" stroke="#164E63" stroke-width="2.5" marker-end="url(#arrowDark)"/>
<text x="55" y="140" font-size="12" fill="#164E63" font-weight="bold">½a⃗</text>

<!-- -a vector (opposite direction) -->
<line x1="120" y1="110" x2="40" y2="150" stroke="#06B6D4" stroke-width="2.5" marker-end="url(#arrowCyan)" opacity="0.6"/>
<text x="90" y="143" font-size="12" fill="#06B6D4" font-weight="bold">−a⃗</text>

<!-- Common origin point -->
<circle cx="40" cy="150" r="3" fill="#164E63"/>
<text x="28" y="155" font-size="11" fill="#164E63">O</text>

<!-- Collinear note -->
<text x="130" y="185" text-anchor="middle" font-size="10" fill="#164E63">Коллинеарные векторы</text>

<!-- Coplanar vectors section (bottom-right) -->
<text x="370" y="65" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="bold">Компланарные векторы</text>

<!-- Plane for coplanar vectors -->
<polygon points="280,120 460,100 480,220 300,240" fill="#22D3EE" fill-opacity="0.08" stroke="#22D3EE" stroke-width="1.5"/>
<text x="460" y="115" font-size="12" fill="#06B6D4" font-style="italic">α</text>

<!-- Vector a in plane -->
<line x1="320" y1="180" x2="420" y2="145" stroke="#06B6D4" stroke-width="3" marker-end="url(#arrowCyan)"/>
<text x="375" y="152" font-size="13" fill="#06B6D4" font-weight="bold">a⃗</text>

<!-- Vector b in plane -->
<line x1="320" y1="180" x2="380" y2="220" stroke="#22D3EE" stroke-width="3" marker-end="url(#arrowTeal)"/>
<text x="355" y="215" font-size="13" fill="#22D3EE" font-weight="bold">b⃗</text>

<!-- Vector c in plane -->
<line x1="320" y1="180" x2="340" y2="140" stroke="#164E63" stroke-width="3" marker-end="url(#arrowDark)"/>
<text x="345" y="138" font-size="13" fill="#164E63" font-weight="bold">c⃗</text>

<!-- Origin -->
<circle cx="320" cy="180" r="3" fill="#164E63"/>
<text x="308" y="185" font-size="11" fill="#164E63">O</text>

<!-- Theorem text -->
<text x="250" y="275" text-anchor="middle" font-size="11" fill="#164E63">k · a⃗ — вектор коллинеарный a⃗, |k · a⃗| = |k| · |a⃗|</text>
<text x="250" y="295" text-anchor="middle" font-size="11" fill="#164E63">При k &gt; 0 — сонаправлен, при k &lt; 0 — противоположно направлен</text>
<text x="250" y="320" text-anchor="middle" font-size="11" fill="#164E63">Компланарные векторы — векторы, параллельные одной плоскости.</text>
<text x="250" y="340" text-anchor="middle" font-size="10" fill="#06B6D4">Если c⃗ = x·a⃗ + y·b⃗, то a⃗, b⃗, c⃗ — компланарны</text>
</svg>