<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Параллельные прямые в пространстве</text>

<!-- Plane α -->
<polygon points="60,180 300,150 440,200 200,250" fill="#22D3EE" fill-opacity="0.1" stroke="#22D3EE" stroke-width="1.5"/>
<text x="420" y="195" font-size="13" fill="#06B6D4" font-style="italic">α</text>

<!-- Parallel line a (on plane) -->
<line x1="120" y1="200" x2="380" y2="175" stroke="#164E63" stroke-width="2.5"/>
<text x="385" y="172" font-size="13" fill="#164E63" font-style="italic">a</text>

<!-- Parallel line b (on plane, parallel to a) -->
<line x1="100" y1="225" x2="360" y2="200" stroke="#06B6D4" stroke-width="2.5"/>
<text x="365" y="198" font-size="13" fill="#06B6D4" font-style="italic">b</text>

<!-- Parallel markers -->
<line x1="230" y1="190" x2="236" y2="182" stroke="#164E63" stroke-width="1.5"/>
<line x1="233" y1="191" x2="239" y2="183" stroke="#164E63" stroke-width="1.5"/>
<line x1="220" y1="213" x2="226" y2="205" stroke="#06B6D4" stroke-width="1.5"/>
<line x1="223" y1="214" x2="229" y2="206" stroke="#06B6D4" stroke-width="1.5"/>

<!-- Third line c above plane, parallel to a and b -->
<line x1="150" y1="100" x2="400" y2="80" stroke="#164E63" stroke-width="2.5" stroke-dasharray="8,4"/>
<text x="405" y="78" font-size="13" fill="#164E63" font-style="italic">c</text>

<!-- Vertical dashed connectors -->
<line x1="200" y1="100" x2="200" y2="195" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
<line x1="300" y1="92" x2="300" y2="183" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

<!-- Parallel markers on c -->
<line x1="260" y1="92" x2="266" y2="84" stroke="#164E63" stroke-width="1.5"/>
<line x1="263" y1="93" x2="269" y2="85" stroke="#164E63" stroke-width="1.5"/>

<!-- Points on lines -->
<circle cx="200" cy="193" r="3" fill="#164E63"/>
<text x="190" y="188" font-size="11" fill="#164E63">A</text>

<circle cx="200" cy="222" r="3" fill="#06B6D4"/>
<text x="190" y="230" font-size="11" fill="#06B6D4">B</text>

<!-- Theorem text -->
<text x="250" y="290" text-anchor="middle" font-size="12" fill="#164E63">Две прямые в пространстве называются</text>
<text x="250" y="308" text-anchor="middle" font-size="12" fill="#164E63">параллельными, если они лежат в одной</text>
<text x="250" y="326" text-anchor="middle" font-size="12" fill="#164E63">плоскости и не пересекаются: a ∥ b ∥ c</text>
</svg>