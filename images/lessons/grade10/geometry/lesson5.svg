<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECFEFF"/><stop offset="100%" stop-color="#CFFAFE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="12"/>
<text x="250" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#164E63">Скрещивающиеся прямые</text>

<!-- Plane α -->
<polygon points="80,200 350,170 420,230 150,260" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-width="1.5"/>
<text x="390" y="225" font-size="14" fill="#06B6D4" font-style="italic">α</text>

<!-- Line a on plane α -->
<line x1="120" y1="230" x2="380" y2="200" stroke="#164E63" stroke-width="2.5"/>
<text x="385" y="198" font-size="13" fill="#164E63" font-style="italic">a</text>

<!-- Points on line a -->
<circle cx="200" cy="220" r="3" fill="#164E63"/>
<text x="195" y="235" font-size="11" fill="#164E63">A</text>

<circle cx="320" cy="207" r="3" fill="#164E63"/>
<text x="327" y="204" font-size="11" fill="#164E63">B</text>

<!-- Line b NOT on plane — skew line (above, going different direction) -->
<line x1="160" y1="80" x2="350" y2="140" stroke="#06B6D4" stroke-width="2.5"/>
<text x="355" y="138" font-size="13" fill="#06B6D4" font-style="italic">b</text>

<!-- Points on line b -->
<circle cx="220" cy="100" r="3" fill="#06B6D4"/>
<text x="225" y="93" font-size="11" fill="#06B6D4">C</text>

<circle cx="310" cy="130" r="3" fill="#06B6D4"/>
<text x="316" y="127" font-size="11" fill="#06B6D4">D</text>

<!-- Vertical dashed projection showing they don't intersect -->
<line x1="220" y1="100" x2="200" y2="220" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
<line x1="310" y1="130" x2="320" y2="207" stroke="#164E63" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

<!-- Skew symbol -->
<text x="260" y="165" font-size="20" fill="#164E63" font-weight="bold">⊛</text>

<!-- Definition text -->
<text x="250" y="290" text-anchor="middle" font-size="11" fill="#164E63">Две прямые называются скрещивающимися,</text>
<text x="250" y="308" text-anchor="middle" font-size="11" fill="#164E63">если они не лежат в одной плоскости.</text>
<text x="250" y="326" text-anchor="middle" font-size="11" fill="#164E63">Признак: если одна прямая ∈ α, а другая пересекает α</text>
<text x="250" y="340" text-anchor="middle" font-size="11" fill="#164E63">в точке ∉ первой прямой, то прямые скрещиваются.</text>
</svg>