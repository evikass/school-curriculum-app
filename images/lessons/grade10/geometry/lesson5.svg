<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="pl5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#AB47BC" stop-opacity="0.18"/>
    </linearGradient>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg5)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle" font-family="serif">Скрещивающиеся прямые</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 5</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>
  <!-- Definition Panel -->
  <rect x="12" y="58" width="152" height="128" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="88" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Определение</text>
  <text x="22" y="89" font-size="7.5" fill="#555" font-family="sans-serif">Две прямые называются</text>
  <text x="22" y="101" font-size="7.5" fill="#555" font-family="sans-serif">скрещивающимися, если</text>
  <text x="22" y="113" font-size="7.5" fill="#555" font-family="sans-serif">они не лежат в одной</text>
  <text x="22" y="125" font-size="7.5" fill="#7B1FA2" font-weight="bold" font-family="sans-serif">плоскости.</text>
  <!-- mini diagram -->
  <line x1="30" y1="170" x2="100" y2="150" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrP)"/>
  <line x1="40" y1="150" x2="110" y2="170" stroke="#E53935" stroke-width="1.5"/>
  <text x="72" y="148" font-size="7" fill="#7B1FA2" font-style="italic">a</text>
  <text x="72" y="178" font-size="7" fill="#E53935" font-style="italic">b</text>
  <text x="88" y="180" font-size="7" fill="#7B1FA2" font-family="serif">a -/|- b</text>
  <!-- Cube Panel - main visual -->
  <rect x="172" y="58" width="175" height="168" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="260" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Пример: рёбра куба</text>
  <!-- 3D cube -->
  <!-- front face -->
  <rect x="205" y="115" width="70" height="60" rx="1" fill="url(#pl5)" stroke="#7B1FA2" stroke-width="1.2"/>
  <!-- back face offset -->
  <line x1="205" y1="115" x2="230" y2="98" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="275" y1="115" x2="300" y2="98" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="275" y1="175" x2="300" y2="158" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="205" y1="175" x2="230" y2="158" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- top face -->
  <path d="M205,115 L230,98 L300,98 L275,115 Z" fill="url(#pl5)" stroke="#7B1FA2" stroke-width="1"/>
  <!-- right face -->
  <path d="M275,115 L300,98 L300,158 L275,175 Z" fill="url(#pl5)" stroke="#7B1FA2" stroke-width="1"/>
  <!-- hidden bottom-back edge -->
  <line x1="230" y1="158" x2="300" y2="158" stroke="#7B1FA2" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="230" y1="98" x2="230" y2="158" stroke="#7B1FA2" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Vertices -->
  <text x="200" y="112" font-size="7" fill="#4A148C" font-style="italic">A</text>
  <text x="277" y="112" font-size="7" fill="#4A148C" font-style="italic">B</text>
  <text x="277" y="183" font-size="7" fill="#4A148C" font-style="italic">C</text>
  <text x="200" y="183" font-size="7" fill="#4A148C" font-style="italic">D</text>
  <text x="226" y="95" font-size="7" fill="#4A148C" font-style="italic">A1</text>
  <text x="302" y="95" font-size="7" fill="#4A148C" font-style="italic">B1</text>
  <text x="302" y="163" font-size="7" fill="#4A148C" font-style="italic">C1</text>
  <text x="226" y="163" font-size="7" fill="#4A148C" font-style="italic">D1</text>
  <!-- Highlight skew edges -->
  <line x1="205" y1="115" x2="205" y2="175" stroke="#E53935" stroke-width="2.2"/>
  <line x1="300" y1="98" x2="300" y2="158" stroke="#FF6F00" stroke-width="2.2"/>
  <text x="260" y="196" font-size="7" fill="#E53935" font-family="sans-serif">AA1 и B1C1 —</text>
  <text x="260" y="207" font-size="7" fill="#7B1FA2" font-weight="bold" font-family="sans-serif">скрещивающиеся!</text>
  <!-- Angle between skew lines -->
  <rect x="355" y="58" width="133" height="128" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="422" y="74" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Угол между</text>
  <text x="422" y="86" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">скр. прямыми</text>
  <!-- Parallel transfer visual -->
  <path d="M375,165 L395,145 L480,145 L460,165 Z" fill="url(#pl5)" stroke="#9C27B0" stroke-width="0.8"/>
  <line x1="385" y1="160" x2="450" y2="148" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="425" y="146" font-size="7" fill="#7B1FA2" font-style="italic">a</text>
  <line x1="390" y1="153" x2="455" y2="141" stroke="#E53935" stroke-width="1.5"/>
  <text x="435" y="138" font-size="7" fill="#E53935" font-style="italic">a'</text>
  <line x1="410" y1="155" x2="430" y2="148" stroke="#FF6F00" stroke-width="1.2"/>
  <text x="422" y="146" font-size="6" fill="#FF6F00">phi</text>
  <!-- arc for angle -->
  <path d="M410,152 A8,8 0 0,1 415,148" fill="none" stroke="#FF6F00" stroke-width="1"/>
  <text x="422" y="174" font-size="7" fill="#555" font-family="sans-serif">Перенос a || a'</text>
  <text x="422" y="184" font-size="7" fill="#555" font-family="sans-serif">через точку O</text>
  <!-- Sign of skew lines -->
  <rect x="12" y="200" width="235" height="108" rx="6" fill="white" opacity="0.88" stroke="#9C27B0" stroke-width="1"/>
  <text x="130" y="216" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Признак скрещивающихся прямых</text>
  <text x="22" y="231" font-size="7.5" fill="#555" font-family="sans-serif">Если одна из двух прямых лежит</text>
  <text x="22" y="243" font-size="7.5" fill="#555" font-family="sans-serif">в некоторой плоскости, а другая</text>
  <text x="22" y="255" font-size="7.5" fill="#555" font-family="sans-serif">прямая пересекает эту плоскость</text>
  <text x="22" y="267" font-size="7.5" fill="#555" font-family="sans-serif">в точке, не лежащей на первой</text>
  <text x="22" y="279" font-size="7.5" fill="#555" font-family="sans-serif">прямой, то эти прямые</text>
  <text x="22" y="291" font-size="7.5" fill="#7B1FA2" font-weight="bold" font-family="sans-serif">скрещивающиеся.</text>
  <!-- mini diagram for sign -->
  <path d="M185,235 L200,222 L235,225 L220,238 Z" fill="url(#pl5)" stroke="#9C27B0" stroke-width="0.8"/>
  <line x1="195" y1="232" x2="228" y2="228" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="190" y1="248" x2="222" y2="235" stroke="#E53935" stroke-width="1.2"/>
  <circle cx="210" cy="230" r="2" fill="#E53935"/>
  <text x="195" y="248" font-size="6" fill="#7B1FA2" font-style="italic">a</text>
  <text x="185" y="254" font-size="6" fill="#E53935" font-style="italic">b</text>
  <!-- Three cases panel -->
  <rect x="255" y="200" width="233" height="108" rx="6" fill="white" opacity="0.88" stroke="#9C27B0" stroke-width="1"/>
  <text x="372" y="216" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Три случая взаимного положения</text>
  <!-- Case 1: parallel -->
  <line x1="275" y1="235" x2="330" y2="230" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="275" y1="242" x2="330" y2="237" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="340" y="238" font-size="7" fill="#4CAF50" font-family="sans-serif">1. Параллельные</text>
  <!-- Case 2: intersecting -->
  <line x1="275" y1="258" x2="330" y2="252" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="280" y1="250" x2="325" y2="260" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="303" cy="255" r="2" fill="#1565C0"/>
  <text x="340" y="258" font-size="7" fill="#1565C0" font-family="sans-serif">2. Пересекающиеся</text>
  <!-- Case 3: skew -->
  <line x1="275" y1="278" x2="325" y2="272" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="285" y1="270" x2="330" y2="283" stroke="#E53935" stroke-width="1.5"/>
  <text x="340" y="278" font-size="7" fill="#7B1FA2" font-weight="bold" font-family="sans-serif">3. Скрещивающиеся</text>
  <line x1="275" y1="295" x2="475" y2="295" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
  <text x="265" y="305" font-size="7" fill="#555" font-family="sans-serif">Только в 3-м случае прямые</text>
  <text x="265" y="305" font-size="7" fill="#555" font-family="sans-serif">не лежат в одной плоскости</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#9C27B0" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Скрещивающиеся: не пересекаются, не параллельны, не лежат в одной плоскости</text>
</svg>