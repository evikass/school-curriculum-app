<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg18" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="sh18" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg18)"/>
  <rect y="44" width="400" height="8" fill="url(#tg18)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Углеводы: моносахариды</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Glucose -->
    <rect x="10" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh18)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Глюкоза C6H12O6</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Альдегидоспирт:</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">-CHO + 5 групп -OH</text>
    <text x="22" y="120" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Открытая форма:</text>
    <text x="22" y="132" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CHO-(CHOH)4-CH2OH</text>
    <text x="22" y="146" font-family="Arial, sans-serif" font-size="9" fill="#a855f7">Циклическая форма:</text>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">6-членное кольцо</text>
    <text x="22" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(пиранозная форма)</text>

  <!-- Top right: Fructose -->
    <rect x="205" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh18)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Фруктоза C6H12O6</text>
    <text x="217" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Кетоноспирт:</text>
    <text x="217" y="106" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C=O + 5 групп -OH</text>
    <text x="217" y="120" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">Изомер глюкозы!</text>
    <text x="217" y="134" font-family="Arial, sans-serif" font-size="9" fill="#a855f7">Фуранозная форма:</text>
    <text x="217" y="146" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">5-членное кольцо</text>
    <text x="217" y="160" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Самый сладкий сахар</text>

  <!-- Bottom left: Qualitative reactions -->
    <rect x="10" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh18)"/>
    <text x="22" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Качественные реакции</text>
    <text x="22" y="210" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Серебряное зеркало:</text>
    <text x="22" y="222" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">C6H12O6 + [Ag(NH3)2]+</text>
    <text x="22" y="233" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">→ глюконовая к-та + Ag</text>
    <text x="22" y="247" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Cu(OH)2:</text>
    <text x="22" y="259" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">→ Cu2O (красный осадок)</text>
    <text x="22" y="273" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Подтверждает -CHO группу</text>
    <text x="22" y="286" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">глюкозы</text>

  <!-- Bottom right: Fermentation -->
    <rect x="205" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh18)"/>
    <text x="217" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Брожение глюкозы</text>
    <text x="217" y="210" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Спиртовое брожение:</text>
    <text x="217" y="222" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C6H12O6 → 2C2H5OH</text>
    <text x="217" y="234" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">  + 2CO2 (ферменты)</text>
    <text x="217" y="248" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Молочнокислое:</text>
    <text x="217" y="260" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C6H12O6 → 2C3H6O3</text>
    <text x="217" y="272" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">  (молочная кислота)</text>
    <text x="217" y="286" font-family="Arial, sans-serif" font-size="8.5" fill="#10b981">Общая ф-ла: Cn(H2O)m</text>
</svg>