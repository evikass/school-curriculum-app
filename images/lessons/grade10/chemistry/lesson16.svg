<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg16" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="sh16" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg16)"/>
  <rect y="44" width="400" height="8" fill="url(#tg16)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Карбоновые кислоты</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: COOH group -->
    <rect x="10" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh16)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Группа -COOH</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Карбоксильная группа:</text>
  <rect x="30" y="102" width="70" height="28" rx="4" fill="none" stroke="#ef4444" stroke-width="1"/>
    <text x="35" y="120" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">R-COOH</text>
    <text x="22" y="145" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C=O + OH на одном C</text>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Слабые кислоты</text>
    <text x="22" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">pKa ~ 4-5 (HCOOH=3.75)</text>

  <!-- Top right: Important acids -->
    <rect x="205" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh16)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Важнейшие кислоты</text>
    <text x="217" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Муравьиная HCOOH</text>
    <text x="217" y="106" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Уксусная CH3COOH</text>
    <text x="217" y="118" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Пропионовая C2H5COOH</text>
    <text x="217" y="130" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Масляная C3H7COOH</text>
    <text x="217" y="146" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Щавелевая HOOC-COOH</text>
    <text x="217" y="158" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(двухосновная)</text>

  <!-- Bottom left: Acid properties -->
    <rect x="10" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh16)"/>
    <text x="22" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Кислотные свойства</text>
    <text x="22" y="210" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">1. + Me → соль + H2</text>
    <text x="22" y="222" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">2CH3COOH+Mg→</text>
    <text x="22" y="233" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">  (CH3COO)2Mg+H2</text>
    <text x="22" y="247" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">2. + основание → соль</text>
    <text x="22" y="259" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">3. Диссоциация:</text>
    <text x="22" y="271" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">CH3COOH ↔ H+ + CH3COO-</text>

  <!-- Bottom right: Esterification -->
    <rect x="205" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh16)"/>
    <text x="217" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Реакция этерификации</text>
    <text x="217" y="210" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Кислота + Спирт →</text>
    <text x="217" y="222" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Сложный эфир + H2O</text>
    <text x="217" y="238" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">CH3COOH + C2H5OH</text>
    <text x="217" y="250" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  ↔ CH3COOC2H5 + H2O</text>
    <text x="217" y="264" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Кат.: H2SO4 (конц.)</text>
    <text x="217" y="278" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">Обратимая реакция!</text>
</svg>