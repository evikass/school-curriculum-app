<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Нуклеиновые кислоты: ДНК и РНК</text>

  <!-- DNA double helix -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="360" height="350" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#60a5fa" text-anchor="middle">ДНК (Дезоксирибоза)</text>

    <!-- Double helix simplified -->
    <g transform="translate(40, 40)">
      <!-- Strand 1 -->
      <path d="M40,0 Q80,20 40,40 Q0,60 40,80 Q80,100 40,120 Q0,140 40,160 Q80,180 40,200 Q0,220 40,240 Q80,260 40,280" fill="none" stroke="#3b82f6" stroke-width="3"/>
      <!-- Strand 2 -->
      <path d="M160,0 Q120,20 160,40 Q200,60 160,80 Q120,100 160,120 Q200,140 160,160 Q120,180 160,200 Q200,220 160,240 Q120,260 160,280" fill="none" stroke="#ef4444" stroke-width="3"/>

      <!-- Base pairs (rungs) -->
      <line x1="55" y1="20" x2="145" y2="20" stroke="#10b981" stroke-width="2" opacity="0.6"/>
      <text x="80" y="16" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">A=T</text>

      <line x1="45" y1="60" x2="155" y2="60" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <text x="80" y="56" font-family="Arial, sans-serif" font-size="8" fill="#fbbf24">G=C</text>

      <line x1="55" y1="100" x2="145" y2="100" stroke="#10b981" stroke-width="2" opacity="0.6"/>
      <text x="80" y="96" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">A=T</text>

      <line x1="45" y1="140" x2="155" y2="140" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <text x="80" y="136" font-family="Arial, sans-serif" font-size="8" fill="#fbbf24">G=C</text>

      <line x1="55" y1="180" x2="145" y2="180" stroke="#10b981" stroke-width="2" opacity="0.6"/>
      <text x="80" y="176" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">A=T</text>

      <line x1="45" y1="220" x2="155" y2="220" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <text x="80" y="216" font-family="Arial, sans-serif" font-size="8" fill="#fbbf24">G=C</text>

      <line x1="55" y1="260" x2="145" y2="260" stroke="#10b981" stroke-width="2" opacity="0.6"/>
      <text x="80" y="256" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">T=A</text>
    </g>

    <text x="180" y="330" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Уотсон и Крик, 1953</text>
  </g>

  <!-- RNA structure -->
  <g transform="translate(410, 70)">
    <rect x="0" y="0" width="360" height="180" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#f87171" text-anchor="middle">РНК (Рибоза)</text>

    <!-- Single strand -->
    <g transform="translate(30, 45)">
      <path d="M0,10 Q40,0 80,20 Q120,40 160,10 Q200,-20 240,20 Q280,50 300,10" fill="none" stroke="#ef4444" stroke-width="3"/>
      <circle cx="40" cy="8" r="6" fill="#a855f7" opacity="0.5"/>
      <circle cx="120" cy="30" r="6" fill="#3b82f6" opacity="0.5"/>
      <circle cx="200" cy="0" r="6" fill="#10b981" opacity="0.5"/>
      <circle cx="280" cy="30" r="6" fill="#f59e0b" opacity="0.5"/>
    </g>

    <text x="180" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Одноцепочечная, рибоза</text>
    <text x="180" y="110" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Урацил (U) вместо тимина (T)</text>

    <!-- Types of RNA -->
    <g transform="translate(15, 125)">
      <rect x="0" y="0" width="100" height="35" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
      <text x="50" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#60a5fa" text-anchor="middle">иРНК</text>
      <text x="50" y="28" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">информ.</text>
      <rect x="115" y="0" width="100" height="35" rx="4" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
      <text x="165" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#14b8a6" text-anchor="middle">тРНК</text>
      <text x="165" y="28" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">транспорт.</text>
      <rect x="230" y="0" width="100" height="35" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <text x="280" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fbbf24" text-anchor="middle">рРНК</text>
      <text x="280" y="28" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">рибосом.</text>
    </g>
  </g>

  <!-- Complementarity rules -->
  <g transform="translate(410, 270)">
    <rect x="0" y="0" width="360" height="150" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Правило комплементарности</text>

    <text x="180" y="50" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">A = T (2 водородные связи)</text>
    <text x="180" y="75" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">G = C (3 водородные связи)</text>

    <line x1="50" y1="90" x2="310" y2="90" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

    <text x="180" y="110" font-family="Arial, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">Правило Чаргаффа:</text>
    <text x="180" y="130" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">Количество A = T, G = C</text>
    <text x="180" y="145" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">A + G = T + C (Пурины = Пиримидины)</text>
  </g>

  <!-- DNA vs RNA comparison -->
  <g transform="translate(410, 435)">
    <rect x="0" y="0" width="160" height="45" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="80" y="17" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#60a5fa" text-anchor="middle">ДНК</text>
    <text x="80" y="35" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Двойная, дезоксирибоза</text>

    <rect x="190" y="0" width="160" height="45" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="270" y="17" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#f87171" text-anchor="middle">РНК</text>
    <text x="270" y="35" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Одинарная, рибоза, U</text>
  </g>
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>