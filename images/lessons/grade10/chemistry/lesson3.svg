<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg3" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="sh3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg3)"/>
  <rect y="44" width="400" height="8" fill="url(#tg3)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Классификация и номенклатура</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Classification by skeleton -->
    <rect x="10" y="60" width="185" height="110" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh3)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">По углеродному скелету</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9.5" fill="#14b8a6">Ациклические (открытые)</text>
    <text x="28" y="105" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">• Линейные: CH3-CH2-CH3</text>
    <text x="28" y="116" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">• Разветвлённые: CH(CH3)3</text>
    <text x="22" y="130" font-family="Arial, sans-serif" font-size="9.5" fill="#f59e0b">Циклические (замкнутые)</text>
    <text x="28" y="141" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">• Карбоциклические</text>
    <text x="28" y="152" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">• Гетероциклические</text>

  <!-- Top right: Classification by functional group -->
    <rect x="205" y="60" width="185" height="110" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh3)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">По функциональной группе</text>
  <line x1="217" y1="86" x2="379" y2="86" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
    <text x="217" y="98" font-family="Arial, sans-serif" font-size="8.5" fill="#64748b">Группа</text>
    <text x="285" y="98" font-family="Arial, sans-serif" font-size="8.5" fill="#64748b">Класс</text>
    <text x="217" y="110" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">-OH</text>
    <text x="285" y="110" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Спирты</text>
    <text x="217" y="122" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">-COOH</text>
    <text x="285" y="122" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Кислоты</text>
    <text x="217" y="134" font-family="Arial, sans-serif" font-size="9" fill="#10b981">-CHO</text>
    <text x="285" y="134" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Альдегиды</text>
    <text x="217" y="146" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6">-NH2</text>
    <text x="285" y="146" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Амины</text>
    <text x="217" y="158" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">C=O</text>
    <text x="285" y="158" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Кетоны</text>

  <!-- Bottom: IUPAC nomenclature -->
    <rect x="10" y="178" width="380" height="112" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh3)"/>
    <text x="22" y="196" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Номенклатура ИЮПАК (IUPAC)</text>
    <text x="22" y="212" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Корни названий углеродной цепи:</text>
    <text x="22" y="226" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">C1-Мет  C2-Эт  C3-Проп  C4-Бут</text>
    <text x="22" y="239" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">C5-Пент  C6-Гекс  C7-Гепт  C8-Окт</text>
    <text x="22" y="255" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Суффиксы:</text>
    <text x="22" y="268" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">-ан (алканы)  -ен (алкены)  -ин (алкины)</text>
    <text x="22" y="281" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">-ол (спирты)  -аль (альдегиды)  -овая (к-ты)</text>
</svg>