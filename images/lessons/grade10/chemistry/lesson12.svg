<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg12" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="sh12" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg12)"/>
  <rect y="44" width="400" height="8" fill="url(#tg12)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Природные источники УВ</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Petroleum -->
    <rect x="10" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh12)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Нефть</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Смесь углеводородов</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Перегонка (фракции):</text>
    <text x="22" y="118" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  30-180°C — бензин</text>
    <text x="22" y="129" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  180-240°C — лигроин</text>
    <text x="22" y="140" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  240-300°C — керосин</text>
    <text x="22" y="151" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  >300°C — мазут</text>
    <text x="22" y="164" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  остаток — гудрон</text>

  <!-- Top right: Natural gas & coal -->
    <rect x="205" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh12)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Природный газ</text>
    <text x="217" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">80-97% CH4 (метан)</text>
    <text x="217" y="107" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C2H6, C3H8 — примеси</text>
    <text x="217" y="121" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Каменный уголь:</text>
    <text x="217" y="133" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Коксование → кокс +</text>
    <text x="217" y="144" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">каменноуг. смола + газ</text>

  <!-- Bottom left: Cracking & reforming -->
    <rect x="10" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh12)"/>
    <text x="22" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Крекинг и риформинг</text>
    <text x="22" y="210" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Термический крекинг:</text>
    <text x="22" y="222" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C16H34 → C8H18 + C8H16</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(высокая t°, без кат.)</text>
    <text x="22" y="248" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Каталитический крекинг:</text>
    <text x="22" y="260" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">(кат., более лёгкий)</text>
    <text x="22" y="274" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">Риформинг → арены</text>

  <!-- Bottom right: Distillation diagram -->
    <rect x="205" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh12)"/>
    <text x="217" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Фракционная перегонка</text>
  <rect x="260" y="210" width="30" height="70" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="265" y="215" width="20" height="10" rx="1" fill="#f59e0b" opacity="0.7"/>
  <text x="275" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#e2e8f0">бензин</text>
  <rect x="265" y="228" width="20" height="10" rx="1" fill="#0d9488" opacity="0.7"/>
  <text x="275" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#e2e8f0">керосин</text>
  <rect x="265" y="241" width="20" height="10" rx="1" fill="#ef4444" opacity="0.7"/>
  <text x="275" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#e2e8f0">мазут</text>
  <rect x="265" y="254" width="20" height="10" rx="1" fill="#64748b" opacity="0.7"/>
  <text x="275" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#e2e8f0">гудрон</text>
    <text x="300" y="222" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">↑ t° кип. ↓</text>
    <text x="217" y="282" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Нефть → разд. по t° кип.</text>
</svg>