<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Белки: структура и функции</text>

  <!-- Four levels of protein structure -->
  <!-- Primary -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="175" height="190" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <text x="87" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">Первичная</text>

    <!-- Chain of amino acids -->
    <g transform="translate(15, 30)">
      <rect x="0" y="0" width="30" height="25" rx="4" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
      <text x="15" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Ala</text>
      <line x1="30" y1="12" x2="38" y2="12" stroke="#ef4444" stroke-width="2"/>
      <rect x="38" y="0" width="30" height="25" rx="4" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
      <text x="53" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Gly</text>
      <line x1="68" y1="12" x2="76" y2="12" stroke="#ef4444" stroke-width="2"/>
      <rect x="76" y="0" width="30" height="25" rx="4" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>
      <text x="91" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Val</text>
      <line x1="106" y1="12" x2="114" y2="12" stroke="#ef4444" stroke-width="2"/>
      <rect x="114" y="0" width="30" height="25" rx="4" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="1"/>
      <text x="129" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Leu</text>
    </g>

    <text x="87" y="80" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Последовательность</text>
    <text x="87" y="95" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">аминокислот</text>
    <rect x="15" y="108" width="145" height="22" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <text x="87" y="123" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">Пептидные связи (ковалентные)</text>
    <text x="87" y="150" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Определяется генетическим</text>
    <text x="87" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">кодом ДНК</text>
    <text x="87" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">Уровень 1</text>
  </g>

  <!-- Secondary -->
  <g transform="translate(210, 70)">
    <rect x="0" y="0" width="175" height="190" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="87" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6" text-anchor="middle">Вторичная</text>

    <!-- Alpha helix -->
    <g transform="translate(30, 35)">
      <path d="M10,0 Q30,-10 50,0 Q70,10 90,0 Q110,-10 120,5" fill="none" stroke="#14b8a6" stroke-width="2.5"/>
      <!-- H-bonds -->
      <line x1="25" y1="-5" x2="25" y2="20" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
      <line x1="65" y1="5" x2="65" y2="30" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
      <line x1="105" y1="-5" x2="105" y2="20" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    </g>

    <text x="87" y="80" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Альфа-спираль</text>
    <text x="87" y="95" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">и бета-лист</text>
    <rect x="15" y="108" width="145" height="22" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="87" y="123" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Водородные связи</text>
    <text x="87" y="150" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">C=O...H-N между</text>
    <text x="87" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">пептидными группами</text>
    <text x="87" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6" text-anchor="middle">Уровень 2</text>
  </g>

  <!-- Tertiary -->
  <g transform="translate(400, 70)">
    <rect x="0" y="0" width="175" height="190" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <text x="87" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fbbf24" text-anchor="middle">Третичная</text>

    <!-- Globular shape -->
    <g transform="translate(40, 40)">
      <ellipse cx="50" cy="25" rx="45" ry="30" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
      <path d="M10,25 Q30,-5 50,5 Q80,15 90,25 Q80,50 50,50 Q20,50 10,25" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <!-- S-S bond -->
      <line x1="30" y1="15" x2="70" y2="35" stroke="#ef4444" stroke-width="2"/>
      <text x="50" y="27" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">S-S</text>
    </g>

    <text x="87" y="80" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Глобула (компактная)</text>
    <rect x="15" y="95" width="145" height="35" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="87" y="110" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Дисульфидные, ионные,</text>
    <text x="87" y="123" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">гидрофобные связи</text>
    <text x="87" y="150" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Определяет функцию</text>
    <text x="87" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">белка</text>
    <text x="87" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fbbf24" text-anchor="middle">Уровень 3</text>
  </g>

  <!-- Quaternary -->
  <g transform="translate(590, 70)">
    <rect x="0" y="0" width="175" height="190" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="87" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f87171" text-anchor="middle">Четвертичная</text>

    <!-- Multiple subunits -->
    <g transform="translate(25, 35)">
      <circle cx="25" cy="20" r="20" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="65" cy="20" r="20" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="45" cy="50" r="20" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="85" cy="50" r="20" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
    </g>

    <text x="87" y="110" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Несколько субъединиц</text>
    <rect x="15" y="120" width="145" height="22" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="87" y="135" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">Нековалентные связи</text>
    <text x="87" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Пример: гемоглобин</text>
    <text x="87" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f87171" text-anchor="middle">Уровень 4</text>
  </g>

  <!-- Denaturation -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="700" height="180" rx="8" fill="#0f172a" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
    <text x="350" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Денатурация и ренатурация</text>

    <!-- Native protein -->
    <g transform="translate(80, 45)">
      <ellipse cx="50" cy="40" rx="40" ry="35" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
      <text x="50" y="45" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle">Нативный</text>
    </g>

    <!-- Arrow: denaturation -->
    <g transform="translate(190, 65)">
      <path d="M0,20 L100,20" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowHead1)"/>
      <text x="50" y="10" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Денатурация</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">t, кислоты, соли</text>
    </g>

    <!-- Denatured -->
    <g transform="translate(310, 45)">
      <path d="M10,30 Q30,10 50,35 Q70,60 90,20 Q110,0 120,40" fill="none" stroke="#ef4444" stroke-width="2.5"/>
      <text x="60" y="65" font-family="Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">Денатурированный</text>
    </g>

    <!-- Arrow: renaturation -->
    <g transform="translate(450, 65)">
      <path d="M0,20 L100,20" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrowHead1)"/>
      <text x="50" y="10" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle">Ренатурация</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">мягкие условия</text>
    </g>

    <!-- Renatured -->
    <g transform="translate(570, 45)">
      <ellipse cx="50" cy="40" rx="40" ry="35" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
      <text x="50" y="45" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle">Нативный</text>
    </g>

    <!-- Color reactions -->
    <text x="350" y="150" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Качественные реакции: биуретовая (фиолетовый), ксантопротеиновая (жёлтый)</text>
    <text x="350" y="170" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Доказательство наличия пептидных связей и ароматических колец</text>
  </g>
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>