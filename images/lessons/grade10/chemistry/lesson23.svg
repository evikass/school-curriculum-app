<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00897B"/><stop offset="100%" stop-color="#00695C"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<rect x="10" y="10" width="480" height="32" rx="5" fill="url(#panel)" opacity="0.9"/>
<text x="250" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Алкадиены. Сопряжённые системы</text>
<text x="250" y="55" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">C=C-C=C. Бутадиен. Изопрен. 1,4-присоединение</text>
<line x1="30" y1="62" x2="470" y2="62" stroke="#00695C" stroke-width="1.5" opacity="0.25"/>
<text x="250" y="85" font-family="Arial,sans-serif" font-size="14" fill="#00695C" text-anchor="middle" font-weight=bold>CH2=CH-CH=CH2</text>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" >(бутадиен-1,3 — сопряжённый диен)</text>
<rect x="80" y="120" width="130" height="55" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="145" y="140" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight=bold>Кумулярные</text>
<text x="145" y="158" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle" >C=C=C (аллены)</text>
<rect x="220" y="120" width="130" height="55" rx="5" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5"/>
<text x="285" y="140" font-family="Arial,sans-serif" font-size="9" fill="#FF8F00" text-anchor="middle" font-weight=bold>Сопряжённые</text>
<text x="285" y="158" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle" >C=C-C=C (1,3)</text>
<rect x="360" y="120" width="110" height="55" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
<text x="415" y="140" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight=bold>Изолир.</text>
<text x="415" y="158" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle" >1,4-диены</text>
<rect x="30" y="200" width="200" height="50" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<rect x="30" y="200" width="200" height="16" rx="5" fill="#1565C0" opacity="0.15"/>
<text x="130.0" y="212" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">Метод Лебедева</text>
<text x="130.0" y="232" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">2C2H5OH -> CH2=CH-CH=CH2</text>
<rect x="270" y="200" width="200" height="50" rx="5" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
<rect x="270" y="200" width="200" height="16" rx="5" fill="#9C27B0" opacity="0.15"/>
<text x="370.0" y="212" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#9C27B0" text-anchor="middle">1,4-присоединение</text>
<text x="370.0" y="232" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">BrCH2-CH=CH-CH2Br</text>
<text x="250" y="275" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" >Изопрен: CH2=C(CH3)-CH=CH2 (мономер каучука)</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">ИНЕТШКОЛА · Химия · 10 класс · Урок 23</text>
