<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg10" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="sh10" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg10)"/>
  <rect y="44" width="400" height="8" fill="url(#tg10)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Арены: бензол и гомологи</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Benzene structure -->
    <rect x="10" y="60" width="185" height="118" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh10)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Строение бензола</text>
    <polygon points="122.3,135.0 105.0,145.0 87.7,135.0 87.7,115.0 105.0,105.0 122.3,115.0" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="118.0,132.5 105.0,140.0 92.0,132.5 92.0,117.5 105.0,110.0 118.0,117.5" fill="none" stroke="#14b8a6" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="22" y="155" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C6H6 — ароматич. кольцо</text>
    <text x="22" y="168" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Делокализов. π-электроны</text>
    <text x="22" y="180" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Все связи одинаковые!</text>
    <text x="22" y="192" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Нет чередования =</text>

  <!-- Top right: Kekulé vs modern -->
    <rect x="205" y="60" width="185" height="118" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh10)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Кекуле vs Соврем. модель</text>
    <text x="217" y="95" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Кекуле (1865):</text>
    <text x="217" y="107" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">чередующиеся = и -</text>
    <text x="217" y="119" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">не объясняет одинак. связи</text>
    <text x="217" y="135" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Современная модель:</text>
    <text x="217" y="147" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">6 π-электронов в кольце</text>
    <text x="217" y="159" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">облако над и под плоск.</text>
    <text x="217" y="173" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">Правило Хюккеля: 4n+2</text>

  <!-- Bottom left: Homologs -->
    <rect x="10" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh10)"/>
    <text x="22" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Гомологи бензола</text>
    <text x="22" y="220" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Толуол C6H5-CH3</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Ксилол C6H4-(CH3)2</text>
    <text x="22" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Этилбензол C6H5-C2H5</text>
    <text x="22" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Кумол C6H5-CH(CH3)2</text>
    <text x="22" y="278" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">CnH2n-6 (n ≥ 6)</text>

  <!-- Bottom right: Properties -->
    <rect x="205" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh10)"/>
    <text x="217" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Свойства аренов</text>
    <circle cx="217" cy="216" r="3" fill="#14b8a6"/>
  <text x="227" y="220" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Замещение, не присоед.!</text>
    <circle cx="217" cy="230" r="3" fill="#14b8a6"/>
  <text x="227" y="234" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Электрофильное замещение</text>
    <circle cx="217" cy="244" r="3" fill="#14b8a6"/>
  <text x="227" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Горят коптящим пламенем</text>
    <circle cx="217" cy="258" r="3" fill="#14b8a6"/>
  <text x="227" y="262" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Не обесцвеч. Br2 и KMnO4</text>
    <circle cx="217" cy="272" r="3" fill="#14b8a6"/>
  <text x="227" y="276" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Ароматичность — устойч.</text>
</svg>