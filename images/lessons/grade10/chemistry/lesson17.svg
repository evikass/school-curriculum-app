<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00897B"/><stop offset="100%" stop-color="#00695C"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<rect x="10" y="10" width="480" height="32" rx="5" fill="url(#panel)" opacity="0.9"/>
<text x="250" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Электронный баланс. Полуреакции</text>
<text x="250" y="55" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Балансировка ОВР. MnO4- в средах</text>
<line x1="30" y1="62" x2="470" y2="62" stroke="#00695C" stroke-width="1.5" opacity="0.25"/>
<text x="250" y="85" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-weight="bold">MnO4- -&gt; Mn2+ (кислая, 5e-)</text>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="10" fill="#FF8F00" text-anchor="middle">MnO4- -&gt; MnO2 (нейтр., 3e-)</text>
<text x="250" y="115" font-family="Arial,sans-serif" font-size="10" fill="#9C27B0" text-anchor="middle">MnO4- -&gt; MnO4(2-) (щёлоч., 1e-)</text>
<rect x="50" y="135" width="180" height="60" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
<text x="140" y="155" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Окисление</text>
<text x="140" y="175" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">Fe0 - 3e- -&gt; Fe3+</text>
<rect x="270" y="135" width="180" height="60" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
<text x="360" y="155" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Восстановление</text>
<text x="360" y="175" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">Mn7+ + 5e- -&gt; Mn2+</text>
<text x="250" y="168" font-family="Arial,sans-serif" font-size="9" fill="#00897B" text-anchor="middle" font-weight="bold">x3   x5</text>
<rect x="50" y="215" width="200" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
<rect x="50" y="215" width="200" height="16" rx="5" fill="#2E7D32" opacity="0.15"/>
<text x="150.0" y="227" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">2KMnO4 + 16HCl</text>
<text x="150.0" y="247" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">= 2KCl+2MnCl2+5Cl2+8H2O</text>
<rect x="270" y="215" width="180" height="55" rx="5" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
<rect x="270" y="215" width="180" height="16" rx="5" fill="#9C27B0" opacity="0.15"/>
<text x="360.0" y="227" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#9C27B0" text-anchor="middle">НОК(3,5)=15</text>
<text x="360.0" y="247" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">3*5=15e отдано, 5*3=15e принято</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">ИНЕТШКОЛА · Химия · 10 класс · Урок 17</text>
</svg>