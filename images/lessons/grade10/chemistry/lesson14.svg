<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00897B"/><stop offset="100%" stop-color="#00695C"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<rect x="10" y="10" width="480" height="32" rx="5" fill="url(#panel)" opacity="0.9"/>
<text x="250" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Гидролиз солей</text>
<text x="250" y="55" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Соль + H2O -> изменение pH среды</text>
<line x1="30" y1="62" x2="470" y2="62" stroke="#00695C" stroke-width="1.5" opacity="0.25"/>
<rect x="30" y="80" width="135" height="60" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<rect x="30" y="80" width="135" height="16" rx="5" fill="#1565C0" opacity="0.15"/>
<text x="97.5" y="92" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">По аниону</text>
<text x="97.5" y="112" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Na2CO3 -&gt; pH &gt; 7</text>
<rect x="183" y="80" width="135" height="60" rx="5" fill="white" stroke="#C62828" stroke-width="1.5"/>
<rect x="183" y="80" width="135" height="16" rx="5" fill="#C62828" opacity="0.15"/>
<text x="250.5" y="92" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">По катиону</text>
<text x="250.5" y="112" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">NH4Cl -&gt; pH &lt; 7</text>
<rect x="336" y="80" width="135" height="60" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
<rect x="336" y="80" width="135" height="16" rx="5" fill="#2E7D32" opacity="0.15"/>
<text x="403.5" y="92" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Не идет</text>
<text x="403.5" y="112" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">NaCl -&gt; pH = 7</text>
<text x="250" y="175" font-family="Arial,sans-serif" font-size="10" fill="#00695C" text-anchor="middle" font-weight="bold">CO3(2-) + H2O -&gt; HCO3- + OH-</text>
<rect x="100" y="210" width="300" height="50" rx="5" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
<rect x="100" y="210" width="300" height="16" rx="5" fill="#9C27B0" opacity="0.15"/>
<text x="250.0" y="222" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#9C27B0" text-anchor="middle">Al2S3 в воде не существует!</text>
<text x="250.0" y="242" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Полный (необратимый) гидролиз</text>
<text x="250" y="290" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Нагревание усиливает (эндотермический)</text>
<text x="250" y="305" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Разбавление увеличивает степень гидролиза</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">ИНЕТШКОЛА · Химия · 10 класс · Урок 14</text>
</svg>