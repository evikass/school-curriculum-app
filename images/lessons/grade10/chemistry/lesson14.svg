<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg14" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="sh14" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg14)"/>
  <rect y="44" width="400" height="8" fill="url(#tg14)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Спирты: химические свойства</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Main reactions -->
    <rect x="10" y="60" width="190" height="118" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh14)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Реакции спиртов</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">1. Горение:</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">C2H5OH+3O2→2CO2+3H2O</text>
    <text x="22" y="120" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">2. + Na (замещ. H):</text>
    <text x="22" y="132" font-family="Arial, sans-serif" font-size="7.5" fill="#e2e8f0">2C2H5OH+2Na→2C2H5ONa+H2</text>
    <text x="22" y="146" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">3. Дегидратация (H2SO4,t°):</text>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Внутримол. → алкен</text>
    <text x="22" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Межмол. → простой эфир</text>

  <!-- Top right: Dehydration & Oxidation -->
    <rect x="210" y="60" width="180" height="118" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh14)"/>
    <text x="222" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Дегидратация</text>
    <text x="222" y="94" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">Внутримол. (&gt;140°C):</text>
    <text x="222" y="106" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">C2H5OH → CH2=CH2 + H2O</text>
    <text x="222" y="120" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Межмол. (&lt;140°C):</text>
    <text x="222" y="132" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">2C2H5OH → C2H5-O-C2H5</text>
    <text x="222" y="144" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">   + H2O (диэтиловый эфир)</text>
    <text x="222" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Окисление</text>
    <text x="222" y="172" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Перв. → альдегид → к-та</text>
    <text x="222" y="184" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Втор. → кетон</text>

  <!-- Bottom: Oxidation details & uses -->
    <rect x="10" y="186" width="190" height="104" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh14)"/>
    <text x="22" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Окисление (подробно)</text>
    <text x="22" y="220" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C2H5OH + [O] → CH3CHO</text>
    <text x="22" y="232" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">  (этанол → этаналь)</text>
    <text x="22" y="246" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH3CHO + [O] → CH3COOH</text>
    <text x="22" y="258" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">  (этаналь → этановая к-та)</text>
    <text x="22" y="272" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">Ок-ль: CuO, KMnO4, K2Cr2O7</text>

    <rect x="210" y="186" width="180" height="104" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh14)"/>
    <text x="222" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Применение</text>
    <circle cx="222" cy="216" r="3" fill="#14b8a6"/>
  <text x="232" y="220" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Метанол — формальдегид</text>
    <circle cx="222" cy="230" r="3" fill="#14b8a6"/>
  <text x="232" y="234" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Этанол — растворитель</text>
    <circle cx="222" cy="244" r="3" fill="#14b8a6"/>
  <text x="232" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Глицерин — косметика</text>
    <circle cx="222" cy="258" r="3" fill="#14b8a6"/>
  <text x="232" y="262" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Этиленгликоль — антифриз</text>
    <circle cx="222" cy="272" r="3" fill="#14b8a6"/>
  <text x="232" y="276" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Спирты — в синтезе</text>
</svg>