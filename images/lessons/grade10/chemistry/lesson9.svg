<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg9" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="sh9" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg9)"/>
  <rect y="44" width="400" height="8" fill="url(#tg9)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Диены: строение и свойства</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Conjugated system -->
    <rect x="10" y="60" width="190" height="118" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh9)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Сопряжённая система</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C=C-C=C — сопряжённые</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">чередование двойных и</text>
    <text x="22" y="118" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">одинарных связей</text>
    <text x="22" y="134" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">π-электроны делокализованы</text>
    <text x="22" y="148" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">по всей сопряжённой системе</text>
    <text x="22" y="166" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">CnH2n-2 (как алкины!)</text>

  <!-- Top right: 1,2 and 1,4 addition -->
    <rect x="210" y="60" width="180" height="118" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh9)"/>
    <text x="222" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Присоединение к диенам</text>
    <text x="222" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">1,2-присоединение:</text>
    <text x="222" y="106" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">CH2=CH-CH=CH2 + HBr</text>
    <text x="222" y="117" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">→ CH2=CH-CHBr-CH3</text>
    <text x="222" y="133" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">1,4-присоединение:</text>
    <text x="222" y="145" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">CH2=CH-CH=CH2 + HBr</text>
    <text x="222" y="156" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">→ CH2Br-CH=CH-CH3</text>

  <!-- Bottom left: Butadiene & isoprene -->
    <rect x="10" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh9)"/>
    <text x="22" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Важные диены</text>
    <text x="22" y="220" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Бутадиен-1,3:</text>
    <text x="22" y="232" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CH2=CH-CH=CH2</text>
    <text x="22" y="248" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Изопрен (2-метилбутадиен):</text>
    <text x="22" y="260" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CH2=C(CH3)-CH=CH2</text>
    <text x="22" y="276" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">мономер натур. каучука</text>

  <!-- Bottom right: Rubber -->
    <rect x="205" y="186" width="180" height="104" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh9)"/>
    <text x="217" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Синтетический каучук</text>
    <text x="217" y="220" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Полимеризация:</text>
    <text x="217" y="232" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">n CH2=CH-CH=CH2 →</text>
    <text x="217" y="244" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">(-CH2-CH=CH-CH2-)n</text>
    <text x="217" y="260" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Вулканизация + S:</text>
    <text x="217" y="272" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">каучук → резина</text>
</svg>