<text x="250.0" y="252" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#9C27B0" text-anchor="middle">Монреальский протокол (1987)</text>
<text x="250.0" y="272" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">ограничение производства фреонов</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">ИНЕТШКОЛА · Химия · 10 класс · Урок 21</text>
