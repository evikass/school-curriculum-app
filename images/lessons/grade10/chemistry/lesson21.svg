<text x="250.5" y="132" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Тефлон</text>
<text x="250.5" y="152" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">CF2=CF2
антипригар</text>
<rect x="336" y="120" width="135" height="55" rx="5" fill="white" stroke="#C62828" stroke-width="1.5"/>
<rect x="336" y="120" width="135" height="16" rx="5" fill="#C62828" opacity="0.15"/>
<text x="403.5" y="132" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">Фреоны</text>
<text x="403.5" y="152" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">CCl2F2
разрушают O3</text>
<text x="250" y="200" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight=bold>Cl + O3 -> ClO + O2</text>
<text x="250" y="215" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" >1 Cl разрушает 10^5 молекул O3</text>
<rect x="100" y="240" width="300" height="45" rx="5" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
