<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Амины: строение и свойства</text>

  <!-- NH3 base structure -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="280" height="180" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <text x="140" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">Производные аммиака NH3</text>

    <!-- NH3 molecule -->
    <g transform="translate(70, 55)">
      <circle cx="0" cy="30" r="20" fill="#3b82f6" opacity="0.4" stroke="#60a5fa" stroke-width="2"/>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">N</text>
      <line x1="15" y1="20" x2="40" y2="5" stroke="#94a3b8" stroke-width="2"/>
      <line x1="-15" y1="20" x2="-40" y2="5" stroke="#94a3b8" stroke-width="2"/>
      <line x1="0" y1="50" x2="0" y2="70" stroke="#94a3b8" stroke-width="2"/>
      <text x="45" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="start">H</text>
      <text x="-55" y="5" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="start">H</text>
      <text x="5" y="80" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="start">H</text>
    </g>

    <!-- Arrow -->
    <text x="140" y="100" font-family="Arial, sans-serif" font-size="18" fill="#14b8a6" text-anchor="middle">R заменяет H</text>
    <path d="M90,110 L90,140" fill="none" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowHead1)"/>

    <!-- Amine types -->
    <text x="25" y="160" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa">R-NH2</text>
    <text x="105" y="160" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">R2NH</text>
    <text x="185" y="160" font-family="Arial, sans-serif" font-size="10" fill="#f87171">R3N</text>
  </g>

  <!-- Three types of amines -->
  <g transform="translate(360, 80)">
    <rect x="0" y="0" width="200" height="55" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">Первичный амин</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">CH3-NH2</text>
  </g>
  <g transform="translate(580, 80)">
    <rect x="0" y="0" width="190" height="55" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="95" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fbbf24" text-anchor="middle">Вторичный амин</text>
    <text x="95" y="40" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">(CH3)2NH</text>
  </g>
  <g transform="translate(360, 150)">
    <rect x="0" y="0" width="200" height="55" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f87171" text-anchor="middle">Третичный амин</text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">(CH3)3N</text>
  </g>

  <!-- Properties -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="350" height="180" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
    <text x="175" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">Химические свойства</text>

    <circle cx="20" cy="50" r="4" fill="#a855f7"/>
    <text x="32" y="54" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Основания (сильнее NH3)</text>
    <circle cx="20" cy="75" r="4" fill="#a855f7"/>
    <text x="32" y="79" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Реагируют с кислотами:</text>
    <text x="32" y="96" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">  R-NH2 + HCl = R-NH3+Cl-</text>
    <circle cx="20" cy="115" r="4" fill="#a855f7"/>
    <text x="32" y="119" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Горят на воздухе</text>
    <circle cx="20" cy="140" r="4" fill="#a855f7"/>
    <text x="32" y="144" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Алкилирование, ацилирование</text>
    <circle cx="20" cy="165" r="4" fill="#a855f7"/>
    <text x="32" y="169" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">+I-эффект алкилов усиливает основность</text>
  </g>

  <!-- Aniline special box -->
  <g transform="translate(420, 290)">
    <rect x="0" y="0" width="330" height="180" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="165" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Анилин C6H5-NH2</text>

    <!-- Benzene ring -->
    <g transform="translate(40, 40)">
      <polygon points="30,0 55,15 55,45 30,60 5,45 5,15" fill="none" stroke="#14b8a6" stroke-width="2"/>
      <polygon points="30,8 48,19 48,41 30,52 12,41 12,19" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3"/>
      <line x1="55" y1="30" x2="80" y2="30" stroke="#a855f7" stroke-width="2"/>
      <text x="90" y="25" font-family="Arial, sans-serif" font-size="10" fill="#a855f7">N</text>
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">H</text>
      <text x="100" y="38" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">H</text>
    </g>

    <text x="165" y="130" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Слабее аммиака как основание</text>
    <text x="165" y="150" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">-I-эффект фенила уменьшает</text>
    <text x="165" y="168" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">электронную плотность на N</text>
  </g>
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>