<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient>
<linearGradient id="panel" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00897B"/><stop offset="100%" stop-color="#00695C"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<rect x="10" y="10" width="480" height="32" rx="5" fill="url(#panel)" opacity="0.9"/>
<text x="250" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Галогенопроизводные</text>
<text x="250" y="55" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">R-Hal. ПВХ. Тефлон. Фреоны и озон</text>
<line x1="30" y1="62" x2="470" y2="62" stroke="#00695C" stroke-width="1.5" opacity="0.25"/>
<text x="250" y="85" font-family="Arial,sans-serif" font-size="12" fill="#00695C" text-anchor="middle" font-weight=bold>CH2=CHCl -> (-CH2-CHCl-)n</text>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" >(поливинилхлорид — ПВХ)</text>
<rect x="30" y="120" width="135" height="55" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<rect x="30" y="120" width="135" height="16" rx="5" fill="#1565C0" opacity="0.15"/>
<text x="97.5" y="132" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">ПВХ</text>
<text x="97.5" y="152" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">винилхлорид
трубы, окна</text>
<rect x="183" y="120" width="135" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
