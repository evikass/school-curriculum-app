<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg11" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="sh11" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg11)"/>
  <rect y="44" width="400" height="8" fill="url(#tg11)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Арены: хим. свойства бензола</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Electrophilic substitution -->
    <rect x="10" y="60" width="190" height="118" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh11)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Электрофильное замещение</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Нитрование (HNO3 + H2SO4):</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C6H6 + HNO3 →</text>
    <text x="22" y="117" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  C6H5-NO2 + H2O</text>
    <text x="22" y="133" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Галогенирование (Cl2/FeCl3):</text>
    <text x="22" y="145" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C6H6 + Cl2 →</text>
    <text x="22" y="156" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  C6H5-Cl + HCl</text>
    <text x="22" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Алкилирование (RCl/AlCl3):</text>

  <!-- Top right: Resistance to addition -->
    <rect x="210" y="60" width="180" height="118" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh11)"/>
    <text x="222" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Устойчивость к присоед.</text>
    <text x="222" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Бензол НЕ вступает в:</text>
    <text x="222" y="108" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">— присоед. Br2 (обычн.)</text>
    <text x="222" y="120" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">— окисление KMnO4</text>
    <text x="222" y="134" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Только в жестких условиях:</text>
    <text x="222" y="148" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">+ 3H2 (Ni, t°, P) →</text>
    <text x="222" y="159" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  C6H12 (циклогексан)</text>
    <text x="222" y="173" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">+ 3Cl2 (hv) →</text>
    <text x="222" y="184" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  C6H6Cl6 (гексахлоран)</text>

  <!-- Bottom: SE mechanism -->
    <rect x="10" y="188" width="190" height="102" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh11)"/>
    <text x="22" y="206" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Механизм SE</text>
    <text x="22" y="222" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">1. Образование электрофила:</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">   FeCl3 + Cl2 → FeCl4- + Cl+</text>
    <text x="22" y="248" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">2. Атака на π-систему</text>
    <text x="22" y="260" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">3. Отщепление H+</text>
    <text x="22" y="274" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Ароматичность сохраняется!</text>

    <rect x="210" y="188" width="180" height="102" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh11)"/>
    <text x="222" y="206" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Замещение vs Присоединение</text>
    <text x="222" y="222" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Замещение (легко):</text>
    <text x="222" y="234" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">ароматичность сохран.</text>
    <text x="222" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">Присоединение (трудно):</text>
    <text x="222" y="260" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">разрушает ароматичность</text>
    <text x="222" y="276" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">→ энергетически невыгодно</text>
</svg>