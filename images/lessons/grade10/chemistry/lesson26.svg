<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Химия и экология</text>

  <!-- Greenhouse effect -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="120" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f87171" text-anchor="middle">Парниковый эффект</text>

    <!-- Earth -->
    <g transform="translate(60, 50)">
      <ellipse cx="50" cy="40" rx="40" ry="30" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
      <!-- Atmosphere -->
      <ellipse cx="50" cy="40" rx="55" ry="42" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <!-- IR rays -->
      <path d="M50,10 L50,0" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowHead1)"/>
      <path d="M30,15 L20,5" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowHead1)"/>
      <path d="M70,15 L80,5" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowHead1)"/>
      <!-- Reflected back -->
      <path d="M60,0 L60,8" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2,2" marker-end="url(#arrowHead1)"/>
    </g>

    <text x="120" y="125" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">CO2, CH4, N2O задерживают</text>
    <text x="120" y="142" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">тепловое излучение Земли</text>
    <text x="120" y="165" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Глобальное потепление</text>
    <text x="120" y="185" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Сжигание топлива, вырубка лесов</text>
  </g>

  <!-- Acid rain -->
  <g transform="translate(280, 70)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <text x="120" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">Кислотные дожди</text>

    <!-- Cloud and rain -->
    <g transform="translate(40, 40)">
      <ellipse cx="70" cy="20" rx="50" ry="20" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Rain drops -->
      <line x1="40" y1="40" x2="35" y2="55" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="60" y1="40" x2="55" y2="55" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="80" y1="40" x2="75" y2="55" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="100" y1="40" x2="95" y2="55" stroke="#60a5fa" stroke-width="1.5"/>
    </g>

    <text x="120" y="115" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">SO2 + H2O = H2SO3</text>
    <text x="120" y="135" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">NOx + H2O = HNO3</text>
    <text x="120" y="160" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Разрушение зданий, гибель лесов</text>
    <text x="120" y="185" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">ТЭС, транспорт, промышленность</text>
  </g>

  <!-- Ozone layer -->
  <g transform="translate(540, 70)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="120" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6" text-anchor="middle">Озоновая дыра</text>

    <!-- Ozone layer -->
    <g transform="translate(30, 45)">
      <rect x="0" y="0" width="180" height="15" rx="7" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
      <!-- Hole -->
      <ellipse cx="100" cy="7" rx="30" ry="10" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
      <!-- CFC molecules -->
      <circle cx="90" cy="25" r="5" fill="#ef4444" opacity="0.5"/>
      <text x="90" y="40" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">CFC</text>
      <circle cx="115" cy="25" r="5" fill="#ef4444" opacity="0.5"/>
      <text x="115" y="40" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">CFC</text>
      <!-- UV arrows -->
      <path d="M85,7 L85,60" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrowHead1)"/>
      <path d="M100,7 L100,60" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrowHead1)"/>
      <path d="M115,7 L115,60" stroke="#f59e0b" stroke-width="1" marker-end="url(#arrowHead1)"/>
    </g>

    <text x="120" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Хлорфторуглероды (CFC)</text>
    <text x="120" y="148" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">разрушают O3 в стратосфере</text>
    <text x="120" y="170" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Усиленное УФ-излучение</text>
    <text x="120" y="190" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Монреальский протокол (1987)</text>
  </g>

  <!-- Solutions -->
  <g transform="translate(30, 300)">
    <rect x="0" y="0" width="740" height="170" rx="8" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5" opacity="0.7"/>
    <text x="370" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Пути решения экологических проблем</text>

    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="160" height="110" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
      <text x="80" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6" text-anchor="middle">Очистка выбросов</text>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Фильтры на ТЭС</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Каталитические нейтрализаторы</text>
      <text x="80" y="70" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Скрубберы, циклоны</text>
      <text x="80" y="90" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Улавливание CO2</text>
    </g>

    <g transform="translate(200, 40)">
      <rect x="0" y="0" width="160" height="110" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
      <text x="80" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">Альтернативная</text>
      <text x="80" y="33" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">энергетика</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Солнечные панели</text>
      <text x="80" y="70" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Ветрогенераторы</text>
      <text x="80" y="85" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Водородные топливные элементы</text>
      <text x="80" y="100" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Атомная энергетика</text>
    </g>

    <g transform="translate(380, 40)">
      <rect x="0" y="0" width="160" height="110" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
      <text x="80" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fbbf24" text-anchor="middle">Переработка</text>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Рециклинг полимеров</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Биоразлагаемые материалы</text>
      <text x="80" y="70" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Сортировка отходов</text>
      <text x="80" y="90" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Вторичное использование</text>
    </g>

    <g transform="translate(560, 40)">
      <rect x="0" y="0" width="160" height="110" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="1"/>
      <text x="80" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c084fc" text-anchor="middle">Зелёная химия</text>
      <text x="80" y="40" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Минимизация отходов</text>
      <text x="80" y="55" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Безопасные растворители</text>
      <text x="80" y="70" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Возобновляемое сырьё</text>
      <text x="80" y="90" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Энергоэффективность</text>
    </g>
  </g>
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>