<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg19" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="sh19" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg19)"/>
  <rect y="44" width="400" height="8" fill="url(#tg19)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Дисахариды и полисахариды</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Disaccharides -->
    <rect x="10" y="60" width="185" height="118" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh19)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Дисахариды</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Сахароза C12H22O11:</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Глюкоза + Фруктоза</text>
    <text x="22" y="118" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">Не восст. (нет -CHO)</text>
    <text x="22" y="132" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Мальтоза C12H22O11:</text>
    <text x="22" y="144" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Глюкоза + Глюкоза</text>
    <text x="22" y="156" font-family="Arial, sans-serif" font-size="8.5" fill="#10b981">Восстанавливает!</text>
    <text x="22" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Гидролиз → моносахариды</text>

  <!-- Top right: Polysaccharides -->
    <rect x="205" y="60" width="185" height="118" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh19)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Полисахариды (C6H10O5)n</text>
    <text x="217" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Крахмал:</text>
    <text x="217" y="106" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">амилоза + амилопектин</text>
    <text x="217" y="118" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Запасное в-во растений</text>
    <text x="217" y="132" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Целлюлоза:</text>
    <text x="217" y="144" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">линейные цепи глюкозы</text>
    <text x="217" y="156" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Строит. в-во растений</text>
    <text x="217" y="170" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">β-гликозидная связь</text>

  <!-- Bottom left: Iodine test & hydrolysis -->
    <rect x="10" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh19)"/>
    <text x="22" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Йодная проба и гидролиз</text>
    <text x="22" y="220" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Крахмал + I2 → синий</text>
    <text x="22" y="232" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">Качественная реакция!</text>
    <text x="22" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Гидролиз крахмала:</text>
    <text x="22" y="260" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(C6H10O5)n + nH2O →</text>
    <text x="22" y="272" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  n C6H12O6 (глюкоза)</text>

  <!-- Bottom right: Comparison -->
    <rect x="205" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh19)"/>
    <text x="217" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Крахмал vs Целлюлоза</text>
  <line x1="217" y1="212" x2="379" y2="212" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    <text x="217" y="224" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Свойство</text>
    <text x="305" y="224" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Крахмал</text>
    <text x="360" y="224" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Целл.</text>
    <text x="217" y="236" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Связь</text>
    <text x="305" y="236" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">α</text>
    <text x="360" y="236" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">β</text>
    <text x="217" y="248" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Р-римость</text>
    <text x="305" y="248" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">В горяч. H2O</text>
    <text x="360" y="248" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Не раств.</text>
    <text x="217" y="260" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Функция</text>
    <text x="305" y="260" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Запас</text>
    <text x="360" y="260" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">Каркас</text>
    <text x="217" y="276" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">I2 проба</text>
    <text x="305" y="276" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">Синий</text>
    <text x="360" y="276" font-family="Arial, sans-serif" font-size="8" fill="#ef4444">Нет</text>
</svg>