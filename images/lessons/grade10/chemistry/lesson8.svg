<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg8" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="sh8" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg8)"/>
  <rect y="44" width="400" height="8" fill="url(#tg8)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Алкины: строение и свойства</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Triple bond & sp -->
    <rect x="10" y="60" width="185" height="118" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh8)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Тройная связь C≡C</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9.5" fill="#14b8a6">sp-гибридизация</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Линейная (180°)</text>
    <text x="22" y="118" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">1 сигма + 2 пи-связи</text>
  <line x1="70" y1="140" x2="120" y2="140" stroke="#14b8a6" stroke-width="2"/>
  <line x1="70" y1="145" x2="120" y2="145" stroke="#14b8a6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="70" y1="150" x2="120" y2="150" stroke="#14b8a6" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="130" y="148" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">σ + 2π</text>
    <text x="22" y="167" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">CnH2n-2</text>

  <!-- Top right: Acetylene & addition -->
    <rect x="205" y="60" width="185" height="118" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh8)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Реакции присоединения</text>
    <text x="217" y="94" font-family="Arial, sans-serif" font-size="9.5" fill="#f59e0b">C2H2 — ацетилен</text>
    <text x="217" y="108" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">+ 2H2 → CH3-CH3</text>
    <text x="217" y="120" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(этан, кат. Ni)</text>
    <text x="217" y="134" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">+ HCl → CH2=CHCl</text>
    <text x="217" y="146" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(винилхлорид)</text>
    <text x="217" y="160" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">+ 2Cl2 → CHCl2-CHCl2</text>
    <text x="217" y="172" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">+ H2O (Hg2+) → CH3CHO</text>

  <!-- Bottom left: Terminal alkyne acidity -->
    <rect x="10" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh8)"/>
    <text x="22" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Кислотность алкинов</text>
    <text x="22" y="220" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Терминальные ≡C-H:</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH≡CH + 2Na →</text>
    <text x="22" y="246" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  NaC≡CNa + H2</text>
    <text x="22" y="262" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">Ацетилениды — кач. р-ция</text>
    <text x="22" y="276" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">на терминальный ≡C-H</text>

  <!-- Bottom right: Combustion & uses -->
    <rect x="205" y="186" width="185" height="104" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh8)"/>
    <text x="217" y="204" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Горение и применение</text>
    <text x="217" y="220" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">2C2H2 + 5O2 →</text>
    <text x="217" y="232" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  4CO2 + 2H2O</text>
    <text x="217" y="248" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">t° пламени ~3000°C</text>
    <circle cx="217" cy="260" r="3" fill="#14b8a6"/>
  <text x="227" y="264" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Сварка и резка металлов</text>
    <circle cx="217" cy="274" r="3" fill="#14b8a6"/>
  <text x="227" y="278" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Синтез винилхлорида</text>
</svg>