<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Тембр и регистр</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изучаем свойства музыкального звука</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- high register -->
  <text x="100" y="115" font-family="Arial" font-size="11" fill="#1a1a1a" font-weight="bold">ВЫСОКИЙ</text>
  <path d="M180,110 Q195,95 210,110 Q225,125 240,110 Q255,95 270,110 Q285,125 300,110" stroke="#2B4C7E" stroke-width="2" fill="none"/>
  <path d="M320,108 Q335,93 350,108 Q365,123 380,108 Q395,93 410,108" stroke="#2B4C7E" stroke-width="1.5" fill="none"/>
  <!-- middle register -->
  <text x="100" y="170" font-family="Arial" font-size="11" fill="#1a1a1a" font-weight="bold">СРЕДНИЙ</text>
  <path d="M180,165 Q210,155 240,165 Q270,175 300,165 Q330,155 360,165 Q390,175 420,165" stroke="#D4A843" stroke-width="2.5" fill="none"/>
  <!-- low register -->
  <text x="100" y="230" font-family="Arial" font-size="11" fill="#1a1a1a" font-weight="bold">НИЗКИЙ</text>
  <path d="M180,225 Q230,215 280,225 Q330,235 380,225 Q405,220 420,225" stroke="#C41E3A" stroke-width="3.5" fill="none"/>
  <!-- separator lines -->
  <line x1="90" y1="128" x2="430" y2="128" stroke="#D4A843" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="90" y1="188" x2="430" y2="188" stroke="#D4A843" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- instrument labels -->
  <text x="310" y="115" font-family="Arial" font-size="10" fill="#2B4C7E" opacity="0.7">Флейта, Скрипка</text>
  <text x="310" y="170" font-family="Arial" font-size="10" fill="#D4A843" opacity="0.7">Гитара, Фортепиано</text>
  <text x="310" y="230" font-family="Arial" font-size="10" fill="#C41E3A" opacity="0.7">Контрабас, Барабан</text>
  <!-- equalizer bars -->
  <rect x="140" y="250" width="8" height="20" fill="#2B4C7E" opacity="0.6"/>
  <rect x="155" y="245" width="8" height="25" fill="#2B4C7E" opacity="0.7"/>
  <rect x="170" y="255" width="8" height="15" fill="#D4A843" opacity="0.5"/>
  <rect x="185" y="240" width="8" height="30" fill="#D4A843" opacity="0.6"/>
  <rect x="200" y="250" width="8" height="20" fill="#D4A843" opacity="0.7"/>
  <rect x="215" y="260" width="8" height="10" fill="#C41E3A" opacity="0.5"/>
  <rect x="230" y="252" width="8" height="18" fill="#C41E3A" opacity="0.6"/>
  <rect x="245" y="258" width="8" height="12" fill="#C41E3A" opacity="0.7"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>