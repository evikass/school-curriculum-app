<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Выступление перед аудиторией</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Презентация и защита</text>
  <!-- Illustration area -->
  <rect x="180" y="180" width="140" height="90" rx="3" fill="#8B4513" stroke="#1a1a1a" stroke-width="2"/><rect x="180" y="175" width="140" height="12" rx="2" fill="#6B3410"/><rect x="160" y="270" width="180" height="8" rx="2" fill="#666"/><rect x="300" y="170" width="6" height="100" fill="#888" stroke="#666" stroke-width="1"/><rect x="285" y="150" width="36" height="25" rx="5" fill="#333" stroke="#222" stroke-width="1.5"/><ellipse cx="303" cy="147" rx="18" ry="12" fill="#444" stroke="#333" stroke-width="1"/><ellipse cx="303" cy="144" rx="5" ry="3" fill="#666"/><text x="200" y="240" text-anchor="middle" font-size="18" fill="#D4A843" font-family="Arial" font-weight="bold">:)</text><text x="250" y="300" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Говори уверенно!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>