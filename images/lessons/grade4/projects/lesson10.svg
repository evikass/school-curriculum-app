  <rect x="120" y="110" width="120" height="80" rx="5" fill="#fff" stroke="#2B4C7E" stroke-width="2"/><rect x="120" y="110" width="120" height="18" rx="5" fill="#2B4C7E"/><rect x="135" y="140" width="40" height="35" rx="3" fill="#87CEEB" opacity="0.5"/><text x="195" y="155" font-size="8" fill="#aaa" font-family="Arial">Текст</text><text x="195" y="170" font-size="8" fill="#aaa" font-family="Arial">Текст</text><text x="195" y="182" font-size="8" fill="#aaa" font-family="Arial">Текст</text><rect x="260" y="110" width="120" height="80" rx="5" fill="#fff" stroke="#C41E3A" stroke-width="2"/><rect x="260" y="110" width="120" height="18" rx="5" fill="#C41E3A"/><circle cx="290" cy="160" r="18" fill="#D4A843" opacity="0.3"/><text x="335" y="155" font-size="8" fill="#aaa" font-family="Arial">Данные</text><rect x="325" y="162" width="10" height="18" fill="#2B4C7E" opacity="0.7"/><rect x="340" y="155" width="10" height="25" fill="#C41E3A" opacity="0.7"/><rect x="355" y="148" width="10" height="32" fill="#D4A843" opacity="0.7"/><text x="250" y="215" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Максимум 3 цвета</text><text x="250" y="235" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Крупный шрифт!</text><text x="250" y="255" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Меньше текста, больше смысла</text><text x="250" y="275" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Картинки лучше слов</text>
