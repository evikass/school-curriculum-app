<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Солёное тесто</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Пластичные материалы</text>
  <!-- Illustration area -->
  <ellipse cx="250" cy="200" rx="60" ry="40" fill="#e8d8b0" stroke="#c4b890" stroke-width="2"/><ellipse cx="250" cy="200" rx="45" ry="28" fill="#f0e8d0" stroke="#d8d0b0" stroke-width="1"/><text x="250" y="195" text-anchor="middle" font-size="9" fill="#8B6914" font-family="Arial">Мука + Соль</text><text x="250" y="210" text-anchor="middle" font-size="9" fill="#8B6914" font-family="Arial">+ Вода</text><circle cx="155" cy="160" r="18" fill="#f0e0c0" stroke="#c4b890" stroke-width="1.5"/><polygon points="345,145 360,195 330,195" fill="#f0e0c0" stroke="#c4b890" stroke-width="1.5"/><rect x="145" y="230" width="40" height="30" rx="3" fill="#f0e0c0" stroke="#c4b890" stroke-width="1.5"/><text x="250" y="280" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Сохни 2-3 дня</text><text x="250" y="298" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Потом раскрась!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>