<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Дыхание</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Кислород — источник жизни</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Trachea/windpipe -->
  <rect x="243" y="90" width="14" height="50" rx="7" fill="#E8C0C0" stroke="#C09090" stroke-width="1"/>
  <text x="270" y="118" font-family="Arial" font-size="7" fill="#888">Трахея</text>
  <!-- Bronchi split -->
  <line x1="250" y1="140" x2="210" y2="165" stroke="#E0A0A0" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="250" y1="140" x2="290" y2="165" stroke="#E0A0A0" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <text x="175" y="160" font-family="Arial" font-size="7" fill="#888">Бронхи</text>
  <!-- Left lung -->
  <ellipse cx="200" cy="210" rx="55" ry="70" fill="#E8C8C8" stroke="#D0A0A0" stroke-width="1.5" opacity="0.6"/>
  <!-- Right lung -->
  <ellipse cx="300" cy="210" rx="55" ry="70" fill="#E8C8C8" stroke="#D0A0A0" stroke-width="1.5" opacity="0.6"/>
  <!-- Bronchioles (branching lines inside) -->
  <line x1="210" y1="170" x2="195" y2="195" stroke="#D0A0A0" stroke-width="2" opacity="0.4"/>
  <line x1="195" y1="195" x2="185" y2="220" stroke="#D0A0A0" stroke-width="1.5" opacity="0.3"/>
  <line x1="195" y1="195" x2="205" y2="220" stroke="#D0A0A0" stroke-width="1.5" opacity="0.3"/>
  <line x1="290" y1="170" x2="305" y2="195" stroke="#D0A0A0" stroke-width="2" opacity="0.4"/>
  <line x1="305" y1="195" x2="295" y2="220" stroke="#D0A0A0" stroke-width="1.5" opacity="0.3"/>
  <line x1="305" y1="195" x2="315" y2="220" stroke="#D0A0A0" stroke-width="1.5" opacity="0.3"/>
  <!-- Air flow arrows (IN) -->
  <line x1="250" y1="82" x2="250" y2="90" stroke="#2B4C7E" stroke-width="2"/>
  <polygon points="245,82 250,76 255,82" fill="#2B4C7E"/>
  <text x="250" y="72" font-family="Arial" font-size="7" fill="#2B4C7E" text-anchor="middle">ВДОХ</text>
  <!-- Oxygen molecules (O2) -->
  <text x="145" y="150" font-family="Arial" font-size="10" fill="#2B4C7E" opacity="0.6">O₂</text>
  <text x="330" y="145" font-family="Arial" font-size="10" fill="#2B4C7E" opacity="0.6">O₂</text>
  <!-- Air flow arrows (OUT) -->
  <text x="250" y="300" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">ВЫДОХ: CO₂</text>
  <!-- Stats boxes -->
  <rect x="35" y="100" width="70" height="40" rx="4" fill="#2B4C7E" opacity="0.1"/>
  <text x="70" y="117" font-family="Arial" font-size="12" font-weight="bold" fill="#2B4C7E" text-anchor="middle">15-20</text>
  <text x="70" y="132" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">вдохов/мин</text>
  <rect x="395" y="100" width="70" height="40" rx="4" fill="#2B4C7E" opacity="0.1"/>
  <text x="430" y="117" font-family="Arial" font-size="12" font-weight="bold" fill="#2B4C7E" text-anchor="middle">70 м²</text>
  <text x="430" y="132" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">площадь лёгких</text>
  <!-- Trees (clean air) -->
  <polygon points="50,280 65,240 80,280" fill="#2E7D32" opacity="0.4"/>
  <rect x="63" y="278" width="4" height="12" fill="#6B4226" opacity="0.4"/>
  <polygon points="420,280 435,245 450,280" fill="#2E7D32" opacity="0.4"/>
  <rect x="433" y="278" width="4" height="10" fill="#6B4226" opacity="0.4"/>
</svg>