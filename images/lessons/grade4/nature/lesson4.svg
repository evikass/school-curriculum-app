<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Климат и жизнь</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Как климат влияет на организмы</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Three climate zones with animals -->
  
  <!-- Arctic zone - left -->
  <rect x="25" y="90" width="140" height="180" rx="6" fill="#2B4C7E" opacity="0.06" stroke="#2B4C7E" stroke-width="1"/>
  <text x="95" y="108" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" font-weight="bold">Арктика</text>
  <!-- Snow ground -->
  <path d="M25,240 Q60,232 95,236 Q130,230 165,240 L165,270 L25,270 Z" fill="white" opacity="0.6"/>
  <!-- Icebergs -->
  <polygon points="50,240 65,210 80,240" fill="white" stroke="#B0BEC5" stroke-width="0.5"/>
  <polygon points="100,240 118,205 136,240" fill="white" stroke="#B0BEC5" stroke-width="0.5"/>
  <!-- Polar bear silhouette -->
  <g transform="translate(70, 170)">
    <ellipse cx="20" cy="35" rx="18" ry="14" fill="#EEEEEE" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="38" cy="18" r="12" fill="#EEEEEE" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="48" cy="8" rx="5" ry="6" fill="#EEEEEE" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="41" cy="15" r="1.5" fill="#1a1a1a"/>
    <circle cx="45" cy="15" r="1.5" fill="#1a1a1a"/>
    <ellipse cx="37" cy="22" rx="3" ry="2" fill="#1a1a1a" opacity="0.5"/>
    <!-- legs -->
    <rect x="8" y="46" width="7" height="14" rx="3" fill="#EEEEEE" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="25" y="46" width="7" height="14" rx="3" fill="#EEEEEE" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="95" y="260" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Белый медведь</text>
  
  <!-- Temperate zone - center -->
  <rect x="180" y="90" width="140" height="180" rx="6" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="1"/>
  <text x="250" y="108" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Умеренный пояс</text>
  <!-- Green ground -->
  <path d="M180,240 Q215,235 250,238 Q285,232 320,240 L320,270 L180,270 Z" fill="#2E7D32" opacity="0.15"/>
  <!-- Tree -->
  <line x1="220" y1="240" x2="220" y2="175" stroke="#5D4037" stroke-width="3"/>
  <circle cx="220" cy="168" r="20" fill="#2E7D32" opacity="0.5"/>
  <circle cx="208" cy="172" r="14" fill="#2E7D32" opacity="0.4"/>
  <circle cx="232" cy="170" r="16" fill="#2E7D32" opacity="0.45"/>
  <!-- Deer silhouette -->
  <g transform="translate(245, 180)">
    <ellipse cx="18" cy="30" rx="16" ry="12" fill="#5D4037" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="32" cy="16" r="9" fill="#5D4037" stroke="#1a1a1a" stroke-width="1"/>
    <!-- antlers -->
    <path d="M28,10 L22,0 M28,10 L30,2 M28,10 L24,5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="35" cy="14" r="1.5" fill="#1a1a1a"/>
    <!-- legs -->
    <line x1="8" y1="40" x2="6" y2="56" stroke="#5D4037" stroke-width="2"/>
    <line x1="14" y1="40" x2="12" y2="56" stroke="#5D4037" stroke-width="2"/>
    <line x1="24" y1="40" x2="26" y2="56" stroke="#5D4037" stroke-width="2"/>
    <line x1="28" y1="40" x2="30" y2="56" stroke="#5D4037" stroke-width="2"/>
    <!-- tail -->
    <line x1="2" y1="26" x2="-4" y2="22" stroke="#5D4037" stroke-width="1.5"/>
  </g>
  <text x="250" y="260" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Олень</text>
  
  <!-- Desert zone - right -->
  <rect x="335" y="90" width="140" height="180" rx="6" fill="#D4A843" opacity="0.08" stroke="#D4A843" stroke-width="1"/>
  <text x="405" y="108" font-family="Arial" font-size="10" fill="#EF6C00" text-anchor="middle" font-weight="bold">Пустыня</text>
  <!-- Sand dunes -->
  <path d="M335,235 Q370,220 405,228 Q440,215 475,235 L475,270 L335,270 Z" fill="#D4A843" opacity="0.2"/>
  <!-- Camel silhouette -->
  <g transform="translate(370, 165)">
    <ellipse cx="15" cy="42" rx="10" ry="8" fill="#A1887F" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="42" cy="42" rx="10" ry="8" fill="#A1887F" stroke="#1a1a1a" stroke-width="1"/>
    <ellipse cx="28" cy="25" rx="18" ry="14" fill="#A1887F" stroke="#1a1a1a" stroke-width="1"/>
    <!-- hump -->
    <ellipse cx="22" cy="14" rx="8" ry="7" fill="#8D6E63" stroke="#1a1a1a" stroke-width="1"/>
    <!-- neck and head -->
    <path d="M42,20 L52,5 Q55,0 58,5 L58,12" fill="none" stroke="#A1887F" stroke-width="3"/>
    <ellipse cx="58" cy="4" rx="4" ry="3" fill="#A1887F" stroke="#1a1a1a" stroke-width="0.8"/>
    <circle cx="60" cy="3" r="1" fill="#1a1a1a"/>
    <!-- legs -->
    <line x1="12" y1="48" x2="10" y2="68" stroke="#A1887F" stroke-width="2.5"/>
    <line x1="18" y1="48" x2="20" y2="68" stroke="#A1887F" stroke-width="2.5"/>
    <line x1="38" y1="48" x2="36" y2="68" stroke="#A1887F" stroke-width="2.5"/>
    <line x1="45" y1="48" x2="47" y2="68" stroke="#A1887F" stroke-width="2.5"/>
  </g>
  <!-- Cactus -->
  <rect x="450" y="195" width="8" height="35" rx="4" fill="#2E7D32" opacity="0.7"/>
  <rect x="440" y="200" width="10" height="5" rx="2" fill="#2E7D32" opacity="0.7"/>
  <rect x="440" y="195" width="5" height="10" rx="2" fill="#2E7D32" opacity="0.7"/>
  <rect x="458" y="205" width="10" height="5" rx="2" fill="#2E7D32" opacity="0.7"/>
  <rect x="463" y="200" width="5" height="10" rx="2" fill="#2E7D32" opacity="0.7"/>
  <text x="405" y="260" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Верблюд</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>