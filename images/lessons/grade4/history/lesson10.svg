<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Борьба с игом</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Сопротивление русского народа</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Kremlin wall (left) -->
  <rect x="20" y="130" width="160" height="140" fill="#C41E3A" opacity="0.7" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Battlements -->
  <rect x="20" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="40" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="60" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="80" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="100" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="120" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="140" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="160" y="120" width="15" height="15" fill="#C41E3A" opacity="0.8" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Tower -->
  <rect x="85" y="100" width="30" height="35" fill="#C41E3A" opacity="0.85" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="85,100 100,82 115,100" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Tower windows -->
  <rect x="95" y="110" width="10" height="12" fill="#F5E6C8"/>
  <!-- Gate -->
  <rect x="70" y="235" width="40" height="35" fill="#8B6914" rx="20"/>

  <!-- Broken chain (center) - symbol of yoke -->
  <line x1="220" y1="160" x2="260" y2="200" stroke="#1a1a1a" stroke-width="5" opacity="0.7"/>
  <line x1="280" y1="160" x2="240" y2="200" stroke="#1a1a1a" stroke-width="5" opacity="0.7"/>
  <!-- Chain links -->
  <ellipse cx="245" cy="180" rx="12" ry="7" fill="none" stroke="#1a1a1a" stroke-width="3" transform="rotate(-45, 245, 180)"/>
  <ellipse cx="255" cy="180" rx="12" ry="7" fill="none" stroke="#1a1a1a" stroke-width="3" transform="rotate(45, 255, 180)"/>
  <!-- Break point -->
  <line x1="240" y1="200" x2="248" y2="208" stroke="#C41E3A" stroke-width="3"/>
  <line x1="260" y1="200" x2="252" y2="208" stroke="#C41E3A" stroke-width="3"/>
  <!-- Sparks at break -->
  <circle cx="250" cy="208" r="3" fill="#D4A843" opacity="0.8"/>
  <circle cx="245" cy="212" r="2" fill="#D4A843" opacity="0.6"/>
  <circle cx="256" cy="211" r="2" fill="#D4A843" opacity="0.6"/>

  <!-- Tribute coins (falling from chain) -->
  <ellipse cx="270" cy="230" rx="10" ry="8" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <text x="270" y="233" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">D</text>
  <ellipse cx="300" cy="245" rx="10" ry="8" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <text x="300" y="248" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">D</text>
  <ellipse cx="225" cy="240" rx="10" ry="8" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <text x="225" y="243" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">D</text>
  <ellipse cx="330" cy="260" rx="8" ry="6" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="200" cy="260" rx="8" ry="6" fill="#D4A843" stroke-width="0.8" opacity="0.6" fill-opacity="0.6"/>

  <!-- Yurt (right) -->
  <path d="M380,275 Q420,210 460,275" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="375" y="275" width="90" height="20" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Yurt decoration -->
  <path d="M395,275 Q420,225 445,275" fill="none" stroke="#C41E3A" stroke-width="1.5" opacity="0.5"/>
  <!-- Yurt opening -->
  <rect x="412" y="260" width="16" height="35" fill="#8B6914" opacity="0.6" rx="8"/>
  <!-- Flag next to yurt -->
  <line x1="470" y1="200" x2="470" y2="295" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="470,200 500,210 470,222" fill="#C41E3A" opacity="0.7"/>

  <!-- Ground -->
  <rect x="0" y="280" width="500" height="35" fill="#DCC9A3" opacity="0.3"/>

  <!-- Yarlyk (document) - right side -->
  <rect x="350" y="120" width="60" height="80" fill="#DCC9A3" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <line x1="360" y1="140" x2="400" y2="140" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="360" y1="150" x2="395" y2="150" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="360" y1="160" x2="400" y2="160" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="360" y1="170" x2="390" y2="170" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="360" y1="180" x2="398" y2="180" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <!-- Seal -->
  <circle cx="380" cy="125" r="8" fill="#C41E3A" stroke="#D4A843" stroke-width="1"/>
  <text x="380" y="128" font-family="Arial, sans-serif" font-size="7" fill="#D4A843" text-anchor="middle" font-weight="bold">X</text>
  <text x="380" y="210" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">Ярлык</text>

  <!-- Duration label -->
  <rect x="175" y="290" width="150" height="20" fill="#C41E3A" opacity="0.15" rx="3"/>
  <text x="250" y="304" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A" text-anchor="middle" font-weight="bold">240 лет монгольского ига</text>

</svg>