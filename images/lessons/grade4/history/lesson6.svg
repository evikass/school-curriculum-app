<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Распространение христианства</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Церкви, грамота и культура на Руси</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Open book (center, prominent) -->
  <path d="M170,190 L250,180 L250,280 L170,290 Z" fill="#F5E6C8" stroke="#8B6914" stroke-width="2"/>
  <path d="M330,190 L250,180 L250,280 L330,290 Z" fill="#DCC9A3" stroke="#8B6914" stroke-width="2"/>
  <!-- Book spine -->
  <line x1="250" y1="180" x2="250" y2="280" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Text lines on left page -->
  <line x1="180" y1="210" x2="240" y2="205" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="220" x2="240" y2="215" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="230" x2="240" y2="225" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="240" x2="230" y2="236" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <!-- Text lines on right page -->
  <line x1="260" y1="205" x2="320" y2="210" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="215" x2="320" y2="220" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="225" x2="320" y2="230" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="235" x2="310" y2="239" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <!-- Cross on book -->
  <rect x="245" y="200" width="10" height="25" fill="#D4A843" opacity="0.7"/>
  <rect x="237" y="210" width="26" height="6" fill="#D4A843" opacity="0.7"/>

  <!-- Cathedral with domes (left) -->
  <!-- Main structure -->
  <rect x="30" y="180" width="100" height="70" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Central dome -->
  <path d="M60,180 Q80,130 100,180" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Side dome left -->
  <path d="M30,180 Q42,150 55,180" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Side dome right -->
  <path d="M105,180 Q118,150 130,180" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Crosses on domes -->
  <line x1="80" y1="130" x2="80" y2="120" stroke="#D4A843" stroke-width="2"/>
  <line x1="75" y1="125" x2="85" y2="125" stroke="#D4A843" stroke-width="2"/>
  <line x1="42" y1="150" x2="42" y2="142" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="118" y1="150" x2="118" y2="142" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="65" y="225" width="25" height="25" fill="#8B6914" rx="12"/>
  <!-- Windows -->
  <circle cx="50" cy="205" r="8" fill="#A8C4E0" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="110" cy="205" r="8" fill="#A8C4E0" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Icon frame (right side) -->
  <rect x="380" y="110" width="90" height="110" fill="#D4A843" stroke="#1a1a1a" stroke-width="2" rx="2"/>
  <rect x="388" y="118" width="74" height="94" fill="#2B4C7E" opacity="0.3" rx="1"/>
  <!-- Saint figure in icon (simplified) -->
  <circle cx="425" cy="145" r="14" fill="#D4A843" opacity="0.6" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Halo -->
  <circle cx="425" cy="145" r="18" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.8"/>
  <!-- Body -->
  <path d="M408,162 Q425,175 442,162 L445,210 L405,210 Z" fill="#C41E3A" opacity="0.7"/>
  <!-- Cross in hands -->
  <rect x="422" y="175" width="6" height="20" fill="#D4A843"/>
  <rect x="417" y="182" width="16" height="4" fill="#D4A843"/>

  <!-- Scroll (bottom right) -->
  <rect x="370" y="245" width="110" height="30" fill="#DCC9A3" stroke="#8B6914" stroke-width="1" rx="3"/>
  <ellipse cx="375" cy="260" rx="8" ry="15" fill="#DCC9A3" stroke="#8B6914" stroke-width="1"/>
  <ellipse cx="475" cy="260" rx="8" ry="15" fill="#DCC9A3" stroke="#8B6914" stroke-width="1"/>
  <text x="425" y="264" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">Кириллица</text>

  <!-- Quill pen -->
  <line x1="365" y1="240" x2="340" y2="210" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="340,210 335,200 345,205" fill="#1a1a1a"/>
  <!-- Ink dots -->
  <circle cx="350" cy="220" r="2" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="355" cy="230" r="1.5" fill="#1a1a1a" opacity="0.3"/>

  <!-- Decorative Bauhaus elements -->
  <rect x="10" y="100" width="15" height="15" fill="#C41E3A" opacity="0.3"/>
  <circle cx="490" cy="100" r="7" fill="#2B4C7E" opacity="0.3"/>

</svg>