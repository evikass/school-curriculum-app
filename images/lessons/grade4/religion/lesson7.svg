<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Православные праздники</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Православная культура</text>
  <!-- Illustration area -->
  <ellipse cx="200" cy="190" rx="35" ry="45" fill="#DC143C" stroke="#1a1a1a" stroke-width="2"/><ellipse cx="200" cy="190" rx="25" ry="35" fill="none" stroke="#D4A843" stroke-width="1.5"/><line x1="200" y1="155" x2="200" y2="145" stroke="#8B6914" stroke-width="2"/><line x1="200" y1="145" x2="195" y2="150" stroke="#8B6914" stroke-width="1.5"/><line x1="200" y1="145" x2="205" y2="150" stroke="#8B6914" stroke-width="1.5"/><!-- Kulich --><rect x="280" y="175" width="50" height="60" rx="8" fill="#DEB887" stroke="#1a1a1a" stroke-width="1.5"/><rect x="275" y="170" width="60" height="15" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/><text x="305" y="210" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial" font-weight="bold">ХВ</text><text x="250" y="268" text-anchor="middle" font-size="11" fill="#D4A843" font-weight="bold" font-family="Arial">Христос воскресе!</text><text x="250" y="290" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">Воистину воскресе!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>