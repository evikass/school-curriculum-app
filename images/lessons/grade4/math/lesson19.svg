<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Единицы площади</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Квадратный метр, километр, гектар</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Area units comparison - nested squares -->
  <!-- km^2 huge -->
  <rect x="50" y="95" width="400" height="200" fill="#2B4C7E" opacity="0.05" rx="6" stroke="#2B4C7E" stroke-width="2" stroke-dasharray="8,4" />
  <text x="420" y="115" fill="#2B4C7E" font-size="12" font-weight="bold">1 кв.км</text>
  
  <!-- ha -->
  <rect x="70" y="120" width="200" height="120" fill="#C41E3A" opacity="0.08" rx="4" stroke="#C41E3A" stroke-width="2" stroke-dasharray="5,3" />
  <text x="240" y="140" fill="#C41E3A" font-size="11" font-weight="bold">1 га = 10 000 кв.м</text>
  
  <!-- m^2 -->
  <rect x="90" y="150" width="80" height="60" fill="#D4A843" opacity="0.25" rx="3" stroke="#D4A843" stroke-width="2" />
  <text x="130" y="185" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold">1 кв.м</text>
  
  <!-- dm^2 -->
  <rect x="95" y="155" width="25" height="20" fill="#2B4C7E" opacity="0.3" rx="2" stroke="#2B4C7E" stroke-width="1" />
  <text x="108" y="170" text-anchor="middle" fill="#1a1a1a" font-size="7">1кв.дм</text>
  
  <!-- cm^2 -->
  <rect x="97" y="157" width="8" height="6" fill="#C41E3A" opacity="0.5" rx="1" />
  
  <!-- Conversion chain -->
  <rect x="300" y="160" width="140" height="120" fill="white" opacity="0.5" rx="6" stroke="#1a1a1a" stroke-width="1" />
  <text x="370" y="182" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Связи:</text>
  <text x="370" y="200" text-anchor="middle" fill="#1a1a1a" font-size="10">1 кв.км = 100 га</text>
  <text x="370" y="216" text-anchor="middle" fill="#1a1a1a" font-size="10">1 га = 100 а</text>
  <text x="370" y="232" text-anchor="middle" fill="#1a1a1a" font-size="10">1 а = 100 кв.м</text>
  <text x="370" y="248" text-anchor="middle" fill="#1a1a1a" font-size="10">1 кв.м = 100 кв.дм</text>
  <text x="370" y="264" text-anchor="middle" fill="#1a1a1a" font-size="10">1 кв.дм = 100 кв.см</text>
  <text x="370" y="280" text-anchor="middle" fill="#1a1a1a" font-size="10">1 кв.см = 100 кв.мм</text>
  
  <!-- Labels -->
  <rect x="70" y="280" width="200" height="25" fill="#D4A843" opacity="0.2" rx="4" />
  <text x="170" y="297" text-anchor="middle" fill="#1a1a1a" font-size="11">Ар (сотка) = 10 x 10 м</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>