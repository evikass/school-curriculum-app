<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Единицы массы</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Грамм, килограмм, тонна, центнер</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Balance scale -->
  <!-- Base -->
  <rect x="230" y="260" width="40" height="50" fill="#1a1a1a" rx="2" />
  <polygon points="225,260 275,260 250,245" fill="#1a1a1a" />
  <!-- Pole -->
  <line x1="250" y1="120" x2="250" y2="250" stroke="#1a1a1a" stroke-width="4" />
  
  <!-- Left beam -->
  <line x1="80" y1="160" x2="250" y2="130" stroke="#1a1a1a" stroke-width="3" />
  <!-- Right beam -->
  <line x1="250" y1="130" x2="420" y2="160" stroke="#1a1a1a" stroke-width="3" />
  
  <!-- Left pan - kg -->
  <rect x="60" y="160" width="60" height="8" fill="#1a1a1a" rx="2" />
  <line x1="60" y1="168" x2="60" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <line x1="120" y1="168" x2="120" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <rect x="55" y="190" width="70" height="35" fill="#C41E3A" opacity="0.2" rx="3" />
  <text x="90" y="213" text-anchor="middle" fill="#C41E3A" font-size="16" font-weight="bold">1 кг</text>
  
  <!-- Right pan - g -->
  <rect x="400" y="160" width="60" height="8" fill="#1a1a1a" rx="2" />
  <line x1="400" y1="168" x2="400" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <line x1="460" y1="168" x2="460" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <rect x="395" y="190" width="70" height="35" fill="#2B4C7E" opacity="0.2" rx="3" />
  <text x="430" y="213" text-anchor="middle" fill="#2B4C7E" font-size="16" font-weight="bold">1000г</text>
  
  <!-- Equal label -->
  <text x="250" y="115" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">1 кг = 1000 г</text>
  
  <!-- Conversion boxes -->
  <rect x="50" y="240" width="100" height="28" fill="#D4A843" opacity="0.2" rx="4" />
  <text x="100" y="259" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold">1 т = 1000 кг</text>
  
  <rect x="170" y="240" width="100" height="28" fill="#2B4C7E" opacity="0.15" rx="4" />
  <text x="220" y="259" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold">1 ц = 100 кг</text>
  
  <rect x="290" y="240" width="100" height="28" fill="#C41E3A" opacity="0.15" rx="4" />
  <text x="340" y="259" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold">1 кг = 1000 г</text>
  
  <rect x="410" y="240" width="80" height="28" fill="#D4A843" opacity="0.15" rx="4" />
  <text x="450" y="259" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="bold">1 г = 1000 мг</text>
  
  <!-- Chain -->
  <text x="250" y="295" text-anchor="middle" fill="#1a1a1a" font-size="10">т - ц - кг - г - мг</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>