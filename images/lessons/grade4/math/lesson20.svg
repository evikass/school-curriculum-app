<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Геометрические тела</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Куб, шар, цилиндр, конус</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Cube -->
  <polygon points="60,150 110,130 160,150 160,210 110,230 60,210" fill="#2B4C7E" opacity="0.3" stroke="#2B4C7E" stroke-width="2" />
  <polygon points="110,130 160,150 160,210 110,190" fill="#2B4C7E" opacity="0.2" stroke="#2B4C7E" stroke-width="1" />
  <polygon points="110,130 110,190 60,210 60,150" fill="#2B4C7E" opacity="0.4" stroke="#2B4C7E" stroke-width="1" />
  <text x="110" y="255" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Куб</text>
  <text x="110" y="270" text-anchor="middle" fill="#1a1a1a" font-size="9">6 граней</text>
  
  <!-- Sphere -->
  <circle cx="250" cy="180" r="50" fill="#C41E3A" opacity="0.2" stroke="#C41E3A" stroke-width="2" />
  <ellipse cx="250" cy="180" rx="50" ry="15" fill="none" stroke="#C41E3A" stroke-width="1" opacity="0.5" />
  <path d="M250,130 Q240,180 250,230" fill="none" stroke="#C41E3A" stroke-width="1" opacity="0.5" />
  <text x="250" y="255" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Шар</text>
  <text x="250" y="270" text-anchor="middle" fill="#1a1a1a" font-size="9">нет граней</text>
  
  <!-- Cylinder -->
  <ellipse cx="380" cy="140" rx="40" ry="15" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="2" />
  <line x1="340" y1="140" x2="340" y2="210" stroke="#D4A843" stroke-width="2" />
  <line x1="420" y1="140" x2="420" y2="210" stroke="#D4A843" stroke-width="2" />
  <ellipse cx="380" cy="210" rx="40" ry="15" fill="#D4A843" opacity="0.2" stroke="#D4A843" stroke-width="2" />
  <text x="380" y="255" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Цилиндр</text>
  <text x="380" y="270" text-anchor="middle" fill="#1a1a1a" font-size="9">3 поверхности</text>
  
  <!-- Cone -->
  <polygon points="480,140 440,220 520,220" fill="#2B4C7E" opacity="0.2" stroke="#2B4C7E" stroke-width="2" />
  <ellipse cx="480" cy="220" rx="40" ry="12" fill="#2B4C7E" opacity="0.15" stroke="#2B4C7E" stroke-width="1" />
  <text x="480" y="255" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Конус</text>
  <text x="480" y="270" text-anchor="middle" fill="#1a1a1a" font-size="9">1 основание</text>
  
  <!-- Rectangular prism label -->
  <rect x="80" y="280" width="340" height="25" fill="#F5E6C8" stroke="#C41E3A" stroke-width="1" rx="4" />
  <text x="250" y="297" text-anchor="middle" fill="#1a1a1a" font-size="11">Пирамида - треугольное основание + боковые грани</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>