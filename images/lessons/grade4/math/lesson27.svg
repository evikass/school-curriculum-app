<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Задачи на работу</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Производительность и работа</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Work scene - factory/building -->
  <rect x="160" y="100" width="180" height="130" fill="#2B4C7E" opacity="0.1" rx="6" stroke="#2B4C7E" stroke-width="2" />
  <text x="250" y="125" text-anchor="middle" fill="#2B4C7E" font-size="14" font-weight="bold">ЗАВОД</text>
  
  <!-- Gear/cog visual -->
  <circle cx="200" cy="175" r="30" fill="none" stroke="#1a1a1a" stroke-width="2" />
  <circle cx="200" cy="175" r="20" fill="#1a1a1a" opacity="0.1" />
  <!-- Gear teeth -->
  <rect x="193" y="142" width="14" height="12" fill="#1a1a1a" opacity="0.6" rx="2" />
  <rect x="193" y="196" width="14" height="12" fill="#1a1a1a" opacity="0.6" rx="2" />
  <rect x="167" y="168" width="12" height="14" fill="#1a1a1a" opacity="0.6" rx="2" />
  <rect x="221" y="168" width="12" height="14" fill="#1a1a1a" opacity="0.6" rx="2" />
  
  <!-- Second smaller gear -->
  <circle cx="270" cy="185" r="18" fill="none" stroke="#C41E3A" stroke-width="2" />
  <circle cx="270" cy="185" r="10" fill="#C41E3A" opacity="0.1" />
  <rect x="265" y="164" width="10" height="8" fill="#C41E3A" opacity="0.6" rx="1" />
  <rect x="265" y="198" width="10" height="8" fill="#C41E3A" opacity="0.6" rx="1" />
  
  <!-- Worker silhouettes -->
  <circle cx="310" cy="130" r="8" fill="#1a1a1a" opacity="0.3" />
  <rect x="304" y="140" width="12" height="20" fill="#1a1a1a" opacity="0.3" rx="3" />
  
  <!-- Formula box -->
  <rect x="50" y="245" width="400" height="55" fill="white" opacity="0.5" rx="8" stroke="#D4A843" stroke-width="2" />
  <text x="250" y="268" text-anchor="middle" fill="#D4A843" font-size="14" font-weight="bold">A = v x t (Работа = Производительность x Время)</text>
  <text x="250" y="290" text-anchor="middle" fill="#1a1a1a" font-size="12">Вместе: v(общ) = v1 + v2</text>
  
  <!-- Example -->
  <rect x="360" y="95" width="120" height="80" fill="#C41E3A" opacity="0.08" rx="6" />
  <text x="420" y="115" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Пример:</text>
  <text x="420" y="135" text-anchor="middle" fill="#1a1a1a" font-size="10">Мастер: 5 дет/ч</text>
  <text x="420" y="150" text-anchor="middle" fill="#1a1a1a" font-size="10">Ученик: 3 дет/ч</text>
  <text x="420" y="170" text-anchor="middle" fill="#C41E3A" font-size="10" font-weight="bold">Вместе за 4ч:</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>