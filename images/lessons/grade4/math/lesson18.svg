<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Площадь прямоугольника</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Вычисление площади прямоугольника</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Grid rectangle -->
  <rect x="100" y="100" width="200" height="150" fill="#2B4C7E" opacity="0.1" stroke="#1a1a1a" stroke-width="2" />
  
  <!-- Grid lines vertical (5 cols = 200px, 40px each) -->
  <line x1="140" y1="100" x2="140" y2="250" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  <line x1="180" y1="100" x2="180" y2="250" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  <line x1="220" y1="100" x2="220" y2="250" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  <line x1="260" y1="100" x2="260" y2="250" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  
  <!-- Grid lines horizontal (4 rows = 150px, ~37px each) -->
  <line x1="100" y1="137" x2="300" y2="137" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  <line x1="100" y1="175" x2="300" y2="175" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  <line x1="100" y1="212" x2="300" y2="212" stroke="#2B4C7E" stroke-width="1" opacity="0.4" />
  
  <!-- Dimensions -->
  <!-- Width arrow -->
  <line x1="100" y1="265" x2="300" y2="265" stroke="#C41E3A" stroke-width="2" />
  <polygon points="100,265 110,260 110,270" fill="#C41E3A" />
  <polygon points="300,265 290,260 290,270" fill="#C41E3A" />
  <text x="200" y="282" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">a = 5 см</text>
  
  <!-- Height arrow -->
  <line x1="80" y1="100" x2="80" y2="250" stroke="#C41E3A" stroke-width="2" />
  <polygon points="80,100 75,110 85,110" fill="#C41E3A" />
  <polygon points="80,250 75,240 85,240" fill="#C41E3A" />
  <text x="65" y="180" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold" transform="rotate(-90, 65, 180)">b = 4 см</text>
  
  <!-- Count squares label -->
  <text x="200" y="170" text-anchor="middle" fill="#1a1a1a" font-size="12">5 x 4 = 20</text>
  <text x="200" y="190" text-anchor="middle" fill="#1a1a1a" font-size="12">квадратов</text>
  
  <!-- Formula box -->
  <rect x="340" y="100" width="140" height="80" fill="#C41E3A" opacity="0.1" rx="6" stroke="#C41E3A" stroke-width="1" />
  <text x="410" y="130" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">S = a x b</text>
  <text x="410" y="155" text-anchor="middle" fill="#1a1a1a" font-size="12">S = 5 x 4</text>
  <text x="410" y="175" text-anchor="middle" fill="#C41E3A" font-size="16" font-weight="bold">S = 20 кв.см</text>
  
  <!-- Squares label -->
  <rect x="340" y="200" width="140" height="60" fill="#D4A843" opacity="0.15" rx="6" />
  <text x="410" y="225" text-anchor="middle" fill="#1a1a1a" font-size="11">Квадрат: S = a x a</text>
  <text x="410" y="248" text-anchor="middle" fill="#1a1a1a" font-size="11">Треугольник:</text>
  <text x="410" y="260" text-anchor="middle" fill="#1a1a1a" font-size="11">S = a x b : 2</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>