<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 3:  Вежливые слова</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Polite words</text>

  
  <!-- Bowing figure -->
  <circle cx="250" cy="145" r="20" fill="#2B4C7E"/>
  <path d="M240 168 L250 165 L260 168 L275 230 Q250 225 225 230 Z" fill="#2B4C7E"/>
  <!-- Raised hand -->
  <line x1="275" y1="190" x2="300" y2="165" stroke="#2B4C7E" stroke-width="5" stroke-linecap="round"/>
  <circle cx="300" cy="162" r="5" fill="#2B4C7E"/>
  <!-- Speech bubbles -->
  <ellipse cx="110" cy="130" rx="55" ry="24" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2"/>
  <text x="110" y="135" font-family="Arial" font-size="14" font-weight="bold" fill="#C41E3A" text-anchor="middle">Please!</text>
  <ellipse cx="390" cy="130" rx="65" ry="24" fill="#FFFFFF" stroke="#D4A843" stroke-width="2"/>
  <text x="390" y="135" font-family="Arial" font-size="14" font-weight="bold" fill="#D4A843" text-anchor="middle">Thank you!</text>
  <ellipse cx="145" cy="265" rx="50" ry="22" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="2"/>
  <text x="145" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#2B4C7E" text-anchor="middle">Sorry!</text>
  <ellipse cx="355" cy="265" rx="55" ry="22" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2"/>
  <text x="355" y="270" font-family="Arial" font-size="13" font-weight="bold" fill="#C41E3A" text-anchor="middle">Excuse me!</text>
  <!-- Response -->
  <rect x="210" y="280" width="80" height="20" rx="4" fill="#D4A843" opacity="0.3"/>
  <text x="250" y="294" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">No problem!</text>
  <!-- Decorative dots -->
  <circle cx="60" cy="200" r="3" fill="#C41E3A" opacity="0.3"/>
  <circle cx="440" cy="200" r="3" fill="#2B4C7E" opacity="0.3"/>
  <circle cx="60" cy="215" r="3" fill="#D4A843" opacity="0.3"/>
  <circle cx="440" cy="215" r="3" fill="#D4A843" opacity="0.3"/>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>