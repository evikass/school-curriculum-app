<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#fef3c7"/>
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#b45309">Подготовка к письму ✏️</text>
  <rect x="50" y="60" width="400" height="200" fill="#fff" stroke="#d97706" stroke-width="2" rx="10"/>
  <line x1="60" y1="110" x2="440" y2="110" stroke="#e5e7eb" stroke-dasharray="5,5"/>
  <line x1="60" y1="160" x2="440" y2="160" stroke="#e5e7eb" stroke-dasharray="5,5"/>
  <line x1="60" y1="210" x2="440" y2="210" stroke="#e5e7eb" stroke-dasharray="5,5"/>
  <text x="100" y="140" font-family="Arial" font-size="50" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">| | | | |</text>
  <text x="100" y="200" font-family="Arial" font-size="50" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">/ / / / /</text>
  <text x="100" y="250" font-family="Arial" font-size="50" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">○ ○ ○ ○ ○</text>
  <rect x="20" y="280" width="460" height="55" fill="#dbeafe" rx="10"/>
  <text x="250" y="310" text-anchor="middle" font-family="Arial" font-size="14" fill="#1d4ed8">Урок: Элементы букв и письмо ✍️</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial" font-size="11" fill="#6b7280">Обведи и напиши элементы букв</text>
</svg>
