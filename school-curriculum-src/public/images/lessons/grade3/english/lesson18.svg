<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad18" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad18)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">✅ Can / Can't</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Can examples -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="65" width="220" height="120" fill="white" rx="10" opacity="0.8"/>
    <rect x="20" y="65" width="220" height="30" fill="#4CAF50" rx="10"/>
    <rect x="20" y="85" width="220" height="10" fill="#4CAF50"/>
    <text x="130" y="85" font-size="14" fill="white" text-anchor="middle" font-weight="bold">✓ I can...</text>
    
    <!-- Swim icon -->
    <ellipse cx="70" cy="130" rx="25" ry="15" fill="#42A5F5"/>
    <circle cx="55" cy="120" r="8" fill="#FFCCBC"/>
    <path d="M45 130 Q70 120 95 130" stroke="#FFCCBC" fill="none" stroke-width="4"/>
    <text x="70" y="155" font-size="10" fill="#1565C0" text-anchor="middle">swim</text>
    
    <!-- Run icon -->
    <circle cx="145" cy="115" r="8" fill="#FFCCBC"/>
    <line x1="145" y1="123" x2="145" y2="145" stroke="#FFCCBC" stroke-width="4"/>
    <line x1="145" y1="130" x2="160" y2="140" stroke="#FFCCBC" stroke-width="4"/>
    <line x1="145" y1="145" x2="155" y2="160" stroke="#FFCCBC" stroke-width="4"/>
    <line x1="145" y1="145" x2="135" y2="160" stroke="#FFCCBC" stroke-width="4"/>
    <text x="150" y="175" font-size="10" fill="#1565C0" text-anchor="middle">run</text>
    
    <!-- Jump icon -->
    <circle cx="210" cy="115" r="8" fill="#FFCCBC"/>
    <line x1="210" y1="123" x2="210" y2="140" stroke="#FFCCBC" stroke-width="4"/>
    <line x1="210" y1="135" x2="225" y2="130" stroke="#FFCCBC" stroke-width="4"/>
    <line x1="210" y1="145" x2="220" y2="160" stroke="#FFCCBC" stroke-width="4"/>
    <line x1="210" y1="145" x2="195" y2="155" stroke="#FFCCBC" stroke-width="4"/>
    <text x="210" y="175" font-size="10" fill="#1565C0" text-anchor="middle">jump</text>
  </g>
  
  <!-- Can't examples -->
  <g font-family="Arial, sans-serif">
    <rect x="260" y="65" width="220" height="120" fill="white" rx="10" opacity="0.8"/>
    <rect x="260" y="65" width="220" height="30" fill="#F44336" rx="10"/>
    <rect x="260" y="85" width="220" height="10" fill="#F44336"/>
    <text x="370" y="85" font-size="14" fill="white" text-anchor="middle" font-weight="bold">✗ I can't...</text>
    
    <!-- Fly icon with X -->
    <circle cx="310" cy="125" r="8" fill="#FFCCBC"/>
    <ellipse cx="310" cy="145" rx="10" ry="15" fill="#FFCCBC"/>
    <line x1="295" y1="130" x2="280" y2="120" stroke="#FFCCBC" stroke-width="3"/>
    <line x1="325" y1="130" x2="340" y2="120" stroke="#FFCCBC" stroke-width="3"/>
    <line x1="295" y1="115" x2="325" y2="145" stroke="#F44336" stroke-width="3"/>
    <line x1="325" y1="115" x2="295" y2="145" stroke="#F44336" stroke-width="3"/>
    <text x="310" y="175" font-size="10" fill="#C62828" text-anchor="middle">fly</text>
    
    <!-- Drive icon with X -->
    <rect x="350" y="125" width="35" height="20" fill="#795548" rx="3"/>
    <circle cx="358" cy="148" r="6" fill="#424242"/>
    <circle cx="378" cy="148" r="6" fill="#424242"/>
    <circle cx="360" cy="130" r="4" fill="#BBDEFB"/>
    <circle cx="375" cy="130" r="4" fill="#BBDEFB"/>
    <line x1="350" y1="120" x2="385" y2="150" stroke="#F44336" stroke-width="3"/>
    <line x1="385" y1="120" x2="350" y2="150" stroke="#F44336" stroke-width="3"/>
    <text x="367" y="175" font-size="10" fill="#C62828" text-anchor="middle">drive</text>
    
    <!-- Speak cat icon with X -->
    <ellipse cx="430" cy="135" rx="15" ry="12" fill="#FF9800"/>
    <polygon points="420,125 425,115 430,125" fill="#FF9800"/>
    <polygon points="440,125 445,115 450,125" fill="#FF9800"/>
    <circle cx="425" cy="132" r="2" fill="#333"/>
    <circle cx="435" cy="132" r="2" fill="#333"/>
    <line x1="415" y1="120" x2="445" y2="150" stroke="#F44336" stroke-width="3"/>
    <line x1="445" y1="120" x2="415" y2="150" stroke="#F44336" stroke-width="3"/>
    <text x="430" y="175" font-size="9" fill="#C62828" text-anchor="middle">speak cat</text>
  </g>
  
  <!-- Sentence examples -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="200" width="220" height="80" fill="#C8E6C9" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="225" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">I can swim.</text>
    <text x="130" y="245" font-size="10" fill="#388E3C" text-anchor="middle">Я умею плавать.</text>
    <text x="130" y="265" font-size="11" fill="#1B5E20" text-anchor="middle">Can you swim? ✓</text>
    
    <rect x="260" y="200" width="220" height="80" fill="#FFCDD2" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="225" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">I can't fly.</text>
    <text x="370" y="245" font-size="10" fill="#D32F2F" text-anchor="middle">Я не умею летать.</text>
    <text x="370" y="265" font-size="11" fill="#B71C1C" text-anchor="middle">Can you fly? ✗</text>
  </g>
  
  <!-- Question form -->
  <rect x="100" y="290" width="300" height="45" fill="#FFF8E1" rx="10"/>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="12" fill="#F57F17" text-anchor="middle" font-weight="bold">Can you...? — Yes, I can. / No, I can't.</text>
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="9" fill="#FFB74D" text-anchor="middle">Ты умеешь...? — Да. / Нет.</text>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#4CAF50" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">18</text>
</svg>