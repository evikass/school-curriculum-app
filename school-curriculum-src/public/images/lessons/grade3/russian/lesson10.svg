<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD9;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FCE4EC;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky10)"/>
  <rect width="500" height="350" fill="#FFF0F5" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#AD1457" text-anchor="middle">👁️ Винительный падеж</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E91E63" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#F8BBD9" opacity="0.4"/>
  
  <!-- Main info box -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="180" height="80" fill="#FCE4EC" rx="10" stroke="#E91E63"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">КОГО? ЧТО?</text>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" fill="#AD1457" text-anchor="middle">Объект действия</text>
    <text x="90" y="70" font-family="Arial, sans-serif" font-size="12" fill="#AD1457" text-anchor="middle">«Вижу кого? что?»</text>
  </g>
  
  <!-- Prepositions -->
  <g transform="translate(270, 70)">
    <rect x="0" y="0" width="180" height="80" fill="#E3F2FD" rx="10" stroke="#2196F3"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Предлоги</text>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">в, на, за, через, про</text>
  </g>
  
  <!-- Difference from I.p. -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="400" height="60" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">⚠️ Отличие от Именительного падежа</text>
    <text x="200" y="42" font-family="Arial, sans-serif" font-size="11" fill="#F57C00" text-anchor="middle">И.п. — подлежащее (кто? что? делает)</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="11" fill="#F57C00" text-anchor="middle">В.п. — дополнение (кто? что? видит/читает)</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 250)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="130" height="40" fill="#F8BBD9" rx="5"/>
    <text x="65" y="17" fill="#AD1457" text-anchor="middle" font-size="11">Вижу друга</text>
    <text x="65" y="32" fill="#C2185B" text-anchor="middle" font-size="10">(кого? — В.п.)</text>
    
    <rect x="145" y="0" width="130" height="40" fill="#F8BBD9" rx="5"/>
    <text x="210" y="17" fill="#AD1457" text-anchor="middle" font-size="11">Читать книгу</text>
    <text x="210" y="32" fill="#C2185B" text-anchor="middle" font-size="10">(что? — В.п.)</text>
    
    <rect x="290" y="0" width="130" height="40" fill="#F8BBD9" rx="5"/>
    <text x="355" y="17" fill="#AD1457" text-anchor="middle" font-size="11">В школу</text>
    <text x="355" y="32" fill="#C2185B" text-anchor="middle" font-size="10">(В.п. с предл.)</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="140" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>