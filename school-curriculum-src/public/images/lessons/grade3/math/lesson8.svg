<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFAB91;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math8)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D84315" text-anchor="middle">➗ Деление на 6, 7, 8, 9</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF5722" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFAB91" opacity="0.5"/>
  
  <!-- Division tables -->
  <g transform="translate(20, 70)" font-family="Arial, sans-serif" font-size="11">
    <!-- ÷6 -->
    <g>
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#D84315" text-anchor="middle">÷6</text>
      <rect x="0" y="8" width="110" height="70" fill="#FFCCBC" rx="5"/>
      <text x="55" y="28" fill="#E64A19" text-anchor="middle">18÷6=3 24÷6=4</text>
      <text x="55" y="48" fill="#E64A19" text-anchor="middle">30÷6=5 36÷6=6</text>
      <text x="55" y="68" fill="#E64A19" text-anchor="middle">42÷6=7 54÷6=9</text>
    </g>
    
    <!-- ÷7 -->
    <g transform="translate(120, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#D84315" text-anchor="middle">÷7</text>
      <rect x="0" y="8" width="110" height="70" fill="#FFAB91" rx="5"/>
      <text x="55" y="28" fill="#E64A19" text-anchor="middle">21÷7=3 28÷7=4</text>
      <text x="55" y="48" fill="#E64A19" text-anchor="middle">35÷7=5 42÷7=6</text>
      <text x="55" y="68" fill="#E64A19" text-anchor="middle">49÷7=7 63÷7=9</text>
    </g>
    
    <!-- ÷8 -->
    <g transform="translate(240, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#D84315" text-anchor="middle">÷8</text>
      <rect x="0" y="8" width="110" height="70" fill="#FFCCBC" rx="5"/>
      <text x="55" y="28" fill="#E64A19" text-anchor="middle">24÷8=3 32÷8=4</text>
      <text x="55" y="48" fill="#E64A19" text-anchor="middle">40÷8=5 48÷8=6</text>
      <text x="55" y="68" fill="#E64A19" text-anchor="middle">56÷8=7 72÷8=9</text>
    </g>
    
    <!-- ÷9 -->
    <g transform="translate(360, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#D84315" text-anchor="middle">÷9</text>
      <rect x="0" y="8" width="110" height="70" fill="#FFAB91" rx="5"/>
      <text x="55" y="28" fill="#E64A19" text-anchor="middle">27÷9=3 36÷9=4</text>
      <text x="55" y="48" fill="#E64A19" text-anchor="middle">45÷9=5 54÷9=6</text>
      <text x="55" y="68" fill="#E64A19" text-anchor="middle">63÷9=7 81÷9=9</text>
    </g>
  </g>
  
  <!-- Hard examples -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="400" height="55" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">⚠️ Самые трудные примеры — запомни!</text>
    <text x="200" y="33" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">42 ÷ 6 = 7  |  56 ÷ 7 = 8  |  63 ÷ 7 = 9</text>
    <text x="200" y="48" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">Проверь умножением: 6 × 7 = 42 ✓</text>
  </g>
  
  <!-- Tip -->
  <g transform="translate(150, 270)">
    <rect x="0" y="0" width="200" height="35" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
    <text x="100" y="23" font-family="Arial, sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">💡 Сложные случаи требуют практики!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>