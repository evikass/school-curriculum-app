<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CFD8DC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#B0BEC5;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math9)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F" text-anchor="middle">➗ Деление с остатком</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#607D8B" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#B0BEC5" opacity="0.4"/>
  
  <!-- Main concept -->
  <g transform="translate(50, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="50" fill="#ECEFF1" rx="8" stroke="#607D8B"/>
    <text x="200" y="25" font-size="14" font-weight="bold" fill="#37474F" text-anchor="middle">17 ÷ 5 = 3 (остаток 2)</text>
    <text x="200" y="45" font-size="11" fill="#546E7A" text-anchor="middle">17 = 5 × 3 + 2</text>
  </g>
  
  <!-- Visual example -->
  <g transform="translate(50, 150)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#37474F" text-anchor="middle">17 конфет ÷ 5 друзей</text>
    
    <!-- 5 groups of 3 -->
    <g transform="translate(0, 20)">
      <g transform="translate(20, 0)">
        <circle cx="0" cy="15" r="8" fill="#42A5F5"/>
        <circle cx="20" cy="15" r="8" fill="#42A5F5"/>
        <circle cx="40" cy="15" r="8" fill="#42A5F5"/>
        <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">3</text>
      </g>
      <g transform="translate(100, 0)">
        <circle cx="0" cy="15" r="8" fill="#66BB6A"/>
        <circle cx="20" cy="15" r="8" fill="#66BB6A"/>
        <circle cx="40" cy="15" r="8" fill="#66BB6A"/>
        <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">3</text>
      </g>
      <g transform="translate(180, 0)">
        <circle cx="0" cy="15" r="8" fill="#FF7043"/>
        <circle cx="20" cy="15" r="8" fill="#FF7043"/>
        <circle cx="40" cy="15" r="8" fill="#FF7043"/>
        <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#D84315" text-anchor="middle">3</text>
      </g>
      <g transform="translate(260, 0)">
        <circle cx="0" cy="15" r="8" fill="#AB47BC"/>
        <circle cx="20" cy="15" r="8" fill="#AB47BC"/>
        <circle cx="40" cy="15" r="8" fill="#AB47BC"/>
        <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#6A1B9A" text-anchor="middle">3</text>
      </g>
      <g transform="translate(340, 0)">
        <circle cx="0" cy="15" r="8" fill="#26A69A"/>
        <circle cx="20" cy="15" r="8" fill="#26A69A"/>
        <circle cx="40" cy="15" r="8" fill="#26A69A"/>
        <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#00695C" text-anchor="middle">3</text>
      </g>
    </g>
    
    <!-- Remainder -->
    <g transform="translate(180, 70)">
      <circle cx="0" cy="15" r="8" fill="#EF5350" stroke="#C62828" stroke-width="2">
        <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="15" r="8" fill="#EF5350" stroke="#C62828" stroke-width="2">
        <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <text x="10" y="45" font-family="Arial, sans-serif" font-size="9" fill="#C62828" text-anchor="middle">Остаток: 2</text>
    </g>
  </g>
  
  <!-- Rule -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="400" height="40" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="200" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">⚠️ Правило: Остаток всегда меньше делителя!</text>
    <text x="200" y="33" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">При делении на 5 остаток может быть 0, 1, 2, 3 или 4</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>