<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="fire6" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#FF9800;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hot6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#FFF3E0"/>
  <rect width="500" height="350" fill="url(#hot6)"/>
  
  <!-- Title -->
  <rect x="140" y="10" width="220" height="45" rx="10" fill="#FFF" stroke="#FF5722" stroke-width="2"/>
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E65100" text-anchor="middle">🔥 Огонь</text>
  
  <!-- Main fire -->
  <g transform="translate(180, 100)">
    <!-- Fire glow -->
    <ellipse cx="70" cy="120" rx="80" ry="30" fill="#FF5722" opacity="0.3">
      <animate attributeName="rx" values="80;90;80" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Base/logs -->
    <ellipse cx="70" cy="130" rx="50" ry="15" fill="#5D4037"/>
    <rect x="30" y="110" width="15" height="30" fill="#6D4C41" transform="rotate(-15, 37, 125)"/>
    <rect x="95" y="110" width="15" height="30" fill="#6D4C41" transform="rotate(15, 102, 125)"/>
    
    <!-- Fire flames -->
    <path d="M70,120 Q90,80 70,40 Q50,80 70,120" fill="#F44336">
      <animate attributeName="d" values="M70,120 Q90,80 70,40 Q50,80 70,120;M70,120 Q95,85 70,35 Q45,85 70,120;M70,120 Q90,80 70,40 Q50,80 70,120" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M50,120 Q60,90 50,60 Q40,90 50,120" fill="#FF5722">
      <animate attributeName="d" values="M50,120 Q60,90 50,60 Q40,90 50,120;M50,120 Q55,95 50,55 Q45,95 50,120;M50,120 Q60,90 50,60 Q40,90 50,120" dur="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M90,120 Q100,90 90,60 Q80,90 90,120" fill="#FF5722">
      <animate attributeName="d" values="M90,120 Q100,90 90,60 Q80,90 90,120;M90,120 Q105,95 90,55 Q75,95 90,120;M90,120 Q100,90 90,60 Q80,90 90,120" dur="0.45s" repeatCount="indefinite"/>
    </path>
    <path d="M70,110 Q80,85 70,55 Q60,85 70,110" fill="#FFC107">
      <animate attributeName="d" values="M70,110 Q80,85 70,55 Q60,85 70,110;M70,110 Q85,90 70,50 Q55,90 70,110;M70,110 Q80,85 70,55 Q60,85 70,110" dur="0.35s" repeatCount="indefinite"/>
    </path>
    
    <!-- Sparks -->
    <circle cx="40" cy="50" r="3" fill="#FFEB3B">
      <animate attributeName="cy" values="50;30;10" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="45" r="2" fill="#FFEB3B">
      <animate attributeName="cy" values="45;25;5" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="30" r="2" fill="#FFC107">
      <animate attributeName="cy" values="30;10;-10" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Matches with warning -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="80" height="100" fill="#FFEBEE" rx="8" stroke="#F44336" stroke-width="2"/>
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#B71C1C" text-anchor="middle">СПИЧКИ</text>
    
    <!-- Matchbox -->
    <rect x="15" y="35" width="50" height="25" fill="#D32F2F" rx="3"/>
    <rect x="15" y="35" width="25" height="25" fill="#B71C1C" rx="3"/>
    
    <!-- Matches -->
    <rect x="25" y="65" width="4" height="25" fill="#8D6E63"/>
    <circle cx="27" cy="65" r="4" fill="#FF5722"/>
    <rect x="35" y="60" width="4" height="30" fill="#8D6E63"/>
    <circle cx="37" cy="60" r="4" fill="#FF5722"/>
    <rect x="45" y="65" width="4" height="25" fill="#8D6E63"/>
    <circle cx="47" cy="65" r="4" fill="#FF5722"/>
    
    <!-- X mark -->
    <line x1="10" y1="10" x2="70" y2="90" stroke="#F44336" stroke-width="4"/>
    <line x1="70" y1="10" x2="10" y2="90" stroke="#F44336" stroke-width="4"/>
  </g>
  
  <!-- Fire extinguisher -->
  <g transform="translate(390, 130)">
    <rect x="0" y="0" width="80" height="120" fill="#E8F5E9" rx="8" stroke="#4CAF50" stroke-width="2"/>
    <text x="40" y="20" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ОГНЕТУШИТЕЛЬ</text>
    
    <!-- Body -->
    <ellipse cx="40" cy="90" rx="25" ry="15" fill="#F44336"/>
    <rect x="15" y="35" width="50" height="55" fill="#F44336" rx="5"/>
    
    <!-- Handle -->
    <rect x="30" y="25" width="20" height="15" fill="#333" rx="2"/>
    <rect x="55" y="30" width="15" height="8" fill="#333" rx="2"/>
    
    <!-- Hose -->
    <path d="M65,35 Q80,40 75,55" stroke="#333" stroke-width="4" fill="none"/>
    
    <!-- Label -->
    <text x="40" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">🔥</text>
    
    <!-- Checkmark -->
    <circle cx="40" cy="110" r="8" fill="#4CAF50"/>
    <polyline points="35,110 38,114 46,105" stroke="#FFF" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Fire safety rules -->
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="300" height="75" fill="#FFF" rx="10" stroke="#FF5722" stroke-width="2"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">📋 Правила пожарной безопасности:</text>
    <text x="150" y="38" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">• Не играй со спичками и зажигалками</text>
    <text x="150" y="53" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">• Не оставляй включённые электроприборы</text>
    <text x="150" y="68" font-family="Arial, sans-serif" font-size="10" fill="#FFB74D" text-anchor="middle">• При пожаре звони: 101 или 112</text>
  </g>
  
  <!-- Emergency number -->
  <g transform="translate(420, 260)">
    <rect x="0" y="0" width="60" height="50" fill="#F44336" rx="8">
      <animate attributeName="fill" values="#F44336;#EF5350;#F44336" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">101</text>
    <text x="30" y="45" font-family="Arial, sans-serif" font-size="8" fill="#FFCDD2" text-anchor="middle">ПОЖАР</text>
  </g>
  
  <!-- Decorative flames corners -->
  <path d="M0,350 Q10,330 5,310 Q15,330 10,350" fill="#FF5722" opacity="0.5"/>
  <path d="M500,350 Q490,330 495,310 Q485,330 490,350" fill="#FF5722" opacity="0.5"/>
</svg>