<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="summerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA"/>
      <stop offset="100%" style="stop-color:#E1F5FE"/>
    </linearGradient>
    <linearGradient id="autumnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC80"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <linearGradient id="winterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="springGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9"/>
      <stop offset="100%" style="stop-color:#E8F5E9"/>
    </linearGradient>
  </defs>
  
  <!-- Background - divided into 4 seasons -->
  <rect width="200" height="150" fill="url(#summerGrad)"/>
  <rect x="200" width="200" height="150" fill="url(#autumnGrad)"/>
  <rect y="150" width="200" height="150" fill="url(#winterGrad)"/>
  <rect x="200" y="150" width="200" height="150" fill="url(#springGrad)"/>
  
  <!-- SUMMER (top left) -->
  <g transform="translate(100, 75)">
    <!-- Sun -->
    <circle cx="-60" cy="-40" r="25" fill="#FFD600">
      <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Tree with green leaves -->
    <rect x="-5" y="10" width="10" height="30" fill="#795548"/>
    <ellipse cx="0" cy="-5" rx="25" ry="20" fill="#4CAF50"/>
    
    <!-- Flowers -->
    <g transform="translate(-40, 30)">
      <circle cx="0" cy="0" r="5" fill="#E91E63"/>
      <circle cx="5" cy="-3" r="5" fill="#E91E63"/>
      <circle cx="5" cy="3" r="5" fill="#E91E63"/>
      <circle cx="-5" cy="-3" r="5" fill="#E91E63"/>
      <circle cx="-5" cy="3" r="5" fill="#E91E63"/>
      <circle cx="0" cy="0" r="3" fill="#FFC107"/>
    </g>
    
    <!-- Butterfly -->
    <g transform="translate(30, -20)">
      <ellipse cx="-8" cy="0" rx="8" ry="5" fill="#FF80AB">
        <animateTransform attributeName="transform" type="rotate" values="0 -8 0;20 -8 0;0 -8 0" dur="0.3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="8" cy="0" rx="8" ry="5" fill="#FF80AB">
        <animateTransform attributeName="transform" type="rotate" values="0 8 0;-20 8 0;0 8 0" dur="0.3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="0" rx="2" ry="6" fill="#212121"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="60" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="12" font-weight="bold" fill="#2E7D32">ЛЕТО</text>
  </g>
  
  <!-- AUTUMN (top right) -->
  <g transform="translate(300, 75)">
    <!-- Cloud -->
    <ellipse cx="-40" cy="-40" rx="20" ry="12" fill="#B0BEC5"/>
    <ellipse cx="-55" cy="-38" rx="15" ry="10" fill="#B0BEC5"/>
    
    <!-- Tree with yellow/orange leaves -->
    <rect x="-5" y="10" width="10" height="30" fill="#795548"/>
    <ellipse cx="0" cy="-5" rx="25" ry="20" fill="#FF9800"/>
    <ellipse cx="-15" cy="-10" rx="12" ry="10" fill="#FFC107"/>
    <ellipse cx="12" cy="0" rx="10" ry="8" fill="#FF5722"/>
    
    <!-- Falling leaves -->
    <ellipse cx="-30" cy="10" rx="4" ry="2" fill="#FF9800">
      <animate attributeName="cy" values="10;40;10" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="-30;-20;-30" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="30" cy="-10" rx="3" ry="2" fill="#FFC107">
      <animate attributeName="cy" values="-10;30;-10" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="30;20;30" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Mushrooms -->
    <g transform="translate(-50, 35)">
      <ellipse cx="0" cy="0" rx="10" ry="5" fill="#F44336"/>
      <rect x="-3" y="0" width="6" height="8" fill="#FFCC80"/>
      <circle cx="-3" cy="-2" r="2" fill="white"/>
      <circle cx="4" cy="-1" r="1.5" fill="white"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="60" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="12" font-weight="bold" fill="#E65100">ОСЕНЬ</text>
  </g>
  
  <!-- WINTER (bottom left) -->
  <g transform="translate(100, 225)">
    <!-- Snowflakes -->
    <g fill="white">
      <text x="-60" y="-50" font-size="15">❄</text>
      <text x="40" y="-30" font-size="12">❄</text>
      <text x="-20" y="-60" font-size="10">❄</text>
      <text x="60" y="-45" font-size="14">❄</text>
    </g>
    
    <!-- Falling snow -->
    <circle cx="-50" cy="-20" r="3" fill="white">
      <animate attributeName="cy" values="-20;50;-20" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="-40" r="2" fill="white">
      <animate attributeName="cy" values="-40;30;-40" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Snowman -->
    <g transform="translate(40, 10)">
      <circle cx="0" cy="20" r="18" fill="white"/>
      <circle cx="0" cy="-5" r="13" fill="white"/>
      <circle cx="0" cy="-25" r="10" fill="white"/>
      <!-- Hat -->
      <rect x="-8" y="-45" width="16" height="15" fill="#212121"/>
      <rect x="-12" y="-32" width="24" height="4" fill="#212121"/>
      <!-- Face -->
      <circle cx="-4" cy="-28" r="2" fill="#212121"/>
      <circle cx="4" cy="-28" r="2" fill="#212121"/>
      <polygon points="6,-25 15,-22 6,-20" fill="#FF6F00"/>
      <circle cx="-3" cy="-22" r="1" fill="#212121"/>
      <circle cx="0" cy="-20" r="1" fill="#212121"/>
      <circle cx="3" cy="-18" r="1" fill="#212121"/>
    </g>
    
    <!-- Tree with snow -->
    <rect x="-55" y="10" width="10" height="30" fill="#795548"/>
    <ellipse cx="-50" cy="-5" rx="20" ry="18" fill="#4CAF50"/>
    <ellipse cx="-50" cy="-20" rx="15" ry="8" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="60" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="12" font-weight="bold" fill="#1565C0">ЗИМА</text>
  </g>
  
  <!-- SPRING (bottom right) -->
  <g transform="translate(300, 225)">
    <!-- Sun with rain -->
    <circle cx="-60" cy="-50" r="20" fill="#FFD600"/>
    
    <!-- Rain drops -->
    <line x1="-30" y1="-40" x2="-32" y2="-25" stroke="#64B5F6" stroke-width="2">
      <animate attributeName="y2" values="-25;10;-25" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="-10" y1="-50" x2="-12" y2="-35" stroke="#64B5F6" stroke-width="2">
      <animate attributeName="y2" values="-35;5;-35" dur="1.2s" repeatCount="indefinite"/>
    </line>
    
    <!-- Tree with buds -->
    <rect x="-5" y="10" width="10" height="30" fill="#795548"/>
    <ellipse cx="0" cy="-5" rx="25" ry="20" fill="#81C784"/>
    
    <!-- Flowers blooming -->
    <g transform="translate(-40, 30)">
      <circle cx="0" cy="0" r="4" fill="#E91E63"/>
      <circle cx="4" cy="-2" r="4" fill="#E91E63"/>
      <circle cx="4" cy="2" r="4" fill="#E91E63"/>
      <circle cx="-4" cy="-2" r="4" fill="#E91E63"/>
      <circle cx="-4" cy="2" r="4" fill="#E91E63"/>
      <circle cx="0" cy="0" r="2" fill="#FFC107"/>
    </g>
    
    <!-- Bird -->
    <g transform="translate(40, -30)">
      <ellipse cx="0" cy="0" rx="10" ry="6" fill="#78909C"/>
      <circle cx="8" cy="-2" r="5" fill="#90A4AE"/>
      <polygon points="13,-2 18,-1 13,0" fill="#FF9800"/>
      <circle cx="10" cy="-3" r="1.5" fill="#212121"/>
      <path d="M-8,-3 Q-15,-10 -8,-8" fill="#607D8B"/>
      <animateTransform attributeName="transform" type="translate" values="40,-30;42,-28;40,-30" dur="1s" repeatCount="indefinite"/>
    </g>
    
    <!-- Grass growing -->
    <path d="M-60,40 Q-55,30 -50,40" stroke="#4CAF50" stroke-width="2" fill="none">
      <animate attributeName="d" values="M-60,40 Q-55,30 -50,40;M-60,40 Q-55,25 -50,40;M-60,40 Q-55,30 -50,40" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M-45,40 Q-40,32 -35,40" stroke="#66BB6A" stroke-width="2" fill="none"/>
    
    <!-- Label -->
    <text x="0" y="60" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="12" font-weight="bold" fill="#2E7D32">ВЕСНА</text>
  </g>
  
  <!-- Center element - memory book -->
  <g transform="translate(200, 150)">
    <rect x="-30" y="-20" width="60" height="40" fill="#795548" rx="3"/>
    <rect x="-25" y="-15" width="50" height="30" fill="#FFF8E1"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#5D4037">ДЕТСТВО</text>
  </g>
  
  <!-- Author name -->
  <text x="200" y="15" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="14" font-weight="bold" fill="#5D4037">
    И.А. Бунин «Детство»
  </text>
</svg>