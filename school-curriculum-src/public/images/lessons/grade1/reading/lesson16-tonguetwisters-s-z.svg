<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1"/>
      <stop offset="100%" style="stop-color:#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00796b" text-anchor="middle">Скороговорки для С и З</text>
  
  <!-- Snake (Звук З) -->
  <ellipse cx="80" cy="100" rx="50" ry="25" fill="#81c784"/>
  <circle cx="115" cy="95" r="12" fill="#66bb6a"/>
  <circle cx="118" cy="92" r="3" fill="#1b5e20"/>
  <path d="M50 110 Q80 130 110 110" stroke="#4caf50" stroke-width="3" fill="none"/>
  <text x="80" y="150" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">[З] — Змея</text>
  <text x="80" y="168" font-family="Arial" font-size="11" fill="#388e3c" text-anchor="middle">ЗЗЗ-ЗЗЗ-ЗЗЗ</text>
  
  <!-- Whistle (Звук С) -->
  <ellipse cx="320" cy="100" rx="50" ry="25" fill="#80deea"/>
  <rect x="350" y="90" width="20" height="20" fill="#4dd0e1"/>
  <circle cx="345" cy="100" r="5" fill="#00bcd4"/>
  <text x="320" y="150" font-family="Arial" font-size="14" font-weight="bold" fill="#00838f" text-anchor="middle">[С] — Свист</text>
  <text x="320" y="168" font-family="Arial" font-size="11" fill="#0097a7" text-anchor="middle">ССС-ССС-ССС</text>
  
  <!-- Tongue twisters -->
  <rect x="30" y="190" width="340" height="90" fill="white" stroke="#4db6ac" stroke-width="2" rx="10"/>
  
  <text x="50" y="215" font-family="Arial" font-size="12" fill="#00796b">🐍 "Зоя — зайкина знакомая"</text>
  <text x="50" y="235" font-family="Arial" font-size="12" fill="#00796b">🐹 "У Сани и Сони — сомы"</text>
  <text x="50" y="255" font-family="Arial" font-size="12" fill="#00796b">🧦 "Саша сушит сушки"</text>
  <text x="50" y="275" font-family="Arial" font-size="10" fill="#4db6ac">Произноси медленно, потом быстрее!</text>
  
  <!-- Sound waves -->
  <path d="M160 80 Q170 60 180 80" stroke="#4caf50" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M240 80 Q250 60 260 80" stroke="#00bcd4" stroke-width="2" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </path>
</svg>