<text x="250" y="295" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Микроэлементы: I, Zn, Cu, F, Mn, Co — катализаторы, гормоны</text>
<text x="250" y="306" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Вода: 70-80% массы клетки | Универсальный растворитель, среда реакций</text>

