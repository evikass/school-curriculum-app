<line x1="30" y1="52" x2="470" y2="52" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<g transform="translate(250,175)">
<!-- Pie chart representation -->
<circle cx="0" cy="0" r="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
