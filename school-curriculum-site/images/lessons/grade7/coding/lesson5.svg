  <text x="107" y="150" font-family="monospace" font-size="8" fill="#C62828">():</text>
  <text x="55" y="163" font-family="monospace" font-size="8" fill="#82AAFF">name</text>
  <text x="82" y="163" font-family="monospace" font-size="8" fill="#89DDFF"> = </text>
