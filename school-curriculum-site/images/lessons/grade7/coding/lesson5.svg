  <rect x="375" y="128" width="85" height="22" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="417" y="143" font-family="monospace" font-size="8" fill="#E65100" text-anchor="middle">float</text>
  <rect x="280" y="158" width="85" height="22" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="322" y="173" font-family="monospace" font-size="8" fill="#2E7D32" text-anchor="middle">str</text>
  <rect x="375" y="158" width="85" height="22" rx="3" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="417" y="173" font-family="monospace" font-size="8" fill="#7B1FA2" text-anchor="middle">bool</text>
  <rect x="280" y="188" width="85" height="22" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="322" y="203" font-family="monospace" font-size="8" fill="#C62828" text-anchor="middle">list</text>
  <rect x="375" y="188" width="85" height="22" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="417" y="203" font-family="monospace" font-size="8" fill="#00897B" text-anchor="middle">dict</text>
  <!-- Loop visualization -->
  <text x="367" y="235" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Цикл for:</text>
  <text x="367" y="250" font-family="monospace" font-size="8" fill="#7B1FA2" text-anchor="middle">for i in range(5):</text>
  <text x="367" y="265" font-family="monospace" font-size="8" fill="#2E7D32" text-anchor="middle">  print(i)</text>
  <text x="367" y="282" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">0, 1, 2, 3, 4</text>
