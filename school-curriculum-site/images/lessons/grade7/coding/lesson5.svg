  <text x="55" y="176" font-family="monospace" font-size="8" fill="#82AAFF">print</text>
  <text x="82" y="176" font-family="monospace" font-size="8" fill="#C62828">(name)</text>
  <text x="50" y="195" font-family="monospace" font-size="8" fill="#82AAFF">x</text>
  <text x="60" y="195" font-family="monospace" font-size="8" fill="#89DDFF"> = </text>
  <text x="76" y="195" font-family="monospace" font-size="8" fill="#F78C6C">5 + 3</text>
  <text x="50" y="208" font-family="monospace" font-size="8" fill="#C792EA">if</text>
  <text x="62" y="208" font-family="monospace" font-size="8" fill="#82AAFF"> x </text>
  <text x="74" y="208" font-family="monospace" font-size="8" fill="#89DDFF">&gt; </text>
