<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#C62828" text-anchor="middle">Механическое движение и его характеристики</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Speedometer -->
  <rect x="25" y="90" width="145" height="120" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="97" y="106" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="bold" text-anchor="middle">Скорость</text>
  <!-- Speed gauge -->
  <path d="M47,170 A40,40 0 0,1 147,170" fill="none" stroke="#E0E0E0" stroke-width="3"/>
  <line x1="97" y1="170" x2="80" y2="140" stroke="#C62828" stroke-width="2"/>
  <circle cx="97" cy="170" r="4" fill="#C62828"/>
  <text x="97" y="200" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">v = S / t</text>

  <!-- Distance / time -->
  <rect x="180" y="90" width="145" height="120" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="252" y="106" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" font-weight="bold" text-anchor="middle">Путь и время</text>
  <!-- Car on road -->
  <rect x="205" y="145" width="40" height="18" rx="5" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
  <circle cx="213" cy="165" r="4" fill="#333"/><circle cx="237" cy="165" r="4" fill="#333"/>
  <line x1="195" y1="168" x2="260" y2="168" stroke="#888" stroke-width="1.5"/>
  <line x1="198" y1="168" x2="198" y2="178" stroke="#888" stroke-width="1"/>
  <line x1="220" y1="168" x2="220" y2="175" stroke="#888" stroke-width="1"/>
  <line x1="242" y1="168" x2="242" y2="178" stroke="#888" stroke-width="1"/>
  <text x="227" y="192" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">S = v x t</text>

  <!-- Trajectory types -->
  <rect x="335" y="90" width="140" height="120" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="405" y="106" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold" text-anchor="middle">Траектория</text>
  <line x1="360" y1="160" x2="450" y2="160" stroke="#2E7D32" stroke-width="2"/>
  <text x="405" y="175" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">прямолинейн.</text>
  <path d="M360,190 Q385,130 405,190 Q425,130 450,190" stroke="#C62828" stroke-width="2" fill="none"/>
  <text x="405" y="205" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">криволинейн.</text>

  <!-- Formulas panel -->
  <rect x="25" y="220" width="450" height="70" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="130" y="245" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">v = S / t</text>
  <text x="250" y="245" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">S = v x t</text>
  <text x="370" y="245" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">t = S / v</text>
  <text x="130" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">скорость</text>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">путь</text>
  <text x="370" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">время</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>