<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Мощность</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Work -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">Механическая работа</text>
  <!-- Box being pushed -->
  <rect x="70" y="160" width="50" height="35" rx="3" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <text x="95" y="182" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">m</text>
  <line x1="50" y1="195" x2="170" y2="195" stroke="#888" stroke-width="1.5"/>
  <!-- Force arrow -->
  <line x1="130" y1="177" x2="170" y2="177" stroke="#C62828" stroke-width="2"/>
  <polygon points="168,174 175,177 168,180" fill="#C62828"/>
  <text x="155" y="172" font-family="Arial,sans-serif" font-size="8" fill="#C62828">F</text>
  <!-- Distance -->
  <line x1="40" y1="205" x2="160" y2="205" stroke="#1565C0" stroke-width="1"/>
  <line x1="40" y1="202" x2="40" y2="208" stroke="#1565C0" stroke-width="1"/>
  <line x1="160" y1="202" x2="160" y2="208" stroke="#1565C0" stroke-width="1"/>
  <text x="100" y="218" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">S</text>
  <text x="135" y="250" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">A = F x S</text>
  <text x="135" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Дж (джоуль)</text>

  <!-- Power -->
  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Мощность</text>
  <!-- Light bulb -->
  <circle cx="367" cy="160" r="20" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <path d="M357,178 L357,188 L377,188 L377,178" fill="none" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="357" y1="185" x2="377" y2="185" stroke="#F9A825" stroke-width="1"/>
  <line x1="357" y1="182" x2="377" y2="182" stroke="#F9A825" stroke-width="1"/>
  <!-- Energy rays -->
  <line x1="367" y1="135" x2="367" y2="130" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="385" y1="140" x2="390" y2="135" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="349" y1="140" x2="344" y2="135" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="215" font-family="Arial,sans-serif" font-size="12" fill="#F9A825" text-anchor="middle" font-weight="bold">N = A / t</text>
  <text x="367" y="235" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Вт (ватт)</text>
  <!-- Examples -->
  <text x="367" y="260" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Лампа: 60 Вт</text>
  <text x="367" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Двигатель: 100 кВт</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>