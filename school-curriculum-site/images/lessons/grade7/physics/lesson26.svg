  <rect x="75" y="150" width="60" height="35" rx="3" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <text x="105" y="172" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">F</text>
  <line x1="55" y1="185" x2="160" y2="185" stroke="#888" stroke-width="2"/>
