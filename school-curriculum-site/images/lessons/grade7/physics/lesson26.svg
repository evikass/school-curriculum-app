  <text x="390" y="220" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Вт</text>
  <line x1="280" y1="230" x2="455" y2="230" stroke="#E0E0E0" stroke-width="1"/>
  <text x="310" y="245" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Скорость</text>
  <text x="390" y="245" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">м/с</text>
