  <text x="390" y="170" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Па</text>
  <line x1="280" y1="180" x2="455" y2="180" stroke="#E0E0E0" stroke-width="1"/>
  <text x="310" y="195" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Работа</text>
  <text x="390" y="195" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Дж</text>
