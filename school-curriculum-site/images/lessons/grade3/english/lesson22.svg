<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad22" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad22)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">❓ Questions</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#FF9800" opacity="0.6"/>
  
  <!-- Question Words -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="65" width="460" height="50" fill="white" rx="10" opacity="0.8"/>
    <text x="250" y="85" font-size="14" fill="#E65100" text-anchor="middle" font-weight="bold">Question Words (Вопросительные слова)</text>
    
    <g font-size="10">
      <rect x="30" y="95" width="60" height="18" fill="#FF9800" rx="5"/>
      <text x="60" y="107" fill="white" text-anchor="middle">What?</text>
      
      <rect x="100" y="95" width="60" height="18" fill="#F44336" rx="5"/>
      <text x="130" y="107" fill="white" text-anchor="middle">Who?</text>
      
      <rect x="170" y="95" width="60" height="18" fill="#9C27B0" rx="5"/>
      <text x="200" y="107" fill="white" text-anchor="middle">Where?</text>
      
      <rect x="240" y="95" width="60" height="18" fill="#2196F3" rx="5"/>
      <text x="270" y="107" fill="white" text-anchor="middle">When?</text>
      
      <rect x="310" y="95" width="60" height="18" fill="#4CAF50" rx="5"/>
      <text x="340" y="107" fill="white" text-anchor="middle">Why?</text>
      
      <rect x="380" y="95" width="90" height="18" fill="#FF5722" rx="5"/>
      <text x="425" y="107" fill="white" text-anchor="middle">How many?</text>
    </g>
  </g>
  
  <!-- Question types -->
  <g font-family="Arial, sans-serif">
    <!-- What -->
    <rect x="20" y="125" width="145" height="80" fill="#FFECB3" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="92" y="145" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">What is this?</text>
    <text x="92" y="160" font-size="9" fill="#FF9800" text-anchor="middle">Что это?</text>
    <text x="92" y="180" font-size="10" fill="#BF360C" text-anchor="middle">It's a book.</text>
    <text x="92" y="195" font-size="8" fill="#FFB74D" text-anchor="middle">Это книга.</text>
    
    <!-- Who -->
    <rect x="175" y="125" width="145" height="80" fill="#FFCDD2" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="247" y="145" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">Who is he?</text>
    <text x="247" y="160" font-size="9" fill="#E57373" text-anchor="middle">Кто он?</text>
    <text x="247" y="180" font-size="10" fill="#B71C1C" text-anchor="middle">He's my friend.</text>
    <text x="247" y="195" font-size="8" fill="#EF9A9A" text-anchor="middle">Он мой друг.</text>
    
    <!-- Where -->
    <rect x="330" y="125" width="150" height="80" fill="#E1BEE7" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="405" y="145" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Where is the cat?</text>
    <text x="405" y="160" font-size="9" fill="#AB47BC" text-anchor="middle">Где кот?</text>
    <text x="405" y="180" font-size="10" fill="#6A1B9A" text-anchor="middle">It's under the table.</text>
    <text x="405" y="195" font-size="8" fill="#CE93D8" text-anchor="middle">Он под столом.</text>
  </g>
  
  <!-- Yes/No questions -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="215" width="220" height="70" fill="#C8E6C9" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="235" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Is it a dog?</text>
    <text x="130" y="250" font-size="9" fill="#66BB6A" text-anchor="middle">Это собака?</text>
    <text x="80" y="270" font-size="10" fill="#1B5E20" text-anchor="middle">Yes, it is.</text>
    <text x="160" y="270" font-size="10" fill="#B71C1C" text-anchor="middle">No, it isn't.</text>
    
    <rect x="260" y="215" width="220" height="70" fill="#B3E5FC" rx="8">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.7s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="235" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Do you like apples?</text>
    <text x="370" y="250" font-size="9" fill="#42A5F5" text-anchor="middle">Тебе нравятся яблоки?</text>
    <text x="310" y="270" font-size="10" fill="#0D47A1" text-anchor="middle">Yes, I do.</text>
    <text x="400" y="270" font-size="10" fill="#B71C1C" text-anchor="middle">No, I don't.</text>
  </g>
  
  <!-- Question mark decoration -->
  <g transform="translate(250, 310)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="30" fill="#FF9800" text-anchor="middle" font-weight="bold">?</text>
    <animateTransform attributeName="transform" type="translate" values="250,310;250,300;250,310" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Tip -->
  <rect x="100" y="300" width="300" height="40" fill="#FFF8E1" rx="8"/>
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="10" fill="#F57F17" text-anchor="middle" font-weight="bold">💡 Tip: Вопрос начинается с вопросительного слова!</text>
  <text x="250" y="335" font-family="Arial, sans-serif" font-size="8" fill="#FFB74D" text-anchor="middle">Question starts with a question word!</text>
  
  <!-- Lesson number -->
  <circle cx="470" cy="320" r="20" fill="#FF9800" opacity="0.9"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">22</text>
</svg>