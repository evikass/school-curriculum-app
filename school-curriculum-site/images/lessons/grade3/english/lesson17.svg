<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad17" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad17)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#303F9F" text-anchor="middle">🔷 Shapes</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#3F51B5" opacity="0.6"/>
  
  <!-- Shapes -->
  <g font-family="Arial, sans-serif">
    <!-- Circle -->
    <rect x="20" y="65" width="140" height="120" fill="#FFECB3" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <circle cx="90" cy="115" r="35" fill="#FF9800">
      <animate attributeName="r" values="35;38;35" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="165" font-size="14" fill="#E65100" text-anchor="middle" font-weight="bold">circle</text>
    <text x="90" y="180" font-size="9" fill="#FFB74D" text-anchor="middle">круг</text>
    
    <!-- Square -->
    <rect x="170" y="65" width="140" height="120" fill="#C8E6C9" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="205" y="85" width="60" height="60" fill="#4CAF50">
      <animate attributeName="width" values="60;65;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="height" values="60;65;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="205;202;205" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="85;82;85" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="240" y="165" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">square</text>
    <text x="240" y="180" font-size="9" fill="#66BB6A" text-anchor="middle">квадрат</text>
    
    <!-- Triangle -->
    <rect x="320" y="65" width="160" height="120" fill="#FFCDD2" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <polygon points="400,85 435,145 365,145" fill="#E53935">
      <animate attributeName="points" values="400,85 435,145 365,145;400,82 440,150 360,150;400,85 435,145 365,145" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <text x="400" y="165" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">triangle</text>
    <text x="400" y="180" font-size="9" fill="#EF5350" text-anchor="middle">треугольник</text>
    
    <!-- Rectangle -->
    <rect x="20" y="195" width="140" height="120" fill="#B3E5FC" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="45" y="230" width="80" height="45" fill="#2196F3">
      <animate attributeName="width" values="80;85;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="45;42;45" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="90" y="295" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">rectangle</text>
    <text x="90" y="310" font-size="9" fill="#42A5F5" text-anchor="middle">прямоугольник</text>
    
    <!-- Oval -->
    <rect x="170" y="195" width="140" height="120" fill="#F3E5F5" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.7s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="240" cy="250" rx="50" ry="30" fill="#9C27B0">
      <animate attributeName="rx" values="50;55;50" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <text x="240" y="295" font-size="14" fill="#6A1B9A" text-anchor="middle" font-weight="bold">oval</text>
    <text x="240" y="310" font-size="9" fill="#AB47BC" text-anchor="middle">овал</text>
    
    <!-- Star -->
    <rect x="320" y="195" width="160" height="120" fill="#FFF8E1" rx="10">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.2s" repeatCount="indefinite"/>
    </rect>
    <polygon points="400,210 410,240 442,240 416,258 426,288 400,270 374,288 384,258 358,240 390,240" fill="#FFC107">
      <animateTransform attributeName="transform" type="rotate" values="0 400 250;10 400 250;0 400 250" dur="4s" repeatCount="indefinite"/>
    </polygon>
    <text x="400" y="295" font-size="14" fill="#F57F17" text-anchor="middle" font-weight="bold">star</text>
    <text x="400" y="310" font-size="9" fill="#FFD54F" text-anchor="middle">звезда</text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="470" cy="320" r="20" fill="#3F51B5" opacity="0.9"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">17</text>
</svg>