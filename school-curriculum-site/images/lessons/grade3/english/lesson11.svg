<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad11)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">🍂 Seasons</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Seasons -->
  <g font-family="Arial, sans-serif">
    <!-- Spring -->
    <rect x="20" y="65" width="220" height="120" fill="#FCE4EC" rx="15">
      <animate attributeName="opacity" values="1;0.9;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="85" font-size="16" fill="#C2185B" text-anchor="middle" font-weight="bold">🌸 Spring</text>
    <text x="130" y="100" font-size="10" fill="#AD1457" text-anchor="middle">Весна</text>
    <!-- Flowers -->
    <g transform="translate(60, 130)">
      <circle cx="0" cy="0" r="8" fill="#E91E63"/>
      <circle cx="0" cy="-12" r="6" fill="#F48FB1"/>
      <circle cx="10" cy="-6" r="6" fill="#F48FB1"/>
      <circle cx="10" cy="6" r="6" fill="#F48FB1"/>
      <circle cx="0" cy="12" r="6" fill="#F48FB1"/>
      <circle cx="-10" cy="6" r="6" fill="#F48FB1"/>
      <circle cx="-10" cy="-6" r="6" fill="#F48FB1"/>
    </g>
    <g transform="translate(150, 140)">
      <circle cx="0" cy="0" r="8" fill="#FFEB3B"/>
      <circle cx="0" cy="-12" r="6" fill="#FFF59D"/>
      <circle cx="10" cy="-6" r="6" fill="#FFF59D"/>
      <circle cx="10" cy="6" r="6" fill="#FFF59D"/>
      <circle cx="0" cy="12" r="6" fill="#FFF59D"/>
      <circle cx="-10" cy="6" r="6" fill="#FFF59D"/>
      <circle cx="-10" cy="-6" r="6" fill="#FFF59D"/>
    </g>
    <line x1="60" y1="175" x2="60" y2="155" stroke="#4CAF50" stroke-width="3"/>
    <line x1="150" y1="175" x2="150" y2="155" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- Summer -->
    <rect x="260" y="65" width="220" height="120" fill="#FFF8E1" rx="15">
      <animate attributeName="opacity" values="1;0.9;1" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="85" font-size="16" fill="#F57F17" text-anchor="middle" font-weight="bold">☀️ Summer</text>
    <text x="370" y="100" font-size="10" fill="#E65100" text-anchor="middle">Лето</text>
    <!-- Sun -->
    <circle cx="320" cy="145" r="25" fill="#FFD54F">
      <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#FFD54F" stroke-width="3">
      <line x1="320" y1="115" x2="320" y2="105"/>
      <line x1="320" y1="175" x2="320" y2="185"/>
      <line x1="290" y1="145" x2="280" y2="145"/>
      <line x1="350" y1="145" x2="360" y2="145"/>
    </g>
    <!-- Beach ball -->
    <circle cx="400" cy="150" r="18" fill="#F44336"/>
    <path d="M382 150 A18 18 0 0 1 400 132" fill="#2196F3"/>
    <path d="M418 150 A18 18 0 0 1 400 168" fill="#FFEB3B"/>
    
    <!-- Autumn -->
    <rect x="20" y="195" width="220" height="120" fill="#FFF3E0" rx="15">
      <animate attributeName="opacity" values="1;0.9;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="215" font-size="16" fill="#E65100" text-anchor="middle" font-weight="bold">🍂 Autumn</text>
    <text x="130" y="230" font-size="10" fill="#BF360C" text-anchor="middle">Осень</text>
    <!-- Leaves -->
    <ellipse cx="60" cy="275" rx="15" ry="10" fill="#FF9800" transform="rotate(-30, 60, 275)">
      <animate attributeName="cy" values="275;280;275" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="280" rx="12" ry="8" fill="#F44336" transform="rotate(20, 100, 280)">
      <animate attributeName="cy" values="280;275;280" dur="2.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="150" cy="270" rx="14" ry="9" fill="#FFEB3B" transform="rotate(-15, 150, 270)">
      <animate attributeName="cy" values="270;275;270" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="190" cy="285" rx="11" ry="7" fill="#795548" transform="rotate(35, 190, 285)">
      <animate attributeName="cy" values="285;280;285" dur="2.1s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Winter -->
    <rect x="260" y="195" width="220" height="120" fill="#E3F2FD" rx="15">
      <animate attributeName="opacity" values="1;0.9;1" dur="6.5s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="215" font-size="16" fill="#1565C0" text-anchor="middle" font-weight="bold">❄️ Winter</text>
    <text x="370" y="230" font-size="10" fill="#0D47A1" text-anchor="middle">Зима</text>
    <!-- Snowflakes -->
    <g fill="#90CAF9">
      <circle cx="300" cy="270" r="5">
        <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="280" r="4">
        <animate attributeName="r" values="4;5;4" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="265" r="6">
        <animate attributeName="r" values="6;7;6" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="420" cy="275" r="4">
        <animate attributeName="r" values="4;5;4" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Snowman -->
    <circle cx="330" cy="290" r="15" fill="white" stroke="#B0BEC5" stroke-width="1"/>
    <circle cx="330" cy="272" r="10" fill="white" stroke="#B0BEC5" stroke-width="1"/>
    <circle cx="327" cy="270" r="1.5" fill="#333"/>
    <circle cx="333" cy="270" r="1.5" fill="#333"/>
    <polygon points="335,272 345,274 335,276" fill="#FF9800"/>
  </g>
  
  <!-- Lesson number -->
  <circle cx="470" cy="320" r="20" fill="#4CAF50" opacity="0.9"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">11</text>
</svg>