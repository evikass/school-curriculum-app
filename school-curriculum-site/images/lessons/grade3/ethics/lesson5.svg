<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg5)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="25" fill="#FFD54F">
    <animate attributeName="r" values="23;27;23" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">📋 Ответственность</text>
  <rect x="120" y="42" width="260" height="2" rx="1" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="330" rx="270" ry="35" fill="#A5D6A7" opacity="0.4"/>
  
  <!-- Task checklist -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="150" height="150" fill="#FFF" rx="10" stroke="#4CAF50"/>
    <text x="75" y="25" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">Мои обязанности</text>
    
    <!-- Checklist items -->
    <g transform="translate(15, 40)">
      <rect x="0" y="0" width="15" height="15" fill="url(#taskGrad)" rx="3"/>
      <polyline points="3,7 6,10 12,4" stroke="#FFF" stroke-width="2" fill="none"/>
      <text x="22" y="12" font-size="10" fill="#388E3C">Убрать комнату</text>
    </g>
    <g transform="translate(15, 65)">
      <rect x="0" y="0" width="15" height="15" fill="url(#taskGrad)" rx="3"/>
      <polyline points="3,7 6,10 12,4" stroke="#FFF" stroke-width="2" fill="none"/>
      <text x="22" y="12" font-size="10" fill="#388E3C">Сделать уроки</text>
    </g>
    <g transform="translate(15, 90)">
      <rect x="0" y="0" width="15" height="15" fill="#FFF" stroke="#4CAF50" rx="3"/>
      <text x="22" y="12" font-size="10" fill="#388E3C">Покормить кота</text>
      <animate attributeName="fill" values="#FFF;#C8E6C9;#FFF" dur="3s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(15, 115)">
      <rect x="0" y="0" width="15" height="15" fill="#FFF" stroke="#4CAF50" rx="3"/>
      <text x="22" y="12" font-size="10" fill="#388E3C">Полить цветы</text>
    </g>
  </g>
  
  <!-- Responsible person with tasks -->
  <g transform="translate(200, 90)">
    <!-- Person -->
    <circle cx="60" cy="30" r="25" fill="#FFCC80"/>
    <ellipse cx="60" cy="22" rx="20" ry="12" fill="#5D4037"/>
    <!-- Body -->
    <rect x="35" y="55" width="50" height="60" rx="10" fill="#42A5F5"/>
    <!-- Legs -->
    <rect x="38" y="115" width="18" height="30" rx="5" fill="#1976D2"/>
    <rect x="64" y="115" width="18" height="30" rx="5" fill="#1976D2"/>
    <!-- Smile -->
    <path d="M48,35 Q60,45 72,35" stroke="#E65100" stroke-width="2" fill="none"/>
    <!-- Eyes -->
    <circle cx="50" cy="28" r="3" fill="#5D4037"/>
    <circle cx="70" cy="28" r="3" fill="#5D4037"/>
    <!-- Stars around -->
    <text x="10" y="20" font-size="16">⭐</text>
    <text x="100" y="30" font-size="14">✨</text>
    <text x="5" y="80" font-size="12">🌟</text>
    <text x="105" y="90" font-size="16">⭐</text>
  </g>
  
  <!-- Clock showing time management -->
  <g transform="translate(370, 70)">
    <circle cx="50" cy="50" r="45" fill="#FFF" stroke="#FF9800" stroke-width="3">
      <animate attributeName="stroke" values="#FF9800;#F57C00;#FF9800" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="3" fill="#E65100"/>
    <!-- Hour marks -->
    <g stroke="#E65100" stroke-width="2">
      <line x1="50" y1="10" x2="50" y2="15"/>
      <line x1="50" y1="85" x2="50" y2="90"/>
      <line x1="10" y1="50" x2="15" y2="50"/>
      <line x1="85" y1="50" x2="90" y2="50"/>
    </g>
    <!-- Clock hands -->
    <line x1="50" y1="50" x2="50" y2="20" stroke="#E65100" stroke-width="3" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite"/>
    </line>
    <line x1="50" y1="50" x2="75" y2="50" stroke="#F57C00" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite"/>
    </line>
    <text x="50" y="120" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Время</text>
  </g>
  
  <!-- Responsibility traits -->
  <g transform="translate(200, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="280" height="55" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="140" y="18" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Ответственный человек:</text>
    <text x="140" y="35" font-size="10" fill="#388E3C" text-anchor="middle">• Выполняет обещания • Доводит дела до конца</text>
    <text x="140" y="50" font-size="10" fill="#43A047" text-anchor="middle">• Не перекладывает вину на других</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="440" height="45" fill="#FFF" rx="8" stroke="#4CAF50"/>
    <text x="220" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">💡 Ответственность — это умение отвечать за свои поступки</text>
    <text x="220" y="35" font-family="Arial, sans-serif" font-size="10" fill="#388E3C" text-anchor="middle">Будь надёжным, и на тебя всегда можно будет положиться!</text>
  </g>
</svg>