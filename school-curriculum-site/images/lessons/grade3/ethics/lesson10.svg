<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="giftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg10)"/>
  
  <!-- Confetti -->
  <g fill="#FF9800" opacity="0.6">
    <rect x="50" y="80" width="8" height="8" transform="rotate(45 54 84)">
      <animate attributeName="y" values="80;90;80" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="450" y="100" width="6" height="6" transform="rotate(30 453 103)">
      <animate attributeName="y" values="100;110;100" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g fill="#2196F3" opacity="0.6">
    <rect x="100" y="60" width="7" height="7" transform="rotate(60 103.5 63.5)">
      <animate attributeName="y" values="60;70;60" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Sun -->
  <circle cx="50" cy="50" r="25" fill="#FFD54F">
    <animate attributeName="r" values="23;27;23" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7B1FA2" text-anchor="middle">🎁 Подарки</text>
  <rect x="165" y="42" width="170" height="2" rx="1" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="330" rx="270" ry="35" fill="#CE93D8" opacity="0.3"/>
  
  <!-- Big gift box -->
  <g transform="translate(50, 80)">
    <!-- Box -->
    <rect x="0" y="40" width="100" height="80" fill="url(#giftGrad)" rx="5"/>
    <!-- Ribbon vertical -->
    <rect x="45" y="40" width="10" height="80" fill="url(#ribbonGrad)"/>
    <!-- Ribbon horizontal -->
    <rect x="0" y="70" width="100" height="10" fill="url(#ribbonGrad)"/>
    <!-- Lid -->
    <rect x="-5" y="30" width="110" height="15" fill="#C2185B" rx="3"/>
    <!-- Bow -->
    <g transform="translate(35, 5)">
      <ellipse cx="15" cy="25" rx="12" ry="8" fill="#FFD54F"/>
      <ellipse cx="35" cy="25" rx="12" ry="8" fill="#FFD54F"/>
      <circle cx="25" cy="25" r="8" fill="#FFA000"/>
      <animate attributeName="transform" type="translate" values="35,5;35,2;35,5" dur="2s" repeatCount="indefinite"/>
    </g>
    <!-- Sparkles -->
    <text x="20" y="20" font-size="14">✨</text>
    <text x="80" y="15" font-size="10">⭐</text>
  </g>
  
  <!-- Small gift box -->
  <g transform="translate(170, 130)">
    <rect x="0" y="25" width="60" height="50" fill="#2196F3" rx="3"/>
    <rect x="25" y="25" width="8" height="50" fill="#FFD54F"/>
    <rect x="0" y="45" width="60" height="8" fill="#FFD54F"/>
    <rect x="-3" y="20" width="66" height="10" fill="#1976D2" rx="2"/>
    <circle cx="30" cy="15" r="6" fill="#FFD54F"/>
    <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Gift rules -->
  <g transform="translate(260, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="220" height="150" fill="#FFF" rx="10" stroke="#9C27B0"/>
    <text x="110" y="22" font-size="12" font-weight="bold" fill="#7B1FA2" text-anchor="middle">🎀 Этикет подарков</text>
    <text x="15" y="45" font-size="10" fill="#8E24AA">💝 Выбирай с душой</text>
    <text x="15" y="65" font-size="10" fill="#8E24AA">🎁 Упакуй красиво</text>
    <text x="15" y="85" font-size="10" fill="#8E24AA">📝 Подпиши открытку</text>
    <text x="15" y="105" font-size="10" fill="#8E24AA">🤝 Вручи лично</text>
    <text x="15" y="125" font-size="10" fill="#8E24AA">💬 Скажи тёплые слова</text>
    <text x="15" y="145" font-size="10" fill="#8E24AA">🙏 Благодари за любой подарок</text>
  </g>
  
  <!-- Receiving gift scene -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="180" height="70" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Получая подарок:</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="10" fill="#8E24AA" text-anchor="middle">😊 Улыбнись</text>
    <text x="90" y="58" font-family="Arial, sans-serif" font-size="10" fill="#8E24AA" text-anchor="middle">🙏 Скажи «Спасибо!»</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(240, 220)">
    <rect x="0" y="0" width="240" height="70" fill="#FFF" rx="8" stroke="#9C27B0"/>
    <text x="120" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7B1FA2" text-anchor="middle">💡 Главное в подарке</text>
    <text x="120" y="40" font-family="Arial, sans-serif" font-size="10" fill="#8E24AA" text-anchor="middle">— не цена, а внимание и любовь!</text>
    <text x="120" y="58" font-family="Arial, sans-serif" font-size="10" fill="#9C27B0" text-anchor="middle">Лучший подарок — сделанный своими руками</text>
  </g>
  
  <!-- Decorative stars -->
  <text x="130" y="80" font-size="16">🌟</text>
  <text x="480" y="200" font-size="14">✨</text>
  <text x="240" y="320" font-size="12">💫</text>
</svg>