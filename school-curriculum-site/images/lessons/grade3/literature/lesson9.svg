<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color=#FFAB91;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit9)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D84315" text-anchor="middle">✨ К.Г. Паустовский</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF5722" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFAB91" opacity="0.5"/>
  
  <!-- Ring story visual -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="300" height="130" fill="#FFF3E0" rx="10" stroke="#FF7043"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BF360C" text-anchor="middle">«Стальное колечко»</text>
    
    <!-- Ring -->
    <g transform="translate(130, 50)">
      <circle cx="20" cy="30" r="25" fill="none" stroke="#78909C" stroke-width="6"/>
      <circle cx="20" cy="30" r="20" fill="none" stroke="#90A4AE" stroke-width="3"/>
      <circle cx="20" cy="15" r="5" fill="#FFD54F">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <text x="150" y="105" font-family="Arial, sans-serif" font-size="10" fill="#E64A19" text-anchor="middle">Волшебное колечко приносит счастье</text>
    <text x="150" y="120" font-family="Arial, sans-serif" font-size="9" fill="#FF7043" text-anchor="middle">Добрые дела возвращаются добром</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(50, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="70" fill="#FFECB3" rx="8" stroke="#FFA000"/>
    <text x="200" y="20" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Мастер лирической прозы</text>
    <text x="200" y="38" font-size="10" fill="#F57C00" text-anchor="middle">Описывает красоту природы и доброту людей</text>
    <text x="200" y="55" font-size="9" fill="#FF9800" text-anchor="middle">«Тёплый хлеб» • «Кот-ворюга» • «Дремучий медведь»</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>