<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="screen2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B5E20" text-anchor="middle">🖥️ Компьютер</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#4CAF50"/>
  
  <!-- Main Computer -->
  <g transform="translate(150, 70)">
    <!-- Monitor -->
    <rect x="0" y="0" width="200" height="140" fill="#37474F" rx="8"/>
    <rect x="8" y="8" width="184" height="110" fill="url(#screen2)" rx="4"/>
    
    <!-- Desktop icons -->
    <rect x="15" y="15" width="35" height="30" fill="#42A5F5" rx="3">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="15" width="35" height="30" fill="#66BB6A" rx="3">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="95" y="15" width="35" height="30" fill="#FFA726" rx="3">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Taskbar -->
    <rect x="8" y="100" width="184" height="18" fill="#263238" rx="2"/>
    <circle cx="20" cy="109" r="5" fill="#4CAF50">
      <animate attributeName="fill" values="#4CAF50;#81C784;#4CAF50" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Stand -->
    <rect x="80" y="140" width="40" height="15" fill="#455A64"/>
    <rect x="60" y="155" width="80" height="8" fill="#37474F" rx="3"/>
  </g>
  
  <!-- Keyboard -->
  <rect x="120" y="245" width="260" height="50" fill="#455A64" rx="5"/>
  <g font-family="Arial" font-size="8" fill="#90A4AE">
    <rect x="130" y="255" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="155" y="255" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="180" y="255" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="205" y="255" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="130" y="272" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="155" y="272" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="180" y="272" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="205" y="272" width="20" height="12" fill="#546E7A" rx="2"/>
    <rect x="240" y="255" width="120" height="30" fill="#546E7A" rx="2"/>
  </g>
  
  <!-- Mouse -->
  <ellipse cx="420" cy="270" rx="20" ry="28" fill="#455A64"/>
  <ellipse cx="420" cy="255" rx="8" ry="10" fill="#546E7A"/>
  <line x1="420" y1="248" x2="420" y2="262" stroke="#78909C" stroke-width="2"/>
  
  <!-- Parts labels -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">
    <rect x="20" y="100" width="80" height="50" fill="#E8F5E9" rx="5" stroke="#4CAF50"/>
    <text x="60" y="120" text-anchor="middle" font-weight="bold">Монитор</text>
    <text x="60" y="135" text-anchor="middle">выводит</text>
    <text x="60" y="145" text-anchor="middle">информацию</text>
    
    <rect x="400" y="100" width="80" height="50" fill="#E8F5E9" rx="5" stroke="#4CAF50"/>
    <text x="440" y="120" text-anchor="middle" font-weight="bold">Системный</text>
    <text x="440" y="135" text-anchor="middle">блок</text>
    <text x="440" y="145" text-anchor="middle">обрабатывает</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="320" r="8" fill="#81C784" opacity="0.6">
    <animate attributeName="r" values="6;10;6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="320" r="8" fill="#81C784" opacity="0.6">
    <animate attributeName="r" values="10;6;10" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>