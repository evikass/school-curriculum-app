<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFE082;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math3)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#F57C00" text-anchor="middle">✖️ Умножение числа 4</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCC80" opacity="0.5"/>
  
  <!-- Multiplication table -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif" font-size="13">
    <text x="220" y="0" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Таблица умножения на 4</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="140" height="25" fill="#FFECB3" rx="3"/>
      <text x="70" y="18" fill="#E65100" text-anchor="middle">4 × 1 = 4</text>
      
      <rect x="150" y="0" width="140" height="25" fill="#FFF8E1" rx="3"/>
      <text x="220" y="18" fill="#E65100" text-anchor="middle">4 × 2 = 8</text>
      
      <rect x="300" y="0" width="140" height="25" fill="#FFECB3" rx="3"/>
      <text x="370" y="18" fill="#E65100" text-anchor="middle">4 × 3 = 12</text>
      
      <rect x="0" y="30" width="140" height="25" fill="#FFF8E1" rx="3"/>
      <text x="70" y="48" fill="#E65100" text-anchor="middle">4 × 4 = 16</text>
      
      <rect x="150" y="30" width="140" height="25" fill="#FFECB3" rx="3"/>
      <text x="220" y="48" fill="#E65100" text-anchor="middle">4 × 5 = 20</text>
      
      <rect x="300" y="30" width="140" height="25" fill="#FFF8E1" rx="3"/>
      <text x="370" y="48" fill="#E65100" text-anchor="middle">4 × 6 = 24</text>
      
      <rect x="0" y="60" width="140" height="25" fill="#FFECB3" rx="3"/>
      <text x="70" y="78" fill="#E65100" text-anchor="middle">4 × 7 = 28</text>
      
      <rect x="150" y="60" width="140" height="25" fill="#FFF8E1" rx="3"/>
      <text x="220" y="78" fill="#E65100" text-anchor="middle">4 × 8 = 32</text>
      
      <rect x="300" y="60" width="140" height="25" fill="#FFECB3" rx="3"/>
      <text x="370" y="78" fill="#E65100" text-anchor="middle">4 × 9 = 36</text>
      
      <rect x="150" y="90" width="140" height="25" fill="#FFF8E1" rx="3"/>
      <text x="220" y="108" fill="#E65100" text-anchor="middle">4 × 10 = 40</text>
    </g>
  </g>
  
  <!-- Square visual -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="100" height="100" fill="#FFB74D" stroke="#F57C00" stroke-width="2"/>
    <text x="50" y="50" font-family="Arial, sans-serif" font-size="12" fill="#E65100" text-anchor="middle">4 стороны</text>
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="12" fill="#E65100" text-anchor="middle">4 угла</text>
  </g>
  
  <!-- Tip -->
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="250" height="55" fill="#E3F2FD" rx="5" stroke="#2196F3"/>
    <text x="125" y="20" font-family="Arial, sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle">💡 Секрет!</text>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">4 = 2 × 2</text>
    <text x="125" y="48" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">Умножь на 2, потом ещё на 2!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>