<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DCEDC8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#C5E1A5;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math7)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#558B2F" text-anchor="middle">➗ Деление на 2, 3, 4, 5</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#8BC34A" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#C5E1A5" opacity="0.5"/>
  
  <!-- Division tables -->
  <g transform="translate(20, 70)" font-family="Arial, sans-serif" font-size="11">
    <!-- ÷2 -->
    <g>
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#558B2F" text-anchor="middle">÷2</text>
      <rect x="0" y="8" width="110" height="80" fill="#DCEDC8" rx="5"/>
      <text x="55" y="28" fill="#689F38" text-anchor="middle">4÷2=2  6÷2=3</text>
      <text x="55" y="48" fill="#689F38" text-anchor="middle">8÷2=4  10÷2=5</text>
      <text x="55" y="68" fill="#689F38" text-anchor="middle">12÷2=6 14÷2=7</text>
      <text x="55" y="88" fill="#689F38" text-anchor="middle">16÷2=8 18÷2=9</text>
    </g>
    
    <!-- ÷3 -->
    <g transform="translate(120, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#558B2F" text-anchor="middle">÷3</text>
      <rect x="0" y="8" width="110" height="80" fill="#C5E1A5" rx="5"/>
      <text x="55" y="28" fill="#689F38" text-anchor="middle">6÷3=2  9÷3=3</text>
      <text x="55" y="48" fill="#689F38" text-anchor="middle">12÷3=4 15÷3=5</text>
      <text x="55" y="68" fill="#689F38" text-anchor="middle">18÷3=6 21÷3=7</text>
      <text x="55" y="88" fill="#689F38" text-anchor="middle">24÷3=8 27÷3=9</text>
    </g>
    
    <!-- ÷4 -->
    <g transform="translate(240, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#558B2F" text-anchor="middle">÷4</text>
      <rect x="0" y="8" width="110" height="80" fill="#DCEDC8" rx="5"/>
      <text x="55" y="28" fill="#689F38" text-anchor="middle">8÷4=2  12÷4=3</text>
      <text x="55" y="48" fill="#689F38" text-anchor="middle">16÷4=4 20÷4=5</text>
      <text x="55" y="68" fill="#689F38" text-anchor="middle">24÷4=6 28÷4=7</text>
      <text x="55" y="88" fill="#689F38" text-anchor="middle">32÷4=8 36÷4=9</text>
    </g>
    
    <!-- ÷5 -->
    <g transform="translate(360, 0)">
      <text x="55" y="0" font-size="12" font-weight="bold" fill="#558B2F" text-anchor="middle">÷5</text>
      <rect x="0" y="8" width="110" height="80" fill="#C5E1A5" rx="5"/>
      <text x="55" y="28" fill="#689F38" text-anchor="middle">10÷5=2 15÷5=3</text>
      <text x="55" y="48" fill="#689F38" text-anchor="middle">20÷5=4 25÷5=5</text>
      <text x="55" y="68" fill="#689F38" text-anchor="middle">30÷5=6 35÷5=7</text>
      <text x="55" y="88" fill="#689F38" text-anchor="middle">40÷5=8 45÷5=9</text>
    </g>
  </g>
  
  <!-- Tip -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="300" height="50" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">💡 Как запомнить?</text>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Задай вопрос: «Что умножить на делитель,</text>
    <text x="150" y="47" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">чтобы получить делимое?»</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>