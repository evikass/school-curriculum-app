<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D1C4E9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math16)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#512DA8" text-anchor="middle">➕ Сложение и вычитание до 1000</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#673AB7" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#B39DDB" opacity="0.4"/>
  
  <!-- Addition example -->
  <g transform="translate(30, 80)" font-family="Arial, sans-serif">
    <text x="100" y="0" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">Сложение</text>
    <rect x="0" y="10" width="200" height="80" fill="#EDE7F6" rx="8" stroke="#673AB7"/>
    
    <text x="100" y="35" font-size="12" fill="#512DA8" text-anchor="middle">234 + 152</text>
    <text x="100" y="55" font-size="11" fill="#673AB7" text-anchor="middle">200 + 100 = 300</text>
    <text x="100" y="70" font-size="11" fill="#673AB7" text-anchor="middle">30 + 50 = 80</text>
    <text x="100" y="85" font-size="11" fill="#673AB7" text-anchor="middle">4 + 2 = 6 → 386</text>
  </g>
  
  <!-- Subtraction example -->
  <g transform="translate(270, 80)" font-family="Arial, sans-serif">
    <text x="100" y="0" font-size="12" font-weight="bold" fill="#512DA8" text-anchor="middle">Вычитание</text>
    <rect x="0" y="10" width="200" height="80" fill="#E1BEE7" rx="8" stroke="#7B1FA2"/>
    
    <text x="100" y="35" font-size="12" fill="#512DA8" text-anchor="middle">487 - 235</text>
    <text x="100" y="55" font-size="11" fill="#7B1FA2" text-anchor="middle">400 - 200 = 200</text>
    <text x="100" y="70" font-size="11" fill="#7B1FA2" text-anchor="middle">80 - 30 = 50</text>
    <text x="100" y="85" font-size="11" fill="#7B1FA2" text-anchor="middle">7 - 5 = 2 → 252</text>
  </g>
  
  <!-- Carry over -->
  <g transform="translate(50, 190)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="55" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="18" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">С переходом через разряд</text>
    <text x="200" y="35" font-size="10" fill="#F57C00" text-anchor="middle">258 + 164 = ?</text>
    <text x="200" y="50" font-size="9" fill="#FF9800" text-anchor="middle">Единицы: 8+4=12 (пишем 2, 1 запоминаем)</text>
  </g>
  
  <!-- Check -->
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="300" height="45" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
    <text x="150" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">💡 Проверка</text>
    <text x="150" y="32" font-family="Arial, sans-serif" font-size="9" fill="#388E3C" text-anchor="middle">Сложение проверяем вычитанием</text>
    <text x="150" y="42" font-family="Arial, sans-serif" font-size="9" fill="#388E3C" text-anchor="middle">386 - 152 = 234 ✓</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>