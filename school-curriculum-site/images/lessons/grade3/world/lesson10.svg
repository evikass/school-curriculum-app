<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37474F"/>
      <stop offset="100%" style="stop-color:#263238"/>
    </linearGradient>
    <linearGradient id="coal10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#424242"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="oil10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <linearGradient id="gas10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA"/>
      <stop offset="100%" style="stop-color:#4FC3F7"/>
    </linearGradient>
    <linearGradient id="fire10" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5722"/>
      <stop offset="50%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#FFEB3B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg10)"/>

  <!-- Title -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFECB3" text-anchor="middle">🔥 Горючие ископаемые</text>
  <rect x="80" y="38" width="340" height="2" rx="1" fill="#FF8F00" opacity="0.5"/>

  <!-- Coal section -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="130" height="180" rx="10" fill="#424242" stroke="#616161" stroke-width="2"/>
    <text x="65" y="25" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">⬛ Уголь</text>
    
    <!-- Coal pieces -->
    <polygon points="30,60 50,50 70,60 65,80 35,80" fill="url(#coal10)" stroke="#000000" stroke-width="1">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="80,55 100,48 115,60 110,85 75,82" fill="url(#coal10)" stroke="#000000" stroke-width="1"/>
    <polygon points="45,95 65,88 85,95 80,115 50,115" fill="url(#coal10)" stroke="#000000" stroke-width="1"/>
    
    <!-- Shiny spots on coal -->
    <ellipse cx="45" cy="65" rx="5" ry="3" fill="#616161" opacity="0.5"/>
    <ellipse cx="95" cy="60" rx="4" ry="2" fill="#757575" opacity="0.5"/>
    
    <!-- Flame -->
    <g transform="translate(65, 130)">
      <path d="M0,30 Q-8,15 -5,0 Q0,-10 5,0 Q8,15 0,30" fill="url(#fire10)">
        <animate attributeName="d" 
                 values="M0,30 Q-8,15 -5,0 Q0,-10 5,0 Q8,15 0,30;M0,30 Q-10,15 -7,0 Q0,-15 7,0 Q10,15 0,30;M0,30 Q-8,15 -5,0 Q0,-10 5,0 Q8,15 0,30"
                 dur="0.5s" repeatCount="indefinite"/>
      </path>
      <path d="M0,25 Q-4,12 -2,5 Q0,-5 2,5 Q4,12 0,25" fill="#FFEB3B">
        <animate attributeName="d" 
                 values="M0,25 Q-4,12 -2,5 Q0,-5 2,5 Q4,12 0,25;M0,25 Q-5,12 -3,5 Q0,-8 3,5 Q5,12 0,25;M0,25 Q-4,12 -2,5 Q0,-5 2,5 Q4,12 0,25"
                 dur="0.4s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <text x="65" y="175" font-family="Arial, sans-serif" font-size="8" fill="#BDBDBD" text-anchor="middle">для отопления</text>
  </g>

  <!-- Oil section -->
  <g transform="translate(185, 60)">
    <rect x="0" y="0" width="130" height="180" rx="10" fill="#3E2723" stroke="#5D4037" stroke-width="2"/>
    <text x="65" y="25" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">🛢️ Нефть</text>
    
    <!-- Oil barrel -->
    <ellipse cx="65" cy="60" rx="30" ry="10" fill="#5D4037"/>
    <rect x="35" y="60" width="60" height="50" fill="#4E342E"/>
    <ellipse cx="65" cy="110" rx="30" ry="10" fill="#3E2723"/>
    
    <!-- Oil dripping -->
    <path d="M65,120 Q60,135 65,145 Q70,135 65,120" fill="url(#oil10)">
      <animate attributeName="d" values="M65,120 Q60,135 65,145 Q70,135 65,120;M65,120 Q58,135 65,148 Q72,135 65,120;M65,120 Q60,135 65,145 Q70,135 65,120" dur="1s" repeatCount="indefinite"/>
    </path>
    
    <!-- Oil rig icon -->
    <g transform="translate(20, 130)">
      <rect x="30" y="35" width="30" height="15" fill="#795548"/>
      <line x1="35" y1="35" x2="35" y2="10" stroke="#6D4C41" stroke-width="3"/>
      <line x1="55" y1="35" x2="55" y2="10" stroke="#6D4C41" stroke-width="3"/>
      <line x1="35" y1="10" x2="55" y2="10" stroke="#6D4C41" stroke-width="3"/>
      <line x1="45" y1="10" x2="45" y2="0" stroke="#6D4C41" stroke-width="2"/>
    </g>
    
    <text x="65" y="175" font-family="Arial, sans-serif" font-size="8" fill="#BCAAA4" text-anchor="middle">бензин, пластмасса</text>
  </g>

  <!-- Gas section -->
  <g transform="translate(340, 60)">
    <rect x="0" y="0" width="130" height="180" rx="10" fill="#455A64" stroke="#607D8B" stroke-width="2"/>
    <text x="65" y="25" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">💨 Природный газ</text>
    
    <!-- Gas pipe -->
    <rect x="20" y="55" width="90" height="20" fill="#78909C" rx="3"/>
    <circle cx="110" cy="65" r="10" fill="#546E7A"/>
    
    <!-- Gas flame from stove -->
    <g transform="translate(65, 100)">
      <ellipse cx="0" cy="20" rx="25" ry="8" fill="#37474F"/>
      <path d="M-10,20 Q-15,0 -8,-20 Q0,-35 8,-20 Q15,0 10,20" fill="url(#fire10)">
        <animate attributeName="d" 
                 values="M-10,20 Q-15,0 -8,-20 Q0,-35 8,-20 Q15,0 10,20;M-12,20 Q-17,0 -10,-25 Q0,-40 10,-25 Q17,0 12,20;M-10,20 Q-15,0 -8,-20 Q0,-35 8,-20 Q15,0 10,20"
                 dur="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M-5,20 Q-8,5 -3,-10 Q0,-20 3,-10 Q8,5 5,20" fill="#81D4FA">
        <animate attributeName="d" 
                 values="M-5,20 Q-8,5 -3,-10 Q0,-20 3,-10 Q8,5 5,20;M-6,20 Q-10,5 -4,-12 Q0,-22 4,-12 Q10,5 6,20;M-5,20 Q-8,5 -3,-10 Q0,-20 3,-10 Q8,5 5,20"
                 dur="0.35s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Gas bubbles -->
    <g>
      <circle cx="30" cy="140" r="5" fill="url(#gas10)" opacity="0.6">
        <animate attributeName="cy" values="140;120;140" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="150" r="4" fill="url(#gas10)" opacity="0.5">
        <animate attributeName="cy" values="150;130;150" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <text x="65" y="175" font-family="Arial, sans-serif" font-size="8" fill="#B0BEC5" text-anchor="middle">отопление, готовка</text>
  </g>

  <!-- Info box -->
  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="460" height="70" rx="10" fill="#FFFFFF" opacity="0.1"/>
    <text x="230" y="20" font-family="Arial, sans-serif" font-size="12" fill="#FFECB3" text-anchor="middle" font-weight="bold">🔍 Интересные факты:</text>
    <text x="230" y="40" font-family="Arial, sans-serif" font-size="10" fill="#FFE0B2" text-anchor="middle">• Нефть называют «чёрным золотом»</text>
    <text x="230" y="58" font-family="Arial, sans-serif" font-size="10" fill="#FFE0B2" text-anchor="middle">• Природный газ не имеет запаха — специальное вещество придаёт ему запах для безопасности</text>
  </g>

  <!-- Bottom text -->
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" fill="#FFECB3" text-anchor="middle">
    Горючие ископаемые — источник энергии
  </text>
</svg>