<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#616161"/>
      <stop offset="100%" style="stop-color:#424242"/>
    </linearGradient>
    <linearGradient id="pollution13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9E9E9E"/>
      <stop offset="100%" style="stop-color:#616161"/>
    </linearGradient>
    <linearGradient id="water13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909C"/>
      <stop offset="100%" style="stop-color:#546E7A"/>
    </linearGradient>
    <linearGradient id="fire13" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#D32F2F"/>
      <stop offset="50%" style="stop-color:#FF5722"/>
      <stop offset="100%" style="stop-color:#FFEB3B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg13)"/>

  <!-- Smog effect -->
  <ellipse cx="250" cy="80" rx="250" ry="60" fill="#757575" opacity="0.3">
    <animate attributeName="rx" values="250;260;250" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFECB3" text-anchor="middle">⚠️ Экологические проблемы</text>
  <rect x="80" y="43" width="340" height="2" rx="1" fill="#FF8F00" opacity="0.5"/>

  <!-- Air pollution -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="145" height="110" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="72" y="20" font-family="Arial, sans-serif" font-size="10" fill="#FFCDD2" text-anchor="middle" font-weight="bold">🏭 Загрязнение воздуха</text>
    
    <!-- Factory -->
    <rect x="20" y="50" width="50" height="45" fill="#5D4037"/>
    <rect x="30" y="30" width="15" height="25" fill="#6D4C41"/>
    <rect x="55" y="40" width="12" height="20" fill="#6D4C41"/>
    
    <!-- Smoke -->
    <g opacity="0.7">
      <ellipse cx="37" cy="25" rx="10" ry="8" fill="#9E9E9E">
        <animate attributeName="cy" values="25;15;5" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.4;0" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="61" cy="35" rx="8" ry="6" fill="#9E9E9E">
        <animate attributeName="cy" values="35;25;15" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.4;0" dur="2.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    
    <!-- Car -->
    <rect x="90" y="75" width="40" height="18" fill="#455A64" rx="3"/>
    <rect x="95" y="65" width="25" height="12" fill="#546E7A" rx="2"/>
    <circle cx="98" cy="95" r="6" fill="#212121"/>
    <circle cx="122" cy="95" r="6" fill="#212121"/>
    
    <!-- Exhaust -->
    <ellipse cx="135" cy="80" rx="5" ry="4" fill="#757575">
      <animate attributeName="rx" values="5;10;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Water pollution -->
  <g transform="translate(175, 60)">
    <rect x="0" y="0" width="145" height="110" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="72" y="20" font-family="Arial, sans-serif" font-size="10" fill="#B3E5FC" text-anchor="middle" font-weight="bold">💧 Загрязнение воды</text>
    
    <!-- River/water -->
    <ellipse cx="72" cy="80" rx="65" ry="25" fill="url(#water13)"/>
    
    <!-- Trash in water -->
    <rect x="25" y="70" width="15" height="10" fill="#D32F2F" rx="1">
      <animate attributeName="x" values="25;35;25" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="60" cy="75" r="5" fill="#795548"/>
    <ellipse cx="90" cy="78" rx="8" ry="5" fill="#FFC107"/>
    <rect x="110" y="72" width="10" height="12" fill="#4CAF50" rx="1">
      <animate attributeName="x" values="110;100;110" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Pipe dumping -->
    <rect x="55" y="45" width="20" height="15" fill="#546E7A"/>
    <path d="M65,60 L65,70" stroke="#8D6E63" stroke-width="4"/>
    
    <!-- Dead fish -->
    <g transform="translate(40, 85)">
      <ellipse cx="0" cy="0" rx="10" ry="5" fill="#FFAB91"/>
      <polygon points="10,0 15,-4 15,4" fill="#FFAB91"/>
      <line x1="-5" y1="-3" x2="-5" y2="0" stroke="#D32F2F" stroke-width="1"/>
    </g>
  </g>

  <!-- Deforestation -->
  <g transform="translate(330, 60)">
    <rect x="0" y="0" width="150" height="110" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" fill="#A5D6A7" text-anchor="middle" font-weight="bold">🌲 Вырубка лесов</text>
    
    <!-- Stumps -->
    <rect x="25" y="75" width="15" height="25" fill="#6D4C41"/>
    <ellipse cx="32" cy="75" rx="10" ry="5" fill="#8D6E63"/>
    <rect x="60" y="80" width="12" height="20" fill="#6D4C41"/>
    <ellipse cx="66" cy="80" rx="8" ry="4" fill="#8D6E63"/>
    <rect x="95" y="78" width="14" height="22" fill="#6D4C41"/>
    <ellipse cx="102" cy="78" rx="9" ry="4" fill="#8D6E63"/>
    
    <!-- Falling tree -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 125 100;45 125 100" dur="2s" repeatCount="indefinite"/>
      <rect x="120" y="55" width="10" height="45" fill="#5D4037"/>
      <ellipse cx="125" cy="40" rx="20" ry="18" fill="#388E3C"/>
    </g>
    
    <!-- Chainsaw icon -->
    <ellipse cx="125" cy="100" rx="12" ry="8" fill="#FF5722" stroke="#D32F2F"/>
  </g>

  <!-- Forest fire -->
  <g transform="translate(20, 180)">
    <rect x="0" y="0" width="145" height="100" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="72" y="18" font-family="Arial, sans-serif" font-size="10" fill="#FFAB91" text-anchor="middle" font-weight="bold">🔥 Лесные пожары</text>
    
    <!-- Burning trees -->
    <polygon points="30,80 45,40 60,80" fill="#5D4037"/>
    <ellipse cx="45" cy="35" rx="18" ry="15" fill="#388E3C"/>
    
    <!-- Fire -->
    <path d="M30,50 Q20,30 35,10 Q45,0 55,10 Q70,30 60,50" fill="url(#fire13)">
      <animate attributeName="d" 
               values="M30,50 Q20,30 35,10 Q45,0 55,10 Q70,30 60,50;M28,50 Q18,28 33,8 Q45,-5 57,8 Q72,28 62,50;M30,50 Q20,30 35,10 Q45,0 55,10 Q70,30 60,50"
               dur="0.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Smoke from fire -->
    <ellipse cx="45" cy="5" rx="15" ry="8" fill="#757575" opacity="0.6">
      <animate attributeName="cy" values="5;-10;-25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Another burning tree -->
    <polygon points="90,80 105,50 120,80" fill="#5D4037"/>
    <path d="M90,60 Q82,45 95,30 Q105,22 115,30 Q128,45 120,60" fill="url(#fire13)">
      <animate attributeName="d" 
               values="M90,60 Q82,45 95,30 Q105,22 115,30 Q128,45 120,60;M88,60 Q80,42 93,26 Q105,18 117,26 Q130,42 122,60;M90,60 Q82,45 95,30 Q105,22 115,30 Q128,45 120,60"
               dur="0.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Waste problem -->
  <g transform="translate(175, 180)">
    <rect x="0" y="0" width="145" height="100" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="72" y="18" font-family="Arial, sans-serif" font-size="10" fill="#CE93D8" text-anchor="middle" font-weight="bold">🗑️ Мусор и отходы</text>
    
    <!-- Trash pile -->
    <ellipse cx="72" cy="80" rx="55" ry="15" fill="#5D4037"/>
    <rect x="25" y="50" width="20" height="30" fill="#2196F3" rx="2">
      <animate attributeName="x" values="25;28;25" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="55" width="15" height="25" fill="#F44336" rx="2"/>
    <ellipse cx="80" cy="65" rx="12" ry="15" fill="#FFE082"/>
    <rect x="95" y="50" width="18" height="30" fill="#4CAF50" rx="2"/>
    <circle cx="115" cy="70" r="10" fill="#9C27B0"/>
    
    <!-- Trash can -->
    <path d="M130,40 L135,85 L155,85 L160,40 Z" fill="#78909C"/>
    <ellipse cx="145" cy="40" rx="17" ry="5" fill="#90A4AE"/>
  </g>

  <!-- Climate change -->
  <g transform="translate(330, 180)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="75" y="18" font-family="Arial, sans-serif" font-size="10" fill="#FFCC80" text-anchor="middle" font-weight="bold">🌡️ Изменение климата</text>
    
    <!-- Thermometer -->
    <rect x="30" y="25" width="15" height="55" fill="#FFFFFF" rx="7"/>
    <circle cx="37" cy="75" r="12" fill="#F44336"/>
    <rect x="33" y="35" width="9" height="35" fill="#F44336" rx="4">
      <animate attributeName="height" values="35;40;35" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Temperature marks -->
    <line x1="45" y1="30" x2="52" y2="30" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="45" y1="40" x2="50" y2="40" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="45" y1="50" x2="52" y2="50" stroke="#FFFFFF" stroke-width="1"/>
    
    <!-- Melting ice -->
    <polygon points="80,35 100,25 120,35 115,55 85,55" fill="#B3E5FC"/>
    <path d="M85,55 Q90,70 95,80" stroke="#4FC3F7" stroke-width="2" fill="none">
      <animate attributeName="d" values="M85,55 Q90,70 95,80;M85,57 Q92,72 97,82;M85,55 Q90,70 95,80" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M100,55 Q105,68 108,78" stroke="#4FC3F7" stroke-width="2" fill="none"/>
    
    <!-- Sun (hot) -->
    <circle cx="135" cy="45" r="15" fill="#FFD54F">
      <animate attributeName="r" values="15;17;15" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#FFD54F" stroke-width="2">
      <line x1="135" y1="25" x2="135" y2="18"/>
      <line x1="135" y1="65" x2="135" y2="72"/>
      <line x1="115" y1="45" x2="108" y2="45"/>
      <line x1="155" y1="45" x2="162" y2="45"/>
    </g>
  </g>

  <!-- Warning message -->
  <g transform="translate(100, 290)">
    <rect x="0" y="0" width="300" height="45" rx="8" fill="#D32F2F" opacity="0.8"/>
    <text x="150" y="18" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold">⚠️ Экологические проблемы угрожают планете!</text>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="9" fill="#FFCDD2" text-anchor="middle">Каждый человек может помочь природе</text>
  </g>

  <!-- Bottom text -->
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" fill="#FFECB3" text-anchor="middle">
    Берегите природу — это наш дом!
  </text>
</svg>