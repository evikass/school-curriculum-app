<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFF8E1;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky8)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">🚫 Родительный падеж</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFE0B2" opacity="0.5"/>
  
  <!-- Main info box -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="180" height="80" fill="#FFF3E0" rx="10" stroke="#FF9800"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">КОГО? ЧЕГО?</text>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" fill="#F57C00" text-anchor="middle">Отсутствие предмета</text>
    <text x="90" y="70" font-family="Arial, sans-serif" font-size="12" fill="#F57C00" text-anchor="middle">Принадлежность</text>
  </g>
  
  <!-- Prepositions -->
  <g transform="translate(270, 70)">
    <rect x="0" y="0" width="180" height="80" fill="#E3F2FD" rx="10" stroke="#2196F3"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Предлоги</text>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">от, до, из, без, у, для</text>
    <text x="90" y="70" font-family="Arial, sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">около, вокруг, после</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 170)" font-family="Arial, sans-serif">
    <text x="200" y="0" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Примеры</text>
    
    <rect x="0" y="15" width="150" height="45" fill="#FFECB3" rx="5"/>
    <text x="75" y="35" font-size="12" fill="#E65100" text-anchor="middle">Нет снега.</text>
    <text x="75" y="52" font-size="10" fill="#F57C00" text-anchor="middle">(чего? — Р.п.)</text>
    
    <rect x="170" y="15" width="150" height="45" fill="#FFECB3" rx="5"/>
    <text x="245" y="35" font-size="12" fill="#E65100" text-anchor="middle">Книга сестры.</text>
    <text x="245" y="52" font-size="10" fill="#F57C00" text-anchor="middle">(кого? — Р.п.)</text>
    
    <rect x="340" y="15" width="100" height="45" fill="#FFECB3" rx="5"/>
    <text x="390" y="35" font-size="12" fill="#E65100" text-anchor="middle">От дома</text>
    <text x="390" y="52" font-size="10" fill="#F57C00" text-anchor="middle">(Р.п.)</text>
  </g>
  
  <!-- Tip -->
  <g transform="translate(80, 270)">
    <rect x="0" y="0" width="340" height="35" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
    <text x="170" y="24" font-family="Arial, sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">💡 Р.п. = можно заменить «нет» или «много»</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="140" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>