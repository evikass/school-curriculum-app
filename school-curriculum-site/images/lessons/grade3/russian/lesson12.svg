<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky12)"/>
  <rect width="500" height="350" fill="#FAFAFA" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#424242" text-anchor="middle">💭 Предложный падеж</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#757575" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#BDBDBD" opacity="0.4"/>
  
  <!-- Main info box -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="180" height="80" fill="#FAFAFA" rx="10" stroke="#757575"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212121" text-anchor="middle">О КОМ? О ЧЁМ?</text>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="12" fill="#424242" text-anchor="middle">Место</text>
    <text x="90" y="70" font-family="Arial, sans-serif" font-size="12" fill="#424242" text-anchor="middle">Тема разговора</text>
  </g>
  
  <!-- Important notice -->
  <g transform="translate(270, 70)">
    <rect x="0" y="0" width="180" height="80" fill="#FFEBEE" rx="10" stroke="#F44336"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#C62828" text-anchor="middle">⚠️ ВАЖНО!</text>
    <text x="90" y="50" font-family="Arial, sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle">Предложный падеж</text>
    <text x="90" y="70" font-family="Arial, sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle">ВСЕГДА с предлогом!</text>
  </g>
  
  <!-- Prepositions -->
  <g transform="translate(50, 170)" font-family="Arial, sans-serif">
    <text x="200" y="0" font-size="14" font-weight="bold" fill="#424242" text-anchor="middle">Предлоги</text>
    
    <rect x="30" y="15" width="80" height="35" fill="#E0E0E0" rx="5"/>
    <text x="70" y="38" font-size="13" fill="#212121" text-anchor="middle">о, об</text>
    
    <rect x="130" y="15" width="80" height="35" fill="#E0E0E0" rx="5"/>
    <text x="170" y="38" font-size="13" fill="#212121" text-anchor="middle">в</text>
    
    <rect x="230" y="15" width="80" height="35" fill="#E0E0E0" rx="5"/>
    <text x="270" y="38" font-size="13" fill="#212121" text-anchor="middle">на</text>
    
    <rect x="330" y="15" width="80" height="35" fill="#E0E0E0" rx="5"/>
    <text x="370" y="38" font-size="13" fill="#212121" text-anchor="middle">при</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 240)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="130" height="40" fill="#BDBDBD" rx="5"/>
    <text x="65" y="17" fill="#212121" text-anchor="middle" font-size="11">Думаю о маме</text>
    <text x="65" y="32" fill="#424242" text-anchor="middle" font-size="10">(о ком? — П.п.)</text>
    
    <rect x="145" y="0" width="130" height="40" fill="#BDBDBD" rx="5"/>
    <text x="210" y="17" fill="#212121" text-anchor="middle" font-size="11">В лесу</text>
    <text x="210" y="32" fill="#424242" text-anchor="middle" font-size="10">(П.п.)</text>
    
    <rect x="290" y="0" width="130" height="40" fill="#BDBDBD" rx="5"/>
    <text x="355" y="17" fill="#212121" text-anchor="middle" font-size="11">На столе</text>
    <text x="355" y="32" fill="#424242" text-anchor="middle" font-size="10">(П.п.)</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="140" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>