<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="wall5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFECB3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="floor5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6D4C41;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background - Room -->
  <rect width="500" height="350" fill="url(#wall5)"/>
  
  <!-- Floor -->
  <rect x="0" y="250" width="500" height="100" fill="url(#floor5)"/>
  
  <!-- Title -->
  <rect x="120" y="10" width="260" height="45" rx="10" fill="#FFF" stroke="#E53935" stroke-width="2"/>
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#C62828" text-anchor="middle">🏠 Опасности дома</text>
  
  <!-- Window -->
  <rect x="350" y="60" width="100" height="100" fill="#81D4FA" stroke="#5D4037" stroke-width="4"/>
  <line x1="400" y1="60" x2="400" y2="160" stroke="#5D4037" stroke-width="3"/>
  <line x1="350" y1="110" x2="450" y2="110" stroke="#5D4037" stroke-width="3"/>
  
  <!-- Electrical outlet with warning -->
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="50" height="70" fill="#FFF" stroke="#333" stroke-width="2" rx="5"/>
    <circle cx="25" cy="25" r="5" fill="#333"/>
    <circle cx="25" cy="45" r="5" fill="#333"/>
    <!-- Warning sign -->
    <polygon points="25,-20 10,5 40,5" fill="#FFC107" stroke="#FF6F00" stroke-width="1"/>
    <text x="25" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">!</text>
    <!-- Prohibition -->
    <circle cx="25" cy="35" r="40" fill="none" stroke="#F44336" stroke-width="3" stroke-dasharray="10,5">
      <animate attributeName="stroke-dashoffset" values="0;30" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Kitchen - Hot pot -->
  <g transform="translate(120, 150)">
    <!-- Stove -->
    <rect x="0" y="40" width="80" height="50" fill="#424242" rx="5"/>
    <circle cx="40" cy="55" r="20" fill="#757575"/>
    <circle cx="40" cy="55" r="15" fill="#E53935">
      <animate attributeName="fill" values="#E53935;#FF5722;#E53935" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Pot -->
    <ellipse cx="40" cy="25" rx="25" ry="15" fill="#78909C"/>
    <rect x="15" y="10" width="50" height="20" fill="#78909C"/>
    <!-- Steam -->
    <path d="M30,5 Q25,-5 30,-15" stroke="#B0BEC5" stroke-width="3" fill="none" opacity="0.7">
      <animate attributeName="d" values="M30,5 Q25,-5 30,-15;M30,5 Q35,-5 30,-15;M30,5 Q25,-5 30,-15" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M40,5 Q45,-5 40,-15" stroke="#B0BEC5" stroke-width="3" fill="none" opacity="0.7">
      <animate attributeName="d" values="M40,5 Q45,-5 40,-15;M40,5 Q35,-5 40,-15;M40,5 Q45,-5 40,-15" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M50,5 Q55,-5 50,-15" stroke="#B0BEC5" stroke-width="3" fill="none" opacity="0.7">
      <animate attributeName="d" values="M50,5 Q55,-5 50,-15;M50,5 Q45,-5 50,-15;M50,5 Q55,-5 50,-15" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <!-- Warning -->
    <text x="40" y="-25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#D32F2F" text-anchor="middle">ГОРЯЧО!</text>
  </g>
  
  <!-- Cleaning products -->
  <g transform="translate(280, 160)">
    <!-- Bottle 1 -->
    <rect x="0" y="20" width="25" height="45" rx="3" fill="#4CAF50"/>
    <rect x="5" y="10" width="15" height="15" rx="2" fill="#4CAF50"/>
    <text x="12" y="50" font-family="Arial, sans-serif" font-size="8" fill="#FFF" text-anchor="middle">⚠️</text>
    <!-- Bottle 2 -->
    <rect x="30" y="25" width="20" height="40" rx="3" fill="#2196F3"/>
    <rect x="35" y="18" width="10" height="10" rx="2" fill="#2196F3"/>
    <text x="40" y="50" font-family="Arial, sans-serif" font-size="8" fill="#FFF" text-anchor="middle">☠️</text>
    <!-- Warning -->
    <polygon points="25,-5 0,30 50,30" fill="#FFC107" stroke="#FF6F00" stroke-width="2">
      <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
    </polygon>
    <text x="25" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  </g>
  
  <!-- Sharp objects (scissors) -->
  <g transform="translate(400, 180)">
    <!-- Table -->
    <rect x="-20" y="50" width="80" height="10" fill="#8D6E63"/>
    <!-- Scissors -->
    <ellipse cx="10" cy="35" rx="8" ry="12" fill="#B0BEC5"/>
    <ellipse cx="30" cy="35" rx="8" ry="12" fill="#B0BEC5"/>
    <polygon points="10,45 15,70 12,70 8,50" fill="#78909C"/>
    <polygon points="30,45 25,70 28,70 32,50" fill="#78909C"/>
    <!-- Circle in center -->
    <circle cx="20" cy="30" r="5" fill="#78909C"/>
    <!-- Warning -->
    <circle cx="20" cy="30" r="45" fill="none" stroke="#F44336" stroke-width="3" opacity="0.5">
      <animate attributeName="r" values="45;50;45" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Falling object warning -->
  <g transform="translate(220, 100)">
    <rect x="0" y="0" width="60" height="20" fill="#A1887F" stroke="#6D4C41" stroke-width="1"/>
    <rect x="5" y="0" width="50" height="40" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
    <!-- Books -->
    <rect x="10" y="-15" width="40" height="10" fill="#E91E63">
      <animate attributeName="y" values="-15;-20;-15" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="-25" width="30" height="8" fill="#9C27B0">
      <animate attributeName="y" values="-25;-30;-25" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="-35" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" text-anchor="middle">Осторожно!</text>
  </g>
  
  <!-- Safety tips box -->
  <rect x="50" y="270" width="400" height="65" rx="10" fill="#FFEBEE" stroke="#E53935" stroke-width="2"/>
  <text x="250" y="290" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#B71C1C" text-anchor="middle">⚠️ Опасности дома:</text>
  <text x="250" y="308" font-family="Arial, sans-serif" font-size="10" fill="#C62828" text-anchor="middle">• Розетки и электроприборы • Горячие предметы • Химикаты</text>
  <text x="250" y="325" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" text-anchor="middle">• Острые предметы • Высота (окна, лестницы)</text>
  
  <!-- Decorative warning signs -->
  <polygon points="30,300 20,320 40,320" fill="#FFC107" stroke="#FF6F00" stroke-width="1"/>
  <text x="30" y="316" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  
  <polygon points="470,300 460,320 480,320" fill="#FFC107" stroke="#FF6F00" stroke-width="1"/>
  <text x="470" y="316" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">!</text>
</svg>