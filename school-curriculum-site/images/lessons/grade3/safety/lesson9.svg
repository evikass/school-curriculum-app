<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg9)"/>
  
  <!-- Title -->
  <rect x="120" y="10" width="260" height="45" rx="10" fill="#FFF" stroke="#7B1FA2" stroke-width="2"/>
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🚫 Незнакомцы</text>
  
  <!-- Stranger figure -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="120" height="150" fill="#FCE4EC" rx="10" stroke="#E91E63" stroke-width="2"/>
    <text x="60" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#880E4F" text-anchor="middle">НЕЗНАКОМЕЦ</text>
    
    <!-- Body -->
    <rect x="30" y="70" width="60" height="60" rx="5" fill="#424242"/>
    
    <!-- Head with hat/sunglasses -->
    <circle cx="60" cy="50" r="22" fill="#FFCC80"/>
    <!-- Sunglasses -->
    <rect x="42" y="45" width="15" height="10" rx="2" fill="#333"/>
    <rect x="63" y="45" width="15" height="10" rx="2" fill="#333"/>
    <line x1="57" y1="50" x2="63" y2="50" stroke="#333" stroke-width="2"/>
    <!-- Hat -->
    <ellipse cx="60" cy="30" rx="28" ry="8" fill="#333"/>
    <rect x="42" y="15" width="36" height="18" fill="#333"/>
    
    <!-- Question marks -->
    <text x="25" y="40" font-family="Arial, sans-serif" font-size="16" fill="#9C27B0">?</text>
    <text x="90" y="35" font-family="Arial, sans-serif" font-size="14" fill="#9C27B0">?</text>
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="12" fill="#AB47BC">?</text>
    
    <!-- Prohibition circle -->
    <circle cx="60" cy="75" r="70" fill="none" stroke="#E91E63" stroke-width="4">
      <animate attributeName="stroke-width" values="4;6;4" dur="1s" repeatCount="indefinite"/>
    </circle>
    <line x1="10" y1="20" x2="110" y2="130" stroke="#E91E63" stroke-width="4"/>
    
    <!-- X -->
    <text x="60" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C2185B" text-anchor="middle">НЕ РАЗГОВАРИВАЙ!</text>
  </g>
  
  <!-- Child with STOP gesture -->
  <g transform="translate(200, 130)">
    <rect x="0" y="0" width="100" height="110" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2"/>
    <text x="50" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">РЕБЁНОК</text>
    
    <!-- Body -->
    <rect x="30" y="55" width="40" height="35" rx="5" fill="#42A5F5"/>
    
    <!-- Head -->
    <circle cx="50" cy="40" r="15" fill="#FFCC80"/>
    <!-- Eyes -->
    <circle cx="45" cy="38" r="2" fill="#333"/>
    <circle cx="55" cy="38" r="2" fill="#333"/>
    <!-- Determined mouth -->
    <line x1="45" y1="46" x2="55" y2="46" stroke="#333" stroke-width="2"/>
    <!-- Hair -->
    <ellipse cx="50" cy="28" rx="12" ry="6" fill="#5D4037"/>
    
    <!-- STOP hand -->
    <g transform="translate(70, 50)">
      <ellipse cx="0" cy="0" rx="18" ry="15" fill="#FFCC80"/>
      <rect x="-12" y="-25" width="6" height="15" rx="2" fill="#FFCC80"/>
      <rect x="-4" y="-28" width="6" height="18" rx="2" fill="#FFCC80"/>
      <rect x="4" y="-28" width="6" height="18" rx="2" fill="#FFCC80"/>
      <rect x="12" y="-25" width="6" height="15" rx="2" fill="#FFCC80"/>
    </g>
    
    <!-- STOP label -->
    <rect x="15" y="92" width="70" height="16" fill="#F44336" rx="3"/>
    <text x="50" y="104" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFF" text-anchor="middle">СТОП!</text>
  </g>
  
  <!-- Tricks strangers use -->
  <g transform="translate(330, 90)">
    <rect x="0" y="0" width="140" height="150" fill="#FFF8E1" rx="10" stroke="#FF9800" stroke-width="2"/>
    <text x="70" y="18" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">ХИТРОСТИ:</text>
    
    <!-- Candy icon -->
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="20">🍬</text>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="9" fill="#F57C00">Хочешь конфету?</text>
    
    <!-- Puppy icon -->
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="20">🐕</text>
    <text x="40" y="70" font-family="Arial, sans-serif" font-size="9" fill="#FF9800">Помоги найти щенка</text>
    
    <!-- Gift icon -->
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="20">🎁</text>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="9" fill="#FFB74D">У меня подарок</text>
    
    <!-- Mom icon -->
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="20">👩</text>
    <text x="40" y="120" font-family="Arial, sans-serif" font-size="9" fill="#FFC107">Мама просила...</text>
    
    <!-- Warning -->
    <rect x="10" y="130" width="120" height="15" fill="#F44336" rx="3">
      <animate attributeName="opacity" values="1;0.7;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="142" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFF" text-anchor="middle">ЭТО ОБМАН!</text>
  </g>
  
  <!-- Safety rules -->
  <rect x="30" y="260" width="440" height="75" rx="10" fill="#FFF" stroke="#7B1FA2" stroke-width="2"/>
  <text x="250" y="282" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🛡️ Правила безопасности с незнакомцами:</text>
  <text x="250" y="302" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">• Не разговаривай с незнакомыми людьми</text>
  <text x="250" y="318" font-family="Arial, sans-serif" font-size="10" fill="#8E24AA" text-anchor="middle">• Не бери у них ничего • Не уходи с ними • Не открывай им дверь • Скажи родителям</text>
  
  <!-- Emergency number -->
  <rect x="430" y="10" width="60" height="40" fill="#E91E63" rx="8">
    <animate attributeName="fill" values="#E91E63;#F06292;#E91E63" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="460" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFF" text-anchor="middle">112</text>
</svg>