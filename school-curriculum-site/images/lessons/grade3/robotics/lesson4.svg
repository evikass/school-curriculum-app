<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="leverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#F57C00"/>
    </linearGradient>
    <linearGradient id="weightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#303F9F"/>
    </linearGradient>
    <linearGradient id="fulcrumGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg4)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">⚖️ Рычаги</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Seesaw Lever -->
  <g transform="translate(150, 180)">
    <!-- Fulcrum (triangle) -->
    <polygon points="0,0 -25,50 25,50" fill="url(#fulcrumGrad)"/>
    <text x="0" y="70" font-size="10" fill="#E65100" text-anchor="middle" font-family="Arial">Точка опоры</text>
    
    <!-- Lever Board -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-15;15;-15" dur="4s" repeatCount="indefinite"/>
      <rect x="-120" y="-8" width="240" height="16" fill="url(#leverGrad)" rx="3"/>
      
      <!-- Left Weight -->
      <g transform="translate(-100, 0)">
        <rect x="-15" y="-50" width="30" height="40" fill="url(#weightGrad)" rx="5"/>
        <text x="0" y="-25" font-size="14" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">5</text>
        <text x="0" y="-12" font-size="8" fill="#C5CAE9" text-anchor="middle" font-family="Arial">кг</text>
      </g>
      
      <!-- Right Weight -->
      <g transform="translate(80, 0)">
        <rect x="-15" y="-40" width="30" height="30" fill="#43A047" rx="5"/>
        <text x="0" y="-18" font-size="14" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">3</text>
        <text x="0" y="-5" font-size="8" fill="#C8E6C9" text-anchor="middle" font-family="Arial">кг</text>
      </g>
    </g>
  </g>
  
  <!-- Types of Levers -->
  <g transform="translate(30, 80)">
    <!-- Lever Class 1 -->
    <rect x="0" y="0" width="130" height="70" fill="#FFF8E1" rx="8" stroke="#FFB300"/>
    <text x="65" y="18" font-size="10" font-weight="bold" fill="#FF6F00" text-anchor="middle" font-family="Arial">Рычаг 1 рода</text>
    <line x1="20" y1="45" x2="110" y2="45" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
    <polygon points="65,45 55,60 75,60" fill="#F57C00"/>
    <circle cx="30" cy="45" r="8" fill="#5C6BC0"/>
    <circle cx="100" cy="45" r="6" fill="#43A047"/>
    <text x="65" y="68" font-size="8" fill="#FF6F00" text-anchor="middle" font-family="Arial">Качели, ножницы</text>
  </g>
  
  <g transform="translate(185, 80)">
    <!-- Lever Class 2 -->
    <rect x="0" y="0" width="130" height="70" fill="#FFF8E1" rx="8" stroke="#FFB300"/>
    <text x="65" y="18" font-size="10" font-weight="bold" fill="#FF6F00" text-anchor="middle" font-family="Arial">Рычаг 2 рода</text>
    <line x1="20" y1="45" x2="110" y2="45" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
    <polygon points="100,45 90,60 110,60" fill="#F57C00"/>
    <circle cx="40" cy="45" r="8" fill="#5C6BC0"/>
    <circle cx="70" cy="45" r="6" fill="#43A047"/>
    <text x="65" y="68" font-size="8" fill="#FF6F00" text-anchor="middle" font-family="Arial">Тачка, щипцы</text>
  </g>
  
  <g transform="translate(340, 80)">
    <!-- Lever Class 3 -->
    <rect x="0" y="0" width="130" height="70" fill="#FFF8E1" rx="8" stroke="#FFB300"/>
    <text x="65" y="18" font-size="10" font-weight="bold" fill="#FF6F00" text-anchor="middle" font-family="Arial">Рычаг 3 рода</text>
    <line x1="20" y1="45" x2="110" y2="45" stroke="#FF9800" stroke-width="4" stroke-linecap="round"/>
    <polygon points="30,45 20,60 40,60" fill="#F57C00"/>
    <circle cx="60" cy="45" r="8" fill="#5C6BC0"/>
    <circle cx="100" cy="45" r="6" fill="#43A047"/>
    <text x="65" y="68" font-size="8" fill="#FF6F00" text-anchor="middle" font-family="Arial">Пинцет, рука</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 260)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="65" fill="#FFF3E0" rx="8" stroke="#FF9800"/>
    <text x="220" y="18" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">Рычаг помогает поднимать тяжести!</text>
    <text x="220" y="35" font-size="10" fill="#F57C00" text-anchor="middle">📍 Чем длиннее плечо рычага, тем меньше силы нужно</text>
    <text x="220" y="50" font-size="10" fill="#F57C00" text-anchor="middle">🎯 Рычаги есть везде: в роботах, инструментах, машинах</text>
  </g>
  
  <!-- Animated arrows -->
  <g transform="translate(380, 160)">
    <path d="M0,0 L0,-30" stroke="#FF5722" stroke-width="3" stroke-linecap="round">
      <animate attributeName="d" values="M0,0 L0,-30;M0,10 L0,-20;M0,0 L0,-30" dur="1s" repeatCount="indefinite"/>
    </path>
    <polygon points="0,-35 -6,-25 6,-25" fill="#FF5722">
      <animate attributeName="points" values="0,-35 -6,-25 6,-25;0,-45 -6,-35 6,-35;0,-35 -6,-25 6,-25" dur="1s" repeatCount="indefinite"/>
    </polygon>
    <text x="0" y="20" font-size="9" fill="#E64A19" text-anchor="middle" font-family="Arial">Сила</text>
  </g>
</svg>