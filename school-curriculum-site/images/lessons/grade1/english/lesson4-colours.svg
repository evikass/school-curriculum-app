<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad4)"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="24" font-weight="bold" fill="#e65100">Colours / Цвета</text>
  
  <!-- Color circles with animation -->
  <!-- Red -->
  <g transform="translate(70, 100)">
    <circle r="30" fill="#f44336">
      <animate attributeName="r" values="28;33;28" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text y="55" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#c62828">red</text>
    <text y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">красный</text>
  </g>
  
  <!-- Blue -->
  <g transform="translate(150, 100)">
    <circle r="30" fill="#2196f3">
      <animate attributeName="r" values="28;33;28" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <text y="55" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#1565c0">blue</text>
    <text y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">синий</text>
  </g>
  
  <!-- Green -->
  <g transform="translate(230, 100)">
    <circle r="30" fill="#4caf50">
      <animate attributeName="r" values="28;33;28" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text y="55" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#2e7d32">green</text>
    <text y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">зелёный</text>
  </g>
  
  <!-- Yellow -->
  <g transform="translate(310, 100)">
    <circle r="30" fill="#ffeb3b">
      <animate attributeName="r" values="28;33;28" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <text y="55" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#f57f17">yellow</text>
    <text y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">жёлтый</text>
  </g>
  
  <!-- Rainbow at bottom -->
  <g transform="translate(200, 230)">
    <path d="M-150 0 Q-150 -60 0 -80 Q150 -60 150 0" stroke="#f44336" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-138 0 Q-138 -50 0 -68 Q138 -50 138 0" stroke="#ff9800" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-126 0 Q-126 -40 0 -56 Q126 -40 126 0" stroke="#ffeb3b" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-114 0 Q-114 -30 0 -44 Q114 -30 114 0" stroke="#4caf50" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-102 0 Q-102 -20 0 -32 Q102 -20 102 0" stroke="#2196f3" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M-90 0 Q-90 -10 0 -20 Q90 -10 90 0" stroke="#9c27b0" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Clouds -->
    <ellipse cx="-150" cy="5" rx="25" ry="18" fill="white"/>
    <ellipse cx="-130" cy="0" rx="20" ry="15" fill="white"/>
    <ellipse cx="150" cy="5" rx="25" ry="18" fill="white"/>
    <ellipse cx="130" cy="0" rx="20" ry="15" fill="white"/>
  </g>
  
  <!-- Animated color pencils -->
  <g transform="translate(60, 200)">
    <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="2s" repeatCount="indefinite"/>
    <polygon points="0,-40 8,-40 8,20 4,30 0,20" fill="#f44336"/>
    <polygon points="0,-40 4,-45 8,-40" fill="#ffcc80"/>
  </g>
  <g transform="translate(340, 200)">
    <animateTransform attributeName="transform" type="rotate" values="5;-5;5" dur="2s" repeatCount="indefinite"/>
    <polygon points="0,-40 8,-40 8,20 4,30 0,20" fill="#2196f3"/>
    <polygon points="0,-40 4,-45 8,-40" fill="#ffcc80"/>
  </g>
  
  <!-- Decorative stars -->
  <g fill="#ffd54f">
    <polygon points="30,60 33,70 43,70 35,77 38,87 30,81 22,87 25,77 17,70 27,70">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="370,60 373,70 383,70 375,77 378,87 370,81 362,87 365,77 357,70 367,70">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Title bottom -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e65100">Learn colours in English!</text>
</svg>