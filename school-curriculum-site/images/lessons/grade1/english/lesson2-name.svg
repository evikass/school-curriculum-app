<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="nameCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad2)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="20" fill="#90caf9" opacity="0.5">
    <animate attributeName="r" values="20;25;20" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="80" r="15" fill="#90caf9" opacity="0.5">
    <animate attributeName="r" values="15;20;15" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Child asking -->
  <g transform="translate(80, 150)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="22" ry="32" fill="#7e57c2"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="23" fill="#ffcc80"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-3" rx="20" ry="14" fill="#4e342e"/>
    <!-- Eyes -->
    <circle cx="-7" cy="8" r="3.5" fill="#333"/>
    <circle cx="7" cy="8" r="3.5" fill="#333"/>
    <!-- Question expression -->
    <ellipse cx="0" cy="20" rx="6" ry="4" fill="#333" opacity="0.3"/>
    <!-- Arm pointing -->
    <ellipse cx="30" cy="30" rx="18" ry="7" fill="#ffcc80"/>
  </g>
  
  <!-- Speech bubble with question -->
  <g>
    <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="2s" repeatCount="indefinite" additive="sum" origin="150 80"/>
    <path d="M80 40 Q80 20 120 20 L180 20 Q200 20 200 40 L200 80 Q200 100 180 100 L130 100 L110 120 L115 100 L120 100 Q80 100 80 80 Z" fill="white" stroke="#5c6bc0" stroke-width="3"/>
    <text x="140" y="55" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" fill="#333">What is your</text>
    <text x="140" y="80" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" font-weight="bold" fill="#5c6bc0">name?</text>
  </g>
  
  <!-- Child answering -->
  <g transform="translate(300, 150)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="22" ry="32" fill="#26a69a"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="23" fill="#ffcc80"/>
    <!-- Hair -->
    <path d="M-20 -5 Q0 -25 20 -5 Q15 5 0 0 Q-15 5 -20 -5" fill="#ff7043"/>
    <!-- Eyes (happy) -->
    <path d="M-10 6 Q-7 10 -4 6" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M4 6 Q7 10 10 6" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Smile -->
    <path d="M-7 18 Q0 25 7 18" stroke="#333" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Name tag with animation -->
  <g transform="translate(280, 60)">
    <animateTransform attributeName="transform" type="rotate" values="-3;3;-3" dur="2s" repeatCount="indefinite"/>
    <rect x="-50" y="-25" width="100" height="50" rx="5" fill="url(#nameCard)" stroke="#ff7043" stroke-width="3"/>
    <rect x="-45" y="-5" width="90" height="3" fill="#ffccbc"/>
    <text x="0" y="10" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="18" font-weight="bold" fill="#ff5722">
      My name is
    </text>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">HELLO</text>
  </g>
  
  <!-- Response speech bubble -->
  <g>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    <path d="M250 130 Q250 110 290 110 L350 110 Q370 110 370 130 L370 165 Q370 185 350 185 L300 185 L280 200 L285 185 L290 185 Q250 185 250 165 Z" fill="white" stroke="#26a69a" stroke-width="2"/>
    <text x="310" y="145" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" fill="#333">My name is</text>
    <text x="310" y="168" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" font-weight="bold" fill="#26a69a">Tom!</text>
  </g>
  
  <!-- Decorative stars -->
  <g fill="#ffd54f">
    <polygon points="40,250 43,260 53,260 45,267 48,277 40,271 32,277 35,267 27,260 37,260">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="360,240 362,247 370,247 364,252 366,259 360,255 354,259 356,252 350,247 358,247">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Ground -->
  <ellipse cx="200" cy="275" rx="170" ry="18" fill="#a5d6a7"/>
  
  <!-- Title -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1b5e20">Introducing yourself / Знакомство</text>
</svg>