<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="snow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
  </defs>
  
  <!-- Background (winter sky) -->
  <rect width="400" height="300" fill="url(#bgPE9)"/>
  
  <!-- Snow ground -->
  <ellipse cx="200" cy="280" rx="220" ry="40" fill="url(#snow)"/>
  
  <!-- Snowflakes -->
  <g fill="white" stroke="#b3e5fc" stroke-width="0.5">
    <circle cx="50" cy="50" r="4">
      <animate attributeName="cy" values="50;250;50" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="30" r="3">
      <animate attributeName="cy" values="30;230;30" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="60" r="4">
      <animate attributeName="cy" values="60;260;60" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="40" r="3">
      <animate attributeName="cy" values="40;240;40" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="80" r="2">
      <animate attributeName="cy" values="80;280;80" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1565c0">Лыжи</text>
  
  <!-- Child on skis -->
  <g transform="translate(200, 160)">
    <animateTransform attributeName="transform" type="translate" values="200,160;210,155;200,160" dur="1s" repeatCount="indefinite"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="18" ry="28" fill="#2196f3"/>
    <!-- Head -->
    <circle cx="0" cy="-40" r="18" fill="#ffcc80"/>
    <!-- Winter hat -->
    <ellipse cx="0" cy="-55" rx="15" ry="12" fill="#f44336"/>
    <circle cx="0" cy="-68" r="6" fill="white"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-43" r="2.5" fill="#333"/>
    <circle cx="5" cy="-43" r="2.5" fill="#333"/>
    <!-- Smile -->
    <path d="M-5 -33 Q0 -28 5 -33" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Goggles -->
    <ellipse cx="-5" cy="-43" rx="5" ry="4" fill="none" stroke="#333" stroke-width="1.5"/>
    <ellipse cx="5" cy="-43" rx="5" ry="4" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Arms with poles -->
    <ellipse cx="-25" cy="-5" rx="10" ry="6" fill="#2196f3"/>
    <ellipse cx="25" cy="-5" rx="10" ry="6" fill="#2196f3"/>
    <!-- Ski poles -->
    <line x1="-30" y1="0" x2="-45" y2="60" stroke="#757575" stroke-width="3"/>
    <line x1="30" y1="0" x2="45" y2="60" stroke="#757575" stroke-width="3"/>
    <!-- Poles baskets -->
    <ellipse cx="-47" cy="60" rx="5" ry="3" fill="#424242"/>
    <ellipse cx="47" cy="60" rx="5" ry="3" fill="#424242"/>
    <!-- Legs -->
    <rect x="-10" y="25" width="8" height="30" rx="3" fill="#1565c0"/>
    <rect x="2" y="25" width="8" height="30" rx="3" fill="#1565c0"/>
    <!-- Boots -->
    <rect x="-12" y="52" width="12" height="10" rx="2" fill="#424242"/>
    <rect x="0" y="52" width="12" height="10" rx="2" fill="#424242"/>
    <!-- Skis -->
    <rect x="-35" y="62" width="60" height="6" rx="3" fill="#795548"/>
    <rect x="-25" y="62" width="60" height="6" rx="3" fill="#795548"/>
    <!-- Ski tips -->
    <path d="M25 62 Q35 58 45 62" fill="#795548"/>
    <path d="M35 62 Q45 58 55 62" fill="#795548"/>
  </g>
  
  <!-- Ski tracks in snow -->
  <g stroke="#90caf9" stroke-width="3" fill="none" opacity="0.5">
    <path d="M50 250 Q100 240 150 250 Q200 260 250 250">
      <animate attributeName="d" values="M50 250 Q100 240 150 250 Q200 260 250 250;M50 250 Q100 260 150 250 Q200 240 250 250" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M70 260 Q120 250 170 260 Q220 270 270 260">
      <animate attributeName="d" values="M70 260 Q120 270 170 260 Q220 250 270 260;M70 260 Q120 250 170 260 Q220 270 270 260" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Pine trees -->
  <g>
    <polygon points="30,200 45,130 60,200" fill="#2e7d32"/>
    <polygon points="370,210 385,150 400,210" fill="#388e3c"/>
    <rect x="40" y="200" width="10" height="20" fill="#795548"/>
    <rect x="380" y="210" width="10" height="18" fill="#795548"/>
  </g>
  
  <!-- Motion lines -->
  <g stroke="#64b5f6" stroke-width="2" opacity="0.4">
    <line x1="130" y1="180" x2="150" y2="180">
      <animate attributeName="x1" values="130;140;130" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="180" x2="270" y2="180">
      <animate attributeName="x1" values="250;260;250" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0d47a1">Первые шаги на лыжах</text>
</svg>