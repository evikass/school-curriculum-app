<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1f5fe"/>
      <stop offset="100%" style="stop-color:#b3e5fc"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE8)"/>
  
  <!-- Gym floor -->
  <rect x="0" y="220" width="400" height="80" fill="#81d4fa"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0277bd">Игры с мячом</text>
  
  <!-- Soccer ball -->
  <g transform="translate(80, 150)">
    <circle r="30" fill="white" stroke="#333" stroke-width="2"/>
    <polygon points="0,-12 10,-5 6,8 -6,8 -10,-5" fill="#333"/>
    <polygon points="0,-25 8,-18 5,-10 -5,-10 -8,-18" fill="#333" transform="rotate(72)"/>
    <polygon points="0,-25 8,-18 5,-10 -5,-10 -8,-18" fill="#333" transform="rotate(144)"/>
    <polygon points="0,-25 8,-18 5,-10 -5,-10 -8,-18" fill="#333" transform="rotate(216)"/>
    <polygon points="0,-25 8,-18 5,-10 -5,-10 -8,-18" fill="#333" transform="rotate(288)"/>
    <text y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#01579b">Футбол ⚽</text>
    <animateTransform attributeName="transform" type="translate" values="80,150;85,145;80,150" dur="0.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Basketball -->
  <g transform="translate(200, 150)">
    <circle r="28" fill="#ff7043" stroke="#e64a19" stroke-width="2"/>
    <path d="M0 -28 Q0 0 0 28" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M-28 0 Q0 0 28 0" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M-20 -20 Q0 0 20 20" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M20 -20 Q0 0 -20 20" stroke="#333" stroke-width="2" fill="none"/>
    <text y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e65100">Баскетбол 🏀</text>
    <animateTransform attributeName="transform" type="translate" values="200,150;195,155;200,150" dur="0.6s" repeatCount="indefinite"/>
  </g>
  
  <!-- Volleyball -->
  <g transform="translate(320, 150)">
    <circle r="26" fill="#fff59d" stroke="#f9a825" stroke-width="2"/>
    <path d="M-15 -20 Q0 -5 15 -20" stroke="#f9a825" stroke-width="2" fill="none"/>
    <path d="M-15 20 Q0 5 15 20" stroke="#f9a825" stroke-width="2" fill="none"/>
    <path d="M-20 -10 Q-5 5 -20 15" stroke="#f9a825" stroke-width="2" fill="none"/>
    <path d="M20 -10 Q5 5 20 15" stroke="#f9a825" stroke-width="2" fill="none"/>
    <text y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f57f17">Волейбол 🏐</text>
    <animateTransform attributeName="transform" type="translate" values="320,150;325,148;320,150" dur="0.55s" repeatCount="indefinite"/>
  </g>
  
  <!-- Child throwing ball -->
  <g transform="translate(100, 80)">
    <ellipse cx="0" cy="0" rx="12" ry="18" fill="#66bb6a"/>
    <circle cx="0" cy="-25" r="12" fill="#ffcc80"/>
    <ellipse cx="0" cy="-33" rx="10" ry="7" fill="#5d4037"/>
    <circle cx="-3" cy="-28" r="1.5" fill="#333"/>
    <circle cx="3" cy="-28" r="1.5" fill="#333"/>
    <!-- Arm throwing -->
    <ellipse cx="18" cy="-10" rx="8" ry="5" fill="#66bb6a" transform="rotate(-30 18 -10)"/>
    <circle cx="25" cy="-18" r="5" fill="#ffcc80"/>
    <!-- Ball in air -->
    <circle cx="40" cy="-25" r="8" fill="#ff5722">
      <animateTransform attributeName="transform" type="translate" values="0,0;10,-20;20,-10;0,0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Child catching -->
  <g transform="translate(300, 80)">
    <ellipse cx="0" cy="0" rx="12" ry="18" fill="#ab47bc"/>
    <circle cx="0" cy="-25" r="12" fill="#ffcc80"/>
    <path d="M-10 -33 Q0 -42 10 -33 Q5 -28 0 -29 Q-5 -28 -10 -33" fill="#8d6e63"/>
    <circle cx="-3" cy="-28" r="1.5" fill="#333"/>
    <circle cx="3" cy="-28" r="1.5" fill="#333"/>
    <!-- Arms ready to catch -->
    <ellipse cx="-18" cy="-5" rx="8" ry="5" fill="#ab47bc" transform="rotate(30 -18 -5)"/>
    <ellipse cx="18" cy="-5" rx="8" ry="5" fill="#ab47bc" transform="rotate(-30 18 -5)"/>
    <circle cx="-18" cy="5" r="5" fill="#ffcc80"/>
    <circle cx="18" cy="5" r="5" fill="#ffcc80"/>
  </g>
  
  <!-- Trajectory arc -->
  <path d="M120 55 Q200 20 290 55" stroke="#0288d1" stroke-width="2" fill="none" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <!-- Target/basket -->
  <g transform="translate(350, 100)">
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#e65100" stroke-width="3"/>
    <rect x="-15" y="0" width="30" height="20" fill="none" stroke="#e65100" stroke-width="3"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#01579b">Передача, броски, ловля мяча</text>
</svg>