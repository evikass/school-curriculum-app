<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes clap { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
      @keyframes wave { 0% { transform: translateX(-3px); } 100% { transform: translateX(3px); } }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      .syllable { animation: clap 1.5s ease-in-out infinite; }
      .word { animation: wave 2s ease-in-out infinite alternate; }
      .vowel { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#eff6ff"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1d4ed8">Деление слов на слоги 📊</text>
  
  <!-- Main rule -->
  <rect x="20" y="50" width="460" height="50" fill="#dbeafe" rx="10"/>
  <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">Сколько гласных — столько и слогов!</text>
  
  <!-- Example 1: DOM -->
  <rect x="20" y="115" width="150" height="100" fill="#fef3c7" rx="12"/>
  <text x="95" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b45309">1 гласная = 1 слог</text>
  <g class="syllable">
    <rect x="50" y="155" width="90" height="40" fill="#f59e0b" rx="8"/>
    <text x="95" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">ДОМ</text>
  </g>
  <g class="vowel">
    <circle cx="95" cy="222" r="12" fill="#ef4444"/>
    <text x="95" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">О</text>
  </g>
  
  <!-- Example 2: MAMA -->
  <rect x="180" y="115" width="140" height="100" fill="#dcfce7" rx="12"/>
  <text x="250" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">2 гласных = 2 слога</text>
  <g class="syllable">
    <rect x="195" y="155" width="40" height="40" fill="#22c55e" rx="8"/>
    <text x="215" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">МА</text>
  </g>
  <text x="250" y="180" font-family="Arial, sans-serif" font-size="24" fill="#166534">—</text>
  <g class="syllable" style="animation-delay: 0.3s">
    <rect x="265" y="155" width="40" height="40" fill="#16a34a" rx="8"/>
    <text x="285" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">МА</text>
  </g>
  <g class="vowel">
    <circle cx="215" cy="222" r="12" fill="#ef4444"/>
    <text x="215" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">А</text>
  </g>
  <g class="vowel" style="animation-delay: 0.3s">
    <circle cx="285" cy="222" r="12" fill="#ef4444"/>
    <text x="285" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">А</text>
  </g>
  
  <!-- Example 3: MOLOKO -->
  <rect x="330" y="115" width="150" height="100" fill="#f3e8ff" rx="12"/>
  <text x="405" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">3 гласных = 3 слога</text>
  <g class="syllable">
    <rect x="345" y="155" width="30" height="40" fill="#a855f7" rx="6"/>
    <text x="360" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">МО</text>
  </g>
  <text x="385" y="175" font-family="Arial, sans-serif" font-size="16" fill="#7c3aed">—</text>
  <g class="syllable" style="animation-delay: 0.2s">
    <rect x="395" y="155" width="30" height="40" fill="#9333ea" rx="6"/>
    <text x="410" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">ЛО</text>
  </g>
  <text x="435" y="175" font-family="Arial, sans-serif" font-size="16" fill="#7c3aed">—</text>
  <g class="syllable" style="animation-delay: 0.4s">
    <rect x="445" y="155" width="30" height="40" fill="#7c3aed" rx="6"/>
    <text x="460" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">КО</text>
  </g>
  <g class="vowel">
    <circle cx="360" cy="222" r="10" fill="#ef4444"/>
    <text x="360" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">О</text>
  </g>
  <g class="vowel" style="animation-delay: 0.2s">
    <circle cx="410" cy="222" r="10" fill="#ef4444"/>
    <text x="410" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">О</text>
  </g>
  <g class="vowel" style="animation-delay: 0.4s">
    <circle cx="460" cy="222" r="10" fill="#ef4444"/>
    <text x="460" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">О</text>
  </g>
  
  <!-- Types of syllables -->
  <rect x="20" y="250" width="220" height="90" fill="#f0fdf4" rx="10"/>
  <text x="130" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Открытые слоги</text>
  <text x="130" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Заканчиваются на гласный</text>
  <text x="130" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#22c55e">МА, РО, ТИ, ПА</text>
  
  <rect x="260" y="250" width="220" height="90" fill="#fef2f2" rx="10"/>
  <text x="370" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Закрытые слоги</text>
  <text x="370" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#b91c1c">Заканчиваются на согласный</text>
  <text x="370" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444">АМ, ОР, ИСТ, ОН</text>
</svg>