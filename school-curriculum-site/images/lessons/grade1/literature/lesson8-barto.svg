<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="shelfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="100%" style="stop-color:#5D4037"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#FFF8E1"/>
  
  <!-- Floor -->
  <rect x="0" y="250" width="400" height="50" fill="#D7CCC8"/>
  
  <!-- Bookshelf -->
  <rect x="20" y="30" width="360" height="15" fill="url(#shelfGrad)"/>
  <rect x="20" y="130" width="360" height="15" fill="url(#shelfGrad)"/>
  <rect x="20" y="230" width="360" height="15" fill="url(#shelfGrad)"/>
  
  <!-- Side panels -->
  <rect x="20" y="30" width="10" height="235" fill="#6D4C41"/>
  <rect x="370" y="30" width="10" height="235" fill="#6D4C41"/>
  
  <!-- TOYS ON TOP SHELF -->
  
  <!-- Teddy Bear (Мишка) -->
  <g transform="translate(70, 80)">
    <animateTransform attributeName="transform" type="translate" values="70,80;70,78;70,80" dur="2s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#A1887F"/>
    
    <!-- Head -->
    <circle cx="0" cy="-35" r="22" fill="#A1887F"/>
    
    <!-- Ears -->
    <circle cx="-18" cy="-50" r="8" fill="#8D6E63"/>
    <circle cx="18" cy="-50" r="8" fill="#8D6E63"/>
    
    <!-- Muzzle -->
    <ellipse cx="0" cy="-28" rx="12" ry="10" fill="#D7CCC8"/>
    
    <!-- Eyes -->
    <circle cx="-8" cy="-40" r="4" fill="#212121"/>
    <circle cx="8" cy="-40" r="4" fill="#212121"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-30" rx="5" ry="3" fill="#5D4037"/>
    
    <!-- Arms -->
    <ellipse cx="-25" cy="-5" rx="12" ry="18" fill="#8D6E63"/>
    <ellipse cx="25" cy="-5" rx="12" ry="18" fill="#8D6E63"/>
    
    <!-- Patch on arm -->
    <rect x="18" y="-15" width="10" height="10" fill="#D32F2F" rx="2"/>
  </g>
  
  <!-- Bunny (Зайка) -->
  <g transform="translate(160, 80)">
    <animateTransform attributeName="transform" type="translate" values="160,80;162,80;160,80" dur="1.5s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#E0E0E0"/>
    
    <!-- Head -->
    <circle cx="0" cy="-28" r="16" fill="#E0E0E0"/>
    
    <!-- Ears -->
    <ellipse cx="-10" cy="-55" rx="6" ry="20" fill="#E0E0E0"/>
    <ellipse cx="10" cy="-55" rx="6" ry="20" fill="#E0E0E0"/>
    <ellipse cx="-10" cy="-55" rx="3" ry="15" fill="#FFCDD2"/>
    <ellipse cx="10" cy="-55" rx="3" ry="15" fill="#FFCDD2"/>
    
    <!-- Eyes (sad) -->
    <ellipse cx="-5" cy="-32" rx="3" ry="4" fill="#212121"/>
    <ellipse cx="5" cy="-32" rx="3" ry="4" fill="#212121"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="-24" rx="4" ry="3" fill="#FFCDD2"/>
    
    <!-- Whiskers -->
    <line x1="-15" y1="-24" x2="-25" y2="-26" stroke="#9E9E9E" stroke-width="1"/>
    <line x1="15" y1="-24" x2="25" y2="-26" stroke="#9E9E9E" stroke-width="1"/>
    
    <!-- Water drops (from rain) -->
    <ellipse cx="-8" cy="5" rx="3" ry="4" fill="#64B5F6" opacity="0.7">
      <animate attributeName="cy" values="5;15;5" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Ball (Мяч) -->
  <g transform="translate(250, 75)">
    <circle cx="0" cy="0" r="22" fill="#F44336"/>
    <path d="M-18,-10 Q0,20 18,-10" stroke="white" stroke-width="3" fill="none"/>
    <path d="M-18,10 Q0,-20 18,10" stroke="white" stroke-width="3" fill="none"/>
    <animateTransform attributeName="transform" type="rotate" values="0 250 75;10 250 75;0 250 75" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Horse on wheels (Лошадка) -->
  <g transform="translate(330, 85)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#795548"/>
    
    <!-- Head -->
    <ellipse cx="-25" cy="-15" rx="12" ry="15" fill="#795548"/>
    
    <!-- Mane -->
    <path d="M-20,-28 Q-15,-35 -10,-28 Q-5,-35 0,-28" stroke="#4E342E" stroke-width="4" fill="none"/>
    
    <!-- Eye -->
    <circle cx="-28" cy="-18" r="3" fill="#212121"/>
    
    <!-- Legs -->
    <rect x="-18" y="12" width="6" height="15" fill="#5D4037"/>
    <rect x="10" y="12" width="6" height="15" fill="#5D4037"/>
    
    <!-- Wheels -->
    <circle cx="-15" cy="30" r="8" fill="#FF9800"/>
    <circle cx="15" cy="30" r="8" fill="#FF9800"/>
    <circle cx="-15" cy="30" r="3" fill="#F57C00"/>
    <circle cx="15" cy="30" r="3" fill="#F57C00"/>
  </g>
  
  <!-- MIDDLE SHELF - Books -->
  
  <!-- Book 1 -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="15" height="45" fill="#3F51B5" rx="2"/>
    <rect x="2" y="5" width="11" height="2" fill="#C5CAE9"/>
    <rect x="2" y="10" width="11" height="2" fill="#C5CAE9"/>
  </g>
  
  <!-- Book 2 -->
  <g transform="translate(70, 175)">
    <rect x="0" y="0" width="12" height="50" fill="#4CAF50" rx="2"/>
  </g>
  
  <!-- Book 3 -->
  <g transform="translate(87, 180)">
    <rect x="0" y="0" width="18" height="45" fill="#FF5722" rx="2"/>
    <text x="9" y="30" text-anchor="middle" font-size="8" fill="white">Барто</text>
  </g>
  
  <!-- Book 4 -->
  <g transform="translate(110, 178)">
    <rect x="0" y="0" width="14" height="47" fill="#9C27B0" rx="2"/>
  </g>
  
  <!-- Bull (Бычок) -->
  <g transform="translate(170, 190)">
    <animateTransform attributeName="transform" type="translate" values="170,190;172,188;170,190" dur="1s" repeatCount="indefinite"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="20" ry="15" fill="#FFCC80"/>
    
    <!-- Head -->
    <circle cx="20" cy="-5" r="12" fill="#FFCC80"/>
    
    <!-- Horns -->
    <path d="M15,-15 Q10,-25 5,-20" stroke="#5D4037" stroke-width="4" fill="none"/>
    <path d="M25,-15 Q30,-25 35,-20" stroke="#5D4037" stroke-width="4" fill="none"/>
    
    <!-- Eyes -->
    <circle cx="18" cy="-7" r="3" fill="#212121"/>
    <circle cx="26" cy="-7" r="3" fill="#212121"/>
    
    <!-- Nose -->
    <ellipse cx="28" cy="0" rx="5" ry="4" fill="#FF8A65"/>
    
    <!-- Legs -->
    <rect x="-12" y="12" width="6" height="12" fill="#FFB74D"/>
    <rect x="8" y="12" width="6" height="12" fill="#FFB74D"/>
    
    <!-- Tail -->
    <path d="M-20,0 Q-30,5 -25,10" stroke="#5D4037" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Elephant (Слон) -->
  <g transform="translate(280, 185)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#90A4AE"/>
    
    <!-- Head -->
    <circle cx="25" cy="-10" r="15" fill="#90A4AE"/>
    
    <!-- Trunk -->
    <path d="M35,-5 Q45,10 40,25 Q38,30 35,25" stroke="#78909C" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Ears -->
    <ellipse cx="15" cy="-20" rx="12" ry="18" fill="#B0BEC5"/>
    
    <!-- Eyes -->
    <circle cx="30" cy="-12" r="3" fill="#212121"/>
    
    <!-- Legs -->
    <rect x="-20" y="15" width="10" height="15" fill="#78909C"/>
    <rect x="-5" y="15" width="10" height="15" fill="#78909C"/>
    <rect x="10" y="15" width="10" height="15" fill="#78909C"/>
  </g>
  
  <!-- BOTTOM SHELF - More toys -->
  
  <!-- Doll (Кукла) -->
  <g transform="translate(60, 270)">
    <!-- Dress -->
    <path d="M0,-15 L-15,20 L15,20 Z" fill="#E91E63"/>
    
    <!-- Head -->
    <circle cx="0" cy="-25" r="15" fill="#FFCC80"/>
    
    <!-- Hair -->
    <ellipse cx="0" cy="-35" rx="14" ry="10" fill="#5D4037"/>
    <ellipse cx="-12" cy="-25" rx="5" ry="15" fill="#5D4037"/>
    <ellipse cx="12" cy="-25" rx="5" ry="15" fill="#5D4037"/>
    
    <!-- Eyes -->
    <circle cx="-5" cy="-28" r="3" fill="#2196F3"/>
    <circle cx="5" cy="-28" r="3" fill="#2196F3"/>
    
    <!-- Smile -->
    <path d="M-5,-20 Q0,-15 5,-20" stroke="#E91E63" stroke-width="2" fill="none"/>
    
    <!-- Arms -->
    <line x1="-15" y1="-5" x2="-25" y2="5" stroke="#FFCC80" stroke-width="6" stroke-linecap="round"/>
    <line x1="15" y1="-5" x2="25" y2="5" stroke="#FFCC80" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Pyramid (Пирамидка) -->
  <g transform="translate(150, 260)">
    <!-- Base -->
    <ellipse cx="0" cy="15" rx="30" ry="8" fill="#4CAF50"/>
    <rect x="-30" y="5" width="60" height="10" fill="#4CAF50"/>
    
    <!-- Middle ring -->
    <ellipse cx="0" cy="0" rx="22" ry="6" fill="#FFEB3B"/>
    <rect x="-22" y="-8" width="44" height="8" fill="#FFEB3B"/>
    
    <!-- Top ring -->
    <ellipse cx="0" cy="-15" rx="14" ry="4" fill="#FF5722"/>
    <rect x="-14" y="-20" width="28" height="5" fill="#FF5722"/>
    
    <!-- Pole -->
    <rect x="-3" y="-35" width="6" height="45" fill="#795548"/>
    
    <!-- Top ball -->
    <circle cx="0" cy="-38" r="8" fill="#F44336"/>
  </g>
  
  <!-- Cubes (Кубики) -->
  <g transform="translate(250, 265)">
    <rect x="0" y="0" width="20" height="20" fill="#F44336" rx="2"/>
    <text x="10" y="15" text-anchor="middle" font-size="12" fill="white">А</text>
    
    <rect x="22" y="0" width="20" height="20" fill="#2196F3" rx="2"/>
    <text x="32" y="15" text-anchor="middle" font-size="12" fill="white">Б</text>
    
    <rect x="11" y="-22" width="20" height="20" fill="#4CAF50" rx="2"/>
    <text x="21" y="-7" text-anchor="middle" font-size="12" fill="white">В</text>
  </g>
  
  <!-- Author name -->
  <text x="200" y="20" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#E91E63">
    А.Л. Барто «Игрушки»
  </text>
</svg>