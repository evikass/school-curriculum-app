<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#grad1)" stroke-width="3" rx="5" ry="5"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#34495e" stroke-width="1" rx="3" ry="3" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#grad1)">Урок 33: Тригонометрическая форма комплексного числа</text>
  
  <!-- Подзаголовок -->
  <text x="250" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34495e">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <rect x="20" y="20" width="60" height="30" fill="url(#grad2)" rx="15" ry="15"/>
  <text x="50" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">33</text>
  
  <!-- Система координат -->
  <line x1="150" y1="200" x2="350" y2="200" stroke="#34495e" stroke-width="2"/>
  <line x1="250" y1="100" x2="250" y2="300" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="350,200 340,195 340,205" fill="#34495e"/>
  <polygon points="250,100 245,110 255,110" fill="#34495e"/>
  
  <!-- Ось Re -->
  <text x="355" y="205" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Re</text>
  
  <!-- Ось Im -->
  <text x="255" y="95" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Im</text>
  
  <!-- Точка комплексного числа -->
  <circle cx="300" cy="150" r="5" fill="url(#grad2)"/>
  
  <!-- Вектор от начала координат к точке -->
  <line x1="250" y1="200" x2="300" y2="150" stroke="url(#grad2)" stroke-width="3"/>
  
  <!-- Длина вектора r -->
  <path d="M 260 195 Q 275 175 285 160" fill="none" stroke="#e67e22" stroke-width="1.5"/>
  <text x="270" y="180" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">r</text>
  
  <!-- Угол φ -->
  <path d="M 270 200 A 20 20 0 0 0 275 185" fill="none" stroke="#27ae60" stroke-width="1.5"/>
  <text x="280" y="190" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">φ</text>
  
  <!-- Прямоугольный треугольник -->
  <line x1="300" y1="150" x2="300" y2="200" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="250" y1="200" x2="300" y2="200" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Проекция на ось Re -->
  <text x="270" y="215" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">a = r·cos φ</text>
  
  <!-- Проекция на ось Im -->
  <text x="305" y="175" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6" transform="rotate(-90, 305, 175)">b = r·sin φ</text>
  
  <!-- Комплексное число z -->
  <circle cx="300" cy="150" r="3" fill="#e74c3c"/>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">z</text>
  
  <!-- Формула тригонометрической формы -->
  <rect x="50" y="240" width="400" height="70" fill="white" stroke="#34495e" stroke-width="1" rx="5" ry="5"/>
  <text x="250" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34495e">z = r(cos φ + i sin φ)</text>
  <text x="250" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">где r = |z| = √(a² + b²) — модуль комплексного числа</text>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">φ = arg(z) — аргумент комплексного числа</text>
  
  <!-- Формула Муавра -->
  <rect x="50" y="20" width="180" height="60" fill="white" stroke="#34495e" stroke-width="1" rx="5" ry="5"/>
  <text x="140" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Формула Муавра:</text>
  <text x="140" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">zⁿ = rⁿ(cos(nφ) + i sin(nφ))</text>
  
  <!-- Единичная окружность -->
  <circle cx="250" cy="200" r="50" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  
  <!-- Точка на единичной окружности -->
  <circle cx="300" cy="200" r="3" fill="#3498db"/>
  <text x="305" y="205" font-family="Arial, sans-serif" font-size="12" fill="#3498db">1</text>
  
  <!-- Точка i на единичной окружности -->
  <circle cx="250" cy="150" r="3" fill="#3498db"/>
  <text x="255" y="145" font-family="Arial, sans-serif" font-size="12" fill="#3498db">i</text>
  
  <!-- Примеры значений -->
  <rect x="320" y="240" width="130" height="60" fill="white" stroke="#34495e" stroke-width="1" rx="5" ry="5"/>
  <text x="385" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Примеры:</text>
  <text x="385" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">z₁ = 2(cos π/4 + i sin π/4)</text>
  <text x="385" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">z₂ = 3(cos π/3 + i sin π/3)</text>
</svg>