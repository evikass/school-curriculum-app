<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4682b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#87ceeb" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e90ff">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4682b4">Урок 38: Итоговое повторение курса алгебры 11 класса</text>
  
  <!-- Номер урока в углу -->
  <text x="460" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#4682b4">№38</text>
  
  <!-- Система координат для графика функции -->
  <line x1="80" y1="280" x2="200" y2="280" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="80" y2="100" stroke="#333" stroke-width="1.5"/>
  <polygon points="200,280 195,275 195,285" fill="#333"/>
  <polygon points="80,100 75,105 85,105" fill="#333"/>
  
  <!-- Ось X и Y подписи -->
  <text x="205" y="285" font-family="Arial, sans-serif" font-size="10" fill="#333">x</text>
  <text x="75" y="95" font-family="Arial, sans-serif" font-size="10" fill="#333">y</text>
  
  <!-- График функции y = x² -->
  <path d="M 90,270 Q 120,220 140,180 T 170,130 Q 190,110 200,100" fill="none" stroke="#ff6347" stroke-width="2"/>
  <text x="210" y="105" font-family="Arial, sans-serif" font-size="10" fill="#ff6347">y = x²</text>
  
  <!-- График функции y = sin(x) -->
  <path d="M 90,190 Q 100,170 110,190 T 130,210 Q 140,190 150,190 T 170,210 Q 180,190 190,190 T 200,210" fill="none" stroke="#32cd32" stroke-width="2"/>
  <text x="210" y="195" font-family="Arial, sans-serif" font-size="10" fill="#32cd32">y = sin(x)</text>
  
  <!-- Сетка координат -->
  <g stroke="#ddd" stroke-width="0.5">
    <line x1="110" y1="280" x2="110" y2="100"/>
    <line x1="140" y1="280" x2="140" y2="100"/>
    <line x1="170" y1="280" x2="170" y2="100"/>
    <line x1="80" y1="250" x2="200" y2="250"/>
    <line x1="80" y1="220" x2="200" y2="220"/>
    <line x1="80" y1="190" x2="200" y2="190"/>
    <line x1="80" y1="160" x2="200" y2="160"/>
    <line x1="80" y1="130" x2="200" y2="130"/>
  </g>
  
  <!-- Формула квадратного уравнения -->
  <rect x="250" y="100" width="220" height="50" fill="#f0f8ff" stroke="#4682b4" stroke-width="1" rx="5"/>
  <text x="360" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">ax² + bx + c = 0</text>
  
  <!-- Дискриминант -->
  <text x="360" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4682b4">D = b² - 4ac</text>
  
  <!-- Корни уравнения -->
  <rect x="250" y="180" width="220" height="40" fill="#f0f8ff" stroke="#4682b4" stroke-width="1" rx="5"/>
  <text x="360" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">x = (-b ± √D) / 2a</text>
  
  <!-- Схема подготовки к ЕГЭ -->
  <rect x="50" y="250" width="400" height="80" fill="#f5f5f5" stroke="#4682b4" stroke-width="1" rx="5"/>
  <text x="250" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4682b4">Подготовка к ЕГЭ</text>
  
  <!-- Блоки подготовки -->
  <rect x="70" y="280" width="80" height="30" fill="#87ceeb" stroke="#4682b4" stroke-width="1" rx="3"/>
  <text x="110" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Теория</text>
  
  <rect x="170" y="280" width="80" height="30" fill="#87ceeb" stroke="#4682b4" stroke-width="1" rx="3"/>
  <text x="210" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Задания</text>
  
  <rect x="270" y="280" width="80" height="30" fill="#87ceeb" stroke="#4682b4" stroke-width="1" rx="3"/>
  <text x="310" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Тренажер</text>
  
  <rect x="370" y="280" width="70" height="30" fill="#87ceeb" stroke="#4682b4" stroke-width="1" rx="3"/>
  <text x="405" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Тест</text>
  
  <!-- Связующие линии -->
  <line x1="150" y1="295" x2="170" y2="295" stroke="#4682b4" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="295" x2="270" y2="295" stroke="#4682b4" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="350" y1="295" x2="370" y2="295" stroke="#4682b4" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Ключевые темы курса -->
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4682b4">Ключевые темы:</text>
  
  <!-- Список тем -->
  <circle cx="70" cy="95" r="3" fill="#ff6347"/>
  <text x="80" y="99" font-family="Arial, sans-serif" font-size="10" fill="#333">Функции и графики</text>
  
  <circle cx="70" cy="110" r="3" fill="#ff6347"/>
  <text x="80" y="114" font-family="Arial, sans-serif" font-size="10" fill="#333">Уравнения и неравенства</text>
  
  <circle cx="70" cy="125" r="3" fill="#ff6347"/>
  <text x="80" y="129" font-family="Arial, sans-serif" font-size="10" fill="#333">Пределы и производные</text>
  
  <circle cx="70" cy="140" r="3" fill="#ff6347"/>
  <text x="80" y="144" font-family="Arial, sans-serif" font-size="10" fill="#333">Интегралы</text>
  
  <circle cx="70" cy="155" r="3" fill="#ff6347"/>
  <text x="80" y="159" font-family="Arial, sans-serif" font-size="10" fill="#333">Комплексные числа</text>
  
  <circle cx="70" cy="170" r="3" fill="#ff6347"/>
  <text x="80" y="174" font-family="Arial, sans-serif" font-size="10" fill="#333">Ряды</text>
  
  <!-- Дополнительные элементы декора -->
  <path d="M 30,30 Q 40,20 50,30 T 70,30" fill="none" stroke="#87ceeb" stroke-width="1.5"/>
  <path d="M 430,30 Q 440,20 450,30 T 470,30" fill="none" stroke="#87ceeb" stroke-width="1.5"/>
  
  <!-- Иконка калькулятора -->
  <rect x="430" y="70" width="40" height="50" fill="#f0f8ff" stroke="#4682b4" stroke-width="1" rx="3"/>
  <rect x="435" y="75" width="30" height="20" fill="#4682b4"/>
  <rect x="435" y="100" width="8" height="8" fill="#4682b4" rx="1"/>
  <rect x="446" y="100" width="8" height="8" fill="#4682b4" rx="1"/>
  <rect x="457" y="100" width="8" height="8" fill="#4682b4" rx="1"/>
  <rect x="435" y="112" width="8" height="8" fill="#4682b4" rx="1"/>
  <rect x="446" y="112" width="8" height="8" fill="#4682b4" rx="1"/>
  <rect x="457" y="112" width="8" height="8" fill="#4682b4" rx="1"/>
  
  <!-- Иконка книги -->
  <rect x="430" y="130" width="40" height="35" fill="#f0f8ff" stroke="#4682b4" stroke-width="1" rx="2"/>
  <line x1="435" y1="140" x2="465" y2="140" stroke="#4682b4" stroke-width="1"/>
  <line x1="435" y1="147" x2="465" y2="147" stroke="#4682b4" stroke-width="1"/>
  <line x1="435" y1="154" x2="455" y2="154" stroke="#4682b4" stroke-width="1"/>
  
  <!-- Дата урока -->
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="10" fill="#4682b4">2023-2024</text>
  
  <!-- Дополнительные математические символы -->
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="16" fill="#4682b4">∫ ∑ √ ∞ ∂</text>
</svg>