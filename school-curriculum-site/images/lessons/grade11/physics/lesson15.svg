<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#4a5568" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#718096" stroke-width="1" rx="3"/>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="#1a202c"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Звуковые волны</text>
  
  <!-- Источник звука (динамик) -->
  <g transform="translate(80, 175)">
    <rect x="-30" y="-25" width="60" height="50" fill="#4a5568" rx="5"/>
    <circle cx="0" cy="0" r="15" fill="#718096"/>
    <circle cx="0" cy="0" r="8" fill="#e2e8f0"/>
    <text x="0" y="-40" text-anchor="middle" fill="#cbd5e0" font-size="14">Источник</text>
    <text x="0" y="-55" text-anchor="middle" fill="#cbd5e0" font-size="12">звука</text>
  </g>
  
  <!-- Звуковые волны -->
  <g transform="translate(110, 175)">
    <!-- Волна 1 -->
    <path d="M0,0 Q20,-20 40,0 T80,0 T120,0" fill="none" stroke="#63b3ed" stroke-width="2" opacity="0.9"/>
    <path d="M0,0 Q20,20 40,0 T80,0 T120,0" fill="none" stroke="#63b3ed" stroke-width="2" opacity="0.9"/>
    
    <!-- Волна 2 -->
    <path d="M0,0 Q25,-25 50,0 T100,0 T150,0" fill="none" stroke="#4299e1" stroke-width="2" opacity="0.7"/>
    <path d="M0,0 Q25,25 50,0 T100,0 T150,0" fill="none" stroke="#4299e1" stroke-width="2" opacity="0.7"/>
    
    <!-- Волна 3 -->
    <path d="M0,0 Q30,-30 60,0 T120,0 T180,0" fill="none" stroke="#3182ce" stroke-width="2" opacity="0.5"/>
    <path d="M0,0 Q30,30 60,0 T120,0 T180,0" fill="none" stroke="#3182ce" stroke-width="2" opacity="0.5"/>
    
    <!-- Волна 4 -->
    <path d="M0,0 Q35,-35 70,0 T140,0 T210,0" fill="none" stroke="#2b6cb0" stroke-width="2" opacity="0.3"/>
    <path d="M0,0 Q35,35 70,0 T140,0 T210,0" fill="none" stroke="#2b6cb0" stroke-width="2" opacity="0.3"/>
  </g>
  
  <!-- Направление распространения -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0"/>
    </marker>
  </defs>
  <line x1="320" y1="175" x2="380" y2="175" stroke="#a0aec0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="350" y="195" text-anchor="middle" fill="#cbd5e0" font-size="12">Распространение</text>
  
  <!-- Шкала громкости в дБ -->
  <g transform="translate(400, 100)">
    <!-- Ось шкалы -->
    <line x1="0" y1="0" x2="0" y2="150" stroke="#718096" stroke-width="2"/>
    
    <!-- Метки шкалы -->
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#718096" stroke-width="1"/>
    <text x="10" y="5" fill="#cbd5e0" font-size="12">120 дБ</text>
    
    <line x1="-5" y1="30" x2="5" y2="30" stroke="#718096" stroke-width="1"/>
    <text x="10" y="35" fill="#cbd5e0" font-size="12">90 дБ</text>
    
    <line x1="-5" y1="60" x2="5" y2="60" stroke="#718096" stroke-width="1"/>
    <text x="10" y="65" fill="#cbd5e0" font-size="12">60 дБ</text>
    
    <line x1="-5" y1="90" x2="5" y2="90" stroke="#718096" stroke-width="1"/>
    <text x="10" y="95" fill="#cbd5e0" font-size="12">30 дБ</text>
    
    <line x1="-5" y1="120" x2="5" y2="120" stroke="#718096" stroke-width="1"/>
    <text x="10" y="125" fill="#cbd5e0" font-size="12">0 дБ</text>
    
    <text x="0" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Громкость</text>
  </g>
  
  <!-- Формула скорости звука -->
  <g transform="translate(250, 280)">
    <rect x="-80" y="-15" width="160" height="30" fill="#2d3748" stroke="#4a5568" stroke-width="1" rx="3"/>
    <text x="0" y="5" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="monospace">v = λ × f</text>
  </g>
  
  <!-- Обозначения -->
  <g transform="translate(250, 310)">
    <text x="-60" y="0" fill="#cbd5e0" font-size="12">v - скорость звука</text>
    <text x="0" y="0" fill="#cbd5e0" font-size="12">λ - длина волны</text>
    <text x="80" y="0" fill="#cbd5e0" font-size="12">f - частота</text>
  </g>
  
  <!-- Частотная шкала -->
  <g transform="translate(110, 240)">
    <line x1="0" y1="0" x2="210" y2="0" stroke="#718096" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#718096" stroke-width="1"/>
    <text x="0" y="15" text-anchor="middle" fill="#cbd5e0" font-size="10">20 Гц</text>
    
    <line x1="105" y1="-3" x2="105" y2="3" stroke="#718096" stroke-width="1"/>
    <text x="105" y="15" text-anchor="middle" fill="#cbd5e0" font-size="10">1 кГц</text>
    
    <line x1="210" y1="-3" x2="210" y2="3" stroke="#718096" stroke-width="1"/>
    <text x="210" y="15" text-anchor="middle" fill="#cbd5e0" font-size="10">20 кГц</text>
    
    <text x="105" y="-10" text-anchor="middle" fill="#cbd5e0" font-size="12">Частота</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <circle cx="180" cy="175" r="3" fill="#63b3ed"/>
  <circle cx="240" cy="175" r="3" fill="#4299e1"/>
  <circle cx="300" cy="175" r="3" fill="#3182ce"/>
  
  <!-- Уровни громкости -->
  <rect x="400" y="50" width="5" height="10" fill="#e53e3e"/>
  <rect x="400" y="80" width="5" height="10" fill="#dd6b20"/>
  <rect x="400" y="110" width="5" height="10" fill="#d69e2e"/>
  <rect x="400" y="140" width="5" height="10" fill="#38a169"/>
</svg>