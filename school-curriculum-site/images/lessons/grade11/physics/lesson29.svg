<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Тёмный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a7c7e" stroke-width="2" rx="5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#e94560">Эффект Комптона</text>
  
  <!-- Входящий фотон -->
  <g id="photon-in">
    <line x1="50" y1="150" x2="150" y2="150" stroke="#ffd700" stroke-width="3" marker-end="url(#arrowhead1)"/>
    <text x="100" y="140" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ffd700">ν</text>
  </g>
  
  <!-- Электрон в покое -->
  <g id="electron">
    <circle cx="200" cy="150" r="15" fill="#00bfff" stroke="#ffffff" stroke-width="2"/>
    <text x="200" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">e⁻</text>
    <text x="200" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">в покое</text>
  </g>
  
  <!-- Рассеянный фотон -->
  <g id="photon-out">
    <line x1="200" y1="150" x2="300" y2="100" stroke="#ff6347" stroke-width="3" marker-end="url(#arrowhead2)"/>
    <text x="250" y="115" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ff6347">ν'</text>
    <text x="320" y="95" font-family="Arial, sans-serif" font-size="12" fill="#ff6347">θ</text>
    <path d="M 310 90 A 20 20 0 0 1 330 100" fill="none" stroke="#ff6347" stroke-width="1.5"/>
  </g>
  
  <!-- Отлетевший электрон -->
  <g id="electron-out">
    <line x1="200" y1="150" x2="120" y2="220" stroke="#00ff00" stroke-width="3" marker-end="url(#arrowhead3)"/>
    <circle cx="120" cy="220" r="12" fill="#00ff00" stroke="#ffffff" stroke-width="1.5"/>
    <text x="120" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000000">e⁻</text>
    <text x="90" y="235" font-family="Arial, sans-serif" font-size="12" fill="#00ff00">φ</text>
  </g>
  
  <!-- Формула эффекта Комптона -->
  <g id="formula">
    <rect x="150" y="260" width="200" height="50" fill="#0f3460" stroke="#4a7c7e" stroke-width="1" rx="3"/>
    <text x="250" y="285" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#e94560">Δλ = λ_C(1 - cos θ)</text>
    <text x="250" y="305" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ffffff">λ_C = h/(m_e c) = 2.43 pm</text>
  </g>
  
  <!-- Определения -->
  <g id="definitions">
    <text x="30" y="320" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Δλ - изменение длины волны</text>
    <text x="30" y="340" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">θ - угол рассеяния фотона</text>
  </g>
  
  <!-- Сетка для наглядности -->
  <g id="grid" opacity="0.2">
    <line x1="0" y1="150" x2="500" y2="150" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="200" y1="50" x2="200" y2="250" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Стрелки-маркеры -->
  <defs>
    <marker id="arrowhead1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd700"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6347"/>
    </marker>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff00"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы для иллюстрации -->
  <g id="wave-pattern">
    <path d="M 50 150 Q 60 145, 70 150 T 90 150 T 110 150 T 130 150" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
    <path d="M 200 150 Q 210 145, 220 150 T 240 150 T 260 150" fill="none" stroke="#ff6347" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Аннотации -->
  <g id="annotations">
    <circle cx="200" cy="150" r="25" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    <text x="240" y="130" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">точка столкновения</text>
  </g>
</svg>