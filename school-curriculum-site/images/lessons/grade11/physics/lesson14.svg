<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.5" fill="#34495e" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <text x="460" y="30" font-family="Arial, sans-serif" font-size="12" fill="#34495e" text-anchor="end">Урок 14</text>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="14" fill="#34495e" text-anchor="middle">Механические волны и их свойства</text>
  
  <!-- Поперечная волна -->
  <g transform="translate(30, 100)">
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Поперечная волна</text>
    
    <!-- Ось -->
    <line x1="0" y1="30" x2="200" y2="30" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#34495e" stroke-width="1"/>
    <polygon points="200,30 205,25 205,35" fill="#34495e"/>
    <polygon points="0,30 -5,25 -5,35" fill="#34495e"/>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">Направление распространения</text>
    
    <!-- Частицы и волна -->
    <circle cx="20" cy="30" r="3" fill="#3498db"/>
    <line x1="20" y1="30" x2="20" y2="15" stroke="#3498db" stroke-width="2"/>
    <line x1="20" y1="30" x2="20" y2="45" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="40" cy="30" r="3" fill="#3498db"/>
    <line x1="40" y1="30" x2="40" y2="35" stroke="#3498db" stroke-width="2"/>
    <line x1="40" y1="30" x2="40" y2="25" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="60" cy="30" r="3" fill="#3498db"/>
    <line x1="60" y1="30" x2="60" y2="45" stroke="#3498db" stroke-width="2"/>
    <line x1="60" y1="30" x2="60" y2="15" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="80" cy="30" r="3" fill="#3498db"/>
    <line x1="80" y1="30" x2="80" y2="25" stroke="#3498db" stroke-width="2"/>
    <line x1="80" y1="30" x2="80" y2="35" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="100" cy="30" r="3" fill="#3498db"/>
    <line x1="100" y1="30" x2="100" y2="15" stroke="#3498db" stroke-width="2"/>
    <line x1="100" y1="30" x2="100" y2="45" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="120" cy="30" r="3" fill="#3498db"/>
    <line x1="120" y1="30" x2="120" y2="35" stroke="#3498db" stroke-width="2"/>
    <line x1="120" y1="30" x2="120" y2="25" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="140" cy="30" r="3" fill="#3498db"/>
    <line x1="140" y1="30" x2="140" y2="45" stroke="#3498db" stroke-width="2"/>
    <line x1="140" y1="30" x2="140" y2="15" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="160" cy="30" r="3" fill="#3498db"/>
    <line x1="160" y1="30" x2="160" y2="25" stroke="#3498db" stroke-width="2"/>
    <line x1="160" y1="30" x2="160" y2="35" stroke="#3498db" stroke-width="2"/>
    
    <circle cx="180" cy="30" r="3" fill="#3498db"/>
    <line x1="180" y1="30" x2="180" y2="15" stroke="#3498db" stroke-width="2"/>
    <line x1="180" y1="30" x2="180" y2="45" stroke="#3498db" stroke-width="2"/>
    
    <!-- Длина волны -->
    <line x1="20" y1="55" x2="60" y2="55" stroke="#e74c3c" stroke-width="2"/>
    <line x1="20" y1="52" x2="20" y2="58" stroke="#e74c3c" stroke-width="2"/>
    <line x1="60" y1="52" x2="60" y2="58" stroke="#e74c3c" stroke-width="2"/>
    <text x="40" y="70" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" text-anchor="middle">λ</text>
    <text x="40" y="82" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c" text-anchor="middle">длина волны</text>
  </g>
  
  <!-- Продольная волна -->
  <g transform="translate(270, 100)">
    <text x="0" y="-10" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Продольная волна</text>
    
    <!-- Ось -->
    <line x1="0" y1="30" x2="200" y2="30" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="50" stroke="#34495e" stroke-width="1"/>
    <polygon points="200,30 205,25 205,35" fill="#34495e"/>
    <polygon points="0,30 -5,25 -5,35" fill="#34495e"/>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">Направление распространения</text>
    
    <!-- Частицы и волна -->
    <circle cx="20" cy="30" r="3" fill="#e74c3c"/>
    <line x1="20" y1="30" x2="20" y2="15" stroke="#e74c3c" stroke-width="2"/>
    <line x1="20" y1="30" x2="20" y2="45" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="40" cy="30" r="3" fill="#e74c3c"/>
    <line x1="40" y1="30" x2="40" y2="20" stroke="#e74c3c" stroke-width="2"/>
    <line x1="40" y1="30" x2="40" y2="40" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="60" cy="30" r="3" fill="#e74c3c"/>
    <line x1="60" y1="30" x2="60" y2="30" stroke="#e74c3c" stroke-width="2"/>
    <line x1="60" y1="30" x2="60" y2="30" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="80" cy="30" r="3" fill="#e74c3c"/>
    <line x1="80" y1="30" x2="80" y2="40" stroke="#e74c3c" stroke-width="2"/>
    <line x1="80" y1="30" x2="80" y2="20" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="100" cy="30" r="3" fill="#e74c3c"/>
    <line x1="100" y1="30" x2="100" y2="45" stroke="#e74c3c" stroke-width="2"/>
    <line x1="100" y1="30" x2="100" y2="15" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="120" cy="30" r="3" fill="#e74c3c"/>
    <line x1="120" y1="30" x2="120" y2="20" stroke="#e74c3c" stroke-width="2"/>
    <line x1="120" y1="30" x2="120" y2="40" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="140" cy="30" r="3" fill="#e74c3c"/>
    <line x1="140" y1="30" x2="140" y2="30" stroke="#e74c3c" stroke-width="2"/>
    <line x1="140" y1="30" x2="140" y2="30" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="160" cy="30" r="3" fill="#e74c3c"/>
    <line x1="160" y1="30" x2="160" y2="40" stroke="#e74c3c" stroke-width="2"/>
    <line x1="160" y1="30" x2="160" y2="20" stroke="#e74c3c" stroke-width="2"/>
    
    <circle cx="180" cy="30" r="3" fill="#e74c3c"/>
    <line x1="180" y1="30" x2="180" y2="45" stroke="#e74c3c" stroke-width="2"/>
    <line x1="180" y1="30" x2="180" y2="15" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Длина волны -->
    <line x1="20" y1="55" x2="60" y2="55" stroke="#3498db" stroke-width="2"/>
    <line x1="20" y1="52" x2="20" y2="58" stroke="#3498db" stroke-width="2"/>
    <line x1="60" y1="52" x2="60" y2="58" stroke="#3498db" stroke-width="2"/>
    <text x="40" y="70" font-family="Arial, sans-serif" font-size="10" fill="#3498db" text-anchor="middle">λ</text>
    <text x="40" y="82" font-family="Arial, sans-serif" font-size="9" fill="#3498db" text-anchor="middle">длина волны</text>
  </g>
  
  <!-- Формулы скорости волны -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="400" height="100" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Скорость распространения волны</text>
    
    <text x="50" y="45" font-family="Arial, sans-serif" font-size="12" fill="#34495e">v = λ/T</text>
    <text x="50" y="60" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где:</text>
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">v - скорость распространения волны</text>
    <text x="50" y="88" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">λ - длина волны, T - период</text>
    
    <text x="200" y="45" font-family="Arial, sans-serif" font-size="12" fill="#34495e">v = λ·f</text>
    <text x="200" y="60" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где:</text>
    <text x="200" y="75" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">v - скорость распространения волны</text>
    <text x="200" y="88" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">λ - длина волны, f - частота</text>
    
    <text x="320" y="45" font-family="Arial, sans-serif" font-size="12" fill="#34495e">v = ω/k</text>
    <text x="320" y="60" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где:</text>
    <text x="320" y="75" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">v - фазовая скорость</text>
    <text x="320" y="88" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">ω - циклическая частота, k - волновое число</text>
  </g>
  
  <!-- График зависимости скорости от частоты -->
  <g transform="translate(50, 340)">
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="0" x2="100" y2="0" stroke="#34495e" stroke-width="1"/>
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">f, Гц</text>
    <text x="-10" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">v, м/с</text>
    
    <line x1="0" y1="0" x2="80" y2="-30" stroke="#27ae60" stroke-width="2"/>
    <circle cx="20" cy="-7.5" r="2" fill="#27ae60"/>
    <circle cx="40" cy="-15" r="2" fill="#27ae60"/>
    <circle cx="60" cy="-22.5" r="2" fill="#27ae60"/>
    <circle cx="80" cy="-30" r="2" fill="#27ae60"/>
    
    <text x="50" y="-35" font-family="Arial, sans-serif" font-size="10" fill="#27ae60" text-anchor="middle">v = f·const</text>
  </g>
</svg>