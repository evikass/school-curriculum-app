<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#43a047;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8e24aa;stop-opacity:0.8" />
    </linearGradient>
    
    <radialGradient id="lightGradient">
      <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:0.3" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Двойная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#1565c0" stroke-width="2" />
  <rect x="8" y="8" width="484" height="334" fill="none" stroke="#0d47a1" stroke-width="1" />
  
  <!-- Подзаголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0d47a1">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок -->
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565c0">ЭЛЕКТРОМАГНИТНЫЕ ВОЛНЫ</text>
  
  <!-- Номер урока -->
  <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">урок 17</text>
  
  <!-- Схема ЭМВ -->
  <g transform="translate(50, 100)">
    <!-- Ось распространения волны -->
    <line x1="0" y1="100" x2="350" y2="100" stroke="#333" stroke-width="2" />
    <polygon points="350,100 340,95 340,105" fill="#333" />
    <text x="355" y="105" font-family="Arial, sans-serif" font-size="12" fill="#333">c</text>
    <text x="180" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">направление распространения</text>
    
    <!-- Волна E (электрическое поле) -->
    <path d="M0,100 Q25,50 50,100 T100,100 T150,100 T200,100 T250,100 T300,100 T350,100" 
          stroke="#e53935" stroke-width="2" fill="none" />
    <path d="M0,100 Q25,150 50,100 T100,100 T150,100 T200,100 T250,100 T300,100 T350,100" 
          stroke="#e53935" stroke-width="2" fill="none" />
    <text x="-20" y="105" font-family="Arial, sans-serif" font-size="14" fill="#e53935" font-weight="bold">E</text>
    
    <!-- Волна B (магнитное поле) -->
    <g transform="translate(0, 100)">
      <ellipse cx="25" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
      <ellipse cx="75" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
      <ellipse cx="125" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
      <ellipse cx="175" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
      <ellipse cx="225" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
      <ellipse cx="275" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
      <ellipse cx="325" cy="0" rx="20" ry="15" stroke="#1976d2" stroke-width="2" fill="none" transform="rotate(90)" />
    </g>
    <text x="-20" y="70" font-family="Arial, sans-serif" font-size="14" fill="#1976d2" font-weight="bold">B</text>
    
    <!-- Векторы перпендикулярности -->
    <line x1="100" y1="80" x2="100" y2="120" stroke="#333" stroke-width="1" stroke-dasharray="2,2" />
    <line x1="80" y1="100" x2="120" y2="100" stroke="#333" stroke-width="1" stroke-dasharray="2,2" />
    <text x="130" y="105" font-family="Arial, sans-serif" font-size="10" fill="#333">⊥</text>
  </g>
  
  <!-- Формула скорости света -->
  <g transform="translate(50, 240)">
    <rect x="-10" y="-15" width="200" height="40" fill="#f5f5f5" stroke="#333" stroke-width="1" rx="5" />
    <text x="90" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">c = 1/√(ε₀μ₀)</text>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">c ≈ 3·10⁸ м/с</text>
  </g>
  
  <!-- Шкала ЭМВ -->
  <g transform="translate(280, 150)">
    <rect x="0" y="0" width="200" height="150" fill="#f9f9f9" stroke="#333" stroke-width="1" rx="5" />
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">ШКАЛА ЭМВ</text>
    
    <!-- Радиоволны -->
    <rect x="10" y="30" width="180" height="15" fill="#ff9800" opacity="0.7" />
    <text x="15" y="42" font-family="Arial, sans-serif" font-size="10" fill="#333">Радиоволны</text>
    <text x="175" y="42" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">10³-10⁶ м</text>
    
    <!-- ИК -->
    <rect x="10" y="50" width="180" height="15" fill="#f44336" opacity="0.7" />
    <text x="15" y="62" font-family="Arial, sans-serif" font-size="10" fill="#fff">ИК</text>
    <text x="175" y="62" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#fff">10⁻³-10⁻⁶ м</text>
    
    <!-- Свет -->
    <rect x="10" y="70" width="180" height="15" fill="#ffeb3b" opacity="0.7" />
    <text x="15" y="82" font-family="Arial, sans-serif" font-size="10" fill="#333">Свет</text>
    <text x="175" y="82" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#333">4·10⁻⁷-7·10⁻⁷ м</text>
    
    <!-- УФ -->
    <rect x="10" y="90" width="180" height="15" fill="#8bc34a" opacity="0.7" />
    <text x="15" y="102" font-family="Arial, sans-serif" font-size="10" fill="#fff">УФ</text>
    <text x="175" y="102" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#fff">10⁻⁷-10⁻⁸ м</text>
    
    <!-- Рентген -->
    <rect x="10" y="110" width="180" height="15" fill="#2196f3" opacity="0.7" />
    <text x="15" y="122" font-family="Arial, sans-serif" font-size="10" fill="#fff">Рентген</text>
    <text x="175" y="122" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#fff">10⁻⁸-10¹¹ м</text>
    
    <!-- Гамма -->
    <rect x="10" y="130" width="180" height="15" fill="#9c27b0" opacity="0.7" />
    <text x="15" y="142" font-family="Arial, sans-serif" font-size="10" fill="#fff">γ</text>
    <text x="175" y="142" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#fff">&lt;10⁻¹¹ м</text>
  </g>
  
  <!-- Солнце как источник ЭМВ -->
  <g transform="translate(120, 80)">
    <circle cx="0" cy="0" r="25" fill="url(#lightGradient)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="20" fill="#ffeb3b" />
    
    <!-- Лучи -->
    <g stroke="#ff9800" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-30" x2="0" y2="-40" />
      <line x1="21" y1="-21" x2="28" y2="-28" />
      <line x1="30" y1="0" x2="40" y2="0" />
      <line x1="21" y1="21" x2="28" y2="28" />
      <line x1="0" y1="30" x2="0" y2="40" />
      <line x1="-21" y1="21" x2="-28" y2="28" />
      <line x1="-30" y1="0" x2="-40" y2="0" />
      <line x1="-21" y1="-21" x2="-28" y2="-28" />
    </g>
    
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Солнце</text>
    <text x="0" y="-50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">источник ЭМВ</text>
  </g>
  
  <!-- Уравнение Максвелла -->
  <g transform="translate(50, 300)">
    <rect x="-10" y="-15" width="160" height="30" fill="#e8f5e9" stroke="#333" stroke-width="1" rx="3" />
    <text x="70" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">∇ × E = -∂B/∂t</text>
  </g>
  
  <!-- Дополнительные подписи -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" fill="#666">взаимно перпендикулярные векторы</text>
  
  <!-- Легенда -->
  <g transform="translate(280, 20)">
    <rect x="0" y="0" width="120" height="100" fill="#fffde7" stroke="#333" stroke-width="1" rx="5" />
    <text x="60" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Легенда</text>
    
    <line x1="10" y1="30" x2="30" y2="30" stroke="#e53935" stroke-width="2" />
    <text x="35" y="34" font-family="Arial, sans-serif" font-size="9" fill="#333">E - электрическое поле</text>
    
    <line x1="10" y1="50" x2="30" y2="50" stroke="#1976d2" stroke-width="2" />
    <text x="35" y="54" font-family="Arial, sans-serif" font-size="9" fill="#333">B - магнитное поле</text>
    
    <line x1="10" y1="70" x2="30" y2="70" stroke="#333" stroke-width="2" />
    <text x="35" y="74" font-family="Arial, sans-serif" font-size="9" fill="#333">c - скорость света</text>
    
    <text x="10" y="92" font-family="Arial, sans-serif" font-size="8" fill="#666">λ - длина волны</text>
  </g>
  
  <!-- Дополнительные элементы для достижения 80+ -->
  <circle cx="250" cy="280" r="3" fill="#333" />
  <circle cx="260" cy="280" r="3" fill="#333" />
  <circle cx="270" cy="280" r="3" fill="#333" />
  <circle cx="280" cy="280" r="3" fill="#333" />
  <circle cx="290" cy="280" r="3" fill="#333" />
  
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="9" fill="#666">спектр ЭМВ</text>
  
  <path d="M250,310 Q260,305 270,310 T290,310" stroke="#9c27b0" stroke-width="1" fill="none" />
  <path d="M250,315 Q260,320 270,315 T290,315" stroke="#9c27b0" stroke-width="1" fill="none" />
  
  <rect x="220" y="320" width="120" height="20" fill="#e1f5fe" stroke="#0288d1" stroke-width="1" rx="3" />
  <text x="280" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0288d1">f = c/λ</text>
</svg>