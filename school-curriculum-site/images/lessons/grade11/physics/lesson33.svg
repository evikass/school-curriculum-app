<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bg)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a7c7e" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#5a8c8e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" fill="#e0e0e0" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Радиоактивность</text>
  
  <!-- Ядро атома -->
  <circle cx="100" cy="120" r="25" fill="#ff6b6b" opacity="0.8" filter="url(#glow)"/>
  <text x="100" y="125" text-anchor="middle" fill="white" font-family="Arial" font-size="14">N</text>
  
  <!-- α-излучение -->
  <circle cx="100" cy="120" r="8" fill="#ff9f43" opacity="0.9"/>
  <path d="M 125 120 L 180 120" stroke="#ff9f43" stroke-width="2" marker-end="url(#arrowAlpha)"/>
  <text x="190" y="125" fill="#ff9f43" font-family="Arial" font-size="14">α</text>
  <text x="190" y="140" fill="#ccc" font-family="Arial" font-size="12">He²⁺</text>
  
  <!-- β-излучение -->
  <circle cx="100" cy="120" r="5" fill="#4834d4" opacity="0.9"/>
  <path d="M 125 140 L 180 160" stroke="#4834d4" stroke-width="2" marker-end="url(#arrowBeta)"/>
  <text x="190" y="165" fill="#4834d4" font-family="Arial" font-size="14">β</text>
  <text x="190" y="180" fill="#ccc" font-family="Arial" font-size="12">e⁻</text>
  
  <!-- γ-излучение -->
  <path d="M 125 100 L 180 80" stroke="#00d2d3" stroke-width="2" marker-end="url(#arrowGamma)"/>
  <path d="M 125 95 L 180 75" stroke="#00d2d3" stroke-width="2" marker-end="url(#arrowGamma)"/>
  <path d="M 125 105 L 180 85" stroke="#00d2d3" stroke-width="2" marker-end="url(#arrowGamma)"/>
  <text x="190" y="85" fill="#00d2d3" font-family="Arial" font-size="14">γ</text>
  <text x="190" y="100" fill="#ccc" font-family="Arial" font-size="12">фотон</text>
  
  <!-- Стрелки для излучений -->
  <defs>
    <marker id="arrowAlpha" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9f43"/>
    </marker>
    <marker id="arrowBeta" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4834d4"/>
    </marker>
    <marker id="arrowGamma" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d2d3"/>
    </marker>
  </defs>
  
  <!-- Формула распада -->
  <rect x="50" y="200" width="200" height="50" fill="#2c3e50" opacity="0.7" rx="5"/>
  <text x="150" y="220" text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="16">N = N₀·e^(-λt)</text>
  <text x="150" y="240" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="12">закон радиоактивного распада</text>
  
  <!-- График распада -->
  <rect x="300" y="180" width="180" height="150" fill="#2c3e50" opacity="0.7" rx="5"/>
  
  <!-- Ось X -->
  <line x1="320" y1="300" x2="460" y2="300" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Ось Y -->
  <line x1="320" y1="300" x2="320" y2="200" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- Метки осей -->
  <text x="390" y="320" text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="12">t</text>
  <text x="305" y="250" text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="12">N</text>
  
  <!-- Кривая распада -->
  <path d="M 320,220 Q 350,230 380,250 T 440,290" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Точки на графике -->
  <circle cx="320" cy="220" r="3" fill="#ff6b6b"/>
  <circle cx="360" cy="240" r="3" fill="#ff6b6b"/>
  <circle cx="400" cy="270" r="3" fill="#ff6b6b"/>
  <circle cx="440" cy="290" r="3" fill="#ff6b6b"/>
  
  <!-- Подписи на графике -->
  <text x="330" y="210" fill="#ff6b6b" font-family="Arial" font-size="10">N₀</text>
  <text x="445" y="285" fill="#ff6b6b" font-family="Arial" font-size="10">N</text>
  
  <!-- Время жизни -->
  <line x1="380" y1="250" x2="380" y2="300" stroke="#4834d4" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="385" y="275" fill="#4834d4" font-family="Arial" font-size="10">τ</text>
  
  <!-- Дополнительно: полупериод -->
  <rect x="280" y="60" width="140" height="40" fill="#2c3e50" opacity="0.7" rx="5"/>
  <text x="350" y="80" text-anchor="middle" fill="#e0e0e0" font-family="Arial" font-size="14">T₁/₂ = ln(2)/λ</text>
  <text x="350" y="95" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="11">период полураспада</text>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="30" r="3" fill="#4a7c7e" opacity="0.5"/>
  <circle cx="470" cy="30" r="3" fill="#4a7c7e" opacity="0.5"/>
  <circle cx="30" cy="320" r="3" fill="#4a7c7e" opacity="0.5"/>
  <circle cx="470" cy="320" r="3" fill="#4a7c7e" opacity="0.5"/>
</svg>