<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="redGrad">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d63031;stop-opacity:1" />
    </radialGradient>
    
    <!-- Тень -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#333" stroke-width="2" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a90e2" stroke-width="1" rx="8"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Урок 12: Свободные электромагнитные колебания</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#555">Колебательный контур</text>
  
  <!-- Номер урока в углу -->
  <circle cx="460" cy="30" r="20" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="460" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">12</text>
  
  <!-- ФИЗИКА · 11 КЛАСС -->
  <text x="40" y="30" font-family="Arial, sans-serif" font-size="14" fill="#666">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Колебательный контур (левая часть) -->
  <g transform="translate(50, 80)">
    <!-- Катушка индуктивности -->
    <path d="M 50 30 Q 60 10, 70 30 T 90 30 T 110 30 T 130 30" 
          fill="none" stroke="#333" stroke-width="2"/>
    <text x="90" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">L</text>
    
    <!-- Конденсатор -->
    <line x1="180" y1="20" x2="180" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="190" y1="20" x2="190" y2="40" stroke="#333" stroke-width="2"/>
    <text x="185" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">C</text>
    
    <!-- Провода -->
    <line x1="130" y1="30" x2="180" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="190" y1="30" x2="230" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="230" y1="30" x2="230" y2="90" stroke="#333" stroke-width="2"/>
    <line x1="230" y1="90" x2="50" y2="90" stroke="#333" stroke-width="2"/>
    <line x1="50" y1="90" x2="50" y2="30" stroke="#333" stroke-width="2"/>
    
    <!-- Заряды на конденсаторе -->
    <circle cx="180" cy="30" r="8" fill="url(#redGrad)"/>
    <text x="180" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">+</text>
    <circle cx="190" cy="30" r="8" fill="#4a90e2"/>
    <text x="190" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">−</text>
    
    <!-- Ток в катушке -->
    <path d="M 80 15 Q 85 10, 90 15 T 100 15" fill="none" stroke="#5cb85c" stroke-width="1.5" stroke-dasharray="2,2" marker-end="url(#arrowhead)"/>
    <path d="M 100 15 Q 105 10, 110 15 T 120 15" fill="none" stroke="#5cb85c" stroke-width="1.5" stroke-dasharray="2,2" marker-end="url(#arrowhead)"/>
    
    <!-- Метки -->
    <text x="140" y="20" font-family="Arial, sans-serif" font-size="10" fill="#666">ток I</text>
    <text x="40" y="75" font-family="Arial, sans-serif" font-size="11" fill="#666">Колебательный контур</text>
  </g>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5cb85c"/>
    </marker>
  </defs>
  
  <!-- График зависимости энергии (правая часть) -->
  <g transform="translate(280, 80)">
    <text x="60" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Энергия колебаний</text>
    
    <!-- Оси координат -->
    <line x1="20" y1="150" x2="140" y2="150" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="150" x2="20" y2="30" stroke="#333" stroke-width="1.5"/>
    
    <!-- Стрелки осей -->
    <polygon points="140,150 135,147 135,153" fill="#333"/>
    <polygon points="20,30 17,35 23,35" fill="#333"/>
    
    <!-- Метки осей -->
    <text x="150" y="154" font-family="Arial, sans-serif" font-size="10" fill="#666">t</text>
    <text x="15" y="25" font-family="Arial, sans-serif" font-size="10" fill="#666">E</text>
    
    <!-- Полная энергия -->
    <line x1="20" y1="50" x2="140" y2="50" stroke="#333" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="145" y="54" font-family="Arial, sans-serif" font-size="10" fill="#333">Eпол</text>
    
    <!-- Энергия конденсатора -->
    <path d="M 20 100 Q 40 50, 60 100 T 100 100 T 140 100" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <text x="145" y="104" font-family="Arial, sans-serif" font-size="10" fill="#4a90e2">Ec</text>
    
    <!-- Энергия индуктивности -->
    <path d="M 20 100 Q 40 150, 60 100 T 100 100 T 140 100" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <text x="145" y="95" font-family="Arial, sans-serif" font-size="10" fill="#ff6b6b">EL</text>
    
    <!-- Подписи периодов -->
    <line x1="60" y1="150" x2="60" y2="155" stroke="#333" stroke-width="1"/>
    <text x="60" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">T/4</text>
    
    <line x1="100" y1="150" x2="100" y2="155" stroke="#333" stroke-width="1"/>
    <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">T/2</text>
    
    <text x="80" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Время</text>
  </g>
  
  <!-- Формула Томсона -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="400" height="50" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">Формула Томсона:</text>
    <text x="200" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">T = 2π√(LC)</text>
  </g>
  
  <!-- Формула для частоты -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="400" height="50" fill="#f8f9fa" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">Частота колебаний:</text>
    <text x="200" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">ν = 1/(2π√(LC))</text>
  </g>
  
  <!-- Вспомогательные элементы для объема -->
  <g transform="translate(280, 80)">
    <!-- Вектор силы тока -->
    <path d="M 90 70 L 90 90" stroke="#5cb85c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="95" y="85" font-family="Arial, sans-serif" font-size="10" fill="#5cb85c">I</text>
    
    <!-- Индуктивность в магнитном поле -->
    <path d="M 40 70 Q 50 60, 60 70 T 80 70 T 100 70" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Энергетические переходы -->
  <g transform="translate(50, 220)">
    <circle cx="30" cy="25" r="3" fill="#4a90e2"/>
    <circle cx="370" cy="25" r="3" fill="#ff6b6b"/>
    <path d="M 30 25 L 370 25" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="200" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Энергетические переходы</text>
  </g>
</svg>