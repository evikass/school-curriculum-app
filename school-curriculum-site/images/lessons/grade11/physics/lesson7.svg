<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495E" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок и метки -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Урок 7: Энергия магнитного поля</text>
  <text x="30" y="30" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D">№7</text>
  
  <!-- Плотность энергии магнитного поля -->
  <g transform="translate(30, 70)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Плотность энергии магнитного поля:</text>
    
    <!-- Формула -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#34495E">w = μ₀·μᵣ·H²/2</text>
    
    <!-- Символы и пояснения -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">w - плотность энергии</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">μ₀ - магнитная постоянная</text>
    <text x="0" y="70" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">μᵣ - относительная магнитная проницаемость</text>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">H - напряженность магнитного поля</text>
    
    <!-- Схема соленоида -->
    <g transform="translate(150, 10)">
      <rect x="0" y="0" width="80" height="60" fill="none" stroke="#3498DB" stroke-width="1"/>
      <path d="M10,0 Q20,30 10,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <path d="M20,0 Q30,30 20,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <path d="M30,0 Q40,30 30,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <path d="M40,0 Q50,30 40,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <path d="M50,0 Q60,30 50,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <path d="M60,0 Q70,30 60,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <path d="M70,0 Q80,30 70,60" fill="none" stroke="#3498DB" stroke-width="2"/>
      <text x="40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">Соленоид</text>
    </g>
  </g>
  
  <!-- Ферромагнетики -->
  <g transform="translate(280, 70)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Ферромагнетики</text>
    
    <!-- Атомная структура -->
    <g transform="translate(0, 20)">
      <circle cx="20" cy="20" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="50" cy="20" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="80" cy="20" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="35" cy="50" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="65" cy="50" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="20" cy="80" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="50" cy="80" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      <circle cx="80" cy="80" r="12" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
      
      <!-- Векторы намагниченности -->
      <path d="M20,20 L20,10" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M50,20 L50,10" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M80,20 L80,10" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M35,50 L35,40" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M65,50 L65,40" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M20,80 L20,70" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M50,80 L50,70" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      <path d="M80,80 L80,70" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <text x="50" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">Домены ферромагнетика</text>
    </g>
  </g>
  
  <!-- Гистерезис -->
  <g transform="translate(30, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Гистерезисная петля</text>
    
    <!-- Оси координат -->
    <line x1="20" y1="120" x2="220" y2="120" stroke="#34495E" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="120" stroke="#34495E" stroke-width="2"/>
    
    <!-- Стрелки -->
    <path d="M218,120 L220,120 L215,117" stroke="#34495E" stroke-width="1.5" fill="none"/>
    <path d="M20,22 L20,20 L17,25" stroke="#34495E" stroke-width="1.5" fill="none"/>
    
    <!-- Подписи осей -->
    <text x="225" y="123" font-family="Arial, sans-serif" font-size="9" fill="#34495E">H</text>
    <text x="15" y="18" font-family="Arial, sans-serif" font-size="9" fill="#34495E">B</text>
    
    <!-- Гистерезисная петля -->
    <path d="M40,100 Q60,40 120,40 Q180,40 200,100 Q180,120 120,120 Q60,120 40,100" 
          fill="none" stroke="#E74C3C" stroke-width="2"/>
    
    <!-- Точки на петле -->
    <circle cx="40" cy="100" r="3" fill="#E74C3C"/>
    <circle cx="120" cy="40" r="3" fill="#E74C3C"/>
    <circle cx="200" cy="100" r="3" fill="#E74C3C"/>
    <circle cx="120" cy="120" r="3" fill="#E74C3C"/>
    
    <!-- Подписи точек -->
    <text x="35" y="95" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Bᵣ</text>
    <text x="125" y="35" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Bₛ</text>
    <text x="205" y="95" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Bᵣ</text>
    <text x="125" y="125" font-family="Arial, sans-serif" font-size="8" fill="#34495E">0</text>
    
    <!-- Обозначения -->
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Bᵣ - остаточная индукция</text>
    <text x="0" y="155" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Bₛ - насыщение</text>
  </g>
  
  <!-- Магнитные материалы -->
  <g transform="translate(280, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Магнитные материалы</text>
    
    <!-- Таблица материалов -->
    <rect x="0" y="10" width="150" height="140" fill="none" stroke="#34495E" stroke-width="1"/>
    
    <!-- Заголовки таблицы -->
    <rect x="0" y="10" width="50" height="25" fill="#ECF0F1"/>
    <rect x="50" y="10" width="50" height="25" fill="#ECF0F1"/>
    <rect x="100" y="10" width="50" height="25" fill="#ECF0F1"/>
    
    <text x="25" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Материал</text>
    <text x="75" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">μᵣ</text>
    <text x="125" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Тип</text>
    
    <!-- Данные таблицы -->
    <text x="5" y="47" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Вакуум</text>
    <text x="55" y="47" font-family="Arial, sans-serif" font-size="8" fill="#34495E">1</text>
    <text x="105" y="47" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Парамагн.</text>
    
    <text x="5" y="67" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Вода</text>
    <text x="55" y="67" font-family="Arial, sans-serif" font-size="8" fill="#34495E">0.99999</text>
    <text x="105" y="67" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Парамагн.</text>
    
    <text x="5" y="87" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Железо</text>
    <text x="55" y="87" font-family="Arial, sans-serif" font-size="8" fill="#34495E">5000-100000</text>
    <text x="105" y="87" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Ферромагн.</text>
    
    <text x="5" y="107" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Никель</text>
    <text x="55" y="107" font-family="Arial, sans-serif" font-size="8" fill="#34495E">100-600</text>
    <text x="105" y="107" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Ферромагн.</text>
    
    <text x="5" y="127" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Медь</text>
    <text x="55" y="127" font-family="Arial, sans-serif" font-size="8" fill="#34495E">0.999991</text>
    <text x="105" y="127" font-family="Arial, sans-serif" font-size="8" fill="#34495E">Диамагн.</text>
  </g>
  
  <!-- Стрелка маркера -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2C3E50"/>
    </marker>
  </defs>
</svg>