<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#3498db" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e74c3c">Урок 1: Магнитное поле и его характеристики</text>
  <text x="470" y="320" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">№1</text>
  
  <!-- Определение вектора магнитной индукции -->
  <rect x="30" y="70" width="200" height="120" fill="none" stroke="#34495e" stroke-width="1.5" rx="5"/>
  <text x="130" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Вектор магнитной индукции</text>
  <text x="130" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">B = F / (I·l·sinα)</text>
  
  <!-- Схема для определения вектора B -->
  <g transform="translate(80, 130)">
    <!-- Прямой провод -->
    <rect x="0" y="0" width="100" height="5" fill="#95a5a6"/>
    <!-- Ток -->
    <text x="50" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">I</text>
    <!-- Вектор силы -->
    <line x1="50" y1="5" x2="50" y2="40" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="55" y="30" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">F</text>
    <!-- Вектор B -->
    <line x1="50" y1="5" x2="20" y2="20" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="15" y="25" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">B</text>
  </g>
  
  <!-- Линии магнитной индукции -->
  <rect x="250" y="70" width="220" height="120" fill="none" stroke="#34495e" stroke-width="1.5" rx="5"/>
  <text x="360" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Линии магнитной индукции</text>
  
  <!-- Магнитные линии для прямого провода -->
  <g transform="translate(280, 110)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="2,1"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="2,1"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="2,1"/>
    <!-- Прямой провод -->
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#95a5a6" stroke-width="4"/>
    <text x="5" y="5" font-family="Arial, sans-serif" font-size="10" fill="#3498db">⊗</text>
  </g>
  
  <!-- Магнитные линии для катушки -->
  <g transform="translate(360, 110)">
    <!-- Катушка -->
    <path d="M-20,-20 Q-20,0 -20,20 M-10,-20 Q-10,0 -10,20 M0,-20 Q0,0 0,20 M10,-20 Q10,0 10,20 M20,-20 Q20,0 20,20" 
          stroke="#95a5a6" stroke-width="2" fill="none"/>
    <!-- Магнитные линии -->
    <ellipse cx="0" cy="-10" rx="30" ry="10" fill="none" stroke="#3498db" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="35" ry="15" fill="none" stroke="#3498db" stroke-width="1"/>
    <ellipse cx="0" cy="10" rx="30" ry="10" fill="none" stroke="#3498db" stroke-width="1"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">N</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">S</text>
  </g>
  
  <!-- Принцип суперпозиции -->
  <rect x="30" y="210" width="440" height="120" fill="none" stroke="#34495e" stroke-width="1.5" rx="5"/>
  <text x="250" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Принцип суперпозиции магнитных полей</text>
  
  <!-- Схема для суперпозиции -->
  <g transform="translate(80, 250)">
    <!-- Первый магнит -->
    <rect x="0" y="0" width="60" height="30" fill="#e74c3c" rx="3"/>
    <text x="30" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">N</text>
    <rect x="0" y="30" width="60" height="30" fill="#3498db" rx="3"/>
    <text x="30" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">S</text>
    
    <!-- Второй магнит -->
    <rect x="140" y="0" width="60" height="30" fill="#3498db" rx="3"/>
    <text x="170" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">S</text>
    <rect x="140" y="30" width="60" height="30" fill="#e74c3c" rx="3"/>
    <text x="170" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">N</text>
    
    <!-- Векторы полей -->
    <line x1="30" y1="15" x2="30" y2="35" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="35" y="30" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">B₁</text>
    
    <line x1="170" y1="15" x2="170" y2="35" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="175" y="30" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">B₂</text>
    
    <!-- Результирующий вектор -->
    <line x1="100" y1="15" x2="100" y2="35" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="105" y="30" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">B</text>
    
    <!-- Знак сложения -->
    <text x="60" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">+</text>
    <text x="130" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">=</text>
  </g>
  
  <!-- Формулы -->
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="10" fill="#34495e">|B| = μ₀·I/(2πr) - для прямого провода</text>
  <text x="30" y="315" font-family="Arial, sans-serif" font-size="10" fill="#34495e">|B| = μ₀·n·I - для соленоида</text>
  
  <!-- Определения -->
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="10" fill="#34495e">μ₀ = 4π·10⁻⁹ Гн/м - магнитная постоянная</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1 Тл = 10⁴ Гс - единицы измерения B</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0.1" />
    </linearGradient>
    
    <radialGradient id="grad2">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0" />
    </radialGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Декоративные элементы -->
  <circle cx="460" cy="100" r="3" fill="#3498db"/>
  <circle cx="470" cy="110" r="3" fill="#3498db"/>
  <circle cx="450" cy="110" r="3" fill="#3498db"/>
  
  <circle cx="40" cy="100" r="3" fill="#e74c3c"/>
  <circle cx="30" cy="110" r="3" fill="#e74c3c"/>
  <circle cx="50" cy="110" r="3" fill="#e74c3c"/>
</svg>