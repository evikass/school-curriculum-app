<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="uraniumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neutronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fragmentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5" ry="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Урок 35: Ядерные реакции</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Деление и синтез ядер</text>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">№35</text>
  
  <!-- Секция деления урана -->
  <g transform="translate(30, 80)">
    <!-- Заголовок секции -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Деление ядра урана-235</text>
    
    <!-- Уран-235 -->
    <circle cx="50" cy="40" r="25" fill="url(#uraniumGrad)" stroke="#d2691e" stroke-width="2"/>
    <text x="50" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8b4513">²³⁵U</text>
    
    <!-- Нейтрон -->
    <circle cx="110" cy="40" r="8" fill="url(#neutronGrad)" stroke="#1e90ff" stroke-width="1"/>
    <text x="110" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">n</text>
    
    <!-- Стрелка -->
    <path d="M 120 40 L 140 40" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="130" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">+</text>
    
    <!-- Фрагменты деления -->
    <circle cx="170" cy="25" r="18" fill="url(#fragmentGrad)" stroke="#ff4500" stroke-width="2"/>
    <text x="170" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">¹⁴¹Ba</text>
    
    <circle cx="170" cy="55" r="18" fill="url(#fragmentGrad)" stroke="#ff4500" stroke-width="2"/>
    <text x="170" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">⁹²Kr</text>
    
    <!-- Нейтроны -->
    <circle cx="210" cy="15" r="6" fill="url(#neutronGrad)" stroke="#1e90ff" stroke-width="1"/>
    <text x="210" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">n</text>
    
    <circle cx="210" cy="30" r="6" fill="url(#neutronGrad)" stroke="#1e90ff" stroke-width="1"/>
    <text x="210" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">n</text>
    
    <circle cx="210" cy="45" r="6" fill="url(#neutronGrad)" stroke="#1e90ff" stroke-width="1"/>
    <text x="210" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">n</text>
    
    <!-- Энергия -->
    <text x="170" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">200 МэВ</text>
    <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">энергия</text>
  </g>
  
  <!-- Секция термоядерного синтеза -->
  <g transform="translate(280, 80)">
    <!-- Заголовок секции -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Термоядерный синтез</text>
    
    <!-- Дейтерий -->
    <circle cx="30" cy="40" r="18" fill="#9370db" stroke="#8b008b" stroke-width="2"/>
    <text x="30" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">²H</text>
    
    <!-- Тритий -->
    <circle cx="80" cy="40" r="18" fill="#9370db" stroke="#8b008b" stroke-width="2"/>
    <text x="80" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">³H</text>
    
    <!-- Стрелка -->
    <path d="M 100 40 L 140 40" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead2)"/>
    <text x="120" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">+</text>
    
    <!-- Гелий-4 -->
    <circle cx="170" cy="40" r="20" fill="#ff69b4" stroke="#c71585" stroke-width="2"/>
    <text x="170" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">⁴He</text>
    
    <!-- Нейтрон -->
    <circle cx="210" cy="40" r="8" fill="url(#neutronGrad)" stroke="#1e90ff" stroke-width="1"/>
    <text x="210" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">n</text>
    
    <!-- Энергия -->
    <text x="170" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">17.6 МэВ</text>
    <text x="170" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">энергия</text>
  </g>
  
  <!-- Схема ядерного реактора -->
  <g transform="translate(30, 220)">
    <!-- Заголовок секции -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Ядерный реактор</text>
    
    <!-- Корпус реактора -->
    <rect x="20" y="20" width="120" height="100" fill="none" stroke="#34495e" stroke-width="3" rx="5" ry="5"/>
    <rect x="30" y="30" width="100" height="80" fill="#ecf0f1" opacity="0.5"/>
    
    <!-- Топливо -->
    <rect x="40" y="40" width="15" height="60" fill="url(#uraniumGrad)" stroke="#d2691e" stroke-width="1"/>
    <rect x="60" y="40" width="15" height="60" fill="url(#uraniumGrad)" stroke="#d2691e" stroke-width="1"/>
    <rect x="80" y="40" width="15" height="60" fill="url(#uraniumGrad)" stroke="#d2691e" stroke-width="1"/>
    <rect x="100" y="40" width="15" height="60" fill="url(#uraniumGrad)" stroke="#d2691e" stroke-width="1"/>
    
    <!-- Теплообменник -->
    <circle cx="170" cy="70" r="30" fill="none" stroke="#3498db" stroke-width="2"/>
    <circle cx="170" cy="70" r="20" fill="none" stroke="#3498db" stroke-width="1"/>
    <path d="M 170 50 Q 185 60, 170 90 Q 155 60, 170 50" fill="none" stroke="#3498db" stroke-width="1"/>
    <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">теплообменник</text>
    
    <!-- Турбина -->
    <g transform="translate(230, 70)">
      <circle cx="0" cy="0" r="20" fill="#34495e"/>
      <path d="M 0 -15 L 10 0 L 0 15 L -10 0 Z" fill="#ecf0f1"/>
      <path d="M -15 0 L 0 10 L 15 0 L 0 -10 Z" fill="#ecf0f1"/>
      <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">турбина</text>
    </g>
    
    <!-- Генератор -->
    <rect x="280" y="55" width="40" height="30" fill="#2ecc71" stroke="#27ae60" stroke-width="2" rx="3" ry="3"/>
    <text x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Генератор</text>
    
    <!-- Стрелки потока -->
    <path d="M 140 70 L 140 70" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead3)"/>
    <path d="M 200 70 L 230 70" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead3)"/>
    <path d="M 270 70 L 280 70" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead3)"/>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(30, 340)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Уравнение деления: n + ²³⁵U → ¹⁴¹Ba + ⁹²Kr + 3n + Q</text>
    <text x="250" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Уравнение синтеза: ²H + ³H → ⁴He + n + Q</text>
  </g>
  
  <!-- Определения -->
  <g transform="translate(280, 220)">
    <!-- Определение деления -->
    <rect x="0" y="0" width="190" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3" ry="3"/>
    <text x="5" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Деление - расщепление тяжелого</text>
    <text x="5" y="28" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ядра на более легкие</text>
    
    <!-- Определение синтеза -->
    <rect x="0" y="50" width="190" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3" ry="3"/>
    <text x="5" y="65" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Синтез - слияние легких ядер</text>
    <text x="5" y="78" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">в более тяжелое</text>
  </g>
  
  <!-- Иконки безопасности -->
  <g transform="translate(440, 220)">
    <circle cx="0" cy="0" r="15" fill="#e74c3c"/>
    <path d="M 0 -10 L 0 0 L -5 5 L 5 5 Z" fill="#fff"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">Радиация</text>
    
    <circle cx="0" cy="35" r="15" fill="#f39c12"/>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff">!</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f39c12">Опасно</text>
  </g>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>