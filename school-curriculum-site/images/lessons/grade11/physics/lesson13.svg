<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coilGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0277bd;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#0288d1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277bd;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#borderGrad)" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#e3f2fd" stroke-width="1"/>
  
  <!-- Заголовок и метка -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="bold" fill="#1a237e">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#0d47a1">Урок 13: Переменный электрический ток</text>
  <text x="45" y="25" font-family="Arial, sans-serif" font-size="14" fill="#3949ab">13</text>
  
  <!-- Генератор переменного тока -->
  <g transform="translate(80, 100)">
    <!-- Магнит -->
    <rect x="0" y="10" width="80" height="15" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
    <text x="40" y="22" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">N</text>
    <rect x="0" y="40" width="80" height="15" fill="#4caf50" stroke="#1b5e20" stroke-width="1"/>
    <text x="40" y="52" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">S</text>
    
    <!-- Катушка -->
    <circle cx="120" cy="32.5" r="30" fill="none" stroke="#424242" stroke-width="2"/>
    <path d="M90,32.5 Q120,10 150,32.5 T210,32.5" fill="none" stroke="url(#coilGrad)" stroke-width="3"/>
    <path d="M95,32.5 Q125,15 155,32.5 T205,32.5" fill="none" stroke="url(#coilGrad)" stroke-width="3"/>
    <path d="M100,32.5 Q130,20 160,32.5 T200,32.5" fill="none" stroke="url(#coilGrad)" stroke-width="3"/>
    
    <!-- Вал -->
    <line x1="120" y1="5" x2="120" y2="60" stroke="#616161" stroke-width="2"/>
    <circle cx="120" cy="32.5" r="5" fill="#616161"/>
    
    <!-- Стрелка вращения -->
    <path d="M140,32.5 L160,25 L155,30 L165,32.5 L155,35 L160,40 Z" fill="#ff5722" opacity="0.7"/>
    <text x="175" y="35" font-family="Arial, sans-serif" font-size="10" fill="#424242">ω</text>
    
    <!-- Контактные кольца -->
    <circle cx="200" cy="32.5" r="8" fill="none" stroke="#757575" stroke-width="1"/>
    <circle cx="220" cy="32.5" r="8" fill="none" stroke="#757575" stroke-width="1"/>
    
    <!-- Щетки -->
    <rect x="195" y="20" width="3" height="15" fill="#9e9e9e"/>
    <rect x="217" y="20" width="3" height="15" fill="#9e9e9e"/>
    <text x="196" y="18" font-family="Arial, sans-serif" font-size="10" fill="#424242">+</text>
    <text x="218" y="18" font-family="Arial, sans-serif" font-size="10" fill="#424242">−</text>
    
    <!-- Подпись -->
    <text x="120" y="85" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#424242">Генератор</text>
    <text x="120" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#424242">переменного тока</text>
  </g>
  
  <!-- График напряжения -->
  <g transform="translate(320, 100)">
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#424242">График напряжения</text>
    
    <!-- Оси -->
    <line x1="20" y1="20" x2="20" y2="80" stroke="#424242" stroke-width="1"/>
    <line x1="20" y1="50" x2="140" y2="50" stroke="#424242" stroke-width="1"/>
    
    <!-- Стрелки осей -->
    <path d="M20,20 L18,25 L22,25 Z" fill="#424242"/>
    <path d="M140,50 L135,48 L135,52 Z" fill="#424242"/>
    
    <!-- Подписи осей -->
    <text x="145" y="53" font-family="Arial, sans-serif" font-size="10" fill="#424242">t</text>
    <text x="15" y="18" font-family="Arial, sans-serif" font-size="10" fill="#424242">U</text>
    
    <!-- Синусоида -->
    <path d="M20,50 Q30,20 40,50 T60,50 T80,50 T100,50 T120,50 T140,50" fill="none" stroke="url(#waveGrad)" stroke-width="2"/>
    
    <!-- Период -->
    <line x1="20" y1="80" x2="60" y2="80" stroke="#ff5722" stroke-width="1"/>
    <line x1="20" y1="78" x2="20" y2="82" stroke="#ff5722" stroke-width="1"/>
    <line x1="60" y1="78" x2="60" y2="82" stroke="#ff5722" stroke-width="1"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#424242">T</text>
    
    <!-- Амплитуда -->
    <line x1="15" y1="20" x2="15" y2="50" stroke="#ff5722" stroke-width="1"/>
    <line x1="13" y1="20" x2="17" y2="20" stroke="#ff5722" stroke-width="1"/>
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#424242" transform="rotate(-90 10 35)">U_max</text>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="400" height="100" fill="#e3f2fd" stroke="#90caf9" stroke-width="1" rx="5"/>
    
    <!-- Действующее значение -->
    <text x="10" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">Действующее значение:</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#424242">I_действ = I_max / √2 ≈ 0.707 × I_max</text>
    
    <!-- Частота -->
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">Частота:</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#424242">f = 1 / T, где T - период</text>
    
    <!-- Активное сопротивление -->
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">Активное сопротивление:</text>
    <text x="200" y="45" font-family="Arial, sans-serif" font-size="11" fill="#424242">R = U_действ / I_действ</text>
    
    <!-- Мощность -->
    <text x="200" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">Мощность:</text>
    <text x="200" y="85" font-family="Arial, sans-serif" font-size="11" fill="#424242">P = U_действ × I_действ × cos(φ)</text>
  </g>
  
  <!-- Диаграмма векторов -->
  <g transform="translate(420, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#424242">Векторные диаграммы</text>
    
    <!-- Вектор напряжения -->
    <line x1="0" y1="30" x2="0" y2="-20" stroke="#f44336" stroke-width="2"/>
    <text x="5" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#f44336">U</text>
    
    <!-- Вектор тока -->
    <line x1="0" y1="30" x2="20" y2="10" stroke="#2196f3" stroke-width="2"/>
    <text x="25" y="10" font-family="Arial, sans-serif" font-size="10" fill="#2196f3">I</text>
    
    <!-- Угол фазового сдвига -->
    <path d="M0,30 Q10,25 20,10" fill="none" stroke="#757575" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="10" fill="#757575">φ</text>
  </g>
</svg>