<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефинируем градиенты -->
  <defs>
    <!-- Градиент для фона -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для панели с графиком -->
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f9ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для схемы -->
    <linearGradient id="schemeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9f9f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для диаграммы -->
    <linearGradient id="diagGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff9e6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Тень для текста -->
    <filter id="textShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Фоновая панель -->
  <rect x="0" y="0" width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Двойная декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#4682b4" stroke-width="2" />
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#87ceeb" stroke-width="1" />
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#1e3a8a" filter="url(#textShadow)">ПЕРЕМЕННЫЙ ТОК</text>
  
  <!-- Подзаголовок -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#4682b4">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#6495ed">Урок №25</text>
  
  <!-- Панель с синусоидой -->
  <rect x="20" y="70" width="220" height="120" fill="url(#panelGradient)" stroke="#4682b4" stroke-width="1" rx="5" />
  
  <!-- Ось времени -->
  <line x1="30" y1="140" x2="230" y2="140" stroke="#333" stroke-width="1" />
  <polygon points="230,140 225,137 225,143" fill="#333" />
  <text x="235" y="143" font-family="Arial, sans-serif" font-size="10" fill="#333">t</text>
  
  <!-- Ось тока -->
  <line x1="40" y1="80" x2="40" y2="180" stroke="#333" stroke-width="1" />
  <polygon points="40,80 37,85 43,85" fill="#333" />
  <text x="35" y="75" font-family="Arial, sans-serif" font-size="10" fill="#333">I</text>
  
  <!-- Синусоида -->
  <path d="M 40,140 Q 70,100 100,140 T 160,140 T 220,140" fill="none" stroke="#ff6347" stroke-width="2" />
  <path d="M 40,140 Q 70,180 100,140 T 160,140 T 220,140" fill="none" stroke="#ff6347" stroke-width="2" />
  
  <!-- Значения на оси -->
  <line x1="40" y1="135" x2="40" y2="145" stroke="#333" stroke-width="1" />
  <text x="40" y="155" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">0</text>
  
  <line x1="100" y1="135" x2="100" y2="145" stroke="#333" stroke-width="1" />
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">T/4</text>
  
  <line x1="160" y1="135" x2="160" y2="145" stroke="#333" stroke-width="1" />
  <text x="160" y="155" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">T/2</text>
  
  <line x1="220" y1="135" x2="220" y2="145" stroke="#333" stroke-width="1" />
  <text x="220" y="155" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">3T/4</text>
  
  <!-- Значения тока -->
  <line x1="35" y1="100" x2="45" y2="100" stroke="#333" stroke-width="1" />
  <text x="30" y="103" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#333">I₀</text>
  
  <line x1="35" y1="140" x2="45" y2="140" stroke="#333" stroke-width="1" />
  <text x="30" y="143" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#333">0</text>
  
  <line x1="35" y1="180" x2="45" y2="180" stroke="#333" stroke-width="1" />
  <text x="30" y="183" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#333">-I₀</text>
  
  <!-- Формула тока -->
  <text x="130" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">I = I₀ sin(ωt)</text>
  
  <!-- Панель с электрической схемой -->
  <rect x="260" y="70" width="220" height="120" fill="url(#schemeGradient)" stroke="#4682b4" stroke-width="1" rx="5" />
  
  <!-- Источник переменного тока -->
  <circle cx="290" cy="130" r="15" fill="none" stroke="#333" stroke-width="1.5" />
  <text x="290" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">~</text>
  
  <!-- Активное сопротивление -->
  <rect x="330" y="120" width="40" height="20" fill="none" stroke="#333" stroke-width="1.5" />
  <line x1="340" y1="125" x2="340" y2="135" stroke="#333" stroke-width="1" />
  <line x1="350" y1="125" x2="350" y2="135" stroke="#333" stroke-width="1" />
  <line x1="360" y1="125" x2="360" y2="135" stroke="#333" stroke-width="1" />
  <text x="350" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">R</text>
  
  <!-- Реактивное сопротивление (катушка) -->
  <g transform="translate(410, 130)">
    <path d="M 0,0 Q -5,-10 0,-20 Q 5,-30 0,-40 Q -5,-50 0,-60" fill="none" stroke="#333" stroke-width="1.5" />
    <path d="M 10,0 Q 5,-10 10,-20 Q 15,-30 10,-40 Q 5,-50 10,-60" fill="none" stroke="#333" stroke-width="1.5" />
    <path d="M 20,0 Q 15,-10 20,-20 Q 25,-30 20,-40 Q 15,-50 20,-60" fill="none" stroke="#333" stroke-width="1.5" />
  </g>
  <text x="420" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">L</text>
  
  <!-- Соединения -->
  <line x1="305" y1="130" x2="330" y2="130" stroke="#333" stroke-width="1.5" />
  <line x1="370" y1="130" x2="390" y2="130" stroke="#333" stroke-width="1.5" />
  <line x1="430" y1="130" x2="450" y2="130" stroke="#333" stroke-width="1.5" />
  <line x1="450" y1="130" x2="450" y2="170" stroke="#333" stroke-width="1.5" />
  <line x1="450" y1="170" x2="270" y2="170" stroke="#333" stroke-width="1.5" />
  <line x1="270" y1="170" x2="270" y2="130" stroke="#333" stroke-width="1.5" />
  <line x1="270" y1="130" x2="275" y2="130" stroke="#333" stroke-width="1.5" />
  
  <!-- Панель с векторной диаграммой -->
  <rect x="20" y="210" width="220" height="120" fill="url(#diagGradient)" stroke="#4682b4" stroke-width="1" rx="5" />
  
  <!-- Ось напряжения -->
  <line x1="130" y1="270" x2="130" y2="220" stroke="#333" stroke-width="1" />
  <polygon points="130,220 127,225 133,225" fill="#333" />
  <text x="130" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">U</text>
  
  <!-- Ось тока -->
  <line x1="130" y1="270" x2="180" y2="270" stroke="#333" stroke-width="1" />
  <polygon points="180,270 175,267 175,273" fill="#333" />
  <text x="185" y="273" font-family="Arial, sans-serif" font-size="10" fill="#333">I</text>
  
  <!-- Вектор напряжения -->
  <line x1="130" y1="270" x2="130" y2="240" stroke="#ff6347" stroke-width="2" />
  <polygon points="130,240 127,245 133,245" fill="#ff6347" />
  <text x="135" y="250" font-family="Arial, sans-serif" font-size="10" fill="#ff6347">U₀</text>
  
  <!-- Вектор тока -->
  <line x1="130" y1="270" x2="160" y2="270" stroke="#4169e1" stroke-width="2" />
  <polygon points="160,270 155,267 155,273" fill="#4169e1" />
  <text x="165" y="273" font-family="Arial, sans-serif" font-size="10" fill="#4169e1">I₀</text>
  
  <!-- Угол фазового сдвига -->
  <path d="M 140,270 A 10,10 0 0 0 147,263" fill="none" stroke="#333" stroke-width="1" />
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="10" fill="#333">φ</text>
  
  <!-- Панель с формулами -->
  <rect x="260" y="210" width="220" height="120" fill="url(#panelGradient)" stroke="#4682b4" stroke-width="1" rx="5" />
  
  <!-- Формула эффективного тока -->
  <text x="370" y="235" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">Iд = I₀/√2</text>
  
  <!-- Формула активной мощности -->
  <text x="370" y="260" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">P = UI cos φ</text>
  
  <!-- Формула реактивной мощности -->
  <text x="370" y="285" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">Q = UI sin φ</text>
  
  <!-- Формула полной мощности -->
  <text x="370" y="310" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">S = UI = √(P² + Q²)</text>
  
  <!-- Легенда в углу -->
  <rect x="240" y="10" width="180" height="50" fill="rgba(255,255,255,0.8)" stroke="#87ceeb" stroke-width="1" rx="3" />
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="10" fill="#333">I₀ - амплитуда тока</text>
  <text x="250" y="38" font-family="Arial, sans-serif" font-size="10" fill="#333">ω = 2πf - циклическая частота</text>
  <text x="250" y="51" font-family="Arial, sans-serif" font-size="10" fill="#333">Iд - действующее значение тока</text>
</svg>