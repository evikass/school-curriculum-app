<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="antennaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4834d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#686de0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="detectorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#54a0ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9ff3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f368e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Двойная декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#333" stroke-width="2" />
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="1" />
  
  <!-- Заголовок и подзаголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="bold">Радиосвязь</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="10" text-anchor="end">Урок №17</text>
  
  <!-- Секция: Передатчик -->
  <g id="transmitter">
    <!-- Заголовок секции -->
    <rect x="20" y="70" width="110" height="25" fill="url(#circuitGrad)" rx="3" />
    <text x="75" y="87" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">ПЕРЕДАТЧИК</text>
    
    <!-- Антенна передатчика -->
    <line x1="75" y1="100" x2="75" y2="130" stroke="url(#antennaGrad)" stroke-width="3" />
    <line x1="65" y1="110" x2="85" y2="110" stroke="url(#antennaGrad)" stroke-width="2" />
    <line x1="60" y1="120" x2="90" y2="120" stroke="url(#antennaGrad)" stroke-width="2" />
    <line x1="55" y1="130" x2="95" y2="130" stroke="url(#antennaGrad)" stroke-width="2" />
    <text x="105" y="115" font-family="Arial, sans-serif" font-size="10">Антенна</text>
    
    <!-- Генератор -->
    <rect x="40" y="140" width="70" height="40" fill="url(#circuitGrad)" rx="5" />
    <circle cx="75" cy="160" r="15" fill="none" stroke="white" stroke-width="2" />
    <path d="M65,160 Q75,150 85,160" fill="none" stroke="white" stroke-width="2" />
    <text x="75" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Генератор</text>
    
    <!-- Модулятор -->
    <rect x="40" y="205" width="70" height="40" fill="url(#detectorGrad)" rx="5" />
    <text x="75" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Модулятор</text>
    <text x="75" y="240" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">f = 10⁶ Гц</text>
    <text x="75" y="255" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Модулятор</text>
    
    <!-- Соединительные линии -->
    <line x1="75" y1="130" x2="75" y2="140" stroke="#333" stroke-width="2" />
    <line x1="75" y1="180" x2="75" y2="205" stroke="#333" stroke-width="2" />
  </g>
  
  <!-- Секция: Приёмник -->
  <g id="receiver">
    <!-- Заголовок секции -->
    <rect x="370" y="70" width="110" height="25" fill="url(#detectorGrad)" rx="3" />
    <text x="425" y="87" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">ПРИЁМНИК</text>
    
    <!-- Антенна приёмника -->
    <line x1="425" y1="100" x2="425" y2="130" stroke="url(#antennaGrad)" stroke-width="3" />
    <line x1="415" y1="110" x2="435" y2="110" stroke="url(#antennaGrad)" stroke-width="2" />
    <line x1="410" y1="120" x2="440" y2="120" stroke="url(#antennaGrad)" stroke-width="2" />
    <line x1="405" y1="130" x2="445" y2="130" stroke="url(#antennaGrad)" stroke-width="2" />
    <text x="355" y="115" font-family="Arial, sans-serif" font-size="10">Антенна</text>
    
    <!-- Резонансный контур -->
    <rect x="390" y="140" width="70" height="60" fill="none" stroke="url(#circuitGrad)" stroke-width="2" rx="5" />
    <circle cx="410" cy="170" r="8" fill="none" stroke="#333" stroke-width="1.5" />
    <circle cx="440" cy="170" r="8" fill="none" stroke="#333" stroke-width="1.5" />
    <line x1="410" y1="162" x2="410" y2="178" stroke="#333" stroke-width="1.5" />
    <line x1="440" y1="162" x2="440" y2="178" stroke="#333" stroke-width="1.5" />
    <text x="425" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Резонансный</text>
    <text x="425" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">контур</text>
    
    <!-- Детектор -->
    <rect x="390" y="210" width="70" height="40" fill="url(#radarGrad)" rx="5" />
    <polygon points="410,230 420,220 430,230" fill="white" />
    <line x1="415" y1="225" x2="425" y2="225" stroke="white" stroke-width="2" />
    <text x="425" y="260" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Детектор</text>
    
    <!-- Соединительные линии -->
    <line x1="425" y1="130" x2="425" y2="140" stroke="#333" stroke-width="2" />
    <line x1="425" y1="200" x2="425" y2="210" stroke="#333" stroke-width="2" />
  </g>
  
  <!-- Радиоволны -->
  <g id="waves">
    <path d="M95,160 Q125,150 155,160 T215,160" fill="none" stroke="url(#antennaGrad)" stroke-width="2" stroke-dasharray="5,3" opacity="0.7" />
    <path d="M95,160 Q125,170 155,160 T215,160" fill="none" stroke="url(#antennaGrad)" stroke-width="2" stroke-dasharray="5,3" opacity="0.5" />
    <path d="M95,160 Q125,180 155,160 T215,160" fill="none" stroke="url(#antennaGrad)" stroke-width="2" stroke-dasharray="5,3" opacity="0.3" />
    
    <path d="M285,160 Q315,150 345,160 T405,160" fill="none" stroke="url(#antennaGrad)" stroke-width="2" stroke-dasharray="5,3" opacity="0.3" />
    <path d="M285,160 Q315,170 345,160 T405,160" fill="none" stroke="url(#antennaGrad)" stroke-width="2" stroke-dasharray="5,3" opacity="0.5" />
    <path d="M285,160 Q315,180 345,160 T405,160" fill="none" stroke="url(#antennaGrad)" stroke-width="2" stroke-dasharray="5,3" opacity="0.7" />
    
    <text x="250" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Электромагнитные волны</text>
  </g>
  
  <!-- Секция: Радар -->
  <g id="radar">
    <!-- Заголовок секции -->
    <rect x="180" y="270" width="140" height="25" fill="url(#radarGrad)" rx="3" />
    <text x="250" y="287" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">РАДАР</text>
    
    <!-- Радарная станция -->
    <rect x="210" y="300" width="80" height="30" fill="url(#circuitGrad)" rx="5" />
    <circle cx="230" cy="315" r="8" fill="white" />
    <circle cx="270" cy="315" r="8" fill="white" />
    <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Радарная станция</text>
    
    <!-- Формула для радара -->
    <rect x="180" y="220" width="140" height="40" fill="white" stroke="#333" stroke-width="1" rx="3" />
    <text x="250" y="240" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">s = ct/2</text>
    <text x="250" y="255" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">s - расстояние до цели</text>
  </g>
  
  <!-- Легенда -->
  <g id="legend">
    <rect x="20" y="270" width="140" height="70" fill="white" stroke="#333" stroke-width="1" rx="3" opacity="0.9" />
    <text x="90" y="285" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-weight="bold">ОБЪЯСНЕНИЕ</text>
    <text x="25" y="300" font-family="Arial, sans-serif" font-size="9">• Радиосвязь использует</text>
    <text x="25" y="312" font-family="Arial, sans-serif" font-size="9">  электромагнитные волны</text>
    <text x="25" y="324" font-family="Arial, sans-serif" font-size="9">• f = 10⁶ Гц - частота</text>
    <text x="25" y="336" font-family="Arial, sans-serif" font-size="9">  модуляции</text>
  </g>
  
  <!-- График зависимости мощности от расстояния -->
  <g id="graph">
    <rect x="330" y="220" width="150" height="100" fill="white" stroke="#333" stroke-width="1" rx="3" />
    <text x="405" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">P = P₀/r²</text>
    
    <!-- Ось X -->
    <line x1="340" y1="305" x2="470" y2="305" stroke="#333" stroke-width="1" />
    <text x="405" y="320" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Расстояние (r)</text>
    
    <!-- Ось Y -->
    <line x1="340" y1="245" x2="340" y2="305" stroke="#333" stroke-width="1" />
    <text x="325" y="275" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">P</text>
    
    <!-- График -->
    <path d="M350,300 Q380,280 410,260 T470,250" fill="none" stroke="url(#detectorGrad)" stroke-width="2" />
    
    <!-- Точки на графике -->
    <circle cx="350" cy="300" r="2" fill="#333" />
    <circle cx="380" cy="280" r="2" fill="#333" />
    <circle cx="410" cy="260" r="2" fill="#333" />
    <circle cx="440" cy="255" r="2" fill="#333" />
    <circle cx="470" cy="250" r="2" fill="#333" />
  </g>
  
  <!-- Дополнительные подписи -->
  <text x="155" y="175" font-family="Arial, sans-serif" font-size="9">f = c/λ</text>
  <text x="155" y="188" font-family="Arial, sans-serif" font-size="8">c = 3·10⁸ м/с</text>
  
  <text x="300" y="175" font-family="Arial, sans-serif" font-size="9">λ = c/f</text>
  <text x="300" y="188" font-family="Arial, sans-serif" font-size="8">λ = 300 м</text>
</svg>