<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка с двойной линией -->
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="5" y="5" width="490" height="342" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- Фон с градиентом -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="magnetGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="coilGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#95a5a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f8c8d;stop-opacity:1" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>
  
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Подзаголовок -->
  <text x="250" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Закон Фарадея. Правило Ленца</text>
  
  <!-- Номер урока -->
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">Урок 18</text>
  
  <!-- Основная схема -->
  <g transform="translate(150, 100)">
    <!-- Магнит -->
    <g id="magnet">
      <rect x="0" y="0" width="80" height="140" rx="5" fill="url(#magnetGradient)" stroke="#2c3e50" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">N</text>
      <text x="40" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">S</text>
    </g>
    
    <!-- Контур -->
    <g id="contour">
      <ellipse cx="150" cy="70" rx="70" ry="40" fill="none" stroke="#34495e" stroke-width="3"/>
      <text x="230" y="75" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Контур</text>
    </g>
    
    <!-- Стрелки направления магнитного поля -->
    <g id="magnetic-field">
      <line x1="100" y1="30" x2="100" y2="50" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="100" y1="30" x2="100" y2="50" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="90" y1="35" x2="90" y2="55" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="110" y1="35" x2="110" y2="55" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <text x="85" y="25" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">B</text>
    </g>
    
    <!-- Индукционный ток -->
    <g id="induction-current">
      <line x1="150" y1="30" x2="180" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="180" y1="50" x2="180" y2="90" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="180" y1="90" x2="150" y2="110" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="150" y1="110" x2="120" y2="90" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="120" y1="90" x2="120" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="120" y1="50" x2="150" y2="30" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <text x="190" y="75" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">I</text>
    </g>
    
    <!-- Противодействующее поле -->
    <g id="counter-field">
      <line x1="150" y1="110" x2="150" y2="130" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="140" y1="115" x2="140" y2="135" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
      <line x1="160" y1="115" x2="160" y2="135" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <text x="130" y="145" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">B'</text>
    </g>
  </g>
  
  <!-- Формула ЭДС в движущемся проводнике -->
  <g transform="translate(50, 260)">
    <rect x="-10" y="-15" width="400" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50">ЭДС в движущемся проводнике:</text>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50">ε = Blv</text>
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">(где B - индукция магнитного поля,</text>
    <text x="320" y="25" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d)">l - длина проводника)</text>
  </g>
  
  <!-- График зависимости ЭДС от скорости -->
  <g transform="translate(50, 50)">
    <rect x="300" y="0" width="140" height="100" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="370" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Зависимость ЭДС от v</text>
    
    <!-- Ось X -->
    <line x1="310" y1="80" x2="430" y2="80" stroke="#2c3e50" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="435" y="85" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">v</text>
    
    <!-- Ось Y -->
    <line x1="310" y1="20" x2="310" y2="80" stroke="#2c3e50" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="305" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ε</text>
    
    <!-- График -->
    <line x1="310" y1="80" x2="430" y2="20" stroke="#3498db" stroke-width="2"/>
  </g>
  
  <!-- Легенда/объяснения -->
  <g transform="translate(350, 180)">
    <rect x="0" y="0" width="140" height="140" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Правило Ленца</text>
    
    <circle cx="10" cy="40" r="3" fill="#e74c3c"/>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Магнитное поле</text>
    
    <circle cx="10" cy="60" r="3" fill="#27ae60"/>
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Индукционный ток</text>
    
    <circle cx="10" cy="80" r="3" fill="#9b59b6"/>
    <text x="20" y="85" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Противодействующее поле</text>
    
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Индукционный ток</text>
    <text x="10" y="120" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">направлен так, чтобы</text>
    <text x="10" y="135" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">противодействовать</text>
  </g>
  
  <!-- Дополнительные элементы подписей -->
  <text x="170" y="180" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Магнит приближается к контуру</text>
  <text x="50" y="220" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Индукция магнитного поля B = Φ/S</text>
  
  <!-- Движущиеся элементы для наглядности -->
  <g transform="translate(100, 100)">
    <line x1="50" y1="70" x2="80" y2="70" stroke="#34495e" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="80,70 90,65 90,75" fill="#34495e"/>
    <text x="95" y="75" font-family="Arial, sans-serif" font-size="12" fill="#34495e">v</text>
  </g>
</svg>