<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E86C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5DADE2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC7063;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8C471;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52BE80;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2C3E50" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#34495E" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">Урок 18: Производство, передача и потребление электроэнергии</text>
  <text x="460" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7F8C8D">18</text>
  
  <!-- Электростанция слева -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="80" height="60" fill="url(#grad2)" stroke="#2C3E50" stroke-width="1" rx="5"/>
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">ЭС</text>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2C3E50">Электростанция</text>
    <path d="M20,0 L20,-10 M40,0 L40,-15 M60,0 L60,-10" stroke="#2C3E50" stroke-width="1" fill="none"/>
    <path d="M20,-10 L15,-20 L25,-20 Z M40,-15 L35,-25 L45,-25 Z M60,-10 L55,-20 L65,-20 Z" fill="#E74C3C"/>
  </g>
  
  <!-- Трансформатор 1 -->
  <g transform="translate(150, 120)">
    <circle cx="20" cy="0" r="15" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="20" cy="0" r="10" fill="none" stroke="#2C3E50" stroke-width="1"/>
    <path d="M5,0 L5,-15 L5,15 M35,0 L35,-15 L35,15" stroke="#2C3E50" stroke-width="1.5"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2C3E50">Трансформатор</text>
    <text x="20" y="40" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">повышающий</text>
  </g>
  
  <!-- ЛЭП -->
  <g transform="translate(200, 120)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#2C3E50" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#2C3E50" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="-20" stroke="#2C3E50" stroke-width="1"/>
    <line x1="0" y1="-20" x2="50" y2="-20" stroke="#2C3E50" stroke-width="1"/>
    <text x="25" y="-25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2C3E50">ЛЭП</text>
    <text x="25" y="20" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">Линия электропередачи</text>
  </g>
  
  <!-- Трансформатор 2 -->
  <g transform="translate(300, 120)">
    <circle cx="20" cy="0" r="15" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="20" cy="0" r="10" fill="none" stroke="#2C3E50" stroke-width="1"/>
    <path d="M5,0 L5,-15 L5,15 M35,0 L35,-15 L35,15" stroke="#2C3E50" stroke-width="1.5"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2C3E50">Трансформатор</text>
    <text x="20" y="40" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">понижающий</text>
  </g>
  
  <!-- Потребитель -->
  <g transform="translate(370, 100)">
    <rect x="0" y="0" width="80" height="60" fill="url(#grad3)" stroke="#2C3E50" stroke-width="1" rx="5"/>
    <circle cx="40" cy="30" r="15" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <path d="M30,30 L50,30 M40,20 L40,40" stroke="#2C3E50" stroke-width="2"/>
    <text x="40" y="80" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2C3E50">Потребитель</text>
  </g>
  
  <!-- Формула мощности -->
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="140" height="60" fill="url(#grad1)" opacity="0.2" stroke="#2C3E50" stroke-width="1" rx="3"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">P = U·I</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2C3E50">Мощность = Напряжение · Ток</text>
  </g>
  
  <!-- Формула потерь -->
  <g transform="translate(190, 210)">
    <rect x="0" y="0" width="140" height="60" fill="url(#grad4)" opacity="0.2" stroke="#2C3E50" stroke-width="1" rx="3"/>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">ΔP = I²·R</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2C3E50">Потери мощности = Ток² · Сопротивление</text>
  </g>
  
  <!-- График потерь -->
  <g transform="translate(350, 210)">
    <rect x="0" y="0" width="120" height="60" fill="white" stroke="#2C3E50" stroke-width="1" rx="3"/>
    <line x1="10" y1="50" x2="110" y2="50" stroke="#2C3E50" stroke-width="1"/>
    <line x1="10" y1="50" x2="10" y2="10" stroke="#2C3E50" stroke-width="1"/>
    <polyline points="10,45 30,40 50,30 70,15 90,5" stroke="#E74C3C" stroke-width="2" fill="none"/>
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">I</text>
    <text x="5" y="30" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">ΔP</text>
    <text x="60" y="8" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2C3E50">Зависимость потерь от тока</text>
  </g>
  
  <!-- Типы электростанций -->
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="200" height="45" fill="url(#grad1)" opacity="0.2" stroke="#2C3E50" stroke-width="1" rx="3"/>
    <text x="10" y="18" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">ТЭС - тепловые</text>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">ГЭС - гидравлические</text>
    <text x="110" y="18" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">АЭС - атомные</text>
    <text x="110" y="30" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">ВЭС - ветровые</text>
  </g>
  
  <!-- Советы по энергосбережению -->
  <g transform="translate(250, 290)">
    <rect x="0" y="0" width="220" height="45" fill="url(#grad4)" opacity="0.2" stroke="#2C3E50" stroke-width="1" rx="3"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">1. Выключать неиспользуемые приборы</text>
    <text x="10" y="27" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">2. Использовать светодиодные лампы</text>
    <text x="10" y="39" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">3. Использовать энергосберегающую технику</text>
  </g>
  
  <!-- Стрелки передачи энергии -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2C3E50" />
    </marker>
  </defs>
  
  <line x1="110" y1="130" x2="145" y2="130" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="235" y1="130" x2="295" y2="130" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="335" y1="130" x2="365" y2="130" stroke="#2C3E50" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Напряжения -->
  <text x="70" y="115" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">6 кВ</text>
  <text x="160" y="115" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">220 кВ</text>
  <text x="265" y="115" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">220 кВ</text>
  <text x="380" y="115" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2C3E50">220 В</text>
</svg>