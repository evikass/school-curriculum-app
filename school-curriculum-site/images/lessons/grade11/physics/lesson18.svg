<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#333" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#grid)" opacity="0.2"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a7c7e" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a7c7e" stroke-width="1" rx="3" opacity="0.5"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e94560">Электроэнергия</text>
  
  <!-- Генератор -->
  <g transform="translate(50, 100)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    <path d="M -20,-20 L 20,20 M -20,20 L 20,-20" stroke="#0f4c75" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#3282b8"/>
    <text x="0" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#bbe1fa">Генератор</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">U₁</text>
  </g>
  
  <!-- Трансформатор -->
  <g transform="translate(200, 100)">
    <!-- Первичная обмотка -->
    <path d="M -15,-30 Q -15,-30 -15,30 Q -15,30 -15,30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    <path d="M -10,-30 Q -10,-30 -10,30 Q -10,30 -10,30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    <path d="M -5,-30 Q -5,-30 -5,30 Q -5,30 -5,30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    
    <!-- Вторичная обмотка -->
    <path d="M 5,-30 Q 5,-30 5,30 Q 5,30 5,30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    <path d="M 10,-30 Q 10,-30 10,30 Q 10,30 10,30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    <path d="M 15,-30 Q 15,-30 15,30 Q 15,30 15,30" fill="none" stroke="#0f4c75" stroke-width="3"/>
    
    <!-- Ядро -->
    <rect x="-20" y="-35" width="40" height="70" fill="none" stroke="#bb3e03" stroke-width="2"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#bb3e03" stroke-width="2"/>
    
    <text x="0" y="-50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#bbe1fa">Трансформатор</text>
    <text x="-20" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">U₁</text>
    <text x="20" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">U₂</text>
  </g>
  
  <!-- Линия электропередачи -->
  <g transform="translate(300, 100)">
    <rect x="-40" y="-10" width="80" height="20" fill="none" stroke="#0f4c75" stroke-width="2"/>
    <line x1="-40" y1="0" x2="-60" y2="0" stroke="#0f4c75" stroke-width="3"/>
    <line x1="40" y1="0" x2="60" y2="0" stroke="#0f4c75" stroke-width="3"/>
    
    <!-- Опоры -->
    <line x1="-60" y1="0" x2="-60" y2="40" stroke="#0f4c75" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="40" stroke="#0f4c75" stroke-width="2"/>
    <line x1="-65" y1="40" x2="-55" y2="40" stroke="#0f4c75" stroke-width="2"/>
    <line x1="55" y1="40" x2="65" y2="40" stroke="#0f4c75" stroke-width="2"/>
    
    <text x="0" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#bbe1fa">ЛЭП</text>
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">R</text>
  </g>
  
  <!-- Потребитель -->
  <g transform="translate(420, 100)">
    <rect x="-25" y="-25" width="50" height="50" fill="none" stroke="#0f4c75" stroke-width="3" rx="5"/>
    <path d="M -10,-10 L 10,10 M -10,10 L 10,-10" stroke="#0f4c75" stroke-width="2"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#bbe1fa">Потребитель</text>
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">U₃</text>
  </g>
  
  <!-- Соединения -->
  <path d="M 80,100 L 170,100" stroke="#0f4c75" stroke-width="2" fill="none"/>
  <path d="M 230,100 L 260,100" stroke="#0f4c75" stroke-width="2" fill="none"/>
  <path d="M 340,100 L 395,100" stroke="#0f4c75" stroke-width="2" fill="none"/>
  
  <!-- Стрелки тока -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bbe1fa"/>
    </marker>
  </defs>
  
  <line x1="100" y1="85" x2="150" y2="85" stroke="#bbe1fa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="85" x2="300" y2="85" stroke="#bbe1fa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="85" x2="390" y2="85" stroke="#bbe1fa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <text x="125" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">I₁</text>
  <text x="275" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">I₂</text>
  <text x="370" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">I₃</text>
  
  <!-- Формула потерь мощности -->
  <g transform="translate(250, 220)">
    <rect x="-80" y="-25" width="160" height="50" fill="none" stroke="#e94560" stroke-width="2" rx="5" filter="url(#glow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#bbe1fa">P_пот = I²R</text>
  </g>
  
  <!-- Объяснение формулы -->
  <text x="250" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bbe1fa">Потери мощности в линии</text>
  <text x="250" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbe1fa">зависят от квадрата тока</text>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbe1fa">и сопротивления линии</text>
  
  <!-- Дополнительные элементы -->
  <g transform="translate(50, 150)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#4a7c7e">P₁ = U₁I₁</text>
  </g>
  
  <g transform="translate(200, 150)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#4a7c7e">P₂ = U₂I₂</text>
  </g>
  
  <g transform="translate(300, 150)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#4a7c7e">P₃ = U₃I₃</text>
  </g>
  
  <!-- Волна напряжения -->
  <g transform="translate(50, 180)">
    <path d="M 0,0 Q 25,-10 50,0 T 100,0 T 150,0 T 200,0" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7"/>
    <text x="100" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e94560">U(t)</text>
  </g>
</svg>