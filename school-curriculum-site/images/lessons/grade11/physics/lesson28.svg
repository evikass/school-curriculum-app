<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="stars" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#ffffff" opacity="0.3"/>
      <circle cx="25" cy="15" r="0.8" fill="#ffffff" opacity="0.4"/>
      <circle cx="40" cy="30" r="1.2" fill="#ffffff" opacity="0.3"/>
      <circle cx="15" cy="40" r="0.6" fill="#ffffff" opacity="0.5"/>
      <circle cx="35" cy="5" r="0.7" fill="#ffffff" opacity="0.3"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="#0a0a1f"/>
  <rect width="500" height="350" fill="url(#stars)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a5568" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#718096" stroke-width="1" opacity="0.5"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#e2e8f0" font-weight="bold">Фотоны</text>
  
  <!-- Волна -->
  <path d="M 50 150 Q 100 120, 150 150 T 250 150 T 350 150 T 450 150" 
        stroke="#63b3ed" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M 50 150 Q 100 120, 150 150 T 250 150 T 350 150 T 450 150" 
        stroke="#90cdf4" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Частица (фотон) -->
  <circle cx="250" cy="150" r="15" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="250" cy="150" r="10" fill="#f59e0b"/>
  <circle cx="250" cy="150" r="5" fill="#fcd34d"/>
  
  <!-- Лучи от фотона -->
  <g opacity="0.6">
    <line x1="235" y1="150" x2="180" y2="120" stroke="#fbbf24" stroke-width="2"/>
    <line x1="265" y1="150" x2="320" y2="120" stroke="#fbbf24" stroke-width="2"/>
    <line x1="235" y1="150" x2="180" y2="180" stroke="#fbbf24" stroke-width="2"/>
    <line x1="265" y1="150" x2="320" y2="180" stroke="#fbbf24" stroke-width="2"/>
  </g>
  
  <!-- Метки на волне -->
  <line x1="150" y1="145" x2="150" y2="155" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="250" y1="145" x2="250" y2="155" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="350" y1="145" x2="350" y2="155" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Длина волны λ -->
  <line x1="150" y1="165" x2="350" y2="165" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="250" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e0">λ</text>
  
  <!-- Формулы -->
  <g transform="translate(50, 220)">
    <rect x="-10" y="-5" width="200" height="35" fill="#1a202c" stroke="#4a5568" stroke-width="1" rx="5"/>
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">E = hν</text>
  </g>
  
  <g transform="translate(270, 220)">
    <rect x="-10" y="-5" width="200" height="35" fill="#1a202c" stroke="#4a5568" stroke-width="1" rx="5"/>
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">p = h/λ</text>
  </g>
  
  <!-- Подписи -->
  <text x="250" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#cbd5e0">Фотон</text>
  
  <!-- Корпускулярная природа -->
  <circle cx="80" cy="280" r="8" fill="#fbbf24"/>
  <text x="100" y="285" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e0">Корпускулярная природа</text>
  
  <!-- Волновая природа -->
  <path d="M 320 275 Q 330 280, 340 275 T 360 275" stroke="#63b3ed" stroke-width="2" fill="none"/>
  <text x="370" y="280" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e0">Волновая природа</text>
  
  <!-- Стрелка вниз -->
  <path d="M 240 195 L 240 210 L 235 205 M 240 210 L 245 205" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  
  <!-- Энергетические уровни -->
  <rect x="200" y="240" width="100" height="3" fill="#4a5568"/>
  <rect x="200" y="250" width="100" height="3" fill="#4a5568"/>
  <rect x="200" y="260" width="100" height="3" fill="#4a5568"/>
  
  <!-- Стрелка перехода -->
  <path d="M 300 245 L 320 255" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Определение стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Дополнительные волны для иллюстрации дуализма -->
  <g opacity="0.3">
    <circle cx="100" cy="150" r="30" fill="none" stroke="#63b3ed" stroke-width="1" stroke-dasharray="2,4"/>
    <circle cx="400" cy="150" r="30" fill="none" stroke="#63b3ed" stroke-width="1" stroke-dasharray="2,4"/>
  </g>
  
  <!-- Подпись дуализма -->
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0" font-style="italic">Корпускулярно-волновой дуализм</text>
</svg>