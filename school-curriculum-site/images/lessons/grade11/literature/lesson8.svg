<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d4a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad4">
      <stop offset="0%" style="stop-color:#ecf0f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#grad1)" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="url(#grad2)" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <text x="25" y="45" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Урок 8</text>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" font-family="Arial" font-size="14" text-anchor="middle" fill="#7f8c8d">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Б.Л. Пастернак. Жизнь и творчество</text>
  
  <!-- Портрет Пастернака -->
  <g transform="translate(50, 90)">
    <ellipse cx="40" cy="40" rx="35" ry="45" fill="url(#grad4)"/>
    <ellipse cx="40" cy="35" rx="15" ry="18" fill="#f4d1ae"/>
    <path d="M25,50 Q40,55 55,50 L55,65 Q40,70 25,65 Z" fill="#f4d1ae"/>
    <path d="M25,30 Q40,25 55,30" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <circle cx="33" cy="35" r="2" fill="#2c3e50"/>
    <circle cx="47" cy="35" r="2" fill="#2c3e50"/>
    <path d="M40,40 Q42,42 40,45 Q38,42 40,40" fill="#e67e22"/>
    <path d="M15,45 Q25,50 35,45" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <path d="M45,45 Q55,50 65,45" fill="none" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="40" y="95" font-family="Arial" font-size="12" text-anchor="middle" fill="#2c3e50">Борис Пастернак</text>
    <text x="40" y="110" font-family="Arial" font-size="10" text-anchor="middle" fill="#7f8c8d">1890-1960</text>
  </g>
  
  <!-- Биография - временная шкала -->
  <g transform="translate(130, 90)">
    <line x1="0" y1="0" x2="300" y2="0" stroke="url(#grad2)" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#e74c3c"/>
    <text x="0" y="-10" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">1890</text>
    <text x="0" y="20" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">Рождение</text>
    
    <circle cx="75" cy="0" r="4" fill="#e74c3c"/>
    <text x="75" y="-10" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">1912</text>
    <text x="75" y="20" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">МГУ</text>
    
    <circle cx="150" cy="0" r="4" fill="#e74c3c"/>
    <text x="150" y="-10" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">1914</text>
    <text x="150" y="20" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">Поэтический дебют</text>
    
    <circle cx="225" cy="0" r="4" fill="#e74c3c"/>
    <text x="225" y="-10" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">1958</text>
    <text x="225" y="20" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">Нобелевская премия</text>
    
    <circle cx="300" cy="0" r="4" fill="#e74c3c"/>
    <text x="300" y="-10" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">1960</text>
    <text x="300" y="20" font-family="Arial" font-size="9" text-anchor="middle" fill="#7f8c8d">Смерть</text>
  </g>
  
  <!-- Философская лирика -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="140" height="100" fill="url(#grad2)" opacity="0.1" rx="5"/>
    <text x="70" y="20" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Философская лирика</text>
    
    <text x="10" y="40" font-family="Arial" font-size="10" fill="#34495e">"Сестра моя — жизнь"</text>
    <text x="10" y="55" font-family="Arial" font-size="10" fill="#34495e">"На ранних поездах"</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#34495e">"Зимняя ночь"</text>
    
    <rect x="10" y="80" width="120" height="15" fill="none" stroke="#3498db" stroke-width="1"/>
    <text x="15" y="90" font-family="Arial" font-size="9" fill="#2c3e50">Время · Пространство · Бытие</text>
  </g>
  
  <!-- Доктор Живаго -->
  <g transform="translate(210, 210)">
    <rect x="0" y="0" width="140" height="100" fill="url(#grad3)" opacity="0.1" rx="5"/>
    <text x="70" y="20" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">"Доктор Живаго"</text>
    
    <text x="10" y="40" font-family="Arial" font-size="10" fill="#34495e">1957 - год публикации</text>
    <text x="10" y="55" font-family="Arial" font-size="10" fill="#34495e">История Юрия Живаго</text>
    
    <!-- Иконка книги -->
    <rect x="45" y="65" width="50" height="35" fill="#e74c3c" rx="2"/>
    <rect x="45" y="65" width="50" height="5" fill="#c0392b"/>
    <line x1="45" y1="75" x2="95" y2="75" stroke="white" stroke-width="1"/>
    <line x1="45" y1="80" x2="95" y2="80" stroke="white" stroke-width="1"/>
    <line x1="45" y1="85" x2="95" y2="85" stroke="white" stroke-width="1"/>
    <line x1="45" y1="90" x2="95" y2="90" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Нобелевская премия -->
  <g transform="translate(370, 210)">
    <rect x="0" y="0" width="120" height="100" fill="url(#grad1)" opacity="0.1" rx="5"/>
    <text x="60" y="20" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Нобелевская премия</text>
    
    <!-- Медаль -->
    <circle cx="60" cy="50" r="25" fill="url(#grad1)"/>
    <text x="60" y="55" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1958</text>
    
    <text x="10" y="85" font-family="Arial" font-size="10" fill="#34495e">За выдающиеся</text>
    <text x="10" y="98" font-family="Arial" font-size="10" fill="#34495е">поэтические достижения</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(50, 330)">
    <text x="0" y="0" font-family="Arial" font-size="10" fill="#7f8c8d">Имажинизм · Метафора · Символизм · Экзистенциализм · Русский космизм</text>
  </g>
  
  <!-- Формула стихотворения Пастернака -->
  <g transform="translate(250, 330)">
    <text x="0" y="0" font-family="Arial" font-size="10" fill="#7f8c8d">Формула: "Стих = мысль + образ + музыка"</text>
  </g>
  
  <!-- Дополнительные элементы для объема -->
  <circle cx="450" cy="50" r="15" fill="#f39c12" opacity="0.3"/>
  <rect x="460" y="80" width="20" height="20" fill="#3498db" opacity="0.3" transform="rotate(45 470 90)"/>
  <path d="M30,150 Q50,140 70,150" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.5"/>
  
  <!-- Декоративные элементы -->
  <line x1="20" y1="180" x2="40" y2="180" stroke="#f39c12" stroke-width="1" opacity="0.5"/>
  <line x1="460" y1="180" x2="480" y2="180" stroke="#3498db" stroke-width="1" opacity="0.5"/>
</svg>