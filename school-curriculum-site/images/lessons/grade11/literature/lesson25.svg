<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8d6e63" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#a1887f" stroke-width="1"/>
  
  <!-- Номер урока -->
  <circle cx="30" cy="30" r="15" fill="#5d4037"/>
  <text x="30" y="35" font-family="Arial" font-size="14" fill="white" text-anchor="middle">25</text>
  
  <!-- Заголовок класса -->
  <text x="250" y="25" font-family="Arial" font-size="12" fill="#5d4037" text-anchor="middle">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="50" font-family="Arial" font-size="20" font-weight="bold" fill="#3e2723" text-anchor="middle">В.М. Шукшин. Жизнь и творчество</text>
  
  <!-- Портрет Шукшина -->
  <circle cx="80" cy="120" r="40" fill="url(#portraitGrad)"/>
  <ellipse cx="80" cy="115" rx="15" ry="20" fill="#8d6e63"/>
  <path d="M65 115 Q80 125 95 115" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="72" cy="110" r="2" fill="white"/>
  <circle cx="88" cy="110" r="2" fill="white"/>
  <path d="M70 125 Q80 130 90 125" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="70" y="140" width="20" height="30" rx="5" fill="url(#portraitGrad)"/>
  
  <!-- Имя под портретом -->
  <text x="80" y="180" font-family="Arial" font-size="12" fill="#3e2723" text-anchor="middle">В.М. Шукшин</text>
  <text x="80" y="195" font-family="Arial" font-size="10" fill="#5d4037" text-anchor="middle">(1929-1974)</text>
  
  <!-- Биографическая линия времени -->
  <line x1="140" y1="140" x2="460" y2="140" stroke="#8d6e63" stroke-width="2"/>
  
  <!-- Даты на временной линии -->
  <circle cx="160" cy="140" r="5" fill="#5d4037"/>
  <text x="160" y="130" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">1929</text>
  <text x="160" y="160" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">Родился</text>
  
  <circle cx="230" cy="140" r="5" fill="#5d4037"/>
  <text x="230" y="130" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">1954</text>
  <text x="230" y="160" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">Начал писать</text>
  
  <circle cx="300" cy="140" r="5" fill="#5d4037"/>
  <text x="300" y="130" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">1964</text>
  <text x="300" y="160" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">"Срезал"</text>
  
  <circle cx="370" cy="140" r="5" fill="#5d4037"/>
  <text x="370" y="130" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">1973</text>
  <text x="370" y="160" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">"Калина красная"</text>
  
  <circle cx="440" cy="140" r="5" fill="#5d4037"/>
  <text x="440" y="130" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">1974</text>
  <text x="440" y="160" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">Умер</text>
  
  <!-- Книга "Калина красная" -->
  <rect x="150" y="200" width="40" height="50" rx="2" fill="url(#bookGrad)"/>
  <line x1="150" y1="215" x2="190" y2="215" stroke="#d7ccc8" stroke-width="1"/>
  <line x1="150" y1="225" x2="190" y2="225" stroke="#d7ccc8" stroke-width="1"/>
  <line x1="150" y1="235" x2="190" y2="235" stroke="#d7ccc8" stroke-width="1"/>
  <circle cx="170" cy="200" r="3" fill="#ff5252"/>
  
  <text x="170" y="265" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">"Калина красная"</text>
  <text x="170" y="278" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">1973</text>
  
  <!-- Книга "Я пришёл дать вам волю" -->
  <rect x="210" y="200" width="40" height="50" rx="2" fill="url(#bookGrad)"/>
  <line x1="210" y1="215" x2="250" y2="215" stroke="#d7ccc8" stroke-width="1"/>
  <line x1="210" y1="225" x2="250" y2="225" stroke="#d7ccc8" stroke-width="1"/>
  <line x1="210" y1="235" x2="250" y2="235" stroke="#d7ccc8" stroke-width="1"/>
  <circle cx="230" cy="200" r="3" fill="#5c6bc0"/>
  
  <text x="230" y="265" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle">"Я пришёл дать вам волю"</text>
  <text x="230" y="278" font-family="Arial" font-size="8" fill="#5d4037" text-anchor="middle">1967</text>
  
  <!-- Категории рассказов -->
  <rect x="280" y="200" width="120" height="100" rx="5" fill="#efebe9" stroke="#8d6e63" stroke-width="1"/>
  <text x="340" y="220" font-family="Arial" font-size="12" font-weight="bold" fill="#3e2723" text-anchor="middle">Рассказы:</text>
  
  <text x="290" y="240" font-family="Arial" font-size="10" fill="#5d4037">• О деревенской жизни</text>
  <text x="290" y="255" font-family="Arial" font-size="10" fill="#5d4037">• О простых людях</text>
  <text x="290" y="270" font-family="Arial" font-size="10" fill="#5d4037">• О морали</text>
  <text x="290" y="285" font-family="Arial" font-size="10" fill="#5d4037">• О добре и зле</text>
  
  <!-- Фильмы -->
  <rect x="420" y="200" width="70" height="100" rx="5" fill="#efebe9" stroke="#8d6e63" stroke-width="1"/>
  <text x="455" y="220" font-family="Arial" font-size="11" font-weight="bold" fill="#3e2723" text-anchor="middle">Фильмы:</text>
  
  <text x="425" y="240" font-family="Arial" font-size="9" fill="#5d4037">"Калина красная"</text>
  <text x="425" y="255" font-family="Arial" font-size="9" fill="#5d4037">"Печки-лавочки"</text>
  <text x="425" y="270" font-family="Arial" font-size="9" fill="#5d4037">"Делы сердечные"</text>
  
  <!-- Ключевые идеи -->
  <text x="80" y="220" font-family="Arial" font-size="11" font-weight="bold" fill="#3e2723">Ключевые идеи:</text>
  
  <circle cx="90" cy="235" r="3" fill="#ff5252"/>
  <text x="100" y="240" font-family="Arial" font-size="9" fill="#5d4037">Свобода личности</text>
  
  <circle cx="90" cy="255" r="3" fill="#5c6bc0"/>
  <text x="100" y="260" font-family="Arial" font-size="9" fill="#5d4037">Проблемы деревни</text>
  
  <circle cx="90" cy="275" r="3" fill="#66bb6a"/>
  <text x="100" y="280" font-family="Arial" font-size="9" fill="#5d4037">Поиск смысла</text>
  
  <!-- Цитата -->
  <rect x="120" y="310" width="260" height="30" rx="3" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1"/>
  <text x="250" y="330" font-family="Arial" font-size="10" fill="#3e2723" text-anchor="middle" font-style="italic">"Человек должен быть человеком, а не винтиком"</text>
</svg>