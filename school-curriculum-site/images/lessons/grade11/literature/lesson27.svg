<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dfd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0522d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d2b48c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc9a6a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="8"/>
  <rect x="18" y="18" width="464" height="324" fill="none" stroke="#8b4513" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#4a3728">Урок 27: Б.Ш. Окуджава и В.С. Высоцкий</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#6b5d54">Авторская песня</text>
  <text x="250" y="28" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#8b4513" font-style="italic">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="460" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end" fill="#8b4513">№27</text>
  
  <!-- Портреты бардов -->
  <!-- Окуджава -->
  <g transform="translate(50, 90)">
    <circle cx="40" cy="40" r="35" fill="url(#portraitGradient)" stroke="#8b4513" stroke-width="2"/>
    <circle cx="40" cy="35" r="12" fill="#6b5d54"/>
    <path d="M30,45 Q40,55 50,45" fill="none" stroke="#6b5d54" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="30" r="2" fill="#333"/>
    <circle cx="45" cy="30" r="2" fill="#333"/>
    <path d="M25,25 Q40,20 55,25" fill="none" stroke="#6b5d54" stroke-width="2"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a3728">Булат Окуджава</text>
    <text x="40" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6b5d54">1924-1997</text>
  </g>
  
  <!-- Высоцкий -->
  <g transform="translate(170, 90)">
    <circle cx="40" cy="40" r="35" fill="url(#portraitGradient)" stroke="#8b4513" stroke-width="2"/>
    <circle cx="40" cy="35" r="12" fill="#6b5d54"/>
    <path d="M30,45 Q40,55 50,45" fill="none" stroke="#6b5d54" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="30" r="2" fill="#333"/>
    <circle cx="45" cy="30" r="2" fill="#333"/>
    <path d="M25,25 Q40,20 55,25" fill="none" stroke="#6b5d54" stroke-width="2"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a3728">Владимир Высоцкий</text>
    <text x="40" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6b5d54">1938-1980</text>
  </g>
  
  <!-- Галич -->
  <g transform="translate(290, 90)">
    <circle cx="40" cy="40" r="35" fill="url(#portraitGradient)" stroke="#8b4513" stroke-width="2"/>
    <circle cx="40" cy="35" r="12" fill="#6b5d54"/>
    <path d="M30,45 Q40,55 50,45" fill="none" stroke="#6b5d54" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="30" r="2" fill="#333"/>
    <circle cx="45" cy="30" r="2" fill="#333"/>
    <path d="M25,25 Q40,20 55,25" fill="none" stroke="#6b5d54" stroke-width="2"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a3728">Галич</text>
    <text x="40" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6b5d54">1919-1977</text>
  </g>
  
  <!-- Визбор -->
  <g transform="translate(410, 90)">
    <circle cx="40" cy="40" r="35" fill="url(#portraitGradient)" stroke="#8b4513" stroke-width="2"/>
    <circle cx="40" cy="35" r="12" fill="#6b5d54"/>
    <path d="M30,45 Q40,55 50,45" fill="none" stroke="#6b5d54" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="30" r="2" fill="#333"/>
    <circle cx="45" cy="30" r="2" fill="#333"/>
    <path d="M25,25 Q40,20 55,25" fill="none" stroke="#6b5d54" stroke-width="2"/>
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a3728">Визбор</text>
    <text x="40" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6b5d54">1934-2004</text>
  </g>
  
  <!-- Диаграмма: Характеристики авторской песни -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="400" height="100" fill="#f5f0e6" stroke="#8b4513" stroke-width="1" rx="5"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4a3728">Особенности авторской песни</text>
    
    <!-- Столбцы характеристик -->
    <rect x="20" y="30" width="30" height="60" fill="#d2691e" opacity="0.7"/>
    <text x="35" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Поэзия</text>
    
    <rect x="70" y="30" width="30" height="60" fill="#cd853f" opacity="0.7"/>
    <text x="85" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Музыка</text>
    
    <rect x="120" y="30" width="30" height="60" fill="#daa520" opacity="0.7"/>
    <text x="135" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Исполнение</text>
    
    <rect x="170" y="30" width="30" height="60" fill="#b8860b" opacity="0.7"/>
    <text x="185" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Авторство</text>
    
    <rect x="220" y="30" width="30" height="60" fill="#8b4513" opacity="0.7"/>
    <text x="235" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Импровизация</text>
    
    <rect x="270" y="30" width="30" height="60" fill="#a0522d" opacity="0.7"/>
    <text x="285" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Быт</text>
    
    <rect x="320" y="30" width="30" height="60" fill="#bc8f8f" opacity="0.7"/>
    <text x="335" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Философия</text>
    
    <rect x="370" y="30" width="30" height="60" fill="#d2b48c" opacity="0.7"/>
    <text x="385" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a3728">Народность</text>
  </g>
  
  <!-- Нотный пример -->
  <g transform="translate(50, 140)">
    <line x1="0" y1="25" x2="100" y2="25" stroke="#6b5d54" stroke-width="1"/>
    <line x1="0" y1="30" x2="100" y2="30" stroke="#6b5d54" stroke-width="1"/>
    <line x1="0" y1="35" x2="100" y2="35" stroke="#6b5d54" stroke-width="1"/>
    <line x1="0" y1="40" x2="100" y2="40" stroke="#6b5d54" stroke-width="1"/>
    <line x1="0" y1="45" x2="100" y2="45" stroke="#6b5d54" stroke-width="1"/>
    <ellipse cx="15" cy="40" rx="8" ry="5" fill="#6b5d54" transform="rotate(-20 15 40)"/>
    <ellipse cx="30" cy="35" rx="8" ry="5" fill="#6b5d54" transform="rotate(-20 30 35)"/>
    <ellipse cx="45" cy="30" rx="8" ry="5" fill="#6b5d54" transform="rotate(-20 45 30)"/>
    <ellipse cx="60" cy="35" rx="8" ry="5" fill="#6b5d54" transform="rotate(-20 60 35)"/>
    <ellipse cx="75" cy="40" rx="8" ry="5" fill="#6b5d54" transform="rotate(-20 75 40)"/>
    <line x1="230" y1="35" x2="280" y2="35" stroke="#6b5d54" stroke-width="1"/>
    <path d="M280,35 Q290,25 300,35" fill="none" stroke="#6b5d54" stroke-width="1"/>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a3728">Типичная гитарная последовательность аккордов</text>
  </g>
  
  <!-- Ключевые даты -->
  <g transform="translate(350, 140)">
    <rect x="0" y="0" width="120" height="60" fill="#f5f0e6" stroke="#8b4513" stroke-width="1" rx="3"/>
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#4a3728">Ключевые даты</text>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="9" fill="#6b5d54">1960-е - расцвет</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="9" fill="#6b5d54">1970-е - запрет</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="330" r="3" fill="#8b4513"/>
  <circle cx="40" cy="330" r="3" fill="#8b4513"/>
  <circle cx="50" cy="330" r="3" fill="#8b4513"/>
  <circle cx="450" cy="330" r="3" fill="#8b4513"/>
  <circle cx="460" cy="330" r="3" fill="#8b4513"/>
  <circle cx="470" cy="330" r="3" fill="#8b4513"/>
  
  <!-- Формула авторской песни -->
  <text x="250" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a3728" font-style="italic">Авторская песня = Поэзия + Музыка + Личное мировоззрение</text>
</svg>