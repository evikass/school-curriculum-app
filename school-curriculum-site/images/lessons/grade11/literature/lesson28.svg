<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a6ea5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a6f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nobelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="0" y="0" width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#1e3a6f" stroke-width="2" rx="5" ry="5" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#3a6ea5" stroke-width="1" rx="3" ry="3" />
  
  <!-- Заголовок класса -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a6f">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e3a6f">Урок 28: И.А. Бродский</text>
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="normal" text-anchor="middle" fill="#1e3a6f">Жизнь и творчество</text>
  
  <!-- Номер урока -->
  <circle cx="470" cy="25" r="15" fill="#1e3a6f" />
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">28</text>
  
  <!-- Портрет Бродского -->
  <circle cx="80" cy="160" r="45" fill="url(#portraitGrad)" />
  <circle cx="70" cy="150" r="5" fill="white" />
  <circle cx="90" cy="150" r="5" fill="white" />
  <path d="M 65 170 Q 80 180 95 170" stroke="white" stroke-width="2" fill="none" />
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e3a6f">Иосиф Бродский</text>
  
  <!-- Хронология жизни -->
  <line x1="150" y1="100" x2="150" y2="250" stroke="#1e3a6f" stroke-width="2" />
  <circle cx="150" cy="110" r="5" fill="#1e3a6f" />
  <text x="170" y="115" font-family="Arial, sans-serif" font-size="11" fill="#1e3a6f">1940 - рождение</text>
  <circle cx="150" cy="150" r="5" fill="#1e3a6f" />
  <text x="170" y="155" font-family="Arial, sans-serif" font-size="11" fill="#1e3a6f">1964 - суд</text>
  <circle cx="150" cy="190" r="5" fill="#1e3a6f" />
  <text x="170" y="195" font-family="Arial, sans-serif" font-size="11" fill="#1e3a6f">1972 - высылка</text>
  <circle cx="150" cy="230" r="5" fill="#1e3a6f" />
  <text x="170" y="235" font-family="Arial, sans-serif" font-size="11" fill="#1e3a6f">1987 - Нобелевская премия</text>
  
  <!-- Тема: Биография -->
  <rect x="270" y="90" width="180" height="60" fill="#e6f2ff" stroke="#1e3a6f" stroke-width="1" rx="5" ry="5" />
  <text x="360" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e3a6f">Биография</text>
  <text x="360" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1e3a6f">Родился в Ленинграде</text>
  <text x="360" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1e3a6f">Бросил школу в 15 лет</text>
  
  <!-- Тема: Высылка -->
  <rect x="270" y="160" width="180" height="60" fill="#fff0e6" stroke="#cc5500" stroke-width="1" rx="5" ry="5" />
  <text x="360" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#cc5500">Высылка</text>
  <text x="360" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#cc5500">"Тунеядство" (1964)</text>
  <text x="360" y="210" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#cc5500">5 лет лагеря (суммировали)</text>
  
  <!-- Тема: Нобелевская премия -->
  <rect x="270" y="230" width="180" height="60" fill="#fff9e6" stroke="#cc9900" stroke-width="1" rx="5" ry="5" />
  <text x="360" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#cc9900">Нобелевская премия</text>
  <text x="360" y="265" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#cc9900">1987 - "За творчество,</text>
  <text x="360" y="280" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#cc9900">написанное с большой силой"</text>
  
  <!-- Медаль Нобелевской премии -->
  <circle cx="80" cy="280" r="25" fill="url(#nobelGrad)" />
  <text x="80" y="285" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1e3a6f">Нобель</text>
  
  <!-- Эмигрантская лирика - диаграмма -->
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e3a6f">Эмигрантская лирика</text>
  
  <!-- Круговые диаграммы -->
  <circle cx="200" cy="330" r="15" fill="#3a6ea5" />
  <text x="200" y="334" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Рус.</text>
  <text x="220" y="334" font-family="Arial, sans-serif" font-size="10" fill="#1e3a6f">Язык творчества</text>
  
  <circle cx="280" cy="330" r="15" fill="#cc5500" />
  <text x="280" y="334" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white">Англ.</text>
  <text x="300" y="334" font-family="Arial, sans-serif" font-size="10" fill="#1e3a6f">Язык изгнания</text>
  
  <!-- Ключевые произведения -->
  <text x="250" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e3a6f">Ключевые произведения</text>
  
  <!-- Список произведений -->
  <rect x="30" y="270" width="100" height="15" fill="#e6f2ff" stroke="#1e3a6f" stroke-width="0.5" />
  <text x="35" y="281" font-family="Arial, sans-serif" font-size="9" fill="#1e3a6f">Часть речи</text>
  
  <rect x="30" y="285" width="100" height="15" fill="#e6f2ff" stroke="#1e3a6f" stroke-width="0.5" />
  <text x="35" y="296" font-family="Arial, sans-serif" font-size="9" fill="#1e3a6f">Римские элегии</text>
  
  <!-- Стихотворная форма -->
  <rect x="350" y="270" width="100" height="15" fill="#fff0e6" stroke="#cc5500" stroke-width="0.5" />
  <text x="355" y="281" font-family="Arial, sans-serif" font-size="9" fill="#cc5500">Свободный стих</text>
  
  <rect x="350" y="285" width="100" height="15" fill="#fff0e6" stroke="#cc5500" stroke-width="0.5" />
  <text x="355" y="296" font-family="Arial, sans-serif" font-size="9" fill="#cc5500">Формальные эксперименты</text>
  
  <!-- Формула стихосложения -->
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1e3a6f">Формула стихотворения:</text>
  <text x="250" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1e3a6f">Свобода + Мера = Эстетика</text>
</svg>