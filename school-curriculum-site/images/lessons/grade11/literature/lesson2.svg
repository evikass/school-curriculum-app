<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c5b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a395;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="4" />
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="url(#frameGrad)" stroke-width="1" opacity="0.5" />
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#34495e">Урок 2: А.А. Блок. Жизнь и творчество</text>
  
  <!-- Номер урока -->
  <rect x="20" y="15" width="30" height="20" fill="#8b4513" rx="3" />
  <text x="35" y="29" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">2</text>
  
  <!-- Портрет Блока -->
  <ellipse cx="80" cy="120" rx="40" ry="50" fill="url(#portraitGrad)" />
  <circle cx="80" cy="100" r="15" fill="#d4c5b9" />
  <path d="M65 115 Q80 105 95 115 L95 135 Q80 145 65 135 Z" fill="#d4c5b9" />
  <path d="M60 105 Q80 100 100 105" stroke="#654321" stroke-width="1" fill="none" />
  <circle cx="75" cy="95" r="2" fill="#333" />
  <circle cx="85" cy="95" r="2" fill="#333" />
  <path d="M75 105 Q80 110 85 105" stroke="#333" stroke-width="1" fill="none" />
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">А.А. Блок</text>
  <text x="80" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">(1880-1921)</text>
  
  <!-- Хронология жизни -->
  <rect x="150" y="80" width="320" height="120" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5" />
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Хронология жизни:</text>
  
  <line x1="160" y1="110" x2="460" y2="110" stroke="#bdc3c7" stroke-width="1" />
  
  <circle cx="170" cy="125" r="3" fill="#3498db" />
  <text x="180" y="130" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1880 - Рождение в Петербурге</text>
  
  <circle cx="170" cy="145" r="3" fill="#3498db" />
  <text x="180" y="150" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1898 - Начало поэтического пути</text>
  
  <circle cx="170" cy="165" r="3" fill="#3498db" />
  <text x="180" y="170" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1904 - Сборник «Стихи о Прекрасной Даме»</text>
  
  <circle cx="170" cy="185" r="3" fill="#3498db" />
  <text x="180" y="190" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1918 - Поэма «Двенадцать»</text>
  
  <circle cx="330" cy="125" r="3" fill="#3498db" />
  <text x="340" y="130" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1905 - Революция</text>
  
  <circle cx="330" cy="145" r="3" fill="#3498db" />
  <text x="340" y="150" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1917 - Октябрьская революция</text>
  
  <circle cx="330" cy="165" r="3" fill="#3498db" />
  <text x="340" y="170" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1921 - Смерть</text>
  
  <!-- Основные мотивы лирики -->
  <rect x="20" y="220" width="200" height="100" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" />
  <text x="30" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Основные мотивы лирики:</text>
  
  <circle cx="35" cy="255" r="2" fill="#e74c3c" />
  <text x="45" y="260" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Поиск Прекрасной Дамы</text>
  
  <circle cx="35" cy="275" r="2" fill="#e74c3c" />
  <text x="45" y="280" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Тема родины</text>
  
  <circle cx="35" cy="295" r="2" fill="#e74c3c" />
  <text x="45" y="300" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Город и природа</text>
  
  <circle cx="120" cy="255" r="2" fill="#e74c3c" />
  <text x="130" y="260" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Вечные образы</text>
  
  <circle cx="120" cy="275" r="2" fill="#e74c3c" />
  <text x="130" y="280" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Революция</text>
  
  <circle cx="120" cy="295" r="2" fill="#e74c3c" />
  <text x="130" y="300" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Судьба поэта</text>
  
  <!-- Стихи о Прекрасной Даме -->
  <rect x="240" y="220" width="120" height="100" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="5" />
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">«Стихи о Прекрасной Даме»</text>
  <text x="250" y="255" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">(1904)</text>
  
  <text x="250" y="275" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Символ: Белая Леди</text>
  <text x="250" y="290" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Цикл: 3 части</text>
  <text x="250" y="305" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Тема: духовный поиск</text>
  
  <!-- Двенадцать -->
  <rect x="380" y="220" width="100" height="100" fill="#e3f2fd" stroke="#2196f3" stroke-width="1" rx="5" />
  <text x="390" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">«Двенадцать»</text>
  <text x="390" y="255" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">(1918)</text>
  
  <text x="390" y="275" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Жанр: поэма</text>
  <text x="390" y="290" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Герои: 12 красноармейцев</text>
  <text x="390" y="305" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Символ: Христос с флагом</text>
  
  <!-- Декоративные элементы -->
  <path d="M20 340 Q40 330 60 340" stroke="#8b4513" stroke-width="1" fill="none" opacity="0.5" />
  <path d="M440 340 Q460 330 480 340" stroke="#8b4513" stroke-width="1" fill="none" opacity="0.5" />
  
  <!-- Формула творчества Блока -->
  <rect x="240" y="80" width="110" height="30" fill="#fffde7" stroke="#f9a825" stroke-width="1" rx="3" />
  <text x="295" y="100" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Символизм + Реализм</text>
</svg>