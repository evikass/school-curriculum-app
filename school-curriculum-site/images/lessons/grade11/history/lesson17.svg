<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d6e3f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mapGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8f0fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e1fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f44336;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2196f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#666" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#444">Внешняя политика 1930-х</text>
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#666">урок 12</text>
  
  <!-- Карта Европы -->
  <g transform="translate(30, 70)">
    <rect width="290" height="170" fill="url(#mapGradient)" rx="5" filter="url(#shadow)"/>
    <text x="145" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Карта Европы</text>
    
    <!-- Упрощенные очертания стран -->
    <path d="M50,60 Q60,50 80,55 L100,50 L120,60 L110,80 L90,85 L70,80 Z" fill="#4285f4" opacity="0.7"/>
    <text x="85" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">Германия</text>
    
    <path d="M120,50 L150,45 L170,55 L165,75 L140,80 L115,70 Z" fill="#ea4335" opacity="0.7"/>
    <text x="145" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">Польша</text>
    
    <path d="M30,90 L50,85 L60,100 L55,120 L35,125 L20,110 Z" fill="#fbbc05" opacity="0.7"/>
    <text x="40" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">Франция</text>
    
    <path d="M180,60 L200,55 L220,65 L215,85 L195,90 L175,80 Z" fill="#34a853" opacity="0.7"/>
    <text x="200" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">СССР</text>
    
    <path d="M220,50 L240,45 L260,55 L255,75 L235,80 L215,70 Z" fill="#9c27b0" opacity="0.7"/>
    <text x="240" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">Италия</text>
    
    <!-- Мюнхенская линия -->
    <line x1="100" y1="60" x2="120" y2="70" stroke="#ff5722" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="110" y="90" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#ff5722">Линия Мюнхенского соглашения</text>
  </g>
  
  <!-- Хронологическая лента -->
  <g transform="translate(30, 260)">
    <rect width="290" height="40" fill="url(#timelineGradient)" rx="20" opacity="0.8"/>
    <text x="30" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">1938</text>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" fill="#fff">Мюнхенское соглашение</text>
    
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">1939</text>
    <text x="170" y="25" font-family="Arial, sans-serif" font-size="10" fill="#fff">Пакт Молотова-Риббентропа</text>
    
    <text x="250" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">1949</text>
    <text x="270" y="25" font-family="Arial, sans-serif" font-size="10" fill="#fff">НАТО</text>
  </g>
  
  <!-- Портреты и подписи -->
  <g transform="translate(340, 70)">
    <!-- Чемберлен -->
    <circle cx="30" cy="30" r="25" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
    <text x="30" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">Н. Чемберлен</text>
    <text x="30" y="78" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">ПМВ, 1938</text>
    
    <!-- Гитлер -->
    <circle cx="90" cy="30" r="25" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">А. Гитлер</text>
    <text x="90" y="78" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">Рейхсканцлер</text>
    
    <!-- Сталин -->
    <circle cx="30" cy="120" r="25" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
    <text x="30" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">И. Сталин</text>
    <text x="30" y="168" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">Генсек ЦК ВКП(б)</text>
    
    <!-- Молотов -->
    <circle cx="90" cy="120" r="25" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
    <text x="90" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">В. Молотов</text>
    <text x="90" y="168" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">Нарком Иностр. дел</text>
  </g>
  
  <!-- Диаграмма блоков -->
  <g transform="translate(340, 210)">
    <text x="60" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Военные блоки</text>
    
    <!-- НАТО -->
    <rect x="10" y="10" width="100" height="60" fill="#4285f4" opacity="0.7" rx="5"/>
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">НАТО</text>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff">США, Канада,</text>
    <text x="60" y="58" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff">Зап. Европа</text>
    
    <!-- ОВД -->
    <rect x="10" y="80" width="100" height="60" fill="#ea4335" opacity="0.7" rx="5"/>
    <text x="60" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#fff">ОВД</text>
    <text x="60" y="115" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff">СССР, страны</text>
    <text x="60" y="128" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff">Вост. Европы</text>
    
    <!-- Стрелка противостояния -->
    <line x1="120" y1="40" x2="150" y2="40" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="120" y1="110" x2="150" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="160" y="75" font-family="Arial, sans-serif" font-size="10" fill="#666">Холодная война</text>
  </g>
  
  <!-- Даты и события -->
  <g transform="translate(30, 310)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="9" fill="#333">29-30.09.1938: Мюнхенское соглашение</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#333">23.08.1939: Пакт Молотова-Риббентропа</text>
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="9" fill="#333">04.03.1949: Создание НАТО</text>
    <text x="200" y="15" font-family="Arial, sans-serif" font-size="9" fill="#333">14.05.1955: Создание ОВД</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <circle cx="45" cy="45" r="3" fill="#ff5722"/>
  <circle cx="55" cy="45" r="3" fill="#2196f3"/>
  <circle cx="65" cy="45" r="3" fill="#4caf50"/>
  
  <!-- Декоративные линии -->
  <line x1="30" y1="300" x2="470" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Стрелка для диаграммы -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>