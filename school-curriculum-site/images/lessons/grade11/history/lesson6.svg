<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#D2691E" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4B0082">
    Февральская революция 1917 года
  </text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6A5ACD">
    ИСТОРИЯ · 11 КЛАСС
  </text>
  <text x="450" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">
    Урок №12
  </text>
  
  <!-- Хронологическая лента -->
  <rect x="30" y="70" width="440" height="8" fill="#CD853F" rx="4"/>
  <rect x="30" y="70" width="110" height="8" fill="#8B4513" rx="4"/>
  <rect x="140" y="70" width="110" height="8" fill="#A0522D" rx="4"/>
  <rect x="250" y="70" width="110" height="8" fill="#D2691E" rx="4"/>
  <rect x="360" y="70" width="110" height="8" fill="#F4A460" rx="4"/>
  
  <!-- Даты на хронологической ленте -->
  <text x="85" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">23 февраля</text>
  <text x="195" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">24 февраля</text>
  <text x="305" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">25 февраля</text>
  <text x="415" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">26-27 февраля</text>
  
  <!-- Карта Петрограда -->
  <g transform="translate(30, 90)">
    <rect width="120" height="100" fill="#E6F3FF" stroke="#4682B4" stroke-width="1"/>
    <path d="M20,30 L40,25 L60,35 L80,30 L100,40 L90,60 L70,70 L50,65 L30,70 L20,50 Z" fill="#B0C4DE" stroke="#4682B4" stroke-width="1"/>
    <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2F4F4F">Петроград</text>
    <!-- Указатель на Невский проспект -->
    <line x1="60" y1="50" x2="60" y2="40" stroke="#FF0000" stroke-width="2"/>
    <circle cx="60" cy="40" r="3" fill="#FF0000"/>
    <text x="65" y="42" font-family="Arial, sans-serif" font-size="8" fill="#FF0000">Невский</text>
  </g>
  
  <!-- Толпа на улицах -->
  <g transform="translate(160, 90)">
    <rect width="150" height="100" fill="#F5DEB3" stroke="#8B4513" stroke-width="1"/>
    <!-- Фигуры людей -->
    <ellipse cx="30" cy="60" rx="8" ry="12" fill="#4682B4"/>
    <rect x="25" y="72" width="10" height="15" fill="#8B4513"/>
    <rect x="27" y="65" width="6" height="10" fill="#FFA07A"/>
    
    <ellipse cx="60" cy="55" rx="8" ry="12" fill="#2F4F4F"/>
    <rect x="55" y="67" width="10" height="15" fill="#8B4513"/>
    <rect x="57" y="60" width="6" height="10" fill="#FFA07A"/>
    
    <ellipse cx="90" cy="65" rx="8" ry="12" fill="#4682B4"/>
    <rect x="85" y="77" width="10" height="15" fill="#8B4513"/>
    <rect x="87" y="70" width="6" height="10" fill="#FFA07A"/>
    
    <ellipse cx="120" cy="58" rx="8" ry="12" fill="#2F4F4F"/>
    <rect x="115" y="70" width="10" height="15" fill="#8B4513"/>
    <rect x="117" y="63" width="6" height="10" fill="#FFA07A"/>
    
    <!-- Знамена -->
    <line x1="30" y1="50" x2="30" y2="35" stroke="#8B0000" stroke-width="1"/>
    <rect x="25" y="30" width="10" height="8" fill="#8B0000"/>
    
    <line x1="90" y1="45" x2="90" y2="30" stroke="#000080" stroke-width="1"/>
    <rect x="85" y="25" width="10" height="8" fill="#000080"/>
    
    <text x="75" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Толпа на улицах</text>
  </g>
  
  <!-- Схема двоевластия -->
  <g transform="translate(320, 90)">
    <rect width="150" height="100" fill="#F0F8FF" stroke="#4682B4" stroke-width="1"/>
    <!-- Временное правительство -->
    <rect x="10" y="10" width="60" height="40" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
    <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#000080">Временное</text>
    <text x="40" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#000080">правительство</text>
    
    <!-- Советы -->
    <rect x="80" y="10" width="60" height="40" fill="#DDA0DD" stroke="#9370DB" stroke-width="1"/>
    <text x="110" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4B0082">Советы</text>
    <text x="110" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4B0082">депутатов</text>
    
    <!-- Стрелки -->
    <line x1="40" y1="50" x2="40" y2="70" stroke="#4682B4" stroke-width="1" marker-end="url(#arrowhead)"/>
    <line x1="110" y1="50" x2="110" y2="70" stroke="#9370DB" stroke-width="1" marker-end="url(#arrowhead2)"/>
    
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Двоевластие</text>
  </g>
  
  <!-- Определения стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4682B4"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9370DB"/>
    </marker>
  </defs>
  
  <!-- Портрет Николая II -->
  <g transform="translate(30, 210)">
    <rect width="100" height="100" fill="#FFF8DC" stroke="#8B4513" stroke-width="1"/>
    <circle cx="50" cy="35" r="20" fill="#FFA07A"/>
    <path d="M30,55 Q50,45 70,55 L70,80 Q50,90 30,80 Z" fill="#4169E1"/>
    <rect x="35" y="55" width="30" height="20" fill="#8B4513"/>
    <rect x="20" y="45" width="60" height="8" fill="#DAA520" rx="4"/>
    <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">Николай II</text>
  </g>
  
  <!-- Документ об отречении -->
  <g transform="translate(140, 210)">
    <rect width="120" height="100" fill="#FFFACD" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="25" x2="100" y2="25" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="35" x2="100" y2="35" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="45" x2="100" y2="45" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="55" x2="80" y2="55" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="65" x2="90" y2="65" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="75" x2="85" y2="75" stroke="#8B4513" stroke-width="1"/>
    <text x="60" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Манифест об отречении</text>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B0000">2 марта 1917 г.</text>
  </g>
  
  <!-- График настроений населения -->
  <g transform="translate(270, 210)">
    <rect width="200" height="100" fill="#F5F5DC" stroke="#8B4513" stroke-width="1"/>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#000" stroke-width="1"/>
    <line x1="20" y1="20" x2="20" y2="80" stroke="#000" stroke-width="1"/>
    
    <!-- График -->
    <polyline points="20,70 50,65 80,50 110,30 140,25 170,20" fill="none" stroke="#FF4500" stroke-width="2"/>
    
    <!-- Метки -->
    <text x="20" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">23</text>
    <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">24</text>
    <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">25</text>
    <text x="110" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">26</text>
    <text x="140" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">27</text>
    <text x="170" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">28</text>
    
    <text x="100" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Рост недовольства</text>
    <text x="10" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B4513" transform="rotate(-90, 10, 50)">Уровень</text>
  </g>
  
  <!-- Ключевые события -->
  <g transform="translate(30, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">Ключевые события:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">23-24.02 - хлебные бунты и стачки</text>
    <text x="200" y="15" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">25.02 - создание Петроградского совета</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">26.02 - переход войск на сторону революции</text>
    <text x="200" y="28" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">02.03 - отречение Николая II</text>
  </g>
  
  <!-- Декоративный элемент -->
  <circle cx="480" cy="340" r="15" fill="none" stroke="#D2691E" stroke-width="2"/>
  <path d="M470,340 L475,335 L480,340 L485,335 L490,340" fill="none" stroke="#8B4513" stroke-width="1"/>
</svg>