<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d32f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#388e3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="brownGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4e342e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#666" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#d32f2f">Начало Великой Отечественной войны</text>
  <text x="470" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">Урок 8</text>
  
  <!-- Карта контуров -->
  <path d="M80,100 Q120,90 180,95 T280,100 Q320,110 360,120 T420,150 Q430,180 420,210 T380,250 Q340,270 300,275 T240,270 Q200,260 160,250 T100,220 Q80,190 80,150 Z" 
        fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  
  <!-- Города -->
  <circle cx="100" cy="120" r="4" fill="#d32f2f"/>
  <text x="100" y="110" text-anchor="middle" font-size="10" fill="#333">Брест</text>
  
  <circle cx="200" cy="140" r="4" fill="#d32f2f"/>
  <text x="200" y="130" text-anchor="middle" font-size="10" fill="#333">Вильнюс</text>
  
  <circle cx="300" cy="160" r="4" fill="#d32f2f"/>
  <text x="300" y="150" text-anchor="middle" font-size="10" fill="#333">Минск</text>
  
  <circle cx="350" cy="180" r="4" fill="#d32f2f"/>
  <text x="350" y="170" text-anchor="middle" font-size="10" fill="#333">Житомир</text>
  
  <circle cx="400" cy="200" r="4" fill="#d32f2f"/>
  <text x="400" y="190" text-anchor="middle" font-size="10" fill="#333">Киев</text>
  
  <circle cx="180" cy="220" r="4" fill="#d32f2f"/>
  <text x="180" y="210" text-anchor="middle" font-size="10" fill="#333">Гродно</text>
  
  <!-- Стрелки наступления -->
  <!-- Северная группа -->
  <path d="M60,80 L100,100 L90,95 M100,100 L95,90" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  <text x="50" y="75" font-size="12" fill="#1976d2">СЕВЕР</text>
  <text x="50" y="90" font-size="10" fill="#1976d2">Армия группа "Север"</text>
  
  <!-- Центральная группа -->
  <path d="M50,120 L180,140 L170,135 M180,140 L175,130" fill="none" stroke="url(#redGradient)" stroke-width="3"/>
  <text x="30" y="115" font-size="12" fill="#d32f2f">ЦЕНТР</text>
  <text x="30" y="130" font-size="10" fill="#d32f2f">Армия группа "Центр"</text>
  
  <!-- Южная группа -->
  <path d="M40,160 L350,180 L340,175 M350,180 L345,170" fill="none" stroke="url(#greenGradient)" stroke-width="3"/>
  <text x="20" y="155" font-size="12" fill="#388e3c">ЮГ</text>
  <text x="20" y="170" font-size="10" fill="#388e3c">Армия группа "Юг"</text>
  
  <!-- Портрет Гитлера -->
  <rect x="420" y="70" width="60" height="80" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <circle cx="450" cy="90" r="12" fill="#e0e0e0"/>
  <path d="M435,110 Q450,105 465,110 L460,125 Q450,130 440,125 Z" fill="#e0e0e0"/>
  <text x="450" y="165" text-anchor="middle" font-size="10" fill="#333">Гитлер</text>
  
  <!-- План Барбаросса заголовок -->
  <rect x="80" y="290" width="340" height="40" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="250" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">ПЛАН "БАРАРОССА"</text>
  <text x="250" y="320" text-anchor="middle" font-size="10" fill="#333">22 июня 1941 г.</text>
  
  <!-- Этапы плана -->
  <rect x="90" y="300" width="80" height="20" fill="url(#redGradient)" opacity="0.7"/>
  <text x="130" y="315" text-anchor="middle" font-size="9" fill="white">1-2 недели</text>
  
  <rect x="180" y="300" width="80" height="20" fill="url(#blueGradient)" opacity="0.7"/>
  <text x="220" y="315" text-anchor="middle" font-size="9" fill="white">1-3 месяца</text>
  
  <rect x="270" y="300" width="80" height="20" fill="url(#greenGradient)" opacity="0.7"/>
  <text x="310" y="315" text-anchor="middle" font-size="9" fill="white">9-12 месяцев</text>
  
  <rect x="360" y="300" width="50" height="20" fill="url(#brownGradient)" opacity="0.7"/>
  <text x="385" y="315" text-anchor="middle" font-size="9" fill="white">до зимы</text>
  
  <!-- Хронологическая лента -->
  <line x1="80" y1="270" x2="420" y2="270" stroke="#666" stroke-width="2"/>
  <circle cx="80" cy="270" r="4" fill="#d32f2f"/>
  <text x="80" y="285" text-anchor="middle" font-size="9" fill="#333">22.06</text>
  
  <circle cx="180" cy="270" r="4" fill="#1976d2"/>
  <text x="180" y="285" text-anchor="middle" font-size="9" fill="#333">июль</text>
  
  <circle cx="280" cy="270" r="4" fill="#388e3c"/>
  <text x="280" y="285" text-anchor="middle" font-size="9" fill="#333">август</text>
  
  <circle cx="380" cy="270" r="4" fill="#795548"/>
  <text x="380" y="285" text-anchor="middle" font-size="9" fill="#333">сентябрь</text>
  
  <!-- Схема сил -->
  <rect x="420" y="160" width="70" height="100" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="455" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">СИЛЫ</text>
  
  <text x="425" y="190" font-size="9" fill="#333">СССР:</text>
  <text x="425" y="205" font-size="8" fill="#666">2.9 млн</text>
  
  <text x="425" y="220" font-size="9" fill="#333">Германия:</text>
  <text x="425" y="235" font-size="8" fill="#666">3.0 млн</text>
  
  <!-- Даты и события -->
  <rect x="80" y="60" width="120" height="50" fill="#fffde7" stroke="#fbc02d" stroke-width="1"/>
  <text x="140" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">22 июня 1941</text>
  <text x="140" y="88" text-anchor="middle" font-size="9" fill="#666">4:00 утра</text>
  <text x="140" y="100" text-anchor="middle" font-size="9" fill="#666">Начало войны</text>
  
  <!-- Легенда -->
  <rect x="300" y="60" width="100" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="350" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Легенда:</text>
  <line x1="310" y1="85" x2="330" y2="85" stroke="#1976d2" stroke-width="3"/>
  <text x="335" y="89" font-size="9" fill="#333">Направление</text>
  <circle cx="320" cy="100" r="3" fill="#d32f2f"/>
  <text x="335" y="104" font-size="9" fill="#333">Город</text>
</svg>