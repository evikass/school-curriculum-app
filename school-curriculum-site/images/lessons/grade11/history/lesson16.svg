<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0000;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="redStar">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="8"/>
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#8b0000" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#8b0000">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#4b0000">Культура 1930-х годов</text>
  
  <!-- Номер урока -->
  <rect x="420" y="25" width="40" height="25" fill="#8b0000" rx="5"/>
  <text x="440" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Урок 12</text>
  
  <!-- Хронологическая лента -->
  <rect x="30" y="80" width="440" height="8" fill="#8b0000" rx="4"/>
  <circle cx="80" cy="84" r="6" fill="#cc0000"/>
  <circle cx="180" cy="84" r="6" fill="#cc0000"/>
  <circle cx="280" cy="84" r="6" fill="#cc0000"/>
  <circle cx="380" cy="84" r="6" fill="#cc0000"/>
  
  <text x="80" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1930</text>
  <text x="180" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1933</text>
  <text x="280" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1936</text>
  <text x="380" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1939</text>
  
  <!-- МХАТ -->
  <g transform="translate(30, 120)">
    <rect x="0" y="0" width="100" height="80" fill="#f0e6d2" stroke="#8b0000" stroke-width="2"/>
    <rect x="10" y="10" width="80" height="60" fill="#8b0000"/>
    <rect x="20" y="20" width="15" height="20" fill="#f0e6d2"/>
    <rect x="40" y="20" width="15" height="20" fill="#f0e6d2"/>
    <rect x="60" y="20" width="15" height="20" fill="#f0e6d2"/>
    <rect x="20" y="45" width="60" height="20" fill="#f0e6d2"/>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">МХАТ</text>
    <text x="50" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1938 г.</text>
  </g>
  
  <!-- Постер Чапаев -->
  <g transform="translate(150, 120)">
    <rect x="0" y="0" width="100" height="80" fill="#f0e6d2" stroke="#8b0000" stroke-width="2"/>
    <rect x="10" y="10" width="80" height="60" fill="#cc0000"/>
    <polygon points="30,30 70,30 50,70" fill="#ffcc00"/>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">Чапаев</text>
    <text x="50" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1934 г.</text>
  </g>
  
  <!-- Александр Невский -->
  <g transform="translate(270, 120)">
    <rect x="0" y="0" width="100" height="80" fill="#f0e6d2" stroke="#8b0000" stroke-width="2"/>
    <rect x="10" y="10" width="80" height="60" fill="#1a472a"/>
    <polygon points="50,20 30,40 50,60 70,40" fill="#cc0000"/>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">Невский</text>
    <text x="50" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1938 г.</text>
  </g>
  
  <!-- Ликбез -->
  <g transform="translate(30, 220)">
    <rect x="0" y="0" width="130" height="100" fill="#f0e6d2" stroke="#8b0000" stroke-width="2"/>
    <rect x="10" y="10" width="110" height="80" fill="white"/>
    <line x1="20" y1="25" x2="110" y2="25" stroke="#8b0000" stroke-width="1"/>
    <line x1="20" y1="35" x2="110" y2="35" stroke="#8b0000" stroke-width="1"/>
    <line x1="20" y1="45" x2="110" y2="45" stroke="#8b0000" stroke-width="1"/>
    <line x1="20" y1="55" x2="80" y2="55" stroke="#8b0000" stroke-width="1"/>
    <line x1="20" y1="65" x2="100" y2="65" stroke="#8b0000" stroke-width="1"/>
    <line x1="20" y1="75" x2="90" y2="75" stroke="#8b0000" stroke-width="1"/>
    <text x="65" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">Ликбез</text>
    <text x="65" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1920-1930-е гг.</text>
  </g>
  
  <!-- Радиофикация -->
  <g transform="translate(180, 220)">
    <rect x="0" y="0" width="130" height="100" fill="#f0e6d2" stroke="#8b0000" stroke-width="2"/>
    <rect x="30" y="20" width="70" height="40" fill="#333333" rx="5"/>
    <circle cx="50" cy="40" r="8" fill="#cc0000"/>
    <circle cx="80" cy="40" r="8" fill="#333333"/>
    <rect x="35" y="65" width="60" height="5" fill="#666666"/>
    <rect x="55" y="70" width="20" height="10" fill="#666666"/>
    <path d="M40,30 Q30,20 20,30" stroke="#cc0000" stroke-width="2" fill="none"/>
    <path d="M90,30 Q100,20 110,30" stroke="#cc0000" stroke-width="2" fill="none"/>
    <text x="65" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">Радиофикация</text>
    <text x="65" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">1930-е гг.</text>
  </g>
  
  <!-- Соцреализм -->
  <g transform="translate(330, 220)">
    <rect x="0" y="0" width="140" height="100" fill="#f0e6d2" stroke="#8b0000" stroke-width="2"/>
    <rect x="10" y="10" width="120" height="80" fill="#e8dcc0"/>
    <polygon points="20,30 120,30 70,90" fill="#8b0000"/>
    <rect x="40" y="40" width="60" height="30" fill="#ffcc00"/>
    <polygon points="70,40 50,55 70,70 90,55" fill="#cc0000"/>
    <text x="70" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">Социалистический</text>
    <text x="70" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4b0000">реализм</text>
  </g>
  
  <!-- График роста грамотности -->
  <g transform="translate(30, 140)">
    <rect x="0" y="0" width="100" height="60" fill="white" stroke="#8b0000" stroke-width="1"/>
    <polyline points="10,50 30,45 50,35 70,25 90,15" stroke="#cc0000" stroke-width="2" fill="none"/>
    <circle cx="10" cy="50" r="2" fill="#cc0000"/>
    <circle cx="30" cy="45" r="2" fill="#cc0000"/>
    <circle cx="50" cy="35" r="2" fill="#cc0000"/>
    <circle cx="70" cy="25" r="2" fill="#cc0000"/>
    <circle cx="90" cy="15" r="2" fill="#cc0000"/>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">Рост грамотности</text>
  </g>
  
  <!-- Звезда -->
  <g transform="translate(460, 140)">
    <polygon points="15,5 18,12 25,12 20,17 22,24 15,19 8,24 10,17 5,12 12,12" fill="url(#redStar)"/>
  </g>
  
  <!-- Карта СССР -->
  <g transform="translate(200, 140)">
    <rect x="0" y="0" width="120" height="60" fill="white" stroke="#8b0000" stroke-width="1"/>
    <ellipse cx="60" cy="30" rx="50" ry="20" fill="#cc0000" opacity="0.3"/>
    <circle cx="40" cy="25" r="3" fill="#8b0000"/>
    <circle cx="60" cy="30" r="3" fill="#8b0000"/>
    <circle cx="80" cy="35" r="3" fill="#8b0000"/>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4b0000">Радиосети СССР</text>
  </g>
  
  <!-- Формула соцреализма -->
  <text x="350" y="250" font-family="Arial, sans-serif" font-size="12" fill="#4b0000">Реализм + Партийность</text>
  <text x="350" y="265" font-family="Arial, sans-serif" font-size="12" fill="#4b0000">= Соцреализм</text>
  
  <!-- Даты -->
  <text x="30" y="335" font-family="Arial, sans-serif" font-size="10" fill="#8b0000">1930-1939</text>
  
  <!-- Декоративные элементы -->
  <line x1="30" y1="170" x2="470" y2="170" stroke="#8b0000" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="170" y1="120" x2="170" y2="200" stroke="#8b0000" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="320" y1="120" x2="320" y2="200" stroke="#8b0000" stroke-width="1" stroke-dasharray="5,3"/>
</svg>