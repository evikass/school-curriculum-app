<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ED321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5FA617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BD10E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9013FE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#4A90E2" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Номер урока -->
  <rect x="20" y="20" width="30" height="30" fill="url(#purpleGradient)" rx="5"/>
  <text x="35" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">16</text>
  
  <!-- География · 11 класс -->
  <text x="250" y="40" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" font-family="Arial" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">Урок 16: Объём прямоугольного параллелепипеда</text>
  
  <!-- Формула V=abc -->
  <rect x="175" y="80" width="150" height="35" fill="#F8F9FA" stroke="#4A90E2" stroke-width="1" rx="5"/>
  <text x="250" y="102" font-family="Arial" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">V = a · b · c</text>
  
  <!-- Основной параллелепипед -->
  <g transform="translate(100, 150)">
    <!-- Задняя грань -->
    <rect x="0" y="0" width="150" height="100" fill="url(#blueGradient)" opacity="0.7"/>
    <!-- Правая грань -->
    <polygon points="150,0 200,25 200,125 150,100" fill="url(#blueGradient)" opacity="0.8"/>
    <!-- Левая грань -->
    <polygon points="0,0 -50,25 -50,125 0,100" fill="url(#blueGradient)" opacity="0.9"/>
    <!-- Нижняя грань -->
    <polygon points="0,100 150,100 200,125 -50,125" fill="url(#blueGradient)" opacity="0.6"/>
    <!-- Верхняя грань -->
    <polygon points="0,0 150,0 200,25 -50,25" fill="url(#blueGradient)" opacity="0.7"/>
    
    <!-- Размеры a, b, c -->
    <line x1="0" y1="-10" x2="150" y2="-10" stroke="#333" stroke-width="2"/>
    <text x="75" y="-15" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">a</text>
    
    <line x1="160" y1="0" x2="160" y2="100" stroke="#333" stroke-width="2"/>
    <text x="175" y="55" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">b</text>
    
    <line x1="-60" y1="0" x2="-60" y2="25" stroke="#333" stroke-width="2"/>
    <text x="-75" y="15" font-family="Arial" font-size="14" fill="#333" text-anchor="middle">c</text>
  </g>
  
  <!-- Принцип Кавальери -->
  <text x="250" y="280" font-family="Arial" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Принцип Кавальери</text>
  
  <!-- Иллюстрация принципа Кавальери -->
  <g transform="translate(250, 200)">
    <!-- Первый объект -->
    <g>
      <rect x="-120" y="0" width="40" height="40" fill="url(#greenGradient)" opacity="0.8"/>
      <rect x="-120" y="40" width="40" height="30" fill="url(#greenGradient)" opacity="0.6"/>
      <rect x="-120" y="70" width="40" height="20" fill="url(#greenGradient)" opacity="0.4"/>
      <text x="-100" y="100" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Объект 1</text>
    </g>
    
    <!-- Второй объект -->
    <g>
      <ellipse cx="-30" cy="20" rx="20" ry="40" fill="url(#orangeGradient)" opacity="0.8"/>
      <ellipse cx="-30" cy="60" rx="20" ry="30" fill="url(#orangeGradient)" opacity="0.6"/>
      <ellipse cx="-30" cy="90" rx="20" ry="20" fill="url(#orangeGradient)" opacity="0.4"/>
      <text x="-30" y="120" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Объект 2</text>
    </g>
    
    <!-- Стрелка равенства -->
    <path d="M 0 50 L 40 50" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 0 40 L 0 60" stroke="#333" stroke-width="2"/>
    
    <!-- Третий объект -->
    <g>
      <polygon points="80,0 120,0 100,40 60,40" fill="url(#purpleGradient)" opacity="0.8"/>
      <polygon points="80,40 120,40 100,80 60,80" fill="url(#purpleGradient)" opacity="0.6"/>
      <polygon points="80,80 120,80 100,100 60,100" fill="url(#purpleGradient)" opacity="0.4"/>
      <text x="90" y="120" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">Объект 3</text>
    </g>
  </g>
  
  <!-- Определение принципа Кавальери -->
  <text x="250" y="330" font-family="Arial" font-size="12" fill="#666" text-anchor="middle">Если два тела имеют одинаковую высоту и все параллельные плоскости отсекают на них фигуры одинаковой площади, то эти тела имеют равные объёмы</text>
  
  <!-- График зависимости объёма от параметров -->
  <g transform="translate(380, 150)">
    <!-- Ось X -->
    <line x1="0" y1="80" x2="80" y2="80" stroke="#333" stroke-width="1"/>
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="1"/>
    
    <!-- Точки данных -->
    <circle cx="20" cy="70" r="3" fill="#4A90E2"/>
    <circle cx="40" cy="50" r="3" fill="#4A90E2"/>
    <circle cx="60" cy="20" r="3" fill="#4A90E2"/>
    
    <!-- Кривая роста -->
    <path d="M 0,75 Q 20,60 40,45 T 80,10" stroke="#4A90E2" stroke-width="2" fill="none"/>
    
    <!-- Подписи осей -->
    <text x="40" y="95" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">размер</text>
    <text x="-15" y="40" font-family="Arial" font-size="10" fill="#333" text-anchor="middle" transform="rotate(-90, -15, 40)">объём</text>
  </g>
  
  <!-- Дополнительные формулы -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="60" height="25" fill="#F8F9FA" stroke="#4A90E2" stroke-width="1" rx="3"/>
    <text x="30" y="17" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">V = S·h</text>
  </g>
  
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="60" height="25" fill="#F8F9FA" stroke="#4A90E2" stroke-width="1" rx="3"/>
    <text x="30" y="17" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">S = a·b</text>
  </g>
  
  <g transform="translate(30, 210)">
    <rect x="0" y="0" width="60" height="25" fill="#F8F9FA" stroke="#4A90E2" stroke-width="1" rx="3"/>
    <text x="30" y="17" font-family="Arial" font-size="12" fill="#333" text-anchor="middle">V = a·b·c</text>
  </g>
  
  <!-- Справка по единицам измерения -->
  <g transform="translate(420, 200)">
    <rect x="0" y="0" width="70" height="60" fill="#F8F9FA" stroke="#666" stroke-width="1" rx="3"/>
    <text x="35" y="15" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">Единицы:</text>
    <text x="35" y="30" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">м³</text>
    <text x="35" y="45" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">см³</text>
    <text x="35" y="55" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">л = дм³</text>
  </g>
  
  <!-- Историческая справка -->
  <g transform="translate(30, 250)">
    <rect x="0" y="0" width="100" height="80" fill="#F8F9FA" stroke="#666" stroke-width="1" rx="3"/>
    <text x="50" y="15" font-family="Arial" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Кавальери</text>
    <text x="50" y="30" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Бонавентура</text>
    <text x="50" y="42" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">(1598-1647)</text>
    <text x="50" y="55" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Итальянский</text>
    <text x="50" y="67" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">математик</text>
  </g>
</svg>