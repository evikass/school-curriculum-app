  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Конус</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 5</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="100" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="82" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="94" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Определение</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Конус — тело, ограниченное</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">конической поверхностью и</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F">кругом (основание).</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F">R — радиус основания</text>
  <text x="26" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">l — образующая</text>
  <text x="26" y="202" font-family="Arial,sans-serif" font-size="10" fill="#37474F">h — высота</text>
  <rect x="255" y="82" width="225" height="100" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Формулы</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">V = ⅓πR²h</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_бок = πRl</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_полн = πR(R + l)</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">l² = R² + h²</text>
  <text x="263" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_осн = πR²</text>
  <rect x="18" y="190" width="225" height="95" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="190" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="202" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="203" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Свойства и сечения</text>
  <text x="26" y="220" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Осевое сечение — равнобедр. Δ</text>
  <text x="26" y="235" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Сечение ⊥ оси — круг</text>
  <text x="26" y="250" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Развёртка бок. пов. — сектор</text>
  <text x="26" y="265" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Ус. конус: V=⅓πh(R²+Rr+r²)</text>
  <text x="26" y="280" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• S_бок ус. = π(R+r)l</text>
