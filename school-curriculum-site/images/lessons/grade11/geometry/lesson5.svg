    <line x1="370" y1="210" x2="370" y2="278" stroke="#FF7043" stroke-width="1.5" stroke-dasharray="4,3" />
    <text x="380" y="250" font-family="Arial,sans-serif" font-size="10" fill="#FF7043" font-style="italic">h</text>
    <text x="390" y="248" font-family="Arial,sans-serif" font-size="10" fill="#7986CB" font-style="italic">l</text>
    <line x1="370" y1="278" x2="415" y2="278" stroke="#FF7043" stroke-width="1" stroke-dasharray="3,2" />
    <text x="395" y="290" font-family="Arial,sans-serif" font-size="9" fill="#FF7043" text-anchor="middle">R</text>
  </g>
