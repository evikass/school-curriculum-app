<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="14" fill="#34495e" text-anchor="middle" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Урок 24: Метод координат для решения задач ЕГЭ</text>
  
  <!-- Номер урока -->
  <text x="470" y="35" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="end">№24</text>
  
  <!-- Тема -->
  <text x="250" y="80" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle" font-weight="bold">Стереометрия на ЕГЭ методом координат</text>
  
  <!-- Оси координат -->
  <line x1="80" y1="280" x2="420" y2="280" stroke="#3498db" stroke-width="2"/>
  <line x1="80" y1="280" x2="80" y2="100" stroke="#3498db" stroke-width="2"/>
  <line x1="80" y1="280" x2="120" y2="290" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="280" x2="70" y2="240" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="280" x2="90" y2="285" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  
  <!-- Стрелки осей -->
  <polygon points="420,280 410,275 410,285" fill="#3498db"/>
  <polygon points="80,100 75,110 85,110" fill="#3498db"/>
  
  <!-- Подписи осей -->
  <text x="430" y="285" font-family="Arial, sans-serif" font-size="14" fill="#3498db">x</text>
  <text x="85" y="95" font-family="Arial, sans-serif" font-size="14" fill="#3498db">y</text>
  <text x="55" y="190" font-family="Arial, sans-serif" font-size="14" fill="#3498db">z</text>
  
  <!-- Точка в пространстве -->
  <circle cx="250" cy="180" r="5" fill="#e74c3c"/>
  <text x="260" y="185" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">M(x,y,z)</text>
  
  <!-- Проекции точки -->
  <line x1="250" y1="180" x2="250" y2="280" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="180" x2="80" y2="280" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="180" x2="80" y2="180" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Проекции на оси -->
  <circle cx="250" cy="280" r="3" fill="#e74c3c"/>
  <circle cx="80" cy="280" r="3" fill="#e74c3c"/>
  <circle cx="80" cy="180" r="3" fill="#e74c3c"/>
  
  <!-- Подписи проекций -->
  <text x="255" y="295" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">M'</text>
  <text x="60" y="285" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">M"</text>
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">M‴</text>
  
  <!-- Треугольник в пространстве -->
  <polygon points="120,200 180,160 220,220" fill="#9b59b6" fill-opacity="0.3" stroke="#9b59b6" stroke-width="2"/>
  <circle cx="120" cy="200" r="3" fill="#9b59b6"/>
  <circle cx="180" cy="160" r="3" fill="#9b59b6"/>
  <circle cx="220" cy="220" r="3" fill="#9b59b6"/>
  
  <!-- Подписи вершин треугольника -->
  <text x="110" y="195" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">A</text>
  <text x="185" y="155" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">B</text>
  <text x="225" y="215" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">C</text>
  
  <!-- Пирамида -->
  <polygon points="300,240 350,200 400,240 350,280" fill="#1abc9c" fill-opacity="0.2" stroke="#1abc9c" stroke-width="1.5"/>
  <line x1="350" y1="200" x2="350" y2="140" stroke="#1abc9c" stroke-width="1.5"/>
  <polygon points="320,160 380,160 350,100" fill="#1abc9c" fill-opacity="0.3" stroke="#1abc9c" stroke-width="1.5"/>
  
  <!-- Вершины пирамиды -->
  <circle cx="300" cy="240" r="3" fill="#1abc9c"/>
  <circle cx="350" cy="200" r="3" fill="#1abc9c"/>
  <circle cx="400" cy="240" r="3" fill="#1abc9c"/>
  <circle cx="350" cy="280" r="3" fill="#1abc9c"/>
  <circle cx="350" cy="140" r="3" fill="#1abc9c"/>
  
  <!-- Подписи пирамиды -->
  <text x="295" y="235" font-family="Arial, sans-serif" font-size="10" fill="#1abc9c">A</text>
  <text x="355" y="195" font-family="Arial, sans-serif" font-size="10" fill="#1abc9c">B</text>
  <text x="405" y="235" font-family="Arial, sans-serif" font-size="10" fill="#1abc9c">C</text>
  <text x="355" y="290" font-family="Arial, sans-serif" font-size="10" fill="#1abc9c">D</text>
  <text x="355" y="135" font-family="Arial, sans-serif" font-size="10" fill="#1abc9c">S</text>
  
  <!-- Формула расстояния между точками -->
  <rect x="50" y="300" width="400" height="30" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">d = √[(x₂-x₁)² + (y₂-y₁)² + (z₂-z₁)²]</text>
  
  <!-- Формула расстояния от точки до плоскости -->
  <rect x="50" y="330" width="400" height="15" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="341" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">d = |Ax₀+By₀+Cz₀+D|/√(A²+B²+C²)</text>
  
  <!-- Ключевой термин -->
  <rect x="30" y="100" width="100" height="25" fill="#f39c12" fill-opacity="0.2" stroke="#f39c12" stroke-width="1" rx="3"/>
  <text x="80" y="117" font-family="Arial, sans-serif" font-size="11" fill="#f39c12" text-anchor="middle">Координаты</text>
  
  <!-- Алгоритм решения -->
  <rect x="420" y="100" width="70" height="160" fill="#95a5a6" fill-opacity="0.1" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="455" y="120" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle" font-weight="bold">Алгоритм</text>
  <text x="455" y="140" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">1. Выбрать систему</text>
  <text x="455" y="155" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">координат</text>
  <text x="455" y="175" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">2. Найти координаты</text>
  <text x="455" y="190" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">вершин</text>
  <text x="455" y="210" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">3. Вычислить</text>
  <text x="455" y="225" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">необходимые</text>
  <text x="455" y="240" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">величины</text>
  <text x="455" y="260" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">4. Записать ответ</text>
  
  <!-- Пример задачи -->
  <rect x="150" y="90" width="200" height="35" fill="#e67e22" fill-opacity="0.1" stroke="#e67e22" stroke-width="1" rx="3"/>
  <text x="250" y="112" font-family="Arial, sans-serif" font-size="11" fill="#e67e22" text-anchor="middle">Пример: Расстояние между точками</text>
</svg>