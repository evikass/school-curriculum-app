<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0" />
      <stop offset="100%" stop-color="#3F51B5" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="2.5" />
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.25" />
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,10 470,10 490,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,340 470,340 490,320" fill="#5C6BC0" opacity="0.10" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Объёмы тел</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 7</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="108" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="18" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="18" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Объёмы основных тел</text>
  <text x="26" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Призма:     V = S_осн · h</text>
  <text x="26" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Пирамида:    V = ⅓ · S_осн · h</text>
  <text x="26" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Цилиндр:     V = πR²h</text>
  <text x="26" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Конус:       V = ⅓πR²h</text>
  <text x="26" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Шар:         V = ⁴⁄₃πR³</text>
  <text x="26" y="194" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Ус. пирамида: V = ⅓h(S₁+√S₁S₂+S₂)</text>
  <rect x="255" y="82" width="225" height="108" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Объёмы (продолжение)</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Ус. конус: V = ⅓πh(R²+Rr+r²)</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Цилиндр (общ.): V = S_осн · l</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Шар. сегмент: V = πh²(R−⅓h)</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Шар. слой: V = V_сегм₁ + V_сегм₂</text>
  <text x="263" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Шар. сектор: V = ⅔πR²h</text>
  <text x="263" y="194" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold" />
  <rect x="18" y="198" width="225" height="95" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="198" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="210" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Принцип Кавальери</text>
  <text x="26" y="228" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Если два тела заключены между</text>
  <text x="26" y="243" font-family="Arial,sans-serif" font-size="10" fill="#37474F">параллельными плоскостями и</text>
  <text x="26" y="258" font-family="Arial,sans-serif" font-size="10" fill="#37474F">площади сечений равны, то</text>
  <text x="26" y="273" font-family="Arial,sans-serif" font-size="10" fill="#37474F">объёмы этих тел равны.</text>
  <text x="26" y="288" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="303" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Следствие: V = S_осн · h</text>
  <rect x="255" y="198" width="225" height="95" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="255" y="198" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="255" y="210" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="367" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Отношения объёмов</text>
  <text x="263" y="228" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• V_пир = ⅓ · V_приз (S, h те же)</text>
  <text x="263" y="243" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• V_кон = ⅓ · V_цил (R, h те же)</text>
  <text x="263" y="258" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Подобные тела: V₁/V₂ = k³</text>
  <text x="263" y="273" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• V_шар = ⁴⁄₃πR³</text>
  <text x="263" y="288" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Объём тетраэдра: V=⅓S·h</text>
  <rect x="10" y="305" width="480" height="35" fill="url(#panelGrad)" opacity="0.08" rx="5" />
  <text x="250" y="327" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" text-anchor="middle" opacity="0.65">Геометрия · 11 класс</text>
</svg>