<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#2c3e50">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" font-weight="bold" fill="#3498db">Урок 7: Уравнение прямой в пространстве</text>
  <text x="40" y="30" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">№7</text>
  
  <!-- Оси координат -->
  <line x1="80" y1="280" x2="420" y2="280" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="280" x2="80" y2="80" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="280" x2="40" y2="300" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="280" x2="100" y2="300" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="280" x2="60" y2="100" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="280" x2="100" y2="100" stroke="#34495e" stroke-width="2"/>
  
  <!-- Метки осей -->
  <text x="425" y="285" font-family="Arial, sans-serif" font-size="14" fill="#34495e">x</text>
  <text x="75" y="75" font-family="Arial, sans-serif" font-size="14" fill="#34495e">z</text>
  <text x="45" y="305" font-family="Arial, sans-serif" font-size="14" fill="#34495e">y</text>
  
  <!-- Ось y (задняя) пунктиром -->
  <line x1="80" y1="280" x2="200" y2="160" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- Точка M -->
  <circle cx="250" cy="180" r="5" fill="#e74c3c"/>
  <text x="260" y="175" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">M(x,y,z)</text>
  
  <!-- Прямая в пространстве -->
  <line x1="120" y1="250" x2="380" y2="110" stroke="#9b59b6" stroke-width="3"/>
  
  <!-- Вектор направления -->
  <line x1="250" y1="180" x2="320" y2="140" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Стрелка для вектора -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  
  <!-- Вектор направления проекции на xy-плоскость -->
  <line x1="250" y1="230" x2="320" y2="190" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- Вектор проекции на xz-плоскость -->
  <line x1="250" y1="180" x2="320" y2="130" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- Проекции точки -->
  <circle cx="250" cy="230" r="3" fill="#27ae60"/>
  <circle cx="250" cy="130" r="3" fill="#27ae60"/>
  <line x1="250" y1="180" x2="250" y2="230" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="180" x2="250" y2="130" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Формулы -->
  <rect x="50" y="310" width="400" height="30" fill="#ecf0f1" stroke="#bdc3c7" rx="5"/>
  <text x="60" y="330" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Каноническое: (x-x₀)/a = (y-y₀)/b = (z-z₀)/c</text>
  
  <rect x="50" y="60" width="400" height="30" fill="#ecf0f1" stroke="#bdc3c7" rx="5"/>
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Параметрическое: x = x₀ + at, y = y₀ + bt, z = z₀ + ct</text>
  
  <!-- Подписи элементов -->
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">s(a,b,c)</text>
  <text x="255" y="225" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">M'</text>
  <text x="255" y="125" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">M''</text>
  
  <!-- Уравнение плоскости xy -->
  <rect x="140" y="240" width="80" height="40" fill="#d5dbdb" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="140" y1="260" x2="220" y2="260" stroke="#7f8c8d" stroke-width="1"/>
  <text x="150" y="255" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Плоскость xy</text>
  <text x="150" y="273" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">z = 0</text>
  
  <!-- Уравнение плоскости xz -->
  <rect x="320" y="100" width="80" height="40" fill="#d5dbdb" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="320" y1="120" x2="400" y2="120" stroke="#7f8c8d" stroke-width="1"/>
  <text x="330" y="115" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Плоскость xz</text>
  <text x="330" y="133" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">y = 0</text>
  
  <!-- Координаты точки -->
  <text x="230" y="195" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">(x₀,y₀,z₀)</text>
  
  <!-- Дополнительные элементы для детализации -->
  <circle cx="120" cy="250" r="3" fill="#9b59b6"/>
  <circle cx="380" cy="110" r="3" fill="#9b59b6"/>
  <line x1="120" y1="250" x2="120" y2="230" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="380" y1="110" x2="380" y2="130" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Параметры вектора -->
  <text x="330" y="165" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">a</text>
  <text x="265" y="205" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">b</text>
  <text x="335" y="135" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">c</text>
  
  <!-- Уравнение плоскости yz -->
  <rect x="140" y="140" width="80" height="40" fill="#d5dbdb" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="140" y1="160" x2="220" y2="160" stroke="#7f8c8d" stroke-width="1"/>
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Плоскость yz</text>
  <text x="150" y="173" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">x = 0</text>
  
  <!-- Дополнительные координатные линии -->
  <line x1="200" y1="280" x2="200" y2="80" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="320" y1="280" x2="320" y2="80" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="80" y1="160" x2="420" y2="160" stroke="#ecf0f1" stroke-width="1"/>
  <line x1="80" y1="200" x2="420" y2="200" stroke="#ecf0f1" stroke-width="1"/>
  
  <!-- Подписи координат -->
  <text x="195" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x₁</text>
  <text x="315" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x₂</text>
  <text x="85" y="205" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">y₁</text>
  <text x="85" y="165" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">y₂</text>
  
  <!-- Градиент для фона -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="480" height="330" fill="url(#bgGradient)" />
</svg>