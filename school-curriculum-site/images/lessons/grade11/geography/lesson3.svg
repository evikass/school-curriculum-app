<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a085;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- ГЕОГРАФИЯ · 11 КЛАСС -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="440" y="20" width="40" height="25" fill="#3498db" rx="5"/>
  <text x="460" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" font-weight="bold">3</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" font-weight="bold">Динамика населения мира</text>
  
  <!-- График роста населения -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Рост населения мира:</text>
  
  <!-- Ось X -->
  <line x1="50" y1="220" x2="450" y2="220" stroke="#34495e" stroke-width="2"/>
  <!-- Ось Y -->
  <line x1="50" y1="120" x2="50" y2="220" stroke="#34495e" stroke-width="2"/>
  
  <!-- Ось Y метки -->
  <text x="40" y="125" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">8 млрд</text>
  <text x="40" y="155" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">6 млрд</text>
  <text x="40" y="185" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">4 млрд</text>
  <text x="40" y="215" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">2 млрд</text>
  <text x="40" y="225" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">0</text>
  
  <!-- Ось X метки -->
  <text x="50" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1950</text>
  <text x="150" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1970</text>
  <text x="250" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1990</text>
  <text x="350" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">2010</text>
  <text x="450" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">2023</text>
  
  <!-- График роста населения кривая -->
  <path d="M50,210 Q100,200 150,180 T250,150 T350,130 T450,120" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Данные на графике -->
  <circle cx="50" cy="210" r="3" fill="#3498db"/>
  <circle cx="150" cy="180" r="3" fill="#3498db"/>
  <circle cx="250" cy="150" r="3" fill="#3498db"/>
  <circle cx="350" cy="130" r="3" fill="#3498db"/>
  <circle cx="450" cy="120" r="3" fill="#3498db"/>
  
  <!-- Формула роста населения -->
  <rect x="50" y="260" width="400" height="50" fill="#ecf0f1" stroke="#bdc3c7" rx="5"/>
  <text x="60" y="280" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Формула роста населения:</text>
  <text x="60" y="300" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">ΔN = N₀ + (B - D) + (I - E)</text>
  <text x="280" y="300" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где: N₀ - начальное число, B - рождаемость, D - смертность, I - иммиграция, E - эмиграция</text>
  
  <!-- Пирамида возрастов -->
  <text x="450" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Пирамида населения:</text>
  
  <!-- Ось пирамиды -->
  <line x1="450" y1="120" x2="450" y2="220" stroke="#34495e" stroke-width="2"/>
  
  <!-- Мужчины (левая часть) -->
  <path d="M450,130 L440,130 L435,140 L440,150 L445,160 L450,170 L455,180 L460,190 L465,200 L470,210 L450,210 Z" fill="#3498db" opacity="0.7"/>
  
  <!-- Женщины (правая часть) -->
  <path d="M450,130 L460,130 L465,140 L460,150 L455,160 L450,170 L445,180 L440,190 L435,200 L430,210 L450,210 Z" fill="#e74c3c" opacity="0.7"/>
  
  <!-- Возрастные группы -->
  <text x="425" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">80+</text>
  <text x="425" y="155" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">60-79</text>
  <text x="425" y="175" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">40-59</text>
  <text x="425" y="195" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">20-39</text>
  <text x="425" y="215" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">0-19</text>
  
  <!-- Легенда пирамиды -->
  <rect x="380" y="125" width="15" height="10" fill="#3498db" opacity="0.7"/>
  <text x="398" y="133" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">М</text>
  <rect x="380" y="140" width="15" height="10" fill="#e74c3c" opacity="0.7"/>
  <text x="398" y="148" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Ж</text>
  
  <!-- Таблица демографических показателей -->
  <text x="50" y="325" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Демографические показатели:</text>
  
  <!-- Ячейки таблицы -->
  <rect x="180" y="315" width="80" height="25" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="220" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Рождаемость: 18‰</text>
  
  <rect x="260" y="315" width="80" height="25" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="300" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Смертность: 7.5‰</text>
  
  <rect x="340" y="315" width="80" height="25" fill="#ecf0f1" stroke="#bdc3c7"/>
  <text x="380" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Естественный прирост: 10.5‰</text>
  
  <!-- Ключевые термины -->
  <rect x="50" y="90" width="350" height="25" fill="url(#grad2)" rx="5" opacity="0.2"/>
  <text x="60" y="107" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">Ключевые термины: демографический переход, демографический взрыв, демографическое старение, урбанизация, миграция</text>
  
  <!-- Демографическая теория перехода -->
  <rect x="50" y="135" width="120" height="60" fill="#f8f9fa" stroke="#dee2e6" rx="5"/>
  <text x="110" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">Демографическая теория перехода</text>
  <circle cx="60" cy="165" r="2" fill="#3498db"/>
  <text x="65" y="168" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Высокая рождаемость/смертность</text>
  <circle cx="60" cy="180" r="2" fill="#e74c3c"/>
  <text x="65" y="183" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Низкая рождаемость/смертность</text>
</svg>