<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Полимеры</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 5</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="215" height="100" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="104" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Полимеризация</text>
    <text x="132" y="122" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="normal">nCH₂=CH₂ → (—CH₂—CH₂—)n</text>
    <text x="132" y="138" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">Без побочных продуктов</text>
    <text x="132" y="156" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">Примеры:</text>
    <text x="132" y="170" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Полиэтилен, полипропилен,</text>
    <text x="132" y="184" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">поливинилхлорид (ПВХ)</text>
    <rect x="260" y="88" width="215" height="100" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="367" y="104" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Поликонденсация</text>
    <text x="367" y="122" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="normal">Мономеры → Полимер + H₂O</text>
    <text x="367" y="138" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">Выделяется вода</text>
    <text x="367" y="156" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">Примеры:</text>
    <text x="367" y="170" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Фенолформальдегидная смола</text>
    <text x="367" y="184" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Капрон, лавсан</text>
    <rect x="25" y="196" width="215" height="105" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="212" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Классификация</text>
    <text x="132" y="230" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">По происхождению:</text>
    <text x="132" y="244" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Натуральные (каучук, шёлк)</text>
    <text x="132" y="258" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Искусственные (целлулоид)</text>
    <text x="132" y="272" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Синтетические (ПЭ, ПВХ)</text>
    <text x="132" y="292" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">По отношению к нагреву:</text>
    <rect x="260" y="196" width="215" height="105" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="367" y="212" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Термопластичные</text>
    <text x="367" y="228" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Размягчаются при нагреве</text>
    <text x="367" y="242" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">Можно переплавлять</text>
    <text x="367" y="262" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Термореактивные</text>
    <text x="367" y="278" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Не размягчаются, разрушаются</text>
    <text x="367" y="292" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal"> необратимая сшивка</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>