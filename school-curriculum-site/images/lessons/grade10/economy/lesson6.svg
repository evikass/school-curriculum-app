<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Факторы, влияющие на спрос</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 6</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">6</text>
  <rect x="20" y="72" width="145" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="159" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Доход (I)</text>
  <text x="28" y="100" class="box-text">I↑ → D↑ (норм.)</text>
  <text x="28" y="113" class="box-text">I↑ → D↓ (низш.)</text>
  <text x="28" y="126" class="box-text">Кривая Энгеля:</text>
  <text x="28" y="139" class="box-text">E₁↗ E₂↘ E₃↗</text>
  <rect x="175" y="72" width="145" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="72" x2="314" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="86" class="box-title">Цены других</text>
  <text x="183" y="100" class="box-text">Pзам↑ → D↑ (субст.)</text>
  <text x="183" y="113" class="box-text">Pдоп↑ → D↓ (компл.)</text>
  <text x="183" y="126" class="box-text">Пример: чай↔кофе</text>
  <text x="183" y="139" class="box-text">Бензин↔автомобили</text>
  <rect x="330" y="72" width="150" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="86" class="box-title">Прочие</text>
  <text x="338" y="100" class="box-text">Вкусы, мода</text>
  <text x="338" y="113" class="box-text">Ожидания (P↑жд→D↑)</text>
  <text x="338" y="126" class="box-text">Число покупателей</text>
  <text x="338" y="139" class="box-text">Сезонность</text>
  <rect x="20" y="172" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="172" x2="474" y2="172" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="186" class="box-title">Классификация товаров по доходу</text>
  <text x="28" y="200" class="box-text">Нормальные: Ed(I) &gt; 0    |    Первой необходимости: 0 &lt; Ed(I) &lt; 1</text>
  <text x="28" y="213" class="box-text">Роскоши: Ed(I) &gt; 1         |    Низшие: Ed(I) &lt; 0</text>
  <rect x="20" y="242" width="460" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="242" x2="474" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="256" class="box-title">Закон Энгеля</text>
  <text x="28" y="270" class="box-text">С ростом дохода доля расходов на питание ↓</text>
  <text x="28" y="283" class="box-text">Доля на образование, отдых ↑</text>
  <text x="28" y="296" class="box-text">Кривые Энгеля отражают зависимость Qx от дохода I</text>
  <text x="28" y="309" class="box-text">Для низших товаров — загиб назад при высоких I</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>