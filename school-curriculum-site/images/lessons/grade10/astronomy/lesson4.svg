<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#7E57C2" text-anchor="middle">Малые тела Солнечной системы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Астрономия - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.3"/>
    
    <!-- Three sections: Asteroids, Comets, Meteoroids -->
    
    <!-- Asteroids -->
    <rect x="20" y="90" width="145" height="105" rx="4" fill="#E8EAF6" stroke="#7E57C2" stroke-width="1"/>
    <text x="92" y="108" font-family="Arial,sans-serif" font-size="12" fill="#4527A0" text-anchor="middle">Астероиды</text>
    <!-- Irregular asteroid shape -->
    <polygon points="70,130 80,122 92,125 95,135 88,142 75,140 65,135" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
    <polygon points="110,132 118,126 128,130 125,140 115,140" fill="#A1887F" stroke="#5D4037" stroke-width="1"/>
    <!-- Belt -->
    <ellipse cx="92" cy="160" rx="55" ry="15" fill="none" stroke="#9E9E9E" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="50" cy="160" r="1.5" fill="#9E9E9E"/>
    <circle cx="65" cy="155" r="1" fill="#9E9E9E"/>
    <circle cx="80" cy="162" r="1.5" fill="#9E9E9E"/>
    <circle cx="100" cy="158" r="1" fill="#9E9E9E"/>
    <circle cx="115" cy="162" r="1.5" fill="#9E9E9E"/>
    <circle cx="130" cy="157" r="1" fill="#9E9E9E"/>
    <text x="92" y="182" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Пояс астероидов</text>
    <text x="92" y="192" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Церера, Веста, Паллада</text>
    
    <!-- Comets -->
    <rect x="175" y="90" width="145" height="105" rx="4" fill="#E8EAF6" stroke="#7E57C2" stroke-width="1"/>
    <text x="247" y="108" font-family="Arial,sans-serif" font-size="12" fill="#4527A0" text-anchor="middle">Кометы</text>
    <!-- Comet nucleus -->
    <circle cx="200" cy="140" r="6" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
    <!-- Coma -->
    <circle cx="200" cy="140" r="12" fill="#E0E0E0" opacity="0.4"/>
    <!-- Tail -->
    <path d="M212,140 C230,135 260,120 300,108" fill="none" stroke="#B0BEC5" stroke-width="3" opacity="0.5"/>
    <path d="M212,140 C225,138 250,130 290,115" fill="none" stroke="#90A4AE" stroke-width="2" opacity="0.3"/>
    <!-- Ion tail -->
    <path d="M212,138 C230,132 255,118 295,105" fill="none" stroke="#42A5F5" stroke-width="1.5" opacity="0.5"/>
    <text x="247" y="162" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ядро + Кома + Хвост</text>
    <text x="247" y="174" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Хвост от Солнца!</text>
    <text x="247" y="186" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Хвост и газовый</text>
    <text x="247" y="196" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Хвост пылевой</text>
    
    <!-- Meteoroids -->
    <rect x="330" y="90" width="145" height="105" rx="4" fill="#E8EAF6" stroke="#7E57C2" stroke-width="1"/>
    <text x="402" y="108" font-family="Arial,sans-serif" font-size="12" fill="#4527A0" text-anchor="middle">Метеориды</text>
    <!-- Small rock -->
    <polygon points="390,135 398,130 405,133 408,140 402,145 392,142" fill="#A1887F" stroke="#5D4037" stroke-width="1"/>
    <!-- Meteor (shooting star) -->
    <line x1="420" y1="125" x2="455" y2="155" stroke="#FDD835" stroke-width="2"/>
    <line x1="420" y1="125" x2="415" y2="120" stroke="#FFCC80" stroke-width="1" opacity="0.5"/>
    <text x="402" y="162" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Метеор - вспышка</text>
    <text x="402" y="174" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">в атмосфере</text>
    <!-- Meteorite on ground -->
    <polygon points="395,182 402,178 410,181 408,188 398,188" fill="#795548" stroke="#4E342E" stroke-width="1"/>
    <text x="402" y="196" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Метеорит - упал</text>
    <text x="402" y="193" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">на Землю</text>
    
    <!-- Kuiper belt and Oort cloud -->
    <rect x="20" y="202" width="225" height="98" rx="3" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="132" y="218" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" text-anchor="middle">Пояс Койпера</text>
    <!-- Sun -->
    <circle cx="80" cy="260" r="6" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
    <!-- Orbit -->
    <ellipse cx="80" cy="260" rx="15" ry="10" fill="none" stroke="#BDBDBD" stroke-width="0.5"/>
    <!-- Kuiper belt region -->
    <ellipse cx="80" cy="260" rx="45" ry="25" fill="none" stroke="#7E57C2" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="110" cy="250" r="1.5" fill="#9E9E9E"/>
    <circle cx="120" cy="260" r="1" fill="#9E9E9E"/>
    <circle cx="115" cy="272" r="1.5" fill="#9E9E9E"/>
    <circle cx="40" cy="255" r="1" fill="#9E9E9E"/>
    <circle cx="35" cy="268" r="1.5" fill="#9E9E9E"/>
    <text x="132" y="285" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">30-55 а.е. от Солнца</text>
    <text x="132" y="295" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Плутон, Эрида, Макемаке</text>
    
    <rect x="255" y="202" width="225" height="98" rx="3" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="367" y="218" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" text-anchor="middle">Облако Оорта</text>
    <circle cx="310" cy="260" r="4" fill="#FDD835" stroke="#F9A825" stroke-width="0.5"/>
    <ellipse cx="310" cy="260" rx="70" ry="35" fill="none" stroke="#7E57C2" stroke-width="0.8" stroke-dasharray="4,3"/>
    <circle cx="370" cy="240" r="1" fill="#CE93D8"/>
    <circle cx="380" cy="265" r="1" fill="#CE93D8"/>
    <circle cx="250" cy="250" r="1" fill="#CE93D8"/>
    <circle cx="255" cy="275" r="1" fill="#CE93D8"/>
    <circle cx="350" cy="285" r="1" fill="#CE93D8"/>
    <circle cx="280" cy="235" r="1" fill="#CE93D8"/>
    <text x="367" y="285" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2000-200000 а.е.</text>
    <text x="367" y="295" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Источник долгопериод. комет</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Астрономия</text>
</svg>