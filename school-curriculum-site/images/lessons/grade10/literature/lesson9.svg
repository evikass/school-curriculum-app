<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dfd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goetheGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4682b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4a7c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="8" />
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#d4c0a0" stroke-width="1" />
  
  <!-- Заголовок -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#654321" font-weight="bold">ЛИТЕРАТУРА · 10 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#4b2f20" font-weight="bold">И.В. Гёте</text>
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#654321">№1</text>
  
  <!-- Портрет Гёте -->
  <ellipse cx="90" cy="130" rx="40" ry="50" fill="url(#goetheGrad)" />
  <circle cx="90" cy="110" r="18" fill="#fdbcb4" />
  <rect x="75" y="125" width="30" height="35" fill="#2c4a7c" />
  <rect x="78" y="128" width="24" height="8" fill="#333" />
  <rect x="78" y="140" width="24" height="3" fill="#333" />
  <rect x="78" y="147" width="24" height="3" fill="#333" />
  <circle cx="85" cy="107" r="2" fill="#333" />
  <circle cx="95" cy="107" r="2" fill="#333" />
  <path d="M 82 115 Q 90 120 98 115" stroke="#333" stroke-width="1" fill="none" />
  
  <!-- Даты жизни -->
  <text x="90" y="200" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#654321" font-weight="bold">1749-1832</text>
  
  <!-- Основные произведения -->
  <rect x="160" y="90" width="140" height="40" fill="#d4c0a0" stroke="#8b4513" stroke-width="1" rx="5" />
  <text x="230" y="115" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#654321">Основные произведения</text>
  
  <!-- Фауст -->
  <rect x="160" y="140" width="130" height="60" fill="#fff" stroke="#8b4513" stroke-width="1" rx="3" />
  <text x="225" y="160" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#8b0000" font-weight="bold">"Фауст"</text>
  <text x="225" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#654321">Трагедия</text>
  <text x="225" y="190" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#654321">1790-1832</text>
  
  <!-- Вертер -->
  <rect x="300" y="140" width="130" height="60" fill="#fff" stroke="#8b4513" stroke-width="1" rx="3" />
  <text x="365" y="160" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#4682b4" font-weight="bold">"Страдания</text>
  <text x="365" y="175" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#4682b4" font-weight="bold">юного Вертера"</text>
  <text x="365" y="190" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#654321">Роман</text>
  <text x="365" y="203" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#654321">1774</text>
  
  <!-- Лирика -->
  <rect x="230" y="210" width="130" height="40" fill="#fff" stroke="#8b4513" stroke-width="1" rx="3" />
  <text x="295" y="235" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#654321" font-weight="bold">Лирика</text>
  
  <!-- Фауст - детали -->
  <rect x="160" y="260" width="180" height="70" fill="#fff" stroke="#8b4513" stroke-width="1" rx="3" />
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#8b0000" font-weight="bold">Трагедия "Фауст"</text>
  
  <!-- Ключевые темы Фауста -->
  <circle cx="175" cy="295" r="3" fill="#8b0000" />
  <text x="183" y="299" font-family="Arial, sans-serif" font-size="10" fill="#654321">Поиск смысла жизни</text>
  
  <circle cx="175" cy="310" r="3" fill="#8b0000" />
  <text x="183" y="314" font-family="Arial, sans-serif" font-size="10" fill="#654321">Сделка с дьяволом</text>
  
  <circle cx="285" cy="295" r="3" fill="#8b0000" />
  <text x="293" y="299" font-family="Arial, sans-serif" font-size="10" fill="#654321">Познание и действие</text>
  
  <circle cx="285" cy="310" r="3" fill="#8b0000" />
  <text x="293" y="314" font-family="Arial, sans-serif" font-size="10" fill="#654321">Любовь и творчество</text>
  
  <!-- Стиль Гёте -->
  <rect x="350" y="210" width="120" height="120" fill="#fff" stroke="#8b4513" stroke-width="1" rx="3" />
  <text x="410" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#654321" font-weight="bold">Особенности стиля</text>
  
  <!-- Графическое представление стиля -->
  <rect x="360" y="240" width="100" height="8" fill="#d4c0a0" />
  <rect x="360" y="252" width="80" height="8" fill="#d4c0a0" />
  <rect x="360" y="264" width="90" height="8" fill="#d4c0a0" />
  <rect x="360" y="276" width="70" height="8" fill="#d4c0a0" />
  <rect x="360" y="288" width="85" height="8" fill="#d4c0a0" />
  <rect x="360" y="300" width="75" height="8" fill="#d4c0a0" />
  <rect x="360" y="312" width="95" height="8" fill="#d4c0a0" />
  
  <!-- Стрелка от Фауста к деталям -->
  <path d="M 225 200 L 225 260" stroke="#8b4513" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Определение стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b4513" />
    </marker>
  </defs>
  
  <!-- Декоративные элементы -->
  <circle cx="140" cy="280" r="15" fill="none" stroke="#d4c0a0" stroke-width="1" />
  <path d="M 130 280 Q 140 270 150 280" fill="none" stroke="#d4c0a0" stroke-width="1" />
  <path d="M 130 280 Q 140 290 150 280" fill="none" stroke="#d4c0a0" stroke-width="1" />
  
  <!-- Цитата -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#654321" font-style="italic">"Два мира в моей душе"</text>
  
  <!-- Формула творчества -->
  <text x="410" y="250" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#654321" font-weight="bold">Формула творчества:</text>
  <text x="410" y="265" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#654321">Т = З + Э + В</text>
  <text x="410" y="277" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#654321">(Творчество = Знание + Эмоция + Воля)</text>
  
  <!-- Иконка книги -->
  <rect x="60" y="250" width="25" height="20" fill="#8b4513" rx="2" />
  <rect x="65" y="255" width="15" height="10" fill="#fff" />
  <line x1="67" y1="258" x2="78" y2="258" stroke="#654321" stroke-width="0.5" />
  <line x1="67" y1="261" x2="78" y2="261" stroke="#654321" stroke-width="0.5" />
  <line x1="67" y1="264" x2="78" y2="264" stroke="#654321" stroke-width="0.5" />
</svg>