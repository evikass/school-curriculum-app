<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0522d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="10" y="10" width="480" height="330" fill="url(#bgGrad)" rx="5" ry="5"/>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#frameGrad)" stroke-width="4" rx="8" ry="8"/>
  
  <!-- Угловой элемент рамки -->
  <path d="M15 15 L30 15 L30 25" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  <path d="M485 15 L470 15 L470 25" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  <path d="M15 335 L30 335 L30 325" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  <path d="M485 335 L470 335 L470 325" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="12" fill="#8b4513" text-anchor="middle" font-weight="bold">ЛИТЕРАТУРА · 10 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" text-anchor="middle" font-weight="bold">Михаил Афанасьевич Булгаков</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle">(1891-1940)</text>
  
  <!-- Номер урока -->
  <circle cx="450" cy="30" r="15" fill="#e74c3c"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">15</text>
  
  <!-- Портрет Булгакова -->
  <ellipse cx="80" cy="140" rx="35" ry="45" fill="#fdbcb4"/>
  <path d="M80 95 Q95 100 105 115 Q110 135 105 155 Q95 165 80 165 Q65 165 55 155 Q50 135 55 115 Q65 100 80 95" fill="#fdbcb4"/>
  <circle cx="70" cy="125" r="3" fill="#2c3e50"/>
  <circle cx="90" cy="125" r="3" fill="#2c3e50"/>
  <path d="M75 140 Q80 145 85 140" fill="none" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
  <path d="M65 115 Q80 120 95 115" fill="none" stroke="#2c3e50" stroke-width="2" stroke-linecap="round"/>
  <text x="80" y="190" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle" font-weight="bold">М.А. Булгаков</text>
  
  <!-- Основные произведения -->
  <rect x="140" y="100" width="340" height="80" fill="white" fill-opacity="0.8" rx="5" ry="5" stroke="#8b4513" stroke-width="1"/>
  <text x="150" y="120" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Основные произведения:</text>
  
  <!-- Список произведений -->
  <text x="150" y="140" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• "Мастер и Маргарита" — роман</text>
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• "Белая гвардия" — роман</text>
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• "Собачье сердце" — повесть</text>
  <text x="300" y="140" font-family="Arial, sans-serif" font-size="12" fill="#34495e">• "Роковые яйца" — повесть</text>
  
  <!-- Книга "Мастер и Маргарита" -->
  <rect x="140" y="200" width="80" height="100" fill="url(#bookGrad)" rx="2" ry="2"/>
  <rect x="140" y="200" width="80" height="15" fill="#2c3e50"/>
  <text x="180" y="210" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Мастер</text>
  <text x="180" y="222" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">и Маргарита</text>
  <path d="M140 240 L180 250 L220 240" fill="#c0392b" opacity="0.7"/>
  <path d="M140 250 L180 260 L220 250" fill="#c0392b" opacity="0.5"/>
  <path d="M140 260 L180 270 L220 260" fill="#c0392b" opacity="0.3"/>
  
  <!-- Схема двойного сюжета -->
  <rect x="240" y="200" width="240" height="100" fill="white" fill-opacity="0.8" rx="5" ry="5" stroke="#8b4513" stroke-width="1"/>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">"Мастер и Маргарита": двойной сюжет</text>
  
  <!-- Схема Москва -->
  <rect x="260" y="235" width="90" height="20" fill="#3498db" rx="3" ry="3"/>
  <text x="305" y="249" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Москва</text>
  
  <!-- Схема Ершалаим -->
  <rect x="370" y="235" width="90" height="20" fill="#e74c3c" rx="3" ry="3"/>
  <text x="415" y="249" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Ершалаим</text>
  
  <!-- Связующая линия -->
  <path d="M350 245 L370 245" stroke="#8b4513" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Темы романа -->
  <text x="250" y="270" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Тема творчества · Свобода искусства · Добро и зло</text>
  
  <!-- Даты жизни -->
  <circle cx="40" cy="280" r="20" fill="#e74c3c"/>
  <text x="40" y="285" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">1891</text>
  
  <circle cx="40" cy="320" r="20" fill="#2c3e50"/>
  <text x="40" y="325" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">1940</text>
  
  <!-- Линия жизни -->
  <line x1="40" y1="300" x2="40" y2="300" stroke="#8b4513" stroke-width="3"/>
  
  <!-- Декоративные элементы -->
  <path d="M420 50 Q440 60 460 50" fill="none" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  <path d="M420 60 Q440 70 460 60" fill="none" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  
  <!-- Графика популярности -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Популярность:</text>
  <rect x="220" y="310" width="40" height="15" fill="#3498db" rx="2" ry="2"/>
  <rect x="260" y="305" width="40" height="20" fill="#3498db" rx="2" ry="2"/>
  <rect x="300" y="300" width="40" height="25" fill="#3498db" rx="2" ry="2"/>
  <rect x="340" y="295" width="40" height="30" fill="#e74c3c" rx="2" ry="2"/>
  <rect x="380" y="290" width="40" height="35" fill="#e74c3c" rx="2" ry="2"/>
  
  <!-- Легенда графика -->
  <text x="220" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1920</text>
  <text x="260" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1930</text>
  <text x="300" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1940</text>
  <text x="340" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1950</text>
  <text x="380" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1960</text>
</svg>