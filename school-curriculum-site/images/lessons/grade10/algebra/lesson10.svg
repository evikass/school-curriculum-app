<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Понятие производной</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Curve f(x) -->
    <path d="M50,270 Q100,260 140,230 Q170,210 200,190 Q230,172 260,155 Q290,142 320,130 Q350,122 380,118 Q410,116 440,120 Q460,124 480,130" fill="none" stroke="#5C6BC0" stroke-width="2.5"/>
    <text x="465" y="128" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" font-weight="bold">f(x)</text>
    <!-- Axes -->
    <line x1="40" y1="290" x2="485" y2="290" stroke="#3F51B5" stroke-width="1"/>
    <line x1="40" y1="290" x2="40" y2="95" stroke="#3F51B5" stroke-width="1"/>
    <polygon points="485,287 490,290 485,293" fill="#3F51B5"/>
    <polygon points="37,95 40,90 43,95" fill="#3F51B5"/>
    <text x="490" y="285" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5">x</text>
    <text x="35" y="93" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5">y</text>
    <!-- Point A on curve -->
    <circle cx="200" cy="190" r="4" fill="#E91E63"/>
    <text x="188" y="185" font-family="Arial,sans-serif" font-size="10" fill="#E91E63" font-weight="bold">A</text>
    <!-- Point B on curve -->
    <circle cx="320" cy="130" r="4" fill="#4CAF50"/>
    <text x="308" y="125" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">B</text>
    <!-- Secant line through A and B -->
    <line x1="150" y1="217" x2="370" y2="103" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="370" y="98" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">Секущая</text>
    <!-- Tangent line at A -->
    <line x1="120" y1="226" x2="310" y2="132" stroke="#E91E63" stroke-width="2"/>
    <text x="280" y="128" font-family="Arial,sans-serif" font-size="9" fill="#E91E63">Касательная</text>
    <!-- Delta x and delta y arrows -->
    <line x1="200" y1="240" x2="320" y2="240" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="260" y="252" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">dx</text>
    <line x1="320" y1="240" x2="320" y2="130" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="335" y="190" font-family="Arial,sans-serif" font-size="10" fill="#888">dy</text>
    <!-- Dashed projections from A -->
    <line x1="200" y1="190" x2="200" y2="290" stroke="#aaa" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="320" y1="130" x2="320" y2="290" stroke="#aaa" stroke-width="0.5" stroke-dasharray="2,3"/>
    <text x="198" y="302" font-family="Arial,sans-serif" font-size="9" fill="#888">x0</text>
    <text x="318" y="302" font-family="Arial,sans-serif" font-size="9" fill="#888">x0+dx</text>
    <!-- Definition box -->
    <rect x="25" y="90" width="200" height="72" rx="5" fill="white" opacity="0.9" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="35" y="108" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">Определение:</text>
    <text x="35" y="126" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">f'(x) = lim dy/dx</text>
    <text x="35" y="145" font-family="Arial,sans-serif" font-size="10" fill="#888">при dx -> 0</text>
    <text x="35" y="158" font-family="Arial,sans-serif" font-size="9" fill="#888">Секущая -> Касательная</text>
    <!-- Slope = derivative -->
    <rect x="25" y="258" width="160" height="40" rx="4" fill="#5C6BC0" opacity="0.1"/>
    <text x="35" y="275" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" font-weight="bold">f'(x0) = tg(alpha)</text>
    <text x="35" y="292" font-family="Arial,sans-serif" font-size="9" fill="#888">угловой коэффициент</text>
    <!-- Angle alpha -->
    <path d="M220,230 A25,25 0 0,0 214,218" fill="none" stroke="#E91E63" stroke-width="1.5"/>
    <text x="230" y="222" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">a</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>