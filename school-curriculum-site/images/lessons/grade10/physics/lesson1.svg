<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Равномерное прямолинейное движение</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">ФИЗИКА · 10 КЛАСС</text>
  <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">Урок 3</text>
  
  <!-- Формула движения -->
  <rect x="20" y="65" width="460" height="40" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
  <text x="250" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50">x = x₀ + vₓt</text>
  <text x="30" y="85" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">x₀ — начальная координата</text>
  <text x="30" y="98" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">vₓ — проекция скорости, t — время</text>
  
  <!-- Схема движения тела -->
  <text x="20" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Схема движения тела:</text>
  
  <!-- Ось координат -->
  <line x1="50" y1="280" x2="450" y2="280" stroke="#34495e" stroke-width="2"/>
  <line x1="50" y1="280" x2="50" y2="140" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="450,280 445,275 445,285" fill="#34495e"/>
  <polygon points="50,140 45,145 55,145" fill="#34495e"/>
  
  <!-- Подписи осей -->
  <text x="460" y="285" font-family="Arial, sans-serif" font-size="12" fill="#34495e">x</text>
  <text x="45" y="135" font-family="Arial, sans-serif" font-size="12" fill="#34495e">y</text>
  
  <!-- Координатные метки -->
  <text x="45" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">0</text>
  <text x="145" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x₁</text>
  <text x="245" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x₂</text>
  <text x="345" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x₃</text>
  <text x="445" y="295" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x₄</text>
  
  <!-- Время на оси -->
  <text x="45" y="310" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">0</text>
  <text x="145" y="310" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">t₁</text>
  <text x="245" y="310" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">t₂</text>
  <text x="345" y="310" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">t₃</text>
  <text x="445" y="310" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">t₄</text>
  
  <!-- Тело в разных точках -->
  <circle cx="50" cy="260" r="8" fill="#e74c3c"/>
  <text x="50" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t=0</text>
  
  <circle cx="150" cy="260" r="8" fill="#e74c3c"/>
  <text x="150" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t₁</text>
  
  <circle cx="250" cy="260" r="8" fill="#e74c3c"/>
  <text x="250" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t₂</text>
  
  <circle cx="350" cy="260" r="8" fill="#e74c3c"/>
  <text x="350" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t₃</text>
  
  <circle cx="450" cy="260" r="8" fill="#e74c3c"/>
  <text x="450" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t₄</text>
  
  <!-- Вектор скорости -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <line x1="50" y1="220" x2="150" y2="220" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3498db">v</text>
  
  <!-- График скорости -->
  <text x="20" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">График скорости:</text>
  
  <!-- Ось для графика скорости -->
  <line x1="50" y1="320" x2="450" y2="320" stroke="#34495e" stroke-width="2"/>
  <line x1="50" y1="320" x2="50" y2="180" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="450,320 445,315 445,325" fill="#34495e"/>
  <polygon points="50,180 45,185 55,185" fill="#34495e"/>
  
  <!-- Подписи осей для графика скорости -->
  <text x="460" y="325" font-family="Arial, sans-serif" font-size="12" fill="#34495e">t</text>
  <text x="45" y="175" font-family="Arial, sans-serif" font-size="12" fill="#34495e">vₓ</text>
  
  <!-- Горизонтальная прямая на графике скорости -->
  <line x1="50" y1="260" x2="450" y2="260" stroke="#e74c3c" stroke-width="3"/>
  <text x="460" y="265" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">vₓ = const</text>
  
  <!-- График координаты -->
  <text x="20" y="195" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">График координаты:</text>
  
  <!-- Ось для графика координаты -->
  <line x1="50" y1="350" x2="450" y2="350" stroke="#34495e" stroke-width="2"/>
  <line x1="50" y1="350" x2="50" y2="210" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="450,350 445,345 445,355" fill="#34495e"/>
  <polygon points="50,210 45,215 55,215" fill="#34495e"/>
  
  <!-- Подписи осей для графика координаты -->
  <text x="460" y="355" font-family="Arial, sans-serif" font-size="12" fill="#34495e">t</text>
  <text x="45" y="205" font-family="Arial, sans-serif" font-size="12" fill="#34495e">x</text>
  
  <!-- Прямая на графике координаты -->
  <line x1="50" y1="340" x2="450" y2="230" stroke="#27ae60" stroke-width="3"/>
  <text x="460" y="235" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">x(t)</text>
  
  <!-- Вертикальные линии для отметок времени на графике координаты -->
  <line x1="150" y1="340" x2="150" y2="330" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="340" x2="250" y2="320" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="350" y1="340" x2="350" y2="310" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="450" y1="340" x2="450" y2="300" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Точки на графике координаты -->
  <circle cx="50" cy="340" r="3" fill="#27ae60"/>
  <circle cx="150" cy="330" r="3" fill="#27ae60"/>
  <circle cx="250" cy="320" r="3" fill="#27ae60"/>
  <circle cx="350" cy="310" r="3" fill="#27ae60"/>
  <circle cx="450" cy="300" r="3" fill="#27ae60"/>
  
  <!-- Связь между графиками -->
  <path d="M 100,260 Q 110,290 150,330" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <path d="M 200,260 Q 210,290 250,320" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <path d="M 300,260 Q 310,290 350,310" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <path d="M 400,260 Q 410,290 450,300" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  
  <!-- Связь между схемой и графиком скорости -->
  <line x1="100" y1="220" x2="100" y2="260" stroke="#3498db" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Связь между схемой и графиком координаты -->
  <line x1="100" y1="260" x2="100" y2="330" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Связь между графиком скорости и координаты -->
  <line x1="450" y1="260" x2="450" y2="300" stroke="#9b59b6" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Условия движения -->
  <rect x="20" y="340" width="460" height="8" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="4"/>
  <text x="250" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Скорость постоянна, тело за равные промежутки времени проходит равные расстояния</text>
  
  <!-- Декоративные элементы -->
  <circle cx="480" cy="20" r="3" fill="#e74c3c"/>
  <circle cx="470" cy="30" r="2" fill="#3498db"/>
  <circle cx="490" cy="30" r="2" fill="#27ae60"/>
  <circle cx="480" cy="40" r="1.5" fill="#f39c12"/>
  
  <!-- Легенда -->
  <rect x="370" y="170" width="100" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="420" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Легенда:</text>
  <line x1="380" y1="195" x2="400" y2="195" stroke="#e74c3c" stroke-width="3"/>
  <text x="405" y="200" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Скорость</text>
  <line x1="380" y1="210" x2="400" y2="210" stroke="#27ae60" stroke-width="3"/>
  <text x="405" y="215" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Координата</text>
  
  <!-- Уравнение для графика координаты -->
  <rect x="20" y="240" width="120" height="20" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="80" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">x(t) = x₀ + vt</text>
</svg>