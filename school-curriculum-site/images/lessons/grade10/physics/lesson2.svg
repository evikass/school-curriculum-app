<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498DB" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Номер урока в углу -->
  <text x="470" y="30" font-family="Arial" font-size="12" fill="#7F8C8D" text-anchor="end">Урок 12</text>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial" font-size="16" font-weight="bold" fill="#2C3E50" text-anchor="middle">ФИЗИКА · 10 КЛАСС</text>
  <text x="250" y="55" font-family="Arial" font-size="20" font-weight="bold" fill="#34495E" text-anchor="middle">Движение по окружности</text>
  
  <!-- Основной элемент - окружность -->
  <circle cx="150" cy="180" r="80" fill="none" stroke="#3498DB" stroke-width="2"/>
  
  <!-- Центр окружности -->
  <circle cx="150" cy="180" r="4" fill="#E74C3C"/>
  <text x="150" y="170" font-family="Arial" font-size="12" fill="#2C3E50" text-anchor="middle">O</text>
  
  <!-- Радиус -->
  <line x1="150" y1="180" x2="230" y2="180" stroke="#27AE60" stroke-width="2"/>
  <text x="190" y="175" font-family="Arial" font-size="12" fill="#27AE60" text-anchor="middle">R</text>
  
  <!-- Объект в движении -->
  <circle cx="230" cy="180" r="8" fill="#E74C3C"/>
  <circle cx="230" cy="180" r="4" fill="#C0392B"/>
  
  <!-- Вектор скорости -->
  <line x1="230" y1="180" x2="260" y2="150" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="265" y="150" font-family="Arial" font-size="12" fill="#E74C3C">v</text>
  
  <!-- Вектор перемещения за малый промежуток времени -->
  <line x1="230" y1="180" x2="220" y2="160" stroke="#9B59B6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="225" y="155" font-family="Arial" font-size="10" fill="#9B59B6">Δs</text>
  
  <!-- Угловая дуга -->
  <path d="M 150,180 L 230,180 A 80,80 0 0,1 200,250" fill="none" stroke="#F39C12" stroke-width="2"/>
  <text x="190" y="220" font-family="Arial" font-size="12" fill="#F39C12" text-anchor="middle">φ</text>
  
  <!-- График зависимости v от t -->
  <rect x="300" y="100" width="180" height="120" fill="none" stroke="#34495E" stroke-width="1"/>
  <line x1="320" y1="200" x2="460" y2="200" stroke="#34495E" stroke-width="1"/>
  <line x1="320" y1="200" x2="320" y2="120" stroke="#34495E" stroke-width="1"/>
  
  <!-- Ось времени -->
  <text x="390" y="215" font-family="Arial" font-size="12" fill="#34495E" text-anchor="middle">t</text>
  
  <!-- Ось скорости -->
  <text x="305" y="160" font-family="Arial" font-size="12" fill="#34495E" text-anchor="middle">v</text>
  
  <!-- График постоянной скорости -->
  <line x1="320" y1="160" x2="460" y2="160" stroke="#3498DB" stroke-width="2"/>
  <circle cx="390" cy="160" r="3" fill="#3498DB"/>
  
  <!-- Формулы -->
  <rect x="50" y="250" width="400" height="80" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  
  <text x="70" y="275" font-family="Arial" font-size="14" font-weight="bold" fill="#2C3E50">Основные формулы:</text>
  
  <text x="70" y="295" font-family="Arial" font-size="12" fill="#2C3E50">Период обращения: T</text>
  <text x="200" y="295" font-family="Arial" font-size="12" fill="#2C3E50">Частота: ν = 1/T</text>
  
  <text x="70" y="315" font-family="Arial" font-size="12" fill="#2C3E50">Линейная скорость: v = 2πR/T = 2πRν</text>
  <text x="270" y="315" font-family="Arial" font-size="12" fill="#2C3E50">Угловая скорость: ω = 2π/T = 2πν</text>
  
  <!-- Дополнительные элементы -->
  <circle cx="150" cy="180" r="85" fill="none" stroke="#ECF0F1" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Точки на окружности для визуализации -->
  <circle cx="150" cy="100" r="2" fill="#95A5A6"/>
  <circle cx="70" cy="180" r="2" fill="#95A5A6"/>
  <circle cx="150" cy="260" r="2" fill="#95A5A6"/>
  
  <!-- Вспомогательные линии -->
  <line x1="150" y1="180" x2="150" y2="100" stroke="#95A5A6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="150" y1="180" x2="70" y2="180" stroke="#95A5A6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="150" y1="180" x2="150" y2="260" stroke="#95A5A6" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Маркер стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>
  
  <!-- Поясняющие тексты -->
  <text x="250" y="90" font-family="Arial" font-size="11" fill="#7F8C8D" text-anchor="middle">Равномерное движение по окружности</text>
  <text x="250" y="105" font-family="Arial" font-size="11" fill="#7F8C8D" text-anchor="middle">Скорость постоянна по модулю, меняется по направлению</text>
  
  <!-- Временные метки -->
  <text x="250" y="180" font-family="Arial" font-size="10" fill="#95A5A6" text-anchor="middle">t</text>
  <text x="150" y="95" font-family="Arial" font-size="10" fill="#95A5A6" text-anchor="middle">t + T/4</text>
  <text x="65" y="185" font-family="Arial" font-size="10" fill="#95A5A6" text-anchor="middle">t + T/2</text>
  <text x="150" y="275" font-family="Arial" font-size="10" fill="#95A5A6" text-anchor="middle">t + 3T/4</text>
  
  <!-- Углы -->
  <path d="M 160,180 A 10,10 0 0,1 170,170" fill="none" stroke="#F39C12" stroke-width="1"/>
  <path d="M 140,180 A 10,10 0 0,0 130,170" fill="none" stroke="#F39C12" stroke-width="1"/>
</svg>