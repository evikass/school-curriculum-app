<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d" text-anchor="middle" font-weight="bold">ФИЗИКА · 10 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">Силы в механике</text>
  <text x="460" y="340" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="end">Урок 5</text>
  
  <!-- Сила тяжести -->
  <g transform="translate(100, 100)">
    <rect x="-60" y="-20" width="120" height="120" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Сила тяжести</text>
    
    <!-- Масса -->
    <rect x="-25" y="40" width="50" height="30" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <text x="0" y="59" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">m</text>
    
    <!-- Сила тяжести вниз -->
    <line x1="0" y1="70" x2="0" y2="95" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <text x="5" y="85" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">Fтяж</text>
    
    <!-- Формула -->
    <text x="0" y="105" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">F = mg</text>
    <text x="0" y="115" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">g ≈ 9.8 м/с²</text>
  </g>
  
  <!-- Сила упругости -->
  <g transform="translate(300, 100)">
    <rect x="-60" y="-20" width="120" height="120" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Сила упругости</text>
    
    <!-- Пружина -->
    <path d="M -15,40 Q -10,45 -15,50 Q -20,55 -15,60 Q -10,65 -15,70 Q -10,75 -15,80" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <path d="M 15,40 Q 10,45 15,50 Q 20,55 15,60 Q 10,65 15,70 Q 10,75 15,80" fill="none" stroke="#9b59b6" stroke-width="2"/>
    
    <!-- Сила вверх -->
    <line x1="0" y1="60" x2="0" y2="35" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="-5" y="50" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">Fупр</text>
    
    <!-- Формула -->
    <text x="0" y="95" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">F = kx</text>
    <text x="0" y="105" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">k - жёсткость</text>
    <text x="0" y="115" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">x - удлинение</text>
  </g>
  
  <!-- Сила трения -->
  <g transform="translate(100, 240)">
    <rect x="-60" y="-20" width="120" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Сила трения</text>
    
    <!-- Поверхность -->
    <line x1="-40" y1="30" x2="40" y2="30" stroke="#34495e" stroke-width="2"/>
    <line x1="-40" y1="35" x2="40" y2="35" stroke="#34495e" stroke-width="1"/>
    
    <!-- Тело -->
    <rect x="-15" y="10" width="30" height="20" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">m</text>
    
    <!-- Сила трения -->
    <line x1="-15" y1="20" x2="-35" y2="20" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="-25" y="15" font-family="Arial, sans-serif" font-size="12" fill="#f39c12">Fтр</text>
    
    <!-- Формула -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Fтр = μN</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">μ - коэффициент трения</text>
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">N - сила нормального давления</text>
  </g>
  
  <!-- Сила всемирного тяготения -->
  <g transform="translate(300, 240)">
    <rect x="-60" y="-20" width="120" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Всемирное тяготение</text>
    
    <!-- Земля -->
    <circle cx="-20" cy="25" r="15" fill="#16a085" stroke="#138d75" stroke-width="1"/>
    <text x="-20" y="30" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">M</text>
    
    <!-- Объект -->
    <circle cx="20" cy="25" r="8" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">m</text>
    
    <!-- Сила -->
    <line x1="12" y1="25" x2="-5" y2="25" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <line x1="-12" y1="25" x2="5" y2="25" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">F</text>
    
    <!-- Формула -->
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">F = G·m₁·m₂/r²</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" text-anchor="middle">G = 6.67·10⁻¹¹ Н·м²/кг²</text>
  </g>
  
  <!-- График зависимости силы от массы -->
  <g transform="translate(50, 310)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" font-weight="bold">Fтяж, Н</text>
    <line x1="20" y1="5" x2="20" y2="35" stroke="#34495e" stroke-width="1"/>
    <line x1="20" y1="35" x2="100" y2="35" stroke="#34495e" stroke-width="1"/>
    
    <!-- Ось Y -->
    <line x1="20" y1="35" x2="20" y2="30" stroke="#34495e" stroke-width="1"/>
    <text x="10" y="32" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="end">0</text>
    
    <line x1="20" y1="25" x2="20" y2="20" stroke="#34495e" stroke-width="1"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="end">5</text>
    
    <line x1="20" y1="15" x2="20" y2="10" stroke="#34495e" stroke-width="1"/>
    <text x="10" y="12" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="end">10</text>
    
    <line x1="20" y1="5" x2="20" y2="5" stroke="#34495e" stroke-width="1"/>
    <text x="10" y="7" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="end">15</text>
    
    <!-- Ось X -->
    <line x1="40" y1="35" x2="40" y2="40" stroke="#34495e" stroke-width="1"/>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="middle">1</text>
    
    <line x1="60" y1="35" x2="60" y2="40" stroke="#34495e" stroke-width="1"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="middle">2</text>
    
    <line x1="80" y1="35" x2="80" y2="40" stroke="#34495e" stroke-width="1"/>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="middle">3</text>
    
    <line x1="100" y1="35" x2="100" y2="40" stroke="#34495e" stroke-width="1"/>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="middle">4</text>
    
    <text x="60" y="48" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d" text-anchor="middle">m, кг</text>
    
    <!-- График -->
    <line x1="20" y1="35" x2="100" y2="5" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="40" cy="25" r="2" fill="#e74c3c"/>
    <circle cx="60" cy="15" r="2" fill="#e74c3c"/>
    <circle cx="80" cy="10" r="2" fill="#e74c3c"/>
    <circle cx="100" cy="5" r="2" fill="#e74c3c"/>
    
    <text x="110" y="15" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">F = mg</text>
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">(g = 9.8 м/с²)</text>
  </g>
  
  <!-- Определение силы -->
  <g transform="translate(200, 310)">
    <rect x="0" y="0" width="290" height="30" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
    <text x="145" y="20" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">
      Сила — векторная величина, характеризующая действие одного тела на другое
    </text>
  </g>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
    
    <!-- Градиент -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Тень -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
</svg>