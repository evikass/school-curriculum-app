<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#26A69A" text-anchor="middle">География промышленности</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#26A69A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
<rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00796B" text-anchor="middle">Основные отрасли промышленности</text>

<!-- Mining industry -->
<rect x="25" y="110" width="140" height="90" rx="5" fill="white" stroke="#795548" stroke-width="1.2"/>
<text x="95" y="125" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#795548" text-anchor="middle">Добывающая</text>
<!-- Pickaxe icon -->
<line x1="75" y1="140" x2="115" y2="155" stroke="#795548" stroke-width="2"/>
<line x1="115" y1="140" x2="75" y2="155" stroke="#795548" stroke-width="2"/>
<rect x="90" y="142" width="10" height="12" rx="1" fill="#795548"/>
<!-- Mountain/mining -->
<path d="M55,170 L70,155 L85,165 L95,155 L110,165 L120,158 L135,170 Z" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>
<text x="95" y="185" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Нефть, газ, уголь, руда</text>
<text x="95" y="195" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">Россия, США, Китай, ОАЭ</text>

<!-- Manufacturing -->
<rect x="180" y="110" width="140" height="90" rx="5" fill="white" stroke="#1565C0" stroke-width="1.2"/>
<text x="250" y="125" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">Обрабатывающая</text>
<!-- Factory icon -->
<rect x="220" y="140" width="60" height="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
<path d="M220,140 L215,135 L215,140" fill="none" stroke="#1565C0" stroke-width="0.8"/>
<path d="M240,140 L240,132 L250,132 L250,140" fill="none" stroke="#1565C0" stroke-width="0.8"/>
<path d="M260,140 L260,130 L270,130 L270,140" fill="none" stroke="#1565C0" stroke-width="0.8"/>
<!-- Chimney smoke -->
<circle cx="225" cy="132" r="3" fill="#90CAF9" opacity="0.5"/>
<circle cx="222" cy="128" r="2" fill="#90CAF9" opacity="0.3"/>
<text x="250" y="178" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Машиностроение, химия,</text>
<text x="250" y="186" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">электроника, пищевая</text>
<text x="250" y="196" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Китай, США, Япония, ЕС</text>

<!-- Energy -->
<rect x="335" y="110" width="140" height="90" rx="5" fill="white" stroke="#F57F17" stroke-width="1.2"/>
<text x="405" y="125" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#F57F17" text-anchor="middle">Энергетика</text>
<!-- Lightning bolt -->
<path d="M400,135 L395,150 L403,148 L398,165" fill="none" stroke="#F57F17" stroke-width="2"/>
<!-- Power plant -->
<rect x="410" y="148" width="25" height="18" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.8"/>
<path d="M410,148 L410,140 L420,140 L420,148" fill="none" stroke="#F57F17" stroke-width="0.8"/>
<text x="405" y="180" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">ТЭС, ГЭС, АЭС,</text>
<text x="405" y="188" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">возобновляемые источники</text>
<text x="405" y="196" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">США, Китай, Россия</text>

<!-- Bottom: bar chart of top industrial countries -->
<rect x="25" y="210" width="450" height="85" rx="5" fill="white" opacity="0.8" stroke="#00796B" stroke-width="0.5"/>
<text x="250" y="224" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00796B" text-anchor="middle">Крупнейшие промышленные державы (доля в мировом производстве)</text>
<!-- Bars -->
<rect x="50" y="250" width="40" height="38" rx="2" fill="#E53935"/>
<text x="70" y="265" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">28%</text>
<text x="70" y="295" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Китай</text>

<rect x="100" y="260" width="40" height="28" rx="2" fill="#1565C0"/>
<text x="120" y="278" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">18%</text>
<text x="120" y="295" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">США</text>

<rect x="150" y="270" width="40" height="18" rx="2" fill="#FF8F00"/>
<text x="170" y="282" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">8%</text>
<text x="170" y="295" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Япония</text>

<rect x="200" y="273" width="40" height="15" rx="2" fill="#2E7D32"/>
<text x="220" y="284" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">6%</text>
<text x="220" y="295" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Германия</text>

<rect x="250" y="276" width="40" height="12" rx="2" fill="#6A1B9A"/>
<text x="270" y="286" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">5%</text>
<text x="270" y="295" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Индия</text>

<rect x="300" y="278" width="40" height="10" rx="2" fill="#00796B"/>
<text x="320" y="287" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">4%</text>
<text x="320" y="295" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Россия</text>

<!-- Axis -->
<line x1="45" y1="288" x2="350" y2="288" stroke="#333" stroke-width="0.5"/>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">География</text>
</svg>