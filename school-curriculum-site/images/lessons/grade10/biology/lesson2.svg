<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Органические вещества клетки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>
    
    <!-- Three columns: Proteins, Lipids, Carbohydrates -->
    <!-- Proteins -->
    <rect x="20" y="90" width="150" height="205" rx="4" fill="#FFEBEE" stroke="#EF5350" stroke-width="1"/>
    <text x="95" y="108" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle">Белки</text>
    <!-- Amino acid chain -->
    <circle cx="55" cy="135" r="14" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="55" y="139" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">AA1</text>
    <circle cx="95" cy="135" r="14" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="95" y="139" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">AA2</text>
    <circle cx="135" cy="135" r="14" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="135" y="139" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">AA3</text>
    <line x1="69" y1="135" x2="81" y2="135" stroke="#C62828" stroke-width="2"/>
    <line x1="109" y1="135" x2="121" y2="135" stroke="#C62828" stroke-width="2"/>
    <!-- Peptide bond label -->
    <text x="95" y="158" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Пептидная связь</text>
    <!-- Alpha helix representation -->
    <path d="M40,175 C50,170 60,185 70,175 C80,165 90,185 100,175 C110,165 120,185 130,175 C140,165 145,175 145,175" fill="none" stroke="#EF5350" stroke-width="2"/>
    <text x="95" y="198" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Альфа-спираль</text>
    <!-- Functions -->
    <text x="95" y="215" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Функции:</text>
    <text x="95" y="226" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Строительная</text>
    <text x="95" y="236" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ферментативная</text>
    <text x="95" y="246" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Транспортная</text>
    <text x="95" y="256" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Защитная</text>
    <text x="95" y="266" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Энергетическая</text>
    <text x="95" y="282" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">C,H,O,N,S</text>
    
    <!-- Lipids -->
    <rect x="175" y="90" width="150" height="205" rx="4" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
    <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#E65100" text-anchor="middle">Липиды</text>
    <!-- Glycerol + fatty acids -->
    <circle cx="220" cy="145" r="12" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
    <text x="220" y="149" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Гл</text>
    <!-- Three fatty acid tails -->
    <line x1="232" y1="140" x2="270" y2="125" stroke="#E65100" stroke-width="2"/>
    <line x1="232" y1="145" x2="270" y2="145" stroke="#E65100" stroke-width="2"/>
    <line x1="232" y1="150" x2="270" y2="165" stroke="#E65100" stroke-width="2"/>
    <!-- Zigzag tails -->
    <path d="M270,125 L280,120 L290,128 L300,118 L310,125" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <path d="M270,145 L280,140 L290,148 L300,138 L310,145" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <path d="M270,165 L280,160 L290,168 L300,158 L310,165" fill="none" stroke="#E65100" stroke-width="1.5"/>
    <text x="250" y="183" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Триглицерид</text>
    <!-- Phospholipid bilayer -->
    <circle cx="210" cy="210" r="8" fill="#FFA726"/>
    <line x1="210" y1="218" x2="210" y2="240" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="230" cy="210" r="8" fill="#FFA726"/>
    <line x1="230" y1="218" x2="230" y2="240" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="250" cy="210" r="8" fill="#FFA726"/>
    <line x1="250" y1="218" x2="250" y2="240" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="270" cy="210" r="8" fill="#FFA726"/>
    <line x1="270" y1="218" x2="270" y2="240" stroke="#E65100" stroke-width="1.5"/>
    <circle cx="290" cy="210" r="8" fill="#FFA726"/>
    <line x1="290" y1="218" x2="290" y2="240" stroke="#E65100" stroke-width="1.5"/>
    <text x="250" y="255" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Фосфолипиды</text>
    <text x="250" y="268" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Функции:</text>
    <text x="250" y="279" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Энергетическая</text>
    <text x="250" y="289" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Защитная, Строит.</text>
    
    <!-- Carbohydrates -->
    <rect x="330" y="90" width="150" height="205" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="405" y="108" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle">Углеводы</text>
    <!-- Glucose ring -->
    <polygon points="385,140 400,130 415,140 415,155 400,165 385,155" fill="none" stroke="#2E7D32" stroke-width="2"/>
    <text x="400" y="152" font-family="Arial,sans-serif" font-size="8" fill="#66BB6A" text-anchor="middle">O</text>
    <text x="400" y="180" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Глюкоза C6H12O6</text>
    <!-- Monosaccharide -> disaccharide -> polysaccharide -->
    <circle cx="365" cy="205" r="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
    <line x1="375" y1="205" x2="390" y2="205" stroke="#2E7D32" stroke-width="1.5"/>
    <circle cx="400" cy="205" r="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
    <text x="382" y="220" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Дисахарид</text>
    <!-- Chain of monomers -->
    <circle cx="350" cy="248" r="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="365" cy="248" r="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="380" cy="248" r="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="395" cy="248" r="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="410" cy="248" r="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="425" cy="248" r="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <line x1="357" y1="248" x2="358" y2="248" stroke="#2E7D32" stroke-width="1"/>
    <line x1="372" y1="248" x2="373" y2="248" stroke="#2E7D32" stroke-width="1"/>
    <line x1="387" y1="248" x2="388" y2="248" stroke="#2E7D32" stroke-width="1"/>
    <line x1="402" y1="248" x2="403" y2="248" stroke="#2E7D32" stroke-width="1"/>
    <line x1="417" y1="248" x2="418" y2="248" stroke="#2E7D32" stroke-width="1"/>
    <text x="388" y="265" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Полисахарид</text>
    <text x="405" y="280" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Функции:</text>
    <text x="405" y="291" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Энергетическая</text>
    <text x="405" y="282" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Крахмал, Гликоген</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>