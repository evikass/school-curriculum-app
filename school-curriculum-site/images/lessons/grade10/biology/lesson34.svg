<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Постэмбриональное развитие</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 29</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Two types of development -->
    <rect x="170" y="90" width="160" height="25" rx="5" fill="#2E7D32"/>
    <text x="250" y="107" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">Постэмбриогенез</text>
    
    <!-- Direct development -->
    <line x1="200" y1="115" x2="120" y2="135" stroke="#66BB6A" stroke-width="2"/>
    <rect x="20" y="135" width="210" height="155" rx="5" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="125" y="152" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Прямое развитие</text>
    
    <!-- Stages -->
    <rect x="30" y="162" width="190" height="20" rx="3" fill="#C8E6C9"/>
    <text x="125" y="176" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Рождение / вылупление</text>
    <text x="125" y="196" font-family="Arial,sans-serif" font-size="10" fill="#66BB6A" text-anchor="middle">&#x2193;</text>
    <rect x="30" y="202" width="190" height="20" rx="3" fill="#A5D6A7"/>
    <text x="125" y="216" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Ювенильный период</text>
    <text x="125" y="236" font-family="Arial,sans-serif" font-size="10" fill="#66BB6A" text-anchor="middle">&#x2193;</text>
    <rect x="30" y="242" width="190" height="20" rx="3" fill="#81C784"/>
    <text x="125" y="256" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Взрослый организм</text>
    <text x="125" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Млекопитающие, птицы, рептилии</text>
    
    <!-- Indirect development -->
    <line x1="300" y1="115" x2="380" y2="135" stroke="#FFA726" stroke-width="2"/>
    <rect x="270" y="135" width="210" height="155" rx="5" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
    <text x="375" y="152" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Непрямое (метаморфоз)</text>
    
    <!-- Butterfly metamorphosis -->
    <rect x="280" y="162" width="190" height="20" rx="3" fill="#FFE0B2"/>
    <text x="375" y="176" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Яйцо &#x2192; Личинка</text>
    <text x="375" y="196" font-family="Arial,sans-serif" font-size="10" fill="#FFA726" text-anchor="middle">&#x2193;</text>
    <rect x="280" y="202" width="190" height="20" rx="3" fill="#FFCC80"/>
    <text x="375" y="216" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Гусеница (питается, растёт)</text>
    <text x="375" y="236" font-family="Arial,sans-serif" font-size="10" fill="#FFA726" text-anchor="middle">&#x2193;</text>
    <rect x="280" y="242" width="190" height="20" rx="3" fill="#FFA726"/>
    <text x="375" y="256" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Куколка &#x2192; Взрослая бабочка</text>
    <text x="375" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Насекомые, земноводные</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Развитие после рождения</text>
</svg>