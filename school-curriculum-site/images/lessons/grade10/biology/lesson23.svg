<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Митоз</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 20</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Four phases -->
    <!-- Prophase -->
    <rect x="20" y="95" width="105" height="195" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="72" y="112" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Профаза</text>
    <ellipse cx="72" cy="155" rx="35" ry="30" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
    <!-- Condensing chromosomes -->
    <line x1="62" y1="145" x2="82" y2="165" stroke="#1565C0" stroke-width="2"/>
    <line x1="82" y1="145" x2="62" y2="165" stroke="#1565C0" stroke-width="2"/>
    <line x1="65" y1="150" x2="80" y2="160" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="80" y1="150" x2="65" y2="160" stroke="#42A5F5" stroke-width="1.5"/>
    <text x="72" y="200" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Хромосомы</text>
    <text x="72" y="212" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">спирализуются</text>
    <text x="72" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ядерная оболочка</text>
    <text x="72" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">разрушается</text>
    
    <!-- Metaphase -->
    <rect x="135" y="95" width="105" height="195" rx="5" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
    <text x="187" y="112" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Метафаза</text>
    <ellipse cx="187" cy="155" rx="35" ry="30" fill="#FFE0B2" stroke="#FFA726" stroke-width="1"/>
    <!-- Equatorial plate -->
    <line x1="187" y1="135" x2="187" y2="175" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="177" y1="145" x2="177" y2="165" stroke="#E65100" stroke-width="2"/>
    <line x1="197" y1="145" x2="197" y2="165" stroke="#E65100" stroke-width="2"/>
    <!-- Spindle fibers -->
    <line x1="160" y1="140" x2="180" y2="150" stroke="#FFA726" stroke-width="0.8"/>
    <line x1="160" y1="170" x2="180" y2="160" stroke="#FFA726" stroke-width="0.8"/>
    <line x1="215" y1="140" x2="195" y2="150" stroke="#FFA726" stroke-width="0.8"/>
    <line x1="215" y1="170" x2="195" y2="160" stroke="#FFA726" stroke-width="0.8"/>
    <text x="187" y="200" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Хромосомы</text>
    <text x="187" y="212" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">на экваторе</text>
    <text x="187" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Веретено деления</text>
    <text x="187" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">прикрепляется</text>
    
    <!-- Anaphase -->
    <rect x="250" y="95" width="105" height="195" rx="5" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <text x="302" y="112" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Анафаза</text>
    <ellipse cx="302" cy="155" rx="35" ry="30" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <!-- Chromatids separating -->
    <line x1="280" y1="142" x2="280" y2="158" stroke="#C62828" stroke-width="2"/>
    <line x1="285" y1="142" x2="285" y2="158" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="320" y1="142" x2="320" y2="158" stroke="#C62828" stroke-width="2"/>
    <line x1="315" y1="142" x2="315" y2="158" stroke="#EF5350" stroke-width="1.5"/>
    <!-- Spindle -->
    <line x1="275" y1="150" x2="265" y2="135" stroke="#EF5350" stroke-width="0.8"/>
    <line x1="325" y1="150" x2="340" y2="135" stroke="#EF5350" stroke-width="0.8"/>
    <text x="302" y="200" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Хроматиды</text>
    <text x="302" y="212" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">расходятся</text>
    <text x="302" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">К полюсам</text>
    
    <!-- Telophase -->
    <rect x="365" y="95" width="105" height="195" rx="5" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="417" y="112" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Телофаза</text>
    <!-- Two nuclei forming -->
    <ellipse cx="397" cy="155" rx="22" ry="20" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
    <ellipse cx="437" cy="155" rx="22" ry="20" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
    <text x="397" y="158" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">2n</text>
    <text x="437" y="158" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">2n</text>
    <text x="417" y="200" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Ядерные оболочки</text>
    <text x="417" y="212" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">восстанавливаются</text>
    <text x="417" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2 диплоидные</text>
    <text x="417" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">клетки</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Соматическое деление клетки</text>
</svg>