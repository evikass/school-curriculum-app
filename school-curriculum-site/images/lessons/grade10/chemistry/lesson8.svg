<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF7043" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF7043" text-anchor="middle">Спирты</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#FF7043" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#FFF8F0" opacity="0.5"/>
    
    <!-- OH group highlight -->
    <rect x="20" y="90" width="180" height="28" rx="5" fill="#D84315"/>
    <text x="110" y="109" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle">Функциональная: -OH</text>
    
    <!-- Ethanol structure - main -->
    <text x="130" y="140" font-family="Arial,sans-serif" font-size="13" fill="#D84315" text-anchor="middle">Этанол C2H5OH</text>
    <circle cx="60" cy="172" r="14" fill="#333" opacity="0.85"/>
    <text x="60" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H3C</text>
    <circle cx="115" cy="172" r="14" fill="#333" opacity="0.85"/>
    <text x="115" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CH2</text>
    <line x1="74" y1="172" x2="101" y2="172" stroke="#555" stroke-width="2.5"/>
    <circle cx="170" cy="172" r="14" fill="#E53935" opacity="0.85"/>
    <text x="170" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="129" y1="172" x2="156" y2="172" stroke="#555" stroke-width="2.5"/>
    <circle cx="218" cy="172" r="10" fill="#888" opacity="0.85"/>
    <text x="218" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="184" y1="172" x2="208" y2="172" stroke="#555" stroke-width="2.5"/>
    
    <!-- OH group box -->
    <rect x="148" y="192" width="60" height="18" rx="3" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
    <text x="178" y="205" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">OH-группа</text>
    
    <!-- Methanol -->
    <text x="365" y="140" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Метанол CH3OH</text>
    <circle cx="330" cy="172" r="13" fill="#333" opacity="0.85"/>
    <text x="330" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CH3</text>
    <circle cx="380" cy="172" r="13" fill="#E53935" opacity="0.85"/>
    <text x="380" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="343" y1="172" x2="367" y2="172" stroke="#555" stroke-width="2.5"/>
    <circle cx="418" cy="172" r="10" fill="#888" opacity="0.85"/>
    <text x="418" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="393" y1="172" x2="408" y2="172" stroke="#555" stroke-width="2.5"/>
    
    <!-- Propanol -->
    <text x="130" y="228" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">Пропанол-1 CH3CH2CH2OH</text>
    <circle cx="40" cy="250" r="11" fill="#333" opacity="0.85"/>
    <text x="40" y="255" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CH3</text>
    <circle cx="90" cy="250" r="11" fill="#333" opacity="0.85"/>
    <text x="90" y="255" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CH2</text>
    <circle cx="140" cy="250" r="11" fill="#333" opacity="0.85"/>
    <text x="140" y="255" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">CH2</text>
    <circle cx="190" cy="250" r="11" fill="#E53935" opacity="0.85"/>
    <text x="190" y="255" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">OH</text>
    <line x1="51" y1="250" x2="79" y2="250" stroke="#555" stroke-width="2.5"/>
    <line x1="101" y1="250" x2="129" y2="250" stroke="#555" stroke-width="2.5"/>
    <line x1="151" y1="250" x2="179" y2="250" stroke="#555" stroke-width="2.5"/>
    
    <!-- Properties -->
    <rect x="260" y="230" width="220" height="65" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="370" y="245" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">Свойства спиртов:</text>
    <text x="370" y="258" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Водородные связи (выс. Tкип.)</text>
    <text x="370" y="270" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Реакция с Na -&gt; H2</text>
    <text x="370" y="282" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Окисление -&gt; альдегид</text>
    <text x="370" y="294" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Дегидратация -&gt; алкен</text>
    
    <!-- Glycerol mention -->
    <rect x="20" y="275" width="180" height="22" rx="3" fill="#FFF3E0" stroke="#FF7043" stroke-width="1"/>
    <text x="110" y="290" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Глицерин C3H5(OH)3</text>
    <text x="110" y="298" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Многоатомный спирт</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химия</text>
</svg>