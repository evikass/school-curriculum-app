<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Презентация проекта</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 11</text>

  <!-- Top: Presentation structure -->
  <rect x="30" y="60" width="440" height="90" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Структура презентации проекта</text>

  <!-- Slides structure -->
  <rect x="42" y="88" width="70" height="52" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="77" y="106" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="600">Слайд 1</text>
  <text x="77" y="120" text-anchor="middle" fill="#546E7A" font-size="7">Титульный</text>
  <text x="77" y="132" text-anchor="middle" fill="#546E7A" font-size="7">Название</text>

  <rect x="120" y="88" width="70" height="52" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="155" y="106" text-anchor="middle" fill="#E65100" font-size="8" font-weight="600">Слайд 2</text>
  <text x="155" y="120" text-anchor="middle" fill="#546E7A" font-size="7">Проблема</text>
  <text x="155" y="132" text-anchor="middle" fill="#546E7A" font-size="7">и цель</text>

  <rect x="198" y="88" width="70" height="52" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="233" y="106" text-anchor="middle" fill="#00897B" font-size="8" font-weight="600">Слайд 3</text>
  <text x="233" y="120" text-anchor="middle" fill="#546E7A" font-size="7">Решение</text>
  <text x="233" y="132" text-anchor="middle" fill="#546E7A" font-size="7">и подход</text>

  <rect x="276" y="88" width="70" height="52" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="311" y="106" text-anchor="middle" fill="#546E7A" font-size="8" font-weight="600">Слайд 4</text>
  <text x="311" y="120" text-anchor="middle" fill="#546E7A" font-size="7">Результат</text>
  <text x="311" y="132" text-anchor="middle" fill="#546E7A" font-size="7">Демо</text>

  <rect x="354" y="88" width="70" height="52" rx="4" fill="#37474F" opacity="0.12" stroke="#37474F" stroke-width="1"/>
  <text x="389" y="106" text-anchor="middle" fill="#37474F" font-size="8" font-weight="600">Слайд 5</text>
  <text x="389" y="120" text-anchor="middle" fill="#546E7A" font-size="7">Выводы</text>
  <text x="389" y="132" text-anchor="middle" fill="#546E7A" font-size="7">и планы</text>

  <rect x="432" y="88" width="28" height="52" rx="4" fill="#00897B"/>
  <text x="446" y="118" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">Q&amp;A</text>

  <!-- Left: Visual tips -->
  <rect x="30" y="162" width="210" height="80" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="135" y="180" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Визуальные принципы</text>

  <text x="42" y="198" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="198" fill="#546E7A" font-size="8">Правило третей (композиция)</text>

  <text x="42" y="212" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="212" fill="#546E7A" font-size="8">Минимум текста, максимум графики</text>

  <text x="42" y="226" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="226" fill="#546E7A" font-size="8">Единый стиль и цветовая схема</text>

  <text x="42" y="240" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="240" fill="#546E7A" font-size="8">Крупный шрифт (≥ 24 pt)</text>

  <!-- Right: Speaking tips -->
  <rect x="260" y="162" width="210" height="80" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="365" y="180" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Навыки выступления</text>

  <text x="272" y="198" fill="#1565C0" font-size="8">▸</text>
  <text x="284" y="198" fill="#546E7A" font-size="8">Зрительный контакт</text>

  <text x="272" y="212" fill="#1565C0" font-size="8">▸</text>
  <text x="284" y="212" fill="#546E7A" font-size="8">Темп речи — 120 слов/мин</text>

  <text x="272" y="226" fill="#1565C0" font-size="8">▸</text>
  <text x="284" y="226" fill="#546E7A" font-size="8">Жесты и мимика</text>

  <text x="272" y="240" fill="#1565C0" font-size="8">▸</text>
  <text x="284" y="240" fill="#546E7A" font-size="8">Подготовка к вопросам</text>

  <!-- Bottom: Time management -->
  <rect x="30" y="254" width="440" height="58" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="272" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Тайминг презентации (5 минут)</text>

  <!-- Time bar -->
  <rect x="45" y="282" width="430" height="18" rx="4" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="0.5"/>
  <rect x="45" y="282" width="43" height="18" rx="4" fill="#1565C0" opacity="0.8"/>
  <text x="66" y="295" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">0:30</text>

  <rect x="88" y="282" width="86" height="18" fill="#E65100" opacity="0.8"/>
  <text x="131" y="295" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">1:00</text>

  <rect x="174" y="282" width="172" height="18" fill="#00897B" opacity="0.8"/>
  <text x="260" y="295" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">2:00 — основная часть</text>

  <rect x="346" y="282" width="86" height="18" fill="#78909C" opacity="0.8"/>
  <text x="389" y="295" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">1:00 — выводы</text>

  <rect x="432" y="282" width="43" height="18" rx="4" fill="#37474F"/>
  <text x="453" y="295" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="600">0:30</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>