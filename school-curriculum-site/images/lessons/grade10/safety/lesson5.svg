<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earthGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2E4057" stroke-width="3" rx="5" ry="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#2E4057" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E4057">ОБЖ · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="14" fill="#2E4057">Урок №15</text>
  
  <!-- Заголовок темы -->
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2E4057">Чрезвычайные ситуации природного характера</text>
  
  <!-- Раздел: Землетрясения -->
  <text x="250" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#8B4513">ЗЕМЛЕТРЯСЕНИЯ</text>
  
  <!-- Маска баллов -->
  <rect x="30" y="115" width="200" height="80" fill="none" stroke="#8B4513" stroke-width="1" rx="5" ry="5"/>
  <text x="130" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#8B4513">Сила в баллах</text>
  
  <!-- Шкала баллов -->
  <line x1="40" y1="145" x2="220" y2="145" stroke="#8B4513" stroke-width="2"/>
  <text x="45" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">1</text>
  <text x="65" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">2-3</text>
  <text x="85" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">4</text>
  <text x="105" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">5</text>
  <text x="125" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">6</text>
  <text x="145" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">7</text>
  <text x="165" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">8</text>
  <text x="185" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">9</text>
  <text x="205" y="160" font-family="Arial, sans-serif" font-size="10" fill="#8B4513">10-12</text>
  
  <!-- Описание баллов -->
  <text x="45" y="175" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">Неощутимо</text>
  <text x="65" y="175" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">Очень слабое</text>
  <text x="105" y="175" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">Сильное</text>
  <text x="165" y="175" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">Разрушительное</text>
  <text x="185" y="175" font-family="Arial, sans-serif" font-size="8" fill="#8B4513">Катастрофическое</text>
  
  <!-- Опасные районы -->
  <rect x="270" y="115" width="200" height="80" fill="none" stroke="#8B4513" stroke-width="1" rx="5" ry="5"/>
  <text x="370" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#8B4513">Опасные районы</text>
  
  <!-- Карта опасных районов -->
  <ellipse cx="300" cy="165" rx="15" ry="10" fill="#FF6347" opacity="0.7"/>
  <text x="300" y="168" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Кавказ</text>
  
  <ellipse cx="370" cy="165" rx="15" ry="10" fill="#FF6347" opacity="0.7"/>
  <text x="370" y="168" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Камчатка</text>
  
  <ellipse cx="440" cy="165" rx="15" ry="10" fill="#FF6347" opacity="0.7"/>
  <text x="440" y="168" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#8B4513">Сахалин</text>
  
  <!-- Действия при землетрясении -->
  <text x="250" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E4057">Действия при землетрясении</text>
  
  <!-- Действия в помещении -->
  <rect x="30" y="230" width="140" height="70" fill="none" stroke="#2E4057" stroke-width="1" rx="5" ry="5"/>
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E4057">В помещении</text>
  
  <!-- Иллюстрация действий в помещении -->
  <rect x="45" y="260" width="30" height="30" fill="none" stroke="#2E4057" stroke-width="1"/>
  <line x1="50" y1="275" x2="75" y2="275" stroke="#2E4057" stroke-width="1"/>
  <text x="85" y="280" font-family="Arial, sans-serif" font-size="10" fill="#2E4057">Дверной проём</text>
  
  <rect x="45" y="260" width="30" height="30" fill="none" stroke="#2E4057" stroke-width="1"/>
  <rect x="50" y="270" width="20" height="15" fill="none" stroke="#2E4057" stroke-width="1"/>
  <text x="85" y="280" font-family="Arial, sans-serif" font-size="10" fill="#2E4057">Под стол</text>
  
  <!-- Действия на улице -->
  <rect x="180" y="230" width="140" height="70" fill="none" stroke="#2E4057" stroke-width="1" rx="5" ry="5"/>
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E4057">На улице</text>
  
  <!-- Иллюстрация действий на улице -->
  <rect x="195" y="260" width="20" height="30" fill="none" stroke="#2E4057" stroke-width="1"/>
  <line x1="200" y1="265" x2="200" y2="285" stroke="#2E4057" stroke-width="1"/>
  <line x1="205" y1="265" x2="205" y2="285" stroke="#2E4057" stroke-width="1"/>
  <line x1="195" y1="265" x2="210" y2="265" stroke="#2E4057" stroke-width="1"/>
  
  <line x1="230" y1="270" x2="260" y2="270" stroke="#2E4057" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="245" y="285" font-family="Arial, sans-serif" font-size="10" fill="#2E4057">От зданий</text>
  
  <!-- Действия после -->
  <rect x="330" y="230" width="140" height="70" fill="none" stroke="#2E4057" stroke-width="1" rx="5" ry="5"/>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2E4057">После землетрясения</text>
  
  <!-- Иллюстрация действий после -->
  <rect x="345" y="260" width="25" height="25" fill="none" stroke="#FF6347" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="350" y1="270" x2="365" y2="270" stroke="#FF6347" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="350" y1="275" x2="365" y2="275" stroke="#FF6347" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="350" y1="280" x2="365" y2="280" stroke="#FF6347" stroke-width="1" stroke-dasharray="2,1"/>
  
  <text x="390" y="280" font-family="Arial, sans-serif" font-size="10" fill="#2E4057">Не входить</text>
  
  <!-- Раздел: Наводнения -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1E90FF">НАВОДНЕНИЯ</text>
  
  <!-- Иллюстрация наводнения -->
  <rect x="30" y="330" width="440" height="15" fill="url(#waterGradient)"/>
  
  <!-- Здание под водой -->
  <rect x="100" y="315" width="40" height="15" fill="url(#earthGradient)"/>
  <polygon points="90,315 100,305 140,305 150,315" fill="url(#earthGradient)"/>
  
  <!-- Человек на крыше -->
  <circle cx="120" cy="300" r="3" fill="#FF6347"/>
  <line x1="120" y1="303" x2="120" y2="310" stroke="#FF6347" stroke-width="1"/>
  <line x1="120" y1="305" x2="115" y2="308" stroke="#FF6347" stroke-width="1"/>
  <line x1="120" y1="305" x2="125" y2="308" stroke="#FF6347" stroke-width="1"/>
  <line x1="120" y1="310" x2="115" y2="315" stroke="#FF6347" stroke-width="1"/>
  <line x1="120" y1="310" x2="125" y2="315" stroke="#FF6347" stroke-width="1"/>
  
  <!-- Уровень воды -->
  <line x1="30" y1="330" x2="470" y2="330" stroke="#1E90FF" stroke-width="2"/>
  <text x="480" y="333" font-family="Arial, sans-serif" font-size="10" fill="#1E90FF">Уровень воды</text>
  
  <!-- Волны -->
  <path d="M150,330 Q160,325 170,330 T190,330" fill="none" stroke="#1E90FF" stroke-width="2"/>
  <path d="M250,330 Q260,325 270,330 T290,330" fill="none" stroke="#1E90FF" stroke-width="2"/>
  <path d="M350,330 Q360,325 370,330 T390,330" fill="none" stroke="#1E90FF" stroke-width="2"/>
</svg>