<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">ОБЖ · 10 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#34495e">Оценка состояния и сердечно-лёгочная реанимация</text>
  <text x="480" y="340" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">№ Урока</text>
  
  <!-- Раздел оценки состояния -->
  <rect x="20" y="70" width="230" height="250" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
  <text x="135" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Оценка состояния пострадавшего</text>
  
  <!-- Шаг 1: Проверка сознания -->
  <circle cx="50" cy="115" r="15" fill="#e74c3c"/>
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">1</text>
  <text x="75" y="120" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Проверить сознание</text>
  
  <!-- Иллюстрация проверки сознания -->
  <ellipse cx="135" cy="140" rx="25" ry="35" fill="#fdbcb4" stroke="#2c3e50" stroke-width="2"/>
  <line x1="125" y1="125" x2="145" y2="125" stroke="#2c3e50" stroke-width="2"/>
  <line x1="125" y1="135" x2="145" y2="135" stroke="#2c3e50" stroke-width="2"/>
  <line x1="125" y1="145" x2="145" y2="145" stroke="#2c3e50" stroke-width="2"/>
  <path d="M110 140 L125 130 L125 150 Z" fill="#2c3e50"/>
  <text x="175" y="145" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Потрясти за плечо</text>
  
  <text x="50" y="170" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Задать вопрос:</text>
  <text x="65" y="185" font-family="Arial, sans-serif" font-size="10" fill="#34495e">"Вы меня слышите?"</text>
  <text x="65" y="200" font-family="Arial, sans-serif" font-size="10" fill="#34495e">"Откройте глаза"</text>
  
  <!-- Шаг 2: Проверка дыхания -->
  <circle cx="50" cy="225" r="15" fill="#e74c3c"/>
  <text x="50" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">2</text>
  <text x="75" y="230" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Проверить дыхание</text>
  
  <!-- Иллюстрация проверки дыхания -->
  <ellipse cx="135" cy="250" rx="25" ry="35" fill="#fdbcb4" stroke="#2c3e50" stroke-width="2"/>
  <path d="M125 235 L145 235" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
  <path d="M125 245 L145 245" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
  <path d="M125 255 L145 255" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
  <path d="M110 240 Q120 230 130 240" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-dasharray="2,2"/>
  <path d="M140 240 Q150 230 160 240" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-dasharray="2,2"/>
  
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Посмотреть движение</text>
  <text x="50" y="295" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">  грудной клетки</text>
  <text x="50" y="310" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Послушать дыхание</text>
  
  <!-- Шаг 3: Проверка пульса -->
  <circle cx="280" cy="115" r="15" fill="#e74c3c"/>
  <text x="280" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">3</text>
  <text x="305" y="120" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Проверить пульс</text>
  
  <!-- Иллюстрация проверки пульса -->
  <rect x="340" y="85" width="30" height="50" fill="#fdbcb4" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="355" cy="75" r="12" fill="#fdbcb4" stroke="#2c3e50" stroke-width="2"/>
  <line x1="350" y1="75" x2="360" y2="75" stroke="#2c3e50" stroke-width="1"/>
  <line x1="350" y1="80" x2="360" y2="80" stroke="#2c3e50" stroke-width="1"/>
  <path d="M340 110 Q355 120 370 110" fill="none" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
  <circle cx="355" cy="110" r="3" fill="#e74c3c"/>
  <path d="M355 110 L355 125" stroke="#2c3e50" stroke-width="2"/>
  <path d="M345 125 L365 125" stroke="#2c3e50" stroke-width="2"/>
  
  <text x="280" y="150" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">На шее — сонная артерия</text>
  <path d="M340 150 Q355 140 370 150" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <circle cx="355" cy="150" r="2" fill="#3498db"/>
  <text x="280" y="165" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Проверка 10 секунд</text>
  <text x="280" y="180" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Норма: 60-100 уд/мин</text>
  
  <!-- Шаг 4: Осмотр на травмы -->
  <circle cx="280" cy="215" r="15" fill="#e74c3c"/>
  <text x="280" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">4</text>
  <text x="305" y="220" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Осмотреть на травмы</text>
  
  <!-- Иллюстрация осмотра -->
  <rect x="340" y="190" width="60" height="80" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2"/>
  <ellipse cx="370" cy="210" rx="15" ry="20" fill="#fdbcb4" stroke="#2c3e50" stroke-width="1"/>
  <circle cx="370" cy="205" r="8" fill="#fdbcb4" stroke="#2c3e50" stroke-width="1"/>
  <circle cx="367" cy="203" r="1.5" fill="#2c3e50"/>
  <circle cx="373" cy="203" r="1.5" fill="#2c3e50"/>
  <path d="M365 208 Q370 212 375 208" fill="none" stroke="#2c3e50" stroke-width="1" stroke-linecap="round"/>
  <rect x="355" y="220" width="30" height="40" fill="#fdbcb4" stroke="#2c3e50" stroke-width="1"/>
  
  <!-- Знаки травм -->
  <circle cx="355" cy="230" r="4" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <line x1="353" y1="232" x2="357" y2="234" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="385" cy="245" r="4" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <line x1="383" y1="247" x2="387" y2="249" stroke="#e74c3c" stroke-width="2"/>
  
  <text x="280" y="285" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Внешний осмотр</text>
  <text x="280" y="300" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• Оценка боли</text>
  
  <!-- Сердечно-лёгочная реанимация -->
  <rect x="20" y="330" width="460" height="10" fill="#34495e"/>
  <rect x="20" y="330" width="460" height="3" fill="#3498db"/>
  
  <rect x="250" y="70" width="230" height="250" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
  <text x="365" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Сердечно-лёгочная реанимация</text>
  
  <!-- Показания -->
  <rect x="265" y="100" width="200" height="40" fill="#e74c3c" rx="5"/>
  <text x="365" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Показания: отсутствие сознания и дыхания</text>
  
  <!-- Схема СЛР -->
  <rect x="265" y="150" width="200" height="170" fill="white" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="365" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Алгоритм СЛР</text>
  
  <!-- Сердце -->
  <path d="M335 190 C335 180, 325 170, 315 170 C305 170, 295 180, 295 190 C295 200, 335 230, 335 230 C335 230, 375 200, 375 190 C375 180, 365 170, 355 170 C345 170, 335 180, 335 190 Z" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  
  <!-- Лёгкие -->
  <ellipse cx="320" cy="240" rx="20" ry="25" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <ellipse cx="410" cy="240" rx="20" ry="25" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  
  <!-- Стрелки СЛР -->
  <path d="M335 210 L335 230" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M335 250 L320 270" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <path d="M335 250 L410 270" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead2)"/>
  
  <!-- Частота -->
  <text x="365" y="290" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Частота: 100-120 надавливаний/мин</text>
  <text x="365" y="305" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Глубина: 5-6 см</text>
  
  <!-- Пропорции -->
  <rect x="265" y="315" width="60" height="5" fill="#e74c3c"/>
  <rect x="325" y="315" width="20" height="5" fill="#3498db"/>
  <text x="275" y="330" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">30:2</text>
  <text x="335" y="330" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">СЛР</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.2" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="30" r="3" fill="#3498db" opacity="0.5"/>
  <circle cx="470" cy="30" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="30" cy="320" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="470" cy="320" r="3" fill="#3498db" opacity="0.5"/>
  
  <!-- Формула времени brain death -->
  <text x="365" y="170" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">Т = 4-6 мин</text>
</svg>