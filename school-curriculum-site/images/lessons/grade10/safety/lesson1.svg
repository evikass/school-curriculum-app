<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB85C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449D44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D9534F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9302C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0AD4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC971F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">ОБЖ · 10 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2C3E50">Личная безопасность в повседневной жизни</text>
  <text x="25" y="25" font-family="Arial, sans-serif" font-size="12" fill="#666">Урок №12</text>
  
  <!-- Раздел: На улице -->
  <rect x="20" y="70" width="220" height="120" fill="#F5F7FA" stroke="#4A90E2" stroke-width="2" rx="5"/>
  <rect x="20" y="70" width="220" height="30" fill="url(#blueGrad)" rx="5"/>
  <text x="130" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">НА УЛИЦЕ</text>
  
  <!-- Иконка улицы -->
  <circle cx="40" cy="130" r="15" fill="#E8F4FD" stroke="#4A90E2" stroke-width="1"/>
  <path d="M35,135 L35,125 L45,125 L45,135" fill="none" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="40" y1="130" x2="40" y2="125" stroke="#4A90E2" stroke-width="1.5"/>
  
  <!-- Правило 1 -->
  <circle cx="40" cy="160" r="3" fill="#D9534F"/>
  <text x="55" y="165" font-family="Arial, sans-serif" font-size="11" fill="#333">Избегать безлюдных мест</text>
  <text x="55" y="178" font-family="Arial, sans-serif" font-size="9" fill="#666">в тёмное время</text>
  
  <!-- Правило 2 -->
  <circle cx="40" cy="190" r="3" fill="#D9534F"/>
  <text x="55" y="195" font-family="Arial, sans-serif" font-size="11" fill="#333">Не демонстрировать ценные вещи</text>
  
  <!-- Правило 3 -->
  <circle cx="40" cy="215" r="3" fill="#D9534F"/>
  <text x="55" y="220" font-family="Arial, sans-serif" font-size="11" fill="#333">Иметь при себе заряженный</text>
  <text x="55" y="233" font-family="Arial, sans-serif" font-size="9" fill="#666">телефон</text>
  
  <!-- Правило 4 -->
  <circle cx="40" cy="248" r="3" fill="#D9534F"/>
  <text x="55" y="253" font-family="Arial, sans-serif" font-size="11" fill="#333">Сообщать близким о маршруте</text>
  
  <!-- Раздел: В общественном транспорте -->
  <rect x="260" y="70" width="220" height="120" fill="#F5F7FA" stroke="#5CB85C" stroke-width="2" rx="5"/>
  <rect x="260" y="70" width="220" height="30" fill="url(#greenGrad)" rx="5"/>
  <text x="370" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">В ОБЩЕСТВЕННОМ ТРАНСПОРТЕ</text>
  
  <!-- Иконка автобуса -->
  <rect x="280" y="115" width="25" height="20" fill="#E8F8F5" stroke="#5CB85C" stroke-width="1" rx="3"/>
  <rect x="282" y="117" width="21" height="3" fill="#5CB85C"/>
  <circle cx="285" cy="133" r="2" fill="#5CB85C"/>
  <circle cx="300" cy="133" r="2" fill="#5CB85C"/>
  
  <!-- Правило 1 -->
  <circle cx="280" cy="150" r="3" fill="#D9534F"/>
  <text x="295" y="155" font-family="Arial, sans-serif" font-size="11" fill="#333">Не спать в транспорте</text>
  
  <!-- Правило 2 -->
  <circle cx="280" cy="175" r="3" fill="#D9534F"/>
  <text x="295" y="180" font-family="Arial, sans-serif" font-size="11" fill="#333">Держать сумку закрытой</text>
  
  <!-- Правило 3 -->
  <circle cx="280" cy="200" r="3" fill="#D9534F"/>
  <text x="295" y="205" font-family="Arial, sans-serif" font-size="11" fill="#333">Избегать пустых вагонов</text>
  
  <!-- Раздел: В общественных местах -->
  <rect x="20" y="210" width="220" height="120" fill="#F5F7FA" stroke="#F0AD4E" stroke-width="2" rx="5"/>
  <rect x="20" y="210" width="220" height="30" fill="url(#yellowGrad)" rx="5"/>
  <text x="130" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">В ОБЩЕСТВЕННЫХ МЕСТАХ</text>
  
  <!-- Иконка здания -->
  <rect x="40" y="250" width="20" height="25" fill="#FEF5E7" stroke="#F0AD4E" stroke-width="1" rx="2"/>
  <rect x="42" y="255" width="16" height="3" fill="#F0AD4E"/>
  <rect x="42" y="262" width="16" height="3" fill="#F0AD4E"/>
  <rect x="42" y="269" width="16" height="3" fill="#F0AD4E"/>
  <polygon points="40,250 50,240 60,250" fill="#F0AD4E"/>
  
  <!-- Правило 1 -->
  <circle cx="40" y="285" r="3" fill="#D9534F"/>
  <text x="55" y="290" font-family="Arial, sans-serif" font-size="11" fill="#333">Следить за личными вещами</text>
  
  <!-- Правило 2 -->
  <circle cx="40" cy="305" r="3" fill="#D9534F"/>
  <text x="55" y="310" font-family="Arial, sans-serif" font-size="11" fill="#333">Не оставлять еду/напитки без присмотра</text>
  
  <!-- Раздел: Дома -->
  <rect x="260" y="210" width="220" height="120" fill="#F5F7FA" stroke="#9B59B6" stroke-width="2" rx="5"/>
  <rect x="260" y="210" width="220" height="30" fill="url(#purpleGrad)" rx="5"/>
  <text x="370" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">ДОМА</text>
  
  <!-- Иконка дома -->
  <rect x="280" y="250" width="25" height="20" fill="#F4ECF7" stroke="#9B59B6" stroke-width="1" rx="2"/>
  <polygon points="280,250 292.5,240 305,250" fill="#9B59B6"/>
  <rect x="287" y="258" width="8" height="8" fill="#9B59B6"/>
  
  <!-- Правило 1 -->
  <circle cx="280" cy="285" r="3" fill="#D9534F"/>
  <text x="295" y="290" font-family="Arial, sans-serif" font-size="11" fill="#333">Закрывать двери/окна</text>
  
  <!-- Правило 2 -->
  <circle cx="280" cy="305" r="3" fill="#D9534F"/>
  <text x="295" y="310" font-family="Arial, sans-serif" font-size="11" fill="#333">Не открывать незнакомцам</text>
  
  <!-- Информационный блок: Телефоны экстренных служб -->
  <rect x="120" y="340" width="260" height="25" fill="#2C3E50" rx="3"/>
  <text x="250" y="357" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Телефоны экстренных служб: 102 (МВД), 101 (МЧС), 103 (Скорая)</text>
  
  <!-- Дополнительные элементы для детализации -->
  <!-- Предупреждающий символ -->
  <g transform="translate(450, 100)">
    <polygon points="0,10 -8,-10 8,-10" fill="#F0AD4E" stroke="#D58512" stroke-width="1"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">!</text>
  </g>
  
  <!-- График безопасности -->
  <g transform="translate(40, 340)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#666" stroke-width="1"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#666" stroke-width="1"/>
    <polyline points="5,35 10,30 15,25 20,20 25,15 30,10 35,5" fill="none" stroke="#5CB85C" stroke-width="2"/>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Рост безопасности</text>
  </g>
  
  <!-- Формула безопасности -->
  <text x="380" y="335" font-family="Arial, sans-serif" font-size="10" fill="#666">Безопасность =</text>
  <text x="380" y="348" font-family="Arial, sans-serif" font-size="10" fill="#666">Осторожность + Знания</text>
</svg>