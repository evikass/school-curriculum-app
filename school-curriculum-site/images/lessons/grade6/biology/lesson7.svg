  <circle cx="285" cy="268" r="1" fill="#90CAF9" opacity="0.5"/>
  <circle cx="210" cy="285" r="0.8" fill="#90CAF9" opacity="0.4"/>
  <circle cx="290" cy="282" r="0.8" fill="#90CAF9" opacity="0.4"/>
  <text x="250" y="295" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">медузы, кораллы</text>

  <!-- Crustacean card -->
  <rect x="334" y="216" width="145" height="82" rx="6" fill="white" stroke="#E65100" stroke-width="1.5" opacity="0.9"/>
  <text x="406" y="230" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold" text-anchor="middle">РАКООБРАЗНЫЕ</text>
  <!-- Crayfish -->
  <!-- Body segments -->
  <ellipse cx="395" cy="260" rx="18" ry="8" fill="#FF7043" stroke="#E65100" stroke-width="1"/>
  <ellipse cx="412" cy="258" rx="12" ry="7" fill="#FF8A65" stroke="#E65100" stroke-width="0.8"/>
  <ellipse cx="425" cy="255" rx="10" ry="6" fill="#FFAB91" stroke="#E65100" stroke-width="0.8"/>
