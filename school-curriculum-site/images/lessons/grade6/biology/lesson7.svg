  <path d="M235,260 Q232,278 230,290" stroke="#BA68C8" stroke-width="1" fill="none"/>
  <path d="M265,260 Q268,278 270,290" stroke="#BA68C8" stroke-width="1" fill="none"/>
  <path d="M275,260 Q280,275 282,288" stroke="#BA68C8" stroke-width="1" fill="none"/>
