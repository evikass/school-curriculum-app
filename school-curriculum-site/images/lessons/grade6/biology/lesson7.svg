  <ellipse cx="380" cy="263" rx="5" ry="5" fill="#FF7043" stroke="#E65100" stroke-width="0.5"/>
  <ellipse cx="373" cy="267" rx="4" ry="4" fill="#FF7043" stroke="#E65100" stroke-width="0.5"/>
  <path d="M360,268 L355,272" stroke="#E65100" stroke-width="1"/>
  <path d="M362,260 L356,258" stroke="#E65100" stroke-width="1"/>
  <path d="M358,264 L352,265" stroke="#E65100" stroke-width="1"/>
  <!-- Claws -->
  <line x1="425" y1="252" x2="440" y2="242" stroke="#E65100" stroke-width="1.5"/>
  <ellipse cx="442" cy="240" rx="6" ry="4" fill="#FF8A65" stroke="#E65100" stroke-width="0.8" transform="rotate(-30,442,240)"/>
  <path d="M438,236 Q436,232 440,232" stroke="#E65100" stroke-width="0.8" fill="none"/>
  <path d="M446,238 Q448,234 445,232" stroke="#E65100" stroke-width="0.8" fill="none"/>
  <line x1="425" y1="258" x2="440" y2="268" stroke="#E65100" stroke-width="1.5"/>
  <ellipse cx="442" cy="270" rx="6" ry="4" fill="#FF8A65" stroke="#E65100" stroke-width="0.8" transform="rotate(30,442,270)"/>
