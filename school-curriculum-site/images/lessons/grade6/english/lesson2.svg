<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Describing People</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Иностранный язык - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Central person figure with labeled features -->
  <g transform="translate(200, 85)">
    <!-- Head -->
    <circle cx="50" cy="30" r="22" fill="#FFCC80" stroke="#8D6E63" stroke-width="1.5"/>
    <!-- Eyes -->
    <ellipse cx="42" cy="27" rx="3" ry="3.5" fill="#5D4037"/>
    <ellipse cx="58" cy="27" rx="3" ry="3.5" fill="#5D4037"/>
    <circle cx="42.5" cy="26.5" r="1" fill="white"/>
    <circle cx="58.5" cy="26.5" r="1" fill="white"/>
    <!-- Nose -->
    <path d="M50,30 L48,36 L52,36" fill="none" stroke="#8D6E63" stroke-width="1"/>
    <!-- Mouth -->
    <path d="M44,40 Q50,46 56,40" fill="none" stroke="#C62828" stroke-width="1.5"/>
    <!-- Hair -->
    <path d="M28,24 Q28,8 50,8 Q72,8 72,24" fill="#5D4037"/>
    <path d="M28,24 Q26,18 30,12" fill="#5D4037"/>
    <path d="M72,24 Q74,18 70,12" fill="#5D4037"/>
    <!-- Neck -->
    <rect x="45" y="52" width="10" height="10" fill="#FFCC80"/>
    <!-- Body -->
    <path d="M30,62 Q30,58 50,58 Q70,58 70,62 L75,140 Q75,145 50,145 Q25,145 25,140 Z" fill="#1565C0"/>
    <!-- Arms -->
    <path d="M30,65 L10,105 L15,108 L32,72" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <path d="M70,65 L90,105 L85,108 L68,72" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <!-- Hands -->
    <circle cx="12" cy="108" r="5" fill="#FFCC80"/>
    <circle cx="88" cy="108" r="5" fill="#FFCC80"/>
    <!-- Legs -->
    <rect x="35" y="140" width="12" height="45" rx="3" fill="#37474F"/>
    <rect x="53" y="140" width="12" height="45" rx="3" fill="#37474F"/>
    <!-- Shoes -->
    <ellipse cx="41" cy="187" rx="10" ry="4" fill="#5D4037"/>
    <ellipse cx="59" cy="187" rx="10" ry="4" fill="#5D4037"/>
  </g>

  <!-- Annotation arrows and labels -->
  <!-- Hair label -->
  <line x1="250" y1="93" x2="320" y2="95" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="320" y="88" width="50" height="16" rx="4" fill="#C62828" opacity="0.12"/>
  <text x="345" y="100" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">hair</text>

  <!-- Eyes label -->
  <line x1="248" y1="112" x2="320" y2="112" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="320" y="105" width="40" height="16" rx="4" fill="#1565C0" opacity="0.12"/>
  <text x="340" y="117" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">eyes</text>

  <!-- Adjective Word Cards - Left side -->
  <!-- tall -->
  <g transform="translate(20, 90)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">tall</text>
  </g>
  <!-- short -->
  <g transform="translate(20, 125)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">short</text>
  </g>
  <!-- young -->
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">young</text>
  </g>
  <!-- old -->
  <g transform="translate(20, 195)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">old</text>
  </g>
  <!-- blonde -->
  <g transform="translate(20, 230)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#F9A825" text-anchor="middle" font-weight="bold">blonde</text>
  </g>
  <!-- dark -->
  <g transform="translate(20, 265)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#EFEBE9" stroke="#4E342E" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#4E342E" text-anchor="middle" font-weight="bold">dark</text>
  </g>

  <!-- Adjective Word Cards - Right side -->
  <!-- beautiful -->
  <g transform="translate(410, 90)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#FCE4EC" stroke="#C62828" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">beautiful</text>
  </g>
  <!-- handsome -->
  <g transform="translate(410, 125)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">handsome</text>
  </g>
  <!-- friendly -->
  <g transform="translate(410, 160)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">friendly</text>
  </g>
  <!-- kind -->
  <g transform="translate(410, 195)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">kind</text>
  </g>
  <!-- curly -->
  <g transform="translate(410, 230)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">curly</text>
  </g>
  <!-- straight -->
  <g transform="translate(410, 265)">
    <rect x="0" y="0" width="70" height="28" rx="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
    <text x="35" y="18" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">straight</text>
  </g>

  <!-- Opposites arrows -->
  <g transform="translate(105, 90)">
    <text x="0" y="15" font-family="Arial,sans-serif" font-size="14" fill="#999" text-anchor="middle">&#8596;</text>
  </g>
  <g transform="translate(105, 160)">
    <text x="0" y="15" font-family="Arial,sans-serif" font-size="14" fill="#999" text-anchor="middle">&#8596;</text>
  </g>
  <g transform="translate(105, 230)">
    <text x="0" y="15" font-family="Arial,sans-serif" font-size="14" fill="#999" text-anchor="middle">&#8596;</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Describing People</text>
</svg>