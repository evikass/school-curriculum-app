<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Экологическая тропа</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main forest scene -->
  <rect x="30" y="90" width="440" height="205" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="250" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ПУТЕШЕСТВИЕ ПО ЭКОТРОПЕ</text>
  
  <!-- Sky -->
  <rect x="35" y="110" width="430" height="50" fill="#B3E5FC"/>
  <!-- Sun -->
  <circle cx="420" cy="122" r="16" fill="#F9A825" opacity="0.5"/>
  
  <!-- Background trees (far) -->
  <rect x="45" y="130" width="6" height="40" fill="#5D4037"/>
  <circle cx="48" cy="125" r="15" fill="#2E7D32" opacity="0.6"/>
  <rect x="85" y="135" width="5" height="35" fill="#5D4037"/>
  <circle cx="88" cy="130" r="12" fill="#43A047" opacity="0.6"/>
  <rect x="380" y="132" width="5" height="38" fill="#5D4037"/>
  <circle cx="382" cy="127" r="14" fill="#2E7D32" opacity="0.6"/>
  <rect x="420" y="135" width="5" height="35" fill="#5D4037"/>
  <circle cx="423" cy="130" r="12" fill="#43A047" opacity="0.6"/>
  <rect x="450" y="128" width="6" height="42" fill="#5D4037"/>
  <circle cx="453" cy="123" r="15" fill="#2E7D32" opacity="0.5"/>
  
  <!-- Ground / Forest floor -->
  <rect x="35" y="170" width="430" height="120" fill="#A5D6A7"/>
  <path d="M35,180 Q80,170 120,180 Q160,190 200,180 Q240,170 280,180 Q320,190 360,180 Q400,170 440,180 L465,180 L465,290 L35,290 Z" fill="#81C784"/>
  
  <!-- Winding trail -->
  <path d="M60,290 Q80,270 100,265 Q130,258 150,250 Q180,240 200,230 Q230,218 260,210 Q280,205 300,200 Q330,195 350,198 Q380,202 400,195 Q430,186 455,175" stroke="#D7CCC8" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M60,290 Q80,270 100,265 Q130,258 150,250 Q180,240 200,230 Q230,218 260,210 Q280,205 300,200 Q330,195 350,198 Q380,202 400,195 Q430,186 455,175" stroke="#BCAAA4" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="0"/>
  
  <!-- Footprints on trail -->
  <!-- Footprint 1 -->
  <g transform="translate(100,265) rotate(-10)">
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
  </g>
  <!-- Footprint 2 -->
  <g transform="translate(125,258) rotate(-5)">
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
  </g>
  <!-- Footprint 3 -->
  <g transform="translate(180,238) rotate(5)">
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
  </g>
  <!-- Footprint 4 -->
  <g transform="translate(220,225) rotate(8)">
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
  </g>
  <!-- Footprint 5 -->
  <g transform="translate(280,206) rotate(12)">
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
  </g>
  <!-- Footprint 6 -->
  <g transform="translate(340,196) rotate(5)">
    <ellipse cx="0" cy="0" rx="4" ry="6" fill="#8D6E63" opacity="0.5"/>
    <circle cx="-3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="0" cy="-7" r="1.5" fill="#8D6E63" opacity="0.4"/>
    <circle cx="3" cy="-6" r="1.5" fill="#8D6E63" opacity="0.4"/>
  </g>

  <!-- Information board 1 -->
  <g transform="translate(150,210)">
    <rect x="-2" y="0" width="4" height="25" fill="#795548"/>
    <rect x="-15" y="-20" width="30" height="22" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
    <line x1="-12" y1="-14" x2="12" y2="-14" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="-12" y1="-2" x2="6" y2="-2" stroke="#F9A825" stroke-width="0.5"/>
  </g>
  
  <!-- Information board 2 -->
  <g transform="translate(310,180)">
    <rect x="-2" y="0" width="4" height="25" fill="#795548"/>
    <rect x="-15" y="-20" width="30" height="22" rx="2" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
    <!-- Leaf icon on board -->
    <path d="M-5,-12 Q0,-18 5,-12 Q0,-6 -5,-12 Z" fill="#43A047"/>
    <line x1="-2" y1="-8" x2="2" y2="-14" stroke="#2E7D32" stroke-width="0.5"/>
  </g>

  <!-- Trees (foreground left) -->
  <rect x="55" y="195" width="8" height="65" fill="#5D4037"/>
  <circle cx="59" cy="185" r="22" fill="#2E7D32"/>
  <circle cx="48" cy="195" r="15" fill="#43A047"/>
  <circle cx="70" cy="190" r="16" fill="#66BB6A"/>
  
  <!-- Pine tree -->
  <rect x="120" y="220" width="5" height="45" fill="#5D4037"/>
  <polygon points="122,175 108,220 137,220" fill="#2E7D32"/>
  <polygon points="122,185 112,215 133,215" fill="#43A047"/>
  <polygon points="122,195 115,210 130,210" fill="#66BB6A"/>
  
  <!-- Tree right side -->
  <rect x="400" y="200" width="7" height="55" fill="#5D4037"/>
  <circle cx="403" cy="190" r="20" fill="#43A047"/>
  <circle cx="393" cy="198" r="14" fill="#66BB6A"/>

  <!-- Pond -->
  <ellipse cx="360" cy="250" rx="35" ry="15" fill="#42A5F5" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
  <ellipse cx="360" cy="250" rx="25" ry="10" fill="#64B5F6" opacity="0.4"/>
  
  <!-- Flowers along trail -->
  <circle cx="165" cy="255" r="4" fill="#E53935"/>
  <circle cx="165" cy="255" r="1.5" fill="#F9A825"/>
  <circle cx="245" cy="235" r="3" fill="#FF9800"/>
  <circle cx="245" cy="235" r="1" fill="#F9A825"/>
  <circle cx="440" cy="190" r="4" fill="#E040FB"/>
  <circle cx="440" cy="190" r="1.5" fill="#F9A825"/>
  <circle cx="395" cy="260" r="3" fill="#E53935"/>
  <circle cx="395" cy="260" r="1" fill="#F9A825"/>
  
  <!-- Grass tufts -->
  <line x1="200" y1="255" x2="197" y2="248" stroke="#43A047" stroke-width="1.5"/>
  <line x1="203" y1="255" x2="205" y2="247" stroke="#43A047" stroke-width="1.5"/>
  <line x1="290" y1="218" x2="287" y2="211" stroke="#66BB6A" stroke-width="1.5"/>
  <line x1="293" y1="218" x2="295" y2="210" stroke="#66BB6A" stroke-width="1.5"/>

  <!-- Binoculars (observation) -->
  <g transform="translate(420,220)">
    <circle cx="-5" cy="0" r="6" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <circle cx="5" cy="0" r="6" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <rect x="-2" y="-2" width="4" height="4" fill="#546E7A"/>
    <circle cx="-5" cy="0" r="2.5" fill="#B3E5FC"/>
    <circle cx="5" cy="0" r="2.5" fill="#B3E5FC"/>
  </g>

  <!-- Magnifying glass on flower -->
  <g transform="translate(195,262)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#757575" stroke-width="1.5"/>
    <line x1="6" y1="6" x2="14" y2="14" stroke="#757575" stroke-width="2.5"/>
    <!-- Small insect inside -->
    <circle cx="-2" cy="-1" r="1.5" fill="#5D4037"/>
    <line x1="-5" y1="-4" x2="-7" y2="-6" stroke="#5D4037" stroke-width="0.5"/>
    <line x1="1" y1="-4" x2="3" y2="-6" stroke="#5D4037" stroke-width="0.5"/>
  </g>

  <!-- Compass rose (bottom right corner) -->
  <g transform="translate(440,270)">
    <circle cx="0" cy="0" r="15" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
    <!-- N -->
    <polygon points="0,-12 -3,-2 0,-4 3,-2" fill="#C62828"/>
    <!-- S -->
    <polygon points="0,12 -3,2 0,4 3,2" fill="#757575"/>
    <!-- E -->
    <polygon points="12,0 2,-3 4,0 2,3" fill="#757575"/>
    <!-- W -->
    <polygon points="-12,0 -2,-3 -4,0 -2,3" fill="#757575"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#F9A825"/>
    <text x="0" y="-14" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <!-- Bird in sky -->
  <path d="M320,120 Q325,115 330,120" stroke="#5D4037" stroke-width="1" fill="none"/>
  <path d="M330,120 Q335,115 340,120" stroke="#5D4037" stroke-width="1" fill="none"/>
  <path d="M350,115 Q354,111 358,115" stroke="#5D4037" stroke-width="0.8" fill="none"/>
  <path d="M358,115 Q362,111 366,115" stroke="#5D4037" stroke-width="0.8" fill="none"/>

  <!-- Butterfly -->
  <g transform="translate(270,200)">
    <ellipse cx="-4" cy="-3" rx="4" ry="3" fill="#FF9800" opacity="0.7" transform="rotate(-20)"/>
    <ellipse cx="4" cy="-3" rx="4" ry="3" fill="#FF9800" opacity="0.7" transform="rotate(20)"/>
    <ellipse cx="-3" cy="2" rx="3" ry="2" fill="#FFB74D" opacity="0.7" transform="rotate(-10)"/>
    <ellipse cx="3" cy="2" rx="3" ry="2" fill="#FFB74D" opacity="0.7" transform="rotate(10)"/>
    <line x1="0" y1="-3" x2="0" y2="4" stroke="#5D4037" stroke-width="0.5"/>
  </g>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Экологическая тропа</text>
</svg>