<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Ордынское иго</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Tribute payment scene -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="210" height="200" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <!-- Steppe background -->
    <rect x="3" y="3" width="204" height="60" rx="4" fill="#FFF8E1" opacity="0.5"/>
    <!-- Yurt/ger -->
    <path d="M30,100 Q50,60 70,100" fill="#F5DEB3" stroke="#8D6E63" stroke-width="1"/>
    <rect x="25" y="100" width="50" height="5" fill="#8D6E63"/>
    <!-- Another yurt -->
    <path d="M140,105 Q155,70 170,105" fill="#DEB887" stroke="#8D6E63" stroke-width="1"/>
    <rect x="136" y="105" width="38" height="4" fill="#8D6E63"/>
    <!-- Golden Horde tax collector -->
    <g transform="translate(85,50)">
      <!-- Figure on horse -->
      <ellipse cx="25" cy="25" rx="18" ry="10" fill="#8D6E63"/>
      <path d="M43,18 Q48,12 46,20 Q48,22 43,24" fill="#8D6E63"/>
      <line x1="15" y1="33" x2="12" y2="50" stroke="#8D6E63" stroke-width="2.5"/>
      <line x1="22" y1="33" x2="19" y2="50" stroke="#8D6E63" stroke-width="2.5"/>
      <line x1="32" y1="33" x2="35" y2="50" stroke="#8D6E63" stroke-width="2.5"/>
      <line x1="37" y1="33" x2="40" y2="50" stroke="#8D6E63" stroke-width="2.5"/>
      <circle cx="22" cy="5" r="6" fill="#F9A825"/>
      <path d="M16,1 Q18,-5 22,-3 Q26,-5 28,1" fill="#C62828"/>
      <rect x="15" y="-1" width="14" height="4" rx="1" fill="#C62828"/>
      <rect x="17" y="11" width="10" height="16" rx="2" fill="#C62828"/>
    </g>
    <!-- Russian prince kneeling with tribute -->
    <g transform="translate(20,115)">
      <!-- Kneeling figure -->
      <circle cx="40" cy="5" r="6" fill="#F9A825"/>
      <!-- Prince hat -->
      <path d="M34,1 Q36,-3 40,-2 Q44,-3 46,1" fill="#2E7D32"/>
      <rect x="33" y="-1" width="14" height="3" rx="1" fill="#2E7D32"/>
      <!-- Kneeling body -->
      <rect x="34" y="11" width="12" height="12" rx="2" fill="#1565C0"/>
      <!-- Kneeling legs -->
      <rect x="32" y="23" width="16" height="5" rx="2" fill="#1565C0" opacity="0.7"/>
      <!-- Chest with gold -->
      <rect x="55" y="12" width="25" height="18" rx="2" fill="#F9A825" stroke="#8D6E63" stroke-width="1"/>
      <rect x="58" y="15" width="6" height="5" rx="1" fill="#FDD835"/>
      <rect x="67" y="15" width="6" height="5" rx="1" fill="#FDD835"/>
      <rect x="58" y="22" width="6" height="5" rx="1" fill="#FDD835"/>
      <rect x="67" y="22" width="6" height="5" rx="1" fill="#FDD835"/>
      <!-- Arms extended with tribute -->
      <line x1="46" y1="15" x2="55" y2="18" stroke="#F9A825" stroke-width="2"/>
      <!-- Coins spilling -->
      <circle cx="85" cy="25" r="2.5" fill="#F9A825"/>
      <circle cx="90" cy="28" r="2" fill="#F9A825"/>
      <circle cx="95" cy="25" r="2.5" fill="#F9A825"/>
      <circle cx="100" cy="27" r="2" fill="#F9A825"/>
    </g>
    <!-- Yarlyk (document) -->
    <g transform="translate(120,120)">
      <rect x="0" y="0" width="40" height="50" rx="2" fill="#FFF8E1" stroke="#8D6E63" stroke-width="1"/>
      <!-- Tatar-Mongol seal -->
      <circle cx="20" cy="10" r="8" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="0.5"/>
      <text x="20" y="13" font-family="serif" font-size="8" fill="#C62828" text-anchor="middle">R</text>
      <!-- Document text lines -->
      <line x1="6" y1="25" x2="34" y2="25" stroke="#8D6E63" stroke-width="0.4"/>
      <line x1="6" y1="30" x2="34" y2="30" stroke="#8D6E63" stroke-width="0.4"/>
      <line x1="6" y1="35" x2="34" y2="35" stroke="#8D6E63" stroke-width="0.4"/>
      <line x1="6" y1="40" x2="34" y2="40" stroke="#8D6E63" stroke-width="0.4"/>
    </g>
    <text x="140" y="178" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63" text-anchor="middle">Ярлык на княжение</text>
    <!-- Labels -->
    <text x="105" y="190" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Выплата дани (ордынский выход)</text>
  </g>

  <!-- Yoke symbolism and consequences -->
  <g transform="translate(255,88)">
    <rect x="0" y="0" width="215" height="200" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="107" y="16" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Последствия ига</text>
    <line x1="15" y1="22" x2="200" y2="22" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>

    <!-- Yoke visual -->
    <g transform="translate(10,30)">
      <!-- Wooden yoke shape -->
      <path d="M20,10 Q60,-10 100,10" fill="none" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
      <!-- Chains hanging -->
      <line x1="30" y1="12" x2="30" y2="40" stroke="#888" stroke-width="1.5"/>
      <line x1="90" y1="12" x2="90" y2="40" stroke="#888" stroke-width="1.5"/>
      <!-- Chain links -->
      <ellipse cx="30" cy="20" rx="3" ry="4" fill="none" stroke="#888" stroke-width="0.8"/>
      <ellipse cx="30" cy="28" rx="3" ry="4" fill="none" stroke="#888" stroke-width="0.8"/>
      <ellipse cx="30" cy="36" rx="3" ry="4" fill="none" stroke="#888" stroke-width="0.8"/>
      <ellipse cx="90" cy="20" rx="3" ry="4" fill="none" stroke="#888" stroke-width="0.8"/>
      <ellipse cx="90" cy="28" rx="3" ry="4" fill="none" stroke="#888" stroke-width="0.8"/>
      <ellipse cx="90" cy="36" rx="3" ry="4" fill="none" stroke="#888" stroke-width="0.8"/>
    </g>

    <!-- Consequence cards -->
    <rect x="10" y="80" width="95" height="22" rx="3" fill="#C62828" opacity="0.08"/>
    <text x="14" y="91" font-family="Arial,sans-serif" font-size="6" fill="#333" font-weight="bold">Экономический</text>
    <text x="14" y="99" font-family="Arial,sans-serif" font-size="6" fill="#666">упадок ремесел и торговли</text>

    <rect x="110" y="80" width="95" height="22" rx="3" fill="#1565C0" opacity="0.08"/>
    <text x="114" y="91" font-family="Arial,sans-serif" font-size="6" fill="#333" font-weight="bold">Демографический</text>
    <text x="114" y="99" font-family="Arial,sans-serif" font-size="6" fill="#666">массовая гибель людей</text>

    <rect x="10" y="108" width="95" height="22" rx="3" fill="#2E7D32" opacity="0.08"/>
    <text x="14" y="119" font-family="Arial,sans-serif" font-size="6" fill="#333" font-weight="bold">Культурный</text>
    <text x="14" y="127" font-family="Arial,sans-serif" font-size="6" fill="#666">уничтожение памятников</text>

    <rect x="110" y="108" width="95" height="22" rx="3" fill="#F9A825" opacity="0.08"/>
    <text x="114" y="119" font-family="Arial,sans-serif" font-size="6" fill="#333" font-weight="bold">Политический</text>
    <text x="114" y="127" font-family="Arial,sans-serif" font-size="6" fill="#666">зависимость от Золотой Орды</text>

    <!-- Duration -->
    <rect x="25" y="140" width="165" height="50" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
    <text x="107" y="157" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">240 лет зависимости</text>
    <text x="107" y="170" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1240 - 1480 гг.</text>
    <text x="107" y="182" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Стояние на реке Угре (1480)</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Ордынское иго</text>
</svg>