<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Монгольское завоевание</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Mongol warriors on horses -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="220" height="200" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <!-- Sky with smoke -->
    <rect x="3" y="3" width="214" height="50" rx="4" fill="#FFCDD2" opacity="0.3"/>
    <!-- Smoke clouds -->
    <ellipse cx="50" cy="25" rx="25" ry="12" fill="#795548" opacity="0.15"/>
    <ellipse cx="120" cy="20" rx="30" ry="15" fill="#795548" opacity="0.12"/>
    <ellipse cx="180" cy="28" rx="20" ry="10" fill="#795548" opacity="0.15"/>
    <!-- Steppes/ground -->
    <rect x="0" y="140" width="220" height="60" fill="#A5D6A7" opacity="0.2" rx="0"/>
    <!-- Horse 1 (lead) -->
    <g transform="translate(20,80)">
      <!-- Horse body -->
      <ellipse cx="40" cy="30" rx="25" ry="12" fill="#8D6E63"/>
      <!-- Horse head -->
      <path d="M65,22 Q72,15 70,25 Q72,28 65,30" fill="#8D6E63"/>
      <circle cx="70" cy="18" r="1" fill="#333"/>
      <!-- Horse legs -->
      <line x1="25" y1="40" x2="22" y2="60" stroke="#8D6E63" stroke-width="3"/>
      <line x1="35" y1="40" x2="32" y2="60" stroke="#8D6E63" stroke-width="3"/>
      <line x1="48" y1="40" x2="52" y2="60" stroke="#8D6E63" stroke-width="3"/>
      <line x1="55" y1="40" x2="58" y2="60" stroke="#8D6E63" stroke-width="3"/>
      <!-- Tail -->
      <path d="M15,25 Q5,20 8,35" stroke="#5D4037" stroke-width="2" fill="none"/>
      <!-- Mane -->
      <path d="M60,22 Q55,15 58,10" stroke="#5D4037" stroke-width="2" fill="none"/>
      <!-- Rider -->
      <circle cx="38" cy="10" r="6" fill="#F9A825"/>
      <!-- Fur hat -->
      <path d="M32,6 Q34,-2 38,0 Q42,-2 44,6" fill="#8D6E63"/>
      <rect x="31" y="4" width="14" height="4" rx="1" fill="#8D6E63"/>
      <!-- Rider body -->
      <rect x="32" y="16" width="12" height="18" rx="2" fill="#5D4037"/>
      <!-- Bow -->
      <path d="M48,15 Q55,20 48,28" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
      <line x1="48" y1="15" x2="48" y2="28" stroke="#CCC" stroke-width="0.5"/>
    </g>
    <!-- Horse 2 -->
    <g transform="translate(90,85)">
      <ellipse cx="35" cy="28" rx="22" ry="11" fill="#A1887F"/>
      <path d="M57,20 Q63,14 61,23 Q63,26 57,28" fill="#A1887F"/>
      <circle cx="62" cy="17" r="1" fill="#333"/>
      <line x1="22" y1="37" x2="19" y2="55" stroke="#A1887F" stroke-width="2.5"/>
      <line x1="30" y1="37" x2="27" y2="55" stroke="#A1887F" stroke-width="2.5"/>
      <line x1="42" y1="37" x2="45" y2="55" stroke="#A1887F" stroke-width="2.5"/>
      <line x1="48" y1="37" x2="51" y2="55" stroke="#A1887F" stroke-width="2.5"/>
      <path d="M13,23 Q5,18 7,30" stroke="#795548" stroke-width="1.5" fill="none"/>
      <circle cx="33" cy="9" r="5" fill="#F9A825"/>
      <path d="M28,5 Q30,-1 33,1 Q36,-1 38,5" fill="#8D6E63"/>
      <rect x="28" y="3" width="10" height="3" rx="1" fill="#8D6E63"/>
      <rect x="27" y="14" width="10" height="16" rx="2" fill="#5D4037"/>
    </g>
    <!-- Horse 3 -->
    <g transform="translate(155,90)">
      <ellipse cx="30" cy="25" rx="20" ry="10" fill="#6D4C41"/>
      <path d="M50,18 Q55,13 53,21 Q55,23 50,25" fill="#6D4C41"/>
      <circle cx="54" cy="16" r="1" fill="#333"/>
      <line x1="18" y1="33" x2="15" y2="50" stroke="#6D4C41" stroke-width="2"/>
      <line x1="25" y1="33" x2="22" y2="50" stroke="#6D4C41" stroke-width="2"/>
      <line x1="36" y1="33" x2="39" y2="50" stroke="#6D4C41" stroke-width="2"/>
      <line x1="42" y1="33" x2="45" y2="50" stroke="#6D4C41" stroke-width="2"/>
      <circle cx="28" cy="8" r="4.5" fill="#F9A825"/>
      <path d="M24,5 Q25,-1 28,0 Q31,-1 32,5" fill="#8D6E63"/>
      <rect x="23" y="12" width="9" height="14" rx="2" fill="#5D4037"/>
    </g>
    <!-- Arrows flying -->
    <line x1="70" y1="60" x2="30" y2="55" stroke="#5D4037" stroke-width="1"/>
    <polygon points="30,55 35,52 33,58" fill="#5D4037"/>
    <line x1="150" y1="65" x2="110" y2="60" stroke="#5D4037" stroke-width="1"/>
    <polygon points="110,60 115,57 113,63" fill="#5D4037"/>
    <!-- Fire on horizon -->
    <ellipse cx="190" cy="135" rx="15" ry="20" fill="#FF5722" opacity="0.3"/>
    <ellipse cx="190" cy="130" rx="10" ry="15" fill="#FF9800" opacity="0.3"/>
    <ellipse cx="190" cy="128" rx="5" ry="10" fill="#FFC107" opacity="0.4"/>
    <!-- Dust clouds from horses -->
    <ellipse cx="30" cy="155" rx="20" ry="8" fill="#A1887F" opacity="0.2"/>
    <ellipse cx="110" cy="155" rx="18" ry="7" fill="#A1887F" opacity="0.2"/>
    <ellipse cx="175" cy="155" rx="15" ry="6" fill="#A1887F" opacity="0.2"/>
    <text x="110" y="180" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Монгольская конница Батыя</text>
    <text x="110" y="192" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">1237-1240 гг.</text>
  </g>

  <!-- Invasion timeline map -->
  <g transform="translate(265,88)">
    <rect x="0" y="0" width="205" height="200" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <text x="102" y="16" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Ход завоевания</text>
    <!-- Timeline vertical -->
    <line x1="35" y1="28" x2="35" y2="185" stroke="#C62828" stroke-width="1.5"/>
    <!-- Events -->
    <circle cx="35" cy="35" r="4" fill="#C62828"/>
    <text x="48" y="33" font-family="Arial,sans-serif" font-size="7" fill="#333">1237 - Рязань пала</text>
    <text x="48" y="42" font-family="Arial,sans-serif" font-size="6" fill="#888">первый город</text>

    <circle cx="35" cy="58" r="4" fill="#C62828"/>
    <text x="48" y="56" font-family="Arial,sans-serif" font-size="7" fill="#333">1237 - Коломна, Москва</text>
    <text x="48" y="65" font-family="Arial,sans-serif" font-size="6" fill="#888">разрушены</text>

    <circle cx="35" cy="81" r="4" fill="#C62828"/>
    <text x="48" y="79" font-family="Arial,sans-serif" font-size="7" fill="#333">1238 - Владимир</text>
    <text x="48" y="88" font-family="Arial,sans-serif" font-size="6" fill="#888">взят и сожжен</text>

    <circle cx="35" cy="104" r="4" fill="#F9A825"/>
    <text x="48" y="102" font-family="Arial,sans-serif" font-size="7" fill="#333">1238 - Битва на р. Сить</text>
    <text x="48" y="111" font-family="Arial,sans-serif" font-size="6" fill="#888">Юрий Всеволодович</text>

    <circle cx="35" cy="127" r="4" fill="#C62828"/>
    <text x="48" y="125" font-family="Arial,sans-serif" font-size="7" fill="#333">1238 - Торжок</text>
    <text x="48" y="134" font-family="Arial,sans-serif" font-size="6" fill="#888">осада 2 недели</text>

    <circle cx="35" cy="150" r="4" fill="#2E7D32"/>
    <text x="48" y="148" font-family="Arial,sans-serif" font-size="7" fill="#333">1240 - Киев</text>
    <text x="48" y="157" font-family="Arial,sans-serif" font-size="6" fill="#888">разрушен Батыем</text>

    <circle cx="35" cy="173" r="4" fill="#1565C0"/>
    <text x="48" y="171" font-family="Arial,sans-serif" font-size="7" fill="#333">1241 - Поход в Европу</text>
    <text x="48" y="180" font-family="Arial,sans-serif" font-size="6" fill="#888">до Адриатики</text>

    <!-- Key numbers -->
    <rect x="140" y="30" width="55" height="45" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
    <text x="167" y="45" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Потери Руси</text>
    <text x="167" y="57" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">14 городов</text>
    <text x="167" y="67" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">полностью</text>
    <text x="167" y="77" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">уничтожены</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Монгольское завоевание</text>
</svg>