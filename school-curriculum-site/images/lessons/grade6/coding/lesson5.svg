<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Переменные</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Основы программирования - Урок 5</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>
<!-- Variable box 1: score -->
<g transform="translate(60,100)">
  <rect x="0" y="0" width="130" height="50" rx="6" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
  <rect x="5" y="5" width="120" height="20" rx="3" fill="#FFB300"/>
  <text x="65" y="19" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">счёт</text>
  <rect x="5" y="28" width="120" height="17" rx="3" fill="white"/>
  <text x="65" y="41" font-family="Arial,sans-serif" font-size="13" fill="#E65100" text-anchor="middle" font-weight="bold">0</text>
</g>
<!-- Variable box 2: speed -->
<g transform="translate(60,170)">
  <rect x="0" y="0" width="130" height="50" rx="6" fill="#C62828" stroke="#8E0000" stroke-width="1.5"/>
  <rect x="5" y="5" width="120" height="20" rx="3" fill="#E53935"/>
  <text x="65" y="19" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">скорость</text>
  <rect x="5" y="28" width="120" height="17" rx="3" fill="white"/>
  <text x="65" y="41" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">5</text>
</g>
<!-- Variable box 3: lives -->
<g transform="translate(60,240)">
  <rect x="0" y="0" width="130" height="50" rx="6" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <rect x="5" y="5" width="120" height="20" rx="3" fill="#43A047"/>
  <text x="65" y="19" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">жизни</text>
  <rect x="5" y="28" width="120" height="17" rx="3" fill="white"/>
  <text x="65" y="41" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">3</text>
</g>
<!-- Code blocks on right side -->
<rect x="230" y="92" width="245" height="200" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
<text x="352" y="110" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Работа с переменными</text>
<line x1="245" y1="117" x2="460" y2="117" stroke="#90CAF9" stroke-width="0.8"/>
<!-- Set variable block -->
<rect x="245" y="125" width="210" height="24" rx="4" fill="#FF8F00" stroke="#E65100" stroke-width="0.8"/>
<polygon points="245,125 253,125 245,133" fill="#FF8F00"/>
<text x="352" y="141" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">установи счёт в 0</text>
<!-- Change variable block -->
<rect x="245" y="158" width="210" height="24" rx="4" fill="#FF8F00" stroke="#E65100" stroke-width="0.8"/>
<polygon points="245,158 253,158 245,166" fill="#FF8F00"/>
<text x="352" y="174" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">добавь к счёту 1</text>
<!-- Show variable block -->
<rect x="245" y="191" width="210" height="24" rx="4" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
<polygon points="245,191 253,191 245,199" fill="#9C27B0"/>
<text x="352" y="207" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">покажи переменную счёт</text>
<!-- Motion using variable -->
<rect x="245" y="224" width="210" height="24" rx="4" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<polygon points="245,224 253,224 245,232" fill="#4FC3F7"/>
<text x="352" y="240" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">сдвинься на (скорость)</text>
<!-- Arrow connecting boxes to blocks -->
<path d="M192,125 L230,137" fill="none" stroke="#FF8F00" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>
<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><polygon points="0,0 6,3 0,6" fill="#FF8F00"/></marker></defs>
<text x="25" y="155" font-family="Arial,sans-serif" font-size="22" fill="#C62828" opacity="0.08" font-weight="bold" transform="rotate(-90,25,155)">x = 5</text>
