<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Положительные и отрицательные числа</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Number line with positive and negative -->
  <rect x="20" y="88" width="460" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Числовой луч: положительные и отрицательные</text>
  <line x1="28" y1="108" x2="472" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Number line -->
  <line x1="40" y1="145" x2="460" y2="145" stroke="#555" stroke-width="1.5"/>
  <!-- Arrow heads -->
  <polygon points="460,145 453,141 453,149" fill="#555"/>
  <polygon points="40,145 47,141 47,149" fill="#555"/>
  <!-- Tick marks and numbers -->
  <!-- Negative side (red) -->
  <line x1="60" y1="140" x2="60" y2="150" stroke="#C62828" stroke-width="1.5"/>
  <text x="60" y="165" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">-4</text>
  <line x1="120" y1="140" x2="120" y2="150" stroke="#C62828" stroke-width="1.5"/>
  <text x="120" y="165" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">-3</text>
  <line x1="180" y1="140" x2="180" y2="150" stroke="#C62828" stroke-width="1.5"/>
  <text x="180" y="165" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">-2</text>
  <line x1="240" y1="140" x2="240" y2="150" stroke="#C62828" stroke-width="1.5"/>
  <text x="240" y="165" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">-1</text>
  <!-- Zero -->
  <circle cx="250" cy="145" r="5" fill="#F9A825" opacity="0.3" stroke="#F9A825" stroke-width="1.5"/>
  <text x="250" y="165" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">0</text>
  <!-- Positive side (blue) -->
  <line x1="300" y1="140" x2="300" y2="150" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="300" y="165" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">+1</text>
  <line x1="350" y1="140" x2="350" y2="150" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="350" y="165" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">+2</text>
  <line x1="400" y1="140" x2="400" y2="150" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="400" y="165" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">+3</text>
  <line x1="440" y1="140" x2="440" y2="150" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="440" y="165" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">+4</text>
  <!-- Color zones -->
  <rect x="42" y="118" width="205" height="22" rx="3" fill="#C62828" opacity="0.05"/>
  <text x="145" y="133" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Отрицательные числа</text>
  <rect x="252" y="118" width="205" height="22" rx="3" fill="#2E7D32" opacity="0.05"/>
  <text x="355" y="133" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Положительные числа</text>

  <!-- Card 2: Thermometer analogy -->
  <rect x="20" y="196" width="140" height="103" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="90" y="212" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Термометр</text>
  <line x1="28" y1="216" x2="152" y2="216" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Thermometer body -->
  <rect x="72" y="222" width="16" height="68" rx="8" fill="#E0E0E0" stroke="#999" stroke-width="1"/>
  <circle cx="80" cy="288" r="10" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="1"/>
  <!-- Mercury -->
  <rect x="75" y="255" width="10" height="25" rx="5" fill="#C62828" opacity="0.5"/>
  <!-- Scale marks -->
  <line x1="88" y1="230" x2="95" y2="230" stroke="#555" stroke-width="0.5"/>
  <text x="100" y="234" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+20</text>
  <line x1="88" y1="245" x2="95" y2="245" stroke="#555" stroke-width="0.5"/>
  <text x="100" y="249" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+10</text>
  <line x1="88" y1="260" x2="95" y2="260" stroke="#555" stroke-width="0.5"/>
  <text x="100" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" font-weight="bold">0</text>
  <line x1="88" y1="275" x2="95" y2="275" stroke="#555" stroke-width="0.5"/>
  <text x="100" y="279" font-family="Arial,sans-serif" font-size="7" fill="#C62828">-10</text>
  <text x="80" y="295" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">-5 C</text>

  <!-- Card 3: Opposite numbers -->
  <rect x="168" y="196" width="155" height="103" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="245" y="212" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Противоположные числа</text>
  <line x1="176" y1="216" x2="315" y2="216" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Pairs of opposite numbers -->
  <rect x="180" y="222" width="48" height="18" rx="3" fill="#1565C0" opacity="0.12"/>
  <text x="204" y="235" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">+3</text>
  <text x="240" y="235" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">~</text>
  <rect x="252" y="222" width="48" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="276" y="235" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">-3</text>
  <rect x="180" y="246" width="48" height="18" rx="3" fill="#1565C0" opacity="0.12"/>
  <text x="204" y="259" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">+7</text>
  <text x="240" y="259" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">~</text>
  <rect x="252" y="246" width="48" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="276" y="259" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">-7</text>
  <rect x="180" y="270" width="48" height="18" rx="3" fill="#1565C0" opacity="0.12"/>
  <text x="204" y="283" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">+5</text>
  <text x="240" y="283" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">~</text>
  <rect x="252" y="270" width="48" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="276" y="283" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">-5</text>
  <text x="245" y="296" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Сумма = 0</text>

  <!-- Card 4: Modulus -->
  <rect x="331" y="196" width="150" height="103" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="406" y="212" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Модуль числа</text>
  <line x1="339" y1="216" x2="473" y2="216" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Module examples -->
  <rect x="345" y="224" width="120" height="20" rx="4" fill="#F9A825" opacity="0.08"/>
  <text x="405" y="238" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">|+5| = 5</text>
  <rect x="345" y="250" width="120" height="20" rx="4" fill="#F9A825" opacity="0.08"/>
  <text x="405" y="264" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">|-5| = 5</text>
  <rect x="345" y="276" width="120" height="20" rx="4" fill="#F9A825" opacity="0.08"/>
  <text x="405" y="290" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">|0| = 0</text>
  <text x="406" y="296" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Расстояние от нуля</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Положительные и отрицательные числа</text>
</svg>