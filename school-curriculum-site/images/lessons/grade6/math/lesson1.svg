<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Делители и кратные</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Division visualization - 12 divisors -->
  <rect x="20" y="88" width="145" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="92" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Делители числа 12</text>
  <line x1="28" y1="108" x2="157" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- 12 as dots in groups -->
  <circle cx="38" cy="122" r="3.5" fill="#C62828"/><circle cx="50" cy="122" r="3.5" fill="#C62828"/><circle cx="62" cy="122" r="3.5" fill="#C62828"/>
  <circle cx="74" cy="122" r="3.5" fill="#1565C0"/><circle cx="86" cy="122" r="3.5" fill="#1565C0"/><circle cx="98" cy="122" r="3.5" fill="#1565C0"/>
  <circle cx="110" cy="122" r="3.5" fill="#2E7D32"/><circle cx="122" cy="122" r="3.5" fill="#2E7D32"/><circle cx="134" cy="122" r="3.5" fill="#2E7D32"/>
  <circle cx="146" cy="122" r="3.5" fill="#F9A825"/>
  <text x="92" y="140" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1, 2, 3, 4, 6, 12</text>
  <text x="92" y="155" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">12 : 4 = 3 (4 - делитель)</text>
  <rect x="35" y="162" width="115" height="20" rx="3" fill="#1565C0" opacity="0.08"/>
  <text x="92" y="176" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">6 делителей всего</text>

  <!-- Card 2: Factor tree diagram -->
  <rect x="178" y="88" width="145" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="104" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Дерево делителей 24</text>
  <line x1="186" y1="108" x2="315" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Tree: 24 splits into 4 and 6, then 4->2,2 and 6->2,3 -->
  <rect x="232" y="112" width="36" height="18" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="250" y="125" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">24</text>
  <line x1="240" y1="130" x2="210" y2="142" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="260" y1="130" x2="290" y2="142" stroke="#2E7D32" stroke-width="1.2"/>
  <rect x="193" y="142" width="30" height="16" rx="3" fill="#1565C0" opacity="0.12"/>
  <text x="208" y="154" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">4</text>
  <rect x="275" y="142" width="30" height="16" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="290" y="154" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle">6</text>
  <line x1="200" y1="158" x2="193" y2="170" stroke="#1565C0" stroke-width="1"/>
  <line x1="216" y1="158" x2="222" y2="170" stroke="#1565C0" stroke-width="1"/>
  <line x1="282" y1="158" x2="275" y2="170" stroke="#C62828" stroke-width="1"/>
  <line x1="298" y1="158" x2="305" y2="170" stroke="#C62828" stroke-width="1"/>
  <rect x="182" y="170" width="22" height="14" rx="2" fill="#1565C0" opacity="0.1"/>
  <text x="193" y="181" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">2</text>
  <rect x="211" y="170" width="22" height="14" rx="2" fill="#1565C0" opacity="0.1"/>
  <text x="222" y="181" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">2</text>
  <rect x="264" y="170" width="22" height="14" rx="2" fill="#C62828" opacity="0.1"/>
  <text x="275" y="181" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">2</text>
  <rect x="294" y="170" width="22" height="14" rx="2" fill="#C62828" opacity="0.1"/>
  <text x="305" y="181" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">3</text>

  <!-- Card 3: Multiples as number sequence -->
  <rect x="336" y="88" width="145" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="408" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Кратные числа 5</text>
  <line x1="344" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Number sequence boxes -->
  <rect x="345" y="114" width="26" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="358" y="127" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">5</text>
  <rect x="376" y="114" width="26" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="389" y="127" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">10</text>
  <rect x="407" y="114" width="26" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="420" y="127" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">15</text>
  <rect x="438" y="114" width="26" height="18" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="451" y="127" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">20</text>
  <!-- Arrows -->
  <line x1="372" y1="123" x2="376" y2="123" stroke="#C62828" stroke-width="1" marker-end="none"/>
  <line x1="403" y1="123" x2="407" y2="123" stroke="#C62828" stroke-width="1"/>
  <line x1="434" y1="123" x2="438" y2="123" stroke="#C62828" stroke-width="1"/>
  <text x="358" y="148" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">+5</text>
  <text x="389" y="148" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">+5</text>
  <text x="420" y="148" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">+5</text>
  <text x="408" y="168" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">5, 10, 15, 20, 25 ...</text>
  <text x="408" y="181" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Бесконечный ряд</text>

  <!-- Card 4: Visual explanation -->
  <rect x="20" y="196" width="460" height="100" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="250" y="214" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Сравнение: Делитель vs Кратное</text>
  <line x1="28" y1="218" x2="472" y2="218" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Divisor side -->
  <rect x="35" y="225" width="210" height="60" rx="4" fill="#1565C0" opacity="0.06"/>
  <text x="140" y="242" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Делитель</text>
  <text x="140" y="258" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Число, на которое</text>
  <text x="140" y="270" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">делится данное число без остатка</text>
  <text x="140" y="283" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">d | a  (d делит a)</text>
  <!-- Multiple side -->
  <rect x="255" y="225" width="210" height="60" rx="4" fill="#C62828" opacity="0.06"/>
  <text x="360" y="242" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">Кратное</text>
  <text x="360" y="258" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Результат умножения</text>
  <text x="360" y="270" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">числа на целое число</text>
  <text x="360" y="283" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">a = k * n  (k - кратное)</text>
  <!-- VS divider -->
  <line x1="247" y1="228" x2="247" y2="282" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Делители и кратные</text>
</svg>