<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Пропорции</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Cross multiplication visualization -->
  <rect x="20" y="88" width="225" height="120" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="132" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Основное свойство пропорции</text>
  <line x1="28" y1="108" x2="237" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Proportion: 2/3 = 4/6 -->
  <text x="55" y="132" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">2</text>
  <line x1="38" y1="136" x2="72" y2="136" stroke="#1565C0" stroke-width="1.5"/>
  <text x="55" y="150" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">3</text>
  <text x="132" y="142" font-family="Arial,sans-serif" font-size="16" fill="#555" text-anchor="middle">=</text>
  <text x="190" y="132" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">4</text>
  <line x1="173" y1="136" x2="207" y2="136" stroke="#C62828" stroke-width="1.5"/>
  <text x="190" y="150" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">6</text>
  <!-- Cross multiplication arrows -->
  <line x1="45" y1="118" x2="200" y2="155" stroke="#F9A825" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="118" x2="45" y2="155" stroke="#F9A825" stroke-width="2" opacity="0.6"/>
  <!-- Result -->
  <rect x="35" y="163" width="195" height="18" rx="3" fill="#F9A825" opacity="0.1"/>
  <text x="132" y="176" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">2 x 6 = 3 x 4 => 12 = 12</text>
  <!-- Rule -->
  <text x="132" y="200" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">a/b = c/d => a x d = b x c</text>

  <!-- Card 2: Golden ratio -->
  <rect x="253" y="88" width="228" height="120" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="367" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Золотое сечение</text>
  <line x1="261" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Golden rectangle -->
  <rect x="275" y="118" width="160" height="80" rx="2" fill="#C62828" opacity="0.08" stroke="#C62828" stroke-width="1.5"/>
  <!-- Golden ratio division -->
  <rect x="275" y="118" width="99" height="80" rx="2" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="1"/>
  <!-- Spiral hint -->
  <path d="M275,198 Q275,118 355,118" fill="none" stroke="#F9A825" stroke-width="1.5" opacity="0.5"/>
  <text x="325" y="162" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">a</text>
  <text x="407" y="162" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">b</text>
  <!-- Formula -->
  <rect x="285" y="200" width="165" height="16" rx="3" fill="#F9A825" opacity="0.1"/>
  <text x="367" y="212" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="middle" font-weight="bold">a/b = (a+b)/a ~ 1,618</text>

  <!-- Card 3: Scale and maps -->
  <rect x="20" y="215" width="460" height="84" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="233" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Масштаб и пропорции в жизни</text>
  <line x1="28" y1="237" x2="472" y2="237" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Scale example -->
  <rect x="35" y="244" width="200" height="48" rx="4" fill="#2E7D32" opacity="0.04"/>
  <text x="135" y="258" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Масштаб карты</text>
  <text x="135" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1 : 100 000</text>
  <text x="135" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">1 см на карте = 1 км на местности</text>
  <!-- Recipe example -->
  <rect x="255" y="244" width="210" height="48" rx="4" fill="#F9A825" opacity="0.04"/>
  <text x="360" y="258" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="middle" font-weight="bold">Рецепт (пропорция)</text>
  <text x="360" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">2 стакана муки - 6 блинов</text>
  <text x="360" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">3 стакана муки - 9 блинов</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Пропорции</text>
</svg>