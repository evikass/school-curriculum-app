  <text x="47" y="142" font-family="Arial,sans-serif" font-size="11" fill="#F57F17" text-anchor="middle" font-weight="bold">H</text>
  <rect x="238" y="130" width="25" height="22" rx="2" fill="#E1F5FE" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="250" y="142" font-family="Arial,sans-serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">He</text>
  <!-- Row 2: Li, Be, B, C, N, O -->
  <rect x="35" y="155" width="25" height="22" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="47" y="167" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Li</text>
  <rect x="63" y="155" width="25" height="22" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="75" y="167" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Be</text>
  <rect x="174" y="155" width="25" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="186" y="167" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">B</text>
  <rect x="202" y="155" width="25" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="214" y="167" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">C</text>
  <rect x="230" y="155" width="25" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="242" y="167" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">N</text>
  <rect x="258" y="155" width="10" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <!-- Row 3: Na, Mg, Al, Si, P, S -->
  <rect x="35" y="180" width="25" height="22" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="47" y="192" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Na</text>
  <rect x="63" y="180" width="25" height="22" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="75" y="192" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Mg</text>
  <rect x="174" y="180" width="25" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="186" y="192" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Al</text>
  <rect x="202" y="180" width="25" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="214" y="192" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Si</text>
  <rect x="230" y="180" width="25" height="22" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="242" y="192" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">P</text>

  <!-- Fe, Cu highlighted -->
  <rect x="35" y="205" width="25" height="10" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>

  <!-- Element cards -->
  <rect x="285" y="88" width="60" height="60" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <text x="315" y="108" font-family="Arial,sans-serif" font-size="20" fill="#F57F17" text-anchor="middle" font-weight="bold">H</text>
  <text x="315" y="120" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Водород</text>
  <text x="315" y="130" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">Z = 1</text>
  <circle cx="315" cy="142" r="4" fill="#F57F17" opacity="0.3"/>

  <rect x="352" y="88" width="60" height="60" rx="4" fill="#E1F5FE" stroke="#7B1FA2" stroke-width="2"/>
  <text x="382" y="108" font-family="Arial,sans-serif" font-size="18" fill="#7B1FA2" text-anchor="middle" font-weight="bold">He</text>
  <text x="382" y="120" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Гелий</text>
  <text x="382" y="130" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">Z = 2</text>
  <circle cx="382" cy="142" r="4" fill="#7B1FA2" opacity="0.3"/>

  <rect x="420" y="88" width="60" height="60" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="450" y="108" font-family="Arial,sans-serif" font-size="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">C</text>
  <text x="450" y="120" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Углерод</text>
  <text x="450" y="130" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">Z = 6</text>
  <circle cx="450" cy="142" r="4" fill="#2E7D32" opacity="0.3"/>

  <!-- Element cards row 2 -->
  <rect x="285" y="155" width="60" height="60" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="315" y="175" font-family="Arial,sans-serif" font-size="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">N</text>
  <text x="315" y="187" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Азот</text>
  <text x="315" y="197" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">Z = 7</text>
  <circle cx="315" cy="209" r="4" fill="#2E7D32" opacity="0.3"/>

  <rect x="352" y="155" width="60" height="60" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="382" y="175" font-family="Arial,sans-serif" font-size="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">O</text>
  <text x="382" y="187" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Кислород</text>
  <text x="382" y="197" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">Z = 8</text>
  <circle cx="382" cy="209" r="4" fill="#2E7D32" opacity="0.3"/>

  <rect x="420" y="155" width="60" height="60" rx="4" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
  <text x="450" y="175" font-family="Arial,sans-serif" font-size="18" fill="#E65100" text-anchor="middle" font-weight="bold">Fe</text>
  <text x="450" y="187" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Железо</text>
  <text x="450" y="197" font-family="Arial,sans-serif" font-size="7" fill="#aaa" text-anchor="middle">Z = 26</text>
  <circle cx="450" cy="209" r="4" fill="#E65100" opacity="0.3"/>

  <!-- Bottom: Element objects -->
  <rect x="25" y="225" width="455" height="75" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="250" y="240" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Вещества, состоящие из разных элементов</text>

  <!-- Gold bar -->
  <rect x="40" y="250" width="60" height="35" rx="4" fill="url(#goldG)" stroke="#F57F17" stroke-width="1.5"/>
  <polygon points="42,252 42,258 52,262 42,266 42,272 52,276 42,280 42,283 98,283 98,280 88,276 98,272 98,266 88,262 98,258 98,252" fill="none" stroke="#F57F17" stroke-width="0.5" opacity="0.4"/>
  <text x="70" y="295" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Золото (Au)</text>

  <!-- Copper wire -->
  <path d="M140,260 Q155,250 170,260 Q185,270 200,260" fill="none" stroke="url(#copperG)" stroke-width="5" stroke-linecap="round"/>
  <text x="170" y="280" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Медь (Cu)</text>

  <!-- Coal/carbon -->
  <ellipse cx="260" cy="268" rx="25" ry="18" fill="#424242" stroke="#212121" stroke-width="1.5"/>
  <ellipse cx="252" cy="262" rx="8" ry="5" fill="#616161" opacity="0.4"/>
  <ellipse cx="268" cy="272" rx="6" ry="4" fill="#616161" opacity="0.3"/>
  <text x="260" y="295" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Уголь (C)</text>

  <!-- Iron nail -->
  <rect x="310" y="250" width="8" height="35" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <polygon points="314,250 306,260 322,260" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <text x="314" y="295" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Железо (Fe)</text>

  <!-- Sulfur -->
  <polygon points="390,250 405,245 420,250 425,265 415,280 395,280 385,265" fill="#FFEE58" stroke="#F9A825" stroke-width="1.5"/>
  <text x="405" y="295" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Сера (S)</text>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химические элементы</text>
</svg>