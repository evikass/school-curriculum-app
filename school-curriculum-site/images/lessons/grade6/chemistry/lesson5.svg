<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="copperG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Химические элементы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Mini periodic table -->
  <rect x="25" y="88" width="250" height="130" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="150" y="103" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Фрагмент таблицы Менделеева</text>
  <!-- Table header -->
  <rect x="35" y="108" width="25" height="18" rx="2" fill="#E8EAF6"/>
  <text x="47" y="121" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">1</text>
  <rect x="63" y="108" width="25" height="18" rx="2" fill="#E8EAF6"/>
  <text x="75" y="121" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">2</text>
  <rect x="91" y="108" width="80" height="18" rx="2" fill="#FCE4EC"/>
  <text x="131" y="121" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">3-12</text>
  <rect x="174" y="108" width="25" height="18" rx="2" fill="#E8F5E9"/>
  <text x="186" y="121" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">13</text>
  <rect x="202" y="108" width="25" height="18" rx="2" fill="#E8F5E9"/>
  <text x="214" y="121" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">14</text>
  <rect x="230" y="108" width="25" height="18" rx="2" fill="#E8F5E9"/>
  <text x="242" y="121" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">15</text>
  <!-- Row 1: H, He -->
