<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Блоки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Fixed pulley -->
  <rect x="35" y="95" width="130" height="195" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="100" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Неподвижный блок</text>
  <!-- Support beam -->
  <rect x="50" y="120" width="100" height="6" rx="2" fill="#8D6E63"/>
  <line x1="100" y1="126" x2="100" y2="140" stroke="#5D4037" stroke-width="2"/>
  <!-- Pulley wheel -->
  <circle cx="100" cy="148" r="15" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="100" cy="148" r="12" fill="none" stroke="#78909C" stroke-width="1"/>
  <circle cx="100" cy="148" r="3" fill="#5D4037"/>
  <!-- Rope going over pulley -->
  <line x1="85" y1="148" x2="60" y2="195" stroke="#F9A825" stroke-width="2"/>
  <line x1="115" y1="148" x2="140" y2="195" stroke="#F9A825" stroke-width="2"/>
  <!-- Weight on one side -->
  <rect x="52" y="195" width="16" height="20" rx="2" fill="#C62828"/>
  <text x="60" y="209" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">F</text>
  <!-- Weight on other side -->
  <rect x="132" y="195" width="16" height="20" rx="2" fill="#1565C0"/>
  <text x="140" y="209" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">mg</text>
  <!-- Arrow pulling down -->
  <line x1="60" y1="217" x2="60" y2="235" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="60,235 57,229 63,229" fill="#C62828"/>
  <text x="70" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555">F = mg</text>
  <!-- Note: doesn't give mechanical advantage -->
  <text x="100" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Не даёт выигрыша</text>
  <text x="100" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">в силе, меняет</text>
  <text x="100" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">направление силы</text>

  <!-- Movable pulley -->
  <rect x="180" y="95" width="130" height="195" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="245" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Подвижный блок</text>
  <!-- Support beam -->
  <rect x="195" y="120" width="100" height="6" rx="2" fill="#8D6E63"/>
  <!-- Fixed hook -->
  <line x1="220" y1="126" x2="220" y2="140" stroke="#5D4037" stroke-width="2"/>
  <circle cx="220" cy="143" r="3" fill="#5D4037"/>
  <!-- Rope -->
  <line x1="220" y1="140" x2="220" y2="155" stroke="#F9A825" stroke-width="2"/>
  <!-- Movable pulley (lower) -->
  <circle cx="220" cy="175" r="15" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="220" cy="175" r="12" fill="none" stroke="#78909C" stroke-width="1"/>
  <circle cx="220" cy="175" r="3" fill="#5D4037"/>
  <!-- Rope around movable pulley -->
  <path d="M220,155 L220,160 A15,15 0 0,1 235,175" fill="none" stroke="#F9A825" stroke-width="2"/>
  <line x1="235" y1="175" x2="260" y2="240" stroke="#F9A825" stroke-width="2"/>
  <!-- Weight hanging from movable pulley -->
  <line x1="220" y1="190" x2="220" y2="210" stroke="#F9A825" stroke-width="1.5"/>
  <rect x="210" y="210" width="20" height="22" rx="2" fill="#C62828"/>
  <text x="220" y="225" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">mg</text>
  <!-- Force arrow pulling rope -->
  <line x1="260" y1="240" x2="260" y2="255" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="260,255 257,249 263,249" fill="#2E7D32"/>
  <text x="268" y="258" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">F</text>
  <text x="245" y="245" font-family="Arial,sans-serif" font-size="7" fill="#555">F = mg/2</text>
  <text x="245" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Выигрыш в силе</text>
  <text x="245" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">в 2 раза!</text>

  <!-- Compound pulley system -->
  <rect x="325" y="95" width="140" height="195" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="395" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Составной блок</text>
  <!-- Support beam -->
  <rect x="345" y="120" width="100" height="6" rx="2" fill="#8D6E63"/>
  <!-- Two fixed pulleys on top -->
  <circle cx="365" cy="143" r="10" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="365" cy="143" r="2" fill="#5D4037"/>
  <circle cx="425" cy="143" r="10" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="425" cy="143" r="2" fill="#5D4037"/>
  <!-- Connection from beam -->
  <line x1="365" y1="126" x2="365" y2="133" stroke="#5D4037" stroke-width="2"/>
  <line x1="425" y1="126" x2="425" y2="133" stroke="#5D4037" stroke-width="2"/>
  <!-- One movable pulley below -->
  <circle cx="395" cy="180" r="10" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="395" cy="180" r="2" fill="#5D4037"/>
  <!-- Rope path -->
  <line x1="340" y1="143" x2="340" y2="145" stroke="#F9A825" stroke-width="1.5"/>
  <path d="M340,145 Q355,155 365,153" fill="none" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="375" y1="143" x2="375" y2="170" stroke="#F9A825" stroke-width="1.5"/>
  <path d="M375,170 Q385,175 385,180" fill="none" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="405" y1="180" x2="415" y2="143" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="435" y1="143" x2="440" y2="230" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Weight -->
  <line x1="395" y1="190" x2="395" y2="210" stroke="#F9A825" stroke-width="1.5"/>
  <rect x="385" y="210" width="20" height="22" rx="2" fill="#C62828"/>
  <text x="395" y="225" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">mg</text>
  <!-- Pull force -->
  <line x1="440" y1="230" x2="440" y2="250" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="440,250 437,244 443,244" fill="#2E7D32"/>
  <text x="395" y="255" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">F = mg/2 (2 блока)</text>
  <text x="395" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Больше блоков =</text>
  <text x="395" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">больше выигрыш</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Блоки</text>
</svg>