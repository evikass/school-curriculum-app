<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Скорость</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Speedometer gauge -->
  <g transform="translate(70, 190)">
    <path d="M-35,0 A35,35 0 0,1 35,0" fill="none" stroke="#E0E0E0" stroke-width="6" stroke-linecap="round"/>
    <path d="M-35,0 A35,35 0 0,1 15,-32" fill="none" stroke="#4CAF50" stroke-width="6" stroke-linecap="round"/>
    <path d="M15,-32 A35,35 0 0,1 30,-18" fill="none" stroke="#F9A825" stroke-width="6" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="-33" y1="2" x2="-27" y2="4" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="-32" x2="0" y2="-26" stroke="#333" stroke-width="1"/>
    <line x1="27" y1="-4" x2="33" y2="2" stroke="#333" stroke-width="1"/>
    <line x1="-24" y1="-22" x2="-20" y2="-18" stroke="#333" stroke-width="0.8"/>
    <line x1="24" y1="-22" x2="20" y2="-18" stroke="#333" stroke-width="0.8"/>
    <!-- Needle pointing to ~70 -->
    <line x1="0" y1="0" x2="12" y2="-28" stroke="#C62828" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#C62828"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
    <text x="-33" y="15" font-family="Arial,sans-serif" font-size="7" fill="#666">0</text>
    <text x="-5" y="-22" font-family="Arial,sans-serif" font-size="7" fill="#666">100</text>
    <text x="25" y="15" font-family="Arial,sans-serif" font-size="7" fill="#666">200</text>
    <text x="0" y="18" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">км/ч</text>
  </g>

  <!-- Car with speed label -->
  <g transform="translate(130, 105)">
    <rect x="0" y="8" width="45" height="18" rx="4" fill="#1565C0"/>
    <rect x="10" y="0" width="24" height="12" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <circle cx="12" cy="28" r="5" fill="#333"/>
    <circle cx="34" cy="28" r="5" fill="#333"/>
    <text x="22" y="45" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">v = 60 км/ч</text>
  </g>

  <!-- Formula card -->
  <rect x="130" y="170" width="110" height="55" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="185" y="192" font-family="Arial,sans-serif" font-size="18" fill="#1565C0" text-anchor="middle" font-weight="bold">v = s / t</text>
  <text x="185" y="210" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">скорость = путь / время</text>

  <!-- Rabbit vs Turtle -->
  <g transform="translate(270, 95)">
    <rect x="0" y="0" width="190" height="65" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
    <text x="95" y="14" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Сравнение скоростей</text>
    <!-- Rabbit -->
    <ellipse cx="30" cy="38" rx="14" ry="10" fill="#E0E0E0"/>
    <ellipse cx="25" cy="30" rx="3" ry="8" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
    <ellipse cx="32" cy="30" rx="3" ry="8" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
    <circle cx="38" cy="34" r="1.5" fill="#333"/>
    <text x="30" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Заяц: 70 км/ч</text>
    <!-- Turtle -->
    <ellipse cx="90" cy="40" rx="16" ry="10" fill="#2E7D32"/>
    <ellipse cx="90" cy="40" rx="12" ry="7" fill="#4CAF50"/>
    <circle cx="98" cy="36" r="3" fill="#4CAF50"/>
    <circle cx="99" cy="35" r="1" fill="#333"/>
    <line x1="105" y1="40" x2="112" y2="40" stroke="#4CAF50" stroke-width="1.5"/>
    <line x1="112" y1="40" x2="114" y2="37" stroke="#4CAF50" stroke-width="1"/>
    <line x1="112" y1="40" x2="114" y2="43" stroke="#4CAF50" stroke-width="1"/>
    <text x="90" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Черепаха: 0.3 км/ч</text>
    <!-- VS -->
    <text x="62" y="42" font-family="Arial,sans-serif" font-size="9" fill="#C62828" font-weight="bold">vs</text>
    <!-- Fast/slow labels -->
    <text x="145" y="30" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Быстрее!</text>
    <text x="145" y="45" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Медленнее!</text>
  </g>

  <!-- Distance-time graph -->
  <g transform="translate(270, 170)">
    <rect x="0" y="0" width="190" height="110" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
    <text x="95" y="14" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">График: s(t)</text>
    <!-- Axes -->
    <line x1="25" y1="95" x2="25" y2="25" stroke="#333" stroke-width="1.5"/>
    <line x1="25" y1="95" x2="175" y2="95" stroke="#333" stroke-width="1.5"/>
    <polygon points="25,25 22,32 28,32" fill="#333"/>
    <polygon points="175,95 168,92 168,98" fill="#333"/>
    <text x="15" y="25" font-family="Arial,sans-serif" font-size="8" fill="#333">s</text>
    <text x="170" y="107" font-family="Arial,sans-serif" font-size="8" fill="#333">t</text>
    <!-- Grid -->
    <line x1="25" y1="55" x2="175" y2="55" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="25" y1="75" x2="175" y2="75" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="75" y1="25" x2="75" y2="95" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="125" y1="25" x2="125" y2="95" stroke="#E0E0E0" stroke-width="0.5"/>
    <!-- Line 1 - fast (steep) -->
    <line x1="25" y1="95" x2="150" y2="30" stroke="#C62828" stroke-width="2"/>
    <!-- Line 2 - slow (shallow) -->
    <line x1="25" y1="95" x2="150" y2="65" stroke="#1565C0" stroke-width="2"/>
    <!-- Legend -->
    <line x1="35" y1="38" x2="55" y2="38" stroke="#C62828" stroke-width="2"/>
    <text x="60" y="41" font-family="Arial,sans-serif" font-size="7" fill="#C62828">v1 (большая)</text>
    <line x1="35" y1="50" x2="55" y2="50" stroke="#1565C0" stroke-width="2"/>
    <text x="60" y="53" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">v2 (маленькая)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Скорость</text>
</svg>