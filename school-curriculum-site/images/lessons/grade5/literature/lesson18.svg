<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs><linearGradient id="gРасп" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:0.5"/><stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:0.25"/>
  </linearGradient></defs>
  <rect width="800" height="500" fill="url(#gРасп)" rx="12"/>
  <rect x="4" y="4" width="792" height="492" rx="10" fill="none" stroke="#7B1FA2" stroke-width="2.5" opacity="0.3"/>
  <text x="400" y="50" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Распутин - Уроки французского</text>
  <line x1="80" y1="64" x2="720" y2="64" stroke="#7B1FA2" stroke-width="2" opacity="0.35"/>
  
  <!-- Classroom big -->
  <rect x="130" y="85" width="540" height="180" fill="#FFF8E1" stroke="#8D6E63" stroke-width="2.5" rx="5"/>
  <!-- Blackboard -->
  <rect x="200" y="100" width="400" height="120" fill="#4E342E" rx="5"/>
  <text x="400" y="140" font-family="Georgia,serif" font-size="28" fill="#FFF" text-anchor="middle">Bonjour!</text>
  <text x="400" y="175" font-family="Georgia,serif" font-size="18" fill="#81C784" text-anchor="middle">Comment vous appelez-vous?</text>
  <text x="400" y="205" font-family="Georgia,serif" font-size="18" fill="#81C784" text-anchor="middle">Je m'appelle...</text>
  <!-- Teacher + Pupil big -->
  <circle cx="200" cy="330" r="35" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="3"/>
  <text x="200" y="325" font-family="Georgia,serif" font-size="18" fill="#6A1B9A" text-anchor="middle">Лидия</text>
  <text x="200" y="348" font-family="Georgia,serif" font-size="15" fill="#7B1FA2" text-anchor="middle">Учительница</text>
  <circle cx="600" cy="330" r="35" fill="#FFF3E0" stroke="#E65100" stroke-width="3"/>
  <text x="600" y="325" font-family="Georgia,serif" font-size="18" fill="#BF360C" text-anchor="middle">Вилька</text>
  <text x="600" y="348" font-family="Georgia,serif" font-size="15" fill="#E65100" text-anchor="middle">Ученица</text>
  <!-- Books -->
  <rect x="350" y="310" width="25" height="18" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" transform="rotate(-5 362 319)"/>
  <rect x="355" y="300" width="25" height="18" fill="#90CAF9" stroke="#1565C0" stroke-width="1" transform="rotate(3 367 309)"/>
  <rect x="345" y="318" width="25" height="18" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <!-- Text -->
  <rect x="150" y="390" width="500" height="55" rx="10" fill="#F3E5F5" stroke="#CE93D8" stroke-width="2"/>
  <text x="400" y="415" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#6A1B9A" text-anchor="middle">В.Г. Распутин - Уроки французского</text>
  <text x="400" y="438" font-family="Georgia,serif" font-size="15" fill="#7B1FA2" text-anchor="middle">Дружба, доброта и милосердие</text>
  <text x="400" y="475" font-family="Georgia,serif" font-size="15" fill="#7B1FA2" text-anchor="middle" opacity="0.6">Деревенская школа, послевоенное время</text>

</svg>