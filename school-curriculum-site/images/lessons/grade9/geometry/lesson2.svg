<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad2)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad2)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Урок 2: Сложение и вычитание векторов</text>
  <!-- Triangle rule -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="225" height="135" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow2)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Правило треугольника</text>
    <defs><marker id="arr2a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7E57C2"/></marker></defs>
    <defs><marker id="arr2b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF7043"/></marker></defs>
    <defs><marker id="arr2c" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/></marker></defs>
    <!-- Vector a -->
    <line x1="30" y1="100" x2="130" y2="100" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arr2a)"/>
    <text x="75" y="95" font-family="Arial,sans-serif" font-size="11" fill="#7E57C2">a⃗</text>
    <!-- Vector b from end of a -->
    <line x1="130" y1="100" x2="180" y2="40" stroke="#FF7043" stroke-width="2.5" marker-end="url(#arr2b)"/>
    <text x="160" y="68" font-family="Arial,sans-serif" font-size="11" fill="#FF7043">b⃗</text>
    <!-- Result c = a + b -->
    <line x1="30" y1="100" x2="180" y2="40" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr2c)"/>
    <text x="90" y="60" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50">c⃗ = a⃗+b⃗</text>
    <circle cx="30" cy="100" r="3" fill="#7E57C2"/>
    <circle cx="130" cy="100" r="3" fill="#7E57C2"/>
    <text x="22" y="118" font-family="Arial,sans-serif" font-size="10" fill="#757575">A</text>
    <text x="125" y="118" font-family="Arial,sans-serif" font-size="10" fill="#757575">B</text>
    <text x="183" y="38" font-family="Arial,sans-serif" font-size="10" fill="#757575">C</text>
  </g>
  <!-- Parallelogram rule -->
  <g transform="translate(255,62)">
    <rect x="0" y="0" width="225" height="135" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow2)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Правило параллелограмма</text>
    <!-- Vector a from O -->
    <line x1="40" y1="110" x2="160" y2="110" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arr2a)"/>
    <text x="95" y="105" font-family="Arial,sans-serif" font-size="11" fill="#7E57C2">a⃗</text>
    <!-- Vector b from O -->
    <line x1="40" y1="110" x2="90" y2="40" stroke="#FF7043" stroke-width="2.5" marker-end="url(#arr2b)"/>
    <text x="50" y="70" font-family="Arial,sans-serif" font-size="11" fill="#FF7043">b⃗</text>
    <!-- Parallel sides -->
    <line x1="90" y1="40" x2="210" y2="40" stroke="#FF7043" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="160" y1="110" x2="210" y2="40" stroke="#7E57C2" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Diagonal = sum -->
    <line x1="40" y1="110" x2="210" y2="40" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr2c)"/>
    <text x="140" y="68" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50">a⃗+b⃗</text>
    <circle cx="40" cy="110" r="3" fill="#7E57C2"/>
    <text x="28" y="125" font-family="Arial,sans-serif" font-size="10" fill="#757575">O</text>
  </g>
  <!-- Properties -->
  <g transform="translate(20,208)">
    <rect x="0" y="0" width="220" height="125" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow2)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Свойства сложения</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="42" font-family="Arial,sans-serif" font-size="10" fill="#212121">1. a⃗ + b⃗ = b⃗ + a⃗</text>
    <text x="20" y="54" font-family="Arial,sans-serif" font-size="9" fill="#757575">(переместительный)</text>
    <text x="12" y="72" font-family="Arial,sans-serif" font-size="10" fill="#212121">2. (a⃗+b⃗)+c⃗ = a⃗+(b⃗+c⃗)</text>
    <text x="20" y="84" font-family="Arial,sans-serif" font-size="9" fill="#757575">(сочетательный)</text>
    <text x="12" y="100" font-family="Arial,sans-serif" font-size="10" fill="#212121">3. a⃗ + 0⃗ = a⃗</text>
    <text x="12" y="116" font-family="Arial,sans-serif" font-size="10" fill="#212121">4. a⃗ + (-a⃗) = 0⃗</text>
  </g>
  <!-- Subtraction -->
  <g transform="translate(260,208)">
    <rect x="0" y="0" width="220" height="125" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow2)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Вычитание векторов</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="110" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#212121">a⃗ - b⃗ = a⃗ + (-b⃗)</text>
    <!-- Vectors from same point -->
    <line x1="40" y1="80" x2="140" y2="80" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arr2a)"/>
    <text x="85" y="75" font-family="Arial,sans-serif" font-size="11" fill="#7E57C2">a⃗</text>
    <line x1="40" y1="80" x2="100" y2="50" stroke="#FF7043" stroke-width="2.5" marker-end="url(#arr2b)"/>
    <text x="60" y="58" font-family="Arial,sans-serif" font-size="11" fill="#FF7043">b⃗</text>
    <!-- Difference vector -->
    <line x1="100" y1="50" x2="140" y2="80" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr2c)"/>
    <text x="130" y="58" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">a⃗-b⃗</text>
    <circle cx="40" cy="80" r="3" fill="#7E57C2"/>
    <text x="110" y="100" font-family="Arial,sans-serif" font-size="9" fill="#757575">От конца b⃗ к концу a⃗</text>
    <text x="110" y="115" font-family="Arial,sans-serif" font-size="9" fill="#757575">→AB + →BC = →AC</text>
  </g>
</svg>