<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 13. Развитие выносливости</text>
  <!-- HR zones -->
  <rect x="15" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="130" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Пульсовые зоны</text>
  <!-- Zone bars -->
  <rect x="25" y="95" width="210" height="14" fill="#E53935" opacity="0.7" rx="3"/>
  <text x="130" y="105" text-anchor="middle" fill="#FFF" font-size="8" font-family="Arial,sans-serif">Максимальная 170–190 уд/мин</text>
  <rect x="25" y="112" width="170" height="14" fill="#FF9800" opacity="0.7" rx="3"/>
  <text x="110" y="122" text-anchor="middle" fill="#FFF" font-size="8" font-family="Arial,sans-serif">Анаэробная 150–170</text>
  <rect x="25" y="129" width="140" height="14" fill="#66BB6A" opacity="0.7" rx="3"/>
  <text x="95" y="139" text-anchor="middle" fill="#FFF" font-size="8" font-family="Arial,sans-serif">Аэробная 130–150</text>
  <rect x="25" y="146" width="100" height="14" fill="#1565C0" opacity="0.7" rx="3"/>
  <text x="75" y="156" text-anchor="middle" fill="#FFF" font-size="8" font-family="Arial,sans-serif">Фитнес 110–130</text>
  <rect x="25" y="163" width="60" height="14" fill="#7B1FA2" opacity="0.5" rx="3"/>
  <text x="55" y="173" text-anchor="middle" fill="#FFF" font-size="8" font-family="Arial,sans-serif">Восст.</text>
  <text x="25" y="192" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Для выносливости: 130–160!</text>

  <!-- Methods -->
  <rect x="255" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="370" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Методы развития</text>
  <text x="265" y="100" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">1. Равномерный метод</text>
  <text x="265" y="113" fill="#666" font-size="8" font-family="Arial,sans-serif">Бег 15–30 мин без пауз</text>
  <text x="265" y="129" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">2. Переменный метод</text>
  <text x="265" y="142" fill="#666" font-size="8" font-family="Arial,sans-serif">Чередование: быстр./медленн.</text>
  <text x="265" y="158" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">3. Интервальный метод</text>
  <text x="265" y="171" fill="#666" font-size="8" font-family="Arial,sans-serif">Работа 30 сек + отдых 60 сек</text>
  <text x="265" y="187" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">4. Кроссовый метод</text>
  <text x="265" y="200" fill="#666" font-size="8" font-family="Arial,sans-serif">Бег по пересечённой местности</text>

  <!-- Aerobic exercises -->
  <rect x="15" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="15" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="130" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Аэробные упражнения</text>
  <text x="25" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">🏃 Бег (кросс, 1000–2000 м)</text>
  <text x="25" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">🏊 Плавание (400–800 м)</text>
  <text x="25" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">🚴 Велосипед (15–30 мин)</text>
  <text x="25" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">⛷️ Лыжи (3–5 км)</text>
  <text x="25" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">🤸 Скакалка (3–5 мин)</text>
  <text x="25" y="317" fill="#333" font-size="9" font-family="Arial,sans-serif">💃 Аэробика, степ</text>

  <!-- Indicators -->
  <rect x="255" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="370" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Показатели выносливости</text>
  <text x="265" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">• Бег 1000 м (м: 3.50, д: 4.30)</text>
  <text x="265" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">• Бег 2000 м (м: 8.50)</text>
  <text x="265" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">• Пульс восст. за 3 мин</text>
  <text x="265" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">• Проба Генчи (задержка)</text>
  <text x="265" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">• Проба Руфье (ЧСС)</text>
  <text x="265" y="317" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Регулярность — ключ к успеху!</text>
</svg>