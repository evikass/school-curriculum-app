<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr11" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.65"/>
    </linearGradient>
    <filter id="sh11" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow11" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
<rect width="500" height="350" fill="url(#bg11)"/>
<circle cx="0" cy="0" r="60" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="350" r="80" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="0" r="40" fill="#C62828" opacity="0.03"/>
<rect x="2" y="2" width="496" height="346" rx="12" ry="12" fill="none" stroke="#EF5350" stroke-width="2.5" opacity="0.5"/>
<rect x="3" y="3" width="494" height="44" rx="10" ry="10" fill="url(#hdr11)"/>
<rect x="3" y="37" width="494" height="10" fill="url(#hdr11)"/>
<circle cx="28" cy="25" r="15" fill="#FFFFFF" opacity="0.25"/>
<circle cx="28" cy="25" r="12" fill="#FFFFFF" opacity="0.15"/>
<text x="28" y="29" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">11</text>
<text x="250" y="22" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Оценка состояния пострадавшего</text>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="10" fill="#FFEBEE" text-anchor="middle">Первая помощь — Урок 11</text>
<line x1="10" y1="50" x2="490" y2="50" stroke="#EF5350" stroke-width="0.5" opacity="0.3"/>
<rect x="3" y="335" width="494" height="12" rx="0" ry="0" fill="#C62828" opacity="0.08"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" opacity="0.5">9 класс — Основы безопасности жизнедеятельности</text>
<circle cx="462" cy="78" r="14" fill="none" stroke="#EF5350" stroke-width="1.5" opacity="0.25"/>
<polyline points="450,78 457,78 460,68 464,88 467,78 474,78" fill="none" stroke="#EF5350" stroke-width="2" opacity="0.5"/>
<rect x="12" y="55" width="230" height="140" rx="8" ry="8" fill="url(#card11)" filter="url(#sh11)"/>
<rect x="12" y="55" width="230" height="140" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="58" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Алгоритм оценки (DRABC)</text>
<line x1="22" y1="80" x2="232" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">D — Danger: оценка опасности на месте</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">R — Response: реакция на голос/боль</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">A — Airway: проходимость дыхательных путей</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">B — Breathing: наличие и характер дыхания</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">C — Circulation: пульс и кровообращение</text>
<circle cx="26" cy="164" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333">Обеспечьте безопасность себе сначала!</text>
<circle cx="26" cy="179" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не перемещайте без необходимости</text>
<rect x="250" y="55" width="238" height="140" rx="8" ry="8" fill="url(#card11)" filter="url(#sh11)"/>
<rect x="250" y="55" width="238" height="140" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="58" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Проверка сознания</text>
<line x1="260" y1="80" x2="478" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Громко окликните пострадавшего</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Похлопайте по плечам с обеих сторон</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Щипок за мочку уха — болевой стимул</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не трясите пострадавшего резко!</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Реакция есть — сознание сохранено</text>
<circle cx="264" cy="164" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333">Нет реакции — пострадавший без сознания</text>
<circle cx="264" cy="179" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333">Проверьте пульс на шее (сонная артерия)</text>
<line x1="15" y1="200" x2="485" y2="200" stroke="#EF5350" stroke-width="0.4" opacity="0.15" stroke-dasharray="4,3"/>
<rect x="12" y="207" width="230" height="121" rx="8" ry="8" fill="url(#card11)" filter="url(#sh11)"/>
<rect x="12" y="207" width="230" height="121" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="210" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="224" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Проверка дыхания</text>
<line x1="22" y1="232" x2="232" y2="232" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="241" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333">Наклонитесь: щека ко рту пострадавшего</text>
<circle cx="26" cy="256" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="259" font-family="Arial,sans-serif" font-size="9" fill="#333333">Смотрите: грудная клетка поднимается?</text>
<circle cx="26" cy="271" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="274" font-family="Arial,sans-serif" font-size="9" fill="#333333">Слушайте: есть звуки дыхания?</text>
<circle cx="26" cy="286" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="289" font-family="Arial,sans-serif" font-size="9" fill="#333333">Чувствуйте: поток воздуха на щеке?</text>
<circle cx="26" cy="301" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="304" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не более 10 секунд на проверку!</text>
<circle cx="26" cy="316" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="319" font-family="Arial,sans-serif" font-size="9" fill="#333333">Нет дыхания — немедленно начинайте СЛР!</text>
<rect x="250" y="207" width="238" height="121" rx="8" ry="8" fill="url(#card11)" filter="url(#sh11)"/>
<rect x="250" y="207" width="238" height="121" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="210" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="224" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Боковое стабильное положение</text>
<line x1="260" y1="232" x2="478" y2="232" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="241" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333">Если дышит, но без сознания:</text>
<circle cx="264" cy="256" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="259" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ближайшую руку — вытянуть вдоль тела</text>
<circle cx="264" cy="271" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="274" font-family="Arial,sans-serif" font-size="9" fill="#333333">Дальнюю руку — прижать к щеке ладонью</text>
<circle cx="264" cy="286" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="289" font-family="Arial,sans-serif" font-size="9" fill="#333333">Дальнюю ногу — согнуть в колене</text>
<circle cx="264" cy="301" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="304" font-family="Arial,sans-serif" font-size="9" fill="#333333">Повернуть на бок, потянув за колено</text>
<circle cx="264" cy="316" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="319" font-family="Arial,sans-serif" font-size="9" fill="#333333">Наклонить голову назад — открыть воздуховод</text>
</svg>