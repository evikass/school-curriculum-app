<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26A69A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" fill="url(#bg)" stroke="#26A69A" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="25" width="500" height="25" fill="url(#headerGrad)"/>
  <!-- Lesson number badge -->
  <circle cx="28" cy="25" r="18" fill="#FFFFFF" opacity="0.3"/>
  <text x="28" y="31" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">12</text>
  <!-- Title -->
  <text x="250" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Урал и Сибирь</text>
  <!-- Decorative line -->
  <line x1="15" y1="56" x2="485" y2="56" stroke="#80CBC4" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Urals section -->
  <g transform="translate(15, 62)">
    <rect x="0" y="0" width="235" height="140" rx="8" fill="#FFFFFF" stroke="#795548" stroke-width="1"/>
    <rect x="0" y="0" width="235" height="20" rx="8" fill="#795548" opacity="0.15"/>
    <rect x="0" y="10" width="235" height="10" fill="#795548" opacity="0.15"/>
    <text x="117" y="15" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#5D4037" text-anchor="middle">УРАЛ</text>
    <text x="10" y="33" font-family="Arial,sans-serif" font-size="8" fill="#333">Граница Европы и Азии</text>
    <text x="10" y="44" font-family="Arial,sans-serif" font-size="8" fill="#333">Свердловская, Челябинская, Оренбургская обл.,</text>
    <text x="10" y="54" font-family="Arial,sans-serif" font-size="8" fill="#333">Пермский край, Башкортостан, Удмуртия</text>
    <text x="10" y="68" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#5D4037">Ресурсы:</text>
    <text x="75" y="68" font-family="Arial,sans-serif" font-size="8" fill="#333">руды металлов, калийные соли, нефть, газ</text>
    <text x="10" y="80" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#5D4037">Отрасли:</text>
    <text x="10" y="92" font-family="Arial,sans-serif" font-size="8" fill="#333">• Металлургия (Магнитогорск, Челябинск)</text>
    <text x="10" y="103" font-family="Arial,sans-serif" font-size="8" fill="#333">• Машиностроение (Екатеринбург)</text>
    <text x="10" y="114" font-family="Arial,sans-serif" font-size="8" fill="#333">• Химия (Пермь, Уфа)</text>
    <text x="10" y="125" font-family="Arial,sans-serif" font-size="8" fill="#333">• Нефтегаз (Удмуртия, Оренбуржье)</text>
    <rect x="10" y="128" width="215" height="4" rx="2" fill="#795548" opacity="0.2"/>
    <text x="10" y="139" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle">Калийные соли — Верхнекамское месторождение</text>
    <text x="10" y="148" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="start">«Опорный край державы»</text>
  </g>
  <!-- Siberia section -->
  <g transform="translate(260, 62)">
    <rect x="0" y="0" width="225" height="140" rx="8" fill="#FFFFFF" stroke="#1565C0" stroke-width="1"/>
    <rect x="0" y="0" width="225" height="20" rx="8" fill="#1565C0" opacity="0.15"/>
    <rect x="0" y="10" width="225" height="10" fill="#1565C0" opacity="0.15"/>
    <text x="112" y="15" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">СИБИРЬ</text>
    <text x="10" y="33" font-family="Arial,sans-serif" font-size="8" fill="#333">Западная и Восточная Сибирь</text>
    <text x="10" y="44" font-family="Arial,sans-serif" font-size="8" fill="#333">От Урала до Байкала (~10 млн км²)</text>
    <text x="10" y="57" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">Ресурсы:</text>
    <text x="75" y="57" font-family="Arial,sans-serif" font-size="8" fill="#333">нефть, газ, уголь, золото, лес</text>
    <text x="10" y="69" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">Западная Сибирь:</text>
    <text x="10" y="80" font-family="Arial,sans-serif" font-size="8" fill="#333">• Нефтегазовый центр (ХМАО, ЯНАО)</text>
    <text x="10" y="91" font-family="Arial,sans-serif" font-size="8" fill="#333">• Новосибирск — наукоград</text>
    <text x="10" y="103" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">Восточная Сибирь:</text>
    <text x="10" y="114" font-family="Arial,sans-serif" font-size="8" fill="#333">• ГЭС (Саяно-Шушенская, Братская)</text>
    <text x="10" y="125" font-family="Arial,sans-serif" font-size="8" fill="#333">• Цветная металлургия (Норильск)</text>
    <text x="10" y="137" font-family="Arial,sans-serif" font-size="7" fill="#999">БАМ — Байкало-Амурская магистраль</text>
    <rect x="10" y="128" width="205" height="4" rx="2" fill="#1565C0" opacity="0.2"/>
    <text x="112" y="139" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Кузбасс — крупнейший угольный бассейн</text>
  </g>
  <!-- Key comparison and facts section -->
  <rect x="15" y="208" width="470" height="132" rx="6" fill="#E0F2F1" stroke="#26A69A" stroke-width="1"/>
  <text x="250" y="225" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">ОБЩИЕ ЧЕРТЫ И ПРОБЛЕМЫ</text>
  <line x1="25" y1="230" x2="475" y2="230" stroke="#80CBC4" stroke-width="0.5"/>
  <!-- Problems list -->
  <text x="25" y="242" font-family="Arial,sans-serif" font-size="9" fill="#333">• Ресурсо-экспортная специализация (сырьевой придаток экономики)</text>
  <text x="25" y="256" font-family="Arial,sans-serif" font-size="9" fill="#333">• Суровый климат увеличивает стоимость добычи и жизни</text>
  <text x="25" y="270" font-family="Arial,sans-serif" font-size="9" fill="#333">• Транспортная проблема: огромные расстояния, мало дорог</text>
  <text x="25" y="284" font-family="Arial,sans-serif" font-size="9" fill="#333">• Отток населения из северных районов (западный дрейф)</text>
  <text x="25" y="300" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#26A69A">ПЕРСПЕКТИВЫ:</text>
  <text x="25" y="314" font-family="Arial,sans-serif" font-size="9" fill="#333">• Северный морской путь — круглогодичная навигация</text>
  <text x="25" y="328" font-family="Arial,sans-serif" font-size="9" fill="#333">• Глубокая переработка сырья на месте, развитие нефтегазохимии</text>
  <text x="25" y="342" font-family="Arial,sans-serif" font-size="8" fill="#00796B">• Ключевые города: Екатеринбург, Новосибирск, Красноярск, Омск</text>
  <text x="25" y="355" font-family="Arial,sans-serif" font-size="8" fill="#00796B">• Озеро Байкал — крупнейший резервуар пресной воды на планете</text>
  <rect x="15" y="359" width="470" height="2" rx="1" fill="#26A69A" opacity="0.3"/>
  <text x="250" y="366" font-family="Arial,sans-serif" font-size="6" fill="#00796B" text-anchor="middle">Урал + Сибирь = ресурсно-промышленный фундамент экономики России</text>
</svg>