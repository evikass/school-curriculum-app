<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#AB47BC" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#6A1B9A" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#AB47BC" text-anchor="middle">Самопознание</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Психология — Урок 9</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#AB47BC" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">Самопознание —</text>
  <text x="80" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">изучение самого себя</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">Вопросы:</text>
  <text x="80" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Кто я? Что я люблю? Что умею?</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Какие у меня ценности?</text>
  <text x="22" y="148" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">Методы:</text>
  <text x="80" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Самонаблюдение (рефлексия)</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Тесты личности и интересов</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#AB47BC" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Обратная связь от других</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Дневник, анализ опыта</text>
  <text x="262" y="128" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">«Окно Джохари»:</text>
  <text x="320" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Открытая зона — знаю я и другие</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Слепая — знают другие, не знаю я</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Скрытая — знаю я, не знают другие</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#AB47BC" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Познай самого себя (Сократ)</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#AB47BC" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Самопознание — путь к саморазвитию</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Психология · Самопознание</text>
</svg>