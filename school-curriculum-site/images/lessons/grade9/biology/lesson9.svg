<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow9" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="white">Урок 9: Охрана природы и биоразнообразия</text>

  <!-- Red Book -->
  <rect x="15" y="60" width="155" height="140" rx="8" fill="white" opacity="0.9" filter="url(#shadow9)"/>
  <text x="92" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828">Красная книга</text>
  <line x1="25" y1="84" x2="160" y2="84" stroke="#FFCDD2" stroke-width="1"/>
  <!-- Book icon -->
  <rect x="35" y="92" width="55" height="45" rx="4" fill="url(#bookGrad)" filter="url(#shadow9)"/>
  <text x="62" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">КРАСНАЯ</text>
  <text x="62" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white">КНИГА</text>
  <!-- Categories -->
  <rect x="25" y="142" width="8" height="8" rx="1" fill="#000000"/>
  <text x="38" y="150" font-family="Arial,sans-serif" font-size="8" fill="#333">Исчезающие</text>
  <rect x="25" y="155" width="8" height="8" rx="1" fill="#FF0000"/>
  <text x="38" y="163" font-family="Arial,sans-serif" font-size="8" fill="#333">Сокращающиеся</text>
  <rect x="25" y="168" width="8" height="8" rx="1" fill="#FFA000"/>
  <text x="38" y="176" font-family="Arial,sans-serif" font-size="8" fill="#333">Редкие виды</text>
  <rect x="25" y="181" width="8" height="8" rx="1" fill="#FFD54F"/>
  <text x="38" y="189" font-family="Arial,sans-serif" font-size="8" fill="#333">Неопределённые</text>
  <rect x="25" y="194" width="8" height="8" rx="1" fill="#81C784"/>
  <text x="38" y="202" font-family="Arial,sans-serif" font-size="8" fill="#333">Восстанавливаемые</text>

  <!-- Biodiversity -->
  <rect x="180" y="60" width="305" height="70" rx="8" fill="white" opacity="0.9" filter="url(#shadow9)"/>
  <text x="332" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Биоразнообразие</text>
  <line x1="190" y1="84" x2="475" y2="84" stroke="#A5D6A7" stroke-width="1"/>
  <text x="190" y="99" font-family="Arial,sans-serif" font-size="9" fill="#333">Разнообразие жизни на всех уровнях:</text>
  <text x="190" y="113" font-family="Arial,sans-serif" font-size="9" fill="#388E3C">• Генетическое — разнообразие генов</text>
  <text x="190" y="126" font-family="Arial,sans-serif" font-size="9" fill="#388E3C">• Видовое — число видов организмов</text>
  <text x="190" y="126" font-family="Arial,sans-serif" font-size="1" fill="transparent">.</text>

  <!-- Protected areas -->
  <rect x="180" y="138" width="305" height="62" rx="8" fill="white" opacity="0.9" filter="url(#shadow9)"/>
  <text x="332" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Охраняемые территории</text>
  <line x1="190" y1="161" x2="475" y2="161" stroke="#A5D6A7" stroke-width="1"/>
  <!-- Types -->
  <rect x="190" y="167" width="70" height="16" rx="3" fill="#2E7D32"/>
  <text x="225" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="white">Заповедник</text>
  <rect x="265" y="167" width="65" height="16" rx="3" fill="#43A047"/>
  <text x="297" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="white">Заказник</text>
  <rect x="335" y="167" width="60" height="16" rx="3" fill="#66BB6A"/>
  <text x="365" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="white">Национальн. парк</text>
  <rect x="400" y="167" width="75" height="16" rx="3" fill="#A5D6A7"/>
  <text x="437" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#333">Памятник прир.</text>
  <text x="190" y="196" font-family="Arial,sans-serif" font-size="7.5" fill="#388E3C" font-style="italic">Заповедник — полный запрет хозяйственной деятельности</text>

  <!-- Ecosystem diversity -->
  <rect x="15" y="208" width="230" height="75" rx="8" fill="white" opacity="0.9" filter="url(#shadow9)"/>
  <text x="130" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Экосистемное разнообразие</text>
  <line x1="25" y1="231" x2="235" y2="231" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="246" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Леса, степи, пустыни, тундра</text>
  <text x="25" y="259" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Морские и пресноводные экосистемы</text>
  <text x="25" y="272" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Болота, горы, коралловые рифы</text>
  <text x="25" y="280" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828" font-style="italic">Утрата местообитаний — главная угроза</text>

  <!-- Environmental protection measures -->
  <rect x="255" y="208" width="230" height="75" rx="8" fill="white" opacity="0.9" filter="url(#shadow9)"/>
  <text x="370" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Меры охраны природы</text>
  <line x1="265" y1="231" x2="475" y2="231" stroke="#A5D6A7" stroke-width="1"/>
  <text x="265" y="246" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Создание ООПТ (особо охраняемые)</text>
  <text x="265" y="259" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Красная книга РФ и МСОП</text>
  <text x="265" y="272" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Банков генов, зоопарки, ботанич. сады</text>
  <text x="265" y="280" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32" font-style="italic">Конвенция о биоразнообразии (1992, Рио)</text>

  <!-- Bottom bar: global significance -->
  <rect x="15" y="290" width="470" height="52" rx="8" fill="white" opacity="0.9" filter="url(#shadow9)"/>
  <text x="250" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">Почему важно сохранять биоразнообразие?</text>
  <line x1="25" y1="314" x2="475" y2="314" stroke="#FFCDD2" stroke-width="1"/>
  <text x="25" y="328" font-family="Arial,sans-serif" font-size="8.5" fill="#333">1. Стабильность экосистем зависит от числа видов</text>
  <text x="250" y="339" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#333">2. Каждый вид уникален и невосполним</text>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="1" fill="transparent">.</text>
</svg>