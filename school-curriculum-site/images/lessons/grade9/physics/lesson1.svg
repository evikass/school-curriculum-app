<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#1565C0" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Законы Ньютона</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 1</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="460" height="55" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="30" y="92" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="start" font-weight="bold">I закон (инерция): Тело сохраняет состояние покоя</text>
  <text x="30" y="106" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="start">или равномерного прямолинейного движения,</text>
  <text x="30" y="120" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="start">если на него не действуют другие тела.</text>
  <rect x="20" y="138" width="220" height="155" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="155" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Сила и ускорение:</text>
  <rect x="90" y="170" width="60" height="35" rx="4" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <line x1="150" y1="187" x2="210" y2="187" stroke="#E53935" stroke-width="3" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#E53935"/></marker></defs>
  <text x="155" y="183" font-family="Arial,sans-serif" font-size="14" fill="#E53935" text-anchor="start" font-weight="bold">F</text>
  <text x="100" y="193" font-family="Arial,sans-serif" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">m</text>
  <line x1="90" y1="222" x2="190" y2="222" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="250" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="start" font-weight="bold">II закон: F = m · a</text>
  <text x="30" y="268" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">F — сила (Н), m — масса (кг)</text>
  <text x="30" y="282" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">a — ускорение (м/с²)</text>
  <rect x="250" y="138" width="230" height="155" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="260" y="155" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">III закон:</text>
  <text x="260" y="172" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="start" font-weight="bold">Действие = противодействию</text>
  <text x="260" y="190" font-family="Arial,sans-serif" font-size="16" fill="#E53935" text-anchor="start" font-weight="bold">F₁₂ = −F₂₁</text>
  <rect x="280" y="210" width="40" height="30" rx="3" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <rect x="325" y="210" width="40" height="30" rx="3" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
  <line x1="320" y1="225" x2="340" y2="225" stroke="#42A5F5" stroke-width="2"/>
  <line x1="325" y1="225" x2="305" y2="225" stroke="#E53935" stroke-width="2"/>
  <text x="295" y="230" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start" font-weight="bold">1</text>
  <text x="340" y="230" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start" font-weight="bold">2</text>
  <text x="260" y="260" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start">Силы приложены к РАЗНЫМ телам</text>
  <text x="260" y="275" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start">и направлены в противоположные</text>
  <text x="260" y="290" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start">стороны вдоль одной прямой.</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Законы Ньютона</text>
</svg>