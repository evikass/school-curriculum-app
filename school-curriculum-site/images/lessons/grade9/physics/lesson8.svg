  <text x="80" y="182" font-family="Arial,sans-serif" font-size="11" fill="#E53935" text-anchor="start" font-weight="bold">N</text>
  <text x="130" y="182" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="start" font-weight="bold">S</text>
  <path d="M85,165 Q85,140 135,140 Q185,140 185,165" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M85,190 Q85,215 135,215 Q185,215 185,190" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
