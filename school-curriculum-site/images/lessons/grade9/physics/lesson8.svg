  <text x="30" y="108" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start">на движущиеся электрические заряды</text>
  <rect x="20" y="120" width="230" height="110" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="137" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Поле магнита:</text>
  <rect x="60" y="165" width="50" height="25" rx="3" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
