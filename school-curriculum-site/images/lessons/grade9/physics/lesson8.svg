  <text x="270" y="137" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Правило буравчика:</text>
  <circle cx="350" cy="175" r="15" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <circle cx="350" cy="175" r="3" fill="#42A5F5"/>
  <text x="350" y="178" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">·</text>
  <text x="350" y="160" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">I (к нам)</text>
  <path d="M330,175 A15,15 0 0,1 350,160" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <text x="270" y="208" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">B — индукция [Тл]</text>
  <text x="270" y="224" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="start">Сила Ампера: F = BIl sin α</text>
  <rect x="20" y="238" width="460" height="55" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="255" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="start" font-weight="bold">Сила Лоренца: F = qvB sin α</text>
  <text x="30" y="272" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">действует на заряд в магнитном поле</text>
  <text x="30" y="288" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="start">Правило левой руки: B → пальцы, v → ладонь, F → большой</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Магнитное поле</text>
