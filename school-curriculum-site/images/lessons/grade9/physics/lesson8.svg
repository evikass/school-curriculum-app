  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 8</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="460" height="40" rx="4" fill="#42A5F5" opacity="0.07"/>
