<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF9800" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#FF9800" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FF9800" text-anchor="middle">Основы проектирования</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Технология — Урок 1</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#FF9800" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#FF9800" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Проектирование —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">создание плана изделия</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Этапы:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">1. Проблема — что нужно создать?</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">2. Исследование — изучить аналоги</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">3. Концепция — идея и эскиз</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">4. Разработка — чертежи и расчёты</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#FF9800" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">5. Изготовление — по плану</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">6. Тестирование — проверка</text>
  <text x="262" y="128" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Требования:</text>
  <text x="325" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Функциональность — работает ли?</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Эстетичность — красиво ли?</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Экономичность — выгодно ли?</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#FF9800" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Проект = Проблема + Решение</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#FF9800" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Дизайн-мышление: от проблемы к решению</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Технология · Основы проектировани</text>
