<rect x="30" y="295" width="440" height="18" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="309" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Скелет: опора, защита органов, движение | 206 костей | Суставы — подвижные соединения</text>

