<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes rhyme { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      .rhyme-word { animation: rhyme 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef3c7"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#b45309">Рифма 🎭</text>
  
  <!-- Rhyme explanation -->
  <rect x="20" y="50" width="460" height="60" fill="#dbeafe" rx="10"/>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">Рифма — это созвучие концовок слов</text>
  <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Рифмующиеся слова звучат похоже! 🎵</text>
  
  <!-- Rhyme examples -->
  <rect x="20" y="125" width="145" height="90" fill="#dcfce7" rx="10"/>
  <g class="rhyme-word">
    <text x="92" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#15803d">КОТ</text>
    <text x="92" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#22c55e">РОТ</text>
    <text x="92" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-ОТ</text>
  </g>
  
  <rect x="175" y="125" width="145" height="90" fill="#fce7f3" rx="10"/>
  <g class="rhyme-word" style="animation-delay: 0.3s">
    <text x="247" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#be185d">МАМА</text>
    <text x="247" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ec4899">РАМА</text>
    <text x="247" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-АМА</text>
  </g>
  
  <rect x="330" y="125" width="150" height="90" fill="#fef2f2" rx="10"/>
  <g class="rhyme-word" style="animation-delay: 0.6s">
    <text x="405" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#dc2626">ДОМ</text>
    <text x="405" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ef4444">ГНОМ</text>
    <text x="405" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">-ОМ</text>
  </g>
  
  <!-- Poem example -->
  <rect x="20" y="230" width="460" height="105" fill="#f3e8ff" rx="15"/>
  <text x="250" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed">Рифмы в стихах 📝</text>
  
  <text x="250" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">Мишка косолапый</text>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">По лесу идёт,</text>
  <text x="150" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" font-weight="bold">идёт</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16">—</text>
  <text x="350" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a855f7" font-weight="bold">поёт</text>
  <text x="440" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">рифма!</text>
</svg>
