<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><style>.pen{animation:write 2s infinite}@keyframes write{0%,100%{transform:translateX(0)}50%{transform:translateX(10px)}}</style></defs>
  <rect width="500" height="350" fill="#fef3c7"/>
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#b45309">Знакомство с прописью ✏️</text>
  <rect x="100" y="50" width="300" height="150" fill="#fff" stroke="#d97706" stroke-width="2" rx="10"/>
  <line x1="110" y1="100" x2="390" y2="100" stroke="#e5e7eb" stroke-dasharray="5,5"/>
  <line x1="110" y1="150" x2="390" y2="150" stroke="#e5e7eb" stroke-dasharray="5,5"/>
  <g class="pen"><text x="130" y="140" font-family="Arial" font-size="40" fill="#3b82f6">/ / / /</text></g>
  <rect x="20" y="220" width="220" height="110" fill="#dbeafe" rx="10"/>
  <text x="130" y="250" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1d4ed8">Как держать ручку ✍️</text>
  <text x="130" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">1. Положи на средний палец</text>
  <text x="130" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">2. Удерживай большим и указательным</text>
  <text x="130" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">3. Расстояние 1-2 см до бумаги</text>
  <rect x="260" y="220" width="220" height="110" fill="#dcfce7" rx="10"/>
  <text x="370" y="250" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#15803d">Правила работы 📋</text>
  <text x="370" y="280" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">• Сиди ровно, спина прямая</text>
  <text x="370" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">• Тетрадь под углом 30°</text>
  <text x="370" y="320" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">• Расстояние до глаз 30-35 см</text>
</svg>
