<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Православный храм</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Православная культура</text>
  <!-- Illustration area -->
  <rect x="150" y="100" width="200" height="185" rx="3" fill="#d4a76a" stroke="#1a1a1a" stroke-width="2"/><rect x="150" y="100" width="200" height="15" fill="#8B4513"/><!-- Icons on iconostasis --><rect x="165" y="120" width="35" height="45" rx="2" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><rect x="210" y="120" width="80" height="55" rx="3" fill="#D4A843" stroke="#8B6914" stroke-width="1.5"/><rect x="300" y="120" width="35" height="45" rx="2" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><!-- Simple icons inside --><circle cx="250" cy="142" r="10" fill="#DEB887" stroke="#8B6914" stroke-width="0.5"/><rect x="175" y="133" width="15" height="20" rx="2" fill="#DEB887"/><rect x="310" y="133" width="15" height="20" rx="2" fill="#DEB887"/><!-- Royal doors --><rect x="225" y="185" width="50" height="65" rx="2" fill="#8B6914" stroke="#D4A843" stroke-width="1.5"/><circle cx="250" cy="217" r="6" fill="#D4A843"/><!-- Candles --><rect x="165" y="180" width="4" height="30" fill="#F5DEB3"/><ellipse cx="167" cy="178" rx="4" ry="6" fill="#D4A843" opacity="0.8"/><rect x="325" y="180" width="4" height="30" fill="#F5DEB3"/><ellipse cx="327" cy="178" rx="4" ry="6" fill="#D4A843" opacity="0.8"/><text x="250" y="300" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Иконостас</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>