<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Добро и зло</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Нравственные ценности</text>
  <!-- Illustration area -->
  <!-- Heart (Good) --><path d="M185,180 Q185,145 210,145 Q235,145 235,175 Q235,210 210,230 Q185,210 185,180 Z" fill="#C41E3A" stroke="#8B0000" stroke-width="2"/><text x="210" y="200" text-anchor="middle" font-size="22" fill="#fff" font-family="Arial">+</text><text x="210" y="260" text-anchor="middle" font-size="12" fill="#228B22" font-weight="bold" font-family="Arial">Добро</text><!-- Lightning (Evil) --><polygon points="310,140 295,180 315,180 290,235 325,175 305,175 320,140" fill="#333" stroke="#1a1a1a" stroke-width="1.5"/><text x="305" y="260" text-anchor="middle" font-size="12" fill="#C41E3A" font-weight="bold" font-family="Arial">Зло</text><text x="250" y="295" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Выбор за тобой!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>