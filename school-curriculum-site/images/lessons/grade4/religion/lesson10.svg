<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Десять заповедей</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Нравственные ценности</text>
  <!-- Illustration area -->
  <rect x="165" y="100" width="60" height="140" rx="8" fill="#b0b0b0" stroke="#888" stroke-width="2"/><rect x="185" y="100" width="60" height="140" rx="8" fill="#c0c0c0" stroke="#888" stroke-width="2"/><rect x="165" y="100" width="60" height="20" rx="8" fill="#999" stroke="#888" stroke-width="1.5"/><text x="195" y="115" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial" font-weight="bold">I - V</text><rect x="185" y="100" width="60" height="20" rx="8" fill="#999" stroke="#888" stroke-width="1.5"/><text x="215" y="115" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial" font-weight="bold">VI - X</text><!-- Lines on tablets --><line x1="175" y1="135" x2="215" y2="135" stroke="#888" stroke-width="1"/><line x1="175" y1="150" x2="210" y2="150" stroke="#888" stroke-width="1"/><line x1="175" y1="165" x2="213" y2="165" stroke="#888" stroke-width="1"/><line x1="175" y1="180" x2="208" y2="180" stroke="#888" stroke-width="1"/><line x1="175" y1="195" x2="215" y2="195" stroke="#888" stroke-width="1"/><line x1="195" y1="135" x2="235" y2="135" stroke="#888" stroke-width="1"/><line x1="195" y1="150" x2="230" y2="150" stroke="#888" stroke-width="1"/><line x1="195" y1="165" x2="233" y2="165" stroke="#888" stroke-width="1"/><line x1="195" y1="180" x2="228" y2="180" stroke="#888" stroke-width="1"/><line x1="195" y1="195" x2="235" y2="195" stroke="#888" stroke-width="1"/><text x="250" y="270" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="bold" font-family="Arial">Не убивай. Не кради. Не лги.</text><text x="250" y="290" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Почитай отца и мать</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>