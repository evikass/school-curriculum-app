<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Вырезание деталей</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с бумагой</text>
  <!-- Illustration area -->
  <rect x="150" y="140" width="200" height="110" rx="2" fill="#fff" stroke="#ccc" stroke-width="1.5"/><line x1="180" y1="180" x2="320" y2="180" stroke="#C41E3A" stroke-width="1.5" stroke-dasharray="6,3"/><line x1="180" y1="210" x2="280" y2="210" stroke="#C41E3A" stroke-width="1.5" stroke-dasharray="6,3"/><circle cx="200" cy="175" r="3" fill="#C41E3A"/><circle cx="250" cy="175" r="3" fill="#C41E3A"/><circle cx="300" cy="175" r="3" fill="#C41E3A"/><polygon points="310,110 340,175 335,180 305,115" fill="#C0C0C0" stroke="#888" stroke-width="1.5"/><polygon points="325,110 295,175 290,180 320,115" fill="#C0C0C0" stroke="#888" stroke-width="1.5"/><circle cx="318" cy="115" r="5" fill="#888"/><circle cx="308" cy="180" r="10" fill="none" stroke="#C0C0C0" stroke-width="3"/><circle cx="328" cy="180" r="10" fill="none" stroke="#C0C0C0" stroke-width="3"/><text x="250" y="275" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Кольцами вперёд!</text><text x="250" y="295" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Поворачивай бумагу, не ножницы</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>