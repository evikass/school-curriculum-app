<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Свойства ткани</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с тканью</text>
  <!-- Illustration area -->
  <rect x="120" y="130" width="80" height="65" rx="3" fill="#f5f0e0" stroke="#999" stroke-width="1.5"/><rect x="120" y="130" width="80" height="10" rx="3" fill="#e8d8b8"/><text x="160" y="163" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Хлопок</text><rect x="210" y="130" width="80" height="65" rx="3" fill="#d4e8d4" stroke="#999" stroke-width="1.5"/><rect x="210" y="130" width="80" height="10" rx="3" fill="#b8d8b8"/><text x="250" y="163" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Лён</text><rect x="300" y="130" width="80" height="65" rx="3" fill="#e8d4e8" stroke="#999" stroke-width="1.5"/><rect x="300" y="130" width="80" height="10" rx="3" fill="#d8b8d8"/><text x="340" y="163" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Шёлк</text><rect x="165" y="210" width="80" height="65" rx="3" fill="#e8dcd0" stroke="#999" stroke-width="1.5"/><rect x="165" y="210" width="80" height="10" rx="3" fill="#d8c8b8"/><text x="205" y="243" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Шерсть</text><rect x="255" y="210" width="80" height="65" rx="3" fill="#d0e0f0" stroke="#999" stroke-width="1.5"/><rect x="255" y="210" width="80" height="10" rx="3" fill="#b8d0e8"/><text x="295" y="243" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Синтетика</text><text x="250" y="300" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Лицевая и изнаночная стороны</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>