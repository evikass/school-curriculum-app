<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Пейзаж</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изображение природы в искусстве</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- sky gradient hint -->
  <rect x="80" y="95" width="340" height="160" fill="#2B4C7E" opacity="0.08"/>
  <!-- mountains -->
  <polygon points="80,200 160,120 240,200" fill="#2B4C7E" opacity="0.25"/>
  <polygon points="180,200 280,105 380,200" fill="#2B4C7E" opacity="0.2"/>
  <polygon points="300,200 400,130 420,200" fill="#2B4C7E" opacity="0.15"/>
  <!-- snow caps -->
  <polygon points="160,120 150,140 170,140" fill="#FFFFFF" opacity="0.5"/>
  <polygon points="280,105 268,128 292,128" fill="#FFFFFF" opacity="0.5"/>
  <polygon points="400,130 390,148 410,148" fill="#FFFFFF" opacity="0.5"/>
  <!-- river -->
  <path d="M80,210 Q150,200 200,215 Q280,230 350,210 Q390,200 420,210" stroke="#2B4C7E" stroke-width="8" fill="#2B4C7E" opacity="0.2" stroke-linecap="round"/>
  <!-- trees -->
  <polygon points="130,255 140,195 150,255" fill="#2E7D32" opacity="0.5"/>
  <rect x="138" y="245" width="4" height="15" fill="#5D4037" opacity="0.5"/>
  <polygon points="370,255 378,200 386,255" fill="#2E7D32" opacity="0.45"/>
  <rect x="376" y="245" width="4" height="15" fill="#5D4037" opacity="0.5"/>
  <!-- sun -->
  <circle cx="400" cy="115" r="16" fill="#D4A843" opacity="0.5"/>
  <line x1="400" y1="95" x2="400" y2="88" stroke="#D4A843" stroke-width="1.5" opacity="0.4"/>
  <line x1="415" y1="100" x2="420" y2="95" stroke="#D4A843" stroke-width="1.5" opacity="0.4"/>
  <line x1="420" y1="115" x2="427" y2="115" stroke="#D4A843" stroke-width="1.5" opacity="0.4"/>
  <!-- clouds -->
  <ellipse cx="150" cy="115" rx="25" ry="10" fill="#FFFFFF" opacity="0.4"/>
  <ellipse cx="170" cy="112" rx="20" ry="8" fill="#FFFFFF" opacity="0.35"/>
  <!-- ground -->
  <rect x="80" y="255" width="340" height="5" fill="#2E7D32" opacity="0.25"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>