<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Портрет</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Искусство изображения человека</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- canvas frame -->
  <rect x="150" y="100" width="200" height="180" rx="3" fill="#FFFFFF" opacity="0.6" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="145" y="95" width="210" height="190" rx="4" fill="none" stroke="#D4A843" stroke-width="3"/>
  <!-- face oval -->
  <ellipse cx="250" cy="165" rx="45" ry="55" fill="#D4A843" opacity="0.2" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- guidelines -->
  <line x1="205" y1="150" x2="295" y2="150" stroke="#C41E3A" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="250" y1="110" x2="250" y2="220" stroke="#C41E3A" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- eyes -->
  <ellipse cx="235" cy="150" rx="8" ry="5" fill="#1a1a1a" opacity="0.6"/>
  <circle cx="235" cy="150" r="3" fill="#1a1a1a"/>
  <ellipse cx="265" cy="150" rx="8" ry="5" fill="#1a1a1a" opacity="0.6"/>
  <circle cx="265" cy="150" r="3" fill="#1a1a1a"/>
  <!-- eyebrows -->
  <path d="M225,142 Q235,138 245,142" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M255,142 Q265,138 275,142" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- nose -->
  <path d="M250,155 L247,168 L253,168" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
  <!-- mouth -->
  <path d="M238,178 Q250,185 262,178" stroke="#C41E3A" stroke-width="1.5" fill="none"/>
  <!-- hair -->
  <path d="M205,145 Q210,110 250,105 Q290,110 295,145" stroke="#1a1a1a" stroke-width="2" fill="#1a1a1a" opacity="0.4"/>
  <!-- label -->
  <text x="250" y="248" text-anchor="middle" font-family="Arial" font-size="10" fill="#1a1a1a" opacity="0.5">Портрет</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>