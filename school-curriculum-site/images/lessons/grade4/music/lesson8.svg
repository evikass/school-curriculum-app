<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Опера и балет</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Знакомимся с музыкальным театром</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- stage curtain -->
  <path d="M80,95 Q250,120 420,95 L420,270 L80,270 Z" fill="#C41E3A" opacity="0.15"/>
  <path d="M80,95 Q250,120 420,95" stroke="#C41E3A" stroke-width="2" fill="none"/>
  <!-- comedy mask -->
  <ellipse cx="200" cy="175" rx="45" ry="55" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="185" cy="160" rx="10" ry="7" fill="#1a1a1a"/>
  <ellipse cx="215" cy="160" rx="10" ry="7" fill="#1a1a1a"/>
  <path d="M180,190 Q200,210 220,190" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- smile upturned -->
  <path d="M182,188 Q200,205 218,188" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- tragedy mask -->
  <ellipse cx="330" cy="175" rx="45" ry="55" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="315" cy="160" rx="10" ry="7" fill="#1a1a1a"/>
  <ellipse cx="345" cy="160" rx="10" ry="7" fill="#1a1a1a"/>
  <!-- frown -->
  <path d="M312,195 Q330,185 348,195" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- tear -->
  <path d="M345,170 Q348,180 345,188" stroke="#D4A843" stroke-width="1.5" fill="none"/>
  <!-- stage floor -->
  <line x1="80" y1="250" x2="420" y2="250" stroke="#D4A843" stroke-width="2"/>
  <!-- footlights -->
  <circle cx="150" cy="256" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="200" cy="256" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="250" cy="256" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="300" cy="256" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="350" cy="256" r="4" fill="#D4A843" opacity="0.6"/>
  <!-- musical notes -->
  <text x="130" y="115" font-size="16" fill="#C41E3A" opacity="0.4">&#9835;</text>
  <text x="360" y="115" font-size="14" fill="#2B4C7E" opacity="0.4">&#9834;</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>