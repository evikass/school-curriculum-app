<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Концерт и симфония</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Знакомимся с концертной музыкой</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- conductor podium -->
  <rect x="220" y="210" width="60" height="10" rx="2" fill="#1a1a1a" opacity="0.5"/>
  <rect x="230" y="200" width="40" height="12" rx="2" fill="#D4A843" opacity="0.5"/>
  <!-- conductor figure -->
  <circle cx="250" cy="155" r="10" fill="#1a1a1a"/>
  <line x1="250" y1="165" x2="250" y2="200" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- raised arms with baton -->
  <line x1="250" y1="175" x2="220" y2="140" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="250" y1="175" x2="290" y2="130" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- baton -->
  <line x1="290" y1="130" x2="305" y2="115" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
  <!-- orchestra sections - semicircle of heads -->
  <g opacity="0.5">
  <!-- violins left -->
  <circle cx="130" cy="190" r="6" fill="#C41E3A"/>
  <circle cx="155" cy="180" r="6" fill="#C41E3A"/>
  <circle cx="180" cy="175" r="6" fill="#C41E3A"/>
  <!-- violins right -->
  <circle cx="370" cy="190" r="6" fill="#C41E3A"/>
  <circle cx="345" cy="180" r="6" fill="#C41E3A"/>
  <circle cx="320" cy="175" r="6" fill="#C41E3A"/>
  <!-- cellos back -->
  <circle cx="160" cy="240" r="6" fill="#2B4C7E"/>
  <circle cx="190" cy="245" r="6" fill="#2B4C7E"/>
  <circle cx="310" cy="245" r="6" fill="#2B4C7E"/>
  <circle cx="340" cy="240" r="6" fill="#2B4C7E"/>
  <!-- winds center back -->
  <circle cx="220" cy="250" r="6" fill="#D4A843"/>
  <circle cx="250" cy="255" r="6" fill="#D4A843"/>
  <circle cx="280" cy="250" r="6" fill="#D4A843"/>
  </g>
  <!-- music stands -->
  <line x1="130" y1="200" x2="130" y2="178" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="122" y="170" width="16" height="10" fill="#1a1a1a" opacity="0.3"/>
  <line x1="370" y1="200" x2="370" y2="178" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="362" y="170" width="16" height="10" fill="#1a1a1a" opacity="0.3"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>