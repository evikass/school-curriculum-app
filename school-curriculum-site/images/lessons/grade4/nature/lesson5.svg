<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Царство бактерий</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Самые маленькие живые организмы</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Microscope body -->
  <rect x="30" y="95" width="130" height="200" rx="10" fill="#37474F" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="40" y="105" width="110" height="80" rx="6" fill="#E8F5E9"/>
  
  <!-- Eyepiece -->
  <rect x="85" y="82" width="20" height="18" rx="3" fill="#546E7A" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="80" y="78" width="30" height="8" rx="3" fill="#455A64" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Objective lens -->
  <rect x="55" y="185" width="10" height="20" rx="2" fill="#455A64" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="80" y="190" width="10" height="25" rx="2" fill="#455A64" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="105" y="185" width="10" height="20" rx="2" fill="#455A64" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Stage -->
  <rect x="50" y="210" width="80" height="6" rx="2" fill="#78909C"/>
  
  <!-- Base -->
  <rect x="20" y="280" width="150" height="15" rx="4" fill="#37474F" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="75" y="260" width="30" height="25" rx="3" fill="#455A64" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Bacteria in microscope view -->
  <circle cx="60" cy="125" r="5" fill="#C41E3A" opacity="0.6"/>
  <circle cx="70" cy="130" r="5" fill="#C41E3A" opacity="0.6"/>
  <circle cx="80" cy="122" r="5" fill="#C41E3A" opacity="0.6"/>
  <circle cx="55" cy="140" r="4" fill="#C41E3A" opacity="0.5"/>
  
  <!-- Bacilli (rods) -->
  <rect x="95" y="135" width="18" height="5" rx="2.5" fill="#2B4C7E" opacity="0.6" transform="rotate(-15,104,137)"/>
  <rect x="100" y="148" width="15" height="5" rx="2.5" fill="#2B4C7E" opacity="0.5" transform="rotate(10,107,150)"/>
  <rect x="90" y="115" width="20" height="5" rx="2.5" fill="#2B4C7E" opacity="0.6" transform="rotate(-5,100,117)"/>
  
  <!-- Spirilla -->
  <path d="M110,160 Q115,155 120,160 Q125,165 130,160 Q135,155 140,160" fill="none" stroke="#2E7D32" stroke-width="2.5" opacity="0.7"/>
  
  <!-- Zoomed view - large circle on right -->
  <circle cx="320" cy="200" r="85" fill="#E8F5E9" stroke="#1a1a1a" stroke-width="2" opacity="0.8"/>
  <circle cx="320" cy="200" r="85" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  
  <!-- Large cocci cluster -->
  <circle cx="280" cy="170" r="12" fill="#C41E3A" opacity="0.5" stroke="#C41E3A" stroke-width="1"/>
  <circle cx="300" cy="165" r="12" fill="#C41E3A" opacity="0.5" stroke="#C41E3A" stroke-width="1"/>
  <circle cx="315" cy="175" r="12" fill="#C41E3A" opacity="0.5" stroke="#C41E3A" stroke-width="1"/>
  <circle cx="295" cy="182" r="12" fill="#C41E3A" opacity="0.45" stroke="#C41E3A" stroke-width="1"/>
  
  <!-- Large bacilli -->
  <rect x="340" y="195" width="40" height="12" rx="6" fill="#2B4C7E" opacity="0.5" stroke="#2B4C7E" stroke-width="1" transform="rotate(25,360,201)"/>
  <rect x="355" y="215" width="35" height="11" rx="5.5" fill="#2B4C7E" opacity="0.45" stroke="#2B4C7E" stroke-width="1" transform="rotate(15,372,220)"/>
  
  <!-- Large spirillum -->
  <path d="M260,220 Q275,205 290,220 Q305,235 320,220 Q335,205 350,220" fill="none" stroke="#2E7D32" stroke-width="4" opacity="0.6"/>
  
  <!-- Labels -->
  <text x="295" y="155" font-family="Arial" font-size="10" fill="#C41E3A" text-anchor="middle" font-weight="bold">Кокки</text>
  <text x="390" y="195" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" font-weight="bold">Палочки</text>
  <text x="305" y="248" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Спиральки</text>
  
  <!-- Connection line microscope to zoomed view -->
  <line x1="150" y1="145" x2="240" y2="175" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  
  <!-- Useful/harmful labels -->
  <rect x="200" y="88" width="100" height="20" rx="4" fill="#2E7D32" opacity="0.12"/>
  <text x="250" y="102" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Полезные бактерии</text>
  <rect x="320" y="88" width="90" height="20" rx="4" fill="#C41E3A" opacity="0.12"/>
  <text x="365" y="102" font-family="Arial" font-size="9" fill="#C41E3A" text-anchor="middle">Вредные бактерии</text>
  
  <!-- Soap/hand icon for hygiene -->
  <rect x="430" y="280" width="45" height="25" rx="8" fill="#2B4C7E" opacity="0.2" stroke="#2B4C7E" stroke-width="1"/>
  <text x="452" y="296" font-family="Arial" font-size="8" fill="#2B4C7E" text-anchor="middle">Мыло</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>