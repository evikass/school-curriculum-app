<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Что такое климат</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Многолетний режим погоды</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Thermometer -->
  <rect x="155" y="120" width="12" height="120" rx="6" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="159" y="160" width="4" height="80" rx="2" fill="#C41E3A"/>
  <circle cx="161" cy="248" r="14" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="161" cy="248" r="9" fill="#C41E3A"/>
  <!-- Thermometer scale marks -->
  <line x1="167" y1="140" x2="175" y2="140" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="167" y1="160" x2="173" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="167" y1="180" x2="175" y2="180" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="167" y1="200" x2="173" y2="200" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="167" y1="220" x2="175" y2="220" stroke="#1a1a1a" stroke-width="1"/>
  <text x="178" y="143" font-family="Arial" font-size="8" fill="#666">40</text>
  <text x="178" y="183" font-family="Arial" font-size="8" fill="#666">20</text>
  <text x="178" y="223" font-family="Arial" font-size="8" fill="#666">0</text>
  
  <!-- Sun with rays -->
  <circle cx="310" cy="110" r="28" fill="#D4A843" opacity="0.85"/>
  <line x1="310" y1="75" x2="310" y2="65" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="310" y1="145" x2="310" y2="155" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="275" y1="110" x2="265" y2="110" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="345" y1="110" x2="355" y2="110" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="286" y1="86" x2="279" y2="79" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="334" y1="86" x2="341" y2="79" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="286" y1="134" x2="279" y2="141" stroke="#D4A843" stroke-width="2.5"/>
  <line x1="334" y1="134" x2="341" y2="141" stroke="#D4A843" stroke-width="2.5"/>
  
  <!-- Clouds -->
  <ellipse cx="120" cy="100" rx="30" ry="15" fill="#BDBDBD" opacity="0.7"/>
  <ellipse cx="140" cy="95" rx="25" ry="18" fill="#E0E0E0" opacity="0.7"/>
  <ellipse cx="105" cy="95" rx="20" ry="14" fill="#E0E0E0" opacity="0.6"/>
  
  <!-- Rain drops -->
  <line x1="115" y1="118" x2="112" y2="135" stroke="#2B4C7E" stroke-width="1.5" opacity="0.6"/>
  <line x1="128" y1="118" x2="125" y2="138" stroke="#2B4C7E" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="116" x2="137" y2="132" stroke="#2B4C7E" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Wind arrows -->
  <g transform="translate(230, 170)">
    <line x1="0" y1="0" x2="60" y2="-10" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
    <polyline points="55,-15 65,-10 55,-5" fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(230, 190)">
    <line x1="0" y1="0" x2="50" y2="-8" stroke="#1a1a1a" stroke-width="1.5" opacity="0.35"/>
    <polyline points="46,-12 54,-8 46,-4" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.35"/>
  </g>
  
  <!-- Weather vane -->
  <line x1="395" y1="100" x2="395" y2="260" stroke="#1a1a1a" stroke-width="3"/>
  <polygon points="395,100 380,130 410,130" fill="#C41E3A" opacity="0.8"/>
  <polygon points="395,100 380,115 410,115" fill="#D4A843" opacity="0.8"/>
  <circle cx="395" cy="260" r="8" fill="#1a1a1a" opacity="0.3"/>
  <line x1="385" y1="260" x2="405" y2="260" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Data labels -->
  <text x="310" y="160" font-family="Arial" font-size="10" fill="#C41E3A" text-anchor="middle" font-weight="bold">+25</text>
  <text x="100" y="160" font-family="Arial" font-size="9" fill="#2B4C7E" text-anchor="middle">дождь</text>
  <text x="395" y="280" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">флюгер</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>