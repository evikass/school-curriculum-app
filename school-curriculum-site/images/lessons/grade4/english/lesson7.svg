<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 7:  Части тела</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Body parts</text>

  
  <!-- Body outline -->
  <!-- Head -->
  <circle cx="250" cy="130" r="28" fill="none" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="240" cy="125" r="3" fill="#1a1a1a"/>
  <circle cx="260" cy="125" r="3" fill="#1a1a1a"/>
  <!-- Smile -->
  <path d="M240 138 Q250 146 260 138" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Neck -->
  <line x1="250" y1="158" x2="250" y2="170" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Torso -->
  <rect x="220" y="170" width="60" height="70" rx="8" fill="none" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Arms -->
  <line x1="220" y1="185" x2="175" y2="230" stroke="#2B4C7E" stroke-width="2.5"/>
  <line x1="280" y1="185" x2="325" y2="230" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Hands -->
  <circle cx="170" cy="235" r="8" fill="none" stroke="#2B4C7E" stroke-width="2"/>
  <circle cx="330" cy="235" r="8" fill="none" stroke="#2B4C7E" stroke-width="2"/>
  <!-- Legs -->
  <line x1="235" y1="240" x2="225" y2="295" stroke="#2B4C7E" stroke-width="2.5"/>
  <line x1="265" y1="240" x2="275" y2="295" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="218" cy="300" rx="15" ry="6" fill="none" stroke="#2B4C7E" stroke-width="2"/>
  <ellipse cx="282" cy="300" rx="15" ry="6" fill="none" stroke="#2B4C7E" stroke-width="2"/>
  <!-- Labels with lines -->
  <line x1="278" y1="115" x2="340" y2="105" stroke="#C41E3A" stroke-width="1"/>
  <text x="345" y="109" font-family="Arial" font-size="11" fill="#C41E3A" font-weight="bold">head</text>
  <line x1="263" y1="122" x2="340" y2="125" stroke="#C41E3A" stroke-width="1"/>
  <text x="345" y="129" font-family="Arial" font-size="11" fill="#C41E3A" font-weight="bold">eye</text>
  <line x1="250" y1="147" x2="100" y2="120" stroke="#C41E3A" stroke-width="1"/>
  <text x="70" y="124" font-family="Arial" font-size="11" fill="#C41E3A" font-weight="bold">mouth</text>
  <line x1="280" y1="200" x2="370" y2="180" stroke="#D4A843" stroke-width="1"/>
  <text x="375" y="184" font-family="Arial" font-size="11" fill="#D4A843" font-weight="bold">arm</text>
  <line x1="170" y1="235" x2="100" y2="215" stroke="#D4A843" stroke-width="1"/>
  <text x="60" y="219" font-family="Arial" font-size="11" fill="#D4A843" font-weight="bold">hand</text>
  <line x1="225" y1="270" x2="100" y2="270" stroke="#D4A843" stroke-width="1"/>
  <text x="55" y="274" font-family="Arial" font-size="11" fill="#D4A843" font-weight="bold">leg</text>
  <line x1="282" y1="300" x2="370" y2="295" stroke="#D4A843" stroke-width="1"/>
  <text x="375" y="299" font-family="Arial" font-size="11" fill="#D4A843" font-weight="bold">foot</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>