<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 22:  Погода</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Weather</text>

  
  <!-- Sun -->
  <circle cx="100" cy="145" r="25" fill="#FDD835" stroke="#F9A825" stroke-width="2"/>
  <!-- Sun rays -->
  <line x1="100" y1="110" x2="100" y2="100" stroke="#FDD835" stroke-width="3"/>
  <line x1="100" y1="180" x2="100" y2="190" stroke="#FDD835" stroke-width="3"/>
  <line x1="65" y1="145" x2="55" y2="145" stroke="#FDD835" stroke-width="3"/>
  <line x1="135" y1="145" x2="145" y2="145" stroke="#FDD835" stroke-width="3"/>
  <line x1="77" y1="122" x2="70" y2="115" stroke="#FDD835" stroke-width="3"/>
  <line x1="123" y1="122" x2="130" y2="115" stroke="#FDD835" stroke-width="3"/>
  <line x1="77" y1="168" x2="70" y2="175" stroke="#FDD835" stroke-width="3"/>
  <line x1="123" y1="168" x2="130" y2="175" stroke="#FDD835" stroke-width="3"/>
  <text x="100" y="210" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">SUNNY</text>
  <!-- Cloud -->
  <ellipse cx="240" cy="130" rx="40" ry="22" fill="#B0BEC5" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="215" cy="128" r="18" fill="#B0BEC5"/>
  <circle cx="245" cy="120" r="22" fill="#B0BEC5"/>
  <circle cx="265" cy="130" r="16" fill="#B0BEC5"/>
  <text x="240" y="170" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">CLOUDY</text>
  <!-- Rain cloud -->
  <ellipse cx="370" cy="120" rx="35" ry="20" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
  <circle cx="350" cy="118" r="16" fill="#78909C"/>
  <circle cx="375" cy="112" r="18" fill="#78909C"/>
  <circle cx="393" cy="120" r="14" fill="#78909C"/>
  <!-- Rain drops -->
  <line x1="355" y1="145" x2="352" y2="160" stroke="#42A5F5" stroke-width="2"/>
  <line x1="368" y1="148" x2="365" y2="163" stroke="#42A5F5" stroke-width="2"/>
  <line x1="381" y1="145" x2="378" y2="160" stroke="#42A5F5" stroke-width="2"/>
  <line x1="394" y1="148" x2="391" y2="163" stroke="#42A5F5" stroke-width="2"/>
  <text x="370" y="180" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">RAINY</text>
  <!-- Snow -->
  <ellipse cx="120" cy="240" rx="35" ry="18" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
  <circle cx="105" cy="238" r="14" fill="#B0BEC5"/>
  <circle cx="125" cy="232" r="16" fill="#B0BEC5"/>
  <circle cx="143" cy="240" r="12" fill="#B0BEC5"/>
  <!-- Snowflakes -->
  <text x="105" y="270" font-family="Arial" font-size="14" fill="#42A5F5" text-anchor="middle">*  *  *</text>
  <text x="120" y="282" font-family="Arial" font-size="14" fill="#42A5F5" text-anchor="middle">*    *</text>
  <text x="120" y="300" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">SNOWY</text>
  <!-- Wind -->
  <path d="M270 245 Q310 240 350 250 Q390 260 420 248" fill="none" stroke="#2B4C7E" stroke-width="3" stroke-linecap="round"/>
  <path d="M280 265 Q320 260 350 268 Q380 275 410 265" fill="none" stroke="#2B4C7E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M290 282 Q320 278 350 285" fill="none" stroke="#2B4C7E" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <text x="350" y="300" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">WINDY</text>
  <!-- Temperature -->
  <rect x="430" y="240" width="12" height="45" rx="6" fill="#FFFFFF" stroke="#C41E3A" stroke-width="1.5"/>
  <circle cx="436" cy="290" r="8" fill="#C41E3A" opacity="0.5" stroke="#C41E3A" stroke-width="1.5"/>
  <rect x="434" y="255" width="4" height="35" fill="#C41E3A"/>
  <text x="436" y="235" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">hot!</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>