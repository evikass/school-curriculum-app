<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 19:  Животные</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Animals</text>

  
  <!-- Cat -->
  <circle cx="90" cy="170" r="20" fill="#795548"/>
  <!-- Cat ears -->
  <polygon points="75,155 80,135 88,155" fill="#795548"/>
  <polygon points="92,155 100,135 105,155" fill="#795548"/>
  <circle cx="84" cy="167" r="3" fill="#FFFFFF"/>
  <circle cx="96" cy="167" r="3" fill="#FFFFFF"/>
  <circle cx="84" cy="167" r="1.5" fill="#1a1a1a"/>
  <circle cx="96" cy="167" r="1.5" fill="#1a1a1a"/>
  <path d="M88 177 Q90 181 92 177" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="90" y="205" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">cat</text>
  <!-- Dog -->
  <circle cx="180" cy="170" r="20" fill="#D4A843"/>
  <!-- Dog ears -->
  <ellipse cx="162" cy="165" rx="8" ry="15" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <ellipse cx="198" cy="165" rx="8" ry="15" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="174" cy="167" r="3" fill="#1a1a1a"/>
  <circle cx="186" cy="167" r="3" fill="#1a1a1a"/>
  <ellipse cx="180" cy="178" rx="5" ry="4" fill="#2E7D32"/>
  <text x="180" y="205" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">dog</text>
  <!-- Bird -->
  <ellipse cx="270" cy="155" rx="20" ry="14" fill="#42A5F5"/>
  <circle cx="260" cy="148" r="10" fill="#42A5F5"/>
  <circle cx="257" cy="146" r="2" fill="#1a1a1a"/>
  <polygon points="250,150 240,148 250,152" fill="#FB8C00"/>
  <!-- Wing -->
  <ellipse cx="280" cy="152" rx="12" ry="8" fill="#1E88E5" opacity="0.7"/>
  <!-- Legs -->
  <line x1="265" y1="168" x2="263" y2="185" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="275" y1="168" x2="277" y2="185" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="270" y="200" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">bird</text>
  <!-- Fish -->
  <ellipse cx="370" cy="160" rx="30" ry="15" fill="#81D4FA" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="400,160 420,145 420,175" fill="#81D4FA" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="352" cy="157" r="3" fill="#1a1a1a"/>
  <text x="375" y="195" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">fish</text>
  <!-- Rabbit -->
  <ellipse cx="130" cy="250" rx="18" ry="22" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <ellipse cx="123" cy="222" rx="5" ry="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <ellipse cx="137" cy="222" rx="5" ry="15" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="124" cy="244" r="2" fill="#1a1a1a"/>
  <circle cx="136" cy="244" r="2" fill="#1a1a1a"/>
  <text x="130" y="288" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">rabbit</text>
  <!-- Bear -->
  <circle cx="240" cy="255" r="22" fill="#8D6E63"/>
  <circle cx="225" cy="240" rx="8" ry="10" fill="#8D6E63"/>
  <circle cx="255" cy="240" rx="8" ry="10" fill="#8D6E63"/>
  <circle cx="234" cy="252" r="3" fill="#1a1a1a"/>
  <circle cx="246" cy="252" r="3" fill="#1a1a1a"/>
  <ellipse cx="240" cy="262" rx="6" ry="4" fill="#5D4037"/>
  <text x="240" y="293" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">bear</text>
  <!-- Frog -->
  <ellipse cx="350" cy="265" rx="22" ry="15" fill="#43A047"/>
  <circle cx="342" cy="258" r="5" fill="#43A047" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="358" cy="258" r="5" fill="#43A047" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="342" cy="258" r="2" fill="#1a1a1a"/>
  <circle cx="358" cy="258" r="2" fill="#1a1a1a"/>
  <text x="350" y="295" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">frog</text>
  <!-- Horse (simplified) -->
  <rect x="420" y="240" width="35" height="28" rx="5" fill="#A1887F" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="430" y="220" width="14" height="22" rx="4" fill="#A1887F" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="425" y1="268" x2="422" y2="295" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="445" y1="268" x2="448" y2="295" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="440" y="295" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">horse</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>