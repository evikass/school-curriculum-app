<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 20:  Транспорт</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Transport</text>

  
  <!-- Road -->
  <rect x="50" y="270" width="400" height="8" fill="#616161"/>
  <line x1="80" y1="274" x2="420" y2="274" stroke="#FDD835" stroke-width="1.5" stroke-dasharray="15,10"/>
  <!-- Car -->
  <rect x="80" y="245" width="65" height="25" rx="5" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="90" y="230" width="40" height="18" rx="4" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="93" y="233" width="14" height="12" rx="2" fill="#B3E5FC"/>
  <rect x="113" y="233" width="14" height="12" rx="2" fill="#B3E5FC"/>
  <circle cx="95" cy="272" r="7" fill="#1a1a1a"/>
  <circle cx="130" cy="272" r="7" fill="#1a1a1a"/>
  <text x="112" y="300" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">car</text>
  <!-- Bus -->
  <rect x="195" y="225" width="80" height="45" rx="5" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="200" y="232" width="15" height="15" rx="2" fill="#B3E5FC"/>
  <rect x="220" y="232" width="15" height="15" rx="2" fill="#B3E5FC"/>
  <rect x="240" y="232" width="15" height="15" rx="2" fill="#B3E5FC"/>
  <rect x="200" y="252" width="15" height="12" rx="2" fill="#B3E5FC"/>
  <rect x="220" y="252" width="15" height="12" rx="2" fill="#B3E5FC"/>
  <rect x="240" y="252" width="15" height="12" rx="2" fill="#B3E5FC"/>
  <circle cx="210" cy="272" r="7" fill="#1a1a1a"/>
  <circle cx="260" cy="272" r="7" fill="#1a1a1a"/>
  <text x="235" y="300" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">bus</text>
  <!-- Train -->
  <rect x="320" y="225" width="90" height="42" rx="4" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="325" y="232" width="18" height="16" rx="2" fill="#B3E5FC"/>
  <rect x="348" y="232" width="18" height="16" rx="2" fill="#B3E5FC"/>
  <rect x="371" y="232" width="18" height="16" rx="2" fill="#B3E5FC"/>
  <rect x="394" y="232" width="12" height="16" rx="2" fill="#C41E3A"/>
  <circle cx="335" cy="272" r="6" fill="#1a1a1a"/>
  <circle cx="395" cy="272" r="6" fill="#1a1a1a"/>
  <text x="365" y="300" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">train</text>
  <!-- Plane -->
  <rect x="220" y="120" width="60" height="15" rx="5" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="280,127 310,115 310,140" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="235,120 220,100 250,120" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="255,135 240,155 270,135" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1"/>
  <ellipse cx="225" cy="125" rx="8" ry="6" fill="#B3E5FC" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="270" y="170" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">plane</text>
  <!-- Bicycle -->
  <circle cx="120" cy="160" r="15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="165" cy="160" r="15" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="135" y1="160" x2="150" y2="140" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="150" y1="140" x2="165" y2="160" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="135" y1="160" x2="150" y2="155" stroke="#1a1a1a" stroke-width="2"/>
  <text x="142" y="190" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">bicycle</text>
  <!-- Ship -->
  <path d="M380 145 Q380 160 400 165 Q420 170 440 165 Q460 160 460 145 Z" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="410" y="118" width="6" height="27" fill="#1a1a1a"/>
  <polygon points="416,120 445,130 416,140" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="420" y="182" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">ship</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>