<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 21:  Спорт</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Sports</text>

  
  <!-- Football/soccer ball -->
  <circle cx="100" cy="180" r="30" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="100,158 115,170 110,188 90,188 85,170" fill="#1a1a1a" opacity="0.3"/>
  <text x="100" y="225" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">football</text>
  <!-- Tennis racket -->
  <ellipse cx="230" cy="160" rx="25" ry="35" fill="none" stroke="#D4A843" stroke-width="3"/>
  <line x1="230" y1="125" x2="230" y2="195" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="160" x2="250" y2="160" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <rect x="228" y="192" width="8" height="40" rx="2" fill="#795548" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Tennis ball -->
  <circle cx="280" cy="230" r="10" fill="#C8E6C9" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M275 225 Q280 230 285 225" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <text x="230" y="250" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">tennis</text>
  <!-- Basketball hoop -->
  <rect x="360" y="120" width="60" height="3" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="355" y="95" width="5" height="28" fill="#1a1a1a"/>
  <circle cx="415" cy="140" r="18" fill="none" stroke="#C41E3A" stroke-width="2"/>
  <line x1="397" y1="140" x2="433" y2="140" stroke="#C41E3A" stroke-width="1"/>
  <!-- Basketball -->
  <circle cx="415" cy="185" r="15" fill="#FB8C00" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="400" y1="185" x2="430" y2="185" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="415" y1="170" x2="415" y2="200" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="395" y="215" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">basketball</text>
  <!-- Swimming pool -->
  <rect x="60" y="255" width="120" height="45" rx="3" fill="#81D4FA" stroke="#2B4C7E" stroke-width="2"/>
  <line x1="60" y1="270" x2="180" y2="270" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="285" x2="180" y2="285" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <!-- Swimmer -->
  <circle cx="130" cy="272" r="6" fill="#1a1a1a" opacity="0.4"/>
  <line x1="120" y1="275" x2="145" y2="272" stroke="#1a1a1a" stroke-width="2" opacity="0.4"/>
  <text x="120" y="310" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">swimming</text>
  <!-- Goal posts -->
  <rect x="220" y="260" width="4" height="30" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="300" y="260" width="4" height="30" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="218" y="258" width="88" height="4" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <text x="262" y="305" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">goal</text>
  <!-- Running track -->
  <ellipse cx="420" cy="280" rx="50" ry="18" fill="none" stroke="#C41E3A" stroke-width="2"/>
  <ellipse cx="420" cy="280" rx="40" ry="13" fill="none" stroke="#C41E3A" stroke-width="1.5"/>
  <!-- Runner -->
  <circle cx="400" cy="262" r="5" fill="#2B4C7E"/>
  <line x1="405" y1="267" x2="415" y2="275" stroke="#2B4C7E" stroke-width="2"/>
  <text x="420" y="310" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">running</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>