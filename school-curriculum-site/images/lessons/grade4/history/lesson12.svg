<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Освобождение</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Стояние на реке Угре и конец ига</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- River Ugra (center, vertical - dividing the armies) -->
  <rect x="230" y="100" width="40" height="190" fill="#2B4C7E" opacity="0.35"/>
  <path d="M230,100 Q250,95 270,100 Q250,115 230,115 Q250,130 270,130 Q250,145 230,145 Q250,160 270,160 Q250,175 230,175 Q250,190 270,190 Q250,205 230,205 Q250,220 270,220 Q250,235 230,235 Q250,250 270,250 Q250,265 230,265 Q250,280 270,280 Q250,295 230,295" fill="none" stroke="#2B4C7E" stroke-width="3" opacity="0.6"/>
  <!-- Ice floes (it's November) -->
  <polygon points="235,200 245,195 250,202 240,207" fill="#A8C4E0" opacity="0.5"/>
  <polygon points="248,240 258,235 262,242 252,247" fill="#A8C4E0" opacity="0.5"/>
  <polygon points="232,170 242,167 245,174 237,177" fill="#A8C4E0" opacity="0.4"/>
  <polygon points="250,140 258,137 260,143 254,146" fill="#A8C4E0" opacity="0.4"/>

  <!-- Russian army (left of river) -->
  <!-- Soldiers in formation -->
  <circle cx="60" cy="160" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="53" y="170" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <circle cx="90" cy="165" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="83" y="175" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <circle cx="120" cy="162" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="113" y="172" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <circle cx="150" cy="168" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="143" y="178" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <circle cx="60" cy="210" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="53" y="220" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <circle cx="90" cy="215" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="83" y="225" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <circle cx="120" cy="212" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="113" y="222" width="14" height="22" fill="#2B4C7E" rx="2"/>
  <!-- Russian banner -->
  <line x1="175" y1="110" x2="175" y2="250" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="176" y="115" width="40" height="30" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="192" y="118" width="6" height="24" fill="#D4A843"/>
  <rect x="185" y="127" width="20" height="5" fill="#D4A843"/>
  <!-- Spears -->
  <line x1="75" y1="150" x2="75" y2="200" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="105" y1="155" x2="105" y2="205" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="135" y1="152" x2="135" y2="202" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Mongol army (right of river) -->
  <!-- Horsemen -->
  <ellipse cx="340" cy="170" rx="35" ry="16" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="360" cy="155" r="9" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.8"/>
  <rect x="354" y="164" width="12" height="16" fill="#C41E3A" opacity="0.5"/>
  <ellipse cx="380" cy="195" rx="32" ry="14" fill="#1a1a1a" opacity="0.45"/>
  <circle cx="398" cy="182" r="8" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.7"/>
  <rect x="393" y="190" width="10" height="14" fill="#C41E3A" opacity="0.4"/>
  <ellipse cx="420" cy="220" rx="30" ry="13" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="436" cy="208" r="8" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.6"/>
  <!-- Mongol banner -->
  <line x1="460" y1="120" x2="460" y2="260" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="460,120 485,130 460,142" fill="#C41E3A" opacity="0.6"/>

  <!-- Ivan III figure (left foreground) -->
  <circle cx="190" cy="260" r="14" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Crown -->
  <path d="M176,256 Q190,242 204,256" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="190" cy="242" r="3" fill="#C41E3A"/>
  <!-- Robe -->
  <path d="M175,274 L170,300 L210,300 L205,274" fill="#D4A843" opacity="0.7" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Scepter -->
  <line x1="210" y1="265" x2="225" y2="240" stroke="#D4A843" stroke-width="2"/>
  <circle cx="226" cy="238" r="4" fill="#D4A843"/>

  <!-- Moscow Kremlin silhouette (far left background) -->
  <rect x="10" y="120" width="40" height="80" fill="#C41E3A" opacity="0.3"/>
  <polygon points="10,120 30,100 50,120" fill="#D4A843" opacity="0.3"/>
  <rect x="25" y="100" width="3" height="12" fill="#D4A843" opacity="0.3"/>

  <!-- Broken chain (bottom center, symbolizing liberation) -->
  <path d="M215,295 Q225,285 235,290 Q240,292 245,290" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.5"/>
  <path d="M255,290 Q260,288 265,290 Q275,295 285,285" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.5"/>
  <line x1="248" y1="287" x2="252" y2="287" stroke="#F5E6C8" stroke-width="4"/>

  <!-- Date and title -->
  <rect x="170" y="292" width="160" height="20" fill="#C41E3A" opacity="0.85" rx="2"/>
  <text x="250" y="306" font-family="Arial, sans-serif" font-size="11" fill="#F5E6C8" text-anchor="middle" font-weight="bold">1480 год - Стояние на Угре</text>

</svg>