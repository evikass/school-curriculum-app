<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Князь Владимир</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Креститель Руси: выбор веры и крещение</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Large cross (center top, dominant) -->
  <rect x="242" y="95" width="16" height="100" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="215" y="120" width="70" height="12" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Cross glow -->
  <circle cx="250" cy="140" r="55" fill="#D4A843" opacity="0.08"/>
  <circle cx="250" cy="140" r="40" fill="#D4A843" opacity="0.08"/>

  <!-- River Dnieper (bottom half) -->
  <rect x="0" y="240" width="500" height="75" fill="#2B4C7E" opacity="0.25"/>
  <path d="M0,240 Q50,232 100,240 Q150,248 200,240 Q250,232 300,240 Q350,248 400,240 Q450,232 500,240" fill="none" stroke="#2B4C7E" stroke-width="2" opacity="0.6"/>
  <path d="M0,250 Q50,244 100,250 Q150,256 200,250 Q250,244 300,250 Q350,256 400,250 Q450,244 500,250" fill="none" stroke="#2B4C7E" stroke-width="1.5" opacity="0.4"/>

  <!-- People in the river (baptism scene) - simplified figures -->
  <!-- Figure 1 -->
  <circle cx="150" cy="250" r="8" fill="#DCC9A3"/>
  <rect x="145" y="258" width="10" height="20" fill="#2B4C7E" opacity="0.5" rx="2"/>
  <!-- Figure 2 -->
  <circle cx="200" cy="255" r="8" fill="#DCC9A3"/>
  <rect x="195" y="263" width="10" height="18" fill="#2B4C7E" opacity="0.5" rx="2"/>
  <!-- Figure 3 -->
  <circle cx="300" cy="255" r="8" fill="#DCC9A3"/>
  <rect x="295" y="263" width="10" height="18" fill="#2B4C7E" opacity="0.5" rx="2"/>
  <!-- Figure 4 -->
  <circle cx="350" cy="250" r="8" fill="#DCC9A3"/>
  <rect x="345" y="258" width="10" height="20" fill="#2B4C7E" opacity="0.5" rx="2"/>

  <!-- Church being built (left) -->
  <!-- Base -->
  <rect x="40" y="180" width="70" height="60" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="65" y="215" width="20" height="25" fill="#8B6914" rx="10"/>
  <!-- Dome -->
  <path d="M40,180 Q75,120 110,180" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Cross on dome -->
  <rect x="73" y="128" width="4" height="18" fill="#D4A843"/>
  <rect x="67" y="134" width="16" height="4" fill="#D4A843"/>
  <!-- Windows -->
  <rect x="52" y="195" width="10" height="14" fill="#A8C4E0" rx="5"/>
  <rect x="88" y="195" width="10" height="14" fill="#A8C4E0" rx="5"/>

  <!-- Church being built (right) - scaffolding -->
  <rect x="380" y="175" width="75" height="65" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Scaffold lines -->
  <line x1="375" y1="185" x2="455" y2="185" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="375" y1="210" x2="455" y2="210" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="380" y1="175" x2="380" y2="240" stroke="#8B6914" stroke-width="1"/>
  <line x1="455" y1="175" x2="455" y2="240" stroke="#8B6914" stroke-width="1"/>
  <!-- Partial dome -->
  <path d="M380,175 Q417,130 455,175" fill="none" stroke="#D4A843" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Broken pagan idol (right of cross) -->
  <rect x="350" y="185" width="15" height="40" fill="#1a1a1a" opacity="0.4" transform="rotate(-15, 357, 205)"/>
  <!-- Crack through idol -->
  <path d="M348,190 L355,210 L362,195" fill="none" stroke="#F5E6C8" stroke-width="2"/>

  <!-- Rays from cross -->
  <line x1="250" y1="100" x2="250" y2="92" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>
  <line x1="235" y1="103" x2="230" y2="96" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>
  <line x1="265" y1="103" x2="270" y2="96" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>

  <!-- Year label -->
  <rect x="195" y="290" width="110" height="20" fill="#C41E3A" opacity="0.15" rx="3"/>
  <text x="250" y="304" font-family="Arial, sans-serif" font-size="12" fill="#C41E3A" text-anchor="middle" font-weight="bold">988 год</text>

</svg>