<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Ярослав Мудрый</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Расцвет Руси: законы и строительство</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Golden Gates (center, large) -->
  <!-- Gate base/arch -->
  <rect x="150" y="120" width="200" height="170" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Arch top -->
  <path d="M150,120 Q250,70 350,120" fill="#D4A843" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Gate opening -->
  <rect x="195" y="155" width="110" height="135" fill="#F5E6C8" stroke="#8B6914" stroke-width="2"/>
  <!-- Arch inside -->
  <path d="M195,155 Q250,120 305,155" fill="#A8C4E0" stroke="#8B6914" stroke-width="1.5" opacity="0.5"/>
  <!-- Gate decorations - columns -->
  <rect x="155" y="120" width="12" height="170" fill="#D4A843" opacity="0.7"/>
  <rect x="333" y="120" width="12" height="170" fill="#D4A843" opacity="0.7"/>
  <!-- Dots/rivets on gate -->
  <circle cx="215" cy="190" r="4" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="250" cy="190" r="4" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="285" cy="190" r="4" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="215" cy="220" r="4" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="250" cy="220" r="4" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="285" cy="220" r="4" fill="#D4A843" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Tower tops -->
  <polygon points="140,120 161,95 182,120" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="318,120 339,95 360,120" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Crown (top center) -->
  <path d="M230,100 L235,88 L242,95 L250,82 L258,95 L265,88 L270,100" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="228" y="100" width="44" height="8" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="250" cy="82" r="4" fill="#C41E3A"/>
  <circle cx="235" cy="88" r="3" fill="#2B4C7E"/>
  <circle cx="265" cy="88" r="3" fill="#2B4C7E"/>

  <!-- Scroll of Russian Pravda (left) -->
  <rect x="20" y="160" width="100" height="120" fill="#DCC9A3" stroke="#8B6914" stroke-width="1.5" rx="2"/>
  <!-- Scroll top/bottom rolls -->
  <ellipse cx="70" cy="162" rx="55" ry="6" fill="#8B6914" opacity="0.6"/>
  <ellipse cx="70" cy="278" rx="55" ry="6" fill="#8B6914" opacity="0.6"/>
  <!-- Text lines -->
  <line x1="32" y1="180" x2="108" y2="180" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="190" x2="105" y2="190" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="200" x2="108" y2="200" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="210" x2="100" y2="210" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="220" x2="108" y2="220" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="230" x2="95" y2="230" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="240" x2="108" y2="240" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="250" x2="102" y2="250" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="260" x2="108" y2="260" stroke="#1a1a1a" stroke-width="0.8" opacity="0.4"/>
  <!-- Seal -->
  <circle cx="70" cy="155" r="10" fill="#C41E3A" stroke="#D4A843" stroke-width="1.5"/>
  <text x="70" y="158" font-family="Arial, sans-serif" font-size="7" fill="#D4A843" text-anchor="middle">P</text>
  <text x="70" y="145" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Русская Правда</text>

  <!-- Sofia Cathedral (right, small) -->
  <rect x="390" y="170" width="80" height="90" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Domes -->
  <circle cx="415" cy="165" r="14" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="445" cy="165" r="14" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="475" cy="165" r="14" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Crosses on domes -->
  <line x1="415" y1="151" x2="415" y2="143" stroke="#D4A843" stroke-width="2"/>
  <line x1="445" y1="151" x2="445" y2="143" stroke="#D4A843" stroke-width="2"/>
  <line x1="475" y1="151" x2="475" y2="143" stroke="#D4A843" stroke-width="2"/>
  <!-- Windows -->
  <circle cx="420" cy="210" r="6" fill="#A8C4E0" opacity="0.6"/>
  <circle cx="450" cy="210" r="6" fill="#A8C4E0" opacity="0.6"/>

  <!-- Bauhaus decorative lines -->
  <rect x="0" y="295" width="500" height="2" fill="#D4A843" opacity="0.3"/>
  <rect x="10" y="100" width="6" height="6" fill="#C41E3A" opacity="0.5"/>
  <rect x="484" y="100" width="6" height="6" fill="#2B4C7E" opacity="0.5"/>

</svg>