<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Правила безопасного интернета</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Безопасный интернет</text>
  <!-- Illustration area -->
  <path d="M250,110 L310,135 L310,185 Q310,240 250,265 Q190,240 190,185 L190,135 Z" fill="#C41E3A" opacity="0.15" stroke="#C41E3A" stroke-width="2.5"/><path d="M250,125 L300,145 L300,185 Q300,230 250,250 Q200,230 200,185 L200,145 Z" fill="{CREAM}" stroke="#C41E3A" stroke-width="1.5"/><polyline points="222,188 242,208 278,168" fill="none" stroke="#00AA00" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="250" y="290" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Никогда не сообщай личную информацию!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>