<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Итоговый проект</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Безопасный интернет</text>
  <!-- Illustration area -->
  <rect x="155" y="110" width="190" height="155" rx="5" fill="#fff" stroke="#C41E3A" stroke-width="3"/><rect x="160" y="115" width="180" height="30" rx="3" fill="#C41E3A" opacity="0.85"/><text x="250" y="136" text-anchor="middle" font-size="14" fill="#fff" font-family="Arial" font-weight="bold">С Днём Рождения!</text><text x="250" y="165" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">Поздравляем!</text><text x="250" y="185" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">Желаем счастья</text><text x="250" y="205" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">и успехов!</text><!-- Balloons --><ellipse cx="180" cy="120" rx="12" ry="16" fill="#C41E3A" opacity="0.7"/><ellipse cx="210" cy="115" rx="11" ry="15" fill="#2B4C7E" opacity="0.7"/><ellipse cx="290" cy="118" rx="12" ry="14" fill="#D4A843" opacity="0.7"/><ellipse cx="315" cy="122" rx="10" ry="14" fill="#00AA00" opacity="0.7"/><text x="250" y="290" text-anchor="middle" font-size="11" fill="#D4A843" font-weight="bold" font-family="Arial">Paint: рисунок + текст</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>