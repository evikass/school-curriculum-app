<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Сложение дробей</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Сложение дробей с одинаковыми знаменателями</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Fraction bars -->
  <!-- 1/4 bar -->
  <rect x="40" y="100" width="160" height="40" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="2" rx="4" />
  <rect x="40" y="100" width="40" height="40" fill="#C41E3A" opacity="0.7" rx="4" />
  <text x="120" y="125" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">1/4</text>
  
  <!-- Plus sign -->
  <text x="230" y="128" text-anchor="middle" fill="#C41E3A" font-size="30" font-weight="bold">+</text>
  
  <!-- 2/4 bar -->
  <rect x="270" y="100" width="160" height="40" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="2" rx="4" />
  <rect x="270" y="100" width="80" height="40" fill="#2B4C7E" opacity="0.7" rx="4" />
  <text x="350" y="125" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">2/4</text>
  
  <!-- Equals -->
  <text x="250" y="175" text-anchor="middle" fill="#C41E3A" font-size="24" font-weight="bold">=</text>
  
  <!-- 3/4 bar -->
  <rect x="100" y="190" width="300" height="40" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="2" rx="4" />
  <rect x="100" y="190" width="225" height="40" fill="#D4A843" opacity="0.7" rx="4" />
  <text x="250" y="215" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">3/4</text>
  
  <!-- Formula -->
  <rect x="130" y="245" width="240" height="30" fill="white" opacity="0.5" rx="4" stroke="#C41E3A" stroke-width="1" />
  <text x="250" y="266" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">1/4 + 2/4 = (1+2)/4 = 3/4</text>
  
  <!-- Rule -->
  <text x="250" y="296" text-anchor="middle" fill="#2B4C7E" font-size="11">Правило: складываем числители, знаменатель остаётся</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>