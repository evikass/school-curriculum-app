<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Вычитание многозначных чисел</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Вычитание столбиком многозначных чисел</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Column subtraction -->
  <rect x="140" y="95" width="220" height="170" fill="white" opacity="0.6" rx="6" stroke="#1a1a1a" stroke-width="1" />
  
  <!-- Numbers -->
  <text x="330" y="140" text-anchor="middle" fill="#C41E3A" font-size="28" font-weight="bold">-</text>
  <text x="250" y="155" text-anchor="middle" fill="#1a1a1a" font-size="30" font-weight="bold" font-family="'Courier New', monospace">45 000</text>
  <text x="250" y="195" text-anchor="middle" fill="#1a1a1a" font-size="30" font-weight="bold" font-family="'Courier New', monospace">12 345</text>
  <line x1="170" y1="205" x2="330" y2="205" stroke="#1a1a1a" stroke-width="3" />
  <text x="250" y="245" text-anchor="middle" fill="#C41E3A" font-size="30" font-weight="bold" font-family="'Courier New', monospace">32 655</text>
  
  <!-- Borrowing annotations -->
  <text x="145" y="150" text-anchor="end" fill="#2B4C7E" font-size="9">занимаем</text>
  <text x="145" y="163" text-anchor="end" fill="#2B4C7E" font-size="9">у тысяч</text>
  
  <!-- Step highlights -->
  <rect x="300" y="260" width="170" height="35" fill="#2B4C7E" opacity="0.1" rx="4" />
  <text x="385" y="278" text-anchor="middle" fill="#1a1a1a" font-size="11">10-5=5</text>
  <text x="385" y="290" text-anchor="middle" fill="#1a1a1a" font-size="11">9-4=5</text>
  
  <rect x="30" y="260" width="170" height="35" fill="#C41E3A" opacity="0.1" rx="4" />
  <text x="115" y="278" text-anchor="middle" fill="#1a1a1a" font-size="11">9-3=6</text>
  <text x="115" y="290" text-anchor="middle" fill="#1a1a1a" font-size="11">4-2=2</text>
  
  <!-- Check -->
  <text x="250" y="308" text-anchor="middle" fill="#1a1a1a" font-size="10">Проверка: 32 655 + 12 345 = 45 000</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>