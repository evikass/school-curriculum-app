<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Деление на однозначное число</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Письменное деление уголком</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Long division bracket -->
  <rect x="120" y="90" width="260" height="180" fill="white" opacity="0.6" rx="6" stroke="#1a1a1a" stroke-width="1" />
  
  <!-- Division symbol -->
  <text x="210" y="148" text-anchor="middle" fill="#1a1a1a" font-size="30" font-weight="bold" font-family="'Courier New', monospace">4560</text>
  <!-- Bracket -->
  <line x1="280" y1="120" x2="280" y2="160" stroke="#1a1a1a" stroke-width="3" />
  <line x1="280" y1="120" x2="320" y2="120" stroke="#1a1a1a" stroke-width="3" />
  <text x="300" y="148" text-anchor="middle" fill="#C41E3A" font-size="30" font-weight="bold" font-family="'Courier New', monospace">4</text>
  <line x1="150" y1="158" x2="280" y2="158" stroke="#1a1a1a" stroke-width="2" />
  
  <!-- Quotient steps -->
  <text x="210" y="178" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="'Courier New', monospace"> -4</text>
  <text x="210" y="195" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="'Courier New', monospace"> --</text>
  <text x="210" y="212" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="'Courier New', monospace">  05</text>
  <text x="210" y="229" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="'Courier New', monospace">  -4</text>
  <text x="210" y="246" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="'Courier New', monospace">  16</text>
  <text x="210" y="263" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="'Courier New', monospace"> -16</text>
  
  <!-- Result -->
  <rect x="330" y="90" width="80" height="30" fill="#C41E3A" opacity="0.15" rx="4" />
  <text x="370" y="111" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">= 1140</text>
  
  <!-- Algorithm -->
  <rect x="50" y="280" width="400" height="28" fill="#D4A843" opacity="0.2" rx="4" />
  <text x="250" y="299" text-anchor="middle" fill="#1a1a1a" font-size="11">Алгоритм: раздели - умножь - вычти - снеси</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>