<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Задачи на движение</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Скорость, время, расстояние</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Road -->
  <rect x="40" y="170" width="420" height="40" fill="#1a1a1a" opacity="0.1" rx="5" />
  <line x1="40" y1="190" x2="460" y2="190" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="15,10" />
  
  <!-- Car -->
  <rect x="60" y="150" width="60" height="25" fill="#C41E3A" opacity="0.7" rx="5" />
  <rect x="50" y="160" width="15" height="15" fill="#C41E3A" opacity="0.7" rx="3" />
  <circle cx="75" cy="178" r="7" fill="#1a1a1a" />
  <circle cx="110" cy="178" r="7" fill="#1a1a1a" />
  
  <!-- Speed arrow -->
  <line x1="130" y1="162" x2="300" y2="162" stroke="#C41E3A" stroke-width="3" />
  <polygon points="300,162 290,156 290,168" fill="#C41E3A" />
  <text x="215" y="155" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">60 км/ч</text>
  
  <!-- Distance markers -->
  <line x1="60" y1="220" x2="60" y2="230" stroke="#2B4C7E" stroke-width="2" />
  <text x="60" y="242" text-anchor="middle" fill="#2B4C7E" font-size="10">0 км</text>
  
  <line x1="220" y1="220" x2="220" y2="230" stroke="#2B4C7E" stroke-width="2" />
  <text x="220" y="242" text-anchor="middle" fill="#2B4C7E" font-size="10">120 км</text>
  
  <line x1="380" y1="220" x2="380" y2="230" stroke="#2B4C7E" stroke-width="2" />
  <text x="380" y="242" text-anchor="middle" fill="#2B4C7E" font-size="10">240 км</text>
  
  <!-- Formula triangle -->
  <polygon points="250,260 310,305 190,305" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="2" />
  <text x="250" y="285" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">v</text>
  <line x1="210" y1="296" x2="290" y2="296" stroke="#1a1a1a" stroke-width="2" />
  <text x="220" y="312" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">s</text>
  <text x="280" y="312" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">t</text>
  
  <!-- Labels -->
  <text x="410" y="110" text-anchor="middle" fill="#1a1a1a" font-size="11">v - скорость</text>
  <text x="410" y="128" text-anchor="middle" fill="#1a1a1a" font-size="11">t - время</text>
  <text x="410" y="146" text-anchor="middle" fill="#1a1a1a" font-size="11">s - расстояние</text>
  
  <text x="410" y="175" text-anchor="middle" fill="#C41E3A" font-size="13" font-weight="bold">s = v x t</text>
  <text x="410" y="195" text-anchor="middle" fill="#2B4C7E" font-size="13" font-weight="bold">v = s : t</text>
  <text x="410" y="215" text-anchor="middle" fill="#D4A843" font-size="13" font-weight="bold">t = s : v</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>