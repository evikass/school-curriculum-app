<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Образование Древней Руси</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Рюрик, Олег и мать городов русских</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- River Dnieper -->
  <path d="M0,260 Q60,250 120,255 Q200,262 280,255 Q360,248 440,258 Q470,260 500,255" stroke="#2B4C7E" stroke-width="20" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M0,265 Q80,258 160,262 Q250,268 350,260 Q430,252 500,262" stroke="#2B4C7E" stroke-width="4" fill="none" opacity="0.2"/>
  <!-- City wall -->
  <rect x="100" y="130" width="200" height="130" fill="#C4A870" stroke="#8B7A50" stroke-width="1.5"/>
  <!-- Wall battlements -->
  <rect x="100" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="120" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="140" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="160" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="180" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="200" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="220" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="240" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="260" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <rect x="280" y="125" width="15" height="15" fill="#C4A870" stroke="#8B7A50" stroke-width="1"/>
  <!-- Golden Gate tower -->
  <rect x="170" y="90" width="50" height="50" fill="#D4A843"/>
  <polygon points="165,90 195,60 225,90" fill="#C41E3A"/>
  <!-- Tower window -->
  <rect x="185" y="105" width="14" height="18" fill="#2B1A0A" rx="7"/>
  <!-- Dome/church inside -->
  <rect x="130" y="200" width="30" height="50" fill="#D4C090"/>
  <circle cx="145" cy="200" r="15" fill="#D4A843"/>
  <line x1="145" y1="185" x2="145" y2="175" stroke="#D4A843" stroke-width="2"/>
  <line x1="145" y1="175" x2="140" y2="178" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="145" y1="175" x2="150" y2="178" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Cross on dome -->
  <line x1="145" y1="172" x2="145" y2="165" stroke="#D4A843" stroke-width="2"/>
  <line x1="141" y1="168" x2="149" y2="168" stroke="#D4A843" stroke-width="2"/>
  <!-- Boat on river (trade vessel) -->
  <path d="M30,258 Q60,270 100,258" stroke="#6B4226" stroke-width="2" fill="#8B6040"/>
  <line x1="70" y1="258" x2="70" y2="225" stroke="#6B4226" stroke-width="1.5"/>
  <polygon points="70,225 95,240 70,248" fill="#E8D5C0"/>
  <!-- Second boat -->
  <path d="M380,252 Q410,264 445,252" stroke="#6B4226" stroke-width="2" fill="#8B6040"/>
  <line x1="415" y1="252" x2="415" y2="220" stroke="#6B4226" stroke-width="1.5"/>
  <polygon points="415,220 440,235 415,242" fill="#E8D5C0"/>
  <!-- Map route line -->
  <path d="M45,290 Q150,300 250,295 Q350,290 460,300" stroke="#C41E3A" stroke-width="1" fill="none" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="250" y="308" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle" opacity="0.7">Путь из варяг в греки</text>
  <!-- Label -->
  <text x="200" y="150" font-family="Arial" font-size="11" font-weight="bold" fill="#D4A843" text-anchor="middle">КИЕВ</text>
</svg>