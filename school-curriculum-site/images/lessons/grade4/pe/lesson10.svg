<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Лыжная подготовка</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем ходьбу на лыжах</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- snow ground -->
  <path d="M80,250 Q200,240 250,245 Q350,250 420,242" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- skier -->
  <circle cx="250" cy="135" r="10" fill="#C41E3A"/>
  <!-- body leaning forward -->
  <line x1="250" y1="145" x2="265" y2="190" stroke="#C41E3A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- arms with poles -->
  <line x1="255" y1="158" x2="225" y2="175" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="258" y1="160" x2="290" y2="170" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- poles -->
  <line x1="225" y1="175" x2="210" y2="245" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
  <circle cx="210" cy="245" r="3" fill="#D4A843"/>
  <line x1="290" y1="170" x2="305" y2="245" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
  <circle cx="305" cy="245" r="3" fill="#D4A843"/>
  <!-- skis -->
  <line x1="235" y1="195" x2="215" y2="255" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="275" y1="195" x2="295" y2="255" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- legs -->
  <line x1="265" y1="190" x2="240" y2="195" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="265" y1="190" x2="280" y2="195" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- tracks -->
  <line x1="130" y1="230" x2="180" y2="235" stroke="#1a1a1a" stroke-width="0.8" opacity="0.3"/>
  <line x1="135" y1="234" x2="185" y2="239" stroke="#1a1a1a" stroke-width="0.8" opacity="0.3"/>
  <!-- pine trees -->
  <polygon points="100,220 90,260 110,260" fill="#2B4C7E" opacity="0.3"/>
  <polygon points="105,235 95,265 115,265" fill="#2B4C7E" opacity="0.3"/>
  <polygon points="400,215 390,255 410,255" fill="#2B4C7E" opacity="0.3"/>
  <polygon points="405,230 395,260 415,260" fill="#2B4C7E" opacity="0.3"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>