<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Прыжки</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем технику прыжков</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- high jump bar -->
  <line x1="180" y1="165" x2="320" y2="165" stroke="#D4A843" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="100" x2="180" y2="210" stroke="#2B4C7E" stroke-width="3"/>
  <line x1="320" y1="100" x2="320" y2="210" stroke="#2B4C7E" stroke-width="3"/>
  <!-- jumping figure Fosbury Flop -->
  <circle cx="270" cy="140" r="9" fill="#C41E3A"/>
  <path d="M260,149 Q250,165 270,180 Q290,195 300,180" stroke="#C41E3A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <line x1="265" y1="152" x2="248" y2="138" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="265" y1="155" x2="245" y2="165" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="180" x2="315" y2="165" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="295" y1="188" x2="310" y2="200" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- long jump sand pit -->
  <rect x="130" y="220" width="150" height="30" rx="3" fill="#D4A843" opacity="0.4"/>
  <line x1="280" y1="220" x2="280" y2="250" stroke="#C41E3A" stroke-width="2"/>
  <!-- landing figure -->
  <circle cx="350" cy="210" r="8" fill="#1a1a1a"/>
  <line x1="350" y1="218" x2="350" y2="248" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="350" y1="228" x2="335" y2="218" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="350" y1="228" x2="365" y2="218" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="350" y1="248" x2="340" y2="270" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="350" y1="248" x2="360" y2="270" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- runway marks -->
  <line x1="390" y1="248" x2="420" y2="248" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <line x1="395" y1="253" x2="420" y2="253" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="258" x2="420" y2="258" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>