<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Волейбол</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем основы игры в волейбол</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- court -->
  <line x1="80" y1="255" x2="420" y2="255" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="250" y1="100" x2="250" y2="255" stroke="#C41E3A" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- net -->
  <line x1="250" y1="110" x2="250" y2="255" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="230" y1="110" x2="270" y2="110" stroke="#1a1a1a" stroke-width="2"/>
  <!-- net grid -->
  <line x1="235" y1="130" x2="265" y2="130" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="237" y1="150" x2="263" y2="150" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="235" y1="170" x2="265" y2="170" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="237" y1="190" x2="263" y2="190" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <!-- posts -->
  <line x1="250" y1="100" x2="250" y2="108" stroke="#2B4C7E" stroke-width="4"/>
  <!-- left team players -->
  <circle cx="180" cy="145" r="9" fill="#2B4C7E"/>
  <line x1="180" y1="154" x2="180" y2="200" stroke="#2B4C7E" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="165" x2="165" y2="150" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="180" y1="165" x2="200" y2="148" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="180" y1="200" x2="170" y2="230" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="180" y1="200" x2="192" y2="228" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- right team player -->
  <circle cx="330" cy="135" r="9" fill="#C41E3A"/>
  <line x1="330" y1="144" x2="330" y2="192" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="330" y1="155" x2="315" y2="140" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="330" y1="155" x2="350" y2="140" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="330" y1="192" x2="320" y2="222" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="330" y1="192" x2="342" y2="220" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- volleyball -->
  <circle cx="300" cy="140" r="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M295,135 Q300,140 305,135" stroke="#1a1a1a" stroke-width="0.8" fill="none"/>
  <path d="M295,145 Q300,140 305,145" stroke="#1a1a1a" stroke-width="0.8" fill="none"/>
  <!-- score -->
  <text x="190" y="275" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2B4C7E">15</text>
  <text x="250" y="275" text-anchor="middle" font-family="Arial" font-size="14" fill="#1a1a1a">:</text>
  <text x="310" y="275" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#C41E3A">12</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>