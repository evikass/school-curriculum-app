<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect x="0" y="0" width="800" height="72" rx="0" fill="#059669" />
  <rect x="0" y="72" width="800" height="4" rx="0" fill="#047857" />
  <text x="400" y="36" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="sans-serif">Индийский и Северный Ледовитый океаны</text>
  <text x="400" y="58" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="normal" font-family="sans-serif">Особенности, характерные черты</text>
  <rect x="0" y="570" width="800" height="30" rx="0" fill="#ECFDF5" />
  <line x1="0" y1="570" x2="800" y2="570" stroke="#6EE7B7" stroke-width="1" />
  <text x="400" y="590" text-anchor="middle" fill="#9CA3AF" font-size="10" font-weight="normal" font-family="sans-serif">7 класс — География — Урок 6</text>
  <rect x="0" y="76" width="800" height="494" rx="0" fill="#ECFDF5" opacity="0.4" />
  <text x="200" y="98" text-anchor="middle" fill="#047857" font-size="15" font-weight="bold" font-family="sans-serif">Индийский океан</text>
  <ellipse cx="200" cy="240" rx="130" ry="100" fill="#0EA5E9" stroke="#0284C7" stroke-width="2" />
  <path d="M 180,180 Q 150,220 170,270" fill="none" stroke="#DC2626" stroke-width="2" />
  <text x="120" y="220" text-anchor="end" fill="#DC2626" font-size="6" font-weight="normal" font-family="sans-serif">Муссонное
течение</text>
  <path d="M 240,180 Q 270,220 250,270" fill="none" stroke="#F59E0B" stroke-width="2" />
  <text x="280" y="220" text-anchor="start" fill="#F59E0B" font-size="6" font-weight="normal" font-family="sans-serif">Муссон</text>
  <text x="200" y="360" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Площадь: 76,2 млн км²</text>
  <text x="200" y="374" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Средняя глубина: 3 711 м</text>
  <text x="200" y="388" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Наибольшая глубина: 7 729 м</text>
  <text x="200" y="402" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Самый тёплый океан</text>
  <text x="200" y="416" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Муссонный климат</text>
  <text x="200" y="430" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Омывает: Африку, Азию,</text>
  <text x="200" y="444" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Австралию, Антарктиду</text>
  <rect x="50" y="345" width="300" height="22" rx="3" fill="#FFFFFF" stroke="#059669" stroke-width="1" />
  <rect x="50" y="345" width="4" height="22" rx="2" fill="#059669" />
  <text x="62" y="360" text-anchor="start" fill="#059669" font-size="10" font-weight="bold" font-family="sans-serif">Тёплый муссонный океан</text>
  <text x="200" y="468" text-anchor="middle" fill="#047857" font-size="10" font-weight="bold" font-family="sans-serif">Ресурсы:</text>
  <text x="200" y="484" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Нефть (Персидский залив)</text>
  <text x="200" y="498" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Рыболовство</text>
  <text x="200" y="512" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Жемчуг, кораллы</text>
  <text x="600" y="98" text-anchor="middle" fill="#047857" font-size="14" font-weight="bold" font-family="sans-serif">Северный Ледовитый океан</text>
  <ellipse cx="600" cy="240" rx="110" ry="90" fill="#BAE6FD" stroke="#0284C7" stroke-width="2" />
  <ellipse cx="600" cy="230" rx="60" ry="40" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="1" />
  <text x="600" y="233" text-anchor="middle" fill="#0284C7" font-size="9" font-weight="bold" font-family="sans-serif">Лёд</text>
  <path d="M 520,200 Q 580,190 640,200 Q 680,210 700,240" fill="none" stroke="#DC2626" stroke-width="2" />
  <text x="660" y="195" text-anchor="middle" fill="#DC2626" font-size="7" font-weight="normal" font-family="sans-serif">Северный</text>
  <text x="660" y="207" text-anchor="middle" fill="#DC2626" font-size="7" font-weight="normal" font-family="sans-serif">морской путь</text>
  <text x="600" y="360" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Площадь: 14,8 млн км²</text>
  <text x="600" y="374" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Средняя глубина: 1 225 м</text>
  <text x="600" y="388" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Наибольшая глубина: 5 527 м</text>
  <text x="600" y="402" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Самый маленький океан</text>
  <text x="600" y="416" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Самый холодный океан</text>
  <text x="600" y="430" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Покрыт льдом большую часть года</text>
  <text x="600" y="444" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Омывает: Евразию, Сев. Америку</text>
  <rect x="450" y="345" width="300" height="22" rx="3" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="1" />
  <rect x="450" y="345" width="4" height="22" rx="2" fill="#0284C7" />
  <text x="462" y="360" text-anchor="start" fill="#0284C7" font-size="10" font-weight="bold" font-family="sans-serif">Холодный ледовитый океан</text>
  <text x="600" y="468" text-anchor="middle" fill="#047857" font-size="10" font-weight="bold" font-family="sans-serif">Ресурсы:</text>
  <text x="600" y="484" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Нефть и газ (шельф)</text>
  <text x="600" y="498" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Рыболовство</text>
  <text x="600" y="512" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Морской транспорт</text>
  <text x="400" y="530" text-anchor="middle" fill="#047857" font-size="13" font-weight="bold" font-family="sans-serif">Сравнение океанов</text>
  <line x1="80" y1="534" x2="720" y2="534" stroke="#6EE7B7" stroke-width="1" />
  <rect x="80" y="542" width="640" height="18" rx="3" fill="#059669" />
  <text x="170" y="555" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="sans-serif">Показатель</text>
  <text x="400" y="555" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="sans-serif">Индийский</text>
  <text x="600" y="555" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="sans-serif">Северный Ледовитый</text>
  <rect x="80" y="562" width="640" height="16" rx="0" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5" />
  <text x="170" y="574" text-anchor="middle" fill="#1F2937" font-size="8" font-weight="normal" font-family="sans-serif">Площадь</text>
  <text x="400" y="574" text-anchor="middle" fill="#047857" font-size="8" font-weight="bold" font-family="sans-serif">76,2 млн км²</text>
  <text x="600" y="574" text-anchor="middle" fill="#0284C7" font-size="8" font-weight="bold" font-family="sans-serif">14,8 млн км²</text>
  <rect x="80" y="578" width="640" height="16" rx="0" fill="#ECFDF5" stroke="#E5E7EB" stroke-width="0.5" />
  <text x="170" y="590" text-anchor="middle" fill="#1F2937" font-size="8" font-weight="normal" font-family="sans-serif">Температура</text>
  <text x="400" y="590" text-anchor="middle" fill="#047857" font-size="8" font-weight="bold" font-family="sans-serif">самый тёплый</text>
  <text x="600" y="590" text-anchor="middle" fill="#0284C7" font-size="8" font-weight="bold" font-family="sans-serif">самый холодный</text>
  <rect x="80" y="594" width="640" height="16" rx="0" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5" />
  <text x="170" y="606" text-anchor="middle" fill="#1F2937" font-size="8" font-weight="normal" font-family="sans-serif">Ледовитость</text>
  <text x="400" y="606" text-anchor="middle" fill="#047857" font-size="8" font-weight="bold" font-family="sans-serif">минимальная</text>
  <text x="600" y="606" text-anchor="middle" fill="#0284C7" font-size="8" font-weight="bold" font-family="sans-serif">максимальная</text>
</svg>