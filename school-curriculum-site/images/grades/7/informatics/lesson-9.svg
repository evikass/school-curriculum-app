<text x="450" y="523" fill="#38BDF8" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Шаги: 1) Открыть  2) Фильтр  3) Сохранить</text>
<text x="450" y="542" fill="#4ADE80" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">Библиотека: Pillow (PIL)</text>
