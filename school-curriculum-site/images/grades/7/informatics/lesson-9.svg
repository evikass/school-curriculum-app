<text x="35" y="312" fill="#4ADE80" font-size="14" text-anchor="start" font-family="sans-serif" font-weight="bold">Обработка изображений в Python (Pillow)</text>
<rect x="35" y="322" width="450" height="278" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="35" y="322" width="450" height="24" fill="#1E293B" rx="6"/>
<rect x="35" y="340" width="450" height="6" fill="#1E293B" rx="8"/>
<text x="45" y="338" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">process.py</text>
<circle cx="445" cy="334" r="4" fill="#F87171"/>
<circle cx="459" cy="334" r="4" fill="#FACC15"/>
<circle cx="473" cy="334" r="4" fill="#4ADE80"/>
<text x="43" y="362" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="362" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">from PIL import Image, ImageFilter</text>
<text x="43" y="380" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="380" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="398" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="398" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Открытие изображения</text>
<text x="43" y="416" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="416" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">img = Image.open(&quot;photo.jpg&quot;)</text>
<text x="43" y="434" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="434" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="452" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="452" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Применение фильтра</text>
<text x="43" y="470" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="470" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">blur = img.filter(ImageFilter.BLUR)</text>
<text x="43" y="488" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="488" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="506" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="65" y="506" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Изменение размера</text>
<text x="43" y="524" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="65" y="524" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">small = img.resize((200, 200))</text>
<text x="43" y="542" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="65" y="542" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="560" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">12</text>
<text x="65" y="560" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Сохранение</text>
<text x="43" y="578" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">13</text>
<text x="65" y="578" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">small.save(&quot;photo_small.png&quot;)</text>
