<text x="65" y="564" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">y = str(x)  # '42'</text>
<text x="43" y="582" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="582" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">z = int('5')  # 5</text>
