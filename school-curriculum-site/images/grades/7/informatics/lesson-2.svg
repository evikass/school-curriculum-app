<text x="65" y="318" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Целое число</text>
<text x="43" y="336" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="336" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">age = 13</text>
<text x="43" y="354" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="354" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">x = -7</text>
<text x="43" y="372" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
