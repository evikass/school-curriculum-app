  <rect x="16" y="12" width="38" height="38" rx="8" fill="#EF4444" opacity="0.9"/>
  <text x="35" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FFF">2</text>
  <text x="68" y="34" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#FFF">Развитие силы и быстроты</text>
  <text x="68" y="52" font-family="Arial,sans-serif" font-size="11" fill="#86EFAC">Физкультура — 7 класс — Урок 2</text>
  <line x1="20" y1="64" x2="780" y2="64" stroke="#86EFAC" stroke-width="1" opacity="0.5"/>
  <rect x="16" y="72" width="245" height="135" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="16" y="72" width="245" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="16" y="86" width="245" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="138" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Развитие силы</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Собственная масса (отжимания)</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Отягощение 60–80% от макс.</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• 6–12 повторений, 3–4 подхода</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Отдых между подходами 2–3 мин</text>
  <rect x="271" y="72" width="245" height="135" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="271" y="72" width="245" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="271" y="86" width="245" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="393" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Развитие быстроты</text>
  <text x="281" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Скорость реакции (старты)</text>
  <text x="281" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Скорость одиночного движения</text>
  <text x="281" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Частота движений (темп)</text>
  <text x="281" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Интервалы: 5–30 сек макс.</text>
  <rect x="526" y="72" width="258" height="135" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="526" y="72" width="258" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="526" y="86" width="258" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="655" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Упражнения на силу</text>
  <text x="536" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Отжимания: 10–25 раз</text>
  <text x="536" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Подтягивания: 5–15 раз</text>
  <text x="536" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Приседания: 20–40 раз</text>
  <text x="536" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Планка: 30–90 сек</text>
  <rect x="16" y="217" width="245" height="135" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="16" y="217" width="245" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="16" y="231" width="245" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="138" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Упражнения на быстроту</text>
  <text x="26" y="257" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Челночный бег 3×10 м</text>
  <text x="26" y="272" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Бег 30 м с ходу</text>
  <text x="26" y="287" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Прыжки на месте 10 сек</text>
  <text x="26" y="302" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Броски мяча в стену 20 сек</text>
  <rect x="271" y="217" width="245" height="135" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="271" y="217" width="245" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="271" y="231" width="245" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="393" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Принципы тренировки</text>
  <text x="281" y="257" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Сверхнагрузка — больше обычного</text>
  <text x="281" y="272" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Прогрессия — рост нагрузки</text>
  <text x="281" y="287" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Специфичность — цель тренировки</text>
  <text x="281" y="302" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Обратимость — без тренир. слабеем</text>
  <rect x="526" y="217" width="258" height="135" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="526" y="217" width="258" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="526" y="231" width="258" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="655" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Правила безопасности</text>
  <text x="536" y="257" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Разминка перед тренировкой</text>
  <text x="536" y="272" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Правильная техника упражнений</text>
  <text x="536" y="287" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Страховка при работе с весом</text>
  <text x="536" y="302" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Растяжка после нагрузки</text>
  <rect x="16" y="362" width="768" height="202" rx="8" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#14532D">Зависимость силы и быстроты от тренировочной нагрузки</text>
