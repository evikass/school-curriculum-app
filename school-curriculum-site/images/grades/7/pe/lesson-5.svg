  <text x="138" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Кувырки</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Кувырок вперёд — группировка</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Кувырок назад — толчок руками</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Длинный кувырок — через прыжок</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Перекат в сторону — на спине</text>
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Стойка на лопатках — упор</text>
  <rect x="271" y="72" width="245" height="145" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="271" y="72" width="245" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="271" y="86" width="245" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="393" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Стойки и равновесие</text>
  <text x="281" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Стойка на руках (у стены)</text>
  <text x="281" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Стойка на голове</text>
  <text x="281" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Мост из положения лёжа</text>
  <text x="281" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• «Ласточка» — равновесие</text>
  <text x="281" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Шпагат продольный/поперечный</text>
