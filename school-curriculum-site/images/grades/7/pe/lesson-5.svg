  <text x="138" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Связки элементов</text>
  <text x="26" y="267" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Кувырок → стойка → мост</text>
  <text x="26" y="282" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Два кувырка вперёд подряд</text>
  <text x="26" y="297" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Кувырок → «ласточка»</text>
  <text x="26" y="312" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Комбинация из 4–5 элементов</text>
  <rect x="271" y="227" width="245" height="125" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
  <rect x="271" y="227" width="245" height="26" rx="8" ry="8" fill="#22C55E" opacity="0.88"/>
  <rect x="271" y="241" width="245" height="12" fill="#22C55E" opacity="0.88"/>
  <text x="393" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Группировка</text>
  <text x="281" y="267" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Колени к груди, обхват руками</text>
  <text x="281" y="282" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Подбородок прижат к груди</text>
  <text x="281" y="297" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Спина округлена (дуга)</text>
  <text x="281" y="312" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Основа всех кувырков!</text>
