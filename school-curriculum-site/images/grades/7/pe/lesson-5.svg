  <text x="536" y="267" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Кувырок вперёд: 5 сек</text>
  <text x="536" y="282" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Стойка на лопатках: 10 сек</text>
  <text x="536" y="297" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Мост: фиксация 3 сек</text>
  <text x="536" y="312" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Комбинация из 4 элементов</text>
