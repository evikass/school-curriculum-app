  <text x="655" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Техника безопасности</text>
  <text x="536" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Мат обязателен под телом!</text>
  <text x="536" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Страховка партнёром всегда</text>
  <text x="536" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Разминка перед акробатикой</text>
  <text x="536" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Снять украшения и часы</text>
  <text x="536" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Не выполнять без разрешения</text>
  <rect x="16" y="227" width="245" height="125" rx="8" ry="8" fill="url(#cardGrad)" stroke="#BBF7D0" stroke-width="1" filter="url(#shadow)"/>
