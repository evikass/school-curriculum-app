  <text x="68" y="34" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#FFF">Акробатические упражнения</text>
  <text x="68" y="52" font-family="Arial,sans-serif" font-size="11" fill="#86EFAC">Физкультура — 7 класс — Урок 5</text>
