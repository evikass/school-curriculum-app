<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F3FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#5B21B6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="50" cy="550" r="60" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="400" cy="600" r="100" fill="#A78BFA" opacity="0.04"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Характеристика элемента по положению в таблице</text>
  <!-- Small decorative line under header -->
  <rect x="300" y="54" width="200" height="3" fill="#C4B5FD" rx="1.5" opacity="0.7"/>
  <rect x="20" y="75" width="340" height="280" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Пример: Сера (S)</text>
  <rect x="50" y="115" width="130" height="150" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1" rx="8"/>
  <text x="115" y="140" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="28" fill="#5B21B6">16</text>
  <text x="115" y="180" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="40" fill="#5B21B6">S</text>
  <text x="115" y="210" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#6B7280">Сера</text>
  <text x="115" y="230" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#6B7280">32,06</text>
  <text x="200" y="135" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">Z = 16 (порядковый номер)</text>
  <text x="200" y="155" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">Период: 3</text>
  <text x="200" y="175" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">Группа: VIA (16)</text>
  <text x="200" y="195" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">Подгруппа: главная</text>
  <text x="200" y="215" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">Ar = 32,06 (относ. ат. масса)</text>
  <rect x="200" y="230" width="145" height="40" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="210" y="248" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#F59E0B">Неметалл</text>
  <text x="210" y="263" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">p-элемент</text>
  <rect x="380" y="75" width="400" height="280" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="400" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Электронное строение серы</text>
  <circle cx="580" cy="210" r="22" fill="#5B21B6" opacity="0.3"/>
  <circle cx="580" cy="210" r="16" fill="#5B21B6" opacity="0.5"/>
  <text x="580" y="215" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#FFFFFF">+16</text>
  <circle cx="580" cy="210" r="45" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="580" cy="210" r="75" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="580" cy="210" r="105" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="580" cy="165" r="5" fill="#06B6D4"/>
  <circle cx="580" cy="255" r="5" fill="#06B6D4"/>
  <circle cx="655.0" cy="210.0" r="4" fill="#3B82F6"/>
  <circle cx="633.0" cy="263.0" r="4" fill="#3B82F6"/>
  <circle cx="580.0" cy="285.0" r="4" fill="#3B82F6"/>
  <circle cx="527.0" cy="263.0" r="4" fill="#3B82F6"/>
  <circle cx="505.0" cy="210.0" r="4" fill="#3B82F6"/>
  <circle cx="527.0" cy="157.0" r="4" fill="#3B82F6"/>
  <circle cx="580.0" cy="135.0" r="4" fill="#3B82F6"/>
  <circle cx="633.0" cy="157.0" r="4" fill="#3B82F6"/>
  <circle cx="685.0" cy="210.0" r="4" fill="#10B981"/>
  <circle cx="632.5" cy="300.9" r="4" fill="#10B981"/>
  <circle cx="527.5" cy="300.9" r="4" fill="#10B981"/>
  <circle cx="475.0" cy="210.0" r="4" fill="#10B981"/>
  <circle cx="527.5" cy="119.1" r="4" fill="#10B981"/>
  <circle cx="632.5" cy="119.1" r="4" fill="#10B981"/>
  <text x="630" y="178" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#06B6D4">n=1: 2e</text>
  <text x="660" y="210" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#3B82F6">n=2: 8e</text>
  <text x="688" y="250" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#10B981">n=3: 6e</text>
  <text x="580" y="340" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#5B21B6">1s² 2s² 2p⁶ 3s² 3p⁴</text>
  <rect x="20" y="365" width="760" height="205" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="390" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Правила определения характеристик элемента</text>
  <rect x="40" y="405" width="350" height="30" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="50" y="424" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#5B21B6">Порядковый номер = заряд ядра (Z)</text>
  <rect x="40" y="440" width="350" height="30" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1" rx="8"/>
  <text x="50" y="459" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#3B82F6">Номер периода = число энергоуровней</text>
  <rect x="40" y="475" width="350" height="30" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1" rx="8"/>
  <text x="50" y="494" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#10B981">Номер группы = число e на внешн. уровне</text>
  <rect x="40" y="510" width="350" height="30" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="8"/>
  <text x="50" y="529" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#F59E0B">Число протонов = Z, нейтронов = Ar - Z</text>
  <rect x="410" y="405" width="350" height="30" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" rx="8"/>
  <text x="420" y="424" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Na (11): Z=11, 3 период, IA группа</text>
  <rect x="410" y="440" width="350" height="30" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" rx="8"/>
  <text x="420" y="459" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Na: металлические свойства, 1e внешн.</text>
  <rect x="410" y="475" width="350" height="30" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1" rx="8"/>
  <text x="420" y="494" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Cl (17): Z=17, 3 период, VIIA группа</text>
  <rect x="410" y="510" width="350" height="30" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1" rx="8"/>
  <text x="420" y="529" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Cl: неметалл, 7e на внешнем уровне</text>
  <rect x="410" y="545" width="160" height="25" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="8"/>
  <text x="420" y="562" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">Формула: e = N группы (A)</text>
  <!-- Footer -->
  <rect x="0" y="580" width="800" height="20" fill="#7C3AED" opacity="0.1"/>
  <text x="400" y="594" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Химия — 8 класс</text>
</svg>