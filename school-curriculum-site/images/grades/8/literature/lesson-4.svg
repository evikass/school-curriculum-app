  <text x="400" y="32" fontSize="21" fill="#FFFFFF" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Комедия «Ревизор»</text>
  <text x="400" y="56" fontSize="12" fill="#FEF3C7" textAnchor="middle" fontFamily="sans-serif">Н.В. Гоголь — сатира на чиновничество и общественные пороки</text>
  <rect x="0" y="580" width="800" height="20" fill="#78350F" rx="0" />
