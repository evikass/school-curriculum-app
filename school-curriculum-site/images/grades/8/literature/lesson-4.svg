    <text x="30" y="320" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Хлестаков и «хлестаковщина»</text>
    <text x="34" y="336" fontSize="11" fill="#78350F" fontFamily="sans-serif">Хлестаков — мелкий чиновник, принятый за ревизора.</text>
    <text x="34" y="351" fontSize="11" fill="#78350F" fontFamily="sans-serif">Суть «хлестаковщины»:</text>
    <text x="34" y="366" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Мнимая значительность без оснований</text>
    <text x="34" y="381" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Болтливость и самовосхваление</text>
    <text x="34" y="396" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Лёгкость и поверхностность</text>
    <text x="34" y="411" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Способность увлечь окружающих враньём</text>
    <text x="34" y="426" fontSize="11" fill="#78350F" fontFamily="sans-serif">«Лёгкость в мыслях необыкновенная»</text>
  </g>
  <g>
    <rect x="400" y="302" width="380" height="130" fill="#FFF7ED" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="400" y="302" width="380" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="400" y="304" width="380" height="2" fill="url(#amberGrad)" />
    <text x="410" y="320" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Развитие действия</text>
    <text x="414" y="336" fontSize="11" fill="#78350F" fontFamily="sans-serif">1. Известие о ревизоре — паника</text>
    <text x="414" y="351" fontSize="11" fill="#78350F" fontFamily="sans-serif">2. Ошибка: Хлестаков = ревизор</text>
    <text x="414" y="366" fontSize="11" fill="#78350F" fontFamily="sans-serif">3. Враньё Хлестакова растёт</text>
    <text x="414" y="381" fontSize="11" fill="#78350F" fontFamily="sans-serif">4. Сватовство к Марье Антоновне</text>
    <text x="414" y="396" fontSize="11" fill="#78350F" fontFamily="sans-serif">5. Бегство Хлестакова</text>
    <text x="414" y="411" fontSize="11" fill="#78350F" fontFamily="sans-serif">6. Чтение письма — разоблачение</text>
    <text x="414" y="426" fontSize="11" fill="#78350F" fontFamily="sans-serif">7. Немая сцена — настоящий ревизор!</text>
  </g>
  <g>
    <rect x="20" y="442" width="760" height="55" fill="#FEF3C7" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="20" y="442" width="760" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="20" y="444" width="760" height="2" fill="url(#amberGrad)" />
  </g>
  <text x="400" y="466" fontSize="14" fill="#92400E" textAnchor="middle" fontFamily="sans-serif" fontStyle="italic" fontWeight="bold">«На зеркало неча пенять, коли рожа крива»</text>
  <text x="400" y="484" fontSize="10" fill="#A16207" textAnchor="middle" fontFamily="sans-serif">— Эпиграф к комедии (народная пословица)</text>
  <g>
    <rect x="20" y="507" width="380" height="65" fill="#FEFCE8" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="20" y="507" width="380" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="20" y="509" width="380" height="2" fill="url(#amberGrad)" />
    <text x="30" y="525" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Немая сцена</text>
    <text x="34" y="541" fontSize="11" fill="#78350F" fontFamily="sans-serif">Финал — окаменение всех персонажей.</text>
    <text x="34" y="556" fontSize="11" fill="#78350F" fontFamily="sans-serif">Метафора застывшего общества.</text>
  </g>
  <g>
    <rect x="400" y="507" width="380" height="65" fill="#FFF7ED" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="400" y="507" width="380" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="400" y="509" width="380" height="2" fill="url(#amberGrad)" />
    <text x="410" y="525" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Значение комедии</text>
    <text x="414" y="541" fontSize="11" fill="#78350F" fontFamily="sans-serif">Гоголь обличил пороки всей России.</text>
    <text x="414" y="556" fontSize="11" fill="#78350F" fontFamily="sans-serif">«Ревизор» — зеркало русского общества.</text>
  </g>
