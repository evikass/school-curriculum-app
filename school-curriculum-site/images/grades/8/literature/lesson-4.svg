    <text x="545" y="100" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Основные темы</text>
    <text x="549" y="116" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Чиновничий произвол</text>
    <text x="549" y="131" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Взятки, казнокрадство</text>
    <text x="549" y="146" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="549" y="161" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Страх перед властью</text>
    <text x="549" y="176" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Городничий боится ревизора</text>
    <text x="549" y="191" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="549" y="206" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Хлестаковщина</text>
    <text x="549" y="221" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Враньё как образ жизни</text>
    <text x="549" y="236" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="549" y="251" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Чинопочитание</text>
    <text x="549" y="266" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Рабская психология</text>
    <text x="549" y="281" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="549" y="296" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Смех сквозь слёзы</text>
