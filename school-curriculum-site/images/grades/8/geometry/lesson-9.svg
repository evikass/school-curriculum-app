  <text x="50" y="49" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">9</text>
  <text x="410" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Средняя линия треугольника</text>
  <text x="760" y="35" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">8 класс</text>
  <text x="760" y="50" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">Геометрия</text>
  <line x1="20" y1="80" x2="780" y2="80" stroke="#06B6D4" stroke-width="2" opacity="0.25" />
  <rect x="23" y="93" width="370" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="90" width="370" height="110" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определение</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Средняя линия треугольника —</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">отрезок, соединяющий середины</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">двух его сторон.</text>
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">DE — средняя линия ΔABC,</text>
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">где D — середина AB,</text>
  <text x="32" y="232" font-family="Arial,sans-serif" font-size="12" fill="#37474F">E — середина BC</text>
  <rect x="413" y="93" width="370" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="110" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="410" y="90" width="370" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="410" y="106" width="370" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Свойства средней линии</text>
  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">1. DE ∥ AC (параллельна 3-й стороне)</text>
  <text x="422" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="166" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">2. DE = AC / 2 (равна половине)</text>
  <text x="422" y="184" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="202" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">3. ΔDBE ~ ΔABC, k = ½</text>
