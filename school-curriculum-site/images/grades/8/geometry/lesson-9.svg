  <text x="645" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Средняя линия трапеции</text>
  <text x="522" y="255" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Соединяет середины боковых</text>
  <text x="522" y="272" font-family="Arial,sans-serif" font-size="12" fill="#37474F">сторон трапеции.</text>
  <text x="522" y="289" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="522" y="306" font-family="Arial,sans-serif" font-size="12" fill="#37474F">m = (a + b) / 2</text>
  <text x="522" y="323" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="522" y="340" font-family="Arial,sans-serif" font-size="12" fill="#37474F">m ∥ основаниям a и b</text>
  <text x="522" y="357" font-family="Arial,sans-serif" font-size="12" fill="#37474F">m = (AD + BC) / 2</text>
  <rect x="513" y="363" width="270" height="50" fill="#000000" rx="8" opacity="0.05" />
  <rect x="510" y="360" width="270" height="50" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="510" y="360" width="270" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="510" y="376" width="270" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="645" y="377" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Дополнительные свойства</text>
  <text x="522" y="400" font-family="Arial,sans-serif" font-size="12" fill="#37474F">3 средние линии делят Δ на 4</text>
  <text x="522" y="417" font-family="Arial,sans-serif" font-size="12" fill="#37474F">равных треугольника</text>
  <rect x="23" y="423" width="760" height="80" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="420" width="760" height="80" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="20" y="420" width="760" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="20" y="436" width="760" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="400" y="437" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Ключевые формулы</text>
  <text x="32" y="460" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">DE ∥ AC,  DE = AC / 2     |     ΔDBE ~ ΔABC,  k = 1/2     |     S(DBE) = S(ABC) / 4     |     Средние линии Δ → 4 равных Δ</text>
  <rect x="23" y="518" width="760" height="40" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="515" width="760" height="40" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="515" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="531" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="532" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Пример</text>
  <text x="32" y="555" font-family="Arial,sans-serif" font-size="12" fill="#37474F">AC = 12 см, D и E — середины AB и BC. DE = AC/2 = 6 см, DE ∥ AC</text>
