    <text x="156" y="314" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#EF4444">D</text>
    <circle cx="320" cy="310" r="4" fill="#EF4444" />
    <text x="328" y="314" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#EF4444">E</text>
    <circle cx="250" cy="250" r="4" fill="#EF4444" />
    <text x="250" y="242" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#EF4444">F</text>
    <text x="246" y="384" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">A</text>
    <text x="86" y="245" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">B</text>
    <text x="408" y="245" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">C</text>
    <text x="250" y="242" font-family="Arial,sans-serif" font-size="13" fill="#06B6D4" text-anchor="middle" font-style="italic">AC</text>
    <text x="250" y="310" font-family="Arial,sans-serif" font-size="16" fill="#EF4444" font-weight="bold">DE = AC/2, DE ∥ AC</text>
  </g>
