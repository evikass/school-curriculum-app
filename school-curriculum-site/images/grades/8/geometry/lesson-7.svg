  <text x="645" y="197" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Пифагоровы тройки</text>
  <text x="522" y="220" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• 3, 4, 5   (9 + 16 = 25)</text>
  <text x="522" y="237" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• 5, 12, 13  (25 + 144 = 169)</text>
  <text x="522" y="254" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• 8, 15, 17  (64 + 225 = 289)</text>
  <text x="522" y="271" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• 7, 24, 25  (49 + 576 = 625)</text>
  <text x="522" y="288" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• 6, 8, 10   (кратная 3,4,5)</text>
  <rect x="513" y="308" width="270" height="85" fill="#000000" rx="8" opacity="0.05" />
  <rect x="510" y="305" width="270" height="85" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="510" y="305" width="270" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="510" y="321" width="270" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="645" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Обратная теорема</text>
  <text x="522" y="345" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Если c² = a² + b², то</text>
  <text x="522" y="362" font-family="Arial,sans-serif" font-size="12" fill="#37474F">треугольник прямоугольный.</text>
  <text x="522" y="379" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="522" y="396" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Применяется для проверки</text>
  <text x="522" y="413" font-family="Arial,sans-serif" font-size="12" fill="#37474F">прямоугольности треугольника.</text>
  <rect x="23" y="408" width="760" height="80" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="405" width="760" height="80" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="20" y="405" width="760" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
