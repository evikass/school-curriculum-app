  <text x="400" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Теорема Пифагора</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">В прямоугольном треугольнике квадрат гипотенузы равен сумме квадратов катетов:</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">c² = a² + b²        где c — гипотенуза, a, b — катеты</text>
  <g clip-path="url(#ill7)">
