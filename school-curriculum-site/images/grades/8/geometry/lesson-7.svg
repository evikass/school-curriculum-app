  <text x="400" y="422" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Примеры решения задач</text>
  <text x="32" y="445" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">1) a=3, b=4: c = √(9+16) = √25 = 5</text>
  <text x="32" y="463" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">2) c=13, b=5: a = √(169−25) = √144 = 12</text>
  <text x="32" y="481" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">3) Диагональ квадрата: d = a√2</text>
  <rect x="23" y="503" width="760" height="55" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="500" width="760" height="55" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="500" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="516" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="517" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Следствия</text>
  <text x="32" y="540" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Диагональ квадрата: d = a√2     • Высота равностороннего Δ: h = a√3/2     • Катет против угла 30° = половине гипотенузы</text>
