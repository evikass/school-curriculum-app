<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Present Simple</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Настоящее простое время</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула образования / Formation</text><line x1="20" y1="103" x2="268" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="355" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="197" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + V</tspan><tspan fill="#6B7280"> (</tspan><tspan fill="#3B82F6">V/Vs/Ves</tspan><tspan fill="#6B7280">) + ...</tspan></text><rect x="390" y="112" width="380" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="580" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">do not / does not</tspan><tspan fill="#3B82F6"> + V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="20" y="156" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Do/Does</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V</tspan><tspan fill="#6B7280"> + ...?</tspan></text><text x="20" y="215" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Markers</text><line x1="20" y1="218" x2="260" y2="218" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="225" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="107" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">always</text><rect x="210" y="225" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="297" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">usually</text><rect x="400" y="225" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="487" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">often</text><rect x="590" y="225" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="677" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">sometimes</text><rect x="20" y="255" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="107" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">rarely</text><rect x="210" y="255" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="297" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">never</text><rect x="400" y="255" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="487" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">every day</text><rect x="590" y="255" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="677" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">on Mondays</text><text x="20" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Правила / Rules</text><line x1="20" y1="303" x2="140" y2="303" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="310" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="328" r="12" fill="#DC2626" /><text x="38" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Правило 1: Окончание -s/-es</text><text x="32" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He/She/It + V-s/es: works, goes, studies</text><rect x="410" y="310" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="428" cy="328" r="12" fill="#DC2626" /><text x="428" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="446" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Правило 2: Отрицание</text><text x="422" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He doesn't work. / They don't work.</text><text x="20" y="385" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Спряжение глагола WORK / Conjugation</text><line x1="20" y1="388" x2="308" y2="388" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="398" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="65" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold" /><text x="210" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Утверждение +</text><text x="410" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Отрицание −</text><text x="610" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Вопрос ?</text><rect x="20" y="426" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I</text><text x="118" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I work</text><text x="318" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I don't work</text><text x="518" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Do I work?</text><rect x="20" y="454" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He/She/It</text><text x="118" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He works</text><text x="318" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He doesn't work</text><text x="518" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Does he work?</text><rect x="20" y="482" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="501" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We/You/They</text><text x="118" y="501" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We work</text><text x="318" y="501" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We don't work</text><text x="518" y="501" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Do we work?</text><text x="20" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="503" x2="164" y2="503" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="516" r="9" fill="#3B82F6" /><text x="30" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She goes to school every day.</text><text x="46" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она ходит в школу каждый день.</text><circle cx="30" cy="546" r="9" fill="#3B82F6" /><text x="30" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="550" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I don't like spicy food.</text><text x="46" y="566" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я не люблю острую еду.</text><circle cx="410" cy="516" r="9" fill="#3B82F6" /><text x="410" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Do you speak English?</text><text x="426" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты говоришь по-английски?</text><circle cx="410" cy="546" r="9" fill="#3B82F6" /><text x="410" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="550" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">He always reads books.</text><text x="426" y="566" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Он всегда читает книги.</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 1</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 1/15</text></svg>