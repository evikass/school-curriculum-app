<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2F8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FCE7F3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BE185D;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#FBCFE8;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#BE185D" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSmall" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#1F2937" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0"/>
  <rect x="0" y="65" width="800" height="5" fill="#BE185D" opacity="0.3"/>
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Обращения и междометия</text>
  <text x="400" y="58" font-family="Arial, sans-serif" font-size="13" fill="#F9A8D4" text-anchor="middle">Знаки препинания при обращениях и междометиях</text>

  <circle cx="40" cy="35" r="22" fill="#FFFFFF" opacity="0.25"/>
  <text x="40" y="41" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>

  <rect x="15" y="82" width="380" height="130" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205.0" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Обращение</text>

  <text x="30" y="106" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Обращение — слово (или словосочетание),</text>
  <text x="30" y="122" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">называющее того, к кому обращаются с речью.</text>
  <text x="30" y="142" font-family="Arial, sans-serif" font-size="11" fill="#FB7185" font-weight="bold">Не является членом предложения!</text>
  <text x="30" y="162" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Выделяется запятыми, редко — восклицательным знаком.</text>
  <text x="30" y="182" font-family="Arial, sans-serif" font-size="11" fill="#10B981" font-weight="bold">Форма: именительный падеж, звательная интонация</text>
  <text x="30" y="200" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">Пример: <tspan fill="#F59E0B" font-weight="bold">Мама</tspan>, я пришёл!</text>

  <rect x="410" y="82" width="375" height="130" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597.5" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Знаки препинания при обращениях</text>

  <text x="425" y="106" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BE185D">В начале предложения:</text>
  <text x="425" y="122" font-family="Arial, sans-serif" font-size="10" fill="#1F2937"><tspan fill="#F59E0B">Друзья</tspan>, пора отправляться в путь!</text>
  <text x="425" y="140" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BE185D">В середине предложения:</text>
  <text x="425" y="156" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">Ты, <tspan fill="#F59E0B">брат</tspan>, конечно, прав.</text>
  <text x="425" y="174" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BE185D">В конце предложения:</text>
  <text x="425" y="190" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">Помоги мне, <tspan fill="#F59E0B">мама</tspan>.</text>
  <text x="425" y="206" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FB7185">С восклицательным знаком:</text>
  <text x="425" y="206" font-family="Arial, sans-serif" font-size="10" fill="#FB7185" dx="195">Мама!</text>

  <rect x="15" y="225" width="380" height="155" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205.0" y="243" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Распространённые обращения</text>

  <text x="30" y="248" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">Обращение может состоять из нескольких слов:</text>
  <line x1="30" y1="256" x2="380" y2="256" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="30" y="264" width="350" height="28" fill="#FFFFFF" rx="4" stroke="#F59E0B" stroke-width="1"/>
  <text x="40" y="283" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" font-weight="bold">Милая моя мамочка</text>
  <text x="185" y="283" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">, помоги мне!</text>
  <rect x="30" y="296" width="350" height="28" fill="#FFFFFF" rx="4" stroke="#F59E0B" stroke-width="1"/>
  <text x="40" y="315" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">Прости меня, <tspan fill="#F59E0B" font-weight="bold">родная моя бабушка</tspan>.</text>
  <rect x="30" y="328" width="350" height="28" fill="#FFFFFF" rx="4" stroke="#F59E0B" stroke-width="1"/>
  <text x="40" y="347" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" font-weight="bold">Гражданин прохожий</text>
  <text x="200" y="347" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">, скажите, как пройти...</text>
  <text x="30" y="375" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Олонецкие обращения: междометие + имя</text>

  <rect x="410" y="225" width="375" height="155" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="597.5" y="243" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Междометия</text>

  <text x="425" y="248" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Междометие — слово, выражающее чувства,</text>
  <text x="425" y="264" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">побуждения, не называя их.</text>
  <line x1="425" y1="272" x2="770" y2="272" stroke="#E5E7EB" stroke-width="1"/>
  <text x="425" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#10B981">Эмоциональные: ах, ой, увы, браво, фу</text>
  <text x="425" y="308" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3B82F6">Побудительные: ну, эй, ау, кис-кис</text>
  <text x="425" y="326" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#A855F7">Этикетные: спасибо, здравствуйте, извините</text>
  <line x1="425" y1="334" x2="770" y2="334" stroke="#E5E7EB" stroke-width="1"/>
  <text x="425" y="352" font-family="Arial, sans-serif" font-size="10" fill="#FB7185" font-weight="bold">Выделяются запятой или восклицательным знаком!</text>
  <text x="425" y="370" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">Ах, как красиво! | Эй, подождите!</text>

  <rect x="15" y="395" width="380" height="190" fill="url(#boxGrad)" rx="8" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205.0" y="413" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#BE185D" text-anchor="middle">Обращения в поэтической речи</text>

  <text x="30" y="418" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">В стихах обращения особенно выразительны:</text>
  <line x1="30" y1="426" x2="380" y2="426" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="30" y="434" width="350" height="40" fill="#FFFFFF" rx="4" stroke="#A855F7" stroke-width="1"/>
  <text x="40" y="452" font-family="Arial, sans-serif" font-size="10" fill="#A855F7" font-weight="bold">Мороз</text>
  <text x="90" y="452" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">, красный нос!</text>
  <text x="40" y="468" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Н. Некрасов (звательный падеж)</text>
  <rect x="30" y="480" width="350" height="40" fill="#FFFFFF" rx="4" stroke="#3B82F6" stroke-width="1"/>
  <text x="40" y="498" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">Пушкин</text>
  <text x="100" y="498" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">, ты нам дорог!</text>
  <text x="40" y="514" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Обращение к лицу по фамилии</text>
  <rect x="30" y="526" width="350" height="40" fill="#FFFFFF" rx="4" stroke="#10B981" stroke-width="1"/>
  <text x="40" y="544" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">Родина моя</text>
  <text x="140" y="544" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">, я твой сын!</text>
  <text x="40" y="560" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">Обращение к неживому предмету (риторическое)</text>
  <text x="30" y="580" font-family="Arial, sans-serif" font-size="9" fill="#FB7185" font-weight="bold">Риторическое обращение — к неживому или отсутствующему</text>

  <rect x="410" y="395" width="375" height="190" fill="#FFFFFF" rx="6" stroke="#FB7185" stroke-width="2" filter="url(#shadowSmall)"/>
  <rect x="410" y="395" width="375" height="22" fill="#FB7185" rx="6"/>
  <rect x="410" y="411" width="375" height="6" fill="#FB7185"/>
  <text x="597.5" y="410" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Правила: запятые и знаки</text>
  <text x="418" y="433" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">ОБРАЩЕНИЕ:</text>
  <text x="418" y="449" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - Запятая: Мама, я дома.</text>
  <text x="418" y="465" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - Воскл. знак: Мама! Я дома!</text>
  <text x="418" y="481" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - В середине: Ты, мама, права.</text>
  <text x="418" y="497" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - Распростр.: Мой дорогой друг, привет!</text>
  <text x="418" y="513" font-family="Arial, sans-serif" font-size="10" fill="#1F2937"></text>
  <text x="418" y="529" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">МЕЖДОМЕТИЕ:</text>
  <text x="418" y="545" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - Запятая: Увы, он опоздал.</text>
  <text x="418" y="561" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - Воскл. знак: Ой! Как страшно!</text>
  <text x="418" y="577" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">  - После междометия-паузы:</text>
  <text x="418" y="593" font-family="Arial, sans-serif" font-size="10" fill="#1F2937">    Эй, послушайте!</text>
</svg>
