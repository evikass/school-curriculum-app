  <circle cx="48" cy="574" r="3" fill="#3B82F6" />
  <circle cx="56" cy="578" r="3" fill="#EAB308" />
  <circle cx="43" cy="586" r="3" fill="#22C55E" />
  <circle cx="53" cy="586" r="3" fill="#8B5CF6" />
